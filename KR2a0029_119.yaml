body:
  text: 兼得江淮舟船遂令所獲南軍教北人習水戰出沒之勢未幾舟師大備至是水陸皆捷故江南大震壬戌偽命濠州團練使郭廷謂郭廷謂原本作廷渭今從宋史改正影庫本粘籤以城歸順案郭廷謂以城降歐陽史作庚申通鑑作辛酉與薛史異舊五代史考異乙丑雄武軍使崔萬以漣水歸順丙寅以郭廷謂為亳州防禦使案隆平集廷謂望金陵大慟再拜然後以城降世宗曰江南諸將惟卿斷渦口橋破定遠寨足以報李景祿矣濠上使李景自守亦何能為乃授以亳州防禦使舊五代史考異以偽命濠州兵馬都監陳遷為沂州團練使以偽命保義軍節度使陳承昭為右監門上將軍江南李景遣兵驅擄揚州士庶渡江焚其州郭而去丙子故同州節度使白延遇贈太尉故濠州刺史唐景思贈武清軍節度使丁丑泰州平永樂大典卷八千九百八十四兼得江淮舟船遂令所獲南軍教北人習水戰出沒之勢未幾舟師大備至是水陸皆捷故江南大震壬戌偽命濠州團練使郭廷謂郭廷謂原本作廷渭今從宋史改正影庫本粘籤以城歸順案郭廷謂以城降歐陽史作庚申通鑑作辛酉與薛史異舊五代史考異乙丑雄武軍使崔萬以漣水歸順丙寅以郭廷謂為亳州防禦使案隆平集廷謂望金陵大慟再拜然後以城降世宗曰江南諸將惟卿斷渦口橋破定遠寨足以報李景祿矣濠上使李景自守亦何能為乃授以亳州防禦使舊五代史考異以偽命濠州兵馬都監陳遷為沂州團練使以偽命保義軍節度使陳承昭為右監門上將軍江南李景遣兵驅擄揚州士庶渡江焚其州郭而去丙子故同州節度使白延遇贈太尉故濠州刺史唐景思贈武清軍節度使丁丑泰州平永樂大典卷八千九百八十四兼得江淮舟船遂令所獲南軍教北人習水戰出沒之勢未幾舟師大備至是水陸皆捷故江南大震壬戌偽命濠州團練使郭廷謂郭廷謂原本作廷渭今從宋史改正影庫本粘籤以城歸順案郭廷謂以城降歐陽史作庚申通鑑作辛酉與薛史異舊五代史考異乙丑雄武軍使崔萬以漣水歸順丙寅以郭廷謂為亳州防禦使案隆平集廷謂望金陵大慟再拜然後以城降世宗曰江南諸將惟卿斷渦口橋破定遠寨足以報李景祿矣濠上使李景自守亦何能為乃授以亳州防禦使舊五代史考異以偽命濠州兵馬都監陳遷為沂州團練使以偽命保義軍節度使陳承昭為右監門上將軍江南李景遣兵驅擄揚州士庶渡江焚其州郭而去丙子故同州節度使白延遇贈太尉故濠州刺史唐景思贈武清軍節度使丁丑泰州平永樂大典卷八千九百八十四兼得江淮舟船遂令所獲南軍教北人習水戰出沒之勢未幾舟師大備至是水陸皆捷故江南大震壬戌偽命濠州團練使郭廷謂郭廷謂原本作廷渭今從宋史改正影庫本粘籤以城歸順案郭廷謂以城降歐陽史作庚申通鑑作辛酉與薛史異舊五代史考異乙丑雄武軍使崔萬以漣水歸順丙寅以郭廷謂為亳州防禦使案隆平集廷謂望金陵大慟再拜然後以城降世宗曰江南諸將惟卿斷渦口橋破定遠寨足以報李景祿矣濠上使李景自守亦何能為乃授以亳州防禦使舊五代史考異以偽命濠州兵馬都監陳遷為沂州團練使以偽命保義軍節度使陳承昭為右監門上將軍江南李景遣兵驅擄揚州士庶渡江焚其州郭而去丙子故同州節度使白延遇贈太尉故濠州刺史唐景思贈武清軍節度使丁丑泰州平永樂大典卷八千九百八十四兼得江淮舟船遂令所獲南軍教北人習水戰出沒之勢未幾舟師大備至是水陸皆捷故江南大震壬戌偽命濠州團練使郭廷謂郭廷謂原本作廷渭今從宋史改正影庫本粘籤以城歸順案郭廷謂以城降歐陽史作庚申通鑑作辛酉與薛史異舊五代史考異乙丑雄武軍使崔萬以漣水歸順丙寅以郭廷謂為亳州防禦使案隆平集廷謂望金陵大慟再拜然後以城降世宗曰江南諸將惟卿斷渦口橋破定遠寨足以報李景祿矣濠上使李景自守亦何能為乃授以亳州防禦使舊五代史考異以偽命濠州兵馬都監陳遷為沂州團練使以偽命保義軍節度使陳承昭為右監門上將軍江南李景遣兵驅擄揚州士庶渡江焚其州郭而去丙子故同州節度使白延遇贈太尉故濠州刺史唐景思贈武清軍節度使丁丑泰州平永樂大典卷八千九百八十四兼得江淮舟船遂令所獲南軍教北人習水戰出沒之勢未幾舟師大備至是水陸皆捷故江南大震壬戌偽命濠州團練使郭廷謂郭廷謂原本作廷渭今從宋史改正影庫本粘籤以城歸順案郭廷謂以城降歐陽史作庚申通鑑作辛酉與薛史異舊五代史考異乙丑雄武軍使崔萬以漣水歸順丙寅以郭廷謂為亳州防禦使案隆平集廷謂望金陵大慟再拜然後以城降世宗曰江南諸將惟卿斷渦口橋破定遠寨足以報李景祿矣濠上使李景自守亦何能為乃授以亳州防禦使舊五代史考異以偽命濠州兵馬都監陳遷為沂州團練使以偽命保義軍節度使陳承昭為右監門上將軍江南李景遣兵驅擄揚州士庶渡江焚其州郭而去丙子故同州節度使白延遇贈太尉故濠州刺史唐景思贈武清軍節度使丁丑泰州平永樂大典卷八千九百八十四兼得江淮舟船遂令所獲南軍教北人習水戰出沒之勢未幾舟師大備至是水陸皆捷故江南大震壬戌偽命濠州團練使郭廷謂郭廷謂原本作廷渭今從宋史改正影庫本粘籤以城歸順案郭廷謂以城降歐陽史作庚申通鑑作辛酉與薛史異舊五代史考異乙丑雄武軍使崔萬以漣水歸順丙寅以郭廷謂為亳州防禦使案隆平集廷謂望金陵大慟再拜然後以城降世宗曰江南諸將惟卿斷渦口橋破定遠寨足以報李景祿矣濠上使李景自守亦何能為乃授以亳州防禦使舊五代史考異以偽命濠州兵馬都監陳遷為沂州團練使以偽命保義