body:
  text: 舊五代史卷一百八漢書十列傳第五李嵩深州饒陽人父舜卿本州録事參軍嵩幼而聰敏十餘歲為文家人奇之弱冠本府署為參軍其父嘗謂宗人李鏻曰大醜生處大醜原本作大魏考册府元龜及歐陽史俱作大醜今改正影庫本粘籤形奇氣異前途應不居徒勞之地賴吾兄誨激之大醜即嵩之小字也同光初魏王繼岌為興聖宮使兼領鎮州鉞嵩以參軍從事時推官李蕘掌書嵩見其起草不工密謂掌事呂柔曰令公皇子天下瞻望至於尺牘往來章表論列稍須文理合宜李侍御起草未能盡善呂曰公試代為之呂得嵩所作示盧質馮道皆稱之繇是擢為興聖宮巡官獨掌奏記莊宗入洛授太常寺協律郎王師伐蜀繼岌為都統以嵩掌書記蜀平樞密使郭崇韜為宦官誣搆繼岌遂殺崇韜父子外尚未知嵩白繼岌曰王何為作此危事至於不容崇韜至洛誅之未晚今懸軍五千里無咫尺書詔便殺重臣非謀也繼岌曰吾亦悔之嵩召書吏三四人登樓去梯取黃紙矯寫詔書倒使都統印發之翌日告諸軍軍情稍定及自蜀還案歐陽史師還繼岌死於道嵩至京師明宗革命任圜以宰相判三司用嵩為鹽鐵推官賜緋丁內艱歸鄉里服闋鎮帥范延光奏署掌書記延光為樞密使拜拾遺直樞密院遷補闕起居郎尚書郎充職如故長興末改翰林學士清泰初拜端明殿學士戶部侍郎先是長興三年冬契丹入雲中朝廷欲命重將鎮太原時晉祖為六軍副使以秦王從榮不軌懇求外任深有北門之望而大臣以晉高祖方權兵柄難以議之一日明宗怒其未奏范延光趙延壽等無對退歸本院共議其事方欲以康義誠為之時嵩最在下位聳立請曰朝廷重兵多在北邊須以重臣為帥以某所見非石太尉不可也會明宗令中使促之衆乃從其議翌日晉祖既受太原之命使心腹達意於嵩云壘浮圖須與合却尖蓋感之深也及清泰末晉祖入洛嵩與呂琦俱竄匿於伊闕民家旬日晉高祖召為戶部侍郎判戶部踰月拜中書侍郎同平章事與桑維翰並兼樞密使維翰鎮相州未幾廢樞密院事歸中書加尚書右僕射從幸鄴丁外艱恩制起復嵩上章數四懇辭其命優詔不允復上章不報嵩不得已而視事晉少帝嗣位復用桑維翰為樞密使命嵩兼判三司未幾代維翰為樞密使與馮玉對掌機密開運末嵩玉信契丹之詐經略瀛鄚中渡之敗落其姦謀契丹入京師趙延壽張礪素稱嵩之才契丹主善遇之以嵩為太子太師充樞密使契丹主嘗謂左右曰我破南朝祇得李嵩一人而已從契丹北行留於鎮州高祖平汴洛乃以嵩之居第賜蘇逢吉第中宿藏之物皆為逢吉所有其年秋鎮州逐麻答嵩與馮道和凝十數人歸闕授太子太傅嵩對朝之權右謙挹承顏未嘗忤旨嘗以宅券獻蘇逢吉不悅嵩二弟嶼嶬酣酒無識與楊邠蘇逢吉子弟杯酒之間時言及奪我居第逢吉知之有部曲葛延遇者逋李嶼船傭嶼撻之督其所負遇有同輩李澄亦事逢吉葛延遇夜寄宿於澄家以嶼見督情告案歐陽史是時高祖將葬睿陵河中李守貞反澄乃教延遇告變言嵩與其甥王凝謀因山陵放火焚京師又以蠟丸書通守貞遂一夕通謀告變案東都事略王溥傳世宗嘗問漢相李嵩蠟彈書結契丹有記其辭者否溥曰使嵩有此肯示人耶蘇逢吉輩陷之爾是逢吉等陷嵩又謂其通契丹也舊五代史考異逢吉覽狀示史弘肇其日逢吉遣吏召嵩至第從容語及葛延遇告變之事嵩以幼女為託逢吉遣吏送於侍衛獄既行案歐陽史乘馬從者去無一人嵩恚曰自古未有不亡之國不死之人及為吏所鞫乃自誣伏罪舉家遇害少長悉尸於市人士寃之案東都事略陶穀傳穀性傾險巧詆其進緣李嵩嵩之死穀自謂有力焉又案宋史陶穀傳李嵩以宅券獻逢吉逢吉不悅而嵩子弟數出怨言嵩懼移疾不出族子昉嘗往候嵩嵩語昉曰邇來朝廷于我有何議昉曰無他聞惟陶給事往往于稠人中厚誣叔父嵩嘆曰穀自單州判官吾取為集賢校理不數年擢掌詔命吾何負于陶氏子哉及嵩遇禍昉嘗因公事詣穀穀問昉識李侍郎否昉斂衽應曰遠從叔耳穀曰李氏之禍穀出力焉昉聞之汗出舊五代史考異嵩與徐台符同學相善乾祐三年秋台符夢嵩謂曰豫之寃橫得請於帝矣及蘇史之誅並梟首於市當嵩所誅之地未幾葛延遇李澄亦以戮死永樂大典卷一萬三百九十案宋史李昉傳晉侍中嵩與昉同宗且同里時人謂嵩為東李家昉為西李漢末嵩被誅至宋其子璨自蘇州常熟縣令赴調昉為訟其父寃且言周太祖已為昭雪贈官還其田宅録璨而官之然璨幾五十尚淹州縣之職詔授璨著作佐郎後官至資善大夫舊五代史考異蘇逢吉長安人父悅逢吉母早喪而悅魚衆居旁無侍者性嗜酒雖所飲不多然漱醪終日他人供膳皆不稱旨俟逢吉庖炙方肯下筯悅初仕蜀官升朝列逢吉初學為文嘗代父染翰悅嘗為高祖從事甚見禮遇因從容薦逢吉曰老夫耄矣才器無取男逢吉粗學援毫性復恭恪如公不以犬之微願令事左右高祖召見以神精爽惠甚憐之有頃擢為賓佐凡有謀議立侍其側高祖素嚴毅及鎮太原位望崇重從事稀得謁見惟逢吉日侍左右兩使文簿堆案盈几左右不敢輒通逢吉置於懷袖俟其悅色則咨之多見其可高祖建號於太原逢吉自節度判官拜同平章事集賢殿大學士車駕至汴朝廷百司庶務逢吉以為己任參決處置並出胸臆雖有當有否而事無留滯會翰林學士李濤從容侍帝言及霸府二相官秩未崇逢吉旋加吏部尚書未幾轉左僕射監修國史從征杜重威於鄴下數乘醉抵辱周太祖及高祖大漸與楊邠史弘肇等臥內同受顧命李濤與逢吉論甥舅之契相得甚歡濤之入相逢吉甚有力焉會濤上章請出兩樞密為方鎮帝怒罷濤相勒歸私第時論疑濤承逢吉之風旨先是高祖踐祚之後逢吉與蘇禹圭俱在中書有所除拜多違舊制用捨升降率意任情至有自白丁而升宦路由流外而除令録者不可勝數物論紛然高祖方倚信二相莫敢言者逢吉尤貪財貨無所顧避求進之士稍有物力者即遣人微露風旨許以美秩及楊邠為相稍奪二蘇之權自是盡斂手而已邠每懲二蘇之失艱於除拜至於諸司補吏與門胄出身一切停罷時論以邠之蔽固亦由逢吉禹圭本不能至公於物之所致也初高祖至汴以故相馮道李嵩為契丹所俘佇於真定乃以嵩第賜逢吉道第賜禹圭嵩於西洛有別業亦為逢吉所有及真定逐契丹嵩道歸朝嵩弟嶼以逢吉占據其第時出怨言未幾嵩以西京宅券獻於逢吉不悅會嵩有僕夫欲誣告謀反逢吉誘致其狀即告史弘肇令逮捕其家逢吉遣直省吏召嵩至第即令監至侍衛獄翌日所司以獄辭上其李嶼款招云與兄嵩弟與家僮二十人商議比至山陵發引之時同放火謀亂其告是實蓋自誣之辭也逢吉仍以筆添注二十人字為五十人封下有司盡誅嵩家時人寃之歸咎於逢吉逢吉深文好殺從高祖在太原時嘗因事高祖命逢吉靜獄以祈福祐逢吉盡殺禁囚以報及執朝政尤愛刑戮朝廷患諸處盜賊遣使捕逐逢吉自草詔意云應有賊盜其本家及四鄰同保人並仰所在全族處斬或謂逢吉曰為盜者族誅猶非王法鄰保同罪不亦甚乎逢吉堅以為是竟去全族二字時有鄆州捕賊使臣張令柔盡殺平陰縣十七村民平陰原本作手除今從通鑑改正影庫本粘籤良由此也逢吉性侈靡好鮮衣美食中書公膳鄙而不食私庖供饌務盡甘珍嘗於私第大張酒樂以召權貴所費千餘緡其妻武氏卒葬送甚盛班行官及外州節制有與逢吉相款洽者皆令齎送綾羅絹帛以備縞素失禮違度一至如此又性不拘名教繼母死不行服妻死未周其子並授官秩有庶兄自外至不白逢吉便見諸子逢吉怒且懼他日凌弱其子息乃密白高祖誣以他事杖殺之乾祐二年秋加守司空周太祖之將鎮鄴也逢吉奏請落樞密使隱帝曰有前例否逢吉奏白樞密之任方鎮帶之非便史弘肇曰兼帶樞密所冀諸軍稟畏竟從弘肇之議弘肇怨逢吉之異己逢吉曰此國家之事也且以內制外則順以外制內豈得便耶事雖不從物議多之居無何王章張飲會逢吉與史弘肇有謔言大為弘肇所詬逢吉不校幾至毆擊逢吉馳馬而歸自是將相失歡逢吉欲希外任以紓弘肇之怒既而中輟人問其故逢吉曰苟領一方鎮祇消得史公一處分處分原本作虛分考通鑑云逢吉欲求外鎮以避之既而中止曰吾去朝廷止煩史公一處公吾齏粉矣今改正影庫本粘籤則為齏粉矣李業輩惡弘肇楊邠等逢吉知之每見業等即微以言激怒之及弘肇等被害逢吉不預其謀聞變驚駭即受宣徽權知樞密院事尋令草制正授制入聞鄴兵至澶州乃止事急逢吉謂人曰蕭牆之變太覺匆遽主上若有一言見問必不至是矣數夕宿於金祥殿之東謂天官正王處訥曰夜來就枕未瞑已見李嵩在傍生人與死人相接無吉事也及周太祖自鄴至汴官軍敗於劉子陂是夕逢吉宿於七里郊與同舍痛飲醉將自刎左右止之至曙與隱帝同抵民舍遂自殺周太祖定京城與聶文進等同梟於北市釋其家族其梟首之所適當李嵩寃死之地廣順初詔就西京賜其子莊宅各一區永樂大典卷二千三百九十二五代史補高祖在河東幕府闕書記朝廷除前進士丘廷敏為之以高祖有異志恐為所纍辭疾不赴遂改蘇逢吉未幾契丹南侵高祖仗順而起兵不血刃而天下定逢吉以佐命功自掌書記拜中書侍郎平章事逾年廷敏始選授鳳翔麟遊縣令過堂之日逢吉戲之且撫所坐椅子曰合是長官坐何故讓與鄙夫耶廷敏遂慚悚而退李鏻唐宗屬也父洎韶州刺史伯父湯咸通中為給事中懿宗除乳母楚國夫人壻為夏州刺史湯封還制書詔曰朕少失所親若非楚國夫人鞠養則無朕此身雖非朝典望卿放下仍今後不得援以為例湯乃奉詔其諒直如此鏻少舉進士纍舉不第客遊河朔稱清海軍掌書記謁定州王處直不見禮鏻即脫緑被緋入常山謁要人李弘規以宗姓請兄事之由是得進案歐陽史云鏻為人利口敢言趙王鎔辟為從事鎔卒復為王德明賓客德明使鏻聘於唐莊宗鏻密疏德明之罪且言可圖之狀莊宗嘉之及常山平以鏻為霸府支使嘗從容請於莊宗曰鏻有四子請誅之莊宗問其故對曰此輩生於常山稟勃亂之氣不可留也莊宗笑而止同光初授宗正卿俄兼工部侍郎常山有唐啓運陵鏻受富民李守恭賂署為陵臺令守恭暴橫為長吏所訴按之以聞鏻左授司農少卿削金紫未幾出為河府副使明宗即位歷兵部戶部侍郎工部戶部尚書長興中以與明宗有舊常貯入相之意從容謂時相曰唐祚中興宜敦宗室才高者合居相位僕雖不才曾事莊宗霸府見今上於藩邸時家代重侯纍相靖安李氏不在諸侯之下論才較藝何讓衆人久置僕於朝行諸君安乎馮道趙鳳每怒其僭有頃鏻因淮南細人言事乃謂樞密使安重誨曰偽吳欲歸國久矣若朝廷先遣使諭之則旋踵而至矣重誨然之以玉帶與細人令往淮南為信久而不反由是出鏻為兗州行軍司馬得代歸闕復為戶部尚書尋轉兵部尚書有頃兼判太常卿事嘗權典選部銓綜失序物論非之晉天福中守太子少保開運中遷太子太保高祖至闕授守司徒數月而卒年八十八詔贈太傅永樂大典卷一萬三百九十龍敏字欲訥欲訥原本作欲誨今從太平御覽改正影庫本粘籤幽州永清人少學為儒仕鄉里為假掾劉守光不道敏避地浮陽會戴思遠渡河而南乃從之鄉人周知裕仕梁為裨將敏往依焉知裕屢薦不調敏丐遊都邑纍年唐莊宗定魏博敏聞故人馮道為霸府記室乃客于河中歲歸太原館於馮道之家監軍使張承業即署敏為巡官典監軍奏記莊宗平河洛徵為司門員外郎以家貧乏養求為興唐少尹踰年丁母喪退居鄴下會趙在禮據鄴城以敏鄉人強起令署事又為亂軍所迫敏不敢拒明年在禮鎮浮陽敏復居喪制服闋除戶部郎中改諫議大夫御史中丞時敏父咸式年七十咸式之父年九十餘供養二尊朝夕無懈咸式以敏貴得祕書監致仕敏為兵部侍郎奉使幽州鄉里耆舊留宴盡歡馮贇為北京留守奏敏為副贇入掌樞機敏為吏部侍郎敏學術不甚長炙外柔而內剛愛決斷大計清泰末從唐末帝在懷州時趙德鈞父子有異圖晉安寨旦夕憂陷末帝計無從出問計於從臣敏奏曰臣有一計請以援兵從東丹王李贊華取幽州路趨西樓契丹主必有北顧之患末帝然之而不能用敏又謂末帝親將李懿案通鑑作前鄭州防禦使李懿舊五代史考異曰君連姻帝戚社稷之危不俟翹足安得默默苟全耶懿因籌德鈞必破蕃軍之狀敏曰僕燕人也諳趙德鈞之為人膽小謀拙所長者守城寨嬰壕塹篤勵健兒耳若見大敵奮不顧身摧堅陷陳必不能矣況名位震主姦以謀身乎僕有狂策不知濟否苟能必行亦救寨之一術也懿請言之曰如聞駕前馬僅有五千匹請於其間選擇壯馬精甲健夫千人僕願得與郎萬金二人案通鑑云郎萬金為陳州刺史胡三省云萬金當時勇將也舊五代史考異由介休介休原本脫介字今據通鑑增入影庫本粘籤路出山夜冒敵騎循山入大寨千騎之內得其半濟則寨無虞矣張敬達等幽閉不知朝廷援兵近遠若知大軍在團柏谷中有鐵障亦可衝踏況敵騎乎末帝聞之曰龍敏之心極壯用之晚矣人亦以為大言然其慷慨感激皆此類也晉祖受命敏以本官判戶部遷尚書左丞丁父憂服闋復本官遷太常卿開運中奏命使越先是朝臣將命必拜起於浙帥敏至抗揖而已識者多之使還改工部尚書案歐陽史作遷工部侍郎舊五代史考異乾祐元年春疽發於背聞高祖晏駕乃扶病於私第縞素而臨後旬日卒於家時年六十三隱帝嗣位詔贈右僕射永樂大典卷五百三十二劉鼎字公度徐州蕭縣人祖泰蕭縣令父崇梁太祖微時常傭力崇家及即位召崇用之歷殿中監商州刺史崇之母撫梁祖有恩梁氏號為國婆徐宋之民謂崇家為豢龍劉家鼎起家為大理評事歷尚書博士殿中侍御史起居郎清泰中自吏部員外郎出為渾州廉判入為刑部郎中充鹽鐵判官改吏部郎中兼侍御史知雜事乾祐初拜諫議大夫卒年五十五鼎善交遊能談笑居家仁孝事繼母趙氏甚謹異母昆仲凡七人撫之如一性若寬易而典選曹按吏有風稜人稱為能子衮登進士第文彩遒雋仕周為左拾遺直史館早卒永樂大典卷九千九十九張允鎮州束鹿人父徵允幼學為儒仕本州為參軍張文禮之據州叛莊宗致討允隨文禮子處瑾請降於鄴不許與處瑾並繫於獄處瑾原本作處謹今從歐陽史改正影庫本粘籤鎮冀平宥之留於鄴署本府功曹趙在禮嬰城叛署節度推官從歷滄兗二鎮書記入為監察御史歷右補闕起居舍人充弘文館直學士水部員外郎知制誥清泰初皇子重美為河南尹典六軍諸衛事時朝廷選擇參佐以允剛介改給事中充六軍判官尋罷職轉左散騎常侍晉天福初允以國朝頻有肆赦乃進駮赦論曰管子云凡赦者小利而大害久而不勝其禍無赦者小害而大利久而不勝其福又漢紀云吳漢疾篤帝問所欲言對曰唯願陛下無為赦耳如是者何蓋行赦不以為恩不行赦亦不以為無恩為罰有罪故也竊觀自古帝王皆以水旱則降德音而宥過開狴牢以放囚冀感天心以救其災者非也假有二人訟一有罪一無罪若有罪者見捨則無罪者銜寃銜寃者彼何疏見捨者此何親乎如此則是致災之道非救災之術也自此小民遇天災則喜皆相勸為惡曰國家好行赦必赦我以救災如此即是國家教民為惡也且天道福善禍淫若以捨為惡之人而便變災為福則又是天助其惡民也細而究之必不然矣儻或天降之災蓋欲警誡人主節嗜欲務勤儉恤魚衆寡正刑罰不濫捨有罪不僭殺無辜使美化行於下聖德聞於上則雖有水旱亦不為沴矣豈以濫捨有罪而反能救其災乎彰其德乎是知赦之不可行也明哉帝覽而嘉之降詔奬飾仍付史館五年遷禮部侍郎凡三典貢部改御史中丞轉兵部侍郎知制誥充翰林學士承旨契丹入京城落職守本官案東都事略劉溫叟傳契丹入京師溫叟懼隨契丹北徙與承旨張允求去職契丹主怒欲黜為縣令趙延壽曰學士不稱職而求解者罷之可也得不黜乾祐初授吏部侍郎自誅史弘肇後京城士庶連甍恐悚允每朝退即宿於相國寺僧舍及北軍入京師允匿於佛殿藻井之上墜屋而卒時年六十五子鸞仕皇朝為太常少卿永樂大典卷六千三百五十一任延皓並州人也業術數風雲之事晉高祖在太原重圍時高祖最為親要延皓以本業請見高祖甚加禮遇晉天福初延皓授太原掾尋改交城文水令皆高祖慰薦之力也高祖鎮太原延皓多言外事出入無間高祖左右皆憚之在文水聚斂財賄民欲陳訴延皓知之一日先誣告縣吏結集百姓欲劫縣庫高祖怒遣騎軍併擒縣民十數族誅之寃枉之聲聞於行路高祖即位纍官至殿中監恃寵使氣人望而畏之雖宰輔之重延皓視之蔑如也劉崇在河東常日切齒及魏王承訓薨歸葬太原令延皓擇葬地時有山岡僧謂劉崇曰魏王葬地不吉恐有重喪未幾高祖崩崇以僧言奏之乃配流延皓於麟州路由文水市民擲瓦毆罵甚衆吏人救之僅免既至貶所劉崇令人殺之籍沒其家永樂大典卷九千三百五十一史臣曰李嵩仕唐晉之兩朝聳伊臯之重望考其器業無忝台衡會多僻之朝被參夷之戮人之不幸天亦難忱逢吉秉蛇虺之心竊夔龍之位殺人不忌與國俱亡李嵩之寃血未銷逢吉之梟首斯至冥報之事安可忽諸自李鏻而下凡數君子者皆踐履朝行彰施帝載國華邦直斯焉在哉惟延皓之醜行宜乎不得其死矣永樂大典卷九千三百五十一
