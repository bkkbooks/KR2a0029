body:
  text: 舊五代史卷四十三唐書十九明宗紀第九長興三年春正月癸未朔帝御明堂殿受朝賀仗衛如式丁亥陝州節度使安從進移鎮延州延州原本作逮州今據通鑑改正影庫本粘籤己丑遣邠州節度使藥彥稠案歐陽史作靜難軍舊五代史考異靈武節度使康福率步騎七千往方渠討黨項之叛者庚寅以前北京副留守呂夢奇為戶部侍郎辛卯以前彰國軍留後孫漢韶為利州節度使充西面行營副部署兼步軍都指揮使庚子契丹遣使朝貢辛丑秦王從榮加開府儀同三司兼中書令戊申詔選人文解不合式樣罪在發解官吏舉人落第次年免取文解中書門下奏請親王官至兼侍中中書令則與見任宰臣分班定位宰臣居左諸親王居右如親王及諸使守侍中中書令亦分行居右其餘使相依舊從之渤海回鶻吐蕃遣使朝貢大理正張居琭上言所頒諸州新定格式律令請委逐處各差法直官一人專掌檢討從之二月乙卯制晉國夫人夏氏追册為皇后丙辰幸龍門詔故皇城使李從璨可贈太保詔出選門官罷任後周年方許擬議自於所司投狀磨勘送中書又詔罷城南稻田務以其所費多而所收少欲復其水利資於民間碾磑故也秦州奏州界三縣之外別有一十一鎮人戶係鎮將徵科欲隨其便宜復置隴城天水二縣以隸之詔從之甲子幸至德宮以右衛大將軍高居貞為右監門衛上將軍庚午以前華州節度使李從昶為左驍衛大將軍以前夔州節度使安崇阮為右驍衛上將軍原本脫夔州二字今據册府元龜增入影庫本粘籤以前新州節度使翟璋為右領軍上將軍以右領軍上將軍羅周敬為右威衛上將軍辛未中書奏請依石經文字刻九經印板從之案五代會要長興三年二月中書門下奏請依石經文字刻九經印板敕令國子監集博士儒徒將西京石經本各以所業本經廣為抄寫仔細看讀然後雇召能雕字匠人各部隨帙刻印板廣頒天下如諸色人要寫經書並請依所印刻本不得更使雜本交錯蓋刻板之流行實始於此愛日齋叢鈔云通鑑載後唐長興三年二月辛未初令國子監校定九經雕印賣之又曰自唐末以來所在學校廢絶蜀毋昭裔出私財百萬營學館且請板刻九經蜀主從之由是蜀中文學復盛又曰唐明宗之世宰相馮道李愚請令判國子監田敏校定九經刻板印賣從之後周廣順三年六月丁巳板成獻之由是雖亂世九經傳布甚廣王仲言揮麈録云毋昭裔貧賤時嘗借文選于交遊間其人有難色發憤異日若貴當板以鏤之遺學者後仕王蜀為宰相遂踐其言刊之印行書籍創見于此事載陶嶽五代史補後唐平蜀明宗命太學博士李鍔書五經仿其製作刊板于國子監為監中刻書之始猗覺寮雜記云雕印文字唐以前無之唐末益州始有墨板後唐方鏤九經悉收人間所有經史以鏤板為正見兩朝國史此則印書已始自唐末矣案柳氏家訓序中和三年癸卯夏鑾輿在蜀之三年也余為中書舍人旬休閲書于重城之東南其書多陰陽雜記占夢相宅九宮五緯之流又有字書小學率雕板印紙浸染不可盡曉葉氏燕語正以此證刻書不始于馮道而沈存中又謂板印書籍唐人尚未盛行為之自馮瀛王始印五經自後典籍皆為板本大概唐末漸有印書特未盛行後人遂以為始于蜀也當五季亂離之際經籍方有託而流布于四方天之不絶斯文信矣舊五代史考異甲戌靈武奏都指揮使許審環等謀亂伏誅藥彥稠奏誅黨項阿埋等十族案歐陽史二月己卯靜難軍節度使藥彥稠及黨項戰于牛兒谷敗之據薛史則甲戌已奏捷非己卯也舊五代史考異與康福入白魚谷追襲叛黨獲大首領六人諸二千餘人孳畜數千及先劫掠到回鶻物貨詔彥稠軍士所獲並令自收勿得箕斂己卯以前河中節度使索自通為鄜州節度使懷化軍節度使李贊華進契丹地圖詔司天臺除密奏留中外應奏曆象雲物水旱及十曜細行諸州災祥宜並報史館以備編修壬午藥彥稠進回鶻可汗先送秦王金裝胡為黨項所掠至是得之以獻帝曰先詔所獲令軍士自收今何進也令彥稠却與獲者三月甲申契丹遣使朝貢靈武軍將裴昭隱等二人與進奏官阮順之隱官馬一匹有司論罪合抵法帝曰不可以一馬殺三人命笞而釋之丙申西京奏百姓侯可洪於楊廣城內掘得宿藏玉四團進納賜可洪二百緡絹二百匹庚子以前鄜州節度使孫璋卒廢朝癸卯帝顧謂宰臣曰春雨稍多久未晴霽何也馮道對曰水旱作沴雖是天之常道然季春行秋令臣之罪也更望陛下廣敷恩宥久雨無妨於聖政也丁未以神捷神威雄武廣捷已下指揮改為左右羽林軍置四十指揮每十指揮立為一軍軍置都指揮使一人庚戌帝觀稼於近郊民有父子三人同挽犂耕者帝閔之賜耕牛三頭高麗國遣使朝貢以右領軍上將軍翟璋為右羽林統軍以前安州留後周知裕為左神武統軍夏四月甲寅詔諸道節度使未帶使相及防禦團練使刺史班位居檢校官高者為上如檢校官同以先授者為上前資在見任之下新羅王金溥遣使貢方物戊午中書奏準敕重定三京諸道州府地望次第者舊制以王者所都之地為上今都洛陽請以河南道為上河南原本作河內今從五代會要改正影庫本粘籤關內道為第二河東道為第三餘依舊制其五府按十道圖以鳳翔為首河中成都江陵興元為次中興初升魏州為興唐府鎮州為真定府望升二府在五府之上合為七州餘依舊制又天下舊有八大都督府以靈州為首陝幽魏揚潞鎮徐為次其魏鎮已升為七府兼具員內相次升越杭福潭等州為都督望以十大都督府為額仍據升降次第以陝為首餘依舊制十道圖有大都護請以安東大都護為首防禦團練等使自來升降極多今具見在其員依新定十道圖以次第為定從之契丹纍遣使求歸則剌惕隱等幽州趙德鈞奏請不俞允帝顧問侍臣亦以為不可與帝意欲歸之會冀州刺史楊檀罷郡至闕帝問其事奏曰此輩來援王都謀危社禝陛下寬慈貸其生命茍若歸之必復向南放箭既知中國事情為患深矣帝然之既而只遣則骨舍利隨來使歸蕃不欲全拒其請也詔贈皇后曹氏曾祖父母已下為太傅太尉太師國夫人淑妃王氏曾祖父母已下為太子太保太傅太師國夫人壬戌前樞密使驃騎大將軍馬紹宏卒癸亥以懷化軍節度使李贊華為滑州節度使初帝欲以贊華為藩鎮范延光等奏以為不可帝曰吾與其先人約為兄弟故贊華來附吾老矣儻後世有守文之主則此輩招之亦不來矣由是近臣不能抗議甲子以太子賓客蕭蘧為戶部尚書致仕乙丑以天雄軍節度使宋王從厚兼中書令辛未以幽州節度使趙德鈞兼中書令五月壬午朔帝御文明殿受朝詔禁網羅彈射弋獵丁亥以二王後前詹事府司直楊延紹為右贊善大夫仍襲封酅國公食邑二千戶丁酉以太子太師致仕孔勍卒廢朝興元奏東西兩川各舉兵相持甲辰以文宣王四十三代孫曲阜縣主簿孔仁玉為兗州龔邱令襲文宣公戊申襄州奏漢江大漲水入州城壞民廬舍樞密使奏近知兩川交惡如令一賊兼有兩川撫衆守險恐難討除欲令王思同以興元之師伺便進取詔從之六月壬子朔幽州趙德鈞奏新開東南河自王馬口至淤口長一百六十五里闊六十五步深一丈二尺以通漕運舟勝千石畫圖以獻甲寅以權知高麗國事王建為檢校太保封高麗國王丁巳衛州奏河水壞堤東北流入御河戊午荊南奏東川董璋領兵至漢州西川孟知祥出兵逆戰璋大敗案通鑑孟知祥克東川在五月五代春秋歐陽史俱作六月蓋以薛史奏聞之日為據舊五代史考異得部下人二十餘走入東川城尋為前陵州刺史王暉所殺孟知祥已入梓州辛酉范延光奏曰孟知祥兼有兩川彼之軍衆皆我之將士料其外假朝廷形勢以制之然陛下苟不能屈意招攜彼亦無由革面帝曰知祥豫故人也以賊臣間諜故茲阻隔今因而撫之何屈意之有由是遣供奉官李瓌案通鑑作李存瓌唐人避莊宗諱故去存字舊五代史考異使西川齎詔以賜知祥詔以霖雨積旬久未晴霽京城諸司繫囚並宜釋放甲子以大雨未止放朝參兩日洛水漲泛二丈廬舍居民有溺死者以前濮州刺史武延翰為右領軍上將軍前階州刺史王宏贄為左千牛上將軍金徐安穎等州大水鎮州旱詔應水旱州郡各遣使人存問秋七月辛巳朔以天下兵馬元帥尚父吳越國王錢鏐薨廢朝三日案五代春秋七月吳越王錢鏐薨蓋祇以薛史廢朝之日為據也通鑑作三月庚戌與九國志異舊五代史考異丙戌詔賜諸軍救接錢有差案救接錢疑有舛誤考册府元龜亦作救接今仍其舊舊五代史考異戊子正衙命使册高麗國王王建靈武奏夏州界黨項七百騎侵擾當道出師擊破之生擒五十騎追至賀蘭山下賀蘭原本作駕蘭今從歐陽史改正影庫本粘籤己丑兩浙節度使錢元瓘起復加守尚書令青州節度使王晏球加兼中書令秦鳳兗宋亳潁鄧大水漂邑屋損苗稼夔州赤甲山崩壬辰以前太僕卿鄭繢為源臚卿以前兗州行軍司馬李鏻為戶部尚書乙未福建節度使王延鈞進絹表云吳越王錢鏐薨乞封臣為吳越王湖南馬殷官是尚書令殷薨請授臣尚書令不報戊戌太子賓客李光憲以禮部尚書致仕己亥以前靈武節度使康福為涇州度使幽州衙將潘杲上言知故使劉仁恭於大安山藏錢之所樞密院差人監往發之竟無所得以皇子西京留守京兆尹從珂為鳳翔節度使廢鳳州武興軍節制為防禦使並所管興文二州並依舊隸興元府丁未以門下侍郎兼吏部尚書同平章事監修國史趙鳳為檢校太傅同平章事充邢州節度使詔諸州府遭水人戶各支借麥種及等第賑貸八月辛亥青州節度使王晏球卒廢朝二日以利州節度使孫漢韶兼西面行營招討使甲寅以前振武節度使張萬進為鄧州節度使己未以鄆州節度使房知溫兼中書令移鎮青州丙寅以宰臣李愚為門下侍郎平章事監修國史乙亥以湖南節度使馬希聲卒廢朝案通鑑馬希聲卒在七月辛卯五代春秋從薛史作八月舊五代史考異己卯吐蕃遣使朝貢九月壬午以鎮南軍節度使檢校太傅馬希範為湖南節度使檢校太尉兼侍中甲申荊南節度使檢校太傅兼中書令高從誨加檢校太尉兼中書令壬辰供奉官李瓌自西川回節度使孟知祥附表陳隔絶之由並進物先賜金器等瓌知祥甥也母在蜀故令瓌往焉瓌至蜀具述朝廷厚待之意知祥稱藩如初奏福慶長公主以今年正月十二日薨又奏五月三日大破東川董璋之衆於漢州收下東川又表立功將校趙季良等五人乞授節鉞部內刺史令録已下官乞許墨制補授帝遣閣門使劉政恩充西川宣諭使乙巳契丹遣使自幽州進馬秦州地震冬十月己酉朔再遣供奉官李瓌使西川兼押賜故福慶長公主祭贈絹三千匹並賜知祥玉帶先是兩川隔遠朝廷兵士不下三萬人至是知祥上表乞發遣兵士家屬入川詔報不允知祥所奏兩川部內文武將吏乞許權行墨制除補訖奏詔許之知祥所奏立功大將趙季良等五人正授節鉞續有處分襄州奏漢水溢壞民廬舍癸丑以太常卿劉嶽卒廢朝己未以兵部侍郎張文寶為吏部侍郎以戶部侍郎藥縱之為兵部侍郎庚申幸至德宮因幸石敬瑭李從昶李從敏之第壬申大理少卿康澄上疏曰臣聞安危得失治亂興亡誠不繫於天時固非由於地利童謠非禍福之本妖祥豈隆替之源故雊雉升鼎而桑穀生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長是知國家有不足懼者五有深可畏者六陰陽不調不足懼三辰失行不足懼小人訛言不足懼山崩川涸不足懼蟊賊傷稼不足懼此不足懼者五也賢人藏匿深可畏四民遷業深可畏上下相徇深可畏廉恥道消深可畏毀譽亂真深可畏直言蔑聞深可畏此深可畏者六也伏惟陛下尊臨萬國奄有八紘蕩三季之澆風振百王之舊典設四科而羅俊彥提二柄而御英雄所以不軌不物之徒咸思革面無禮無儀之輩相率悛心然而不足懼者願陛下存而勿論深可畏者願陛下修而靡忒加以崇三綱五常之教敷六府三事之歌則鴻基與五嶽爭高盛業共磐石永固優詔奬之澄言可畏六事實中當時之病識者許之癸酉湖南馬希範荊南高從誨並進銀及茶乞賜戰馬帝還其直各賜馬有差丁丑帝謂范延光曰如聞禁軍戍守多不稟藩臣之命緩急如何驅使延光曰承前禁軍出戍便令逐處守臣管轄斷決近似簡易帝曰速以宣命條舉之十一月辛巳以三司使左武衛大將軍孟鵠為許州節度使以前許州節度使馮贇為宣徽使判三司以宣徽北院使孟漢瓊判院事壬午史館奏宣宗已下四廟未有實録請下兩浙荊湖購募野史及除目報狀除目原本作際自今據五代會要改正影庫本粘籤從之案五代會要載十一月四日史館奏當館昨為大中以來迄于天祐四朝實録尚未纂修尋具奏聞謹行購募敕命雖頒于數月圖書未貢于一編蓋以北土州城久罹兵火遂成滅絶難可訪求切恐歲月漸深耳目不接長為闕典過在攸司伏念江表列藩湖南奧壤至于閩越方屬勳賢戈鋌自擾于中原屏翰悉全于外府固多奇士富有羣書其兩浙福建湖廣伏乞詔旨委各于本道采訪宣宗懿宗僖宗昭宗以上四朝野史及逐朝日歷銀臺事宜內外制詞百司沿革簿籍不限卷數據有者抄録上進若民間收得或隱士撰成即令各列姓名請議爵賞舊五代史考異癸未以左僕射致仕鄭王玉卒廢朝丁亥以河陽節度使兼六軍諸衛副使石敬瑭為河東節度使兼大同彰國振武威塞等軍蕃漢馬步總管時契丹帳族在雲州境上與羣臣議擇威望大臣以制北方故有是命己丑樞密使趙延壽加同平章事詔在京臣僚不得進奉賀長至馬及諸物甲午日南至帝御文明殿受朝賀己亥河中節度使李從璋加檢校太傅以右散騎常侍楊凝式為工部侍郎庚子以祕書監盧文紀為工部尚書以工部尚書崔居儉為太常卿以工部侍郎鄭韜光為禮部侍郎乙巳雲州奏契丹主在黑榆林南捺剌泊造攻城之具帝遣使賜契丹主銀器綵帛十二月戊申朔供奉官丁延徽倉官田繼勳並棄市坐擅出倉粟數百斛故也教坊伶官敬新磨受賄為人告帝令御史臺徵還其錢而後撻之癸丑幸龍門觀修伊水石堰賜丁夫酒食後數日有司奏丁夫役限十五日已滿工未畢請更役五日帝曰不唯時寒且不可失信於小民即止其役甲寅以太子賓客歸藹卒廢朝戊午以前宣徽使朱弘昭為襄州節度使康義誠為河陽節度使充侍衛親軍馬步軍都指揮使壬戌以吏部侍郎姚顗為尚書左丞以尚書左丞王權為禮部尚書以兵部侍郎藥縱之為吏部侍郎以翰林學士中書舍人程遜為戶部侍郎依前充職戊辰帝畋於近郊射中奔鹿是冬無雪永樂大典卷七千一百六十六
