body:
  text: 舊五代史卷四十五唐書二十一閔帝紀閔帝諱從厚小字菩薩奴明宗第三子也案歐陽史作明宗第五子吳縝嘗辨其誤今考五代會要亦作第三子與薛史同母昭懿皇后夏氏以天祐十一年歲在甲戌十一月二十八日庚申生帝於晉陽舊第帝髫齔好讀春秋略通大義貌類明宗尤鍾愛天成元年授金紫光祿大夫檢校司徒二年四月加檢校太保同平章事河南尹判六軍諸衛事十一月加檢校太傅三年三月授汴州節度使四年移鎮河東長興元年改授鎮州節度使尋封宋王二年加檢校太尉兼侍中移鎮鄴都三年加中書令秦王從榮帝同母兄也以帝有德望深所猜忌帝在鄴宮憂其禍然善於承順竟免閒隙閒隙原本作聞隲今據文改正影庫本粘籤四年十一月二十日秦王誅翌日明宗遣宣徽使孟漢瓊馳驛召帝二十六日明宗崩二十九日帝至自鄴案歐陽史云明宗崩祕其喪六日考長興四年十一月癸酉朔二十日壬辰誅從榮二十六日戊戌明宗崩二十九日辛丑閔帝已至自鄴矣不得云祕喪六日也舊五代史考異十二月癸卯朔案五代春秋作癸亥朔蓋傳寫之訛歐陽史通鑑俱從薛史作癸卯舊五代史考異發喪於西宮帝於柩前即位丁未羣臣上表請聽政表再上詔允己酉中外將士給賜有差庚戌帝縗服見羣臣於廣壽門之東廡下宰臣馮道進曰陛下久居哀毀臣等咸願一覩聖顏朱弘昭前舉帽羣臣再拜而退御光政樓存問軍民辛亥賜司衣王氏死坐秦王事也癸丑以前鎮州節度使涇王從敏權知河南府事尋以盧質代之乙卯賜司儀康氏死事連王氏也丙辰以天雄軍節度判官唐汭為諫議大夫掌書記趙彖為起居郎元從都押衙宋令詢為磁州刺史丁巳以左僕射平章事馮道為山陵使戶部尚書韓彥惲為副中書舍人王延為判官禮部尚書王權為禮儀使兵部尚書李鏻為鹵簿使御史中丞龍敏為儀仗使右僕射權知河南府盧質為橋道頓遞使庚申以前相州刺史郝瓊為右驍衛大將軍充宣徽北院使以光祿卿充三司副使王玫為三司使癸亥故檢校太尉右衛上將軍充三司使孫嶽贈太尉齊國公孫嶽原本作孜兵今據通鑑改正影庫本粘籤丁卯帝釋縗服羣臣三上表請復常膳御正殿從之辛未帝御中興殿羣臣列位馮道升階進酒帝曰比於此物無愛除賓友之會不近樽斝況在痛之中安事飲啖命徹之應順元年春正月壬申朔壬申原本作甲申據下文有乙亥丁丑等日甲字當係壬字之訛今改正影庫本粘籤帝御廣壽殿視朝百僚詣閣門奉慰時議者云月首以朝服臨不視朝可也乙亥契丹遣使朝貢案遼史太宗紀天顯九年閏月戊午唐遣使來告哀即日遣使祭弔舊五代史考異丁丑以太常卿崔居儉為祕書監以前蔡州刺史張繼祚為左武衛上將軍充山陵橋道頓遞副使戊寅御明堂殿仗衛如儀宮懸樂作羣臣朝服就位宣制大赦天下改長興五年為應順元年時議者以梓宮在殯宮懸樂作非禮也懸而不作可也回鶻可汗仁美遣使貢方物故可汗仁裕進遺留馬是日命中使三十五人以先帝鞍馬衣帶分賜藩位庚辰宰臣馮道加司空李愚加右僕射劉昫加吏部尚書餘並如故壬午侍衛親軍馬步軍都指揮使河陽節度使康義誠加檢校太尉兼侍中判六軍諸衛事康義誠原本作節誠今據通鑑改正影庫本粘籤甲申以侍衛馬軍都指揮使寧國軍節度使安彥威為河中節度使以侍衛步軍都指揮使忠正軍節度使張從賓為涇州節度使並加檢校太傅以捧聖左右廂都指揮使欽州刺史朱洪實為寧國軍節度使加檢校太保充侍衛馬軍都指揮使以嚴衛左右廂都指揮使巖州刺史皇甫遇為忠正軍節度使檢校太保充侍衛步軍都指揮使戊子樞密使檢校太尉同平章事朱弘昭樞密使檢校太尉同中書門下二品馮贇並加兼中書令北京留守河東節度使兼大同彰國振武威塞等軍蕃漢馬步總管石敬瑭加兼中書令幽州節度使檢校太尉兼中書令趙德鈞加檢校太師兼中書令樞密使馮贇表堅讓中書令制改兼侍中封邠國公庚寅鳳翔節度使潞王從珂加兼侍中青州節度使檢校太尉兼中書令房知溫加檢校太師辛卯以翰林學士承旨尚書右丞李懌為工部尚書以祕書監盧文紀為太常卿充山陵禮儀使壬辰荊南節度使檢校太尉兼中書令高從誨封南平王南平原本作面平今據十國春秋改正影庫本粘籤湖南節度使檢校太尉兼中書令馬希範封楚王甲午兩浙節度使檢校太師守中書令吳王錢元瓘進封吳越王前洺州團練使皇甫立加檢校太保充鄜州節度使前彰義軍節度使康福加檢校太傅充邠州節度使劍南東西兩川節度使檢校太尉兼中書令蜀王孟知祥加檢校太師制下知祥辭不受命丙申鎮州節度使檢校太尉兼侍中范延光汴州節度使檢校太尉兼侍中趙延壽並加檢校太師戊戌山南西道節度使檢校太傅同平章事張虔釗襄州節度使趙在禮並加檢校太尉辛丑以振武軍節度使安北都護楊檀兼大同彰國振武威塞等軍都虞候充北面馬軍都指揮使閏月壬寅朔羣臣赴西宮臨癸卯御文明殿入閣以前右僕射權知河南府事盧質為太子少傅兼河南尹以諫議大夫唐汭膳部郎中知制誥陳乂並為給事中充樞密院直學士案通鑑汭以文學從帝歷三鎮在幕府及即位將佐之有才者朱馮皆斥逐之汭性迂疏朱馮恐帝含怒有時而發乃引汭于密近以其黨陳乂監之舊五代史考異宣徽南院使驃騎大將軍左衛上將軍知內侍省孟漢瓊加開府儀同三司賜忠貞扶運保泰功臣保泰原本作衛泰今據冊府元龜改正影庫本粘籤丙午正衙命使冊皇太后曹氏戊申以前雄武軍節度使劉仲殷為右衛上將軍邢州節度使趙鳳加爵邑自是諸藩鎮文武臣僚皆次第加恩帝嗣位覃恩澤也以翰林學士中書舍人崔梲為工部侍郎依前充職以給事中張鵬為御史中丞以御史中丞龍敏為兵部侍郎以太僕少卿竇維為大理卿甲寅正衙命使冊皇太妃王氏集賢院上言準敕書修創凌煙閣尋奉詔問閣高下等級謹按凌煙閣都長安時在西內三清殿側畫像皆北面閣有中隔隔內面北寫功高宰輔隔內面原本作內回今據五代會要改正影庫本粘籤南面寫功高諸侯王隔外面次第圖畫功臣題贊自西京板蕩四十餘年舊日主掌官吏及畫像工人並已淪喪集賢院所管寫真官畫真官人數不少都洛後廢職今將起閣望先定佐命功臣人數請下翰林院預令寫真本及下將作監興功次序間架修建乃詔集賢御書院復置寫真官畫真官各一員餘依所奏丁巳安州奏此月七日夜節度使符彥超為部曲王希全所害案彥超被害通鑑從薛史作閏月五代春秋繫于正月殊異舊五代史考異廢朝一日戊午以前振武軍節度使安北都護高行周為彰武節度使辛酉以前鄆州使范政為少府監丙寅幸至德宮車駕至興教門有飛鳶自空而墜殭於御前是日大風晦冥二月乙亥以前鎮州節度使涇王從敏為宋州節度使從敏原本作使敏今從歐陽史家人傳改正影庫本粘籤己卯以前徐州節度使檢校太傅李敬周為安州節度使是日宣授鳳翔節度使潞王從珂為權北京留守以北京留守石敬瑭權知鎮州軍州事以鎮州范延光權知鄴都留守事以前河中節度使洋王從璋權知鳳翔軍軍府事庚寅幸山陵工作所是日西京留守王思同奏鳳翔節度使潞王從珂拒命丁酉王思同加同平章事充西面行營都部署以前邠州節度使藥彥稠為副部署案歐陽史辛卯西京留守王思同為西面行營都部署靜難軍節度使藥彥稠為副薛史作丁酉與歐陽史異據通鑑則思同以辛卯充都部署丁酉加同平章事也蓋采薛史歐陽史而兼用之舊五代史考異以河中節度使安彥威為西面兵馬都監以前定州節度使李德珫為權北京留守山陵使奏伏覩御札皇帝親奉靈駕至園陵伏見纍朝故事人君無親送葬之儀請車駕不行不從乙未樞密使馮贇起復視事時贇丁母憂也己亥以司農卿張鎛為殿中監庚子殿直楚匡祚上言案原本避宋諱作楚祚今從通鑑增匡字監取亳州團練使李重吉至宋州繫於軍院重吉潞王之長子及幽於宋州帝猶以金帛賜之及聞西師咸叛方遣使殺之三月甲辰以前太僕少卿魏仁鍔為太僕卿興元節度使張虔釗奏會合討鳳翔丙午以右領衛上將軍武延翰為郢州刺史丁未洋州孫漢韶奏至興元與張虔釗同議進軍己酉以鎮州節度使范延光依前檢校太師兼侍中行興唐尹充天雄軍節度使北面水陸轉運制置使以北京留守河東節度使石敬瑭依前檢校太尉兼中書令其真定尹充鎮州節度使大同彰國振武威塞等軍蕃漢馬步總管如故辛亥以前定州節度使李德珫為北京留守充河東節度使許王從益加檢校太保前河中節度使洋王從璋加檢校太傅詔藩侯帶平章事以上薨許立神道碑差官撰文未帶平章事及刺史準令式合立碑者其文任自製撰不在奏聞乙卯興元張虔釗奏自鎮將兵赴鳳翔收大散關大散原本作大役今據通鑑改正影庫本粘籤宗正寺奏準故事諸陵有令丞各一員近例更委本縣令兼之緣河南洛陽是京邑兼令丞不便詔特置陵臺令丞各一員己未以前金吾大將軍李肅為左衛上將軍充山陵修奉上下宮都部署庚申西面步軍都監王景從等自軍前至奏今月十五日大軍進攻鳳翔十六日嚴衛右廂都指揮使尹暉引軍東面入城右羽林都指揮使楊思權引軍西面入城思權原本作世權今從歐陽史改正影庫本粘籤山南軍潰帝聞之謂康義誠等曰朕幼年嗣位委政大臣兄弟之間必無榛梗諸公大計見告朕獨難違事至於此何方轉禍朕當與左右自往鳳翔迎兄主社稷朕自歸藩於理為便朱弘昭馮贇不對義誠曰西師驚潰蓋由主將失策今駕下兵甲尚多臣請自往關西振其兵威扼其衝要義誠又纍奏請行帝召侍衛都將以下宣曰先皇帝棄萬國朕於兄弟之中無心爭立一旦被召主喪便委社稷岐陽兄長果致猜嫌卿等頃從先朝千征萬戰今日之事寧不痛心今據府庫悉以頒賜卿等勉之乃出銀絹錢厚賜於諸軍是時方事山陵復有此賜府藏為之一空軍士猶負賞物揚言于路曰到鳳翔更請一分其驕誕無畏如是辛酉幸左藏庫視給將士金帛是日誅馬軍都指揮使朱洪實坐與康義誠忿爭故也癸亥以康義誠為鳳翔行營都招討使餘如故以王思同為副招討使以安從進為順化軍節度使充侍衛馬軍都指揮使詔左右羽林軍四十指揮改為嚴衛左右龍武神武軍改為捧聖甲子陝州奏潞王至潼關害西面都部署王思同案歐陽史作思同奔歸于京師死之與薛史異舊五代史考異乙亥宣諭西面行營將士俟平鳳翔日人賞二百千府庫不足以宮闈服玩增給詔侍衛馬軍都指揮使安從進京城巡檢是日從進已得潞王書檄潛布腹心矣丁卯潞王至陝州戊辰帝急召孟漢瓊不至召朱弘昭弘昭懼投于井安從進尋殺馮贇于其第案通鑑考異云張昭閔帝實録帝召宏昭不至俄聞自殺乃令從進殺贇案從進傳贇首於陝則贇死非閔帝之命明矣孔本是夜帝以百騎出玄武門案契丹國志愍帝領五十騎自隨出奔衛州與薛史異案契丹國志愍帝領五十騎自隨出奔衛州宋史李洪信傳又作少帝東奔捧聖軍數百騎從行與是書異據下文王弘贄曰今以五十餘騎奔竄則作五十騎者是也殿本謂控鶴指揮使慕容遷曰爾誠有馬控鶴從豫控鶴從豫原本作縱鶴空子今從通鑑改正影庫本粘籤及駕出即闔門不行遷乃帝素親信者也臨危如是人皆惡之是月二十九日夜帝至衛州東七八里遇騎從自東來不避左右叱之乃曰鎮州節度使石敬瑭也案歐陽史愍帝紀戊辰如衛州廢帝紀己巳愍帝出居于衛州通鑑考異引閔帝實録云庚午朔四鼓帝至衛州東七八里遇敬瑭蓋是月二十九日為己巳故次日即為庚午朔舊五代史考異帝喜敬瑭拜舞於路帝下馬慟哭諭以潞王危社稷康義誠以下叛我無以自庇長公主見教逆爾於路謀社稷大計敬瑭曰衛州王弘贄宿舊諳事衛州原本作衡州今從通鑑改正影庫本粘籤且就弘贄圖之敬瑭即馳騎而前見弘贄曰主上播遷至此危迫吾戚屬也何以圖全弘贄曰天子避寇古亦有之然於奔迫之中亦有將相國寶法物所以軍長瞻奉不覺其亡也今宰執近臣從乎寶玉法物從乎詢之無有弘贄曰大樹將顛非一繩所維今以五十騎奔竄無將相一人擁從安能興復大計所謂蛟龍失雲雨者也今六軍將士總在潞邸矣公縱以戚藩念舊無奈之何案通鑑考異引南唐烈祖實録弘贄曰今京國阽危百官無主必相率攜神器西向公何不囚少帝西迎潞王此萬全之計敬瑭然其言舊五代史考異考薛史采五代實録多為晉帝諱言當以南唐實録為得其實孔本遂與弘贄同謁於驛亭宣坐謀之敬瑭以弘贄所陳以聞弓箭庫使沙守榮賁洪進前謂敬瑭曰主上即明宗愛子公即明宗愛壻富貴既同受休戚合共之今謀於戚藩欲期安復翻索從臣國寶欲以此為辭為賊算天子耶乃抽佩刀刺敬瑭敬瑭親將陳暉扞之陳暉原本作陳運今從歐陽史改正影庫本粘籤守榮與暉單戰而死洪進亦自刎是日敬瑭盡誅帝之從騎五十餘輩獨留帝於驛乃馳騎趨洛四月三日潞王入洛五日即位七日廢帝為鄂王遣弘贄子殿直王巒之衛州時弘贄已奉帝幸州廨九日巒至帝遇鴆而崩時年二十一案契丹國志王巒至衛州進鴆于愍帝愍帝不飲巒縊殺之與薛史異歐陽史同薛史是日辰時白虹貫日皇后孔氏在宮中及王巒回即日與其四子並遇害案遼史太宗紀云九年夏四月唐從珂殺其主自立人皇王倍上書請討又義宗列傳云明宗養子從珂弒其君自立倍密報太宗曰從珂弒君盍討之薛史及通鑑均不載孔本晉高祖即位諡曰閔與秦王及末帝子重吉並葬於徽陵域中封才數尺路人觀者悲之永樂大典卷七千一百七十四史臣曰閔帝爰自冲年素有令問及徵從代邸入踐堯階屬軒皇之弓劍初遺吳王之几杖未賜吳王原本作辰王今據前漢書改正影庫本粘籤遽生猜間遂至奔亡蓋輔臣無安國之謀非少主有不君之咎以至越在草莽失守宗祧斯蓋天命之難諶土德之將謝故也永樂大典卷七千一百七十四
