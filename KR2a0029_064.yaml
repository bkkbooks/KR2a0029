body:
  text: 舊五代史卷六十四唐書四十列傳第十六霍彥威字子重洺州曲周人也梁將霍存得之於村落間年十四從征討存憐其爽邁養為己子按通鑑注以彥威為霍存之子與薛史異存梁史有傳彥威未弱冠為梁祖所知擢在左右漸升戎秩亟立戰功嘗中流矢眇其一目開平二年自開封府押衙右親從指揮使檢校司空授右龍驤軍使三年自右監門衛將軍授左天武軍使遷右監門上將軍乾化三年與袁象先同誅朱友圭梁末帝授洺州刺史轉河陽留後乾化末邠州留後李保衡背李茂貞以城歸梁梁以彥威為邠州節度使其年五月茂貞遣將劉知俊率大軍攻之彥威固守踰年竟不能下或得其俘悉令放之秦人懷其惠遂無侵擾轉滑州節度使移鎮鄆州兼北面行營招討總大軍於河上師徒屢敗降授陝州留後莊宗入汴彥威自陝馳至請罪詔釋之一日莊宗於崇元殿宴諸將彥威與段凝袁象先等預會酒酣莊宗舉酒屬明宗曰此席宴客皆吾前歲之徑敵也一旦與吾同宴蓋卿前鋒之效也彥威等伏陛謝罪莊宗曰與卿話舊無足畏也因賜御衣器幣盡歡而罷尋放歸藩明年從明宗平潞州授徐州節度使契丹犯塞莊宗以明宗為北面招討使命彥威為副彥威善言論頗能接奉明宗尤重之趙太叛於邢州趙太原本作趙木今從歐陽史改正影庫本粘籤奉詔討平之時趙在禮據魏州與明宗會兵於鄴下大軍夕亂明宗為其所逼彥威從入魏州案歐陽史明宗擁兵入城彥威獨不入與薛史異舊五代史考異皇甫暉等尤忌彥威欲殺之彥威機辨開說竟免及出彥威部下兵士獨全衛護明宗至魏縣時明宗欲北趨常山彥威與安重誨懇請赴闕從至洛陽彥威首率卿相勸進於至德宮旬日之間內外機事皆決於彥威擅收段凝溫韜下獄將置於法安重誨曰溫段罪惡負於梁室衆所知矣今主上克平內艱冀安萬國豈為公報仇耶至天成初除鄆州節度使值青州王公儼拒命改平盧軍節度至鎮擒公儼斬之案歐陽史彥威徙鎮平盧朱守殷反伏誅考朱守殷反明宗遣范延光馳兵斬之非由彥威之力宜以薛史所載為得其實舊五代史考異明年冬肆覲於汴州明宗接遇甚厚纍官至檢校太尉兼中書令三年冬卒於理所年五十七奏至之日明宗方出近郊忽聞奏訃掩泣歸宮輟朝三日至月終不舉樂案五代會要天成四年六月敕故平盧軍節度使霍彥威勛名顯著宅兆已營爰遵定諡之規俾議送終之制宜以三公禮葬舊五代史考異冊贈太師晉國公諡曰忠武子承訓弟彥珂纍歷刺史皇朝乾德中立明宗廟於洛州詔以彥威配饗廟庭永樂大典卷一萬八千一百二十九王晏球字瑩之自言洛都人少遇亂為蔡賊所掠汴人杜氏畜之為子因冒姓杜氏晏球少沉勇有斷倜儻不羣梁祖之鎮汴也選富家子有材力者置之帳下號曰廳子都案清異録宣武廳子都尤勇悍其弩張一大機則十二小機皆發用連珠大箭無遠不及晉人極畏此舊五代史考異廳子都原本作聽于都今從通鑑注所引薛史改正影庫本粘籤晏球預選從梁祖征伐所至立功纍遷廳子都指揮使梁開平三年自開封府押衙充直左耀武指揮使授右千牛衛將軍軍職如故朱友圭之篡位也懷州龍驤守禦軍作亂欲入京城已至河陽友圭命晏球出騎迎戰擊亂軍獲軍使劉重遇以功轉左龍驤第一指揮使梁末帝嗣位以晏球為龍驤四軍都指揮使貞明二年四月十九日夜汴州捉生都將李霸等作亂縱火焚剽攻建國門梁末帝登樓拒戰晏球聞亂先得龍驤馬五百屯於鞠場俄而亂兵以竿豎麻布沃油焚建國樓勢將危急晏球隔門窺亂兵見無甲胄即出騎擊之奮力血戰俄而羣賊散走梁末帝見騎軍討賊呼曰非吾龍驤之士乎晏球奏曰亂者惟李霸一都陛下但守宮城宮城原本作官城今從通鑑改正影庫本粘籤遲明臣必破之既而晏球盡戮亂軍全營族誅以功授單州刺史尋領軍於河上為行營馬軍都指揮兼諸軍排陳使莊宗入汴晏球率騎軍入援至封丘聞梁末帝殂即解甲降於莊宗明年與霍彥威北捍契丹授齊州防禦使北面行營馬軍都指揮使仍賜姓氏名紹虔鄴之亂明宗入赴內難晏球時在瓦橋遣人招之明宗至汴晏球率騎從至京師以平定功授宋州節度使上章求還本姓名天成二年授北面行營副招討以兵戍滿城是歲王都據定州案通鑑遣人說北面副招討王晏球晏球不從乃以金遺晏球帳下使圖之不克癸巳晏球以都反狀聞壬寅以王晏球為北面招討使權知定州行州事舊五代史考異契丹遣禿餒率騎千餘來援都突入定州晏球引軍保曲陽王都禿餒出軍拒戰晏球督厲軍士令短兵擊賊戒之曰回首者死符彥卿以龍武左軍攻其左高行周以龍武右軍攻其右案歐陽史作高行圭舊五代史考異奮劍揮檛應手首落賊軍大敗於嘉山之下追襲至於城門俄而契丹首領惕隱率勇騎五千至唐河案歐陽史作七千騎舊五代史考異是時大雨晏球出師逆戰惕隱復敗追至易州河水暴漲所在陷沒俘獲二千騎而還惕隱以餘衆北走幽州趙德鈞令牙將武從諫以騎邀擊德鈞分扼諸要路旬日之內盡獲惕隱已下酋長七百餘人契丹遂弱晏球圍城既久帝遣使督攻城晏球曰賊壘堅峻但食三州租稅撫恤黎民愛養軍士彼自當魚潰帝然其言晏球能與將士同其甘苦所得祿賜私財盡以饗士日具飲饌與將校筵宴待軍士有禮軍中無不敬伏其年冬平賊自初戰至於城拔不戮一士上下歡心物議以為有將帥之略以功授天平軍節度使未幾移鎮青州就加兼中書令長興三年卒於鎮時年六十案歐陽史作年六十二舊五代史考異贈太尉子徹位至懷州刺史永樂大典卷一萬八千一百二十九戴思遠本梁之故將也初事梁祖以武幹知名開平元年自右羽林統軍加檢校司徒出為晉州刺史二年授右監門上將軍尋改華州防禦使三年自左天武使復授右羽林統軍郢王友圭篡位授洺州團練使洺州原本作洛州今從歐陽史改正影庫本粘籤貞明中為邢州留後遷本州節度使屬燕將張萬進殺滄州留後劉繼威以城歸梁末帝命思遠鎮之莊宗平定魏博以兵臨滄德思遠棄鎮渡河歸汴纍遷天平軍節度使兼北面招討使將兵與莊宗對壘久之莊宗討張文禮於鎮州契丹來援莊宗追襲契丹至幽州思遠聞之總兵以襲魏州以襲原本作以寵今據文改正影庫本粘籤至魏店遇明宗騎軍適至思遠乃涉洹水陷成安復歸楊村寨盡率其衆攻德勝北城城中危急符存審晝夜乘城以拒之莊宗自薊五日馳至魏州思遠聞之解去及明宗襲下鄆州思遠罷軍權降授宣化軍留後其年莊宗入汴思遠自鄧州入朝復令歸鎮明宗即位移授洋州節度使及西川俱叛思遠以董璋故人避嫌請代徵入朝宿衛以年告老授太子少保致仕清泰二年八月卒於家永樂大典卷一萬五千二十二朱漢賓字績臣亳州譙縣人也父元禮始為郡將梁太祖聞其名擢為軍校從龐師古渡淮戰沒於淮南漢賓少有膂力形神壯偉膽氣過人梁祖以其父死王事選置帳下編入屬籍梁祖之攻兗鄆也朱瑾募驍勇數百人黥雙雁於其額號為鴈子都案此追梁祖攻兗鄆事歐陽史作是時梁方東攻兗鄆則失其事之前後矣歐陽史誤以鴈子都為梁軍名吳縝嘗辨其誤梁祖聞之亦選數百人別為一軍號為落鴈都署漢賓為軍使當時目為朱落鴈後與諸將破蔡賊有功天復中授右羽林統軍入梁歷天威軍使左羽林統軍出為磁州刺史滑宋二州留後亳曹二州刺史安州節度使莊宗至洛陽漢賓自鎮入覲復令還鎮明年授左龍武統軍莊宗嘗幸漢賓之第漢賓妻進酒上食奏家樂以娛之自是漢賓頗蒙寵待同光四年正月冀王朱友謙入朝明宗居洛陽以友謙故人置酒於第莊宗諸弟在席友謙坐在永王存霸之上酒酣漢賓以大觴奉友謙曰公雖名位高坐於皇弟之上非宜也僕與公俱在梁朝以宗盟相厚自公入朝三發單函候問略無報復忽余卑位不亦甚乎元行欽恐其紛然為解之方止不數日友謙赤族趙在禮據魏州元行欽率軍進討詔漢賓權知河南府事明宗以漢賓為右衛上將軍樞密使安重誨方當委重漢賓密令結托得為婚家天成末為潞州節度使移鎮晉州重誨既誅漢賓復為上將軍明年秋漢賓告老授太子少保致仕清泰二年六月卒時年六十四漢賓少勇健及晚歲飲啖過人其狀貌偉如也凡所履歷不聞踰法梁時嘗領軍屯魏州莘縣莘縣原本作華縣考新唐書地理志魏州有莘縣無華縣今改正影庫本粘籤適值連帥去郡諸軍咸以利見誘請自為留後漢賓則斬其言者拒而不從聞者賞焉在曹日飛蝗去境父老歌之臨平陽遇旱親齊潔禱龍子祠踰日雨足四封大稔咸以為善政之所致也及致仕東還亳郡見鄉舊親戚淪沒者有塋兆未辦則給以棺斂有婚嫁未畢則助以資幣受其惠者數百家郡人義之尋還洛陽有第在懷仁里北限洛水南枕通衢層屋連甍修木交幹笙歌羅綺日以自娛養彼天和保其餘齒此乃近朝知止之良將也晉高祖即位贈太子少傅諡曰貞惠案五代會要作正慧引太常博士林弼議曰漢賓散己俸以代荒逋濟疲俗而臻富庶所蒞之地綽有政聲知進退存亡之理得善始令終之道謹案諡法中道不撓保節揚名曰正愛民好學寬裕慈仁曰慧請諡曰正慧從之薛史及歐陽史俱作貞惠未知何據舊五代史考異有子四人長曰崇勳官至左武衛將軍永樂大典卷二千三十一孔勍字鼎文兗州人後徙家宿州少便騎射為軍中小校事梁祖漸至郡守纍遷齊州防禦使唐鄧節度使梁貞明中王球據襄州叛勍討平之因授山南東道節度使莊宗至洛陽勍自鎮來朝復令歸鎮尋移昭義節度使同光季年監軍楊繼源與都將謀據潞州事泄勍誅之明宗即位之歲詔還京師授河陽節度使未幾以太子太師致仕卒年七十九贈太尉永樂大典卷一萬八千一百二十九劉汴州雍邱人也世為宣武軍牙校少負壯節梁祖鎮汴州求自試補隊長從梁祖征伐所至有功遷為牙將歷滑徐襄三州都指揮使開平中襄帥王班為帳下所害王班原本作王斌今從冊府元龜改正影庫本粘籤亂軍推為留後詭從之翌日受賀衙庭享士伏甲幕下盡斬其亂將案通鑑考異引梁祖實録八月丁酉賜劉王延順物以其違亂將之命來歸編遺録斬李洪敕云始扶劉既奔竄以歸朝若使翌日便斬亂將則襄州何以至九月始收復蓋脫身歸朝及梁亡入唐妄云斬亂以自誇大耳舊五代史考異以功歷復亳二州刺史徵為侍衛都將出為安州刺史貞明中為晉州留後莊宗至汴來朝在晉州八年日與上黨太原之師交鬬於境上莊宗見而勞之曰劉侯無恙控我晉陽之南鄙歲時久矣不早相見頓首謝罪復命歸鎮正授節旄移鎮安州明宗即位遷鄧州節度使天成末以史敬鎔代之還京師卒贈侍中有子師道仕皇朝為右贊善大夫卒永樂大典卷九千九十八周知裕字好問幽州人也少事燕帥劉仁恭為騎將表為媯州刺史久之移刺德州天祐四年劉守光既平滄州乃以其幼子繼威為留後大將張萬進與知裕佐之繼威沖幼宣淫於萬進之家萬進殺之詰旦召知裕告其故萬進自稱留後署知裕為景州刺史會萬進納款於梁知裕先奔於汴梁主厚待之特置歸化軍歸化原本作歸比今從通鑑改正影庫本粘籤以知裕為指揮使凡軍士自河朔歸梁者皆隸於部下梁與莊宗交戰於河摧堅挫鋭惟恃歸化一軍然歲將一紀位不及郡守同光初莊宗入汴知裕隨段凝軍解甲封丘明宗時為總管受降於郊外見知裕甚喜遙相謂曰周歸化今為吾人何樂如之因令諸子以兄事之莊宗撫憐尤異而諸校心妬之有壯士唐從益者因獵射之知裕遁而獲免莊宗遂誅從益出知裕為房州刺史魏王繼岌伐蜀召為前鋒騎將明宗即位移刺絳州改淄州刺史宿州團練使知裕老於軍旅勤於稼穡凡為郡勸課皆有政聲朝廷喜之遷安州留後淮上之風惡病者至於父母有疾不親省視甚者避於他室或時問訊即以食物揭於長竿之首委之而去知裕心惡之召鄉之頑狠者訶詰教導俾知父子骨肉之恩繇是弊風稍革長興末入為右神武統軍清泰初卒於官案歐陽史作應順中卒舊五代史考異贈太傅永樂大典卷八千九百九十九史臣曰夫才之良者在秦亦良也在虞亦良也故彥威而下昔為梁臣不虧亮節洎歸唐祚亦無醜聲蓋松貞不變於四時玉粹寧虞其烈焰故也况彥威之輔明宗也有翊戴之績晏球之伐中山也著戡定之功方之數公尤為優矣永樂大典卷八千九百九十七
