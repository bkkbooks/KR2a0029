body:
  text: 舊五代史卷三十二唐書八莊宗紀第六同光二年夏五月己亥帝御文明殿册齊王張全義為太尉禮畢全義赴尚書省領事左諫議大夫竇專不降階為御史所劾專援引舊典宰相不能詰寢而不行庚子太常卿李燕卒壬寅以教坊使陳俊為景州刺史內園使案歐陽史作內園栽接使考五代會要內園栽接使係梁時雜使創置之官儲德源為憲州刺史皆梁之伶人也初帝平梁俊與德源皆為寵伶周匝所薦帝因許除郡郭崇韜以為不可伶官言之者衆案清異録同光既即位猶襲故態身預俳優尚方進御巾裹名品日新今伶人所頂尚有傳其遺製者舊五代史考異帝密召崇韜謂之曰豫已許除郡經年未行我慚見二人卿當屈意行之故有是命甲辰以兗州節度使李紹欽依前檢校太保兗州節度使進封開國侯以邠州節度使韓恭依前檢校太保邠州節度使進封開國伯開國原作間國今據册府元龜改正影庫本粘籤丙午以福建節度使閩王王審知依前檢校太師守中書令福建節度使戊申幸郭崇韜第己酉詔天下收拆防城之具不得修濬池隍以西都留守京兆尹張筠依前檢校太保充西都留守甲寅以滄州節度使李紹斌充東北面招討使以兗州節度李紹欽為副招討使招討使原本作招詔今據文改正影庫本粘籤以宣徽使李紹宏為招討都監率大軍渡河而北時幽州上言契丹將寇河朔故也乙卯潞州叛將楊立遣使健步奉表乞行赦宥帝令樞密副使宋唐玉齎敕書招撫幽州上言契丹營於州東南丙辰渤海國王大諲撰遣使貢方物以澶州刺史李審益為幽州行軍司馬蕃漢內外都知兵馬使辛酉故澤潞節度使丁會贈太師詔割復州為荊南屬郡壬戌以權知鳳翔軍府事涇州節度使李曮為起復雲麾將軍右金吾大將軍同正依前檢校太尉兼中書令充鳳翔節度使乙丑以權知歸義軍留後曹義金為歸義軍節度使沙州刺史檢校司空丙寅李嗣源奏收復潞州幽州上言新授宣武軍節度使李存審卒六月甲戌中書侍郎兼吏部尚書平章事弘文館大學士豆盧革加右僕射餘如故侍中監修國史兼樞密使鎮州節度使郭崇韜進爵邑加功臣號中書侍郎平章事集賢殿大學士趙光裔加兼戶部尚書禮部侍郎平章事韋説加中書侍郎宋州奏節度使李紹安卒丙子李嗣源遣使部送潞州叛將楊立等到闕並磔於市潞州城峻而隍深隍深原本作王深今據文改正影庫本粘籤至是帝命剗平之因詔諸方鎮撤防城之備焉丁丑有司上言洛陽已建宗廟其北京太廟請停從之甲申以衛國夫人韓氏為淑妃燕國夫人伊氏為德妃仍令所司擇日册命故河東節度副使守左諫議大夫李襲吉贈禮部尚書李襲吉原本作襲古今據歐陽史列傳改正影庫本粘籤故河東節度副使禮部尚書蘇循贈左僕射故河東觀察判官檢校右僕射司馬揆贈司空故河東留守判官工部尚書李敬義贈右僕射丙戌以順義軍節度使李令錫為許州節度使以前保義軍留後李紹真為徐州節度使以徐州節度使李紹榮為宋州節度使戊子汝州防禦使張繼孫賜死於本郡繼孫即齊王張全義之假子也本姓郝氏為兄繼業等訟其陰事故誅之案册府元龜載張繼業為河陽兩使留後莊宗同光二年六月繼業上疏稱弟繼孫本姓郝有母尚在父全義養為假子令管衙內兵士自皇帝到京繼孫私藏兵甲招置部曲欲圖不軌兼私家淫縱無別無義臣若不自陳恐纍家族敕曰有善必賞所以勸忠孝之方有惡必誅所以絶姦邪之迹其或罪狀騰於衆口醜行布於近親須舉朝章冀明國法汝州防禦使張繼孫本非張氏子孫自小丐養以至成立備極顯榮而不能酬撫育之恩履謙恭之道擅行威福常恣姦凶侵奪父權惑亂家事縱鳥獸之行畜梟獍之心有識者所不忍言無賴者實為其黨而又橫征暴斂虐法峻刑藏兵器於私家殺平人於廣陌罔思悛改難議矜容宜竄逐於遐方仍歸還於姓氏俾我勳賢之族永除污穢之風凡百臣僚宜體朕命可貶房州司戶參軍同正兼勒復本姓尋賜自盡仍籍沒資産己丑以回鶻可汗仁美為英義可汗詔改輝州為單州庚寅故左僕射裴樞右僕射裴贄崔遠並贈司徒故靜海軍節度使獨孤損贈司空故吏部尚書陸扆贈右僕射故工部尚書王溥贈右僕射裴樞等六人皆前朝輔為梁祖所害於白馬驛至是追贈焉壬辰以天平軍節度使蕃漢總管副使開府儀同三司檢校太尉兼中書令李嗣源為宣武軍節度使蕃漢馬步總管餘如故甲午以樞密使特進左領軍衛上將軍知內侍省事張居翰為驃騎大將軍守左驍衛上將軍進封開國伯賜功臣號秋七月戊戌朔故宣武軍節度使李存審男彥超進其父牙兵八千七百人己亥中書門下奏每年南郊壇四祠祭太微宮五薦獻並宰臣攝太尉行事惟太廟遣庶僚行事此後太廟祠祭亦望差宰臣行事從之乙巳汴州雍丘縣大風拔木傷稼曹州大雨平地水三尺丙午以襄州節度使孔勍為潞州節度使李存霸為鄆州節度使鄆州原本作軍州今據册府元龜改正影庫本粘籤乙酉幸龍門之雷山祭天神從北俗之舊事也辛亥以鄆州副使李紹珙為襄州留後以前澤州刺史董璋為邠州留後戊午西川王衍遣偽署戶部侍郎歐陽彬來朝貢稱大蜀皇帝上書大唐皇帝庚申以應州為雲州屬郡升新州為威塞軍節度使以媯儒武等州為屬郡壬戌皇子繼岌妻王氏封魏國夫人幽州奏契丹阿保機東攻渤海案遼史太祖紀天贊三年五月渤海殺其刺史張秀實而掠其民於東攻渤海之事闕而不載考五代會要同光二年七月契丹東攻渤海國與薛史同八月己巳詔洛京應有隙地任人請射修造有主者限半年令本主自修蓋如過限不見屋宇許他人占射案五代會要載此詔云藩方侯伯內外臣僚于京邑之中無安居之所亦可請射各自修營舊五代史考異辛未北京副留守太原尹孟知祥加檢校太傅增邑賜功臣號帝畋於西苑癸酉以租庸副使守衛尉卿孔謙為租庸使以右威衛上將軍孔循為租庸副使甲戌以權知汴州軍州事翰林學士承旨戶部尚書盧質為兵部尚書依前翰林學士承旨仍賜論思匡佐功臣丙子以雲州刺史雁門以北都知兵馬使安元信為大同軍節度留後以隰州刺史張廷裕為新州威塞軍節度留後丁丑樞密使郭崇韜上表請退不允戊寅租庸使守禮部尚書王正言罷使守本官辛巳詔諸道節度觀察防禦團練使團練原本作團簡今據文改正影庫本粘籤刺史並於洛陽修宅一區中書門下上言請今後諸道除節度副使兩使判官外其餘職員並諸州軍事判官各任本處奏辟從之案五代會要同光二年八月八日中書門下奏諸道除節度副使及兩使判官除授外其餘職員並軍事判官伏以翹車著詠戔帛垂文式重弓旌以光尊俎由是副知己之薦成接士之榮必當備悉行藏習知才行允奉幕中之畫以稱席上之珍爰自偽梁頗乖斯義皆從除授以佐藩宣因緣多事之秋慮爽得人之選將期推擇式示更張今後諸道除節度副使兩使判官除授外其餘職員並諸州軍事判官等並任本道本州各當辟舉其軍事判官仍不在奏官之限舊五代史考異汴州奏大水損稼癸未租庸使孔謙進封會稽縣男仍賜豐財贍國功臣淮南楊溥遣使貢方物宋州大水鄆曹等州大風雨損稼丁亥中書門下侍郎奏請差左丞崔沂吏部尚書崔貽孫給事中鄭韜光李光序吏部員外郎盧損等同詳定選司長定格循資格十道圖從之案五代會要同光二年八月中書門下奏吏部三銓門下省南曹廢置甲庫格式流外銓等司公事並繫長定格循資格十道圖等前件格文本朝創立檢制姦濫倫官資頗謂精詳久同遵守自亂離之後巧偽滋多兼同光元年八月車駕在東京權判工部員外郎盧重本司起請一卷並以興復之始務切懷來凡有條流多失根本以至冬集赴選人並南郊行事官及陪位宗子共一千三百餘人銓曹檢勘之時互有援引去留之際不絶爭論若又依違必長訛濫望差權判尚書省銓左丞崔沂吏部侍郎崔貽孫給事中鄭韜光李光序吏部員外郎盧損等同詳定舊長定格循資格十道圖務令簡要可久施行從之舊五代史考異癸巳於朝參三日以霖雨故也陝州奏河水溢岸乙未中書門下上言諸陵臺令丞請停以本縣令知陵臺事從之九月癸卯畋於西北郊幽州上言契丹阿保機自渤海國回軍內園新殿成名曰長春殿戊申以中書舍人權知貢舉裴皡為禮部侍郎以前鄭州防禦副使薑弘道為太僕卿侍中郭崇韜奏應三銓注授官員等三銓原本作正千今據五代會要改正影庫本粘籤內有自無出身入仕買覓鬼名告敕今將骨肉文書揩改姓名或歷任不足妄稱失墜或假人蔭緒託形勢論屬安排參選所司隨例注官如有人陳告特議超奬其所犯人檢格處分若同保人內有偽濫者並當駮放應有人身死之處今後並須申報本州於告身上批書身死月日分明付子孫今後銓司公事至春末並須了畢從之銓綜之司偽濫日久及崇韜條奏之後澄汰甚嚴放棄者十有七八放棄原本作坊歨今據五代會要改正影庫本粘籤衆情亦怨之己酉司天臺請禁私曆日從之庚戌有司自契丹至者言女真回鶻黃頭室韋合勢侵契丹壬子有司上言八月二十二日夜熒惑犯星二度星周分也請依法禳之於京城四門懸東流水一罌兼令都市嚴備盜火止絶夜行從之甲寅幸郭崇韜第置酒作樂乙卯以前振武節度使安北都護馬存可依前檢校太尉兼侍中充寧遠軍節度容管觀察使存湖南馬殷之弟也丙辰黑水國遣使朝貢契丹寇幽州戊午宣宰臣於中書磨勘吏部選人謬濫者焚毀告敕冬十月戊辰帝畋於西北郊己巳故安義節度使贈太尉隴西郡王李嗣昭贈太師庚午正衙命使册淑妃韓氏德妃伊氏以宰臣豆盧革韋説充册使辛未詔今後支郡公事須申本道騰狀奏聞騰狀原本作膝將今據册府元龜改正影庫本粘籤租庸使各有徵催祇牒觀察使貴全理體契丹寇易定北鄙壬申故大同軍防禦使李存璋贈太尉鄆州奏清河泛溢壞廬舍癸未畋於石橋甲戌河南尹張全義上言萬壽節日請於嵩山開琉璃戒壇度僧百人從之乙亥故守太師尚書令秦王李茂貞追封秦王賜諡曰忠敬丁丑皇后差使賜兗州節度使李紹欽湯藥時皇太后行誥命皇后劉氏行教命互遣使人宣達藩后紊亂之弊人不敢言己卯汴鄆二州奏大水庚辰以前太僕卿楊遘為大理卿黨項進白驢奚王李紹威進馬幽州奏契丹入寇至近郊辛巳故天雄軍節度副使王緘贈司空故天雄軍原本脫天字今據册府元龜增入影庫本粘籤壬午以天下兵馬都元帥尚父守尚書令吳越國王錢鏐可依前天下兵馬都元帥尚父守尚書令封吳越國王癸未幸小馬坊閲馬甲申以兩浙兵馬留後清海軍節度嶺南東道觀察等使守太尉兼侍中廣州刺史錢元瓘為檢校太師兼中書令充兩浙節度觀察留後餘如故以鎮東軍節度副大使江南管內都招討使建武軍節度嶺南西道觀察等使檢校太傅守侍中知蘇州中吳軍軍州事行雍州刺史錢元為檢校太尉兼中書令餘如故辛卯天平軍監軍使柴重厚可特進右領衛將軍同正充鳳翔監軍使甲午以宣武軍節度押牙李從溫李從璋李從榮李從厚李從璨並銀青光祿大夫檢校右散騎常侍兼御史大夫宣武軍節度押牙李從臻可檢校國子祭酒兼御史中丞自從溫而下皆李嗣源諸子也十一月丙申靈武奏甘州回鶻可汗仁美卒其弟狄銀權主國事吐渾白都督族帳移於代州東南己亥幸六宅宴諸弟壬寅尚書左丞判吏部尚書銓事崔沂貶麟州司馬吏部侍郎崔貽孫貶朔州司馬給事中鄭韜光貶寧州司馬吏部員外盧損貶府州司戶時有選人吳延皓取亡叔告身故舊名求仕事發延皓付河南府處死崔沂已下貶官宰相豆盧革趙光裔韋説詣閣門待罪詔釋之癸卯帝畋於伊闕侍衛金槍馬萬餘騎從帝一發中大鹿是日命從官拜梁祖之陵物議非之其夕宿於張全義之別墅甲辰宿伊闕縣乙巳宿椹人丹時騎士圍山會夜顛墜崖谷死傷甚衆丙午復命衛兵分獵殺獲萬計是夜方歸京城六街火炬如晝丁未賜羣臣鹿肉有差庚戌制改節將一十一人功臣號辛亥以兵部侍郎李德休為吏部侍郎壬子日南至百官拜表稱賀以昭儀侯氏為汧國夫人昭容夏氏為虢國夫人昭媛白氏為沛國夫人出使美宣鄧氏為魏國夫人御正楚真張氏為涼國夫人司簿德美周氏為宋國夫人侍真吳氏為渤海郡夫人其餘並封郡夫人丁巳河中節度使守太師兼尚書令西平王李繼麟可依前守太師兼尚書令河中護國軍節度使西平王仍賜鐵券戊午幸李嗣源李紹榮之第縱酒作樂是日鎮州地震契丹寇蔚州十二月戊辰幸西苑校獵己巳詔汴州節度使李嗣源歸鎮案通鑑作己巳命宣武軍節度使李嗣源將宿衛兵三萬七千人赴汴州遂如幽州禦契丹是嗣源因出師而歸鎮也庚午帝與皇后劉氏幸張全義第酒酣帝命皇后拜全義為養父全義惶恐致謝復出珍貨貢獻翌日皇后傳制命學士草謝全義書學士趙鳳密疏陳國后無拜人臣為父之禮帝雖嘉之竟不能已其事壬申以教坊使王承顏為興州刺史丙子詔取來年正月七日幸魏州庚辰畋於近郊至夕還宮壬午契丹寇嵐州黨項遣使貢方物乙酉幸龍門佛寺祈雪丙戌以徐州節度使李紹真為北面行營副招討使戊子李嗣源奏部署大軍自宣武軍北征淮南楊溥遣使貢獻己丑幸龍門庚寅詔河南尹張全義為洛京留守判在京諸軍事是日日傍有背氣背氣原本作眚氣今據歐陽史司天考改正影庫本粘籤凡十二同光三年春正月甲午朔帝御明堂殿受朝賀仗衛如式丙申詔以昭宗少帝山陵未備昭宗少帝原本作詔宗大帝今據舊唐書改正影庫本粘籤宜令有司別選園陵改葬尋以年飢財匱而止契丹寇幽州戊戌詔起今後特恩授官及侍衛諸軍將校內諸司等官其告身官給舊例朱膠錢臺省禮錢並停其餘合徵臺省禮錢比舊數五分中許徵一分特恩者不徵兵吏部兩司逐月各支錢四十貫文充吏人食直少府監鑄錢造印文今後不得徵納銅炭價直其料物官給庚子車駕發京師幸鄴以前許州節度使李紹沖為太子少保以前邠州節度使韓恭為右金吾大將軍充兩街使以前安州節度使朱漢賓為左龍武統軍庚戌車駕至鄴命青州節度使符習修酸棗河堤先是梁末帝決河隄引水東注至鄆濮以限我軍至是方修之丙辰幽州上言節度使李存賢卒二月甲子朔詔興唐府管內有百姓隨絲鹽錢每兩與減五十文案五代會要作每兩與減放五文逐年所俵蠶鹽每斗與減五十文小菉豆稅每畝與減放三升都城內所徵稅絲永與除放丙寅定州節度使王都來朝丁卯畋於近郊己巳召從臣擊球於鞠場辛未許州上言襄城葉縣準敕割隸汝州其扶溝等縣請卻隸當州卻隸當州原本作卻穎今據文改正影庫本粘籤從之甲戌以滄州節度使李紹斌為幽州節度使依前檢校太保以大同軍留後安元信為滄州節度使乙亥幸王莽河射鴈丙子李嗣源奏涿州東南殺敗契丹生擒首領三十人符習奏修隄役夫遇雪寒逃散樞密使郭崇韜上表辭兼鎮時帝命李紹斌鎮幽州以其時望未重欲以李嗣源為鎮帥且為紹斌聲援移郭崇韜兼領汴州召崇韜議之崇韜奏以為當因懇辭兼領庚辰以宣武軍節度使李嗣源為鎮州節度使辛巳以皇子繼潼繼嵩繼蟾繼蟾原本脫繼字今據歐陽史增入影庫本粘籤繼嶢並檢校司徒皆沖幼未出閣突厥渤海國皆遣使貢方物帝幸近郊射鴈甲申以樞密使郭崇韜為依前守侍中監修國史兼樞密使加食邑實封廣南劉巖遣使奉書於帝稱大漢國王致書上大唐皇帝乙酉帝射鴨於郭泊郭泊原本作郭伯今據册府元龜改正影庫本粘籤丙戌定州節度使檢校太尉兼侍中王都進封開國公加食邑實封戊子幸近郊射鴈工部尚書崔柅卒贈右僕射三月癸巳朔賜扈從諸軍將士優給自二十千至一千甲午振武軍節度使洛京內外蕃漢馬步使朱守殷奏昨修月陂堤至德宮南獲玉璽一紐獻之詔示百官驗其文曰皇帝行寶四字方圓八寸厚二寸背紐交龍光瑩精妙守殷又於役所得古文錢四百六十六內二十六文曰得一元寶四百四十曰順天元寶上之案龐元文昌雜録云同光三年洛京積善坊得古文錢曰得一元寶順天元寶史不載何代鑄錢近見錢氏錢譜云史思明再陷洛陽鑄得一錢賊黨以為得一非佳號乃改順天蓋史思明所鑄錢也丙申寒食節帝與皇后出近郊遙饗代州親廟庚子詔取三月十七日車駕歸洛京壬寅符習奏修河隄畢功戊申帝召郭崇韜謂曰朕思在德勝寨時霍彥威段凝皆豫之勍敵終日格鬬戰聲相聞安知二年之間在吾廡下吾無少康光武之才一旦重興基構者良由二三勳德同心輔翼故也朕有時夢寢如在戚城思念曩時挑戰鏖兵勞則勞矣然而揚旌伐鼓差慰人心殘壘荒溝依然在目豫欲按德勝故寨與卿再陳舊事崇韜曰此去澶州不遠陛下再觀戰地益知王業之艱難豈不韙哉己酉車駕發鄴宮辛亥至德勝城案五代春秋作庚子帝幸鄴都遂幸德勝故城據薛史則己酉發鄴宮辛亥至德勝城與五代春秋異蓋五代春秋祇以下詔之日為據也登城四望指戰陳之處以諭宰臣渡河南觀廢柵舊址至楊村寨沿河至戚城置酒作樂而罷壬子淮南楊溥遣使朝貢東京副留守張憲奏諸營家口一千二百人逃亡以艱食故也時宮苑使王允平伶人景進為帝廣采宮人不擇良家委巷殆千餘人車駕不給載以牛車纍纍於路焉庚辰車駕至自鄴案原本作庚辰歐陽史作庚申疑永樂大典傳寫之訛考通鑑及五代春秋皆作庚辰又疑原本不誤據上文正月甲午朔二月甲子朔三月癸巳朔則三月不得有庚辰也蓋其誤始於薛史而通鑑五代春秋皆襲其訛耳今姑從原本仍為辨正於此辛酉詔本朝以雍州為西京洛州為東都並州為北都近以魏州為東京宜依舊以洛京為東都魏州改為鄴都與北都並為次府夏四月癸亥朔案五代春秋作辛亥朔通鑑從薛史日有蝕之以租庸副使孔循權知汴州軍州事丙寅淮南楊溥遣使貢方物壬申幸甘泉亭癸酉詔翰林學士承旨盧質覆試新及第進士案五代會要時以新及第進士符蒙正等尚干浮議故命盧質覆試租庸使奏時雨久愆請下諸道州府依法祈禱從之乙亥帝與皇后幸郭崇韜第又幸左龍武統軍朱漢賓之第戊寅以耀州為團練州其順義軍額宜停庚辰帝侍皇太后幸會節園遂幸李紹榮之第辛巳以旱甚詔河南府徙市造五方龍集巫禱祭癸未以兗州節度使李紹欽為鄧州節度使丁亥以鎮州節度使李嗣源兼北面水陸轉運使以徐州節度使李紹真為副禮部貢院新及第進士四人其王徹改為第一桑維翰第二符蒙正第三成僚第四禮部侍郎裴皡既無黜落特議寬容今後新及第人候過堂日委中書門下精加詳覆陝州奏木連理庚寅中書侍郎兼工部尚書平章事趙光胤卒案薛史二年六月光允加兼戶部尚書此處作工部前後互異未知孰是舊五代史考異廢朝三日五月壬辰朔淮南楊溥貢端午節物丁酉皇太妃劉氏薨於晉陽廢朝五日帝於興安殿行服時皇太后欲奔喪於晉陽百官上表請留乃止戊戌以鎮州行軍司馬知軍府事任圜為工部尚書戊申幸龍門廣化寺祈雨己酉黑水女真皆遣使朝貢戊午以鳳州衙內馬步軍都指揮使李繼昶為涇州節度使李繼昶原本作繼永今從歐陽史改正影庫本粘籤檢校太傅己未詔天下見禁罪人如無大過速令疏放幸玄元廟禱雨六月癸亥雲州上言去年契丹從磧北歸帳達靼因相掩擊其首領于越族帳自磧北以部族羊馬三萬來降已到南界今差使人來赴闕奏事甲子太白晝見丁卯以滄州節度使安元信充北面行營馬步軍都排陳使辛未以宗正卿李紓充昭宗少帝改卜園陵使壬申京師雨足自是大雨至於九月晝夜陰晦未嘗澄霽江河漂溢隄防壞決天下皆訴水災丁丑詔吳越王錢鏐將行册禮準禮文合用竹册宜令所司修製玉册時郭崇韜秉政以為不可樞密承旨段徊贊其事故有是命癸丑以天德軍節度使管內蕃漢都知兵馬使劉承訓為天德軍節度觀察留後丙戌詔曰關內諸陵頃因喪亂例遭穿穴多未掩修其下宮殿宇法物等各令奉陵州府據所管陵園修製仍四時各依舊例薦饗每陵仰差近陵百姓二十戶充陵戶以備灑掃其壽陵等一十陵亦一例修掩量置陵戶戊子以刑部尚書李琪充昭宗少帝改卜園陵禮儀使己丑以工部郎中李途為京兆少尹充修奉諸陵使辛卯詔括天下私馬案五代會要詔下河南河北諸州和市戰馬官吏除一匹外匿者坐罪蓋當時私馬之禁如此將收蜀故也永樂大典卷七千一百五十七案三楚新録莊宗謂高季興曰今天下負固不服者惟吳蜀耳朕欲先有事于蜀而蜀地險阻尤難江南才隔荊南一水朕欲先之卿以為何如季興對曰臣聞蜀地富民饒獲之可建大利江南國貧地狹民少得之恐無益臣願陛下釋吳先蜀時莊宗意亦欲伐蜀及聞季興之言果大悅舊五代史考異
