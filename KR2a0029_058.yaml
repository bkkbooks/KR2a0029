body:
  text: 舊五代史卷五十八唐書三十四列傳第十趙光逢字延吉曾祖植嶺南節度使祖存約興元府推官父隱右僕射案舊唐書趙隱傳云隱字大隱京兆奉天人也大中三年應進士登第累加尚書左僕射廣明中卒考薛史作右僕射與舊唐書異光逢與弟光裔皆以文學德行知名案舊唐書光裔光啟三年進士擢第累遷司勳郎中弘文館學士改膳部郎中知制誥季述廢立之後旅遊江表以避患嶺南劉隱深禮之奏為副使因家嶺外光逢幼嗜墳典動守規檢議者目之為玉界尺案歐陽史時人稱其方直溫潤謂之玉界尺僖宗朝登進士第案原本作昭宗朝登進士第據舊唐書光逢係乾符五年進士當作僖宗今改正踰月辟度支巡官歷官臺省內外兩制俱有能名轉尚書左丞翰林承旨案舊唐書云釋褐鳳翔推官入朝為監察御史丁父憂免僖宗還京授太常博士歷禮部司勳吏部三員外郎集賢殿學士轉禮部郎中景福中以祠部郎中知制誥尋召充翰林學士正拜中書舍人戶部侍郎學士承旨改兵部侍郎尚書左丞學士如故舊唐書所載光逢爵秩較薛史為詳今備錄之昭宗幸石門光逢不從昭宗遣內養戴知權詔赴行在稱疾解官駕在華州拜御史中丞時有道士許巖士案原本脫士字今據新唐書及通鑑增入舊五代史考異瞽者馬道殷出入禁庭驟至列卿宮相因此以左道求進者衆光逢持憲紀治之皆伏法自是其徒頗息改禮部侍郎知貢舉光化中王道寖衰南北司為黨光逢素惟慎靜慮禍及己因挂冠伊洛屏絕交遊凡五六年門人柳璨登庸案歐陽史柳璨與光逢有舊恩案唐摭言云光化二年趙光逢放柳璨及第光逢後三年不遷時璨自內庭大拜光逢始以左丞徵入未幾璨坐罪誅死光逢膺大用與薛史微異舊五代史考異除吏部侍郎太常卿入梁為中書侍郎平章事累轉左僕射兼租庸使左僕射原本脫左字今據歐陽史增入影庫本粘籤上章求退以太子太保致仕梁末帝愛其才徵拜司空平章事無幾以疾辭授司徒致仕唐摭言云光逢膺大用居重地十餘歲七表乞骸守司空致仕居二年復徵拜上相殿本同光初弟光胤為平章事時謁問於私第嘗語及政事他日光逢署其戶曰請不言中書事其清淨寡慾端默如此嘗有女冠寄黃金一鎰於其室家時屬亂離女冠委化於他土後二十年金無所歸納於河南尹張全義請付諸宮觀其舊封尚在兩登廊廟四退邱園百行五常五常原本作五諦今據錦繡萬花谷所引薛史改正影庫本粘籤不欺闇室搢紳咸仰以為名教主天成初遷太保致仕封齊國公卒於洛陽詔贈太傅永樂大典卷一萬八千九百九十一趙光胤光逢之弟也案新舊唐書俱云趙隱子三人光逢光裔光胤為後唐相者光胤也薛史原本避宋諱宋諱稱光胤為光裔似混二人為一今改正俱以詞藝知名亦登進士第案舊唐書云大順二年進士登第天祐初累官至駕部郎中光胤仕梁歷清顯伯仲之間咸以方雅自高北人聞其名者皆望風欽重及莊宗平定汴洛時盧程以狂妄免郭崇韜自勳臣拜議者以為國朝典禮故實須訪前代名家咸曰光胤有宰相器薛廷珪李琪當武皇為晉王時嘗因為冊使至太原故皆有宿望當時咸謂宜處台司郭崇韜採言事者云廷珪朽老浮華無相業琪雖文學高傾險無士風皆不可相乃止同光元年十一月光胤與韋說並拜平章事光胤生於季末漸染時風雖欲躍鱗振翮仰希前輩然才力無餘未能恢遠朝廷每有禮樂制度沿革擬議以為己任同列既匪博通見其浮譚橫議莫之測也豆盧革雖憑門地在本朝時仕進尚微久從使府朝章典禮未能深悉光胤每有發論革但唯唯而已後革奏議或當光胤謂羣官曰昨有所議前座一言粗當近日差進學者其可已乎其自負如此先是條制權豪強買人田宅或陷害籍沒顯有屈塞者許人自理內官楊希朗者故觀軍容使復恭從孫也援例理復恭舊業事下中書光胤謂崇韜曰復恭與山南謀逆顯當國法本朝未經昭雪安得論理崇韜私抑宦者因具奏聞希朗泣訴於莊宗莊宗令自見光胤言之希朗陳訴叔祖復光有大功於王室復光原本作復充今據新唐書改正影庫本粘籤伯祖復恭為張濬所搆得罪前朝當時強臣掣肘國命不行及王行瑜伏誅德音昭洗制書尚在相公本朝氏族諳練故事安得謂之未雪耶若言未雪吾伯氏彥博洎諸昆仲監護諸鎮何途得進漸至聲色俱厲光胤方恃名德為其所折悒然不樂又以希朗幸臣慮摭他事危己心不自安三年夏四月病疽卒贈左僕射永樂大典卷一萬六千九百九十一鄭王玉昭宗朝宰相綮之姪孫父徽河南尹張全義判官光化中登進士第案歐陽史云王玉少依全義居河南舉進士數不中全義以王玉屬有司乃得及第歷弘文館校書集賢校理監察御史入梁為補闕起居郎召入翰林累遷禮部侍郎充職王玉文章美麗旨趣雍容自策名登朝張全義皆有力焉案歐陽史云梁諸大臣以全義故數薦之貞明中拜平章事案通鑑考異引唐餘錄云貞明二年十月丁酉禮部侍郎鄭王玉為中書侍郎平章事舊五代史考異莊宗入汴責授萊州司戶未幾量移曹州司馬張全義言於郭崇韜將復相之尋入為太子賓客明宗即位任圜自蜀至安重誨不欲圜獨拜宰輔共議朝望一人共之孔循言王玉貞明時久在中書性畏慎而長者美詞翰好人物重誨即奏與任圜並命為相有頃王玉以老病耳疾不任中書事四上章請明宗惜之久而方允乃授開府儀同三司行尚書左僕射致仕仍賜鄭州莊一區明宗自汴還洛陽遣中使撫問賜錢二十萬食羊百口長興初卒贈司空初王玉應進士十九年方登第名姓為第十九人自登第凡十九年為宰相又昆仲之次第十九時亦異之案古今事類云鄭王玉當唐昭宗時作相文章理道典贍華美小字十九郎應舉十九年方及第又第十九人至相亦十九年時皆異之考王玉以光化中登第歷相梁唐而古今事類以為唐昭宗時作相誤也子遘太平興國中任正郎永樂大典卷一萬八千八百八十一崔協字思化遠祖清河太守第二子寅仕後魏為太子洗馬因為清河小房至唐朝盛為流品曾祖邠太常卿祖瓘吏部尚書父彥融楚州刺史彥融素與崔蕘善崔蕘原本作崔今據北夢瑣言改正影庫本粘籤嘗為萬年令蕘謁於縣彥融未出見案上有尺題皆賂遺中貴人蕘知其由徑始惡其為人及除司勳郎中蕘為左丞通刺不見蕘謂曰郎中行止鄙雜故未見宰相知之改楚州刺史卒於任誡其子曰世世無忘蕘故其子弟常云崔讎協即彥融之子也幼有孝行登進士第釋褐為度支巡官渭南尉直史館歷三署入梁為左司郎中萬年令給事中累官至兵部侍郎與中書舍人崔居儉相遇於幕次協厲聲而言曰崔蕘之子何敢相見居儉亦報之左降太子詹事俄拜吏部侍郎同光初改御史中丞憲司舉奏多以文字錯誤屢受責罰協器宇宏爽高談虛論多不近理時人以為虛有其表天成初遷禮部尚書太常卿因樞密使孔循保薦拜平章事初豆盧革韋說得罪執政議命相樞密使孔循意不欲河朔人居相位任圜欲相李琪而鄭王玉素與琪不協孔循亦惡琪謂安重誨曰李琪非無藝學但不廉耳朝論莫若崔協重誨然之因奏擇相明宗曰誰可乃以協對任圜奏曰重誨被人欺賣如崔協者少識文字時人謂之沒字碑臣比不知書無才而進已為天下笑何容中書之內更有笑端明宗曰易州刺史韋肅人言名家待我嘗厚置於此位何如肅苟未可則馮書記是先朝判官馮書記原本作筆記今據通鑑改正影庫本粘籤稱為長者與物無競可以相矣道嘗為莊宗霸府書記故明宗呼之朝退宰臣樞密使休於中興殿之廡下孔循拂衣而去曰天下事一則任圜二則任圜崔協暴死則已不死會居此位重誨私謂圜曰今相位缺人協且可乎圜曰朝廷有李琪者學際天人奕葉軒冕論才校藝可敵時輩百人而讒夫巧沮忌害其能必捨琪而相協如棄蘇合之丸蘇合原本作蘇全今據通鑑及歐陽史改正影庫本粘籤取蛣蜣之轉也重誨笑而止然重誨與循同職循日言琪之短協之長故重誨竟從之而協登庸之後廟堂代筆假手於人朝廷以國庠事重命協兼判祭酒事協上奏每歲補監生二百為定物議非之案北夢瑣言明宗問宰相馮道盧質近日喫酒否對曰質曾到臣居亦飲數爵臣勸不令過度事亦如酒過則患生崔協強言于坐曰臣聞食醫心鏡酒極好不加藥餌足以安心神左右見其膚淺不覺哂之舊五代史考異四年春駕自夷門還京從至須水驛中風暴卒詔贈尚書左僕射諡曰恭靖子頎頌壽貞惟頌仕皇朝官至左諫議大夫終於鄜州行軍司馬永樂大典卷二千七百四十李琪字台秀五代祖憕天寶末禮部尚書東都留守安祿山東陷東都遇害累贈太尉諡曰忠懿憕孫寀元和朝位至給事中寀子敬方文宗朝諫議大夫敬方子縠廣明中為晉公王鐸都統判官案太平廣記引李琪集序作父敬佐王鐸滑州幕考李琪祖名敬方其父不得名敬疑太平廣記傳寫之訛舊五代史考異以收復功為諫議大夫琪即縠之子也年十三詞賦詩頌大為王鐸所知然亦疑其假手一日鐸召縠讌於公署召縠原本作茗縠今據文改正影庫本粘籤密遣人以漢祖得三傑賦題就其第試之琪援筆立成賦尾云得士則昌非賢罔共龍頭之友斯貴鼎足之臣可重宜哉項氏之敗亡一范增而不能用鐸覽而駭之曰此兒大器也將擅文價案太平廣記琪總角謁鐸鐸顧曰適蜀中詔到用夏州拓跋思恭為收復都統可作一詩否即秉筆立製云飛騎經巴棧洪恩及夏臺將從天上去人自日邊來此處金門遠何時玉輦迴早平關右賊莫待詔書催鐸益奇之因執琪手曰此真鳳毛也時年十四明年丁母憂因流寓齊魯然糠照薪俾夜作晝覽書數千卷間為詩賦唐僖宗再幸梁洋竊賦云哀痛不下詔登封誰上書舊五代史考異昭宗時李谿父子以文學知名琪年十八袖賦一軸謁谿谿覽賦驚異倒屣迎門出琪調啞鐘捧日等賦調啞鐘捧日等賦疑有脫字考夏文莊集所引薛史與永樂大典同今姑仍其舊影庫本粘籤謂琪曰余嘗患近年文士辭賦皆數句之後未見賦題吾子入句見題偶屬典麗吁可畏也琪由是益知名舉進士第天復初應博學宏詞居第四等授武功縣尉辟轉運巡官遷左拾遺殿中侍御史自琪為諫官憲職凡時政有所不便必封章論列文章秀麗覽之者忘倦琪兄珽亦登進士第才藻富贍兄弟齊名而尤為梁祖所知以珽為崇政學士琪自左補闕入為翰林學士案北夢瑣言云梁李相國琪唐末以文學策名仕至御史昭宗播遷衣冠蕩析琪藏跡於荊楚間自晦其迹號華原李長官其堂兄光符宰宜都嘗厭薄之琪寂寞每臨流踞石摘樹葉而試草制詞吁嗟怏悵而投葉水中梁祖受禪徵入拜翰林學士今考梁書李珽傳珽歷為成汭趙匡凝掌書記蓋昭宗末年珽琪兄弟皆客荊楚後乃受知於梁祖也累遷戶部侍郎翰林承旨梁祖西抗邠岐北攻澤潞出師燕趙經略四方暫無寧歲而琪以學士居帳中專掌文翰下筆稱旨寵遇踰倫是時琪之名播於海內琪重然諾憐才奬善家門雍睦貞明龍德中龍德原本脫德字今據梁末帝紀增入影庫本粘籤歷兵禮吏侍郎受命與馮錫嘉張充郄殷象同撰梁太祖實錄三十卷遷御史中丞累擢尚書左丞中書門下平章事時琪與蕭頃同為宰相頃性畏慎深密琪倜儻負氣不拘小節中書奏覆多行其志而頃專掎摭其咎會琪除吏是試攝名銜改攝為守為頃所奏梁帝大怒將投諸荒裔而為趙巖輩所援罷相為太子少保莊宗入汴素聞琪名累欲大任同光初歷太常卿吏部尚書三年秋天下大水國計不充莊宗詔百僚許上封事陳經國之要琪因上疏曰臣聞王者富有兆民深居九重所重患者百姓凋耗而不知四海困窮而莫救下情不得上達羣臣不敢指言今陛下以水潦之災軍食乏闕焦勞罪己迫切疚懷避正殿以責躬訪多士而求理則何思而不獲何議而不臧止在改而行之足以擇其善者臣聞古人有言曰穀者人之司命也地者穀之所生也人者君之所理也有其穀則國力備定其地則人食足察其人則徭役均知此三者為國之急務也軒黃已前不可詳記自堯湮洪水禹作司空於時辨九等之田收什一之稅其時戶一千三百餘萬定墾地約九百二十萬頃約九百原本作絲八百今據文獻通考改正影庫本粘籤最為太平之盛及商革夏命重立田制每私田十畝種公田一畝水旱同之亦什一之義也洎乎周室立井田之法大約百里之國提封萬井出車百乘戎馬四百匹畿內兵車萬乘馬四萬匹以田法論之亦什一之制也故當成康之世比堯舜之朝戶口更增二十餘萬非他術也蓋三代以前皆量入以為出計農以立軍雖逢水旱之災而有凶荒之備降及秦漢重稅工商急關市之征倍舟車之算人戶既以減耗古制猶以兼行按此時戶口尚有千二百餘萬墾田亦八百萬頃至乎三國並興兩晉之後則農夫少於軍衆戰馬多於耕牛供軍須奪於農糧秣馬必侵於牛草秣馬原本作積馬今據文獻通考改正影庫本粘籤於是天下戶口只有二百四十餘萬洎隋文之代兩比隆及煬帝之年又三分去一我唐太宗文皇帝以四夷初定百姓未豐延訪羣臣各陳所見惟魏徵獨勸文皇力行王道由是輕徭薄賦不奪農時進賢良悅忠直天下粟價斗直兩錢自貞觀至於開元將及一千九百萬戶五千三百萬口墾田一千四百萬頃比之堯舜又極增加是知救人瘼者以重斂為病源料兵食者以惠農為軍政仲尼云百姓足君孰與不足臣之此言是魏徵所以勸文皇也伏惟深留宸鑒如以六軍方闕不可輕徭兩稅之餘猶須重斂則但不以折納為事一切以本色輸官又不以紐配為名止以正耗加納猶應感悅未至流亡況今東作是時羸牛將駕是時二字疑有舛誤考五代會要亦作是時今姑仍其舊影庫本粘籤數州之地千里運糧有此差徭必妨春種今秋若無糧草何以贍軍臣伏思漢文帝時欲人務農乃募人入粟得拜爵及贖罪景帝亦如之後漢安帝時水旱不足三公奏請富人入粟得關內候及公卿以下散官本朝乾元中亦曾如此今陛下縱不欲入粟授官願明降制旨下諸道合差百姓轉倉之處有能出力運官物到京師五百石以上白身授一初任州縣官有官者依資遷授欠選者便與放選放選原本作於選今據文獻通考改正影庫本粘籤千石以上至萬石不拘文武明示賞酬免令方春農人流散斯亦救民轉倉贍軍之一術也莊宗深重之尋命為國計使垂為輔相俄遇蕭牆之難而止及明宗即位豆盧革韋說得罪任圜陳奏請命琪為相為孔循鄭王玉排沮乃相崔協琪時為御史大夫安重誨於臺門前專殺殿直馬延馬延原本作馬廷考歐陽史及通鑑俱作馬延今改正影庫本粘籤雖曾彈奏而依違詞旨不敢正言其罪以是託疾三上章請老朝旨不允除授尚書左僕射自是之後尤為宰執所忌凡有奏陳靡不望風橫沮天成末明宗自汴州還洛琪為東都留司官班首奏請至偃師奉迎時琪奏中有敗契丹之凶黨破真定之逆城之言詔曰契丹即為凶黨真定不是逆城李琪罰一月俸又嘗奉敕撰霍彥威神道碑文琪梁之故相也彥威仕梁歷任不言其偽中書奏曰不分真偽是混功名望令改撰詔從之多此類也琪雖博學多才拙於遵養時晦知時不可為然猶多岐取進動而見排由己不能鎮靜也以太子太傅致仕案歐陽史作少傅舊五代史考異長興中卒於福善里第時年六十子貞官至邑宰琪以在內署時所為制詔編為十卷目曰金門集大行於世永樂大典卷一萬三百八十九蕭頃字子澄京兆萬年人故相倣之孫京兆尹廩之子頃聰悟善屬文昭宗朝擢進士第歷度支巡官太常博士右補闕時國步艱難連帥倔強率多奏請欲立家廟於本鎮頃上章論奏乃止累遷吏部員外郎先是張濬自中書出為右僕射梁祖判官高劭使梁祖廕求一子出身官省寺皆稱無例濬曲為行之指揮甚急吏徒惶恐頃判云僕射未集郎官赴省上指揮公事且非南宮舊儀濬聞之慚悚致謝頃由是知名梁祖亦奬之頃入梁歷給諫御史中丞禮部侍郎知貢舉咸有能名自吏部侍郎拜中書門下平章事與李琪同輔梁室同輔原本作同轉今據文改正影庫本粘籤事多矛盾莊宗入汴頃坐貶登州司戶量移濮州司馬數年遷太子賓客天成初為禮部尚書太常卿太子少保致仕卒時年六十九輟朝一日贈太子少師永樂大典卷五千二百二十五史臣曰夫相輔之才從古難得蓋文學政事履行謀猷不可缺一故也如數君子者皆互有所長亦近代之良相也如齊公之明節李琪之文章足以圭表搢紳笙簧典誥陟之廊廟宜無愧焉永樂大典卷二千七百四十
