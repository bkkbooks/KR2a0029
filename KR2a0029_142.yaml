body:
  text: 大戴禮及通典亦有夾室大戴大戴禮及通典大戴禮及大戴禮及通典亦有夾大戴大大大戴禮及大大戴大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二大戴禮及通典亦有夾室察文觀義乃是備廟之制況新主祔廟諸經有遷易之文考古沿今庶合通禮伏請遞遷諸室奉安大行皇帝神主以符禮意敕依典禮永樂大典卷一萬七千五十二
