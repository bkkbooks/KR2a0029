body:
  text: 內外官當贖之法梁唐內外官當贖之內外官當贖之法梁唐皆無內外官當內外官當贖之法梁唐皆無定制多示優容或因時分輕重晉天福六年五月尚書刑部員外郎李象請今後凡是散官不計高低若犯罪不得當贖亦不得內外官當贖之法梁唐皆無定制多示優容或因時分輕重晉天福六年五月尚書刑部員外郎李象請今後凡是散官不計高低若犯罪不得當贖亦不得上請詳定院覆奏應內外文武官有品官者自從品官法無品官有散內外官當贖之法梁唐皆無定制多示優容或因時分輕重晉天福內外官當贖之法梁唐皆無定制多內外官當贖之法梁唐皆無定制多示優容或內外官當贖之法梁唐皆無定制多示優容或因時分輕重晉天福六年五月尚書刑部員外郎李象請今後凡是散內外官當贖之法梁唐皆無定制多示優容或因時分輕重晉天福六年五月尚書刑部員外郎李象請今後凡是散官不計高低若犯罪不得當贖亦不得上請詳定院覆奏應內外文武官有品官者自從品官法無品官有散試官者應內外帶職廷臣賓從有功將校等並請同請同原本作請周今據文改正影庫本粘籤九品官例其京都運巡使及諸道州府衙前職員內外雜任鎮將等並請准律不得上請當贖其巡司馬步司判官雖有曾歷品官內外官當贖之法梁唐皆無定制多示優容或因時分輕重晉天福六年五月尚書刑部員外郎李象請今後凡是散官不計高低若犯罪不得當贖亦不得上請詳定院覆奏應內外文武官有品官者自從品官法無品官有散試官者應內外帶職廷臣賓從有功將校等並請同請同原本作請周今據文改正影庫本粘籤九品官例其京都運巡使及諸道州府衙前職員內外雜任鎮將等並請准律不得上請當贖其巡司馬步司判官雖有曾歷品官者亦請同流外職准律杖罪以下依決罰例徒罪以上仍依當贖法至周顯德五年七月新定刑統今後定罪諸道行軍司馬節度副使副留守准從五品官例諸道兩使判官防禦團練副使准從六品官例節度掌書記團判官兩蕃營田等使判官准從七品官例諸道推巡及軍事判官准從八品官例諸軍將校內諸司使使副供奉殿直臨時奏聽敕旨由是內外品官當贖之法始有定制焉永樂大典卷八千二百九十內外官當贖之法梁唐皆無定制多示優容或因時分輕重晉天福六年五月尚書刑部員外郎李象請今後凡是散官不計高低若犯罪不得當贖亦不得上請詳定院覆奏應內外文武官有品官者自從品官法無品官有散試官者應內外帶職廷臣賓從有功將校等並請同請同原本作請周今據文改正影庫本粘籤九品官例其京都運巡使及諸道州府衙前職員內外雜任鎮將等並請准律不得上請當贖其巡司馬步司判官雖有曾歷品官者亦請同流外職准律杖罪以下依決罰例徒罪以上仍依當贖法至周顯德五年七月新定刑統今後定罪諸道行軍司馬節度副使副留守准從五品官例諸道兩使判官防禦團練副使准從六品官例節度掌書記團判官兩蕃營田等使判官准從七品官例諸道推巡及軍事判官准從八品官例諸軍將校內諸司使使副供奉殿直臨時奏聽敕旨由是內外品官當贖之法始有定制焉永樂大典卷八千二百九十內外官當贖之法梁唐皆無定制多示優容或因時分輕重晉天福六年五月尚書刑部員外郎李象請今後凡是散官不計高低若犯罪不得當贖亦不得上請詳定院覆奏應內外文武官有品官者自從品官法無品官有散試官者應內外帶職廷臣賓從有功將校等並請同請同原本作請周今據文改正影庫本粘籤九品官例其京都運巡使及諸道州府衙前職員內外雜任鎮將等並請准律不得上請當贖其巡司馬步司判官雖有曾歷品官者亦請同流外職准律杖罪以下依決罰例徒罪以上仍依當贖法至周顯德五年七月新定刑統今後定罪諸道行軍司馬節度副使副留守准從五品官例諸道兩使判官防禦團練副使准從六品官例節度掌書記團判官兩蕃營田等使判官准從七品官例諸道推巡及軍事判官准從八品官例諸軍將校內諸司使使副供奉殿直臨時奏聽敕旨由是內外品官當贖之法始有定制焉永樂大典卷八千二百九十內外官當贖之法梁唐皆無定制多示優容或因時分輕重晉天福六年五月尚書刑部員外郎李象請今後凡是散官不計高低若犯罪不得當贖亦不得上請詳定院覆奏應內外文武官有品官者自從品官法無品官有散試官者應內外帶職廷臣賓從有功將校等並請同請同原本作請周今據文改正影庫本粘籤九品官例其京都運巡使及諸道州府衙前職員內外雜任鎮將等並請准律不得上請當贖其巡司馬步司判官雖有曾歷品官者亦請同流外職准律杖罪以下依決罰例徒罪以上仍依當贖法至周顯德五年七月新定刑統今後定罪諸道行軍司馬節度副使副留守准從五品官例諸道兩使判官防禦團練副使准從六品官例節度掌書記團判官兩蕃營田等使判官准從七品官例諸道推巡及軍事判官准從八品官例諸軍將校內諸司使使副供奉殿直臨時奏聽敕旨由是內外品官當贖之法始有定制焉永樂大典卷八千二百九十內外官當贖之法梁唐皆無定制多示優容或因時分輕重晉天福六年五月尚書刑部員外郎李象請今後凡是散官不計高低若犯罪不得當贖亦不得上請詳定院覆奏應內外文武官有品官者自從品官法無品官有散試官者應內外帶職廷臣賓從有功將校等並請同請同原本作請周今據文改正影庫本粘籤九品官例其京都運巡使及諸道州府衙前職員內外雜任鎮將等並請准律不得上請當贖其巡司馬步司判官雖有曾歷品官者亦請同流外職准律杖罪以下依決罰例徒罪以