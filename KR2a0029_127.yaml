body:
  text: 己酉制削奪行友官爵己酉制削奪行友官爵禁錮私己酉制削奪行友官爵禁錮私己己己酉制削奪行己酉制己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之遠也永樂大典卷三千五百六十一己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之遠也永樂大典卷三千五百六十一己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之遠也永樂大典卷三千五百六十一己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之遠也永樂大典卷三千五百六十一己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之遠也永樂大典卷三千五百六十一己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之遠也永樂大典卷三千五百六十一己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之遠也永樂大典卷三千五百六十一己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之遠也永樂大典卷三千五百六十一己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之遠也永樂大典卷三千五百六十一己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之遠也永樂大典卷三千五百六十一己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之遠也永樂大典卷三千五百六十一己酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之舊五代史考異史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圖南趙暉首變陝郊同扶義舉漢之興也暉有力焉命以作藩斯無愧矣守恩乘時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之