body:
  text: 舊五代史卷六十八唐書四十四列傳第二十薛廷圭其先河東人也父逢咸通中為祕書監以才名著于時廷圭中和年在西川登進士第纍歷臺省案舊唐書大順初纍遷司勳員外郎知制誥舊五代史考異乾寧中為中書舍人駕在華州改散騎常侍尋請致仕客遊蜀川昭宗遷洛陽徵為禮部侍郎案舊唐書光化中復為中書舍人遷刑部吏部二侍郎權知禮部貢舉拜尚書左丞舊五代史考異時柳璨屠害朝士衣冠畢罹其毒廷圭以居常退讓獲全案新唐書朱全忠兼四鎮廷圭以官告使至汴客將先見諷其拜廷圭佯不曉曰吾何德敢受令公拜乎及見卒不肯加禮舊五代史考異入梁為禮部尚書莊宗平定河南以廷圭年老除太子少師致仕案通鑑廷圭與李琪嘗為太祖册禮使舊五代史考異同光三年九月卒贈右僕射所著鳳閣詞書十卷克家志五卷並行于世初廷圭父逢著鑿混沌真珠簾等賦珠簾原本作殊廉今據文苑英華改正影庫本粘籤大為時人所稱廷圭既壯亦著賦數十篇同為一集故目曰克家志永樂大典卷二萬一千三百六十七崔沂案新唐書宰相世系表沂字德潤舊五代史考異大中時宰相魏公鉉之幼子也兄沆廣明初亦為宰輔沂舉進士第歷監察補闕昭宗時纍遷至員外郎知制誥性抗厲守道而文藻非優嘗與同舍顏蕘錢珝俱秉筆同舍原本作周舍今據文改正影庫本粘籤見蕘珝贍速草制數十無妨談笑而沂自愧翌日謁國相訴曰沂疏淺不足以供詞翰之職相輔然之移為諫議大夫入梁為御史司憲糾繆繩違不避豪右開平中金吾街使寇彥卿入朝過天津橋市民梁現者不時回避梁現册府元龜作梁觀考通鑑注亦作現今仍其舊影庫本粘籤前導伍伯捽之投石欄以致斃彥卿自前白於梁祖梁祖命通事舍人趙可封宣諭令出私財與死者之家以贖其罪沂奏劾曰彥卿位是人臣無專殺之理況天津橋御路之要正對端門當車駕出入之途非街使震怒之所況梁現不時回避其過止於鞭笞捽首投軀深乖朝憲請論之以法梁祖惜彥卿令沂以過失論沂引鬬競律以怙勢力為罪首下手者減一等又鬬毆條不鬬故毆傷人者加傷罪一等沂表入責授彥卿遊擊將軍左衛中郎將沂剛正守法人士多之遷左司侍郎改太常卿轉禮部尚書貞明中帶本官充西京副留守時張全義留守天下兵馬副元帥河南尹判六軍諸衛事守太尉中書令魏王名位之重冠絶中外沂至府客將白以副留守合行廷禮沂曰張公官位至重然尚帶府尹之名不知副留守見尹之儀何如全義知之遽引見沂勞曰彼此有禮俱老矣勿相勞煩莊宗興復唐室復用為左丞判吏部尚書銓選司坐纍謫石州司馬明宗即位召還復為左丞以衰疾告老授太子少保致仕卒於龍門之別墅時年七十餘贈太子少傅永樂大典卷二千七百四十劉嶽字昭輔其先遼東襄平人元魏平定遼東徙家于代隨孝文遷洛遂為洛陽人八代祖民部尚書渝國公政會渝國公原本作諭國公今據新唐書劉政會傳改正影庫本粘籤武德時功臣祖符蔡州刺史父圭洪洞縣令符有子八人皆登進士第圭之母弟瓌玕異母弟崇夷崇龜崇望崇望原本作崇梁考新舊唐書及北夢瑣言俱作崇望知原本梁字係傳寫之誤今改正影庫本粘籤崇魯崇崇龜乾寧中廣南節度使崇望乾寧中宰相崇魯崇崇夷並歷朝省嶽少孤亦進士擢第歷戶部巡官鄭縣簿直史館轉左拾遺侍御史梁貞明初召入翰林為學士嶽為文敏速尤善談諧在職纍遷戶部侍郎在翰林十二年莊宗入汴隨例貶均州司馬尋丁母憂許自貶所奔喪服闋授太子詹事明宗即位歷兵部吏部侍郎祕書監太常卿卒年五十六贈吏部尚書嶽文學之外通於典禮天成中奉詔撰新書儀一部文約而理當案歐陽史謂其事出鄙俚兩史褒貶微有異同舊五代史考異今行於世子溫叟仕至御史中丞永樂大典卷九千九十八案東都事略溫叟以父名嶽終身不聽樂宋史云晉少帝時溫叟充翰林學士初嶽仕後唐嘗居內署至是溫叟復居斯任時人榮之溫叟既受命歸為母壽候立堂下須臾聞樂聲兩青衣舉箱出庭奉紫袍兼衣母命捲簾見溫叟曰此即爾父在禁中日內庫所賜者溫叟拜受泣下案嶽仕梁已為翰林學士宋史作仕後唐歷內署微異舊五代史考異案國老談苑云劉溫叟方正守道以名教為己任幼孤事母以孝聞其母甚賢初為翰林學士私庭拜母母即命二婢箱擎公服金帶置于階下謂溫叟曰此汝父長興中入翰林時所賜也自先君子薨背以來嘗懼家門替墜今汝能自致青雲繼父之職可服之無愧矣因欷歔掩泣溫叟伏地號慟退就別寢素衣蔬食追慕數日然後服之士大夫以為得禮殿本考劉嶽在貞明中已為翰林學士至唐長興中復為學士薛史未及詳載孔本封舜卿案原本有闕文據新唐書宰相世系表封氏世居渤海草修縣舜卿字贊聖父敖字碩夫戶部尚書渤海縣男唐書有傳舊五代史考異仕梁為禮部侍郎知貢舉案太平廣記引王氏見聞録云封舜卿文詞特異才地兼優梁使聘於蜀時岐梁眥睚關路不通遂泝漢江而上考薛史本紀及通鑑俱不載封舜卿使蜀事孔本開平三年奉使幽州以門生鄭致雍從行復命之日又與致雍同受命入翰林為學士致雍有俊才舜卿雖有文辭才思拙澀及試五題不勝困弊因託致雍秉筆當時譏者以為座主辱門生册府元龜卷九百三十九案以下有闕文殿本莊宗同光已來纍歷清顯封氏自太和以來世居兩制以文筆稱于時舜卿從子渭案世系表渭字希叟舊五代史考異昭宗遷雒時為翰林學士舜卿為中書舍人叔姪對掌內外制從子翹於梁貞明中亦為翰林學士册府元龜卷七百七十一天成中為給事中因轉對上言以星辰合度風雨應時請御前香一合帝親爇一炷餘令於塔廟中焚之貴表精至議者以翹時推名族出朝苑登瑣闈甚有巖廊之望而忽有此請乃近諸妖佞耳物望由是減之永樂大典卷六千三十四案封舜卿傳永樂大典中僅存一條今採册府元龜以存梗概竇夢徵同州人案通鑑作棣州人舊五代史考異少苦心為文登進士第歷校書郎自拾遺召入翰林充學士梁貞明中加兩浙錢鏐元帥之命夢徵以鏐無功於中原兵柄不宜虛授其言切直梁末帝以觸時忌左授外任案玉堂間話夢徵抱麻哭於朝翌日謫掾于東州通鑑采用之據梁末帝紀夢徵貶蓬萊尉舊五代史考異玉堂間話竇以錢公無功于本朝僻在一方坐邀恩澤不稱是命乃抱麻哭于朝翌日竇謫掾于東州殿本有頃復召為學士及莊宗入汴夢徵以例貶沂州沂州原本作欣州今據莊宗本紀改正影庫本粘籤居嘗感梁末帝舊恩因為祭故君文云嗚呼四海九州天回眷命一女二夫人之不幸當革故以鼎新若金銷而火盛必然之理夫何足競云秉筆者皆許之尋量移宿州天成初遷中書舍人復入為翰林學士工部侍郎卒贈禮部尚書案玉堂間話云竇失意被謫嘗鬱鬱不樂曾夢有人謂曰君無自苦不久當復故職然將來慎勿為丞相苟有是命當萬計避之其後竇復居禁職有頃遷工部侍郎竇忽憶夢中所言深惡其事然已受命不能遜避未幾果卒舊五代史考異夢徵隨計之秋文稱甚高尤長於箋啓編為十卷目曰東堂集行於世永樂大典卷一萬九千三百五十四李保殷河南洛陽人也昭宗朝自處士除太子正字改錢塘縣尉浙東帥董昌辟為推官調補河府兵曹參軍歷長水令毛詩博士纍官至太常少卿端王傅入為大理卿撰刑律總要十二卷與兵部侍郎郗殷象論刑法事左降房州司馬同光初授殿中監以其素有明法律之譽拜大理卿未滿秩屬為人所制保殷曰人之多辟無自立辟乃謝病以歸卒於洛陽永樂大典卷一萬三百八十九歸藹字文彥吳郡人也曾祖登祖融父仁澤位皆至列曹尚書觀察使藹登進士第及升朝遍歷三署案以下疑有闕文據舊唐書昭宗紀天祐元年七月宴于文思殿朱全忠入百官或坐于廊下全忠怒笞通引官何凝丙寅制金紫光祿大夫行御史中丞上柱國韓儀責授棣州司馬侍御史歸藹責授登州司戶坐百官傲全忠也此事應見薛史今無可考同光初為尚書右丞遷刑戶二部侍郎以太子賓客致仕卒年七十六永樂大典卷二千七百二孔邈文宣王四十一代孫身長七尺餘神氣溫厚登進士第歷校書郎萬年尉充集賢校理永樂大典卷二千九百二十五為諫議大夫以年老致仕册府元龜卷八百九十九案孔邈傳永樂大典中僅存一條考册府元龜云乾寧五年登進士第除校書郎崔遠在中書奏萬年尉充集賢校理以親舅獨孤損方在廊廟避嫌不赴職蓋册府元龜兼采後唐實録之文與薛史異孔邈在後唐不應一無表見今無可復考謹録原本如右張文寶昭宗朝諫議大夫顗之子也文寶初依河中朱友謙為從事莊宗即位於魏州以文寶知制誥歷中書舍人刑部侍郎左散騎常侍知貢舉遷吏部侍郎文寶性雅淡稽古長興初奉使浙中泛海船壞水工以小舟救文寶與副使吏部郎中張絢信風至淮南界案通鑑作風飄至天長胡三省注疑天長地不通海薛史作淮南界為得其實舊五代史考異案通鑑作風飄至天長從者二百人所存者五人胡三省云天長縣在揚州西一百一十里其地北不至淮東不至海豈小舟隨風所能至通州海門縣崇明鎮東海中有大洲謂之天賜鹽場舟人揚帆遇順東南可以徑至明州定海西南可以至許浦達蘇州恐是此處孔本偽吳楊溥禮待甚至兼厚遺錢幣食物文寶受其食物反其錢幣吳人善之送文寶等復至杭州宣國命還青州卒子吉嗣位邑宰永樂大典卷六千三百九十陳薊門人也薊門原本作門今據文改正影庫本粘籤少好學善屬文因避亂客於浮陽轉徙於大梁梁將張漢傑延於私邸表授太子舍人莊宗平梁郭崇韜遙領常山召居賓榻崇韜從魏王繼岌伐蜀署為招討判官崇韜死明宗即位隨任圜歸闕圜薦之於朝除膳部員外郎知制誥纍遷中書舍人案通鑑作閏月以膳部郎中知制誥陳為給事中充樞密直學士與此傳互有詳略舊五代史考異性陰僻寡與人合不為當路所與尋移左散騎常侍由是忿以成疾踰月而卒微有才術嘗自恃其能為判官日人有造者垂帷深處罕見其面及居西掖而姿態愈倨位竟不至公卿蓋器度促狹者也然性孤執尤廉於財長興中嘗自舍人銜命册晉國公主石氏於太原晉高祖善待之但訝其高岸人或有獻可於宜陳一謳頌以稱晉高祖之美可邀其厚賄耳曰人生貧富咸有定分未有持天子命違禮以求利既損國綱且虧士行今生所不為也聞者嘉之晉高祖即位贈禮部尚書永樂大典卷三千一百三十五劉贊案通鑑作劉瓚舊五代史考異魏州人也幼有文性父玭為令録誨以詩書夏月令服青襦單衫玭每肉食別置蔬食以飯贊謂之曰肉食君之祿也爾欲食肉當苦心文藝自可致之吾祿不可分也繇是贊及冠有文辭年三十餘登進士第魏州節度使羅紹威署巡官罷歸京師依開封尹劉鄩久之租庸使趙巖表為巡官纍遷至金部員外郎職如故莊宗入汴租庸副使孔謙以贊里人表為鹽鐵判官天成中歷知制誥中書舍人與學士竇夢徵同年登第鄰居友善夢徵卒贊與同年楊凝式緦麻為位而哭其家無嫡長與視喪事恤其孀稚人士稱之改御史中丞刑部侍郎案通鑑作兵部侍郎舊五代史考異贊性雍和與物無忤居官畏慎人若以私干之雖權豪不能移其操未幾改祕書監兼秦王傅案册府元龜秦王為元帥秦王府判官太子詹事王居敏與贊鄉曲之舊以秦王盛年自恣須朝中選端士納誨冀其稟畏乃奏薦贊焉舊五代史考異贊節概貞素忽聞其命掩泣固辭竟不能止案通鑑瓚自以左遷泣訴不得免胡三省注云唐制六部侍郎除吏部之外餘皆從四品下王傅從三品然六部侍郎為嚮用王傅為左遷以職事有間劇之不同也當是時從榮地居儲副則秦王傅不可以間官言蓋以從榮輕佻峻急恐豫其禍故求脫耳舊五代史考異時秦王參佐皆新進小生動多輕脫每稱頌秦王功德阿意順旨祗奉談笑惟贊從容諷議必獻嘉言秦王常接見賓僚及遊客於酒筵之中悉令秉筆賦詩案册府元龜時從榮溺于篇章凡門客及通謁遊士必坐于客次自出題目令賦一章然後接見舊五代史考異贊為師傅亦與諸客混然容狀不悅秦王知其意自是戒典客贊至勿通令每月一度至衙案言行龜鑑載劉贊諫秦王曰殿下宜以孝敬為職浮華非所尚也秦王不悅戒閽者後弗引進舊五代史考異贊既官係王府不敢朝參不通慶弔但閉關喑嗚而已及秦王得罪或言贊止於朝降朝降二字疑有舛誤考册府元龜所引薛史亦作朝降詳其文義當為降為京朝官不至外謫也今仍其舊影庫本粘籤而贊已服麻衣備驢乘在門矣聞其言曰豈有國君之嗣一旦舉室塗地而賓佐朝降得免死幸也俄而臺史示敕長流嵐州即時赴貶所在嵐州踰年清泰二年春詔歸田里妻紇干氏塗中卒贊比羸瘠慟哭殆絶因之亦病行及石會關而卒時年六十餘永樂大典卷九千九十九史臣曰自唐祚橫流衣冠掃地苟無端士孰恢素風如廷圭之文學崔沂之剛正劉嶽之典禮舜卿之掌誥洎夢徵而下皆蔚有貞規無懿範固可以為搢紳之圭表聳朝廷之羽儀以之垂名夫何不韙永樂大典卷二千七百四十
