body:
  text: 舊五代史卷五十一唐書二十七宗室列傳第三案薛史唐宗室傳武皇諸子莊宗諸子末帝諸子永樂大典中僅存數語其全篇已佚明宗子唯許王從益有全傳秦王從榮傳尚存一百一十二字蓋永樂大典割截以歸各韻其全篇當即在失去諸卷之中今無可復考謹據冊府元龜所載以補其闕復考五代會要通鑑諸書分註于下用備後唐諸王之始末焉永王存霸武皇子莊宗第二弟同光三年封莊宗敗為軍卒所殺永樂大典卷一萬六千六百二十八案歐陽史云存霸歷昭義天平河中三軍節度使居京師食俸祿而已趙在禮反乃遣存霸于河中莊宗再幸汜水徙存霸北京留守通鑑云李紹榮欲奔河中就永王存霸從兵稍散存霸亦帥衆千人棄鎮奔晉陽又云存霸至晉陽從兵逃散俱盡存霸削髮僧服謁李彥超願為山僧幸垂庇護軍士爭欲殺之彥超曰六相公來當奏取進止軍士不聽殺之於府門之碑下邕王存美武皇子莊宗第三弟同光三年封莊宗敗不知所終永樂大典卷一萬六千六百二十八案通鑑云存美以病風偏枯得免居於晉陽薛王存禮武皇子案薛史不言存禮為武皇第幾子據五代會要太祖第二子存美第三子存霸第四子存禮第五子存渥第六子存第七子存確第八子存紀與薛史所微有異同同光三年封莊宗敗不知所終永樂大典卷一萬六千六百二十八申王存渥莊宗第四弟案歐陽史存渥與存霸存紀皆莊宗同母弟同光三年封莊宗敗與劉皇后同奔太原為部下所殺永樂大典卷一萬六千六百二十八案通鑑云存渥至晉陽李彥超不納走至風谷為其下所殺睦王存莊宗第五弟同光三年封永樂大典卷一萬六千六百二十八歷鄜州節度使冊府元龜卷二百八十一後以郭崇韜壻為莊宗所殺永樂大典卷一萬六千六百二十八案北夢瑣言云莊宗異母弟存以郭崇韜女壻伏誅先是郭崇韜既誅之後朝野駭惋議論紛然莊宗令閹人察訪外事言存於諸將坐上訴郭氏之無罪其言怨望又於妖術人楊千郎家飲酒聚會攘臂而泣楊千郎者魏州賤民自言得墨子術于婦翁能役使陰物帽下召食物果實之類又蒱博必勝人有拳握之物以法必取又說煉丹乾汞易人形破鐍貴要間神奇之官至尚書郎賜紫其妻出入宮禁承恩用事皇弟存乂常朋淫於其家至是與存乂並罹其禍通王存確莊宗第六弟雅王存紀莊宗第七弟同光三年封莊宗敗並為霍彥威所殺永樂大典卷一萬六千六百二十八案薛史及五代會要皆止言莊宗有六弟孝梁紀太祖有子廷鸞落落盧文進傳莊宗又有弟存矩薛史宗室傳皆不載魏王繼岌莊宗子也案莊宗紀稱繼岌為第三子然莊宗長子次子之名薛史與五代會要皆不載莊宗即位於魏州以繼岌充北都留守及以鎮州為北都又命為留守冊府元龜卷二百八十一案五代會要三年九月二十三日封為魏王三年伐蜀以繼岌為都統郭崇韜為招討使十月戊寅至鳳州武興軍節度使王承捷以鳳興文扶四州降甲申至故鎮康延孝收興州時偽蜀主王衍率親軍五萬在利州令步騎親軍三萬逆戰於三泉康延孝李嚴以勁騎三千犯之蜀軍大敗斬首五千級餘各奔潰王衍聞其敗也棄利州奔歸西川斷吉柏津浮梁而去己丑繼岌至興州偽蜀東川節度使宋光葆以梓綿劍龍普等州來降武定軍節度使王承肇以洋蓬壁三州符印降興元節度使王宗威以梁開通渠麟等五州符印送降階州王承岳納符印秦州節度使王承休棄城而遁辛丑繼岌過利州戊申至劍州己酉至綿州王衍遣使上牋乞降丁巳入成都自興師出洛至定蜀計七十五日走丸之勢前代所無冊府元龜卷二百九十一師回至渭南聞莊宗敗師徒潰散自縊死案太平廣記引王氏見聞錄云後唐莊宗世子魏王繼岌伐蜀迴軍在道而有鄴都之變莊宗與劉后命內臣張漢賓齎急詔所在催魏王歸闕張漢賓乘驛倍道急行至興元西縣逢魏王宣傳詔旨王以本軍方討漢州康延孝相次繼來欲候之出山以陳凱歌漢賓督之有軍謀陳岷比事梁與漢賓熟密問張曰天子改換且是何人張色莊曰我嘗面奉宣詔魏王况大軍在行談何容易陳岷曰久忝知聞故敢諮問兩日來有一信風新人已即位矣復何形迹張乃說來時聞李嗣源過河未知近事岷曰魏王且請盤桓以觀其勢未可前邁張以莊宗命嚴不敢遷延督令進發魏王至渭南遇害舊五代史考異繼潼繼嵩繼蟾繼嶢並莊宗子同光三年拜光祿大夫檢校司徒未封莊宗敗並不知所終永樂大典卷一萬六千六百二十八案清異錄唐褔慶公主下降孟知祥長興四年明宗晏駕唐室亂莊宗諸兒削髮為苾芻間道走蜀時知祥新稱帝為公主厚待猶子賜予千計舊五代史考異從璟明宗長子性忠勇沈厚摧堅陷陣人罕偕焉冊府元龜卷二百七十一從莊宗于河上累有戰功莊宗器賞之用為金鎗指揮使冊府元龜卷二百九十一明宗在魏府為軍士所逼莊宗詔從璟曰爾父于國有大功忠孝之心朕自明信今為亂兵所劫爾宜自去宣朕旨無令有疑從璟行至中途為元行欽所制復與歸洛下莊宗改其名為繼璟以為己子命再往從璟固執不行願死于御前以明丹赤從莊宗赴汴州明宗之親舊多策馬而去左右或勸從璟令自脫終無行意尋為元行欽所殺天成初贈太保冊府元龜卷二百八十六秦王從榮明宗第二子也明宗踐阼天成初授鄴都留守天雄軍節度使三年移北京留守充河東節度使四年入為河南尹冊府元龜卷二百八十一一日明宗謂安重誨曰近聞從榮左右有詐宣朕旨令勿接儒生儒生多懦恐鈍志相染朕方知之頗駭其事余比以從榮方幼出臨大藩故選儒雅賴其裨佐今聞此姦憸之言豈朕之所望也鞫其言者將戮之重誨曰若遽行刑又慮賓從難處且望嚴誡遂止永樂大典卷六千七百六十從榮為詩與從事高輦等更相唱和自謂章句獨步於一時有詩千餘首號曰紫府集冊府元龜卷二百七十長興中以本官充天下兵馬大元帥冊府元龜卷二百六十九從榮乃請以嚴衞捧聖步騎兩指揮為秦府衙兵每入朝以數百騎從行出則張弓挾矢馳騁盈巷既受元帥之命即令其府屬僚佐及四方遊士各試檄淮南書一道陳己將廓清宇內之意初言事者請為親王置師傅明宗顧問近臣執政以從榮名勢既隆不敢忤旨即奏云王官宜委從榮乃奏刑部侍郎劉贊為王傅又奏翰林學士崔梲為元帥府判官明宗曰學士代予詔令不可擬議從榮不悅退謂左右曰既付以元帥之任而阻予請僚佐又未諭制旨也復奏刑部侍郎任贊從之冊府元龜卷二百九十九案宋史趙上交傳秦王從榮開府兼判軍衞以上交為虞部員外郎充六軍諸衞推官李澣張沆魚崇遠皆白衣在秦府悉與上交友善累遷司封郎中充判官從榮素豪邁不遵禮法好昵羣小上交從容言曰王位尊嚴當修令德以慰民望王忍為此獨不見恭世子戾太子之事乎從榮怒出之歷涇秦二鎮節度判官從榮及禍僚屬皆坐斥上交由是知名舊五代史考異後舉兵犯宮室敗死廢為庶人永樂大典卷一萬六千六百二十八案通鑑明宗紀云己丑大漸秦王從榮入問疾帝俛首不能舉王淑妃曰從榮在此帝不應從榮出聞宮中皆哭從榮意帝已殂明旦稱疾不入是夕帝實小愈而從榮不知從榮自知不為時論所與恐不得為嗣與其黨謀欲以兵入侍先制權臣壬辰從榮自河南府常服將步騎千人陳於天津橋孟漢瓊被甲乘馬召馬軍都指揮使朱洪實使將五百騎討從榮從榮方據胡床坐橋上遣左右召康義誠端門已閉叩左掖門從門𨻶窺之見朱洪實引騎兵北來走白從榮從榮大驚命取鐵掩心擐之坐調弓矢俄而騎兵大至從榮走歸府僚佐皆竄匿牙兵掠嘉善坊潰去從榮與妃劉氏匿床下皇城使安從益就斬之以其首獻丙申追廢從榮為庶人五代會要云清泰元年十二月勅故庶人從榮獲罪先帝貽禍厥身已歷歲時未營宅兆雖軫在原之念宜從有國之規且令中書門下商量葬禮尋據太常禮院狀奏請准唐貞觀中庶人承乾流死黔州仍葬以公禮從之五代史補秦王從榮明宗之愛子好為詩判河南府辟高輦為推官輦尤能為詩賓主相遇甚歡自是出入門下者當時名士有若張杭高文蔚何仲舉之徒莫不分廷抗禮更唱迭和時干戈之後武夫用事睹從榮所為皆不悅于是康知訓等竊議曰秦王好文交遊者多詞客此子若一旦南面則我等轉死溝壑不如早圖之高輦知其謀因勸秦王托疾此輩以所就之間須來問候請大王伏壯士出其不意皆斬之庶幾免禍矣從榮曰至尊在上一旦如此得無危乎輦曰子弄父兵罪當笞爾不然則悔無及矣從榮猶豫不決未幾及禍高輦棄市初從榮之敗也高輦竄于民家且落髮為僧既擒獲知訓以其毀形難認復使巾幘著緋驗其真偽然後用刑輦神色自若厲聲曰朱衣纔脫白刃難逃觀者笑之從璨明宗諸子案五代會要以從璨為明宗第四子冊府元龜作諸子與明宗紀同今仍其舊性剛直好客疏財意豁如也天成中為右衞大將軍時安重誨方秉事權從璨亦不之屈重誨常以此忌之明宗幸汴留從璨為大內皇城使一日召賓友於會節園酒酣之後戲登於御榻安重誨奏請誅之詔曰皇城使從璨朕巡幸汴州使警大內乃全乖委任但恣遨遊於予行從之園頻恣歌歡之會仍施峻法顯辱平人致彼喧譁達於聞聽方當立法固不黨親宜貶授房州司戶參軍仍令盡命長興中重誨之得罪也命復舊官仍贈太保冊府元龜卷二百九十五許王從益明宗之幼子也宮嬪所生明宗命王淑妃母之嘗謂左右曰唯此兒生於皇宮故尤所鍾愛長興末封許王晉高祖即位以皇后即其姊也乃養從益於宮中晉天褔中以從益為二王後改封郇國公郇國原本作鄒國考歐陽史及通鑑並作郇國薛史晉高祖紀亦作郇今改正影庫本粘籤食邑三千戶其後與母歸洛陽守陵開運末契丹主至汴以從益遙領曹州節度使復封許王與王妃尋歸西京會契丹主死其汴州節度使蕭翰謀歸北地慮中原無主軍民大亂則已亦不能按轡徐歸矣乃詐稱契丹主命遣人迎從益於洛陽令知南朝軍國事從益與王妃逃於徽陵以避之使者至不得已而赴焉從益於崇元殿見羣官蕭翰率部衆列拜於殿上羣官趨拜於殿下乃偽署王松為左丞相趙上交為右丞相李式翟光鄴為樞密使王景崇為宣徽使餘官各有署置又以北來燕將劉祚為權侍衞使充在京巡檢翰北歸從益餞於北郊及漢高祖將離太原從益召高行周武行德欲拒漢高祖案薛史但載從益拒漢事考宋史趙上交傳云漢祖將至從益遣上交馳表獻款蓋獻款乃淑妃從益本意也歐陽史兩存之其事始備舊五代史考異行周等不從且奏其事漢高祖怒車駕將至闕從益與王妃俱賜死於私第時年十七時人哀之永樂大典卷六千七百六十五代史闕文漢高祖自太原起軍建號至洛陽命郭從義先入京師受密旨殺王淑妃與許王從益淑妃臨刑號泣曰吾家子母何罪吾兒為契丹所立非敢與人爭國何不且留吾兒每年寒食使持一盂飯灑明宗陵寢聞者無不泣下臣謹按隱帝朝詔史臣修漢祖實錄淑妃從益傳但云臨刑之日焚香俟命蓋諱之耳重吉末帝長子為控鶴都指揮使閔帝嗣位出為亳州團練使末帝兵起為閔帝所害永樂大典卷一萬六千六百二十八案通鑑云詔遣殿直楚匡祚執亳州李重吉幽于宋州又云遣楚匡祚殺李重吉于宋州匡祚榜捶重吉責其家財清泰元年詔贈太尉仍令宋州選隙地置廟冊府元龜卷二百七十七案閔帝有子重哲授銀青光祿大夫檢校工部尚書見明宗紀歐陽史家人傳闕而不載今附識于此雍王重美末帝第二子清泰三年封晉兵入與末帝俱自焚死永樂大典卷一萬六千六百二十八案通鑑云洛陽自聞兵敗衆心大震居人四出逃竄山谷門者請禁之雍王重美曰國家多難未能為百姓主又禁其求生徒增惡名耳不若聽其自便事寧自還乃出令任從所適衆心差安又云皇后積薪欲燒宮室重美諫曰新天子至必不露居他日重勞民力死而遺怨將安用之乃止案重美傳永樂大典原本有闕佚今附錄通鑑于此疑通鑑所用即本薛史原文也史臣曰繼岌以童騃之歲當統帥之任雖成功於劍外尋求死於渭濱蓋運盡天亡非孺子之咎也從璟感厚遇之恩無苟免之意死於君側得不謂之忠乎從榮以狂躁之謀賈覆亡之禍謂為大逆則近厚誣從璨為權臣所忌從益為強敵所脅俱不得其死亦良可傷哉重美聽洛民之奔亡止母后之燔爇身雖燼於紅燄言則耀乎青編童年若斯可謂賢矣永樂大典卷六千七百六十
