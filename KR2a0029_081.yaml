body:
  text: 舊五代史卷八十一晉書七少帝紀第一少帝名重貴高祖之從子也考諱敬儒母安氏以唐天祐十一年六月二十七日生帝於太原汾陽里敬儒嘗為後唐莊宗騎將早薨高祖以帝為子帝少而謹厚高祖愛之洎歷方鎮嘗遣從行委以庶事但性好馳射有祖禰之風高祖鎮太原鎮太原上原本脫高祖二字今從冊府元龜增入影庫本粘籤命瑯琊王震案歐陽史作博士王震舊五代史考異以禮記教帝不能領其大義謂震曰非我家事業也及高祖受圍於太原親冒矢石數獻可於左右高祖愈重焉高祖受契丹冊將入洛欲留一子撫晉陽先謀於戎王戎王曰使諸子盡出吾當擇之乃於行中指帝謂高祖曰此眼大者可矣遂以帝為北京留守授金紫光祿大夫檢校司徒行太原尹知河東管內節度觀察事天福二年九月徵赴闕授光祿大夫檢校太保右金吾衞上將軍三年十二月授開封尹加檢校太傅封鄭王增食邑三千戶俄加檢校太尉同中書門下平章事六年高祖幸鄴改廣晉尹進封齊王案以下疑脫七年正月加兼侍中八字舊五代史考異是歲案此歲為天福七年此承上六年為言于中當有脫文劉本六月十三日乙丑高祖崩承遺制命柩前即皇帝位帝在幷州未著人望及保釐浚郊大有寬裕之稱從幸鄴都是歲遇旱高祖遣祈雨於白龍潭有白龍見於潭心是夜澍雨尺餘人皆異之至是果登大位焉丁卯賜侍衞諸軍將校錢一百貫下至五貫以初即位示賚也戊辰宰臣馮道等率百僚請聽政凡三上表允之庚午始聽政於崇德殿門偏廊分命廷臣以嗣位奏告天地宗廟社稷遣右驍衞將軍石德超等押先皇御馬二匹往相州西山撲祭用北俗禮也丙子以司徒兼侍中馮道為大行皇帝山陵使門下侍郎竇貞固副之太常卿崔梲為禮儀使戶部侍郎呂琦為鹵簿使御史中丞王易簡為儀仗使案徐無黨五代史記注云舊史實錄無橋道頓遞使疑不置或闕書漢高祖亦然舊五代史考異己卯遣判四方館事朱崇節案歐陽史作館使宋崇節右金吾大將軍梁言持國信物使於契丹是時河南河北關西並奏蝗害稼秋七月癸未朔百官素服臨於天清殿戊子詔應宮殿州縣及官名府號人姓名與先帝諱同音者改之改西京明堂殿為宣德殿中書政事堂為政事廳堂後官房頭為錄事餘為主事案東都事略陶穀傳穀本姓唐避晉祖諱改姓陶蓋當時避諱之體如此殿本己丑大行皇帝大祥帝釋縗服百官衣縿辛卯帝除服百官吉服壬辰太皇太后劉氏崩高祖之庶母也遺詔服紀園陵毋用后禮皇帝不得廢軍國機務既而禮官奏準令式為祖父母齊縗周又準喪葬令皇帝本服周者三哭而止請準後唐同光三年皇太妃北京薨莊宗於洛京西內發哀素服不視事三日從之從之原本作存之今據文改正影庫本粘籤仍遣國子祭酒兼戶部侍郎田敏奏告高祖靈座癸巳右諫議大夫鄭受益中書舍人楊昭儉並停見任以請假在外不赴國哀故也丁酉宰臣馮道等率文武百僚詣崇德殿門拜表請御正殿凡三上表允之安州奏水平地深七尺庚子帝御正殿宣制大赦天下諸道州府諸色罪犯除十惡五逆殺人強盜官典犯贓合作毒藥屠牛鑄錢外其餘罪犯咸赦除之襄州安從進如能果決輸誠並從釋放其中外臣僚將校並與加恩天下有蟲蝗處並與除放租稅辛丑恆州順國軍節度使杜威案杜重威避少帝諱去重字至漢始復故少帝紀皆作杜威河東節度使劉知遠並加檢校太師仍增爵邑青州平盧軍節度使楊光遠加守太師癸卯鄆州天平軍節度使兼侍衞馬步都虞候景延廣加特進同中書門下平章事充侍衞親軍都指揮使滑州義成軍節度使兼侍衞馬軍都指揮使李守貞相州彰德軍節度使侍衞步軍都指揮使郭謹並加檢校太傅仍增爵邑宰臣馮道等上表請依舊置樞密使略曰竊以樞密使創自前朝置諸近侍其來已久所便尤多頃歲樞密使劉處讓偶屬家艱爰拘喪制既從罷免暫議改更不曾顯降敕文永停使額所願各歸職分豈敢苟避繁難伏請依舊置樞密使初高祖事後唐明宗覩樞密使安重誨秉政擅權賞罰由己常惡之及登極故斷意廢罷一委中書至是馮道等厭其事繁故復請置之庶分其權表凡三上不允乙巳徐州節度使李從溫宋州節度使安彥威並加兼中書令西都留守充襄州行營都部署高行周加兼侍中鳳翔節度使李從曮加守太保遣中使就中書賜宰臣馮道生辰器幣道以幼屬亂離早喪父母不記生日堅辭不受丙午以給事中羅周岳為左散騎常侍以右諫議大夫符蒙為給事中以祕書少監兼廣晉少尹邊蔚為右散騎常侍以廣晉少尹張煦為右諫議大夫以廣晉府判官光祿少卿邊光範為右諫議大夫丁未荊南節度使南平王高從誨加兼尚書令湖南節度使楚王馬希範加守太傅自是藩侯郡守皆第加官封示溥恩也是月州郡十七蝗八月壬子朔百官素服臨於天清殿乙卯以左散騎常侍羅周岳為東京副留守庚申以山陵禮儀使太常卿崔梲為太子賓客分司西都病故也壬戌晉昌軍節度使桑維翰加檢校太傅甲子宰臣馮道加守太尉趙瑩加中書令李崧加左僕射兼門下侍郎和凝加右僕射契丹遣使致慰禮馬二十匹及羅絹等物是日襄州行營都部署高行周奏收復襄州安從進自焚而死生擒男弘贊斬之案高行周克襄州五代春秋及通鑑俱不書日遼史作甲子晉復襄州蓋以奏聞之日為收城之日也歐陽史作八月戊午高行周克襄州當得其實孔本前河東節度使康福卒贈太師諡曰武安戊辰以太子太保兼尚書左僕射劉昫為太子太傅詔賜襄州城內百姓粟大戶二斛小戶一斛以久困重圍也己巳以太子賓客趙元輔權判太常卿事充山陵禮儀使庚午葬太皇太后於魏縣秦固村癸酉契丹遣使致祭於高祖賻禮御馬二匹羊千口絹千匹契丹主母亦遣使來慰詔免襄州城內人戶今年夏秋來屋稅其城外下營處與放二年租稅應被安從進脅從者一切不問是月河中河東河西徐晉商汝等州蝗九月丁丑朔百官素服臨於天清殿己卯分命朝臣詣寺觀禱雨辛巳兩浙節度使吳越國王錢弘佐福建節度使王延羲並加食邑仍改賜功臣名號癸未帝御乾明門觀襄州行營都部署高行周都監張從恩等獻俘馘有司宣露布訖以安從進男弘受等四十四人狥於市皆斬之曲赦京城禁囚甲申宴班師將校於崇德殿賜物有差乙酉宰臣和凝上迴河頌賜鞍馬器帛丁亥以宋州歸德軍節度使安彥威為西京留守兼河南尹以襄州行營都部署西京留守高行周為宋州節度使加檢校太師戊子降襄州為防禦使額均房二州割屬鄧州升泌州為團練使額己丑以東京留守兼開封尹李德珫為廣晉尹以宣徽南院使襄州行營都監張從恩為東京留守兼開封尹加檢校太尉以前同州節度使襄州行營副部署宋彥筠為鄧州威勝軍節度使加檢校太尉山陵禮儀使撰高祖祔饗太廟酌獻樂章上之庚寅詔今後除授留守宜降麻制癸巳樂平公主史氏進封魯國大長公主壽安長公主烏氏進封衞國大長公主鄭國長公主杜氏進封宋國大長公主荊南高從誨累表讓尚書令之命己亥追封故秦國長公主為梁國長公主故永壽長公主為岐國大長公主故延慶長公主為邠國大長公主辛丑以義成軍節度使兼侍衞馬軍都指揮使李守貞充大行皇帝山陵一行都部署壬寅以宣徽北院使判三司劉遂清為鄭州防禦使以澶州防禦使李承福為宣徽北院使癸卯詔大行皇帝十一月十日山陵宜自十月一日至十一月二十日不坐放文武百官朝參甲辰上大行皇帝尊諡寶冊案五代會要天福七年中書門下奏山陵禮儀使狀高祖尊諡號及廟號伏准故事將啟殯宮前擇日命太尉率百僚奉諡冊告天于圜丘畢奉諡冊跪讀于靈前此累朝之制蓋以天命尊極不可稽留今所上高祖聖文章武明德孝皇帝尊諡寶冊伏緣去洛京地遠寶冊難以往來當司詳酌伏請祗差官往洛京奏告南郊太廟其日中書門下文武百官立班中書令侍中升靈座前讀寶冊行告諡之禮舊五代史考異百官素服班於天清殿禮儀使撰進高祖祔饗太廟酌獻樂章舞名禮儀使原本作禮俊使據上文云山陵禮儀使撰高祖祔饗太廟樂章上之蓋先進樂章至此乃請定舞名也原本俊字誤今改正影庫本粘籤請以咸和之舞為名從之冬十月辛亥朔百官素服臨於天清殿襄州利市廟封為順正王仍令本州修崇廟宇癸亥啟攢宮百官衣初喪服入臨甲子靈駕進發帝於朱鳳門外行遣奠之祭辭畢還宮丁丑太保盧質卒贈太子太師諡曰文忠己卯宰臣李崧母喪歸葬深州遣使弔祭之庚辰契丹遣使致祭於高祖賻馬三匹衣三襲十一月庚寅葬高祖皇帝於顯陵壬辰湖南奏前洪州節度使馬希振卒戊戌詔宰臣等分詣寺廟祈雪庚子祔高祖神主於太廟辛丑以右金吾衞大將軍權判三司董遇為三司使詔州郡稅鹽過稅斤七錢住稅斤十錢州府鹽院並省司差人勾當先是諸州府除蠶鹽外每年海鹽界分約收鹽價錢一千七萬貫高祖以所在禁法抵犯者衆遂開鹽禁許通商令州郡配徵人戶食鹽錢上戶千文下戶二百分為五等時亦便之至是掌賦者欲增財利難於驟變前法乃重其關市之征蓋欲絕其興販歸利於官也其後鹽禁如故鹽錢亦徵至今為弊焉是日詔天地宗廟社禝及諸祠祭等訪聞所司承管多不精潔宜令三司預支一年禮料物色於太廟置庫收貯差宗正丞主掌委監察使監當祭器祭服等未備者修製案五代會要敕差宗正丞石載仁專主掌監察御史宋彥昇監庫兼差供奉官陳審璘往洛京于太廟內隱便處修蓋庫屋五間俟畢日催促所支物色監送入庫交付訖取收領文狀歸閣每有祠祭諸司各請禮料至時委監庫御史宋彥昇宗正丞石載仁旋行給付其大祠中祠兼令監察御史檢點小祠即令行事官檢點如致慢易本司准格科罪其祭器未有者修製已有者更仰整飭舊五代史考異十二月辛酉以威武軍節度副使充福建管內諸軍都指揮使王亞澄為威武軍副大使知節度事詔諸道州府每遇大祭祀冬正寒食立春立夏雨雪未晴不得行極刑如有已斷下文案可取次日及雨雪定後施行乙丑以前鄧州節度使安審暉為左羽林統軍以前延州節度使丁審琪為右羽林統軍以前金州節度使潘環為左神武統軍以前華州節度使皇甫立為左金吾衞上將軍以右龍武統軍劉遂凝為左驍衞上將軍以前貝州節度使馬萬為右驍衞上將軍以左龍武大將軍張彥澤為右武衞上將軍丙寅宰臣馮道滑州節度使兼侍衞馬軍都指揮使李守貞河陽節度使皇甫遇西京留守安彥威廣晉尹李德珫並加爵邑以山陵充奉之勞也己巳迴鶻進奉使密里等各授懷化歸德大將軍將軍郎將放還蕃庚午故洪州節度使馬希振追封齊國公辛未故中吳建武等軍節度使彭城郡王錢元追封廣陵郡王丙子于闐迴鶻皆遣使貢方物天福八年春正月辛巳盜發唐坤陵莊宗母曹太后之陵也河南府上言逃戶凡五千三百八十七餓死者兼之詔諸道以廩粟賑饑民民有積粟者均分借便以濟貧民時州郡蝗旱百姓流亡餓死者千萬計東都人士僧道請車駕復幸東京後唐莊宗德妃伊氏自契丹遣使貢馬德妃原本作得妃今從歐陽史改正影庫本粘籤庚寅沙州留後曹元深加檢校太傅充沙州歸義軍節度使癸巳發禁軍萬人幷家口赴東京乙巳于闐迴鶻入朝使劉再成等並授懷化大將軍將軍郎將放還蕃二月庚戌御札取今月十一日車駕還東京沿路州府不用修飾行宮食宿頓遞並以官物供給文武臣僚除有公事合隨駕外並先次進發以侍衞親軍使景延廣充御營使癸丑以廣晉尹李德珫權鄴都留守己未車駕發鄴都曲赦都下禁囚甲子次封丘文武百官見於行宮乙丑至東京案遼史作丁未晉主至汴與薛史異五代春秋歐陽史通鑑並從薛史舊五代史考異甲戌以東京留守張從恩為權鄴都留守以皇弟檢校司徒重睿為檢校太保開封尹年幼未出閣差左散騎常侍邊蔚知府事丁丑以前太僕卿薛仁謙為衞尉卿河中逃戶凡七千七百五十九是時天下饑穀價翔踴人多餓殍右金吾衞上將軍劉處讓卒贈太尉三月己卯朔以中書令監修國史趙瑩為晉昌軍節度使以晉昌軍節度使桑維翰為侍中監修國史案通鑑作晉昌節度使兼侍中桑維翰為侍中胡三省注云桑維翰始居藩鎮而兼侍中今入朝正為門下省長官舊五代史考異辛巳以左散騎常侍盧重為祕書監以東京副留守羅周岳為右散騎常侍癸未青州節度使東平王楊光遠進封壽王北京留守劉知遠恆州節度使杜威並加兼中書令乙酉以鄜州節度使符彥卿為河陽節度使以權鄴都留守前開封尹張從恩為鄴都留守廣晉尹以右羽林統軍丁審琪為鄜州節度使丁亥天策上將軍湖南節度使楚王馬希範加守尚書令兼中書令己丑桂州節度使馬希杲依前檢校太尉兼侍中兼知朗州軍州事朗州武平軍節度使馬希萼加檢校太尉進封爵邑以武平軍節度副使岳州團練使馬希贍為檢校太尉領廬州昭信軍節度使以武安軍節度副使永州團練使馬希廣為檢校太尉領洪州鎮南軍節度使皆楚王馬希範之弟也庚寅以宣徽北院使李承福為右武衞大將軍充宣徽南院使以前鄭州防禦使劉繼勳為左千牛衞大將軍充宣徽北院使國子祭酒兼戶部侍郎田敏以印本五經書上進以印本五經書上進考唐天成二年已開雕至此始得印本書也今附識於此影庫本粘籤賜帛五十段甲午有白烏棲作枋桐樹作坊使周務掠捕而進之辛丑引進使太府卿孟承誨使契丹詔京百司攝官親公事及五年與授初官癸卯以左諫議大夫司徒詡為給事中左司郎中王仁裕為右諫議大夫前鴻臚卿王均為少府監夏四月戊申朔日有蝕之庚戌以許州節度使趙在禮為徐州節度使以徐州節度使李從溫為許州節度使己巳中書門下奏請以六月二十七日降誕日為啟聖節從之是月河南河北關西諸州旱蝗分命使臣捕之案歐陽史作供奉官張福率威順軍捕蝗于陳州舊五代史考異五月己卯追封皇故長姊為吳國長公主癸未皇姪女永福縣主薨輟朝三日追封平昌郡主丁亥皇第二叔祖贈太師萬友追封秦王皇第三叔祖贈太尉萬銓案原本作詮今從歐陽史改贈太師追封趙王皇伯贈太傅敬儒贈太師追封宋王皇叔贈太尉福王德贈太師追封如故皇叔贈太傅暉贈太師追封韓王皇叔贈太尉通王殷皇叔贈太尉廣王威皇兄贈太傅郯王重裔並贈太師追封如故皇兄贈太師沂王重信追封楚王皇兄贈太傅虢王重乂皇兄贈太師夔王重進皇弟贈太尉陳王重杲等並贈太師追封如故仍令所司擇日冊命辛卯以御史中丞王易簡為尚書左丞以禮部侍郎張允為御史中丞以中書舍人吳承範為禮部侍郎以吏部侍郎王延為尚書右丞以尚書右丞王松為吏部侍郎以兵部侍郎張昭遠為吏部侍郎以戶部侍郎呂琦為兵部侍郎以邢部侍郎韋勳為戶部侍郎以工部侍郎李詳為刑部侍郎癸巳命宰臣等分詣寺觀禱雨己亥飛蝗自北翳天而南太子賓客李梲卒甲辰詔諸道州府見禁罪人除十惡五逆行劫殺人偽行印信合造毒藥官典犯贓各減一等外餘並放是時所在旱蝗故有是詔乙巳幸相國寺祈雨六月庚戌以螟蝗為害詔侍衞馬步軍都指揮使李守貞往臯門祭告仍遣諸司使梁進超等七人分往開封府界捕之案歐陽史作癸亥供奉官七人帥奉國軍捕蝗于京畿與薛史異舊五代史考異乙卯以左羽林統軍安審暉為潞州節度使宿州奏飛蝗抱草乾死丙辰貝州奏逃戶凡三千七百遣供奉官衞延韜詣嵩山投龍祈雨戊午以西京留守馬從斌為左監門衞上將軍開封府界飛蝗自死庚申河南府奏飛蝗大下徧滿山野草苗木葉食之皆盡人多餓死禮部侍郎吳承範卒丙寅以將冊皇太后遣尚書左丞王易簡奏告天地陝州奏蝗飛入界傷食五稼及竹木之葉逃戶凡八千一百丁卯以給事中符蒙為禮部侍郎以左諫議大夫裴坦為給事中辛未遣內外臣僚二十八人分往諸道州府率借粟麥案通鑑七月己丑詔以年饑國用不足遣使者六十餘人于諸道括民穀與薛史異舊五代史考異時使臣希旨立法甚峻民間碓磑泥封之隱其數者皆斃之由是人不聊生物情胥怨是月諸州郡大蝗所至草木皆盡永樂大典卷一萬五千六百四十九
