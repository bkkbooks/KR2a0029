body:
  text: 舊五代史卷七十九晉書五高祖紀第五天福五年春正月丁卯朔帝御崇元殿受朝賀仗衛如式降德音應天福三年終公私債缺一切除放壬申蜀人寇西鄙羣盜張達任康等劫清水德鐵之城以應之德鐵之城原本作得鐵考通鑑注云德鐵在清水寨今改正影庫本粘籤癸酉湖南奏閩人殺王昶夷其族王延羲因民之欲而定之甲戌遣宣徽使楊彥詢使於契丹辛巳皇子開封尹鄭王重貴加檢校太尉己丑回鶻可汗仁美遣使貢良馬白玉謝冊命也庚寅以二王後前右贊善大夫襲酅國公楊延壽為太子左諭德三恪汝州襄城縣令襲介國公宇文頡加食邑三千戶辛卯升絳州為防禦州癸巳以左神武統軍陸思鐸為右羽林統軍以隴州防禦使何福進為右神武統軍甲午太常少卿裴羽奏請追諡唐莊宗皇后劉氏為神閔敬皇后明宗皇后曹氏請追諡為和武憲皇后閔帝魯國夫人孔氏請追諡為閔哀皇后從之丙申河中節度使安審信奏軍校康從受李崇孫大裕張崇于千等以所部兵為亂尋平之死者五百人二月丁酉朔沙州歸義軍節度使曹義金卒義金原本作議金今從歐陽史改正影庫本粘籤贈太師以其子元德襲其位乙巳御史中丞竇貞固奏國忌日宰臣跪爐焚香文武百僚列坐案五代會要作宰臣跪爐僧人表讚文武百官儼然列坐孔本竊惟禮例有所未安今欲請宰臣仍舊跪爐百僚依班序立詔可之仍令行香之後飯僧百人永為定制庚戌北京留守安彥威來朝帝慰接甚厚賜上樽酒壬子升中書門下平章事為正二品丁巳青州節度使東平王王建立來朝己未以中書門下侍郎為清望正三品諫議大夫御史中丞為清望正四品三月丁卯朔左散騎常侍張允改禮部侍郎辛未宋州歸德軍節度使侍衛親軍馬步軍都指揮使劉知遠加特進改鄴都留守廣晉尹典軍如故以兗州節度使李從溫為徐州節度使以北京留守安彥威為宋州節度使壬申詔朝臣覲省父母依天成例頒賜茶藥癸酉以青州節度使王建立為昭義軍節度使進封韓王仍割遼沁二州為昭義屬郡以建立本遼州人用成其衣錦之美也以晉州節度使李德珫為北京留守以潞州節度使皇甫遇為晉州節度使是日容州節度使馬存卒甲戌以給事中李光廷為左散騎常侍亳州團練使李式為給事中乙亥相州節度使桑維翰加檢校司徒改兗州節度使許州節度使杜重威改鄆州節度使河中節度使安審信改許州節度使丁丑長安公主出降駙馬都尉楊承祚戊寅詔中書門下五品已上官於兩省上事宰臣押角之禮押角舊唐書裴坦傳作壓角文昌雜録引宋次道云舍人上事必設紫褥於庭面北拜廳閣立褥之東北隅謂之壓角疑原本押字有誤據五代會要仍作押角又文昌雜録引李涪刊誤云兩省官上事日宰臣臨焉上事者設牀几面南而坐判三道案宰相別施一連上事官坐於四隅謂之押角則壓押二字可以通用今仍其舊影庫本粘籤及第舉人與主司選勝筵宴及中書舍人靸鞋接見舉人兼兵部禮部引人過堂之日幕次酒食會客悉宜廢之己卯以前樞密使劉處讓為相州節度使辛巳湖南遣牙將劉勍領兵大破溪峒羣蠻收溪錦奬三州丁亥以秦州節度使康福為河中節度使以徐州節度使侯益為秦州節度使庚寅御明德樓餞送昭義軍節度使王建立賜玉斧蜀馬甲午詔吏部三銓聽四時選擬官旋奏不在團甲之限夏四月丙申朔宴羣臣於永福殿戊戌曹州防禦使石暉卒帝之從弟也禮官奏天子為五服之內親本服周者三哭而止從之己亥罷洛陽京兆進苑囿瓜果憫勞人也壬寅右僕射致仕裴卒贈太子太保丙午詔曰承旨者承時君之旨非近侍重臣無以稟朕旨宣豫言是以大朝會宰臣承旨草制詔學士承旨若無區別何表等威除翰林承旨外殿前承旨宜改為殿直密院承旨宜改為承宣御史臺三司閣門客省所有承旨並令別定其名庚戌以滄州節度使馬全節為安州節度使禮部侍郎張允奏請廢明經童子科童子科原本闕科字今據五代會要增入影庫本粘籤從之因詔宏詞拔萃明算道舉百篇等科並停之五月癸酉宋州貢瑞麥兩歧甲申以前徐州節度使萇從簡為右金吾衛上將軍丙戌安州節度使李金全叛詔新授安州節度使馬全節以洛汴汝鄭單宋陳蔡曹濮十州之兵討之案五代春秋五月李金全叛附于吳馬全節帥師討安州吳人救安州全節敗吳師克安州金全奔吳六月放吳俘還歐陽史作五月李金全叛六月克安州馬令南唐書作六月安州節度使李金全來降遣鄂州屯營使李承裕帥師迎之紀年互異舊五代史考異以前鄜州節度使安審暉為副以內客省使李守貞為都監仍遣供奉官劉彥瑤奉詔以諭金全命麾下齊謙以詔送於淮夷雲夢人齊峴斬謙歸其詔於闕辛卯昭義節度使韓王王建立薨輟朝二日冊贈尚書令壬寅案壬寅上疑脫六月兩字舊五代史考異少府監致仕尹玉羽卒癸卯淮南使李承裕代李金全金全南走承裕以淮兵二千守其城甲辰馬全節自應山縣進軍於大化鎮戊申與鄂州賊軍陳於安陸之南三戰而後克之斬首三千級生擒千餘人供奉官安友謙登鋒力戰奮不顧身全節賞其忠勇使馳獻捷書暍死於路是日削奪李金全官爵丁巳淮夷僞校李承裕率衆掠城中資貨而遁馬全節入城撫其遺民遣安審暉率兵以逐承裕擒而斬之執其僞都監杜光鄴案馬令南唐書作監軍通事舍人舊五代史考異杜光鄴通鑑作光業十國春秋仍作鄴今從其舊影庫本粘籤及淮南軍五百餘人露布獻於闕下帝曰此輩何罪皆厚給放還癸亥道士崇真大師張薦明賜號通玄先生是時帝好道德經嘗召薦明講說其義帝悅故有是命尋令薦明以道德二經雕上印板命學士和凝別撰新序冠于卷首俾頒行天下秋七月甲子朔降安州為防禦使額以申州隸許州丙寅安州節度使馬全節加檢校太尉改昭義軍節度使前鄜州節度使安審暉加檢校太傅為威勝軍節度使丁卯湖南奏遣天策府步騎將張少敵領兵五萬樓船百艘次於嶽陽將進討淮夷也甲戌宣徽使楊彥詢加檢校太傅充安國軍節度使乙亥戶部尚書致仕鄭韜光卒贈右僕射戊寅福州王延羲遣商人間路貢表自述戊子宿州奏淮東鎮移牒云本國奏書於上國皇帝曰久增景慕莫會光塵但循戰國之規敢預睦鄰之道一昨安州有故脫難相歸邊校貪功乘便據壘據壘原本作居壘今從通鑑改正影庫本粘籤矧機宜之孰在顧茫昧以難申否臧皆凶乃大易之明義進取不止亦聖人之厚顏適屬暑雨稍頻江波甚漲指揮未到事實已違今者猥沐睿咨曲形宸旨歸其俘獲示以英仁其如軍法朝章彼此不可揚名建德曲直相懸雖認好生匪敢聞命其杜光鄴等五百七人已令却過淮北帝復書曰昨者災生安陸釁接漢陽當三伏之炎蒸動兩朝之師旅豈期邊帥不稟上謀洎復城池備知本末尋已捨諸俘執還彼鄉閭不唯念效命之人兼亦敦善鄰之道今承來旨將正朝章希循宥罪之文用廣崇仁之美其杜光鄴等再令歸復尋遣使押光鄴等於桐墟渡淮案原本作桐廬據通鑑注引九域志云宿州蘄縣有桐墟鎮自桐墟而南至渦口則濟淮矣今改正舊五代史考異淮中有棹船甲士拒之南去不果詔光鄴等歸京師授以職秩其戎士五百人立為顯義都顯義都原本脫義字今考通鑑云帝悉授唐諸官以其士卒為顯義都命舊將劉康領之今增入影庫本粘籤八月丁酉帝觀稼於西郊己亥詳定院以先奉詔詳定冬正朝會禮節樂章二舞行列等事上之事具樂志庚子以前金州防禦使田武為金州懷德軍節度使辛丑升復郢二郡為防禦使額戊午左龍武統軍相里金卒廢朝一日贈太師己未太子太師致仕范延光卒於河陽廢朝二日案歐陽史作西京留守楊光遠殺太子太師范延光考本傳延光本為楊光遠推墮溺水死為之輟朝諱之也舊五代史考異贈太師丁卯案歐陽史作九月丁卯原本疑有脫字舊五代史考異宰臣李嵩加集賢殿大學士以翰林學士承旨戶部侍郎和凝為中書侍郎平章事丙子廢翰林學士院其公事並歸中書舍人丁丑以翰林學士中書舍人李慎儀為右散騎常侍以翰林學士左右補闕李浣為吏部員外郎以右散騎常侍趙元輔為太子賓客以太子賓客韓惲為兵部尚書以右諫議大夫段希堯為萊州刺史甲申西京留守楊光遠加守太尉兼中書令充平盧軍節度使封東平王戊子改東京上源驛為都亭驛冬十月丁酉制天下兵馬元帥鎮海鎮東浙江東西等道節度使中書令吳越王錢元瓘加守尚書令充天下兵馬都元帥戊戌戶部尚書姚顗卒廢朝一日贈右僕射癸卯湖南上言福建王延羲與弟延政互起干戈內相侵伐甲辰升萊州為防禦使額以汝州防禦使楊承貴領之以新授萊州刺史段希堯為懷州刺史丁未契丹使舍利來聘案遼史會同三年三月戊辰遣使使晉乙未晉遣使來覲四月壬寅遣人使晉丙午晉遣宣徽使楊端王眺等來問起居丙辰晉遣使進茶藥癸亥晉遣使賀端午五月庚辰晉遣使進弓矢甲申遣皇子天德及檢校司徒邸用和使晉六月庚子晉遣使來見九月丙戌晉遣使貢名馬庚申晉遣使貢布十二月丙申遣使使晉舊五代史考異致馬百匹及玉鞍狐裘等己酉宴羣臣於永福殿賜帛有差癸丑詔今後竊盜贓滿五匹者處死三匹已上者決杖配流以盜論者准律文處分又詔過格選人等許赴吏部南曹召保委正身者降一資注官十一月壬戌遙領遂州武信軍節度使鎮海軍衙內統軍檢校太傅同平章事陸仁璋卒贈太子太傅甲子滑州節度使景延廣加檢校太傅改陝州保義軍節度使以鄭州防禦使駙馬都尉史匡翰為義成軍節度使戊辰曹州防禦使石贇加檢校太保充河陽三城節度使庚午以翰林學士戶部侍郎張昭遠為兵部侍郎丙子冬至帝御崇元殿受朝賀始用二舞帝舉觴奏玄同之樂登歌奏文同之樂舉食文舞歌昭德之舞武舞歌成功之舞典禮久廢原本脫典禮二字今據歐陽史增入影庫本粘籤至是復興觀者悅之丁丑吳越國進奉使陳元亮進冬日觀仗詩一首帝覽之稱善賜服馬器幣癸未移德州長河縣大水故也甲申制授閩國王延羲檢校太師兼中書令福州威武軍節度使封閩國王以兩浙西南面安撫使錢元懿為檢校太尉兼中書令遙領廣州清海軍節度使又以恩州團練使錢鐸為檢校太尉同平章事遙領楚州順化軍節度使丁亥割衛州黎陽縣隸滑州十二月壬辰朔遙領洮州保順軍節度使檢校太尉兼侍中判湖州軍州事鮑君福卒贈太傅丙申詔故靜海軍兼東南面安撫制置使檢校太傅溫州刺史錢弘巽贈太子太傅故吳越兩軍節度副使檢校太尉錢弘僔贈太子太師天福六年春正月辛酉朔帝御崇元殿受朝賀仗衛如式刑部員外郎李象上二舞賦帝覽而嘉之命編諸史冊甲子同州指揮使成殷謀亂事泄伏誅時節度使宋彥筠御下無恩既貪且鄙故殷與子彥璋陰搆部下為亂會有告者遂滅其黨乙丑青州奏海凍百餘里丙寅遣供奉官張澄等領兵二千發並鎮並鎮原本作並真今從通鑑改正影庫本粘籤欣代四州山谷吐渾令還舊地案晉逐吐谷渾在天福六年通鑑與薛史同考天福六年即遼會同四年也遼史作會同三年晉以並鎮欣代之吐谷渾來歸與薛史異舊五代史考異先是吐渾苦契丹之虐受鎮州安重榮誘召叛而南遷入常山太原二境帝以契丹歡好之國故遣歸之戊辰詔應諸州無屬州錢處今後冬至寒食端午天和節及諸色謝賀不得進貢壬申以左司郎中趙上交為諫議大夫戊寅封唐叔虞為興安王臺駘神為昌寧公差給事中張瑑戶部郎中張守素就行冊禮又詔嶽鎮海瀆等廟宇並令崇飾案五代會要作宜各令修葺孔本仍禁樵採丙戌故皇第二叔檢校司徒萬友贈太師皇第三叔檢校司空萬銓贈太尉皇兄故檢校左僕射敬儒贈太傅二月辛卯詔天下郡縣不得以天和節禁屠宰輒滯刑獄壬辰置浮橋於德勝口甲午詔諸衛上將軍月俸舊三十千令增至五十千戊戌以三恪汝州襄城縣令襲介國公宇文頡為太子率更令率更原本作率吏今從唐書百官志改正影庫本粘籤己亥詔戶部侍郎張昭遠起居郎賈緯祕書少監趙熙吏部郎中鄭受益左司員外郎李為光等同修唐史仍以宰臣趙瑩監修壬寅以三白渠制置使張瑑為給事中戊申詔侯伯來朝君臣相見賞宴貢奉今後宜停起居郎賈緯以所撰唐年補録六十五卷上之案五代會要起居郎賈緯奏曰伏以唐高祖至代宗已有紀傳德宗亦存實録武宗至濟陰廢帝凡六代惟有武宗實録一卷餘皆闕略臣今搜訪遺聞及耆舊傳說編成六十五卷目為唐朝補遺録以備將來史館修述舊五代史考異帝覽之嘉歎賜以器幣仍付史館癸丑長安公主薨帝之長女也筓年降於駙馬楊承祚帝悼惜之甚輟視朝二日追贈秦國公主三月甲子河中節度使康福進封許國公乙丑左驍衛上將軍李承約卒癸酉詔天福四年終已前百姓所缺夏秋租稅一切除放夏四月庚寅朔湖南奏溪州刺史彭士愁五溪酋長等乞降已立銅柱於溪州鑄誓狀於其上以五溪銅柱圖上之丙申詔顯義指揮使劉康部下兵五百人放還淮海即安州所俘也己亥虞部郎中知制誥楊昭儉遷中書舍人戶部侍郎王松改御史中丞禮部郎中馮玉改司門郎中知制誥辛丑宰臣監修國史趙瑩奏奉詔差張昭遠等五人同修唐史內起居郎賈緯丁憂去官請以刑部侍郎呂琦侍御史尹拙同與編修又奏史館所闕唐朝實録請下敕購求並從之案五代會要云監修國史趙瑩奏自李朝喪亂逮五十年四海沸騰兩都淪覆今之書府百無二三臣等近奉綸言俾令撰述褒貶或從於新意纂修須案于舊章既闕簡編先虞漏略今據史館所闕唐書實録請下敕命購求況咸通中宰臣韋保衡與蔣伸皇甫煥撰武宗宣宗兩朝實録皆遇多事或值播遷雖聞撰述未見流傳其韋保衡裴贄合有子孫見居職任或門生故吏曾記纂修聞此討論諒多欣愜請下三京諸道及內外臣僚凡有將此數朝實録詣闕進納量其文武才能不拘資地除授一官如卷帙不足據數進納亦請不次奬酬以勸來者自會昌至天祐垂六十年其初李德裕平上黨著武宗伐叛之書其後康承訓定徐方有武寧本末之傳如此事類記述頗多請下中外臣僚及名儒宿學有于此六十年內撰述得傳記及中書銀臺史館日曆制敕冊書等不限年月多少並許詣闕進納如年月稍多記録詳備請特行簡拔不限資序臣與張昭遠等所撰唐史本紀以綱帝業列傳以述功臣十志以書刑政所陳條例請下所司從之舊五代史考異壬寅以戶部員外郎知制誥盧價為虞部郎中知制誥以昭義節度副使陳玄為光祿卿致仕乙巳齊魯民饑詔兗鄆青三州發廩賑貸五月庚申朔以前邢州節度使丁審琪為延州節度使延州節度使劉景巗為邠州節度使故皇子杲冊贈太尉進封陳王庚午涇州奏雨雹川水大溢壞州郡鎮戍二十四城甲戌北京遣牙將劉從以吐渾大首領白承福念龐里赫連功德來朝案通鑑四月辛巳北京留守李德珫遣牙校以吐谷渾酋長白承福入朝薛史作五月甲戌與通鑑異歐陽史從薛史舊五代史考異邢州上言吐渾移族帳於鎮州封部六月丙申以前衛尉卿趙延乂為司天監丁酉詔今後藩侯郡守凡有善政委倅二官條件聞奏百姓官吏等不得遠詣京闕壬寅右領衛上將軍李頃卒贈太師甲辰迦葉彌國僧哩以佛牙泛海而至丙午高麗國王王建加開府儀同三司檢校太師食邑一萬戶戊午鎮州節度使安重榮執契丹使拽剌案遼史作二月晉安從榮執使者伊喇薛史作六月先後互異舊五代史考異遣輕騎掠幽州南境之民處於博野仍貢表及馳書天下述契丹援天子父事之禮貪傲無厭困耗中國巳繕治甲兵將與決戰帝發所諭而止之重榮跋扈愈甚由是與襄州節度使安從進潛相搆謀為不軌永樂大典卷一萬五千六百四十四
