body:
  text: 舊五代史卷十五梁書十五列傳第五韓建字佐時許州長社人父叔豐世為牙校初秦宗權之據蔡州招合亡命建隸為軍士纍轉至小校唐中和初忠武監軍楊復光起兵於蔡宗權遣其將鹿宴弘赴之建與里人王建俱隸宴弘軍入援京師賊平復光暴卒時僖宗在蜀宴弘率所部赴行在路出南山因攻剽郡邑據有興元興元原本作興亦今據通鑑改正影庫本粘籤宴弘自為留後以建為蜀郡刺史唐軍容使田令孜密遣人誘建啖以厚利建時懼為宴弘所併乃率所部歸行在令孜補為神策都校金吾將軍出為潼關防禦使兼華州刺史河潼經大寇之後戶口流散建披荊棘闢污萊勸課農事樹植蔬果出入閭里親問疾苦不數年流亡畢復軍民充實建比不知書治郡之暇日課學習遣人於器皿牀榻之上各題其名建視之既熟乃漸通文字俄遷華商節度潼關守捉等使纍加檢校太尉平章事乾寧二年建與鳳翔李茂貞邠州王行瑜舉兵赴闕迫昭宗請以王珙為河中帥害大臣於都下河中王珂召晉軍以為援及晉軍渡河昭宗幸石門三年四月昭宗遣延王通王率禁兵討李茂貞為茂貞所敗車駕幸渭橋翊日次富平將幸河中建奉表迎駕俄自至渭北懇乞東幸許之七月十五日昭宗至華下百官士庶相繼而至建尋加兼中書令充京畿安撫制置等使又兼京兆尹京城把截使昭宗久在華州思還宮掖每花朝月夕遊宴西溪與羣臣屬詠歌詩歔欷流涕建每從容奏曰臣為陛下修營大內結信諸侯一二年間必期興復乃以建兼領修創京城使建自華督役輦運工作復治大明宮四年二月有詣建告睦王已下八王謀殺建案通鑑作防城將張行思等來告建惡諸王典兵故使行思等告之建囚八王於別宅放散隨駕殿後軍二萬人殺捧日都頭李筠自是天子益微宿衛之士盡矣八月建以兵圍十六宅通王以下十一王並遇害於石堤谷以謀逆聞又害太子詹事馬道殷將作監許巖士貶宰相朱朴皆昭宗寵昵者也案新唐書昭宗紀正月乙酉韓建以兵圍行宮殺扈蹕都將李筠二月韓建殺太子詹事馬道殷將作監許巖士八月韓建殺通王滋沂王禋韶王彭王嗣韓王嗣陳王嗣覃王嗣周嗣延丞戒丕嗣丹王允通鑑與新唐書同薛史以殺李筠為二月事以殺馬道殷許巖士為八月事蓋本於舊唐書昭宗紀宜可徵信云建尋兼同州節度使光化元年升華州為興德府以建為尹八月車駕還京九月册拜太傅進封許國公並賜鐵券天復元年十一月宦官韓全誨迫天子幸鳳翔建亦預其謀太祖聞之自河中引軍而西前鋒至同州建判官司馬鄴以城降遂移軍迫華州建懼乞降太祖責以脅君之罪建拜伏稱從事李巨川之謀也太祖即誅巨川案北夢瑣言韓建曰某不識字凡朝廷章奏鄰封書檄皆巨川為之因斬之通鑑所采即本於北夢瑣言與薛史同新唐書李巨川傳云巨川詣軍門納款因言當世利害全忠屬官敬翔以文翰事左右疑巨川用則全忠待己或衰乃詭説曰巨川誠奇才顧不利主人若何是日全忠殺之是巨川之死亦由于敬翔之譖不僅為韓建所賣也太祖與建素有軍中昆弟之契及見其怒驟息尋表建為許州節度使昭宗東遷以建為佑國軍節度使京兆尹車駕至陝召太祖與建侍宴宮妓奏樂何皇后舉觴以賜太祖建躡足太祖遽起曰臣醉不任偽若顛仆即去建私謂太祖曰上與宮人附耳而語幕下有兵仗聲恐圖王爾天祐三年改青州節度使及受禪徵為司徒平章事充諸道鹽鐵轉運使開平二年加侍中充建昌宮使三年郊祀于洛以建為大禮使建為上宰每謁見時有直言太祖為性剛嚴羣下將迎不暇待建稍異故優容之九月册拜太保罷知政事案五代會要開平三年十月詔曰太保韓建每月旦十五日入閣稱賀即令赴朝參餘時弗入見示優禮也四年三月除匡國軍節度使陳許蔡觀察使仍令中書不議除替案五代會要乾化元年正月敕許昌雄鎮太保韓建朕用以布政民耕盜止久居其位庶可勝殘矣宜令中書門下不計年月勿議替乾化二年六月朝廷新有內難人心動搖部將張厚因作亂害建于衙署案通鑑考異引莊宗實録九月建遇害通鑑從薛史時年五十八子從訓昭宗在華時授太子侍學賜名文禮尋拜屯田員外郎國初為都官郎中賜紫年未弱冠時朝廷命從訓告國哀于陳許至二日軍亂與建併命乾化三年追贈太師永樂大典卷三千六百七十五李罕之陳州項城人父文世田家罕之拳勇趫捷力兼數人少學為儒不成又落髮為僧以其無賴所至不容曾乞食於酸棗縣自旦至晡無與之者乃擲鉢于地毀棄僧衣亡命為盜案北夢瑣言云罕之即其僧名會黃巢起曹濮罕之因合徒作剽漸至魁首及賊巢渡江罕之因以兵將背賊歸于唐高駢録其功表為光州刺史歲餘為蔡賊秦宗權寇迫不能守乃棄郡歸項城收合餘衆依河陽諸葛爽爽署為懷州刺史光啓初僖宗以爽為東南面招討以擊宗權爽乃表罕之為副令將兵屯宋州蔡寇凶焰日熾兵鋒不敵中和四年爽表罕之為河南尹東都留守是歲李克用脫上源之難斂軍西歸路由洛陽罕之迎謁供帳館待甚優因與克用厚相結託時罕之有衆三千以聖善寺為府聖善寺原本作聖喜今據新唐書改正影庫本粘籤光啓元年蔡賊秦宗權遣將孫儒來攻罕之對壘數月以兵少備竭委城而遁西保于澠池蔡賊據京城月餘焚燒宮闕剽剝居民賊既退去鞠為灰燼寂無雞犬之音罕之復引其衆築壘於市西明年冬諸葛爽死其將劉經推爽子仲方為帥經懼罕之難制自引兵鎮洛陽罕之部曲有李瑭郭璆者情不相叶欲相圖害罕之怒誅璆軍情由是不睦劉經因其有間掩擊罕之於澠池軍亂保乾壕經急攻之為罕之所敗罕之乘勝追至洛陽時經保敬愛寺罕之保苑中飛龍罕之激勵其衆攻敬愛寺數日因風縱火盡燔之經衆奔竄追斬殆盡罕之進逼河陽營於鞏縣陳舟于汜水將渡諸葛仲方遣將張言案張言後名全義率師拒于河上時仲方年幼政在劉經諸將心多不附張言密與罕之修好經知其謀言懼引衆渡河歸罕之因合勢攻河陽為經所敗罕之與言退保懷州冬蔡將孫儒陷河陽仲方泛輕舟來奔孫儒遂自稱節度使俄而蔡賊為我軍所敗孫儒棄河陽歸蔡罕之與言收合其衆求援于太原李克用遣澤州刺史安金俊率騎助之遂收河陽克用表罕之為節度同平章事又表言為河南尹東都留守罕之既與言患難交契刻臂為盟永同休戚如張耳陳餘之義也罕之雖有膽決雄猜翻覆而撫民御衆無方略率多苛暴性復貪冒不得士心既得河陽出兵攻晉絳時大亂之後野無耕稼罕之部下以俘剽為資啖人作食絳州刺史王友遇以城降罕之乃進攻晉州河中王重盈遣使求援於太祖時張言治軍有法善積聚勤於播植軍儲不乏言輸粟於罕之以給其軍罕之求索無限言頗苦之力不能應罕之則録河南府吏笞責之東諸侯修貢行在多為罕之邀留王重盈苦其侵削密結張言請圖之文德元年春會罕之盡出其衆攻平陽言夜出師掩擊河陽罕之無備單步僅免舉族為言所俘罕之奔于太原李克用表為澤州刺史仍領河陽節度使三月克用遣其將李存孝率師三萬助之來攻懷孟城中食盡備禦皆竭張言遣其孥入質且求救於太祖太祖遣葛從周牛存節赴之逆戰於流河店會晉將安休休以一軍奔于蔡存孝引軍而退罕之保于澤州自是罕之日以兵寇鈔懷孟晉絳數百里內郡邑無長吏閭里無居民河內百姓相結屯寨或出樵汲即為俘馘雖奇峯絶磴梯危架險亦為罕之部衆攻取先是蒲絳之間有山曰摩雲邑人立柵於上以避寇亂罕之以百餘人攻下之軍中因號罕之為李摩雲案洛陽縉紳舊聞記云罕之亦嘗置寨於洛城中至今民呼其寨地為李摩雲寨舊五代史考異自是數州之民屠啖殆盡荊棘蔽野煙火斷絶凡十餘年乾寧二年李克用出師以拒邠鳳營于渭北天子以克用為邠州行營四面都統克用乃表罕之為副及誅王行瑜罕之以功授檢校太尉食邑千戶按新唐書克用討王行瑜表罕之副都統檢校侍中行瑜誅封隴西郡王檢校太尉兼侍中所載爵位較薛史為詳歐陽史仍薛史之舊罕之自以功多私謂晉將蓋寓曰余自河陽失守來依巨廕歲月滋久功效未施比年以來倦於師旅所謂老夫耄矣無能為也望吾王仁愍太傅哀憐與一小鎮休兵養疾一二年間即歸老菟裘幸也寓為言之克用不對每藩鎮缺帥議所不及罕之私心鬱鬱蓋寓懼其他圖亟為論之克用曰吾於罕之豈惜一鎮吾有罕之亦如董卓之有呂布雄則雄矣鷹鳥之性飽則揚去實懼翻覆毒余也毒余原本作毒餘今據文改正影庫本粘籤光化元年十二月晉之潞帥薛志勤卒罕之乘其喪自澤州率衆徑入潞州自稱留後以狀聞於克用曰聞志勤之喪新帥未至慮為他盜所窺不俟命已屯于潞矣克用怒遣李嗣昭討之罕之執其守將馬溉伊鐸何萬友案伊鐸歐陽史作伊鐔沁州刺史傅瑤等遣其子皓案歐陽史作遣子頎拘送于太祖以求援焉案新唐書全忠表罕之昭義軍節度使會罕之暴病不能視事明年六月病篤太祖令丁會代之移罕之為河陽節度使行至懷州卒於傳舍時年五十八其子皓以舟載柩歸葬河陰縣開平二年春昭贈中書令永樂大典卷一萬三百八十七馮行襲字正臣武當人也歷職為本郡都校中和中僖宗在蜀有賊首孫喜者聚徒數千人欲入武當刺史呂曄惶駭無策略行襲伏勇士於江南乘小舟逆喜謂喜曰郡人得良牧衆心歸矣但緣兵多民懼虜掠若駐軍江北領肘腋以赴之使某前導以慰安士民可立定也喜然之既渡江軍吏迎謁伏甲奮起行襲擊喜仆地仗劍斬之其黨盡殪賊衆在江北者悉奔潰案新唐書本紀光啓元年四月武當賊馮行襲陷均州逐其刺史呂曄蓋行襲既殪孫喜遂自據其郡也薛史作中和間事與唐書異歐陽史仍從薛史山南節度使劉巨容以功上言尋授均州刺史州西有長山當襄漢蜀路羣賊屯據以邀劫貢奉行襲又破之洋州節度使葛佐奏辟為行軍司馬請將兵鎮谷口通秦蜀道由是益知名李茂貞遣養子繼臻竊據金州行襲攻下之因授金州防禦使時興元楊守亮將襲京師道出金商行襲逆擊大破之詔升金州為節鎮以戎昭軍為額即以行襲為節度使案舊唐書哀帝紀天祐二年金州馮行襲奏當道昭信軍額內一字與元帥全忠諱字同乃賜號戎昭軍是金州初賜軍額本名昭信至哀帝時避朱全忠祖諱乃改稱戎昭也薛史於金州初賜軍額即作戎昭蓋仍梁實録之舊未及考正及太祖義旗西征行襲遣副使魯崇矩稟受制令會唐昭宗幸鳳翔太祖帥師奉迎久之未出中尉韓全誨遣中官郤文晏等二十餘人分命矯詔欲徵江淮兵屯於金州以脅太祖之軍行襲定策盡殺之收其詔敕送於太祖天祐元年兼領洋州節度使太祖之伐荊襄行襲令其子勗以舟師會於均房預收復功案新唐書昭宣帝紀二年五月王建陷金州戎昭軍節度使馮行襲奔於均州六月行襲克金州舊唐書哀帝紀二年十二月戎昭軍奏收復金州兵火之後井邑殘破請移理所於均州從之仍改為武定軍是行襲因金州嘗被陷乃改治均州也薛史不載遷匡國軍節度使案舊唐書哀帝紀三年四月丙申敕曰天祐二年九月二十日於金州置戎昭軍割均房二州為屬郡比因馮行襲叶贊元勳克宣丕績用奬濟師之效遂行割地之權今命帥得人酬庸有秩其戎昭軍額宜停其均房二州却還山南東道收管據此則戎昭軍額廢于天祐三年故行襲改鎮許州也到任誅大吏張澄暴其罪州人莫不惴懾在許三年上供外別進助軍羡糧二十萬石及太祖郊禋行襲請入覲貢獻巨萬恩禮殊厚殊厚原本作殊學今據文改正影庫本粘籤尋詔翰林學士杜曉撰德政碑以賜之纍官至兼中書令册拜司空開平中卒輟朝一日贈太傅諡曰忠敬行襲性嚴烈為政深刻然所至有天幸境內嘗大蝗尋有羣烏啄食不為害民或艱食必有穭穀穭穀原本作魯縠據廣韻云穭禾自生也今改正影庫本粘籤出於壠畝雖威福在己而恆竭力以奉於王室故能保其功名行襲魁岸雄壯面有青志當時目為馮青面長子勗歷蘄沁二州刺史次子德晏仕至金吾將軍永樂大典卷四百三孫德昭鹽州五原縣人世為州校父惟晸案歐陽史作惟勗考新唐書亦作惟晸今仍其舊舊五代史考異有功於唐朝遙領荊南節度分判右神策軍事德昭藉父蔭纍職為右神策軍都指揮使案通鑑德昭由雄毅軍使為左神策指揮使光化三年唐昭宗為閹官所廢矯立德王時中外以權在禁闥莫能致討近藩朋附章表繼有至者丞相崔胤外與太祖申結輔佐之好內遣心腹密購忠義有以事諭德昭者案通鑑云德昭常憤惋不平崔胤聞之遣判官石戩與之遊德昭每酒酣必泣戩知其誠乃密以胤意説之德昭感慨乃與本軍孫承誨董從實三人案新舊唐書俱作周承誨董彥弼據薛史則承誨自姓孫彥弼乃從實後改之名也通鑑從唐書歐陽史從薛史奮發應命誓圖返正崔又割衣手筆以通其志天復元年正月一日未旦逆豎左軍容劉季述早入德昭伏甲要路以俟追其前驅邀而斬之孫承誨等分捕右軍容王仲先黨伍唐昭宗方幽辱東內聞外喧大恐德昭馳至扣閣曰逆賊劉季述伏誅矣請上皇開鑰復皇帝位皇后何氏呼曰汝可進逆人首門乃可開俄而承誨從實俱以馘獻昭宗悲而嘉之於是丞相崔胤奉迎御丹鳳樓率百辟待罪泣且奏曰臣居大位不能討姦賴東平王全忠首奮忠貞誅殺邸吏遂致德昭等擒戮妖逆再清禁闈即日議功以德昭為檢校太保靜海軍節度使承誨雍州節度使從實容州節度使並同平章事錫姓李賜號扶傾濟難忠烈功臣圖形凌煙閣俱留京師錫賚宴賞之厚恩寵權幸之勢近代罕比其年十一月閹官韓全誨縱火脅昭宗西幸鳳翔承誨從實並變節為中官所誘始欲驅擁百僚將圖出令而德昭獨按兵與太祖親吏婁敬思叶力衛丞相及文武百官與長安吏民保於街東免為所劫太祖遣從事相繼勞問遺以龍鳳劍鬬雞紗委令制輯於是百官次華州連狀請太祖迎奉及大旆入關德昭以軍禮上謁立道左太祖命左右扶騎控至長安賜與甚厚署權知同州節度留後將赴任復徇民請留充兩街制置使賜錢百萬德昭以本部兵八千人獻于太祖由是愈見賞重又賜甲第一區俾先還洛陽及昭宗東遷奏授左威衛上將軍以疾免歸於別墅太祖受禪以左領衛上將軍徵赴闕開平四年拜左金吾大將軍充街使末帝即位俾將命于兩浙對見失儀不果行尋改授右武衛上將軍俄復左金吾大將軍卒於官詔贈太傅輟視朝一日天復初德昭與孫承誨董從實以返正功時人呼為三使相恩澤俱冠世及承誨至鳳翔易名繼誨從實改名彥弼皆為李茂貞所養後閹官之敗俱戮于京師唯德昭克全終始有所稱云永樂大典卷一萬八千一百二十六趙克裕河陽人也祖父皆為軍吏克裕少為牙將好讀書謹儀範牧伯皆奇待之纍居右職擢為虎牢關使光啓中蔡寇陷河陽克裕率所部歸於太祖隸于宣義軍太祖東征徐鄆克裕屢受指顧無不如意數年之內繼領亳鄭二州刺史時關東藩鎮方為蔡寇所毒黎元流散不能相保克裕妙有農戰之備復善於綏懷民賴而獲安者衆太祖表為河陽節度使檢校右僕射尋移理許田案新唐書本紀景福元年己未朱全忠陷孟州逐河陽節度使趙克裕據通鑑則克裕之移鎮因梁祖欲以張全義領河陽也新唐書所紀疑非事實入為金吾衛大將軍檢校司空及太祖為元帥以克裕為元帥府左都押衙復統六軍兗州平命權知泰寧軍留後數月暴疾而卒開平初追贈太保永樂大典卷一萬八千一百二十六張慎思清河人自黃巢軍來歸纍授軍職歷諸軍都指揮使從平巢蔡兗鄆皆著功表授檢校工部尚書兼宋州長史光化中加檢校右僕射權知亳州天復三年昭宗還長安以從太祖迎駕功賜號迎鑾毅勇功臣尋除汝州防禦使天祐元年授左龍武統軍其冬除許州匡國軍節度使明年十一月權知徐州武寧軍兩使留後太祖受禪入為左金吾大將軍開平二年除宋州刺史未幾復拜左金吾大將軍三年冬除蔡州刺史蔡州原本作孽州今據通鑑改正影庫本粘籤以貪貨大失民情詔追赴闕未幾扈從北征還以疾臥洛陽之私第馭家不肅為其子所弒永樂大典卷六千三百五十史臣曰韓建遇唐朝之衰運據潼關之要地不能藩屏王室翻務斫喪宗枝雖有阜俗之能何補不臣之咎罕之負驍雄之氣蓄嚮背之謀武皇比之呂布斯知人矣行襲勵納忠之節德昭立反正之功俱善其終固其宜矣克裕而下無譏可也永樂大典卷六千三百五十
