body:
  text: 舊五代史卷八十三晉書九少帝紀第三開運元年秋七月辛未朔帝御崇元殿大赦天下改天福九年為開運元年河北諸州曾經契丹蹂踐處與免今年秋稅諸軍將士等第各賜優給諸州率借錢帛赦書到日畫時罷徵出一千貫已上者與免科徭一萬貫已上者與授本州上佐云是日宣赦未畢會大雷雨匆遽而罷時都下震死者數百人明德門內震落石龍之首識者以為石乃國姓蓋不祥之甚也癸酉以定州節度使馬全節為鄴都留守加兼侍中以昭義節度使安審暉為邢州節度使加檢校太師乙亥前陝州節度使王周加檢校太尉改定州節度使鄴都留守張從恩改鄆州節度使禮官奏天子三年喪畢祫享於太廟高祖聖文章武明德孝皇帝今年八月喪終畢明德原本缺德字今從歐陽史增入影庫本粘籤合以十月行大祫之禮冬季祠祭改薦為祫從之丁丑虞部員外郎知制誥陶穀改倉部郎中知制誥大理卿吳德謙改祕書監致仕辛巳以左龍武統軍李從敏為潞州節度使天策府都護軍桂州節度使知朗州軍事馬希杲加檢校太師壬午降金州為防禦州降萊州為刺史州戶部侍郎田敏改兵部侍郎邢部侍郎李祥改尚書右丞以潁州團練使馮玉為戶部侍郎充端明殿學士中書舍人趙上交改邢部侍郎己丑以樞密使中書令桑維翰充弘文館大學士太子太傅譙國公劉㫬為守司空兼門下侍郎平章事監修國史判三司宰臣李嵩和凝進封爵邑庚寅宣徽北院使劉繼勳改宣徽南院使劉繼勳原本作斷勳今從通鑑改正影庫本粘籤三司使董遇改宣徽北院使辛卯以前陝州節度使石贇為鄧州節度使同州節度使李承福卒贈太傅八月辛丑命十五將以禦契丹案東都事略范質傳晉出帝命十五將出征是夕質宿直出帝命諸學士分草制質曰宮城已閉慮泄機事遂獨為之歐陽史云劉知遠為北面行營都統杜威為都招討使蓋略之也舊五代史考異北京留守劉知遠充北面行營都統鎮州節度使杜威充北面行營都招討使鄆州節度使張從恩充馬步軍都監西京留守景延廣充馬步軍都排陳使徐州節度使趙在禮充馬步軍都虞候晉州節度使安叔千充馬步軍左廂排陳使前兗州節度使安審信充馬步軍右廂排陳使河中節度使安審琦充馬步軍都指揮使河陽節度使符彥卿充馬軍左廂都指揮使滑州節度使皇甫遇充馬步軍右廂都指揮使右神武統軍張彥澤充馬軍排陳使滄州節度使王廷胤充步軍左廂都指揮使陝州節度使宋彥筠充馬軍右廂都指揮使前金州節度使田武充步軍左廂排陳使左神武統軍潘環充步軍右廂排陳使案遼史七月辛卯晉遣張暉奉表乞和留暉不遣蓋其時桑維翰為相乞和于契丹既不見許遂分命十五將以禦之也孔本壬寅閩王王延羲為其下連重遇朱文進所害衆推文進知留後事稱天福年號間道以聞甲辰太子少傅盧文紀改太子太傅太子少保李麟改太子太保邢部尚書李懌改戶部尚書給事中司徒詡改右散騎常侍以府州刺史折從阮為安北都護充振武節度使是夜熒惑入南斗乙巳詔復置明經童子二科己酉以鄧州節度使王令溫為延州節度使癸丑以威武軍兵馬留後權知閩國事朱文進為檢校太傅福州威武軍節度使知閩國事癸亥升澶州為節鎮以鎮寧為軍額割濮州為屬郡甲子以延州節度使史威為澶州節度使九月庚午朔日有蝕之乙酉以戶部侍郎韋勳為太子賓客以前棣州刺史段希堯為戶部侍郎以光祿卿張仁願為大理卿己丑禮部侍郎符蒙卒壬辰太原奏代州刺史白文珂破契丹於七里烽案通鑑作丙子契丹寇遂城樂壽深州刺史康彥進擊却之與薛史異歐陽史契丹國志並與薛史同舊五代史考異斬首千餘級生擒將校七十餘人癸巳以前隴州防禦使翟光鄴為宣徽北院使己亥以滄州節度使王廷胤卒輟朝贈中書令冬十月壬寅兩浙節度使吳越國王錢弘佐加守太尉吳越國王原本脫吳字今據歐陽史增入影庫本粘籤庚戌以徐州節度使北面行營馬步都虞候趙在禮為北面行營副都統鄴都留守馬全節為北面行營副招討使甲寅以起居郎知制誥賈緯為戶部郎中知制誥戊午詔曰朕虔承顧命獲嗣丕基常懼顛危不克負荷宵分日昃罔敢怠寧夕惕晨興每懷祗畏但以恩信未著德教未敷理道不明咎徵斯至向者頻年災沴稼穡不登萬姓飢荒道殣相望上天垂譴涼德所招仍屬干戈尚興邊陲多事倉廩不足則輟人之餱食帑藏不足則率人之資財兵士不足則取人之丁中戰騎不足則假人之乘馬雖事不獲已而理將若何訪聞差去使臣殊乖體認不能敦於勉諭而乃臨以威刑自有所聞益深愧悼旋屬守臣叛命敵騎入邊致使甲兵不暇休息軍旅有征戰之苦人民有飛挽之勞疲瘵未蘇科徭尚急言念於茲寢食何安得不省過興懷側身罪己載深減損思召和平所宜去無用之資罷不急之務棄華取實惜費省功一則符先帝慈儉之規一則慕前王朴素之德向者造作軍器破用稍多但取堅剛不須華楚今後作坊製器械不得更用金銀裝飾比於遊畋素非所好凡諸服御尤欲去奢應天下府州不得以珍寶玩好及鷹犬為貢在昔聖帝明君無非惡衣菲食況於薄德所合恭行今後大官尚膳減去多品衣服帷帳務去華飾在禦寒溫而已峻宇雕牆昔人所誡玉杯象箸前代攸非今後凡有營繕之處丹堊雕鏤不得過度宮闈之內有非理費用一切禁止於戲繼聖承祧握樞臨極昧於至道若履春冰屬以天災流行國步多梗因時致懼引咎推誠期於將來庶幾有補更賴王公將相貴戚豪宗各啓乃心率由茲道共臻富庶以致康寧凡百臣僚宜體朕意十一月壬申詔曰蕃寇未平邊陲多事即日雖無侵軼亦須廣設隄防朕將親率虎貔躬擐甲胄候聞南牧即便北征不須先定日辰別行告諭所有供億宜令三司預行計度合隨從諸司職員並宜常備行計云己卯以陳州刺史梁漢璋充侍衛馬軍都指揮使壬午以貝州節度使何建為澶州節度使兼北面行營馬軍右廂排陳使以澶州節度使史威為貝州節度使丙戌以前金州節度使田武為滄州節度使兼北面行營步軍右廂都指揮使以前相州節度使郭謹為鄜州節度使十二月己亥朔幸臯門射中白兔癸丑福州節度使朱文進加同平章事封閩國王丁巳青州楊光遠降光遠子承勳等斬觀察判官邱濤牙將白延祚楊贍杜延壽等首級送於招討使李守貞乃縱火大譟劫其父處於私第以城納款遣即墨縣令王德柔貢表待罪楊光遠亦遣節度判官楊麟奉表請死詔釋之閏月庚午以楊承信為右羽林將軍承祚為右驍騎衛將軍皆光遠之子先詣闕請罪故特授是官癸酉李守貞奏楊光遠卒初光遠既上表送降帝以光遠頃歲太原歸命欲曲全之議者曰豈有反狀滔天而赦之也乃命守貞便宜處置守貞遣人拉殺之以病卒聞乙酉前登州刺史張萬迪削奪官爵處斬青州節度判官楊麟配流威州掌書記任邈配流原州支使徐晏配流武州縱逢恩赦不在放還之限並以楊光遠叛故也工部尚書權知貢舉竇貞固奏試進士諸科舉人入策舊例夜試以三條燭盡為限天成二年改令晝試今欲依舊夜試從之曲赦青州管內罪人立功將士各賜優給青州吏民為楊光遠詿誤者一切不問青州行營招討使兗州節度使兼侍衛都虞候李守貞加同平章事副招討使河陽節度使符彥卿改許州節度使丙戌降青州為防禦使額以萊州刺史楊承勳為汝州防禦使己丑以工部尚書竇貞固為禮部尚書太常卿王延為工部尚書左丞王松為太常卿以前尚書右丞龍敏為尚書左丞癸巳以前安州防禦使李建崇為河陽兵馬留後以宣徽使翟光鄴為青州防禦使以內客省使李彥韜為宣徽北院使甲午以給事中邊光範為左散騎常侍以樞密直學士吏部郎中李穀為給事中依前充職是月契丹耶律德光與趙延壽領全軍入寇圍恆州分兵陷鼓城城元氏高邑昭慶寧晉蒲澤欒城柏鄉等縣案遼史己卯圍恆州下其九縣歐陽史繫於乙酉之後疑誤前鋒至邢州河北諸州告急詔張從恩馬全節安審琦率師屯邢州趙在禮屯鄴都開運二年春正月戊戌朔帝不受朝賀不豫故也己亥張從恩部領兵士自邢州退至相州人情震恐趙在禮還屯澶州馬全節歸鄴都遣右神武統軍張彥澤屯黎陽詔西京留守景延廣將兵守胡梁渡契丹寇邢州侍衛馬軍都指揮使梁漢璋改鄭州防禦使典軍如故以齊州防禦使劉在明為相州留後癸卯以客省使孟承誨為內客省使滑州奏今月二日至四日相州路烽火不至甲辰以前汝州防禦使宋光鄴為左驍衛大將軍詔青州行營將校自副兵馬使以上各賜功臣名號乙巳帝復常膳以左威衛上將軍袁為客省使上將軍如故詔滑州節度使皇甫遇率兵赴邢州馬全節赴相州契丹寇洺磁犯鄴都西北界所在告急壬子王師與契丹相拒於相州北安陽河上皇甫遇慕容彥超率前鋒與敵騎戰於榆林店遇馬中流矢僅而獲免案遼史云皇甫遇與濮州刺史慕容彥超將兵千騎來覘遼軍至鄴都遇遼軍數萬且戰且却至榆林店遼軍繼至遇與彥超力戰百餘合遇馬斃步戰安審琦引騎兵踰水以救遼軍乃還與薛史所載互有詳略是夜張從恩引軍退保黎陽唯留五百人守安陽河橋既而知州符彥倫與軍校謀曰此夜紛紜人無固志五百疲兵安能守橋即抽入相州嬰城為備至曙賊軍萬餘騎已陳於安陽河北彥倫令城上揚旗鼓譟賊不之測至辰時渡河而南悉陳甲騎於城下如攻城之狀彥倫曰此敵將走矣乃出甲士五百於城北張弓弩以待之契丹果引去當皇甫遇榆林戰時至晚敵衆自相驚曰晉軍悉至矣戎王在邯鄲聞之即時北遁官軍亦南保黎陽甲寅以河陽留後李建崇為邢州留後以鳳州防禦使案原本下有闕文為河陽留後詔李守貞領兵屯滑州以宣徽北院使李彥韜權侍衛馬步都虞候改諸道武定軍為天威軍己未以前許州節度使李從溫為北面行營都招撫使以鄆州節度使張從恩權東京留守辛酉相州奏契丹抽退其鄉村避寇百姓已發遣各歸本家營種初帝以不豫初平未任親御軍旅既而張從恩馬全節相次奏賊軍充斥恆州杜威告事勢危急帝曰此賊未平固難安寢當悉衆一戰以救朔方生靈若晏安遲疑則大河以北淪為寇壤矣即日命諸將點閲以定行計辛酉下詔親征誅楊光遠部下指揮使張迥等五人以戎事方興慮其扇搖故也癸亥以樞密直學士李穀為三司副使判留司三司公事乙丑車駕發離京師是月京城北壕春冰之上有文若大樹花葉凡數十株宛若圖畫觀者如堵二月戊辰朔車駕次滑州己巳渡浮橋幸黎陽勞軍至晚還滑州以滄州節度使田武充東北面行營都部署甲戌幸澶州以景延廣為隨駕馬步軍都鈐轄丙子大閲諸軍于戚城帝親臨之戊寅北面行營副招討使馬全節行營都監李守貞右神武統軍張彥澤等以前軍先發己卯以許州節度使符彥卿為北面行營馬軍都指揮使以左神武統軍潘環為北面行營步軍都指揮使辛巳幸楊村故壘符彥卿皇甫遇李殷率諸軍進發以左散騎常侍邊光範為樞密直學士詔河北諸州應蕃寇經由之地吏民遭殺害者委所在收瘞量事祭奠詔恆州杜威與馬全節等會合進軍丙戌幸鐵丘閲馬因幸趙在禮李從溫軍是日大雪戊子安審琦梁漢璋領兵北征府州防禦使折從阮奏部領兵士攻圍契丹勝州降之見進兵趨朔州甲午以河中節度使安審琦為北面行營馬步軍都虞候許州節度使符彥卿充馬步軍左廂都指揮使滑州節度使皇甫遇充馬步軍右廂都指揮使侍衛馬軍都指揮使梁漢璋充馬軍左右廂都指揮使侍衛步軍都指揮使李殷充步軍左右廂都指揮使左神武統軍張彥澤充馬軍左右廂都排陳使右神武統軍潘環充步軍左右廂排陳使丙申以端明殿學士尚書戶部侍郎馮玉為戶部尚書充樞密使三月戊戌契丹陷祁州祁州原本作祈今從五代春秋改正影庫本粘籤刺史沈斌死之乙巳左補闕袁範先陷契丹自賊中逃歸杜威奏與李守貞馬全節安審琦皇甫遇部領大軍赴定州易州刺史安審約奏二月三夜差壯丁斫敵營殺賊千餘人是日以符彥卿為北面行營馬步軍左右廂都排陳使以皇甫遇為北面行營馬步軍左廂排陳使以王周為馬步軍右廂排陳使丁未畋於戚城還幸景延廣安審信軍庚戌王師攻泰州刺史晉庭謙以城降易州奏郎山塞將孫方簡破契丹千餘人案歐陽史作孫方諫舊五代史考異郎山宋史作狼山東都事略仍作郎山蓋地名多用對音字今仍其舊影庫本粘籤斬蕃將諧里相公虜其妻以獻甲寅杜威奏收復滿城獲契丹首領沒剌相公並蕃漢兵士二千人以前戶部尚書李懌為兵部尚書乙卯杜威奏收復遂城丙辰奏大軍自遂城却退至滿城時賊將趙延壽部曲來降言契丹主昨至古北口幽州走報漢軍大下收却泰州尋下令諸部令輜重入塞輕騎却回戎王率五萬餘騎來勢極盛明日前鋒必至請為之備杜威李守貞謀曰我師糧運不繼深入賊疆而逢大敵亡之道也不如退還泰州觀其兵勢強弱而禦之軍士皆以為然是日還滿城丁巳至泰州戊午契丹前鋒已至己未大軍發泰州而南契丹踵其後是日次陽城庚申賊騎如牆而來我步軍為方陳以禦之選徑騎擊賊鬬二十餘合南行十餘里賊勢稍却渡白溝而去案通鑑庚申契丹大至晉軍與戰逐北十餘里契丹踰白溝而去歐陽史庚申杜威及契丹戰于陽城敗之俱與薛史同惟遼史云己未重威守貞引兵南遁追至陽城大敗之復以步卒為方陳來拒與戰二十餘合是遼師未嘗言敗也蓋當時南北軍俱有掩飾故紀載不同如此舊五代史考異辛酉杜威召諸將議曰戎首自來實為勍敵若不血戰吾輩何以求免諸將然之是日敵騎還繞官軍相去數里明日我軍成列而行蕃漢轉鬬殺聲震地才行十餘里軍中人馬飢乏癸亥大軍至白團衛村下營案歐陽史作衛村通鑑考異引漢高祖實録作白檀遼史從薛史舊五代史考異人馬俱渴營中掘井及水輒壞兵士取其泥絞汁而飲敵衆圍繞漸束其營案宋史藥元福傳晉師列方陳設拒馬為行寨契丹以奇兵出陳後斷糧道舊五代史考異是日東北風猛揚塵折樹契丹主坐車中謂衆曰漢軍盡來祇有此耳今日並可生擒然後平定天下令下馬拔鹿角飛矢雨集軍士大呼曰招討使何不用軍而令士卒虛死諸將咸請擊之杜威曰俟風勢稍慢觀其進退守貞曰此風助我也彼衆我寡黑風之內莫測多少若俟風止我輩無噍類矣即呼諸軍齊力擊賊張彥澤符彥卿皇甫遇等率騎奮擊風勢尤猛沙塵如夜敵遂大敗案宋史符彥卿傳時晉師居下風將戰弓弩莫施彥卿謂張彥澤皇甫遇曰與其束手就擒曷若死戰然未必死彥澤然之遂潛兵尾其後順風擊之契丹大敗又藥元福傳守貞與元福謀曰軍中飢渴已甚若候風反出戰吾屬為虜矣彼謂我不能逆風以戰宜出其不意以擊之此兵家之奇也元福乃率麾下開拒馬出戰諸將繼至契丹大敗舊五代史考異時步騎齊進追襲二十餘里至陽城東賊軍稍稍成列我騎復擊之乃渡河而去按晉師敗契丹于陽城在三月癸亥遼史與薛史同歐陽史作庚申誤守貞曰今日危急極矣幸諸君奮命吾事獲濟兩日以來人馬渴乏今喫水之後腳重難行速宜收軍定州保全而還上策也由是諸將整衆而還是時契丹主坐車中及敗走車行十餘里追兵既急獲一橐乘之而走乙丑杜威等大軍自定州班師入恆州夏四月丙子以車駕將還京差官往西京告天地宗廟社稷辛巳駕發澶州甲申至京師曲赦在京禁囚己亥己亥以前後干支推之作丁亥今無別本可考姑仍其舊影庫本粘籤詔鄴都依舊為天雄軍庚寅河東節度使劉知遠封北平王恆州節度使杜威加守太傅徐州趙在禮移鎮兗州宋州節度使兼侍衛親軍馬步都指揮使高行周移鎮鄆州侍衛如故鄴都留守馬全節改天雄軍節度使兗州節度使兼侍衛都虞候李守貞移鎮宋州加檢校太師兼侍衛親軍副指揮使河中節度使安審琦加兼侍中移鎮許州許州節度使符彥卿加同平章事移鎮徐州滑州節度使皇甫遇加同平章事壬辰西京留守景延廣加邑封改功臣秦州節度使侯益移鎮河中定州節度使王周加檢校太師永樂大典卷一萬五千六百四十九
