body:
  text: 人甚悅之永樂大典卷四人甚人人人甚悅人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十人甚悅之永樂大典卷四千六百八十一周顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勅到日並仰停罷據見在麴數准備貨賣兼據年計合使麴數依時蹋造候人戶將到價錢據數給麴不得賒賣抑配與人永樂大典卷一萬四千九百八十
