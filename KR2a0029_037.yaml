body:
  text: 舊五代史卷三十七唐書十三明宗紀第三天成元年秋八月乙酉朔日有食之有司上言莊宗廟室酌獻請奏武成之舞從之鄆州節度使霍彥威移鎮青州丁亥莊宗神主祔廟有司請祧懿祖室從之詔陵州合州長流百姓豆盧革韋說等可並自長流後長流原本作長沙今據文改正影庫本粘籤縱逢恩赦不在原宥之限豆盧升韋濤仍削除自前所受官秩壬辰以久雨放百僚朝參詔天下疏理繫囚甲午汴州奏舊管曹州乞卻歸當道從之是日詔曰承前使府奏請判官率皆隨府除移停罷近年流例有異前規使府雖已除移判官元安舊職起今後若是朝廷除授者即不計使府除移如是使府奏請即皆隨府移罷舊例藩侯帶平章事者所奏請判官殿中已上許奏緋中丞已上許奏紫今不帶平章事亦許同帶平章事例處分如防禦團練使奏請判官員外郎已下不在奏緋之限其所奏判官州縣官並須將歷任告身隨奏至京如未有官假稱試攝亦奏狀內分明署出如藩鎮留後權知軍州事並不在奏請判官之限如刺史要奏州縣官須申本道請發表章不得自奏近日州使奏請從事本無官緒妄結虛銜不計職位高卑多是請兼朱紫不唯紊亂實啓撓求宜令諸道州府切準敕命處分丁酉內出象笏三十四面案歐陽史作三十二舊五代史考異賜百官之無笏者己亥帝御文明殿百官入閣月望如月朔之儀從新例也荊南高季興上言峽內三州請朝廷不除刺史幽州奏契丹寇邊詔齊州防禦使安審通率師禦之安審通原本作番道據通鑑云安審通金全之猶子也今改正影庫本粘籤辛丑以前青州節度使符習為鄆州節度使以前華州節度使史敬鎔為安州節度使乙巳禁鎔錢為器仍估定生銅器價斤二百熟銅器斤四百如違省價買賣者以盜鑄錢論丁未樞密使院條奏諸道節度使刺史內有不守詔條公行科斂須行止絶州使所納軍糧不得更邀加耗節度使刺史所置牙隊許於軍都內抽取便給省司衣糧况人數已多訪問尚有招致諸色人多有抵罪亡命便於州府投名為使下元隨邀求職務凌壓平人及有力戶人於諸處行賂希求事務亦有州使妄稱修葺城池廨宇科賦於人及營私宅諸縣鎮所受州使文符如涉科斂人戶不得稟受州府不得賒買行人物色兼行科率已前條件州使如敢犯違許人陳告勘詰不虛量行奬賞宜令三京諸道州府準此處分新授青州節度使霍彥威奏處斬新登州刺史王公儼登州原本作察州今從通鑑改正影庫本粘籤及同謀拒命指揮使李謹王居厚等八人訖初同光中符習為青州節度使宦官楊希望為監軍專制軍政趙在禮之據魏州習奉詔以本軍進討俄而帝為亂軍所劫習即罷歸希望遣兵邀之習懼而還至滑州帝遣人招之習至乃從帝入汴希望聞魏軍亂遣兵圍守習家欲盡殺之公儼素受希望奬愛謂希望曰內侍宜分腹心之兵監四面守陴者則誰敢異圖希望從之公儼乘其無備圍希望之第擒而殺之公儼遂與州將李謹等謀據州城以邀符節即令軍府飛章留己兼揚言符習在鎮人不便其政帝乃除公儼為登州刺史公儼不時赴任不時赴任當云因其不如期赴任考冊府元龜與薛史同今姑仍其舊影庫本粘籤即以霍彥威代符習聚兵淄州以圖進取彥威至淄州會詔使至青州告諭公儼即赴所任彥威懲其初心遣人擒公儼於北海縣與同黨斬於州東案通鑑彥威聚兵淄州以圖進取公儼懼乙未始之官丁酉彥威至青州追擒之舊五代史考異有司上言莊宗祔廟懿祖祧遷準例舍故而諱新懿祖例不諱忌日不行香從之壬子襄州節度使劉訓加檢校太傅以僞蜀右僕射中書侍郎平章事趙國公張格案原本作張裕考舊唐書張濬傳濬次子格仕蜀為平章事今改正舊五代史考異為太子賓客充三司副使從任圜請也九月乙卯朔詔汴州扶溝縣復隸許州以前絳州刺史婁繼英為冀州刺史充北面水陸轉運制置使己未幸至德宮遂幸前隰州刺史袁建豐之第隰州原本作顯州今據歐陽史袁建豐傳改正影庫本粘籤帝嘗為太原內牙親將建豐為副至是建豐風疾沈廢故親幸其第以撫之庚申以都官郎中庾傳美充三川搜訪圖籍使傳美為蜀王衍之舊僚家在成都便於歸計且言成都具有本朝實録及傳美使回所得才九朝實録及殘缺雜書而已癸亥應聖節百僚於敬愛寺設齊召緇黃之衆於中興殿講論從近例也戊辰以僞蜀檢校太師兼中書令右金吾街使張貽範為兵部尚書致仕都官員外郎于鄴奏請指揮不得書契券輒賣良人從之癸酉天策上將軍湖南節度使開府儀同三司守太師兼尚書令楚王馬殷可檢校太師守尚書令兩浙節度留後靜海軍節度嶺南西道觀察處置等使檢校太尉兼中書令錢元瓘加食邑中吳建武等軍節度嶺南東道觀察處置等使檢校太尉兼中書令錢元加開府階錢元原本作遼今從十國春秋改正影庫本粘籤進食邑甲戌以前代州刺史馬溉為左衛上將軍致仕己卯以光祿卿羅周敬為右金吾衛大將軍充街使辛巳以前復州刺史袁為唐州刺史詔曰鳳翔節度使李曮世聯宗屬任重藩宣慶善有稱忠勤顯著既在維城之列宜新定體之文是降寵光以隆敦俾煥成家之美貴崇猶子之親宜於本名上加從字癸未文武百僚至張全義私第柩前立班辭以來月二日葬故也冬十月甲申朔詔賜文武百僚冬服綿帛有差近例十月初寒之始天子賜近侍執政大臣冬服帝顧謂判三司任圜曰百僚散未圜奏曰臣聞本朝給春冬服遍及百僚喪亂已來急於軍旅人君所賜未能周給今止近臣而已外臣無所賜帝曰外臣亦吾臣也卿宜計度圜遂與安重誨據品秩之差以定春冬之賜其後遂以為常右拾遺曹琮上疏內一件百僚朔望入閣及五日內殿起居請許三署寺監官輪次轉對奏事從之刑部員外郎孔莊上言自兵興以來法制不一諸道州縣常行枷杖多不依格律請以舊制曉諭改而正之丙戌吏部侍郎盧文紀上言請內外文武臣僚每歲有司明定考校將相乞回御筆以行黜陟疏下中書門下商量宰臣奏請施行從之丁亥雲南巂州山後兩林百蠻都鬼主右武衛大將軍李卑晚李卑晚原本作卑免今從歐陽史及通鑑改正影庫本粘籤遣大鬼主傳能阿花等來朝貢帝御文明殿對之百僚稱賀庚寅以客省使李嚴領泗州防禦使以河中節度副使李鏻為太子賓客壬辰邠州節度使毛璋移鎮潞州巴州進嘉禾合穗甲午以前隰州刺史袁建豐遙領洪州節度使庚子幽州奏契丹平州守將僞署幽州節度使盧文進案遼史作盧國用蓋文進在遼改名國用耳舊五代史考異率戶口歸明百僚稱賀辛丑契丹遣使來告哀言國主阿保機以今年七月二十七日卒案遼史太祖紀作七月辛巳上崩舊五代史考異詔曰朕近纘皇圖恭修帝道務安夷夏貴洽雍熙契丹王世預歡盟禮交聘問遽聞凶訃倍軫悲懷可輟今月十九日朝參案歐陽史作廢朝三日舊五代史考異丙午以巂州山後兩林百蠻都鬼主李卑晚為寧遠將軍大渡河山前邛川六姓都鬼主懷安郡王勿鄧摽莎為定遠將軍丁未幽州奏盧文進所率降戶孳畜人口在平州西首尾約七十里庚戌以吏部侍郎盧文紀為御史中丞時御史大夫李琪三上表求解任故也以兵部侍郎劉嶽為吏部侍郎以戶部侍郎充端明殿學士馮道為兵部侍郎以中書舍人充端明殿學士趙鳳為戶部侍郎並依前充職壬子靜江軍節度使桂州管內觀察使檢校太師兼中書令扶風郡王馬賨加食邑實封澧朗觀察使檢校太傅兼侍中馬希振加檢校太尉盧文進至幽州遣軍吏奉表來上十一月戊午以滄州留後王景戡為邢州節度使青州奏得登州狀申契丹先攻逼渤海國自阿保機身死雖已抽退尚留兵馬在渤海扶餘城今渤海王弟領兵馬攻圍扶餘城內契丹次案契丹次蓋言契丹方即次也薛史前後如攻城次鎮州次多單用次字疑即當時案牘之文今仍其舊附識于此舊五代史考異己未以翰林學士尚書戶部郎中知制誥劉昫為中書舍人充職辛酉以前祕書少監溫輦為太子詹事壬戌以前房州刺史朱罕為潁州團練使是日詔曰應今日已前修蓋得寺院無令毀廢自此已後不得輒有建造如要願在僧門並須官壇受戒不得衷私剃度癸丑日南至帝御文明殿受朝賀杖衛如式禮部侍郎裴上言諸州刺史經三考方請替移詔曰有政聲者就加恩澤無課最者即便替移課最原本作課再今據五代會要改正影庫本粘籤密州獻芝草庚午河陽節度使夏魯奇移鎮許州留後梁漢顒為邠州節度使淮南楊溥遣使貢獻賀登極乙亥以前振武留後張溫為利州昭武軍留後以果州刺史孫鐸為漢州刺史果州原本作畀州今據冊府元龜改正影庫本粘籤充西川馬步軍都指揮使壬午靜海軍節度安南管內觀察等使檢校太尉兼侍中錢元球加開府階進食邑癸未鎮州奏準詔盧文進所率歸業戶口蠲放租稅三年仍每口給糧五斗十二月戊子盧文進及將吏四百人見賜鞍馬玉帶衣被器玩錢帛有差詔曰朕中興寶祚復正皇綱萬國駢羅俱在照臨之內八紘遼敻咸居覆載之間矧彼雲南素歸正朔洎平僞蜀思錫舊恩於乃眷以雖深欲霈覃而未暇百蠻都首領李卑晚六姓蠻都首領勿鄧摽莎等天資智勇世稟忠勤梯航之道路才通琛賮之貢輸已至率其種落竭乃悃誠備傾向化之心深奬來庭之意來庭原本作果庭今據文改正影庫本粘籤今則各頒國寵別進王封其巂州刺史李及大鬼主離吠等或遙貢表函或躬趨朝闕亦宜特授官資各遷階秩勉敦信義無墜冊書示爾金石之堅保我山河之誓欽承休命永保厥終壬辰帝狩於近郊臘故也甲午以契丹盧龍軍節度使盧文進為檢校太尉同平章事充滑州節度使戊戌詔嚴禁鑞錢案洪遵泉志引宋白續通典云天成元年十二月敕中外所使銅錢內鐵鑞錢即宜毀棄不得行使舊五代史考異庚子皇第二子金紫光祿大夫檢校司徒從榮可檢校太保同平章事天雄軍節度使鄴都留守以武安軍馬步軍都指揮使馬希範為澧州刺史鐵林都知事馬希杲為衡州刺史壬寅潁州刺史孫嶽加檢校太保孫嶽原本作孫崇今據歐陽史改正影庫本粘籤奬能政也丙午中書門下奏故事藩鎮節度觀察使帶平章事於都堂上事刊石記壁合納禮錢三千貫以充中書及兩省公使今欲各納禮錢五百千於中書立石亭子鐫勒宰臣使相官氏授上年月餘充修葺中書及兩省公署部堂什物從之庚戌御史臺奏京城坊市士庶工商之家有婢僕自經投井非理物故者近者已來凡是死亡皆是臺司左右巡舉勘檢施行已久仍恐所差人吏及街市胥徒同於民家因事邀脅邀脅原本作邀頡今從冊府元龜改正影庫本粘籤臣詢訪故事凡京城民庶之家死喪委府縣檢舉軍家委軍巡商旅委戶部然諸司檢舉後具事由申臺其間或枉濫情故臺司訪聞即行舉勘如是文武兩班官吏之家即是臺司檢舉臣請自今已後並準故事施行者詔曰今後文武兩班及諸道商旅凡有喪亡即準臺司所奏施行其坊市民庶軍士之家凡死喪及婢僕非理物故依臺司奏委府縣軍巡同檢舉仍不得縱其吏卒於物故之家妄有邀脅或恐暑月尸柩難停若待申聞檢舉縱無邀脅亦須經時日今後仰本家喚四鄰檢察若無他故逐便葬埋如後別聞枉濫妄有保證官中訪知勘詰不虛本戶鄰保並行科罪如聞諸道州府坊市死喪取分巡院檢舉頗致淹停人多流怨亦仰約京城事例處分永樂大典卷七千一百六十四
