body:
  text: 舊五代史卷二十八唐書四莊宗紀第二天祐九年春正月庚辰朔周德威等自飛狐東下丙戌會鎮定之師進營祁溝祁溝原本作禮溝據胡三省通鑑注云祁溝關在涿州南易州巨馬河之北今改正影庫本粘籤庚子次涿州刺史劉知溫以城歸順德威進迫幽州守光出兵拒戰燕將王行方等以部下四百人來奔二月庚戌朔梁祖大舉河南之衆以援守光以陝州節度使楊師厚為招討使河陽李周彝為副青州賀德倫為應接使鄆州袁象先為副甲子梁祖自洛陽趨魏州遣楊師厚李周彝攻鎮州之棗強命賀德倫攻蓨縣三月壬午梁祖自督軍攻棗強甲申城陷屠之案通鑑作丙戌舊五代史考異時李存審與史建瑭以三千騎屯趙州相與謀曰梁軍若不攻蓨城必西攻深冀吾王方北伐以南鄙之事付我輩豈可坐觀其弊乃以八百騎趨冀州扼下博橋令史建瑭李都督分道擒生翌日諸軍皆至獲芻牧者數百人盡殺之縱數人逸去且告晉王至矣建瑭與李都督各領百餘騎旗幟軍號類梁軍與芻牧者雜行暮及賀德倫營門殺守門者縱火大呼俘斬而旋又執芻牧者斷其手令迴梁軍乃夜遁蓨人持鉏耰白挺追擊之悉獲其輜重案通鑑後梁紀云帝燒營夜遁迷失道委曲行百五十里戊子旦乃至冀州蓨之耕者皆荷鉏奮挺逐之委棄軍資器械不可勝計舊五代史考異梁祖聞之大駭自棗強馳歸貝州殺其將張正言許從實朱彥柔以其亡師於蓨故也梁祖先抱痼疾因是愈甚辛丑滄州都將張萬進殺留後劉繼威自為滄帥遣人送款于梁亦乞降于帝戊申周德威遣李存暉攻瓦橋關下之四月丁巳梁祖自魏南歸疾篤故也戊申李嗣源攻瀛州拔之五月乙卯朔周德威大破燕軍於羊頭岡案通鑑作龍頭岡考異引莊宗實錄作羊頭岡舊五代史考異擒大將單廷珪斬首五千餘級德威自涿州進軍于幽州營于城下閏月己酉攻其西門燕人出戰敗之六月戊寅梁祖為其子友珪所弒友珪僭即帝位于洛陽秋八月朱友珪遣其將韓勍康懷英牛存節率兵五萬急攻河中朱友謙遣使來求援帝命李存審率師救之十月癸未帝自澤州路赴河中遇梁將康懷英於平陽破之斬首千餘級追至白徑嶺白徑嶺原本作百徑據胡三省通鑑注云白徑嶺在河中安邑縣東今改正影庫本粘籤朱友謙會帝於猗氏梁軍解圍而去庚申周德威報劉守光三遣使乞和不報丁卯燕將趙行實來奔天祐十年春正月丁巳周德威攻下順州獲刺史王在思二月甲戌朔攻下安遠軍獲燕將一十八人庚寅梁朱友珪為其將袁象先所殺均王友貞即位於汴州丙申周德威報檀州刺史陳確以城降三月甲辰朔收盧臺軍乙丑收古北口時居庸關使胡令珪等與諸戍將相繼挈族來奔丙寅武州刺史高行珪遣使乞降時劉守光遣愛將元行欽牧馬於山北聞行珪有變率戍兵攻行珪行珪遣其弟行溫為質且乞應援周德威遣李嗣源李嗣本安金全率兵救武州降元行欽以歸四月甲申燕將李暉等二十餘人舉族來奔德威攻幽州南門壬辰劉守光遣使王遵化致書哀祈於德威德威戲遵化曰大燕皇帝尚未郊天何怯劣如是耶怯劣原本作惟劣今據文改正影庫本粘籤守光再遣哀祈德威乃以狀聞己亥劉光濬攻下平州獲刺史張在吉五月壬寅朔光濬進迫營州刺史楊靖以城降乙巳梁將楊師厚會劉守奇率大軍侵鎮州時帝之先鋒將史建瑭自趙州率五百騎入真定師厚大掠鎮冀之屬邑王鎔告急於周德威德威分兵赴援師厚移軍寇滄州張萬進懼遂降于梁遂降於梁原本作遂師今據文改正影庫本粘籤六月壬申朔帝遣監軍張承業至幽州與周德威會議軍事秋七月承業與德威率千騎至幽州西守光遣人持信箭一隻乞修和好承業曰燕帥當令子弟一人為質則可是日燕將司全爽等十一人並舉族來奔辛亥德威進攻諸城門壬子賊將楊師貴等五十人來降甲子五院軍使李信攻下莫州時守光繼遣人乞降將緩帝軍陰令其將孟脩阮通謀於滄州節度使劉守奇及求援於楊師厚帝之游騎擒其使以獻是月帝會王鎔於天長九月劉守光率衆夜出遂陷順州冬十月己巳朔守光帥七百騎步軍五千夜入檀州庚午周德威自涿州將兵躡之壬申守光自檀州南山而遁德威追及大敗之獲大將李劉張景紹及將吏八百五十人馬一百五十匹守光得百餘騎遁入山谷德威急馳扼其城門守光惟與親將李小喜等七騎奔入燕城己丑守光遣牙將劉化脩周遵業等以書幣哀祈德威庚寅守光乘城以病告復令人獻自乘馬玉鞍勒易德威所乘馬而去俄而劉光濬擒送守光偽殿直二十五人於軍門守光又乘城謂德威曰予俟晉王至即泥首俟命祈德威即馳驛以聞十一月己亥朔帝下令親征幽州甲辰發晉陽案歐陽史作十月劉守光請降王如幽州據薛史則帝發晉陽在十一月甲辰非十月也通鑑從薛史己未至范陽辛酉守光奉禮幣歸款於帝帝單騎臨城邀守光辭以佗日蓋為其親將李小喜所扼也是夕小喜來奔帝下令諸軍詰旦攻城壬戌梯並進軍士畢登帝登燕丹塚以觀之有頃擒劉仁恭以獻癸亥帝入燕城諸將畢賀十二月庚午墨制授周德威幽州節度使癸酉檀州燕樂縣人執劉守光幷妻李氏祝氏子繼祚以獻己卯帝下令班師自雲代而旋時鎮州王鎔定州王處直遣使請帝由井陘而西許之庚辰帝發幽州擄仁恭父子以行甲申次定州舍於關城翌日次曲陽曲陽原本作田陽今據文改正影庫本粘籤與王處直謁北嶽祠是日次行唐鎮州王鎔迎謁於路天祐十一年春正月戊戌朔王鎔以履新之日與其子昭祚昭誨奉觴上壽置宴鎔啟曰燕主劉太師頃為隣國今欲挹其風儀可乎帝即命主者破械引仁恭守光至與之同宴鎔饋以衣被飲食己亥帝發鎮州因與王鎔畋於行唐之西壬子至晉陽以組繫仁恭守光號令而入是日誅守光遣大將李存霸拘送仁恭于代州刺其心血奠告于武皇陵然後斬之案遼史太祖紀七年正月晉王李存勗拔幽州擒劉守光考遼太祖七年即天祐十年莊宗以天祐十年冬始拔幽州十一年正月乃凱旋也遼史誤以次年事先一年書之是月鎮州王鎔定州王處直遣使推帝為尚書令案通鑑考異引唐實錄云天祐八年晉王已稱尚書令薛史作天祐十一年與唐實錄異舊五代史考異初王鎔稱藩於梁梁以鎔為尚書令至是鎮定以帝南破梁軍北定幽薊乃共推崇焉使三至帝讓乃從之遂選日受冊開霸府建行臺如武德故事秋七月帝親將自黃沙嶺東下會鎮人進軍邢洺梁將楊師厚軍於漳東帝軍次張公橋既而裨將曹進金奔於梁帝軍不利而退八月還晉陽天祐十二年三月梁魏博節度使賀德倫遣使奉幣乞盟時楊師厚卒於魏州梁主乃割相衞澶三州別為一鎮以德倫為魏博節度使以張筠為相州節度使張筠原本作張均今從薛史梁紀改正影庫本粘籤魏人不從是月二十九日夜案通鑑考異引莊宗實錄作二十七日今考薛史賀德倫傳作二十九日與此紀合舊五代史考異魏軍作亂囚德倫於牙署三軍大掠軍士有張彥者素實凶暴為亂軍之首迫德倫上章請却復六州之地梁主不從遂迫德倫歸於帝且乞師為援帝命馬步副總管李存審自趙州帥師屯臨清帝自晉陽東下與存審會案通鑑晉王引大軍自黃澤嶺東下與存審會于臨清猶疑魏人之詐按兵不進舊五代史考異賀德倫遣從事司空頲至軍密啟張彥狂勃之狀且曰若不翦此亂階恐貽後悔帝默然遂進軍永濟張彥謁見以銀槍効節五百人從皆被甲持兵以自衞帝登樓諭之曰汝等在城濫殺平人奪其妻女數日以來迎訴者甚衆當斬汝等以謝鄴人遽令斬彥及同惡者七人軍士股慄帝親加慰撫而退翌日帝輕裘緩策而進令張彥部下軍士被甲持兵環馬而從命為帳前銀槍衆心大服梁將劉鄩聞帝至以精兵萬人自洹水趣魏縣洹水原作桓水今據通鑑改正影庫本粘籤帝命李存審帥師禦之帝率親軍於魏縣西北夾河為柵六月庚寅朔帝入魏州賀德倫上符印請帝兼領魏州帝從之墨制授德倫大同軍節度令取便路赴任帝下令撫諭鄴人軍城畏肅民心大服是時以貝州張源德據壘拒命南通劉鄩又與滄州首尾相應聞德州無備遣別將襲之遂拔其城命遼州將馬通為德州刺史以扼滄貝之路滄貝原本作滄只今據文改正影庫本粘籤秋七月梁澶州刺史王彥章棄城而遁畏帝軍之逼也以故將李巖為澶州刺史案通鑑考異引莊宗實錄作李嚴舊五代史考異帝至魏縣因率百餘騎覘梁軍之營是日陰晦劉鄩伏兵五千於河曲叢木間帝至伏兵忽起大譟而來圍帝數十重帝以百騎馳突奮擊梁軍辟易決圍而出案通鑑作自午至申乃得出亡其七騎舊五代史考異有頃援軍至乃解帝顧謂軍士曰幾為賊所笑是月劉鄩潛師由黃澤西趨晉陽至樂平而還遂軍於宗城宗城原本作宋城今據歐陽史劉鄩傳改正影庫本粘籤初鄩在洹水數日不出寂無聲迹帝遣騎覘之無斥候者城中亦無煙火之狀但有鳥止於壘上時見旗幟循堞往來帝曰我聞劉鄩用兵一步百變必以詭計誤我使視城中乃縛旗於芻偶之上使驢負之循堞而行得城中羸老者詰之云軍去已二日矣既而有人自鄩軍至者言兵已趨黃澤帝遽發騎追之時霖雨積旬鄩軍倍道兼行皆腹疾足腫加以山路險阻崖谷泥滑緣蘿引葛方得少進顛墜巖坂陷於泥淖而死者十二三前軍至樂平糗糒將竭聞帝軍追躡於後太原之衆在前羣情大駭鄩收合其衆還自邢州陳宋口渡漳水而東駐於宗城時魏之軍儲已乏軍儲原本作申諸今據文改正影庫本粘籤臨清積粟所在鄩欲引軍據之周德威初聞鄩軍之西自幽州率千騎至土門及鄩軍東下急趨南宮知鄩軍在宗城遣十餘騎迫其營擒斥候者斷其腕令還德威至臨清鄩起軍駐貝州帝率親騎次博州鄩軍於堂邑周德威自臨清率五百騎躡之是日鄩軍於莘縣帝營於莘西一舍城壘相望日夕交鬬八月梁將賀瓌襲取澶州帝遣李存審率兵五千攻貝州因塹而圍之冬十月有軍士自鄩軍來奔帝善待之乃劉鄩密令齎酖賂帝膳夫欲置毒於食中會有告者索其黨誅之天祐十三年春二月帝知劉鄩將謀速戰乃聲言歸晉陽以誘之實勞軍於貝州也令李存審守其營鄩謂帝已臨晉陽將乘虛襲鄴三月鄩遣其將楊延直自澶州率兵萬人楊延直原本作延值今據通鑑及歐陽史改正影庫本粘籤會於城下夜半至於南門之外城中潛出壯士五百人突入延直之軍譟聲動地梁軍自亂遲明鄩自莘引軍至城東與延直兵會鄩之來也李存審率兵踵其後李嗣源自魏城出戰俄而帝自貝州至鄩卒見帝驚曰晉王耶因引軍漸却至故元城西李存審大軍已成列矣軍前後為方陣梁軍於其間為圓陣四面受敵兩軍初合梁軍稍衄再合鄩引騎軍突西南而走帝以騎軍追擊之梁步軍合戰短兵既接帝軍鼓譟圍之數重埃塵漲天李嗣源以千騎突入其間衆皆披靡相躪如積帝軍四面斬擊棄甲之聲聞數十里衆既奔潰帝之騎軍追及于河上十百為羣赴水而死梁步兵七萬殲亡殆盡劉鄩自黎陽濟奔滑州是月梁主遣別將王檀率兵五萬自陰地關趨晉陽急攻其城昭義李嗣昭遣將石嘉才案梁紀作家才唐列傳作家財舊五代史考異率騎三百赴援時安金全張承業堅守於內嘉才救援於外檀懼乃燒營而遁追擊至陰地關時劉鄩敗於莘縣王檀遁於晉陽梁主聞之曰吾事去矣三月乙卯朔分兵以攻衞州壬戌刺史米昭以城降夏四月攻洺州下之五月帝還晉陽六月命偏師攻閻寶於邢州梁主遣捉生都將張溫率步騎五百為援至內黃溫率衆來奔秋七月甲寅朔帝自晉陽至魏州八月大閱師徒進攻邢州相州節度使張筠棄城遁去以袁建豐為相州刺史依舊隸魏州案通鑑作四月晉人拔洺州以魏州都巡檢使袁建豐為洺州刺史八月晉人復以相州隸天雄軍以李嗣源為刺史與薛史異舊五代史考異邢州節度使閻寶請以城降以忻州刺史蕃漢副總管李存審為邢州節度使以閻寶為西南面招討使遙領天平軍節度使是月契丹入蔚州案歐陽史及通鑑俱從薛史作蔚州遼史太祖紀神冊元年八月拔朔州擒節度使李嗣本與薛史異振武節度使李嗣本陷於契丹九月帝還晉陽梁滄州節度使戴思遠棄城遁去舊將毛璋入據其城毛璋原本作毛章今據列傳改正影庫本粘籤李嗣源帥師招撫璋以城降乃以李存審為滄州節度使以李嗣源為邢州節度使時契丹犯塞帝領親軍北征至代州北聞蔚州陷乃班師案遼史太祖紀十一月攻蔚新武媯儒五州自代北至河曲踰陰山盡有其地其圍蔚州敵樓無故自壞衆軍大譟乘之不踰時而破蓋由朔州進破蔚州也通鑑作晉王自將兵救雲州契丹聞之引去與遼史異是月貝州平以滄州降將毛璋為貝州刺史自是河朔悉為帝所有帝自晉陽復至於魏州魏州原本作媿州今據通鑑改正影庫本粘籤天祐十四年二月帝聞劉鄩復收殘兵保守黎陽遂率師以攻之不克而還是月甲午新州將盧文進殺節度使李存矩叛入契丹遂引契丹之衆寇新州存矩帝之諸弟也治民失政御下無恩故及於禍帝以契丹王阿保機與武皇屢盟於雲中約為兄弟急難相救至是容納叛將違盟犯塞乃馳書以讓之契丹攻新州甚急刺史安金全棄城而遁契丹以文進部將劉殷為刺史帝命周德威率兵三萬攻之營於城東俄而文進引契丹大至德威拔營而歸因為契丹追躡師徒多喪契丹乘勝寇幽州是時言契丹者或云五十萬或云百萬漁陽以北山谷之間車毳幕羊馬彌漫盧文進招誘幽州亡命之人教契丹為攻城之具飛梯衝車之類畢陳於城下鑿地道起土山四面攻城半月之間機變百端城中隨機以應之僅得保全軍民困弊上下恐懼德威間道馳使以聞帝憂形於色召諸將會議時李存審請急救燕薊且曰我若猶豫未行但恐城中生事李嗣源曰願假臣突騎五千以破契丹閻寶曰但當蒐選銳兵控制山險強弓勁弩設伏待之帝曰吾有三將無復憂矣夏四月命李嗣源率師赴援次於淶水淶水原本作涑水今據歐陽史改正影庫本粘籤又遣閻寶率師夜過祁溝俘擒而還周德威遣人告李嗣源曰契丹三十萬馬牛不知其數近日所食羊馬過半阿保機責讓盧文進深悔其來契丹勝兵散布射獵阿保機帳前不滿萬人宜夜出奇兵掩其不備嗣源具以事聞案遼史太祖紀四月圍幽州不克六月乙巳望城中有氣如烟火狀上曰未可攻也以大暑霖潦班師留盧國用守之是契丹主已於六月退師矣薛史及通鑑皆不載秋七月辛未帝遣李存審領軍與嗣源會於易州步騎凡七萬於是三將同謀銜枚束甲尋澗谷而行直抵幽州八月甲午自易州北循山而行李嗣源率三千騎為前鋒庚子循大房嶺而東距幽州六十里契丹萬騎遽至存審嗣源極力以拒之契丹大敗委棄毳幕廬弓矢羊馬不可勝紀進軍追討俘斬萬計辛丑大軍入幽州德威見諸將握手流涕翌日獻捷於鄴九月班師帝授存審檢校太傅嗣源檢校太保閻寶加同平章事十月帝自魏州還晉陽十一月復至魏州十二月帝觀兵於河上時梁人據楊劉城列柵相望帝率軍履河冰而渡盡平諸柵進攻楊劉城城中守兵三千人帝率騎軍環城馳射又令步兵持斧斬其鹿角負葭葦以堙塹帝自負一圍而進諸軍鼓譟而登遂拔其壘獲守將安彥之是夕帝宿楊劉天祐十五年春正月帝軍徇地至鄆濮時梁主在洛將修郊禮郊禮原本作校禮今以薛史梁末帝紀參考改正影庫本粘籤聞楊劉失守狼狽而還二月梁將謝彥章帥衆數萬來迫楊劉築壘以自固又決河水瀰漫數里以限帝軍六月壬戌帝自魏州復至楊劉甲子率諸軍涉水而進梁人臨水拒戰帝軍小却俄而鼓譟復進梁軍漸退因乘勢而擊之交鬬於中流梁軍大敗殺傷甚衆河水如絳謝彥章僅得免去是月淮南楊溥遣使來會兵將致討於梁也案十國春秋吳世家作七月晉王李存勗遣間使持帛書會兵伐梁王辭以虔州之難與薛史異舊五代史考異秋八月辛丑朔大閱於魏郊河東魏博幽滄鎮定邢洺麟勝雲朔十鎮之師及奚契丹室韋吐渾之衆十餘萬部陣嚴肅旌甲照曜師旅之盛近代為最己酉梁兗州節度使張萬進遣使歸款帝自魏州率師次於楊劉略地至鄆濮而還遂營於麻家渡諸鎮列營十數梁將賀瓌謝彥章以軍屯濮州行臺村行臺村原本作待臺材今據通鑑改正影庫本粘籤結壘相持百餘日帝嘗以數百騎摩壘求戰謝彥章帥精兵五千伏於堤下帝以十餘騎登堤伏兵發圍帝十數重俄而帝之騎軍繼至攻於圍外帝於圍中躍馬奮擊决圍而出李存審兵至梁軍方退是時帝銳於接戰每馳騎出營存審必扣馬進諫帝伺存審有間即策馬而出顧左右曰老子妨吾戲耳至是幾危方以存審之言為忠也十二月庚子朔帝進軍距梁軍柵十里而止時梁將賀瓌殺騎將謝彥章於軍帝聞之曰賊帥自相魚肉安得不亡戊午下令軍中老幼令歸魏州悉兵以趣汴庚申大軍毀營而進辛酉次於臨濮梁軍捨營踵於後癸亥次胡柳陂遲明梁軍亦至帝率親軍出視諸軍從之梁軍已成陣橫亙數十里帝亦以橫陣抗之時帝與李存審總河東魏博之衆居其中周德威以幽薊之師當其西鎮定之師當其東梁將賀瓌王彥章全軍接戰帝以銀槍突入梁軍陣中斬擊十餘里賀瓌王彥章單騎走濮陽帝軍輜重在陣西望見梁軍旗幟皆驚走因自相蹈籍不能禁止帝一軍先敗周德威戰歿是時陂中有土山梁軍數萬先據之帝帥中軍至山下梁軍嚴整不動旗幟甚盛帝呼諸軍曰今日之戰得山者勝賊已據山吾與爾等各馳一騎以奪之帝率軍先登銀槍步兵繼進遂奪其山梁軍紛紜而下復於土山西結陣數里時日已晡矣或曰諸軍未齊不如還營詰朝可圖再戰閻寶曰深入賊境逢其大敵期於盡銳以决雌雄況賊帥奔亡衆心方恐今乘高擊下勢如破竹矣銀槍都將王建及被甲橫槊進曰賊將先已奔亡王之騎軍一無所損賊衆晡晚大半思歸擊之必破王但登山縱觀責臣以破賊之效於是李嗣昭領騎軍自土山北以逼梁軍王建及呼士衆曰今日所失輜重並在山下乃大呼以奮擊諸軍繼之梁軍大敗時元城令吳瓊貴鄉令胡裝各部役徒萬人貴鄉原本作賁鄉今據胡裝本傳改正影庫本粘籤於山下曳柴揚塵鼓譟助其勢梁軍不之測自相騰籍棄甲山積甲子命行戰場收獲鎧仗不知其數時帝之軍士有先入大梁問其次舍者梁人大恐驅市人以守其殘衆奔歸汴者不滿千人帝軍遂拔濮陽永樂大典卷七千一百五十六
