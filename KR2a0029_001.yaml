body:
  text: 舊五代史卷一梁書一太祖紀第一案薛史本紀永樂大典所載俱全獨梁太祖紀原帙已佚其散見於各韻者僅得六十八條參以通鑑考異通鑑注所徵引者又得二十一條本末不具未能綴輯成篇考冊府元龜閏位部所録朱梁事蹟皆本之薛史原文首尾頗詳按條採掇尚可彙萃謹依前人取魏淡書高氏小史補北魏書闕篇之例采冊府元龜梁太祖事編年系日次第編排以補其闕庶幾略還薛史之舊仍於各條下注明原書卷第以備參核焉太祖神武元聖孝皇帝姓朱氏諱晃本名溫永樂大典卷八千六百八十七宋州碭山人其先舜司徒虎之後高祖黯曾祖茂琳祖信父誠帝即誠之第三子母曰文惠王皇后冊府元龜卷一百八十二案五代會要梁肅祖宣元皇帝諱黯舜司徒虎四十二代孫開平元年七月追尊宣元皇帝廟號肅祖葬興極陵敬祖光獻皇帝諱茂琳宣元皇帝長子母曰宣僖皇后范氏開平元年七月追尊光獻皇帝廟號敬祖葬永安陵憲祖昭武皇帝諱信光獻皇帝長子母曰光孝皇后楊氏開平元年七月追尊昭武皇帝廟號憲祖葬光天陵烈祖文穆皇帝諱誠昭武皇帝長子母曰昭懿皇后劉氏開平元年七月追尊文穆皇帝廟號烈祖葬咸寧陵以唐大中六年歲在壬申十月二十一日夜生於碭山縣午溝里是夕所居廬舍之上有赤氣上騰里人望之皆驚奔而來曰朱家火發矣及至則廬舍儼然既入鄰人以誕孩告衆咸異之永樂大典卷一萬六千一十九案以上亦見冊府元龜卷一百八十二以此推之知冊府元龜引五代事蹟多本薛史昆仲三人俱未冠而孤母案冊府元龜引此條母字下有王氏二字攜養寄於蕭縣人劉崇之家帝既壯不事生業以雄勇自負里人多厭之崇以其慵惰每加譴杖唯崇母自幼憐之親為櫛髮嘗誡家人曰朱三非常人也汝輩當善待之家人問其故答曰我嘗見其熟寐之次化為一赤蛇然衆亦未之信也永樂大典卷五千九百四十九唐僖宗乾符中關東荐饑羣賊嘯聚黃巢因之起於曹濮饑民願附者凡數萬帝乃辭崇家與仲兄存俱入巢軍以力戰屢捷得補為隊長唐廣明元年十二月甲申黃巢陷長安遣帝領兵屯於東渭橋是時夏州節度使諸葛爽率所部屯於櫟陽巢命帝招諭爽爽遂降於巢中和元年二月巢以帝為東南面行營先鋒使令攻南陽下之六月帝歸長安巢親勞於灞上七月巢遣帝西拒邠岐鄜夏之師於興平所至皆立功二年二月巢以帝為同州防禦使使自攻取帝乃自丹州南行以擊左馮翊左馮翊原本缺翊字今據通鑑增入影庫本粘籤拔之遂據其郡時河中節度使王重榮屯兵數萬糾合諸侯以圖興復帝時與之鄰封屢為重榮所敗遂請濟師於巢表章十上為僞左軍使孟楷所蔽不達又聞巢軍勢諸校離心帝知其必敗九月帝遂與左右定計斬僞監軍使嚴實監軍使嚴實原本作嚴貴考歐陽史及通鑑俱作嚴實疑原本傳寫之訛今改正影庫本粘籤舉郡降於重榮案舊唐書僖宗紀八月庚子賊同州防禦使朱溫殺其監軍嚴實與大將胡真謝瞳等來降薛史作九月與舊唐書異考新唐書九月丙戌黃巢將朱溫以同州降通鑑亦作九月丙戌朱溫殺其監軍嚴實舉州降皆與薛史同是朱溫之降實在九月舊唐書誤重榮即日飛章上奏時僖宗在蜀覽表而喜曰是天賜豫也乃詔授帝左金吾衛大將軍充河中行營副招討使案歐陽史云王鐸承制拜溫金吾衛大將軍河中行營招討副使薛史以為僖宗詔授與歐陽史異考舊唐書王鐸承制拜溫為華州刺史潼關防禦鎮國軍等使通鑑作王鐸承制以溫為同華節度使是王鐸承制所拜之官非如歐陽史所載也至謝瞳奉表行在乃詔授金吾衛大將軍河中行營招討副使耳當以薛史為得其實仍賜名全忠案是書及舊唐書通鑑皆作僖宗賜名惟鑑戒録云朱太祖統四鎮除中令日名溫與崔相國連搆大事崔每奏太祖忠赤委之關東國無患矣昭宗遽敕太祖改名全忠議者謂全字人王也又在中心甚不可也上方悔焉其說與諸史異蓋傳聞之不同爾舊五代史考異自是率所部與河中兵士偕行所向無不克捷三年三月僖宗制授帝宣武軍節度使依前充河中行營副招討使仍令候收復京闕即得赴鎮案舊唐書中和三年五月以檢校尚書右僕射華州刺史潼關防禦等使朱溫檢校司空兼汴州刺史充宣武節度觀察等使仍賜名全忠據薛史則全忠授宣武節度在三月非五月也由河中行營招討副使遷授非由潼關防禦等使也賜名全忠在二年九月亦非三年五月也通鑑所年月官爵名號皆以薛史為據四月巢軍自藍關南走帝與諸侯之師俱收長安乃率部下一旅之衆仗節東下七月丁卯入於梁苑是時帝年三十有二時蔡州刺史秦宗權與黃巢餘孽合從肆虐共圍陳州久之僖宗乃命帝為東北面都招討使時汴宋連年阻饑公私俱困帑廩皆虛外為大敵所攻內則驕軍難制交鋒接戰日甚一日人皆危之惟帝鋭氣益振是歲十二月帝領兵於鹿邑與巢衆相遇縱兵擊之斬首二千餘級乃引兵入亳州因是兼有譙郡之地四年春帝與許州田從異諸軍同收瓦子寨案瓦子寨原本作瓦于寨考通鑑注黃巢撤民居以為寨屋謂之瓦子寨則于字形近刊訛耳今改正舊五代史考異殺賊數萬衆是時陳州四面賊寨相望驅虜編氓殺以充食號為舂磨寨帝分兵翦撲大小凡四十戰四月丁巳收西華寨賊將黃鄴單騎奔陳帝乘勝追之鼓噪而進會黃巢遁去遂入陳州刺史趙犨迎於馬前俄聞巢黨尚在陳北故陽壘帝遂徑歸大梁是時河東節度使李克用奉僖宗詔統騎軍數千同謀破賊與帝合勢於中牟北邀擊之賊衆大敗於王滿渡王滿渡原本作王蒲今據通鑑改正影庫本粘籤多束手來降時賊將霍存葛從周張歸厚張歸霸皆匍匐於馬前悉宥而納之遂逐殘寇東至於寃句五月甲戌帝與晉軍振旅歸汴館克用於上源驛既而備犒宴之禮克用乘醉任氣帝不平之是夜命甲士圍而攻之案自五月甲戌至此又見通鑑考異所引薛史梁紀與冊府元龜所引符合會大雨雷電克用因得於電光中踰垣遁去惟殺其部下數百人而已六月陳人感解圍之惠為帝建生祠堂於其郡是歲黃巢雖歿而蔡州秦宗權繼為巨孽有衆數萬攻陷鄰郡殺掠吏民屠害之酷更甚巢賊帝患之七月遂與陳人共攻蔡賊於水殺數千人九月己未僖宗就加帝檢校司徒同平章事封沛郡侯食邑千戶光啓元年春蔡賊掠亳潁二郡帝帥師以救之遂東至於焦夷敗賊衆數千生擒賊將殷鐵林梟首以狥軍而還三月僖宗自蜀還長安改元光啓四月戊辰就加帝檢校太保增食邑千五百戶十二月河中太原之師逼長安觀軍容使田令孜奉僖宗出幸鳳翔二年春蔡賊益熾時唐室微弱諸道州兵不為王室所用故宗權得以縱毒連陷汝洛懷孟唐鄧許鄭圜幅數千里殆絶人煙惟宋亳滑潁僅能閉壘而已帝纍出兵與之交戰然或勝或負人甚危之三月庚辰僖宗降制就封帝為沛郡王案舊唐書光啓元年三月以汴州刺史朱全忠為沛郡王充蔡州西北面行營都統據薛史則元年惟增食邑至二年三月乃進封為王也與舊唐書異歐陽史從薛史是月僖宗移幸興元五月嗣襄王熅僭即帝位於長安改元為建貞遣使賫僞詔至汴帝命焚之於庭未幾襄王果敗七月蔡人逼許州節度使鹿宴弘使來求救帝遣葛從周等率師赴援師未至而城陷宴弘為蔡賊所害十一月滑州節度使安師儒以怠於軍政為部下所殺案舊唐書云十月壬子朔滑州軍亂逐其帥安師儒推衙將張驍主留後軍務師儒奔汴朱全忠殺之新唐書云十月朱全忠陷滑州執義成軍節度使安師儒歐陽史從舊唐書作奔汴通鑑從新唐書作被虜據薛史則師儒自為部下所殺與新舊唐書異又新舊唐書俱作十月而薛史作十一月通鑑仍從薛史帝聞之乃遣朱珍李唐賓襲而取之由是遂有滑臺之地案舊唐書云朝廷以汴帥朱全忠兼領義成軍節度使據薛史胡真傳云真以奇兵襲取滑州乃署為滑州節度留後蓋全忠雖嘗兼領義成而不之鎮故署其將胡真為留後十二月僖宗降制就加帝檢校太傅改封吳興郡王食邑三千戶是歲鄭州為蔡賊所陷刺史李璠單騎來奔帝宥而納之以為行軍司馬宗權既得鄭益驕帝遣裨將邏於金隄驛與賊相遇因擊之賊衆大敗追至武陽橋斬首千餘級帝每與蔡人戰於四郊既以少擊衆常出奇以制之但患師少未快其旨宗權又以己衆十倍於帝恥於頻敗乃誓衆堅決以攻夷門既而獲蔡之諜者備知其事遂謀濟師焉三年春二月乙巳承制以朱珍為淄州刺史俾募兵於東道且慮蔡人暴其麥苗期以夏首回歸案自募兵於東道至此亦見通鑑注與冊府元龜同珍既至淄棣旬日之內應募者萬餘人又潛襲青州獲馬千匹鎧甲稱是乃鼓行而歸四月辛亥達於夷門帝喜曰吾事濟矣是時賊將張晊屯於北郊秦賢屯於版橋各有衆數萬樹柵相連二十餘里其勢甚盛帝謂諸將曰此賊方今息師蓄鋭以俟時必來攻我況宗權度我兵少又未知珍來謂吾畏懼止於堅守而已今出不意不如先擊之乃親引兵攻秦賢寨將士踴躍爭先賊果不備連拔四寨斬首萬餘級時賊衆以為神助庚午案通鑑考異云長曆四月甲辰朔無庚午薛史誤今考舊唐書光啓三年四月正作甲辰朔以日數計之庚午乃四月二十七日也此非薛史之誤乃通鑑考異之誤耳賊將盧瑭領萬餘人於圃田北萬勝戍夾汴水為營跨河為梁以扼運路案通鑑注引薛史梁紀曰盧瑭於圃田北夾汴為梁以扼運路視冊府元龜所引稍有刪節帝擇精鋭以襲之是日昏霧四合兵及賊壘方覺遂突入掩殺赴水死者甚衆盧瑭自投於河河南諸賊連敗不敢復駐皆併在張晊寨自是蔡寇皆懷震讋往往軍中自相驚亂帝旋師休息大行犒賞繇是軍士各懷憤激每遇敵無不奮勇五月丙子出酸棗門自卯至未短兵相接賊衆大敗追斬二十餘里僵仆相枕宗權恥敗益縱其虐乃自鄭州親領突將數人徑入張晊寨冊府元龜卷一百八十七其日晚大星隕於賊壘有聲如雷永樂大典卷三千二百七十一辛巳兗鄆滑軍士皆來赴援乃陳兵於汴水之上旌旗器甲甚盛蔡人望之不敢出寨翌日分布諸軍齊攻賊寨自寅至申斬首二萬餘級會夜收軍獲牛馬輜重生口器甲不可勝計是夜宗權晊遁去遲明追之至陽武橋而還宗權至鄭州乃盡焚其廬舍屠其郡人而去始蔡人分兵寇陝雒孟懷許汝皆先據之因是敗也賊衆恐懼咸棄之而遁帝乃慎選將佐俾完葺壁壘為戰守之備於是遠近流亡復歸者衆矣是時揚州節度使高駢為裨將畢師鐸所害復有孫儒楊行密互相攻伐朝廷不能制乃就加帝檢校太尉兼領淮南節度使案舊唐書光啓三年十一月楊行密遣使求援於朱全忠制授全忠檢校太尉侍中兼揚州大都督府長史充淮南節度觀察使行營兵馬都統歐陽史作十二月通鑑作閏十一月據薛史則全忠兼領淮南自在九月以前與諸書異又薛史下文作閏十二月而通鑑作閏十一月亦有互異九月亳州裨將謝殷逐刺史宋衮自據其郡帝親領軍屯於太清宮遣霍存討平之案新唐書云光啓三年六月壬戌亳州將謝殷逐其刺史宋衮八月壬寅謝殷伏誅通鑑從新唐書薛史作九月與新唐書異帝之禦蔡寇也鄆州朱瑄案歐陽史作朱宣薛史前後皆作瑄舊唐書通鑑並同薛史朱瑄歐陽史作朱宣曾三異云流俗本宣傍加玉非也今考舊唐書及通鑑皆作瑄蓋朱瑾朱瑄兄弟命名皆從玉今仍從薛史原文加案聲明影庫本粘籤兗州朱瑾皆領兵來援及宗權既敗帝以瑄瑾宗人也又有力於己皆厚禮以歸之瑄瑾以帝軍士勇悍私心愛之乃密於曹濮界上懸金帛以誘之帝軍利其貨而赴者甚衆帝乃移檄以讓之朱瑄來詞不遜案通鑑考異引高若拙後史補曰梁太祖皇帝到梁園深有大志然兵力不足常欲外掠又虞四境之難每有鬱然之狀時有薦敬秀才於門下乃白梁祖曰明公方欲圖大事輜重必為四境所侵但令麾下將士詐為叛者而逃即明公奏於主上及告四鄰以自襲叛徒為名梁祖曰天降奇人以佐於吾初從其議一出而致衆十倍今案高若拙所紀深得敬翔與梁祖陰謀情狀薛史止據梁實録原辭未及改正歐史作移檄兗鄆誣其誘汴亡卒以東亦未詳考乃命朱珍侵曹伐濮以懲其姦未幾珍伐曹州執刺史丘禮以獻遂移兵圍濮兗鄆之釁自茲而始矣十月僖宗命水部郎中王贊撰紀功碑以賜帝是月帝親騎數千巡師於濮上帝親騎數千以文義求之親字上疑脫帥字今無別本可校姑仍其舊附識於此影庫本粘籤因破朱瑄援師於范縣丁未攻陷濮州刺史朱裕單騎奔鄆尋為鄆人所敗踰月乃還十二月僖宗遣使賜帝鐵券又命翰林承旨劉崇望撰德政碑以賜帝閏月甲寅帝請行軍司馬李璠權知淮南留後乃遣大將郭言領兵援送以赴揚州文德元年正月帝率師東赴淮海行次宋州聞楊行密已拔揚州遂還是時李璠郭言行至淮上為徐戎所扼不克進而還案歐陽史云璠之揚州行密不納據通鑑云李璠至泗州時溥以兵襲之郭言力戰得免而還是李璠未嘗得至揚州也當以薛史為實録帝怒遂謀伐徐二月丙戌僖宗制以帝為蔡州四面行營都統繇是諸鎮之師皆受帝之節制案新唐書正月癸亥朱全忠為蔡州四面行營都統舊唐書作五月與薛史異通鑑從新唐書三月庚子昭宗即位是月蔡人石璠領萬衆以剽陳亳帝遣朱珍率精騎數千擒璠以獻四月戊辰魏博樂彥禎失律其子從訓出奔相州使來乞師帝遣朱珍領大軍濟河連收黎陽臨河二邑既而魏軍推小校羅弘信為帥弘信既立遣使送發於汴帝優而納之遂命班師是月河南尹張全義襲李罕之於河陽克之罕之單騎出奔因乞師於太原李克用為發萬騎以援之罕之遂收其衆偕晉軍合勢急攻河陽全義危急遣使求救於汴帝遣丁會牛存節葛從周領兵赴之大戰於溫縣晉人與罕之俱敗於是河橋解圍全義歸於河陽因以丁會為河陽留後五月己亥昭宗制以帝檢校侍中增食邑三千戶戊辰詔改帝鄉曰衣錦鄉里曰沛王里是月帝以兼有洛孟之地無西顧之患將大整師徒畢力誅蔡會蔡人趙德諲舉漢南之地以歸於朝廷案新唐書昭宗紀五月壬寅趙德諲以襄州降舊唐書及通鑑皆作五月與薛史同歐陽史其事於三月以前疑有舛誤且遣使送於帝仍誓戮力同討宗權帝表其事朝廷因以德諲為蔡州四面副都統又以河陽保義義昌三節度為帝行軍司馬兼糧料應接使冊府元龜卷一百八十七至是帝領諸侯之師會德諲以伐蔡賊於汝水之上遂薄其城五日之內樹二十八寨以環之蓋象列宿之數也永樂大典卷一萬五千一百二十時帝親臨矢石一日飛矢中其左腋血漬單衣顧謂左右曰勿泄永樂大典卷二萬七百十二九月以糧運不繼遂班師是時帝知宗權殘孽不足為患遂移兵以伐徐十月先遣朱珍領兵與時溥戰於吳康鎮徐人大敗連收豐蕭二邑溥攜散騎馳入彭門帝命分兵以攻宿州刺史張友攜符印以降既而徐人閉壁堅守遂命龐師古屯兵守之而還是月蔡賊孫儒攻陷揚州自稱淮南節度使龍紀元年正月龐師古攻下宿遷縣進軍於呂梁時溥領軍二萬晨壓師古之軍而陳師古促戰敗之斬首二千餘級溥復入於彭門二月蔡將申叢遣使來告縛秦宗權於帳下折其足而囚之矣案舊唐書文德元年十二月甲子朔蔡州牙將申叢執秦宗權新唐書作十一月辛酉與舊唐書月日互異薛史作龍紀元年二月蓋即其遣使來告之月而書之也歐陽史作正月誤帝即日承制以叢為淮西留後未幾叢復為都將郭璠所殺是月璠執宗權來獻帝遣行軍司馬李璠牙校朱克讓檻進於長安既至昭宗御延喜樓受俘即斬宗權於獨柳樹下蔡州平昭宗詔加帝食實封一百戶賜莊宅各一區三月又加帝檢校太尉兼中書令進封東平王賞平蔡之功也案舊唐書四月壬戌朔以宣武淮南等節度副大使知節度事管內營田觀察處置等使開府儀同三司檢校太傅兼侍中揚州大都督府長史汴州刺史充蔡州四面行營都統上柱國沛郡王食邑四千戶朱全忠為檢校太尉中書令進封東平王仍賜賞軍錢十萬貫薛史及歐陽史俱作三月與舊唐書異大順元年四月丙辰宿州小將張筠逐刺史張紹光擁衆以附時溥帝率親軍討之殺千餘人筠遂堅守乙卯時溥出兵暴碭山縣帝遣朱友裕以兵襲之敗徐軍三千餘衆獲沙援軍石君和等三十人斬於宿州城下六月辛酉淮南孫儒遣使修好於帝帝表其事請以淮南節度授於儒焉辛未昭宗命帝為宣義軍節度使充河東東面行營招討使案舊唐書五月以宣武軍節度使朱全忠為太原東南面招討使歐陽史從舊唐書作東南面通鑑作南面與舊唐書異考新唐書云五月以朱全忠為南面招討使六月辛未朱全忠為河東東面行營招討使蓋先為南面招討使後改東面也又六月全忠兼領宣義軍新舊唐書皆不載通鑑用薛史時朝廷宰臣張濬將兵討太原故也八月甲寅昭義都將馮霸殺沙所署節度使李克恭來降帝請河陽節度使朱崇節為潞州留後戊辰李克用自率蕃漢步騎數萬以圍潞州帝遣葛從周率驍勇之士夜中銜枚犯圍而入於潞案舊唐書五月潞州軍亂殺其帥李克恭七月朱全忠遣大將葛從周率千騎入潞州薛史統作八月蓋據入潞之月而追言之也九月壬寅帝至河陽遣都將李讜引軍趨澤潞行至馬牢川為晉人所敗帝又遣朱友裕張全義率精兵至澤州北以為應援既而崇節從周棄潞來歸戊申帝廷責諸將敗軍之罪斬李讜李重胤以狥遂班師焉案自九月壬寅至此又見通鑑考異與冊府元龜同十月乙酉帝自河陽赴滑臺時奉詔將討太原先遣使假道於魏魏人不從先是帝遣行人雷鄴告糴於魏既而為牙軍所殺羅弘信懼故不敢從命遂通好於太原十二月辛丑帝遣丁會葛從周率衆渡河取黎陽臨河又令龐師古霍存下淇門衛縣帝徐以大軍繼其後二年春正月魏軍屯於內黃丙辰帝與之接戰自內黃至永定橋魏軍五敗斬首萬餘級羅弘信懼遣使持厚幣請和帝命止其焚掠而歸其俘弘信繇是感悅而聽命焉乃收軍屯於河上八月己丑帝遣丁會急攻宿州刺史張筠堅守其壁會乃率衆於州東築堰壅汴水以浸其城十月壬午筠遂降宿州平案舊唐書作十一月汴軍陷宿州與薛史異歐陽史及新唐書通鑑俱從薛史作十月十一月丁未曹州裨將郭紹賓殺刺史郭饒舉郡來降案新唐書十一月己未曹州將郭銖殺其刺史郭詞叛附於全忠通鑑從新唐書與薛史異歐陽史仍從薛史是月徐將劉知俊率衆二千來降自是徐軍不振十二月兗州朱瑾領軍三萬寇單父帝遣丁會領大軍襲之敗於金鄉界殺二萬餘衆瑾單馬遁去景福元年正月遣丁會於兗州界徙其民數千戶於許州二月戊寅帝親征鄆先遣朱友裕屯軍於斗門甲申次衛南有飛鳥止於峻堞之上鳴噪甚厲副使李璠曰將有不如意之事是夜鄆州朱瑄率步騎萬人襲朱友裕於斗門友裕拔軍南去乙酉帝晨救斗門不知友裕之退前至斗門者皆為鄆人所殺帝追襲鄆人至瓠河不及遂頓兵於村落間時朱瑄在濮州丁亥遇朱瑄率兵將歸於鄆遂來衝擊帝策馬南馳為賊所追甚急前有浚溝躍馬而過張歸厚援矟力戰於其後乃免時李璠與都將數人皆為鄆軍所殺五月丙午遣朱克讓率衆暴兗鄆之麥十一月遣朱友裕率兵攻濮州下之擒刺史邵儒以獻濮州平遂命移軍伐徐州冊府元龜卷一百八十七二年四月丁亥師古下彭門梟溥首以獻通鑑考異引薛史梁紀案冊府元龜引薛史於景福二年事多所刪節考是年春有石佛山之戰今不載通鑑注引薛史云石佛山在彭門南疑即此處闕文也八月帝遣龐師古移兵攻兗駐於曲阜與朱瑾屢戰皆敗之十二月師古遣先鋒葛從周引軍以攻齊州刺史朱威告急於兗鄆既而朱瑄以援兵至遂固其壘冊府元龜卷一百八十七乾寧元年二月帝親領大軍由鄆州東路北次於魚山歐陽史作漁山考通鑑亦作魚山今仍其舊舊五代史考異朱瑄覘知即以兵徑至且圖速戰帝整軍出寨時瑄瑾已陳於前須臾東南風大起我軍旌旗失次甚有懼色即令騎士揚鞭呼嘯俄而西北風驟發時兩軍皆在草莽中帝因令縱火既而煙焰亙天乘勢以攻賊陳瑄瑾大敗永樂大典卷一萬五千一百二十殺萬餘人餘衆擁入清河因築京觀於魚山之下駐軍數日而還二年正月癸亥遣朱友恭帥師復伐兗遂塹而圍之未幾朱瑄自鄆率步騎援糧欲入於兗友恭設伏以敗之盡奪其餉於高吳案通鑑作高梧考薛史前後俱作高吳今仍其舊舊五代史考異因擒蕃將安福順安福慶二月己酉帝領親軍屯於單父以為友恭之援四月濠壽二州復為楊行密所陷是時太原遣將史儼兒李承嗣以萬騎馳入於鄆案通鑑乾寧二年四月河東遣其將史儼李承嗣以萬人馳入於鄆此據薛史梁紀原文惟史儼兒作史儼為微異耳下又云七月克用遣史儼將三千騎詣石門侍衛十二月李克用遣大將史儼李承嗣假道於魏以救之前後復互且其時汴鄆日有戰爭道路阻隔史儼既於四月入鄆不應七月已在石門十二月又過魏也考舊唐書云初兗鄆求援於太原克用令蕃將史完府何懷寶等千騎赴之不言其赴鄆為何時據此篇下云八月獲蕃將史完府十一月擒何懷寶然則四月馳入於鄆者當是史完府何懷寶非史儼李承嗣也參考薛史唐武皇紀及李承嗣傳承嗣等入鄆定在二年之冬梁紀似有舛誤通鑑並采梁唐帝紀亦未能考定畫一朱友恭遂歸於汴八月帝領親軍伐鄆至大仇遣前軍挑戰設伏於梁山以待之既而獲蕃將史完府奪馬數百匹朱瑄脫身遁去復入於鄆案通鑑九月辛未朱全忠自將擊朱瑄戰於梁山瑄敗走還鄆與薛史異歐陽史仍從薛史作八月十月帝駐軍於鄆齊州刺史朱瓊遣使請降瓊即瑾之從父兄也案新唐書昭宗紀十一月壬申齊州刺史朱瓊叛降於朱全忠據薛史則朱瓊自請降至見殺皆在十月與新唐書異通鑑從新唐書帝因移軍至兗瓊果來降未幾瓊為朱瑾所紿掠而殺之帝即以其弟玭為齊州防禦使十一月朱瑄復遣將賀瓌柳存及蕃將何懷寶等萬餘人以襲曹州案通鑑作薛懷寶考舊唐書亦作何懷寶今仍之舊五代史考異庶解兗州之圍也帝知之自兗領軍策馬先路至巨野南追而敗之殺戮將盡生擒賀瓌柳存何懷寶及賊黨三千餘人是日申時狂風暴起沙塵沸湧帝曰此乃殺人未足耳遂下令盡殺所獲囚俘風亦止焉翼日縶賀瓌等以示於兗帝素知瓌名乃釋之惟斬何懷寶於兗城之下乃班師十二月葛從周領兵復伐兗案通鑑云朱全忠之去兗州也留葛從周將兵守之與薛史梁紀異又薛史葛從周傳作十月事既至與朱瑾戰於壘下殺千餘衆擒其將孫漢筠已下二十人遂旋師三年正月河東李克用既破邠州欲謀爭霸乃遣蕃將張污落以萬騎寨於河北之莘縣聲言欲救兗鄆魏博節度使羅弘信患之使來求援冊府元龜卷一百八十七二月帝領親軍屯於單父會寒食帝乃親拜文穆皇帝陵於碭山縣午溝里冊府元龜卷一百八十九四月辛酉河東泛漲將壞滑城帝令決隄岸以分其勢為二河夾滑城而東為害滋甚是日帝遣許州刺史朱友恭領兵萬人渡淮以便宜從事時洪鄂二州纍遣使求援故有是行五月命葛從周統軍屯於洹水以備蕃軍六月李克用帥蕃漢諸軍營於斥丘遣其男落落將鐵林小兒三千騎薄於洹水從周與戰大敗之生擒落落以獻克用悲駭請修舊好以贖其子帝不許遂執落落送於羅弘信斬之越七日我軍還屯陽留以伐鄆八月復壁於洹水是時昭宗幸華州遣使就加帝檢校太師守中書令四年正月帝以洹水之師大舉伐鄆辛卯營於濟水之次案胡三省云漢以後無濟水此濟水蓋即鄆城清河水也舊五代史考異龐師古令諸將撤木為橋乙未夜師古以中軍先濟聲振於鄆朱瑄聞之棄壁夜走葛從周逐之至中都北擒瑄并其妻男以獻案自辛卯營於濟水之次至此又見通鑑考異惟中少數字蓋引書間有刪節也尋斬汴橋下鄆州平己亥帝入於鄆以朱友裕為鄆州兵馬留後案通鑑正月以龐師古為天平軍留後三月表朱友裕為天平軍留後據薛史郴王友裕傳四年帝下東平即為天平留後與通鑑異時帝聞朱瑾與史儼兒在豐沛間搜索糧饋豐沛原本作澧沛今據文改正影庫本粘籤惟留康懷英以守兗州帝因乘勝遣葛從周以大軍襲兗懷英聞鄆失守俄又我軍大至乃出降朱瑾史儼兒遂奔淮南兗海沂密等州平案新唐書昭宗紀四年正月丙申朱全忠陷鄆州天平軍節度朱宣死之二月朱全忠寇兗州泰寧軍節度使朱瑾奔於淮南舊唐書正月癸未汴將龐師古陷鄆州二月戊申汴將葛從周陷兗州與薛史月日前後不同詳見通鑑考異乃以葛從周為兗州留後冊府元龜卷一百八十七五月丁丑朱友恭遣使上言大破淮寇於武昌收復黃鄂二州通鑑考異引薛史梁紀八月陝州節度使王珙遣使來乞師是時珙弟珂實為蒲帥案珂原本訛作琦今據新唐書王重榮傳改正舊五代史考異迭相憤怒日尋干戈而珙兵寡故來求援帝遣張存敬楊師厚等領兵赴陝既而與蒲人戰於猗氏大敗之九月帝以兗鄆既平將士雄勇遂大舉南征案舊唐書昭宗紀師古渡淮在十月而清口之敗在十一月薛史繫於九月蓋舉南征之議實始於九月其後遂終言之耳歐陽史改作九月攻淮南則清口之役乃因雨雪而敗有九國志可據斷非九月事也命龐師古以徐宿宋滑之師直趨清口葛從周以兗鄆曹濮之衆徑赴安豐淮人遣朱瑾領兵以拒師古因決水以浸軍遂為淮人所敗師古歿焉葛從周行及濠梁聞師古之敗亦命班師冊府元龜卷一百八十七
