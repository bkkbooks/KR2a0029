body:
  text: 舊五代史卷四梁書四太祖紀第四開平二年正月癸酉帝御金祥殿受宰臣文武百官及諸藩屏陪臣稱賀諸道貢舉一百五十七人見于崇元門幽州劉守光進海東鷹鶻蕃馬氈罽方物册府元龜卷一百九十七案五代春秋正月晉王克用薨二月自去冬少雪春深農事方興久無時雨兼慮有災疾帝深軫下民遂命庶官遍祀於羣望掩瘞暴露令近鎮案古法以禳祈旬日乃雨永樂大典卷二千六百三十案通鑑二月癸亥鴆殺濟陰王於曹州新唐書昭宣帝紀亦云二月遇弒歐陽史作正月己亥卜郊于西都弒濟陰王與諸書異帝以上黨未收因議撫巡便往西都赴郊禋之禮乃下令曉告中外取三月一日離東京以宰臣韓建權判建昌宮事案五代會要十月以尚書兵部侍郎李皎為建昌宮副使舊五代史考異兵部侍郎姚洎為鹵簿使開封尹博王友文為東都留守三月壬申帝親統六軍巡幸澤潞是日寅時車駕西幸宰臣並要切司局皆扈從晚次中牟册府元龜卷二百五下詔以去年六月後昭義行營陳歿都將吏卒死于王事追念忠赤乃録其名氏各下本軍令給養妻孥三年內官給糧賜册府元龜卷一百九十五丁丑幸澤州辛巳案辛巳歐陽史通鑑俱作壬午舊五代史考異以同州節度使劉知俊為潞州行營招討使壬午宴扈駕羣臣並勞知俊賜以金帶戰袍寶劍茶藥永樂大典卷一萬六千七百四十六甲申登東北隅逍遙樓搜閲騎乘旌甲滿野册府元龜卷二百一十四丙申招討使劉知俊上章請車駕還東京蓋小郡湫隘非久駐蹕之所達覽帝俞其請册府元龜卷二百五以鴻臚卿李唐室宗屬封萊國公為二王後有司奏萊國公李合留三廟於西都選地位建立廟宇以備四仲祀祭命度支供給以遵彝典册府元龜卷二百一十一四月以吏部侍郎于兢為中書侍郎平章事以翰林奉旨學士張策為刑部侍郎平章事時帝在澤州拜二相於行在册府元龜卷一百九十九案通鑑癸巳門下侍郎同平章事張文蔚卒癸卯門下侍郎同平章事楊涉罷為右僕射是拜二相於行在所以代張文蔚楊涉也梁代避諱改承旨為奉旨通鑑誤作承旨四月丙午車駕離澤州丁未駐蹕於懷州宴宰臣文武百官辛亥至鄭州壬子幸東京案五代春秋作丙午帝還東都歐陽史作壬子至澤州惟通鑑與薛史同舊五代史考異丙寅車駕幸繁臺觀稼册府元龜卷二百五鄢陵居人程震以兩歧麥穗並畫圖來進册府元龜卷二百二甲寅淮寇侵軼侵軼原本作侵軹今據文改正影庫本粘籤潭嶽邊境欲援朗州以戰艦百餘艘揚帆西上泊鼎口湖南馬殷遣水軍都將黃瑀率樓船遮擊之賊衆沿流宵遁追至鹿角鎮册府元龜卷二百一十七詔以戶部尚書致仕裴迪復為右僕射迪敏事慎言達吏治明籌算帝初建節旄於夷門迪一謁見如故知乃辟為從事自是之後歷三十年委四鎮租賦兵籍帑廩官吏獄訟賞罰經費運漕事無巨細皆得專之帝每出師即知軍州事逮于二紀不出梁之闉閎甚有裨贊之道禪代之歲命為太常卿屬年已耆耄視聽昏塞不任朝謁遂請老許之期月復起師長庶官焉册府元龜卷二百一十一五月丁丑王師圍潞州將及二年李進通危在旦夕不俟攻擊當自降太原李存勗以厚幣誘結北蕃諸部並其境內丁壯悉驅南征決戰以救上黨之急部落帳族馳馬勵兵數路齊進於銅鞮樹寨旗壘相望册府元龜卷二百一十七王師敗於潞州永樂大典卷一萬四千二百一十二案潞州之敗歐陽史作五月己丑通鑑作壬申舊五代史考異己丑令下諸州去年有蝗蟲下子處蓋前冬無雪至今春亢陽致為災沴實傷隴畝必慮今秋重困稼穡自知多在荒陂榛蕪之內所在長吏各須分配地界精加翦撲以絶根本壬辰夜火星犯月太史奏災合在荊楚乃令設武備寬刑罰恤人禁暴以禳之永樂大典卷二千六百三十軍前行營都將康懷英孫海金以下主將四十三人於右銀臺門進狀待罪帝以去年發軍之日不利有違兵法並釋放兼各賜分物酒食勞問永樂大典卷一萬四千二百一十二制義昌軍節度使劉守文加中書令封大彭王盧龍軍節度使劉守光封河間郡王河間原本作河澗今據文改正影庫本粘籤許州節度使馮行襲封長樂王册府元龜卷一百九十六是月癸未淮賊寇荊州石首縣襄陽舉舟師沿瀺港襲敗之册府元龜卷二百一十七六月辛亥以亢陽慮時政之闕乃詔曰邇者下民喪禮法吏舞文銓衡既失於選求州鎮又無其舉刺風俗未厚獄訟實繁職此之由上遭天譴至是決遣囚徒及戒勵中外丙寅月犯角宿帝以其分野在兗州乃令長吏治戎事設武備省獄訟恤疲病祈福禳災以順天戒永樂大典卷二千六百三十丙辰邠岐來寇雍西編戶困于逃避且芟害禾稼結營自固踰月同州劉知俊領所部兵擊退襲至幕谷案歐陽史作漠谷五代春秋仍作幕谷大破之俘斬千計收其器甲宋文通僅以身免册府元龜卷二百一十七詔曰敦尚儉素抑有前聞斥去浮華期臻至理如聞近日貢奉競務奢淫或奇巧蕩心或雕鐫溢目徒殫資用有費工庸此後應諸道進獻不得以金寶裝飾戈甲劍戟至於鞍勒不用塗金及雕刻龍鳳如有此色所司不得引進永樂大典卷一萬九千五百九十九雍州奏鏌山僧法通道璘有道行各賜紫衣册府元龜卷一百九十四是月壬戌嶽州為淮賊所據帝以此郡此郡原本作北郡今據文改正影庫本粘籤五嶺三湘水陸會合之地委輸商賈靡不由斯遂令荊湘湖南北舉舟師同力致討王師集淮夷毀壁焚郛郭而遁册府元龜卷二百一十七秋七月甲戌大霖雨陂澤泛溢頗傷稼穡帝幸右天武軍河亭觀水册府元龜卷二百五幸高僧臺閲禁衛六軍册府元龜卷二百一十四詔曰車服以庸古之制也貴賤無別罪莫大焉應內外將相許以銀飾鞍勒其刺史都將內諸司使以降祇許用銅冀定尊卑永為條制仍令執法官糾察之册府元龜卷一百九十一案五代會要載七月敕曰祭祀之儀有國大事如聞官吏慢于恪恭牲具禮容有異精審宜令御史臺疏其條件奏聞舊五代史考異癸巳以禪代已來思求賢哲乃下令搜訪牢籠之期以好爵待以優榮各隨其材咸使登用宜令所在長吏切加搜訪每得其人則疏姓名以聞如在下位不能自振者有司薦導之如任使後顯立功勞別加遷陟册府元龜二百一十三敕禁屠宰兩月册府元龜卷一百九十五甲午以高明門外繁臺為講武臺是臺西漢梁孝王之時嘗按歌閲樂於此當時因名曰吹臺其後有繁氏居於其側里人乃以姓呼之時代綿寢案綿寢原作綿浸今據通鑑注改正舊五代史考異雖官吏亦從俗焉帝每登眺搜乘訓戎宰臣以是事奏而名之册府元龜卷一百九十六案以上又見通鑑注所引薛史與册府元龜相符惟字句稍有異同八月辛亥敕應有暴露骸骨各委差人埋瘞册府元龜卷一百九十五兩浙錢鏐奏請重鑄換諸州新印册府元龜卷一百九十一詔禁戢諸軍節級兵士及供奉官受旨殿直以下各修禮敬册府元龜卷一百九十一甲寅太史奏壽星見於南方册府元龜卷二百二兩浙錢鏐奏改管內紫極宮為真聖觀册府元龜卷一百九十四改臨安縣廣義鄉為衣錦鄉通鑑注引薛史案十國春秋吳越世家八月梁敕改唐山縣為吳昌縣唐興縣為天台縣又敕升杭越等州為大都督府復改新城縣曰新登長城縣曰長興樂成縣曰樂清避梁諱也舊五代史考異甲子夜東方有大流星光明燭地有聲如裂帛永樂大典卷七千八百六十六廣州上言白龍見圖形以進永樂大典卷五百二十九月丙子太原軍出陰地關南牧寇掠郡縣晉絳有備帝慮諸將玩寇乃下詔親議巡幸命有司備行丁丑翠華西狩宰臣翰林學士崇政院使金吾仗及諸司要切官皆扈從餘文武百官並在東京壬午達雒陽帝御文思殿受朝參許汝孟懷牧守來朝孟懷原本作盂懷今據文改正影庫本粘籤澤州刺史劉重霸面陳破敵之策癸未西幸宿新安丙戌至陝州駐蹕案通鑑作乙酉舊五代史考異蒲雍同華牧守皆進鎧甲騎馬戈戟食味方物册府元龜卷二百五幽州都將康君紹等十人自蕃賊寨內來投又幽州騎將高彥章八十人騎先在並州乃於晉州軍前來降至是到行在皆賜分物衣服放歸本道以示懷服册府元龜卷二百一十五丁亥至陳州賜宴扈從官永樂大典卷一萬六千七百四十六戊子延州賊軍寇上平關又太原軍攻平陽烽火羽書晝夜繼至乙丑六軍統軍牛存節黃文靖各領所部將士赴行在甲午太原步騎數萬攻逼晉絳踰旬不克知大軍至乃自焚其寨至夕而遁册府元龜卷二百五至夕而遁原本作至久今參考通鑑改正影庫本粘籤福州貢玳瑁琉璃犀象器並珍玩香藥奇品海味色類良多價纍千萬册府元龜卷一百九十七十月己亥上在陝兩浙節度使奏於常州東州鎮殺淮賊萬餘人獲戰船一百二隻册府元龜卷二百一十七以行營左廂步軍指揮使賀瓌為左龍虎統軍以左天武軍夾馬指揮使尹皓為輝州刺史以右天武都頭韓瑭為神捷指揮使左天武第三都頭胡賞為右神捷指揮使仍賜帛有差以解晉州圍之功也册府元龜卷二百一十以尹皓部下五百人為神捷軍通鑑注引薛史乙巳御內殿宴宰臣扈從官共四十五人丙午御毬場殿宣夾馬都指揮使尹皓韓瑭以下將士五百人賜酒食庚戌至西都御文思殿辛亥宰臣百僚起居於殿前遂宣赴內宴賜方物有差丁巳至東都永樂大典卷一萬六千七百四十六案通鑑考異引編遺録作乙卯實録作丁巳今考五代春秋作丁巳與薛史同歐陽史作丁未與薛史異舊五代史考異己未大明節諸道節度刺史各進獻鞍馬銀器綾帛以祝壽宰臣百官設齋相國寺永樂大典卷一萬六千四百八十七壬戌御宣和殿宴宰臣文武百官十一月辛未御宣和殿宴宰臣文武百官以大駕還京故也庚辰御宣和殿宴宰臣文武百官永樂大典卷一萬六千七百四十六出開明門登高僧臺閲兵册府元龜卷二百一十四諸道節度使刺史各進賀冬田器鞍馬綾羅等戊子賜文武百官帛册府元龜卷一百九十七乙未又宴宰臣文武百官於宣和殿永樂大典卷一萬六千七百四十六案歐陽史癸巳張策罷左僕射楊涉同中書門下平章事十二月立二王三恪南郊禮儀使狀伏以詩稱有客書載虞賓實因禪代之初必行興繼之命俾之助祭式表推恩兼垂恪敬之文別示優崇之典徵於歷代襲用舊章謹按唐朝以後魏元氏子孫韓國公為三恪以周宇文氏子孫為介國公隋朝楊氏子孫為酅國公為二王後今伏以國家受禪封唐朝子孫李為萊國公今參詳合以介國公為三恪酅國公萊國公為二王後册府元龜卷二百一十一案五代會要十二月改左右天武為龍虎軍左右龍虎為天武軍左右天威為羽林軍左右羽林為天威軍左右英武為神武軍左右神武為英武軍前朝置龍虎六軍謂之衛士至是以天武神武英武等六軍易其軍號而任勳舊焉舊五代史考異癸丑獵畋于含耀門外册府元龜卷二百五開平三年正月戊辰朔帝御金祥殿受宰臣翰林學士稱賀文武百官拜表於東上閣門册府元龜卷一百九十七己巳奉遷太廟四室神主赴西京太常儀仗鼓吹導引齋車文武百官奉辭於開明門外册府元龜卷一百八十九甲戌發東都百官扈從次中牟縣乙亥次鄭州丙子次汜水縣河南尹張宗奭河陽節度使張歸霸並來朝戊寅次偃師縣己卯備法駕六軍儀仗入西都是日御文明殿受朝賀册府元龜卷二百五詔曰近年以來風俗未泰兵革且繁正月燃燈廢停已久今屬創開鴻業初建洛陽方在上春務達陽氣宜以正月十四十五十六日夜開坊市門一任公私燃燈祈福永樂大典卷六千六百六十六庚寅親享太廟册府元龜卷一百八十九辛卯祀昊天上帝於圜丘是日降雪盈尺帝升壇而雪霽禮畢御五鳳樓五鳳樓下原本衍一于字今據文刪去影庫本粘籤宣制大赦天下永樂大典卷四千三百七十六賜南郊行事官禮儀使趙光逢以下分物甲午上御文思殿宴羣臣賜金帛有差丙申賜文武官帛有差命宣徽使王殷押絹一萬匹並茵褥圖帟二百六十件賜張宗奭永樂大典卷一萬三千七百一十九案歐陽史丙申羣臣上尊號曰睿文聖武廣孝皇帝改西京貞觀殿為文明殿含元殿為朝元殿二月改思政殿為金鑾殿敕東都曰自升州作府建邑為都未廣邦畿頗虧國體其以滑州酸棗縣長垣縣鄭州中牟縣陽武縣宋州襄邑縣曹州戴邑縣許州扶溝縣鄢陵縣陳州太康縣等九縣宜並割屬開封府仍升為畿縣册府元龜卷一百九十六案輿地廣記朱梁時楊氏據江淮于是吳越錢氏上言以淮寇未平恥聞逆姓請改松陽縣為長松舊五代史考異丁酉宴羣臣於崇勳殿甲辰又宴羣臣於崇勳殿蓋藩臣進賀勉而從之永樂大典卷一萬六千七百四十八丙午宗正寺請修興極永安光天咸寧諸陵並令添修上下宮殿栽植松柏制可癸亥敕豐沛之基寢園所在悽愴動關於情理充奉自繫於國章宜設陵臺兼升縣望其輝州碭山縣宜為赤縣仍以本縣令兼四陵臺令册府元龜卷一百八十九同州節度使劉知俊奏延州都指揮使高萬興部領節級家纍三十八人來降三月以萬興檢校司徒為丹延等州安撫招誘等使册府元龜卷二百一十五辛未詔曰同州邊隅繼有士衆歸化暫思巡撫兼要指揮今幸蒲陝今幸蒲陝原本作今宰今據文改正影庫本粘籤取九日進發甲戌車駕發西都百官奉辭于師子門外丁丑次陝州己卯次解縣河中節度使冀王友謙來奉迎庚辰至河中府册府元龜卷二百五幸右軍舊杏園講武册府元龜卷二百一十四丙戌以朔方節度使兼中書令韓遜為潁川王遜本靈州牙校唐末據本鎮朝廷因而授以節鉞永樂大典卷一萬九千八百一十七四月丙申朔駐蹕河中壬寅辰時駕巡于朝邑縣界焦黎店冀王友謙及崇政內諸司使扈從至申時回册府元龜卷二百五己亥御前殿宴宰臣及冀王友謙扈從官甲寅宴宰臣及扈從官於內殿永樂大典卷一萬六千七百四十八制易定節度使王處直進封北平王福建節度使王審知封閩王廣州節度使劉隱封南平王案甲寅通鑑作庚子與薛史異舊五代史考異同州節度使劉知俊封大彭郡王山南東道節度使楊師厚封弘農郡王册府元龜卷一百九十六五月乙丑朔朝遂命宰臣及文武百官宴於內殿己卯車駕至西京癸未御崇勳殿宴宰臣及文武官四品以上己丑復御崇勳殿宴宰臣文武官四品以上永樂大典卷一萬六千七百四十八升宋州為宣武軍節鎮仍以亳輝潁為屬郡通鑑注引薛史六月庚戌同州節度使劉知俊據本郡反制令削奪劉知俊在身官爵仍徵發諸軍速令進討如有軍前將士懷忠烈以知機賊內朋徒憤脅從而識變便能梟夷逆豎擒獲凶渠務立殊功當行厚賞活捉得劉知俊者賞錢一萬貫文便授忠武軍節度使並賜莊宅各一所如活捉得劉知浣者賞錢一千貫文案一千原作一萬今據通鑑長編引梁代賞功之典改正舊五代史考異便與除刺史有官者超轉三階無官者特授兵部尚書如活捉得劉知俊骨肉及近上都將並梟送闕廷者賞賜有差册府元龜卷二百一十六辛亥駕至蒲陝案通鑑作癸丑帝至陝與薛史前後異舊五代史考異文武百官於新安縣奉迎册府元龜卷二百五劉知俊弟內直右保勝指揮使知浣自雒奔至潼關右龍虎軍十將張溫以上二十二人於潼關擒獲劉知浣送至行在敕劉知浣逆黨之中最為頭角龍虎軍親兵之內實冠爪牙昨者攻取潼關率先用命尋則擒獲知浣最上立功頗壯軍威將除國難所懸賞格便可支分許賜官階固須除授但昨捉獲劉知浣是張溫等二十二人一時向前共立功效其賞錢一千貫文數內一百貫文與最先打倒劉知浣衙官李稠四十三貫文與十將張溫二十人各與錢四十二貫八百五十文立功敕命便授郡府亦緣同時立功人數不少所除刺史難議偏頗宜令逐月共支給正刺史料錢二百貫文數內十將張溫一人每月與十貫文餘二十一人每月每人各分九貫文仍起七月一日以後支給人與轉官職仍勘名銜分析申奏當與施行册府元龜卷二百一十是月知俊奔鳳翔同州平永樂大典卷三千五百一十三七月乙丑敕行營將士陳歿者咸令所在給槥櫝津置歸鄉里戰卒聞之悉感涕册府元龜卷一百九十五丙寅命宰臣楊涉赴西都以孟秋享太廟册府元龜卷一百八十九改章善門為左右銀臺門其左右銀臺門却改為左右興善門册府元龜卷一百九十六敕大內皇牆使諸門素來未得嚴謹將令整肅須示條章宜令控鶴指揮應於諸門各添差控鶴官兩人守帖把門其諸司使並諸司諸色人並勒於左右銀臺門外下馬不得將領行官一人輒入門𩹉其逐日諸道奉進客省使於千秋門外排當訖勒控鶴官舁撎至內門前準例令黃門殿直以下舁進輒不得令諸色一人到千秋門內其興善門仍令長官關鎖案興善原作章善今據上文及五代會要改正舊五代史考異不用逐日開閉是日又敕皇牆大內本尚深嚴宮禁諸門豈宜輕易未當條制交下因循苟出入之無常且公私之不便須加鈐轄用戒門閭宜令宣徽院使等切準此處分册府元龜卷一百九十一進封幽州節度使河間郡王劉守光為燕王册府元龜卷一百九十六案通鑑七月癸酉帝發陝州乙亥至洛陽寢疾舊五代史考異己丑夕寢殿棟折詰旦召近臣諸王視棟折之迹帝慘然曰幾與卿等不相見君臣對泣久之遂詔有司釋放禁人從八月朔日後減膳進素食禁屠宰避正殿修佛事以禳其咎永樂大典卷一萬六千五百七十一商州刺史李稠棄郡西奔本州將吏以都牙校李玫權知州事通鑑注引薛史八月甲午以秋稼將登霖雨特甚命宰臣以下禱於社稷諸祠永樂大典卷二千六百三十詔曰封嶽告功前王重事祭天肆覲有國恆規朕以眇身恭臨大寶既功德未敷於天下而災祥互降於域中慮於告謝之儀有缺齋虔之禮爰修昭報用契幽通宜令中書侍郎平章事于兢往東嶽祭拜禱祀訖聞奏于兢原本作於兢今據歐陽史改正影庫本粘籤永樂大典卷一萬六千九百五十八又敕朕以干戈尚熾華夏未寧宜循卑菲之言用致雍熙之化起八月一日常朝不御金鑾崇勳兩殿只於便殿聽政册府元龜卷一百九十七辛亥制諸郡如有陳歿將士仰逐都安存家屬如有弟兄兒姪便給與衣糧充役册府元龜卷一百九十五贈故山南東道節度使留後王班太保贈故同州觀察判官盧匪躬工部尚書班故河陽將纍以軍功為郡守主留事於襄陽為小將王求所殺匪躬嘗為劉知俊判官知俊反不偕行為亂兵所害册府元龜卷二百一十敕建國之初用兵未罷未罷原本作之罷今據五代會要改正影庫本粘籤諸道章表皆繫軍機不欲滯留用防緩急其諸道所有軍事申奏宜令至右銀臺門委客省畫時引進諸道公事即依前四方館準例收接册府元龜卷一百九十一司天臺奏今月二十七日平明前東南丙上去山高三尺以來老人星見測在井宿十一度其色光明闊大册府元龜卷二百二敕所在長吏放雜差役兩稅外不得妄有科配自今後州縣府鎮凡使命經過若不執敕文券並不得妄差人驢及取索一物已上又今歲秋田皆期大稔仰所在切如條流本分納稅及加耗外勿令更有科索切戒所繇人更不得於鄉村乞託擾人册府元龜卷一百九十一閏八月襄陽叛將李洪差小將進表帝示以含弘特賜敕書慰諭又制左馮背叛左馮原本作左憑今據文改正影庫本粘籤元惡遁逃如聞相濟之徒多是脅從之輩若能回心向國轉禍全身當與加恩必不問罪仍令同華雍等州切加招諭如能梟斬溫韜或以鎮寨歸化必加厚賞仍獎官班兼委本界招復人戶切加安存册府元龜卷二百一十五己卯幸西苑觀稼册府元龜卷二百五
