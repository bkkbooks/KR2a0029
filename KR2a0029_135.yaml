body:
  text: 不知所適劫村民使為鄉不知所適劫村不知所適不知所適劫不知所不知所適劫村民使不知所適不知所適劫村不知不知所適劫村不知所不不知不不知所適劫村民使為鄉導誤趨晉州路行百餘里方覺崇怒殺鄉導者得他路而去乃易名號被毛褐張樺笠而行至沁州與從者三五騎止於郊舍寒餒尤甚潛令告偽刺史李廷誨廷誨饋盤餐解衣裘而與之每至屬邑縣吏奉食匕箸未舉聞周師至即蒼黃而去崇年老力憊伏於馬上日夜奔竄僅能支持距太原一舍其子承鈞夜以兵百人迎之而入及周師臨城下崇氣懾自固閉壘不出月餘世宗乃旋軍顯德二年十一月崇以病死其子承鈞襲偽位鈞之事迹具皇家日曆永樂大典卷九千九百九史臣曰守光逆天反道從古所無逮至臨刑尚求免死非唯惡之極也抑亦愚之甚也劉晟據南極以稱雄屬中原之多事洎乎奕世遇我昌朝力憊而亡不泯其嗣亦其幸也劉崇以亡國之餘竊偽王之號多見其不知量也今元惡雖斃遺孽尚存勢蹙民殘不亡何待永樂大典卷九千九百九不知所適劫村民使為鄉導誤趨晉州路行百餘里方覺崇怒殺鄉導者得他路而去乃易名號被毛褐張樺笠而行至沁州與從者三五騎止於郊舍寒餒尤甚潛令告偽刺史李廷誨廷誨饋盤餐解衣裘而與之每至屬邑縣吏奉食匕箸未舉聞周師至即蒼黃而去崇年老力憊伏於馬上日夜奔竄僅能支持距太原一舍其子承鈞夜以兵百人迎之而入及周師臨城下崇氣懾自固閉壘不出月餘世宗乃旋軍顯德二年十一月崇以病死其子承鈞襲偽位鈞之事迹具皇家日曆永樂大典卷九千九百九史臣曰守光逆天反道從古所無逮至臨刑尚求免死非唯惡之極也抑亦愚之甚也劉晟據南極以稱雄屬中原之多事洎乎奕世遇我昌朝力憊而亡不泯其嗣亦其幸也劉崇以亡國之餘竊偽王之號多見其不知量也今元惡雖斃遺孽尚存勢蹙民殘不亡何待永樂大典卷九千九百九不知所適劫村民使為鄉導誤趨晉州路行百餘里方覺崇怒殺鄉導者得他路而去乃易名號被毛褐張樺笠而行至沁州與從者三五騎止於郊舍寒餒尤甚潛令告偽刺史李廷誨廷誨饋盤餐解衣裘而與之每至屬邑縣吏奉食匕箸未舉聞周師至即蒼黃而去崇年老力憊伏於馬上日夜奔竄僅能支持距太原一舍其子承鈞夜以兵百人迎之而入及周師臨城下崇氣懾自固閉壘不出月餘世宗乃旋軍顯德二年十一月崇以病死其子承鈞襲偽位鈞之事迹具皇家日曆永樂大典卷九千九百九史臣曰守光逆天反道從古所無逮至臨刑尚求免死非唯惡之極也抑亦愚之甚也劉晟據南極以稱雄屬中原之多事洎乎奕世遇我昌朝力憊而亡不泯其嗣亦其幸也劉崇以亡國之餘竊偽王之號多見其不知量也今元惡雖斃遺孽尚存勢蹙民殘不亡何待永樂大典卷九千九百九不知所適劫村民使為鄉導誤趨晉州路行百餘里方覺崇怒殺鄉導者得他路而去乃易名號被毛褐張樺笠而行至沁州與從者三五騎止於郊舍寒餒尤甚潛令告偽刺史李廷誨廷誨饋盤餐解衣裘而與之每至屬邑縣吏奉食匕箸未舉聞周師至即蒼黃而去崇年老力憊伏於馬上日夜奔竄僅能支持距太原一舍其子承鈞夜以兵百人迎之而入及周師臨城下崇氣懾自固閉壘不出月餘世宗乃旋軍顯德二年十一月崇以病死其子承鈞襲偽位鈞之事迹具皇家日曆永樂大典卷九千九百九史臣曰守光逆天反道從古所無逮至臨刑尚求免死非唯惡之極也抑亦愚之甚也劉晟據南極以稱雄屬中原之多事洎乎奕世遇我昌朝力憊而亡不泯其嗣亦其幸也劉崇以亡國之餘竊偽王之號多見其不知量也今元惡雖斃遺孽尚存勢蹙民殘不亡何待永樂大典卷九千九百九不知所適劫村民使為鄉導誤趨晉州路行百餘里方覺崇怒殺鄉導者得他路而去乃易名號被毛褐張樺笠而行至沁州與從者三五騎止於郊舍寒餒尤甚潛令告偽刺史李廷誨廷誨饋盤餐解衣裘而與之每至屬邑縣吏奉食匕箸未舉聞周師至即蒼黃而去崇年老力憊伏於馬上日夜奔竄僅能支持距太原一舍其子承鈞夜以兵百人迎之而入及周師臨城下崇氣懾自固閉壘不出月餘世宗乃旋軍顯德二年十一月崇以病死其子承鈞襲偽位鈞之事迹具皇家日曆永樂大典卷九千九百九史臣曰守光逆天反道從古所無逮至臨刑尚求免死非唯惡之極也抑亦愚之甚也劉晟據南極以稱雄屬中原之多事洎乎奕世遇我昌朝力憊而亡不泯其嗣亦其幸也劉崇以亡國之餘竊偽王之號多見其不知量也今元惡雖斃遺孽尚存勢蹙民殘不亡何待永樂大典卷九千九百九不知所適劫村民使為鄉導誤趨晉州路行百餘里方覺崇怒殺鄉導者得他路而去乃易名號被毛褐張樺笠而行至沁州與從者三五騎止於郊舍寒餒尤甚潛令告偽刺史李廷誨廷誨饋盤餐解衣裘而與之每至屬邑縣吏奉食匕箸未舉聞周師至即蒼黃而去崇年老力憊伏於馬上日夜奔竄僅能支持距太原一舍其子承鈞夜以兵百人迎之而入及周師臨城下崇氣懾自固閉壘不出月餘世宗乃旋軍顯德二年十一月崇以病死其子承鈞襲偽位鈞之事迹具皇家日曆永樂大典卷九千九百九史臣曰守光逆天反道從古所無逮至臨刑尚求免死非唯惡之極也抑亦愚之甚也劉晟據南極以稱雄屬中原之多事洎乎奕世遇我昌朝力憊而亡不泯其嗣亦其幸也劉崇以亡國之餘竊偽王之號多見其不知量也今元惡雖斃遺孽尚存勢蹙民殘不亡何待永樂大典卷九千九百九不知所適劫村民使為鄉導誤趨晉州路行百餘里方覺崇怒殺鄉導者得他路而去乃易名號被毛褐張樺笠而行至沁州與從者三五騎止於郊舍寒餒尤甚潛令告偽刺史李廷誨