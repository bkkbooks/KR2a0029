body:
  text: 舊五代史卷五十三唐書二十九列傳第五李存信本姓張案梁紀作張污落蓋本名污落賜名存信舊五代史考異父君政回鶻部人也大中初隨懷化郡王李思忠內附因家雲中之合羅川存信通黠多數會四夷語別六蕃書善戰識兵勢初為獻祖親信從武皇入關平賊始補軍職賜姓名大順中纍遷至馬步都校與李存孝擊張濬軍於平陽時存孝驍勇冠絶軍中皆下之唯存信與爭功由是相惡有同水火及平定潞州存孝以功望領節度既而康君立授旄鉞康君立原本作軍位今從歐陽史改正影庫本粘籤存孝怒大剽潞民燒邑屋言發涕流疑存信擯己故也明年存孝得邢洺武皇與之節鉞存孝慮存信離間欲立大功以勝之屢請兵於武皇請兼並鎮冀存信間之不時許大順二年武皇大舉略地山東以存信為蕃漢馬步都校存孝聞之怒武皇令存質代之存孝乃謀叛既誅以存信為蕃漢都校從討李匡儔降赫連鐸白義誠以功檢校右僕射從入關討王行瑜加檢校司空領郴州刺史乾寧三年兗鄆乞師於武皇武皇遣存信營於莘縣莘縣原本作華縣今從新唐書藩鎮傳改正影庫本粘籤與朱瑄合勢以抗梁人梁祖患之遣使諜羅弘信曰河東志在吞食河朔回軍之日貴道堪憂而存信戢兵無法稍侵魏之芻牧弘信怒翻然結於梁祖乃出兵三萬以攻存信存信斂衆而退為魏人所薄委棄輜重退保洺州軍士喪失者十二三武皇怒大出師攻魏博屠陷諸邑五月存信軍於洹水汴將葛從周氏叔琮來援魏人存信與鐵林都將落落遇汴人於洹水南汴人為陷馬坎以待之存信戰敗落落被擒九月存信敗葛從周於宗城乘勝至魏州之北門明年聞兗鄆皆陷乃班師八月從討劉仁恭師次安塞為燕軍所敗武皇怒謂存信曰昨日吾醉不悟賊至公不辨耶古人三敗公姑二矣存信懼泥首謝罪幾至不測自光化已後存信多稱病武皇以兵柄授李嗣昭以存信為右校而已天復二年十月以疾卒於晉陽時年四十一永樂大典卷一萬三百八十九李存孝本姓安名敬思案新唐書存孝飛狐人與歐陽史同薛史闕載少於俘囚中得隸紀綱給事帳中及壯便騎射驍勇冠絶常將騎為先鋒未嘗挫敗從武皇救陳許逐黃寇及遇難上源每戰無不克寸捷張濬之加兵於太原也潞州小校馮霸殺其帥李克恭以城叛時汴將朱崇節入潞州梁祖令張全義攻澤州李罕之告急於武皇武皇遣存孝率騎五千援之初汴人攻澤州呼罕之曰相公常恃太原輕絶大國今張相公圍太原葛司空已入潞府旬日之內沙陀無穴自處無穴原本作無空今據新唐書改正影庫本粘籤相公何路求生耶存孝聞其言不遜選精騎五百繞汴營呼曰我沙陀求穴者俟爾肉饌軍可令肥者出鬬汴將有鄧季筠者亦以驍勇聞乃引軍出戰存孝激勵部衆舞矟先登一戰敗之獲馬千匹生擒季筠於軍中是夜汴將李讜收軍而遁存孝追擊至馬牢山俘斬萬計遂退攻潞州時朝廷命京兆尹孫揆為昭義節度使令供奉官韓歸範送旌節至平陽揆乃仗節之潞梁祖與揆牙兵三千為紀綱時揆為張濬副招討所部萬人八月自晉絳踰刀黃嶺趨上黨存孝引三百騎伏於長子西崖間揆褒衣大蓋擁衆而行俟其軍前後不屬存孝出騎橫擊之擒揆與歸範及俘囚五百獻於太原存孝乃急攻潞州九月葛從周棄城夜遁存孝收城武皇乃表康君立為潞帥存孝怒不食者纍日十月存孝引收潞州之師圍張濬於平陽平陽原本作申陽今據歐陽史改正影庫本粘籤營於趙城華州韓建遣壯士三百夜犯其營存孝諜知設伏以擊之盡殪進壓晉州西門獲賊三千自是閉壁不出存孝引軍攻絳州十一月刺史張行恭棄城而去張濬韓建亦由含口而遁存孝收晉絳以功授汾州刺史大順二年三月邢州節度使安知建叛入汴軍武皇令存孝定邢洺因授之節鉞時幽州李匡威與鎮州王鎔屢弱中山將中分其疆土定州王處存求援於武皇武皇命存孝侵鎮趙之南鄙又令李存信李存審率師出井陘以會之並軍攻臨城柏鄉李匡威救至且議旋師李存信與存孝不協因搆於武皇言存孝望風退衄無心擊賊恐有私盟也存孝知之自恃戰功鬱鬱不平因致書通王鎔又歸款於汴案舊唐書以存孝據邢州為大順元年事考存孝至大順二年始領邢州節鉞在元年無由得據邢州也舊唐書蓋因平潞州事而牽連書之耳新唐書與歐陽史並從薛史明年武皇自出井陘將逼真定存孝面見王鎔陳軍機武皇暴怒誅先獲汴將安康八方旋師七月復出師討存孝自縛馬關東下攻平山渡滹水擊鎮州四關城王鎔懼遣使乞平請以兵三萬助擊存孝許之案新唐書王鎔失幽州助因乞盟進幣五十萬歸糧二十萬請出兵助討存孝舊五代史考異武皇搜於欒城李存信屯琉璃陂九月存孝夜犯存信營奉誠軍使孫考老被獲存信軍亂武皇進攻邢州深溝高壘以環之旋為存孝衝突溝塹不成有軍校袁奉韜者袁奉韜原本作奏韜今從歐陽史改正影庫本粘籤密令人謂存孝曰大王俟塹成即歸太原如塹壘未成恐無歸志尚書所畏唯大王耳料諸將孰出尚書右王若西歸雖限以黃河亦可浮渡况咫尺之洫安能阻尚書鋒鋭哉存孝然之縱兵成塹居旬日深溝高壘飛走不能及由是存孝至敗城中食盡乾寧元年三月存孝登城首罪泣訴於武皇曰兒蒙王深恩位至將帥案歐陽史作位至將相吳縝纂誤云存孝本傳止為邢州留後未嘗為平章事何故云位至將相耶舊五代史考異苟非讒慝離間曷欲捨父子之恩轉附仇讎之黨兒雖褊狹設計實存信搆陷至此若得生見王面一言而死誠所甘心武皇愍之遣劉太妃入城慰勞太妃引來謁見存孝泥首請罪曰兒立微勞本無顯過但被人中傷申明無路迷昧至此武皇叱之曰爾與王鎔書狀罪我萬端亦存信教耶縶歸太原車裂於巿然武皇深惜其才存孝每臨大敵被重鎧櫜弓坐矟僕人以二騎從陳中易騎輕捷如飛獨舞鐵檛挺身陷陳萬人辟易蓋古張遼甘寧之比也存孝死武皇不視事旬日私憾諸將久之永樂大典卷一萬三百八十九李存進振武人本姓孫名重進案歐陽史太祖破朔州得之賜以姓名養為子父佺世吏單于府案九國志孫漢韶傳云祖昉嵐州刺史父存進振武軍節度使據薛史則存進父自名佺未嘗為刺史與九國志異重進初仕嵐州刺史湯羣為部校獻祖誅羣乃事武皇從入關還鎮太原署牙職景福中為義兒軍使賜姓名從討王行瑜以功授檢校常侍與李嗣昭同破王珙於河中光化三年契丹犯塞寇雲中改永安軍使鴈門以北都知兵馬使天復初破氏叔琮前軍於洞渦三年授石州刺史莊宗初嗣位入為步軍右都檢校司空師出井陘授行營馬步軍都虞候破汴軍於柏鄉論功授邠州刺史轉檢校司徒俄兼西南面行營招討使出師收慈州授慈沁二州刺史十二年定魏博授天雄軍都巡按使時魏人初附有銀槍效節都強傑難制效節原本作數節今從通鑑改正影庫本粘籤專謀騷動存進沈厚果斷犯令者梟首尸於巿諸軍無不惕息靡然向風十四年擢蕃漢馬步副總管從攻楊劉戰胡柳十六年以本職兼領振武節度使時王師據德勝渡汴軍據楊村渡在上流汴人運洛陽竹木造浮橋以濟軍王師以船渡緩急難濟存進率意欲造浮橋軍吏曰河橋須竹笮大艑兩岸石倉鐵牛以為固今無竹石竊慮難成存進曰吾成算在心必有所立乃課軍造葦笮維大艦數十艘作土山植巨木於岸以纜之初軍中以為戲月餘橋成制度條上人皆服其勤智莊宗舉酒曰存進吾之杜預也賜寶馬御衣進檢校太保兼魏博馬步都將與李存審固守德勝十九年汴將王瓚率衆逼北城為地穴火車百道進攻存進隨機拒應或經日不得食汴軍退加檢校太傅王師討張文禮於鎮州閻寶李嗣昭相次不利而歿七月存進代嗣昭為招討進營東垣渡夾滹為壘沙土散惡垣壁難成存進斬伐林樹版築旬日而就賊不能寇九月王處球盡率其衆乘其無備奄至壘門存進聞之得部下數人出鬬驅賊於橋下俄而賊大至後軍不繼血戰而歿時年六十六同光時贈太尉存進行軍出師雖無奇迹然能以法繩其驕放營壘守戰之備特推精力議者稱之有子四人長曰漢韶永樂大典卷一萬三百八十九漢韶字享天享天原本作亨天考册府元龜作享天九國志與册府元龜同今改正影庫本粘籤幼有器局風儀峻整初事莊宗為定安軍使遷河東牢城指揮使時孟知祥權知太原軍府事會契丹侵北鄙表令漢韶率師進討既而大破契丹以功加檢校右僕射同光中為蔡州刺史天成初復姓孫氏尋授彰國軍留後纍加檢校太保長興中為洋州節度使末帝之起於鳳翔也漢韶與興元張虔釗各帥部兵會王師於岐山下及西師俱叛漢韶逃歸本鎮案九國志閔帝嗣位加特進漢韶以其父名上表讓之改檢校左僕射制曰改會稽之字抑有前聞換瓌寶之文非無故事聞末帝即位心不自安乃與張虔釗各舉其城送款於蜀洎至成都孟知祥以漢韶舊人尤善待之案九國志漢韶與知祥汾上舊事及洛中更變相對感泣知祥曰豐沛故人相遇於此何樂如之於是賜第宅金帛供帳什物悉官給之偽命永平軍節度使孟昶嗣偽位歷興元遂州兩鎮連帥纍偽官至中書令封樂安郡王年七十餘卒於蜀永樂大典卷一萬八千一百二十八李存璋字德璜雲中人武皇初起雲中存璋與康君立薛志勤等為奔走交從入關以功授國子祭酒纍管萬勝雄威等軍從討李匡儔改義兒軍使光化二年授澤州刺史入為牢城使從李嗣昭討雲州叛將王暉平之改教練使檢校司空五年武皇疾篤召張承業與存璋授遺顧存璋爰立莊宗夷內難頗有力焉改河東馬步都虞候兼領鹽鐵初武皇稍寵軍士藩部人多干擾巿肆其豪奪法司不能禁莊宗初嗣位鋭於求理存璋得行其志抑強扶弱誅其豪首期月之間紀綱大振弭羣盜務耕稼去姦宄息幸門當時稱其材幹從破汴軍於夾城轉檢校司徒柏鄉之役為三鎮排陳使十一年從盟朱友謙於猗氏授汾州刺史汴將尹皓攻慈州逆戰敗之十三年王檀逼太原存璋率汾州之軍入城固守授大同防禦使應蔚朔等州都知兵馬使秋契丹攻蔚州阿保機遣使馳木書求賂存璋斬其使契丹逼雲州存璋拒守城中有古鐵車乃鎔為兵仗以給軍士敵退以功加檢校太傅大同軍節度使應蔚等州觀察使十九年四月以疾卒於雲州府第同光初追贈太保平章事晉天福初追贈太師有子三人彥球為裨校戰歿於鎮州永樂大典卷一萬三百八十九李存賢字子良本姓王名賢許州人祖啓忠父惲案九國志李奉虔傳奉虔太原人本姓王氏祖欽唐隰州刺史父存賢佐唐武皇纍著功賜姓李氏考薛史作許州人又作父惲不載其官爵與九國志異舊五代史考異賢少遇亂入黃巢軍武皇破賊陳許存賢來歸景福中典義兒軍為副兵馬使因賜姓名天祐三年從周德威赴援上黨營於交口五年權知蔚州刺史以禦吐渾六年權沁州刺史先是州當賊境不能保守乃於州南五十里據險立柵為治所已歷十餘年矣存賢至郡乃移復舊郡剗闢荊棘特立廨舍州民完集莊宗嘉之轉檢校司空真拜刺史九年汴人乘其無備來攻其城存賢擊退之十一年授武州刺史山北團練使十二年移刺慈州七月汴將尹皓攻州城存賢督軍拒戰汴軍攻擊百端月餘遁去十八年河中朱友謙來求援案吳縝纂誤據梁末帝紀及莊宗本紀當作十七年舊五代史考異命存賢率師赴之十九年汴將段凝軍五萬營臨晉蒲人大恐咸欲歸汴或問於存賢曰河中將士欲拘公降於汴存賢曰吾奉命援河中死王事固其所也汴軍退案歐陽史作擊退梁兵吳縝纂誤云朱友謙符存審劉鄩傳載鄩討友謙存審救之而鄩敗其事始末甚明無存賢擊走梁兵之事况大將自是存審安得隱其姓而存賢獨有功乎今考薛史止作汴軍退不言存賢擊退較歐陽史為得其實舊五代史考異以功加檢校司徒同光初授右武衛上將軍十一月入覲洛陽二年三月幽州李存審疾篤求入覲議擇帥代之方內宴莊宗曰吾披榛故人零落殆盡所殘者存審耳今復衰疾北門之事北門原本作北北今從歐陽史改正影庫本粘籤知付何人因目存賢曰無易於卿即日授特進檢校太保充幽州盧龍節度使案九國志梁人攻上黨莊宗親總大軍以援之存賢先登陷敵以功授盧龍軍節度使與薛史異舊五代史考異五月到鎮時契丹強盛城門之外烽塵交警一日數戰存賢性忠謹周慎晝夜戒嚴不遑寢食以至憂勞成疾卒於幽州時年六十五詔贈太傅存賢少有材力善角抵初莊宗在藩邸每宴私與王郁角抵鬬勝郁頻不勝莊宗自矜其能謂存賢曰與爾一博如勝賞爾一郡即時角抵存賢勝得蔚州刺史永樂大典卷一萬三百八十九按存賢為蔚州刺史在天祐五年蓋因角抵而得郡也歐陽史改薛史賞爾一郡為與爾一鎮以為盧龍節度使殊非事實史臣曰昔武皇之起並汾也會鹿走於中原期龍戰於大澤蓄驍果之士以備鷹犬之用故自存信而下皆錫姓以結其心授任以責其效與夫董卓之畜呂布亦何殊哉唯存孝之勇足以冠三軍而長萬夫苟不為叛臣則可謂良將矣永樂大典卷一萬三百八十九
