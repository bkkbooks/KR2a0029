body:
  text: 舊五代史卷二十梁書二十列傳第十謝瞳字子明福州人唐咸通末舉進士因留長安三歲不中第廣明初黃巢陷長安遂投迹於太祖洎居門下未嘗一日不在左右及太祖據同州遂署右職其年秋太祖與河中交戰再不利連上章請兵於巢偽右軍都尉孟楷抑而不進瞳揣太祖有擇福意擇福原本作澤輻今據文改正影庫本粘籤乃進説曰黃家以數十萬之師值唐朝久安人不習戰因利乘便遂下兩京然始竊偽號任用已失其所今將軍勇冠三軍力戰于外而孟楷專務壅蔽奏章不達下為庸才所制無獨斷之明破亡之兆必矣況土德未厭外兵四集漕運波注日以收復為名惟將軍察之太祖曰我意素決爾又如是復何疑哉翌日遂定策戮偽監軍使偽監軍使夏文莊集作魏監軍使考黃巢偽號為齊不當為魏蓋因偽字聲轉而訛今仍從原文影庫本粘籤悉衆歸順於河中王重榮表瞳為檢校屯田員外郎賜緋令奉表于蜀唐僖宗大悅召入顧問錫賚甚厚以功授朝散大夫太子率更令賜紫為陵州刺史治郡一歲改檢校右散騎常侍通州刺史在任四考頗有政績秋罷詣蜀行在太祖遣人迎之龍紀二年至東京勞徠彌厚賜第墅各一區錢千緡表為亳州團練使兼太清宮副使加檢校工部尚書是年冬太祖征淮南過郡因求侍府幕表為宣義軍節度副使充兩使留後瞳在滑十三年部內增戶約五萬益兵數千人纍遷至大中大夫檢校右僕射卒于滑開平初追贈司徒永樂大典卷一萬八千一百二十八司馬鄴案通鑑考異引實録作司馬酆通鑑從薛史舊五代史考異字表仁其先河內溫人也祖德璋仕唐為杞王傅父諲左武衛大將軍鄴資蔭出身頗知書纍官至大列唐天復初韓建用為同州節度留後案韓建傳作判官司馬鄴昭宗之幸鳳翔也太祖引兵入關前鋒至左馮翊鄴持印鑰迎謁道左太祖以兵圍華州命入城招諭韓建建果出降及大軍在岐下遣奏事於昭宗再入復出又使于金州説其帥馮行襲俾堅攀附後歷宣武天平等軍從事開平元年拜右武衛上將軍三年使于兩浙時淮路不通乘馹者迂回萬里陸行則出荊襄潭桂入嶺自番禺泛海至閩中達于杭越復命則備舟楫出東海至於登萊而揚州諸步多賊船案原本作諸走考容齋隨筆云步者水旁之名今改正舊五代史考異過者不敢循岸必高帆遠引海中謂之入陽以故多損敗鄴在海逾年漂至耽羅國一行俱溺後詔贈司徒永樂大典卷一萬八千一百二十八劉捍開封人父行仙宣武軍大將捍少為牙職太祖初鎮夷門以捍聰敏擢副典客唐中和四年夏太祖以朱珍為淄州刺史令收兵於淄青間命捍監其兵路逢大敵皆破之入博昌獲精兵三萬以歸四月合大軍敗蔡賊秦宗賢數萬衆於汴西文德元年十一月蔡將申叢折宗權足納款於太祖使捍奏其事加兼御史大夫光化三年六月太祖北伐鎮定至常山而王鎔危懾送款於太祖命捍入壁門傳諭時兩軍未整守門者戈戟千匝捍馳騎而入竟達其命又移師以攻中山至懷德驛大破定人五萬衆王處直乞降捍復單馬入州安撫而回案梁祖下鎮定服中山舊唐書作光化三年九月新唐書作十月薛史又總繫于六月以後據通鑑自六月舉兵至九月始定中山也太祖迎昭宗於岐下以捍為親軍指揮天復三年正旦宋文通令客將郭啓奇使於太祖命捍復命昭宗聞其至即召見詢東兵之事仍以錦服銀鞍勒馬賜之翌日授光祿大夫檢校司空登州刺史昭宗還京改常州刺史賜號迎鑾毅勇功臣四月太祖伐王師範於青州改左右長直都指揮使天祐三年正月授宋州刺史四月加檢校司徒太祖受禪授左龍虎統軍兼元從親軍馬步都虞候及上黨纏兵太祖親往巡撫以捍為御營使大軍次昂車昂車原本作昂申考通鑑注云昂車懷州地名今改正影庫本粘籤斥候來告蕃戎逼澤州命捍以兵千人赴之並軍遂遁車駕還京授捍侍衛親軍都指揮使晉人侵晉州從幸陝回加檢校太保及從駕幸河中詔追王重師赴行在以捍為雍州節度觀察留後才踰月劉知俊據同州反潛使人以厚利啖捍將校遂為部下所執送於知俊知俊縶捍歸於鳳翔為李茂貞所害開平四年贈太傅末帝即位又贈太尉捍便習賓贊善於將迎自司賓局及征討四出必預其間雖無決戰爭鋒之績而承命奔走敷揚命令勤幹涖職以至崇顯焉永樂大典卷九千九十八王敬蕘潁州汝陰人世為郡武吏唐乾符初敬蕘為本州都知兵馬使中和初寇難益熾郡守庸怯不能自固敬蕘遂代之監郡俄真拜刺史加檢校右散騎常侍時州境荒饉大寇繼至黃巢數十萬衆寨于州南敬蕘極力抗禦逾旬而退俄又宗權之衆凌暴益甚合圍攻壁皆力屈而去蔡賊復遣將刁君務以萬衆來逼敬蕘列陳當之身先馳突殺敵甚多由是竟全郡壘遠近歸附及淮人不恭太祖屢以軍南渡路由州境敬蕘悉心供億太祖甚嘉之乾寧二年署為沿淮上下都指揮使四年冬龐師古敗于清口敗軍逃歸者甚衆路出于潁時雨雪連旬軍士凍餒敬蕘自淮燎薪相屬於道郡中設糜糗餅餌以待之全活者甚衆由是表知武寧軍節度徐宿觀察留後數月真拜武寧軍節度使案文苑英華載授敬蕘武寧軍節度制有云襲淮流之積寇挺潛山之雄姿勇實兼人智能周物蓋因清口之役而加秩也天復二年入為右龍武統軍天祐三年轉左衛上將軍開平元年八月以疾致仕尋卒於其第敬蕘魁傑沈勇多力善戰所用槍矢皆以純鐵鍛就槍重三十餘斤摧鋒突陳率以此勝雖非太祖舊臣而遠輸懇款保境合兵以輔興王之運有足稱者永樂大典卷一萬八千一百二十六高劭字子將淮南節度使駢之從子也父泰黔中觀察使唐僖宗避敵在蜀駢鎮淮南為都統兼諸道鹽鐵使兵賦在己朝廷優假之以故劭幸而早官年十四遙領華州刺史光啓中以駢命遏晉公王鐸于鄭俄而州陷於蔡劭為賊所得使人守之戒四門曰無出高大夫劭伺守者稍惰稍惰原本作稍隋今據文改正影庫本粘籤佯為乞食者過危垣取殍者衣坌身易服得他兒抱之行出東郊門人以為丐者不之止及稍遠棄所抱兒疾趨至中牟遂達于汴太祖以客禮遇之尋表為亳州團練副使知州事又數年辟為宣武軍節度判官在幕下頗以氣直自許後監鄭州事復權知徐州留後唐昭宗之鳳翔太祖迎奉未出劭有疑謀遂令赴華州詣丞相府以議其事行至高陵為盜所害永樂大典卷五千五百三十八馬嗣勳濠州鍾離縣人世為軍吏嗣勳有口辨習武藝初為州客將唐景福元年三月太祖以壽州刺史江儒反下蔡鎮使李立率兵攻濠梁刺史張遂俾嗣勳持州印籍戶口以歸於太祖乾寧二年三月楊行密復攻濠州張遂遣嗣勳求援于太祖俄而郡陷案九國志李簡傳乾寧二年從攻濠州濠水深闊簡手搴重甲口銜大刀先渡踰壘破其關鍵擒刺史張遂以獻新唐書楊行密傳與九國志略同惟遂字新唐書作璲嗣勳無所歸即署為元從押牙副典客頗稱任使光化元年三月太祖令往光州説刺史劉存背淮賊以向國案新唐書本紀乾寧三年楊行密陷光州劉存死之九國志柴再用傳乾寧中從朱延壽平劉存于弋陽授知光州軍事梁兵寇光州再用擊走之以功遷光州刺史與薛史異又九國志吳有兩劉存其一即光州刺史其一陳州人後為馬殷所害又從李彥威復黃州及武昌縣獲刺史瞿章案新唐書本紀乾寧四年五月壬午朱全忠陷黃州刺史瞿章死之九國志馬珣傳三年梁將朱友恭圍瞿章于黃州命珣率兵援之黃州陷戰不利而退薛史作光化元年與諸書互異瞿章原本作翟章今從新唐書九國志改正影庫本粘籤俄復使光州持幣馬以賜劉存會淮賊急攻光州存與嗣勳率兵大戰敗而走之又遣使於蜀及歸得其助軍資實甚多天復中太祖迎昭宗于岐下軍至華之西闉使嗣勳入見韓建即時同出迎謁及羅紹威將殺牙軍遣使告於太祖求為外援時安陽公主初卒於魏太祖乃遣嗣勳率長直官千人實兵仗于峇丑肩舁以入於魏聲言來致祭會葬牙軍不之覺天祐三年正月十六日夜嗣勳與紹威親軍同攻牙軍至曙盡殪之嗣勳重傷旬日而卒開平中纍贈太保永樂大典卷一萬八千一百二十八張存敬譙郡人也性剛直有膽勇臨危無所畏憚唐中和中從太祖赴汴以其折節頗見親昵首為右騎都將從討巢蔡凡歷百戰多于危蹙之間顯有奇略由是頻立殊效光啓中李罕之會晉軍圍張宗奭于盟津太祖遣丁會葛從周存敬同往馳救存敬引騎軍先犯敵將諸軍翼之敵騎大敗乃解河橋之圍河橋原本作何橋今據通鑑改正影庫本粘籤大順二年為諸軍都虞候佐霍存董大軍收宿州以功奏加檢校兵部尚書太祖東征徐兗存敬屢有俘斬之功凡受指顧皆與機會矢石所及必以身先太祖尤加優異以為行營都指揮使檢校右僕射乾寧三年充武寧軍留後行潁州刺史光化二年夏四月幽滄侵凌魏郡復以存敬為都指揮使三年大舉與葛從周連統諸軍攻浮陽樹數十柵圍劉守文纍月時幽州劉仁恭舉兵來援存敬潛軍擊之於乾寧軍南老鴉堤是日燕人大敗斬首五萬級生擒馬慎交已下一百餘人獲馬萬餘蹄案舊唐書光化二年三月張存敬率師援魏州大敗燕軍仁恭父子僅免薛史作三年事與舊唐書異其年秋九月引軍收鎮州存敬勒衆涉滹河師人鼓行而進逢鎮之遊兵數千因逐之直入鎮之壅門收鞍馬牛萬計翌日鎮人納質而旋尋為宋州刺史踰年甚有能政復擁衆伐薊門數旬間連下瀛莫祁景四州擒俘不可勝紀自懷德驛與中山兵接戰枕尸數十里中山開壁請降天復元年春太祖以河中節度使王珂與太原結親憑恃驕恣命存敬統大軍討之即日收絳州擒刺史陶建釗陶建釗原本作建鈺今從通鑑改正影庫本粘籤降晉州刺史張漢瑜二郡平進圍河中王珂請降太祖嘉之乃以存敬為護國軍留後未幾檢校司空尋移宋州刺史將之任所寢疾踰旬卒于河中太祖聞之痛惜移晷開平初追贈太保乾化三年又追贈太傅子仁願晉天福中仕至大理永樂大典卷六千三百五十寇彥卿字俊臣大梁人也祖琯父裔皆宣武軍牙校太祖鎮汴以彥卿將家子擢在左右弱冠選為通贊官太祖為元帥補元帥府押牙充四鎮通贊官行首兼右長直都指揮使纍奏授檢校司徒領洺州刺史羅紹威將殺牙軍遣使告於太祖太祖命彥卿使于魏密與紹威謀久竟成其事彥卿之力也彥卿身長八尺隆準方面語音如鐘善騎射好書史復善伺太祖之旨凡所作為動皆云合太祖每言曰敬翔劉捍寇彥卿蓋為我而生其見重如此太祖有所乘烏馬號一丈烏嘗以賜彥卿天復中太祖迎昭宗於鳳翔纍與岐軍對陳時彥卿為諸道馬步軍都排陳使嘗躬擐甲胄乘其所賜烏馬馳騁於陳前太祖目之曰真神王也神王原本作神全考歐陽史作神王册府元龜引薛史與歐陽史同今改正影庫本粘籤昭宗還京賜迎鑾毅勇功臣改邢州刺史尋遷亳州團練使案通鑑開平二年帝從吳越王錢鏐之請以亳州團練使寇彥卿為東南面行營都指揮使使擊淮南十一月彥卿帥衆二千襲霍丘為土豪朱景所敗又攻廬壽二州皆不勝淮南遣滁州刺史李儼拒之九國志朱景傳梁祖聞景名命寇彥卿率徑騎三千襲霍丘圖取景且諭梁祖之意令降景率其徒戰於丘墟林澤中射死者無數彥卿兵折力殫而去此事薛史及歐陽史皆不載太祖受禪為華州節度使加檢校太保歲餘入為左金吾衛大將軍充街使一日過天津橋有老人案歐陽史作民梁現案崔沂傳作市民梁現舊五代史考異誤衝其騶道者排之落橋而斃為御史府所彈太祖不得已責授左衛中郎將案通鑑作遊擊將軍左衛中郎將不數月除相州防禦使案相州歐陽史作襄州依前行營諸軍排陳使未幾授河陽節度使加檢校太傅及太祖遇弒彥卿追感舊恩圖御容以奠之每因對客言及先朝舊事即涕泗交流末帝嗣位遙領興元節度使東南面行營都招討使以拒淮寇尋改右金吾衛上將軍貞明初授鄧州節度使會淮人圍安陸彥卿奉詔領兵解圍大破淮賊而回四年卒于鎮時年五十七詔贈侍中彥卿貞幹明敏善事人主然怙寵作威多忌好殺雖顯立功名而猶為識者之所鄙焉永樂大典卷一萬九千三百三十史臣曰案原本有闕文存敬有提鼓之勞彥卿偶攀鱗之會俱為藩后亦其宜哉永樂大典卷一萬九千三百三十
