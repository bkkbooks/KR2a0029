body:
  text: 舊五代史卷一百九漢書十一列傳第六杜重威其先朔州人近世徙家於太原祖興振武牙將父堆金事唐武皇為先鋒使重威少事明宗自護聖軍校領防州刺史其妻即晉高祖妹也纍封宋國大長公主天福初命重威典禁軍遙授舒州刺史二年張從賓搆亂據汜水汜水原本作泛水今從歐陽史改正影庫本粘籤晉高祖遣重威與侯益率衆破之以功授潞州節度使與楊光遠降范延光於鄴城改許州節度使兼侍衛親軍馬步軍副指揮使尋加同平章事未幾移鎮鄆州遷侍衛親軍馬步軍都指揮使案通鑑云馮道李嵩屢薦重威之能以為都指揮使充隨駕御營使舊五代史考異及鎮州安重榮稱兵向闕命重威禦之敗重榮於宗城重榮奔據常山重威尋拔其城斬重榮首傳於闕下授成德軍節度使所得重榮家財及常山公帑悉歸於己晉高祖知而不問至鎮復重斂於民稅外加賦境內苦之案鑑云重威所至黷貨民多逃亡嘗出過市謂左右曰人言我驅盡百姓何市人之多也舊五代史考異少帝嗣位與契丹絶好契丹主連年伐晉重威但閉壁自守部內城邑相繼破陷一境生靈受屠戮重威任居方面未嘗以一士一騎救之每敵騎數十驅漢人千萬過城下如入無人之境重威但登陴注目略無邀取之意開運元年秋加北面行營招討使二年領大軍下泰州滿城遂城契丹主自古北口回軍追躡王師重威等狼狽而旋至陽城陽城原本作險城今從薛史晉少帝紀改正影庫本粘籤為契丹所困會大風狂猛軍情憤激符彥卿張彥澤等引軍四出敵衆大潰諸將欲追之重威曰逢賊得命更望福乎遂收軍馳歸常山先是重威於州內括借錢帛吏民大被其苦人情咸怨重以境內凋弊十室九空重威遂無留意連上表乞歸朝不俟報即時上路朝廷以邊上重鎮主帥擅離苟有奔衝慮失禦備然亦無如之何即以馬全節代之重威尋授鄴都留守會鎮州軍食不繼遣殿中監王欽祚就本州和市重威私第有粟十餘萬斛遂録之以聞朝廷給絹數萬匹償其粟直重威大忿曰我非反逆安得籍沒耶三年冬晉少帝詔重威與李守貞等率師經略瀛鄚師至瀛州城下晉騎將梁漢璋進與契丹接戰漢璋死焉重威即時命回軍次武強聞契丹主南下乃西趨鎮州至中渡橋與契丹夾滹水而營十二月八日宋彥筠王清等率數千人渡滹陳於北岸為敵所破時契丹游軍已至欒城道路隔絶人情危蹙重威密遣人詣敵帳潛布腹心契丹主大悅許以中原帝之重威庸暗深以為信一日伏甲於內召諸將會告以降敵之意諸將愕然以上將既變乃俯首聽命遂連署降表令中門使高勳齎送敵帳中門原本作人門今從通鑑改正影庫本粘籤軍士解甲與聲慟哭是日有大霧起於降軍之上契丹主使重威衣赭袍以示諸軍尋僞加守太傅鄴都留守如故契丹主南行命重威部轄晉軍以從既至東京駐晉軍於陳橋士伍飢凍不勝其苦重威每出入衢路為市民所詬俯首而已契丹下令括率京城錢帛將相公私雷同率配重威與李守貞各萬緡乃告契丹主曰臣等以十萬漢軍降於皇帝不免配借臣所不甘契丹主笑而免之尋羣盜斷澶州浮梁契丹乃遣重威歸藩明年三月契丹主北去至相州城下重威與妻石氏詣牙帳貢獻而回高祖車駕至闕以重威為宋州節度使加守太尉重威懼閉城拒命詔高行周率兵攻討重威遣其子弘遂等告急於鎮州麻答乞師救援且以弘遂為質麻答遣蕃將楊袞赴之未幾鎮州諸軍逐麻答楊袞至洺州而回十月高祖親征車駕至鄴城之下遣給事中陳觀等案歐陽史避私諱作陳同舊五代史考異齎詔入城許其歸命重威不納數日高祖親率諸軍攻其壘不克王師傷夷者萬餘人案宋史杜漢徽傳云從高行周討杜重威于鄴城屢為流矢所中身被重創猶力戰觀者壯之舊五代史考異高祖駐軍數旬城中糧盡屑麴餅以給軍士吏民踰壘而出者甚衆皆無人色至是重威牙將詣行宮請降復遣節度判官王敏奉表請罪賜優詔敦勉許其如初重威即遣其子弘遂妻石氏出候高祖重威繼踵出降素服俟罪復其衣冠賜見即日制授檢校太師守太傅兼中書令鄴城士庶殍殕者十之六七先是契丹遣幽州指揮使張璉以部下軍二十餘人屯鄴時亦有燕軍一千五百人在京師會高祖至闕有上變者言燕軍謀亂盡誅於繁臺之下咸稱其寃有逃奔於鄴者備言其事故張璉等懼死與重威膠固守城略無叛志高祖亦悔其前失纍令宣諭許以不死璉等於城上揚言曰繁臺之誅燕軍何罪既無生理以死為期璉一軍在圍中重威推食解衣盡力姑息燕軍驕悍憑陵吏民子女金帛公行豪奪及重威請命璉等邀朝廷信誓詔許璉等却歸本土及出降盡誅璉等將數十人其什長已下放歸幽州將出漢境剽略而去高祖遣三司使王章樞密副使郭威録重威部下將吏盡誅之籍其財産與重威私帑分給將士車駕還宮高祖不豫既而大漸顧命之際謂近臣將佐曰善防重威帝崩遂收重威重威子弘璋弘璉弘誅之詔曰杜重威猶貯禍心未悛逆節梟音不改虺性難馴昨朕小有不安罷朝數日而重威父子潛肆凶言怨謗大朝扇惑小輩今則顯有陳告備驗姦期既負深恩須置極法其杜重威父子並處斬所有晉朝公主及外親族一切如常仍與供給重威父子已誅陳尸於通衢案隆平集黨進幼為天雄軍節度使杜重威奴重威愛其淳謹雖長猶令與婢妾雜侍重威敗周祖得之以為鐵騎都虞候重威之後寒餓進常分俸以給士大夫或愧焉舊五代史考異都人聚觀者詬罵蹴擊軍吏不能禁尸首狼籍斯須而盡弘璉重威之子也纍官至陳州刺史永樂大典卷一萬四千七百三十李守貞河陽人也少桀黠落魄事本郡為牙將晉高祖鎮河陽用為典客後移數鎮皆從之及即位纍遷至客省使天福中李金全以安州叛淮夷入寇晉高祖命馬全節討之守貞監護其軍賊平以守貞為宣徽使少帝即位授滑州節度兼侍衛馬軍都指揮使未幾改侍衛都虞候開運元年春契丹犯澶魏少帝幸澶州契丹遣將麻答以奇兵由鄆州馬家口濟河立柵於東岸守貞率師自澶州馳赴之契丹大敗溺死者數千人獲馬數百匹偏裨七十餘人有頃敵退晉少帝還京以守貞為兗州節度使依前侍衛都虞候五月以守貞為青州行營都部署率兵二萬東討楊光遠命符彥卿為副十一月光遠子承勳等乞降承勳原本作丞動今從通鑑改正影庫本粘籤守貞入城害光遠於別第光遠有孔目官吏宋顏者盡以光遠財寶名姬善馬告於守貞得之置於帳下近例官軍克復城隍必降德音洗滌瑕穢時樞密使桑維翰以光遠同惡數十輩潛竄未出搜索甚急故制書久不下或有告宋顏匿於守貞處者朝廷取而殺之守貞由是怨維翰時行營將士所給賞賜守貞盡以黦茶染木薑藥之類分給之軍中大怒乃以帛包所得物如人首級目之為守貞頭懸於樹以詛之守貞班師加同平章事以楊光遠東京第賜之守貞因取連宅軍營以廣其第大興土木治之歲餘為京師之甲行幸賜宴恩禮無比開運二年春契丹以全軍南下前鋒至相州湯陰縣詔守貞屯滑州少帝再幸澶州守貞為北面行營都監與招討使杜重威北伐洎獲陽城之捷遂收軍而還四月車駕還京以守貞為侍衛副都指揮使移鎮宋州加檢校太師三年春詔守貞率師巡邊至衡水獲鄚州刺史趙思英而還居無何代高行周為侍衛親軍都指揮使移鎮鄆州意頗觖望會宰臣李嵩加侍中守貞謂樞密使直學士殷鵬曰樞密何功便加正相先是桑維翰以元勳舊德為樞密使守貞位望素處其下每憚之與李彥韜馮玉輩協力排斥維翰竟罷樞務李嵩事分疏遠守貞得以凌蔑其年夏契丹寇邊以守貞為北面行營都部署少帝開曲宴於內殿以寵其行教坊伶人獻語云天子不須憂北寇守貞面上管幽州既罷守貞有自負之色以其言誇詫於外既而率兵至定州北與契丹偏師遇斬其將解里而還九月加兼侍中會契丹遣瀛州刺史僞降於少帝請發大軍應接朝廷信之十月詔杜重威為北面行營招討使以守貞為兵馬都監知幽州行府事先是守貞領兵再由鄴都杜重威厚加贈遺曲意承迎守貞悅之每於帝前稱舉請委征討之柄至是守貞重威等會兵於鄴遂趨瀛州瀛州不應貝州節度使梁漢璋為蕃將高牟翰所敗梁漢璋原本作浣漳今從歐陽史改正影庫本粘籤死之王師遂還師至深州聞契丹大至乃西趨鎮州至滹之中渡與敵相遇官軍營於滹水之南未幾敵騎潛渡至欒城斷我糧路尋則王清戰死杜重威遂與守貞歸命契丹授守貞司徒依前鄆州節度使從契丹至汴時京輦之下契丹充斥都人士庶若在塗炭二帥出入揚揚市人詬之略無慚色有頃河北及京東草寇大起澶州浮橋為羣賊所斷契丹主甚恐乃命諸帥各歸本鎮守貞遂赴汶陽高祖入汴守貞懼而來朝授守貞太保移鎮河中居無何高祖晏駕杜重威被誅守貞愈不自安乃潛畜異計乾祐元年三月先致書於權臣布求保證而完城郭繕甲兵晝夜不息守貞以漢室新造嗣君才立自謂舉無遺策又有僧總倫者以占術干守貞謂守貞有人君之位案通鑑云浚儀人趙修己素善術數自守貞鎮滑州署司戶參軍纍從移鎮為守貞言時命不可妄動前後切諫非一守貞不聽乃稱疾歸里舊五代史考異未幾趙思綰以京兆叛遣使奉表送御衣於守貞守貞自謂天時人事合符於己乃潛給草賊令所在竊發遣兵據潼關案宋史王繼勳傳李守貞之叛令繼勳據潼關為郭從義所破舊五代史考異朝廷命白文珂常思等領兵問罪復遣樞密使郭威西征官軍初至守貞以諸軍多曾隸於麾下自謂素得軍情坐俟叩城迎己及軍士詬譟大失所望案宋史馬全義傳李守貞鎮河中召置帳下及守貞叛周主討之全義每率敢死士夜出攻周祖壘多所殺傷守貞貪而無謀性多忌刻全義纍為畫策皆不能用舊五代史考異俄而王景崇據岐下與趙思綰遣使推奉守貞乃自號秦王思綰景崇皆受守貞署置又遣人齎蠟彈於吳蜀契丹以求應援案馬令南唐書朱元傳守貞以河中反漢命周太祖討之元與李平奉守貞表來乞師未復而守貞敗舊五代史考異既而城中糧盡殺人為食召總倫詰其休咎總倫至曰王自有天分人不能奪然分野災變俟磨滅將盡存留一人一騎即王鵲起之際也守貞深以為信洎攻城守貞欲發石以拒外軍炮竿子不可得無何上游泛一筏至其木悉可為炮竿守貞以為神助又嘗因宴會將佐守貞執弧矢遙指一虎掌圖曰我若有非常之事當中虎舌引弓一發中之左右拜賀守貞亦自負焉案宋史吳虔裕傳周祖討三叛以虔裕為河中行營都監率護聖諸軍五千以往李守貞出兵五千餘設梯橋分五路于長連城西北以禦周祖周祖令虔裕率大軍橫擊之蒲人敗走奪其梯橋殺傷大半舊五代史考異及周光遜以西寨降周光遜原本作况遜今從通鑑改正影庫本粘籤其勢益窘人情離散官軍攻城愈急守貞乃潛於衙署多積薪芻為自焚之計二年七月城陷舉家蹈火而死王師入城於煙中獲其尸斷其首函之並獲數子二女與其黨俱獻於闕下隱帝御明德樓受俘馘宣露布百僚稱賀禮畢以俘馘徇於都城守貞首級梟於南市諸子並賊黨孫願劉芮張延嗣劉仁裕僧總倫靖張球王廷秀焦文傑安在欽等並磔於西市餘皆斬之永樂大典卷一萬三百九十五代史闕文符后先適河中節度使李守貞之子崇訓守貞嘗得術士善聽聲知人貴賤守貞舉族悉令術士聽之獨言后大富貴當母儀天下守貞信之因曰吾婦尚為皇后吾可知也遂謀叛及城陷后獨免周祖為世宗娶之顯德中冊為后臣以謂術士之言蓋亦有時而中人君之位安可無望而求公侯其誡之趙思綰魏府人也唐同光末趙在禮之據魏城也思綰隸于帳下纍從之在禮卒趙延壽籍其部曲盡付於其長子贊思綰即其首領也高祖定河洛趙贊自河中移京兆尹趙贊以久事契丹常慮國家終不能容乃與鳳翔侯益謀引蜀兵為援又令判官李恕入朝請覲趙贊不待報赴闕留思綰等數百人在京兆會高祖遣王景崇等西赴鳳翔行次京兆時思綰等數百人在焉思綰等比是趙在禮御士本不刺面景崇齊藏珍既至京兆欲令文面以防逋逸景崇微露風旨思綰厲聲先請自刺以率其下景崇壯之藏珍竊言曰思綰粗暴難制不如殺之景崇不聽但率之同赴鳳翔朝廷聞之遣供奉官王益部署思綰等赴闕思綰既發行至途中謂其黨常彥卿曰小太尉已入他手吾輩至則併死矣小太尉蓋謂趙贊也彥卿曰臨機制變子勿復言既行至永興副使安友規巡檢使喬守溫出迎于郊外離亭置酒思綰前曰部下軍士已在城東安下緣家屬在城欲各將家今夜便宿城東守溫等然之思綰等辭去與部下並無兵仗才入西門有州校坐門側思綰遽奪其佩劍即斬之其衆持白挺殺守門軍士十餘人分衆守捉諸門思綰劫庫兵以授之遂據其城時乾祐元年三月二十四日也翌日集城中丁壯得四千餘人濬池隍修樓櫓旬浹之間戰守皆備尋遣人送款于河中李守貞遣使齎僞詔授思綰晉昌軍節度使檢校太尉朝廷聞之命郭從義王峻帥師伐之及攻其城王師傷者甚衆乃以長塹圍之經年糧盡遂殺人充食思綰嘗對衆取人膽似酒吞之告衆曰吞此至一千即膽氣無敵矣案太平廣記賊臣趙思綰自倡亂至敗凡食人肝六十六無不面剖而膾之舊五代史考異二年夏食既盡思綰計無從出時左驍衛上將軍致仕李肅寓居城中因與判官程讓能同言于思綰曰太尉比與國家無嫌但負罪懼誅遂為急計今朝廷三處用兵一城未下太尉若翻然效順率先歸命以功補過庶幾無患若坐守窮城端然待斃則何貴於智也案洛陽搢紳舊聞記太子少師李公肅唐末西京留守齊王以女妻之趙思綰在永興時使主赴闕思綰主藍田副鎮有罪已發李公時為環衛將兼雍耀三白渠使雍耀莊宅使節度副使權軍府事護而脫之來謝于李公公歸宅夫人詰之曰趙思綰庸賤人公何與免其過又何必見之乎曰思綰雖賤類審觀其狀貌真亂臣賊子恨未有朕迹不能除去之也夫人曰既不能除去何妨以小惠啖之無使銜怨自後夫人密遣人令思綰之妻來參厚以衣物賜之前後與錢物甚多及漢朝公以上將軍告老歸雍未久思綰過雍遂閉門據雍城叛衣冠之族遭塗炭者衆公全家獲免終以計勸思綰納款舊五代史考異思綰然之即令讓能為章表遣牙將劉成琦入朝案宋史郭從義傳作從義繫書矢上射入城中說思綰令降與薛史異舊五代史考異制授思綰華州留後檢校太保以常彥卿為虢州刺史遣內臣齎官告國信賜之既受命遲留未發郭從義王峻等籌之曰狼子野心終不可用留之必貽後悔耳既而從義王峻等緩轡入城陳列步騎至牙署遣人召思綰曰太保登途不暇出祖對引一杯便申仳別思綰至則執之遂斬于市並族其家案東都事略郭從義傳云思綰困甚從義遣人誘之佯許以華州節鉞思綰信之遂開門送款從義入城思綰謁見即遣武士執之並其黨斬于市是思綰本以誘降而伏誅非以其既降復謀叛也與薛史異舊五代史考異思綰臨刑市人爭投瓦石以擊之軍吏不能禁是日並部下叛黨新授虢州刺史常彥卿等五百餘人並誅之案宋史郭從義傳作三百餘人舊五代史考異籍思綰家財得二十餘萬貫入於官按歐陽史思綰遲留不行陰遣人入蜀郭威命從義圖之從義因入城召思綰趣之上道至則擒之思綰問曰何以用刑告者曰立釘也思綰厲聲曰為吾告郭公吾死未足塞責然釘磔之醜壯夫所恥幸少假之從義許之父子俱斬於市始思綰入城丁口僅十餘萬及開城惟餘萬人而已其餓斃之數可知矣永樂大典卷一萬六千九百九十一
