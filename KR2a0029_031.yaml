body:
  text: 舊五代史卷三十一唐書七莊宗紀第五同光二年春正月庚子朔帝御明堂殿受朝賀仗衛如式壬寅南郊禮儀使太常卿李燕進太廟登歌酌獻樂舞名懿祖室曰昭德之舞昭德原本作紹德考五代會要及薛史樂志並作昭德今改正影庫本粘籤獻祖室曰文明之舞太祖室曰應天之舞昭宗室曰永平之舞甲辰幽州上言契丹入寇至瓦橋案契丹國志時契丹日益強盛遣使就唐求幽州以處盧文進舊五代史考異以天平軍節度使李嗣源為北面行營都招討使陝州留後霍彥威為副率軍援幽州己巳故宣武軍節度副使權知軍州事檢校太傅王瓚贈太子太師丁未詔改朝元殿復為明堂殿又改崇勳殿為中興殿戊申以振武軍節度使檢校太傅同平章事李存霸權知潞州留後以知保大軍軍州事高允韜為檢校太保庚戌以涇原節度使涇原原本作經源今據歐陽史職方考改正影庫本粘籤充秦王府諸道行軍司馬開府儀同三司檢校太尉兼侍中李從曮為檢校太尉兼中書令依前涇原軍節度使充秦王府諸道行軍司馬詔改應順門為永曜門太平門為萬春門通政門為廣政門鳳明門為韶和門萬春門為中興門解卸殿為端明殿是日詔曰皇綱已正紫禁方嚴凡事內官不合更居外地詔諸道應有內官不計高低並仰逐處並家口發遣赴闕不得輒有停滯帝龍潛時寺人數已及五百至是合諸道赴闕者約千餘人皆給賜優贍服玩華侈委之事務付以腹心唐時宦官為內諸司使務諸鎮監軍出納王命造作威福昭宗以此亡國及帝奄有天下當知戒彼前車前車原本作前卑今據文改正影庫本粘籤以為殷鑒一朝復興茲弊議者惜之新羅王金朴英遣使朝貢辛亥中書門下奏準本朝故事諸王內命婦宰臣學士中書舍人諸道節度防禦團練使留後官告即中書帖官告院索綾紙褾軸下所司書寫印署畢進入宣賜其文武兩班及諸道官員並奏薦將校並合於所司送納朱膠綾紙價錢伏自僞梁不分輕重並從官給今後如非前件事例請官中不給告敕其內司大官侍衛將校轉官即不在此限從之壬子蜀主王衍致書於帝稱有詐為天使馳報收復汴州者詔捕之不獲癸丑有司奏郊祀前二日迎祔高祖太宗懿祖獻祖太祖神主於太廟議者以中興唐祚不宜以追封之祖雜有國之君以為昭穆自懿祖已下宜別立廟於代州如後漢南陽故事可也南陽原本作南洋今據後漢書光武紀改正影庫本粘籤幽州北面軍前奏契丹還塞詔李嗣源班師鳳翔節度使秦王李茂貞上表請行藩臣之禮帝優報之甲寅帝於中興殿面賜郭崇韜鐵券有司上言皇太后到闕皇帝合於銀臺門內奉迎詔親至懷州奉迎中書奏自二十三日後散齊內車駕不合遠出詔改至河陽奉迎以禮部尚書興唐尹王正言依前禮部尚書充租庸使乙卯渤海國遣使貢方物幽州奏媯州山後十三寨百姓却復新州戊午以前太子少師薛廷圭為檢校戶部尚書太子少師致仕以前太子賓客封舜卿為太子少保致仕封舜卿原本作舜鄉今據冊府元龜改正影庫本粘籤以前太子賓客李文規為戶部侍郎致仕詔鹽鐵度支戶部並委租庸使管轄庚申四方館上言請今後除隨駕將校及外方進奉專使文武班三品以上官可以內殿對見其餘並詣正衙以申常禮從之車駕幸河陽奉迎皇太后辛酉帝侍皇太后至文武百僚迎於上東門是日河中府上言稷山縣割隸絳州以太僕卿李紓為宗正卿宗正卿原本作宗呈卿考新唐書百官志作宗正卿今改正影庫本粘籤以衛尉卿楊遘為太僕卿西京昭應縣華清宮道士張冲虛上言天尊院枯檜重生枝葉乙丑有司上言南郊朝享太廟舊例親王充亞獻終獻行事乃以皇子繼岌為亞獻皇弟存紀為終獻丙寅帝赴明堂殿致齊丁卯朝饗於太微宮戊辰饗太廟是日赴南郊二月己巳朔親祀昊天上帝於圜丘禮畢宰臣率百官就次稱賀還御五鳳樓宣制大赦天下應同光二年二月一日昧爽已前所犯罪無輕重常赦所不原者咸赦除之十惡五逆屠牛鑄錢故意殺人合造毒藥持杖行劫官典犯贓不在此限應自來立功將校各與轉官仍加賞給文武常參官節度觀察防禦刺史軍主都虞候指揮使父母亡歿者並與追贈在者各與加爵增封諸藩鎮各賜一子出身仍封功臣名號留後刺史官高者加階爵一級官卑者加官一資應本朝內外臣僚被朱氏殺害者特與追贈應諸州府不得令富室分外收貯見錢禁工人鎔錢為銅器勿令商人載錢出境近年已來婦女服飾異常寬博倍費縑綾有力之家不計卑賤悉衣錦繡悉衣錦繡原本作悉依綿繡今據文改正影庫本粘籤宜令所在糾察應有百姓婦女曾經俘虜他處為婢妾者一任骨肉識認男子曾被刺面者給與憑據放逐營生召天下有能以書籍進納者各等第酬奬仰有司速檢勘天下戶口正額墾田實數待憑條理以息煩苛是日風景和暢人胥悅服議者云五十年來無此盛禮然自此權臣愎戾伶官用事吏人孔謙酷加賦斂赦文之所原放謙復刻剝不行大失人心始於此矣庚午租庸使孔謙奏諸道綱運客旅多於私路苟免商稅請令所在關防嚴加捉搦從之癸酉宰臣豆盧革率百官上尊號曰昭文睿武至德光孝皇帝凡三上表從之甲戌詔曰汴州元管開封浚儀封丘雍丘尉氏陳留六縣僞庭割許州鄢陵扶溝陳州太康鄭州陽武中牟曹州考城等縣屬焉其陽武匡城扶溝考城四縣宜令且隸汴州餘還本部丙子以隨駕參謀耿瑗為司天監丁丑以光祿大夫檢校司徒李筠為右騎衛上將軍戊寅幸李嗣源第作樂盡歡而罷己卯以河中節度使冀王李繼麟兼安邑解縣兩池榷鹽使解縣原本作諧縣今據冊府元龜所引薛史改正影庫本粘籤辛巳以檢校太師守尚書令河南尹判六軍諸衛事魏王張全義為守太尉兼中書令河陽節度使河南尹改封齊王以開府儀同三司守尚書令秦王李茂貞案通鑑作岐王舊五代史考異依前封秦王餘如故仍賜不拜不名案五代會要太常禮院奏李茂貞封冊之命宜準故襄州節度使趙匡凝之例施行秦王受冊自備革輅一乘載冊犢車一乘並本品鹵簿鼓吹如儀從之是日帝幸左龍武軍癸未宰臣豆盧革率百官上表請立中宮制以魏國夫人劉氏為皇后仍令所司擇日備禮冊命丁亥以天平軍節度使蕃漢總管副使開府儀同三司開府原本作開封今據文改正影庫本粘籤檢校太傅兼中書令李嗣源為檢校太尉依前天平軍節度使加實封百戶兼賜鐵券以前安國軍節度副使檢校太保左衛上將軍李存乂為晉州節度使檢校太傅以北京皇城留守檢校太保左威衛上將軍李存紀為邢州節度使加檢校太傅以蕃漢馬步都虞候兼東京馬步軍都指揮使檢校太保朱守殷為振武節度使加檢校太傅戊子以前右龍武軍都虞候守左龍武大將軍李紹奇為鄭州防禦使以楚州防禦使張繼孫為汝州防禦使汝州原本作滸州今據冊府元龜改正影庫本粘籤己丑以振武軍節度使權安義留後檢校太傅平章事李存霸為潞州節度使以捧日都指揮使鄭州防禦使李紹琛為陝州節度使以成德軍馬步軍都指揮使右監門衛大將軍毛璋為華州節度使壬辰樞密使郭崇韜再上表請退樞密之職優詔不允癸巳詔曰皇太后母儀天下子視羣生當別建宮闈顯標名號冀因稱謂益表尊嚴宜以長壽宮為名樞密使郭崇韜奏時務利便一十五件優詔褒美甲午奚王李紹威吐渾李紹魯皆貢馬丁酉以武安軍衙內馬步軍都指揮使昭州刺史馬希範為永州刺史檢校太保癸卯以光祿大夫檢校左僕射行太常卿李燕為特進檢校司空依前太常卿以御史中丞李德休為兵部侍郎以吏部侍郎崔協為御史中丞三月甲辰故河陽節度使王師範贈太尉乙巳以滄州節度使檢校太傅同平章事符習為青州節度使以北京衙內馬步軍都指揮使右領軍衛大將軍李紹斌為滄州節度使鎮州奏契丹犯塞詔李嗣源率師屯邢州案通鑑詔橫海節度使李紹斌北京指揮使李從珂帥騎兵分道備之與薛史異舊五代史考異丙午以荊南節度使守中書令渤海王高季興依前檢校太師兼尚書令封南平王以幽州節度行軍司馬李存賢依前檢校太保為幽州節度使中書門下上言近以諸州奏薦令録頗亂規程請今後節度使管三州已上每年許奏管內官三人如管三州已下只奏兩人仍須課績尤異方得上聞防禦使止許奏一人刺史無奏薦之例從之己酉以太子少保李琪為刑部尚書庚戌幽州奏契丹寇新城是日詔諸軍將校自檢校司空以下宜賜叶謀定亂匡國功臣自檢校僕射尚書常侍及諫議大夫諫議原本作兼義今據新唐書百官志改正影庫本粘籤並賜忠果拱衛功臣初帶憲銜者並賜忠烈功臣節級長行並賜扈蹕功臣中書門下上言州縣官在任考滿即具關申送吏部格式本道不得差攝官替正官從之案五代會要同光二年中書門下奏刺史縣令有政績尤異為衆所知或招復戶口能增加賦稅者或辨雪寃獄能拯人命者或去害物之積弊立利世之新規有益時政為衆所推者即仰本處逐件分明聞奏當議奬擢或在任貪猥誅戮生靈公事不治為政怠惰亦加懲罰其州縣官任滿三考即具關申送吏部格式候敕除銓注其本道不得差攝官替正授者從之舊五代史考異有司上言皇帝四月一日御文明殿受冊徽號合服袞冕御殿前一日散齊於內殿從之是日李嗣源上表乞退兵權詔不允是時伶人景進用事閹官競進故重臣憂懼拜章請退癸丑左諫議大夫竇專上言請廢租庸使名目事歸三司疏奏不報唐州奏木連理詔先省員官除已別授官外其左散騎常侍李文矩等三十人却復舊官太子詹事石戩等五人宜以本官致仕將作少監岑保嗣等十四人續敕處分丙辰責授萊州司戶鄭王玉等一十一人並量移近地尚書戶部侍郎知貢舉趙頎卒以中書舍人裴皡權知貢舉禁用鉛錫錢丁巳中書門下奏懿祖陵請以永興為名獻祖陵請以長寧為名長寧原本作長應考五代會要唐獻祖陵名長寧今改正影庫本粘籤太祖陵請以建極為名從之淮南楊溥遣使貢賀郊天禮物案十國春秋吳世家王遣右衛上將軍許確進賀郊天銀二千兩錦綺羅一千二百匹細茶五百斤象牙四株犀角十株于唐舊五代史考異戊午詔應南郊行事官並付三銓磨勘優與處分己未以大理卿張紹圭充制置安邑解縣兩池榷鹽使幸左龍武軍以皇子繼岌代張全義判六軍諸衛事故也癸亥以彰武保大等軍節度使北平王高萬興可依前延州鄜州節度使檢校太保兼中書令北平王甲子幸東宅夏四月己巳朔帝御文明殿具袞冕受冊尊號曰昭文睿武至德光孝皇帝壬申以成德軍節度行軍司馬權知府事任圜為檢校右僕射權北面水陸轉運制置使甲戌以順義軍留後華溫琪依前檢校太保充留後乙亥以天策上將軍武安等軍節度使守太師中書令楚王馬殷可依前守太師兼尚書令詔在京諸道節度使刺史令各歸本任丁丑以前幽州節度使幽州原本作邠州考薛史李存審傳存審係幽州節度使歐陽史與薛史同今改正影庫本粘籤內外蕃漢馬步總管檢校太師兼中書令李存審為宣武軍節度使餘如故己卯帝御文明殿冊魏國夫人劉氏為皇后庚辰賜霍彥威姓名曰紹真癸未以宋州節度使李紹安依前檢校太尉同平章事宋州節度使以許州節度使李紹冲依前檢校太尉同平章事許州節度使以襄州節度使孔勍依前檢校太傅同平章事襄州節度使甲申以樞密副使通議大夫行內侍省內侍宋唐玉為左監門衛將軍同正宋唐玉原本作宋康王今據冊府元龜所引薛史改正影庫本粘籤依前樞密副使以內客省使通議大夫行內侍省內侍楊希朗為右監門衛將軍同正楊希朗原本作巾郎今據冊府元龜改正影庫本粘籤依前內客省使並賜推忠匡佐功臣車駕幸龍門丙戌回鶻遣使貢方物己丑以夏州節度使李仁福依前檢校太師兼中書令夏州節度使封朔方王以朔方河西等軍節度使韓洙依前檢校太傅兼侍中充朔方河西等軍節度使靈鹽威警雄凉甘肅等州觀察使案威警疑當作威涇考通鑑注云警州在涇原西今仍其舊舊五代史考異辛卯以宣徽南院使判內侍省兼內局特進左監門將軍同正李紹宏為右領軍衛上將軍癸巳以靜江軍節度使扶風郡王馬賨為檢校太師兼中書令依前靜江軍節度使以朗州節度使馬希振為檢校太傅兼侍中依前朗州節度使鳳翔節度使秦王李茂貞薨丙申潞州小校楊立據城叛案歐陽史作三月潞州將楊立反與薛史異五代春秋作四月盜據潞州與薛史同以李嗣源為招討使陝州留後李紹真為副率師以討之永樂大典卷七千一百五十六
