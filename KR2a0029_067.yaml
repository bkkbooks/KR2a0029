body:
  text: 舊五代史卷六十七唐書四十三列傳第十九豆盧革祖籍同州刺史父瓚舒州刺史宣和書譜云失其世系殿本革少值亂離避地鄜延轉入中山王處直禮之王處直原本作處真今據新唐書改正影庫本粘籤辟于幕下有奏記之譽因牡丹會賦詩諷處直以桑柘為意言甚古雅漸加器仰轉節度判官而理家無法獨請謁見處直處直慮布政有缺有所規諫斂板出迎乃為嬖人祈軍職矣天祐末莊宗將即位講求輔相盧質以名家子舉之徵拜行臺左丞相同光初拜平章事及登廊廟事多錯亂至于官階擬議前後倒置屢為省郎蕭希甫駮正革改之無難色莊宗初定汴洛革引薦韋説冀諳事體與己同功説既登庸復事流品舉止輕脫怨歸於革又革説之子俱授拾遺父子同官為人所刺遂改授員外郎革請説之子濤為弘文館學士説請革之子升為集賢學士交易市恩有同市井識者醜之革自作相之後不以進賢勸能為務唯事修鍊求長生之術嘗服丹砂嘔血數日垂死而愈天成初將葬莊宗以革為山陵使及木主歸廟不出私第專候旄鉞數日無耗為親友促令入朝安重誨對衆辱之曰山陵使名銜尚在不候新命便履公朝意謂邊人可欺也側目者聞之思有所中所中原本作所衆今據文改正影庫本粘籤初蕭希甫有正諫之望革嘗阻之遂上疏論革與説苟且自容致君無狀復誣其縱田客殺人冒元亨上第冒元亨上第疑有舛誤考册府元龜所引薛史與永樂大典同今無可復考姑仍其舊影庫本粘籤遂貶為辰州刺史仍令所在馳驛發遣後鄭王玉任圜等連上三章請不行後命乃下制曰豆盧革韋説等身為輔相手握權衡或端坐稱臣或半笑奏事於君無禮舉世寧容革則暫委利權便私俸祿文武百辟皆從五月起支父子二人偏自正初給遣説則自居重位全紊大綱蔭貪榮亂兒孫於昭穆賣官潤屋換令録之身名醜行疊彰羣情共怒雖居牧守未塞非尤革可責授費州司戶參軍説可夷州司戶參軍皆員外置同正員並所在馳驛發遣尋貶陵州長流百姓委長吏常知所在天成二年夏詔令逐處刺史監賜自盡其骨肉並放逐便子升官至檢校正郎服金紫尋亦削奪永樂大典卷二千二百一十四案寶真齋法書贊載豆盧革田園帖云大德欲要一居處畿甸間舊無田園鄜州雖有三兩處莊子緣百姓租佃多年纍有令公大王書請卻給還人戶蓋不欲侵奪疲民兼慮無知之輩妄有影庇包役云云嶽珂曰此帖乃與僧往還書其畏強藩避罪蓋栗栗淵冰然其後卒以故縱田客貶夜郎正坐所畏信乎亂邦之不可居也是時據鄜乃高萬興官檢校太師中書令封北平王即革所謂令公大王者官故梁授唐命維新而顓面正朝者不能致褫鞶之誅而反竊貢秉旄之佞唐之不競有自來矣舊五代史考異韋説福建觀察使岫之子也案以下疑有闕文莊宗定汴洛説與趙光胤同制拜平章事説性謹重奉職常不造事端時郭崇韜秉政説等承順而已政事得失無所措言初或有言于崇韜銓選踰濫選人或取他人出身銜或取父兄資緒與令史囊橐罔冒崇韜乃條奏其事其後郊天行事官數千人多有告敕偽濫因定去留塗毀告身者甚衆選人號哭都門之外議者亦以為積弊纍年一旦澄汰太細懼失維新含垢之意時説與郭崇韜同列不能執而止之頗遭物議説之親黨告之説曰此郭漢子之意也及崇韜得罪説懼流言所鍾乃令門人左拾遺王松吏部員外郎李慎義等上疏云崇韜往日專權不間故實塞仕進之門非奬善之道疏下中書説等覆奏深詆崇韜識者非之又有王者能以多岐取事納賂於説説以其名犯祖諱遂改之為操擬官于近甸及明宗即位説常慮身危每求庇于任圜常保護之説居有井昔與鄰家共之因嫌鄙雜築垣于外鄰人訟之為希甫疏論以為井有貨財及案之本人惟稱有破釜一所反招虛妄初貶州刺史尋責授夷州司戶參軍初説在江陵與高季興相知及入中書亦常通信幣自討西蜀季興請攻峽內莊宗許之如能得三州俾為屬郡西川既定季興無尺寸之功洎明宗纘承季興頻請三郡朝廷不得已而與之革説方在中書亦預其議及季興占據獨歸其罪流于合州合州原本作白州今據五代春秋改正影庫本粘籤明年夏詔曰陵州合州長流百姓豆盧革韋説頃在先朝擢居重任欺公害物黷貨賣官靜惟肇亂之端更有難容之事且夔忠萬三州地連巴蜀路扼荊蠻接皇都弭難之初徇逆帥僭求之勢罔豫視聽率意割移將千里之土疆開通狡穴動兩川之兵賦禦捍經年致朕莫遂偃戈猶煩運策近者西方鄴雖復要害高季興尚固窠巢增吾旰食之憂職爾朋姦之計而又自居貶所繼出流言苟刑戮之稽時處忠良于何地宜令逐處刺史監賜自盡永樂大典卷一萬七千九百一十歐陽史説子濤晉天福初為尚書膳部員外郎卒殿本盧程唐朝右族祖懿父蘊案歐陽史作不知其世家何人也似誤舊五代史考異歷仕通顯程天復末登進士第崔魏公領鹽鐵署為巡官昭宗遷洛陽柳璨陷右族程避地河朔客遊燕趙或衣道士服干謁藩伯人未知之豆盧革客遊中山依王處直盧汝弼來太原程與革弼皆朝族知舊因往來依革處直禮遇未優故投于太原汝弼因為延譽莊宗署為推官尋改支使程褊淺無他才惟矜恃門地口多是非篤厚君子尤薄之初判官王緘從軍掌文翰胡柳之役緘歿於軍莊宗歸寧太原置酒公宴舉酒謂張承業曰豫今於此會取一書記先以巵酒辟之即舉酒屬巡官馮道道以所舉非次抗酒辭避莊宗曰勿謙挹無踰於卿也時以職列序遷則程當為書記汝弼亦左右之程既失職私懷憤惋謂人曰主上不重人物使田里兒居余上先是莊宗嘗於帳中召程草奏程曰叨忝成名不間筆硯由是文翰之選不及於程時張承業專制河東留守事人皆敬憚舊例支使監諸廩出納程訴于承業曰此事非僕所長請擇能者承業叱之曰公稱文士即合飛文染翰染翰原本作築翰今據文改正影庫本粘籤以濟霸國嘗命草辭自陳短拙及留職務又以為辭公所能者何也程垂泣謝之後歷觀察判官莊宗將即位求四鎮判官可為宰輔者時盧汝弼蘇循相次淪沒當用判官盧質質性疏放不願重位求留太原乃舉定州判官豆盧革次舉程即詔徵之並命為平章事平章原本作平張今據文改正影庫本粘籤程本非重器驟歷顯位舉止不恆時朝廷草創庶物未備班列蕭然寺署多缺程革受命之日即乘肩輿騶導喧沸莊宗聞訶導之聲詢於左右曰宰相擔子入門莊宗駭異登樓視之笑曰所謂似是而非者也頃之遣程使晉陽宮册皇太后山路險阻往復綿足蘭程安坐肩輿所至州縣驅率丁夫長吏迎謁拜伏輿前少有忤意因加笞辱及汴將王彥章陷德勝南城急攻楊劉莊宗御軍苦戰臣下憂之咸白宰臣欲連章規諫請不躬御士伍豆盧革言及漢高臨廣武事矢及於胸紿云中足程曰此劉季失策衆皆縮頸嘗論近世士族或曰員外郎孔明龜善和宰相之令緒宣聖之系孫得非盛歟程曰止於孔子之後盛則吾不知也親黨有假驢夫於程者程帖府給之府吏訴云無例程怒鞭吏背時任圜為興唐少尹莊宗從姊壻也案歐陽史誤作莊宗姊壻也舊五代史考異憑其寵戚因詣程程方衣鶴氅華陽巾憑几決事見圜怒詈曰是何蟲豸恃婦力耶宰相取給於府縣得不識舊體圜不言而退是夜馳至博平面訴於莊宗莊宗怒謂郭崇韜曰朕誤相此癡物敢辱豫九卿促令自盡崇韜亦怒事幾不測賴盧質橫身解之遂降為右庶子莊宗既定河南程隨百官從幸洛陽沿路墜馬因病風而卒贈禮部尚書永樂大典卷二千二百一十二趙鳳幽州人也少為儒唐天祐中燕帥劉守光盡率部內丁夫為軍伍而黥其面為儒者患之多為僧以避之鳳亦落髮至太原頃之從劉守奇奔梁梁用守奇為博州刺史表鳳為判官永樂大典卷一萬六千四百六十五案下有闕文殿本案歐陽史云守奇卒鳳去為鄆州節度判官為鄆州節度判官唐莊宗聞鳳名得之甚喜以為護鑾學士後莊宗即位拜鳳中書舍人永樂大典卷一萬三千四百二十四案五代會要作護鑾書制學士歐陽史云莊宗即位拜中書舍人翰林學士時皇后及羣小用事鳳言皆不見納及入汴改授禮部員外郎莊宗及劉皇后幸張全義第后奏曰妾五六歲失父母每見老者思念尊親泣下以全義年德妾欲父事之以慰孤女之心莊宗許之命鳳作箋上全義定往來儀注鳳上書極諫不納天成初置端明殿學士鳳與馮道俱任其職時任圜為宰相為安重誨所傾以至罷相歸磁州及朱守殷以汴州叛馳驛賜圜自盡既而鳳哭謂安重誨曰任圜義士也肯造逆謀以讎君父乎如此濫刑何以安國重誨笑而不責是冬權知貢舉明年春有僧自西國取經回得佛牙大如拳褐漬皴裂進於明宗鳳揚言曰曾聞佛牙鎚鍛不壞請試之隨斧而碎時宮中所施已逾數千緡聞毀乃止及車駕還洛留知汴州事尋授中書侍郎平章事案李之儀姑溪居士集云鳳為莊宗實録將何挺論劉昫疏不載昫既相遂引鳳共政事舊五代史考異長興中安重誨出鎮河中人無敢言者惟鳳極言於上前曰重誨是陛下家臣其心終不背主五年秉權賢豪俯伏但不周防自貽浸潤明宗以為朋黨不悅其奏重誨獲罪乃出為邢州節度使及閔帝蒙塵于衛州鳳集賓佐軍校垂涕曰主上播遷渡河而北吾輩安坐不赴奔問于禮可乎軍校曰唯公所使將行聞閔帝遇弒而止清泰初召還授太保既而病足不能朝謁疾篤自為蓍筮卦成投蓍而嘆曰吾家世無五十者而復窮賤吾年已五十又為將相豈有遐壽哉清泰二年三月卒鳳性豁達輕財重義凡士友以窮厄告者必傾其資而餉之人士以此多之也永樂大典卷一萬七千九百一十案趙鳳傳永樂大典中闕全篇今存其舊李愚字子晦自稱趙郡平棘西祖之後家世為儒父瞻業應進士不第遇亂徙家渤海之無棣以詩書訓子孫愚童齔時謹重有異常兒年長方志學遍閲經史慕晏嬰之為人初名晏平晏平原本作晏來今據册府元龜改正影庫本粘籤為文尚氣格有韓柳體厲志端莊風神峻整非禮不言行不苟且愚初以艱貧求為假官滄州盧彥威署安陵簿丁憂服闋隨計之長安屬關輔亂離頻年罷舉客於蒲華之間光化中軍容劉季述王奉先廢昭宗立裕王月餘諸侯無奔問者愚時在華陰致書於華帥韓建其略曰僕關東一布衣爾幸讀書為文每見君臣父子之際有傷教害義之事常痛心切齒恨不得抽腸蹀血肆之市朝明公居近關重鎮君父幽辱月餘坐視凶逆而忘勤王之舉僕所未諭也僕竊計中朝輔弼雖有志而無權外鎮諸侯外鎮原本作外鉁今從通鑑改正影庫本粘籤雖有權而無志惟明公忠義社稷是依往年車輅播遷號泣奉迎纍歲供饋再復朝廟義感人心至今歌詠此時事勢尤異於前明公地處要衝位兼將相自宮闈變故已涉旬時若不號令率先以圖反正遲疑未決一朝山東侯伯唱義連衡鼓行而西明公求欲自安如何決策此必然之勢也不如馳檄四方諭以逆順軍聲一振則元凶破膽浹旬之間二豎之首傳於天下計無便於此者建深禮遇之堅辭還山天復初駕在鳳翔汴軍攻蒲華愚避難東歸洛陽時衛公李德裕孫延古在平泉舊墅愚往依焉子弟親採梠負薪以給朝夕未嘗干人故少師薛廷圭掌貢籍之歲登進士第又登宏詞科授河南府參軍遂卜居洛表白沙之別墅梁有禪代之謀柳璨希旨殺害朝士愚以衣冠自相殘害乃避地河朔與宗人李延光客於山東梁末帝嗣位雅好儒士延光素相款奉得侍講禁中屢言愚之行高學贍有史魚蘧瑗之風召見嗟賞久之擢為左拾遺俄充崇政院直學士或預咨謀而儼然正色不畏強禦衡王入朝衡王原本作衛王今據歐陽史家人傳改正影庫本粘籤重臣李振輩皆致拜惟愚長揖末帝讓之曰衡王朕之兄朕猶致拜崇政使李振等皆拜爾何傲耶對曰陛下以家人禮兄振等私臣也臣居朝列與王無素安敢諂事其剛毅如此晉州節度使華溫琪在任違法籍民家財其家訟於朝制使劾之伏罪梁末帝以先朝草昧之臣不忍加法愚堅按其罪梁末帝詔曰朕若不與鞫窮謂豫不念赤子若或遂行典憲謂余不念功臣為爾君者不亦難乎其華溫琪所受贓宜官給代還所訟之家貞明中通事舍人李霄傭夫毆僦舍人致死法司按律罪在李霄愚白李霄手不鬬毆傭夫致死安得坐其主耶以是忤旨愚自拾遺再遷膳部員外郎賜緋改司勳員外郎賜紫至是罷職歷許鄧觀察判官案歐陽史作罷為鄧州觀察判官舊五代史考異初在內職慈州舉子張礪依焉貞明中礪自河陽北歸莊宗補授太原府掾出入崇闥之間揄揚愚之節概及言愚之所為文仲尼遇顏回壽顏回壽原本作顏回儔今據夏文莊集所引薛史改正影庫本粘籤夷齊非餓人等篇北人望風稱之洎莊宗都洛陽鄧帥俾奏章入朝諸貴見之禮接如舊尋為主客郎中數月召為翰林學士三年魏王繼岌征蜀請為都統判官仍帶本職從軍時物議以蜀險阻未可長驅郭崇韜問計於愚愚曰如聞蜀人厭其主荒恣倉卒必不為用宜乘其人二三風馳電擊彼必破膽安能守險及前軍至固鎮收軍食十五萬斛崇韜喜謂愚曰公能料事吾軍濟矣招討判官陳乂至寶雞寶雞原本作實雞今據通鑑改正影庫本粘籤稱疾乞留在後愚厲聲曰陳乂見利則進懼難則止今大軍涉險人心易惑正可斬之以徇由是軍人無遲留者是時軍書羽檄皆出其手蜀平就拜中書舍人師還明宗即位時西征副招討使任圜為宰相雅相欽重屢言於安重誨請引為同列屬孔循用事援引崔協以塞其請俄以本職權知貢舉改兵部侍郎充翰林承旨長興初除太常卿屬趙鳳出鎮邢臺乃拜中書侍郎平章事案歐陽史作任圜罷相乃拜愚中書侍郎同平章事吳縝嘗辨其誤據薛史愚代趙鳳為相非繼任圜也舊五代史考異案歐陽史任圜罷相乃拜愚中書侍郎同平章事吳縝纂誤云明宗紀天成二年六月任圜罷長興二年李愚為平章事自任圜罷至此已五年矣與愚入相年月太遠蓋史之所書本謂趙鳳而誤為任圜也殿本轉集賢殿大學士長興季年秦王恣橫權要之臣避禍不暇邦之存亡無敢言者愚性剛介往往形言然人無唱和者後轉門下侍郎監修國史兼吏部尚書與諸儒修成創業功臣傳三十卷愚初不治第既命為相官借延賓館居之嘗有疾詔近臣宣諭延之中堂設席惟管秸使人言之明宗特賜帷帳茵褥案職官分紀云長興四年愚病明宗遣中使宣問愚所居寢室蕭然四壁病榻弊而已中使具言其事帝曰宰相月俸幾何而委頓如此詔賜絹百匹錢百千帷帳什物一十二事所載較薛史為詳今録以備參考閔帝嗣位志修德政易月之制才除便延訪學士讀貞觀政要太宗實録有意於致理愚私謂同列曰吾君延訪少及吾輩位高責重事亦堪憂奈宗社何皆惕息而不敢言以恩例進位左僕射清泰初徽陵禮畢馮道出鎮同州愚加特進太微宮使弘文館大學士宰相劉昫與馮道婚嫁道既出鎮兩人在中書或舊事不便要釐革者對論不定愚性太峻因曰此事賢家翁所為賢家翁通鑑作賢親家疑原本有誤然册府元龜所引薛史亦作賢家翁今仍其舊影庫本粘籤更之不亦便乎昫憾其言切於是每言必相折難或至喧呼無幾兩人俱罷相守本官案錦繡萬花谷云愚為相迂闊廢帝謂愚等無所事常目為粥飯僧以為飲食終日無所用心清泰二年秋愚已嬰疾率多請告纍表乞骸不允卒於位永樂大典卷一萬三百八十九任圜京兆三原人祖清成都少尹父茂弘避地太原奏授西河令有子五人曰圖回圜團冏風彩俱異武皇愛之以宗女妻團歷代憲二郡刺史李嗣昭典兵於晉陽與圜遊處甚洽及鎮澤潞請為觀察支使解褐賜朱紱圜美姿容有口辨嗣昭為人間搆於莊宗方有微隙圜奉使往來常申理之克成友于之道圜之力也及丁母憂莊宗承制起復潞州觀察判官賜紫常山之役嗣昭為帥卒於軍圜代總其事案歐陽史作嗣昭戰歿圜代將其事舊五代史考異號令如一敵人不知莊宗聞之倍加奬賞是秋復以上黨之師攻常山城中萬人突出大將孫文進死之賊逼我軍圜麾騎士擊之頗有殺獲嘗以禍福諭其城中鎮人信之使乞降及城潰誅元惡之外官吏咸保其家屬亦圜所庇護焉莊宗改鎮州為北京以圜為工部尚書兼真定尹真定原本作真寶今據歐陽史改正影庫本粘籤北京副留守知留守事明年郭崇韜兼鎮改行軍司馬充北面水陸轉運使仍知府事同光三年歸朝守工部尚書崇韜伐蜀奏令從征西蜀平署圜黔南節度使懇辭遂止魏王班師行及利州康延孝叛以徑兵八千回劫西川繼岌聞之夜半命中使李廷安召圜圜方寢廷安登其床以告之圜衣不及帶遽見繼岌繼岌泣而言曰紹琛負恩紹琛原本作昭深考歐陽史雜傳康延孝賜名紹琛今改正影庫本粘籤非尚書不能制即署圜為招討副使與都指揮使梁漢顒等率兵攻延孝於漢州擒之旋至渭南繼岌遇害圜代總全師朝於洛陽明宗嘉其功拜平章事判三司圜揀拔賢俊杜絶幸門百官俸入為孔謙減折圜以廷臣為國家羽儀故優假班行禁其虛估期月之內府庫充贍朝廷修葺軍民咸足雖憂國如家而切於功名故為安重誨所忌嘗與重誨會於私第有妓善歌重誨求之不得嫌隙自茲而深矣先是使人食券案通鑑作館券舊五代史考異皆出於戶部重誨止之俾須內出爭於御前往復數四竟為所沮案通鑑安重誨與圜爭于上前往復數四聲色俱厲上退朝宮人問上適與重誨論事為誰上曰宰相宮人曰妾在長安宮中未嘗見宰相樞密奏事敢如是者蓋輕大家耳上愈不悅舊五代史考異因求罷三司天成二年除太子少保致仕出居磁州及朱守殷叛重誨乘間誣其結搆立遣人稱制就害之乃下詔曰太子少保致仕任圜早推勳舊曾委重難既退免於劇權俾優間於外地而乃不遵禮分潛附守殷緘題罔避於嫌疑情旨頗彰於怨望自收汴壘備見蹤由若務含弘是孤典憲尚全大體止罪一身宜令本州於私第賜自盡圜受命之日聚族酣飲神情不撓清泰中制贈太傅案歐陽史作愍帝即位贈圜太傅薛史作廢帝清泰中未知孰是舊五代史考異子徹仕皇朝位至度支郎中卒永樂大典卷九千三百五十二史臣曰革説承舊族之胄佐新造之邦業雖謝于財成罪未聞于昭著而乃為權臣之所忌顧後命以無逃靜而言之亦可憫也盧程器狹如是形渥攸宜趙鳳李愚咸以文學之名俱踐巖廊之位校其貞節愚復優焉任圜有縱橫濟物之才無明哲保身之道退猶不免歔可悲哉永樂大典卷一萬七千九百一十
