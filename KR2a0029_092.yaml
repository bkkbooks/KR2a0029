body:
  text: 舊五代史卷九十二晉書十八列傳第七姚顗字伯真京兆萬年人曾祖希齊湖州司功參軍祖宏慶蘇州刺史父荊國子祭酒顗少憃敦厚靡事容貌任其自然流輩未之重唯兵部侍郎司空圖深器之司空圖原本作司空塗今從冊府元龜改正影庫本粘籤案歐陽史作中條山處士司空圖一見奇之據新唐書卓行傳司空圖為戶部侍郎以疾歸昭宗在華召為兵部侍郎辭不赴是圖非處士也舊五代史考異以女妻焉顗性仁恕多為僕妾所欺心雖察之而不能面折終身無喜怒不知錢百之為陌黍百之為銖凡家人市貨百物入增其倍出減其半不詢其由無擔石之儲心不隕穫唐末隨計入洛出游嵩山有白衣丈夫拜于路側請為童僕顗辭不納乃曰鬼神享于德君子孚于信余則鬼也將以託賢者之德通化工之信幸無辭焉昔余掌事陰府承命攝人之魂氣名氏同而其人非且富有壽算復而歸之則筋骸已敗由是獲譴使不得為陽生公中夏之相輔也今為謁中天之祠若以某姓名求之神必許諾顗因為之虔禱而還白衣迎于山下曰余免其苦矣拜謝而退顗次年擢進士第梁貞明中歷校書郎登封令右補闕禮部員外郎召入翰林纍遷至中書舍人唐莊宗平梁以例貶復州司馬歲餘牽復授左散騎常侍歷兵吏部侍郎尚書左丞唐末帝即位講求輔相乃書朝中清望官十餘人姓名置於瓶中清夜焚香而挾之既而得盧文紀與顗遂拜中書侍郎平章事制前一日嵩山白衣來謁謂顗曰公明日為相其言無差冥數固先定矣案歐陽史本傳云顗為人仁恕不知錢陌銖兩之數御家無法在相位齷齪無所為唐制吏部分為三銓尚書一人曰尚書銓侍郎二人曰中銓東銓每歲集以孟冬三旬而選盡季春之月天成中馮道為相建言天下未一選人歲才數百而吏部三銓分注雖曰故事其實徒煩而無益始詔三銓合而為一而尚書侍郎共行選事至顗與盧文紀為相復奏分銓為三而循資長定舊格歲久多舛因增損之選人多不便之往往邀遮宰相喧訴不遜顗等無如之何廢帝為下詔書禁止高祖登極罷相為刑部尚書俄遷戶部尚書天福五年冬卒年七十五贈左僕射子惟和嗣顗疏于財而御家無術既死斂葬之資不備家人俟賻物及鬻第方能舉喪而去士大夫愛其廉而笑其拙永樂大典卷五千三百八十三呂琦呂琦傳永樂大典闕全篇今就散見各韻者共得四條排次前後以存梗概影庫本粘籤字輝山幽州安次人也祖壽瀛州景城主簿父兗滄州節度判官纍至檢校右庶子永樂大典卷一萬七百六十五劉守光攻陷滄州琦父兗被擒族之琦時年十五案厚德録作琦年十四舊五代史考異為吏追攝將就戮焉有趙玉者案厚德録作李玉舊五代史考異幽薊之義士也久遊于兗之門下見琦臨危乃紿謂監者曰此子某之同氣也幸無濫焉監者信之即引之俱去行一舍琦困于徒步以足病告玉負之而行逾數百里因變姓名乞食于路乃免其禍永樂大典卷一萬四千五百八十一案厚德録云李玉嘗客于滄洲呂兗門下劉守光破滄洲盡殺呂兗家兗子琦年十四玉負之以逃丐衣食以資之燕趙間以玉能存呂氏之孤推以為義士清泰中琦為給事中端明殿學士時玉已卒乃薦其子于知貢舉馬裔孫遂擢甲第考薛史作趙玉厚德録作李玉薛史作琦年十五厚德録作十四蓋傳聞之異孔本年弱冠以家門遇禍邈無所依乃勵志勤學多遊於汾晉永樂大典卷三千八百七十一唐天祐中莊宗方開霸府翹佇賢士墨制授琦代州軍事判官秩滿歸太原監軍使張承業重琦器量禮遇尤厚天成初拜琦殿中侍御史遷駕部員外郎兼侍御史知雜事會河陽帑吏竊財事發詔軍巡院之時軍巡使尹訓怙勢納賂枉直相反俄有訴寃於闕下者詔琦按之既驗其姦乃上言請治尹訓沮而不行琦連奏不已訓知其不免自殺於家其獄遂明蒙活者甚衆自是朝廷多琦之公直永樂大典卷二萬五百二十八高祖建義於太原唐末帝幸懷州趙德鈞駐軍于團柏谷末帝以琦嘗在德鈞幕下因令齎都統使官告以賜之且犒其軍焉及觀軍于北陲館于欣州會晉祖降下晉安寨遣使告于近郡琦適遇其使即斬之以聞尋率郡兵千人間道而歸案通鑑作帥州兵趣鎮州舊五代史考異高祖入洛亦弗之責止改授祕書監而已天福中預修唐書權掌選部皆有能名焉纍遷禮部刑部戶部兵部侍郎階至金紫光祿大夫爵至開國子琦美丰儀有器概雖以剛直聞于時而內實仁恕初高祖謀求輔相時宰臣李嵩力薦琦于高祖云可大用高祖數召琦于便殿言及當世事甚奇之方將倚以為相忽遇疾而逝人皆惜之永樂大典卷一萬七百六十五梁文矩字德儀鄆州人父景祕書少監梁福王友璋好接賓客文矩少遊其門初試太子校書轉祕書郎友璋領鄆州奏為項城令及移鎮徐方辟為從事友璋卒改兗州觀察判官時莊宗遣明宗襲據鄆州文矩以父母在鄆一旦隔越不知存亡為子之情戀望如灼遂間路歸鄆尋謁莊宗莊宗喜之授天平軍節度掌書記在明宗幕下明宗歷汴恆二鎮皆隨府遷職天成初授右諫議大夫知宣武軍軍州事歷御史中丞吏部侍郎禮部尚書西都副留守判京兆府事繼改兵部尚書文矩以嘗事霸府每懷公輔之望時高祖自外鎮入覲嘗薦於明宗曰梁文矩早事陛下甚有勤勞未升相輔外論慊之明宗曰久忘此人吾之過也尋有旨降命會丁外憂而止清泰初拜太常卿高祖即位授吏部尚書改太子少師文矩喜清靜之教聚道書數千卷企慕赤松留侯之事而服食尤盡其善後因風痹上章請退以太子太保致仕居洛陽久之天福八年以疾卒時年五十九贈太子太傅永樂大典卷六千六百十四史圭常山人也其先與王武俊來於塞外王武俊原本作武後今從唐書改正影庫本粘籤因家石邑高祖曾歷鎮陽牙校父鈞假安平九門令圭好學工詩長于吏道唐光化中歷阜城饒陽尉改房子寧晉元氏樂壽博陸五邑令為寧晉日擅給驛廩以貸飢民民甚感之及為樂壽令里人為之立碑同光中任圜為真定尹擢為本府司録不應命郭崇韜領其地辟為從事及明宗代崇韜以舊職縻之明宗即位入為文昌正郎安重誨薦為河南少尹判府事尋命為樞密院直學士時圭以受知於重誨重誨奏令圭與同列閻至俱升殿侍立以備顧問明宗可之尋自左諫議大夫拜尚書右丞有入相之望圭敏于吏事重誨本不知書為事剛愎每於明宗前可否重務圭恬然終日不能剖正其事長興中重誨既誅圭出為貝州刺史未幾罷免退歸常山由是閉門杜絶人事雖親戚故人造者不見其面每遊別墅則乘婦人氈車以自蔽匿人莫知其心高祖登極徵為刑部侍郎判鹽鐵副使皆宰臣馮道之奏請也始圭在明宗時為右丞權判銓事道在中書嘗以堂判衡銓司所注官圭怒力爭之道亦微有不足之色至是圭首為道所舉方愧其度量遠不及也旋改吏部侍郎分知銓事而圭素厲廉守節大著公平之譽圭前為河南少尹日有嵩山術士遺圭石藥如斗謂圭曰服之可以延壽然不可中輟輟則疾作矣圭後服之神爽力健深寶惜焉清泰末圭在常山遇祕瓊之亂時貯於衣笥為賊所劫後不復得天福中疾生胸臆之間常如火灼圭知不濟求歸鄉里詔許之及涉河竟為藥氣所蒸卒於路案歐陽史作卒于常山舊五代史考異歸葬石邑時年六十八永樂大典卷一萬一百八十三裴字司東系出中眷裴氏世居河東為望族容止端秀性卞急剛直而無隱少而好學苦心文藝雖遭亂離手不釋卷唐光化三年擢進士第釋褐授校書郎歷諫職梁初當路推其文學遷翰林學士中書舍人唐莊宗時擢為禮部侍郎後以語觸當事改太子賓客旋授兵部尚書以老致仕天福初起為工部尚書復告老以右僕射致仕纍知貢舉稱得士宰相馬裔孫桑維翰皆其所取進士也後裔孫知貢舉率新進士謁喜為詩曰詞場最重是持衡天遣愚夫受盛名三主禮闈年八十門生門下見門生當世榮之桑維翰嘗私見不為迎送人問之曰我見桑公于中書庶僚也今見我于私第門生也人以為允卒年八十五贈太子太保永樂大典卷五千三百五吳承範字表微魏州人也父瓊右金吾衛將軍纍贈太子少保承範少好學善屬文唐閔帝之鎮鄴都也聞其才名署為賓職承範懇求隨計閔帝許之長興三年擢進士第及閔帝即位授左拾遺清泰二年以本官充史館修撰與同職張昭等共修明宗實録考張昭本名昭遠至漢初始去遠字薛史晉書已作張昭蓋從其最後之名今姑仍其舊影庫本粘籤轉右補闕依前充職高祖革命遷尚書屯田員外郎知制誥天福三年改樞密院直學士未幾自祠部郎中知制誥召充翰林學士正拜中書舍人賜金紫少帝嗣位遷禮部侍郎知貢舉尋遘疾而卒年四十二贈工部尚書承範溫厚寡言善希人旨桑維翰李嵩尤重之嘗薦于高祖云可大用承範知之持重自養雖遇盛夏而猶服襦袴加之以純綿蓋慮有寒濕之患也然竟不獲其志其命也夫永樂大典卷三千三百二十一盧導字熙化其先范陽人也祖伯卿案新唐書宰相世系表卿太原少尹伯初之子也疑原本衍伯字舊五代史考異唐殿中侍御史父如晦案新唐書世系表作知晦舊五代史考異國子監丞贈戶部侍郎導少而儒雅美詞翰善談論唐天祐初登進士第釋褐除校書郎由均州鄖鄉縣令入為監察御史三遷職方員外郎充史館修撰改河南縣令禮部郎中賜紫轉右司郎中兼侍御史知雜事以病免閒居於漢上久之天成中以本官徵還拜右諫議大夫長興末為中書舍人權知貢舉明年春潞王自鳳翔擁大軍赴闕唐閔帝奔于衛州宰相馮道李愚集百官于天宮寺李愚原本作李遇今從通鑑改正影庫本粘籤將出迎潞王時軍衆離潰人情奔駭百官移時未有至者導與舍人張昭先至馮道請導草勸進箋導曰潞王入朝郊迎可也案通鑑作班迎舊五代史考異若勸進之事安可造次且潞王與主上皆太后之子或廢或立當從教令安得不稟策母后率爾而行馮道曰凡事要務實勸進其可已乎導曰今主上蒙塵在外遽以大位勸人若潞王守道以忠義見責未審何詞以對不如率羣臣詣宮門取太后進止即去就善矣道未及對會京城巡檢安從進報曰潞王至矣安得百僚無班即紛然而去是日潞王未至馮道等止于上陽門外又令導草勸進箋案歐陽史作潞王止于上陽門外道又令導草箋與薛史異通鑑作潞王未至三相息于上陽門外與是書同舊五代史考異導執之如初李愚曰舍人之言是也吾輩信罪人矣導之守正也如是晉天福中由禮部侍郎遷尚書右丞判吏部尚書銓事秩滿拜吏部侍郎六年秋卒於東京時年七十六永樂大典卷二千二百十二鄭韜光字龍府洛京河清人也曾祖絪為唐宰相祖祗德國子祭酒案新唐書宰相世系表祗德兵部尚書舊五代史考異贈太傅父皓案新唐書世系表皓字養正疑皓字是頤字之訛舊五代史考異河南尹贈太師其先世居滎陽自隋唐三百餘年公卿輔相蟬聯一門韜光唐宣宗之外孫萬壽公主之所出也生三日賜一子出身銀章朱紱及長美容止神爽氣徹不妄喜怒秉執名節為甲族所稱自京兆府參軍歷祕書郎集賢校理太常博士虞部比部員外郎司門戶部郎中河南京兆少尹太常少卿諫議大夫給事中梁貞明中懇求休退上表漏名責授寧州司馬莊宗平梁遷工禮刑部侍郎天成長興中歷尚書左右丞國初以戶部尚書致仕自襁褓逮于懸車凡事十一君越七十載所仕無官謗無私過三持使節不辱君命士無賢不肖皆恭己接納晚年背傴時人咸曰鄭傴不迂平生交友之中無怨隙親族之間無愛憎恬和自如性尚平簡及致政歸洛甚愜終焉之志天福五年秋寢疾而卒年八十贈右僕射永樂大典卷一萬八千八百八十一王權王權太平御覽作王欋與原本異通鑑歐陽史統作王權知欋字係傳刻之誤今仍其舊影庫本粘籤字秀山太原人積世衣冠曾祖起官至左僕射山南西道節度使冊贈太尉諡曰文懿唐史有傳祖龜浙東觀察使父蕘右司員外郎權舉進士解褐授祕書省校書郎集賢校理歷左拾遺右補闕梁祖革命御史司憲崔沂表為侍御史遷兼職方員外郎知雜事歲餘召入翰林為學士在院加戶部郎中知制誥歷左諫議大夫給事中充集賢殿學士判院事俄拜御史中丞唐莊宗平梁以例出為隨州司馬會赦量移許州月餘入為右庶子遷戶兵吏三侍郎尚書左丞禮部尚書判銓清泰中權知貢舉改戶部尚書華資美級罕不由之高祖登極轉兵部尚書天福中命權使於契丹權以前世纍為將相未嘗有奉使而稱陪臣者謂人曰我雖不才年今耄矣豈能遠使於契丹乎違詔得罪亦所甘心由是停任先是宰相馮道使於契丹才回權亦自鳳翔冊禮使回案通鑑考異引周世宗實録馮道傳云契丹遣使加徽號于晉祖晉亦獻徽號于契丹始命兵部尚書王權銜其命權辭以老病晉祖謂馮道曰此行非卿不可道無難色據此傳馮道自契丹使回始命王權奉使道亦未嘗再使契丹也與周實録異舊五代史考異故責詞略曰若以道路迢遙即鸞閣之台臣亦往若以筋骸衰減即鳳翔之冊使才回既黷憲章須從殿黜云其實權不欲臣事契丹故堅辭之非避事以違命也踰歲授太子少傅致仕六年秋以疾卒年七十八贈左僕射永樂大典卷六千八百五十一韓惲字子重太原晉陽人曾祖俊唐龍武大將軍祖士則石州司馬父逵代州刺史惲世仕太原昆仲為軍職惟惲親狎儒士好為歌詩聚書數千卷乾寧中後唐莊宗納其妹為妃初為嫡室故莊宗深禮其家而惲以文學署交城文水令入為太原少尹莊宗平定趙魏為魏州支使莊宗即位授右散騎常侍從駕至洛陽轉尚書戶部侍郎天成初改祕書監俄而馮道為丞相與惲有同幕之舊以惲性謹厚尤左右之尋遷禮部尚書丁內憂服闋授戶部尚書明宗晏駕馮道為山陵使引惲為副使清泰初以充奉之勞授檢校尚書右僕射絳州刺史踰年入為太子賓客高祖登極以惲先朝懿戚深加禮遇除授貝州刺史時范延光有跋扈之狀惲懼其見逼遲留不敢赴任高祖不悅復授太子賓客尋改兵部尚書天福七年夏車駕在鄴惲病腳氣卒於龍興寺時年六十餘永樂大典卷三千六百七十五李懌京兆人也祖褒唐黔南觀察使父昭戶部尚書懌幼而能文進士擢第解褐為校書郎集賢校理清河尉入梁歷監察御史右補闕殿中侍御史起居舍人禮部員外郎知制誥換都官郎中賜緋召入翰林為學士正拜舍人賜金紫仍舊內職莊宗平汴洛責授懷州司馬遇赦量移孟州入為衛尉少卿天成初復拜中書舍人充翰林學士在職轉戶部侍郎右丞充承旨時常侍張文寶知貢舉中書奏落進士數人仍請詔翰林學士院作一詩一賦下禮部為舉人格樣學士竇夢徵張礪輩撰格詩格賦各一格詩原本作權詩今從歐陽史改正影庫本粘籤送中書宰相未以為允夢徵等請懌為之懌笑而答曰李懌識字有數頃歲因人偶得及第敢與後生髦俊為之標格假令今却稱進士就春官求試落第必矣格賦格詩不敢應詔君子多其識大體天福中自工部尚書轉太常卿歷禮部刑部二尚書以多病留司於洛下不交人事開運末遇契丹入洛家事罄空尋以疾卒年七十餘永樂大典卷一萬三百九十
