body:
  text: 周廣順元年二月太常禮周廣順周周廣順元年周廣順元年二月周廣順周周廣周廣順元周廣順周廣順元年二月太常禮院上言准勅遷漢廟入昇平宮其唐晉兩朝皆止五廟遷移今漢七廟未審總移為復祇移五廟勅宜准前勅並移于昇平宮其法物神廚齋院祭服祭器饌料皆依中祠例用少牢光祿等寺給其讀文太祝及奉禮郎太常寺差每仲饗以漢宗子為三獻從之永樂大典卷一萬七千五十二孔本周廣順元年二月太常禮院上言准勅遷漢廟入昇平宮其唐晉兩朝皆止五廟遷移今漢七廟未審總移為復祇移五廟勅宜准前勅並移于昇平宮其法物神廚齋院祭服祭器饌料皆依中祠例用少牢光祿等寺給其讀文太祝及奉禮郎太常寺差每仲饗以漢宗子為三獻從之永樂大典卷一萬七千五十二孔本周廣順元年二月太常禮院上言准勅遷漢廟入昇平宮其唐晉兩朝皆止五廟遷移今漢七廟未審總移為復祇移五廟勅宜准前勅並移于昇平宮其法物神廚齋院祭服祭器饌料皆依中祠例用少牢光祿等寺給其讀文太祝及奉禮郎太常寺差每仲饗以漢宗子為三獻從之永樂大典卷一萬七千五十二孔本周廣順元年二月太常禮院上言准勅遷漢廟入昇平宮其唐晉兩朝皆止五廟遷移今漢七廟未審總移為復祇移五廟勅宜准前勅並移于昇平宮其法物神廚齋院祭服祭器饌料皆依中祠例用少牢光祿等寺給其讀文太祝及奉禮郎太常寺差每仲饗以漢宗子為三獻從之永樂大典卷一萬七千五十二孔本周廣順元年二月太常禮院上言准勅遷漢廟入昇平宮其唐晉兩朝皆止五廟遷移今漢七廟未審總移為復祇移五廟勅宜准前勅並移于昇平宮其法物神廚齋院祭服祭器饌料皆依中祠例用少牢光祿等寺給其讀文太祝及奉禮郎太常寺差每仲饗以漢宗子為三獻從之永樂大典卷一萬七千五十二孔本周廣順元年二月太常禮院上言准勅遷漢廟入昇平宮其唐晉兩朝皆止五廟遷移今漢七廟未審總移為復祇移五廟勅宜准前勅並移于昇平宮其法物神廚齋院祭服祭器饌料皆依中祠例用少牢光祿等寺給其讀文太祝及奉禮郎太常寺差每仲饗以漢宗子為三獻從之永樂大典卷一萬七千五十二孔本周廣順元年二月太常禮院上言准勅遷漢廟入昇平宮其唐晉兩朝皆止五廟遷移今漢七廟未審總移為復祇移五廟勅宜准前勅並移于昇平宮其法物神廚齋院祭服祭器饌料皆依中祠例用少牢光祿等寺給其讀文太祝及奉禮郎太常寺差每仲饗以漢宗子為三獻從之永樂大典卷一萬七千五十二孔本周廣順元年二月太常禮院上言准勅遷漢廟入昇平宮其唐晉兩朝皆止五廟遷移今漢七廟未審總移為復祇移五廟勅宜准前勅並移于昇平宮其法物神廚齋院祭服祭器饌料皆依中祠例用少牢光祿等寺給其讀文太祝及奉禮郎太常寺差每仲饗以漢宗子為三獻從之永樂大典卷一萬七千五十二孔本周廣順元年二月太常禮院上言准勅遷漢廟入昇平宮其唐晉兩朝皆止五廟遷移今漢七廟未審總移為復祇移五廟勅宜准前勅並移于昇平宮其法物神廚齋院祭服祭器饌料皆依中祠例用少牢光祿等寺給其讀文太祝及奉禮郎太常寺差每仲饗以漢宗子為三獻從之永樂大典卷一萬七千五十二孔本周廣順元年二月太常禮院上言准勅遷漢廟入昇平宮其唐晉兩朝皆止五廟遷移今漢七廟未審總移為復祇移五廟勅宜准前勅並移于昇平宮其法物神廚齋院祭服祭器饌料皆依中祠例用少牢光祿等寺給其讀文太祝及奉禮郎太常寺差每仲饗以漢宗子為三獻從之永樂大典卷一萬七千五十二孔本周廣順元年二月太常禮院上言准勅遷漢廟入昇平宮其唐晉兩朝皆止五廟遷移今漢七廟未審總移為復祇移五廟勅宜准前勅並移于昇平宮其法物神廚齋院祭服祭器饌料皆依中祠例用少牢光祿等寺給其讀文太祝及奉禮郎太常寺差每仲饗以漢宗子為三獻從之永樂大典卷一萬七千五十二孔本
