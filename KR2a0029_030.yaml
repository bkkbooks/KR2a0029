body:
  text: 舊五代史卷三十唐書六莊宗紀第四同光元年冬十月辛未朔日有蝕之是日皇后劉氏皇子繼岌歸鄴宮帝送於離亭歔欷而別詔宣徽使李紹宏宰相豆盧革租庸使張憲興唐尹王正言同守鄴城壬申帝御大軍自楊劉濟河癸酉至鄆州是夜三鼓渡汶時王彥章守中都中都原本作巾都今據歐陽史改正影庫本粘籤甲戌帝攻之中都素無城守師既雲合梁衆自潰是日擒梁將王彥章及都監張漢傑趙廷隱劉嗣彬李知節康文通王山興等將吏二百餘人斬馘二萬奪馬千匹時既獲中都之捷帝召諸將謀其所向或言且狥兗州徐圖進取唯李嗣源曰宜急趨汴州段凝方領大軍駐於河上假如便來赴援直路又阻決河須自滑州濟渡十萬之衆舟楫焉能卒辦此去汴城咫尺若晝夜兼程晝夜兼程原本作畫兼星今據文改正影庫本粘籤信宿即至段凝未起河壖夷門已為我有矣臣請以千騎前驅陛下御軍徐進鮮不克矣帝嘉之是夜嗣源率前軍先進翌日車駕即路丁丑次曹州郡將出降己卯遲明前軍至汴城嗣源令左右捉生攻封丘門梁開封尹王瓚請以城降俄而帝與大軍繼至王瓚迎帝自大梁門入梁朝文武官屬於馬前謁見陳世代唐臣陷在僞廷今日再覩中興雖死無恨帝諭之曰朕二十年血戰蓋為卿等家門無足憂矣各復乃位時梁末帝朱鍠已為其將皇甫麟所殺獲其首函之以獻是日賜樂工周匝幣帛賜樂工周匝原本脫工字今據歐陽史增入影庫本粘籤周匝者帝之寵伶也胡柳之役陷于梁帝每思之至是謁見欣然慰接周匝因言梁教坊使陳俊保庇之恩教坊使原本作孝防使考五代會要梁雜使有教坊使歐陽史及通鑑並作教坊今改正影庫本粘籤垂泣推薦請除郡守帝亦許之庚辰帝御元德殿梁百官於朝堂待罪詔釋之壬午段凝所部馬步軍五萬解甲於封丘凝等率大將先至請死詔各賜錦袍御馬金幣帝幸北郊撫勞降軍各令還本營丙戌詔曰懲惡勸善務振紀綱激濁揚清須明真僞蓋前王之令典為歷代之通規必按舊章以令多士而有志萌僭竊位忝崇高纍世官而皆受唐恩貪爵祿而但從僞命或居台鉉或處權衡或列近職而預機謀或當峻秩而掌刑憲事分逆順理合去留僞宰相鄭王玉等一十一人皆本朝簪組儒苑品流雖博識多聞備明今古而修身慎行頗負祖先昧忠貞而不度安危專利祿而全虧名節合當大辟無恕近親無恕原本作無恐今據文改正影庫本粘籤朕以纘嗣丕基初平巨憝方務好生之道在行含垢之恩湯網垂仁既矜全族舜刑投裔兼貸一身爾宜自新我全大體其為顯列不並庶僚餘外應在周行悉仍舊貫凡居中外咸體朕懷乃貶梁宰相鄭王玉為萊州司戶蕭頃為登州司戶翰林學士劉嶽為均州司馬任贊房州司馬姚顗復州司馬封翹唐州司馬李懌懷州司馬竇夢徵沂州司馬竇夢徵原本作夢微今據唐列傳改正影庫本粘籤崇政院學士劉光素密州司戶陸崇安州司戶御史中丞王權隨州司戶並員外置同正員是日以梁將段凝上疏奏梁朝權臣趙巖等並助成虐政結怨於人聖政惟新宜誅首惡乃下詔曰朕既殄僞庭顯平國患好生之令含弘雖切於豫懷懲惡之規決斷難違於衆請况趙巖趙鵠等自朕收城數日布惠四方尚匿迹以潛形罔悛心而革面須行赤族以謝衆心其張漢傑昨於中都與王彥章同時俘獲此際未詳行止行止原本作行致今據文改正影庫本粘籤偶示哀矜今既上將陳詞羣情激怒往日既彰於僭濫此時難漏於網羅宜置國刑以塞羣論除妻兒骨肉外其他疏屬僕使並從釋放敬翔李振首佐朱溫共傾唐祚屠害宗屬殺戮朝臣既寰宇以皆知在人神而共怒敬翔雖聞自盡未豁幽寃宜與李振並族於市疏屬僕使並從原宥朱圭素聞狡𢀿唯務讒邪鬬惑人情枉害良善將清內外須切去除况衆狀指陳亦宜誅戮契丹撒剌阿撥既棄其母又背其兄朕比重懷來厚加恩渥看同骨肉錫以姓名兼分符竹之榮疊被頒宣之渥而乃輒辜重惠復背明廷罔顧欺違竄歸僞室既同梟獍難貸刑章可并妻子同戮於市其朱氏近親趙鵠正身趙巖家屬仰嚴加擒捕其餘文武職員將校一切不問是日趙巖張希逸張漢傑張漢倫張漢融朱圭敬翔李振及契丹撒剌阿撥等並其妻孥皆斬於汴橋下又詔除毀朱氏宗廟神主僞梁二主並降為庶人天下官名府號及寺觀門額曾經改易者並復舊名時帝欲發梁祖之墓棺燔柩河南尹張全義上章申理乞存聖恩案通鑑張全義上言朱溫雖國之深讎然其人已死刑無可加屠滅其家足以為報乞免焚以存聖恩舊五代史考異帝乃止令剗去闕室而已丁亥梁百官以誅凶族於崇元殿立班待罪詔各復其位洛陽縉紳舊聞記載張全義表云伏念臣誤棲惡木曾飲盜泉實有瑕疵未蒙昭雪因下詔雪之殿本以樞密使樞密使原本作驅察使考歐陽史郭崇韜傳崇韜由樞密使知中書事今改正影庫本粘籤檢校太保守兵部尚書郭崇韜權行中書公事己丑御崇元殿制曰仗順討逆少康所以誅有窮纘業承基光武所以滅新莽咸以中興景命再造王猷經綸於草昧之中式遏於亂略之際朕以欽承大寶顯荷鴻休雖繼前修固慚涼德誓平元惡期復本朝屬四海之阽危允萬邦之推戴近者親提組練徑掃氛祅振已墜之皇綱殄偷安之寇孽國讎方雪帝道爰開拯編氓覆溺之艱救率土倒懸之苦粵自朱溫搆逆友貞嗣凶篡殺二君隳殘九廟虺毒久傷於宇宙狼貪肆噬於華夷剝喪元良凌辱神主帝里動黍離之嘆朝廷多棟橈之危棄德崇奸窮兵黷武戰士疲勞於力役蒸民耗竭其膏腴言念於斯軫傷彌切今則已梟逆豎大豁羣情覩曆數之有歸實神靈之匪昧得不臨深表誡馭朽為懷將弘濟於艱難宜特行於赦宥應僞命流貶責授官等已經量移者並可復資徒流人放歸鄉里京畿及諸道見禁囚徒大辟罪降從流已下咸赦除之其鄭王玉等一十一人未在移復之限應扈從征討將校及諸官員職掌節級馬步兵士及河北諸處屯駐守戍兵士等皆情堅破敵業茂平淮平淮原本作平準今考薛史原文係用唐憲宗平淮蔡事準字訛誤今改正影庫本粘籤副豫戡定之謀顯爾忠勤之節並據等第續議奬酬其有歿於王事未經追贈者各與贈官如有子孫堪任使者並量材録任應僞庭節度觀察防禦團練等使及刺史監押行營將校等並頒恩詔不議改更仍且稱舊銜當俟別加新命理國之道莫若安民勸課之規宜從薄賦庶遂息肩之望冀諧鼓腹之謠應諸道戶口並宜罷其差役各務營農所係殘缺賦稅及諸務懸缺積年課利及公私債負等其汴州城內自收復日已前並不在徵理之限其諸道自壬午年十二月已前並放北京及河北先以祅祲未平配買征馬如有未請却官本錢及買馬不逮者可放免應有本朝宗屬及內外文武臣僚被朱氏無辜屠害者並可追贈如有子孫及本身逃難於諸處漂寓者並令所在尋訪津置赴闕義夫節婦孝子順孫旌表門閭量加賑給或魚衆寡惸獨無所告者仰所在各議拯救民年過八十者免一子從征其有先投過僞庭將校官吏等一切不問云甲午以樞密使檢校太保守兵部尚書太原縣男郭崇韜為開府儀同三司守侍中監修國史兼真定尹成德軍節度使依前樞密使太原郡侯仍賜鐵券乙未詔宰相豆盧革權判吏部上銓御史中丞李德休權判東西銓事丙申滑州留後檢校太保段凝可依前滑州留後仍賜姓名紹欽紹欽原本作紹鏗今考通鑑及歐陽史皆作欽今改正影庫本粘籤以金紫光祿大夫檢校司空守輝州刺史杜晏球為檢校司徒依前輝州刺史仍賜姓名紹虔詔處斬隨駕兵馬都監夏彥朗於和景門外時宦官怙寵廣侵占居人第舍郭崇韜奏其事乃斬彥朗以徇丁酉賜百官絹二千匹錢二百萬職事絹一千匹錢百萬戊戌以竭忠啓運匡國功臣匡國原本避宋諱作章國今據歐陽史改正影庫本粘籤天平軍節度使開府儀同三司檢校太傅兼侍中蕃漢馬步總管副使隴西郡侯李嗣源為依前檢校太傅兼中書令天平軍節度使特進封開國公加食邑實封餘如故以開府儀同三司檢校太傅北都留守興聖宮使判六軍諸衛事李繼岌為檢校太尉同平章事充東京留守詔御史臺班行內有欲求外職或要分司各許於中書投狀奏聞己亥宴勳臣於崇元殿梁室故將咸預焉帝酒酣謂李嗣源曰今日宴客皆吾前日之勍敵一旦同會皆卿前鋒之力也梁將霍彥威戴思遠等皆伏陛叩頭帝因賜御衣酒器盡歡而罷齊州刺史孟璆上章請死詔原之璆初事帝為騎將天祐十三年帝與劉鄩莘縣對壘璆領七百騎奔梁至是來請罪帝報之曰爾當吾急引七百騎投賊何面目相見璆惶恐請死帝恕之未幾移貝州刺史貝州原本作月州今據文改正影庫本粘籤庚子帝畋於汴水之陽十一月辛丑朔有司奏河南州縣見使僞印望追毀改鑄從之以光祿大夫檢校太傅左金吾上將軍兼領左龍武軍事汾州刺史李存渥為滑州節度使加特進同平章事以雜指揮散員都部署特進檢校太傅欣州刺史李紹榮為徐州節度使以滑州兵馬留後檢校太保李紹欽為兗州節度使壬寅鳳翔節度使秦王李茂貞遣使賀收復天下癸卯河中節度使西平王朱友謙來朝西平王原本作西來考歐陽史朱友謙傳友謙封西平王今改正影庫本粘籤乙巳賜友謙姓改名繼麟帝令皇子繼岌兄事之以捧日都指揮使博州刺史康延孝為鄭州防禦使檢校太保賜姓名紹琛以宋州節度使檢校太尉平章事袁象先依前為宋州節度使仍賜姓名紹安以許州匡國軍節度使檢校太尉同平章事溫韜依前許州節度使仍賜姓名紹冲丁未日南至帝不受朝賀戊申中書門下上言以朝廷兵革雖寧支費猶闕應諸寺監各請置卿少卿監祭酒司業各一員博士兩員餘官並停唯太常寺事關大禮大理寺事關刑法除太常博士外許更置丞一員其王府及東宮官司天五官正奉御之屬凡關不急司存凡關不急司存疑有舛誤考五代會要及薛史職官志並與莊宗紀同今無可校正姑仍其舊影庫本粘籤並請未議除授其諸司郎中員外應有雙曹者且置一員左右常侍諫議大夫給事中起居郎起居舍人補闕拾遺各置一半三院御史仍委御史中丞條理申奏其停罷朝官仍各録名銜具罷任時日留在中書候見任官滿二十五箇月並據資品却與除官其西班上將軍已下仍望宣示樞密院斟酌施行從之時議者以中興之朝事宜恢廓驟茲自弱頓失物情己酉詔應隨處官吏務局員僚諸軍將校等如聞前例各有進獻直貢章奏不唯褻黷於朝廷實且傍滋於誅斂並宜止絶以肅化風又詔左降均州司馬劉嶽有母年踰八十近聞身故準故事許歸候三年喪服闋如未量移即却赴貶州壬子詔取今月二十四日幸洛京以十二月二十三日朝獻太微宮二十四日朝獻太廟二十五日有事於南郊癸未中書門下奏應隨駕及在京有帶兼官者並望落下只守本官從之乙卯以特進特進原本作恃進今據文改正影庫本粘籤檢校太傅開封尹判六軍諸衛事充功德使王瓚為宣武軍節度副使權知軍州事丁巳以銀青光祿大夫書左丞趙光胤為中書侍郎平章事集賢殿大學士案歐陽史作趙光允為中書侍郎不載大學士銜與薛史詳略異舊五代史考異以朝散大夫禮部侍郎韋說守本官同平章事以吏部侍郎史館修撰判館事盧文度為兵部侍郎充翰林學士以右散騎常侍充弘文館學士判館事馮錫嘉為戶部侍郎知制誥充翰林學士以翰林學士守尚書膳部員外郎劉昫為比部郎中知制誥依前充職以扈鑾書制學士扈鑾書制學士考歐陽史作扈鑾學士通鑑作扈鑾書學士疑皆引薛史而有所刪節惟五代會要作扈鑾書制學士與薛史莊宗紀同今仍其舊影庫本粘籤行尚書倉部員外郎趙鳳為倉部郎中知制誥充翰林學士以左拾遺于嶠守本官充翰林學士戊午以中書侍郎平章事豆盧革判租庸使兼諸道鹽鐵轉運等使新羅王金朴英遣使貢方物己未以洛京留守判六軍諸衛事守太尉兼中書令河南尹魏王張全義為檢校太師守中書令餘如故以荊南節度使檢校太師守中書令渤海王高季興為依前檢校太師守中書令餘如故庚申以工部尚書真定尹北都副留守知留守事任圜為檢校吏部尚書兼御史大夫充成德軍節度使行軍司馬知軍府事安義軍節度使李繼韜入見待罪詔釋之辛酉以宣化軍留後檢校太傅戴思遠權知青州軍州事檢校司空左監門上將軍安崇阮並檢校舊官却復本任以鎮國軍留後檢校太傅霍彥威為保義軍節度留後以權知威化軍留後檢校司徒高允貞權知鎮國軍留後以權知河陽留後檢校太保張繼業依前權知河陽留後以鄜延兩鎮節度使檢校太師兼中書令北平王高萬興依前鄜延節度使仍封北平王襄州節度使檢校太傅平章事孔勍依前襄州節度使餘如故以永平軍節度使行大安尹檢校太保張筠為西都留守行京兆尹以晉州節度使檢校太保劉玘邠州節度使檢校太保韓恭安州節度使檢校太保朱漢賓並檢校舊官却復本任壬戌以左金吾衛大將軍史敬鎔為左街使史敬鎔原本作敬容今據薛史列傳改正影庫本粘籤右金吾衛大將軍李存確為右街使甲子車駕發汴州十二月庚午朔車駕至西京案歐陽史作甲子如洛京庚午至自汴州薛史作西京蓋其時未改永平軍為西京故尚仍梁制稱洛陽為西京也又通鑑考異云諸書但謂之洛京未嘗詔改西京為洛京至同光三年始詔依舊以洛京為東都或者以永平為西京時即改梁西京為洛京而史脫其文也歐陽史于元年冬即書洛京未審所據舊五代史考異是日有司自石橋具儀仗法物迎引入于大內辛未以百官初到放三日朝參壬申以租庸使刑部侍郎太清宮副使張憲為檢校吏部尚書充北京副留守知留守事太原尹詔改取來年二月一日行郊禮戊寅詔德勝寨莘縣楊劉口楊劉原本作柳劉今據文改正影庫本粘籤通津鎮胡柳陂皆戰陳之所宜令逐處差人收掩戰士骸骨量備祭奠以慰勞魂詔改僞梁永平軍大安府復為西京京兆府案歐陽史作十一月辛酉復永平軍為西都與薛史日月互異舊五代史考異改宋州宣武軍為歸德軍汴州開封府復為宣武軍華州感化軍為鎮國軍許州匡國軍復為忠武軍滑州宣義軍復為義成軍陝府鎮國軍復為保義軍耀州靜勝軍復為順義軍潞州匡義軍復為安義軍朗州武順軍復為武貞軍延州為彰武軍鄧州為威勝軍晉州為建雄軍安州為安遠軍淮南楊溥遣使賀登極稱大吳國主書上大唐皇帝十國春秋吳世家云唐以滅梁來告始稱詔我國不受唐主隨易書用敵國禮曰大唐皇帝致書于吳國主王遣司農卿盧蘋獻金器二百兩銀器三千兩羅錦一千二百匹龍腦香五斤龍鳳絲㙐一百事于唐又遣使張景報聘稱大吳國主上書大唐皇帝辭禮如箋表殿本己卯禁屠牛馬庚辰御史臺上言請行用本朝律令格式今訪聞唯定州有本朝法書望下本州寫副本進納從之辛巳詔貶安義軍節度使李繼韜為登州長史尋斬於天津橋下再謀叛故也甲申淮南楊溥奚首領李紹威並遣使朝貢乙酉以翰林學士承旨盧質權知汴州軍府事以禮部尚書崔沂為尚書左丞崔沂原本作崔欣今據薛史列傳改正影庫本粘籤判吏部尚書銓事以兵部侍郎崔協為吏部侍郎以刑部侍郎充集賢殿學士判院事盧文紀為尚書兵部侍郎依前充集賢殿學士判院事丁亥澤州刺史董璋上言潞州軍變李繼達領兵出城自刎而死節度副使李繼珂已安撫軍城己丑有司上言上辛祈穀於上帝請奉高祖神堯皇帝配孟夏雩祀請奉太宗文皇帝配季秋大享於明堂請奉太祖武皇帝配冬至日祀圜丘請奉獻祖文皇帝配孟冬祭神州地祇請奉懿祖昭聖皇帝配從之辛卯亳州太清宮道士上言聖祖玄元皇帝殿前枯檜再生一枝圖畫以進詔曰當聖祖舊殿生枯檜新枝應皇家再造之期顯大國中興之運同上林仆柳祥既叶於漢宣比南頓嘉禾瑞更超於光武宜標史冊以示寰瀛云案五代會要云唐高祖神堯皇帝武德二年枯檜重華至安祿山僭號萎瘁玄宗自蜀歸京枝葉復盛至是再生一枝長二尺餘蓋一時誇詡之言也壬辰幸伊闕己巳以中書舍人崔居儉為刑部侍郎充史館修撰判館事甲午以租庸副使光祿大夫檢校司徒守衛尉卿孔謙為鹽鐵轉運副使永樂大典卷七千一百五十六
