body:
  text: 舊五代史卷九十三晉書十九列傳第八盧質字子徵河南人也曾祖偲唐太原府祁縣尉纍贈右僕射祖衍唐刑部侍郎太子賓客纍贈太保父望唐尚書司勳郎中纍贈太子少傅質幼聰慧善屬文年十六陝帥王重盈奏授芮城令王重盈原本作從盈今從唐書改正影庫本粘籤能以色養又為同州澄城令從私便也秩滿改祕書郎丁母憂歸河南故里天祐三年北遊太原時李襲吉在武皇幕府以女妻之武皇憐其才承制授檢校兵部郎中充河東節度掌書記賜緋魚袋武皇厭代其弟克寧握兵柄有嗣襲之望質與張承業等密謀同立莊宗為嗣有翊贊之功及莊宗四征質皆從行十六年轉節度判官檢校禮部尚書十九年莊宗將即帝位命為大禮使纍加至銀青光祿大夫檢校右僕射二十年授行臺禮部尚書莊宗既登極欲相之質性疏逸不喜居高位固辭獲免尋以本官兼太原尹充北京留守事未赴任改戶部尚書知制誥充翰林學士承旨同光元年冬從平大梁權判租庸事踰月隨駕都洛旋有詔權知汴州軍府事時孔謙握利權志在聚斂纍移文於汴配民放絲質堅論之事雖不行時論賞之俄又改金紫光祿大夫兵部尚書知制誥翰林學士承旨仍賜論思匡佐臣會覆試進士質以后從諫則聖為賦題以堯舜禹湯傾心求過為韻舊例賦韻四平四側質所出韻乃五平三側由是大為識者所誚天成元年制授特進檢校司空同州節度使時宰相馮道以詩餞別其警句云視草北來唐學士擁旄西去漢將軍儒者榮之明年改賜耀忠匡定保節功臣就加檢校司徒三年入拜兵部尚書判太僕卿事案歐陽史作判太常卿事舊五代史考異四年進封開國公長興二年授檢校太保河陽節度使未幾移鎮滄州入為右僕射及秦王得罪奉詔權知河南府事應順初遷檢校太傳正拜河南尹後改太子少師清泰末復為右僕射高祖登極質以微恙分司洛宅少帝嗣位拜太子太保天福七年秋卒於洛陽年七十六纍贈太子太師諡曰文忠案五代會要漢乾祐元年九月其子尚書兵部員外郎盧瓊上章請諡下太常議諡曰文忠舊五代史考異子十一人唯第六子夏仕至省郎餘歷州縣焉永樂大典卷二千二百十二李專美字翊商京兆萬年人也曾祖隨光祿卿案新唐書宰相世系表作隨祕書監舊五代史考異祖正範尚書庫部郎中專美少篤學又以父樞唐昭宗時常應進士舉為覆試所落不許再入專美心愧之由是不遊文場僞梁貞明中河南尹張全義以專美名族之後奏為陸渾尉秩滿改舞陽令專美性廉謹大著政聲後唐天成中安邑榷鹽使李肅辟為推官時唐末帝鎮河中見其敦雅心重之末帝一日曾召肅宴於衙署專美亦預坐末帝謂肅曰某夜來夢主上召去與宋王同剃却頭何也坐客都無對者專美屏人謂曰將來必為嗣主由是愈重焉末帝留守長安奏為從事及移鎮鳳翔鳳翔原本作鳳翊今從通鑑改正影庫本粘籤遷為記室末帝即位除尚書庫部郎中案歐陽史作比部郎中舊五代史考異賜金紫充樞密院直學士初末帝起自鳳翔大許諸軍厚賞洎至洛陽閲內庫金帛不過二三萬尋又配率京城戶民雖行捶楚亦所獲無幾末帝憂之會專美宿於禁中末帝召而讓之曰卿士人子弟常言有才術今致我至此不能度運以濟時事留才術何施也專美惶恐待罪良久奏曰臣才力駑劣屬當興運陛下猥垂録任無以裨益聖朝然府藏空竭軍賞不給非臣之罪也臣思明宗棄代之際是時府庫濫賞已竭繼以鄂王臨朝紀綱大壞縱有無限之財賦不能滿驕軍溪壑之心所以陛下孤立岐陽而得天下臣以為國之存亡不專在行賞須刑政立于上恥格行於下賞當功罰當罪則近於理道也若陛下不改覆車之轍以賞無賴之軍徒困蒸民存亡未可知也今宜取見在財賦以給之不必踐前言而希苟悅末帝然之及其行賞雖不愜於軍士然洛陽戶民獲免鞭笞之苦由專美之敷揚也尋轉給事中明年遷兵部侍郎端明殿學士未幾改檢校尚書右僕射守密書監守密書監疑當作祕書監考封演見聞録唐人亦稱祕書為密書今仍其舊影庫本粘籤充宣徽北院使高祖入洛以例除名三年復授衛尉少卿繼遷鴻臚大理卿開運中以病卒時年六十二專美之遠祖本出姑臧大房與清河小房崔氏北祖第二房盧氏昭國鄭氏為四望族皆不以才行相尚不以軒冕為貴雖布衣徒步視公卿蔑如也男女婚嫁不雜他姓欲聘其族厚贈金帛始許焉唐太宗曾降詔以戒其弊風終莫能改其間有未達者必曰姓崔盧李鄭了餘復何求耶其達者則邈在天表敻若千里人罕造其門浮薄自大皆此類也唯專美未嘗以氏族形於口吻見寒素士大夫恆恂恂如也人以此多之專美職岐下曾夢具裳簡立嵩山之頂及為端明殿學士學士李嵩同列而班在其上因以所夢告嵩且言某非德非勳安可久居此位處吾子之首乎因懇求他官尋移宣徽使嵩深德之及高祖臨朝嵩為樞密使與桑維翰同列維翰與專美亦有舊乃協力以奏之遂復朝序位至九卿專美曾使閩中遇風水漂至兩浙踰歲無恙而還至是善終人以為神道福謙之所致也永樂大典卷一萬三百九十盧詹字楚良京兆長安人也唐天祐中為河中從事莊宗即位擢為員外郎知制誥遷中書舍人天成中拜禮部侍郎知貢舉歷御史中丞兵部侍郎尚書左丞工部尚書詹性剛直議論不避權貴執政者常惡之天福初拜禮部尚書分司洛下與右僕射盧質散騎常侍盧重俱在西都數相過從三人俱嗜酒好遊山水塔廟林亭花竹之地無不同往酣飲為樂人無間然洛中朝士目為三盧會常委順性命不營財利開運初卒於洛陽詹家無長物喪具不給少帝聞之賜布帛百段粟麥百斛方能襄其葬事贈太子少保永樂大典卷二千二百十二崔梲字子文博陵安平人纍世冠冕曾祖元受舉進士直史館案新唐書世系表元受直史館高陵尉舊五代史考異祖銖安濮二州刺史父涿刑部郎中梲少好學梁貞明三年舉進士甲科為開封尹王瓚從事梲性至孝父涿有疾父涿原本作父今從歐陽史改正影庫本粘籤謂親友曰死生有命無醫為也梲侍之衣不解帶有賓至必拜泣告於門外請方便勸其進藥涿終莫之從及丁憂哀毀過制明宗朝授監察御史不應命踰年詔再下乃就列焉纍遷都官郎中翰林學士天福初以戶部侍郎為學士承旨嘗草制為宰相桑維翰所改梲以唐故事學士草制有所改者當罷職乃引經據爭維翰不能詰命權知二年貢舉時有進士孔英者素有醜行為當時所惡梲受命往見維翰維翰語素簡謂梲曰孔英來矣梲不諭其意以謂維翰以孔英為言乃考英及第物議大以為非遂罷學士拜尚書左丞遷太常卿後以風痹改太子賓客分司西京卒年六十八梲平生所著文章碑誄制詔甚多人有借本傳寫者則曰有前賢有來者奚用此為凡受託而作者必親札致之即焚其藁懼泄人之假手也梲笑不至矧怒不至詈接新進後生未嘗無誨焉羣居公會端坐寡言嘗云非止致人愛憎且或干人祖禰之諱指命僕役亦用禮節盛暑祁寒不使冒犯嘗自話於知友云某少時夢二人前引行路一人計地里曰一舍矣可以止一人曰此君當更進三十有八里復行如所言二人皆止之俄而驚覺梲常識是夢以為定命之限故六十七請退明年果終焉兄棆案世系表作榆舊五代史考異有隱德好釋氏間居滑州嘗欲訪人於白馬津北及臨岸歎曰波勢洶湧如此安可濟乎乃止後徵拜左拾遺辭疾不赴永樂大典卷二千七百四十薛融汾州平遙人性純和以儒學為業初從雲州帥李存璋為幕職唐莊宗平河南歷鄆徐二鎮從事明宗初授華州節度判官長興四年入為右補闕直弘文館歲餘改河東觀察判官會高祖鎮太原遂居于幕府清泰末高祖將舉義延賓席而歷問之次及融對曰融本儒生祇曾讀三五卷書至於軍旅之事進退存亡之機未之學也座中聳然及登極遷尚書吏部郎中兼侍御史知雜事天福二年自左諫議大夫遷中書舍人自以文學非優不敢拜命復為諫議時詔修西京大內融以鄴下用兵國用不足上疏復罷之案通鑑薛融諫曰今宮室雖經焚毀猶侈于帝堯之茅茨所費雖寡猶多于漢文之露臺況魏城未下公私困窘誠非陛下修宮館之日俟海內平寧修之未晚舊五代史考異優詔嘉許俄轉御史中丞秩滿改尚書右丞分司西都天福六年以疾卒年六十餘永樂大典卷二萬一千三百六十七案歐陽史作年六十舊五代史考異曹國珍字彥輔幽州固安人也曾祖藹祖蟾父絢代襲儒素國珍少值燕薊亂離因落髮被緇客於河西延州延州原本作逮州今從歐陽史改正影庫本粘籤高萬興兄弟皆好文辟為從事國珍常以文章自許求貢禮闈且掌書奏期年入為左拾遺纍遷至尚書郎每與人交傾財無吝性頗剛僻經藝史學非其所長好自矜衒多上章疏文字差誤數數有之為搢紳所誚高祖在藩時嘗通私謁以兄事之及即位國珍自比於嚴陵上表舊由是自吏部郎中拜左諫議大夫給事中案歐陽史張彥澤傳國珍與御史中丞王易簡率三院御史詣閣門連疏論張彥澤不報舊五代史考異又求為御史中丞時宰怒不復為請國珍銜之李嵩之母薨遣諸弟護喪歸葬深州嵩既起復乃出北郊路隅設奠公卿大夫皆送喪而出國珍固爭不行衆咸推其讜直高祖晏駕朝廷以宰臣馮道為山陵使及靈輴既發國珍上疏言馮道既為山陵使不得復入都城請除外佐以桑維翰入輔李嵩請罷相位俾持喪制少帝覽奏以所言侵越出為陝州行軍司馬至任悒怏遘疾而卒永樂大典卷四千五百十三張仁願字善政開封陳留人也祖晸唐右武衛大將軍父存敬梁河中節度觀察留後纍贈中書令梁書有傳仁願梁貞明初以勳臣之子起家為衛尉寺主簿改著作佐郎左贊善大夫賜緋魚袋唐同光初遷大理正天成元年自將作少監轉大理少卿長興中歷昭武歸德兩鎮節度判官四年復入為大理少卿清泰中除殿中監天福五年拜大理卿八年轉光祿卿仁願性溫雅明法書纍居詳刑之地議讞疑獄號為稱職兄仁穎梁朝仕至諸衛將軍中年以風恙廢於家凡十餘年仁願事之出告反面如嚴父焉士大夫推為孝友仁穎善理家勤而且約婦女衣不曳地什物多歷年所如新市焉仁願開運元年再為大理卿時隰州刺史王徹犯贓朝廷以徹功臣之後欲宥之仁願纍執奏不移竟遣伏法議者賞之開運二年以疾卒年五十一贈祕書監永樂大典卷六千三百五十一趙熙字績巨唐宰相齊國公光逢之猶子也起家授祕書省校書郎唐天成中纍遷至起居郎數上章言事以稱旨尋除南省正郎天福中承詔與張昭遠等修唐史竟集其功開運中自兵部郎中授右諫議大夫賞筆削之功也及契丹犯闕僞旨遣使於晉州率配豪民錢幣以實行橐始受命之日條制甚嚴熙出衣冠族性素輕急既畏契丹峻法乃窮理搜索人甚苦之及晉之三軍及晉之三軍原本疑有舛誤今無別本可考姑仍其舊影庫本粘籤殺副使駱從朗案通鑑云契丹以節度副使駱從朗知晉州事大將藥可儔殺從朗舊五代史考異百姓相率持仗害熙於館舍識者傷之永樂大典卷一萬六千九百九十一李遐兗州人也少為儒有節操歷數鎮從事及升朝纍遷尚書庫部員外郎高祖即位以皇子重乂保釐洛邑知遐強幹有守除為西京留守判官使之佐理復重其廉勤兼委監西京左藏庫會張從賓作亂張從賓原本作徒賓今從通鑑改正影庫本粘籤使人輦取繒帛以賞羣逆遐曰不奉詔書安敢承命遂為其下所害高祖聞而歎惜賻贈加等仍贈右諫議大夫其母田氏封京兆郡太君仍給遐所食月俸終母餘年其子俟服闋與官後又遣兗州節度使李從溫就其舊業賜牲幣綿帛等物以旌其忠也永樂大典卷一萬三百九十尹玉羽京兆長安人唐天復中隨計京師甚有文稱會有苴杖之喪纍歲羸疾冬不釋菅屨期不變倚廬制闋隱居杜門無仕宦之意永樂大典卷一萬六千九百九十一梁貞明中劉潯辟為保大軍節度判官歷雍汴滑兗從事案以下有闕文考宋黎持移石經記石經舊在務本坊自天祐中韓建築新城而石經委棄于野至朱梁時劉潯守長安從幕吏尹玉羽之請輦入城中置于此地即唐尚書省之西隅也舊五代史考異後唐清泰中為光祿少卿退歸秦中以林泉詩酒自樂冊府元龜卷八百一十三自號自然先生永樂大典卷八千五百七十宰臣張延朗手書而召高臥不從謂人曰庶孽代宗不可仕也及高祖入雒即受詔而來以所著自然經五卷貢之且告其老即日璽書褒美頒其器幣授少府監致仕月給俸錢及冬春二時服冊府元龜卷八百九十九案尹玉羽傳原本止存二條今采冊府元龜以存大概玉羽性仁恕好靜默與朋友交無怨棄御僕隸不好詈辱有過則諭而戒之有罪則禮而遣之家雖屢空不渝其廉時雖亂離不廢其業天福中卒有武庫集五十卷行于世鄭雲叟本名遨雲叟其字也以唐明宗廟諱故世傳其字焉本南燕人也案歐陽史作滑州白馬人舊五代史考異少好學耿介不屈唐昭宗朝嘗應進士舉不第因欲攜妻子隱于林壑其妻非之不肯行雲叟乃薄游諸郡獲數百緡以贍其家辭訣而去尋入少室山案歐陽史作入少室為道士舊五代史考異著擬峯詩三十六章以導其趣人多傳之後妻以書達意勸其還家雲叟未嘗一覽悉投於火其絶纍如此俄聞西嶽有五鬣松淪脂千年能去三尸因居於華陰與李道殷羅隱之友善時人目為三高士道殷有釣魚之術鈎而不餌又能化易金石無所不至雲叟恆目覩其事信而不求雲叟與梁室權臣李振善振欲祿之拒而不諾及振南遷雲叟千里徒步以省之識者高焉後妻兒繼謝每聞凶訃一哭而止時唯青襟二童子一琴一鶴從其遊處好棋塞之戲遇同侶則以晝繼夜雖寒風大雪臨簷對局手足皸裂亦無倦焉唐天成中召拜左拾遺不起與羅隱之朝夕遊處隱之以藥術取利雲叟以山田自給俱好酒能詩善長嘯有大瓠云可辟寒暑置酒於其中經時味不壞日攜就花木水石之間一酌一詠嘗因酒酣聯句鄭曰一壺天上有名物兩箇世間無事人羅曰醉却隱之雲叟外不知何處是天真高祖即位聞其名遣使齎書致禮徵為右諫議大夫雲叟稱疾不起上表陳謝高祖覽表嘉之賜近臣傳觀尋賜號逍遙先生以諫議大夫致仕月給俸祿雲叟好酒嘗為詠酒詩千二百言海內好名者書於縑緗以為贈貺復有越千里之外使畫工潛寫其形容列為屏障者焉其為時望所重也如此天福末以壽終時年七十四有文集二十卷行于世永樂大典卷一萬八千八百八十一史臣曰自古攀龍鱗附鳳翼坐達於雲衢者豈獨豐沛之士哉苟懷才抱器適會興王亦可以取貴於一時如盧質而下數君子是也至如國珍之讜直仁願之友悌趙李二子沒于王事皆無忝于士林矣唯玉羽之貞退雲叟之肥遁足可以柅奔競之風激高尚之節也永樂大典卷一萬八千八百八十一
