body:
  text: 舊五代史卷六十五唐書四十一列傳第十七李建及許州人本姓王父質建及少事李罕之為紀綱光啓中罕之謁武皇於晉陽因選部下驍勇者百人以獻建及在籍中後以功署牙職典義兒軍及賜姓名天祐七年改匡衛軍都校案歐陽史作匡衛指揮使柏鄉之役汴將韓勍追周德威至高邑南野河上鎮定兵扼橋道韓勍選精兵先奪之莊宗登高而望鎮定兵將衄謂建及曰如賊過橋則勢不可遏卿計若何建及於部選士二百挺槍大譟禦汴軍却之於橋下二月王師攻魏魏人夜出犯我營建及設伏待之扼其歸路盡殪之劉鄩之營莘縣月餘不出忽一旦縱兵攻鎮定之營軍中騰亂建及率銀槍徑兵千人赴之擊敗汴軍追奔至其壘元城之戰建及首陷其陳授天雄軍教練使八月遷遼州刺史十四年從擊契丹於幽州破之十二月從攻楊劉自寅至午汴軍嬰城拒守建及自負葭葦堙塹率先登梯遂拔之胡柳之役前軍逗撓際晚汴軍登土山建及一戰奪之莊宗欲收軍詰朝合戰建及橫矟當前曰賊大將已亡乘此易擊王但登山觀臣破賊即引銀槍效節軍大呼奮擊三軍增氣由是王師復振以功授檢校司空魏博內外衙都將十六年汴將賀瓌攻德勝南城以戰船十餘艘竹笮維之扼斷津路王師不得渡城中矢石將盡守城將氏延賞危急氏延賞原本作士延賞今從通鑑改正影庫本粘籤莊宗令積帛軍門召能破賊船者津人有馬破龍者能水游乃令往見延賞延賞言危窘極矣所爭晷刻時棹船滿河流矢雨集建及被重鎧執矟呼曰豈有一衣帶水縱賊如此乃以二船實甲士皆短兵持斧徑抵梁之戰艦斧其笮又令上流具瓮積薪其上順流縱火以攻其艦案通鑑作木罌載薪沃油然火于上流縱之與薛史異歐陽史作以大甕積薪自上流縱火與薛史同舊五代史考異須臾烟焰騰熾梁軍斷纜而遁建及乃入南城賀瓌解圍而去其年十二月與汴將王瓚戰於戚城建及傷手莊宗解御衣金帶賜之建及有膽氣慷慨不羣臨陳鞠旅意氣橫壯自莊宗至魏州建及都總內外衙銀槍效節帳前親軍效節原本作郊節考通鑑注云效節都係唐時軍名今改正影庫本粘籤善於撫御所得賞賜皆分給部下絶甘分少頗洽軍情又纍立戰功雄勇冠絶雌劣者忌讒之時宦官韋令圖監建及軍每於莊宗前言建及以家財驟施其趣向志意不小不可令典衙兵莊宗因猜之建及性既忠藎雖知讒搆不改其操不改原本作不敢今據文改正影庫本粘籤十七年三月授代州刺史八月與李存審赴河中解同州之圍建及少遇禍亂久從戰陳矢石所中肌無完膚復有功見疑私心憤鬱是歲卒於太原時年五十七永樂大典卷一萬八千二十九石君立趙州昭慶人也亦謂之石家財初事代州刺史李克柔後隸李嗣昭為牙校歷典諸軍夾城之役君立每出挑戰壞汴軍柵壘俘擒而還八年與汴軍戰於龍化園敗之獲其大將卜渥以獻卜渥原本作卞渥今據冊府元龜改正影庫本粘籤嗣昭每出征俾君立為前鋒敵人畏之王檀之逼晉陽也城中無備安金全驅市人以登陴保聚不完時莊宗在魏博救應不暇人心危懼嗣昭遣君立率五百騎自上黨朝發暮至王檀游軍扼汾橋君立一戰敗之徑至城下馳突斬擊出入如神大呼曰昭義侍中大軍至矣昭義原本作紹義考薛史前後多稱李嗣昭為昭義侍中今改正影庫本粘籤是夜入城與安金全等分出諸門擊殺於外遲明梁軍敗走十七年將兵屯德勝時汴軍自滑州轉餉以給楊村寨莊宗親率騎軍於河外循岸而上邀擊之汴人拒楊村五十里於河曲潘張村築壘以貯軍儲莊宗令諸軍攻之汴人設伏於要路逆戰僞敗王師乘之入壘門梁伏兵起因與血戰君立與鎮州大將王釗隔入賊壘時諸將部校陷賊者十餘人君立被執送於汴梁主素知其驍勇欲用之為將械而下獄久之梁主遣人誘之君立曰敗軍之將難與議勇如欲將我我雖真誠效命能信我乎人皆有君吾何忍反為仇人哉既而諸將被戮尚惜君立不之害同光元年莊宗至汴前一日梁主始令殺之永樂大典卷一萬八千二十九高行圭燕人也家世勇悍與弟行周俱有武藝初仕燕為騎將驍果出諸將之右燕帥劉守光僭逆不道莊宗令周德威征之守光大懼以行圭為武州刺史令張掎角之勢時明宗將兵助德威平燕俄聞行圭至率騎以禦之明宗諭以逆順之理行圭乃降通鑑考異云據唐實録高行圭降在劉守光既平之後與薛史異今附識于此影庫本粘籤守光將元行欽在山北聞行圭有變即率部下軍衆以攻行圭行圭遣弟行周告急於周德威案歐陽史行圭夜縋行周馳入晉見莊宗莊宗因遣明宗救武州比至行欽已解去行圭乃降是行圭先求救于晉而後降也薛史作降晉後告急微有異同舊五代史考異德威命明宗李嗣本安金全將兵援之明宗破行欽於廣邊軍行欽亦降尋以行圭為朔州刺史歷欣嵐二郡遷雲州留後天成初授鄧州節度使尋移鎮安州行圭性貪鄙短於為政在安州日行事多不法副使范延策者幽州人也性剛直纍為賓職及佐行圭覩其貪猥因強諫之行圭不從後延策因入奏獻封章於闕下事有三條一請不禁過淮猪羊而禁絲綿匹帛以實中國一請於山林要害置軍鎮以絶寇盜一述藩侯之弊請敕從事明諫諍之不從令諸軍校列班廷諍行圭聞之深銜之後因戍兵作亂誣奏延策與之同謀父子俱戮於汴聞者寃之未幾行圭以疾卒詔贈太尉永樂大典卷一萬八千二十九張廷裕代北人也幼事武皇於雲中從平黃巢討王行瑜自行間漸升為小將莊宗定魏補天雄軍左廂馬步都虞候歷蔚慈隰三州刺史同光三年除新州節度使塞上多事廷裕無控制之術邊鄙常聳天成三年卒於治所詔贈太保永樂大典卷五千三百六十王思同幽州人也父敬柔歷瀛平儒檀營五州刺史思同母即劉仁恭之女也故思同初事仁恭為帳下軍校案歐陽史作銀胡指揮使舊五代史考異會劉守光攻仁恭於大安山思同以部下兵歸太原時年十六武皇命為飛騰指揮使案歐陽史作飛勝指揮使舊五代史考異飛騰指揮使疑有舛誤考冊府元龜亦作飛騰今無可復考姑仍其舊影庫本粘籤從莊宗平定山東纍典諸軍思同性疏俊粗有文性喜為詩什與人唱和自稱薊門戰客魏王繼岌待之若子時內養呂知柔侍興聖宮頗用事思同不平之呂為終南山詩末句有頭字思同和曰料伊直擬衝霄漢賴有青天壓著頭其所為詩句皆此類也每從征必在興聖帳下然同光朝位止鄭州刺史案歐陽史作以功遷神武十軍都指揮使纍遷鄭州防禦使舊五代史考異明宗在軍時素知之即位後用為同州節度使未幾移鎮隴右思同好文士無賢不肖必館接賄遺歲費數十萬在秦州纍年邊民懷惠華戎寧息長興元年入朝見於中興殿明宗問秦州邊事對曰秦州與吐蕃接境蕃部多違法度臣設法招懷沿邊置寨四十餘所控其要害每蕃人互市互市原本作五市今據冊府元龜改正影庫本粘籤飲食之界上令納器械因手指畫秦州山川要害控扼處明宗曰人言思同不管事豈及此耶時兩川叛欲用之且留左右故授右武衛將軍八月授西南面行營馬步都虞候九月遷京兆尹西京留守伐蜀之役為先鋒指揮使石敬瑭入大散關思同恃勇先入劍門大軍未相繼復被董璋兵逐出之及敬瑭班師思同以曾獲劍門之功移鎮山南西道三年兩川交兵明宗慮併在一人則朝廷難制密詔思同相度形勢即乘間用軍事未行而董璋敗八月復為京兆尹兼西京留守時潞王鎮鳳翔與之鄰境及潞王不稟朝旨致書於秦涇雍梁邠諸帥言賊臣亂政屬先帝疾篤謀害秦王迎立嗣君自擅權柄以致殘害骨肉搖動藩垣懼先人基業忽焉墜地故誓心入朝以除君側事濟之後謝病歸藩然藩邸素貧兵力俱困欲希國士共濟急難乃令小伶安十十以五弦妓見思同因歡諷動又令軍校宋審溫者請使於雍若不從命即獨圖之又令推官郝昭案歐陽史作郝詡通鑑從歐陽史舊五代史考異府吏朱延乂以書檄起兵會副部署藥彥稠至方宴而妓使適至乃繫之於獄彥稠請誅審溫拘送昭赴闕時思同已遣其子入朝言事朝廷嘉之乃以思同為鳳翔行營都部署起軍營於扶風三月十四日與張虔釗會於岐下梯衝大集十五日進收東西關城城中戰備不完然死力禦扞外兵傷夷者十二三十六日復進攻其城潞王登陴泣諭於外聞者悲之張虔釗性褊詰旦西南用軍與都監皆血刃以督軍士軍士齊詬反攻虔釗虔釗躍馬避之時羽林指揮使楊思權引軍自西門先入思同未之知猶督士登城俄而嚴衛指揮使尹暉呼曰西城軍已入城受賞矣軍士可解甲棄仗之聲振動天地日午亂軍畢集涇州張從賓邠州康福河中安彥威皆遁去十七日思同與藥彥稠萇從諫俱至長安劉遂雍閉關不內乃奔潼關二十二日潞王至昭應前鋒執思同來獻王謂左右曰思同計乖於事然盡心於所奉亦可嘉也顧謂趙守鈞曰趙守鈞原本作字鈞今從通鑑改正影庫本粘籤思同爾之故人可行迓之於路達豫撫慰之意思同至潞王讓之曰賊臣傾我國家殘害骨肉非豫弟之過我起兵岐山蓋誅一二賊臣耳爾何首鼠兩端多方誤我今日之罪其可逃乎思同曰臣起自行間受先朝爵命秉旄仗鉞纍歷重藩終無顯效以答殊遇臣非不知攀龍附鳳則福多扶衰救弱則禍速但恐瞑目之後無面見先帝釁鼓膏原縲囚之常分也潞王為之改容徐謂之曰且憩歇潞王欲用之而楊思權之徒恥見其面屢啓劉延朗言思同不可留慮失士心又潞王入長安時尹暉盡得思同家財及諸妓女故尤惡思同與劉延朗亟言之屬王醉不待報殺思同並其子德勝潞王醒召思同左右報已誅之矣潞王怒延朗纍日嗟惜之及漢高祖即位詔贈侍中永樂大典卷六千六百七十一索自通字得之太原清源人也父繼昭以自通貴授國子監祭酒致仕自通少能騎射嘗於山墅射獵莊宗鎮太原時遇之於野訊其姓名即補右番廳直軍使後因從獵射中走鹿轉指揮使佐周德威攻燕軍於涿州擒燕將郭在鈞從莊宗定魏博改突騎指揮使明宗即位自隨駕左右廂馬軍都指揮授欣州刺史歲餘召還復典禁兵領韶州刺史出為大同軍節度使纍歲移鎮忠武改京兆尹西京留守楊彥溫據河中作亂自通率師討平之授河中節度使尋自鄜州入為右龍武統軍初自通既平楊彥溫楊彥溫原本作湯彥溫考通鑑歐陽史俱作楊彥溫今改正影庫本粘籤代末帝鎮河中臨事失於周旋末帝深銜之案通鑑自通至鎮承安重誨指籍軍府甲仗數上之以為從珂私造賴王德妃居中保護從珂由是得免舊五代史考異及末帝即位自通憂悸求死清泰元年七月因朝退涉洛自溺而卒子萬進周顯德中歷任方鎮永樂大典卷一萬八千一百二十九
