body:
  text: 舊五代史卷七十唐書四十六列傳第二十二元行欽本幽州劉守光之愛將守光之奪父位也令行欽攻大恩山案歐陽史作大安山考通鑑注引薛史亦作大恩舊五代史考異又令殺諸兄弟天祐九年周德威攻圍幽州守光困令行欽於山北募兵以應契丹時明宗為將攻行欽於山北與之接戰矢及明宗馬鞍既而以勢迫來降案通鑑考異引周太祖實録云燕城危甲士亡散劉守光召元行欽行欽部下諸將以守光必敗赴召無益乃請行欽為燕帥稱留後行欽無如之何據薛史行欽未嘗自稱留後實録誤也舊五代史考異明宗憐其有勇奏隸為假子後因從征討恩禮特隆常臨敵擒生必有所獲名聞軍中莊宗東定趙魏選驍健置之麾下因索行欽明宗不得已而遣之時有散指揮都頭名為散員命行欽為都部署賜姓名紹榮莊宗好戰勇于大敵或臨陳有急兵行欽必橫身解鬬翼衛之莊宗營於德勝也與汴軍戰于潘張王師不利諸軍奔亂莊宗得三四騎而旋中野為汴軍數百騎攢矟攻之事將不測行欽識其幟急馳一騎奮劍斷二矛斬一級汴軍乃解圍翼莊宗還宮莊宗因流涕言曰富貴與卿共之自是寵冠諸將官至檢校太傅欣州刺史及莊宗平梁授武寧軍節度使嘗因內宴羣臣使相預會行欽官為保傅當地褥下坐酒酣樂作莊宗生平戰陳之事因左右顧視曰紹榮安在所司奏云有敕使相預會紹榮散官殿上無位莊宗徹會不懌翌日以行欽為同平章事由是不宴百官於內殿但宴武臣而已三年行欽喪婦莊宗有所愛宮人生皇子者劉皇后心忌之會行欽入侍莊宗勞之曰紹榮喪婦復娶耶吾給爾婚財皇后指所忌宮人謂莊宗曰皇帝憐紹榮可使為婦莊宗難違所請微許之皇后即命紹榮謝之未退肩輿已出莊宗心不懌佯不豫者纍日業已遣去無如之何及貝州軍亂趙在禮入魏州莊宗方擇將皇后曰小事不勞大將促紹榮指揮可也乃以行欽為鄴都行營招撫使招撫原本作詔拊今從通鑑改正影庫本粘籤領騎二千進討洎至鄴城攻之不能下退保於澶州未幾諸道之師稍集復進軍於鄴城之南及明宗為帥領軍至鄴行欽來謁於軍中拜起之際誤呼萬歲者再明宗驚駭遏之方止既而明宗營於城西行欽營於城南三月八日夜明宗為亂軍所迫唯行欽之軍不動按甲以自固明宗密令張虔釗至行欽營戒之曰且堅壁勿動計會同殺亂軍莫錯疑誤行欽不聽將步騎萬人棄甲而退自知失策且保衛州因誣奏明宗曰鎮帥已入賊軍終不為國使明宗既劫出鄴城令人走馬上章申理其事言臣且於近郡聽進止莊宗覽奏釋然曰吾知紹榮妄矣因令白從訓與明宗子繼璟至軍前欲令見明宗行欽縶繼璟於路明宗凡奏軍機拘留不達故旬日之間音驛斷絶及莊宗出成臯知明宗在黎陽復令繼璟渡河召明宗行欽即殺之仍勸班師四月一日莊宗既崩行欽引皇后存渥得七百騎出師子門將之河中就存霸存霸原本脫存字今據通鑑增入影庫本粘籤沿路部下解散從者數騎而已四日至平陸縣界為百姓所擒縣令裴進折其足案歐陽史作虢州刺史石潭折其足舊五代史考異檻車以獻明宗即位詔削奪行欽在身官爵斬於洛陽永樂大典卷一萬八千一百八十九夏魯奇字邦傑青州人也初事宣武軍為軍校與主將不協遂歸于莊宗以為護衛指揮使從周德威攻幽州燕將有單廷圭元行欽時稱驍勇魯奇與之鬬兩不能解將士皆釋兵縱觀幽州平魯奇功居多梁將劉鄩在洹水洹水原本作桓水今從歐陽史改正影庫本粘籤莊宗深入致師鄩設伏於魏縣西南葭蘆中莊宗不滿千騎案歐陽史作莊宗以百騎覘敵通鑑作百餘騎舊五代史考異汴人伏兵萬餘案通鑑作伏兵五千舊五代史考異大譟而起圍莊宗數重魯奇與王門關烏德兒等奮命決戰自午至申俄而李存審兵至方解魯奇持槍攜劍獨衛莊宗手殺百餘人烏德兒等被擒魯奇傷痍遍體自是莊宗尤憐之歷磁州刺史中都之戰汴人大敗魯奇見王彥章識之單馬追及槍擬其頸彥章顧曰爾非余故人乎即擒之以獻莊宗壯之賞絹千匹案九國志趙庭隱傳王彥章守中都庭隱在其軍中及彥章敗庭隱為莊宗所獲將以就戮大將夏魯奇奏曰此矬也其材可用遂釋之舊五代史考異梁平授鄭州防禦使四年授河陽節度使天成初移鎮許州加同平章事魯奇性忠義尤通吏道撫民有術及移鎮許田孟州之民萬衆遮道斷臥轍五日不發父老詣闕請留明宗令中使諭之方得離州明宗討荊南魯奇為副招討使頃之移鎮遂州案九國志李仁罕傳云夏魯奇稟朝廷之命繕治甲兵將圖蜀孟知祥與董璋謀先取魯奇令仁罕攻遂州董璋之叛與孟知祥攻遂州援路斷絶兵盡食窮案九國志李肇傳蜀師圍夏魯奇于遂州唐師來援劍門不守肇領兵赴普安以拒之唐師不得進魯奇自刎而卒時年四十九帝聞其死也慟哭之厚給其家贈太師齊國公永樂大典卷一萬八千一百二十九姚洪本梁之小校也在梁時經事董璋長興初率兵千人戍閬州璋叛領衆攻閬州璋密令人誘洪洪以大義拒之及璋攻城洪悉力拒守者三日禦備既竭城陷被擒璋謂洪曰爾頃為健兒由吾奬拔至此吾書誘諭投之於側何相負耶洪大罵曰老賊爾為天子鎮帥何苦反耶爾既辜恩背主吾與爾何恩而云相負爾為李七郎奴掃馬糞得一臠殘炙感恩無盡今明天子付與茅土貴為諸侯而驅徒結黨圖為反噬爾本奴才則無恥吾忠義之士不忍為也吾可為天子死不能與人奴苟生璋怒令軍士十人持刀刲割其膚燃鑊於前自取啖食洪至死大罵不已明宗聞之泣下置洪二子於近衛給賜甚厚永樂大典卷一萬八千一百八十九李嚴幽州人本名讓坤初仕燕為刺史涉獵書傳便弓馬有口辨多遊藝以功名自許同光中為客省使奉使於蜀及與王衍相見陳使者之禮因於笏記中具述莊宗興復之功其警句云才過汶水汶水原本作濟水今從册府元龜改正影庫本粘籤縛王彥章於馬前旋及夷門斬朱友貞於樓上嚴復聲韻清亮蜀人聽之愕然時蜀偽樞密使宋光嗣召嚴曲宴因以近事訊於嚴嚴對曰吾皇前年四月即位於鄴宮當月下鄆州十月四日親統萬騎破賊中都乘勝鼓行遂誅汴孽偽梁尚有兵三十萬謀臣猛將解甲倒戈西盡甘涼東漸海外南踰閩浙北極幽陵牧伯侯王稱藩不暇家財入貢府實上供吳國本朝舊臣岐下先皇元老遣子入侍述職稱藩淮海之君卑辭厚貢湖湘荊楚杭越甌閩異貨奇珍府無虛月吾皇以德懷來以威款附順則涵之以恩澤逆則問之以干戈四海車書大同非晚光嗣曰余所未知唯岐下宋公我之姻好洞見其心反覆多端專謀跋扈大不足信也似聞契丹部族近日稍強大國可無慮乎嚴曰子言契丹之強盛孰若偽梁曰比梁差劣也嚴曰吾國視契丹如蚤蝨耳以其無害不足爬搔吾良將徑兵布天下彼不勞一郡之兵一校之衆則懸首街盡為奴虜但以天生四夷當置度外不在九州之本未欲窮兵黷武也光嗣聞辨對畏而奇之時王衍失政嚴知其可取使還具奏故平蜀之謀始於嚴郭崇韜起軍之日以嚴為三川招撫使案歐陽史作招討使舊五代史考異嚴與先鋒使康延孝將兵五千先驅閣道閣道原本作闕道今從通鑑改正影庫本粘籤或馳以詞説或威以兵鋒大軍未及所在降下延孝在漢州王衍與書曰可請李司空先來余即舉城納款衆咸以討蜀之謀始於嚴衍以甘言將誘而殺之欲不令往嚴聞之喜即馳騎入益州案歐陽史仍薛史作益州吳縝纂誤云成都唐初雖嘗有益州之名尋即改為蜀都後遂升為府自唐末歷五代不復謂之益州而古益州實不在此舊五代史考異衍見嚴於母前以母妻為託即日引蜀使歐陽彬迎謁魏王繼岌蜀平班師會明宗即位遷泗州防禦使兼客省使長興初安重誨謀欲控制兩川嚴乃求為西川兵馬都監庶效方略孟知祥覺之既至執而害之案九國志王彥銖傳李嚴之為監軍也密懷異謀知祥數其過命彥銖擒斬之嚴之左右無敢動者舊五代史考異贈太保嚴之母賢明婦人初嚴將赴蜀母曰汝前啓破蜀之謀今又入蜀將死報蜀人矣與汝永訣既而果如其言永樂大典卷一萬三百八十九李仁矩本明宗在藩鎮時客將也明宗即位録其趨走之勞擢居內職復為安重誨所庇故數年之間遷為客省使左衛大將軍天成中因奉使東川董璋張筵以召之仁矩貪於館舍與倡妓酣飲日既中而不至大為璋所詬辱自是深銜之長興初璋既跋扈於東川重誨奏以仁矩為閬州節度使俾伺璋之反狀時物議以為不可及仁矩至鎮偵璋所為曲形奏報地里遐僻朝廷莫知事實激成璋之逆節由仁矩也長興元年冬十月璋自率凶黨以攻其城案九國志趙季良傳云朝廷以夏魯奇李仁矩分鎮遂閬季良言於孟知祥曰朝廷增兵二鎮張掎角之勢將有不測之變也公處親賢之地以忠信見疑儻失先機則禍不旋踵矣知祥曰計將安出季良曰我甲兵雖衆而勢孤易動請與東川董璋合從先平遂閬則朝廷兵至我無內顧之憂矣知祥從之蓋董璋之攻閬州其謀皆由于知祥也仁矩召軍校謀守戰利害皆曰璋久圖反計以賂誘士心凶氣方盛未可與戰宜堅壁以守之儻旬浹之間大軍東至即賊必退仁矩曰蜀兵懦安能當我精甲即驅之出戰兵未交為賊所敗既而城陷仁矩被擒舉族為璋所害永樂大典卷一萬三百八十九康思立晉陽人也少善騎射事武皇為爪牙署河東親騎軍使莊宗嗣位從解圍於上黨敗梁人於柏鄉及平薊丘後戰於河上皆有功纍承制加檢校戶部尚書右突騎指揮使莊宗即位繼改軍帥賜忠勇拱衛功臣加檢校尚書右僕射天成元年授應州刺史尋移嵐州充北面諸蕃部族都監三年遷宿州團練使四年領昭武軍節度利巴集等州觀察處置等使改賜耀忠保節功臣長興初朝廷舉兵討東川董璋詔兼西面行營軍馬都指揮使二年移鎮陝州案通鑑潞王至靈寶思立謀固守陝城以俟康義誠先是捧聖五百騎戍陝為潞王前鋒至城下呼城上人曰禁軍十萬已奉新帝爾輩數人奚為徒纍一城人塗地耳于是捧聖卒爭出迎思立不能禁亦出迎舊五代史考異清泰初改授邢臺纍官至檢校太傅封會稽郡開國侯二年入為右神武統軍三年充北面行營馬軍都指揮使是歲閏十一月卒於軍年六十三思立本出陰山諸部性純厚善撫將士明宗素重之故即位之始以應州所生之地授焉其後歷三郡三鎮皆得百姓之譽末帝以其年高徵居環衛及出幸懷州以北師不利乃命思立統駕下騎軍赴團柏谷以益軍勢俄而楊光遠以大軍降於太原思立因憤激疾作而卒焉晉高祖即位追其宿舊為輟朝一日贈太子少師永樂大典卷一萬八千一百二十九案歐陽史作太子少傅舊五代史考異張敬達字志通代州人小字生鐵父審素有勇事武皇為列校歷廳直軍使同光初卒於軍敬達少以騎射著名莊宗知之召令繼父職平河南有功繼加檢校工部尚書明宗即位歷捧聖指揮使檢校尚書左僕射長興中改河東馬步軍都指揮使超授檢校司徒領欽州刺史三年加檢校太保應州節度使四年遷雲州時以契丹率族帳自黑榆林捺剌泊至沒越泊云借漢界水草敬達每聚兵塞下以遏其衝契丹竟不敢南牧邊人賴之清泰中自彭門移鎮平陽加檢校太傅從石敬瑭為北面兵馬副總管仍屯兵鴈門未幾晉高祖建義末帝詔以敬達為北面行營都招討使案歐陽史作太原四面招討使舊五代史考異仍使悉引部下兵圍太原以定州節度使楊光遠副焉尋統兵三萬營于晉安鄉末帝自六月繼有詔促令攻取敬達設長城連柵雲梯飛炮使工者運其巧思窮土木之力時督布者每有所構則暴風大雨平地水深數尺而城柵崩墮竟不能合其圍九月契丹至敬達大敗尋為所圍原本脫所圍二字今據册府元龜增入影庫本粘籤晉高祖及蕃衆自晉安寨南門外長百餘里闊五十里布以帳用毛索鈴而部伍多犬以備警急營中嘗有夜遁者出則犬吠鈴動跬步不能行焉自是敬達與麾下部曲五萬人馬萬匹無由四奔但見穹廬如岡阜相屬諸軍相顧失色始則削木篩糞以飼其馬日望朝廷救軍及漸羸死則與將士分食之馬盡食殫副將楊光遠次將安審琦知不濟勸敬達宜早降以求自安敬達曰吾受恩於明宗位歷方鎮主上授我大柄而失律如此已有愧於心也今救軍在近旦暮雪恥有期諸公何相迫耶待勢窮則請殺吾攜首以降亦未為晚光遠審琦知敬達意未決恐坐成魚肉遂斬敬達以降案契丹國志楊光遠謀害張敬達諸將高行周陰為之備敬達疏于防禦推遠行周等清晨光遠上謁見敬達左右無人遂殺之舊五代史考異末帝聞其歿也愴慟久之時戎王告其部曲及漢之降者曰為臣當如此人令部人收葬之晉高祖即位後所有田宅咸賜其妻子焉時議者以敬達嘗事數帝亟立軍功及領藩郡不聞其濫繼屯守塞垣復能撫下而臨難固執不求苟免乃近代之忠臣也晉有天下不能追懋官封賞其事迹非激忠之道也永樂大典卷六千六百五十一
