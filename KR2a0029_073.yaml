body:
  text: 舊五代史卷七十三唐書四十九列傳第二十五毛璋本滄州小校梁將戴思遠帥滄州時莊宗已定魏博思遠勢蹙棄州遁去璋據城歸莊宗案玉堂閒話云戴思遠任浮陽日有部曲毛璋為性輕悍嘗與數十卒追捕盜賊還宿于逆旅毛枕劍而寢夜分其劍忽大吼躍出鞘外從卒聞者愕然驚異毛亦神之乃持劍祝曰某若異日有此山河爾當更鳴躍否則已毛復寢未熟劍吼躍如初毛深自負其後戴離鎮毛請留戴從之未幾毛以州歸命于唐莊宗莊宗以毛為其州刺史後竟帥滄海舊五代史考異歷貝州遼州刺史璋性凶悖有膽略從征河上屢有戰功梁平授華州節度使王師討蜀以璋為行營右廂馬軍都指揮使行營原本脫行字今據莊宗本紀增入影庫本粘籤蜀平璋功居多明年蕭牆禍起繼岌自西川至渭南部下散亡其川貨妓樂為璋所掠明宗嗣位錄平蜀功授邠州節度使璋既家富於財有蜀之妓樂驕僭自大動多不法招致部下繕理兵仗朝廷移授昭義節度使璋謀欲不奉詔判官邊蔚密言規責乃僶俛承命洎至潞州狂妄不悛每擁川妓於山亭院服赭黃縱酒令為王衍在蜀之戲事聞於朝徵為金吾上將軍其年秋東川節度使董璋上言毛璋男廷贇齎父書往西川慮有陰事因追廷贇及同行人趙延祚與璋俱下御史臺獄廷贇乃璋之假姪稱有叔在蜀欲往省之亦無私書詔停任令歸私第初延祚在獄多言璋陰事璋許重賂以塞其口及免延祚徵其賂璋拒而不與以至延祚詣臺訴璋翻覆復下御史臺訊鞫中丞呂夢奇以璋前蒙昭雪今延祚以責賂之故復加織羅故稍佑璋及款狀上聞或云夢奇受璋賂所以獄不盡情執之移於軍巡璋具狀曾許延祚賂未與又云曾借馬與夢奇別無行賂之事朝廷懲其宿惡長流儒州賜死於路永樂大典卷一萬八千一百三十聶嶼聶嶼傳永樂大典僅存一條今錄冊府元龜以補其闕影庫本粘籤鄴中人少為僧漸學吟詠鄭王玉之再主禮闈也鄭王玉之再主禮闈也刻本作知貢舉劉本嶼與鄉人趙都俱赴鄉薦都納賄於王玉人報翌日登第嶼聞不捷詬來人以嚇之王玉懼俾俱成名永樂大典卷二萬一千一百六十一漸為拾遺依郭崇韜為鎮州書記明宗時為起居舍人雙眸若懸性氣乖僻人多忌之天成初除鄴都留守判官與趙敬怡呂夢奇不足又改河東節度及至常鄙其土風薄其人士或達于重誨會敬怡入為樞密使與夢奇同搆殺之嶼早依郭崇韜門庭致身朱紫名登兩史浙江使迴生涯巨萬嶼為河東節判時郭氏次子之婦孀居于家嶼喪偶未久復忍而納幣人皆罪之明宗在藩邸時素聞其醜聲天成中與溫韜等同詔賜死冊府元龜卷九百四十三溫韜華原人少為盜據華原事李茂貞名彥韜後降于梁更名昭圖為耀州節度唐諸陵在境者悉發之取所藏金寶而昭陵最固悉藏前世圖書鍾王紙墨筆迹如新案以下有闕文殿本永樂大典卷一萬一千五百七十六移許州節度使累遷至檢校太尉平章事韜素善趙巖每依附之莊宗入汴巖恃韜與己素厚遂奔許州韜延之于第斬首傳送闕下冊府元龜卷九百四十三同光初韜來朝郭崇韜曰此劫陵賊罪不可赦韜納賂劉后賜姓名紹冲遽遣還鎮永樂大典卷一萬一千五百七十六明宗即位流于德州俄賜死長子延濬清泰中為泥水關使次延沼為父牙帳都校次延袤鄧州指揮使咸聚居許下晉天福初聞張從賓作亂于河陽咸往依之從賓慮其難制悉斬于帳下冊府元龜卷九百四十二案溫韜傳永樂大典闕全篇今采冊府元龜增補段凝開封人也本名明遠少穎悟多智數初為澠池簿脫荷衣以事梁祖梁祖漸器之開平三年十月自東頭供奉官授右威衞大將軍威衞原本作威軍今據五代會要改正影庫本粘籤充左軍巡使兼水北巡檢使凝妹為梁祖美人故稍委心腹四年五月授懷州刺史乾化元年十二月梁祖北征迴過郡凝貢獻加等梁祖大悅梁祖復北凝迎奉進貢有加於前梁祖次相州刺史李思安迎奉疏怠梁祖怒貶思安制云懷州刺史段明遠少年治郡庶事惟公兩度祗奉行鑾數程宿食本界動無遺闕舉必周豐蓋能罄竭於家財務在顯酬夫明奬觀明遠之忠勤若此見思安之悖慢何如悖慢何如原本作悖曼如何今從通鑑改正影庫本粘籤其見賞如此其後遷鄭州刺史監大軍於河上案歐陽史遷凝鄭州刺史使監兵于河上李振亟請罷之太祖曰凝未有罪振曰待其有罪則社稷亡矣然終不罷也據此則凝監河上軍為梁祖時事通鑑考異云晉人取魏博然後與梁以河為境故常以大兵守之太祖時未也就使當時屯兵河上亦未繫社稷之安危此必均王時事也舊五代史考異梁末帝以戴思遠為北面招討使行師不利用王彥章代之受任之翌日取德勝之南城軍聲大振張漢倫等推功於凝凝掎摭彥章之失以間之案通鑑彥章棄鄒家口復趨楊劉遊奕將李紹興敗梁遊兵于清邱縣南段凝以為唐兵已自上流渡驚駭失色面數彥章尤其深入舊五代史考異梁末帝怒罷彥章兵權凝納賂於趙張二族求為招討使敬翔李振極言不可竟不能止凝以衆五萬營於高陵津裨將康延孝叛歸莊宗延孝具陳梁軍虛實莊宗遂決長驅之計未幾莊宗入汴凝自滑率兵而南前鋒杜晏球至封丘解甲聽命翌日凝率大軍乞降於汴郊莊宗釋之復以凝為滑州兵馬留後賜姓名紹欽有頃正授節度改兗州節度使凝初見莊宗因伶人景進通貨於宮掖凝天性姦佞巧言飾智善候人意其年契丹寇幽州命宣徽使李紹宏監護諸軍以禦契丹凝與董璋戍瓦橋關凝巧事紹宏紹宏嘗乘間奏凝蓋世奇才可以大任屢請以兵柄委之郭崇韜曰段凝亡國敗軍之將姦諂難狀不可信也凝在藩鎮私用庫物數萬計有司促償中旨貰其負同光三年四月移授鄧州節度使四年二月趙在禮據鄴城李紹宏請用凝為大將莊宗許之令具方略條奏凝所請偏裨皆取其己黨莊宗疑之乃止明宗至洛陽霍彥威怒其前事與溫韜同收下獄詔釋之放歸田里明年竄於遼州竟與溫韜同制賜死永樂大典卷一萬八千一百三十孔謙案通鑑作魏州人舊五代史考異莊宗同光初為租庸副使謙本州之幹吏上自天祐十二年帝平定魏博會計皆委制置謙能曲事權要效其才力帝委以泉貨之務設法箕斂七八年間軍儲獲濟及帝即位于鄴城謙已當為租庸使物議以謙雖有經營濟贍之勞然人地尚卑不欲驟總重任樞密使郭崇韜舉魏博觀察判官張憲為租庸使判官下原本有闕文考歐陽史係判官張憲今增入影庫本粘籤以謙為副謙悒然不樂者久之帝既平梁汴謙徑自魏州馳之行在因謂崇韜曰魏都重地須大臣彈壓以謙籌之非張憲不可崇韜以為忠告即奏憲為鄴都副留守乃命宰臣豆盧革專判租庸謙彌失望乃尋革過失時革以手書便省庫錢數十萬謙以手書示崇韜微諷聞於革革懼上表請崇韜專其事崇韜亦辭避帝問當委何人為可崇韜曰孔謙雖久掌貨泉然物議未當居大任以臣所見却委張憲為便帝促徵之憲性精辨為趨時者所忌人不祐之謙乘間訴于豆盧革曰租庸錢穀悉在眼前委一小吏可辦鄴都本根之地不可輕付于人興唐尹王正言無裨益之才徒有獨行詔書既徵張憲復以何人為代豆盧革言于崇韜崇韜曰鄴都分司列職皆主上舊人委王正言何慮不辦革曰俱是失也設不獲已以正言掌租庸取書于大臣或可辦矣若付之方面必敗人事謙以正言非德非勳懦而易制曰此議為便然非己志尋掎正言之失泣訴于崇韜厚賂閹伶以求進用人知奸諂沮之乃上章請退帝怒其規避將置于法樂人景進于帝前解喻而止王正言風病恍惚不能綜三司事景進屢言于帝乃以正言守禮部尚書以謙為租庸使冊府元龜卷九百二十四謙以國用不足奏諸道判官員數過多請只置節度觀察判官書記支使推官各一員留守置判官各一員三京府置判官推官餘並罷俸錢又奏百官俸錢雖多折支非實請減半數皆支實錢並從之未幾半年俸復從虛折永樂大典卷四千六百七十九案孔謙傳永樂大典僅存一條今錄冊府元龜以存梗概案以下原闕北夢瑣言云明宗即位誅租庸使孔謙等孔謙者魏州孔目莊宗圖霸以供饋兵食謙有力焉既為租庸使曲事嬖倖奪宰相權專以聚斂為意剝削為端以犯衆怒伏誅舊五代史考異李鄴魏州人也幼事楊師厚及莊宗入魏漸轉裨將歷數郡刺史後遷亳州為政貪穢有奴為人持金以賂鄴奴隱其金鄴殺之其家上訴因訐其陰事詔貶郴州司戶參軍又貶崖州長流百姓所在賜自盡永樂大典卷一萬三百八十九史臣曰易云積不善之家必有餘殃又曰惡不積不足以滅身如毛璋之儔可謂積惡而滅其身矣況溫韜之發陵寢段凝之敗國家罪不容誅死猶差晚餘皆瑣瑣何足議焉永樂大典卷一萬三百八十九
