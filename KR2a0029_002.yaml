body:
  text: 舊五代史卷二梁書二太祖紀第二光化元年正月帝遣葛從周統諸將略地於山東遂次于邢洺三月昭宗以帝兼領天平軍節度使餘如故案舊唐書光化元年正月朱全忠遣判官韋震奏事求兼領鄆州薛史作三月事蓋奏事在正月制下在三月也歐陽史及通鑑俱從薛史四月滄州節度使盧廷彥為燕軍所攻棄城奔於魏魏人送於汴是月帝以大軍至巨鹿屯於城下敗晉軍萬餘衆於青山口俘馬千餘匹丁卯遣從周分兵攻洺州斬刺史邢善益擒將五十餘人五月己巳邢州刺史馬師素棄城遁去辛未磁州刺史袁奉滔自剄而死磁州原本作惠州今從新唐書及通鑑改正影庫本粘籤五日之內連下三州案通鑑朱全忠陷洺州在四月陷邢州磁州在五月俱以薛史為據新舊唐書總繫於五月歐陽史總繫於四月皆非實録因以葛從周兼邢州昭義軍節度使留後帝遂班師是時襄州節度使趙匡凝案趙匡凝原本避宋諱作趙凝今從新舊唐書及歐陽史增匡字後倣此聞帝軍有清口之敗密附於淮夷七月帝遣氏叔琮率師伐之未幾其泌州刺史趙璠越墉來降隨州刺史趙琳臨陳就擒案新唐書七月丙申朱全忠陷唐州又陷隨州執刺史趙匡璘八月戊午陷鄧州執刺史國湘通鑑從新唐書與薛史詳略不同舊唐書俱作七月歐陽史以唐州為泌州尚仍薛史之舊二年正月淮南楊行密舉全吳之衆精甲五萬以伐徐州帝領大軍禦之行密聞帝親征乃收軍而退時幽州節度使劉仁恭大舉蕃漢兵號十萬以伐魏遂攻陷貝州州民萬餘戶無少長悉屠之進攻魏州魏人來乞師帝遣朱友倫張存敬李思安等先屯於內黃案舊唐書及通鑑俱以屯內黃為三月事與薛史異帝遂親征三月與燕軍戰於內黃北燕軍大敗殺二萬餘衆奪馬二千餘匹擒都將單無敵已下七十餘人案通鑑單可及幽州驍將號單無敵舊唐書作生擒單可及薛史梁紀作單無敵蓋仍當時軍檄之文也是月葛從周自山東領其部衆馳以救魏翼日乘勝諸將張存敬以下連破八寨遂逐燕軍北至於臨清擁其殘寇於御河溺死者甚衆仁恭奔於滄州六月帝表丁會為潞州節度使以李罕之疾亟故也又遣葛從周由固鎮路入於潞州以援丁會案自六月帝表丁會至此又見通鑑考異七月壬辰朔海州陳漢賓擁所部三千奔於淮南戊戌晉人陷澤州帝遣召葛從周於潞留賀德倫以守之未幾德倫為晉人所逼遂棄潞而歸繇是潞州復為晉人所有案新唐書八月李克用陷澤潞懷三州與薛史異通鑑從新唐書作八月歐陽史從薛史作七月十一月陝州都將朱簡殺留後李璠自稱留後送發於帝三年四月遣葛從周以兗鄆滑魏之師伐滄州五月庚寅攻德州拔之梟刺史傅公和於城上己亥進攻浮陽六月燕帥劉仁恭大舉來援從周與諸將逆戰於乾寧軍老餢隄大破之殺萬餘衆俘其將佐馬慎交已下百餘人既而以連雨遂班師八月河東遣李進通襲陷洺州執刺史朱紹宗帝遣葛從周自鄴縣渡漳水屯于黃龍鎮親領中軍涉洺而寨晉人懼而宵遁洺州復平案收復洺州通鑑作九月舊唐書及歐陽史俱作八月九月帝以仁恭進通之入寇也皆繇鎮定為其囊橐即以葛從周為上將以伐鎮州遂攻下臨城渡滹沱以環其城帝領親軍繼至鎮帥王鎔懼納質請盟仍獻文繒二十萬以犒戎士帝許之十月晉人以帝宿兵於趙遂南下大行急攻河陽留後侯言與都將閻寶力戰固守僅而獲全十一月以張存敬為上將自甘陵發軍北侵幽薊連拔瀛莫二郡案新唐書昭宗紀九月甲寅朱全忠陷瀛州十月丙寅陷景州辛酉陷莫州辛巳陷祁州通鑑與新唐書同舊唐書俱作九月事薛史又俱作十一月事前後互異遂移軍以攻中山定帥王郜以精甲二萬戰於懷德亭盡殪之郜懼奔於太原遲明大軍集於城下郜季父處直持印鑰乞降亦以繒帛三十萬為獻帝即以處直代郜領其鎮焉是月燕人劉守光赴援中山寨於易水之上繼為康懷英張存敬等所敗斬獲甚衆繇是河朔知懼皆弭伏焉是歲唐左軍中尉劉季述幽昭宗於東宮內立皇子德王裕為帝仍遣其養子希度來言願以唐之神器輸於帝帝時方在河朔聞之遽還於汴大計未決案通鑑考異引唐補紀謂全忠初與季述通謀後乃改計今考新舊唐書皆不載此事薛史亦不取會李振自長安使回因言於帝曰夫豎刁伊戾之亂所以資霸者之事也今閹豎幽辱天子王不能討無以令諸侯帝悟因請振復使於長安與時宰潛謀反正案自季述幽昭宗至此亦見通鑑考異惟字句稍有刪節天復元年正月乙酉朔案天復元年正月當從舊唐書作甲申朔考光化三年十二月為乙卯朔天復元年二月為甲寅朔舊唐書作癸未夜孫德昭等以兵攻劉季述王仲先通鑑作德昭等謀以除夜伏兵俟之以癸未為除夜則正朔斷為甲申也通鑑從薛史作乙酉朔疑誤唐宰相崔胤潛使人以帝密旨告於侍衛軍將孫德昭已下令誅左右中尉劉季述王仲先等即時迎昭宗於東內御樓反正癸巳降制進封帝為梁王酬反正之功也案舊唐書二月制以全忠檢校太師守中書令進封梁王新唐書二月辛未封全忠為梁王與薛史月日先後不同詳見通鑑考異昭宗之廢也汴之邸吏程巖牽昭宗衣下殿帝聞之召巖至汴折其足送於長安杖殺之是時河中節度使王珂結援於太原帝怒遣大將張存敬率將涉河繇含山路鼓行而進戊申攻下絳州壬子晉州刺史張漢瑜舉郡來降帝即以大將侯言權領晉州何絪權領絳州晉絳平己未大軍至河中存敬命繚其垣而攻之壬戌蒲人揚素幡以請降庚午帝至河中以張存敬權領河中軍府事河中平帝乃東還是月李克用遣牙將張特來聘請尋舊好帝亦遣使報命三月癸未朔帝歸自河中是月遣大將賀德倫氏叔琮領大軍以伐太原氏叔琮原本作氏叔琮今據列傳改正影庫本粘籤叔琮等自太行路入魏博都將張文恭自磁州新口入葛從周以兗鄆之衆自土門路入洺州刺史張歸厚以本軍自馬嶺入定州刺史王處直以本軍自飛狐入案原本闕王處直三字今據通鑑增入晉州侯言自陰地入澤州刺史李存璋棄郡奔歸太原叔琮引軍逼潞州節度使孟遷乞降河東屯將李審建王周領步軍一萬騎二千詣叔琮歸命乃進軍趨太原四月乙卯大軍出石會關營於洞渦驛都將白奉國自井陘入收承天軍張歸厚引兵至遼州刺史張鄂迎降氏叔琮即日與諸軍至晉陽城下城中雖時出精騎來戰然危蹙已甚將謀遁矣會叔琮以芻糧不給遂班師案舊唐書四月癸丑朔汴軍大舉攻太原據薛史則汴人伐太原自在三月也新唐書云三月辛亥昭義軍節度使孟遷叛附於朱全忠四月壬子全忠陷沁澤二州丁巳儀州刺史張鄂叛附於全忠大略與薛史同惟旋師之期薛史梁紀作四月唐紀作五月微有互異歐陽史作三月旋師誤五月癸卯昭宗以帝兼領護國軍節度使河中尹六月庚申帝發自大梁册府元龜卷一百八十七丁卯視事於河中以素服出郊拜故節度使王重榮墓尋辟其子瓚為節度判官請故相張濬為重榮撰碑帝自中和初歸唐首依重榮至是思其舊德故恩禮若是永樂大典卷二千七百九十五七月甲寅帝東還梁邸十月戊戌奉密詔赴長安是時朝廷既誅劉季述以韓全誨張弘彥為兩軍中尉袁易簡周敬容為樞密使是時軍國大政專委宰相崔胤每事裁抑宦官宦官側目胤一日於便殿奏欲盡去之全誨等屬垣聞之嘗於昭宗前祈哀自訴自是昭宗敕胤每有密奏令進囊封全誨等乃訪京城美婦人十數以進使求宮中陰事昭宗不悟胤謀漸泄中官視胤眥裂以重賂甘言誘藩臣以為城社時因宴聚則相向流涕時胤掌三司貨泉全誨等教禁兵伺胤出聚而呼譟訴以冬衣減損又於昭宗前訴之昭宗不得已罷胤知政事案舊唐書十一月壬子出幸鳳翔甲戌崔胤責授朝散大夫守工部尚書新唐書亦作十一月甲戌崔胤罷是未幸鳳翔以前崔胤未罷知政事也與薛史異胤怒急召帝請以兵入輔故有是行戊申行次河中同州留後司馬鄴華之幕吏也舉郡來降辛亥駐軍於渭濱華帥韓建遣使奉箋納發華帥原本作華師今據文改正影庫本粘籤又以銀三萬兩助軍是日行次零口癸丑聞長安亂昭宗為閹官韓全誨等遷西幸鳳翔蓋避帝之兵鋒也翼日遂命旋師夕次于赤水乙卯大軍集于華州城下韓建惶駭失措即以城降丙辰帝表建權知忠武軍事促令赴任案自丙辰至促令赴任又見通鑑考異與册府元龜同同華二州平是時唐太子太師盧知猷等二百六十三人列狀請帝速請迎奉己未遂帥諸軍發自赤水壬戌次于咸陽偵者云天子昨暮至岐山旦日宋文通扈蹕入其闉矣是時岐人遣大將符道昭領兵萬人屯於武功以拒帝帝遣康懷英敗之虜甲士六千餘衆乙丑次于岐山文通遣使奉書自陳其失文通原本作文帝今據文改正影庫本粘籤請帝入覲丙辰及岐闉文通渝約閉壁不獲通復次于岐山是時昭宗纍遣使齎朱書御札賜帝遣帝收軍還本道帝診之曰此必文通全誨之謀也皆不奉詔癸酉飛章奉辭且移軍北伐乙亥至邠州節度使李繼徽舉城降繼徽因請去文通所賜李姓復本宗楊氏又請納其孥以為質帝皆從之仍易其名曰崇本邠州平己丑唐丞相崔胤京兆尹鄭元規至華州以速迎奉為請許之案舊唐書十二月己卯崔胤至三原寨與全忠謀攻鳳翔通鑑作癸未至三原薛史又作己丑與舊唐書異二年正月帝復次于武功岐人堅壁不下乃回軍於河中二月聞晉軍大舉南下聲言來援鳳翔帝遣朱友寧帥師會晉州刺史氏叔琮以禦之帝以大軍繼其後三月友寧叔琮與晉軍戰於晉州之北大敗之生擒克用男廷鸞帝喜謂左右曰此岐人之所恃也今既如此岐之變不久矣四月岐人遣符道昭領大軍屯於虢縣康懷英帥驍騎敗之康懷英原本脫英字今據文增入影庫本粘籤丁酉唐丞相崔胤自華來謁帝屢述艱運危急事不可緩又慮羣閹擁昭宗幸蜀且告帝帝為動容胤將辭啓宴於府署帝舉酒胤情激於衷因自持樂板聲曲以侑酒帝甚悅座中以良馬珍玩之物賚既行命諸將繕戎具五月丁巳帝復西征六月丁丑次于虢縣癸未與岐軍大戰自辰至午殺萬餘衆擒其將校數百人乘勝遂逼其壘案舊唐書五月岐軍出戰大敗於武功南之漠谷新唐書五月丙申李茂貞及朱全忠戰於武功敗績與薛史異七月丙午岐軍復出求戰帝軍不利是月遣孔勍帥師取鳳隴成三州皆下之是時岐人相率結寨於諸山以避帝軍帝分兵以討浹旬之內並平之册府元龜卷一百八十七九月甲戌帝以岐軍諸寨連結稍盛因親統千騎登高診之時秋空澄霽煙靄四絶忽有紫雲如繖蓋凝於龍旌之上久之方散觀者咸訝之永樂大典卷三千二百八是時帝以岐人堅壁不戰且慮師老思欲旋旆以歸河中因密召上將數人語其事時親從指揮使高季昌獨前出抗言曰天下雄傑窺此舉者一歲矣今岐人已困願少俟之帝嘉其言因曰兵法貴以正理以奇勝者詐也乘機集事必由是乎乃命季昌密募人入岐以紿之尋有騎士馬景堅願應命且曰是行也必無生理願録其孥願録其孥原本作願戮其孥今參考通鑑及北夢瑣言據文改正影庫本粘籤帝悽然止其行景固請乃許之明日軍出案北夢瑣言時因朱友倫總騎軍且至將大出兵迓之諸寨屏匿如無人景因躍馬西走直叩岐闉詐以軍怨東遁為告且言列寨尚留萬餘人俟夕將遁矣宜速掩之李茂貞信其言案李茂貞即宋文通此紀前後互異蓋仍當時軍檄之文未及改從畫一舊五代史考異遽啓二扉悉衆來寇時諸軍以介馬待之中軍一鼓百營俱進又分遣數騎以據其闉岐人進不能駐其趾退不能入其壘殺戮蹂踐不知其數茂貞繇是喪膽但閉壁而已十一月癸卯鄜帥李周彝統兵萬餘人屯于岐之北原與城中舉烽以相應翼日帝以周彝既離本部鄜畤必無守備因命孔勍乘虛襲下之甲寅鄜州平周彝聞之收軍而遁案舊唐書十二月癸酉汴將孔勍乘虛襲下鄜州獲周彝妻子周彝即以兵士來降新唐書十二月己亥朱全忠陷鄜州保大軍節度李茂勳叛附於全忠考茂勳即周彝也薛史統作十一月事與新舊唐書異茂貞既失鄜州之援愕然有瓦解之懼繇是議還警蹕誅閹寺以自贖焉册府元龜卷一百八十七三年正月甲寅岐人啓壁唐昭宗降使宣問慰勞兼傳密旨尋又命翰林學士韓渥趙國夫人寵顏趙國夫人寵顏原本作龍顏考舊唐書作寵顏舊唐書又有內夫人可證蓋寵顏可證皆其名也今改正影庫本粘籤齎詔押賜帝紫金酒器御衣玉帶永樂大典卷一萬四千四百七丙辰華州留後李存審案李存審三字疑有舛誤考王師範傳作崔允在華州舊五代史考異遣飛騎來告青州節度使王師範遣牙將張厚輦甲胄弓槊詐言來獻欲盜據州城事覺已擒之矣是日師範又遣其將劉鄩盜據兗州案劉鄩陷兗州新舊唐書俱作丙午薛史作丙辰與唐書異丁巳昭宗遣中使押送軍容使韓全誨已下三十餘人首級以示帝甲子昭宗發離鳳翔幸左劍寨權駐蹕帝營帝素服待罪昭宗命學士傳宣免之帝即入見稱罪拜伏者數四册府元龜卷一百八十七既而促召升殿密邇御座且曰宗廟社稷是卿再造朕與戚屬是卿再生因解所御玉帶面以賜帝帝亦以玉鞍勒馬金銀器紋錦御饌酒果等躬自拜進焉永樂大典卷一萬五千一十六及翠華東行帝匹馬前導十餘里宣令止之己巳昭宗至長安謁太廟御長樂樓禮畢謂帝曰朕生入舊京是卿之力也自古救君之危曾無有如是者況今日再及清廟得親奉觴酒奠於先皇帝室前卿之德朕知不能報矣即召帝執手聲淚俱發者久之翼日誅宦官第五可範等五百餘人於內侍省二月庚辰制以帝為守太尉兼中書令宣武宣義天平護國等軍節度使諸道兵馬副元帥加食邑三千戶實封四百戶仍賜回天再造竭忠守正功臣戊戌帝建旆東還昭宗御延喜樓送之案喜原本訛熹今據通鑑改正舊五代史考異既醉遣內臣賜帝御製楊柳詞五首三月戊午至大梁時以青州未平命軍士休浣以俟東征四月丙子巡師於臨朐亟命逼其城與青州兵戰於城下大敗之是夕淮將王景仁以所部援軍宵遁帝遣楊師厚追及輔唐殺千人乘勝攻下密州八月戊辰以伐叛之柄委於楊師厚帝乃東還九月癸卯師厚率大軍與王師範戰于臨朐青軍大敗殺萬餘人並擒師範弟師克卯時徙寨以逼其城辛亥偏將劉重霸擒棣州刺史邵播來獻播師範之謀主也帝命斃之戊午師範舉城請降案王師範之降舊唐書作十一月丁酉朔新唐書從薛史作九月戊午青州平翼日分命將校略地於登萊淄棣等州皆下之繇是東漸至海皆為梁土也帝復命師範權知青州軍州事師範乃請以錢二十萬貫犒軍帝許之十月辛巳護駕都指揮使朱友倫因擊鞠墮馬卒於長安訃至帝大怒以為唐室大臣欲謀叛己致友倫暴死案九國志趙庭隱傳云庭隱始事梁祖子友亮因擊鞠墜馬死庭隱董璋等十數人皆追赴汴州知其無過竟釋不問考歐陽史及通鑑並作友倫而九國志以為友亮蓋傳聞之訛十一月丁酉青將劉鄩舉兗州來降案劉鄩降于全忠新唐書作十一月丁丑與薛史異舊五代史考異鄩王師範之將也師範令竊據兗州久之及聞師範降鄩乃歸命帝以鄩善事其主待之甚優尋署為元帥府都押牙權知鄜州留後天祐元年正月己酉帝發自大梁西赴河中京師聞之為之震懼是時將議迎駕東幸洛陽慮唐室大臣異議帝乃密令護駕都指揮使朱友諒矯昭宗命收宰相崔胤京兆尹鄭元規等殺之案歐陽史云遣朱友謙殺胤於京師其與友倫擊鞠者皆殺之據薛史則殺崔胤者乃友諒非友謙也歐陽史家人傳亦作友諒與梁本紀不同曾三異嘗校正其誤又邠岐兵士侵逼京畿帝因是上表堅請昭宗幸洛昭宗不得已而從之帝乃率諸道丁匠財力同搆洛陽宮不數月而成二月乙亥昭宗駐蹕於陝帝自河中來覲謁見行營因灑涕而言曰李茂貞等竊謀禍亂將迫乘輿老臣無狀請陛下東遷為社稷大計也昭宗命延於寢室見何皇后面賜酒器及衣物何后謂帝曰此後大家夫婦委身於全忠矣因欷歔泣下後數日帝開宴於陝之私第請駕臨幸翼日帝辭歸洛陽昭宗開內宴時有宮人與昭宗附耳而語韓建躡帝之足帝遽出以為圖己因連上章請車駕幸洛案十國春秋吳世家二月丁酉唐帝遣間使以絹詔告難于我及西川河東等令糾率藩鎮以圖匡復詔有云朕至洛陽則為全忠所幽閉詔敕皆出其手朕意不得復通矣舊五代史考異三月丁未昭宗制以帝兼判左右神策及六軍諸衛事是時昭宗纍遣中使及內夫人傳宣謂帝曰皇后方在草蓐未任就路欲以十月幸洛帝以陝州小藩非萬乘久留之地期以四月內東幸閏月丁酉昭宗發自陝郡壬寅次于穀水是時昭宗左右唯小黃門及打毬供奉內園小兒二百餘人帝猶忌之是日密令醫官許昭遠告變乃設饌於別幄召而盡殺之皆坑於幕下先是選二百餘人形貌大小一如內園人物之狀至是使一人擒二人縊於坑所即蒙其衣及戎具自飾昭宗初不能辨久而方察自是昭宗左右前後皆梁人矣甲辰車駕至洛都帝與宰相百官導駕入宮乙卯昭宗以帝為宣武宣義護國忠武四鎮節度使時帝請以鄆州授張全義故有此命案洛陽縉紳舊聞記梁祖之初兼四鎮也英威剛狠視之若乳虎左右少忤其旨立殺之梁之職吏每日先與家人辭訣而入歸必相賀舊五代史考異五月丙寅昭宗宴羣臣曰昨來御樓前一夜亡失赦書賴梁王收得副本不然誤事宰執不得無過矣是日宴次昭宗入內召帝於內殿曲宴帝不測其事不敢奉詔又曰卿不欲來即令敬翔入來帝密遣翔出乃止己巳奉辭東歸乙亥至大梁六月帝遣都將朱友裕率師討邠州節度使楊崇本叛故也癸丑帝西征遂朝於洛陽七月甲子昭宗宴帝於文思鞠場乙丑帝發東都壬申至河中八月壬寅昭宗遇弒於大內遺制以輝王柷為嗣乙巳帝自河中引軍而西癸丑次于永壽邠軍不出九月辛未班師十月癸巳至洛陽詣西內臨於梓宮前祗見於嗣君辛丑制以案原本有闕文帝至自西征十一月辛酉光州遣使來求援時光州歸發於帝尋為淮人所攻故來乞師戊寅帝南征渡淮次于霍丘大掠廬壽之境淮人乃棄光州而去二年正月庚申進攻壽州壽人堅壁不出丁亥帝自霍丘班師二月辛卯帝至自南征甲午青州節度使王師範至大梁帝待以賓禮尋表授河陽節度使七月辛酉天子賜帝迎鑾紀功碑樹於洛陽庚午遣大將軍楊師厚率前軍討趙匡凝於襄州辛未帝南征表趙匡凝罪狀削奪官爵案舊唐書八月丁未制削奪荊襄節度使趙匡凝在身官爵十一月削奪荊南留後趙匡明官爵蓋匡凝官爵因全忠表奏而削奪匡明官爵至奔蜀後始追奪也八月楊師厚進收唐鄧復郢隨均房等七州帝駐軍漢江北自循江干經度濟師之所九月甲子師厚於陰谷江口造梁以濟師趙匡凝率兵二萬振於江濱師厚麾兵進擊襄人大敗殺萬餘衆乙丑趙匡凝焚其州率親軍載輕舸沿漢而遁丙寅帝濟江至中流舟壞將沒者數四比及岸舟沈是日入襄城帝因周視府署其帑藏悉空惟於西廡下有一亭窗戶儼然扃鎖甚密遂令破鎖啓扉中有一大匱緘鐍甚至又令破其匱內有金銀數百錠帝因歎曰亂兵既入公私財貨固無孑遺矣此帑當有陰物主之不令常人所得俟我以有之邪遂以百餘鋌賜楊師厚襲荊州留後趙匡明棄城上峽奔蜀棄城上峽原本作並城今據文改正影庫本粘籤荊襄二州平帝以都將賀瓌權領荊州楊師厚權領襄州即表其事十月丙戌朔天子以帝為諸道兵馬元帥辛卯帝自襄州引軍由光州路趨淮南將發敬翔切諫請班師以全軍勢帝不聽壬辰次於棗陽遇大雨頗阻師行之勢軍至壽春壽春人堅壁清野以待帝帝乃還舍於正陽十一月丙辰大軍北濟案十國春秋柴再用抄其後軍斬首三千級獲輜重萬計舊五代史考異帝至汝陰深悔淮南之行躁煩尤甚案師友雜志朱全忠嘗與僚佐及遊客坐于大柳之下全忠獨言曰此樹宜為車轂衆莫應有遊客數人起應曰宜為車轂全忠勃然厲聲曰書生輩好順口玩人皆此類也車須用夾轂柳木豈可為之顧左右曰尚何待左右數十人捽言為車轂者悉撲殺之舊五代史考異丁卯帝至自南征辛巳天子命帝為相國總百揆以宣武宣義天平護國天雄武順佑國河陽義武昭義保義武昭武定泰寧平盧匡國武寧忠義荊南等二十一道為魏國案以二十一道為魏國薛史止載十九道據舊唐書尚有忠武鎮國二道薛史闕載武昭原本脫武字匡國原本作章國今俱從歐陽史增改影庫本粘籤進封帝為魏王入朝不趨劍履上殿讚拜不名兼備九錫之命癸未唐中書門下奏中書印已送相國中書公事權用中書省印甲申中書門下奏天下州縣名與相國魏王家諱同者請易之十二月乙酉朔帝讓相國魏王九錫之命丙戌京百司各差官齎本司須知孔目並印赴魏國送納甲午天子以帝堅讓九錫之命乃命宰相柳燦來使且述揖讓之意焉丁酉帝又讓九錫之命詔略曰但以鴻名難掩懿實須彰宜且徇於奏陳未便行於典册又改諸道兵馬元帥為天下兵馬元帥是時帝以唐朝百官服飾多闕乃製造逐色衣服請朝廷等第賜之其所給俸錢仍請自來年正月全支三年正月幽滄稱兵將寇於魏魏人來乞師且以牙軍驕悍謀欲誅之遣親吏臧延範密告於帝帝陰許之乙丑北征先是帝之愛女適羅氏是月卒於鄴城因以兵仗數千事實於橐中遣客將馬嗣勳領長直軍千人雜以工匠丁夫肩其橐而入於魏聲言為帝女設祭魏人信而不疑庚午夜嗣勳率其衆與羅紹威親軍數百人同攻牙軍遲明盡殺之死者七千餘人洎于嬰孺亦無留者是日帝次于內黃聞之馳騎至魏時魏之大軍方與帝軍同伐滄州聞牙軍之死即時奔還帝之軍追及歷亭殺賊幾千餘衆乃擁大將史仁遇保於高唐帝遣兵圍之是月天子詔河南尹張全義部署修制相國魏王法物三月甲寅天子命帝總判鹽鐵度支戶部等三司事帝再上章切讓之乃止四月癸未攻下高唐軍民無少長皆殺之生擒逆首史仁遇以獻帝命支解之未幾又攻下澶博貝衛等州皆為魏軍殘黨所據故也是時晉人圍邢州刺史牛存節堅壁固守帝遣符道昭帥師救之晉人乃遁去五月帝略地於洺州既而復入於魏七月己未自魏班師案通鑑考異引編遺録作七月癸未上起兵離魏都七月壬子朔無癸未編遺録誤也今考癸未乃己未傳寫之誤是日收復相州自是魏境悉平壬申帝歸自魏八月甲辰以滄州未平復命北征册府元龜卷一百八十七九月丁卯營于長蘆一夕帝夢白龍附於兩肩左右瞻顧可畏恍然驚寤永樂大典卷一萬五千二百七十月辛巳邠州楊崇本以鳳翔邠寧涇鄜秦隴之衆合五六萬來寇屯於美原列十五寨其勢甚盛帝命同州節度使劉知俊都將康懷英帥師禦之知俊等大破邠寇殺二萬餘衆奪馬三千餘匹擒其列校百餘人楊崇本胡章僅以身免案新唐書九月乙亥匡國軍節度使劉知俊陷坊州十月辛巳楊崇本戰于美原敗績與薛史互有詳略十一月庚戌懷英乘勝進軍遂收鄜州十二月乙丑帝以文武常參官每月一五九日赴朝奏請備廊餐詔從之閏月晉人燕人同攻潞帥丁會舉城降于太原帝聞之遂自長蘆班師案以上疑有闕文據舊唐書哀帝紀戊辰李克用與幽州之衆同攻潞州全忠守將丁會以澤潞降太原克用以其子嗣昭為留後甲戌全忠燒長蘆營旋軍聞潞州陷故也以寨內糗糧山積帝命焚之滄帥劉守文以城中絶食因致書於帝乞留餘糧以救飢民帝為留十餘囷以與之册府元龜卷一百八十七案容齋續筆滄州還師悉焚諸營資糧在舟中者鑿而沈之劉守文遺全忠書曰城中數萬口不食數月矣與其焚之為煙沈之為泥願乞其所餘以救之全忠為之留數囷滄人賴以濟洪氏所述與册府元龜略同惟留十餘囷與留數囷微異
