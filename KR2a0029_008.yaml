body:
  text: 舊五代史卷八梁書八末帝紀上末帝諱瑱案永樂大典原本誤作𤦹冊府元龜誤作頊今從歐陽史校正初名友貞及即位改名鍠貞明中又改今諱太祖第四子也案歐陽史作第三子五代會要與薛史同蓋並假子博王友文而數之也舊五代史考異母曰元貞皇后張氏以唐文德元年戊申歲九月十二日生於東京帝美容儀性沉厚寡言沉厚原本作沉原今據文改正影庫本粘籤雅好儒士唐光化三年授河南府參軍太祖受禪封均王時太祖初置天興軍最為親衛以帝為左天興軍使案原本脫使字今據歐陽史增入舊五代史考異開平四年夏進位檢校司空依前天興軍使充東京馬步軍都指揮使乾化二年六月三日庶人友圭弒逆矯太祖詔遣供奉官丁昭浦馳至東京密令帝害博王友文友圭即位以帝為東京留守行開封府尹檢校司徒友圭以篡逆居位羣情不附會趙巖至東京從帝私宴從帝私宴原本作從常今從通鑑改正影庫本粘籤因言及社稷事帝以誠款謀之巖曰此事易如反掌成敗在招討楊令公之手但得一言諭禁軍其事立辦巖時典禁軍洎還洛以謀告侍衛親軍袁象先帝令腹心馬慎交之魏州見師厚且言成事之日賜勞軍錢五十萬緡仍許兼鎮慎交燕人也素有膽辨乃說師厚曰乃說師厚原本衍既字今據文刪去影庫本粘籤郢王殺君害父篡居大位宮中荒淫靡所不至洛下人情已去東京物望所歸公若因而成之則有輔立之功討賊之效師厚猶豫未决謂從事曰吾於郢王君臣之分已定無故改圖人謂我何慎交曰郢王以子弒父是曰元凶均王為君為親正名仗義彼若一朝事成令公何情自處師厚驚曰幾誤計耳乃令小校王舜賢至洛密與趙巖袁象先圖議時有左右龍驤都在東京帝僞作友圭詔遣還洛下先是劉重遇部下龍驤一指揮於懷州叛經年搜捕其黨帝因遣人激怒其衆曰郢王以龍驤軍嘗叛追汝等洛下將盡坑之翌日乃以僞詔示之案通鑑考異云梁太祖實録丙戌東京言龍驤軍准詔追赴西京軍情不肯進發實友圭徵之非友貞僞作但激怒言坑之耳諸軍憂恐將校垂泣告帝乞指生路帝諭之曰先帝三十餘年經營社稷千征萬戰爾等皆曾從行今日先帝尚落人奸計爾等安所逃避因出梁祖御像以示諸將帝歔欷而泣曰郢王賊害君父違天逆地復欲屠滅親軍爾等苟能自趨洛陽擒取逆豎告謝先帝即轉禍為福矣衆踊躍曰王言是也皆呼萬歲請帝為主時友圭改元之二月十五日也帝乃遣人告趙巖袁象先傅暉案原本脫暉字今據通鑑增入舊五代史考異朱圭等十七日象先引禁軍千人突入宮城遂誅友圭事定象先遣趙巖齎傳國寶至東京請帝即位於洛陽帝報之曰夷門太祖創業之地居天下之衝北拒並汾東至淮海國家藩鎮多在厥東命將出師利於便近若都洛下非良圖也公等如堅推戴冊禮宜在東京賊平之日即謁洛陽陵廟是月帝即位於東京乃去友圭僞號稱乾化三年詔曰我國家賞功罰罪必叶朝章報德伸寃敢欺天道苟顯違于法制雖暫滯於歲時終振大綱須歸至理重念太祖皇帝嘗開霸府有事四方逮建皇朝載遷都邑每以主留重務居守難才慎擇親賢方膺寄任寄任原本作奇任今據文改正影庫本粘籤故博王友文才兼文武識達古今俾分憂於在浚之郊亦共理於興王之地一心無易二紀于茲嘗施惠於士民實有勞於家國去歲郢王友圭常懷逆節已露凶鋒將不利於君親欲竊窺於神器此際值先皇寢疾大漸日臻博王乃密上封章請嚴宮禁因以萊州刺史授於郢王友圭才覩宣頭俄行大逆豈有自縱兵於內殿却翻事於東都又矯詔書枉加刑戮仍奪博王封爵又改姓名寃恥兩深欺誑何極伏賴上玄垂祐宗社降靈俾中外以叶謀致遐邇之共怒尋平內難獲勦元凶既雪恥於同天且免譏於共國朕方期遁世敢竊臨人遽迫推崇爰膺纘嗣寃憤既伸於幽顯霈澤宜及於下泉博王宜復官爵仍令有司擇日歸葬云三月丁未制曰朕仰膺天眷近雪家讎案原本脫家字今據冊府元龜增入舊五代史考異旋聞將相之謀請紹祖宗之業羣情見迫三讓莫從祗受推崇懼不負荷方欲蒸嘗寢廟禋類郊丘合徵文體之辭用表事神之敬其或於文尚淺在理未周亦冀隨時別圖制義雖臣子行孝重更名於已孤而君父稱尊貴難知而易避今則虔遵古典詳考前聞允諧龜筮之占庶合帝王之道載惟涼德尤愧嘉名中外羣僚當體朕意宜改名鍠庚戌以天雄軍節度使充潞州行營都招討使開府儀同三司檢校太尉兼侍中弘農郡王楊師厚為檢校太師兼中書令進封鄴王壬戌以夏州節度使檢校太尉同平章事李仁福為檢校太師進封隴西郡王戊辰以邢州保義軍留後檢校太保戴思遠為檢校太傅充邢州節度使庚午以鎮東軍節度副使充兩浙西面都指揮使行睦州刺史馬綽為檢校太傅同平章事領秦州雄武軍節度使進封開國侯是月文武百官上言請以九月十二日帝降誕日為明聖節休假三日從之夏四月癸未以西京內外諸軍馬步軍都指揮使檢校司徒左龍虎統軍濮陽開國侯袁象先案原本濮陽作博陽今據象先本傳改正舊五代史考異為特進檢校太保同平章事充鎮南軍節度江南西道觀察處置等使開封尹判在京馬步諸軍事進封開國公增食邑一千戶丁酉宣義軍節度副大使知節度事鄭滑濮等州觀察使檢校太傅長沙郡開國公羅周翰加特進駙馬都尉五月乙巳天雄軍節度使楊師厚及劉守奇率魏博邢洺徐兗鄆滑之衆十萬討鎮州庚戌營於鎮之南門外壬子晉將史建瑭自趙州領騎五百入于鎮州師厚知其有備自九門移軍於下博劉守奇以一軍自貝州掠冀州衡水阜城陷下博師厚自弓高渡御河迫滄州張萬進懼案原本滄州作涼州考歐陽史劉守光傳張萬進乃滄州守將今改舊五代史考異送款師厚表請以萬進為青州節度使以劉守奇為滄州節度使詔曰太祖皇帝六月二日大忌朕聞姬周已還並用通喪之禮炎漢之後方行易月之儀歷代相沿萬幾斯重遂為故實難遽改更朕頃遘家寃近平內難臨祥制俯迫忌辰音容永遠而莫追號感彌深而難抑將欲表宅憂於中禁是宜輟聽政於外朝雖異常儀願申罔極宜輟五月二十二日至六月二十九日朝參軍機急切公事即不得留滯並仰畫時聞奏施行宰臣文武百官三上表以國忌廢務多日請依舊制詔報曰朕聞禮非天降固可酌於人情事繫孝思諒無妨於國體今以甫臨忌日暫輟視朝冀全哀感之情用表始終之節宰臣等纍陳章表備述古今慮以萬幾之繁議以五月之請雖茲懇切難盡允俞况保身方荷於洪基敢言過毀而權制獲申於至性必在得中宜自今月二十九日輟至六月七日無煩抑請深體朕懷六月戊子以滄州順化軍節度使並潞鎮定副招討使檢校太傅同平章事張萬進為青州節度使案原本順化作順俟今據通鑑注滄州為順化軍改正又青州通鑑作平盧考後文是時賀德倫為平盧節度使當從薛史作青州為是舊五代史考異秋九月甲辰以光祿大夫守御史大夫吳興郡開國侯姚洎為中書侍郎平章事十二月庚午以前鄆州節度檢校司徒食邑二千戶福王友璋為許州節度使檢校太保是月晉王收幽州執僞燕主劉守光及其父仁恭歸晉陽乾化四年春正月壬寅以青州節度使張萬進為兗州節度使檢校太尉二月甲戌以感化軍節度使華商等州觀察使檢校太傅同平章事太原郡開國公康懷英為大安尹充永平軍節度使大安金棣等州觀察處置使夏四月丁丑以守司空平章事于兢為工部侍郎尋貶萊州司馬以其挾私與軍校遷改故也是日以行營左先鋒馬軍使濮州刺史王彥章為澶州刺史充行營先鋒步軍都指揮使加光祿大夫檢校太保封開國伯以永平軍節度使檢校太傅同平章事劉鄩為開封尹遙領鎮南軍節度使五月癸丑朔方軍留後檢校司徒韓洙起復授朔方軍節度使檢校太保秋七月晉王率師自黃澤嶺東下寇邢洺案原本邢作鄜今據五代春秋七月來侵邢州改正舊五代史考異魏博節度使楊師厚軍於漳水之東晉將曹進金來奔晉軍遂退九月徐州節度使王殷反時朝廷以福王友璋鎮徐方殷不受代乃下詔削奪殷在身官爵仍令却還本姓蔣便委友璋及天平軍節度使牛存節開封尹劉鄩等進軍攻討是時蔣殷求救於淮南楊溥遣大將朱瑾率衆來援存節等逆擊敗之貞明元年春牛存節劉鄩拔徐州案牛存節等克徐州薛史本紀及蔣殷傳俱不書月五代春秋及歐陽史皆作正月通鑑作二月據通鑑考異引朱友貞傳又作乾化四年十一月疑皆屬傳聞之辭當以薛史為正逆賊蔣殷舉族自燔而死於火中得其尸梟首以獻詔福王友璋赴鎮閏二月甲午延州節度使太原西面招討應接使檢校太師兼中書令渤海郡王高萬興進封渤海王三月辛酉朔以天平軍節度副大使知節度事兼淮南西北面行營招討應接等使檢校太傅同平章事牛存節為檢校太尉加食邑一千戶賞平徐之功也丁卯以右僕射兼門下侍郎同平章事監修國史判度支趙光逢案原本逢作逯今據唐書列傳改正舊五代史考異為太子太保致仕魏博節度使楊師厚薨輟視朝三日初師厚握強兵據重鎮每邀朝廷姑息及薨輟視朝三日或者以為天意租庸使趙巖租庸判官邵贊獻議於帝曰魏博六州精兵數萬𢀿害唐室百有餘年羅紹威前恭後倨太祖每深含怒太祖尸未屬纊師厚即肆陰謀蓋以地廣兵強得肆其志不如分削使如身使臂即無不從也陛下不以此時制之寧知後人之不為楊師厚耶若分割相魏為兩鎮則朝廷無北顧之患矣案通鑑考異引莊宗列傳宰相敬翔與趙巖邵贊同議薛史無敬翔名通鑑從薛史帝曰善即以平盧軍節度使賀德倫為天雄軍節度使遣劉鄩率兵六萬屯河朔詔曰分疆裂土雖賞勳勞建節屯師亦從機便比者魏博一鎮巡屬六州為河朔之大藩實國家之巨鎮所分憂寄允謂重難將叶事機須期通濟但緣鎮定賊境最為魏博親鄰其次相衛兩州皆控澤潞山口兩道並連於晉土分頭常寇於魏封既須日有戰爭案原本脫戰爭二字今據冊府元龜增入舊五代史考異未若俱分節制免勞兵力因奔命於兩途稍泰人心俾安居於終日其相州宜建節度為昭德軍以澶衛兩州為屬郡以張筠為相州節度使己丑魏博軍亂囚節度使賀德倫是時朝廷既分魏博六州為兩鎮命劉鄩統大軍屯于南樂以討王鎔為名遣澶州刺史行營先鋒步軍都指揮使王彥章領龍驤五百騎先入於魏州屯於金波亭詔以魏州軍兵之半隸于相州並徙其家焉又遣主者檢察魏之帑廩既而德倫促諸軍上路姻族辭決哭聲盈巷其徒乃相聚而謀曰朝廷以我軍府強盛故設法殘破況我六州歷代藩府軍門父子姻族相連未嘗遠出河門離親去族一旦遷於外郡生不如死三月二十九日夜魏軍乃作亂放火大掠首攻龍驤軍王彥章斬關而遁遲明殺德倫親軍五百餘人於牙城執德倫置之樓上有效節軍校張彥者最為粗暴膽氣伏人乃率無賴輩數百止其剽掠是日魏之士庶被屠戮者不可勝紀帝聞之遣使齎詔安撫案通鑑夏四月帝遣供奉官扈異撫諭魏軍仍許張彥除郡厚賜將士優賞彥等不遜投詔於地侮罵詔使因迫德倫飛奏請却復相衛抽退劉鄩軍帝復遣諭曰制置已定不可改易如是者三彥等奮臂南向而罵曰傭保兒敢如是也復迫德倫列其事時有文吏司空頲者甚有筆才彥召見謂曰為我更草一狀詞宜抵突如更敢違則渡河虜之乃奏曰臣纍拜封章上聞天聽在軍衆無非共切何朝廷皆以為間半月三軍切切而戈矛未息一城生聚皇皇而控告無門惟希俯鑒丹衷苟從衆欲須垂聖允斷在不疑如或四向取謀但慮六州俱失言非意外事在目前張彥又以楊師厚先兼招討使請朝廷依例授之故復逼德倫奏曰臣當道兵甲素精貔貅極鋭下視並汾之敵平吞鎮定之人特乞委臣招討之權試臣湯火之節苟無顯效任賜明誅詔報曰魏博寇敵接連封疆懸遠凡於應赴須在師徒是以別建節旄各令捍禦並鎮則委魏博控制澤潞則遣相衛枝梧咸逐便安貴均勞逸已定不移之制宜從畫一之規至於征伐事權亦無定例且臨清王領鎮之日臨清王原本作臨清生考舊唐書魏博節度使羅宏信封臨清王今改正影庫本粘籤羅紹威守藩以來所領事銜本無招討祇自楊師厚先除陝滑二帥皆以招討兼權因茲帶過鄴中原本不曾落下苟循事體寧吝施行況今劉鄩指鎮定出征康懷英往邠岐進討祇令統帥師旅亦無招討使銜切宜遍諭羣情勿興浮議倚注之意卿宜體之詔至張彥壞裂抵之於地謂德倫曰梁主不達時機聽人穿鼻城中擾攘未有所依我甲兵雖多須資勢援河東晉王統兵十萬匡復唐朝世與大梁仇讎若與我同力事無不濟請相公改圖以求多福德倫不得已而從之乃遣牙將曹廷隱廷隱原本作延隱今據曹廷隱本傳改正影庫本粘籤奉書求援於太原彥使德倫告諭軍城曰可依河東稱天祐十二年此後如有人將文字於河南往來便仰所在處置是月邠州留後李保衡以城歸順案通鑑考異引蜀書劉知俊傳保衡作彥康蓋保衡為楊崇本養子故名彥康逮殺其子彥魯而降梁始復其本姓名也五代春秋歐陽史通鑑俱從薛史作保衡保衡楊崇本養子也崇本乃李茂貞養子任邠州二十餘年去歲為其子彥魯所毒彥魯領知州事五十餘日保衡殺彥魯送款於帝即以保衡為華州節度使以河陽留後霍彥威為邠州節度使五月晉王率師赴魏州節度使牛存節薨是月鳳翔李茂貞遣僞署涇州節度使劉知俊率師攻邠州以李保衡歸順故也自是凡攻圍十四月節度使霍彥威諸軍都指揮使黃貴堅守捍寇會救軍至岐人乃退六月庚寅晉王入魏州以賀德倫為大同軍節度使舉族遷於晉陽是月晉人陷德州秋七月又陷澶州刺史王彥章棄城來奔案通鑑晉人夜襲澶州刺史王彥章在劉鄩營晉人獲其妻子薛史王彥章傳亦云晉人攻陷澶州彥章舉家陷沒是澶州陷時彥章未嘗在城也是月劉鄩自洹水潛師由黃澤路西趨晉陽至樂平縣值霖雨積旬乃班師還次宗城遂至貝州軍於堂邑遇晉軍轉鬬數十里晉軍稍退翌日鄩移軍于莘八月賀瓌收復澶州九月以行營先鋒步軍都指揮使行澶州刺史檢校太保王彥章為汝州防禦使案原本汝州作許州今據通鑑改正舊五代史考異依前行營先鋒步軍都指揮使壬午正衙命使冊德妃張氏是夕妃薨冬十月辛亥康王友孜謀反案通鑑友孜作友敬與薛史異舊五代史考異伏誅是夕帝於寢殿熟寐忽聞御榻上寶劍有聲帝遽起視之而友孜之黨已入於宮中帝揮之獲免案清異録末帝夜于寢間擒刺客乃康王友孜所遣帝自戮之造雲母匣貯所用劍名匣曰護聖將軍之館舊五代史考異壬子葬德妃張氏十一月乙丑改乾化五年為貞明元年案吳越備史作正月壬辰朔改元大赦歐陽史五代春秋及通鑑俱從薛史作十一月舊五代史考異十二月乙未詔升華原縣為崇州靜勝軍以美原縣為裕州以為屬郡以僞命義勝軍節度使鼎耀等州觀察使特進檢校太保同平章事李彥韜為特進檢校太傅同平章事充靜勝軍節度使崇裕等州觀察使河內郡開國侯仍復本姓溫名昭圖昭圖華原賊帥也李茂貞以為養子以華原為耀州美原為鼎州僞命昭圖為節度使至是歸款故有是命貞明二年春正月庚申以皇伯父宋州節度使開府儀同三司檢校太師兼中書令廣王全昱為守中書令餘如故案通鑑二年春正月宣武節度使守中書令廣德靖王全昱卒舊五代史考異以浙江東道營田副使檢校太傅前常州刺史杜建徽遙領涇州節度使二月丙申右僕射門下侍郎平章事諸道鹽鐵轉運等使楊涉罷相守左僕射涉纍上章以疾辭位故有是命是月命許州節度使王檀河陽節度使謝彥章汝州防禦使王彥章率師自陰地關抵晉陽急攻其壘不克而旋三月劉鄩率師與晉王大戰於故元城鄩軍敗績先是鄩駐於莘帝以河朔危急師老於外餉饋不充遣使賜鄩詔微有責讓鄩奏以寇勢方盛未可輕動帝又問鄩決勝之策鄩奏曰但人給糧十斛盡則破敵帝不悅復遣促戰鄩召諸將會議諸將欲戰鄩默然一日引軍攻鎮定之營彼衆大駭上下騰亂俘斬甚衆時帝遣偏將楊延直領軍萬餘人屯澶州以應鄩楊延直原本作廷直今據歐陽史改正影庫本粘籤既而晉王詐言歸太原劉鄩以為信是月召楊延直會于魏城下鄩自莘率軍亦至與延直會既而晉王自貝州至鄩引軍漸退至故元城西與晉人決戰大為其所敗追襲至河上軍士赴水死者甚衆鄩自黎陽濟河奔滑州己巳制以鄩為滑州宣義軍節度副大使知節度事晉人攻衛州陷之又陷惠州夏四月乙酉朔威武軍節度使守太傅兼中書令閩王王審知賜號忠勤保安興國功臣餘如故晉人陷洺州癸卯夜捉生都將李霸作亂龍驤都將杜晏球討平之時遣捉生軍千人戍楊劉軍出宋門外是夜由水門復入二鼓大譟火發燭城李霸與其徒燔建國門不克龍驤都將杜晏球屯鞠場聞亂兵至率騎擊之亂軍退走馬登建國門晏球奏曰亂者惟李霸一軍但守宮城遲明臣必破之未明晏球誅霸及其同惡京師方定是月以行營先鋒步軍都指揮使汝州防禦使王彥章為鄭州防禦使依前先鋒步軍都指揮使五月晉軍還太原六月晉人急攻邢州帝遣捉生都將張溫率步騎五百人入于邢州張溫原本作章溫今據歐陽史及通鑑改正影庫本粘籤至內黃溫率衆降於晉人秋七月甲寅朔晉王自太原至魏州節度使張筠棄城奔京師邢州節度使閻寶以城降於晉王壬戌以淮南鎮海鎮東等軍節度使充淮南宣潤等道四面行營都統開府儀同三司尚父守尚書令吳越王錢鏐為諸道兵馬元帥餘如故以左僕射楊涉為太子太傅致仕八月丁酉以開府儀同三司太子太保致仕趙光逢為司空兼門下侍郎平章事弘文館大學士延資庫使延資庫使原本作延貨考五代會要五代承唐制多以宰相兼領延資庫使今改正影庫本粘籤充諸道鹽鐵轉運使九月晉王還太原滄州節度使戴思遠棄城來奔晉人陷貝州案歐陽史作晉人克貝州守將張源德死之又死事傳云貝人勸源德出降源德不從遂見殺通鑑考異引莊宗實録源德聞河北皆平有翻然之志謀於衆衆懼其歸罪因殺源德是源德之死傳聞異詞故薛史不取舊五代史考異歐陽史本紀二年九月晉人克貝州守將張源德死之又死事傳略云太祖時源德自金吾衛將軍為蔡州刺史貞明元年魏博節度使楊師厚卒末帝分魏相等六州為兩鎮遣劉鄩將兵萬人屯于魏魏軍叛降晉源德為鄩守貝州晉王入魏諸將欲先擊貝州晉王曰貝城小而堅攻之難卒下乃先襲破德州然以兵五千攻源德源德堅守不下晉軍塹而圍之已而劉鄩大敗于故元城南走黎陽六鎮數十州之地皆歸晉獨貝一州圍之踰年不可下源德守既堅而貝人聞晉已盡有河北城中食且盡乃勸源德出降源德不從遂見殺殿本通鑑考異引莊宗實録云賊將張源德固守貝州既聞河北皆平而有翻然之志詢謀於衆羣賊皆河南人懼其歸罪不從因殺源德噉人為糧因守其城王師歷年攻圍賊既食竭呼我大將曰今欲請罪懼晉王不我赦請襟甲持兵而見已即解之如何報曰無便於此者賊衆三千襟甲出降我將甘言喻之俱釋兵解甲既而四面陳兵殺之與歐陽史異今考歐陽史多前後互異如魏博軍亂本紀作元年傳作三年張源德死紀作二年據傳當在四年紀傳自相矛盾恐不足據薛史不載張源德事附識於此孔本己卯天平軍節度副大使知節度事檢校太師兼中書令琅琊郡王王檀薨案五代春秋作盜殺鄆州王檀舊五代史考異十月丁酉以開府儀同三司中書侍郎兼吏部尚書同平章事集賢殿大學士判戶部敬翔為右僕射兼門下侍郎平章事監修國史判度支以光祿大夫中書侍郎同平章事鄭王玉為特進兼刑部尚書平章事集賢殿大學士判戶部十月晉王自太原至魏州是月前昭義軍節度使檢校太師兼侍中陳留郡王葛從周薨是歲河北諸州悉入於晉永樂大典卷六千六百五
