body:
  text: 舊五代史卷七十五晉書一高祖紀第一高祖聖文章武明德孝皇帝姓石氏諱敬瑭太原人也本衛大夫碏漢丞相奮之後案歐陽史作其姓石氏不知其得姓之始舊五代史考異漢衰關輔亂子孫流泛西裔故有居甘州者焉四代祖璟以唐元和中與沙陀軍都督朱耶氏自靈武入附靈武原本作靈戊據新唐書沙陀傳朱耶氏自沙州入居靈武今改正影庫本粘籤憲宗嘉之隸為河東陰山府裨校以邊功纍官至朔州刺史天福二年追尊為孝安皇帝廟號靖祖陵曰義陵祖妣秦氏追諡為孝安元皇后三代祖郴早薨贈左散騎常侍追尊為孝簡皇帝廟號肅祖陵曰惠陵祖妣安氏追諡孝簡恭皇后皇祖諱翌任振武防禦使贈尚書右僕射追尊孝平皇帝廟號睿祖陵曰康陵祖妣米氏追諡孝平獻皇后皇考諱紹雍案原本作詔雍今從五代會要改正番字臬捩雞善騎射有經遠大略事後唐武皇及莊宗纍立戰功與周德威相亞歷平洺二州刺史薨於任贈太傅追尊為孝元皇帝廟號憲祖陵曰昌陵皇妣何氏追諡孝元懿皇后帝即孝元之第二子也以唐景福元年二月二十八日生於太原汾陽里時有白氣充庭人甚異焉及長性沈淡寡言笑讀兵法重李牧周亞夫行事唐明宗為代州刺史每深心器之因妻以愛女唐莊宗聞其善射擢居左右明宗請隸大軍從之後明宗從莊宗征行命帝領親騎號三討軍案歐陽史作左射軍倚以心腹天祐十二年莊宗併有河北之地開府於鄴梁遣上將劉鄩以兵五萬營於莘十三年二月鄩引兵突至清平薄於城下莊宗至自甘陵兵未陳多為鄩所掩帝領十餘騎橫槊深入東西馳突無敢當者卒全部伍而旋莊宗壯之拊其背曰將門出將言不謬爾因頒以器帛復親為啖酥當時以為異恩由是知名明年鄩兵陳於莘之西北明宗從莊宗酣戰久之塵埃四合帝與明宗俱陷陳內帝挺身躍劍反復轉鬬行數十里逐鄩於故元城之東是日鄩軍殺傷過半十五年唐軍拔楊劉鎮梁將賀瓌設伏於無石山明宗為瓌所迫帝為後殿破梁軍五百餘騎按轡而還十二月莊宗與梁軍大戰於胡柳陂衆號十萬總管周德威將左軍雜以燕人前鋒不利德威死之莊宗率步衆五千固守高陵以避敵之鋭明宗獨完右廣右廣原本作右黃據冊府元龜作右廣薛史莊宗紀亦作廣今改正影庫本粘籤伏於土山之下顧謂帝曰梁人首獲其利旌旗甚整何計可以挫之帝曰臘後寒如此出手墮指彼多步衆易進難退莫若啜糒飲水徐而困之且超乘徒行其勢不等一擊而破期在必勝明宗曰是吾心也會日暮梁軍列於平野五六萬人為一方陳麾游騎以迫唐軍帝曰敵將遁矣乃請明宗令士整胄寬而羅之命左射軍三百人鳴矢馳轉漸束其勢以數千騎合之逮夜旌旗皆靡而一角先潰三面踵之其牙竿相擊若火爆之聲橫尸積甲不可勝計由是梁人勢削莊宗進營德勝渡十八年十月又從明宗戰梁人於德勝渡敗其將戴思遠殺二萬餘人十九年戰胡盧套唐軍稍却帝睹其敵鋭拔劍闢道肩護明宗而退敵人望之無敢襲者二十年十月從明宗觀梁人之楊村寨部曲皆不擐甲俄而敵出不意以兵掩明宗刃將及背帝挾戰戟而進一擊而凶酋落馬者數輩明宗遂解其難是歲莊宗即位於鄴改元同光遣明宗越河懸軍深入以取鄆鄆人始不之覺帝以五十騎從明宗涉濟突東門而入鄆兵來拒帝中刃翼明宗羅兵通衢嶷然不動會後騎繼至遂拔中城以據之既而平汴水滅梁室成莊宗一統集明宗大勳帝與唐末帝功居最莊宗朝官未顯者以帝不好矜伐故也唯明宗心知之同光四年二月趙在禮據鄴為亂朝廷遣元行欽招之不下招之原本作詔之今據冊府元龜改正影庫本粘籤羣議紛然以為非明宗不可莊宗乃以明宗為統帥時帝從行至魏諸軍有變叩馬請明宗帝河北明宗受霍彥威勸將自訴於天子遂佯諾諸軍亦恐事不果而散者甚衆明宗所全者唯常山一軍而已西次魏縣帝密言於明宗曰猶豫者兵家大忌必若求訴宜決其行某願率三百騎先趨汴水以探虎口如遂其志請大軍速進夷門者天下之要害也據之可以自雪安有上將與三軍言變他日有平手乎危在頃刻不宜恬然明宗至相州遂分驍騎三百付之遣帝由黎陽濟河自汴西門而入因據其城及明宗入汴莊宗親統師亦至城之西北五里登高歎曰吾不濟矣由此莊宗從兵大潰來歸明宗明宗尋遣帝令率兵為前鋒趨汜水關汜水原本作泛水今從通鑑改正影庫本粘籤俄而莊宗遇內難而崩是月明宗入洛嘉帝之功自總管府都校署陝府兵馬留後明宗即位改元天成五月加帝光祿大夫檢校司徒充陝州保義軍節度使歲未期而軍民之政大治焉二年二月加檢校太傅兼六軍諸衛副使進封開國伯增食邑四百戶是月帝赴闕以倅六軍諸衛事故也八月加食邑八百戶實封一百戶旌為政之效也十月明宗幸汴以帝為御營使御營使原作御榮今從五代會要改正影庫本粘籤車駕次京水飛報汴州節度使朱守殷叛明宗命帝董親軍倍道星行信宿及浚城一戰而拔之尋以帝為宣武軍節度使侍衛親軍馬步軍都指揮使兼六軍諸衛副使進封開國公加食邑五百戶賜耀忠匡定保節功臣三年四月車駕還洛制加檢校太傅同中書門下平章事興唐尹鄴都留守天雄軍節度使五月丁未加駙馬都尉長興元年二月明宗南郊禮畢加檢校太尉增食邑五百戶尋詔歸任時鄴都繁富為天下之冠而土俗獷悍民多爭訟帝令投函府門一一覽之及踰年盈積几案滯於獄者甚衆時論以此減之九月東川董璋叛朝廷命帝為東川行營都招討使兼知東川行府事十月至自魏博董衆西征二年春以川路險艱糧運不繼詔班師四月復兼六軍諸衛副使六月改河陽節度使仍兼兵柄是時秦王從榮奏伏見北面頻奏報契丹族移帳近塞吐渾突厥已侵邊地戍兵雖多未有統帥早宜命大將一人以安雲朔明宗曰卿等商量從榮與諸大臣奏曰將校之中唯石敬瑭康義誠二人可行帝素不欲為禁軍之副即奏曰臣願北行明宗曰卿為吾行事無不濟及受詔不落六軍副使帝復遷延辭避十一月乙酉明宗復謂侍臣曰雲州奏契丹自幽州移帳言就放牧終冬不退甚患深矣樞密使范延光奏曰已議石敬瑭與康義誠北行然其定奪即在宸旨帝奏曰臣雖不才爭敢避事但進退惟命明宗曰卿為吾行甚叶衆議由是遂定丁亥加兼侍中太原尹北京留守河東節度使兼大同振武彰國威塞等軍蕃漢馬步軍總管改賜竭忠匡運寧國功臣翌日宴於中興殿帝捧觴上壽因奏曰臣雖微怯惟邊事敢不盡其忠力但臣遠違玉階無以時申補報帝因再拜告辭明宗泣下霑襟左右怪其過傷果與帝因此為訣不復相見矣十二月明宗晏駕帝聞之長慟若喪考妣應順元年正月閔帝即位加中書令及增食邑帝性簡儉未嘗以聲色滋味輒自宴樂每公退必召幕客論民間利害及刑政得失明而難犯事多親決有店婦與軍士訟云曝粟於門為馬所食而軍士懇訴無以自明帝謂鞫吏曰兩訟未分何以為斷可殺馬刳腸而視其粟有則軍士誅無則婦人死遂殺馬馬腸無粟因戮其婦人境內肅然莫敢以欺事言者三月移鎮常山移鎮原本作以鎮今據文改正影庫本粘籤所歷方鎮以孝治為急見民間父母在昆弟分索者必繩而殺之勤於吏事廷無滯訟常山屬邑曰九門有人鬻地與異居兄議價不定乃移於他人他人須兄立券兄固抑之因訴於令令以弟兄俱不義送府帝監之曰人之不義由牧長新至教化所未能及吾甚愧焉若以至理言之兄利良田弟求善價順之則是沮之則非其兄不義之甚也宜重笞焉市田以高價者取之上下服其明及岐陽兵亂岐陽原本作伎陽今從通鑑改正影庫本粘籤推潞王為天子閔帝急詔帝赴闕欲以社稷為託閔帝自洛陽出奔於衛相遇於途遂與閔帝回入衛州時閔帝左右將不利於帝帝覺之因擒其從騎百餘人閔帝知事不濟與帝長慟而別帝遣刺史王弘贄安置閔帝於公舍而去尋為潞王所害帝後長以此愧心焉清泰元年五月復授太原節度使北京留守充大同振武彰國威塞等軍蕃漢馬步總管二年夏帝屯軍於欣州朝廷遣使送夏衣傳詔撫諭後軍人遽呼萬歲者數四帝懼斬挾馬將李暉以下三十餘人以狥乃止三年五月移授鄆州節度使進封趙國公仍改扶天啓運中正功臣尋降詔促帝赴任帝心疑之乃召僚佐議曰孤再受太原之日主上面宣云與卿北門一生無議除改今忽降此命莫是以去年欣州亂兵見迫欣州原本作沂州今據通鑑改正影庫本粘籤過相猜乎又今年千春節公主入覲當辭時謂公主曰爾歸心甚急欲與石郎反耶此疑我之狀固且明矣今天子用后族委邪臣沈湎荒惑萬機停壅失刑失賞不亡何待吾自應順中少主出奔之日覩人情大去不能扶危持顛憤憤於方寸者三年矣今我無異志朝廷自啓禍機不可安然死於道路況太原險固之地積粟甚多若且寬我我當奉之必若加兵我則外告鄰方北搆強敵興亡之數皎皎在天今欲發表稱疾以俟其意諸公以為何如案玉堂閒話云晉祖在並部嘗從容謂賓佐云近因晝寢忽夢若頃年在洛京時與天子連鑣于路過舊第天子請某入其第某遜讓者數四不得已即促轡而入至廳事下馬升自阼階西向而坐天子已馳車去矣其夢如此羣僚莫敢有所答是年冬果有鼎革之事蓋晉祖懷不軌之心久矣故托夢以惑衆也舊五代史考異掌書記桑維翰都押衙劉知遠贊成密計遂拒末帝之命朝廷以帝不奉詔降旨削奪官爵即詔晉州刺史北面副招討使張敬達領兵圍帝於晉陽張敬達原本作敬遠今從歐陽史改正影庫本粘籤帝尋命桑維翰詣諸道求援契丹遣人復書諾之約以中秋赴義案遼史太宗紀云七月丙申唐河東節度使石敬瑭為其主所討遣趙瑩求救時趙德鈞亦遣使至河東復遣桑維翰來告急遂許興師八月庚午自將以援敬瑭舊五代史考異六月北面招收指揮使安重榮以部曲數千人入城七月代州屯將安元信率一軍與西北面先鋒指揮使安審信引五百騎俱至八月懷州彰德軍使張萬迪等各率千餘騎來降是月外衆攻我甚急帝親當矢石人心雖固廩食漸困九月辛丑契丹主率衆自雁門而南案遼史九月丁酉入雁門戊戌次欣州己亥次太原舊五代史考異旌騎不絶五十里餘先使人報帝云吾欲今日便破賊可乎帝使人馳告曰皇帝赴難比要成功賊勢至厚可明旦穩審議戰未為晚也使未達契丹已與南軍騎將高行周符彥卿等合戰時張敬達楊光遠列陳西山下士未及成伍而行周彥卿為伏兵所斷捨軍而退敬達等步兵大敗死者萬人是夜帝出北門與戎王相見戎王執帝手曰恨會面之晚因論父子之義案遼史敬瑭率官屬來見帝執手撫慰之契丹國志云敬瑭見契丹帝問曰皇帝遠來士馬疲倦遽與唐大戰而勝何也帝曰始我謂唐必斷雁門諸路伏兵險要不可得進使人偵視皆無之是以長驅而深入我氣方鋭乘此擊之是以勝之敬瑭歎服舊五代史考異明日帝與契丹圍敬達營寨南軍不復出矣帝與契丹本無結好自末帝見迫之後遣心腹何福以刀錯為信刀錯原本作刀錫今從冊府元龜改正影庫本粘籤一言親赴其難迅若流電信天意耶己酉唐末帝率親軍步騎三萬出次河橋辛亥末帝詔樞密使趙延壽分衆二萬為北面招討使又詔魏博節度使范延光統本軍二萬人屯遼州十月幽州節度使趙德鈞領所部萬餘人自上黨吳兒谷合延壽兵屯團谷口與敬達寨相去百里彌月竟不能相通案遼史初圍晉安分遣精兵守其要害以絶援兵之路趙延壽等皆逗留不進十一月戎王會帝於營謂帝曰我三千里赴義事須必成觀爾體貌恢廓識量深遠真國主也天命有屬時不可失欲徇蕃漢羣議冊爾為天子帝飾讓久之既而諸軍勸請相繼乃命築壇於晉陽城南案通鑑作築壇于柳林遼史亦作設壇晉陽舊五代史考異冊立為大晉皇帝戎王自解衣冠授焉案遼史太宗紀十一年冬十月甲子封敬瑭為晉王十一月丁酉冊敬瑭為大晉皇帝薛史及通鑑歐陽史俱不載先封晉王事案遼史十月甲子封敬瑭為晉王幸其府敬瑭與妻李氏率其親屬捧觴上壽考通鑑及契丹國志俱不載先封晉王孔本文曰維天顯九年歲次丙申十一月丙戌朔十二日丁酉大契丹皇帝若曰於戲元氣肇開樹之以君天命不恆人輔以德故商政衰而周道盛秦德亂而漢圖昌人事天心古今靡異咨爾子晉王神鍾睿哲天贊英雄叶夢日以儲祥應澄河而啓運逮事數帝歷試諸艱武略文經乃由天縱忠規孝節固自生知猥以眇躬奄有北土暨明宗之享國也與我先哲王保奉明契所期子孫順承患難相濟丹書未泯白日難欺顧豫纂承匪敢失墜爾惟近戚實系本枝所以余視爾若子爾待豫猶父也朕昨以獨夫從珂本非公族竊據寶圖棄義忘恩逆天暴物誅剪骨肉離間忠良聽任矯諛威虐黎獻華夷震悚內外崩離知爾無辜為彼致害敢徵衆旅來逼嚴城雖併吞之志甚堅而幽顯之情何負達於聞聽深激憤驚乃命興師為爾除患親提萬旅遠殄羣凶但赴急難罔辭艱險果見神祇助順卿士叶謀旗一麾而棄甲平山鼓三作而殭尸遍野雖以遂豫本志快彼羣心將期稅駕金河班師玉塞矧今中原無主四海未寧茫茫生民若墜塗炭況萬幾不可以暫廢大寶不可以久虛拯溺救焚當在此日爾有庇民之德格于上下爾有戡難之勳戡難原本作甚艱今從契丹國志改正影庫本粘籤光于區宇爾有無私之行通乎神明爾有不言之信彰乎兆庶豫懋乃德嘉乃丕績天之曆數在爾躬是用命爾當踐皇極仍以爾自茲並土首建義旗宜以國號曰晉朕永與為父子之邦保山河之誓於戲補百王之闕禮行茲盛典成千載之大義遂我初心爾其永保兆民勉持一德慎乃有位允執厥中亦惟無疆之休其誡之哉禮畢帝鼓吹導從而歸案通鑑考異引廢帝實録契丹立晉在閏月丁卯歐陽史及通鑑並從薛史作十一月丁酉始梁開國之歲即前唐天祐四年也潞州行營使李思安奏壺關縣庶穰鄉鄉人伐樹樹倒自分兩片內有六字如左書云天十四載石進梁祖令藏於武庫然莫詳其義至帝即位識者曰天字取四字中兩畫加之於傍則丙字也四字去中之兩畫案原本作中去之兩畫今從冊府元龜改正加十字則申字也帝即位之年乃丙申也又易云晉者進也國號大晉皆符契焉又帝即位之前一年年在乙未鄴西有柵曰李固清淇合流在其側柵有橋橋下大鼠與蛇鬬鬬及日之申蛇不勝而死行人觀者數百識者志之後唐末帝果滅於申又末帝真定常山人也有先人舊廬其側有古佛剎剎有石像忽搖動不已人皆異之及重圍晉陽帝遣心腹案原本闕帝遣心腹四字今從冊府元龜增入何福徑騎求援北蕃蕃主自將諸部赴之不以繒帛不以珠金若響應聲謂福曰吾已兆於夢皆上帝命我非我意也案契丹國志引紀異録云契丹主德光常晝寢夢一神人花冠美姿容輜軿甚盛忽自天而下衣白衣佩金帶執有異人十二隨其後內一黑兔入德光懷而失之神人語德光曰石郎使人喚汝汝須去覺告其母母忽之不以為異後復夢即前神人也衣冠儀貌儼然如故曰石郎已使人來喚汝既覺而驚復以告母母曰可命筮乃召巫筮言太祖從西樓來言中國將立天王要爾為助爾須去未浹旬唐石敬瑭反於河東為後唐張敬達所敗亟遣趙瑩持表重賂許割燕雲求兵為援契丹主曰我非為石郎興師乃奉天帝敕使也舊五代史考異時援兵未至僞將張敬達引軍逼城設柵柵將成必有大風暴雨柵無以立後築長城城就又為水潦所壞城終不能合晉陽有北宮宮城之上有祠曰毗沙門天王帝曾焚修默而禱之經數日城西北闉正受敵處軍候報稱夜來有一人長丈餘介金執殳行於城上久方不見帝心異之又牙城有僧坊曰崇福崇福原本作從福今從冊府元龜改正影庫本粘籤坊之廡下西北隅有泥神神之首忽一日有煙生其騰郁如曲突之狀坊僧奔赴以為人火所延及俯而視之無所有焉事尋達帝帝召僧之臘高者問焉僧曰貧道見莊宗將得天下曾有此煙觀此噴湧甚於當時兆可知矣自此日旁多有五色雲氣如蓮芰之狀帝召占者視之謂曰此驗應誰占者曰見處為瑞更應何人又帝每詰旦使慰撫守陴者率以為常忽一夕已暝城上有號令之聲聲不絶者三帝使人問之將吏云從上傳來者皆知神助時城中復有數家井泉暴溢不止及蕃軍大至合勢破之末帝之衆似拉朽焉斯天運使然非人力也是日帝言於戎王願以鴈門已北及幽州之地為戎王壽仍約歲輸帛三十萬戎王許之永樂大典卷一萬五千六百四十三
