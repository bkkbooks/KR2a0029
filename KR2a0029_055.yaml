body:
  text: 舊五代史卷五十五唐書三十一列傳第七康君立蔚州興唐人世為邊豪乾符中為雲州牙校事防禦使段文楚時羣盜起河南天下將亂代北仍歲阻饑諸部豪傑咸有嘯聚邀功之志會文楚稍削軍人儲給戍兵咨怨君立與薛鐵山程懷信王行審李存璋等謀曰段公懦人難與共事方今四方雲擾武威不振丈夫不能於此時立功立事非人豪也吾等雖權係部衆權係部衆原本脫係字今從通鑑考異所引薛史增入影庫本粘籤然以雄徑聞於時者莫若沙部復又李振武父子勇冠諸軍吾等合勢推之則代北之地旬月可定功名富貴事無不濟也君立等乃夜謁武皇言曰方今天下大亂天子付將臣以邊事歲偶饑荒便削儲給我等邊人焉能守死公家父子素以威惠及五部當共除虐帥以謝邊人孰敢異議者武皇曰明天子在上舉事當有朝典公等勿輕議豫家尊遠在振武萬一相迫俟豫稟命君立等曰事機已泄遲則變生曷俟千里咨稟案通鑑考異引趙鳳紀年録云邊校程懷信康君立等十餘帳日譁於太祖之門疑非事實新唐書作夜謁克用通鑑作潛詣蔚州說克用皆以薛史為據衆因聚譟擁武皇比及雲州衆且萬人師營鬬雞臺城中械文楚以應武皇之軍既收城推武皇為大同軍防禦留後衆狀以聞朝廷不悅詔徵兵來討俄而獻祖失振武武皇失雲州朝廷命招討使李鈞幽州李可舉加兵於武皇攻武皇於蔚州君立從擊可舉之師屢捷及獻祖入達靼君立保感義軍武皇授鴈門節度以君立為左都押牙從入關逐黃孽黃孽原本作黃辟考薛史前後多稱黃巢餘黨為黃孽今改正影庫本粘籤收長安武皇還鎮太原授檢校工部尚書先鋒軍使文德初李罕之既失河陽來歸於武皇且求援焉乃以君立充南面招討使李存孝副之帥師二萬助罕之攻取河陽三月與汴將丁會牛存節戰於沇河臨陳之次騎將安休休叛入汴軍君立引退八月授汾州刺史大順元年潞州小校安居受反武皇遣君立討平之授檢校左僕射昭義節度使自武皇之師連歲略地於邢洺攻孟方立君立常率澤潞之師以為掎角景福初檢校司徒食邑千戶二年李存孝據邢州叛武皇命君立討之以功加檢校太保乾寧初存孝平班師存孝既死武皇深惜之怒諸將無解慍者初李存信與存孝不叶屢相傾奪而君立素與存信善九月君立至太原武皇會諸將酒博因語及存孝事流涕不已時君立以一言忤旨武皇賜鴆而殂案通鑑考異引唐遺録作君立被杖死與薛史異時年四十八明宗即位以念舊之故詔贈太傅永樂大典卷一萬八千一百一十八薛志勤蔚州奉誠人小字鐵山初為獻祖帳中親信乾符中與康君立共推武皇定雲中以功授右牙都校從入達靼武皇授節鴈門志勤領代北軍使從入關收京城以功授檢校工部尚書河東右都押牙先鋒右軍使從武皇救陳許平黃巢武皇遇難於上源驛汴將楊彥洪連車樹柵遮絶巷陌時騎從皆醉宴席既闌汴軍四面攻傳舍志勤虓勇冠絶復酒膽激壯因獨登驛樓大呼曰朱僕射負恩無行邀我司空圖之吾三百人足以濟事因彎弧發射矢無虛發汴人斃者數十志勤私謂武皇曰事急矣如至五鼓吾屬無遺類矣無遺類矣原本脫遺字今從冊府元龜增入影庫本粘籤可速行因扶武皇而去雷雨暴猛汴人扼橋志勤以其屬血戰擊敗之得侍武皇還營由是恩顧益厚大順初張濬以天子之師來侵太原十月大軍入陰地志勤與李承嗣率騎三千抗之敗韓建之軍於蒙坑進收晉絳以功授欣州刺史二年從討鎮州收天長臨城志勤皆先登陷陳勇敢無前王暉據雲州叛討平之以志勤為大同軍防禦使檢校司空乾寧初代康君立為昭義節度使光化元年十二月以疾卒於潞時年六十二永樂大典卷二萬一千三百六十六史建瑭字國寶父敬思鴈門人仕郡至牙校武皇節制鴈門敬思為九府都督九府原本作凡府考新唐書唐官制有九府都督歐陽史亦作九府今改正影庫本粘籤從入關定京師及鎮太原為裨將中和四年從援陳許為前鋒敗黃巢於汴上追賊至徐兗常將騎挺身酣戰勇冠諸軍是時天下之師雲集軍中無不推伏六月衛從武皇入汴州舍於上源驛是夕為汴人所攻敬思方大醉因蹶然而興操弓與汴人鬬矢不虛發汴人死者數百夜分冒雨方達汴橋左右扶武皇決圍而去敬思後拒血戰而歿武皇還營知失敬思流涕久之建瑭以父廕少仕軍門光化中典昭德軍與李嗣昭攻汾州率先登城擒叛將李瑭以獻授檢校工部尚書李思安之圍上黨也建瑭為前鋒與總管周德威赴援時汴人夾城深固援路斷絶建瑭日引精騎設伏擒生夜犯汴營驅斬千計敵人不敢芻牧汴將王景仁營於柏鄉建瑭與周德威先出井陘井陘原本作井除今從通鑑改正影庫本粘籤高邑之戰日已晡晚汴軍有歸志建瑭督部落精騎先陷其陳夾攻魏滑之間遂長驅追擊夜入柏鄉俘斬數千計論功加檢校左僕射師旋留戍趙州汴將氏延賞數犯趙之南鄙建瑭設伏柏鄉獲延賞獻之九年梁祖親攻蓨縣時王師並攻幽州聲言汴軍五十萬將寇鎮定都將符存審謂建瑭曰梁軍倘以五十萬來我等何以待之裨將趙行實曰走入土門為上策存審曰事未可知但老賊在東別將西來尚可徐圖不旬日楊師厚圍棗彊賀德倫圍蓨縣梁祖自至攻城甚急存審曰吾王方事北面南鄙之事付我等數人今西道無兵坐滋賊勢何以為謀老賊若不下蓨阜必西攻深冀與公等料閲騎軍偵視賊勢乃選精騎八百趨信都存審扼下博橋建瑭與李嗣肱分道擒生建瑭乃分麾下三百騎為五軍案歐史建瑭分其麾下五百騎為五隊一之衡水一之南宮一之信都一之阜城而自將其一薛史作三百騎史異文也自將一軍深入各命俘掠梁軍之芻牧者還會下博橋翌日諸軍皆至獲芻牧者數百人聚而殺之緩數十人令其逸去各曰沙陀軍大至矣梁軍震恐明日建瑭嗣肱為梁軍服色與芻牧者相雜晡晚及賀德倫寨門殺守門者縱火大譟俘斬而去是夜梁祖燒營而遁北至貝州迷失道路委棄兵仗不可勝計十二年魏博歸款歸款原本作歸隸今據文改正影庫本粘籤建瑭與符存審前軍屯魏縣十三年敗劉鄩於元城收澶州以建瑭為刺史檢校司空外衙騎軍都將尋歷貝相二州刺史屯於德勝十八年與閻寶討張文禮為馬軍都將八月收趙州獲刺史王鋋進逼鎮州為流矢所中卒於軍時年四十六案歐陽史作四十二永樂大典卷一萬一百八十三李承嗣代州鴈門人父佐方承嗣少仕郡補右職中和二年從武皇討賊關輔為前鋒王師之攻華陰黃巢令僞客省使王汀會軍機於黃揆承嗣擒之以獻賊平以功授汾州司馬改榆次鎮將光啓初從討蔡賊於陳許上源之難遣承嗣奉表行在陳訴其事觀軍容田令孜館而慰諭令達情於武皇姑務叶和仍授以左散騎常侍朱玫之亂遣承嗣率軍萬人援鄜州至渭橋迎扈車駕王行瑜既殺朱玫承嗣會鄜夏之師入定京城獲僞相裴徹鄭昌圖鄭昌圖原本作易圖今從新唐書改正影庫本粘籤函送朱玫襄王首獻於行在駕還宮賜號迎鑾功臣檢校工部尚書守嵐州刺史賜犒軍錢二萬貫時車駕初還三輔多盜承嗣按兵警禦輦轂安及還屯於鄜留別將馬嘉福五百騎宿衛孟方立之襲遼州也武皇遣承嗣設伏於榆社以待之邢人既至承嗣發伏擊其歸兵大敗之獲其將奚忠信以功授洺州刺史及張濬之加兵於太原也時鳳翔軍營霍邑承嗣帥一軍攻之岐人夜遁追擊至趙城合大軍攻平陽旬有三日而拔師旋改教練使檢校司乾寧二年兗鄆為汴人所攻勢漸危蹙遣使乞師於武皇武皇遣承嗣帥三千騎假道於魏渡河援之時李存信屯於莘縣既而羅弘信背盟掩擊王師因茲隔絶及瑄瑾失守承嗣與朱瑾史儼同入淮南案十國春秋吳列傳太祖署為淮南行軍副使舊五代史考異承嗣史儼皆驍將也淮人得之軍聲大振武皇深惜之如失左右手乃遣趙嶽間道使於淮南請歸承嗣等楊行密許之遣使陳令存請修好於武皇其年九月汴將龐師古葛從周出師將收淮南朱瑾率淮南軍三萬與承嗣設伏於清口清口原本作請口今從十國春秋改正影庫本粘籤大敗汴人生獲龐師古行密嘉其雄才留而不遣仍奏授檢校太尉領鎮海軍節度使天祐九年淮人聞莊宗有柏鄉之捷乃以承嗣為楚州節度使以張掎角十七年七月卒於楚州時年五十五永樂大典卷二萬三百五十史儼代州鴈門人以便騎射給事於武皇為帳中親將驍果絶衆善擒生設伏望塵揣敵所向皆捷自武皇入定三輔誅黃巢每出師皆從乾寧中從討王行瑜師次渭北遣儼率五百騎護駕石門時京城大擾士庶多散布南山儼分騎警衛比駕還京盜賊不作以功檢校右散騎常侍屯於三橋者纍月昭宗寵錫優異明年與李承嗣率騎渡河援兗鄆時汴軍雄盛自青徐兗鄆柵壘相望儼與騎將安福順等案史儼援兗鄆在乾寧二年冬薛史梁太祖紀正月擒蕃將安福順然則安福順不當與史儼同行疑傳文有訛字每以數千騎直犯營壘左俘右斬汴軍為之披靡及朱瑾失守與李承嗣等奔淮南淮人比善水軍不間騎射既得儼等軍聲大振尋挫汴軍於清口其後並鍾傳擒杜洪杜洪原本作社珙今從新唐書改正影庫本粘籤削錢鏐成行密之霸迹者皆儼與承嗣之力也淮人館遇甚厚妻孥第舍必推其甲故儼等盡其死力案十國春秋云儼纍官滁州刺史舊五代史考異天祐十三年卒於廣陵永樂大典卷一萬一百八十三蓋寓蔚州人祖祚父慶世為州之牙將武皇起雲中寓與康君立等推轂佐佑之因為腹心武皇節制鴈門署職為都押牙領嵐州刺史洎移鎮太原改左都押牙檢校左僕射武皇與之決事言無不從凡出征伐靡不衛從案通鑑光啓二年駕幸興元大將蓋寓說克用曰鑾輿播遷天下皆歸咎於我今不誅朱玫黜李熅無以自湔洗克用從之又通鑑考異引紀年録云僞使至太原太祖詰其事狀曰皆朱玫所為將斬之以徇大將蓋寓等言云云太祖燔僞詔械其使馳檄喻諸鎮曰今月二十日得襄王僞詔及朱玫文字云田令孜脅遷鑾駕播越梁洋行至半塗六軍變擾遂至蒼黃而晏駕不知弒逆者何人永念丕基不可無主昨四鎮藩后推朕纂承已於正殿受冊畢改元大赦者李熅出自贅疣名汙藩邸智昏菽麥識昧機權李符虜之以塞辭朱玫賣之以為利呂不韋之奇貨可見姦邪蕭世誠之土囊期於匪夕近者當道徑差健步奉表起居行朝現住巴梁宿衛比無騷動而朱玫脅其孤騃自號台衡敢首亂階明言晏駕熒惑藩鎮凌弱廟朝云云案此事甚有關係不知薛史何以不載今附録於此乾寧二年從入關討王行瑜特授檢校太保開國侯食邑一千戶領容管觀察經略使光化初車駕還京授檢校太傅封成陽郡公寓性通黠多智數善揣人主情武皇性嚴急左右難事無委遇者小有違忤即置於法唯寓承顏希旨規其趨向婉辭順意以盡參裨武皇或暴怒將吏事將不測寓欲救止必佯佐其怒以責之武皇怡然釋之有所諫諍必徵近事以為喻自武皇鎮撫太原最推親信中外將吏無不景附朝廷藩鄰信使結託先及武皇次入寓門既總軍中大柄其名振主梁祖亦使姦人離間暴揚於天下言蓋寓已代李聞者寒心武皇略無疑間初武皇既平王行瑜旋師渭北暴雨六十日諸將或請入覲且云天顏咫尺安得不行覲禮武皇意未決寓白曰車駕自石門還京石門原本作右門今從通鑑改正影庫本粘籤寢未安席比為行瑜兄弟驚駭乘輿今京師未寧姦宄流議大王移兵渡渭必恐復動宸情君臣始終不必朝覲但歸藩守姑務勤王是忠臣之道也武皇笑曰蓋寓尚阻吾入覲況天下人哉即日班師天祐二年三月寓病篤武皇日幸其第手賜藥餌初寓家每事珍膳窮極海陸精於府饌武皇非寓家所獻不食每幸寓第其往如歸恩寵之洽時無與比及其卒也哭之彌慟莊宗即位追贈太師永樂大典卷一萬八千一百二十八伊廣字言案原本闕一字元和中右僕射慎之後廣中和末除授欣州刺史遇天下大亂乃委質於武皇廣襟情灑落善占對纍歷右職授汾州刺史時武皇主盟諸侯景附軍機締結聘遺旁午廣奉使稱旨纍遷至檢校司徒乾寧四年從征劉仁恭武皇之師不利於成安寨廣歿於賊有女為莊宗淑妃子承俊歷貝遼二州刺史永樂大典卷一萬八千一百二十八李承勳者與廣同為牙將善於奉使名聞軍中承勳纍遷至太原少尹劉守光之僭號也莊宗遣承勳往使問其釁端承勳至幽州見守光如藩方聘問之禮謁者曰燕王為帝矣可行朝禮朝禮原本作廟禮考通鑑作朝禮契丹國志亦云李承勳使于燕燕人請以朝禮見今改正影庫本粘籤承勳曰吾大國使人太原亞尹是唐帝除授燕主自可臣其部人安可臣我哉守光聞之不悅拘留於獄數日而出詰之曰臣我乎承勳曰燕君能臣我王則我臣之吾有死而已安敢辱命會王師討守光承勳竟歿於燕永樂大典卷一萬八千一百二十八史敬鎔太原人事武皇為帳中綱紀甚親任之莊宗初嗣晉王位李克寧陰搆異圖將害莊宗事發有日矣克寧密引敬鎔以邪謀告既而敬鎔上白貞簡太后惶駭召張承業李存璋等圖之克寧等伏誅以功纍歷州郡同光初為華州節度使移鎮安州天成中入為金吾上將軍期年復授鄧州至鎮數月卒贈太尉永樂大典卷一萬一百八十三
