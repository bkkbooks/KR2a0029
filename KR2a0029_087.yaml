body:
  text: 舊五代史卷八十七晉書十三宗室列傳第二案晉宗室列傳永樂大典僅存四篇餘多殘闕舊五代史考異廣王敬威字奉信高祖之從父弟也父萬詮贈太尉追封趙王敬威少善騎射事後唐莊宗以從戰有功纍歷軍職明宗即位擢為奉聖指揮使奉聖原本作奏聖今從歐陽史改正影庫本粘籤天成應順中凡十改軍額纍官至檢校工部尚書賜忠順保義功臣清泰中加兵部尚書彰聖都指揮使遙領常州刺史及高祖建義於太原敬威時在洛下知禍必及召所親謂曰夫人生而有死理之常也我兄方圖大舉余固不可偷生待辱取笑一時乃自殺於私邸人甚壯之天福二年冊贈太傅葬於河南縣六年追封廣王子訓嗣官至左武衛將軍敬威弟贇永樂大典卷六千七百六十案歐陽史高祖有兄敬儒弟敬德敬殷薛史不為立傳疑有闕文又贇歐陽史作敬贇舊五代史考異贇字德和案以下有闕文為陝州節度使少帝即位加同平章事贇性驕慢每使者至必問曰小姪安否恣為暴虐陝人苦之案以下闕薛史少帝紀開運三年十二月前曹州節度使石贇死帝之堂叔也歐陽史作墮沙濠溺死舊五代史考異韓王暉案歐陽史作敬暉舊五代史考異字德昭睿祖孝平皇帝之孫高祖之從兄也父萬友追封秦王暉生而龐厚剛毅雄直有器局行不由徑臨事多智故高祖於宗族之中獨厚遇之初張敬達之圍晉陽也高祖署暉為突騎都將常引所部出敵之不意深入力戰雖夷傷流血矢鏃貫骨而辭氣益厲高祖壯之天福二年遙授濠州刺史充皇城都部署四年加檢校司徒授曹州防禦使加檢校太保其蒞任也草泣任原本作釐仕今據文改正影庫本粘籤廉愛恤下不營財利不好伎樂部人安之歲餘以疾終於官歸葬太原八年冊贈太師案歐陽史作贈太傅加贈太師舊五代史考異追封韓王子曦嗣永樂大典卷六千七百六十案宋史石曦傳天福中以曦為右神武將軍歷漢至周為右武衛左神武二將軍恭帝即位初為左衛將軍會高麗王昭加恩命曦副左驍衛將軍戴交充使淳化四年卒舊五代史考異剡王重胤案郯王以下諸王傳永樂大典原闕歐陽史云重胤高祖弟也亦不知其為親疏然高祖愛之養以為子故于名加重而下齒諸子通鑑齊王紀同重胤婦馮氏後為少帝后歐陽史載契丹入京師暴少帝之惡于天下曰納叔母于宮中亂人倫之大典是重胤實為高祖弟也五代會要作高祖第三子重胤天福七年四月追封郯王考郯王歐陽史作鄭王封爵亦異又案薛史唐紀清泰三年誅皇城副使石重裔敬瑭之子也考會要載高祖諸子無別名重裔者重裔疑即重胤史氏避宋太祖諱故作裔然通鑑高祖紀作敬瑭之子重胤齊王紀又作高祖少弟重胤早卒似兩紀實有兩人姑存之以備考舊五代史考異虢王重英案虢王傳永樂大典原闕考五代會要云重英高祖長子天福四年四月追封是書唐紀清泰三年七月己丑誅右衛上將軍石重英殿本案五代會要云重英高祖長子天福四年四月追封薛史唐紀清泰三年七月己丑誅右衛上將軍石重英通鑑考異引廢帝實録作姪男供奉官重英又廣本英作殷舊五代史考異楚王重信字守孚高祖第二子案五代會要作第四子舊五代史考異後唐明宗之外孫也少敏悟有智思天成中始授銀青光祿大夫檢校左散騎常侍俄加檢校刑部尚書守相州長史未幾遷金紫光祿大夫超拜檢校司徒守左金吾衛大將軍重信歷事唐明宗及閔帝末帝不恃貴戚能克己復禮常恂恂如也甚為時論所稱高祖即位出鎮孟津到任踰月去民病十餘事朝廷有詔褒之是歲范延光叛命於鄴詔遣前靈武節度使張從賓發河橋屯兵數千人東討延光既而從賓與延光合謀為亂遂害重信於理所時年二十遠近聞者為之嘆惜詔贈太尉時執事奏曰兩漢子弟生死無歷三公位者高祖曰此兒為善被禍豫甚愍之自我作古寧有例乎遂行冊命以其年十月葬河南萬安山天福七年追封沂王少帝嗣位改封楚王妃南陽白氏昭信軍節度使奉進之女也重信有子二人皆幼長於公宮及少帝北遷不知其所終永樂大典卷六千七百六十壽王重字宏理高祖第三子也案五代會要作第二子通鑑考異作姪男舊五代史考異幼岐嶷好儒書亦通兵法高祖素所鍾愛及即位自北京皇城使拜左驍衛大將軍車駕幸浚郊浚郊原本作洨效今據冊府元龜改正影庫本粘籤加檢校司空權東都留守未幾鄴都范延光叛朝廷遣楊光遠討之詔前靈武節度使洛都巡檢使張從賓發盟津屯兵赴鄴下會從賓密通延光與婁繼英等先劫河橋次亂洛邑因害重於河南府時年十九從賓敗高祖發哀於便殿輟視朝三日詔贈太傅是歲冬十月詔遣莊宅使張穎監護喪事葬於河南府萬安山天福追封壽王妃李氏汾州刺史之女也重無子妃後落髮為尼開運中卒於京師永樂大典卷六千七百六十案晉宗室傳原本多闕佚今姑仍原文夔王重進案五代會要云重進高祖第五子天福七年四月追封舊五代史考異陳王重杲案歐陽史云高祖少子曰馮六未名而卒贈太傅追封陳王賜名重杲舊說以重睿為幼子非也今考五代會要作高祖第六子重杲第七子重睿與歐陽史異舊五代史考異重睿案契丹國志云高祖憂悒成疾一旦馮道獨對高祖命幼子重睿出拜之又令宦者抱置道懷中蓋欲馮道輔立之高祖崩道與侍衛馬步都虞候景延廣議以國家多難宜立長君乃奉齊王重貴為嗣五代會要云重睿高祖第七子許州節度使未封王歐陽史云從出帝北遷不知其所終舊五代史考異延煦按五代會要云延煦少帝長子遙領陝西節度使通鑑云趙在禮家資為諸帥之最帝利其富為皇子鎮寧節度使延煦娶其女在禮自費緡錢十萬縣官之費數倍過之舊五代史考異延寶案五代會要云延寶少帝次子遙領魯州節度使通鑑云延煦及弟延寶皆高祖諸孫帝養以為子會要引實録亦云皆帝之從子養以為子歐陽史云延煦等從帝北遷後不知其所終舊五代史考異
