body:
  text: 舊五代史卷八十九晉書十五列傳第四桑維翰字國僑洛陽人也父拱事河南尹張全義為客將維翰身短面廣殆非常人既壯每對鑑自歎曰七尺之身安如一尺之面由是慨然有公輔之望案三楚新錄云馬希範入覲途經淮上時桑維翰旅遊楚泗間知其來遽謁之曰僕聞楚之為國挾天子而令諸侯其勢不可謂卑也加以利盡南海公室大富足下之來也非傾府庫之半則不足以供芻粟之費今僕貧者敢以萬金為請惟足下濟之希範輕薄公子覩維翰形短而腰長語魯而且醜不覺絕倒而笑既而與數百縑維翰大怒拂衣而去舊五代史考異性明惠善詞賦案春渚記聞云桑維翰試進士有司嫌其姓黜之或勸勿試維翰持鐵硯示人曰鐵硯穿乃改業著日出扶桑賦以見志舊五代史考異唐同光中登進士第案張齊賢張齊王全義外傳云桑魏公將應舉父乘間告王云某男粗有文性今被同人相率取解俟王旨齊王曰有男應舉好事將卷軸來可令秀才來桑相之父趨下再拜既歸令子侵早投書啟獻文字數軸王令請桑秀才其父教之趨階王曰不可既應舉便是貢士以客禮見王一見奇之禮待頗厚是年王力言于當時儒臣且推薦之由是擢上第舊五代史考異高祖領河陽辟為掌書記歷數鎮皆從及建義太原首預其謀復遣為書求援於契丹果應之俄以趙德鈞發使聘契丹趙德鈞原本作得均今從歐陽史改正影庫本粘籤高祖懼其改謀命維翰詣幕帳述其始終利害之義其約乃定案通鑑云趙德鈞以金帛賂契丹主云若立己為帝請即以見兵南平洛陽與契丹為兄弟之國仍許石氏常鎮河東契丹主自以深入敵境晉安未下德鈞兵尚強范延光在其東又恐山北諸州邀其歸路欲許德鈞之請帝聞之大懼亟使維翰見契丹主說之曰大國舉義兵以救孤危一戰而唐兵瓦解退守一柵食盡力窮趙北平父子不忠不信畏大國之強且素蓄異志按兵觀變非以死徇國之人何足可畏而信其誕妄之辭貪毫末之利棄垂成之功乎且使晉得天下將竭中國之財以奉大國豈此小利之比乎契丹主曰爾見捕鼠者乎不備之猶或齧傷其手況大敵乎對曰今大國已扼其喉安能齧人乎契丹主曰吾非有渝前約也但兵家權謀不得不爾對曰皇帝以信義救人之急四海之人俱屬耳目奈何二三其命使大義不終臣竊為皇帝不取也跪于帳前自旦之暮涕泣爭之契丹乃從之指帳前石謂德鈞使者曰我已許石郎此石爛可改矣舊五代史考異及高祖建號制授翰林學士禮部侍郎知樞密院事尋改中書侍郎平章事集賢殿大學士充樞密院使高祖幸夷門范延光據鄴叛張從賓復自河洛舉兵向闕人心恟恟時有人候於維翰者維翰從容談論怡怡如也時皆服其度量及楊光遠平鄴朝廷慮兵驕難制維翰請速散其衆尋移光遠鎮洛陽光遠由是怏怏上疏論維翰去公狥私除改不當復營邸肆於兩都之下與民爭利高祖方姑息外將事不獲已因授維翰檢校司空兼侍中出為相州節度使時天福四年七月也先是相州管內所獲盜賊皆籍沒其財產云是河朔舊例及維翰作鎮以律無明文具事以奏之詔曰桑維翰佐命功全臨戎寄重舉一方之往事合四海之通規況賊盜之徒律令具載比為撫萬姓而安萬國豈忍罪一夫而破一家聞將相之善言成國家之美事既資王道實契人心今後凡有賊人准格律定罪不得沒納家貲天下諸州皆准此處分自是劫賊之家皆免籍沒維翰之力也歲餘移鎮兗州時吐渾都督白承福為契丹所迫舉衆內附高祖方通好於契丹拒而不納鎮州節度使安重榮患契丹之強欲謀攻襲戎師往返路出於真定者皆潛害之密與吐渾深相結至是納焉而致於朝既而安重榮抗表請討契丹且言吐渾之請是時安重榮握強兵據重鎮恃其驍勇有飛揚跋扈之志晉祖覽表猶豫未決維翰知重榮已畜奸謀且懼朝廷違其意乃密上疏曰竊以防未萌之禍亂立不拔之基扃上繫聖謀動符天意非臣淺陋所可窺圖然臣逢世休明致位通顯無功報國省己愧心其或事繫安危理關家國苟猶緘默實負君親是以區區之心不能自已近者相次得進奏院狀報吐渾首領白承福已下舉衆內附鎮州節度使安重榮上表請討契丹臣方遙隔朝闕未測端倪竊思陛下頃在幷汾初罹屯難師少糧匱援絕計窮勢若綴旒困同懸磬契丹控弦玉塞躍馬龍城直度陰山徑絕大漠萬里赴難一戰夷凶救陛下累卵之危成陛下覆盂之業覆盂原本作復于今從通鑑改正影庫本粘籤皇朝受命於此六年彼此通歡亭障無事雖卑辭降節屈萬乘之尊而庇國息民實數世之利今者安重榮表契丹之罪方恃勇以請行白承福畏契丹之強將假手以報怨恐非遠慮有惑聖聰方今契丹未可與爭者有其七焉契丹數年來最強盛侵伐鄰國吞滅諸蕃救援河東功成師克山後之名藩大郡盡入封疆中華之精甲利兵悉歸廬帳即今土地廣而人民衆戎器備而戰馬多此未可與爭一也契丹自告捷之後鋒銳氣雄南軍因敗衄已來心沮膽怯況今秋夏雖稔而帑廩無餘黎庶雖安而貧弊益甚戈甲雖備而鍛礪未精士馬雖多而訓練未至此未可與爭者二也契丹與國家恩義非輕信誓甚篤雖多求取未至侵凌豈可先發釁端自為戎首縱使因茲大克則後患仍存其或偶失沈機則追悔何及兵者凶器也戰者危事也苟議輕舉安得萬全此未可與爭者三也王者用兵觀釁而動是以漢宣帝得志於匈奴因單于之爭立唐太宗立功於突厥由頡利之不道方今契丹主抱雄武之量有戰伐之機部族輯睦蕃國畏伏土地無災孳畜繁庶蕃漢雜用國無釁隙此未可與爭者四也引弓之民遷徙鳥舉行逐水草軍無饋運居無竈幕往無營柵便苦澀任勞役不畏風霜不顧饑渴皆華人之所不能此未可與爭者五也戎人皆騎士利在坦途中國用徒兵喜於隘險趙魏之北燕薊之南千里之間地平如砥步騎之便較然可知國家若與契丹相持則必屯兵邊上少則懼強敵之衆固須堅壁以自全多則患飛輓之勞必須逐寇而速返我歸而彼至我出而彼迴則禁衞之驍雄疲於奔命鎮定之封境略無遺民此未可與爭者六也議者以陛下於契丹有所供億謂之耗𢀿有所卑遜謂之屈辱微臣所見則曰不然且以漢祖英雄猶輸貨於冒頓神堯武略尚稱臣於可汗此謂達於權變善於屈伸所損者微所利者大必若因茲交構遂成釁隙自此則歲歲徵發日日轉輸困天下之生靈空國家之府藏此謂耗𢀿不亦甚乎兵戈既起將帥擅權武吏功臣過求姑息邊藩遠郡得以驕矜外剛內柔上凌下僭此為屈辱又非多乎此未可與爭者七也願陛下思社稷之大計采將相之善謀勿聽樊噲之空言宜納婁敬之逆耳然後訓撫士卒養育黔黎積穀聚人勸農習戰以俟國有九年之積兵有十倍之強主無內憂民有餘力便可以觀彼之變待彼之衰用己之長攻彼之短舉無不克動必成功此計之上者也惟陛下熟思之臣又以鄴都襟帶山河表𩹉形勝原田沃衍戶賦殷繁乃河朔之名藩實國家之巨屏即今主帥赴闕軍府無人臣竊思慢藏誨盜之言恐非勇夫重閉之意愿迴深慮免起奸謀欲希陛下暫整和鑾略謀巡幸雖櫛風沐雨上勞於聖躬而杜漸防微實資於睿略省方展義今也其時臣受主恩深憂國情切智小謀大理淺詞繁俯伏惟懼於僭踰裨補或希於萬一謹冒死以聞疏奏留中不出高祖召使人於內寢傳密旨於維翰曰朕比以北面事之煩懣不快今省所奏釋然如醒朕計已決卿可無憂七年夏高祖駕在鄴都維翰自鎮來朝改授晉昌軍節度使少帝嗣位徵拜侍中監修國史頻上言請與契丹和為上將景延廣所否明年楊光遠搆契丹有澶淵之役凡制敵下令皆出於延廣維翰與諸相無所與之及契丹退維翰使親黨受寵於少帝者密致自薦曰陛下欲制北戎以安天下非維翰不可案歐陽史作維翰陰使人說帝與薛史同通鑑作或謂帝曰欲安天下非桑維翰不可與薛史異舊五代史考異少帝乃出延廣守洛以維翰守中書令再為樞密使弘文館大學士繼封魏國公事無巨細一以委之數月之間百度寖理然權位既重而四方賂遺咸湊其門故仍歲之間積貨鉅萬由是澆競輩得以興謗未幾內客省使李彥韜端明殿學士馮玉皆以親舊用事與維翰不協間言稍入維翰漸見疏忌將黜退賴宰相劉昫李崧奏云維翰元勳且無顯過不宜輕有進退少帝乃止尋以馮玉為樞密使以分維翰之權後因少帝微有不豫維翰曾密遣中使達意於太后請為皇弟重睿擇師傅以教道之少帝以此疑其有他俄而馮玉作相與維翰同在中書會舍人盧價秩滿盧價原本作盧侍今從歐陽史改正影庫本粘籤玉乃下筆除價為工部侍郎維翰曰詞臣除此官稍慢恐外有所議因不署名屬維翰休假玉竟除之自此維翰與玉尤不相協俄因少帝以重睿擇師傅言於玉玉遂以詞激帝帝尋出維翰為開封府尹維翰稱足疾罕預朝謁不接賓客是歲秋霖經月不歇一日維翰出府門由西街入內至國子門馬忽驚逸御者不能制維翰落水久而方蘇或言私邸亦多怪異親黨咸憂之及戎王至中渡橋維翰以國家安危繫在朝夕迺詣執政異其議又求見帝復不得對維翰退而謂所親曰若以社稷之靈天命未改非所能知也若以人事言之晉氏將不血食矣開運三年十二月十日王師既降契丹十六日張彥澤以前鋒騎軍陷都城戎王遣使遺太后書云可先使桑維翰景延廣遠來相接甚是好事是日凌旦都下軍亂宮中火發維翰時在府署左右勸使逃避維翰曰吾國家大臣何所逃乎即坐以俟命時少帝已受戎王撫慰之命乃謀自全之計因思維翰在相時累貢謀畫請與契丹和慮戎王到京窮究其事則顯彰己過故欲殺維翰以滅其口因令圖之張彥澤既受少帝密旨案通鑑考異云彥澤既降契丹豈肯復受少帝之命當係彥澤自以私怨殺維翰非受命于少帝也舊五代史考異復利維翰家財乃稱少帝命召維翰維翰束帶乘馬行及天街與李崧相遇交談之次有軍吏於馬前揖維翰赴侍衞司維翰知其不可顧謂崧曰侍中當國今日國亡翻令維翰死之何也崧甚有愧色是日彥澤遣兵守之十八日夜為彥澤所害時年四十九即以衣帶加頸報戎王云維翰自經而死戎王報曰我本無心害維翰維翰不合自剄戎王至闕使人驗其狀令殯於私第厚撫其家所有田園邸第並令賜之案歐陽史作以尸賜其家而貲財悉為彥澤所掠舊五代史考異及漢高祖登極詔贈尚書令維翰少時所居恆有魑魅家人咸畏之維翰往往被竊其衣撮其巾櫛而未嘗改容當兩朝秉政出上將楊光遠景延廣俱為洛川守又嘗一制除節將十五人各領軍職無不屈而服之理安陽除民弊二十餘事在兗海擒豪賊過千人亦寇恂尹翁歸之流也開運中朝廷以長子坦為屯田員外郎次子塤為祕書郎維翰謂同列曰漢代三公之子為郎廢已久矣近或行之甚諠外議乃抗表固讓不受尋改坦為大理司直塤為秘書省正字議者美之初高祖在位時詔廢翰林學士院由是併內外制皆歸閣下命舍人直內廷數年之間尤重其選及維翰再居宥密不信宿奏復置學士院凡署職者皆其親舊時議者以維翰相業素高公望所屬雖除授或黨亦弗之咎也永樂大典卷七千三百三十九五代史補桑維翰形貌甚怪往往見之者失次張彥澤素以驍勇稱每謁候雖冬月未嘗不雨汗及中渡變生彥澤引蕃部至欲逞其威乃領衆突入開封府弓矢亂發且問桑維翰安在維翰聞之乃厲聲曰吾為大臣使國家如此甚死宜矣張彥澤安得無禮乃升廳安坐數之曰汝有何功帶使相已臨方面當國家危急不能盡犬馬之力以為報効一旦背叛助契丹作威為賊汝心安乎彥澤覩其詞氣慨然股慄不敢仰視退曰吾不知桑維翰何人今日之下威稜猶如此其再可見耶是夜令壯士就府縊殺之當維翰之縊也猶瞋目直視噓其氣再三每一噓皆有火出其光赫然三噓之外火盡滅就視則奄然矣趙瑩字玄輝華陰人也華陰原本作華夏今從歐陽史改正影庫本粘籤曾祖溥江陵縣丞祖孺祕書正字父居晦為農瑩風儀美秀性復純謹梁龍德中始解褐為康延孝從事後唐同光中延孝鎮陝州會莊宗伐蜀命延孝為騎將將行留瑩監修金天神祠功既集忽夢神召於前亭待以優禮謂瑩曰公富有前程所宜自愛因遺一劍一笏覺而駭異明宗即位以高祖為陝府兩使留後瑩時在郡以前官謁之一見如舊相識即奏署管記高祖歷諸鎮皆從之累使闕下官至御史大夫賜金紫高祖再鎮幷州位至節度判官高祖建號授瑩翰林學士承旨金紫光祿大夫戶部侍郎知太原府事尋遷門下侍郎同平章事監修國史車駕入洛使持聘謝契丹及還加光祿大夫兼吏部尚書判戶部初瑩為從事丁母憂高祖不許歸華下以麤縗隨幕人或短之及入相以敦讓汲引為務監修國史日以唐代故事殘缺署能者居職纂補實錄及修正史二百卷行於時瑩首有力焉少帝嗣位拜守中書令明年檢校太尉本官出為晉昌軍節度使是時天下大蝗境內捕蝗者獲蝗一斗給粟一斗使飢者獲濟遠近嘉之未幾移鎮華州歲餘入為開封尹開運末馮玉李彥韜用事以桑維翰才望素重而瑩柔而可制因共稱之乃出維翰復瑩相位加弘文館大學士及李崧馮玉議出兵應接趙延壽而以杜重威為都督部署瑩私謂馮李曰杜中令國之懿親所求未愜心恆怏怏安可更與兵權若有事邊陲只李守貞將之可也及契丹陷京城契丹主遷少帝於北塞瑩與馮玉李彥韜俱從李彥韜原本脫彥字今從通鑑增入影庫本粘籤契丹永康王代立授瑩太子太保案遼史作太子太傅舊五代史考異周廣順初遣尚書左丞田敏報命於契丹遇瑩於幽州瑩得見華人悲悵不已謂田敏曰老身漂零寄於此近聞室家喪逝弱子無恙蒙中朝皇帝倍加存恤東京舊第本屬公家亦聞優恩特給善價老夫至死無以報效於是南望稽首涕泗潢流先是漢高祖以入蕃將相第宅徧賜隨駕大臣故以瑩第賜周太祖太祖時為樞密副使召瑩子前刑部郎中易則告之曰所賜第除素屬版籍外如有別契券為己所置者可歸本直即以千餘緡遺易則易則惶恐辭讓周太祖堅與之方受故瑩言及之未幾瑩卒於幽州時年六十七瑩初被疾遣人祈告於契丹主願歸骨於南朝使羈魂幸復鄉里契丹主閔而許之及卒遣其子易從家人數輩護喪而還仍遣大將送至京師周太祖感歎久之詔贈太傅仍賜其子絹五百疋以備喪事令歸葬於華陰故里永樂大典卷一萬六千九百九十一劉昫字耀遠涿州歸義人也祖乘幽府左司馬父因幽州巡官昫神彩秀拔文學優贍與兄晅弟俱有鄉曲之譽唐天祐中契丹陷其郡昫被俘至新州逃而獲免後居上國大寧山與呂夢奇張麟結庵共處以吟誦自娛會定州連帥王處直以其子都為易州刺史署昫為軍事衙推及都去任乞假還鄉都招昫至中山會其兄晅自本郡至都薦於其父尋署為節度衙推不踰歲命為觀察推官歷二年都篡父位時都有客和少微素嫉晅搆而殺之昫越境而去寓居浮陽節度使李存審辟為從事莊宗即位授太常博士尋擢為翰林學士繼改膳部員外郎賜緋比部郎中賜紫丁母憂服闋授庫部郎中依舊充職明宗即位拜中書舍人歷戶部侍郎案歐陽史作兵部侍郎案薛史唐明宗紀作兵部侍郎與此傳異歐陽史從薛史本紀舊五代史考異端明殿學士明宗重其風儀愛其溫厚長興中拜中書侍郎兼刑部尚書平章事時昫入謝遇大祠明宗不御中興殿閤門白舊禮宰相謝恩須正殿通喚請候來日樞密使趙延壽曰命相之制下已數日中謝無宜後時因即奏之遂謝於端明殿昫自端明殿學士拜相而謝於本殿士子榮之清泰初兼判三司加吏部尚書門下侍郎監修國史時與同列李愚不協動至忿爭時論非之未幾俱罷知政事昫守右僕射以張延朗代判三司初唐末帝自鳳翔至切於軍用時王玫判三司詔問錢穀玫具奏其數及命賞軍甚愆於素案通鑑云帝問王玫以府庫之實對有數百萬在既而閱實金帛不過三萬兩匹舊五代史考異末帝怒用昫代玫昫乃搜索簿書命判官高延賞計窮詰勾及積年殘租或場務販負皆虛係賑籍條奏其事請可徵者急督之無以償官者蠲除之案通鑑清泰元年八月免諸道逋租三百三十八萬舊五代史考異吏民相與歌詠唯主典怨沮及罷相之日羣吏相賀昫歸無一人從之者蓋憎其太察故也天福初張從賓作亂於洛陽害皇子重詔為東都留守判河南府事尋以本官判鹽鐵未幾奉使入契丹還遷太子太保兼左僕射封譙國公俄改太子太傅開運初授司空平章事監修國史復判三司契丹主至不改其職昫以眼疾乞休致契丹主降偽命授昫守太保案歐陽史作罷為太保舊五代史考異契丹主北去留於東京其年夏以病卒年六十漢高祖登極贈太保初昫避難河朔匿於北山蘭若有賈少瑜者為僧輟衾袍以溫燠之及昫官達致少瑜進士及第拜監察御史聞者義之永樂大典卷九千九十八馮玉案以下有闕文歐陽史云字景臣定州人舊五代史考異馮玉傳永樂大典闕全篇其散見各韻者尚存三條今排比前後以存大概影庫本粘籤少帝嗣位納馮后於中宮后即玉之妹也玉既聯戚里恩寵彌厚俄自知制誥中書舍人出為潁州團練使遷端明殿學士戶部侍郎尋加右僕射軍國大政一以委之永樂大典卷一萬三百三十案以下有闕文通鑑云玉每喜承迎帝意由是益有寵嘗有疾在家帝謂諸宰相曰自刺史而上俟馮玉出乃得除其倚任如此玉乘勢弄權四方賂遺輻輳其門由是朝政日壞舊五代史考異張彥澤陷京城軍士爭湊其第家財臣萬一夕罄空翌日玉假蓋而出猶繞指以諂彥澤且請令引送玉璽於契丹主將利其復用永樂大典卷一萬三百三十玉從少帝北遷契丹命為太子少保至周太祖廣順二年其子傑自幽州不告父而亡歸玉懼譴責尋以憂恚卒於蕃中永樂大典卷一萬七千一百九十五五代史補馮玉嘗為樞密使有朝使馬承翰素有口辨一旦持刺來謁玉玉覽刺輒戲曰馬既有汗宜卸下鞍承翰應聲曰明公姓馮可謂死囚逢獄玉自以言失遽延而謝之殷鵬字大舉大名人也以雋秀為鄉曲所稱弱冠擢進士第唐閔帝之鎮魏州聞其名辟為從事及即位命為右拾遺歷左補闕考功員外郎充史館修撰遷刑部郎中鵬姿顏若婦人而性巧媚天福中擢拜中書舍人與馮玉同職玉本非代言之才所得除目多託鵬為之玉嘗以姑息字問於人人則以辜負字教之玉乃然之當時以為笑端鵬之才比玉雖優其纖佞過之後玉出郡借第以處之分祿食之及玉為樞密使擢為本院學士每有庶僚乘鞹謁玉故事宰臣以履見之鵬多在玉所見客亦然有丞郎王易簡退而有言鵬銜之及契丹入汴有人獲玉與鵬有籤記字皆朝廷上列有不得志欲左授者則易簡是其首焉玉既北行鵬亦尋以病卒永樂大典卷二千二百六史臣曰維翰之輔晉室也罄弼諧之志參締搆之功觀其効忠亦可謂社稷臣矣況和戎之策固非誤計及國之亡也彼以滅口為謀此掇歿身之禍則畫策之難也豈期如是哉是以韓非慨慷而著說難者當為此也悲夫趙瑩際會風雲優游藩輔雖易簀於絕域終歸柩於故園蓋仁信之行通於遐邇故也劉昫有真相之才克全嘉譽馮玉乘君子之器終歿窮荒其優劣可知矣永樂大典卷三千二百六
