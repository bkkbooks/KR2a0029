body:
  text: 舊五代史卷四十八唐書二十四末帝紀下清泰三年春正月辛卯朔帝御文明殿受朝賀仗衛如式乙未百濟遣使獻方物戊戌幸龍門佛寺祈雪癸卯以給事中充樞密院直學士呂琦為端明殿學士以六軍諸衛判官尚書工部郎中薛文遇為樞密院直學士乙巳以上元夜京城張燈帝微行置酒於趙延壽之第丁未皇子河南尹判六軍諸衛事重美封雍王雍王原本作壅王今從歐陽史改正影庫本粘籤己未以前司農卿王彥鎔為太僕卿二月戊辰吐渾寧朔奉化兩府留後李可久加檢校司徒可久本姓白氏前朝賜姓庚午監修國史姚顗史官張昭遠李祥吳承範等修撰明宗實録三十卷上之案五代會要同修撰官中書舍人張昭遠李祥直館左拾遺吳承範右拾遺楊昭儉等各頒賚有差舊五代史考異以大理卿竇維為光祿卿以前許州節度判官張登為大理卿丁丑以太常卿李鏻為兵部尚書以兵部尚書梁文矩為太常卿庚辰以前鄜州節度使皇甫立為潞州節度使辛巳以前均州刺史仇暉為左威衛上將軍保順軍節度使鮑君褔加檢校太尉保順原本作任順君褔原本作居褔今俱從十國春秋改正影庫本粘籤同平章事丁亥以昭義節度使安元信卒廢朝三月庚子中書門下奏準閣門分析內外官辭見謝規例諸州判官軍將進奉到闕舊例門見門辭今後只令朝見依舊門辭新除諸道判官書記以下無例中謝並放謝放辭得替到京無例見今後兩使判官許中謝赴任即門辭其書記以下並依舊例朝臣文五品武四品以上舊例中謝其以下無例對謝今請依天成四年正月敕凡升朝官並許中謝諸道都押衙馬步都指揮虞候鎮將諸色場院無例謝辭並進榜子放謝放辭得替到闕無例入見在京鹽麴稅官兩官巡即許中謝新除令録並中謝次日門辭兼有口敕誡勵文武兩班所差弔祭使及告廟祠祭只正衙辭不赴內殿諸道進奏官到闕見得假進榜子門辭從之辛丑權知褔建節度使王昶奏節度使王延鈞以去年十月十四日卒是時延鈞父子雖僭竊於閩嶺猶稱藩於朝廷故有是奏甲辰以右神武統軍楊漢章為彰武軍節度使丙午以翰林學士禮部侍郎馬裔孫為中書侍郎同平章事丁巳以端明殿學士呂琦為御史中丞案通鑑呂琦與李嵩建和親契丹之策為薛文遇所沮改為御史中丞蓋疏之也舊五代史考異戊午御史中丞盧損責授右贊善大夫知雜侍御史韋稅責授太僕寺丞侍御史魏遜責授太府寺主簿侍御史王嶽責授司農寺主簿初延州保安鎮將白文審聞兵興岐下專殺郡人趙思謙等十餘人已伏其罪復下臺追繫推鞫未竟會去年五月十二日德音除十惡五逆放火殺人外並放盧損輕易即破械釋文審帝大怒收文審誅之臺司稱奉德音釋放不得追領祗證中書詰云德音言不在追窮枝蔓無不得追領祗證六字擅改敕語大理斷以失出罪人論故有是命是月有蛇鼠鬬於師子門外鼠生而蛇死夏四月己未朔以左衛上將軍王景戡為左神武統軍以右領軍上將軍李頃為華清宮使領軍原本作衡軍今從薛史列傳改正影庫本粘籤戊辰以太子詹事盧演為工部尚書致仕辛未以中書舍人史館修撰張昭遠為禮部侍郎以前滄州節度使李金全為右領軍上將軍是月有熊入京城搏人五月辛卯以河東節度使兼大同彰國振武威塞等軍蕃漢馬步總管檢校太師兼中書令駙馬都尉石敬瑭為鄆州節度使進封趙國公案歐陽史廢帝紀于五月以前即書石敬瑭反與晉本紀自相矛盾據薛史五月辛卯始移敬瑭于鄆州戊戌始聞拒命也五代春秋通鑑俱與薛史同舊五代史考異以河陽節度使充侍衛馬步軍都指揮使宋審虔為河東節度使甲午以前晉州節度使大同彰國振武威塞等軍蕃漢副總管張敬達充西北面蕃漢馬步都部署落副總管乙未詔諸州兩使判官畿赤令有闕取省郎遺補丞博少列宮僚選擇擢任案以上疑有脫誤以忠正軍節度使侍衛步軍都指揮使張彥琪為河陽節度使充侍衛馬軍都指揮使以彰聖都指揮使饒州刺史符彥饒為忠正軍節度使充侍衛步軍都指揮使丙申以雍王重美與汴州節度使范延光結婚詔兗王從溫主之丁酉以國子祭酒馬縞卒廢朝戊戌昭義奏昭義原本作達義今從通鑑增入影庫本粘籤河東節度使石敬瑭叛案通鑑作昭義節度使皇甫立奏石敬瑭叛舊五代史考異以鴻臚卿兼通事舍人判四方館王景崇為衛尉卿充引進使壬寅削奪石敬瑭官爵便令張敬達進軍攻討乙卯以晉州節度使張敬達為太原四面兵馬都部署尋改為招討使案通鑑乙巳以張敬達兼太原四面排陳使丙午以為太原四面都部署丁未又知太原行府事不言其為招討使歐陽史又作都招討使與薛史微異舊五代史考異以河陽節度使侍衛馬軍都指揮使張彥琪為太原四面馬步軍都指揮使以邢州節度使安審琦為太原四面馬軍都指揮使以陝州節度使相里金為太原四面步軍都指揮使以右監門上將軍武廷翰為壕寨使丙辰以定州節度使楊光遠為太原四面兵馬副部署兼馬步都虞候尋改為太原四面副招討使都虞候如故以前彰武軍節度使高行周為太原四面招撫兼排陳使初帝疑河東有異志與近臣語及其事帝曰石郎與朕近親在不疑之地流言毀譽朕心自明萬一失歡如何和解左右皆不對翌日欲移石敬瑭於鄆州房皓等堅言不可司天監趙延義亦言星辰失度尤宜安靜由是稍緩其事會薛文遇獨宿於禁中帝召之諭以太原之事文遇奏曰臣聞作舍於道三年不成國家利害斷自宸旨以臣料之石敬瑭除亦叛不除亦叛不如先事圖之帝喜曰聞卿此言豁吾憤氣先是有人言國家明年合得一賢佐主謀平定天下帝意亦疑賢佐者屬在文遇即令手書除目子夜下學士院草制翌日宣制之際兩班失色居六七日敬瑭上章云明宗社稷陛下纂承未契輿情宜推令辟許王先朝血緒養德皇闈儻循當璧之言免負薴岌部帝覽奏不悅手攘抵地召馬裔孫草詔報曰父有社稷傳之於子君有禍難倚之於親卿於鄂王故非疏遠往歲衛州之事天下皆知今朝許王之言人誰肯信英賢立事安肯如斯云戊申張敬達奏西北面先鋒都指揮使安審信率雄義左第二指揮二百二十七騎並部下共五百騎剽劫百井叛入太原又奏大軍已至太原城下詔安審信及雄義兵士妻男並處斬家産沒官先是雄義都在代州屯戍其指揮使安元信謀殺代州刺史張朗事泄戍兵自潰奔安審信軍審信與之入太原太常奏於河南府東權立宣憲太后寢宮宣憲原本作令憲今據五代會要改正影庫本粘籤從之己酉振武節度使安叔千奏西北界巡檢使安重榮驅掠戍兵五百騎叛入太原以新授河東節度使宋審虔為宣州節度使充侍衛馬軍都指揮使壬子鄴都屯駐捧聖都虞候張令昭逐節度使劉延皓據城叛翌日令昭召副使邊仁嗣已下逼令奏請節旄六月辛酉天雄軍節度使劉延皓削奪官爵勒歸私第癸亥以天雄軍守禦右捧聖第二軍都虞候張令昭為檢校司空行右千牛將軍權知天雄軍府事丙寅御敷政殿遣工部尚書崔居儉奉宣憲皇太后寶册於寢宮時陵園在河東適會兵興故權於京城修奉寢宮上諡焉己巳以西上閣門副使少府監兼通事舍人劉頎為鴻臚卿職如故庚午詔曰時雨稍愆頗傷農稼分命朝臣祈禱辛未工部尚書致仕許寂卒以權知魏府事右千牛將軍張令昭為齊州防禦使以捧聖右第三指揮使邢立為德州刺史以捧聖第五指揮使康褔進為鄚州刺史案康褔進疑當作康褔據册府元龜引薛史亦作康褔進今姑存其舊舊五代史考異甲戌以汴州節度使范延光為天雄軍四面招討使知行府事丙子以西京留守李周為天雄軍四面副招討使兼兵馬都監詔河東將佐節度判官趙瑩以下十四人並籍沒家産秋七月戊子范延光奏領軍至鄴都攻城己丑誅右衛上將軍石重英皇城副使石重裔皆敬瑭之子也案重英通鑑作重殷又通鑑考異引廢帝實録作姪男尚食使重乂供奉官重英並與薛史不同舊五代史考異時重英等匿於民家井中獲而誅之並族所匿之家奚首領達剌干遣通事介老奏奚王李素姑謀叛入契丹已處斬訖達剌干權知本部落事辛卯沂州奏誅都指揮使石敬德並族其家敬瑭之弟也乙未以前彰武軍節度使高行周為潞州節度使充太原四面招撫排陳使招撫排陳原本脫招字今據通鑑增入影庫本粘籤以潞州節度使皇甫立為華州節度使丁酉雲州節度使沙彥珣奏此月二日夜步軍指揮使桑遷作亂以兵圍子城彥珣突圍出城就西山據雷公口三日招集兵士入城誅亂軍軍城如故辛丑以將作監丞介國公宇文頡為汝州襄城令乙巳以衛尉卿聶延祚為太子賓客戊申范延光奏此月二十一日收復鄴都羣臣稱賀己酉以禮部侍郎張昭遠為御史中丞以御史中丞呂琦為禮部侍郎充端明殿學士庚戌中書奏劉延皓賓佐等帥臣既已削奪其行軍司馬李延筠副使邊仁嗣以下望命放歸田里望命原本作望名今從册府元龜改正影庫本粘籤奏入帝大怒詔大理曰帥臣失守已行削奪其僚佐合當何罪既而竟依中書所奏壬子詔范延光誅張令昭部下五指揮及忠鋭忠肅兩指揮繼范延光奏追兵遣襲張令昭部下敗兵至邢州沙河斬首三百級並獻張令昭邢立李貴等首級又奏獲張令昭同惡捧聖指揮使米全以下諸指揮使都頭凡十三人並磔於府門癸丑左衛上將軍仇暉卒洺州奏擒獲魏府作亂捧聖指揮使馬彥柔以下五十八人邢磁州相次擒獲亂兵並送京師彰聖指揮使張萬迪以部下五百騎叛入太原詔誅家屬於懷州本營八月戊午契丹遣使梅里入朝己未以汴州節度使范延光為天雄軍節度使守太傅兼中書令以西京留守李周為汴州節度使檢校太尉同平章事癸亥應州奏契丹三千騎迫城詔端明殿學士呂琦往河東欣代諸屯戍所犒軍以左龍武大將軍袁為右監門上將軍以振武軍節度使安叔千充代北兵馬都部署己巳雲州沙彥珣奏供奉官李讓勳送夏衣到州縱酒凌轢軍都行劫殺兵馬都監張思殷都指揮使黨行進其李讓勳已處斬訖張敬達奏造五龍橋攻太原城次戊寅以鎮州節度使董溫琪充東北面副招討使己卯洺州獻野繭二十斤辛巳張敬達奏賊城內出騎軍三十隊步卒三千人衝長連城高行周襲殺入壕溺死者大半擒賊將安小喜以下百餘人甲馬一百八十匹九月甲辰張敬達奏此月十五日與契丹戰於太原城下案張敬達與契丹戰于太原薛史晉紀作辛丑蓋辛丑日戰越四日甲辰乃奏到也通鑑亦作辛丑遼史作庚午與薛史異歐陽史作甲辰戰于太原殊誤舊五代史考異王師敗績時契丹主自率部族來援太原高行周符彥卿率左右廂騎軍出鬬蕃軍引退巳時後蕃軍復成列張敬達楊光遠安審琦等陳於賊城西北倚山橫陳諸將奮擊蕃軍屢却至晡我騎軍將移陳蕃軍如山而進王師大敗投兵仗相藉而死者山積是夕收合餘衆保於晉祠南晉安寨晉祠原本作普祠今從遼史改正影庫本粘籤蕃軍塹而圍之自是音聞阻絶朝廷大恐案遼史太宗紀云己亥次太原庚子遣使諭敬瑭曰朕興師遠來當即與卿破賊會唐將高行周符彥卿以兵來拒遂勒兵陳於太原及戰佯為之却唐將張敬達楊光遠又陳于西未成列以兵薄之而行周彥卿為伏兵所斷首尾不相救敬達光遠大敗棄仗如山斬首數萬敬達走保晉安寨與薛史大略相同高模翰傳云九月徵兵出太原模翰與敬達軍接戰敗之太原圍解翌日復戰又敗之張敬達鼠竄晉安寨通鑑及契丹國志皆不言翌日復戰遼史紀傳互異疑傳文誤也孔本是日遣使侍衛步軍都指揮使符彥饒率兵屯河陽詔范延光率兵由青山路趨榆次案遼史避太宗諱作范延廣舊五代史考異詔幽州趙德鈞由飛狐路出敵軍後耀州防禦使潘環合防戍軍出慈隰以援張敬達以前絳州刺史韓彥惲為太子賓客契丹主移帳於柳林乙巳詔取二十二日幸北面軍前戊申帝發京師路經徽陵帝親行謁奠夕次河陽召羣臣議進取盧文紀勸帝駐河橋庚戌樞密使趙延壽先赴潞州辛亥幸懷州召吏部侍郎龍敏訪以機事敏勸帝立東丹王贊華為契丹主以兵援送入蕃則契丹主有後顧之患不能久駐漢地矣帝深以為然竟不行其謀案遼史義宗傳云倍雖在異國常思其親問安之使不絶後明宗養子從珂弒其君自立倍密報太宗曰從珂弒君盍討之是東丹王實啓兵端唐君臣或知其陰謀故龍敏之説不行舊五代史考異帝自是酣飲悲歌形神慘沮臣下勸其親征則曰卿輩勿説石郎使我心膽墮地其怯憊也如此冬十月丁巳夜彗星出虛危長尺餘壬戌詔天下括馬又詔民十戶出兵一人器甲自備案契丹國志云唐發民為兵每七戶出征夫一人自備鎧仗謂之義軍凡得馬二千餘匹征夫五千人民間大擾與薛史互有詳略今附録于此戊辰代州刺史張朗超授檢校太保以其屢殺敵衆故以是命奬之癸酉幽州趙德鈞以本軍二千騎與鎮州董溫琪由吳兒谷趨潞州十一月戊子以趙德鈞為諸道行營都統以趙延壽為河東道南面行營招討使以劉延朗副之庚寅以范延光為河東道東南面行營招討使以李周副之帝以呂琦嘗佐幽州幕乃命齎都統官告以賜德鈞兼犒軍士琦至從容宣帝委任之意德鈞曰既以兵相委焉敢惜死德鈞志在並范延光軍奏請與延光會合帝以詔諭延光延光不從丁酉延州上言節度使楊漢章為部衆所殺以前坊州刺史劉景巖為延州留後庚子趙德鈞奏大軍至團柏谷前鋒殺蕃軍五百騎范延光奏軍至榆次蕃軍退入河東川界潘環奏隰州逐退蕃軍壬寅趙德鈞奏軍出谷口蕃軍漸退契丹主見駐柳林寨案遼史初圍晉安分遣精兵守其要害以絶援兵之路而李從珂遣趙延壽以兵二萬屯團柏谷范延廣以兵二萬屯遼州幽州趙德鈞以所部兵萬餘由上黨趨延壽軍合勢進擊知此有備皆逗遛不進通鑑云契丹主雖軍柳林其輜重老弱皆在虎北口每日冥結束以備倉卒遁逃所契丹軍勢彼此互異孔本時德鈞纍奏乞授延壽鎮州節制帝怒曰德鈞父子堅要鎮州苟能逐退蕃戎要代豫位亦甘心矣若玩寇要君但恐犬兔俱斃德鈞聞之不悅閏月丙辰日南至羣臣稱賀於行宮帝曰晉安寨內將士應思家國矣因泣下久之丁巳以岢嵐軍為勝州辛酉以右龍武統軍李從昶為左龍武統軍以前邠州節度使楊思權為右龍武統軍壬戌丹州刺史康承詢停任配流鄧州時承詢奉詔率義軍赴延州義軍亂承詢奔鄜州故有是責甲子太原行營副招討使楊光遠殺招討使張敬達於晉安寨以兵降契丹案歐陽史通鑑俱作閏十一月甲子五代春秋作十一月誤舊五代史考異時契丹圍寨自十一月以後芻糧乏絶軍士毀居屋茅淘馬糞削松柿以供飼松柿原本作松肺今據歐陽史改正影庫本粘籤馬尾鬣相食俱盡楊光遠謂敬達曰少時人馬俱盡不如奮命血戰十得三四猶勝坐受其弊敬達曰更少待之一日光遠伺敬達無備遂殺之與諸將同降契丹時馬猶有五千匹戎王並以漢軍與石敬瑭其馬及甲仗即齎驅出塞案遼史云所降軍士及馬五千匹以賜晉帝與薛史異通鑑從薛史舊五代史考異丁卯戎王立石敬瑭為大晉皇帝約為父子之國改元為天褔案歐陽史作十一月丁酉契丹立晉通鑑考異引廢帝實録作閏月丁卯薛史蓋據實録也通鑑從歐陽史舊五代史考異案契丹立晉是書晉高祖紀作十一月丁酉此紀作閏月丁卯前後互異據通鑑考異引廢帝實録亦作閏月丁卯蓋契丹立晉在十一月丁酉唐人至閏十一月丁卯始奏聞也實録誤以奏聞之日為立晉之日是書唐紀亦仍其誤殿本戎王與晉高祖南行趙德鈞父子與諸將自團柏谷南奔王師為蕃騎所蹙投戈棄甲自相騰踐擠於巖谷者不可勝紀案通鑑丁卯至團柏與唐兵戰趙德鈞趙延壽先遁符彥饒張彥琦劉延朗劉在明繼之蓋繫日以薛史為據遼史作庚申聞德鈞等援兵將遁詔夜發兵追擊與薛史異孔本己巳帝聞晉安寨為敵所陷詔移幸河陽時議以魏府軍尚全戎王必憚山東未敢南下車駕可幸鄴城帝以李嵩與范延光相善召入謀之薛文遇不知而繼至帝變色嵩躡文遇足乃出帝曰我見此物肉顫適擬抽刀刺之嵩曰文遇小人致誤大事刺之益醜益醜原本作益魏今從通鑑改正影庫本粘籤嵩因請帝歸京壬申車駕至河陽甲戍晉高祖與戎王至潞州戎王遣蕃將大相溫率五千騎送晉高祖南行丁丑車駕至自河陽時左右勸帝固守河陽居數日符彥饒張彥琪至奏帝不可城守是日晚至東上門小黃門鳴鞘於路索然無聲己卯帝遣馬軍都指揮使宋審虔率千餘騎至白馬坡案胡三省注通鑑云白司馬阪在洛陽北史遺司字孔本言踏陳地時諸將謂審虔曰何地不堪交戰誰人肯立於此審虔乃請帝還宮庚辰晉高祖至河陽辛巳辰時帝舉族與皇太后曹氏自燔於玄武樓晉高祖入洛得帝燼骨於火中來年三月詔葬於徽陵之封中帝在位共二年年五十三永樂大典卷七千一百七十四五代史闕文晉高祖引契丹圍晉安寨降楊光遠清泰帝至自覃懷京師父老迎帝於上東門外帝垂泣不止父老奏曰臣等伏聞前唐時中國有難帝王多幸蜀以圖進取陛下何不且入西川帝曰本朝兩川節度使皆用文臣所以玄宗僖宗避寇幸蜀今孟氏已稱尊矣吾何歸乎因慟哭入內舉族自焚史臣曰末帝負神武之才有人君之量由尋戈而踐阼慚德應深及當寧以居尊政經未失屬天命不祐人謀匪臧坐俟焚如良可悲矣稽夫衽金甲於河壖之際斧眺樓於梁壘之時出沒如神何其勇也及乎駐革輅於覃懷之日絶羽書於汾晉之辰涕淚霑襟何其怯也是知時之來也雕虎可以生風運之去也應龍不免為醢則項籍悲歌於帳下信不虛矣永樂大典卷七千一百七十四
