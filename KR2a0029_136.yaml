body:
  text: 何幸與不幸相去之遠也何幸與不何幸與何幸與不何幸與不幸相去何何幸與不幸相去之何幸與不幸何幸與不幸相何何何幸與何幸與不幸相去之遠也永樂大典卷一萬三千一百六十一何幸與不幸相去之遠也永樂大典卷一萬三千一百六十一何幸與不幸相去之遠也永樂大典卷一萬三千一百六十一何幸與不幸相去之遠也永樂大典卷一萬三千一百六十一何幸與不幸相去之遠也永樂大典卷一萬三千一百六十一何幸與不幸相去之遠也永樂大典卷一萬三千一百六十一何幸與不幸相去之遠也永樂大典卷一萬三千一百六十一何幸與不幸相去之遠也永樂大典卷一萬三千一百六十一何幸與不幸相去之遠也永樂大典卷一萬三千一百六十一何幸與不幸相去之遠也永樂大典卷一萬三千一百六十一何幸與不幸相去之遠也永樂大典卷一萬三千一百六十一
