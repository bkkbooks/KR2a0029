body:
  text: 舊五代史卷一百一十四周書五世宗紀第一世宗睿武孝文皇帝諱榮太祖之養子蓋聖穆皇后之姪也本姓柴氏父守禮太子少保致仕案隆平集云柴翁者嘗獨居室人以為司冥事一日笑不止妻問其故不答翁嗜酒妻醉之以酒乃曰上帝有命郭郎為天子考柴翁即守禮之父史佚其名舊五代史考異帝以唐天祐十八年歲在辛巳九月二十四日丙午生於邢州之別墅邢州原本作雒州今據五代會要改正影庫本粘籤年未童冠因侍聖穆皇后在太祖左右時太祖無子家道淪落然以帝謹厚故以庶事委之帝悉心經度資用獲濟太祖甚憐之乃養為己子漢初太祖以佐命功為樞密副使帝始授左監門衛將軍案國老談苑云周世宗在漢為諸衛將軍嘗遊畿甸謁縣令忘其姓名令方聚邑客蒱博勿得見世宗頗銜之及即位令因部夫犯贓數百匹宰相范質以具獄上奏世宗曰親民之官贓狀狼藉法當處死范質奏曰受所監臨財物有罪上贓雖多法不至死世宗怒厲聲曰法者自古帝王之所制本以防姦朕立法殺贓吏非酷刑也質曰陛下殺之則可若付有司臣不敢署敕遂貸其命舊五代史考異二年太祖鎮鄴改天雄軍牙內都指揮使領貴州刺史檢校右僕射三年冬太祖入平內難留帝守鄴城廣順元年正月太祖踐祚帝懇求入覲忽夢至河而不得渡尋授澶州節度使檢校太保封太原郡侯帝在鎮為政清肅盜不犯境先是澶之里弄湫隘公署毀圮帝即廣其街肆增其廨宇吏民賴之案宋史王贊傳周世宗鎮澶淵每旬決囚贊引律令辨析中理問之知其嘗事學問即署右職舊五代史考異二年正月兗州慕容彥超反帝纍表請征行太祖嘉之及曹英等東討數月無功太祖欲親征召羣臣議其事宰臣馮道奏以方當盛夏車駕不宜衝冒太祖曰寇不可玩如朕不可行當使澶州兒子擊賊方辦吾事時樞密王峻意不欲帝將兵故太祖親征六月兗州平十二月加檢校太傅同平章事三年正月帝入覲三月授開封尹兼功德使封晉王顯德元年正月庚辰加開府儀同三司開府原本作開封今據文改正影庫本粘籤檢校太尉兼侍中依前開封尹兼功德使判內外兵馬事時太祖寢疾彌留士庶憂沮及聞帝總內外兵柄咸以為愜案隆平集曹翰隸世宗幕下世宗鎮澶淵以為牙校及尹開封翰猶在澶淵聞周祖寢疾不俟召來見世宗密言曰王為冢嗣不事醫藥何以副天下望世宗悟入侍禁中以府事命翰總決舊五代史考異壬辰太祖崩祕不發喪丙申內出太祖遺制晉王榮可於柩前即位羣臣奉帝即皇帝位庚子宰臣馮道率百僚上表請聽政凡三上壬寅帝見羣臣於萬歲殿門之東廡下二月庚戌潞州奏河東劉崇與契丹大將軍楊衮舉兵南指壬戌宰臣馮道率百僚上表請御殿凡三上允之丁卯以中書令馮道充山陵使太常卿田敏充禮儀使兵部尚書張昭充鹵簿使御史中丞張煦充儀仗使開封少尹權判府事王敏充橋道使河東賊將張暉率前鋒自團柏谷入寇帝召羣臣議親征宰臣馮道等奏以劉崇自平陽奔遁之後勢弱氣奪未有復振之理竊慮聲言自來以誤於我陛下纂嗣之初先帝山陵有日人心易搖不宜輕舉命將禦寇深以為便帝曰劉崇幸我大喪聞我新立自謂良便必發狂謀謂天下可取謂神器可圖此際必來斷無疑耳馮道等以帝鋭於親征因固諍之帝曰昔唐太宗之創業靡不親征朕何憚焉道曰陛下未可便學太宗帝又曰劉崇烏合之衆苟遇王師必如山壓卵耳道曰不知陛下作得山否作得山否原本作昨待山否今從通鑑改正影庫本粘籤帝不悅而罷詔諸道募山林亡命之徒有勇力者送於闕下仍目之為強人帝以趫捷勇猛之士多出於羣盜中故令所在招納有應命者即貸其罪以禁衛處之至有朝行殺奪暮升軍籍讎人遇之不敢仰視帝意亦患之其後頗有不獲宥者三月丁丑潞州奏河東劉崇入寇兵馬監押穆令均部下兵士為賊軍所襲官軍不利詔天雄軍節度使符彥卿領兵自磁州固鎮路赴潞州以澶州節度使郭崇副之詔河中節度使王彥超領兵取晉州路東向邀擊以陝府節度使韓通為副命宣徽使向訓馬軍都指揮使樊愛能步軍都指揮使何徽滑州節度使白重贊鄭州防禦使史彥超前耀州團練使符彥能等領兵先赴澤州辛巳制大赦天下常赦所不原者咸赦除之諸貶降責授官量與升陟用應配流徒役人並放逐便諸道州府所缺去年夏秋租稅並放內外見任文武職官並與加恩父母在者並與恩澤亡沒者與封贈其母妻未者特與封云前涇州節度使史懿卒癸未詔以劉崇入寇車駕取今月十一日親征甲申以樞密使鄭仁誨為東京留守乙酉車駕發京師壬辰至澤州癸巳王師與河東劉崇契丹楊衮大戰於高平賊軍敗績初車駕行次河陽聞劉崇自潞而南即倍程而進是月十八日至澤州既晡帝御戎服觀兵於東北郊距州十五里夜宿於村舍十九日前鋒與賊軍相遇賊陳於高平縣南之高原有賊中來者云劉崇自將騎三萬並契丹萬餘騎嚴陳以待官軍帝促兵以擊之崇東西列陳頗亦嚴整乃令侍衛馬步軍都虞候李重進滑州節度使白重贊將左居陳之西廂侍衛馬軍都指揮使樊愛能步軍都指揮使何徽將右居陳之東廂宣徽使向訓鄭州防禦使史彥超以精騎當其中殿前都指揮使張永德以禁兵衛蹕帝介馬觀戰兩軍交鋒未幾樊愛能何徽望賊而遁東廂騎軍亂步軍解甲投賊帝乃自率親騎臨陳督戰案隆平集馬仁瑀傳從世宗親征劉崇王師不利仁瑀謂衆曰主辱臣死因躍馬大呼引弓連斃將卒數十士氣始振舊五代史考異今上馳騎於陳前先犯其鋒戰士皆奮命爭先賊軍大敗日暮賊萬餘人阻澗而陳會劉詞領兵至與大軍迫之賊軍又潰臨陳斬賊大將張暉張暉通鑑考異引晉陽見聞録作張令徽考歐陽史十國春秋俱同薛史作張暉今附識於此影庫本粘籤及僞樞密使王延嗣案九國志作張元徽乘勢復入馬倒為周師所擒殺之與薛史異通鑑從薛史舊五代史考異案九國志張元徽傳元徽為前鋒與周師遇于巴公元徽以東師先登陷陳擒監軍使一人降其步卒千人而旋劉崇大褒賞之元徽乘勝復入馬倒為周師所擒殺之考薛史作大將張暉戰于高平縣南與九國志人名地名互異通鑑從薛史孔本諸將分兵追襲殭尸棄甲填滿山谷初夜官軍至高平降賊軍數千人所獲輜重兵器駝馬僞乘輿器服等不可勝紀其夕殺降軍二千餘人我軍之降敵者亦皆就戮初兩軍之未整也風自東北起不便於我及與賊軍相遇風勢陡回人情相悅戰之前夕有大星如日流行數丈墜於賊營之上及戰北人望見官軍之上有雲氣如龍虎之狀則天之助順亶其然乎案九國志張元徽傳前鋒兵將次巴公一夕營中刁斗皆嗄元徽亟遣詣劉崇大營易之凡易數十皆嗄而不可擊因以白崇崇怒曰故要吾金鈿耶遂止是夜有大星墜元徽營中明日果敗孔本是日危急之勢頃刻莫保賴帝英武果敢親臨寇敵不然則社稷幾若綴旒矣是夕帝宿於野次甲午次高平縣詔賜河東降軍二千餘人各絹二匹並給其衣裝鄉兵各給絹一匹放還本部是日大雨戊戌車駕至潞州案歐陽史作丁酉幸潞州與薛史異通鑑從歐陽史五代春秋作丙戌誤河南府上言前青州節度使常思卒己亥侍衛馬軍都指揮使夔州節度使樊愛能夔州原本作萱州今從通鑑改正影庫本粘籤侍衛步軍都指揮使壽州節度使何徽等並諸將校七十餘人並伏誅高平之役兩軍既成列賊騎來挑戰愛能望風而退何徽以徒兵陳於後為奔騎所突即時潰亂二將南走帝遣近臣宣諭止遏莫肯從命皆揚言曰官軍大敗餘衆已解甲矣至暮以官軍克捷方稍稍而回帝至潞州録其奔遁者自軍使以上及監押使臣並斬之由是驕將墮兵無不知懼帝以何徽有平陽守禦之功欲貸其罪竟不可與愛能俱殺之皆給槥車歸葬案東都事略世宗謂張永德曰樊愛能及偏裨七十餘人吾欲盡按軍法何如對曰必欲開拓疆宇威加四海安可已也世宗善其言悉誅愛能等以徇軍聲始振舊五代史考異庚子以侍衛馬步都虞候李重進為許州節度使以宣徽南院使向訓為滑州節度使以殿前都指揮使張永德為武信軍節度使職並如故以滑州節度使白重贊為鄜州節度使以鄭州防禦使史彥超為華州節度使賞高平之功也以晉州節度使藥元福為同州節度使以宣徽北院使楊廷璋為晉州節度使以同州節度使張鐸為彰義軍節度使以客省使吳延祚為宣徽北院使以龍捷左廂都指揮使李千為蔡州防禦使以龍捷右廂都指揮使田中為密州防禦使以虎捷右廂都指揮使張順為登州防禦使以龍捷左第二軍都指揮使孫延進為鄭州防禦使以前耀州團練使符彥能為澤州防禦使以散員都指揮使李繼勳為殿前都虞候以殿前都虞候韓令坤為龍捷左廂都指揮使以鐵騎第一軍都指揮使趙弘殷案原本注宣祖廟諱四字今據宋史改作弘殷為龍捷右廂都指揮使以散員都指揮使慕容延釗為虎捷左廂都指揮使以控鶴第一軍都指揮使趙鼎為虎捷右廂都指揮使並遙授團練使其餘改轉有差壬寅以天雄軍節度使衛王符彥卿為河東行營都部署知太原行府事以澶州節度使郭崇為行營副部署以宣徽南院使向訓為行營兵馬都監以侍衛都虞候李重進為行營都虞候以華州節度使史彥超為先鋒都指揮使領步騎二萬進討河東詔河中節度使王彥超陝府節度使韓通率兵自陰地關討賊以河陽節度使劉詞為隨駕都部署以鄜州節度使白重贊為隨駕副部署夏四月乙巳太祖靈駕發東京乙卯葬於嵩陵河中節度使王彥超奏僞汾州防禦使董希顏以城歸順案宋史王彥超傳彥超自陰地關與符彥卿會兵圍汾州諸將請急攻彥超曰城已危矣旦暮將降我士卒精鋭驅以先登必死傷者衆少待之翼日州將董希顏果降舊五代史考異董希顏原本作革希顏今從通鑑改正影庫本粘籤丙辰僞遼州刺史張漢超以城歸順丁巳幸柏谷寺遣右僕射平章事判三司李穀赴河東城下計度軍儲詔河東城下諸將招撫戶口禁止侵掠只令徵納當年租稅及募民入粟五百斛草五百圍者賜出身千斛千圍者授州縣官辛酉符彥卿奏嵐憲二州歸順壬戌制立衛國夫人符氏為皇后仍令有司擇日備禮冊命王彥超奏收下石州獲僞刺史安彥進案宋史王彥超傳引兵趣石州彥超親鼓士乘城躬冒矢石數日下之擒其守將安彥進獻行在舊五代史考異癸亥僞沁州刺史李廷誨以城歸順甲子皇妹壽安公主張氏進封晉國長公主乙丑東京奏太師中書令馮道薨丙寅太祖皇帝神主祔於太廟庚午曲赦潞州見禁罪人除死罪外並釋放是日車駕發潞州親征劉崇癸酉欣州僞監軍李勍殺刺史趙臯及契丹大將楊耨姑以城歸順詔授李勍欣州刺史五月乙亥以尚書右丞邊歸讜守本官充樞密直學士以尚書戶部侍郎陶穀守本官充翰林學士案宋史陶穀傳從征太原時魚崇諒迎母後至穀乘間言曰崇諒宿留不來有顧望意世宗疑之崇諒又表陳母病詔許歸陝州就養以穀為翰林學士舊五代史考異丙子車駕至太原城下是日僞代州防禦使鄭處謙以城歸順案遼史穆宗紀四年五月乙亥欣代二州叛據薛史則欣州歸順在四月代州歸順在五月丙子與遼史月日互異丁丑觀兵於太原城下帝親自慰勉錫賚有差升代州為節鎮以靜塞軍為額以鄭處謙為節度使戊寅斬僞命石州刺史安彥進於太原城下以其拒王師也庚辰以前中武軍節度使郭從義為天平軍節度使遣符彥卿郭從義向訓白重贊史彥超等率步騎萬餘赴欣州案宋史符彥卿傳彥卿之行也世宗以並人雖敗朝廷饋運不繼未議攻擊且令觀兵城下徐圖進取及周師入境汾晉吏民望風款接皆以久罹虐政願輸軍需以資兵力世宗從之而連下數州彥卿等皆以芻糧未備欲旋軍世宗不之省乃調山東近郡挽軍食濟之舊五代史考異是夜大風發屋拔樹壬午以宰臣李穀判太原行府事辛丑升府州為節鎮以永安軍為軍額以本州防禦使折德扆為節度使六月癸卯朔詔班師車駕發離太原時大集兵賦及徵山東懷孟蒲陝丁夫數萬急攻其城旦夕之間期於必取會大雨時行軍士勞苦復以欣口之師不振帝遂決旋師之意指麾之間頗傷匆遽部伍紛亂無復嚴整不逞之徒訛言相恐隨軍資用頗有遺失者賊城之下糧草數十萬悉焚棄之案通鑑考異引晉陽見聞録云六月旦周師南轅返旆惟數百騎間之以步卒千人長槍赤甲衒趫捷跳梁于城隅晡晚殺行而抽退宋史藥元福傳詔令班師元福上言曰進軍甚易退軍甚難世宗曰一以委卿遂部分卒伍為方陳而南元福以麾下為後殿崇果出兵來追元福擊走之舊五代史考異乙巳車駕至潞州癸丑帝發潞州乙丑幸新鄭縣丙寅帝親拜嵩陵祭奠而退案五代會要云顯德元年二月車駕征太原回親拜嵩陵望陵號慟至陵所俯伏哀泣感于左右再拜訖祭奠而退舊五代史考異賜守陵將吏及近陵戶帛有差庚午帝至自河東帝至自河東原本脫自字今據五代春秋增入影庫本粘籤秋七月癸酉朔前河西軍節度使申師厚責授右監門衛率府副率師厚在涼州歲餘以所部艱食蕃情反覆奏乞入朝尋留其子為留後不俟詔離任故責之乙亥天雄軍節度使衛王符彥卿進位守太傅改封魏王鄆州郭從義加兼中書令河陽劉詞移鎮永興軍加兼侍中潞州李筠加兼侍中河中王彥超移鎮許州加兼侍中許州節度侍衛都虞候李重進移鎮宋州加同平章事兼侍衛親軍都指揮使以武信軍節度使兼殿前都指揮使張永德為滑州節度使加檢校太傅典軍如故同州藥元福移鎮陝州藥元福原本作元祉今從通鑑改正影庫本粘籤加檢校太尉鄜州白重贊移鎮河陽加檢校太尉陝州韓通移鎮曹州加檢校太傅帝即位之初覃慶於諸侯且賞從征之功也丙子以前禮部侍郎邊光範為刑部侍郎權判開封府事丁丑天下兵馬元帥吳越國王錢俶加天下兵馬都元帥襄州節度使陳王安審琦加守太尉戊寅右散騎常侍張可復卒以前亳州防禦使李萬金為鄜州留後庚辰幸南莊辛巳荊南節度使南平王高保融加守中書令夏州節度使西平王李彝興加守太保西京留守武行德徐州王晏鄧州侯章並加兼中書令癸未湖南王進逵加兼中書令天德軍節度使郭勳邠州折從阮安州李洪義並加兼侍中以前華州節度使孫方諫為同州節度使加兼中書令以前永興軍節度使王仁鎬為河中節度使加檢校太尉乙酉滄州李暉貝州王饒鎮州曹英並加兼侍中涇州張鐸相州王進延州袁並加檢校太尉壬辰百僚上表請以九月二十四日誕聖日為天清節天清節原本作本清今從五代會要改正影庫本粘籤從之癸巳以左僕射兼門下侍郎平章事監修國史范質為守司徒兼門下侍郎平章事弘文館大學士案國老談苑云周太祖嘗令世宗詣范質時為親王軒車高大門不能容世宗即下馬步入及嗣位從容語質曰卿所居舊宅耶門樓一何小哉遂為治第舊五代史考異以左僕射兼中書侍郎平章事集賢殿大學士判三司李穀為守司徒兼門下侍郎平章事監修國史以中書侍郎平章事王溥為中書侍郎兼禮部尚書平章事集賢殿大學士以樞密院學士工部侍郎景範為中書侍郎平章事判三司樞密使檢校太保同平章事鄭仁誨加兼侍中靈武馮繼業定州孫行友邢州田景咸並加檢校太傅晉州楊廷璋加檢校太保以太子詹事趙上交為太子賓客乙未以樞密副使右監門衛大將軍魏仁浦為樞密使檢校太保案東都事略云議者以仁浦不由科第進世宗曰顧才何如耳遂用之舊五代史考異丙申以中書舍人史館修撰判館事劉溫叟為禮部侍郎判館如故丁酉相州節度使王進卒八月壬寅朔以宣徽北院使吳延祚為右監門衛大將軍充職以樞密院直學士尚書右丞邊歸讜為尚書左丞充職甲辰幸南莊賜從臣射乙巳以吏部侍郎顏衎為工部尚書致仕丙午同州節度使孫方諫卒己酉前澤州刺史李彥崇責授右司禦副率高平之役帝與賊軍相遇即令彥崇領兵守江猪嶺以遏寇之歸路以遏寇之歸路原本脫遏字今據冊府元龜增入影庫本粘籤彥崇初見王師已却即時而退及劉崇兵敗果由茲嶺而遁故有是責壬子以金州防禦使王暉為同州留後癸丑以吳越國內外都指揮使吳延福為寧國軍節度使檢校太尉從錢俶之請也以太子少師宋彥筠為太子太師致仕甲寅以兵部郎中兼太常博士尹拙為國子祭酒丙辰皇姑故福慶長公主追封燕國大長公主李重進之母也丁巳以戶部郎中致仕景初為太僕卿致仕宰臣範之父也己巳華州鎮國軍宜停依舊為郡庚午以給事中劉悅康澄並為右散騎常侍辛未以左散騎常侍裴巽為御史中丞以御史中丞張煦為兵部侍郎集賢殿學士判院事司徒詡為吏部侍郎以左散騎常侍薛沖為工部侍郎九月壬申朔以東京舊宅為皇建禪院皇建原本作皇逮今從五代會要改正影庫本粘籤甲戌以武安軍節度副使知潭州軍府事周行逢為鄂州節度使知潭州軍府事加檢校太尉丙戌右屯衛將軍薛訓除名流沙門島坐監雍兵倉縱吏卒掊斂也己亥以右僕射致仕韓昭裔左僕射致仕楊凝式並為太子太保致仕以太子太傅致仕李肅為太子太師致仕辛丑斬宋州巡檢供奉官副都知竹奉璘於寧陵縣坐盜掠商船不捕獲也冬十月甲辰左羽林大將軍孟漢卿賜死坐監納厚取耗餘也丙午以安州節度使李洪義為青州節度使以貝州節度使王饒為相州節度使以徐州節度使王晏為西京留守以西京留守武行德為徐州節度使戊申以龍捷左廂都指揮使泗州防禦使韓令坤為洋州節度使充侍衛馬軍都指揮使以虎捷右廂都指揮使永州防禦使李繼勳為利州節度使充侍衛步軍都指揮使己酉太子太保致仕楊凝式卒詔安貝二州依舊為防禦州其軍額並停壬子以今上為永州防禦使依前殿前都虞候戊午監修國史李穀等上言曰竊以自古王者咸建史官君臣獻替之謀皆須備載家國安危之道得以直書歷代已來其名不一人君言動則起居注創於纍朝輔相經綸則時政記興於前代然後採其事實編作史書蓋緣聞見之間須有來處記録之際得以審詳今之左右起居郎即古之左右史也唐文宗朝命其官執筆立於殿階螭頭之下以紀政事後則明宗朝命端明殿及樞密直學士皆輪修日歷旋送史官以備纂修及近朝此事皆廢史官唯憑百司報狀館司但取兩省制書此外雖有訪聞例非端的伏自先皇帝創開昌運及皇帝陛下纘嗣丕基其聖德武功神謀睿略皆係萬幾宥密丹禁深嚴非外臣之所知豈庶僚之可訪此後欲望以咨詢之事裁制之規別命近臣旋具抄録每當修撰日歷即令封付史臣庶國事無漏略之文職業免疏遺之咎從之因命樞密直學士起今後於樞密使處逐月抄録事件送付史館己未供奉官郝光庭棄市坐在葉縣巡檢日挾私斷殺平人也是日大閲帝親臨之帝自高平之役覩諸軍未甚嚴整遂有退却至是命今上一概簡閲選武藝超絶者署為殿前諸班因是有散員散指揮使內殿直散都頭鐵騎控鶴之號復命總戎者自龍捷虎捷以降一一選之老弱羸小者去之諸軍士伍無不精當由是兵甲之盛近代無比且減冗食之費焉案五代會要云顯德元年上謂侍臣曰侍衛兵士老少相半強懦不分蓋徇人情不能選練今春朕在高平與劉崇及蕃軍相遇臨敵有指使不前者苟非朕親當堅陳幾至喪敗況百戶農夫未能贍一甲士且兵在精不在衆宜令一一點選精鋭者升為上軍怯懦者任從安便庶期可用又不虛費先是上按於高平觀其退縮慨然有懲革之志又以驍勇之士多為外諸侯所占如是召募天下豪傑不以草澤為阻在于闕下躬親試閲選武藝超絶及有身首者分署為殿前諸班舊五代史考異十一月戊寅以太子賓客石光贊為兵部尚書致仕壬午鎮州節度使曹英卒乙酉以澶州節度使郭崇為鎮州節度使乙未以荊南節度副使歸州刺史高保勗為寧江軍節度使檢校太尉充荊南節度行軍司馬戊戌詔宰臣李穀監築河隄先是鄆州界河決數州之地洪流為患故命穀治之役丁夫六萬人三十日而罷十二月己酉太子太師侯益以本官致仕永樂大典卷八千九百八十四
