body:
  text: 舊五代史卷十八梁書十八列傳第八張文蔚字右華河間人也父裼案裼原本作錫考舊唐書張裼傳云字公表當以從衣為是今改正唐僖宗朝纍為顯官文蔚幼礪文行求知取友藹然有佳士之稱唐乾符初登進士第時丞相裴坦兼判鹽鐵解褐署巡官未幾以畿尉直館丁家艱以孝聞中和歲僖宗在蜀大寇未滅大寇原本作大熟今據文改正影庫本粘籤急於軍費移鹽鐵於揚州命李都就判之奏為轉運巡官駕還長安除監察御史遷左補闕侍御史起居舍人司勳吏部員外郎拜司勳郎中知制誥歲滿授中書舍人丁母憂退居東畿哀毀過禮服闋復拜中書舍人俄召入翰林為承旨學士屬昭宗初還京闕皇綱寖微文蔚所發詔令靡失厥中論者多之轉戶部侍郎仍依前充職尋出為禮部侍郎天祐元年夏拜中書侍郎平章事兼判戶部時柳璨在相位擅權縱暴傾陷賢俊宰相裴樞等五家及三省而下三十餘人咸抱寃就死縉紳以目不敢竊語其是非餘怒所注亦不啻十許輩文蔚殫其力解之乃止士人賴焉璨敗死文蔚兼度支鹽鐵使天祐四年天子以土運將革天命有歸四月命文蔚與楊涉等總率百僚奉禪位詔至大梁太祖受命文蔚等不易其位開平二年春暴卒於位詔贈右僕射文蔚沈邃重厚有大臣之風居家孝且悌雖位至清顯與仲季相雜在太夫人膝下一不異布素弟濟美早得心恙案舊唐書云文蔚弟濟美貽憲相繼以進士登第北夢瑣言云張裼尚書有五子文蔚彝憲濟美仁龜皆有名第至宰輔丞郎內一子忘其名少年聞壁魚食神仙字身有五色吞之可得仙因欲試之遂致心疾是得疾者別自一人非濟美也文蔚撫視殆三十年士君子稱之子鑄周顯德中位至祕書監永樂大典卷六千三百五十一薛貽矩字熙用河東聞喜人祖存父廷望咸有令名貽矩風儀秀聳其與遊者皆一時英妙藉甚於文場間唐乾符中登進士第歷度支巡官集賢校理拾遺殿中起居舍人召拜翰林學士加禮部員外郎知制誥轉司勳郎中其職如故乾寧中天子幸石門貽矩以私屬相失不及於行在罷之旋除中書舍人再踐內署內署原本作內書署以文義求之書字當係衍文今刪去影庫本粘籤歷戶部兵部侍郎學士承旨及昭宗自鳳翔還京大翦閹寺貽矩尚為韓全誨等作畫讚悉紀于內侍省屋壁間坐是謫官天祐初除吏部侍郎不至太祖素重之嘗言之于朝即日拜吏部尚書俄遷御史大夫四年春唐帝命貽矩持詔赴大梁議禪代之事貽矩至盛稱太祖功德請就北面之禮太祖雖謙抑不納待之甚厚受禪之歲夏五月拜中書侍郎平章事兼判戶部明年夏進拜門下侍郎監修國史判度支又遷弘文館大學士充鹽鐵轉運使纍官自僕射至守司空在任綿五載案歐史梁本紀貽矩以開平元年同平章事至乾化二年薨統計貽矩居相位共六年歐史唐六臣傳貽矩為梁相五年卒尚仍薛史之誤然亦無顯赫事迹可紀扈從貝州還染時癘旬日卒于東京詔贈侍中永樂大典卷二萬一千三百六十七張策字少逸燉煌人父同父同唐托言作父同文薛史與歐陽史合今存其舊影庫本粘籤仕唐官至容管經略使策少聰警好學尤樂章句居洛陽敦化里嘗浚甘泉井得古鼎耳有篆字曰魏黃初元年春二月匠吉千吉千原本作吉大今據歐陽史改正影庫本粘籤且又製作奇巧同甚寶之策時在父傍徐言曰建安二十五年曹公薨改年為延康其年十月文帝受漢禪始號黃初則是黃初元年無二月明矣鼎文何謬歟同大驚亟遣啓書室取魏志展讀一不失所啓宗族奇之時年十三然而妙通因果酷奉空教未弱冠落髮為僧居雍之慈恩精廬頗有高致唐廣明末大盜犯闕策遂返初服奉父母逃難君子多之及丁家艱以孝聞服滿自屏郊藪一無干進意若是者十餘載案唐托言云張策自少從學浮圖法號藏機粲名內道場為大德廣明庚子之亂趙少師崇凝主文策謂時事更變求就貢籍崇凝庭譴之策不得已復舉博學鴻詞崇凝職受天官復黜之仍顯揚其過又北夢瑣言載趙崇凝之辭曰張策衣冠子弟無故出家不能參禪訪道抗迹塵外乃于御簾前進詩希望恩澤如此行止豈掩人口某十度知舉十度斥之薛史以為自屏郊藪無仕進意與托言諸書異孔本方出為廣文博士改祕書郎王行瑜帥邠州辟為觀察支使帶水曹員外郎賜緋及行瑜反太原節度使李克用奉詔討伐行瑜敗死邠州平策與婢肩輿其親南出邠境屬邊寨積雪為行者所哀太祖聞而嘉之奏為鄭滑支使尋以內憂去職制闋除國子博士遷膳部員外郎不一歲華帥韓建辟為判官及建領許州又為掌記天復中策奉其主書幣來聘太祖見而喜曰張夫子且至矣即奏為掌記兼賜金紫案北夢瑣言云朱令公軍次于華用張濬計先取韓建其幕客張策攜印率副使李巨川同詣轅門請降張策本與張濬有分攜印而降協濬之謀是梁祖之喜張策由張濬有先入之言也天祐初表其才拜職方郎中兼史館修撰俄召入為翰林學士案唐托言云策後為梁太祖從事天祐中在翰林太祖頗倚之為謀府策極力媒崇凝竟罹寃酷孔本轉兵部郎中知制誥依前修史未幾遷中書舍人職如故太祖受禪改工部侍郎加承旨其年冬轉禮部侍郎明年從征至澤州拜刑部侍郎平章事仍判戶部尋遷中書侍郎以風恙拜章乞骸改刑部尚書致仕即日肩輿歸洛居於福善里修篁嘉木圖書琴酒以自適焉乾化二年秋卒所著典議三卷制詞歌詩二十卷箋表三十卷存於其家永樂大典卷六千三百五十一杜曉字明遠京兆杜陵人祖審權審權原本作省權今據新舊唐書改正影庫本粘籤仕唐位至宰相父讓能官至守太尉平章事乾寧中邠鳳二鎮舉兵犯王畿讓能被其誣陷天子不得已賜死於臨臯驛曉居喪柴立幾至滅性憂滿服幅巾七升沈迹自廢者將十餘載案歐陽史作自廢十餘年吳縝纂誤據景福二年讓能死乾寧四年崔遠判戶部光化三年崔遠罷相相隔止八年曉為崔遠判戶部所舉不得云自廢十餘年舊五代史考異光化中宰相崔胤判鹽鐵奏為巡官兼校書郎尋除畿尉直弘文館皆不起及昭宗東遷宰相崔遠判戶部又奏為巡官兼殿中丞或語之曰嵇中散死子紹埋沒不自顯山濤以物理勉之乃仕吾子忍令杜氏歲時以鋪席鋪席原本作補席今據歐陽史改正影庫本粘籤祭其先人同匹庶乎曉乃就官未幾拜左拾遺尋召為翰林學士轉膳部員外郎依前充職及崔遠得罪出守本官居數月以本官知制誥俄又召為學士遷郎中充職太祖受禪拜中書舍人職如故開平三年轉工部侍郎充承旨承旨應作奉旨五代會要梁時避諱改承旨為奉旨至後唐始復為承旨薛史梁書承旨與奉旨前後互見通鑑亦然蓋當時雜採諸書未及改從畫一也今姑仍其舊影庫本粘籤明年秋拜中書侍郎平章事案杜曉入相之歲歐陽史紀作三年傳作二年吳縝已辨其誤舊五代史考異仍判戶部庶人友圭篡位遷禮部尚書平章事集賢殿大學士依前判戶部及袁象先之討友圭禁兵大縱曉中重創而卒末帝即位詔贈右僕射曉博贍有詞藻時論稱之兄光乂案新唐書表光乂字啓之有心疹厥疾每作或溢喙縱詬或揮梃追撲曉事之愈恭未嘗一日少怠居兩制之重祖述前載甚得王言之體案北夢瑣言云曉貌如削玉有制誥之才及典秩尚書志氣甚遠一旦非分而沒咸寃惜焉豈三世為相道忌太盛歟永樂大典卷一萬四千七百三十敬翔字子振同州馮翊人唐神龍中平陽王暉之後也曾祖琬綏州刺史祖欣同州掾父袞集州刺史翔好讀書尤長刀筆應用敏捷乾符中舉進士不第及黃巢陷長安乃東出關時太祖初鎮大梁有觀察支使王發者翔里人也翔往依焉發以故人遇之然無由薦達翔久之計窘乃與人為箋刺往往有警句傳於軍中太祖比不知書章檄喜淺近語聞翔所作愛之謂發曰知公鄉人有才可與俱來及見應對稱旨即補右職每令從軍翔不喜武職求補文吏即署館驛巡官俾專掌檄奏太祖與蔡賊相拒纍歲城門之外戰聲相聞機略之間翔頗預之太祖大悅恨得翔之晚故軍謀政術一以咨之案通鑑考異引張昭遠莊宗列傳溫狡譎多謀人不測其際唯翔視彼舉錯即揣知其心或有所不備因為之助溫大悅自以為得翔之晚故軍謀政術一切咨之舊五代史考異蔡賊平奏授太子中允賜緋從平兗鄆改檢校水部郎中太祖兼鎮淮南授揚府左司馬揚府原本作陽府考歐陽史作揚府蓋即揚州都督府之省文今改正影庫本粘籤賜金紫乾寧中改光祿少卿充職天復中授檢校禮部尚書遙領蘇州刺史昭宗自岐下還長安御延喜樓召翔與李振登樓勞問翔授檢校右僕射太府卿賜號迎鑾叶贊功臣太祖受禪自宣武軍掌書記前太府卿授檢校司空依前太府卿勾當宣徽院事尋改樞密院為崇政院以翔知院事開平三年夏四月太祖以邠岐侵擾遣劉知俊西討鄜延深憂不濟因宴顧翔以問西事翔剖析山川郡邑虛實軍糧多少悉以條奏如素講習左右莫不驚異太祖嘆賞久之乾化元年進位光祿大夫行兵部尚書金鑾殿大學士知崇政院事平陽郡侯前朝因金巒坡金巒歐陽史通鑑俱作鸞唯五代會要與薛史同今仍從原文附識于此影庫本粘籤以為門名與翰林院相接故得為學士者稱金巒以美之今殿名金鑾從嘉名也案原本脫名字今從職官志增入舊五代史考異置大學士始以翔為之案五代會要云以金鑾為名非典也大學士與三館大學士同翔自釋褐東下遭遇霸王懷抱深沉有經濟之略起中和歲至鼎革大運其間三十餘年案歐陽史作從太祖用兵三十餘年蓋仍薛史之文吳縝纂誤云朱全忠以中和三年癸卯歲為汴州節度使至建國受禪迄于乾化二年壬申遇弒正三十年不得云三十餘年也舊五代史考異扈從征伐出入帷幄庶務叢委恆達旦不寢唯在馬上稍得晏息每有所裨贊亦未嘗顯諫上俯仰顧步間微示持疑爾而太祖意已察必改行之故裨佐之迹人莫得知及太祖大漸召至御床前受顧託之命且深以並寇為恨翔嗚咽不忍受命而退案通鑑乾化二年六月丁丑朔帝命敬翔出友圭為萊州刺史即令之官已宣旨未行敕蓋即敬翔所受之命戊寅太祖被弒命未及行故薛史亦不為詳載庶人友圭之篡位也以天下之望命翔為宰相友圭以翔先朝舊臣有所畏忌翔亦多稱病不綜政事末帝即位趙張之族皆處權要翔愈不得志及劉鄩失河朔安彥之喪楊劉翔奏曰國家連年遣將出征封疆日削不獨兵驕將怯亦制置未得其術陛下處深宮之中與之計事者皆左右近習豈能量敵之勝負哉先皇時河朔半在親御虎臣驍將猶不得志於敵人今寇馬已至鄆州陛下不留聖念臣所未諭一也臣聞李亞子自墨縗統衆於今十年每攻城臨陳無不親當矢石昨聞攻楊劉率先負薪渡水一鼓登城陛下儒雅守文未嘗如此俾賀瓌賀瓌原本作環册府元龜引薛史亦作環新舊唐書歐陽史及通鑑皆作瓌今改正影庫本粘籤輩與之較力而望攘逐寇戎臣所未諭二也陛下所宜詢於黎老別運沉謀不然則憂未艾也臣雖駑怯受國恩深陛下必若乏材乞於邊陲效試末帝雖知其懇惻竟以趙張輩言翔怨望不之聽及王彥章敗於中都晉人長驅而南末帝急召翔謂之曰朕居常忽卿所奏果至今日事急矣勿以為懟且使朕安歸翔泣奏曰臣受國恩僅將三紀從微至著皆先朝所遇雖名宰相實朱氏老奴耳事陛下如郎君以臣愚誠敢有所隱陛下初任段凝為將臣已極言小人朋附致有今日晉軍即至段凝限水欲請陛下出居避狄陛下必不聽從欲請陛下出奇應敵陛下必不果決縱良平復生難以轉禍為福請先死不忍見宗廟隕墜言訖君臣相向慟哭及晉主陷都城有詔赦梁氏臣僚李振謂翔曰有制洗滌將朝新君翔曰新君若問其將何辭以對是夜翔在高頭里第宿於車坊案原本作中今據歐陽史及通鑑改正舊五代史考異欲曙左右報曰崇政李太保已入朝翔返室嘆曰李振謬為丈夫耳朱氏與晉仇讎我等始同謀畫致君無狀今少主伏劍于國門縱新朝赦罪何面目入建國門也乃自經而卒數日並其族被誅初貞明中史臣李琪張袞郤殷象馮錫嘉奉詔修撰太祖實録三十卷述非工事多漏略復詔翔補緝其闕翔乃別纂成三十卷目之曰大梁編遺録與實録偕行案編遺録通鑑考異引之書録解題云朱梁興創遺編二十卷梁宰相敬翔子振撰自廣明巢賊之亂朱溫事迹迄於天祐弒逆大書特書不以為愧也其辭亦鄙俚舊五代史考異翔妻劉氏父為藍田令廣明之亂劉為巢將尚讓所得巢敗讓攜劉降於時溥及讓誅時溥納劉於妓室太祖平徐得劉氏嬖之屬翔喪妻因以劉氏賜之及翔漸貴劉猶出入太祖臥內翔情禮稍薄劉於曲室讓翔曰卿鄙余曾失身於賊耶以成敗言之尚讓巢之宰輔時溥國之忠臣論卿門第辱我何甚請從此辭翔謝而止之劉恃太祖之勢案原本下有缺文太祖四鎮時劉已得國夫人之號車服驕侈婢媵皆珥珠翠其下別置爪牙典謁書幣聘使交結藩鎮近代婦人之盛無出其右權貴皆相附麗寵信言事不下於翔當時貴達之家從而效之敗俗之甚也永樂大典卷一萬八千四百二十四五代史補敬翔應三傳數舉不第發憤投太祖願備行陳太祖問曰足下通春秋久矣今吾主盟其為戰欲效春秋時可乎翔曰不可夫禮樂猶不相沿襲況兵者詭道宜其變化無窮若復如春秋時則所謂務虛名而喪其實效大王之事去矣太祖大悅以為知兵遽延之幕府委以軍事竟至作相李振字興緒唐潞州節度使抱真之曾孫也祖父皆至郡守振仕唐自金吾將軍改台州刺史會盜據浙東不克之任因西歸過汴以策略干太祖太祖奇之辟為從事太祖兼領鄆州署天平軍節度副使湖南馬殷為朗州雷滿所逼振奉命馳往和解殷滿皆稟命光化三年十一月太祖遣振入奏於長安舍於州邸邸吏程巖白振曰劉中尉命其姪希貞來計大事案原本作希直今據通鑑改正舊五代史考異欲上謁願許之既至巖乃先啓曰主上嚴急內官憂恐左中尉欲行廢黜之事巖等協力以定中外敢以事告振顧希貞曰百歲奴事三歲主亂國不義廢君不祥非敢聞也況梁王以百萬之師匡輔天子禮樂尊戴猶恐不及幸熟計之希貞大沮而去案通鑑考異疑李振之拒希貞為誤謂李振若已立異豈敢復入長安與崔胤謀反正乎今考梁祖紀亦云李振自長安使回當時季述懼汴梁兵力固不能阻李振之往來薛史所書宜可徵信及振復命劉季述等果作亂程巖率諸道邸吏牽帝下殿以立幼主奉昭宗為太上皇振至陝陝已賀矣護軍韓彝範言其事振曰懿皇初升遐韓中尉殺長立幼以利其權遂亂天下今將軍復欲爾耶彝範即文約孫也由是不敢言振東歸太祖方在邢洺遽還于汴大計未決季述遣養子希度以唐之社稷欲輸于太祖又遣供奉官李奉本案原本脫奉本二字據本傳增入舊五代史考異副介支彥勳詐齎上皇誥諭至皆季述黨也太祖未及迎命振又言曰夫豎刁伊戾之亂所以資霸者之事也今閹豎幽辱天子王不能討無以令諸侯時監軍使劉重楚季述兄也舊相張濬寓於河南緱氏亦來謂太祖曰同中官則事易濟且得所欲唯振堅執不改獨曰行正道則大勳可立太祖英悟忽厲色曰張公勸我同敕使欲傾附自求宰相耶案舊唐書昭宗紀崔胤與前左僕射張濬告難于全忠張濬傳亦云德王廢立之際濬致書諸藩請圖匡復薛史作張濬黨于季述為梁祖所拒與舊唐書異乃定策縶偽使李奉本支彥勳與希度等即日請振將命于京師與宰相謀返正未幾劉季述伏誅昭宗復帝位太祖聞之喜召振執其手謂之曰卿所謀是吾本志穹蒼其知之矣自是益重之天祐二年春正月太祖召振謂曰王師範來降易歲尚處故藩今將奏請徙授方面其為我馳騎以茲意達之振至青州師範即日出公府以節度觀察二印及文簿管鑰授於振師範雖已受代而疑撓特甚屢揮泣求貸其族振因以切理諭之曰公不念張繡事耶漢末繡屢與曹公立敵豈德之耶及袁紹遣使招繡賈詡曰袁家父子自不相容何能主天下英士曹公挾天子令諸侯其志大不以私讎為意不宜疑之今梁王亦豈以私怨私怨原本作私恕今據文改正影庫本粘籤害忠賢耶師範灑然大悟翌日以其族遷太祖乃表振為青州留後未幾徵還唐自昭宗遷都之後王室微弱朝廷班行備員而已振皆頤指氣使旁若無人朋附者非次奬升私惡者沈棄振每自汴入洛朝中必有貶竄故唐朝人士目為鴟梟天祐中唐宰相柳璨希太祖旨譖殺大臣裴樞陸扆等七人於滑州白馬驛時振自以咸通乾符中嘗應進士舉纍上不第尤憤憤乃謂太祖曰此輩自謂清流宜投於黃河永為濁流太祖笑而從之洎太祖受禪自宣義軍節度副使檢校司徒授殿中監纍遷戶部尚書庶人友圭篡立代敬翔為崇政院使末帝即位趙張二族用事遂為所間謀猷獻替多不見從振每稱疾避事龍德末間居私第將期矣晉主入汴振謁見首罪郭崇韜指振謂人曰人言李振乃一代奇才吾今見之乃常人耳會段凝等疏梁氏權要之臣振與敬翔等同日族誅永樂大典卷一萬三百八十六史臣曰文蔚貽矩皆唐朝之舊臣遇梁室之強禪奉君命以來使狎神器以授之逢時若斯亦為臣者之不幸也抑不為其相不亦善乎杜曉著文雅之稱張策有沖淡之量咸登台席無忝士林敬翔李振始輔霸圖終成帝業及國之亡也一則殞命以明節一則視息以偷生以此較之翔為優矣振始有濁流之言終取赤族之禍報應之事固以昭然永樂大典卷一萬三百八十八
