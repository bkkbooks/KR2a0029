body:
  text: 舊五代史卷八十五晉書十一少帝紀第五開運三年冬十月甲子正衙命使册皇太妃安氏乙丑以樞密直學士禮部侍郎邊光範為翰林學士以給事中邊歸讜為左散騎常侍以翰林學士祠部員外郎知制誥張沆為右諫議大夫辛未以鄴都留守杜威為北面行營都招討使案通鑑載當時敕榜曰先取瀛鄚安定關南次復幽燕蕩平塞北蓋狃於陽城之役而驟驕也舊五代史考異以侍衛親軍都指揮使鄆州節度使李守貞為兵馬都監兗州安審琦為左右廂都指揮使徐州符彥卿為馬軍左廂都指揮使滑州皇甫遇為馬軍右廂都指揮使貝州梁漢璋為馬軍都排陳使前鄧州案原本有闕文宋彥筠為步軍左廂都指揮使奉國左廂都指揮使王饒為步軍右廂都指揮使洺州團練使薛懷讓為先鋒都指揮使癸酉册吳國夫人馮氏為皇后乙亥以侍衛馬軍都指揮使李彥韜權知侍衛司事丙戌鳳翔節度使秦王李從曮薨輟朝贈尚書令丁亥邠州節度使李德珫卒輟朝贈太尉十一月戊子朔以給事中盧撰為右散騎常侍以尚書兵部郎中兼侍御史知雜事陳觀為左諫議大夫觀以祖諱義乞改官尋授給事中庚寅樞密使中書侍郎兼戶部尚書平章事馮玉加尚書右僕射以皇子鎮寧軍節度使延煦為陝州節度使以陝州留後焦繼勳為鳳翔留後以前定州留後安審琦為邠州留後以右僕射和凝為左僕射甲午兩浙節度使吳越國王錢弘佐起復舊任丁酉詔李守貞知幽州行府事戊申日南至御崇元殿受朝賀是月北面行營招討使杜威率諸將領大軍自鄴北征師次瀛州城下貝州節度使梁漢璋戰死杜威等以漢璋之敗遂收軍而退行次武強聞戎王入寇欲取直路自冀貝而南會張彥澤領騎自鎮定至且言契丹可破之狀於是大軍西趨鎮州十二月丁巳朔案以下有闕文據通鑑云丁巳朔李穀自書密奏言大軍危急之勢請車駕幸滑州遣高行周符彥卿扈從及發兵守澶州河陽以備敵之奔衝遣軍將關勳走馬上之舊五代史考異己未杜威奏駐軍於中渡橋案通鑑云甲寅杜威等至中渡橋十二月己未帝始聞大軍屯中渡胡三省注云強寇深入諸軍孤危而驛報七日始達晉之為兵可知矣歐陽史作己未杜威軍于中渡蓋以奏聞之日為駐軍之日舊五代史考異庚申以前司農卿儲延英為太子賓客詔徐州符彥卿屯澶州辛酉詔澤潞鄴都邢洺河陽運糧赴中渡杜威遣人口奏軍前事宜勢迫故也壬戌又遣高行周屯澶州景延廣守河陽博野縣都監張鵬入奏蕃軍事勢丙寅定州李殷奏前月二十八日夜領捉生四百人往曲陽嘉山下逢賊軍車帳殺千餘人獲馬二百匹詔宋州高行周充北面行營都部署符彥卿充副邢州方太充都虞候領後軍駐於河上以備敵騎之奔衝也時契丹遊騎涉滹水而南至欒城縣自是中渡寨為蕃軍隔絶探報不通朝廷大恐故委行周等繼領大師守扼津要且以張其勢也己巳邢州方太奏此月六日契丹與王師戰於中渡王師不利奉國都指揮使王清戰死案遼史云杜威張彥澤引兵據中渡橋趙延壽以步兵前擊高彥溫以騎兵乘之追奔逐北殭尸數萬斬其將王清宋彥筠墮水死重威等退保中渡寨義武軍節度使李殷以城降遂進兵夾滹沱而營去中渡寨三里分兵圍之夜則列騎環守晝則出兵抄掠復命趙延壽分兵圍守自將騎卒夜渡河出其後攻下樂城降騎卒數千分遣將士據其要害下令軍中預備軍食三日不得舉煙火但獲晉人即黥而縱之諸饋運見者皆棄而走於是晉兵內外隔絶食盡勢窮考遼史所載與通鑑大略相同惟宋彥筠墮水死通鑑作彥筠浮水抵岸得免自將騎卒通鑑作潛遣其將蕭翰通事劉重進將百騎及羸卒並西山出晉州之後稍有異同可資互證云孔本庚午幸沙臺射兔壬申始聞杜威李守貞等以此月十日率諸軍降於契丹案遼史杜重威等降於遼在十二月丙寅與薛史同歐陽史作壬戌疑誤考歐紀壬戌之日自紀滹沱戰敗而杜威等之降上不係日觀杜重威傳明著十二月丙寅于薛史未嘗不合也劉本是夜相州節度使張彥澤受契丹命率先鋒二千人自封丘門斬關而入癸酉旦張彥澤頓兵於明德門外京城大擾前曹州節度使石贇死帝之堂叔也時自中渡寨隔絶之後帝與大臣端坐憂危國之衛兵悉在北面計無所出十六日聞滹水之降是夜偵知張彥澤已至滑州召李嵩馮玉李彥韜入內計事方議詔河東劉知遠起兵赴難至五鼓初張彥澤引蕃騎入京宮中相次火起帝自攜劍驅擁后妃已下十數人將同赴火為親校薛超所持俄自寬仁門遞入契丹主與皇太后書帝乃止旋令撲滅煙火大內都點檢康福全在寬仁門宿衛登樓覘賊彥澤呼而下之癸酉帝奉表於戎主曰孫臣某言今月十七日寅時相州節度使張彥澤都監傅住兒部領大軍入京齎到翁皇帝賜太后書示於滹沱河降下杜重威一行馬步兵士見領蕃漢步騎來幸汴州者往者唐運告終中原失馭數窮否極天缺地傾先人有田一成有衆一旅兵連禍結力屈勢孤翁皇帝救患摧剛興利除害躬擐甲胄深入寇場犯露蒙霜度鴈門之險馳風掣電行中冀之誅黃鉞一麾天下大定勢凌宇宙義感神明功成不居遂興晉祚則翁皇帝有大造於石氏也旋屬天降鞠凶先君即世臣遵承遺旨纘紹前基諒暗之初荒迷失次凡有軍國重事皆委將相大臣至於擅繼宗祧既非稟命輕發文字輒敢抗尊自啓釁端果貽赫怒禍至神惑運盡天亡十萬師徒皆望風而束手億兆黎庶乘延頸以歸心臣負義包羞貪生忍恥自貽顛覆上纍祖宗偷度朝昏苟存視息翁皇帝若惠顧疇昔稍霽雷霆未賜靈誅不絶先祀則百口荷更生之德一門銜無報之恩雖所願焉非敢望也臣與太后並妻馮氏及舉家戚屬見於郊野面縛俟罪次所有國寶一面金印三面今遣長子陝府節度使延煦次子曹州節度使延寶管押進納並奉表請罪陳謝以聞甲戌張彥澤遷帝與太后及諸宮屬於開封府遣控鶴指揮使李榮將兵監守是夜開封尹桑維翰宣徽使孟承誨皆遇害帝以契丹主將至欲與太后出迎彥澤先表之稟契丹主之旨報云比欲許爾朝覲上國臣僚奏言豈有兩箇天子道路相見今賜所佩刀子以慰爾心己卯皇子延煦延寶自帳中回得偽詔慰撫帝表謝之時契丹主以所送傳國寶製造非工與載籍所述者異使人來問帝進狀曰頃以偽主王從珂於洛京大內自焚之後其真傳國寶不知所在必是當時焚之先帝受命旋製此寶在位臣僚備知其事臣至今日敢有隱藏云時移內庫至府帝使人取帛數段主者不與謂使者曰此非我所有也又使人詣李嵩求酒嵩曰臣有酒非敢愛惜慮陛下杯酌之後憂躁所作別有不測之事臣以此不敢奉進丙戌晦百官宿封禪寺明年正月朔契丹主次東京城北百官列班遙辭帝于寺詣北郊以迎契丹主帝舉族出封丘門肩輿至野契丹主不與之見遣泊封禪寺文武百官素服紗帽迎謁契丹主於郊次俯伏俟罪契丹主命起之親自慰撫契丹主遂入大內至昏出宮是夜宿於赤缸偽詔應晉朝臣僚一切仍舊朝廷儀制並用漢禮戊子殺鄭州防禦使楊承勳案遼史云以其弟承信為平盧軍節度使襲父爵舊五代史考異責以背父之罪令左右臠割而死己丑斬張彥澤於市以其剽劫京城恣行屠害也案遼史云以張彥澤擅徙重貴開封殺桑維翰縱兵大掠不道斬于市舊五代史考異庚寅洛京留守景延廣自扼吭而死辛卯契丹制降帝為光祿大夫案遼史避諱作崇祿舊五代史考異檢校太尉封負義侯黃龍府安置其地在渤海國界癸巳遷帝於封禪寺遣蕃大將崔廷勳將兵守之癸卯帝與皇太后李氏皇太妃安氏皇后馮氏皇弟重睿皇子延煦延寶俱北行以宮嬪五十人內官三十人案遼史作內官三人舊五代史考異東西班五十人醫官一人控鶴官四人御廚七人茶酒三人儀鸞司三人軍健二十人從行案遼史作健卒十人舊五代史考異宰臣趙瑩樞密使馮玉侍衛馬軍都指揮使李彥韜隨帝入蕃契丹主遣三百騎援送而去所經州郡長吏迎奉皆為契丹主阻絶案宋史李穀傳少帝蒙塵而北舊臣無敢候謁者穀獨拜迎于路君臣相對泣下穀曰臣無狀負陛下因傾囊以獻舊五代史考異有所供饋亦不通嘗一日帝與太后不能得食乃殺畜而啖之帝過中渡橋閲杜重威營寨之迹慨然憤歎謂左右曰我家何負為此賊所破天乎天乎於是號慟而去至幽州傾城士庶迎看於路案宣政雜録云徽宗北狩經薊縣梁魚務有還鄉橋石少帝所命名也里人至今呼之舊五代史考異見帝慘沮無不嗟嘆駐留旬餘州將承契丹命犒帝於府署趙延壽母以食饌來獻自范陽行數十程過薊州平州至榆關沙塞之地略無供給每至宿頓無非路次一行乏食宮女從官但採木實野蔬以救飢弊又行七八日至錦州契丹迫帝與妃后往拜阿保機遺像帝不勝屈辱泣曰薛超誤我不令我死以至今日也又行數十程渡遼水至黃龍府此即戎王所命安置之地也六月契丹國母召帝一行往懷密州州在黃龍府西北千餘里行至遼陽皇后馮氏以帝陷蕃過受艱苦令內官潛求毒藥將自飲之並以進帝不果而止又行二百里會國母為永康王所執永康王請帝却往遼陽城駐泊帝遣使奉表於永康且賀克捷自是帝一行稍得供給漢乾祐元年四月永康王至遼陽帝與太后並詣帳中帝御白衣紗帽永康止之以常服謁見帝伏地雨泣自陳過咎永康使左右扶帝上殿慰勞久之因命設樂行酒從容而罷永康帳下從官及教坊內人望見故主不勝悲咽內人皆以衣帛藥餌獻遺於帝及永康發離遼陽取內官十五人東西班十五人及皇子延煦並令隨帳上陘陘即蕃王避暑之地也有禪奴舍利者即永康之妻兄也知帝有小公主在室詣帝求之帝辭以年幼不可又有東西班數輩善於歌唱禪奴又請之帝乃與之後數日永康王馳取帝幼女而去以賜禪奴至八月永康王下陘太后馳至霸州詣永康求於漢兒城寨側近賜養種之地永康許諾令太后於建州住泊漢乾祐二年二月帝自遼陽城發赴建州行至中路太妃安氏得疾而薨乃焚之載其燼骨而行帝自遼陽行十數日過儀州灞州遂至建州節度使趙延暉盡禮奉迎館帝於衙署中其後割寨地五十餘頃其地至建州數十里帝乃令一行人員於寨地內築室分耕給食於帝是歲述律王子遣契丹數騎詣帝取內人趙氏聶氏疾馳而去趙聶者帝之寵姬也及其被奪不勝悲憤漢乾祐三年八月太后薨周顯德初有漢人自寨北而至者言帝與后及諸子俱無恙猶在建州案郡齋讀書志云晉朝陷蕃記范質撰質石晉末在翰林為出帝草降表知其事為詳記少帝初遷于黃龍府後居于建州凡十八年而卒案契丹丙午歲入汴順數至甲子歲為十八年實太祖乾德二年也舊五代史考異其隨從職官役使人輩自蕃中亡歸物故者大半矣永樂大典卷一萬五千六百四十九五代史補少主之嗣位也契丹以不俟命而擅立又景延廣辱其使契丹怒舉國南侵以駙馬都尉杜重威等領駕下精兵甲禦之于中渡河橋既而契丹之衆已深入而重威等奏報未到朝廷時桑維翰罷相為開封府尹謂僚佐曰事急矣非大臣鉗口之時乃叩內閣求見欲請車駕親征以固將士之心而少主方在後苑調鷹至暮竟不召維翰退而歎曰國家阽危如此草澤逋客亦宜下問況大臣求見而不召耶事亦可知矣未幾杜重威之徒降于契丹少主遂北遷史臣曰少帝以中人之才嗣將墜之業屬上天不祐仍歲大飢尚或絶強敵之歡盟鄙輔臣之謀略奢淫自縱謂有泰山之安委託非人坐受平陽之辱族行萬里身老窮荒自古亡國之醜者無如帝之甚也千載之後其如恥何傷哉永樂大典卷一萬五千六百四十九
