body:
  text: 舊五代史卷五十九唐書三十五列傳第十一丁會字道隱壽州壽春人父季會幼放蕩縱橫不治農産恆隨哀挽者學紼謳尤嗜其聲既長遇亂合雄兒為盜雄兒原本作維兒今據册府元龜改正影庫本粘籤有志功名黃巢渡淮會從梁祖為部曲梁祖鎮汴會歷都押衙自梁祖誅宗權併時溥屠朱瑄走朱瑾會恆以兵從多立奇功文德中表授懷州刺史歷滑州留後河陽節度使檢校司徒自河陽以疾致政於洛陽梁祖季年猜忌故將功大者多遭族滅會陰有避禍之志稱疾者纍年案通鑑考異謂梁祖季年無誅戮大臣之事考朱珍李讜諸人先後為梁祖所殺丁會蓋鑒於前事也天復元年梁祖奄有河中晉絳乃起會為昭義節度使昭宗幸洛陽加同平章事其年昭宗遇弒哀問至會三軍縞素流涕久之時梁祖親討劉守文於滄州駐軍於長蘆三年十二月王師攻會居旬日會以潞州歸於武皇案北夢瑣言云梁祖雄猜疑忌功臣忽謂敬翔曰吾夢丁會在前祗候吾將乘馬欲出圉人以馬就臺忽為丁會跨之以出時夢中怒叱喝數聲因驚覺甚惡之是月丁會舉潞州軍民歸河東矣舊五代史考異引見會泣曰臣非不能守潞但以汴王篡弱唐祚猜嫌舊將臣雖蒙保薦之恩而不忍相從原本脫相從二字今據册府元龜增入影庫本粘籤今所謂吐盜父之食以見王也武皇納之賜甲第於太原位在諸將上五年汴將李思安圍潞州以會為都招討使檢校太尉莊宗嗣王位與會決謀破汴軍於夾城七年十一月卒於太原莊宗即位追贈太師有子七人知沆為梁祖所誅餘皆歷內職永樂大典卷一萬八千一百八十九閻寶字瓊美鄆州人父佐海州刺史寶少事朱瑾為牙將瑾之失守於兗也寶與瑾將胡規康懷英歸汴梁皆擢任之自梁祖陳師河朔爭霸關西寶與葛從周丁會賀德倫李思安各為大將統兵四出所至立功歷洺隨宿鄭四州刺史天祐六年梁祖以寶為邢洺節度使檢校太傅案歐陽史太祖時為諸軍都虞候末帝時以寶為保義軍節度使與薛史詳略先後互異舊五代史考異莊宗定魏博十三年攻相衛洺磁下之寶獨保邢州城孤援絶八月寶以邢州降莊宗嘉之進位檢校太尉同平章事遙領天平軍節度使東南面招討等使待以賓禮位在諸將上每有謀畫與之參決契丹之寇幽州也周德威危急寶與李存審從明宗擊契丹於幽州西北解圍而還胡柳之役諸軍逗撓汴軍登無石山其勢甚盛莊宗望之畏其不敵且欲保營寶進曰王深入敵境偏師不利王彥章騎軍已入濮州山下唯列步兵向晚皆有歸志我盡鋭擊之敗走必矣今若引退必為所乘我軍未集更聞賊勝即不戰而自潰也凡決勝料勢決戰料情情勢已得斷在不疑今王之成敗在此一戰若不決勝設使餘衆渡河河朔非王有也王其勉之莊宗聞之聳聽曰微公幾失計即引騎大譟奮矟登山大敗汴人十八年張文禮殺王鎔叛張文禮原本作大禮今據歐陽史改正影庫本粘籤寶帥師進討八月收趙州進渡滹水擒賊黨張友順以獻九月進逼真定結營西南隅掘塹柵以環之決大悲寺漕渠以浸其郛十九年正月契丹三十萬來援鎮州前鋒至新樂衆心憂之寶見莊宗指陳方略軍情乃安敵退加檢校侍中三月城中飢王處瑾之衆出城求食寶縱其出伏兵截擊之飢賊大至諸軍未集為賊所乘寶乃收軍退保趙州因慚憤成疾疽發背而卒時年六十同光初追贈太師晉天福中追封太原郡王有子八人宏倫宏儒皆位至郡守永樂大典卷九千八百二符習趙州昭慶縣人少從軍事節度使王鎔積功至列校自莊宗經略河朔與鎔連衡常令習率師從莊宗征討鎔為張文禮所害時習在德勝寨文禮上書請習等歸鎮習雨泣訴於莊宗曰臣本趙人家世事王氏故使嘗授臣一劍俾臣平蕩凶寇自聞變故徒懷寃憤欲以自剄無益於營魂且張文禮乃幽滄叛將趙王知人不盡過意任使致被反噬臣雖不武願在霸府血戰而死不能委身於凶首莊宗曰爾既懷舊君之愛可復讎乎吾當助爾習等舉身投地號慟感激謝曰王必以故使輔翼之勞雪其寃恥臣不敢期師旅為助但悉本軍可以誅其逆豎莊宗即令閻寶史建瑭助習討文禮史建瑭原本作逮塘今據通鑑改正影庫本粘籤乃以習為成德軍兵馬留後及文禮誅將正授節鉞習不敢當其任辭曰臣緣故使未葬又無嗣息臣合服斬縗候臣禮制畢聽命及莊宗兼領鎮州乃割相衛二州置義寧軍以習為節度使習奏曰魏博六州見係霸府不宜遽有割隸但授臣河南一鎮臣自攻取乃授天平軍節度東南面招討使習有器度性忠壯自莊宗十年沿河戰守習常以本軍從心無顧望諸將服其為人同光初以習為邢州節度明年移鎮青州四年二月趙在禮盜據魏州習受詔以淄青之師進討至則會軍亂習乃退軍渡河明宗自鄴赴洛遣使召之習不時而至既至謁明宗於胙縣霍彥威謂習曰主上所知者十人公在其四何猶豫乎習乃從明宗入汴明宗即位加兼侍中令歸本鎮屬青州守將王公儼拒命復授天平軍節度使案宋史顏衎傳天成初為鄒平令符習初鎮天平習武臣之廉慎者以書告屬邑毋聚斂為獻賀衎未領書以故規行之尋為吏所訟習遽召衎笞之幕客軍吏咸以為辱及正人習甚悔焉即表為觀察判官且塞前事舊五代史考異四年移汴州節度使安重誨素不悅習會汴人言習厚賦民錢以代納䤝及納軍租多收加耗由是罷歸京師案通鑑習自恃宿將議論多抗安重誨故重誨求其過奏之舊五代史考異授太子太師致仕求歸故里許之乃歸昭慶縣明宗以其子令謙為趙州刺史習飛揚痛飲案原本作飛鷹今考杜詩痛飲狂歌空度日飛揚跋扈為誰雄鷹字蓋揚字之訛今改正舊五代史考異周遊田里不集朋徒不過郡邑如此纍年中風而卒贈太師子蒙嗣位至禮部侍郎永樂大典卷一萬八千一百二十九烏震冀州信都人也少孤自勤於鄉校弱冠從軍初為鎮州隊長以功漸升部將與符習從征於河上頗得士心聞張文禮弒王鎔志復主讎雪泣請行兵及恆陽文禮執其母妻洎兒女十口誘之不回攻城日急文禮忿之咸割鼻斷腕不絶於膚放至軍門觀者皆不忍正視震一慟而止憤激奮命身先矢石鎮州平以功授震深趙二州刺史其性純質以清直御下在河北獨有政聲移易州刺史案歐陽史作冀州舊五代史考異兼北面水陸轉運招撫等使契丹犯塞漁陽路梗震率師運糧三入薊門擢為河北道副招討遙領宣州節度使代房知溫軍於盧臺及至軍會戍兵龍晊所部鄴都奉節等軍數千人作亂龍晊原本作龍姪今據歐陽史改正影庫本粘籤未及交印而遇害明宗聞之廢朝一日詔贈太傅案歐陽史作太師舊五代史考異震略涉書史尤嗜左氏傳好為詩善筆札凡郵亭佛寺多有留題之迹及其遇禍燕趙之士皆歎惜之永樂大典卷一萬八千一百二十九王瓚故河中節度使重盈之諸子也天復初梁祖既平河中追念王氏舊恩辟瓚為賓佐梁祖即位歷諸衛大將軍兗華兩鎮節度使開封尹貞明五年代賀瓌統軍駐於河上時李存審築壘於德勝渡秋八月瓚率汴軍五萬自黎陽渡河將掩擊魏州明宗出師拒之瓚至頓丘而旋於楊村夾河築壘架浮航自滑饋運相繼瓚嚴於軍法令行禁止然機略應變則非所長十一月瓚率其衆觀兵於戚城明宗以前鋒擊之獲其將李立十二月邏騎報汴之饋糧千計沿河而下可掩而取之莊宗遣徒兵五千設伏以待之使騎軍循河南岸西上俘獲饋役數千瓚結陳河曲以待王師既而兵合一戰敗之瓚衆走保南城瓚以小舟北渡僅免是日獲馬千餘匹俘斬萬級王師乘勝徇地曹濮梁主以瓚失律令戴思遠代還及王師襲汴時瓚為開封府尹開封原本脫封字今據通鑑增入影庫本粘籤梁主聞王師將至自登建國門樓日夜垂泣時持國寶謂瓚曰吾終保有此者繫卿耳令瓚閲市人散徒登城為備洎明宗至封丘門瓚開門迎降翌日莊宗御玄德殿瓚與百官待罪及進幣馬詔釋之仍令收梁主尸備槥櫝權厝於佛寺漆首函送於郊社居數日段凝上疏奏梁朝掌事權者趙巖等並助成虐政結怨於人聖政維新宜誅首惡以謝天下於是張漢傑張漢融張漢倫張希逸趙縠朱圭等並族誅家財籍沒瓚聞諸族當法憂悸失次每出則與妻子訣別郭崇韜遣人慰譬之詔授宣武軍節度副使知府事檢校太傅如故案歐陽史云瓚伏地請死莊宗勞而起之曰朕與卿家世婚姻然人臣各為主耳復何罪邪因以為開封尹遷宣武軍節度使據薛史則瓚以宣武軍節度副使知府事未嘗遷秩也瓚心憂疑成疾十二月卒贈太子太師瓚雖為治嚴肅而慘酷有家世風自歷守藩鎮頗能除盜而明不能照下及尹政京邑委政於愛壻牙將辛廷蔚曲法納賄因緣為姦初汴人駐軍於河上軍計不足瓚請率汴之富戶出助軍錢賦取不均人靡控訴至有雉經者又有富室致賂幸而免率者及明宗即位素知廷蔚之姦乃勒歸田里然瓚能優禮搢紳抑挫豪猾故當時士流皆稱仰焉永樂大典卷六千六百八十袁象先宋州下邑人也自稱唐中宗朝中書令南陽郡王恕己之後曾祖進朝成都少尹梁以象先貴纍贈左僕射祖忠義忠武軍節度判官纍贈司空父敬初太府卿纍贈司徒駙馬都尉敬初娶梁祖之妹初封沛郡太君開平中追封長公主貞明中追封萬安大長公主象先即梁祖之甥也性寬厚不忤於物幼遇亂慨然有憂時之意象先嘗射一水鳥不中箭落水中下貫雙鯉見者異之梁祖鎮夷門象先起家授銀青光祿大夫檢校太子賓客兼御史中丞景福元年自檢校左省常侍遷檢校工部尚書充元從馬軍指揮使兼左靜邊都指揮使乾寧五年再遷檢校右僕射左領軍衛將軍同正充宣武軍內外馬步軍都指揮使光化二年權知宿州軍州事天復元年表授刺史充本州團練甬橋鎮遏都知兵馬使會淮寇大至圍迫州城象先殫力禦備時援兵未至頗懷憂沮一日登北城憩其樓堞之上恍然若寢夢人告曰我陳璠也陳璠原本作揀璠今據册府元龜改正影庫本粘籤嘗板築是城舊第猶在今為軍舍可為我立廟即助公陰兵象先納之翌日淮寇急攻其壘梯角進是日州城幾陷頃之有大風雨居民望見城上兵甲無算寇不能進即時退去象先方信鬼神之助乃為之立祠至今里人禱祝不輟三年權知洺州軍州事洺州原本作洛州今從歐陽史改正影庫本粘籤天祐三年授陳州刺史檢校司空是歲陳州大水民飢有物生於野形類蒲萄其實可食貧民賴焉梁開平二年授左英武軍使再遷左神武右羽林統軍三年轉右衛上將軍封汝南縣男四年權知宋州留後到任五月改天平軍兩使留後時鄆境再飢戶民流散象先即開倉賑恤蒙賴者甚衆五年梁祖北征以象先為鎮定東南行營都招討應接副使進封開國伯領兵攻蓨縣不克而還俄奉詔自鄆赴闕鄆人遮留毀石橋而不得進乃自他門而逸尋授左龍武統軍兼侍衛親軍都指揮使乾化三年與魏博節度使楊師厚合謀誅朱友圭於洛陽梁末帝即位以功授檢校太保同平章事遙領洪州節度使行開封尹判在京馬步諸軍進封開國公四年授青州節度使加檢校太傅未幾移鎮宋州加檢校太尉象先在宋凡十年初梁祖領四鎮統兵十萬威震天下關東藩守皆其將吏方面補授由其保薦四方輿金輦璧駿奔轡轍納賂於其庭如是者十餘年寖成風俗藩侯牧守下逮羣吏罕有廉白者率皆掊斂剝下以事權門象先恃甥舅之勢所至藩府侵刻誅求尤甚以此家財巨萬莊宗初定河南象先率先入覲輦珍幣數十萬遍賂權貴及劉皇后伶官巷伯居旬日內外翕然稱之初梁將未復官資者凡上章奏姓名而已郭崇韜奏曰河南征鎮將吏昭洗之後未有新官每上表章但書名姓未頒綸制必負憂疑即日復以象先為宋亳耀輝潁節度使依前檢校太尉平章事仍賜姓名紹安尋令歸鎮明年以郊禮象先復來朝是時制改宋州宣武軍為歸德軍宋州原本作宗州今從通鑑改正影庫本粘籤因侍宴莊宗謂象先曰歸德之名無乃著題否象先拜謝而退即命歸鎮其年夏以疾卒於治所年六十一册贈太師周廣順中贈中書令追封楚國公象先二子長曰正辭歷衢雄二州刺史次曰至周顯德中終於滄州節度使永樂大典卷五千一百十四張溫字德潤魏州魏縣人也案溫于潼關擒劉浣見梁紀此傳不載舊五代史考異始仕梁祖為步直小將改崇明都校貞明初貞明原本作貞宗今據薛史梁書改正影庫本粘籤蔣殷以徐州叛從劉鄩討平之改左右捉生都指揮使莊宗伐邢臺獲之用為永清都校歷武州刺史山後八軍都將從莊宗襲契丹於幽州收新州歷銀槍效義都指揮使再任武州刺史同光初契丹陷媯儒檀順平薊六州武州獨全改授蔚州刺史天成初歷振武昭武留後尋授利州節度使入為右衛上將軍無幾授洋州節度使右龍武統軍改雲州節制清泰初屯兵鴈門逐契丹出塞移鎮晉州嬰疾而卒詔贈太尉永樂大典卷六千六百六十李紹文鄆州人本姓張名從楚少事朱瑄為帳下瑄敗歸於梁祖為四鎮牙校纍典諸軍天祐八年從王景仁戰敗於柏鄉紹文與別將曹儒收殘衆退保相州王師之攻魏州也紹文率衆自黎陽將渡河時汴人大恐河無舟楫紹文懼為王師所逼乃剽黎陽臨河內黃至魏州歸於莊宗莊宗嘉納之賜姓名分其兩將三千人為左右匡霸軍旅仍令紹文曹儒分將之從周德威討劉守光進檢校司空移將匡衛軍十二年授博州刺史預破劉鄩於故元城歷貝隰代三郡刺史領天雄軍馬步副都將屯於德勝從閻寶討張文禮為馬步軍都虞候明宗收鄆州以紹文為右都押衙馬步軍都將從破王彥章於中都同光中歷徐滑二鎮副使知府事三年從郭崇韜討西川為洋州節度留後領鎮江軍節度天成初為武信軍節度使尋卒於鎮永樂大典卷一萬一百八十九史臣曰昔丁會之事梁祖也功既隆矣禍將及矣挺身北首故亦宜然然食人之祿豈合如是哉閻寶再降於人夫何足貴焉符習雪故主之沉寃享通侯之貴位乃趙之奇士也奇士原本脫士字今考夏文莊集所引薛史作奇士今改正影庫本粘籤烏震不憫其親仁斯鮮矣雖慕樂羊之迹豈事文侯之宜瓚洎象先而下皆降將也又何足以譏焉永樂大典卷一萬一百八十九
