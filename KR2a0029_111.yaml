body:
  text: 舊五代史卷一百一十一周書二太祖紀第二廣順元年春二月癸巳朔以樞密副使尚書戶部侍郎范質為兵部侍郎依前充職以陳州刺史判三司李穀為戶部侍郎判三司以右金吾大將軍充街使翟光鄴為左千牛衛上將軍充宣徽北院使以宣徽北院使袁為左武衛上將軍充宣徽南院使以左右金吾大將軍充街使符彥琳為右監門上將軍丁酉以皇子天雄軍牙內都指揮使檢校右僕射貴州刺史榮起復為澶州節度使檢校太保以右金吾上將軍薛可言為右龍武統軍右金吾原本脫吾字今據文增入影庫本粘籤以左神武統軍安審約為左羽林統軍以左驍衛上將軍趙贊為右羽林統軍以太子太師致仕宋彥筠為左衛上將軍詔移生吐渾族帳於潞州長子縣江猪嶺己亥以左武衛上將軍劉遂凝為左神武統軍以左衛上將軍焦繼勳為右神武統軍以左領軍衛上將軍史佺為右衛上將軍庚子故吳國夫人張氏追贈貴妃故皇第三女追封樂安公主故第二子青哥贈太保賜名侗第三子意哥贈司空賜名信故長婦劉氏追封彭城郡夫人皇姪三人守筠贈左領軍將軍改名願奉超贈左監門將軍定哥贈左千牛衛將軍賜名遜故皇孫三人宜哥贈左驍衛大將軍賜名誼喜哥贈武衛大將軍賜名誠三哥贈左領衛大將軍賜名諴辛丑西州回鶻遣使貢方物前開封尹魯國公侯益進封楚國公前西京留守莒國公李從敏進封秦國公前西京留守王守恩進封莒國公癸卯以前中書侍郎兼戶部尚書平章事李濤為太子賓客詔宣徽南院使袁權知開封府事以太子太保和凝為太子太傅丙午晉州王晏奏王晏原本作王早今從宋史改正影庫本粘籤河東劉崇遣僞招討使劉鈞副招討使白截海率步騎萬餘人來攻州城以今月五日五道齊攻率州兵拒之賊軍傷死甚衆案宋史王晏傳劉崇侵晉州晏閉關不出設伏城上並人以為怯競攀堞而登晏麾伏兵擊之顛死者甚衆遂焚橋遁晏遣子漢倫追北數十里斬首百餘級舊五代史考異內出寶玉器及金銀結縷寶裝牀几飲食之具數十碎之於殿庭帝謂侍臣曰凡為帝王安用此仍詔所司凡珍華悅目之物不得入宮先是回鶻間歲入貢禁民不得與蕃人市易寶貨至是一聽私便交易官不禁詰丁未左千牛將軍朱憲使契丹回契丹主兀欲遣使人來獻良馬一駟賀登極戊申詔曰朕祗膺景命奄有中區每思順物之情從衆之欲將使照臨之下咸遂寬舒仕官之流自安進退往者有司拘忌人或滯流所在前資並遣赴闕輦轂之下多寄食僦舍之徒歲月之間動懷土念家之思宜循大體用革前規應諸道州府有前資朝官居住如未赴京不得發遣其行軍副使已下幕職州縣官等得替求官自有月限年月未滿一聽外居如非時詔徵不在此限己酉有司議立四親廟從之辛亥以太子少傅楊凝式為太子少師以太常卿張昭為戶部尚書以尚書左丞王易為禮部尚書以兵部侍郎邊蔚為太常卿以翰林學士中書舍人魚崇諒為工部侍郎充職以戶部侍郎韋勳為兵部侍郎以刑部侍郎邊歸讜為戶部侍郎以禮部侍郎司徒詡為刑部侍郎以祕書監趙上交為禮部侍郎以兵部尚書王仁裕為太子少保以翰林學士禮部尚書張沆為刑部尚書充職以尚書右丞田敏為左丞以吏部侍郎段希堯為工部尚書以太子詹事馬裔孫為太子賓客前鄜州節度使劉重進前滑州節度使宋延渥並加食邑吐渾府留後王全德加檢校太保充憲州刺史隰州刺史許遷奏河東賊軍劉筠自晉州引兵來攻州城尋以州兵拒之賊軍傷死者五百人信宿遁去丁巳以尚書左丞田敏充契丹國信使回鶻遣使貢方物己未天德軍節度使虢國公郭勳加同平章事以前宗正卿劉為衛尉卿辛酉以衛尉卿邊光範為祕書監以前吏部侍郎李詳為吏部侍郎以前戶部侍郎顏衎為尚書右丞顏衎原本作顏衍今從宋史改正影庫本粘籤三月壬戌朔前西京留守李從敏卒戊辰以前左武衛上將軍李懷忠為太子太傅致仕以前邢州節度使安審暉為太子太師致仕辛未幸南莊壬申詔曰諸州府先差散從親事官等前朝創置蓋出權宜苟便一時本非舊貫近者遍詢羣議兼採封章且言前件抽差於理不甚允當一則礙州縣之色役一則妨春夏之耕耘貧乏者困於供須豪富者幸於影庇既為煩擾須至改更況當東作之時宜罷不急之務其諸州所差散從親事官等並宜放散詔下公私便之徐州行營都部署王彥超馳奏收復徐州城內逆首楊溫及親近徒黨並處斬其餘無名目人及本城軍都將校職掌吏民等雖被脅從本非同惡並釋放兼知自前楊溫招喚草賊同力守把朕以村墅小民偶被煽誘念其庸賤特與含容其招入城草賊並放歸農仍倍加安撫湘陰公夫人並骨肉在彼仰差人安撫守護勿令驚恐以右散騎常侍張煦給事中王延藹並為左散騎常侍以前大名府少尹李瓊為將作監以前彰武軍節度使周密為太子太師致仕以衛尉卿劉充漢隱帝山陵部署丙子以太子少保致仕王延為太子少傅以戶部尚書致仕盧損左驍衛上將軍致仕李肅並為太子少保兵部尚書致仕韓昭裔為尚書右僕射太子太師致仕盧文紀為司空自延而下並依前致仕故散騎常侍裴羽贈戶部尚書故太子賓客蕭願贈禮部尚書以司農卿致仕薛仁謙為鴻臚卿以將作監致仕烏昭為太府卿以太常少卿致仕王禧為少府監以祕書少監致仕段顒為將作監自仁謙而下並依前致仕詔沿淮州縣軍鎮今後自守疆土不得縱一人一騎擅入淮南地分己卯潞州奏涉縣所擒河東將士二百餘人部送赴闕詔給衫袴巾屨放歸本土甲申鎮州武行德移鎮許州何福進移鎮鎮州丙戌以襄州節度副使郭令圖為宗正卿詔曰故蘇逢吉劉銖頃在漢朝與朕同事朕自平禍亂不念仇讎尋示優弘與全家屬尚以幼稚無託衣食是艱將行矜恤之恩俾獲生存之路報怨以德非我負人賜逢吉骨肉洛京莊宅各一賜劉銖骨肉陝州莊宅各一己丑幸南莊庚寅唐故郇國公李從益追封許王唐明宗淑妃王氏追贈賢妃辛卯詔諸道節度副使行軍司馬兩京少尹留守判官並許差定當直人力不得過十五人諸府少尹書記支使防禦團練副使不得過十人節度推官防禦團練軍事判官不得過七人逐處係帳收管此外如敢額外影占人戶其本官當行朝典先是漢隱帝時有人上言州府從事令録皆請料錢自合雇人驅使不合差遣百姓丁戶秉政者然之乃下詔州府從事令録本處先差職役並放歸農自是官吏有獨行趨府縣者帝頗知之故有是命夏四月壬辰朔詔沿淮州縣許淮南人就淮北糴易餱糧時淮南饑故也甲午以夫人董氏為德妃仍令所司備禮冊命己亥改侍衛馬步軍軍額馬軍舊稱護聖今改為龍捷步軍舊稱奉國今改為虎捷壬寅詔唐莊宗明宗晉高祖三處陵寢各有守陵宮人並放逐便如願在陵所者依舊供給甲辰相州張彥成移鎮鄧州案原本作彥威今據列傳改正舊五代史考異折從阮移鎮滑州李筠移鎮相州丙午亳州防禦使王重裔卒戊申幸南莊庚戌皇第四女封壽安公主辛亥故許州節度使劉信追封蔡王丙辰詔曰牧守之任委遇非輕分憂之務既同制祿之數宜等自前有富庶之郡請給則優或邊遠之州俸料素薄以至遷除之際擬議亦難既論資之高低又患祿秩之升降所宜分多益寡均利同恩冀無黨偏以勸勳效今定諸防禦使料錢二百貫祿粟一百石食鹽五石馬十匹草粟元隨三十人衣糧團練使一百五十貫祿粟七十石鹽五石馬十匹元隨三十人刺史一百貫祿粟五十石鹽五石馬五匹元隨二十人云丁巳尚書左丞田敏使契丹回契丹主兀欲遣使耨姑報命並獻碧玉金塗銀裹鞍勒各一副弓矢器仗貂裘等土産馬三十匹土産漢馬十匹庚申帝為故貴妃張氏舉哀於舊宮輟視朝三日辛酉司空致仕盧文紀卒五月壬戌朔帝不視朝以漢隱帝梓宮在殯故也戊辰皇子澶州節度使榮起復依前澶州節度使以故貴妃張氏去歲薨至是發哀故也己巳遣左金吾衛將軍姚漢英前右神武將軍華光裔使于契丹辛未太常卿邊蔚上追尊四廟諡議是夜有大星如五升器流於東北有聲如雷丙子太常卿邊蔚上太廟四室奠獻舞名丁丑詔京兆鳳翔府應諸色犯事人第宅莊圍店磑已經籍沒者並給付罪人骨肉壬午幸南莊甲申考城縣巡檢供奉官馬彥勍棄市坐匿赦書殺獄囚也丙戌宰臣馮道為四廟冊禮使六月辛卯朔不視朝以漢隱帝梓宮在殯故也甲午百僚上表請以七月二十八日皇帝降聖日為永壽節從之邢州大雨霖己亥太常少卿劉悅上漢少帝諡曰隱皇帝陵曰穎陵從之辛亥以樞密使王峻為尚書左僕射兼門下侍郎同平章事監修國史充樞密使以樞密副使尚書兵部侍郎范質為中書侍郎同平章事充集賢殿大學士以戶部侍郎判三司李穀為中書侍郎同平章事判三司司徒兼侍中監修國史竇貞固司空兼中書侍郎同平章事集賢殿大學士蘇禹圭並罷相守本官壬子幸西莊癸丑詔宰臣范質參知樞密院事鄴都洺滄貝等州大雨霖丙辰西京奏新授宗正卿郭令圖卒丁巳以尚書左丞顏衎為兵部侍郎充端明殿學士以宣徽北院使翟光鄴兼樞密副使秋七月辛酉朔帝被衮冕御崇元殿授太廟四室寶冊于中書令馮道等赴西京行禮癸亥尚書左丞田敏兼判國子監事戊辰以御史中丞于德辰為尚書右丞以祕書監邊光範為太子賓客以戶部尚書張昭為太子賓客以其子秉為陽翟簿犯法抵罪昭詣閣待罪詔釋之乃左授此官壬申史官賈緯等以所撰晉高祖實録三十卷少帝實録二十卷上之丙子幸宰臣王峻第案歐陽史作戊寅幸王峻第舊五代史考異己丑鎮州奏破河東賊軍於平山縣西斬首五百級是日太常卿邊蔚奏議改郊廟舞名事具樂志八月辛卯漢隱帝梓宮發引帝詣太平宮臨奠詔羣臣出祖於西郊是歲幽州饑流人散入滄州界詔流人至者口給斗粟仍給無主土田令取便種蒔放免差稅癸巳虎入西京修行寺傷人市民殺之乙未幸班荊館壬寅契丹遣幽州牙將曹繼筠來歸故晉中書令趙瑩之喪詔贈太傅仍賜其子絹五百匹以備喪事歸葬於華陰故里乙巳幸西莊壬子晉州王晏移鎮徐州滄州王景移鎮河中定州孫方簡移鎮華州永興郭從義移鎮許州貝州王繼弘移鎮河陽李暉移鎮滄州以許州節度使武行德為西京留守滑州折從阮移鎮陝州河中扈彥珂移鎮滑州陝州李洪信移鎮永興華州王饒移鎮貝州徐州王彥超移鎮晉州丙辰尚食李氏等宮官八人並封縣君司記劉氏等六人並封郡夫人尚宮皇甫氏等三人並封國夫人唐制有內官宮官各有司存更不加郡國之號近代加之非舊典也以易州刺史孫行友為定州留後戊午故夫人柴氏追立為皇后仍令所司定諡備禮冊命九月庚申朔帝詣太平宮起居漢太后辛酉故夫人楊氏追贈淑妃仍令所司擇日備禮冊命故皇第五女追封永寧公主癸亥定州奏契丹永康王兀欲為部下所殺案遼史世宗以九月癸亥遇弒不應定州即能于癸亥入奏疑原文有舛誤甲子以前耀州團練使武廷翰為太子少保致仕丙子諸道兵馬都元帥兩浙節度使檢校太師尚書令中書令吳越國王錢俶可天下兵馬都元帥丁丑中書舍人劉濤責授少府少監分司西京坐遣男頊代草制詞也監察御史劉頊責授復州司戶坐代父草制也中書舍人楊昭儉解官放逐私便以多在假告不親其職也永樂大典卷八千九百八十
