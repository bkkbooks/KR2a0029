body:
  text: 舊五代史卷二十五唐書一武皇紀上太祖武皇帝諱克用本姓朱耶氏其先隴右金城人也始祖拔野唐貞觀中為墨離軍使墨離原本作墨維今從新舊唐書改正影庫本粘籤從太宗討高麗薛延有功為金方道副都護因家於瓜州太宗平薛延諸部於安西北庭置都護屬之分同羅僕骨之人置沙都督府蓋北庭有磧曰沙故因以為名焉永徽中以拔野為都督其後子孫五世相承曾祖盡忠貞元中繼為沙府都督既而為吐蕃所陷乃舉其族七千帳徙於甘州盡忠尋率部衆三萬東奔俄而吐蕃追兵大至盡忠戰歿祖執宜即盡忠之長子也收合餘衆至於靈州德宗命為陰山府都督元和初入為金吾將軍遷蔚州刺史代北行營招撫使案新唐書沙傳元和三年盡忠款靈州塞詔處其部鹽州置陰山府以執宜為府兵馬使朝長安授特進金吾衞將軍從攻鎮州進蔚州刺史破吳元濟授檢校刑部尚書長慶初破賊深州入朝留宿衞拜金吾衞將軍太和中授陰山府都督代北行營招撫使所載官爵詳略先後與薛史異莊宗即位追謚為昭烈皇帝廟號懿祖烈考國昌本名赤心唐朔州刺史咸通中討龐勛有功入為金吾上將軍賜姓李氏名國昌案代州有唐故龍武軍統軍檢校司徒贈太保隴西李公神道碑云公諱國昌字德興仍係鄭王房出為振武節度使尋為吐渾所襲退保於神武川及武皇鎮太原表為代北軍節度使中和三年薨案新唐書沙傳光啟三年國昌卒與薛史異考舊唐書僖宗紀中和三年十月國昌卒與薛史同歐陽史亦從薛史莊宗即位追諡為文皇廟號獻祖武皇即獻祖之第三子也母秦氏以大中十年丙子歲九月二十二日生於神武川之新城在姙十三月載誕之際母艱危者竟夕族人憂駭市藥於鴈門遇神叟告曰非巫醫所及可馳歸盡率部人被甲持旄擊鉦鼓擊鉦原本作擊缸今從冊府元龜所引薛史改正影庫本粘籤躍馬大噪環所居三周而止族人如其教果無恙而生是時虹光燭室白氣充庭井水暴溢武皇始言喜軍中語齠齔善騎射與儕類馳騁嬉戲必出其右年十三見雙鳧翔於空射之連中衆皆臣伏新城北有毗沙天王祠祠前井一日沸溢武皇因持巵酒而奠曰予有尊主濟民之志無何井溢故未察其禍福惟天王若有神奇可與僕交談奠酒未已有神人被金甲持戈有神人被金甲持戈北夢瑣言作有龍形出于壁間蓋傳聞之異今附識于此影庫本粘籤隱然出於壁間見者大驚走唯武皇從容而退繇是益自負獻祖之討龐勛也武皇年十五從征摧鋒陷陣出諸將之右軍中目為飛虎子賊平獻祖授振武節度使武皇為雲中牙將嘗在雲中宿於別館擁妓醉寢有俠兒持刃欲害武皇及突入曲室但見烈火熾赫於帳中俠兒駭異而退又嘗與達靼部人角勝達靼指雙鵰於空中公能一發中否武皇即彎弧發矢連貫雙鵰邊人拜伏及壯為雲中守捉使事防禦使支謨支謨原本作友模今從通鑑改正影庫本粘籤與同列晨集廨舍因戲升郡閣踞謨之座謨亦不敢詰乾符三年朝廷以段文楚為代北水陸發運雲州防禦使時歲薦饑文楚稍削軍食諸軍咸怨武皇為雲中防邊督將部下爭訴以軍食不充邊校程懷素王行審蓋寓李存璋薛鐵山康君立等即擁武皇入雲州衆且萬人營於鬬雞臺城中械文楚出以應於外諸將列狀以聞請授武皇旄鉞朝廷不允徵諸道兵以討之案舊唐書懿宗紀咸通十三年十二月李國昌小男克用殺雲中防禦使段文楚據雲州自稱防禦留後新唐書僖宗紀乾符五年二月癸酉雲中守捉使李克用殺大同防禦使段文楚歐陽史從舊唐書通鑑從新唐書薛史作乾符三年與諸書異據通鑑考異引趙鳳後唐太祖紀年錄正作乾符三年趙鳳為唐宰相去武皇時不遠見聞較確宜可徵信云乾符五年黃巢渡江其勢滋蔓天子乃悟其事以武皇為大同軍節度使案歐陽史作拜克用為大同軍防禦使新唐書作以國昌為大同軍防禦使通鑑作以國昌為大同節度使俱與薛史異檢校工部尚書冬獻祖出師討党項吐渾赫連鐸乘虛陷振武舉族為吐渾所擄武皇至定邊軍迎獻祖歸雲州雲州守將拒關不納武皇略蔚朔之地得三千人屯神武川之新城赫連鐸晝夜攻圍武皇昆弟三人四面應賊俄而獻祖自蔚州引軍至吐渾退走自是軍勢復振天子以赫連鐸為大同軍節度使仍命進軍以討武皇乾符六年春朝廷以昭義節度使李鈞充北面招討使將上黨太原之師過石嶺關屯於代州與幽州李可舉會赫連鐸同攻蔚州獻祖以一軍禦之武皇以一軍南抵遮虜城以拒李鈞是冬大雪弓弩弦折南軍苦寒臨戰大敗奔歸代州李鈞中流矢而卒廣明元年春天子復命元帥李涿案歐陽史作招討使李琢通鑑亦作琢與薛史異舊五代史考異率兵數萬屯代州武皇令軍使傅文達起兵於蔚州朔州刺史高文集與薛葛安慶等部將案新唐書作薩葛首領米海萬安慶舊五代史考異薛葛安慶原本作薛曷女度今考冊府元龜所引薛史及新唐書通鑑諸書俱作薛葛安慶今改正影庫本粘籤縛文達送於李涿六月李涿引大軍攻蔚州獻祖戰不利乃率其族奔於達靼部居數月吐渾赫連鐸密遣人賂達靼以離間獻祖既而漸生猜阻武皇知之每召其豪右射獵於野或與之百步馳射馬鞭或以懸針樹葉為的中之如神由是部人心伏不敢竊發俄而黃巢自江淮北渡武皇椎牛釃酒饗其酋首酒酣喻之曰予父子為賊臣讒間報國無由今聞黃巢北犯江淮必為中原之患一日天子赦宥有詔徵兵僕與公等南向而定天下是予心也人生世間光景幾何曷能終老沙堆中哉公等勉之達靼知無留意皆釋然無間是歲十一月黃巢寇潼關天子令河東監軍陳景思為代北起軍使收兵破賊十二月黃巢犯長安僖宗幸蜀陳景思與李友金發沙諸部五千騎南赴京師友金即武皇之族父也案通鑑友金初與高文集並降於李琢故得與陳景思南赴京師薛史不載中和元年二月友金軍至絳州將渡河刺史瞿正謂陳景思曰巢賊方盛不如且還代北徐圖利害四月友金旋軍鴈門瞿正至代州半月之間募兵三萬營於崞縣之西其軍皆北邊五部之衆不閑軍法瞿正李友金不能制友金謂景思曰興大衆成大事當威名素著則可以伏人今軍雖數萬苟無善帥進亦無功吾兄李司徒父子去歲獲罪於國家今寄北部雄武之略為衆所推若驃騎急奏召還代北之人一麾響應則妖賊不足平也景思然之促奏行在天子乃以武皇為鴈門節度使案新唐書表中和二年以河東忻代二州隸鴈門節度更大同節度為鴈門節度治代州是中和二年以前鴈門非鎮名也據舊唐書初赦克用拜代州刺史忻代兵馬留後二年擢鴈門節度神策天寧軍鎮遏忻代觀察使是克用為鴈門節度實在二年薛史疑誤仍令以本軍討賊案新唐書王重榮傳重榮懼黃巢復振憂之與復光計復光曰我世與李克用共憂患其人忠不顧難死義如己若乞師焉事蔑不濟乃遣使者約連和舊五代史考異李友金發五百騎齎詔召武皇於達靼武皇即率達靼諸部萬人趨鴈門五月整兵二萬南嚮京師太原鄭從讜以兵守石嶺關武皇乃引軍出他道至太原城下會大雨班師於鴈門中和二年八月獻祖自達靼部率其族歸代州十月武皇率忻代蔚朔達靼之軍三萬五千騎蔚朔原本脫朔字今據冊府元龜所引薛史增入影庫本粘籤赴難於京師先移檄太原鄭從讜拒關不納武皇以兵擊之進軍至城下遣人齎幣馬遺從讜從讜亦遣人饋武皇貨幣饔餼軍器武皇南去自陰地趨晉絳十二月武皇至河中中和三年正月晉國公王鐸承制授武皇東北面行營都統武皇令其弟克修領前鋒五百騎渡河視賊黃巢遣將米重威齎重賂及偽詔以賜武皇武皇納其賂以給諸將燔其偽詔是時諸道勤王之師雲集京畿然以賊勢尚熾未敢爭鋒及武皇將至賊帥相謂曰鴉兒軍至當避其鋒武皇以兵自夏陽濟河二月營於乾坑店黃巢大將尚讓林言王璠趙璋等引軍十五萬屯於梁田陂梁田陂舊唐書作良天陂新唐書及歐陽史俱作良田陂蓋地名多用對音字故諸本不同惟通鑑從薛史作梁田陂今仍其舊影庫本粘籤翌日大軍合戰自午及晡巢賊大敗是夜賊衆遁據華州武皇進軍圍之巢弟黃鄴黃揆固守三月尚讓引大軍赴援武皇率兵萬餘逆戰於零口零口原本作陵口考新舊唐書及通鑑俱作零口胡三省云零口在京兆昭應縣今改正影庫本粘籤巢軍大敗武皇進軍渭橋翌日黃揆棄華州而遁王鐸承制授武皇鴈門節度使檢校尚書左僕射四月黃巢燔長安收其餘衆東走藍關武皇進收京師七月天子授武皇金紫光祿大夫檢校左僕射河東節度使案舊唐書僖宗紀五月制以鴈門以北行營節度忻代蔚朔等州觀察處置等使檢校尚書左僕射代州刺史上柱國食邑七百戶李克用檢校司空同平章事兼太原尹北京留守充河東節度管內觀察處置等使新唐書沙陀傳云收京師功第一進同中書門下平章事隴西郡公未幾以克用領河東節度所載官爵與薛史詳略互異又武皇領河東薛史作七月舊唐書作五月通鑑從薛史是時武皇既收長安軍勢甚雄諸侯之師皆畏之武皇一目微眇故其時號為獨眼龍是月武皇仗節赴鎮遣使報鄭從讜請治裝歸朝武皇次於郊外因往赴鴈門寧覲獻祖八月自鴈門赴鎮河東時年二十有八案舊唐書八月李克用赴鎮太原制以前振武節度檢校司空兼單于都護御史大夫李國昌為檢校司徒代州刺史鴈門以北行營節度蔚朔等州觀察使薛史作七月仗節赴鎮八月赴鎮河東蓋七月始離京師八月乃歸河東也通鑑統繫於七月似未詳考十一月平潞州表其弟克修為昭義節度使案通鑑克用表克修為昭義軍節度使在四年八月與薛史異潞帥孟方立退保於邢州十二月許帥田從異汴帥朱溫徐帥時溥陳州刺史趙犨各遣使來告以巢蔡合從凶鋒尚熾請武皇共力討賊中和四年春武皇率蕃漢之師五萬自澤潞將下天井關河陽節度使諸葛爽辭以河橋不完乃屯兵於萬善數日移軍自河中南渡趨汝洛案舊唐書四年二月河東節度使李克用將出師援陳許河陽節度使諸葛爽以兵屯澤州拒之三月甲戌克用移軍自河中南渡東下洛陽通鑑統作二月似未詳考四月武皇合徐汴之師破尚讓於太康斬獲萬計進攻賊於西華賊將黃鄴棄營而遁是夜大雨巢營中驚亂乃棄西華之壘退營陳州北故陽里五月癸亥大雨震電平地水深數尺賊營為水所漂而潰戊辰武皇引軍營於中牟大破賊於王滿渡庚午巢賊大至濟汴而北是夜復大雨賊黨驚潰武皇營於鄭州賊衆分寇汴境武皇渡汴遇賊將渡而南半濟擊之大敗之臨陣斬賊將李周王濟安陽景彪等陽景彪原本作易景考冊府元龜所引薛史及通鑑註俱作陽景彪今改正影庫本粘籤是夜賊大敗殘衆保於胙縣寃句大軍躡之黃巢乃攜妻子兄弟千餘人東走武皇追賊至於曹州是月班師過汴汴帥迎勞於封禪寺請武皇休於府第乃以從官三百人及監軍使陳景思館於上源驛是夜張樂陳宴席汴帥自佐饗出珍幣侑勸武皇酒酣戲諸侍妓與汴帥握手破賊事以為樂汴帥素忌武皇案梁紀作克用乘醉任氣帝不平之通鑑從梁紀今考新唐書沙傳亦作全忠忌克用桀邁難制與唐紀合蓋全忠之攻上源驛實忌其威名而欲害之非徒以其乘醉任氣也宜從唐紀乃與其將楊彥洪密謀竊發彥洪於巷陌連車樹柵以扼奔竄之路時武皇之從官皆醉俄而伏兵竊發來攻傳舍武皇方大醉譟聲動地從官十餘人捍賊侍人郭景銖滅燭扶武皇以茵幕裹之匿於下以水洒面徐曰汴帥謀害司空武皇方張目而起引弓抗賊有頃烟火四合復大雨震電武皇得從者薛鐵山賀回鶻等數人而去雨水如澍不辨人物隨電光登尉氏門縋城而出得還本營監軍陳景思大將史敬思並遇害武皇既還營與劉夫人相向慟哭詰旦欲勒軍攻汴夫人曰司空比為國家討賊赴東諸侯之急雖汴人謀害自有朝廷論列若反戈攻城則曲在我也人得以為辭乃收軍而去馳檄於汴帥汴帥報曰竊發之夜非僕本心是朝廷遣天使與牙將楊彥洪同謀也武皇自武牢關西趨蒲陝而旋秋七月至太原武皇自以累立大功為汴帥怨圖陷沒諸將乃上章申理及武皇表至朝廷大恐遣內臣宣諭尋加守太傅同平章事隴西郡王光啟元年三月幽州李可舉鎮州王景崇案新唐書沙傳作王景崇與薛史同舊唐書作王鎔與薛史異考藩鎮傳景崇以中和二年卒子鎔繼立是光啟初寇定州者當為王鎔非景崇也通鑑從舊唐書連兵寇定州節度使王處存求援於武皇武皇遣大將康君立安老薛可安老薛可原本作安考薛丁今從冊府元龜改正影庫本粘籤郭啜率兵赴之五月鎮人攻無極武皇親領兵救之案曲陽天安廟李克用題名碑云李克用以幽鎮侵擾中山領蕃漢步騎五十萬親來救援時中和五年二月二十一日也至三月十七日以幽州請就和斷遂却班師考舊唐書中和五年三月丙辰朔丁卯駕至京師己巳御宣正殿大赦改元是三月之十四日已改光啟曲陽去京師遠故未知耳又克用親援處存與通鑑遣將康君立異今考薛史武皇先遣康君立等與通鑑合繼乃親領兵救之與題名碑合惟薛史作五月碑作三月微有互異耳舊五代史考異鎮人退保新城武皇攻之斬首萬餘級獲馬千匹王處存亦敗燕軍於易州十一月河中王重榮遣使來乞師且言邠州朱玫鳳翔李昌符將加兵於己初武皇與汴人搆怨前後八表請削奪汴帥官爵自以本軍進討天子累遣內臣楊復恭宣旨令且全大體武皇不時奉詔天子頗右汴帥時觀軍容使田令孜君側擅權惡王重榮與武皇膠固將離其勢乃移重榮於定州案歐陽史作徙重榮于兗州考新唐書王重榮傳亦云令孜徙重榮兗海節度使與薛史異舊五代史考異重榮告於武皇武皇上章言李符朱玫挾邪忌正案歐陽史作李昌符蓋唐實錄避獻祖諱故去昌字舊五代史考異黨庇朱溫臣已點檢蕃漢軍五萬取來年渡河先斬朱玫李昌符然後平盪朱溫案新唐書王重榮傳詔克用將兵援河中重榮貽克用書且言奉密詔須公到使我圖公此令孜朱全忠朱玫之惑上也因示偽詔克用方與全忠有隙信之請討全忠及玫舊五代史考異天子覽表遣使譬喻百端軺傳相望既而朱玫引邠鳳之師攻河中王重榮出師拒戰朱玫軍於沙苑沙苑原本作河苑今從通鑑改正影庫本粘籤對壘月餘十二月武皇引軍渡河與朱玫決戰玫大敗收軍夜遁入于京師時京城大駭天子幸鳳翔武皇退軍於河中光啟二年正月僖宗駐蹕於寶雞武皇自河中遣使上章請車駕還京且言大軍止誅凶黨時田令孜請僖宗南幸興元武皇遂班師朱玫於鳳翔立嗣襄王熅為帝以偽詔賜武皇武皇燔之械其使馳檄諸方鎮遣使奉表於行在案舊唐書僖宗紀楊復恭兄弟於河中太原有破賊連衡之舊乃奏遣諫議大夫劉崇望齎詔宣諭達復恭之旨王重榮李克用欣然聽命尋遣使貢奉獻縑十萬匹願殺朱玫自贖是克用之奉僖宗因詔使宣諭而改圖也與薛史異新唐書沙陀傳云偽詔至太原克用燔之執其使間道奉表興元與薛史同歐陽史從舊唐書通鑑從薛史九月武皇遣昭義節度使李克修討孟方立於邢州大敗方立之衆於焦崗斬首數千級以大將安金俊為邢州刺史以撫其降人十月進攻邢州邢人出戰又敗之孟方立求援於鎮州鎮人出兵三萬以援方立克修班師光啟三年六月河中節度使王重榮為部將常行儒所殺武皇表重榮兄重盈為帥七月武皇以安金俊為澤州刺史時張全義自河陽據澤州及李罕之收復河陽召全義令守洛陽全義乃棄澤州而去故以金俊守之文德元年二月僖宗自興元還京三月僖宗崩昭宗即位以武皇為開府儀同三司檢校太師兼侍中隴西郡王食邑七千戶食實封二百戶河南尹張全義潛兵夜襲李罕之於河陽城陷舉族為全義所擄罕之踰垣獲免來歸於武皇遣李存孝薛阿檀史儼兒安金俊安休休將七千騎送罕之至河陽汴將丁會牛存節葛從周將兵赴援牛存節原本脫節字今據通鑑增入影庫本粘籤李存孝率精騎逆戰於溫縣汴人既扼太行之路存孝殿軍而退騎將安休休以戰不利奔於蔡武皇以罕之為澤州刺史遙領河陽節度使十月邢州孟方立遣大將奚忠信將兵三萬寇遼州武皇大破之斬首萬級生擒奚忠信龍紀元年五月遣李罕之李存孝攻邢州六月下磁州邢將馬溉率兵數萬來拒戰罕之敗之於琉璃陂生擒馬溉狥於城下孟方立恚恨飲酖而死三軍立其姪遷為留後案舊唐書昭宗紀歐陽史莊宗紀皆以孟遷為方立之弟新唐書孟方立傳作方立之子薛史武皇紀又作方立之姪未詳孰是使求援於汴汴將王虔裕率精甲數百入於邢州罕之等班師大順元年遣李存孝攻邢州孟遷以邢洺磁三州降執汴將王虔裕三百人以獻武皇徙孟遷於太原以安金俊為邢洺團練使三月昭義軍節度使李克修卒以李克恭為潞州節度使是月武皇攻雲州拔其東城赫連鐸求援於燕燕帥李匡威將兵三萬以赴之戰於城下燕軍大敗時徐州時溥為汴軍所攻遣使來求援武皇命石君和由兗鄆以赴之五月潞州軍亂殺節度使李克恭州人推牙將安居受為留後南結汴將時潞之小將馮霸擁叛徒三千騎駐於沁水居受使人召之馮霸不至居受懼出奔至長子長子原本作長千今從通鑑改正影庫本粘籤為村胥所殺傳首於霸霸遂入潞州自為留後武皇遣大將康君立李存孝等攻之汴將朱崇節葛從周率兵入潞州以固之是時幽州李匡威雲州赫連鐸與汴帥協謀連上表請加兵於太原宰相張濬孔緯贊成其事六月天子削奪武皇官爵案新唐書作五月舊五代史考異以張濬為招討使案新唐書本紀作張濬為河東行營都招討宣慰使張濬傳作河東行營兵馬招討制置使歐陽史作太原四面行營兵馬都統舊五代史考異以京兆尹孫揆為副華州韓建為行營都虞候案歐陽史作韓建為副使新唐書張濬傳作韓建為供軍使舊五代史考異以汴帥為河東南面招討使幽州李匡威為河東北面招討使雲州赫連鐸為副汴將朱友裕將兵屯晉絳時汴軍已據潞州又遣大將李讜等率軍數萬急攻澤州武皇遣李存孝自潞州將三千騎以援之汴將鄧季筠以一軍犯陣存孝追擊擒其都將十數人獲馬千餘匹是夜李讜收軍而退大軍掩擊至馬牢關斬首萬餘級追襲至懷州而還存孝復引軍攻潞州八月存孝擒新授昭義節度使孫揆案新唐書作七月戊申李克用執昭義節度使孫揆通鑑從薛史作八月舊五代史考異初朝廷授揆節鉞以本軍取刀黃嶺路赴任刀黃嶺原本作力黃嶺今從新舊唐書改正影庫本粘籤存孝偵知之引騎三百伏于長子縣崖谷間揆建牙持節褒衣大蓋擁衆而行存孝突出谷口遂擒揆及中使韓歸範幷將校五百人存孝械揆等以組練繫之環于潞州遂獻于武皇武皇謂揆曰公縉紳之士安言徐步可至達官何用如是揆無以對令繫於晉陽獄武皇將用為副使使人誘之揆言不遜遂殺之九月汴將葛從周棄潞州而遁武皇以康君立為潞州節度使以李存孝為汾州刺史十月張濬之師入晉州遊軍至汾隰武皇遣薛鐵山李承嗣將騎三千出陰地關營於洪洞遣李存孝將兵五千營於趙城華州韓建以壯士三百人冒犯存孝之營存孝追擊直壓晉州西門張濬之師出戰為存孝所敗案新唐書昭帝紀作十一月張濬及李克用戰于陰地敗績歐陽史亦作十一月與薛史先後互異舊五代史考異自是閉壁不出存孝引軍攻絳州絳州原本作鋒州今從通鑑改正影庫本粘籤十二月晉州刺史張行恭棄城而奔韓建張濬由含山路遁去大順二年春正月武皇上章申理其略曰臣今身無官爵名是罪人不敢歸陛下藩方且欲於河中寄寓進退行止伏候聖裁天子尋就加守中書令案歐陽史二月復拜克用河東節度使隴西郡王加檢校太師兼中書令舊五代史考異是月魏博為汴將葛從周所寇節度使羅弘信遣使來求援武皇出師以赴之三月邢州節度使安知建叛奔青州天子以知建為神武統軍自棣州泝河歸朝鄆州朱瑄邀斬於河上傳首晉陽以李存孝為邢州節度使四月武皇大舉兵討赫連鐸於雲州遣騎將薛阿檀率前軍以進攻武皇設伏兵於御河之上大破之因塹守其城七月武皇進軍柳會赫連鐸力屈食盡奔於吐渾部遂歸幽州雲州平武皇表石善友為大同軍防禦使邢州節度使李存孝以鎮州王鎔託附汴人謀亂河朔北連燕寇請乘雲代之捷平定燕趙武皇然之八月大蒐於晉陽遂南巡澤潞略地懷孟河陽趙克裕望風送款趙克裕原本作免裕今從薛史梁書改正影庫本粘籤請修隣好九月蒐於邢州十月李存孝董前軍攻臨城鎮人五萬營於臨城西北龍尾崗武皇令李存審李存賢以步軍攻之鎮人大敗殺獲萬計拔臨城進攻元氏幽州李匡威以步騎五萬營於鄗邑以援鎮州武皇分兵大掠旋軍邢州永樂大典卷一萬八千一百五十五
