body:
  text: 舊五代史卷一百一漢書三隱帝紀上隱皇帝諱承祐高祖第二子也母曰李太后以唐長興二年歲在辛卯三月七日生帝於鄴都之舊第高祖鎮太原署節院使節院原本作即院册府元龜作節院今改正影庫本粘籤纍官至檢校尚書右僕射國初授左衛大將軍檢校司空遷大內都點檢檢校太保乾祐元年正月二十七日高祖崩祕不發喪二月辛巳授特進檢校太尉同平章事封周王宣制畢有頃召文武百僚赴萬歲殿內降大行皇帝遺制云周王承祐可於柩前即皇帝位服紀日月一依舊制是日內外發哀成服初高祖欲改年號中書門下進擬乾和二字高祖改為乾祐至是與御名相符甲申羣臣上表請聽政詔答不允凡四上表從之丁亥帝於萬歲殿門東廡下見羣臣尊母后為皇太后己丑徐州節度使王周卒庚寅以前晉州留後劉在明為鎮州留後幽州馬步軍都部署加檢校太尉是日工部尚書龍敏卒壬辰右衛大將軍王景崇奏於大散關大敗蜀軍俘斬三千人初契丹犯京師侯益趙贊皆受其命節制岐蒲聞高祖入洛頗懷反仄朝廷移贊於京兆移贊于京兆下疑有脫文考册府元龜所引薛史與永樂大典同今仍其舊影庫本粘籤侯益與贊皆求援於蜀蜀遣何建率軍出大散關以應之至是景崇糾合岐雍邠涇之師以破之癸巳制大赦天下自乾祐元年二月十三日昧爽已前所犯罪人已結正未結正已發覺未發覺常赦所不原者咸赦除之中外文武臣僚並與加恩馬步將士各賜優給唐晉兩朝求訪子孫立為二王後云丙午鳳翔巡檢使王景崇遣人送所獲偽蜀將校軍士四百三十八人至闕下詔釋之仍各賜衣服以兵部侍郎張允為吏部侍郎以工部侍郎司徒詡為禮部侍郎丁未以光祿卿李式為尚書右丞以禮部侍郎邊歸讜為刑部侍郎以刑部侍郎盧價為兵部侍郎三月甲寅帝始御廣政殿羣臣起居殿中少監胡嵩上言請禁斫伐桑棗為薪城門所由專加捉搦從之丙辰鄴都留守太尉中書令臨清王高行周進封鄴王北京留守檢校太尉同平章事劉崇加宋州節度使兼侍衛親軍馬步軍都指揮使檢校太尉同平章事史弘肇並加檢校太師兼侍中前邢州節度使安叔千以太子太師致仕戊午以右諫議大夫于德辰為兵部侍郎庚申河中節度使檢校太師兼中書令李守貞加守太傅進封魯國公襄州節度使檢校太師兼中書令虢國公安審琦加守太保進封齊國公兗州節度使檢校太師兼侍中岐國公符彥卿加兼中書令進封魏國公許州節度使兼侍衛親軍副都指揮使檢校太尉同平章事劉信加檢校太師壬戌以宰臣竇貞固為山陵使吏部侍郎段希堯為副使太常卿張昭為禮儀使兵部侍郎盧價為鹵簿使御史中丞邊蔚為儀仗使丙寅以前鳳翔節度使兼西南面兵馬都部署檢校太師兼侍中侯益為開封尹加兼中書令案宋史侯益傳益率數十騎奔入朝隱帝遣侍中問益連結蜀軍之由益對曰臣欲誘之出關掩殺之耳隱帝笑之益厚賂史弘肇輩言王景崇之橫恣諸權貴深庇護之乃授以開封尹兼中書令舊五代史考異西京留守檢校太師平章事莒國公李從敏夏州節度使檢校太師同平章事李彝殷並加兼侍中青州節度使檢校太尉同平章事劉銖鄆州節度使檢校太尉同平章事慕容彥超並加檢校太師詔改廣晉府為大名府晉昌軍為永興軍戊辰靈州節度使檢校太師同平章事馮暉加兼侍中河陽節度使武行德滄州節度使王景華州節度使侯章晉州節度使王晏並依前檢校太尉加同平章事庚午涇州節度使史懿潞州節度使常思同州節度使張彥威延州節度使高允權並依前檢校太尉加同平章事澶州節度使郭從義邢州節度使薛懷讓並自檢校太傅加檢校太尉以前奉國右廂都指揮使王饒為鄜州留後甲戌以邠州節度使檢校太尉同平章事王守恩為永興軍節度使加檢校太師以滑州節度使檢校太尉郭謹為邠州節度使以前鎮州留後檢校太傅白再榮為滑州節度使加檢校太尉以陝州節度使檢校太尉同平章事趙暉為鳳翔節度使以前河中節度使檢校太尉同平章事白文珂為陝州節度使殿中監任廷皓配流鄜州坐為劉崇所奏故也丙子鄧州節度使劉重進相州節度使王繼弘安州節度使楊信並自檢校太傅加檢校太尉以鎮州留後兼幽州一行馬步軍都部署檢校太傅劉在明為鎮州節度使加檢校太師部署如故貝州節度使檢校太傅李殷加檢校太尉定州節度使檢校太尉孫方簡府州節度使檢校太傅折從阮並加檢校太師丁丑中書侍郎兼戶部尚書平章事李濤罷免勒歸私第時蘇逢吉等在中書樞密使楊邠副樞密使郭威等權勢甚盛中書每有除授多為邠等所抑濤不平之因上疏請出邠等以藩鎮授之樞密之務宜委逢吉禹圭疏入邠等知之乃見太后泣訴其事太后怒濤由是獲譴先是中書廚釜鳴者數四未幾濤罷免案宋史李濤傳濤請出邠等藩鎮以清朝政隱帝不能決白於太后太后召邠等諭之反為所搆免相歸第與薛史異舊五代史考異西道諸州奏河中李守貞謀叛發兵據潼關夏四月辛巳陝州兵馬監押王玉奏收復潼關定州孫方簡奏三月二十七日契丹棄定州遁去壬午以樞密使楊邠為中書侍郎兼吏部尚書平章事使如故以副樞密使郭威為樞密使加檢校太尉三司使王章加檢校太尉同平章事郢州刺史尹實奏荊南起兵在境上欲攻城是日以澶州節度使郭從義為永興軍一行兵馬都部署時供奉官時知化王益自鳳翔部署前永興節度使趙贊部下牙兵趙思綰等三百餘人赴闕三月二十四日行次永興思綰等作亂突入府城據城以叛故命從義帥師以討之案歐陽史云四月壬午永興軍將趙思綰叛附于李守貞案薛史趙思綰據城叛自在三月非四月事又思綰先據城叛後附于李守貞歐陽史先書李守貞反後書思綰叛亦誤也通鑑從薛史甲申王景崇奏趙思綰叛見起兵攻討丁亥幸道宮佛寺禱雨戊子東南面兵馬都元帥兩浙節度使檢校太師兼中書令吳越國王錢弘倧加諸道兵馬都元帥天策上將軍湖南節度使檢校太師兼中書令楚王馬希廣加守中書令以陝州節度使白文珂為河中府城下一行都部署庚寅宰臣竇貞固蘇逢吉蘇禹圭並進封開國公辛卯削奪李守貞在身官爵甲午以翰林學士承旨戶部侍郎王仁裕為戶部尚書以翰林學士左散騎常侍張沆為工部尚書以翰林學士中書舍人范質為戶部侍郎以樞密直學士尚書比部員外郎王度為祠部郎中並依前充職以侍衛步軍都指揮使尚洪遷充西南面行營都虞候案通鑑作西面行營都虞候孔本以客省使王峻為西南面行營兵馬都監戊戌以宣徽南院使扈彥珂為左金吾上將軍庚子以左金吾大將軍充兩街使檢校太傅劉承贇為徐州節度使甲辰以宣徽北院使薛可言為右金吾上將軍以皇城使李暉為宣徽南院使乙巳定州節度使孫方簡奏復入於本州初方簡為狼山寨主叛晉歸契丹及契丹降中渡之師乃以方簡為定州節度使契丹主死永康王嗣位即以蕃將耶律忠代之移方簡為雲州節度使方簡不受命遂歸狼山高祖至闕方簡歸款復以中山命之是歲三月二十七日契丹棄定州隳城壁焚室廬盡驅人民入蕃惟餘空城瓦礫而已至是方簡自狼山回保定州是月河決原武縣河北諸州旱徐州餓死民九百三十有七五月己酉朔國子監奏周禮儀禮公羊穀梁四經未有印板欲集學官考校雕造從之己未回鶻遣使朝貢丁卯前翰林學士徐台符自幽州逃歸乙亥河決滑州魚池六月戊寅朔日有食之庚辰以內客省使王峻為宣徽北院使依前永興城下兵馬都監以冀州牢城指揮使張廷翰為冀州刺史時廷翰殺本州刺史何行通自知州事故有是命甲申以皇弟右衛大將軍承勳為興元節度使檢校太尉同平章事豐州節度使郭勳加檢校太師辛卯永興兵馬都部署郭從義奏得王景崇報有兵自隴州來欲投河中追襲至鄜城荊南節度使高從誨上表歸命從誨嘗拒朝命至是方遣牙將劉扶詣闕請罪丙申鎮州奏節度使劉在明卒戊戌以河陽節度使武行德為鎮州節度使以宣徽南院使李暉為河陽節度使以相州節度使王繼弘為貝州節度使壬寅荊南高從誨貢奉謝恩釋罪丙午以前永興軍節度使王守恩為西京留守是月河北旱青州蝗秋七月戊申朔相州節度使王繼弘殺節度判官張易以訛言聞是時法尚深刻藩郡凡奏刑殺不究其實即順其請故當時從事鮮賓客之禮重足纍迹而事之猶不能免其禍焉壬子以工部侍郎李穀充西南面行營都轉運使乙卯禮儀使張昭上高祖廟尊號獻舞名並歌辭舞曲請以觀德為名歌辭不録丙辰以久旱幸道宮佛寺禱雨是日大澍開封府言陽武雍丘襄邑三縣蝗為鸜鵒聚食詔禁捕鸜鵒庚申樞密使郭威加同平章事辛酉滄州上言自今年七月後幽州界投來人口凡五千一百四十七北土飢故也乙丑以宣徽北院使王峻為宣徽南院使以內客省使吳虔裕為宣徽北院使戊辰以遂州節度使兼侍衛親軍馬軍都指揮使李洪信為澶州節度使以澶州節度使郭從義為永興軍節度使兼行營都部署庚午故兵部尚書李懌贈尚書左僕射鎮州奏準詔處斬節度副使張鵬訖鵬以一言之失為鄴帥高行周所奏故命誅之乙亥新授鳳翔節度使趙暉奏與八作使王繼濤領部下兵同赴鳳翔時王景崇拒命故也八月己卯以華州節度使侯章為邠州節度使以左金吾上將軍扈彥珂為華州度使壬午命樞密使郭威赴河中府軍前詔河府永興鳳翔行營諸軍一稟威節制時李守貞王景崇趙思綰連衡作叛朝廷雖命白文珂常思攻討河中物議以二帥非守貞之敵中外憂之及是命之降人情大愜案通鑑云自河中永興鳳翔三鎮拒命以來朝廷繼遣諸將討之昭義節度使常思屯潼關白文珂屯同州趙暉屯咸陽惟郭從義王峻置柵近長安而二人相惡如水火自春徂秋皆相仗莫肯攻戰帝患之欲遣重臣臨督壬午以郭威為西面軍前招慰安撫使諸軍皆受威節度與薛史所載詳略互異又案薛史周太祖紀云七月西面師徒大集未果進取其月十三日制授帝同平章事即遣西征據此紀則周太祖以七月庚申加同平章事八月壬午命赴河中府軍前非一時事也二紀前後自相矛盾歐陽史漢周本紀亦各仍薛史之舊未能參考畫一通鑑定從薛史漢紀癸巳以奉國左廂都指揮使閬州防禦使劉詞為夔州節度使充侍衛步軍都指揮使兼河中行營都虞候以護聖左廂都指揮使嶽州防禦使李洪義為遂州節度使充侍衛馬軍都指揮使乙未兩浙節度使檢校太尉兼侍中吳越國王錢弘俶加檢校太師兼中書令東南面兵馬都元帥弘俶故吳越王元瓘之子也先是其兄弘倧襲父位尋為部下所廢以弘俶代之故特加是命焉新授鳳翔節度使趙暉奏部署兵士赴鳳翔城下癸卯郭威奏今月二十三日大軍已抵河府賊城至二十六日開長連塹畢築長連城次九月戊申侯益部曲王守筠自鳳翔來奔言益家屬盡為王景崇所害壬子郭威奏破河府賊軍於城下甲寅故夔州節度使兼侍衛步軍都指揮使尚洪遷贈太尉乙丑雪書不時也戊辰鳳翔都部署趙暉奏大破川軍於大散關殺三千餘人其餘棄甲而遁案隆平集藥元褔從趙暉進討兵衆寡數倍他將皆為卻元褔擁數百騎獨出令曰敢回頭者斬衆效死以戰遂有成功舊五代史考異壬申郭威奏得郭從義報今月十四日鳳翔王景崇兵士離本城尋遣監軍李彥從率兵襲至法門寺西殺戮二千餘人詔升河中府解縣為解州冬十月丙子朔山陵使竇貞固上大行皇帝陵名曰睿陵從之丁丑夕歲星入太微戊寅趙暉奏破王景崇賊軍於鳳翔城下甲申吐番遣使獻方物丙戌右羽林將軍張播停任坐檢田受請託也丁亥中書舍人張誼責授房州司戶兵部郎中馬承翰責授慶州司戶並員外置所在馳驛發遣先是誼與承翰俱銜命于兩浙覩其驕僭之失形於譏誚兼乘醉有輕肆之言錢弘俶恥之托其過以奏之朝廷以方務懷柔故有是命甲辰延州奏夏州李彝殷先出兵臨州境夏州原本作雅州今從歐陽史改正影庫本粘籤欲應接李守貞今却抽退十一月甲寅誅太子太傅李嵩及其弟司封員外郎嶼國子博士夷其族為部曲誣告故也詔曰稔惡圖危難逃天網虧忠負義必速神誅李嵩頃在前朝最居重位略無裨益遂至滅亡及事契丹又為親密士民俱憤險佞可知先皇帝含垢掩瑕推恩念舊擢居一品俾列三師不謂潛有苞藏謀危社稷散差人使潛結姦凶俯近山陵擬為叛亂按其所告咸已伏辜宜正典章用懲姦逆其李嵩李嶼李一家骨肉及同謀作亂人並從極法云庚申大行皇帝靈駕進發辛酉荊南奏節度使高從誨卒壬申葬高祖皇帝於睿陵十二月丁丑荊南節度副使檢校太傅行峽州刺史高保融起復授荊南節度使檢校太尉同平章事渤海郡侯壬午帝被袞冕御崇元殿授六廟寶册正使宰臣蘇禹圭及副使大府卿劉皡赴西京行禮兗州奏淮賊先於沂州界立柵前月十七日已歸海州為李守貞牽制也案南唐書嗣主六年李守貞遣從事朱元李平奉表來乞師以潤州李金全為西面行營招撫使壽州劉彥貞為副諫議大夫查文徽為監軍使兵部侍郎魏岑為沿淮巡撫使聞河中平遽班師又李金全傳云出師沭陽諸將鋭于進取金全獨以為遠不相及乃止舊五代史考異庚寅奉高祖神主於西京太廟淮南偽主李璟奉書於帝云先因河府李守貞求援又聞大國沿淮屯軍當國亦於境上防備昨聞大朝收軍當國尋已徹備其商旅請依舊日通行朝廷不報辛卯羣臣上表請以三月九日誕聖日為嘉慶節從之延州節度使高允權奏得都頭李彥李遇等告太子太師致仕劉景巖與鄉軍指揮使高志結集草寇欲取臘辰窺圖州城尋請使臣與指揮使李勳聊將兵士巡檢偵邏劉景巖果出兵鬬敵時即殺敗其劉景巖尋獲斬之詔曰劉景巖年已衰暮身處退間曾無止足之心輒肆苞藏之毒結集徒黨窺伺藩垣所賴上將輸忠三軍協力盡除醜類克殄渠魁其劉景巖次男前德州刺史行琮已行極法長男渭州刺史行謙孫男邢州馬軍指揮使崇勳特放是冬多昏霧日晏方解永樂大典一萬六千二百二
