body:
  text: 每宴將校多暴其短一日每每宴將校多每每宴將校多暴其短一日每宴將校多暴其短一日永每宴將校多每每宴將校多暴其短一日永德乘醉乃大言重進潛畜姦謀當時將校無不驚駭繇是人情大擾後密遣親信乘驛上言世宗不聽亦不介意一日重進自壽陽去其部從直詣永德帳下宴飲終日而去自此人情稍安時李景覘而知之因密令人齎蠟書遺重進勸為不軌重進以其蠟書進呈世宗覽之皆斥讟反間之言世宗怒晟前言失實因急召侍衞都虞候韓通令收晟下獄與其從者百餘人皆誅之案南唐書云世宗命都承旨曹翰護至右軍巡院猶飲之酒數酌翰起曰相公得罪賜自盡忌怡然整衣索笏東南望再拜曰臣受恩深謹以死謝從者二百人亦皆誅死於東相國寺翌日宰臣上謁世宗親諭之始知其事實議者以晟昔每宴將校多暴其短一日永德乘醉乃大言重進潛畜姦謀當時將校無不驚駭繇是人情大擾後密遣親信乘驛上言世宗不聽亦不介意一日重進自壽陽去其部從直詣永德帳下宴飲終日而去自此人情稍安時李景覘而知之因密令人齎蠟書遺重進勸為不軌重進以其蠟書進呈世宗覽之皆斥讟反間之言世宗怒晟前言失實因急召侍衞都虞候韓通令收晟下獄與其從者百餘人皆誅之案南唐書云世宗命都承旨曹翰護至右軍巡院猶飲之酒數酌翰起曰相公得罪賜自盡忌怡然整衣索笏東南望再拜曰臣受恩深謹以死謝從者二百人亦皆誅死於東相國寺翌日宰臣上謁世宗親諭之始知其事實議者以晟昔搆禍於梁民今伏法於梁獄報應之道豈徒然哉晟性慷慨常感李景之厚遇誓死以報之案釣磯立談云晟將命周朝自知不免私謂副使王崇質曰吾思之熟矣終不忍負永陵一抔土餘非所知也及將下獄世宗令近臣問以江南可取之狀晟默然不對臨刑之際整其衣冠南望金陵再拜而言曰臣惟以死謝遂伏誅永樂大典卷三千五十一每宴將校多暴其短一日永德乘醉乃大言重進潛畜姦謀當時將校無不驚駭繇是人情大擾後密遣親信乘驛上言世宗不聽亦不介意一日重進自壽陽去其部從直詣永德帳下宴飲終日而去自此人情稍安時李景覘而知之因密令人齎蠟書遺重進勸為不軌重進以其蠟書進呈世宗覽之皆斥讟反間之言世宗怒晟前言失實因急召侍衞都虞候韓通令收晟下獄與其從者百餘人皆誅之案南唐書云世宗命都承旨曹翰護至右軍巡院猶飲之酒數酌翰起曰相公得罪賜自盡忌怡然整衣索笏東南望再拜曰臣受恩深謹以死謝從者二百人亦皆誅死於東相國寺翌日宰臣上謁世宗親諭之始知其事實議者以晟昔搆禍於梁民今伏法於梁獄報應之道豈徒然哉晟性慷慨常感李景之厚遇誓死以報之案釣磯立談云晟將命周朝自知不免私謂副使王崇質曰吾思之熟矣終不忍負永陵一抔土餘非所知也及將下獄世宗令近臣問以江南可取之狀晟默然不對臨刑之際整其衣冠南望金陵再拜而言曰臣惟以死謝遂伏誅永樂大典卷三千五十一每宴將校多暴其短一日永德乘醉乃大言重進潛畜姦謀當時將校無不驚駭繇是人情大擾後密遣親信乘驛上言世宗不聽亦不介意一日重進自壽陽去其部從直詣永德帳下宴飲終日而去自此人情稍安時李景覘而知之因密令人齎蠟書遺重進勸為不軌重進以其蠟書進呈世宗覽之皆斥讟反間之言世宗怒晟前言失實因急召侍衞都虞候韓通令收晟下獄與其從者百餘人皆誅之案南唐書云世宗命都承旨曹翰護至右軍巡院猶飲之酒數酌翰起曰相公得罪賜自盡忌怡然整衣索笏東南望再拜曰臣受恩深謹以死謝從者二百人亦皆誅死於東相國寺翌日宰臣上謁世宗親諭之始知其事實議者以晟昔搆禍於梁民今伏法於梁獄報應之道豈徒然哉晟性慷慨常感李景之厚遇誓死以報之案釣磯立談云晟將命周朝自知不免私謂副使王崇質曰吾思之熟矣終不忍負永陵一抔土餘非所知也及將下獄世宗令近臣問以江南可取之狀晟默然不對臨刑之際整其衣冠南望金陵再拜而言曰臣惟以死謝遂伏誅永樂大典卷三千五十一每宴將校多暴其短一日永德乘醉乃大言重進潛畜姦謀當時將校無不驚駭繇是人情大擾後密遣親信乘驛上言世宗不聽亦不介意一日重進自壽陽去其部從直詣永德帳下宴飲終日而去自此人情稍安時李景覘而知之因密令人齎蠟書遺重進勸為不軌重進以其蠟書進呈世宗覽之皆斥讟反間之言世宗怒晟前言失實因急召侍衞都虞候韓通令收晟下獄與其從者百餘人皆誅之案南唐書云世宗命都承旨曹翰護至右軍巡院猶飲之酒數酌翰起曰相公得罪賜自盡忌怡然整衣索笏東南望再拜曰臣受恩深謹以死謝從者二百人亦皆誅死於東相國寺翌日宰臣上謁世宗親諭之始知其事實議者以晟昔搆禍於梁民今伏法於梁獄報應之道豈徒然哉晟性慷慨常感李景之厚遇誓死以報之案釣磯立談云晟將命周朝自知不免私謂副使王崇質曰吾思之熟矣終不忍負永陵一抔土餘非所知也及將下獄世宗令近臣問以江南可取之狀晟默然不對臨刑之際整其衣冠南望金陵再拜而言曰臣惟以死謝遂伏誅永樂大典卷三千五十一每宴將校多暴其短一日永德乘醉乃大言重進潛畜姦謀當時將校無不驚駭繇是人情大擾後密遣親信乘驛上言世宗不聽亦不介意一日重進自壽陽去其部從直詣永德帳下宴飲終日而去自此人情稍安時李景覘而知之因密令人齎蠟書遺重進勸為不軌重進以其蠟書進呈世宗覽之皆斥讟反間之言世宗怒晟前言失實因急召侍衞都虞候韓通令收晟下獄與其從者百餘人皆誅之案南唐書云世宗命都承旨曹翰護至右軍巡院猶飲