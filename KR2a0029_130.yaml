body:
  text: 世宗鎮澶淵太祖以敏謹世宗鎮世宗鎮澶淵太世宗鎮澶淵世宗世宗世宗鎮澶淵世世世宗鎮澶淵太祖以世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦於曹州節度使李繼勳曹州原作洮州今從通鑑改正影庫本粘籤表為記室其後繼勳僨軍於壽春及歸闕而無待罪之禮世宗以繼勳武臣不之責也因遷怒南金謂其裨贊無狀乃黜之敏繇是連坐遂免其官歲餘復拜司農卿顯德四年秋以疾卒永樂大典卷六千八百五十一世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦於曹州節度使李繼勳曹州原作洮州今從通鑑改正影庫本粘籤表為記室其後繼勳僨軍於壽春及歸闕而無待罪之禮世宗以繼勳武臣不之責也因遷怒南金謂其裨贊無狀乃黜之敏繇是連坐遂免其官歲餘復拜司農卿顯德四年秋以疾卒永樂大典卷六千八百五十一世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦於曹州節度使李繼勳曹州原作洮州今從通鑑改正影庫本粘籤表為記室其後繼勳僨軍於壽春及歸闕而無待罪之禮世宗以繼勳武臣不之責也因遷怒南金謂其裨贊無狀乃黜之敏繇是連坐遂免其官歲餘復拜司農卿顯德四年秋以疾卒永樂大典卷六千八百五十一世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦於曹州節度使李繼勳曹州原作洮州今從通鑑改正影庫本粘籤表為記室其後繼勳僨軍於壽春及歸闕而無待罪之禮世宗以繼勳武臣不之責也因遷怒南金謂其裨贊無狀乃黜之敏繇是連坐遂免其官歲餘復拜司農卿顯德四年秋以疾卒永樂大典卷六千八百五十一世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦於曹州節度使李繼勳曹州原作洮州今從通鑑改正影庫本粘籤表為記室其後繼勳僨軍於壽春及歸闕而無待罪之禮世宗以繼勳武臣不之責也因遷怒南金謂其裨贊無狀乃黜之敏繇是連坐遂免其官歲餘復拜司農卿顯德四年秋以疾卒永樂大典卷六千八百五十一世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦於曹州節度使李繼勳曹州原作洮州今從通鑑改正影庫本粘籤表為記室其後繼勳僨軍於壽春及歸闕而無待罪之禮世宗以繼勳武臣不之責也因遷怒南金謂其裨贊無狀乃黜之敏繇是連坐遂免其官歲餘復拜司農卿顯德四年秋以疾卒永樂大典卷六千八百五十一世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦於曹州節度使李繼勳曹州原作洮州今從通鑑改正影庫本粘籤表為記室其後繼勳僨軍於壽春及歸闕而無待罪之禮世宗以繼勳武臣不之責也因遷怒南金謂其裨贊無狀乃黜之敏繇是連坐遂免其官歲餘復拜司農卿顯德四年秋以疾卒永樂大典卷六千八百五十一世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦於曹州節度使李繼勳曹州原作洮州今從通鑑改正影庫本粘籤表為記室其後繼勳僨軍於壽春及歸闕而無待罪之禮世宗以繼勳武臣不之責也因遷怒南金謂其裨贊無狀乃黜之敏繇是連坐遂免其官歲餘復拜司農卿顯德四年秋以疾卒永樂大典卷六千八百五十一世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦於曹州節度使李繼勳曹州原作洮州今從通鑑改正影庫本粘籤表為記室其後繼勳僨軍於壽春及歸闕而無待罪之禮世宗以繼勳武臣不之責也因遷怒南金謂其裨贊無狀乃黜之敏繇是連坐遂免其官歲餘復拜司農卿顯德四年秋以疾卒永樂大典卷六千八百五十一世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦於曹州節度使李繼勳曹州原作洮州今從通鑑改正影庫本粘籤表為記室其後繼勳僨軍於壽春及歸闕而無待罪之禮世宗以繼勳武臣不之責也因遷怒南金謂其裨贊無狀乃黜之敏繇是連坐遂免其官歲餘復拜司農卿顯德四年秋以疾卒永樂大典卷六千八百五十一世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦於曹州節度使李繼勳曹州原作洮州今從通鑑改正影庫本粘籤表為記室其後繼勳僨軍於壽春及歸闕而無待罪之禮世宗以繼勳武臣不之責也因遷怒南金謂其裨贊無狀乃黜之敏繇是連坐遂免其官歲餘復拜司農卿顯德四年秋以疾卒永樂大典卷六千八百五十一世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大