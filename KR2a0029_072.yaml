body:
  text: 舊五代史卷七十二唐書四十八列傳第二十四張承業字繼元本姓康同州人咸通中內常侍張泰畜為假子光啓中主郃陽軍事賜紫入為內供奉武皇之討王行瑜承業纍奉使渭北因留監武皇軍事賊平改酒坊使三年昭宗將幸太原以承業與武皇善乃除為河東監軍密令迎駕既而昭宗幸華州就加左監門衛將軍駕在鳳翔承業屢請出師晉絳以為岐人掎角崔魏公之誅宦官也宋初修五代史避太祖御名于唐宰相崔胤或稱為崔裔此傳又稱為崔魏公前後異稱殊失史家紀實之體今存其舊仍附識于此影庫本粘籤武皇偽戮罪人首級以奉詔匿承業於斛律寺昭宗遇弒乃復請為監軍夾城之役遣承業求援於鳳翔時河中阻絶自離石渡河春冰方泮凌澌奔舟不得渡因禱河神是夜夢神人謂曰子但渡流冰無患既寤津吏報曰河冰合矣凌晨躡冰而濟旋踵冰解使還武皇病篤啓手之夕召承業屬之曰吾兒孤弱羣臣縱橫後事公善籌之承業奉遺顧爰立嗣王平內難策略居多既終易月之制即請出師救潞破賊夾城莊宗深感其意兄事之親幸承業私第升堂拜母賜遺優厚時莊宗初行墨制墨制原本作里制今從通鑑改正影庫本粘籤凡除拜之命皆成於盧汝弼之手汝弼既自為戶部侍郎乃請與承業改官及開國邑承業拒而不受其後但稱本朝舊官而已天祐中幽州劉守光敗其府掾馮道歸太原承業辟為本院巡官承業重其文章履行甚見待遇時有周玄豹者善人倫鑒與道不合謂承業曰馮生無前程公不可過用管書記盧質聞之曰我曾見杜黃裳司空寫真圖道之狀貌酷類焉將來必副大用玄豹之言不足信也承業薦為霸府從事焉柏鄉之役王師既逼汴營周德威慮其奔衝堅請退舍莊宗怒其懦不聽垂帳而寢諸將不敢言事咸詣監軍請白承業遽至牙門褰帳而入撫莊宗曰此非王安寢時周德威老將洞識兵勢姑務萬全言不可忽莊宗蹶然而興曰豫方思之其夕收軍保鄗邑德威討劉守光令承業往視賊勢因請莊宗自行果成大捷承業感武皇厚遇自莊宗在魏州垂十年太原軍國政事一委承業而積聚庾帑收兵巿馬招懷流散勸課農桑成是霸基者承業之忠力也時貞簡太后韓德妃伊淑妃諸宅王之貴諸宅王之貴原本疑有舛誤今無可復考姑仍其舊影庫本粘籤洎王之介弟在晉陽宮或不以其道干於承業悉不聽踰法禁者必懲繇是貴戚斂手民俗丕變或有中傷承業於莊宗者言專弄威柄廣納賂遺莊宗歲時還晉陽宮省太后須錢蒱博給伶官嘗置酒於泉府莊宗酣飲命興聖宮使李繼岌為承業起舞既竟承業出寶帶幣馬奉之莊宗指錢積謂承業曰和哥無錢使七哥與此一積寶馬非殊惠也承業謝曰郎君歌舞承業自出己俸錢此錢是大王庫物準擬支贍三軍不敢以公物為私禮也莊宗不悅使酒侵承業承業曰臣老敕使非為子孫之謀惜錢為大王基業惜錢原本作借錢今從通鑑改正影庫本粘籤王若自要散施何妨老夫何妨老夫原本疑有訛字考册府元龜所引薛史與永樂大典同今仍其舊影庫本粘籤不過財盡兵散一事無成案通鑑作王自取用之何問僕為舊五代史考異莊宗怒顧元行欽曰取劍來承業引莊宗衣泣而言曰僕荷先王遺顧誓為本朝誅汴賊為王惜庫物斬承業首死亦無愧於先王今日請死閻寶解承業手令退承業詬寶曰黨朱溫逆賊未嘗有一言效忠而敢依阿諂附揮拳踣之太后聞莊宗酒失急召入莊宗性至孝聞太后召叩頭謝承業曰吾杯酒之間忤於七哥太后必怪吾七哥為吾痛飲兩巵分謗可乎莊宗連飲四鍾勸承業竟不飲莊宗歸宮太后使人謂承業曰小兒忤特進已笞矣可歸第翌日太后與莊宗俱幸其第慰勞之自是私謁幾絶十四年承制授開府儀同三司左衛上將軍左衛原本作右衛今從册府元龜改正影庫本粘籤燕國公固辭不受是時盧質在莊宗幕下嗜酒輕傲嘗呼莊宗諸弟為豚犬莊宗深銜之承業慮質被禍因乘間謂莊宗曰盧質多行無禮臣請為大王殺之可乎莊宗曰豫方招禮賢士以開霸業七哥何言之過也承業因聳立而言曰大王若能如此何憂不得天下其後盧質雖或縱誕莊宗終能容之蓋承業為之藻藉也十八年莊宗受諸道勸進將纂帝位承業以為晉王三代有功於國先人怒朱氏弒逆將復舊邦讎既未平不宜輕受推戴方疾作肩輿之鄴宮見莊宗曰王父子血戰三十餘年蓋言報國仇讎復唐宗社今元凶未滅民賦已殫而遽先大號𢀿耗財力臣以為不可一也臣自咸通已來咸通原本作成通今從唐書改正影庫本粘籤伏事宮掖每見國家册命大禮儀仗法物百司庶務經年草定臨事猶有不可王若化家為國新立廟朝不可乖於制度制禮作樂未見其人臣以為不可二也舉事量力而行不可信於遊談也案通鑑考異引秦再思洛中記異云承業諫帝曰大王何不待誅克梁孽更平吳蜀俾天下一家且先求唐氏子孫立之後更以天下讓有功者何人輒敢當之讓一月即一月牢讓一年即一年牢設使高祖再生太宗復出又胡為哉今大王一旦自立頓失從前仗義征伐之旨人情怠矣老夫是閹官不愛大王官職富貴直以受先王付屬之重欲為大王立萬年之基爾舊五代史考異莊宗曰奈諸將何承業知莊宗不從因號泣而言之十九年十一月二日以疾卒于晉陽之第案歐陽史作不食而卒通鑑作邑邑成疾不復起舊五代史考異時年七十七貞簡太后聞喪遽至其第盡哀為之行服如兒姪禮同光初贈左武衛上將軍諡曰貞憲永樂大典卷一萬六千四百五十案歐陽史作正憲舊五代史考異五代史闕文莊宗將即位於魏州承業自太原至謂莊宗曰吾王世奉唐家最為忠孝自貞觀以來王室有難未嘗不從所以老奴三十餘年為吾王捃拾財賦召補軍馬者誓滅逆賊朱溫復本朝宗社耳今河朔甫定朱氏尚存吾王遽即大位可乎云云莊宗曰奈諸將意何承業知不可諫止乃慟哭曰諸侯血戰者本為李家今吾王自取之誤老奴矣即歸太原不食而死臣謹按莊宗實録承業諫即位事甚詳惟吾王自取之言不書史官諱之也張居翰字德卿咸通初掖廷令張從玫養之為子以廕入仕中和三年自容管監軍判官入為學士院判官遷樞密承旨內府令賜緋昭宗在華下華下原本作華夏今據文改正影庫本粘籤超授內常侍出監幽州軍事秩滿詔歸節度使劉仁恭表留之天復中天復原本誤作天福今從唐書改正影庫本粘籤詔誅宦官仁恭紿奏殺之匿於大安山之北溪天祐三年汴人攻滄州仁恭求援於武皇乃遣居翰與書記馬郁等率兵助武皇同攻潞州武皇因留之不遣李嗣昭節制昭義以居翰監其軍監其軍原本作其事今據文改正影庫本粘籤以燕軍三千為部下俄而汴將李思安築夾城以圍潞州居翰與嗣昭登城保守以至解圍自是嗣昭每出征令居翰知留後事同光元年夏四月召為樞密使加特進與郭崇韜對掌機務十月莊宗將渡河留居翰與李紹宏同守魏州莊宗入汴加驃騎大將軍知內侍省事依前充樞密使同光時宦官干政邦家之務皆出於郭崇韜居翰自以羇旅乘時擢居重地每於宣授不敢有所是非承顏免過而已以此脫季年之禍四年三月偽蜀王衍既降詔遷其族於洛陽行及秦川時關東已亂莊宗慮衍為變遣中官向延嗣馳騎齎詔殺之詔云王衍一行並宜殺戮其詔已經印畫時居翰在密地覆視其詔即就殿柱揩去行字改書家字及衍就戮於秦川驛止族其近屬而已其偽官及從行者尚千餘人皆免其枉濫居翰之力也明宗入洛居翰謁見於至德宮待罪雪涕乞歸田里詔許之乃辭歸長安仍以其子延貴為西京職事以供侍養天成三年四月以疾卒於長安時年七十一居翰性和而靜諳悉舊事在潞州纍年每春課人育蔬種樹敦本惠農有仁者之心焉永樂大典卷一萬六千四百五十馬紹宏馬紹宏傳永樂大典疑有刪節今無可復考姑存其舊影庫本粘籤閹官也案莊宗實録作李紹宏蓋嘗賜姓舊五代史考異初與孟知祥同為中門使及周德威薨莊宗兼領幽州令紹宏權知州事即位之初郭崇韜勳望高舊在紹宏之下時徵潞州監軍張居翰與崇韜並為樞密使紹宏失望乃以為宣徽使紹宏以己合當樞密任案宋史趙上交傳南遊洛陽與中官驃騎大將軍馬紹宏善紹宏領北面轉運制置大使表為判官考紹宏為北面轉運制置大使薛史不載舊五代史考異常鬱鬱側目於崇韜崇韜知其慊也乃置內勾之目令天下錢穀簿書悉委裁遣既而州郡供報輒滋煩費議者以為十羊九牧深所不可內勾之目人以為是妖言永樂大典卷一萬九千六百四十四案下有闕文據通鑑李嗣源為謠言所屬危殆者數四賴宣徽使李紹宏左右營護以是得全天成元年二月己丑朔以宣徽南院使李紹宏為樞密使舊五代史考異孟漢瓊本鎮州王鎔之小豎也明宗鎮常山得侍左右明宗即位自諸司使纍遷宣徽南院使漢瓊性通黠善交構初見秦王權重及挾王淑妃勢傾心事之及朱馮用事朱馮用事原本作朱憑下文又有朱馮考通鑑明宗朱弘昭馮贇並掌財賦故稱朱馮原本憑字誤今改正影庫本粘籤又與之締結秦王領兵至天津橋時漢瓊與朱馮及康義誠方會議於內庭謀猶未決漢瓊獨出死力先入殿門奏於明宗語在秦王傳漢瓊即自介馬以召禁軍秦王既誅翌日令漢瓊馳騎召閔帝於鄴案通鑑遣漢瓊徵從厚且權知天雄軍府事舊五代史考異閔帝嗣位尤恃恩寵期月之內纍加開府儀同三司驃騎大將軍西軍既叛閔帝急召漢瓊欲令先入于鄴漢瓊藏匿不見潞王行及陝州乃悉召諸妓妾訣別欲手刃之衆知其心率皆藏竄初潞王失守於河中勒歸於清化里第時王淑妃恆令漢瓊傳教旨於潞王王善待之故漢瓊自謂潞王於己有恩至是乃單騎至澠池謁見潞王因自慟哭欲有所陳潞王曰諸事不言可知漢瓊即自預從臣之列尋戮於路左永樂大典卷一萬三千一百六十史臣曰承業感武皇之大惠佐莊宗之中興既義且忠何以階也夫如是則晉之勃貂秦之景監去之遠矣居翰改一字於詔書救千人之濫死可不謂之仁人矣乎如紹宏之爭權漢瓊之搆禍乃宦者之常態也又何足以道哉永樂大典卷一萬三千一百六十
