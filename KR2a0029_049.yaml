body:
  text: 舊五代史卷四十九唐書二十五后妃列傳第一武皇帝貞簡皇后曹氏莊宗之母也太原人以良家子嬪於武皇姿質間麗性謙退而明辨雅為秦國夫人所重常從容謂武皇曰妾觀曹姬非常婦人王其厚待之武皇多內寵乾寧初平燕薊得李匡儔妻張氏案原本避宋諱作李儔今據新唐書藩鎮傳增入舊五代史考異姿色絶代嬖幸無雙時姬侍盈室罕得進御唯太后恩顧不衰武皇性嚴急左右有過必峻於譴罰無敢言者唯太后從容救諫即為解顏及莊宗載誕體貌奇傑武皇異而憐之太后益寵貴諸夫人咸出其下后亦恭勤內助左右稱之武皇薨莊宗嗣晉王位時李克寧李存皓謀變人情危懼太后召監軍張承業指莊宗謂之曰先人把臂授公此兒如聞外謀欲孤付託公等但置豫母子有地毋令乞食于汴幸矣承業因誅存皓克寧以清內難莊宗善音律喜伶人謔浪太后嘗提耳誨之天祐七年鎮定求援莊宗促命治兵太后曰豫齒漸衰兒但不墜先人之業為幸矣何事櫛風沐雨離我晨昏莊宗曰稟先王遺旨須滅仇讎山東之事機不可失及發太后餞于汾橋案原本作渭橋今據通鑑注改正舊五代史考異悲不自勝莊宗平定趙魏駐于鄴城每一歲之內馳駕歸寧者數四民士服其仁孝太后初封晉國夫人莊宗即位命宰臣盧損奉冊書上皇太后尊號其年平定河南西幸洛陽令皇弟存渥皇子繼岌就太原迎奉莊宗親至懷州迎歸長壽宮太后素與劉太妃善分訣之後悒然不樂俄聞太妃寢疾尚醫中使問訊結轍既而謂莊宗曰吾與太妃恩如伯仲彼經年抱疾但見吾面差足慰心吾暫至晉陽旬朔與之俱來莊宗曰時方暑毒山路崎嶇無煩往復可令存渥輩迎侍太妃乃止及凶問至太后慟哭纍旬由是不豫尋崩于長壽宮同光三年冬十月上諡曰貞簡皇太后葬于壽安陵永樂大典卷一萬九千三百四太妃劉氏武皇之正室也永樂大典卷一千二百六十六案劉太妃傳永樂大典闕全篇考北夢瑣言云晉王李克用妻劉夫人常隨軍行至于軍機多所弘益先是汴州上源驛有變晉王憤恨欲回軍攻之夫人曰公為國討賊而以杯酒私忿必若攻城即曲在於我不如回師自有朝廷可以論列於是班退天復中周德威為汴軍所敗三軍潰散汴軍乘我晉王危懼與李存信議欲出保雲州夫人曰存信本北方牧羊兒也焉顧成敗王常笑王行瑜棄城失勢被人屠割今復欲效之何也王頃歲避難塞外幾遭陷害賴遇朝廷多事方得復歸今一旦出城便有不測之變焉能遠及晉王止行居數日亡散之士復集軍城安定夫人之力也五代會要云同光元年四月冊為皇太妃歐陽史云莊宗即位冊尊曹氏為皇太后而以嫡母劉氏為皇太妃太妃往謝太后太后有慚色太妃曰願吾兒享國無窮使吾獲沒于地以從先君幸矣復何言哉莊宗滅梁入洛使人迎太后歸洛居長壽宮而太妃獨留晉陽同光三年五月太妃薨魏國夫人陳氏襄州人本昭宗之宮嬪也乾寧二年武皇奉詔討王行瑜駐軍于渭北昭宗降朱書御札朱書御札原本作宋書御禮今據通鑑所引薛史改正影庫本粘籤出陳氏及內妓四人以賜武皇陳氏素知書有才貌武皇深加寵重及光化之後時事多艱武皇常獨居深念嬪媵鮮得侍謁唯陳氏得召見陳氏性既靜退不以寵侍自侈武皇常呼為阿媎及武皇大漸之際陳氏侍醫藥垂泣言妾為王執掃除之役十有四年矣王萬一不幸妾將何託既不能以身為殉願落髮為尼為王讀一藏佛經以報平昔武皇為之流涕及武皇薨陳氏果落髮持經法名智願後居於洛陽佛寺莊宗賜號建法大師天成中明宗幸其院改賜圓惠大師晉天褔中卒於太原追諡光國大師塔以惠寂為名也永樂大典二千九百六十九莊宗神閔敬皇后劉氏永樂大典卷一萬三千三百五十二案劉后傳永樂大典原闕考北夢瑣言云莊宗劉皇后魏州成安人家世寒微太祖攻魏州取成安得后時年五六歲歸晉陽宮為太后侍者教吹笙及笄姿色絶衆聲伎亦所長太后賜莊宗為韓國夫人侍者後誕皇子繼岌寵待日隆他日成安人劉叟詣鄴宮見上稱夫人之父有內臣劉建豐認之即昔日黃鬚丈人后之父也劉氏方與嫡夫人爭寵皆以門族誇尚劉氏恥為寒家白莊宗曰妾去鄉之時妾父死於亂兵是時環尸而哭妾固無父是何田舍翁詐僞及此乃於宮門笞之其實后即叟之長女也莊宗好俳優宮中暇日自負蓍囊藥篋令繼岌相隨以后父劉叟以醫卜為業也后方晝眠及造其臥內自稱劉衙推訪女后大恚笞繼岌然為太后不禮復以韓夫人居正無以發明大臣希旨請冊劉氏為皇后議者以后出於寒賤好興利聚財初在鄴都令人設法稗販所鬻樵蘇果茹亦以皇后為名正位之後凡貢奉先入後宮惟寫佛經施尼師他無所賜闕下諸軍困乏以至妻子饑殍宰相請出內庫俵給后將出葬具銀盆兩口皇子滿喜等三人令鬻以贍軍一旦作亂亡國滅族與夫褒姒妲己無異也先是莊宗自為俳優名曰李天下雜於塗粉優雜之間時為諸優朴抶摑搭竟為嚚婦恩伶之傾玷有國者得不以為前鑒劉后以囊盛金合犀帶四欲於太原造寺為尼沿路復通皇弟存渥同簀而寢明宗聞其穢即令自殺案歐陽史作裨將袁建豐得后納之晉宮而北夢瑣言作內臣劉建豐亦傳聞之異辭也淑妃韓氏莊宗正室永樂大典卷一千二百六十六案韓淑妃傳永樂大典原闕考五代會要云同光二年十二月冊以宰臣豆盧革韋說為冊使出應天門登路車鹵簿鼓吹前導至于永福門降車入右銀臺門至淑妃宮受冊于內文武百官立班稱賀德妃伊氏莊宗次室永樂大典卷一千二百六十六案伊德妃傳永樂大典原闕考北夢瑣言云莊宗皇帝嫡夫人韓氏後為淑妃伊氏為德妃契丹入中原石氏乞降宰相馮道奉尊冊契丹主大張宴席其國母后妃列坐同宴王嬙蔡姬之比也夫人夏氏最承恩寵後嫁李贊華所謂東丹王即阿保機長子先歸朝後除滑州節度使性酷毒侍婢微過即以刀刲火灼夏氏少長宮掖不忍其凶求離婚歸河陽節度使夏魯奇家後為尼也案歐陽史家人傳夏氏在天成初以先朝宮人出歸夏魯奇家後賜李贊華與北夢瑣言微異遼史又以夏氏為莊宗皇后疑誤又案五代會要莊宗朝內職又有昭儀侯氏封汧國夫人昭媛白氏封沂國夫人出使美宣鄧氏封魏國夫人御正楚真張氏封涼國夫人司簿德美周氏封宋國夫人侍真吳氏封延陵郡夫人懿才王氏封太原郡夫人咸一韓氏封昌黎郡夫人瑤芳張氏封清河郡夫人懿德王氏封琅琊郡夫人宣一馬氏封扶風郡夫人並同光二年十一月敕明宗昭懿皇后夏氏生秦王從榮及閔帝同光初后以疾崩明宗即位追封為晉國夫人長興中明宗以秦宋二王位望既隆因思從貴之義乃下制曰故晉國夫人夏氏素推仁德久睦宗親嘗施內助之方不見中興之盛豫當御極子並為王有鵲巢之高無翬衣之貴貞魂永逝懿範常存考本朝之文沿追冊之制將慰懷於九族冀叶慶於四星宜追冊為皇后兼定懿號既而有司上諡曰昭懿永樂大典卷一萬三千五百五十二和武顯皇后曹氏永樂大典卷一萬三千五百五十五案曹后傳永樂大典原闕考五代會要云天成三年正月冊為淑妃長興元年五月十四日冊為皇后應順元年閏正月冊為皇太后至清泰三年閏十一月隨末帝崩于後樓晉高祖使人護葬至天福五年正月二十八日追冊曰和武顯皇后宣憲皇后魏氏永樂大典卷一萬三千五百五十五案通鑑考異引唐廢帝實録云宣憲皇后魏氏鎮州平山人中和末明宗徇地山東留戍平山得魏后又云明宗為裨將性闊達不能治生曹后亦疏于畫略生計所資惟宣憲而已五代會要云初封魯國太夫人清泰二年二月中書門下奏臣聞漢昭帝承祚御歷奉尊諡于雲陽魏明帝繼體守文思外家于甄館而皆追崇徽號祔饗廟庭克隆敬本之文式叶愛親之道臣等又覽國史竊見玄宗皇帝母曰昭成皇后竇氏代宗皇帝母曰章敬太后吳氏始嬪朱邸俄閟玄宮鴻圖既屬于明君尊號咸追于聖母伏以魯國夫人發祥沙麓貽慶河州三后最賢周母允成于天統四妃有子唐后先啓于帝基仰惟當寧之情彌軫寒泉之思久虛殷薦慮損皇猷臣等謹上尊諡曰宣憲皇太后請依昭成皇太后故事擇日備禮冊命又臣等伏聞先太后舊陵未祔先祠則都下難崇別廟既追尊諡合創閟宮按漢朝故事園寢不在王畿或就陵所便立寢祠今商量上諡後權立同廟以申告獻配祠之禮請俟他年從之據歐陽史云議建陵寢而太原石敬瑭反乃于京師河南府東立寢宮又案五代會要所載明宗時內職德妃王氏天成三年正月冊立長興二年四月進號淑妃應順元年閏正月十三日冊為太妃至周廣順元年四月追諡賢妃昭儀王氏封齊國夫人昭容葛氏封周國夫人昭媛劉氏封趙國夫人孫氏封楚國夫人御正張氏封曹國夫人司寶郭氏封魏國夫人司贊于氏封鄭國夫人尚服王氏封衛國夫人司記崔氏封蔡國夫人司膳翟氏封滕國夫人司醞吳氏封莒國夫人婕妤高氏封渤海郡夫人美人沈氏封太原郡夫人順御朱氏封吳郡夫人司飾聊氏封潁川郡夫人司衣劉氏封彭城郡夫人司藥孟氏封咸陽郡夫人梳張氏封清河郡夫人司服王氏封太原郡夫人櫛傅氏封潁川郡夫人知客張氏賜號尚書故江氏追封齊陽郡夫人以上皆長興三年九月敕其名號皆中書門下按六典內職仿而行之內人李氏封隴西縣君崔氏封清河縣君李氏封成紀縣君田氏封咸陽縣君白氏封南陽縣君並長興四年二月敕前代內職皆無封君之禮此一時之制閔帝哀皇后孔氏永樂大典卷一萬三千五百五十五案孔后傳永樂大典原闕據通鑑云孔循陰遣人結王德妃求納其女德妃請娶循女為從厚妃帝許之庚寅皇子從厚納孔循女為妃五代會要云初封魯國夫人應順元年四月為末帝所害晉天褔五年正月二十八日追諡為哀皇后末帝劉皇后應州人也天成中封為沛國夫人清泰初百官三上表請立中宮遂立為皇后后性強戾末帝甚憚之故其弟延皓自鳳翔牙校環歲之間歷樞密使出為鄴都留守皆由后內政之力也及延皓為張令昭所逐張令昭原本脫張字今據通鑑增入影庫本粘籤執政請行朝典后力制之止從罷免而已晉高祖入洛后與末帝俱就燔焉永樂大典卷一萬九千三百四史臣曰昔三代之興亡雖由於帝王亦繫於妃后故夏之興也以塗山及其亡也以妹嬉商之興也以簡狄及其亡也以妲己周之興也以文母及其亡也以褒姒觀夫貞簡之為人也雖未偕於前代亦無虧於懿範而劉后以牝雞之晨皇業斯墜則與夫三代之興亡同矣餘無進賢輔佐之德又何足以道哉永樂大典卷一萬九千三百四案五代史無外戚傳據五代會要武皇長女瓊華長公主降孟知祥同光三年十二月封第二女瑤英長公主降張延釗同光三年十二月封明宗長女永寧公主降晉高祖第十三女興平公主降趙延壽天成三年四月封至長興四年九月改封齊國公主至清泰二年三月進封燕國長公主第十四女壽安公主長興四年六月封第十五女永樂公主長興四年六月封今考會要所載亦多舛互如瓊華公主十國春秋諸書作太祖弟克讓之女會要以為武皇長女此傳聞之異辭也莊宗女義寧公主降宋廷浩廷浩仕至房州刺史晉初為汜水關使張從賓之叛戰死見東都事略及宋史又王禹稱小畜集有宋渥神道碑云母義寧公主天褔中晉祖以嘗事莊宗有舊君之禮每貴主入見聽其不拜時兵戎方熾經費不充惟公主之家賜豫甚厚盡而復取亦無倦色一日晉祖從容謂貴主曰朕于主家無所愛惜但朝廷多事府庫甚虛主所知矣今輦轂之下桂玉為憂可命渥分司西京以豐就養因厚遣之且敕留使具晨昏伏臘之用至于醯醢率有備焉會要不載莊宗女是其闕略也歐陽史云延壽所尚公主已死耶律德光乃為延壽娶從益妹是為永安公主薛史趙延壽傳亦言其娶明宗小女為繼室而五代會要不載疑有闕文
