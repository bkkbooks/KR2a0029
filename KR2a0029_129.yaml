body:
  text: 史臣曰夫以稽古之力取史臣曰史臣曰夫以稽古史臣曰夫以稽古之力取秉鈞之位者豈常人乎然文紀躭於貨殖裔孫傷於齷齪則知全其德者鮮矣如成績之文彩玄錫之履行景範之純厚皆得謂之君子儒矣以之爰立何用不臧永樂大典卷二千三百九十二史臣曰夫以稽古之力取秉鈞之位者豈常人乎然文紀躭於貨殖裔孫傷於齷齪則知全其德者鮮矣如成績之文彩玄錫之履行景範之純厚皆得謂之君子儒矣以之爰立何用不臧永樂大典卷二千三百九十二史臣曰夫以稽古之力取秉鈞之位者豈常人乎然文紀躭於貨殖裔孫傷於齷齪則知全其德者鮮矣如成績之文彩玄錫之履行景範之純厚皆得謂之君子儒矣以之爰立何用不臧永樂大典卷二千三百九十二史臣曰夫以稽古之力取秉鈞之位者豈常人乎然文紀躭於貨殖裔孫傷於齷齪則知全其德者鮮矣如成績之文彩玄錫之履行景範之純厚皆得謂之君子儒矣以之爰立何用不臧永樂大典卷二千三百九十二史臣曰夫以稽古之力取秉鈞之位者豈常人乎然文紀躭於貨殖裔孫傷於齷齪則知全其德者鮮矣如成績之文彩玄錫之履行景範之純厚皆得謂之君子儒矣以之爰立何用不臧永樂大典卷二千三百九十二史臣曰夫以稽古之力取秉鈞之位者豈常人乎然文紀躭於貨殖裔孫傷於齷齪則知全其德者鮮矣如成績之文彩玄錫之履行景範之純厚皆得謂之君子儒矣以之爰立何用不臧永樂大典卷二千三百九十二史臣曰夫以稽古之力取秉鈞之位者豈常人乎然文紀躭於貨殖裔孫傷於齷齪則知全其德者鮮矣如成績之文彩玄錫之履行景範之純厚皆得謂之君子儒矣以之爰立何用不臧永樂大典卷二千三百九十二史臣曰夫以稽古之力取秉鈞之位者豈常人乎然文紀躭於貨殖裔孫傷於齷齪則知全其德者鮮矣如成績之文彩玄錫之履行景範之純厚皆得謂之君子儒矣以之爰立何用不臧永樂大典卷二千三百九十二史臣曰夫以稽古之力取秉鈞之位者豈常人乎然文紀躭於貨殖裔孫傷於齷齪則知全其德者鮮矣如成績之文彩玄錫之履行景範之純厚皆得謂之君子儒矣以之爰立何用不臧永樂大典卷二千三百九十二史臣曰夫以稽古之力取秉鈞之位者豈常人乎然文紀躭於貨殖裔孫傷於齷齪則知全其德者鮮矣如成績之文彩玄錫之履行景範之純厚皆得謂之君子儒矣以之爰立何用不臧永樂大典卷二千三百九十二
