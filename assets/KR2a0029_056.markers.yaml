  - {type: variant, offset: 897, length: 540, content: 俱作五里今改正影庫本粘籤營於野河上汴將韓勍率精兵三萬鎧甲皆被繒綺金銀炫曜望之森然我軍懼形於色德威謂李存璋曰賊結陣而來觀其形勢志不在戰欲以兵甲燿威耳我軍人乍見其來謂其鋒不可當此時不挫其銳吾軍不振矣乃遣存璋諭諸軍曰爾見此賊軍否是汴州天武健兒天武原本作太武考薛史前後俱作天武今改正影庫本粘籤皆屠沽傭販虛有表耳縱被精甲十不當一擒獲足以為資德威自率精騎擊其兩偏左馳右決出沒數四是日獲賊百餘人賊渡河而退德威謂莊宗曰賊驕氣充盛宜按兵以待其衰案歐陽史祇載德威勉諭其衆即告莊宗曰賊兵甚銳未可與爭不載精騎擊退賊兵之事考下文有去賊咫尺限此一渠水云云則賊渡河而退一節紀載殊不可闕舊五代史考異莊宗曰我提孤軍救難解紛三鎮烏合之衆利在速戰卿欲持重吾懼其不可使也德威曰鎮定之士長於守城列陣野戰素非便習我師破賊唯恃騎軍平田廣野易為施功今壓賊營令彼見我虛實則勝負未可必也莊宗不悅退臥帳中德威患之謂監軍張承業曰王欲速戰將烏合之徒欲當劇賊所謂不量力也去賊咫尺限此一渠水彼若早夜以略彴渡之吾族其為俘矣若退軍鄗邑引賊離營彼出則歸復以輕騎掠其芻餉不踚月敗賊必矣承業入言莊宗乃釋然德威得降人問之曰景仁下令造浮橋數日果如德威所料二十七日乃退軍保鄗邑八年正月二日德威率騎軍致師於柏鄉設伏於村塢間今三百騎以壓汴營三百騎原本作七百考通鑑, WYG: ''}
