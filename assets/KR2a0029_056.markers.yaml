  - {type: variant, offset: 2764, length: 419, content: 歐陽史義兒傳唯符存審不在其列別自為傳蓋存審子彥卿有女為宋太宗后故存其本姓也舊名存父楚本州牙將存審少豪俠多智算言兵家事乾符末河南盜起存審鳩率豪右庇捍州里會郡人李罕之起自羣盜授光州刺史因往依之中和末罕之為蔡寇所逼棄郡投諸葛爽存審從至河陽為小校屢戰蔡賊有功諸葛爽卒罕之為其部將所逼出保懷州懷州原本作淮州今從新唐書改正影庫本粘籤部下分散存審乃歸於武皇武皇署右職令典義兒軍賜姓名存審性謹厚寵遇日隆自是武皇西征存審常從所至立功從討赫連鐸冒刃死戰血流盈袖武皇手自封瘡日夕臨問乾寧初討李匡儔存審前軍拔居庸關明年從討邠州時邠之勁兵屯龍泉寨四面懸崖石壁險固存審奮力拔之師旋授檢校左僕射副李嗣昭討李瑭於汾州擒之以功改左右廂步軍都指揮使天祐三年授蕃漢馬步副指揮使與李嗣昭降丁會於上黨從周德威破賊於夾城加檢校司徒授忻州刺史領蕃漢馬步都指揮使七年加檢校太保充蕃漢副總管莊宗擊汴人於柏鄉留存審守太原三月代李存璋戍趙州九年梁祖攻蓨縣存審與史建瑭李嗣肱赴援嗣肱原本作嗣臆考, WYG: ''}
