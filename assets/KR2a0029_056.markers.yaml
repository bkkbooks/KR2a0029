  - {type: variant, offset: 2306, length: 218, content: 敵衆攻城僅二百日外援未至德威撫循士衆晝夜乘城竟獲保守十五年我師營麻口渡將大舉以定汴州德威自幽州率本軍至十二月二十三日軍次胡柳陂詰旦騎報曰汴軍至矣莊宗使問戰備德威奏曰賊倍道而來未成營壘我營柵已固守備有餘既深入賊疆須決萬全之策此去大梁信宿賊之家屬盡在其間人之常情孰不以家國為念以我深入之衆抗彼激憤之軍不以方略制之恐難必勝王但按軍保柵臣以騎軍疲之使彼不得下營際晚糧餉不給進退無據因以乘之破賊之道也莊宗曰河上終日挑戰恨不遇賊今款門不戰非壯夫也乃, WYG: ''}
