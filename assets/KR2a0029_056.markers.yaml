  - {type: variant, offset: 323, length: 170, content: 知名天復中我師不利於蒲縣汴將朱友寧氏叔琮來逼晉陽時諸軍未集城中大恐德威與李嗣昭選募銳兵出諸門攻其壘擒生斬馘汴人枝梧不暇乃退天祐三年與李嗣昭合燕軍攻潞州降丁會以功加檢校太保代州刺史代嗣昭為蕃漢都將李思安之寇潞州也德威軍於余吾時汴軍十萬築夾城圍潞州內外斷絕德威以精騎薄之屢敗汴人進營高河令遊騎邀其芻牧汴軍閉壁不出乃自東南山口築甬道樹柵以通夾城德, WYG: 徳}
