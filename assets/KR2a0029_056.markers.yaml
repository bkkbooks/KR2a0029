  - {type: variant, offset: 510, length: 368, content: 可勝紀梁有驍將黃角鷹方骨崙皆生致之五年正月武皇疾篤德威退營亂柳武皇厭代四月命德威班師時莊宗初立德威外握兵柄頗有浮議內外憂之德威既至單騎入謁伏靈柩哭哀不自勝由是羣情釋然是月二十四日從莊宗再援潞州二十九日德威前軍營橫碾案莊宗紀作黃展舊五代史考異橫碾通鑑作黃展今考冊府元龜引薛史亦作橫碾姑仍其舊影庫本粘籤距潞四十五里五月朔晨霧晦暝王師伏於三垂崗下翌日直趨夾城斬關破壘梁人大敗解潞州之圍初德威與李嗣昭有私憾武皇臨終顧謂莊宗曰進通忠孝不負我重圍累年似與德威有隙以吾命諭之若不解重圍歿有遺恨莊宗達遺旨德威感泣由是勵力堅戰竟破強敵與嗣昭歡愛如初以功加檢校太保同平章事振武節度使六年岐人攻靈夏遣使來求助德威渡河以應之師還授蕃漢馬步總管七年十一月汴人據深冀汴將王景仁軍八萬次柏鄉鎮州節度使王鎔來告難帝遣德威率前軍出井陘屯於趙州十二月帝親征二十五日進薄汴營, WYG: 載}
