  - {type: variant, offset: 1438, length: 461, content: 歐陽史俱作三百今改正影庫本粘籤王景仁悉其衆結陣而來德威轉戰而退汴軍因而乘之至於鄗邑南時步軍未成列德威陣騎河上以抗之亭午兩軍皆陣莊宗問戰時德威曰汴軍氣盛可以勞逸制之造次較力殆難與敵古者師行不踰一舍蓋慮糧餉不給士有饑色今賊遠來決戰縱挾糗糒亦不遑食晡晚之後饑渴內侵戰陣外迫士心既倦將必求退乘其勞弊以生兵制之縱不大敗偏師必喪以臣所籌利在晡晚諸將皆然之時汴軍以魏博之人為右廣宋汴之人為左廣自未至申陣勢稍却德威麾軍呼曰汴軍走矣塵埃漲天魏人收軍漸退莊宗與史建瑭安金全等因衝其陣夾攻之大敗汴軍殺戮殆盡王景仁李思安僅以身免獲將校二百八十人八月劉守光僭稱大燕皇帝十二月遣德威率步騎三萬出飛狐與鎮州將王德明定州將程嚴等軍進討九年正月收涿州降刺史劉知溫五月七日劉守光令驍將單廷珪督精甲萬人出戰單廷珪薛史唐本紀作單無敵前後異名辨證在唐紀影庫本粘籤德威遇於龍頭崗初廷珪謂左右曰今日擒周陽五既臨陣見德威廷珪單騎持槍躬追德威垂及德威側身避之廷珪少退德威奮檛擊墜其馬生獲廷珪賊黨大敗斬首三千級獲大將李山海等五十二人十二日德威自涿州進軍良鄉良鄉原本作宜卿今從, WYG: ''}
