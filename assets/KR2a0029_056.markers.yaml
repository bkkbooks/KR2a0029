  - {type: variant, offset: 3784, length: 1641, content: 年汴將劉鄩攻同州朱友謙求援於我遣存審與李嗣昭將兵赴之九月次河中進營朝邑時河中久臣於梁衆持兩端及諸軍大集芻粟暴貴嗣昭懼其翻覆將急戰以定勝負居旬日梁軍逼我營會望氣者言西南黑氣如鬬雞之狀當有戰陣存審曰我方欲決戰而形於氣象得非天贊歟是夜閱其衆詰旦進軍梁軍來迎戰大敗之追斬二千餘級自是梁軍保壘不出存審謂嗣昭曰吾初懼劉鄩據渭河偏師既敗彼若退歸懼我踵之獸窮搏人勿謂無事可開其歸路然後追奔乃令王建及牧馬於沙苑劉鄩尹皓知之保衆退去遂解同州之圍案歐陽史鄩以為晉軍且懈乃夜遁去存審追擊于渭河又大敗之舊五代史考異存審略地至奉先謁諸帝陵乃班師十八年王師討張文禮於鎮州李嗣昭李存進相次戰歿十九年遣存審率師進攻叛帥於城下文禮之將李再豐陰送款於存審李再豐原本作稱豐今據歐陽史改正影庫本粘籤我師中夜登城擒文禮之子處球等露布以獻鎮州平以功加檢校太傅兼侍中二十年正月師旋於魏州莊宗出城迎勞就第宴樂無何契丹犯燕薊郭崇韜奏曰汴寇未平繼韜背叛北邊捍禦非存審不可上遣中使諭之存審臥病羸瘠附奏曰臣効忠稟命靡敢為辭但痾恙纏綿未堪祗役既而詔存審以本官充幽州盧龍節度使自鎮州之任同光初加開府儀同三司檢校太師中書令食邑千戶賜號忠烈扶天啟運功臣十月平梁遷都洛陽存審以身為大將不得預收復中原之功舊疾愈作堅求入覲尋醫以情告郭崇韜時崇韜自負一時佐命之功無出己名功名事望素在存審之下權勢既隆人士輻湊不欲存審加於己上每有章奏求覲即陰沮之存審妻郭氏泣訴於崇韜曰吾夫於國粗効驅馳與公鄉里親舊公忍令死棄北荒何無情之如是崇韜益慚戁明年春疾甚上章懇切乞生覲天顏不許存審伏枕而歎曰老夫歷事二主垂四十年幸而遇今日天下一家遠夷極塞皆得面覲彤墀射鈎斬袪之人孰不奉觴丹陛獨予壅隔豈非命哉漸增危篤崇韜奏請許存審入覲四月制授存審宣武軍節度使宣武原本脫武字今據歐陽史增入影庫本粘籤諸道蕃漢馬步總管詔未至五月十五日卒於幽州官舍時年六十三遺命葬太原存審遺奏陳不得面覲詞旨悽惋莊宗震悼久之廢朝三日贈尚書令存審少在軍中識機知變行軍出師法令嚴明決策制勝從無遺悔功名與周德威相匹皆近代之良將也常戒諸子曰予本寒家少小攜一劍而違鄉里四十年間位極將相其間屯危患難履鋒冒刃入萬死而無一生身方及此前後中矢僅百餘乃出鏃以示諸子因以奢侈為戒存審微時嘗為俘囚將就戮於郊外臨刑指危垣謂主者曰請就戮於此下冀得壞垣覆尸旅魂之幸也主者哀之為移次焉遷延之際主將擁妓而飲思得歌者以助歡妓曰俘囚有符存審者妾之舊識每令擊節以贊歌令主將欣然馳騎而捨之豈非命也永樂大典卷一萬八千一百二十八彥超存審之長子也少事武皇累歷牙職存審卒莊宗以彥超為汾州刺史同光末魏州軍亂詔彥超赴北京巡檢先是朝廷令內官呂鄭二人在太原一監兵一監倉庫及明宗入洛皇弟存霸單騎奔河東與呂鄭謀殺彥超與留守張憲案歐陽史作張憲欲納存霸薛史作存霸謀殺張憲彥超兩史紀載微異舊五代史考異通鑑考異云薛史張憲傳作張憲謀奉存霸為主符彥超傳又作存霸謀殺彥超前後互異今附識于此影庫本粘籤彥超覺之密與憲謀未決部下大譟州兵畢集張憲出奔是夕軍士殺呂鄭存霸於衙城詰旦聞洛城禍變彥超告諭三軍案宋史張昭傳云昭為張憲推官莊宗及難聞鄴中兵士推戴明宗憲部將符彥超合戍將應之憲死有害昭者執之以送彥超彥超曰推官正人無得害之又逼昭為榜安撫軍民舊五代史考異明宗又令其弟龍武都虞候彥卿馳騎安撫六月彥超入覲明宗召見撫諭尋授晉州留後未行會其弟前曹州刺史彥饒平宣武亂軍明宗喜召彥超謂之曰吾得爾兄弟力餘更何憂爾為我往河東撫育耆舊即授北京留守太原尹明年冬移授昭義節度使四年授驍衞上將軍改金吾上將軍長興元年授泰寧軍節度使尋移鎮安州彥超廝養中有王希全者小字佛留粗知事計委主貨財歲久耗失甚多彥超止於訶譴而已應順元年正月佛留聞朝廷多事因與任貨兒等謀亂一夕扣門言朝廷有急遞至彥超出至廳事佛留挾刃害之詰旦本州節度副使李端召州兵攻佛留等殺之餘衆奔淮南擒彥超部將趙溫等二十六人誅之彥超贈太尉存審次子彥饒晉史有傳次彥卿歷官鳳翔節度使守太師中書令封魏王今居於洛陽次彥能終於楚州防禦使次彥琳仕皇朝為金吾上將軍卒於任永樂大典卷一萬八千一百二十八, WYG: 攷證}
