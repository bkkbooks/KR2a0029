  - {type: variant, offset: 988, length: 272, content: 防禦使支謨支謨原本作友模今從通鑑改正影庫本粘籤與同列晨集廨舍因戲升郡閣踞謨之座謨亦不敢詰乾符三年朝廷以段文楚為代北水陸發運雲州防禦使時歲薦饑文楚稍削軍食諸軍咸怨武皇為雲中防邊督將部下爭訴以軍食不充邊校程懷素王行審蓋寓李存璋薛鐵山康君立等即擁武皇入雲州衆且萬人營於鬬雞臺城中械文楚出以應於外諸將列狀以聞請授武皇旄鉞朝廷不允徵諸道兵以討之案舊唐書懿宗紀咸通十三年十二月李國昌小男克用殺雲中防禦使段文楚據雲州自稱防禦留後新唐書僖宗紀乾符五年二月癸酉雲中守捉使李克用殺大同防禦使段文楚歐陽史從舊唐書通鑑從新唐書薛史作乾符三年與諸書異據通鑑考異引趙鳳後唐, WYG: ''}
