  - {type: variant, offset: 2096, length: 352, content: 軍皆北邊五部之衆不閑軍法瞿正李友金不能制友金謂景思曰興大衆成大事當威名素著則可以伏人今軍雖數萬苟無善帥進亦無功吾兄李司徒父子去歲獲罪於國家今寄北部雄武之略為衆所推若驃騎急奏召還代北之人一麾響應則妖賊不足平也景思然之促奏行在天子乃以武皇為鴈門節度使案新唐書表中和二年以河東忻代二州隸鴈門節度更大同節度為鴈門節度治代州是中和二年以前鴈門非鎮名也據舊唐書初赦克用拜代州刺史忻代兵馬留後二年擢鴈門節度神策天寧軍鎮遏忻代觀察使是克用為鴈門節度實在二年薛史疑誤仍令以本軍討賊案新唐書王重榮傳重榮懼黃巢復振憂之與復光計復光曰我世與李克用共憂患其人忠不顧難死義如己若乞師焉事蔑不濟乃遣使者約連和舊五代史考異李友金發五百騎齎詔召武皇於達靼武皇即率達靼諸部萬人趨鴈門五月整兵二萬南嚮京師太原鄭從讜以兵守石嶺關武皇乃引軍出他道, WYG: 轍追}
