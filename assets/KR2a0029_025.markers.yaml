  - {type: variant, offset: 4554, length: 395, content: 考異鎮人退保新城武皇攻之斬首萬餘級獲馬千匹王處存亦敗燕軍於易州十一月河中王重榮遣使來乞師且言邠州朱玫鳳翔李昌符將加兵於己初武皇與汴人搆怨前後八表請削奪汴帥官爵自以本軍進討天子累遣內臣楊復恭宣旨令且全大體武皇不時奉詔天子頗右汴帥時觀軍容使田令孜君側擅權惡王重榮與武皇膠固將離其勢乃移重榮於定州案歐陽史作徙重榮于兗州考新唐書王重榮傳亦云令孜徙重榮兗海節度使與薛史異舊五代史考異重榮告於武皇武皇上章言李符朱玫挾邪忌正案歐陽史作李昌符蓋唐實錄避獻祖諱故去昌字舊五代史考異黨庇朱溫臣已點檢蕃漢軍五萬取來年渡河先斬朱玫李昌符然後平盪朱溫案新唐書王重榮傳詔克用將兵援河中重榮貽克用書且言奉密詔須公到使我圖公此令孜朱全忠朱玫之惑上也因示偽詔克用方與全忠有隙信之請討全忠及玫舊五代史考異天子覽表遣使譬喻百端軺傳相望既而朱玫引邠鳳之師攻河中王重榮出師拒戰朱玫軍於沙苑沙苑原本作河苑今從通鑑改正影庫本粘籤對壘月餘, WYG: 巻}
