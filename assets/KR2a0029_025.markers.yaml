  - {type: variant, offset: 1412, length: 238, content: 將拒關不納武皇略蔚朔之地得三千人屯神武川之新城赫連鐸晝夜攻圍武皇昆弟三人四面應賊俄而獻祖自蔚州引軍至吐渾退走自是軍勢復振天子以赫連鐸為大同軍節度使仍命進軍以討武皇乾符六年春朝廷以昭義節度使李鈞充北面招討使將上黨太原之師過石嶺關屯於代州與幽州李可舉會赫連鐸同攻蔚州獻祖以一軍禦之武皇以一軍南抵遮虜城以拒李鈞是冬大雪弓弩弦折南軍苦寒臨戰大敗奔歸代州李鈞中流矢而卒廣明元年春天子復命元帥李涿案歐陽史作招討使李琢通鑑亦作琢與薛史異舊五代史考異率兵數萬屯代州武皇令軍使傅文達起兵於蔚州朔, WYG: 滕}
