  - {type: variant, offset: 1653, length: 226, content: 高文集與薛葛安慶等部將案新唐書作薩葛首領米海萬安慶舊五代史考異薛葛安慶原本作薛曷女度今考冊府元龜所引薛史及新唐書通鑑諸書俱作薛葛安慶今改正影庫本粘籤縛文達送於李涿六月李涿引大軍攻蔚州獻祖戰不利乃率其族奔於達靼部居數月吐渾赫連鐸密遣人賂達靼以離間獻祖既而漸生猜阻武皇知之每召其豪右射獵於野或與之百步馳射馬鞭或以懸針樹葉為的中之如神由是部人心伏不敢竊發俄而黃巢自江淮北渡武皇椎牛釃酒饗其酋首酒酣喻之曰予父子為賊臣讒間報國無由今聞黃巢北犯江淮必為中原之患一日, WYG: ''}
