  - {type: variant, offset: 3615, length: 661, content: 濟汴而北是夜復大雨賊黨驚潰武皇營於鄭州賊衆分寇汴境武皇渡汴遇賊將渡而南半濟擊之大敗之臨陣斬賊將李周王濟安陽景彪等陽景彪原本作易景考冊府元龜所引薛史及通鑑註俱作陽景彪今改正影庫本粘籤是夜賊大敗殘衆保於胙縣寃句大軍躡之黃巢乃攜妻子兄弟千餘人東走武皇追賊至於曹州是月班師過汴汴帥迎勞於封禪寺請武皇休於府第乃以從官三百人及監軍使陳景思館於上源驛是夜張樂陳宴席汴帥自佐饗出珍幣侑勸武皇酒酣戲諸侍妓與汴帥握手破賊事以為樂汴帥素忌武皇案梁紀作克用乘醉任氣帝不平之通鑑從梁紀今考新唐書沙傳亦作全忠忌克用桀邁難制與唐紀合蓋全忠之攻上源驛實忌其威名而欲害之非徒以其乘醉任氣也宜從唐紀乃與其將楊彥洪密謀竊發彥洪於巷陌連車樹柵以扼奔竄之路時武皇之從官皆醉俄而伏兵竊發來攻傳舍武皇方大醉譟聲動地從官十餘人捍賊侍人郭景銖滅燭扶武皇以茵幕裹之匿於下以水洒面徐曰汴帥謀害司空武皇方張目而起引弓抗賊有頃烟火四合復大雨震電武皇得從者薛鐵山賀回鶻等數人而去雨水如澍不辨人物隨電光登尉氏門縋城而出得還本營監軍陳景思大將史敬思並遇害武皇既還營與劉夫人相向慟哭詰旦欲勒軍攻汴夫人曰司空比為國家討賊赴東諸侯之急雖汴人謀害自有朝廷論列若反戈攻城則曲在我也人得以為辭乃收軍而去馳檄於汴帥汴帥報曰竊發之夜非僕本心是朝廷遣天使與牙將楊彥洪同謀也武皇自武牢關西趨蒲陝而旋秋七月至太原武皇自以累立大功為汴帥怨圖陷沒諸將乃上章申理及武皇表至朝廷大恐遣內臣宣諭尋加守太傅同平章事隴西郡王光啟元年三月幽州李可舉鎮州王景崇案新唐書沙傳作王景崇與薛史同舊唐書作王鎔與薛史異考藩鎮傳景崇以中和, WYG: 乾化}
