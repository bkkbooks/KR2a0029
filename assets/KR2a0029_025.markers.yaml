  - {type: variant, offset: 480, length: 507, content: 節度使中和三年薨案新唐書沙傳光啟三年國昌卒與薛史異考舊唐書僖宗紀中和三年十月國昌卒與薛史同歐陽史亦從薛史莊宗即位追諡為文皇廟號獻祖武皇即獻祖之第三子也母秦氏以大中十年丙子歲九月二十二日生於神武川之新城在姙十三月載誕之際母艱危者竟夕族人憂駭市藥於鴈門遇神叟告曰非巫醫所及可馳歸盡率部人被甲持旄擊鉦鼓擊鉦原本作擊缸今從冊府元龜所引薛史改正影庫本粘籤躍馬大噪環所居三周而止族人如其教果無恙而生是時虹光燭室白氣充庭井水暴溢武皇始言喜軍中語齠齔善騎射與儕類馳騁嬉戲必出其右年十三見雙鳧翔於空射之連中衆皆臣伏新城北有毗沙天王祠祠前井一日沸溢武皇因持巵酒而奠曰予有尊主濟民之志無何井溢故未察其禍福惟天王若有神奇可與僕交談奠酒未已有神人被金甲持戈有神人被金甲持戈北夢瑣言作有龍形出于壁間蓋傳聞之異今附識于此影庫本粘籤隱然出於壁間見者大驚走唯武皇從容而退繇是益自負獻祖之討龐勛也武皇年十五從征摧鋒陷陣出諸將之右軍中目為飛虎子賊平獻祖授振武節度使武皇為雲中牙將嘗在雲中宿於別館擁妓醉寢有俠兒持刃欲害武皇及突入曲室但見烈火熾赫於帳中俠兒駭異而退又嘗與達靼部人角勝達靼指雙鵰於空中公能一發中否武皇即彎弧發矢連貫雙鵰邊人拜伏及壯為雲中守捉使, WYG: 漸委戎}
