  - {type: variant, offset: 4951, length: 2249, content: 月武皇引軍渡河與朱玫決戰玫大敗收軍夜遁入于京師時京城大駭天子幸鳳翔武皇退軍於河中光啟二年正月僖宗駐蹕於寶雞武皇自河中遣使上章請車駕還京且言大軍止誅凶黨時田令孜請僖宗南幸興元武皇遂班師朱玫於鳳翔立嗣襄王熅為帝以偽詔賜武皇武皇燔之械其使馳檄諸方鎮遣使奉表於行在案舊唐書僖宗紀楊復恭兄弟於河中太原有破賊連衡之舊乃奏遣諫議大夫劉崇望齎詔宣諭達復恭之旨王重榮李克用欣然聽命尋遣使貢奉獻縑十萬匹願殺朱玫自贖是克用之奉僖宗因詔使宣諭而改圖也與薛史異新唐書沙陀傳云偽詔至太原克用燔之執其使間道奉表興元與薛史同歐陽史從舊唐書通鑑從薛史九月武皇遣昭義節度使李克修討孟方立於邢州大敗方立之衆於焦崗斬首數千級以大將安金俊為邢州刺史以撫其降人十月進攻邢州邢人出戰又敗之孟方立求援於鎮州鎮人出兵三萬以援方立克修班師光啟三年六月河中節度使王重榮為部將常行儒所殺武皇表重榮兄重盈為帥七月武皇以安金俊為澤州刺史時張全義自河陽據澤州及李罕之收復河陽召全義令守洛陽全義乃棄澤州而去故以金俊守之文德元年二月僖宗自興元還京三月僖宗崩昭宗即位以武皇為開府儀同三司檢校太師兼侍中隴西郡王食邑七千戶食實封二百戶河南尹張全義潛兵夜襲李罕之於河陽城陷舉族為全義所擄罕之踰垣獲免來歸於武皇遣李存孝薛阿檀史儼兒安金俊安休休將七千騎送罕之至河陽汴將丁會牛存節葛從周將兵赴援牛存節原本脫節字今據通鑑增入影庫本粘籤李存孝率精騎逆戰於溫縣汴人既扼太行之路存孝殿軍而退騎將安休休以戰不利奔於蔡武皇以罕之為澤州刺史遙領河陽節度使十月邢州孟方立遣大將奚忠信將兵三萬寇遼州武皇大破之斬首萬級生擒奚忠信龍紀元年五月遣李罕之李存孝攻邢州六月下磁州邢將馬溉率兵數萬來拒戰罕之敗之於琉璃陂生擒馬溉狥於城下孟方立恚恨飲酖而死三軍立其姪遷為留後案舊唐書昭宗紀歐陽史莊宗紀皆以孟遷為方立之弟新唐書孟方立傳作方立之子薛史武皇紀又作方立之姪未詳孰是使求援於汴汴將王虔裕率精甲數百入於邢州罕之等班師大順元年遣李存孝攻邢州孟遷以邢洺磁三州降執汴將王虔裕三百人以獻武皇徙孟遷於太原以安金俊為邢洺團練使三月昭義軍節度使李克修卒以李克恭為潞州節度使是月武皇攻雲州拔其東城赫連鐸求援於燕燕帥李匡威將兵三萬以赴之戰於城下燕軍大敗時徐州時溥為汴軍所攻遣使來求援武皇命石君和由兗鄆以赴之五月潞州軍亂殺節度使李克恭州人推牙將安居受為留後南結汴將時潞之小將馮霸擁叛徒三千騎駐於沁水居受使人召之馮霸不至居受懼出奔至長子長子原本作長千今從通鑑改正影庫本粘籤為村胥所殺傳首於霸霸遂入潞州自為留後武皇遣大將康君立李存孝等攻之汴將朱崇節葛從周率兵入潞州以固之是時幽州李匡威雲州赫連鐸與汴帥協謀連上表請加兵於太原宰相張濬孔緯贊成其事六月天子削奪武皇官爵案新唐書作五月舊五代史考異以張濬為招討使案新唐書本紀作張濬為河東行營都招討宣慰使張濬傳作河東行營兵馬招討制置使歐陽史作太原四面行營兵馬都統舊五代史考異以京兆尹孫揆為副華州韓建為行營都虞候案歐陽史作韓建為副使新唐書張濬傳作韓建為供軍使舊五代史考異以汴帥為河東南面招討使幽州李匡威為河東北面招討使雲州赫連鐸為副汴將朱友裕將兵屯晉絳時汴軍已據潞州又遣大將李讜等率軍數萬急攻澤州武皇遣李存孝自潞州將三千騎以援之汴將鄧季筠以一軍犯陣存孝追擊擒其都將十數人獲馬千餘匹是夜李讜收軍而退大軍掩擊至馬牢關斬首萬餘級追襲至懷州而還存孝復引軍攻潞州八月存孝擒新授昭義節度使孫揆案新唐書作七月戊申李克用執昭義節度使孫揆通鑑從薛史作八月舊五代史考異初朝廷授揆節鉞以本軍取刀黃嶺路赴任刀黃嶺原本作力黃嶺今從新舊唐書改正影庫本粘籤存孝偵知之引騎三百伏于長子縣崖谷間揆建牙持節褒衣大蓋擁衆而行存孝突出谷口遂擒揆及中使韓歸範幷將校五百人存孝械揆等以組練繫之環于潞州遂獻于武皇武皇謂揆曰公縉紳之士安言徐步可至達官何用如是揆無以對令繫於晉陽獄武皇將用為副使使人誘之揆言不遜遂殺之九月汴將葛從周棄潞州而遁武皇以康君立為潞州節度使以李存孝為汾州刺史十月張濬之師入晉州遊軍至汾隰武皇遣薛鐵山李承嗣將騎三千出陰地關營於洪洞遣李存孝將兵五千營於趙城華州韓建以壯士三百人冒犯存孝之營存孝追擊直壓晉州西門張濬之師出戰為存孝所敗案新唐書昭帝紀作十一月張濬及李克用戰于陰地敗績歐陽史亦作十一月與薛史先後互異舊五代史考異自是閉壁不出存孝引軍攻絳州絳州原本作鋒州今從通鑑改正影庫本粘籤十二月晉州刺史張行恭棄城而奔韓建張濬由含山路遁去大順二年春正月武皇上章申理其略曰臣今身無官爵名是罪人不敢歸陛下藩方且欲於河中寄寓進退行止伏候聖裁天子尋就加守中書令案歐陽史二月復拜克用河東節度使隴西郡王加檢校太師兼中書令舊五代史考異是月魏博為汴將葛從周所寇節度使羅弘信遣使來求援武皇出師以赴之三月邢州節度使安知建叛奔青州天子以知建為神武統軍自棣州泝河歸朝鄆州朱瑄邀斬於河上傳首晉陽以李存孝為邢州節度使四月武皇大舉兵討赫連鐸於雲州遣騎將薛阿檀率前軍以進攻武皇設伏兵於御河之上大破之因塹守其城七月武皇進軍柳會赫連鐸力屈食盡奔於吐渾部遂歸幽州雲州平武皇表石善友為大同軍防禦使邢州節度使李存孝以鎮州王鎔託附汴人謀亂河朔北連燕寇請乘雲代之捷平定燕趙武皇然之八月大蒐於晉陽遂南巡澤潞略地懷孟河陽趙克裕望風送款趙克裕原本作免裕今從薛史梁書改正影庫本粘籤請修隣好九月蒐於邢州十月李存孝董前軍攻臨城鎮人五萬營於臨城西北龍尾崗武皇令李存審李存賢以步軍攻之鎮人大敗殺獲萬計拔臨城進攻元氏幽州李匡威以步騎五萬營於鄗邑以援鎮州武皇分兵大掠旋軍邢州永樂大典卷一萬八千一百五十五, WYG: ''}
