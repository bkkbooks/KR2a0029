  - {type: variant, offset: 52, length: 3, content: 准勅遷, WYG: 貫之失先是梁時張全義專制京畿河南洛陽寮佐皆由其門下事全義如厮僕及貫授命持本朝事體奉全義稍慢部民為府司庇䕶者必奏正之全義怒因令女使告劉皇后從容白于莊宗宦官又言其短莊宗深怒之會莊宗幸夀安山陵道路泥濘莊宗訪其主者宦官曰屬河南縣促令召貫至奏曰臣初不奉命請詰稟命者帝曰卿之所部反問他人何也命下府獄府吏榜笞促令伏欵翌日𫝊詔殺之郭崇韜奏曰貫別無贓狀橋道不修法未當死莊宗怒曰母后靈駕將發天子車輿往來橋道不修是誰之過也崇韜奏曰貫縱有死罪俟欵狀上奏所司議讞以朝典行之死當未晩今以萬乘之尊怒一縣令俾天下人言陛下使法不公矣莊宗曰既卿所愛任卿裁决因投袂入宫崇韜從而論列莊宗自闔殿門不得入即令伏法曝屍于府門寃痛之聲聞于逺邇淳于晏以下有闕文以明經登第自霍彥威為小校晏寄食于門下彥威常因兵敗獨脱其身左右莫有從者惟晏杖劍從之徒步草莽自是彥威髙其義相得甚歡及歴數鎮皆為從事軍府之事至于私門事無巨細俱取決于晏雖為幕賓有若家宰爾後公侯門客往往効之時謂之効淳故彥威所至稱治由晏之力也以下殘闕張格字承之故宰相濬之子也濬為梁祖所忌潛遣人害于長水格易姓名流轉入蜀舊唐書張濬𫝊永寧縣吏葉彥者張氏待之素厚告格曰相公之禍不可免郎君宜自為計濬曰留則併命去或可免冀存後嗣格拜辭而去葉彥率義士三十人送渡}
