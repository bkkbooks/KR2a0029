  - {type: variant, offset: 51, length: 0, content: '', WYG: 疏駮令式罪人也羅貫不知何許人進士及第累歴臺省官自禮部員外郎為河南令貫為人强直正身奉法不避權豪時宦官伶人用事凡請託于貫者其書盈閤一無所報皆以示郭崇韜因奏其事由是左右每}
