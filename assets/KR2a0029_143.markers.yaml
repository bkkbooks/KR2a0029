  - {type: variant, offset: 48, length: 0, content: '', WYG: 少卿梁代諸王納嬪公主下嫁皆于宫殿門庭行揖讓之禮縞以為非禮上疏止之物議以為然以下有闕文長興四年為户部侍郎縞時年已八十及為國子祭酒八十餘矣形氣不衰于事多遺忘言元稹不應進士以父元魯山名進故也多如此類又上疏古者無嫂叔服文皇創意以兄弟之親不宜無服乃議服小功今令文省服制條為兄弟之妻大功不知何人議改而寘于令文諸博士駮云律令國之大經馬縞知}
