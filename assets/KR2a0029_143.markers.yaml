  - {type: variant, offset: 1, length: 2, content: 廣順, WYG: 終于邑宰藥縱之太原人少為儒明宗刺代州署為軍事衙推從明宗鎮邢州為掌書記厯天平宣武兩鎮節度副使明宗鎮常山被病不從及即位縱之見于洛邑安重誨怒其觀望久無所授明宗曰徳勝用兵時縱之饑寒相伴不離我左右今有天下何人不富貴何為獨棄縱之浹旬授磁州刺史嵗餘自户部侍郎遷吏部侍郎銓總之法惘然莫知長興初為曹州刺史清泰}
