markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書舊五代史巻七十一宋門下侍郎參知政事監修國史薛居正等撰唐書第四十七列傳二十三馬郁其先范陽人郁少警悟有俊才智數言辨縱横下筆成文乾寧末為府刀筆小吏李匡威為王鎔所殺鎔書報其弟匡儔匡儔遣使于鎔問謀亂本末幕客為書多不如旨郁時直記室即起草為之條列事狀云可疑者十詞理俊贍以此知名嘗聘王鎔于鎮州官妓有轉轉者美麗善歌舞因宴席郁累挑之幕客張澤亦以文章名謂郁曰子能座中成賦可以此妓奉酬郁抽筆操紙即時成賦擁妓而去郁在武皇幕累官至檢校司空秘書監武皇與莊宗禮遇俱厚嵗時給賜優異監軍張承業本朝舊人權貴任事人士脅肩低首候之郁以滑稽侮狎其往如歸有時直造卧内每賓僚宴集承業出珍果陳列于前食之必盡承業私戒主膳者曰他日馬監至唯以乾藕子置前而已郁至窺其不可啖異日鞾中出一鐵撾碎而食之承業大笑曰為公設異饌勿敗余食案其俊率如此郁在莊宗幕寄寓他土年老思鄉每對莊宗欷歔言家在范陽乞骸歸國以𦵏舊山莊宗謂之曰自卿去國巳來同舍孰在守光尚不能容父能容卿乎孤不惜卿行但卿不得死爾郁既無歸路衷懷嗚悒竟卒于太原司空頲貝州人唐僖宗時舉進士不中屬天子播遷三輔大亂乃還鄉里羅紹威為節度副大使頲以所業干之幕客公乘億為延譽羅𢎞信署為府參軍辟館驛巡官張彦之亂命判官王正言草奏正言素不能文不能下筆彥怒詬曰鈍漢乃辱我推之下榻問孰可草奏者有言頲羅王時書記乃馳騎召之頲揮筆成文詆斥梁君臣彥甚喜以為判官及張彥復脅賀徳倫降于唐徳倫遣頲先奉狀太原比夢瑣言載其狀詞云屈原哀郢本非怨望之人樂毅歸燕且異傾邪之行莊宗仍以頲為判官後以頲權軍府事頲有姪在梁遣家奴以書召之都虞候張裕擒其家奴以謂通于梁遂見殺通鑑晉王責頲曰自吾得魏博庶事悉以委公公何得見欺如是獨不可先相示耶揖令歸第是日族誅于軍門曹廷隠魏州人也為本州典謁虞候賀徳倫使西迎莊宗于晉陽莊宗既得鄴城擢為馬步都虞候以其稱職自是遷拜日隆天成初除齊州防禦使下車嚴整頗有清白之譽時有孔目史范弼者為人剛愎視廷隐蔑如也弼監軍廩鬻空乏以取貲又私貨官鹽廷隐按之遂奏其事弼家人訢于執政並下御史府劾之弼雖伏法廷隐以所奏不實亦流永州續勅賜自盡時人寃之蕭希甫宋州人也少舉進士為梁開封尹袁象先書記象先為青州節度使以希甫為巡官希甫不樂乃棄其母妻變姓名亡之鎮州自稱青州掌書記進謁王鎔鎔以希甫為參軍尤不樂居嵗餘又亡之易州削髮為僧居百丈山莊宗將建國置百官李紹宏薦為魏州推官同光初有詔定内宴儀問希甫樞密使得坐否希甫以為不可樞密使張居翰聞之怒謂希甫曰老夫歴事三朝天子見内宴數百子本田舍兒安知宫禁事希甫不能對初莊宗欲以希甫知制誥宰相豆盧革等附居翰共排斥之以為駕部郎中希甫失志尤怏怏莊宗滅梁室遣希甫宣慰青齊希甫始知其母已死妻袁氏以改嫁希甫乃發哀服䘮居于魏州人有引漢李陵書以譏之曰老母終堂生妻去室天成初欲召為諫議豆盧革韋説沮之明宗卒以希甫為諫議大夫復為匭函使其後革説為安重誨所惡希甫希旨誣奏革縱田客殺人而説與鄰人争井井有寶貨有司推勘井中惟破釡而巳革説卒皆貶死希甫拜左散騎常侍躁進尤甚引告變人李筠夜扣内門通變書云修堤兵士欲取郊天日舉火為叛安重誨不信之斬告變者軍人訴屈請希甫啖之既而詔曰右散騎常侍集賢殿學士判院事蕭希甫身處班行職非警察輒引兇狂之輩上陳誣骩之詞逼近郊禋扇搖軍衆李筠既當誅戮希甫寧免謫遷可貶嵐州司户參軍仍馳驛發遣長興中卒于貶所子士明仕}
