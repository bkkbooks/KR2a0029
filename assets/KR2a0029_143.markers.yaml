  - {type: variant, offset: 58, length: 1, content: 昇, WYG: 蜀王建僭號以格為宰相格所生母當濬之遇害潛匿于民間落髮為尼流浪于函洛王建聞之潛使人迎之入蜀賜紫加號慈福大師及建卒蜀人以格為山陵使格有難色未幾得罪出為茂州刺史偽制責詞云送往辭命不忠也喪母匿喪非孝也王衍嗣偽位後數年復用為宰相同光末蜀}
