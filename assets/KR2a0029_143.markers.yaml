  - {type: variant, offset: 62, length: 0, content: '', krp: 家又攷張濬第三子仕吳改名李儼見九國志授太子賓客任圜愛其才奏為三司副使尋卒于位格有文章明吏事時頗稱之許寂字閑閑祖祕名聞會稽寂少有山水之好汎覽經史窮三式尤明易象太平廣記云寂學易于晉徴君久棲四明山不干時譽昭宗聞其名徵赴闕召對于内殿會昭宗方與伶人調品篳篥事訖方命坐賜果問易義既退寂謂人曰君淫在聲不在政矣寂聞君人者將昭徳塞違以臨照百官百官或象之今不厭賤事自求其工君道替矣尋請還山寓居于江陵以茹芝絶粒自適其性天祐末節度使趙匡凝昆季深禮遇之師授保養之道}
  - {type: punctuation, offset: 63, content: 、, id: KR2a0029_ZHSJ_143-bkkpn6}
  - {type: variant, offset: 63, length: 0, content: '', WYG: 末除諫官不起漢南謂之徵君梁攻襄陽匡凝兄弟棄鎮奔蜀寂偕行嵗餘蜀主王建待以師禮位至蜀相同光末平蜀與王衍俱從于東授工部尚書致仕卜居于洛時寂已年髙精彩猶徤冲漠寡言時蜀語云可恠可恠人莫知其際清泰三年六月卒時年八十餘子孫位至省郎同光時以方術著者又有僧誠惠誠惠初于五臺山出家能修戒律稱通皮骨肉三命人初歸向聲名漸逺四方供饋不逺千里而至者衆矣自云能役使毒龍可致風雨其徒號曰降龍大師京師旱莊宗迎至洛下親拜之六宫參禮士庶瞻仰謂朝夕可致甘澤禱祝數旬畧無徵應或謂官以祈雨無驗將加焚燎誠惠懼而遁去及卒賜號法雨大師塔曰慈雲之塔周𤣥豹者本燕人世為從事𤣥豹少為僧其師有知人之鑒從遊十年餘苦辛無憚師知其可敎遂以袁許之術授之大略狀人形貌比諸龜魚禽獸目視臆斷咸造其理及還鄉遂歸俗初盧程寄褐遊燕與同志二人謁焉𤣥豹謂鄉人張殷衮曰適二君子明年花發俱為故人惟彼道士佗年甚貴至來嵗二子果卒又二十年盧程登庸于鄴下𤣥豹歸}
