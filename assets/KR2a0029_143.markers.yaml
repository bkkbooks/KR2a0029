  - {type: variant, offset: 62, length: 0, content: '', WYG: 家又攷張濬第三子仕吳改名李儼見九國志授太子賓客任圜愛其才奏為三司副使尋卒于位格有文章明吏事時頗稱之許寂字閑閑祖祕名聞會稽寂少有山水之好汎覽經史窮三式尤明易象太平廣記云寂學易于晉徴君久棲四明山不干時譽昭宗聞其名徵赴闕召對于内殿會昭宗方與伶人調品篳篥事訖方命坐賜果問易義既退寂謂人曰君淫在聲不在政矣寂聞君人者將昭徳塞違以臨照百官百官或象之今不厭賤事自求其工君道替矣尋請還山寓居于江陵以茹芝絶粒自適其性天祐末節度使趙匡凝昆季深禮遇之師授保養之道}
