  - {type: variant, offset: 7, length: 0, content: '', WYG: 以疾受代而卒賈馥故鎮州節度使王鎔判官也家聚書三千巻手自刋校張文禮殺王鎔時莊宗未即尊位文禮遣馥至鄴都勸進因留鄴下棲遲郵舍莊宗即位授鴻臚少卿後以鴻臚卿致仕復歸鎮州結茅于別墅自課兒孫耕牧為事馥初累為鎮冀屬邑令所蒞有能政性恬澹與物無競乃鎮州士人之秀者也馬縞少嗜學以明經及第登拔萃之科仕梁為}
