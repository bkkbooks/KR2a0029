  - {type: variant, offset: 63, length: 0, content: '', krp: 末除諫官不起漢南謂之徵君梁攻襄陽匡凝兄弟棄鎮奔蜀寂偕行嵗餘蜀主王建待以師禮位至蜀相同光末平蜀與王衍俱從于東授工部尚書致仕卜居于洛時寂已年髙精彩猶徤冲漠寡言時蜀語云可恠可恠人莫知其際清泰三年六月卒時年八十餘子孫位至省郎同光時以方術著者又有僧誠惠誠惠初于五臺山出家能修戒律稱通皮骨肉三命人初歸向聲名漸逺四方供饋不逺千里而至者衆矣自云能役使毒龍可致風雨其徒號曰降龍大師京師旱莊宗迎至洛下親拜之六宫參禮士庶瞻仰謂朝夕可致甘澤禱祝數旬畧無徵應或謂官以祈雨無驗將加焚燎誠惠懼而遁去及卒賜號法雨大師塔曰慈雲之塔周𤣥豹者本燕人世為從事𤣥豹少為僧其師有知人之鑒從遊十年餘苦辛無憚師知其可敎遂以袁許之術授之大略狀人形貌比諸龜魚禽獸目視臆斷咸造其理及還鄉遂歸俗初盧程寄褐遊燕與同志二人謁焉𤣥豹謂鄉人張殷衮曰適二君子明年花發俱為故人惟彼道士佗年甚貴至來嵗二子果卒又二十年盧程登庸于鄴下𤣥豹歸}
  - {type: variant, offset: 64, length: 3, content: 兩朝皆, WYG: 陽張承業信重之言事數中承業俾明宗易衣列于諸校之下以佗人詐之而𤣥豹指明宗于末綴言曰骨法非内衙太保歟咸伏其異或問明宗之福夀惟云末後為鎮州節度使時明宗為内衙都校纔兼州牧而已昭懿皇后夏氏方侍巾櫛偶忤旨大為明宗價楚𤣥豹見之曰此人有藩侯夫人之位當生貴子明宗赫怒因解後其言果驗太原判官司馬揆謁𤣥豹謂揆曰公五日之中奉使萬里未見迴期揆數日後因酒酣為衣領扼之而卒莊宗署𤣥豹北京巡官明宗即位之明年一日謂侍臣曰方士周𤣥豹昔曾言朕諸事有徵可詔北京津置赴闕趙鳳奏曰袁許之事𤣥豹所長者以陛下貴不可言今既驗矣餘無可問若詔赴闕下則奔競之徒爭問吉凶恐近于妖惑乃}
