  - {type: variant, offset: 6822, length: 429, content: 考異辛未有司上言皇帝為故主舉哀日服縞素直領深衣腰絰等成服畢祭奠不視朝七日坊市禁音樂文武內外臣僚成服後每日赴太平宮臨三日止七日釋服至山陵啟攢塗日服初服輴車出城班辭釋服從之壬申前博州刺史李筠受宣權滑州節度使癸酉樞密使檢校太傅王峻加同平章事以前澶州節度使李洪義為宋州節度使加同平章事以滑州節度副使陳觀為左散騎常侍鄴都留守判官王溥為左諫議大夫並充樞密院直學士以元從都押衙鄭仁誨為客省使知客押牙向訓為宮苑使北京留守劉崇遣押牙鞏廷美致書原本脫廷美二字今據冊府元龜增入影庫本粘籤求劉贇歸藩帝報曰朕在澶州之時軍情推戴之際先差來直省李光美備見必想具言而況遐邇所聞在後盡當知悉湘陰公比在宋州駐泊見令般取赴京但勿憂疑必令得所惟公在彼固請安心若能同力扶持別無顧慮即當便封王爵永鎮北門鐵券丹書必無愛惜其諸情素並令來人口宣遣千牛衞將軍朱憲充入契丹使先是去年契丹永康王兀欲寇邢趙陷內丘及迴兀欲遣使與漢隱帝書案通鑑云契丹之攻內丘也死傷頗多又值月食軍中多妖異契丹主不敢深入引兵還遣使請和于漢舊, WYG: 巻}
