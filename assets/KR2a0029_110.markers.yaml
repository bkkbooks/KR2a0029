  - {type: variant, offset: 631, length: 163, content: 罰皆刺臂出血為誓周祖與瓊情好尤密嘗造瓊見其危坐讀書因問所讀何書瓊曰此閫外春秋所謂以正守國以奇用兵較存亡治亂記賢愚成敗皆在此也周祖令讀之謂瓊曰兄當教我自是周祖出入常袖以自隨遇暇輒讀每問難謂瓊為師舊五代史考異天成初明宗幸浚郊時朱守殷嬰城拒命帝從晉高祖一軍率先登城晉祖領副侍衞以帝長於書計召置麾下令掌軍籍前後將臣無不倚愛初聖穆皇后嬪, WYG: 誤館}
