  - {type: variant, offset: 4034, length: 2784, content: 正影庫本粘籤諸軍大掠煙火四發帝止於舊第何福進以部下兵守明德門翌日王殷郭崇言曰若不止剽掠比夜化為空城耳由是諸將部分斬其剽者至晡乃定帝與王峻詣太后宮起居請立嗣君乃以高祖姪徐州節度使贇入繼大統語在漢紀二十七日帝以嗣君未至請太后臨朝會鎮定州馳奏契丹入寇河北諸州告急太后命帝北征十二月一日帝發離京師四日至滑州駐馬數日會湘陰公遣使慰勞諸將受宣之際相顧不拜皆竊言曰我輩陷京師各各負罪若劉氏復立則無種矣或有以其言告帝者帝愕然即時進途十六日至澶州是日旭旦日邊有紫氣來當帝之馬首十九日下令諸軍進發二十日諸軍將士大譟趨驛如牆而進帝閉門拒之軍士登牆越屋而入請帝為天子亂軍山積登階匝陛扶抱擁迫或有裂黃旗以被帝體以代赭袍山呼震地帝在萬衆之中聲氣沮喪悶絕數四左右親衞星散竄匿帝即登城樓稍得安息諸軍遂擁帝南行時河冰初解浮梁未搆是夜北風烈比旦冰堅可渡諸軍遂濟衆謂之凌橋濟竟冰泮時人異之時湘陰公已駐宋州樞密使王峻在京聞澶州之變遣侍衞馬軍指揮使郭崇率七百騎赴宋州以衞湘陰公二十五日帝至七里店羣臣謁見遂營於臯門村胡三省通鑑注云大梁城無臯門蓋郭門之外有村遂呼為臯門村耳今附識於此影庫本粘籤二十七日漢太后令曰樞密使侍中郭威以英武之才兼內外之任剪除禍亂弘濟艱難功業格天人望冠世今則軍民愛戴朝野推崇宜總萬幾以允羣議可監國中外庶事並取監國處分二十八日監國教曰寡人出自軍戎本無德望因緣際會叨竊寵靈高祖皇帝甫在經綸待之心腹洎登大位尋付重權當顧命之時受忍死之寄與諸勳舊輔立嗣君旋屬三叛連衡四郊多壘謬膺朝旨委以專征兼守重藩俾當勍敵敢不橫身戮力竭節盡心冀肅靜於疆場用保安於宗社不謂姦邪搆亂將相連誅寡人偶脫鋒鋩克平患難志安劉氏願報漢恩推擇長君以紹丕搆遂奏太后請立徐州相公奉迎已在於道途行李未及於都輦尋以北面事急敵騎深侵遂領師徒徑往掩襲行次近鎮已渡洪河十二月二十日將登澶州軍情忽變旌旗倒指喊叫連天引袂牽襟迫請為主環繞而逃避無所紛紜而逼脅愈堅頃刻之間安危莫保事不獲已須至徇從於是馬步諸軍擁至京闕今奉太后誥旨以時運艱危機務難曠俾令監國遜避無由僶俛遵承夙夜憂愧云時文武百官內外將帥藩臣郡守等相繼上表勸進三十日夜御營西北隅步軍將校因醉揚言昨澶州馬軍扶策步軍今欲扶策馬軍扶策二句疑有脫字通鑑壬戌夜監國營有步兵將校醉揚言嚮者澶州騎兵扶立今步兵亦欲扶立監國斬之較薛史為明晰今附識于此影庫本粘籤尋令虞候詰其姓名昧旦擒而斬之其一軍仍納甲仗遣中使監送就糧所廣順元年春正月丁卯漢太后誥曰邃古以來受命相繼是不一姓傳諸百王莫不人心順之則興天命去之則廢昭然事迹著在典書予否運所丁遭家不造姦邪搆亂朋黨橫行大臣寃枉以被誅少主倉卒而及禍人自作孽天道寧論監國威深念漢恩切安劉氏既平亂略復正頹綱思固護於基扃擇繼嗣於宗室而獄訟盡歸於西伯謳謠不在於丹朱六師竭推戴之誠萬國仰欽明之德鼎革斯契圖籙有歸予作家賓固以為幸今奉符寶授監國可即皇帝位於戲天祿在躬神器自至允集天命永綏兆民敬之哉是日帝自皐門入大內御崇元殿即皇帝位制曰自古受命之君興邦建統莫不上符天意下順人心是以夏德既衰爰啟有商之祚炎風不競肇開皇魏之基朕早事前朝久居重位受遺輔政敢忘伊霍之忠仗鉞臨戎復委韓彭之任匪躬盡瘁焦思勞心討叛渙於河潼張聲援於岐雍竟平大憝粗立微勞纔旋旆於關西尋統兵於河朔訓齊師旅固護邊陲只將身許國家不以賊遺君父外憂少息內患俄生羣小連謀大臣遇害棟梁既壞社稷將傾朕方在藩維以遭讒搆逃一生於萬死徑赴闕庭梟四罪於九衢幸安區宇將延漢祚擇立劉宗徵命已行軍情忽變朕以衆庶所逼逃避無由扶擁至京尊戴為主重以中外勸進方岳推崇僶俛雖順於羣心臨御實慚於涼德改元建號祗率於舊章革故鼎新宜覃於霈澤朕本姬室之遠裔虢叔之後昆積慶累功格天光表盛德既延於百世大命復集於眇躬今建國宜以大周為號可改漢乾祐四年為廣順元年自正月五日昧爽已前應天下罪人常赦所不原者咸赦除之故樞密使楊邠侍衞都指揮使史弘肇三司使王章等以勞定國盡節致君千載逢時一旦同命悲感行路憤結重泉雖尋雪於沈寃宜更伸於渥澤渥澤原本作漏澤今從冊府元龜改正影庫本粘籤並可加等追贈備禮歸葬葬事官給仍訪子孫用其餘同遭枉害者亦與追贈馬步諸軍將士等戮力叶誠輸忠効義先則平持內難後乃推戴朕躬言念勳勞所宜旌賞其原屬將士等各與等第超加恩命仍賜功臣名號已帶功臣者別與改賜應左降官未量移者與量移已量移者與復資已復資者量加錄亡官失爵之人宜與齒用配流徒役人並許放還諸處有犯罪逃亡之人及山林草寇等一切不問如赦到後一月不歸本業者復罪如初內外前任見任文武官僚致仕官各與加恩應在朝文武臣僚內諸司使諸道行軍副使藩方馬步都指揮使如父母在未有恩澤者即與恩澤已有者更與恩澤如亡沒未曾追封贈者亦與封贈已封贈者更與封贈應天下州縣所欠乾祐元年二年已前夏秋殘稅及沿徵物色幷三年夏稅諸色殘欠並與除放澶州已來官路兩邊共二十里內幷乾祐三年殘稅欠稅並與除放應河北沿邊州縣自去年九月後來曾經契丹蹂踐處其人戶應欠乾祐三年終已前積年殘欠諸色稅物並與除放應係三司主持錢穀敗闕場院官取乾祐元年終已前徵納外灼然無抵當者委三司分析聞奏天下倉場庫務宜令節度使專切鈐轄掌納官吏一依省條指揮不得別納斗餘秤耗舊來所進羨餘物色今後一切停罷應乘輿服御之物不得過為華飾宮闈器用務從朴素大官常膳一切減損諸道所有進奉以助軍國之費其珍巧纖華及奇禽異獸鷹犬之類不得輒有獻貢諸無用之物不急之務並宜停罷帝王之道德化為先崇飾虛名朕所不取苟致治之未洽雖多端以奚為今後諸道所有祥瑞不得輒有奏獻古者用刑本期止辟今茲作法義切禁非蓋承弊之時非猛則姦兇難制及知勸之後在寬則典憲得宜相時而行庶臻中道今後應犯竊盜賊贓及和姦者並依晉天福元年已前條制施行應諸犯罪人等除反逆罪外其罪並不得籍沒家產誅及骨肉一依格令處分天下諸侯皆有親戚自可慎擇委任必當克効參裨朝廷選差理或未當宜矯前失庶叶通規其先於在京諸司差軍將充諸州郡元從都押衙孔目官內知客等並可停廢仍勒却還舊處職役近代帝王陵寢合禁樵採唐莊宗明宗晉高祖各置守陵十戶以近陵人戶充漢高祖皇帝陵署職員及守宮人時日薦饗幷守陵人戶等一切如故仍以晉漢之冑為二王後委中書門下處分云司天上言今國家建號以木德代水准經法國以姓墓為臘請以未日為臘從之時議者曰昔武王勝殷歲集于房國家受命金木集于房文王厄羑里而卦遇明夷帝脫于鄴大衍之數復得明夷則周為國號符於文武矣先是丁未年夏六月土金木火四星聚于張占者云當有帝王興于周者故漢祖建國由平陽陝服趨洛陽以應之及隱帝將嗣位封周王以符其事而帝以姬虢之冑復繼宗周而天人之契炳然矣昔武王以木德王天下宇文周亦承木德而三朝皆以木代水不其異乎戊辰前曹州防禦使何福進受宣權許州節度使前復州防禦使王彥超受宣權徐州節度使前澶州節度使李洪義受宣權宋州節度使己巳上漢太后尊號曰昭聖皇太后是日詔有司擇日為故主發哀案五代會要載原敕云漢高祖為義帝發喪魏明帝正禪陵尊號一時達禮千古所稱況朕久事前朝常參大政雖遷虞事夏見奪于羣情而四海九州咸知予夙志宜令所司擇日為故主舉哀仍備山陵葬禮, WYG: ''}
  - {type: variant, offset: 4034, length: 2784, content: 正影庫本粘籤諸軍大掠煙火四發帝止於舊第何福進以部下兵守明德門翌日王殷郭崇言曰若不止剽掠比夜化為空城耳由是諸將部分斬其剽者至晡乃定帝與王峻詣太后宮起居請立嗣君乃以高祖姪徐州節度使贇入繼大統語在漢紀二十七日帝以嗣君未至請太后臨朝會鎮定州馳奏契丹入寇河北諸州告急太后命帝北征十二月一日帝發離京師四日至滑州駐馬數日會湘陰公遣使慰勞諸將受宣之際相顧不拜皆竊言曰我輩陷京師各各負罪若劉氏復立則無種矣或有以其言告帝者帝愕然即時進途十六日至澶州是日旭旦日邊有紫氣來當帝之馬首十九日下令諸軍進發二十日諸軍將士大譟趨驛如牆而進帝閉門拒之軍士登牆越屋而入請帝為天子亂軍山積登階匝陛扶抱擁迫或有裂黃旗以被帝體以代赭袍山呼震地帝在萬衆之中聲氣沮喪悶絕數四左右親衞星散竄匿帝即登城樓稍得安息諸軍遂擁帝南行時河冰初解浮梁未搆是夜北風烈比旦冰堅可渡諸軍遂濟衆謂之凌橋濟竟冰泮時人異之時湘陰公已駐宋州樞密使王峻在京聞澶州之變遣侍衞馬軍指揮使郭崇率七百騎赴宋州以衞湘陰公二十五日帝至七里店羣臣謁見遂營於臯門村胡三省通鑑注云大梁城無臯門蓋郭門之外有村遂呼為臯門村耳今附識於此影庫本粘籤二十七日漢太后令曰樞密使侍中郭威以英武之才兼內外之任剪除禍亂弘濟艱難功業格天人望冠世今則軍民愛戴朝野推崇宜總萬幾以允羣議可監國中外庶事並取監國處分二十八日監國教曰寡人出自軍戎本無德望因緣際會叨竊寵靈高祖皇帝甫在經綸待之心腹洎登大位尋付重權當顧命之時受忍死之寄與諸勳舊輔立嗣君旋屬三叛連衡四郊多壘謬膺朝旨委以專征兼守重藩俾當勍敵敢不橫身戮力竭節盡心冀肅靜於疆場用保安於宗社不謂姦邪搆亂將相連誅寡人偶脫鋒鋩克平患難志安劉氏願報漢恩推擇長君以紹丕搆遂奏太后請立徐州相公奉迎已在於道途行李未及於都輦尋以北面事急敵騎深侵遂領師徒徑往掩襲行次近鎮已渡洪河十二月二十日將登澶州軍情忽變旌旗倒指喊叫連天引袂牽襟迫請為主環繞而逃避無所紛紜而逼脅愈堅頃刻之間安危莫保事不獲已須至徇從於是馬步諸軍擁至京闕今奉太后誥旨以時運艱危機務難曠俾令監國遜避無由僶俛遵承夙夜憂愧云時文武百官內外將帥藩臣郡守等相繼上表勸進三十日夜御營西北隅步軍將校因醉揚言昨澶州馬軍扶策步軍今欲扶策馬軍扶策二句疑有脫字通鑑壬戌夜監國營有步兵將校醉揚言嚮者澶州騎兵扶立今步兵亦欲扶立監國斬之較薛史為明晰今附識于此影庫本粘籤尋令虞候詰其姓名昧旦擒而斬之其一軍仍納甲仗遣中使監送就糧所廣順元年春正月丁卯漢太后誥曰邃古以來受命相繼是不一姓傳諸百王莫不人心順之則興天命去之則廢昭然事迹著在典書予否運所丁遭家不造姦邪搆亂朋黨橫行大臣寃枉以被誅少主倉卒而及禍人自作孽天道寧論監國威深念漢恩切安劉氏既平亂略復正頹綱思固護於基扃擇繼嗣於宗室而獄訟盡歸於西伯謳謠不在於丹朱六師竭推戴之誠萬國仰欽明之德鼎革斯契圖籙有歸予作家賓固以為幸今奉符寶授監國可即皇帝位於戲天祿在躬神器自至允集天命永綏兆民敬之哉是日帝自皐門入大內御崇元殿即皇帝位制曰自古受命之君興邦建統莫不上符天意下順人心是以夏德既衰爰啟有商之祚炎風不競肇開皇魏之基朕早事前朝久居重位受遺輔政敢忘伊霍之忠仗鉞臨戎復委韓彭之任匪躬盡瘁焦思勞心討叛渙於河潼張聲援於岐雍竟平大憝粗立微勞纔旋旆於關西尋統兵於河朔訓齊師旅固護邊陲只將身許國家不以賊遺君父外憂少息內患俄生羣小連謀大臣遇害棟梁既壞社稷將傾朕方在藩維以遭讒搆逃一生於萬死徑赴闕庭梟四罪於九衢幸安區宇將延漢祚擇立劉宗徵命已行軍情忽變朕以衆庶所逼逃避無由扶擁至京尊戴為主重以中外勸進方岳推崇僶俛雖順於羣心臨御實慚於涼德改元建號祗率於舊章革故鼎新宜覃於霈澤朕本姬室之遠裔虢叔之後昆積慶累功格天光表盛德既延於百世大命復集於眇躬今建國宜以大周為號可改漢乾祐四年為廣順元年自正月五日昧爽已前應天下罪人常赦所不原者咸赦除之故樞密使楊邠侍衞都指揮使史弘肇三司使王章等以勞定國盡節致君千載逢時一旦同命悲感行路憤結重泉雖尋雪於沈寃宜更伸於渥澤渥澤原本作漏澤今從冊府元龜改正影庫本粘籤並可加等追贈備禮歸葬葬事官給仍訪子孫用其餘同遭枉害者亦與追贈馬步諸軍將士等戮力叶誠輸忠効義先則平持內難後乃推戴朕躬言念勳勞所宜旌賞其原屬將士等各與等第超加恩命仍賜功臣名號已帶功臣者別與改賜應左降官未量移者與量移已量移者與復資已復資者量加錄亡官失爵之人宜與齒用配流徒役人並許放還諸處有犯罪逃亡之人及山林草寇等一切不問如赦到後一月不歸本業者復罪如初內外前任見任文武官僚致仕官各與加恩應在朝文武臣僚內諸司使諸道行軍副使藩方馬步都指揮使如父母在未有恩澤者即與恩澤已有者更與恩澤如亡沒未曾追封贈者亦與封贈已封贈者更與封贈應天下州縣所欠乾祐元年二年已前夏秋殘稅及沿徵物色幷三年夏稅諸色殘欠並與除放澶州已來官路兩邊共二十里內幷乾祐三年殘稅欠稅並與除放應河北沿