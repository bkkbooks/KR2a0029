  - {type: variant, offset: 55, length: 170, content: 故冒其姓焉案五代會要周虢叔之後高祖諱璟廣順初追尊為睿和皇帝廟號信祖陵曰溫陵高祖妣張氏追諡睿恭皇后曾祖諱諶漢贈太保追尊為明憲皇帝廟號僖祖陵曰齊陵曾祖妣鄭國夫人申氏追諡明孝皇后祖諱蘊漢贈太傅追尊為翼順皇帝廟號義祖陵曰節陵案五代會要溫陵齊陵節陵皆無陵所遙申朝拜祖妣陳國夫人韓氏追諡翼敬皇后皇考諱簡漢贈太師追尊為章肅皇帝廟號慶祖陵曰欽陵皇妣燕國夫人, WYG: 耳目記趙}
