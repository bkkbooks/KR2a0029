  - {type: variant, offset: 7581, length: 1109, content: 一月朗州節度使馬希萼破潭州十二月十八日縊殺馬希廣至十九日希萼自稱天策上將軍武平靜江寧遠等軍節度使嗣楚王戊寅湘陰公殂案歐陽史作十二月王峻遣郭崇以騎兵七百逆劉贇于宋州殺之通鑑作正月戊寅殺湘陰公於宋州舊五代史考異己卯以前太師齊國公馮道為中書令弘文館大學士以司徒兼門下侍郎同平章事弘文館大學士竇貞固為侍中監修國史以左僕射平章事集賢殿大學士蘇禹珪為守司空平章事夏州節度使李彝興進封隴西郡王荊南高保融進封渤海郡王靈武馮暉進封陳留郡王西京白文珂兗州慕容彥超鳳翔趙暉並加兼中書令詔王彥超率兵攻徐州庚辰故樞密使左僕射平章事楊邠追封恆農郡王故宋州節度使兼侍衞親軍都指揮使史弘肇追封鄭王故三司使檢校太尉平章事王章追封瑯琊郡王是日詔曰朕以眇末之身託於王公之上懼德弗類撫躬靡遑豈可化未及人而過自奉養道未方古而不知節量與其耗費以勞人曷若儉約而克己昨者所頒赦令已述至懷宮闈服御之所須悉從減損珍巧纖奇之厥貢並使寢停尚有未該再宜條舉應天下州府舊貢滋味食饌之物所宜除減其兩浙進細酒海味薑瓜湖南枕子茶乳糖白沙糖橄欖子鎮州高公米水梨易定栗子河東白杜梨米粉菉豆粉玉屑子白杜梨原本作棃子原本作子今俱從通鑑所引薛史改正影庫本粘籤永興御田紅秔米新大麥興平蘇栗子華州麝香羚羊角熊膽獺肝朱柿熊白河中樹紅棗五味子輕餳同州石餅晉絳葡萄黃消梨陝府鳳栖梨襄州紫薑新筍橘子安州折粳米糟味青州水梨河陽諸雜果子許州御李子鄭州新筍鵝梨懷州寒食杏仁申州蘘荷亳州萆薢沿淮州郡淮白魚如聞此等之物雖皆出於土產亦有取於民家未免勞煩率皆糜費加之力役負荷馳驅道途積於有司之中甚為無用之物今後並不須進奉諸州府更有舊例所進食味其未該者宜奏取進止又詔在朝文武臣僚各上封事凡有益國利民之事速具以聞案通鑑詔曰朕生長軍旅不親學問未知治天下之道文武官有益國利民之術各具封事以聞咸宜直書其事勿事辭藻舊五代史考異辛巳鎮州武行德晉州王晏相州張彥成潞州常思邠州侯章並加兼侍中以侍衞馬軍都指揮使果州防禦使檢校太保郭崇為洋州節度使檢校太傅典軍如故以侍衞步軍都指揮使岳州防禦使曹英為利州節度使檢校太傅典軍如故癸未涇州史懿延州高允權滄州王景永興郭從義定州孫方簡並加兼侍中鄜州楊信同州薛懷讓貝州王繼弘並加同平章事乙酉華州王饒河中扈彥珂鄧州折從阮邢州劉詞並加同平章事丙戌幸西莊潞州奏得石會關使王延美報河東劉崇於正月十六日僭號丁亥以前澶州節度使李洪義為宋州節度使加同平章事以曹州防禦使北面行營馬步都排陣使何福進為許州節度使加檢校太傅以博州刺史北面行營右廂排陣使李筠為滑州節度使加檢校太保戊子有司上言准赦書以晉漢之冑為二王後其唐五廟仲祀合廢從之庚寅宗正寺奏請依晉漢故事遷漢七廟神主入昇平宮行仲享之禮以漢宗子為三獻從之永樂大典卷八千九百八十, WYG: 四攷證}
