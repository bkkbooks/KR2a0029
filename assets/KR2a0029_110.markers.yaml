  - {type: variant, offset: 424, length: 152, content: 市屠壯健衆所畏憚帝以氣凌之因醉命屠割肉小不如意叱之屠者怒坦腹謂帝曰爾敢刺我否帝即剚其腹市人執之屬吏繼韜惜而逸之其年莊宗平梁繼韜伏誅麾下牙兵配從馬直帝在籍中時年二十一帝性聰敏喜筆劄及從軍旅多閱簿書軍志戎政深窮綮肯人皆服其敏嘗省昭義李瓊瓊方讀閫外春秋即取視之曰論兵也兄其教我即授之深通義理案宋史李瓊傳唐莊宗募, WYG: ''}
