  - {type: variant, offset: 795, length: 651, content: 帝帝方匱乏而后多資從案東都事略柴后資周太祖以金帛使事漢高祖帝常晝寢有小虺五色出入顴鼻之間后遽見愕然在太原時有神尼與帝同姓見帝謂李瓊曰我宗天上大仙頂上有肉角當為世界主清泰末晉祖起于河東時河陽節度使張彥琪為侍衞步軍都指揮使奉命北伐帝從之營於晉祠是時屋壞同處數人俱斃唯帝獨無所傷漢高祖為侍衞馬步都虞候召置左右所居官舍之鄰吳氏有青衣佳娘者為山魈所魅鬼能人言而投瓦石鄰伍無敢過吳氏之舍者帝過之其鬼寂然帝去如故如是者再或謂鬼曰爾既神向者客來又何寂然鬼曰彼大人者繇是軍中異之范延光叛于魏命楊光遠討之帝當行意不願從或謂帝曰楊公當朝重勳子不欲從何也帝曰楊公素無英雄氣得我何用能用我其劉公乎漢祖累鎮藩閫皆從之及鎮幷門尤深待遇出入帷幄受腹心之寄帝亦悉心竭力知無不為及吐渾白可久叛入契丹帝勸漢祖誅白承福等五族得良馬數千匹財貨百萬計以資軍開運末契丹犯闕晉帝北遷帝與蘇逢吉楊邠史弘肇等勸漢祖建號以副人望漢高祖即位晉陽時百度草創四方猶梗經綸締構帝有力焉授權樞密副使檢校司徒漢高祖至汴正授樞密副使檢校太保乾祐元年春漢高祖不豫及大漸與蘇逢吉等同受顧命隱帝嗣位拜樞密使加檢校太尉案東都事略魏仁浦傳仁溥少為刀筆吏隸樞密院太祖問以卒乘數仁溥對曰帶甲者六萬太祖喜曰天下事不足憂也舊五代史考異舊制樞密使未加使相者不宣麻制至是宣之自帝始也有頃河中李守貞據城反朝廷憂之諸大臣共議進取之計史弘肇曰守貞河陽一客司耳竟何能為帝曰守貞雖不習戎行然善接英豪得人死力亦勍敵宜審料之乃命白文珂常思率兵攻取師未至而趙思綰竊據永興王景崇反狀亦露朝廷遣郭從義王峻討趙思綰, WYG: 寶壽佛寺}
