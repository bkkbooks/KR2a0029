  - {type: variant, offset: 1642, length: 2195, content: 五代春秋作七月郭威率師圍河中據此紀則周太祖以八月六日始發京師非七月即圍河中也薛史漢隱帝紀與此紀互異宋史扈彥珂傳周祖為樞密使總兵出征時議多以先討景崇思綰為便周祖意未決彥珂曰三叛連衡推守貞為主宜先擊河中河中平則永興鳳翔失勢矣今捨近圖遠若景崇思綰逆戰于前守貞兵其後腹背受敵為之奈何周祖從其言舊五代史考異命白文珂營於河西帝營於河東不數日周設長塹復築長連城以逼之帝在軍居常接賓客與大將讌語即褒衣博帶或遇巡城壘對陣敵幅巾短後與衆無殊臨矢石冒鋒刃必以身先與士伍分甘共苦稍立功効者厚其賜與微有傷痍者親為循撫士無賢不肖有所陳啟溫顏以接俾盡其情人之過忤未嘗介意故君子小人皆思効用守貞聞之深以為憂十二月帝以蜀軍屯大散關即親率牙兵往鳳翔永興相度將發謂白文珂劉詞曰困獸猶鬬當謹備之帝至華州聞蜀軍退敗遂還二年正月五日夜李守貞遣將王三鐵領千餘人夜突河西砦河西原本作江西今從通鑑改正影庫本粘籤果為劉詞等力戰敗之先是軍中禁酒帝有愛將李審犯令斬之以徇五月九日攻河西砦賊將周光遜以砦及部衆千餘人來降十七日下令攻城會西北大風揚沙晦冥帝令禱河伯祠奠訖而風止自是晝夜攻之七月十三日帝率三砦將士奪賊羅城二十一日城陷守貞舉家自焚而死案歐陽史周本紀云守貞與妻子自焚死思綰景崇相次降今考薛史漢紀五月乙丑趙思綰乞降七月甲子郭威奏收復河中守貞自燔死是思綰之降在守貞自焚之前也又云三年正月趙暉奏收復鳳翔王景崇自燔死是景崇未嘗降也歐陽史漢本紀亦先載趙思綰降後書克河中王景崇傳亦作景崇自燔死紀傳前後自相矛盾當以薛史為得其實案東都事略王溥傳周太祖將兵討三叛以溥為從事三叛既平朝士及藩鎮嘗以書往來詞意涉于悖逆者太祖籍其名欲按之溥諫曰魑魅伺夜而出日月既照則氛沴消矣請焚之以安反側太祖從之舊五代史考異帝前夢河神告曰七月下旬上帝當滅守貞之族至是收復賊壘城中人言見帝營上有紫氣如樓閣華蓋之狀二年八月五日帝自河中班師其月二十七日入朝漢帝命升階撫勞酌御酒以賜之錫賚優厚翌日漢帝議賞勳欲兼方鎮帝辭之乃止帝以出征時廳子都七十三人具籍獻之九月五日制加檢校太師兼侍中十月契丹入寇前鋒至邢洺貝魏河北告急帝受詔率師赴北邊以宣徽南院使王峻為監軍其月十九日帝至邢州遣王峻前軍趨鎮定時契丹已退帝大閱欲臨寇境詔止之三年二月班師三月十七日制授鄴都留守樞密使如故時漢帝以北戎為患委帝以河朔之任宰相蘇逢吉等議藩臣無兼樞密使例史弘肇以帝受任之重苟不兼密務則難以便宜從事竟從弘肇之議詔河北諸州凡事一稟帝節度一稟帝節度原本作一廩據通鑑云壬午詔以威為鄴都留守天雄節度使樞密使如故仍詔河北兵甲錢穀但見郭威文書立皆稟應據此則廩字係稟字之訛今改正影庫本粘籤帝將北行啟漢帝曰陛下富有春秋萬幾之事宜審於聽斷文武大臣乃心王室凡事諮詢即無敗失漢帝斂容謝之帝至鄴盡去煩弊之事不數月閫政有序一方晏然詔書褒美一夕在山亭院齋中忽有黃氣起於前上際於天帝於黃氣中見星文紫微文昌爛然在目既而告之星者曰予於室中見天象不其異乎對曰坐見天衢物不能隔至貴之祥也翌日牙署中有紫氣起於幡竿龍首凡三日十一月十四日澶州節度使李洪義侍衞步軍都指揮使王殷遣澶州副使陳光穗至鄴都報京師有變是月十三日旦羣小等害史弘肇等前一夕李業等遣腹心齎密詔至澶州令李洪義殺王殷又令護聖左廂都指揮使郭崇等害帝于鄴城十三日洪義受得密詔恐事不濟乃以密詔示王殷殷與洪義即遣陳光穗馳報於帝十四日帝方與宣徽使王峻坐議邊事忽得洪義文字遽歸牙署峻亦未知其事帝初知楊史諸公被誅神情惘然又見移禍及己伸訴無所即集三軍將校諭之曰予從微至著輔佐國家先皇登遐親受顧託與楊史諸公彈壓經謀忘寢與食一旦無狀盡已誅夷今有詔來取予首級爾等宜奉行詔旨斷予首以報天子各圖功業且不累諸君也崇等與諸將校泣於前言曰此事必非聖意即是左右小人誣罔竊發假令此輩握重柄國得安乎宜得投論以判忠佞何事信單車之使而自棄千載之下空受惡名崇等願從明公入朝面自洗雪除君側之惡共安天下衆然之遂請帝南行案東都事略魏仁浦傳云隱帝遣使害太祖仁溥曰公有大功于朝廷握強兵臨重鎮以讒見疑豈可坐而待死教以易其語云誅將士以激怒衆心太祖納其言與薛史異歐陽史與事略同舊五代史考異帝即嚴駕首途十六日至澶州王殷迎謁慟哭時隱帝遣小豎鸗脫鸗脫與隱帝紀異文已於卷一百三內加簽聲明影庫本粘籤偵鄴軍所在為游騎所執帝即遣迴令附奏隱帝赴闕之由仍以密奏置鸗脫衣領中奏曰臣發迹寒賤遭遇聖明既富且貴實過平生之望唯思報國敢有他圖今奉詔命忽令郭崇等殺臣即時俟死而諸軍不肯行刑逼臣赴闕令臣請罪上前仍言致有此事必是陛下左右譖臣耳今鸗脫至此天假其便得伸臣心三五日當及闕朝陛下若以臣有欺天之罪臣豈敢惜死若實有譖臣者乞陛下縛送軍前以快三軍之意則臣雖死無恨今託鸗脫附奏以聞十七日帝至滑州節度使宋延渥開門迎納帝將發滑臺召將士謂之曰主上為讒邪所惑誅殺勳臣吾之此來事不獲已然以臣拒君寧論曲直汝等家在京師不如奉行前詔我以一死謝天子實無所恨將校前啟曰國家負公公不負國請公速行無遲久安邦雪怨正在此時既而王峻諭軍曰我得公處分俟平定京城許爾等旬日剽掠衆皆踊躍十九日隱帝遣左神武統軍袁前鄧州節度使劉重進率禁軍來拒與前開封尹侯益等屯赤是夜俱退二十日隱帝整陣於劉子陂二十一日兩陣俱列慕容彥超率軍奮擊帝遣何福進王彥超李筠等大合騎以乘之慕容彥超退却死者百餘人於是南軍奪氣稍稍奔於北軍慕容彥超與數十騎東奔兗州吳虔裕張彥超等相繼來見帝是夜侯益焦繼勳潛至帝營帝慰勞遣還二十二日旦郭允明弒漢隱帝於北郊初官軍之敗帝謂宋延渥曰爾國親國親, WYG: ''}
