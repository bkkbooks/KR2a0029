  - {type: variant, offset: 7252, length: 328, content: 代史考異使至境上會朝廷有蕭牆之變帝定京城迴至澶州遇蕃使至遂與入朝至是遣朱憲伴送來使歸蕃兼致書革命之由仍以金酒器一副玉帶一遺兀欲晉州節度使王晏殺行軍司馬徐建以通河東聞乙亥鄆州節度使守太師兼中書令齊王高行周進位尚書令襄州節度使檢校太師守太傅兼中書令齊國公安審琦進封南陽王青州節度使檢校太師守太保兼中書令魏國公符彥卿進封淮陽王夔州節度使侍衞親軍馬步軍都指揮使檢校太傅王殷加同平章事充鄴都留守典軍如故丙子帝赴太平宮為漢隱帝發喪百官陪位如儀是日湘陰公元從右都押牙鞏廷美教練使楊溫等據徐州以拒命帝遣新受節度使王彥超率兵馳赴之仍賜廷美等敕書案通鑑帝復遺劉贇書曰爰念斯人盡心於主足以賞其忠義何由責以悔尤俟新節度入城當各除刺史公可更以委曲示之舊五代史考異丁丑荊南高保融奏去年, WYG: ''}
