  - {type: variant, offset: 207, length: 1240, content: 四五年詔令泛海使於杭越先是浙中贈賄每歲恆及萬緡時議者曰孔常侍命奇薄何消盈數有命即無財有財即無命明年使還果海中船壞空手而歸永樂大典卷一萬三千三百三十九案此傳原本殘闕陳保極閩中人也好學善屬文後唐天成中擢進士第秦王從榮聞其名辟為從事從榮素急暴後怒保極不告出遊宰相門以馬箠鞭之尋出為定州推官從榮敗執政知其屈擢居三署歷禮部倉部員外郎初桑維翰登第之歲保極時在秦王幕下因戲謂同輩曰近知今歲有三箇半人及第蓋其年收四人保極以維翰短陋故謂之半人也天福中維翰既居相位保極時在曹郎慮除官差跌心不自安乃乞假南遊將謀退跡既而襄鄧長吏以行止入奏維翰乃奏於高祖曰保極閩人多狡恐逃入淮海即以詔追赴闕將下臺鍛成其事同列李崧極言以解之因令所司就所居鞫之貶為衞尉寺丞仍奪金紫尋復為倉部員外郎竟以銜憤而卒保極無時才有傲人之名而性復鄙吝所得利祿未嘗奉身但蔬食而已每與人奕棋敗則以手亂其局蓋拒所賭金錢不欲償也及卒室無妻兒唯囊中貯白金十鋌為他人所有時甚嗤之永樂大典卷三千一百三十九王瑜其先范陽人也父欽祚仕至殿中監出為義州刺史瑜性兇狡然雋辯驍果騎射刀筆之長亦稱於當代起家累為從事天福中授左贊善大夫會濮郡秋稼豐衍稅籍不均命乘使車按察定計既至郡謂校簿吏胡蘊惠鶚曰余食貧久矣室無增貲為我致意縣宰且求假貸由是濮之部內五邑令長共斂錢五十萬私獻於瑜瑜即以書上奏高祖覽章歎曰廉直清慎有如此者誠良臣也於是二吏五宰即時停黜擢瑜為太府少卿杜重威之鎮東平也瑜父欽祚為節度副使及重威移鎮常山瑜乃詭計干重威使奏己為恆州節度副使竟代其父位歲餘入為刑部郎中丙午歲父欽祚刺舉義州瑜歸寧至郡會契丹據有中夏何建以秦州歸蜀秦州原本作泰州今從通鑑改正影庫本粘籤瑜說欽祚曰若不西走當屬契丹矣厲色數諫其父怒而不從因其臥疾涉旬瑜仗劍而脅之曰老懦無謀欲趨炮烙不即為計則死於刃下父不得已而聽之時隴東屯兵扼其川路將北趣蕃部假途而因與郡盜酋長趙徽歃血為約以兄事之謂徽曰西至成都余身為相余父為將爾當領一大郡能遂行乎徽曰諾瑜慮為所賣先致其妻孥館於郡中行有期矣徽潛召其黨伺於郊外子夜瑜舉族行輜重絡繹十有餘里徽之所親循溝澮而遁至馬峽路隅舉燧相應其黨起於伏莽斷欽祚之首貫諸長矛平生聚蓄金幣萬計皆為賊所掠少長百口殺之殆盡瑜尚獨戰千人矢不虛發手無射捍其指流血及窘乃夜竄山谷落髮為僧月餘為樵人所獲縶送岐州為侯益所殺時年三十九始瑜有姑寡居來歸其家以前夫遺腹有子經數年不產每因事預告人吉凶無不驗者時契丹來犯闕前月餘謂瑜曰暴兵將至宜速去之苟不去亂必及矣後瑜果死此謂天作孽猶可違自作孽不可逭也永樂大典卷六千八百五十一張繼祚故齊王全義之子也始為河南府衙內指揮使全義卒除金吾將軍旋授蔡州刺史累官至檢校太保明宗郊天充供頓使復除西衞上將軍唐清泰末丁母憂天福初喪制未闋會張從賓作亂發兵迫脅取赴河陽令知留守事從賓敗與二子詔戮於市始繼祚與范延光有舊嘗遣人以馬遺之屬朝廷起兵將討鄴城為巡兵所獲奏之高祖深忌之及敗宰臣桑維翰以父珙早事齊王奏欲雪之高祖不允案通鑑云史館修撰李濤上言張全義有再造洛邑之功乞免其族遂止誅繼祚妻子舊五代史, WYG: 七}
