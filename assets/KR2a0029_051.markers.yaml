  - {type: variant, offset: 1884, length: 38, content: 十一一日明宗謂安重誨曰近聞從榮左右有詐宣朕旨令勿接儒生儒生多懦恐鈍志相染朕方, WYG: 月存孝擒新授昭義節度使孫揆初朝廷授揆節鉞以本軍取刀黄嶺路赴任存孝偵}
