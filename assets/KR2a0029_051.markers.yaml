  - {type: variant, offset: 1871, length: 0, content: '', WYG: 春武皇率蕃漢之師五萬自澤潞將下天井闗河陽節度使諸葛爽辭以河橋不完仍屯兵於萬善數日移軍自河中南渡趨汝洛四月武皇合徐汴之師破尚讓於太原斬獲萬計進攻賊於西華賊將黄鄴棄營而遁是夜大雨巢營中驚亂乃棄西華之壘退營陳州北故陽里五月癸亥大雨震電平地水深數尺賊營為水所漂而潰戊辰武皇引軍營於中牟大破賊於王滿渡庚午巢賊大至濟汴而北是夜復大雨賊黨驚潰武皇營於鄭州賊衆分冦汴境武皇渡汴遇賊將渡而南半濟擊之大敗之臨陣斬賊將李周王濟安陽景彪等是夜賊大敗殘衆保於胙縣寃句大軍躡之黄巢乃携妻子兄弟千餘人東走武皇追賊至於巢州是月班師過汴汴帥迎勞於封禪寺請武皇休於府第乃以從官三百人及監軍使陳景思館於上源驛是夜張樂陳宴席汴帥自佐饗出珍幣侑勸武皇酒酣戲諸侍妓與汴帥握手叙破賊事以為樂汴帥素忌武皇乃與其將楊彦洪密謀竊發彦洪於巷陌連車樹栅以枙奔竄之路時武皇之從官皆醉俄而伏兵竊發來攻𫝊舍武皇方大醉譟聲動地從官十餘人捍賊侍人郭景銖滅燭扶武皇以茵幕裹之匿於牀下以水洒面徐曰汴帥謀害司空武皇方張目而起引弓抗賊有頃煙火四合復大雨震電武皇得從者薛鐡山賀回鶻等數人而去雨水如澍不辨人物隨電光登尉氏門縋城而出得還本營監軍陳景思大將史敬思竝遇害武皇既還營與劉夫人相向慟哭詰旦欲勒軍攻汴夫人曰司空比為國家討賊赴東諸侯之急雖汴人謀害自有朝廷論列若反戈攻城則曲在我也人得以為辭乃收軍而去馳檄於汴帥汴帥報曰竊發之夜非僕本心是朝廷遣天使與牙將楊彦洪同謀也武皇自虎牢闗西趨蒲陜而旋秋七月至太原武皇自以累立大功為汴帥怨圖䧟没諸將乃上章申理及武皇表至朝廷大恐遣内臣宣諭尋加守太傅同平章事隴西郡王光啟元年三月幽州李可舉鎮州王景崇連兵冦定州節度使王處存求援於武皇武皇遣大將康君立安老薛可郭啜率兵赴之五月鎮人攻無極武皇親領兵救之鎮人退保新城武皇攻之斬首萬餘級獲馬千匹王處存亦敗燕軍於易州十一月河中王重榮遣使來乞師且言邠州朱玫鳯翔李符將加兵於已初武皇與汴人搆怨前後八表請削奪汴帥官爵自以本軍進討天子累遣内臣楊復恭宣㫖令且全大體武皇不時奉詔天子頗右汴帥時觀軍容使田令孜君側擅權惡王重榮與武皇膠固將離其勢乃移重榮於定州重榮告於武皇武皇上章言李符朱玫挾邪忌正黨庇朱温臣已㸃檢蕃漢軍五萬取來年渡河先斬朱玫李符然後平盪朱温新唐書王重榮傳詔克用將兵援河中重榮貽克用書且言奉密詔湏公到使我圖公此令孜朱全忠朱玫之惑上也因示偽詔克用方與全忠有隙信之請討全忠反玫天子覽表遣使譬喻百端軺𫝊相望既而朱玫引邠鳯之師攻河中王重榮出師拒戰朱玫軍於沙苑對壘月餘十二月武皇引軍渡河與朱玫決戰玫大敗收軍夜遁}
