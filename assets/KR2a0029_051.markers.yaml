  - {type: variant, offset: 1869, length: 0, content: '', krp: 新唐書沙陀𫝊云收京師功第一進同中書門下平章事隴西郡公未幾以克用領河東節度是時武皇既收長安軍勢甚雄諸侯之師皆畏之武皇一目微眇故其時號為獨眼龍是月武皇仗節赴鎮遣使報鄭從讜請治裝歸朝武皇次於郊外因往赴鴈門寧覲獻祖八月自鴈門赴鎮河東時年二十有八十一月平潞州表其弟克修為昭義節度使潞帥孟方立退保於邢州十二月許帥田從異汴帥朱温徐帥時溥陳州刺史趙犨各遣使來告以巢蔡合從凶鋒尚熾請武皇共力討賊中和}
