  - {type: variant, offset: 2393, length: 5, content: 交由是知名, WYG: 𫝊首晉陽以李存孝為邢州節度使四月武皇大舉兵討赫連鐸於雲州遣騎將薛阿檀率前軍以進攻武皇設伏兵於御河之上大破之因塹守其城七月武皇進兵栁㑹赫連鐸力屈食盡奔於吐渾部遂歸幽州雲州平武皇表石善友為大同軍防禦使邢州節度使李存孝以鎮州王鎔託附汴人謀亂河朔北連燕冦請乘雲代之捷平定燕趙武皇然之八月大蒐於晉陽遂南巡澤潞略地懐孟河陽趙克裕望風送欵請修隣好九月蒐於邢州十月李存孝董前軍攻臨城鎮人五萬營於臨城西北龍尾崗武皇令李存審李存賢以歩軍攻之鎮人大敗殺獲萬計拔臨城進攻元氏幽州李匡威以歩騎五萬營於鄗邑以援鎮州武皇分兵大掠旋軍邢州}
