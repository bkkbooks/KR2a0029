  - {type: variant, offset: 1359, length: 3, content: 康延孝, WYG: 十月武皇率忻代蔚朔達靼之軍三萬五千騎赴難於京師先移檄太原鄭從讜拒闗不納武皇以兵擊之進軍至城下遣人齎幣馬遺從讜從讜亦遣人饋武皇貨幣饔餼軍器武皇南去自隂地趨晉綘十二月武皇至河中中和三年正月晉國公王鐸承制授武皇東北面行營都統武皇令其弟克修領前鋒五百騎渡河視賊黄巢遣將米重威齎重賂及偽詔以賜武皇武皇納其賂以給諸將燔其偽詔是時諸道勤王之師雲集京畿然以賊勢尚熾未敢争鋒及武皇將至賊帥}
  - {type: page-break, offset: 1359, content: '', id: KR2a0029_WYG_051-7a, image: WYG0277/WYG0277-0222c.png}
