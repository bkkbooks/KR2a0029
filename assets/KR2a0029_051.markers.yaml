  - {type: variant, offset: 986, length: 2, content: 魏王, WYG: 飛虎子賊平獻祖授振武節度使武皇為雲中牙將嘗在雲中宿於别館擁妓醉寢有俠兒持刃欲害武皇及突入曲室但見烈火熾赫於帳中俠兒駭異而退又嘗與達靼部人角勝逹靼指雙鵰於空曰公能一發中否武皇即彎弧發矢連貫雙鵰邊人拜伏及壯為雲中守促使事防禦使支謨與同列晨集廨舍因戯升郡閣踞謨之座謨亦不敢詰乾符}
