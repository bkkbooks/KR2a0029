  - {type: variant, offset: 1654, length: 199, content: 上累有戰功莊宗器賞之用為金鎗指揮使冊府元龜卷二百九十一明宗在魏府為軍士所逼莊宗詔從璟曰爾父于國有大功忠孝之心朕自明信今為亂兵所劫爾宜自去宣朕旨無令有疑從璟行至中途為元行欽所制復與歸洛下莊宗改其名為繼璟以為己子命再往從璟固執不行願死于御前以明丹赤從莊宗赴汴州明宗之親舊多策馬而去左右或勸從璟令自脫終無行意尋為元行欽所殺天成初贈太保冊府元龜卷二百八十六秦王從榮明宗第二子也明宗踐阼天成初授鄴都留守天雄軍, WYG: 東}
