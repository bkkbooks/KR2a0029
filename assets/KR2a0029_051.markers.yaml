  - {type: variant, offset: 29, length: 0, content: '', WYG: 部於安西北庭置都䕶屬之分同羅僕骨之人置沙陁都督府蓋北庭有磧曰沙陁故固以為名焉永徽中以拔野為都督其後}
  - {type: variant, offset: 29, length: 0, content: '', krp: 部於安西北庭置都䕶屬之分同羅僕骨之人置沙陁都督府蓋北庭有磧曰沙陁故固以為名焉永徽中以拔野為都督其後}
