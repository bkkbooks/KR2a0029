  - {type: variant, offset: 1166, length: 22, content: 梁開通渠麟等五州符印送降階州王承岳納符印秦州, WYG: 伏人今軍雖數萬茍無善帥進亦無功吾兄李司徒父子去嵗獲罪於國家今寄北部雄武之略為衆所推若驃騎急奏召還代北之人一麾響應則妖賊不足平也景思然之促奏行在天子乃以武皇為鴈門}
