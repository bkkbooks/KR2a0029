  - {type: variant, offset: 1162, length: 1, content: 王, WYG: 李鈞充北面招討使將太原之師過石嶺闗屯於代州與幽州李可舉會赫連鐸同攻蔚州獻祖以一軍禦之武皇以一軍南抵遮虜城以拒李鈞是冬大雪弓弩弦折南軍若寒臨戰大敗奔歸代州李鈞中流矢而卒廣明元年春天子復命元師李涿率兵數萬屯代州武皇令軍使傅文達起兵於蔚州朔州刺史髙文集與薛葛安慶等部將縳文達送於李涿六月李涿引大軍攻蔚州獻祖戰不利乃率其族奔於達靼部居數月吐渾赫連鐸密遣人賂逹靼以離間獻祖既而漸生猜阻武皇知之毎召其豪右射獵於野或與之百歩馳射馬鞭或以懸針樹葉為的中之如神由是部人心伏不敢竊發俄而黄巢自江淮北渡武皇椎牛釃酒饗其酋首酒酣喻之曰予父子為賊臣讒間報國無由今聞黄巢北犯江淮必為中原之患一日天子赦宥有詔徴兵僕與公等向南而定天下是予心也人生世間光景幾何曷能終老沙堆中哉公等勉之達靼知無留意皆釋然無間是嵗十一月黄巢冦潼闗天子令河東監軍陳景思為代北起軍使收兵破賊十二月黄巢犯長安僖}
