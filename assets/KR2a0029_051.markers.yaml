  - {type: variant, offset: 1876, length: 2, content: 冊府, WYG: 張全義潛兵夜襲李罕之於河陽城䧟舉族為全義所擄罕之踰垣獲免遂來歸於武皇遣李存孝薛阿檀史儼兒安金俊安休休將七千騎送罕之至河陽汴將丁㑹牛存節葛從周将兵赴援李存孝率精騎逆戰於温縣汴人既扼太行之路存孝殿軍而退騎將安休休以戰不利奔於蔡武皇以罕之為澤州刺史遥領河陽節度使十月邢州孟方立遣大將奚忠信將兵三萬冦遼州武皇大破之斬首萬級生擒奚忠信龍紀}
  - {type: variant, offset: 1876, length: 2, content: 冊府, krp: 張全義潛兵夜襲李罕之於河陽城䧟舉族為全義所擄罕之踰垣獲免遂來歸於武皇遣李存孝薛阿檀史儼兒安金俊安休休將七千騎送罕之至河陽汴將丁㑹牛存節葛從周将兵赴援李存孝率精騎逆戰於温縣汴人既扼太行之路存孝殿軍而退騎將安休休以戰不利奔於蔡武皇以罕之為澤州刺史遥領河陽節度使十月邢州孟方立遣大將奚忠信將兵三萬冦遼州武皇大破之斬首萬級生擒奚忠信龍紀}
  - {type: variant, offset: 1879, length: 3, content: 龜卷二, WYG: 年五月遣李罕之李存孝攻邢州六月下磁州邢將馬溉率兵數萬來拒戰罕之敗之於琉璃陂生擒馬溉徇於城下孟方立恚恨飲酖而死三軍立其姪遷為留後使求援於汴汴將王䖍裕率精甲數}
  - {type: page-break, offset: 1879, content: '', id: KR2a0029_WYG_051-13a, image: WYG0277/WYG0277-0225c.png}
  - {type: variant, offset: 1879, length: 3, content: 龜卷二, krp: 年五月遣李罕之李存孝攻邢州六月下磁州邢將馬溉率兵數萬來拒戰罕之敗之於琉璃陂生擒馬溉徇於城下孟方立恚恨飲酖而死三軍立其姪遷為留後使求援於汴汴將王䖍裕率精甲數}
  - {type: variant, offset: 1883, length: 0, content: '', WYG: 入於邢州罕之等班師大順元年遣李存孝攻邢州孟遷以邢洺磁三州降執汴將王䖍裕三百人以獻武皇徙孟遷於太原以安金俊為邢洺團練使三月昭義軍節度使李克修卒以李克恭為潞州節度使是月武皇攻雲州拔其東城赫連鐸求援於燕燕帥李匡威将兵三萬以赴之戰於城下燕軍大敗時徐州時溥為汴軍所攻遣使來求援武皇命石君和由兖鄆以赴之五月潞州軍亂殺節度使李克恭州人推牙將安居受為留後南結汴將時潞之小將馮霸擁叛徒三千騎駐於沁水居受使人召之馮霸不至居受懼出奔至長子為村胥所殺𫝊首於霸霸遂入潞州自為留後武皇遣大將康君立李存孝等攻之汴將朱崇節葛從周等兵入潞州以固之是時幽州李匡威雲州赫連鐸與汴帥協謀連上表請加兵於太原宰相張濬孔緯贊成其事六月天子削奪武皇官爵以張濬為招討使以京兆尹孫揆為副華州韓建為行營都虞候以汴帥為河東南面招討使幽州李匡威為河東北面招討使雲州赫連鐸為副汴將朱友裕將兵屯晉綘時汴軍已據潞州又遣大將李讜等率軍數萬急攻澤州武皇遣李存孝自潞州將三千騎以援之汴將鄧季筠以一軍犯陣存孝追擊擒其都將十數人獲馬千騎匹是夜李讜收軍而退大軍掩擊至馬牢闗斬首萬餘級追襲至懐州而還存孝復引軍攻潞州}
