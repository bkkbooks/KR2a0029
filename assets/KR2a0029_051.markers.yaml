  - {type: variant, offset: 30, length: 0, content: '', WYG: 孫五世相承曽祖盡忠貞元中繼為沙陁府都督既而為吐蕃所䧟乃舉其族七千帳徙於甘州盡忠尋率部衆三萬東奔俄而吐蕃追兵大至盡忠戰殁祖執宜即盡忠之長子也收合餘衆至於靈州徳宗命為隂山府都督元和初入為金吾將軍遷蔚州刺史代北行營招撫使新唐書沙陁𫝊元和三年盡忠欵靈州塞詔處其部鹽州置隂山府以執宜為府兵馬使朝長安授特進金吾衞將軍從攻鎮州進蔚州刺史破吳元濟授檢校刑部尚書長慶初破賊深州入朝留宿衞拜金吾衞將軍太和中授隂山府都督代北行營招撫使}
