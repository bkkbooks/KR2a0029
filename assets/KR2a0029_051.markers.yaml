  - {type: variant, offset: 2564, length: 1757, content: 百騎討從榮從榮方據胡床坐橋上遣左右召康義誠端門已閉叩左掖門從門𨻶窺之見朱洪實引騎兵北來走白從榮從榮大驚命取鐵掩心擐之坐調弓矢俄而騎兵大至從榮走歸府僚佐皆竄匿牙兵掠嘉善坊潰去從榮與妃劉氏匿床下皇城使安從益就斬之以其首獻丙申追廢從榮為庶人五代會要云清泰元年十二月勅故庶人從榮獲罪先帝貽禍厥身已歷歲時未營宅兆雖軫在原之念宜從有國之規且令中書門下商量葬禮尋據太常禮院狀奏請准唐貞觀中庶人承乾流死黔州仍葬以公禮從之五代史補秦王從榮明宗之愛子好為詩判河南府辟高輦為推官輦尤能為詩賓主相遇甚歡自是出入門下者當時名士有若張杭高文蔚何仲舉之徒莫不分廷抗禮更唱迭和時干戈之後武夫用事睹從榮所為皆不悅于是康知訓等竊議曰秦王好文交遊者多詞客此子若一旦南面則我等轉死溝壑不如早圖之高輦知其謀因勸秦王托疾此輩以所就之間須來問候請大王伏壯士出其不意皆斬之庶幾免禍矣從榮曰至尊在上一旦如此得無危乎輦曰子弄父兵罪當笞爾不然則悔無及矣從榮猶豫不決未幾及禍高輦棄市初從榮之敗也高輦竄于民家且落髮為僧既擒獲知訓以其毀形難認復使巾幘著緋驗其真偽然後用刑輦神色自若厲聲曰朱衣纔脫白刃難逃觀者笑之從璨明宗諸子案五代會要以從璨為明宗第四子冊府元龜作諸子與明宗紀同今仍其舊性剛直好客疏財意豁如也天成中為右衞大將軍時安重誨方秉事權從璨亦不之屈重誨常以此忌之明宗幸汴留從璨為大內皇城使一日召賓友於會節園酒酣之後戲登於御榻安重誨奏請誅之詔曰皇城使從璨朕巡幸汴州使警大內乃全乖委任但恣遨遊於予行從之園頻恣歌歡之會仍施峻法顯辱平人致彼喧譁達於聞聽方當立法固不黨親宜貶授房州司戶參軍仍令盡命長興中重誨之得罪也命復舊官仍贈太保冊府元龜卷二百九十五許王從益明宗之幼子也宮嬪所生明宗命王淑妃母之嘗謂左右曰唯此兒生於皇宮故尤所鍾愛長興末封許王晉高祖即位以皇后即其姊也乃養從益於宮中晉天褔中以從益為二王後改封郇國公郇國原本作鄒國考歐陽史及通鑑並作郇國薛史晉高祖紀亦作郇今改正影庫本粘籤食邑三千戶其後與母歸洛陽守陵開運末契丹主至汴以從益遙領曹州節度使復封許王與王妃尋歸西京會契丹主死其汴州節度使蕭翰謀歸北地慮中原無主軍民大亂則已亦不能按轡徐歸矣乃詐稱契丹主命遣人迎從益於洛陽令知南朝軍國事從益與王妃逃於徽陵以避之使者至不得已而赴焉從益於崇元殿見羣官蕭翰率部衆列拜於殿上羣官趨拜於殿下乃偽署王松為左丞相趙上交為右丞相李式翟光鄴為樞密使王景崇為宣徽使餘官各有署置又以北來燕將劉祚為權侍衞使充在京巡檢翰北歸從益餞於北郊及漢高祖將離太原從益召高行周武行德欲拒漢高祖案薛史但載從益拒漢事考宋史趙上交傳云漢祖將至從益遣上交馳表獻款蓋獻款乃淑妃從益本意也歐陽史兩存之其事始備舊五代史考異行周等不從且奏其事漢高祖怒車駕將至闕從益與王妃俱賜死於私第時年十七時人哀之永樂大典卷六千七百六十五代史闕文漢高祖自太原起軍建號至洛陽命郭從義先入京師受密旨殺王淑妃與許王從益淑妃臨刑號泣曰吾家子母何罪吾兒為契丹所立非敢與人爭國何不且留吾兒每年寒食使持一盂飯灑明宗陵寢聞者無不泣下臣謹按隱帝朝詔史臣修漢祖實錄淑妃從益傳但云臨刑之日焚香俟命蓋諱之耳重吉末帝長子為控鶴都指揮使閔帝嗣位出為亳州團練使末帝兵起為閔帝所害永樂大典卷一萬六千六百二十八案通鑑云詔遣殿直楚匡祚執亳州李重吉幽于宋州又云遣楚匡祚殺李重吉于宋州匡祚榜捶重吉責其家財清泰元年詔贈太尉仍令宋州選隙地置廟冊府元龜卷二百七十七案閔帝有子重哲授銀青光祿大夫檢校工部尚書見明宗紀歐陽史家人傳闕而不載今附識于此雍王重美末帝第二子清泰三年封晉兵入與末帝俱自焚死永樂大典卷一萬六千六百二十八案通鑑云洛陽自聞兵敗衆心大震居人四出逃竄山谷門者請禁之雍王重美曰國家多難未能為百姓主又禁其求生徒增惡名耳不若聽其自便事寧自還乃出令任從所適衆心差安又云皇后積薪欲燒宮室重美諫曰新天子至必不露居他日重勞民力死而遺怨將安用之乃止案重美傳永樂大典原本有闕佚今附錄通鑑于此疑通鑑所用即本薛史原文也史臣曰繼岌以童騃之歲當統帥之任雖成功於劍外尋求死於渭濱蓋運盡天亡非孺子之咎也從璟感厚遇之恩無苟免之意死於君側得不謂之忠乎從榮以狂躁之謀賈覆亡之禍謂為大逆則近厚誣從璨為權臣所忌從益為強敵所脅俱不得其死亦良可傷哉重美聽洛民之奔亡止母后之燔爇身雖燼於紅燄言則耀乎青編童年若斯可謂賢矣永樂大典卷六千七百六十, WYG: ''}
