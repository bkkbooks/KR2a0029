  - {type: variant, offset: 983, length: 0, content: '', WYG: 月載誕之際母艱危者竟夕族人憂駭市藥於鴈門遇神叟告曰非巫醫所及可馳歸盡率部人披甲持旄擊鉦鼓躍馬大噪環所居三周而止族人如其教果無恙而生是時虹光燭室白氣充庭井水暴溢武皇始言喜軍中語齠齔善騎射與儕類馳騁嬉戲必出其右年十三見雙鳬翔於空射之連中衆皆臣伏新城北有毗沙天王祠祠前井一}
