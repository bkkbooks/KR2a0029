  - {type: variant, offset: 1164, length: 0, content: '', WYG: 幸蜀陳景思與李友金發沙陁諸部五千騎南赴京師友金即武皇之族父也通鑑友金初與高文集竝降於李琢故得與陳景思南赴京師中和元年二月友金軍至絳州將渡河刺史瞿稹謂陳景思曰巢賊方盛不如且還代北徐圖利害四月友金旋軍鴈門瞿稹至代州半月之間募兵三萬營於崞縣之西其軍皆北邊五部之衆不閑軍法瞿稹李友金不能制友金謂景思曰興大衆成大事當}
