  - {type: variant, offset: 1363, length: 5, content: 次繼來欲候, WYG: 謂曰鴉兒軍至當避其鋒武皇以兵自夏陽濟河二月營於乾坑店黄巢大將尚讓林言王璠趙璋等引軍十五萬屯於梁田坡翼日大軍合戰自午及晡巢賊大敗是夜賊衆遁據華州武皇進軍圍}
