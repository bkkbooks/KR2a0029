  - {type: variant, offset: 1872, length: 0, content: '', WYG: 於京師時京城大駭天子幸鳯翔武皇退軍於河中光啟二年正月僖宗駐蹕於寳雞武皇自河中遣使上章請車駕還京且言大軍止誅凶黨時田令孜請僖宗南幸興元武皇遂班師朱玫於鳯翔立嗣襄王煴}
  - {type: variant, offset: 1872, length: 0, content: '', krp: 於京師時京城大駭天子幸鳯翔武皇退軍於河中光啟二年正月僖宗駐蹕於寳雞武皇自河中遣使上章請車駕還京且言大軍止誅凶黨時田令孜請僖宗南幸興元武皇遂班師朱玫於鳯翔立嗣襄王煴}
  - {type: variant, offset: 1873, length: 0, content: '', WYG: 帝以偽詔賜武皇武皇燔之械其使馳檄諸方鎮遣來使奉表於行在九月武皇遣昭義節度使李克修討孟方立於邢州大敗方立之衆於焦崗斬首數千級以大將安金俊為邢州刺史以撫其降人十月進攻邢州邢人出戰又敗之孟方立求據於鎮州鎮人出兵三萬以援方立克修班師光啟三年六月河中節度使王重榮為部將常行儒所殺武皇表重榮兄重盈為帥七月武皇以安金俊為澤州刺史時張全義自河陽據澤州及李罕之收復河陽召全義令守洛陽全義乃棄澤州而去故以金俊守之文徳元年二月僖宗自興元還京三月僖宗崩昭宗即位以武皇為開府儀同三司檢校太師兼侍中隴西郡王食邑七千戸食實封二百戸}
