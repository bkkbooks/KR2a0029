  - {type: variant, offset: 1924, length: 2, content: 頗駭, WYG: 引騎三百伏於長子縣崖谷間揆建牙持節褒衣大蓋擁衆而行存孝械揆等口遂擒揆及中使韓歸範并將校五百人存孝械揆等以組練繫之環於潞州遂獻於武皇武皇謂揆曰公縉紳之士安信徐歩可至達官何用如是揆無以對今繫於晉陽獄武皇將用為副使使人誘之揆言不遜遂殺之九月汴將葛從周棄潞州而遁武皇以康君立為潞州節度使以李存孝為汾州刺史十月張濬之師入晉州遊軍至汾隰武皇遣薛鐡山李承嗣將騎三千出隂地闗營於洪洞遣李存孝將兵五千營於趙城華州韓建以壯士三百人冒犯存孝之營存孝追擊直壓晉州西門張濬之師出戰為存孝所敗自是閉壁不出存孝引軍攻綘州十二月晉州刺史張行恭棄城而奔韓退張濬由含山路遁去大順二年春正月武皇上章申理}
