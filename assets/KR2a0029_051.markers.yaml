  - {type: variant, offset: 1357, length: 1, content: 漢, WYG: 賊新唐書王重榮傳重榮懼黄巢復振憂之與楊復光計復光曰我世與李克用共憂悉其人忠不顧難死義如已若乞師焉事蔑不濟万遣使者約連和李友金發五百騎齎詔召武皇於達靼武皇即率達靼諸部萬人趨鴈門五月整兵二萬南嚮京師太原鄭從讜以兵守石嶺闗武皇乃引軍出他道至太原城下㑹大雨班師於鴈門中和二年八月獻祖自達靼部率其族歸代}
