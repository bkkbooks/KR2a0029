  - {type: variant, offset: 1075, length: 196, content: 君立率五百騎自上黨朝發暮至王檀游軍扼汾橋君立一戰敗之徑至城下馳突斬擊出入如神大呼曰昭義侍中大軍至矣昭義原本作紹義考薛史前後多稱李嗣昭為昭義侍中今改正影庫本粘籤是夜入城與安金全等分出諸門擊殺於外遲明梁軍敗走十七年將兵屯德勝時汴軍自滑州轉餉以給楊村砦莊宗親率騎軍於河外循岸而上邀擊之汴人拒楊村五十里於河曲潘張村築壘以貯軍儲莊宗令諸軍攻之汴人設伏於要路逆戰偽敗王師乘之入壘門梁伏兵起因與血戰君立與鎮, WYG: 使貢方物宋}
