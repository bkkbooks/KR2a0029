  - {type: variant, offset: 1480, length: 190, content: 珪至率騎以禦之明宗諭以逆順之理行珪乃降通鑑考異云據唐實錄高行珪降在劉守光既平之後與薛史異今附識于此影庫本粘籤守光將元行欽在山北聞行珪有變即率部下軍衆以攻行珪行珪遣弟行周告急於周德威案歐陽史行珪夜縋行周馳入晉見莊宗莊宗因遣明宗救武州比至行欽已解去行珪乃降是行珪先求救于晉而後降也薛史作降晉後告急微有異同舊五代史考異德威命明宗李嗣本安金全將兵援之明宗破行欽於廣邊軍行欽亦降尋以行珪為朔, WYG: 邕}
