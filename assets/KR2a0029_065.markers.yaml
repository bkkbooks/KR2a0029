  - {type: variant, offset: 1044, length: 0, content: '', WYG: 安居之所亦可請射各自修營辛未北京副畱守太原尹孟知祥加檢校太傅增邑賜功臣號帝畋于西苑癸酉以租庸副使守衞尉卿孔謙爲租庸使以右威衞上將軍孔循爲租庸副使甲戌以權知汴州軍州事翰林學士承旨戶部尚書盧質爲兵部尚書依前翰林學士承旨仍賜論思匡佐功臣丙子以雲州刺史鴈門以北都知兵馬使安元信爲大同軍節度畱後以隰州刺史張廷裕爲新州威塞軍節度畱後丁丑樞密使郭崇韜上表請退不允戊寅租庸使守禮部尚書王正言罷使守本官辛已詔諸道節度觀察防禦團練使刺史竝于洛陽修宅一區中書門下上言請今後諸道除節度副使雨使判官外其餘職員并諸州軍事判官各任本處奏辟從之五代會要同光二年八月八日中書門下奏諸道除節度使及兩使判官除授外其餘職員并軍事判官伏以翹車著詠戔帛垂文武重弓旌以光尊俎由是副已知之薦成接士之榮必當}
