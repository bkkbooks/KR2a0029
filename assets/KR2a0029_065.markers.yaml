  - {type: variant, offset: 2859, length: 837, content: 三十六日復進攻其城潞王登陴泣諭於外聞者悲之張虔釗性褊詰旦西南用軍與都監皆血刃以督軍士軍士齊詬反攻虔釗虔釗躍馬避之時羽林指揮使楊思權引軍自西門先入思同未之知猶督士登城俄而嚴衞指揮使尹暉呼曰西城軍已入城受賞矣軍士可解甲棄仗之聲振動天地日午亂軍畢集涇州張從賓邠州康福河中安彥威皆遁去十七日思同與藥彥稠萇從諫俱至長安劉遂雍閉關不內乃奔潼關二十二日潞王至昭應前鋒執思同來獻王謂左右曰思同計乖於事然盡心於所奉亦可嘉也顧謂趙守鈞曰趙守鈞原本作字鈞今從通鑑改正影庫本粘籤思同爾之故人可行迓之於路達予撫慰之意思同至潞王讓之曰賊臣傾我國家殘害骨肉非予弟之過我起兵岐山蓋誅一二賊臣耳爾何首鼠兩端多方悞我今日之罪其可逃乎思同曰臣起自行間受先朝爵命秉旄仗鉞累歷重藩終無顯效以答殊遇臣非不知攀龍附鳳則福多扶衰救弱則禍速但恐瞑目之後無面見先帝釁鼓膏原縲囚之常分也潞王為之改容徐謂之曰且憩歇潞王欲用之而楊思權之徒恥見其面屢啟劉延朗言思同不可留慮失士心又潞王入長安時尹暉盡得思同家財及諸妓女故尤惡思同與劉延朗亟言之屬王醉不待報殺思同幷其子德勝潞王醒召思同左右報已誅之矣潞王怒延朗累日嗟惜之及漢高祖即位詔贈侍中永樂大典卷六千六百七十一索自通字得之太原清源人也父繼昭以自通貴授國子監祭酒致仕自通少能騎射嘗於山墅射獵莊宗鎮太原時遇之於野訊其姓名即補右番廳直軍使後因從獵射中走鹿轉指揮使佐周德威攻燕軍於涿州擒燕將郭在鈞從莊宗定魏博改突騎指揮使明宗即位自隨駕左右廂馬軍都指揮授忻州刺史歲餘召還復典禁兵領韶州刺史出為大同軍節度使累歲移鎮忠武改京兆尹西京留守楊彥溫據河中作亂自通率師討平之授河中節度使尋自鄜州入為右龍武統軍初自通既平楊彥溫楊彥溫原本作湯彥溫考通鑑歐陽史俱作楊彥溫今改正影庫本粘籤代末帝鎮河中臨事失於周旋末帝深銜之案通鑑自通至鎮承安重誨指籍軍府甲仗數上之以為從珂私造賴王德妃居中保護從珂由是得免舊五代史考異及末帝即位自通憂悸求死清泰元年七月因朝退涉洛自溺而卒子萬進周顯德中歷任方鎮永樂大典卷一萬八千一百二十九, WYG: ''}
