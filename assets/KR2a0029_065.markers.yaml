  - {type: variant, offset: 1673, length: 2, content: 歷忻, krp: 錢元璙爲檢校太尉兼中書令餘如故辛卯天平軍監軍使柴重厚可特進右領衞將軍同正充鳯翔監軍使甲午以宣武軍節度押牙李從溫李從璋李從榮李從厚李從璨竝銀青光祿大夫檢校右㪚騎常侍兼御史大夫宣武軍節度押牙李從臻可檢校國子祭酒兼御史中丞自從温而下皆李嗣源諸子也十一月丙申靈武奏甘州回鶻可汗仁美卒其弟狄銀權主國事吐渾白都督族帳移于代州東南己亥幸六宅宴諸弟壬寅尚書左丞判吏部尚書銓事崔沂貶麟州司馬吏部侍郎崔貽孫貶朔州司馬給事中鄭韜光貶寧州司馬吏部員外盧損貶府州司户時有選人吳延皓取亡叔告身故舊名求仕事發延皓付河南府處死崔沂已下貶官宰相豆盧革趙光𦙍韋説詣閤門待罪詔釋之癸卯帝畋于伊闕侍衞金槍馬萬餘騎從帝一發中大鹿是日命從官拜梁祖之陵物議非之其夕宿于張全義之别墅甲辰宿伊闕縣乙已宿椹磵時騎士圍山㑹夜顚墜崖谷死傷甚衆丙午復命衞兵分獵殺獲萬計是夜方歸京城六街火炬如晝丁未賜羣臣鹿肉有差庚戌制改節將一十一人功臣號辛亥以兵部侍郎李德休爲吏部侍郎壬子日南至百官拜表稱賀以昭儀侯氏爲汗國夫人昭容夏氏爲虢國夫人昭媛白氐爲沛國夫人出使美宣鄧氏爲魏國夫人御正楚眞張氏爲涼國夫人司簿德美周氏爲宋國夫人侍眞吳氏爲渤海郡夫人其餘竝封郡夫人丁已河中節度使守太師兼尚書令西平王李繼麟可依前守太師兼尚書令河中䕶國軍節度使西平王仍賜鐡劵戊午幸李嗣源李紹榮之第縱酒作樂是日鎭州地震契丹冦蔚州十二月戊辰幸西苑校獵己巳詔汴州節度使李嗣源歸鎭通鑑云己巳命宣武軍節度使李嗣源將宿衛兵三萬七千人赴汴州遂如幽州禦契丹庚午帝與皇后劉氏幸張全義第酒酣帝命皇后拜全義爲養父全義惶恐致謝復出珍貨貢獻翼日皇后傳制命學士草謝全義書學士趙鳯密疏陳國后無拜人臣爲父之禮帝雖嘉之竟不能已其事壬申以教坊使王承顏爲興州刺史丙子詔取來年正月七日幸魏州庚辰畋于近郊至夕還宫壬午契丹寇}
