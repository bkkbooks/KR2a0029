  - {type: variant, offset: 479, length: 230, content: 門召能破賊船者津人有馬破龍者能水游乃令往見延賞延賞言危窘極矣所爭晷刻時棹船滿河流矢雨集建及被重鎧執矟呼曰豈有一衣帶水縱賊如此乃以二船實甲士皆短兵持斧徑抵梁之戰艦斧其笮又令上流具瓮積薪其上順流縱火以攻其艦案通鑑作木甖載薪沃油然火于上流縱之與薛史異歐陽史作以大甕積薪自上流縱火與薛史同舊五代史考異須臾烟焰騰熾梁軍斷纜而遁建及乃入南城賀瓌解圍而去其年十二月與汴將王瓚戰於戚城建及傷手莊宗解御衣金帶賜之建及有膽氣慷慨不羣臨陣鞠旅意氣橫壯自莊宗至魏州建及都總內外衙銀槍效, WYG: ''}
