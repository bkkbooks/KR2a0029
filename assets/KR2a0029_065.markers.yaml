  - {type: variant, offset: 2460, length: 1, content: 遷, WYG: 晝夜隂晦未嘗澄霽江河漂溢隄防壞決天下皆訴水災丁丑詔吳越王錢鏐將行冊禮準禮文合用竹冊宜令所司修製玉冊時郭崇韜秉政以爲不可樞密承旨段徊贊其事故有是命癸丑以天德軍節度使管内蕃漢都知兵馬使劉承訓爲天德軍節度觀察畱後丙戌詔曰闗内諸陵頃因䘮亂例遭穿穴多未掩修其下宫殿宇法物等各令奉陵州府據所管陵園修製仍四時各依舊例薦饗每陵仰差近陵百姓二十户充陵戶以備灑掃其壽陵等一十陵亦一例修掩量置陵戶戊子以刑部尚書李琪充昭宗少帝改卜園陵禮儀使己丑以工部郎中李途爲}
