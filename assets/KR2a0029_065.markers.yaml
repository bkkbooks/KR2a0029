  - {type: variant, offset: 2319, length: 131, content: 年入朝見於中興殿明宗問秦州邊事對曰秦州與吐蕃接境蕃部多違法度臣設法招懷沿邊置寨四十餘所控其要害每蕃人互市互市原本作五市今據冊府元龜改正影庫本粘籤飲食之界上令納器械因手指畫秦州山川要害控扼處明宗曰人言思同不管事豈及此耶時兩川叛欲用之且留左右故授右武衞將軍八月授西南, WYG: 信充北}
