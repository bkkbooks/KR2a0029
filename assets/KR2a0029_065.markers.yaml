  - {type: variant, offset: 1980, length: 262, content: 人也父敬柔歷瀛平儒檀營五州刺史思同母即劉仁恭之女也故思同初事仁恭為帳下軍校案歐陽史作銀胡指揮使舊五代史考異會劉守光攻仁恭於大安山思同以部下兵歸太原時年十六武皇命為飛騰指揮使案歐陽史作飛勝指揮使舊五代史考異飛騰指揮使疑有舛誤考冊府元龜亦作飛騰今無可復考姑仍其舊影庫本粘籤從莊宗平定山東累典諸軍思同性疏俊粗有文性喜為詩什與人唱和自稱薊門戰客魏王繼岌待之若子時內養呂知柔侍興聖宮頗用事思同不平之呂為終南山詩末句有頭字思同和曰料伊直擬衝霄漢賴有青天壓着頭其所為詩句皆此類也每從征必在興聖帳下然同光朝位止鄭州刺史案歐陽史作以功遷神武十, WYG: 衙内馬步}
