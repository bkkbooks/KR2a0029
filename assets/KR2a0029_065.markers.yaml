  - {type: variant, offset: 1692, length: 86, content: 尋移鎮安州行珪性貪鄙短於為政在安州日行事多不法副使范延策者幽州人也性剛直累為賓職及佐行珪覩其貪猥因強諫之行珪不從後延策因入奏獻封章於闕下事有三條一請不禁過淮猪羊而禁絲綿匹帛, WYG: 丁亥}
