  - {type: variant, offset: 1779, length: 154, content: 實中國一請於山林要害置軍鎮以絕寇盜一述藩侯之弊請勅從事明諫諍之不從令諸軍校列班廷諍行珪聞之深銜之後因戍兵作亂誣奏延策與之同謀父子俱戮於汴聞者寃之未幾行珪以疾卒詔贈太尉永樂大典卷一萬八千二十九張廷裕代北人也幼事武皇於雲中從平黃巢討王行瑜自行間漸升為小將莊宗定魏補天雄軍左廂馬步都虞候歷蔚慈隰三州刺史同光三年除新, WYG: 鎭}
