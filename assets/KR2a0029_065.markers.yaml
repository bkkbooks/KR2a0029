  - {type: variant, offset: 1683, length: 0, content: '', WYG: 特恩授官及侍衞諸軍將校内諸司等官其告身官給舊例朱膠錢臺省禮錢竝停其餘合徴臺省禮錢比舊數五分中許徴一分特恩者不徴兵吏部兩司逐月各支錢四十貫文充吏人食直少府監鑄錢造印文今後不得徴納銅炭價直其料物官給庚子車駕發京師幸鄴以前許州節度使李紹沖爲太子少保以前邠州節度使韓恭爲右金吾大將軍充兩街使以前安州節度使朱漢賓爲左龍武統軍庚戌車駕至鄴命青州節度使符習修酸棗河隄先是梁末帝次河隄引水東注至鄆濮以限我軍至是方修之丙辰幽州上言節度使李存賢卒二月甲子朔詔興唐府管内有百姓隨絲鹽錢每兩與減五十文逐年所俵蠶鹽每㪷與減五十文小菉豆稅每畆與減放三升都城内所徴稅絲水與除放丙寅定州節度使王都來朝丁卯畋于近郊己已召從臣擊毬于鞠埸辛未許州上言襄城葉縣準勑割隸汝州其扶溝等縣請郤隸當州從之甲戌以滄州節度使李紹斌爲幽州節度使依前檢校太保以大同軍畱後安元信爲滄州節度使乙亥幸王莽河射鴈丙子李嗣源奏涿州東南殺敗契丹生擒首領三十人符習奏修隄役夫遇雪寒逃散樞密使郭崇韜上表辭兼鎭時帝命李紹斌鎭幽州以其時望未重欲以李嗣源爲鎭帥且爲紹斌聲援移郭崇韜兼領汴州召崇韜議之崇韜奏以爲當因懇辭兼領庚辰以宣武軍節度使李嗣源爲鎭州節度使辛已以皇子繼潼繼嵩繼蟾繼嶢竝檢校司徒皆冲幼未出閤突厥渤海國皆遣使貢方物帝幸近郊射鴈甲申以樞密使郭崇韜爲依前守侍中監修國史兼樞密使加食邑實封廣南劉巖遣使奉書于帝稱大漢國王致書上大唐皇帝乙酉帝射鴨于郭泊丙戌定州節度使檢校太尉兼侍中王都進封開國公加食邑實封戊子幸近郊射鴈工部尚書崔柅卒贈右僕射三月癸已朔賜扈從諸軍將士優給自二十千至一千甲午振武軍節度使洛京内外蕃漢馬步使朱守殷奏昨修月陂隄至德宫南獲玊璽一紐獻之詔示百官騐其文曰皇帝行寳四字方圓八寸厚二寸背紐交龍光瑩精妙守殷又于役所得古文錢四百六十六内二十六文曰得一元寳四百四十曰順}
