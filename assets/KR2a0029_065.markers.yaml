  - {type: variant, offset: 278, length: 2, content: 從擊, WYG: 未行我慙見二人卿當屈意行之故有是命清異録同光旣即位猶襲故態身預俳優尚方進御中褁名品日新今伶人所頂尚有傳其遺製者甲辰以兖州節度使李紹欽依前檢校太保兖州節度使進封開國侯以邠州節度使韓恭依前檢校太保邠州節度使進封開國伯丙午以福建節度使閩王王審知依前檢校太師守中書令福建節度使戊申幸郭崇韜第己酉詔天下收拆防城之具不得修濬池隍以西都畱守京兆尹張筠依前檢校太保充西都畱守甲寅以滄州節度使李紹斌充東北面招討使以兖州節度李紹欽爲副招討使以宣徽使李紹宏爲招討都監率大軍渡河而北時幽州上言}
