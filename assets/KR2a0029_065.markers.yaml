  - {type: variant, offset: 2464, length: 4, content: 西京留守, WYG: 充修奉諸陵使辛卯詔括天下私馬五代㑹要詔下河南河北諸州和市戰馬官吏除一匹外匿者坐罪將收蜀故也三楚新録莊宗謂髙季興曰今天下負固不服者惟吳蜀耳朕欲先有事于蜀而蜀地險阻尢難江南才隔荆南一水朕欲先之卿以為何如季興對曰臣聞蜀地富民饒獲之可建大利江南國貧地狄民少得之恐無益臣願陛下釋吳先蜀時荘宗意亦欲}
