  - {type: variant, offset: 1684, length: 3, content: 成初授, WYG: 元寳上之龎元英文昌雜録云同光三年洛京積善坊得古文錢曰得一元寳順天元實史不載何代鑄錢近見錢氏錢譜云史思明再陷洛陽鑄得一錢賊黨以為得一非佳號乃改順天蓋史思明所鑄錢也丙申寒食節帝與皇后出近郊遙饗代州親廟庚子詔取三月十七日車駕歸洛京壬寅符習奏修河隄畢功戊申帝召郭崇韜謂曰朕思在德勝寨時霍彥威段凝皆予之勍敵終日格鬬戰聲相聞安知二年之間在吾廡下吾無少康光武之才一旦重興基構者良由二三勲德同心輔翼故也朕有時夢寢如在戚城思念曩時挑戰鏖兵勞則勞矣然而掦旌伐鼓差慰人心殘壘荒溝依然在目予欲按德勝故寨與卿再陳舊事崇韜曰此去澶州不遠陛下再觀戰地益知王業之艱難豈不韙哉已酉車駕發鄴宫辛亥至德勝城登城四望指戰陣之處以諭宰臣渡河南觀廢柵舊阯至楊村寨㳂河至戚城置酒作樂而罷壬子淮南楊􅄎遣使朝貢東京副畱守張憲奏諸營家口一千二百人逃亡以艱食故也時宫苑使王允平伶人景進爲帝廣采宫人不擇良家委巷殆千餘人車駕不給載以牛車纍纍于路焉庚辰車駕至自鄴辛酉詔本朝以雍州爲西京洛州爲東都并州爲北都近以魏州爲東京宜依舊以洛京爲東都魏州改爲鄴都與北都竝爲次府夏四月癸亥朔日有蝕之以租庸副使孔循權知汴州軍州事丙寅淮南楊􅄎遣使貢方物壬申幸甘泉亭癸酉詔翰林學士承旨盧質覆試新及第進士五代㑹要時以新及第進士符䝉正等尚于浮議故命盧質覆試租庸使奏時雨乆愆請下諸道州府依法祈禱從之乙亥帝與皇后幸郭崇韜第又幸左龍武統軍朱漢賓之第戊寅以耀州爲團練州其順義軍額宜停庚辰帝侍皇太后幸㑹節園遂幸李紹榮之第辛已以旱甚詔河南府徙市造五方龍集巫禱祭癸未以兖州節度使李紹欽爲}
