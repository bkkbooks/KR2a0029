  - {type: variant, offset: 2483, length: 252, content: 散關思同恃勇先入劍門大軍未相繼復被董璋兵逐出之及敬瑭班師思同以曾獲劍門之功移鎮山南西道三年兩川交兵明宗慮併在一人則朝廷難制密詔思同相度形勢即乘間用軍事未行而董璋敗八月復為京兆尹兼西京留守時潞王鎮鳳翔與之鄰境及潞王不稟朝旨致書於秦涇雍梁邠諸帥言賊臣亂政屬先帝疾篤謀害秦王迎立嗣君自擅權柄以致殘害骨肉搖動藩垣懼先人基業忽焉墜地故誓心入朝以除君側事濟之後謝病歸藩然藩邸素貧兵力俱困欲希國士共濟急難乃令小伶安十十以五弦妓見思同因歡諷動又令軍校宋審溫者請使於雍若不從命即獨圖之又令推官郝昭案歐陽史作郝詡通鑑從歐陽史, WYG: 悦}
