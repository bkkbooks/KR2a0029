  - {type: variant, offset: 1676, length: 0, content: '', WYG: 州党項遣使貢方物乙酉幸龍門佛寺祈雪丙戌以徐州節度使李紹眞爲北面行營副招討使戊子李嗣源奏部署大軍自宣武軍北征淮南楊溥遣使貢獻己丑幸龍門庚寅詔河南尹張全義爲洛京畱守判在京諸軍事是日日傍有背氣凡十}
