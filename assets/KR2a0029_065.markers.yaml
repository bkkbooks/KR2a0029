  - {type: variant, offset: 275, length: 2, content: 十四, WYG: 内園使儲德源爲憲州刺史皆梁之伶人也初帝平梁俊與德源皆爲寵伶周匝所薦帝因許除郡郭崇韜以爲不可伶官言之者衆帝密召崇韜謂之曰予已許除郡經}
