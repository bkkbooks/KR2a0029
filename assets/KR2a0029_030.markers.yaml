  - {type: variant, offset: 583, length: 987, content: 影庫本粘籤垂泣推薦請除郡守帝亦許之庚辰帝御元德殿梁百官於朝堂待罪詔釋之壬午段凝所部馬步軍五萬解甲於封丘凝等率大將先至請死詔各賜錦袍御馬金幣帝幸北郊撫勞降軍各令還本營丙戌詔曰懲惡勸善務振紀綱激濁揚清須明真偽蓋前王之令典為歷代之通規必按舊章以令多士而有志萌僭竊位忝崇高累世官而皆受唐恩貪爵祿而但從偽命或居台鉉或處權衡或列近職而預機謀或當峻秩而掌刑憲事分逆順理合去留偽宰相鄭王玉等一十一人皆本朝簪組儒苑品流雖博識多聞備明今古而修身慎行頗負祖先昧忠貞而不度安危專利祿而全虧名節合當大辟無恕近親無恕原本作無恐今據文改正影庫本粘籤朕以纘嗣丕基初平巨憝方務好生之道在行含垢之恩湯網垂仁既矜全族舜刑投裔兼貸一身爾宜自新我全大體其為顯列不並庶僚餘外應在周行悉仍舊貫凡居中外咸體朕懷乃貶梁宰相鄭王玉為萊州司戶蕭頃為登州司戶翰林學士劉岳為均州司馬任贊房州司馬姚顗復州司馬封翹唐州司馬李懌懷州司馬竇夢徵沂州司馬竇夢徵原本作夢微今據唐列傳改正影庫本粘籤崇政院學士劉光素密州司戶陸崇安州司戶御史中丞王權隨州司戶並員外置同正員是日以梁將段凝上疏奏梁朝權臣趙巖等並助成虐政結怨於人聖政惟新宜誅首惡乃下詔曰朕既殄偽庭顯平國患好生之令含弘雖切於予懷懲惡之規決斷難違於衆請况趙巖趙鵠等自朕收城數日布惠四方尚匿迹以潛形罔悛心而革面須行赤族以謝衆心其張漢傑昨於中都與王彥章同時俘獲此際未詳行止行止原本作行致今據文改正影庫本粘籤偶示哀矜今既上將陳詞羣情激怒往日既彰於僭濫此時難漏於網羅宜置國刑以塞羣論除妻兒骨肉外其他疏屬僕使並從釋放敬翔李振首佐朱溫共傾唐祚屠害宗屬殺戮朝臣既寰宇以皆知在人神而共怒敬翔雖聞自盡未豁幽寃宜與李振並族於市疎屬僕使並從原宥朱珪素聞狡𢀿唯務讒邪鬬惑人情枉害良善將清內外須切去除况衆狀指陳亦宜誅戮契丹撒剌阿撥既棄其母又背其兄朕比重懷來厚加恩渥看同骨肉錫以姓名兼分符竹之榮疊被頒宣之渥而乃輒辜重惠復背明廷罔顧欺違竄歸偽室既同梟獍難貸刑章可并妻子同戮於市其朱氏近親趙鵠正身趙巖家屬仰嚴加擒捕其餘文武職員將校一切不問是日趙巖張希逸張漢傑張漢倫張漢融朱珪敬翔李振及契丹撒剌阿撥等幷其妻孥皆斬於汴橋下又詔除毀朱氏宗廟神主偽梁二主幷降為庶人天下官名府號及寺觀門額曾經改易者並復舊名時帝欲發梁祖之墓棺燔柩河南尹張全義上章申理乞存聖恩案通鑑張全義上言朱溫雖國之深讎然其人已死刑無可加屠滅其家足以為報乞免焚以存聖恩, WYG: ''}
