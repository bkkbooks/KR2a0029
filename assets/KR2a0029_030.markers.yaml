  - {type: variant, offset: 121, length: 2, content: 影庫, WYG: 嵗漕百萬石以給宿衛太祖深然之案通鑑攷異引梁功臣𫝊云紹威馳簡獻替意互合者十得五六太祖嘆曰竭忠力一人而已又引莊宗實録曰紹威隂有覆温之志而賂温益厚温怪其曲事慮蓄奸謀而莫之察乃賜紹威妓妾數人未半嵗召還以此得其隂事其紀載互異如此竊謂紹威有謀慮得梁王信任宜也然以梁主雄險而紹威又因盡誅牙軍有自弱之悔則此時猜忌諒亦有之未可偏廢其説趙犨𫝊父叔文案叔文原}
