  - {type: variant, offset: 1574, length: 2106, content: 考異帝乃止令剗去闕室而已丁亥梁百官以誅凶族於崇元殿立班待罪詔各復其位洛陽縉紳舊聞記載張全義表云伏念臣誤棲惡木曾飲盜泉實有瑕疵未蒙昭雪因下詔雪之殿本以樞密使樞密使原本作驅察使考歐陽史郭崇韜傳崇韜由樞密使知中書事今改正影庫本粘籤檢校太保守兵部尚書郭崇韜權行中書公事己丑御崇元殿制曰仗順討逆少康所以誅有窮纘業承基光武所以滅新莽咸以中興景命再造王猷經綸於草昧之中式遏於亂略之際朕以欽承大寶顯荷鴻休雖繼前修固慚涼德誓平元惡期復本朝屬四海之阽危允萬邦之推戴近者親提組練徑掃氛祅振已墜之皇綱殄偷安之寇孽國讎方雪帝道爰開拯編甿覆溺之艱救率土倒懸之苦粵自朱溫搆逆友貞嗣凶篡殺二君隳殘九廟虺毒久傷於宇宙狼貪肆噬於華夷剝喪元良凌辱神主帝里動黍離之嘆朝廷多棟橈之危棄德崇奸窮兵黷武戰士疲勞於力役烝民耗竭其膏腴言念於斯軫傷彌切今則已梟逆豎大豁羣情覩曆數之有歸實神靈之匪昧得不臨深表誡馭朽為懷將弘濟於艱難宜特行於赦宥應偽命流貶責授官等已經量移者並可復資徒流人放歸鄉里京畿及諸道見禁囚徒大辟罪降從流已下咸赦除之其鄭王玉等一十一人未在移復之限應扈從征討將校及諸官員職掌節級馬步兵士及河北諸處屯駐守戍兵士等皆情堅破敵業茂平淮平淮原本作平準今考薛史原文係用唐憲宗平淮蔡事準字訛誤今改正影庫本粘籤副予戡定之謀顯爾忠勤之節並據等第續議奬酬其有歿於王事未經追贈者各與贈官如有子孫堪任使者並量材錄任應偽庭節度觀察防禦團練等使及刺史監押行營將校等並頒恩詔不議改更仍且稱舊銜當俟別加新命理國之道莫若安民勸課之規宜從薄賦庶遂息肩之望冀諧鼓腹之謠應諸道戶口並宜罷其差役各務營農所係殘欠賦稅及諸務懸欠積年課利及公私債負等其汴州城內自收復日已前並不在徵理之限其諸道自壬午年十二月已前並放北京及河北先以祅祲未平配買征馬如有未請却官本錢及買馬不迨者可放免應有本朝宗屬及內外文武臣僚被朱氏無辜屠害者並可追贈如有子孫及本身逃難於諸處漂寓者並令所在尋訪津置赴闕義夫節婦孝子順孫旌表門閭量加賑給或魚眾寡惸獨無所告者仰所在各議拯救民年過八十者免一子從征其有先投過偽庭將校官吏等一切不問云甲午以樞密使檢校太保守兵部尚書太原縣男郭崇韜為開府儀同三司守侍中監修國史兼真定尹成德軍節度使依前樞密使太原郡侯仍賜鐵券乙未詔宰相豆盧革權判吏部上銓御史中丞李德休權判東西銓事丙申滑州留後檢校太保段凝可依前滑州留後仍賜姓名紹欽紹欽原本作紹鏗今考通鑑及歐陽史皆作欽今改正影庫本粘籤以金紫光祿大夫檢校司空守輝州刺史杜晏球為檢校司徒依前輝州刺史仍賜姓名紹虔詔處斬隨駕兵馬都監夏彥朗於和景門外時宦官怙寵廣侵占居人第舍郭崇韜奏其事乃斬彥朗以徇丁酉賜百官絹二千匹錢二百萬職事絹一千匹錢百萬戊戌以竭忠啟運匡國功臣匡國原本避宋諱作章國今據歐陽史改正影庫本粘籤天平軍節度使開府儀同三司檢校太傅兼侍中蕃漢馬步總管副使隴西郡侯李嗣源為依前檢校太傅兼中書令天平軍節度使特進封開國公加食邑實封餘如故以開府儀同三司檢校太傅北都留守興聖宮使判六軍諸衞事李繼岌為檢校太尉同平章事充東京留守詔御史臺班行內有欲求外職或要分司各許於中書投狀奏聞己亥宴勳臣於崇元殿梁室故將咸預焉帝酒酣謂李嗣源曰今日宴客皆吾前日之勍敵一旦同會皆卿前鋒之力也梁將霍彥威戴思遠等皆伏陛叩頭帝因賜御衣酒器盡歡而罷齊州刺史孟璆上章請死詔原之璆初事帝為騎將天祐十三年帝與劉鄩莘縣對壘璆領七百騎奔梁至是來請罪帝報之曰爾當吾急引七百騎投賊何面目相見璆惶恐請死帝恕之未幾移貝州刺史貝州原本作月州今據文改正影庫本粘籤庚子帝畋於汴水之陽十一月辛丑朔有司奏河南州縣見使偽印望追毀改鑄從之以光祿大夫檢校太傅左金吾上將軍兼領左龍武軍事汾州刺史李存渥為滑州節度使加特進同平章事以雜指揮散員都部署特進檢校太傅忻州刺史李紹榮為徐州節度使以滑州兵馬留後檢校太保李紹欽為兗州節度使壬寅鳳翔節度使秦王李茂貞遣使賀收復天下癸卯河中節度使西平王朱友謙來朝西平王原本作西來考歐陽史朱友謙傳友謙封西平王今改正影庫本粘籤乙巳賜友謙姓改名繼麟帝令皇子繼岌兄事之以捧日都指揮使博州刺史康延孝為鄭州防禦使檢校太保賜姓名紹琛以宋州節度使檢校太尉平章事袁象先依前為宋州節度使仍賜姓名紹安以許州匡國軍節度使檢校太尉同平章事溫韜依前許州節度使仍賜姓名紹冲丁未日南至帝不受朝賀戊申中書門下上言以朝廷兵革雖寧支費猶闕應諸寺監各請置卿少卿監祭酒司業各一員博士兩員餘官並停唯太常寺事關大禮大理寺事關刑法除太常博士外許更置丞一員其王府及東宮官司天五官正奉御之屬凡關不急司存凡關不急司存疑有舛誤考五代會要及薛史職官志並與莊宗紀同今無可校正姑仍其舊影庫本粘籤並請未議除授其諸司郎中員外應有雙曹者且置一員左右常侍諫議大夫給事中起居郎起居舍人補闕拾遺各置一半三院御史仍委御史中丞條理申奏其停罷朝官仍各錄名銜具罷任時日留在中書候見任官滿二十五箇月並據資品却與除官其西班上將軍已下仍望宣示樞密院斟酌施行從之時議者以中興之朝事宜恢廓驟茲自弱頓失物情己酉詔應隨處官吏務局員僚諸軍將校等如聞前例各有進獻直貢章奏不唯褻黷於朝廷實且傍滋於誅斂並宜止絕以肅化風又詔左降均州司馬劉岳有母年踰八十近聞身故準故事許歸候三年喪服闋如未量移即却赴貶州壬子詔取今月二, WYG: 巻}
