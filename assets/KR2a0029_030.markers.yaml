  - {type: variant, offset: 3682, length: 1936, content: 日幸洛京以十二月二十三日朝獻太微宮二十四日朝獻太廟二十五日有事於南郊癸未中書門下奏應隨駕及在京有帶兼官者並望落下只守本官從之乙卯以特進特進原本作恃進今據文改正影庫本粘籤檢校太傅開封尹判六軍諸衞事充功德使王瓚為宣武軍節度副使權知軍州事丁巳以銀青光祿大夫書左丞趙光胤為中書侍郎平章事集賢殿大學士案歐陽史作趙光允為中書侍郎不載大學士銜與薛史詳略異舊五代史考異以朝散大夫禮部侍郎韋說守本官同平章事以吏部侍郎史館修撰判館事盧文度為兵部侍郎充翰林學士以右散騎常侍充弘文館學士判館事馮錫嘉為戶部侍郎知制誥充翰林學士以翰林學士守尚書膳部員外郎劉昫為比部郎中知制誥依前充職以扈鑾書制學士扈鑾書制學士考歐陽史作扈鑾學士通鑑作扈鑾書學士疑皆引薛史而有所刪節惟五代會要作扈鑾書制學士與薛史莊宗紀同今仍其舊影庫本粘籤行尚書倉部員外郎趙鳳為倉部郎中知制誥充翰林學士以左拾遺于嶠守本官充翰林學士戊午以中書侍郎平章事豆盧革判租庸使兼諸道鹽鐵轉運等使新羅王金朴英遣使貢方物己未以洛京留守判六軍諸衞事守太尉兼中書令河南尹魏王張全義為檢校太師守中書令餘如故以荊南節度使檢校太師守中書令渤海王高季興為依前檢校太師守中書令餘如故庚申以工部尚書真定尹北都副留守知留守事任圜為檢校吏部尚書兼御史大夫充成德軍節度使行軍司馬知軍府事安義軍節度使李繼韜入見待罪詔釋之辛酉以宣化軍留後檢校太傅戴思遠權知青州軍州事檢校司空左監門上將軍安崇阮並檢校舊官却復本任以鎮國軍留後檢校太傅霍彥威為保義軍節度留後以權知威化軍留後檢校司徒高允貞權知鎮國軍留後以權知河陽留後檢校太保張繼業依前權知河陽留後以鄜延兩鎮節度使檢校太師兼中書令北平王高萬興依前鄜延節度使仍封北平王襄州節度使檢校太傅平章事孔勍依前襄州節度使餘如故以永平軍節度使行大安尹檢校太保張筠為西都留守行京兆尹以晉州節度使檢校太保劉玘邠州節度使檢校太保韓恭安州節度使檢校太保朱漢賓並檢校舊官却復本任壬戌以左金吾衞大將軍史敬鎔為左街使史敬鎔原本作敬容今據薛史列傳改正影庫本粘籤右金吾衞大將軍李存確為右街使甲子車駕發汴州十二月庚午朔車駕至西京案歐陽史作甲子如洛京庚午至自汴州薛史作西京蓋其時未改永平軍為西京故尚仍梁制稱洛陽為西京也又通鑑考異云諸書但謂之洛京未嘗詔改西京為洛京至同光三年始詔依舊以洛京為東都或者以永平為西京時即改梁西京為洛京而史脫其文也歐陽史于元年冬即書洛京未審所據舊五代史考異是日有司自石橋具儀仗法物迎引入于大內辛未以百官初到放三日朝參壬申以租庸使刑部侍郎太清宮副使張憲為檢校吏部尚書充北京副留守知留守事太原尹詔改取來年二月一日行郊禮戊寅詔德勝寨莘縣楊劉口楊劉原本作柳劉今據文改正影庫本粘籤通津鎮胡柳陂皆戰陣之所宜令逐處差人收掩戰士骸骨量備祭奠以慰勞魂詔改偽梁永平軍大安府復為西京京兆府案歐陽史作十一月辛酉復永平軍為西都與薛史日月互異舊五代史考異改宋州宣武軍為歸德軍汴州開封府復為宣武軍華州感化軍為鎮國軍許州匡國軍復為忠武軍滑州宣義軍復為義成軍陝府鎮國軍復為保義軍耀州靜勝軍復為順義軍潞州匡義軍復為安義軍朗州武順軍復為武貞軍延州為彰武軍鄧州為威勝軍晉州為建雄軍安州為安遠軍淮南楊溥遣使賀登極稱大吳國主書上大唐皇帝十國春秋吳世家云唐以滅梁來告始稱詔我國不受唐主隨易書用敵國禮曰大唐皇帝致書于吳國主王遣司農卿盧蘋獻金器二百兩銀器三千兩羅錦一千二百疋龍腦香五斤龍鳳絲㙐一百事于唐又遣使張景報聘稱大吳國主上書大唐皇帝辭禮如牋表殿本己卯禁屠牛馬庚辰御史臺上言請行用本朝律令格式今訪聞唯定州有本朝法書望下本州寫副本進納從之辛巳詔貶安義軍節度使李繼韜為登州長史尋斬於天津橋下再謀叛故也甲申淮南楊溥奚首領李紹威並遣使朝貢乙酉以翰林學士承旨盧質權知汴州軍府事以禮部尚書崔沂為尚書左丞崔沂原本作崔忻今據薛史列傳改正影庫本粘籤判吏部尚書銓事以兵部侍郎崔協為吏部侍郎以刑部侍郎充集賢殿學士判院事盧文紀為尚書兵部侍郎依前充集賢殿學士判院事丁亥澤州刺史董璋上言潞州軍變李繼達領兵出城自刎而死節度副使李繼珂已安撫軍城己丑有司上言上辛祈穀於上帝請奉高祖神堯皇帝配孟夏雩祀請奉太宗文皇帝配季秋大享於明堂請奉太祖武皇帝配冬至日祀圜丘請奉獻祖文皇帝配孟冬祭神州地祇請奉懿祖昭聖皇帝配從之辛卯亳州太清宮道士上言聖祖玄元皇帝殿前枯檜再生一枝圖畫以進詔曰當聖祖舊殿生枯檜新枝應皇家再造之期顯大國中興之運同上林仆柳祥既叶於漢宣比南頓嘉禾瑞更超於光武宜標史冊以示寰瀛云案五代會要云唐高祖神堯皇帝武德二年枯檜重華至安祿山僭號萎瘁玄宗自蜀歸京枝葉復盛至是再生一枝長二尺餘蓋一時誇詡之言也壬辰幸伊闕己巳以中書舍人崔居儉為刑部侍郎充史館修撰判館事甲午以租庸副使光祿大夫檢校司徒守衞尉卿孔謙為鹽鐵轉運副使永樂大典卷七千一百五十六, WYG: 