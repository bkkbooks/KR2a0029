  - {type: variant, offset: 38, length: 2, content: 尤鍾, krp: 自率軍三萬至臨洺葛従周設伏于青山口嗣昭聞梁祖至歛軍而退従周伏兵發爲其所敗偏将王郃郎楊師悦等被擒十月汴人大冠鎮定王郜告急於武皇乃遣嗣昭出師下太行擊懐孟汴將侯信守河陽不意嗣昭之師至既無守備驅市人登城嗣昭攻其北門破其外垣俄而汴将閻寶救軍至乃退天復元年河中王珂為汴人所擄河中晉絳諸郡皆陷四月汾州刺史李瑭謀叛納欵于汴嗣昭討之三日而拔斬瑭是月汴人初得蒲絳乃大舉諸道之師來逼太原汴将葛従周陷承天軍氏叔琮營洞渦驛太原四面汴軍雲合武皇憂迫計無従出嗣昭朝夕選精騎分出諸門掩擊汴營左俘右斬或燔或擊汴軍疲於奔命又屬霖雨軍多足腫腹疾糧運不繼五月氏叔琮引退嗣昭以精騎追之汴軍委棄輜重兵仗萬計六月嗣昭出師隂地攻慈隰降其刺史唐禮張瓌是時天子在鳯翔汴人攻圍有密詔徴兵十一月嗣昭出師晉絳屯吉上堡遇汴將王友通于平陽一戰擒之明年正月嗣昭進兵蒲縣十八日汴將朱友寧氏叔琮將兵十萬來拒二十八日梁祖自率大軍至平陽嗣昭之師大恐三月十一日有白虹貫周徳威之營候者云不利宜班師翼日氏叔琮犯徳威之營汴軍十餘萬列陣四合徳威嗣昭血戰解之乃保軍而退汴軍因乘之時諸将潰散無復部伍徳威引騎軍循西山而遁朱友寧乘勝陷慈隰汾等州武皇聞其敗也遣李存信率牙兵至清源應接復為汴軍所擊汴軍營于晉祠嗣昭徳威收合餘衆登城拒守汴人治攻具于西北隅四面營栅相望時鎮州河中皆為梁有孤城無援師旅敗亡武皇晝夜登城憂不遑食召諸将欲出保雲州嗣昭曰王勿為此謀兒等茍存必能城守李存信曰事勢危急不如且入北蕃别圖進取朱温兵師百萬天下無敵關東河北受他指揮今獨守危城兵亡地蹙儻彼築室反耕環塹深固則亡無日矣武皇将従之嗣昭亟爭不可猶豫未決賴劉太妃極言扵内武皇且止數日亡散之衆復集嗣昭晝夜分兵四出斬将搴旗汴軍保守不暇二十一日朱友寧燒營退去嗣昭追擊復收汾慈隰等州五月雲州都将王敬暉據城叛振武石善友亦為部将契苾讓所逐嗣昭皆討平之天祐三年汴人攻滄景劉仁恭遣使求援十一月嗣昭合燕軍三萬進攻潞州降丁㑹武皇乃以嗣昭為昭義節度使始嗣昭未到之前上黨有占者見一人家舍上常有氣如車盖視之但一貧媪而已占者謂媪有子乎曰有見爲車士出戌于外占者心異之以爲其子将來有土地之兆也未㡬丁㑹既降嗣昭領兵入潞以媪家四面空缺乃駐于是舍丁㑹既歸太原武皇遣使命嗣昭為帥乃自媪舍而入理所其氣尋息聞者異之四年六月汴将李思安将兵十萬攻潞州乃築夾城深溝髙壘内外重複飛走路絶嗣昭撫循士衆登城拒守梁祖馳書説誘百端嗣昭焚其僞詔斬其使者城中固守經年軍民乏絶感鹽炭自生以濟貧民嗣昭嘗享諸将登城張樂賊矢中嗣昭足密拔之坐客不之覺酣飲如故以安衆心五年五月莊宗敗汴軍破夾城嗣昭知武皇棄世哀慟㡬絶時大兵攻圍歴年城中士民飢死大半鄽里蕭條嗣昭緩法寛租勸農務穡一二年間軍城完集三面鄰于敵境冦鈔縦横設法枝梧邊鄙不聳胡栁之戰周徳威戰沒師無行列至晚方集汴人四五萬登無石山我軍形于懼色或請收軍保營詰旦復戰嗣昭曰賊無營壘去臨濮地逺日已晡晚皆有歸心但以精騎逗撓無令返斾晡後追擊破之必矣我若收軍拔寨賊人入臨濮俟彼整齊復來即勝負未決莊宗曰非兄言㡬敗吾事軍校王建及又陳方畧嗣昭與建及分兵于土山南北為犄角汴軍懼下山因縦軍擊之俘斬三萬級由是莊宗之軍復振十六年嗣昭代周徳威權幽州軍府事九月以李紹宏代嗣昭出薊門百姓號泣請留截鞍惜别嗣昭夜遁而歸十七年六月嗣昭自得勝歸藩莊宗帳餞于戚城莊宗酒酣泣而言曰河朔生靈十年饋輓引領鶴望俟破汴軍今兵賦不充冦孽猶在坐食軍賦有愧蒸民嗣昭曰臣忝急難之地每一念此寢不安席大王且持重謹守急養士民臣歸本藩簡料兵賦歲末春首即舉衆復來莊宗離席拜送如家人禮是月汴将劉鄩攻同州朱友謙告急嗣昭與李存審援之九月破汴軍于溤翊乃班師十九年莊宗親征張文禮于鎮州冬契丹三十萬奄至嗣昭従莊宗擊之敵騎圍之數十重良久不解嗣昭號泣赴之引三百騎横擊重圍馳突出没者數十合契丹退翼莊宗而還是時閻寶為鎮人所敗退保趙州莊宗命嗣昭代寶攻真定七月二十四日王處球之兵出自九門嗣昭設伏于故營賊至伏發擊之殆盡餘三人匿于墻墟間嗣昭環馬而射之為賊矢中腦嗣昭箙中矢盡拔賊矢於腦射賊一發而殪之嗣昭日暮還營所傷血流不止是夜卒嗣昭節制澤潞官自司徒太保至侍中中書令莊宗即位贈太師隴西郡王長興中詔配饗莊宗廟庭嗣昭有子七人長曰繼儔澤州刺史次繼韜繼忠繼能繼襲繼逺皆夫人楊氏所生楊氏治家善積聚設法販鬻致家財百萬繼韜小字留得少驕獪無賴嗣昭既卒莊宗詔諸子扶喪歸太原縗事諸子違詔以父牙兵數千擁喪歸潞莊宗令李存渥馳騎追諭兄弟俱忿欲害存渥存渥遁而獲免繼韜兄繼儔嗣昭長嫡也當襲父爵然柔而不武方在苫廬繼韜詐令三軍刼已為留後囚繼儔于别室以事奏聞莊宗不得已命為安義軍兵馬留後時軍前糧餉不充租庸計度請潞州轉米五萬貯于相州繼韜辭以經費不足請轉三萬有幕客魏琢牙将申䝉者因入奏公事每摭隂事報繼韜云朝廷無人終為河南吞噬止遲速間耳由是隂謀叛計内官張居翰時為昭義監軍莊宗将即位詔赴鄴都潞州節度判官任圜時在鎮州亦奉詔赴鄴魏琢申䝉謂繼韜曰國家急召此二人情可知矣弟繼逺年十五六謂繼韜曰兄有家財百萬倉儲十年宜自為謀莫受人所制繼韜曰定哥以為何如曰申䝉之言是也河北不勝河南不如與大梁通盟國家方事之殷焉能討我無如此算乃令繼逺将百餘騎詐云于晉絳擒生遂至汴梁主見之喜因令董璋将兵應接營於潞州之南加繼韜同平章事改昭義軍為匡義軍繼韜令其}
  - {type: punctuation, offset: 41, content: ．, id: KR2a0029_ZHSJ_105-bkkpn6}
  - {type: 'tls:seg', offset: 41, content: '', id: KR2a0029_ZHSJ_105-d105p2s7}
  - {type: variant, offset: 41, length: 0, content: '', WYG: 子二人入質於汴及莊宗平河南繼韜惶恐計無所出将脱身于契丹㑹有詔赦之乃齎銀數十萬兩隨其母楊氏詣闕冀以賂免将行其弟繼逺曰兄徃與不徃利害一也以反為名何面更見天下不如深溝峻壁坐食積粟尚可茍延嵗月徃則亡無日矣或曰君先世有大功於國主上季父也𢎞農夫人無恙保獲萬全及繼韜至厚賂宦官伶人言事者翕然稱留後本無惡意姦人惑之故也嗣昭親賢不可無嗣楊夫人亦于宫中哀祈劉皇后后每于莊宗前泣言先人之功以動聖情由是原之}
