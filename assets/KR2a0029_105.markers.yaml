  - {type: variant, offset: 428, length: 2, content: 國初, WYG: 九年周徳威討劉守光嗣本率代北諸軍生熟吐渾收山後八軍得納降軍使盧文進武州刺史髙行珪以獻幽州平論功授振武節度使號威信可汗十二年莊宗定魏博劉鄩據莘縣命嗣本入太原巡守都城十三年従破劉鄩於故元城收洺慈衞三郡六月還鎮振武八月契丹按巴堅傾塞犯邊其衆三十萬攻振武嗣本嬰城拒戰者累日契丹}
