  - {type: variant, offset: 41, length: 0, content: '', krp: 子二人入質於汴及莊宗平河南繼韜惶恐計無所出将脱身于契丹㑹有詔赦之乃齎銀數十萬兩隨其母楊氏詣闕冀以賂免将行其弟繼逺曰兄徃與不徃利害一也以反為名何面更見天下不如深溝峻壁坐食積粟尚可茍延嵗月徃則亡無日矣或曰君先世有大功於國主上季父也𢎞農夫人無恙保獲萬全及繼韜至厚賂宦官伶人言事者翕然稱留後本無惡意姦人惑之故也嗣昭親賢不可無嗣楊夫人亦于宫中哀祈劉皇后后每于莊宗前泣言先人之功以動聖情由是原之}
  - {type: variant, offset: 42, length: 3, content: 晉累官, WYG: 京月餘屢従畋遊寵待如故李存渥深訶詆之繼韜心不自安復賂伶閹求歸本鎮莊宗不聼繼韜潛令紀綱書諭繼逺欲軍城更變望天子遣已安撫事泄斬于天津橋南二子齠年質于汴莊宗收城得之撫其臂曰爾幼如是猶知能佐父造反長復何為}
