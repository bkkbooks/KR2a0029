  - {type: variant, offset: 1257, length: 640, content: 高祖愛之以為己子乾祐元年拜武寧軍節度使二年加同平章事郭威既敗慕容彥超于北郊隱帝遇弒威入京師謂諸大臣密相推戴及見宰相馮道等道殊無意威不得已見道下拜而道猶受拜如平時徐勞之曰公行良苦威意色皆沮以為大臣未有推己意又難于自立因與王峻入白太后推擇漢嗣羣臣乃共奏曰武寧節度使贇高祖愛以為子宜立為嗣乃遣太師馮道率百官往迎道揣威意不在贇直前問曰公此舉由衷乎威指天為誓道既行語左右曰吾生平不作謬語人今謬語矣道見贇傳太后意召之贇行至宋州威已自澶州為兵士擁還京師王峻慮贇左右生變遣侍衞馬軍指揮使郭崇威以兵七百騎衞贇崇威至宋州贇登樓問崇威所以來之意崇威曰澶州軍變懼未察之遣崇威護衞非惡意也贇召崇威崇威不敢進馮道出與崇威語崇威乃登樓見贇時護聖指揮使張令超帥步兵為贇宿衞判官董裔說贇曰觀崇威瞻視舉措必有異謀道路皆言郭威已為天子而陛下深入不止禍其至哉請急召令超諭以禍褔使夜以兵劫崇威所屬士卒明日掠睢陽金帛募士卒北走太原彼新定京邑未暇追我此策之上也贇猶豫未決是夕崇威密誘令超歸郭氏盡奪贇部下兵郭威以書召道先歸留其副趙上交王度奉贇入朝太后道乃辭贇先還贇謂道曰寡人此來所恃者以公三十年舊相是以不疑道默然贇客將賈貞等數目道欲圖之贇曰勿草草事豈出于公耶道已去崇威乃幽贇于外館殺賈貞董裔及牙內都虞候劉褔孔目官夏昭度等郭威已監國太后乃下詔曰比者樞密使威志安宗社議立長君以徐州節度使贇高祖親近立為漢嗣乃自藩鎮召赴京師雖誥命已行而軍情不附天道在北人心靡東適當改卜之初俾應分土之命贇可降授開府儀同三司檢校太師上柱國封湘陰公贇卒以殺死, WYG: ''}
