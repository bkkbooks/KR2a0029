  - {type: variant, offset: 42, length: 3, content: 晉累官, krp: 京月餘屢従畋遊寵待如故李存渥深訶詆之繼韜心不自安復賂伶閹求歸本鎮莊宗不聼繼韜潛令紀綱書諭繼逺欲軍城更變望天子遣已安撫事泄斬于天津橋南二子齠年質于汴莊宗收城得之撫其臂曰爾幼如是猶知能佐父造反長復何為}
  - {type: substitution, offset: 43, original: 累, replacement: 纍, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20807}}
  - {type: variant, offset: 46, length: 0, content: '', WYG: 是亦誅乃遣使徃潞州斬繼逺函首赴闕命繼儔權知軍州事繼達充軍城巡檢未㡬詔繼儔赴闕時繼儔以繼韜所畜婢僕玩好之類悉為己有每日料選算校不時上路繼達怒謂人曰吾仲兄被罪父子誅死大兄不仁略無動懐而便烝淫妻妾詰責貨財慙恥見人生不如死繼達服縗麻引數百騎坐于㦸門呼曰為我反乎即令人斬繼儔首投於㦸門之内副使李繼珂聞其亂也募市人千餘攻其城門繼達登城樓知事不濟啟子城東門至其第盡殺其孥得百餘騎出潞城門将奔契丹行不十里麾下奔潰自剄于路隅天成初繼能為相州刺史母楊氏卒於太原繼能繼襲奔喪行服繼能笞掠母主藏婢責金銀數因笞至死家人告變言衆甲為亂繼能繼襲皆伏誅嗣昭諸子自相屠害㡬于溘盡惟繼忠一人僅保其首領焉裴約潞州之舊将也初事李嗣昭為親信及繼韜之叛約方戌潞州因召民泣而諭之曰余事故使已餘二紀每見分財享士志在平讎不幸薨沒令郎君父喪未𦵏即背君親余可倳刃自殺不能送死與人衆皆感泣繼而梁以董璋為澤州刺史率衆攻城約拒久之告急于莊宗莊宗知其忠懇謂諸將曰朕于繼韜何薄于裴約何厚裴約能分順逆不附賊黨先兄一何不幸生此鴟梟乃顧李紹斌曰爾識機便為我取裴約來朕不藉澤州彈丸之地即遣紹斌率五千騎以赴之紹斌自遼州進軍未至城己陷約被害時同光元年六月也帝聞之嗟痛不已李嗣本鴈門人本姓張父準銅冶鎮将嗣本少事武皇為帳中紀綱漸立戰功得補軍校乾寧中従征李匡儔為前鋒與燕人戰得居庸闗以功為義兒軍使因賜姓名従討王行瑜授檢校刑部尚書改威逺寧塞等軍使五年討羅𢎞信于魏州嗣本為前鋒師還改馬軍都将従李嗣昭討王暉于雲州論功加}
