  - {type: variant, offset: 33, length: 4, content: 美姿儀高, WYG: 棄城遁去我復取潞州光化三年汴人攻滄州劉仁恭求救遣嗣昭出師邢洺以應之嗣昭遇汴軍于沙河擊敗之獲其將胡禮進攻洺州下之獲其郡将朱紹宗九月梁}
