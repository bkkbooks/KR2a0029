  - {type: variant, offset: 31, length: 1, content: 溫, WYG: 事克柔頗謹愿雖形貌眇小而精悍有膽畧沈毅不羣初嗜酒好樂武皇微伸儆戒乃終身不飲少従征伐精練軍機乾寧初王珂王珙爭帥河中珙引陜州之軍攻珂珂求救於武皇乃令嗣昭将兵援之敗珙軍于猗氏獲賊将李璠等四年改衙内都將復援河中敗汴軍於胡壁堡擒汴將滑禮以功加檢校僕射及王珂請婚武皇武皇以女妻之珂赴禮於太原以嗣昭權典河中留後事李罕之之襲我潞州也嗣昭率師攻潞州與汴將丁㑹戰于含口俘獲三千執其將蔡延恭代李君慶為蕃漢馬步行營都將進攻潞州遣李存質李嗣本以兵扼天井關汴將澤州刺史劉屺棄城而遁乃以李存璋為刺史梁祖聞嗣昭之師大至召葛従周謂曰並人若在髙平當圍而取之先須野戰勿以路州為敵及聞嗣昭軍韓店梁祖曰進通扼八議路此賊決于我鬭公等臨事制機勿落姦便賀徳倫閉壁不出嗣昭日以鐡騎環城汴人不敢芻牧援路斷絶八月徳倫張歸}
  - {type: page-break, offset: 31, content: '', id: KR2a0029_WYG_105-1b, image: WYG0277/WYG0277-0443d.png}
  - {type: page-break, offset: 31, content: '', id: KR2a0029_WYG_105-2a, image: WYG0277/WYG0277-0444a.png}
