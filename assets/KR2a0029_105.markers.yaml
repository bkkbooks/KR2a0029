  - {type: variant, offset: 484, length: 450, content: 奉辭雨泣而去隱帝即位加檢校太師關輔賊平就加侍中信性昏懦黷貨無厭喜行酷法掌禁軍時左右有犯罪者召其妻子對之臠割令自食其肉或從足支解至首血流盈前而命樂對酒無仁愍之色未嘗接延賓客在鎮日聚斂無度會高祖山陵梓宮經由境上信率掠吏民以備迎奉百姓苦之初聞殺楊邠史弘肇遽啟宴席集參佐賓幕令相致賀曰我謂天無眼令我三年不能適意主上孤立幾落賊手諸公勸我一杯可也俄蕭牆之變憂不能食尋有太后令言立湘陰公即令其子往徐州奉迎數日陳思讓率馬軍經過城西但令供頓不敢出城未幾澶州軍變王峻遣前申州刺史馬鐸領軍赴州巡檢鐸引軍入城信惶惑自殺廣順初追封蔡王永樂大典卷六千七百六十湘陰公贇為徐州節度使乾祐元年八月中有雲見五色冊府元龜卷九百五十一明年冬杪有鳥翔集於鮮碧堂庭樹黃質朱喙金目青翼紺趾玄尾有類於鳳有賓佐嘆曰野鳥入室主人將去旬浹而不知所之永樂大典卷一萬一千四百八十五乾祐三年冬十一月周太祖駐軍於京師議立嗣君奉太后誥立贇為嗣傳誥之際馮道笏墜於地左右惡之永樂大典卷一萬七千三百一十一馮道至贇出郊迎常所乘馬比甚馴服至是馬蹄囓奔逸人不可制乃以他馬代之時, WYG: ''}
