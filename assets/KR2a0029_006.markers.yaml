  - {type: variant, offset: 3449, length: 1135, content: 百五先鋒將黃文靖伏誅通鑑注引薛史己未帝御朝元門以回鶻吐蕃二大國首領入覲故也案己未歐陽史作乙未舊五代史考異癸亥令諸軍指揮使及四蕃將軍賜食於行宮之外廡冊府元龜卷一百九十七戊辰幸邑西之白龍潭以觀魚焉既而漁人獲巨魚以獻帝命放之中流從臣以帝有仁惻之心皆相顧欣然是日名其潭曰萬歲潭永樂大典卷一千六百十二丙子帝御城東教場閱兵諸軍都指揮北面招討使太尉楊師厚總領鐵馬步甲十萬廣亘十數里陳焉士卒之雄銳部隊之嚴肅旌旗之雜戈甲之照耀屹若山岳勢動天地帝甚悅焉即命丞相洎文武從臣列侍賜食逮晚方歸冊府元龜卷二百十四十一月辛巳朔上駐蹕魏縣從官自丞相而下並詣行宮起居留都文武百官及諸道節度使防禦使刺史諸藩府留後各奉表起居壬午帝以邊事稍息宣命還京師案通鑑帝以夾寨柏鄉屢失利故力疾北巡思一雪其恥意鬱鬱多躁忿功臣宿將往往以小過被誅衆心益懼既而晉趙兵不出十一月壬午帝南還舊五代史考異車駕發自行闕夕次洹水縣癸未至內黃縣甲申至黎陽縣乙酉命從官丞相而下宴於行次丁亥次衞州戊子晨次新鄉夕止獲嘉己丑次武陟庚寅次溫縣冊府元龜卷二百五延州節度使高萬興奏當軍都指揮使高萬金統領兵士今月五日收鹽州偽刺史高行存泥首來降丞相及文武百官各上表稱賀冊府元龜卷四百三十五辛卯次孟州命散騎常侍孫騭右諫議大夫張衍光祿卿李翼各齎香合祝版告祭於孟津之望祠冊府元龜卷一百九十三留都文武官左僕射楊涉洎孟州守李周彝等皆匍匐東郊迎拜其文武官並令先還壬辰詰旦離孟州晚至都冊府元龜卷二百五宣宰臣各赴望祠禱雨望祠原本作望詞今據文改正影庫本粘籤故事皆以兩省無功職事為之帝憂民重農尤以足食足兵為念爰自御極每愆陽積陰多命丞相躬其事辛丑大雨雪宰臣及文武師長各奉表賀焉十二月詔以時雪稍愆命丞相及三省官各詣望祠祈禱永樂大典卷二千六百三十二癸酉臘假詔諸王與河南尹左右金吾六統軍等較獵於近苑冊府元龜卷二百五命大理卿王鄯使於安南左散騎常侍吳藹使於朗州皆以旌節官誥錫之也又命將作少監姜宏道為朗州旌節官告使副冊府元龜卷二百十三案五代會要舊制巡撫黜陟冊命弔贈入蕃等使選朝臣為之其宣慰加官送旌節即以中官為之今以三品送旌節新例也舊五代史考異延州節度使高萬興奏領軍於邠州界蒿子谷韋家寨殺戮寧慶兩州賊軍約二千餘人並生擒都頭指揮使及奪馬器甲等事其入奏軍將使宣召赴內殿賜對以銀器綵物錫之宰臣及文武官各奉表賀是月魏博節度上言於涇縣北戮殺鎮州王鎔兵士七千餘人奪馬二千餘匹戈甲未知其數幷擒都將以下四十餘人冊府元龜卷四百三十五兩浙進大方茶二萬斤琢畫宮衣五百副廣州貢犀象奇珍及金銀等其估數千萬安南兩使留後曲美案通鑑十二月戊午以靜海留後曲美為節度使舊五代史考異進筒中蕉五百匹龍腦鬱金各五瓶他海貨等有差又進南蠻通好金器六物銀器十二幷乾綾花繓越等雜織奇巧者各三十件福建進戶部所支榷課葛三萬五千匹冊府元龜卷一百九十七, WYG: 攷證}
