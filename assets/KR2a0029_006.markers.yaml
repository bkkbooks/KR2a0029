  - {type: variant, offset: 756, length: 595, content: 畿內如宋滑制冊府元龜卷一百九十五乾化元年正月丙戌朔日有蝕之帝素服避殿百官守司以恭天事明復而止永樂大典卷二千六百三十二制曰兩漢以來日蝕地震百官各上封事指陳得失蓋欲周知時病盡達物情用緝國章以奉天誡朕每思逆耳罔忌觸鱗將洽政經庶開言路况茲謫見當有咎徵其在列辟羣臣危言正諫極萬邦之利害致六合之殷昌毗予一人永建皇極永樂大典卷一萬六千三百七十八二日日旁有祲氣向背若環耳案原本訛環爾今據五代會要改正舊五代史考異崇政使敬翔望之曰兵可憂矣帝為之旰食是日果為晉軍及鎮定之師所敗都將十餘人被擒餘衆奔潰永樂大典卷九千三百二十四庚寅制曰扈氏不恭固難去戰鬼方未服尚或勞師其蟻聚餘妖狐鳴醜類棄天常而拒命據地險以偷生言事討除將期戡定問罪止誅於元惡挺災可憫於遺黎每念傷痍良深愧歎應天兵所至之地宜令將帥節級嚴戒軍伍不得焚燒廬舍開發丘壠毀廢農桑驅掠士女使其背叛之俗知予弔伐之心又制曰戎機方切國用未殷養兵須藉於賦租稅粟尚煩於力役所在長吏不得因緣徵發自務貪求苟有故違必行重典立法垂制詳刑定科傳之無窮守而勿失中書門下所奏新定格式律令已頒下中外各委所在長吏切務遵行盡革煩苛皆除枉濫用副哀矜之旨無違欽恤之言冊府元龜卷一百九十一詔徵陝州鎮國軍節度使楊師厚至京見於崇勳殿帝指授方略依前充北面都招討使恩賚甚厚使督軍進發冊府元龜卷一百九十九案五代春秋二月晉師侵魏州楊師厚帥師援邢州晉人還師二月丙辰朔帝御文明殿羣臣入閣冊府元龜卷一百九十七以蔡州順化軍, WYG: ''}
