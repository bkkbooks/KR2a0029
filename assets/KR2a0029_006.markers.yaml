  - {type: variant, offset: 1354, length: 109, content: 王存儼權知軍州事蔡人久習叛逆刺史張慎思又裒斂無狀帝追慎思至京而久未命代右廂指揮使劉行琮乘虛作亂行琮原本作行踪今據通鑑改正影庫本粘籤因縱火驅擁為渡淮計存儼誅行琮而撫遏其衆都將鄭遵與其下奉存儼為主而以衆情馳奏時東京留守博王, WYG: 朱}
