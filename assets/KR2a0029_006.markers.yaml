  - {type: variant, offset: 1464, length: 1080, content: 文不先請遂討其亂兵至鄢陵上聞之曰誅行琮功也然存儼方懼若臨之以兵蔡必速飛矣遂馳使還軍而擢授存儼蔡人安之冊府元龜卷二百十四壬戌詔曰東京舊邦久不巡幸宜以今月九日幸東都扈從文武官委中書門下量閑劇處分宰臣上言曰龍興天府久望法駕但陛下始康愈未宜涉寒願少留清蹕從之案五代會要二月敕食人之食者憂人之事况丞相尊位參決大政而堂封未給且無餐錢朕甚愧之宜令日食萬錢之半舊五代史考異甲子幸曜村民舍閱農事庚午幸白馬坡冊府元龜卷二百五詔金吾大將軍待制官各奏事冊府元龜卷一百九十一武安軍節度使馬殷進呈虔州刺史盧延昌牋表虔州本支郡也兵甚銳自得韶州益強大升為百勝軍使始洪州之陷盧光稠願收復使府立功自效上因兼授江西觀察留後光稠卒復命延昌領州事方伯亦頗慰薦楊渭遣人偽署爵秩延昌佯受官牒禮遣其使因湖南自表其事曰郡小寇迫欲緩其奸謀且開導貢路非敢貳也以其偽制來自陳案原本偽訛為今改正舊五代史考異上覽奏曰我方有北事不可不甚加撫卹尋兼授鎮南將軍節度使觀察留後命使慰勞冊府元龜卷二百十五案九國志盧延昌歸命于吳偽乞命于梁舊五代史考異三月辛卯以久旱令宰臣分禱靈迹翌日大澍雨永樂大典卷一千五百二十一丙申幸甘水亭召宰臣翰林學士尚書侍郎孔續已下八人扈從宴樂甚歡戊戌幸右龍虎軍召文武官四品已上宴於新殿甲辰幸左龍虎軍新殿宴文武官四品已上四月丁卯幸龍虎門召宰臣學士金吾上將軍大將軍侍宴廣化寺丁丑幸宣威殿宴文武官四品已上及軍使蕃客己卯又幸左龍虎軍宴羣臣冊府元龜卷一百九十七詔曰邠岐未滅關隴多虞宜擇親賢總茲戎任應關西同雍華鄜延夏等六道兵馬幷委冀王收管指揮凡有抽差先申西面都招討使仍別奏聞庶合機權以寧邊鄙冊府元龜卷二百六十九五月甲申朔帝被冕旒御朝元殿視朝仗衞如式制改開平五年為乾化元年大赦天下永樂大典卷五千一百四十九詔方伯州牧近未加恩者幷遷爵秩復大賚軍旅普宴於宣威殿賜帛各有差冊府元龜卷一百九十七制封延州節度使高萬興為渤海郡王冊府元龜卷一百九十六諸道節度使錢鏐張宗奭馬殷王審知劉隱各賜一子六品正員官高季昌賜一子八品正員官賀德倫賜一子九品正員官冊府元龜卷二百一十癸巳觀稼於伊水登建春門幸會節坊張宗奭私第臨亭皐視物色賞賜甚厚冊府元龜卷二百五詔左右銀臺門朝參諸司使庫使已下不得帶從人入城親王許一二人執條床手簡餘悉止門外闌入者抵律閽守不禁與所犯同先時門通內無門籍且多勳戚車騎衆者尤不敢呵察至是有以客星凌犯上言者遂令止隔冊府元龜卷一百九十一清海軍節度使守侍中兼中書令劉隱薨案劉隱卒五代會要五代春秋俱作五月惟通鑑作三月與薛史異舊五代史考異輟朝三日百僚詣閤門奉慰六月乙卯命北面都招討使鎮國軍節度使楊師厚出屯邢洺丁巳鎮定鈔我湯陰案原本作蕩陰今從通鑑及, WYG: 諒友諒}
