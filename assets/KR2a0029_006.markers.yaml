  - {type: variant, offset: 2582, length: 229, content: 用遣將徂征為人除害但初頒赦令不欲食言宥而伐之諒非獲已況聞謀始不自帥臣致此厲階並由姦佞密通人使潛結沙既懼罪誅乃生離叛今雖行討伐已舉師徒亦開詔諭之門不阻歸降之路矧又王鎔處直未曾削爵除名若翻然改圖不遠而復必仍舊貫當保前功如有率衆向明拔州效順亦行殊賞冀狥來情免令受獘於疲民用示惟新於污俗宜令行營都招討使及陳暉軍前准此敕文散加招諭將安衆懼特舉明恩鎮州只罪李弘規一人其餘一切不問冊府元龜卷二百十五詔修天宮佛寺又湖南奏潭州僧法思桂州僧歸真並乞賜紫衣從之冊府元龜卷一百九十四, WYG: 書作}
