  - {type: variant, offset: 2460, length: 1265, content: 考異責以背父之罪令左右臠割而死己丑斬張彥澤於市以其剽劫京城恣行屠害也案遼史云以張彥澤擅徙重貴開封殺桑維翰縱兵大掠不道斬于市舊五代史考異庚寅洛京留守景延廣自扼吭而死辛卯契丹制降帝為光祿大夫案遼史避諱作崇祿舊五代史考異檢校太尉封負義侯黃龍府安置其地在渤海國界癸巳遷帝於封禪寺遣蕃大將崔廷勳將兵守之癸卯帝與皇太后李氏皇太妃安氏皇后馮氏皇弟重睿皇子延煦延寶俱北行以宮嬪五十人內官三十人案遼史作內官三人舊五代史考異東西班五十人醫官一人控鶴官四人御廚七人茶酒三人儀鸞司三人軍健二十人從行案遼史作健卒十人舊五代史考異宰臣趙瑩樞密使馮玉侍衞馬軍都指揮使李彥韜隨帝入蕃契丹主遣三百騎援送而去所經州郡長吏迎奉皆為契丹主阻絕案宋史李穀傳少帝蒙塵而北舊臣無敢候謁者穀獨拜迎于路君臣相對泣下穀曰臣無狀負陛下因傾囊以獻舊五代史考異有所供饋亦不通嘗一日帝與太后不能得食乃殺畜而啖之帝過中渡橋閱杜重威營寨之迹慨然憤歎謂左右曰我家何負為此賊所破天乎天乎於是號慟而去至幽州傾城士庶迎看於路案宣政雜錄云徽宗北狩經薊縣梁魚務有還鄉橋石少帝所命名也里人至今呼之舊五代史考異見帝慘沮無不嗟嘆駐留旬餘州將承契丹命犒帝於府署趙延壽母以食饌來獻自范陽行數十程過薊州平州至榆關沙塞之地略無供給每至宿頓無非路次一行乏食宮女從官但採木實野蔬以救飢弊又行七八日至錦州契丹迫帝與妃后往拜阿保機遺像帝不勝屈辱泣曰薛超誤我不令我死以至今日也又行數十程渡遼水至黃龍府此即戎王所命安置之地也六月契丹國母召帝一行往懷密州州在黃龍府西北千餘里行至遼陽皇后馮氏以帝陷蕃過受艱苦令內官潛求毒藥將自飲之幷以進帝不果而止又行二百里會國母為永康王所執永康王請帝却往遼陽城駐泊帝遣使奉表於永康且賀克捷自是帝一行稍得供給漢乾祐元年四月永康王至遼陽帝與太后並詣帳中帝御白衣紗帽永康止之以常服謁見帝伏地雨泣自陳過咎永康使左右扶帝上殿慰勞久之因命設樂行酒從容而罷永康帳下從官及教坊內人望見故主不勝悲咽內人皆以衣帛藥餌獻遺於帝及永康發離遼陽取內官十五人東西班十五人及皇子延煦並令隨帳上陘陘即蕃王避暑之地也有禪奴舍利者即永康之妻兄也知帝有小公主在室詣帝求之帝辭以年幼不可又有東西班數輩善於歌唱禪奴又請之帝乃與之後數日永康王馳取帝幼女而去以賜禪奴至八月永康王下陘太后馳至霸州詣永康求於漢兒城寨側近賜養種之地永康許諾令太后於建州住泊漢乾祐二年二月帝自遼陽城發赴建州行至中路太妃安氏得疾而薨乃焚之載其燼骨而行帝自遼陽行十數日過儀州灞州遂至建州節度使趙延暉盡禮奉迎館帝於衙署中其後割寨地五十餘頃其地至建州數十里帝乃令一行人員於寨地內築室分耕給食於帝是歲述律王子遣契丹數騎詣帝取內人趙氏聶氏疾馳而去趙聶者帝之寵姬也及其被奪不勝悲憤漢乾祐三年八月太后薨周顯德初有漢人自寨北而至者言帝與后及諸子俱無恙猶在建州案郡齋讀書志云晉朝陷蕃記范質撰質石晉末在翰林為出帝草降表知其事為詳記少帝初遷于黃龍府後居于建州凡十八年而卒案契丹丙午歲入汴順數至甲子歲為十八年實太祖乾德二年也舊五代史考異其隨從職官役使人輩自蕃中亡歸物故者大半矣永樂大典卷一萬五千六百, WYG: 巻}
