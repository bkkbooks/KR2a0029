  - {type: 'tls:seg', offset: 767, content: '', id: KR2a0029_ZHSJ_085-d85p4s24}
  - {type: variant, offset: 769, length: 324, content: 奏聞之日為駐軍之日舊五代史考異庚申以前司農卿儲延英為太子賓客詔徐州符彥卿屯澶州辛酉詔澤潞鄴都邢洺河陽運糧赴中渡杜威遣人口奏軍前事宜勢迫故也壬戌又遣高行周屯澶州景延廣守河陽博野縣都監張鵬入奏蕃軍事勢丙寅定州李殷奏前月二十八日夜領捉生四百人往曲陽嘉山下逢賊軍車帳殺千餘人獲馬二百匹詔宋州高行周充北面行營都部署符彥卿充副邢州方太充都虞候領後軍駐於河上以備敵騎之奔衝也時契丹游騎涉滹水而南至欒城縣自是中渡寨為蕃軍隔絕探報不通朝廷大恐故委行周等繼領大師守扼津要且以張其勢也己巳邢州方太奏此月六日契丹與王師戰於中渡王師不利奉國都指揮使王清戰死案遼史云杜威張彥澤引兵據中渡橋趙延壽以步兵前擊高彥溫以騎兵乘之追奔逐北殭屍數萬斬其將王清宋彥筠墮水死重威等退保中渡寨義, WYG: 彰}
