  - {type: variant, offset: 38, length: 0, content: '', WYG: 詔曰故天䇿上將軍守太師尚書令楚國王馬殷品位俱高封崇已極無官可贈宜賜諡及神道碑文仍以王禮塟壬申契丹東丹王托雲自渤海國率衆到闕帝慰勞久之錫賚加等百寮稱賀丙子以沙州節度使曹義金兼中書令丁丑東丹王托雲進本國印三紐庚辰以靜江軍節度使馬賔卒廢朝贈尚書令丙戌荆南節度使髙從誨落起復加兼中書令二月已丑朔以宋州節度使趙延夀為左武衛上將軍充宣徽北院使癸巳詔貢院舊例夜試進士今後晝試排門齊入即日試畢丁酉幸至徳宫又幸安元信東丹王托雲之第辛丑以鴻臚卿致仕賈馥卒廢朝}
  - {type: page-break, offset: 38, content: '', id: KR2a0029_WYG_085-1b, image: WYG0277/WYG0277-0369b.png}
