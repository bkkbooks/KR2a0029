  - {type: variant, offset: 1795, length: 661, content: 天降鞠凶先君即世臣遵承遺旨纘紹前基諒闇之初荒迷失次凡有軍國重事皆委將相大臣至於擅繼宗祧既非稟命輕發文字輒敢抗尊自啟釁端果貽赫怒禍至神惑運盡天亡十萬師徒皆望風而束手億兆黎庶乘延頸以歸心臣負義包羞貪生忍恥自貽顛覆上累祖宗偷度朝昏苟存視息翁皇帝若惠顧疇昔稍霽雷霆未賜靈誅不絕先祀則百口荷更生之德一門銜無報之恩雖所愿焉非敢望也臣與太后幷妻馮氏及舉家戚屬見於郊野面縛俟罪次所有國寶一面金印三面今遣長子陝府節度使延煦次子曹州節度使延寶管押進納幷奉表請罪陳謝以聞甲戌張彥澤遷帝與太后及諸宮屬於開封府遣控鶴指揮使李榮將兵監守是夜開封尹桑維翰宣徽使孟承誨皆遇害帝以契丹主將至欲與太后出迎彥澤先表之稟契丹主之旨報云比欲許爾朝覲上國臣僚奏言豈有兩箇天子道路相見今賜所佩刀子以慰爾心己卯皇子延煦延寶自帳中迴得偽詔慰撫帝表謝之時契丹主以所送傳國寶製造非工與載籍所述者異使人來問帝進狀曰頃以偽主王從珂於洛京大內自焚之後其真傳國寶不知所在必是當時焚之先帝受命旋製此寶在位臣僚備知其事臣至今日敢有隱藏云時移內庫至府帝使人取帛數段主者不與謂使者曰此非我所有也又使人詣李崧求酒崧曰臣有酒非敢愛惜慮陛下杯酌之後憂躁所作別有不測之事臣以此不敢奉進丙戌晦百官宿封禪寺明年正月朔契丹主次東京城北百官列班遙辭帝于寺詣北郊以迎契丹主帝舉族出封丘門肩轝至野契丹主不與之見遣泊封禪寺文武百官素服紗帽迎謁契丹主於郊次俯伏俟罪契丹主命起之親自慰撫契丹主遂入大內至昏出宮是夜宿於赤堈偽詔應晉朝臣僚一切仍舊朝廷儀制並用漢禮戊子殺鄭州防禦使楊承勳案遼史云以其弟承信為平盧軍節度使襲父爵, WYG: 常令瞻給}
