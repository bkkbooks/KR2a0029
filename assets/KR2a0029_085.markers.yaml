  - {type: variant, offset: 74, length: 1, content: 祠, WYG: 兵部侍郎劉昫守本官充端明殿學士以左拾遺直樞密院李崧充樞密直學士壬申以左龍武統軍李承約為潞州節度使癸酉詔文武百官五日内殿起居仍舊其輸次轉對若有封事許非時上表朔望入閤待制候對一依舊制乙亥翰林學士工部侍郎竇夢徴卒丁丑以前西京副留守梁文矩為兵部尚書已卯詔不得薦銀青階為州縣官壬午詔應有朝臣藩侯郡守凡欲營𦵏未曽封贈許追封贈禮部尚書致仕李徳休卒九月丙戌以前兖州節度使符彦超為左龍武統軍已亥懐化軍節度使東丹慕華賜姓李名贊華改封隴西縣開國公應有先配諸軍契丹並賜姓名詔天下營田務只許耕無主荒田各召浮客不得留占屬縣編户辛丑樞密使檢校太傅刑部尚書范延光加同平章事使如故壬寅以中書舍人封翹為禮部侍郎禮部侍郎盧澹為户部侍郎癸卯許州節度使李從温移鎮河東詔天下州縣官不得與部内富民于公㕔同坐辛亥詔五坊見在鷹隼之類並可就山林解放今後不許進獻冬十月戊午以前北京留守太原尹馮贇為許州節度使辛酉左補闕李詳上疏以北京地震多日請遣使臣往被慰撫察問疾苦祭祀山川從之先是太原留後密奏無敢言者及詳有是奏帝甚嘉之改賜章服丙寅詔應在朝臣寮藩侯郡守準例合得追贈者新授命後便于所司投狀旋與施行封妻䕃子準格合得者亦與施行外官曽任朝班據在朝品秩格例合得封贈叙封者並與施行其補䕃據資䕃合得者先受官者先與收補後受官者據月日次第施行從之十一月甲申朔日有蝕之己丑日南至帝御文明殿受賀丁酉以翰林學士起居郎張礪為兵}
