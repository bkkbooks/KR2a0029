  - {type: variant, offset: 1476, length: 196, content: 出十六日聞滹水之降是夜偵知張彥澤已至滑州召李崧馮玉李彥韜入內計事方議詔河東劉知遠起兵赴難至五鼓初張彥澤引蕃騎入京宮中相次火起帝自攜劍驅擁后妃已下十數人將同赴火為親校薛超所持俄自寬仁門遞入契丹主與皇太后書帝乃止旋令撲滅煙火大內都點檢康福全在寬仁門宿衞登樓覘賊彥澤呼而下之癸酉帝奉表於戎主曰孫臣某言今月十七日寅時相州節度使張彥澤都監傅住兒部領大軍入京齎到翁皇帝賜太后書示於滹沱河降下杜重威一行馬步, WYG: 過西川}
