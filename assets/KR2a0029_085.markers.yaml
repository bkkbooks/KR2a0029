  - {type: 'tls:seg', offset: 69, content: '', id: KR2a0029_ZHSJ_085-d85p2s6}
  - {type: variant, offset: 69, length: 0, content: '', WYG: 戊申以右龍武統軍王景戡為新州節度使已酉以右領軍上將軍李肅為左金吾大將軍壬子以隨駕歩軍都指揮使藥彦稠為邠州節度使癸丑以邠州節度使劉行琮卒廢朝贈太傅詔有司及天下州縣于律令格式六典中録本局公事書于㕔壁令其遵行六月丁巳朔復置明法科同開元禮乙丑以皇子左衛大將軍從珂依前檢校太傅加同平章事行京兆尹充西京留守庚午以邠州節度使張温為右龍武統軍甲戌以魏徴八代孫韶為安定縣主簿乙亥以鎮州節度使宋王從厚為興唐尹以石敬瑭為河陽天雄軍節度使以天雄軍節度使石敬班為河陽節度使依前六軍諸衛副使丙子詔諸道觀察使均補苗税將有力人户出剰田苗補貧下不迨頃畝有嗣者排改檢括自今年起為定額乙卯定州節度使李從敏移鎮州節度使盧質為滄州節度使庚辰皇孫太子舍人重羙授司勲員外郎重真已下六人並授同正將軍及檢校官壬午以前秦州節度使李德珫為定州節度使兼北靣行營副招討使太原地震詔天下州府斷獄先于案牘之上坐所該律令格式及新勅然後區分乙酉以前黔州節度使楊漢賔為羽林統軍詔止絶諸射係省店宅莊園秋七月庚寅以權侍衛馬軍都指揮使登州刺史張從實為夀州節度使兼侍衛歩軍都指揮使壬辰福建王延鈞上言當境廟七所乞封王號勅如諸史𫝊有名宜封為閩越富義王其餘任自于境内祭享乙未詔諸道奏薦州縣官使相先許一年薦三人今許薦五人不帶使相先許薦二人今許薦三人直屬京防禦團練使先許薦一人今許薦二人詔應州縣官内有曽在朝行及曽佐幕府罷任後準前資朝官賔從别處分其帶省銜并内供奉裏行及諸已出選門者或降授令録罷任後並依出選門例處分便與除官更不在赴常調州縣官其間書得十六考者準格叙加朝散階亦準出選門例處分三司奏先許百姓造麴不來官場收買伏恐課額不逮請復已前麴法鄉户與在城條法一例指揮仍據已造到麴納官量支還麥本從之甲辰前晉州節度使朱漢賔授太子少保致仕庚戌大理正劇可久責授登州司户刑部員外郎裴選責責授衛尉寺丞刑部侍郎李光序判大理卿事任贊各降一官罰一季俸坐斷罪失入也八月丙寅詔天下州府商税務並委逐處差人依省司年額勾當納官以故鎮州節度使趙王王鎔男昭晦為朝議大夫司農少卿賜紫金魚袋繼絶也辛丑升䖍州為昭信軍癸亥以太常少卿盧文紀為秘書監以祕書監馬縞為太子賔客左監門上將軍羅周敬為右領軍上將軍前懐州刺史婁繼英為監門上將軍乙丑詔大理寺官員等宜同臺省官例升進法直官比禮直官任使仍于諸道贓罰錢内每月支錢一百貫文賜刑部大理兩司其刑部于所賜錢三分與一分丙寅以武平軍節度使馬希振依前檢校太尉兼侍中充䖍州昭信軍節度使詔百官職吏應選授外官者考滿日並委本州申奏追還本司依舊職行公事已已太傅致仕王建立太子少保致仕朱漢賔皆上章求歸鄉里詔内外致仕官凡要出入不在拘束之限辛未}
