  - {type: variant, offset: 400, length: 215, content: 庚寅樞密使中書侍郎兼戶部尚書平章事馮玉加尚書右僕射以皇子鎮寧軍節度使延煦為陝州節度使以陝州留後焦繼勳為鳳翔留後以前定州留後安審琦為邠州留後以右僕射和凝為左僕射甲午兩浙節度使吳越國王錢弘佐起復舊任丁酉詔李守貞知幽州行府事戊申日南至御崇元殿受朝賀是月北面行營招討使杜威率諸將領大軍自鄴北征師次瀛州城下貝州節度使梁漢璋戰死杜威等以漢璋之敗遂收軍而退行次武強聞戎王入寇欲取直路自冀貝而南會張彥澤領騎自鎮定至且言契丹可破之狀於是大軍西趨鎮州, WYG: 丞}
