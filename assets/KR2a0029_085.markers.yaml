  - {type: punctuation, offset: 44, content: 、, id: KR2a0029_ZHSJ_085-bkkpn4}
  - {type: variant, offset: 44, length: 1, content: 禮, WYG: 夏四月辛卯制徳妃王氏進位淑妃詔錢鏐依舊賜不名誅内官安希倫以其受安重誨密指今于内中伺帝起居故也丁酉幸㑹節園宴羣臣因幸河南府詔罷州縣官到任後率斂為地圖又禁人毁廢所在碑碣戊戌詔今年四月禘饗太廟故昭義節度使李嗣昭故幽州節度使周徳威故汴州節度使符存審並配饗莊宗廟庭己亥以前徐州節度使張䖍釗為鳯翔節度使癸卯以汴州節度副使藥縱之為户}
  - {type: variant, offset: 44, length: 1, content: 禮, krp: 夏四月辛卯制徳妃王氏進位淑妃詔錢鏐依舊賜不名誅内官安希倫以其受安重誨密指今于内中伺帝起居故也丁酉幸㑹節園宴羣臣因幸河南府詔罷州縣官到任後率斂為地圖又禁人毁廢所在碑碣戊戌詔今年四月禘饗太廟故昭義節度使李嗣昭故幽州節度使周徳威故汴州節度使符存審並配饗莊宗廟庭己亥以前徐州節度使張䖍釗為鳯翔節度使癸卯以汴州節度副使藥縱之為户}
  - {type: variant, offset: 48, length: 2, content: 邊光, WYG: 前宗正卿李諧為將作監甲辰以宣徽北院使左衛上將軍趙延夀為檢校太傅行禮部尚書充樞密使乙巳潞州節度使劉仲殷移鎮秦州帝幸龍門佛寺祈雨己酉天雄軍節度使石敬瑭兼六軍諸衛副使辛亥以前鳯翔節度使朱𢎞昭為左武衛上將軍充宣徽南院使壬子以兵部尚書盧質為河陽節度使甲寅以遂州節度使夏魯竒没于王事廢朝詔曰久􅄽時雨深疚于心宜委諸州府長吏親問刑獄省察寃濫見禁囚徒除死罪外並放五月戊午朔帝御文明殿受朝庚申以三司使行工部尚書張延朗為兖州節度使辛酉詔近聞百執事等或親居内職或貴列廷臣或宣逹君恩或勾當公事經由列鎮干撓諸侯指射職員安排親昵或潜示㫖意或顯發書題自今後一切止絶有所犯者發薦人貶官求薦人流配如逐處長吏自循人情只仰被替人詣闕上訢長吏罰兩月俸發薦人更加一等被替人却令依舊甲子都官郎中知制誥崔棁上言請搜訪宣宗已來野史以備編修從之丁卯詔諸州府城郭内依舊禁麴其麴官中自造減舊價之半貨賣應田畝上所徴麴錢並放鄉村人户一任私造時甚便之戊辰中書奏應朝臣丁憂者望加頒賚從之丁丑以祕書監劉岳為太常卿己卯以武徳使孟漢瓊為右衛大將軍知内侍省充宣徽北院使辛巳以前相州刺史孟鵠為左驍衛大將軍充三司使甲申以權知朗州軍州事守永州刺史馬希}
