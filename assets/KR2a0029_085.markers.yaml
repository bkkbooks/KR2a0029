  - {type: voice, offset: 3714, length: 195, name: note, id: n15}
  - {type: variant, offset: 3727, length: 285, content: 九五代史補少主之嗣位也契丹以不俟命而擅立又景延廣辱其使契丹怒舉國南侵以駙馬都尉杜重威等領駕下精兵甲禦之于中渡河橋既而契丹之衆已深入而重威等奏報未到朝廷時桑維翰罷相為開封府尹謂僚佐曰事急矣非大臣鉗口之時乃叩內閣求見欲請車駕親征以固將士之心而少主方在後苑調鷹至暮竟不召維翰退而歎曰國家阽危如此草澤逋客亦宜下問況大臣求見而不召耶事亦可知矣未幾杜重威之徒降于契丹少主遂北遷史臣曰少帝以中人之才嗣將墜之業屬上天不祐仍歲大飢尚或絕強敵之歡盟鄙輔臣之謀略奢淫自縱謂有泰山之安委託非人坐受平陽之辱族行萬里身老窮荒自古亡國之醜者無如帝之甚也千載之後其如恥何傷哉永樂大典卷一萬五千六百四十九, WYG: 二}
