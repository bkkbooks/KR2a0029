  - {type: variant, offset: 62, length: 1, content: 讜, krp: 河中以右散騎常侍張文寳為兵部侍郎䕫州節度使安崇阮棄城歸闕待罪于閤門詔釋之時董璋冦峽内諸州崇阮望風遁走壬辰陜州節度使李從璋移鎮河中癸丑升盧州為昭順軍甲午以衡州刺史姚彦章為昭順軍節度使丁酉安重誨奏男崇贊崇緒等到州臣已拘送赴闕崇緒至陜州詔令下獄已亥詔安重誨宜削奪在身官爵並妻阿張男崇贊崇緒等並賜死其餘親不問壬寅以尚書左丞崔居儉為工部尚書以吏部侍郎王權為尚書左丞丙午以隨駕馬軍都指揮使宣州節度使安從進為陜州節度使丁未以前中書舍人楊凝式}
