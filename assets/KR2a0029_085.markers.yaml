  - {type: variant, offset: 38, length: 0, content: '', krp: 詔曰故天䇿上將軍守太師尚書令楚國王馬殷品位俱高封崇已極無官可贈宜賜諡及神道碑文仍以王禮塟壬申契丹東丹王托雲自渤海國率衆到闕帝慰勞久之錫賚加等百寮稱賀丙子以沙州節度使曹義金兼中書令丁丑東丹王托雲進本國印三紐庚辰以靜江軍節度使馬賔卒廢朝贈尚書令丙戌荆南節度使髙從誨落起復加兼中書令二月已丑朔以宋州節度使趙延夀為左武衛上將軍充宣徽北院使癸巳詔貢院舊例夜試進士今後晝試排門齊入即日試畢丁酉幸至徳宫又幸安元信東丹王托雲之第辛丑以鴻臚卿致仕賈馥卒廢朝}
  - {type: variant, offset: 41, length: 1, content: 直, WYG: 院使守太尉兼中書令安重誨為檢校太師兼中書令充河中節度使進封沂國公已酉以右威衛上將軍陳皋為洋州節度使詔諸府少尹上任以二十五日為限諸州刺史諸道行軍司馬副使兩使判官以下賔職團練軍事判官推官府縣官等並以三十日為限幕職隨府者不在此例癸丑邠州節度使李敬周移鎮徐州詔禁天下開發無主墳墓三月辛酉詔渤海國人皇王托雲宜賜姓東丹名慕華仍授檢校太保東安都䕶兖懐化軍節使瑞鎮等州觀察等使其從慕華歸國部校各授懐化歸徳將軍中郎將先于定州擒獲蕃將特里衮宜賜姓狄名懐惠扎古宜賜姓列名知恩並授檢校右散騎常侍錫里扎拉宜賜姓原名知感裕勒古宜賜姓服名懷造奚王副使格斯齊宜賜姓乙名懐宥三人並授檢校太子賔客甲子以前鴻臚卿王瓊為太僕卿丙寅以皇子從珂為右衛大將軍從珂自河中失守歸清化里第至是安重誨出鎮河中帝召見泣而謂之曰如重誨意爾安得更相見耶因有是命壬申以滄州節度使孔循卒廢朝乙亥以西京留守權知興元軍府事王思同為山南西道節度使充西靣行營馬歩軍都虞侯庚辰以少府監聶延祚為殿中監以前雲州節度使楊漢章為安州節度使乙酉太師致仕錢鏐復授天下兵馬都元帥尚父呉越國王以其子兩浙節度使元瓘等上表首罪故有是命丁亥以太常卿李愚為中書侍郎平章事集賢殿大}
