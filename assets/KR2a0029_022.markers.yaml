  - {type: variant, offset: 514, length: 199, content: 授襄州節度使先是漢南無羅城師厚始興板築周十餘里郛郭完壯開平元年加檢校太保同平章事明年又加檢校太傅三年三月入朝詔兼潞州行營都招討使無何劉知俊據同州叛師厚與劉鄩率軍西討至潼關擒知俊弟知浣以獻知俊聞師厚至即西走鳳翔師厚進攻至長安時知俊已引岐寇據其城師厚以奇兵傍南山急行自西門而入賊將王建驚愕不知所為遽出降制加師厚檢校太尉頃之晉王與周德威丁會符存審等以大衆攻晉州甚急太祖遣師厚帥兵援之軍至絳州晉軍扼蒙阬之險, WYG: 應宋亳潁鄆齊魏滑}
