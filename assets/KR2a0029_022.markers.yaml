  - {type: variant, offset: 3456, length: 239, content: 洞曉韜略唐中和中太祖鎮大梁檀為小將四年汴將楊彥洪破巢將尚讓李讜於尉氏門外檀在戰中摧鋒陷陣遂為太祖所知稍蒙擢用預破蔡賊於斤溝淝河八角遷踏白都副將光啟二年從胡真擊淮西之衆解河陽之圍蔡賊張存敢乘亂據洛陽檀與勇士數十人潛入賊柵邀其輜重存敢遁走胡真至陝州開通貢路遣檀攻玉山寨降賊帥石令殷從擊秦宗賢於鄭州西北河灘之上於太祖馬前射賊將孫安應弦而斃三年佐都指揮使朱珍敗徐戎於孫師陂獲其將孫用和束詡以獻從擊蔡賊於板橋偏將李重胤追賊馬躓為蔡人所擒檀奪取而旋獲賊將薛注太祖破朱瑾於劉橋檀盡收其軍實文德, WYG: 繫龍徳}
