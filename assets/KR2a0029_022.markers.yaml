  - {type: variant, offset: 3821, length: 498, content: 天復中從太祖率四鎮之師圍鳳翔以迎昭宗屢立戎効遷左踏白指揮使從攻王師範於青州檀以偏師收復密郡案永陽志云張訓守密州刺史朱全忠至青州訓謂諸將曰汴人將至何以禦之諸將請焚城大掠而歸訓曰不可乃封府庫植旗幟於城上遣羸弱居前自以精兵殿其後而去全忠遣王檀攻密州數日乃敢入城舊五代史考異遂權知軍州事充本州馬步軍都指揮使尋表授檢校右僕射守密州刺史郡接淮戎舊無壁壘乃率丁夫修築羅城六旬而畢居民賴之加檢校司空開平二年六月授邢州保義軍節度使檢校司徒三年加檢校太保充潞州東北面行營招討使乾化元年正月王景仁與晉人戰於柏鄉王師敗績河朔大震景仁餘衆為敵騎所追檀嚴設備應接敗軍助以資裝獲濟者甚衆俄而晉軍大至重圍四合土山地穴晝夜攻擊太祖憂之檀密上表請駕不親征而悉力枝梧竟全城壘三月以功就加檢校太傅同平章事七月又加開府儀同三司檢校太尉進封瑯琊郡王命宣徽使趙殷衡齎詔慰諭賜絹千疋銀千兩賞守禦邢州之功也庶人友珪僭位授鄧州宣化軍節度使檢校太尉兼侍中末帝即位移授許州匡國軍節度使加檢校太師五年蔡州刺史王彥溫作亂檀受詔討平之加兼中書令貞明元年三月魏博軍亂六月晉王入魏州分兵收下屬郡河北大擾檀受詔與開封尹劉鄩犄角進師以援河北檀攻澶州魏縣下之擒賊將李巖, WYG: 皇甫麟}
