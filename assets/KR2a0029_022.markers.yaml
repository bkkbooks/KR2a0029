  - {type: variant, offset: 306, length: 207, content: 天祐元年加諸軍行營馬步都指揮使二年八月太祖討趙匡凝於襄陽命師厚統前軍以進趙匡凝嚴兵以備師厚至穀城西童山刊材造浮橋引軍過漢水一戰趙匡凝敗散攜妻子沿漢遁去翌日表師厚為山南東道節度留後案舊唐書天祐三年六月甲申勅襄州近因趙匡凝作帥請別立忠義軍額既非往制固是從權忠義軍額宜停廢依舊為山南東道節度使是山南東道復置于天祐三年而薛史于二年八月已云表師厚為山南東道節度留後蓋史家追書之即令南討荊州留後趙匡明亦棄軍上峽不浹旬併下兩鎮乃, WYG: 錢傳璟宣原本訛亘今據十國春秋改}
