  - {type: variant, offset: 121, length: 181, content: 李茂貞以勁兵出戰為師厚所敗及王師範以青州叛太祖遣師厚率兵東討時淮賊王景仁以衆二萬來援師範師厚逆擊破之追至輔唐縣斬數百級授齊州刺史將之任太祖急召見於鄆西境遣師厚率步騎屯於臨朐而聲言欲東援密州留輜重於臨朐師範果出兵來擊師厚設伏於野追擊至聖王山殺萬餘衆擒都將八十人未幾萊州刺史王師誨以兵救師範又大敗之自是師範不復敢戰師厚移軍寨于城下師範力屈竟降天復四年三月加檢校司徒徐, WYG: 宣}
