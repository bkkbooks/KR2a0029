  - {type: variant, offset: 4336, length: 0, content: '', krp: 巻十}
  - {type: variant, offset: 4337, length: 359, content: 異王開關以獻開關原本作門關今從歐陽史改正影庫本粘籤頃之檀密疏請以奇兵西趣河中自陰地關襲取晉陽末帝許之即馳兵而去二年二月師至晉陽晝夜急攻其壘幷州幾陷既而蕃將石家才自潞州以援兵至檀引軍大掠而還尋授天平軍副大使知節度使事充鄆齊曹等州觀察等使先是檀招誘羣盜選其勁悍者置於帳下以為爪牙至是數輩竊發突入府第檀素不為備遂為所害時年五十一案歐陽史作五十八舊五代史考異節度副使裴彥聞變率府兵盡擒諸賊州城帖然尋冊贈太師謚曰忠毅忠毅原本作思毅今從冊府元龜改正影庫本粘籤葬於開封縣之臯門原有子六人皆升朝列永樂大典卷六千八百五十史臣曰夫大都偶國春秋所非當師厚之據鄴城也綰數萬之甲兵擅六州之輿賦名既震主勢亦滔天逮其喪亡須議分割由茲以失河朔因是以啟晉人詩所謂誰生厲階者師厚之謂歟存節王檀俱出身事主底力圖功觀其方略皆將帥之良者也永樂大典卷六千八百五十, WYG: 證}
