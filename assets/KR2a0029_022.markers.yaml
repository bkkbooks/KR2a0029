  - {type: variant, offset: 1605, length: 1362, content: 宗社覆滅由師厚兆之也永樂大典卷一萬八千一百二十六牛存節字贊貞案原本作替貞夏文莊集引薛史又作潛真今據歐陽史改正舊五代史考異青州博昌人也本名禮太祖改而字之少以雄勇自負唐乾符末鄉人諸葛爽為河陽節度使存節往從之爽卒存節謂同輩曰天下洶洶當擇英主事之以圖富貴遂歸於太祖初授宣義軍小將屬蔡寇至金堤驛犯酸棗靈昌存節日與之鬬凡二十餘往每往必執俘而還前後斬首二十餘級獲孳畜甚衆太祖擊蔡賊於板橋赤堈酸棗門封禪寺枯河北存節皆預其行與諸將於濮州南劉橋范縣大破鄆衆自此深為太祖奬遇文德元年夏李罕之以幷軍圍張宗奭於河陽太祖遣存節率軍赴之屬歲歉饟餽不至村民有儲乾椹者存節以器用錢帛易之以給軍食大破賊於浿河案原本訛河今據歐陽史及通鑑改正舊五代史考異罕之引衆北走又預討徐宿有功及討河北存節前鋒下黎陽收臨河至內黃西以兵千餘人當魏人萬二千衆大破其陣殭仆蔽野太祖深所歎激謂有神兵之助大順元年改滑州左右廂牢城使與諸將討時溥累破賊軍景福元年秋改遏後都指揮使攻濮之役領軍先登遂拔甚壘二年四月下徐州梟時溥存節力戰其功居多乾寧二年授檢校工部尚書三年夏太祖東討鄆州存節領軍次故樂亭扼其要路都指揮使龐師古屯馬頰存節密與都將王言謀入鄆壘十二月存節遣王言夜伏勇士於州西北以船踰濠舉梯登陴既而王言不克入存節獨率伏軍負梯破其西甕城奪其濠橋諸軍俱進四年四月陷其城尋與葛從周降下兗州加檢校右僕射其年秋大舉以伐淮南至濠州東聞前軍失利於清口諸軍退至淠河無復隊伍存節遏其後諸將釋騎步鬬諸軍稍得濟收合所部並敗兵共八千餘人至于淮涘時不食已四日矣存節訓勵部分以禦追寇遂得旋師案舊唐書昭宗紀葛從周自霍丘渡淮至濠州聞師古敗乃退軍信宿至淠河方渡而朱瑾至是日殺傷溺死殆盡還者不滿千人唯牛存節一軍先渡獲免比至潁州大雪寒凍死者十五六據舊唐書存節以先渡得免而薛史以為存節遏其後蓋傳聞之異五年除亳州刺史俄遷宣武軍都指揮使改宿州刺史明年淮賊大至彭城存節乃以部下兵夜發直趣彭門淮人訝其神速震恐而退諸將服其智識光化二年罷歸復為左衙都將兼馬步教練使天復元年授潞州馬步都指揮使法令嚴整士庶安之及追赴行在士卒泣送者不絕於道加金紫光祿大夫檢校司空改滑州左衙步軍指揮使知邢州軍州事天祐元年授邢州團練使時州兵纔及二百人晉人知之以大軍來寇太祖有鄴發長直兵二千人赴援存節率壯健出鬬以家財賞激戰士幷軍急攻七日不能克而去太祖召至勞慰久之厚賚金帛鞍馬加檢校司徒冬罷軍署為元帥府左都押衙四年太祖受禪除右千牛衞上將軍其秋攻潞州以存節為行營馬步軍都排陣使開平二年二月自右監門衞上將軍轉右龍虎統軍駐留洛下是歲王師敗於上黨晉人乘勝進迫澤州州城將陷河南留守張全義召存節謀遂以本軍及右龍虎羽林等軍往應接上黨師至天井關存節謂諸將曰是行也雖不奉詔旨然要害之地不可致失時晉人新勝其鋒甚盛存節引衆而前銜枚夜至澤州適遇守埤者已縱火鼓噪以應外軍刺史保衙城不知所為存節纔入晉軍已至矣乃分布守禦晉軍四面攻鬬開地道以入城存節亦以隧道應之逆戰于地中晉軍不能進又以勁弩射之中者人馬皆洞經十三日晉軍死傷者甚衆焚營而退郡以獲全案存節自潞州行營入為統軍留駐洛下其後夾城之敗存節未嘗在軍中也歐陽史迺云晉兵已破夾城存節以餘兵歸行至天井關還救澤州通鑑考異已辨其誤舊五代史考異太祖屢歎賞之五月遷左龍虎統軍充六軍馬步都指揮使十月授絳州刺史三年四月除鄜州留後六月劉知俊以同州叛尋授同州留後未幾加檢校太保, WYG: ''}
