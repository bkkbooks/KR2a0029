  - {type: variant, offset: 892, length: 712, content: 過漳河解邢州之圍改授滑州節度使明年太祖北征令師厚以大軍攻棗強逾旬不能克太祖屢加督責師厚晝夜奮擊乃破之盡屠其城車駕還師厚屯魏州及庶人友珪篡位魏州衙內都指揮使潘晏與大將臧延範趙訓謀變有密告者師厚布兵擒捕斬之案歐陽史云師厚乘間殺魏牙將潘晏臧延範等逐出節度使羅周翰與薛史異越二日又有指揮使趙賓夜率部軍擐甲俟旦為亂師厚以衙兵圍捕賓不能起乃越城而遁師厚遣騎追至肥鄉擒其黨百餘人歸斬于府門友珪即以師厚為魏博節度使檢校侍中未幾鎮人晉人侵魏之北鄙師厚率軍至唐店破之斬首五千級擒其都將三十餘人是時師厚握河朔兵威望振主友珪患之詔師厚赴闕師厚乃率精甲萬人至洛陽嚴兵於都外自以十餘人入謁友珪懼厚禮而遣之及末帝將圖友珪遣使謀於師厚深陳款効且馳書于侍衞軍使袁象先及主軍大將又遣都指揮使朱漢賓率兵至滑州以應禁旅友珪既誅末帝即位於東京首封師厚為鄴王加檢校太師中書令每下詔不名以官呼之事無巨細必先謀於師厚師厚頗亦驕誕先是鎮人以我柏鄉不利之後屢擾邊境師厚總大軍直抵鎮州城下焚盪閭舍移軍掠藁城束鹿至深州而歸乾化五年三月卒于鎮廢朝三日贈太師師厚純謹敏幹深為太祖知遇委以重兵劇鎮他莫能及然而末年矜功恃衆驟萌不軌之意於是專割財賦置銀槍効節軍凡數千人案清異錄云槍材難得十全魏州石屋材多可用楊師厚時銀槍效節都皆采於此舊五代史考異皆選摘驍銳縱恣豢養復故時牙軍之態時人病之向時河朔之俗上元比無夜遊及師厚作鎮乃課魏人戶立燈竿千釭萬炬洞照一城縱士女嬉遊復彩畫舟舫令女妓櫂歌於御河縱酒彌日又於黎陽採巨石將紀德政以鐵車負載驅牛數百以拽之所至之處丘墓廬舍悉皆毀壞百姓望之皆曰碑來及碑石纔至而師厚卒魏人以為悲來之應末帝聞其卒也於私庭受賀乃議裂魏州為兩鎮既而所樹親軍果為叛亂以招外寇致使河朔淪, WYG: ''}
