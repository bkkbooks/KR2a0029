  - {type: variant, offset: 6, length: 5, content: 里姜瞻鎮界, WYG: 代會要所載天福中使相有侯益與宋史同李自倫義居七世準勅旌表門閭七世歐陽史作六世又旌表門閭歐陽史作正月與是書作閏七月異先有鄧州義門王仲昭六代同居案王仲昭歐陽史作登州人乙亥詔立唐高祖太宗及莊宗明宗閔帝五廟于洛陽案立唐廟于西京歐陽史作}
