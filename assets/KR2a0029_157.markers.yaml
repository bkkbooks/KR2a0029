  - {type: variant, offset: 5, length: 0, content: '', WYG: 八攷證晉書高祖紀四以澶州防禦使張從恩為樞密副使樞密副使原本作樞密使按下文亦作樞密副使今從歐陽史及宋史張從恩傳改正以版詔徴華山隱者前右拾遺鄭雲叟右拾遺歐陽史作左拾遺攷是書前後俱作右拾遺今仍其舊以潞州節度使今後私鑄錢下禁依舊法案歐陽史七月丙辰復禁鑄錢是書作七月戊申侯益爲徐州節度使案宋史侯益傳天福四年晉祖追念虎牢之功遷武寧軍節度同平章事是書不載同平章}
