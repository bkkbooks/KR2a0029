  - {type: variant, offset: 934, length: 0, content: '', WYG: 牛知業為右羽林軍統軍癸亥北面招討使賀瓌率大軍與晉人戰於胡柳陂晉人敗績是日旣晡復為晉人所敗初晉人起軍將襲東京乃下令軍中老弱悉歸於鄴是月二十二日晉王次臨濮賀瓌王彦章自行臺寨率軍躡之二十四日至胡桞陂晉王領軍出戰瓌軍已成列晉王以騎突之王彦章一軍先敗彦章走濮陽晉人輜重在陣西瓌領軍薄之晉人大奔自相蹈藉死者不可勝紀晉大將周德威殁於陣瓌軍乃登土山列陣於山之下晉王復領兵來戰瓌軍遂敗翼日晉人攻濮陽䧟之京師戒嚴貞明五年春正月晉人城徳勝夾河為栅二月乙已以宣徽院副使韋堅權知徐州軍事三月已卯以華州感化軍留後尹皓為華州節度使}
