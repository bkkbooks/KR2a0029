  - {type: variant, offset: 68, length: 2, content: 祖壯, WYG: 保朱勍爲懷州刺史癸酉以右天武軍使石釗爲密州刺史戊寅以前懷州刺史李建爲安州刺史仍賜名知節已夘以宣義軍節度副大使知節度事北面行營副招討等使特進檢校太傅霍彦威爲天平軍節度副大使知節度事二月甲申晉王攻我黎陽劉鄩拒}
  - {type: page-break, offset: 68, content: '', id: KR2a0029_WYG_019-1b, image: WYG0277/WYG0277-0098b.png}
  - {type: variant, offset: 68, length: 2, content: 祖壯, krp: 保朱勍爲懷州刺史癸酉以右天武軍使石釗爲密州刺史戊寅以前懷州刺史李建爲安州刺史仍賜名知節已夘以宣義軍節度副大使知節度事北面行營副招討等使特進檢校太傅霍彦威爲天平軍節度副大使知節度事二月甲申晉王攻我黎陽劉鄩拒}
  - {type: punctuation, offset: 71, content: ，, id: KR2a0029_ZHSJ_019-bkkpn13}
  - {type: 'tls:seg', offset: 71, content: '', id: KR2a0029_ZHSJ_019-d19p2s12}
  - {type: variant, offset: 71, length: 0, content: '', WYG: 而退乙酉前蔡州刺史董璋權知宣義軍軍州事丁亥以前右羽林軍統軍梁繼業爲左衛上將軍壬辰以租庸判官檢校司徒張紹珪爲光祿卿依前充租庸判官癸已以權知平盧軍軍州事客省使知銀臺事元湘爲檢校司空甲午以飛龍使婁繼英爲左武衛大將軍三月庚申以前平戎軍使檢校司徒郭紹賓爲禧州刺史辛酉以前天平軍節度副使裴彦爲隨州刺史戊寅湖州刺史錢傳璟蘇州刺史錢傳璙鎭海軍節度副史錢傳瓘温州刺史錢傳璲睦州刺史錢傳琇寶州刺史錢傳􅀈明州刺史錢傳球義州刺史錢傳㻑峯州刺史錢傳珦巒州刺史錢傳琰鎭海軍都知兵馬使錢傳璛等凡一十一人竝加官勲階爵從呉越王錢鏐之請也夏四月庚辰以前行左武衛大將軍蔡敬思爲右武衛上將軍辛已以前安州刺史劉玘權知晉州軍州事以前密州刺史張實爲潁州刺史充本州團練使癸未以六軍押衙充左天武軍使劉彦珪爲澶州刺史辛卯以右千牛衛大將軍劉璩充契丹宣諭使詔諸道兵馬元帥開幕除吏一同天策上將府故事辛丑以清海軍元從都押衙隴州刺史呉鍔爲檢校司空癸卯以兩浙衙内先鋒指揮使守峯州刺史錢傳珦爲泗州刺史六月庚辰以前東京馬步都指揮使兼左天武軍使雷景從爲汝州刺史充本州防禦使辛卯以租庸判官光祿大夫檢校司徒行光祿卿張紹珪爲申州刺史壬辰以權知晉州建寧軍軍州事前安州刺史劉玘爲建寧軍節度觀察畱後秋七月丁已以淄州刺史陳洪爲棣州刺史乙丑以刑部員外郎封翹爲翰林學士丙寅以汝州刺史楊延直爲左衛大將軍以前左衛上將軍劉重霸爲起復雲麾將軍右驍衛上將軍庚午以六軍諸衛副使起復雲麾將軍檢校太保張業為淄州刺史八月辛已以左神武軍統軍周武為寧州刺史以左崇安指揮使前申州刺史劉仁鐸為衍州刺史戊子泰寧軍節度使張萬進賜名守進九月庚申以遙領常州刺史張昌孫遙領夀州刺史充本州團練使冬十月壬午以權西面行營都監左武衛上將軍張筠權知商州軍州事戊子詔曰太子太傅李戬多因釋教誑惑羣情此後不得出入無恒癸已以前崇徳軍使張思綰為左武衛上將軍已亥以啓聖匡運同德功臣諸道兵馬元帥淮南鎭海鎭東等軍節度使充淮南宣潤等四面行營都統開府儀同三司尚書令呉越王錢鏐為天下兵馬元帥壬寅以尚書左丞呉藹為工部尚書充兩浙官告使是月晉王}
