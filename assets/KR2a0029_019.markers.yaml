  - {type: variant, offset: 2106, length: 486, content: 次任縣東面都統齊克讓伏兵於孫師陂以邀珍珍大破之進軍至牙山都虞候張仁遇白珍曰軍有不齊者當先斬本都將後以狀聞願許之珍怒其專乃斬仁遇以徇軍由是諸將感懼兵至乾封與淄人戰於白草口敗之青人以步騎二萬列三寨于金嶺驛珍與戰連破之殲其師盡獲軍器戎馬是夕攻博昌大獲兵衆其後破盧瑭張晊及朱瑄朱瑾之衆平定曹濮未嘗不在戰中梁山之役始與李唐賓不協珍在軍嘗私迎其室於汴而不先請太祖疑之案通鑑作全忠怒追還其妻殺守門者舊五代史考異案通鑑云全忠怒追還其妻殺守門者使親吏蔣玄暉召珍以唐賓代總其衆館驛巡官敬翔曰朱珍未可輕取恐其猜懼生變全忠懼使人追止之與薛史異孔本密令唐賓察之二將不相下因而交諍唐賓夜斬關還汴以訴珍亦棄軍單騎而至太祖兩惜之故不罪俾還於師復以踏白騎士入陳亳間以邀蔡人遂南至斤溝破淮西石璠之師二萬據璠以獻珍旋師自亳北趣靜戎濟舟于滑破黎陽臨河李固三鎮軍於內黃敗樂從訓萬餘人案通鑑考異云珍往救從訓而云敗從訓誤也舊五代史考異案通鑑作樂從訓來告急遣都指揮使朱珍等分兵救從訓與此傳異殿本分命聶金范居實略澶州與魏師遇於臨黃魏軍有豹子軍二千人戮之無噍類威振河朔復攻淮西至蔡夾河而寨敗賊將蕭皓之衆皆擁於河溺死之進軍蔡州, WYG: ''}
