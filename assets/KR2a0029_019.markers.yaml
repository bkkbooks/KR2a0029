  - {type: variant, offset: 72, length: 0, content: '', WYG: 魏州還太原閏十月丁卯以前商州刺史徐璫為左驍衛上將軍充西都大内皇墻使十一月壬午以中書侍郎平章事鄭珏權判户部事戊子以寧州刺史周武為武静軍防禦使守慶州刺史以河潼軍使竇廷琬為寧州刺史十二月晉王自太原復至魏州庚申以左金吾衛大將軍充街使華温琪為右龍虎軍統軍以右龍虎軍統軍張彦勲為商州刺史以前西京大内皇墻使李項為右威衛上將軍以左金吾衛上將軍李周彛權兼左街使壬戌以守太尉兼中書令河南尹判六軍諸衛事魏王張宗奭為天下兵馬副元帥丙寅以西面}
  - {type: page-break, offset: 72, content: '', id: KR2a0029_WYG_019-4b, image: WYG0277/WYG0277-0100b.png}
  - {type: variant, offset: 72, length: 0, content: '', krp: 魏州還太原閏十月丁卯以前商州刺史徐璫為左驍衛上將軍充西都大内皇墻使十一月壬午以中書侍郎平章事鄭珏權判户部事戊子以寧州刺史周武為武静軍防禦使守慶州刺史以河潼軍使竇廷琬為寧州刺史十二月晉王自太原復至魏州庚申以左金吾衛大將軍充街使華温琪為右龍虎軍統軍以右龍虎軍統軍張彦勲為商州刺史以前西京大内皇墻使李項為右威衛上將軍以左金吾衛上將軍李周彛權兼左街使壬戌以守太尉兼中書令河南尹判六軍諸衛事魏王張宗奭為天下兵馬副元帥丙寅以西面}
