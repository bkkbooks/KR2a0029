  - {type: variant, offset: 565, length: 3, content: 尋真領, WYG: 癸亥以前永平軍節度副使張正已為房州刺史乙丑以宿州團練使趙麓權知河陽節度觀察留後以左驍衛將軍劉去非為郢州刺史戊辰以權知永平軍節度觀察留後兼判大安府事張筠為永平軍節度觀察留後依前兼判大安府事是月晉王率師次楊劉口遂軍于麻家渡北面招討使賀瓌以兵屯濮州北行臺村對壘百餘日晉王以輕騎來覘許州節度使謝彦章發伏兵掩擊圍之數重會救軍至晉王僅以身免九月丁丑静勝軍節度崇裕等州觀察處置等使特進檢校太傅同平章事温昭圖加檢校太尉甲午崇政院副使張希逸加金紫光祿大夫行秘書少監乙未起復雲麾將軍檢校太}
