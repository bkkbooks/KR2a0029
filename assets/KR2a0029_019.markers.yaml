  - {type: variant, offset: 1835, length: 179, content: 中涓從摧堅陷陣所向盪決及太祖鎮汴兼領招討使署珍為宣武右職以總腹心於是簡練軍伍裁制綱紀平巢破蔡多珍之力也始尚讓以驍騎五千人至繁臺珍與龐師古齊奉國等擊退之及黃巢敗珍與幷帥李克用追至寃句而還尋從太祖以汴宋𩗗之師入西華破王夏寨勇冠軍鋒以功加秩光啟元年署諸軍都指揮使始為上將於是軍焦夷敗蔡師鐵林三千人盡俘其將復西至汝鄭南過陳潁繚宋𩗗滑濮間與蔡賊交戰鏖伏襲殺不知其數會滑, WYG: 延}
