  - {type: variant, offset: 2688, length: 2314, content: 葺馬廄以候巡撫李唐賓之裨將嚴郊獨慢焉軍候范權恃珍以督之唐賓素與珍不協果怒乃見以訴其事珍亦怒曰唐賓無禮遂拔劍斬之珍命騎列狀陳其事太祖初聞唐賓之死驚駭與敬翔謀詐令有司收捕唐賓妻子下獄以安珍心太祖遂徑往蕭縣距蕭一舍珍率將校迎謁梁祖令武士執之責其專殺命丁會行戮案歐陽史作珍自縊死都將霍存等數十人叩頭以救太祖怒以坐床擲之乃退永樂大典卷二千三十一李思安陳留張亭里人也初事汴將楊彥洪為騎士好拳勇未弱冠長七尺超然有乘時自奮之意唐中和三年太祖鎮汴嘗大閱戎旅覩其材甚偉之因錫名思安字貞臣思安善飛矟所向披靡每從太祖征伐常馳馬出敵陣之後測其厚薄而還或敵人有恃猛自衒者多命取之必鷹揚卷擒馘於萬衆之中出入自若如蹈無人之地太祖甚惜之命副王虔裕為踏白將時巢蔡合從太祖每遣偵邏必率先獨往巢敗走思安領所部百餘人追賊殺戮掩奪衆莫敢當尋領軍襲蔡寇於鄭都將李唐賓馬躓而墜思安援槊刺追者唐賓復其騎而還又嘗與蔡人鬬當陣生擒賊將柳行實其後渡長淮下天長高郵二邑又拒孫儒迫濠州皆有奇績累遷為諸軍都指揮使奏官至檢校左僕射尋拜亳州刺史練兵禦寇邊境肅然思安為性勇悍每統戎臨敵不大勝必大敗開平元年春率兵伐幽州營於桑乾河擄獲甚衆燕人大懼及軍迴率諸軍伐潞累月不克師人多逸太祖怒甚詔疏其罪盡奪其官爵委本郡以民戶係焉踰歲起之復令領兵亦無巨績可紀太祖嘗因命將授鉞謂左右曰李思安當敵果敢無出其右者然每遇藩方擇材吾將用之則敗聞必至如是者二三矣則知飛將數奇前史豈虛言哉乾化元年秋又以為相州刺史思安自謂當擁旄仗鉞及是殊不快意但日循晏安無意為政及太祖北征以候騎之誤落然無所具而復壁壘荒圮帑廩空竭太祖怒貶柳州司戶尋賜死於相州永樂大典卷一萬三百八十八案通鑑乾化元年九月丙午至相州刺史李思安不意帝猝至落然無具坐削官爵二年正月丁卯帝至獲嘉追思李思安去歲供饋有闕貶柳州司戶尋長流思安于崖州賜死據薛史則思安賜死即在相州未嘗至貶所與通鑑異鄧季筠宋州下邑人也少入黃巢軍隸於太祖麾下及太祖鎮汴首署為牙將主騎軍伐鄆之役生擒排陣將劉矯以獻唐大順初唐帝命丞相張濬伐太原太祖奉詔出師西至高平與晉人接戰軍既不利季筠為晉人所擒克用見之甚喜釋縛待以賓禮俄典戎事季筠在幷門凡四稔案通鑑考異引唐餘錄謂季筠與李存孝並賜死蓋傳聞之誤景福二年晉軍攻邢臺季筠領偏師預其役將及邢邢人陣於郊兩軍酣戰之際季筠出陣飛馬來歸太祖大加奬歎賞賚甚厚時初置廳子都最為親軍命季筠主之旋改統親騎又遷將中軍天祐三年奏授登州刺史下車稱理登州舊無羅城及季筠至郡率丁壯以築之民甚安之因相與立碑以頌其績太祖受禪改鄭州刺史尋主兵於河中為都指揮使時幷人寇平陽季筠接戰於洪洞大克拜華州防禦使又繼領龍驤等諸軍騎士累官至檢校司空栢鄉之役季筠臨陣前却太祖亦未之罪乾化二年春太祖親伐鎮定駐於相州因閱馬怒其馬瘦與魏博軍校何令稠陳令勳同斬於纛下永樂大典卷一萬八千一百二十六黃文靖金鄉人少附於黃巢黨中巢敗歸於太祖累署牙職繼遷諸軍指揮使從太祖南平巢蔡北定兗鄆皆有功唐大順中佐葛從周送朱崇節入潞會晉軍十餘萬近逼垣寨文靖慮孤軍難守乃與葛從周啟闉出師文靖為殿命矢刃皆外向持重而還晉人不敢逼其年冬與康懷英渡淮入壽春之境下安豐霍丘至光州光州原本作先州今據十國春秋改正影庫本粘籤而還光化初晉將李嗣昭周德威寇於山東文靖佐葛從周統大軍禦之至沙河敗晉軍五千餘騎遂逐之越張公橋乃止後旬日復與晉人戰於邢州之北擒蕃將賁金鐵慕容藤李存建等百餘人奪馬數千匹尋以功表授檢校左僕射耀州刺史天祐二年春命佐楊師厚深入淮甸越壽春侵廬江軍至大獨山遇淮夷殺五千餘衆振旅而還改蔡州刺史加檢校司空又遷潁州刺史太祖受禪復為蔡州刺史入為左神武統軍又改左龍驤使乾化元年從太祖北征因閱馬得罪命斬之文靖驍果善戰諸將皆惜之永樂大典卷一萬八千一百二十六胡規兗州人初事朱瑾為中軍都校兗州平署為宣武軍都虞候佐葛從周伐鎮定從張存敬收晉絳皆有功署為河中都虞候榷鹽務天復中太祖迎駕在岐下以規權知洽州昭宗還長安詔授皇城使及東遷以為御營使駕至洛授內園莊宅使天祐三年佐李周彝討相州獨當州之一面頗以功聞軍還權知耀州事明年討滄州為諸軍壕寨使太祖受禪除右羽林統軍尋佐劉鄩統兵收潼關擒劉知浣獻之乃以為右龍虎統軍兼侍衞指揮使乾化元年詔修洛河堤堰軍士因之斬伐百姓園林太甚河南尹張宗奭奏之規得罪賜死永樂大典卷一萬八千一百二十七李讜河中臨晉人少時遊秦雍間為人勇悍多力甚有氣誼唐廣明初黃巢陷長安讜遂得仕於其間巢以讜為內樞密使案新唐書黃巢傳及通鑑皆言巢以費傳古為樞密使不載李讜疑與傳古先後授偽官也蓋讜曾委質於宦者出入於宮禁間巢以此用焉其後巢軍既敗讜乃束身歸於太祖署為左德勝騎軍都將從太祖討蔡賊頗立軍功及東伐兗鄆以所部士伍俘獲甚衆改元從騎將表授檢校右僕射郴王友裕領兵攻澤州時太祖駐大軍於盟津乃令讜將兵越太行授以籌謀讜頗違節度久而無功案唐書李存孝傳云李讜收軍而遁