  - {type: variant, offset: 5168, length: 190, content: 令以郡兵屯固鎮尋除澤州刺史居實拳勇善戰頗立軍功在郡以戎備不理詔追赴闕暴其翫寇之罪而斬之永樂大典卷一萬六千五百十七史臣曰叔琮而下咸以鷹犬之才適遇雲龍之會勤勞王室踐履將壇然俱不得其死豈不惜哉得非鳥盡弓藏理當如是耶將梁祖之雄猜無漢高之大度歟乃知自古帝王能保全功臣者唯光武一人而已矣語曰弒父與君亦不從也而叔琮友恭從之何也既為盜跖所嗾豈免成濟之誅臨終之言益彰其醜也永樂大典卷一萬六千五百十七, WYG: 巻九}
