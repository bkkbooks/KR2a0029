  - {type: variant, offset: 5142, length: 0, content: '', WYG: 州事秋七月晉王自魏州還太原八月乙未朔滑州節度使賀瓌卒輟視朝三日詔贈侍中是月命開封尹王瓚為北面行營招討使瓚乃與許州留後王彦章等率大軍自黎陽濟營於陽村造浮梁以通津路九月丙寅制削奪廣州節度使南平王劉巖在身官爵以其將謀僭號故也仍詔天下兵馬元帥錢鏐指揮攻討冬十月晉王復至魏州是月劉鄩攻下兖州擒張守進夷其族十一月丁丑以兖州安撫制置使特進檢校太傅大彭郡開國公劉鄩為兖州節度}
