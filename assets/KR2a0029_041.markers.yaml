  - {type: variant, offset: 827, length: 2, content: 戌延, WYG: 胄乘其所賜烏馬馳騁于陣前太祖目之曰眞神王也昭宗還京賜迎鑾毅勇功臣改邢州刺史尋遷亳州團練使案通鑑開平二年帝從呉越王錢鏐之請以亳州團練使冦彦卿爲東南面行營都指揮使使擊淮南十一月彦卿帥衆一千襲霍丘爲土豪朱景所敗又攻廬壽二州皆不勝淮南遣滁州刺史李儼拒之九國志朱景傳梁祖聞景名命冦彦卿率勁騎三千襲霍丘圖取景且諭梁祖之意令降景率其徒戰于丘墟林澤中射死者無數彦卿兵折力殫而去太祖受禪爲華}
