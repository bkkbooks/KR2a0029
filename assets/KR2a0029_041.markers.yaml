  - {type: variant, offset: 5174, length: 1221, content: 月乙巳蓋以奏聞之日為據也舊五代史考異節度使李仁矩舉家遇害丁未宮苑使董光業幷妻子並斬於都市璋之子也辛亥以武安軍節度副使洪鄂道行營副都統檢校太尉馬希聲為武安軍節度使加兼侍中時湖南馬殷奏久病不任軍政乞以男希聲為帥故有是命中書奏吏部流內銓諸色選人所試判兩節欲委定其等第文優者超一資其次者次資又次者以同類道理全疏者於同類中少人戶處注擬從之十一月庚申朔帝御文明殿冊皇子秦王仗衞樂懸如儀甲子正衙命使冊皇子宋王於鎮州是日幸龍門翌日馮道奏曰陛下宮中無事遊幸近郊則可矣若涉歷山險萬一馬足蹉跌則貽臣下之憂臣聞千金之子坐不垂堂百金之子立不倚衡況貴為天子豈可自輕哉帝斂容謝之退令小黃門至中書問道垂堂倚衡之義道因注解以聞帝深納之己巳故太子少保致仕封舜卿贈太子少傅庚午應州節度使張敬達移雲州以捧聖都指揮使守恩州刺史沙彥詢為應州節度使以潁州團練使高行周為安北都護充振武節度使壬申黔南節度使楊漢章棄城奔忠州楊漢章原本脫章字今據通鑑增入影庫本粘籤為董璋所攻也乙亥制西川節度使孟知祥削奪官爵以其同董璋叛也丙子以前同州節度使羅周敬為左監門上將軍丁丑故兵部侍郎許光義贈禮部尚書辛巳西面軍前奏今月十三日階州刺史王弘贄瀘州刺史馮暉自利州取山路出劍門關外倒下殺敗董璋守關兵士三千人收復劍州案通鑑考異引唐實錄作今月十三日大軍進攻入劍門次十七日收下劍州薛史統繫于十三日疑有舛誤舊五代史考異據通鑑考異引唐實錄云軍前奏今月十三日王弘贄馮暉自利州入山路出劍門關外倒下殺董璋把關兵士約三千人獲都指揮使齊彥溫大軍進攻入劍門次又丙戌奏今月十七日收下劍州破賊千餘人獲指揮使劉太是進攻劍門收復劍州先後殊日薛史統繫於十三日疑有舛誤今附識于此影庫本粘籤甲申日南至帝御文明殿受朝賀丙戌以給事中鄭韜光為左散騎常侍青州奏得登州狀契丹阿保機男東丹王突欲越海來歸國案遼史太宗紀十一月戊寅東丹奏人皇王浮海適唐又義宗傳太宗既立見疑唐明宗聞之遣人跨海持書密召倍倍因畋海上使再至倍立木海上刻詩曰小山壓大山大山全無力羞見故鄉人從此投外國攜高美人載書浮海而去薛史不載明宗密召之事當日人皇王自以見疑出奔當不待明宗之召也舊五代史考異契丹國志時東丹王失職怨望因率其部四十餘人越海歸唐殿本十二月乙未荊南奏湖南節度使楚國王馬殷薨案五代春秋十二月楚王殷薨據通鑑殷卒于十一月己巳至十二月始奏聞耳舊五代史考異廢朝三日庚子以前襄州節度使安元信為宋州節度使辛丑幸苑中丁未以二王後祕書丞襲酅國公楊仁矩卒輟朝贈工部郎中庚戌湖南節度使馬希聲起復加兼中書令壬子以樞密院直學士戶部侍郎閻至為澤州刺史樞密院直學士戶部侍郎史圭為貝州刺史甲寅遣樞密使安重誨赴西面軍前時帝以蜀路險阻進兵艱難潼關已西物價甚賤百姓輓運至利州率一斛不得一斗謂侍臣曰關西勞擾未有成功誰能辦吾事者朕須自行安重誨曰此臣之責也臣請行帝許之言訖而辭翌日遂行甲寅故西川兵馬都監泗州防禦使李嚴贈太傅丙辰車駕畋於西山臘也丁巳迴鶻遣使來朝貢戊午故荊南節度使檢校太尉兼尚書令南平王高季興贈太尉永樂大典卷七千一百六十五, WYG: ''}
