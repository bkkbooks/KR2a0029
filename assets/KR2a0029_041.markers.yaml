  - {type: variant, offset: 3331, length: 1483, content: 節度使從厚移領鎮州以左武衞上將軍李從溫為許州節度使秋七月甲子以宣徽南院使行右衞上將軍判三司馮贇為北京留守太原尹己巳以鄧州節度使史敬鎔卒廢朝甲戌以左威衞上將軍梁漢顒為鄧州節度使前兗州節度使趙在禮為左驍衞上將軍庚辰奉國軍節度使兼威武軍節度副使檢校太尉兼侍中王延稟加兼中書令詔諸州得替防禦團練使刺史並宜於班行比擬如未有員闕可隨常參官逐日立班新例也辛巳詔揀年少宮人及西川宮人並還其家無家可歸者任從所適甲申以前齊州防禦使孫璋為鄜州節度使戊子以右散騎常侍陸崇卒廢朝崇為福建冊使卒於明州贈兵部尚書宿州進白兔安重誨謂其使曰豐年為上瑞豐年原本作豐止今據歐陽史改正影庫本粘籤兔懷狡性雖白何為命退歸八月甲午以前鄧州節度使盧文進為左衞上將軍北京奏吐渾千餘帳內附於天池川安置禁在京百司影射州縣稅戶乙未捧聖軍使李行德捧聖軍使原本作章使考歐陽史作捧聖都軍使通鑑作軍使今從通鑑改正影庫本粘籤十將張儉告密人邊彥溫並族誅案李行德等族誅歐陽史作壬寅與薛史異舊五代史考異以其誣告安重誨私市兵仗故也以前許州節度使張延朗為檢校太傅行兵部尚書充三司使三司之有使額自延朗始也初中書覆奏授延朗諸道鹽鐵轉運等使兼判戶部度支事奏入宣旨曰會計之司國朝重事將總成其事額俾專委於近臣貴便一時何循往例兼移內職可示新規張延朗可充三司使班在宣徽使下案宋史職官志三司使在宣徽使後蓋仍後唐之制舊五代史考異癸卯北京奏生吐渾內附欲於嵐州安族帳都官員外郎知制誥張昭遠奏請依國朝舊例選郎官御史分行天下宣問風俗興利除害不報壬寅皇子河南尹判六軍諸衞事從榮封秦王仍令所司擇日冊命案五代會要長興元年九月太常禮院奏草定冊秦王儀注博士段顒議曰據開元禮臨軒冊命諸王大臣其日受冊者朝服從第鹵簿與百官俱集朝堂就次受冊訖通事舍人引不載謁朝還第之儀自開元以後冊拜諸王皆正衙命使詣延英進冊皇帝御內殿高品引王入立于位高品宣制讀冊王受冊訖歸院亦無乘輅謁朝之禮臣按五禮精義云古者皆因禘嘗而頒爵祿所以示無自專禀之于祖宗也今雖冊命不在禘嘗然拜大官封大邑必至殿廷敬慎之道也今當司欲準開元禮其日秦王服朝服自理所乘輅車備鹵簿與羣臣俱集朝堂就次受冊訖至應天門外奉冊置于載冊之車秦王升輅出謁太廟訖歸理所儀仗鹵簿如來時之儀從之舊五代史考異戊申兗州奏淮南海州都指揮使王傳拯案歐陽史作傳極考薛史列傳及通鑑並作傳拯疑歐陽史傳刻之訛舊五代史考異殺本州刺史陳宣焚燒州城以所部兵士及家口五千人歸國至沂州帝遣使慰納之庚戌正衙命使冊福慶長公主孟氏以前雄武軍節度使王思同為左武衞上將軍以前鳳州節度使陳臯為右威衞上將軍壬子正衙命使赴太原冊永寧公主石氏乙卯以左監門衞上將軍陳延福卒廢朝丙辰皇子鎮州節度使從厚封宋王仍令擇日冊命九月乙丑階州刺史王弘贄上言一州主客戶纔及千數並無縣局臣今檢括得新舊主客已及三千二百欲依舊額立將利福津二縣請置令佐從之丁丑詔天下諸州府不得奏薦著紫衣官員為州縣官戊寅升尚書右丞為正四品癸未利閬遂三州奏利閬遂三州通鑑作三鎮考利帥為李彥琦閬帥為李仁矩遂州為夏魯奇今附識于此影庫本粘籤東川節度使董璋謀叛結連西川孟知祥甲申以鎮州節度使范延光為檢校太傅守刑部尚書充樞密使利州閬州進納東川檄書言將兵擊利閬責以間諜朝廷為名乙酉以左驍衞上將軍趙在禮為同州節度使兼四面行營馬步軍都指揮使樞密院直學士守工部侍郎閻至樞密院直學士守尚書右丞史圭並轉戶部侍郎依前充職以翰林學士守戶部侍郎李懌為尚書右丞以翰林學士戶部侍郎劉昫為兵部侍郎以翰林學士中書舍人竇夢徵為工部侍郎依前充職以中書舍人劉贊為御史中丞以御史中丞許光義為兵部侍郎以兵部侍郎姚顗為吏部侍郎丙戌詔東川節度使董璋可削奪在身官爵仍徵兵進討丁亥以西川節度使孟知祥兼西, WYG: ''}
