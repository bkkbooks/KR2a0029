  - {type: variant, offset: 988, length: 723, content: 蕭希甫為嵐州司戶參軍仍馳驛發遣坐誣告之罪也宰臣馮道等再請上尊號詔允之丙戌以侍衞親軍馬步軍都指揮使河陽節度使康義誠為襄州節度使檢校太傅以左武衞上將軍劉彥琮為陝州節度使檢校太保庚寅制淑妃曹氏可立為皇后仍令擇日冊命夏四月甲午朔國子司業張溥奏請復八館以廣生徒按六典監有六學國子太學四門律學書學算學是也書學原本作署學今據新唐書百官志改正影庫本粘籤而溥云八館謬矣丁酉前汴州節度使檢校太尉兼侍中符習可太子太師致仕進封衞國公戊戌遂州節度使夏魯奇加同平章事皇子河中節度使從珂進位檢校太尉封開國公自是諸道節鎮皆次第加恩以郊禋覃慶澤故也己亥幸會節園壬寅以樞密使安重誨為留守太尉兼中書令使如故青州節度使王建立加侍中移鎮潞州皇子河中節度使從珂奏臣今月五日閱馬於黃龍莊衙內指揮使楊彥溫據城叛臣尋時詰問稱奉宣命案胡三省通鑑注云樞密院用宣三省用堂帖舊五代史考異臣見在虞鄉縣帝遣西京留守索自通侍衞步軍都指揮使藥彥稠等攻之仍授彥溫絳州刺史冀誘而擒之也詔從珂赴闕丁未以戶部尚書李鏻為兗州行軍司馬坐引淮南覘人貽安重誨寶帶也戊申宰臣馮道加右僕射趙鳳加吏部尚書乙酉以左龍武統軍劉君鐸卒廢朝癸丑索自通藥彥稠等奏收復河中斬楊彥溫傳首來獻案通鑑作辛亥索自通拔河中斬楊彥溫癸丑傳首來獻歐陽史亦作辛亥自通執彥溫殺之較薛史為詳審舊五代史考異初彥稠出師帝戒之曰與朕生致彥溫吾將自訊之及收城斬首傳送帝怒彥稠等時議皆以為安重誨方弄國權從榮諸王敬事不暇獨忌從珂威名每於帝前屢言其短巧作窺圖冀能傾陷彥溫既誅從珂歸清化里第重誨謂馮道等曰蒲帥失守責帥之義法當如何翌日道等奏合行朝典帝不悅趙鳳堅奏故事有責帥之義所以激勵藩守帝曰皆非公等意也後數日帝於中興殿見宰臣趙鳳承重誨意又再論列帝默然翌日重誨復自論奏帝極言以拒之語在, WYG: 卽涕泗交流}
