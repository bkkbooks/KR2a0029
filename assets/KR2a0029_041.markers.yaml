  - {type: 'tls:seg', offset: 130, content: '', id: KR2a0029_ZHSJ_041-d41p2s22}
  - {type: variant, offset: 135, length: 3, content: 蕭希甫, WYG: 通刺史在任四考頗有政績秋罷詣蜀行在太祖遣人迎之龍紀二年至東京勞賚彌厚賜第墅各一區錢千緡表爲亳州團練使兼太清宫副使加檢校工部尚書是年冬太祖征淮南過郡因求侍府幕表爲宣義軍節度副使充兩使畱後瞳在滑十三年部内増户約五萬益兵數千人累遷至大中大夫檢校右僕射卒于滑開平初追贈司徒司馬鄴字表仁其先河内温人也祖德璋仕唐爲杞王傅父諲左武衛大將軍鄴資䕃出身頗知書累官至大列唐天復初韓建用爲同州節度畱後昭宗之幸鳳翔也太祖引兵入關前鋒至左馮翊鄴持印鑰迎謁道左太祖以兵圍華州命入城招諭韓建建果出降及大軍在岐下遣奏事于昭宗再入復出又使于金州説其帥馮行襲俾堅攀附後厯宣武天平等軍從事開平元年拜右武衛上將軍三年使于兩浙時淮路不通乘驛者迂迴萬里陸行則出荆襄潭桂入嶺自畨禺泛海至閩中達于杭越復命則備舟楫出東海至于登萊而揚州諸步多賊舩過者不敢循岸必高帆逺引海中謂之入陽以故多損敗鄴在海逾年漂至躭羅國一行俱溺後詔贈司徒劉捍開}
  - {type: page-break, offset: 135, content: '', id: KR2a0029_WYG_041-2b, image: WYG0277/WYG0277-0181b.png}
  - {type: page-break, offset: 135, content: '', id: KR2a0029_WYG_041-3a, image: WYG0277/WYG0277-0181c.png}
