  - {type: variant, offset: 820, length: 0, content: '', WYG: 河中太祖聞之痛惜移晷開平初追贈太保乾化三年又追贈太傅子仁愿晉天福中仕至大理冦彦卿字俊臣大梁人也祖琯父裔皆宣武軍牙校太祖鎭汴以彦卿將家子擢在左右弱冠選爲通贊官太祖爲元帥補元帥府押牙充四鎭通贊官行首兼右長直都指揮使累奏授檢校司徒領洺州刺史羅紹威將殺牙軍遣使告于太祖太祖命彦卿使于魏密與紹威謀之竟成其事彦卿之力也彦卿身長八尺隆凖方面語音如鐘善騎射好書史復善伺太祖之旨凡所作爲動皆云合太祖每言曰敬翔劉捍冦彦卿蓋爲我而生其見重如}
