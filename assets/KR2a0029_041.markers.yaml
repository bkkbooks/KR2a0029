  - {type: variant, offset: 2557, length: 255, content: 之初千秋萬歲永混車書宰臣馮道之辭也庚申以左金吾上將軍史敬鎔為鄧州節度使以右金吾上將軍符彥超為兗州節度使以驍衞上將軍張敬詢為滑州節度使以閬州防禦使孫岳為鳳州節度使詔改鳳翔管內應州為匡州匡州原本匡字分注御名二字蓋薛史原書之體今改正影庫本粘籤信州為晏州改新州管內武州為毅州五月乙丑鄭州防禦使張進副使咸繼威並停任以盜掠城中居人故也丙寅以少府監韋肅為洺州刺史以潞州節度使王建立為太傅致仕建立素與安重誨不協因其入朝乃言建立自鎮歸朝過鄴都日有扇搖之言扇搖通鑑作搖衆考冊府元龜亦作扇搖今仍其舊影庫本粘籤以是罪之故令致仕丁卯以前, WYG: 遥領}
