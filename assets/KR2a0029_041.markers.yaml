  - {type: variant, offset: 807, length: 0, content: '', WYG: 軍節度判官在幕下頗以氣直自許後監鄭州事復權知徐州畱後唐昭宗之鳳翔太祖迎奉未出劭有疑謀遂令赴華州詣丞相府以議其事行至高陵爲盗所害馬嗣勲濠州鍾離縣人世爲軍吏嗣勲有口辯習武藝初爲州客將唐景福元年三月太祖以壽州刺史江儒反下蔡鎭使李立率兵攻濠梁刺史張遂俾嗣勲持州印籍户口以歸于太祖乾寧二年三月楊行密復攻濠州張遂遣嗣勲求援于太祖俄而郡陷嗣勲無所歸卽署爲元從押牙副典客頗稱任使光化元年三月太祖令往光州説刺史劉存背淮賊以向國又從李彦威復黃州及武昌縣獲刺史瞿章俄復使光州持幣馬以賜劉存㑹淮賊急攻光州存與嗣勲率兵大戰敗而走之又遣使于蜀及歸得其助軍貲實甚多天復中太祖迎昭宗于岐下軍至華之西闉使嗣勲入見韓建卽時同出迎謁及羅紹威將殺牙軍遣使告于太祖求爲外援時安陽公主初卒于魏太祖乃遣嗣勲率長直官千人實兵仗于槖中肩舁以入于魏聲言來致祭㑹葬牙軍不之覺天祐三年正月十六日夜嗣勲與紹威親軍同攻牙軍至曙盡殪之嗣勲重傷旬日而卒開平中累贈太保張存敬譙郡人也性剛直有膽勇臨危無所畏憚唐中和中從太祖赴汴以其折節頗見親昵授爲右騎都將從討巢蔡凡歴百戰多于危慼之間顯有竒畧由是頻立殊効光啓中李罕之㑹晉軍圍張宗奭于盟津太祖遣丁㑹葛從周存敬同往馳救存敬引騎軍先犯敵將諸軍翼之敵騎大敗乃解河橋之圍大順三年爲諸軍都虞侯佐霍存董大軍收宿州以功奏加檢校兵部尚書太祖東征徐兖存敬屢有俘斬之功凡受指顧皆與機㑹矢石所及必以身先太祖尤加優異以爲行營都指揮使檢校右僕射乾寧三年充武寧軍畱後行潁州刺史光化二年夏四月幽滄侵凌魏郡復以存敬爲都指揮使三年大舉與葛從周連統諸軍攻浮陽樹數十柵圍劉守文累月時幽州劉仁恭舉兵來援存敬潛軍擊之于乾寧軍南老鴉堤是日燕人大敗斬首五萬級生擒馬愼交已下一百餘人獲馬萬蹄其年秋九月引軍收鎭州存敬勒衆渉滹沲河師人鼓行而進逄鎭之遊兵數千因逐之直入鎭之壅門收鞍馬牛駞萬計翼日鎭人納質而旋尋爲宋州刺史踰年甚有能政復擁衆伐薊門數旬間連下瀛莫祁景四州擒俘不可勝紀自懷德驛與中山兵接戰枕屍數十里中山開壁請降天復元年春太祖以河中}
