  - {type: variant, offset: 6, length: 1, content: 十, WYG: 集漕運波注日以收復爲名惟將軍察之太祖曰我意素决爾又如是復何疑哉翼日遂定策戮僞監軍使悉衆歸順于河中王重榮表瞳爲檢校屯田員外郎賜緋令奉表于蜀唐僖宗大悦召入顧問錫賚甚厚以功授朝散大夫太子率更令賜紫爲陵州刺史治郡}
