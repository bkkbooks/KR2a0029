  - {type: variant, offset: 141, length: 4, content: 樞密稱得, krp: 叢折宗權足納欵于太祖使捍奏其事加兼御史大夫光化三年六月太祖北伐鎭定至常山而王鎔危懾送欵于太祖命捍入璧門傳諭時兩軍未整守門者戈㦸千匝捍馳騎而入竟達其命又移師以攻中山至懐德驛大破定人五萬衆王處直乞降捍復單馬入州安撫而迴太祖迎昭宗于岐下以捍爲親軍指揮天復三年正旦宋文通令客將郭啓竒使于太祖命捍復命昭宗聞其至卽召見詢東兵之事仍以錦服銀鞍勒馬賜之翼日授光禄大夫檢校司空登州刺史昭宗還京改常州刺史賜號迎鑾毅勇功臣四月太祖伐王師範于青州改左右長直都指揮使天祐三年正月授宋州刺史四月加檢校司徒太祖授禪授左龍虎統軍兼元從親軍馬步都虞候及上黨纒兵太祖親往廵撫以捍爲御營使大軍次昻車斥候來告蕃戎逼澤州命捍以兵千人赴之并軍遂遁車駕還京授捍侍衛親軍都指揮使晉人侵晉州從幸陜迴加檢校太保及從駕幸}
