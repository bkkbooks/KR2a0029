  - {type: variant, offset: 2817, length: 513, content: 劉仲殷權知潞州軍州事戊辰以安州節度使高行珪卒輟朝有司上言皇后受冊內外命婦並合奉賀今未有命婦準例上表稱賀中書門下奏諸道節度使但進表上言皇帝外命婦上皇后賀牋表進呈訖無報應皇親或有慶賀及起居章表內中進呈後祇宣示來使並不合答復從之壬申以權知昭義軍軍州事劉仲殷為潞州節度使檢校太傅丁丑帝臨軒命使冊淑妃曹氏為皇后禮院上言百官上疏於皇后曰皇后殿下及六宮及率土婦人慶賀祇呼殿下不言皇后中書覆奏若祇呼殿下恐與皇太子無所分別凡上中宮表章呼皇后殿下若不形文字尋常祇呼皇后從之癸未太子少傅蕭頃卒廢朝甲申迴鶻可汗仁裕遣使貢方物辛卯以翰林承旨兵部侍郎李愚為太常卿壬辰以前滑州節度使李從璋為右驍衞上將軍六月丁酉以護駕馬軍都指揮使貴州刺史安從進為宣州節度使充護駕馬軍都指揮使以護駕步軍都指揮使澄州刺史藥彥稠為壽州節度使兼護駕步軍都指揮使甲辰以皇城使安崇緒為河陽留後重誨子也鳳翔奏所管良晏匡三州並無屬縣請却改為縣從之仍舊為軍鎮前振武節度使安金全卒壬子中書門下奏詳覆到禮部院今年及第進士李飛樊吉夏侯珙吳沺王德柔李穀等六人望放及第其盧價等七人及賓貢鄭朴望許令將來就試知貢舉張文寶試士不得精當張文寶原本作人寶今據五代會要改正影庫本粘籤望罰一季俸從之丁巳皇子北京留守河, WYG: ''}
