  - {type: variant, offset: 4, length: 1, content: 卷, WYG: 巻二十宋門下侍郎參知政事監修國史薛居正等撰梁書第二十列𫝊十謝瞳字子明福州人唐咸通末舉進士因畱長安三歲不中第廣明初黄巢陷長安遂投跡于太祖洎居門下未嘗一日不在左右及太祖據同州遂署右職其年秋太祖與河中交戰再不利連上章請兵于巢僞右軍都尉孟楷抑而不進瞳揣太祖有澤福意乃進説曰黃家以數十萬之師値唐朝久安人不習戰因利乘便遂下兩京然始竊僞號任用已失其所今將軍勇冠三軍力戰于外而孟楷專務壅蔽奏章不達下爲庸才所制無獨斷之明破亡之兆必矣况土德未厭外兵}
  - {type: page-break, offset: 4, content: '', id: KR2a0029_WYG_041-1b, image: WYG0277/WYG0277-0180d.png}
