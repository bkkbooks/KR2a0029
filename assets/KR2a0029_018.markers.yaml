  - {type: variant, offset: 47, length: 1010, content: 衣為是今改正唐僖宗朝累為顯官文蔚幼礪文行求知取友藹然有佳士之稱唐乾符初登進士第時丞相裴坦兼判鹽鐵解褐署巡官未幾以畿尉直館丁家艱以孝聞中和歲僖宗在蜀大寇未滅大寇原本作大熟今據文改正影庫本粘籤急於軍費移鹽鐵於揚州命李都就判之奏為轉運巡官駕還長安除監察御史遷左補闕侍御史起居舍人司勳吏部員外郎拜司勳郎中知制誥歲滿授中書舍人丁母憂退居東畿哀毀過禮服闋復拜中書舍人俄召入翰林為承旨學士屬昭宗初還京闕皇綱寖微文蔚所發詔令靡失厥中論者多之轉戶部侍郎仍依前充職尋出為禮部侍郎天祐元年夏拜中書侍郎平章事兼判戶部時柳璨在相位擅權縱暴傾陷賢儁宰相裴樞等五家及三省而下三十餘人咸抱寃就死縉紳以目不敢竊語其是非餘怒所注亦不啻十許輩文蔚殫其力解之乃止士人賴焉璨敗死文蔚兼度支鹽鐵使天祐四年天子以土運將革天命有歸四月命文蔚與楊涉等總率百僚奉禪位詔至大梁太祖受命文蔚等不易其位開平二年春暴卒於位詔贈右僕射文蔚沈邃重厚有大臣之風居家孝且悌雖位至清顯與仲季相雜在太夫人膝下一不異布素弟濟美早得心恙案舊唐書云文蔚弟濟美貽憲相繼以進士登第北夢瑣言云張裼尚書有五子文蔚彝憲濟美仁龜皆有名第至宰輔丞郎內一子忘其名少年聞壁魚食神仙字身有五色吞之可得仙因欲試之遂致心疾是得疾者別自一人非濟美也文蔚撫視殆三十年士君子稱之子鑄周顯德中位至祕書監永樂大典卷六千三百五十一薛貽矩字熙用河東聞喜人祖存父廷望咸有令名貽矩風儀秀聳其與游者皆一時英妙藉甚於文場間唐乾符中登進士第歷度支巡官集賢校理拾遺殿中起居舍人召拜翰林學士加禮部員外郎知制誥轉司勳郎中其職如故乾寧中天子幸石門貽矩以私屬相失不及於行在罷之旋除中書舍人再踐內署內署原本作內書署以文義求之書字當係衍文今刪去影庫本粘籤歷戶部兵部侍郎學士承旨及昭宗自鳳翔還京大翦閹寺貽矩尚為韓全誨等作畫讚悉紀于內侍省屋壁間坐是謫官天祐初除吏部侍郎不至太祖素重之嘗言之于朝即日拜吏部尚書俄遷御史大夫四年春唐帝命貽矩持詔赴大梁議禪代之事貽矩至盛稱太祖功德請就北面之禮太祖雖謙抑不納待之甚厚受禪之歲夏五月拜中書侍郎平章事兼判戶部明年夏進拜門下侍郎監修國史判度支又遷弘文館大學士充鹽鐵轉運使累官自僕射至守司空在任綿五載案歐史梁本紀貽矩以開平元年同平章事至乾化二年薨統計貽矩居相位共六年歐史唐六臣傳貽矩為梁相五年卒尚仍薛史之誤然亦無顯赫事跡可紀扈從貝州還染時癘旬日卒于東京詔贈侍中永樂大典卷二萬一千三百六十七張策字少逸燉煌人父同父同唐摭言作父同文薛史與, WYG: ''}
