  - {type: variant, offset: 1166, length: 306, content: 年為延康其年十月文帝受漢禪始號黃初則是黃初元年無二月明矣鼎文何謬歟同大驚亟遣啟書室取魏志展讀一不失所啟宗族奇之時年十三然而妙通因果酷奉空教未弱冠落髮為僧居雍之慈恩精廬頗有高致唐廣明末大盜犯闕策遂返初服奉父母逃難君子多之及丁家艱以孝聞服滿自屏郊藪一無干進意若是者十餘載案唐摭言云張策自少從學浮圖法號藏機粲名內道場為大德廣明庚子之亂趙少師崇凝主文策謂時事更變求就貢籍崇凝庭譴之策不得已復舉博學鴻詞崇凝職受天官復黜之仍顯揚其過又北夢瑣言載趙崇凝之辭曰張策衣冠子弟無故出家不能參禪訪道抗跡塵外乃于御簾前進詩希望恩澤如此行止豈掩人口某十度知舉十度斥之薛史以為自屏郊藪無仕進意與摭言諸書異孔本方出為廣文博士改祕書郎王行瑜帥邠, WYG: 正滄}
