  - {type: variant, offset: 4510, length: 1512, content: 千四百二十四五代史補敬翔應三傳數舉不第發憤投太祖願備行陣太祖問曰足下通春秋久矣今吾主盟其為戰欲效春秋時可乎翔曰不可夫禮樂猶不相沿襲況兵者詭道宜其變化無窮若復如春秋時則所謂務虛名而喪其實效大王之事去矣太祖大悅以為知兵遽延之幕府委以軍事竟至作相李振字興緒唐潞州節度使抱真之曾孫也祖父皆至郡守振仕唐自金吾將軍改台州刺史會盜據浙東不克之任因西歸過汴以策略干太祖太祖奇之辟為從事太祖兼領鄆州署天平軍節度副使湖南馬殷為朗州雷滿所逼振奉命馳往和解殷滿皆稟命光化三年十一月太祖遣振入奏於長安舍於州邸邸吏程巖白振曰劉中尉命其姪希貞來計大事案原本作希直今據通鑑改正舊五代史考異欲上謁願許之既至巖乃先啟曰主上嚴急內官憂恐左中尉欲行廢黜之事巖等協力以定中外敢以事告振顧希貞曰百歲奴事三歲主亂國不義廢君不祥非敢聞也況梁王以百萬之師匡輔天子禮樂尊戴猶恐不及幸熟計之希貞大沮而去案通鑑考異疑李振之拒希貞為誤謂李振若已立異豈敢復入長安與崔胤謀反正乎今考梁祖紀亦云李振自長安使迴當時季述懼汴梁兵力固不能阻李振之往來薛史所書宜可徵信及振復命劉季述等果作亂程巖率諸道邸吏牽帝下殿以立幼主奉昭宗為太上皇振至陝陝已賀矣護軍韓彝範言其事振曰懿皇初昇遐韓中尉殺長立幼以利其權遂亂天下今將軍復欲爾耶彝範即文約孫也由是不敢言振東歸太祖方在邢洺遽還于汴大計未決季述遣養子希度以唐之社稷欲輸于太祖又遣供奉官李奉本案原本脫奉本二字據本傳增入舊五代史考異副介支彥勳詐齎上皇誥諭至皆季述黨也太祖未及迎命振又言曰夫豎刁伊戾之亂所以資霸者之事也今閹豎幽辱天子王不能討無以令諸侯時監軍使劉重楚季述兄也舊相張濬寓於河南緱氏亦來謂太祖曰同中官則事易濟且得所欲唯振堅執不改獨曰行正道則大勳可立太祖英悟忽厲色曰張公勸我同勅使欲傾附自求宰相耶案舊唐書昭宗紀崔胤與前左僕射張濬告難于全忠張濬傳亦云德王廢立之際濬致書諸藩請圖匡復薛史作張濬黨于季述為梁祖所拒與舊唐書異乃定策縶偽使李奉本支彥勳與希度等即日請振將命于京師與宰相謀返正未幾劉季述伏誅昭宗復帝位太祖聞之喜召振執其手謂之曰卿所謀是吾本志穹蒼其知之矣自是益重之天祐二年春正月太祖召振謂曰王師範來降易歲尚處故藩今將奏請徙授方面其為我馳騎以茲意達之振至青州師範即日出公府以節度觀察二印及文簿管鑰授於振師範雖已受代而疑撓特甚屢揮泣求貸其族振因以切理諭之曰公不念張繡事耶漢末繡屢與曹公立敵豈德之耶及袁紹遣使招繡賈詡曰袁家父子自不相容何能主天下英士曹公挾天子令諸侯其志大不以私讎為意不宜疑之今梁王亦豈以私怨私怨原本作私恕今據文改正影庫本粘籤害忠賢耶師範洒然大悟翌日以其族遷太祖乃表振為青州留後未幾徵還唐自昭宗遷都之後王室微弱朝廷班行備員而已振皆頤指氣使旁若無人朋附者非次奬升私惡者沈棄振每自汴入洛朝中必有貶竄故唐朝人士目為鴟梟天祐中唐宰相柳璨希太祖旨譖殺大臣裴樞陸扆等七人於滑州白馬驛時振自以咸通乾符中嘗應進士舉累上不第尤憤憤乃謂太祖曰此輩自謂清流宜投於黃河永為濁流太祖笑而從之洎太祖受禪自宣義軍節度副使檢校司徒授殿中監累遷戶部尚書庶人友珪篡立代敬翔為崇政院使末帝即位趙張二族用事遂為所間謀猷獻替多不見從振每稱疾避事龍德末閑居私第將期矣晉主入汴振謁見首罪郭崇韜指振謂人曰人言李振乃一代奇才吾今見之乃常人耳會段凝等疏梁氏權要之臣振與敬翔等同日族誅永樂大典卷一萬三百八十六史臣曰文蔚貽矩皆唐朝之舊臣遇梁室之強禪奉君命以來使狎神器以授之逢時若斯亦為臣者之不幸也抑不為其相不亦善乎杜曉著文雅之稱張策有沖淡之量咸登台席無忝士林敬翔李振始輔霸圖終成帝業及國之亡也一則殞命以明節一則視息以偷生以此較之翔為優矣振始有濁流之言終取赤族之禍報應之事固以昭然永樂大典卷一萬三百八十八, WYG: 攷證}
