  - {type: variant, offset: 2327, length: 450, content: 秋拜中書侍郎平章事案杜曉入相之歲歐陽史紀作三年傳作二年吳縝已辨其誤舊五代史考異仍判戶部庶人友珪篡位遷禮部尚書平章事集賢殿大學士依前判戶部及袁象先之討友珪禁兵大縱曉中重創而卒末帝即位詔贈右僕射曉博贍有詞藻時論稱之兄光乂案新唐書表光乂字啟之有心疹厥疾每作或溢喙縱詬或揮梃追撲曉事之愈恭未嘗一日少怠居兩制之重祖述前載甚得王言之體案北夢瑣言云曉貌如削玉有制誥之才及典秩尚書志氣甚遠一旦非分而沒咸寃惜焉豈三世為相道忌太盛歟永樂大典卷一萬四千七百三十敬翔字子振同州馮翊人唐神龍中平陽王暉之後也曾祖琬綏州刺史祖忻同州掾父袞集州刺史翔好讀書尤長刀筆應用敏捷乾符中舉進士不第及黃巢陷長安乃東出關時太祖初鎮大梁有觀察支使王發者翔里人也翔往依焉發以故人遇之然無由薦達翔久之計窘乃與人為牋刺往往有警句傳於軍中太祖比不知書章檄喜淺近語聞翔所作愛之謂發曰知公鄉人有才可與俱來及見應對稱旨即補右職每令從軍翔不喜武職求補文吏即署館驛巡官俾專掌檄奏太祖與蔡賊相拒累歲城門之外戰聲相聞機略之間翔頗預之太祖大悅恨得翔之晚故軍謀政術一以諮之, WYG: ''}
