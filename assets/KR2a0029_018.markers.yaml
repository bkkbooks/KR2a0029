  - {type: variant, offset: 2843, length: 1666, content: 考異蔡賊平奏授太子中允賜緋從平兗鄆改檢校水部郎中太祖兼鎮淮南授揚府左司馬揚府原本作陽府考歐陽史作揚府蓋即揚州都督府之省文今改正影庫本粘籤賜金紫乾寧中改光祿少卿充職天復中授檢校禮部尚書遙領蘇州刺史昭宗自岐下還長安御延喜樓召翔與李振登樓勞問翔授檢校右僕射太府卿賜號迎鑾叶贊功臣太祖受禪自宣武軍掌書記前太府卿授檢校司空依前太府卿勾當宣徽院事尋改樞密院為崇政院以翔知院事開平三年夏四月太祖以邠岐侵擾遣劉知俊西討鄜延深憂不濟因宴顧翔以問西事翔剖析山川郡邑虛實軍糧多少悉以條奏如素講習左右莫不驚異太祖嘆賞久之乾化元年進位光祿大夫行兵部尚書金鑾殿大學士知崇政院事平陽郡侯前朝因金巒坡金巒歐陽史通鑑俱作鸞唯五代會要與薛史同今仍從原文附識于此影庫本粘籤以為門名與翰林院相接故得為學士者稱金巒以美之今殿名金鑾從嘉名也案原本脫名字今從職官志增入舊五代史考異置大學士始以翔為之案五代會要云以金鑾為名非典也大學士與三館大學士同翔自釋褐東下遭遇霸王懷抱深沉有經濟之略起中和歲至鼎革大運其間三十餘年案歐陽史作從太祖用兵三十餘年蓋仍薛史之文吳縝纂誤云朱全忠以中和三年癸卯歲為汴州節度使至建國受禪迄于乾化二年壬申遇弒正三十年不得云三十餘年也舊五代史考異扈從征伐出入帷幄庶務叢委恆達旦不寢唯在馬上稍得晏息每有所裨贊亦未嘗顯諫上俛仰顧步間微示持疑爾而太祖意已察必改行之故裨佐之迹人莫得知及太祖大漸召至御床前受顧託之命且深以幷寇為恨翔嗚咽不忍受命而退案通鑑乾化二年六月丁丑朔帝命敬翔出友珪為萊州刺史即令之官已宣旨未行勅蓋即敬翔所受之命戊寅太祖被弒命未及行故薛史亦不為詳載庶人友珪之篡位也以天下之望命翔為宰相友珪以翔先朝舊臣有所畏忌翔亦多稱病不綜政事末帝即位趙張之族皆處權要翔愈不得志及劉鄩失河朔安彥之喪楊劉翔奏曰國家連年遣將出征封疆日削不獨兵驕將怯亦制置未得其術陛下處深宮之中與之計事者皆左右近習豈能量敵之勝負哉先皇時河朔半在親御虎臣驍將猶不得志於敵人今寇馬已至鄆州陛下不留聖念臣所未諭一也臣聞李亞子自墨縗統衆於今十年每攻城臨陣無不親當矢石昨聞攻楊劉率先負薪渡水一鼓登城陛下儒雅守文未嘗如此俾賀瓌賀瓌原本作環冊府元龜引薛史亦作環新舊唐書歐陽史及通鑑皆作瓌今改正影庫本粘籤輩與之較力而望攘逐寇戎臣所未諭二也陛下所宜詢於黎老別運沉謀不然則憂未艾也臣雖駑怯受國恩深陛下必若乏材乞於邊陲効試末帝雖知其懇惻竟以趙張輩言翔怨望不之聽及王彥章敗於中都晉人長驅而南末帝急召翔謂之曰朕居常忽卿所奏果至今日事急矣勿以為懟且使朕安歸翔泣奏曰臣受國恩僅將三紀從微至著皆先朝所遇雖名宰相實朱氏老奴耳事陛下如郎君以臣愚誠敢有所隱陛下初任段凝為將臣已極言小人朋附致有今日晉軍即至段凝限水欲請陛下出居避狄陛下必不聽從欲請陛下出奇應敵陛下必不果决縱良平復生難以轉禍為福請先死不忍見宗廟隕墜言訖君臣相向慟哭及晉主陷都城有詔赦梁氏臣僚李振謂翔曰有制洗滌將朝新君翔曰新君若問其將何辭以對是夜翔在高頭里第宿於車坊案原本作中今據歐陽史及通鑑改正舊五代史考異欲曙左右報曰崇政李太保已入朝翔返室嘆曰李振謬為丈夫耳朱氏與晉仇讎我等始同謀畫致君無狀今少主伏劍于國門縱新朝赦罪何面目入建國門也乃自經而卒數日幷其族被誅初貞明中史臣李琪張袞郄殷象馮錫嘉奉詔修撰太祖實錄三十卷述非工事多漏略復詔翔補緝其闕翔乃別纂成三十卷目之曰大梁編遺錄與實錄偕行案編遺錄通鑑考異引之書錄解題云朱梁興創遺編二十卷梁宰相敬翔子振撰自廣明巢賊之亂朱溫事迹迄於天祐弒逆大書特書不以為愧也其辭亦鄙俚舊五代史考異翔妻劉氏父為藍田令廣明之亂劉為巢將尚讓所得巢敗讓攜劉降於時溥及讓誅時溥納劉於妓室太祖平徐得劉氏嬖之屬翔喪妻因以劉氏賜之及翔漸貴劉猶出入太祖臥內翔情禮稍薄劉於曲室讓翔曰卿鄙余曾失身於賊耶以成敗言之尚讓巢之宰輔時溥國之忠臣論卿門第辱我何甚請從此辭翔謝而止之劉恃太祖之勢案原本下有缺文太祖四鎮時劉已得國夫人之號車服驕侈婢媵皆珥珠翠其下別置爪牙典謁書幣聘使交結藩鎮近代婦人之盛無出其右權貴皆相附麗寵信言事不下於翔當時貴達之家從而效之敗俗之甚也永樂大典卷一萬, WYG: 巻}
