  - {type: variant, offset: 806, length: 210, content: 書作克用以大將馬師素權知邢洺團練事與薛史異五月鄆州節度使朱瑄為汴軍所攻遣使來乞師武皇遣騎將安福順安福應安福遷督精騎五百假道於魏州以應之案舊唐書云乾寧元年正月瑄瑾勢求救於太原李克用出師援之薛史作五月與舊唐書異考朱瑄朱瑾自魚山之敗其勢始當由正月遣使乞援至援師之出自在五月耳九月潞州節度使康君立以酖死十月武皇自晉陽率師伐幽州初李匡儔奪據兄位燕人多不義之安塞軍戍將劉仁恭挈族歸於武皇武皇遇之甚厚仁恭數進畫於蓋寓言幽州可取之狀願得, WYG: ''}
