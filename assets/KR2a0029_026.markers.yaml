  - {type: variant, offset: 3125, length: 4424, content: 加實封二百戶武皇復上表請討李茂貞天子不允武皇私謂詔使曰觀主上意疑僕別有他腸復何言哉但禍不去胎憂患未已又奏臣統領大軍不敢徑赴朝覲遂班師乾寧三年正月汴人大舉以攻兗鄆朱瑄朱瑾再乞師於武皇假道於魏州羅弘信許之乃令都指揮使李存信將步騎三萬與李承嗣史儼會軍以拒汴人存信軍於莘與朱瑾合勢頻挫汴軍汴帥患之乃間魏人存信御兵無法稍侵魏之芻牧者弘信乃與汴帥通出師三萬攻存信軍存信揭營而退保於洺州三月武皇大掠相魏諸邑攻李固洹水殺魏兵萬餘人進攻魏州案舊唐書六月庚戌李克用率沙陀幷汾之衆五萬攻魏州及其郛大掠於其六郡陷城安洹水臨漳十餘邑報莘之怒也薛史作三月事蓋自三月興師至十月始退耳五月汴將葛從周氏叔琮引兵赴援六月李茂貞舉兵犯京師七月車駕幸華州是月武皇與汴軍戰於洹水之上鐵林指揮使落落被擒落落武皇之長子也既戰馬踣於坎武皇馳騎以救之其馬亦踣汴之追兵將及武皇背射一發而斃乃退九月李存信攻魏之臨清汴將葛從周等引軍來援大敗於宗城北存信進攻魏州十月武皇敗魏軍於白龍潭追擊至觀音門汴軍救至乃退十一月武皇徵兵於幽鎮定三州將迎駕於華下幽州劉仁恭託以契丹入寇俟敵退聽命乾寧四年正月汴軍陷兗鄆騎將李承嗣史儼與朱瑾同奔於淮南三月陝帥王珙攻河中王珂來告難武皇遣李嗣昭率二千騎赴之破陝軍於猗氏乃解河中之圍至是天子遣延王戒丕至晉陽傳宣旨於武皇朕不取卿言以及於此苟非英賢竭力朕何由再謁廟庭在卿表率予所望也七月武皇復徵兵於幽州劉仁恭辭旨不遜武皇以書讓之仁恭捧書謾罵捧書疑當作持書考冊府元龜所引薛史亦作捧書今姑仍其舊影庫本粘籤抵之於地仍囚武皇之行人八月大舉以伐仁恭九月師次蔚州戊寅晨霧晦暝占者云不利深入辛巳攻安塞俄報燕將單可及領騎軍至矣武皇方置酒高會前鋒又報賊至矣武皇曰仁恭何在曰但見可及輩武皇張目怒曰可及輩何足為敵仍促令出師燕軍已擊武皇軍寨武皇乘醉擊賊燕軍披靡時步兵望賊而退為燕軍所乘大敗於木瓜澗俄而大風雨震電燕軍解去武皇方醒甲午師次代州劉仁恭遣使謝罪於武皇武皇亦以書報之自此有檄十餘返光化元年春正月鳳翔李茂貞華州韓建皆致書於武皇乞修和好同奬王室兼乞助丁匠修繕秦宮武皇許之四月汴將葛從周寇邢洺磁等州旬日之內三州連陷汴人以葛從周為邢州節度使大將李存信收軍自馬嶺而旋八月壬戌天子自華還宮是時車駕初復而欲諸侯輯睦賜武皇詔令與汴帥通好武皇不欲先下汴帥乃致書於鎮州王鎔令導其意明年汴帥遣使奉書幣來修好武皇亦報之自是使車交馳朝野相賀九月武皇遣周德威李嗣昭率兵三萬出青山口以迫邢洺十月遇汴將葛從周於張公橋張公橋原本作張恭考舊唐書唐鑑俱作張公今改正影庫本粘籤既戰我軍大敗是月河中王珂來告急言王珙引汴軍來寇武皇遣李嗣昭將兵三千以援之屯於胡壁堡汴軍萬餘人來拒戰嗣昭擊退之十二月潞州節度使薛志勤卒澤州刺史李罕之以本軍夜入潞州據城以叛罕之報武皇曰薛鐵山新死潞民無主慮軍城有變輒專命鎮撫武皇令人讓之罕之乃歸於汴武皇遣李嗣昭將兵討之下澤州收罕之家屬拘送晉陽光化二年春正月李罕之陷沁州三月汴將葛從周氏叔琮自土門陷承天軍又陷遼州進軍榆次武皇令周德威擊之敗汴軍於洞渦驛叔琮棄營而遁德威追擊出石會關石會關原本作名會考歐陽史通鑑俱作石會今改正影庫本粘籤殺千餘人汴人復陷澤州五月武皇令都指揮使李君慶將兵收澤潞為汴軍所敗而還以李嗣昭為都指揮使進攻潞州八月嗣昭營於潞州城下前鋒下澤州時汴將賀德倫張歸厚等守潞州是月德倫等棄城而遁潞州平九月武皇表汾州刺史孟遷為潞州節度使光化三年汴軍大寇河朔幽州劉仁恭乞師武皇遣周德威帥五千騎以援之七月李嗣昭攻堯山至內丘敗汴軍於沙河進攻洺州下之九月汴帥自將兵三萬圍洺州嗣昭棄城而歸葛從周設伏於青山口嗣昭之軍不利十月汴人乘勝寇鎮定鎮定懼皆納賂於汴是時周德威與燕軍劉守光敗汴人二萬於望都聞定州王郜來奔乃班師是月天子加武皇實封一百戶遣李嗣昭率步騎三萬攻懷州下之進攻河陽汴將閻寶率軍來援嗣昭退保懷州天復元年正月汴將張存敬攻陷晉絳二州以兵二萬屯絳州以扼援路二月張存敬迫河中王珂告急於武皇使者相望於路珂妻邠國夫人武皇愛女也亦以書至懇切求援武皇報曰賊阻道路衆寡不敵救爾即與爾兩亡可與王郎棄城歸朝珂遂送款於張存敬三月汴帥自大梁至河中王珂遂出迎尋徙於汴天子以汴帥兼鎮河中武皇自是不復能援京師霸業由是中否四月汴將氏叔琮率兵五萬自太行路寇澤潞魏博大將張文恭領軍自新口入葛從周領兗鄆之衆自土門入張歸厚以邢洺之衆自馬嶺入定州王處直之衆自飛狐入侯言以晉絳之兵自陰地入氏叔琮康懷英營於澤州之昂車昂車原本作昂卑考通鑑及冊府元龜俱作昂車今改正影庫本粘籤武皇令李嗣昭將三千騎赴澤州援李存璋而歸賀德倫氏叔琮軍至潞州孟遷開門迎沁州刺史蔡訓亦以城降於汴氏叔琮悉其衆趨石會關是時偏將李審建先統兵三千在潞州亦與孟遷降於汴及叔琮之入寇也審建為其鄉導汴人營於洞渦別將白奉國與鎮州大將石公立自井陘入自井陘入原本脫自字今據通鑑增入影庫本粘籤陷承天軍及攻壽陽遼州刺史張鄂以城降於汴都人大恐時霖雨積旬汴軍屯聚既衆芻糧不給復多痢瘧師人多死時大將李嗣昭李嗣源每夜率驍騎突營掩殺敵衆恐懼五月汴軍皆退氏叔琮軍出石會周德威李嗣昭以精騎五千躡之殺戮萬計初汴軍之將入寇也汾州刺史李瑭據城叛以連汴人至是武皇令李嗣昭李存審將兵討之是歲并汾饑粟暴貴人多附瑭為亂嗣昭悉力攻城三日而拔擒李瑭等斬於晉陽市氏叔琮既旋軍過潞州擄孟遷以歸汴帥以丁會為潞州節度使六月遣李嗣昭周德威將兵出陰地攻慈隰二郡隰州刺史唐禮慈州刺史張瓌並以城來降武皇以汴寇方盛難以兵服佯降心以緩其謀乃遣牙將張特持幣馬書檄以諭之陳當時利害請復舊好十一月壬子汴帥營於渭濱甲寅天子出幸鳳翔案新唐書帝如鳳翔李茂貞韓全誨請召克用入衞克用間道遣使者奔問並詒書全忠勸還汴全忠不答舊五代史考異武皇遣李嗣昭率兵三千自沁州趨平陽遇汴軍於晉州北斬首五百級天復二年二月李嗣昭周德威領大軍自慈隰進攻晉絳營於蒲縣乙未汴將朱友寧氏叔琮將兵十萬營於蒲縣之南乙巳汴帥自領軍至晉州德威之軍大恐三月丁巳有虹貫德威之營戊午氏叔琮率軍來戰德威逆擊為汴人所敗兵仗輜車委棄殆盡朱友寧長驅至汾州慈隰二州復為汴人所據辛酉汴軍營於晉陽之西北攻城西門周德威李嗣昭緣山保其餘衆而旋武皇驅丁壯登陴拒守汴軍攻城日急武皇召李嗣昭周德威等謀將出奔雲州嗣昭以為不可李存信堅請且入北蕃續圖進取嗣昭等固爭之太妃劉氏亦極言於內乃止居數日亡散之士復集軍城稍安李嗣昭與李嗣源夜入汴軍斬將搴旗敵人扞禦不暇自相驚擾丁卯朱友寧燒營而遁周德威追至白壁關白壁關原本作向辟今從歐陽史改正影庫本粘籤俘斬萬計因收復慈隰汾等三州天復三年正月天子自鳳翔歸京五月雲州都將王敬暉殺刺史劉再立以城歸於劉仁恭武皇遣李嗣昭討之仁恭遣將以兵五萬來援雲州嗣昭退保樂安燕人擄敬暉棄城而去武皇怒笞嗣昭及李存審而削其官是時親軍萬衆皆邊部人動違紀律人甚苦之左右或以為言武皇曰此輩膽略過人數十年從吾征伐比年以來國藏空竭諸軍之家賣馬自給今四方諸侯皆懸重賞以募勇士吾若束之以法急則棄吾吾安能獨保此乎俟時開運泰吾固自能處置矣天祐元年閏四月汴帥迫天子遷都於洛陽案新唐書帝東遷詔至太原克用泣謂其下曰乘輿不復西矣遣使者奔問行在舊五代史考異五月乙丑天子制授武皇叶盟同力功臣加食邑三千戶實封三百戶八月汴帥遣朱友恭弒昭宗於洛陽宮輝王即位告哀使至晉陽武皇南向慟哭三軍縞素天祐二年春契丹阿保機始盛武皇召之阿保機領部族三十萬至雲州與武皇會於雲州之東握手甚歡結為兄弟旬日而去留馬千匹牛羊萬計案武皇會契丹於雲州通鑑作開平元年新唐書作天祐元年與薛史異歐陽史與薛史同又契丹國志作晉王存勗與契丹連和會於東城殊誤東都事略契丹與晉王會在天祐三年遼史太祖與薛史同期以冬初大舉渡河天祐三年正月魏博既殺牙軍魏將史仁遇據高唐以叛遣人乞師於武皇武皇遣李嗣昭率三千騎攻邢州以應之遇汴將牛存節張筠於青山口嗣昭不利而還九月汴帥親率兵攻滄州幽州劉仁恭遣使來乞師武皇乃徵兵於仁恭將攻潞州以解滄州之圍仁恭遣掌書記馬郁都指揮使李溥等將兵三萬李溥原本作李俌考冊府元龜及通鑑俱作溥今改正影庫本粘籤會於晉陽武皇遣周德威李嗣昭合燕軍以攻澤潞十二月潞州節度使丁會開門迎降命李嗣昭為潞州節度使以丁會歸於晉陽天祐四年正月甲申汴帥聞潞州失守自滄州燒營而遁四月天子禪位於汴帥奉天子為濟陰王改元為開平國號大梁是歲四川王建遣使至勸武皇各王一方俟破賊之後訪唐朝宗室以嗣帝位然後各歸藩守武皇不從以書報之曰竊念本朝屯否巨業淪胥攀鼎駕以長違撫彤弓而自咎默默終古悠悠彼蒼生此厲階永為痛毒視橫流而莫救徒誓檝以興言別捧函題過垂奬諭省覽周既駭惕異常淚下霑衿倍鬱申胥之素汗流浹背如聞蔣濟之言蔣濟原本作蔣沇今從冊府元龜改正影庫本粘籤僕經事兩朝受恩三代位叨將相籍係宗枝賜鈇金戊以專征徵苞茅而問罪鏖兵校戰二十餘年竟未能斬新莽之頭顱斷蚩尤之肩髀以至廟朝顛覆豺虎縱橫且授任分憂叨榮冒寵龜玉毀櫝誰之咎歟俯閱指陳不勝慚恧然則君臣無常位陵谷有變遷或箠塞長河泥封函谷時移事改理有萬殊即如周末虎爭魏初鼎據孫權父子不顯授於漢恩劉備君臣自微興於涿郡得之不謝於家世失之無損於功名適當逐鹿之秋何惜華蟲之服唯僕累朝席寵席寵原本作膺寵今從冊府元龜改正影庫本粘籤奕世輸忠忝佩訓詞粗存家法善博奕者唯先守道治蹊田者不可奪牛誓於此生靡敢失節仰憑廟勝早殄寇讎如其事與願違則共臧洪遊於地下亦無恨矣唯公社稷元勳嵩衡降祉鎮九州之上地負一代之弘才合於此時自求多褔所承良訊非僕深心天下其謂我何有國非吾節也慺慺孤懇此不盡陳五月梁祖遣其將康懷英率兵十萬圍潞州懷英驅率士衆築壘環城城中音信斷絕武皇遣周德威將兵赴援德威軍於余吾率先鋒挑戰日有俘獲懷英不敢即戰梁祖以懷英無功乃以李思安代之案李思安之代懷英通鑑作七月事與薛史繫五月異舊五代史考異思安引軍將營於潞城潞城原本作澤城考通鑑歐陽史五代春秋俱作李思安圍潞城今改正影庫本粘籤周德威以五千騎搏之梁軍大敗斬首千餘級思安退保