  - {type: variant, offset: 1017, length: 2013, content: 一萬指期平定武皇方討李存孝於邢州輟兵數千欲納仁恭不利而還匡儔由是驕怠數犯邊境武皇怒故率軍以討之是時雲州吐渾赫連鐸白義誠並來歸命皆笞而釋之案舊唐書昭宗紀六月壬辰克用攻陷雲州執赫連鐸新唐書昭宗紀六月赫連鐸與李克用戰於雲州死之通鑑從新唐書作李克用大破吐谷渾殺赫連鐸擒白義誠俱與薛史異考雲州諸部因討李匡儔而來歸自當在十月而諸書皆作六月恐未足據十一月進攻武州甲寅案甲寅字誤下文十二月有辛亥壬子甲寅則十一月不得有甲寅也據通鑑考異蓋薛史仍紀年錄之誤攻新州十二月李匡儔命大將率步騎六萬救新州武皇選精甲逆戰燕軍大敗斬首萬餘級生獲將領百餘人曳練徇於新州城下是夜新州降辛亥進攻媯州媯州原本作偽州今從通鑑改正影庫本粘籤壬子燕兵復合於居庸關拒戰武皇命精騎以疲之令步將李存審由他道擊之自午至晡燕軍復敗甲寅李匡儔攜其族棄城而遁將之滄州隨行輜車臧獲妓妾甚衆滄帥盧彥威利其貨以兵攻匡儔於景城殺之盡擄其衆丙辰進軍幽州其守城大將請降武皇令李存審與劉仁恭入城撫勞居人如故市不改肆封府庫以迎武皇乾寧二年正月武皇在幽州命李存審劉仁恭徇諸屬郡二月以仁恭為權幽州留後從燕人之請也案舊唐書乾寧元年十二月以李匡威故將劉仁恭為幽州兵馬留後歐陽史亦作元年冬事皆因平幽州而終言之未嘗核其年月也通鑑從薛史作二年二月留腹心燕留德等十餘人分典軍政武皇遂班師凡駐幽州四十日六月武皇率蕃漢之師自晋陽趨三輔討鳳翔李茂貞邠州王行瑜華州韓建之亂先是三帥稱兵向闕同弱王室殺害宰輔時河中節度使王重盈卒重榮之子珂即武皇之子壻也權典軍政其兄珙為陝州節度使瑤為絳州刺史與珂爭河中遂訴於岐邠華三鎮言珂本蒼頭蒼頭原本作莊頭考舊唐書王重榮傳云王珙上言珂本家之蒼頭小字忠兒則莊頭確為訛字今改正影庫本粘籤不當襲位珂亦訴於武皇武皇上表保薦珂乞授河中旄鉞詔可之三帥遂以兵入覲大掠京師請授王珂同州節度使王瑤河中節度使天子亦許之武皇遂舉兵表三帥之罪復移檄三鎮三鎮大懼是月次絳州刺史王瑤登陴拒命武皇攻之旬日而拔斬王瑤於軍門誅其黨千餘人七月次河中王珂迎謁於路己未同州節度使王行約棄城奔京師與左軍兵士掠西市都民大擾行約即行瑜弟也庚申樞密使駱全瓘以武皇之軍將至請天子幸右軍指揮使李繼鵬茂貞假子也本姓閻名珪與全瓘謀天子幸鳳翔左軍指揮使王行實亦行瑜之弟也與劉景宣欲天子幸邠州兩軍相攻縱火燒內門煙火蔽天天子急詔鹽州六都兵士令追殺亂兵左右軍退走王行瑜李茂貞聲言自來迎駕天子懼出幸南山駐蹕於莎城是夜熒惑犯心壬戌武皇進收同州聞天子幸石門遣判官王瓌奉表奔問天子遣使賜詔令與王珂同討邠鳳時武皇方攻華州俄聞李茂貞領兵士三萬至盩厔王行瑜領兵至興平欲往石門迎駕乃解華州之圍進營渭橋天子遣延王戒丕丹王允齎詔促武皇兵直抵邠鳳八月乙酉供奉官張承業齎詔告諭案舊唐書七月丁卯上遣內官張承業傳詔克用軍便令監太原行營兵馬發赴新平薛史作八月乙酉與舊唐書月日互異相隔殊遠舊唐書又作八月乙酉朔延王至河中疑承業與延王同行據通鑑作壬午遣張承業詣克用軍蓋壬午遣使乙酉始至軍耳涇帥張鐺已領步騎三萬於京西北扼邠岐之路武皇進營渭北遣史儼將三千騎往石門扈駕遣李存信李存審會鄜延之兵攻行瑜之梨園寨天子削奪行瑜官爵以武皇為天下兵馬都招討使以鄜州李思孝為北面招討使以涇州張鐺為西南面招討使天子又遣延王丹王賜武皇御衣及大將茶酒弓矢命二王兄事武皇延王傳天子密旨云一昨非卿至此已為賊庭行酒之人矣所慮者二凶締合卒難翦除且欲姑息茂貞令與卿修好俟梟斬行瑜更與卿商量武皇上表請駕還京案舊唐書作壬寅李克用遣子存貞奉表行在請車駕還京考當時奉表者即後唐莊宗也莊宗未嘗名存貞舊唐書誤令李存節領二千騎於京西北以防邠賊奔突辛亥天子還宮加武皇守太師中書令邠寧四面行營都統時王行瑜弟兄固守梨園寨我師攻之甚急李茂貞遣兵萬餘來援行瑜營於龍泉鎮茂貞自率兵三萬迫咸陽武皇奏請詔茂貞罷兵兼請削奪茂貞官爵詔曰茂貞勒兵蓋備非常尋已發遣歸鎮又言茂貞已誅李繼鵬李繼晸卿可切戒兵甲無犯土疆武皇請賜河中王珂旌節三表許之又表李罕之為副都統十月丙戌李存信於梨園寨北遇賊軍斬首千餘級自是賊閉壁不出戊子天子賜武皇內弟子四人又降朱書御札賜魏國夫人陳氏是月王行瑜因敗衄之後閉壁自固武皇令李罕之晝夜急攻賊軍乏食拔營而去李存信與罕之等先伏軍於阨路俟賊軍之至縱兵擊之殺戮萬計是日收梨園等三寨生擒行瑜之子知進並母丘氏大將李元褔等二百人送赴闕庭庚寅王行約王行實燒劫寧州遁走寧州守將徐景乞降武皇表蘇文建為邠州節度使且於寧州為治所十一月丁巳案舊唐書作十一月癸未朔疑十一月不當有丁已據薛史上文十月有丙戌戊子則十一月斷非癸未朔矣通鑑所定月日皆從薛史收龍泉寨時行瑜以精甲五千守之李茂貞出兵來援為李罕之所敗邠賊遂棄龍泉寨而去行瑜復入邠州大軍進逼其城行瑜登城號哭曰行瑜無罪昨殺南北司大臣是岐帥將兵脅制主上請治岐州行瑜乞束身歸朝武皇報曰王尚父何恭之甚耶僕受命討三賊臣公其一也如能束身歸闕老夫未敢專命為公奏取進止行瑜懼棄城而遁武皇收其城封府庫遽以捷聞既而慶州奏王行瑜將家屬五百人到州界為部下, WYG: ''}
