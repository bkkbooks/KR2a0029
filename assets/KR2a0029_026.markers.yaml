  - {type: variant, offset: 7755, length: 143, content: 臣曰武皇肇跡陰山赴難唐室逐豺狼於魏闕殄氛祲於秦川賜姓受封奄有汾晉可謂有功矣然雖茂勤王之績而非無震主之威及朱旗屯渭曲之師俾翠輦有石門之幸比夫桓文之輔周室無乃有所愧乎洎失援於蒲絳久垂翅於并汾若非嗣子之英才豈有興王之茂業矧累功積德未比於周文創業開基尚虧於魏祖追諡為武斯亦幸焉永樂大典卷七千一百, WYG: 與是書同舊}
