  - {type: variant, offset: 4, length: 742, content: 卷二十六唐書二武皇紀下景福元年正月鎮州王鎔恃燕人之援率兵十餘萬攻邢州之堯山案通鑑云景福元年正月王鎔李匡威合兵十餘萬攻堯山與薛史同舊唐書作大順二年王鎔援邢州屯於堯山考此時邢州未叛於晉不得有王鎔之援師蓋即景福元年事誤移於前一年耳歐陽史從薛史武皇遣李存信將兵應援李存孝素與存信不協遞相猜貳留兵不進武皇又遣李嗣勳李存審將兵援之大破燕趙之衆斬首三萬收其軍實三月武皇進軍渡滹沱攻欒城下鼓城城四月燕軍寇雲代武皇班師案舊唐書云景福元年二月庚寅太原易定之兵合勢攻鎮州王鎔復告難於幽州李匡威率步騎三萬赴之時太原之衆軍於常山易定之衆堅守固鎮燕趙之卒分拒之三月克用處存歛軍而退是興師以二月至三月始旋師也通鑑云三月李克用王處存合兵攻王鎔癸丑拔天長鎮戊午鎔與戰於新市大破之殺獲三萬餘人辛酉克用退屯欒城是進師退師皆在三月也薛史作三月進軍四月班師與諸書異八月赫連鐸誘幽州李匡威之衆八萬寇天成軍遂攻雲州營於州北連亙數里武皇潛軍入於雲州詰旦出騎軍以擊之斬獲數萬李匡威燒營而遁十月邢州李存孝叛納款於梁李存信構之也案舊唐書云大順元年十一月癸丑朔太原將邢州刺史李存孝自恃擒孫揆功合為昭義帥怨克用授康君立存孝自晉州率行營兵歸邢州據城上表歸朝仍致書張濬王鎔求援今考薛史大順二年存孝始為邢州節度無由於元年冬得據邢州也舊唐書特因存孝攻澤潞而牽連書之其年月則誤耳新唐書歐陽史通鑑並從薛史作景福元年十月景福二年春大舉以伐王鎔以其通好於李存孝也二月攻天長鎮旬日不下王鎔出師三萬來援武皇逆戰於叱日嶺下鎮人敗斬首萬餘級時歲饑軍乏食脯屍肉而食之進軍下井陘李存孝將兵夜入鎮州鎮人乞師於汴汴帥方攻時溥不暇應之乃求援於幽州李匡威率兵赴之武皇乃班師七月武皇討李存孝於邢州遂攻平山渡滹水攻鎮州王鎔懼以帛五十萬犒軍請修舊好仍以鎮冀之師助擊存孝許之武皇進圍邢州, WYG: 巻}
