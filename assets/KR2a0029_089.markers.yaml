  - {type: variant, offset: 2593, length: 1, content: 少, WYG: 王景戡為右龍武統軍以左驍衛上將軍安崇阮為左神武統軍以右監門上將軍髙允貞為右神武統軍壬戌以權知夏州事檢校司空李彛超為夏州節度使檢校司徒丙寅詔在朝文武臣寮並與加恩以受册尊號也戊辰以前安州節度使楊漢章為兖州節度使以前雲州節度使張敬達為徐州節度使庚午以前兖州節度使張延朗為秦州節度使壬申秦州節度使劉仲殷移鎮宋州十一月丙子以前滄州節度使盧質為右僕射庚辰改慎州懷化軍為昭化軍升洮州為保順軍辛巳以保大軍節度使檢校太尉鮑君福為保順軍節度洮鄯等州觀察等使以彰義軍節度使檢校太尉同平章事杜建徽為昭化軍節度慎瑞司等州觀察使乙酉以前汴州節度使李從曮為鄆州節度使以鄆州節度使李從温為定州節度使丙戌新授右僕射盧質奏臣忝除官合赴省上事若凖舊例左右僕射上事儀注所費極多欲從權務簡只取尚書丞郎上事例止屬南省屬寮及兩省官送上亦不敢輙援往例有費官用自量力排比兼不敢自臣隳廢前規他時任行舊制從之戊子}
