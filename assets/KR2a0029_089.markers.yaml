  - {type: variant, offset: 218, length: 644, content: 惠善詞賦案春渚記聞云桑維翰試進士有司嫌其姓黜之或勸勿試維翰持鐵硯示人曰鐵硯穿乃改業著日出扶桑賦以見志舊五代史考異唐同光中登進士第案張齊賢張齊王全義外傳云桑魏公將應舉父乘間告王云某男粗有文性今被同人相率取解俟王旨齊王曰有男應舉好事將卷軸來可令秀才來桑相之父趨下再拜既歸令子侵早投書啟獻文字數軸王令請桑秀才其父教之趨階王曰不可既應舉便是貢士以客禮見王一見奇之禮待頗厚是年王力言于當時儒臣且推薦之由是擢上第舊五代史考異高祖領河陽辟為掌書記歷數鎮皆從及建義太原首預其謀復遣為書求援於契丹果應之俄以趙德鈞發使聘契丹趙德鈞原本作得均今從歐陽史改正影庫本粘籤高祖懼其改謀命維翰詣幕帳述其始終利害之義其約乃定案通鑑云趙德鈞以金帛賂契丹主云若立己為帝請即以見兵南平洛陽與契丹為兄弟之國仍許石氏常鎮河東契丹主自以深入敵境晉安未下德鈞兵尚強范延光在其東又恐山北諸州邀其歸路欲許德鈞之請帝聞之大懼亟使維翰見契丹主說之曰大國舉義兵以救孤危一戰而唐兵瓦解退守一柵食盡力窮趙北平父子不忠不信畏大國之強且素蓄異志按兵觀變非以死徇國之人何足可畏而信其誕妄之辭貪毫末之利棄垂成之功乎且使晉得天下將竭中國之財以奉大國豈此小利之比乎契丹主曰爾見捕鼠者乎不備之猶或齧傷其手況大敵乎對曰今大國已扼其喉安能齧人乎契丹主曰吾非有渝前約也但兵家權謀不得不爾對曰皇帝以信義救人之急四海之人俱屬耳目奈何二三其命使大義不終臣竊為皇帝不取也跪于帳前自旦之暮涕泣爭之契丹乃從之指帳前石謂德鈞使者曰我已許石郎此石爛可改矣舊五代史考異及高祖建號制授翰林, WYG: 殿}
  - {type: variant, offset: 218, length: 644, content: 惠善詞賦案春渚記聞云桑維翰試進士有司嫌其姓黜之或勸勿試維翰持鐵硯示人曰鐵硯穿乃改業著日出扶桑賦以見志舊五代史考異唐同光中登進士第案張齊賢張齊王全義外傳云桑魏公將應舉父乘間告王云某男粗有文性今被同人相率取解俟王旨齊王曰有男應舉好事將卷軸來可令秀才來桑相之父趨下再拜既歸令子侵早投書啟獻文字數軸王令請桑秀才其父教之趨階王曰不可既應舉便是貢士以客禮見王一見奇之禮待頗厚是年王力言于當時儒臣且推薦之由是擢上第舊五代史考異高祖領河陽辟為掌書記歷數鎮皆從及建義太原首預其謀復遣為書求援於契丹果應之俄以趙德鈞發使聘契丹趙德鈞原本作得均今從歐陽史改正影庫本粘籤高祖懼其改謀命維翰詣幕帳述其始終利害之義其約乃定案通鑑云趙德鈞以金帛賂契丹主云若立己為帝請即以見兵南平洛陽與契丹為兄弟之國仍許石氏常鎮河東契丹主自以深入敵境晉安未下德鈞兵尚強范延光在其東又恐山北諸州邀其歸路欲許德鈞之請帝聞之大懼亟使維翰見契丹主說之曰大國舉義兵以救孤危一戰而唐兵瓦解退守一柵食盡力窮趙北平父子不忠不信畏大國之強且素蓄異志按兵觀變非以死徇國之人何足可畏而信其誕妄之辭貪毫末之利棄垂成之功乎且使晉得天下將竭中國之財以奉大國豈此小利之比乎契丹主曰爾見捕鼠者乎不備之猶或齧傷其手況大敵乎對曰今大國已扼其喉安能齧人乎契丹主曰吾非有渝前約也但兵家權謀不得不爾對曰皇帝以信義救人之急四海之人俱屬耳目奈何二三其命使大義不終臣竊為皇帝不取也跪于帳前自旦之暮涕泣爭之契丹乃從之指帳前石謂德鈞使者曰我已許石郎此石爛可改矣舊五代史考異及高祖建號制授翰林, krp: 殿}
