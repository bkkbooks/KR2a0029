  - {type: variant, offset: 6015, length: 624, content: 方賂遺輻輳其門由是朝政日壞舊五代史考異張彥澤陷京城軍士爭湊其第家財臣萬一夕罄空翌日玉假蓋而出猶繞指以諂彥澤且請令引送玉璽於契丹主將利其復用永樂大典卷一萬三百三十玉從少帝北遷契丹命為太子少保至周太祖廣順二年其子傑自幽州不告父而亡歸玉懼譴責尋以憂恚卒於蕃中永樂大典卷一萬七千一百九十五五代史補馮玉嘗為樞密使有朝使馬承翰素有口辨一旦持刺來謁玉玉覽刺輒戲曰馬既有汗宜卸下鞍承翰應聲曰明公姓馮可謂死囚逢獄玉自以言失遽延而謝之殷鵬字大舉大名人也以雋秀為鄉曲所稱弱冠擢進士第唐閔帝之鎮魏州聞其名辟為從事及即位命為右拾遺歷左補闕考功員外郎充史館修撰遷刑部郎中鵬姿顏若婦人而性巧媚天福中擢拜中書舍人與馮玉同職玉本非代言之才所得除目多託鵬為之玉嘗以姑息字問於人人則以辜負字教之玉乃然之當時以為笑端鵬之才比玉雖優其纖佞過之後玉出郡借第以處之分祿食之及玉為樞密使擢為本院學士每有庶僚乘鞹謁玉故事宰臣以履見之鵬多在玉所見客亦然有丞郎王易簡退而有言鵬銜之及契丹入汴有人獲玉與鵬有籤記字皆朝廷上列有不得志欲左授者則易簡是其首焉玉既北行鵬亦尋以病卒永樂大典卷二千二百六史臣曰維翰之輔晉室也罄弼諧之志參締搆之功觀其効忠亦可謂社稷臣矣況和戎之策固非誤計及國之亡也彼以滅口為謀此掇歿身之禍則畫策之難也豈期如是哉是以韓非慨慷而著說難者當為此也悲夫趙瑩際會風雲優游藩輔雖易簀於絕域終歸柩於故園蓋仁信之行通於遐邇故也劉昫有真相之才克全嘉譽馮玉乘君子之器終歿窮荒其優劣可知矣永樂大典卷三千二百六, WYG: ''}
