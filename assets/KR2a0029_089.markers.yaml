  - {type: variant, offset: 2595, length: 4, content: 嗣位徵拜, WYG: 不豫已丑大漸自廣夀殿移居雍和殿是夜四皷後帝自御榻蹶然而興顧謂知漏宫女曰夜漏幾何對曰四更因奏曰官家省事否帝曰省因唾出肉片如肺者數片便溺升餘六宫皆至慶躍而奏曰官家今日實還魂也因進溺一器侍醫進湯膳至曙帝小康壬辰天下大元帥守尚書令兼}
