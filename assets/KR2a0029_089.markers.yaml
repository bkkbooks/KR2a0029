  - {type: variant, offset: 1240, length: 138, content: 襲戎師往返路出於真定者皆潛害之密與吐渾深相結至是納焉而致於朝既而安重榮抗表請討契丹且言吐渾之請是時安重榮握強兵據重鎮恃其驍勇有飛揚跋扈之志晉祖覽表猶豫未決維翰知重榮已畜奸謀且懼朝廷違其意乃密上疏曰竊以防未萌之禍亂立不拔之基扃上繫聖謀動符天意非臣淺陋所可窺圖然臣逢世休明致位通顯, WYG: 夏州}
