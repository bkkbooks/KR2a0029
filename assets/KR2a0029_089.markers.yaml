  - {type: variant, offset: 1031, length: 0, content: '', WYG: 二月癸丑朔帝于便殿問范延光内外見管馬數對曰三萬五千匹帝歎曰太祖在太原騎軍不過七千先皇自始至終馬纔及萬今有鐵馬如是而不能使九州混一是吾養士練將之不至也吾老矣馬將奈何延光奏曰臣每思之國家養馬太多試計一騎士之費可贍歩軍五人三萬五千騎抵十五萬步軍既無所施虚耗國力臣恐日久難繼帝曰誠如卿言肥騎士而瘠吾民何益哉五代㑹要上問見管馬數樞宻使范延光奏天下常支草粟者近五萬匹見今西北諸道蕃買馬者往來如市其郵傳之費中估之直日以四十五貫以臣計之國力十耗其七馬無所使財賦漸消朝廷甚非所利上善之十月敇沿邊藩鎮或有蕃部買馬可擇其良壯給劵具數以聞丁已以䖍州節度使檢校太尉兼侍中馬希振為洪州節度使以鄂州節度使馬希廣為檢校太尉同平章事充桂州節度使以廬州節度使兼武安軍副使姚彦章為檢校太尉同平章事以静江節度副使馬希範為鄂州節度使故潞州節度使檢校太保康君立贈太傅己未宋州節度使安元信加兼侍中濮州進重修河堤圖沿河地名厯厯可數帝覽之愀然曰吾佐先朝定天下于此堤塢間大小數百戰又指一丘曰此吾擐甲臺也}
