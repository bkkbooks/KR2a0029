  - {type: variant, offset: 1380, length: 1, content: 報, WYG: 故也乙酉以許州節度使孟鵠卒廢朝贈太傅詔賜在京諸軍將校優給有差時帝疾未痊軍士有流言故也丁亥兩浙節度使檢校太傅守中書令錢元瓘封吳王八月戊申帝被衮冕御明堂殿受册徽號曰聖明神武廣運法天文徳恭孝皇帝禮畢制大赦天下常赦所不原者咸赦除之已酉賜侍衞諸軍優給有差時月内再有頒給自兹府藏無餘積矣辛亥以晉州節度使薄文卒廢朝丁巳以右龍武統軍李從昶為許州節度使戊午以祕書監髙輅卒廢朝辛酉以太子太師致仕符習卒廢朝贈太師辛未秦王從榮以本官充天下兵馬大元帥加食邑萬户實封三千户以右羽林統軍翟璋為晉州節度使以太子賔客馬縞為户部侍郎壬申幸至徳宮九月甲戌以户部尚書李璘為兵部尚書以前户部尚書韓彦惲為户部尚書丙子幸至徳宫戊寅樞密使范延光趙延夀並加兼侍中依前充使中書奏元帥儀注諸道節度使以下帯兵權者階下具軍禮叅見其帯使相者初見亦展一度公禮天下軍務公事元帥府行帖指揮其判六軍諸衛事則公牒往來其官屬軍職委元帥府奏請從之癸未以兵部侍郎盧詹為吏部侍郎丙戌宰臣馮道加左僕射李愚加吏部尚書劉昫加刑部尚書戊子河陽節度使兼侍衞親軍都指揮使康義誠山南西道節度使檢校太傅張䖍釗並加同平章事宣徽南院使判三司馮贇依前檢校太傅同平章事中書門下同二品充三司使贇亡父名章故改平章事為同二品壬戌永寧公主石氏進封魏}
