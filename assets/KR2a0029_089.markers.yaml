  - {type: variant, offset: 1229, length: 4, content: 安重榮患, WYG: 李從敏封濕王甲申帝避暑于九曲池既而登樓風毒暴作聖體不豫翌日而愈北夢瑣言上聖體乖和馮道對寢膳之間動思調衞因指御前果實曰如食桃不康翌日見李而思戒可也初上因御李暴得風虚之疾馮道不敢斥言因奏事諷悟上意丙戌}
  - {type: variant, offset: 1229, length: 4, content: 安重榮患, krp: 李從敏封濕王甲申帝避暑于九曲池既而登樓風毒暴作聖體不豫翌日而愈北夢瑣言上聖體乖和馮道對寢膳之間動思調衞因指御前果實曰如食桃不康翌日見李而思戒可也初上因御李暴得風虚之疾馮道不敢斥言因奏事諷悟上意丙戌}
  - {type: variant, offset: 1235, length: 0, content: '', WYG: 遣使朝貢丁酉安從進奏大軍已至夏州攻城以其不受命也庚子以靈武留後張希崇為本州節度使辛丑故夏州節度使朔方郡王李仁福追封虢王壬寅以前晉州留後薄文為本州節度使六月丙午朔文武百寮宰臣馮道等拜章請于尊號内加廣運法天四字凡拜三章詔允}
