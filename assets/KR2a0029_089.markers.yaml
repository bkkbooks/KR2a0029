  - {type: variant, offset: 1032, length: 1, content: 天, WYG: 事如昨奄忽一紀令人悲歎耳癸亥以西川節度使孟知祥為劍南東西兩川節度使封蜀王三司奏當省有諸道鹽鐵轉運使衙職員都押衙正押衙同押衙通引衙前虞候子弟今欲列為三司職名從之庚午以御史中丞崔衍為兵部侍郎以右諫議大夫龍敏為御史中丞三月己卯幸龍門延州節度使安從進奏夏州節度使李仁}
