  - {type: variant, offset: 2602, length: 6, content: 修國史頻上言, WYG: 兼秦王傅劉贊配嵐州河南少尹劉陟配均州並為長流百姓縱逢恩赦不在放還河南少尹李蕘配石州河南府判官司徒詡配寧州秦王友蘇瓚配萊州記室參軍魚崇逺配慶州河南府推官王説配隨州並為長流百姓河南府推官尹諲六軍巡官董裔張九忠河南府巡官張沆李潮江文蔚並勒歸田里應長流人並除名六軍判官殿中監王居敏責授復州司馬六軍推官郭晙責授坊州司户並員外置所在馳驛發遣時宰相樞宻使共議任贊等已下罪馮道等曰任贊前在班行比與從榮無舊除官未及月餘便逢此禍王居敏司徒詡疾病}
