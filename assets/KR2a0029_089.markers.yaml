  - {type: variant, offset: 2623, length: 6, content: 楊光遠搆契丹, WYG: 四月太常卿盧文紀上謚議曰聖制仁徳欽孝皇帝廟號明宗宰臣盧文紀上改聖智仁徳四字為聖徳和武欽孝皇帝宰臣劉昫撰謚册文宰臣李愚撰哀册文是月二十七日𦵏于徽陵五代史補明宗之在位也一旦幸倉塲觀納時主者以車駕親臨懼得其罪較量甚輕明宗因謂之曰且朕自省事以來倉塲給散動經一二十年未畢今輕量如此其後銷折將何以償之對曰竭盡家産不足則繼之以身命明宗愴然曰只聞百姓養一家未聞一家養百姓今後每石加二斗耗以備鼠雀侵蠧謂之䑕雀耗倉糧起自此也己五代史闕文明宗出自邊地老于戰陳即位之歲年六旬純厚仁慈本乎天性毎夕宫中焚香仰天禱祝云某蕃人也遇亂世為衆推戴事不獲已願上天早生聖人與百姓為主故天成長興間比歳豐登中原無事言于五代粗為小康史臣曰明宗戰伐之勲雖髙佐命潛躍之事本不經心㑹王室之多艱屬神器之自至諒由天贊匪出人謀及應運以君臨能力行于王國政皆中道時亦小康近代已來亦可宗也儻使重誨得房杜之術從榮}
