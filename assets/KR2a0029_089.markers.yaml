  - {type: variant, offset: 1495, length: 1094, content: 躍馬龍城直度陰山徑絕大漠萬里赴難一戰夷凶救陛下累卵之危成陛下覆盂之業覆盂原本作復于今從通鑑改正影庫本粘籤皇朝受命於此六年彼此通歡亭障無事雖卑辭降節屈萬乘之尊而庇國息民實數世之利今者安重榮表契丹之罪方恃勇以請行白承福畏契丹之強將假手以報怨恐非遠慮有惑聖聰方今契丹未可與爭者有其七焉契丹數年來最強盛侵伐鄰國吞滅諸蕃救援河東功成師克山後之名藩大郡盡入封疆中華之精甲利兵悉歸廬帳即今土地廣而人民衆戎器備而戰馬多此未可與爭一也契丹自告捷之後鋒銳氣雄南軍因敗衄已來心沮膽怯況今秋夏雖稔而帑廩無餘黎庶雖安而貧弊益甚戈甲雖備而鍛礪未精士馬雖多而訓練未至此未可與爭者二也契丹與國家恩義非輕信誓甚篤雖多求取未至侵凌豈可先發釁端自為戎首縱使因茲大克則後患仍存其或偶失沈機則追悔何及兵者凶器也戰者危事也苟議輕舉安得萬全此未可與爭者三也王者用兵觀釁而動是以漢宣帝得志於匈奴因單于之爭立唐太宗立功於突厥由頡利之不道方今契丹主抱雄武之量有戰伐之機部族輯睦蕃國畏伏土地無災孳畜繁庶蕃漢雜用國無釁隙此未可與爭者四也引弓之民遷徙鳥舉行逐水草軍無饋運居無竈幕往無營柵便苦澀任勞役不畏風霜不顧饑渴皆華人之所不能此未可與爭者五也戎人皆騎士利在坦途中國用徒兵喜於隘險趙魏之北燕薊之南千里之間地平如砥步騎之便較然可知國家若與契丹相持則必屯兵邊上少則懼強敵之衆固須堅壁以自全多則患飛輓之勞必須逐寇而速返我歸而彼至我出而彼迴則禁衞之驍雄疲於奔命鎮定之封境略無遺民此未可與爭者六也議者以陛下於契丹有所供億謂之耗𢀿有所卑遜謂之屈辱微臣所見則曰不然且以漢祖英雄猶輸貨於冒頓神堯武略尚稱臣於可汗此謂達於權變善於屈伸所損者微所利者大必若因茲交構遂成釁隙自此則歲歲徵發日日轉輸困天下之生靈空國家之府藏此謂耗𢀿不亦甚乎兵戈既起將帥擅權武吏功臣過求姑息邊藩遠郡得以驕矜外剛內柔上凌下僭此為屈辱又非多乎此未可與爭者七也願陛下思社稷之大計采將相之善謀勿聽樊噲之空言宜納婁敬之逆耳然後訓撫士卒養育黔黎積穀聚人勸農習戰以俟國有九年之積兵有十倍之強主無內憂民有餘力便可以觀彼之變待彼之衰用己之長攻彼之短舉無不克動必成功此計之上者也惟陛下熟思之臣又以鄴都襟帶山河表𩹉形勝原田沃衍戶賦殷繁乃河朔之名藩實國家之巨屏即今主帥赴闕軍府無人臣竊思慢藏誨盜之言恐非勇夫重閉之意愿迴深慮免起奸謀欲希陛下暫整和鑾略謀巡幸雖櫛風沐雨上勞於聖躬而杜漸防微實資於睿略省方展義今也其時臣受主恩深憂國情切智小謀大理淺詞繁俯伏惟懼於僭踰裨補或希於萬一謹冒死以聞疏奏留中不出高祖召使人於內寢傳密旨於維翰曰朕比以北面事之煩懣不快今省所奏釋然如醒朕計已決卿可無憂七年夏高祖駕在鄴都維翰自鎮來朝改授晉昌, WYG: ''}
