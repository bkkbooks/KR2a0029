  - {type: variant, offset: 1235, length: 0, content: '', krp: 遣使朝貢丁酉安從進奏大軍已至夏州攻城以其不受命也庚子以靈武留後張希崇為本州節度使辛丑故夏州節度使朔方郡王李仁福追封虢王壬寅以前晉州留後薄文為本州節度使六月丙午朔文武百寮宰臣馮道等拜章請于尊號内加廣運法天四字凡拜三章詔允}
  - {type: variant, offset: 1236, length: 3, content: 強欲謀, WYG: 詔宫西新園宜名永芳園其間新殿宜名和慶殿丙辰秦王從榮加食邑至萬户實封二千户丁巳以右驍衛上將軍李從昶為左龍武統軍以前邢州節度使髙允韜為右龍武統軍以右驍衛上將軍羅周敬為左羽林統軍以右監門上將軍婁繼英為金州刺史戊午宋王從厚加食邑至萬户實封一千户壬戌以前涇州節度使李金全為滄州節度使癸亥詔御史中丞龍敏等詳定大中統類甲子第十四女封夀安公主第十五女封永樂公主戊辰以前利州節度使孫漢韶為洋州節度使壬申永寧軍節度使容州管内觀察使檢校太尉兼侍中馬存加食邑實封甲戌帝復不豫秋七月丁丑以著作佐郎尹拙為左拾遺直史館國朝舊制皆以畿赤尉直史館今用諫官自拙始從監修李愚奏也已夘東岳三郎神贈威雄大將軍初帝不豫前淄州刺史劉遂清薦泰山僧一人云善醫及召見乃庸僧耳問方藥僧曰不工醫嘗于泰山中親睹嶽神謂僧曰吾第三子威靈可愛而未有爵秩師為我請之宫中神其事故有是命識者嫉遂清之妖佞焉詔應臺官出行須令人訶引使軍巡職掌等規避壬午詔安從進班師時王師}
