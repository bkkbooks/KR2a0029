  - {type: variant, offset: 2601, length: 0, content: '', WYG: 秦王從榮領兵陣于天津橋内出禁軍拒之從榮敗奔河南府遇害帝聞之悲駭幾落御榻氣絶而蘇者再繇是不豫有加癸已馮道率百寮見帝于雍和殿帝雨泣哽噎曰吾家事若此慙見卿等百寮皆涖下霑襟甲午賜宰臣樞宻使御衣玉帯康義誠已下錦帛鞍馬有差遣宣徽使孟漢瓊召宋王于鄴都乙未以三司使孫岳為亂兵所害廢朝丁酉勅秦王府官屬除諮議參軍髙輦已處斬外元帥府判官兵部侍郎任贊配武州祕書}
