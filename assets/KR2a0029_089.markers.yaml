  - {type: variant, offset: 3492, length: 2522, content: 九即以衣帶加頸報戎王云維翰自經而死戎王報曰我本無心害維翰維翰不合自剄戎王至闕使人驗其狀令殯於私第厚撫其家所有田園邸第並令賜之案歐陽史作以尸賜其家而貲財悉為彥澤所掠舊五代史考異及漢高祖登極詔贈尚書令維翰少時所居恆有魑魅家人咸畏之維翰往往被竊其衣撮其巾櫛而未嘗改容當兩朝秉政出上將楊光遠景延廣俱為洛川守又嘗一制除節將十五人各領軍職無不屈而服之理安陽除民弊二十餘事在兗海擒豪賊過千人亦寇恂尹翁歸之流也開運中朝廷以長子坦為屯田員外郎次子塤為祕書郎維翰謂同列曰漢代三公之子為郎廢已久矣近或行之甚諠外議乃抗表固讓不受尋改坦為大理司直塤為秘書省正字議者美之初高祖在位時詔廢翰林學士院由是併內外制皆歸閣下命舍人直內廷數年之間尤重其選及維翰再居宥密不信宿奏復置學士院凡署職者皆其親舊時議者以維翰相業素高公望所屬雖除授或黨亦弗之咎也永樂大典卷七千三百三十九五代史補桑維翰形貌甚怪往往見之者失次張彥澤素以驍勇稱每謁候雖冬月未嘗不雨汗及中渡變生彥澤引蕃部至欲逞其威乃領衆突入開封府弓矢亂發且問桑維翰安在維翰聞之乃厲聲曰吾為大臣使國家如此甚死宜矣張彥澤安得無禮乃升廳安坐數之曰汝有何功帶使相已臨方面當國家危急不能盡犬馬之力以為報効一旦背叛助契丹作威為賊汝心安乎彥澤覩其詞氣慨然股慄不敢仰視退曰吾不知桑維翰何人今日之下威稜猶如此其再可見耶是夜令壯士就府縊殺之當維翰之縊也猶瞋目直視噓其氣再三每一噓皆有火出其光赫然三噓之外火盡滅就視則奄然矣趙瑩字玄輝華陰人也華陰原本作華夏今從歐陽史改正影庫本粘籤曾祖溥江陵縣丞祖孺祕書正字父居晦為農瑩風儀美秀性復純謹梁龍德中始解褐為康延孝從事後唐同光中延孝鎮陝州會莊宗伐蜀命延孝為騎將將行留瑩監修金天神祠功既集忽夢神召於前亭待以優禮謂瑩曰公富有前程所宜自愛因遺一劍一笏覺而駭異明宗即位以高祖為陝府兩使留後瑩時在郡以前官謁之一見如舊相識即奏署管記高祖歷諸鎮皆從之累使闕下官至御史大夫賜金紫高祖再鎮幷州位至節度判官高祖建號授瑩翰林學士承旨金紫光祿大夫戶部侍郎知太原府事尋遷門下侍郎同平章事監修國史車駕入洛使持聘謝契丹及還加光祿大夫兼吏部尚書判戶部初瑩為從事丁母憂高祖不許歸華下以麤縗隨幕人或短之及入相以敦讓汲引為務監修國史日以唐代故事殘缺署能者居職纂補實錄及修正史二百卷行於時瑩首有力焉少帝嗣位拜守中書令明年檢校太尉本官出為晉昌軍節度使是時天下大蝗境內捕蝗者獲蝗一斗給粟一斗使飢者獲濟遠近嘉之未幾移鎮華州歲餘入為開封尹開運末馮玉李彥韜用事以桑維翰才望素重而瑩柔而可制因共稱之乃出維翰復瑩相位加弘文館大學士及李崧馮玉議出兵應接趙延壽而以杜重威為都督部署瑩私謂馮李曰杜中令國之懿親所求未愜心恆怏怏安可更與兵權若有事邊陲只李守貞將之可也及契丹陷京城契丹主遷少帝於北塞瑩與馮玉李彥韜俱從李彥韜原本脫彥字今從通鑑增入影庫本粘籤契丹永康王代立授瑩太子太保案遼史作太子太傅舊五代史考異周廣順初遣尚書左丞田敏報命於契丹遇瑩於幽州瑩得見華人悲悵不已謂田敏曰老身漂零寄於此近聞室家喪逝弱子無恙蒙中朝皇帝倍加存恤東京舊第本屬公家亦聞優恩特給善價老夫至死無以報效於是南望稽首涕泗潢流先是漢高祖以入蕃將相第宅徧賜隨駕大臣故以瑩第賜周太祖太祖時為樞密副使召瑩子前刑部郎中易則告之曰所賜第除素屬版籍外如有別契券為己所置者可歸本直即以千餘緡遺易則易則惶恐辭讓周太祖堅與之方受故瑩言及之未幾瑩卒於幽州時年六十七瑩初被疾遣人祈告於契丹主願歸骨於南朝使羈魂幸復鄉里契丹主閔而許之及卒遣其子易從家人數輩護喪而還仍遣大將送至京師周太祖感歎久之詔贈太傅仍賜其子絹五百疋以備喪事令歸葬於華陰故里永樂大典卷一萬六千九百九十一劉昫字耀遠涿州歸義人也祖乘幽府左司馬父因幽州巡官昫神彩秀拔文學優贍與兄晅弟俱有鄉曲之譽唐天祐中契丹陷其郡昫被俘至新州逃而獲免後居上國大寧山與呂夢奇張麟結庵共處以吟誦自娛會定州連帥王處直以其子都為易州刺史署昫為軍事衙推及都去任乞假還鄉都招昫至中山會其兄晅自本郡至都薦於其父尋署為節度衙推不踰歲命為觀察推官歷二年都篡父位時都有客和少微素嫉晅搆而殺之昫越境而去寓居浮陽節度使李存審辟為從事莊宗即位授太常博士尋擢為翰林學士繼改膳部員外郎賜緋比部郎中賜紫丁母憂服闋授庫部郎中依舊充職明宗即位拜中書舍人歷戶部侍郎案歐陽史作兵部侍郎案薛史唐明宗紀作兵部侍郎與此傳異歐陽史從薛史本紀舊五代史考異端明殿學士明宗重其風儀愛其溫厚長興中拜中書侍郎兼刑部尚書平章事時昫入謝遇大祠明宗不御中興殿閤門白舊禮宰相謝恩須正殿通喚請候來日樞密使趙延壽曰命相之制下已數日中謝無宜後時因即奏之遂謝於端明殿昫自端明殿學士拜相而謝於本殿士子榮之清泰初兼判三司加吏部尚書門下侍郎監修國史時與同列李愚不協動至忿爭時論非之未幾俱罷知政事昫守右僕射以張延朗代判三司初唐末帝自鳳翔至切於軍用時王玫判三司詔問錢穀玫具奏其數及命賞軍甚愆於素案通鑑云帝問王玫以府庫之實對有數百萬在既而閱實金帛不過三萬兩匹舊五代史考異末帝怒用昫代玫昫乃搜索簿書命判官高延賞計窮詰勾及積年殘租或場務販負皆虛係賑籍條奏其事請可徵者急督之無以償官者蠲除之案通鑑清泰元年八月免諸道逋租三百三十八萬舊五代史考異吏民相與歌詠唯主典怨沮及罷相之日羣吏相賀昫歸無一人從之者蓋憎其太察故也天福初張從賓作亂於洛陽害皇子重詔為東都留守判河南府事尋以本官判鹽鐵未幾奉使入契丹還遷太子太保兼左僕射封譙國公俄改太子太傅開運初授司空平章事監修國史復判三司契丹主至不改其職昫以眼疾乞休致契丹主降偽命授昫守太保案歐陽史作罷為太保舊五代史考異契丹主北去留於東京其年夏以病卒年六十漢高祖登極贈太保初昫避難河朔匿於北山蘭若有賈少瑜者為僧輟衾袍以溫燠之及昫官達致少瑜進士及第拜監察御史聞者義之永樂大典卷九千九十八馮玉案以下有闕文歐陽史云字景臣定州人舊五代史考異馮玉傳永樂大典闕全篇其散見各韻者尚存三條今排比前後以存大概影庫本粘籤少帝嗣位納馮后於中宮后即玉之妹也玉既聯戚里恩寵彌厚俄自知制誥中書舍人出為潁州團練使遷端明殿學士戶部侍郎尋加右僕射軍國大政一以委之永樂大典卷一萬三百三十案以下有闕文通鑑云玉每喜承迎帝意由是益有寵嘗有疾在家帝謂諸宰相曰自刺史而上俟馮玉出乃得除其倚任如此玉乘勢弄權, WYG: ''}
