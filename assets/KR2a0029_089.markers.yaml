  - {type: variant, offset: 2729, length: 761, content: 考異少帝乃出延廣守洛以維翰守中書令再為樞密使弘文館大學士繼封魏國公事無巨細一以委之數月之間百度寖理然權位既重而四方賂遺咸湊其門故仍歲之間積貨鉅萬由是澆競輩得以興謗未幾內客省使李彥韜端明殿學士馮玉皆以親舊用事與維翰不協間言稍入維翰漸見疏忌將黜退賴宰相劉昫李崧奏云維翰元勳且無顯過不宜輕有進退少帝乃止尋以馮玉為樞密使以分維翰之權後因少帝微有不豫維翰曾密遣中使達意於太后請為皇弟重睿擇師傅以教道之少帝以此疑其有他俄而馮玉作相與維翰同在中書會舍人盧價秩滿盧價原本作盧侍今從歐陽史改正影庫本粘籤玉乃下筆除價為工部侍郎維翰曰詞臣除此官稍慢恐外有所議因不署名屬維翰休假玉竟除之自此維翰與玉尤不相協俄因少帝以重睿擇師傅言於玉玉遂以詞激帝帝尋出維翰為開封府尹維翰稱足疾罕預朝謁不接賓客是歲秋霖經月不歇一日維翰出府門由西街入內至國子門馬忽驚逸御者不能制維翰落水久而方蘇或言私邸亦多怪異親黨咸憂之及戎王至中渡橋維翰以國家安危繫在朝夕迺詣執政異其議又求見帝復不得對維翰退而謂所親曰若以社稷之靈天命未改非所能知也若以人事言之晉氏將不血食矣開運三年十二月十日王師既降契丹十六日張彥澤以前鋒騎軍陷都城戎王遣使遺太后書云可先使桑維翰景延廣遠來相接甚是好事是日凌旦都下軍亂宮中火發維翰時在府署左右勸使逃避維翰曰吾國家大臣何所逃乎即坐以俟命時少帝已受戎王撫慰之命乃謀自全之計因思維翰在相時累貢謀畫請與契丹和慮戎王到京窮究其事則顯彰己過故欲殺維翰以滅其口因令圖之張彥澤既受少帝密旨案通鑑考異云彥澤既降契丹豈肯復受少帝之命當係彥澤自以私怨殺維翰非受命于少帝也舊五代史考異復利維翰家財乃稱少帝命召維翰維翰束帶乘馬行及天街與李崧相遇交談之次有軍吏於馬前揖維翰赴侍衞司維翰知其不可顧謂崧曰侍中當國今日國亡翻令維翰死之何也崧甚有愧色是日彥澤遣兵守之十八日夜為彥澤所害時年, WYG: 巻}
