  - {type: variant, offset: 1389, length: 16, content: 繫安危理關家國苟猶緘默實負君親是, WYG: 充樞密使時范延光趙延夀相繼辭退樞密務及朱𢎞昭有樞宻之命又面辭訴帝叱之曰爾輩皆欲離朕左右怕在眼前素養爾輩將何用也𢎞昭退謝不復敢言吏部侍郎張文寳卒庚子清海軍節度使錢元璹加檢校太傅同平章事中吳建武等軍節度使錢元璙加檢校太師兼中書令}
