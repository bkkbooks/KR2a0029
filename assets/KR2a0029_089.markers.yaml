  - {type: variant, offset: 1034, length: 0, content: '', WYG: 卒其子彛超自稱留後甲申鎮州奏行軍司馬趙瓌節度判官陸浣元從押衙髙知柔等並棄市坐受賂枉法殺人也節度使李從敏罰一季俸乙酉以西川節度副使知武泰軍節度兵馬留後趙季良為檢校太保黔南節度使以西川諸軍馬歩都指揮使知武信軍節度兵馬留後李仁罕為檢校太傅遂州節度使以西川左廂馬歩指揮使知保寧軍節度兵馬留後趙廷隠為檢校太保閬州節度使以西川右廂馬步都指揮使知寧江軍兵馬留後張知業為檢校司徒夔州節度使以西川衙内馬歩都指揮使知昭武軍兵馬留後李肇為檢校太保利州節度使從孟知祥之請也丙戌賜宰相李愚絹百匹錢十萬鋪陳物一十三件時愚病帝令近臣翟光鄴宣問所居寢室蕭然四壁病榻敝氊而巳光鄴具言其事故有是賜戊子以延州節度使安從進為夏州留後以夏州左都押衙四州防遏使李彛超為延州留後仍命邠州節度使藥彦稠宫苑使安重益帥師援送從進赴鎮以左衛上將軍盧文進為潞州節度使以右龍武統軍張温為雲州節度使庚寅以鳯翔行軍司馬李彦琮為鹽州防禦使時范延光等奏請因夏州之師制置鹽州故有是命癸巳以右威衛上將軍安重霸為同州節度使已亥以左龍武統軍符彦超為安州節度使詔除放京兆秦岐邠濕延慶同華興元十州長興元年二年係欠夏秋税物及營田莊宅務課利以其曽輦運供軍糧料也甲辰故晉國夫人夏氏追册皇后有司上諡曰昭懿從之夏四月戊申李彛超奏奉詔除延州留後已受恩命訖三軍百姓擁隔未遂赴任帝遣閤門使蘇繼顔齎詔促彛超赴任癸丑以刑部侍郎劉賛為祕書監秦王傅五代會要長興}
