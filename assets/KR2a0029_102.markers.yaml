  - {type: variant, offset: 110, length: 186, content: 為尊漸冀承平永安遐邇內則稟太后之慈訓外則仗多士之忠勳股肱叶謀爪牙宣力西摧三叛撫其背而扼其喉北挫諸蕃斷其臂而折其脊次則巴邛嘯聚淮海猖狂纔聞矢接鋒交已見山摧岸沮寇難少息師徒無虧兼以修奉園陵崇建宗廟右賢左戚同寅協恭多事之中大禮無闕負荷斯重哀感良深今以三陽布和四序更始宜申兌澤允答天休卹獄緩刑捨過宥罪當萬物之莩甲開三面之網羅順彼發生以召和氣應乾祐二年正月一日昧爽已前天下見禁罪人除, WYG: ''}
