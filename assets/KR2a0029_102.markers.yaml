  - {type: variant, offset: 5, length: 104, content: 一百二漢書四隱帝紀中乾祐二年春正月乙巳朔制曰朕以眇躬獲纘洪緒念守器承祧之重懷臨深履薄之憂屬以玄道猶艱王室多故天降重戾國有大喪奸臣樂禍以圖危羣寇幸災而伺𨻶力役未息兵革方殷朕所以嘗膽履冰廢飧輟寐雖居億兆之上不以九, WYG: ''}
