markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 舊五代史巻五十攷證唐宗室列𫝊二比至渭橋渭橋歐陽史作滑橋疑傳刻之訛据通鑑攷異引薛史亦作渭橋今仍其舊明年武皇昭雪克讓復入宿衞黄巢犯闕僖宗幸蜀克讓時守潼關為賊所敗案僖宗幸蜀以前武皇未甞昭雪克讓無由復入宿衞出守潼關通鑑攷異常辨其誤今攷新唐書黄巢𫝊巢攻潼關齊克讓以其軍戰關外時士飢甚潛燒克讓營克讓走入關疑當時因齊克讓之名與李克讓同遂致𫝊聞輾轉失實耳歐陽史祗據薛史原文不為辨正今無可復考姑附識于此是月平潞州斬其刺史李殷鋭案新唐書僖宗紀中和三年十月李克用陥潞州刺史李殷銳死之與是書李克修𫝊同是書武皇紀又作十一月平潞州紀𫝊自相矛盾通鑑從克修𫝊作十月歐陽史從武皇紀作十一月李存顥者案歐陽史作養子存顥存實懋間平之德間平原本作開平繹其文義當是用漢時河間獻王東平憲王今改正}
