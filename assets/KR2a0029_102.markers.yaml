  - {type: variant, offset: 297, length: 3502, content: 惡五逆官典犯贓合造毒藥劫家殺人正身外其餘並放河府李守貞河府原本作何府冊府元龜作河中考薛史多稱河中府為河府今改正影庫本粘籤鳳翔王景崇永興趙思綰等比與國家素無讎生靈朕之赤子久陷孤壘可念非辜易子析骸填溝委壑為人父母寧不軫傷但以屈己愛人先王厚德包垢含辱列聖美談宜推濟物之恩用廣好生之道其李守貞等宜令逐處都部署分明曉諭若能翻然歸順朕即待之如初當保始終享其富貴明申信誓固無改移其或不順推誠堅欲拒命便可應時攻擊剋日盪平候收復城池罪止元惡其餘詿誤一切不問重念征討已來勞役滋甚兵猶在野民未息肩急賦繁徵財殫力匱矜卹之澤未被於疲羸愁嘆之聲幾盈於道路即俟邊鋒少弭國難漸除當議優饒冀獲蘇息諸道蕃侯郡守等咸分寄任共體憂勞更宜念彼瘡痍倍加勤卹究鄉閭之疾苦去州縣之煩苛勸課耕桑省察寃濫共恢庶政用副憂勞凡百臣僚當體朕意壬子賜前昭義軍節度使張從恩衣一襲金帶鞍馬綵帛等時有投無名文字誣告從恩者故特有是賜以安其心乙卯河府軍前奏今月四日夜賊軍偷斫河西寨捕斬七百餘級時蜀軍自大散關來援王景崇郭威自將兵赴岐下將行戒白文珂劉詞等曰賊之驍勇並在城西慎為儆備既行至華州聞川軍敗退且憂文珂等為賊奔突遂兼程而迴賊城內偵知郭威西行於正月四日夜遣賊將王三鐵等案通鑑作王繼勳宋史王繼勳傳繼勳有武勇在軍陣常用鐵鞭鐵槊鐵撾軍中目為王三鐵率驍勇千餘人沿流南行坎岸而登為三道來攻賊軍已入王師砦中劉詞極力拒之短兵既接遂敗之二月丙子詔諸道州府所征乾祐元年夏秋苗畝上紐征白米稈草已納外並放是日旦黑霧四塞丁丑夕大風乙酉以前房州刺史李筠夫為鴻臚卿戊子前右監門將軍喬達及其兄契丹偽命客省使榮等皆棄市達李守貞之妹壻也故皆誅之庚寅徐州巡檢使成德欽奏至峒峿鎮遇淮賊破之殺五百人生擒一百二十人戊戌大雨霖庚子詔左諫議大夫賈緯等修撰高祖實錄三月丙辰以北京衙內指揮使劉鈞為汾州防禦使夏四月丙子以荊南節度行軍司馬武泰軍節度留後王保義為檢校太尉領武泰軍節度使行軍如故丁丑潁州獻紫兔白兔是月幽定滄貝深冀等州地震辛巳太白經天辛丑幸道宮禱雨五月甲辰朔故湖南節度使檢校太尉兼中書令扶風郡公贈太師馬希聲追封衡陽王戊申以前邠州節度使安審約為左神武統軍以前洛京副留守袁為右神武統軍乙卯河府軍前奏今月九日河中節度副使周光遜棄賊河西寨與將士一千一百三十人來奔己未右監門大將軍許遷上言奉使至博州博平縣界覩蝝生彌亙數里一夕並化為蝶飛去辛酉兗鄆齊三州奏蝝生乙丑永興趙思綰遣牙將劉成詣闕乞降制授趙思綰華州節度留後檢校太保以永興城內都指揮使常彥卿為虢州刺史丁卯宋州奏蝗抱草而死己巳湖南奏蠻寇賀州遣大將軍徐進率兵援之戰於風陽山下大敗蠻獠斬首五千級六月癸酉朔日有食之兗州奏捕蝗二萬斛魏博宿三州蝗抱草而死抱草原本作抱卓今據薛史五行志改正影庫本粘籤乙亥潁州獻白鹿戊寅安州節度使楊信案楊信本名承信在隱帝時避御名去承字薛史仍當時實錄之舊舊五代史考異奏亡父光遠蒙賜神道碑鐫勒畢無故中斷詔別令石鐫勒己卯滑濮澶曹兗淄青齊宿懷相衞博陳等州奏蝗分命中使致祭於所在川澤山林之神開封府滑曹等州蝗甚遣使捕之案宋史段思恭傳隱帝蝗詔徧祈山川思恭上言赦過宥罪議獄緩刑苟獄訟平允則災害不生望令諸州速決重刑無致淹濫必召和氣從之舊五代史考異壬午月犯心星辛卯回鶻遣使貢方物丙申改商州乾元縣為乾祐縣隸京兆府是月邠寧澤潞涇延鄜坊晉絳等州旱秋七月辛亥湖南奏析長沙縣東界為龍喜縣從之丙辰樞密使郭威奏收復河府羅城李守貞退保子城丁巳永興都部署郭從義奏新除華州留後趙思綰自今月三日授華州留後準詔赴任三移行期仍要鎧甲以給牙兵及與之竟不遵路至九日夕有部曲曹彥進告思綰欲於十一日夜與同惡五百人奔南山入蜀是日詰旦再促上路云俟夜進途臣尋與王峻入城分兵守四門其趙思綰部下軍各已執帶遂至牙署令趙思綰至則執之與一行徒黨並處置訖案歐陽史作七月丁巳郭威殺華州留後趙思綰于京兆以郭威專殺為文與薛史異舊五代史考異案歐陽史作七月丁巳郭威殺華州留後趙思綰于京兆蓋以郭從義等請命于郭威始誅思綰故以郭威專殺為文又誤以奏聞之日為專殺之日也通鑑作甲辰趙思綰釋甲出城受詔壬子殺思綰與薛史合為得其實孔本甲子樞密使郭威奏收復河中府逆賊李守貞自燔而死案通鑑壬戌李守貞自焚死歐陽史作甲子克河東祇以奏聞之日為據也五代春秋繫于六月殊誤舊五代史考異丙寅以權涼州留後折逋嘉施為河西軍節度留後兗州奏捕蝗三萬斛丁卯前洺州團練使武漢球卒戊辰永興軍節度使兼兵馬都部署郭從義加同平章事徙華州節度使郭從義奏處斬前巡檢使喬守溫供奉官王益時知化任繼勳等守溫受高祖命巡檢京兆會王益自鳳翔押送趙思綰等赴闕行至京兆守溫迎益於郊外思綰等突然作亂遂據其城及郭從義率兵攻討令守溫部署役夫守溫有愛姬陷在賊城為思綰所錄及收城從義盡得思綰之婢僕守溫求其愛姬從義雖與之意有所慊遂發前罪密啟于郭威請除之與王益等倂誅焉兗州奏捕蝗四萬斛壬午西京留臺侍御史趙礪彈奏太子太保王延太子洗馬張季凝等自去年五月後來每稱請假俱是不任拜起詔延等宜以本官致仕甲申以陝州節度使充河中一行兵馬都部署白文珂為西京留守加兼侍中潞州節度使充河中一行副都署常思加檢校太師以右散騎常侍盧撰為戶部侍郎致仕辛卯右拾遺高守瓊上言仕官年未三十請不除授縣令詔起今後諸色選人年及七十者宜注優散官年少未歷資考者不得注擬縣令癸巳以翰林學士工部尚書張沆為禮部尚書沆卜葬先人以內署無例乞假乃上章請解職以赴葬事遂落職以遣之乙未宣徽南院使永興行營兵馬都監王峻宣徽北院使河府行營兵馬都監吳虔裕並加檢校太傅九月乙巳樞密使郭威檢校太師兼侍中宋州節度使兼侍衞親軍都指揮使史弘肇加兼中書令初郭威平河中回朝廷議加恩威奏曰臣出兵已來輦轂之下無犬吠之憂俾臣得專一其事軍旅所聚貲糧不乏此皆居中大臣鎮撫謀畫之功也臣安敢獨擅其美乎帝然之於是弘肇與宰相樞密使三司使次第加恩既而諸大臣以恩之所被皆朝廷親近之臣而宗室劉信及青州劉銖等皆國家元勳青州劉銖原本作清州劉殊今從通鑑改正影庫本粘籤必有不平之意且外慮諸侯以朝廷有私於親近也於是議及四方侯伯普加恩焉丙午西京留守判官時彥澄推官姜蟾少尹崔淑並免居官坐不隨府罷職為留臺侍御史趙礪所彈也己酉以右千牛上將軍孫漢贇為絳州刺史禮部尚書判吏部尚書銓事王松停見任坐子仁寶為李守貞從事也尋卒於其第辛亥宰臣竇貞固加守司徒案宋史竇貞固傳作隱帝即位加司徒考貞固加司徒在乾祐二年宋史作即位所加蓋未詳考舊五代史考異蘇逢吉加守司空蘇禹珪加左僕射楊邠加右僕射依前兼樞密使太子太師致仕皇甫立卒癸丑三司使王章加邑封乙卯鄴都高行周加守太師襄州安審琦加守太傅兗州府符彥卿加守太保北京劉崇加兼中書令丁巳澶州李洪信移鎮陝州以侍衞馬軍都指揮使遂州節度使李洪義為澶州節度使己未許州劉信加兼侍中開封尹侯益進封魯國公鄆州慕容彥超青州劉銖並加兼侍中湖南馬希廣奏於八月十八日大破朗州馬希萼之衆辛酉靈州馮暉夏州李彝殷並加兼中書令右武衞將軍石懿左武衞將軍石訓並停任懿等以八月中秋享晉五廟命倡婦宿於齋宮鴻臚寺劾之故有是責癸亥鎮州武行德鳳翔趙暉並加檢校太師鄴都磁相邢洺等州奏霖雨害稼西京奏洛水溢岸乙丑晉州王晏同州張彥贇邠州侯章涇州史懿滄州王景延州高允權並加檢校太師冬十月庚午朔契丹入寇是日定州孫方簡徐州劉贇並加同平章事以利州節度使宋延渥為滑州節度使案延渥為利州節度使于前未見王禹偁宋公神道碑云少帝嗣統授檢校太尉使持節利州諸軍事行利州刺史蓋延渥于元年出鎮利州二年復改鎮也薛史未及詳載舊五代史考異甲戌皇弟興元節度使承勳加檢校太師承勳原本作成熏今從歐陽史家人傳改正影庫本粘籤丙子相州郭謹貝州王繼弘邢州薛懷讓並加檢校太尉庚辰安州楊信鄧州劉重進加檢校太師河陽李暉加檢校太傅壬午兩浙錢弘俶加守尚書令湖南馬希廣加守太尉癸未監修國史蘇逢吉史官賈緯以所撰高祖實錄二十卷上之丙戌荊南高保融加檢校太師兼侍中以殿前都部署江州防禦使李建為遂州節度使充侍衞馬軍都指揮使以奉國左廂都指揮使永州防禦使王殷為夔州節度使充侍衞步軍都指揮使契丹陷貝州高老鎮南至鄴都北境又西北至南宮堂陽殺掠吏民數州之地大被其苦藩郡守將閉關自固遣樞密使郭威率師巡邊仍令宣徽使王峻參預軍事庚寅府州折從阮進封岐國公豐州郭勳進封虢國公十一月壬寅鄜州留後王饒加檢校太傅癸丑以吳越國王錢弘俶母吳氏為順德太夫人時議者曰封贈之制婦人有國邑之號死乃有諡后妃公主亦然唐則天女主自我作古乃生有則天之號韋庶人有順聖之號知禮者非之近代梁氏賜張宗奭妻號曰賢懿又改為莊惠今以吳氏為順德皆非古之道也乙卯以大府卿劉皡為宗正卿十二月庚午朔湖南奏靜江軍節度使馬希贍以今年十月十八日卒廢朝二日辛未日暈三重戊寅司徒門下侍郎平章事竇貞固奏請修晉朝實錄詔史官賈緯竇儼王伸等修撰以禮部尚書張沆復為翰林學士壬午皇帝二十一姊永寧公主進封秦國長公主潁州奏破淮賊於正陽永樂大典卷一萬六千二百二, WYG: 攷證}
  - {type: variant, offset: 297, length: 3502, content: 惡五逆官典犯贓合造毒藥劫家殺人正身外其餘並放河府李守貞河府原本作何府冊府元龜作河中考薛史多稱河中府為河府今改正影庫本粘籤鳳翔王景崇永興趙思綰等比與國家素無讎生靈朕之赤子久陷孤壘可念非辜易子析骸填溝委壑為人父母寧不軫傷但以屈己愛人先王厚德包垢含辱列聖美談宜推濟物之恩用廣好生之道其李守貞等宜令逐處都部署分明曉諭若能翻然歸順朕即待之如初當保始終享其富貴明申信誓固無改移其或不順推誠堅欲拒命便可應時攻擊剋日盪平候收復城池罪止元惡其餘詿誤一切不問重念征討已來勞役滋甚兵猶在野民未息肩急賦繁徵財殫力匱矜卹之澤未被於疲羸愁嘆之聲幾盈於道路即俟邊鋒少弭國難漸除當議優饒冀獲蘇息諸道蕃侯郡守等咸分寄任共體憂勞更宜念彼瘡痍倍加勤卹究鄉閭之疾苦去州縣之煩苛勸課耕桑省察寃濫共恢庶政用副憂勞凡百臣僚當體朕意壬子賜前昭義軍節度使張從恩衣一襲金帶鞍馬綵帛等時有投無名文字誣告從恩者故特有是賜以安其心乙卯河府軍前奏今月四日夜賊軍偷斫河西寨捕斬七百餘級時蜀軍自大散關來援王景崇郭威自將兵赴岐下將行戒白文珂劉詞等曰賊之驍勇並在城西慎為儆備既行至華州聞川軍敗退且憂文珂等為賊奔突遂兼程而迴賊城內偵知郭威西行於正月四日夜遣賊將王三鐵等案通鑑作王繼勳宋史王繼勳傳繼勳有武勇在軍陣常用鐵鞭鐵槊鐵撾軍中目為王三鐵率驍勇千餘人沿流南行坎岸而登為三道來攻賊軍已入王師砦中劉詞極力拒之短兵既接遂敗之二月丙子詔諸道州府所征乾祐元年夏秋苗畝上紐征白米稈草已納外並放是日旦黑霧四塞丁丑夕大風乙酉以前房州刺史李筠夫為鴻臚卿戊子前右監門將軍喬達及其兄契丹偽命客省使榮等皆棄市達李守貞之妹壻也故皆誅之庚寅徐州巡檢使成德欽奏至峒峿鎮遇淮賊破之殺五百人生擒一百二十人戊戌大雨霖庚子詔左諫議大夫賈緯等修撰高祖實錄三月丙辰以北京衙內指揮使劉鈞為汾州防禦使夏四月丙子以荊南節度行軍司馬武泰軍節度留後王保義為檢校太尉領武泰軍節度使行軍如故丁丑潁州獻紫兔白兔是月幽定滄貝深冀等州地震辛巳太白經天辛丑幸道宮禱雨五月甲辰朔故湖南節度使檢校太尉兼中書令扶風郡公贈太師馬希聲追封衡陽王戊申以前邠州節度使安審約為左神武統軍以前洛京副留守袁為右神武統軍乙卯河府軍前奏今月九日河中節度副使周光遜棄賊河西寨與將士一千一百三十人來奔己未右監門大將軍許遷上言奉使至博州博平縣界覩蝝生彌亙數里一夕並化為蝶飛去辛酉兗鄆齊三州奏蝝生乙丑永興趙思綰遣牙將劉成詣闕乞降制授趙思綰華州節度留後檢校太保以永興城內都指揮使常彥卿為虢州刺史丁卯宋州奏蝗抱草而死己巳湖南奏蠻寇賀州遣大將軍徐進率兵援之戰於風陽山下大敗蠻獠斬首五千級六月癸酉朔日有食之兗州奏捕蝗二萬斛魏博宿三州蝗抱草而死抱草原本作抱卓今據薛史五行志改正影庫本粘籤乙亥潁州獻白鹿戊寅安州節度使楊信案楊信本名承信在隱帝時避御名去承字薛史仍當時實錄之舊舊五代史考異奏亡父光遠蒙賜神道碑鐫勒畢無故中斷詔別令石鐫勒己卯滑濮澶曹兗淄青齊宿懷相衞博陳等州奏蝗分命中使致祭於所在川澤山林之神開封府滑曹等州蝗甚遣使捕之案宋史段思恭傳隱帝蝗詔徧祈山川思恭上言赦過宥罪議獄緩刑苟獄訟平允則災害不生望令諸州速決重刑無致淹濫必召和氣從之舊五代史考異壬午月犯心星辛卯回鶻遣使貢方物丙申改商州乾元縣為乾祐縣隸京兆府是月邠寧澤潞涇延鄜坊晉絳等州旱秋七月辛亥湖南奏析長沙縣東界為龍喜縣從之丙辰樞密使郭威奏收復河府羅城李守貞退保子城丁巳永興都部署郭從義奏新除華州留後趙思綰自今月三日授華州留後準詔赴任三移行期仍要鎧甲以給牙兵及與之竟不遵路至九日夕有部曲曹彥進告思綰欲於十一日夜與同惡五百人奔南山入蜀是日詰旦再促上路云俟夜進途臣尋與王峻入城分兵守四門其趙思綰部下軍各已執帶遂至牙署令趙思綰至則執之與一行徒黨並處置訖案歐陽史作七月丁巳郭威殺華州留後趙思綰于京兆以郭威專殺為文與薛史異舊五代史考異案歐陽史作七月丁巳郭威殺華州留後趙思綰于京兆蓋以郭從義等請命于郭威始誅思綰故以郭威專殺為文又誤以奏聞之日為專殺之日也通鑑作甲辰趙思綰釋甲出城受詔壬子殺思綰與薛史合為得其實孔本甲子樞密使郭威奏收復河中府逆賊李守貞自燔而死案通鑑壬戌李守貞自焚死歐陽史作甲子克河東祇以奏聞之日為據也五代春秋繫于六月殊誤舊五代史考異丙寅以權涼州留後折逋嘉施為河西軍節度留後兗州奏捕蝗三萬斛丁卯前洺州團練使武漢球卒戊辰永興軍節度使兼兵馬都部署郭從義加同平章事徙華州節度使郭從義奏處斬前巡檢使喬守溫供奉官王益時知化任繼勳等守溫受高祖命巡檢京兆會王益自鳳翔押送趙思綰等赴闕行至京兆守溫迎益於郊外思綰等突然作亂遂據其城及郭從義率兵攻討令守溫部署役夫守溫有愛姬陷在賊城為思綰所錄及收城從義盡得思綰之婢僕守溫求其愛姬從義雖與之意有所慊遂發前罪密啟于郭威請除之與王益等倂誅焉兗州奏捕蝗四萬斛壬午西京留臺侍御史趙礪彈奏太子太保王延太子洗馬張季凝等自去年五月後來每稱請假俱是不任拜起詔延等宜以本官致仕甲申以陝州節度使充河中一行兵馬都部署白文珂為西京留守加兼侍中潞州節度使充河中一行副都署常思加檢校太師以右散騎常侍盧撰為戶部侍郎致仕辛卯右拾遺高守瓊上言仕官年未三十請不除授縣令詔起今後諸色選人年及七十者宜注優散官年少未歷資考者不得注擬縣令癸巳以翰林學士工部尚書張沆為禮部尚書沆卜葬先人以內署無例乞假乃上章請解職以赴葬事遂落職以遣之乙未宣徽南院使永興行營兵馬都監王峻宣徽北院使河府行營兵馬都監吳虔裕並加檢校太傅九月乙巳樞密使郭威檢校太師兼侍中宋州節度使兼侍衞親軍都指揮使史弘肇加兼中書令初郭威平河中回朝廷議加恩威奏曰臣出兵已來輦轂之下無犬吠之憂俾臣得專一其事軍旅所聚貲糧不乏此皆居中大臣鎮撫謀畫之功也臣安敢獨擅其美乎帝然之於是弘肇與宰相樞密使三司使次第加恩既而諸大臣以恩之所被皆朝廷親近之臣而宗室劉信及青州劉銖等皆國家元勳青州劉銖原本作清州劉殊今從通鑑改正影庫本粘籤必有不平之意且外慮諸侯以朝廷有私於親近也於是議及四方侯伯普加恩焉丙午西京留守判官時彥澄推官姜蟾少尹崔淑並免居官坐不隨府罷職為留臺侍御史趙礪所彈也己酉以右千牛上將軍孫漢贇為絳州刺史禮部尚書判吏部尚書銓事王松停見任坐子仁寶為李守貞從事也尋卒於其第辛亥宰臣竇貞固加守司徒案宋史竇貞固傳作隱帝即位加司徒考貞固加司徒在乾祐二年宋史作即位所加蓋未詳考舊五代史考異蘇逢吉加守司空蘇禹珪加左僕射楊邠加右僕射依前兼樞密使太子太師致仕皇甫立卒癸丑三司使王章加邑封乙卯鄴都高行周加守太師襄州安審琦加守太傅兗州府符彥卿加守太保北京劉崇加兼中書令丁巳澶州李洪信移鎮陝州以侍衞馬軍都指揮使遂州節度使李洪義為澶州節度使己未許州劉信加兼侍中開封尹侯益進封魯國公鄆州慕容彥超青州劉銖並加兼侍中湖南馬希廣奏於八月十八日大破朗州馬希萼之衆辛酉靈州馮暉夏州李彝殷並加兼中書令右武衞將軍石懿左武衞將軍石訓並停任懿等以八月中秋享晉五廟命倡婦宿於齋宮鴻臚寺劾之故有是責癸亥鎮州武行德鳳翔趙暉並加檢校太師鄴都磁相邢洺等州奏霖雨害稼西京奏洛水溢岸乙丑晉州王晏同州張彥贇邠州侯章涇州史懿滄州王景延州高允權並加檢校太師冬十月庚午朔契丹入寇是日定州孫方簡徐州劉贇並加同平章事以利州節度使宋延渥為滑州節度使案延渥為利州節度使于前未見王禹偁宋公神道碑云少帝嗣統授檢校太尉使持節利州諸軍事行利州刺史蓋延渥于元年出鎮利州二年復改鎮也薛史未及詳載舊五代史考異甲戌皇弟興元節度使承勳加檢校太師承勳原本作成熏今從歐陽史家人傳改正影庫本粘籤丙子相州郭謹貝州王繼弘邢州薛懷讓並加檢校太尉庚辰安州楊信鄧州劉重進加檢校太師河陽李暉加檢校太傅壬午兩浙錢弘俶加守尚書令湖南馬希廣加守太尉癸未監修國史蘇逢吉史官賈緯以所撰高祖實錄二十卷上之丙戌荊南高保融加檢校太師兼侍中以殿前都部署江州防禦使李建為遂州節度使充侍衞馬軍都指揮使以奉國左廂都指揮使永州防禦使王殷為夔州節度使充侍衞步軍都指揮使契丹陷貝州高老鎮南至鄴都北境又西北至南宮堂陽殺掠吏民數州之地大被其苦藩郡守將閉關自固遣樞密使郭威率師巡邊仍令宣徽使王峻參預軍事庚寅府州折從阮進封岐國公豐州郭勳進封虢國公十一月壬寅鄜州留後王饒加檢校太傅癸丑以吳越國王錢弘俶母吳氏為順德太夫人時議者曰封贈之制婦人有國邑之號死乃有諡后妃公主亦然唐則天女主自我作古乃生有則天之號韋庶人有順聖之號知禮者非之近代梁氏賜張宗奭妻號曰賢懿又改為莊惠今以吳氏為順德皆非古之道也乙卯以大府卿劉皡為宗正卿十二月庚午朔湖南奏靜江軍節度使馬希贍以今年十月十八日卒廢朝二日辛未日暈三重戊寅司徒門下侍郎平章事竇貞固奏請修晉朝實錄詔史官賈緯竇儼王伸等修撰以禮部尚書張沆復為翰林學士壬午皇帝二十一姊永寧公主進封秦國長公主潁州奏破淮賊於正陽永樂大典卷一萬六千二百二, krp: 攷證}
