  - {type: variant, offset: 3071, length: 0, content: '', WYG: 書令食邑千户賜號忠烈扶天啟運功臣十月平梁遷都洛陽存審以身為大將不得預収復中原之功舊疾愈作堅求入覲尋醫以情告郭崇韜時崇韜自負一時佐命之功無出已右功名事望素在存審之下權勢既隆人士輻湊不欲存審加于巳上每有章奏求覲即隂沮之存審妻郭氏泣訢于崇韜曰吾夫于國麤効驅馳與公鄉里親舊公忍令死棄北荒何無情之如是崇韜益慙戁明年春疾甚上章懇切乞生覲天顔不許存審伏枕面歎曰老夫歴事二主垂四十年幸而遇今日天下一家逺夷極塞皆得面覲彤墀射鉤斬袪之人孰不奉觴丹陛獨予壅隔豈非命哉漸增危篤崇韜奏請許存審入覲四月制授存審宣武軍節度使諸道審漢馬步總管詔未至五月十五日卒于幽州官舍時年六十三遺命葬太原存審遺奏陳叙不得面覲詞旨悽惋莊宗震悼久之廢朝三日贈尚書令存審少在軍中識機知變}
  - {type: page-break, offset: 3071, content: '', id: KR2a0029_WYG_113-12a, image: WYG0277/WYG0277-0477a.png}
