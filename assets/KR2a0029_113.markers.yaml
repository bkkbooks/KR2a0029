  - {type: variant, offset: 2253, length: 2, content: 侍衞, WYG: 與李嗣昭符存審配饗莊宗廟廷晉髙祖即位追封燕王子光輔歴汾汝州刺史符存審字徳詳陳州宛邱人歐陽史義兒𫝊惟符存審不在其列别自為𫝊盖存審子彦卿有女為宋太宗后故存其本姓也舊名存父楚本州牙將存審少豪俠多智算言兵家事乾符末河南盜起存審鳩率豪右庇捍州里㑹郡人李罕之起自羣盜授光州刺史因徃依之中和末罕之為蔡冦所逼棄郡投諸葛爽存審從至河陽為小校屢戰蔡賊有功諸葛爽卒罕之為其部將所逼出保懷州部下分散存審乃歸于武皇武皇署右職令典義兒軍賜姓名存審性謹厚寵遇日隆自是武皇西征存審常從所至立功從討赫連鐸冒刃死戰血流盈袖武皇手自封瘡日夕臨問乾寧初討李匡儔存審前軍拔居庸闗明年從討邠州時邠之勁兵屯龍泉寨四面懸崖石壁險固存審奮力拔之師還授檢校左僕射副李嗣昭討李康于汾州擒之以功改左右廂}
