  - {type: variant, offset: 3911, length: 1499, content: 一祕不發喪乙未遷神柩於萬歲殿召文武百官班於殿廷宣遺制晉王榮可於柩前即皇帝位服紀月日一如舊制云是歲自正月朔日後景色昏晦日月多暈及嗣君即位之日天氣晴朗中外肅然帝自郊禋後其疾乍瘳乍劇晉王省侍不離左右案東都事略李重進周太祖之甥母即福慶長公主重進年長于世宗及太祖寢疾召重進受顧命令拜世宗以定君臣之分舊五代史考異累諭晉王曰我若不起此疾汝即速治山陵不得久留殿內陵所務從儉素應緣山陵役力人匠並須和雇不計近遠不得差配百姓陵寢不須用石柱費人功只以磚代之用瓦棺紙衣臨入陵之時召近稅戶三十家為陵戶下事前揭開瓦棺下事原本作卞是今從通鑑及契丹國志改正影庫本粘籤遍視過陵內切不得傷他人命勿脩下宮不要守陵宮人亦不得用石人石獸只立一石記子鐫字云大周天子臨晏駕與嗣帝約緣平生好儉素只令著瓦棺紙衣葬若違此言陰靈不相助又言朕攻收河府時見李家十八帝陵園廣費錢物人力並遭開發汝不聞漢文帝儉素葬在霸陵原至今見在如每年寒食無事時即仰量事差人灑掃如無人去只遙祭兼仰於河府魏府各葬一副劍甲澶州葬通天冠絳紗袍東京葬一副平天冠袞龍服千萬千萬莫忘朕言二月甲子太常卿田敏上尊諡曰聖神恭肅文武孝皇帝廟號太祖四月乙巳葬於嵩陵宰臣李穀撰諡冊文王溥撰哀冊文永樂大典卷八千九百八十五代史補高祖之為樞密使也每出入常恍然覩人前導狀若臺省人吏其服色一緋一綠高祖以為不祥深憂之及河中鳳翔永興等處反詔命高祖征之一舉而三鎮瓦解自是權傾天下論者以為功高不賞郭氏其危乎高祖聞而恐懼居無何忽覩前導者服色緋者改紫綠者改緋高祖心始安曰彼二人者但見其升不見其降吉兆也未幾遂為三軍所推戴高祖之入京師也三軍紛擾殺人爭物者不可勝數時有趙童子者知書善射至防禦使覩其紛擾竊憤之乃大呼於衆中曰樞密太尉志在除君側以安國所謂兵以義舉鼠輩敢爾乃賊也豈太尉意耶於是持弓矢於所居巷口據牀坐凡軍人之來侵犯者皆殺之由是居人賴以保全僅數千家其間亦有致金帛于門下用為報答已堆集如丘陵焉童子見而笑曰吾豈求利者耶於是盡歸其主高祖聞而異之陰謂世宗曰吾聞人間讖云趙氏合當為天子觀此人才略度量近之矣不早除去吾與汝其可保乎使人誣告收付御史府劾而誅之洎高祖厭世未十年而皇宋有天下趙氏之讖乃應于斯知王者不死信矣哉高祖征李守貞軍次河上高祖慮其爭濟臨岸而諭之未及坐忽有羣鴉噪于上高祖退十餘步引弓將射之矢未及發而岸崩其璺裂之勢在高祖足下高祖棄弓顧羣鴉而笑曰得非天使汝驚動吾耶如此則李守貞不足破矣於是三軍欣然各懷鬬志矣五代史闕文周太祖在漢隱帝朝為樞密使將兵伐河中李守貞時馮道守太師不與朝政以請告周祖謁道于私第問伐蒲策道辭以不在其位不敢議國事周祖固問之道不得已謂周祖曰相公頗知博乎周祖微時好蒱博屢以此抵罪疑道譏己勃然變色道曰是行亦猶博也夫博財多者氣豪而勝財寡者心怯而輸守貞嘗累典禁兵自謂軍情附己遂謀反耳今相公誠能不惜官錢廣施惠愛明其賞罰使軍心許國則守貞不足慮也周祖曰恭聞命矣故伐蒲之役周祖以便宜從事卒成大功然亦軍旅歸心終移漢祚又周祖自鄴起兵赴闕漢隱帝兵敗遇害於劉子陂周祖入京師百官謁周祖見道猶設拜意道便行推戴道受拜如平時徐曰侍中此行不易周祖氣沮故禪代之謀稍緩及請道詣徐州冊湘陰公為漢嗣道曰侍中由衷乎周祖設誓道曰莫教老夫為謬語令為謬語人臣謹案周世宗朝詔御史臣修周祖實錄故道之事所宜諱矣史臣曰周太祖昔在初潛未聞多譽洎西平蒲阪北鎮鄴臺有統御之勞顯英偉之量旋屬漢道斯季天命有歸縱虎旅以盪神京不無慚德攬龍圖而登帝位遂闡皇風期月而弊政皆除逾歲而羣情大服何遷善之如是蓋應變以無窮者也所以魯國凶徒望風而散幷門遺孽引日偷生及鼎駕之將昇命瓦棺而薄葬勤儉之美終始可稱雖享國之非長亦開基之有裕矣然而二王之誅議者譏其不能駕馭權豪傷於猜忍卜年斯促抑有由焉永樂大典卷八千九百八十, WYG: 六}
