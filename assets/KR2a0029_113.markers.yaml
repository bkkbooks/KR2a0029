  - {type: variant, offset: 2241, length: 2, content: 何福, krp: 王鎔來告難帝遣徳威率前軍出井陘屯于趙州十二月帝親征二十五日}
  - {type: variant, offset: 2244, length: 0, content: '', WYG: 薄汴營距柏鄉五里營於野河上汴將韓勍率精兵三萬鎧甲皆被繒綺金銀炫曜望之森然我軍懼形於色徳威謂李存璋曰賊結陣而來觀其形勢志不在戰欲以兵甲燿威耳我軍人乍見其來謂其鋒不可當此時不挫其銳吾軍不振矣乃遣存璋諭諸軍曰爾見此賊軍否是汴州天武徤兒皆屠活傭販虚有表耳縱被精甲十不當一擒獲足以為資徳威自率精騎擊其兩偏左馳右決出沒數四是日獲賊百餘人賊渡河而退徳威謂莊宗曰賊驕氣充盛宜按兵以待其衰莊宗曰我提孤軍救難解紛三鎮烏合之衆利在速戰卿欲持重吾懼其不可使也徳威曰鎮定之士長于守城列陣野戰素非便習我師破賊惟恃騎軍平田廣野易為施功今壓賊營令彼見我虚實則勝負未可必也莊宗不悦退卧帳中徳威患之謂監軍張承業曰王欲速戰將烏合之徒欲當劇賊所謂不量力也去賊咫尺限此一渠水彼若早夜以畧彴渡之吾族其為俘矣若退軍鄗邑引賊離營彼出則歸復以輕騎掠其芻餉不踰月敗賊必矣承業入言莊宗乃釋然徳威得降人問之景仁下令造浮橋數日果如徳威所料二十七日乃退軍保鄗邑八年正月二日徳威率騎軍致師于柏鄉設伏于村塢間令三百騎以壓汴營王景仁悉其衆結陣而來徳威轉戰而退汴軍因而乗之至于鄗邑南時步軍未成列徳威陣騎河上以抗之亭午兩軍皆陣莊宗問戰時徳威曰汴軍氣盛可以勞逸制之造次輕力殆難與敵古者師行不踰一舍盖慮糧餉不給士有饑色今賊逺來決戰縱挾糗糒亦不遑食晡晩之後饑渴内侵戰陣外迫士心既倦將必求退乗其勞弊以生兵制之縱不大敗偏師必喪以臣所籌利在晡晩諸將皆然之時汴軍以魏博之人為右廣宋汴之人為左廣自未至申陣勢稍卻徳威麾軍呼曰汴軍走矣塵埃漲天魏人収軍漸退莊宗與史建瑭安金全等因衝其陣夾攻之大敗汴軍殺戮殆盡王景仁李思安僅以身免獲將校二百八十人八月劉守光僭稱大燕皇帝十二月遣徳威率步騎三萬出飛狐與鎮州將王徳明定州將程嚴等軍進討九年正月収涿州降刺史劉知溫五月七日劉守光令驍將單廷珪督精甲萬人出戰徳威遇于龍頭岡初廷珪謂左右曰今日擒周陽五既臨陣見徳威廷珪單騎持槍躬追徳威垂及徳威側身避之廷珪少退徳威奮檛擊墜其馬生獲廷珪賊黨大敗斬首三千級獲大將李山海等五十二人十二日徳威自涿州進軍良鄉大城守光既失廷珪自是奪氣徳威之師屢收諸郡降者相繼十年十一月擒守光父子幽州平十二月授徳威檢校侍中幽州盧龍等軍節度使徳威性忠孝感武皇奬遇嘗思臨難忘身十二月汴將劉鄩自洹水乘虛將冦太原徳威在幽州聞之徑以五百騎馳入土門聞鄩軍至樂平不進徳威徑至南宫以候汴軍初劉鄩欲據臨清以扼鎮定轉餉之路行次陳宋口徳威遣將擒數十人皆倳刃于背縶而遣之既至謂劉鄩曰周侍中巳據宗城矣徳威其夜急騎扼臨清劉鄩乃入貝州是時徳威若不至則勝負未可知也十四年三月契丹冦新州徳威不利退保范陽遼史太祖紀神冊二年三月辛亥攻幽州節度使周徳威以幽并鎮定魏五州兵拒戰于居庸關之西戰于新州東大破之斬首三萬級又通鑑契丹主帥衆三十萬徳威衆寡不敵大為契丹所敗敵衆攻僅二百日外援未至徳威撫循士衆晝夜乘城竟獲保守十五年我師營麻口渡將大舉以定汴州徳威自幽州率大軍至十二月二十三日軍次胡栁陂詰旦騎報曰汴軍至矣莊宗使問戰備徳威}
