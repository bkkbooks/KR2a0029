  - {type: variant, offset: 1027, length: 809, content: 月戊寅朔徐州言龍出豐縣村民井中即時澍雨漂沒城邑癸未太子賓客馬裔孫卒甲申鄴都王殷奏乞朝覲凡三上章允之尋以北邊奏契丹事機詔止其行丙戌以左金吾上將軍安審信為太子太師致仕丁亥以右金吾上將軍張從恩為左金吾上將軍以前鄧州節度使張彥成為右金吾上將軍己丑以虎捷左廂都指揮使永州防禦使韓通為陝州留後庚寅太府卿判司天監趙延乂卒辛卯以前西京副留守盧價為太子賓客乙未以御史中丞邊光範為禮部侍郎以刑部侍郎張煦為御史中丞以翰林學士承旨尚書禮部侍郎徐台符為刑部侍郎充職丙申太子太師致仕安審信卒丁酉詔曰京兆鳳翔府同華邠延鄜耀等州所管州縣軍鎮頃因唐末藩鎮殊風久歷歲時未能釐革政途不一何以教民其婚田爭訟賦稅丁徭合是令佐之職其擒姦捕盜庇護部民合是軍鎮警察之職今後各守職分專切提撕如所職疏遣各行按責其州府不得差監徵軍將下縣戊戌衞尉少卿李溫美責授房州司戶參軍溫美奉使祭海便道歸家家在壽光縣為縣吏馮勳所訟故黜之供奉官武懷贊棄市坐盜馬價入己也壬寅以鴻臚少卿趙脩己為司天監八月己酉幸南莊丙辰內衣庫使齊藏珍除名配沙門島藏珍奉詔脩河不於役所部轄私至近縣止宿及報隄防危急安寢不動遂致橫流故有是責庚申邢州節度使劉詞移鎮河陽辛酉以龍捷左廂都指揮使閬州防禦使田景咸為邢州留後景咸原本作景成邢州原本作刑州今各據通鑑改正影庫本粘籤丁卯河決河陰京師霖雨不止給賜諸軍將士薪芻有差癸酉以翰林學士戶部侍郎王溥為端明殿學士甲戌潭州王逵奏朗州劉言與淮賊通連差指揮使鄭珓部領兵士欲併當道鄭珓為軍衆所執奔入武陵劉言尋為諸軍所廢臣已至朗州安撫訖詔劉言勒歸私第委王逵取便安置是月所在州郡奏霖雨連綿漂沒田稼損壞城郭廬舍九月己卯太子少保盧損卒丁酉深州上言樂壽縣兵馬都監杜延熙為戍兵所害先是齊州保寧郡兵士屯於樂壽都頭劉彥章等殺延熙為亂時鄭州開道指揮使張萬友亦屯於樂壽然不與之同朝廷急遣供奉官馬諤省其事馬諤原本作馬咢今從通鑑改正影庫本粘籤諤乃與萬友擒彥章等十三人斬之餘衆奔齊州是月多陰曀木再華冬十月戊申朔詔以來, WYG: ''}
