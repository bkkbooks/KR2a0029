  - {type: variant, offset: 2245, length: 1, content: 乞, WYG: 曰賊倍道而來未成營壘我營柵巳固守備有餘既深入賊疆須決萬全之䇿此去大梁信宿賊之家屬盡在其間人之常情孰不以家國為念以我深入之衆抗彼激憤之軍不以方畧制之恐難必勝王但按軍保柵臣以騎軍疲之使彼不得下營際晩糧餉不給進退無據因以乘之破賊之道也莊宗曰河上終日挑戰恨不遇賊今款門不戰非壯夫也乃率親軍成列而出徳威不獲已從之謂其子曰吾不知其死所矣莊宗與汴將王彦章接戰大敗之徳威之軍在東偏汴之游軍入我輜重衆駭奔入徳威軍因紛擾無行列徳威兵少不能解父子俱戰沒先是鎮星犯上將星占者云不利大將是夜収軍徳威不至莊宗慟哭謂諸將曰喪我良將吾之咎也徳威身長面黑笑不改容凡對敵列陣凜凜然有肅殺之氣中興之}
