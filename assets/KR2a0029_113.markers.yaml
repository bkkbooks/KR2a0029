  - {type: variant, offset: 768, length: 144, content: 集賢殿大學士權判門下省事范質可權監脩國史六月壬子滄州奏契丹幽州榷鹽制置使兼防州刺史知盧臺軍事張藏英以本軍兵士及職員戶人孳畜七千頭口歸化案歐陽史作秋七月張藏英來奔舊五代史考異癸丑以前開封尹楚國公侯益為太子太師以前西京留守莒國公王守恩為左衞上將軍案原本作守思今據通鑑改正舊五代史考異以前永興軍, WYG: 振武}
