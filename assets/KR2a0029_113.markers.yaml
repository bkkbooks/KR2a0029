  - {type: variant, offset: 1837, length: 372, content: 正月一日有事於南郊諸道州府不得以進奉南郊為名輒有率斂己酉右金吾上將軍張彥成卒庚戌以前同州節度使薛懷讓為左屯衞上將軍以尚書左丞兼判國子監田敏權判太常卿以禮部尚書王易權兵部尚書太常奏郊廟社稷壇位制度請下所司脩奉從之以中書令馮道為南郊大禮使以開封尹晉王榮為頓遞使權兵部尚書王易為鹵簿使御史中丞張煦為儀仗使權判太常卿田敏為禮儀使以前潁州防禦使郭瓊為權宗正卿甲寅以前光祿卿丁知浚復為光祿卿丙辰幸南莊西莊己未前寧州刺史張建武責授右司禦副率以野鷄族失利故也以前翰林學士工部侍郎魚崇諒為禮部侍郎充翰林學士時崇諒解職於陝州就養至是再除禁職仍賜詔召之令本州給行裝鞍馬侍親歸朝以太子賓客張昭為戶部尚書以太子賓客李濤為刑部尚書詔中書令馮道赴西京迎奉太廟神主甲子中書令馮道率百官上尊號曰聖明文武仁德皇帝答詔不允凡三上章允之仍俟郊禮畢施行壬申鄴都邢洺等州皆上言地震鄴都尤甚, WYG: ''}
