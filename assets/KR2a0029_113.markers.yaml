  - {type: variant, offset: 29, length: 73, content: 相州留後白重贊為滑州節度使以鄭州防禦使王進為相州節度使以前兗州防禦使索萬進為延州節度使以亳州防禦使張鐸為同州節度使甲申以皇子澶州節度使榮為開封尹兼, WYG: ''}
