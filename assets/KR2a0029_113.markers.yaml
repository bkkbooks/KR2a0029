  - {type: variant, offset: 3071, length: 0, content: '', krp: 書令食邑千户賜號忠烈扶天啟運功臣十月平梁遷都洛陽存審以身為大將不得預収復中原之功舊疾愈作堅求入覲尋醫以情告郭崇韜時崇韜自負一時佐命之功無出已右功名事望素在存審之下權勢既隆人士輻湊不欲存審加于巳上每有章奏求覲即隂沮之存審妻郭氏泣訢于崇韜曰吾夫于國麤効驅馳與公鄉里親舊公忍令死棄北荒何無情之如是崇韜益慙戁明年春疾甚上章懇切乞生覲天顔不許存審伏枕面歎曰老夫歴事二主垂四十年幸而遇今日天下一家逺夷極塞皆得面覲彤墀射鉤斬袪之人孰不奉觴丹陛獨予壅隔豈非命哉漸增危篤崇韜奏請許存審入覲四月制授存審宣武軍節度使諸道審漢馬步總管詔未至五月十五日卒于幽州官舍時年六十三遺命葬太原存審遺奏陳叙不得面覲詞旨悽惋莊宗震悼久之廢朝三日贈尚書令存審少在軍中識機知變}
  - {type: variant, offset: 3072, length: 2, content: 開封, WYG: 軍出師法令嚴明決䇿制勝從無遺悔功名與周徳威相匹皆近代之良也常戒諸子曰予本寒家少小攜一劒而違鄉里四十年間位極將相其間屯危患難履鋒冒刃入萬死而無一生身方及此前後矢僅百餘乃出鏃以示諸子因以奢侈為戒存審微時嘗為俘囚將就戮於郊外臨刑指危垣謂主者曰請就戮于此下冀得環垣覆尸旅魂之幸也主者哀之為移次焉遷延之際主擁妓而飲思得歌者以助歡妓曰俘囚有符存審者妾之舊識每令擊節以贊歌令主將欣然馳騎而舍之豈非命也彦超存審之長子也少事武皇累歴牙職存審卒莊宗以彦超為汾州刺史同光末魏州軍亂詔彦超赴北京巡檢先是朝廷令内官吕鄭二人在太原一監兵一監倉庫及明宗入洛皇弟存霸單騎奔河東與吕鄭謀殺彦超與留守張憲彦超覺之密與憲謀未決部下大譟州兵畢集張憲出奔是夕軍士殺吕鄭存霸于衙城詰旦聞洛城禍變彦超告諭三軍宋史張昭𫝊云昭為張憲推官莊宗及難聞鄴中兵士推戴明宗憲部將符彦超合戍將應之憲死有害昭者執之以送彦超彦超曰推官正人無得害之又逼昭為榜安撫軍民明宗又令其弟龍武都虞候彦卿馳騎安撫六月彦超入覲明宗召見撫諭尋授晉州留後未行㑹其弟前曹州刺史彦饒平宣武亂軍明宗喜召彦超謂之曰吾得爾兄弟力餘更何憂爾為我徃河東撫育耆舊即授北京留守太原}
