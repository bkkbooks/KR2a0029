  - {type: variant, offset: 11, length: 2, content: 書四, WYG: 徳威字鎮逺小字陽五朔州馬邑人也初事武皇為帳中騎督驍勇使騎射膽氣智數皆過人久在雲中諳熟邊事望煙塵之警懸知兵勢乾寧中為鐡林軍使從武皇討王行瑜以功加檢校左僕射移内衙軍副光化二年三月汴將氏叔琮率衆逼}
  - {type: page-break, offset: 11, content: '', id: KR2a0029_WYG_113-1b, image: WYG0277/WYG0277-0471d.png}
  - {type: variant, offset: 11, length: 2, content: 書四, krp: 徳威字鎮逺小字陽五朔州馬邑人也初事武皇為帳中騎督驍勇使騎射膽氣智數皆過人久在雲中諳熟邊事望煙塵之警懸知兵勢乾寧中為鐡林軍使從武皇討王行瑜以功加檢校左僕射移内衙軍副光化二年三月汴將氏叔琮率衆逼}
  - {type: line-break, offset: 13, content: '', id: ZHSJ__dup18205}
  - {type: variant, offset: 14, length: 6, content: 祖紀第四廣順, WYG: 原有陳章者以虓勇知名衆謂之夜乂言于叔琮曰晉人所恃者周陽五願擒之請賞以郡陳章嘗乗驄馬朱甲以自異武皇减徳威曰我聞陳夜乂欲取爾求郡宜善備之徳威曰陳章大言未知鹿死誰手他日致師戒部下曰如陣上見陳夜乂爾等但走徳威微服挑戰部下偽退陳章縱追之徳威背揮鐡撾擊墮馬生獲以獻由是知名天復中我師不利于潘縣汴將朱友寧氏叔琮來逼晉陽時諸軍未集城中大恐徳威與李嗣昭選募銳兵出諸門攻其壘擒生斬馘汴人枝梧不暇乃退天祐}
  - {type: page-break, offset: 14, content: '', id: KR2a0029_WYG_113-2a, image: WYG0277/WYG0277-0472a.png}
