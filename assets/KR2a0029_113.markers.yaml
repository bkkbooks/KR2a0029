  - {type: variant, offset: 103, length: 336, content: 德使封晉王仍令所司擇日備禮冊命丙戌以宣徽北院使兼樞密副使鄭仁誨為澶州節度使以殿前都指揮使李重進領泗州防禦使以客省使向訓為內客省使己丑以棣州團練使王仁鎬為右衞大將軍充宣徽北院使兼樞密副使庚寅端明殿學士尚書兵部侍郎顏衎落職守本官案宋史顏衎傳云衎權知開封府王峻敗衎罷職守兵部侍郎蓋當時以晉王為開封尹故衎罷職與薛史異以翰林學士中書舍人王溥為戶部侍郎充職以左司郎中充樞密直學士景範為左諫議大夫充職祕書監陳觀責授左贊善大夫留司西京坐王峻黨也癸巳大風雨土戊申幸南莊夏四月甲寅禁沿邊民鬻兵仗與蕃人戊辰河中節度使王景移鎮鳳翔宋州節度使常思移鎮青州鳳翔節度使趙暉移鎮宋州河陽節度使王彥超移鎮河中賜朗州劉言絹三百匹以兵革之後匱乏故也詔在京諸軍將士持支救接五月己卯朔帝御崇元殿受朝仗衞如儀辛巳前慶, WYG: 加檢校太保代}
