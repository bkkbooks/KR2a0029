  - {type: variant, offset: 2521, length: 0, content: '', WYG: 明年就加平章事十四年八月將兵援周徳威于幽州敗契丹之衆冬破汴將安彦之于楊劉諸軍進營麻口時梁將謝彦章營行臺村莊宗勇于接戰每以輕騎當之遇窘者數四存審每俟其出必叩馬諫曰}
  - {type: page-break, offset: 2521, content: '', id: KR2a0029_WYG_113-10a, image: WYG0277/WYG0277-0476a.png}
  - {type: variant, offset: 2521, length: 0, content: '', krp: 明年就加平章事十四年八月將兵援周徳威于幽州敗契丹之衆冬破汴將安彦之于楊劉諸軍進營麻口時梁將謝彦章營行臺村莊宗勇于接戰每以輕騎當之遇窘者數四存審每俟其出必叩馬諫曰}
  - {type: variant, offset: 2522, length: 9, content: 殷削奪在身官爵長流, WYG: 將復唐宗社宜為天下自愛搴旗挑戰一劒之任無益聖徳請責效于臣古人不以賊遺君父臣雖不武敢不代君之憂莊宗即時迴駕十二月戰于胡栁晡晩之後存審引所部銀槍効節軍敗梁軍于土山下是日辰巳間周徳威戰殁一軍逗撓梁軍四集存審與其子彦圖冒刃血戰出沒賊陣與莊宗軍合于午後師復集擊敗汴人十六年春代周徳威為内外蕃漢馬步總管于徳勝口築南北城以據之七月汴將王瓚自黎陽渡河冦澶州存審拒戰瓚退營于楊村渡控我上游自是日與交鋒對壘經年大小凡百餘戰十七年汴將劉鄩攻同州朱友謙求援于我遣存審與李嗣昭將兵赴之九月次河中進營朝邑時河中久臣于梁衆持兩端及諸軍大集芻栗暴貴嗣昭懼其翻覆將急戰以定勝負居旬日梁軍逼我營㑹望氣者言西南黑氣如鬭雞之狀當有戰陣存審曰我方欲決戰而形于氣象得非天贊歟是夜閲其衆詰旦進軍梁軍來逆戰大敗之追斬二千餘級自是梁軍保壘不出存審謂嗣昭曰吾初懼劉鄩據渭河偏師既敗彼若退歸懼我踵之窮獸搏人勿謂無事可開其歸路然後追奔乃令王建及牧馬于沙苑劉鄩尹皓知之保衆退去歐陽史鄩以為晉軍且懈乃夜遁去存審追擊于渭河又大敗之遂解同州之圍存審略地至奉先謁諸帝陵乃班師十八年王師討張文禮于鎮州李嗣昭李存進相次戰歿十九年遣存審率師進攻叛帥于城下文禮之將李再豐隂送款于存審我師中夜}
