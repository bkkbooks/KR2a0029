  - {type: variant, offset: 2159, length: 1032, content: 又命輟六日七日八日朝參丞相文武並詣上閤門進名奉慰冊府元龜卷三百一十九丁亥以彗星謫見詔兩京見禁囚徒大辟罪以下遞減一等限三日內疏理訖聞奏永樂大典卷二千六百三十二案五代會要彗星見于靈臺之西至五月始降赦宥罪以答天譴又云五月壬戌夜熒惑犯心大星去心四度順行司天奏大星為帝王之星宜修省以答天譴舊五代史考異詔曰生育之人爰當暑月乳哺之愛方及薰風儻肆意於刲屠豈推恩於長養俾無殄暴以助發生宜令兩京及諸州府夏季內禁斷屠宰及採捕天民之窮諒由賦分國章所在亦務興仁所在魚眾寡孤獨廢疾不濟者委長吏量加賑卹史載葬枯用彰軫卹禮稱掩骼將致和平應兵戈之地有暴露骸骨委所在長吏差人專功收瘞國癘之文尚標七祀良藥之市亦載三醫用憐無告之人宜徵有喜之術案原本有喜訛有嘉今改正舊五代史考異凡有疫之處委長吏檢尋醫方於要路曉示如有家無骨肉兼困窮不濟者即仰長吏差醫給藥救療之冊府元龜卷一百九十五辛卯詔曰亢陽滋甚農事已傷宜令宰臣于兢赴中嶽杜曉赴西嶽精切祈禱其近京靈廟宜委河南尹五帝壇風師雨師九宮貴神案原本貴神訛降神今據通典及新唐書禮志改正舊五代史考異委中書各差官祈之永樂大典卷二千六百三十二通鑑閏月壬戌帝疾甚謂近臣曰我經營天下三十年不意太原餘孽更昌熾如此吾觀其志不小天復奪我年我死諸兒非彼敵也吾無葬地矣因哽咽絕而復蘇帝長子郴王友裕早卒次假子友文帝特愛之常留守東都兼建昌宮使次郢王友珪其母亳州營倡也為左右控鶴都指揮使次均王友貞為東都馬步都指揮使殿本案通鑑初元貞張皇后嚴整多智帝敬憚之后殂帝縱意聲色諸子雖在外常徵其婦入侍帝往往亂之友文婦王氏色美帝尤寵之雖未以友文為太子帝意常屬之友珪心不平友珪嘗有過帝撻之友珪益不自安帝疾甚命王氏召友文于東都欲與之訣且付以後事友珪婦張氏亦朝夕侍帝側知之密告友珪曰大家以傳國寶付王氏懷往東都吾屬死無日矣夫婦相泣左右或說之曰事急計生何不改圖時不可失六月丁丑朔帝命敬翔出友珪為萊州刺史即令之官已宣旨未行勅時左遷者多追賜死友珪益恐戊寅友珪易服微行入左龍虎軍見統軍韓勍以情告之勍亦見功臣宿將多以小過被誅懼不自保遂相與合謀勍以牙兵五百人從友珪雜控鶴士入伏於禁中中夜斬關入至寢殿侍疾者皆散走帝驚起問反者為誰友珪曰非他人也帝曰我固疑此賊恨不早殺之汝悖逆如此天地豈容汝乎友珪曰老賊萬段友珪僕夫馮廷諤刺帝腹刃出於背友珪自以敗裹之瘞于寢殿祕不發喪遣供奉官丁昭溥馳詣東都命均王友貞殺友文己卯矯詔稱博王友文謀逆遣兵突入殿中賴郢王友珪忠孝將兵誅之保全朕躬然疾因震驚彌致危殆宜令友珪權主軍國之務韓勍為友珪謀多出府庫金帛賜諸軍及, WYG: 帥}
