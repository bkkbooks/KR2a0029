  - {type: variant, offset: 36, length: 0, content: '', WYG: 左右二軍離鄭州丙辰逹上源驛是日慶雲見令曰王者創業興邦立名傳世必難知而示訓從易避以便人案此下有闕文或稽其符命應彼開基之義垂諸象徳之言爰攷簡書求于徃代周王昌發之號漢帝詢衍之文或從一徳以徽稱或爲二名而更易先王令典布在縑緗寡人本名兼于二字且異帝王之號仍兼避易之難郡職縣官多須改換况宗廟}
