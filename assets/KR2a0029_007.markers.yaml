  - {type: variant, offset: 637, length: 192, content: 武官領務尤切宜扈駕者三十八人詔工部尚書李皎左散騎常侍孫騭右諫議大夫張衍兵部侍郎劉邈兵部郎中張儁光祿少卿盧秉彝並令扈蹕甲子發自雒師夕次河陽案通鑑云至白馬頓賜從官食多未至遣騎趣之於路左散騎常侍孫騭右諫議大夫張衍兵部郎中張儁最後至帝命撲殺之乙丑次溫縣丙寅次武陟懷州刺史段明遠迎拜於境上其內外所備咸豐霈焉丁卯次獲嘉戊辰次衞州之新鄉己巳晨發衞州案原本脫發字今據文增入舊五代史考異夕止淇門內衙十將, WYG: 蔚爲冊禮}
