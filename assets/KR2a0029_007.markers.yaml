  - {type: variant, offset: 3759, length: 225, content: 年迎唐昭宗於岐下歲在甲子其年改天祐至國初建隆庚申歲纔五十六年矣然則乾德七十歲人皆目睹其事蓋唐室自懿宗失政天下亂離故武宗以下實錄不傳於世昭宗一朝全無記注梁祖在位止及六年均王朝詔史臣修梁祖實錄岐下繫㙐之事而不書晉天福中史臣張昭重修唐史始有昭宗本紀但云即位之始有會昌之風岐陽事迹不能追補此亦明唐昭宗有英睿之氣而衰運不振又明左右無忠義奮發之臣致梁祖得行其志有所警戒不可不書宋王禹偁撰五代史闕文多舉軼事兼駁正舊史之失議論多可取今每條附見紀傳之末後倣此影庫本粘籤, WYG: ''}
