  - {type: variant, offset: 22, length: 3, content: 元夜任, WYG: 甲辰天子遣御史大夫薛貽矩來𫝊禪代之意貽矩謁帝陳北面之禮帝揖之升階貽矩曰陛下功徳及人三靈所卜已定皇帝方議裁詔行舜禹之事臣安敢違既而拜伏于砌下帝側躬以避之二月戊申帝之家廟棟間有五色芝生焉狀若芙蓉紫烟䝉䕶數日不散又是月家廟第一室神主上有五色衣自然而生識者知梁運之興矣唐乾符中木星入南斗數夕不退}
  - {type: variant, offset: 22, length: 3, content: 元夜任, krp: 甲辰天子遣御史大夫薛貽矩來𫝊禪代之意貽矩謁帝陳北面之禮帝揖之升階貽矩曰陛下功徳及人三靈所卜已定皇帝方議裁詔行舜禹之事臣安敢違既而拜伏于砌下帝側躬以避之二月戊申帝之家廟棟間有五色芝生焉狀若芙蓉紫烟䝉䕶數日不散又是月家廟第一室神主上有五色衣自然而生識者知梁運之興矣唐乾符中木星入南斗數夕不退}
