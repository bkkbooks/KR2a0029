  - {type: variant, offset: 3455, length: 0, content: '', krp: 朱友謙進百官衣二百副乙酉立皇兄全昱爲廣王皇子友文爲博王友珪爲郢王友璋爲福王友雍爲賀王友徽爲建王辛卯}
  - {type: variant, offset: 3456, length: 2, content: 討宗, WYG: 東都舊第爲建昌宫改判建昌宫事爲建昌宫使初帝創業之時以四鎭兵馬倉庫籍繁因總置建昌院以領之至是改爲宫蓋重其事也甲午詔天下管屬及州縣官名犯廟諱者各宜改換城門郎改爲門局卽茂州改爲汶州桂州慕化縣改爲歸化縣潘州茂名縣改爲越裳縣魏泰東軒筆録京師呼城外爲州東州西州南州北而韋城相城胙城等縣但呼韋縣相縣胙縣蓋沿梁時避諱之舊也詔樞密院宜改爲崇政院以知院事敬翔爲院使改文思院爲乾文院同和院改爲儀鸞院五代會要五月改御食使爲司膳使小馬坊使爲天驥使以西都水北宅爲大昌官廢雍州太清宫改西都太微宫亳州太清宫皆爲觀諸州紫極宫皆爲老君廟泉州僧智宣自西域囘進辟支佛骨及梵夾經律丙申御元徳殿宴犒諸軍使劉捍符道昭已下賜物有差是月青州許州定州三鎭節度使請開内宴各賜方物以青州節度使韓建守司徒平章事帝以建有文武材且詳于稼穡利害軍旅之事籌度經費欲盡詢焉恩澤特異于時罕有比者隨拜爲上相賜賚甚厚宿州刺史王儒進白兎一濮州刺史圖嘉禾瑞麥以進廣州進竒寳名樂品類甚多河南尹張全義進開平元年已前羡餘錢十萬貫紬六千匹綿三十萬兩仍請毎年上供定額每歳貢絹三萬匹以爲常式荆南髙季昌進瑞橘數十顆質狀有味倍勝常貢且橘當冬熟今方仲夏時人咸異其事因稱爲瑞六月幸乾元院宴召宰臣學士及諸道入貢陪臣已亥帝御崇元殿内出追尊四廟上諡號玉冊寳共八副宰臣文武百官儀仗鼓吹導引至太廟行事癸卯司天監奏日辰内有戊字請改爲武從之癸亥詔以前朝官僚譴逐南荒積年未經昭雪其間有懐抱材器為時所嫉者深負寃抑仍令録其名姓盡復官資兼告諭諸道令津致赴闕如已亡殁並許歸塟以明恩蕩以西都徽安門北路逼近大内宫垣兼非民便令移自榆林直趣瑞門之南改耀州報恩禪院為興國寺馬殷奏破淮寇静海軍節度使曲裕卒七月丙申以静海軍行營司馬}
