  - {type: variant, offset: 3476, length: 0, content: '', WYG: 違當行朝典命御史㸃檢紏察以儆慢官魏博羅紹威二男廷望廷矩年在幼稚皆有材器帝以其藩屏勲臣之胄宜受非次之用皆擢為郎恩命既行之後二子亦就班列紹威乃上章以齒幼未任公事乞免主印宿直從之封鎭東軍神祠為崇福候浙西奏道門威儀鄭章道士夏隐言焚修精志妙逹希夷推諸輩流實有道業鄭章宜賜號貞一大師仍名𤣥章隐言賜紫衣五代㑹要九月置左右}
