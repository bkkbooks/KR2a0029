  - {type: variant, offset: 3480, length: 4, content: 民間傳讖, WYG: 帝欲親征河東命朝臣先赴雒都至是緩其期乃允所奏宰臣請每月初入閤望日延英聽政永為常式山南東道節度楊師厚進納趙匡凝東第書籍先是收復襄漢帝閱其圖書至是命師厚進焉廣州進獻助軍錢二十萬又進龍腦腰帶珍珠枕玳瑁香藥等十一月壬寅帝以征討未罷調補為先遂命盡赦逃亡背役髠黥之人各許歸鄉里廣州進龍形通犀腰帶金托裏含稜玳瑁器百餘副香藥珍巧甚多廣南管内獲白鹿並圖形來獻耳有兩缺按符瑞圖鹿壽千歳變白耳一缺今驗此鹿耳有二缺其獸與色皆應金行實表嘉瑞十二月辛亥詔}
