  - {type: variant, offset: 143, length: 0, content: '', WYG: 被幽深宜應天以順時俾化家而爲國拒彼億兆至于再三且曰七政已齊萬機難曠勉遵令典爰正鴻名告天地神祗建宗廟社稷顧惟凉徳曷副樂推慄若履冰懐如馭朽金行啟祚玉歴建元方宏經始之規宜布惟親之令可改唐天祐四年爲開平元年國號大梁書載虞賔斯爲令範詩稱周客蓋有明文是用先封以禮後嗣宜以曺州濟隂之邑奉唐主封爲濟隂王凡曰軌儀}
