  - {type: variant, offset: 3471, length: 0, content: '', WYG: 之儀封冊為重用報勲烈以隆恩榮固合親臨式光典禮舊章乆缺自我復行今後每封冊大臣宜令有司備臨軒之禮五代㑹要八月敕諸道所有軍事申奏令直至右銀臺門委各省使畫時引進尋常公事依前四方館收接甲子平明前老人星見于南極壬申密州進嘉禾又有合歡榆樹並圖形以獻是月隰州奏大寧縣至固鎮上下二百里今月八日黄河清至十日如故九月辛丑西京大内放出兩宫内人及前朝宮人任其所適勅以近年文武官諸道奉使皆于所在分外停住踰年渉歳未聞歸闕非惟勞費州郡抑且侮慢國經臣節既虧憲章安在自今後兩浙福建廣州安南邕容等道使到發許住一月湖南洪鄂黔桂許住二十日荆㐮同雍鎭定青滄許住十日其餘側近}
