  - {type: variant, offset: 3485, length: 0, content: '', WYG: 潞寇未平王師在野攻戰之勢難緩于寇圍飛輓之勤實勞于人力永言輟來深用軫懐宜令長吏丁寧布告期以兵罷之日給復賦租于是人户聞之皆忘其倦詔故荆南節度使守中書令上谷王周汭贈太師故武昌軍節度使兼中書令西平王杜洪贈太傅先是鄂渚再為淮夷所侵攻圍甚急杜洪以兵食將盡繼來乞師帝料其隔越大江難以赴援兼以荆州據上游多戰艦去江夏甚邇因命周汭舉舟師沿流以救之汭于是引兵東下纔及鄂界遇朗州背盟作亂乘江陵之虛縱兵襲破之俘掠且盡既而汭士卒知之皆顧其家咸無鬬志遂為淮寇所敗將卒潰散汭忿恚自投于江汭之本姓犯文穆皇帝廟諱至是因追贈以其系出周文故賜姓周氏及汭兵敗之後武昌以重圍經年糧盡力困救援不至訖為淮寇所陷載洪以送淮師遂殺之此二鎭皆以忠貞殁于王事帝毎言諸藩屏翰經綸之業必首痛汭洪之薨至是追贈之深加軫悼各以其子孫宗屬録用焉棣州蒲臺縣百姓王知嚴妹以亂離并失怙恃因舉哀追感自截兩指以祭父母帝以遺體之重不合毀傷言念村閭何知禮教自今後所在郡縣如有截指割股不用奏聞是年諸道多奏軍人百姓割股青齊河朔尤多帝曰此若因心亦足為孝但茍免徭役自殘肌膚欲以庇身何能療疾並宜止絶}
