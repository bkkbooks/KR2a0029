  - {type: variant, offset: 830, length: 1249, content: 以十指揮兵士至於行在辛未駐蹕黎陽癸酉發自黎陽夕次內黃甲戌次昌樂縣丁丑次于永濟縣青州節度使賀德倫奏統領兵士赴歷亭軍前戊寅至貝州命四丞相及學士李琪盧文度知制誥竇賞等十五人扈從其左常侍韋戩等二十三人止焉己卯發自貝州夕駐蹕於野落三月庚辰朔次于棗強縣之西城案通鑑辛巳至下博南登觀津冢趙將符習引數百騎巡邏不知是帝遽前逼之或告曰晉兵大至矣帝棄行幄亟引兵趣棗強與楊師厚軍合舊五代史考異丙戌鎮定諸軍招討使楊師厚奏下棗強縣車駕即日疾馳南還丁亥復至貝州案通鑑帝以蓨縣未下引兵攻之丁亥始至縣西戊子至冀州與薛史異地又案五代春秋二月侵趙克棗強與薛史異月舊五代史考異庚寅楊師厚與副招討李周彝等准詔來朝冊府元龜卷二百五案五代春秋二月侵趙克棗強進次蓨縣圍之晉人救蓨帝還師滄州張萬進以地來歸辛卯詔丞相翰林大學士文武從官都招討使及諸軍統指揮使等賜食於行殿壬辰命以羊酒等各賜從官冊府元龜卷一百九十七甲午幸貝州之東闉閱武乙未帝復幸東闉閱騎軍冊府元龜卷二百十四勅以攻下棗強縣有功將校杜暉等一十一人並超加檢校官衙官宋彥等二十五人並超授軍職冊府元龜卷二百一十丙午次濟源縣詔曰淑律將遷亢陽頗甚宜令魏州差官祈禱龍潭戊申詔曰雨澤愆期祈禱未應宜令宰臣各於魏州靈祠精加祈禱永樂大典卷二千六百三十二案五代會要三月詔曰夫隆興邦國必本于人民惠養疲羸尤資于令長苟選求之踰濫固撫理之乖違如聞吏部擬官中書除授或緣親舊所請或為勢要所干姑徇私情靡求才實念茲蠹弊宜舉條章今後應中書用人及吏部注擬並宜省藩身之才業驗為政之否臧必有可觀方可任用如或尚行請說猶假貨財其所司人吏必當推窮重加懲斷舊五代史考異四月己酉幸魏州案通鑑乙巳帝發貝州丁未至魏州俱在三月與薛史異舊五代史考異金波亭賜宴宰臣文武官及六學士冊府元龜卷二百五甲寅夕月掩心大星丙辰敕近者星辰違度式在修禳宜令兩京及宋州魏州取此月至五月禁斷屠宰仍各於佛寺開建道場以迎福應永樂大典卷二千六百三十二己未次黎陽縣案通鑑乙卯博王友文來朝請帝還東都丁巳發魏州己未至黎陽以疾淹留舊五代史考異東都留守官吏奉表起居賜丞相從官酒食有差己巳至東都博王友文以新創食殿上言幷進准備內宴錢三千貫內宴原本作內安今據文改正影庫本粘籤銀器一千五百兩辛未宴於食殿召丞相文武從官等侍焉冊府元龜卷一百九十七帝泛九曲池御舟傾帝墮溺於池中宮女侍官扶持登岸驚悸久之永樂大典卷一千五十二制加建昌宮使金紫光祿大夫檢校司徒開封尹博王友文為特進檢校太保兼開封尹依前建昌宮使充東都留守冊府元龜卷二百六十九戊寅車駕發自東京夕次中牟縣五月己卯朔從官文武自丞相而下並詣行殿起居親王及諸道藩帥咸奉表來上庚辰發自鄭州發自鄭州原本發作鄧今據文改正影庫本粘籤至滎陽河南尹魏王宗奭望塵迎拜河陽留後邵贊懷州刺史段明遠等邐迤來迎夕次汜水縣帝召魏王宗奭入對便於御前賜食數刻乃退壬午駐蹕於汜水宰臣河南尹大學士並於內殿起居勅以建昌宮事委宰臣于兢領之案五代會要其年六月廢建昌宮以河南尹魏王張宗奭為國計使凡天下金穀兵戎舊隸建昌宮者悉主之舊五代史考異癸未帝發自汜水宣令邵贊段明遠各歸所理午憩任村頓夕次孝義宮留都文武, WYG: ''}
