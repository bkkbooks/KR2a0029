  - {type: variant, offset: 140, length: 2, content: 及草, WYG: 一百六十人本色衣一副戊辰即位制曰王者受命于天光宅四海祗事上帝寵綏下民革故鼎新諒歴數而先定創業垂統知圖籙以無差神器所歸祥符合應是以三正互用五運相生前朝道消中原政散瞻烏莫定失鹿難追朕經緯風雷沐浴霜露四征七伐垂三十年紏合齊盟翼戴唐室隨山刊木岡憚胼胝投􅃑揮戈不遑寢處泊𤣥穹之所贊知廣運之不興莫諧輔漢之謀徒罄事殷之禮唐主知英華巳竭算祀有終釋龜鼎以如遺推劔紱而相授朕懼徳弗嗣執謙允恭避駿命于南河眷清風于潁水而乃列嶽羣后盈廷庶官東西南北之人班白緇黄之衆謂朕功蓋上下}
  - {type: page-break, offset: 140, content: '', id: KR2a0029_WYG_007-4a, image: WYG0277/WYG0277-0055a.png}
