  - {type: 'tls:seg', offset: 24, content: '', id: KR2a0029_ZHSJ_007-d7p2s4}
  - {type: variant, offset: 26, length: 1, content: 寺, WYG: 道都統晉國公王鐸觀之問諸知星者吉凶安在咸曰金火土犯斗即爲灾惟木當爲福耳或亦然之時有術士邉岡者洞曉天文博通隂陽歴數之妙窮天下之竒秘有先見之明雖京房管輅不能過也鐸召而質之岡曰惟木爲福神當以帝王占之然則非福于今必當有驗于後未敢言之請他日證其所驗一日又密召岡因堅請語其詳至于三四岡辭不獲鐸乃屏去左右岡曰木星入斗帝王之兆也木在斗中朱字也以此觀之将來當有朱氏爲君者也天戒之矣且木之數三其禎也應在三紀之内乎鐸聞之不復有言天后朝有䜟辭云首尾三鱗六十年兩角犢子自狂顚龍蛇相闘血成川當時好事者解云兩角犢子牛也必有牛姓干唐祚故周子諒弹牛仙客李徳裕謗牛僧儒皆以應圖䜟爲辭然朱字牛下安八八即角之象也故朱滔朱泚構喪亂之禍冀無妄之福豈知應之帝也四月唐帝御札勅宰臣張文蔚等備法駕奉迎梁朝宋州刺史王臯進赤烏一雙又宰臣張文蔚正押傳國寳玉冊金寳}
  - {type: page-break, offset: 26, content: '', id: KR2a0029_WYG_007-2a, image: WYG0277/WYG0277-0054a.png}
  - {type: page-break, offset: 26, content: '', id: KR2a0029_WYG_007-2b, image: WYG0277/WYG0277-0054b.png}
