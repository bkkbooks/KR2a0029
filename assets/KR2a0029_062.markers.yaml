  - {type: variant, offset: 3188, length: 493, content: 月璋傳檄於利閬遂等州責以間諜朝廷尋率其兵陷閬州擒節度使李仁矩軍校姚洪等害之先是璋欲謀叛先遣使持厚幣於孟知祥求為婚家且言為朝廷猜忌將有替移去則喪家住亦致討地狹兵少獨力不任願以小兒結婚愛女時知祥亦貳於朝廷因許以為援既而知祥出師以圍遂州故璋攻閬州得恣其毒焉其年秋詔削奪璋在身官爵命天雄軍節度使石敬瑭為東川行營招討使率師以討之璋之子宮苑使光業幷其族並斬於洛陽及石敬瑭率師進討以糧運不接班師明宗方務懷柔乃放西川進奏官蘇愿東川軍將劉澄各歸本道別無詔旨祇云兩務求安時孟知祥其骨肉在京師者俱無恙焉因遣使報璋欲連表稱謝璋怒曰西川存得弟姪遂欲再通朝廷璋之兒孫已入黃泉何謝之有自是璋疑知祥背己始搆隙矣三年四月璋率所部兵萬餘人以襲知祥案九國志趙季良傳云季良嘗與知祥從容語曰璋性狼戾若堅守一城攻之難克及聞璋起兵知祥憂形於色季良曰璋不守巢穴此天以授公也既而璋果敗知祥與諸將率師拒之戰於漢州之彌牟鎮璋軍大敗得數十騎復奔於東川案九國志趙廷隱傳董璋襲廣漢將攻成都時東川廩藏充實部下多敢死之士其來也衆皆畏之知祥親督諸將與璋戰雞縱橋前頗為所挫廷隱偽遯璋逐之知祥與張公鐸繼進璋軍亂不成列廷隱整陣與知祥合擊之璋軍大敗先是前陵州刺, WYG: 代}
