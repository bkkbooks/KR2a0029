  - {type: variant, offset: 378, length: 328, content: 澤州天井戍將稍遷游奕使中和元年昭義節度使高潯擊黃巢戰石橋不勝保華州為裨將成鄰所殺還據潞州衆怒方立率兵攻鄰斬之自稱留後擅裂邢洺磁為鎮治邢為府號昭義軍潞人請監軍使吳全勗知兵馬留後時王鐸領諸道行營都統以潞未定墨制假方立檢校左散騎常侍兼御史大夫知邢州事方立不受囚全勗以書請鐸願得儒臣守潞鐸使參謀中書舍人鄭昌圖知昭義留事欲遂為帥僖宗自用舊宰相王徽領節度時天子在西河關雲擾方立擅地而李克用窺潞州徽度朝廷未能制乃固讓昌圖昌圖治不三月輒去方立更表李殷銳為刺史謂潞險而人悍數賊大帥為亂欲銷懦之乃徙治龍岡州豪傑重遷有懟言會克用為河東節度使昭義監軍祁審誨乞師求復昭義軍克用遣賀公雅李筠安金俊三部將擊潞州為方立所破又使李克修攻取之殺殷銳遂幷潞州表克修為節度留後初昭義有潞邢洺磁四州, WYG: 洛京}
