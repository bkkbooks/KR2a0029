  - {type: variant, offset: 2987, length: 177, content: 牙軍小郡不下五百人璋已疑間及聞除仁矩鎮閬州璋由是謀反乃決仍先與其子光業書曰朝廷割吾支郡為節制屯兵三千是殺我必矣爾見樞要道吾言如朝廷更發一騎入斜谷則吾必反與汝訣矣光業以書呈樞密承旨李虔徽會朝廷再發中使荀咸乂將兵赴閬州光業謂虔徽曰咸乂未至吾父必反吾身不足惜慮勞朝廷徵發請停咸乂之行吾父必保常日重誨不從咸乂未至璋已擅追綿州刺史武虔裕囚於衙署武虔裕原本作虛裕今從, WYG: 西京京兆府案}
