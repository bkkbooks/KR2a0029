  - {type: variant, offset: 707, length: 1766, content: 是方立自以山東三州為昭義朝廷亦命克修以潞州舊軍畀之昭義有兩節自此始克修字崇遠克用從父弟精馳射常從征伐自左營軍使擢留後進檢校司空方立倚朱全忠為助故克用擊邢洺磁無虛歲地為鬬場人不能稼光啟二年克修擊邢州取故鎮進攻武安方立將呂臻馬爽戰焦岡為克修所破斬首萬級執臻等拔武安臨洺邯鄲沙河克用以安金俊為邢州刺史招撫之方立丐兵于王鎔鎔以兵三萬赴之克修還後二年方立督部將奚忠信兵三萬攻遼州以金啖赫連鐸與連和會契丹攻鐸師失期忠信三分其兵鼓而行克用伏兵於險忠信前軍沒既戰大敗執忠信餘衆走脫歸者纔十二龍紀元年克用使李罕之李存孝擊邢攻磁洺方立戰琉璃陂大敗禽其二將被斧鑕狥邢壘呼曰孟公速降有能斬其首者假三州節度使方立力屈又屬州殘墮人心恐性剛急待下少恩夜自行陴兵皆倨告勞自顧不可復振乃還引酖自殺從弟遷素得士心衆推為節度留後請援於全忠全忠方攻時溥不即至命王虔裕以精甲數百赴之假道羅弘信不許乃趨間入邢州大順元年存孝復攻邢遷挈邢洺磁三州降執王虔裕三百人獻之遂遷太原表安金俊為邢洺磁團練使以遷為汾州刺史歐陽史云天復元年梁遣氏叔琮攻晉出天井關遷開門降為梁兵鄉道以攻太原不克叔琮軍還過潞以遷歸于梁梁太祖惡其反覆殺之張文禮燕人也初為劉仁恭裨將性凶險多姦謀辭氣庸下與人交言癖於不遜自少及長專蓄異謀及從劉守文之滄州委將偏師守文省父燕薊據城為亂及敗奔於王鎔察鎔不親政事遂曲事當權者以求衒達每對鎔自言有將才孫吳韓白莫己若也鎔賞其言給遺甚厚因錄為義男賜姓名德明由是每令將兵自柏鄉戰勝之後柏鄉原本作桓鄉今從通鑑改正影庫本粘籤常從莊宗行營素不知書亦無方略唯於懦兵之中萋菲上將言甲不知進退乙不識軍機以此軍人推為良將初梁將楊師厚在魏州文禮領趙兵三萬夜掠經宗因侵貝郡師厚先率步騎數千人設伏於唐店文禮大掠而旋士皆卷甲束兵夜凱歌行至唐店師厚伏兵四面圍合殺戮殆盡文禮單騎僅免自爾猶對諸將大言或讓之曰唐店之功不須多伐文禮大慚在鎮州既久見其政荒人僻常蓄異圖酒酣之後對左右每泄惡言聞者莫不寒心唯王鎔略無猜間漸為腹心乃以符習代其行營以文禮為防城使自此專伺間隙及鎔殺李弘規委政於其子昭祚昭祚原本作昭福今從歐陽史改正影庫本粘籤昭祚性偪戾未識人間情偽素養名持重坐作貴人既事權在手朝夕欲代其父向來附勢之徒無不族滅初李弘規李藹持權用事樹立親舊分董要職故奸宄之心不能搖動文禮頗深畏憚及弘規見殺其部下五百人懼罪將欲奔竄聚泣偶語未有所之文禮因其離心密以姦辭激之曰令公命我盡坑爾曹我念爾十餘年荷戈隨我為家為國我若不即殺汝則得罪於令公我若不言又負爾輩衆軍皆泣是夜作亂殺王鎔父子舉族灰滅唯留王昭祚妻朱氏通梁人尋間道告於梁曰王氏喪於亂軍普寧公主無恙文禮狥賊帥張友順所請因為留後於潭城視事以事上聞兼要節旄尋亦奉牋勸進莊宗姑示含容乃可其請文禮比廝役小人驟居人上行步動息皆不自安出則千餘人露刃相隨日殺不辜道路以目常慮我師問罪姦心百端南通朱氏北結契丹往往擒獲其使莊宗遣人送還文禮由是愈恐是歲八月莊宗遣閻寶史建瑭及趙將符習等率王鎔本軍進討師興文禮病疽腹及聞史建瑭攻下趙州驚悸而卒案文禮之卒遼史太祖紀作五月丁未與是書作八月異殿本其子處瑾處球祕不發喪軍府內外皆不知之每日於寢宮問安處瑾與其腹心韓正時參決大事同謀姦惡案遼史太祖紀天贊元年四月癸亥張文禮求援五月丁未張文禮卒其子處瑾遣人奉表來謝所紀月日與薛史異初文禮疽未發時舉家咸見鬼物昏瞑之後或歌或哭又野河色變如血游魚多死浮於水上識者知其必敗十九年三月閻寶為處瑾所敗莊宗以李嗣昭代之四月嗣昭為流矢所中尋卒於師命李存進繼之存進亦以戰歿乃以符存審為北面招討使攻鎮州是時處瑾危蹙日甚昭義軍節度判官任圜馳至城下諭以禍福處瑾登陴以誠告乃遣牙將張彭送款于行臺俄而李存審師至城下是夜趙將李再豐之子冲投縋以接王師李再豐原本作稱豐今從通鑑改正影庫本粘籤故諸軍登城遲明畢入獲處瑾處球處琪幷其母及同惡人等皆折足送行臺鎮人請醢而食之又發文禮之尸磔之於市永樂大典卷六千三百五十董璋本梁之驍將也幼與高季興孔循俱事豪士李七郎為童僕李初名讓嘗以厚賄奉梁祖梁祖寵之因畜為假子賜姓朱名友讓璋既壯得隸於梁祖帳下後以軍功遷為列校梁龍德末潞州李繼韜送款於梁時潞將裴約方領兵戍澤州裴約原本作裴維今從歐陽史改正影庫本粘籤不狥繼韜之命據城以自固梁末帝遣璋攻陷澤州遂授澤州刺史是歲莊宗入汴璋來朝莊宗素聞其名優以待之尋令却赴舊任歲餘代歸時郭崇韜當國待璋尤厚, WYG: ''}
