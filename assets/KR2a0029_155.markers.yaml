  - {type: page-break, offset: 0, content: '', id: KR2a0029_ZHSJ_155-1986a}
  - {type: line-break, offset: 0, content: '', id: ZHSJ__dup24041}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 戊寅以左僕射劉煦為契丹丹禮使左散騎常侍韋勲副之給事中盧重為契丹皇太后丹禮使案歐陽史八月戊寅馮道及左僕射劉煦為契丹丹禮使通監戊寅以馮道為太后丹禮使左僕射劉煦為契丹主冊禮使與是書此紀異左金吾仗勘契官王英司天臺鷄呌學生商暉等王英歐陽史作王殷商暉歐陽史作􅇻暉盖是書避宣祖諱九月己酉宫苑使蕉繼勲自軍前押范延光牙將馬諤齎歸命請罪表到闕壬子延光領部下士素服於本府闕俟命有詔釋罪案歐陽史作九月己酉赦范延光盖倂書於奉表請罪之}
  - {type: page-break, offset: 2, content: '', id: KR2a0029_WYG_155-1b, image: WYG0278/WYG0278-0022d.png}
  - {type: variant, offset: 2, length: 0, content: '', krp: 戊寅以左僕射劉煦為契丹丹禮使左散騎常侍韋勲副之給事中盧重為契丹皇太后丹禮使案歐陽史八月戊寅馮道及左僕射劉煦為契丹丹禮使通監戊寅以馮道為太后丹禮使左僕射劉煦為契丹主冊禮使與是書此紀異左金吾仗勘契官王英司天臺鷄呌學生商暉等王英歐陽史作王殷商暉歐陽史作殷暉盖是書避宣祖諱九月己酉宫苑使蕉繼勲自軍前押范延光牙將馬諤齎歸命請罪表到闕壬子延光領部下士素服於本府闕俟命有詔釋罪案歐陽史作九月己酉赦范延光盖倂書於奉表請罪之}
  - {type: punctuation, offset: 3, content: ，, id: KR2a0029_ZHSJ_155-bkkpn1}
  - {type: variant, offset: 3, length: 2, content: 任任, WYG: 也以右金吾大將軍馬從斌為契丹國命史考功郎中劉知新副之案馬從斌使契丹以報具加尊號也攷通鑑則始以命王權權辭以老疾乃改命從斌耳歐陽史止書從斌不載劉知新五代春秋作十}
