  - {type: variant, offset: 562, length: 579, content: 輔相手握權衡或端坐稱臣或半笑奏事於君無禮舉世寧容革則暫委利權便私俸祿文武百辟皆從五月起支父子二人偏自正初給遣說則自居重位全紊大綱蔭貪榮亂兒孫於昭穆賣官潤屋換令錄之身名醜行疊彰羣情共怒雖居牧守未塞非尤革可責授費州司戶參軍說可夷州司戶參軍皆員外置同正員並所在馳驛發遣尋貶陵州長流百姓委長吏常知所在天成二年夏詔令逐處刺史監賜自盡其骨肉並放逐便子昇官至檢校正郎服金紫尋亦削奪永樂大典卷二千二百一十四案寶真齋法書贊載豆盧革田園帖云大德欲要一居處畿甸間舊無田園鄜州雖有三兩處莊子緣百姓租佃多年累有令公大王書請卻給還人戶蓋不欲侵奪疲民兼慮無知之輩妄有影庇包役云云岳珂曰此帖乃與僧往還書其畏強藩避罪蓋慄慄淵冰然其後卒以故縱田客貶夜郎正坐所畏信乎亂邦之不可居也是時據鄜乃高萬興官檢校太師中書令封北平王即革所謂令公大王者官故梁授唐命維新而顓面正朝者不能致褫鞶之誅而反竊貢秉旄之佞唐之不競有自來矣舊五代史考異韋說福建觀察使岫之子也案以下疑有闕文莊宗定汴洛說與趙光胤同制拜平章事說性謹重奉職常不造事端時郭崇韜秉政說等承順而已政事得失無所措言初或有言于崇韜銓選踰濫選人或取他人出身銜或取父兄資緒與令史囊橐罔冒崇韜乃條奏其事其後郊天行事官數千人多有告勅偽濫因定去留塗毀告身者甚衆選人號哭都門之外議者亦以為積弊累年一旦澄汰太細懼失維新含垢之意時說與郭崇韜同列不能執而止之頗遭物議說之親黨告, WYG: ''}
