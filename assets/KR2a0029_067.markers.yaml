  - {type: variant, offset: 5619, length: 8, content: 明年郭崇韜兼鎮改, WYG: 己夘以臘辰狩于白沙皇后皇子宫人畢從庚辰次伊闕辛巳次潭泊壬午次龕澗癸未還宫是時大雪苦寒吏士有凍踣于路者伊汝之民飢乏尤甚衛兵所至責其供餉既不能給因壞其什器撤其廬舍而焚之甚于剽刧縣吏畏恐竄避于山谷間甲申出御札示中書門下以今嵗水災異常所在人户流徙以避徴賦闗市之征抽納繁碎宜令宰臣商量條奏丙辰第三姑宋氏封義寜大長公主長姊孟氏封瓊華長公主第十一妹張氏封瑤英長公主閏十二月甲午賜中書門下詔曰朕聞古先哲王臨御天下上則以無偏無黨為至治次則以足食足兵為逺謀􅊺惟前修誠可師範朕纂承鳯厯嗣守鴻圖三載于兹萬機是總非不知五兵未弭兆庶多艱葢頼卿等寅亮居懐康濟為務冀盡數輿之理洞詢盍徹之規今則潛按方區備聆謠俗或力役罕均其勞逸或賦租莫辨于後先但以督促為名煩苛不已被甲胄者何嘗充給趨朝省者轉困支持州閭之貨殖全疎天地之災祥屢應以至星辰越度旱澇不時農桑失業于丘園道殣相望于郊野生靈及此寢食寜遑豈非朕徳政未孚焦勞自拙者耶朕昨親援毫翰軫念瘡痍一則詢爾謀猷一則表予宵旰未披來奏轉撓于懷敢不翼翼罪躬乾乾軫慮咨爾四岳弼予一人何不舉賢才禆寡昧百辟之内羣后之間莫不有盡忠者被掩其能抱器者艱陳其力或草澤有遺逸之士山林多屈滯之人爾所不知吾將安訪卿等位尊調鼎名顯代天既逢不諱之朝何恡由衷之說當宜厯告中外急訪英髦應在仕及前資文武官已下至草澤之士有濟國治民除姦革弊者並宜各獻封章朕當選擇施}
