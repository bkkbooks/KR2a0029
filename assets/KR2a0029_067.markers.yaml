  - {type: variant, offset: 2924, length: 243, content: 及朱守殷以汴州叛馳驛賜圜自盡既而鳳哭謂安重誨曰任圜義士也肯造逆謀以讎君父乎如此濫刑何以安國重誨笑而不責是冬權知貢舉明年春有僧自西國取經回得佛牙大如拳褐漬皴裂進於明宗鳳揚言曰曾聞佛牙鎚鍛不壞請試之隨斧而碎時宮中所施已逾數千緡聞毀乃止及車駕還洛留知汴州事尋授中書侍郎平章事案李之儀姑溪居士集云鳳為莊宗實錄將何挺論劉昫疏不載昫既相遂引鳳共政事舊五代史考異長興中安重誨出鎮河中人無敢言者惟鳳極言於上前曰重誨是陛下家臣其心終不背主五年秉權賢豪俯伏但不周防自貽浸潤明宗以為朋黨不悅其奏重誨獲罪乃出為, WYG: 節度使存乂}
