  - {type: variant, offset: 2596, length: 2, content: 永樂, krp: 王正言為户部尚書以御史中丞崔恊為禮部尚書以刑部侍郎史館修撰判館事崔居儉為御史中丞以尚書左丞歸藹為刑部侍郎陜州上言河漲二丈二尺壞浮橋入城門居人有溺死者乙夘汴州上言汴水泛漲恐漂没城池于州城東西權開壕口引水入古河澤潞上言自今月一日雨至十九日未止戊午以刑部尚書判太常卿兼判吏部尚書銓事李琪為吏部尚書依前判太常卿以兵部侍郎集賢殿學士判院事盧文紀為吏部侍郎以給事中李光序為尚書右丞許州滑州奏}
