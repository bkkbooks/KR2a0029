  - {type: variant, offset: 1647, length: 606, content: 膳部員外郎卒殿本盧程唐朝右族祖懿父蘊案歐陽史作不知其世家何人也似誤舊五代史考異歷仕通顯程天復末登進士第崔魏公領鹽鐵署為巡官昭宗遷洛陽柳璨陷右族程避地河朔客遊燕趙或衣道士服干謁藩伯人未知之豆盧革客遊中山依王處直盧汝弼來太原程與革弼皆朝族知舊因往來依革處直禮遇未優故投于太原汝弼因為延譽莊宗署為推官尋改支使程褊淺無他才惟矜恃門地口多是非篤厚君子尤薄之初判官王緘從軍掌文翰胡柳之役緘歿於軍莊宗歸寧太原置酒公宴舉酒謂張承業曰予今於此會取一書記先以巵酒辟之即舉酒屬巡官馮道道以所舉非次抗酒辭避莊宗曰勿謙挹無踰於卿也時以職列序遷則程當為書記汝弼亦左右之程既失職私懷憤惋謂人曰主上不重人物使田里兒居余上先是莊宗嘗於帳中召程草奏程曰叨忝成名不閑筆硯由是文翰之選不及於程時張承業專制河東留守事人皆敬憚舊例支使監諸廩出納程訴于承業曰此事非僕所長請擇能者承業叱之曰公稱文士即合飛文染翰染翰原本作築翰今據文改正影庫本粘籤以濟霸國嘗命草辭自陳短拙及留職務又以為辭公所能者何也程垂泣謝之後歷觀察判官莊宗將即位求四鎮判官可為宰輔者時盧汝弼蘇循相次淪沒當用判官盧質質性疏放不願重位求留太原乃舉定州判官豆盧革次舉程即詔徵之並命為平章事平章原本作平張今據文改正影庫本粘籤程本非重器驟歷顯位舉止不恆時朝廷草創庶物未備班列蕭然寺署多缺程革受命之日即乘肩輿騶導喧沸莊宗聞訶導之聲詢於左右曰宰相擔子入門莊宗駭異登樓視之笑曰所謂似是而非者也頃之遣程使晉陽宮冊, WYG: 李琪充大行}
