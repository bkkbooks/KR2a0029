  - {type: variant, offset: 6246, length: 124, content: 百五十二史臣曰革說承舊族之冑佐新造之邦業雖謝于財成罪未聞于昭著而乃為權臣之所忌顧後命以無逃靜而言之亦可憫也盧程器狹如是形渥攸宜趙鳳李愚咸以文學之名俱踐巖廊之位校其貞節愚復優焉任圜有縱橫濟物之才無明哲保身之道退猶不免歔可悲哉永樂大典卷一萬七千九百一十, WYG: ''}
