  - {type: variant, offset: 2600, length: 1, content: 卷, WYG: 訓振以皇威爰興伐罪之師冀遏亂常之黨蠢兹蜀主世負唐恩間者父總藩宣任居統制屬朱温東離汴水致昭皇西幸岐陽不務扶持反懷顧望盜據劍南之土宇全虧閫外之忳誠先皇帝早在并門將興霸業彼既㑹馳書幣此亦復展謝儀後又特發使人専持聘禮彼則更不迴一介之使答咫尺之書星嵗俄移歡盟頓阻朕頃遵遺訓嗣統列藩追昔日之來誠繼先皇之舊好累馳信幣皆絶酬還背恵食言棄同即異今觀孽䜿紹據山河委閹宦以持權憑阻脩而僭號早者曾上秦王緘札張皇蜀地聲塵形侮黷之言辭謗親賢之勲徳昨朕風驅銳旅電掃兇渠復已墜之宗祧纘中興之厯數捷音旋報復命仍稽使來而尚抗書題情動而先誇險固加以宋光葆輒陳狂計别啟姦謀將欲北顧秦川東窺荆渚人而無禮罪莫大焉昨客省使李嚴奉使銅梁近歸金闕凡于奏對備述端由其宋光嗣相見之時于坐上便有言説先問契丹强弱次數秦王是非度此包藏可見情狀加以疏逺忠直朋比姦雄内則縱恣輕華競貪寵位外則滋彰法令蠧耗生靈既徳力以不量在神祗之共憤今命興聖宫使魏王繼岌充西川四面行營都統命侍中樞密使郭崇韜充西川東北面行營都招討制置等使荆南節度使高季興充西川東南面行營都招討使鳳翔節度使李曮充供軍轉運應接等使同州節度使李令徳充行營招討副使陜府節度使李紹琛充行營蕃漢馬歩軍都排陣斬斫使西京留守張筠充西川管内安撫應接使華州節度使毛璋充行營左廂馬歩都虞侯邠州節度使董璋充行營右廂馬步都虞候客省使李嚴充西川管内招撫使總領闕下諸軍兼四面諸道馬歩兵士取九月十八日進發凡爾中外宜體朕懷辛丑授魏王繼岌諸道行營都統餘如故繼岌既授都統之命以梁漢顒充中軍馬步都虞候兼馬歩軍都指揮使張廷藴為中軍步軍都指揮使牛景章充中軍左廂馬軍都指揮使沈斌充中軍右廂馬軍都指揮使卓瓌充中軍左廂歩軍都指揮使王贄充中軍右廂步軍都指揮使供奉官李從襲充中軍馬步軍都監高品李廷安吕知柔充魏王衙通謁詔工部尚書任圜翰林學士李愚參魏王軍事丁未夕徧天隂雲北方有聲如雷野雉皆鳴俗所謂天狗落戊申魏王繼岌樞密使侍中郭崇韜進發西征太子少師致仕薛廷珪卒贈右僕射甲寅幸夀安陵司天上言自七月三日大雨至九月十八日後方晴三辰行度不見丁巳幸尖山射鴈冬十月庚申朔宰臣及文武三品以上官赴長壽宫上大行皇太后諡曰貞簡皇太后辛酉幸甘泉遂幸壽安陵壬戌魏王繼岌率師至鳯翔先遣使馳檄以諭蜀部丁邜奉皇太后尊諡寶册赴西宫靈座宰臣豆盧革攝太尉讀册文吏部尚書李琪讀寶文百官素服班於長壽宫門外奉慰淮南楊溥遣使進慰禮己巳中書上言貞簡太后陵請以坤陵為名從之初卜山陵帝欲祔于代州武皇陵奏議天子以四海為家不當分其南北乃于壽安縣界别卜是陵五代會要載中書門下奏議云人君以四海為家不當分其南北洛陽是帝王之宅四時朝拜禮須便近不能逺幸代州今漢朝諸陵皆近秦雍國朝陵寢布列京畿後魏文帝自代遷洛之後園陵皆在河南兼勅功之家不許北葬今魏氏諸陵尚在京畿祔葬代州理未為允從之丙子以前翰林學士户部侍郎馮道依前本官充職戊寅西征之師入大散闗九國志趙庭隠傳云自入敵境即禁兵士焚廬舍剽財物蜀人徳之偽命鳯州節度使王承㨗故鎮屯駐指揮使唐景思次第迎降得兵一萬}
