  - {type: variant, offset: 5017, length: 215, content: 備參考閔帝嗣位志修德政易月之制纔除便延訪學士讀貞觀政要太宗實錄有意於致理愚私謂同列曰吾君延訪少及吾輩位高責重事亦堪憂奈宗社何皆惕息而不敢言以恩例進位左僕射清泰初徽陵禮畢馮道出鎮同州愚加特進太微宮使弘文館大學士宰相劉昫與馮道婚嫁道既出鎮兩人在中書或舊事不便要釐革者對論不定愚性太峻因曰此事賢家翁所為賢家翁通鑑作賢親家疑原本有誤然冊府元龜所引薛史亦作賢家翁今仍其舊影庫本粘籤更之不亦便乎昫憾其言切於是每言必相折難或至喧呼無幾兩人俱罷相, WYG: 鄴都副留}
