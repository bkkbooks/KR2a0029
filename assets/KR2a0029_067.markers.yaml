  - {type: variant, offset: 2674, length: 0, content: '', WYG: 王承朴棄城遁去康延孝大破蜀軍于三泉時王衍將幸秦州以其軍五萬屯于利州聞我師至遣步騎三萬逆戰于三泉延孝與李嚴以勁騎三千擊之蜀軍大敗斬首五千級餘衆奔潰王衍聞敗自利州奔歸成都斷吉柏津浮梁而去丁亥文武百官上}
  - {type: variant, offset: 2674, length: 0, content: '', krp: 王承朴棄城遁去康延孝大破蜀軍于三泉時王衍將幸秦州以其軍五萬屯于利州聞我師至遣步騎三萬逆戰于三泉延孝與李嚴以勁騎三千擊之蜀軍大敗斬首五千級餘衆奔潰王衍聞敗自利州奔歸成都斷吉柏津浮梁而去丁亥文武百官上}
  - {type: variant, offset: 2675, length: 1, content: 鳳, WYG: 以貞簡皇太后靈駕發引請車駕不至山陵所戊子葬貞簡太后于坤陵己丑魏王繼岌至興州偽東川節度使宋光葆以梓綿劒龍普五州來降武定軍使王承肇以達蓬璧三州來降興元節度使王宗威以梁開通渠麟五州來降階州刺史王承岳納符印請命秦州節度使王承休棄城自扶州路奔于西川太平廣記引王氏見聞記云王承休握鋭兵於天水兵刃不舉既知東軍入蜀遂擁麾下之師及婦女孩㓜萬餘口金銀繒帛於西蕃買路歸蜀沿路}
