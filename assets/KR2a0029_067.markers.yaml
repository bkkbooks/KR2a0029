  - {type: variant, offset: 1173, length: 472, content: 員外郎李慎義等上疏云崇韜往日專權不閑故實塞仕進之門非奬善之道疏下中書說等覆奏深詆崇韜識者非之又有王者能以多岐取事納賂於說說以其名犯祖諱遂改之為操擬官于近甸及明宗即位說常慮身危每求庇于任圜常保護之說居有井昔與鄰家共之因嫌鄙雜築垣于外鄰人訟之為希甫疏論以為井有貨財及案之本人惟稱有破釜一所反招虛妄初貶州刺史尋責授夷州司戶參軍初說在江陵與高季興相知及入中書亦常通信幣自討西蜀季興請攻峽內莊宗許之如能得三州俾為屬郡西川既定季興無尺寸之功洎明宗纘承季興頻請三郡朝廷不得已而與之革說方在中書亦預其議及季興占據獨歸其罪流于合州合州原本作白州今據五代春秋改正影庫本粘籤明年夏詔曰陵州合州長流百姓豆盧革韋說頃在先朝擢居重任欺公害物黷貨賣官靜惟肇亂之端更有難容之事且夔忠萬三州地連巴蜀路扼荊蠻接皇都弭難之初徇逆帥僭求之勢罔予視聽率意割移將千里之土疆開通狡穴動兩川之兵賦禦捍經年致朕莫遂偃戈猶煩運策近者西方鄴雖復要害高季興尚固窠巢增吾旰食之憂職爾朋姦之計而又自居貶所繼出流言苟刑戮之稽時處忠良于何地宜令逐處刺史監賜自盡永樂大典卷一萬七千九百一十歐陽史說子濤晉天福初為, WYG: ''}
