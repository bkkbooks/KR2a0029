  - {type: variant, offset: 5356, length: 204, content: 二郡刺史李嗣昭典兵於晉陽與圜遊處甚洽及鎮澤潞請為觀察支使解褐賜朱紱圜美姿容有口辯嗣昭為人間搆於莊宗方有微隙圜奉使往來常申理之克成友于之道圜之力也及丁母憂莊宗承制起復潞州觀察判官賜紫常山之役嗣昭為帥卒於軍圜代總其事案歐陽史作嗣昭戰歿圜代將其事舊五代史考異號令如一敵人不知莊宗聞之倍加奬賞是秋復以上黨之師攻常山城中萬人突出大將孫文進死之賊逼我軍圜麾騎士擊之頗有殺獲嘗以禍福諭其城中鎮人信之使乞降及城潰誅元惡之外官, WYG: 檢校}
