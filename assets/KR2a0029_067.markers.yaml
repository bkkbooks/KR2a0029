  - {type: variant, offset: 4201, length: 436, content: 霄傭夫毆僦舍人致死法司按律罪在李霄愚白李霄手不鬬毆傭夫致死安得坐其主耶以是忤旨愚自拾遺再遷膳部員外郎賜緋改司勳員外郎賜紫至是罷職歷許鄧觀察判官案歐陽史作罷為鄧州觀察判官舊五代史考異初在內職慈州舉子張礪依焉貞明中礪自河陽北歸莊宗補授太原府掾出入崇闥之間揄揚愚之節概及言愚之所為文仲尼遇顏回壽顏回壽原本作顏回儔今據夏文莊集所引薛史改正影庫本粘籤夷齊非餓人等篇北人望風稱之洎莊宗都洛陽鄧帥俾奏章入朝諸貴見之禮接如舊尋為主客郎中數月召為翰林學士三年魏王繼岌征蜀請為都統判官仍帶本職從軍時物議以蜀險阻未可長驅郭崇韜問計於愚愚曰如聞蜀人厭其主荒恣倉卒必不為用宜乘其人二三風馳電擊彼必破膽安能守險及前軍至固鎮收軍食十五萬斛崇韜喜謂愚曰公能料事吾軍濟矣招討判官陳乂至寶雞寶鷄原本作實鷄今據通鑑改正影庫本粘籤稱疾乞留在後愚厲聲曰陳乂見利則進懼難則止今大軍涉險人心易惑正可斬之以徇由是軍人無遲留者是時軍書羽檄皆出其手蜀平就拜中書舍人師還明宗即位時西征副招討使任圜為宰相雅相欽重屢言於安重誨請引, WYG: 存敬}
