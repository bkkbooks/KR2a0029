  - {type: variant, offset: 2599, length: 0, content: '', WYG: 水八月壬戌詔諸司人吏不許諸處奏薦如有勞績只許本司奏聞詔有司呉越王印宜以黄金鑄成其文曰呉越國王之印丁夘帝釋服百官奉慰于長夀宫戊辰客省使李嚴使蜀迴初帝令徃市蜀中珍玩蜀法嚴峻不許竒貨東出其許市者謂之入草物嚴不獲珍貨歸而奏之帝大怒曰物歸中夏者命之曰入草王衍寜免為入草之人耶由是伐蜀之意銳矣庚辰幸夀安山陵作所鄴都大水御河泛溢癸未河南縣令羅貫長流崖州尋委河南府決痛杖一頓處死坐部内橋道不修故也及死人皆寃之甲申山陵禮儀使奏山陵封城之内先有丘墳合令子孫改卜舊例給其所費無子孫者官為瘞藏如是五品以上官所司仍以禮致祭從之鳯翔奏大水己酉中書門下上言據禮儀使狀凖故事太常少卿定大行太后諡議太常卿署定訖告天地宗廟伏準禮文賤不得誄貴子不得爵母后必諡于廟者受成于祖宗今大行太后諡請太常卿署定後集百官連署諡狀訖讀于太廟太祖皇帝室然後差丞郎一人撰册文别定日命太尉上諡册于西宫靈座同日差官告天地太㣲宫宗廟如常告之儀從之青州大水蝗己丑以襄州留後李紹珙為襄州節度使以邠州留後董璋為邠州節度使九月辛夘朔河陽奏黄河漲一丈五尺癸巳中書上言大行皇太后諡議合讀于太廟太祖室其日集兩省御史臺五品以上尚書省四品已上諸司三品已上官于太廟序立從之鎮州衛州奏水入城壞廬舍乙未制封第三子鄴都留守興聖宫使檢校太尉同平章事判六軍諸衛事繼岌為魏王幸夀安陵庚子襄州奏漢江漲溢漂溺廬舍是日命大舉伐蜀詔曰朕夙荷丕基乍平偽室非不欲寵綏四海恊和萬邦庶正朔以遐同俾人倫之有序其或地居陬裔位極驕奢殊乖事大之規但藴偷安之計則必徴諸}
