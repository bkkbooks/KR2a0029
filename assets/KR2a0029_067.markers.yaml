  - {type: variant, offset: 2257, length: 315, content: 路險阻往復綿足蘭程安坐肩輿所至州縣驅率丁夫長吏迎謁拜伏輿前少有忤意因加笞辱及汴將王彥章陷德勝南城急攻楊劉莊宗御軍苦戰臣下憂之咸白宰臣欲連章規諫請不躬御士伍豆盧革言及漢高臨廣武事矢及於胸紿云中足程曰此劉季失策衆皆縮頸嘗論近世士族或曰員外郎孔明龜善和宰相之令緒宣聖之系孫得非盛歟程曰止於孔子之後盛則吾不知也親黨有假驢夫於程者程帖府給之府吏訴云無例程怒鞭吏背時任圜為興唐少尹莊宗從姊壻也案歐陽史誤作莊宗姊婿也舊五代史考異憑其寵戚因詣程程方衣鶴氅華陽巾憑几決事見圜怒詈曰是何蟲豸恃婦力耶宰相取給於府縣得不識舊體圜不言而退是夜馳至博平面訴於莊宗莊宗怒謂郭崇韜曰朕誤相此癡物敢辱予九卿促令自盡崇韜亦怒事幾不測賴盧質橫身解之遂降為右庶子莊宗既定, WYG: 陵禮儀使}
