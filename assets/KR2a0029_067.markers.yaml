  - {type: variant, offset: 5630, length: 4, content: 馬充北面, WYG: 濟贍之術孔謙比以吏進故無保邦濟民之要務唯以急刻賦歛為事樞密承旨段徊奏曰臣見本朝時或遇嵗時災歉國費不足天子將求經濟之要則内出朱書御札以訪宰臣請陛下依此故事行之即命學士草詞帝親札以訪宰臣非帝憂民之實也時宰相豆盧革等依阿徇旨竟無所陳但云陛下威徳冠天下今西蜀平定珍寶甚多可以給軍}
