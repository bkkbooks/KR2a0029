  - {type: variant, offset: 5654, length: 0, content: '', WYG: 李琪引古田租之法從權救弊之道上疏言之帝優詔以奬之丁酉詔偽蜀私署官員等惟名與器不可假人况是遐僻偏方僭竊偽署因時亂而濫稱名位歸國體而悉合削除但恐當本朝屯否之時有厯代簮纓之士既陷彼土遂授偽官又慮有曾受本朝渥恩當時已居班秩須為升降不可通同應偽署官至太師太傅及三少并太尉司徒司空侍中中書令左右僕射已上並宜降至六尚書臨時更約偽署高抵為六行次第階至開府特進金紫者宜令文班降至朝散大夫武班降至銀青爵偽署將相已下與開國男餘並不得更稱封爵其有功臣者削去五代㑹要云其有功臣名號並宜削去如是偽署節鎮伐罪之初率先向化及立功効者宜委繼岌}
