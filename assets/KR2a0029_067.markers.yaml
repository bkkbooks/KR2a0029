  - {type: variant, offset: 6048, length: 197, content: 司天成二年除太子少保致仕出居磁州及朱守殷叛重誨乘間誣其結搆立遣人稱制就害之乃下詔曰太子少保致仕任圜早推勳舊曾委重難既退免於劇權俾優閑於外地而乃不遵禮分潛附守殷緘題罔避於嫌疑情旨頗彰於怨望自收汴壘備見蹤由若務含弘是孤典憲尚全大體止罪一身宜令本州於私第賜自盡圜受命之日聚族酣飲神情不撓清泰中制贈太傅案歐陽史作愍帝即位贈圜太傅薛史作廢帝清泰中未知孰是舊五代史考異子徹仕皇朝位至度支郎中卒永樂大典卷九千, WYG: 十}
