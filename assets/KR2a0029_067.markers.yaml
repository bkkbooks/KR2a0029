  - {type: variant, offset: 2754, length: 169, content: 典卷一萬三千四百二十四案五代會要作護鑾書制學士歐陽史云莊宗即位拜中書舍人翰林學士時皇后及羣小用事鳳言皆不見納及入汴改授禮部員外郎莊宗及劉皇后幸張全義第后奏曰妾五六歲失父母每見老者思念尊親泣下以全義年德妾欲父事之以慰孤女之心莊宗許之命鳳作牋上全義定往來儀注鳳上書極諫不納天成初置端明殿學士鳳與馮道俱任其職時任圜為宰相為安重誨所傾以至罷相歸磁, WYG: 將軍晉}
