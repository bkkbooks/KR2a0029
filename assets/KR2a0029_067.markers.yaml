  - {type: variant, offset: 3698, length: 397, content: 明公地處要衝位兼將相自宮闈變故已涉旬時若不號令率先以圖反正遲疑未決一朝山東侯伯唱義連衡鼓行而西明公求欲自安如何決策此必然之勢也不如馳檄四方諭以逆順軍聲一振則元兇破膽浹旬之間二豎之首傳於天下計無便於此者建深禮遇之堅辭還山天復初駕在鳳翔汴軍攻蒲華愚避難東歸洛陽時衞公李德裕孫延古在平泉舊墅愚往依焉子弟親採梠負薪以給朝夕未嘗干人故少師薛廷珪掌貢籍之歲登進士第又登宏詞科授河南府參軍遂卜居洛表白沙之別墅梁有禪代之謀柳璨希旨殺害朝士愚以衣冠自相殘害乃避地河朔與宗人李延光客於山東梁末帝嗣位雅好儒士延光素相款奉得侍講禁中屢言愚之行高學贍有史魚蘧瑗之風召見嗟賞久之擢為左拾遺俄充崇政院直學士或預咨謀而儼然正色不畏強禦衡王入朝衡王原本作衞王今據歐陽史家人傳改正影庫本粘籤重臣李振輩皆致拜惟愚長揖末帝讓之曰衡王朕之兄朕猶致拜崇政使李振等皆拜爾何傲耶對曰陛下以家人禮兄振等私臣也臣居朝列與王無素安敢諂事其剛毅如此晉, WYG: 雲}
  - {type: variant, offset: 3698, length: 397, content: 明公地處要衝位兼將相自宮闈變故已涉旬時若不號令率先以圖反正遲疑未決一朝山東侯伯唱義連衡鼓行而西明公求欲自安如何決策此必然之勢也不如馳檄四方諭以逆順軍聲一振則元兇破膽浹旬之間二豎之首傳於天下計無便於此者建深禮遇之堅辭還山天復初駕在鳳翔汴軍攻蒲華愚避難東歸洛陽時衞公李德裕孫延古在平泉舊墅愚往依焉子弟親採梠負薪以給朝夕未嘗干人故少師薛廷珪掌貢籍之歲登進士第又登宏詞科授河南府參軍遂卜居洛表白沙之別墅梁有禪代之謀柳璨希旨殺害朝士愚以衣冠自相殘害乃避地河朔與宗人李延光客於山東梁末帝嗣位雅好儒士延光素相款奉得侍講禁中屢言愚之行高學贍有史魚蘧瑗之風召見嗟賞久之擢為左拾遺俄充崇政院直學士或預咨謀而儼然正色不畏強禦衡王入朝衡王原本作衞王今據歐陽史家人傳改正影庫本粘籤重臣李振輩皆致拜惟愚長揖末帝讓之曰衡王朕之兄朕猶致拜崇政使李振等皆拜爾何傲耶對曰陛下以家人禮兄振等私臣也臣居朝列與王無素安敢諂事其剛毅如此晉, krp: 雲}
