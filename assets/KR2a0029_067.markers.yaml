  - {type: variant, offset: 3298, length: 399, content: 窮厄告者必傾其資而餉之人士以此多之也永樂大典卷一萬七千九百一十案趙鳳傳永樂大典中闕全篇今存其舊李愚字子晦自稱趙郡平棘西祖之後家世為儒父瞻業應進士不第遇亂徙家渤海之無棣以詩書訓子孫愚童齔時謹重有異常兒年長方志學徧閱經史慕晏嬰之為人初名晏平晏平原本作晏來今據冊府元龜改正影庫本粘籤為文尚氣格有韓柳體厲志端莊風神峻整非禮不言行不苟且愚初以艱貧求為假官滄州盧彥威署安陵簿丁憂服闋隨計之長安屬關輔亂離頻年罷舉客於蒲華之間光化中軍容劉季述王奉先廢昭宗立裕王月餘諸侯無奔問者愚時在華陰致書於華帥韓建其略曰僕關東一布衣爾幸讀書為文每見君臣父子之際有傷教害義之事常痛心切齒恨不得抽腸蹀血肆之市朝明公居近關重鎮君父幽辱月餘坐視凶逆而忘勤王之舉僕所未諭也僕竊計中朝輔弼雖有志而無權外鎮諸侯外鎮原本作外鉁今從通鑑改正影庫本粘籤雖有權而無志惟明公忠義社稷是依往年車輅播遷號泣奉迎累歲供饋再復朝廟義感人心至今歌詠此時事勢尤異於, WYG: ''}
