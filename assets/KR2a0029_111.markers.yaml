  - {type: variant, offset: 152, length: 0, content: '', krp: 司空乾寧初代康君立為昭義節度使光化元年十二月以疾卒于潞時年六十二史建瑭字國寶父敬思鴈門人仕郡至牙校武皇節制鴈門敬思為九府都督從入闗定京師及鎮太原為裨將中和四年從援陳許為前鋒敗黄巢於汴上追賊至徐兖常將騎挺身酣戰勇冠諸軍是時天下之師雲集軍中無不推伏六月衛從武皇入汴州舍於上源驛是久為汴人所攻敬思方大醉因蹶然而興操弓與汴人鬭矢不虚發汴人死者數百夜分冒雨方達汴橋左}
  - {type: variant, offset: 153, length: 0, content: '', WYG: 扶武皇決圍而去敬思後拒血戰而沒武皇還營知失敬思流涕久之建瑭以父廕少仕軍門光化中典昭徳軍與李嗣昭攻汾州率先登城擒叛將李瑭以獻授檢校工部尚書李思安之圍上黨也建瑭為前鋒與總管周徳威赴援時汴人夾城深固援路斷絶建瑭日引精騎設伏擒生夜犯汴營驅斬千計敵人不敢芻牧汴將王景仁營於柏鄉建瑭與周徳威先出井陘髙邑之戰日巳晡晩汴軍有歸志建瑭督部落精騎先陷其陣夾攻魏滑之間遂長驅追擊夜入柏鄉俘斬數千計論功加檢校左}
