  - {type: variant, offset: 163, length: 1, content: 澶, WYG: 馬軍都將八月攻趙州獲刺史王鋌進逼鎮州為流矢所中卒于軍時年四十六李承嗣代州鴈門人父佐方承嗣少仕郡補右職中和二年從武皇討賊闗輔為前鋒王師之攻華隂黄巢令偽客省使王汀㑹軍機於黄揆承嗣擒之以獻賊平以功授汾州司馬改榆次鎮將光啟初從討蔡賊于陳許上源之難遣承嗣奉表行在陳訢其事觀軍容田令孜館而慰諭令達情於武皇姑務協和仍授以左散騎常侍朱玫之亂遣承嗣率軍萬人援鄜州至渭橋迎扈車駕王行瑜既殺朱玫承嗣㑹鄜夏之師入定京城獲偽相裴徹鄭昌圖函送朱玫襄王首獻于行在駕還宫賜號迎鑾功臣檢校工部尚書守嵐州刺史賜犒軍錢二萬貫時車駕初還三輔多盜承嗣按兵警禦輦轂乂安及還屯於鄜留别將焉嘉福五百騎宿衞孟方立之襲遼州也武皇遣承嗣設伏於榆社以待之邢人既至承嗣發伏擊其歸兵大敗之獲其將奚忠信以功授洺州刺史及張濬之加兵於太原也時鳳翔軍營霍邑承嗣率一軍攻之岐人夜遁追擊至趙城合大軍攻平陽旬有三日而拔師還改敎練使檢校司徒乾寧二年兖鄆為汴人所攻勢漸危蹙使乞師於武皇遣承嗣率三千騎假道於魏渡河援之時李存信屯於莘縣既而羅𢎞信背盟掩擊王師因之隔絶及瑄瑾失守承嗣與朱瑾史儼同入淮南承嗣史儼皆驍將也淮人得之軍聲大振十國春秋莫列傳太祖署為淮南行軍副使武皇深惜之如失左右手乃遣趙岳間道使於淮南請歸承嗣等楊行密許之遣使陳令存修好於武皇其年九月汴將龐師古葛從周同出師將収淮南朱瑾率淮南軍三萬與承嗣設伏於清口大敗汴人生獲龎師古行密嘉其雄才留而不遣仍奏授檢校太尉領鎮海軍節度使天祐九年淮人聞莊宗有柏鄉之捷乃以承嗣為楚}
