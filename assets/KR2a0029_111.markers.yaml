  - {type: variant, offset: 35, length: 2, content: 戶部, WYG: 河東右都押牙先鋒右軍使從武皇救陳許平黄巢武皇遇難于上源驛汴將楊彦洪連車樹栅遮絶巷陌時騎從皆醉宴席既闌汴軍四面攻傳舍志勤虓勇冠絶復酒膽激壯因獨登驛樓大呼曰朱僕射負恩無行邀我司空圖之吾三百人足以濟事因彎弧發射矢無虚發汴人死者數十志勤私謂武皇曰事急矣如至五鼔吾屬無遺類矣可速行因扶武皇而去雷雨暴猛汴人扼橋志勤以其屬血戰擊敗之得}
