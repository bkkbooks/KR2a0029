  - {type: variant, offset: 179, length: 82, content: 薛可言為右龍武統軍右金吾原本脫吾字今據文增入影庫本粘籤以左神武統軍安審約為左羽林統軍以左驍衞上將軍趙贊為右羽林統軍以太子太師致仕宋彥筠為左衞上將軍詔移生吐渾族帳於潞, WYG: 期年復授鄧}
