  - {type: variant, offset: 2108, length: 1818, content: 人諸府少尹書記支使防禦團練副使不得過十人節度推官防禦團練軍事判官不得過七人逐處係帳收管此外如敢額外影占人戶其本官當行朝典先是漢隱帝時有人上言州府從事令錄皆請料錢自合雇人驅使不合差遣百姓丁戶秉政者然之乃下詔州府從事令錄本處先差職役並放歸農自是官吏有獨行趨府縣者帝頗知之故有是命夏四月壬辰朔詔沿淮州縣許淮南人就淮北糴易餱糧時淮南饑故也甲午以夫人董氏為德妃仍令所司備禮冊命己亥改侍衞馬步軍軍額馬軍舊稱護聖今改為龍捷步軍舊稱奉國今改為虎捷壬寅詔唐莊宗明宗晉高祖三處陵寢各有守陵宮人並放逐便如願在陵所者依舊供給甲辰相州張彥成移鎮鄧州案原本作彥威今據列傳改正舊五代史考異折從阮移鎮滑州李筠移鎮相州丙午亳州防禦使王重裔卒戊申幸南莊庚戌皇第四女封壽安公主辛亥故許州節度使劉信追封蔡王丙辰詔曰牧守之任委遇非輕分憂之務既同制祿之數宜等自前有富庶之郡請給則優或邊遠之州俸料素薄以至遷除之際擬議亦難既論資之高低又患祿秩之升降所宜分多益寡均利同恩冀無黨偏以勸勳効今定諸防禦使料錢二百貫祿粟一百石食鹽五石馬十匹草粟元隨三十人衣糧團練使一百五十貫祿粟七十石鹽五石馬十匹元隨三十人刺史一百貫祿粟五十石鹽五石馬五匹元隨二十人云丁巳尚書左丞田敏使契丹迴契丹主兀欲遣使耨姑報命幷獻碧玉金塗銀裹鞍勒各一副弓矢器仗貂裘等土產馬三十匹土產漢馬十匹庚申帝為故貴妃張氏舉哀於舊宮輟視朝三日辛酉司空致仕盧文紀卒五月壬戌朔帝不視朝以漢隱帝梓宮在殯故也戊辰皇子澶州節度使榮起復依前澶州節度使以故貴妃張氏去歲薨至是發哀故也己巳遣左金吾衞將軍姚漢英前右神武將軍華光裔使于契丹辛未太常卿邊蔚上追尊四廟諡議是夜有大星如五升器流於東北有聲如雷丙子太常卿邊蔚上太廟四室奠獻舞名丁丑詔京兆鳳翔府應諸色犯事人第宅莊圍店磑已經籍沒者並給付罪人骨肉壬午幸南莊甲申考城縣巡檢供奉官馬彥勍棄市坐匿赦書殺獄囚也丙戌宰臣馮道為四廟冊禮使六月辛卯朔不視朝以漢隱帝梓宮在殯故也甲午百僚上表請以七月二十八日皇帝降聖日為永壽節從之邢州大雨霖己亥太常少卿劉悅上漢少帝諡曰隱皇帝陵曰穎陵從之辛亥以樞密使王峻為尚書左僕射兼門下侍郎同平章事監修國史充樞密使以樞密副使尚書兵部侍郎范質為中書侍郎同平章事充集賢殿大學士以戶部侍郎判三司李穀為中書侍郎同平章事判三司司徒兼侍中監修國史竇貞固司空兼中書侍郎同平章事集賢殿大學士蘇禹珪並罷相守本官壬子幸西莊癸丑詔宰臣范質參知樞密院事鄴都洺滄貝等州大雨霖丙辰西京奏新授宗正卿郭令圖卒丁巳以尚書左丞顏衎為兵部侍郎充端明殿學士以宣徽北院使翟光鄴兼樞密副使秋七月辛酉朔帝被衮冕御崇元殿授太廟四室寶冊于中書令馮道等赴西京行禮癸亥尚書左丞田敏兼判國子監事戊辰以御史中丞于德辰為尚書右丞以祕書監邊光範為太子賓客以戶部尚書張昭為太子賓客以其子秉為陽翟簿犯法抵罪昭詣閣待罪詔釋之乃左授此官壬申史官賈緯等以所撰晉高祖實錄三十卷少帝實錄二十卷上之丙子幸宰臣王峻第案歐陽史作戊寅幸王峻第舊五代史考異己丑鎮州奏破河東賊軍於平山縣西斬首五百級是日太常卿邊蔚奏議改郊廟舞名事具樂志八月辛卯漢隱帝梓宮發引帝詣太平宮臨奠詔羣臣出祖於西郊是歲幽州饑流人散入滄州界詔流人至者口給斗粟仍給無主土田令取便種蒔放免差稅癸巳虎入西京修行寺傷人市民殺之乙未幸班荊館壬寅契丹遣幽州牙將曹繼筠來歸故晉中書令趙瑩之喪詔贈太傅仍賜其子絹五百匹以備喪事歸葬於華陰故里乙巳幸西莊壬子晉州王晏移鎮徐州滄州王景移鎮河中定州孫方簡移鎮華州永興郭從義移鎮許州貝州王繼弘移鎮河陽李暉移鎮滄州以許州節度使武行德為西京留守滑州折從阮移鎮陝州河中扈彥珂移鎮滑州陝州李洪信移鎮永興華州王饒移鎮貝州徐州王彥超移鎮晉州丙辰尚食李氏等宮官八人並封縣君司記劉氏等六人並封郡夫人尚宮皇甫氏等三人並封國夫人唐制有內官宮官各有司存更不加郡國之號近代加之非舊典也以易州刺史孫行友為定州留後戊午故夫人柴氏追立為皇后仍令所司定諡備禮冊命九月庚申朔帝詣太平宮起居漢太后辛酉故夫人楊氏追贈淑妃仍令所司擇日備禮冊命故皇第五女追封永寧公主癸亥定州奏契丹永康王兀欲為部下所殺案遼史世宗以九月癸亥遇弒不應定州即能于癸亥入奏疑原文有舛誤甲子以前耀州團練使武廷翰為太子少保致仕丙子諸道兵馬都元帥兩浙節度使檢校太師尚書令中書令吳越國王錢俶可天下兵馬都元帥丁丑中書舍人劉濤責授少府少監分司西京坐遣男頊代草制詞也監察御史劉頊責授復州司戶坐代父草制也中書舍人楊昭儉解官放逐私便以多在假告不親其職也永樂大典卷八千九百八十, WYG: ''}
