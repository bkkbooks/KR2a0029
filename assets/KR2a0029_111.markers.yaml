  - {type: variant, offset: 168, length: 0, content: '', WYG: 以張掎角十七年七月卒於楚州時年五十五史儼代州鴈門人以便騎射給事于武皇為帳中親將驍果絶衆善擒生設伏望塵揣敵所向皆捷自武皇入定三輔誅黄巢毎出師皆從乾寧中從討王行瑜師次渭北遣儼率五百騎䕶駕石門時京城大擾士庶奔逃散布南山儼分騎警衞比駕還京盜賊不作以功授檢校右散騎常侍屯於三橋者累月昭宗寵錫優異明年與李承嗣率騎渡河援兖鄆時汴軍雄盛自青徐兖鄆柵壘相望儼與騎將安福順等毎以數千騎直犯營壘左俘右斬汴軍為之披靡及朱瑾失守與李承嗣等奔淮南淮人比善水軍不閑騎射既得儼等軍聲大振尋挫汴軍於清口其後併鍾𫝊擒杜洪削錢鏐成行密之霸迹者皆儼與承嗣之力也淮人館遇甚厚妻孥第舍必推其甲故儼等盡其死力十國春秋云儼累官滁州刺史天祐十三年卒於廣陵蓋寓蔚州人祖祚父慶世為州之牙將武皇起雲中寓與康君立等推轂佐佑之因為腹心武皇節制鴈門署職為都押牙領嵐州刺史洎移鎮太原改左都抑牙檢校左僕射武皇與之決事言無不從凡出征行靡不衞從通鑑光啟二年駕幸興元大將盖寓説克用曰鑾輿播遷天下皆歸咎于我今不誅朱玫黜李熅無以自湔洗克用從之又通鑑考異引紀年錄云偽使至太原太祖詰其事狀曰皆朱玫所為將斬之以徇大將盖寓等言云云太祖蟠偽詔械其使馳檄諭諸鎮曰今月二十日得襄王偽語及朱玫文字云田令孜脅遷鑾駕播越梁洋行至半塗六軍變擾遂至蒼黄而晏駕不知弑逆者何人永念丕基不可無主昨四鎮藩后推朕纂承巳于正殿受冊畢改元大赦者李煴出自贅疣名汙藩邸智昏菽麥識昧機權李符擄之以塞辭朱玫賣之以為利吕不韋之奇貨可見姦邪蕭世誠之上囊期于匪夕近者當道徑差健步奉表起居行朝現駐巴梁宿衞比無騷動而朱玫脅其孤騃自號台衡敢云首亂階明言晏駕熒惑藩鎮凌弱廟朝云乾寧二年從入闗討王行瑜特授}
