  - {type: variant, offset: 29, length: 3, content: 樞密副, WYG: 一言忤旨武皇賜酖而殂時年四十八明宗即位以念舊之故詔贈太傅薛志勤蔚州奉誠人小字鐡山初為獻祖帳中親信乾符中與康君立共推武皇定雲州以功授右牙都校從入達靼武皇授節鴈門志勤領代北軍}
