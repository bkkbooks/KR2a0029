  - {type: variant, offset: 1222, length: 884, content: 百人信宿遁去丁巳以尚書左丞田敏充契丹國信使迴鶻遣使貢方物己未天德軍節度使虢國公郭勳加同平章事以前宗正卿劉為衞尉卿辛酉以衞尉卿邊光範為祕書監以前吏部侍郎李詳為吏部侍郎以前戶部侍郎顏衎為尚書右丞顏衎原本作顏衍今從宋史改正影庫本粘籤三月壬戌朔前西京留守李從敏卒戊辰以前左武衞上將軍李懷忠為太子太傅致仕以前邢州節度使安審暉為太子太師致仕辛未幸南莊壬申詔曰諸州府先差散從親事官等前朝創置蓋出權宜苟便一時本非舊貫近者遍詢羣議兼採封章且言前件抽差於理不甚允當一則礙州縣之色役一則妨春夏之耕耘貧乏者困於供須豪富者幸於影庇既為煩擾須至改更況當東作之時宜罷不急之務其諸州所差散從親事官等並宜放散詔下公私便之徐州行營都部署王彥超馳奏收復徐州城內逆首楊溫及親近徒黨並處斬其餘無名目人及本城軍都將校職掌吏民等雖被脅從本非同惡並釋放兼知自前楊溫招喚草賊同力守把朕以村墅小民偶被煽誘念其庸賤特與含容其招入城草賊並放歸農仍倍加安撫湘陰公夫人幷骨肉在彼仰差人安撫守護勿令驚恐以右散騎常侍張煦給事中王延藹並為左散騎常侍以前大名府少尹李瓊為將作監以前彰武軍節度使周密為太子太師致仕以衞尉卿劉充漢隱帝山陵部署丙子以太子少保致仕王延為太子少傅以戶部尚書致仕盧損左驍衞上將軍致仕李肅並為太子少保兵部尚書致仕韓昭裔為尚書右僕射太子太師致仕盧文紀為司空自延而下並依前致仕故散騎常侍裴羽贈戶部尚書故太子賓客蕭愿贈禮部尚書以司農卿致仕薛仁謙為鴻臚卿以將作監致仕烏昭為太府卿以太常少卿致仕王禧為少府監以祕書少監致仕段顒為將作監自仁謙而下並依前致仕詔沿淮州縣軍鎮今後自守疆土不得縱一人一騎擅入淮南地分己卯潞州奏涉縣所擒河東將士二百餘人部送赴闕詔給衫袴巾屨放歸本土甲申鎮州武行德移鎮許州何福進移鎮鎮州丙戌以襄州節度副使郭令圖為宗正卿詔曰故蘇逢吉劉銖頃在漢朝與朕同事朕自平禍亂不念仇讎尋示優弘與全家屬尚以幼稚無託衣食是艱將行矜卹之恩俾獲生存之路報怨以德非我負人賜逢吉骨肉洛京莊宅各一賜劉銖骨肉陝州莊宅各一己丑幸南莊庚寅唐故郇國公李從益追封許王唐明宗淑妃王氏追贈賢妃辛卯詔諸道節度副使行軍司馬兩京少尹留守判官並許差定當直人力不得過, WYG: ''}
