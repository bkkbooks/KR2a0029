  - {type: 'tls:seg', offset: 172, content: '', id: KR2a0029_ZHSJ_111-d111p2s13}
  - {type: variant, offset: 172, length: 0, content: '', WYG: 開國侯食邑一千户領容管觀察經略使光化初車駕還京授檢校太傅封成陽郡公寓性通點多智數善揣人主情武皇性嚴急左右難事無委遇者小有違忤即寘于法惟寓承顔希旨規其趨向婉辭順意}
  - {type: page-break, offset: 172, content: '', id: KR2a0029_WYG_111-10b, image: WYG0277/WYG0277-0469d.png}
  - {type: variant, offset: 172, length: 0, content: '', krp: 開國侯食邑一千户領容管觀察經略使光化初車駕還京授檢校太傅封成陽郡公寓性通點多智數善揣人主情武皇性嚴急左右難事無委遇者小有違忤即寘于法惟寓承顔希旨規其趨向婉辭順意}
  - {type: variant, offset: 173, length: 0, content: '', WYG: 盡參裨武皇或暴怒將吏事將不測寓欲救止必佯佐其怒以責之武皇怡然釋之有所諫諍必徵近事以為喻自武皇鎮撫太原最推親信中外將吏無不景附朝廷藩鄰信使結託先及武皇次入寓門既總軍中大柄其名震主梁祖亦使姦人離間暴揚于天下言蓋寓已代李聞者寒心武皇略無疑間初武皇既平王行瑜還師渭北暴雨六十日諸將或請入覲且云天顔咫尺安得不行覲禮武皇意未決寓白曰車駕自石門還京寢未安席比為行瑜兄弟驚駭乗輿今京師未寧姦宄流議大王移兵渡渭必恐復動宸情君臣始終不必朝覲但歸藩守姑務動王是忠臣之道也武皇笑曰蓋寓尚阻吾入覲況天下人哉即日班師天祐二年三月寓病篤武皇日幸其第手賜藥餌初寓家每事珍膳窮極海陸精於府饌武皇非寓家所獻不食每幸寓第其徃如歸恩寵之洽時無與比及其卒也哭之彌慟莊宗即位追贈太師伊廣字言原本闕一字元和中}
  - {type: page-break, offset: 173, content: '', id: KR2a0029_WYG_111-11a, image: WYG0277/WYG0277-0470a.png}
  - {type: page-break, offset: 173, content: '', id: KR2a0029_WYG_111-11b, image: WYG0277/WYG0277-0470b.png}
  - {type: variant, offset: 173, length: 0, content: '', krp: 盡參裨武皇或暴怒將吏事將不測寓欲救止必佯佐其怒以責之武皇怡然釋之有所諫諍必徵近事以為喻自武皇鎮撫太原最推親信中外將吏無不景附朝廷藩鄰信使結託先及武皇次入寓門既總軍中大柄其名震主梁祖亦使姦人離間暴揚于天下言蓋寓已代李聞者寒心武皇略無疑間初武皇既平王行瑜還師渭北暴雨六十日諸將或請入覲且云天顔咫尺安得不行覲禮武皇意未決寓白曰車駕自石門還京寢未安席比為行瑜兄弟驚駭乗輿今京師未寧姦宄流議大王移兵渡渭必恐復動宸情君臣始終不必朝覲但歸藩守姑務動王是忠臣之道也武皇笑曰蓋寓尚阻吾入覲況天下人哉即日班師天祐二年三月寓病篤武皇日幸其第手賜藥餌初寓家每事珍膳窮極海陸精於府饌武皇非寓家所獻不食每幸寓第其徃如歸恩寵之洽時無與比及其卒也哭之彌慟莊宗即位追贈太師伊廣字言原本闕一字元和中}
  - {type: variant, offset: 174, length: 0, content: '', WYG: 僕射慎之後廣中和末除授忻州刺史遇天下大亂乃委質於武皇廣襟情灑落善占對累厯右職授汾州刺史時武皇主盟諸侯景附軍機締結聘遺旁午廣奉使稱㫖累遷至檢校司徒乾寧四年從征劉仁恭武皇之師不利于成安寨廣歿于賊有女為莊宗淑妃子承俊歴貝遼二州刺史李承勲者與廣同為牙將善于奉使名聞軍中承勳累遷至太原少尹劉守光之僭號也莊宗遣承勲往使問其釁端承勲至豳州見守光如藩方聘問之禮謁者曰燕王為帝矣可行朝禮承勲曰吾大國使人太原亞尹是唐帝除授燕王自可臣其部人安可臣我哉守光聞之不悦拘留於獄數日而出詰之曰臣我乎承勲曰燕君能臣我王則我臣之吾有死而已安敢辱命㑹王師討守光承勲竟殁于燕史敬鎔太原人事武皇為帳中綱紀甚親任之莊宗初嗣晉王位李克寧陰構異圖將害莊宗事發有日矣克寧密引敬鎔以邪謀論之既而敬鎔白貞簡太后惶駭召張承業李存璋等圖之克寧等伏誅以功累厯郡同光初為華州節度使移鎮安州天成中入為}
