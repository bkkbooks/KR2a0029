  - {type: variant, offset: 152, length: 0, content: '', WYG: 司空乾寧初代康君立為昭義節度使光化元年十二月以疾卒于潞時年六十二史建瑭字國寶父敬思鴈門人仕郡至牙校武皇節制鴈門敬思為九府都督從入闗定京師及鎮太原為裨將中和四年從援陳許為前鋒敗黄巢於汴上追賊至徐兖常將騎挺身酣戰勇冠諸軍是時天下之師雲集軍中無不推伏六月衛從武皇入汴州舍於上源驛是久為汴人所攻敬思方大醉因蹶然而興操弓與汴人鬭矢不虚發汴人死者數百夜分冒雨方達汴橋左}
