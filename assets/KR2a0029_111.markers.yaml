  - {type: variant, offset: 155, length: 1, content: 貴, WYG: 師還留戍趙州汴將氏延賞數犯趙之南鄙建瑭設伏柏鄉獲延賞獻之九年梁祖親攻蓨縣時王師併攻幽州聲言汴軍五十萬將冦鎮定都將符存審謂建瑭曰梁軍儻以五十萬來我等何以待之裨將趙行實曰走入土門為上䇿存審曰事未可知但老賊在東别將西來尚可徐圖不旬日楊師厚圍棗強賀徳倫圍蓨縣梁祖自至攻城甚急存審曰吾王方事北面南鄙之事付我等數人今西道無兵坐滋賊勢何以為謀老賊若不下蓨阜必西攻深冀與公等料閲騎軍偵視賊勢乃選精騎八百趨信都存審扼下博橋建瑭與李嗣肱分道擒生建瑭乃分麾下三百騎為五軍自將一軍深入各命俘掠梁軍之芻牧者還㑹下博橋翼日諸軍皆至獲芻牧者數百人聚而殺之緩數十人令其逸去各曰沙陁軍大至矣梁軍震恐明日建瑭嗣肱為梁軍服色與芻牧者相雜晡晩及賀徳倫寨門殺守門者縱火大譟斬俘而去是夜梁祖燒營而遁比至貝州迷失道路委棄兵仗不可勝計十二年魏博歸款建瑭與符存審前軍屯魏縣十三年敗劉鄩于元城收澶州以建瑭為刺史檢校司空外衙騎軍都將尋厯貝相二}
