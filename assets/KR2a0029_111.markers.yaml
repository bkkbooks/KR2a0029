  - {type: variant, offset: 690, length: 531, content: 考異內出寶玉器及金銀結縷寶裝牀几飲食之具數十碎之於殿庭帝謂侍臣曰凡為帝王安用此仍詔所司凡珍華悅目之物不得入宮先是迴鶻間歲入貢禁民不得與蕃人市易寶貨至是一聽私便交易官不禁詰丁未左千牛將軍朱憲使契丹迴契丹主兀欲遣使人來獻良馬一駟賀登極戊申詔曰朕祗膺景命奄有中區每思順物之情從衆之欲將使照臨之下咸遂寬舒仕官之流自安進退往者有司拘忌人或滯流所在前資並遣赴闕輦轂之下多寄食僦舍之徒歲月之間動懷土念家之思宜循大體用革前規應諸道州府有前資朝官居住如未赴京不得發遣其行軍副使已下幕職州縣官等得替求官自有月限年月未滿一聽外居如非時詔徵不在此限己酉有司議立四親廟從之辛亥以太子少傅楊凝式為太子少師以太常卿張昭為戶部尚書以尚書左丞王易為禮部尚書以兵部侍郎邊蔚為太常卿以翰林學士中書舍人魚崇諒為工部侍郎充職以戶部侍郎韋勳為兵部侍郎以刑部侍郎邊歸讜為戶部侍郎以禮部侍郎司徒詡為刑部侍郎以祕書監趙上交為禮部侍郎以兵部尚書王仁裕為太子少保以翰林學士禮部尚書張沆為刑部尚書充職以尚書右丞田敏為左丞以吏部侍郎段希堯為工部尚書以太子詹事馬裔孫為太子賓客前鄜州節度使劉重進前滑州節度使宋延渥並加食邑吐渾府留後王全德加檢校太保充憲州刺史隰州刺史許遷奏河東賊軍劉筠自晉州引兵來攻州城尋以州兵拒之賊軍傷死者, WYG: 巻}
