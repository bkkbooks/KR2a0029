  - {type: variant, offset: 10, length: 1, content: 周, WYG: 列傳七康君立蔚州興唐人世為邊豪乾符中為雲州牙校事防禦使段文楚時羣盜起河南天下將亂代北仍歳阻饑諸部豪傑咸有嘯聚邀功之志㑹文楚稍削軍人儲給戍兵咨怨君立與薛鐵山程懷信王行審李存章等謀曰段公懦人難與共事方今四方雲擾武威不振丈夫不能于此時立功立事非人豪也吾等雖權係部衆然以雄勁聞於時者莫若沙陁部復又李振武父子勇冠諸軍吾等合勢推之則代北之地旬月可定功名富貴事無不濟也君立等乃夜謁武皇言曰方今天下大亂天子付將臣以邊事歲偶饑荒便削儲給我等邊人焉能守死公家父子素以威惠及五部當共除虐帥以謝邊人孰敢異議者武皇曰明天子在上舉事當有朝典公等勿輕議予家尊逺在振武萬一相迫俟予稟命君立等曰事機巳洩遲則變生曷俟千里咨稟衆因聚譟擁武皇比及雲州衆且萬人師營鬭雞臺城中械文楚以應武皇之軍既收城推武皇為大同軍防禦留後衆狀以聞朝廷不悦詔徵兵來討俄而獻祖失振武武皇失雲州朝廷命招討使李鈞幽州李可舉加兵于武皇攻武皇于蔚州君立從擊可舉之師屢㨗及獻祖入達靼君立保感義軍武皇授鴈門節度以君立為左都押牙從入闗逐黄孽收長安武皇還鎮太原授檢校工部尚}
