  - {type: variant, offset: 816, length: 380, content: 館修撰判館事以給事中司徒詡充集賢殿學士判院事西京奏百姓馬知饒殺男吳九不死以其侵母食也詔赦之甲子以前延州節度使何建為涇州節度使丙寅以涇州節度使王周為陝府節度使己巳以左散騎常侍權知開封府事邊蔚為工部侍郎依前知府事壬申以前兵部侍郎李玘為吏部侍郎癸酉命使攝太尉右僕射平章事和凝仗副攝司徒給事中邊光範追冊故魏國夫人張氏為皇后奉寶冊至西莊影殿行禮鹵簿儀仗如式十一月丁丑以鄧州節度使宋彥筠為晉州節度使以涇州節度使何建為鄧州節度使己卯以前鄴都留守廣晉尹李德珫為涇州節度使丙申所司奏議故天下兵馬都元帥吳越國王錢元瓘諡曰莊穆詔改為文穆戊戌遣前復州防禦使吳巒權知貝州軍事詔節度使王令溫赴闕庚子單州軍事判官趙岳奏刺史楊承祚初夜開門出城稱為母病往青州寧親於孔目官齊琪處留下牌印臣已行用權知州事辛丑高麗遣使朝貢昭化軍節度使瑞慎等州觀察等使杜建徽進封鄖國公遣侍衞步軍都指揮使郭謹領兵赴鄆州十, WYG: 異}
