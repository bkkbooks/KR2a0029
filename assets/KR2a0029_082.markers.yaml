  - {type: variant, offset: 10, length: 674, content: 八少帝紀第二天福八年秋七月丁丑朔京師雨水深三尺辛巳許州節度使李從溫來朝進封楚國公壬午以前河陽節度使皇甫遇為右龍武統軍丁亥以宣徽南院使李承福為同州節度使癸巳改陝州甘棠驛為通津驛避廟諱也案東都事略陶穀傳穀本姓唐避晉祖諱改姓陶蓋當時避諱及偏旁字及同音字也甲午正衙命冊皇太后以宰臣李崧充使右散騎常侍李慎儀為副丁酉幸南莊召從駕臣僚習射路左農人各賜布衫麻屨八月戊申右衞上將軍楊思權卒贈太傅辛亥分命朝臣一十三人分檢諸州旱苗涇青磁鄴都共奏逃戶凡五千八百九十諸縣令佐以天災民餓攜牌印納者五癸酉以前昭義節度使李從敏為左龍武統軍九月戊寅尊秦國夫人安氏為皇太妃帝所生母也丁亥追冊故魏國夫人張氏為皇后帝之元妃也是日以金部郎中知制誥馮玉為檢校尚書右僕射充潁州團練使戊子前潁州團練使田令方追奪在身官爵勒歸私第坐前任耀州日額外配民麴錢納歸私室故也延州奏綏州刺史李彝敏拋棄郡城與弟彝俊等五人將骨肉二百七十口來投當州押送赴闕稱與兄夏州節度使彝殷偶起猜嫌互相攻伐故也辛卯夏州奏差宥州刺史李仁立權知綏州癸巳故絳州刺史張從訓贈太尉絳州原本作鋒州刺史原本脫史字今從冊府元龜增改影庫本粘籤追冊皇后之父也甲午夏州李彝殷奏衙內都指揮使拓拔崇斌等五人作亂當時收擒處斬訖相次綏州刺史李彝敏擅將兵士直抵城門尋差人掩殺彝敏知事不濟與弟五人將家南走詔李彝敏潛結凶黨顯恣逆謀骨肉之間尚興屠害照臨之內難以含容送夏州處斬丙申幸大年莊遂幸侍衞使景延廣第延廣進金玉器玩賜延廣玉帶名馬母妻賓佐部曲僮僕錫賚咸及之庚子以右諫議大夫邊光範為給事中以吏部郎中劉知新為右諫議大夫是月諸州郡括借到軍食以籍來上吏民有隱落者並處極法州郡, WYG: ''}
