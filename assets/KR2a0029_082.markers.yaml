  - {type: variant, offset: 1421, length: 0, content: '', WYG: 本紀作端明殿學士尚書兵部侍郎趙鳯為門下侍郎兼工部尚書同平章事趙鳯𫝊作禮部侍郎與本紀異見吴縝纂誤伏以少帝今不入廟難以言宗案舊唐書哀帝紀云中書奏少帝行事不合稱宗攷五代㑹要天成二年博士吕明龜議引君不逾年不入宗廟之禮請别立廟于園陵故不稱景宗非議其行事有失也舊唐書誤丙辰權知荆南府事高從誨上章首罪丙辰通鑑作庚申使副劉玫劉玫通鑑作韓玫徹伯爾舊作掣撥今改托諾舊作秃餒今改紐赫羙稜舊作捺括梅里今改郭濟舊作骨至今改}
