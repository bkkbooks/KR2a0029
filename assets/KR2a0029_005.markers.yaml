  - {type: variant, offset: 116, length: 1, content: 罷, WYG: 遣使奉牋納款又以銀三萬兩助軍是日行次零口癸丑聞長安亂昭宗為閹官韓全誨等劫遷西幸鳯翔蓋避帝之兵鋒也翼日遂命旋師夕次於赤水乙夘大軍集於州城下韓建惶駭失措即以城降丙辰帝表建權知忠武軍事促令赴任同華二州平是時唐太子太師盧知猷等二百六十三人列狀請帝速請迎奉已未遂帥諸軍發自赤水壬戌次於咸陽偵者云天子昨暮至岐山旦日宋文通扈蹕入其闉矣是時岐人遣大將符道昭領兵萬人屯於武功以拒帝帝遣康懷英敗之擄甲士六千餘衆乙丑次於岐山文通遣使奉書自陳其失請帝入覲丙辰及岐闉文通遣渝約閉壁不獲通復次於岐山是時昭宗累遣使齎朱書御札賜帝遣帝收軍還本道帝診之曰此必文通全誨之謀也皆不奉詔癸酉飛章奉辭且移軍北伐乙亥至邠州節度使李繼徽舉城降繼徽因請去文通所賜李姓復本宗楊氏又請納其帑以為質帝皆從之仍易其名曰崇本邠州平己丑唐丞相崔𦙍京兆尹鄭元規至華州以速迎奉為請許之二年正月帝復次於武功岐人堅壁不下乃迴軍於河中二月聞晉軍大舉南下聲言來援鳯翔帝遣朱友寧帥師會晉州刺史氏叔琮以禦之帝以大軍繼其後三月友寧叔琮與晉軍戰於晉州之北大敗之生擒克用男廷鸞帝喜謂左右曰此岐人之所恃也今既如此岐之變動不久矣四月岐人遣符道昭領大軍屯於虢縣康懷英帥驍騎敗之丁酉唐丞相崔𦙍自華來謁帝屢述艱運危急事不可緩又慮羣閹擁昭宗幸蜀且告帝帝為動容𦙍將辭啓宴於府署帝舉酒𦙍情激於哀因自持樂版聲曲以侑酒帝甚悦座中以良馬珍玩之物賚旣行命諸將繕戎具五月丁丑帝復西征六月丁丑次於虢縣癸未與岐軍大戰自辰至午殺萬餘衆擒其將校數百人乘勝遂逼其壘七月丙午岐軍復出求戰帝軍不利是月遣孔勍帥師取鳯隴成三州皆下之是時岐人相率結寨於諸山以避帝軍帝分兵以討浹旬之内并平之九月甲戌帝以岐軍諸寨連結稍盛因親統千騎登高診之時秋空澄霽烟靄四絶忽有紫雲如繖葢凝於龍旌之上久之方散觀者咸訝之是時帝以岐人堅壁不戰且慮師老思欲旋斾以歸河中因密召上將數人語其事時親從指揮使高季昌獨前出抗言曰天下雄傑窺此舉者一歳矣今岐人己困願少俟之帝嘉其言因曰兵法貴以正理以竒勝者詐也乘機集事必由是乎乃命季昌密募人入岐以紿之尋有騎士馬景堅願應命且曰是行也必無生理願録其孥帝悽然止其行景固請乃許之明日軍出北夢瑣言云時因朱友倫總騎軍且至將大出兵迓之諸寨屏匿如無人景因躍馬西走直叩岐闉詐以軍怨東遁為告且言列寨尚畱萬餘人俟夕將遁矣宜速掩之李茂貞信其言案李茂貞即宋文通此紀前後互異葢仍當時軍撽之文未及改從畫一遽啓二扉悉衆來冦時諸軍以介馬待之中軍一鼓百營俱進又分遣數騎以據其闉岐人進不能駐其趾退不能入其壘殺戮蹂踐不知其數茂貞繇是喪胆但閉壁而己十一月癸夘鄜帥李周彞新唐書作李茂勲茂勲即周彛也統兵萬餘人屯於岐之北原與城中舉􅇏以相應翼日帝以周彞旣離本部鄜畤必無}
