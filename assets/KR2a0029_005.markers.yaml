  - {type: variant, offset: 802, length: 0, content: '', WYG: 天子以帝堅讓九錫之命乃命宰相栁燦來使且述揖讓之意焉丁酉帝又讓九錫之命詔畧曰但以鴻名難掩懿實須彰宜且徇于奏陳未便行于典册又改諸道兵馬元帥為天下兵馬元帥是時帝以唐朝百官服飾多闕乃製造逐色衣服請朝廷等第賜之其所給俸錢仍請自來年正月全支三年正月幽滄稱兵將冦于魏魏人乞師且以牙軍驕悍謀欲誅之遣親吏臧延範密告于帝帝隂許之乙丑北征先是帝之愛女適羅氏是月卒于鄴城因以兵仗數千事實于橐中遣客將馬嗣勲領長直軍千人雜以工匠丁夫肩其橐而入于魏聲言為帝女設祭魏人信而不疑庚午夜嗣勲率其衆與羅紹威親軍數百人同攻牙軍遲明盡殺之死者七千餘人洎于嬰孺亦無畱者是月帝次于内黄聞之馳騎至魏時魏之大軍方與帝軍同伐滄州聞牙軍之死即時奔還帝之軍追及厯亭殺賊幾千餘衆乃擁大將史仁遇保于高唐帝遣兵圍之是月天子詔河南尹張全義部署修制相國魏王法物三月甲寅天子命帝總判鹽鐵度支户部等三司事帝再上章切讓之乃止四月癸未攻下高唐軍民無少長皆殺之生擒逆首史仁遇以獻帝命支解之未幾又攻下澶博貝衛等州皆為魏軍殘黨所據故也是時晉人圍邢州刺史牛存節堅壁固守帝遣符道昭帥師救之晉人乃遁去五月帝畧地于洺州旣而復入于魏七月己未自魏班師是}
