  - {type: variant, offset: 3070, length: 1588, content: 百十六五月己丑朔以連雨不止至壬辰御文明殿命宰臣分拜祠廟永樂大典卷二千六百三十二自朔旦至癸巳內外以午日奉獻巨萬計馬三千蹄餘稱是復相率助修內壘冊府元龜卷一百九十七甲辰詔曰奇邪亂正假偽奪真既刑典之不容宜犯違而勿赦應東西兩京及諸道州府制造假犀玉真珠腰帶璧珥幷諸色售用等一切禁斷不得輒更造作如公私人家先已有者所在送納長吏對面毀棄如行勅後有人故違必當極法仍委所在州府差人檢察收捕明行處斷冊府元龜卷一百九十一魏博度使守太師兼中書令鄴王羅紹威薨帝哀慟曰天不使我一海內何奪忠臣之速也詔贈尚書令冊府元龜卷二百四六月己未朔詔軍鎮勿起土功冊府元龜卷一百九十一七月壬子宴宰臣河南尹翰林學士兩街使于甘水亭丙辰宴羣臣於宣威殿賜物有差冊府元龜卷一百九十七劉知俊攻逼夏州案通鑑七月岐王與邠涇二帥各遣使告晉請合兵攻定難節度使李仁福晉王遣振武節度使周德威將兵會之合五萬衆圍夏州案五代春秋八月晉人秦人侵夏州與薛史及通鑑異舊五代史考異以宣化軍留後李思安為東北面行營都指揮使陝州節度使楊師厚為西路行營招討使冊府元龜卷二百十六西路行營原本作兩路今從通鑑改正影庫本粘籤福州貢方物獻桐皮扇廣州貢犀玉獻舶上薔薇水冊府元龜卷一百九十七時陳許汝蔡潁五州境內有蝝為災俄而許州上言有野禽羣飛蔽空旬日之間食蝝皆盡是歲乃大有秋永樂大典卷五千一百九八月車駕西征己巳次陝府是時憫雨且命宰臣從官分禱靈迹日中而雨翌日止帝大悅永樂大典卷二千六百三十二案五代春秋八月晉人秦人來侵夏州庚午次陝府辛未老人星見是日宴本府節度使楊師厚及扈從官于行宮賜師厚帛千匹仍授西路行營招討使丙子宴文武從官軍使已下設龜茲樂賜物有差冊府元龜卷一百九十七九月丁亥朔命宰臣于兢赴西都祀昊天上帝於圜丘冊府元龜卷一百九十三甲午至西京案五代春秋作九月己丑帝還西都歐陽史同通鑑作己丑上發陝甲午至洛陽舊五代史考異下詔曰朕聞歷代帝王首推堯舜為人父母孰比禹湯睿謀高出於古先聖德普聞於天下尚或卑躬待士屈己求賢俯仰星雲慮一民之遺逸網羅巖穴恐片善之韜藏延爵祿以徵求設丹青而訪召使其為政樂在進賢蓋繇國有萬幾朝稱百揆非才不治得士則昌自朕光宅中區迄今三載宵分輟寐日旰忘餐思共力於廟謀庶永清於王道而乃朝廷之內或未盡於昌言軍旅之間亦罕聞於奇策眷言方岳下及山林豈無英奇副我延佇諸道都督觀察防禦使等或勳高翊世或才號知人必於塗巷之賢備察芻蕘之士詔到可精搜郡邑博訪賢良喻之以千載一時約之以高官美秩諒無求備唯在得人如有卓犖不羈沉潛自負通霸王之上略達文武之大綱究古今刑政之源識禮樂質文之變朕則待之不次委以非常用佐經綸豈勞階級如或一言拔俗一事出羣亦當舍短從長隨才授任大小方圓之器寧限九流溫良恭儉之人難誣十室勉思薦舉勿至因循俟爾發揚慰予翹渴仍從別勅處分冊府元龜卷二百十三辛丑以久雨命宰臣薛貽矩禜定鼎門趙光逢祠嵩岳永樂大典卷一千五百二十一勅魏博管內刺史比來州務並委督郵遂使曹官擅其威權州牧同于閑冗俾循通制宜塞異端並依河南諸州例刺史得以專達壬寅頒奪馬令先是王師擊賊獲馬多上獻至是盡止之蓋欲邀其奮擊之功也冊府元龜卷一百九十一乙巳王師敗蕃寇於夏州初劉知俊誘沙振武賊帥周德威涇原賊帥李繼鸞合步騎五萬大舉欲俯拾夏臺節度使李仁福兵力俱乏以急來告先是供奉官張漢玫宣諭在壁國禮使杜廷隱賜幣于夏案廷隱原本作定隱下仍作廷隱今據九國志改正舊五代史考異及石堡寨聞賊至以防卒三百人馳入州既而大兵圍合廷隱漢玫與指揮使張初李君用率州民防卒與仁福部分固守晝夜戮力踰月及鄜延援至大軍奮擊敗之河東邠岐賊分路逃遁夏州圍解案通鑑甲申遣夾馬指揮使李遇劉綰自鄜延趨銀夏李遇等至夏州岐晉兵皆解去舊五代史考異丙午詔曰劉知俊貴為方伯尊極郡王而乃背誕朝恩竄投賊壘固神人之共怒諒天地所不容雖命討除尚稽擒戮宜懸爵賞以大功名必有忠貞咸思憤發有生擒劉知俊者賞錢千萬授節度使首級次之得孟審登者錢百萬除刺史得將孫坑卓瓌劉儒張鄰等賞有差冊府元龜卷二百十六乙卯宴會羣臣於宣威殿冊府元龜卷一百九十七, WYG: ''}
