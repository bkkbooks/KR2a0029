  - {type: variant, offset: 14, length: 2, content: 開平, WYG: 十餘人五月己巳邢州刺史馬師素棄城遁去辛未磁州刺史袁奉滔自剄而死五日之内連下三州因以葛從周兼邢州昭義軍節度使留後帝遂班師是時襄州節度使趙匡凝聞帝軍有清口之敗密附於淮夷七月帝遣氏叔琮率師伐之未幾其泌州刺史趙璠越墉來降隨州刺史趙匡琳臨陣就擒二年正月淮南楊行密舉全呉之衆精甲五萬以伐徐州帝領大軍禦之行密聞帝親征乃收軍而退時幽州節度使劉仁恭大舉蕃漢兵號十萬以伐魏遂攻䧟具州州民萬餘户無少長悉屠之進攻魏州魏人來乞師帝遣朱友倫張存敬李思安等先屯於内黄帝遂親征三月與燕軍戰於内黄北燕軍大敗殺二萬餘衆奪馬二千餘匹擒都將單無敵己下七十餘人通鑑單可及幽州驍將號單無敵是月葛從周自山東領其部衆馳以救魏翼日乘勝諸將張存敬以下連破八寨遂逐燕軍北至於臨清壅其殘冦於御河溺死者甚衆仁恭奔於滄州六月帝表丁會為潞州節度使以李罕之疾亟故也又遣葛從周由固鎭路入於潞州以援丁會七月壬辰朔海州陳漢賓擁所部三千奪於淮南戊戌晉人䧟澤州帝遣召葛從周於潞畱賀徳倫以守之未幾德倫為晉人所逼遂棄潞而歸繇是潞州復為晉人所有十一月陜州都將朱簡殺畱後李璠自稱畱後送款於帝}
