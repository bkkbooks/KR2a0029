  - {type: variant, offset: 151, length: 2, content: 旨工, WYG: 觴酒奠於先皇帝室前卿之德朕知不能報矣即召帝執手聲淚者久之翼日誅宦官第五可範等五百餘人於内侍省三月庚辰制以帝為守太尉兼中書令宣武宣義天平䕶國等軍節度使諸道兵馬副元帥加食邑三千户實封四百户仍賜囘天再造竭忠守正功臣戊戌帝建斾東還昭宗御延喜樓送之旣醉遣内臣賜帝御製楊桞詞五首三月戊午至大梁時以青州未平命軍士休澣以俟東征四月丙子巡師於臨朐亟命逼其城與青州兵戰於城下大敗之是夕淮將王景仁以所}
