  - {type: variant, offset: 99, length: 2, content: 檀為, krp: 珂結援於太原帝怒遣大將張存敬率將渉河繇舎山路鼓行而進戊申攻下絳州壬子晉州刺史孟漢瑜舉郡来降帝即以大將侯言權領晉州何絪權領絳州晉絳平己未大軍至河中存敬命繚其垣而攻之壬戌蒲人颺表幡以請降庚午帝至河中以張存敬權領河中軍府事河中平帝乃東還是月李克用遣牙將張特來聘請尋舊好帝亦遣使報命三月癸未朔帝歸自河中是月遣大將賀德倫氏叔琮領大軍以伐太原叔琮等自太行路入魏博都將張文恭自磁州新口入葛從周以兖鄆之衆自土門路入洺州刺史張歸厚以本軍自馬嶺入定州刺史王處直以本軍自飛狐入晉州侯言自隂地入澤州刺史李存璋棄郡奔歸太原叔琮引軍逼}
