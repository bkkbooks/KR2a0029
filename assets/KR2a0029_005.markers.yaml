  - {type: variant, offset: 396, length: 0, content: '', WYG: 為圖己因連上章請車駕幸洛十國春秋呉世家三月丁巳唐帝遣問使以絹詔告難于我及西川河東等令紏率藩鎮以圖匡復詔有云朕至洛陽則為全矣忠所幽閉詔敇皆岀其手朕意不得復通三月丁未昭宗制以帝兼判左右神䇿及六軍諸衛事是時昭宗累遣中使及内夫幸洛帝以陜州小藩非萬乘久畱之地期以四月内東幸閏月丁酉昭宗發自陜郡壬寅次于糓水是時昭宗左右唯小黄門及打毬供奉内園小兒二百餘人帝猶忌之是日密令醫官許昭逺告變乃設饌于别幄召而盡殺之皆坑于幕}
