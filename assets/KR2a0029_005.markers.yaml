  - {type: 'tls:seg', offset: 20, content: '', id: KR2a0029_ZHSJ_005-d5p2s2}
  - {type: variant, offset: 20, length: 0, content: '', WYG: 帝以仁恭進通之入冦也皆繇鎭定為其囊橐卽以葛從周為上將以伐鎮州遂攻下臨城渡滹沱以環其城帝領親軍繼至鎭帥王鎔懼納質請盟仍獻文繒二十萬以犒戎士帝許之十月晉人以帝宿兵於趙遂南下大行急攻河陽畱後候言與都將閻寳力戰固守僅而獲全十一月以張存敬為上將自甘陵發軍北侵幽薊連拔瀛莫二郡遂移軍以攻中山定帥王郜以精甲二萬戰於懐德亭盡殪之郜懼奔於太原遲明大軍集於城下郜季父處直特印鑰乞降亦以繒帛三十萬為獻帝即以處直代郜領其鎭焉是月燕人劉守光赴援中山寨於易水之上繼為康懷英張存敬等所敗斬獲甚衆繇是河朔知懼皆弭伏焉是歳唐左軍中尉劉季述幽昭宗於東宫内立皇子徳王裕為帝仍遣其養子希度來言願以唐之神器輸於帝帝時方在河朔聞之遽還於汴大計未决會李振自長安使迴因言於帝曰夫竪刁伊戾之亂所以資覇者之事也今閹竪幽辱天子王不能討無以令諸侯帝悟因請振復使於長安與時宰潛謀反正天復元年正月乙酉朔唐宰相崔𦙍潛使人以帝密㫖告於侍衛軍將孫德昭己下令誅左右中尉劉季述王仲先等即時迎昭宗於東内}
  - {type: page-break, offset: 20, content: '', id: KR2a0029_WYG_005-3b, image: WYG0277/WYG0277-0042b.png}
