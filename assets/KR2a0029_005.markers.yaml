  - {type: variant, offset: 12, length: 1, content: 第, krp: 二光化元年正月帝遣葛從周統諸將畧地於山東遂次於邢洺三月昭宗以帝兼領天平軍節度使餘如故四月滄州節度使盧廷彥為燕軍所攻棄城奔於魏魏人送於汴是月帝以大軍至鉅鹿屯於城下敗晉軍萬餘衆於青山口俘馬千餘匹丁夘遣從周分兵攻洺州斬刺史邢善益擒將}
