  - {type: variant, offset: 104, length: 1, content: 面, WYG: 屯將李審建王周領歩軍一萬騎二千詣叔琮歸命乃進軍趨太原四月乙邜大軍出石會關營於洞渦驛都將白奉國自井陘入收承天軍張歸厚引兵至遼州刺史張鄂迎降氏叔琮即日與諸軍至陽城下城中雖時出精騎來戰然危蹙己甚將謀遁矣會叔琮以芻糧不給遂班師五月癸夘昭宗以帝兼領䕶國軍節度使河中尹六月庚申帝發自大梁丁夘視事於河中以素服出郊拜故節度使王重榮墓尋辟其子瓚為節度判官請故相張濬為重榮撰碑帝自中和初歸唐首依重榮至是思其舊徳故思禮若是七月甲寅帝東還梁邸十月戊戌奉密詔赴長安是時朝廷既誅劉李述以韓全誨張𢎞彦為兩軍中尉袁易簡周敬容為樞密使是時軍國大政專委宰相崔𦙍每事裁抑宦官宦官側目𦙍一日於便殿奏欲盡去之全誨等屬垣聞之嘗於昭宗前祈哀自訴自是昭宗敇𦙍每有密奏令進囊封全誨等乃訪京城美婦人十數以進使求宫中隂事昭宗不悟𦙍謀漸泄中官視𦙍眥裂以重賂甘言誘藩臣以為城社時因讌聚則相向流涕時𦙍掌三司貨泉全誨等教禁兵伺𦙍出聚而呼譟訴以冬衣減損又於昭宗前訴之昭宗不得已罷𦙍知政事𦙍怒急召帝請以兵入輔故有是}
