  - {type: variant, offset: 2309, length: 722, content: 備參考影庫本粘籤二月乙丑幸甘水亭冊府元龜卷二百五帝出師子門幸榆林東北坡教諸軍兵事冊府元龜卷二百十四賜潞州投歸軍使張行恭錦服銀帶幷食冊府元龜卷二百十五己丑出光政門至穀水觀麥冊府元龜卷一百九十八戊辰宴於金鑾殿甲戌以春時無事頻命宰臣及勳戚宴於河南府池亭辛巳楊師厚赴鎮于陝寒食假諸道節度使郡守勳臣競以春服賀又連清明宴以鞍轡馬及金銀器羅錦進者迨千萬乃御宣威殿宴宰臣及文武官四品已上三月壬辰幸崇政院宴勳臣己亥幸天驥院宴侍臣壬寅幸甘水亭宴宰臣宴宰臣原本脫宴字今據文增入影庫本粘籤勳戚翰林學士辛亥宴宰臣於內殿丙辰於興安毬場大饗六軍樂春時也永樂大典卷一萬六千七百四十六四月壬戌詔曰追養以祿王者推歸厚之恩欲靜而風人子抱終身之感其以刑部尚書致仕張策及三品四品常參官二十二人先世先世原本作先正今據文改正影庫本粘籤各追贈一等冊府元龜卷二百十乙丑宴崇政院帝在藩及踐阼勵精求理深戒逸樂未嘗命堂上歌舞是日止令內妓升階擊鼓弄曲甚懽至午而罷冊府元龜卷一百九十七丁卯宋州節度使衡王友諒進瑞麥一莖三穗冊府元龜卷二百二案通鑑云友諒獻瑞麥帝曰豐年為上瑞今宋州大水安用此為詔除本縣令名遣使詰責友諒容齋續筆亦載此事疑皆采薛史原文而冊府元龜徵引梁書有所刪節也謹附載于此丙戌幸建春門閱新樓至七里屯觀麥召從官食于樓河南張昌孫及蒲同主事吏賜物各有差冊府元龜卷二百五帝過朝邑見鎮將位在縣令上問左右或對曰宿官秩高帝曰令長字人也鎮使捕盜耳且鎮將多是邑民奈何得居民父母上是無禮也至是勅天下鎮使官秩無高卑位在邑令下冊府元龜卷一百九十一葉縣鎮遏使馮德武於蔡州西平縣界殺戮山賊擒首領張濆等七人以獻冊府元龜卷四百三十五鎮海軍節度使錢鏐擊高澧於湖州大敗之案九國志高澧以三年十月叛四年二月奔吳薛史繫于四月蓋以奏聞之日為據, WYG: 濟}
