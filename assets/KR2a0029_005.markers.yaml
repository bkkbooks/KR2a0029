  - {type: variant, offset: 393, length: 2, content: 傅霸, WYG: 朱友諒矯昭宗命收宰相崔𦙍京兆尹鄭元規等殺之又邠岐兵士侵逼京畿帝因是上表竪請昭宗幸洛昭宗不得已而從之帝乃率諸道丁匠財力同搆洛陽宫不數月而成二月乙亥昭宗駐蹕于陜帝自河中來覲謁見行營因灑涕而言曰李茂貞等竊謀禍亂將迫乘輿老臣無狀請陛下東遷為社稷大計也昭宗命延于寢室見何皇后面賜酒器及衣物何后謂帝曰此後大家夫婦委身于全忠矣因欷歔泣下後數日帝開宴于陜之私第請駕臨幸翼日帝辭歸洛陽昭宗開内宴時有宮人與昭宗附耳而語韓建躡帝之足帝遽出}
