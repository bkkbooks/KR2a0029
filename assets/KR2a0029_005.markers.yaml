  - {type: variant, offset: 18, length: 0, content: '', WYG: 四月遣葛從周以兖鄆滑魏之師伐滄州五月庚寅攻德州拔之梟刺史傳公和於城上己亥進攻浮陽六月燕帥劉仁恭大舉來援從周與諸將逆戰於乾寧軍老鵶隄大破之殺萬餘衆俘其將佐馬愼交已下百餘人既而以連雨遂班師八月河東遣李進通襲䧟洺州執刺史朱紹宗帝遣葛從周自鄴縣渡漳水屯於黄龍鎭親領中軍渉沙而寨晉人懼而宵遁洺州復平}
  - {type: page-break, offset: 18, content: '', id: KR2a0029_WYG_005-3a, image: WYG0277/WYG0277-0042a.png}
  - {type: variant, offset: 18, length: 0, content: '', krp: 四月遣葛從周以兖鄆滑魏之師伐滄州五月庚寅攻德州拔之梟刺史傳公和於城上己亥進攻浮陽六月燕帥劉仁恭大舉來援從周與諸將逆戰於乾寧軍老鵶隄大破之殺萬餘衆俘其將佐馬愼交已下百餘人既而以連雨遂班師八月河東遣李進通襲䧟洺州執刺史朱紹宗帝遣葛從周自鄴縣渡漳水屯於黄龍鎭親領中軍渉沙而寨晉人懼而宵遁洺州復平}
