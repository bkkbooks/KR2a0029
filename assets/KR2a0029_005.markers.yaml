  - {type: variant, offset: 790, length: 1, content: 巳, WYG: 酉光州遣使來求援時光州歸款于帝尋為淮人所攻故來乞師戊寅帝南征度淮次于霍丘大掠廬夀之境淮人乃棄光州而去二年正月庚申進攻夀州夀人堅壁不出丁亥帝自霍丘班師二月辛夘帝至自南征甲午青州節度使王師範至大梁帝待以賓禮尋表援河陽節度使七月辛酉天子賜帝迎鑾紀功碑樹于洛陽庚午遣大將軍楊師厚率前軍討趙匡凝于襄州辛未帝南征表趙匡凝罪狀削奪官爵八月楊師厚進収唐鄧復鄂隨均房等七州帝駐軍漢江北自循江干經度濟師之所九月甲子師厚于隂谷江口造梁以濟師趙匡凝率兵二萬振于江濱師厚麾兵進擊襄人大敗殺萬餘衆乙丑趙匡凝焚其舟率親軍載經舸沿漢而遁丙寅帝濟江至中流舟壊將没者數四比及岸舟沉是日入襄城帝因周視府署帑藏悉空惟于西廡下有一亭牕户儼然扃鎻甚密遂令破鎻啓扉中有一大匱緘鐍甚至又令破其匱内有金銀數百錠帝因歎曰亂兵旣入公私財貨固無孑遺矣此帑當有隂物主之不令常人所得俟我以有之耶遂以百餘錠賜楊師厚襲荆州畱後趙匡明棄城上陜奔蜀荆襄二州平帝以都將賀瓌權領荆州楊師厚權領襄州即表其事十月丙戌朔天子以帝為諸道兵馬元帥辛夘帝自襄州引軍由光州路趨淮南將發敬翔切諫請班師以全軍勢帝不聽壬辰次于棗陽遇大雨頗阻師行之勢軍至夀春夀春人堅壁清野以待帝帝乃遷舎于正陽十一月丙辰大軍北濟十國春秋柴再用抄其復軍斬首三千級獲輜重萬計帝至汝隂深悔淮南之行躁煩尤甚師友雜志朱全忠嘗與僚佐及遊客坐于大栁之下全忠獨言曰此樹宜為車轂衆莫應有遊客數人起應曰宜為車轂全忠勃然厲聲曰書生輩好順口玩人皆此類也車須用夾轂栁木豈可為之顧左右數十人捽言為車轂者悉撲殺之丁夘帝至自南征辛未天子命帝為相國總百揆以宣武宣義天平䕶國天雄武順佑國河陽義武昭義保義武昭武定泰寧平盧匡國武寧忠義荆南等二十一道為魏國案舊唐書尚有忠武鎮國二道此闕載進封帝為魏王入朝不趨劔履上殿贊拜不名兼備九錫之命癸未唐中書門下奏中書印已送相國中書公事權用中書省印甲申中書門下奏天下州縣名與相國魏王家諱同者請易之十二月乙酉}
