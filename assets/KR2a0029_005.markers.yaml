  - {type: variant, offset: 150, length: 0, content: '', WYG: 韓渥趙國夫人寵顔齎詔押賜帝紫金酒器御衣玉帯丙辰華州畱後李存審遣飛騎來告青州節度使王師範遣牙將張厚輦甲胄弓槊詐言來獻欲盗據州城事覺已擒之矣是日師範又遣其將劉鄩盗據兖州丁已昭宗遣中使押送軍容使韓全誨己下三千餘人首級以示帝甲子昭宗發離鳯翔幸左劔寨權駐蹕帝營帝素服待罪昭宗命學士傳宣免之帝即入見稱罪拜伏者數四既而促召升殿密邇御座且曰宗廟社稷是卿再造朕與戚屬是卿再生因解所御玉帯面以賜帝帝亦以玉鞍勒馬金銀器紋錦御饌酒菓等躬自拜進焉及翠華東行帝匹馬前導十餘里宣令止之己巳昭宗至長安謁太廟御長樂樓禮畢謂帝曰朕生入舊京是卿之力也自古救君之危曾無有如是者况今日再及清廟得親}
