  - {type: variant, offset: 24, length: 71, content: 宴羣臣文武百官賜張宗奭楊師厚白綾各三百疋銀鞍轡馬丁酉上幸崇政院宴內臣賜院使敬翔直學士李班等繒綵有差永樂大典卷一萬六千七百四十六案通鑑丁未以保義, WYG: 帝聞之召巖至汴折其足送於長安杖殺之是時河中}
