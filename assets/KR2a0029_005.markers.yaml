  - {type: variant, offset: 985, length: 517, content: 于今三年何曾不寅畏晨興焦勞夕惕師唐虞之典上則於乾功挹殷夏之源下涵於民極欲使萬方有裕六辨無愆然而志有所未孚理有所未達致奸宄作釁旱霪為災驕將守邊擁牙旗而背義積陰馭氣陵玉燭以干和載考休徵式昭至警朕是以仰高俯厚靡惜於責躬履薄臨淵冀昭于玄覽兢兢慄慄夙夜匪寧及夫動干戈而必契靈誅陳犧齋而克章善應苟非天垂丕佑神贊殊休則安可致夷兇渠致字疑有脫誤蓋冊府元龜引薛史原文偶有舛誤也今無別本可校姑仍其舊影庫本粘籤就不戰之功變沴戾氣作有年之慶况靈旗北指喪犬羊于亂轍之間飛騎西臨下鄜翟若走丸之易息一隅之煙燧復千里之封疆而又掃蕩左馮討除峴首故得外戎內夏內夏原本作內憂今據文改正影庫本粘籤益知天命之攸歸喙息蚑行共識皇基之永固仰懷昭應欲報無階爰因南至之辰親展圜丘之禮茲惟大慶必及下民乃弘渙汗之私以錫疲羸之幸所冀漸臻蘇息亟致和平噫朕自臨御以來歲時尚邇氛昏未殄討伐猶頻甲兵須議於餽糧飛輓頻勞於編戶事非獲已慮若納隍宜所在長吏倍切撫綏明加勉諭每官中抽差徭役禁猾吏廣斂貪求免至流散靡依凋不濟宜令河南府開封府及諸道觀察使切加鈐轄刺史縣令不得因緣賦斂分外擾人凡關庶獄每望輕刑只候纔罷用軍必當便議優給德音節文內有未該者宜令所司類例條件奏聞冊府元龜卷一百九十一己亥以司門郎中羅廷規充魏博, WYG: 同州}
