  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書舊五代史巻六十七宋門下侍郎參知政事監修國史薛居正等撰唐書第四十三列𫝊十九豆盧革祖籍同州刺史父瓚舒州刺史宣和書譜云失其世系革少值亂難避地鄜延轉入中山王處直禮之辟于幕下有奏記之譽因牡丹會賦詩諷處直以桑柘為意言甚古雅漸加器仰轉節度判官而理家無法獨請謁見處直處直慮布政有缺有所規諫斂版出迎乃為嬖人祈軍職矣天祐末莊宗將即位講求輔相盧質以名家子舉之徵拜行臺左丞相同光初拜平章事及登廊廟事多錯亂至于官階擬議前後倒置屢為省郎蕭希甫駮正革改之無難色莊宗初定汴洛革引薦韋説冀諳事體與已同功説既登庸復事流品舉止輕脱怨歸于革又説之子俱授拾遺父子同官為人所刺遂改授員外郎革請説之子濤為𢎞文館學士説請革之子㫒為集賢學士交致阿私有同市井識者醜之革自作相之後不以進賢勸能為務唯事修鍊求長生之術嘗服丹砂嘔血數日垂死而愈天成初將塟莊宗以革為山陵使及木主歸廟不出私第専俟旄鉞數日無耗為親友促令入朝安重誨對衆辱之日山陵使名銜尚在不俟新命便履公朝意謂邊人可欺也側目者聞之思有所中初蕭希甫有正諫之望革嘗阻之遂上疏論革與説茍且自容致君無狀復誣其縱田客殺人冒元亨上第遂貶為辰州刺史仍令所在馳驛發遣後鄭玨任圜等連上三章請不行後命乃下制曰豆盧革韋説等身為輔相手握權衡或端坐稱臣或半笑奏事于君無禮舉世寧容革則暫委利權使私俸禄文武百辟皆從五月起支父子二人偏自正初給遣説則自居重位全紊大綱叙䕃貪榮亂兒孫于昭穆賣官潤屋換令錄之身名醜行疊彰羣情共怒雖居牧守未塞非尤革可責授費州司户參軍説可夷州司户參軍皆員外置司正員並所在馳驛發遣尋貶陵州長流百姓委長吏常知所在天成二年夏詔令逐處刺史監賜自盡其骨肉並放逐便子㫒官至檢校正郎服金紫尋亦削奪寳晉齋法書賛載豆盧革田園帖云大徳欲要一居處畿甸間舊無田園鄜州雖有三兩處莊子縁百姓租佃多年累有令公大王書請卻給還人户盖不欲侵奪疲民兼慮無知之輩妄有影庇包役云云岳珂曰此帖乃與僧往還書其畏强藩避罪罟盖慄慄淵冰然其後卒以故縱田客貶夜郎正坐所畏信乎亂邦之不可居也是時據鄜乃髙萬興官檢校太師中書令封北平王即革所謂令公大王者官故梁授唐命維新而顓面正朝者不能致褫鞶之誅而反竊貢秉旄之佞唐之不競有自來矣韋説福建觀察使岫之子也案以下有闕文莊宗定汴洛説與趙光􅏷同制拜平章事説性謹重奉職常不造事端時郭崇韜秉政説等承順而巳政事得失無所措言初或有言于崇韜銓選渝濫選人或取他人出身銜或取父兄資緒與令史囊槖罔冒崇韜乃條奏其事其後郊天行事官數十人多有告勅偽濫因定去留塗毁告身者甚衆選人號哭都門之外議者亦以為積弊累年一旦澄汰太細懼失惟新含垢之意時説與郭崇韜同列不能執而止之頗遭物議説之親黨告之説曰此郭漢子之意也及崇韜得罪説懼流言所鍾乃令門人左拾遺王松吏部員外郎李慎義等上疏云崇韜往日專權不􅈺故事塞仕進之門非奬善之道疏下中書説等覆奏深詆崇韜識者非之又有王傪者能以多岐取事納賂于説説以其名犯祖諱遂改之為操擬官于近甸及明宗即位説常慮身危每求庇于任圜常保䕶之説居有井昔與鄰家共之因嫌鄙雜築垣于外鄰人訟之為希甫疏論以為井有貨財及按之本人惟稱有破斧一所反招虚妄初貶溆州刺史尋責授夷州司户參軍初説在江陵與髙季興相知及入中書亦常通信幣自討西蜀季興請攻峽内莊宗許之如能得三州俾為屬郡西川既定季興無尺寸之功洎明宗纘承季興頻請三郡朝廷不得已而與之革説方在中書亦預其議及季興占據獨歸其罪流于合州明年夏詔曰陵州合州長流百姓豆盧革韋説頃在先朝擢居重任欺公害物黷貨賣官靜惟肇亂之端更有難容之事且夔忠萬三州地連巴蜀路扼荆蠻接皇都弭難之功徇逆帥僭求之勢罔予視聽率意制移將千里之土疆開通狡穴動兩川之兵賦禦捍經年致朕莫遂偃戈猶煩運䇿近者西方鄴雖復要害髙季興尚固窠巢增吾旴食之憂職爾朋姦之計而又自居貶所繼出流言茍刑戮之稽時處忠良于何地宜令逐處刺史監賜自盡歐陽史説子濤晉天福初為尚書膳部員外郎卒盧程唐朝右族祖懿父藴厯仕通顯程天復末登進士第崔魏公領鹽鐵署為巡官昭宗遷洛陽栁璨陷右族程避地河朔客遊燕趙或衣道士服干謁藩伯人未知之豆盧革客遊中山依王處直盧汝弼來太原程與革弼皆朝族知舊因往來依革處直禮遇未優故投於太原汝弼因為延譽莊宗署為推官尋改支使程褊淺無他才惟務恃門地口多是非篤厚君子尤薄之初判官王緘從軍掌文翰胡栁之役緘没于軍莊宗歸寧太原置酒公宴舉酒謂張承業曰予今于此會取一書記先以巵酒辟之即舉酒屬巡官馮道道以所舉非次抗酒辭避莊宗曰勿謙挹無踰于卿也時以職列序遷則程當為書記汝弼亦左右之程既失職私懷憤惋謂人曰主上不重人物使田里兒居余上先是莊宗嘗于帳中召程草奏程曰叨忝成名不􅈺筆硯由是文翰之選不及于程時張承業専制河東留守事人皆敬憚舊例支使監諸廩出納程訢于承業曰此事非僕所長請擇能者承業叱之曰公稱文士即合飛文染翰以濟霸國嘗命草辭自陳短拙及留職務又以為辭公所能者何也程垂泣謝之後歴觀察判官莊宗將即位求四鎮判官可為宰輔者時盧汝弼蘇循相次淪没當用判官盧質質性疎放不願重位求留太原乃舉定州判官豆盧革次舉程即詔徵之並命為平章事程本非重器驟歴顯位舉止不恒時朝廷草創庶物未備班列蕭然寺署多缺程革受命之日即乘肩輿騶導喧沸莊宗聞呵導之聲詢于左右曰宰相擔子入門莊宗駭異登樓視之笑曰所謂似是而非者也頃之遣程使晉陽宫册皇太后山路險阻往復綿邈程安坐肩輿所至州縣驅率丁夫長吏迎謁拜伏輿前少有忤意因加笞辱及汴將王彦章陷徳勝南城急攻楊劉莊宗御軍苦戰臣下憂之咸白宰臣欲連章規諫請不躬御士伍豆盧革言及漢髙臨廣武事矢及于胸紿云中足程曰此劉季失䇿衆皆縮頸嘗論近世士族或曰員外郎孔明龜善和宰相之令緒宣聖之系孫得非盛歟程曰止于孔子之後盛則吾}
