  - {type: variant, offset: 79, length: 9, content: 餘里方覺崇怒殺鄉導, WYG: 疋錢百千帷帳什物二十三事閔帝嗣位志修徳政易月之制纔除便延訪學士讀貞觀政要太宗實録有意于郅理愚私謂同列曰吾君延訪少及吾輩位髙責重事亦堪憂奈宗社何皆惕息而不敢言以恩例進位左僕射清泰初徽陵禮畢馮道出鎮同州愚加特進太微宫使𢎞文館大學士宰相劉昫與馮道為婚家道既出鎮兩人在中書或舊事不便要釐革}
