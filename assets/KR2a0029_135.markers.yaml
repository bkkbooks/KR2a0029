將即位求四鎮判官可為宰輔者時盧汝弼蘇循相次淪没當用判官盧質質性疎放不願重位求留太原乃舉定州判官豆盧革次舉程即詔徵之並命為平章事程本非重器驟歴顯位舉止不恒時朝廷草創庶物未備班列蕭然寺署多缺程革受命之日即乘肩輿騶導喧沸莊宗聞呵導之聲詢于左右曰宰相擔子入門莊宗駭異登樓視之笑曰所謂似是而非者也頃之遣程使晉陽宫册皇太后山路險阻往復綿邈程安坐肩輿所至州縣驅率丁夫長吏迎謁拜伏輿前少有忤意因加笞辱及汴將王彦章陷徳勝南城急攻楊劉莊宗御軍苦戰臣下憂之咸白宰臣欲連章規諫請不躬御士伍豆盧革言及漢髙臨廣武事矢及于胸紿云中足程曰此劉季失䇿衆皆縮頸嘗論近世士族或曰員外郎孔明龜善和宰相之令緒宣聖之系孫得非盛歟程曰止于孔子之後盛則吾}
  body:
  - {type: 'tls:seg', offset: 0, content: '', id: KR2a0029_ZHSJ_135-d135p24s7}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 也親黨有假驢夫于程者程帖府給之府吏訢云無例程怒鞭吏背時任圜為興唐少尹莊宗從姊壻也慿其寵戚因詣程程方衣鶴􅌁華陽巾慿几決事見圜怒詈曰是何蟲豸恃婦力耶宰相取給于府縣得不識舊體圜不言而退是夜馳至博平而訢于莊宗莊宗怒謂郭崇韜曰朕誤相此癡物敢辱予九卿促令自盡崇韜亦怒事幾不測賴盧質横身解之遂降為右庻子莊宗既定河南程隨百官從幸洛陽沿路墜馬因病風而卒贈禮尚書趙鳳幽州人也少為儒唐天祐中燕帥劉守光盡率部内丁夫為軍伍而黥其面為儒者患之多為僧以避之鳳亦落髮至太原頃之從劉守奇奔梁梁用守奇為博州刺史表鳳為判官案下有闕文為鄆州節度判官唐莊宗聞鳳名得之甚喜以為䕶鑾學士後莊宗即位拜鳳中書舍人及入汴改授禮部員外郎莊宗及劉皇后幸張全義第后奏曰妾五六嵗失父母毎見老者思念尊親泣下以全義年徳妾欲父事之以慰孤女之心莊宗許之命鳳作牋上全義定往來儀注鳳上書極諫不納天成初置端明殿學士鳳與馮道俱任其職時任圜為宰相為安重誨}
  - {type: page-break, offset: 2, content: '', id: KR2a0029_WYG_135-8a, image: WYG0277/WYG0277-0552c.png}
  - {type: page-break, offset: 2, content: '', id: KR2a0029_WYG_135-8b, image: WYG0277/WYG0277-0552d.png}
  - {type: variant, offset: 2, length: 0, content: '', krp: 也親黨有假驢夫于程者程帖府給之府吏訢云無例程怒鞭吏背時任圜為興唐少尹莊宗從姊壻也慿其寵戚因詣程程方衣鶴􅌁華陽巾慿几決事見圜怒詈曰是何蟲豸恃婦力耶宰相取給于府縣得不識舊體圜不言而退是夜馳至博平而訢于莊宗莊宗怒謂郭崇韜曰朕誤相此癡物敢辱予九卿促令自盡崇韜亦怒事幾不測賴盧質横身解之遂降為右庻子莊宗既定河南程隨百官從幸洛陽沿路墜馬因病風而卒贈禮尚書趙鳳幽州人也少為儒唐天祐中燕帥劉守光盡率部内丁夫為軍伍而黥其面為儒者患之多為僧以避之鳳亦落髮至太原頃之從劉守奇奔梁梁用守奇為博州刺史表鳳為判官案下有闕文為鄆州節度判官唐莊宗聞鳳名得之甚喜以為䕶鑾學士後莊宗即位拜鳳中書舍人及入汴改授禮部員外郎莊宗及劉皇后幸張全義第后奏曰妾五六嵗失父母毎見老者思念尊親泣下以全義年徳妾欲父事之以慰孤女之心莊宗許之命鳳作牋上全義定往來儀注鳳上書極諫不納天成初置端明殿學士鳳與馮道俱任其職時任圜為宰相為安重誨}
  - {type: variant, offset: 3, length: 4, content: 適刦村民, WYG: 傾以至罷相歸磁州及未守殷以汴州叛馳驛賜圜自盡既而鳳哭謂安重誨曰任圜義士也肯造逆謀以讐君父乎如此濫刑何以安國重誨笑而不責是冬權知貢舉明年春有僧自西國取經回得佛牙大如拳褐漬皴裂進于明宗鳳揚言曰曾聞佛牙鎚鍛不壞請試之隨斧而碎時宫中所施巳踰數千緡聞毁乃止及車駕還洛留知汴州事尋授中書侍郎平章事李之儀姑溪居士集趙鳳為莊宗實録將何挺論昫疏不載昫既相遂引鳳共政事長興中安重誨出鎮河中人無敢言者惟鳳極言于上前曰重誨是陛下家臣其心終不背主五年秉權賢豪俯伏但不周防自貽浸潤明宗以為朋黨不悦其奏重誨獲罪乃出為邢州節度}
  - {type: page-break, offset: 3, content: '', id: KR2a0029_WYG_135-9a, image: WYG0277/WYG0277-0553a.png}
  - {type: page-break, offset: 3, content: '', id: KR2a0029_WYG_135-9b, image: WYG0277/WYG0277-0553b.png}
