  - {type: variant, offset: 21, length: 4, content: 知所適刦, WYG: 如馳檄四方諭以逆順軍聲一振則元兇破膽浹旬之間二豎之首𫝊于天下計無便于此者建深禮遇之堅辭還山天福初駕在鳳翔汴軍攻蒲華愚避難東歸洛陽時衛公李徳裕孫道古在平泉舊墅愚往依焉子弟親採梠負薪以給朝夕未嘗干人故少師薛廷珪掌貢籍之嵗登進士第又登宏訶科授河南府參軍遂卜居洛表白沙之别墅梁有禪代之謀栁璨希旨敎害朝士愚以衣冠自相殘害乃避地河朔與宗人李延光客于山東梁末帝嗣位雅好儒士延光素相欵奉得侍講禁中屢言愚之行髙學膽有史魚蘧瑗之風召見嗟賞久之擢為左拾遺俄充崇政院直學士或預咨謀而儼然正色}
  - {type: page-break, offset: 21, content: '', id: KR2a0029_WYG_135-11b, image: WYG0277/WYG0277-0554b.png}
