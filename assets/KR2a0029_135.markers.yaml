  - {type: substitution, offset: 4, original: 刦, replacement: 劫, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-16477}}
  - {type: variant, offset: 8, length: 0, content: '', WYG: 及閔帝䝉塵于衛州鳳集賓佐軍校垂涕曰主上播遷渡河而北吾輩安坐不赴奔問于禮可乎軍校曰唯公所使將行聞閔帝遇弑而止清秦初召還授太保既而病足不能朝謁疾篤自}
  - {type: variant, offset: 8, length: 0, content: '', krp: 及閔帝䝉塵于衛州鳳集賓佐軍校垂涕曰主上播遷渡河而北吾輩安坐不赴奔問于禮可乎軍校曰唯公所使將行聞閔帝遇弑而止清秦初召還授太保既而病足不能朝謁疾篤自}
  - {type: variant, offset: 9, length: 1, content: 鄉, WYG: 蓍筮卦成投蓍而嘆曰吾家世無五十者而復窮賤吾年巳五十又為將相豈有遐夀哉清泰二年三月卒鳳性豁達輕財重義凡士友以窮厄告者必傾其資而餉之人士以此多之也李愚字子晦自稱趙郡平棘西祖之後家世為儒父瞻業應進士}
  - {type: page-break, offset: 9, content: '', id: KR2a0029_WYG_135-10a, image: WYG0277/WYG0277-0553c.png}
  - {type: variant, offset: 9, length: 1, content: 鄉, krp: 蓍筮卦成投蓍而嘆曰吾家世無五十者而復窮賤吾年巳五十又為將相豈有遐夀哉清泰二年三月卒鳳性豁達輕財重義凡士友以窮厄告者必傾其資而餉之人士以此多之也李愚字子晦自稱趙郡平棘西祖之後家世為儒父瞻業應進士}
  - {type: 'tls:seg', offset: 10, content: '', id: KR2a0029_ZHSJ_135-d135p24s7}
  - {type: variant, offset: 11, length: 1, content: 知, WYG: 第遇亂徙家渤海之無棣以詩書訓子孫愚童齔時謹重有異常兒年長方志學徧閲經史慕晏嬰之為人初若晏平為文尚氣格有韓栁體勵志端莊風神峻整非禮不言行不茍且愚初以艱貧求為假官滄州盧彦威署安陵簿丁憂服闋隨計之長安屬闗輔亂離頻年罷舉客于蒲華之間光化中軍容劉季述王奉先廢昭宗立裕王五月餘諸侯無奔問者愚時在華隂致書于華帥韓建其略曰僕闗東一布衣耳幸讀書為文每見君臣父子之際有傷敎害義之事常痛心切齒恨不得抽腸蹀血肆之市朝明公居近闗重鎮君父幽辱月餘坐視凶逆而㤀勤王之舉僕}
  - {type: page-break, offset: 11, content: '', id: KR2a0029_WYG_135-10b, image: WYG0277/WYG0277-0553d.png}
