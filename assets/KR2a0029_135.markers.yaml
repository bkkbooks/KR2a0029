  - {type: variant, offset: 76, length: 1, content: 路, WYG: 節度使華温琪在任違法籍民家財其家訟于朝制使劾之伏罪梁末帝以先朝草昧之臣不忍加法愚堅按其罪梁末帝詔曰朕若不與鞫窮謂予不念赤子若或遂}
  - {type: variant, offset: 76, length: 1, content: 路, krp: 節度使華温琪在任違法籍民家財其家訟于朝制使劾之伏罪梁末帝以先朝草昧之臣不忍加法愚堅按其罪梁末帝詔曰朕若不與鞫窮謂予不念赤子若或遂}
