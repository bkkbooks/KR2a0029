  - {type: variant, offset: 130, length: 0, content: '', WYG: 嗣昭典兵于晉陽與圜遊處甚洽及鎮澤潞請為觀察支使解褐賜朱紱圜美姿容有口辯嗣昭為人間諜于莊宗方有微隙圜奉使往來常申理之克成友于之道圜之力也及丁母憂莊宗承制起復潞州觀察判官賜紫常山之役嗣昭為帥于軍圜代總其事號令如一敵人不知莊宗聞之倍加奬賞是秋復以上黨之師攻常山城中萬人突出大將孫文進死之賊逼我軍圜麾騎士擊之頗有殺獲嘗以禍福諭其城中鎮人信之使乞降及城潰誅元惡之外官吏咸保其家屬亦以圜所庇䕶焉莊宗改鎮州為北京以圜為工部尚書兼真定尹北京副留守知留守事明年郭崇韜兼鎮改行軍司馬充北面水陸轉運使仍知府事同光三年歸朝守工部尚書崇韜伐蜀奏令從征西蜀平署圜黔南節度使懇辭遂止魏王班師行及利州康延孝叛以勁兵八千迴刧西川繼岌聞之夜半命中使李延安召圜圜方寢延安登其牀以告之圜衣不及帶遽見繼岌繼岌泣而言曰紹琛負恩非尚書不能制即署圜為招討副使與都指揮使梁漢顒等率兵攻延孝于漢州擒之旋至渭南繼岌遇害圜代總全師朝于洛陽明宗嘉其功拜平章事判三司圜揀拔賢俊杜絶倖門百官俸入為孔謙減折圜以}
