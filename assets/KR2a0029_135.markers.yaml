  - {type: 'tls:seg', offset: 77, content: '', id: KR2a0029_ZHSJ_135-d135p24s10}
  - {type: variant, offset: 78, length: 0, content: '', WYG: 典憲謂予不念功臣為爾君者不亦難乎其華温琪所受贓宜官給代還所訟之家貞明中通事舍人李霄傭夫毆僦舍人致死法司按律罪在李霄愚白李霄手不鬬毆傭夫致死安得坐其主耶以是忤旨愚自拾遺再遷膳部員外郎賜緋改司勲員外郎賜紫至是罷職厯許鄧觀察判官初在内職慈州舉子張礪依焉貞明中礪自河陽北歸莊宗補授太原府掾出入崇闥之間揄揚愚之節槩及言愚之所為文仲尼遇顔回夀夷齊非餓人等篇北人望風稱之洎莊宗都洛陽鄧帥俾奏章入朝諸貴見之禮接如舊尋為主客郎中數月召為翰林學士三年魏王繼岌征蜀請為都統判官仍帶本職從軍時物議以蜀險阻未可長驅郭崇韜問計于愚愚曰如聞蜀人厭其主荒恣倉卒必不為用宜乘其人二三風馳電擊彼必破膽安能守險及前軍至固鎮收軍食十五萬斛崇韜喜謂愚曰公能料事吾軍濟矣招討判官陳乂至寶雞稱疾乞留在後愚厲聲曰陳乂見利則進懼難則止今大軍涉險人心易惑正可斬之以徇繇是軍人無遲留者是時軍書羽檄皆出其手蜀平就拜中書舍人師還明宗即位時西征副招討使任圜為宰相雅相欽重屢言于安重誨請引為同列屬孔循用事援引崔協以塞其請俄以本職權知貢舉改兵部侍郎充翰林承旨長興初除太常卿屬趙鳳出鎮邢臺乃拜中書侍郎平章事轉集賢殿大學士長興季年秦王恣横權要之臣避禍不暇邦之存亡無敢言者愚性剛介往往形言然人無唱和者後轉門下侍郎監修國史兼吏部尚書與諸儒修成創業功臣𫝊三十巻愚初不治第既命為相官借延賓館居之嘗有疾詔近臣宣諭延之中堂設席惟筦秸使人言之明宗時賜帷帳茵褥職官分紀云長興四年愚病明宗遣中使宣問愚所居寢室蕭然四壁病榻敝氊而已中使具言其事帝曰宰相俸錢幾何而委頓如此詔賜絹}
