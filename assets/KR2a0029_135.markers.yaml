  - {type: variant, offset: 13, length: 3, content: 適刦村, WYG: 未諭也僕竊計中朝輔弼雖有志而無權外鎮諸侯雖有權而無志惟公明忠義社稷是依往年車輅播遷號泣奉迎累嵗供饋再復朝廟義感人心至今歌詠此時事勢尤異于前明公地處要衝位兼將相自宫闈變故已涉旬時若}
