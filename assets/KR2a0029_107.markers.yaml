  - {type: variant, offset: 2280, length: 3, content: 弘肇素, krp: 揆牙兵三千為紀綱時揆為張濬副招討所部萬人八月自晉綘踰刀黄嶺趨上黨存孝引三百騎伏于長子西崖間揆襃衣大葢擁衆而行俟其軍前後不屬存孝出騎横擊之擒揆與歸範及俘囚五百獻于太原存孝乃急攻潞州九月葛從周棄城夜遁存孝収城武皇乃表康君立為潞帥存孝怒不食者累日十月存孝引收潞州之師圍張濬于平陽營于趙城華州韓建遣壮士三百夜犯其營存孝諜知設伏以擊之盡殪進壓晉州西門獲賊三千自是閉壁不出存孝引軍攻絳州十一月刺史張行恭棄城而去張濬韓建亦由含口而遁存孝收晉絳以功授汾州刺史大順二年三月邢州節度使安知建叛入汴軍武皇令存孝定邢洺因授之節鉞時幽州李匡威與鎮州王鎔屢弱中山将中分其疆土定州王處存求援于武王武皇令存孝侵鎮趙之南鄙又令李存信李存審率師出井陘以㑹之併軍攻臨城柏鄉李匡威救至且議旋師李存信與存孝不恊因搆于武皇言存孝望風退衂無心擊賊恐有私盟也存孝知之自恃戰功鬱鬱不平因致書通王鎔又歸欵于汴明年武皇自出井陘将逼真定存孝面見王鎔陳軍機武皇暴怒誅先獲汴将安康乂方旋師七月復出師討存孝自縳馬闗東下攻平山渡滹水擊鎮州四闗城王鎔懼遣使乞平請以兵三萬助擊存孝許之新唐書王鎔失幽州助因乞盟進幣五十萬歸糧二十萬請出兵助討存孝武皇蒐于欒城李存信屯琉璃陂九月存孝夜犯存信營奉誠軍使孫考老被獲存信軍亂武皇進攻邢州深溝高壘以環之旋為存孝衝突溝塹不成有軍校袁奉韜者宻令人謂存孝曰大王俟塹成即歸太原如塹壘未成恐無歸志尚書所畏惟大王耳料諸将孰出尚書右王若西歸雖限以黄河亦可浮渡況咫尺之洫安能阻尚書鋒鋭哉存孝然之縱兵成塹居旬日深溝高壘飛走不能及由是存孝至敗城中食盡乾寧元年三月存孝登城首罪泣訴于武皇曰兒䝉王深恩位至将帥茍非讒慝離間曷欲捨父子之深恩附仇讎之黨兒雖褊狹設計實存信搆䧟至此若得生見王面一言而死誠所甘心武皇愍之遣劉太妃入城慰勞太妃引來謁見存孝泥首請罪曰兒立微勞本無顯過但被人中傷申明無路迷昩至此武皇叱之曰爾與王鎔書状罪我萬端亦存信教耶縶歸太原車裂于市然武皇深惜其才存孝每臨大敵被重鎧槖弓坐矟僕人以二騎從陣中易騎輕捷如飛獨舞鐵撾挺身䧟陣萬人辟易葢古張遼甘寧之比也存孝死武皇不視事旬日私憾諸将乆之李存進振武人本姓孫名重進歐陽史太祖破朔州得之賜以姓名養為子父佺世吏單于府重進初仕嵐州刺史湯羣為步校獻祖誅羣乃事武皇從入闗還鎮太原署牙職景福中為義兒軍使賜姓名從討王行瑜以功授檢校常侍與李嗣昭同破王珙于河中光化三年契丹犯塞冦雲中改永州軍使鴈門以北都知兵馬使天復初破氏叔琮前軍于洞渦三年授石州刺史荘宗初嗣位入為步軍右都檢校司空師出井陘授行營馬軍都虞侯破汴軍于柏鄉論功授邠州刺史轉檢校司徒俄兼西南面行營招討使出師救慈州授慈沁二州刺史十二年定魏博授天雄軍都巡按使時魏人初附有銀槍効節都強傑難制專謀騷動存進沈}
  - {type: variant, offset: 2284, length: 1, content: 善, WYG: 果斷犯令者梟首屍于市諸軍無不惕息靡然向風十四年擢蕃漢馬步副總管從攻楊劉戰胡桞十六年以本職兼領振武節度使時王師據徳勝渡汴軍據楊村渡在上流汴人運洛陽竹木造浮橋以濟軍王師以船渡緩急難濟存進率意欲造浮橋軍吏曰河橋須竹笮大艑兩岸石倉鐡牛以為固今無竹石竊慮難成存進曰吾成算在心必有所立乃課軍造葦笮維大艦數十艘作土山植巨木于岸以纜之初軍中以為戲月餘橋成制度條直人皆服其勤智荘宗舉酒曰存進吾之杜預也賜寶馬御衣進檢校太保兼魏博馬步都将與李存審圍徳勝十九年汴将王瓚率衆逼北城為地穴火車百道進攻存進隨機拒應或經日不得食汴軍退加檢校太傅王師討張文禮于鎮州閻寳李嗣昭相次不利而殁七月存進代嗣昭為招討進營東垣渡夾滹沲為壘沙土散惡垣壁難成存進斬伐林樹版築旬日而就賊不能寇九月王處球盡率其衆乗其無備奄至壘門存進聞之得部下數人出鬭驅賊於橋下俄而賊大至後軍不繼血戰而殁時年六十六同光時贈太尉存進行軍出師雖無竒迹然能以法繩其驕放營壘守戰之備特推精力議者稱之有子四人長曰漢韶漢韶字享天幼有器局風儀峻整初事莊宗為定安軍使遷河東牢城指揮使時孟知祥權知太原軍府事㑹契丹侵北鄙表令漢韶率師進討既而大破契丹以功加檢校右僕射同光中為蔡州刺史天成初復姓孫氏尋授彰國軍留後累加檢校太保長興中為洋州節度使九國志閔帝嗣位加特進漢韶以其父名上表讓之改檢校左僕射制曰改會稽之字抑有前聞換􅅛寳之文非無故事末帝之起于鳯翔也漢韶與興元張䖍釗各帥部兵㑹王師于岐山下及西師俱叛漢韶逃歸本鎮聞末帝}
