  - {type: variant, offset: 326, length: 844, content: 定兩京無敢干忤從駕征鄴迴加同平章事充侍衞親軍都指揮使兼鎮宋州高祖大漸與樞密使楊邠周太祖蘇逢吉等同受顧命隱帝嗣位加檢校太師兼侍中居無何河中永興永興原本作求與今據通鑑改正影庫本粘籤鳳翔連橫謀叛關輔大擾朝廷日有徵發羣情憂惴亦有不逞之徒妄搆虛語流布京師弘肇都轄禁軍警衞都邑專行刑殺略無顧避無賴之輩望風匿迹路有遺棄人不敢取然而不問罪之輕重理之所在但云有犯便處極刑枉濫之家莫敢上訴巡司軍吏因緣為姦嫁禍脅人不可勝紀案宋史邊歸讜傳史弘肇怙權專殺閭里告訐成風歸讜言曰邇來有匿名書及言風聞事搆害良善有傷風化遂使貪吏得以報復私怨讒夫得以肆其虛誕請明行條制禁遏誣妄凡顯有披論具陳姓名其匿名書及風聞事者並見止絕論者韙之舊五代史考異時太白晝見民有仰觀者為坊正所拘立斷其腰領又有醉民抵忤一軍士則誣以訛言棄市其他斷舌決口斮筋折足者僅無虛日故相李崧為部曲誣告族戮於市取其幼女為婢自是仕宦之家畜僕隸者皆以姑息為意而舊勳故將失勢之後為廝養輩之所脅制者往往有之軍司孔目吏解暉性狡而酷凡有推劾隨意鍛鍊人有抵軍禁者被其苦楚無不自誣以求死所都人遇之莫敢仰視有燕人何福殷者福殷原本作福因今據通鑑改正影庫本粘籤案歐陽史作何福進疑訛舊五代史考異以商販為業嘗以十四萬市得玉枕遣家僮及商人李進賣於淮南易茗而迴家僮無行隱福殷貨財數十萬福殷責其償不伏遂杖之未幾家僮詣弘肇上變言契丹主之入汴也趙延壽遣福殷齎玉枕陰遺淮南以致誠意弘肇即日遣捕福殷等繫之解暉希旨榜掠備至福殷自誣連罪者數輩並棄市妻女為弘肇帳下分取之其家財籍沒弘肇不喜賓客嘗言文人難耐輕我輩謂我輩為卒可恨可恨弘肇所領睢陽其屬府公利委親吏楊乙就府檢校貪戾兇橫負勢生事吏民畏之副戎已下望風展敬聚斂刻剝無所不至月率萬緡以輸弘肇一境之內嫉之如讎案東都事略薛居正傳史弘肇領侍衞親軍威震人主殘忍自恣人莫敢忤其意其部下吏告民犯鹽禁法當死居正疑其不實召詰之乃其吏以私憾而誣之也逮捕吏鞫之具伏以吏抵法宏肇雖怒甚竟亦無以屈也舊五代史考異周太祖平河中班師推功於衆以弘肇有翊衞鎮重之功言之於隱帝即授兼中書令隱帝自關西, WYG: ''}
