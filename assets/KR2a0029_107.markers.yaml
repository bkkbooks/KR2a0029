  - {type: variant, offset: 3105, length: 3144, content: 司使檢校太傅從征杜重威於鄴下明年高祖崩隱帝即位加檢校太尉同平章事居無何蒲雍岐三鎮叛是時契丹犯闕之後國家新造物力未充章與周太祖史弘肇楊邠等盡心王室知無不為罷不急之務惜無用之費收聚財賦專事西征軍旅所資供饋無乏及三叛平賜與之外國有餘積然以專於權利剝下過當斂怨歸上物論非之舊制秋夏苗租民稅一斛別輸二升謂之雀鼠耗乾祐中輸一斛者別令輸二斗目之為省耗謂之省耗原本作雀耗今從通鑑改正胡三省通鑑注云唐明宗天成元年四月赦文應納夏秋稅子先有省耗每斗一升今後祇納正數不量省耗如此則天成以前已有省耗每斛更輸一斗天成罷輸之後至漢興王章復令輸省耗而又倍舊數取之也謹附識于此影庫本粘籤百姓苦之又官庫出納緡錢皆以八十為陌至是民輸者如舊官給者以七十七為陌遂為常式案歸田錄用錢之法自五代以來以七十七為百謂之省陌今市井交易又克寸其五謂之依除舊五代史考異民有訴田者雖無十數戶章必命全州覆視幸其廣有苗額以增邦賦曾未數年民力大困章與楊邠不喜儒士郡官所請月俸皆取不堪資軍者給之謂之閑雜物命所司高估其價估定更添謂之撎估章亦不滿其意隨事更令更添估章急於財賦峻於刑法民有犯鹽礬酒麴之令雖絲毫滴瀝盡處極刑吏緣為姦民不堪命章與楊邠同郡尤相親愛其奬用進拔者莫非鄉舊常輕視文臣曰此等若與一把算子未知顛倒何益於事後因私第開宴席召賓客史弘肇蘇逢吉乘醉諠詬而罷章自是忽忽不樂潛求外任邠與弘肇深阻其意而私第數有怪異章愈懷憂恐乾祐三年冬與史弘肇楊邠等遇害夷其族妻白氏禍前數月而卒無子惟一女適戶部員外郎張貽肅羸疾踰年扶病就戮永樂大典卷六千八百五十李洪建太后母弟也事高祖為牙將高祖即位累歷軍校遙領防禦使史弘肇等被誅以洪建為權侍衞馬步軍都虞候及鄴兵南渡命洪建誅王殷之族洪建不即行之但遣人監守其家仍令給饌竟免屠戮周太祖入京城洪建被執王殷感洪建之恩累祈周太祖乞免其死不從遂殺之洪建弟業永樂大典卷一萬三百九十業昆仲凡六人案昭聖弟六人洪信洪義宋史有傳歐陽史作昆弟七人舊五代史考異業處其季故太后尤憐之高祖置之麾下及即位累遷武德使出入禁中業恃太后之親稍至驕縱隱帝嗣位尤深倚愛兼掌內帑四方進貢二宮費委之出納業喜趨權利無所顧避執政大臣不敢禁詰會宣徽使闕宣徽使原本作宜徵今從通鑑改正影庫本粘籤業意欲之太后亦令人微露風旨於執政時楊邠史弘肇等難之業由是積怨蕭牆之變自此而作楊史既誅業權領侍衞步軍都指揮使北郊兵敗業自取金寶懷之策馬西奔行至陝郊其節度使洪信即其長兄也不敢匿於家業將奔太原至絳州境為盜所殺盡奪而去永樂大典卷一萬三百九十閻晉卿者忻州人也家世富豪少仕幷門歷職至客將高祖在鎮頗見信用乾祐中歷閤門使判四方館未幾關西亂郭從義討趙思綰於京兆晉卿偏師以攻賊壘案宋史李韜傳周祖征三叛韜從白文珂攻河中兵傅其城文珂夜詣周祖議犒軍留韜城下時營柵未備李守貞乘虛來襲營中忽見火發知賊驟至惶怖失據客省使閻晉卿率左右數十人遇韜于月城側謂韜曰事急矣城中人悉被黃紙甲為火光所照色俱白此殊易辨奈軍士無鬬志何韜憤怒曰豈有食君祿而不為國致死耶即援矟而進軍中死士十餘輩隨韜犯賊鋒蒲有猛將躍馬持戈擬韜韜刺之洞胸而墜又連殺數十人蒲軍遂潰因擊大破之舊五代史考異賊平為內客省使案宋史李韜傳載晉卿討賊時已為客省使薛史作賊平之後始授此職與宋史異舊五代史考異丁父憂起復前職時宣徽使闕晉卿以職次事望合當其任既而久稽拜命晉卿頗怨執政會李業等謀殺楊史詔晉卿謀之晉卿退詣弘肇將告其事弘肇不見晉卿憂事不果夜懸高祖御容於中堂泣禱於前遲明戎服入朝內難既作以晉卿權侍衞馬軍都指揮使北郊兵敗晉卿乃自殺於家永樂大典卷一萬八千一百三十二聶文進聶文進傳永樂大典已佚今采冊府元龜以補其闕影庫本粘籤幷州人少給事於高祖帳下高祖鎮太原甚見委用職至兵馬押司官高祖入汴授樞密院承旨歷領軍屯衞大將軍遷領衞大將軍仍領舊職冊府元龜卷七百六十六遇周太祖出征稍至驕橫久未遷改深所怨望與李業輩搆成變亂史弘肇等遇害之前夕文進與同黨預作宣詔制置朝廷之事凡關文字並出文進之手明日難作文進點閱兵籍徵發軍衆指揮取舍以為己任內外咨稟前後填咽太祖在鄴被搆初謂文進不預其事驗其事迹方知文進亂階之首也大詬詈之太祖過封丘帝次於北郊文進告太后曰臣在此請宮中勿憂兵散之後文進召同黨痛飲歌笑自若遲明帝遇禍文進奔竄為軍士所追梟其首冊府元龜卷九百三十五後贊案通鑑作後匡贊薛史避宋諱去匡字舊五代史考異後贊傳永樂大典僅存一條今引冊府元龜以補其闕影庫本粘籤為飛龍使贊母本倡家也與父同郡往來其家生贊從職四方父未嘗離郡贊既長疑其所生及為內職不欲父之來寓書以致其意父自郡至京師直抵其第贊不得已而奉之永樂大典卷一萬七千一百九十五乾祐末宰相楊邠侍衞親軍使史弘肇執權贊以久次未遷頗懷怨望乃與樞密承旨聶文進等搆變及難作贊與同黨更侍帝側剖判戎事且防間言北郊兵敗贊竄歸兗州慕容彥超執之以獻有司鞫贊伏罪周太祖命誅之冊府元龜卷九百五十二郭允明者小名竇十河東人也幼隸河東制置使范徽柔被誅允明遂為高祖廝養服勤既久頗得高祖之歡心高祖鎮太原稍歷牙職及即位累遷至翰林茶酒使兼鞍轡庫使隱帝嗣位尤見親狎每恃寵驕縱略無禮敬與相州節度使郭謹以同宗之故頗交結謹在鎮允明常齎御酒以遺之不以僭上犯禁為意其他輕率悉皆類此執政大臣頗姑息之嘗奉使荊南車服導從有同節度使將州縣郵驛奔馳畏懾節度使高保融承迎不暇高保融原本作深融今從通鑑改正影庫本粘籤允明潛使人步度越壁之高庳池隍之廣隘以動荊人冀得重賄乾祐末兼飛龍使未幾與李業輩搆變楊邠等諸子允明親刃之於朝堂西廡下王章女壻戶部員外郎張貽肅血流逆注聞者哀之及北郊之敗允明迫帝就民舍手行弒逆尋亦自殺永樂大典卷二萬二千一百六十一劉銖陝州人也少事梁邵王朱友誨為牙將晉天福中高祖為侍衞親軍都指揮使與銖有舊乃表為內職高祖出鎮幷門用為左都押牙銖性慘毒好殺高祖以為勇斷類己深委遇之國初授永興軍節度使從定汴洛移鎮青州加同平章事隱帝即位加檢校太師兼侍中銖立法深峻令行禁止吏民有過不問輕重未嘗貸免每親事小有忤旨即令倒曳而出至數百步外方止膚體無完者每杖人遣雙杖對下謂之合歡杖或杖人如其歲數謂之隨年杖在任擅行賦斂每秋苗一畝率錢三千夏苗一畝錢二千以備公用部內畏之脅肩重迹乾祐中淄青大蝗銖下令捕蝗略無遺漏田苗無害先是濱海郡邑皆有兩浙迴易務厚取民利自置刑禁追攝王民前後長吏利其厚賂不能禁止銖即告所部不得與吳越徵負擅行追攝浙人惕息莫敢干命朝廷懼銖之剛戾難制因前沂州刺史郭瓊自海州用兵還過青州遂留之即以符彥卿代銖符彥卿原本作言卿今據通鑑改正影庫本粘籤銖即時受代案隆平集郭瓊傳云劉銖守平盧稱疾不朝隱帝疑其叛詔瓊領兵屯青州銖將害之張宴伏兵幕下瓊無懼色銖亦不敢發瓊為言去就禍福銖趨召舊五代史考異離鎮之日有私鹽數屋雜以糞穢填塞諸井以土平之彥卿發其事以聞銖奉朝請久之每潛戟手於史弘肇楊邠第會李業輩同誅弘肇等銖喜謂業輩曰君等可謂僂儸兒矣尋以銖權知開封府事周太祖親族及王峻家並為銖所害周太祖入京城執之下獄銖謂妻曰我則死矣君應與人為婢耳妻曰明公所為如是雅合為之周太祖遣人讓銖曰昔日與公常同事漢室寧無故人之情家屬屠滅公雖奉君命加之酷毒一何忍哉公家亦有妻子還顧念否銖但稱死罪遂啟太后幷一子誅之而釋其妻案歐陽史作赦其妻子舊五代史考異周太祖踐阼詔賜銖妻陝州莊宅各一區永樂大典卷六千三百五十五代史闕文漢隱帝朝銖為開封尹周祖自鄴起兵銖盡誅周祖之家子孫婦女十數人極其慘毒及隱帝遇害周祖以漢太后令收銖下獄使人責之銖對曰某為漢家戮叛族耳不知其他周祖怒遂殺之臣謹按周世宗朝史官修漢隱帝實錄銖之忠言諱而不載史臣曰臣觀漢之亡也豈繫於天命哉蓋委用不得其人聽斷不符於理故也且如弘肇之淫刑楊邠之粃政李業晉卿之設計文進允明之狂且雖使成王為君周公作相亦不能保宗社之安延歲月之命況隱帝逢吉之徒其能免乎易曰大君有命開國承家小人勿用必亂邦也當乾祐之末也何斯言之驗歟惟劉銖之忍酷又安能逭於一死乎永樂大典卷二萬二千一百六十一, WYG: ''}
  - {type: variant, offset: 3105, length: 3144, content: 司使檢校太傅從征杜重威於鄴下明年高祖崩隱帝即位加檢校太尉同平章事居無何蒲雍岐三鎮叛是時契丹犯闕之後國家新造物力未充章與周太祖史弘肇楊邠等盡心王室知無不為罷不急之務惜無用之費收聚財賦專事西征軍旅所資供饋無乏及三叛平賜與之外國有餘積然以專於權利剝下過當斂怨歸上物論非之舊制秋夏苗租民稅一斛別輸二升謂之雀鼠耗乾祐中輸一斛者別令輸二斗目之為省耗謂之省耗原本作雀耗今從通鑑改正胡三省通鑑注云唐明宗天成元年四月赦文應納夏秋稅子先有省耗每斗一升今後祇納正數不量省耗如此則天成以前已有省耗每斛更輸一斗天成罷輸之後至漢興王章復令輸省耗而又倍舊數取之也謹附識于此影庫本粘籤百姓苦之又官庫出納緡錢皆以八十為陌至是民輸者如舊官給者以七十七為陌遂為常式案歸田錄用錢之法自五代以來以七十七為百謂之省陌今市井交易又克寸其五謂之依除舊五代史考異民有訴田者雖無十數戶章必命全州覆視幸其廣有苗額以增邦賦曾未數年民力大困章與楊邠不喜儒士郡官所請月俸皆取不堪資軍者給之謂之閑雜物命所司高估其價估定更添謂之撎估章亦不滿其意隨事更令更添估章急於財賦峻於刑法民有犯鹽礬酒麴之令雖絲毫滴瀝盡處極刑吏緣為姦民不堪命章與楊邠同郡尤相親愛其奬用進拔者莫非鄉舊常輕視文臣曰此等若與一把算子未知顛倒何益於事後因私第開宴席召賓客史弘肇蘇逢吉乘醉諠詬而罷章自是忽忽不樂潛求外任邠與弘肇深阻其意而私第數有怪異章愈懷憂恐乾祐三年冬與史弘肇楊邠等遇害夷其族妻白氏禍前數月而卒無子惟一女適戶部員外郎張貽肅羸疾踰年扶病就戮永樂大典卷六千八百五十李洪建太后母弟也事高祖為牙將高祖即位累歷軍校遙領防禦使史弘肇等被誅以洪建為權侍衞馬步軍都虞候及鄴兵南渡命洪建誅王殷之族洪建不即行之但遣人監守其家仍令給饌竟免屠戮周太祖入京城洪建被執王殷感洪建之恩累祈周太祖乞免其死不從遂殺之洪建弟業永樂大典卷一萬三百九十業昆仲凡六人案昭聖弟六人洪信洪義宋史有傳歐陽史作昆弟七人舊五代史考異業處其季故太后尤憐之高祖置之麾下及即位累遷武德使出入禁中業恃太后之親稍至驕縱隱帝嗣位尤深倚愛兼掌內帑四方進貢二宮費委之出納業喜趨權利無所顧避執政大臣不敢禁詰會宣徽使闕宣徽使原本作宜徵今從通鑑改正影庫本粘籤業意欲之太后亦令人微露風旨於執政時楊邠史弘肇等難之業由是積怨蕭牆之變自此而作楊史既誅業權領侍衞步軍都指揮使北郊兵敗業自取金寶懷之策馬西奔行至陝郊其節度使洪信即其長兄也不敢匿於家業將奔太原至絳州境為盜所殺盡奪而去永樂大典卷一萬三百九十閻晉卿者忻州人也家世富豪少仕幷門歷職至客將高祖在鎮頗見信用乾祐中歷閤門使判四方館未幾關西亂郭從義討趙思綰於京兆晉卿偏師以攻賊壘案宋史李韜傳周祖征三叛韜從白文珂攻河中兵傅其城文珂夜詣周祖議犒軍留韜城下時營柵未備李守貞乘虛來襲營中忽見火發知賊驟至惶怖失據客省使閻晉卿率左右數十人遇韜于月城側謂韜曰事急矣城中人悉被黃紙甲為火光所照色俱白此殊易辨奈軍士無鬬志何韜憤怒曰豈有食君祿而不為國致死耶即援矟而進軍中死士十餘輩隨韜犯賊鋒蒲有猛將躍馬持戈擬韜韜刺之洞胸而墜又連殺數十人蒲軍遂潰因擊大破之舊五代史考異賊平為內客省使案宋史李韜傳載晉卿討賊時已為客省使薛史作賊平之後始授此職與宋史異舊五代史考異丁父憂起復前職時宣徽使闕晉卿以職次事望合當其任既而久稽拜命晉卿頗怨執政會李業等謀殺楊史詔晉卿謀之晉卿退詣弘肇將告其事弘肇不見晉卿憂事不果夜懸高祖御容於中堂泣禱於前遲明戎服入朝內難既作以晉卿權侍衞馬軍都指揮使北郊兵敗晉卿乃自殺於家永樂大典卷一萬八千一百三十二聶文進聶文進傳永樂大典已佚今采冊府元龜以補其闕影庫本粘籤幷州人少給事於高祖帳下高祖鎮太原甚見委用職至兵馬押司官高祖入汴授樞密院承旨歷領軍屯衞大將軍遷領衞大將軍仍領舊職冊府元龜卷七百六十六遇周太祖出征稍至驕橫久未遷改深所怨望與李業輩搆成變亂史弘肇等遇害之前夕文進與同黨預作宣詔制置朝廷之事凡關文字並出文進之手明日難作文進點閱兵籍徵發軍衆指揮取舍以為己任內外咨稟前後填咽太祖在鄴被搆初謂文進不預其事驗其事迹方知文進亂階之首也大詬詈之太祖過封丘帝次於北郊文進告太后曰臣在此請宮中勿憂兵散之後文進召同黨痛飲歌笑自若遲明帝遇禍文進奔竄為軍士所追梟其首冊府元龜卷九百三十五後贊案通鑑作後匡贊薛史避宋諱去匡字舊五代史考異後贊傳永樂大典僅存一條今引冊府元龜以補其闕影庫本粘籤為飛龍使贊母本倡家也與父同郡往來其家生贊從職四方父未嘗離郡贊既長疑其所生及為內職不欲父之來寓書以致其意父自郡至京師直抵其第贊不得已而奉之永樂大典卷一萬七千一百九十五乾祐末宰相楊邠侍衞親軍使史弘肇執權贊以久次未遷頗懷怨望乃與樞密承旨聶文進等搆變及難作贊與同黨更侍帝側剖判戎事且防間言北郊兵敗贊竄歸兗州慕容彥超執之以獻有司鞫贊伏罪周太祖命誅之冊府元龜卷九百五十二郭