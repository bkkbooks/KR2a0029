  - {type: variant, offset: 2287, length: 1, content: 訪, WYG: 心不自安乃與張䖍釗各舉其城送欵于蜀洎至成都孟知祥以漢韶故人尤善待之九國志漢韶與知祥叙汶上舊事及洛中更變相對感泣知祥曰豐沛故人相遇于此何樂如之于是賜第宅金帛供帳食物悉官給之偽命永平軍節度使孟昶嗣偽位歴興元遂州兩鎮連帥累偽官至中書令封安樂郡王年七十餘卒于蜀李存璋字徳璜雲中人武皇初起雲中存璋與康君立薛志勤等為奔走交從入闗以功授國子祭酒累管萬勝雄威等軍從討李匡儔改義兒軍使光化二年授澤州刺史入為牢城使從李嗣昭封雲州叛將王暉平之改教練師檢校司空五年武皇疾篤召張承業與存璋授遺顧存璋爰立莊宗夷内難頗有力焉改河東馬步都虞侯兼領鹽鐵初武皇稍寵軍士藩部人多干擾鄽市肆其豪奪法司不能禁莊宗初嗣位鋭于}
