  - {type: variant, offset: 2289, length: 3, content: 弘肇親, WYG: 理存璋得行其志抑强扶弱誅其豪首期月之間紀綱大振弭羣盜務耕稼去姦宄息倖門當時稱其材幹從破汴軍于夾城轉檢校司徒栢郷之役為三鎮排陣使十一年從盟朱友謙于猗氏授汾州刺史汴將尹皓攻慈州逆戰敗之十三年王檀逼太原存璋率汾州之軍入城固守授大同防禦使應蔚朔等州都知兵馬使秋契丹䧟蔚州按巴堅遣使馳木書求賂存璋斬其使契丹逼雲州存璋拒守城中有古鐵車乃鎔為兵仗以給軍士敵退以功加檢校太傅大同軍節度使應蔚等州觀察使十九年四月以疾卒于雲州府第同光初追贈太保平章事晉天福初追贈太師有子三人彦球為裨校戰殁于鎮州李存賢字子良本姓王名賢許州人祖啟忠父惲賢少遇亂入黄巢軍武皇破賊陳許存賢來歸景福中典義兒軍為副兵馬使因賜姓名天祐三年從周徳威赴援上黨營于交口五年權知蔚州刺史以禦吐渾六年權沁州刺史先是州當賊境不能保守乃于州南五十里據險立栅為治所已歴十餘年矣存賢至郡乃移復}
