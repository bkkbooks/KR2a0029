  - {type: variant, offset: 2293, length: 75, content: 得崇矩謂之曰我與史公受漢厚恩勠力同心共獎王室為奸邪所搆史公卒罹大禍我亦僅免汝史家故吏也為我求其近屬我將恤之崇矩上其母弟福崇矩素主其家盡籍財產以付福周祖, WYG: 郡剗闢荆棘特立廨舎州民完集莊宗}
