  - {type: variant, offset: 2069, length: 2, content: 粗讀, WYG: 乾寧三年兖鄆乞師于武皇武皇遣存信營于莘縣與朱瑄合勢以抗梁人梁祖患之遣使諜羅𢎞信曰河東志在吞食河朔迴軍之日貴道堪憂而存信戢兵無法稍侵魏之芻牧𢎞信怒翻然結于梁祖乃出兵三萬以攻存信存信斂衆而退為魏人所薄委棄輜重退保洺州軍士喪失者十二三武皇怒大出師攻魏博屠䧟諸邑五月存信軍于洹水汴将葛從周氏叔琮來援魏人存信與鐵林都将落落遇汴人于洹水南汴人為䧟馬坎以待之存信戰敗落落被擒九月存信敗葛從周于宗城乗勝至魏州之北門明年聞兖鄆皆䧟乃班師八月從討劉仁恭師次安塞為燕軍所敗武皇怒謂存信曰昨日吾醉不悟賊至公不辨耶古人三敗公姑二矣存信懼泥首謝罪幾至不測自光化以後存信多稱病武皇以兵柄授李嗣昭以存信為右校而己天復二年十月以病卒于晉陽時年四十一李存孝本姓安名敬思新唐}
