  - {type: variant, offset: 2370, length: 0, content: '', WYG: 轉檢校司空真拜刺史九年汴人乘其無備來攻其城存賢擊退之十一年授武州刺史山北團練使十二年移刺慈州七月汴將尹皓攻州城存賢督軍拒戰汴軍攻擊百端月餘遁去十八年河中朱友謙來求援命存賢師赴之十九年汴將段凝軍五萬營臨晉蒲人大恐咸欲歸汴或問于存賢曰河中將士欲拘公降于汴存賢曰吾奉命河中死王事固其所也汴軍退以功加檢校司徒同光初授右武衛上將軍十一月入覲洛陽二年三月幽州李存審疾篤求入覲議擇帥代之方内宴莊宗曰吾披榛故人零落殆盡所殘者存審耳今復衰疾北門之事知付何人因目存賢曰無易于卿即日授特進檢校太保充幽州盧龍節度使五月到鎮時契丹彊盛城門之外烽塵交警一日數戰存賢性忠謹周慎畫夜戒嚴不遑寢食以至憂勞成疾卒于幽州時年六十五詔贈太傅存賢少有材力善角觝初莊宗在藩邸每宴私與王郁角觝鬭勝郁頻不勝莊宗自矜其能謂存賢曰與爾一博如勝賞爾一郡即時角觝存賢勝得蔚州刺史史臣曰昔武皇之起於并汾也㑹鹿走于中原期龍戰于大澤蓄驍果之士以備鷹犬之用故自存信而下皆錫姓以結其心授任以責其效與夫董卓之畜吕布亦何殊哉惟存孝之勇足以冠三軍而長萬夫茍不為叛臣則可謂良將矣}
