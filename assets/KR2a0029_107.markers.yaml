  - {type: variant, offset: 2374, length: 502, content: 考異楊邠魏州冠氏人也少以吏給事使府後唐租庸使孔謙即其妻之世父也謙領度支補勾押官歷孟華鄆三州糧料使高祖為鄴都留守用為左都押衙案歐陽史作右都舊五代史考異高祖鎮太原益加親委漢國建遷檢校太保權樞密使汴洛平正拜樞密使檢校太傅及高祖大漸與蘇逢吉史弘肇等同受顧命輔立嗣君隱帝即位宰臣李濤上章請出邠與周太祖為藩鎮邠等泣訴於太后由是罷濤而相邠加中書侍郎兼吏部尚書同平章事仍兼樞密使時中書除吏太多訛謬者衆及邠居相位帝一以委之凡南衙奏事中書除命先委邠斟酌如不出邠意至於一簿一掾亦不聽從邠雖長於吏事不識大體常言為國家者但得帑藏豐盈甲兵強盛至於文章禮樂並是虛事何足介意也平河中並加右僕射邠既專國政觸事苛細條理煩碎前資官不得於外方居止自京師至諸州府行人往來並須給公憑所由司求請公憑者朝夕填咽旬日之間民情大擾行路擁塞邠乃止其事時史弘肇恣行慘酷殺戮日衆都人士庶相目於路邠但稱弘肇之善太后弟武德使李業求為宣徽使隱帝與太后重違之私訪於邠邠以朝廷內使遷拜有序不可超居遂止隱帝所愛耿夫人欲立為后邠亦以為太速夫人卒隱帝欲以后禮葬邠又止之隱帝意不悅左右有承間進甘言者隱帝益怒之案此下當有缺文殿本邠繕甲兵實帑廩俾國用不闕邊鄙粗寧亦其功也永樂大典卷六千, WYG: 巻}
