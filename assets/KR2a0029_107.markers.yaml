  - {type: variant, offset: 2878, length: 226, content: 二案宣和書譜云邠末年留意縉紳延客門下知經史有用乃課吏傳寫舊五代史考異王章大名南樂人也少為吏給事使府同光初隸樞密院後歸本郡累職至都孔目官後唐清泰末屯駐捧聖都虞候張令昭作亂張令昭原本作會昭今從歐陽史改正影庫本粘籤逐節度使劉延皓自稱留後章以本職為令昭役使末帝遣范延光討平之搜索叛黨甚急章之妻即白文珂之女也文珂與副招討李敬周善以章為托及攻下逆城敬周匿之載于橐褚中竄至洛下匿於敬周之私第及末帝敗章為省職歷河陽糧料使高祖典侍衞親軍詔為都孔目官從至河東專委錢穀國初授, WYG: ''}
