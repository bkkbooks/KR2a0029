  - {type: variant, offset: 74, length: 251, content: 禁軍嘗在晉祖麾下遂留為親從及踐阼用為控鶴小校高祖鎮太原奏請從行升為牙校後置武節左右指揮以弘肇為都將遙領雷州刺史雷州原本作累州今據歐陽史改正影庫本粘籤高祖建號之初代州王暉叛以城歸契丹弘肇征之一鼓而拔尋授許州節度使充侍衞步軍都指揮使會王守恩以上黨求附契丹主命大將耿崇美率衆登太行欲取上黨高祖命弘肇以軍應援軍至潞州契丹退去翟令奇以澤州迎降會河陽武行德遣人迎弘肇遂率衆南下與行德合故高祖由蒲陝赴洛如歸弘肇前鋒之功也弘肇嚴毅寡言部轄軍衆有過無舍兵士所至秋毫不犯部下有指揮使嘗因指使少不從命弘肇立撾殺之將吏股慄以至, WYG: 闗}
