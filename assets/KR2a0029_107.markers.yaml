  - {type: variant, offset: 2076, length: 150, content: 不悅父之所為貢院嘗錄一學科於省門叫譟申中書門下宰相蘇逢吉令送侍衞司請痛笞刺面德珫聞之白父曰書生無禮有府縣御史臺非軍務治也公卿如此蓋欲彰大人之過弘肇深以為然即破械放之後之識者尤嘉德珫之為人焉弘肇弟福比在滎陽別墅聞禍匿於民間周太祖即位累遷閑廄使仕皇朝歷諸衞將軍永樂大典卷一萬一百八十三案宋史李崇矩傳史弘肇, WYG: 将騎}
