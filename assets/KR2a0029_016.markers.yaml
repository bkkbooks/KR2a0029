  - {type: variant, offset: 136, length: 4887, content: 異太祖臨陣馬踣賊衆來追甚急從周扶太祖上馬與賊軍格鬬傷面矢中於肱身被數槍奮命以衞太祖賴張延壽迴馬轉鬬從周與太祖俱免退軍水諸將並削職唯擢從周延壽為大校其從入長葛靈井大敗蔡賊至斤溝淝河殺鐵林三千人獲九寨都虞候王涓太祖遣郭言募兵於陝州有黃花子賊據於溫谷從周擊破之又破秦賢之衆於滎陽尋佐朱珍收兵於淄青間時兗州齊克讓軍於任城從周敗之擒其將呂全真淄人不受制復與之戰獲其驍將鞏約會青州以步騎萬餘人列三寨于金嶺以阨要害從周與朱珍大殲其衆擄其將楊昭範五人而還至大梁不解甲徑至板橋擊蔡賊破盧瑭寨瑭自溺而死又於赤堈赤堈通鑑作赤岡考薛史前後皆堈今仍其舊影庫本粘籤殺蔡軍二萬餘人從討謝殷於亳州擒之迴襲曹州擄刺史丘弘禮以歸與兗鄆軍遇於臨濮之劉橋殺數萬人朱瑄朱瑾僅以身免擒都將鄒務卿已下五十人從太祖至范縣復與朱瑄戰擄尹萬榮等三人遂平濮州未幾與朱珍擊蔡賊於陳亳間獲都將石璠文德元年魏博軍亂樂從訓來告急從太祖渡河拔黎陽李固臨河等鎮至內黃破魏軍萬餘衆獲其將周儒等十人案梁祖本紀作帝遣朱珍領大軍渡河此傳作從周從太祖濟河與本紀異孔本李罕之引幷人圍張全義於河陽從周與丁會張存敬牛存節率兵赴援大破幷軍殺蕃漢二萬人解河陽之圍以功以功原本作以助今據文改正影庫本粘籤表授檢校工部尚書從朱珍討徐州拔豐縣敗時溥於吳康得其輜重加檢校刑部尚書佐龐師古討孫儒於淮南略地至廬壽滁等州下天長高郵破邵伯堰迴軍攻濠州殺刺史魏勳得餉船十艘大順元年八月幷帥圍潞州太祖遣從周率敢死之士夜銜枚犯圍而入會王師不利於馬牢川即棄上黨而歸其年十二月與丁會諸將討魏州連收十邑明年正月大破魏軍於永定橋魏軍五敗斬首萬餘級十月佐丁會攻宿州從周壅水灌其城刺史張筠以郡降從討兗州破朱瑾之軍於馬溝景福二年二月與諸將大破徐兗之兵於石佛山八月與龐師古同攻兗州乾寧元年三月軍至新太縣朱瑾令都將張約李胡椒率三千人來拒戰師古遣從周張存敬掩襲生擒張約李胡椒等都將數十人二年十月圍兗州兗人不出從周詐揚言并人鄆人來救案通鑑十二月朱瑄朱瑾告急於河東李克用遣大將史儼李承嗣將數千騎假道於魏以救之是河東實遣師來援非從周詐言也此蓋覘知兗人告急乘并師尚未至乃揚言已至多方以誤之耳又本紀作十二月此作十月辨正見本紀即引軍趨高吳夜半却潛歸寨朱瑾果出兵攻外壕我軍士突出掩殺千餘人生擒都將孫漢筠從周累立戰功自懷州刺史歷曹宿二州刺史累遷檢校左僕射三年五月并帥以大軍侵魏遣其子落落率二千騎屯洹水洹水原本作浢水今據歐陽史改正影庫本粘籤從周以馬步二千人擊之殺戮殆盡擒落落於陣并帥號泣而去遂自洹水與龐師古渡河擊鄆四年正月下之從周乘勝伐兗會朱瑾出師在徐境其將康懷英以城降以功授兗州留後檢校司空復領兵萬餘人渡淮討楊行密至濠州聞龐師古清口之敗遽班師案九國志侯瓚傳云破葛從周於壽陽沉其卒萬餘人於淠河與薛史異歐陽史兼采九國志光化元年四月率師經略山東時并帥以大軍屯邢洺從周至鉅鹿與并軍遇大破之并帥遁走我軍追襲至青山口數日之內邢洺磁三州連下斬首二萬級獲將吏一百五十人即以從周兼領邢州留後十月復破并軍五千騎於張公橋晉將李嗣昭急攻邢州陣於城門外從周大破之擒蕃將賁金鐵慕容騰百餘人二年春幽州劉仁恭率軍十萬寇魏州屠貝郡從周自邢臺馳入魏州燕軍突上水關攻館陶門館陶原本作館姚今據通鑑改正影庫本粘籤從周與賀德倫率五百騎出戰謂門者曰前有敵不可返顧命闔其門從周等極力死戰大敗燕人擒都將薛突厥王鄶郎等翊日破其八寨追擊至臨清劉仁恭走滄州從周授宣義軍行軍司馬五月幷人討李罕之於潞州太祖以丁會代罕之令從周馳入上黨七月幷人陷澤州太祖召從周令賀德倫守潞州德倫等尋棄城而歸三年四月領軍討滄州先攻德州下之及進攻浮陽幽州劉仁恭大舉來援時都監蔣玄暉謂諸將曰吾王命我護軍志在攻取今燕帥來赴不可外戰當縱其入壁聚食囷廩力屈糧盡必可取也從周對曰兵在機機在上將非督護所言也乃令張存敬氏叔琮守其寨從周逆戰於乾寧軍老餢堤大破燕軍斬首三萬獲將佐馬慎交已下百餘人奪馬三千匹八月幷人攻邢洺從太祖破之從周追襲至青山口斬首五千級案玉堂閒話云葛公威名著于敵中河北諺云山東一條葛無事莫撩撥云舊五代史考異獲其將王郃郎楊師悅等得馬千匹表授檢校太保兼徐州兩使留後尋為兗州節度使天復元年三月與氏叔琮討太原從周以兗鄆之衆自土門路入與諸軍會於晉陽城下以糧運不給班師頃之從周染疾會青州將劉鄩陷兗州太祖命討之遂力疾臨戎三年十一月鄩舉城降以功授檢校太傅太祖以從周抱疾既久命康懷英代之授左金吾上將軍以風恙不任朝謁改右衞上將軍致仕養疾偃師縣亳邑鄉之別墅案原本作別堃今改正舊五代史考異頃之授太子太師依前致仕末帝即位制授潞州節度使令坐食其俸加開府儀同三司檢校太師兼侍中封陳留郡王累食邑至七千戶命近臣齎旌節就別墅以賜之貞明初卒於家案偃師縣有葛從周神道碑云十月三日歸葬於偃師縣亳邑鄉碑以貞明二年十一月十二日建舊五代史考異冊贈太尉永樂大典卷二萬一千二百九謝彥章許州人幼事從周為養父從周憐其敏慧教以兵法常以千錢於大盤中布其行陣偏伍之狀示以出沒進退之節彥章盡得其訣及壯事太祖為騎將末帝嗣位用為兩京馬軍都軍使累與晉軍接戰有功尋領河陽節度使及從周卒臨喪行服躬預葬事時人義之彥章後為許州節度使檢校太傅貞明四年冬滑州節度使賀瓌賀瓌原本作賀懷今據歐陽史改正影庫本粘籤為北面招討使彥章為排陣使同領大軍駐於行臺寨與晉人對壘彥章時領騎軍與之挑戰晉人或望我軍行陣整肅則相謂曰必兩京太傅在此也案原本作西京今據通鑑改正舊五代史考異不敢以名呼其為敵人所憚如此是時咸謂賀瓌能將步軍彥章能領騎士既名聲相軋故瓌心忌之一日與瓌同設伏於郊外瓌指一方地謂彥章曰此地岡阜隆起中央坦夷好列柵之所尋而晉人舍之故瓌疑彥章與晉人通又瓌欲速戰彥章欲持重以老敵人瓌益疑之會為行營馬步都虞候朱珪所誣瓌遂與珪協謀因享士伏甲以殺彥章及濮州刺史孟審澄別將侯溫裕等於軍以謀叛聞晉王聞之喜曰彼將帥如是亡無日矣審澄溫裕亦善將騎軍然所領不過三千騎多而益辦唯彥章有焉將略之外好優禮儒士與晉人對壘於河上恆襃衣博帶動皆由禮或臨敵御衆則肅然有上將之威每敦陣整旅左旋右抽雖風馳雨驟亦無以喻其迅捷也故當時騎士咸樂為用及其遇害人皆惜之永樂大典卷一萬八千一百二十六胡真江陵人也體貌洪壯長七尺善騎射少為縣吏及在巢寇中寇推為名將隨巢涉淮浙陷許洛入長安及太祖以衆歸唐真時為元從都將案舊唐書中和二年朱溫與大將胡真謝瞳來降通鑑云溫見巢兵勢日蹙知其將亡親將胡真謝瞳勸溫歸國薛史謝瞳傳載瞳說溫之辭胡真傳不言其勸溫歸國與通鑑異從至梁苑表授檢校刑部尚書頻從破巢蔡於陳鄭間尋以奇兵襲取滑州乃署為滑州節度留後復表為鄭滑節度使檢校右僕射數年徵為右金吾衞大將軍俄拜寧遠軍節度使容州刺史檢校太保卒贈太傅永樂大典卷一萬八千一百二十六張歸霸字正臣清河人祖進言陽穀令父實亦有宦緒少倜儻好兵術唐乾符中寇盜蜂起歸霸率昆弟三人棄家投黃巢頗以勇略聞巢陷長安遂署為左番功臣中和中巢領徒走宛丘時太祖在汴奉詔南討巢黨日窘歸霸昆仲與葛從周李讜等相率來降尋補宣武軍劇職光啟二年與蔡將張存戰于盧氏三年夏又與蔡將盧瑭戰於雙丘復與秦宗賢戰于萬勝皆敗而殲之翌日宗權遣將張晊來寇列寨于赤堈一日出騎將較勝歸霸為飛戈所中案飛戈歐陽史作飛矢即拔馬却逸控弦一發賊洞頸而墜遂兼騎而還太祖時於高丘下瞰備見其狀面加賞激厚以金帛及所獲馬錫之又嘗被命以控弦之士五百人伏於壕內太祖統數百騎稍逼其寨蔡人果以銳士摩壘來追歸霸發伏兵掩殺千餘人奪馬數十匹尋奏授檢校左散騎常侍其後從太祖伐鄆副李唐賓渡淮咸著奇績文德初大軍臨蔡州賊將蕭顥來斫寨歸霸與徐懷玉各以所領兵自東南二扉分出合勢殺賊蔡人大敗及太祖整衆離營寇塵已息太祖召至賞之曰昔耿弇不俟光武擊張步言不以賊遺君父弇之功爾其二焉大順中郭紹賓拔曹州歸霸率兵數千守之俄而朱瑾統大軍自至歸霸與丁會逆擊之於金鄉瑾大敗擒賊將宗江等七十餘人曹州以寧明年破濮州生擒刺史邵儒又佐葛從周與晉軍戰於洹水生獲克用愛子落落復與燕人戰於內黃殺仁恭兵三萬餘衆戎績超特居諸將之右累官至檢校左僕射光化二年權知邢州事明年春李嗣昭以蕃漢五萬來寇歸霸堅壁設備晉軍不敢顧其城遂移軍攻洺州陷焉時太祖在滑頗慮邢之失守及葛從周復洺嗣昭北遁歸霸出兵襲之殺二萬餘衆捷至賞錫殊等旋以功奏加檢校司空天祐初遷萊州刺史秩滿授左衞上將軍又除曹州刺史其秋加檢校司徒副劉知俊禦邠鳳之寇邠鳳原本作汾鳳今據通鑑改正影庫本粘籤敗之太祖受禪拜右龍虎統軍改左驍衞上將軍充河陽諸軍都指揮使明年夏六月就除河陽節度使檢校太保尋加同平章事二年秋七月卒於位詔贈太傅梁末帝德妃張氏即歸霸女也末帝嗣位以歸霸子漢鼎漢傑並為近職漢鼎早亡漢傑貞明中為控鶴指揮使領兵討惠王於陳州擒之當貞明龍德之際漢傑昆仲分掌權要藩鎮除拜多出其門段凝因之遂竊兵柄及莊宗入汴漢傑與兄漢倫弟漢融同日族誅於汴橋下永樂大典卷六千三百五十張歸厚字德坤案通鑑考異引梁功臣列傳云歸厚祖興父處讓薛史歸厚傳不言其父祖名號當是歸霸從弟少驍勇有機略尤長於弓槊之用中和末與兄歸霸自巢軍相率來降太祖署為軍校時淮西兵力方壯太祖之師尚寡歸厚以少擊衆往無不捷光啟三年春與秦宗賢戰于萬勝大破之其夏蔡將張晊以數萬衆屯於赤堈歸厚嘗與晊單騎鬬於陣晊不能支而奔師徒乘此大捷太祖大悅立署為騎軍長仍以鞍馬器幣錫之及佐朱珍討時溥寨于豐蕭之間歸厚乘徐壘如行坦途甚為諸將歎伏龍紀初奏遷檢校工部尚書其年冬復伐徐歸厚以偏師徑進至九里山下與徐兵遇時我之叛將陳璠在賊陣中歸厚忽見之因瞋目大罵單馬直往期于必取會飛矢中左目而退徐戎甚衆莫敢追之大順元年奏加檢校兵部尚書又命統親軍是歲郴王遷寨未知所往忽逢兗鄆賊寇甚衆太祖亟登道左高阜以觀之命歸厚領所部廳子馬案原本作厲子馬考通鑑注廳子都係當時軍旅之名今改正舊五代史考異直突之出沒二十餘合賊大敗將北而救軍雲至歸厚即綴賊苦戰請太祖以數十騎先還時歸厚所乘馬中流矢而踣乃持槊步鬬漸退賊不敢逼太祖至寨亟命張筠劉儒飛騎來迎