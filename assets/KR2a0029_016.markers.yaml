千二百九謝彥章許州人幼事從周為養父從周憐其敏慧教以兵法常以千錢於大盤中布其行陣偏伍之狀示以出沒進退之節彥章盡得其訣及壯事太祖為騎將末帝嗣位用為兩京馬軍都軍使累與晉軍接戰有功尋領河陽節度使及從周卒臨喪行服躬預葬事時人義之彥章後為許州節度使檢校太傅貞明四年冬滑州節度使賀瓌賀瓌原本作賀懷今據歐陽史改正影庫本粘籤為北面招討使彥章為排陣使同領大軍駐於行臺寨與晉人對壘彥章時領騎軍與之挑戰晉人或望我軍行陣整肅則相謂曰必兩京太傅在此也案原本作西京今據通鑑改正舊五代史考異不敢以名呼其為敵人所憚如此是時咸謂賀瓌能將步軍彥章能領騎士既名聲相軋故瓌心忌之一日與瓌同設伏於郊外瓌指一方地謂彥章曰此地岡阜隆起中央坦夷好列柵之所尋而晉人舍之故瓌疑彥章與晉人通又瓌欲速戰彥章欲持重以老敵人瓌益疑之會為行營馬步都虞候朱珪所誣瓌遂與珪協謀因享士伏甲以殺彥章及濮州刺史孟審澄別將侯溫裕等於軍以謀叛聞晉王聞之喜曰彼將帥如是亡無日矣審澄溫裕亦善將騎軍然所領不過三千騎多而益辦唯彥章有焉將略之外好優禮儒士與晉人對壘於河上恆襃衣博帶動皆由禮或臨敵御衆則肅然有上將之威每敦陣整旅左旋右抽雖風馳雨驟亦無以喻其迅捷也故當時騎士咸樂為用及其遇害人皆惜之永樂大典卷一萬八千一百二十六胡真江陵人也體貌洪壯長七尺善騎射少為縣吏及在巢寇中寇推為名將隨巢涉淮浙陷許洛入長安及太祖以衆歸唐真時為元從都將案舊唐書中和二年朱溫與大將胡真謝瞳來降通鑑云溫見巢兵勢日蹙知其將亡親將胡真謝瞳勸溫歸國薛史謝瞳傳載瞳說溫之辭胡真傳不言其勸溫歸國與通鑑異從至梁苑表授檢校刑部尚書頻從破巢蔡於陳鄭間尋以奇兵襲取滑州乃署為滑州節度留後復表為鄭滑節度使檢校右僕射數年徵為右金吾衞大將軍俄拜寧遠軍節度使容州刺史檢校太保卒贈太傅永樂大典卷一萬八千一百二十六張歸霸字正臣清河人祖進言陽穀令父實亦有宦緒少倜儻好兵術唐乾符中寇盜蜂起歸霸率昆弟三人棄家投黃巢頗以勇略聞巢陷長安遂署為左番功臣中和中巢領徒走宛丘時太祖在汴奉詔南討巢黨日窘歸霸昆仲與葛從周李讜等相率來降尋補宣武軍劇職光啟二年與蔡將張存戰于盧氏三年夏又與蔡將盧瑭戰於雙丘復與秦宗賢戰于萬勝皆敗而殲之翌日宗權遣將張晊來寇列寨于赤堈一日出騎將較勝歸霸為飛戈所中案飛戈歐陽史作飛矢即拔馬却逸控弦一發賊洞頸而墜遂兼騎而還太祖時於高丘下瞰備見其狀面加賞激厚以金帛及所獲馬錫之又嘗被命以控弦之士五百人伏於壕內太祖統數百騎稍逼其寨蔡人果以銳士摩壘來追歸霸發伏兵掩殺千餘人奪馬數十匹尋奏授檢校左散騎常侍其後從太祖伐鄆副李唐賓渡淮咸著奇績文德初大軍臨蔡州賊將蕭顥來斫寨歸霸與徐懷玉各以所領兵自東南二扉分出合勢殺賊蔡人大敗及太祖整衆離營寇塵已息太祖召至賞之曰昔耿弇不俟光武擊張步言不以賊遺君父弇之功爾其二焉大順中郭紹賓拔曹州歸霸率兵數千守之俄而朱瑾統大軍自至歸霸與丁會逆擊之於金鄉瑾大敗擒賊將宗江等七十餘人曹州以寧明年破濮州生擒刺史邵儒又佐葛從周與晉軍戰於洹水生獲克用愛子落落復與燕人戰於內黃殺仁恭兵三萬餘衆戎績超特居諸將之右累官至檢校左僕射光化二年權知邢州事明年春李嗣昭以蕃漢五萬來寇歸霸堅壁設備晉軍不敢顧其城遂移軍攻洺州陷焉時太祖在滑頗慮邢之失守及葛從周復洺嗣昭北遁歸霸出兵襲之殺二萬餘衆捷至賞錫殊等旋以功奏加檢校司空天祐初遷萊州刺史秩滿授左衞上將軍又除曹州刺史其秋加檢校司徒副劉知俊禦邠鳳之寇邠鳳原本作汾鳳今據通鑑改正影庫本粘籤敗之太祖受禪拜右龍虎統軍改左驍衞上將軍充河陽諸軍都指揮使明年夏六月就除河陽節度使檢校太保尋加同平章事二年秋七月卒於位詔贈太傅梁末帝德妃張氏即歸霸女也末帝嗣位以歸霸子漢鼎漢傑並為近職漢鼎早亡漢傑貞明中為控鶴指揮使領兵討惠王於陳州擒之當貞明龍德之際漢傑昆仲分掌權要藩鎮除拜多出其門段凝因之遂竊兵柄及莊宗入汴漢傑與兄漢倫弟漢融同日族誅於汴橋下永樂大典卷六千三百五十張歸厚字德坤案通鑑考異引梁功臣列傳云歸厚祖興父處讓薛史歸厚傳不言其父祖名號當是歸霸從弟少驍勇有機略尤長於弓槊之用中和末與兄歸霸自巢軍相率來降太祖署為軍校時淮西兵力方壯太祖之師尚寡歸厚以少擊衆往無不捷光啟三年春與秦宗賢戰于萬勝大破之其夏蔡將張晊以數萬衆屯於赤堈歸厚嘗與晊單騎鬬於陣晊不能支而奔師徒乘此大捷太祖大悅立署為騎軍長仍以鞍馬器幣錫之及佐朱珍討時溥寨于豐蕭之間歸厚乘徐壘如行坦途甚為諸將歎伏龍紀初奏遷檢校工部尚書其年冬復伐徐歸厚以偏師徑進至九里山下與徐兵遇時我之叛將陳璠在賊陣中歸厚忽見之因瞋目大罵單馬直往期于必取會飛矢中左目而退徐戎甚衆莫敢追之大順元年奏加檢校兵部尚書又命統親軍是歲郴王遷寨未知所往忽逢兗鄆賊寇甚衆太祖亟登道左高阜以觀之命歸厚領所部廳子馬案原本作厲子馬考通鑑注廳子都係當時軍旅之名今改正舊五代史考異直突之出沒二十餘合賊大敗將北而救軍雲至歸厚即綴賊苦戰請太祖以數十騎先還時歸厚所乘馬中流矢而踣乃持槊步鬬漸退賊不敢逼太祖至寨亟命張筠劉儒飛騎來迎然謂已歿矣歸厚體被二十餘箭尚復拒戰筠等既至賊解乃歸太祖見之撫背泣下曰得歸厚身全縱廣喪戎馬何足計乎便令肩舁歸汴日降問賚恩旨甚厚尋遷中軍指揮使景福初從太祖伐鄆帝軍不利太祖為寇所逼歸厚殿馬翼衞左右馳射矢發如雨賊騎千百披靡而退明年與葛從周案原本作郭從周今據通鑑改正舊五代史考異禦晉軍晉軍原本作晉君今據通鑑改正影庫本粘籤於洹水殊績尤著詔加檢校右僕射其後討滄州復洺州咸以功聞太祖錄其勳命權知洺州事是郡嘗兩為晉人所陷井邑蕭條歸厚撫之數月之內民庶翕然太祖自鎮定還覩其緝理之政大喜賞之天復元年冬真拜洺州刺史加檢校左僕射尋授絳州刺史三年秋改晉州刺史仍檢校司空唐帝遷都洛陽除右神武統軍天祐二年改左羽林統軍與徐懷玉同守澤州時晉軍五萬來攻郡中戎士甚寡歸厚極力拒守幷軍乃還太祖受禪加檢校司空開平二年夏劉知俊以同州叛歸厚副楊師厚劉鄩等討平之秋軍還授亳州團練使乾化元年拜鎮國軍節度使陝虢等州觀察處置等使明年夏以疾卒於位詔贈太師子漢卿永樂大典卷一萬八千一百二十六張歸弁字從冕始與兄歸霸歸厚同歸於太祖得署為牙校時太祖初鎮宣武屢命歸弁結好於近境頗得行人之儀乾寧中以偏師佐葛從周禦幷軍於洹水光啟中又佐張存敬與燕人戰於內黃積前後功表授檢校工部尚書大順初攻討兗鄆命歸弁佐衡王友諒屯單父軍聲甚振尋為齊州指揮使屬青帥王師範叛遣將詐為賈人挽車數十乘匿兵器於其中將謀竊發歸弁察而擒之州城以寧明年春青寇大舉來伐州兵既寡民意頗搖有本郡都將都將原本作郁將今據文改正影庫本粘籤康文爽等三人欲謀外應即時擒獲誅之人心遂定歸弁又罄發私帑賞給士伍青人遂遁青州平超加檢校右僕射遙領愛州刺史從征荊襄迴轉檢校左僕射天祐三年春太祖入魏誅牙軍魏之郡邑多叛歸弁與諸將等分布攻討封境悉平而歸弁於高唐高唐原本作高堂今據通鑑改正影庫本粘籤攻賊太猛飛矢中於臆太祖嘉之命賜銀鞍勒馬一疋金帶一條夏五月命權知晉州冬十一月真授晉州刺史加檢校司空太祖受禪改滑州長劍指揮使開平二年秋九月幷軍圍平陽詔歸弁統兵救之軍至解其圍加檢校司徒三年春三月寢疾卒於滑州之私第子漢融永樂大典卷六千三百五十史臣曰從周以驍武之才事雄猜之主而能取功名於馬上啟手足於牖下靜而言之斯為賢矣彥章蔚有將才死於讒口身既歿矣國亦隨之惜哉歸霸昆仲皆脫身於巨盜之流宣力於興王之運由介冑而析珪爵可不謂壯夫歟永樂大典卷六千三百五十, krp: 證}
