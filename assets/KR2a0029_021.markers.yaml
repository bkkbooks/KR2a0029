  - {type: variant, offset: 1645, length: 2762, content: 為右司馬使與周彝同領寇彥卿南大豐閻寶已下大軍伐滄州及太祖幸魏州討牙軍中軍前有魏博將山河營山河營原本作山阿今從通鑑改正影庫本粘籤指揮使左行遷聞府中有變引軍還屯歷亭自稱留後從亂者數萬人道昭佐周彝與彥卿已下大破之殺四萬餘人擒左行遷斬之有史仁遇亦聚徒數萬據高唐又破之擒仁遇以獻乘勝取澶博二州平之復殺萬餘人道昭性勇果多率先犯陣屢有摧失而周彝彥卿犄角繼進連以捷告護兵者上功不實皆以道昭為首太祖陰知之俱不議賞及滄州之圍也不用騎士令道昭牧馬於堂陽太祖受禪後委兵柄與康懷英等攻潞州以蚰蜒塹繚之飛鳥不度既踰歲晉人援至王師大敗道昭為晉軍所殺永樂大典卷一萬八千一百二十七徐懷玉本名琮亳州焦夷縣人少以雄傑自任隨太祖起軍唐中和末從至大梁光啟初蔡寇屯金堤驛懷玉將輕騎連破之由是累遷親從副將改左長劍都虞候又從破蔡賊於板橋收秦宗權八寨奏加檢校右散騎常侍文德初同諸軍解河陽之圍復從破徐宿乾寧中奏加檢校刑部尚書太祖賜名懷玉破朱瑾於金鄉南擒宗江以獻表授金紫光祿大夫檢校右僕射乾寧四年龐師古失利於清口懷玉獨完軍以退光化初轉滑州右都押牙兼右步軍指揮使俄奏授沂州刺史沂州原本作忻州今從歐陽史改正影庫本粘籤頃之王師範以青州叛屢出兵侵軼懷玉擊退之天復四年轉齊州防禦使加檢校司空從大軍迎駕於岐下歸署華州觀察留後一年復領所部兵戍雍州尋召赴河中補晉絳同華五州馬步都指揮使天祐三年授左羽林統軍案歐陽史作右羽林統軍舊五代史考異轉右龍虎統軍領六軍之士赴澤州尋為晉軍所攻晝夜衝擊穴地而入懷玉率親兵逆殺於隧中晉軍遂退開平元年授曹州刺史加檢校司徒明年除晉州刺史其秋晉軍大至已乘其墉懷玉選親兵五十餘人擁殺下城晉軍既退出家財以賞戰士歲中晉軍又至懷玉領兵敗之於洪洞三年制授鄜坊節度使特進檢校太保練兵繕壁人頗安之加檢校太傅乾化二年庶人友珪既篡立河中朱友謙拒命遣兵襲鄜州懷玉無備尋為河中所擄囚於公館及友珪遣康懷英率師圍河中友謙慮懷玉有變遂害之懷玉材氣剛勇臨陣未嘗折退平生金瘡被體有戰將之名焉永樂大典卷一萬八千一百二十七郭言太原人也家於南陽新野少以力穡養親鄉里稱之唐廣明中黃巢擁衆西犯秦雍言為巢黨所執後從太祖赴汴初為騎軍繼有戰功後擢為裨校言性剛直有權略勤於戎事或以家財分給將士之貧者由是頗得士心屢將兵與蔡寇戰於浚郊每以少擊衆出必勝歸太祖嘉其勇果謂賓佐曰言乃吾之虎侯也時宗權支黨數十萬太祖兵不過數十旅每恨其寡與之不敵一日命言董數千人越河洛趨陝虢招召丁壯以實部伍言夏往冬旋得銳士萬餘遂遷步軍都將自是隨太祖掩襲蔡寇斬獲掠奪不可勝紀宗權以茲敗北太祖盡收其地因命言將兵導達貢奉以安郵傳自汴鄭迄於潼關去奸恤弱甚得其所光啟中唐天子以太祖兵威日振命兼揚州節度使太祖遣幕吏李璠領兵赴維揚以制置為名時言為李璠前鋒深入淮甸破盱眙而還案通鑑云時溥以師襲之言力戰得免梁祖紀亦作不克進而還與傳異梁祖東伐徐鄆言將偏師略地千里頻逢寇敵言出奇决戰所向皆捷大挫東人之銳太祖錄其績以排陣斬斫之號委之尋表為宿州刺史檢校右僕射于時徐宿兵鋒日夕相接控扼偵邏以言為首景福初時溥大舉來攻宿州言勇於野戰喜逢大敵自引銳兵擊溥殺傷甚衆徐戎乃退言為流矢所中一夕而卒永樂大典卷二萬二千一百六十李唐賓陝州陝縣人也中和四年二月尚讓之寇繁臺也唐賓與李讜霍存並為巢將與太祖之軍戰于尉氏門外三月太祖破瓦子寨唐賓與王虔裕來降時黃巢壁于陳郊乃命唐賓摩其西闉焚焉王滿之師王夏之陣唐賓悉在戰中後與朱珍趣淄州所向摧敵及取滑平蔡前後破鄆淮徐之衆功與朱珍略等而驍勇絕倫善用矛未嘗不率先陷陣其善於治軍行師之道亦與珍齊名珍之擒石璠也唐賓亦沿淮與郭言犄角下盱眙其後渡河破黎陽李固等鎮攻澶州下內黃敗魏師未嘗不與珍同暨攻蔡之役珍自西南破其外垣唐賓亦堙壕坎墉摧其東北隅及伐徐取豐時溥軍於吳康案原本訛吳唐今據歐陽史改正舊五代史考異珍亟遇之未能却唐賓引本軍擊敗之珍遂大勝每興師必與珍偕用故往無不利然而剛中用壯遂為珍所害以謀叛聞太祖聞之痛惜累日及誅朱珍後令其妻孥至軍收葬而加弔祭焉永樂大典卷一萬三百八十八王虔裕瑯琊臨沂人也家於楚丘少有膽勇多力善射以弋獵為事唐乾符中諸葛爽聚徒於青棣間攻剽郡縣虔裕依其衆及爽歸順乃以虔裕及其衆隸於宣武軍太祖鎮汴四郊多事始議選將征討首以虔裕綰騎兵恆為前鋒及太祖擊巢蔡於陳州虔裕連拔數寨擒獲萬計巢孽既遁虔裕躡其迹追至萬勝戍賊衆饑乏短兵纔接而潰太祖以其勞表授義州刺史蔡人日縱侵掠陳鄭許亳之郊頻年大戰虔裕掩襲攻拒凡百餘陣勦戮生擒不知紀極秦宗賢寇汴南鄙太祖令虔裕逆擊於尉氏不利而還太祖怒命削職拘於別部踰年邢州孟遷請降未幾晉人伐邢孟遷遣使來乞師太祖先遣虔裕選勇士百餘人徑往赴之伺夜突入邢州明日循堞樹立旗幟晉人不測乃退數月復來圍邢時太祖大軍方討兗鄆未及救援案通鑑考異云是時全忠方攻時溥未討兗鄆也傳誤未及救援原本作未幾今從通鑑考異所引薛史改正影庫本粘籤邢人困而攜貳遷乃縶虔裕送於太原尋為所害永樂大典卷一萬八千一百二十七劉康壽州安豐縣人也以農桑為業唐乾符中關東羣盜並起江淮間偏罹其苦因為巢黨所掠康沉默有膂力善用矛槊然不樂為暴中和三年從太祖赴鎮委以心腹康枕戈擐甲夷險無憚其後累典親軍襲巢破蔡斬獲尤多累以戰功遷元從都將從太祖連年攻討徐兗鄆所向多捷尤善於營壘充諸軍壕寨使及太祖盡下三鎮議其功奏加檢校右僕射兼領軍衞尋遷密州刺史案原本訛宣州今據新唐書昭宗紀改正舊五代史考異政甚簡靜時王師範叛據青州乞師於淮夷淮人遂攻密州密兵素少執銳者不滿千夫而淮賊踰萬康率老弱守陴自別領少壯日與接戰於密之四郊俘擒千計賊知密州虛弱援兵未至晝夜急攻遂陷康為賊所害永樂大典卷九千九十八王彥章字賢明案歐陽史作字子明鄆州壽張縣人也案歐陽史作鄆州壽昌人通鑑從薛史作壽張祖秀父慶宗俱不仕以彥章貴秀贈左散騎常侍慶宗贈右武衞將軍彥章少從軍隸太祖帳下以驍勇聞稍遷軍職累典禁兵從太祖征討所至有功常持鐵鎗衝堅陷陣開平二年十月自開封府押牙左親從指揮使授左龍驤軍使三年轉左監門衞上將軍依前左龍驤軍使乾化元年改行營左先鋒馬軍使又加金紫光祿大夫檢校司空依前左監門衞上將軍二年庶人友珪篡位加檢校司徒三年正月授濮州刺史本州馬步軍都指揮使依前左先鋒馬軍使未幾改先鋒步軍都指揮使四年為澶州刺史進封開國伯五年三月朝廷議割魏州為兩鎮慮魏人不從遣彥章率精騎五百屯鄴城駐於金波亭以備非常是月二十九日夜魏軍作亂首攻彥章於館舍彥章南奔七月晉人攻陷澶州彥章舉家陷沒案通鑑晉人夜襲澶州陷之刺史王彥章在劉鄩營晉人獲其妻子是當時澶州之陷因刺史他出而掩其不備非彥章力不能守也歐陽史極推重彥章而載澶州事不詳蓋未博考晉王遷其家於晉陽待之甚厚遣細人間行誘之彥章即斬其使以絕之後數年其家被害九月授汝州防禦使檢校太保依前行營先鋒步軍都指揮使貞明二年四月改鄭州防禦使三年十二月授西面行營馬軍都指揮使加檢校太傅依前鄭州防禦使頃之授行營諸軍左廂馬軍都指揮使五年五月遷許州兩使留後軍職如故六年正月正授, WYG: ''}
  - {type: variant, offset: 1645, length: 2762, content: 為右司馬使與周彝同領寇彥卿南大豐閻寶已下大軍伐滄州及太祖幸魏州討牙軍中軍前有魏博將山河營山河營原本作山阿今從通鑑改正影庫本粘籤指揮使左行遷聞府中有變引軍還屯歷亭自稱留後從亂者數萬人道昭佐周彝與彥卿已下大破之殺四萬餘人擒左行遷斬之有史仁遇亦聚徒數萬據高唐又破之擒仁遇以獻乘勝取澶博二州平之復殺萬餘人道昭性勇果多率先犯陣屢有摧失而周彝彥卿犄角繼進連以捷告護兵者上功不實皆以道昭為首太祖陰知之俱不議賞及滄州之圍也不用騎士令道昭牧馬於堂陽太祖受禪後委兵柄與康懷英等攻潞州以蚰蜒塹繚之飛鳥不度既踰歲晉人援至王師大敗道昭為晉軍所殺永樂大典卷一萬八千一百二十七徐懷玉本名琮亳州焦夷縣人少以雄傑自任隨太祖起軍唐中和末從至大梁光啟初蔡寇屯金堤驛懷玉將輕騎連破之由是累遷親從副將改左長劍都虞候又從破蔡賊於板橋收秦宗權八寨奏加檢校右散騎常侍文德初同諸軍解河陽之圍復從破徐宿乾寧中奏加檢校刑部尚書太祖賜名懷玉破朱瑾於金鄉南擒宗江以獻表授金紫光祿大夫檢校右僕射乾寧四年龐師古失利於清口懷玉獨完軍以退光化初轉滑州右都押牙兼右步軍指揮使俄奏授沂州刺史沂州原本作忻州今從歐陽史改正影庫本粘籤頃之王師範以青州叛屢出兵侵軼懷玉擊退之天復四年轉齊州防禦使加檢校司空從大軍迎駕於岐下歸署華州觀察留後一年復領所部兵戍雍州尋召赴河中補晉絳同華五州馬步都指揮使天祐三年授左羽林統軍案歐陽史作右羽林統軍舊五代史考異轉右龍虎統軍領六軍之士赴澤州尋為晉軍所攻晝夜衝擊穴地而入懷玉率親兵逆殺於隧中晉軍遂退開平元年授曹州刺史加檢校司徒明年除晉州刺史其秋晉軍大至已乘其墉懷玉選親兵五十餘人擁殺下城晉軍既退出家財以賞戰士歲中晉軍又至懷玉領兵敗之於洪洞三年制授鄜坊節度使特進檢校太保練兵繕壁人頗安之加檢校太傅乾化二年庶人友珪既篡立河中朱友謙拒命遣兵襲鄜州懷玉無備尋為河中所擄囚於公館及友珪遣康懷英率師圍河中友謙慮懷玉有變遂害之懷玉材氣剛勇臨陣未嘗折退平生金瘡被體有戰將之名焉永樂大典卷一萬八千一百二十七郭言太原人也家於南陽新野少以力穡養親鄉里稱之唐廣明中黃巢擁衆西犯秦雍言為巢黨所執後從太祖赴汴初為騎軍繼有戰功後擢為裨校言性剛直有權略勤於戎事或以家財分給將士之貧者由是頗得士心屢將兵與蔡寇戰於浚郊每以少擊衆出必勝歸太祖嘉其勇果謂賓佐曰言乃吾之虎侯也時宗權支黨數十萬太祖兵不過數十旅每恨其寡與之不敵一日命言董數千人越河洛趨陝虢招召丁壯以實部伍言夏往冬旋得銳士萬餘遂遷步軍都將自是隨太祖掩襲蔡寇斬獲掠奪不可勝紀宗權以茲敗北太祖盡收其地因命言將兵導達貢奉以安郵傳自汴鄭迄於潼關去奸恤弱甚得其所光啟中唐天子以太祖兵威日振命兼揚州節度使太祖遣幕吏李璠領兵赴維揚以制置為名時言為李璠前鋒深入淮甸破盱眙而還案通鑑云時溥以師襲之言力戰得免梁祖紀亦作不克進而還與傳異梁祖東伐徐鄆言將偏師略地千里頻逢寇敵言出奇决戰所向皆捷大挫東人之銳太祖錄其績以排陣斬斫之號委之尋表為宿州刺史檢校右僕射于時徐宿兵鋒日夕相接控扼偵邏以言為首景福初時溥大舉來攻宿州言勇於野戰喜逢大敵自引銳兵擊溥殺傷甚衆徐戎乃退言為流矢所中一夕而卒永樂大典卷二萬二千一百六十李唐賓陝州陝縣人也中和四年二月尚讓之寇繁臺也唐賓與李讜霍存並為巢將與太祖之軍戰于尉氏門外三月太祖破瓦子寨唐賓與王虔裕來降時黃巢壁于陳郊乃命唐賓摩其西闉焚焉王滿之師王夏之陣唐賓悉在戰中後與朱珍趣淄州所向摧敵及取滑平蔡前後破鄆淮徐之衆功與朱珍略等而驍勇絕倫善用矛未嘗不率先陷陣其善於治軍行師之道亦與珍齊名珍之擒石璠也唐賓亦沿淮與郭言犄角下盱眙其後渡河破黎陽李固等鎮攻澶州下內黃敗魏師未嘗不與珍同暨攻蔡之役珍自西南破其外垣唐賓亦堙壕坎墉摧其東北隅及伐徐取豐時溥軍於吳康案原本訛吳唐今據歐陽史改正舊五代史考異珍亟遇之未能却唐賓引本軍擊敗之珍遂大勝每興師必與珍偕用故往無不利然而剛中用壯遂為珍所害以謀叛聞太祖聞之痛惜累日及誅朱珍後令其妻孥至軍收葬而加弔祭焉永樂大典卷一萬三百八十八王虔裕瑯琊臨沂人也家於楚丘少有膽勇多力善射以弋獵為事唐乾符中諸葛爽聚徒於青棣間攻剽郡縣虔裕依其衆及爽歸順乃以虔裕及其衆隸於宣武軍太祖鎮汴四郊多事始議選將征討首以虔裕綰騎兵恆為前鋒及太祖擊巢蔡於陳州虔裕連拔數寨擒獲萬計巢孽既遁虔裕躡其迹追至萬勝戍賊衆饑乏短兵纔接而潰太祖以其勞表授義州刺史蔡人日縱侵掠陳鄭許亳之郊頻年大戰虔裕掩襲攻拒凡百餘陣勦戮生擒不知紀極秦宗賢寇汴南鄙太祖令虔裕逆擊於尉氏不利而還太祖怒命削職拘於別部踰年邢州孟遷請降未幾晉人伐邢孟遷遣使來乞師太祖先遣虔裕選勇士百餘人徑往赴之伺夜突入邢州明日循堞樹立旗幟晉人不測乃退數月復來圍邢時太祖大軍方討兗鄆未及救援案通鑑考異云是時全忠方攻時溥未討兗鄆也傳誤未及救援原本作未幾今從通鑑考異所引薛史改正影庫本粘籤