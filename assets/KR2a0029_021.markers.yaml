  - {type: variant, offset: 4432, length: 0, content: '', WYG: 勿使栖遲或有進士䇿名累年未釋褐者與初任一官已釋褐者依前資叙用乙酉昇宋州為大都督府其餘廢大都督府額六月遣兗州節度使劉鄩華州節度使尹皓崇州節度使温昭圖莊宅使叚凝領軍攻同州先是河中朱友謙襲䧟同州節度使程全暉單騎奔京師友謙以其子令徳為同州畱後表求節旄不允既而帝慮友謙怨望遂命兼鎮同州制命將下而友謙已叛遣使求援於晉故命將討之九月庚寅以供奉官郎公遠充契丹歡好使晉王遣都將李嗣昭李存審王建及率師來援同州戰於城下我師敗績諸將以餘衆退保華州羅文寨冬十月陳州妖賊母乙董乙伏誅陳州里俗之人喜習左道依浮屠氏之教自立一宗號曰上乘不食葷茹誘化庸民揉雜淫穢宵聚晝散州縣因循遂致滋蔓時刺史惠王友能恃戚藩之寵動多不法故姧慝之徒望風影附毋乙數軰漸及千人攻掠鄉社長吏不能詰是嵗秋其衆益盛南通淮夷朝廷累發州兵討捕反為賊所敗陳潁蔡三州大被其毒羣賊乃立母乙為天子其餘豪首各有樹置至是發禁軍及數郡兵合勢追擊賊潰生擒母乙等首領八十餘人械送闕下並斬於都市龍徳元年春正月癸已詔諸道入奏判官宜令御史臺㸃檢合從正衙退後便於中書門下公叅辭謝如有違越具名銜聞奏應面賜章服仍令閤門使取本官狀申中書門下受勑牒後方可結入新銜甲辰以河東道行營西面應接使前静勝軍節度崇裕等州觀察處置等使特進檢校太尉同平章事温昭圖為匡國軍節度陳許蔡等州觀察處置等使以}
