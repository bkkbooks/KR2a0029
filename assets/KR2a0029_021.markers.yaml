  - {type: variant, offset: 4429, length: 0, content: '', WYG: 軍職如故二月癸丑宣州節度使錢傳璟起復依前檢校太傅同平章事宣州節度使以其丁内艱故也三月丁亥以前申州刺史張紹珪為大理卿夏四月丁亥制曰王者愛育萬方慈養百姓恨不驅之仁壽撫以淳和而炎黄有戰伐之師堯舜有干戈之用諒不獲已其猶病諸然則去害除妖興兵動衆殺黑龍而濟中土刑白馬而誓諸侯終能永逸暫勞以至同文同軌古今無異方册具存朕以眇末之身託億兆之上四海}
  - {type: variant, offset: 4429, length: 0, content: '', krp: 軍職如故二月癸丑宣州節度使錢傳璟起復依前檢校太傅同平章事宣州節度使以其丁内艱故也三月丁亥以前申州刺史張紹珪為大理卿夏四月丁亥制曰王者愛育萬方慈養百姓恨不驅之仁壽撫以淳和而炎黄有戰伐之師堯舜有干戈之用諒不獲已其猶病諸然則去害除妖興兵動衆殺黑龍而濟中土刑白馬而誓諸侯終能永逸暫勞以至同文同軌古今無異方册具存朕以眇末之身託億兆之上四海}
  - {type: variant, offset: 4430, length: 1, content: 幾, WYG: 乂八年於茲業業兢兢日愼一日雖踰山越海肅慎方來而召雨徴風蚩尤尚在顧兹殘孽勞我大邦將士乆於戰征黎庶疲於力役木牛暫息則師人有乏㸑之憂流馬盡行則丁壯有無聊之苦況青春告謝朱夏已臨妨我農時迫我戎事永言大計思致小康宜覃在宥之恩稍示殷憂之㫖用兵之地賦役實煩不有蠲除何使存濟除兩京已放免外應宋毫潁鄆齊魏滑鄭濮沂密青登萊淄陳許均房襄鄧沁隨陜華雍晉綘懷汝商等三十二州應欠貞明四年終已前夏秋兩稅并鄆齊滑濮襄晉輝等七州兼欠貞明四年已前營田課利物色等並委租庸使逐州據其名額數目矜放所在官吏不得淹停制命徴督下民致恩澤不及於鄉閭租稅虚捐於賑籍其有私放遠年債負生利過倍自違格條所在州縣不在更與徴理之限兗州城内自張守進違背朝廷結連蕃冦乆勞攻討頗困生靈言念傷殘尋加給復應天下見禁罪人如犯大辟合抵極刑者宜示好生特令減死除準格律常赦不原外徒流已下遞減一等除降官未經量移者與量移已量移者便與復資云庚子宗正卿朱守素上言請依前朝置匭院令諫議大夫專判從之乃以右諫議大夫鄭韜光充知匭使乙已以右僕射兼門下侍郎同平章事監修國史判度支開國公敬翔為𢎞文館大學士延資庫使諸道鹽鐵轉運等使餘如故以中書侍郎兼刑部尚書平章事集賢殿大學士判户部事鄭珏為監修國史判度支以中書侍郎平章事蕭頃為集賢殿大學士判户部事以尚書左丞李琪為中書侍郎平章事丙午吏部侍郎趙光𦙍為尚書左丞已酉以河中䕶國軍節度副大使知節度事制置度支解縣池埸等使開府儀同三司守太保兼中書令冀王友謙依前守太保兼中書令兼同州節度使餘如故癸丑鄜延節度使兼西面招討接應等使檢校太保兼中書令渤海郡王高萬興進封延安王賜號匡時定節功臣前衡州長史劉隲進所撰地理手鏡十巻已未以租庸判官尚書工部郎中張銳為户部郎中充崇政院學士辛酉以前吏部侍郎盧協為禮部侍郎五月乙丑故左衛上將軍齊奉國贈太傅詔曰應文武朝官或有替罷多年漂流在外者宜令中書門下量才除}
