  - {type: variant, offset: 4432, length: 0, content: '', krp: 勿使栖遲或有進士䇿名累年未釋褐者與初任一官已釋褐者依前資叙用乙酉昇宋州為大都督府其餘廢大都督府額六月遣兗州節度使劉鄩華州節度使尹皓崇州節度使温昭圖莊宅使叚凝領軍攻同州先是河中朱友謙襲䧟同州節度使程全暉單騎奔京師友謙以其子令徳為同州畱後表求節旄不允既而帝慮友謙怨望遂命兼鎮同州制命將下而友謙已叛遣使求援於晉故命將討之九月庚寅以供奉官郎公遠充契丹歡好使晉王遣都將李嗣昭李存審王建及率師來援同州戰於城下我師敗績諸將以餘衆退保華州羅文寨冬十月陳州妖賊母乙董乙伏誅陳州里俗之人喜習左道依浮屠氏之教自立一宗號曰上乘不食葷茹誘化庸民揉雜淫穢宵聚晝散州縣因循遂致滋蔓時刺史惠王友能恃戚藩之寵動多不法故姧慝之徒望風影附毋乙數軰漸及千人攻掠鄉社長吏不能詰是嵗秋其衆益盛南通淮夷朝廷累發州兵討捕反為賊所敗陳潁蔡三州大被其毒羣賊乃立母乙為天子其餘豪首各有樹置至是發禁軍及數郡兵合勢追擊賊潰生擒母乙等首領八十餘人械送闕下並斬於都市龍徳元年春正月癸已詔諸道入奏判官宜令御史臺㸃檢合從正衙退後便於中書門下公叅辭謝如有違越具名銜聞奏應面賜章服仍令閤門使取本官狀申中書門下受勑牒後方可結入新銜甲辰以河東道行營西面應接使前静勝軍節度崇裕等州觀察處置等使特進檢校太尉同平章事温昭圖為匡國軍節度陳許蔡等州觀察處置等使以}
  - {type: punctuation, offset: 4440, content: ．, id: KR2a0029_ZHSJ_021-bkkpn935}
  - {type: 'tls:seg', offset: 4440, content: '', id: KR2a0029_ZHSJ_021-d21p21s50}
  - {type: variant, offset: 4440, length: 0, content: '', WYG: 匡國軍節度陳許蔡等州觀察處置等使光禄大夫檢校太傅王彦章為宣義軍節度副大使知節度事鄭滑濮等州觀察處置等使依前北面副招討使二月已未以權知静勝軍節度觀察畱後前汝州防禦使華温琪為静勝軍節度觀察畱後依前檢校太傅丙寅以荆南節度使檢校太師兼中書令渤海郡王高季昌為守中書令依前荆南節度使庚午以晉州建寧軍節度觀察畱後劉玘為晉州節度使檢校太保壬申史館上言伏見北齊文士魏收著後魏書於時自魏太武之初至於北齊書不獲就乃大徴百官家傳刋總斟酌隨條甄舉搜訪遺亡數年之間勒為一代典籍編在北史固非虚言臣今請明下制勑内外百官及前資士子帝戚勲家並各納家傳具述父祖事行源流及才術徳業灼然可考者並纂述送史館如記得前朝㑹昌已後公私亦任抄録送官皆須直書不用文藻兼以兵火之後簡牘罕存應内外臣寮曾有奏行公事關渉制置或討論沿革或章疏文詞有可採者並許編録送納候史館修撰之日考其所上公事與中書門下文案事相符會或格言正辭詢訪不謬者並與編載所冀忠臣名士共流家國之耿光孝子順孫獲記祖先之丕烈而且周徳見乎殷紀舜典存乎禹功非唯十世可知庶成一朝大典臣叨庸委任獲領監修將贖素飡輒干𤣥覽詔從之鹽鐵轉運使敬翔奏請於雍州河陽徐州三處重置埸院稅茶從之已卯禮部尚書充西都副畱守兼判尚書省事崔沂奏西京都省凡有公事奏聞常須借印施行伏請鑄尚書省分司印一面從之是月鎮州大將王徳明殺其帥王鎔自稱畱後遣使來求援宰臣敬翔請許之租庸使趙巖等以為不可乃止三月丁亥朔祠部員外郎李樞上言請禁天下私度僧尼及不許妄求師號紫衣如願出家受戒者皆須赴闕比試藝業施行願歸俗者一聽自便詔曰兩都左右街賜紫衣及師號僧委功徳使具名聞奏今後有闕方得奏薦仍須道行精至夏臘高深方得補填毎遇明聖節兩街各許官壇度七人諸道如要度僧亦仰就京官壇仍令祠部給牒今後只兩街置僧録道録僧正並廢已丑以前兵部郎中杜光乂為左諫議大夫致仕壬寅改襄州鄢縣為沿夏縣亳州焦夷縣為夷父縣密州漢諸縣為膠源縣從中書舍人馬縞請也夏四月陳州刺史惠王友能反舉兵向闕帝命將出師逆擊敗之友能走保陳州詔張漢傑率兵進討勑開封府太康襄邑雍丘三縣遭陳州賊軍奔衝其夏稅只據見苖輸納五月丙戌朔制曰朕聞惟辟動天惟聖時憲故君為善則降之以福為不善則降之以災朕以眇末之身託於王公之上不能荷先帝艱難之運所以致蒼生塗炭之危兵革薦興災害仍集内省厥咎蓋由朕躬故北有犬戎猾夏之師西有蒲同亂常之旅連年戰伐積嵗轉輸䖍劉我士民侵據我郡邑師無宿飽之饋家無擔石之儲而又水潦為災蟲蝗作殄戒譴作於上怨咨聞於下而況骨肉之内竊弄干戈畿甸之中輒為陵暴但責躬而罪已敢怨天以尤人蓋朕無徳以事上𤣥無功以及兆庶不便於時者未能去有益於民者未能行處事昧於酌中發令乖於至當招致災患引翼禍殃罪在朕躬不能自赦夙夜是懼寢食靡寧將勵已以息災爰布澤而從欲今以薰風方扇旭日初昇朔既視於正陽歴宜更於嘉號庶惟新之令敷華夏以同歡期克念之心與皇王而合道其貞明}
