  - {type: variant, offset: 229, length: 810, content: 獻始表為天平軍節度留後尋授徐州節度使案文苑英華有授龐從武寧平南節度改名師古制張玄晏之辭也中云自委之留事頒我詔條惠愛行於鄉閭威望揚于士伍是宜錫以旗幢進其官秩奄有徐夷之四境爰撫大彭之故都是師古先為留後繼授節度也通鑑止作留後誤官至檢校司徒乾寧四年八月與葛從周分統大軍渡淮以伐楊行密十一月師古寨於清口寨地卑下案玉堂閒話云龐從會軍五萬于清口所屯之地蓋兵書謂之絕地人不駕肩行一舍方至夷坦之處舊五代史考異或請遷移弗聽俄有告淮人决上流者曰水至矣師古怒其惑衆斬之案九國志侯瓚傳時兵起倉卒加以陰寒士皆飲冰餐雪而行甫及梁營則豎戈植足鬬志未决朱瑾與瓚率五十騎潛濟淮入自壘北舞槊而馳囂聲雷沸梁兵皆殞眩不能舉遂斬龐從大將繼之死者大半是清口之戰因雪夜不備而敗也薛史以為決淮上流與九國志異新唐書楊行密傳兼用之須臾我軍在淖中莫能戰而吳人襲焉故及於敗師古沒於陣永樂大典卷一萬八千一百二十六霍存洺州曲周縣人性驍勇善騎射在黃巢中已為將領唐中和四年太祖大破巢軍於王滿渡時存與葛從周張歸霸皆自巢軍來降太祖宥而納之其後破王夏寨擊殷鐵林並在戰中尋佐朱珍取滑臺攻淄州取博昌皆預戰立功時蔡賊張晊在汴北存以三千人夕犯其營破之用本部騎兵敗秦賢軍案王虔裕傳作秦宗賢舊五代史考異殺五千人連破四寨盡得其輜重從討盧瑭張晊殪萬餘人存功居多我軍之圍濮州也有賊升眺樓大詬案原本作昭樓今據歐陽史改正舊五代史考異太祖怒甚召存射之矢一發而屍隕其下賞賚甚厚復佐朱珍擒石璠破魏師敗徐戎又佐龐師古至呂梁敗時溥二千餘衆以是累遷官初王師渡淮乏食不甚利唯存軍戰有功淮賊乃引退太祖之討宿州也葛從周以水壞其垣丁會以師乘其墉存戰壘外敗其軍宿人乃降明年佐郴王友裕擊時溥于碭山破之獲蕃將石君和石君和原本作軍和今從通鑑改正影庫本粘籤等五十人案歐陽史云存代李唐賓攻時溥溥敗碭山存獲其將石君和等五十人梁攻宿州葛從周引水浸之丁會與存戰城下遂下之舊五代史考異是歲復與晉軍戰于馬牢川始入為前鋒出則後拒晉不敢逼乃渡河襲淇門殺三千餘人, WYG: ''}
