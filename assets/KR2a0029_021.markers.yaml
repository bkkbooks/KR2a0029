  - {type: variant, offset: 1066, length: 233, content: 伐鄆臨其壁既而師陷圍中以急來告存領二百騎馳赴擊退之太祖喜拔為諸軍都指揮使景福二年春太祖親至曹州留騎軍數千令存將之且曰有急則倍道兼行以赴之俄聞朱瑾領兵二萬入援彭門存乃領騎軍馳赴之與徐兗之衆合戰於石佛山下大敗之存亦中流矢而卒時人稱其忠勇初朱珍李唐賓之歿龐師古代珍存代唐賓戰伐功績多與師古同始遙領韶州牧又改賀州後用為權知曹州刺史官至檢校右僕射及太祖登極屢有征討因起猛士之歎一日幸講武臺閱兵謂諸將曰霍存在朕安有此勞苦耶諸君其思之他日語又如是累贈官至太保子彥威後唐明宗朝為青州, WYG: ''}
