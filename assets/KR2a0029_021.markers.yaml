  - {type: variant, offset: 1302, length: 342, content: 永樂大典卷一萬八千一百二十六符道昭淮西人案歐陽史作蔡州人舊五代史考異性強敏有武略秦宗權用為心膂使監督諸軍後為騎將尤能布陣勇聞於時然剛而無操善迎人意一見若盡肺腑必甚愛其才而道昭之心腹颺矣秦宗權之將敗也有薛潛者薛潛原本作雪潛今從歐陽史改正影庫本粘籤支擘隊伍道昭謂所私曰蔡弱矣乃歸潛潛欲敗復奔洋州依葛佐佐攻興元軍不利復奔於岐宋文通愛之養為己子名繼遠遂易其宗及得軍職悉超儕伍後為巴州刺史又奏為隴州防禦使兼中軍都指揮使太祖迎奉昭宗駐軍於岐下道昭頻領騎士敢鬬戰屢為王師所敗遂來降太祖素聞其名待之甚厚案通鑑李繼昭出降於全忠復姓符名道昭據薛史則道昭在岐自名繼遠非繼昭也通鑑疑傳寫之訛舊五代史考異昭宗反正奏授秦州節度使同平章事遣兵援送不克而還先是李周彝棄鄜州自投歸國署為元帥府行軍左司馬寵冠霸府及道昭至, WYG: ''}
