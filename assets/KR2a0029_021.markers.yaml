  - {type: variant, offset: 4479, length: 1, content: 拜, WYG: 戴思遠攻徳勝寨之北城晉人來援思遠敗於戚城龍徳二年春正月戴思遠率師襲魏州時晉王方攻鎭州故思遠乘虚以襲之陷成安思遠遂急攻徳勝北城晉將李存審極力拒守二月晉王以兵至思遠收軍而退復保楊村八月段凝張朗攻衛州下之獲刺史李存儒以獻戴思遠又下淇門共城新鄉等三縣自是澶州之西相州之南皆為梁有晉人失軍儲三分之一焉龍徳三年春三月晉潞州節度畱後李繼韜遣使以城歸順先是繼韜父嗣昭為潞州節度使戰殁於鎭州城下晉王欲以嗣昭長子繼儔襲父位繼韜在潞州即執繼儔囚之遣使來送欵仍以二㓜子為質澤州刺史裴約不從繼韜之謀帝}
