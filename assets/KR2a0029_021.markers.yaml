  - {type: variant, offset: 4469, length: 2, content: 代戴, WYG: 陳州行營都指揮張漢傑曉示諸軍知委是月兗州節度使充河東道行營都招討使劉鄩卒六月已亥以都㸃檢諸司法物使檢校司徒行左驍衛大將軍李肅為右威衛上將軍秋七月陳州朱友能降庚子詔曰朕君臨四海子育兆民唯持不黨之心庶叶無私之運其有齒予戚屬雖深敦叙之情干我國經難固含𢎞之㫖須遵常憲以示至公特進檢校太傅使持節陳州刺史兼御史大夫上柱國食邑三千户惠王友能列爵為王頒條治郡受元戎之寄任處千里之封疆就進官資已登崇貴時加錫賚以表優隆宜切知恩合}
