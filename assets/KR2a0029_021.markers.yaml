  - {type: variant, offset: 5363, length: 690, content: 彥章素輕嗣源故以小字呼之既而晉王命肩輿隨軍至任城彥章以所傷痛楚堅乞遲留遂遇害時年六十一彥章性忠勇有膂力臨陣對敵奮不顧身居嘗謂人曰李亞子鬬鷄小兒何足顧畏初晉王聞彥章授招討使自魏州急赴河上以備衝突至則德勝南城已為所拔晉王嘗曰此人可畏當避其鋒一日晉王領兵迫潘張寨大軍隔河未能赴援彥章援槍登船叱舟人解纜招討使賀瓌止之不可晉王聞彥章至抽軍而退甚驍勇如此及晉高祖遷都夷門嘉彥章之忠款詔贈太師太師原本作太尉歐陽史作太師考薛史晉高祖紀亦作太師今改正影庫本粘籤搜訪子孫錄用永樂大典卷一萬八千一百二十七五代史補王彥章之應募也同時有數百人而彥章營求為長衆皆怒曰彥章何人一旦自草野中出便欲居我輩之上是不自量之甚也彥章聞之乃對主將指數百人曰我天與壯氣自度汝等不及故求作長耳汝等咄咄得非勝負將分之際耶且大凡健兒開口便言死死則未暇且共汝輩赤脚入棘針地走三五遭汝等能乎衆初以為戲既而彥章果然衆皆失色無敢效之者太祖聞之以為神人遽擢用之賀德倫其先河西部落人也父懷慶隸滑州軍為小校德倫少為滑之牙將太祖領四鎮德倫以本軍從繼立軍功累歷刺史留後遷平盧軍節度使及魏博楊師厚卒朝廷以德倫代其任貞明元年三月二十九日夜魏軍作亂執德倫囚於別館盡殺其部衆為亂首張彥所迫遣使歸款于太原晉王自黃澤嶺東下至臨清德倫遣從事司空頲密啟晉王訴以張彥凌辱之事晉王至永濟斬彥等八人然後入于魏德倫即以符印上晉王案通鑑晉王既入德倫上印節請王兼領天雄軍王固辭曰比聞汴寇侵逼貴道故親董師徒遠來相救又聞城中新罹塗炭故暫入存撫明公不垂鑒信乃以印節見推誠非素懷德倫再拜曰今寇敵密邇軍城新有大變人心未安德倫心腹紀綱為張彥所殺殆盡形孤勢弱安能統軍一旦生事恐負大恩王乃受之, WYG: 惜哉}
