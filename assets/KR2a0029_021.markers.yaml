  - {type: variant, offset: 5169, length: 2, content: 爾常, WYG: 段凝未至社稷繫卿方畧瓚即驅軍民登城為備或勸帝西奔洛陽趙巖曰勢已如是一下此楼誰心可保乃止俄報曰晉軍過曹州矣帝置傳國寳於卧内俄失其所在已為左右所竊迎唐帝矣帝召控鶴都將皇甫麟謂之曰吾與晉人世讎不可俟彼刀鋸卿可盡我命無令落讎人之手麟不忍帝曰卿不忍將賣我耶麟舉刀將自剄帝持之因相對大慟戊寅夕麟進刃於建國樓之廊下帝崩五代會要末帝年三十六麟即時自剄遲明唐軍攻封丘門王瓚迎降唐帝入宫妃郭氏號泣迎拜初許州獻緑毛龜宫中造室}
