  - {type: variant, offset: 1383, length: 3083, content: 異鎔既失燕軍之援會武皇出師以逼真定鎔遣使謝罪出絹二十萬匹及具牛酒犒軍自是與鎔修好如初洎梁祖兼有山東虎視天下鎔卑辭厚禮以通和好案新唐書羅紹威諷鎔絕太原共尊全忠鎔依違全忠不悅舊五代史考異光化三年秋梁祖將吞河朔乃親征鎮定縱其軍燔鎮之關城鎔謂賓佐曰事急矣謀其所向判官周式者周式原本作周成今據新唐書改正影庫本粘籤有口辯出見梁祖案新唐書李嗣昭攻洺州全忠自將擊走之得鎔與嗣昭書全忠怒引軍攻鎔周式請見全忠全忠即出書示式曰嗣昭在者宜速遣式曰王公所與和者息人鋒鏑間耳况繼奉天子詔和解能無一番紙墜北路乎太原與趙本無恩嗣昭庸肯入耶舊五代史考異梁祖盛怒逆謂式曰王令公朋附幷汾違盟爽信敝賦業已及此期於無捨式曰公為唐室之桓文當以禮義而成霸業反欲窮兵黷武天下其謂公何梁祖喜引式袂而慰之曰前言戲之耳即送牛酒貨幣以犒軍式請鎔子昭祚昭祚原本作昭胙今據五代會要改正影庫本粘籤及大將梁公儒李弘規子各一人往質於汴梁祖以女妻昭祚及梁祖稱帝鎔不得已行其正朔其後梁祖常慮河朔悠久難制會羅紹威卒因欲除移鎮定先遣親軍三千分據鎔深冀二郡以鎮守為名又遣大將王景仁李思安率師七萬營於柏鄉鎔遣使告急莊宗莊宗命周德威率兵應之鎔復奉唐朝正朔稱天祐七年及破梁軍於高邑我軍大振自是遣大將王德明率三十七都從莊宗征伐收燕降魏皆預其功然鎔未嘗親軍遠出八年七月鎔至承天軍與莊宗合宴同盟奉觴獻壽以申感概莊宗以鎔父友曲加敬異為之聲歌鎔亦報之謂莊宗為四十六舅中飲莊宗抽佩刀斷衿為盟許女妻鎔子昭誨因茲堅附於莊宗矣鎔自幼聰悟然仁而不武征伐出於下特以作藩數世專制四州高屏塵務不親軍政多以閹人秉權出納決斷悉聽所為皆雕靡第舍崇飾園池植奇花異木遞相誇尚人士皆褒衣博帶高車大蓋以事嬉遊藩府之中當時為盛案新唐書云鎔母何有婦德訓鎔嚴至母亡鎔始黷貨財此事薛史不載鎔宴安既久惑於左道專求長生之要常聚緇黃合鍊仙丹或講說佛經親受符籙西山多佛寺又有王母觀鎔增置館宇雕飾土木道士王若訥者誘鎔登山臨水訪求仙迹每一出數月方歸百姓勞弊王母觀石路既峻不通輿馬每登行命僕妾數十人維錦繡牽持而上有閹人石希蒙者姦寵用事為鎔所嬖與之臥起天祐八年冬十二月鎔自西山迴宿於鶻營莊鶻營莊原本作體榮莊今從通鑑改正影庫本粘籤將歸府第希蒙勸之佗所宦者李弘規謂鎔曰方今晉王親當矢石櫛沐風雨王殫供軍之租賦為不急之遊盤世道未夷人心多梗久虛府第遠出遊從如樂禍之徒翻然起變拒門不納則王欲何歸鎔懼促歸希蒙譖弘規專作威福多蓄猜防鎔由是復無歸志弘規聞之怒使親事偏將蘇漢衡率兵擐甲遽至鎔前抽戈露刃謂鎔曰軍人在外已久願從王歸弘規進曰石希蒙說王遊從勞弊士庶又結構陰邪將為大逆臣已偵視情狀不虛請王殺之以除禍本鎔不聽弘規因命軍士聚譟斬希蒙首抵於前鎔大恐遂歸是日令其子昭祚與張文禮以兵圍李弘規及行軍司馬李藹宅並族誅之詿誤者凡數十家又殺蘇漢衡收部下偏將下獄窮其反狀親軍皆恐復不時給賜衆益懼文禮因其反側密諭之曰王此夕將坑爾曹宜自圖之衆皆掩泣相謂曰王待我如是我等焉能効忠是夜親事軍十餘人自子城西門踰垣而入鎔方焚香受籙軍士二人突入斷其首袖之而出遂焚其府第煙燄亙天兵士大亂鎔姬妾數百皆赴水投火而死軍校有張友順者張友順原本作文順今從通鑑改正影庫本粘籤率軍人至張文禮之第請為留後遂盡殺王氏之族鎔於昭宗朝賜號敦睦保定久大功臣位至成德軍節度使守太師中書令趙王梁祖加尚書令初鎔之遇害不獲其屍及莊宗攻下鎮州鎔之舊人於所焚府第灰間方得鎔之殘骸莊宗命幕客致祭葬於王氏故塋鎔長子昭祚亂之翌日張文禮索之斬於軍門次子昭誨當鎔被禍之夕昭誨為軍人攜出府第置之地穴十餘日乃髠其髮被以僧衣屬湖南綱官李震南還軍士以昭誨託於震震置之茶褚中既至湖湘乃令依南嶽寺僧習業歲給其費昭誨年長思歸震即齎送而還時鎔故將符習為汴州節度使會昭誨來投即表其事曰故趙王王鎔小男昭誨年十餘歲遇禍為人所匿免今尚為僧名崇隱謹令赴闕明宗賜衣一襲令脫僧服頃之昭誨稱前成德軍中軍使檢校太傅詣中書陳狀特授朝議大夫檢校考功郎中司農少卿賜金紫符習因以女妻之其後累歷少列周顯德中遷少府監永樂大典卷一萬八千一百二十八王處直案薛史王處直傳永樂大典止存王都廢立之事而處直事闕佚今考舊唐書列傳云處直字允明處存母弟也初為定州後院軍都知兵馬使汴人入寇處直拒戰不利而退三軍大譟推處直為帥乃權知留後事汴將張存敬攻城梯衝雲合處直登城呼曰敝邑於朝廷未嘗不忠於藩隣未嘗失禮不虞君之涉吾地何也朱溫使人報之曰何以附太原而弱隣道處直報曰吾兄與太原同時立勳王室地又親隣修好往來常道也請從此改圖溫許之仍歸罪於孔目吏梁問出絹十萬匹牛酒以犒汴軍存敬修盟而退溫因表授旄鉞檢校左僕射天祐元年加太保封太原王後仕偽梁授北平王檢校太尉不數歲復歸於莊宗後十餘年為其子都廢歸私第尋卒年六十一王都本姓劉小字雲郎中山陘邑人也初有妖人李應之得於村落間李應之原本作鷹之今從通鑑改正影庫本粘籤養為己子及處直有疾應之以左道醫之不久病間處直神之待為羽人始假幕職出入無間漸署為行軍司馬軍府之事咸取決焉處直時未有子應之以都遺於處直曰此子生而有異因是都得為處直之子其後應之閱白丁於管內別置新軍起第於博陵坊面開一門動皆鬼道處直信重日隆將校相慮變在朝夕欲先事為難會燕師假道伏甲於外城以備不虞昧旦入郭諸校因引軍以圍其第應之死於亂兵咸云不見其屍衆不解甲乃逼牙帳請殺都處直堅靳之久乃得免翌日賞勞籍其兵於臥內自隊長已上記於別簿漸以佗事孥戮迨二十年別簿之記略無孑遺都既成長總其兵柄姦詐巧佞生而知之處直愛養漸有付託之意時處直諸子尚幼乃以都為節度副大使王郁者亦處直之孽子也案以下有闕文天祐十八年十二月莊宗親征鎮州敗契丹於沙河明年正月乘勝追敵過定州都馬前奉迎莊宗幸其府第曲宴都有愛女十餘歲莊宗與之論婚許為皇子繼岌妻之自是恩寵特異奏請無不從同光三年莊宗幸鄴都都來朝覲留宴旬日錫賚鉅萬遷太尉侍中時周玄豹見之曰形若鯉魚難免刀机及明宗嗣位加中書令然以其奪據父位深心惡之初同光中祁易二州刺史都奏部下將校為之不進戶口租賦自贍本軍天成初仍舊既而安重誨用事稍以朝政釐之時契丹犯塞諸軍多屯幽易間大將往來都陰為之備屢廢迎送漸成猜間和召訓為都籌畫曰案宋史趙上交傳作和少微舊五代史考異主上新有四海其勢易離可圖自安之計會朱守殷據汴州反鎮州節度使王建立與安重誨不協心懷怨嫉都陰知之乃遣人說建立謀叛建立偽許之密以狀聞都又與青徐岐潞梓五帥蠟書以離間之案通鑑作青徐潞益梓五帥胡三省注云是時青帥霍彥威徐帥房知溫潞帥毛璋益帥孟知祥梓帥董璋薛史有岐帥而無益帥與通鑑異歐陽史從薛史舊五代史考異三年四月制削都在身官爵遣宋州節度使王晏球率師討之都急與王郁謀引契丹為援洎王師攻城契丹將禿餒率騎萬人來援都與契丹合兵大戰於嘉山為王師所敗唯禿餒以二千騎奔入定州都仗之守城呼為餒王屈身瀝懇冀其盡力孤壘周年亦甚有備諸校或思歸嚮以其訪察嚴密殺人相繼人無宿謀故數構不就都好聚圖書自常山始破梁國初平令人廣將金帛收巿以得為務不責貴賤書至三萬卷名畫樂器各數百皆四方之精妙者萃於其府四年三月晏球拔定州時都校馬讓能降於曲陽門都巷戰而敗奔馬歸於府第縱火焚之府庫妻孥一夕俱燼唯擒禿餒幷其男四人弟一人獻於行在李繼陶者繼陶原本作繼陳今從北夢瑣言改正影庫本粘籤莊宗初略地河朔俘而得之收養於宮中故名曰得得天成初安重誨知其本末付段佪養之為兒佪知其不稱許其就便王都素蓄異志潛取以歸呼為莊宗太子及都叛遂僭其服裝時俾乘墉欲惑軍士人咸知其偽競詬辱之城陷晏球獲之拘送於闕下行至邢州遣使戮焉永樂大典卷六千八百五十史臣曰王鎔據鎮冀以稱王治將數世處直分易定以為帥亦既重侯一則惑佞臣而覆其宗一則嬖孽子而失其國其故何哉蓋富貴斯久仁義不修目眩於妖妍耳惑於絲竹故不能防姦於未兆察禍於未萌相繼敗亡又誰咎也永樂大典卷六千八百五十, WYG: 證}
  - {type: variant, offset: 1383, length: 3083, content: 異鎔既失燕軍之援會武皇出師以逼真定鎔遣使謝罪出絹二十萬匹及具牛酒犒軍自是與鎔修好如初洎梁祖兼有山東虎視天下鎔卑辭厚禮以通和好案新唐書羅紹威諷鎔絕太原共尊全忠鎔依違全忠不悅舊五代史考異光化三年秋梁祖將吞河朔乃親征鎮定縱其軍燔鎮之關城鎔謂賓佐曰事急矣謀其所向判官周式者周式原本作周成今據新唐書改正影庫本粘籤有口辯出見梁祖案新唐書李嗣昭攻洺州全忠自將擊走之得鎔與嗣昭書全忠怒引軍攻鎔周式請見全忠全忠即出書示式曰嗣昭在者宜速遣式曰王公所與和者息人鋒鏑間耳况繼奉天子詔和解能無一番紙墜北路乎太原與趙本無恩嗣昭庸肯入耶舊五代史考異梁祖盛怒逆謂式曰王令公朋附幷汾違盟爽信敝賦業已及此期於無捨式曰公為唐室之桓文當以禮義而成霸業反欲窮兵黷武天下其謂公何梁祖喜引式袂而慰之曰前言戲之耳即送牛酒貨幣以犒軍式請鎔子昭祚昭祚原本作昭胙今據五代會要改正影庫本粘籤及大將梁公儒李弘規子各一人往質於汴梁祖以女妻昭祚及梁祖稱帝鎔不得已行其正朔其後梁祖常慮河朔悠久難制會羅紹威卒因欲除移鎮定先遣親軍三千分據鎔深冀二郡以鎮守為名又遣大將王景仁李思安率師七萬營於柏鄉鎔遣使告急莊宗莊宗命周德威率兵應之鎔復奉唐朝正朔稱天祐七年及破梁軍於高邑我軍大振自是遣大將王德明率三十七都從莊宗征伐收燕降魏皆預其功然鎔未嘗親軍遠出八年七月鎔至承天軍與莊宗合宴同盟奉觴獻壽以申感概莊宗以鎔父友曲加敬異為之聲歌鎔亦報之謂莊宗為四十六舅中飲莊宗抽佩刀斷衿為盟許女妻鎔子昭誨因茲堅附於莊宗矣鎔自幼聰悟然仁而不武征伐出於下特以作藩數世專制四州高屏塵務不親軍政多以閹人秉權出納決斷悉聽所為皆雕靡第舍崇飾園池植奇花異木遞相誇尚人士皆褒衣博帶高車大蓋以事嬉遊藩府之中當時為盛案新唐書云鎔母何有婦德訓鎔嚴至母亡鎔始黷貨財此事薛史不載鎔宴安既久惑於左道專求長生之要常聚緇黃合鍊仙丹或講說佛經親受符籙西山多佛寺又有王母觀鎔增置館宇雕飾土木道士王若訥者誘鎔登山臨水訪求仙迹每一出數月方歸百姓勞弊王母觀石路既峻不通輿馬每登行命僕妾數十人維錦繡牽持而上有閹人石希蒙者姦寵用事為鎔所嬖與之臥起天祐八年冬十二月鎔自西山迴宿於鶻營莊鶻營莊原本作體榮莊今從通鑑改正影庫本粘籤將歸府第希蒙勸之佗所宦者李弘規謂鎔曰方今晉王親當矢石櫛沐風雨王殫供軍之租賦為不急之遊盤世道未夷人心多梗久虛府第遠出遊從如樂禍之徒翻然起變拒門不納則王欲何歸鎔懼促歸希蒙譖弘規專作威福多蓄猜防鎔由是復無歸志弘規聞之怒使親事偏將蘇漢衡率兵擐甲遽至鎔前抽戈露刃謂鎔曰軍人在外已久願從王歸弘規進曰石希蒙說王遊從勞弊士庶又結構陰邪將為大逆臣已偵視情狀不虛請王殺之以除禍本鎔不聽弘規因命軍士聚譟斬希蒙首抵於前鎔大恐遂歸是日令其子昭祚與張文禮以兵圍李弘規及行軍司馬李藹宅並族誅之詿誤者凡數十家又殺蘇漢衡收部下偏將下獄窮其反狀親軍皆恐復不時給賜衆益懼文禮因其反側密諭之曰王此夕將坑爾曹宜自圖之衆皆掩泣相謂曰王待我如是我等焉能効忠是夜親事軍十餘人自子城西門踰垣而入鎔方焚香受籙軍士二人突入斷其首袖之而出遂焚其府第煙燄亙天兵士大亂鎔姬妾數百皆赴水投火而死軍校有張友順者張友順原本作文順今從通鑑改正影庫本粘籤率軍人至張文禮之第請為留後遂盡殺王氏之族鎔於昭宗朝賜號敦睦保定久大功臣位至成德軍節度使守太師中書令趙王梁祖加尚書令初鎔之遇害不獲其屍及莊宗攻下鎮州鎔之舊人於所焚府第灰間方得鎔之殘骸莊宗命幕客致祭葬於王氏故塋鎔長子昭祚亂之翌日張文禮索之斬於軍門次子昭誨當鎔被禍之夕昭誨為軍人攜出府第置之地穴十餘日乃髠其髮被以僧衣屬湖南綱官李震南還軍士以昭誨託於震震置之茶褚中既至湖湘乃令依南嶽寺僧習業歲給其費昭誨年長思歸震即齎送而還時鎔故將符習為汴州節度使會昭誨來投即表其事曰故趙王王鎔小男昭誨年十餘歲遇禍為人所匿免今尚為僧名崇隱謹令赴闕明宗賜衣一襲令脫僧服頃之昭誨稱前成德軍中軍使檢校太傅詣中書陳狀特授朝議大夫檢校考功郎中司農少卿賜金紫符習因以女妻之其後累歷少列周顯德中遷少府監永樂大典卷一萬八千一百二十八王處直案薛史王處直傳永樂大典止存王都廢立之事而處直事闕佚今考舊唐書列傳云處直字允明處存母弟也初為定州後院軍都知兵馬使汴人入寇處直拒戰不利而退三軍大譟推處直為帥乃權知留後事汴將張存敬攻城梯衝雲合處直登城呼曰敝邑於朝廷未嘗不忠於藩隣未嘗失禮不虞君之涉吾地何也朱溫使人報之曰何以附太原而弱隣道處直報曰吾兄與太原同時立勳王室地又親隣修好往來常道也請從此改圖溫許之仍歸罪於孔目吏梁問出絹十萬匹牛酒以犒汴軍存敬修盟而退溫因表授旄鉞檢校左僕射天祐元年加太保封太原王後仕偽梁授北平王檢校太尉不數歲復歸於莊宗後十餘年為其子都廢歸私第尋卒年六十一王都本姓劉小字雲郎中山陘邑人也初有妖人李應之得於村落間李應之原本作鷹之今從通鑑改正影庫本粘籤養為己子及處