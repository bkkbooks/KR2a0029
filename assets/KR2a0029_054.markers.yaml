  - {type: variant, offset: 728, length: 371, content: 考異鎔以匡威因己而失國又感其援助之力事之如父五月鎔謁匡威於其館匡威陰遣部下伏甲劫鎔抱持之鎔曰公戒部人勿造次吾國為晉人所侵垂將覆滅賴公濟援之力幸而獲存今日之事本所甘心即並轡歸府舍鎔軍拒之竟殺匡威鎔本疏瘦時年始十七當與匡威並轡之時電雨驟作屋瓦皆飛有一人於缺垣中望見鎔鎔就之遽挾於馬上肩之而去翌日鎔但覺項痛頭偏蓋因為有力者所挾不勝其苦故也既而訪之則曰墨君和墨君和原本作君私考通鑑及北夢瑣言諸書俱作君和今改正影庫本粘籤乃鼓刀之士也遂厚賞之案太平廣記引劉氏耳目記云真定墨君和幼名三旺眉目稜岸肌膚若鐵年十五六趙王鎔初即位曾見之悅而問曰此中何得崑崙兒也問其姓與形質相應即呼為墨崑崙因以皂衣賜之是時常山縣邑屢為幷州中軍所侵掠趙之將卒疲于戰敵告急于燕王李匡威率師五萬來救之幷人攻陷數城燕王聞之躬領五萬騎徑與晉師戰于元氏晉師敗績趙王感燕王之德椎牛灑酒大犒于城輦金, WYG: 巻}
