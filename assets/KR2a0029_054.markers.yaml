  - {type: variant, offset: 721, length: 3, content: 梅子園, WYG: 雲陽辛亥引兵東歸無緣得有六十日也歐陽史誤天祐二年春契丹按巴堅領部族三十萬至雲州與武皇㑹于雲州之東案武皇會契丹于雲州通鑑作開平元年新唐書作天祐元年與是書異歐陽史與是書同又契丹國志作晉王李存勗與契丹連和㑹于東城殊誤梁祖以懐英無功乃以李思安代之案李思安之代懐英通鑑作七月事與是書繫五月異按巴堅舊作阿保機今改}
