  - {type: variant, offset: 40, length: 245, content: 王武俊為騎將武俊嘉其勇幹畜為假子號王五哥其後子孫以王為氏四代祖廷湊事鎮帥王承宗為牙將長慶初承宗卒穆宗命田弘正為成德軍節度使既而鎮人殺弘正推廷湊為留後朝廷不能制因以旄鉞授之廷湊卒子元逵尚文宗女壽安公主元逵卒子紹鼎立紹鼎卒子景崇立案新唐書藩鎮傳紹鼎卒子幼未能事以元逵次子紹懿為留後紹懿卒乃復授紹鼎子景崇與薛史異皆世襲鎮州節度使並前史有傳景崇位至太尉中書令封常山王中和二年卒鎔即景崇之子也年十歲三軍推襲父位大順中武皇將李存孝既平邢洺因獻謀於武皇欲兼幷鎮定乃連年出師以擾鎮之屬邑鎔苦之遣使求救於幽州, WYG: ''}
