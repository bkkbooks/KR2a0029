  - {type: variant, offset: 1101, length: 281, content: 萬以謝之燕王歸國比及境上為其弟匡儔所拒趙人以其有德于我遂營東圃以居之燕王自以失國又見趙王之幼乃圖之遂伏甲俟趙王旦至即使擒之趙王請曰某承先代基構主此山河每被鄰寇侵漁困于守備賴大王武略累挫戎鋒獲保宗祧實資恩力顧惟幼懦夙有卑誠望不匆匆可伸交讓願與大王同歸衙署即軍府必不拒違燕王以為然遂與趙王並轡而進俄有大風幷黑雲起于城上大雨雷電至東角門內有勇夫袒臂旁來拳毆燕之介士即挾負趙王踰垣而走遂得歸公府問其姓名君和恐其難記但言曰硯中之物王心志之左右軍士既見主免難遂逐燕王燕王退走于東圃趙人圍而殺之趙王既免燕王之難召墨生以千金賞之兼賜上第一區良田萬畝仍恕其十死奏授光祿大夫舊五代史, WYG: 六}
