  - {type: variant, offset: 25, length: 5, content: 遠祖沒諾干, WYG: 通鑑云三月克用王處存合兵攻王鎔癸丑拔天長鎮戊午鎔與戰於新市大破之辛酉克用退屯欒城是進師退師皆在三月也是書作三月進軍四月班師與諸書異十月邢州李存孝叛納欵于梁李存信搆之也案舊}
  - {type: variant, offset: 25, length: 5, content: 遠祖沒諾干, krp: 通鑑云三月克用王處存合兵攻王鎔癸丑拔天長鎮戊午鎔與戰於新市大破之辛酉克用退屯欒城是進師退師皆在三月也是書作三月進軍四月班師與諸書異十月邢州李存孝叛納欵于梁李存信搆之也案舊}
