  - {type: substitution, offset: 20, original: 迴, replacement: 回, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3886}}
  - {type: variant, offset: 24, length: 0, content: '', WYG: 之援率兵十餘萬攻邢州之堯山案舊唐書作大順二年王鎔援邢州屯于堯山攷此時邢州未叛於晉不得王鎔之援師葢即景福元年事誤移於前一年耳歐陽史及通鑑俱與是書同三月武皇進軍渡滹沱攻欒城下鼓城槀城四月燕軍冦雲代武皇班師案舊唐書作景福元年二月庚寅太原易定之兵合勢攻鎮州三月克用處存斂軍而退是興師以二月至三月始旋師}
