  - {type: variant, offset: 31, length: 5, content: 至德中事鎮, WYG: 書大順元年十一月癸丑朔太原將邢州刺史李存孝自恃擒孫揆功合爲昭義帥怨克用授康君立存孝自晉州率行營兵歸邢州據城上表歸朝仍致書張濬王鎔求援今攷是書大順二年存孝始爲邢州節度無由于元年冬得據邢州也新唐書歐陽史通鑑並從是書作景福元年十月武皇表馬師素爲邢}
