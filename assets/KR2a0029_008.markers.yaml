  - {type: variant, offset: 872, length: 1630, content: 據通鑑增入舊五代史考異朱珪等十七日象先引禁軍千人突入宮城遂誅友珪事定象先遣趙巖齎傳國寶至東京請帝即位於洛陽帝報之曰夷門太祖創業之地居天下之衝北拒幷汾東至淮海國家藩鎮多在厥東命將出師利於便近若都洛下非良圖也公等如堅推戴冊禮宜在東京賊平之日即謁洛陽陵廟是月帝即位於東京乃去友珪偽號稱乾化三年詔曰我國家賞功罰罪必叶朝章報德伸寃敢欺天道苟顯違于法制雖暫滯於歲時終振大綱須歸至理重念太祖皇帝嘗開霸府有事四方迨建皇朝載遷都邑每以主留重務居守難才慎擇親賢方膺寄任寄任原本作奇任今據文改正影庫本粘籤故博王友文才兼文武識達古今俾分憂於在浚之郊亦共理於興王之地一心無易二紀于茲嘗施惠於士民實有勞於家國去歲郢王友珪常懷逆節已露凶鋒將不利於君親欲竊窺於神器此際值先皇寢疾大漸日臻博王乃密上封章請嚴宮禁因以萊州刺史授於郢王友珪纔覩宣頭俄行大逆豈有自縱兵於內殿却翻事於東都又矯詔書枉加刑戮仍奪博王封爵又改姓名寃恥兩深欺誑何極伏賴上玄垂祐宗社降靈俾中外以叶謀致遐邇之共怒尋平內難獲勦元凶既雪恥於同天且免譏於共國朕方期遁世敢竊臨人遽迫推崇爰膺纘嗣寃憤既伸於幽顯霈澤宜及於下泉博王宜復官爵仍令有司擇日歸葬云三月丁未制曰朕仰膺天睠近雪家讎案原本脫家字今據冊府元龜增入舊五代史考異旋聞將相之謀請紹祖宗之業羣情見迫三讓莫從祗受推崇懼不負荷方欲烝嘗寢廟禋類郊丘合徵文體之辭用表事神之敬其或於文尚淺在理未周亦冀隨時別圖制義雖臣子行孝重更名於已孤而君父稱尊貴難知而易避今則虔遵古典詳考前聞允諧龜筮之占庶合帝王之道載惟涼德尤愧嘉名中外羣僚當體朕意宜改名鍠庚戌以天雄軍節度使充潞州行營都招討使開府儀同三司檢校太尉兼侍中弘農郡王楊師厚為檢校太師兼中書令進封鄴王壬戌以夏州節度使檢校太尉同平章事李仁福為檢校太師進封隴西郡王戊辰以邢州保義軍留後檢校太保戴思遠為檢校太傅充邢州節度使庚午以鎮東軍節度副使充兩浙西面都指揮使行睦州刺史馬綽為檢校太傅同平章事領秦州雄武軍節度使進封開國侯是月文武百官上言請以九月十二日帝降誕日為明聖節休假三日從之夏四月癸未以西京內外諸軍馬步軍都指揮使檢校司徒左龍虎統軍濮陽開國侯袁象先案原本濮陽作博陽今據象先本傳改正舊五代史考異為特進檢校太保同平章事充鎮南軍節度江南西道觀察處置等使開封尹判在京馬步諸軍事進封開國公增食邑一千戶丁酉宣義軍節度副大使知節度事鄭滑濮等州觀察使檢校太傅長沙郡開國公羅周翰加特進駙馬都尉五月乙巳天雄軍節度使楊師厚及劉守奇率魏博邢洺徐兗鄆滑之衆十萬討鎮州庚戌營於鎮之南門外壬子晉將史建瑭自趙州領騎五百入于鎮州師厚知其有備自九門移軍於下博劉守奇以一軍自貝州掠冀州衡水阜城陷下博師厚自弓高渡御河迫滄州張萬進懼案原本滄州作涼州考歐陽史劉守光傳張萬進乃滄州守將今改舊五代史考異送款師厚表請以萬進為青州節度使以劉守奇為滄州節度使詔曰太祖皇帝六月二日大忌朕聞姬周已還並用通喪之禮炎漢之後方行易月之儀歷代相沿萬幾斯重遂為故實難遽改更朕頃遘家寃近平內難臨祥制俯迫忌辰音容永遠而莫追號感彌深而難抑將欲表宅憂於中禁是宜輟聽政於外朝雖異常儀願申罔極宜輟五月二十二日至六月二十九日朝參軍機急切公事即不得留滯並仰畫時聞奏施行宰臣文武百官三上表以國忌廢務多日請依舊制詔報曰朕聞禮非天降固可酌於人情事繫孝思諒無妨於國體今以甫臨忌日暫輟視朝冀全哀感之情用表始終之節宰臣等累陳章表備述古今慮以萬幾之繁議以五月之請雖茲懇切難盡允俞况保身方荷於洪基敢言過毀而權制獲申於至性必在得中宜自今月二十九日輟至六月七日無煩抑請深體朕懷六月戊子以滄州順化軍節度使幷潞鎮定副招討使檢校太傅同平章事張萬進為青州節度使案原本順化作順俟今據通鑑注滄州為順化軍改正又青州通鑑作平盧考後文是時賀德倫為平盧節度使當從薛史作青州為是舊五代史考異秋九月甲辰以光祿大夫守御史大夫吳興郡開國侯姚洎為中書侍郎平章事十二月庚午以前鄆州節度檢校司徒食邑二千戶福王友璋為許州節度使檢校太保是月晉王收幽州執偽燕主劉守光及其父仁恭歸晉陽乾化四年春正月壬寅, WYG: 増}
