  - {type: variant, offset: 342, length: 523, content: 帝以誠款謀之巖曰此事易如反掌成敗在招討楊令公之手但得一言諭禁軍其事立辦巖時典禁軍洎還洛以謀告侍衞親軍袁象先帝令腹心馬慎交之魏州見師厚且言成事之日賜勞軍錢五十萬緡仍許兼鎮慎交燕人也素有膽辨乃說師厚曰乃說師厚原本衍既字今據文刪去影庫本粘籤郢王殺君害父篡居大位宮中荒淫靡所不至洛下人情已去東京物望所歸公若因而成之則有輔立之功討賊之効師厚猶豫未决謂從事曰吾於郢王君臣之分已定無故改圖人謂我何慎交曰郢王以子弒父是曰元凶均王為君為親正名仗義彼若一朝事成令公何情自處師厚驚曰幾悞計耳乃令小校王舜賢至洛密與趙巖袁象先圖議時有左右龍驤都在東京帝偽作友珪詔遣還洛下先是劉重遇部下龍驤一指揮於懷州叛經年搜捕其黨帝因遣人激怒其衆曰郢王以龍驤軍嘗叛追汝等洛下將盡坑之翌日乃以偽詔示之案通鑑考異云梁太祖實錄丙戌東京言龍驤軍准詔追赴西京軍情不肯進發實友珪徵之非友貞偽作但激怒言坑之耳諸軍憂恐將校垂泣告帝乞指生路帝諭之曰先帝三十餘年經營社稷千征萬戰爾等皆曾從行今日先帝尚落人奸計爾等安所逃避因出梁祖御像以示諸將帝歔欷而泣曰郢王賊害君父違天逆地復欲屠滅親軍爾等苟能自趨洛陽擒取逆豎告謝先帝即轉禍為福矣衆踊躍曰王言是也皆呼萬歲請帝為主時友珪改元之二月十五日也帝乃遣人告趙巖袁象先傅暉, WYG: ''}
