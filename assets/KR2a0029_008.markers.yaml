  - {type: variant, offset: 3027, length: 3877, content: 月辛酉朔以天平軍節度副大使知節度事兼淮南西北面行營招討應接等使檢校太傅同平章事牛存節為檢校太尉加食邑一千戶賞平徐之功也丁卯以右僕射兼門下侍郎同平章事監修國史判度支趙光逢案原本逢作逯今據唐書列傳改正舊五代史考異為太子太保致仕魏博節度使楊師厚薨輟視朝三日初師厚握強兵據重鎮每邀朝廷姑息及薨輟視朝三日或者以為天意租庸使趙巖租庸判官邵贊獻議於帝曰魏博六州精兵數萬𢀿害唐室百有餘年羅紹威前恭後倨太祖每深含怒太祖尸未屬纊師厚即肆陰謀蓋以地廣兵強得肆其志不如分削使如身使臂即無不從也陛下不以此時制之寧知後人之不為楊師厚耶若分割相魏為兩鎮則朝廷無北顧之患矣案通鑑考異引莊宗列傳宰相敬翔與趙巖邵贊同議薛史無敬翔名通鑑從薛史帝曰善即以平盧軍節度使賀德倫為天雄軍節度使遣劉鄩率兵六萬屯河朔詔曰分疆裂土雖賞勳勞建節屯師亦從機便比者魏博一鎮巡屬六州為河朔之大藩實國家之巨鎮所分憂寄允謂重難將叶事機須期通濟但緣鎮定賊境最為魏博親鄰其次相衞兩州皆控澤潞山口兩道並連於晉土分頭常寇於魏封既須日有戰爭案原本脫戰爭二字今據冊府元龜增入舊五代史考異未若俱分節制免勞兵力因奔命於兩途稍泰人心俾安居於終日其相州宜建節度為昭德軍以澶衞兩州為屬郡以張筠為相州節度使己丑魏博軍亂囚節度使賀德倫是時朝廷既分魏博六州為兩鎮命劉鄩統大軍屯于南樂以討王鎔為名遣澶州刺史行營先鋒步軍都指揮使王彥章領龍驤五百騎先入於魏州屯於金波亭詔以魏州軍兵之半隸于相州幷徙其家焉又遣主者檢察魏之帑廩既而德倫促諸軍上路姻族辭決哭聲盈巷其徒乃相聚而謀曰朝廷以我軍府強盛故設法殘破況我六州歷代藩府軍門父子姻族相連未嘗遠出河門離親去族一旦遷於外郡生不如死三月二十九日夜魏軍乃作亂放火大掠首攻龍驤軍王彥章斬關而遁遲明殺德倫親軍五百餘人於牙城執德倫置之樓上有効節軍校張彥者最為粗暴膽氣伏人乃率無賴輩數百止其剽掠是日魏之士庶被屠戮者不可勝紀帝聞之遣使齎詔安撫案通鑑夏四月帝遣供奉官扈異撫諭魏軍仍許張彥除郡厚賜將士優賞彥等不遜投詔於地侮罵詔使因迫德倫飛奏請却復相衞抽退劉鄩軍帝復遣諭曰制置已定不可改易如是者三彥等奮臂南向而罵曰傭保兒敢如是也復迫德倫列其事時有文吏司空頲者甚有筆才彥召見謂曰為我更草一狀詞宜抵突如更敢違則渡河擄之乃奏曰臣累拜封章上聞天聽在軍衆無非共切何朝廷皆以為閑半月三軍切切而戈矛未息一城生聚皇皇而控告無門惟希俯鑒丹衷苟從衆欲須垂聖允斷在不疑如或四向取謀但慮六州俱失言非意外事在目前張彥又以楊師厚先兼招討使請朝廷依例授之故復逼德倫奏曰臣當道兵甲素精貔貅極銳下視幷汾之敵平吞鎮定之人特乞委臣招討之權試臣湯火之節苟無顯効任賜明誅詔報曰魏博寇敵接連封疆懸遠凡於應赴須在師徒是以別建節旄各令捍禦幷鎮則委魏博控制澤潞則遣相衞枝梧咸逐便安貴均勞逸已定不移之制宜從畫一之規至於征伐事權亦無定例且臨清王領鎮之日臨清王原本作臨清生考舊唐書魏博節度使羅宏信封臨清王今改正影庫本粘籤羅紹威守藩以來所領事銜本無招討祇自楊師厚先除陝滑二帥皆以招討兼權因茲帶過鄴中原本不曾落下苟循事體寧吝施行況今劉鄩指鎮定出征康懷英往邠岐進討祇令統帥師旅亦無招討使銜切宜徧諭羣情勿興浮議倚注之意卿宜體之詔至張彥壞裂抵之於地謂德倫曰梁主不達時機聽人穿鼻城中擾攘未有所依我甲兵雖多須資勢援河東晉王統兵十萬匡復唐朝世與大梁仇讎若與我同力事無不濟請相公改圖以求多福德倫不得已而從之乃遣牙將曹廷隱廷隱原本作延隱今據曹廷隱本傳改正影庫本粘籤奉書求援於太原彥使德倫告諭軍城曰可依河東稱天祐十二年此後如有人將文字於河南往來便仰所在處置是月邠州留後李保衡以城歸順案通鑑考異引蜀書劉知俊傳保衡作彥康蓋保衡為楊崇本養子故名彥康迨殺其子彥魯而降梁始復其本姓名也五代春秋歐陽史通鑑俱從薛史作保衡保衡楊崇本養子也崇本乃李茂貞養子任邠州二十餘年去歲為其子彥魯所毒彥魯領知州事五十餘日保衡殺彥魯送款於帝即以保衡為華州節度使以河陽留後霍彥威為邠州節度使五月晉王率師赴魏州節度使牛存節薨是月鳳翔李茂貞遣偽署涇州節度使劉知俊率師攻邠州以李保衡歸順故也自是凡攻圍十四月節度使霍彥威諸軍都指揮使黃貴堅守捍寇會救軍至岐人乃退六月庚寅晉王入魏州以賀德倫為大同軍節度使舉族遷於晉陽是月晉人陷德州秋七月又陷澶州刺史王彥章棄城來奔案通鑑晉人夜襲澶州刺史王彥章在劉鄩營晉人獲其妻子薛史王彥章傳亦云晉人攻陷澶州彥章舉家陷沒是澶州陷時彥章未嘗在城也是月劉鄩自洹水潛師由黃澤路西趨晉陽至樂平縣值霖雨積旬乃班師還次宗城遂至貝州軍於堂邑遇晉軍轉鬬數十里晉軍稍退翌日鄩移軍于莘八月賀瓌收復澶州九月以行營先鋒步軍都指揮使行澶州刺史檢校太保王彥章為汝州防禦使案原本汝州作許州今據通鑑改正舊五代史考異依前行營先鋒步軍都指揮使壬午正衙命使冊德妃張氏是夕妃薨冬十月辛亥康王友孜謀反案通鑑友孜作友敬與薛史異舊五代史考異伏誅是夕帝於寢殿熟寐忽聞御榻上寶劍有聲帝遽起視之而友孜之黨已入於宮中帝揮之獲免案清異錄末帝夜于寢間擒刺客乃康王友孜所遣帝自戮之造雲母匣貯所用劍名匣曰護聖將軍之館舊五代史考異壬子葬德妃張氏十一月乙丑改乾化五年為貞明元年案吳越備史作正月壬辰朔改元大赦歐陽史五代春秋及通鑑俱從薛史作十一月舊五代史考異十二月乙未詔昇華原縣為崇州靜勝軍以美原縣為裕州以為屬郡以偽命義勝軍節度使鼎耀等州觀察使特進檢校太保同平章事李彥韜為特進檢校太傅同平章事充靜勝軍節度使崇裕等州觀察使河內郡開國侯仍復本姓溫名昭圖昭圖華原賊帥也李茂貞以為養子以華原為耀州美原為鼎州偽命昭圖為節度使至是歸款故有是命貞明二年春正月庚申以皇伯父宋州節度使開府儀同三司檢校太師兼中書令廣王全昱為守中書令餘如故案通鑑二年春正月宣武節度使守中書令廣德靖王全昱卒舊五代史考異以浙江東道營田副使檢校太傅前常州刺史杜建徽遙領涇州節度使二月丙申右僕射門下侍郎平章事諸道鹽鐵轉運等使楊涉罷相守左僕射涉累上章以疾辭位故有是命是月命許州節度使王檀河陽節度使謝彥章汝州防禦使王彥章率師自陰地關抵晉陽急攻其壘不克而旋三月劉鄩率師與晉王大戰於故元城鄩軍敗績先是鄩駐於莘帝以河朔危急師老於外餉饋不充遣使賜鄩詔微有責讓鄩奏以寇勢方盛未可輕動帝又問鄩決勝之策鄩奏曰但人給糧十斛盡則破敵帝不悅復遣促戰鄩召諸將會議諸將欲戰鄩默然一日引軍攻鎮定之營彼衆大駭上下騰亂俘斬甚衆時帝遣偏將楊延直領軍萬餘人屯澶州以應鄩楊延直原本作廷直今據歐陽史改正影庫本粘籤既而晉王詐言歸太原劉鄩以為信是月召楊延直會于魏城下鄩自莘率軍亦至與延直會既而晉王自貝州至鄩引軍漸退至故元城西與晉人決戰大為其所敗追襲至河上軍士赴水死者甚衆鄩自黎陽濟河奔滑州己巳制以鄩為滑州宣義軍節度副大使知節度事晉人攻衞州陷之又陷惠州夏四月乙酉朔威武軍節度使守太傅兼中書令閩王王審知賜號忠勤保安興國功臣餘如故晉人陷洺州癸卯夜捉生都將李霸作亂龍驤都將杜晏球討平之時遣捉生軍千人戍楊劉軍出宋門外是夜由水門復入二鼓大譟火發燭城李霸與其徒燔建國門不克龍驤都將杜晏球屯鞠場聞亂兵至率騎擊之亂軍退走馬登建國門晏球奏曰亂者惟李霸一軍但守宮城遲明臣必破之未明晏球誅霸及其同惡京師方定是月以行營先鋒步軍都指揮使汝州防禦使王彥章為鄭州防禦使依前先鋒步軍都指揮使五月晉軍還太原六月晉人急攻邢州帝遣捉生都將張溫率步騎五百人入于邢州張溫原本作章溫今據歐陽史及通鑑改正影庫本粘籤至內黃溫率衆降於晉人秋七月甲寅朔晉王自太原至魏州節度使張筠棄城奔京師邢州節度使閻寶以城降於晉王壬戌以淮南鎮海鎮東等軍節度使充淮南宣潤等道四面行營都統開府儀同三司尚父守尚書令吳越王錢鏐為諸道兵馬元帥餘如故以左僕射楊涉為太子太傅致仕八月丁酉以開府儀同三司太子太保致仕趙光逢為司空兼門下侍郎平章事弘文館大學士延資庫使延資庫使原本作延貨考五代會要五代承唐制多以宰相兼領延資庫使今改正影庫本粘籤充諸道鹽鐵轉運使九月晉王還太原滄州節度使戴思遠棄城來奔晉人陷貝州案歐陽史作晉人克貝州守將張源德死之又死事傳云貝人勸源德出降源德不從遂見殺通鑑考異引莊宗實錄源德聞河北皆平有翻然之志謀於衆衆懼其歸罪因殺源德是源德之死傳聞異詞故薛史不取舊五代史考異歐陽史本紀二年九月晉人克貝州守將張源德死之又死事傳略云太祖時源德自金吾衞將軍為蔡州刺史貞明元年魏博節度使楊師厚卒末帝分魏相等六州為兩鎮遣劉鄩將兵萬人屯于魏魏軍叛降晉源德為鄩守貝州晉王入魏諸將欲先擊貝州晉王曰貝城小而堅攻之難卒下乃先襲破德州然以兵五千攻源德源德堅守不下晉軍塹而圍之已而劉鄩大敗于故元城南走黎陽六鎮數十州之地皆歸晉獨貝一州圍之踰年不可下源德守既堅而貝人聞晉已盡有河北城中食且盡乃勸源德出降源德不從遂見殺殿本通鑑考異引莊宗實錄云賊將張源德固守貝州既聞河北皆平而有翻然之志詢謀於衆羣賊皆河南人懼其歸罪不從因殺源德噉人為糧因守其城王師歷年攻圍賊既食竭呼我大將曰今欲請罪懼晉王不我赦請衿甲持兵而見已即解之如何報曰無便於此者賊衆三千衿甲出降我將甘言喻之俱釋兵解甲既而四面陳兵殺之與歐陽史異今考歐陽史多前後互異如魏博軍亂本紀作元年傳作三年張源德死紀作二年據傳當在四年紀傳自相矛盾恐不足據薛史不載張源德事附識於此孔本己卯天平軍節度副大使知節度事檢校太師兼中書令瑯琊郡王王檀薨案五代春秋作盜殺鄆州王檀舊五代史考異十月丁酉以開府儀同三司中書侍郎兼吏部尚書同平章事集賢殿大學士判戶部敬翔為右僕射兼門下侍郎平章事監修國史判度支以光祿大夫中書侍郎同平章事鄭王玉為特進兼刑部尚書平章事集賢殿大學士判戶部十月晉王自太原至魏州是月前昭義軍節度使檢校太師兼侍中陳留郡王葛從周薨是歲河北諸州悉入於晉永樂大典卷六千六百五, WYG: 攷證}
  - {type: variant, offset: 3027, length: 3877, content: 月辛酉朔以天平軍節度副大使知節度事兼淮南西北面行營招討應接等使檢校太傅同平章事牛存節為檢校太尉加食邑一千戶賞平徐之功也丁卯以右僕射兼門下侍郎同平章事監修國史判度支趙光逢案原本逢作逯今據唐書列傳改正舊五代史考異為太子太保致仕魏博節度使楊師厚薨輟視朝三日初師厚握強兵據重鎮每邀朝廷姑息及薨輟視朝三日或者以為天意租庸使趙巖租庸判官邵贊獻議於帝曰魏博六州精兵數萬𢀿害唐室百有餘年羅紹威前恭後倨太祖每深含怒太祖尸未屬纊師厚即肆陰謀蓋以地廣兵強得肆其志不如分削使如身使臂即無不從也陛下不以此時制之寧知後人之不為楊師厚耶若分割相魏為兩鎮則朝廷無北顧之患矣案通鑑考異引莊宗列傳宰相敬翔與趙巖邵贊同議薛史無敬翔名通鑑從薛史帝曰善即以平盧軍節度使賀德倫為天雄軍節度使遣劉鄩率兵六萬屯河朔詔曰分疆裂土雖賞勳勞建節屯師亦從機便比者魏博一鎮巡屬六州為河朔之大藩實國家之巨鎮所分憂寄允謂重難將叶事機須期通濟但緣鎮定賊境最為魏博親鄰其次相衞兩州皆控澤潞山口兩道並連於晉土分頭常寇於魏封既須日有戰爭案原本脫戰爭二字今據冊府元龜增入舊五代史考異未若俱分節制免勞兵力因奔命於兩途稍泰人心俾安居於終日其相州宜建節度為昭德軍以澶衞兩州為屬郡以張筠為相州節度使己丑魏博軍亂囚節度使賀德倫是時朝廷既分魏博六州為兩鎮命劉鄩統大軍屯于南樂以討王鎔為名遣澶州刺史行營先鋒步軍都指揮使王彥章領龍驤五百騎先入於魏州屯於金波亭詔以魏州軍兵之半隸于相州幷徙其家焉又遣主者檢察魏之帑廩既而德倫促諸軍上路姻族辭決哭聲盈巷其徒乃相聚而謀曰朝廷以我軍府強盛故設法殘破況我六州歷代藩府軍門父子姻族相連未嘗遠出河門離親去族一旦遷於外郡生不如死三月二十九日夜魏軍乃作亂放火大掠首攻龍驤軍王彥章斬關而遁遲明殺德倫親軍五百餘人於牙城執德倫置之樓上有効節軍校張彥者最為粗暴膽氣伏人乃率無賴輩數百止其剽掠是日魏之士庶被屠戮者不可勝紀帝聞之遣使齎詔安撫案通鑑夏四月帝遣供奉官扈異撫諭魏軍仍許張彥除郡厚賜將士優賞彥等不遜投詔於地侮罵詔使因迫德倫飛奏請却復相衞抽退劉鄩軍帝復遣諭曰制置已定不可改易如是者三彥等奮臂南向而罵曰傭保兒敢如是也復迫德倫列其事時有文吏司空頲者甚有筆才彥召見謂曰為我更草一狀詞宜抵突如更敢違則渡河擄之乃奏曰臣累拜封章上聞天聽在軍衆無非共切何朝廷皆以為閑半月三軍切切而戈矛未息一城生聚皇皇而控告無門惟希俯鑒丹衷苟從衆欲須垂聖允斷在不疑如或四向取謀但慮六州俱失言非意外事在目前張彥又以楊師厚先兼招討使請朝廷依例授之故復逼德倫奏曰臣當道兵甲素精貔貅極銳下視幷汾之敵平吞鎮定之人特乞委臣招討之權試臣湯火之節苟無顯効任賜明誅詔報曰魏博寇敵接連封疆懸遠凡於應赴須在師徒是以別建節旄各令捍禦幷鎮則委魏博控制澤潞則遣相衞枝梧咸逐便安貴均勞逸已定不移之制宜從畫一之規至於征伐事權亦無定例且臨清王領鎮之日臨清王原本作臨清生考舊唐書魏博節度使羅宏信封臨清王今改正影庫本粘籤羅紹威守藩以來所領事銜本無招討祇自楊師厚先除陝滑二帥皆以招討兼權因茲帶過鄴中原本不曾落下苟循事體寧吝施行況今劉鄩指鎮定出征康懷英往邠岐進討祇令統帥師旅亦無招討使銜切宜徧諭羣情勿興浮議倚注之意卿宜體之詔至張彥壞裂抵之於地謂德倫曰梁主不達時機聽人穿鼻城中擾攘未有所依我甲兵雖多須資勢援河東晉王統兵十萬匡復唐朝世與大梁仇讎若與我同力事無不濟請相公改圖以求多福德倫不得已而從之乃遣牙將曹廷隱廷隱原本作延隱今據曹廷隱本傳改正影庫本粘籤奉書求援於太原彥使德倫告諭軍城曰可依河東稱天祐十二年此後如有人將文字於河南往來便仰所在處置是月邠州留後李保衡以城歸順案通鑑考異引蜀書劉知俊傳保衡作彥康蓋保衡為楊崇本養子故名彥康迨殺其子彥魯而降梁始復其本姓名也五代春秋歐陽史通鑑俱從薛史作保衡保衡楊崇本養子也崇本乃李茂貞養子任邠州二十餘年去歲為其子彥魯所毒彥魯領知州事五十餘日保衡殺彥魯送款於帝即以保衡為華州節度使以河陽留後霍彥威為邠州節度使五月晉王率師赴魏州節度使牛存節薨是月鳳翔李茂貞遣偽署涇州節度使劉知俊率師攻邠州以李保衡歸順故也自是凡攻圍十四月節度使霍彥威諸軍都指揮使黃貴堅守捍寇會救軍至岐人乃退六月庚寅晉王入魏州以賀德倫為大同軍節度使舉族遷於晉陽是月晉人陷德州秋七月又陷澶州刺史王彥章棄城來奔案通鑑晉人夜襲澶州刺史王彥章在劉鄩營晉人獲其妻子薛史王彥章傳亦云晉人攻陷澶州彥章舉家陷沒是澶州陷時彥章未嘗在城也是月劉鄩自洹水潛師由黃澤路西趨晉陽至樂平縣值霖雨積旬乃班師還次宗城遂至貝州軍於堂邑遇晉軍轉鬬數十里晉軍稍退翌日鄩移軍于莘八月賀瓌收復澶州九月以行營先鋒步軍都指揮使行澶州刺史檢校太保王彥章為汝州防禦使案原本汝州作許州今據通鑑改正舊五代史考異依前行營先鋒步軍都指揮使壬午正衙命使冊德妃張氏是夕妃薨冬十月辛亥康王友孜謀反案通鑑友孜作友敬與薛史異舊五代史考異伏誅是夕帝於寢殿熟寐忽聞御榻上寶劍有聲帝遽起視之而友孜之黨已入於宮中帝揮之獲免案清異錄末帝夜于寢間擒刺客乃康王友孜所遣帝自戮之造雲母匣貯所用劍名匣曰護聖將軍之館舊五代史考異壬子葬德妃張氏十一月乙丑改乾化五年為貞明元年案吳越備史作正月壬辰朔改元大赦歐陽史五代春秋及通鑑俱從薛史作十一月舊五代史考異十二月乙未詔昇華原縣為崇州靜勝軍以美原縣為裕州以為屬郡以偽命義勝軍節度使鼎耀等州觀察使特進檢校太保同平章事李彥韜為特進檢校太傅同平章事充靜勝軍節度使崇裕等州觀察使河內郡開國侯仍復本姓溫名昭圖昭圖華原賊帥也李茂貞以為養子以華原為耀州美原為鼎州偽命昭圖為節度使至是歸款故有是命貞明二年春正月庚申以皇伯父宋州節度使開府儀同三司檢校太師兼中書令廣王全昱為守中書令餘如故案通鑑二年春正月宣武節度使守中書令廣德靖王全昱卒舊五代史考異以浙江東道營田副使檢校太傅前常州刺史杜建徽遙領涇州節度使二月丙申右僕射門下侍郎平章事諸道鹽鐵轉運等使楊涉罷相守左僕射涉累上章以疾辭位故有是命是月命許州節度使王檀河陽節度使謝彥章汝州防禦使王彥章率師自陰地關抵晉陽急攻其壘不克而旋三月劉鄩率師與晉王大戰於故元城鄩軍敗績先是鄩駐於莘帝以河朔危急師老於外餉饋不充遣使賜鄩詔微有責讓鄩奏以寇勢方盛未可輕動帝又問鄩決勝之策鄩奏曰但人給糧十斛盡則破敵帝不悅復遣促戰鄩召諸將會議諸將欲戰鄩默然一日引軍攻鎮定之營彼衆大駭上下騰亂俘斬甚衆時帝遣偏將楊延直領軍萬餘人屯澶州以應鄩楊延直原本作廷直今據歐陽史改正影庫本粘籤既而晉王詐言歸太原劉鄩以為信是月召楊延直會于魏城下鄩自莘率軍亦至與延直會既而晉王自貝州至鄩引軍漸退至故元城西與晉人決戰大為其所敗追襲至河上軍士赴水死者甚衆鄩自黎陽濟河奔滑州己巳制以鄩為滑州宣義軍節度副大使知節度事晉人攻衞州陷之又陷惠州夏四月乙酉朔威武軍節度使守太傅兼中書令閩王王審知賜號忠勤保安興國功臣餘如故晉人陷洺州癸卯夜捉生都將李霸作亂龍驤都將杜晏球討平之時遣捉生軍千人戍楊劉軍出宋門外是夜由水門復入二鼓大譟火發燭城李霸與其徒燔建國門不克龍驤都將杜晏球屯鞠場聞亂兵至率騎擊之亂軍退走馬登建國門晏球奏曰亂者惟李霸一軍但守宮城遲明臣必破之未明晏球誅霸及其同惡京師方定是月以行營先鋒步軍都指揮使汝州防禦使王彥章為鄭州防禦使依前先鋒步軍都指揮使五月晉軍還太原六月晉人急攻邢州帝遣捉生都將張溫率步騎五百人入于邢州張溫原本作章溫今據歐陽史及通鑑改正影庫本粘籤至內黃溫率衆降於晉人秋七月甲寅朔晉王自太原至魏州節度使張筠棄城奔京師邢州節度使閻寶以城降於晉王壬戌以淮南鎮海鎮東等軍節度使充淮南宣潤等道四面行營都統開府儀同三司尚父守尚書令吳越王錢鏐為諸道兵馬元帥餘如故以左僕射楊涉為太子太傅致仕八月丁酉以開府儀同三司太子太保致仕趙光逢為司空兼門下侍郎平章事弘文館大學士延資庫使延資庫使原本作延貨考五代會要五代承唐制多以宰相兼領延資庫使今改正影庫本粘籤充諸道鹽鐵轉運使九月晉王還太原滄州節度使戴思遠棄城來奔晉人陷貝州案歐陽史作晉人克貝州守將張源德死之又死事傳云貝人勸源德出降源德不從遂見殺通鑑考異引莊宗實錄源德聞河北皆平有翻然之志謀於衆衆懼其歸罪因殺源德是源德之死傳聞異詞故薛史不取舊五代史考異歐陽史本紀二年九月晉人克貝州守將張源德死之又死事傳略云太祖時源德自金吾衞將軍為蔡州刺史貞明元年魏博節度使楊師厚卒末帝分魏相等六州為兩鎮遣劉鄩將兵萬人屯于魏魏軍叛降晉源德為鄩守貝州晉王入魏諸將欲先擊貝州晉王曰貝城小而堅攻之難卒下乃先襲破德州然以兵五千攻源德源德堅守不下晉軍塹而圍之已而劉鄩大敗于故元城南走黎陽六鎮數十州之地皆歸晉獨貝一州圍之踰年不可下源德守既堅而貝人聞晉已盡有河北城中食且盡乃勸源德出降源德不從遂見殺殿本通鑑考異引莊宗實錄云賊將張源德固守貝州既聞河北皆平而有翻然之志詢謀於衆羣賊皆河南人懼其歸罪不從因殺源德噉人為糧因守其城王師歷年攻圍賊既食竭呼我大將曰今欲請罪懼晉王不我赦請衿甲持兵而見已即解之如何報曰無便於此者賊衆三千衿甲出降我將甘言喻之俱釋兵解甲既而四面陳兵殺之與歐陽史異今考歐陽史多前後互異如魏博軍亂本紀作元年傳作三年張源德死紀作二年據傳當在四年紀傳自相矛盾恐不足據薛史不載張源德事附識於此孔本己卯天平軍節度副大使知節度事檢校太師兼中書令瑯琊郡王王檀薨案五代春秋作盜殺鄆州王檀舊五代史考異十月丁酉以開府儀同三司中書侍郎兼吏部尚書同平章事集賢殿大學士判戶部敬翔為右僕射兼門下侍郎平章事監修國史判度支以光祿大夫中書侍郎同平章事鄭王玉為特進兼刑部尚書平章事集賢殿大學士判戶部十月晉王自太原至魏州是月前昭義軍節度使檢校太師兼侍中陳留郡王葛從周薨是歲河北諸州悉入於晉永樂大典卷六千六百五, krp: 攷證}
