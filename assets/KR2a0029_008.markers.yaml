  - {type: variant, offset: 2758, length: 268, content: 考異魏博節度使楊師厚軍於漳水之東晉將曹進金來奔晉軍遂退九月徐州節度使王殷反時朝廷以福王友璋鎮徐方殷不受代乃下詔削奪殷在身官爵仍令却還本姓蔣便委友璋及天平軍節度使牛存節開封尹劉鄩等進軍攻討是時蔣殷求救於淮南楊溥遣大將朱瑾率衆來援存節等逆擊敗之貞明元年春牛存節劉鄩拔徐州案牛存節等克徐州薛史本紀及蔣殷傳俱不書月五代春秋及歐陽史皆作正月通鑑作二月據通鑑考異引朱友貞傳又作乾化四年十一月疑皆屬傳聞之辭當以薛史為正逆賊蔣殷舉族自燔而死於火中得其屍梟首以獻詔福王友璋赴鎮閏二月甲午延州節度使太原西面招討應接使檢校太師兼中書令渤海郡王高萬興進封渤海王, WYG: 巻}
