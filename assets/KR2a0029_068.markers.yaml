  - {type: variant, offset: 4358, length: 2, content: 粘籤, WYG: 作世諤今據通鑑十國春秋改正偽武信軍節度使王宗壽以遂合渝瀘忠五州來降案九國志王宗夀傳唐師入境郭崇韜遣使遺宗壽書宗夀不納聞衍降乃治装赴闕歐陽史蜀世家亦言宗壽獨不降聞衍已銜璧大慟從衍東遷據是書則王衍未送欵宗夀已降疑𫝊聞之誤丙辰蜀主王衍出降案王衍出降在十一月丙辰通鑑與是書同歐陽史作己酉盖據上牋歸命}
