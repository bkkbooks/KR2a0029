  - {type: variant, offset: 1819, length: 2505, content: 試五題不勝困弊因託致雍秉筆當時譏者以為座主辱門生冊府元龜卷九百三十九案以下有闕文殿本莊宗同光已來累歷清顯封氏自太和以來世居兩制以文筆稱于時舜卿從子渭案世系表渭字希叟舊五代史考異昭宗遷雒時為翰林學士舜卿為中書舍人叔姪對掌內外制從子翹於梁貞明中亦為翰林學士冊府元龜卷七百七十一天成中為給事中因轉對上言以星辰合度風雨應時請御前香一合帝親爇一炷餘令於塔廟中焚之貴表精至議者以翹時推名族出朝苑登瑣闈甚有巖廊之望而忽有此請乃近諸妖佞耳物望由是減之永樂大典卷六千三十四案封舜卿傳永樂大典中僅存一條今採冊府元龜以存梗概竇夢徵同州人案通鑑作棣州人舊五代史考異少苦心為文登進士第歷校書郎自拾遺召入翰林充學士梁貞明中加兩浙錢鏐元帥之命夢徵以鏐無功於中原兵柄不宜虛授其言切直梁末帝以觸時忌左授外任案玉堂閒話夢徵抱麻哭於朝翌日謫掾于東州通鑑采用之據梁末帝紀夢徵貶蓬萊尉舊五代史考異玉堂閒話竇以錢公無功于本朝僻在一方坐邀恩澤不稱是命乃抱麻哭于朝翌日竇謫掾于東州殿本有頃復召為學士及莊宗入汴夢徵以例貶沂州沂州原本作忻州今據莊宗本紀改正影庫本粘籤居嘗感梁末帝舊恩因為祭故君文云嗚呼四海九州天迴眷命一女二夫人之不幸當革故以鼎新若金銷而火盛必然之理夫何足競云秉筆者皆許之尋量移宿州天成初遷中書舍人復入為翰林學士工部侍郎卒贈禮部尚書案玉堂閒話云竇失意被謫嘗鬱鬱不樂曾夢有人謂曰君無自苦不久當復故職然將來慎勿為丞相苟有是命當萬計避之其後竇復居禁職有頃遷工部侍郎竇忽憶夢中所言深惡其事然已受命不能遜避未幾果卒舊五代史考異夢徵隨計之秋文稱甚高尤長於牋啟編為十卷目曰東堂集行於世永樂大典卷一萬九千三百五十四李保殷河南洛陽人也昭宗朝自處士除太子正字改錢塘縣尉浙東帥董昌辟為推官調補河府兵曹參軍歷長水令毛詩博士累官至太常少卿端王傅入為大理卿撰刑律總要十二卷與兵部侍郎郗殷象論刑法事左降房州司馬同光初授殿中監以其素有明法律之譽拜大理卿未滿秩屬為人所制保殷曰人之多辟無自立辟乃謝病以歸卒於洛陽永樂大典卷一萬三百八十九歸藹字文彥吳郡人也曾祖登祖融父仁澤位皆至列曹尚書觀察使藹登進士第及升朝遍歷三署案以下疑有闕文據舊唐書昭宗紀天祐元年七月宴于文思殿朱全忠入百官或坐于廊下全忠怒笞通引官何凝丙寅制金紫光祿大夫行御史中丞上柱國韓儀責授棣州司馬侍御史歸藹責授登州司戶坐百官傲全忠也此事應見薛史今無可考同光初為尚書右丞遷刑戶二部侍郎以太子賓客致仕卒年七十六永樂大典卷二千七百二孔邈文宣王四十一代孫身長七尺餘神氣溫厚登進士第歷校書郎萬年尉充集賢校理永樂大典卷二千九百二十五為諫議大夫以年老致仕冊府元龜卷八百九十九案孔邈傳永樂大典中僅存一條考冊府元龜云乾寧五年登進士第除校書郎崔遠在中書奏萬年尉充集賢校理以親舅獨孤損方在廊廟避嫌不赴職蓋冊府元龜兼采後唐實錄之文與薛史異孔邈在後唐不應一無表見今無可復考謹錄原本如右張文寶昭宗朝諫議大夫顗之子也文寶初依河中朱友謙為從事莊宗即位於魏州以文寶知制誥歷中書舍人刑部侍郎左散騎常侍知貢舉遷吏部侍郎文寶性雅淡稽古長興初奉使浙中泛海船壞水工以小舟救文寶與副使吏部郎中張絢信風至淮南界案通鑑作風飄至天長胡三省注疑天長地不通海薛史作淮南界為得其實舊五代史考異案通鑑作風飄至天長從者二百人所存者五人胡三省云天長縣在揚州西一百一十里其地北不至淮東不至海豈小舟隨風所能至通州海門縣崇明鎮東海中有大洲謂之天賜鹽場舟人揚帆遇順東南可以徑至明州定海西南可以至許浦達蘇州恐是此處孔本偽吳楊溥禮待甚至兼厚遺錢幣食物文寶受其食物反其錢幣吳人善之送文寶等復至杭州宣國命還青州卒子吉嗣位邑宰永樂大典卷六千三百九十陳薊門人也薊門原本作門今據文改正影庫本粘籤少好學善屬文因避亂客於浮陽轉徙於大梁梁將張漢傑延於私邸表授太子舍人莊宗平梁郭崇韜遙領常山召居賓榻崇韜從魏王繼岌伐蜀署為招討判官崇韜死明宗即位隨任圜歸闕圜薦之於朝除膳部員外郎知制誥累遷中書舍人案通鑑作閏月以膳部郎中知制誥陳為給事中充樞密直學士與此傳互有詳略舊五代史考異性陰僻寡與人合不為當路所與尋移左散騎常侍由是忿以成疾踰月而卒微有才術嘗自恃其能為判官日人有造者垂帷深處罕見其面及居西掖而姿態愈倨位竟不至公卿蓋器度促狹者也然性孤執尤廉於財長興中嘗自舍人銜命冊晉國公主石氏於太原晉高祖善待之但訝其高岸人或有獻可於宜陳一謳頌以稱晉高祖之美可邀其厚賄耳曰人生貧富咸有定分未有持天子命違禮以求利既損國綱且虧士行今生所不為也聞者嘉之晉高祖即位贈禮部尚書永樂大典卷三千一百三十五劉贊案通鑑作劉瓚舊五代史考異魏州人也幼有文性父玭為令錄誨以詩書夏月令服青襦單衫玭每肉食別置蔬食以飯贊謂之曰肉食君之祿也爾欲食肉當苦心文藝自可致之吾祿不可分也繇是贊及冠有文辭年三十餘登進士第魏州節度使羅紹威署巡官罷歸京師依開封尹劉鄩久之租庸使趙巖表為巡官累遷至金部員外郎職如故莊宗入汴租庸副使孔謙以贊里人表為鹽鐵判官天成中歷知制誥中書舍人與學士竇夢徵同年登第鄰居友善夢徵卒贊與同年楊凝式緦麻為位而哭其家無嫡長與視喪事卹其孀稚人士稱之改御史中丞刑部侍郎案通鑑作兵部侍郎舊五代史考異贊性雍和與物無忤居官畏慎人若以私干之雖權豪不能移其操未幾改秘書監兼秦王傅案冊府元龜秦王為元帥秦王府判官太子詹事王居敏與贊鄉曲之舊以秦王盛年自恣須朝中選端士納誨冀其稟畏乃奏薦贊焉舊五代史考異贊節概貞素忽聞其命掩泣固辭竟不能止案通鑑瓚自以左遷泣訴不得免胡三省注云唐制六部侍郎除吏部之外餘皆從四品下王傅從三品然六部侍郎為嚮用王傅為左遷以職事有閒劇之不同也當是時從榮地居儲副則秦王傅不可以閒官言蓋以從榮輕佻峻急恐豫其禍故求脫耳舊五代史考異時秦王參佐皆新進小生動多輕脫每稱頌秦王功德阿意順旨祗奉談笑惟贊從容諷議必獻嘉言秦王常接見賓僚及遊客於酒筵之中悉令秉筆賦詩案冊府元龜時從榮溺于篇章凡門客及通謁遊士必坐于客次自出題目令賦一章然後接見舊五代史考異贊為師傅亦與諸客混然容狀不悅秦王知其意自是戒典客贊至勿通令每月一度至衙案言行龜鑑載劉贊諫秦王曰殿下宜以孝敬為職浮華非所尚也秦王不悅戒閽者後弗引進舊五代史考異贊既官係王府不敢朝參不通慶弔但閉關喑嗚而已及秦王得罪或言贊止於朝降朝降二字疑有舛誤考冊, WYG: 册}
