  - {type: variant, offset: 327, length: 966, content: 文苑英華改正影庫本粘籤大為時人所稱廷珪既壯亦著賦數十篇同為一集故目曰克家志永樂大典卷二萬一千三百六十七崔沂案新唐書宰相世系表沂字德潤舊五代史考異大中時宰相魏公鉉之幼子也兄沆廣明初亦為宰輔沂舉進士第歷監察補闕昭宗時累遷至員外郎知制誥性抗厲守道而文藻非優嘗與同舍顏蕘錢珝俱秉筆同舍原本作周舍今據文改正影庫本粘籤見蕘珝贍速草制數十無妨譚笑而沂自愧翌日謁國相訴曰沂疏淺不足以供詞翰之職相輔然之移為諫議大夫入梁為御史司憲糾繆繩違不避豪右開平中金吾街使寇彥卿入朝過天津橋市民梁現者不時迴避梁現冊府元龜作梁觀考通鑑注亦作現今仍其舊影庫本粘籤前導伍伯捽之投石欄以致斃彥卿自前白於梁祖梁祖命通事舍人趙可封宣諭令出私財與死者之家以贖其罪沂奏劾曰彥卿位是人臣無專殺之理況天津橋御路之要正對端門當車駕出入之途非街使震怒之所況梁現不時迴避其過止於鞭笞捽首投軀深乖朝憲請論之以法梁祖惜彥卿令沂以過失論沂引鬬競律以怙勢力為罪首下手者減一等又鬬毆條不鬬故毆傷人者加傷罪一等沂表入責授彥卿游擊將軍左衞中郎將沂剛正守法人士多之遷左司侍郎改太常卿轉禮部尚書貞明中帶本官充西京副留守時張全義留守天下兵馬副元帥河南尹判六軍諸衞事守太尉中書令魏王名位之重冠絕中外沂至府客將白以副留守合行廷禮沂曰張公官位至重然尚帶府尹之名不知副留守見尹之儀何如全義知之遽引見沂勞曰彼此有禮俱老矣勿相勞煩莊宗興復唐室復用為左丞判吏部尚書銓選司坐累謫石州司馬明宗即位召還復為左丞以衰疾告老授太子少保致仕卒於龍門之別墅時年七十餘贈太子少傅永樂大典卷二千七百四十劉岳字昭輔其先遼東襄平人元魏平定遼東徙家于代隨孝文遷洛遂為洛陽人八代祖民部尚書渝國公政會渝國公原本作諭國公今據新唐書劉政會傳改正影庫本粘籤武德時功臣祖符蔡州刺史父珪洪洞縣令符有子八人皆登進士第珪之母弟瓌玕異母弟崇夷崇龜崇望崇望原本作崇梁考新舊唐書及北夢瑣言俱作崇望知原本梁字係傳寫之誤今改正影庫本粘籤崇魯崇崇龜乾寧中廣南節度使崇望乾寧中宰相崇魯崇崇夷並歷朝省岳少孤亦進士擢第歷戶部巡官鄭縣簿直史館轉左拾遺侍御史梁貞明初召入翰林為學士岳為文敏速尤善談諧在職累遷戶部侍郎在翰林十二年莊宗入汴隨例貶均州司馬尋丁母憂許自貶所奔喪服闋授太子詹事明宗即位歷兵部吏部侍郎祕書監太常卿卒年五十六贈吏部尚書岳文學之外通於典禮天成中奉詔撰新書儀一部文約而理當案, WYG: ''}
