  - {type: variant, offset: 175, length: 314, content: 不能興大為時賢所歎憂闋再徵為御史以瘠不起成汭之鎮荊州辟為掌書記踰時乃就天復中淮寇大舉圍夏口逼巴陵太祖患之飛命成汭率水軍十萬援于鄂珽入言曰今舳艫容介士千人載稻倍之緩急不可動吳人剽輕若為所絆則武陵武安皆我之讎也將有後慮不如遣驍將屯巴陵大軍對岸一月不與戰則吳寇糧絕而鄂州圍解矣汭性剛決不聽淮人果乘風縱火舟盡焚兵盡溺汭亦自沈於江朗人潭人遂入荊渚一如所料未幾襄帥趙匡凝復奏為掌記入為左補闕又明年太祖為元帥以襄陽貳於己率兵擊破之趙匡凝奔揚州太祖復署珽為天平軍掌書記天平原本作天申今據新唐書改正影庫本粘籤一日大會將佐指珽曰此真書記也滄州節度使劉守文拒命太祖引兵十餘萬圍之久而未下乃召珽草檄珽即就外次筆不停綴登時而成大為太祖嗟賞受禪之歲宰臣除為, WYG: 始葬故妃張氏獨存}
