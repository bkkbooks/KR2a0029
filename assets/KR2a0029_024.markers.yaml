  - {type: variant, offset: 68, length: 106, content: 公王鐸提兵柄鎮滑臺滑臺原本作體臺今據文改正影庫本粘籤縠賓席鐸見珽大賞歎之年二十四登進士第解褐授校書郎拜監察御史俄丁內艱先是父旅殯在遠家貧無以襄事與弟琪當臘雪以單縗扶杖銜哀告人由是兩克遷祔而珽日不過食一溢恆羸臥喪廬, WYG: 天福}
