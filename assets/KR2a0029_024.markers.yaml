  - {type: variant, offset: 793, length: 420, content: 異小黃歐陽史作下黃考困學紀聞云五代通錄李珽曰河南有外黃小黃漢地理志陳留有外黃小黃縣五代史記改小黃為下黃誤也當從通錄殿本故此有內黃又曰在何處對曰秦有外黃都尉案原本作郡尉今據漢書地理志及歐陽史改正舊五代史考異理外黃有故墉今在雍丘小黃為高齊所廢其故墉今在陳留太祖稱奬數四及庶人友珪篡位除右散騎常侍充侍講學士案歐陽史作侍講舊五代史考異內討之日軍士大擾珽其夕為亂兵所傷卒於洛陽珽性孝友與弟琪有敦睦之愛為搢紳所稱永樂大典卷一萬三百八十八案歐陽史有裴迪韋震傳今原文已佚無可采補殿本盧曾字孝伯其先范陽人也頗好書有所執守始為齊州防禦使朱瓊從事案新唐書通鑑與薛史梁紀皆稱朱瓊為齊州刺史惟盧曾傳作防禦使疑有舛誤瓊降預其謀與之皆來瓊沒太祖辟為宣義幕職曾性忠狷好貢直又不能取容於衆每勳府讌語稍洽曾率然糾正輒又忤旨左長直軍使劉捍委任方重曾亦不能平冀王友謙初定陝府命曾往議事有使院小將從行嗜酒荒逸過度曾復命欲發其罪致疏於袖中累日未果言小將恐事洩先誣告曾使酒幾敗軍事劉捍因, WYG: ''}
