  - {type: variant, offset: 4037, length: 238, content: 影庫本粘籤事無不可今領節鉞數不相容且書記趙礪險詖之人也脅肩諂笑黷貨無厭而明公待之甚厚徹今請死近聞張彥澤臠張式未聞史匡翰斬關徹恐天下談者未有比類匡翰不怒引滿自罰而慰勉之其寬厚如此天福六年白馬河決匡翰祭之見一犬有角浮於水心甚惡之後數月遘疾而卒于鎮年四十詔贈太保子彥容歷宮苑使濮單宿三州刺史永樂大典卷一萬一百八十三梁漢顒太原人也少事後唐武皇初為軍中小校善騎射勇於格戰莊宗之破劉仁恭王德明及與梁軍對壘於德勝皆預其戰累功至龍武指揮使檢校司空梁平授檢校司徒濮州刺史同光三年魏王繼岌統軍伐蜀, WYG: 癸亥}
