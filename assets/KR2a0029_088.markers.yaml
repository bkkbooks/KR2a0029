  - {type: variant, offset: 6303, length: 859, content: 贈太師追封隴西郡王從溫始以明宗本枝歷居藩翰無文武才略資濟代之用凡臨民以貨利為急在常山日覩牙署池潭凡十餘頃皆立木為岸而以脩篁環之從溫曰此何用為悉命伐竹取木鬻於列肆獲其直以實用帑焉高祖即位從溫時在兗州多創乘輿器服為宗族切戒從溫弗聽其妻關氏素耿介一日厲聲於牙門云李從溫欲為亂擅造天子法物從溫敬謝悉命焚之家無敗累關氏之力也後以多畜駝馬縱牧近郊民有訴其害稼者從溫曰若從爾之意則我產畜何歸乎其昏愚多此類也高祖性至察知而不問少帝嗣位太后教曰吾只有此兄慎勿繩之故愈加姑息以致年逾耳順終于牖下乃天幸也永樂大典卷一萬三百八十九張萬進突厥南鄙人也祖拽斤父臘萬進白美髯少而無賴事唐武皇以騎射著名攻城野戰奮不顧命嘗與梁軍對陣持銳首短刀躍馬獨進及兵刃既刓則易以大鎚左右奮擊出沒進退無敢當者唐莊宗明宗素憐其雄勇復奬其戰功故累典大郡天成長興中歷威勝保大兩鎮節制高祖有天下命為彰義軍節度使所至不治政由羣下洎至涇原日涇原原本作陘厚今從冊府元龜改正影庫本粘籤凶恣彌甚每日於公庭列大鼎烹肥羜割胾方寸以噉賓佐皆流淚不能大嚼俟其他顧則致袂中又命巨觶行酒訴則辱之乃有持杯偽飲褰領裱而納之者既沉湎無節唯婦言是用其妻與幕吏張光載干預公政納錢數萬補一豪民為捕賊將領兵數百人入新平郡境邠帥以其事上奏有詔詰之光載坐流罪配于登州天福四年三月萬進疾篤月餘州兵將亂乃詔副使萬庭圭委其符印記室李昇素憾凌虐知其將亡謂庭圭曰氣息將奄不保晨暮促移就第豈不宜乎庭圭從之萬進尋卒遂以藍轝祕屍而出即馳騎而奏之詔命既至而後發喪其妻素狠戾謂長子彥球曰萬庭圭逼迫危病驚擾而死不手戮之奚為生也庭圭聞之不敢往弔萬進假殯於精舍之下至轊車東轅凡數月之間郡民數萬無一饋奠者為不善者衆必棄之信矣夫永樂大典卷六千三百五十一史臣曰延廣功扶二帝任掌六師亦可謂晉之勳臣矣然而昧經國之遠圖肆狂言於強敵卒使邦家蕩覆宇縣丘墟書所謂唯口起羞者其斯人之謂歟彥韜既負且乘任重才微盜斯奪之固其宜矣希崇蔚有雄幹老於塞垣未盡其才良亦可惜楊尹二將因倒戈而仗鉞豈義士之所為其餘蓋以勳以親咸分屏翰唯萬進之醜德又何暇於譏焉永樂大典卷六千三百五十一, WYG: 考證}
