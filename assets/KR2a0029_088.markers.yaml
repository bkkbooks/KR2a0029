  - {type: variant, offset: 5362, length: 198, content: 正影庫本粘籤時明宗駐蹕於大梁從璋嘗召幕客謀曰車駕省方藩臣咸有進獻吾為臣為子安得後焉欲取倉廩羨餘以助其用諸君以為何如內有賓介白曰聖上寬而難犯行宮在近忽致上達則一幕俱罹其罪從璋怒翌日欲引弓射所言者朝廷知之改授右驍衞上將軍長興元年十月出鎮陝州二年五月遷河中節度使三年就加檢校太傅案從璋為河中節度以代安重誨也五代史闕文從璋見重誨拜于庭下重誨驚曰太傅過禮據此傳從璋至三年始加檢校太傅徙鎮河中時不應先稱為太傅, WYG: ''}
