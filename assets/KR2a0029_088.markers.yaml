  - {type: line-break, offset: 2123, content: '', id: ZHSJ__dup13950}
  - {type: variant, offset: 2124, length: 381, content: 史考異阿保機南攻陷其城掠希崇而去阿保機詢希崇乃知其儒人也因授元帥府判官後遷盧龍軍行軍司馬繼改蕃漢都提舉使天成初偽平州節度使盧文進南歸契丹以希崇繼其任遣腹心總邊騎三百以監之希崇蒞事數歲契丹主漸加寵信一日登郡樓私自計曰昔班仲升西戍不敢擅還以承詔故也我今入關斷在胸臆何恬安於不測之地而自滯耶乃召漢人部曲之翹楚者謂曰我陷身此地飲酪被毛生不見其所親死為窮荒之鬼南望山川度日如歲爾輩得無思鄉者乎部曲皆泣下沾衣且曰明公欲全部曲南去善則善矣如敵衆何案歐陽史作麾下皆言兵多不可俱亡因勸希崇獨去舊五代史考異希崇曰俟明日首領至牙帳則先擒之契丹無統領其黨必散且平州去王帳千餘里待報至徵兵踰旬方及此則我等已入漢界深矣何用以衆少為病衆大喜是日希崇於郡齋之側坎隙地貯石灰明旦首領與羣從至希崇飲以醇酎數鍾既醉悉投於灰穽中斃焉其徒營於北郭遣人攻之皆潰圍奔去希崇遂以管內生口二萬餘南歸案遼史天顯元年, WYG: 春秋}
