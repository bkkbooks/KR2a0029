  - {type: variant, offset: 3845, length: 168, content: 下以禮與部曲語未嘗稱名歷數郡皆有政聲案陶穀撰碑文云齋壇峻而金鼓嚴麻案宣而油幢出控梁苑之西郊殷乎威望撫國僑之遺俗綽有政聲與薛史合尤好春秋左氏傳每視政之暇延學者講說躬自執卷受業焉時發難問窮於隱奧流輩或戲為史三傳戲為原本作覷為今從冊府元龜改正影庫本粘籤既自端謹不喜人醉幕客有關徹者狂率酣醟一日使酒怒謂匡翰曰明公昔刺覃懷與徹主客道至道至二字原文, WYG: 錢}
