  - {type: variant, offset: 4504, length: 328, content: 榮鎮太原明宗乃以馮贇為副留守以思權為北京步軍都指揮使以佐佑之從榮幼驕狠不親公務明宗乃遣紀綱一人素善從榮者與之游處俾從容諷導之嘗私謂從榮曰河南相公恭謹好善親禮端士有老成之風相公處長更宜自勵勿致聲問在河南之下從榮不悅因告思權曰朝廷人皆推從厚共非短我吾將廢棄矣思權曰請相公勿憂萬一有變但思權在處有兵甲足以濟事乃勸從榮招置部曲調弓礪矢陰為之備思權又謂使者曰朝廷教君伴相公終日言弟賢兄弱何也吾輩苟在豈不能與相公為主耶使者懼告馮贇乃密奏之明宗乃詔思權赴京師以秦王之故亦弗之罪也長興末為右羽林都指揮使遣戍興元閔帝嗣位奉詔從張虔釗討鳳翔洎至岐下思權首倡倒戈以攻虔釗尋領部下軍率先入城謂唐末帝曰臣既赤心奉殿下俟京城平定與臣一鎮勿置在防禦團練使內乃懷中出紙一幅謂末帝曰願殿下親, WYG: 是}
