  - {type: punctuation, offset: 4828, content: 「, id: KR2a0029_ZHSJ_088-bkkpn1021}
  - {type: variant, offset: 4833, length: 458, content: 臣姓名以志之末帝命筆書可邠寧節度使及即位授推誠奉國保乂功臣靜難軍節度邠寧慶衍等州觀察處置等使檢校太保清泰三年入為右龍武軍統軍高祖即位除左衞上將軍進封開國公天福八年以疾卒年六十九贈太傅永樂大典卷六千五十二尹暉魏州人也少以勇健事魏帥楊師厚為軍士唐莊宗入魏擢為小校從征河上每於馬前步鬬有功莊宗即位連改諸軍指揮使天成長興中領數郡刺史累遷嚴衞都指揮使唐應順中王師討末帝於岐下暉與楊思權首歸末帝約以鄴都授之末帝即位高祖入洛嘗遇暉於通衢暉馬上橫鞭以揖高祖高祖忿之後因謁謂末帝曰尹暉常才以歸命稱先陛下欲令出鎮名藩外論皆云不當末帝乃授暉應州節度使高祖即位改右衞大將軍時范延光據鄴謀叛以暉失意密使人齎蠟彈以榮利啖之暉得延光文字懼而思竄欲沿汴水奔於淮南高祖聞之尋降詔招喚未出王畿為人所殺子勳事皇朝累歷軍職遷內外馬步都軍頭見為郢州防禦使永樂大典卷一萬八千一百三十一李從璋字子良後唐明宗皇帝之猶子也少善騎射從明宗歷戰河上有平梁之功唐同光末魏之亂軍迎明宗為帝從璋時引軍自常山過邢邢人以從璋為留後踰月明宗即位受詔領捧聖左廂都指揮使時天成元年五月也, WYG: 作}
