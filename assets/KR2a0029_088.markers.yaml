  - {type: variant, offset: 435, length: 1150, content: 遼遼帝以為回國使置邸大梁至是景延廣說帝囚榮于獄凡遼國販易在晉境者皆殺之奪其貨大臣皆言遼國不可負乃釋榮慰賜而遣之告戎王曰先帝則北朝所立今上則中國自策為鄰為孫則可無臣之理且言晉朝有十萬口橫磨劍翁若要戰則早來他日不禁孫子則取笑天下當成後悔矣由是與契丹立敵干戈日尋初高祖在位時宣借楊光遠騎兵數百延廣請下詔遣還光遠由此忿延廣怨朝廷遣使汎海搆釁天福八年十二月契丹乃南牧九年正月陷甘陵河北儲蓄悉在其郡少帝大駭親率六師進駐澶淵延廣為上將凡六師進退皆出胸臆少帝亦不能制衆咸憚而忌之契丹既至城下使人宣言曰景延廣喚我來相殺何不急戰一日高行周與蕃軍相遇於近郊以衆寡不敵急請濟師延廣勒兵不出是日行周幸而獲免及契丹退延廣猶閉柵自固士大夫曰昔與契丹絕好言何勇也今契丹至若是氣何憊也案契丹國志云遼帝帳中有小校亡去云遼帝已傳木書收軍北去景延廣疑有詐閉壁不敢追遼帝北歸所過焚掠民物殆盡孔本時延廣在軍母凶問至自澶淵津北移於津南不信宿而復蒞戎事曾無戚容下里之士亦聞而惡之時有太常丞王緒者因使德州迴與延廣有隙因誣奏與楊光遠通謀遣吏縶於麾下鍛成其事判官盧億累勸解不從尋有詔棄市時甚寃之少帝還京嘗幸其第進獻錫賚有如酬酢權寵恩渥為一朝之冠俄與宰臣桑維翰不協少帝亦憚其難制遂罷兵權出為洛都留守兼侍中由是鬱鬱不得志亦意契丹強盛國家不濟身將危矣但縱長夜飲無復以夾輔為意案宋史盧多遜傳父億景延廣鎮天平表億掌書記留守西洛又為判官時國用窘乏取民財以助軍河南府計出二十萬緡延廣欲並緣以圖羨利增為三十七萬緡億諫曰公位兼將相既富且貴今國帑空竭不得已而取資於民公何忍利之乎延廣慚而止舊五代史考異開運三年冬契丹渡滹水詔遣屯孟津將戒途由府署正門而出所乘馬騰立不進幾墜於地乃易乘而行時以為不祥之甚及王師降契丹延廣狼狽而還時契丹主至安陽遣別部隊長率騎士數千與晉兵相雜趨河橋入洛以取延廣戒曰如延廣奔吳走蜀便當追而致之時延廣顧慮其家未能引決案東都事略昝居潤傳昝居潤嘗為樞密院小吏景延廣留守西京補為右職契丹犯京師以兵圍延廣家故吏悉避去居潤為全護其家時論稱之舊五代史考異案宋史昝居潤傳晉室將亡景延廣委其族自洛赴難與是書異殿本契丹既奄至乃與從事閻丕輕騎謁契丹主於封丘與丕俱見縶焉案遼史將軍康祥執景延廣來獻舊五代史考異延廣曰丕臣之從事也以職相隨何罪而亦為縲囚契丹釋之因責延廣曰致南北失歡良由爾也乃召喬榮質證前事凡有十焉始榮將入蕃時紿延廣云某恐忽忘所達之語請紀於翰墨延廣信之乃命吏備記其事榮亦憸巧善事人者也慮他日見詰則執之以取信因匿其文於衣中至是延廣始以他語抗對榮乃出其文以質之延廣頓為所屈每服一事則受牙籌一莖此契丹法也延廣受至八莖但以面伏地契丹遂咄之命鎖延廣臂將送之北土是日至於陳橋民家草舍延廣懼燔灼之害至夜分伺守者怠則引手自扼其吭尋卒焉雖事已窮頓人亦壯之時年五十六漢高祖登極詔贈中書令案, WYG: 白魚谷白魚谷}
