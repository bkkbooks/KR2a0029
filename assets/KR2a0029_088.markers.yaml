  - {type: variant, offset: 5576, length: 725, content: 年五月制封洋王是歲明宗厭代閔帝嗣位尋受命代潞王於岐下會潞王舉兵入洛事遂寢高祖即位之元年十二月授威勝軍節度使降封隴西郡公二年九月終於任年五十一鄧人為之罷市思遺愛也詔贈太師從璋性貪黷懼明宗嚴正自滑帥入居環衞之後以除拜差跌心稍悛悟後歷數鎮與故時幕客不足者相遇無所憾焉蒲陝之日政有善譽改賜忠勤靜理之號良以此也及高祖在位愈畏其法故歿於南陽人甚惜之亦明宗宗室之白眉也子重俊永樂大典卷一萬八千一百二十重俊唐長興清泰中歷諸衞將軍高祖即位遙領池州刺史少帝嗣位授虢州刺史性貪鄙常為郡人所訟下御史臺抵贓至重太后以猶子之故救之乃歸罪於判官高獻止罷其郡未幾復居環列出典商州商民素貧重俊臨之割剝幾盡復御家不法其奴僕若履湯蹈火忤其意者或鞭之或刃之又殺從人孫漢榮掠其妻及受代歸洛漢榮母燕氏獲其子婦以訴於府尹景延廣牙將張守英謂燕曰重俊前朝枝葉今上中表河南尹其何以理不若邀其金帛私自和解策之上也燕從其言授三百緡而止後以青衣趙滿師因不勝楚毒踰垣訴景延廣云重俊與妹私姦及前後不法事延廣奏之詔遣刑部郎中王瑜鞫之王瑜原本作王踰今從通鑑改正影庫本粘籤盡得其實併以穢跡彰露而賜死於家永樂大典卷一萬三百八十九李從溫字德基代州崞縣人後唐明宗之猶子也明宗微時從溫執僕御之役後養為己子及歷諸藩署為牙校命典庫唐同光中奏授銀青光祿大夫檢校右散騎常侍累加檢校司空充北京副留守明宗即位授安國節度使檢校司徒長興元年四月入為右武衞上將軍是歲復出鎮許田明年移北京留守加太傅四年正月改太平軍節度使五月制封兗王十一月移鎮定州兼北面行營副招討使尋又移鎮常山清泰中加同平章事改鎮彭門高祖即位之明年就加侍中七年加兼中書令八年再為許州節度使開府儀同三司封趙國公累加食邑一萬戶實食封一千二百戶開運二年改河陽三城節度使三年二月卒于任年六, WYG: ''}
