  - {type: variant, offset: 2933, length: 911, content: 民與郭氏為義子自孩提以至成人因乘戾不受訓遣之郭氏夫婦相次俱死郭氏有嫡子已長時郭氏諸親與義子相約云是親子欲分其財物助而訟之前後數政不能理遂成疑獄希崇覽其訴判云父在已離母死不至止稱假子孤二十年撫養之恩儻曰親兒犯三千條悖逆之罪頗為傷害名教安敢理認田園其生涯並付親子所訟人與朋姦者委法官以律定刑聞者服其明希崇亦善觀象在靈州日見月掩畢口大星經月復爾乃歎曰畢口大星邊將也月再掩之吾其終歟果卒於郡子仁謙為嗣歷引進副使永樂大典卷六千三百五十一王庭胤字紹基其先安人也案安字上有脫文歐陽史王處直傳作京兆萬年人疑是長安祖處存定州節度使父鄴晉州節度使庭胤唐莊宗之內表也性勇剽狡捷鷹瞬隼視喑嗚眦睚則挺劍而不顧少為晉陽軍校以攻城野戰為務暑不息嘉樹之陰寒不處密室之下與軍伍食不異味居不異適故莊宗於親族之中獨加禮遇莊宗明宗朝累歷貝忻密澶隰相六州刺史案歐陽史不載相州國初范延光據鄴稱亂高祖以庭胤累朝宿將詔為魏府行營中軍使兼貝州防禦使城降賞勞授相州節度使尋移鎮定州先是契丹欲以王處直之子威為定州節度使處直則庭胤之叔祖也處直為養子都所篡時威北走契丹契丹納之至是契丹遣使諭高祖云欲使王威襲先人土地如我蕃中之制高祖答以中國將校自刺史團練防禦使序遷方授旄節請遣威至此任用漸令升進乃合中土舊規戎王深怒其見拒使人復報曰爾自諸侯為天子有何階級耶高祖畏其滋蔓則厚賂力拒其命契丹怒稍息遂連升庭胤俾鎮中山且欲塞其意也少帝嗣位改滄州節度使累官至檢校太尉開運元年秋卒於位年五十四贈中書令有子五人長曰昭敏仕至金吾將軍卒永樂大典卷一萬八千一百三十一史匡翰字元輔鴈門人也父建瑭事莊宗為先鋒將敵人畏之謂之史先鋒累立戰功唐書有傳匡翰起家襲九府都督歷代州遼州副使檢校太子賓客同光初為嵐憲朔等州都游奕使改天雄軍牢城都指揮使再加檢校戶部尚書領潯州刺史天成中授天雄軍步軍都指揮使歲餘遷侍衞彰聖馬軍都指揮使高祖有天下也授檢校司空懷州刺史其妻魯國長公主即高祖之妹也尋轉控鶴都指揮使兼和州刺史駙馬都尉俄授檢校司徒鄭州防禦使未幾遷義成軍節度滑濮等州觀察處置管內河隄等使丁母憂尋起復本鎮案陶穀撰匡翰碑文云圃田待理漢殿掄才功臣旌佐國之名出守奉專城之寄蓋鄭州即在義成軍管內匡翰雖遷官不離本鎮也匡翰剛毅有謀略御軍嚴整, WYG: 差按救}
