  - {type: variant, offset: 2534, length: 207, content: 然希崇歸唐在遼太宗時而遼史繫于太祖紀又希崇本繼盧文勝而遼史書其降在盧國用歸唐之前年月皆舛誤舊五代史考異唐明宗嘉之授汝州防禦使希崇既之任遣人迎母赴郡母及境希崇親肩板輿行三十里觀者無不稱歎歷二年遷靈州兩使留後先是靈州戍兵歲運糧經五百里有剽攘之患希崇乃告諭邊士廣務屯田歲餘軍食大濟璽書褒之因正授旄節清泰中希崇厭其雜俗頻表請覲詔許之至闕未久朝延以安邊有聞議內地處之改邠州節度使及高祖入洛與契丹方有要盟慮其為所取乃復除靈武案, WYG: ''}
