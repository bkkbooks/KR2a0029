  - {type: variant, offset: 354, length: 0, content: '', WYG: 酒帝曰比于此物無愛除賔友之會不近罇斚况在沉痛之中安事飲啖命徹之應順元年春正月壬申朔帝御廣夀殿視朝百寮詣閤門奉慰時議者云月首以常服臨不視朝可也乙亥契丹遣使朝貢遼史太宗紀天顯九年閏月戊午唐遣使}
