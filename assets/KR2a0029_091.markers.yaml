  - {type: variant, offset: 350, length: 0, content: '', krp: 民辛亥賜司衣王氏死坐秦王事也癸丑以前鎮州節度使涇王從敏權知河南府事尋}
  - {type: variant, offset: 352, length: 1, content: 文, WYG: 質代之乙夘賜司儀康氏死事連王氏也丙辰以天雄軍節度判官唐汭為諫議大夫掌書記趙彖為起居郎元從都押衙宋令詢為磁州刺史丁已以左僕射平章事馮道為山陵使户部尚書韓彦惲為副中書舍人王延為判官禮部尚書王權為禮儀使兵部尚書李鏻為鹵簿使御史中丞龍敏為儀仗使右僕射權知河南府盧質為橋道頓逓使庚申以前相州刺史郝瓊為右驍衛大將軍充宣徽北院使以光祿卿充三司副使王玫為三司使癸亥故檢校太尉右衛上將軍充三司使孫岳贈太尉齊國公丁夘帝釋縗服羣臣三上表請復常膳御正殿從之辛未帝御中興殿羣臣列位馮道升階}
