  - {type: variant, offset: 5754, length: 168, content: 光輔以功臣子歷數郡皆無濫政竟善終於官雖享年不永亦可嘉也光輔有弟數人光貞歷義乾二州刺史入為諸衞將軍光遜繼為蔡州刺史光贊任青州行軍司馬及楊光遠叛滅貶商州司馬會赦徵還尋卒於家永樂大典卷五千四百一符彥饒唐莊宗朝蕃漢總管存審之第二子也存審唐書有傳彥饒少驍勇能騎射唐天祐十五年冬莊宗與梁大戰於胡柳陂彥饒與弟彥圖俱從其父血戰有功莊宗壯之因用為騎將同光, WYG: 前河}
