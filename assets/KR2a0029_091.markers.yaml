  - {type: variant, offset: 685, length: 415, content: 愍帝出奔知溫乘間有窺覦之意司馬李沖請懷表而西以覘之及沖至京師廢帝已入立沖即奉表稱賀還勸知溫入朝此事薛史不載知溫徑赴洛陽申其宿過且感新恩末帝開懷以厚禮慰而遣之及還郡厚斂不已積貨數百萬治第於南城出則以妓樂相隨任意所之曾不以政事為務有幕客顏衎者正直之士也委曲陳其利病知溫不能用焉及高祖建義入洛尚不即進獻耀兵於牙帳之下衎正色謂曰清泰富有天下多力善戰豈明公之比而天運有歸坐成灰燼今青州遷延不貢何以求安千百武夫無足為恃深為大王之所憂也知溫遂馳表稱賀青人乃安未幾以沈湎成疾而卒部曲將吏分其所聚例為富室衎又勸其子彥儒進錢十萬貫以助國用朝廷除彥儒為沂州刺史案歐陽史彥儒獻父錢三萬緡絹布三萬疋金百兩銀千兩茶千五百斤絲十萬兩拜沂州刺史不言其謀出于顏衎據宋史顏衎傳知溫諸子不慧衎勸令以家財十萬餘上進晉祖嘉之歸功于衎知溫子彥儒授沂州刺史衎拜殿中侍御史與薛史合蓋薛氏去石晉未遠猶得當時實事也其家幸獲保全皆衎之力也永樂大典卷一萬八千一百三十五代史補房知溫為青州, WYG: ''}
