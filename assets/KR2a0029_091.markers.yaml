  - {type: variant, offset: 1215, length: 575, content: 移時復用鐵叉撥出以刀支解去骨肉然後烹飪大抵亦如治鼈之狀既熟諸鬼分噉凡出自鼎鑊至于支解又至于分啖其于慘毒苦痛之狀皆名狀之所不及如此者近數十度府君始恕之且問曰汝受諸苦如何爾其敢再犯乎答曰不敢于是遣去將行府君又于案上取一物封之甚固授澤曰為吾將此物與房知溫不法之事宜休矣澤領而置于懷遂覺知溫聞知澤復活遽使人肩舁入府而問之澤備以所受之苦對仍于懷中探取封物付溫即錦被角也知溫大駭曰吾昨覺體寒如中瘧遂擁被就火忽聞足下無疾而卒遂驚起不虞一角之被為火所燒此其是乎遽取被視之不差毫釐知溫顫慄不知所措謂澤曰足下之過小可耳尚如此老夫不知如何也自是知溫稍稍近理王建立遼州榆社人也曾祖秋祖嘉父弁累贈太保建立少鷙猛無檢明宗領代州刺史擢為虞候將莊宗鎮晉陽以諸陵在代郡遣女使饗祭其下有擾於民者建立必捕而笞之莊宗怒令收之為明宗所護而免由是知名明宗歷遷藩鎮皆署為牙門都校累奏加檢校司空及明宗為魏軍所迫時皇后曹氏淑妃王氏在常山使建立殺其監護幷部下兵故明宗家屬因而保全及即位以功授鎮州節度副使加檢校司徒旋為留後未幾正授節旄繼加檢校太尉同平章事會王都據中山叛密使通弟兄之好案通鑑云王都陰與謀復河北故事建立陽許而密奏之舊五代史考異安重誨素與建立不協知其事奏之明宗慮陷建立尋徵赴闕案通鑑云建立奏重誨專權求入朝面言其狀帝召之舊五代史考異拜右僕射兼中書侍郎平章事判鹽鐵戶部度支充集賢殿大學士天成四年出為, WYG: ''}
