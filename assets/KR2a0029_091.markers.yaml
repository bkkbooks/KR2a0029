  - {type: variant, offset: 4513, length: 334, content: 福中贈太師中書令追封趙國公從訓讀儒書精騎射初為散員大將天祐中轄沙數百人屯壺關十餘歲節度使李嗣昭委遇之莊宗與梁人相拒於德勝口徵赴軍前補充先鋒遊奕使俄轉雲捷指揮使檢校司空賜名繼鸞從諸子之行也明宗微時嘗在存信麾下為都押牙與從訓有舊及即位授石州刺史復舊姓名歷憲德二州刺史高祖之鎮太原也為少帝娶從訓長女為妃案宋史張從恩傳晉祖鎮河東為少帝娶從恩女今考五代會要及薛史本紀俱作從訓疑宋史係傳聞之訛舊五代史考異從訓清泰初授唐州刺史三年高祖舉義從訓奉唐末帝詔徵赴行在分領鄉兵次於團柏谷兵敗宵遁潛身民間高祖入洛有詔搜訪月餘乃出焉及見戚里之故深加軫惻尋授絳州刺史檢校太保在任數年天福中卒於官年五十二少帝以后父之故超贈太尉弟從恩仕皇朝為右金吾衞上將軍卒永樂大典卷五千三百六十李繼忠字化遠後唐昭義, WYG: 雄}
