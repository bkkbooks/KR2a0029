  - {type: variant, offset: 6025, length: 5, content: 七月范延光, WYG: 嗣位委政大臣兄弟之間必無榛梗諸公大計見告朕獨難違事至于此何方轉禍朕當與左右自往鳳翔迎兄主社稷朕自歸藩于理為便朱𢎞昭馮贇不對義誠曰西師驚潰蓋由主將失䇿今駕下兵甲尚多臣請自往關西振其兵威扼其衝要義誠又累奏請行帝召侍衛都將以下宣曰先皇帝棄萬國朕于兄弟之中無心爭立一旦被召主喪便委社稷岐陽兄長果致猜嫌卿等頃從先朝千征萬戰今日之事寧不痛心今}
