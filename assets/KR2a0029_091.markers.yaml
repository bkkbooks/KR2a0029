  - {type: 'tls:seg', offset: 19, content: '', id: KR2a0029_ZHSJ_091-d91p2s2}
  - {type: variant, offset: 20, length: 275, content: 伯玉兗州瑕丘人也少有勇力案玉堂閒話云知溫少年與外弟徐某為盜于兗鄆之境舊五代史考異籍名於本軍為赤甲都官健梁將葛從周鎮其地選置麾下時部將牛存節屯於鎮好摴博每求辨采者知溫以善博見推因得侍左右遂熟於存節及王師範遣劉鄩據兗州梁祖命存節將兵討之知溫夕縋出奔存節喜而納焉明夜竊良馬一駟復入城鄩乃擢為裨將鄩降隸于同州劉知俊知俊補為克和軍使知俊奔岐改隸魏州楊師厚以為馬步軍校馬步原本作馬鬬今從歐陽史改正影庫本粘籤漸升至親隨指揮使繼加檢校司空莊宗入魏賜姓名紹英改天雄軍馬步都指揮使加檢校司徒澶州刺史行臺右千牛衞大將軍莊宗平梁歷曹貝州刺史權充東北面蕃漢馬步都虞候遣戍瓦橋關, WYG: 菩薩奴}
