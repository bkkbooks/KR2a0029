  - {type: variant, offset: 5335, length: 264, content: 萬人命姪友倫與頃總之友倫原本作有倫今從歐陽史改正影庫本粘籤以宿衞為名及梁祖逼禪累掌禁兵倚為肘腋庶人友珪立授頃檢校尚書右僕射右羽林統軍梁末帝之誅友珪頃預其謀尋歷隨州刺史復為右羽林統軍同光初莊宗入汴召頃見之莊宗忻然授衞州刺史加光祿大夫檢校太保明宗朝授衍州刺史長興中檢校太傅右神武統軍高祖即位之二年加特進檢校太尉右領軍衞上將軍三年進封開國伯五年遷左領軍衞上將軍尋以病卒年七十制贈太師頃性溫雅不暴虐凡刺郡統衆頗有畏愛及卒人甚惜之子彥弼在太原日因頃走歸梁朝武皇怒下蠶室加熏腐之刑後籍於內侍省卒焉永樂大典卷一萬八千一百三十一周光輔太原人後唐, WYG: ''}
