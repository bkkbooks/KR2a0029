  - {type: 'tls:seg', offset: 2588, content: '', id: KR2a0029_ZHSJ_091-d91p11s19}
  - {type: variant, offset: 2588, length: 380, content: 福之是拜蓋重誨嫉而出之福泣而辭之明宗宣重誨別與商議重誨奏曰臣累奉聖旨令與康福一事今福驟升節鎮更欲何求況已有成命難於改移明宗不得已謂福曰重誨不肯非朕意也福辭明宗曰朕遣兵援助勿過憂也因令將軍牛知柔領兵送赴鎮行次青崗峽會大雪令人登山望之見川下煙火吐蕃數千帳在焉寇不之覺因分軍三道以掩之蕃衆大駭棄帳幕而走殺之殆盡獲玉璞羊馬甚多到鎮歲餘西戎皆款附改賜福耀忠匡定保節功臣累加官爵福鎮靈武凡三歲每歲大稔倉儲盈羨有馬千駟因為人所譖安重誨奏曰累據使臣所言康福大有寶貨必負朝廷案靈武受代康福領節度在天成四年次年為長興元年安重誨討蜀二年賜死是康福之任靈武甫匝歲而重誨已去朝再期而賜死矣此傳云福鎮靈武凡三歲每歲大稔重誨奏其必負朝廷疑有舛誤歐陽史仍薛史之舊舊五代史考異明宗密遣人謂曰朕何負於卿而有異心耶福奏曰臣受國重恩有死無貳豈願負於聖人此必讒人之言也因表乞入覲不允及再上章隨而赴闕移授, WYG: 前}
