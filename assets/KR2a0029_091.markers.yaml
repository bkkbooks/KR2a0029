  - {type: variant, offset: 355, length: 1, content: 歸, WYG: 告哀即日遣使祭弔丁丑以太常卿崔居儉為秘書監以前蔡州刺史張繼祚為左武衛上將軍充山陵橋道頓逓副使戊寅御明堂殿仗衛如儀宫懸樂作羣臣朝服就位宣制大赦天下改長興五年為應順元年時議者以梓宫在殯宫懸樂作非禮也懸而不作可也回鶻可汗仁美遣使貢方物故可汗仁裕進遺留馬是日命中使三十五人以先帝鞍馬衣帶分賜藩位庚辰宰臣馮道}
