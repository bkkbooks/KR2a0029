  - {type: variant, offset: 6023, length: 1, content: 二, WYG: 詔蕃侯帶平章事以上薨許立神道碑差官撰文未帶平章事及刺史準令式合立碑者其文任自製撰不在奏聞乙夘興元張䖍釗奏自鎮將兵赴鳳翔收大㪚關宗正寺奏準故事諸陵有令丞各一員近例更委本縣令兼之緣河南洛陽是京邑兼令丞不便詔特置陵臺令丞各一員已未以前金吾大將軍李肅為左衛上將軍充山陵修奉上下宫都部署庚申西面步軍都監王景從等自軍前至奏今月十五日大軍進攻鳳翔十六日嚴衛右廂都指揮使尹暉引軍東面入城右羽林都指揮使楊思權引軍西面入城山南軍潰帝聞之謂康誠等曰朕幼}
