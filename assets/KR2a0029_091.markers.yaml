  - {type: variant, offset: 4271, length: 0, content: '', WYG: 藥彦稠為副部署以河中節度使安彦威為西面兵馬都監以前定州節度使李徳珫為權北京留守山陵使奏伏覩御札皇帝親奉靈駕至園陵伏見累朝故事人君無親送葬之儀請車駕不行不從乙未樞密使馮贇起復視事時贇丁母憂也己亥以司農卿張鎛為殿中監庚子殿直楚匡祚上言監取亳州團練使李重吉至宋州繫于軍院重吉潞王之長子及幽于宋州帝猶以金帛賜之及聞西師咸叛方遣使殺之三月甲辰以前太僕少卿魏仁鍔為太僕卿興元節度使張䖍釗奏}
