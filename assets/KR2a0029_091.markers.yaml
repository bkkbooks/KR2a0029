  - {type: variant, offset: 4968, length: 224, content: 刺史加檢校太保尋移棣州刺史繼忠舊苦風痺皆辭以地遠乃授單州刺史仍加輸忠奉國功臣三年入為右神武統軍四年三月出領隰州七年八月移刺澤州開運元年復入為右監門大將軍三年秋以疾卒於東京年五十一始繼忠母楊氏善治產平生積財鉅萬及高祖建義於太原楊已終繼忠舉族家於晉陽時以諸軍方困契丹援兵又至高祖乃使人就其第疏其複壁取其舊積所獲金銀紈素甚廣至於巾屨瑣屑之物無不取足高祖既濟大事感而奇之故車駕入洛繼忠雖有舊恙連領大郡皆楊氏之力也永樂大典卷一萬三百八十九李頃陳州項城人即河陽, WYG: ''}
