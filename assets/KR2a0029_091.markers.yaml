  - {type: variant, offset: 3569, length: 697, content: 家財佐軍後以疾卒於京師彥威與太妃同宗少帝事以為舅彥威未嘗以為言及卒太妃臨哭人始知其為國戚當時益重其人焉永樂大典卷一萬八千一百二十七李周案薛史莊宗紀作李周明宗紀作李敬周蓋本名敬周入晉後避諱去敬字薛史雜采諸書未及改歸畫一通鑑與薛史同舊五代史考異字通理邢州內丘人也唐潞州節度使抱真之後曾祖融祖毅父矩皆不仕周年十六為內丘捕賊將以任俠自負時河朔羣盜充斥南北交兵行旅無援者不敢出郡邑有士人盧岳家於太原攜妻子囊橐寓於逆旅進退無所保唯與所親相對流涕周憫之請援送以歸行經西山中有賊夜於林麓間俟之射盧岳中其馬周大呼曰爾為誰耶賊聞其聲相謂曰李君至此矣即時散走岳全其行裝至於家周將辭去岳謂周曰岳明歷象善知人子有奇表方頤隆準眉目疏朗身長七尺此乃將相之材也河東李氏將有天下子宜事之以求富貴周辭以母老而歸既而梁將葛從周拔邢洺唐武皇麾兵南下築壘於青山口周向背莫決因思盧岳之言乃投青山寨將張樜落武皇賞之補萬勝黃頭軍使武皇之平雲州莊宗之戰柏鄉周皆有功遷匡霸都指揮使匡霸原本脫霸字今從歐陽史增入影庫本粘籤莊宗入魏率兵屯臨河楊劉所至與士伍同甘苦周尤善守備一日奔母喪以他將代之既出則其城將陷莊宗即遣追之使墨縗從事會莊宗北征周與寺人焦彥賓守楊劉城案九國志焦彥賓傳彥賓字英服滄州清池人少聰敏多智略事武皇尤所委信及莊宗即位遷左監門衞將軍充四方館使出護邢州軍舊五代史考異梁將王彥章以數萬衆攻之周日夜乘城躬當矢石使人馳告莊宗請百里趨程以紓其難莊宗曰李周在內朕何憂也遂日行二舍不廢畋獵既至士衆絕糧三日矣及攻圍既解莊宗謂周曰微卿九拒之勞諸公等為梁人所擄矣同光中歷相蔡二州刺史及蜀平授西川節度副使天成二年春遷遂州兩使留後尋正授節旄未幾受代歸闕三年秋出為, WYG: 前}
