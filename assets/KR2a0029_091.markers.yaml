  - {type: variant, offset: 2110, length: 429, content: 即召賓介竺岳草遺章竺岳原本脫竺字今從冊府元龜增入影庫本粘籤又謂其子守恩曰榆社之地桑梓存焉桑以養生梓以送死余生為壽宮刻銘石室死當速葬葬必從儉違吾是言非孝也旋以病篤而卒年七十冊贈尚書令建立先人之墳在於榆社其崗阜重複松檜藹然占者云後必出公侯故建立自為墓恐子孫易之也子守恩周書有傳永樂大典卷六千五百三十康福蔚州人世為本州軍校祖嗣蕃漢都知兵馬使累贈太子太師父公政歷職至平塞軍使累贈太傅福便弓馬少事後唐武皇累補軍職充承天軍都監莊宗嗣位嘗謂左右曰我本蕃人以羊馬為活業彼康福者體貌豐厚宜領財貨可令總轄馬牧由是署為馬坊使大有蕃息及明宗為亂兵所迫將離魏縣會福牧小馬數千匹於相州乃驅而歸明宗即位授飛龍使俄轉磁州刺史充襄州兵馬都監尋以江陵叛命朝廷舉兵伐之以福為荊南道行營兵馬都監俄以王師無功而還福善諸蕃語明宗視政之暇每召入便殿諮訪時之利病福即以蕃語奏之樞密使重誨惡焉常面戒之曰康福但亂奏事有日斬之福懼會靈武兵馬留後韓潯案通鑑歐陽史俱作韓洙弟澄舊五代史考異以人情不協慮為所圖上表請帥制, WYG: ''}
