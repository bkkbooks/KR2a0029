  - {type: variant, offset: 563, length: 120, content: 東平王食邑五千戶食實封三百戶天福元年冬十二月辛巳卒於鎮贈太尉歸葬於瑕丘詔立神道碑知溫性麤獷動罕由禮每迎待王人不改戎服寡言笑多縱左右排辱賓僚他日知悞亦無愧色始與唐末帝嘗失意於杯盤間以白刃相恐及末帝即位知溫憂甚末帝乃封王爵以寧之也案歐陽史廢帝起, WYG: 邠國公庚寅}
