  - {type: variant, offset: 1228, length: 686, content: 以希甫為巡官希甫不樂乃棄其母妻變姓名亡之鎮州自稱青州掌書記進謁王鎔鎔以希甫為參軍尤不樂居歲餘又亡之易州削髮為僧居百丈山莊宗將建國置百官李紹宏薦為魏州推官同光初有詔定內宴儀問希甫樞密使得坐否希甫以為不可樞密使張居翰聞之怒謂希甫曰老夫歷事三朝天子見內宴數百子本田舍兒安知宮禁事希甫不能對初莊宗欲以希甫知制誥宰相豆盧革等附居翰共排斥之以為駕部郎中希甫失志尤怏怏莊宗滅梁室遣希甫宣慰青齊希甫始知其母已死妻袁氏亦改嫁希甫乃發哀服喪居于魏州人有引漢李陵書以譏之曰老母終堂生妻去室天成初欲召為諫議豆盧革韋說沮之明宗卒以希甫為諫議大夫復為匭函使其後革說為安重誨所惡希甫希旨誣奏革縱田客殺人而說與隣人爭井井有寶貨有司推勘井中惟破釜而已破釜原本作破斧今從歐陽史改正影庫本粘籤革說卒皆貶死希甫拜左散騎常侍躁進尤甚引告變人李筠夜扣內門通變書云修堤兵士欲取郊天日舉火為叛安重誨不信之斬告變者軍人訴屈請希甫啖之既而詔曰左散騎常侍集賢殿學士判院事蕭希甫身處班行職非警察輒引凶狂之輩上陳誣骫之詞逼近郊禋扇搖軍衆李筠既當誅戮希甫寧免謫遷可貶嵐州司戶參軍仍馳驛發遣長興中卒于貶所子士明仕周終于邑宰永樂大典卷五千二百二十五藥縱之太原人少為儒明宗刺代州署為軍事衙推從明宗鎮邢州為掌書記歷天平宣武兩鎮節度副使明宗鎮常山被病不從及即位縱之見于洛邑安重誨怒其觀望久無所授明宗曰德勝用兵時德勝原本作得勝考薛史梁唐帝紀皆作德勝今改正影庫本粘籤縱之饑寒相伴不離我左右今有天下何人不富貴何為獨棄縱之浹旬授磁州刺史歲餘自戶部侍郎遷吏部侍郎銓綜之法惘然莫知長興初為曹州刺史清泰元年九月以疾受代而卒永樂大典卷二萬一千六百十七賈馥故鎮, WYG: 符習徐}
