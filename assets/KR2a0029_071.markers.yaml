  - {type: variant, offset: 902, length: 2, content: 判官, WYG: 二廣帝晨至夾城東北隅命斧其鹿角負芻填塹下馬乗城大譟時徳威登西北隅亦譟以應之帝先入夾城大破梁軍是日解圍其功居最柏鄉之役兩軍既成列莊宗以梁軍甚盛慮師入之怯欲激壮之手持白金巨鍾賜帝酒謂之曰卿見南軍白馬赤馬都否覩之令人膽破帝曰彼虚有其表耳翼日當歸吾廏中莊宗拊髀大笑曰卿巳氣吞之矣帝引鍾盡釂即屬鞬揮弭躍馬挺身與其部下百人直犯白馬都奮撾舞矟生挾二騎校而迴飛矢麗帝甲如蝟毛焉由是三軍增氣自辰及未騎軍百戰帝徃來衝擊執訊獲醜不可勝計是日梁軍大敗以功授代州刺史莊宗遣周徳威代幽州帝分兵略定山}
