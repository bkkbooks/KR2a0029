  - {type: variant, offset: 1029, length: 1, content: 既, WYG: 與諸将議兵所向諸将多云青齊徐兖皆空城耳王師一臨不戰自下惟帝勸莊宗徑取汴州語在莊宗紀中莊宗嘉之帝即時前進莊宗繼發中都十月巳夘遲明帝先至汴州攻封邱門汴将王瓚開門迎降帝至建國門聞梁主巳殂乃號令安撫迴軍於封禪寺辰時莊宗至帝迎謁路側莊宗大悦手引帝衣以首觸帝曰吾有天下由公之血戰也當與公共之尋進位兼中書令二年正月契丹犯塞帝受命北征二月莊宗以郊天禮畢賜帝鐡劵四月潞州小将楊立叛帝受詔討之五月擒楊立以獻六月進位太尉移鎮汴州代李存審為蕃漢總管十二月契丹入冦三年正月帝領兵破契丹于涿州移授鎮州節度使先是帝領兵過鄴鄴庫素有御甲帝取五百聫以行是嵗莊宗幸鄴知之怒甚無何帝奏請以長子從珂為北京内衙都指揮使莊宗愈不悦曰軍政在吾安}
