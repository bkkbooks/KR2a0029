  - {type: variant, offset: 445, length: 422, content: 往如歸有時直造臥內每賓僚宴集承業出珍果陳列于前食之必盡案太平御覽引後唐書作陳列于前客無敢先嘗者當郁前者食之必盡舊五代史考異承業私戒主膳者曰他日馬監至唯以乾藕子置前而已郁至窺其不可啖異日鞾中出一鐵檛碎而食之承業大笑曰為公設異饌勿敗余食案其俊率如此冊府元龜卷八百五十五郁在莊宗幕寄寓他土年老思鄉每對莊宗欷歔言家在范陽乞骸歸國以葬舊山莊宗謂之曰自卿去國已來同舍孰在守光尚不能容父能容卿乎孤不惜卿行但卿不得死爾郁既無歸路衷懷嗚咽竟卒于太原冊府元龜卷九百五十三案馬郁傳永樂大典僅存二條今采冊府元龜以補其闕司空頲貝州人貝州人歐陽史作博陽今附識于此影庫本粘籤唐僖宗時舉進士不中屬天子播遷三輔大亂乃還鄉里羅紹威為節度副大使頲以所業干之幕客公乘億為延譽羅弘信署為府參軍辟館驛巡官張彥之亂命判官王正言草奏正言素不能文不能下筆彥怒詬曰鈍漢乃辱我推之下榻問孰可草奏者有言頲羅王時書記乃馳騎召之頲揮筆成文詆斥梁君臣彥甚喜以為判官及張彥復脅賀德倫降於唐德倫遣頲先奉狀太原案, WYG: 故}
