  - {type: variant, offset: 910, length: 0, content: '', WYG: 乂安報莊宗書吏誤云已至滄州禮上畢莊宗省狀怒曰嗣源反耶帝聞之懼歸罪於書吏斬之未幾承制授邢州節度使十四年四月契丹按巴堅率衆三十萬攻幽州周徳威間使告急莊宗召諸将議進取之計諸将咸言敵勢不能持久野無所掠食盡自還然後踵而擊之可也帝奏曰徳威盡忠於家國孤城被攻危亡在即不宜更待敵衰願假臣突騎五千為前鋒以援之莊宗曰公言是也即命帝與李存審閻寶率軍赴援帝為前鋒㑹軍於易州帝謂諸将曰敵以馬上為生不須營壘况彼衆我寡所宜銜枚箝馬潛行溪澗襲其不備也八月師發上谷隂晦而雨帝仰天祈祝即時晴霽師循大房嶺縁澗而進翼日敵騎大至每遇谷口敵騎扼其前帝與長子從珂奮命血戰敵即解去我軍方得前進距幽州兩舍敵騎復當谷口而陣我軍失色帝曰為将者受命㤀家臨敵忘身以身殉國正在今日諸君觀吾父子與敵周旋因挺身入於敵陣以邊語諭之曰爾輩非吾敵吾當與天皇較力耳舞撾奮擊萬衆披靡俄挾其酋帥而還我軍呼躍奮擊敵衆大敗勢如席巻委棄鎧仗羊馬殆不勝紀是日解圍大軍入幽州周徳威迎帝執手歔欷九月班師於魏州莊宗親出郊勞進位檢校太保十八年十月從莊宗大破梁将戴思逺于戚城斬首二萬級莊宗以帝為蕃漢副總管加同平章}
  - {type: page-break, offset: 910, content: '', id: KR2a0029_WYG_071-6b, image: WYG0277/WYG0277-0314d.png}
