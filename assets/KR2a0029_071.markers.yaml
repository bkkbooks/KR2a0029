  - {type: variant, offset: 161, length: 230, content: 如旨郁時直記室即起草為之條列事狀云可疑者十詞理俊贍以此知名永樂大典卷三千三百九十四案太平廣記匡儔忿其兄之見殺即舉全師伐趙之東鄙將釋其憤氣而致十疑之書趙王遣記室張澤以事實答之其略曰營中將士或可追呼天上雷霆何人計會詞多不載孔本嘗聘王鎔於鎮州官妓有轉轉者美麗善歌舞因宴席郁累挑之幕客張澤亦以文章名謂郁曰子能座上成賦座上原本作產上今據文改正影庫本粘籤可以此妓奉酬案太平廣記作韓定辭請馬彧為賦與薛史異舊五代史考異郁抽筆操紙即時成賦擁妓而去永樂大典卷一萬四千八百二十八郁在, WYG: 利}
