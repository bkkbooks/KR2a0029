  - {type: variant, offset: 1147, length: 0, content: '', WYG: 遣帝将兵渡河三月六日帝至鄴都趙在禮等登城謝罪出牲餼以勞師帝亦慰納之營于鄴城之西南下令以九日攻城八日夜軍亂從馬直軍士有張破敗者號令諸軍各殺都将縱火焚營讙譟雷動至五鼓亂兵逼帝營親軍搏戰傷夷者殆半亂兵益盛帝叱之責其狂逆之狀亂兵對曰昨貝州戍兵主上不垂厚宥又聞鄴城平定之後欲盡坑全軍某等初無叛志直畏死耳巳共諸軍商量與城中合勢擊退諸道之師欲主上帝河南請令公帝河北帝泣而拒之亂兵呼曰令公欲何之不帝河北則為他人所有茍不見幾事當不測抽戈露刄環帝左右安重誨霍彦威躡帝足請詭隨之因為亂兵迫入鄴城懸橋巳發共扶帝越濠而入趙在禮等歡泣奉迎通鑑亂兵擁嗣源及李紹真等入城城中不受外兵皇甫暉逆擊張破敗斬之外兵皆潰趙在禮等率諸校迎拜嗣源是日饗将士於行宫在禮等不納外兵軍衆流散無所歸向帝登南樓謂在禮曰欲建大計非兵不能集事吾自於城外招撫諸軍帝乃得出夜至魏縣部下不滿百人時霍彦威所将鎮州兵五千人獨不亂聞帝既出相率歸帝詰朝帝登城掩泣曰國家患難一至於此來日歸藩上章徐圖再舉安重誨霍彦威等曰此言非便也國家付以閫外之事不幸師徒逗橈為賊驚奔元行欽狂妄小人彼在城南未聞戰聲無故棄甲如朝天之日信其}
