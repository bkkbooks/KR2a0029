  - {type: variant, offset: 871, length: 1, content: 載, krp: 云帝以媪前倨後恭詰之曰公貴不可言也問}
  - {type: variant, offset: 873, length: 4, content: 狀詞云屈, WYG: 故具道娠子腹語事帝曰老媼遜言懼吾辱耳後果如其言帝既壮雄武獨斷謙和下士毎有戰功未嘗自代居常惟治兵仗持㢘處静晏如也武皇常試之召於泉府命恣其所取帝惟持束帛數緡而出凡所賜與分給部下嘗與諸将㑹諸将矜􅃷武勇帝徐曰公輩以口擊賊吾以手擊賊衆慙而止景福初黑山戍将王弁據振武叛帝率其屬攻之擒弁以獻乾寧三年梁人急攻兖鄆鄆帥朱瑄求救於武皇武皇先遣騎将李承嗣史儼援之復遣李存信将兵三萬屯於莘縣聞汴軍益盛攻兖甚急存信遣帝率三百騎而徃敗汴軍於任城遂解兖州之圍朱瑾見帝執手涕謝其年魏帥羅𢎞信背盟襲破李存信於莘縣帝奮命殿軍而還武皇嘉其功即以所屬五百騎號曰横衝都侍于帳下故兩河間目帝為李横衝明年武皇遣大将軍李嗣昭率師下馬嶺闗将復邢洺梁将葛從周以兵應援嗣昭兵敗退入青山口梁軍扼其路步兵不戰自潰嗣昭不能制命帝本軍至謂嗣昭曰步兵雖散若吾輩空迴大事去矣為公試決一戰不捷而死差勝被囚嗣昭曰吾為卿副帝率其屬解鞍礪鏃慿髙列陣左右指畫梁人莫之測因呼曰吾王命我取葛司徒他士可無併命即徑犯其陣奮擊如神嗣昭繼進梁軍即時退去帝與嗣昭收兵入闗帝四中流矢血流被股武皇解衣授藥手賜巵酒拊其背曰吾兒神人也微吾兒幾為從周所笑自青山之戰名聞天下天復中梁祖遣氏叔琮將兵五萬營於洞渦是時諸道之師畢萃於太}
