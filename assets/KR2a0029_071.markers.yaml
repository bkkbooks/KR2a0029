  - {type: variant, offset: 905, length: 0, content: '', WYG: 八軍與劉守光愛将元行欽戰於廣邊軍凡八戰帝控弦發矢七中行欽酣戰不解矢亦中帝股拔矢復戰行欽窮蹙面縛乞降帝酌酒飲之拊其背曰吾子壯士也因厚遇之十三年二月莊宗與梁将劉鄩大戰於故元城北帝}
  - {type: variant, offset: 905, length: 0, content: '', krp: 八軍與劉守光愛将元行欽戰於廣邊軍凡八戰帝控弦發矢七中行欽酣戰不解矢亦中帝股拔矢復戰行欽窮蹙面縛乞降帝酌酒飲之拊其背曰吾子壯士也因厚遇之十三年二月莊宗與梁将劉鄩大戰於故元城北帝}
