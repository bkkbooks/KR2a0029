  - {type: variant, offset: 3235, length: 998, content: 十許寂字閑閑祖祕名聞會稽寂少有山水之好汎覽經史窮三式三式疑有舛誤考冊府元龜亦作三式今姑仍其舊附識於此影庫本粘籤尤明易象案太平廣記云寂學易于晉徵君舊五代史考異久棲四明山不干時譽昭宗聞其名徵赴闕召對於內殿會昭宗方與伶人調品篳篥事訖方命坐賜果問易義既退寂謂人曰君淫在聲不在政矣寂聞君人者將昭德塞違以臨照百官百官或象之今不厭賤事自求其工君道替矣尋請還山寓居於江陵以茹芝絕粒自適其性天祐末節度使趙匡凝昆季深禮遇之師授保養之道唐末除諫官不起漢南謂之徵君梁攻襄陽匡凝兄弟棄鎮奔蜀寂偕行歲餘蜀主王建待以師禮位至蜀相同光末平蜀與王衍俱從于東授工部尚書致仕卜居于洛時寂已年高精彩猶健沖漠寡言時蜀語云可怪可怪人莫知其際清泰三年六月卒時年八十餘子孫位至省郎同光時以方術著者又有僧誠惠永樂大典卷一萬六百二十五誠惠係許寂附傳永樂大典割截分載今仍為連綴以仍其舊影庫本粘籤誠惠初於五臺山出家能修戒律稱通皮骨肉三命人初歸向聲名漸遠四方供饋不遠千里而至者衆矣自云能役使毒龍可致風雨其徒號曰降龍大師京師旱莊宗迎至洛下親拜之六宮參禮士庶瞻仰謂朝夕可致甘澤禱祝數旬略無徵應或謂官以祈雨無驗將加焚燎誠惠懼而遁去及卒賜號法雨大師塔曰慈雲之塔永樂大典卷九百二十五周玄豹者周玄豹錦繡萬花谷作崔玄豹係傳寫之訛考歐陽史通鑑俱作周今仍其舊影庫本粘籤本燕人世為從事玄豹少為僧其師有知人之鑒從遊十年餘苦辛無憚師知其可教遂以袁許之術授之大略狀人形貌比諸龜魚禽獸目視臆斷咸造其理及還鄉遂歸俗初盧程寄褐遊燕與同志二人謁焉玄豹謂鄉人張殷袞曰適二君子明年花發俱為故人唯彼道士佗年甚貴至來歲二子果卒又二十年盧程登庸於鄴下玄豹歸晉陽張承業信重之言事數中承業俾明宗易衣列於諸校之下以佗人詐之而玄豹指明宗於末綴言曰骨法非內衙太保歟案以上疑有脫誤北夢瑣言作骨法非常此為內衙太保乎咸伏其異或問明宗之福壽惟云末後為鎮州節度使時明宗為內衙都校纔兼州牧而已昭懿皇后夏氏方侍巾櫛偶忤旨大為明宗檟楚玄豹見之曰此人有藩侯夫人之位當生貴子明宗赫怒因解後其言果驗太原判官司馬揆謁玄豹謂揆曰公五日之中奉使萬里未見迴期揆數日後因酒酣為衣領扼之而卒莊宗署玄豹北京巡官明宗即位之明年一日謂侍臣曰方士周玄豹昔曾言朕諸事有徵可詔北京津置赴闕趙鳳奏曰袁許之事玄豹所長者以陛下貴不可言今既驗矣餘無可問若詔赴闕下則奔競之徒爭問吉凶恐近於妖惑乃止令以金帛厚賜之授光祿卿致仕尋卒於太原年八十餘永樂大典卷八千九百九十七, WYG: ''}
