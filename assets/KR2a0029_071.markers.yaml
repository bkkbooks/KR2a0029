  - {type: variant, offset: 2179, length: 3, content: 薛史縞, WYG: 郤還州府州府不得科率百姓百姓合散蠶鹽每年秪二月内一度俵散依夏税限納錢夏秋苖税子除元徵石斗及地頭錢餘外不得紐配先遇赦所放逋税租庸違制徵收並與除放今欲曉告河南府及請道準此施行從之是日宋州節度使元行欽伏誅壬寅以樞密副使孔循}
