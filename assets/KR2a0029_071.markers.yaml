  - {type: variant, offset: 2239, length: 778, content: 考異形氣不衰冊府元龜卷七百八十四于事多遺忘言元稹不應進士以父元魯山名進故也多如此類又上疏古者無嫂叔服文皇創意以兄弟之親不宜無服乃議服小功今令文省服制條為兄弟之妻大功不知何人議改而置於令文諸博士駮云律令國之大經馬縞知禮院時不曾論定今遽上疏駮令式罪人也冊府元龜卷九百五十四案馬縞傳原本殘闕今僅存梗概羅貫不知何許人進士及第累歷臺省官自禮部員外郎為河南令貫為人強直正身奉法不避權豪時宦官伶人用事凡請託於貫者其書盈閤一無所報皆以示郭崇韜因奏其事由是左右每言貫之失先是梁時張全義專制京畿河南洛陽僚佐皆由其門下事全義如廝僕及貫授命持本朝事體奉全義稍慢部民為府司庇護者必奏正之全義怒因令女使告劉皇后從容白於莊宗宦官又言其短莊宗深怒之會莊宗幸壽安山陵壽安原本作壽奄考五代會要貞簡太后陵名壽安今改正影庫本粘籤道路泥濘莊宗訪其主者宦官曰屬河南縣促令召貫至奏曰臣初不奉命請詰稟命者帝曰卿之所部反問他人何也命下府獄府吏榜笞促令伏款翌日傳詔殺之郭崇韜奏曰貫別無贓狀橋道不修法未當死莊宗怒曰母后靈駕將發天子車輿往來橋道不修是誰之過也崇韜奏曰貫縱有死罪俟款狀上奏所司議讞以朝典行之死當未晚今以萬乘之尊怒一縣令俾天下人言陛下使法不公矣莊宗曰既卿所愛任卿裁決因投袂入宮崇韜從而論列莊宗自闔殿門不得入即令伏法曝屍於府門寃痛之聲聞於遠邇永樂大典卷五千六百七十八淳于晏案以下有闕文以明經登第自霍彥威為小校晏寄食于門下彥威嘗因兵敗獨脫其身左右莫有從者惟晏杖劍從之徒步草莽自是彥威高其義相得甚歡及歷數鎮皆為從事軍府之事至于私門事無巨細皆取決于晏雖為幕賓有若家宰爾後公侯門客往往效之時謂之效淳故彥威所至稱治由晏之力也張格字承之故宰相濬之子也濬為梁祖所忌潛遣人害於長水格易姓名流轉入蜀案舊唐書張濬傳云永寧縣吏葉彥者張氏待之素厚告格曰相公之禍不可免郎君宜自為計濬曰留則併命去或可免冀存後嗣格拜辭而去葉彥率義士, WYG: 巻}
