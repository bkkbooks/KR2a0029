  - {type: variant, offset: 3019, length: 215, content: 人送渡漢江而旋格由荊江上峽入蜀王建僭號以格為宰相格所生母當濬之遇害潛匿於民間落髮為尼流浪於函洛王建聞之潛使人迎之入蜀賜紫加號慈福大師及建卒蜀人以格為山陵使格有難色未幾得罪出為茂州刺史偽制責詞云送往辭命不忠也喪母匿喪非孝也王衍嗣偽位後數年復用為宰相同光末蜀平格至洛陽案舊唐書云任圜攜格還洛格感葉彥之惠訪之身已歿厚卹其家又考張濬第三子仕吳改名李儼見九國志授太子賓客任圜愛其才奏為三司副使尋卒於位格有文章明吏事時頗稱之永樂大典卷六千三百, WYG: ''}
