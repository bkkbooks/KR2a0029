  - {type: variant, offset: 1147, length: 0, content: '', krp: 遣帝将兵渡河三月六日帝至鄴都趙在禮等登城謝罪出牲餼以勞師帝亦慰納之營于鄴城之西南下令以九日攻城八日夜軍亂從馬直軍士有張破敗者號令諸軍各殺都将縱火焚營讙譟雷動至五鼓亂兵逼帝營親軍搏戰傷夷者殆半亂兵益盛帝叱之責其狂逆之狀亂兵對曰昨貝州戍兵主上不垂厚宥又聞鄴城平定之後欲盡坑全軍某等初無叛志直畏死耳巳共諸軍商量與城中合勢擊退諸道之師欲主上帝河南請令公帝河北帝泣而拒之亂兵呼曰令公欲何之不帝河北則為他人所有茍不見幾事當不測抽戈露刄環帝左右安重誨霍彦威躡帝足請詭隨之因為亂兵迫入鄴城懸橋巳發共扶帝越濠而入趙在禮等歡泣奉迎通鑑亂兵擁嗣源及李紹真等入城城中不受外兵皇甫暉逆擊張破敗斬之外兵皆潰趙在禮等率諸校迎拜嗣源是日饗将士於行宫在禮等不納外兵軍衆流散無所歸向帝登南樓謂在禮曰欲建大計非兵不能集事吾自於城外招撫諸軍帝乃得出夜至魏縣部下不滿百人時霍彦威所将鎮州兵五千人獨不亂聞帝既出相率歸帝詰朝帝登城掩泣曰國家患難一至於此來日歸藩上章徐圖再舉安重誨霍彦威等曰此言非便也國家付以閫外之事不幸師徒逗橈為賊驚奔元行欽狂妄小人彼在城南未聞戰聲無故棄甲如朝天之日信其}
  - {type: variant, offset: 1148, length: 0, content: '', WYG: 陳何所不至若歸藩聽命便是强據要君正墮讒慝之口也正當星行歸闕面叩玉階讒間阻謀庶全功業無便於此者也帝從之十一日發魏縣至相州獲官馬二千匹始得成軍元行欽退保衛州東以飛語上奏帝上章申理莊宗遣帝子從審及内官白從訓齎詔諭帝從審至衛州為行欽所械帝奏章亦不達帝乃趨白臯渡駐軍於河上㑹山東上供綱載絹數船適至乃取以賞軍軍士以之增氣及将濟以渡船甚少帝方憂之忽有木栰數隻沿流而至即用以濟師故無留滯焉二十六日至汴州莊宗領兵至滎澤遣龍驤都校姚彦溫為前鋒是日彦温率部下八百騎歸於帝具言主上為行欽所惑事勢巳離難與共事帝曰卿自不忠言何悖也乃奪}
