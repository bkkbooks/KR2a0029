  - {type: variant, offset: 2178, length: 0, content: '', WYG: 李琪議曰殿下宗室勳賢立大功於三世一朝雨泣赴難安定宗社撫事因心不失舊物若别新統制則先朝便是路人煢煢梓宫何所歸徃不惟殿下追感舊君之義羣臣何安請以本朝言之則睿宗文宗武宗皆以弟足相繼即位柩前如儲后之儀可也于是羣議始定河中軍校王舜賢奏節度使李存霸以今月三日出奔不知所在乙未敕曰寡人允副羣情方監國事外安黎庶内睦宗親庶諧惇叙之規永保隆平之運昨京都變起禍難荐臻至於戚屬之間不測驚奔之所慮因藏竄濫被傷夷言念于兹自然流涕宜令河南府及諸道應諸王眷屬等昨因驚擾出奔所至之處即時津送赴闕如不幸物故者量事收瘞以聞北夢瑣言莊宗諸弟存紀存確匿於南山民家人有以報安重誨者重誨曰主上巳下詔尋訪帝之仁徳必不加害不如密令殺之果併命于民家後明宗聞之切讓重誨傷惜久之以中門使安重誨為樞密使以鎮州别駕張延朗為樞密副使以客将范延光為宣徽使進奏官馮贇為内客省使丙申下敕今年下苗委人户自供通頃畆五家為保本州具帳送省州縣不得差人檢括如人户隱欺許人陳告其田倍徵巳亥命石敬瑭權知陜州兵馬留後皇子從珂權知河南府兵馬留後庚子淮南楊溥進新茶以權知汴州軍州事孔循為樞密副使以陳州刺史劉仲殷為鄧州留後以鄭州防禦使王思同為同州留後敕曰租庸使孔謙濫承委寄専掌重權侵剥萬端姦欺百變遂使生靈塗炭軍士饑寒成天下之瘡痍極人間之疲弊載詳衆狀側聽輿辭難私降黜之文合正誅夷之典宜削奪在身官爵按軍令處分雖犯衆怒時貸全家所有田宅並從籍沒是日謙伏誅敕停租庸名額依舊為鹽鐡户部度支三司委宰臣豆盧革専判中書門下上言請停廢諸道監軍使内勾司租庸院大程官出放豬羊柴炭户括田竿尺一依朱梁制度仍委節度刺史通申三司不得差使量檢州使公廨錢物先被租庸院管繫今}
