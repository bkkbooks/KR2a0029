  - {type: variant, offset: 8, length: 0, content: '', WYG: 明宗紀一明宗聖徳和武欽孝皇帝諱亶初名嗣源及即位改今諱代北人也世事武皇及其錫姓也遂編於屬籍四代祖諱聿皇贈麟州刺史天成初追尊為孝恭皇帝廟號惠祖陵曰遂陵髙祖妣衛國夫人崔氏追諡為孝恭昭皇后三代祖諱敎皇贈朔州刺史追尊為孝質皇帝廟號毅祖陵曰衍陵曾祖妣趙國夫人張氏追諡為孝質順皇后皇祖諱琰皇贈蔚州刺史追尊為孝靖皇帝廟號烈祖陵曰奕陵皇祖妣秦國夫人何氏追諡為孝靖穆皇后皇考諱霓皇贈汾州刺史追尊為孝成皇帝廟號徳祖陵曰慶陵皇妣宋國夫人劉氏追諡為孝成懿皇后帝即孝成之元子也以}
  - {type: page-break, offset: 8, content: '', id: KR2a0029_WYG_071-1b, image: WYG0277/WYG0277-0312b.png}
  - {type: variant, offset: 8, length: 0, content: '', krp: 明宗紀一明宗聖徳和武欽孝皇帝諱亶初名嗣源及即位改今諱代北人也世事武皇及其錫姓也遂編於屬籍四代祖諱聿皇贈麟州刺史天成初追尊為孝恭皇帝廟號惠祖陵曰遂陵髙祖妣衛國夫人崔氏追諡為孝恭昭皇后三代祖諱敎皇贈朔州刺史追尊為孝質皇帝廟號毅祖陵曰衍陵曾祖妣趙國夫人張氏追諡為孝質順皇后皇祖諱琰皇贈蔚州刺史追尊為孝靖皇帝廟號烈祖陵曰奕陵皇祖妣秦國夫人何氏追諡為孝靖穆皇后皇考諱霓皇贈汾州刺史追尊為孝成皇帝廟號徳祖陵曰慶陵皇妣宋國夫人劉氏追諡為孝成懿皇后帝即孝成之元子也以}
  - {type: variant, offset: 9, length: 2, content: 書四, WYG: 咸通丁亥嵗九月九日懿后生帝於應州之金城縣初孝成事唐獻祖為愛将獻祖之失振武為吐渾所攻部下離散孝成獨奮志義解蔚州之圍武皇之鎮鴈門也孝成厭代帝年甫十三善騎射獻祖見而撫之曰英氣如父可侍吾左右每從圍獵仰射飛鳥控弦必中尋隸武皇帳下武皇遇上源之難将佐罹害者甚衆帝時年}
