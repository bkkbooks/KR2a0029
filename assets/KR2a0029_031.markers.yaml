  - {type: variant, offset: 4, length: 1, content: 卷, WYG: 巻十五宋門下侍郎參知政事監修國史薛居正等撰梁書第十五列傳五韓建字佐時許州長社人父叔豐世為牙校初秦宗權之據蔡州招合亡命建隸為軍士累轉至小校唐中和初忠武監軍楊復光起兵于蔡宗權遣其將鹿晏𢎞赴之建與里人王建俱隸晏𢎞軍入援京師賊平復光暴卒時僖宗在蜀晏𢎞率所部赴行在路出南山因攻剽郡邑據有興元晏𢎞自為留後以建為蜀郡刺史唐軍容使田令孜宻遣人誘建啗以厚利建時懼為晏𢎞所併乃率所部歸行在令孜補為神䇿都校金吾將軍出為潼闗防禦使兼華州刺史河潼經大冦之後户口流散建披荆棘闢汚萊勸課農事樹植蔬果出入閭里親問疾苦不數年流亡畢復軍民充實建比不知書治郡之暇日課學習遣人於器皿牀榻之上各題其名建視之既熟乃漸通文字俄遷華商節度潼關守捉等使累加檢校太尉平章事乾寧二年建與鳳翔李茂貞邠州王行瑜舉兵赴闕迫昭宗請以王珙為河中帥害大臣于都下河中王珂召晉軍以為援及晉軍渡河昭宗幸石門}
