  - {type: variant, offset: 250, length: 0, content: '', WYG: 俄復左金吾大將軍卒於官詔贈太傅輟視朝一日天復初徳昭與孫承誨董從實以返正功時人呼為三使相恩澤俱冠世及承誨至鳯翔易名繼誨從實改名彦弼皆為李茂貞所養後閹官之敗俱戮於京師帷徳昭克全終始有所􅀈云趙克裕河陽人也祖父皆為軍吏克裕少為牙將好讀書謹儀範牧伯皆竒待之累居右職擢為虎牢闗使光啓中蔡冦䧟河陽克裕率所部歸於太祖𨽻於宣義軍太祖東征徐鄆克裕屢受指顧無不如意數年之内繼領亳鄭二州刺史時闗東藩鎮方為蔡冦所毒黎元流散不能相保克裕妙有農戰之備復善於綏懐民賴而獲安者衆太祖表為河陽}
