  - {type: variant, offset: 8, length: 0, content: '', WYG: 王並遇害于石堤谷以謀逆聞又害太子詹事馬道殷將作監許巖士貶宰相朱朴皆昭宗寵昵者也建尋兼同州節度使光化元年升華州為興徳府以建為尹八月車駕還京九月册拜太傅進封許國公并賜鐡劵天復元年十一月宦官韓全誨迫天子幸鳳翔建亦預其謀太祖聞知自河中引軍而西前鋒至同州建判官司馬鄴以城降遂移軍迫華州建懼乞降太祖責以脅君之罪建拜伏稱從事李巨川之謀也太祖即誅巨川北夢瑣言韓建曰某不識字凡朝廷章奏鄰封書檄皆巨川為之因斬之又新}
