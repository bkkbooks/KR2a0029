  - {type: variant, offset: 247, length: 1, content: 振, WYG: 龍鳳劍鬬鷄紗委令制輯於是百官次華州連狀請太祖迎奉及大斾入闗徳昭以軍禮上謁立道左太祖命左右扶騎控至長安賜與甚厚署權知同州節度留後將赴任復徇民請留充兩街制置使賜錢百萬徳昭以本部兵八千人獻於太祖由是愈見賞重又賜甲第一區俾先還洛陽及昭宗東遷奏授左威衛上將軍以病免歸於别墅太祖受禪以左領衛上將軍徵赴闕開平四年拜左金吾大將軍充街使末帝即位俾將命於兩浙對見失儀不果行尋改授右}
