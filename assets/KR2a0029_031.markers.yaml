  - {type: variant, offset: 216, length: 2, content: 王瓚, krp: 哀憐與一小鎮休兵養疾一二年間即歸老莬裘幸也寓為言之克用不對每藩鎮缺帥議所不及罕之私心鬱鬱蓋寓懼其佗圖亟為論之克用曰吾於罕之豈惜一鎮吾有罕之亦如董卓之有吕布雄則雄矣鷹鳥之性飽則颺去實懼翻覆毒余也光化元年十二月晉之潞帥薛志勤卒罕之乘其喪自澤州率衆徑入潞州自稱留後以狀聞於克用曰聞志勤之喪新帥未至慮為佗盗所窺不俟命已屯於潞矣克用怒遣李昭嗣討之罕之執其守將馬溉伊鐸何萬友沁州刺史傳瑶等遣其子顥拘送於太祖以求援焉新唐書全忠表罕之昭義軍節度使㑹罕之暴病不能視事明年六月病篤太祖令丁㑹代之移罕之為河陽節度使行至懐州卒於傳舍時年五十八歳子顥以舟載柩歸葬河隂縣開年二年春詔贈中書令馮行襲字正臣武當人也厯職為本郡都校中和中僖宗在蜀有賊首孫喜者聚徒數十人欲入武當刺史吕曄惶駭無䇿畧行襲伏勇士於江南乘小舟逆喜謂喜曰郡人得良牧衆心歸矣但縁兵多民懼擄掠若駐軍江北領肘腋以赴之使某前導以慰安士民可立定也喜然之既渡江軍吏迎謁伏甲奮起行襲擊喜仆地伏劍斬之其黨盡殪賊衆在江北者悉奔潰山南節度使劉巨容以功上言尋授均州刺史州西有長山當襄漢蜀路羣賊屯據以邀刦貢奉行襲又破之洋州節度使葛佐奏辟為行軍司馬請將兵鎮谷口通秦蜀道由是益知名李茂貞遣養子繼臻竊據金州行襲攻下之因授金州防禦使時興元楊守亮將襲京師道出金商行襲逆擊大破之詔升金州為節鎮以戎昭軍為額即以行襲為節度使及太祖義旗西征行襲遣副使魯崇矩禀受制令會唐昭宗幸鳳翔太祖帥師奉迎久之未出中尉韓全誨遣中官郄文晏等二十餘人分命矯詔欲徵江淮兵屯於金州以䝱太祖之軍行襲定䇿盡殺之收其詔勅送於太祖天祐元年兼領洋州節度使太祖之伐荆襄行襲令其子朂以舟師會於均房預收復功遷匡國軍節度使到任誅大吏張澄暴其罪州人莫不惴懾在許三年上供外别進助軍羡糧二十萬石及太祖郊􅀈行襲請入覲貢獻巨萬恩禮殊厚尋詔翰林學士杜曉撰徳政碑以賜之累官至兼中書令冊拜司空開平中卒輟朝一日}
  - {type: variant, offset: 220, length: 0, content: '', WYG: 傅謚曰忠敬行襲性嚴烈為政深刻然所至有天幸境内嘗大蝗尋有羣烏啄食不為害民或艱食必有穭榖出於壠畝雖威福在已而恒竭力以奉於王室故能保其功名行襲魁岸雄壮面有青誌當時目為馮青面長}
  - {type: variant, offset: 220, length: 0, content: '', krp: 傅謚曰忠敬行襲性嚴烈為政深刻然所至有天幸境内嘗大蝗尋有羣烏啄食不為害民或艱食必有穭榖出於壠畝雖威福在已而恒竭力以奉於王室故能保其功名行襲魁岸雄壮面有青誌當時目為馮青面長}
  - {type: variant, offset: 221, length: 0, content: '', WYG: 朂厯蘄沁二州刺史次子徳晏仕至金吾將軍孫徳昭鹽州五原縣人世為州校父惟晸有功於唐朝遙領荆南節度分判右神䇿軍事徳昭藉父䕃累職為右神䇿軍都指揮使光化三年唐昭宗為閹官所廢矯立徳王時中外以權在禁闥莫能致討近藩朋附章表繼有至者丞相崔𦙍外與}
  - {type: page-break, offset: 221, content: '', id: KR2a0029_WYG_031-11a, image: WYG0277/WYG0277-0145c.png}
  - {type: variant, offset: 221, length: 0, content: '', krp: 朂厯蘄沁二州刺史次子徳晏仕至金吾將軍孫徳昭鹽州五原縣人世為州校父惟晸有功於唐朝遙領荆南節度分判右神䇿軍事徳昭藉父䕃累職為右神䇿軍都指揮使光化三年唐昭宗為閹官所廢矯立徳王時中外以權在禁闥莫能致討近藩朋附章表繼有至者丞相崔𦙍外與}
  - {type: variant, offset: 222, length: 0, content: '', WYG: 祖申結輔佐之好内遣心腹密講忠義有以事喻徳昭者通鑑徳昭常憤惋不平崔𦙍聞之遣判官石戩與之遊徳昭每酒酣必泣戩知其誠乃密以𦙍意說之徳昭感慨乃與本軍孫承誨董從實二人奮發應命誓圖返正崔又割衣手筆以通其志天復元年正月一日未旦逆豎左軍容劉李述早入徳昭伏甲要路以俟追其前驅邀而斬之孫承誨等分捕右軍容王仲先黨伍唐昭宗方幽辱東内聞外喧大恐徳昭馳至扣閤曰逆賊劉季述伏誅矣請上皇開鑰復皇帝位皇后何氏呼曰汝可進逆人首門乃可開俄而承誨從實俱以馘獻昭宗悲而嘉之於是丞相崔𦙍奉迎御丹鳳樓率百辟待罪泣且奏曰臣居大位不能討姦賴東平王全忠首奮忠貞誅殺邸吏遂致徳昭等檎戮妖逆再清禁闈即日議功以徳昭為檢校太保靜海軍節度使承誨邕州節度使從實容州節度使並同平章事錫姓李賜號扶傾濟難忠烈功臣圗形凌烟閣俱留京}
