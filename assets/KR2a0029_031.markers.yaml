  - {type: page-break, offset: 4, content: '', id: KR2a0029_WYG_031-2a, image: WYG0277/WYG0277-0141a.png}
  - {type: variant, offset: 4, length: 1, content: 卷, krp: 巻十五宋門下侍郎參知政事監修國史薛居正等撰梁書第十五列傳五韓建字佐時許州長社人父叔豐世為牙校初秦宗權之據蔡州招合亡命建隸為軍士累轉至小校唐中和初忠武監軍楊復光起兵于蔡宗權遣其將鹿晏𢎞赴之建與里人王建俱隸晏𢎞軍入援京師賊平復光暴卒時僖宗在蜀晏𢎞率所部赴行在路出南山因攻剽郡邑據有興元晏𢎞自為留後以建為蜀郡刺史唐軍容使田令孜宻遣人誘建啗以厚利建時懼為晏𢎞所併乃率所部歸行在令孜補為神䇿都校金吾將軍出為潼闗防禦使兼華州刺史河潼經大冦之後户口流散建披荆棘闢汚萊勸課農事樹植蔬果出入閭里親問疾苦不數年流亡畢復軍民充實建比不知書治郡之暇日課學習遣人於器皿牀榻之上各題其名建視之既熟乃漸通文字俄遷華商節度潼關守捉等使累加檢校太尉平章事乾寧二年建與鳳翔李茂貞邠州王行瑜舉兵赴闕迫昭宗請以王珙為河中帥害大臣于都下河中王珂召晉軍以為援及晉軍渡河昭宗幸石門}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 年四月昭宗遣延王通王率禁兵討李茂貞為茂貞所敗車駕幸渭橋翼日次富平將幸河中建奉表迎駕俄自至渭北懇乞東幸許之七月十五日昭宗至華下百官士庶相繼而至建尋加兼中書令充京畿安撫制置等使又兼京兆尹京城把截使昭宗乆在華州思還宫掖每花朝月夕遊宴西谿與羣臣屬詠歌詩歔欷流涕建每從容奏曰臣為陛下修營大内結信諸候一二年間必期興復乃以建兼領修創京城使建自華督役輦運工作復治大明宫四年二月有詣建告睦王已下八王謀殺建建囚八王於别宅放散随駕殿後軍二萬人殺捧日都頭李筠自是天子益微宿衛之士盡矣八月建以兵圍十六宅通王已下}
