  - {type: variant, offset: 275, length: 1608, content: 軍州事高允韜為檢校太保庚戌以涇原節度使涇原原本作經源今據歐陽史職方考改正影庫本粘籤充秦王府諸道行軍司馬開府儀同三司檢校太尉兼侍中李從曮為檢校太尉兼中書令依前涇原軍節度使充秦王府諸道行軍司馬詔改應順門為永曜門太平門為萬春門通政門為廣政門鳳明門為韶和門萬春門為中興門解卸殿為端明殿是日詔曰皇綱已正紫禁方嚴凡事內官不合更居外地詔諸道應有內官不計高低並仰逐處幷家口發遣赴闕不得輒有停滯帝龍潛時寺人數已及五百至是合諸道赴闕者約千餘人皆給賜優贍服玩華侈委之事務付以腹心唐時宦官為內諸司使務諸鎮監軍出納王命造作威福昭宗以此亡國及帝奄有天下當知戒彼前車前車原本作前卑今據文改正影庫本粘籤以為殷鑒一朝復興茲弊議者惜之新羅王金朴英遣使朝貢辛亥中書門下奏準本朝故事諸王內命婦宰臣學士中書舍人諸道節度防禦團練使留後官告即中書帖官告院索綾紙褾軸下所司書寫印署畢進入宣賜其文武兩班及諸道官員幷奏薦將校並合於所司送納朱膠綾紙價錢伏自偽梁不分輕重並從官給今後如非前件事例請官中不給告敕其內司大官侍衞將校轉官即不在此限從之壬子蜀主王衍致書於帝稱有詐為天使馳報收復汴州者詔捕之不獲癸丑有司奏郊祀前二日迎祔高祖太宗懿祖獻祖太祖神主於太廟議者以中興唐祚不宜以追封之祖雜有國之君以為昭穆自懿祖已下宜別立廟於代州如後漢南陽故事可也南陽原本作南洋今據後漢書光武紀改正影庫本粘籤幽州北面軍前奏契丹還塞詔李嗣源班師鳳翔節度使秦王李茂貞上表請行藩臣之禮帝優報之甲寅帝於中興殿面賜郭崇韜鐵券有司上言皇太后到闕皇帝合於銀臺門內奉迎詔親至懷州奉迎中書奏自二十三日後散齋內車駕不合遠出詔改至河陽奉迎以禮部尚書興唐尹王正言依前禮部尚書充租庸使乙卯渤海國遣使貢方物幽州奏媯州山後十三寨百姓却復新州戊午以前太子少師薛廷珪為檢校戶部尚書太子少師致仕以前太子賓客封舜卿為太子少保致仕封舜卿原本作舜鄉今據冊府元龜改正影庫本粘籤以前太子賓客李文規為戶部侍郎致仕詔鹽鐵度支戶部並委租庸使管轄庚申四方館上言請今後除隨駕將校及外方進奉專使文武班三品以上官可以內殿對見其餘並詣正衙以申常禮從之車駕幸河陽奉迎皇太后辛酉帝侍皇太后至文武百僚迎於上東門是日河中府上言稷山縣割隸絳州以太僕卿李紓為宗正卿宗正卿原本作宗呈卿考新唐書百官志作宗正卿今改正影庫本粘籤以衞尉卿楊遘為太僕卿西京昭應縣華清宮道士張冲虛上言天尊院枯檜重生枝葉乙丑有司上言南郊朝享太廟舊例親王充亞獻終獻行事乃以皇子繼岌為亞獻皇弟存紀為終獻丙寅帝赴明堂殿致齋丁卯朝饗於太微宮戊辰饗太廟是日赴南郊二月己巳朔親祀昊天上帝於圜丘禮畢宰臣率百官就次稱賀還御五鳳樓宣制大赦天下應同光二年二月一日昧爽已前所犯罪無輕重常赦所不原者咸赦除之十惡五逆屠牛鑄錢故意殺人合造毒藥持杖行劫官典犯贓不在此限應自來立功將校各與轉官仍加賞給文武常參官節度觀察防禦刺史軍主都虞候指揮使父母亡歿者並與追贈在者各與加爵增封諸藩鎮各賜一子出身仍封功臣名號留後刺史官高者加階爵一級官卑者加官一資應本朝內外臣僚被朱氏殺害者特與追贈應諸州府不得令富室分外收貯見錢禁工人鎔錢為銅器勿令商人載錢出境近年已來婦女服飾異常寬博倍費縑綾有力之家不計卑賤悉衣錦繡悉衣錦繡原本作悉依綿繡今據文改正影庫本粘籤宜令所在糾察應有百姓婦女曾經俘擄他處為婢妾者一任骨肉識認男子曾被刺面者給與憑據放逐營生召天下有能以書籍進納者各等第酬奬仰有司速檢勘天下戶口正額墾田實數待憑條理以息煩苛是日風景和暢人胥悅服議者云五十年來無此盛禮然自此權臣愎戾伶官用事吏人孔謙酷加賦斂赦文之所原放謙復刻剝不行大失人心始於此矣庚午租庸使孔謙奏諸道綱運客旅多於私路苟免商稅請令所在關防嚴加捉搦從之癸酉宰臣豆盧革率百官上尊號曰昭文睿武至德光孝皇帝凡三上表從之甲戌詔曰汴州元管開封浚儀封丘雍丘尉氏陳留六縣偽庭割許州鄢陵扶溝陳州太康鄭州陽武中牟曹州考城等縣屬焉其陽武匡城扶溝考城四縣宜令且隸汴州餘還本部丙子以隨駕參謀耿瑗為司天監丁丑以光祿大夫, WYG: ''}
