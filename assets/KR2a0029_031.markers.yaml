  - {type: variant, offset: 205, length: 0, content: '', krp: 使陳許蔡觀使仍令中書不議除替五代㑹要乾化元年正月敇云許昌雄鎮太保韓建朕用以布政民耕盗止乆居其位庶可勝殘矣宜令中書門下不計年月勿議替乾化二年六月朝廷新有内難人心動揺部將張厚因作亂害建於衙署時年五十八子從訓昭宗在華時授太子侍學賜名文禮尋拜屯田員外郎國初為都官郎中賜紫年未弱冠時朝廷命從訓告國哀於陳許至二日軍亂與建併命乾化三年追贈太師李罕之陳州項城人父文世田家罕之拳勇趫㨗力兼數人少學為儒不成又落髪為僧以其無賴所至不容曾乞食於酸棗縣自旦至晡無與之者乃擲鉢於地毁棄僧衣亡命為盜㑹黄巢起曹濮罕之因合徒作剽漸至魁首及賊巢渡江罕之因以兵將背賊歸於唐髙駢録其功表為光州刺史嵗餘為蔡賊秦宗權冦迫不能守乃棄郡歸項城收合餘衆依河陽諸葛爽爽署為懷州刺史光啟初僖宗以爽為東南面招討以擊宗權爽乃表罕之為}
  - {type: variant, offset: 206, length: 0, content: '', WYG: 令將兵屯宋州蔡冦兇􅀈日熾兵鋒不敵中和四年爽表罕之為河南尹東郡留守是歲李克用脫上源之難歛軍西歸路由洛陽罕之迎謁供帳館待甚優因與克用厚相結託時罕之有衆三千以聖善寺為府光政元年蔡賊秦宗權遣將孫儒來攻罕之對壘數月以兵少備竭委城而遁西保於澠池蔡賊據京城月餘焚燒宫闕剽剥居民賊既退去鞠為灰燼寂無雞犬之音罕之復引其衆築壘於市西明年冬諸葛爽死其將劉經推爽子仲方為帥經懼罕之難制自引兵鎮洛陽罕之部曲有李塘郭璆者情不相叶欲相圖害罕之怒誅璆軍情由是不睦劉經因其有間掩擊罕之于澠池軍亂保乾壕經急攻之為罕之所敗罕之乘勝追至洛陽時經保敬愛寺罕之保苑中飛龍廐罕之激勵其衆攻敬愛寺數日因風縱火盡熖之經衆奔竄追斬殆盡罕之進逼河陽營於鞏縣陳舟於汜水將渡諸葛仲方遣將張言率師拒於河上時仲方年幼政在劉經諸將心多不附張言密與罕之修好經知其謀言懼引衆渡河歸罕之因合勢攻河陽為經所敗罕之與言退保懐州冬蔡將孫儒䧟河陽仲方汎輕舟來奔孫儒遂自稱節度}
