  - {type: variant, offset: 3069, length: 603, content: 賦稅者或辨雪寃獄能拯人命者或去害物之積弊立利世之新規有益時政為衆所推者即仰本處逐件分明聞奏當議奬擢或在任貪猥誅戮生靈公事不治為政怠惰亦加懲罰其州縣官任滿三考即具關申送吏部格式候敕除銓注其本道不得差攝官替正授者從之舊五代史考異有司上言皇帝四月一日御文明殿受冊徽號合服袞冕御殿前一日散齋於內殿從之是日李嗣源上表乞退兵權詔不允是時伶人景進用事閹官競進故重臣憂懼拜章請退癸丑左諫議大夫竇專上言請廢租庸使名目事歸三司疏奏不報唐州奏木連理詔先省員官除已別授官外其左散騎常侍李文矩等三十人却復舊官太子詹事石戩等五人宜以本官致仕將作少監岑保嗣等十四人續勅處分丙辰責授萊州司戶鄭王玉等一十一人並量移近地尚書戶部侍郎知貢舉趙頎卒以中書舍人裴皡權知貢舉禁用鉛錫錢丁巳中書門下奏懿祖陵請以永興為名獻祖陵請以長寧為名長寧原本作長應考五代會要唐獻祖陵名長寧今改正影庫本粘籤太祖陵請以建極為名從之淮南楊溥遣使貢賀郊天禮物案十國春秋吳世家王遣右衞上將軍許確進賀郊天銀二千兩錦綺羅一千二百疋細茶五百斤象牙四株犀角十株于唐舊五代史考異戊午詔應南郊行事官並付三銓磨勘優與處分己未以大理卿張紹珪充制置安邑解縣兩池榷鹽使幸左龍武軍以皇子繼岌代張全義判六軍諸衞事故也癸亥以彰武保大等軍節度使北平王高萬興可依前延州鄜州節度使檢校太保兼中書令北平王甲子幸東宅夏四月己巳朔帝御文明殿具袞冕受冊尊號曰昭文睿武至德光孝皇帝壬申以成德軍節度行軍司馬權知府事任圜為, WYG: ''}
