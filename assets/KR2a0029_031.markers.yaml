  - {type: punctuation, offset: 212, content: 、, id: KR2a0029_ZHSJ_031-bkkpn37}
  - {type: variant, offset: 212, length: 0, content: '', WYG: 又表言為河南尹東都留守罕之既與言患難交契刻臂為盟永同休戚如張耳陳餘之義也罕之雖有膽決雄猜翻覆而撫民御衆無方略率多苛暴性復貪冒不得士心既得河陽出兵攻晉絳時大亂之後野無耕稼罕之部下以俘剽為資啖人作食絳州刺史王友遇以城降罕之乃進攻晉州河中王重盈遣使求援于太祖時張言治軍有法善積聚勤于播植軍儲不乏言輸粟于罕之以給其軍罕之求索無限言頗苦之力不能應罕之則録河南府吏笞責之東諸侯修貢行在多為罕之邀留王重盈苦其侵削密結張言請圖之文徳元年春㑹罕之盡出其衆攻平陽言夜出師掩擊河陽罕之無備單步僅免舉族為言所俘罕之奔於太原李克用表為澤州刺史仍領河陽節度使三月克用遣其將李存孝率師三萬助之來攻懐孟城中食盡備豫皆竭張言遣其孥入質且求救於太祖太祖遣葛從周牛存節赴之逆戰於流河店㑹晉將安休休以一軍奔於蔡存孝引軍而退罕之保於澤州自是罕之日以兵冦鈔懐孟晉絳數百里内郡邑無長吏閭里無居民河内百姓相結屯寨或出樵汲即為俘馘雖竒峯絶磴梯危架險亦為罕之部衆攻取先是蒲絳之間有山曰摩雲邑人立棚於上以避冦亂罕之以百餘人攻下之軍中因號罕之為李摩雲自是數州之民屠啖殆盡荆棘蔽野烟火斷絶凡十餘年乾寧二年李克用出師以拒邠鳳營於渭北天子以克用為邠州行營四面都統克用乃表罕之為副及誅王行瑜罕之以功授}
