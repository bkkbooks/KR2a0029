  - {type: variant, offset: 2300, length: 598, content: 太保朱守殷為振武節度使加檢校太傅戊子以前右龍武軍都虞候守左龍武大將軍李紹奇為鄭州防禦使以楚州防禦使張繼孫為汝州防禦使汝州原本作滸州今據冊府元龜改正影庫本粘籤己丑以振武軍節度使權安義留後檢校太傅平章事李存霸為潞州節度使以捧日都指揮使鄭州防禦使李紹琛為陝州節度使以成德軍馬步軍都指揮使右監門衞大將軍毛璋為華州節度使壬辰樞密使郭崇韜再上表請退樞密之職優詔不允癸巳詔曰皇太后母儀天下子視羣生當別建宮闈顯標名號冀因稱謂益表尊嚴宜以長壽宮為名樞密使郭崇韜奏時務利便一十五件優詔褒美甲午奚王李紹威吐渾李紹魯皆貢馬丁酉以武安軍衙內馬步軍都指揮使昭州刺史馬希範為永州刺史檢校太保癸卯以光祿大夫檢校左僕射行太常卿李燕為特進檢校司空依前太常卿以御史中丞李德休為兵部侍郎以吏部侍郎崔協為御史中丞三月甲辰故河陽節度使王師範贈太尉乙巳以滄州節度使檢校太傅同平章事符習為青州節度使以北京衙內馬步軍都指揮使右領軍衞大將軍李紹斌為滄州節度使鎮州奏契丹犯塞詔李嗣源率師屯邢州案通鑑詔橫海節度使李紹斌北京指揮使李從珂帥騎兵分道備之與薛史異舊五代史考異丙午以荊南節度使守中書令渤海王高季興依前檢校太師兼尚書令封南平王以幽州節度行軍司馬李存賢依前檢校太保為幽州節度使中書門下上言近以諸州奏薦令錄頗亂規程請今後節度使管三州已上每年許奏管內官三人如管三州已下只奏兩人仍須課績尤異方得上聞防禦使止許奏一人刺史無奏薦之例從之己酉以太子少保李琪為刑, WYG: 工}
