  - {type: variant, offset: 212, length: 0, content: '', krp: 又表言為河南尹東都留守罕之既與言患難交契刻臂為盟永同休戚如張耳陳餘之義也罕之雖有膽決雄猜翻覆而撫民御衆無方略率多苛暴性復貪冒不得士心既得河陽出兵攻晉絳時大亂之後野無耕稼罕之部下以俘剽為資啖人作食絳州刺史王友遇以城降罕之乃進攻晉州河中王重盈遣使求援于太祖時張言治軍有法善積聚勤于播植軍儲不乏言輸粟于罕之以給其軍罕之求索無限言頗苦之力不能應罕之則録河南府吏笞責之東諸侯修貢行在多為罕之邀留王重盈苦其侵削密結張言請圖之文徳元年春㑹罕之盡出其衆攻平陽言夜出師掩擊河陽罕之無備單步僅免舉族為言所俘罕之奔於太原李克用表為澤州刺史仍領河陽節度使三月克用遣其將李存孝率師三萬助之來攻懐孟城中食盡備豫皆竭張言遣其孥入質且求救於太祖太祖遣葛從周牛存節赴之逆戰於流河店㑹晉將安休休以一軍奔於蔡存孝引軍而退罕之保於澤州自是罕之日以兵冦鈔懐孟晉絳數百里内郡邑無長吏閭里無居民河内百姓相結屯寨或出樵汲即為俘馘雖竒峯絶磴梯危架險亦為罕之部衆攻取先是蒲絳之間有山曰摩雲邑人立棚於上以避冦亂罕之以百餘人攻下之軍中因號罕之為李摩雲自是數州之民屠啖殆盡荆棘蔽野烟火斷絶凡十餘年乾寧二年李克用出師以拒邠鳳營於渭北天子以克用為邠州行營四面都統克用乃表罕之為副及誅王行瑜罕之以功授}
  - {type: variant, offset: 215, length: 0, content: '', WYG: 尉食邑千户罕之自以功多私謂晉將葢寓曰余自河陽失守來依巨廕嵗月滋夊功效未施比年以來倦於師旅所謂老夫耄矣無能為也望吾王仁愍太}
  - {type: variant, offset: 215, length: 0, content: '', krp: 尉食邑千户罕之自以功多私謂晉將葢寓曰余自河陽失守來依巨廕嵗月滋夊功效未施比年以來倦於師旅所謂老夫耄矣無能為也望吾王仁愍太}
  - {type: variant, offset: 216, length: 2, content: 王瓚, WYG: 哀憐與一小鎮休兵養疾一二年間即歸老莬裘幸也寓為言之克用不對每藩鎮缺帥議所不及罕之私心鬱鬱蓋寓懼其佗圖亟為論之克用曰吾於罕之豈惜一鎮吾有罕之亦如董卓之有吕布雄則雄矣鷹鳥之性飽則颺去實懼翻覆毒余也光化元年十二月晉之潞帥薛志勤卒罕之乘其喪自澤州率衆徑入潞州自稱留後以狀聞於克用曰聞志勤之喪新帥未至慮為佗盗所窺不俟命已屯於潞矣克用怒遣李昭嗣討之罕之執其守將馬溉伊鐸何萬友沁州刺史傳瑶等遣其子顥拘送於太祖以求援焉新唐書全忠表罕之昭義軍節度使㑹罕之暴病不能視事明年六月病篤太祖令丁㑹代之移罕之為河陽節度使行至懐州卒於傳舍時年五十八歳子顥以舟載柩歸葬河隂縣開年二年春詔贈中書令馮行襲字正臣武當人也厯職為本郡都校中和中僖宗在蜀有賊首孫喜者聚徒數十人欲入武當刺史吕曄惶駭無䇿畧行襲伏勇士於江南乘小舟逆喜謂喜曰郡人得良牧衆心歸矣但縁兵多民懼擄掠若駐軍江北領肘腋以赴之使某前導以慰安士民可立定也喜然之既渡江軍吏迎謁伏甲奮起行襲擊喜仆地伏劍斬之其黨盡殪賊衆在江北者悉奔潰山南節度使劉巨容以功上言尋授均州刺史州西有長山當襄漢蜀路羣賊屯據以邀刦貢奉行襲又破之洋州節度使葛佐奏辟為行軍司馬請將兵鎮谷口通秦蜀道由是益知名李茂貞遣養子繼臻竊據金州行襲攻下之因授金州防禦使時興元楊守亮將襲京師道出金商行襲逆擊大破之詔升金州為節鎮以戎昭軍為額即以行襲為節度使及太祖義旗西征行襲遣副使魯崇矩禀受制令會唐昭宗幸鳳翔太祖帥師奉迎久之未出中尉韓全誨遣中官郄文晏等二十餘人分命矯詔欲徵江淮兵屯於金州以䝱太祖之軍行襲定䇿盡殺之收其詔勅送於太祖天祐元年兼領洋州節度使太祖之伐荆襄行襲令其子朂以舟師會於均房預收復功遷匡國軍節度使到任誅大吏張澄暴其罪州人莫不惴懾在許三年上供外别進助軍羡糧二十萬石及太祖郊􅀈行襲請入覲貢獻巨萬恩禮殊厚尋詔翰林學士杜曉撰徳政碑以賜之累官至兼中書令冊拜司空開平中卒輟朝一日}
