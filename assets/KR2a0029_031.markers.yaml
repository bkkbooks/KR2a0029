  - {type: variant, offset: 205, length: 0, content: '', WYG: 使陳許蔡觀使仍令中書不議除替五代㑹要乾化元年正月敇云許昌雄鎮太保韓建朕用以布政民耕盗止乆居其位庶可勝殘矣宜令中書門下不計年月勿議替乾化二年六月朝廷新有内難人心動揺部將張厚因作亂害建於衙署時年五十八子從訓昭宗在華時授太子侍學賜名文禮尋拜屯田員外郎國初為都官郎中賜紫年未弱冠時朝廷命從訓告國哀於陳許至二日軍亂與建併命乾化三年追贈太師李罕之陳州項城人父文世田家罕之拳勇趫㨗力兼數人少學為儒不成又落髪為僧以其無賴所至不容曾乞食於酸棗縣自旦至晡無與之者乃擲鉢於地毁棄僧衣亡命為盜㑹黄巢起曹濮罕之因合徒作剽漸至魁首及賊巢渡江罕之因以兵將背賊歸於唐髙駢録其功表為光州刺史嵗餘為蔡賊秦宗權冦迫不能守乃棄郡歸項城收合餘衆依河陽諸葛爽爽署為懷州刺史光啟初僖宗以爽為東南面招討以擊宗權爽乃表罕之為}
  - {type: page-break, offset: 205, content: '', id: KR2a0029_WYG_031-4b, image: WYG0277/WYG0277-0142b.png}
