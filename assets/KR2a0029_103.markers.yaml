  - {type: variant, offset: 1724, length: 1, content: 章, WYG: 牋乞降丁巳入成都自興師出洛至定蜀計七十五日走丸之勢前代所無師回至渭南聞莊宗敗師徒潰散自縊死太平廣記引王氏見聞録云魏王繼岌伐蜀迴軍在道而有鄴都之變莊宗與劉后命内臣張漢賓齎急詔所在催魏王歸闕張漢賓乘馹倍道急行至興元西縣逢魏王宣𫝊詔㫖王以本軍方討漢川康延孝相次繼來欲候之出山以陳凱歌漢賓督之有軍謀陳岷比事梁與漢賓熟密問張曰天子改換}
