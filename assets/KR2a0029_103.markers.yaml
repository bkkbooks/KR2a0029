  - {type: variant, offset: 27, length: 1, content: 受, WYG: 聽殺之于府門之碑下邕王存美武皇子莊宗第三弟同光三年封莊宗敗不知所終通鑑云存美以病風偏枯得免居于晉陽薛王存禮武皇子同光三年封莊宗敗不知所終申王存渥莊宗第四弟歐陽史存渥與存霸存紀皆莊宗同母弟同光三年封莊宗敗與劉皇后同奔太原為部下所殺通鑑云存渥至晉陽李彥超不納走至風谷為其下所殺睦王存乂莊宗第五弟同光三年封案以下原闕歴鄜州刺史後以郭崇韜壻為莊宗所殺北夢瑣言云莊宗異母弟存乂以郭崇韜女壻伏誅先是郭崇韜既誅之後}
