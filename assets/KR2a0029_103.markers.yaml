  - {type: variant, offset: 6056, length: 0, content: '', WYG: 子重哲授銀青光禄大夫檢校工部尚書歐陽史家人𫝊不𫝊雍王重美末帝第二子清泰三年封晉兵入與末帝俱自焚死通鑑云洛陽自閒兵敗衆心大震居人四出逃竄山谷門者請禁之雍王重美曰國家多難未能為百姓主徒増惡名耳不若聽其自便事寧自還乃出令任従所適衆心差安又云皇后積薪欲燒宫室重美諫曰新天子至必不露居他日重勞民力死而遺怨将安用之乃止史臣曰繼岌以}
