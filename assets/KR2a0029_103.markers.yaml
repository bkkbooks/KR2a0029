  - {type: variant, offset: 2695, length: 1481, content: 功于朝廷握強兵臨重鎮以讒見疑豈可坐而待斃教以易其語云誅將士以激怒衆心太祖納其言舊五代史考異翌日郭威以衆南行戊寅鄴兵至澶州庚辰至滑州節度使宋延渥開門迎降案歐陽史庚辰義成軍節度使宋延渥叛附于郭威與薛史同通鑑作辛巳與薛史異是日詔前開封尹侯益前鄜州節度使張彥超權侍衞馬軍都指揮使閻晉卿鄭州防禦使吳虔裕等率禁軍赴澶州守捉辛巳帝之小豎脫自北迴守捉原本作字足今從通鑑考異所引薛史改正又小豎脫通鑑字從鳥歐陽史字從馬胡三省通鑑注云力鍾翻又盧紅翻歐陽史作亦音龍薛史隱帝紀作周太祖紀作蓋亦據漢周實錄未及改從畫一也今姑從其舊影庫本粘籤先是帝遣脫偵鄴軍所至為游騎所獲郭威即遣廻因令附奏赴闕之意仍以密奏置脫衣領中帝覽奏即召李業示之聶文進郭允明等在傍懼形于色初議車駕幸澶州及聞鄴兵已至河上乃止帝大懼私謂宰臣竇貞固等曰昨來之事太草草耳李業等請帝傾府庫以給諸軍宰相蘇禹珪以為未可業拜禹珪於帝前曰相公且為官家莫惜府庫遂下令侍衞軍人給二十緡下軍各給十緡其北來將士亦準此仍遣北來將士在營子弟各齎家問向北諭之壬午鄴軍至封丘慕容彥超自鎮馳至帝遂以軍旅之事委之案宋史侯益傳云周太祖起兵隱帝議出師禦之益獻計曰王者無敵于天下兵不宜輕出況大名戍卒家屬盡在京城不如閉關以挫其銳遣其母妻發降以招之可不戰而定慕容彥超以為益衰老作懦夫計沮之舊五代史考異彥超謂帝曰陛下勿憂臣當生致其魁首彥超退見聶文進詢北來兵數及將校名氏文進告之彥超懼曰大是劇賊不宜輕耳又遣袁劉重進王知則等出師以繼前軍慕容彥超以大軍駐於七里郊掘塹以自衞都下率坊市出酒食以餉軍癸未車駕勞軍即日還宮翌日慕容彥超揚言曰官家宮中無事明日再出觀臣破賊甲申車駕復出幸七里店軍營王師陣於劉子陂劉子陂東都事略宋延渥傳作留子陂考通鑑歐陽史俱作劉蓋地名多用對音字今仍其舊影庫本粘籤與鄴軍相望太后以帝至晚在外遣中使謂聶文進曰賊軍在近大須用意文進曰有臣在必不失策縱有一百箇郭威亦當生擒之耳彥超輕脫先擊北軍郭威命何褔進王彥超李筠等大合騎以乘之彥超退却死者百餘人於是諸軍奪氣稍稍奔於北軍吳虔裕張彥超等相繼而去慕容彥超以部下十數騎奔兗州是夜帝與宰臣從官宿於野次侯益焦繼勳潛奔鄴軍乙酉旦帝策馬至玄化門劉銖在門上問帝左右兵馬何在乃射左右帝迴與蘇逢吉郭允明詣西北村舍郭允明知事不濟乃剚刃於帝而崩時年二十蘇逢吉郭允明皆自殺案通鑑考異引劉恕曰允明帝所親信何由弒逆蓋郭威兵殺帝事成之日諱之因允明自殺而歸罪耳今考劉恕所辨祇以揣度言之亦無實據薛史蓋據當時實錄也是日周太祖自迎春門入諸軍大掠煙火四發翌日至晡方定前滑州節度使白再榮為亂兵所害吏部侍郎張允墜屋而死周太祖既入京城命有司遷帝梓宮於太平宮或曰可依魏高貴鄉公故事以公禮葬之周祖曰予顛沛之中不能護衞至尊以至於此若又貶降人謂我何於是詔擇日舉哀命前宗正卿劉皡主喪丙戌太后誥曰高祖皇帝翦亂除兇變家為國救生靈於塗炭創王業於艱難甫定寰區遽遺弓劍樞密使郭威楊邠侍衞使史弘肇三司使王章親承顧命輔立少君協力同心安邦定國旋屬四方多事三叛連衡吳蜀內侵契丹啟釁蒸黎兇懼宗社阽危郭威授任專征提戈進討躬當矢石盡掃煙塵外寇盪平中原寧謐復以強敵未殄邊塞多艱允賴寶臣往臨大鄴疆埸有蕃籬之固朝廷寬宵旰之憂不謂兇豎連謀羣小得志密藏鋒刃竊發殿庭已殺害其忠良方奏聞於少主無辜受戮有口稱寃而又潛差使臣矯齎宣命謀害樞密使郭威宣徽使王峻侍衞步軍都指揮使王殷等人知無罪天不助奸今者郭威王峻澶州節度使李洪義前曹州防禦使何褔進前復州防禦使王彥超前博州刺史李筠北面行營馬步都指揮使郭崇步軍都指揮使曹英護聖都指揮使白重贊索萬進田景咸樊愛能李萬全史彥超奉國都指揮使張鐸王暉胡立弩手指揮使何贇等徑領兵師來安社稷逆黨, WYG: 内}
