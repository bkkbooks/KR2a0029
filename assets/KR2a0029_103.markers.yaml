  - {type: variant, offset: 1131, length: 489, content: 勳為開封尹加兼中書令未出閤甲子詔諸道州府差置散從官大府五百人上州三百人下州二百人勒本處團集管係立節級檢校教習以警備州城閏月癸巳京師大風雨壞營舍吹鄭門扉起十數步而墮拔大木數十震死者六七人水平地尺餘池隍皆溢是月宮中有怪物投瓦石擊窗撼扉人不能制六月庚子以國子祭酒田敏為尚書右丞癸卯太僕卿致仕謝攀卒輟視朝一日鄭州奏河決原武縣界乙卯司天臺上言鎮星逆行至太微左掖門外自戊申年八月十二日入太微西垣犯上將屏星執法勾己往來至己酉年十一月十二日夜方出左掖門順行自今年正月十日夜復逆行入東垣至左掖門秋七月庚午河陽奏河漲三丈五尺乙亥滄州奏積雨約一丈二尺安州奏溝河泛溢州城內水深七尺丙子帝御崇元殿授皇太后冊命宰臣蘇逢吉行禮辛巳三司使奏州縣令錄佐官請據戶籍多少量定俸戶縣三千戶已上令月十千主簿八千二千戶已上令月八千主簿五千二千戶已下令月六千主簿四千每戶月出錢五百並以管內中等戶充錄事參軍判司俸錢視州界令佐取其多者給之其俸戶與免縣司差役從之八月辛亥以蒙州城隍神為靈感王從湖南請也時海賊攻州城州人禱於神城得不陷故有是請辛酉給事中陶穀上言請停五日內殿轉對從之壬戌以兵部侍郎于德辰為御史中丞邊蔚為兵部侍郎九月辛巳朗, WYG: 岳納符印秦}
