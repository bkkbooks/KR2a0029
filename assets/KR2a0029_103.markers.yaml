  - {type: variant, offset: 163, length: 265, content: 刺史王萬敢奏奉詔領兵入海州界至荻水鎮俘掠焚蕩更請益兵詔前沂州刺史郭瓊率禁軍赴之庚戌前永興軍節度副使安友規除名流登州沙門島先是友規權知永興軍府事及趙思綰之奔衝友規失守城池至是乃正其罪焉癸亥癸亥以長歷推之當作癸丑今無別本可校姑仍其舊影庫本粘籤以前邠州節度使宋彥筠為太子太師致仕丙寅分命使臣赴永興鳳翔河中收葬用兵已來所在骸骨時已有僧聚髑髏二十萬矣前沂州刺史郭瓊奏部署兵士深入海州賊界是月有狐登明德樓主者獲之狐毛長而腹下別有二足二月辛巳青州奏郭瓊部署兵士自海州迴至當道甲申樞密使郭威巡邊迴丁亥汝州防禦使劉審交卒乙未以前安州節度使劉遂凝為左, WYG: ''}
