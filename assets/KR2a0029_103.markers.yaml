  - {type: variant, offset: 27, length: 1, content: 受, krp: 聽殺之于府門之碑下邕王存美武皇子莊宗第三弟同光三年封莊宗敗不知所終通鑑云存美以病風偏枯得免居于晉陽薛王存禮武皇子同光三年封莊宗敗不知所終申王存渥莊宗第四弟歐陽史存渥與存霸存紀皆莊宗同母弟同光三年封莊宗敗與劉皇后同奔太原為部下所殺通鑑云存渥至晉陽李彥超不納走至風谷為其下所殺睦王存乂莊宗第五弟同光三年封案以下原闕歴鄜州刺史後以郭崇韜壻為莊宗所殺北夢瑣言云莊宗異母弟存乂以郭崇韜女壻伏誅先是郭崇韜既誅之後}
  - {type: variant, offset: 29, length: 5, content: 賀鳳翔行營, WYG: 野駭惋議論紛然莊宗令閹人察訪外事言存乂于諸將坐上訴郭氏之無罪其言怨望又于妖術人楊千郎家飲酒聚㑹攘臂而泣楊千郎者魏州賤民自言得墨子術于婦翁能役使隂物帽下召食物果實之類又蒱博必勝人有拳握之物以法必取又説煉丹乾永易人形破扄鐍貴要間神奇之官至尚書郎賜紫其妻出入宫禁承恩用事皇弟存乂常朋淫于其家至是與存乂並罹其禍通王存確莊宗第六弟雅王存紀莊宗第七弟同光三年封莊宗敗並為霍彥威所殺梁紀太祖有子廷鸞落落盧文進𫝊莊宗又有弟存矩今宗室𫝊皆不載魏王繼岌莊宗子也莊宗即位于魏州以繼岌充北}
