  - {type: variant, offset: 19, length: 7, content: 春正月己亥朔帝, WYG: 封莊宗敗為軍卒所殺歐陽史云存霸歴昭義天平河中三軍節度使居京師食俸禄而已趙在禮反乃遣存霸于河中莊宗再幸氾水徙存霸北京留守通鑑云李紹榮欲奔河中就永王存霸従兵稍散存霸亦率衆千人棄鎮奔晉陽又云存霸至晉陽従兵逃㪚俱盡存霸削髪僧服謁李彥超願為山僧幸垂庇䕶軍士爭欲殺之彥超曰六相公來當奏取進止軍士}
