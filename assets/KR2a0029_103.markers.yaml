  - {type: variant, offset: 6053, length: 2, content: 九猶, WYG: 七時人哀之五代史闕文漢髙祖自太原起軍建號至洛陽命郭従義先入京師受密㫖殺王淑妃與許王従益淑妃臨刑號泣曰吾家子母何罪吾既為契丹所立非敢與人爭國何不且留吾兒每年寒食使持一盂飯灑明宗陵寢聞者無不泣下重吉末帝長子為控鶴都指揮使閔帝嗣位出為亳州團練使末帝兵起為閔帝所害通鑑云詔遣殿直楚匡祚執亳州李重吉幽于宋州又云遣楚匡祚殺李重吉于宋州匡祚榜捶重吉責其家財清泰元年詔贈太尉仍令宋州選隙地置廟明宗紀閔帝}
