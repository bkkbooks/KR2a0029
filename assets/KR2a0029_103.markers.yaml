  - {type: variant, offset: 4569, length: 1235, content: 宜令所司擇日備法駕奉迎即皇帝位於戲神器至重天步方艱致理保邦不可以不敬貽謀聽政不可以不勤允執厥中祗膺景命是日遣前太師馮道等往徐奉迎周太祖以嗣君未至萬機不可暫曠率羣臣請太后臨朝誥答曰昨以奸邪搆釁亂我邦家勳德効忠剪除兇慝俯從人欲已立嗣君宗社危而再安紀綱壞而復振皇帝法駕未至庶事方殷百辟上言請予艹泣政宜允輿議權總萬機止於浹旬即復明辟云按前代故事太上皇稱誥太皇太后皇太后曰令今云誥有司誤也以宣徽南院使王峻為樞密使右神武統軍袁為宣徽南院使陳州刺史李穀權判三司步軍都指揮使王殷為侍衞親軍馬步都指揮使護聖左廂都指揮使郭崇為侍衞馬軍都指揮使奉國左廂都指揮使曹英為侍衞步軍都指揮使鎮州邢州馳奏契丹寇洺州陷內丘縣時契丹永康王兀欲率部族兩道入邊內丘城小而固契丹攻之五日不下敵人傷者甚衆時有官軍五百在城防戍攻急官軍降於敵屠其城而去案遼史世宗紀十月自將南伐攻下安平內丘束鹿等城大獲而還與薛史所載互有詳略庚寅樞密使郭威奏左軍巡勘得飛龍使後贊款伏與蘇逢吉李業閻晉卿聶文進郭允明等同謀令散員都虞候奔德等下手殺害史弘肇等權開封尹劉銖具伏朋附李業為亂屠害將相家屬其劉銖等準誥旨處置訖幷蘇逢吉郭允明閻晉卿聶文進首級並梟於南北市其骨肉放棄辛卯河北諸州馳報契丹深入太后誥曰王室多故邊境未寧內難雖平外寇仍熾據北面奏報強敵奔衝繼發兵師未聞平殄須勞上將暫自臨戎宜令樞密使郭威部署大軍早謀掩擊其軍國庶事權委宰臣竇貞固蘇禹珪樞密使王峻等商量施行在京馬步兵士委王殷都大提舉十二月甲午朔郭威領大軍北征丁酉以翰林學士尚書戶部侍郎知制誥范質為樞密副使案東都事略周太祖征李守貞每朝廷遣使齎詔處分軍事皆中機會太祖問誰為此辭使者以范質對太祖曰宰相器也太祖起兵入京師遽令草太后誥及議迎湘陰公儀注乃白太后以質為兵部侍郎樞密副使舊五代史考異陝州李洪信奏馬步都指揮使聶召奉國指揮使楊德護聖指揮使康審澄等與節度使判官路濤掌書記張洞都押衙楊紹勍等同情謀叛並殺之惟康審澄夜中放火斬關奔歸京師初朝議以諸道方鎮皆是勳臣不諳政理其都押衙孔目官令三司軍將內選才補之藩帥不悅故洪信因朝廷多故誣奏加害焉壬寅湖南上言朗州馬希萼引五谿蠻及淮南洪州軍來攻當道望量差兵士於淮境牽引乙巳遣前淄州刺史陳恩讓領軍入淮南界以便宜進取辛亥遣宰相蘇禹珪及朝臣十員往宋州迎奉嗣君壬子樞密使郭威次澶州何褔進已下及諸軍將士扶擁威請為天子即日南還威上章于太后言為諸軍所迫班師庚申威至北郊駐軍於臯門村許州巡檢前申州刺史馬鐸奏節度使劉信自殺壬戌奉太后誥命樞密使侍中郭威監國中外庶事並取監國處分先是樞密使王峻以湘陰公已在宋州慮聞澶州之事左右變生遣侍衞馬軍指揮使郭崇率七百騎往衞之案東都事略郭崇傳王峻遣崇率七百騎拒贇遇于睢陽崇曰澶州兵變遣崇來衞乘輿非有他也具言軍情有屬天命已定贇執崇手而泣崇即送贇就館舊五代史考異己未太后誥曰比者樞密使郭威志安社稷議立長君以徐州節度使贇高祖近親立為漢嗣爰自藩鎮徵赴京師雖誥命尋行而軍情不附天道在北人心靡東適當改卜之初俾膺分土之命贇可降授開府儀同三司檢校太師上柱國封湘陰, WYG: ''}
