  - {type: variant, offset: 472, length: 257, content: 部送所獲淮南都將李暉等三十三人徇于市給衫帽放還本土是月鄴都留守高行周兗州符彥卿鄆州慕容彥超西京留守白文珂鎮州武行德安州楊信潞州常思府州折從阮皆自鎮來朝嘉慶節故也戊午宴羣臣於永褔殿帝初舉樂壬戌鄴都高行周移鎮鄆州兗州符彥卿移鎮青州並加邑封甲子西京留守白文珂潞州常思鎮州武行德並進邑封鄆州慕容彥超移鎮兗州夏四月戊辰朔邢州薛懷讓移鎮同州相州郭謹河陽李暉並進邑封庚午府州折從阮移鎮鄧州辛未故深州刺史史萬山案遼史世宗紀殺深州刺史史萬山在天祿三年即漢乾祐二年贈太傅先是契丹入邊萬山城守郭威遣索萬進率騎七百屯深州一日契丹數千騎迫州, WYG: 偽蜀}
