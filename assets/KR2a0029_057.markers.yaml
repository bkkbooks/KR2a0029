  - {type: variant, offset: 2374, length: 474, content: 五條皆便於時取悅人心又請罷樞密院事各歸本司以輕其權然宦官造謗不已三年堅乞罷兼領節鉞許之案冊府元龜云同光中崇韜再表辭鎮批答曰朕以卿久司樞要常處重難或遲疑未決之機詢諸先見或憂撓不定之事訪自必成至於贊朕丕基登茲大寶衆興異論卿獨堅言天命不可違唐祚必須復請納家族明設誓文及其密取汶陽興師入不測之地潛通河口貢謀占必濟之津人所不知卿惟合意迨中都嘯聚羣黨窺凌朕決議平妖兼收浚水雖云先定更審前籌果盡贊成悉諧沈算斯即何須冒刃始顯殊庸況常山陸梁正虞未復卿能撫衆共定羣心惟朕知卿他人寧表所以賞卿之寵實異等倫沃朕之心非虛渥澤今卿再三謙遜重疊退辭始納常陽請歸上將又稱梁苑不可兼權如此周身貴全名節古人操守未可比方既覽堅辭難沮來表其再讓汴州所宜依允會客省使李嚴使西川迴言王衍可圖之狀莊宗與崇韜議討伐之謀方擇大將時明宗為諸道兵馬總管當行崇韜自以宦者相傾欲立大功以制之乃奏曰契丹犯邊北面須藉大臣全倚總管鎮禦臣伏念興聖宮使繼岌德望日隆大功未著宜依故事以親王為元帥付以討伐之權俾成其威望莊宗方愛繼岌即曰小兒幼稚安能獨行卿當擇其副崇韜未奏莊宗曰無踰於卿者乃以繼岌為都統崇韜為招討使是歲九月十, WYG: ''}
