  - {type: variant, offset: 488, length: 0, content: '', WYG: 城中守兵三千人帝率騎軍環城馳射又令歩兵持斧斬其鹿角負葭葦以堙塹帝自負一圍而進諸軍鼓譟而登遂拔其壘獲守將安彦之是夕帝宿楊劉天祐十五年春正月帝軍徇地至鄆濮時梁主在洛將修郊禮聞楊劉失守狼狽而還二月梁將謝彦章帥衆數萬來迫楊劉築壘以自固又決河水瀰漫數里以限帝軍六月壬戌帝自魏州復至楊劉甲子率諸軍涉水而進梁人臨水拒戰帝軍小卻俄而皷譟復進梁軍漸退因乘勢而擊之交鬬於中流梁軍大敗殺傷甚衆河水如絳謝彦章僅得免去是月淮南楊􅄎遣使來㑹兵將致討於梁也秋八月辛丑朔大閲於魏郊河東魏博幽滄鎮定邢洺麟勝雲朔十鎮之師及奚契丹室韋吐渾之衆十餘萬部陣嚴肅旌甲照曜師旅之盛近代為最已酉梁兖州節度使張萬進遣使歸欵帝自魏州率師次於楊劉略地至鄆濮而還遂營於麻家渡諸鎮列營十數梁將賀􅅛謝彦章以軍屯濮州行臺村結壘相持百餘日帝嘗以數百騎摩壘求戰謝彦章帥精兵五千伏於堤下常以十餘騎登堤伏兵發圍帝十數重俄而帝之騎軍繼至攻於圍外帝於圍中躍馬奮擊決圍而出李存審兵至梁軍方退是時帝鋭於接戰每馳騎出營存審必扣馬進諫帝伺存審有間即䇿馬而出顧左右曰老子妨吾戯耳至是㡬危方以存審之言為忠也十二月庚子朔帝進軍距梁軍柵十里而止時梁將賀􅅛殺騎將謝彦章於軍帝聞之曰賊帥自相魚肉安得不亡戊午下令軍中老㓜令歸魏州悉兵以趣汴庚申大軍毁營而進辛酉次於臨濮梁軍捨營踵於後癸夘次胡栁陂遲}
