  - {type: variant, offset: 7, length: 0, content: '', WYG: 里戊子旦乃至冀州蓚之耕者皆荷鉏奮挺逐之委棄軍資器械不可勝計梁祖聞之大駭自棗强馳歸貝州殺其將張正言許從實朱彦柔以其亡師於蓚也梁祖先抱痼疾固是愈甚辛丑滄州都將張萬進殺留後劉繼威自為滄帥遣人送欵於梁亦乞降於帝戊申周徳威遣李存暉攻瓦橋關下之四月丁巳梁祖自魏南歸疾篤故也戊申李嗣源攻瀛州抜之五月乙夘朔周徳威大破燕軍於羊頭崗擒大將單廷珪斬首五千餘級徳威自涿州進軍於幽州營於城下閏月己酉攻其西門燕人出戰敗之六月戊寅梁祖為其子友珪所弑友珪僭即帝位於洛陽秋八月朱友珪遣其將韓勍康懐英牛存節率兵五萬急攻河中朱友謙遣使來求援帝命李存審率師救之十月癸未帝自澤州路赴河中遇梁將康懐英於平陽破之斬首千餘級追至白徑嶺朱友謙㑹帝於猗氏梁軍解圍而去庚申周徳威報劉守光三遣使乞和不報丁夘燕將趙行實來奔天祐十年春正月丁巳周徳威攻下順州獲刺史王在思二月甲戌朔攻下安逺軍獲燕將一十八人庚寅梁朱友珪為其將袁象先所殺均王友貞即位於汴州丙申周徳威報檀州刺史陳確以城降三月甲辰朔収盧臺軍乙丑収古北口時居庸闗使胡令珪等與諸戍將相繼挈族來奔丙寅武州刺史髙行珪遣使乞降時劉守光遣愛將元行欽牧馬於山北聞行珪有變率戍兵攻行珪行珪遣其弟行温為質且乞應援周徳威遣李嗣源李嗣本安金全率兵救武州降元行欽以歸四月甲申燕將李暉等二十餘人舉族來奔徳威攻幽州南門壬辰劉守光遣使王遵化致書哀祈於徳威徳威戯遵化曰大燕皇帝尚未郊天何怯劣如是耶守光再遣哀祈徳威乃以狀聞已亥劉光濬攻下平州獲刺史張在吉五月壬寅朔光濬進迫營州刺史楊靖以城降乙已梁將楊師厚㑹劉守竒率大軍侵鎮州時帝之先鋒將史建瑭自趙州率五百騎入真定師厚大掠鎮冀之屬邑王鎔告急於周徳威徳威分兵赴援師厚移軍冦滄州張萬進懼遂降於梁六月壬申朔帝遣監軍張承業至幽州與周徳威㑹議軍事秋}
