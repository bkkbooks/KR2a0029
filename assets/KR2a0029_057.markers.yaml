  - {type: variant, offset: 9, length: 0, content: '', WYG: 鎮州王鎔迎謁於路天祐十一年春正月戊戌朔王鎔以履新之日與其子昭祚昭誨奉觴上壽置宴鎔啟曰燕王劉太師頃為隣國今欲挹其風儀可乎帝即命主者破械引仁㳟守光至與之同宴鎔饋以衣被飲食已亥帝發鎮州因與王鎔畋於衡唐之西壬子至晉陽以鉏練繫仁㳟守光號令而入是日誅守光遣大將李存霸拘送仁㳟於代州刺其心血奠告於武皇陵然後斬之是月鎮州王鎔定州王處直遣使推帝為尚}
  - {type: page-break, offset: 9, content: '', id: KR2a0029_WYG_057-6b, image: WYG0277/WYG0277-0252b.png}
  - {type: variant, offset: 9, length: 0, content: '', krp: 鎮州王鎔迎謁於路天祐十一年春正月戊戌朔王鎔以履新之日與其子昭祚昭誨奉觴上壽置宴鎔啟曰燕王劉太師頃為隣國今欲挹其風儀可乎帝即命主者破械引仁㳟守光至與之同宴鎔饋以衣被飲食已亥帝發鎮州因與王鎔畋於衡唐之西壬子至晉陽以鉏練繫仁㳟守光號令而入是日誅守光遣大將李存霸拘送仁㳟於代州刺其心血奠告於武皇陵然後斬之是月鎮州王鎔定州王處直遣使推帝為尚}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 令初王鎔稱藩於梁梁以鎔為尚書令至是鎮定以帝南破梁軍北定幽薊乃共推崇焉使}
  - {type: variant, offset: 10, length: 0, content: '', krp: 令初王鎔稱藩於梁梁以鎔為尚書令至是鎮定以帝南破梁軍北定幽薊乃共推崇焉使}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 至帝讓乃從之遂選日受册開霸府建行臺如武徳故事秋七月帝親將自黄沙嶺東下㑹鎮人進軍邢洺梁將楊師厚軍於漳東帝軍次張公橋既而禆將曹進金奔於梁帝軍不利而退八月還晉陽天祐十二月三月梁魏博節度使賀徳倫遣使奉幣乞盟時楊師厚卒於魏州梁主乃割相衛澶三州别為一鎮以徳倫為魏博節度使以張筠為相州節度使魏人不從是月二十九日夜魏軍作亂囚徳倫於牙署三軍大掠軍士有張彦者素實凶暴為亂軍之首迫徳倫上章請卻復六州之地梁主不從遂迫徳倫歸於帝且乞師為援帝命馬步副總管李存審自趙州帥師屯臨清帝自晉陽東下與存審㑹通鑑晉王引大軍自黄澤嶺東下與存審㑹于臨清猶疑魏人之詐按兵不進賀徳倫遣從事司空頲至軍密啟張彦狂勃之狀且曰若不翦此亂階恐貽後悔帝默然遂進軍永濟張彦謁見以銀槍効節五百人從皆被甲持兵以自衛帝登樓諭之曰汝等在城濫殺平人奪其妻女數日以來迎訴者甚衆當斬汝等以謝鄴人遽令斬彦及同惡者七人軍士股慄帝親加慰撫而退翼日帝輕裘緩䇿而進令張彦部下軍士被甲持兵環馬而從命為帳前銀槍都衆心大服梁將劉鄩聞帝至以精兵萬人自洹水趣魏縣帝命李存審帥師禦之帝率親軍於魏縣西北夾河為柵六月庚寅朔帝入魏州賀徳賀上符印請帝兼領魏州帝從之墨制授徳倫大同軍節度令取便路赴任帝下令撫諭鄴人軍城畏肅民心大服是時以貝州張源徳據壘拒命南通劉鄩又與滄州首尾相應聞徳州無備遣别將襲之遂抜其城命遼州牙將馬通為徳州刺史以扼滄貝之路秋七月梁澶州刺史王彦章棄城而遁畏帝軍之逼也以故將李巖為澶州刺史帝至魏縣因率百餘騎覘梁軍之營是日隂晦劉鄩伏兵五千於河曲叢木間帝至伏兵忽起大譟而來圍帝數十重帝以百騎馳突奮擊梁軍辟易決圍而出有頃援軍至乃解帝顧謂軍士曰㡬為賊所笑是月劉鄩潛師由黄澤西趣晉陽至樂平而還遂軍於宗城初鄩在洹水數日不出寂無聲迹帝遣騎覘之無斥候者城中亦無煙火之狀但有鳥止於壘上時見旗幟循蝶往來帝曰我聞劉鄩用兵一步百變必以詭計悮我使視城中乃縳旗於芻偶之上使驢負之循堞而行得城中羸老者詰之云軍去已二日矣既而有人自鄩軍至者言兵己趣黄澤帝遽發騎追之時霖雨積句鄩軍倍道兼行皆腹疾足腫加以山路險阻崖谷泥滑縁蘿引葛方得少進顛墜巖坂陷於泥淖而死者十二三前軍至樂平糗糒將竭聞帝軍追躡於後太原之衆在前羣情大駭鄩収合其衆還自邢州陳宋口渡漳水而東駐於宗城時魏之軍儲已乏臨清積粟所在鄩引軍據之周徳威初聞鄩軍之西自幽州率千騎至土門及鄩軍東下急趨南宫知鄩軍在宗城遣十餘騎迫其營擒斥候者斷其腕令還徳威至臨清鄩起軍駐貝州帝率親騎次博州鄩軍於堂邑周徳威自臨清率五百騎躡之是日鄩軍於莘縣帝營於西西一舍城壘相望日夕交鬬八月梁將賀瓌襲取澶州帝遣李存審率兵五千攻貝州因塹而圍之冬十月有軍士自鄩軍來奔帝善待之乃劉鄩密令齎酖賂帝膳夫欲寘毒於食中㑹有告者索其黨誅之天祐}
