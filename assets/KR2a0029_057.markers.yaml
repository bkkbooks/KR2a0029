  - {type: variant, offset: 8, length: 0, content: '', WYG: 月承業與徳威率千騎至幽州西守光遣人持信箭一隻乞修和好承業曰燕帥當令子弟一人為質則可是日燕將司全爽等十一人並舉族來奔辛亥徳威進攻諸城門壬子賊將楊師貴等五十人來降甲子五院軍使李信攻下莫州時守光繼遣人乞降將緩帝軍隂令其將孟修阮通謀於滄州節度使劉守竒及求援於楊師厚帝之游騎擒其使以獻是月帝㑹王鎔於天長九月劉守光率衆夜出遂陷順州冬十月已巳朔守光帥七百騎步軍五千夜入檀州庚午周徳威自涿州將兵躡之壬申守光自檀州南山而遁徳威追及大敗之獲大將李劉張景紹及將吏八百五十人馬一百五十匹守光得百餘騎遁入山谷徳威急馳扼其城門守光惟與親將李小喜等七騎奔入燕城己丑守光遣牙將劉化修周遵業等以書幣哀祈徳威庚寅守光乘城以病告復令人獻自乗馬玉鞍勒易徳威所乗馬而去俄而劉光濬擒送守光偽殿直二十五人於軍門守光又乘城謂徳威曰予俟晉王至即泥首俟命祈徳威即馳驛以聞十一月已亥朔帝下令親征幽州甲辰發晉陽己未至范陽辛酉守光奉禮幣歸欵於帝帝單騎臨城邀守光辭以他日蓋為其親將李小喜所扼也是夕小喜來奔帝下令諸軍詰旦攻城壬戌梯䡴並進軍士畢登帝登燕丹塚以觀之有頃擒劉仁㳟以獻癸亥帝入燕城諸軍畢賀十二月庚午墨制授周徳威幽州節度使癸酉檀州燕樂縣人執劉守光并妻李氏祝氏子繼祚以獻已夘帝下令班師自雲代而旋時鎮州王鎔定州王處直遣使請帝由井陘而西許之庚辰帝發幽州擄仁㳟父子以行甲申次定州舍於關城翼日次曲陽與王處直謁北嶽祠是日次衡}
