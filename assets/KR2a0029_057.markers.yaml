  - {type: variant, offset: 4, length: 1, content: 卷, WYG: 巻二十八宋門下侍郎參知政事監修國史薛居正等撰唐書第四莊宗紀二天祐九年春正月庚辰朔周徳威等自飛狐東下丙戌㑹鎮定之師進營祁溝庚子次涿州刺史劉知温以城歸順徳威進迫幽州守光岀兵拒戰燕將王行方等以部下四百人來奔二月庚戌朔梁祖大舉河南之衆以援守光以陜州節度使楊師厚為招討使河陽李周􅂜為副青州賀徳倫為應接使鄆州袁象先為副甲子梁祖自洛陽趨魏州遣楊師厚李周彞攻鎮州之棗强命賀徳倫攻蓚縣三月壬午梁祖自督軍攻棗强甲申城陷屠之時李存審與史建瑭以三千騎屯趙州相與謀曰梁軍若不攻蓚城必西攻深冀吾王方北伐以南鄙之事付我輩豈可坐觀其弊乃以八百騎趨冀州扼下博橋令史建瑭李都督分道擒生翼日諸軍皆至獲芻牧者數百人盡殺之縱數人逸去且告晉王至矣建瑭與李都督各領百餘騎旗幟軍號類梁軍與芻牧者雜行暮及賀徳倫營門殺守門者縱火大呼俘斬而旋又執芻牧者斷其手令迴梁軍乃夜遁蓚人持鉏耰白挺追擊之悉獲其輜重通鑑後梁紀云帝燒營夜遁迷失道委曲行百}
