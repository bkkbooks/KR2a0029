  - {type: variant, offset: 13, length: 0, content: '', WYG: 年春二月帝知劉鄩將謀速戰乃聲言歸晉陽以誘之實勞軍於貝州也令李存審守其營鄩謂帝已臨晉陽將乘虚襲鄴遣其將楊延直自澶州率兵萬人㑹於城下夜半至於南門之外城中潛出壯士五百人突入延直之軍譟聲動地梁軍自亂遲明鄩自莘引軍至城東與延直兵會鄩之來也李存審率兵踵其後李嗣源自魏城出戰俄而帝自貝州至鄩卒見帝驚曰晉王耶因引軍漸卻至故元城西李存審大軍已成}
  - {type: page-break, offset: 13, content: '', id: KR2a0029_WYG_057-10b, image: WYG0277/WYG0277-0254b.png}
  - {type: variant, offset: 13, length: 0, content: '', krp: 年春二月帝知劉鄩將謀速戰乃聲言歸晉陽以誘之實勞軍於貝州也令李存審守其營鄩謂帝已臨晉陽將乘虚襲鄴遣其將楊延直自澶州率兵萬人㑹於城下夜半至於南門之外城中潛出壯士五百人突入延直之軍譟聲動地梁軍自亂遲明鄩自莘引軍至城東與延直兵會鄩之來也李存審率兵踵其後李嗣源自魏城出戰俄而帝自貝州至鄩卒見帝驚曰晉王耶因引軍漸卻至故元城西李存審大軍已成}
  - {type: variant, offset: 14, length: 2, content: 傳第, WYG: 矣軍前後為方陣梁軍於其間為圓陣四面受敵兩軍初合梁軍稍衂再合鄩引騎軍突西南而走帝以騎軍追擊之梁步兵合戰短兵既接帝軍皷譟圍之數重埃塵漲天李嗣源以千騎突入其間衆皆披靡相躪如積帝軍四面斬擊棄甲之聲聞數十里衆既奔潰帝之騎軍追至於河上十百為羣赴水而死梁步兵七萬殱亡殆盡劉鄩自黎陽濟奔滑州是月梁主遣别將王澶率兵五萬自隂地闗趨晉陽急攻其城昭義李嗣昭遣將石嘉才率騎三百赴援時安金全張承業堅守於内嘉才救援於外檀懼乃燒營而遁追擊至隂地關時劉鄩敗於莘縣王檀遁於晉陽梁主聞之曰吾事去矣三月乙夘朔分兵以攻衛州壬戌刺史米昭以城降夏四月攻洺州下之五月帝還晉陽六月命偏師攻閻寳於邢州梁主遣捉生都將張温率步騎五百為援至内黄温率衆來奔秋七月甲寅朔帝自晉陽至魏州八月大閲師徒進攻邢州相州節度使張筠棄城遁去以袁建豐為相州刺史依舊𨽻魏州邢州節度使閻寳請以城降以忻州刺史蕃漢副總管李存審為邢州節度使以閻寳為西南面招討使遥領天平軍節度使是月契丹入蔚州振武節度使李嗣本䧟於契丹}
