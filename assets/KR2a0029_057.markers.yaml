  - {type: variant, offset: 602, length: 1770, content: 考異賊軍未至則柵壘成矣崇韜率毛璋等萬人夜趨博州視矛戟之端有光崇韜曰吾聞火出兵刃破賊之兆也至博州渡河版築晝夜不息崇韜於葭葦間據胡床假寢覺袴中冷左右視之乃蛇也其忘疲勵力也如是居三日梁軍果至案歐陽史作六日壘成彥章果引兵急攻之舊五代史考異城壘低庳沙土散惡戰具不完汴將王彥章杜晏球率衆攻擊軍不得休息崇韜身先督衆四面拒戰有急即應城垂陷俄報莊宗領親軍次西岸梁軍聞之退走因解楊劉之圍未幾汴將康延孝來奔崇韜延於臥內訊其軍機延孝曰汴人將四道齊舉以困我軍莊宗憂之召諸將謀進取之策宣徽使李紹宏請棄鄆州與汴人盟以河為界無相侵寇案歐陽史作諸將皆言隔河難守據薛史則請以河為界者李紹宏一人耳與歐陽史異莊宗不悅獨臥帳中召崇韜謂曰計將安出對曰臣不知書不能徵比前古請以時事言之且陛下十五年起義圖霸為雪家讎國恥甲冑生蟣虱黎人困輸輓輸輓原本作輪今據文改正影庫本粘籤今纂崇大號河朔士庶日望盪平纔得汶陽尺寸之地不能保守況盡有中原乎將來歲賦不充物議咨怨設若劃河為界誰為陛下守之臣自延孝言事以來晝夜籌度料我兵力算賊事機不出今年雌雄必決聞汴人決河自滑至鄆非舟檝不能濟又聞精兵盡在段凝麾下王彥章日寇鄆境彼既以大軍臨我南鄙又憑恃決河謂我不能南渡志在收復汶陽此汴人之謀也臣謂段凝保據河壖苟欲持我臣但請留兵守鄴保固楊劉陛下親御六軍長驅倍道直指大梁汴城無兵望風自潰若使偽主授首賊將自然倒戈半月之間天下必定如不決此計傍採浮譚臣恐不能濟也今歲秋稼不登軍糧纔支數月決則成敗未知不決則坐見不濟臣聞作舍道邊三年不成帝王應運必有天命成敗天也在陛下獨斷莊宗蹶然而興曰正合吾意丈夫得則為王失則為擄行計決矣即日下令軍中家口並還魏州莊宗送劉皇后與興聖宮使繼岌至朝城西野亭泣別興聖宮使原本脫興字今據歐陽史增入影庫本粘籤曰事勢危今須一決事苟不濟無復相見乃留李紹宏及租庸使張憲守魏州大軍自楊劉濟河是歲擒王彥章誅梁氏降段凝皆崇韜贊成其謀也莊宗至汴州宰相豆盧革在魏州令崇韜權行中書事俄拜侍中兼樞密使及郊禮畢以崇韜兼領鎮冀州節度使進封趙郡公邑二千戶賜鐵券恕十死崇韜既位極人臣權傾內外謀猷獻納必盡忠規士族朝倫頗亦收奬人物內外翕然稱之初收汴洛稍通賂遺親友或規之崇韜曰余備位將相祿賜巨萬但偽梁之日賂遺成風今方面藩侯多梁之舊將皆吾君射鈎斬袪之人也一旦革面化為吾人堅拒其請得無懼乎藏余私室無異公帑及郊禋崇韜悉獻家財以助賞給時近臣勸莊宗以貢奉物為內庫珍貨山積公府賞軍不足崇韜奏請出內庫之財以助莊宗沉吟有靳惜之意是時天下已定寇讎外息莊宗漸務華侈以逞已欲洛陽大內宏敞宮宇深邃宦官阿意順旨以希恩寵聲言宮中夜見鬼物不謀同辭莊宗駭異其事且問其故宦者曰見本朝長安大內六宮嬪御殆及萬人椒房蘭室無不充牣今宮室大半空閑鬼神尚幽尚幽原本作尚豳今從冊府元龜改正影庫本粘籤亦無所怪繇是景進王允平等於諸道採擇宮人不擇良賤內之宮掖三年夏雨河大水壞天津橋是時酷暑尤甚莊宗常擇高樓避暑皆不稱旨宦官曰今大內樓觀不及舊時長安卿相之家舊日大明興慶兩宮樓觀百數皆雕楹畫栱干雲蔽日今官家納涼無可御者莊宗曰余富有天下豈不能辦一樓即令宮苑使經營之猶慮崇韜有所諫止使謂崇韜曰今年惡熱朕頃在河上五六月中與賊對壘行宮卑濕介馬戰賊恆若清涼今晏然深宮不耐暑毒何也崇韜奏陛下頃在河上汴寇未平廢寢忘食心在戰陣祁寒溽暑不介聖懷今寇既平中原無事縱耳目之玩不憂戰陣雖層臺百尺廣殿九筵未能忘熱於今日也願陛下思艱難創業之際則今日之暑坐變清涼莊宗默然王允平等竟加營造崇韜復奏曰內中營造日有縻費屬當災饉且乞權停不聽初崇韜與李紹宏同為內職內職原本作納職考五代會要云五代承唐制樞密使為內職原本納字誤今改正影庫本粘籤及莊宗即位崇韜以紹宏素在己上舊人難制即奏澤潞監軍張居翰同掌樞密以紹宏為宣徽使紹宏大失所望泣涕憤鬱崇韜乃置內勾使應三司財賦皆令勾覆令紹宏領之冀塞其心紹宏怏悵不已崇韜自以有大功河洛平定之後權位熏灼恐為人所傾奪乃謂諸子曰吾佐主上大事了矣今為羣邪排毀吾欲避之歸鎮常山為菟裘之計其子廷說等曰大人功名及此一失其勢便是神龍去水為螻蟻所制尤宜深察門人故吏又謂崇韜曰侍中勳業第一雖羣官側目必未能離間宜於此時堅辭機務上必不聽是有辭避之名塞其讒慝之口魏國夫人劉氏有寵魏國原本作衞國今據歐陽史改正影庫本粘籤中宮未正宜贊成冊禮上心必悅內得劉氏之助羣閹其如余何崇韜然之於是三上章堅辭樞密之位優詔不從崇韜乃密奏請立魏國夫人為皇后復奏時務利害, WYG: 巻}
