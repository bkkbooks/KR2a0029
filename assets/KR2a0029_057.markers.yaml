  - {type: variant, offset: 2849, length: 1965, content: 日率親軍六萬進討蜀川崇韜將發奏曰臣以非才謬當戎事仗將士之忠力憑陛下之威靈庶幾克捷若西川平定陛下擇帥如信厚善謀事君有節則孟知祥有焉望以蜀帥授之如宰輔闕人張憲有披榛之勞為人謹重而多識其次李琪崔居儉中朝士族富有文學可擇而任之莊宗御嘉慶殿置酒宴征西諸將征西原本脫征字今據冊府元龜增入影庫本粘籤舉酒屬崇韜曰繼岌未習軍政卿久從吾戰伐西面之事屬之於卿軍發十月十九日入大散關崇韜以馬箠指山險謂魏王曰朝廷興師十萬已入此中儻不成功安有歸路今岐下飛輓才支旬日必須先取鳳州收其儲積方濟吾事乃令李嚴康延孝先馳書檄以諭偽鳳州節度使王承捷王承捷原本作丞捷今據九國志改正影庫本粘籤及大軍至承捷果以城降得兵八千軍儲四十萬次至故鎮偽命屯駐指揮使唐景思亦以城降得兵四千又下三泉得軍儲三十餘萬自是師無匱乏軍聲大振其招懷制置官吏補置師行籌畫軍書告諭皆出於崇韜繼岌承命而已莊宗令內官李廷安李從襲呂知柔為都統府紀綱見崇韜幕府繁重將吏輻輳降人爭先賂遺都統府唯大將省謁牙門索然繇是大為詬恥及六軍使王宗弼歸款六軍原本作大軍今據九國志改正影庫本粘籤行賂先招討府王衍以成都降崇韜居王宗弼之第宗弼選王衍之妓妾珍玩以奉崇韜求為蜀帥案九國志王宗弼傳宗弼送款于魏王乃還成都盡輦內藏之寶貨歸于其家魏王遣使徵犒軍錢數千萬宗弼輒靳之魏王甚怒及王師至令其子承班齎衍玩用直百萬獻于魏王幷賂郭崇韜請以己為西川節度使魏王曰此吾家之物焉用獻為魏王入城翼日數其不忠之罪並其子斬之于市舊五代史考異崇韜許之案通鑑作崇韜陽許之舊五代史考異又與崇韜子廷誨謀令蜀人列狀見魏王請奏崇韜為蜀帥繼岌覽狀謂崇韜曰主上倚侍中如衡華安肯棄元老於蠻夷之地況余不敢議此李從襲等謂繼岌曰郭公收蜀部人情意在難測王宜自備由是兩相猜察莊宗令中官向延嗣賫詔至蜀向延嗣原本作廷嗣今據通鑑改正影庫本粘籤促班師詔使至崇韜不郊迎延嗣憤憤從襲謂之曰魏王貴太子也主上萬福郭公專弄威柄旁若無人昨令蜀人請己為帥郭廷誨擁徒出入貴擬王者所與狎遊無非軍中驍果蜀中凶豪晝夜妓樂歡宴指天畫地父子如此可見其心今諸軍將校無非郭氏之黨魏王懸軍孤弱一朝班師必恐紛亂吾屬莫知暴骨之所因相向垂涕延嗣使還具奏皇后泣告莊宗乞保全繼岌莊宗復閱蜀簿曰人言蜀中珠玉金銀不知其數何如是之微也延嗣奏曰臣問蜀人知蜀中寶貨皆入崇韜之門言崇韜得金萬兩銀四十萬名馬千匹王衍愛妓六十樂工百犀玉帶百廷誨自有金銀十萬兩犀玉帶五十藝色絕妓七十樂工七十他財稱是魏王府蜀人賂遺不過匹馬而已莊宗初聞崇韜欲留蜀心已不平又聞全有蜀之妓樂珍玩怒見顏色即令中官馬彥珪馳入蜀視崇韜去就如班師而已如實遲留則與繼岌圖之彥珪見皇后曰禍機之發間不容髮何能數千里外復稟聖旨哉皇后再言之莊宗曰未知事之實否詎可便令果決皇后乃自為教與繼岌令殺崇韜時蜀土初平山林多盜孟知祥未至崇韜令任圜張筠分道招撫慮師還後部曲不寧故歸期稍緩四年正月六日馬彥珪至軍決取十二日發成都赴闕令任圜權知留事以俟知祥諸軍部署已定彥珪出皇后教以示繼岌繼岌曰大軍將發他無釁端安得為此負心事公輩勿復言從襲等泣曰聖上既有口敕王若不行苟中途事泄為患轉深繼岌曰上無詔書徒以皇后教令安得殺招討使從襲等巧造事端以間之繼岌既無英斷僶俛從之詰旦從襲以繼岌之命召崇韜計事繼岌登樓避之崇韜入左右檛殺之崇韜有子五人廷信廷誨隨父死於蜀廷說誅於洛陽廷讓誅於魏州廷讓原本作承誼今據歐陽史改正影庫本粘籤廷議誅於太原家產籍沒明宗即位詔令歸葬仍賜太原舊宅廷誨廷讓各有幼子一人姻族保之獲免崇韜妻周氏攜養於太原崇韜服勤盡節佐佑王家草昧艱難功無與比西平巴蜀宣暢皇威身死之日夷夏寃之然議者以崇韜功烈雖多事權太重不能處身量力而聽小人誤計欲取太山之安如急行避跡其禍愈速性復剛戾遇事便發既不知前代之成敗又未體當時之物情以天下為己任孟浪之甚也及權傾四海車騎盈門士人諂奉漸別流品同列豆盧革謂崇韜案自漸別流品至此十二字原本闕佚今從冊府元龜增入曰汾陽王代北人徙家華陰侍中世在鴈門得非祖德歟崇韜應曰經亂失譜諜先人常云去汾陽王四世革曰故祖德也因是旌別流品援引薄徒委之心腹佐命勳舊一切鄙棄舊僚有干進者崇韜謂之曰公雖代邸之舊然家無門閥深知公才技不敢驟進者慮名流嗤余故也及征蜀之行於興平拜尚父子儀之墓嘗從容白繼岌曰蜀平之後王為太子待千秋萬歲神器在手宜盡去宦官優禮士族不唯疏斥閹寺騸馬不可復乘案通鑑作扇馬考胡三省注引薛史亦作騸馬今仍其舊舊五代史考異內則伶官巷伯怒目切齒外則舊僚宿將戟手痛心掇其族滅之禍有自來矣復以諸子驕縱不法既定蜀川輦運珍貨實於洛陽之第籍沒之日泥封尚濕雖莊宗季年為羣小所惑致功臣不保其終亦崇韜自貽其災禍也永樂大典卷二萬二千一百六十史臣曰夫出身事主得位遭時功不可以不圖名不可以不立洎功成而名遂則望重而身危貝錦於是成文良玉以之先折故崇韜之誅蓋為此也是知強吳滅而范蠡去全齊下而樂生奔苟非其賢孰免於禍明哲之士當鑒於斯永樂大典卷二萬二千一百六十, WYG: ''}
