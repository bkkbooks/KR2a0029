  - {type: variant, offset: 394, length: 1132, content: 聚譟擁武皇比及雲州衆且萬人師營鬬雞臺城中械文楚以應武皇之軍既收城推武皇為大同軍防禦留後衆狀以聞朝廷不悅詔徵兵來討俄而獻祖失振武武皇失雲州朝廷命招討使李鈞幽州李可舉加兵於武皇攻武皇於蔚州君立從擊可舉之師屢捷及獻祖入達靼君立保感義軍武皇授鴈門節度以君立為左都押牙從入關逐黃孽黃孽原本作黃辟考薛史前後多稱黃巢餘黨為黃孽今改正影庫本粘籤收長安武皇還鎮太原授檢校工部尚書先鋒軍使文德初李罕之既失河陽來歸於武皇且求援焉乃以君立充南面招討使李存孝副之帥師二萬助罕之攻取河陽三月與汴將丁會牛存節戰於沇河臨陣之次騎將安休休叛入汴軍君立引退八月授汾州刺史大順元年潞州小校安居受反武皇遣君立討平之授檢校左僕射昭義節度使自武皇之師連歲略地於邢洺攻孟方立君立常率澤潞之師以為掎角景福初檢校司徒食邑千戶二年李存孝據邢州叛武皇命君立討之以功加檢校太保乾寧初存孝平班師存孝既死武皇深惜之怒諸將無解慍者初李存信與存孝不叶屢相傾奪而君立素與存信善九月君立至太原武皇會諸將酒博因語及存孝事流涕不已時君立以一言忤旨武皇賜酖而殂案通鑑考異引唐遺錄作君立被杖死與薛史異時年四十八明宗即位以念舊之故詔贈太傅永樂大典卷一萬八千一百一十八薛志勤蔚州奉誠人小字鐵山初為獻祖帳中親信乾符中與康君立共推武皇定雲中以功授右牙都校從入達靼武皇授節鴈門志勤領代北軍使從入關收京城以功授檢校工部尚書河東右都押牙先鋒右軍使從武皇救陳許平黃巢武皇遇難於上源驛汴將楊彥洪連車樹柵遮絕巷陌時騎從皆醉宴席既闌汴軍四面攻傳舍志勤虓勇冠絕復酒膽激壯因獨登驛樓大呼曰朱僕射負恩無行邀我司空圖之吾三百人足以濟事因彎弧發射矢無虛發汴人斃者數十志勤私謂武皇曰事急矣如至五鼓吾屬無遺類矣無遺類矣原本脫遺字今從冊府元龜增入影庫本粘籤可速行因扶武皇而去雷雨暴猛汴人扼橋志勤以其屬血戰擊敗之得侍武皇還營由是恩顧益厚大順初張濬以天子之師來侵太原十月大軍入陰地志勤與李承嗣率騎三千抗之敗韓建之軍於蒙坑進收晉絳以功授忻州刺史二年從討鎮州收天長臨城志勤皆先登陷陣勇敢無前王暉據雲州叛討平之以志勤為大同軍防禦使檢校司空乾寧初代康君立為昭義節度使光化元年十二月以疾卒於潞時年六十二永樂大典卷二萬一千三百六十六史建瑭字國寶父敬思鴈門人仕郡至牙校武皇節制鴈門敬思為九府都督九府原本作凡府考新唐書唐官制有九府都督歐陽史亦作九府今改正影庫本粘籤從入關定京師及鎮太原為裨將中和四年從援陳許為前鋒敗黃巢於汴上追賊至徐兗常將騎挺身酣戰勇冠諸軍是時天下之師雲集軍中無不推伏六月衞從武皇入汴州舍於上源驛是夕為汴人所攻敬思方大醉因蹶然而興操弓與汴人鬬矢不虛發汴人死者數百夜分冒雨方達汴橋左右扶武皇決圍而去敬思後拒血戰而歿武皇還營知失敬思流涕久之建瑭以父廕少仕軍門光化中典昭德軍與李嗣昭攻汾州, WYG: ''}
