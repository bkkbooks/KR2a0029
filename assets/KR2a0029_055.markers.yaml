  - {type: variant, offset: 1809, length: 2042, content: 德倫圍蓨縣梁祖自至攻城甚急存審曰吾王方事北面南鄙之事付我等數人今西道無兵坐滋賊勢何以為謀老賊若不下蓨阜必西攻深冀與公等料閱騎軍偵視賊勢乃選精騎八百趨信都存審扼下博橋建瑭與李嗣肱分道擒生建瑭乃分麾下三百騎為五軍案歐史建瑭分其麾下五百騎為五隊一之衡水一之南宮一之信都一之阜城而自將其一薛史作三百騎史異文也自將一軍深入各命俘掠梁軍之芻牧者還會下博橋翌日諸軍皆至獲芻牧者數百人聚而殺之緩數十人令其逸去各曰沙陀軍大至矣梁軍震恐明日建瑭嗣肱為梁軍服色與芻牧者相雜晡晚及賀德倫寨門殺守門者縱火大譟俘斬而去是夜梁祖燒營而遁北至貝州迷失道路委棄兵仗不可勝計十二年魏博歸款歸款原本作歸隸今據文改正影庫本粘籤建瑭與符存審前軍屯魏縣十三年敗劉鄩於元城收澶州以建瑭為刺史檢校司空外衙騎軍都將尋歷貝相二州刺史屯於德勝十八年與閻寶討張文禮為馬軍都將八月收趙州獲刺史王鋋進逼鎮州為流矢所中卒於軍時年四十六案歐陽史作四十二永樂大典卷一萬一百八十三李承嗣代州鴈門人父佐方承嗣少仕郡補右職中和二年從武皇討賊關輔為前鋒王師之攻華陰黃巢令偽客省使王汀會軍機於黃揆承嗣擒之以獻賊平以功授汾州司馬改榆次鎮將光啟初從討蔡賊於陳許上源之難遣承嗣奉表行在陳訴其事觀軍容田令孜館而慰諭令達情於武皇姑務叶和仍授以左散騎常侍朱玫之亂遣承嗣率軍萬人援鄜州至渭橋迎扈車駕王行瑜既殺朱玫承嗣會鄜夏之師入定京城獲偽相裴徹鄭昌圖鄭昌圖原本作易圖今從新唐書改正影庫本粘籤函送朱玫襄王首獻於行在駕還宮賜號迎鑾功臣檢校工部尚書守嵐州刺史賜犒軍錢二萬貫時車駕初還三輔多盜承嗣按兵警禦輦轂安及還屯於鄜留別將馬嘉福五百騎宿衞孟方立之襲遼州也武皇遣承嗣設伏於榆社以待之邢人既至承嗣發伏擊其歸兵大敗之獲其將奚忠信以功授洺州刺史及張濬之加兵於太原也時鳳翔軍營霍邑承嗣帥一軍攻之岐人夜遁追擊至趙城合大軍攻平陽旬有三日而拔師旋改教練使檢校司乾寧二年兗鄆為汴人所攻勢漸危蹙遣使乞師於武皇武皇遣承嗣帥三千騎假道於魏渡河援之時李存信屯於莘縣既而羅弘信背盟掩擊王師因茲隔絕及瑄瑾失守承嗣與朱瑾史儼同入淮南案十國春秋吳列傳太祖署為淮南行軍副使舊五代史考異承嗣史儼皆驍將也淮人得之軍聲大振武皇深惜之如失左右手乃遣趙岳間道使於淮南請歸承嗣等楊行密許之遣使陳令存請修好於武皇其年九月汴將龐師古葛從周出師將收淮南朱瑾率淮南軍三萬與承嗣設伏於清口清口原本作請口今從十國春秋改正影庫本粘籤大敗汴人生獲龐師古行密嘉其雄才留而不遣仍奏授檢校太尉領鎮海軍節度使天祐九年淮人聞莊宗有柏鄉之捷乃以承嗣為楚州節度使以張掎角十七年七月卒於楚州時年五十五永樂大典卷二萬三百五十史儼代州鴈門人以便騎射給事於武皇為帳中親將驍果絕衆善擒生設伏望塵揣敵所向皆捷自武皇入定三輔誅黃巢每出師皆從乾寧中從討王行瑜師次渭北遣儼率五百騎護駕石門時京城大擾士庶多散布南山儼分騎警衞比駕還京盜賊不作以功檢校右散騎常侍屯於三橋者累月昭宗寵錫優異明年與李承嗣率騎渡河援兗鄆時汴軍雄盛自青徐兗鄆柵壘相望儼與騎將安福順等案史儼援兗鄆在乾寧二年冬薛史梁太祖紀正月擒蕃將安福順然則安福順不當與史儼同行疑傳文有訛字每以數千騎直犯營壘左俘右斬汴軍為之披靡及朱瑾失守與李承嗣等奔淮南淮人比善水軍不閑騎射既得儼等軍聲大振尋挫汴軍於清口其後倂鍾傳擒杜洪杜洪原本作社珙今從新唐書改正影庫本粘籤削錢鏐成行密之霸迹者皆儼與承嗣之力也淮人館遇甚厚妻孥第舍必推其甲故儼等盡其死力案十國春秋云儼累官滁州刺史舊五代史考異天祐十三年卒於廣陵永樂大典卷一萬一百八十三蓋寓蔚州人祖祚父慶世為州之牙將武皇起雲中寓與康君立等推轂佐佑之因為腹心武皇節制鴈門署職為都押牙領嵐州刺史洎移鎮太原改左都押牙檢校左僕射武皇與之決事言無不從凡出征伐靡不衞從案通鑑光啟二年駕幸興元大將蓋寓說克用曰鑾輿播遷天下皆歸咎於我今不誅朱玫黜李熅無以自湔洗克用從之又通鑑考異引紀年錄云偽使至太原太祖詰其事狀曰皆朱玫所為將斬之以徇大將蓋寓等言云云太祖燔偽詔械其使馳檄喻諸鎮曰今月二十日得襄王偽詔及朱玫文字云田令孜脅遷鑾駕播越梁洋行至半塗六軍變擾遂至蒼黃而晏駕不知弒逆者何人永念丕基不可無主昨四鎮藩后推朕纂承已於正殿受冊畢改元大赦者李熅出自贅疣名汙藩邸智昏菽麥識昧機權李符擄之以塞辭朱玫賣之以為利呂不韋之奇貨可見姦邪蕭世誠之土囊期於匪夕近者當道徑差健步奉表起居行朝現住巴梁宿衞比無騷動而朱玫脅其孤騃自號台衡敢首亂階明言晏駕熒惑藩鎮凌弱廟朝云云案此事甚有關係不知薛史何以不載今附錄於此乾寧二年從入關討王行瑜特授檢校太保開國侯食邑一千戶領容管觀察經略使光化初車駕還京授檢校太傅封成陽郡公寓性通黠多智數善揣人主情武皇性嚴急左右難事無委遇者小有違忤即置於法唯寓承顏希旨規其趨向婉辭順意以盡參裨武皇或暴怒將吏事將不測寓欲救止必佯佐其怒以責之武皇怡然釋之有所諫諍必徵近事以為喻自武皇鎮撫太原最推親信中外將吏無不景附朝廷藩隣信使結託先及武皇次入寓門既總軍中大柄其名振主梁祖亦使姦人離間暴揚於天下言蓋寓已代李聞者寒心武皇略無疑間, WYG: ''}
