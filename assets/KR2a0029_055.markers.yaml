  - {type: variant, offset: 11, length: 0, content: '', krp: 莊宗紀一莊宗光聖神閔孝皇帝諱存勗武皇帝之長子也母曰貞簡皇后曹氏以唐光啓元年歲在乙巳冬十月二十二日癸亥生帝于晉陽宫姙時曹后常夢神人黒衣擁扇夾侍左右載誕之辰紫氣出于窓戸及為嬰兒體貎竒特沈厚不羣武皇特所鍾愛及武皇之討王行瑜帝時年}
