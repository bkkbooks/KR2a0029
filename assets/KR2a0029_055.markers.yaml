  - {type: variant, offset: 1528, length: 280, content: 登城擒叛將李瑭以獻授檢校工部尚書李思安之圍上黨也建瑭為前鋒與總管周德威赴援時汴人夾城深固援路斷絕建瑭日引精騎設伏擒生夜犯汴營驅斬千計敵人不敢芻牧汴將王景仁營於柏鄉建瑭與周德威先出井陘井陘原本作井除今從通鑑改正影庫本粘籤高邑之戰日已晡晚汴軍有歸志建瑭督部落精騎先陷其陣夾攻魏滑之間遂長驅追擊夜入柏鄉俘斬數千計論功加檢校左僕射師旋留戍趙州汴將氏延賞數犯趙之南鄙建瑭設伏柏鄉獲延賞獻之九年梁祖親攻蓨縣時王師倂攻幽州聲言汴軍五十萬將寇鎮定都將符存審謂建瑭曰梁軍倘以五十萬來我等何以待之裨將趙行實曰走入土門為上策存審曰事未可知但老賊在東別將西來尚可徐圖不旬日楊師厚圍棗彊, WYG: 拜}
