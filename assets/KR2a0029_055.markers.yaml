  - {type: variant, offset: 4533, length: 0, content: '', krp: 祐六年秋七月邠岐二帥及梁之叛將劉知俊俱遣使來告將大舉以伐靈夏兼收闗輔請出兵晉綘以張兵勢八月帝御軍南征先遣周徳威李存審丁㑹統大軍出隂地闗攻晉州為地道壊城二十餘步城中血戰拒守梁祖遣楊師厚領兵赴援徳威乃收軍而退通鑑引莊宗實録云汴軍至䝉阬周徳威逆戰敗之斬首三百級師厚退保絳州是役也小將蕭萬通戰殁師厚進營平陽徳威收軍而退天祐七年秋七月鳯翔李茂貞邠州楊崇本皆遣使來㑹兵同討靈夏且言劉知俊三敗汴軍于寧州靈夏危蹙岐隴之師大舉決取河西帝令周徳威將兵萬人西渡河以應之是役也劉知俊為岐人所搆乃自退九月徳威班師冬十月梁祖遣大將李思安楊師厚率師營于澤州以攻上黨十一月鎮州王鎔遣使來求援是時梁祖以羅紹威初卒全有魏博之地因欲求兼并鎮定遣供奉官杜廷隐丁延徽督魏軍三千人入于深冀鎮人懼故來告難帝集軍吏議之咸欲按甲治兵徐觀勝負唯帝獨斷堅欲救之乃遣周徳威率軍屯于趙州是月行營都招討使丁㑹卒十二月丁已朔梁祖聞帝軍屯趙州命寧國軍節度使王景仁為北面行營招討使韓勍為副相州刺史李思安為前鋒㑹魏州之兵以討王鎔又令閻寳王彦章率二千騎㑹景仁于邢洺丁丑景仁營于栢鄉帝遂親征自贊皇縣東下辛巳至趙州與周徳威兵合帝令史建瑭以輕騎嘗冦獲芻牧者二百人問其兵數精兵七萬是日帝觀兵于石橋南詰旦進軍距栢鄉一舎周徳威史建瑭率蕃落勁騎以挑戰四面馳射梁軍閉壁不出乃退翼日進軍距栢鄉五里遣騎軍逼其營梁將韓勍李思安率步騎三萬鎧甲炫曜其勢甚盛分道以薄帝軍徳威且戰且退距河而止既而徳威偵知梁人造浮橋乃退保髙邑乙酉致師于栢鄉帝禱戰于光武廟栢鄉無芻粟之地梁軍以樵采為給為帝之游軍所獲由是堅壁不出剉屋茅坐席以秣其馬衆心益恐天祐八年正月丁亥周徳威史建瑭帥三千騎致師于栢鄉設伏于村塢間遣三百騎直壓其營梁將怒悉其軍結陣而來徳威與之轉戰至髙邑南梁軍列陣横亘六七里時帝軍未}
