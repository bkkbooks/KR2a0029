  - {type: variant, offset: 13, length: 2, content: 列傳, WYG: 從行初令入覲獻㨗迎駕還宫昭宗一見駭之曰此兒有竒表因撫其背曰兒將來之國棟也勿忘忠孝于予家因賜鸂䳵酒巵翡翠盤北夢瑣言云昭宗曰此子可亞其父時人號曰亞子賊平授檢校司空隰州刺史改汾晉二郡皆遥領之帝洞曉音律常令歌舞于前十三習春秋手自繕冩畧通大義及壯便射騎膽畧絶人其心豁如也武皇起義雲中部下皆北邊勁兵及破賊迎鑾功居}
