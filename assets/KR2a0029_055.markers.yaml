  - {type: variant, offset: 4534, length: 1, content: 中, WYG: 列李存璋引諸軍陣于野河之上梁軍以五百人争橋鎮定之師與血戰梁軍敗而復整者數四帝與張承業登髙觀望梁人戈矛如束申令之後嚻聲若雷王師進退有序步騎嚴整寂然無聲帝臨陣誓衆人百其勇短兵既接無不奮力梁有龍驤神威拱宸等軍皆武勇之士也每一人鎧仗費數十萬装以組繡飾以金銀人望而畏之自已及午騎軍接戰至脯梁軍欲抽退塵埃漲天徳威周麾而呼曰汴人走矣帝軍齊譟以進魏人收軍漸退李嗣源率親軍與史建瑭安金全兼北部吐渾諸軍衝突夾攻梁軍大敗棄鎧投仗之聲震動天地龍驤神威神㨗諸軍殺戮殆盡自陣至栢鄉數十里殭屍枕籍敗旗折㦸所在蔽地夜漏一鼓帝軍}
