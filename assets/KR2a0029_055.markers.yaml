  - {type: variant, offset: 4567, length: 0, content: '', WYG: 五人帝號令收軍于趙州既而梁人棄深冀二州而遁初杜廷隐之襲深冀也聲言分兵就食時王鎔將石公立戌深州欲杜闗不納鎔遽令啓闗命公立移軍于外廷隐遂據其城公立既出指城闉而言曰開門納盜後悔何追此城數萬生靈生為俘馘矣因投刃泣下數日廷隐閉城殺鎮兵數千人遂登陴拒守王鎔方命公立攻之即有備矣及栢鄉之敗兩州之人悉為奴擄老弱者皆坑之已亥遣史建瑭周徳威徇地于邢魏先馳檄以諭之冊府元龜載晉王諭邢洺魏博衛滑諸郡縣檄天祐八年正月周徳威等破賊狥地邢洺先馳檄諭邢洺魏博衛滑諸郡縣曰王室遇屯七廟被陵夷之酷昊天不弔萬民罹塗炭之灾必有英主奮庸忠臣仗順斬長鯨而清四海靖祅祲以泰}
