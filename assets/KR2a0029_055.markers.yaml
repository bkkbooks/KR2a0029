  - {type: variant, offset: 4531, length: 0, content: '', WYG: 遣李嗣昭周徳威將兵三萬攻晉州以應之徳威與梁將尹皓戰于神山北梁人大敗是時晉之騎將夏侯敬受以一軍奔于梁徳威乃退保隰}
  - {type: variant, offset: 4531, length: 0, content: '', krp: 遣李嗣昭周徳威將兵三萬攻晉州以應之徳威與梁將尹皓戰于神山北梁人大敗是時晉之騎將夏侯敬受以一軍奔于梁徳威乃退保隰}
