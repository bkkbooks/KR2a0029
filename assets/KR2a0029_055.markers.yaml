  - {type: variant, offset: 4568, length: 0, content: '', krp: 靈予位沗維城任當分閫念茲顛覆詎可宴安故仗威文輔合之規問羿浞凶狂之罪逆温碭山庸𨽻巢孽餘凶當僖宗奔播之初我太祖掃平之際束身泥首請命牙門苞藏姦詐之心惟示婦人之態我太祖􅀈憐窮鳥曲為開懐特發表章請帥梁汴纔出萑蒲之澤便居茅社之尊殊不感恩遽行猜忌我國家祚隆周漢迹盛伊唐二十聖之鎡基三百年之文物外則五侯九伯内則百辟千官或代襲簮纓或門𫝊忠孝皆遭陷害永抱沉寃且鎮定兩藩國家巨鎮冀安民而保族咸屈節以稱藩逆温唯伏隂謀専行不利欲全吞噬先據屬州趙州特發使車來求援助予情惟盪冦義切親仁躬率賦輿赴兹盟約賊將王景仁將兵十萬屯據栢鄉遂驅三鎮之師授以七擒之畧鸛鵝纔列梟獍大奔易如走坂之九勢若燎原之火僵尸仆地流血成川組甲雕戈皆投草莽謀夫猛將盡作俘囚羣凶既快于天誅大憝須垂于鬼錄今則選蒐兵甲簡練車徒乗勝長驅翦除元惡凡爾魏博邢洺之衆感㤙懐義之人乃祖乃孫為聖唐赤子豈狥虎狼之黨遂忘覆載之㤙盖以封豕長蛇凴陵薦食無方逃難遂被脅從空嘗膽以銜冤竟無門而雪憤既聞告㨗想所慰懐今義旅徂征止于招撫昔耿純焚廬而向順蕭何舉族以從軍皆審料興亡能圖富貴殊勲茂業翼子貽孫轉褐見幾決在今日若能詣轅門而效順開城堡以迎降長官則改補官資百姓則優加賞賜所經詿誤更不推窮三鎮諸軍已申嚴令不得焚燒廬舍剽剠馬牛但仰所在生靈各安耕織予恭行天罰罪止元凶已外歸明一切不問几爾士衆咸諒予懐帝御親軍南征庚子至洺州梁祖令其將徐仁浦將兵五百夜入邢州張承業李存璋以三鎮步兵攻邢州遣周徳威史建瑭將三千騎長驅至澶魏帝與李嗣源率親軍繼進二月戊午師次洹水周徳威進至臨河已未魏帥羅周翰出兵五千塞石灰窰口周徳威以騎掩擊迫入觀音門是日王師迫魏州帝舍于狄公祠西周翰閉壁自固帝軍攻之其城㡬陷帝歎曰予為兒童時從先王渡河今其忘矣方春桃花水滿思一觀之誰從予者癸亥帝觀河于黎陽是時梁祖發兵萬餘將渡河聞王師至棄舟而退黎陽都將張從楚曹儒以部下兵三千人來降立其軍為左右匡霸使乙丑周徳威自臨清狥地貝郡攻博州下東武朝城時澶州刺史張可臻棄城而遁遂攻黎陽下臨河淇門庚午梁祖在洛聞王師將攻河陽率親軍屯白馬坡壬申帝下令班師帝至趙州王鎔迎謁翼日大饗諸軍壬午帝發趙州歸晉陽留周徳威戌趙州三月巳丑鎮定州各遣使言幽州劉守光凶僭之狀請推為尚父以稔其惡乙未帝至晉陽宫召監軍張承業諸將等議幽州之事乃遣牙將戴漢超齎墨制并六鎮書推劉守光為尚書令尚父守光由是凶熾日甚遂邀六鎮奉册五月六鎮使至幽州梁使亦集通鑑攷異引莊宗實錄云三月巳丑鎮州遣押衙劉光業至言劉守光凶淫縱毒欲自尊大請稔其惡以咎之推為尚父乙未上至晉陽宫召張承業諸將等議討燕之謀諸將亦云宜稔其惡上令押衙戴漢超持墨制及六鎮書如幽州其辭曰天祐八年三月二十七日天徳軍節度使宋瑶振武節度使周徳威昭義節度使李嗣昭易定節度使王䖏直鎮州節度使王鎔河東節度使尚書令晉王謹奉冊進盧龍横海等軍節度檢校太尉中書令燕王為尚書令尚父五月六鎮使至汴使亦集六月守光令有司定尚父採訪使議是月梁祖遣都招討使楊師厚將兵三萬屯邢州帝令李嗣昭岀師掠相衛而還秋七月帝㑹王鎔于承天軍鎔武皇之友也帝奉之盡敬捧巵酒為夀鎔亦捧酒醻帝鎔幼子昭誨從行因許為婚八月甲子幽州劉守光僭稱大燕皇帝年號應天九月庚子梁祖將親軍自洛渡河而北至相州聞帝軍未出乃止十月幽州劉守光殺帝之行人李承勲忿其不行朝禮也十一月辛丑燕人侵易定王䖏直來告難十二月甲子帝遣周徳威劉光濬李嗣源及諸將率蕃漢之兵發晋陽伐劉守光于幽州舊五代史巻二十七}
