  - {type: variant, offset: 3922, length: 539, content: 席比為行瑜兄弟驚駭乘輿今京師未寧姦宄流議大王移兵渡渭必恐復動宸情君臣始終不必朝覲但歸藩守姑務勤王是忠臣之道也武皇笑曰蓋寓尚阻吾入覲況天下人哉即日班師天祐二年三月寓病篤武皇日幸其第手賜藥餌初寓家每事珍膳窮極海陸精於府饌武皇非寓家所獻不食每幸寓第其往如歸恩寵之洽時無與比及其卒也哭之彌慟莊宗即位追贈太師永樂大典卷一萬八千一百二十八伊廣字言案原本闕一字元和中右僕射慎之後廣中和末除授忻州刺史遇天下大亂乃委質於武皇廣襟情灑落善占對累歷右職授汾州刺史時武皇主盟諸侯景附軍機締結聘遺旁午廣奉使稱旨累遷至檢校司徒乾寧四年從征劉仁恭武皇之師不利於成安寨廣歿於賊有女為莊宗淑妃子承俊歷貝遼二州刺史永樂大典卷一萬八千一百二十八李承勳者與廣同為牙將善於奉使名聞軍中承勳累遷至太原少尹劉守光之僭號也莊宗遣承勳往使問其釁端承勳至幽州見守光如藩方聘問之禮謁者曰燕王為帝矣可行朝禮朝禮原本作廟禮考通鑑作朝禮契丹國志亦云李承勳使于燕燕人請以朝禮見今改正影庫本粘籤承勳曰吾大國使人太原亞尹是唐帝除授燕主自可臣其部人安可臣我哉守光聞之不悅拘留於獄數日而出詰之曰臣我乎承勳曰燕君能臣我王則我臣之吾有死而已安敢辱命會王師討守光承勳竟歿於燕永樂大典卷一萬八千一百二十八史敬鎔太原人事武皇為帳中綱紀甚親任之莊宗初嗣晉王位李, WYG: ''}
