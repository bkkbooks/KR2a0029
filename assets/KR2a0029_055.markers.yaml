  - {type: variant, offset: 4528, length: 1, content: 移, WYG: 割蔚朔應三州為屬郡帝悉俞允然知其隂禍有日矣克寧俟帝過其第則圖竊發時幸臣史敬鎔者亦為克寧所誘盡得其情乃來告帝帝謂張承業曰季父所為如此無猶子之情骨肉不可自相魚肉予當避路則禍亂不作矣承業曰臣受命先王言猶在耳存顥輩欲以太原降賊王欲何路求生不即誅除亡無日矣因召吳珙李存璋李存敬朱守殷諭共謀衆咸憤怒二月壬戌命存璋伏甲以誅克寧遂靖其難是月唐少帝崩于曹州梁祖使人酖之也帝聞之舉哀號慟三月周徳威尚在亂栁梁將李思安屢為徳威所敗閉壁不出是時梁祖自將兵至澤州以劉知俊為招討使以代思安以范君實劉重霸為先鋒牛存節為撫遏統大軍營于長子四月帝召徳威軍歸晉陽汴人既見班師知我國禍以為潞州必取援軍無俟再舉遂停斥候梁祖亦自澤州歸洛帝知其無備乃謂諸將曰汴人聞我有喪必謂不能興師又以我少年嗣位未習戎事必有驕怠之心若簡練兵甲倍道兼行岀其不意以吾憤激之衆擊彼驕惰之師拉朽摧枯未云其易解圍定霸在此一役甲子軍發自太原已巳至潞州北黃碾下營五月辛未朔晨霧晦暝帝率親軍伏三垂崗下詰旦天復昏霧進軍直抵夾城時李嗣源總帳下親軍攻東北隅李存璋王霸率丁夫燒寨斸夾城為二道周德威李存審各分道進攻軍士皷譟三道齊進李嗣源壞夾城東北隅率先掩擊梁軍大恐南向而奔投戈委甲噎塞行路斬萬餘級獲其將副招討使符道昭洎大將三百人芻粟百萬梁招討使康懷英得百餘騎岀天井關而遁梁祖聞其敗也既懼而歎曰生子當如是李氏不亡矣吾家諸子乃豚犬爾初唐龍紀元年帝纔五歲從武皇校獵于三垂峝崗上有𤣥宗原廟在焉武皇于祠前置酒樂作伶人奏百年歌者陳其衰老之狀聲調悽苦武皇引滿捋鬚指帝曰老夫壯心未巳二十年後此子必戰于此及是役也果符其言焉是月周徳威乘勝攻澤州刺史王班登城拒守梁將劉知俊自晉綘將兵赴援徳威退保髙平帝遂班師于晉陽告廟飲至賞勞有差乃下令于國中禁盜賊恤孤寡徴隐逸止貪暴峻隄防寛獄訟期月之間其俗丕變帝每出于路遇饑寒者必駐馬而臨問之由是人情大悦王霸之業自茲而基矣六月鳯翔李茂貞邠州楊崇本合西川王建之師五萬以攻長安遣使㑹兵于帝帝遣張承業率師赴之九月邠岐蜀三}
