  - {type: variant, offset: 4555, length: 0, content: '', WYG: 使趙徳鈞加檢校太尉鎮州節度使王建立加同平章事偽呉楊溥遣使以應聖節貢獻己未以前雲州節度使髙行珪為鄧州節度使是日出御札曰歴代帝王以時巡狩一則遵乎禮制一則按察方區矧彼夷門控兹東夏當先帝勘平之始為眇躬殿守之邦俗尚貞純兵懐忠勇自元臣鎮靜庶事康和兆民咸樂于有年闔境彌堅於望幸事難違衆議在有方朕取十月七日親幸汴州庚申以衞尉卿李延光為大理卿北京留守李彥超上言先父存審本姓符氏䝉武皇賜姓乞郤還本姓従之乙丑夏州節度使李仁福鳯翔節度使李従曮朔方節度使韓洙並加食邑改賜功臣以汝州防禦使趙延壽為河陽節度使以比部郎中知制誥劉贊為中書舍人以河陽掌書記程遜為比部員外郎知制誥以代州刺史李徳珫為蔚州刺史丙寅樞宻使孔循兼東都留守襄州夏魯奇上言荆南髙季興遣使持書乞修貢奉詔魯奇不納詔諸州録事參軍不得兼使府賓職己巳鄧州節度使史敬鎔加檢校太保同州節度使盧質加檢校司徒御史臺奏每遇入閤舊例只一員侍御史在龍墀邊祗候彈奏公事或有南班失儀㸃檢不及今欲依常朝例差殿中侍御史二員押鐘鼔樓位仍各綴供奉班出入従之以青州節度副使淳于晏為亳州團練使契丹遣使美稜瑪古已下朝貢戊寅西川奏據黎州狀雲南使趙和于大渡河南起舍一間留信物十五籠並雜牋詩一巻遞至闕下冬十月已夘朔帝御文明殿視朝癸未亳州刺史李鄴貶郴州司户又貶崖州長流百姓所在賜自盡判官樂文紀配祁州責其違法黷貨也乙酉駕發西京詔留宰相崔協以奉祠祭丁亥帝宿于滎陽汴州朱守殷奏都指揮使馬彥超謀亂已處斬訖戊子次京水知朱守殷反帝親統禁軍倍程前進翼日至汴州攻其城拔之守殷伏誅丙申磁州刺史藥縦之上言今月十二日供奉官王仁鎬至稱制殺太子少保致仕任圜契丹遣使持書求碑石欲為其父表其葬所戊戌詔曰諸道州府自同光三年己前所欠秋夏税租并主持務局敗闕課利并沿河舟船折欠天成元年殘欠夏税並特與除放時重誨既構任圜之禍恐人非之思沛恩于衆以掩已過乃奏曰三司積欠約二百萬貫虛繫帳額請並蠲放帝重違其意故有是詔時議者以蠲隔年之賦猶或恵民場院課利一槩除之得不啟奸倖之門乎己亥詔曰太子少保致仕任圜早推勲舊曾委重難既退免于劇權俾優閒于外地而乃不遵禮分潛附守殷緘題罔避於嫌疑情㫖頗彰于怨望自收汴壘備見蹤由若務含𢎞是孤典憲尚全大體止罪一身已令本州私第自盡其骨肉親情僕使等並皆放罪辛丑詔曰后來其蘇動必従于人欲天監厥徳靜宜布于國恩近者言幸浚郊暫離洛邑盖逢嵗稔共樂時康不謂奸臣遽彰逆狀為厲之階既甚覆宗之禍自貽俾我生靈遘兹紛擾永言軫惻無輟寐興宜覃雨露之恩式表雲雷之澤應汴州城内百姓既經驚劫宜放二年屋税諸處有曾受逆人文字者隨處焚毁應天下見禁囚徒除十惡五逆殺人放火劫盜合造毒藥官典犯贓偽行印信屠牛外罪無輕重並従放釋應有民年八十己上及家長者有廢疾者免一丁差役云以山南西道節度使張筠為西京留守行京兆尹青州節度使霍彥威差人走馬進箭一對賀誅朱守殷帝郤賜彥威箭一對𫝊箭蕃家之符信也起軍令衆則使之彥威本非蕃将以臣𫝊箭于君非禮也癸夘以權知汴州事陜州節度使石敬瑭為汴州節度使兼六軍諸衞副}
