  - {type: variant, offset: 4105, length: 2, content: 清海, WYG: 禮部尚書蕭頃為太常卿戊申以御史大夫李琪為右僕射以太子賓客李璘為戸部尚書以吏部侍郎李徳休為禮部尚書以前吏部侍郎崔貽孫為吏部侍郎以端明殿學士户部侍郎趙鳯為兵部侍郎依前充職庚戌詔諸道節度使男及親嫡骨肉未沾恩命者特許上聞河南府新安縣宜為次赤以雍陵在其界故也辛亥以刑部侍郎歸藹為户部侍郎三月壬子朔以中書舍人馬縞為刑部侍郎幸㑹節園宰相樞密使及在京節度使共進錢絹請開宴癸丑遣供奉官賈俊使淮南甲寅以西川節度副使李敬周為遂州武信軍留後乙卯開府儀同三司司徒致仕趙光逢可太保致仕仍封齊國公以武信}
