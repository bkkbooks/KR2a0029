  - {type: variant, offset: 4088, length: 1, content: 師, WYG: 傅癸酉皇第三子金紫光禄大夫檢校司徒従厚加檢校太保同平章事河南尹判六軍諸衞事北面副招討房知温奏營州界奚陁羅支内附乙亥以監門衞大将軍傅璉為右武衞上将軍丙子詔曰頃自本朝多難雅道中微皆尚浮華罕持廉讓其有除官蘭省今秩柏臺或以人事相疎或以私讎見訝稍乖敬奉遽至棄捐盖司長之振威處君恩而何地今後應新授官朝謝後可準例上事司長不得輒以私事阻滯其本官亦不得因遭抑挫託故請假戊寅皇子従厚領事于河南府宰相鄭珏已下㑹送非例也己夘樞密使光禄大夫檢校太保行兵部尚書安重誨加開府儀同三司檢校太傅}
