  - {type: variant, offset: 3124, length: 761, content: 檢校司空衞州刺史以天雄軍馬步軍都指揮使王建為檢校司空虢州刺史以天雄軍內外馬軍都指揮使藥元福為檢校司空深州刺史以天雄軍內外步軍都指揮使安元霸為檢校司空隨州刺史以天雄軍都監前河陽行軍司馬李彥珣為檢校司空坊州刺史李式延光之舊僚也其餘皆延光之將佐也故有是命庚午遣客省使李守貞押器幣賜魏府立功將校辛未以魏府招討使楊光遠檢校太師兼中書令行廣晉尹充天雄軍度使天雄原本作天榮今從通鑑改正影庫本粘籤十月乙亥福建節度使王繼恭遣使貢方物戊寅契丹命使以寶冊上帝徽號曰英武明義皇帝案歐陽史作契丹使中書令韓頻來奉冊舊五代史考異是日左右金吾六軍儀仗太常鼓吹等並出城迎引至崇元殿前陳列如儀鄆州范延光奏到任內庚辰御札曰為國之規在於敏政建都之法務要利民歷考前經朗然通論顧惟涼德獲啟丕基當數朝戰伐之餘是兆庶傷殘之後車徒既廣帑廩咸虛經年之輓粟飛芻繼日而勞民動衆常煩漕運不給供須今汴州水陸要衝山河形勝乃萬庾千箱之地是四通八達之郊爰自按巡益觀宜便俾升都邑以利兵民汴州宜升為東京置開封府仍升開封浚儀兩縣為赤縣其餘升為畿縣應舊置開封府時所管屬縣並可仍舊割屬收管亦升為畿縣其洛京改為西京其雍京改為晉昌軍留守改為節度觀察使依舊為京兆府列在七府之上其曹州改為防禦州其餘制置並委中書門下商量施行丙戌以護聖左廂都指揮使曹州刺史張彥澤為鎮國軍節度使以工部尚書裴為尚書右僕射致仕是日詔改大寧宮門為明德門又改京城諸門名額南門尉氏以薰風為名西二門鄭門梁門以金義乾明為名北二門酸棗門封丘門以玄化宣陽為名東二門曹門宋門以迎春仁和為名戊子以右金吾大將軍馬從斌為契丹國信使考功郎中劉知新副之案馬從斌使契丹以報其加尊號也考通鑑則始以命王權權辭以老疾乃改命從斌耳歐陽史止書從斌不載劉知新五代春秋作十月馮道使於契丹以前天平軍節度使檢校太尉同平章事安審琦為晉昌軍節度使行京兆尹襄州奏江水漲害稼壬辰以樞密使, WYG: ''}
