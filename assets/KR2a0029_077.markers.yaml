  - {type: variant, offset: 4486, length: 0, content: '', WYG: 劉衡為左領衞上将軍以鄴都副留守趙敬怡為右衞上将軍判興唐府事乙酉昆明大鬼主羅殿王普露靜王九部落各差使隨牂牁清州八郡刺史宋朝化等一百五十三人來朝進方物各賜官吿繒綵銀器放還蕃丙戌以御史中丞盧文紀為工部尚書以左諫議大夫梁文矩為御史中丞鄧州留後陶玘貶嵐州司馬以其為内鄉縣令盛歸仁所訟税外科率故也仍賜歸仁緋袍魚袋癸巳幸皇子従榮第宣禁中伎樂觀宴従榮進馬及器幣帝因以伎樂賜之華州上言渭河泛濫害稼丁酉以吏部郎中襲文宣公孔邈為左諫議大夫史館修撰趙熙上言應内中公事及詔書奏對應不到中書者請委内臣一人抄録月終送史館詔差樞宻直學士録送青州進芝草新州奏契丹乞置互市癸夘汴州}
