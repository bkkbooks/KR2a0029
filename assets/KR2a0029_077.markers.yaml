  - {type: variant, offset: 4211, length: 0, content: '', WYG: 禮部侍郎裴皥為户部侍郎以翰林承㫖守中書舍人李愚為禮部侍郎充職庚寅御史臺奏今月三日廊下餐百官坐定兩省官方來自五品已下輒起詔曰每赴廊餐如對御宴若行私禮是失朝儀各罰半月俸五代㑹要長興三年五月詔文武兩班每遇入閤賜食従前御史臺官及諸朝官皆在敷政門外兩廊食惟北省官于敷政門内别坐既為隔門各不相見致行坐不齊難于肅整今後每遇入閤賜食北省官亦宜於敷政門外東廊下設席以北首為上待班齊就坐詔盧臺亂軍龍晊所部鄴都奉節等九指揮三千五百人在營家口骨肉並可全家處斬龍晊所部之衆即梁故}
