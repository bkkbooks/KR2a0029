  - {type: variant, offset: 2125, length: 348, content: 賢是先陛下方樹丕基宜求多士乞降詔百僚令各司議定一人有何能識堪何職官朝廷依奏用之若能符薦引是謂當才所奏之官望加奬賞如乖其舉或涉徇私所奏之官宜加黜罰自然官由德序位以才升三人同行尚聞擇善十目所視必不濫知臣職在論思敢陳狂狷舊五代史考異疏奏嘉之仍令文武百官於縉紳之內草澤之中知灼然有才器者列名以奏宴契丹冊禮使於廣政殿戊戌鄆州奏陽穀縣界河決青州王建立奏王建立原本作建位今從通鑑改正影庫本粘籤高麗國宿衞質子王仁翟乞放歸鄉里從之辛丑鎮邢定三州奏奉詔共差樂官六十七人往契丹詔魏府城下自屯軍已來墳墓多經劚掘雖已差人收掩今更遣太僕卿邢德昭往伸祭奠九月己酉宮苑使焦繼勳自軍前押范延光牙將馬諤齎歸命請罪表到闕壬子延光領部下將士素服於本府門俟命案歐陽史作九月己酉赦范延光蓋併書于奉表請罪之日也舊五代史考異有詔釋罪乙卯詔司空兼, WYG: ''}
