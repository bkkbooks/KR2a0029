  - {type: variant, offset: 1483, length: 575, content: 宗朝編勅庚戌御史中丞王延改尚書右丞尚書右丞盧導改尚書吏部侍郎以左諫議大夫薛融為御史中丞辛酉製皇帝受命寶以受天明命惟德允昌為文案五代會要天福三年六月中書門下奏准勅製皇帝受命寶今按唐貞觀十六年太宗文皇帝所刻之璽白玉為螭首其文曰皇帝景命有德者昌勅宜以受天明命惟德允昌為文刻之舊五代史考異據六典受命寶者天子修封禪禮神祇則用之其始皆破皇業錢以製之皇業者藩邸主事之所有也壬戌虞部郎中知制誥于遘改中書舍人宰臣趙瑩桑維翰李崧各改鄉里名號荊南節度使高從誨本貫汴州浚儀縣王畿鄉表節東坊改為擁旌鄉浴鳳里八月戊寅以左僕射劉昫為契丹冊禮使左散騎常侍韋勳副之給事中盧重為契丹皇太后冊禮使案歐陽史八月戊寅馮道及左僕射劉昫為契丹冊禮使通鑑戊寅以馮道為太后冊禮使左僕射劉昫為契丹主冊禮使據薛史則為太后冊禮使者乃盧重非馮道也壬午魏府軍前奏前澶州刺史馮暉自逆城來歸定州奏境內旱民多流散詔曰朕自臨寰宇每念生民務切撫綏期於富庶屬干戈之未戢慮徭役之或煩惟彼中山偶經夏旱因茲疾苦遽至流移達我聽聞深懷憫惻應定州所差軍前夫役逃戶夏秋稅並放甲申襄州奏漢江水漲一丈一尺己丑以前澶州刺史馮暉為檢校太保充義成軍節度使詔河府同州絳州等三處災旱逃移人戶下所欠累年殘稅幷今年夏稅差科及麥苗子沿徵諸色錢物等並放其逃戶下秋苗據見檢到數不計是元額及出剩頃畝並放一半委觀察使散行曉諭專切招攜應歸業戶人仍指揮逐縣切加安撫丙申, WYG: 殿學士班在}
