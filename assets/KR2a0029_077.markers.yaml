  - {type: variant, offset: 4417, length: 0, content: '', WYG: 事襄州節度使檢校太傅劉訓責授檢校右僕射守檀州刺史訓南征無功故有是譴詔喪葬之家送終之禮不得過度乙未户部尚書李璘上言請朝班自四品已上官各許薦令録兩人五品官各薦簿尉兩人功過賞罰與舉者同之詔従之其所舉人仍于官告内標所舉姓名或有不公連坐舉主仍令三品已上各舉堪任兩使判官者丙申以天䇿上将軍湖南節度使開府儀同三司檢校太師守尚書令楚王馬殷為守太師尚書令封楚國王庚子幸白司馬坡祭突厥神従北俗之禮也秋七月庚戌朔以宋州節度使王晏球充北面}
