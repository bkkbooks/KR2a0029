  - {type: variant, offset: 4414, length: 2, content: 廣晉, WYG: 張敬詢為雲州節度使遣樞密使孔循赴荆南城下時招討使劉訓有疾故也甲辰以户部侍郎韓彥惲為祕書監是日幸石敬瑭安重誨第丙午故振武節度使李嗣恩贈太尉以司封郎中充樞密院直學士閻至為左諫議大夫充職右諫議大夫梁文矩上言平蜀已來軍人剽略到西川人口甚多骨肉阻隔恐傷和氣請許收認帝仁慈素深因文矩之奏詔河南河北舊因兵火擄隔者並従識認是日郢州進白鵲五月癸丑以福建留後檢校太傅舒州刺史王延鈞為檢校太師守中書令充福建節度使琅琊郡王以太常卿蕭頃為吏部尚書是日懐州進白鵲戊午以三司副使守太子賓客張格卒廢朝以翰林學士駕部郎中知制誥竇夢徴為中書舍人充職癸亥遣宣徽使張延朗調發郡縣糧運赴荆南城下仍以軍法従事以右龍武統軍崔公實為左龍武統軍以前復州刺史髙行周為右龍武統軍割果州屬郡乙丑偽呉楊溥貢新茶滄州進白鶴庚午詔罷荆南之師既而令軍士散掠居民而迴詔文武臣僚及諸道節度使刺史有父母在者各與恩澤宰臣任圜表辭三司事乃以樞宻院承㫖孟鵠充三司副使權判六月壬午華州邢州進兩岐麥兖州進三足烏丙戌宰相任圜落平章事守太子少保丁亥詔天下除併無名額寺院以宣徽北院使張延朗為右武衞大将軍判三司依前宣徽使檢校司徒辛夘大理少卿王鬱上言凡決極刑準敕合三覆奏近年已來全隳此法伏乞今後決前一日許一覆奏従之壬辰南面招討使知荆州南行}
