  - {type: variant, offset: 2477, length: 3, content: 平章事, WYG: 兼太微宫使崇文館大學士任圜加光禄大夫門下侍郎監修國史以端明殿學士尚書兵部侍郎}
  - {type: variant, offset: 2477, length: 3, content: 平章事, krp: 兼太微宫使崇文館大學士任圜加光禄大夫門下侍郎監修國史以端明殿學士尚書兵部侍郎}
  - {type: variant, offset: 2482, length: 641, content: 官一品給門戟十六枝中書侍郎平章事桑維翰李崧給門戟十二枝己未宣遣靜鞭官劉守威左金吾仗勘契官王英案歐史作王殷司天臺鷄叫學生商暉等案歐史作殷暉宋避殷作商劉本並赴契丹庚申契丹使人往洛京般取趙氏公主案宋史趙贊傳德鈞父子降晉契丹盡錮之北去贊獨與母公主留西洛天福三年晉祖命贊奉母歸薊門舊五代史考異襄州奏漢江水漲三丈出岸害稼東都奏洛陽水漲一丈五尺壞下浮橋乙丑于闐國王楊仁美遣使貢方物迴鶻可汗遣使貢馬丙寅趙延壽進馬謝恩放燕國長公主歸幽州案通鑑不載趙延壽進馬之事胡三省云延壽妻唐明宗女也延壽在北用事故來取之范延光差節度副使李式到闕奉表首罪兼進玉帶一條遣宣徽南院使劉處讓權知魏府軍府事己巳復范延光官爵其制略曰頃朕始登大寶未靜中原六飛纔及於京師千里未通於懷抱楚王求舊方在遺簪曾子傳疑忽成投杼尋聞悛悔遽戮奸回干戈俄至於經時雷雨因思於作解果馳賓介疊貢表章向丹闕以傾心瀝衷誠而効順而況保全黎庶完整甲兵納款斯來其功非細得不特頒鐵契重建牙章封本郡之土茅移樂郊之旌鉞至於將吏咸降絲綸於戲上玄之運四時不愆者信大道之崇三寶所重者慈活萬戶之傷夷息六師之勞瘁遂予仁憫旌爾變通永貽子孫長守富貴敬佩光寵可不美歟可復推誠奉義佐運致理功臣天雄軍節度管內觀察處置等使開府儀同三司守太傅兼中書令廣晉尹上柱國臨清王食邑一萬戶食實封一千戶改授鄆州刺史天平軍節度鄆齊案原本有缺文等州觀察處置等使賜鐵券改封高平郡王仍令擇日備禮冊命以天雄軍節度副使檢校刑部尚書李式檢校尚書右僕射充亳州團練使以貝州刺史孫漢威檢校太保隴州防禦使以天雄軍三城都巡檢使薛霸, WYG: ''}
