  - {type: variant, offset: 349, length: 950, content: 假手於人也合各有一件事敷奏食祿於朝豈當如是言而不用朕所甘心用而不言誰之責也丙申制武清軍節度使馬希艹口咢改威武軍節度使威武軍原本脫威字今據十國春秋增入影庫本粘籤辛丑中書上言禮經云禮不諱嫌名二名不偏諱注云嫌名謂音聲相近若禹與宇邱與區也二名不偏諱謂孔子之母名徵在言在不稱徵言徵不稱在此古禮也唐太宗二名並諱玄宗二名亦同人姓與國諱音聲相近是嫌名者亦改姓氏與古禮有異廟諱平聲字即不諱餘三聲諱側聲即不諱平聲字所諱字正文及偏旁闕點畫望依令式施行詔曰朝廷之制今古相沿道在人弘禮非天降方開曆數虔奉祖宗雖踰孔子之文未爽周公之訓所為二名及嫌名事宜依唐禮施行案太原縣有史匡翰碑立於天福八年匡翰建瑭之子也碑於瑭字空文以避諱而建瑭父敬思仍書敬字蓋當時避諱之體如此乙巳天和節宴近臣於廣政殿三月戊午鴻臚卿劉頎卒贈太子賓客壬戌東上閤門使前司農卿蘇繼顏改鴻臚卿充職迴鶻可汗王仁美進野馬獨峯玉團玉團原本作玉圍今從歐陽史改正影庫本粘籤碙砂等方物甲戌永壽長公主薨輟朝一日故涇州節度觀察留後盧順密贈右驍衞上將軍丁丑詔禁止私下打造鑄瀉銅器四月丁亥以尚書吏部侍郎盧詹為尚書左丞中書舍人李詳上疏李詳原本作李祥今從冊府元龜改正影庫本粘籤請沙汰在朝文武臣僚以減冗食仍條貫藩侯郡守凡遇溥恩不得多奏衙前職員妄邀恩澤疏奏嘉之戊子宣武軍節度侍衞親軍馬步軍都指揮使廣晉府行營都招討使楊光遠加兼中書令昭義節度使侍衞馬軍都指揮使廣晉府行營都排陣使杜重威河陽節度使兼奉國左右廂都指揮使廣晉府行營馬步都虞候侯益並加檢校太傅鳳翔節度使檢校太師兼中書令岐王李從曮進封秦王平盧軍節度使檢校太尉兼中書令臨淄王王建立進封東平王甲午泰寧軍節度使李從溫西京留守京兆尹李周歸德軍節度使趙在禮並加兼侍中是月諸道藩侯郡守皆等第加恩改雍熙樓為章和樓避廟諱也五月丁未朔帝御崇元殿受朝仗衞如式丁巳詔應諸州縣名犯廟諱者並改之庚申以楊光遠男承祚為檢校工部尚書左威衞將軍駙馬都尉丁卯魏府行營步軍都指揮使檢校司徒右神武統軍王周加檢校太保戊辰故振武節度使李嗣本贈太尉己巳詔中外臣僚帶平章事侍中中書令及諸道節度使並許私門立戟仍並官給及據官品依令式處分六月丁丑右監門衞上將軍王彥璘卒甲申以太子詹事王居敏制置安邑王居敏原本作君敏今據通鑑改正影庫本粘籤解縣兩池榷鹽事左諫議大夫薛融上疏請罷修洛京大內優詔褒之尋罷營造庚寅, WYG: ''}
