  - {type: variant, offset: 4407, length: 431, content: 節度使康福進封許國公乙丑左驍衞上將軍李承約卒癸酉詔天福四年終已前百姓所欠夏秋租稅一切除放夏四月庚寅朔湖南奏溪州刺史彭士愁五溪酋長等乞降已立銅柱於溪州鑄誓狀於其上以五溪銅柱圖上之丙申詔顯義指揮使劉康部下兵五百人放還淮海即安州所俘也己亥虞部郎中知制誥楊昭儉遷中書舍人戶部侍郎王松改御史中丞禮部郎中溤玉改司門郎中知制誥辛丑宰臣監修國史趙瑩奏奉詔差張昭遠等五人同修唐史內起居郎賈緯丁憂去官請以刑部侍郎呂琦侍御史尹拙同與編修又奏史館所闕唐朝實錄請下敕購求並從之案五代會要云監修國史趙瑩奏自李朝喪亂迨五十年四海沸騰兩都淪覆今之書府百無二三臣等近奉綸言俾令撰述褒貶或從於新意纂修須案于舊章既闕簡編先虞漏略今據史館所闕唐書實錄請下勅命購求況咸通中宰臣韋保衡與蔣伸皇甫煥撰武宗宣宗兩朝實錄皆遇多事或值播遷雖聞撰述未見流傳其韋保衡裴贄合有子孫見居職任或門生故吏曾記纂修聞此討論諒多欣愜請下三京諸道及內外臣僚凡有將此數朝實錄詣闕進納量其文武才能不拘資地除授一官如卷帙不足據數進納亦請不, WYG: 鳳翔例升為}
