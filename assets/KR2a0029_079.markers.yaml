  - {type: variant, offset: 626, length: 1, content: 廣, WYG: 天雄軍節度使石敬瑭河陽節度使趙延夀並加駙馬都尉以右僕射李琪為太子少傅辛亥沙州節度使曹義金加爵邑王晏球上言收奪得定州北西二關城癸丑湖南馬殷奏二月中大破淮冦二萬生擒將士五百人中書上言諸道薦人總與不可全阻又難今後節度使每年許薦二人帶使相者許薦三人團練防禦使各一人節度觀察判官並聽旨授書記以下即許隨府從之以六軍判官尚書司封郎中史圭為右諫議大夫充樞密直學士詔州縣官以三十月為考限刺史以二十五月為限以到任日為始已未幽州奏契丹託諾領二千騎西南趣定州以前同州節度使盧質行兵部尚書判太常卿事辛酉以天雄軍節度副使判興唐府事趙敬怡為樞密使詔曰上柱國勲之極也近代已來文臣官階稍髙便授柱國歳月未深便轉上柱國武資初官便授上柱國今後凡加勲先自武騎尉十二轉方授上柱國永作成規不令踰越丁夘鎮州奏今月十八日王師不利于新樂壬申王晏球奏今月二十一日大破定州賊軍及契丹于曲陽斬獲數千人王都與塔納以數十騎復入于定州六月已夘以右金吾上將軍毛璋為左金吾上將軍以前安州節度使史敬鎔為右金吾上將軍以前華州節度使劉彦琮為左武衛上將軍壬午放内園鹿七頭于深山乙酉皇子故金槍指揮使檢校左僕射從璟贈太保已丑幽州趙徳鈞奏殺契丹千餘人于幽州東獲馬六百匹壬辰宰臣馮道率百寮上表請上尊號曰聖明神武文徳恭孝皇帝詔報不允丙申馮道等再上尊號不允戊戌以西京副留守知留守事張遵誨行京兆尹秋七月乙巳詔故偽蜀主王衍追封順正公以諸侯禮葬丙午以前武信軍節度使李敬周為邠州節度使丁未以滄州節度使安審通卒于師輟朝壬子以朔方節度使韓洙卒廢朝甲寅王晏球奏六月二十二日進攻逆城將士傷者三千人時晏球知城中有備未欲急攻朱宏昭張䖍釗切于立功促攻賊壘晏球不得已而進兵遂致傷痍者衆乙夘以太子少保李茂勲卒輟朝已未詔弛麴禁許民間自造于秋苗上紉徴麴價畝出五錢時孔循以麴法殺一家于洛陽或獻此議以為愛其人便于國故行之宗正卿李紓除名刑部侍郎馬縞貶綏州司馬刑部員外郎李慎儀貶階州司户初李紓差攝陵臺令張保嗣等各虛稱試銜為奉先令王延朗所訟大理寺斷以詐假官論刑部詳覆稱非詐假大理執之召兩司廷議刑部理屈故有是貶紓續勅配隴州徒一年未幾詔曰天下府州例是攝官皆結試銜或因勘窮便關詐假已前或有稱試銜一切不問此後並宜禁止曹州刺史成景宏貶綏州司户參軍續勅長流宥州尋賜自盡坐受本州倉吏錢百緡也壬戌齊州防禦使曹廷隠以奏舉失實配流永州續勅賜自盡甲子王晏球奏今月十九日契丹七千騎來援定州王師逆戰于唐河北大破之追至滿城又破之斬二千級獲馬千匹戊辰福建節度使王延鈞可依前檢校太師守中書令進封閩王已已王晏球奏此月二十一日追契丹至易州掩殺四十里擒獲甚衆故朔方節度使韓洙贈太尉以兵部侍郎王權御史中丞梁文矩並為吏部侍郎以左諫議大夫吕夢奇為御史中丞八月癸酉朔以翰林學士守中書舍人李懌劉昫並為户部侍郎充職以吏部侍郎劉岳守祕書監以吏部侍郎韓彦惲守禮部尚書以户部侍郎韓藹守太子賔客以户部侍郎裴皥守兵部侍郎以中書舍人張文寶守刑部侍郎詔凡有姓犯廟諱者以本望為姓丁丑以檢校尚書右僕射守龍武大將軍劉訓為}
