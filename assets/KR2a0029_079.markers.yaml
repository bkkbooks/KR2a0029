  - {type: variant, offset: 1473, length: 1863, content: 之兵討之案五代春秋五月李金全叛附于吳馬全節帥師討安州吳人救安州全節敗吳師克安州金全奔吳六月放吳俘還歐陽史作五月李金全叛六月克安州馬令南唐書作六月安州節度使李金全來降遣鄂州屯營使李承裕帥師迎之紀年互異舊五代史考異以前鄜州節度使安審暉為副以內客省使李守貞為都監仍遣供奉官劉彥瑤奉詔以諭金全命麾下齊謙以詔送於淮夷雲夢人齊峴斬謙歸其詔於闕辛卯昭義節度使韓王王建立薨輟朝二日冊贈尚書令壬寅案壬寅上疑脫六月兩字舊五代史考異少府監致仕尹玉羽卒癸卯淮南使李承裕代李金全金全南走承裕以淮兵二千守其城甲辰馬全節自應山縣進軍於大化鎮戊申與鄂州賊軍陣於安陸之南三戰而後克之斬首三千級生擒千餘人供奉官安友謙登鋒力戰奮不顧身全節賞其忠勇使馳獻捷書暍死於路是日削奪李金全官爵丁巳淮夷偽校李承裕率衆掠城中資貨而遁馬全節入城撫其遺民遣安審暉率兵以逐承裕擒而斬之執其偽都監杜光鄴案馬令南唐書作監軍通事舍人舊五代史考異杜光鄴通鑑作光業十國春秋仍作鄴今從其舊影庫本粘籤及淮南軍五百餘人露布獻於闕下帝曰此輩何罪皆厚給放還癸亥道士崇真大師張薦明賜號通玄先生是時帝好道德經嘗召薦明講說其義帝悅故有是命尋令薦明以道德二經雕上印板命學士和凝別撰新序冠于卷首俾頒行天下秋七月甲子朔降安州為防禦使額以申州隸許州丙寅安州節度使馬全節加檢校太尉改昭義軍節度使前鄜州節度使安審暉加檢校太傅為威勝軍節度使丁卯湖南奏遣天策府步騎將張少敵領兵五萬樓船百艘次於岳陽將進討淮夷也甲戌宣徽使楊彥詢加檢校太傅充安國軍節度使乙亥戶部尚書致仕鄭韜光卒贈右僕射戊寅福州王延羲遣商人間路貢表自述戊子宿州奏淮東鎮移牒云本國奏書於上國皇帝曰久增景慕莫會光塵但循戰國之規敢預睦鄰之道一昨安州有故脫難相歸邊校貪功乘便據壘據壘原本作居壘今從通鑑改正影庫本粘籤矧機宜之孰在顧茫昧以難申否臧皆凶乃大易之明義進取不止亦聖人之厚顏適屬暑雨稍頻江波甚漲指揮未到事實已違今者猥沐睿咨曲形宸旨歸其俘獲示以英仁其如軍法朝章彼此不可揚名建德曲直相懸雖認好生匪敢聞命其杜光鄴等五百七人已令却過淮北帝復書曰昨者災生安陸釁接漢陽當三伏之炎蒸動兩朝之師旅豈期邊帥不稟上謀洎復城池備知本末尋已捨諸俘執還彼鄉閭不唯念效命之人兼亦敦善鄰之道今承來旨將正朝章希循宥罪之文用廣崇仁之美其杜光鄴等再令歸復尋遣使押光鄴等於桐墟渡淮案原本作桐廬據通鑑注引九域志云宿州蘄縣有桐墟鎮自桐墟而南至渦口則濟淮矣今改正舊五代史考異淮中有棹船甲士拒之南去不果詔光鄴等歸京師授以職秩其戎士五百人立為顯義都顯義都原本脫義字今考通鑑云帝悉授唐諸官以其士卒為顯義都命舊將劉康領之今增入影庫本粘籤八月丁酉帝觀稼於西郊己亥詳定院以先奉詔詳定冬正朝會禮節樂章二舞行列等事上之事具樂志庚子以前金州防禦使田武為金州懷德軍節度使辛丑升復郢二郡為防禦使額戊午左龍武統軍相里金卒廢朝一日贈太師己未太子太師致仕范延光卒於河陽廢朝二日案歐陽史作西京留守楊光遠殺太子太師范延光考本傳延光本為楊光遠推墮溺水死為之輟朝諱之也舊五代史考異贈太師丁卯案歐陽史作九月丁卯原本疑有脫字舊五代史考異宰臣李崧加集賢殿大學士以翰林學士承旨戶部侍郎和凝為中書侍郎平章事丙子廢翰林學士院其公事並歸中書舍人丁丑以翰林學士中書舍人李慎儀為右散騎常侍以翰林學士左右補闕李澣為吏部員外郎以右散騎常侍趙元輔為太子賓客以太子賓客韓惲為兵部尚書以右諫議大夫段希堯為萊州刺史甲申西京留守楊光遠加守太尉兼中書令充平盧軍節度使封東平王戊子改東京上源驛為都亭驛冬十月丁酉制天下兵馬元帥鎮海鎮東浙江東西等道節度使中書令吳越王錢元瓘加守尚書令充天下兵馬都元帥戊戌戶部尚書姚顗卒廢朝一日贈右僕射癸卯湖南上言福建王延羲與弟延政互起干戈內相侵伐甲辰升萊州為防禦使額以汝州防禦使楊承貴領之以新授萊州刺史段希堯為懷州刺史丁未契丹使舍利來聘案遼史會同三年三月戊辰遣使使晉乙未晉遣使來覲四月壬寅遣人使晉丙午晉遣宣徽使楊端王眺等來問起居丙辰晉遣使進茶藥癸亥晉遣使賀端午五月庚辰晉遣使進弓矢甲申遣皇子天德及檢校司徒邸用和使晉六月庚子晉遣使來見九月丙戌晉遣使貢名馬庚申晉遣使貢布十二月丙申遣使使晉舊五代史考異致馬百疋及玉鞍狐裘等己酉宴羣臣於永福殿賜帛有差癸丑詔今後竊盜贓滿五匹者處死三匹已上者決杖配流以盜論者准律文處分又詔過格選人等許赴吏部南曹召保委正身者降一資注官十一月壬戌遙領遂州武信軍節度使鎮海軍衙內統軍檢校太傅同平章事陸仁璋卒贈太子太傅甲子滑州節度使景延廣加檢校太傅改陝州保義軍節度使以鄭州防禦使駙馬都尉史匡翰為義成軍節度使戊辰曹州防禦使石贇加檢校太保充河陽三城, WYG: ''}
