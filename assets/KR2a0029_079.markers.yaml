  - {type: variant, offset: 4012, length: 393, content: 各令修葺孔本仍禁樵採丙戌故皇第二叔檢校司徒萬友贈太師皇第三叔檢校司空萬銓贈太尉皇兄故檢校左僕射敬儒贈太傅二月辛卯詔天下郡縣不得以天和節禁屠宰輒滯刑獄壬辰置浮橋於德勝口甲午詔諸衞上將軍月俸舊三十千令增至五十千戊戌以三恪汝州襄城縣令襲介國公宇文頡為太子率更令率更原本作率吏今從唐書百官志改正影庫本粘籤己亥詔戶部侍郎張昭遠起居郎賈緯秘書少監趙熙吏部郎中鄭受益左司員外郎李為光等同修唐史仍以宰臣趙瑩監修壬寅以三白渠制置使張瑑為給事中戊申詔侯伯來朝君臣相見賞宴貢奉今後宜停起居郎賈緯以所撰唐年補錄六十五卷上之案五代會要起居郎賈緯奏曰伏以唐高祖至代宗已有紀傳德宗亦存實錄武宗至濟陰廢帝凡六代惟有武宗實錄一卷餘皆闕略臣今搜訪遺聞及耆舊傳說編成六十五卷目為唐朝補遺錄以備將來史館修述舊五代史考異帝覽之嘉歎賜以器幣仍付史館癸丑長安公主薨帝之長女也筓年降於駙馬楊承祚帝悼惜之甚輟視朝二日追贈秦國公主三月甲子, WYG: 準}
