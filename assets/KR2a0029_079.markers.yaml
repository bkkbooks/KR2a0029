  - {type: variant, offset: 634, length: 1, content: 兗, WYG: 朔方軍留後韓璞為朔方軍節度使靈武雄警甘肅等州觀察使檢校司徒帝聞隨鄧復郢均房之民父母骨肉有疾以長竿遥致粥食而餉之出嫁女夫家不遣來省疾乃下詔委長吏嚴加禁察房州奏新開山路四百里南通虁州畫圖以獻以前洋州節度使戴思逺為太子太保致仕庚子詔今後翰林學士入院以先後為班次承㫖一員不計官資先後在學士之上閏月丁未兩浙節度觀察畱後清海軍節度使檢校太師兼中書令錢元瓘可杭州越州大都督府長史充鎮東鎮海等軍節度使戊申趙徳鈞獻戎俘于闕下其蕃將特哩衮等五十人畱于親衛餘契丹六百人皆斬之乙夘升楚州為順化軍以明州刺史錢元珦為本州節度使以吏部尚書蕭頃為太子少保契丹遣使來貢獻契丹平州刺史張希崇上表歸順乙丑陜}
