  - {type: variant, offset: 38, length: 0, content: '', WYG: 辛亥前河陽節度使檢校太傅兼侍中孔勍以太子太傅致仕癸丑詔取今月十七日幸鄴都甲寅以國子祭酒朱守素卒廢朝丙辰以鎮南軍節度使袁建豐卒廢朝詔贈太尉丁巳詔曰朕聞堯舜有恤刑之典務貴好生禹湯申罪已之言庶明知過今月十七日據巡檢軍使渾公兒口奏稱有百姓二人以竹竿習戰鬪之事朕初聞奏報實所不容率爾𫝊宣令付石敬瑭處置今且重誨敷奏方知悉是幼童為戯載聆讜議方覺失刑循揣再三愧惕非一亦以渾公兒誑誣頗甚石敬瑭詳覆稍乖致人枉法而殂處朕有過之地今減常膳十日以謝幽寃其石敬瑭是朕懿親合施極諫既兹錯誤宜示省循可罰一月俸渾公兒決脊杖二十仍銷在身職銜配流登州小兒骨肉賜絹五十匹粟麥各百石便令如法埋葬兼此後在朝及諸道州府凡有極形並須子細裁遣不得因循百寮進表稱賀已未中書門下奏國子祭酒望令宰相兼判乃詔崔協判之五代㑹要載原奏云祭酒之資歴朝所貴爰從近代不重此官況屬聖朝方勤庶政須宏雅道以振時風望令宰臣一員兼判國子祭酒辛酉以前潞州節度使毛璋為右金吾上將軍以左驍衛上將軍華温琪為右金吾大將軍以春州刺史張䖍釗為鄭州防禦使時契丹方陷平州癸亥詔應廟諱文字只避正文其偏旁文字不用虧缺㸃畫契丹遣使托諾巴摩哩等貢獻帝遣指揮使奔托山押國信賜契丹王妻戊辰以隨駕馬軍都指揮使富州刺史康義誠兼領鎮南軍節度使以隨駕步軍都指揮使潮州刺使楊漢章遥領寧國軍節度使中書上言舊制遇二月十五日𤣥元皇帝}
