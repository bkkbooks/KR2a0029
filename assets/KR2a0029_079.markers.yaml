  - {type: variant, offset: 157, length: 0, content: '', WYG: 司徒辛邜以山南西道節度使張筠為左驍衛上將軍詔中外羣臣父母亡沒者並與追封贈癸已以禮部尚書崔貽孫卒輟朝甲午以吐渾寧朔奉化兩府都知兵馬使李紹魯為吐渾寧朔府都督乙未以樞密使兼東都留守孔循為許州節度使兼東都留守鄧州節度使髙行珪移鎮安州應州節度使李從璋移鎮滑州滑州節度使盧文進移鎮鄧州丁酉以責授檀州刺史劉訓為右龍武大將軍已亥回鶻克汗仁喻遣都督李爾珊等貢獻壬寅以左金吾大將軍羅周敬為同州節度使甲辰以威塞軍節度使張廷裕卒廢朝詔贈太保以耀州團練使孫岳為閬州團練使以左監門上將軍髙允貞為右金吾衛大將軍以右金吾衛大將軍華温琪為左金吾衛大將軍三月丁未朔以久雨為災詔文武百辟極言時政得失丁已以邢州節度王景戡為華州節度使以前北京副留守李從温為邢州節度使已未以宰臣鄭珏為開府儀同三司左僕射致仕加食邑五百户庚辰以前復州刺史翟章為新州威塞軍畱後中書奏孟夏薦饗合宰相行事在朝只有宰相二員今東都留守孔循帶平章事宜令攝}
