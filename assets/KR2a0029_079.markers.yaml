  - {type: variant, offset: 159, length: 3, content: 己丑迴, WYG: 行事孔循稱使相有戎機不當司祠祭重事癸亥以前鎮州節度使王建立為右僕射兼中書侍郎平章事集賢殿大學士判三司西方鄴上言收復歸州以前鄭州刺史楊漢賔為洋州武定軍留後戊辰以前彰國軍節度副使陳皋為鳳州武興軍留後以前蔡州刺史孫漢韶為應州彰國軍留後以宣徽南院使范延光為樞密使以宣徽北院使判三司張延朗為宣徽南院使以前冀州刺史婁繼英為耀州團練使以懐州刺史張廷藴為金州防禦使已巳命范延光權知鎮州軍府事西方鄴奏于歸州殺敗荆南賊軍數千人時有太白山道士解元龜自西川至對于便殿稱年一百一歳既而上表乞西都留守兼西川制置使要修西京宫闕帝謂侍臣曰此人老耄自逺來朝方期别有異見反為身名甚可笑也賜號知白先生賜紫放歸山甲戌冊回}
