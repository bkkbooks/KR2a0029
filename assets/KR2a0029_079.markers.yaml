  - {type: variant, offset: 619, length: 3, content: 特進改, WYG: 檢校司空漢州刺史遂留屯成都洋州上言重開入蜀舊路三百餘里比今官路較二十五程而近癸已殿中少監石知納貶憲州司户坐煽惑軍鎮也北面副招討宋州節度使王晏球以定州節度使王都反狀聞庚子制義武軍節度使檢校太尉兼中書令太原王王都削奪官爵壬寅以王晏球為北面行營招討使知定州行軍州事以滄州節度使兼北面行營馬軍都指揮使安審通為副招討使兼諸道馬軍都指揮使以左㪚騎常侍蕭希甫兼判大理卿事西京奏前樞密使張居翰卒五月乙已朔回鶻可汗仁喻封順化可汗丁未}
