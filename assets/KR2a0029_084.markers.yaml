  - {type: variant, offset: 2782, length: 3182, content: 異己丑邠州節度使馮暉準詔來朝是歲帝每遇四方進獻器皿多以銀於外府易金而入案宋史劉濤傳少帝奢侈常以銀易金廣其器皿李崧判三司令上庫金之數及崧以原簿校之少數千鎰崧責曰帑庫通式一日不受虛數毫釐則有重典濤曰帑司常有報不盡數以備宣索崧令有司劾濤濤事迫以情告樞密使桑維翰乃止罰一月俸舊五代史考異謂左右曰金者貴而且輕便於人力識者以為北遷之兆也開運三年春正月癸巳朔帝御崇元殿受朝賀仗衞如式詔改鑄天下合同印書詔印御前印並以黃金為之己亥貝州梁漢璋奏蕃寇屯聚將謀入寇詔符彥卿屯荊州口案宋史符彥卿傳再出河朔彥卿不與易其行伍配以羸師數千戍荊州口舊五代史考異癸卯以前華州節度使劉繼勳為同州節度使以陝州節度使劉景巖為鄧州節度使丙午以宣徽南院使知陝州事焦繼勳為陝州留後丁未刑部員外王涓賜私家自盡坐私用官錢經營求利故也右司郎中李知損貶均州司戶員外置馳驛發遣坐前任度支判官日與解縣榷鹽使王景遇交游借貸故也己酉詔侍衞親軍副都指揮使李守貞率師巡撫北邊辛亥以皇弟秦州節度使重睿為許州節度使以許州節度使安審琦為兗州節度使以兗州節度使趙在禮為晉昌軍節度使癸丑以涇州節度使何建為秦州節度使以前貝州節度使史威為涇州節度使乙卯定州奏契丹入寇己未二王後守太僕少卿襲酅國公楊延壽除名配流威州終身勿齒延壽奉命於磁州檢苗受贓二百餘匹準律當絞有司以二王後入議故貸其死二月壬戌朔日有蝕之詔滑州皇甫遇率兵援糧入易定等州甲子以滄州留後王景為本州節度使右僕射和凝逐月別給錢五萬傔糧芻粟等優舊相也辛未魯國大長公主史氏薨輟朝三日丙子光祿卿致仕王弘贄卒贈太常卿迴鶻遣使貢方物升桂州全義縣為溥州仍隸桂州其全義縣改為德昌縣從湖南馬希範所請也壬午以前晉昌軍節度使安彥威充北面行營副都統以宣徽北院使兼太府卿孟承誨為右武衞大將軍充職是日幸南莊命臣僚泛舟飲酒因幸杜威園醉方歸內甲申河陽節度使李從溫薨輟朝贈太師三月壬辰朔以權知河西節度事張遵古為河西留後乙未以御史中丞顏衎為戶部待郎以戶部侍郎趙遠為御史中丞丙申以邠州節度使兼侍衞步軍都指揮使馮暉為河陽節度使以前涇州節度使李德珫為邠州節度使李守貞奏大軍至衡水己亥奏獲鄭州刺史趙思恭癸卯奏大軍迴至冀州戶部侍郎顏衎上表以母老乞解官就養從之戊申以皇子齊州防禦使延煦為澶州節度使辛亥密州上言飢民殍者一千五百庚申以瓜州刺史曹元忠為沙州留後夏四月辛酉朔李守貞自北班師到闕太原奏吐渾白可久奔歸契丹諸侯咸有異志乙亥宰臣詣寺觀禱雨曹州奏部民相次餓死凡三千人時河南河北大飢殍殕甚衆沂密兗鄆寇盜羣起所在屯聚剽劫縣邑吏不能禁兗州節度使安審琦出兵捕逐為賊所敗戊寅幸相國寺禱雨皇子延煦與晉昌軍節度使趙在禮結婚案皇子延煦娶趙在禮女通鑑作三月庚申與薛史作四月戊寅異舊五代史考異命宗正卿石光贊主之五月庚寅朔以兵部郎中劉皡為太府卿戊戌以前同州節度使馮道為鄧州節度使定州奏部民相次擄殺流移約五千餘戶青州奏全家殍死者一百一十二戶沂州奏淮南遣海州刺史領兵一千五百人應接賊頭常知及詔兗州安審琦領兵捕逐甲辰以前太子賓客韋勳為太子賓客兗州安審琦奏淮賊抽退賊頭常知及與其次首領武約等並乞歸命丁未幸大年莊游船習射帝醉甚賜羣官器帛過差夜分方歸內戊申以鄜州留後李殷為定州節度使辛亥詔皇甫遇為北面行營都部署張彥澤為副李殷為都監領兵赴易定等州尋止其行甲寅以貝州留後梁漢璋為貝州節度使左神武統軍郭謹為鄜州節度使六月庚申朔登州奏文登縣部內有銅佛像四瓷佛像十自地踴出狼山招收指揮使孫方簡叛據狼山歸契丹案遼史五月庚戌晉易州戍將孫方簡請內附蓋方簡歸契丹自在五月至六月晉人始奏聞也歐陽史從薛史作六月乙丑詔諸道不得橫薦官僚如本處幕府有闕即得奏薦丙寅以前昭義軍節度使李從敏為河陽節度使以河陽節度使兼侍衞步軍都指揮使馮暉為靈州節度使壬午以鄆州節度使兼侍衞親軍都指揮使高行周為宋州節度使加兼中書令充北面行營副都統以宋州節度使侍衞親軍都指揮使案以下原本有闕文定州奏蕃寇壓境詔李守貞為北面行營都部署滑州皇甫遇為副相州張彥澤充馬軍都指揮使定州李殷充步軍都指揮使七月壬辰以禮部尚書王延為刑部尚書以工部尚書王松為禮部尚書以太常卿龍敏為工部尚書以左丞李慎儀為太常卿以吏部侍郎張昭遠為左丞以右丞李詳為吏部侍郎以前義州刺史李玘為右丞前晉昌軍節度使安彥威薨輟朝贈太師丙申兩浙節度使吳越國王錢弘佐加守太師北京留守河東節度使北平王劉知遠加守太尉滄州奏蕃寇攻饒安縣楊劉口河決西岸水闊四十里以前鄧州節度使劉景巖為太子太師致仕辛亥宋州穀熟縣河水雨水一概東流漂沒秋稼丁巳大理卿李專美卒戊午詔偽清泰朝經削奪官爵朱弘昭馮贇康義誠王思同藥彥稠等並復其官爵自夏初至是河南河北諸州郡餓死者數萬人羣盜蜂起剽略縣鎮霖雨不止川澤汎漲損害秋稼八月己未朔以左諫議大夫裴羽為給事中庚申李守貞皇甫遇駐軍定州辛酉幸南莊召從臣宴樂至暮還宮詔潞州運糧十三萬赴恆州癸亥以右散騎