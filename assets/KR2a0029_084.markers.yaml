  - {type: variant, offset: 404, length: 1749, content: 考異以兵部侍郎弘文館學士判館事田敏為國子祭酒以戶部侍郎段希堯為兵部侍郎以工部侍郎邊蔚為戶部侍郎依前權知開封府事以左散騎常侍李式為工部侍郎以給事中王仁裕為左散騎常侍甲寅以華州節度使趙瑩為開封尹以皇弟開封尹重睿為秦州節度使以宣徽南院使劉繼勳為華州節度使以前鄆州節度使張從恩為晉州節度使丙辰杜威來朝定州奏大風雹北岳廟殿宇樹木悉摧拔之六月乙丑朔帝御崇元殿百官入閣監修國史劉昫史官張昭遠張昭遠原本作張昭考宋史張昭傳昭初名昭遠漢避高祖諱去遠字薛史晉紀不宜預稱為張昭當傳寫脫落今增入影庫本粘籤等以新修唐書紀志列傳幷目錄凡二百三卷上之案郡齋讀書志直齋書錄解題並作二百卷五代會要作二百二卷目錄一卷舊五代史考異賜器帛有差癸酉以恆州節度使杜威為天雄軍節度使充鄴都留守以鄴都留守馬全節為恆州節度使以翰林學士金部郎中知制誥徐台符為中書舍人以翰林學士禮部郎中知制誥李瀚為中書舍人翰林學士都官郎中劉溫叟加知制誥翰林學士主客員外郎范質改比部郎中知制誥並依舊充職祠部員外郎知制誥張沆本官充學士以太常少卿陶穀為中書舍人案宋史陶穀傳穀性急率嘗與兗帥安審信集會杯酒相失為審信所奏時方姑息武臣穀坐責授太常少卿嘗上言頃蒞西臺每見臺司詳斷刑獄少有即時決者至于閭閻夫婦小有爭訟淹滯即時坊市死亡喪葬必候臺司判狀奴婢病亡亦須檢驗吏因緣為姦而邀求不已經旬不獲埋瘞望申條約以革其弊從之俄拜中書舍人舊五代史考異己亥己亥以前後干支推之當作乙亥今無別本可校姑仍其舊影庫本粘籤以邠州節度使劉景巖為陝州節度使己卯新授恆州節度使馬全節卒輟朝贈中書令壬午大理卿張仁愿卒贈祕書監遣刑部尚書竇貞固等分詣寺觀禱雨己丑以定州節度使王周為恆州節度使以前易州刺史安審約為定州留後是月兩京及州郡十五並奏旱秋七月乙未朔以侍衞步軍都指揮使領夔州節度使田武為昭義軍節度使甲寅左諫議大夫李元龜奏請禁止天下僧尼典買院舍從之丙辰前少府監李鍇貶坊州司戶坐冒請逃死吏人衣糧入己故也庚申以前齊州防禦使薛可言為延州兵馬留後案遼史云七月晉遣孟守中奉表請和通鑑作張暉與遼史人名互異今以遼史前後考之則張暉請和在開運元年至二年復遣孟守中也薛史闕而不載蓋當時實錄為之諱言孔本八月甲子朔日有蝕之中書舍人陶穀奏請權廢太常寺二舞郎從之丙寅宰臣和凝罷相守右僕射以樞密使馮玉為中書侍郎平章事使如故乙亥詔諸御史今後除準式請假外不得以細故小事請假離京除奉制命差推事及按察外不得以諸雜細務差出丙子以靈州節度使馮暉為邠州節度使加檢校太尉以前鄜州節度使丁審琪為左羽林統軍以前鄜州節度使郭謹為左神武統軍西京留司御史臺奏新授鄧州節度使宋彥筠於銀沙灘斬廳頭鄭溫詔鞫之款云彥筠出身軍旅不知事體不合專擅行法詔釋其罪以工部尚書王松權知貢舉丁丑以前晉州節度使安叔千為右金吾上將軍以三司副使給事中李穀為磁州刺史充北面水陸轉運使分遣使臣於諸道率馬戊寅以左金吾上將軍皇甫立為左衞上將軍以右羽林統軍李懷忠為左武衞上將軍庚辰新授潞州節度使田武卒輟朝贈太尉戊子湖南奏靜江軍節度使馬希杲卒九月丙申以西京留守北面馬步軍都排陣使景延廣為北面行營副招討使丁酉以刑部侍郎趙遠為戶部侍郎以工部侍郎李式為刑部侍郎以中書舍人盧價為工部侍郎價久次綸闈舊例合轉禮部侍郎或御史中丞宰臣馮玉擬此官桑維翰以為資望淺不署狀無何維翰休沐數日玉獨奏行之維翰由是不樂與玉有間矣己亥幸繁臺觀馬案歐陽史作閱馬于萬龍岡舊五代史考異遂幸李守貞第庚子以晉州節度使張從恩為潞州節度使吏部侍郎張昭遠加階爵案宋史張昭遠傳加金紫階進爵邑舊五代史考異酬修唐史之勞也戊申升曹州為節鎮以威信軍為軍額詔李守貞率兵屯澶州己酉月掩昴宿以宣徽北院使焦繼勳為宣徽南院使以內客省使孟承誨為宣徽北院使壬子以前太子詹事王居敏為鴻臚卿李專美為大理卿以太子賓客致仕馬裔孫為太子詹事甲寅移泰州理所於滿城縣乙卯詔相州節度使張彥澤率兵屯恆州冬十月戊寅戊寅以長曆推之當作戊辰今無別本可校姑仍其舊影庫本粘籤以河陽節度使何建為涇州節度使以許州節度使李從溫為河陽節度使以前鄭州節度使石贇為曹州節度使庚午遣使太子賓客羅周岳使副太子右庶子王延濟冊兩浙節度使錢弘佐為守太尉辛未右金吾衞上將軍楊彥詢卒贈太子太師丁丑高麗遣使貢方物庚辰以前延州節度使王令溫為靈州節度使庚寅以邢州兵馬留後劉在明為晉州兵馬留後以前河陽留後方太為邢州留後癸巳升陳州為節鎮以鎮安軍為軍額, WYG: 巻四}
