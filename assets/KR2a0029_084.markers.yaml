  - {type: variant, offset: 2155, length: 626, content: 月戊戌以邠州節度使馮暉兼侍衞步軍都指揮使充北面行營先鋒馬步軍都指揮使以權知高麗國事王武為檢校太保使持節玄菟州都督充大義軍使封高麗國王癸卯日南至帝御崇元殿受朝賀戊申兩浙奏順化軍節度使錢鐸卒甲申甲申以長曆推之當作甲寅今無別本可校姑仍其舊影庫本粘籤以壽州節度使侍衞馬軍都指揮使李彥韜為陳州節度使典軍如故丙申前商州刺史李俊除名李俊歐陽史作重俊蓋少帝時避御名故去重字今仍其舊又丙申以長曆推之當作丙辰今亦仍其舊影庫本粘籤坐受財枉法也十二月乙丑以兩浙節度使吳越國王錢弘佐兼東南面兵馬都元帥丙寅以吳越國金馬左廂都指揮使湖州刺史胡思進遙領虔州昭信軍度使胡思進十國春秋作進思據九國志與薛史同今仍其舊影庫本粘籤以吳越國金馬右廂都指揮使明州刺史闞璠遙領宣州寧國軍節度使並典軍如故左羽林統軍丁審琪卒贈太尉辛未以工部侍郎盧價為禮部侍郎以右散騎常侍集賢殿學士判院事司徒詡為工部侍郎依前充職以前中書舍人殷鵬為給事中充樞密直學士以給事中劉知新為右散騎常侍乙亥陝府節度使劉景巖來朝丁丑狩於近郊臘也己卯光祿卿致仕陳玄卒於太原庚辰命使冊高麗國王王武癸未以前兗州節度使安審信為華州節度使丁亥以樞密使中書令桑維翰為開封尹以司空門下侍郎平章事劉昫判三司以左僕射門下侍郎平章事李崧為守侍中充樞密使以開封尹趙瑩為中書令弘文館大學士以宣徽南院使焦繼勳知陝州軍州事案宋史焦繼勳傳西人寇邊朝議發師致討繼勳抗疏請行拜秦州觀察使兼諸蕃水陸轉運使既至推恩信設方略招誘諸部相率奉玉帛牛酒乞盟邊境以安俄徙知陝州舊五代史, WYG: ''}
