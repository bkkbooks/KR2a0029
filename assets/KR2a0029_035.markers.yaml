  - {type: variant, offset: 10, length: 0, content: '', WYG: 云入蔡賊中為賊帥假子更姓名為郭禹亡匿久之及貴方復本姓唐僖宗朝為蔡州軍校領本郡兵戍荆南帥以其凶暴欲害之遂棄本軍奔于秭歸一夕巨蛇繞其身幾至于殞乃祝曰茍有所負死生惟命逡巡蛇亦解去後據歸州招輯流亡練士伍得兵千餘人㳂流以襲荆南遂據其地朝廷即以旄鉞授之是時荆州經巨盜之後居民才一}
