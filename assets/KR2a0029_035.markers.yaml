  - {type: variant, offset: 1226, length: 1, content: 從, krp: 敗乃歸我邪匡明亦謀奔淮南子承規諫曰昔諸葛兄弟分仕二國若適揚州是自取疑也匡明謂然乃趨成都}
  - {type: variant, offset: 1230, length: 1, content: 家, WYG: 云行密厚遇匡凝其後行密死楊渥稍不禮之渥方宴食青梅匡凝顧渥曰勿多食發小兒熱諸将以為慢渥遷匡凝海陵後為徐温所殺初匡凝好聚書及敗楊師厚獲數千巻于第悉以來獻匡凝弟匡明字賛堯幼以父貴一子出身為江寧府文學及壯以軍功厯繡峽二州刺史成汭之敗其兄匡凝表為荆南留後未至鎮而朗陵之兵先據其城矣匡明領兵逐之遂鎮于渚宫天祐二年秋太祖既平襄州遣楊師厚乘勝以趨荆門匡明懼乃舉族上峽奔蜀王建待以賓禮及建稱帝用為大理卿工部尚書久之卒于蜀張佶不知何郡}
