  - {type: variant, offset: 128, length: 2, content: 追尊, krp: 頵以行宻專恣跋扈嘗移書諷之曰侯王守方以奉天子古之制也其或踰越者譬如百川不朝于海雖狂奔猛注澶漫遐廣終}
  - {type: variant, offset: 131, length: 5, content: 孝質皇帝廟, WYG: 涸土不若恬然順流淼茫無窮也況東南之鎮揚為大塵賤刀布阜積金玉願公上恒賦頵將悉儲峙具單車從行密怒曰今財賦之行必由于汴適足以資于敵也不從時延夀方守夀春九國志天復初北司擁駕西幸昭宗聞延夀有武幹遣李儼間道齎詔授延夀蔡州節度使直頵之事密遣人告于頵曰公有所欲為者願為公執鞭頵聞之頗會其志乃召進士杜荀鶴具述其意復語曰昌本朝奉盟主在斯一舉矣即遣荀鶴具述密議自間道至大梁太祖大悦遽屯兵於宿州以㑹其變不數月事㣲洩行密乃先以公牒徵延夀新唐書行密妻延夀姊也遣辯士召延夀疑不肯赴姊遣婢報故延夀疾走揚州次悉兵攻宣城頵戎力寡薄棄壁走不能越境為行密軍所得九國志行密别遣臺蒙王茂章率步騎以往頵委舟師于汪建王壇自出廣徳迎戰大為濛所敗遂率殘衆遁保宛陵壇建聞其敗因盡以舟師歸欵于行密十二月頵出外州柵疾戰橋陷馬墜為外軍所殺延夀飛騎赴命邇揚州一舍行密使人殺之其後延夀部曲有逸境至者具言其事又云延夀之将行也其室王氏勉延夀曰今若得兵柄果成大志是吉凶繫乎時非繫于吾家也然願日致一介以寧所懷一日介不至王氏曰事可知矣乃部分家僕悉授兵器遽闔中扉而捕騎已至不得入遂集家屬阜私帑發百燎合州廨焚之既而稽首上告曰妾誓不以皎然之軀為讎者所辱乃投火而死五代史補楊行密據淮南以妻弟朱氏衆謂之朱三郎者行密署為泗州防禦使泗州素制屯軍朱氏驍勇到任恃衆自負行密雖悔度力未能但姑息之時議以為行密事勢去矣居無何行密得目疾雖瘉且詐稱失明其出入皆以人扶策不爾則觸牆抵柱至于流血姬妾僕隷以為寔然往往無禮首尾僅三年朱氏聞之信而少懈弛行密度其計必中謂妻曰吾不幸臨老兩目如此男女卑糼茍不諱則國家為他人所有今晝夜思忖不如召泗州三舅來使管勾軍府事則吾雖死無恨妻以為然遽發使述其意而召之朱氏大喜倍道而行及入謁行密恐其覺坐于中堂以家人禮見朱氏頗有徳色方設拜行密奮䄂中鐡槌以擊之正中其首然猶宛轉}
