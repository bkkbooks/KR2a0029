  - {type: variant, offset: 128, length: 2, content: 追尊, WYG: 頵以行宻專恣跋扈嘗移書諷之曰侯王守方以奉天子古之制也其或踰越者譬如百川不朝于海雖狂奔猛注澶漫遐廣終}
