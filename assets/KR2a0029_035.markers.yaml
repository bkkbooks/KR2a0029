  - {type: variant, offset: 124, length: 1, content: 朔, WYG: 仍辟在幕下其激勤如此上藍和尚失其名居于洪州上藍院精究術數大為鍾傳所禮一旦疾篤往省之且曰老夫子和尚或謂無間矣和尚或不諱得無一言相付耶上藍強起索筆作偈以授其末云但看來年二三月桞條堪作打鍾槌偈終而卒傳得之不能測洎明年春淮帥引兵奄至洪州陷江南遂為楊氏有打鍾之偈人始悟焉田頵本揚府之大校也九國志頵字徳臣廬州合肥人朱延夀不知何許人九國志延壽廬州舒城人唐天祐初楊行密雄據淮海時頵為宣州節度使延夀為夀}
