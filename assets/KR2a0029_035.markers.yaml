  - {type: variant, offset: 1235, length: 8, content: 影庫本粘籤氏叔琮, WYG: 中佶髀佶謂將吏曰吾非汝生當迎馬公為之乃謂將吏曰佶才能不如馬公况朝廷重藩非其人不可因以牘召殷亦不疑禀命而至佶受拜謁禮畢命升階讓殷為帥佶即趨下率衆抃賀乃自請率師代殷攻邵州下之復為行軍司馬垂二十年殷果立大勲甚徳佶開平初殷表佶為朗州永順軍節度使累加檢校太傅同平章事乾化元年夏四月卒于位九國志乾化初移鎮桂林卒于治}
