  - {type: variant, offset: 10, length: 0, content: '', krp: 云入蔡賊中為賊帥假子更姓名為郭禹亡匿久之及貴方復本姓唐僖宗朝為蔡州軍校領本郡兵戍荆南帥以其凶暴欲害之遂棄本軍奔于秭歸一夕巨蛇繞其身幾至于殞乃祝曰茍有所負死生惟命逡巡蛇亦解去後據歸州招輯流亡練士伍得兵千餘人㳂流以襲荆南遂據其地朝廷即以旄鉞授之是時荆州經巨盜之後居民才一}
  - {type: variant, offset: 11, length: 0, content: '', WYG: 七家汭撫輯凋殘勵精為理通商訓農勤于恵養比及末年僅及萬户案以下有闕文汭性豪暴事皆意斷又好自矜伐騁辯凌人深為識者所鄙初澧朗二州本屬荆南乾寧中為土豪雷滿所據汭奏請割隸唐宰相徐彦若執而不行汭由是銜之及彦若出鎮南海路過江陵汭雖加延接而猶怏怏嘗因對酒語及其事彦若曰今公位尊方面自比桓文雷滿者偏州}
  - {type: page-break, offset: 11, content: '', id: KR2a0029_WYG_035-2a, image: WYG0277/WYG0277-0157c.png}
  - {type: variant, offset: 11, length: 0, content: '', krp: 七家汭撫輯凋殘勵精為理通商訓農勤于恵養比及末年僅及萬户案以下有闕文汭性豪暴事皆意斷又好自矜伐騁辯凌人深為識者所鄙初澧朗二州本屬荆南乾寧中為土豪雷滿所據汭奏請割隸唐宰相徐彦若執而不行汭由是銜之及彦若出鎮南海路過江陵汭雖加延接而猶怏怏嘗因對酒語及其事彦若曰今公位尊方面自比桓文雷滿者偏州}
  - {type: line-break, offset: 12, content: '', id: ZHSJ__dup5931}
  - {type: variant, offset: 12, length: 1, content: 明, WYG: 草賊爾今公何不加兵而反怨朝廷乎汭赧然而屈案以下有闕文累官至檢校太尉封上谷郡王楊行密以兵圍鄂州汭出師以援鄂淮寇乘之以火焚其艦汭投江而死天祐三年夏太祖以汭没于王事上表于唐帝請為汭立廟于荆門優詔可之五代史補鄭準不知何許人性諒直能為文長于箋奏成汭鎮荆南辟為推官汭甞讎殺人懼為吏所捕改姓郭氏及為荆南節度使命準為表乞歸本姓準援筆而成其畧云臣門非寇盖家本軍戎親朋之内盱睢為人報怨昆弟之間㸃染無處求生背故國以狐疑望隣封而鼠竄名非霸越乘舟難效于陶朱志切投秦出境遂稱于張禄又云成為本姓郭乃冐稱本避犯禁之辜敢歸司寇别族受封之典誠愧諸侯伏乞聖慈許歸本姓云云其表甚為朝廷所重後因汭生辰淮南楊行密遣使致禮幣之外仍貺初學記一部準忿然以為不可謂汭曰夫初學記盖訓童之書爾今敵國交聘以此書為貺得非相輕之甚耶宜書責讓汭不納準自歎曰若然見輕敵國足彰幕府之無人也參佐無状安可久遽請解職汭怒其去潛使人于途中殺之杜洪者江夏伶人鍾𫝊者豫章小校唐光啟中秦}
  - {type: page-break, offset: 12, content: '', id: KR2a0029_WYG_035-2b, image: WYG0277/WYG0277-0157d.png}
