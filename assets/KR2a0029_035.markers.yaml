  - {type: variant, offset: 1244, length: 0, content: '', WYG: 詔贈侍中雷滿新唐書滿字秉仁武陵洞蠻也始為朗州小校唐廣明初王仙芝焚刼江陵是時朝廷以髙駢為節度使駢擢滿為禆將以領蠻軍駢移鎮淮南復隸部曲以悍獷趫徤知名中和初擅率部兵自廣陵逃歸于朗㳂江恣殘暴始為荆人大患矣率一歲中三四移兵入其郛焚蕩驅掠而去唐朝姑務息兵即以澧朗節度使授之累官至檢校太傅同平章事滿貪穢慘毒盖非人類又嘗于府署濬一深潭構大亭于其上毎隣道使車經由必召讌于中且言此水府也中有蛟龍竒怪萬態惟余能游焉或酒酣對客即取筵中寳器亂擲于潭中因自禠其衣祼露其文身遽躍入水底徧取所擲寳器戯弄于水面乆之方出復整衣就座其詭誕如此及死子彦恭繼之新唐書滿以天復元年卒于彦威自立弟彦恭結忠義節度使趙匡凝以逐彦威蠻蜑狡獪深有父風燼墟落榜舟檝上下于南郡武昌之間殆無人矣又與淮蜀結連阻絶王命太祖詔湖南節度使馬殷荆南節度使髙季昌練精兵五千遣將倪可福統之下澧州與潭兵合先是滿塹沅江以周其壘門臨長橋勢不可入殷極其兵力攻圍周歲彦恭食盡兵}
