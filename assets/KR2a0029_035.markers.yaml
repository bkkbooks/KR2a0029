  - {type: variant, offset: 227, length: 304, content: 刺史追尊為孝成皇帝廟號德祖陵曰慶陵皇妣宋國夫人劉氏追諡為孝成懿皇后帝即孝成之元子也以唐咸通丁亥歲九月九日懿后生帝於應州之金城縣初孝成事唐獻祖為愛將獻祖之失振武為吐渾所攻部下離散孝成獨奮忠義解蔚州之圍武皇之鎮鴈門也孝成厭代帝年甫十三善騎射獻祖見而撫之曰英氣如父可侍吾左右每從圍獵仰射飛鳥控弦必中尋隸武皇帳下武皇遇上源之難武皇原本作武后今據文改正影庫本粘籤將佐罹害者甚眾帝時年十七翼武皇踰垣脫難於亂兵流矢之內獨無所傷武皇鎮河東以帝掌親騎時李存信為蕃漢大將每總兵征討師多不利武皇遂選帝副之所向克捷帝嘗宿於鴈門逆旅媼方娠不時具饌媼聞腹中兒語云大家至矣速宜進食媼異之遽起親奉庖爨甚恭帝詰之媼告其故案北夢瑣言云帝以媼前倨, WYG: 留}
