  - {type: variant, offset: 137, length: 1, content: 毅, WYG: 呌久而方斃行密内外不測即時升堂㕔召将吏等謂之曰吾所以兩目失明者盖為朱三此賊今已擊殺兩目無事矣諸公知之否于是軍府大駭其僕妾嘗所無禮者皆自殺初行密之在民間也嘗為合肥縣手力有過縣令将鞭之行密懼且拜會有客自外入見行密每拜則㕔之前簾皆叩地而令不之覺客知其非常乃遽升㕔揖令于他處告以所見令驚遂恕之且勸事郡以自奮行密度本郡不足依乃投髙駢死死秦彦孫儒等作亂行宻速誅之遂有淮南之地趙匡凝新唐書匡凝字光儀蔡州人也父徳諲初事秦宗權為列校當宗權強暴時表為襄州留後唐光啟四年夏六月徳諲審宗權必敗乃舉漢南之地以歸唐朝仍遣使投分于太}
