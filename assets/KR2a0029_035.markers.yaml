軍衆流散無所歸向帝登南樓南樓通鑑作城樓考冊府元龜引薛史亦作南樓今仍其舊影庫本粘籤謂在禮曰欲建大計非兵不能集事吾自於城外招撫諸軍帝乃得出夜至魏縣部下不滿百人時霍彥威所將鎮州兵五千人獨不亂聞帝既出相率歸帝詰朝帝登城掩泣曰國家患難一至於此來日歸藩上章徐圖再舉安重誨霍彥威等曰此言非便也國家付以閫外之事不幸師徒逗橈為賊驚奔元行欽狂妄小人彼在城南未聞戰聲無故棄甲如朝天之日信其奏陳何所不至若歸藩聽命便是強據要君正墮讒慝之口也正當星行歸闕面叩玉階讒間沮謀庶全功業無便於此者也帝從之十一日發魏縣至相州獲官馬二千匹案歐陽史作掠小坊馬三千匹舊五代史考異始得成軍元行欽退保衞州果以飛語上奏帝上章申理莊宗遣帝子從審及內官白從訓齎詔諭帝白從訓原本作向從訓考通鑑及歐陽史俱作白今改正影庫本粘籤從審至衞州為行欽所械帝奏章亦不達帝乃趨白臯渡駐軍於河上會山東上供綱載絹數船適至乃取以賞軍軍士以之增氣及將濟以渡船甚少帝方憂之忽有木數隻沿流而至即用以濟師故無留滯焉二十六日至汴州莊宗領兵至滎澤遣龍驤都校姚彥溫為前鋒是日彥溫率部下八百騎歸於帝具言主上為行欽所惑事勢已離難與共事帝曰卿自不忠言何悖也乃奪其兵仍下令曰主上未諒吾心遂致軍情至此宜速赴京師既而房知溫杜晏球自北面相繼而至杜晏球原本作燕球今從通鑑及歐陽史改正影庫本粘籤四月丁亥朔案丁亥朔與莊宗紀異據莊宗紀三月丁未朔則四月當作丁丑據此紀下文有己丑甲午則當作丁亥前後參差未詳孰是舊五代史考異至甖子谷聞蕭牆釁作莊宗晏駕帝慟哭不自勝詰旦朱守殷遣人馳報京城大亂燔剽不息請速至京師己丑案通鑑作乙丑疑傳寫之訛歐陽史從薛史作己丑舊五代史考異帝至洛陽止於舊宅分命諸將止其焚掠百官弊衣旅見帝謝之斂袵泣涕時魏王繼岌征蜀未還帝謂朱守殷曰公善巡撫以待魏王吾當奉大行梓宮山陵禮畢即歸藩矣是日羣臣諸將上牋勸進帝面諭止之樞密使李紹宏張居翰宰相豆盧革韋說六軍馬步都虞候朱守殷青州節度使符習徐州節度使霍彥威宋州節度使杜晏球兗州節度使房知溫等頓首言曰帝王應運蓋有天命三靈所屬當協冥符福之所鍾福之所鍾原本脫福字今據冊府元龜增入影庫本粘籤不可以謙遜免道之已喪不可以智力求前代因敗為功殷憂啟聖少康重興於有夏平王再復於宗周其命惟新不失舊物今日廟社無依人神乏主天命所屬人何能爭光武所謂使成帝再生無以讓天下願殿下俯徇樂推時哉無失軍國大事望以教令施行帝優答不從壬辰文武百僚三拜牋請行監國之儀以安宗社答旨從之既而有司上監國儀注甲午幸大內興聖宮始受百僚班見之儀所司議即位儀注霍彥威孔循等言唐之運數已衰不如自創新號因請改國號不從土德帝問藩邸侍臣左右奏曰先帝以錫姓宗屬為唐雪寃以繼唐祚今梁朝舊人不願殿下稱唐請更名號帝曰予年十三事獻祖以予宗屬愛幸不異所生事武皇三十年排難解紛櫛風沐雨冒刃血戰體無完膚何艱險之不歷武皇功業即予功業先帝天下即予天下也兄亡弟紹於義何嫌且同宗異號出何典禮運之衰隆吾自當之衆之莠言吾無取也時羣臣集議依違不定唯吏部尚書李琪議曰殿下宗室勳賢立大功於三世一朝雨泣赴難安定宗社撫事因心不失舊物若別新統制則先朝便是路人煢煢梓宮何所歸往不唯殿下追感舊君之義羣臣何安請以本朝言之則睿宗睿宗原本作瑞宗今據新舊唐書改正影庫本粘籤文宗武宗皆以弟兄相繼即位柩前如儲后之儀可也於是羣議始定河中軍校王舜賢奏節度使李存霸以今月三日出奔不知所在乙未敕曰寡人允副羣情方監國事外安黎庶內睦宗親庶諧敦之規永保隆平之運昨京師變起禍難薦臻至於戚屬之間不測驚奔之所慮因藏竄濫被傷痍言念於茲自然流涕宜令河南府及諸道應諸王眷屬等昨因驚擾出奔所至之處即時津送赴闕如不幸物故者量事收瘞以聞案北夢瑣言莊宗諸弟存紀存確匿于南山民家人有以報安重誨者重誨曰主上以下詔尋訪帝之仁德必不加害不如密令殺之果併命于民家後明宗聞之切讓重誨傷惜久之舊五代史考異以中門使安重誨為樞密使以鎮州別駕張延朗為樞密副使以客將范延光為宣徽使進奏官馮贇為內客省使丙申下敕今年夏苗委人戶自供通頃畝五家為保本州具帳送省州縣不得差人檢括如人戶隱欺許人陳告其田倍徵己亥命石敬瑭權知陝州兵馬留後皇子從珂權知河南府兵馬留後庚子淮南楊溥進新茶以權知汴州軍州事孔循為樞密副使以陳州刺史劉仲殷為鄧州留後以鄭州防禦使王思同為同州留後敕曰租庸使孔謙濫承委寄專掌重權重權原本作重難今據冊府元龜改正影庫本粘籤侵剝萬端姦欺百變遂使生靈塗炭軍士飢寒成天下之瘡痍極人間之疲弊載詳衆狀側聽輿辭難私降黜之文合正殛誅之典宜削奪在身官爵按軍令處分雖犯衆怒特貸全家所有田宅並從籍沒是日謙伏誅敕停租庸名額依舊為鹽鐵戶部度支三司委宰臣豆盧革專判中書門下上言請停廢諸道監軍使內勾司租庸院大程官出放猪羊柴炭戶括田竿尺一依朱梁制度仍委節度刺史通申三司不得差使量檢州使公廨錢物先被租庸院管繫今據數卻還州府州府不得科率百姓百姓合散蠶鹽每年祇二月內一度俵散依夏稅限納錢夏秋苗稅子除元徵石斗及地頭錢餘外不得紐配先遇赦所放逋稅租庸違制徵收並與除放今欲曉告河南府及諸道準此施行從之是日宋州節度使元行欽伏誅壬寅以樞密副使孔循為樞密使永樂大典卷七千一百六十四案歐陽史作左驍衞大將軍孔循為樞密使吳縝纂誤云孔循傳作左衞大將軍為樞密使俱與薛史異舊五代史考異, krp: ''}
