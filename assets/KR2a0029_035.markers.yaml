  - {type: variant, offset: 1674, length: 4030, content: 中行欽酣戰不解矢亦中帝股拔矢復戰行欽窮蹙面縛乞降帝酌酒飲之拊其背曰吾子壯士也因厚遇之十三年二月莊宗與梁將劉鄩大戰於故元城北帝以三千騎環之鼓譟奮擊內外合勢鄩軍殆盡帝徇地慈洺四月相州張筠遁走乃以帝為相州刺史九月滄州節度使戴思遠棄城歸汴滄州原本作淐州今據薛史梁紀改正影庫本粘籤小將毛璋據州納款莊宗命率兵慰撫既入城以軍府安報莊宗書吏誤云已至滄州禮上畢莊宗省狀怒曰嗣源反耶帝聞之懼歸罪於書吏斬之未幾承制授邢州節度使十四年四月契丹阿保機率眾攻幽州周德威間使告急莊宗召諸將議進取之計諸將咸言敵勢不能持久持久原本作持文今據文改正影庫本粘籤野無所掠食盡自還然後踵而擊之可也帝奏曰德威盡忠於家國孤城被攻危亡在即不宜更待敵衰願假臣突騎五千為前鋒以援之莊宗曰公言是也即命帝與李存審閻寶率軍赴援帝為前鋒會軍於易州帝謂諸將曰敵騎以馬上為生不須營壘況彼眾我寡所宜銜枚箝馬潛行溪澗襲其不備也八月師發上谷陰晦而雨帝仰天祈祝即時晴霽師循大房嶺緣澗而進翌日敵騎大至每遇谷口敵騎扼其前帝與長子從珂奮命血戰敵即解去我軍方得前進距幽州兩舍敵騎復當谷口而陣我軍失色帝曰為將者受命忘家臨敵忘身以身徇國正在今日諸君觀吾父子與敵周旋因挺身入於敵陣以邊語諭之曰爾輩非吾敵吾當與天皇較力耳案原本作人皇考遼史太祖稱為天皇讓宗追稱人皇莊宗初年侵幽州者乃太祖非讓宗也今改正舊五代史考異舞檛奮擊萬眾披靡俄挾其酋帥而還我軍呼躍奮擊敵眾大敗勢如席捲委棄鎧仗羊馬殆不勝紀是日解圍大軍入幽州周德威迎帝執手歔欷九月班師於魏州莊宗親出郊勞進位檢校太保十八年十月從莊宗大破梁將戴思遠於戚城斬首二萬級莊宗以帝為蕃漢副總管加同平章事二十年代李存審為滄州節度使四月莊宗即位於鄴宮帝進位檢校太傅兼侍中尋命帝率步騎五千襲鄆州下之授天平軍節度使五月梁人陷德勝南城圍楊劉以扼出師之路帝孤守汶陽四面拒寇久之莊宗方解楊劉之圍九月梁將王彥章以步騎萬人迫鄆州自中都渡汶帝遣長子從珂率騎逆戰於遞坊鎮獲梁將任釗等三百人彥章退保中都莊宗聞其捷自楊劉引軍至鄆以帝為前鋒大破梁軍於中都生擒王彥章等是日諸將稱賀莊宗以酒屬帝曰昨朕在朝城諸君多勸朕棄鄆州以河為界賴副總管禦侮於前崇韜畫謀於內若信李紹宏輩大事已掃地矣莊宗與諸將議兵所向諸將多云青齊徐兗皆空城耳王師一臨不戰自下唯帝勸莊宗徑取汴州語在莊宗紀中莊宗嘉之帝即時前進莊宗繼發中都十月己卯遲明帝先至汴州攻封丘門汴將王瓚開門迎降帝至建國門建國原本作逮固今據通鑑改正影庫本粘籤聞梁主已殂乃號令安撫迴軍於封禪寺辰時莊宗至帝迎謁路側莊宗大悅手引帝衣以首觸帝曰吾有天下由公之血戰也當與公共之尋進位兼中書令同光二年正月契丹犯塞帝受命北征二月莊宗以郊天禮畢賜帝鐵券四月潞州小將楊立叛帝受詔討之五月擒楊立以獻六月進位太尉移鎮汴州代李存審為蕃漢總管十二月契丹入塞三年正月帝領兵破契丹於涿州案歐陽史云冬契丹侵漁陽嗣源敗之于涿州入寇破敵皆作冬間事蓋順文併之耳當以薛史為徵實舊五代史考異移授鎮州節度使案清異錄明宗在藩不妄費嘗召幕屬論事各設法乳湯半盞蓋甖中粟所煎者孔本先是帝領兵過鄴鄴庫素有御甲帝取五百聯以行是歲莊宗幸鄴知之怒甚無何帝奏請以長子從珂為北京內衙都指揮使莊宗愈不悅曰軍政在吾安得為子奏請吾之細鎧不奉詔旨強取其意何也令留守張憲自往取之左右說諭乃止帝憂恐不自安上表申理方解十二月帝朝於洛陽是時莊宗失政四方饑饉軍士匱乏有賣兒貼婦者道路怨咨帝在京師頗為謠言所屬洎朱友謙郭崇韜無名被戮中外大臣皆懷憂懾諸軍馬步都虞候朱守殷奉密旨伺帝起居朱守殷原本作安殷今據歐陽史改正影庫本粘籤守殷陰謂帝曰德業振主者身危功蓋天下者不賞公可謂振主矣宜自圖之無與禍會帝曰吾心不負天地禍福之來吾無所避付之於天卿勿多談也四年二月六日趙在禮據魏州反莊宗遣元行欽將兵攻之行欽不利退保衞州初帝善遇樞密使李紹宏及帝在洛陽羣小多以飛語謗毀紹宏每為庇護會行欽兵退河南尹張全義密奏請委帝北伐紹宏贊成之遂遣帝將兵渡河三月六日帝至鄴都趙在禮等登城謝罪出牲餼以勞師帝亦慰納之營於鄴城之西南下令以九日攻城八日夜軍亂從馬直軍士有張破敗者號令諸軍各殺都將縱火焚營讙譟雷動至五鼓亂兵逼帝營親軍搏戰搏戰原本作振戰今據文改正影庫本粘籤傷痍者殆半亂兵益盛帝叱之責其狂逆之狀亂兵對曰昨貝州戍兵主上不垂厚宥又聞鄴城平定之後欲盡坑全軍某等初無叛志直畏死耳已共諸軍商量與城中合勢擊退諸道之師欲主上帝河南請令公帝河北案原本作河中今據通鑑改正舊五代史考異帝泣而拒之亂兵呼曰令公欲何之不帝河北則為他人所有苟不見幾事當不測抽戈露刃環帝左右安重誨霍彥威躡帝足請詭隨之因為亂兵迫入鄴城懸橋已發共扶帝越濠而入趙在禮等歡泣奉迎案通鑑亂兵擁嗣源及李紹真等入城城中不受外兵皇甫暉逆擊張破敗斬之外兵皆潰趙在禮等率諸校迎拜嗣源舊五代史考異是日饗將士於行宮在禮等不納外兵軍衆流散無所歸向帝登南樓南樓通鑑作城樓考冊府元龜引薛史亦作南樓今仍其舊影庫本粘籤謂在禮曰欲建大計非兵不能集事吾自於城外招撫諸軍帝乃得出夜至魏縣部下不滿百人時霍彥威所將鎮州兵五千人獨不亂聞帝既出相率歸帝詰朝帝登城掩泣曰國家患難一至於此來日歸藩上章徐圖再舉安重誨霍彥威等曰此言非便也國家付以閫外之事不幸師徒逗橈為賊驚奔元行欽狂妄小人彼在城南未聞戰聲無故棄甲如朝天之日信其奏陳何所不至若歸藩聽命便是強據要君正墮讒慝之口也正當星行歸闕面叩玉階讒間沮謀庶全功業無便於此者也帝從之十一日發魏縣至相州獲官馬二千匹案歐陽史作掠小坊馬三千匹舊五代史考異始得成軍元行欽退保衞州果以飛語上奏帝上章申理莊宗遣帝子從審及內官白從訓齎詔諭帝白從訓原本作向從訓考通鑑及歐陽史俱作白今改正影庫本粘籤從審至衞州為行欽所械帝奏章亦不達帝乃趨白臯渡駐軍於河上會山東上供綱載絹數船適至乃取以賞軍軍士以之增氣及將濟以渡船甚少帝方憂之忽有木數隻沿流而至即用以濟師故無留滯焉二十六日至汴州莊宗領兵至滎澤遣龍驤都校姚彥溫為前鋒是日彥溫率部下八百騎歸於帝具言主上為行欽所惑事勢已離難與共事帝曰卿自不忠言何悖也乃奪其兵仍下令曰主上未諒吾心遂致軍情至此宜速赴京師既而房知溫杜晏球自北面相繼而至杜晏球原本作燕球今從通鑑及歐陽史改正影庫本粘籤四月丁亥朔案丁亥朔與莊宗紀異據莊宗紀三月丁未朔則四月當作丁丑據此紀下文有己丑甲午則當作丁亥前後參差未詳孰是舊五代史考異至甖子谷聞蕭牆釁作莊宗晏駕帝慟哭不自勝詰旦朱守殷遣人馳報京城大亂燔剽不息請速至京師己丑案通鑑作乙丑疑傳寫之訛歐陽史從薛史作己丑舊五代史考異帝至洛陽止於舊宅分命諸將止其焚掠百官弊衣旅見帝謝之斂袵泣涕時魏王繼岌征蜀未還帝謂朱守殷曰公善巡撫以待魏王吾當奉大行梓宮山陵禮畢即歸藩矣是日羣臣諸將上牋勸進帝面諭止之樞密使李紹宏張居翰宰相豆盧革韋說六軍馬步都虞候朱守殷青州節度使符習徐州節度使霍彥威宋州節度使杜晏球兗州節度使房知溫等頓首言曰帝王應運蓋有天命三靈所屬當協冥符福之所鍾福之所鍾原本脫福字今據冊府元龜增入影庫本粘籤不可以謙遜免道之已喪不可以智力求前代因敗為功殷憂啟聖少康重興於有夏平王再復於宗周其命惟新不失舊物今日廟社無依人神乏主天命所屬人何能爭光武所謂使成帝再生無以讓天下願殿下俯徇樂推時哉無失軍國大事望以教令施行帝優答不從壬辰文武百僚三拜牋請行監國之儀以安宗社答旨從之既而有司上監國儀注甲午幸大內興聖宮始受百僚班見之儀所司議即位儀注霍彥威孔循等言唐之運數已衰不如自創新號因請改國號不從土德帝問藩邸侍臣左右奏曰先帝以錫姓宗屬為唐雪寃以繼唐祚今梁朝舊人不願殿下稱唐請更名號帝曰予年十三事獻祖以予宗屬愛幸不異所生事武皇三十年排難解紛櫛風沐雨冒刃血戰體無完膚何艱險之不歷武皇功業即予功業先帝天下即予天下也兄亡弟紹於義何嫌且同宗異號出何典禮運之衰隆吾自當之衆之莠言吾無取也時羣臣集議依違不定唯吏部尚書李琪議曰殿下宗室勳賢立大功於三世一朝雨泣赴難安定宗社撫事因心不失舊物若別新統制則先朝便是路人煢煢梓宮何所歸往不唯殿下追感舊君之義羣臣何安請以本朝言之則睿宗睿宗原本作瑞宗今據新舊唐書改正影庫本粘籤文宗武宗皆以弟兄相繼即位柩前如儲后之儀可也於是羣議始定河中軍校王舜賢奏節度使李存霸以今月三日出奔不知所在乙未敕曰寡人允副羣情方監國事外安黎庶內睦宗親庶諧敦之規永保隆平之運昨京師變起禍難薦臻至於戚屬之間不測驚奔之所慮因藏竄濫被傷痍言念於茲自然流涕宜令河南府及諸道應諸王眷屬等昨因驚擾出奔所至之處即時津送赴闕如不幸物故者量事收瘞以聞案北夢瑣言莊宗諸弟存紀存確匿于南山民家人有以報安重誨者重誨曰主上以下詔尋訪帝之仁德必不加害不如密令殺之果併命于民家後明宗聞之切讓重誨傷惜久之舊五代史考異以中門使安重誨為樞密使以鎮州別駕張延朗為樞密副使以客將范延光為宣徽使進奏官馮贇為內客省使丙申下敕今年夏苗委人戶自供通頃畝五家為保本州具帳送省州縣不得差人檢括如人戶隱欺許人陳告其田倍徵己亥命石敬瑭權知陝州兵馬留後皇子從珂權知河南府兵馬留後庚子淮南楊溥進新茶以權知汴州軍州事孔循為樞密副使以陳州刺史劉仲殷為鄧州留後以鄭州防禦使王思同為同州留後敕曰租庸使孔謙濫承委寄專掌重權重權原本作重難今據冊府元龜改正影庫本粘籤侵剝萬端姦欺百變遂使生靈塗炭軍士飢寒成天下之瘡痍極人間之疲弊載詳衆狀側聽輿辭難私降黜之文合正殛誅之典宜削奪在身官爵按軍令處分雖犯衆怒特貸全家所有田宅並從籍沒是日謙伏誅敕停租庸名額依舊為鹽鐵戶部度支三司委宰臣豆盧革專判中書門下上言請停廢諸道監軍使內勾司租庸院大程官出放猪羊柴炭戶括田竿尺一依朱梁制度仍委節度刺史通申三司不得差使量檢州使公廨錢物先被租庸院管繫今據數卻還州府州府不得科率百姓百姓合散蠶鹽每年祇二月內一度俵散依夏稅限納錢夏秋苗稅子除元徵石斗及地頭錢餘外不得紐配先遇赦所放逋稅租庸違制徵收並與除放今欲曉告河南府及諸道準此