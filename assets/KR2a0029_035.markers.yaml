  - {type: variant, offset: 1232, length: 2, content: 傳改, WYG: 也九國志佶京兆長安人乾寧初以明經中第累遷宣州從事復為秦宗權行軍司馬後與劉建峯據湖南推建峯為帥唐乾寧初劉建峯據湖南獨邵州不賔命都將馬殷討之期嵗未尅而建峯為部下所殺軍亂鄰寇且至是時佶為行軍司馬屬潭人謀帥曰張行軍即所奉也佶不得已而視事旬日之間威聲大振冦亦解去九國志建峯將吏推佶為帥佶將入府常所乘馬忽爾踶􅲪不止}
