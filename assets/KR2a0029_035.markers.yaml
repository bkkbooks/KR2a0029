  - {type: variant, offset: 1452, length: 221, content: 考異兩軍既成列莊宗以梁軍甚盛慮師人之怯欲激壯之手持白金巨鍾賜帝酒謂之曰卿見南軍白馬赤馬都否覩之令人膽破帝曰彼虛有其表耳翌日當歸吾中莊宗拊髀大笑曰卿已氣吞之矣帝引鍾盡釂即屬鞬揮弭躍馬挺身與其部下百人直犯白馬都奮檛舞矟生挾二騎校而迴飛矢麗帝甲如蝟毛焉由是三軍增氣自辰及未騎軍百戰帝往來衝擊執訊獲醜不可勝計是日梁軍大敗以功授代州刺史莊宗遣周德威伐幽州帝分兵略定山後八軍八軍原本作八年今據通鑑改正影庫本粘籤與劉守光愛將元行欽戰於廣邊軍凡八戰帝控弦發矢, WYG: 巻十}
