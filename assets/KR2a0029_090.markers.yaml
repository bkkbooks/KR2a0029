  - {type: variant, offset: 871, length: 197, content: 令在禮凡四子雖歷內職皆早卒孫延勳仕皇朝歷岳蜀二州刺史永樂大典卷一萬八千一百三十五代史補趙在禮之在宋州也所為不法百姓苦之一旦下制移鎮永興百姓欣然相賀曰此人若去可為眼中拔釘子何快哉在禮聞之怒欲報拔釘之謗遽上表更求宋州一年時朝廷姑息勳臣詔許之在禮於是命吏籍管內戶口不論主客每歲一千納之於家號曰拔釘錢莫不公行督責有不如約則加之鞭朴雖租賦之不若也是歲獲錢百萬馬全節字大雅魏郡元城人也父文操本府軍校官至檢校, WYG: 侍郎兼刑部}
