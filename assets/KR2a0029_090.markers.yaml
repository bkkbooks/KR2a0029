  - {type: variant, offset: 2779, length: 1794, content: 考異衍之行裝復為籛有因為富家積白金萬鎰藏於窟室明宗即位籛進王衍犀玉帶各二馬一百五十匹魏王打毬馬七十匹旋除沂州刺史入為西衞將軍高祖即位之明年加檢校太保出典密州未幾復居環衞時湖南馬希範與籛有舊奏朝廷請命籛為使允之籛密齎蜀之奇貨往售又獲十餘萬緡以歸籛出入以庖者十餘人從行食皆水陸之珍鮮厚自奉養無與為比少帝嗣位詔遣往西蕃及迴以其馬劣為有司所糾復當路有不足者遂有詔徵其舊價籛上言請貨故京田業許之因憤惋成病而卒籛始在雍州因春景舒和出遊近郊憩於大塚之上忽有黃雀一銅錢置於前而去未幾復於衙院晝臥見二鷰相鬬畢各一錢落於籛首前後所獲三錢嘗秘於巾箱識者以為大富之徵其後家雖厚積性實鄙吝未嘗與士大夫遊處及令市馬利在私門不省咎以輸其直鬱鬱致死愚之甚耶永樂大典卷六千三百五十華溫琪字德潤宋州下邑人也祖楚以農為業父敬忠後以溫琪貴官至檢校尚書溫琪長七尺餘唐廣明中從黃巢為紀綱巢陷長安偽署溫琪為供奉都知巢敗奔至滑臺以形貌魁岸懼不自容乃投白馬河下流俄而浮至淺處會行人救免又登桑自經枝折墜地不死夜至胙縣界有田父見溫琪非常人遂匿於家經歲餘會梁將朱友裕為濮州刺史召募勇士溫琪往依之友裕署為小校漸升為馬軍都將從友裕擊秦宗權於曹南有奏加檢校太子賓客梁祖擢為開道指揮使加檢校工部尚書出屯鄜畤會延州胡璋叛命來寇郡境溫琪擊退之尋奉詔營長安以功遷絳州刺史歲餘刺棣州溫琪以州城每年為河水所壞居人不堪其苦表請移於便地朝廷許之板築既畢賜立紀功碑仍加檢校尚書左僕射繼遷齊州晉州節度使溫琪在平陽日唐莊宗嘗引兵攻之踰月不下梁人賞之升晉州為定昌軍以溫琪為節度使加檢校太保既而溫琪臨民失政嘗掠人之妻為其夫所訴罷入為金吾大將軍時梁末帝方姑息諸侯重難其命故責詞云若便行峻典謂予不念功勳若全廢舊章謂我不安黎庶為人君者不亦難乎溫琪大有愧色俄轉右監門衞上將軍右龍武統軍會河中朱友謙叛權授溫琪汝州防禦使河中行營排陣使尋為耀州觀察留後莊宗入洛溫琪來覲詔改耀州為順義軍復以溫琪鎮之加推忠向義功臣同光末西蜀既平命溫琪為秦州節度使明宗即位因入朝願留闕明宗嘉而許之除左驍衞上將軍逐月別賜錢粟以豐其家踰歲明宗謂樞密使安重誨曰溫琪舊人宜選一重鎮處之重誨奏以天下無闕他日又言之重誨素強愎對曰臣累奏未有闕處可替者唯樞密院使而已明宗曰可重誨不能答溫琪聞其事懼為權臣所怒幾致成疾由是數月不出俄拜華州節度使依前光祿大夫檢校太傅進封平原郡開國公累加食邑至三千戶溫琪至任以己俸補葺祠廟廨舍凡千餘間復於郵亭創待客之具華而且固往來稱之清泰中上表乞骸骨歸宋城制以太子少保致仕案歐史作以太子太保致仕卒贈太子太傅天福元年十二月終於家年七十五詔贈太子太保永樂大典卷一萬八千一百三十安崇阮字晉臣潞州上黨人也少倜儻有詞辯善騎射父文祐為牙門將唐光啟中潞州軍校劉廣逐節度使高潯據其城僖宗詔文祐平之既殺劉廣召赴行在授邛州刺史其後孟方立據邢洺率兵攻上黨朝廷以文祐本潞人也授昭義節度使令討方立自蜀至澤州與方立戰敗歿於陣昭宗朝宰臣崔魏公以文祐歿於王事薦崇阮於朝自是累任諸衞將軍梁氏革命以崇阮明辯遣使吳越迴以所獲庛芊悉充貢奉梁祖嘉之故每歲乘軺於江浙間及迴貢獻皆如初梁末帝嗣位授客省使知齊州事時梁軍與莊宗對壘於河上冀王友謙以河中叛末帝使段凝領軍經略蒲晉詔崇阮監軍又知華雍軍府事期年授青州兵馬留後入為諸衞上將軍唐天成中授黔南節度使檢校太保尋移鎮夔州以蜀寇侵逼棄城歸闕改晉州節度使復為諸衞上將軍高祖登極之二年詔葬梁末帝以崇阮梁之舊臣令主葬事崇阮盡哀致禮以襄其事時人義之五年以老病請告授右衞上將軍致仕開運元年九月卒於西京贈太傅永樂大典卷一萬八千三百三十一楊彥詢字成章河中寶鼎人父規累贈少師彥詢年十三事青帥王師範有書萬卷以彥詢聰悟使掌之及長益加親信常委監護郡兵及梁將楊師厚降下青州彥詢隨師範歸命洎師範見殺楊師厚領鄴召置麾下俾掌賓客唐莊宗入魏復事焉同光元年冬從平大梁升為引進副使將命西川及淮南稱旨累遷內職明宗時為客省使檢校司徒使兩浙迴授德州刺史末帝即位改羽林將軍時高祖鎮太原朝廷疑貳以彥詢沉厚擇充北京副留守案歐史作太原節度副使清泰末以宋審虔為北京留守高祖深懷不足以情告彥詢彥詢恐高祖失臣節乃曰不知太原兵甲芻粟幾何可敵大國否請明公反覆慮之蓋欲迴其意也高祖曰我不忿小人相代方寸決矣彥詢知其不可諫遂止左右欲害之高祖曰唯副使一人我自保明爾勿復言也及即位授齊州防禦使檢校太保旋改宣徽使從高祖入洛加左驍衞上將軍兼職天福二年秋出為鄧州節度使歲餘入為宣徽使, WYG: 巻}
