  - {type: variant, offset: 4574, length: 177, content: 年使於契丹六年春授邢州節度使檢校太傅時鎮州安重榮有不臣之狀彥詢憂其窺伺會車駕幸鄴表求入覲高祖慮契丹怒安重榮之殺行人也移兵犯境復命彥詢使焉仍恐重榮要之由滄州路以入蕃戎王果怒重榮彥詢具言非高祖本意蓋如人家惡子無如之何尋聞重榮犯闕乃放還七年春授華州節度使檢校太尉在任二年屬部內蝗旱道殣相望彥詢以官粟假貸州民賴之存濟者甚衆開運初以風痺授右金吾衞上將軍俄卒於官年七, WYG: ''}
