  - {type: variant, offset: 55, length: 215, content: 光化末仁恭遣其子守文逐浮陽節度使盧彥威據其城升在禮為軍使以佐守文及守文死事其子延祚為守光所害守光子繼威復為部將張萬進所殺在禮遂事萬進萬進奔梁在禮乃與滄州留後毛璋歸太原同光末為效節指揮使屯於貝州會軍士皇甫暉等作亂推指揮使楊晸為帥按歐陽史作楊仁晟晸不從為衆所害攜晸首以脅在禮在禮知其不可拒遂從之以四年二月六日引衆入鄴在禮自稱留後案宋史張錫傳趙在禮舉兵于鄴瀕河諸州多搆亂錫權知棣州事即出省錢賞軍皆大悅一郡獨全棣人賴之舊五代史考異唐莊宗遣, WYG: ''}
