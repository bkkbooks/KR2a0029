  - {type: variant, offset: 495, length: 374, content: 授宋州節度使加檢校太尉同平章事高祖登極移鎮鄆州加檢校太師兼侍中封衞國公天福六年七月授許州節度使八年四月移鎮徐州進封楚國公開運元年以契丹為患少帝議北征八月朔降制命一十五將以在禮為北面行營馬步都虞候十一月改行營副都統都虞候如故受詔屯澶州再除兗州節度使依前副都統三年正月授晉昌軍節度使時少帝為其子延煦娶在禮女為妻禮會之日其儀甚盛京師以為榮觀五月進封秦國公累食邑至一萬三千戶實封一千五百戶在禮歷十餘鎮善治生殖貨積財鉅萬兩京及所蒞藩鎮皆邸店羅列在宋州日值天下飛蝗為害在禮使比戶張幡幟鳴鼙鼓蝗皆越境而去人亦服其智焉凡聚斂所得唯以奉權豪崇釋氏而已及契丹入汴自鎮赴闕時契丹首領奚王拽剌等在洛下在禮望塵致敬首領等倨受其禮加之凌辱邀索貨財在禮不勝其憤行至鄭州泊於逆旅聞同州劉繼勳為契丹所鎖大驚丁未歲正月二十五日夜以衣帶就馬櫪自絞而卒年六十六案歐陽史作六十二漢高祖即位贈, WYG: 拜}
