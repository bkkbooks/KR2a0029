  - {type: variant, offset: 1070, length: 432, content: 左僕射以全節之貴累贈太師全節少從軍旅同光末為捉生指揮使趙在禮之據魏州也為鄴都馬步軍都指揮使唐明宗即位授檢校司空歷博單二州刺史天成三年賜竭忠建策興復功臣移刺郢州長興初就加檢校司徒在郡有政聲俄授河西節度使時明宗命高祖伐蜀師次岐山全節赴任及之具軍容謁於轅門高祖以地理隔越乃奏還焉移沂州刺史清泰初為金州防禦使案歐陽史作明宗時為金州防禦使與薛史先後互異舊五代史考異會蜀軍攻其城州兵纔及千人案歐陽史作州兵纔數百舊五代史考異兵馬都監陳隱懼託以他事出城領二百人順流而逸賊既盛人情憂沮全節悉家財以給士復出奇拒戰以死繼之賊退朝廷嘉其功詔赴闕將議賞典時劉延朗為樞密副使邀其厚賄全節無以賂之謂全節曰絳州闕人請事行計全節不樂告其同輩由是衆口諠然以為不當皇子重美為河南尹聞而奏焉清泰帝召全節謂曰滄州乏帥欲命卿制置翼日授橫海軍兩使留後高祖即位加檢校太保正授旌節天福五年授檢校太傅移鎮安州時李金全據州叛引淮軍為援因命全節將兵討平之以功加檢校太尉改昭義軍節度澤潞遼沁等州觀察處置等使六年秋移鎮邢州加, WYG: ''}
