  - {type: variant, offset: 2399, length: 376, content: 以為左驍衞上將軍筠前為京兆尹奉詔殺偽蜀主王衍衍之妓樂寶貨悉私藏於家及罷歸之後第宅宏敞花竹深邃聲樂飲饍恣其所欲十年之內人謂地仙天福二年上表乞歸長安俄而洛下張從賓之亂筠獨免其難人咸謂筠有五福之具美焉是歲卒於家贈太子太師案歐陽史作贈少師弟籛永樂大典卷六千三百五十籛字慕彭少嗜酒無節為鄉里所鄙唐天復中兄筠為大梁四鎮客將籛自海州省兄兄薦於兗州連帥王瓚用為裨校籛性桀黠善事人累遷軍職後唐莊宗都洛筠鎮長安自衙內指揮使授檢校司空右千牛衞將軍同正領饒州刺史西京管內三白渠營田制置使同光末筠隨魏王繼岌伐蜀奏籛權知西京留守事蜀平王衍挈族入朝至秦川驛莊宗遣中使向延嗣乘驛騎盡戮王衍之族所有奇貨盡歸於延嗣俄聞莊宗遇內難繼岌軍次興平籛乃斷咸陽浮橋繼岌浮渡至渭南死之一行金寶妓樂籛悉獲之俄而明宗使人誅延嗣延嗣暗遁案九國志明宗即位忿閹豎輩怙勢擅權先敕使四方及此遁不出者皆擒戮之死者殆盡, WYG: 壬辰}
