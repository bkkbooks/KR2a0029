  - {type: variant, offset: 1776, length: 305, content: 恆州奏括境內民家粟時軍吏引重威例堅請行之全節曰邊民遇蝗旱而家食方困官司復擾之則不堪其命矣我為廉察安忍效尤百姓稱其德先是全節自上黨攜歌妓一人之中山館於外舍有人以讒言中之全節害之及詔除恆陽遇疾數見其妓厭之復來妓曰我已得請要公俱行全節具告家人數日而卒子令威歷隰陳懷三州刺史卒永樂大典卷一萬八千一百三十張筠海州人也父傳古世為郡之大商唐乾符末屬江淮俶擾遂徙家彭門時彭門連帥時溥為東南面招討使據有數郡之地擢筠為偏將累有軍功奏授宿州刺史後溥與梁祖不協梁人進攻宿州下之獲筠以歸梁方圖霸業以筠言貌辨秀命為四鎮客將久之轉長直軍使梁革唐命遷右龍武統軍歷客省使宣徽使出為復商二州刺史復為宣徽使梁室割相衞為昭德軍案梁割相澶衞三州為昭德軍, WYG: 癸丑朔}
