  - {type: variant, offset: 4753, length: 2564, content: 贈太子太師永樂大典卷一萬八千一百三十李承約字德儉薊州人也曾祖瓊薊州別駕贈工部尚書祖安仁檀州刺史贈太子太保父君操平州刺史贈太子少師承約性剛健篤實少習武事弱冠為幽州牙門校遷山後八軍巡檢使屬劉守光囚殺父兄名儒宿將經事父兄者多無辜被戮自以握兵在外心不自安時屬唐武皇召募英豪方開霸業乃以所部二千歸於幷州即補匡霸都指揮使檢校右僕射兼領貝州刺史從夾寨及與梁人戰於臨清有功再遷洺汾二州莊宗即位授檢校司空慈州刺史為治平直移授潁州團練使天成中以邠州節度使毛璋將圖不軌乃命為涇州節度副使且承密旨往偵之既至以善言諭之璋乃受代明宗賞其能加檢校太保拜黔南節度使數年之間巴邛蠻蜑不敢犯境外勸農桑內興學校凶邪盡去民皆感之故父老數輩重趼詣闕言其政化又聽留周歲徵為左衞上將軍自左龍武統軍加特進檢校太傅充昭義軍節度使賜推忠奉節翊戴功臣歲餘歸朝復為左龍武統軍高祖御宇之二年授左驍衞上將軍進封開國公累上表請老尋以病卒時年七十五贈太子太師永樂大典卷二萬四百二十陸思鐸澶州臨黃人父再端贈光祿卿思鐸有武幹梁太祖領四鎮隸於麾下及即位授廣武都指揮使歷突陣拱辰軍使積前後戰勳累官至檢校司徒拱辰左廂都指揮使遙領恩州刺史初梁軍與莊宗對壘於河上思鐸以善射日預其戰嘗於箭笴之上自鏤其姓名一日射中莊宗之馬鞍莊宗拔箭視之覩思鐸姓名因而記之及莊宗平梁思鐸隨衆來降莊宗出箭以視之思鐸伏地待罪莊宗慰而釋之尋授龍武右廂都指揮使加檢校太保天成中為深州刺史改雄捷右廂馬軍都指揮使會南伐荊門思鐸亦預其行時高季興以舟兵拒王師思鐸每發矢中敵則洞胸達掖由是賊鋒稍挫不敢輕進諸軍咸壯之高祖革命拜陳州刺史秩滿歷左神武羽林二統軍出為蔡州刺史遇代歸朝天福八年以疾卒時年五十四思鐸典陳郡日甚有惠政常戒諸子曰我死則藏骨於宛丘使我棲魂於所治之地及卒乃葬於陳從其志也永樂大典卷一萬八千一百三十一安元信朔州馬邑人也少善騎射後唐莊宗為晉王時元信詣軍門求自效尋隸明宗麾下累從明宗征討有功明宗即立擢為捧聖軍使加檢校兵部尚書清泰三年遷雄義都指揮使受詔屯於代州太守張朗遇之甚厚元信亦以兄事之是歲五月高祖建義於太原俄聞契丹有約赴難元信入說朗曰張敬達雖圍太原而兵尚未合代郡當鴈門之衝敵至其何以禦僕觀石令公素長者舉必成事若使人道意歸款俟其兩端亦求全之上策也朗不納元信悔以誠言之反相猜忌尋聞安重榮安審信相次以騎兵赴太原元信遂率部曲以歸高祖案通鑑云元信謀殺朗不克帥其衆奔審信審信遂帥麾下數百騎與元信掠百井奔晉陽舊五代史考異高祖見之喜謂元信曰爾覩何利害背強歸弱元信曰某非知星識氣唯以人事斷之夫帝王者出語行令示人以信嘗聞主上許令公河東一生今遽改之是自欺也且令公國之密親親尚不能保肯保天下之心乎以斯而言見其亡也何得為強也高祖知其誠因開懷納之委以戎事高祖即位之元年授耀州團練使加檢校太保四年入為右神武統軍其年八月復出牧洺州少帝嗣位尋遷宿州九年罷任來朝開運初授復州防禦使三年卒於任年六十三贈太傅永樂大典卷一萬八千一百三十一張朗徐州蕭縣人父楚贈工部尚書朗年十八善射膂力過人鄉里敬憚之梁祖聞其名就補蕭縣鎮使充吾縣都案吾縣二字疑有舛誤遊奕使時朗年纔二十三歲餘補宣武軍內衙都將歷洺州步軍曹州開武汴州十內衙鄆州都指揮使梁末從招討使段凝襲衞州下之遂授衞州刺史事梁僅三十年凡有征討無不預之同光三年從魏王繼岌伐蜀為先鋒橋道使明宗朝歷興忠登三州刺史清泰初以契丹犯邊補西北面行營步軍都指揮使從高祖屯軍於代北俄兼代州刺史又改行營諸軍馬步都虞候高祖建義於太原遣使以書諭之朗曰為人臣而有二心可乎乃斬其使案通鑑云帝以晉安已降遣使諭諸州代州刺史張朗斬其使蓋晉祖初起安元信勸朗歸順不從至是復斬其使也舊五代史考異洎高祖入洛領全師朝覲授貝州防禦使在任數載天福五年除左羽林統軍六年授光祿大夫檢校太傅慶州刺史在官二年卒年七十四永樂大典卷六千三百五十李德珫應州金城人祖晟父宗元皆為邊將德珫少善騎射事後唐武皇為偏校及從莊宗戰潞州柏鄉德勝渡繼有軍功累加檢校尚書左僕射遙食郡俸天成中檢校司空領蔚州刺史長興元年授雄武軍節度秦成階觀察處置等使加檢校司徒二年六月移鎮定州充北面副招討使高祖即位改鎮涇原及受代歸闕會高祖幸鄴授東京留守加同平章事少帝嗣位移廣晉尹加檢校太師開運中再領涇州以病卒於鎮德珫幼與明宗俱事武皇故後之諸將多兄事之時謂之李七哥所治之地雖無殊政然以寬恕及物家無濫積亦武將之廉者永樂大典卷二萬四百二十田武字德偉大名元城人父簡累贈右僕射武少有拳勇初事莊宗為小校歷遷勝節指揮使明宗登極轉帳前都指揮使領澶州刺史天成二年改左羽林都指揮使遙領宜州充襄州都巡檢使三年自汴州馬步軍都指揮使授曹州刺史長興初遷齊州防禦使又移洺州清泰中歷成隴二州充西面行軍副部署天福初授金州防禦使及金州建節鉞武丁母憂乃起復為節度使開運元年移鎮滄州兼北面行營右廂都指揮使二年授寧江軍節度使充侍衞步軍都指揮使歲內改昭義軍節度澤潞等州管內觀察處置等使潞州大都督府長史檢校太傅封鴈門郡開國公未赴任以疾卒武出身戎行性鯁正御軍治民咸盡其善及卒朝廷惜之詔贈太尉輟視朝一日子仁朗案宋史云仁朗以父任西頭供奉官舊五代史考異仁遇並歷內職永樂大典卷四千八百六李承福字德華漢陽人少寒賤事元行欽掌皂棧之役後為高祖家臣高祖登極歷皇城武德宣徽使左千牛將軍出為澶州刺史遷齊州防禦使檢校太保承福性鄙狹無器局好察人微事多所詆訐雖小過不能恕工商之業輿隸之情官吏之幸皆善知之然自任所見無所準的故人多薄之少帝嗣位授同州節度使尋卒於鎮少帝以高祖佐命之臣聞之嗟歎賻物加等輟視朝一日詔贈太傅永樂大典卷一萬三百八十九相里金字奉金案相里金墓碑作字國寶當得其實歐陽史雜傳多襲薛史原文與碑異幷州人也性勇悍果敢能折節下士唐景福初武皇始置五院兵金首預其選從莊宗攻下夾寨得補為小校後與梁師戰於柏鄉及胡柳陂以功授黃甲指揮使同光中統帳前軍拔中都賜忠勇拱衞功臣檢校刑部尚書二年自羽林都虞候出為忻州刺史案歐陽史作沂州凡部曲私屬皆不令干預民事但優其贍給使分掌家事而已故郡民安之大有聲績應順元年為隴州防禦使會唐末帝起兵於鳳翔傳檄於鄰道諸侯無應者唯金遣判官薛文遇往來計事末帝深德之及即位擢為陝州節度使加檢校太保清泰三年夏高祖建義於太原唐末帝發兵來攻以金為太原四面步軍都指揮使高祖即位移鎮晉州及受代歸闕累為諸衞上將軍加開府儀同三司官至檢校太尉爵列開國公案碑文云封西河郡開國侯薛史作開國公未知孰是歐陽史諸臣傳官爵多闕略無可考, WYG: 攷}
