  - {type: variant, offset: 1630, length: 508, content: 考異以河陽節度使侍衞馬軍都指揮使張彥琪為太原四面馬步軍都指揮使以邢州節度使安審琦為太原四面馬軍都指揮使以陝州節度使相里金為太原四面步軍都指揮使以右監門上將軍武廷翰為壕寨使丙辰以定州節度使楊光遠為太原四面兵馬副部署兼馬步都虞候尋改為太原四面副招討使都虞候如故以前彰武軍節度使高行周為太原四面招撫兼排陣使初帝疑河東有異志與近臣語及其事帝曰石郎與朕近親在不疑之地流言毀譽朕心自明萬一失歡如何和解左右皆不對翌日欲移石敬瑭於鄆州房暠等堅言不可司天監趙延義亦言星辰失度尤宜安靜由是稍緩其事會薛文遇獨宿於禁中帝召之諭以太原之事文遇奏曰臣聞作舍於道三年不成國家利害斷自宸旨以臣料之石敬瑭除亦叛不除亦叛不如先事圖之帝喜曰聞卿此言豁吾憤氣先是有人言國家明年合得一賢佐主謀平定天下帝意亦疑賢佐者屬在文遇即令手書除目子夜下學士院草制翌日宣制之際兩班失色居六七日敬瑭上章云明宗社稷陛下纂承未契輿情宜推令辟許王先朝血緒養德皇闈儻循當璧之言免負薴岌部帝覽奏不悅手攘抵地召馬裔孫草詔報曰父有社稷傳之於子君有禍難倚之於親卿於鄂王故非疎遠往歲衞州之事天下皆知今朝許王之言人誰肯信英賢立事安肯如斯云戊申張敬達奏西北面先鋒都指揮使安審信率雄義左第二指揮二百, WYG: 巻}
