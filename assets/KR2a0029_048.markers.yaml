  - {type: variant, offset: 162, length: 1314, content: 前司農卿王彥鎔為太僕卿二月戊辰吐渾寧朔奉化兩府留後李可久加檢校司徒可久本姓白氏前朝賜姓庚午監修國史姚顗史官張昭遠李祥吳承範等修撰明宗實錄三十卷上之案五代會要同修撰官中書舍人張昭遠李祥直館左拾遺吳承範右拾遺楊昭儉等各頒賚有差舊五代史考異以大理卿竇維為光祿卿以前許州節度判官張登為大理卿丁丑以太常卿李鏻為兵部尚書以兵部尚書梁文矩為太常卿庚辰以前鄜州節度使皇甫立為潞州節度使辛巳以前均州刺史仇暉為左威衞上將軍保順軍節度使鮑君褔加檢校太尉保順原本作任順君褔原本作居褔今俱從十國春秋改正影庫本粘籤同平章事丁亥以昭義節度使安元信卒廢朝三月庚子中書門下奏準閤門分析內外官辭見謝規例諸州判官軍將進奉到闕舊例門見門辭今後只令朝見依舊門辭新除諸道判官書記以下無例中謝並放謝放辭得替到京無例見今後兩使判官許中謝赴任即門辭其書記以下並依舊例朝臣文五品武四品以上舊例中謝其以下無例對謝今請依天成四年正月敕凡升朝官並許中謝諸道都押衙馬步都指揮虞候鎮將諸色場院無例謝辭並進牓子放謝放辭得替到闕無例入見在京鹽麴稅官兩官巡即許中謝新除令錄並中謝次日門辭兼有口敕誡勵文武兩班所差弔祭使及告廟祠祭只正衙辭不赴內殿諸道進奏官到闕見得假進牓子門辭從之辛丑權知褔建節度使王昶奏節度使王延鈞以去年十月十四日卒是時延鈞父子雖僭竊於閩嶺猶稱藩於朝廷故有是奏甲辰以右神武統軍楊漢章為彰武軍節度使丙午以翰林學士禮部侍郎馬裔孫為中書侍郎同平章事丁巳以端明殿學士呂琦為御史中丞案通鑑呂琦與李崧建和親契丹之策為薛文遇所沮改為御史中丞蓋疎之也舊五代史考異戊午御史中丞盧損責授右贊善大夫知雜侍御史韋稅責授太僕寺丞侍御史魏遜責授太府寺主簿侍御史王岳責授司農寺主簿初延州保安鎮將白文審聞兵興岐下專殺郡人趙思謙等十餘人已伏其罪復下臺追繫推鞫未竟會去年五月十二日德音除十惡五逆放火殺人外並放盧損輕易即破械釋文審帝大怒收文審誅之臺司稱奉德音釋放不得追領祗證中書詰云德音言不在追窮枝蔓無不得追領祗證六字擅改敕語大理斷以失出罪人論故有是命是月有蛇鼠鬬於師子門外鼠生而蛇死夏四月己未朔以左衞上將軍王景戡為左神武統軍以右領軍上將軍李頃為華清宮使領軍原本作衡軍今從薛史列傳改正影庫本粘籤戊辰以太子詹事盧演為工部尚書致仕辛未以中書舍人史館修撰張昭遠為禮部侍郎以前滄州節度使李金全為右領軍上將軍是月有熊入京城搏人五月辛卯以河東節度使兼大同彰國振武威塞等軍蕃漢馬步總管檢校太師兼中書令駙馬都尉石敬瑭為鄆州節度使進封趙國公案歐陽史廢帝紀于五月以前即書石敬瑭反與晉本紀自相矛盾據薛史五月辛卯始移敬瑭于鄆州戊戌始聞拒命也五代春秋通鑑俱與薛史同舊五代史考異以河陽節度使充侍衞馬步軍都指揮使宋審虔為河東節度使甲午以前晉州節度使大同彰國振武威塞等軍蕃漢副總管張敬達充西北面蕃漢馬步都部署落副總管乙未詔諸州兩使判官畿赤令有闕取省郎遺補丞博少列宮僚選擇擢任案以上疑有脫誤以忠正軍節度使侍衞步軍都指揮使張彥琪為河陽節度使充侍衞馬軍都指揮使以彰聖都指揮使饒州刺史符彥饒為忠正軍節度使充侍衞步軍都指揮使丙申以雍王重美與汴州節度使范延光結婚詔兗王從溫主之丁酉以國子祭酒馬縞卒廢朝戊戌昭義奏昭義原本作達義今從通鑑增入影庫本粘籤河東節度使石敬瑭叛, WYG: 身免}
