  - {type: variant, offset: 2552, length: 3562, content: 指揮使邢立為德州刺史以捧聖第五指揮使康褔進為鄚州刺史案康褔進疑當作康褔據冊府元龜引薛史亦作康褔進今姑存其舊舊五代史考異甲戌以汴州節度使范延光為天雄軍四面招討使知行府事丙子以西京留守李周為天雄軍四面副招討使兼兵馬都監詔河東將佐節度判官趙瑩以下十四人並籍沒家產秋七月戊子范延光奏領軍至鄴都攻城己丑誅右衞上將軍石重英皇城副使石重裔皆敬瑭之子也案重英通鑑作重殷又通鑑考異引廢帝實錄作姪男尚食使重乂供奉官重英並與薛史不同舊五代史考異時重英等匿於民家井中獲而誅之幷族所匿之家奚首領達剌干遣通事介老奏奚王李素姑謀叛入契丹已處斬訖達剌干權知本部落事辛卯沂州奏誅都指揮使石敬德幷族其家敬瑭之弟也乙未以前彰武軍節度使高行周為潞州節度使充太原四面招撫排陣使招撫排陣原本脫招字今據通鑑增入影庫本粘籤以潞州節度使皇甫立為華州節度使丁酉雲州節度使沙彥珣奏此月二日夜步軍指揮使桑遷作亂以兵圍子城彥珣突圍出城就西山據雷公口三日招集兵士入城誅亂軍軍城如故辛丑以將作監丞介國公宇文頡為汝州襄城令乙巳以衞尉卿聶延祚為太子賓客戊申范延光奏此月二十一日收復鄴都羣臣稱賀己酉以禮部侍郎張昭遠為御史中丞以御史中丞呂琦為禮部侍郎充端明殿學士庚戌中書奏劉延皓賓佐等帥臣既已削奪其行軍司馬李延筠副使邊仁嗣以下望命放歸田里望命原本作望名今從冊府元龜改正影庫本粘籤奏入帝大怒詔大理曰帥臣失守已行削奪其僚佐合當何罪既而竟依中書所奏壬子詔范延光誅張令昭部下五指揮及忠銳忠肅兩指揮繼范延光奏追兵遣襲張令昭部下敗兵至邢州沙河斬首三百級幷獻張令昭邢立李貴等首級又奏獲張令昭同惡捧聖指揮使米全以下諸指揮使都頭凡十三人幷磔於府門癸丑左衞上將軍仇暉卒洺州奏擒獲魏府作亂捧聖指揮使馬彥柔以下五十八人邢磁州相次擒獲亂兵並送京師彰聖指揮使張萬迪以部下五百騎叛入太原詔誅家屬於懷州本營八月戊午契丹遣使梅里入朝己未以汴州節度使范延光為天雄軍節度使守太傅兼中書令以西京留守李周為汴州節度使檢校太尉同平章事癸亥應州奏契丹三千騎迫城詔端明殿學士呂琦往河東忻代諸屯戍所犒軍以左龍武大將軍袁為右監門上將軍以振武軍節度使安叔千充代北兵馬都部署己巳雲州沙彥珣奏供奉官李讓勳送夏衣到州縱酒凌轢軍都行劫殺兵馬都監張思慇都指揮使黨行進其李讓勳已處斬訖張敬達奏造五龍橋攻太原城次戊寅以鎮州節度使董溫琪充東北面副招討使己卯洺州獻野繭二十斤辛巳張敬達奏賊城內出騎軍三十隊步卒三千人衝長連城高行周襲殺入壕溺死者大半擒賊將安小喜以下百餘人甲馬一百八十匹九月甲辰張敬達奏此月十五日與契丹戰於太原城下案張敬達與契丹戰于太原薛史晉紀作辛丑蓋辛丑日戰越四日甲辰乃奏到也通鑑亦作辛丑遼史作庚午與薛史異歐陽史作甲辰戰于太原殊誤舊五代史考異王師敗績時契丹主自率部族來援太原高行周符彥卿率左右廂騎軍出鬬蕃軍引退巳時後蕃軍復成列張敬達楊光遠安審琦等陣於賊城西北倚山橫陣諸將奮擊蕃軍屢却至晡我騎軍將移陣蕃軍如山而進王師大敗投兵仗相藉而死者山積是夕收合餘衆保於晉祠南晉安寨晉祠原本作普祠今從遼史改正影庫本粘籤蕃軍塹而圍之自是音聞阻絕朝廷大恐案遼史太宗紀云己亥次太原庚子遣使諭敬瑭曰朕興師遠來當即與卿破賊會唐將高行周符彥卿以兵來拒遂勒兵陣於太原及戰佯為之却唐將張敬達楊光遠又陣于西未成列以兵薄之而行周彥卿為伏兵所斷首尾不相救敬達光遠大敗棄仗如山斬首數萬敬達走保晉安寨與薛史大略相同高模翰傳云九月徵兵出太原模翰與敬達軍接戰敗之太原圍解翌日復戰又敗之張敬達鼠竄晉安寨通鑑及契丹國志皆不言翌日復戰遼史紀傳互異疑傳文誤也孔本是日遣使侍衞步軍都指揮使符彥饒率兵屯河陽詔范延光率兵由青山路趨榆次案遼史避太宗諱作范延廣舊五代史考異詔幽州趙德鈞由飛狐路出敵軍後耀州防禦使潘環合防戍軍出慈隰以援張敬達以前絳州刺史韓彥惲為太子賓客契丹主移帳於柳林乙巳詔取二十二日幸北面軍前戊申帝發京師路經徽陵帝親行謁奠夕次河陽召羣臣議進取盧文紀勸帝駐河橋庚戌樞密使趙延壽先赴潞州辛亥幸懷州召吏部侍郎龍敏訪以機事敏勸帝立東丹王贊華為契丹主以兵援送入蕃則契丹主有後顧之患不能久駐漢地矣帝深以為然竟不行其謀案遼史義宗傳云倍雖在異國常思其親問安之使不絕後明宗養子從珂弒其君自立倍密報太宗曰從珂弒君盍討之是東丹王實啟兵端唐君臣或知其陰謀故龍敏之說不行舊五代史考異帝自是酣飲悲歌形神慘沮臣下勸其親征則曰卿輩勿說石郎使我心膽墮地其怯憊也如此冬十月丁巳夜彗星出虛危長尺餘壬戌詔天下括馬又詔民十戶出兵一人器甲自備案契丹國志云唐發民為兵每七戶出征夫一人自備鎧仗謂之義軍凡得馬二千餘匹征夫五千人民間大擾與薛史互有詳略今附錄于此戊辰代州刺史張朗超授檢校太保以其屢殺敵衆故以是命奬之癸酉幽州趙德鈞以本軍二千騎與鎮州董溫琪由吳兒谷趨潞州十一月戊子以趙德鈞為諸道行營都統以趙延壽為河東道南面行營招討使以劉延朗副之庚寅以范延光為河東道東南面行營招討使以李周副之帝以呂琦嘗佐幽州幕乃命齎都統官告以賜德鈞兼犒軍士琦至從容宣帝委任之意德鈞曰既以兵相委焉敢惜死德鈞志在倂范延光軍奏請與延光會合帝以詔諭延光延光不從丁酉延州上言節度使楊漢章為部衆所殺以前坊州刺史劉景巖為延州留後庚子趙德鈞奏大軍至團柏谷前鋒殺蕃軍五百騎范延光奏軍至榆次蕃軍退入河東川界潘環奏隰州逐退蕃軍壬寅趙德鈞奏軍出谷口蕃軍漸退契丹主見駐柳林砦案遼史初圍晉安分遣精兵守其要害以絕援兵之路而李從珂遣趙延壽以兵二萬屯團柏谷范延廣以兵二萬屯遼州幽州趙德鈞以所部兵萬餘由上黨趨延壽軍合勢進擊知此有備皆逗遛不進通鑑云契丹主雖軍柳林其輜重老弱皆在虎北口每日冥結束以備倉卒遁逃所契丹軍勢彼此互異孔本時德鈞累奏乞授延壽鎮州節制帝怒曰德鈞父子堅要鎮州苟能逐退蕃戎要代予位亦甘心矣若翫寇要君但恐犬兔俱斃德鈞聞之不悅閏月丙辰日南至羣臣稱賀於行宮帝曰晉安寨內將士應思家國矣因泣下久之丁巳以岢嵐軍為勝州辛酉以右龍武統軍李從昶為左龍武統軍以前邠州節度使楊思權為右龍武統軍壬戌丹州刺史康承詢停任配流鄧州時承詢奉詔率義軍赴延州義軍亂承詢奔鄜州故有是責甲子太原行營副招討使楊光遠殺招討使張敬達於晉安寨以兵降契丹案歐陽史通鑑俱作閏十一月甲子五代春秋作十一月誤舊五代史考異時契丹圍寨自十一月以後芻糧乏絕軍士毀居屋茅淘馬糞削松柹以供飼松柹原本作松肺今據歐陽史改正影庫本粘籤馬尾鬣相食俱盡楊光遠謂敬達曰少時人馬俱盡不如奮命血戰十得三四猶勝坐受其弊敬達曰更少待之一日光遠伺敬達無備遂殺之與諸將同降契丹時馬猶有五千匹戎王並以漢軍與石敬瑭其馬及甲仗即齎驅出塞案遼史云所降軍士及馬五千匹以賜晉帝與薛史異通鑑從薛史舊五代史考異丁卯戎王立石敬瑭為大晉皇帝約為父子之國改元為天褔案歐陽史作十一月丁酉契丹立晉通鑑考異引廢帝實錄作閏月丁卯薛史蓋據實錄也通鑑從歐陽史舊五代史考異案契丹立晉是書晉高祖紀作十一月丁酉此紀作閏月丁卯前後互異據通鑑考異引廢帝實錄亦作閏月丁卯蓋契丹立晉在十一月丁酉唐人至閏十一月丁卯始奏聞也實錄誤以奏聞之日為立晉之日是書唐紀亦仍其誤殿本戎王與晉高祖南行趙德鈞父子與諸將自團柏谷南奔王師為蕃騎所蹙投戈棄甲自相騰踐擠於巖谷者不可勝紀案通鑑丁卯至團柏與唐兵戰趙德鈞趙延壽先遁符彥饒張彥琦劉延朗劉在明繼之蓋繫日以薛史為據遼史作庚申聞德鈞等援兵將遁詔夜發兵追擊與薛史異孔本己巳帝聞晉安寨為敵所陷詔移幸河陽時議以魏府軍尚全戎王必憚山東未敢南下車駕可幸鄴城帝以李崧與范延光相善召入謀之薛文遇不知而繼至帝變色崧躡文遇足乃出帝曰我見此物肉顫適擬抽刀刺之崧曰文遇小人致誤大事刺之益醜益醜原本作益魏今從通鑑改正影庫本粘籤崧因請帝歸京壬申車駕至河陽甲戍晉高祖與戎王至潞州戎王遣蕃將大相溫率五千騎送晉高祖南行丁丑車駕至自河陽時左右勸帝固守河陽居數日符彥饒張彥琪至奏帝不可城守是日晚至東上門小黃門鳴鞘於路索然無聲己卯帝遣馬軍都指揮使宋審虔率千餘騎至白馬坡案胡三省注通鑑云白司馬阪在洛陽北史遺司字孔本言踏陣地時諸將謂審虔曰何地不堪交戰誰人肯立於此審虔乃請帝還宮庚辰晉高祖至河陽辛巳辰時帝舉族與皇太后曹氏自燔於玄武樓晉高祖入洛得帝燼骨於火中來年三月詔葬於徽陵之封中帝在位共二年年五十三永樂大典卷七千一百七十四五代史闕文晉高祖引契丹圍晉安寨降楊光遠清泰帝至自覃懷京師父老迎帝於上東門外帝垂泣不止父老奏曰臣等伏聞前唐時中國有難帝王多幸蜀以圖進取陛下何不且入西川帝曰本朝兩川節度使皆用文臣所以玄宗僖宗避寇幸蜀今孟氏已稱尊矣吾何歸乎因慟哭入內舉族自焚史臣曰末帝負神武之才有人君之量由尋戈而踐阼慚德應深及當宁以居尊政經未失屬天命不祐人謀匪臧坐俟焚如良可悲矣稽夫衽金甲於河壖之際斧眺樓於梁壘之時出沒如神何其勇也及乎駐革輅於覃懷之日絕羽書於汾晉之辰涕淚霑襟何其怯也是知時之來也雕虎可以生風運之去也應龍不免為醢則項籍悲歌於帳下信不虛矣永樂大典卷七千一百七十四, WYG: 攷證}
  - {type: variant, offset: 2552, length: 3562, content: 指揮使邢立為德州刺史以捧聖第五指揮使康褔進為鄚州刺史案康褔進疑當作康褔據冊府元龜引薛史亦作康褔進今姑存其舊舊五代史考異甲戌以汴州節度使范延光為天雄軍四面招討使知行府事丙子以西京留守李周為天雄軍四面副招討使兼兵馬都監詔河東將佐節度判官趙瑩以下十四人並籍沒家產秋七月戊子范延光奏領軍至鄴都攻城己丑誅右衞上將軍石重英皇城副使石重裔皆敬瑭之子也案重英通鑑作重殷又通鑑考異引廢帝實錄作姪男尚食使重乂供奉官重英並與薛史不同舊五代史考異時重英等匿於民家井中獲而誅之幷族所匿之家奚首領達剌干遣通事介老奏奚王李素姑謀叛入契丹已處斬訖達剌干權知本部落事辛卯沂州奏誅都指揮使石敬德幷族其家敬瑭之弟也乙未以前彰武軍節度使高行周為潞州節度使充太原四面招撫排陣使招撫排陣原本脫招字今據通鑑增入影庫本粘籤以潞州節度使皇甫立為華州節度使丁酉雲州節度使沙彥珣奏此月二日夜步軍指揮使桑遷作亂以兵圍子城彥珣突圍出城就西山據雷公口三日招集兵士入城誅亂軍軍城如故辛丑以將作監丞介國公宇文頡為汝州襄城令乙巳以衞尉卿聶延祚為太子賓客戊申范延光奏此月二十一日收復鄴都羣臣稱賀己酉以禮部侍郎張昭遠為御史中丞以御史中丞呂琦為禮部侍郎充端明殿學士庚戌中書奏劉延皓賓佐等帥臣既已削奪其行軍司馬李延筠副使邊仁嗣以下望命放歸田里望命原本作望名今從冊府元龜改正影庫本粘籤奏入帝大怒詔大理曰帥臣失守已行削奪其僚佐合當何罪既而竟依中書所奏壬子詔范延光誅張令昭部下五指揮及忠銳忠肅兩指揮繼范延光奏追兵遣襲張令昭部下敗兵至邢州沙河斬首三百級幷獻張令昭邢立李貴等首級又奏獲張令昭同惡捧聖指揮使米全以下諸指揮使都頭凡十三人幷磔於府門癸丑左衞上將軍仇暉卒洺州奏擒獲魏府作亂捧聖指揮使馬彥柔以下五十八人邢磁州相次擒獲亂兵並送京師彰聖指揮使張萬迪以部下五百騎叛入太原詔誅家屬於懷州本營八月戊午契丹遣使梅里入朝己未以汴州節度使范延光為天雄軍節度使守太傅兼中書令以西京留守李周為汴州節度使檢校太尉同平章事癸亥應州奏契丹三千騎迫城詔端明殿學士呂琦往河東忻代諸屯戍所犒軍以左龍武大將軍袁為右監門上將軍以振武軍節度使安叔千充代北兵馬都部署己巳雲州沙彥珣奏供奉官李讓勳送夏衣到州縱酒凌轢軍都行劫殺兵馬都監張思慇都指揮使黨行進其李讓勳已處斬訖張敬達奏造五龍橋攻太原城次戊寅以鎮州節度使董溫琪充東北面副招討使己卯洺州獻野繭二十斤辛巳張敬達奏賊城內出騎軍三十隊步卒三千人衝長連城高行周襲殺入壕溺死者大半擒賊將安小喜以下百餘人甲馬一百八十匹九月甲辰張敬達奏此月十五日與契丹戰於太原城下案張敬達與契丹戰于太原薛史晉紀作辛丑蓋辛丑日戰越四日甲辰乃奏到也通鑑亦作辛丑遼史作庚午與薛史異歐陽史作甲辰戰于太原殊誤舊五代史考異王師敗績時契丹主自率部族來援太原高行周符彥卿率左右廂騎軍出鬬蕃軍引退巳時後蕃軍復成列張敬達楊光遠安審琦等陣於賊城西北倚山橫陣諸將奮擊蕃軍屢却至晡我騎軍將移陣蕃軍如山而進王師大敗投兵仗相藉而死者山積是夕收合餘衆保於晉祠南晉安寨晉祠原本作普祠今從遼史改正影庫本粘籤蕃軍塹而圍之自是音聞阻絕朝廷大恐案遼史太宗紀云己亥次太原庚子遣使諭敬瑭曰朕興師遠來當即與卿破賊會唐將高行周符彥卿以兵來拒遂勒兵陣於太原及戰佯為之却唐將張敬達楊光遠又陣于西未成列以兵薄之而行周彥卿為伏兵所斷首尾不相救敬達光遠大敗棄仗如山斬首數萬敬達走保晉安寨與薛史大略相同高模翰傳云九月徵兵出太原模翰與敬達軍接戰敗之太原圍解翌日復戰又敗之張敬達鼠竄晉安寨通鑑及契丹國志皆不言翌日復戰遼史紀傳互異疑傳文誤也孔本是日遣使侍衞步軍都指揮使符彥饒率兵屯河陽詔范延光率兵由青山路趨榆次案遼史避太宗諱作范延廣舊五代史考異詔幽州趙德鈞由飛狐路出敵軍後耀州防禦使潘環合防戍軍出慈隰以援張敬達以前絳州刺史韓彥惲為太子賓客契丹主移帳於柳林乙巳詔取二十二日幸北面軍前戊申帝發京師路經徽陵帝親行謁奠夕次河陽召羣臣議進取盧文紀勸帝駐河橋庚戌樞密使趙延壽先赴潞州辛亥幸懷州召吏部侍郎龍敏訪以機事敏勸帝立東丹王贊華為契丹主以兵援送入蕃則契丹主有後顧之患不能久駐漢地矣帝深以為然竟不行其謀案遼史義宗傳云倍雖在異國常思其親問安之使不絕後明宗養子從珂弒其君自立倍密報太宗曰從珂弒君盍討之是東丹王實啟兵端唐君臣或知其陰謀故龍敏之說不行舊五代史考異帝自是酣飲悲歌形神慘沮臣下勸其親征則曰卿輩勿說石郎使我心膽墮地其怯憊也如此冬十月丁巳夜彗星出虛危長尺餘壬戌詔天下括馬又詔民十戶出兵一人器甲自備案契丹國志云唐發民為兵每七戶出征夫一人自備鎧仗謂之義軍凡得馬二千餘匹征夫五千人民間大擾與薛史互有詳略今附錄于此戊辰代州刺史張朗超授檢校太保以其屢殺敵衆故以是命奬之癸酉幽州趙德鈞以本軍二千騎與鎮州董溫琪由吳兒谷趨潞州十一月戊子以趙德鈞為諸道行營都統以趙延壽為河東道南面行營招討使以劉延朗副之庚寅以范延光為河東道東南面行營招討使以李周副之帝以呂琦嘗佐幽州幕乃命齎都統官告以賜德鈞兼犒軍士琦至從容宣帝委任之意德鈞曰既以兵相委焉敢惜死德鈞志在倂范延光軍奏請與延光會合帝以詔諭延光延光不從丁酉延州上言節度使楊漢章為部衆所殺以前坊州刺史劉景巖為延州留後庚子趙德鈞奏大軍至團柏谷前鋒殺蕃軍五百騎范延光奏軍至榆次蕃軍退入河東川界潘環奏隰州逐退蕃軍壬寅趙德鈞奏軍出谷口蕃軍漸退契丹主見駐柳林砦案遼史初圍晉安分遣精兵守其要害以絕援兵之路而李從珂遣趙延壽以兵二萬屯團柏谷范延廣以兵二萬屯遼州幽州趙德鈞以所部兵萬餘由上黨趨延壽軍合勢進擊知此有備皆逗遛不進通鑑云契丹主雖軍柳林其輜重老弱皆在虎北口每日冥結束以備倉卒遁逃所契丹軍勢彼此互異孔本時德鈞累奏乞授延壽鎮州節制帝怒曰德鈞父子堅要鎮州苟能逐退蕃戎要代予位亦甘心矣若翫寇要君但恐犬兔俱斃德鈞聞之不悅閏月丙辰日南至羣臣稱賀於行宮帝曰晉安寨內將士應思家國矣因泣下久之丁巳以岢嵐軍為勝州辛酉以右龍武統軍李從昶為左龍武統軍以前邠州節度使楊思權為右龍武統軍壬戌丹州刺史康承詢停任配流鄧州時承詢奉詔率義軍赴延州義軍亂承詢奔鄜州故有是責甲子太原行營副招討使楊光遠殺招討使張敬達於晉安寨以兵降契丹案歐陽史通鑑俱作閏十一月甲子五代春秋作十一月誤舊五代史考異時契丹圍寨自十一月以後芻糧乏絕軍士毀居屋茅淘馬糞削松柹以供飼松柹原本作松肺今據歐陽史改正影庫本粘籤馬尾鬣相食俱盡楊光遠謂敬達曰少時人馬俱盡不如奮命血戰十得三四猶勝坐受其弊敬達曰更少待之一日光遠伺敬達無備遂殺之與諸將同降契丹時馬猶有五千匹戎王並以漢軍與石敬瑭其馬及甲仗即齎驅出塞案遼史云所降軍士及馬五千匹以賜晉帝與薛史異通鑑從薛史舊五代史考異丁卯戎王立石敬瑭為大晉皇帝約為父子之國改元為天褔案歐陽史作十一月丁酉契丹立晉通鑑考異引廢帝實錄作閏月丁卯薛史蓋據實錄也通鑑從歐陽史舊五代史考異案契丹立晉是書晉高祖紀作十一月丁酉此紀作閏月丁卯前後互異據通鑑考異引廢帝實錄亦作閏月丁卯蓋契丹立晉在十一月丁酉唐人至閏十一月丁卯始奏聞也實錄誤以奏聞之日為立晉之日是書唐紀亦仍其誤殿本戎王與晉高祖南行趙德鈞父子與諸將自團柏谷南奔王師為蕃騎所蹙投戈棄甲自相騰踐擠於巖谷者不可勝紀案通鑑丁卯至團柏與唐兵戰趙德鈞趙延壽先遁符彥饒張彥琦劉延朗劉在明繼之蓋繫日以薛史為據遼史作庚申聞德鈞等援兵將遁詔夜發兵追擊與薛史異孔本己巳帝聞晉安寨為敵所陷詔移幸河陽時議以魏府軍尚全戎王必憚山東未敢南下車駕可幸鄴城帝以李崧與范延光相善召入謀之薛文遇不知而繼至帝變色崧躡文遇足乃出帝曰我見此物肉顫適擬抽刀刺之崧曰文遇小人致誤大事刺之益醜益醜原本作益魏今從通鑑改正影庫本粘籤崧因請帝歸京壬申車駕至河陽甲戍晉高祖與戎王至潞州戎王遣蕃將大相溫率五千騎送晉高祖南行丁丑車駕至自河陽時左右勸帝固守河陽居數日符彥饒張彥琪至奏帝不可城守是日晚至東上門小黃門鳴鞘於路索然無聲己卯帝遣馬軍都指揮使宋審虔率千餘騎至白馬坡案胡三省注通鑑云白司馬阪在洛陽北史遺司字孔本言踏陣地時諸將謂審虔曰何地不堪交戰誰人肯立於此審虔乃請帝還宮庚辰晉高祖至河陽辛巳辰時帝舉族與皇太后曹氏自燔於玄武樓晉高祖入洛得帝燼骨於火中來年三月詔葬於徽陵之封中帝在位共二年年五十三永樂大典卷七千一百七十四五代史闕文晉高祖引契丹圍晉安寨降楊光遠清泰帝至自覃懷京師父老迎帝於上東門外帝垂泣不止父老奏曰臣等伏聞前唐時中國有難帝王多幸蜀以圖進取陛下何不且入西川帝曰本朝兩川節度使皆用文臣所以玄宗僖宗避寇幸蜀今孟氏已稱尊矣吾何歸乎因慟哭入內舉族自焚史臣曰末帝負神武之才有人君之量由尋戈而踐阼慚德應深及當宁以居尊政經未失屬天命不祐人謀匪臧坐俟焚如良可悲矣稽夫衽金甲於河壖之際斧眺樓於梁壘之時出沒如神何其勇也及乎駐革輅於覃懷之日絕羽書於汾晉之辰涕淚霑襟何其怯也是知時之來也雕虎可以生風運之去也應龍不免為醢則項籍悲歌於帳下信不虛矣永樂大典卷七千一百七十四, krp: 攷證}
