  - {type: variant, offset: 2483, length: 1634, content: 日冊為皇后應順元年閏正月冊為皇太后至清泰三年閏十一月隨末帝崩于後樓晉高祖使人護葬至天福五年正月二十八日追冊曰和武顯皇后宣憲皇后魏氏永樂大典卷一萬三千五百五十五案通鑑考異引唐廢帝實錄云宣憲皇后魏氏鎮州平山人中和末明宗徇地山東留戍平山得魏后又云明宗為裨將性闊達不能治生曹后亦疏于畫略生計所資惟宣憲而已五代會要云初封魯國太夫人清泰二年二月中書門下奏臣聞漢昭帝承祚御歷奉尊諡于雲陽魏明帝繼體守文思外家于甄館而皆追崇徽號祔饗廟庭克隆敬本之文式叶愛親之道臣等又覽國史竊見玄宗皇帝母曰昭成皇后竇氏代宗皇帝母曰章敬太后吳氏始嬪朱邸俄閟玄宮鴻圖既屬于明君尊號咸追于聖母伏以魯國夫人發祥沙麓貽慶河州三后最賢周母允成于天統四妃有子唐后先啟于帝基仰惟當宁之情彌軫寒泉之思久虛殷薦慮損皇猷臣等謹上尊諡曰宣憲皇太后請依昭成皇太后故事擇日備禮冊命又臣等伏聞先太后舊陵未祔先祠則都下難崇別廟既追尊諡合創閟宮按漢朝故事園寢不在王畿或就陵所便立寢祠今商量上諡後權立同廟以申告獻配祠之禮請俟他年從之據歐陽史云議建陵寢而太原石敬瑭反乃于京師河南府東立寢宮又案五代會要所載明宗時內職德妃王氏天成三年正月冊立長興二年四月進號淑妃應順元年閏正月十三日冊為太妃至周廣順元年四月追諡賢妃昭儀王氏封齊國夫人昭容葛氏封周國夫人昭媛劉氏封趙國夫人孫氏封楚國夫人御正張氏封曹國夫人司寶郭氏封魏國夫人司贊于氏封鄭國夫人尚服王氏封衞國夫人司記崔氏封蔡國夫人司膳翟氏封滕國夫人司醞吳氏封莒國夫人婕妤高氏封渤海郡夫人美人沈氏封太原郡夫人順御朱氏封吳郡夫人司飾聊氏封潁川郡夫人司衣劉氏封彭城郡夫人司藥孟氏封咸陽郡夫人梳張氏封清河郡夫人司服王氏封太原郡夫人櫛傅氏封潁川郡夫人知客張氏賜號尚書故江氏追封齊陽郡夫人以上皆長興三年九月勅其名號皆中書門下按六典內職仿而行之內人李氏封隴西縣君崔氏封清河縣君李氏封成紀縣君田氏封咸陽縣君白氏封南陽縣君並長興四年二月勅前代內職皆無封君之禮此一時之制閔帝哀皇后孔氏永樂大典卷一萬三千五百五十五案孔后傳永樂大典原闕據通鑑云孔循陰遣人結王德妃求納其女德妃請娶循女為從厚妃帝許之庚寅皇子從厚納孔循女為妃五代會要云初封魯國夫人應順元年四月為末帝所害晉天褔五年正月二十八日追諡為哀皇后末帝劉皇后應州人也天成中封為沛國夫人清泰初百官三上表請立中宮遂立為皇后后性強戾末帝甚憚之故其弟延皓自鳳翔牙校環歲之間歷樞密使出為鄴都留守皆由后內政之力也及延皓為張令昭所逐張令昭原本脫張字今據通鑑增入影庫本粘籤執政請行朝典后力制之止從罷免而已晉高祖入洛后與末帝俱就燔焉永樂大典卷一萬九千三百四史臣曰昔三代之興亡雖由於帝王亦繫於妃后故夏之興也以塗山及其亡也以妹嬉商之興也以簡狄及其亡也以妲己周之興也以文母及其亡也以褒姒觀夫貞簡之為人也雖未偕於前代亦無虧於懿範而劉后以牝雞之晨皇業斯墜則與夫三代之興亡同矣餘無進賢輔佐之德又何足以道哉永樂大典卷一萬九千三百四案五代史無外戚傳據五代會要武皇長女瓊華長公主降孟知祥同光三年十二月封第二女瑤英長公主降張延釗同光三年十二月封明宗長女永寧公主降晉高祖第十三女興平公主降趙延壽天成三年四月封至長興四年九月改封齊國公主至清泰二年三月進封燕國長公主第十四女壽安公主長興四年六月封第十五女永樂公主長興四年六月封今考會要所載亦多舛互如瓊華公主十國春秋諸書作太祖弟克讓之女會要以為武皇長女此傳聞之異辭也莊宗女義寧公主降宋廷浩廷浩仕至房州刺史晉初為汜水關使張從賓之叛戰死見東都事略及宋史又王禹偁小畜集有宋渥神道碑云母義寧公主天褔中晉祖以嘗事莊宗有舊君之禮每貴主入見聽其不拜時兵戎方熾經費不充惟公主之家賜予甚厚盡而復取亦無倦色一日晉祖從容謂貴主曰朕于主家無所愛惜但朝廷多事府庫甚虛主所知矣今輦轂之下桂玉為憂可命渥分司西京以豐就養因厚遣之且勅留使具晨昏伏臘之用至于醯醢率有備焉會要不載莊宗女是其闕略也歐陽史云延壽所尚公主已死耶律德光乃為延壽娶從益妹是為永安公主薛史趙延壽傳亦言其娶明宗小女為繼室而五代會要不載疑有闕文, WYG: ''}
