  - {type: variant, offset: 31, length: 1, content: 母, WYG: 受知于梁祖舊矣不待田頵之薦問而始被遇也時田頵在宣州甚重之頵将起兵乃陰令以箋問至太祖遇之頗厚及頵遇禍太祖以其才表之尋授翰林學士主客員外郎既而恃太祖之勢凡搢紳間已所不悦者日屈指怒數将謀盡殺之苞蓄未及泄丁重疾旬日而卒羅隱唐才子傳隠字昭諫餘杭人詩名于天下尤長于詠史然多所譏諷以故不中第大為唐宰相鄭畋李蔚所知隱雖負文稱然貎古而陋畋女幼有文性嘗覽隠詩巻諷誦不已畋疑其女有慕才之意一日隱至第鄭女垂簾而窺之自是絶不詠其詩唐廣明中因亂歸鄉里節度使錢鏐辟為從事開平初太祖以右諫議大夫徴不至魏博節度使羅紹威宻表推薦乃授給事中年八十餘卒于錢塘澗泉日記云唐光啟三年呉越王表薦為錢塘令遷著作郎辟掌書記天祐三年充判官梁開平二年授給事中三年遷祭運使是年卒葬于定山鄉全部郎中沈崧銘其墓有文集數巻行于世唐才子傳云隱所著讒書讒本淮海寓言湘南應用集甲乙集外集啟事等竝行於世五代史補羅隠在科塲恃才傲物尤為公輕所惡故六舉不第時長安有羅尊師者深于相術隱以貎陋恐為相術所棄毎與尊師接談常自大以沮之及其累遭黜落不得己始徃問焉尊師笑曰貧道知之久矣但以吾子決在一第未可與語今日之事貧道敢有所隱乎且吾子之于一第也貧道觀之雖首冠羣英亦不遇簿尉爾若能罷舉東歸霸國以求用則必富且貴矣兩途五子宜自擇之隱懵然不知所措者數日隣居有賣飯媪見隱驚曰何辭色之沮䘮如此莫有不决之事否隱謂知之因盡以尊師之言告之媪歎曰秀才何事迷甚焉且天下皆知羅隱何須一第然後為得哉不如急取富貴則老㜑之願也隱聞之釋然遂歸錢塘時錢鏐方得兩浙置之幕府使典軍中書檄其後官給事中初隱罷上中書之日費窘因抵魏謁鄴王羅紹威将入其境先貽書叙其家世鄴王為姪幕府僚吏見其書皆怒曰羅隱一布衣耳而姪視大王其可乎紹威素重士且曰羅隱名振天下王公大夫多為所薄今惠然肯顧其何以勝得在姪行為幸多矣敢不致恭諸公慎勿言于是擁斾郊迎一見即拜隱亦不讓及将行紹威贈以百萬他物稱是仍致書于鏐謂叔父鏐首用之仇殷不知何郡人也開平中仕至欽天監明于象緯厯數藝術精宻近無其比光化中太祖在滑遣宻王友倫以兵三萬禦幽州之師十餘萬深慮其不敵召殷問曰陣可行乎曰其十四日過禺中乎又問之曰賊敗塗地又曰既望當見捷書果如其言不失晷刻太祖之在長蘆諸将請攻壁號令軍中人負藁二圍置千積俄而雲集殷曰何用或以所謀告之殷曰我占矣不見攻壁象無乃自退乎翼日有馳騎報丁㑹以潞州叛太祖令盡焚其藁而還不克攻開平中殷一日朝罷過崇政院使敬翔直閣翔問之曰月犯房次星其逼若綴是何祥也曰常度耳殷欲不言既過數步自度不可黙乃反言曰三兩日當有不順語至無或驟恐宜先白上知既二日陜府奏同州劉知俊閉闗作叛初王景仁之出師也殷上言太隂虧不利深入太祖遽遣使止之已敗于柏鄉矣殷所見觸類如是不可備録然而畏慎特甚居常寝黙未嘗敢顯言縱言事跡惟其語音不可盡曉以故屢貽責罰後卒于官段深不知何許人開平中以善醫待詔于翰林時太祖抱疾久之其溲甚濁僧曉微侍藥有徴賜紫衣師號鍚賚甚厚頃之疾發曉微剥服色去師號因召深問曰疾愈復作草藥不足恃也我左右粒石而効者衆矣服之如何深對曰臣嘗奉詔診切陛下積憂勤失調護脉代芤而心益虛臣以為宜先治心心和平而溲變清當進飲劑而不當粒石也臣謹按太倉公傳曰中熱不溲者不可服石石性精捍有大毒凡餌毒藥如甲兵不得己而用之非有危殆不可服}
