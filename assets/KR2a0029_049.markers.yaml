  - {type: variant, offset: 123, length: 535, content: 考異姿色絕代嬖幸無雙時姬侍盈室罕得進御唯太后恩顧不衰武皇性嚴急左右有過必峻於譴罰無敢言者唯太后從容救諫即為解顏及莊宗載誕體貌奇傑武皇異而憐之太后益寵貴諸夫人咸出其下后亦恭勤內助左右稱之武皇薨莊宗嗣晉王位時李克寧李存顥謀變人情危懼太后召監軍張承業指莊宗謂之曰先人把臂授公此兒如聞外謀欲孤付託公等但置予母子有地毋令乞食于汴幸矣承業因誅存顥克寧以清內難莊宗善音律喜伶人謔浪太后嘗提耳誨之天祐七年鎮定求援莊宗促命治兵太后曰予齒漸衰兒但不墜先人之業為幸矣何事櫛風沐雨離我晨昏莊宗曰稟先王遺旨須滅仇讎山東之事機不可失及發太后餞于汾橋案原本作渭橋今據通鑑注改正舊五代史考異悲不自勝莊宗平定趙魏駐于鄴城每一歲之內馳駕歸寧者數四民士服其仁孝太后初封晉國夫人莊宗即位命宰臣盧損奉冊書上皇太后尊號其年平定河南西幸洛陽令皇弟存渥皇子繼岌就太原迎奉莊宗親至懷州迎歸長壽宮太后素與劉太妃善分訣之後悒然不樂俄聞太妃寢疾尚醫中使問訊結轍既而謂莊宗曰吾與太妃恩如伯仲彼經年抱疾但見吾面差足慰心吾暫至晉陽旬朔與之俱來莊宗曰時方暑毒山路崎嶇無煩往復可令存渥輩迎侍太妃乃止及凶問至太后慟哭累旬由是不豫尋崩于長壽宮同光三年冬十月上諡曰貞簡皇太后葬于壽安陵永樂大典卷一萬九千三百四太妃劉氏武皇之正室也永樂大典卷一千, WYG: 巻}
