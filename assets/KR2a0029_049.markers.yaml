  - {type: variant, offset: 13, length: 3, content: 后妃列, WYG: 世祖忠懿公憕有大節見唐史父縠仕懿僖朝官至右諫議大夫珽聰悟有才學尤工詞賦僖宗朝晉公王鐸提兵柄鎮滑臺縠居賓席鐸見珽大賞歎之年二十四登進士第解褐授校書郎拜監察御史俄丁内艱先是父旅殯在逺家貧無以襄事與弟琪當臘雪以單縗扶杖御哀告人由是兩克遷祔而珽日不過食一溢恒羸卧喪廬中不能興大為時賢所歎憂闋再徴為御史以瘠不起成汭之鎮荆州辟為掌書記踰時乃就天復中淮冦大舉圍夏口逼巴陵太祖患之飛命成汭率水軍十萬援於鄂珽入言曰今舳艫容介士千人載稻倍之緩急不可動呉人剽輕若為所絆則武陵武安皆我之讎也将有後慮不如遣驍将屯巴陵大軍對岸一月不與戰則呉冦糧絶而鄂州圍解矣汭性剛決不聼淮人果乘風縱火舟盡焚兵盡溺汭亦自沈于江朗人潭人遂入荆渚一如所料未㡬襄帥趙匡凝復奏為掌記入為左補闕又明年太祖為元帥以襄陽貳于已率兵擊破之趙匡凝奔揚州太祖復署珽為天平軍掌書記一日大㑹将佐指珽曰此真書記也滄州節度使劉守文拒命太祖引軍十餘萬圍之久而未下乃召珽草檄珽即就外次筆不停綴登時而成大為太祖嗟賞受禪之嵗宰臣除為考功員外郎知制誥珽揣太祖未欲首以舊僚超拜清顯三上章固辭優詔褒允尋以本官監曹州事曹去京數舎吏民豪猾前後十餘政未有善罷者珽在任期嵗衆庶以寧入為兵部郎中崇政院學士未幾以許帥馮行襲疾甚出為許州留後先是行襲有牙兵二千皆蔡人也太祖深為憂乃遣珽馳徃以伺察之珽至}
