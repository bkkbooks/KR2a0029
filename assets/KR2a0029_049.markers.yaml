  - {type: variant, offset: 659, length: 1822, content: 百六十六案劉太妃傳永樂大典闕全篇考北夢瑣言云晉王李克用妻劉夫人常隨軍行至于軍機多所弘益先是汴州上源驛有變晉王憤恨欲回軍攻之夫人曰公為國討賊而以杯酒私忿必若攻城即曲在於我不如回師自有朝廷可以論列於是班退天復中周德威為汴軍所敗三軍潰散汴軍乘我晉王危懼與李存信議欲出保雲州夫人曰存信本北方牧羊兒也焉顧成敗王常笑王行瑜棄城失勢被人屠割今復欲效之何也王頃歲避難塞外幾遭陷害賴遇朝廷多事方得復歸今一旦出城便有不測之變焉能遠及晉王止行居數日亡散之士復集軍城安定夫人之力也五代會要云同光元年四月冊為皇太妃歐陽史云莊宗即位冊尊曹氏為皇太后而以嫡母劉氏為皇太妃太妃往謝太后太后有慚色太妃曰願吾兒享國無窮使吾獲沒于地以從先君幸矣復何言哉莊宗滅梁入洛使人迎太后歸洛居長壽宮而太妃獨留晉陽同光三年五月太妃薨魏國夫人陳氏襄州人本昭宗之宮嬪也乾寧二年武皇奉詔討王行瑜駐軍于渭北昭宗降朱書御札朱書御札原本作宋書御禮今據通鑑所引薛史改正影庫本粘籤出陳氏及內妓四人以賜武皇陳氏素知書有才貌武皇深加寵重及光化之後時事多艱武皇常獨居深念嬪媵鮮得侍謁唯陳氏得召見陳氏性既靜退不以寵侍自侈武皇常呼為阿媎及武皇大漸之際陳氏侍醫藥垂泣言妾為王執掃除之役十有四年矣王萬一不幸妾將何託既不能以身為殉願落髮為尼為王讀一藏佛經以報平昔武皇為之流涕及武皇薨陳氏果落髮持經法名智願後居於洛陽佛寺莊宗賜號建法大師天成中明宗幸其院改賜圓惠大師晉天褔中卒於太原追諡光國大師塔以惠寂為名也永樂大典二千九百六十九莊宗神閔敬皇后劉氏永樂大典卷一萬三千三百五十二案劉后傳永樂大典原闕考北夢瑣言云莊宗劉皇后魏州成安人家世寒微太祖攻魏州取成安得后時年五六歲歸晉陽宮為太后侍者教吹笙及笄姿色絕衆聲伎亦所長太后賜莊宗為韓國夫人侍者後誕皇子繼岌寵待日隆他日成安人劉叟詣鄴宮見上稱夫人之父有內臣劉建豐認之即昔日黃鬚丈人后之父也劉氏方與嫡夫人爭寵皆以門族誇尚劉氏恥為寒家白莊宗曰妾去鄉之時妾父死於亂兵是時環屍而哭妾固無父是何田舍翁詐偽及此乃於宮門笞之其實后即叟之長女也莊宗好俳優宮中暇日自負蓍囊藥篋令繼岌相隨以后父劉叟以醫卜為業也后方晝眠及造其臥內自稱劉衙推訪女后大恚笞繼岌然為太后不禮復以韓夫人居正無以發明大臣希旨請冊劉氏為皇后議者以后出於寒賤好興利聚財初在鄴都令人設法稗販所鬻樵蘇果茹亦以皇后為名正位之後凡貢奉先入後宮惟寫佛經施尼師他無所賜闕下諸軍困乏以至妻子饑殍宰相請出內庫俵給后將出塟具銀盆兩口皇子滿喜等三人令鬻以贍軍一旦作亂亡國滅族與夫褒姒妲己無異也先是莊宗自為俳優名曰李天下雜於塗粉優雜之間時為諸優朴抶摑搭竟為嚚婦恩伶之傾玷有國者得不以為前鑒劉后以囊盛金合犀帶四欲於太原造寺為尼沿路復通皇弟存渥同簀而寢明宗聞其穢即令自殺案歐陽史作裨將袁建豐得后納之晉宮而北夢瑣言作內臣劉建豐亦傳聞之異辭也淑妃韓氏莊宗正室永樂大典卷一千二百六十六案韓淑妃傳永樂大典原闕考五代會要云同光二年十二月冊以宰臣豆盧革韋說為冊使出應天門登路車鹵簿鼓吹前導至于永福門降車入右銀臺門至淑妃宮受冊于內文武百官立班稱賀德妃伊氏莊宗次室永樂大典卷一千二百六十六案伊德妃傳永樂大典原闕考北夢瑣言云莊宗皇帝嫡夫人韓氏後為淑妃伊氏為德妃契丹入中原石氏乞降宰相馮道奉尊冊契丹主大張宴席其國母后妃列坐同宴王嬙蔡姬之比也夫人夏氏最承恩寵後嫁李贊華所謂東丹王即阿保機長子先歸朝後除滑州節度使性酷毒侍婢微過即以刀刲火灼夏氏少長宮掖不忍其凶求離婚歸河陽節度使夏魯奇家後為尼也案歐陽史家人傳夏氏在天成初以先朝宮人出歸夏魯奇家後賜李贊華與北夢瑣言微異遼史又以夏氏為莊宗皇后疑誤又案五代會要莊宗朝內職又有昭儀侯氏封汧國夫人昭媛白氏封沂國夫人出使美宣鄧氏封魏國夫人御正楚真張氏封涼國夫人司簿德美周氏封宋國夫人侍真吳氏封延陵郡夫人懿才王氏封太原郡夫人咸一韓氏封昌黎郡夫人瑤芳張氏封清河郡夫人懿德王氏封瑯琊郡夫人宣一馬氏封扶風郡夫人並同光二年十一月勅明宗昭懿皇后夏氏生秦王從榮及閔帝同光初后以疾崩明宗即位追封為晉國夫人長興中明宗以秦宋二王位望既隆因思從貴之義乃下制曰故晉國夫人夏氏素推仁德久睦宗親嘗施內助之方不見中興之盛予當御極子並為王有鵲巢之高無翬衣之貴貞魂永逝懿範常存考本朝之文沿追冊之制將慰懷於九族冀叶慶於四星宜追冊為皇后兼定懿號既而有司上諡曰昭懿永樂大典卷一萬三千五百五十二和武顯皇后曹氏永樂大典卷一萬三千五百五十五案曹后傳永樂大典原闕考五代會要云天成三年正月冊為淑妃長興元年五月, WYG: ''}
