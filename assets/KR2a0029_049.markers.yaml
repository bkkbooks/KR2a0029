  - {type: variant, offset: 17, length: 0, content: '', WYG: 舎召将吏親加撫慰行襲欲使人代受詔珽曰東首加朝服禮也乃于卧内宣詔令善自補養苟有不諱子孫俱保後福行襲泣謝遂解二印以授珽代掌軍府事太祖覽奏曰予固知珽必辦吾事行襲門户不朽矣乃以珽為匡國軍留後尋徴為左諫議大夫兼宣徽副使從征至魏縣過内黄因侍立于行廏太祖顧曰此何故名内黄珽曰河南有外黄小黄故此有内黄又曰外黄小黄在何處對曰秦有外黄都尉理外黄有故墉今在雍邱小黄為髙齊所廢其故墉今在陳留太祖稱奨數四及庶人友珪篡位除右散騎常侍充侍講學士内討之日軍士大擾珽為亂兵所傷其夕卒于洛陽珽心孝友與弟琪有敦睦之愛為搢紳所稱案歐陽史有裴迪韋震傳原文已佚無可采補盧曾字孝伯其先范陽人也頗好書有所執守始為齊州防禦使朱瓊從事瓊降預其謀與之皆來瓊没太祖辟為宣義幕職曽性忠狷好貢直又不能取容于衆毎勲府讌語稍洽曽率然糺正輙又忤㫖左長直軍使劉捍委任方重曽亦不能平冀王友謙初定陜府命曽徃議事有使院小将從行嗜酒荒逸過度曾復命欲發其罪致疏于袖中累日未果言小将恐事洩先誣告曽使酒幾敗軍事劉捍因證之由是罷職歸于齊之别墅俄而王師範起兵叛太祖促召曽謂之曰子能緩頰説青州使無背盟吾不負子矣曽持檄以徃既至青師範囚之送于淮南遇害後太祖暴師範之罪曰喪我骨肉殺我賓僚遂族誅之召曾二子皆授以官孫隲滑臺人嗜學知書微有辭筆唐光啟中魏博從事公乗億以女妻之因教以牋奏程式時中原多難文章之士縮影竄跡不自顯億既死魏帥以章表牋疏淹積兼月不能發一字或以隲言之即署本職主奏記事累遷職自支使掌記至節度判官奏官自校書御史郎官中丞檢校常侍至兵部尚書太祖御天下念潛龍時隲奉其主好問徃來數十返甚録之開平三年除右諫議大夫滿嵗遷左散騎常侍隲雅好聚書有六經漢史洎百家之言凡數千巻皆簡翰精至披勘詳定得暇即朝夕躭翫曾無少怠乾化二年春太祖将議北巡選朝士三十餘人扈從二月甲子車駕發自洛陽禺中次白馬頓召文武官就食以從臣未集駐驆以俟之又命飛騎促于道而隲與諫議大夫張衍兵部郎中張儁等累刻方至太祖性本卞急因茲大怒並格殺于前墀張儁字彦臣祖父咸有聞于時儁少孤自修餙善為五言詩其警句頗為人所稱唐廣明中黄巢犯京師天子幸蜀士皆竄伏窟穴以保其生儁亦晦跡浮泛不失其道及僖宗還京師由校書郎西畿尉登朝為御史補闕起居郎司勲員外萬年縣令以事黜官峽中将十年太祖即位用宰臣薛貽矩為鹽鐵使儁與貽矩同年登第甚知其才即奏為鹽鐵判官遷職為禮部郎中兼職如故乾化二年二月扈從後至與孫隲張衍同日遇禍于白馬頓張衍字𤣥用河南尹魏王宗奭之猶子也其父死于兵間衍樂讀書為儒始以經學就舉不中選時諫議大夫鄭徽退居洛陽以女妻之遂命應辭秋不數上登第唐昭宗東遷以宗奭勲力隆峻衍由校書郎拜左拾遺旋召為翰林學士太祖即位罷之特拜考功郎中俄遷右諫議大夫衍巧生業樂積聚太祖将北伐頗以扈從間糜耗力用繫意屢干託宰執求免是行太祖微聞之又屬應召稽晚與孫隲等同日遇禍杜荀鶴池州人辛文房唐才子傳荀鶴字彦之牧之微子也善為詩辭句切理為時所許既擢第復還舊山唐才子傳荀鶴嘗謁梁王朱全忠與之坐忽無雲而雨王以為天泣不祥命作詩稱意王喜之荀鶴寒進連敗文塲甚苦至是送春官大順二年裴贄侍郎放第八人登科正月十日放榜正荀鶴生朝也王希羽獻詩曰金榜曉懸生世日玉書潛記上昇時九華山色高千尺未必高于第八枝又唐新纂云荀鶴舉進士及第東歸過夷門獻梁太祖詩句云四海九州空}
