  - {type: variant, offset: 183, length: 0, content: '', WYG: 説刺史劉存背淮賊以向國案新唐書本紀乾寜三年楊行密陷光州刺史劉存死之九國志柴再用𫝊乾寜中從朱延壽平劉存于弋陽授知光州軍事梁兵冦光州再用擊走之事俱與是書異又從李彦威復黄州獲刺史瞿章案全忠陷黄州新唐書作乾寜四年九國志作三是書繫光化元年年與諸史異張存敬擒刺史陶建釗案建釗原本作建鈺}
