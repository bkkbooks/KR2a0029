  - {type: variant, offset: 193, length: 212, content: 考異丁丑東丹王突欲進本國印三紐庚辰以靜江軍節度使馬賨卒廢朝贈尚書令丙戌荊南節度使高從誨落起復加兼中書令二月己丑朔以宋州節度使趙延壽為左武衞上將軍充宣徽北院使癸巳詔貢院舊例夜試進士今後晝試排門齊入即日試畢丁酉幸至德宮又幸安元信東丹王突欲之第辛丑以鴻臚卿致仕賈馥卒廢朝以樞密院使守太尉兼中書令安重誨為檢校太師兼中書令充河中節度使進封沂國公己酉以右威衞上將軍陳臯為洋州節度使詔諸府少尹上任上任原本作尚佐今從五代會要改正影庫本粘籤以, WYG: 卷}
