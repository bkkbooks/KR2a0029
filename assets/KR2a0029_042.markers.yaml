  - {type: variant, offset: 407, length: 3941, content: 五日為限諸州刺史諸道行軍司馬副使兩使判官已下賓職團防軍事判官推官府縣官等並以三十日為限幕職隨府者不在此例癸丑邠州節度使李敬周移鎮徐州詔禁天下開發無主墳墓三月辛酉詔渤海國人皇王突欲宜賜姓東丹名慕華仍授檢校太保安東都護充懷化軍節度瑞慎等州觀察等使其從慕華歸國部校各授懷化歸德將軍中郎將先於定州擒獲蕃將惕隱宜賜姓狄名懷惠則骨宜賜姓列名知恩並授檢校右散騎常侍舍利則剌宜賜姓原名知感棫骨宜賜姓服名懷造奚王副使竭失訖宜賜姓乙名懷宥三人並授檢校太子賓客甲子以前鴻臚卿王瓊為太僕卿丙寅以皇子從珂為左衞大將軍從珂自河中失守歸清化里第清化原本作情化今從通鑑注所引薛史改正影庫本粘籤至是安重誨出鎮河中帝召見泣而謂之曰如重誨意爾安得更相見耶因有是命壬申以滄州節度使孔循卒廢朝乙亥以西京留守權知興元軍府事王思同為山南西道節度使充西面行營馬步軍都虞候庚辰以少府監聶延祚為殿中監以前雲州節度使楊漢章為安州節度使楊漢章原本作漢童今從通鑑改正影庫本粘籤乙酉太師致仕錢鏐復授天下兵馬都元帥尚父吳越國王以其子兩浙節度使元瓘等上表首罪故有是命丁亥以太常卿李愚為中書侍郎平章事集賢殿大學士夏四月辛卯制德妃王氏進位淑妃詔錢鏐依舊賜不名誅內官安希倫以其受安重誨密指令於內中伺帝起居故也丁酉幸會節園宴羣臣因幸河南府詔罷州縣官到任後率斂為地圖又禁人毀廢所在碑碣戊戌詔今年四月褅饗太廟故昭義節度使李嗣昭故幽州節度使周德威故汴州節度使符存審並配饗莊宗廟庭己亥以前徐州節度使張虔釗為鳳翔節度使癸卯以汴州節度副使藥縱之為戶部侍郎前宗正卿李諧為將作監甲辰以宣徽北院使左衞上將軍趙延壽為檢校太傅行禮部尚書充樞密使乙巳潞州節度使劉仲殷移鎮秦州帝幸龍門佛寺祈雨己酉天雄軍節度使石敬瑭兼六軍諸衞副使辛亥以前鳳翔節度使朱弘昭為左武衞上將軍充宣徽南院使壬子以兵部尚書盧質為河陽節度使甲寅以遂州節度使夏魯奇沒於王事廢朝案通鑑正月庚午李仁罕陷遂州夏魯奇自殺歐陽史作四月甲寅董璋陷遂州武信軍節度使夏魯奇死之與通鑑異以薛史考之歐陽史蓋誤以奏聞之日為城陷之日宜從薛史詔曰久時雨深疚予心宜委諸州府長吏親問刑獄省察寃濫見禁囚徒除死罪外並放案歐陽史作乙卯以旱赦流罪以下囚與薛史作壬子異舊五代史考異五月戊午朔帝御文明殿受朝庚申以三司使行工部尚書張延朗為兗州節度使辛酉詔近聞百執事等或親居內職或貴列廷臣或宣達君恩或勾當公事經由列鎮干撓諸侯指射職員安排親昵或潛示意旨或顯發書題自今後一切止絕有所犯者發薦人貶官求薦人流配如逐處長吏自徇人情只仰被替人詣闕上訴被替原本作被贊今從五代會要改正影庫本粘籤長吏罰兩月俸發薦人更加一等被替人却令依舊甲子都官郎中知制誥崔梲上言請搜訪宣宗已來野史以備編修從之丁卯詔諸州府城郭內依舊禁麴其麴官中自造減舊價之半貨賣應田畝上所徵麴錢並放鄉村人戶一任私造時甚便之戊辰中書奏應朝臣丁憂者望加頒賚從之丁丑以祕書監劉岳為太常卿己卯以武德使孟漢瓊為右衞大將軍知內侍省充宣徽北院使辛巳以前相州刺史孟鵠為左驍衞大將軍相州刺史原本脫刺史二字今從冊府元龜增入影庫本粘籤充三司使甲申以權知朗州軍州事守永州刺史馬希範為洪州節度使檢校太傅以權知桂州軍府事富州刺史馬希彝為鄂州節度使檢校司徒乙酉以左金吾大將軍薄文為晉州留後鴻臚卿柳膺將齋郎文書賣與同姓人柳居則伏罪大理寺斷當大辟緣經赦減死追奪見任官終身不齒詔應見任前資守選官等所有本朝及梁朝出身歷任告身並仰送納委所在磨勘換給公憑只以中興已來官告及近受文書理其諸色蔭補子孫如非虛假不計庶嫡並宜錄如實無子孫別立人繼嗣已補得身名者只許蔭一人蔭原本作緒蔭今從五代會要改正影庫本粘籤其不合使文書限百日內焚毀須絕此後更敢將合焚文書參選求仕其所犯之人並傳者並當極法應合得資蔭出身人並須依格依令施行閏月庚寅制河中節度使檢校太師兼中書令安重誨可太子太師致仕是日重誨男崇緒等潛歸河中崇緒原本作宗諸今從通鑑改正又下文兼言崇贊崇緒疑此處有脫文考冊府元龜所引薛史亦作崇緒等今仍其舊影庫本粘籤以右散騎常侍張文寶為兵部侍郎夔州節度使安崇阮棄城歸闕待罪於閤門詔釋之時董璋寇峽內諸州崇阮望風遁走壬辰陝州節度使李從璋移鎮河中癸丑升廬州為昭順軍甲午以衡州刺史姚彥章為昭順軍節度使丁酉安重誨奏男崇贊崇緒等到州臣已拘送赴闕崇緒至陝州詔令下獄己亥詔安重誨宜削奪在身官爵並妻阿張男崇贊崇緒等並賜死案五代春秋作五月誅安重誨歐陽史作閏五月丁酉與薛史異舊五代史考異其餘親不問壬寅以尚書左丞崔居儉為工部尚書以吏部侍郎王權為尚書左丞丙午以隨駕馬軍都指揮使宣州節度使安從進為陝州節度使丁未以前中書舍人楊凝式為左散騎常侍戊申以右龍武統軍王景戡為新州節度使己酉以右領軍上將軍李肅為左金吾大將軍壬子以隨駕步軍都指揮使藥彥稠為邠州節度使癸丑以邠州節度使劉行琮卒廢朝贈太傅詔有司及天下州縣於律令格式六典