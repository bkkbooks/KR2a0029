  - {type: punctuation, offset: 93, content: 「, id: KR2a0029_ZHSJ_114-bkkpn20}
  - {type: variant, offset: 93, length: 595, content: 上帝有命郭郎為天子考柴翁即守禮之父史佚其名舊五代史考異帝以唐天祐十八年歲在辛巳九月二十四日丙午生於邢州之別墅邢州原本作雒州今據五代會要改正影庫本粘籤年未童冠因侍聖穆皇后在太祖左右時太祖無子家道淪落然以帝謹厚故以庶事委之帝悉心經度貲用獲濟太祖甚憐之乃養為己子漢初太祖以佐命功為樞密副使帝始授左監門衞將軍案國老談苑云周世宗在漢為諸衞將軍嘗遊畿甸謁縣令忘其姓名令方聚邑客蒱博勿得見世宗頗銜之及即位令因部夫犯贓數百疋宰相范質以具獄上奏世宗曰親民之官贓狀狼藉法當處死范質奏曰受所監臨財物有罪上贓雖多法不至死世宗怒厲聲曰法者自古帝王之所制本以防姦朕立法殺贓吏非酷刑也質曰陛下殺之則可若付有司臣不敢署敕遂貸其命舊五代史考異二年太祖鎮鄴改天雄軍牙內都指揮使領貴州刺史檢校右僕射三年冬太祖入平內難留帝守鄴城廣順元年正月太祖踐祚帝懇求入覲忽夢至河而不得渡尋授澶州節度使檢校太保封太原郡侯帝在鎮為政清肅盜不犯境先是澶之里衖湫隘公署毀圮帝即廣其街肆增其廨宇吏民賴之案宋史王贊傳周世宗鎮澶淵每旬決囚贊引律令辨析中理問之知其嘗事學問即署右職舊五代史考異二年正月兗州慕容彥超反帝累表請征行太祖嘉之及曹英等東討數月無功太祖欲親征召羣臣議其事宰臣馮道奏以方當盛夏車駕不宜衝冒太祖曰寇不可翫如朕不可行當使澶州兒子擊賊方辦吾事時樞密王峻意不欲帝將兵故太祖親征六月兗州平十二月加檢校太傅同平章事三年正月帝入覲三月授開封尹兼功德使封, WYG: ''}
