  - {type: variant, offset: 3380, length: 757, content: 代史考異董希顏原本作革希顏今從通鑑改正影庫本粘籤丙辰偽遼州刺史張漢超以城歸順丁巳幸柏谷寺遣右僕射平章事判三司李穀赴河東城下計度軍儲詔河東城下諸將招撫戶口禁止侵掠只令徵納當年租稅及募民入粟五百斛草五百圍者賜出身千斛千圍者授州縣官辛酉符彥卿奏嵐憲二州歸順壬戌制立衞國夫人符氏為皇后仍令有司擇日備禮冊命王彥超奏收下石州獲偽刺史安彥進案宋史王彥超傳引兵趣石州彥超親鼓士乘城躬冒矢石數日下之擒其守將安彥進獻行在舊五代史考異癸亥偽沁州刺史李廷誨以城歸順甲子皇妹壽安公主張氏進封晉國長公主乙丑東京奏太師中書令馮道薨丙寅太祖皇帝神主祔於太廟庚午曲赦潞州見禁罪人除死罪外並釋放是日車駕發潞州親征劉崇癸酉忻州偽監軍李勍殺刺史趙臯及契丹大將楊耨姑以城歸順詔授李勍忻州刺史五月乙亥以尚書右丞邊歸讜守本官充樞密直學士以尚書戶部侍郎陶穀守本官充翰林學士案宋史陶穀傳從征太原時魚崇諒迎母後至穀乘間言曰崇諒宿留不來有顧望意世宗疑之崇諒又表陳母病詔許歸陝州就養以穀為翰林學士舊五代史考異丙子車駕至太原城下是日偽代州防禦使鄭處謙以城歸順案遼史穆宗紀四年五月乙亥忻代二州叛據薛史則忻州歸順在四月代州歸順在五月丙子與遼史月日互異丁丑觀兵於太原城下帝親自慰勉錫賚有差升代州為節鎮以靜塞軍為額以鄭處謙為節度使戊寅斬偽命石州刺史安彥進於太原城下以其拒王師也庚辰以前中武軍節度使郭從義為天平軍節度使遣符彥卿郭從義向訓白重贊史彥超等率步騎萬餘赴忻州案宋史符彥卿傳彥卿之行也世宗以幷人雖敗朝廷饋運不繼未議攻擊且令觀兵城下徐圖進取及周師入境汾晉吏民望風款接皆以久罹虐政願輸軍需以資兵力世宗從之而連下數州彥卿等皆以芻糧未備欲旋軍世宗不之省乃調山東近郡輓軍食濟之舊五代史考異是夜大風發屋拔樹壬午以宰臣李穀判太原行府事辛丑升府州為節鎮以永安軍為軍額以本州防禦使折德扆為節度使, WYG: 十}
