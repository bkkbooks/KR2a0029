  - {type: variant, offset: 2558, length: 198, content: 軍既成列賊騎來挑戰愛能望風而退何徽以徒兵陣於後為奔騎所突即時潰亂二將南走帝遣近臣宣諭止遏莫肯從命皆揚言曰官軍大敗餘衆已解甲矣至暮以官軍克捷方稍稍而迴帝至潞州錄其奔遁者自軍使以上及監押使臣並斬之由是驕將墮兵無不知懼帝以何徽有平陽守禦之功欲貸其罪竟不可與愛能俱殺之皆給槥車歸葬案東都事略世宗謂張永德曰樊愛能及偏裨七十餘人吾欲盡按軍法何如對曰必欲開拓疆宇威加四海安可已也世宗善其言悉誅愛能等以徇軍聲始振, WYG: 史紀載微異}
