  - {type: variant, offset: 2760, length: 619, content: 考異庚子以侍衞馬步都虞候李重進為許州節度使以宣徽南院使向訓為滑州節度使以殿前都指揮使張永德為武信軍節度使職並如故以滑州節度使白重贊為鄜州節度使以鄭州防禦使史彥超為華州節度使賞高平之功也以晉州節度使藥元福為同州節度使以宣徽北院使楊廷璋為晉州節度使以同州節度使張鐸為彰義軍節度使以客省使吳延祚為宣徽北院使以龍捷左廂都指揮使李千為蔡州防禦使以龍捷右廂都指揮使田中為密州防禦使以虎捷右廂都指揮使張順為登州防禦使以龍捷左第二軍都指揮使孫延進為鄭州防禦使以前耀州團練使符彥能為澤州防禦使以散員都指揮使李繼勳為殿前都虞候以殿前都虞候韓令坤為龍捷左廂都指揮使以鐵騎第一軍都指揮使趙弘殷案原本注宣祖廟諱四字今據宋史改作弘殷為龍捷右廂都指揮使以散員都指揮使慕容延釗為虎捷左廂都指揮使以控鶴第一軍都指揮使趙鼎為虎捷右廂都指揮使並遙授團練使其餘改轉有差壬寅以天雄軍節度使衞王符彥卿為河東行營都部署知太原行府事以澶州節度使郭崇為行營副部署以宣徽南院使向訓為行營兵馬都監以侍衞都虞候李重進為行營都虞候以華州節度使史彥超為先鋒都指揮使領步騎二萬進討河東詔河中節度使王彥超陝府節度使韓通率兵自陰地關討賊以河陽節度使劉詞為隨駕都部署以鄜州節度使白重贊為隨駕副部署夏四月乙巳太祖靈駕發東京乙卯葬於嵩陵河中節度使王彥超奏偽汾州防禦使董希顏以城歸順案宋史王彥超傳彥超自陰地關與符彥卿會兵圍汾州諸將請急攻彥超曰城已危矣旦暮將降我士卒精銳驅以先登必死傷者衆少待之翼日州將董希顏果降舊, WYG: 巻}
