  - {type: variant, offset: 689, length: 1486, content: 王顯德元年正月庚辰加開府儀同三司開府原本作開封今據文改正影庫本粘籤檢校太尉兼侍中依前開封尹兼功德使判內外兵馬事時太祖寢疾彌留士庶憂沮及聞帝總內外兵柄咸以為愜案隆平集曹翰隸世宗幕下世宗鎮澶淵以為牙校及尹開封翰猶在澶淵聞周祖寢疾不俟召來見世宗密言曰王為冢嗣不事醫藥何以副天下望世宗悟入侍禁中以府事命翰總決舊五代史考異壬辰太祖崩祕不發喪丙申內出太祖遺制晉王榮可於柩前即位羣臣奉帝即皇帝位庚子宰臣馮道率百僚上表請聽政凡三上壬寅帝見羣臣於萬歲殿門之東廡下二月庚戌潞州奏河東劉崇與契丹大將軍楊衮舉兵南指壬戌宰臣馮道率百僚上表請御殿凡三上允之丁卯以中書令馮道充山陵使太常卿田敏充禮儀使兵部尚書張昭充鹵簿使御史中丞張煦充儀仗使開封少尹權判府事王敏充橋道使河東賊將張暉率前鋒自團柏谷入寇帝召羣臣議親征宰臣馮道等奏以劉崇自平陽奔遁之後勢弱氣奪未有復振之理竊慮聲言自來以誤於我陛下纂嗣之初先帝山陵有日人心易搖不宜輕舉命將禦寇深以為便帝曰劉崇幸我大喪聞我新立自謂良便必發狂謀謂天下可取謂神器可圖此際必來斷無疑耳馮道等以帝銳於親征因固諍之帝曰昔唐太宗之創業靡不親征朕何憚焉道曰陛下未可便學太宗帝又曰劉崇烏合之衆苟遇王師必如山壓卵耳道曰不知陛下作得山否作得山否原本作昨待山否今從通鑑改正影庫本粘籤帝不悅而罷詔諸道募山林亡命之徒有勇力者送於闕下仍目之為強人帝以趫捷勇猛之士多出於羣盜中故令所在招納有應命者即貸其罪以禁衞處之至有朝行殺奪暮升軍籍讎人遇之不敢仰視帝意亦患之其後頗有不獲宥者三月丁丑潞州奏河東劉崇入寇兵馬監押穆令均部下兵士為賊軍所襲官軍不利詔天雄軍節度使符彥卿領兵自磁州固鎮路赴潞州以澶州節度使郭崇副之詔河中節度使王彥超領兵取晉州路東向邀擊以陝府節度使韓通為副命宣徽使向訓馬軍都指揮使樊愛能步軍都指揮使何徽滑州節度使白重贊鄭州防禦使史彥超前耀州團練使符彥能等領兵先赴澤州辛巳制大赦天下常赦所不原者咸赦除之諸貶降責授官量與升陟用應配流徒役人並放逐便諸道州府所欠去年夏秋租稅並放內外見任文武職官並與加恩父母在者並與恩澤亡沒者與封贈其母妻未者特與封云前涇州節度使史懿卒癸未詔以劉崇入寇車駕取今月十一日親征甲申以樞密使鄭仁誨為東京留守乙酉車駕發京師壬辰至澤州癸巳王師與河東劉崇契丹楊衮大戰於高平賊軍敗績初車駕行次河陽聞劉崇自潞而南即倍程而進是月十八日至澤州既晡帝御戎服觀兵於東北郊距州十五里夜宿於村舍十九日前鋒與賊軍相遇賊陣於高平縣南之高原有賊中來者云劉崇自將騎三萬幷契丹萬餘騎嚴陣以待官軍帝促兵以擊之崇東西列陣頗亦嚴整乃令侍衞馬步軍都虞候李重進滑州節度使白重贊將左居陣之西廂侍衞馬軍都指揮使樊愛能步軍都指揮使何徽將右居陣之東廂宣徽使向訓鄭州防禦使史彥超以精騎當其中殿前都指揮使張永德以禁兵衞蹕帝介馬觀戰兩軍交鋒未幾樊愛能何徽望賊而遁東廂騎軍亂步軍解甲投賊帝乃自率親騎臨陣督戰案隆平集馬仁瑀傳從世宗親征劉崇王師不利仁瑀謂衆曰主辱臣死因躍馬大呼引弓連斃將卒數十士氣始振舊五代史考異今上馳騎於陣前先犯其鋒戰士皆奮命爭先賊軍大敗日暮賊萬餘人阻澗而陣會劉詞領兵至與大軍迫之賊軍又潰臨陣斬賊大將張暉張暉通鑑考異引晉陽見聞錄作張令徽考歐陽史十國春秋俱同薛史作張暉今附識於此影庫本粘籤及偽樞密使王延嗣案九國志作張元徽乘勢復入馬倒為周師所擒殺之與薛史異通鑑從薛史舊五代史考異案九國志張元徽傳元徽為前鋒與周師遇于巴公元徽以東師先登陷陣擒監軍使一人降其步卒千人而旋劉崇大褒賞之元徽乘勝復入馬倒為周師所擒殺之考薛史作大將張暉戰于高平縣南與九國志人名地名互異通鑑從薛史孔本諸將分兵追襲殭尸棄甲填滿山谷初夜官軍至高平降賊軍數千, WYG: ''}
