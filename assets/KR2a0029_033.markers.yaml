  - {type: variant, offset: 868, length: 9, content: 皇帝室然後差丞郎一, WYG: 遣從周率敢死之士夜銜枚犯圍而入㑹王師不利于馬牢州即棄上黨而歸其年十二月與丁會諸將討魏州連收十邑明年正月大破魏軍于永定橋魏軍五敗斬首萬餘級十月佐丁㑹攻宿州從周壅水灌其城刺史張筠以郡降從討兗州破朱瑾之軍于馬溝景福二年二月與諸將大破徐兗之兵于石佛山八月與龎師古同攻兖州乾寜元年三月軍至新太縣朱瑾令都將張約李胡椒率三千}
