  - {type: variant, offset: 3860, length: 0, content: '', WYG: 賀瓌為北面招討使彦章為排陣使同領大軍駐于行臺寨與晉人對壘彦章時領騎軍與之挑戰晉人或望我軍行陣整肅則相謂曰必兩京太傅在此也不敢}
  - {type: page-break, offset: 3860, content: '', id: KR2a0029_WYG_033-7a, image: WYG0277/WYG0277-0152a.png}
  - {type: variant, offset: 3860, length: 0, content: '', krp: 賀瓌為北面招討使彦章為排陣使同領大軍駐于行臺寨與晉人對壘彦章時領騎軍與之挑戰晉人或望我軍行陣整肅則相謂曰必兩京太傅在此也不敢}
  - {type: variant, offset: 3861, length: 0, content: '', WYG: 名呼其為敵人所憚如此是時咸謂賀瓌能將歩軍彦章能領騎士既名聲相軋故瓌心忌之一日與瓌同設伏于郊外瓌指一方地謂彦章曰此地岡阜隆起中央坦夷好列栅之所尋而晉人舎之故瓌疑彦章與晉人通又瓌欲速戰彦章欲持重以老敵人瓌益疑之㑹為行營馬歩都虞候朱珪所誣瓌遂與珪協謀因享士伏甲以殺彦章及濮州刺史孟審澄别將候温裕等于軍以謀叛聞晉王聞之喜曰彼將帥如是亡無日矣審澄温裕亦善將騎軍然所領不過三千騎多而益辦惟彦章有焉將略之外好優禮儒士與晉人對壘于河上恒褒衣博帯動皆由禮或臨敵御衆則肅然有上將之威毎敦陣整旅左旋右抽雖風馳雨驟亦無以喻其迅捷也故當時騎士咸樂為用及其遇害人皆惜之胡真江陵人也體貌洪壯長七尺善騎射少為縣吏及在巢㓂中㓂推為名將隨巢渉淮浙䧟許洛入長安及太祖以衆歸唐真時為元從都將通鑑云温見巢兵勢日蹙知其將亡親將胡真謝瞳勸温歸國從至梁苑表授檢校刑部尚書頻從破巢蔡于陳鄭間尋以竒兵襲取滑州乃署為滑州節度使留後復表為鄭滑節度使檢校右僕射數年徴為右金吾衛大將軍俄拜寜遠軍節度使容州刺史檢校太保卒贈太傅張歸霸字正臣清河人祖進言陽榖令父實亦有宦緒少倜儻好兵術唐乾符中㓂盜蜂起歸霸率昆弟三人棄家投黄巢頗以勇略聞巢陥長安遂署為左畨功臣中和中巢領徒走宛丘時太祖在汴奉詔南討巢黨日窘歸霸昆仲與葛從周李讜等相率來降尋補宣武軍劇職光啟二年與蔡將張存戰于盧氏三年夏又與蔡將盧瑭戰于雙丘復與秦宗賢戰于萬勝皆敗而殱之翼日宗權遣將張郅來㓂列寨于赤堈一日出騎將較勝歸霸為飛戈所中即拔馬却逸控弦一發賊洞頸而墜遂兼騎而還太祖時于高丘下瞰備見其狀面加賞激厚以金帛及所獲馬錫之又嘗被命以控弦之士五百人伏于壕内太祖統數百騎稍逼其寨蔡人果以鋭士摩壘來追歸霸發伏兵掩殺千餘人奪馬數十匹尋奏授檢校左㪚騎常侍其後從太祖代鄆副李唐賔渡淮咸著竒績文徳初大軍臨蔡州賊將蕭顥來斫寨歸霸與徐懷玉各以所領兵自東南二扉分出合勢殺賊蔡人大敗及太祖整衆離營㓂塵已息太祖召至賞之曰昔耿弇不俟光武擊張歩言不以賊遺君父弇之功爾其二焉大順中郭紹賔拔曹州歸霸提兵數千守之俄而朱瑾統大軍自至歸霸與丁㑹逆擊之于金鄉瑾大敗擒賊將宗江等七十餘人曹州以寜明年破濮州生擒刺史邵儒又佐葛從周與晉軍戰于洹水生獲克用愛子落落復與燕人戰于内黄殺仁恭兵三萬餘衆戎績超特居諸將之右累官至檢校左僕射光化二年權知邢州事明年春李嗣昭以蕃漢五萬來㓂歸霸堅壁設備晉軍不敢顧其城遂移軍攻洺州陥焉時太祖在滑頗慮邢之失守及葛從周復洺嗣昭北遁歸霸出兵襲之殺二萬餘衆捷至賞錫殊等旋以功奏加檢校司空天祐初遷萊州刺史秩滿授左衛上將軍又除曹州刺史其秋加檢校司徒副劉知俊禦}
