  - {type: variant, offset: 2064, length: 559, content: 事丁未夕徧天陰雲北方有聲如雷野雉皆鳴俗所謂天狗落戊申魏王繼岌樞密使侍中郭崇韜進發西征案原本衍辛巳幸壽安陵甲寅八字今刪去太子少師致仕薛廷珪卒案原本作少保今據列傳改正舊五代史考異贈右僕射甲寅幸壽安陵司天上言自七月三日大雨至九月十八日後方晴三辰行度不見丁巳幸尖山射鴈冬十月庚申朔宰臣及文武三品以上官赴長壽宮上大行皇太后諡曰貞簡皇太后辛酉幸甘泉遂幸壽安陵壬戌魏王繼岌率師至鳳翔先遣使馳檄以諭蜀部丁卯奉皇太后尊諡寶冊赴西宮靈座宰臣豆盧革攝太尉讀冊文吏部尚書李琪讀寶文百官素服班於長壽宮門外奉慰淮南楊溥遣使進慰禮己巳中書上言貞簡太后陵請以坤陵為名從之初卜山陵帝欲祔於代州武皇陵奏議天子以四海為家不當分其南北乃於壽安縣界別卜是陵案五代會要載中書門下奏議云人君以四海為家不當分其南北洛陽是帝王之宅四時朝拜禮須便近不能遠幸代州今漢朝諸陵皆近秦雍國朝陵寢布列京畿後魏文帝自代遷洛之後園陵皆在河南兼勅功臣之家不許北葬今魏氏諸陵尚在京畿祔葬代州理未為允從之丙子以前翰林學士戶部侍郎馮道依前本官充職戊寅西征之師入大散關案九國志趙廷隱傳云自入敵境即禁兵士焚廬舍剽財物蜀人德之舊五代史考異偽命鳳州節度使王承捷故鎮屯駐指揮使唐景思次第迎降得兵一萬二千軍儲四十萬又下三泉得軍儲三十餘萬自是師無匱乏軍聲大振辛巳偽興州刺史王承鑒成州刺史王承朴棄城遁去康延孝, WYG: 老鵶堤}
