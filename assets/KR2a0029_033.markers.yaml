  - {type: variant, offset: 237, length: 3, content: 李琪充, WYG: 佐龎師古討孫儒于淮南略地至廬壽滁等州下天長高郵破邵伯堰廻軍攻濠州殺刺史魏勲得餉船十隻}
  - {type: page-break, offset: 237, content: '', id: KR2a0029_WYG_033-3a, image: WYG0277/WYG0277-0150a.png}
  - {type: variant, offset: 237, length: 3, content: 李琪充, krp: 佐龎師古討孫儒于淮南略地至廬壽滁等州下天長高郵破邵伯堰廻軍攻濠州殺刺史魏勲得餉船十隻}
  - {type: variant, offset: 241, length: 255, content: 行皇太后山陵禮儀使河南尹張全義充山陵橋道排頓使孔謙充監護使壬子河陽陝州上言河溢岸以禮部尚書王正言案原本作直言今據歐陽史改正舊五代史考異為戶部尚書以御史中丞崔協為禮部尚書以刑部侍郎史館修撰判館事崔居儉為御史中丞以尚書左丞歸靄為刑部侍郎陝州上言河漲二丈二尺壞浮橋入城門居人有溺死者乙卯汴州上言汴水泛漲恐漂沒城池於州城東西權開壕口引水入古河澤潞上言自今月一日雨至十九日未止戊午以刑部尚書判太常卿兼判吏部尚書銓事李琪為吏部尚書依前判太常卿以兵部侍郎集賢殿學士判院事盧文紀為吏部侍郎以給事中李光序為尚書右丞許州滑州奏大水, WYG: 順元年}
