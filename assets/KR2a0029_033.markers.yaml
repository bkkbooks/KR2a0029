  - {type: variant, offset: 4029, length: 1, content: 吏, WYG: 右僕射其後討滄州復洺州咸以功聞太祖録其勲命權知洺州事是郡嘗兩為晉人所陥井邑蕭條歸厚撫之數月之内民庶翕然太祖自鎮定還覩其緝理之政大喜賞之天復元年冬真拜洺州刺史加檢校左僕射尋授絳州刺史三年秋改晉州刺史乃檢校司空唐帝遷都洛陽除右神武統軍天祐二年改左羽林統軍與徐懐玉同守澤州時晉軍五萬來攻郡中戎士甚寡歸厚極力拒守并軍乃還太祖受禪加檢校司空開平二年夏劉知俊以同州叛歸厚副楊師厚劉鄩等討平之秋軍還授亳州團練使乾化元年拜鎮國軍節度使陜虢等州觀察處置等使明年夏以疾卒于位詔贈太祖子漢卿張歸弁字從冕始與兄歸霸歸厚同歸太祖得置為牙校時太祖初鎮宣武屢命歸弁結好于近境頗得行人之儀乾寕中以偏師佐葛從周禦并軍于洹水光啟中又佐張存敬與燕人戰于内黄積前後功表授檢校工}
