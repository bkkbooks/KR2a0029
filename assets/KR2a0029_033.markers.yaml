  - {type: variant, offset: 498, length: 193, content: 壬戌詔諸司人吏不許諸處奏薦如有勞績只許本司奏聞詔有司吳越王印宜以黃金鑄成其文曰吳越國王之印丁卯帝釋服百官奉慰於長壽宮戊辰客省使李嚴使蜀回初帝令往市蜀中珍玩蜀法嚴峻不許奇貨東出其許市者謂之入草物原本入草訛全草今據通鑑及冊府元龜所引薛史改正舊五代史考異嚴不獲珍貨歸而奏之帝大怒曰物歸中夏者命之曰入草王衍寧免為入草之人耶由是伐蜀之意銳矣庚辰幸壽安山陵作所鄴都大水御河泛溢癸未河南縣令羅貫長流崖, WYG: 并帥圍潞}
