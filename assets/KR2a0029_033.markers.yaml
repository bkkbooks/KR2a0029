  - {type: variant, offset: 5254, length: 613, content: 尚書臨時更約偽署高低為六行次第階至開府特進金紫者宜令文班降至朝散大夫武班降至銀青爵偽署將相已上與開國男餘並不得更稱封爵其有功臣者削去案此句疑有脫誤據五代會要作其有功臣名號並宜削去如是偽署節鎮伐罪之初率先向化及立功效者宜委繼岌崇韜臨時奬任其刺史但許稱使君不得更有檢校官其偽署班行正四品已上酌此降黜五品已下如不曾經本朝授官若材智有聞即許於府縣中量材任使如無材智可錄如無材智可錄原本脫無字今據五代會要增入影庫本粘籤止是蜀地土人並宜放歸田里如是西班有稱統軍上將軍者案原本作兩班今據五代會要改正舊五代史考異若是本朝功臣子孫及將相之嗣並據人材高下與諸衞小將軍府率中郎將次第授任如是小將軍已下據人材堪任使者宜委西川節度使衙前補押衙不堪任使者亦宜放歸田里應已前降官除軍前量事迹任使外餘並稱前銜候朝廷續據才行任使庚子彰武保大等節度使高萬興卒甲辰淮南楊溥遣使朝貢乙巳以晉州節度使李存乂為鄜州節度使以相州刺史李存確為晉州節度使丙午兩省諫官上疏請車駕不巡幸汴州凡三上章乃允庚戌魏王繼岌奏遣秦州副史徐藹齎書招諭南詔蠻又奏點到兩川馬九千五百三十匹案清異錄莊宗滅梁平蜀志頗自逸命蜀匠織十幅無縫錦為被材被成賜名六合被舊五代史考異辛亥制皇第二弟存霸可封永王第三弟存美可封邕王第四弟存渥可封申王第五弟存乂可封睦王第六弟存確可封通王第七弟存紀可封雅王案原本作睢王考通鑑及歐陽史皆作雅王薛史宗室傳亦作雅王今改正舊五代史考異是歲日傍有背氣凡十三永樂大典卷七千一百五十七, WYG: ''}
