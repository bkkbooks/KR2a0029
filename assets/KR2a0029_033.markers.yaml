  - {type: variant, offset: 3991, length: 10, content: 成都尹劍南西川節度副, WYG: 二年秋七月卒于位詔贈太傅梁末帝徳妃張氏即歸霸女也末帝嗣位以歸霸子漢鼎漢傑並為近職漢鼎早亡漢傑貞明中為控鶴指揮使領兵討惠王于陳州擒之當貞明龍徳之際漢傑昆仲分掌權要藩鎮除拜多出其門叚凝因之遂竊兵柄及莊宗入汴漢傑與兄漢倫弟漢融同日伏誅于汴橋下張歸厚字徳坤通鑑攷異引梁功臣列傳云歸厚祖興父處讓少驍勇有機略尤長于弓槊之用中和末與兄歸霸自巢軍相率來降太祖署為軍校時淮而兵力方壯太祖之師尚寡歸厚以少擊衆往無不㨗光啟三年春與秦宗賢戰于萬勝}
