  - {type: variant, offset: 3200, length: 639, content: 武信軍節度使唐師入境郭崇韜遣使遺宗壽書宗壽不納聞衍降乃治裝赴闕據薛史則王衍未送款宗壽已降矣與九國志異丁未高麗國遣使貢方物康延孝李嚴至漢州王衍遣人送牛酒請降李嚴遂先入成都戊申祔貞簡皇太后神主於太廟己酉魏王至綿州王衍遣使上牋歸命庚戌皇弟鄆州節度使存霸滑州節度使存渥左金吾大將軍晉州節度使存乂邢州節度使存紀並授起復雲麾將軍右金吾大將軍同正荊南節度使高季興奏收復歸夔忠等州辛亥魏王至德陽偽六軍使王宗弼報王衍舉家遷於西宅宗弼權稱西川兵馬留後又報偽樞密使宋光嗣景潤澄宣徽使李周輅歐陽晃同有異謀宣徽使原本作宣崇今據十國春秋改正影庫本粘籤惑亂蜀主已梟斬訖案九國志王宗弼傳唐師陷鳳州衍遣三招討屯三泉以拒唐師未戰三招討俱遁走因令宗弼守綿谷而誅三招討宗弼遂與三招討同送款於魏王乃還成都斬宋光嗣等函首送於魏王遷衍及母妻於西宮通鑑作李嚴至成都宗弼猶乘城為守備與九國志異壬子王衍遣使上表請降癸丑以吳越國馬步統軍使檢校太傅錢元球為檢校太尉守侍中充靜海軍節度使乙卯魏王至西川城北丙辰蜀主王衍出降語在衍傳案王衍出降在十一月丙辰通鑑與薛史同歐陽史作己酉蓋據其上牋歸命之日而先書之其實己酉唐師尚在綿州未入成都也五代春秋作十二月蜀王衍降尤誤丁巳大軍入成都法令嚴峻市不易肆自興師凡七十五日蜀平得兵士三萬兵仗七百萬糧三百五十三萬錢一百九十二萬貫金銀共二十二萬兩珠玉犀象二萬紋錦綾羅五十萬得節度州十郡六十四縣二百四十九己丑禮儀使奏貞簡皇太后升祔禮畢一應宗廟伎樂及諸祀並請仍舊從之十二月壬戌以前雲州節度使李存敬為同州節度使以同, WYG: 許}
