  - {type: variant, offset: 23, length: 0, content: '', WYG: 從太祖屯兵于西華破蔡賊王夏寨太祖臨陣馬踣賊衆來追甚急從周扶太祖上馬與賊軍格鬬傷面矢中于肱身被數槍奮命以衞太祖頼張延壽廻馬轉鬬從周與太祖俱免退軍溵水諸將並削職惟擢從周延壽為大校其後入長葛靈井大敗蔡賊至斤溝淝河殺鐵林三千人獲九寨都虞候王涓太祖遣郭言募兵于陜州有黄花子賊據于温谷從周擊破之又破秦賢之衆于榮陽尋佐朱珍收兵于淄青間時兖州齊克讓軍于任城從周敗之擒其將吕全真淄人不受制復與之戰獲其驍將鞏約㑹青州以歩騎萬餘人列三寨于金嶺以扼要害從周與朱珍大殱其衆據其將楊昭範五人而還至大梁不解甲徑至板橋擊蔡賊破盧瑭寨瑭自溺而死又于赤堈殺蔡軍二萬餘人從討謝殷于亳州擒之廻襲曹州擄刺史丘𢎞禮以歸與兖鄆軍遇于臨濮之劉橋殺數萬人朱瑄朱瑾僅以身免擒都將鄒務卿巳下五十人從太祖至范縣復與朱瑄戰擄尹萬榮等三人遂平濮州未幾與朱珍擊蔡賊于亳間獲都將石璠文徳元年魏博軍亂樂從訓來告急從太祖渡河拔黎陽李固臨河等鎮至内黄破魏軍萬餘衆獲其將周儒等十人李罕之引并人圍張全義于河陽從周與}
