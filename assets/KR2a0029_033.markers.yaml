  - {type: variant, offset: 878, length: 32, content: 撰冊文別定日命太尉上諡冊於西宮靈座同日差官告天地太微宮宗廟如常告, WYG: 來拒戰師古遣從周張存敬掩襲生擒張約李胡淑等都將數十人二年十月圍兗州兖人不出從周詐掦言并人鄆人來救即引軍趨高呉夜半却潛歸寨朱瑾果出兵攻外壕我軍士突出掩殺千餘人生擒都將張漢筠從周累立戰功自懷州刺史厯曹宿二州刺史累遷檢校左僕射三年五月并帥以大軍侵魏遣其子落落率二千騎屯洹水從周以馬歩二千人擊}
