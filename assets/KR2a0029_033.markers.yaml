  - {type: variant, offset: 4312, length: 941, content: 一妹張氏封瑤英長公主閏十二月甲午賜中書門下詔曰朕聞古先哲王臨御天下上則以無偏無黨為至治次則以足食足兵為遠謀緬惟前修誠可師範朕纂承鳳曆嗣守鴻圖三載於茲萬機是總非不知五兵未弭兆庶多艱蓋賴卿等寅亮居懷康濟為務冀盡賦輿之理洞詢盍徹之規今則潛按方區備聆謠俗或力役罕均其勞逸或賦租莫辨於後先但以督促為名煩苛不已被甲冑者何嘗充給趨朝省者轉困支持州閭之貨殖全疎天地之災祥屢應以至星辰越度越度原本作越展今據文改正影庫本粘籤旱澇不時農桑失業於丘園道殣相望於郊野生靈及此寢食寧遑豈非朕德政未孚焦勞自拙者耶朕昨親援毫翰軫念瘡痍一則詢爾謀猷一則表予宵旰未披來奏轉撓於懷敢不翼翼罪躬乾乾軫慮咨爾四岳弼予一人何不舉賢才裨寡昧百辟之內羣后之間莫不有盡忠者被掩其能抱器者艱陳其力或草澤有遺逸之士山林多屈滯之人爾所不知吾將安訪卿等位尊調鼎名顯代天既逢不諱之朝何吝由衷之說當宜歷告中外急訪英髦應在仕及前資文武官已下至草澤之士有濟國治民除姦革弊者並宜各獻封章朕當選擇施行其近宣御札亦告諭內外體朕意焉是時兩河大水戶口流亡者十四五都下供饋不充軍士乏食乃有鬻子去妻老弱採拾於野殍踣於行路者州郡飛輓旋給京師租庸使孔謙日於上東門外佇望其來案原本作尚東門據通鑑注云洛城東面三門中曰建春左曰上東右曰永春今改正舊五代史考異算而給之加以所在泥潦輦運艱難愁歎之聲盈於道路四方地震天象乖越帝深憂之問所司濟贍之術孔謙比以吏進故無保邦濟民之要務唯以急刻賦斂為事樞密承旨段徊奏曰臣見本朝時或遇歲時災歉國費不足天子將求經濟之要則內出朱書御札以訪宰臣請陛下依此故事行之即命學士草詞帝親札以訪宰臣非帝憂民之實也時宰相豆盧革等依阿狥旨竟無所陳但云陛下威德冠天下今西蜀平定珍寶甚多可以給軍水旱作沴天之常道不足以貽聖憂中官李紹宏奏曰俟魏王旋軍之後俟魏王原本脫王字今據文增入舊庫本粘籤若兵額漸多饋輓難給請且幸汴州以便漕輓時羣臣獻議者亦多大較詞理迂闊不中時病唯吏部尚書李琪引古田租之法從權救弊之道上疏言之帝優詔以奬之丁酉詔偽蜀私署官員等惟名與器不可假人況是遐僻偏方僭竊偽署因時亂而濫稱名位歸國體而悉合削除但恐當本朝屯否之時有歷代簪纓之士既陷彼土遂授偽官又慮有曾受本朝渥恩當時已居班秩須為升降不可通同應偽署官至太師太傅及三少并太尉司徒司空侍中中書令左右僕射已上並宜降至, WYG: ''}
