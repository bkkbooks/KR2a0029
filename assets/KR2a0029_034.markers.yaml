  - {type: variant, offset: 3214, length: 282, content: 影庫本粘籤魏王繼岌傳送郭崇韜父子首函至闕下詔張全義收瘞之乙巳以右武衞上將軍李肅為安邑解縣兩池榷鹽使以吏部尚書李琪為國計使三月丁未朔案通鑑作丁巳朔與薛史異李紹真奏收復邢州擒賊首趙太等二十一人狥於鄴都城下皆磔於軍門庚戌李紹真自邢州赴鄴都城下案通鑑作庚申李紹真引兵至鄴都營於城西北以太等狥於鄴城下而殺之與薛史異辛亥以威武軍節度副使福建管內都指揮使檢校太傅守江州刺史王延翰為福建節度使依前檢校太傅壬子李嗣源領軍至鄴都營於西南隅甲寅進營於觀音門外下令諸軍詰旦攻城是夜城下軍亂案通鑑作壬戌李嗣源至鄴都甲子夜軍亂考異引莊宗實錄作壬戌至鄴都癸亥夜軍士張破敗作亂與薛史異日通鑑從薛史, WYG: ''}
