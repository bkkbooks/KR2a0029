  - {type: variant, offset: 2615, length: 584, content: 據十國春秋改正影庫本粘籤不獲東歸是日飛龍使顏思威部署西川宮人至辛亥淮南楊溥遣使貢方物西京上言客省使李嚴押蜀主王衍至本府壬子以守太尉中書令河南尹兼河陽節度使齊王張全義為檢校太師兼尚書令充許州節度使東川董璋奏準詔誅遂州節度使李令德於本州夷其族癸丑湖南馬殷奏湖南馬殷原本脫馬字今據文增入影庫本粘籤福建節度使王審知疾甚副使王延翰已權知軍府事請降旄節司天監上言自二月上旬後晝夜陰雲不見天象自二十六日方晴至月終星辰無變以右衞上將軍朱漢賓知河南府事甲辰命蕃漢總管李嗣源統親軍赴鄴都以討趙在禮帝素倚愛元行欽鄴城軍亂即命為行營招討使久而無功時趙太據邢州王景戡據滄州自為留後河朔郡邑多殺長吏帝欲親征樞密使與宰臣奏言京師者天下根本雖四方有變陛下宜居中以制之但命將出征無煩躬御士伍帝曰紹榮討亂未有成功繼岌之軍尚留巴漢餘無可將者斷在自行樞密使李紹宏等奏曰陛下以謀臣猛將取天下今一州之亂而云無可將者何也總管李嗣源是陛下宗臣創業已來艱難百戰何城不下何賊不平威略之名振於夷夏以臣等籌之若委以專征鄴城之寇不足平也帝素寬大容納無疑於物自誅郭崇韜朱友謙之後閹宦伶官交相讒諂邦國大事皆聽其謀繇是漸多猜惑不欲大臣典兵既聞奏議乃曰予恃嗣源侍衞卿當擇其次者又奏曰以臣等料之非嗣源不可河南尹張全義亦奏云河朔多事久則患生宜令總管進兵如倚李紹榮輩未見其功帝乃命嗣源行營是日延州知州白彥琛奏綏銀兵士剽州城謀叛綏銀原本作經銀, WYG: ''}
