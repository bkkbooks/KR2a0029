  - {type: variant, offset: 122, length: 1548, content: 稅賦並與放免自壬午年已前所欠殘稅及諸色課利已有勅命放免者尚聞所在却有徵收宜令租庸司切準前勅處分應京畿內人戶有停貯斛斗者並令減價出糶如不遵行當令檢括西川王衍父子及偽署將相官吏除已行刑憲外一切釋放天下禁囚除十惡五逆官典犯贓屠牛毀錢放火劫舍持刃殺人準律常赦不原外應合抵極刑者遞降一等其餘罪犯悉與減降逃背軍健並放逐便癸亥河中節度使李繼麟來朝諸州上言準宣為去年十月地震集僧道起消災道場甲子魏王繼岌殺樞密使郭崇韜於西川夷其族丙寅百官上表請復常膳凡三上表乃允之西川行營都監李廷安進西川樂官進西川樂官原本脫西字今據文增入影庫本粘籤二百九十八人契丹寇女真渤海戊寅契丹阿保機遣使貢良馬庚辰帝異母弟鄜州節度使存乂伏誅存乂郭崇韜之子壻也故亦及於禍是日以河中節度使守太師兼尚書令西平王李繼麟為滑州節度使尋令朱守殷以兵圍其第案歐陽史作圍其館胡三省云歐陽史蓋謂朱友謙無私第在洛陽也據雲谷雜記唐末藩鎮入朝館舍皆稱邸第似無庸更易其字通鑑仍從薛史作第舊五代史考異誅之夷其族辛巳吐渾奚各遣使貢馬鎮州上言部民凍死者七千二百六十人又奏準宣進花果樹栽及抽樂人梅審鐸赴京甲申以鄆州節度使永王存霸為河中節度使以滑州節度使申王存渥為鄆州節度使乙酉內人景姹上言昭宗遇難之時皇屬千餘人同時遇害為三穴瘞於宮城西古龍興寺北請改葬從之仍詔河南府監護其事丙戌迴鶻可汗阿咄欲遣使貢良馬鎮州上言平棘等四縣部民餓死者二千五十人丁亥詔朱友謙同惡人史武等七人已當國法並籍沒家產武等友謙舊將時皆為刺史並以無罪族誅案通鑑云友謙舊將史武等七人時為刺史皆坐族誅蓋以薛史為據於七人姓名不為全載考歐陽史丁亥殺李繼麟之將史武薛敬容周唐殷楊師太王景來仁白奉國可補薛史所未備二月己丑以宣徽南院使南院原本作北院考歐陽史及通鑑俱作南院今改正影庫本粘籤知內侍省兼內勾特進右領軍衞上將軍李紹宏為驃騎大將軍守左武衞上將軍知內侍省充樞密使甲午以鄭州刺史李紹奇為河陽節度使以樂人景進為銀青光祿大夫檢校右散騎常侍守御史大夫進以俳優嬖幸善采訪閭巷鄙細事以啟奏復密求妓媵以進恩寵特厚魏州錢穀諸務及招兵市馬悉委進監臨孔謙附之以希寵常呼為八哥諸軍左右無不托附至於士人亦有因之而求仕進者每入言事左右紛然屏退惟以陷害熒惑為意焉是日帝幸冷泉校獵乙未宰臣豆盧革上言請支州縣官實奉以責課效丙申武德使史彥瓊自鄴馳報稱今月六日貝州屯駐兵士突入都城剽劫坊市初帝令魏博指揮使楊仁晸率兵戍瓦橋至是代歸有詔令駐於貝州上歲天下大水十月鄴地大震自是居人或有亡去他郡者每日族談巷語云城將亂矣人人恐悚皆不自安十二月以戶部尚書王正言為興唐尹為興唐尹原本脫唐字今據列傳增入影庫本粘籤知留守事正言年耄風病事多忽忘比無經治之才武德使史彥瓊者以伶官得幸帝待以腹心之任都府之中威福自我正言以下皆脅肩低首曲事不暇由是政無統攝姦人得以窺圖洎郭崇韜伏誅人未測其禍始皆云崇韜已殺繼岌自王西川故盡誅郭氏先是有密詔令史彥瓊殺朱友謙之子澶州刺史建徽史彥瓊夜半出城不言所往詰旦閽報正言曰史武德夜半馳馬而去不知何往是日人情震駭訛言云劉皇后以繼岌死於蜀已行弒逆帝已晏駕故急徵彥瓊其言播於鄴市貝州軍士有私寧親於都下者掠此言傳於貝州軍士皇甫暉等因夜聚蒱博不勝遂作亂劫都將楊仁晸曰我輩十有餘年為國家効命甲不離體已至吞併天下主上未垂恩澤翻有猜嫌防戍邊遠經年離阻鄉國及得代歸去家咫尺不令與家屬相見今聞皇后弒逆京邑已亂將士各欲歸府寧親請公同行仁晸曰汝等何謀之過耶今英主在上天下一家從駕精兵不下百萬西平巴蜀威振華夷公等各有家族何事如此軍人乃抽戈露刃環仁晸曰三軍怨怒咸欲謀反苟不聽從須至無禮仁晸曰吾非不知此但丈夫舉事須計萬全軍人即斬仁晸裨將趙在禮聞軍亂衣不及帶將踰垣而遁亂兵追及白刃環之曰公能為帥否否則頭隨刃落在禮懼即曰吾能為之眾遂呼譟中夜燔劫貝郡詰旦擁在禮趨臨清剽永濟館陶永濟原本作求齊, WYG: ''}
