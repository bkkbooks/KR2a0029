  - {type: variant, offset: 2343, length: 266, content: 渙汗某等亦不敢不改過自新行欽曰上以汝輩有社稷功必行赦宥因以詔書諭之皇甫暉聚眾大詬即壞詔行欽以聞帝怒曰收城之日勿遺噍類壬寅行欽自鄴退軍保澶州甲辰從馬直宿衞軍士王溫等五人夜半謀亂殺本軍使為衞兵所擒磔於本軍之門丙辰以右散騎常侍韓彥惲為戶部侍郎丁未鄴都行營招撫使元行欽率諸道之師再攻鄴都戊申以洋州留後李紹文為夔州節度使詔河中節度使永王存霸歸藩己酉以樞密使宋唐玉為特進左威衞上將軍充宣徽南院使庚戌諸軍大集於鄴都進攻其城不克行欽又大治攻具城中知其無赦晝夜為備朝廷聞之益恐連發中使促繼岌西征之師繼岌以康延孝據漢州中軍之士從任圜進討繼岌端居利州利州, WYG: 周}
