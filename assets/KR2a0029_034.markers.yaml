  - {type: variant, offset: 3500, length: 664, content: 考異迫嗣源為帝遲明亂軍擁嗣源及霍彥威入於鄴城復為皇甫暉等所脅嗣源以詭詞得出詭詞原本作詭記今據文改正影庫本粘籤夜分至魏縣時嗣源遙領鎮州詰旦議欲歸藩上章請罪安重誨以為不可語在明宗紀中翌日遂次於相州元行欽部下兵退保衞州以飛語上奏嗣源一日之中遣使上章申理者數四帝遣嗣源子從審案從審歐陽史作從璟考通鑑從審自衞州歸莊宗賜名繼璟與歐陽史異與中使白從訓齎以諭嗣源行至衞州從審為元行欽所械不得達是日西面行營副招討使任圜奏收復漢州擒逆賊康延孝丙辰荊南高季興上言請割峽內夔忠萬等三州却歸當道依舊管係又請雲安監初將議伐蜀詔高季興令率本軍上峽自收元管屬郡軍未進夔忠萬三州已降季興數請之因賂劉皇后及宰臣樞密使內外叶附乃俞其請戊午詔河南府預借今年秋夏租稅時年飢民困百姓不勝其酷京畿之民多號泣於路議者以為劉盆子復生矣庚申詔潞州節度使孔勍赴闕以右龍虎統軍安崇阮權知潞州是日忠武軍節度使齊王張全義薨壬戌宰臣豆盧革率百官上表以魏博軍變請出內府金帛優給將士不報時知星者上言客星犯天庫宜散府藏又云流星犯天棓主御前有急兵帝召宰臣於便殿皇后出宮中塟匳銀盆各二并皇子滿哥三人滿哥原本作蒲哥今據歐陽史家人傳改正影庫本粘籤謂宰臣曰外人謂內府金寶無數向者諸侯貢獻旋供賜與今宮中有者塟匳嬰孺而已可鬻之給軍革等惶恐而退癸亥以偽置昭武軍節度使林思諤為閬州刺史是日出錢帛給賜諸軍兩樞密使及宋唐玉景進等各貢助軍錢幣是時軍士之家乏食婦女掇蔬於野及優給軍人皆負物而詬曰吾妻子已殍矣用此奚為甲子元行欽自衞州率部下兵士歸帝幸耀店以勞之案通鑑作鷂店胡三省注云薛史作耀店今仍其舊舊五代史考異西川輦運金銀四, WYG: 巻}
