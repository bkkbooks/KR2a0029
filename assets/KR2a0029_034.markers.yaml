  - {type: variant, offset: 4165, length: 1987, content: 萬至闕分給將士有差元行欽請車駕幸汴州帝將發京師遣中官向延嗣馳詔所在誅蜀主王衍仍夷其族乙丑車駕發京師戊辰遣元行欽將騎軍沿河東向壬申帝至滎澤以龍驤馬軍八百騎為前軍遣姚彥溫董之彥溫行至中牟率所部奔於汴州時潘環守王村寨有積粟數萬亦奔汴州是時李嗣源已入於汴帝聞諸軍離散精神沮喪至萬勝鎮即命旋師登路旁荒塚置酒視諸將流涕俄有野人進雉因問塚名對曰里人相傳為愁臺帝彌不悅罷酒而去是夜次汜水初帝東出關從駕兵二萬五千及復至汜水已失萬餘騎乃留秦州都指揮使張塘以步騎三千守關帝過甖子谷甖子谷原本作罌子谷考舊唐書甖子谷在成臯通鑑亦作甖今改影庫本粘籤道路險狹每遇衞士執兵仗者皆善言撫之曰適報魏王繼岌又進納西川金銀五十萬到京當盡給爾等軍士對曰陛下賜與太晚人亦不感聖恩帝流涕而已又索袍帶賜從官內庫使張容哥對曰頒給已盡衞士叱容哥曰致吾君社稷不保是此閹豎抽刀逐之或救而獲免容哥謂同黨曰皇后惜物不散軍人歸罪於吾輩事若不測吾輩萬段願不見此禍因投河而死案隆平集內臣李承進逮事唐莊宗太祖嘗問莊宗時事對曰莊宗好畋獵每次近郊衞士必控馬首曰兒郎輩寒冷望陛下與救接莊宗隨所欲給之如此者非一晚年蕭牆之禍由賞賚無節威令不行也太祖歎曰二十年夾河戰爭不能以軍法約束此輩誠兒戲舊五代史考異甲戌次石橋案通鑑作甲申次石穚西與薛史異歐陽史作甲戌至自萬勝與薛史合帝置酒野次悲啼不樂謂元行欽等諸將曰鄴下亂離寇盜蜂起總管迫於亂軍存亡未測今訛言紛擾朕實無聊卿等事余已來富貴急難無不共之今茲危賴爾籌謀而竟默默無言坐觀成敗予在滎澤之日欲單騎渡河訪求總管面為方略招撫亂軍卿等各吐胸襟共陳利害今日俾余至此卿等如何元行欽等百餘人垂泣而奏曰臣本小人蒙陛下撫養位極將相危難之時不能立功報主雖死無以塞責乞申後効以報國恩於是百餘人皆援刀截髮置髻於地以斷首自誓上下無不悲號識者以為不祥是日西京留守張筠部署西征兵士到京見於上東門外晡晚帝還宮初帝在汜水衞兵散走京師恐駭不寧及帝至人情稍安乙亥百官進名起居安義節度使孔勍奏點校兵士防城準詔運糧萬石進發次時勍已殺監軍使據城詭奏也丙子樞密使李紹宏與宰相豆盧革韋說會於中興殿之廊下商議軍機因奏魏王西征兵士將至車駕且宜控汜水宜控汜水原本作宜撫汜水今從通鑑改正影庫本粘籤以俟魏王從之午時帝出上東門親閱騎軍誡以詰旦東幸申時還宮四月丁丑朔案歐陽史及通鑑五代春秋俱作四月丁亥朔考遼史天顯元年即同光四年亦作四月丁亥朔唯薛史作丁丑與諸書異案是年正月係戊午朔三月係丁未朔則四月朔日自當為丁丑蓋薛史據當時實錄其月日有可徵信也以永王存霸為北都留守申王存渥為河中節度使是日車駕將發京師從駕馬軍陳於宣仁門外步兵陳於五鳳門外帝內殿食次從馬直指揮使郭從謙自本營率所部抽戈露刃至興教門大呼與黃甲兩軍引弓射興教門帝聞其變自宮中率諸王近衞禦之逐亂兵出門既而焚興教門緣城而入登宮牆讙譟帝御親軍格鬬殺亂兵數百俄而帝為流矢所中亭午崩於絳霄殿之廡下時年四十三琬琰集載宋實錄王全斌傳云同光末蕭牆有變亂兵逼宮城近臣宿將皆釋甲潛遁惟全斌與符彥卿等十數人居中拒戰莊宗中流矢扶掖歸絳霄殿全斌慟哭而去東都事略符彥卿傳云郭從謙之亂莊宗左右皆引去惟彥卿力戰殺十餘人莊宗崩彥卿慟哭而去參考薛史何福進傳時莊宗親軍惟彥卿福進數十而已是時帝之左右例皆奔散唯五坊人善友案通鑑作鷹坊人善友胡三省注云鷹坊唐時五坊之一也善姓也舊五代史考異斂廊下樂器簇於帝尸之上發火焚之及明宗入洛止得其燼骨而已天成元年七月丁卯有司上諡曰光聖神閔孝皇帝廟號莊宗是月丙子葬於雍陵永樂大典卷七千一百五十八五代史補莊宗之嗣位也志在渡河但恨河東地狹兵少思欲百練其眾以取必勝於天下乃下令曰凡出師騎軍不見賊不許騎馬或步騎前後已定不得越軍分以避險惡其分路並進期會有處不得違晷刻幷在路敢言病者皆斬之故三軍懼法而戮力皆一以當百故朱梁舉天下而不能禦卒為所滅良有以也初莊宗為公子雅好音律又能自撰曲子詞其後凡用軍前後隊伍皆以所撰詞授之使揭聲而唱謂之御製至於入陣不論勝負馬頭纔轉則眾歌齊作故凡所鬬戰人忘其死斯亦用軍之一奇也莊宗好獵每出未有不蹂踐苗稼一旦至中牟圍合忽有縣令忘其姓名犯圍諫曰大凡有國家者當視民如赤子性命所繫陛下以一時之娛恣其蹂踐使比屋囂然動溝壑之慮為民父母豈其若是耶莊宗大怒以為遭縣令所辱遂叱退將斬之伶官鏡新磨者知其不可乃與羣伶齊進挽住令佯為詬責曰汝為縣令可以指麾百姓為兒既天子好獵即合多留閑地安得縱百姓耕鋤皆徧妨天子鷹犬飛走耶而又不能自責更敢咄咄吾知汝當死罪諸伶亦皆嘻笑繼和於是莊宗默然其怒少霽頃之恕縣令罪五代史闕文莊宗嘗因博戲覩骰子采有暗相輪者心悅之乃自置暗箭格凡博戲並認采之在下者及同光末鄴都兵亂從謙以兵犯興教門莊宗禦之中流矢而崩識者以為暗箭之應史臣曰莊宗以雄圖而起河汾以力戰而平汴洛家讎既雪國祚中興雖少康之嗣夏配天光武之膺圖受命亦無以加也然得之孔勞失之何速豈不以驕於驟勝逸於居安忘櫛沐之艱難狥色禽之荒樂外則伶人亂政內則牝雞司晨靳吝貨財激, WYG: ''}
