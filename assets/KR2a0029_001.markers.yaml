  - {type: variant, offset: 2722, length: 3289, content: 真傳云真以奇兵襲取滑州乃署為滑州節度留後蓋全忠雖嘗兼領義成而不之鎮故署其將胡真為留後十二月僖宗降制就加帝檢校太傅改封吳興郡王食邑三千戶是歲鄭州為蔡賊所陷刺史李璠單騎來奔帝宥而納之以為行軍司馬宗權既得鄭益驕帝遣裨將邏於金隄驛與賊相遇因擊之賊衆大敗追至武陽橋斬首千餘級帝每與蔡人戰於四郊既以少擊衆常出奇以制之但患師少未快其旨宗權又以己衆十倍於帝恥於頻敗乃誓衆堅決以攻夷門既而獲蔡之諜者備知其事遂謀濟師焉三年春二月乙巳承制以朱珍為淄州刺史俾募兵於東道且慮蔡人暴其麥苗期以夏首回歸案自募兵於東道至此亦見通鑑注與冊府元龜同珍既至淄棣旬日之內應募者萬餘人又潛襲青州獲馬千匹鎧甲稱是乃鼓行而歸四月辛亥達於夷門帝喜曰吾事濟矣是時賊將張晊屯於北郊秦賢屯於版橋各有衆數萬樹柵相連二十餘里其勢甚盛帝謂諸將曰此賊方今息師蓄銳以俟時必來攻我況宗權度我兵少又未知珍來謂吾畏懼止於堅守而已今出不意不如先擊之乃親引兵攻秦賢寨將士踴躍爭先賊果不備連拔四寨斬首萬餘級時賊衆以為神助庚午案通鑑考異云長曆四月甲辰朔無庚午薛史誤今考舊唐書光啟三年四月正作甲辰朔以日數計之庚午乃四月二十七日也此非薛史之誤乃通鑑考異之誤耳賊將盧瑭領萬餘人於圃田北萬勝戍夾汴水為營跨河為梁以扼運路案通鑑注引薛史梁紀曰盧瑭於圃田北夾汴為梁以扼運路視冊府元龜所引稍有刪節帝擇精銳以襲之是日昏霧四合兵及賊壘方覺遂突入掩殺赴水死者甚衆盧瑭自投於河河南諸賊連敗不敢復駐皆併在張晊寨自是蔡寇皆懷震讋往往軍中自相驚亂帝旋師休息大行犒賞繇是軍士各懷憤激每遇敵無不奮勇五月丙子出酸棗門自卯至未短兵相接賊衆大敗追斬二十餘里僵仆相枕宗權恥敗益縱其虐乃自鄭州親領突將數人逕入張晊寨冊府元龜卷一百八十七其日晚大星隕於賊壘有聲如雷永樂大典卷三千二百七十一辛巳兗鄆滑軍士皆來赴援乃陳兵於汴水之上旌旗器甲甚盛蔡人望之不敢出寨翌日分布諸軍齊攻賊寨自寅至申斬首二萬餘級會夜收軍獲牛馬輜重生口器甲不可勝計是夜宗權晊遁去遲明追之至陽武橋而還宗權至鄭州乃盡焚其廬舍屠其郡人而去始蔡人分兵寇陝雒孟懷許汝皆先據之因是敗也賊衆恐懼咸棄之而遁帝乃慎選將佐俾完葺壁壘為戰守之備於是遠近流亡復歸者衆矣是時揚州節度使高駢為裨將畢師鐸所害復有孫儒楊行密互相攻伐朝廷不能制乃就加帝檢校太尉兼領淮南節度使案舊唐書光啟三年十一月楊行密遣使求援於朱全忠制授全忠檢校太尉侍中兼揚州大都督府長史充淮南節度觀察使行營兵馬都統歐陽史作十二月通鑑作閏十一月據薛史則全忠兼領淮南自在九月以前與諸書異又薛史下文作閏十二月而通鑑作閏十一月亦有互異九月亳州裨將謝殷逐刺史宋衮自據其郡帝親領軍屯於太清宮遣霍存討平之案新唐書云光啟三年六月壬戌亳州將謝殷逐其刺史宋衮八月壬寅謝殷伏誅通鑑從新唐書薛史作九月與新唐書異帝之禦蔡寇也鄆州朱瑄案歐陽史作朱宣薛史前後皆作瑄舊唐書通鑑並同薛史朱瑄歐陽史作朱宣曾三異云流俗本宣傍加玉非也今考舊唐書及通鑑皆作瑄蓋朱瑾朱瑄兄弟命名皆從玉今仍從薛史原文加案聲明影庫本粘籤兗州朱瑾皆領兵來援及宗權既敗帝以瑄瑾宗人也又有力於己皆厚禮以歸之瑄瑾以帝軍士勇悍私心愛之乃密於曹濮界上懸金帛以誘之帝軍利其貨而赴者甚衆帝乃移檄以讓之朱瑄來詞不遜案通鑑考異引高若拙後史補曰梁太祖皇帝到梁園深有大志然兵力不足常欲外掠又虞四境之難每有鬱然之狀時有薦敬秀才於門下乃白梁祖曰明公方欲圖大事輜重必為四境所侵但令麾下將士詐為叛者而逃即明公奏於主上及告四隣以自襲叛徒為名梁祖曰天降奇人以佐於吾初從其議一出而致衆十倍今案高若拙所紀深得敬翔與梁祖陰謀情狀薛史止據梁實錄原辭未及改正歐史作移檄兗鄆誣其誘汴亡卒以東亦未詳考乃命朱珍侵曹伐濮以懲其姦未幾珍伐曹州執刺史丘禮以獻遂移兵圍濮兗鄆之釁自茲而始矣十月僖宗命水部郎中王贊撰紀功碑以賜帝是月帝親騎數千巡師於濮上帝親騎數千以文義求之親字上疑脫帥字今無別本可校姑仍其舊附識於此影庫本粘籤因破朱瑄援師於范縣丁未攻陷濮州刺史朱裕單騎奔鄆尋為鄆人所敗踰月乃還十二月僖宗遣使賜帝鐵券又命翰林承旨劉崇望撰德政碑以賜帝閏月甲寅帝請行軍司馬李璠權知淮南留後乃遣大將郭言領兵援送以赴揚州文德元年正月帝率師東赴淮海行次宋州聞楊行密已拔揚州遂還是時李璠郭言行至淮上為徐戎所扼不克進而還案歐陽史云璠之揚州行密不納據通鑑云李璠至泗州時溥以兵襲之郭言力戰得免而還是李璠未嘗得至揚州也當以薛史為實錄帝怒遂謀伐徐二月丙戌僖宗制以帝為蔡州四面行營都統繇是諸鎮之師皆受帝之節制案新唐書正月癸亥朱全忠為蔡州四面行營都統舊唐書作五月與薛史異通鑑從新唐書三月庚子昭宗即位是月蔡人石璠領萬衆以剽陳亳帝遣朱珍率精騎數千擒璠以獻四月戊辰魏博樂彥禎失律其子從訓出奔相州使來乞師帝遣朱珍領大軍濟河連收黎陽臨河二邑既而魏軍推小校羅弘信為帥弘信既立遣使送發於汴帝優而納之遂命班師是月河南尹張全義襲李罕之於河陽克之罕之單騎出奔因乞師於太原李克用為發萬騎以援之罕之遂收其衆偕晉軍合勢急攻河陽全義危急遣使求救於汴帝遣丁會牛存節葛從周領兵赴之大戰於溫縣晉人與罕之俱敗於是河橋解圍全義歸於河陽因以丁會為河陽留後五月己亥昭宗制以帝檢校侍中增食邑三千戶戊辰詔改帝鄉曰衣錦鄉里曰沛王里是月帝以兼有洛孟之地無西顧之患將大整師徒畢力誅蔡會蔡人趙德諲舉漢南之地以歸於朝廷案新唐書昭宗紀五月壬寅趙德諲以襄州降舊唐書及通鑑皆作五月與薛史同歐陽史其事於三月以前疑有舛誤且遣使送於帝仍誓戮力同討宗權帝表其事朝廷因以德諲為蔡州四面副都統又以河陽保義義昌三節度為帝行軍司馬兼糧料應接使冊府元龜卷一百八十七至是帝領諸侯之師會德諲以伐蔡賊於汝水之上遂薄其城五日之內樹二十八寨以環之蓋象列宿之數也永樂大典卷一萬五千一百二十時帝親臨矢石一日飛矢中其左腋血漬單衣顧謂左右曰勿洩永樂大典卷二萬七百十二九月以糧運不繼遂班師是時帝知宗權殘孽不足為患遂移兵以伐徐十月先遣朱珍領兵與時溥戰於吳康鎮徐人大敗連收豐蕭二邑溥攜散騎馳入彭門帝命分兵以攻宿州刺史張友攜符印以降既而徐人閉壁堅守遂命龐師古屯兵守之而還是月蔡賊孫儒攻陷揚州自稱淮南節度使龍紀元年正月龐師古攻下宿遷縣進軍於呂梁時溥領軍二萬晨壓師古之軍而陣師古促戰敗之斬首二千餘級溥復入於彭門二月蔡將申叢遣使來告縛秦宗權於帳下折其足而囚之矣案舊唐書文德元年十二月甲子朔蔡州牙將申叢執秦宗權新唐書作十一月辛酉與舊唐書月日互異薛史作龍紀元年二月蓋即其遣使來告之月而書之也歐陽史作正月誤帝即日承制以叢為淮西留後未幾叢復為都將郭璠所殺是月璠執宗權來獻帝遣行軍司馬李璠牙校朱克讓檻進於長安既至昭宗御延喜樓受俘即斬宗權於獨柳樹下蔡州平昭宗詔加帝食實封一百戶賜莊宅各一區三月又加帝檢校太尉兼中書令進封東平王賞平蔡之功也案舊唐書四月壬戌朔以宣武淮南等節度副大使知節度事管內營田觀察處置等使開府儀同三司檢校太傅兼侍中揚州大都督府長史汴州刺史充蔡州四面行營都統上柱國沛郡王食邑四千戶朱全忠為檢校太尉中書令進封東平王仍賜賞軍錢十萬貫薛史及歐陽史俱作三月與舊唐書異大順元年四月丙辰宿州小將張筠逐刺史張紹光擁衆以附時溥帝率親軍討之殺千餘人筠遂堅守乙卯時溥出兵暴碭山縣帝遣朱友裕以兵襲之敗徐軍三千餘衆獲沙援軍石君和等三十人斬於宿州城下六月辛酉淮南孫儒遣使修好於帝帝表其事請以淮南節度授於儒焉辛未昭宗命帝為宣義軍節度使充河東東面行營招討使案舊唐書五月以宣武軍節度使朱全忠為太原東南面招討使歐陽史從舊唐書作東南面通鑑作南面與舊唐書異考新唐書云五月以朱全忠為南面招討使六月辛未朱全忠為河東東面行營招討使蓋先為南面招討使後改東面也又六月全忠兼領宣義軍新舊唐書皆不載通鑑用薛史時朝廷宰臣張濬將兵討太原故也八月甲寅昭義都將馮霸殺沙所署節度使李克恭來降帝請河陽節度使朱崇節為潞州留後戊辰李克用自率蕃漢步騎數萬以圍潞州帝遣葛從周率驍勇之士夜中銜枚犯圍而入於潞案舊唐書五月潞州軍亂殺其帥李克恭七月朱全忠遣大將葛從周率千騎入潞州薛史統作八月蓋據入潞之月而追言之也九月壬寅帝至河陽遣都將李讜引軍趨澤潞行至馬牢川為晉人所敗帝又遣朱友裕張全義率精兵至澤州北以為應援既而崇節從周棄潞來歸戊申帝廷責諸將敗軍之罪斬, WYG: 規}
  - {type: variant, offset: 2722, length: 3289, content: 真傳云真以奇兵襲取滑州乃署為滑州節度留後蓋全忠雖嘗兼領義成而不之鎮故署其將胡真為留後十二月僖宗降制就加帝檢校太傅改封吳興郡王食邑三千戶是歲鄭州為蔡賊所陷刺史李璠單騎來奔帝宥而納之以為行軍司馬宗權既得鄭益驕帝遣裨將邏於金隄驛與賊相遇因擊之賊衆大敗追至武陽橋斬首千餘級帝每與蔡人戰於四郊既以少擊衆常出奇以制之但患師少未快其旨宗權又以己衆十倍於帝恥於頻敗乃誓衆堅決以攻夷門既而獲蔡之諜者備知其事遂謀濟師焉三年春二月乙巳承制以朱珍為淄州刺史俾募兵於東道且慮蔡人暴其麥苗期以夏首回歸案自募兵於東道至此亦見通鑑注與冊府元龜同珍既至淄棣旬日之內應募者萬餘人又潛襲青州獲馬千匹鎧甲稱是乃鼓行而歸四月辛亥達於夷門帝喜曰吾事濟矣是時賊將張晊屯於北郊秦賢屯於版橋各有衆數萬樹柵相連二十餘里其勢甚盛帝謂諸將曰此賊方今息師蓄銳以俟時必來攻我況宗權度我兵少又未知珍來謂吾畏懼止於堅守而已今出不意不如先擊之乃親引兵攻秦賢寨將士踴躍爭先賊果不備連拔四寨斬首萬餘級時賊衆以為神助庚午案通鑑考異云長曆四月甲辰朔無庚午薛史誤今考舊唐書光啟三年四月正作甲辰朔以日數計之庚午乃四月二十七日也此非薛史之誤乃通鑑考異之誤耳賊將盧瑭領萬餘人於圃田北萬勝戍夾汴水為營跨河為梁以扼運路案通鑑注引薛史梁紀曰盧瑭於圃田北夾汴為梁以扼運路視冊府元龜所引稍有刪節帝擇精銳以襲之是日昏霧四合兵及賊壘方覺遂突入掩殺赴水死者甚衆盧瑭自投於河河南諸賊連敗不敢復駐皆併在張晊寨自是蔡寇皆懷震讋往往軍中自相驚亂帝旋師休息大行犒賞繇是軍士各懷憤激每遇敵無不奮勇五月丙子出酸棗門自卯至未短兵相接賊衆大敗追斬二十餘里僵仆相枕宗權恥敗益縱其虐乃自鄭州親領突將數人逕入張晊寨冊府元龜卷一百八十七其日晚大星隕於賊壘有聲如雷永樂大典卷三千二百七十一辛巳兗鄆滑軍士皆來赴援乃陳兵於汴水之上旌旗器甲甚盛蔡人望之不敢出寨翌日分布諸軍齊攻賊寨自寅至申斬首二萬餘級會夜收軍獲牛馬輜重生口器甲不可勝計是夜宗權晊遁去遲明追之至陽武橋而還宗權至鄭州乃盡焚其廬舍屠其郡人而去始蔡人分兵寇陝雒孟懷許汝皆先據之因是敗也賊衆恐懼咸棄之而遁帝乃慎選將佐俾完葺壁壘為戰守之備於是遠近流亡復歸者衆矣是時揚州節度使高駢為裨將畢師鐸所害復有孫儒楊行密互相攻伐朝廷不能制乃就加帝檢校太尉兼領淮南節度使案舊唐書光啟三年十一月楊行密遣使求援於朱全忠制授全忠檢校太尉侍中兼揚州大都督府長史充淮南節度觀察使行營兵馬都統歐陽史作十二月通鑑作閏十一月據薛史則全忠兼領淮南自在九月以前與諸書異又薛史下文作閏十二月而通鑑作閏十一月亦有互異九月亳州裨將謝殷逐刺史宋衮自據其郡帝親領軍屯於太清宮遣霍存討平之案新唐書云光啟三年六月壬戌亳州將謝殷逐其刺史宋衮八月壬寅謝殷伏誅通鑑從新唐書薛史作九月與新唐書異帝之禦蔡寇也鄆州朱瑄案歐陽史作朱宣薛史前後皆作瑄舊唐書通鑑並同薛史朱瑄歐陽史作朱宣曾三異云流俗本宣傍加玉非也今考舊唐書及通鑑皆作瑄蓋朱瑾朱瑄兄弟命名皆從玉今仍從薛史原文加案聲明影庫本粘籤兗州朱瑾皆領兵來援及宗權既敗帝以瑄瑾宗人也又有力於己皆厚禮以歸之瑄瑾以帝軍士勇悍私心愛之乃密於曹濮界上懸金帛以誘之帝軍利其貨而赴者甚衆帝乃移檄以讓之朱瑄來詞不遜案通鑑考異引高若拙後史補曰梁太祖皇帝到梁園深有大志然兵力不足常欲外掠又虞四境之難每有鬱然之狀時有薦敬秀才於門下乃白梁祖曰明公方欲圖大事輜重必為四境所侵但令麾下將士詐為叛者而逃即明公奏於主上及告四隣以自襲叛徒為名梁祖曰天降奇人以佐於吾初從其議一出而致衆十倍今案高若拙所紀深得敬翔與梁祖陰謀情狀薛史止據梁實錄原辭未及改正歐史作移檄兗鄆誣其誘汴亡卒以東亦未詳考乃命朱珍侵曹伐濮以懲其姦未幾珍伐曹州執刺史丘禮以獻遂移兵圍濮兗鄆之釁自茲而始矣十月僖宗命水部郎中王贊撰紀功碑以賜帝是月帝親騎數千巡師於濮上帝親騎數千以文義求之親字上疑脫帥字今無別本可校姑仍其舊附識於此影庫本粘籤因破朱瑄援師於范縣丁未攻陷濮州刺史朱裕單騎奔鄆尋為鄆人所敗踰月乃還十二月僖宗遣使賜帝鐵券又命翰林承旨劉崇望撰德政碑以賜帝閏月甲寅帝請行軍司馬李璠權知淮南留後乃遣大將郭言領兵援送以赴揚州文德元年正月帝率師東赴淮海行次宋州聞楊行密已拔揚州遂還是時李璠郭言行至淮上為徐戎所扼不克進而還案歐陽史云璠之揚州行密不納據通鑑云李璠至泗州時溥以兵襲之郭言力戰得免而還是李璠未嘗得至揚州也當以薛史為實錄帝怒遂謀伐徐二月丙戌僖宗制以帝為蔡州四面行營都統繇是諸鎮之師皆受帝之節制案新唐書正月癸亥朱全忠為蔡州四面行營都統舊唐書作五月與薛史異通鑑從新唐書三月庚子昭宗即位是月蔡人石璠領萬衆以剽陳亳帝遣朱珍率精騎數千擒璠以獻四月戊辰魏博樂彥禎失律其子從訓出奔相州使來乞師帝遣朱珍領大軍濟河連收黎陽臨河二邑既而魏軍推小校羅弘信為帥弘信既立遣使送發於汴帝優而納之遂命班師是月河南尹張全義襲李罕之於河陽克之罕之單騎出奔因乞師於太原李克用為發萬騎以援之罕之遂收其衆偕晉軍合勢急攻河陽全義危急遣使求救於汴帝遣丁會牛存節葛從周領兵赴之大戰於溫縣晉人與罕之俱敗於是河橋解圍全義歸於河陽因以丁會為河陽留後五月己亥昭宗制以帝檢校侍中增食邑三千戶戊辰詔改帝鄉曰衣錦鄉里曰沛王里是月帝以兼有洛孟之地無西顧之患將大整師徒畢力誅蔡會蔡人趙德諲舉漢南之地以歸於朝廷案新唐書昭宗紀五月壬寅趙德諲以襄州降舊唐書及通鑑皆作五月與薛史同歐陽史其事於三月以前疑有舛誤且遣使送於帝仍誓戮力同討宗權帝表其事朝廷因以德諲為蔡州四面副都統又以河陽保義義昌三節度為帝行軍司馬兼糧料應接使冊府元龜卷一百八十七至是帝領諸侯之師會德諲以伐蔡賊於汝水之上遂薄其城五日之內樹二十八寨以環之蓋象列宿之數也永樂大典卷一萬五千一百二十時帝親臨矢石一日飛矢中其左腋血漬單衣顧謂左右曰勿洩永樂大典卷二萬七百十二九月以糧運不繼遂班師是時帝知宗權殘孽不足為患遂移兵以伐徐十月先遣朱珍領兵與時溥戰於吳康鎮徐人大敗連收豐蕭二邑溥攜散騎馳入彭門帝命分兵以攻宿州刺史張友攜符印以降既而徐人閉壁堅守遂命龐師古屯兵守之而還是月蔡賊孫儒攻陷揚州自稱淮南節度使龍紀元年正月龐師古攻下宿遷縣進軍於呂梁時溥領軍二萬晨壓師古之軍而陣師古促戰敗之斬首二千餘級溥復入於彭門二月蔡將申叢遣使來告縛秦宗權於帳下折其足而囚之矣案舊唐書文德元年十二月甲子朔蔡州牙將申叢執秦宗權新唐書作十一月辛酉與舊唐書月日互異薛史作龍紀元年二月蓋即其遣使來告之月而書之也歐陽史作正月誤帝即日承制以叢為淮西留後未幾叢復為都將郭璠所殺是月璠執宗權來獻帝遣行軍司馬李璠牙校朱克讓檻進於長安既至昭宗御延喜樓受俘即斬宗權於獨柳樹下蔡州平昭宗詔加帝食實封一百戶賜莊宅各一區三月又加帝檢校太尉兼中書令進封東平王賞平蔡之功也案舊唐書四月壬戌朔以宣武淮南等節度副大使知節度事管內營田觀察處置等使開府儀同三司檢校太傅兼侍中揚州大都督府長史汴州刺史充蔡州四面行營都統上柱國沛郡王食邑四千戶朱全忠為檢校太尉中書令進封東平王仍賜賞軍錢十萬貫薛史及歐陽史俱作三月與舊唐書異大順元年四月丙辰宿州小將張筠逐刺史張紹光擁衆以附時溥帝率親軍討之殺千餘人筠遂堅守乙卯時溥出兵暴碭山縣帝遣朱友裕以兵襲之敗徐軍三千餘衆獲沙援軍石君和等三十人斬於宿州城下六月辛酉淮南孫儒遣使修好於帝帝表其事請以淮南節度授於儒焉辛未昭宗命帝為宣義軍節度使充河東東面行營招討使案舊唐書五月以宣武軍節度使朱全忠為太原東南面招討使歐陽史從舊唐書作東南面通鑑作南面與舊唐書異考新唐書云五月以朱全忠為南面招討使六月辛未朱全忠為河東東面行營招討使蓋先為南面招討使後改東面也又六月全忠兼領宣義軍新舊唐書皆不載通鑑用薛史時朝廷宰臣張濬將兵討太原故也八月甲寅昭義都將馮霸殺沙所署節度使李克恭來降帝請河陽節度使朱崇節為潞州留後戊辰李克用自率蕃漢步騎數萬以圍潞州帝遣葛從周率驍勇之士夜中銜枚犯圍而入於潞案舊唐書五月潞州軍亂殺其帥李克恭七月朱全忠遣大將葛從周率千騎入潞州薛史統作八月蓋據入潞之月而追言之也九月壬寅帝至河陽遣都將李讜引軍趨澤潞行至馬牢川為晉人所敗帝又遣朱友裕張全義率精兵至澤州北以為應援既而崇節從周棄潞來歸戊申帝廷責諸將敗軍之罪斬, krp: 規}
