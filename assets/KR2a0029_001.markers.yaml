  - {type: variant, offset: 2209, length: 471, content: 以救之遂東至於焦夷敗賊衆數千生擒賊將殷鐵林梟首以狥軍而還三月僖宗自蜀還長安改元光啟四月戊辰就加帝檢校太保增食邑千五百戶十二月河中太原之師逼長安觀軍容使田令孜奉僖宗出幸鳳翔二年春蔡賊益熾時唐室微弱諸道州兵不為王室所用故宗權得以縱毒連陷汝洛懷孟唐鄧許鄭圜幅數千里殆絕人煙惟宋亳滑潁僅能閉壘而已帝累出兵與之交戰然或勝或負人甚危之三月庚辰僖宗降制就封帝為沛郡王案舊唐書光啟元年三月以汴州刺史朱全忠為沛郡王充蔡州西北面行營都統據薛史則元年惟增食邑至二年三月乃進封為王也與舊唐書異歐陽史從薛史是月僖宗移幸興元五月嗣襄王熅僭即帝位於長安改元為建貞遣使賫偽詔至汴帝命焚之於庭未幾襄王果敗七月蔡人逼許州節度使鹿宴弘使來求救帝遣葛從周等率師赴援師未至而城陷宴弘為蔡賊所害十一月滑州節度使安師儒以怠於軍政為部下所殺案舊唐書云十月壬子朔滑州軍亂逐其帥安師儒推衙將張驍主留後軍務師儒奔汴朱全忠殺之新唐書云十月朱全忠陷滑州執義成軍節度使安師儒歐陽史從舊唐書作奔汴通鑑從新唐書作被擄據薛史則師儒自為部下所殺與新舊唐書異又新舊唐書俱作十月而薛史作十一月通鑑仍從薛史帝聞之乃遣, WYG: ''}
