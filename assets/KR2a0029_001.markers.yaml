  - {type: variant, offset: 437, length: 230, content: 一日夜生於碭山縣午溝里是夕所居廬舍之上有赤氣上騰里人望之皆驚奔而來曰朱家火發矣及至則廬舍儼然既入隣人以誕孩告衆咸異之永樂大典卷一萬六千一十九案以上亦見冊府元龜卷一百八十二以此推之知冊府元龜引五代事蹟多本薛史昆仲三人俱未冠而孤母案冊府元龜引此條母字下有王氏二字攜養寄於蕭縣人劉崇之家帝既壯不事生業以雄勇自負里人多厭之崇以其慵惰每加譴杖唯崇母自幼憐之親為櫛髮嘗誡家人曰朱三非常人也汝輩當善待之家人問其故答曰我嘗見其熟寐之次化為一赤蛇然衆亦未之信也永樂大典卷五千九百, WYG: ''}
