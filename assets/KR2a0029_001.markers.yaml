  - {type: variant, offset: 6864, length: 1659, content: 考異朱瑄覘知即以兵逕至且圖速戰帝整軍出寨時瑄瑾已陣於前須臾東南風大起我軍旌旗失次甚有懼色即令騎士揚鞭呼嘯俄而西北風驟發時兩軍皆在草莽中帝因令縱火既而煙焰亙天乘勢以攻賊陣瑄瑾大敗永樂大典卷一萬五千一百二十殺萬餘人餘衆擁入清河因築京觀於魚山之下駐軍數日而還二年正月癸亥遣朱友恭帥師復伐兗遂塹而圍之未幾朱瑄自鄆率步騎援糧欲入於兗友恭設伏以敗之盡奪其餉於高吳案通鑑作高梧考薛史前後俱作高吳今仍其舊舊五代史考異因擒蕃將安福順安福慶二月己酉帝領親軍屯於單父以為友恭之援四月濠壽二州復為楊行密所陷是時太原遣將史儼兒李承嗣以萬騎馳入於鄆案通鑑乾寧二年四月河東遣其將史儼李承嗣以萬人馳入於鄆此據薛史梁紀原文惟史儼兒作史儼為微異耳下又云七月克用遣史儼將三千騎詣石門侍衞十二月李克用遣大將史儼李承嗣假道於魏以救之前後複互且其時汴鄆日有戰爭道路阻隔史儼既於四月入鄆不應七月已在石門十二月又過魏也考舊唐書云初兗鄆求援於太原克用令蕃將史完府何懷寶等千騎赴之不言其赴鄆為何時據此篇下云八月獲蕃將史完府十一月擒何懷寶然則四月馳入於鄆者當是史完府何懷寶非史儼李承嗣也參考薛史唐武皇紀及李承嗣傳承嗣等入鄆定在二年之冬梁紀似有舛誤通鑑並采梁唐帝紀亦未能考定畫一朱友恭遂歸於汴八月帝領親軍伐鄆至大仇遣前軍挑戰設伏於梁山以待之既而獲蕃將史完府奪馬數百匹朱瑄脫身遁去復入於鄆案通鑑九月辛未朱全忠自將擊朱瑄戰於梁山瑄敗走還鄆與薛史異歐陽史仍從薛史作八月十月帝駐軍於鄆齊州刺史朱瓊遣使請降瓊即瑾之從父兄也案新唐書昭宗紀十一月壬申齊州刺史朱瓊叛降於朱全忠據薛史則朱瓊自請降至見殺皆在十月與新唐書異通鑑從新唐書帝因移軍至兗瓊果來降未幾瓊為朱瑾所紿掠而殺之帝即以其弟玭為齊州防禦使十一月朱瑄復遣將賀瓌柳存及蕃將何懷寶等萬餘人以襲曹州案通鑑作薛懷寶考舊唐書亦作何懷寶今仍之舊五代史考異庶解兗州之圍也帝知之自兗領軍策馬先路至鉅野南追而敗之殺戮將盡生擒賀瓌柳存何懷寶及賊黨三千餘人是日申時狂風暴起沙塵沸湧帝曰此乃殺人未足耳遂下令盡殺所獲囚俘風亦止焉翼日縶賀瓌等以示於兗帝素知瓌名乃釋之惟斬何懷寶於兗城之下乃班師十二月葛從周領兵復伐兗案通鑑云朱全忠之去兗州也留葛從周將兵守之與薛史梁紀異又薛史葛從周傳作十月事既至與朱瑾戰於壘下殺千餘衆擒其將孫漢筠已下二十人遂旋師三年正月河東李克用既破邠州欲謀爭霸乃遣蕃將張污落以萬騎寨於河北之莘縣聲言欲救兗鄆魏博節度使羅弘信患之使來求援冊府元龜卷一百八十七二月帝領親軍屯於單父會寒食帝乃親拜文穆皇帝陵於碭山縣午溝里冊府元龜卷一百八十九四月辛酉河東泛漲將壞滑城帝令決隄岸以分其勢為二河夾滑城而東為害滋甚是日帝遣許州刺史朱友恭領兵萬人渡淮以便宜從事時洪鄂二州累遣使求援故有是行五月命葛從周統軍屯於洹水以備蕃軍六月李克用帥蕃漢諸軍營於斥丘遣其男落落將鐵林小兒三千騎薄於洹水從周與戰大敗之生擒落落以獻克用悲駭請修舊好以贖其子帝不許遂執落落送於羅弘信斬之越七日我軍還屯陽留以伐鄆八月復壁於洹水是時昭宗幸華州遣使就加帝檢校太師守中書令四年正月帝以洹水之師大舉伐鄆辛卯營於濟水之次案胡三省云漢以後無濟水此濟水蓋即鄆城清河水也舊五代史考異龐師古令諸將撤木為橋乙未夜師古以中軍先濟聲振於鄆朱瑄聞之棄壁夜走葛從周逐之至中都北擒瑄并其妻男以獻案自辛卯營於濟水之次至此又見通鑑考異惟中少數字蓋引書間有刪節也尋斬汴橋下鄆州平己亥帝入於鄆以朱友裕為鄆州兵馬留後案通鑑正月以龐師古為天平軍留後三月表朱友裕為天平軍留後據薛史郴王友裕傳四年帝下東平即為天平留後與通鑑異時帝聞朱瑾與史儼兒在豐沛間搜索糧饋豐沛原本作澧沛今據文改正影庫本粘籤惟留康懷英以守兗州帝因乘勝遣葛從周以大軍襲兗懷英聞鄆失守俄又我軍大至乃出降朱瑾史儼兒遂奔淮南兗海沂密等州平案新唐書昭宗紀四年正月丙申朱全忠陷鄆州天平軍節度朱宣死之二月朱全忠寇兗州泰寧軍節度使朱瑾奔於淮南舊唐書正月癸未汴將龐師古陷鄆州二月戊申汴將葛從周陷兗州與薛史月日前後不同詳見通鑑考異乃以葛從周為兗州留後冊府元龜卷一百八十七五月丁丑朱友恭遣使, WYG: 目録}
