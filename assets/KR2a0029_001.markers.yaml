  - {type: variant, offset: 6452, length: 166, content: 屯軍於斗門甲申次衞南有飛鳥止於峻堞之上鳴噪甚厲副使李璠曰將有不如意之事是夜鄆州朱瑄率步騎萬人襲朱友裕於斗門友裕拔軍南去乙酉帝晨救斗門不知友裕之退前至斗門者皆為鄆人所殺帝追襲鄆人至瓠河不及遂頓兵於村落間時朱瑄在濮州丁亥遇朱瑄率兵將歸於鄆遂來衝擊帝策馬南馳為賊所追甚急前有浚溝躍馬而過張歸厚援矟力戰於其後乃免時李璠與都將數人皆為鄆軍所殺, WYG: 巻六十}
