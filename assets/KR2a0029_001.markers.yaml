  - {type: variant, offset: 1311, length: 561, content: 鎮除中令日名溫與崔相國連搆大事崔每奏太祖忠赤委之關東國無患矣昭宗遽敕太祖改名全忠議者謂全字人王也又在中心甚不可也上方悔焉其說與諸史異蓋傳聞之不同爾舊五代史考異自是率所部與河中兵士偕行所向無不克捷三年三月僖宗制授帝宣武軍節度使依前充河中行營副招討使仍令候收復京闕即得赴鎮案舊唐書中和三年五月以檢校尚書右僕射華州刺史潼關防禦等使朱溫檢校司空兼汴州刺史充宣武節度觀察等使仍賜名全忠據薛史則全忠授宣武節度在三月非五月也由河中行營招討副使遷授非由潼關防禦等使也賜名全忠在二年九月亦非三年五月也通鑑所年月官爵名號皆以薛史為據四月巢軍自藍關南走帝與諸侯之師俱收長安乃率部下一旅之衆仗節東下七月丁卯入於梁苑是時帝年三十有二時蔡州刺史秦宗權與黃巢餘孽合從肆虐共圍陳州久之僖宗乃命帝為東北面都招討使時汴宋連年阻饑公私俱困帑廩皆虛外為大敵所攻內則驕軍難制交鋒接戰日甚一日人皆危之惟帝銳氣益振是歲十二月帝領兵於鹿邑與巢衆相遇縱兵擊之斬首二千餘級乃引兵入亳州因是兼有譙郡之地四年春帝與許州田從異諸軍同收瓦子寨案瓦子寨原本作瓦于寨考通鑑注黃巢撤民居以為寨屋謂之瓦子寨則于字形近刊訛耳今改正舊五代史考異殺賊數萬衆是時陳州四面賊寨相望驅擄編氓殺以充食號為舂磨寨帝分兵翦撲大小凡四十戰四月丁巳收西華寨賊將黃鄴單騎奔陳帝乘勝追之鼓噪而進會黃巢遁去遂入陳州刺史, WYG: 羅紹威}
