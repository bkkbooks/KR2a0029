  - {type: variant, offset: 668, length: 326, content: 十九唐僖宗乾符中關東荐饑羣賊嘯聚黃巢因之起於曹濮饑民願附者凡數萬帝乃辭崇家與仲兄存俱入巢軍以力戰屢捷得補為隊長唐廣明元年十二月甲申黃巢陷長安遣帝領兵屯於東渭橋是時夏州節度使諸葛爽率所部屯於櫟陽巢命帝招諭爽爽遂降於巢中和元年二月巢以帝為東南面行營先鋒使令攻南陽下之六月帝歸長安巢親勞於灞上七月巢遣帝西拒邠岐鄜夏之師於興平所至皆立功二年二月巢以帝為同州防禦使使自攻取帝乃自丹州南行以擊左馮翊左馮翊原本缺翊字今據通鑑增入影庫本粘籤拔之遂據其郡時河中節度使王重榮屯兵數萬糾合諸侯以圖興復帝時與之鄰封屢為重榮所敗遂請濟師於巢表章十上為偽左軍使孟楷所蔽不達又聞巢軍勢諸校離心帝知其必敗九月帝遂與左右定計斬偽監軍使嚴實監軍使嚴實原本作嚴貴考歐陽史及通鑑俱作嚴實疑原本, WYG: 列}
