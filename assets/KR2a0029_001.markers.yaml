  - {type: variant, offset: 8524, length: 290, content: 言大破淮寇於武昌收復黃鄂二州通鑑考異引薛史梁紀八月陝州節度使王珙遣使來乞師是時珙弟珂實為蒲帥案珂原本訛作琦今據新唐書王重榮傳改正舊五代史考異迭相憤怒日尋干戈而珙兵寡故來求援帝遣張存敬楊師厚等領兵赴陝既而與蒲人戰於猗氏大敗之九月帝以兗鄆既平將士雄勇遂大舉南征案舊唐書昭宗紀師古渡淮在十月而清口之敗在十一月薛史繫於九月蓋舉南征之議實始於九月其後遂終言之耳歐陽史改作九月攻淮南則清口之役乃因雨雪而敗有九國志可據斷非九月事也命龐師古以徐宿宋滑之師直趨清口葛從周以兗鄆曹濮之衆徑赴安豐淮人遣朱瑾領兵以拒師古因決水以浸軍遂為淮人所敗師古歿焉葛從周行及濠梁聞師古之敗亦命班師冊府元龜卷一百八十七, WYG: ''}
