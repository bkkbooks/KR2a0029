  - {type: variant, offset: 388, length: 1556, content: 改正影庫本粘籤彼即迎降不暇如俟修繕津梁便留數日若王衍堅閉近關折吾兵勢儻延旬浹則勝負莫可知也宜促騎渡江因與李嚴乘馬浮江於是得濟者僅千人步軍溺死者亦千餘人延孝既濟長驅過鹿頭進據漢州居三日部下後軍方至偽蜀六軍使王宗弼令人持牛酒幣馬歸款旬日兩川平定延孝止漢州以俟繼岌平蜀之功延孝居最時邠州節度使董璋為行營右廂馬步使華州節度使毛璋為行營左廂馬步使以軍禮當事延孝郭崇韜以私愛董璋及西川平定之後崇韜每有兵機必召璋參決延孝不平時延孝軍於城西毛璋軍於城東董璋軍於城中閏十二月延孝因酒酣謂董璋曰吾有平蜀之功公等僕遫相從反首鼠於侍中之門謀相傾陷吾為都將公乃裨校力能斬首璋惶恐謝之而退酒罷璋訴于郭崇韜崇韜陰銜之乃署董璋為東川節度使落軍職延孝怒謂毛璋曰吾冒白刃犯險阻平定兩川董璋何功遽有其地二人因謁見崇韜曰東川重地宜擇良帥工部任尚書有文武才幹工部下原脫任字今據通鑑增入影庫本粘籤甚洽衆心請表為東川帥崇韜怒曰紹琛反耶敢違吾節度延孝等惶恐而退未幾崇韜為繼岌所害二人因責董璋曰公復首鼠何門璋俛首祈哀而已四年正月甲申大軍發成都繼岌令延孝以一萬二千人為後軍二月癸巳中軍次武連中使詔至諭以西平王朱友謙有罪伏誅命繼岌殺其子遂州節度使令德延孝大驚俄而董璋率兵之遂州遇延孝不謁延孝怒謂諸校曰南平梁汴西定巴卭畫策之謀始於郭公而汗馬之勞力摧強敵即吾也若以背偽歸國掎角而成霸業即西平王之功第一西平與郭公皆以無罪赤族歸朝之後次當及我矣丙申延孝次劍州時延孝部下皆鄜延河中舊將焦武等知西平王被禍兼誅令德號哭軍門訴於延孝曰西平無罪二百口伏誅河中舊將無不從坐某等必死矣時魏王繼岌到泥溪延孝報繼岌云河中兵士號哭欲為亂丁酉延孝至劍州遂擁衆迴自稱西川節度三川制置等使以檄招諭蜀人三日間衆及五萬己亥繼岌至利州是夜守吉柏津使案原本疑有闕文密告魏王曰得紹琛文字令斷吉柏浮梁繼岌懼乃令梁漢顒以兵控吉柏津延孝已擁衆急趨西川繼岌遣人馳書諭之夜半令監軍使李廷安召任圜因署為副招討使令圜率兵七千騎與都指揮使梁漢顒監軍李廷安討之辛丑先令都將何建崇擊劍門下之甲寅圜以大軍至漢州延孝來逆戰圜令董璋以東川懦卒當其鋒伏精兵於其後延孝擊退東川之兵急追之遇伏兵起延孝敗馳入漢州閉壁不出西川孟知祥以兵二萬與圜合勢攻之案九國志李延厚傳康延孝入漢州知祥遣延厚率兵二千會李仁罕討之將行誓士卒曰今出師不三旬必破賊乃立功圖賞之日也士卒忠奮者立東廂衰疾者立西廂無自苦也得請行者七百人逐延孝西寨斬首百餘級竟拔其城漢州四面樹竹木為柵三月乙丑圜陣於金鴈橋即率諸軍鼓譟而進四面縱火風焰亙空於是延孝危急引騎出戰遇陣於金鴈橋金鴈原本作京鴈今從通鑑改正影庫本粘籤又敗之以十數騎奔綿州何建崇追及擒之任圜命載以檻車時孟知祥與任圜董璋置酒高會因引令延孝檻車至會知祥問曰明公頃自梁朝脫身歸命纔平汴水節制陝郊近領前鋒克平劍外歸朝之後授爵冊勳巨鎮尊官誰與為競奈何躁憤自毀功庸入此檻車還為鄧艾深可痛惜誰肯愍之知祥因手自注盃以飲之延孝曰自知富貴難消官職已足然郭崇韜佐命元勳輔成大業不動干戈收獲兩川自古殊功但恐不及一旦何罪闔門被誅延孝之徒何保首領以此思慮不敢歸朝天道相違一旦至此亦其命也夫復何言及圜班師行次鳳翔中使向延嗣齎詔至遂誅之部下懷其首級瘞於昭應縣民陳暉地天成初其子發之攜去永樂大典卷一萬八千一百三十朱守殷小字會兒莊宗就學以廝養之役給事左右及莊宗即位為長直軍使雖列戎行不聞戰攻每搆人之短長中於莊宗漸以心腹受委河上對壘稍遷蕃漢馬步都虞候守殷守德勝寨為梁將王彥章所攻守殷無備遂陷南寨莊宗聞之曰駑才大悞予事因撤北寨駑才原本作駑木北寨原本作此塞今俱從通鑑改正影庫本粘籤往固楊劉明宗在鄆州密請以覆軍之罪罪之莊宗私於腹心忍而不問同光二年為振武節度使不之任仍兼領蕃漢馬步軍京城初定內外警巡恃憑主恩蔑視勳舊與景進互相表𩹉又強作宿德之態言語遲緩自謂沉厚案以下疑有闕文, WYG: ''}
