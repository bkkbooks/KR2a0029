  - {type: variant, offset: 150, length: 216, content: 刺史莊宗屏人問梁兵機延孝備陳利害語在莊宗紀中莊宗平汴延孝頗有力焉以功授檢校太保鄭州防禦使賜姓名紹琛明年郊禮畢授保義軍節度使三年討蜀以延孝為西南行營馬步軍先鋒排陣斬斫等使延孝性驍健狥利奮不顧身以前鋒下鳳州收固鎮降興州敗王衍軍於三泉所俘蜀軍皆諭而釋之自是晝夜兼行王衍自利州奔歸成都斷吉柏津浮梁以絕諸軍延孝復造浮梁以渡進收綿州王衍復斷綿江浮梁而去水深無舟檝可渡延孝謂招撫使李嚴曰吾懸軍深入利在急兵乘王衍破膽之時人心離沮但得百騎過鹿頭關鹿頭, WYG: ''}
