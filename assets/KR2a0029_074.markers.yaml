  - {type: variant, offset: 2524, length: 1314, content: 異將發其衆謀曰我輩事故使二十年衣食豐足未嘗邊塞征行苟於邊上差跌白骨何歸不如據城自固事成則富貴耳因聚徒百餘輩攻子城東門城中大擾副使李繼珂及監軍張機祚出奔立自稱留後率軍民上表請旄節莊宗怒命明宗與李紹真攻討案通鑑作李紹榮舊五代史考異一月拔之生擒立及其同惡十餘人送於闕下皆磔於市潞州城峻而隍深故立輒敢據之莊宗因茲詔諸道撤防城之備焉永樂大典卷六千五十二竇廷琬者世為青州牙將梁祖擢置左右同光初為復州遊奕使姦盜屏跡歷貝州刺史未幾請制置慶州鹽池逐年出絹十萬疋米十萬斛遂以廷琬為慶州防禦使俾制置之由是嚴刑峻法屢撓邊人課利不集詔移任於金州廷琬據慶州叛詔邠州節度使李敬周率兵討平之夷其族永樂大典卷一萬九千三百五十四張虔釗遼州人也案九國志云虔釗遼州榆社人父簡唐檢校尚書左僕射初為太原牙校以武勇聞於流輩武皇莊宗之世累補左右突騎軍使案九國志云莊宗嘗以偏師取鎮陽命虔釗率騎為先鋒屢挫賊銳遂陷其城明宗素聞虔釗有將帥才及即位擢為護駕親軍都指揮使領春州刺史天成中與諸將圍王都於中山大敗契丹於嘉山之下及定州平以功授滄州節度使案北夢瑣言云虔釗鎮滄州日因亢旱民饑發廩賑之方上聞帝甚嘉奬他日秋成倍斗徵斂朝論鄙之移鎮徐州長興中為山南西道節度使兼西面馬步軍都部署及末帝起于鳳翔閔帝詔令虔釗帥部兵會王師於岐下洎西師俱變虔釗憤惋退歸興元因與洋州節度使孫漢韶俱送款於蜀孟知祥待之尤厚偽授本鎮節度使俾知祥坐獲山南之地由虔釗之故也案北夢瑣言云入蜀取人產業黷貨無厭蜀民怨之孟昶嗣偽位加檢校太師兼中書令晉開運末蜀人聞契丹入洛令虔釗率衆數萬將寇秦雍俄聞漢高祖已定中原虔釗無功而退案九國志云歷左右匡聖馬步軍都指揮使出為昭武軍節度使及漢祖即位乃移鎮梁州以觀朝廷之變會晉昌軍節度使趙匡贊鳳翔節度使侯益俱謀歸蜀遂以虔釗為北面行營招討使應接經營俄而趙匡贊侯益請昶出師掠定三秦因命虔釗與韓保貞等總師五萬出散關雄武軍節度使何重建出隴右奉鑾肅衞都虞候李廷珪出子午谷會于雍州廷珪始出子午谷聞匡贊為王景崇所逼棄城自拔東去遂先退師時虔釗福誠保貞師次陳倉謀不相叶而侯益聞匡贊已去廷珪班師亦誠款中變閉壘不出司天監趙廷樞累以雲氣不利為諷保貞乃與福誠率所部取隴州道會重建歸蜀虔釗留寶雞以勢孤不可深入遂班師行至興州感憤而卒永樂大典卷六千三百五十楊彥溫汴州人本梁朝之小校也莊宗朝累遷裨將天成中為河中副指揮使及末帝鎮河中尤善待之因奏為衙內都指揮使長興元年四月乘末帝閱馬於黃龍莊據城謀叛末帝遣人詰之曰吾善待汝何苦為叛彥溫報曰某非敢負恩緣奉樞密院宣頭宣頭原本作宜頭通鑑作宣頭胡三省注云中書用劄樞密院用宣今改正影庫本粘籤令某拒命請相公但歸朝廷數日詔末帝歸朝明宗疑其詐不欲興兵授彥溫絳州刺史安重誨堅請出師即命西京留守索自通侍衞步軍指揮使藥彥稠等帥兵攻之五日而拔自閉門及敗凡十三日初彥稠出師明宗戒之曰與朕生致彥溫吾將自訊之及收城斬首傳送明宗深怒彥稠等時議者以當時四海恬然五兵載戢蒲非邊郡近在國門而彥溫安敢狂悖皆以為安重誨方弄國權尤忌末帝之名故巧作窺圖究莫能傾陷也彥溫愚昧為人所嗾故滅其族焉永樂大典卷六千三百五十一史臣曰春秋傳云夫不令之臣天下之所惡也故不復較其優劣焉唯虔釗因避地以偷生彥溫乃為人之所嗾比諸叛臣亦可矜也永樂大典卷六千三百五十一, WYG: 證}
