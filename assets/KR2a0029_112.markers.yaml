  - {type: variant, offset: 1927, length: 360, content: 命羣臣禱雨癸巳制削奪慕容彥超在身官爵甲午高麗國冊使衞尉卿劉卒乙卯詔取來月五日車駕赴兗州城下慰勞將士以樞密副使鄭仁誨為右衞大將軍依前充職兼權大內都點檢以中書侍郎平章事判三司李穀為權東京留守兼判開封府事五月丙辰朔帝御崇元殿受朝仗衞如儀庚申車駕發京師案五代春秋作庚辰帝東征歐陽史從薛史作庚申戊辰至兗州城下乙亥收復兗州斬慕容彥超夷其族詔端明殿學士顏衎權知兗州軍州事壬午曲赦兗州管內罪人取五月二十七日已前所犯罪大辟已下咸赦除之慕容彥超徒黨有逃避潛竄者及城內將吏等並放罪自慕容彥超違背以來鄉城內有接便為非者一切不問諸軍將士沒於王事者各與賻贈都頭已上與贈官兗州城內及官軍下寨四面去州五里內今年所徵夏秋稅及沿徵錢物並放十里內只放夏稅一州管界今夏苗子三分放一分城內百姓遭毀拆舍屋及遭燒焚者給賜材木諸處差到人夫內有遭矢石死者各給絹三匹仍放戶, WYG: 麾}
