  - {type: variant, offset: 306, length: 232, content: 戶部侍郎以左散騎常侍張煦為刑部侍郎以給事中呂咸休為左散騎常侍甲午絳州防禦使孫漢英卒辛丑荊南奏湖南亂大將軍陸孟俊執偽節度使馬希萼遷於衡州立希萼弟希崇為留後將吏二千餘人遇害者半牙署庫藏焚燒殆盡乙巳詔倂吏部三銓為一銓委本司長官通判丙午晉州巡檢王萬敢奏河東劉崇入寇營於州北辛亥潞州奏河東賊軍寇境乙卯荊南奏淮南遣鄂州節度使劉仁贍以戰船二百艘於今月二十五日入岳州丙辰詔樞密使王峻率兵援晉州丁巳以左衞將軍申師厚為河西軍節度使檢校太保師厚素與王峻善及峻貴師厚羈旅無依日於峻馬前望塵, WYG: 據武皇賜酖}
