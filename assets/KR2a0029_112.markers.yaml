  - {type: variant, offset: 44, length: 208, content: 誡德賦二圖惟皇原本作雖皇今從文苑英華改正影庫本粘籤詔報曰朕生長軍戎勤勞南北雖用心於鈐匱且無暇於詩書世務時艱粗經閱歷閱歷原本脫閱字今從冊府元龜增入影庫本粘籤前言往行未甚討尋卿有佐命立國之勳居代天調鼎之任恆慮眇德未及古人於是採掇箴規弼諧寡昧披文閱理懌意怡神究為君治國之源審修己御人之要帝王之道盡在於茲辭翰俱高珠寶何貴再三省覽深用愧嘉其所進圖已令於行坐處張懸所冀出入看讀用為鑒戒壬辰潞州奏巡檢使陳思讓監軍向訓破河東軍於虒亭, WYG: ''}
