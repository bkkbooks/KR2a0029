  - {type: variant, offset: 1159, length: 392, content: 延韜為副部署以皇城使向訓為兵馬都監陳州防禦使藥元福為馬步都虞候率兵討慕容彥超案隆平集慕容彥超盜據兗海周祖命曹英為帥向訓副之參用藥元福以兵從謂元福曰已敕英訓勿以軍禮見汝及元福至英訓皆父事焉舊五代史考異諸軍入兗州界不得下路停止村舍犯者以軍法從事丙寅徐州巡檢供給官張令彬奏破淮賊于沭陽斬首千餘級擒賊將燕敬權時慕容彥超求援於淮南淮南偽主李景發兵援之師於下邳聞官軍至退趨沭陽遂破之庚午高麗權知國事王昭遣使貢方物壬申鎮州何福進差人部送先擒獲到河東賊軍二百餘人至闕下詔給巾履衫袴以釋之戊寅徐州部送沭陽所獲賊將燕敬權等四人至闕下詔賜衣服金帛放歸本土敬權等感泣謝罪帝召見謂之曰夫惡凶邪奬忠順天下一也我之賊臣撓亂國法嬰城作逆殃及生靈不意吳人助茲凶慝非良算也爾歸當言之於爾君初漢末遣三司軍將路昌祚於湖南市茶屬淮南將邊鎬陷長沙淮南原本作懷南今從通鑑改正影庫本粘籤昌祚被賊送金陵及敬權自大朝歸具以帝言告于李景景, WYG: 建塘𫝊建瑭}
