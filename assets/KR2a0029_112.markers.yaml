  - {type: variant, offset: 2815, length: 621, content: 考異癸卯德妃董氏薨乙巳詔宣徽南使袁判開封府事辛亥以朔方軍衙內都虞候馮繼業復起為朔方軍兵馬留後甲寅幸舊宅為德妃舉哀故也秋七月丙辰詔內外臣僚每遇永壽節舊設齋供今後中書門下與文武百官共設一齋侍衞親軍都指揮使已下共設一齋樞密使內諸司使已下共設一齋其餘前任職員及諸司職掌更不得開設道場及設齋是日大風雨破屋拔樹尚書省都堂有龍穿屋壞獸角而去西壁有爪迹存焉襄州大水丁卯詔復升陳州曹州為節鎮以侍衞馬軍都指揮使洋州節度使郭崇為陳州節度使以侍衞步軍都指揮使曹英為曹州節度使並典軍如故以陳州防禦使藥元福為晉州節度使辛未詔相州節度使李筠權知潞州軍州事丙子以小底都指揮使漢州刺史李重進為大內都點檢兼馬步都軍頭領恩州團練使以內殿直都知駙馬都尉張永德領和州刺史張永德原本作承德今從宋史改正影庫本粘籤充小底第一軍都指揮使八月甲申朔翰林學士刑部尚書張沆落職守本官以中書舍人史館修撰判館事徐台符為禮部尚書充翰林學士承旨以兵部侍郎韋勳為尚書右丞以尚書右丞于德辰為吏部侍郎以戶部侍郎邊歸讜為兵部侍郎以禮部侍郎趙上交為戶部侍郎以樞密直學士左散騎常侍陳觀為工部侍郎依前充職以刑部侍郎景範為左司郎中充樞密直學士乙酉樞密使王峻上章請解樞衡凡三上章詔不充庚寅潁州奏先於淮南俘獲孳畜已准詔送還本土甲午詔止絕吏民詣闕舉請刺史縣令賜宰臣李穀白藤肩輿時穀以今年七月因步履傷臂請告數旬詔穀扶持三司刻名印署事仍放朝參庚子潞州節度使常思移鎮宋州相州節度使李筠移鎮潞州壬寅鄆州節度使高行周薨癸丑詔改鹽麴法鹽麴犯, WYG: 巻}
