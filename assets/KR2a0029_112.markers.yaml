  - {type: variant, offset: 3437, length: 688, content: 斤已上處死煎鹽者犯一斤已上處死先是漢法不計斤兩多少並處極刑至是始革之九月庚午以大理卿劇可久為太僕卿以左庶子張仁瑑為大理卿以司天監趙延趙延原本作廷義今從通鑑改正影庫本粘籤為太府卿兼判司天監事詔北面沿邊州鎮自守疆埸不得入北界俘掠乙亥鎮州奏契丹寇深冀州遣龍捷都指揮使劉誨牙內都指揮使何繼筠等率兵拒之而退時契丹聞官軍至掠冀部丁壯數百隨行狼狽而北冀部被擄者望見官軍鼓譟不已官軍不敢進其丁壯盡為蕃軍所殺而去丁丑以鄭州防禦使白重贊為相州留後戊寅樂壽都監杜延熙奏於瀛州南殺敗契丹斬首三百級獲馬四十七匹癸未帝姨母韓氏追封楚國夫人故第四姊追封福慶長公主癸未易州奏契丹武州刺史石越來奔冬十月丙戌以前晉州節度使王彥超為河陽節度使庚寅詔諸州罷任或朝覲並不得以器械進貢先是諸道州府各有作院每月課造軍器逐季搬送京師進納其逐州每年占留繫省錢帛不少謂之甲料仍更於部內廣配土產物徵斂數倍民甚苦之除上供軍器外節度使刺史又私造器甲以進貢為名功費又倍悉取之於民帝以諸州器甲造作不精兼占留屬省物用過當乃令罷之仍選擇諸道作工赴京作坊以備役使乙未永興軍奏宣徽北院使知軍府事翟光鄴卒丁酉葬德妃德妃上疑脫董字考冊府元龜亦無董字蓋上文已云癸巳德妃董氏薨此處可從省文也今仍其舊影庫本粘籤廢朝戊戌以宣徽南院使袁權知永興軍府事以樞密直學士工部侍郎陳觀權知開封府事己亥升鉅野縣為濟州以樞密院副使鄭仁誨為宣徽北院使兼樞密副使庚子幸樞密院王峻請之也甲辰宰臣李穀以臂傷未愈上表辭位凡三上章詔報不允丁未滄州奏自十月已前蕃歸漢戶萬九千八百戶是時北境饑饉人民轉徙襁負而歸中土者散居河北州縣凡數十萬口十一月丙辰荊南奏朗州大將劉言以今年十月三日領兵趨長沙, WYG: ''}
