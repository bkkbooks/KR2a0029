  - {type: variant, offset: 638, length: 436, content: 改正影庫本粘籤馬希崇遣從事送牌印納器仗鎬入城稱武安軍節度使馬氏諸族及將吏千餘人皆徙于金陵甲子夜東南白虹亙天以新晉州節度使王彥超為晉絳行營馬軍都虞候乙丑命王峻出征晉州帝幸西莊以餞之甲戌日南至羣臣拜表稱賀甲申葬故貴妃張氏丁亥詔唐朝五廟舊在至德宮安置應屬徽陵莊田園舍宜令新除右監門將軍李重玉為主其緣陵緣廟法物除合留外所有金銀器物充遷葬故淑妃王氏及許王從益外其餘並給與重玉及尼惠英惠燈惠能惠嚴等令重玉以時祀陵廟務在豐潔重玉故皇城使李從璨之子皇城使原本作皇晟使今從五代會要改正影庫本粘籤明宗之孫惠英等亦明宗親屬也故帝授重玉官秩令主先祀卹王者之後也十二月戊子朔詔以劉崇入寇取當月三日暫幸西京庚寅詔巡幸宜停時王峻駐軍陝府聞帝西巡遣使馳奏不勞車駕順動帝乃止乙未幸西莊兗州慕容彥超上言乞朝覲詔允之尋稱部內草寇起不敢離鎮戊申鄆州奏慕容彥超據城反己酉王峻奏劉崇逃遁王師已入晉州案宋史陳思讓傳王峻援晉州以思讓與康延昭分為左右廂排陣使令率軍自烏嶺至絳州與大軍合崇燒營遁去思讓又與藥元福襲破之舊五代史, WYG: ''}
