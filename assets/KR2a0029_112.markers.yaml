  - {type: variant, offset: 4127, length: 2569, content: 日至潭州淮南所署湖南節度使邊鎬岳州刺史宋德權並棄城遁去庚申以前少府監馬從斌為殿中監壬戌樞密使王峻亡妻崔氏追封趙國夫人非故事也乙丑刑部尚書張沆卒辛未陝州折從阮移鎮邠州以前宋州節度使李洪義為安州節度使癸酉青州符彥卿移鎮鄆州鄆州原本作均州今從通鑑改正影庫本粘籤甲戌詔曰累朝已來用兵不息至於繕治甲冑未免配役生靈多取于民助成軍器就中皮革尤峻科刑稍犯嚴條皆抵極典鄉縣以之生事姦猾得以侵漁宜立所規用革前弊應天下所納牛皮今將逐所納數三分內減二分其一分於人戶苗畝上配定每秋夏苗共十頃納連角皮一張其黃牛納乾筋四兩水牛半斤犢子皮不在納限牛馬驢騾皮筋角今後官中更不禁斷只不得將出化外敵境州縣先置巡檢牛皮節級並停丙子詔曰應內外文武官僚幕職州縣官舉選人等今後有父母祖父母亡歿未經遷葬者其主家之長不得輒求仕進所由司亦不得申舉解送如是卑幼在下者不在此限己卯日南至帝御崇元殿受朝賀仗衞如儀十二月丙戌權武平軍留後劉言遣牙將張崇嗣入奏於十月十三日與節度副使王進逵行軍司馬何敬貞指揮使周行逢等同共部領戰棹攻收湖南偽節度使邊鎬當夜出奔王進逵等已入潭州案九國志王逵傳逵朗州武陵人或名進逵邊鎬為武安軍節度使召劉言入覲言不行謀于逵曰江南召我不往必加兵於我矣為之奈何逵曰鎬之此來以制置潭朗為名公如速行正入其算武陵負江湖之阻帶甲百萬乃欲拱手臣異姓乎鎬新至長沙經略未定乘人心憤怒引兵攻鎬可一鼓而擒也言然之乃遣與何景真等同起兵于武陵號十指揮使以攻邊鎬逵率舟師南上至長沙邊鎬大駭以所部奔歸江南諸州屯守皆罷之盡復湖外之地舊五代史考異癸巳太子太師致仕安叔千卒甲午詔今後諸侯入朝不得進奉買宴丁酉皇子澶州節度使榮落起復加同平章事戊戌太子少傅致仕王延卒壬寅幸西莊乙巳以端明殿學士顏衎權知開封府事御史臺奏請改左右衞復為左右屯衞請改左右衞當作左右威衞蓋當時奏牘之文因避御名故去威字今仍其舊影庫本粘籤從之避御名也是冬無雪廣順三年春正月壬子朔帝御崇元殿受朝賀仗衞如儀幸太平宮起居漢太后甲寅賜羣臣射於內鞠場乙卯武平軍兵馬留後劉言奏潭州兵戈之後焚燒殆盡乞移使府於武陵從之詔升朗州為大都督府在潭州之上丙辰以武平軍節度使留後檢校太尉劉言為檢校太師同平章事行朗州大都督充武平軍節度兼三司水陸轉運等使制置武安靜江等軍事進封彭城郡公武平軍節度副使權知潭州軍州事檢校太傅王進逵為檢校太尉行潭州刺史充武安軍節度使以武安軍行軍司馬兼衙內步軍都指揮使檢校太傅何敬貞為檢校太尉行桂州刺史充靜江軍節度使以張倣領眉州刺史充武平軍節度副使以朱元琇領黃州刺史充靜江軍節度副使以周行逢領集州刺史充武安軍節度行軍司馬自進逵而下皆劉言將校也邠州奏慶州略蕃部野鷄族略奪商旅野雞原本作黑雞今從通鑑及宋史改正影庫本粘籤侵擾州界詔遣寧州刺史張建武等率兵掩襲仍先賜敕書安撫如不從命即進軍問罪辛酉詔賜朗州劉言應兩京及諸道舊屬湖南樓店邸第乙丑詔諸道州府繫屬戶部營田及租稅課利等除京兆府莊宅務贍國軍榷鹽務兩京行從莊外其餘並割屬州縣所徵租稅課利官中只管舊額其職員節級一切停廢應有客戶元佃繫省莊田桑土舍宇便賜逐戶充為永業仍仰縣司給與憑由應諸處元屬營田戶部院及繫縣人戶所納租中課利起今年後並與除放所有見牛犢並賜本戶官中永不收繫云帝在民間素知營田之弊至是以天下繫官莊田僅萬計悉以分賜見佃戶充永業是歲出戶三萬餘百姓既得為己業比戶欣然於是葺屋植樹敢致功力又東南郡邑各有租牛課戶往因梁太祖渡淮軍士掠民牛以千萬計梁太祖盡給與諸州民輸租課自是六十餘載時移代改牛租猶在百姓苦之至是特與除放未幾京兆府莊宅務及榷鹽務亦歸州縣依例處分或有上言以天下繫官莊田甚有可惜者若遣貨之當得三十萬緡亦可資國用帝曰苟利於民與資國何異丁卯戶部侍郎權知貢舉趙上交奏諸科舉人欲等第各加對義場數進士除詩賦外別試雜文一場從之兩浙弔祭使左諫議大夫李知損責授登州司馬員外置登州原本脫登字今從李知損本傳增入影庫本粘籤仍令所在馳驛放遣知損銜命江浙所經藩郡皆強貸於侯伯為青州知州張凝所奏故有是命己巳幸南莊臨水亭見雙鳧戲於池上帝引弓射之一發疊貫從臣稱賀庚午以前邠州節度使侯章為鄧州節度使前萊州刺史葉仁魯賜死坐為民所訟故也辛未詔樞密使王峻巡視河堤峻請行故從之辛巳幸南莊閏月甲申朗州劉言潭州王進逵奏廣賊占據桂管深入永州界俘劫遣朗州行軍司馬何敬真與指揮使朱全琇陳順等率水陸軍五萬進擊丙戌迴鶻遣使貢方物詔故梁租庸使趙巖姪崇勳見居陳州量賜繫官店宅從王峻之請也辛卯定州奏契丹攻義豐軍出勁兵夜斫蕃營斬首六十級契丹遁去甲午鎮州奏契丹寇境遣兵追襲至無極而還案契丹國志作無極山薛史無山字當係史家省文今姑仍其舊影庫本粘籤丙申皇子澶州節度使榮來朝壬寅以樞密使尚書左僕射同平章事監修國史王峻兼青州節度使餘如故延州衙內指揮使高紹基奏言父允權患脚膝令臣權知軍州事癸卯陳州奏吏民請與前刺史李穀立祠堂從之時穀為宰相聞郡人陳請遜讓數四乃止甲辰鄴都留守王殷加檢校太尉依前同平章事丙午鎮州節度使何福進河陽節度使王彥超並加檢校太尉潞州節度使李筠加檢校太傅丁未延州節度使高允權卒己酉開封府奏都城內錄到無名額僧尼寺院五十八所詔廢之二月辛亥朔以前西京留守白文珂為太子太師致仕進封韓國公癸丑安州節度使李洪義侍衞馬軍都指揮使郭崇侍衞步軍都指揮使曹英並加檢校太尉唐州方城縣令陳守愚棄市坐剋留戶民蠶鹽一千五百斤入己也內制國寶兩座詔中書令馮道書寶文其一以皇帝承天受命之寶為文其一以皇帝神寶為文按傳國寶始自秦始皇令李斯篆之歷代傳授事具前史至唐末帝自燔之際以寶隨身遂俱焚焉晉高祖受命特制寶一座開運末北戎犯闕少帝遣其子延煦送于戎王戎王訝其非真少帝上表具訴其事及戎王北歸齎以入蕃漢朝二帝未暇別製至是始創為之庚申遣將作監李瓊知陝州軍州事甲子樞密使平盧軍節度使尚書左僕射平章事監修國史王峻責授商州司馬員外置所在馳驛發遣戊辰左監門上將軍李建崇卒延州牙內都指揮使高紹基奏交割軍府與副使張圖己巳朗州劉言奏當道先遣行軍司馬何敬真率兵掩擊廣賊行及潭州部衆奔潰湖南王進逵以敬真失律已梟首訖以樞密直學士工部侍郎陳觀為祕書監陳觀原本作陳官今從宋史顏衎傳改正影庫本粘籤壬申鳳翔少尹桑能責授鄧州長史能晉相維翰之庶弟也坐據維翰別第為人所訟故也癸酉以戶部侍郎知貢舉趙上交為太子詹事是歲新進士中有李觀者不當策名物議諠然中書門下以觀所試詩賦失韻勾落姓名故上交移官丁丑幸南莊賜從官射命客省使向訓權知延州軍州事永樂大典卷八千九百八十, WYG: 攷證}
