  - {type: variant, offset: 333, length: 361, content: 於州府圓融不得科斂百姓其刺史雖遇四節不在貢奉諸州雜稅宜定合稅物色名目物色原本作恤邑今從文獻通考改正影庫本粘籤不得邀難商旅租庸司先將係省錢物與人迴圖宜令盡底收納以塞倖門云乙卯渤海國王大諲譔遣使朝貢是月北京副留守知留守事張憲賜死以其失守故也五月丙辰朔帝不視朝臨於西宮宰相豆盧革進位左僕射韋說進位門下侍郎兼戶部尚書監修國史並依舊平章事兗州節度使檢校太傅朱守殷加同平章事充河南尹判六軍諸衞事滄州節度使檢校太傅安元信加同平章事移鎮徐州邠州節度使檢校太保毛璋加同平章事以太子賓客鄭王玉為中書侍郎兼刑部尚書同中書門下平章事以工部尚書任圜為中書侍郎兼工部尚書同中書門下平章事判三司徐州節度使李紹真貝州刺史李紹英齊州防禦使李紹虔河陽節度史李紹奇洺州刺使李紹能等上言前朝寵賜姓名今乞還舊內李紹虔上言臣本姓王後移杜氏蒙前朝賜今姓名乞復本姓詔並可, WYG: 奮鐡槌殺}
