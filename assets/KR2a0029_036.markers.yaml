  - {type: variant, offset: 118, length: 148, content: 臣豆盧革等三上表請聽政從之遣使往諸道及淮南告哀辛亥帝始聽政于中興殿壬子西南面副招討使工部尚書任圜率步騎二萬六千人入見甲寅帝御文明殿受朝制改同光四年為天成元年大赦天下後宮內職量留一百人內官三十人教坊一百人鷹坊二十人御廚五十人其餘任從所適諸司使務有名無實者並停分遣諸軍就食近畿以減饋送之勞秋夏稅子稅子, WYG: 相徐彦若彦若}
