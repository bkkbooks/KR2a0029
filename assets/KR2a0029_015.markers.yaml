  - {type: variant, offset: 516, length: 256, content: 一二年間必期興復乃以建兼領修創京城使建自華督役輦運工作復治大明宮四年二月有詣建告睦王已下八王謀殺建案通鑑作防城將張行思等來告建惡諸王典兵故使行思等告之建囚八王於別宅放散隨駕殿後軍二萬人殺捧日都頭李筠自是天子益微宿衞之士盡矣八月建以兵圍十六宅通王以下十一王並遇害於石堤谷以謀逆聞又害太子詹事馬道殷將作監許巖士貶宰相朱朴皆昭宗寵昵者也案新唐書昭宗紀正月乙酉韓建以兵圍行宮殺扈蹕都將李筠二月韓建殺太子詹事馬道殷將作監許巖士八月韓建殺通王滋沂王禋韶王彭王嗣韓王嗣陳王嗣覃王嗣周嗣延丞戒丕嗣丹王允通鑑與新唐書同薛史以殺李筠, WYG: ''}
