  - {type: 'tls:seg', offset: 5393, content: '', id: KR2a0029_ZHSJ_015-d15p25s6}
  - {type: variant, offset: 5393, length: 0, content: '', WYG: 次均王友貞為東都馬步都指揮使初元貞張皇后嚴整多智帝敬憚之后殂帝縱意聲色諸子雖在外常徴其婦入侍帝往往亂之友文婦王氏色美帝尤寵之雖未以友文為太子帝意常屬之友珪心不平友珪常有過帝撻之友珪益不自安帝疾甚命王氏召友文于東都欲與之訣且付以後事友珪婦張氏亦朝夕侍帝側知之密告友珪曰大家以傳國寳付王氏懐往東都吾屬死無日矣夫婦相泣左右或説之曰事急計生何不改圖時不可失六月丁丑朔帝命敬翔出友珪為萊州刺史即令之官己宣㫖未行勅時左遷者多追賜死友珪益恐戊寅友珪易服微入左龍虎軍見統軍韓勍以情告之勍亦見功臣宿將多以小過被誅懼不自保遂相與合謀勍以牙兵五百人}
  - {type: page-break, offset: 5393, content: '', id: KR2a0029_WYG_015-7a, image: WYG0277/WYG0277-0086a.png}
  - {type: variant, offset: 5393, length: 0, content: '', krp: 次均王友貞為東都馬步都指揮使初元貞張皇后嚴整多智帝敬憚之后殂帝縱意聲色諸子雖在外常徴其婦入侍帝往往亂之友文婦王氏色美帝尤寵之雖未以友文為太子帝意常屬之友珪心不平友珪常有過帝撻之友珪益不自安帝疾甚命王氏召友文于東都欲與之訣且付以後事友珪婦張氏亦朝夕侍帝側知之密告友珪曰大家以傳國寳付王氏懐往東都吾屬死無日矣夫婦相泣左右或説之曰事急計生何不改圖時不可失六月丁丑朔帝命敬翔出友珪為萊州刺史即令之官己宣㫖未行勅時左遷者多追賜死友珪益恐戊寅友珪易服微入左龍虎軍見統軍韓勍以情告之勍亦見功臣宿將多以小過被誅懼不自保遂相與合謀勍以牙兵五百人}
  - {type: variant, offset: 5394, length: 0, content: '', WYG: 友珪雜控鶴士入伏于禁中夜斬關入至寢殿侍疾者皆散走帝驚起問反者為誰友珪曰非它人也帝曰我固疑此賊恨不早殺之汝悖逆如此天地豈容汝乎友珪曰老賊萬叚友珪僕夫馮廷諤刺帝腹刄出于背友珪自以敗氈裹之瘞于寢殿秘不發䘮遣供奉官丁昭溥馳詣東都命均王友貞殺友文己卯矯詔稱博王友文謀逆遣兵突入殿中賴郢王友珪忠孝將兵誅之保全朕躬然疾因震驚彌致危殆宜令友珪權主軍國之務韓勍為友珪謀多出府庫金帛賜諸軍及百官以取悦辛己丁昭溥還聞友文己死乃發䘮宣遺制友珪即帝位友珪塟太祖于伊闕縣號宣陵五代㑹要太祖崩年六十一中書侍郎}
  - {type: page-break, offset: 5394, content: '', id: KR2a0029_WYG_015-7b, image: WYG0277/WYG0277-0086b.png}
