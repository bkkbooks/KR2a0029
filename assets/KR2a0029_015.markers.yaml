  - {type: variant, offset: 839, length: 245, content: 許國公幷賜鐵券天復元年十一月宦官韓全誨迫天子幸鳳翔建亦預其謀太祖聞之自河中引軍而西前鋒至同州建判官司馬鄴以城降遂移軍迫華州建懼乞降太祖責以脅君之罪建拜伏稱從事李巨川之謀也太祖即誅巨川案北夢瑣言韓建曰某不識字凡朝廷章奏鄰封書檄皆巨川為之因斬之通鑑所采即本於北夢瑣言與薛史同新唐書李巨川傳云巨川詣軍門納款因言當世利害全忠屬官敬翔以文翰事左右疑巨川用則全忠待己或衰乃詭說曰巨川誠奇才顧不利主人若何是日全忠殺之是巨川之死亦由于敬翔之譖不僅為韓建所賣也太祖與建素有軍中昆弟之契及見其怒驟息尋表建為許州, WYG: 故魏博}
