  - {type: variant, offset: 1555, length: 3216, content: 於酸棗縣自旦至晡無與之者乃擲鉢于地毀棄僧衣亡命為盜案北夢瑣言云罕之即其僧名會黃巢起曹濮罕之因合徒作剽漸至魁首及賊巢渡江罕之因以兵將背賊歸于唐高駢錄其功表為光州刺史歲餘為蔡賊秦宗權寇迫不能守乃棄郡歸項城收合餘衆依河陽諸葛爽爽署為懷州刺史光啟初僖宗以爽為東南面招討以擊宗權爽乃表罕之為副令將兵屯宋州蔡寇凶燄日熾兵鋒不敵中和四年爽表罕之為河南尹東都留守是歲李克用脫上源之難斂軍西歸路由洛陽罕之迎謁供帳館待甚優因與克用厚相結託時罕之有衆三千以聖善寺為府聖善寺原本作聖喜今據新唐書改正影庫本粘籤光啟元年蔡賊秦宗權遣將孫儒來攻罕之對壘數月以兵少備竭委城而遁西保于澠池蔡賊據京城月餘焚燒宮闕剽剝居民賊既退去鞠為灰燼寂無雞犬之音罕之復引其衆築壘於市西明年冬諸葛爽死其將劉經推爽子仲方為帥經懼罕之難制自引兵鎮洛陽罕之部曲有李瑭郭璆者情不相叶欲相圖害罕之怒誅璆軍情由是不睦劉經因其有間掩擊罕之於澠池軍亂保乾壕經急攻之為罕之所敗罕之乘勝追至洛陽時經保敬愛寺罕之保苑中飛龍罕之激勵其衆攻敬愛寺數日因風縱火盡燔之經衆奔竄追斬殆盡罕之進逼河陽營於鞏縣陳舟于汜水將渡諸葛仲方遣將張言案張言後名全義率師拒于河上時仲方年幼政在劉經諸將心多不附張言密與罕之修好經知其謀言懼引衆渡河歸罕之因合勢攻河陽為經所敗罕之與言退保懷州冬蔡將孫儒陷河陽仲方汎輕舟來奔孫儒遂自稱節度使俄而蔡賊為我軍所敗孫儒棄河陽歸蔡罕之與言收合其衆求援于太原李克用遣澤州刺史安金俊率騎助之遂收河陽克用表罕之為節度同平章事又表言為河南尹東都留守罕之既與言患難交契刻臂為盟永同休戚如張耳陳餘之義也罕之雖有膽決雄猜翻覆而撫民御衆無方略率多苛暴性復貪冒不得士心既得河陽出兵攻晉絳時大亂之後野無耕稼罕之部下以俘剽為資啖人作食絳州刺史王友遇以城降罕之乃進攻晉州河中王重盈遣使求援於太祖時張言治軍有法善積聚勤於播植軍儲不乏言輸粟於罕之以給其軍罕之求索無限言頗苦之力不能應罕之則錄河南府吏笞責之東諸侯修貢行在多為罕之邀留王重盈苦其侵削密結張言請圖之文德元年春會罕之盡出其衆攻平陽言夜出師掩擊河陽罕之無備單步僅免舉族為言所俘罕之奔于太原李克用表為澤州刺史仍領河陽節度使三月克用遣其將李存孝率師三萬助之來攻懷孟城中食盡備禦皆竭張言遣其孥入質且求救於太祖太祖遣葛從周牛存節赴之逆戰於流河店會晉將安休休以一軍奔于蔡存孝引軍而退罕之保于澤州自是罕之日以兵寇鈔懷孟晉絳數百里內郡邑無長吏閭里無居民河內百姓相結屯寨或出樵汲即為俘馘雖奇峯絕磴梯危架險亦為罕之部衆攻取先是蒲絳之間有山曰摩雲邑人立柵於上以避寇亂罕之以百餘人攻下之軍中因號罕之為李摩雲案洛陽縉紳舊聞記云罕之亦嘗置寨於洛城中至今民呼其寨地為李摩雲寨舊五代史考異自是數州之民屠啖殆盡荊棘蔽野烟火斷絕凡十餘年乾寧二年李克用出師以拒邠鳳營于渭北天子以克用為邠州行營四面都統克用乃表罕之為副及誅王行瑜罕之以功授檢校太尉食邑千戶按新唐書克用討王行瑜表罕之副都統檢校侍中行瑜誅封隴西郡王檢校太尉兼侍中所載爵位較薛史為詳歐陽史仍薛史之舊罕之自以功多私謂晉將蓋寓曰余自河陽失守來依巨廕歲月滋久功效未施比年以來倦於師旅所謂老夫耄矣無能為也望吾王仁愍太傅哀憐與一小鎮休兵養疾一二年間即歸老菟裘幸也寓為言之克用不對每藩鎮缺帥議所不及罕之私心鬱鬱蓋寓懼其佗圖亟為論之克用曰吾於罕之豈惜一鎮吾有罕之亦如董卓之有呂布雄則雄矣鷹鳥之性飽則颺去實懼翻覆毒余也毒余原本作毒餘今據文改正影庫本粘籤光化元年十二月晉之潞帥薛志勤卒罕之乘其喪自澤州率衆徑入潞州自稱留後以狀聞於克用曰聞志勤之喪新帥未至慮為佗盜所窺不俟命已屯于潞矣克用怒遣李嗣昭討之罕之執其守將馬溉伊鐸何萬友案伊鐸歐陽史作伊鐔沁州刺史傅瑤等遣其子顥案歐陽史作遣子頎拘送于太祖以求援焉案新唐書全忠表罕之昭義軍節度使會罕之暴病不能視事明年六月病篤太祖令丁會代之移罕之為河陽節度使行至懷州卒於傳舍時年五十八其子顥以舟載柩歸葬河陰縣開平二年春昭贈中書令永樂大典卷一萬三百八十七馮行襲字正臣武當人也歷職為本郡都校中和中僖宗在蜀有賊首孫喜者聚徒數千人欲入武當刺史呂曄惶駭無策略行襲伏勇士於江南乘小舟逆喜謂喜曰郡人得良牧衆心歸矣但緣兵多民懼擄掠若駐軍江北領肘腋以赴之使某前導以慰安士民可立定也喜然之既渡江軍吏迎謁伏甲奮起行襲擊喜仆地仗劍斬之其黨盡殪賊衆在江北者悉奔潰案新唐書本紀光啟元年四月武當賊馮行襲陷均州逐其刺史呂曄蓋行襲既殪孫喜遂自據其郡也薛史作中和間事與唐書異歐陽史仍從薛史山南節度使劉巨容以功上言尋授均州刺史州西有長山當襄漢蜀路羣賊屯據以邀劫貢奉行襲又破之洋州節度使葛佐奏辟為行軍司馬請將兵鎮谷口通秦蜀道由是益知名李茂貞遣養子繼臻竊據金州行襲攻下之因授金州防禦使時興元楊守亮將襲京師道出金商行襲逆擊大破之詔升金州為節鎮以戎昭軍為額即以行襲為節度使案舊唐書哀帝紀天祐二年金州馮行襲奏當道昭信軍額內一字與元帥全忠諱字同乃賜號戎昭軍是金州初賜軍額本名昭信至哀帝時避朱全忠祖諱乃改稱戎昭也薛史於金州初賜軍額即作戎昭蓋仍梁實錄之舊未及考正及太祖義旗西征行襲遣副使魯崇矩稟受制令會唐昭宗幸鳳翔太祖帥師奉迎久之未出中尉韓全誨遣中官郄文晏等二十餘人分命矯詔欲徵江淮兵屯於金州以脅太祖之軍行襲定策盡殺之收其詔勅送於太祖天祐元年兼領洋州節度使太祖之伐荊襄行襲令其子勗以舟師會於均房預收復功案新唐書昭宣帝紀二年五月王建陷金州戎昭軍節度使馮行襲奔於均州六月行襲克金州舊唐書哀帝紀二年十二月戎昭軍奏收復金州兵火之後井邑殘破請移理所於均州從之仍改為武定軍是行襲因金州嘗被陷乃改治均州也薛史不載遷匡國軍節度使案舊唐書哀帝紀三年四月丙申勅曰天祐二年九月二十日於金州置戎昭軍割均房二州為屬郡比因馮行襲叶贊元勳克宣丕績用奬濟師之效遂行割地之權今命帥得人酬庸有秩其戎昭軍額宜停其均房二州却還山南東道收管據此則戎昭軍額廢于天祐三年故行襲改鎮許州也到任誅大吏張澄暴其罪州人莫不惴懾在許三年上供外別進助軍羨糧二十萬石及太祖郊禋行襲請入覲貢獻巨萬恩禮殊厚殊厚原本作殊學今據文改正影庫本粘籤尋詔翰林學士杜曉撰德政碑以賜之累官至兼中書令冊拜司空開平中卒輟朝一日贈太傅謚曰忠敬行襲性嚴烈為政深刻然所至有天幸境內嘗大蝗尋有羣烏啄食不為害民或艱食必有穭穀穭穀原本作魯縠據廣韻云穭禾自生也今改正影庫本粘籤出於壠畝雖威福在己而恆竭力以奉於王室故能保其功名行襲魁岸雄壯面有青誌當時目為馮青面長子勗歷蘄沁二州刺史次子德晏仕至金吾將軍永樂大典卷四百三孫德昭鹽州五原縣人世為州校父惟晸案歐陽史作惟勗考新唐書亦作惟晸今仍其舊舊五代史考異有功於唐朝遙領荊南節度分判右神策軍事德昭藉父蔭累職為右神策軍都指揮使案通鑑德昭由雄毅軍使為左神策指揮使光化三年唐昭宗為閹官所廢矯立德王時中外以權在禁闥莫能致討近藩朋附章表繼有至者丞相崔胤外與太祖申結輔佐之好內遣心腹密購忠義有以事諭德昭者案通鑑云德昭常憤惋不平崔胤聞之遣判官石戩與之遊德昭每酒酣必泣戩知其誠乃密以胤意說之德昭感慨乃與本軍孫承誨董從實三人案新舊唐書俱作周承誨董彥弼據薛史則承誨自姓孫彥弼乃從實後改之名也通鑑從唐書歐陽史從薛史奮發應命誓圖返正崔又割衣手筆以通其志天復元年正月一日未旦逆豎左軍容劉季述早入德昭伏甲要路以俟追其前驅邀而斬之孫承誨等分捕右軍容王仲先黨伍唐昭宗方幽辱東內聞外喧大恐德昭馳至扣閤曰逆賊劉季述伏誅矣請上皇開鑰復皇帝位皇后何氏呼曰汝可進逆人首門乃可開俄而承誨從實俱以馘獻昭宗悲而嘉之於是丞相崔胤奉迎御丹鳳樓率百辟待罪泣且奏曰臣居大位不能討姦賴東平王全忠首奮忠貞誅殺邸吏遂致德昭等擒戮妖逆再清禁闈即日議功以德昭為檢校太保靜海軍節度使承誨邕州節度使從實容州節度使並同平章事錫姓李賜號扶傾濟難忠烈功臣圖形凌煙閣俱留京師錫賚宴賞之厚恩寵權倖之勢近代罕比其年十一月閹官韓全誨縱火脅昭宗西幸鳳翔承誨從實並變節為中官所誘始欲驅擁百僚將圖出令而德昭獨按兵與太祖親吏婁敬思叶力衞, WYG: 殿召}
  - {type: variant, offset: 1555, length: 3216, content: 於酸棗縣自旦至晡無與之者乃擲鉢于地毀棄僧衣亡命為盜案北夢瑣言云罕之即其僧名會黃巢起曹濮罕之因合徒作剽漸至魁首及賊巢渡江罕之因以兵將背賊歸于唐高駢錄其功表為光州刺史歲餘為蔡賊秦宗權寇迫不能守乃棄郡歸項城收合餘衆依河陽諸葛爽爽署為懷州刺史光啟初僖宗以爽為東南面招討以擊宗權爽乃表罕之為副令將兵屯宋州蔡寇凶燄日熾兵鋒不敵中和四年爽表罕之為河南尹東都留守是歲李克用脫上源之難斂軍西歸路由洛陽罕之迎謁供帳館待甚優因與克用厚相結託時罕之有衆三千以聖善寺為府聖善寺原本作聖喜今據新唐書改正影庫本粘籤光啟元年蔡賊秦宗權遣將孫儒來攻罕之對壘數月以兵少備竭委城而遁西保于澠池蔡賊據京城月餘焚燒宮闕剽剝居民賊既退去鞠為灰燼寂無雞犬之音罕之復引其衆築壘於市西明年冬諸葛爽死其將劉經推爽子仲方為帥經懼罕之難制自引兵鎮洛陽罕之部曲有李瑭郭璆者情不相叶欲相圖害罕之怒誅璆軍情由是不睦劉經因其有間掩擊罕之於澠池軍亂保乾壕經急攻之為罕之所敗罕之乘勝追至洛陽時經保敬愛寺罕之保苑中飛龍罕之激勵其衆攻敬愛寺數日因風縱火盡燔之經衆奔竄追斬殆盡罕之進逼河陽營於鞏縣陳舟于汜水將渡諸葛仲方遣將張言案張言後名全義率師拒于河上時仲方年幼政在劉經諸將心多不附張言密與罕之修好經知其謀言懼引衆渡河歸罕之因合勢攻河陽為經所敗罕之與言退保懷州冬蔡將孫儒陷河陽仲方汎輕舟來奔孫儒遂自稱節度使俄而蔡賊為我軍所敗孫儒棄河陽歸蔡罕之與言收合其衆求援于太原李克用遣澤州刺史安金俊率騎助之遂收河陽克用表罕之為節度同平章事又表言為河南尹東都留守罕之既與言患難交契刻臂為盟永同休戚如張耳陳餘之義也罕之雖有膽決雄猜翻覆而撫民御衆無方略率多苛暴性復貪冒不得士心既得河陽出兵攻晉絳時大亂之後野無耕稼罕之部下以俘剽為資啖人作食絳州刺史王友遇以城降罕之乃進攻晉州河中王重盈遣使求援於太祖時張言治軍有法善積聚勤於播植軍儲不乏言輸粟於罕之以給其軍罕之求索無限言頗苦之力不能應罕之則錄河南府吏笞責之東諸侯修貢行在多為罕之邀留王重盈苦其侵削密結張言請圖之文德元年春會罕之盡出其衆攻平陽言夜出師掩擊河陽罕之無備單步僅免舉族為言所俘罕之奔于太原李克用表為澤州刺史仍領河陽節度使三月克用遣其將李存孝率師三萬助之來攻懷孟城中食盡備禦皆竭張言遣其孥入質且求救於太祖太祖遣葛從周牛存節赴之逆戰於流河店會晉將安休休以一軍奔于蔡存孝引軍而退罕之保于澤州自是罕之日以兵寇鈔懷孟晉絳數百里內郡邑無長吏閭里無居民河內百姓相結屯寨或出樵汲即為俘馘雖奇峯絕磴梯危架險亦為罕之部衆攻取先是蒲絳之間有山曰摩雲邑人立柵於上以避寇亂罕之以百餘人攻下之軍中因號罕之為李摩雲案洛陽縉紳舊聞記云罕之亦嘗置寨於洛城中至今民呼其寨地為李摩雲寨舊五代史考異自是數州之民屠啖殆盡荊棘蔽野烟火斷絕凡十餘年乾寧二年李克用出師以拒邠鳳營于渭北天子以克用為邠州行營四面都統克用乃表罕之為副及誅王行瑜罕之以功授檢校太尉食邑千戶按新唐書克用討王行瑜表罕之副都統檢校侍中行瑜誅封隴西郡王檢校太尉兼侍中所載爵位較薛史為詳歐陽史仍薛史之舊罕之自以功多私謂晉將蓋寓曰余自河陽失守來依巨廕歲月滋久功效未施比年以來倦於師旅所謂老夫耄矣無能為也望吾王仁愍太傅哀憐與一小鎮休兵養疾一二年間即歸老菟裘幸也寓為言之克用不對每藩鎮缺帥議所不及罕之私心鬱鬱蓋寓懼其佗圖亟為論之克用曰吾於罕之豈惜一鎮吾有罕之亦如董卓之有呂布雄則雄矣鷹鳥之性飽則颺去實懼翻覆毒余也毒余原本作毒餘今據文改正影庫本粘籤光化元年十二月晉之潞帥薛志勤卒罕之乘其喪自澤州率衆徑入潞州自稱留後以狀聞於克用曰聞志勤之喪新帥未至慮為佗盜所窺不俟命已屯于潞矣克用怒遣李嗣昭討之罕之執其守將馬溉伊鐸何萬友案伊鐸歐陽史作伊鐔沁州刺史傅瑤等遣其子顥案歐陽史作遣子頎拘送于太祖以求援焉案新唐書全忠表罕之昭義軍節度使會罕之暴病不能視事明年六月病篤太祖令丁會代之移罕之為河陽節度使行至懷州卒於傳舍時年五十八其子顥以舟載柩歸葬河陰縣開平二年春昭贈中書令永樂大典卷一萬三百八十七馮行襲字正臣武當人也歷職為本郡都校中和中僖宗在蜀有賊首孫喜者聚徒數千人欲入武當刺史呂曄惶駭無策略行襲伏勇士於江南乘小舟逆喜謂喜曰郡人得良牧衆心歸矣但緣兵多民懼擄掠若駐軍江北領肘腋以赴之使某前導以慰安士民可立定也喜然之既渡江軍吏迎謁伏甲奮起行襲擊喜仆地仗劍斬之其黨盡殪賊衆在江北者悉奔潰案新唐書本紀光啟元年四月武當賊馮行襲陷均州逐其刺史呂曄蓋行襲既殪孫喜遂自據其郡也薛史作中和間事與唐書異歐陽史仍從薛史山南節度使劉巨容以功上言尋授均州刺史州西有長山當襄漢蜀路羣賊屯據以邀劫貢奉行襲又破之洋州節度使葛佐奏辟為行軍司馬請將兵鎮谷口通秦蜀道由是益知名李茂貞遣養子繼臻竊據金州行襲攻下之因授金州防禦使時興元楊守亮將襲京師道出金商行襲逆擊大破之詔升