  - {type: variant, offset: 5184, length: 2, content: 時關, WYG: 叚明逺等邐迤來迎夕次汜水縣帝召魏王宗奭入對便于御前賜食數刻乃退壬午駐蹕于汜水宰臣河南尹六學士竝于内殿起居敕以建昌宫事委宰臣于兢領之五代㑹要其年六月廢昌宫以河南尹魏王張宗奭為國計使凡天下金榖兵戎舊𨽻建昌宫者悉主之癸未帝發自汜水宣令邵贊叚明逺各歸所理午憇任村頓夕次孝義宫畱都文武禮部尚書孔續而下道左迎拜次偃師甲申至都文武臣奉迎于}
