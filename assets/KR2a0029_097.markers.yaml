  - {type: variant, offset: 3096, length: 2082, content: 洛出舍外藩非南走淮夷則北走契丹宜早除之高祖以許之不死鐵券存焉持疑未允光遠乃遣子承勳以甲士圍其第逼令自裁延光曰天子在上安得如此乃遣使者乞移居洛下行及河橋擯於流而溺殺之矯奏云延光自投河朝廷以適會其意弗之理後踰歲入覲高祖為置曲宴教坊伶人以光遠暴斂重賦因陳戲譏之光遠殊無慚色高祖謂光遠曰元城之役卿左右皆立功未曾旌賞今各與一郡俾釐任以榮之因命為刺史者凡數人時王建立自青州移鎮上黨乃以光遠為平盧軍節度使封東平王光遠面奏請與長子同行尋授承勳萊州防禦使及赴任僕從妓妾至千餘騎滿盈僭侈為方岳之最下車之後唯以刻剝為事少帝嗣位冊拜太師封壽王案宋史馬仁鎬傳晉天福中青州楊光遠將圖不軌以仁鎬為節度副使伺其動靜歷二年或譖仁鎬于朝改護國軍行軍司馬仁鎬至河中數月光遠反書聞舊五代史考異後因景延廣上言請取光遠麾下所借官馬三百疋光遠怒曰此馬先帝賜我何以復取是疑我也遂遣人潛召取子承祚自單州奔歸朝廷乃就除淄州刺史以從其便光遠益驕因此搆契丹述少帝違好之短且言大饑之後國用空虛此時一舉可以平定開運元年正月契丹南牧陷我博陵少帝幸澶淵三月契丹退命李守貞符彥卿率師東討光遠素無兵衆唯嬰城自守守貞以長連城圍之冬十一月承勳與弟承信承祚見城中人民相食將盡知事不濟勸光遠乞降冀免於赤族光遠不納曰我在代北時嘗以紙錢駝馬祭天池皆沉沒人言合有天子分宜且待時勿輕言降也承勳慮禍在旦夕與諸弟同謀殺節度判官丘濤親校杜延壽楊贍白延祚等梟其首級遣承祚送於守貞因縱火大譟劫其父幽於私第以城納款遣即墨縣令王德柔貢表待罪光遠亦上章自首少帝以頃歲太原歸命欲曲全之執政曰豈有逆狀滔天而赦之也乃命守貞便宜處置守貞遣人拉殺之案歐陽史守貞遣客省副使何延祚殺之於其家舊五代史考異以病卒聞漢高祖即位詔贈尚書令追封齊王仍令立碑未幾其碑石無故自折案歐陽史作碑石既立天大雷電擊折之舊五代史考異可知其陰責也永樂大典卷六千五十二五代史補楊光遠滅范延光之後朝廷以其功高授青州節度封東平王奄有登萊沂密數郡既而自負強盛舉兵友朝廷以宋州節度李守貞嘗與光遠有隙乃命李討之李受詔欣然志在必取莫不身先矢石光遠見而懼之度不能禦遂降初光遠反書至中外大震時百官起居次忽有朝士揚言於衆曰楊光遠欲謀大事吾不信也光遠素患禿瘡其妻又跛自古豈有禿頭天子跛脚皇后耶於是人心頓安未幾光遠果降承勳光遠之長子也始名承貴避少帝名改焉以父廕歷光濮州刺史光遠兼鎮河陽命制置三城事光遠移鎮青州授萊州防禦使在郡亦頗理嘗憤父側之奸黨欲殺之每省父父為匿焉及光遠搆釁嬰城以叛承勳赴之敵退為王師所圍踰歲糧盡與其弟承祚背父之命出降王師朝廷授汝州防禦使尋改鄭州案宋史楊承信傳光遠死承信與弟承祚詣闕請死詔釋之以承信為右羽林將軍承祚為右驍衞將軍放歸服喪私第尋安置鄭州舊五代史考異及戎王入汴遣騎士自圃田召至責其害父背己使臠其肉而殺之以其弟承信為青州節度使永樂大典卷六千五十二盧文進字國用案遼史文進字大用案南唐書文進字大用遼史太祖紀神冊元年晉幽州節度盧國用來降二年晉新州裨將盧文進殺節度李文矩來降則國用與文進顯係二人然天顯元年又書盧龍節度使盧國用叛奔于唐即文進歸唐之事也疑文進入遼以後遂以字行修遼史者雜采諸書誤作兩人耳舊五代史考異范陽人也身長七尺飲啖過人望之偉如也少事劉守光為騎將唐莊宗攻燕以文進首降遙授壽州刺史初莊宗得山後八軍以愛弟存矩為新州團練使以總領之莊宗與劉鄩對壘於莘縣命存矩於山後召募勁兵又令山北居民出戰馬器仗每鬻牛十頭易馬一匹人心怨咨時存矩團結五百騎令文進將之與存矩俱行至祁溝關軍士聚謀曰我輩邊人棄父母妻子為他血戰千里送死固不能也衆曰擁盧將軍却還新州據城自守奈我何因大呼揮戈趣傳舍害存矩於榻下文進撫膺曰奴輩累我矣因環尸而泣曰此輩既害郎君我何面目見王案遼史存矩取文進女為側室文進心常內愧因與亂軍殺存矩與薛史異因為亂軍所擁反攻新州不克案馬令南唐書云文進攻新州不克夜走墜塹一躍而出明日視之乃郡之黑龍潭也絕岸數丈深不可測又嘗有大蛇徑至座間引首及膝文進取食飼之而去由是自負舊五代史考異又攻武州又不利周德威命將追討文進遂奔契丹偽命為幽州兵馬留後部分漢軍常別為營寨未幾文進引契丹寇新州自是戎師歲至驅擄數州士女教其織工作中國所為者悉備契丹所以彊盛者得文進之故也案遼史云文進引契丹軍攻新州刺史安金全不能守棄城去周德威援之進攻新州契丹衆數萬德威不勝大敗奔歸文進與契丹進攻幽州且二百日城中危困晉王親將兵救之方始解去契丹以文進為幽州節度使又以為盧龍節度使與薛史所載官階微異同光之世為患尤深文進在平州率奚族勁騎鳥擊獸搏來忽往燕趙諸州荊榛滿目軍屯涿州每歲運糧自瓦橋至幽州勁兵猛將援遞糧車然猶為寇所鈔奔命不暇皆文進導之也及明宗即位之明年文進自平州率所部十餘萬衆來奔行及幽州先遣使上表曰頃以新州團練使李存矩提衡羣邑掌握恩威虐黎庶則毒甚於豺狼聚賦斂則貪盈於溝壑人不堪命士各離心臣即拋父母之邦入朔漠之地幾年鴈塞徒向日以傾心一望家山每銷魂而斷目李子卿之河畔空有怨辭石季倫之樂中莫陳歸引近聞皇帝陛下皇天眷命清明在躬握紀乘乾鼎新革故始知大幸有路朝宗便貯歸心祗伺良會臣十月十日決計殺在城契丹取十一日離州押七八千車乘領十五萬生靈十四日已達幽州云洎至洛陽明宗寵待彌厚授滑, WYG: ''}
