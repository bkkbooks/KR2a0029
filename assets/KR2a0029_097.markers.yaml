  - {type: variant, offset: 2323, length: 3, content: 檢校尚, WYG: 以邢州節度使安審琦為太原四面馬軍都指揮使以陜州節度使相里金為太原四面步軍都指揮使以右監門上将軍武廷翰為壕寨使丙辰以定州節度使楊光逺為太原四面兵馬副部署兼馬步都虞侯尋改為太原四面副招討使都虞侯如故以前彰武軍節度使髙行周為太原四面招撫兼排陣使初帝疑河東有異志與近臣語及其事帝曰石郎與朕近親在不疑之地流年毁譽朕心自明萬一失歡如何和解左右皆不對翼日欲移石敬瑭于鄆州房暠等堅言不可司天監趙延乂亦言星辰失度尤宜安靜由是稍緩其事㑹薛文遇獨宿于禁中帝召之諭以太原之事文遇奏曰臣聞作舍于道三年不成國家利害斷自宸㫖以臣料之石敬瑭除亦叛不除亦叛不如先事圖之帝喜曰聞卿此言豁吾憤氣先是有人言國家明年合得一賢佐主謀平定天下帝意亦疑賢佐者屬在文遇即令手}
