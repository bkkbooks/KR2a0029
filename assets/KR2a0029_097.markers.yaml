  - {type: variant, offset: 84, length: 208, content: 親校同光中明宗下鄆州梁兵屯楊劉口以扼之先鋒將康延孝潛使人送款於明宗明宗欲使人達機事於莊宗方難其選延光請行遂以蠟書授之延光既至奏莊宗曰楊劉渡控扼已定未可圖也請築壘馬家口以通汶陽之路莊宗從之復遣歸鄆州俄而梁將王彥章攻馬家口所築新壘明宗恐城中不備又遣間行告莊宗請益兵中夜至河上為梁兵所獲送夷門下獄榜笞數百威以白刃終不洩其事復為獄吏所護在獄半年不復理問及莊宗將至汴城獄吏即去其桎梏拜謝而出之乃見於路側莊宗喜授銀青光祿大夫檢校, WYG: ''}
