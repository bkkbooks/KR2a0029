  - {type: variant, offset: 5311, length: 1135, content: 二月乃殺行軍司馬馮知兆案南唐書作姚知兆歐陽史與薛史同舊五代史考異節度副使杜重貴等率其部衆渡淮奔於金陵李待之尤重案馬令南唐書云烈祖以文進為天雄統軍舊五代史考異偽命為宣州節度使後卒於江南永樂大典卷二千二百十二案金陵志文進自潤州召還以左衞上將軍兼中書令范陽郡王奉朝請李金全本唐明宗之小豎也其先出於吐谷渾金全驍勇善騎射少從明宗征伐以力戰有功明宗即位連典大郡天成中授涇州節度使在鎮數年以掊斂為務長興中受代歸闕始進馬數十匹不數日又進之明宗召而謂之曰卿患馬多耶何進貢之數也又謂曰卿在涇州日為理如何無乃以馬為事否金全慚謝而退案歐陽史徙鎮橫海久之罷為右衞上將軍四年夏授滄州節度使累官至檢校太傅清泰中罷鎮歸闕久留於京師高祖即位之明年安州屯將王暉殺節度使周環詔遣金全以騎兵千人鎮撫其地未及境暉為部下所殺金全至亂軍數百人皆不自安金全說遣赴闕密伏兵於野盡殺之又擒其軍校武彥和等數十人斬之案歐陽史作武克和案歐陽史南唐書俱作武克和通鑑從是書殿本初金全之將行也高祖戒之曰王暉之亂罪莫大焉但慮封守不寧則民受其弊因折矢飛詔約以不戮一人仍許以暉為唐州刺史又謂金全曰卿之此行無失吾信及金全至聞彥和等當為亂之日劫掠郡城所獲財貨悉在其第遂殺而奪之案通鑑云彥和且死呼曰王暉首惡天子猶赦之我輩脅從何罪乎舊五代史考異高祖聞之以姑息金全故不究其事尋授以旄節金全有親吏胡漢筠者案歐陽史作胡漢榮胡漢筠歐陽史及南唐書俱作胡漢榮通鑑從是書殿本勇譎嗇褊貪詐殘忍軍府之政一以委之高祖聞其事遣吏賈仁紹案通鑑作仁沼考異云薛史作仁紹今從實錄歐陽史南唐書與通鑑同舊五代史考異往代其職且召漢筠漢筠內疚惶怖金全乃列狀稱疾以聞及仁紹至漢筠鴆而殺之案馬令南唐書云胡漢榮所為多不法晉高祖患之不欲因漢榮以累功臣為選廉吏賈仁沼代之且召漢榮漢榮教金全留己而不遣金全客龐令圖諫曰仁沼昔事王晏球有大功晏球欲厚賞之仁沼退而不言此天下之忠臣也及頒賜所俘物仁沼悉以分故人親戚之貧者此天下之廉士也宜納仁沼而遣漢榮漢榮聞之夜使人殺令圖而鴆仁沼舊五代史考異天福五年夏高祖命馬全節為安州節度使以代金全漢筠自以昔嘗拒命復聞仁紹二子將訴置毒之事居不自安乃紿謂金全曰邸吏劉珂使健步倍道兼行密傳其意云受代之後朝廷將以仁紹之事詰公之罪金全大駭命從事張緯函表送款於淮夷淮人遣偽將李承裕以代金全金全即日南竄其妓樂車馬珍奇帑藏皆為承裕所奪與其黨數百人束身夜出曉至义川引領北望泣下而去及至金陵李授以節鎮案馬令南唐書云烈祖以金全為天威統軍遷潤州節度使舊五代史考異後卒於江南永樂大典卷一萬三百九十史臣曰延光昔為唐臣綽有令譽洎逢晉祚顯恣狂謀既力屈以來降尚靦顏而惜死孟津之歿乃取笑於千載也從賓而下俱怙亂以滅身亦何足與議也文進懼強敵之威金全為輿臺所賣事雖弗類叛則攸同咸附島夷皆可醜也永樂大典卷一萬三百九十, WYG: 八}
