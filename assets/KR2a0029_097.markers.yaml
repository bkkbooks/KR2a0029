  - {type: variant, offset: 18, length: 7, content: 范延光案遼史避, WYG: 日徳音除十惡五逆放大殺人外並放盧損輕易即破械釋文審帝大怒收文審誅之臺司稱奉徳音釋放不得追領祗證中書誥云徳音言不在追窮枝蔓無不得追領祗證六字擅改勑語大理斷以失出罪人論故有是命是月有蛇鼠鬭于師子門外鼠生而蛇死夏四月己未朔以左衞上将軍王景戡為左神武統軍以右領軍上将軍李頃為華清宫使戊辰以}
