  - {type: variant, offset: 2528, length: 3, content: 唐末帝, WYG: 以新授河東節度使宋審䖍為宣州節度使充侍衞馬軍都指揮使壬子鄴都屯駐捧聖都虞候張令昭逐節度使劉延皓據城叛翌日令昭召副使邊仁嗣已下逼令奏請節旄六月辛酉天雄軍節度使劉延皓削奪官爵勒歸私第癸亥以天雄軍守禦右捧聖第二軍都虞候張令昭為檢檢司空行右千牛将軍權知天雄軍府事丙寅御敷政殿}
