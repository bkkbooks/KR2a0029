  - {type: variant, offset: 1006, length: 712, content: 孫銳為兵馬都監舊五代史考異時銳以女妓十餘輩從之擁蓋操扇必歌吹而後食將士煩熱覩之解體尋為王師所敗賊衆退還鄴城高祖繼遣楊光遠討之延光知事不濟乃殺孫銳以歸其罪發人齎表待罪且邀姑息高祖不許及經歲受圍城中饑窘高祖以師老民勞思解其役遣謁者入謂之曰卿既危蹙破在旦夕能返掌轉規改節歸我我當以大藩處之如降而殺之則何以享國明明白日可質是言因賜鐵券改封高平郡王案歐陽史作東平郡王移鎮天平延光謂門人李式曰案歐史作副使李式主上敦信明義言無不踐許以不死則不死矣因撤守備案通鑑云延光猶遷延未決宣徽南院使劉處讓復入諭之延光意乃決舊五代史考異素服請降及赴汶上踰月入覲尋表請罷免高祖再三答諭方允制以延光為太子太師致仕居闕下期歲高祖每召賜飲宴待之與羣臣無間一日從容上奏願就河陽私邸以便頤養高祖許之延光攜妻子輦奇貨從焉每過郡邑多為關吏所糾時楊光遠居守洛下兼領孟懷既利其財復漸測朝廷密旨遂奏云延光國之奸臣若不羈縻必北走胡南入吳請召今西都居止高祖允之光遠使其子承勳以兵環其第逼令自裁延光曰明天子在上賜金書許我不死爾之父子何得脅制如此明旦則以白刃驅之令上馬之浮橋排於水中光遠紿奏云延光投河自溺而死水運軍使曹千獲其屍郡東繆家灘高祖聞之輟朝二日詔許歸葬於鄴仍贈太師案歐陽史云歸葬相州已葬墓輒崩破其棺槨頭顱皆碎延光初為近臣及領重鎮禮賢接士動皆由禮故甚獲當時之譽洎鎮常山日以部將梁漢唐獲王都名馬入罪而取之在魏州日以齊州防禦使祕瓊獲董溫琪珠金妓妾及經其境復害而奪之物議由是減之及懼罪以謀叛復忍恥以偷生不能引決遂至強死何非夫之甚也永樂大典卷一萬六千五百一十七張從賓未詳何許人也始事唐莊宗為小校從戰有功唐天成中自捧聖指揮使領澄州刺史遷左右羽林都校從藥彥稠討楊彥溫於河中平之長興中領壽州, WYG: ''}
