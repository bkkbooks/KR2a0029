  - {type: variant, offset: 671, length: 5, content: 門下有術士, krp: 駙馬都尉石敬瑭為鄆州節度使進封趙國公以河陽節度使充侍衞馬步軍都指揮使宋審䖍為河東節度使甲午以前晉州節度使大同彰國振武威塞等軍蕃漢副總管}
  - {type: variant, offset: 677, length: 307, content: 生者自云妙通術數當延光微時言將來必為將相延光既貴酷信其言歷數鎮嘗館於上舍延光謂之曰余夢大蛇自臍入腹半而掣去之是何祥也張生曰蛇者龍也入腹為帝主之兆明矣延光自是稍萌僭竊之意及高祖建義於太原唐末帝遣延光以本部二萬屯遼州與趙延壽掎角合勢及延壽兵敗延光促還故心不自安高祖入洛尋封臨清王以寬其反側後延光擅殺齊州防禦使祕瓊而聚兵部下復收部內刺史入城高祖甚疑之乃東幸夷門時延光有牙校孫銳者與延光有鄉曲之舊軍機民政一以委焉故魏博六州之賦無半錢上供符奏之間有不如意者銳即對延光毀之其兇戾也如此初朝廷遣使封延光為臨清王因會僚屬延光暴得疾伏枕經旬銳乃密惑羣小召澶州刺史馮暉等以不臣之謀逼於延光延光亦惑於術者因而聽之天福二年夏六月遣銳與暉將, WYG: 敬達充西北面蕃漢馬}
