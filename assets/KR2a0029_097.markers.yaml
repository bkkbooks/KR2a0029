  - {type: variant, offset: 13, length: 2, content: 列傳, WYG: 年春正月辛夘朔帝御文明殿受朝賀仗衞如式乙未百濟遣使獻方物戊戌幸龍門佛寺祈雪癸夘以給事中充樞密院直學士呂琦為端明殿學士以六軍諸衞判官尚書工部郎中薛文遇為樞密院直學士乙巳以上元夜京城張燈帝微行置酒于趙延壽之}
  - {type: page-break, offset: 13, content: '', id: KR2a0029_WYG_097-1b, image: WYG0277/WYG0277-0419b.png}
  - {type: variant, offset: 13, length: 2, content: 列傳, krp: 年春正月辛夘朔帝御文明殿受朝賀仗衞如式乙未百濟遣使獻方物戊戌幸龍門佛寺祈雪癸夘以給事中充樞密院直學士呂琦為端明殿學士以六軍諸衞判官尚書工部郎中薛文遇為樞密院直學士乙巳以上元夜京城張燈帝微行置酒于趙延壽之}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 丁未皇子河南尹判六軍諸衞事重美封雍王己未以前司農卿王彦鎔為太僕卿二月戊辰吐渾寧朔兩軍留後李可久加檢校司徒可久本姓白氏前朝賜姓庚子監修國史姚顗史官張眧逺李祥呉承範等修撰明宗實録三十巻上之五代㑹要同修撰官中書舍人張昭逺李祥直館左拾遺呉承範左拾遺揚昭儉等各頒賚有差以大理卿竇維為光禄卿以前許州節度判官張登為大理卿丁丑以太常卿李鏻為兵部尚書以兵部尚書梁文矩為太常卿庚辰以前鄜州節度使皇甫立為潞州節度使辛巳以前均州刺史仇暉為左威衞上将軍保順軍節度使鮑君福加檢校太尉同平章事丁亥以昭義節度使安元信卒廢朝三月庚子中書門下奏準閤門分析内外官辭見謝規例請州判官軍将進奉到闕舊例門見門辭今後只令朝見依舊門辭新除諸道判官書記以下無例中謝並放謝放辭得替到京無例見今後兩使判官許中謝赴任即門辭其書記以下並依舊例朝臣文五品武四品以上舊例中謝止以下無例對謝今請依天成四年正月勑凡升朝官並許中謝諸道都押衙馬步都指揮虞候鎮将諸色塲院無例謝辭並進牓子放謝放辭得替到闕無例入見在京鹽麴税官兩宫巡即許申謝新徐令録並中謝次日門辭兼有口勑誡勵文武兩班所差弔祭使及告廟祠祭只正衙辭不赴内殿諸道進奏官到闕見併假進牓子門辭従之辛丑權知福建節度使王昶奏節度使王延鈞以去年十月十四日卒是時延鈞父子雖僭竊于閩嶺猶稱藩於朝廷故有是奏甲辰以右神武統軍楊漢章為彰武軍節度使丙午以翰林學士禮部侍郎馬𦙍孫為中書侍郎同平章事丁巳以端明殿學士吕琦為御史中丞案通鑑吕琦與李崧建和親契丹之䇿為薛文遇所沮改為御史中丞盖疎之也戊午御史中丞盧損責授右贊善大夫知雜侍御史韋税責授太僕寺丞侍御史魏遜責授太府寺主簿侍御史王岳責授司農寺主簿初延州保安鎮将白文審聞兵興岐下専殺郡人趙思謙等十餘人已伏其罪復下臺追繫推鞫未竟㑹去年五月}
