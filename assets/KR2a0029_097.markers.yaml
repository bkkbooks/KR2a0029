  - {type: variant, offset: 5247, length: 0, content: '', krp: 王自率部族來援太原髙行周符彥卿率左右廂騎軍出鬭蕃軍引退已時後蕃軍復成列張敬達楊光逺安審琦等陣於賊城西北倚山横陣諸将奮擊蕃軍屢郤至晡我騎軍将移陣蕃軍如山而進王師大敗投兵仗相籍而死者山積是夕收合餘衆保于晉祠南晉安寨蕃軍塹而圍之自是音聞阻絶朝廷大恐是日遣侍衛步軍都指揮使符彥饒率兵屯河陽詔范延光率兵由青山路趨榆次詔幽州趙徳鈞由飛狐路出敵軍後輝州防禦使潘環合防戍軍出磁隰以援張敬達以前絳州刺史韓彥惲為太子賓客契丹王移帳於栁林乙巳詔取二十二日幸北面軍前戊申帝發京師路經徽陵帝親行謁奠夕次河陽召羣臣議進取盧文紀勸帝駐河橋庚戌樞密使趙延壽先赴潞州辛亥幸懐州召吏部侍郎龍敏訪以機事敏勸帝立東丹王賛華為契丹主以兵援送入蕃則契丹王有後顧之患不能久駐漢地矣帝深以為然竟不行其謀遼史義宗𫝊云倍雖在異國常思其親問安之使不絶後明宗養子従珂弑其君自立倍密報太宗曰従珂弑君盍討之是東丹王實啟兵端唐君臣或知其隂謀故龍敏之説不行帝自是酣飲悲歌形神慘沮臣下勸其親征則曰卿輩勿説石郎使我心膽墮地其怯憊也如此冬十月丁巳夜彗星出虚危長尺餘壬戌詔天下括馬又詔民十户出兵一人器甲自備契丹國志唐發民為兵每七户出征夫一人自備鎧仗謂之義軍凡得馬二千餘匹征夫五千人民間大擾戊辰代州刺史張朗超授檢校太保以其屢殺敵衆故以是命奨之癸酉幽州趙徳鈞以本軍三千騎與鎮州董温琪由呉兒谷趋潞州十一月戊子以趙徳鈞為諸道行營都統以趙延壽為河東道南面行營招討使以劉延朗副之庚寅以范延光為河東道東南面行營招討使以李周副之帝以吕琦嘗佐幽州幕乃命賫都統官告以賜徳鈞兼犒軍士琦至従容宣帝委任之意徳鈞曰既以兵相委焉敢惜死徳鈞志在併范延光軍奏請與延光㑹合帝以詔諭延光延光不従丁酉延州上言節度使楊漢章為部衆所殺以前坊州刺史劉景嚴為延州留後庚子趙徳鈞奏大軍至團柏谷前鋒殺蕃軍五百騎范延光奏軍至榆次蕃軍退入河東川界潘環奏隰州逐退蕃軍壬寅趙徳鈞奏軍出谷口蕃軍漸退契丹王見駐栁林砦時徳鈞累奏乞授延壽鎮州節制帝怒曰徳鈞父子堅要鎮州茍能逐退蕃戎要代予位亦甘心矣若翫寇要君但恐犬兎俱斃徳鈞聞之不悦閏月丙辰日南至羣臣稱賀于行宫帝曰晉安寨内将士應思家國矣因泣下久之丁巳以岢嵐軍為勝州辛酉以右龍武統軍李従昶為左龍武統軍以前邠州節度使楊思權為右龍武統軍壬戌丹州刺史康承詢停任配流鄧州時承詢奉詔率義軍赴延州義軍亂承詢奔鄜州故有是責甲子太原行營副招討使楊光逺殺招討使張敬達于晉安寨以兵降契丹時契丹圍寨自十一月以後芻糧乏絶軍士毁}
