  - {type: variant, offset: 1544, length: 1, content: 云, krp: 引于國紀年荆南史載天成元年二月壬辰請忠䕫萬州及雲安監𨽻本道莊宗許之詔命未下莊宗遇弑六月壬辰王表求三州明宗許之秋七月乙夘朔以太原舊宅為積慶宫庚申契丹渤海國俱遣使朝貢甲子詔割韓城郃陽兩縣屬同州誅滑州左右崇牙及及長劎等軍數百人夷其族作亂故也其都校于可洪等相次到闗亦斬於都市丁夘以偽蜀守司空門下侍郎平章事}
  - {type: punctuation, offset: 1545, content: ：, id: KR2a0029_ZHSJ_073-bkkpn364}
  - {type: variant, offset: 1546, length: 0, content: '', WYG: 國公王諧為檢校司空守陵州刺史以虢州刺史石潭為耀州團練使辛未詔諸道節度刺史文武将史舊進月旦起居表今後除節度留後團練防禦使惟正至進賀表其四孟月並且止絶甲戌中書門下上言宣㫖令進納新授諸道判官州縣官官告敕牒祗應宣賜凖徃例除将相外並不賜官告即因梁氏起例凡宣授官並特㤙賜臣等商量自兩使判官令録在京除授者即於内殿謝㤙便辭赴任不更進納官告判司主簿不合更許朝對敕下後望準舊例處分從之乙亥莊宗皇帝梓宫發引帝衰服臨送於樓前是日塟莊宗於雍陵鎮州留後王建立奏涿州刺史劉殷肇不受代謀叛昨發兵収掩擒劉殷肇及其黨一十三}
  - {type: page-break, offset: 1546, content: '', id: KR2a0029_WYG_073-10a, image: WYG0277/WYG0277-0326a.png}
  - {type: page-break, offset: 1546, content: '', id: KR2a0029_WYG_073-10b, image: WYG0277/WYG0277-0326b.png}
  - {type: variant, offset: 1546, length: 0, content: '', krp: 國公王諧為檢校司空守陵州刺史以虢州刺史石潭為耀州團練使辛未詔諸道節度刺史文武将史舊進月旦起居表今後除節度留後團練防禦使惟正至進賀表其四孟月並且止絶甲戌中書門下上言宣㫖令進納新授諸道判官州縣官官告敕牒祗應宣賜凖徃例除将相外並不賜官告即因梁氏起例凡宣授官並特㤙賜臣等商量自兩使判官令録在京除授者即於内殿謝㤙便辭赴任不更進納官告判司主簿不合更許朝對敕下後望準舊例處分從之乙亥莊宗皇帝梓宫發引帝衰服臨送於樓前是日塟莊宗於雍陵鎮州留後王建立奏涿州刺史劉殷肇不受代謀叛昨發兵収掩擒劉殷肇及其黨一十三}
  - {type: variant, offset: 1547, length: 4, content: 取魏博然, WYG: 見折足勘詰己夘以比部郎中知制誥楊凝式為給事中充史館修撰判館事以偽蜀吏部尚書楊玢為給事中充集賢殿學士判院事升應州為彰徳軍節度仍以興唐軍為寰州𨽻彰徳軍宰相豆盧革貶辰州刺史韋説貶溆州刺史仍令所在馳驛發遣為諫議大夫蕭希甫疏奏故也制略曰革則縱田客以殺人説則侵鄰家而奪井選元亨之上第改王參之本名或主掌三司委元隨之務局或陶鎔百里受長吏之桑田咸屈塞於平人互阿私于愛子任官匪當黷貨無厭謀人之國若斯致主之方安在既迷理亂又昧巻舒而府司案牘爰來諫署奏章疊至備彰醜迹深汙明庭是宜約以三章投之四裔其河南府文案及蕭希甫論疏並宜宣示百僚庚辰賜蕭希甫衣段二十匹銀器五十兩賞疏革説之罪也宰相鄭珏任圜再見安重誨救解革説請不復追行}
  - {type: page-break, offset: 1547, content: '', id: KR2a0029_WYG_073-11a, image: WYG0277/WYG0277-0326c.png}
