  - {type: variant, offset: 1555, length: 4, content: 河為境故, WYG: 捧聖嚴衛左廂馬步軍都指揮使李從璋領饒州刺史充大内皇城使中書門下奏條制檢校官各納尚書省禮錢舊例太師太尉納四十千後減落至二十千太傅太保元納三十千減至十五千司徒司空元納二十千減至一十千僕射尚書元納一十五千減至七千員外郎中元納一十千今納三千四百者詔曰㑹府華資皇朝寵秩凡霑新命各納禮錢爰自近年多隳舊制遂致紀綱之地遽成廢墜之司况累條流就從減省方當提舉宜振規繩但縁其間翊衛動庸藩宣将佐自軍功而遷陟示恩澤以奨酬須議從權不在其例其餘自不帶平章事節度使及防禦團練刺史使府副使行軍巳下三司職掌監務官州縣官凡闗此例並可徵納其檢校官自員外郎至僕射秪初轉一任納錢若不改呼不在徵納仍委尚書省部司專切檢舉置靡逐月具數申中書門下癸未詔辰州刺史豆盧革可責授費州司户參軍溆州刺史韋説可責授夷州司户參軍皆員外置同正員仍令馳驛發遣甲申又詔曰責授費州司户參軍豆盧革夷州司户參軍韋説等自居台輔累換嵗華負先皇倚注之恩失大國爕調之理朕自登宸極}
