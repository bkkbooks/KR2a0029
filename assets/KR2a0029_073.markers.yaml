  - {type: variant, offset: 1544, length: 1, content: 云, WYG: 引于國紀年荆南史載天成元年二月壬辰請忠䕫萬州及雲安監𨽻本道莊宗許之詔命未下莊宗遇弑六月壬辰王表求三州明宗許之秋七月乙夘朔以太原舊宅為積慶宫庚申契丹渤海國俱遣使朝貢甲子詔割韓城郃陽兩縣屬同州誅滑州左右崇牙及及長劎等軍數百人夷其族作亂故也其都校于可洪等相次到闗亦斬於都市丁夘以偽蜀守司空門下侍郎平章事}
