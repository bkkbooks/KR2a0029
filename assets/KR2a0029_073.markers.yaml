  - {type: variant, offset: 1319, length: 221, content: 乾化元年十二月梁祖北征迴過郡凝貢獻加等梁祖大悅梁祖復北凝迎奉進貢有加於前梁祖次相州刺史李思安迎奉疏怠梁祖怒貶思安制云懷州刺史段明遠少年治郡庶事惟公兩度祗奉行鑾數程宿食本界動無遺闕舉必周豐蓋能罄竭於家財務在顯酬夫明奬觀明遠之忠勤若此見思安之悖慢何如悖慢何如原本作悖曼如何今從通鑑改正影庫本粘籤其見賞如此其後遷鄭州刺史監大軍於河上案歐陽史遷凝鄭州刺史使監兵于河上李振亟請罷之太祖曰凝未有罪振曰待其有罪則社稷亡矣然終不罷也據此則凝監河上軍為梁祖時事, WYG: ''}
