  - {type: variant, offset: 235, length: 0, content: '', WYG: 都招討制置等使守侍中監修國史兼樞密使郭崇韜宜許歸塟其世業田宅並還與骨肉故萬州司户朱友謙可復䕶國軍節度使守太師兼尚書令河中尹西平王所有田宅財産並還與骨肉丁丑西都衙内指揮使張籛進納偽蜀主王衍犀玉帶各二條馬一百五十匹初莊宗遣中官向延嗣就長安之殺王衍也旋屬蕭牆之祸延嗣藏竄不知所之而衍之資裝妓樂竝為籛所有復懼事泄故聊有此獻戊寅以樞密使安重誨兼領襄州節度使制下重誨之黨謂重誨曰襄州地控要津不可乏帥無宜兼領重誨即自陳退許之以左金吾大将軍張遵誨為西京副留守知留守事辛巳以衛尉卿李懌為中書舍人充翰林學士壬午以前蔚州刺史張温為振武留後以左右廂突陣指揮使康儀誠為汾州刺史以左}
