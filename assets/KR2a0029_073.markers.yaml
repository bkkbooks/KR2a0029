  - {type: variant, offset: 2754, length: 272, content: 百七十九案孔謙傳永樂大典僅存一條今錄冊府元龜以存梗概案以下原闕北夢瑣言云明宗即位誅租庸使孔謙等孔謙者魏州孔目莊宗圖霸以供饋兵食謙有力焉既為租庸使曲事嬖倖奪宰相權專以聚斂為意剝削為端以犯衆怒伏誅舊五代史考異李鄴魏州人也幼事楊師厚及莊宗入魏漸轉裨將歷數郡刺史後遷亳州為政貪穢有奴為人持金以賂鄴奴隱其金鄴殺之其家上訴因訐其陰事詔貶郴州司戶參軍又貶崖州長流百姓所在賜自盡永樂大典卷一萬三百八十九史臣曰易云積不善之家必有餘殃又曰惡不積不足以滅身如毛璋之儔可謂積惡而滅其身矣況溫韜之發陵寢段凝之敗國家罪不容誅死猶差晚餘皆瑣瑣何足議焉永樂大典卷一萬三百八十九, WYG: ''}
