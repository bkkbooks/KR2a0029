  - {type: variant, offset: 346, length: 1, content: 璋, WYG: 李紹珙起復依前襄州節度使仍復本姓名曰劉訓以皇子河中留後從珂為河中節度使百僚表賀以翰林承㫖兵部尚書知制誥盧質為檢校司空充同州節度使巳丑以吏部尚書判太常卿事李琪為御史大夫以禮部尚書崔協為太常卿判吏部尚書銓事以御史中丞崔居儉為兵部侍郎以太子賔客蕭頃為禮部尚書中書奏請以九月九日皇帝降誕日為應聖節休假三日從之故忠武軍節度使檢校太師兼尚書令齊王張全義贈太師以前尚書右丞崔沂為尚書左丞丙申新州留後張庭裕雲州留後髙行珪並正授本軍節度使丁酉詔曰四夷來王歴代故事前後各因強弱撫制互有典儀大蕃須示于威容即於正衙引對小蕃但推於恩澤仍於便殿撫懐憲府奏論禮院詳酌皆徵故實咸有明文正衙威容未可全廢内殿恩澤且可常行若遇大蕃入朝即凖舊儀於正殿排比鋪陳立仗百官排班于正門引入對見時百僚入閤班退後郤引對朝貢蕃客御史大夫李琪奏論之下禮院檢討而降是命焉戊戌樞密使安重誨加檢校太保行兵部尚書事如故以太子詹事劉岳為兵部侍郎以太子右庶子王權為户部侍郎以太子左庶子任贊為工部侍郎庚子荆南節度使檢校太師兼尚書令南平王髙季興加守太尉兼尚書令澤潞節度使檢校太傅同平章事孔勍加兼侍中汴州屯駐控鶴指揮使張諫等}
