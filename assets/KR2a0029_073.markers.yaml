  - {type: variant, offset: 1597, length: 485, content: 考異梁末帝以戴思遠為北面招討使行師不利用王彥章代之受任之翌日取德勝之南城軍聲大振張漢倫等推功於凝凝掎摭彥章之失以間之案通鑑彥章棄鄒家口復趨楊劉遊奕將李紹興敗梁遊兵于清邱縣南段凝以為唐兵已自上流渡驚駭失色面數彥章尤其深入舊五代史考異梁末帝怒罷彥章兵權凝納賂於趙張二族求為招討使敬翔李振極言不可竟不能止凝以衆五萬營於高陵津裨將康延孝叛歸莊宗延孝具陳梁軍虛實莊宗遂決長驅之計未幾莊宗入汴凝自滑率兵而南前鋒杜晏球至封丘解甲聽命翌日凝率大軍乞降於汴郊莊宗釋之復以凝為滑州兵馬留後賜姓名紹欽有頃正授節度改兗州節度使凝初見莊宗因伶人景進通貨於宮掖凝天性姦佞巧言飾智善候人意其年契丹寇幽州命宣徽使李紹宏監護諸軍以禦契丹凝與董璋戍瓦橋關凝巧事紹宏紹宏嘗乘間奏凝蓋世奇才可以大任屢請以兵柄委之郭崇韜曰段凝亡國敗軍之將姦諂難狀不可信也凝在藩鎮私用庫物數萬計有司促償中旨貰其負同光三年四月移授鄧州節度使四年二月趙在禮據鄴城李紹宏請用凝為大將莊宗許之令具方略條奏凝所請偏裨皆取其己黨莊宗疑之乃止明宗至洛陽霍彥威怒其前事與溫韜同收下獄詔釋之放歸田里明年竄於遼州竟與溫韜同制賜死永樂大典卷一萬八千一百, WYG: 巻}
