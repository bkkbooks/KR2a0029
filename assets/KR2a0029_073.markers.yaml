  - {type: variant, offset: 11, length: 0, content: '', WYG: 月丙午帝自興聖宫赴西宫文武百僚縞素于位帝服斬衰親奉攢塗設奠哭盡哀乃於柩前即皇帝位百官易吉服班於位帝御衮冕受冊訖百僚稱賀丁未羣臣縞素赴西宫臨以樞密使安重誨為檢校司空守左領軍大将軍依前充樞密使宰臣豆盧革等三上表請聽政從之遣使徃諸道及淮南告哀辛亥帝始聽政於中興殿壬子西南面副招討使工部尚書任圜率步騎二萬六千人入見甲寅帝御文明殿受朝制改同光四年為天成元年大赦天下後宫内職量留一百人内官三}
