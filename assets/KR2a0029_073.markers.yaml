  - {type: variant, offset: 348, length: 4, content: 欲不奉詔, WYG: 叛伏誅以樞密使孔循權知汴州軍州事甲辰樞密使孔循加檢校太保守祕書監依前充使巳巳以祕書少監姚顗為左散騎常侍以太子左諭徳陸崇為右散騎常侍以兵部郎中蕭希甫為左諫議大夫前幽州節度}
