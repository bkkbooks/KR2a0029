  - {type: variant, offset: 2084, length: 669, content: 孔謙案通鑑作魏州人舊五代史考異莊宗同光初為租庸副使謙本州之幹吏上自天祐十二年帝平定魏博會計皆委制置謙能曲事權要效其才力帝委以泉貨之務設法箕斂七八年間軍儲獲濟及帝即位于鄴城謙已當為租庸使物議以謙雖有經營濟贍之勞然人地尚卑不欲驟總重任樞密使郭崇韜舉魏博觀察判官張憲為租庸使判官下原本有闕文考歐陽史係判官張憲今增入影庫本粘籤以謙為副謙悒然不樂者久之帝既平梁汴謙徑自魏州馳之行在因謂崇韜曰魏都重地須大臣彈壓以謙籌之非張憲不可崇韜以為忠告即奏憲為鄴都副留守乃命宰臣豆盧革專判租庸謙彌失望乃尋革過失時革以手書便省庫錢數十萬謙以手書示崇韜微諷聞於革革懼上表請崇韜專其事崇韜亦辭避帝問當委何人為可崇韜曰孔謙雖久掌貨泉然物議未當居大任以臣所見却委張憲為便帝促徵之憲性精辨為趨時者所忌人不祐之謙乘間訴于豆盧革曰租庸錢穀悉在眼前委一小吏可辦鄴都本根之地不可輕付于人興唐尹王正言無裨益之才徒有獨行詔書既徵張憲復以何人為代豆盧革言于崇韜崇韜曰鄴都分司列職皆主上舊人委王正言何慮不辦革曰俱是失也設不獲已以正言掌租庸取書于大臣或可辦矣若付之方面必敗人事謙以正言非德非勳懦而易制曰此議為便然非己志尋掎正言之失泣訴于崇韜厚賂閹伶以求進用人知奸諂沮之乃上章請退帝怒其規避將置于法樂人景進于帝前解喻而止王正言風病恍惚不能綜三司事景進屢言于帝乃以正言守禮部尚書以謙為租庸使冊府元龜卷九百二十四謙以國用不足奏諸道判官員數過多請只置節度觀察判官書記支使推官各一員留守置判官各一員三京府置判官推官餘並罷俸錢又奏百官俸錢雖多折支非實請減半數皆支實錢並從之未幾半年俸復從虛折永樂大典卷四千, WYG: ''}
