  - {type: variant, offset: 354, length: 12, content: 邊蔚密言規責乃僶俛承命洎, WYG: 吕夢竒為右諫議大夫以鄴都副留守孫岳為潁州團練使詔曰古者酌禮以制名懼廢於物取其難犯而易避貴便於時況徵在二名抑有前例以太宗文皇帝自登寶位不改舊稱時即臣有世南官有民部靡聞曲避止禁連呼朕猥以眇躬託於人上止遵聖範非敢自尊應文書内所有二字但不連稱不得迴避如是臣下之名不欲與君親同字者任自改更丁未中書門下奏京城潛龍舊宅望以}
