  - {type: variant, offset: 231, length: 1, content: 璋, krp: 貝州刺史房知温}
  - {type: variant, offset: 233, length: 0, content: '', WYG: 兖州節度使以齊州防禦使王晏球為宋州節度使以洺州刺史米君立為邢州節度使巳未賜文武百官各一馬一驢西都知府張籛進魏王繼岌打毬馬七十二匹北京馬步都指揮使李從温奏凖詔誅宦官初莊宗遇内難宦者數百人竄匿山谷落髮為僧奔至太原七十餘人至是盡誅于都亭驛辛酉詔華州放散西川宫人各歸骨肉壬戌以前相州刺史北京左右廂都指揮使安金全為安北都護振武節度使同平章事甲子前西都留守京兆尹張筠加檢校太傅充山南西道節度使以夔州節度使李紹文為遂州節度使以前鄧州留後戴思逺為洋州節度使丁夘以金吾将軍張實為金州防禦使戊辰以金紫光禄大夫檢校司空趙在禮為滑州節度使加檢校太保制下在禮以軍情不順為辭不之任以許州留後陶玘為鄧州留後以諸道馬步副都指揮使安審通為齊州防禦使庚午以權知北京軍府事汾州刺史符彦超為晉州留後以前陳州刺史劉仲殷為陜州留後癸酉以前磁州刺史劉彦琮為同州留後甲戌福州節度使檢校太傅王延翰加檢校太尉同平章事乙亥翰林學士户部侍郎知制誥馮道翰林學士中書舍人趙鳳俱以本官充端明殿學士端明之職自此始也五代㑹要明宗初登位四方書奏多令樞密使安重誨讀之不曉文義於是孔循獻議因唐室侍讀之號即創端明學士之名命馮道等為之丙子詔故西道}
