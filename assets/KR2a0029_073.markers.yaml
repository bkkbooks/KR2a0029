  - {type: variant, offset: 227, length: 3, content: 師討蜀, WYG: 後移杜氏䝉前朝賜今姓名乞復本姓詔並可之李紹真復曰霍彦威李紹英復曰房知温李紹䖍復曰王晏球李紹竒復曰夏魯竒李紹能復曰米君立青州節度使檢校太傅同平章事符習加兼侍中徐州節度使檢校太傅霍彦威加兼侍中移鎮鄆州丁已初詔文武百僚正衙常參外五日一度内殿起居五代㑹要天成元年五月三日敕今後宰臣文武百官除常朝外每五日一度入内起居其中書非時有急切公事請開延英不在此限麟州奏指揮使張延寵作亂焚剽市民已殺戮訖戊午河陽節度使夏魯竒加檢校太傅}
