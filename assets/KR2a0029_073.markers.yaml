  - {type: variant, offset: 546, length: 321, content: 織羅故稍佑璋及款狀上聞或云夢奇受璋賂所以獄不盡情執之移於軍巡璋具狀曾許延祚賂未與又云曾借馬與夢奇別無行賂之事朝廷懲其宿惡長流儒州賜死於路永樂大典卷一萬八千一百三十聶嶼聶嶼傳永樂大典僅存一條今錄冊府元龜以補其闕影庫本粘籤鄴中人少為僧漸學吟詠鄭王玉之再主禮闈也鄭王玉之再主禮闈也刻本作知貢舉劉本嶼與鄉人趙都俱赴鄉薦都納賄於王玉人報翌日登第嶼聞不捷詬來人以嚇之王玉懼俾俱成名永樂大典卷二萬一千一百六十一漸為拾遺依郭崇韜為鎮州書記明宗時為起居舍人雙眸若懸性氣乖僻人多忌之天成初除鄴都留守判官與趙敬怡呂夢奇不足又改河東節度及至常鄙其土風薄其人士或達于重誨會敬怡入為樞密使與夢奇同搆殺之嶼早依郭崇韜門庭致身朱紫名登兩史浙江使迴生涯巨萬嶼為河東節判時郭氏次, WYG: 檢校太傅壬}
