  - {type: variant, offset: 4, length: 0, content: '', WYG: 馬副元帥河南尹判六軍諸衞事守太尉中書令魏王名位之重冠絶中外泝至府客將白以副留守合行廷禮沂曰張公官位至重然尚帶府尹之名不知副留守見尹之儀何如全義知之遽引見沂勞曰彼此有禮俱老矣勿相勞煩莊宗興復唐室復用為左丞判吏部尚書銓選司坐累謫石州司馬明宗即位召還復為左丞以衰疾告老授太子少保致仕卒于龍門之别墅時年七十餘贈太子少傅劉岳字昭輔其先遼東襄平人元魏平定遼東徙家于代隨孝文遷洛遂為洛陽人八代祖民部尚書渝國公政㑹武徳時功臣祖符蔡州刺史父珪洪洞縣令符有子八人皆登進士第珪之母弟瓌玕異母弟崇夷崇龜崇望崇魯崇謩崇龜乾寧中廣南節度使崇望乾寧中宰相崇魯崇謩崇夷並厯朝省岳少孤亦進士擢第厯户部巡官鄭縣簿直史館轉左拾遺侍御史梁貞明初召入翰林為學士岳為文敏速尤善談諧在職累遷户部侍郎在翰林十二年莊宗入汴隨例貶均州司馬尋丁母憂許自貶所奔喪服闋授太子詹事明宗即位厯兵部吏部侍郎祕書監太常卿卒年五十六贈吏部尚書岳文學之外通于典禮天成中奉詔撰新書儀一部文約而理當今行于世子温叟仕至御史中丞國老談苑云劉温叟方正守道以名教為已任幼孤事母以孝聞其母甚賢初為翰林學士私庭拜母母即命二婢箱擎公服金帶置于階下謂温叟曰此汝父長興中入翰林時所賜也自先君子薨背以來常懼家門替墜今汝能自致青雲繼父之職可服之無愧矣因欷歔掩泣温叟伏地號慟退就别寢素衣蔬食追慕}
