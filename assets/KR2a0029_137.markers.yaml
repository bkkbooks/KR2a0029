  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書舊五代史卷六十八宋門下侍郎參知政事監修國史薛居正等撰唐書第四十四列𫝊二十薛廷珪其先河東人也父逢咸通中為祕書監以才名著於時廷珪中和年在西川登進士第累厯臺省舊唐書大順初累遷司勲員外郎知制誥乾寧中為中書舍人駕在華州改散騎常侍尋請致仕客遊蜀川昭宗遷洛陽徵為禮部侍郎舊唐書光化中復為中書舍人遷刑部吏部二侍郎權知禮部貢舉拜尚書左丞時栁璨屠害朝士衣冠畢罹其毒廷珪以居常退讓獲全新唐書朱全忠兼四鎮廷珪以官告使至汴客將先見諷其拜廷珪佯不曉曰吾何徳敢受令公拜乎及見卒不肯加禮入梁為禮部尚書莊宗平定河南以廷珪年老除太子少師致仕案通鑑廷珪}
