  - {type: variant, offset: 35, length: 7, content: 契丹兵數千騎戰, WYG: 賛鄉曲之舊以秦王盛年自恣須朝中選端士納誨冀其稟畏乃奏薦賛焉賛節概貞素忽聞其命掩泣固辭竟不能止通鑑瓉自以左遷泣訢不得免胡三省注云唐制六部侍郎除吏部之外餘皆從四品下王傅從三品然六部侍郎為嚮用王傅為左遷以職事有間劇之不同也當是時從榮地居儲副則秦王傅不可以閒官言盖以從榮輕佻峻急恐豫其禍故求脫耳時秦王參佐皆新進小生動多輕脱每稱頌秦王功徳阿意順㫖祗奉談笑惟賛從容諷議必獻嘉言秦王常接見賓客及遊客}
