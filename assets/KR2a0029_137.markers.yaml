  - {type: 'tls:seg', offset: 0, content: '', id: KR2a0029_ZHSJ_137-d137p16s117}
  - {type: variant, offset: 1, length: 2, content: 契丹, WYG: 李琪嘗為太祖冊禮使同光三年九月卒贈右僕射所著鳳閣詞書十巻克家志五卷並行于世初廷珪父逢著鑿混沌真珠簾等賦大為時人所稱廷珪既壯亦著賦數十篇同為一集故目曰克家志崔沂新唐書宰相世系表沂字徳潤大中時宰相魏公鉉之幼子也兄沆廣明初亦為宰輔沂舉進士第歴監察補闕昭宗時累遷至員外知制誥性抗厲守道而文藻非優嘗與同舎顔蕘錢珝俱秉筆見蕘珝贍速草制數十無妨譚笑而沂自愧翌日謁國相訴曰沂疎淺不足以供詞翰之職相輔然之移為諫議大夫入梁為御史司憲糾繆繩違不避豪右開平中金吾街使㓂彦卿入朝過天津橋市民梁現者不時迴避前導伍伯捽之投石欄以致斃彦卿自前白于梁祖梁祖命通事舎人趙可封宣諭令出私財與死者之家以贖其罪沂奏劾曰彦卿位是人臣無専殺之理况天津橋御路之要正對端門當車駕出入之途非街使振怒之所况梁現不時迴避其過止于鞭笞捽首投軀深乖朝憲請論之以法梁祖惜彦卿令沂以過失論沂引鬭競律以怙勢力為罪首下手者減一等又鬭毆條不鬭故毆傷人者加傷罪一等沂表入責授彦卿游擊將軍左衞中郎將沂剛正守法人士多之遷左司侍郎改太常卿轉禮部尚書貞明中帶本官充西京副留守時張全義留守天下}
