  - {type: variant, offset: 11, length: 2, content: 契丹, WYG: 尋移左散騎常侍由是忿以成疾踰月而卒乂微有才術嘗自恃其能為判官日人有造者垂惟深處罕見其面及居西掖而姿態愈倨位竟不至公卿蓋器度促狹者也然乂性孤執尤廉于財長興中嘗自舍人銜命冊晉國公主石氏于太原晉髙祖善待之但訝其髙岸人或有獻可于乂宜陳一謳頌以稱晉髙祖之美可邀其厚賄耳乂曰人生貧富咸有定分未有持天子命違禮以求利既損國綱且虧士行乂今生所不為也聞者嘉之晉髙祖即位贈禮部尚書劉賛魏州人也幼有文性父玭為令録誨以詩書夏月令服青襦單衫玭每肉食別置蔬食以飯賛謂之曰肉食君之禄也爾欲食肉當苦心文藝自可致之吾禄不可分也繇是贊及冠有文辭年三十餘登進士第魏州節度使羅昭威署巡官罷歸京師依開封尹劉鄩久之租庸使趙巖表為巡官累遷至金部員外郎職如故莊宗入汴租庸副使孔謙以贊里人表為鹽鐵判官天成中厯知制誥中書舍人}
