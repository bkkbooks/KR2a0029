  - {type: variant, offset: 5, length: 1, content: 千, krp: 日然後服之士大夫以為得禮封舜卿案原本有闕文據新唐書宰相世系表封氏世居渤海蓨縣舜卿字賛聖父敖字碩夫户部尚書渤海縣男唐書有傳仕梁為禮部侍郎知貢舉開平三年奉使幽州以門生鄭致雍從行復命之日又與致雍同受命入翰林為學士致雍有俊才舜卿雖有文辭才思拙澁及試五題不勝困弊因託致雍秉筆當時譏者以為座主辱門生案以下有闕文莊宗同光巳來累厯清顯封氏自太和以來世居兩制以文筆稱于時舜卿從子渭世系表渭字希叟昭宗遷雒時為翰林學士舜卿為中書舍人叔姪對掌内外制從子翹于梁貞明中亦為翰林學士天成中為給事中因轉對上言以星辰合度風雨應時請御前香一合帝親爇一炷餘令于塔廟中焚之貴表精至議者以翹時推名族出朝苑登瑣闈甚有巖廊之望而忽有此請乃近諸妖佞耳物望由是減之案以下殘闕竇夢徵同州人少苦心為文登進士第厯校書郎自拾遺召入翰林充學士梁貞明中加兩浙錢鏐元帥之命夢徵以鏐無功于中原兵柄不宜虛授其言切直梁末帝以觸時機左授外任玉堂閒話竇以錢公無功于本朝僻在一方坐邀恩澤不稱是命乃抱麻哭于朝翌日竇謫掾于東州有頃復召為學士及莊宗入汴夢徵以例貶沂州居嘗感梁末帝舊恩因為祭故君文云嗚呼四海九州天迴睠命一女二夫人之不幸當革故以鼎新若金銷而火盛必然之理夫何足競云秉筆者皆許之尋量移宿州天成初遷中書舍人復入為翰林學士工部侍郎卒贈禮部尚書玉堂閒話竇失意被謫嘗鬱鬱不樂曽夢有人謂曰君無自苦不久當復故職然將來慎勿為丞相茍有是命當萬計避之其後竇復居禁職有頃遷工部侍郎竇忽憶夢中所言深惡其事然巳受命不能遜避未㡬果卒夢徵隨計之秋文稱甚髙尤長于戕啓編為十巻目曰東堂集行于世李保殷河南洛陽人也昭宗朝自處士除太子正字改錢塘縣尉浙東帥董昌辟為推官調補河府兵曹參軍厯長水令毛詩博士累官至太常少卿端王傅入為大理卿撰刑律總要十二卷與兵部侍郎郗殷象論刑法事左降房州司馬同光初授殿中監以其素有明法律之譽拜大理卿未滿秩屬為人所制保殷曰人之多辟無自立辟乃謝病以歸卒于洛陽歸藹字文彦吳郡人也曽祖登祖融父仁澤位皆至列曹尚書觀察使藹登進士第及昇朝遍厯三署案以下疑有闕文據舊唐書昭宗紀天祐元年七月宴于文思殿朱全忠入百官或坐于廊下全忠怒笞通引官何凝丙寅制金紫光禄大夫行御史中丞上林國韓儀責授棣州司馬侍御史歸藹責授登州司户坐百官傲全忠也同光初為尚書右丞遷刑户二部侍郎以天子賓客致仕卒年七十六孔邈文宣王四十一代孫身長七尺餘神氣温厚登進士第厯校書郎萬年尉充集賢校理為諫議大夫以年老致仕案孔邈𫝊原本殘闕考冊府元龜云乾寧五年登進士第除校書郎崔逺在中書奏為萬年尉充集賢校理以親舅獨孤損方在廊廟避嫌不赴職張文寶昭宗朝諫議大夫顗之子也文寶初依河中朱友謙為從事莊宗即位于魏州以文寶知制誥厯中書舍人刑部侍郎左散}
  - {type: variant, offset: 7, length: 1, content: 戰, WYG: 常侍知貢舉遷吏部侍郎文寶性雅淡稽古長興初奉使浙中泛海船壞水工以小舟救文寶與副使吏部郎中張絢信風至淮南界偽吳楊溥禮待甚至兼厚遺錢幣食物文寶受其食物反其錢幣吳人善之送文寶等復至杭州宣國命還青州卒子吉嗣位邑宰陳乂薊門人也少好學善屬文因避亂客}
