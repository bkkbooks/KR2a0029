  - {type: variant, offset: 29, length: 2, content: 此後, WYG: 署及末帝起於鳯翔閔帝詔令䖍釗帥部兵㑹王師於岐下洎西師俱變䖍釗憤惋退歸興元因與洋州節度使孫漢韶俱送欵於蜀孟知祥待之尤厚偽授本鎮節度使俾知祥坐獲山南之地由䖍釗之故也北夢瑣言入蜀取人産業黷貨無厭蜀民怨之孟昶嗣偽位加檢校太師兼}
