  - {type: variant, offset: 26, length: 2, content: 報吏, WYG: 即位擢為䕶駕親軍都指揮使領春州刺史天成中與諸將圍王都於中山大敗契丹於嘉山之下及定州平以功授滄州節度使北夢瑣言䖍釗鎮滄州日因亢旱民饑發廩賑之方上聞帝甚嘉奬他日秋成倍斗徴劍朝論鄙之移鎮徐州長興中為山南西道節度使兼西面馬歩軍都}
