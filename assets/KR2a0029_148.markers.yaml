  - {type: variant, offset: 8, length: 1, content: 此, WYG: 下懷其首級瘞於昭應縣民陳暉地天成初其子發之㩦去朱守殷小字㑹兒莊宗就學以厮養之投給事左右及莊宗即位為長直軍使雖列戎行不聞戰攻每搆人之短長中於莊宗漸以心腹受委河上對壘稍遷蕃漢馬歩都虞候守殷守徳勝塞為梁將王彦章所改守殷無備遂䧟南寨莊宗聞之曰駑才大悞予事因徹北寨往固楊劉明宗在鄆州宻請以覆軍之罪罪之莊宗私於腹心忍而不問同免二年為振武節度使不之任仍兼領蕃漢馬歩軍京城初定内外警巡恃憑主恩蔑視勲舊與景進互相表裏又强作宿徳之態言語遲緩自謂沉厚及郭從謙犯興教門歩軍始亂中使急召騎士守殷按甲不進莊宗獨領宦官斫射屢退而騎軍終不至莊宗既崩守殷擁衆方在北印憇於茂林之下迨聞凶問乃入内選嬪御及珍寶以歸恣軍士刦掠都翌日方定率諸校迎明宗於東郊天成初授河南尹判六軍諸衛事加侍中移汴州節度使車駕將巡幸外議諠然初以為平呉又云制置東諸候守殷乃生雲夢之疑遂殺都校馬彦超副使宋敬歐陽史守殷將叛召都指揮使馬彦超與計事彦超不從守殷殺之明宗憐彦超之死以其子承祚為洺州長史守殷驅市人閉壁以叛明宗途次京水聞之親統禁軍倍程直抵其壘長圍夾攻縋城甚衆守殷力屈盡殺其族引頸令左右盡其命王師入城索其黨盡誅之詔鞭守殷尸梟首懸於都市滿七日傳送洛陽楊立者潞州之小校初事李嗣昭及李繼韜皆畜養甚厚繼韜被誅憤憤失志同光二年四月有詔以潞兵三萬人戌涿州將發其衆謀曰我軰事故使二十年衣食豐足未嘗邊塞征行茍於邊上差跌白骨何歸不如據城自固事成則富貴耳因聚徒百餘軰攻子城東門城中大擾副使李繼珂及監軍張機祚出奔立自稱留}
