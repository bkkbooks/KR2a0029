  - {type: variant, offset: 34, length: 1, content: 銓, WYG: 漢祖即位乃移鎮梁州以觀朝廷之變會晉昌軍節度使趙匡贊鳯翔節度使侯益俱謀歸蜀遂以䖍釗為北面行營招討使應接經營俄而趙匡贊侯益請昶出師掠定三秦因命䖍釗與韓保貞等總師五萬出散關雄武軍節度使何重建出隴右奉鑾肅衛都虞侯李廷珪出子午谷會於雍州廷珪始出子午谷聞匡贊為王景崇所逼棄城自拔東去遂先退師時䖍釗福誠保貞師次陳倉謀不相叶而侯益聞匡贊已去廷珪班師亦誠欵中變閉壘不出}
