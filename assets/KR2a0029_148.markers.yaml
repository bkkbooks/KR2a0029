  body:
  - {type: 'tls:seg', offset: 0, content: '', id: KR2a0029_ZHSJ_148-d148p26s25}
  - {type: variant, offset: 3, length: 1, content: 奏, WYG: 大軍發成都繼岌令延孝以一萬二千人為後軍二月癸巳中軍次武連中使詔至諭以西平王李繼麟有罪伏誅命繼岌殺其子遂州節度使令徳延孝大驚俄而董璋率兵之遂州遇延孝不謁延孝怒謂諸校曰南平梁汴西定巴卭畫䇿之謀始於郭公而汗馬之勞力摧強敵即吾也若以背偽歸國掎角而成霸業即西平王之功第一西平與郭公皆以無罪赤族歸朝之後次當}
  - {type: variant, offset: 3, length: 1, content: 奏, krp: 大軍發成都繼岌令延孝以一萬二千人為後軍二月癸巳中軍次武連中使詔至諭以西平王李繼麟有罪伏誅命繼岌殺其子遂州節度使令徳延孝大驚俄而董璋率兵之遂州遇延孝不謁延孝怒謂諸校曰南平梁汴西定巴卭畫䇿之謀始於郭公而汗馬之勞力摧強敵即吾也若以背偽歸國掎角而成霸業即西平王之功第一西平與郭公皆以無罪赤族歸朝之後次當}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 我矣丙申延孝次劍州時延孝部下皆鄜延河中舊將焦武等知西平王被禍兼誅令徳號哭軍門訴於延孝曰西平無罪二百口伏誅河中舊將無不從坐某等必死矣時魏王繼岌到泥溪延孝}
  - {type: page-break, offset: 5, content: '', id: KR2a0029_WYG_148-4a, image: WYG0277/WYG0277-0596a.png}
  - {type: variant, offset: 5, length: 0, content: '', krp: 我矣丙申延孝次劍州時延孝部下皆鄜延河中舊將焦武等知西平王被禍兼誅令徳號哭軍門訴於延孝曰西平無罪二百口伏誅河中舊將無不從坐某等必死矣時魏王繼岌到泥溪延孝}
  - {type: variant, offset: 6, length: 1, content: 吏, WYG: 繼岌云河中兵士號哭欲為亂丁酉延孝至劍州遂擁衆廻自稱西川節度三州制置等使以檄招諭人三日間衆及五萬已亥繼岌至利州是夜守吉栢津使宻告魏王曰得紹琛文字令斷吉栢浮梁繼岌懼乃令梁漢顒以兵控吉栢津延孝已擁衆急趨西川繼岌遣人馳書諭之夜半令監軍使李廷安召任圜因署為副招討使令圜率兵七千騎與都指揮使梁漢顒監軍李廷安討之辛丑先令都將何建崇擊劍門下之甲寅圜以大軍至漢州延孝來逆戰圜令董璋以東川懦卒當其鋒伏精兵於其後延孝擊退東川之兵急追之遇伏兵起延孝敗馳入漢州閉壁不出西川孟知祥以兵二萬與圜合勢攻之九國志李延厚傳康延孝入漢州知祥遣延厚率兵二千㑹李仁罕討之將行誓士率曰今出師不三旬必破賊乃立功圖賞之日也士卒有誓忠立東襄衰疾者立西襄無自苦也得請行者七百人逐延孝西寨斬首百餘級竟抜其城漢州四面樹竹木為栅三月乙丑圜陣於金鴈橋即率諸軍鼓譟而進四面縱火風熖亘空延孝危急引騎出戰遇陣於金鴈橋又敗之以十數騎奔綿州河建崇追及擒之任圜命載以檻車時孟知祥與任圜董璋置酒高㑹因引令延孝檻車至會知祥問曰明公頃自梁朝脫身歸命纔平汴水節制陜郊近領前鋒尅平劍外歸朝之後授爵册勲巨鎮尊官誰與為兢奈何躁憤自毁功庸入此檻車還為鄧艾深為痛惜誰肯愍之知祥因手自注盃以飲之延孝曰自知富貴難消官職已足然郭崇韜佐命元勲輔成大業不動干戈收獲兩川自古殊功但恐不及一旦何罪闔門被誅延孝之徒何保首領以此思慮不敢歸朝天道相中使向延嗣賫詔至遂誅之}
