  - {type: variant, offset: 17, length: 8, content: 旋具旋具旋具申奏, WYG: 其同惡十餘人送於闕下皆磔於市潞州城峻而隍深故立輒敢據之莊宗因兹詔諸道撤防城之備焉竇廷琬者世為青州牙將梁祖擢寘左右同光初為復州逰奕使姦盜屏跡厯貝州刺史未幾請制置慶州鹽池逐年出絹十萬疋米十萬斛遂以廷琬為慶州防禦使俾制置之由是嚴刑峻法屢撓邊人課利不集詔移任於金州廷琬據慶州叛詔邠節度使李敬周於率兵討平之夷其族張䖍釗遼州人也九國去云䖍釗遼州榆社人父簡唐檢校尚書左僕射初為太原牙校以武勇聞於流軰武皇莊宗之世累補左右突騎軍使九國志莊宗嘗以偏師取鎮陽命䖍釗率騎為先鋒屢挫賊銳遂䧟其城明宗素聞䖍釗有將才}
  - {type: page-break, offset: 17, content: '', id: KR2a0029_WYG_148-8a, image: WYG0277/WYG0277-0598a.png}
