  front:
  - {type: variant, offset: 0, length: 2, content: 旋具, WYG: 欽定四庫全書舊五代史巻七十四宋門下侍郎參知政事監修國史薛居正等撰唐書第五十列傳二十六康延孝塞北部落人也初隸太原因得罪亡命於汴梁開平乾化中自隊長積勞至部校梁末帝時頻立軍功同光元年八月段凝率衆五萬營於王材時延孝為右先鋒指揮使率百騎來奔莊宗得之喜觧御衣金帶以賜之翌日賜田宅於鄴以為捧日軍使兼南面招討指揮使檢校司空守博州刺史莊宗屏人問梁兵機延孝備陳利害語在莊宗紀中莊宗平汴延孝頗有力焉以功授檢校太保鄭州防禦使賜姓名紹琛明年郊禮畢授保義軍節度使三年討蜀以延孝為西南行營馬歩軍先鋒排陣斬斫等使延孝性驍徤徇利奮不顧身以前鋒下鳯州收固鎮降興州敗王衍軍於三泉所俘蜀軍皆諭而釋之自是晝夜兼行王衍自利州奔歸成都㫁吉柏津浮梁以絶諸軍延孝復造浮梁以渡進收綿州王衍復㫁綿江浮梁而去水深無舟檝可渡延孝謂招撫使李嚴曰吾懸軍深入利在意兵乘王衍破膽之時人心離沮但得百騎過鹿頭闗彼即迎降不暇如俟修善津梁便留數日若王衍堅閉近闗折吾兵勢儻延旬浹則勝負莫可知也宜促騎渡江因與李嚴乘馬浮江於是得濟者僅千人歩軍溺死者亦千餘人延孝即濟長驅過鹿頭進據漢州居三日部下後軍方至偽蜀六軍使王宗弼令人特牛酒幣馬歸欵旬日兩川平定延孝止漢州以俟繼岌平蜀之功延孝居敢時邠州節度使董璋為行營右襄馬歩使華州節度使毛璋為行營左襄馬歩使以軍禮當事延孝郭崇韜以私愛董璋及西川平定之後崇韜每有兵機必召章參決延孝不平時延孝軍於城西毛璋軍於城東董璋軍於城中閏十二月延孝因酒酣謂董璋曰吾有平蜀之功公等僕遫相從反首鼠於侍中之門謀相傾陷吾為都將公及禆校力能斬首璋惶望謝之而退酒罷璋訴於郭崇韜隂銜之乃署董璋為東川節度使落軍職延孝恕謂毛璋曰吾冐白兩犯險阻平定兩川董璋何功遽有其地二人因謁見崇韜曰東川重地宜擇良帥工部任尚書有文武才幹甚洽衆心請表為東川帥崇韜怒曰紹琛反耶敢為吾節度延孝等惶恐而退未幾崇韜為繼岌所害二人因責董璋曰公復首鼠何門璋俛首祈哀而已四年正月甲}
