  - {type: variant, offset: 755, length: 244, content: 也時貞簡太后韓德妃伊淑妃諸宅王之貴諸宅王之貴原本疑有舛誤今無可復考姑仍其舊影庫本粘籤洎王之介弟在晉陽宮或不以其道干於承業悉不聽踰法禁者必懲繇是貴戚斂手民俗丕變或有中傷承業於莊宗者言專弄威柄廣納賂遺莊宗歲時還晉陽宮省太后須錢蒱博給伶官嘗置酒於泉府莊宗酣飲命興聖宮使李繼岌為承業起舞既竟承業出寶帶幣馬奉之莊宗指錢積謂承業曰和哥無錢使七哥與此一積寶馬非殊惠也承業謝曰郎君歌舞承業自出己俸錢此錢是大王庫物准擬支贍三軍不敢以公物為私禮也莊宗不悅使酒侵承業承業曰臣老勅使非為子孫之謀惜錢為大王基業惜錢, WYG: 耳天皇}
