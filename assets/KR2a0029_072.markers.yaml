  - {type: variant, offset: 2687, length: 818, content: 十馬紹宏馬紹宏傳永樂大典疑有刪節今無可復考姑存其舊影庫本粘籤閹官也案莊宗實錄作李紹宏蓋嘗賜姓舊五代史考異初與孟知祥同為中門使及周德威薨莊宗兼領幽州令紹宏權知州事即位之初郭崇韜勳望高舊在紹宏之下時徵潞州監軍張居翰與崇韜並為樞密使紹宏失望乃以為宣徽使紹宏以己合當樞密任案宋史趙上交傳南遊洛陽與中官驃騎大將軍馬紹宏善紹宏領北面轉運制置大使表為判官考紹宏為北面轉運制置大使薛史不載舊五代史考異常鬱鬱側目於崇韜崇韜知其慊也乃置內勾之目令天下錢穀簿書悉委裁遣既而州郡供報輒滋煩費議者以為十羊九牧深所不可內勾之目人以為是妖言永樂大典卷一萬九千六百四十四案下有闕文據通鑑李嗣源為謠言所屬危殆者數四賴宣徽使李紹宏左右營護以是得全天成元年二月己丑朔以宣徽南院使李紹宏為樞密使舊五代史考異孟漢瓊本鎮州王鎔之小豎也明宗鎮常山得侍左右明宗即位自諸司使累遷宣徽南院使漢瓊性通黠善交構初見秦王權重及挾王淑妃勢傾心事之及朱馮用事朱馮用事原本作朱憑下文又有朱馮考通鑑明宗朱弘昭馮贇並掌財賦故稱朱馮原本憑字誤今改正影庫本粘籤又與之締結秦王領兵至天津橋時漢瓊與朱馮及康義誠方會議於內庭謀猶未決漢瓊獨出死力先入殿門奏於明宗語在秦王傳漢瓊即自介馬以召禁軍秦王既誅翌日令漢瓊馳騎召閔帝於鄴案通鑑遣漢瓊徵從厚且權知天雄軍府事舊五代史考異閔帝嗣位尤恃恩寵期月之內累加開府儀同三司驃騎大將軍西軍既叛閔帝急召漢瓊欲令先入于鄴漢瓊藏匿不見潞王行及陝州乃悉召諸妓妾訣別欲手刃之衆知其心率皆藏竄初潞王失守於河中勒歸於清化里第時王淑妃恆令漢瓊傳教旨於潞王王善待之故漢瓊自謂潞王於己有恩至是乃單騎至澠池謁見潞王因自慟哭欲有所陳潞王曰諸事不言可知漢瓊即自預從臣之列尋戮於路左永樂大典卷一萬三千一百六十史臣曰承業感武皇之大惠佐莊宗之中興既義且忠何以階也夫如是則晉之勃貂秦之景監去之遠矣居翰改一字於詔書救千人之濫死可不謂之仁人矣乎如紹宏之爭權漢瓊之搆禍乃宦者之常態也又何足以道哉永樂大典卷一萬三千一百六十, WYG: 攷證}
