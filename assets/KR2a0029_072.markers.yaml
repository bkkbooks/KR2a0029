  - {type: variant, offset: 161, length: 240, content: 御名于唐宰相崔胤或稱為崔裔此傳又稱為崔魏公前後異稱殊失史家紀實之體今存其舊仍附識于此影庫本粘籤武皇偽戮罪人首級以奉詔匿承業於斛律寺昭宗遇弒乃復請為監軍夾城之役遣承業求援於鳳翔時河中阻絕自離石渡河春冰方泮凌凘奔舟不得渡因禱河神是夜夢神人謂曰子但渡流冰無患既寤津吏報曰河冰合矣凌晨躡冰而濟旋踵冰解使還武皇病篤啟手之夕召承業屬之曰吾兒孤弱羣臣縱橫後事公善籌之承業奉遺顧爰立嗣王平內難策略居多既終易月之制即請出師救潞破賊夾城莊宗深感其意兄事之親幸承業私第升堂拜母賜遺優厚時莊宗初行墨制墨制, WYG: 諱敎敎}
