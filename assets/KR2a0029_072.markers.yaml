  - {type: variant, offset: 1971, length: 715, content: 餘年為吾王捃拾財賦召補軍馬者誓滅逆賊朱溫復本朝宗社耳今河朔甫定朱氏尚存吾王遽即大位可乎云云莊宗曰奈諸將意何承業知不可諫止乃慟哭曰諸侯血戰者本為李家今吾王自取之誤老奴矣即歸太原不食而死臣謹按莊宗實錄承業諫即位事甚詳惟吾王自取之言不書史官諱之也張居翰字德卿咸通初掖廷令張從玫養之為子以廕入仕中和三年自容管監軍判官入為學士院判官遷樞密承旨內府令賜緋昭宗在華下華下原本作華夏今據文改正影庫本粘籤超授內常侍出監幽州軍事秩滿詔歸節度使劉仁恭表留之天復中天復原本誤作天福今從唐書改正影庫本粘籤詔誅宦官仁恭紿奏殺之匿於大安山之北谿天祐三年汴人攻滄州仁恭求援於武皇乃遣居翰與書記馬郁等率兵助武皇同攻潞州武皇因留之不遣李嗣昭節制昭義以居翰監其軍監其軍原本作其事今據文改正影庫本粘籤以燕軍三千為部下俄而汴將李思安築夾城以圍潞州居翰與嗣昭登城保守以至解圍自是嗣昭每出征令居翰知留後事同光元年夏四月召為樞密使加特進與郭崇韜對掌機務十月莊宗將渡河留居翰與李紹宏同守魏州莊宗入汴加驃騎大將軍知內侍省事依前充樞密使同光時宦官干政邦家之務皆出於郭崇韜居翰自以覉旅乘時擢居重地每於宣授不敢有所是非承顏免過而已以此脫季年之禍四年三月偽蜀王衍既降詔遷其族於洛陽行及秦川時關東已亂莊宗慮衍為變遣中官向延嗣馳騎齎詔殺之詔云王衍一行並宜殺戮其詔已經印畫時居翰在密地覆視其詔即就殿柱揩去行字改書家字及衍就戮於秦川驛止族其近屬而已其偽官及從行者尚千餘人皆免其枉濫居翰之力也明宗入洛居翰謁見於至德宮待罪雪涕乞歸田里詔許之乃辭歸長安仍以其子延貴為西京職事以供侍養天成三年四月以疾卒於長安時年七十一居翰性和而靜諳悉舊事在潞州累年每春課人育蔬種樹敦本惠農有仁者之心焉永樂大典卷一萬六千四百, WYG: ''}
