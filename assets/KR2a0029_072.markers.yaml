  - {type: variant, offset: 1010, length: 620, content: 影庫本粘籤王若自要散施何妨老夫何妨老夫原本疑有訛字考冊府元龜所引薛史與永樂大典同今仍其舊影庫本粘籤不過財盡兵散一事無成案通鑑作王自取用之何問僕為舊五代史考異莊宗怒顧元行欽曰取劍來承業引莊宗衣泣而言曰僕荷先王遺顧誓為本朝誅汴賊為王惜庫物斬承業首死亦無愧於先王今日請死閻寶解承業手令退承業詬寶曰黨朱溫逆賊未嘗有一言效忠而敢依阿諂附揮拳踣之太后聞莊宗酒失急召入莊宗性至孝聞太后召叩頭謝承業曰吾杯酒之間忤於七哥太后必怪吾七哥為吾痛飲兩巵分謗可乎莊宗連飲四鍾勸承業竟不飲莊宗歸宮太后使人謂承業曰小兒忤特進已笞矣可歸第翌日太后與莊宗俱幸其第慰勞之自是私謁幾絕十四年承制授開府儀同三司左衞上將軍左衞原本作右衞今從冊府元龜改正影庫本粘籤燕國公固辭不受是時盧質在莊宗幕下嗜酒輕傲嘗呼莊宗諸弟為豚犬莊宗深銜之承業慮質被禍因乘間謂莊宗曰盧質多行無禮臣請為大王殺之可乎莊宗曰予方招禮賢士以開霸業七哥何言之過也承業因聳立而言曰大王若能如此何憂不得天下其後盧質雖或縱誕莊宗終能容之蓋承業為之藻藉也十八年莊宗受諸道勸進將纂帝位承業以為晉王三代有功於國先人怒朱氏弒逆將復舊邦讎既未平不宜輕受推戴方疾作肩輿之鄴宮見莊宗曰王父子血戰三十餘年蓋言報國仇讎復唐宗社今元凶未滅民賦已殫而遽先大號𢀿耗財力臣以為不可一也臣自咸通已來咸通原本作成通今從唐書改正影庫本粘籤伏事宮掖每見國家冊命大禮儀仗法物百司庶務經年草定臨事猶有不可王若化家為國新立廟朝不可乖於制度制禮作樂未見其人臣以為不可, WYG: 獲官馬}
