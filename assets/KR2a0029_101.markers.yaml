  - {type: variant, offset: 3918, length: 954, content: 四日鳳翔王景崇兵士離本城尋遣監軍李彥從率兵襲至法門寺西殺戮二千餘人詔升河中府解縣為解州冬十月丙子朔山陵使竇貞固上大行皇帝陵名曰睿陵從之丁丑夕歲星入太微戊寅趙暉奏破王景崇賊軍於鳳翔城下甲申吐番遣使獻方物丙戌右羽林將軍張播停任坐檢田受請託也丁亥中書舍人張誼責授房州司戶兵部郎中馬承翰責授慶州司戶並員外置所在馳驛發遣先是誼與承翰俱銜命于兩浙覩其驕僭之失形於譏誚兼乘醉有輕肆之言錢弘俶恥之摭其過以奏之朝廷以方務懷柔故有是命甲辰延州奏夏州李彝殷先出兵臨州境夏州原本作雅州今從歐陽史改正影庫本粘籤欲應接李守貞今却抽退十一月甲寅誅太子太傅李崧及其弟司封員外郎嶼國子博士夷其族為部曲誣告故也詔曰稔惡圖危難逃天網虧忠負義必速神誅李崧頃在前朝最居重位略無裨益遂至滅亡及事契丹又為親密士民俱憤險佞可知先皇帝含垢掩瑕推恩念舊擢居一品俾列三師不謂潛有苞藏謀危社稷散差人使潛結奸兇俯近山陵擬為叛亂按其所告咸已伏辜宜正典章用懲奸逆其李崧李嶼李一家骨肉及同謀作亂人並從極法云庚申大行皇帝靈駕進發辛酉荊南奏節度使高從誨卒壬申葬高祖皇帝於睿陵十二月丁丑荊南節度副使檢校太傅行峽州刺史高保融起復授荊南節度使檢校太尉同平章事渤海郡侯壬午帝被袞冕御崇元殿授六廟寶冊正使宰臣蘇禹珪及副使大府卿劉皡赴西京行禮兗州奏淮賊先於沂州界立柵前月十七日已歸海州為李守貞牽制也案南唐書嗣主六年李守貞遣從事朱元李平奉表來乞師以潤州李金全為西面行營招撫使壽州劉彥貞為副諫議大夫查文徽為監軍使兵部侍郎魏岑為沿淮巡撫使聞河中平遽班師又李金全傳云出師沭陽諸將銳于進取金全獨以為遠不相及乃止舊五代史考異庚寅奉高祖神主於西京太廟淮南偽主李璟奉書於帝云先因河府李守貞求援又聞大國沿淮屯軍當國亦於境上防備昨聞大朝收軍當國尋已徹備其商旅請依舊日通行朝廷不報辛卯羣臣上表請以三月九日誕聖日為嘉慶節從之延州節度使高允權奏得都頭李彥李遇等告太子太師致仕劉景巖與鄉軍指揮使高志結集草寇欲取臘辰窺圖州城尋請使臣與指揮使李勳聊將兵士巡檢偵邏劉景巖果出兵鬬敵時即殺敗其劉景巖尋獲斬之詔曰劉景巖年已衰暮身處退閑曾無止足之心輒肆苞藏之毒結集徒黨窺伺藩垣所賴上將輸忠三軍協力盡除醜類克殄渠魁其劉景巖次男前德州刺史行琮已行極法長男渭州刺史行謙孫男邢州馬軍指揮使崇勳特放是冬多昏霧日晏方解永樂大典一萬六千二百二, WYG: ''}
