  - {type: variant, offset: 1221, length: 297, content: 節度使常思同州節度使張彥威延州節度使高允權並依前檢校太尉加同平章事澶州節度使郭從義邢州節度使薛懷讓並自檢校太傅加檢校太尉以前奉國右廂都指揮使王饒為鄜州留後甲戌以邠州節度使檢校太尉同平章事王守恩為永興軍節度使加檢校太師以滑州節度使檢校太尉郭謹為邠州節度使以前鎮州留後檢校太傅白再榮為滑州節度使加檢校太尉以陝州節度使檢校太尉同平章事趙暉為鳳翔節度使以前河中節度使檢校太尉同平章事白文珂為陝州節度使殿中監任廷皓配流鄜州坐為劉崇所奏故也丙子鄧州節度使劉重進相州節度使王繼弘安州節度使楊信並自檢校太傅加檢校太尉以鎮州留後兼幽州一行馬步軍都部署檢校太傅劉在明為鎮州節度使加檢校太師部署如故貝州節度使檢校太傅, WYG: 斬其刺史}
