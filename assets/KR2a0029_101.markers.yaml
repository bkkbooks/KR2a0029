  - {type: variant, offset: 90, length: 225, content: 尚書右僕射國初授左衞大將軍檢校司空遷大內都點檢檢校太保乾祐元年正月二十七日高祖崩祕不發喪二月辛巳授特進檢校太尉同平章事封周王宣制畢有頃召文武百僚赴萬歲殿內降大行皇帝遺制云周王承祐可於柩前即皇帝位服紀日月一依舊制是日內外發哀成服初高祖欲改年號中書門下進擬乾和二字高祖改為乾祐至是與御名相符甲申羣臣上表請聽政詔答不允凡四上表從之丁亥帝於萬歲殿門東廡下見羣臣尊母后為皇太后己丑徐州節度使王周卒庚寅以前晉州留後劉在明為鎮州留後幽州馬步軍都部署加檢校太尉是日工, WYG: 刑}
