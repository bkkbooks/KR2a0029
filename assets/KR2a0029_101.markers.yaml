  - {type: variant, offset: 3720, length: 6, content: 癸卯郭威奏今, WYG: 知名茍吾兄山河有託我亦何求公無復言必斬爾首以徇克寧雖慈愛因心而日為兇徒惑亂羣兇之妻復以此言干克寧妻孟夫人説激百端夫人懼事泄及禍屢讓克寧由是愈惑會克寧因事殺都虞候李存質又請兼領大同節度以蔚朔為屬郡又數怒監軍張承業李存璋繇是知其有貳近臣史敬鎔素與存顥善盡知其事敬鎔告貞簡太后曰存顥與管内太保陰圖叛亂俟嗣王過其第卽擒之并太后子母欲送于汴州竊發有日矣荘宗召張承業李存璋謂曰季父所為如此無猶子之情骨肉不可自相魚肉吾卽避路則禍亂不作矣承業曰老夫親承遺託言猶在耳存顥輩欲以太原降賊王乃何路求生不卽討除亾無日矣因令吳珙存璋為之備二}
