  - {type: variant, offset: 26, length: 6, content: 也母曰李太后, WYG: 詔巡使王處存夜圍親仁坊捕克讓詔旦兵合克讓與紀綱何相溫安文寛石的歴十餘騎彎弧躍馬突圍而出官軍數千人追之比至渭橋死者數百克讓自夏陽掠船而濟歸于鴈門明年武皇昭雪克讓復入宿衞黄巢犯闕僖宗幸蜀克讓時守潼關為賊所敗}
