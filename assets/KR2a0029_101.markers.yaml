  - {type: variant, offset: 1609, length: 1747, content: 邠等所抑濤不平之因上疏請出邠等以藩鎮授之樞密之務宜委逢吉禹珪疏入邠等知之乃見太后泣訴其事太后怒濤由是獲譴先是中書廚釜鳴者數四未幾濤罷免案宋史李濤傳濤請出邠等藩鎮以清朝政隱帝不能決白於太后太后召邠等諭之反為所搆免相歸第與薛史異舊五代史考異西道諸州奏河中李守貞謀叛發兵據潼關夏四月辛巳陝州兵馬監押王玉奏收復潼關定州孫方簡奏三月二十七日契丹棄定州遁去壬午以樞密使楊邠為中書侍郎兼吏部尚書平章事使如故以副樞密使郭威為樞密使加檢校太尉三司使王章加檢校太尉同平章事郢州刺史尹實奏荊南起兵在境上欲攻城是日以澶州節度使郭從義為永興軍一行兵馬都部署時供奉官時知化王益自鳳翔部署前永興節度使趙贊部下牙兵趙思綰等三百餘人赴闕三月二十四日行次永興思綰等作亂突入府城據城以叛故命從義帥師以討之案歐陽史云四月壬午永興軍將趙思綰叛附于李守貞案薛史趙思綰據城叛自在三月非四月事又思綰先據城叛後附于李守貞歐陽史先書李守貞反後書思綰叛亦誤也通鑑從薛史甲申王景崇奏趙思綰叛見起兵攻討丁亥幸道宮佛寺禱雨戊子東南面兵馬都元帥兩浙節度使檢校太師兼中書令吳越國王錢弘倧加諸道兵馬都元帥天策上將軍湖南節度使檢校太師兼中書令楚王馬希廣加守中書令以陝州節度使白文珂為河中府城下一行都部署庚寅宰臣竇貞固蘇逢吉蘇禹珪並進封開國公辛卯削奪李守貞在身官爵甲午以翰林學士承旨戶部侍郎王仁裕為戶部尚書以翰林學士左散騎常侍張沆為工部尚書以翰林學士中書舍人范質為戶部侍郎以樞密直學士尚書比部員外郎王度為祠部郎中並依前充職以侍衞步軍都指揮使尚洪遷充西南面行營都虞候案通鑑作西面行營都虞候孔本以客省使王峻為西南面行營兵馬都監戊戌以宣徽南院使扈彥珂為左金吾上將軍庚子以左金吾大將軍充兩街使檢校太傅劉承贇為徐州節度使甲辰以宣徽北院使薛可言為右金吾上將軍以皇城使李暉為宣徽南院使乙巳定州節度使孫方簡奏復入於本州初方簡為狼山寨主叛晉歸契丹及契丹降中渡之師乃以方簡為定州節度使契丹主死永康王嗣位即以蕃將耶律忠代之移方簡為雲州節度使方簡不受命遂歸狼山高祖至闕方簡歸款復以中山命之是歲三月二十七日契丹棄定州隳城壁焚室廬盡驅人民入蕃惟餘空城瓦礫而已至是方簡自狼山回保定州是月河決原武縣河北諸州旱徐州餓死民九百三十有七五月己酉朔國子監奏周禮儀禮公羊穀梁四經未有印板欲集學官考校雕造從之己未回鶻遣使朝貢丁卯前翰林學士徐台符自幽州逃歸乙亥河決滑州魚池六月戊寅朔日有食之庚辰以內客省使王峻為宣徽北院使依前永興城下兵馬都監以冀州牢城指揮使張廷翰為冀州刺史時廷翰殺本州刺史何行通自知州事故有是命甲申以皇弟右衞大將軍承勳為興元節度使檢校太尉同平章事豐州節度使郭勳加檢校太師辛卯永興兵馬都部署郭從義奏得王景崇報有兵自隴州來欲投河中追襲至鄜城荊南節度使高從誨上表歸命從誨嘗拒朝命至是方遣牙將劉扶詣闕請罪丙申鎮州奏節度使劉在明卒戊戌以河陽節度使武行德為鎮州節度使以宣徽南院使李暉為河陽節度使以相州節度使王繼弘為貝州節度使壬寅荊南高從誨貢奉謝恩釋罪丙午以前永興軍節度使王守恩為西京留守是月河北旱青州蝗秋七月戊申朔相州節度使王繼弘殺節度判官張易以訛言聞是時法尚深刻藩郡凡奏刑殺不究其實即順其請故當時從事鮮賓客之禮重足累跡而事之猶不能免其禍焉壬子以工部侍郎李穀充西南面行營都轉運使乙卯禮儀使張昭上高祖廟尊號獻舞名幷歌辭舞曲請以觀德為名歌辭不錄丙辰以久旱幸道宮佛寺禱雨是日大澍開封府言陽武雍丘襄邑三縣蝗為鸜鵒聚食詔禁捕鸜鵒庚申樞密使郭威加同平章事辛酉滄州上言自今年七月後幽州界投來人口凡五千一百四十七北土饑故也乙丑以宣徽北院使王峻為宣徽南院使以內客省使吳虔裕為宣徽北院使戊辰以遂州節度使兼侍衞親軍馬軍都指揮使李洪信為澶州節度使以澶州節度使郭從義為永興軍節度使兼行營都部署庚午故兵部尚書李懌贈尚書左僕射鎮州奏準詔處斬節度副使張鵬訖鵬以一言之失為鄴帥高行周所奏故命誅之乙亥新授鳳翔節度使趙暉奏與八作使王繼濤領部下兵同赴鳳翔時王景崇拒命故也八月己卯以華州節度使侯章為邠州節度使以左金吾上將軍扈彥珂為華州度使壬午命樞密使郭威赴河中府軍前詔河府永興鳳翔行營諸軍一稟威節制時李守貞王景崇趙思綰連衡作叛朝廷雖命白文珂常思攻討河中物議以二帥非守貞之敵中外憂之及是命之降人情大愜案通鑑云自河中永興鳳翔三鎮拒命以來朝廷繼遣諸將討之, WYG: ''}
