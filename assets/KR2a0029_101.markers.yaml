  - {type: variant, offset: 25, length: 0, content: '', WYG: 十六宗室列傳二克讓武皇之仲弟也少善騎射以勇悍聞咸通中從討龎勛以功為振武都校乾符中王仙芝陷荆襄朝廷徴兵克讓率師奉詔賊平以功授金吾將軍畱宿衞初懿祖歸朝憲宗賜宅于親仁坊自長慶以來相次一人典衞兵武皇之起雲中殺段文楚朝議罪之命加兵于我懼將逃歸天}
