  - {type: variant, offset: 3712, length: 7, content: 署兵士赴鳳翔城, WYG: 曲朝夕聚謀皆欲為亂莊宗英察懼及于禍將嗣位讓克寧曰兒年孤稚未通庻政雖承遺命恐未能弹壓大事季父勲德俱高衆情推伏且請制置軍府候兒有立聽季父處分克寧曰亾兄遺命屬在我兒孰敢異議者兒但嗣世中外之事何憂不辦視事之日率先拜賀莊宗嗣位軍民政事一切委之權柄旣重趣向者多附之李存顥者以陰計干克寧曰兄亾弟及古今舊事季父拜侄理所未安富貴功名當宜自立天取不與後悔無及克寧曰公母得不祥之言我家世立功三代父慈子孝天}
