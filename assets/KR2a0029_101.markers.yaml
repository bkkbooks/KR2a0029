  - {type: variant, offset: 327, length: 240, content: 軍王景崇奏於大散關大敗蜀軍俘斬三千人初契丹犯京師侯益趙贊皆受其命節制岐蒲聞高祖入洛頗懷反仄朝廷移贊於京兆移贊于京兆下疑有脫文考冊府元龜所引薛史與永樂大典同今仍其舊影庫本粘籤侯益與贊皆求援於蜀蜀遣何建率軍出大散關以應之至是景崇糾合岐雍邠涇之師以破之癸巳制大赦天下自乾祐元年二月十三日昧爽已前所犯罪人已結正未結正已發覺未發覺常赦所不原者咸赦除之中外文武臣僚並與加恩馬步將士各賜優給唐晉兩朝求訪子孫立為二王後云丙午鳳翔巡檢使王景崇遣人送所獲偽蜀將校軍士四百三十八人至闕下詔釋之仍各賜衣服, WYG: 賀公雅李筠安金俊等}
