  - {type: variant, offset: 3471, length: 0, content: '', WYG: 五日克㳟視元審于孔目吏劉崇之第是日州將安居受引兵仗攻克㳟因風縱火克恭元審並遇害州民推居受為畱後初孟方立之亂居受以澤潞歸于武皇至是孟遷以邢洺納降復任為牙將居受懼其圖已乃叛殺克㳟以結汴人居受遣人召馮霸于沁水霸不受命居受懼將奔歸朝廷至長子為野人所殺傳首馮霸軍霸乃引軍據潞州自稱畱後求援于汴武皇令康君立討之汴將葛從周來援霸九月李存孝急攻潞州汴軍夜遁獲霸等誅之武皇乃以康君立為昭義節度使克寧武皇之季弟也初從起雲中為奉誠軍使赫連鐸之攻黄花城也克寧奉武皇及諸弟登城血戰}
