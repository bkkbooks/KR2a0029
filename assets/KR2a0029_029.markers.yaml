  - {type: variant, offset: 4117, length: 0, content: '', krp: 狀聞于是天子下詔以犨守陳州刺史既視事乃謂將吏曰賊巢之虐徧于四方茍不為長安市人所誅則必驅殘黨以東下况與忠武久為仇讐凌我土疆勢必然也乃遣增垣墉濬溝洫實倉廪積薪芻凡四門之外兩舎之内民有資糧者悉令輓入郡中繕甲兵利劍矟弓弩矢石無不畢備又招召勁勇寘之麾下以仲弟昶為防遏都指揮使以季弟珝為親從都知兵馬使長子麓次子霖皆分領鋭兵黄巢在長安果為王師四面扼束食盡人饑謀東奔之計先遣驍將孟楷擁徒萬人直入項縣犨引兵擊之賊衆大潰斬獲畧盡生擒孟楷中和三年朝廷聞其功就加檢校兵部尚書俄轉右僕射不數月加司空進潁川縣伯巢黨知孟楷為陳所擒大驚憤乃悉衆東來先據溵水後與蔡州秦宗權合勢以攻宛丘陳人懼焉犨恐衆心擕離乃于衆中揚言曰忠武素稱義勇淮陽亦謂勁兵是宜戮力同心捍禦羣冦建功立節去危就安諸君宜圖之况吾家食陳禄久矣今賊衆圍逼衆寡不均男子當于死中求生又何懼也且死于為國不猶愈于生而為賊之伍耶汝但觀吾之破賊敢有異議者斬之由是衆心靡不踴躍無何開門與賊接戰每戰皆捷賊衆益怒巢于郡北三四里起八僊營如宫闕之狀又修百司廨署儲蓄山峙蔡人濟以甲胄軍無所闕焉凡圍陳三百日大小數百戰雖兵食將盡然人心益固犨因令間道奉羽書乞師于太祖太祖素多犨之勇果乃許之四年四月太祖引大軍與諸軍㑹于陳之西北陳人望旗鼓出軍縱火急攻巢寨賊衆大潰重圍遂解獻捷于行在五年八月除犨為蔡州節度使于時巢黨雖敗宗權益熾六七年間屠膾中原陷二十餘郡惟陳去蔡百餘里兵少力㣲日與争鋒終不能屈文德元年蔡州平朝廷議勲以犨檢校司徒充㤗寧軍節度使又改授浙西節度使不離宛丘兼領二鎮龍紀元年三月又以平巢蔡功就加平章事充忠武軍節度使仍以陳州為理所由是中原塵静唐帝復歸長安陳許流亡之民襁負歸業犨設法招撫人皆感之犨兄弟三人時稱雍睦一日念仲弟昶同心王事共立軍功乃下令盡以軍州事付于昶遂上表乞骸後數月寢疾卒于陳州官舎年六十六𦵏于宛丘縣之先域累贈太尉犨雖盡忠唐室保全陳州然黙識太祖雄傑每降心託跡為子孫之計故因解圍之後以愛子結親又請為太祖立生祠于陳州朝夕拜謁數年之間悉力委輸凡所徴調無不率先故能保其功名長子麓位至列卿次子霖改名巖尚太祖女長樂公主開平初授衛尉卿駙馬都尉二年九月權知洺州軍州事俄轉天威軍使十二月授右羽林統軍改右衛上將軍充大内皇墻使三年七月出為宿州團練使旋移州刺史其後累厯近職連典禁軍預誅庶人友珪有功末帝即位用為租庸使守户部尚書巖以勲戚自負貨賂公行天下之賄半入其門又以身尚公主聞唐朝駙馬都尉杜悰位極將相以服御飲饌自奉務極華侈巖恥其不及由是豐其飲膳嘉羞法饌動費萬錢僦斂網商其徒如市權勢燻灼人皆阿附及唐莊宗滅梁室巖踰垣而逸素與徐州温韜相善巖往依之既至韜斬巖首送京師昶字大東犨仲弟也弱冠習兵機沈黙大度神形灑落臨事有通變之才及兄犨為陳州刺史以昶為防禦都指揮使未幾巢將孟楷擁衆萬餘據項城縣昶與兄犨領兵擊破之擒楷以歸不數月巢黨悉衆攻陳以報孟楷之役又蔡冦合從兇醜百萬棲于陳郊陳人大恐一夕昶因巡警假寐于闉闍恍惚間如有隂助昶異而待之遲明開門決戰人心兵勢勇不可遏若有隂兵前導是日擒賊將數人斬首千餘級羣兇氣沮其後連日交戰無不應機俘斬未甞小衂以至重圍數月士心如一及賊敗圍解朝廷紀勲昶一門之中疊加爵秩當時方鎮之内言忠勇者言守禦者言功勲者言政事者皆以犨昶為首焉及犨遥領泰寧軍節度以昶為本州刺史檢校右僕射俄而犨有疾遂以軍州盡付于昶詔授兵馬留後旋遷忠武軍節度使亦以陳州為理所時宗權未滅中原方受其毒陳蔡封疆相接昶每選精鋭深入蔡境蔡賊雖衆終不能抗以至宗權敗焉朝廷賞勲加檢校司徒昶以大冦削平之後益留心于政事勸課農桑大布恩恵景福元年秋陳許將吏耆老録其功詣闕以聞天子嘉之命文臣撰德政碑植于通衢以旌其功俄加同平章事昶自圍解之後恒曰梁王之恩不敢忘也是後太祖每有征伐昶訓練兵甲饋輓供億無有不至乾寧二年寢疾薨于鎮年五十三追贈太尉珝字有節犨季弟也幼而剛毅器宇深沉既冠好書籍及壯工騎射尤精三略及犨為陳州刺史以珝為親從都知兵馬使時巢黨東出商鄧與蔡賊㑹衆至百餘萬掘長壕五百道攻陳陳人大懼珝與二兄堅心誓衆激勵將校約以死節珝以祖先松楸去郭數里慮為羣盜穿發乃夜縱心膂之士遷柩入城府庫舊有巨弩數百枝機牙皆缺工人咸謂不可用珝即創意制度自調弦筈置之雉堞間矢激五百餘步凡中人馬皆洞達胷腋羣賊畏之不敢逼近自仲秋至于首夏軍食將竭士雖不飽而堅拒之志不移會太祖率大軍解其圍珝兄弟抆泣感謝其後朝廷議功加檢校右僕射遥領處州刺史犨薨昶為忠武軍節度使珝遷為行軍司馬檢校司空昶薨珝知忠武軍留後珝公幹之才播于逺邇至于符籍虛實財穀耗登備閲其根本民之利病無不洞知庶事簡㢘公私俱濟太祖深加慰薦尋加特進檢校司徒充忠武軍節度使陳州土壤卑疎每嵗壁壘摧圯工役不暇珝遂營度力用俾以甓周砌四墉自是無霖潦之虞光化二年加檢校太保平章事明年檢校侍中進封天水郡公珝博通前古以陳州本伏羲所都南頓乃光武舊地遂稽考古制崇飾廟貌為四民祈福之所又詢鄧艾故址決翟王河以溉稻粱大實倉廪民獲其利珝兄弟節制陳許繼擁旌鉞共二十餘年陳人愛戴風化大行天復元年冬韓建為忠武軍節度使乃徴珝知同州匡國軍節度留後時太祖統軍岐下珝輸輓調發旁午道途俄而昭宗還長安詔徴入覲錫迎鑾功臣之號珝因堅辭藩鎮遂加檢校太傅右金吾衛上將軍及扈從東遷嵗餘以痼疾免官遂歸淮陽未幾薨于私第年五十五詔贈侍中陳人為之罷市子縠仕至左驍衛大將軍宣徽北院使唐莊宗入汴與從兄巖皆族誅王珂河中人祖縱鹽州刺史父重榮河東節度使破黄巢有大功封瑯琊郡王珂本重榮兄重簡之子出繼重榮唐僖宗光啓三年重榮為部將常行儒所害推重榮弟重盈為蒲帥以珂為行軍司馬及重盈卒軍府推珂為留後時重盈子珙為陜州節度使瑶為絳州刺史由是争為蒲帥瑶珙連上章論列又與太祖書云珂非吾兄弟盖余家之蒼頭也小字忠兒安得繼嗣珂亦上章云亡父有興復之功又遣使求援于太原李克用為保薦于朝昭宗可之既而珙厚結王行瑜李茂貞韓建為援三鎮互相表薦昭宗詔諭之曰吾以太原與重榮有再造之功已俞其奏矣乾寧二年五月三鎮率兵入覲賊害時政請以河中授珙瑶又連兵以攻河中克用聞之出師以討三鎮瑶珙兵退晉師拔絳州擒瑶斬之及克用駐軍于渭北昭宗以珂為}
