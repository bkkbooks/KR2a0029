  - {type: variant, offset: 4094, length: 1, content: 度, WYG: 功臣車駕將入洛奉詔重修五鳳樓朝元殿巨木良匠非當時所有倐架于地泝流西立于舊址之上張設綈繡皆有副焉太祖甚喜以寳帶名馬賜之先是河朔三鎮司管鑰備洒掃皆有閹人紹威曰此類皆宫禁指}
