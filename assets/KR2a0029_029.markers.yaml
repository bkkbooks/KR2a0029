  - {type: variant, offset: 74, length: 3676, content: 月梁將賀瓌圍德勝南城百道攻擊復以艨艟扼斷津渡帝馳而往陣於北岸南城守將氏延賞告急氏延賞原本作民廷賞今據歐陽史改正影庫本粘籤且言矢石將盡帝以重賄召募能破賊艦者於是獻技者數十或言能吐火焚舟或言能禁呪兵刃悉命試之無驗帝憂形於色親從都將王建及進曰臣請效命乃以巨索連舟十艘選效節勇士三百人持斧被鎧鼓枻而進至中流梁樓船三層蒙以牛革懸板為楯建及率持斧者入艨艟間斬其竹笮破其懸楯又於上流取甕數百用竹笮維之積薪於上灌以脂膏火發亙空又以巨艦載甲士令乘煙鼓譟梁之樓船斷紲而下沈溺者殆半軍既得渡梁軍乃退命騎軍追襲至濮陽俘斬千計賀瓌由此飲氣遘疾而卒秋七月帝歸晉陽八月梁將王瓚帥衆數萬自黎陽渡河營於楊村造舟為梁以通津路冬十月帝自晉陽至魏州發徒數萬以廣德勝北城自是日與梁軍接戰十二月戊戌帝軍於河南夜伏步兵於潘張村梁軍寨下以騎軍掠其餉運餉運原本作餉軍今據文改正影庫本粘籤擒其斥候梁王瓚結陣以待帝軍以鐵騎突之諸軍繼進梁軍大奔赴水死者甚衆瓚走保北城天祐十七年春幽州民於田中得金印文曰關中龜印李紹宏獻於行臺秋七月梁將劉鄩尹皓寇同州先是河中節度使朱友謙取同州以其子令德主留務請梁主降節梁主怒不與遂請旄節於帝梁主乃遣劉鄩與華州節度使尹皓帥兵圍同州尹皓原作伊告今據薛史梁紀改正影庫本粘籤友謙來告難帝遣蕃漢總管李存審昭義節度使李嗣昭代州刺史王建及率師赴援九月師至河中朝至夕濟梁人不意王師之至望之大駭明日約戰與朱友謙謀遲明進軍距梁壘梁人悉衆以出蒲人在南王師在北騎軍既接蒲人小却李嗣昭以輕騎抗之梁軍奔潰追斬二千餘級是夜劉鄩收餘衆保營自是閉壁不出數日鄩遂宵遁王師追及於渭河所棄兵仗輜重不可勝計劉鄩尹皓單騎獲免未幾鄩憂恚發病而卒案梁書劉鄩傳作遇酖而卒與唐紀異王師略地至奉先嗣昭因謁唐帝諸陵而還天祐十八年春正月魏州開元寺僧傳真獲傳國寶獻於行臺驗其文即受命於天子孫寶之八字也羣僚稱賀案自開元寺至此三十三字原本闕佚今從冊府元龜增入傳真師於廣明中遇京師喪亂得之秘藏已四十年矣篆文古體人不之識至是獻之時淮南楊溥西川王衍皆遣使致書西川原本作西州今據文改正影庫本粘籤勸帝嗣唐帝位帝不從二月代州刺史王建及卒是月鎮州大將張文禮殺其帥王鎔案歐陽史作正月趙將張文禮弒其君鎔五代春秋作三月趙人張文禮殺其君鎔與薛史繫二月前後互異舊五代史考異時帝方與諸將宴酒酣樂作聞鎔遇弒遽投觶而泣曰趙王與吾把臂同盟分如金石何負於人覆宗絕祀寃哉先是滹沱暴漲漂關城之半溺死者千計是歲天西北有赤祲如血占者言趙分之災至是果驗時張文禮遣使請旄節於帝帝曰文禮之罪期於無赦敢邀予旄節左右曰方今事繁不欲與人生事帝不得已而從之乃承制授文禮鎮州兵馬留後三月河中節度使朱友謙昭義節度使李嗣昭滄州節度使李存審定州節度使王處直邢州節度使李嗣源成德軍兵馬留後張文禮遙領天平軍節度使閻寶大同軍節度使李存璋新州節度使王郁振武節度使李存進李存進原本脫存字今據列傳增入影庫本粘籤同州節度使朱令德各遣使勸進請帝紹唐帝位帝報書不允自是諸鎮凡三上章勸進各獻貨幣數十萬以助即位之費帝左右亦勸帝早副人望帝撝挹久之案九國志趙季良傳季良嘗夢手扶御座自謂輔佐之象由是頗述天時人事以諷莊宗深納其言舊五代史考異秋七月河東節度副使盧汝弼卒八月庚申令天平節度使閻寶成德兵馬留後符習率兵討張文禮于鎮州初王鎔令偏將符習以本部兵從帝屯於德勝文禮既行弒逆忌鎔故將多被誅戮因遣使聞於帝欲以佗兵代習歸鎮習等懼請留帝令傳旨於習及別將趙仁貞烏震等明正文禮弒逆之罪且言爾等荷戟從征蓋君父之故銜寃報恩誰人無心吾當給爾資糧助爾兵甲當試思之於是習等率諸將三十餘人慟哭於牙門請討文禮帝因授習成德軍兵馬留後以部下鎮冀兵致討於文禮又遣閻寶以助之以史建瑭為前鋒甲子攻趙州刺史王鋌送符印以迎閻寶遂引軍至鎮州城下營於西北隅是月張文禮病疽而卒其子處瑾代掌軍事九月前鋒將史建瑭與鎮人戰於城下為流矢所中而卒冬十月己未梁將戴思遠攻德勝北城帝命李嗣源設伏於戚城戚城原本作威城今據薛史梁紀及五代春秋改正影庫本粘籤令騎軍挑戰梁軍大至帝御中軍以禦之時李從珂偽為梁幟奔入梁壘斧其眺樓持級而還梁軍愈恐步兵漸至李嗣源以鐵騎三千乘之梁軍大敗俘斬二萬計辛酉閻寶上言定州節度使王處直為其子都幽於別室都自稱留後案歐陽史王處直叛附于契丹其子都幽處直以來附舊五代考異十一月帝至鎮州城下張處瑾遣弟處琪幕客齊儉等候帝乞降言猶不遜帝命囚之時王師築土山以攻其壘城中亦起土山以拒之旬日之間機巧百變張處瑾令韓正時以千騎夜突圍將入定州與王處直議事為我游軍追擊破之餘衆保行唐賊將彭贇斬正時以降十二月辛未王郁誘契丹阿保機寇幽州案契丹國志王處直在定州以鎮定為唇齒恐鎮亡而定孤乃潛使人語其子王郁使賂契丹令犯塞以救鎮州之圍王郁說太祖曰鎮州美女如雲金帛似山天皇速往則皆為己物也不然則為晉王所有矣太祖以為然率衆而南舊五代史考異遂引軍涿州陷之案契丹陷涿州在天祐十八年李嗣弼傳作天祐十九年紀傳互異又寇定州王都遣使告急帝自鎮州率五千騎赴之天祐十九年春正月甲午帝至新城契丹前鋒三千騎至新樂是時梁將戴思遠乘虛以寇魏州軍至魏店李嗣源自領兵馳入魏州梁人知其有備乃西渡洹水陷成安而去時契丹渡沙河口諸將相顧失色又聞梁人內侵鄴城危急皆請旋師唯帝謂不可乃率親騎至新城契丹萬餘騎遽見帝軍惶駭而退帝分軍為二廣二廣原本作二黃案薛史前後多作二廣當是用左傳左廣右廣之名今改正影庫本粘籤追躡數十里獲阿保機之子時沙河冰薄橋梁隘狹敵爭踐而過陷溺者甚衆阿保機方在定州聞前軍敗退保望都帝至定州王都迎謁是夜宿於開元寺翌日引軍至望都契丹逆戰帝身先士伍馳擊數四敵退而結陣帝之徒兵亦陣於水次李嗣昭躍馬奮擊敵衆大潰俘斬數千追擊至易水獲氈裘毳幕羊馬不可勝紀時歲且北至大雪平地五尺敵乏芻糧人馬斃踣道路纍纍不絕帝乘勝追襲至幽州案契丹國志晉王趨望都為契丹所圍力戰出入數四不解李嗣昭引三百騎橫擊之晉王始得出因縱兵奮擊太祖兵敗遂北至易州會大雪彌旬平地數尺人馬死者相屬太祖乃歸舊五代史考異是月梁將戴思遠寇德勝北城築壘穿塹地道雲梯晝夜攻擊李存審極力拒守城中危急帝自幽州聞之倍道兼行以赴梁人聞帝至燒營而遁三月丙午王師敗於鎮州城下閻寶退保趙州時鎮州累月受圍城中艱食王師築壘環之又決滹沱水以絕城中出路是日城中軍出攻其長圍皆奮力死戰王師不能拒引師而退鎮人壞其營壘取其芻糧者累日帝聞失律即以昭義節度使李嗣昭為北面招討使進攻鎮州夏四月嗣昭為流矢所中卒於師己卯天平節度使閻寶卒以振武節度使李存進為北面招討使是月大同軍節度使李存璋卒五月乙酉李存進圍鎮州營於東垣渡八月梁將段凝陷衞州衞州原本作魏州考五代春秋八月段凝攻晉衞州克之歐陽史及通鑑並作衞州今改正影庫本粘籤刺史李存儒被擒存儒本俳優也帝以其有膂力故用為衞州刺史既而誅斂無度人皆怨之故為梁人所襲案九國志趙季良傳莊宗入鄴時兵革屢興屬邑租賦逋久一日莊宗召季良切責之季良對曰殿下何時平河南莊宗正色曰爾掌輿賦而稽緩安問我勝負乎季良曰殿下方謀攻守復務急徵一旦衆心有變恐河南非殿下所有莊宗斂容前席曰微君之言幾失吾大計舊五代史考異梁將戴思遠又陷共城新鄉等邑自是澶淵之西相州之南皆為梁人所據九月戊寅朔張處球悉城中兵奄至東垣渡急攻我之壘門時騎軍已臨賊城不覺其出李存進惶駭引十餘人鬬於橋上賊退我之騎軍前後夾擊之賊衆大敗步兵數千殆無還者是役也李存進戰歿於師以蕃漢馬步總管李存審為北面招討使以攻鎮州丙午夜趙將李再豐之子冲投縋以接王師諸軍登城遲明畢入鎮州平獲處球處瑾處琪幷其母及同惡高濛李翥齊儉等皆折足送行臺鎮人請醢而食之發張文禮尸磔於市考五代春秋作李存審克鎮州誅張文禮據薛史則文禮先已病沒後乃追戮也五代春秋所書未為核實今附識於此影庫本粘籤帝以符習為鎮州節度使烏震為趙州刺史趙仁貞為深州刺史李再豐為冀州刺史鎮人請帝兼領本鎮從之乃以符習遙領天平軍節度使十一月河東監軍張承業卒十二月以魏州觀察判官張憲權知鎮州軍州事同光元年春正月丙子五臺山僧獻銅鼎三言於山中石崖間得之二月新州團練使李嗣肱卒是時以諸藩鎮相繼上牋勸進乃命有司制置百官省寺仗衞法物省寺原本作省待今據文改正影庫本粘籤期以四月行即位之禮以河東節度判官盧質為大禮使三月己卯以橫海軍節度使內外蕃漢馬步總管李存審為幽州節度使潞州留後李繼韜叛送款於梁是月築即位壇於魏州牙城之南夏四月己巳帝升壇祭告昊天上帝遂即皇帝位文武臣僚稱賀禮畢御應天門宣制改天祐二十年為同光元年大赦天下自四月二十五日昧爽以前除十惡五逆放火行劫持杖殺人官典犯贓屠牛鑄錢合造毒藥外罪無輕重咸赦除之應蕃漢馬步將校並賜功臣名號超授檢校官已高者與一子六品正員官兵士並賜等第優給其戰歿功臣各加追贈仍定諡號民年八十已上與免一子役內外文武職官並可直言極諫無有隱諱貢選二司宜令有司速商量施行雲應蔚朔易定幽燕及山後八軍易定原本作易宜今據文改正影庫本粘籤秋夏稅率量與蠲減民有三世已上不分居者與免雜徭諸道應有祥瑞不用聞奏赦書有所未該委所司條奏以聞云是歲自正月不雨人心憂恐宣赦之日澍雨溥降初唐咸通中金水土火四星聚于畢昴太史奏畢昴趙魏之分其下將有王者懿宗乃詔令鎮州王景崇被袞冕攝朝三日遣臣下備儀注軍府稱臣以厭之其後四十九年帝破梁軍於柏鄉平定趙魏至是即位於鄴宮是月以行臺左丞相豆盧革為, WYG: 宋}
  - {type: variant, offset: 74, length: 3676, content: 月梁將賀瓌圍德勝南城百道攻擊復以艨艟扼斷津渡帝馳而往陣於北岸南城守將氏延賞告急氏延賞原本作民廷賞今據歐陽史改正影庫本粘籤且言矢石將盡帝以重賄召募能破賊艦者於是獻技者數十或言能吐火焚舟或言能禁呪兵刃悉命試之無驗帝憂形於色親從都將王建及進曰臣請效命乃以巨索連舟十艘選效節勇士三百人持斧被鎧鼓枻而進至中流梁樓船三層蒙以牛革懸板為楯建及率持斧者入艨艟間斬其竹笮破其懸楯又於上流取甕數百用竹笮維之積薪於上灌以脂膏火發亙空又以巨艦載甲士令乘煙鼓譟梁之樓船斷紲而下沈溺者殆半軍既得渡梁軍乃退命騎軍追襲至濮陽俘斬千計賀瓌由此飲氣遘疾而卒秋七月帝歸晉陽八月梁將王瓚帥衆數萬自黎陽渡河營於楊村造舟為梁以通津路冬十月帝自晉陽至魏州發徒數萬以廣德勝北城自是日與梁軍接戰十二月戊戌帝軍於河南夜伏步兵於潘張村梁軍寨下以騎軍掠其餉運餉運原本作餉軍今據文改正影庫本粘籤擒其斥候梁王瓚結陣以待帝軍以鐵騎突之諸軍繼進梁軍大奔赴水死者甚衆瓚走保北城天祐十七年春幽州民於田中得金印文曰關中龜印李紹宏獻於行臺秋七月梁將劉鄩尹皓寇同州先是河中節度使朱友謙取同州以其子令德主留務請梁主降節梁主怒不與遂請旄節於帝梁主乃遣劉鄩與華州節度使尹皓帥兵圍同州尹皓原作伊告今據薛史梁紀改正影庫本粘籤友謙來告難帝遣蕃漢總管李存審昭義節度使李嗣昭代州刺史王建及率師赴援九月師至河中朝至夕濟梁人不意王師之至望之大駭明日約戰與朱友謙謀遲明進軍距梁壘梁人悉衆以出蒲人在南王師在北騎軍既接蒲人小却李嗣昭以輕騎抗之梁軍奔潰追斬二千餘級是夜劉鄩收餘衆保營自是閉壁不出數日鄩遂宵遁王師追及於渭河所棄兵仗輜重不可勝計劉鄩尹皓單騎獲免未幾鄩憂恚發病而卒案梁書劉鄩傳作遇酖而卒與唐紀異王師略地至奉先嗣昭因謁唐帝諸陵而還天祐十八年春正月魏州開元寺僧傳真獲傳國寶獻於行臺驗其文即受命於天子孫寶之八字也羣僚稱賀案自開元寺至此三十三字原本闕佚今從冊府元龜增入傳真師於廣明中遇京師喪亂得之秘藏已四十年矣篆文古體人不之識至是獻之時淮南楊溥西川王衍皆遣使致書西川原本作西州今據文改正影庫本粘籤勸帝嗣唐帝位帝不從二月代州刺史王建及卒是月鎮州大將張文禮殺其帥王鎔案歐陽史作正月趙將張文禮弒其君鎔五代春秋作三月趙人張文禮殺其君鎔與薛史繫二月前後互異舊五代史考異時帝方與諸將宴酒酣樂作聞鎔遇弒遽投觶而泣曰趙王與吾把臂同盟分如金石何負於人覆宗絕祀寃哉先是滹沱暴漲漂關城之半溺死者千計是歲天西北有赤祲如血占者言趙分之災至是果驗時張文禮遣使請旄節於帝帝曰文禮之罪期於無赦敢邀予旄節左右曰方今事繁不欲與人生事帝不得已而從之乃承制授文禮鎮州兵馬留後三月河中節度使朱友謙昭義節度使李嗣昭滄州節度使李存審定州節度使王處直邢州節度使李嗣源成德軍兵馬留後張文禮遙領天平軍節度使閻寶大同軍節度使李存璋新州節度使王郁振武節度使李存進李存進原本脫存字今據列傳增入影庫本粘籤同州節度使朱令德各遣使勸進請帝紹唐帝位帝報書不允自是諸鎮凡三上章勸進各獻貨幣數十萬以助即位之費帝左右亦勸帝早副人望帝撝挹久之案九國志趙季良傳季良嘗夢手扶御座自謂輔佐之象由是頗述天時人事以諷莊宗深納其言舊五代史考異秋七月河東節度副使盧汝弼卒八月庚申令天平節度使閻寶成德兵馬留後符習率兵討張文禮于鎮州初王鎔令偏將符習以本部兵從帝屯於德勝文禮既行弒逆忌鎔故將多被誅戮因遣使聞於帝欲以佗兵代習歸鎮習等懼請留帝令傳旨於習及別將趙仁貞烏震等明正文禮弒逆之罪且言爾等荷戟從征蓋君父之故銜寃報恩誰人無心吾當給爾資糧助爾兵甲當試思之於是習等率諸將三十餘人慟哭於牙門請討文禮帝因授習成德軍兵馬留後以部下鎮冀兵致討於文禮又遣閻寶以助之以史建瑭為前鋒甲子攻趙州刺史王鋌送符印以迎閻寶遂引軍至鎮州城下營於西北隅是月張文禮病疽而卒其子處瑾代掌軍事九月前鋒將史建瑭與鎮人戰於城下為流矢所中而卒冬十月己未梁將戴思遠攻德勝北城帝命李嗣源設伏於戚城戚城原本作威城今據薛史梁紀及五代春秋改正影庫本粘籤令騎軍挑戰梁軍大至帝御中軍以禦之時李從珂偽為梁幟奔入梁壘斧其眺樓持級而還梁軍愈恐步兵漸至李嗣源以鐵騎三千乘之梁軍大敗俘斬二萬計辛酉閻寶上言定州節度使王處直為其子都幽於別室都自稱留後案歐陽史王處直叛附于契丹其子都幽處直以來附舊五代考異十一月帝至鎮州城下張處瑾遣弟處琪幕客齊儉等候帝乞降言猶不遜帝命囚之時王師築土山以攻其壘城中亦起土山以拒之旬日之間機巧百變張處瑾令韓正時以千騎夜突圍將入定州與王處直議事為我游軍追擊破之餘衆保行唐賊將彭贇斬正時以降十二月辛未王郁誘契丹阿保機寇幽州案契丹國志王處直在定州以鎮定為唇齒恐鎮亡而定孤乃潛使人語其子王郁使賂契丹令犯塞以救鎮州之圍王郁說太祖曰鎮州美女如雲金帛似山天皇速往則皆為己物也不然則為晉王所有矣太祖以為然率衆而南舊五代史考異遂引軍涿州陷之案契丹陷涿州在天祐十八年李嗣弼傳作天祐十九年紀傳互異又寇定州王都遣使告急帝自鎮州率五千騎赴之天祐十九年春正月甲午帝至新城契丹前鋒三千騎至新樂是時梁將戴思遠乘虛以寇魏州軍至魏店李嗣源自領兵馳入魏州梁人知其有備乃西渡洹水陷成安而去時契丹渡沙河口諸將相顧失色又聞梁人內侵鄴城危急皆請旋師唯帝謂不可乃率親騎至新城契丹萬餘騎遽見帝軍惶駭而退帝分軍為二廣二廣原本作二黃案薛史前後多作二廣當是用左傳左廣右廣之名今改正影庫本粘籤追躡數十里獲阿保機之子時沙河冰薄橋梁隘狹敵爭踐而過陷溺者甚衆阿保機方在定州聞前軍敗退保望都帝至定州王都迎謁是夜宿於開元寺翌日引軍至望都契丹逆戰帝身先士伍馳擊數四敵退而結陣帝之徒兵亦陣於水次李嗣昭躍馬奮擊敵衆大潰俘斬數千追擊至易水獲氈裘毳幕羊馬不可勝紀時歲且北至大雪平地五尺敵乏芻糧人馬斃踣道路纍纍不絕帝乘勝追襲至幽州案契丹國志晉王趨望都為契丹所圍力戰出入數四不解李嗣昭引三百騎橫擊之晉王始得出因縱兵奮擊太祖兵敗遂北至易州會大雪彌旬平地數尺人馬死者相屬太祖乃歸舊五代史考異是月梁將戴思遠寇德勝北城築壘穿塹地道雲梯晝夜攻擊李存審極力拒守城中危急帝自幽州聞之倍道兼行以赴梁人聞帝至燒營而遁三月丙午王師敗於鎮州城下閻寶退保趙州時鎮州累月受圍城中艱食王師築壘環之又決滹沱水以絕城中出路是日城中軍出攻其長圍皆奮力死戰王師不能拒引師而退鎮人壞其營壘取其芻糧者累日帝聞失律即以昭義節度使李嗣昭為北面招討使進攻鎮州夏四月嗣昭為流矢所中卒於師己卯天平節度使閻寶卒以振武節度使李存進為北面招討使是月大同軍節度使李存璋卒五月乙酉李存進圍鎮州營於東垣渡八月梁將段凝陷衞州衞州原本作魏州考五代春秋八月段凝攻晉衞州克之歐陽史及通鑑並作衞州今改正影庫本粘籤刺史李存儒被擒存儒本俳優也帝以其有膂力故用為衞州刺史既而誅斂無度人皆怨之故為梁人所襲案九國志趙季良傳莊宗入鄴時兵革屢興屬邑租賦逋久一日莊宗召季良切責之季良對曰殿下何時平河南莊宗正色曰爾掌輿賦而稽緩安問我勝負乎季良曰殿下方謀攻守復務急徵一旦衆心有變恐河南非殿下所有莊宗斂容前席曰微君之言幾失吾大計舊五代史考異梁將戴思遠又陷共城新鄉等邑自是澶淵之西相州之南皆為梁人所據九月戊寅朔張處球悉城中兵奄至東垣渡急攻我之壘門時騎軍已臨賊城不覺其出李存進惶駭引十餘人鬬於橋上賊退我之騎軍前後夾擊之賊衆大敗步兵數千殆無還者是役也李存進戰歿於師以蕃漢馬步總管李存審為北面招討使以攻鎮州丙午夜趙將李再豐之子冲投縋以接王師諸軍登城遲明畢入鎮州平獲處球處瑾處琪幷其母及同惡高濛李翥齊儉等皆折足送行臺鎮人請醢而食之發張文禮尸磔於市考五代春秋作李存審克鎮州誅張文禮據薛史則文禮先已病沒後乃追戮也五代春秋所書未為核實今附識於此影庫本粘籤帝以符習為鎮州節度使烏震為趙州刺史趙仁貞為深州刺史李再豐為冀州刺史鎮人請帝兼領本鎮從之乃以符習遙領天平軍節度使十一月河東監軍張承業卒十二月以魏州觀察判官張憲權知鎮州軍州事同光元年春正月丙子五臺山僧獻銅鼎三言於山中石崖間得之二月新州團練使李嗣肱卒是時以諸藩鎮相繼上牋勸進乃命有司制置百官省寺仗衞法物省寺原本作省待今據文改正影庫本粘籤期以四月行即位之禮以河東節度判官盧質為大禮使三月己卯以橫海軍節度使內外蕃漢馬步總管李存審為幽州節度使潞州留後李繼韜叛送款於梁是月築即位壇於魏州牙城之南夏四月己巳帝升壇祭告昊天上帝遂即皇帝位文武臣僚稱賀禮畢御應天門宣制改天祐二十年為同光元年大赦天下自四月二十五日昧爽以前除十惡五逆放火行劫持杖殺人官典犯贓屠牛鑄錢合造毒藥外罪無輕重咸赦除之應蕃漢馬步將校並賜功臣名號超授檢校官已高者與一子六品正員官兵士並賜等第優給其戰歿功臣各加追贈仍定諡號民年八十已上與免一子役內外文武職官並可直言極諫無有隱諱貢選二司宜令有司速商量施行雲應蔚朔易定幽燕及山後八軍易定原本作易宜今據文改正影庫本粘籤秋夏稅率量與蠲減民有三世已上不分居者與免雜徭諸道應有祥瑞不用聞奏赦書有所未該委所司條奏以聞云是歲自正月不雨人心憂恐宣赦之日澍雨溥降初唐咸通中金水土火四星聚于畢昴太史奏畢昴趙魏之分其下將有王者懿宗乃詔令鎮州王景崇被袞冕攝朝三日遣臣下備儀注軍府稱臣以厭之其後四十九年帝破梁軍於柏鄉平定趙魏至是即位於鄴宮是月以行臺左丞相豆盧革為, krp: 宋}
