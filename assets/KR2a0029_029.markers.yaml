  - {type: variant, offset: 4112, length: 0, content: '', WYG: 子科決待駕車漢子喜歡詞雖俳諧理甚切當論者許之趙犨其先天水人代為忠武牙將曾祖賓祖英竒父叔文皆厯故職犨幼有竒智齠齔之時與隣里小兒戲于道左恒分布行列為部伍戰陣之狀自為董帥指顧有節如夙習焉羣兒皆禀而從之無敢亂其行者其父目而異之曰吾家千里駒也必大吾門矣及赴鄉校誦讀之性出于同輩弱冠有壯節好功名妙于弓劍氣義勇果郡守聞之擢為牙校唐㑹昌中壺闗作亂隨父北征收天井闗未幾從王師征蠻浹月方克惟忠武將士轉戰溪洞之間斬獲甚衆本道録其勲陟為}
