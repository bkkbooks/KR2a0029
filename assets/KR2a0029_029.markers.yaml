  - {type: variant, offset: 4083, length: 7, content: 內外蕃漢副總管, WYG: 自龍紀至乾寧十年之中累加官爵朝廷因而命之尋正授旄鉞累加檢校太尉兼侍中封長沙郡王昭宗東遷命諸道修洛邑紹威獨營太廟制加守侍中進封鄴王初至德中田承嗣盜據相魏澶博衛貝等六州召募軍中子弟置之部下號曰牙軍皆豐給厚賜不勝驕寵年代寖逺父子相襲親黨膠固其凶戾者强賈豪奪踰法犯令長吏不能禁變易主帥有同兒戱自田氏}
