  - {type: variant, offset: 4110, length: 1, content: 蕃, WYG: 澹泊雲頭日座上蕭騷雨脚風雖深于詩者亦所歎伏紹威子三人長曰廷規位至司農卿尚太祖女安陽公主又尚金華公主早卒次曰周翰繼為魏博節度使通鑑攷異引梁功臣𫝊六周翰起復雲麾將軍充天雄軍節度留後尋檢校司徒正授魏博節度使亦早卒季曰周敬厯滑州節度使别有𫝊開平四年夏詔金華公主出家為尼居于宋州𤣥静寺盖太祖推恩于羅氏令終其婦節也五代史補云羅鄴王紹威俊邁有詞學尤好戲判常有人向官街中鞴驢置鞍于地值牛車過急行碾破其鞍驢主怒毆駕車者為廂司所擒紹威更不按問遂判其狀云鄴城大道甚寛何故駕車碾鞍領鞴驢}
