  - {type: variant, offset: 4340, length: 209, content: 帝召李嗣源謀曰昭義阻命梁將董璋攻迫澤州梁志在澤潞不慮別有事生汶陽無備汶陽原本作滴陽今據通鑑改正影庫本粘籤不可失也嗣源以為然壬寅命嗣源率步騎五千箝枚自河趨鄆是夜陰雨我師至城下鄆人不覺遂乘城而入鄆州平制以李嗣源為天平軍節度使梁主聞鄆州陷大恐乃遣王彥章代戴思遠總兵以來拒時朱守殷守德勝南城帝懼彥章奔衝遂幸澶州五月辛酉彥章夜率舟師自楊村浮河而下斷德勝之浮橋攻南城陷之帝令中書焦彥賓馳至楊劉固守其城案通鑑作帝令宦者焦延賓急趨楊劉, WYG: 徒}
