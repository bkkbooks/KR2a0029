  - {type: variant, offset: 4091, length: 0, content: '', WYG: 後垂二百年主帥廢置出于其手如史憲誠何全皥韓君雄樂彦貞皆為其所立優奬小不如意則舉族被誅紹威懲其往弊雖以貨賂姑息而心銜之紹威嗣世之明年正月}
  - {type: variant, offset: 4091, length: 0, content: '', krp: 後垂二百年主帥廢置出于其手如史憲誠何全皥韓君雄樂彦貞皆為其所立優奬小不如意則舉族被誅紹威懲其往弊雖以貨賂姑息而心銜之紹威嗣世之明年正月}
  - {type: variant, offset: 4093, length: 0, content: '', WYG: 劉仁恭擁兵十萬謀亂河朔進陷貝州長驅攻魏紹威求援于太祖太祖遣李思安援之屯于洹水葛從周自邢洺引軍入魏州燕將劉守文單可及與王師戰于内黄大敗之乗勝追躡㑹從周亦出軍掩擊又敗燕軍斬首三萬餘級三年紹威遣使㑹軍同攻滄州以報之自是紹威感太祖援助之恩深加景附紹威見唐祚衰凌羣雄交亂太祖兵强天下知必有禪代之志故傾心附結賛成其事每慮牙軍變易心不自安天祐初州城地無故自陷俄而小校李公佺謀變紹威愈懼乃定計圖牙軍遣使告太祖求為外援太祖許之遣李思安㑹魏博軍再攻滄州先是安陽公主薨于魏太祖因之遣長直軍校馬嗣勲選兵千人伏兵仗于巨橐中肩舁以入魏州言助女𦵏事天祐三年正月五日太祖親率大軍濟河聲言視行營于滄景牙軍頗疑其事是月十六日紹威率奴客數百與嗣勲同攻之時宿于牙城者千餘人遲明盡誅之凡八千家皆赤其族州城為之一空翼日太祖自内黄馳至鄴時魏軍二萬方與王師同圍滄州聞城中有變乃擁大將史仁遇保于髙唐六州之内皆為勍敵太祖遣諸將分討之半嵗方平自是紹威雖除其偪然尋有自弱之悔不數月復有孚陽之役紹威飛輓饋運自鄴至長蘆五百里疊跡重軌不絶于路又于魏州建元帥府署沿道置亭候供牲牢酒備軍幕什器上下數十萬人一無闕者及太祖逥自長蘆復過魏州紹威乗間謂太祖曰邠岐太原終有狂譎之志各以興復唐室為詞王宜自取神器以絶人望天與不取古人所非太祖深感之及登極加守太傅兼中書令賜號扶天啓運竭}
