  - {type: variant, offset: 4597, length: 1504, content: 萬計至是令人輦負入澶州輦負原本作替負今據文改正影庫本粘籤事既倉卒耗失殆半朱守殷以所毀屋木編置步軍於其上王彥章以舟師沿流而下各行一岸每遇轉灘水匯即中流交鬬流矢雨集或全舟覆沒一彼一此終日百戰比及楊劉殆亡其半己巳王彥章段凝率大軍攻楊劉南城焦彥賓與守城將李周極力固守梁軍晝夜攻擊百道齊進竟不能下遂結營於楊劉之南東西延袤十數柵六月己亥案通鑑作乙亥舊五代史考異帝親御軍至楊劉登城望見梁軍重壕複壘以絕其路帝乃選勇士持短兵出戰梁軍於城門外連延屈曲穿掘小壕伏甲士於中候帝軍至則弓弩齊發師人多傷矢不得進帝患之問計於郭崇韜崇韜請於下流據河築壘以救鄆州又請帝日令勇士挑戰旬日之內寇若不至營壘必成帝善之即令崇韜與毛璋率數千人中夜往博州濟河東博州原本作溥州今據文改正影庫本粘籤晝夜督役居六日營壘將成戊子梁將王彥章杜晏球領徒數萬晨壓帝之新壘時板築雖畢牆仞低庳戰具未備沙城散惡王彥章列騎環城虐用其人使步軍堙壕登堞又於上流下巨艦十餘艘扼斷濟路自旦至午攻擊百端城中危急帝自楊劉引軍陣于西岸城中望之大呼帝艤舟將渡梁軍遂解圍案歐陽史作六月及王彥章戰于新壘敗之據薛史則王彥章因救至而解圍未嘗敗績也舊五代史考異退保鄒家口秋七月丁未帝御軍沿河而南梁軍棄鄒家口夜遁委棄鍋甲芻糧千計戊午遣騎將李紹貽案通鑑作李紹榮舊五代史考異直抵梁軍壘梁益恐又聞李嗣源自鄆州引大軍將至己未夜梁軍拔營而遁復保於楊村帝軍屯於德勝甲子帝幸楊劉城巡視梁軍故壘八月壬申朔帝遣李紹斌以甲士五千援澤州初李繼韜之叛也潞之舊將裴約以兵戍澤州不狥繼韜之逆既而梁遣董璋率衆攻其城約拒守久之告急於帝故遣紹斌救之未至而城已陷裴約被害帝聞之嗟痛不已甲戌帝自楊劉歸鄴梁以段凝代王彥章為帥戊子凝帥衆五萬結營於王村自高陵渡河帝軍遇之生擒梁前鋒軍士二百人戮于都市庚寅帝御軍至朝城戊戌梁左右先鋒指揮使康延孝領百騎來奔帝虛懷引見賜御衣玉帶屏人問之對曰臣竊觀汴人兵衆不少論其君臣將校則終見敗亡趙巖趙鵠張漢傑中專政張漢傑原本作漢磔今據薛史梁列傳改正影庫本粘籤締結宮掖賄賂公行段凝素無武略一朝便見大用霍彥威王彥章皆宿將有名翻出其下自彥章獲德勝南城梁主亦稍奬使彥章立性剛暴不耐凌制梁主每一發軍即令近臣監護進止可否悉取監軍處分彥章悒悒形於顏色自河津失利段凝彥章又獻謀欲數道舉軍令董璋以陝虢澤潞之衆趨石會關以寇太原霍彥威統關西汝洛之衆自相衞以寇鎮定段凝杜晏球領大軍以當陛下令王彥章張漢傑統禁軍以攻鄆州決取十月內大舉又自滑州南決破河堤使水東注曹濮之間至於汶陽瀰漫不絕以陷北軍臣在軍側聞此議臣惟汴人兵力聚則不少分則無餘陛下但待分兵領鐵騎五千自鄆州兼程直抵于汴不旬日天下事定矣帝懌然壯之九月壬寅朔帝在朝城凝兵至臨河南與帝之騎軍接戰是時澤潞叛衞州黎陽為梁人所據州以西州以西通鑑作衞州以西疑原本有脫字詳薛史文義承上言衞州黎陽為梁人所據蓋史家省文也今姑仍其舊影庫本粘籤相以南寇鈔日至編戶流亡計其軍賦不支半年又王郁盧文進召契丹南侵瀛涿及聞梁人將圖大舉帝深憂之召將吏謀其大計或曰自我得汶陽以來須大將固守城門之外元是賊疆細而料之得不如失今若馳檄告諭梁人却衞州黎陽以易鄆州指河為界約且休兵我國力稍集則議改圖帝曰嘻行此謀則無葬地矣時郭崇韜勸帝親御六軍直趨汴州半月之間天下可定帝曰正合朕意大丈夫得則為王失則為寇予行計決矣又問司天監對曰今歲時不利深入必無成功帝弗聽戊辰梁將王彥章率衆至汶河李嗣源遣騎軍偵視至遞公鎮案永樂大典原本作遽公鎮今從通鑑考異所引薛史作遞公鎮通鑑從莊宗實錄作遞坊鎮梁軍來挑戰嗣源以精騎擊而敗之生擒梁將任釗田章等三百人俘斬二百級彥章引衆保於中都嗣源飛驛告捷帝置酒大悅曰是當決行渡河之策己巳下令軍中將士家屬並令歸鄴永樂大典卷七千一百五十六, WYG: 四}
