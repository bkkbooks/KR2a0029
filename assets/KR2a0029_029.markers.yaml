  - {type: variant, offset: 4108, length: 1, content: 依, WYG: 邑萬户紹威甞以臨淄海岱罷兵嵗久儲庾山積惟京師軍民多而食益寡願于太行伐木下安陽淇門斵船三百艘置水運自大河入洛口嵗漕百萬石以給宿衛太祖深然之㑹紹威遘疾革遣使上章乞骸骨太祖撫案動容顧使者曰亟行語而主為我强飯如有不可諱當世世貴爾子孫以相報也仍命其子周翰監總軍府及訃至輟朝三日冊贈尚書令紹威在鎮凡十七年年三十四薨紹威形貌魁偉有英傑氣攻筆札曉音律性復精悍明敏服膺儒術明達吏理好招延文士聚書萬巻開學館置書樓每歌酒宴㑹與賓佐賦詩頗有情致太平廣記引羅紹威𫝊云當時藩牧之中最獲文章之譽每命幕客作四方書檄小不稱意壊裂抵棄自孹牋起草下筆成文雖無藻麗之風幕客多所不及江東人羅隠者佐錢鏐軍幕有詩名于天下紹威遣使賂遺叙南巷之敬隠乃聚其所為詩投寄之紹威酷嗜其作因目已之所為曰偷江東集至今鄴中人士諷詠之紹威甞有公讌詩云簾}
