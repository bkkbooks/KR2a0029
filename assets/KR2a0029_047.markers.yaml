  - {type: variant, offset: 13, length: 0, content: '', WYG: 列𫝊十三劉鄩密州安丘縣人也祖綬密州户掾累贈左散騎常侍父融安丘令累贈工部尚書鄩㓜有大志好兵略渉獵史𫝊唐中和中事青州節度使王敬武為小校敬武卒三軍推其子師範為留後朝廷命崔安潛鎮青州州人拒命棣州刺史張蟾將襲師範師範遣都指揮使盧𢎞攻棣州𢎞反與蟾通偽旋軍以襲師範師範知之設伏兵以迎𢎞既而享之先誡鄩曰𢎞至即斬之鄩如約斬𢎞於座上同亂者皆誅之師範以鄩為馬歩軍副都指揮使攻下棣州殺張蟾朝廷因授師範平盧軍節度使光化初師範表鄩為登州刺史嵗餘移刺淄州署行軍司馬天復元年昭宗幸鳯翔大祖率四鎮之師奉迎於岐下李茂貞與内官韓全誨矯詔徵天下兵入援師範覽詔慷慨泣下遣腹心乘虛襲取太祖管内州郡所在同日竊發其事多泄唯鄩以偏師陷兖州遂據其郡初鄩遣細人詐為鬻油者覘兖城内虛實及出入之所視羅城下一水竇可以引衆而入遂誌之鄩乃告師範請歩兵五百宵自水竇銜枚而入一夕而定軍城晏然市民無擾金華子云鄩入據子城甲兵精鋭城内人皆束手莫敢旅拒加以州將悍虐人情不附鄩因而撫治民皆安堵太祖命大將葛從周攻之時從周為節度使領兵在外州城為鄩所據家屬悉在城中鄩善撫其家移就外第供給有禮升堂拜從周之母及從周攻城鄩以板輿請母登城母告從周曰劉將軍待我甚至不異於兒新婦已下並不失所劉將軍與爾各為其主爾其察之從周歔欷而退鄩料簡城中老疾及婦人浮食百不足與守者悉出之於外與之将士同甘苦分衣食以抗外軍戢兵禁暴居人泰然從周攻圍既乆鄩無外援人情稍有去就之意一日節度副使王彦温踰城而奔守陴者從之而逸鄩之守兵禁之不可鄩即遣人從容告彦温曰請副使少將人出非素遣者請勿帯行又揚言於衆曰素遣從副使行者即勿禁其擅去者族之守民聞之皆感奔逸者乃止外軍聞之果疑彦温有姦即戮之於城下自是軍城遂固及王師範兵力漸窘從周以禍福諭鄩俾之革面鄩報曰俟青州本使歸降即以城池還納天復三年十一月師範告降且言先差行軍司馬劉鄩領兵入兖州請釋其罪亦以告鄩鄩即出城聽命太祖嘉其節槩以為有李英公之風鄩既降從周具行裝服馬請鄩歸大梁鄩曰未受梁王捨釋之㫖乘肥衣裘非敢聞命即素服跨驢而發及將謁見太祖令賜冠帯鄩曰纍囚負罪請就縶而入太祖不許及見慰撫移時且飲之酒鄩以量小告太祖太祖曰取兖州量何大耶旋授元從都押牙太祖牙下諸將皆四鎮舊人鄩一旦以羈旅之臣驟居衆人之右及與諸將相見並用階庭之禮太祖尤竒重之未幾表為鄜州留後是時邠岐之衆屢冦其境鄩禦捍備至太祖以其地逺慮失鄩即令棄郡引軍屯於同州天祐二年二月授右金吾衛大將軍充街使三月正月太祖授元帥之任以鄩為元帥府都押牙執金吾如故開平元年授右金吾上將軍充諸軍馬歩都指揮使其年秋與諸將征潞州遷檢校司徒三年二月轉右威衛上將軍依前諸軍馬步都虞侯五月改左龍武統軍充侍衛親軍馬歩軍都指揮使其年夏同州劉知俊反引岐人襲據長安分兵扼河潼太祖幸陜命鄩西討即奮取潼闗擒知俊弟知浣以獻遂引兵収復長安知俊棄郡奔鳯翔太祖以鄩為佑國同州軍兩使留後尋改佑國軍為永平軍以鄩為節度使檢校司徒行大安尹金州管内觀察使是時西鄙未寧密邇冦境鄩練兵撫衆獨當一面四年加檢校太保同平章事庶人友珪篡位加檢校太傅乾化三年正月丁内艱友珪命起復視事}
