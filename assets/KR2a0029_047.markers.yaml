  - {type: variant, offset: 577, length: 0, content: '', WYG: 謝彦章領大軍營於濮州之行臺村對壘數月一日晉王以輕騎挑戰瓌與彦章發伏兵奮擊晉王僅以身免先是瓌與彦章不協是嵗冬十二月復為諸軍都虞侯朱珪所搆瓌乃伏甲士殺彦章及濮州刺史孟審澄别將侯温裕等於軍以謀叛聞是月瓌與晉人大戰於胡柳陂晉人敗績臨陣斬晉將周陽五既晡􅅛軍亦敗五年春正月晉人城徳勝夾河為栅四月􅅛率大軍攻其南栅以艨艟戰艦阨其中流晉人斷我艨艟濟軍以援南栅瓌退軍於行臺尋以疾卒時年六十二詔贈侍中長子光圖仕後唐為供奉官康懐英兖州人也本名懐貞避太祖御名故改之始以驍勇事朱瑾為列校唐乾寧四年春太祖既平鄆命葛從周乘勝急攻兖州時朱瑾在豐沛間搜索糧餉留懐英守其城及從周軍至懐英聞鄆失守乃出降太祖素聞其名得之甚喜尋署為軍校光化元年秋從氏叔琮伐襄漢懐英以一軍攻下鄧州三年從征河朔佐張存敬敗燕軍於易水之上天復元年冬太祖率師迎昭宗於鳯翔時李茂貞遣大將符道昭領兵萬餘屯武功以拒太祖命諸軍擊之以懐英為前鋒領衆先登一皷而大破之擄甲士六千餘人奪馬二千匹翼日太祖方至顧左右曰邑名武功今首盪逆黨真武功也乃召懐英大加奬激仍以駿馬珍器賜之二年四月符道昭復領大軍屯於虢縣之漢谷其建寨之所前臨巨澗後倚峻阜險不可升太祖遣懐英提騎數千急擊之道昭以懐英兵寡有俯視之意乃率甲士萬人絶澗以挑戰懐英始以千騎夜鬬戰酣發伏兵以擊之岐軍大敗秋八月鄜帥李周􅂜屯軍於三原以援鳯翔太祖命懐英討之周彞拔軍而遁追至梨園因攻下翟州擒其守來獻俄而岐軍屯奉天太祖令懐英寨於岐軍之東北以備敵人一夕岐軍大至急攻其營懐英以夜中不可驚動諸軍獨以二千餘人抗數萬之衆自乙夜至四皷身被十餘創岐軍不勝而退昭宗還京賜迎鑾毅勇功臣是嵗淮人聞青兖之叛遣兵數萬以冦宿州太祖命懐英馳騎以救之淮人遁去即以懐英為權知宿州刺史天祐三年冬佐劉知俊破邠鳯之衆五萬於美原収五十餘寨乘勝引軍攻下鄜州以功授陜州節度使太祖受禪加檢校太保開平元年夏命將大軍以伐潞州將行太祖謂懐英曰卿位居上將勇冦三軍向來破敵摧鋒動無遺悔至於髙爵重禄我亦無負於卿夫忠臣事君有死無二韓信所謂漢王載我以車衣我以衣食我以食食人之禄死人之憂我毎思韓信此言真忠烈丈夫耳如丁㑹受我待遇之恩不謂不至懐黄拖紫裂土分茅設令木石偶人須感恩義一朝反噬倒戈授人苟有天道明神安能容此大凡孤恩負理忠良不為我今掃境内委卿卿當勉思竭盡況晉人新得上黨衆心未叶和以十萬之師一舉可克予當置酒髙㑹望卿歌舞凱旋懐英惶恐而退六月懐英領大軍至潞率衆晝夜攻城半月之間機巧百變懐英懼太祖之言期於必取乃築壘環城濬鑿池塹然而屢為戰將周徳威騎軍所撓懐英不敢即戰太祖乃以李思安代之降為行營都虞候夏五月晉王率蕃漢大軍攻下夾城懐英逃歸詣銀臺門待罪太祖宥之改授右衛上將軍三年夏命為侍衛諸軍都指揮使尋出為陜州節度使}
