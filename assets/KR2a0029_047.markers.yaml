  - {type: variant, offset: 3282, length: 2161, content: 一日與川軍戰於金州之漢陰王師不利其部下兵士除傷痍外已至鳳翔先是盩厔鎮將劉贇引軍入川界為蜀將全師郁所敗金州都監崔處訥重傷諸州屯兵潰散金州防禦使馬全節收合州兵金州原本作全川今從歐陽史改正影庫本粘籤固守獲全以樞密使劉延皓為天雄軍節度使甲辰以右神武統軍沙彥珣權知雲州乙巳以徐州節度使張敬達充北面行營副總管時契丹入邊石敬瑭屢請益兵朝廷軍士多在北鄙俄聞忻州諸軍呼譟帝不悅乃命敬達為北軍之副以減敬瑭之權也丁巳宰臣盧文紀等上疏其略曰臣近蒙召對面奉天旨凡軍國庶事利害可否卿等合盡言者臣等謬處台衡奉行制敕但緣事理互有區分軍戎不在於職司錢穀非關於局分苟陳異見即類侵官况才不濟時識非經遠因五日起居之例於兩班旅見之時略獲對敭兼承顧問衞士周環於階陛庶臣羅列於殿庭四面聚觀十手所指臣等苟欲各伸愚短此時安敢敷陳韓非昔懼於說難孟子亦憂於言責臣竊奉本朝政事肅宗初平寇難再復寰瀛頗經涉於艱難尤勤勞於委任每正衙奏事則泛咨訪於羣臣及便殿詢謀則獨對敭於四輔自上元年後於長安東內置延英殿宰臣如有奏議聖旨或有特宣或有特宣原本作或特有宜今據冊府元龜改正影庫本粘籤皆於前一日上聞對御之時祗奉冕旒旁無侍衞獻可替否得曲盡於討論捨短從長故無虞於漏洩君臣之際情理坦然伏望聖慈俯循故事或有事關軍國謀繫否臧未果決於聖懷要詢訪於臣輩則請依延英故事前一日傳宣或臣等有所聽聞切關利害難形文字須面敷敭臣等亦依故事前一日請開延英當君臣奏議之時祇請機要臣僚侍立左右兼乞稍霽威嚴恕臣荒拙雖乏鷹鸇之効庶盡葵藿之心詔曰卿等濟代英才鎮時碩德或締搆於興王之日或經綸於纘聖之時鹽梅之任俱崇藥石之言並切請復延英之制以伸議政之規而况列聖遺芳皇朝盛事載詳徵引良切歎嘉恭惟五日起居先皇垂範俟百僚之俱退召四輔以獨昇接以溫顏詢其理道計此時作事之意亦昔日延英之流延英原本脫英字今從冊府元龜增入影庫本粘籤朕叨獲嗣承切思遵守將成其美不爽兼行其五日起居仍令仍舊尋常公事亦可便舉奏聞或事屬機宜理當祕密量事緊慢不限隔日及當日便可於閤門祗候具牓子奏聞請面敷敭即當盡屏侍臣端居便殿佇聞高議以慰虛懷朕或要見卿時亦令當時宣召但能務致理之實何必拘延英之名有事足可以討論有言足可以陳述陳述原本作陳迹今據冊府元龜改正影庫本粘籤宜以沃心為務勿以逆耳為虞勉罄謀猷以裨寡昧帝性仁恕聽納不倦嘗因朝會謂盧文紀等曰朕在藩時人說唐代為人主端拱而天下治蓋以外恃將校內倚謀臣故端拱而事辦朕荷先朝鴻業卿等先朝舊臣每一相見除承奉外略無社稷大計一言相救坐視朕之寡昧其如宗社何文紀等引咎致謝因奏延英故事故有是詔八月庚午滑州節度使高允韜卒壬申以右衞上將軍王景戡為左衞上將軍以右神武統軍婁繼英為右衞上將軍己卯以西上閤門使行少府少監兼通事舍人蘇繼顏為司農卿職如故辛巳以權知雲州右神武統軍沙彥珣為雲州節度使鄴都殺人賊陳延嗣幷母妹妻等並棄市延嗣父子相承與其妹妻於諸州郡誘人殺之而奪其財前後被殺者數百人至是事泄而誅之癸未以前潞州行軍司馬陳元為將作監以元善醫故有是命丁亥以洺州團練使李彥舜為義武軍節度使檢校太傅太原奏達靼部族於靈邱安置己丑以太子少保致仕戴思遠卒廢朝庚寅以前兗州節度使楊漢章為左神武統軍以前邢州節度使康思立為右神武統軍潞州奏前雲州節度使安重霸卒九月己亥以河陽節度使侍衞馬軍都指揮使安從進為襄州節度使以襄州節度使趙在禮為宋州節度使癸卯以忠正軍節度使侍衞步軍都指揮使宋審虔為河陽節度使案原本脫虔字今據通鑑增入舊五代史考異典軍如故己酉禮部貢院奏進士請夜試童子依舊表薦重置明算道舉舉人落第後別取文解五科試紙不用中書印用本司印並從之以宣徽南院使房暠為邢部尚書充樞密使案歐陽史作邢部尚書房暠為樞密使據薛史暠由宣徽南院使遷授非先為邢部尚書也舊五代史考異以宣徽北院使充樞密副使劉延朗為宣徽南院使充樞密副使丙辰以左僕射李愚卒廢朝冬十月丁卯幸崇道宮甘泉亭己巳以左衞上將軍李頃為左領軍上將軍北面行營總管石敬瑭奏自代州歸鎮庚午以晉州節度使張溫卒廢朝甲戌幸趙延壽張延朗第丁丑以端明殿學士兵部侍郎李專美為祕書監充宣徽北院使庚寅以左諫議大夫唐汭為左散騎常侍十一月庚子以左驍衞上將軍郝瓊為左金吾上將軍以光祿卿王玟為太子賓客以徐州節度使張敬達為晉州節度使依前充大同振武威塞彰國等軍兵馬副總管丁未以祕書少監丁濟為太子詹事乙卯以前金州防禦使馬全節為滄州留後案通鑑劉延朗欲除全節絳州刺史羣議沸騰帝聞之以為橫海留後舊五代史考異渤海國遣使朝貢案歐陽史渤海遣使者來繫於九月之後據薛史則事在十一月非九月也舊五代史考異案歐陽史作九月乙卯渤海遣使者來五代會要作十二月渤海遣使列周卿等入朝貢方物俱與是書作十一月異殿本十二月戊辰禁用鉛錢壬申以中書侍郎兼兵部尚書充樞密使韓昭裔為檢校司空同平章事充河中節度使甲戌以宗正少卿李延祚為將作監致仕丁丑故武安軍州節度使累贈太傅劉建峯贈太尉劉建峯原本作逮崇今從新唐書改正影庫本粘籤從湖南之請也戊寅太常奏來年正月一日上辛祀昊天上帝於圓丘依禮大祠不朝詔曰祀事在質明前儀仗在日出後事不相妨宜依常年受朝壬午以翰林學士承旨戶部侍郎程遂為兵部侍郎翰林學士工部侍郎崔梲為戶部侍郎案原本訛崔穭今據歐陽史改正舊五代史考異翰林學士中書舍人和凝為工部侍郎並依前充職乙酉以前祕書監楊凝式為兵部侍郎己丑以前同州節度使馮道為司空以尚書右僕射劉昫為左僕射以太子少師盧質為右僕射以兵部侍郎馬縞兼國子祭酒永樂大典卷七千一百七十四, WYG: 三}
