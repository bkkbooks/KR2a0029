  - {type: variant, offset: 435, length: 0, content: '', WYG: 六年六月授河東道招討使與華州尹皓攻取同州先是河中朱友謙襲取同州以其子令徳為留後表請旄鉞末帝怒命鄩討之其年九月晉將李嗣昭率師來援戰於城下王師不利敗兵走河南橋梁陷溺死者甚衆鄩以餘衆退保華州羅文寨先是鄩與河中朱友謙為婚家及王師西討行次陜州鄩遣使賫檄與友謙諭以禍福大計誘令歸國友謙不從如是停留月餘尹皓段凝輩素忌鄩遂搆其罪言鄩逗留養冦俾俟援兵末帝以為然及兵敗詔歸洛河南尹張宗奭承朝廷密㫖逼令飲酖而卒時年六十四詔贈中書令子遂凝遂雍别有𫝊賀瓌字光逺濮陽人也曽祖延以􅅛貴贈左監門上將軍祖華贈左散騎常侍父仲元贈刑部尚書􅅛少倜儻負雄勇之志遇世亂入軍朱瑄為濮州刺史兼鄆州馬歩軍都指揮使拔為小將唐光啟初鄆州三軍推瑄為留後以􅅛為馬歩軍都指揮使表授檢校工部尚書及瑄與大祖搆隟瓌受瑄命數領軍於境上乾寧二年十月太祖親征兖鄆十一月瑄遣瓌與太原將何懐寳率兵萬餘人以援朱瑾師次待賔館斷我糧運太祖偵知之自中都引軍夜馳百餘里遲明至鉅野東與瓌等接戰兖人大敗􅅛竄於棘塜之上大呼曰我是鄆州都將賀􅅛願就擒幸勿傷也太祖聞之馳騎至塚前遂擒之并獲何懐寳及將吏數十人徇於兖壁之下悉命戮之唯留瓌一人釋縳寘之麾下尋署為教練使奏授檢校左僕射瓌感太祖全宥之恩私誓以身報國天復中預平青州王師範以攻授曹州刺史兼先鋒都指揮使加檢校司空天祐二年與楊師厚從太祖平荆襄授荆南兩使留後未幾徵還為行營左廂歩軍都指揮使開平二年十月授左龍虎軍馬歩都指揮使十二月改左衛上將軍}
