  - {type: variant, offset: 578, length: 1, content: 樞, WYG: 西路行營副招討使及劉知俊奔鳯翔引岐軍以圖靈武太祖遣懐英率兵救之師次長城嶺為知俊邀擊懐英敗歸歐陽史云還至昇平知俊掩擊之懐英大敗通鑑懐貞等還至三水知俊遣兵據險邀之左龍驤軍使壽張王彦章力戰懐貞等乃得過懐貞與裨將李徳遇許從實王審權分道而行皆與援兵不相值至昇平劉知俊伏兵山口懐貞大敗僅以身免徳遇等軍皆没蓋懐英過長城嶺之險已為邀擊後又敗於昇平也四年春移華州節度使乾化二年秋命為河中行營都招討使與晉軍戰於白徑嶺敗歸於陜末帝嗣位以岐軍屢犯秦雍命懐英為永平軍節度使大安尹累加官至中書令貞明中卒於鎮王景仁景仁本名茂章避諱改馬詳見通鑑廬州合淝人材質魁偉性暴率無威儀善用槊頗推驍悍在淮南累職為都指揮使楊行}
