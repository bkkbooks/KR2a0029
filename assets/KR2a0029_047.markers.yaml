  - {type: variant, offset: 1010, length: 2270, content: 考異逢陛下惟新之運是文明革弊之秋臣請應內外所管軍人凡勝衣甲者請宣下本部大將一一考試武藝短長權謀深淺居下位有將才者便拔為大將居上位無將略者移之下軍其東班臣僚請內出策題請內出策題原本脫請字今從通鑑注所引薛史增入影庫本粘籤下中書令宰臣面試如下位有大才者便拔居大位處大位無大才者即移之下僚其疏大約如此盧文紀等見其奏不悅班行亦多憤悱故諫官劉濤楊昭儉等上疏請出在德疏辨可否宣行中書覆奏亦駁其錯誤帝召學士馬裔孫謂曰史在德語太凶其實難容朕初臨天下須開言路若朝士以言獲罪誰敢言者爾代朕作詔勿加在德之罪詔曰左補闕劉濤等奏太常丞史在德所上章疏中書門下駁奏未奉宣諭乞特施行分明黜陟朕常覽貞觀故事見太宗之治理以貞觀昇平之運太宗明聖之君野無遺賢朝無闕政盡善盡美無得而名而陝縣丞皇甫德參輒上封章恣行訕謗人臣無禮罪不容誅賴文貞之彌縫恕德參之狂瞽魏徵奏太宗曰陛下思聞得失只可恣其所陳若所言不中亦何損於國家朕每思之誠要言也遂得下情上達德盛業隆太宗之道彌光文貞之節斯著朕惟寡昧獲奉宗祧業業兢兢懼不克荷思欲率循古道簡拔時材懷忠抱直之人虛心渴見便佞詭隨之說杜耳惡聞史在德近所獻陳誠無避忌中書以文字紕繆比類僭差改易人名觸犯廟諱請歸憲法以示戒懲蓋以中書既委參詳合盡事理朕纘承前緒誘勸將來多言數窮雖聖祖之所戒千慮一得冀愚者之可從因覽文貞之言遂寬在德之罪已令停寢不遣宣行劉濤等官列諫垣宜陳讜議請定短長之理以行黜陟之文昔魏徵則請賞德參今濤等請黜在德事同言異何相遠哉將議允俞恐虧開納方朝廷粗理俊畢臻留一在德不足為多去一在德未足為少苟可懲勸朕何憂焉但緣情在傾輸傾輸原本作頃輸據通鑑作傾輸胡三省注云謂傾其胸臆而輸忠于上也今改正影庫本粘籤理難黜責濤等敷奏朕亦優容宜體含弘勉思竭盡凡百在下悉聽朕言夏四月辛巳宰臣判三司張延朗奏州縣官徵科條格其令錄在任徵科依限了絕一年加階兩年與試銜三年皆及限了絕與服色攝任者一年內了絕仍攝二年三年內皆及限與真命其主簿同縣令條本判官一年加階二年改試銜三年轉官本曹官省限內了絕與試銜諸節級三年內並了絕者與賞錢三十貫其責罰依天成四年五月五日敕施行從之癸未御史中丞盧損等進清泰元年以前十一年制敕堪悠久施行者三百九十四道編為三十卷其不中選者各令所司封閉不得行用詔其新編敕如可施行付御史臺頒行以宰相盧文紀兼太微宮使弘文館大學士姚顗加門下侍郎監修國史張延朗兼集賢殿大學士張延朗原本作正朗今據薛史列傳改正影庫本粘籤以樞密使韓昭裔為中書侍郎兼兵部尚書平章事乙酉以前武勝軍節度使張萬進為鄜州節度使辛卯案歐陽史作夏五月辛卯通鑑從薛史作四月舊五代史考異以宣徽南院使劉延皓為刑部尚書充樞密使以司天監耿瑗為太府卿以偽蜀右衞上將軍胡杲通為司天監以宣徽北院使房暠為左衞上將軍充宣徽南院使以樞密副使劉延朗為左領軍上將軍充宣徽北院使兼樞密副使五月丙申新州振武奏契丹寇境乙巳詔天下見禁囚徒自五月十二日以前除十惡五逆放火燒舍持仗殺人官典犯贓偽行印信合造毒藥幷見欠省錢外罪無輕重一切釋放庚戌詔不得貢奉寶裝龍鳳雕鏤刺作組織之物庚戌庚戌與上文複見疑是衍文或有舛誤今無別本可考姑仍其舊附識于此影庫本粘籤中書奏準敕凡廟諱但迴避正文其偏旁文字不在減少點畫今定州節度使楊檀檀州金壇等名酌情制宜並請改之其表章文案偏旁字闕點畫凡臣僚名涉偏旁亦請改名詔曰偏旁文字音韻懸殊止避正呼不宜全改楊檀賜名光遠餘依舊甲寅以戶部侍郎楊凝式為祕書監以尚書禮部侍郎盧導為尚書右丞以尚書右丞鄭韜光為尚書左丞丙辰以端明殿學士李專美為兵部侍郎以端明殿學士李崧為戶部侍郎以翰林學士馬裔孫為禮部侍郎以禮部郎中充樞密院直學士呂琦為給事中並充職如故太子少保致仕任圜贈尚書右僕射以順化軍節度使兼彰聖都指揮使北面行營排陣使安審琦為邢州節度使邢州原本作鄧州今從歐陽史改正影庫本粘籤庚申以兵部尚書李鏻為太常卿以禮部尚書王權為戶部尚書以太常卿李懌為禮部尚書癸亥以六軍諸衞判官給事中張允為右散騎常侍六月甲子朔新州上言契丹入寇乙丑有司上言宣憲皇太后陵請以順為名從之振武奏契丹二萬騎在黑榆林丁卯以太子少保致仕朱漢賓卒廢朝壬申命史官修撰明宗實錄契丹寇應州以新州節度使楊漢賓為同州節度使以前晉州節度使翟璋為新州節度使庚辰北面招討使趙德鈞奏行營馬步軍都虞候定州節度使楊光遠行營排陣使邢州節度使安審琦帥本軍至易州見進軍追襲契丹次河東節度使石敬瑭奏邊軍乏芻糧其安重榮巡邊兵士欲移振武就糧從之尋又奏懷孟租稅懷孟原本作瓌盂今從冊府元龜改正影庫本粘籤請指揮於忻代州輸納朝廷以邊儲不給詔河東戶民積粟處量事抄借仍於鎮州支絹五萬匹送河東充博采之直是月北面轉運副使劉福配鎮州百姓車子一千五百乘運糧至代州時水旱民飢河北諸州困於飛輓逃潰者甚衆軍前使者繼至督促糧運由是生靈咨怨辛巳詔諸州府署醫博士丙戌以前許州節度使李從昶為右龍武統軍以前彰國軍節度使沙彥珣為右神武統軍秋七月丙申石敬瑭奏斬挾馬都指揮使李暉等三十六人以謀亂故也時敬瑭以兵屯忻州一日軍士喧譟遽呼萬歲乃斬暉等以止之案契丹國志契丹屢攻北邊時石敬瑭將大兵屯忻州潞王遣使賜軍士夏衣傳詔撫諭軍士呼萬歲者數四敬瑭懼幕僚段希堯請誅其倡者敬瑭命劉知遠斬三十六人以殉潞王聞益疑之舊五代史考異御史中丞盧損奏準天成二年七月敕每月首十五日入閤罷五日起居臣以為中旬排仗有勞聖躬請只以月首入閤五日起居依舊又準天成三年五月長興二年七月敕許諸州節度使帶使相歲薦僚屬五人餘薦三人防禦團練使薦二人今乞行釐革又長興二年八月敕州縣佐官差充馬步判官仍同一任乞行止絕依舊衙前選補詔曰今後藩臣帶使相許薦三人餘薦二人直屬京防禦團練使薦一人餘並從之丁酉迴紇可汗仁美遣使貢方物西京弓弩指揮使任漢權奏六月, WYG: 巻}
