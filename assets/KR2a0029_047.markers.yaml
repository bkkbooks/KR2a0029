  - {type: variant, offset: 15, length: 1, content: 紀, WYG: 即位尤深倚重明年夏詔鄩歸闕授開封尹遥領鎮南軍節度使旋屬晉人冦河朔鄩奉詔與魏博節度使楊師厚禦之而退九月徐州節度使蔣殷據城叛時朝廷以福王友璋鎮徐方殷不受代末帝遣鄩與鄆帥牛存節率兵攻之殷求援於淮夷偽吳楊溥遣大將朱瑾領衆赴援鄩逆擊破之貞元元年春城陷殷舉族自燔於火}
