  - {type: variant, offset: 17, length: 0, content: '', WYG: 得其尸梟首以獻詔加檢校太尉三月魏博楊師厚卒朝廷分相為魏兩鎮遣鄩率大軍屯南樂以討王鎔為名既而魏軍果亂囚節度使賀徳倫送欵於太原六月晉王入魏州鄩以精兵萬人自洹水移軍魏縣晉王來覘鄩設伏於河曲叢木間俟晉王至大譟而進圍之數匝殺獲甚衆晉王僅以身免是月鄩潛師由黄澤西趨太原將行慮為晉軍所追乃結蒭為人縳旗於上以驢負之循堞而行數日晉人方覺軍至樂平㑹霖雨積旬師不克進鄩即整衆而旋魏之臨}
  - {type: page-break, offset: 17, content: '', id: KR2a0029_WYG_047-5b, image: WYG0277/WYG0277-0205d.png}
  - {type: variant, offset: 17, length: 0, content: '', krp: 得其尸梟首以獻詔加檢校太尉三月魏博楊師厚卒朝廷分相為魏兩鎮遣鄩率大軍屯南樂以討王鎔為名既而魏軍果亂囚節度使賀徳倫送欵於太原六月晉王入魏州鄩以精兵萬人自洹水移軍魏縣晉王來覘鄩設伏於河曲叢木間俟晉王至大譟而進圍之數匝殺獲甚衆晉王僅以身免是月鄩潛師由黄澤西趨太原將行慮為晉軍所追乃結蒭為人縳旗於上以驢負之循堞而行數日晉人方覺軍至樂平㑹霖雨積旬師不克進鄩即整衆而旋魏之臨}
  - {type: variant, offset: 18, length: 1, content: 泰, WYG: 積粟之所鄩引軍將據之遇晉將周陽五自幽州率兵至鄩乃取貝州與晉軍遇於堂邑鄩邀擊卻之追北五十餘里遂軍於莘縣増城壘浚池隍自莘及河築甬道以通餉路八月末帝賜鄩詔曰閫外之事全付將軍河朔諸州一旦淪没勞師弊旅患難日滋退保河壖乆無鬬志昨東面諸侯奏章來上皆言倉儲已竭飛輓不充於役之人毎遭擒擄夙宵軫念惕懼盈懐將軍與國同休當思良畫如聞冦敵兵數不多宜設機權以時剪撲則予之負荷無累先人鄩奏曰臣受國深恩沗兹閫政敢不枕戈假寐罄節輸忠昨者比欲西取太原斷其歸路然後東収鎮冀解彼連鷄止於旬時再清河朔豈期天方稔亂國難未平纔出師徒積旬霖潦資糧殫竭軍士札瘥切慮蒼黄乖於統攝乃詢部伍皆欲於歸凡次舍經行毎張掎角又欲絶其餉道且據臨清纔及宗城周陽五奄至騎軍馳突變化如神臣遂領大軍保於莘縣深溝髙壘享士訓兵日夜戒嚴伺其進取偵視營壘兵數極多婁煩之人皆能騎射最為勍敵未可輕謀臣若茍得機宜焉敢坐滋患難臣心體國天鑒具明末帝又遣使問鄩決勝之䇿鄩曰臣無竒謀但人給糧十斛盡則破敵末帝大怒讓鄩曰將軍蓄米將療饑耶將破賊耶乃遣中使督戰鄩集諸校而謀曰主上深居宫禁未曉兵機與白面兒共謀終敗人事大將出征君命有所不受臨機制變安可預謀今揣敵人未可輕動諸君更籌之時諸將皆欲戰鄩黙然他日復召諸將列坐軍門人具河水一器因命飲之衆未測其㫖或飲或辭鄩曰一器而難若是滔滔河流可勝既乎衆皆失色居數日鄩率萬餘人薄鎮定之營時鄩軍奄至上下騰亂殺獲甚衆少頃晉軍繼至乃退}
