  - {type: variant, offset: 109, length: 183, content: 代會要載宗正寺原奏云北京永興長寧建極三陵應州遂衍奕三陵准曹州溫陵例下本州府官朝拜是曹州先以府官朝拜北京應州後從其例也薛史刪併原文似未分晰雍坤和徽四陵差太常宗正卿朝拜從之己酉北京奏光祿卿致仕周元豹卒庚申鄴都進天王甲帝在藩時有相士言帝如毗沙天王帝知之竊喜及即位選軍士之魁偉者被以天王甲俾居宿衞因詔諸道造此甲而進之三司奏添徵蠶鹽錢及增麴價先是麴斤八十文增至一百五十文乙丑雲, WYG: 年兖}
