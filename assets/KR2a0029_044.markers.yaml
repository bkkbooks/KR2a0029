  - {type: variant, offset: 312, length: 326, content: 不過七千先皇自始至終馬纔及萬今有鐵馬如是而不能使九州混一是吾養士練將之不至也吾老矣馬將奈何延光奏曰臣每思之國家養馬太多試計一騎士之費可贍步軍五人三萬五千騎抵十五萬步軍既無所施虛耗國力臣恐日久難繼帝曰誠如卿言肥騎士而瘠吾民何益哉案五代會要上問見管馬數樞密使范延光奏天下常支草粟者近五萬匹見今西北諸道蕃賣馬者往來如市其郵傳之費中估之直日以四十五貫以臣計之國力十耗其七馬無所使財賦漸消朝廷甚非所利上善之十月敕沿邊藩鎮或有蕃部賣馬可擇其良壯給券具數奏聞舊五代史考異丁巳以虔州節度使檢校太尉兼侍中馬希振為洪州節度使以鄂州節度使馬希廣為檢校太尉同平章事充桂州節度使以廬州節度使兼武安軍副使姚彥章為檢校太尉同平章事以靜江節度副使馬希範為鄂州節度使故潞州節度使檢校太保, WYG: 于吴}
