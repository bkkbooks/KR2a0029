  - {type: variant, offset: 2006, length: 1574, content: 千戶丁巳以右驍衞上將軍李從昶為左龍武統軍以前邢州節度使高允韜為右龍武統軍以右驍衞上將軍羅周敬為左羽林統軍以右監門上將軍婁繼英為金州刺史戊午宋王從厚加食邑至萬戶實封一千戶壬戌以前涇州節度使李金全為滄州節度使癸亥詔御史中丞龍敏等詳定大中統類甲子第十四女封壽安公主第十五女封永樂公主戊辰以前利州節度使孫漢韶為洋州節度使壬申永寧軍節度使容州管內觀察使檢校太尉兼侍中馬存加食邑實封甲戌帝復不豫秋七月丁丑以著作佐郎尹拙為左拾遺直史館案五代會要尹拙為左拾遺王慎徽為右拾遺並直史館薛史闕載王慎徽舊五代史考異國朝舊制皆以畿赤尉直史館今用諫官自拙始從監修李愚奏也己卯東岳三郎神贈威雄大將軍初帝不豫前淄州刺史劉遂清薦泰山僧一人劉遂清原本作隊請今從冊府元龜改正影庫本粘籤云善醫及召見乃庸僧耳問方藥僧曰不工醫嘗於泰山中親覩嶽神謂僧曰吾第三子威靈可愛而未有爵秩師為我請之宮中神其事故有是命識者嫉遂清之妖佞焉詔應臺官出行須令人訶引使軍巡職掌等規避壬午詔安從進班師時王師攻夏州無功故也乙酉以許州節度使孟鵠卒廢朝贈太傅詔賜在京諸軍將校優給有差時帝疾未痊軍士有流言故也丁亥兩浙節度使檢校太傅守中書令錢元瓘封吳王八月戊申帝被袞冕御明堂殿受冊徽號曰聖明神武廣運法天文德恭孝皇帝禮畢制大赦天下常赦所不原者咸赦除之己酉賜侍衞諸軍優給有差時月內再有頒給自茲府藏無餘積矣辛亥以晉州節度使薄文卒廢朝丁巳以右龍武統軍李從昶為許州節度使戊午以祕書監高輅卒廢朝辛酉以太子太師致仕符習卒廢朝贈太師辛未秦王從榮以本官充天下兵馬大元帥加食邑萬戶實封三千戶以右羽林統軍翟璋為晉州節度使以太子賓客馬縞為戶部侍郎壬申幸至德宮九月甲戌以戶部尚書李鏻為兵部尚書以前戶部尚書韓彥惲為戶部尚書丙子幸至德宮戊寅樞密使范延光趙延壽並加兼侍中依前充使中書奏元帥儀注諸道節度使以下帶兵權者階下具軍禮參見其帶使相者初見亦展一度公禮天下軍務公事元帥府行帖指揮其判六軍諸衞事則公牒往來其官屬軍職委元帥府奏請從之癸未以兵部侍郎盧詹為吏部侍郎丙戌宰臣馮道加左僕射李愚加吏部尚書劉昫加刑部尚書戊子河陽節度使兼侍衞親軍都指揮使康義誠山南西道節度使檢校太傅張虔釗並加同平章事宣徽南院使判三司馮贇依前檢校太傅同中書門下二品充三司使贇亡父名章故改平章事為同二品壬戌永寧公主石氏進封魏國公主興平公主趙氏進封齊國公主皇孫重光重哲並授銀青光祿大夫檢校工部尚書秦王宋王子也前洋州節度使梁漢顒以太子少傅致仕丁酉以右龍武統軍高允韜為滑州節度使以韶州刺史檢校司空王萬榮為華州節度使萬榮王妃之父也戊戌以樞密使趙延壽為汴州節度使以襄州節度使朱弘昭為檢校太尉同平章事充樞密使時范延光趙延壽相繼辭退樞密務及朱弘昭有樞密之命又面辭訴帝叱之曰爾輩皆欲離朕左右怕在眼前素養爾輩將何用也弘昭退謝不復敢言吏部侍郎張文寶卒庚子清海軍節度使錢元璹加檢校太傅同平章事中吳建武等軍節度使錢元加檢校太師兼中書令以前滑州節度使李贊華遙領虔州節度使辛丑詔天下兵馬大元帥秦王從榮班宜在宰臣之上案五代會要秦王從榮加兼中書令與宰臣分班左右定位及為天下兵馬元帥勅曰秦王位隆將相望重磐維委任既崇等威合異班位宜在宰臣之上壬寅以北面行營都指揮使易州刺史楊檀為振武軍節度使冬十月丙午以前同州節度使趙在禮為襄州節度使丁未以前滑州節度使張敬詢卒廢朝以刑部侍郎任贊為兵部侍郎充元帥府判官戊午以前鳳翔節度使孫岳為三司使庚申以樞密使范延光為鎮州節度使以三司使馮贇為樞密使辛酉以前潞州節度使李承約為左龍武統軍以前威塞軍節度使王景戡為右龍武統軍以左驍衞上將軍安崇阮為左神武統軍以右監門上將軍高允貞為右神武統軍壬戌以權知夏州事檢校司空李彝超為夏州節度使檢校司徒丙寅詔在朝文武臣僚並與加恩以受冊尊號也戊辰以前安州節度使楊漢章為兗州節度使以前雲州節度使張敬達為徐州節度使庚午以前兗州節度使張延朗為秦州節度使壬申秦州節度使劉仲殷移鎮宋州, WYG: ''}
