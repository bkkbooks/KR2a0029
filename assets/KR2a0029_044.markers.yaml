  - {type: variant, offset: 666, length: 526, content: 宋州節度使安元信加兼侍中濮州進重修河堤圖沿河地名歷歷可數帝覽之愀然曰吾佐先朝定天下於此堤塢間小大數百戰又指一邱曰此吾擐甲臺也時事如昨奄忽一紀令人悲歎耳癸亥以西川節度使孟知祥為劍南東西兩川節度使封蜀王三司奏當省有諸道鹽鐵轉運使衙職員都押衙正押衙同押衙通引衙前虞候子弟今欲列為三司職名從之庚午以御史中丞崔衍為兵部侍郎以右諫議大夫龍敏為御史中丞三月己卯幸龍門延州節度使安從進奏夏州節度使李仁福卒其子彝超自稱留後甲申鎮州奏行軍司馬趙瓌節度判官陸浣元從押衙高知柔等並棄市坐受賂枉法殺人也節度使李從敏罰一季俸乙酉以西川節度副使知武泰軍節度兵馬留後趙季良為檢校太保黔南節度使以西川諸軍馬步都指揮使知武信軍節度兵馬留後李仁罕為檢校太傅遂州節度使以西川左廂馬步指揮使知保寧軍節度兵馬留後趙廷隱為檢校太保閬州節度使以西川右廂馬步都指揮使知寧江軍兵馬留後張知業為檢校司徒夔州節度使以西川衙內馬步都指揮使知昭武軍兵馬留後李肇為檢校太保利州節度使從孟知祥之請也丙戌賜宰相李愚絹百匹錢十萬鋪陳物一十三件時愚病帝令近臣翟光鄴宣問所居寢室蕭然四壁病榻弊而已光鄴具言其事故有是賜戊子以延州節度使安從進為夏州留後以夏州左都押衙四州防遏使李彝超為延州留後仍命邠州節度使藥彥稠宮苑使安重益帥師, WYG: 及救}
