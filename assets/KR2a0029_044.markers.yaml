  - {type: variant, offset: 3582, length: 1495, content: 月丙子以前滄州節度使盧質為右僕射庚辰改慎州懷化軍為昭化軍升洮州為保順軍辛巳以保大軍節度使檢校太尉鮑君福為保順軍節度洮鄯等州觀察等使以彰義軍節度使檢校太尉同平章事杜建徽為昭化軍節度慎瑞司等州觀察使乙酉以前汴州節度使李從曮為鄆州節度使以鄆州節度使李從溫為定州節度使丙戌新授右僕射盧質奏臣忝除官合赴省上事若準舊例左右僕射上事儀注所費極多欲從權務簡只取尚書丞郎上事例止集南省屬僚及兩省官送上亦不敢輒援往例有費官用自量力排比兼不敢自臣隳廢前規他時任行舊制從之戊子帝不豫案歐陽史本紀作十月壬申幸士和亭得疾秦王從榮傳作十一月戊子雪明宗幸宮西士和亭得傷寒疾紀傳互異五代春秋從薛史作戊子帝不豫舊五代史考異己丑大漸自廣壽殿移居雍和殿是夜四鼓後帝自御榻蹶然而興顧謂知漏宮女曰今夜漏幾何對曰四更因奏曰官家省事否帝曰省因唾出肉片如肺者數片便溺升餘六宮皆至慶躍而奏曰官家今日實還魂也已食粥一器侍醫進湯膳至曙帝小康壬辰天下大元帥守尚書令兼侍中秦王從榮領兵陣於天津橋內出禁軍拒之從榮敗奔河南府遇害案五代春秋作壬午誅從榮蓋傳寫之訛歐陽史及通鑑俱從薛史作壬辰舊五代史考異帝聞之悲駭幾落御榻氣絕而蘇者再由是不豫有加癸巳馮道率百僚見帝於雍和殿帝雨泣哽噎曰吾家事若此慚見卿等百僚皆泣下霑襟甲午賜宰臣樞密使御衣玉帶康義誠已下錦帛鞍馬有差遣宣徽使孟漢瓊召宋王於鄴都乙未以三司使孫岳為亂兵所害廢朝案孫岳被害通鑑繫於壬辰蓋與從榮之死同日歐陽史作乙未康義誠殺孫岳是以廢朝之日為專殺之日也舊五代史考異丁酉勅秦王府官屬除諮議參軍高輦已處斬外元帥府判官兵部侍郎任贊配武州祕書監兼秦王傅劉贊配嵐州河南少尹劉陟配均州並為長流百姓縱逢恩赦不在放還河南少尹李蕘配石州河南府判官司徒詡配寧州秦王友蘇瓚配萊州記室參軍魚崇遠配慶州河南府推官王說配隨州並為長流百姓河南府推官尹諲六軍巡官董裔張九思河南府巡官張沆李潮江文蔚並勒歸田里應長流人並除名六軍判官殿中監王居敏責授復州司馬六軍推官郭晙責授坊州司戶並員外置所在馳驛發遣時宰相樞密使共議任贊等已下罪馮道等曰任贊前在班行比與從榮無舊除官未及月餘便逢此禍王居敏司徒詡疾病請假將近半年近日之事計不同謀從榮所款昵者高輦劉陟王說三人昨從榮稱兵指闕之際沿路只與劉陟高輦並轡耳語至天津橋南指日影謂諸判官曰明日如今已誅王居敏矣則知其冗泛之徒不可一例從坐朱弘昭意欲盡誅任贊已下馮贇力爭之乃已戊戌帝崩於大內之雍和殿壽六十七十二月癸卯朔遷梓宮於二儀殿宋王從厚自鄴都至是日發哀百僚縞素於位中書侍郎平章事劉昫宣遺制宋王從厚於柩前即皇帝位服紀以日易月一如舊制云明年四月太常卿盧文紀上諡議曰聖智仁德欽孝皇帝廟號明宗宰臣馮道議請改聖智仁德四字為聖德和武欽孝皇帝宰臣劉昫撰諡冊文宰臣李愚撰哀冊文是月二十七日葬于徽陵永樂大典卷七千一百六十六五代史補明宗之在位也一日幸倉場觀納時主者以車駕親臨懼得罪其較量甚輕明宗因謂之曰且朕自省事以來倉場給散動經一二十年未畢今輕量如此其後銷折將何以償之對曰竭盡家產不足則繼之以身命明宗愴然曰只聞百姓養一家未聞一家養百姓今後每石加二斗耗以備鼠雀侵蠹謂之鼠雀耗倉糧加耗自此始也五代史闕文明宗出自邊地老于戰陳即位之歲年已六旬純厚仁慈本乎天性每夕宮中焚香仰天禱祝云某蕃人也遇世亂為衆推戴事不獲已願上天早生聖人與百姓為主故天成長興間比歲豐登中原無事言於五代粗為小康史臣曰明宗戰伐之勳雖高佐命潛躍之事本不經心會王室之多艱屬神器之自至諒由天贊匪出人謀及應運以君臨能力行於王化政皆中道時亦小康近代已來亦可宗也儻使重誨得房杜之術從榮有啟誦之賢則宗祧未至於危亡載祀或期於綿遠矣惜乎君親可輔臣子非才遽泯烝嘗良可深歎矣永樂大典卷七千一百六十六, WYG: 攷證}
