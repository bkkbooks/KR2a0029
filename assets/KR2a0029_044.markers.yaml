  - {type: variant, offset: 1193, length: 238, content: 送從進赴鎮以左衞上將軍盧文進為潞州節度使以右龍武統軍張溫為雲州節度使庚寅以鳳翔行軍司馬李彥琮為鹽州防禦使時范延光等奏請因夏州之師制置鹽州故有是命癸巳以右威衞上將軍安重霸為同州節度使己亥以左龍武統軍符彥超為安州節度使詔除放京兆秦岐邠涇延慶同華興元十州長興元年二年係欠夏秋稅物及營田莊宅務課利以其曾輦運供軍糧料也甲辰故晉國夫人夏氏追冊皇后有司上諡曰昭懿從之夏四月戊申李彝超奏奉詔除延州留後已受恩命訖三軍百姓擁隔未遂赴任帝遣閤門使蘇繼顏齎詔促彝超赴任癸丑以刑部侍郎劉贊為祕書監秦王傅, WYG: ''}
