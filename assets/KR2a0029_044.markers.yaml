  - {type: variant, offset: 1558, length: 253, content: 部尚書致仕戊午追冊昭宗皇后何氏為宣穆皇后祔饗太廟百僚進名奉慰廢朝三日己巳以左散騎常侍任贊為戶部侍郎以吏部侍郎藥縱之為曹州刺史癸酉延州奏蕃部劫掠餉運及攻城之具守蘆關兵士退守金明鎮五月丙子朔帝御文明殿受朝戊寅皇子鳳翔節度使從珂封潞王新授戶部侍郎任贊改刑部侍郎贊訴以所授官是丁憂闕故改焉皇子從益封許王鄆州節度使李從溫封兗王河中節度使李從璋封洋王鎮州節度使李從敏封涇王案從溫等皆明宗從子故書其姓薛史書法如此孔本甲申帝避暑於九曲池既而登樓風毒暴作聖體不豫翌日而愈案北夢瑣言云上聖體乖和馮道對寢膳之間動思調衞因指御前果, WYG: 數轉非}
