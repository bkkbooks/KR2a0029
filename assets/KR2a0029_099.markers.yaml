  - {type: variant, offset: 463, length: 373, content: 晉高祖於難案通鑑考異引漢高祖實錄云是夜偵知少帝伏甲欲與從臣謀害晉高祖詐屏人對語方坐庭廡帝密遣御士石敢袖鎚立於後俄頃伏甲者起敢有勇力擁晉高祖入一室以巨木塞門敢力當其鋒死之帝解佩刀遇夜晦以在地葦炬未然者奮擊之衆謂短兵也遂散走帝乃匿身長垣下聞帝親將李洪信謂人曰石太尉死矣帝隔垣呼洪信曰太尉無恙乃踰垣出就洪信共護晉高祖殺建謀者以少主授王弘贄舊五代史考異考漢實錄多增飾之詞閔帝方倚賴晉祖何至伏甲謀害乎哉薛史止載石敢事餘不及孔本清泰元年晉高祖復鎮河東三年夏移鎮汶陽帝勸晉高祖舉義贊成密計經綸之始中外賴之晉高祖以帝為北京馬步軍都指揮使及契丹以全軍赴難大破張敬達之衆於晉陽城下有降軍千餘人晉高祖將置之於親衞帝盡殺之晉國初建加檢校司空充侍衞馬步都指揮使權點檢隨駕六軍諸衞事尋改陝州節度使充侍衞親軍馬步都虞候契丹主送晉高祖至上黨指帝謂高祖曰此都軍甚操剌無大故不可棄之, WYG: 而已}
