  - {type: variant, offset: 1055, length: 3373, content: 月奉詔赴闕晉高祖幸其第六年七月授北京留守河東節度使七年正月加侍中時天下大蝗惟不入河東界六月晉高祖崩於鄴宮少帝即位加帝檢校太師八年三月進位中書令開運元年正月契丹南下契丹主以大軍直抵澶州遣蕃將偉王率兵入鴈門朝廷以帝為幽州道行營招討使帝大破偉王於忻口案漢祖破偉王薛史作開運元年正月歐陽史漢本紀作三年五月晉本紀又載開運元年正月辛丑劉知遠及契丹偉王戰于秀容敗之兩紀年月互異應以薛史為據舊五代史考異尋奉詔起兵至土門軍至樂平會契丹退乃還三月封太原王七月兼北面行營都統二年四月封北平王三年五月加守太尉是月帝誅吐渾白承福等五族案歐陽史作八月殺吐渾白承福等族舊五代史考異凡四百人以別部王義宗統其餘衆九月契丹犯塞帝親率牙兵至朔州南陽武谷大破之案東都事略郭進傳契丹屠安陽高祖遣進拒戰契丹敗走以功除刺史舊五代史考異十一月契丹主率蕃漢大軍由易定抵鎮州杜重威等駐軍於中渡橋以禦之十二月十日杜重威等以全軍降於契丹十七日相州節度使張彥澤受契丹命陷京城遷少帝於開封府帝聞之大駭分兵守境以備寇患天福十二年春正月丁亥朔契丹主入東京癸巳晉少帝蒙塵於封禪寺癸卯少帝北遷二月丁巳朔契丹主具漢法服御崇元殿受朝制改晉國為大遼國大赦天下號會同十年是月帝遣牙將王峻奉表於契丹契丹主賜詔褒美呼帝為兒又賜木枴一蕃法貴重大臣方得此賜亦猶漢儀賜几杖之比也王峻持枴而歸契丹望之皆避路及峻至太原帝知契丹政亂乃議建號焉是月秦州節度使何建以其地入於蜀戊辰河東行軍司馬張彥威與文武將吏等以中原無主帝威望日隆羣情所屬上牋勸進帝謙讓不允自是羣官三上牋諸軍將吏緇黃耆耋相次迫請教答允之庚午陝府屯駐奉國指揮使趙暉侯章都頭王晏殺契丹監軍及副使劉愿暉自稱留後契丹因授暉陝州兵馬留後侯章為本州馬步軍都指揮使王晏為副都指揮使暉等不受偽命案宋史王晏傳開運末與本軍都校趙暉忠衞都校侯章等戍陝州會契丹至汴遣其將劉愿據陝恣行暴虐晏與暉等謀曰今契丹南侵天下洶洶英雄豪傑固當乘時自奮且聞太原劉公威德遠被人心歸服若殺愿送款河東為天下倡首則取富貴如反掌耳暉等然之晏乃率敢死士數人夜踰城入府署艹疎庫兵給其徒遲明斬愿首懸府門外衆請暉為帥章為本城副指揮使內外巡檢使兼都虞候乃遣其子漢倫奉表晉陽舊五代史考異辛未帝於太原宮受冊即皇帝位制改晉開運四年為天福十二年案契丹國志云漢祖仍稱天福年號曰予未忍忘晉也舊五代史考異甲戌帝以晉帝舉族北遷憤惋久之是日率親兵趨土門路邀迎晉帝至壽陽聞其已過乃還案契丹國志時留兵戍承天軍而還孔本契丹聞帝建號偽制削奪帝官爵以通事耿崇美為潞州節度使高唐英為相州節度使崔廷勳為河陽節度使以扼要害之地丁丑磁州賊帥梁暉據相州己卯帝遣都將史弘肇率兵討代州平之初代州刺史王暉叛歸契丹弘肇一鼓而拔之斬暉以徇庚辰權晉州兵馬留後張晏洪奏軍亂殺知州副使駱從朗及括錢使諫議大夫趙熙以城歸順時晉州留後劉在明赴東京朝於契丹從朗知軍州事帝方遣使張晏洪辛處明等告諭登極從朗囚之本城大將藥可儔殺從朗於理所州民相率害趙熙三軍請晏洪為留後處明為都監辛巳權陝州留後趙暉權潞州留後王守恩並上表歸順癸未澶州賊帥王瓊與其衆斷本州浮橋瓊敗死之時契丹以族人朗五為澶州節度使契丹性貪虐吏民苦之瓊為水運什長乃搆夏津賊帥張乙得千餘人沿河而上中夜竊發自南城殺守將絕浮航入北城朗五據牙城以拒之數日會契丹救至瓊敗死焉契丹主初聞其變也懼甚由是大河之南無久留之意尋遣天雄軍節度使杜重威歸鎮三月丙戌朔詔河東管內自前稅外雜色徵配一切除放是日契丹主坐崇元殿行入閤之禮契丹主以舅蕭翰為宣武軍節度使辛卯權延州留後高允權遣判官李彬奏本道節度使周密為三軍所逐以允權知留後事上表歸順未幾帝召密赴行在壬辰丹州都指揮使高彥珣殺偽命刺史據城歸命壬寅契丹主發自東京還本國案遼史太宗紀作四月丙辰朔發自汴州與薛史異歐陽史及通鑑俱從薛史作壬寅是日宿於赤崗至晡有大聲如雷起於敵帳之下契丹自黎陽濟河遂趨相州案通鑑作丙午契丹自白馬渡河遼史作乙丑濟黎陽渡與通鑑異庚戌帝以北京馬步軍都指揮使泗州防禦使檢校太保劉崇為太原尹檢校太尉以北京馬步軍都虞候郭從義為鄭州防禦使檢校太保以北京興捷左廂都指揮使李洪信為陳州刺史檢校司徒以興捷右廂都指揮使尚洪遷為單州刺史檢校司徒以北京武節左廂都指揮使蓋萬為蔡州刺史以武節右廂都指揮使周暉為濮州刺史以保寧都指揮使朱奉千為隨州刺史辛亥吐渾節度使王義宗加檢校太尉以前忻州刺史秦習為耀州團練使癸丑以北京副留守檢校司徒白文珂為河中節度使檢校太尉夏四月己未以北京馬軍都指揮使集州刺史劉信為滑州節度使充侍衞馬軍都指揮使檢校太傅以北京隨使右都押衙楊邠為權樞密使檢校太保案歐陽史四月己未右都押衙楊邠為樞密使據薛史邠于閏七月辛未始真授樞密使四月中乃權職也舊五代史考異以北京武節都指揮使雷州刺史史弘肇為許州節度使充侍衞步軍都指揮使檢校太傅以北京牢城都指揮使壁州刺史常思為鄧