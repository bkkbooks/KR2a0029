  - {type: variant, offset: 920, length: 1, content: 章, WYG: 公主降趙延壽天成三年四月封至長興四年九月改封齊國公主至清泰三年二月進封燕國長公主第十四女壽安公主長興四年六月封第十五女永樂公主長興四年六月封今攷㑹要所載亦多舛互如瓊華公主十國春秋諸書作太祖弟克譲之女㑹要以為武皇長女此傳聞之異辭也莊宗女義寧公主降宋廷浩廷浩仕至房州刺史晉初為汜水闗使張從賓之叛戰死見東都}
