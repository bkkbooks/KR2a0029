  - {type: variant, offset: 190, length: 0, content: '', WYG: 清泰二年二月中書門下奏臣聞漢昭帝承祚御厯奉尊諡于雲陽魏明帝繼體守文思外家于甄舘而皆追從徽號祔饗廟庭克隆敬本之文式叶愛親之道臣等又覽國史竊見𤣥宗皇帝母曰昭成皇后竇氏代宗皇帝母曰章敬太后呉氏始嬪朱邸俄閟𤣥宫鴻圖既屬于明君尊號咸追于聖母伏以魯國夫人發祥沙麓貽慶河洲三后最賢周母允成于天統四妃有子唐宫先啟于帝基仰惟當宁之情彌軫寒泉之思久虚殷薦慮損皇猷臣等謹上尊諡曰宣憲皇太后請依昭成皇太后故事擇日備禮册命又臣等伏聞先太后舊陵永祔先祠則都下難崇别廟既追尊諡合剏閟宫按漢朝故事園寝不在王幾或就寝所便立寝祠今商量上諡後權立同廟以申告献配祀之禮請俟他年從之據歐陽史云議建陵寢而太康石敬瑭反乃于京師河南府東立寢宫年又案五代㑹要所載明宗時内職徳妃王氏天成三正月册立長興二年四月進號淑妃應順元年正月十三日册為太妃至周廣順元年四月追諡賢妃昭儀王氏封齊國夫人昭容葛氏封周國夫人昭媛劉氏封趙國夫人孫氏封楚國夫人御正張氏封曹國夫人司寶郭氏封魏國夫人司贊于氏封鄭國夫人尚服王氏封衛國夫人司記崔氏封蔡國夫人司膳翟氏封滕國夫人司醖呉氏封莒國夫人婕妤高氏封渤海郡夫人美人沈氏封太原郡夫人順御朱氏封呉郡夫人司飾聊氏封潁川郡夫人司衣劉氏封彭城郡夫人司藥孟氏封成陽郡夫人梳篦張氏封清河郡夫人司服王氏封太原郡夫人櫛篦𫝊氏封潁川郡夫人知客張氏賜號尚書故江氏追封濟陽郡夫人以上皆長興三年九月勅其名號皆中書門下按六典内職仿而行之内人}
