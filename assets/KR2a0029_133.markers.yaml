  - {type: variant, offset: 292, length: 1, content: 宴, WYG: 言不為之下應順元年三月辛酉義誠將出征閔帝幸左藏庫親給軍士錢帛是時義誠與洪實同于庫中靣論用兵利害歐陽史云洪實見軍士無鬭志而義誠盡將以西疑其有二心洪實言出軍討逆累發兵師今聞小衂無一人一騎來者不如以禁軍據門自固彼安敢徑來然後徐圖進取全䇿也義誠怒曰若如此言洪實反也洪實曰公自反誰反其聲漸厲帝聞召而訊之洪實猶理前謀又曰義誠言臣圖反據發兵計義誠反必矣閔帝不能明辨遂命誅洪實既而義誠果以禁軍迎降潞王故洪實之死後人皆以為寃康義誠字信臣代北三部落人也少以騎射事武皇從莊宗入魏博補突騎使累遷本軍都指揮使同光末從明宗討鄴城軍亂迫明宗為主明宗不然義誠進曰主上不慮社稷阽危不思戰士勞苦荒耽禽色溺于酒樂今從衆則有歸守節則將死明宗納其言繇是委之心膂明宗即位加檢校司空領富州刺史總突騎如故尋轉捧聖都指揮使鎮邠州刺史明宗幸汴平朱守殷改侍衛馬軍都指揮使領江西節度使車駕歸洛授侍衛馬歩軍都指揮使河陽節度使太平廣記長興中侍衛使康義誠常軍中差人于大宅充院子亦曾小有笞責忽一日憐其老而詰其姓則曰姓康别詰其鄉土親族息嗣方知是父遂相持而泣聞者莫不驚異長興末加同平章事秦王為天下兵馬元帥氣燄燻灼大臣皆懼求為外任義誠以明宗委遇無以解退乃令其子以弓馬事秦王冀自保全明宗不豫秦王諷義誠為助義誠曲意奉承亦非真誠及朱𢎞昭馮贇等懼禍謀于義誠但云僕為}
