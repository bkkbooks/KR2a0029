  - {type: 'tls:seg', offset: 8, content: '', id: KR2a0029_ZHSJ_133-d133p25s23}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 言為信鏻即引諜者見重誨重誨大喜以為然乃以玉帶與諜者使遺知誥為信其直千緡重誨為樞宻使四五年間獨綰大任否臧自若環衛酋長貴戚近習無敢干政者弟牧鄭州子鎮懐孟身為中令任過其才議者謂必有覆餗之禍無何有吏人李䖍徽弟掦言于衆云聞相者言其貴不可言今將統軍征淮南時有軍將宻以是聞頗駭上聴明宗謂重誨曰聞卿樹心腹私市兵伏欲自討淮南有之否重誨惶恐奏曰興師命將出自宸衷必是奸人結搆臣願陛下窮詰所言者翼}
