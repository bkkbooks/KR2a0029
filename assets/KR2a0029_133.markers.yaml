  - {type: variant, offset: 3, length: 3, content: 校多暴, WYG: 救兖鄆而没重誨自明宗龍潜時得給事左右及鎮邢州以重誨為中門使隨從征討凡十餘年委信無間勤勞亦至洎鄴城之變佐命之功獨居}
