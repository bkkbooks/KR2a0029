  - {type: variant, offset: 289, length: 2, content: 晟昔, WYG: 重誨有經綸社稷之大功然志大才短不能迴避權寵親禮士大夫求周身輔國之逺圖而悉自恣胷襟果貽顛覆五代史補初知祥將據蜀也且上表乞般家屬時樞宻使安重誨用事拒其請知祥曰吾知之矣因使宻以金百兩為賂重誨喜而為敷奏詔許之至家屬至知祥對僚吏笑曰天下聞知樞宻將謂天地間未有此誰知只銷此百金耶亦不足畏也遂守險拒命五代史闕文明宗令翟光鄴李從璋誅重誨于河中私第從璋奮撾擊重誨于地重誨曰某死無恨不與官家誅得潞王他日必為朝廷之患言終而絶臣謹按明宗實録是清泰帝朝修撰潞王即清泰帝也史臣避諱不敢直書嗚呼重誨之志節泯矣朱𢎞昭太原人也祖玟父叔宗皆為本府牙將𢎞昭事明宗在藩方為典客天成元年為文思使歴東川副使二年餘除左衛大將軍充内客省使三年轉宣徽南院使明宗親祀南郊𢎞昭為大内留守加檢校太傅出鎮鳳翔會朝廷命石敬瑭帥師伐蜀乆未成功安重誨自請西行至鳯翔𢎞昭迎謁馬首請館于前署妻子羅拜捧巵為壽𢎞昭密遣人謂敬瑭曰安公親來勞軍觀其舉措孟浪儻令得至恐士心迎合則不戰而自潰也可速拒之必不敢前則師徒萬全也敬瑭聞其言大懼即日燒營遁還重誨聞之不敢西行因返斾東還復過鳯翔𢎞昭拒而不納及重誨得罪其年𢎞昭入朝授左武衛上將軍充宣徽南院使長興三年十二月代康義誠為襄州節度使四年秦王從榮為元帥屢宣惡言執政大臣皆懼謀出避之樞宻使范延光趙延壽日夕更見涕泣求去明宗怒而不許延壽使其妻興平公主入言于中延光亦因孟漢瓊王淑妃進説故皆得免未㡬趙延壽出鎮汴州召𢎞昭于襄陽代為樞宻使加同平章事十月范延光出鎮常山以三司為馮贇與𢎞昭對掌樞務與康義誠孟漢瓊同謀以殺秦王閔帝即位𢎞昭以為由已得立故于庶事高下在心及赦後覃恩弘昭首自平章事超加中書令素猜忌潞王致其釁隙以致禍敗潞王至陜閔帝懼欲奔馳手詔召𢎞昭圖之時將軍穆延輝在𢎞昭第曰急召罪我也其如之何吾兒婦君之女也可速迎歸無令受禍中使繼至𢎞昭援劔大哭至後庭欲自裁家人力止之使促之急𢎞昭曰窮至此耶乃自投于井安從進既殺馮贇斷𢎞昭首俱𫝊于陜州及漢高祖即位贈尚書令朱洪實不知何許人以武勇累歴軍校長興中為馬軍都指揮使秦王為元帥以洪實驍果尤寵待之歳時曲遺頗厚于諸將及朱𢎞昭為樞宻使勢燄尤甚洪實以宗兄事之意頗相協𢎞昭將殺秦王以謀告之洪實不以為辭時康義誠以其子事于秦府故恒持兩端及秦王兵叩端門洪實為孟漢瓊所使率先領騎軍自左掖門出逐秦王自是義誠隂銜之閔帝嗣位洪實自恃領軍之功義誠}
