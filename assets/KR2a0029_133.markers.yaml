  - {type: variant, offset: 7, length: 1, content: 短, WYG: 右明宗踐祚領樞宻使俄遷左領軍衛大將軍充職案以下有闕文明宗遣回鶻侯三馳𫝊至其國侯三至醴泉縣地素僻無驛馬縣令劉知章出獵不時給馬侯三遽以聞明宗大怒械知章至將殺之重誨從容為言乃得不死明宗幸汴州重誨建議欲因以伐淮南明宗難之後李鏻得淮南諜者言徐知誥欲奉其國稱藩臣願得安令公}
  - {type: variant, offset: 7, length: 1, content: 短, krp: 右明宗踐祚領樞宻使俄遷左領軍衛大將軍充職案以下有闕文明宗遣回鶻侯三馳𫝊至其國侯三至醴泉縣地素僻無驛馬縣令劉知章出獵不時給馬侯三遽以聞明宗大怒械知章至將殺之重誨從容為言乃得不死明宗幸汴州重誨建議欲因以伐淮南明宗難之後李鏻得淮南諜者言徐知誥欲奉其國稱藩臣願得安令公}
