  - {type: variant, offset: 93, length: 1, content: 聽, WYG: 悦重誨奏不巳明宗怒謂曰放卿出朕自有人即令武徳使孟漢瓊至中書與宰臣商量重誨事馮道言曰諸人茍惜安令公解樞務為便趙鳯曰大臣豈可輕動公失言也道等因附漢瓊奏曰此斷自宸㫖然重臣不可輕議移改由是兼命范延光為樞宻使重誨如故時以東川帥董璋恃險難制乃以武䖍裕為緜州刺史董璋益懐疑忌遂縶䖍裕以叛及石敬瑭領王師伐蜀峽路艱阻糧運不繼明宗憂之而重誨請行翼日領數騎而出日馳數百里西諸侯聞之莫不惶駭所在錢帛糧料星夜輦運人乘斃踣于山路者不可勝紀百姓苦之重誨至鳯翔節度使朱𢎞昭延于寢室令妻子奉食噐敬事尤謹重誨坐中言及昨有人讒搆㡬不保全頼聖上保鑒茍獲全族因泣下重誨既辭𢎞昭遣人具奏重誨怨望出惡言不可令至行營恐奪石敬瑭兵柄而宣徽使孟漢瓊自西廻亦奏重誨過惡重誨已至三泉復令歸闕冄過鳯翔朱𢎞昭拒而不納重誨懼急騎奔程未至京師制授河中帥既至鎮心不自安遂詩致仕制初下其子崇贊崇緒走歸河中二子初至重誨駭然曰渠安得來家人欲問故重誨曰吾知之矣此非渠志是他人教來吾但以一死報國家餘復何言翼日中使至見重誨號泣乆之重誨曰公但其言故勿過相愍中使曰人言令公據城異志矣重誨曰吾一死未塞責已負君親安敢輒懐異志遽勞朝廷興師增聖上宵旰則僕之罪更萬萬矣時遣翟光鄴使河中如察重誨有異志則誅之既至李從璋自率甲士圍其第仍拜重誨于其庭重誨下階迎拜曰太傅過禮俛首方拜從璋以撾擊其首其妻驚走抱之曰令公死}
