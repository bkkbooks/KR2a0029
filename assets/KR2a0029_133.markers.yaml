  - {type: variant, offset: 292, length: 1, content: 宴, krp: 言不為之下應順元年三月辛酉義誠將出征閔帝幸左藏庫親給軍士錢帛是時義誠與洪實同于庫中靣論用兵利害歐陽史云洪實見軍士無鬭志而義誠盡將以西疑其有二心洪實言出軍討逆累發兵師今聞小衂無一人一騎來者不如以禁軍據門自固彼安敢徑來然後徐圖進取全䇿也義誠怒曰若如此言洪實反也洪實曰公自反誰反其聲漸厲帝聞召而訊之洪實猶理前謀又曰義誠言臣圖反據發兵計義誠反必矣閔帝不能明辨遂命誅洪實既而義誠果以禁軍迎降潞王故洪實之死後人皆以為寃康義誠字信臣代北三部落人也少以騎射事武皇從莊宗入魏博補突騎使累遷本軍都指揮使同光末從明宗討鄴城軍亂迫明宗為主明宗不然義誠進曰主上不慮社稷阽危不思戰士勞苦荒耽禽色溺于酒樂今從衆則有歸守節則將死明宗納其言繇是委之心膂明宗即位加檢校司空領富州刺史總突騎如故尋轉捧聖都指揮使鎮邠州刺史明宗幸汴平朱守殷改侍衛馬軍都指揮使領江西節度使車駕歸洛授侍衛馬歩軍都指揮使河陽節度使太平廣記長興中侍衛使康義誠常軍中差人于大宅充院子亦曾小有笞責忽一日憐其老而詰其姓則曰姓康别詰其鄉土親族息嗣方知是父遂相持而泣聞者莫不驚異長興末加同平章事秦王為天下兵馬元帥氣燄燻灼大臣皆懼求為外任義誠以明宗委遇無以解退乃令其子以弓馬事秦王冀自保全明宗不豫秦王諷義誠為助義誠曲意奉承亦非真誠及朱𢎞昭馮贇等懼禍謀于義誠但云僕為}
  - {type: punctuation, offset: 295, content: ，, id: KR2a0029_ZHSJ_133-bkkpn1}
  - {type: 'tls:seg', offset: 295, content: '', id: KR2a0029_ZHSJ_133-d133p25s22}
  - {type: variant, offset: 295, length: 2, content: 多暴, WYG: 不敢預議但相公所使耳及秦王既誅明宗宴駕閔帝即位加檢校太尉兼侍中判六軍諸衛事未㡬鳯翔變起西軍不利義誠懼乃請行蓋欲盡率駕下諸軍送降于潞王求免也會與朱洪實議事不協洪實因厲聲言義誠包藏之志閔帝曖昧不能明辨而誅洪實及義誠率軍至新安諸軍爭先趨陜解甲迎降義誠以部下數十人見潞王請罪潞王雖罪}
  - {type: page-break, offset: 295, content: '', id: KR2a0029_WYG_133-9a, image: WYG0277/WYG0277-0547c.png}
  - {type: variant, offset: 295, length: 2, content: 多暴, krp: 不敢預議但相公所使耳及秦王既誅明宗宴駕閔帝即位加檢校太尉兼侍中判六軍諸衛事未㡬鳯翔變起西軍不利義誠懼乃請行蓋欲盡率駕下諸軍送降于潞王求免也會與朱洪實議事不協洪實因厲聲言義誠包藏之志閔帝曖昧不能明辨而誅洪實及義誠率軍至新安諸軍爭先趨陜解甲迎降義誠以部下數十人見潞王請罪潞王雖罪}
  - {type: variant, offset: 298, length: 2, content: 短一, WYG: 奸回未便行法清泰元年四月斬于興教門外夷其族藥彦稠沙陀三部落人也㓜以騎射事明宗累遷至列校明宗踐䟭領澄州刺史河陽馬歩都將從王晏球討王都于定州平之領壽州節度使侍衛歩軍都虞侯屬河中指揮使楊彦温作亂彦稠改侍衛歩軍都指揮使充河中副招討使將兵討平之無㡬党項劫迴鶻入朝使詔彦稠屯朔方就討党項之叛命者搜索盗賊盡獲迴鶻所貢駞馬寳玉擒首領而還尋授邠州節度使遣會兵制置鹽州蕃戎逃遁獲陷蕃士庶千餘人遣復鄉里受詔與延州節度使案原本闕二字進攻夏州累月不克兵罷歸鎮閔帝嗣位與王思同攻鳯翔為副招討使禁軍之潰彦稠欲沿流而遁為軍士所擒而獻之時末帝已至華州令拘于獄誅之漢髙祖即位與王思同並制贈侍中宋令詢不知何許人也閔帝在藩時補為客將知書樂善動皆由禮長興中閔帝連殿大藩遷為都押衙參輔閫政甚有時譽閔帝深委之及閔帝嗣位朱馮用事不欲閔帝之舊臣在于左右乃出為磁州刺史閔帝䝉塵于衛令詢}
