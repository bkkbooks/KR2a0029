  - {type: variant, offset: 481, length: 0, content: '', WYG: 李琪為國計使三月丁未朔李紹真奏收復邢州擒賊首趙太等二十一人狥于鄴都城下皆磔于軍門庚戌李紹真自邢州赴鄴都城下辛亥以威武軍節度副使福建管内都指揮使檢校太傅守江州刺史王延翰為福建節度使依前檢校太傅壬子李嗣源領軍至鄴都營于西南隅甲寅進營于觀音門外下令諸軍詰旦攻城是夜城下軍亂廹嗣源為帝遲明亂軍擁嗣源及霍彦威入于鄴城復為皇甫暉趙進等所脅嗣源以詭詞得出夜分至魏縣時嗣源遙領鎮州詰旦議欲歸藩上章請罪安重誨以為不可語在明宗紀中翼日遂次于相州元行欽部下兵退保衛州以飛語上奏嗣源一日之中遣使上章申理者數四帝遣嗣源子從審與中使白從訓賫詔以諭嗣源行至衛州從審為元行欽所械不得達是日西面行營副招討使任圜奏收復漢州擒逆賊康延孝丙辰荆南高季}
  - {type: page-break, offset: 481, content: '', id: KR2a0029_WYG_069-9b, image: WYG0277/WYG0277-0307b.png}
