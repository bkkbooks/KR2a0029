  - {type: variant, offset: 468, length: 1, content: 莊, WYG: 王延翰已權知軍府事請降旌節司天監上言自二月上旬後晝夜隂雲不見天象自二十六日方晴至月終星辰無變以右衛上將軍朱漢賔知河南府事甲辰命蕃漢總管李嗣源統親軍赴鄴都以討趙在禮帝素倚愛元行欽鄴城軍亂即命為行營招討使久而無功時趙太據邢州王景戡據滄州自為留後河朔郡邑多殺長吏帝欲親征樞宻使與宰臣奏言京師者天下根本雖四方有變陛下冝居中以制之但命將出征無煩躬御士伍帝曰紹榮討亂未有成功繼岌之軍尚留巴漢餘無可將者斷在自行樞宻使李紹宏等奏曰陛下以謀臣猛將取天下今一州之亂而云無可將者何也總管李嗣源是陛下}
