  - {type: 'tls:seg', offset: 197, content: '', id: KR2a0029_ZHSJ_069-d69p3s13}
  - {type: variant, offset: 197, length: 0, content: '', WYG: 士有私親寧于都下者掠此言𫝊于貝州軍士皇甫暉等因夜聚蒲博不勝遂作亂刧都將楊仁晸曰我輩十有餘年為國家効命甲不離體已至吞併天下主上未垂㤙澤翻有猜嫌防戍邉逺經年離阻鄉國及得代歸去家起尺不令與家屬相見今聞皇后弑逆京邑巳亂將士各欲歸府寧親請公同行仁晸曰汝等何謀之過耶今英主在上天下一家從駕精兵不下百萬西平巴蜀威振華夷公等各有家族何事如此軍士乃抽戈露刃環仁晸曰三軍怨怒咸欲謀反茍不聽從須至無禮仁晸曰吾非不知此但丈夫舉事當計萬全軍人即斬仁晸禆將趙在禮聞軍亂衣不及帯將踰垣而遁亂兵追及白刃環之曰公能為帥否否則頭隨刃落在禮懼即曰吾能為之衆遂呼譟中夜燔刧貝郡詰旦擁在禮趨臨清剽永濟館陶五日晩有自貝州來者言亂兵將犯都城都廵檢使孫鐸等急趨史彦瓊之第告曰賊將至矣請給鎧仗登俾拒守彦瓊曰今日賊至臨清計程六日方至為備未晩孫鐸曰賊來㓂我必倍道兼行一朝失機悔將何及請僕射率衆登陴鐸以勁兵千人伏於王莽河逆擊之賊既挫勢須至離潰然後可以翦除如俟其㓙徒薄於城下必慮奸人内應則事未可測也彦瓊曰但訓士守城何須即戰}
