  - {type: variant, offset: 193, length: 3, content: 司錄參, WYG: 之中威福自我正言已下皆脅肩低首曲事不睱由是政無統攝姦人得以窺圖洎郭崇韜伏誅人未測其禍始皆云崇韜已殺繼岌自王西川故盡誅郭氏先是有宻詔令史彦瓊殺朱友謙之子澶州刺史建徽彦瓊夜半出城不言所往詰旦閽報正言曰史武徳夜半馳馬而去不知何往是日人情震駭訛言云劉皇后以繼岌死于蜀已行弑逆帝已晏駕故急徴彦瓊其言播于鄴市貝州}
