  - {type: variant, offset: 1279, length: 482, content: 之謀變後為符彥超所殺較薛史為明晰今附識于此影庫本粘籤且繫存渥徐觀其變事萬全矣憲良久曰吾本書生無軍功而致身及此一旦自布衣而紆金紫向來仕宦非出他門此畫非吾心也事苟不濟以身徇義案東都事略張昭傳昭勸憲奉表明宗以勸進憲曰吾書生也天子委以保釐之任吾豈苟生者乎昭曰此古之大節公能行之忠臣也憲既死論者以昭能成憲之節舊五代史考異翌日符彥超誅呂鄭軍城大亂燔剽達曙憲初聞有變出奔沂州既而有司糾其委城之罪四月二十四日賜死于晉陽之千佛院東都事略張昭傳云張憲聞莊宗之變昭勸其盡節憲遂自經薛史作賜死于晉陽與東都事略互異今附識于此影庫本粘籤幼子凝隨父走亦為收者加害明宗郊禮大赦有司請昭雪從之憲沈靜寡欲喜聚圖書家書五千卷視事之餘手自刊校善彈琴不飲酒賓僚宴語但論文嘯詠而已士友重之憲長子守素仕晉位至尚書郎永樂大典卷六千三百五十王正言鄆州人父志濟陰令正言早孤貧從沙門學工詩密州刺史賀德倫令歸俗署郡職德倫鎮青州表為推官移鎮魏州改觀察判官莊宗平定魏博正言仍舊職任小心端慎與物無競嘗為同職司空頲所凌正言降心下之頲誅代為節度判官同光初守戶部尚書興唐尹時孔謙為租庸副使常畏張憲挺特不欲其領使乃白郭崇韜留憲于魏州請, WYG: ''}
