  - {type: variant, offset: 1773, length: 2, content: 盧質, WYG: 一時之娛恣其蹂踐使比屋囂然動溝壑之慮為民父母豈若是耶莊宗大怒以為遭縣令所辱遂叱退將斬之伶官鏡新磨者知其不可乃與群伶齊進挽住令佯為詬責曰汝為縣可以指麾百姓為兒既天子好獵即合多留閒地安得縱百姓耕鋤皆徧妨天子鷹犬飛走耶而又不能自責更敢咄咄吾知汝當死罪諸伶亦皆嘻笑繼和于是莊宗黙然其怒少霽頃之恕縣令罪五}
  - {type: variant, offset: 1773, length: 2, content: 盧質, krp: 一時之娛恣其蹂踐使比屋囂然動溝壑之慮為民父母豈若是耶莊宗大怒以為遭縣令所辱遂叱退將斬之伶官鏡新磨者知其不可乃與群伶齊進挽住令佯為詬責曰汝為縣可以指麾百姓為兒既天子好獵即合多留閒地安得縱百姓耕鋤皆徧妨天子鷹犬飛走耶而又不能自責更敢咄咄吾知汝當死罪諸伶亦皆嘻笑繼和于是莊宗黙然其怒少霽頃之恕縣令罪五}
  - {type: variant, offset: 1776, length: 0, content: '', WYG: 史闕文莊宗嘗因博戲覩骰子采有暗相輪者心悦之乃自置暗箭格凡博戲並認采之在下者及同光末鄴都兵亂從謙以兵犯興教門莊宗禦之中流矢而崩識者以為暗箭之應史臣曰莊宗以雄圖而起河汾以力戰而平汴洛家讐既雪國祚中興雖少康之嗣夏配天光武之膺圖受命亦無以加也然得}
