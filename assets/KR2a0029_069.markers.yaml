  - {type: variant, offset: 1766, length: 3, content: 判租庸, WYG: 韋説㑹於中興殿之廊下商議軍機因奏魏王西征兵士將至車駕且宜控氾水以俟魏王從之午時帝出上東門親閲騎軍誡以詰且東幸申時還宫四月丁丑朔以永王存霸為北都留守申王存渥為河中節度使是日車駕將發京師從駕馬軍陳于寛仁門外歩兵陳于五鳯門外帝内殿食次從馬直指揮使郭從謙自本營率所部抽戈露刃至興教門大呼與黄甲兩軍引弓射興教門帝聞其變自宫中率諸王近衛禦之逐亂兵出門既而焚興教門縁城而入登宫牆讙譟帝御親軍格鬭殺亂兵數百俄而帝為流矢所中亭午崩于絳霄殿之廡下時年四十二琬琰集載宋實録王全斌𫝊云同光末蕭牆有變亂兵逼宫城近臣宿將皆釋甲潛遁惟全斌與符彦卿等十數人居中拒戰莊宗中流矢扶掖歸絳霄殿全斌痛哭而去東都事畧符彦卿𫝊云郭從諫之亂莊宗左右皆引去唯彦卿力戰殺十餘人莊宗崩彦卿痛哭而去是時帝之左右例皆奔散唯五坊人善友歛廊下樂器簇于帝屍之上發火焚之及明宗入洛止得其燼骨而已天成元年七月丁卯有司上諡曰光聖神閔孝皇帝廟號莊宗是月丙子𦵏于雍陵五代史補莊宗之嗣位也志在渡河但恨河東地狹兵少思欲百練其衆以取必勝于天下乃下令曰凡出師騎軍不見賊不許騎馬或歩騎前後已定不得越軍分以避險惡其分路並進期㑹有處不得違晷刻并在路敢言病者皆斬之故三軍懼法而戳力皆一以當百故朱梁舉天下而不能禦卒為所滅良有以也初莊宗為公子時雅好音律又能自撰曲子詞其後凡用軍前後隊伍皆以所撰詞授之使揭聲而唱謂之御製至于入陣不論勝負馬頭纔轉則衆歌齊作故凡所鬬戰人忘其死斯亦用軍之一竒也忽莊宗好獵每出}
