  - {type: variant, offset: 2152, length: 2990, content: 考異望塵再拜請罪在禮曰尚書重德勿自卑屈余受國恩與尚書共事但思歸之衆倉卒見迫耳因拜正言厚加慰撫明宗即位正言求為平盧軍行軍司馬因以授之竟卒于任永樂大典卷六千八百五十胡裝禮部尚書曾之孫汴將楊師厚之鎮魏州裝與副使李嗣業有舊因往依之薦授貴鄉令及張彥之亂嗣業遇害裝罷秩客于魏州莊宗初至裝謁見求假官司空頲以其居官貪濁不得調者久之十三年莊宗還太原裝候于離亭謁者不內乃排闥而入曰臣本朝公卿子孫從兵至此殿下比興唐祚勤求英俊以壯霸圖臣雖不才比于進九九納豎刁豎刁原本作堅刀今據文改正影庫本粘籤頭須亦所庶幾而羈旅累年執事者不垂顧錄臣不能赴海觸樹走胡適越今日歸死于殿下也莊宗愕然曰孤未之知何至如是賜酒食慰遣之謂郭崇韜曰便與擬議是歲署館驛巡官未幾授監察御史𩹉行遷節度巡官賜緋魚袋尋歷推官檢校員外郎裝學書無師法工詩非作者僻于題壁所至宮亭寺觀必書爵里人或譏之不以為愧時四鎮幕賓皆金紫裝獨恥銀艾十七年莊宗自魏州之德勝與賓僚城樓餞別既而羣僚離席裝獨留獻詩三篇意在章服莊宗舉大鍾屬裝曰員外能釂此乎裝飲酒素少略無難色為之一舉而釂莊宗即解紫袍賜之同光初以裝為給事中從幸洛陽時連年大水百官多窘裝求為襄州副使四年洛陽變擾節度使劉訓以私忿族裝誣奏云裝欲謀亂人士寃之永樂大典卷二千二百四十二崔貽孫案新唐書宰相世系表貽孫字伯垂舊五代史考異祖元亮案世系表元亮字晦叔虢州刺史舊五代史考異左散騎常侍父芻言潞州判官貽孫以門族登進士第以監察升朝歷清資美職及為省郎使于江南迴以櫜裝營別墅于漢上之穀城退居自奉清江之上綠竹遍野狹徑深密維舟曲岸人莫造焉時人甚高之及李振貶均州均州原本作珣州今從歐陽史改正影庫本粘籤貽孫曲奉之振入朝貽孫累遷丞郎同光初除吏部侍郎銓選疎謬貶官塞地馳驛至潞州致書于府帥孔勍曰十五年穀城山𩹉自謂逸人二千里沙塞途中今為逐客勍以其年八十奏留府下明年量移澤州司馬遇赦還京宰相鄭王玉以姻戚之分復擬吏部侍郎天官任重昏耄罔知後遷禮部尚書致仕而卒案北夢瑣言崔貽孫年過八十求進不休囊橐之資素有貯積性好干人喜得小惠舊五代史考異有子三人自貽孫左降之後各于舊業爭分其利甘旨醫藥莫有奉者貽孫以書責之云生有明君宰相死有天曹地府吾雖考終豈放汝耶永樂大典卷二千七百四十孟鵠魏州人莊宗初定魏博選幹吏以計兵賦以鵠為度支孔目官明宗時為邢洺節度使每曲意承迎明宗甚德之及孔謙專典軍賦徵督苛急明宗嘗切齒及即位鵠自租庸勾官擢為客省副使案北夢瑣言作三司勾押官舊五代史考異樞密承旨遷三司副使出為相州刺史會范延光再遷樞密乃徵鵠為三司使初鵠有計畫之能及專掌邦賦操刺依違名譽頓減期年發疾求外任仍授許州節度使謝恩退帝目送之顧謂侍臣曰孟鵠掌三司幾年得至方鎮范延光奏曰鵠于同光世已為三司勾官天成初為三司副使出刺相州入判三司又二年帝曰鵠以幹事遽至方鎮爭不勉旃鵠與延光俱魏人厚相結託暨延光掌樞務援引判三司又致節鉞明宗知之故以此言譏之到任未周歲卒贈太傅永樂大典卷一萬三千一百六十孫岳冀州人也強幹有才用歷府衞右職天成中為潁耀二州刺史閬州團練使所至稱治遷鳳州節度使受代歸京秦王從榮欲以岳為元帥府都押衙事未行馮贇舉為三司使時預密謀朱馮患從榮之恣橫岳曾極言其禍之端康義誠聞之不悅及從榮敗義誠召岳同至河南府檢閱府藏時紛擾未定義誠密遣騎士射之岳走至通利坊為騎士所害識與不識皆痛之子璉歷諸衞將軍藩閫節度副使永樂大典卷三千五百九十一張延朗張延朗傳永樂大典原本有刪節今就散見各韻者得二條排比前後以存梗概影庫本粘籤汴州開封人也事梁以租庸吏為鄆州糧料使明宗克鄆州得延朗復以為糧料使後徙鎮宣武成德以為元從孔目官長興元年始置三司使拜延朗特進工部尚書充諸道鹽鐵轉運等使兼判戶部度支事詔以延朗充三司使永樂大典卷六千三百五十一末帝即位授禮部尚書兼中書侍郎平章事判三司延朗再上表辭曰臣濫承雨露擢處鈞衡兼叨選部之銜仍掌計司之重況中省文章之地洪鑪陶鑄之門臣自揣量何以當處是以繼陳章表疊貢情誠乞請睿恩免貽朝論豈謂御批累降聖旨不移決以此官委臣非器所以強收涕泗勉遏怔忪重思事上之門細料盡忠之路竊以位高則危至寵極則謗生君臣莫保于初終分義難防于毀譽臣若保茲重任忘彼至公徇情而以免是非偷安而以固富貴則內欺心腑外負聖朝何以報君父之大恩望子孫之延慶臣若但行王道唯守國章任人必取當才決事須依正理確違形勢堅塞倖門則可以振舉弘綱彌縫大化助陛下含容之澤彰國家至理之風然而讒邪者必起憾詞憎嫉者寧無謗議或慮至尊未悉羣謗難明不更拔本尋源便俟甘瑕受玷臣心可忍臣恥可消只恐山林草澤之人稱量聖制冠履軒裳之士輕慢朝廷臣又以國計一司掌其經費利權二務職在捃收將欲養四海之貧民無過薄賦贍六軍之勁士又藉豐儲利害相隨取與難酌若使罄山採木竭澤求魚竭澤原本作渴懌今據冊府元龜改正影庫本粘籤則地官之教化不行國本之傷殘益甚取怨黔首是黷皇風況諸道所徵賦租雖多數額時逢水旱或遇蟲霜其間則有減無添所在又申逃係欠乃至軍儲官俸常汲汲于供須夏稅秋租每懸懸于繼續況今內外倉庫多是罄空遠近生民或聞饑歉伏見朝廷尚添軍額更益師徒非時之博糴難為異日之區分轉大竊慮年支有闕國計可憂望陛下節例外之破除放諸項以儉省不添冗食且止新兵務急去繁以寬經費減奢從儉漸俟豐盈則屈者知恩叛者從化弭兵有日富俗可期臣又聞治民尚清為政務易易則煩苛並去清則偏黨無施若擇其良牧委在正人則境內蒸黎必獲蘇息官中倉庫亦絕侵欺伏望誡見在之處官無乖撫俗擇將來之蒞事更審求賢儻一一得人則農無所苦人人致理則國復何憂但奉公善政者不惜重酬昧理無功者勿頒厚俸益彰有道兼絕徇情伏望陛下念臣布露之前言閔臣驚憂于後患察臣愚直杜彼讒邪臣即但副天心不防人口庶幾萬一仰答聖明末帝優詔答之召于便殿謂之曰卿所論奏深中時病形之切言頗救朕失國計事重日得商量無勞過慮也延朗不得已而承命延朗有心計善理繁劇晉高祖在太原朝廷猜忌不欲令有積聚係官財貨留使之外延朗悉遣取之晉高祖深銜其事及晉陽起兵末帝議親征然亦采浮論不能果決延朗獨排衆議請末帝北行識者韙之晉高祖入洛送臺獄以誅之其後以選求計使難得其人甚追悔焉永樂大典卷一萬七千九百一十劉延皓應州渾元人祖建立父茂成案歐陽史作茂威舊五代史考異皆以軍功推為邊將延皓即劉后之弟也案通鑑攷異引廢帝實錄延皓皇后之姪與薛史異歐陽史與薛史同舊五代史考異末帝鎮鳳翔署延皓元隨都校奏加檢校戶部尚書清泰元年除宮苑使宮苑原本作宮阮使今據五代會要改正影庫本粘籤加檢校司空俄改宣徽南院使檢校司徒二年遷樞密使太保出為鄴都留守案歐陽史作天雄軍節度使舊五代史考異檢校太傅延皓御軍失政為屯將張令昭所逐出奔相州尋詔停所任及晉高祖入洛延皓逃匿龍門廣化寺數日自經而死延皓始以后戚自藩邸出入左右甚以溫厚見稱故末帝嗣位之後委居近密及出鎮大名而所執一變掠人財賄納人園宅聚歌僮為長夜之飲而三軍所給不時內外怨之因為令昭所逐時執政以延皓失守請舉舊章末帝以劉后內政之故止從罷免而已由是清泰之政弊矣永樂大典卷九千九十九劉延朗宋州虞城人也末帝鎮河中時為軍城馬步都虞候後納為腹心及鎮鳳翔鳳翔原本作鳳翊今從通鑑改正影庫本粘籤署為孔目吏末帝將圖起義為捍禦之備延朗計公私粟帛以贍其急及西師納降末帝赴洛皆無所闕焉末帝甚賞之清泰初除宣徽北院使案歐陽史廢帝既立以延朗為莊宅使舊五代史考異俄以劉延皓守鄴改副樞密使累官至檢校太傅時房暠為樞密使但高枕閑眠啟奏除授一歸延朗由是得志凡藩侯郡牧自外入者必先賂延朗後議進貢賂厚者先居內地賂薄者晚出邊藩故諸將屢有怨訕末帝不能察之及晉高祖入洛延朗將竄于南山與從者數輩過其私第指而歎曰我有錢, WYG: 巻}
  - {type: variant, offset: 2152, length: 2990, content: 考異望塵再拜請罪在禮曰尚書重德勿自卑屈余受國恩與尚書共事但思歸之衆倉卒見迫耳因拜正言厚加慰撫明宗即位正言求為平盧軍行軍司馬因以授之竟卒于任永樂大典卷六千八百五十胡裝禮部尚書曾之孫汴將楊師厚之鎮魏州裝與副使李嗣業有舊因往依之薦授貴鄉令及張彥之亂嗣業遇害裝罷秩客于魏州莊宗初至裝謁見求假官司空頲以其居官貪濁不得調者久之十三年莊宗還太原裝候于離亭謁者不內乃排闥而入曰臣本朝公卿子孫從兵至此殿下比興唐祚勤求英俊以壯霸圖臣雖不才比于進九九納豎刁豎刁原本作堅刀今據文改正影庫本粘籤頭須亦所庶幾而羈旅累年執事者不垂顧錄臣不能赴海觸樹走胡適越今日歸死于殿下也莊宗愕然曰孤未之知何至如是賜酒食慰遣之謂郭崇韜曰便與擬議是歲署館驛巡官未幾授監察御史𩹉行遷節度巡官賜緋魚袋尋歷推官檢校員外郎裝學書無師法工詩非作者僻于題壁所至宮亭寺觀必書爵里人或譏之不以為愧時四鎮幕賓皆金紫裝獨恥銀艾十七年莊宗自魏州之德勝與賓僚城樓餞別既而羣僚離席裝獨留獻詩三篇意在章服莊宗舉大鍾屬裝曰員外能釂此乎裝飲酒素少略無難色為之一舉而釂莊宗即解紫袍賜之同光初以裝為給事中從幸洛陽時連年大水百官多窘裝求為襄州副使四年洛陽變擾節度使劉訓以私忿族裝誣奏云裝欲謀亂人士寃之永樂大典卷二千二百四十二崔貽孫案新唐書宰相世系表貽孫字伯垂舊五代史考異祖元亮案世系表元亮字晦叔虢州刺史舊五代史考異左散騎常侍父芻言潞州判官貽孫以門族登進士第以監察升朝歷清資美職及為省郎使于江南迴以櫜裝營別墅于漢上之穀城退居自奉清江之上綠竹遍野狹徑深密維舟曲岸人莫造焉時人甚高之及李振貶均州均州原本作珣州今從歐陽史改正影庫本粘籤貽孫曲奉之振入朝貽孫累遷丞郎同光初除吏部侍郎銓選疎謬貶官塞地馳驛至潞州致書于府帥孔勍曰十五年穀城山𩹉自謂逸人二千里沙塞途中今為逐客勍以其年八十奏留府下明年量移澤州司馬遇赦還京宰相鄭王玉以姻戚之分復擬吏部侍郎天官任重昏耄罔知後遷禮部尚書致仕而卒案北夢瑣言崔貽孫年過八十求進不休囊橐之資素有貯積性好干人喜得小惠舊五代史考異有子三人自貽孫左降之後各于舊業爭分其利甘旨醫藥莫有奉者貽孫以書責之云生有明君宰相死有天曹地府吾雖考終豈放汝耶永樂大典卷二千七百四十孟鵠魏州人莊宗初定魏博選幹吏以計兵賦以鵠為度支孔目官明宗時為邢洺節度使每曲意承迎明宗甚德之及孔謙專典軍賦徵督苛急明宗嘗切齒及即位鵠自租庸勾官擢為客省副使案北夢瑣言作三司勾押官舊五代史考異樞密承旨遷三司副使出為相州刺史會范延光再遷樞密乃徵鵠為三司使初鵠有計畫之能及專掌邦賦操刺依違名譽頓減期年發疾求外任仍授許州節度使謝恩退帝目送之顧謂侍臣曰孟鵠掌三司幾年得至方鎮范延光奏曰鵠于同光世已為三司勾官天成初為三司副使出刺相州入判三司又二年帝曰鵠以幹事遽至方鎮爭不勉旃鵠與延光俱魏人厚相結託暨延光掌樞務援引判三司又致節鉞明宗知之故以此言譏之到任未周歲卒贈太傅永樂大典卷一萬三千一百六十孫岳冀州人也強幹有才用歷府衞右職天成中為潁耀二州刺史閬州團練使所至稱治遷鳳州節度使受代歸京秦王從榮欲以岳為元帥府都押衙事未行馮贇舉為三司使時預密謀朱馮患從榮之恣橫岳曾極言其禍之端康義誠聞之不悅及從榮敗義誠召岳同至河南府檢閱府藏時紛擾未定義誠密遣騎士射之岳走至通利坊為騎士所害識與不識皆痛之子璉歷諸衞將軍藩閫節度副使永樂大典卷三千五百九十一張延朗張延朗傳永樂大典原本有刪節今就散見各韻者得二條排比前後以存梗概影庫本粘籤汴州開封人也事梁以租庸吏為鄆州糧料使明宗克鄆州得延朗復以為糧料使後徙鎮宣武成德以為元從孔目官長興元年始置三司使拜延朗特進工部尚書充諸道鹽鐵轉運等使兼判戶部度支事詔以延朗充三司使永樂大典卷六千三百五十一末帝即位授禮部尚書兼中書侍郎平章事判三司延朗再上表辭曰臣濫承雨露擢處鈞衡兼叨選部之銜仍掌計司之重況中省文章之地洪鑪陶鑄之門臣自揣量何以當處是以繼陳章表疊貢情誠乞請睿恩免貽朝論豈謂御批累降聖旨不移決以此官委臣非器所以強收涕泗勉遏怔忪重思事上之門細料盡忠之路竊以位高則危至寵極則謗生君臣莫保于初終分義難防于毀譽臣若保茲重任忘彼至公徇情而以免是非偷安而以固富貴則內欺心腑外負聖朝何以報君父之大恩望子孫之延慶臣若但行王道唯守國章任人必取當才決事須依正理確違形勢堅塞倖門則可以振舉弘綱彌縫大化助陛下含容之澤彰國家至理之風然而讒邪者必起憾詞憎嫉者寧無謗議或慮至尊未悉羣謗難明不更拔本尋源便俟甘瑕受玷臣心可忍臣恥可消只恐山林草澤之人稱量聖制冠履軒裳之士輕慢朝廷臣又以國計一司掌其經費利權二務職在捃收將欲養四海之貧民無過薄賦贍六軍之勁士又藉豐儲利害相隨取與難酌若使罄山採木竭澤求魚竭澤原本作渴懌今據冊府元龜改正影庫本粘籤則地官之教化不行國本之傷殘益甚取怨黔首是黷皇風況諸道所徵賦租雖多數額時逢水旱或遇蟲霜其間則有減無添所在又