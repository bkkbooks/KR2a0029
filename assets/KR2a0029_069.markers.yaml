  - {type: variant, offset: 482, length: 0, content: '', WYG: 上言請割峽内夔忠萬等三州却歸當道依舊管係又請雲安監初將議伐蜀詔高季興令率本軍上峽自收元管屬郡軍未進夔忠萬三州已降季興數請之因賂劉皇后及宰臣樞宻使内外叶附乃俞其請戍午詔河南府預借今年夏秋租税時年饑民困百姓不勝其酷京畿之民多號泣于路議者以為劉盆子復生矣庚申詔潞州節度使孔勍赴闕以右龍虎統軍安崇阮權知潞州是日忠武軍節度使齊王張全義薨壬戌宰臣豆盧革率百官上表以魏博軍變請出内府金帛優給將士不報時知星者上言客星犯夫庫宜散府蔵又云流星犯天棓主御前有急兵帝召宰臣於便殿皇后出宫中粧匳銀盆各二并皇子滿哥三人謂宰臣曰外人謂内府金寳無數向者諸侯貢獻旋供賜與今宫中有者粧匳嬰孺而已可鬻之給軍革等惶恐而退癸亥以偽置昭武軍節度使林思諤為閬州刺史是日出錢帛給賜諸軍兩樞宻使及宋}
