  - {type: variant, offset: 176, length: 1, content: 改, krp: 丁亥殺李繼麟之將史武薛敬容周唐殷楊師太王景來仁白奉國滅其族二月已丑以宣徽南院使知内侍省兼内勾特進右領軍衛上將軍李紹宏為驃騎大將軍守左武衛上將軍知内侍省充樞宻使甲午以鄭州刺史李紹竒為河陽節度使以樂人景進為銀青光禄大夫檢校右散騎常侍守御史大夫進以俳優嬖幸善采訪閭巷鄙細事以啟奏復宻求妓媵以進恩寵特厚魏州錢榖諸務及招兵市馬悉委進監臨孔謙附之以希寵常呼為八哥諸軍左右無不托附至于士人亦有因之而求仕進者毎入言事左右紛然屏退惟以䧟害熒惑為意焉是日帝幸冷泉校獵乙未宰臣豆盧革上言請支州縣官實俸以責課効丙申武德使史彦瓊自鄴馳報稱今月六日貝州屯駐兵士突入都城剽刧坊市初帝令魏博指揮使楊仁晸率兵戍瓦橋至是代歸有詔令駐于貝州上嵗天下大水十月鄴地大震自是居人或有亡去他郡者每日族談巷語云城將亂矣人人恐悚皆不自安十二月以户部尚書王}
