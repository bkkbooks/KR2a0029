  - {type: variant, offset: 521, length: 4, content: 都來朝宴, WYG: 衍仍夷其族乙丑車駕發京師戊辰遣元行欽將騎軍沿河東向壬申帝至滎澤以龍驤馬軍八百騎為前軍遣姚彦温董之彦温行至中牟率所部奔}
  - {type: variant, offset: 521, length: 4, content: 都來朝宴, krp: 衍仍夷其族乙丑車駕發京師戊辰遣元行欽將騎軍沿河東向壬申帝至滎澤以龍驤馬軍八百騎為前軍遣姚彦温董之彦温行至中牟率所部奔}
