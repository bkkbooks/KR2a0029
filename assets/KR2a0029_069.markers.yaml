  - {type: variant, offset: 135, length: 0, content: '', WYG: 紀八同光四年春正月戊午朔帝不受朝賀契丹㓂渤海壬戌詔以去嵗因被災沴物價騰踊自今月三日後避正殿減膳撤樂以答天譴應去年遭水災州縣秋夏税賦並與放免自壬午年已前所欠殘税及諸色課利已有勅命放免者尚聞所在却有徴收宜令租庸司切準前勅處分應京畿内人户有停貯斛㪷者並令減價出糶如不遵行當令撿括西川王衍父子及偽署將相官吏除已行刑憲外一切釋放天下禁囚除十惡五逆官典犯贓屠牛毁錢放火刧舍持刃殺人準律常赦不原外應合抵極刑者遞降一等其餘罪犯悉與減降逃背軍健並放逐便癸亥河中節度使李繼麟來朝諸州上言準宣}
  - {type: page-break, offset: 135, content: '', id: KR2a0029_WYG_069-1b, image: WYG0277/WYG0277-0303b.png}
  - {type: page-break, offset: 135, content: '', id: KR2a0029_WYG_069-2a, image: WYG0277/WYG0277-0303c.png}
  - {type: variant, offset: 135, length: 0, content: '', krp: 紀八同光四年春正月戊午朔帝不受朝賀契丹㓂渤海壬戌詔以去嵗因被災沴物價騰踊自今月三日後避正殿減膳撤樂以答天譴應去年遭水災州縣秋夏税賦並與放免自壬午年已前所欠殘税及諸色課利已有勅命放免者尚聞所在却有徴收宜令租庸司切準前勅處分應京畿内人户有停貯斛㪷者並令減價出糶如不遵行當令撿括西川王衍父子及偽署將相官吏除已行刑憲外一切釋放天下禁囚除十惡五逆官典犯贓屠牛毁錢放火刧舍持刃殺人準律常赦不原外應合抵極刑者遞降一等其餘罪犯悉與減降逃背軍健並放逐便癸亥河中節度使李繼麟來朝諸州上言準宣}
  - {type: variant, offset: 136, length: 0, content: '', WYG: 去年十月地震集僧道起消災道場甲子魏王繼岌殺樞宻使郭崇韜於西川夷其族丙寅百官上表請復帝膳凡三上表乃允之西川}
  - {type: variant, offset: 136, length: 0, content: '', krp: 去年十月地震集僧道起消災道場甲子魏王繼岌殺樞宻使郭崇韜於西川夷其族丙寅百官上表請復帝膳凡三上表乃允之西川}
