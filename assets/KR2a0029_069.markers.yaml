  - {type: 'tls:seg', offset: 524, content: '', id: KR2a0029_ZHSJ_069-d69p4s4}
  - {type: variant, offset: 526, length: 423, content: 行宮將擊鞠初莊宗行即位之禮卜鞠場吉因築壇于其間至是詔毀之通鑑作莊宗議毀即位壇張憲請拓其旁地仍留壇基與薛史微異今附識于此影庫本粘籤憲奏曰即位壇是陛下祭接天神受命之所自風燥雨濡之外不可輒毀亦不可修魏繁陽之壇漢汜水之壇到今猶有兆象存而不毀古之道也即命治之于宮西數日未成會憲以公事獲譴閤門待罪上怒戒有司速治行宮之庭礙事者畢去竟毀即位壇案歐陽史作場未成莊宗怒命兩虞候亟毀壇以為場與薛史異通鑑從歐陽史舊五代史考異憲私謂郭崇韜曰不祥之甚忽其本也秋崇韜將兵征蜀以手書告憲曰允中避事久矣余受命西征已奏還公黃閤憲報曰庖人之代尸祝所謂非吾事也時樞密承旨樞密承旨原本脫密字今據文增入影庫本粘籤段佪當權任事以憲從龍舊望不欲憲在朝廷會孟知祥鎮蜀川選北京留守佪揚言曰北門國家根本非重德不可輕授今之取才非憲不可趨時者因附佪勢巧中傷之又曰憲有相業然國祚中興宰相在天子面前得失可以改作一方之事制在一人惟北面事重十一月授憲銀青光祿大夫檢校吏部尚書太原尹北京留守知府事四年二月趙在禮入魏, WYG: 汴}
