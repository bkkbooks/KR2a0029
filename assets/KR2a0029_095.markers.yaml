  - {type: variant, offset: 100, length: 0, content: '', WYG: 多去一在徳未足為少茍可懲勸朕何憂焉但縁情在傾輸理難黜責濤等敷奏朕亦優容宜體含𢎞勉思竭盡凡百在下悉聽朕言夏四月辛已宰臣判三司張延朗奏州縣官徴科條格其令錄在任徴科依限了絶一年加階兩年與試銜三年皆及限了絶與服色攝任者一年内了絶及攝二年三年内皆及限與真命其主簿同縣令條本判官一年加階二年改試銜三年轉官本曺官省限内了絶與試銜諸節級三年内並了絶者與賞錢三十貫其責罰依天成四年五月五日勑施}
