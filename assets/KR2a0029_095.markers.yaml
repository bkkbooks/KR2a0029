  - {type: variant, offset: 580, length: 841, content: 稱謂不論其品秩就人臣極品而稱之據薛史遇累官至檢校太師審琦蓋稱其檢校之官也胡注似未詳考舊五代史考異遂率鐵騎北渡赴之契丹見塵起謂救軍併至乃引去遇與彥超中數創得還時諸軍歎曰此三人皆猛將也遇累官至檢校太師同中書門下平章事四年契丹復至從杜重威營滹水重威送款於契丹遇不預其議及降心不平之時戎王欲遣遇先入汴遇辭之因私謂人曰我身荷國恩位兼將相既不能死於軍陣何顏以見舊主更受命圖之所不忍也明日行及趙郡泊其縣舍顧從者曰我已信宿不食疾甚矣主辱臣死無復南行因絕吭而殞遠近聞而義之漢高祖登極詔贈中書令周廣順三年正月遇妻宋國夫人霍氏上言請度為尼周太祖許之仍賜紫衣號貞範大師法名惠圓又賜夏臘十永樂大典卷一萬八千三十一王清案遼史趙延壽傳作王靖孔本字去瑕洺州曲周人也父度世為農清少以勇力端厚稱於鄉里後唐明宗領行臺置步直軍清預其募漸升為小校同光初從戰於河上有功賜忠烈功臣明宗即位自天成至清泰末歷嚴衞寧衞指揮使加檢校右散騎常侍天福元年高祖建義入洛加檢校刑部尚書改賜扈蹕忠孝功臣三年從楊光遠平范延光於鄴改奉國軍都虞候六年襄州安從進叛從高行周討之踰年不下一日清請先登諸軍繼其後會有內應者遂拔其城清以中重創有詔褒慰七年改賜推忠保運功臣加金紫光祿大夫領溪州刺史八年詔遣以所部兵屯於鄴九年春契丹南牧圍其城清與張從恩守之少帝飛蠟詔勉諭錫之第宅契丹退以干城功繼遷軍額開運二年春三月從杜重威北征解陽城之圍加檢校司徒是歲秋七月詔遣與皇甫遇援糧入易州十一月從杜重威收瀛州聞契丹大至重威率諸軍沿滹水而西將保常山及至中渡橋中渡原本作平渡今從遼史改正影庫本粘籤契丹已屯於北岸自其月二十七日至十二月五日軍不能解時戎王至留騎之精者以禦我分其弱者自故靈都城緣其山足涉滹沱之淺處引衆而南至趙郡凡百餘里斷我飛輓且扼歸路清知勢謂重威曰軍去常山五里守株於此營孤食盡將若之何請以步兵二千為前鋒奪橋開路公可率諸軍繼之期入常山必濟矣重威可之遣宋彥筠俱行清一擊獲其橋契丹為之小却重威猶豫不進密已貳於國矣彥筠退走清列陣北岸嚴戒部曲日暮酣戰不息契丹以生軍繼至我無寸刃益之清, WYG: 承}
