  - {type: variant, offset: 1838, length: 352, content: 二千騎當敵騎五千衆寡不侔以致敗績遼史恐不足據舊五代史考異即是歲十一月也時年四十九漢璋熟於戎馬累有軍功及為藩郡所至好聚斂無善政可紀及鎮甘陵甚有平契丹之志但以所領偏師驟逢勍敵故有是衄焉是月其子海榮進漢璋所乘鞭馬及器仗帝傷之乃贈太尉漢璋有弟漢瑭亦以善用槊有名於時天成中為魏府効節軍使攻定州王都漢瑭督所部一軍首入其城獲王都及蕃將禿餒名馬數駟時范延光鎮常山欲其駿者漢瑭不諾後漢瑭屯兵趙郡因事奏而殺之時人寃之永樂大典卷六千六百十四白奉進字德昇雲州清塞軍人也父曰達子世居朔野以弋獵為事奉進少善騎射後唐武皇鎮太原奉進謁於軍門以求自効武皇納於麾下莊宗之破夾寨也奉進挺身首犯賊鋒莊宗覩而壯之後從戰山東河上繼以功遷龍武指揮使同光中魏王繼岌伐蜀擢為親軍指揮使天成長興中統上軍加檢校右散騎常侍應順中轉捧聖右廂都指揮使檢校邢部尚書賜, WYG: ''}
