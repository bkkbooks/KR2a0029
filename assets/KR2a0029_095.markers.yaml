  - {type: variant, offset: 101, length: 1, content: 營, WYG: 從之癸未御史中丞盧損等進清㤗元年以前十一年制勑堪悠乆施行者三百九十四道編為三十巻其不中選者各令所司封閉不得行用詔其新編勑如可施行付御史臺頒行以宰相盧文紀兼太微宫使𢎞文館大學士姚顗加門下侍郎監修國史張延朗兼集賢殿大學士以樞密使韓昭𦙍為中書侍郎兼兵部尚書平章事乙酉以前武勝軍節度使張萬進為鄜州節度使辛卯以宣徽南院使劉延皓為刑部尚書充樞密使以司天監耿瑗為太府卿以偽蜀右衛上將軍胡杲通為司天監以宣徽北院使房暠為}
