  - {type: variant, offset: 96, length: 3, content: 討東川, krp: 䇿題下中書令宰臣面試如下位有大才者便拔居大位處大位無大才者卽移之下僚其疏大約如此盧文紀等見其奏不悅班行亦多憤悱故諫官劉濤楊昭儉等上疏請出在徳疏辨可否宣行中書覆奏亦駁其錯誤帝詔學士馬𦙍孫謂曰史在徳語太凶其實難容朕初臨天下湏開言路若朝士以言獲罪誰敢言者爾代朕作詔勿加在徳之罪詔曰左補闕劉濤等奏太常丞史在徳所上章疏中書門下駁奏未奉宣諭乞特施行分明黜陟朕嘗覽貞觀故事見太宗之治理以貞觀昇平之運太宗明聖之君野無遺賢朝無闕政盡善盡美無得而名而陜縣丞皇甫徳參輒上封章恣行訕謗人臣無禮罪不容誅賴文貞之彌縫恕徳參之狂瞽魏徴奏太宗曰陛下思聞得失只可恣其所陳若所言不中亦何損于國家朕毎思之誠要言也遂得下情上逹徳盛業隆太宗之道彌光文貞之節斯著朕惟寡昧獲奉宗祧業業兢兢懼不克荷思欲率循古道簡抜時材懐忠抱直之人虚心渴見便佞詭随之說杜耳惡聞史在徳近所獻陳誠無避忌中書以文字紕繆比類僭差改易人名觸犯廟諱請歸憲法以示戒懲蓋以中書旣委參詳合盡事理朕纘承前緒誘勸將來多言數窮雖聖祖之所戒千慮一得兾愚者之可從因覽文貞之言遂寛在徳之罪已令停寢不遣宣行劉清等官列諫垣宜陳讜議請定短長之理以行黜陟之文昔魏徴則請賞徳叅今濤等請黜在徳事同言異何相遠哉將議允俞恐虧開納方朝廷粗理俊乂畢臻畱一在徳不足}
