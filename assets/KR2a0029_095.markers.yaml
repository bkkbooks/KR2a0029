  - {type: variant, offset: 185, length: 0, content: '', WYG: 便殿詢謀則獨對敭于四輔自上元年後于長安東内置延英殿宰臣如有奏議聖㫖或有特宣皆于前一日上聞對御之時祗奉冕旒旁無侍衛獻可替否得曲盡于討倫捨短從長故無虞于漏洩君臣之際情理坦然伏望聖慈俯循故事或有事關軍國謀繫否臧未果决于聖懐要詢訪于臣軰則請依延英故事前一日𫝊宣或臣等有所聼聞切關利害難形文字須面敷敭臣等亦依故事前一日請開延英當君臣奏議之時秪請機要臣寮侍立左右兼乞稍霽威嚴恕臣荒拙雖乏鷹鸇之効庶盡葵藿之心詔曰卿等濟代英才}
