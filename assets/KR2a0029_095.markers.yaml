  - {type: variant, offset: 3036, length: 845, content: 微累見誤高祖甚重之及即位命權判三司事未幾辭曰臣才輕任重懼終不濟苟以避事冒寵獲罪願陛下哀其疲駑優以散秩臣之幸也高祖可之尋命權總河陽三城事數月改授安州節度使臨民有惠御軍甚嚴一境安之先是威和指揮使王暉領部下兵屯於安陸環至鎮待之甚厚俄聞范延光叛於魏博張延賓寇於汜水暉以環高祖之元臣也幸國朝方危遂害環於理所自總州事以為延光勝則附之敗則渡江而遁斯其計也既而襄陽安從進遣行軍司馬張朏會復州兵於要路以徼之李金全承詔繼至暉遂掠城中財帛士女欲奔江南尋為其下所殺案歐陽史作王暉南走為從進兵所殺與薛史異通鑑作暉時奔吳部將胡進殺之與薛史同舊五代史考異金全至盡誅其黨高祖聞環遇害歎息久之詔贈太傅永樂大典卷九千九百十沈贇字安時徐州下邳人少有膽氣初事梁太祖為小校天祐三年補同州左崇勇馬軍指揮使入典衞兵歷龍驤拱宸都指揮使累有戰功及莊宗平梁隨段凝等降不改其職同光三年從魏王繼岌平蜀屬康延孝叛魏王署贇為一行馬步都虞候領兵從任圜襲擊延孝於漢州擒之以獻未及策勳會明宗登極天成初授檢校司空虢州刺史其後歷壁隨石衞威衍忻趙八州刺史累官至檢校太保賜輸忠宣力功臣開運元年為祁州刺史其年冬契丹入寇自恆州迴以羸兵驅牛羊過其城下贇乃出州兵以擊之契丹以精騎剗其門邀之州兵陷賊案歐陽史作贇兵多死通鑑作契丹以精騎奪其城門州兵不得還舊五代史考異趙延壽知其無備與蕃賊急攻之仍呼謂贇曰沈使君我故人也擇禍莫若輕早以城降無自辱也贇登城呼曰侍中父子誤計陷於契丹忍以羶幕之衆殘害父母之邦不自羞慚反有德色沈贇寧為國家死必不效汝所為也翌日城陷贇自剄而卒家屬為賊所擄永樂大典卷一萬八千一百三十一吳巒字寶川汶陽盧縣人也少好學以經業從鄉試下第唐長興初為沙彥珣從事累遷大同軍節度判官高祖建號契丹之援太原也彥珣據雲中二三顧望及契丹還塞彥珣出城迎謁尋為所擄時巒在城中謂其衆曰豈有禮義之人而臣於異姓乎即與雲州將吏闔門拒守契丹大怒攻之半歲不能下高祖致書於契丹乃解圍而去案遼史太宗紀云唐大同軍節度判官吳巒嬰城拒命遣崔廷勳圍其城庚申上親征至城下諭之巒降與薛史異通鑑從薛史舊五代史考異召巒歸闕授, WYG: ''}
