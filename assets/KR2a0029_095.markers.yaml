  - {type: variant, offset: 4530, length: 459, content: 年冬杜重威討鎮州與安重榮大戰於宗城以功遷洺州團練使檢校太保未幾入為奉國左廂都指揮使九年春少帝將幸澶淵福贇部下有軍士文榮等八人潛謀作亂於本營縱火福贇尋領腹心之士撲滅之福贇亦有所傷福贇性本純厚又以車駕順動祕而不奏同列李殷居福贇下無名欲危福贇以自升遂密陳其事云福贇若不為亂何得無言少帝至封丘出福贇為商州刺史尋下獄鞫之福贇終不自明以至見殺人甚寃之永樂大典卷一萬八千一百二十七郭璘邢州人也初事後唐明宗漸升為軍校天福中為奉國指揮使歷數郡刺史開運中移領易州契丹攻其郡璘率厲士衆同其甘苦敵不能克復以州兵擊賊數獲其利朝廷嘉之就加檢校太保契丹主嘗謂左右曰吾不畏一天下乃為此人抑挫重威降契丹使通事耿崇美誘其民衆璘不能制既降為崇美所害漢高祖即位詔贈太傅永樂大典卷二萬二千一百六十一史臣曰觀前代人臣之事跡多矣若乃世道方泰則席寵恃祿者實繁世運既屯則效死輸忠者無幾如皇甫遇憤激而沒王清以血戰而亡近世以來幾人而已其或臨難捐軀或守方遇害比夫惑妖豔以喪其命因醇酎以亡其身者蓋相去之遠矣唯順密遏滑臺之肇亂救晉室之臨危亦可謂之忠矣永樂大典卷二萬二千一百六十一, WYG: ''}
