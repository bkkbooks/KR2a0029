  - {type: variant, offset: 2620, length: 353, content: 襲而取之莊宗信之尋遣明宗率衆趨鄆果拔之由順密之始謀也莊宗尋以順密列於帳下累遷為軍校明宗即位歷數郡刺史順密性篤厚臨諸軍撫百姓皆有仁愛之譽及高祖車駕幸夷門范延光據鄴城叛高祖命諸將相次領軍討之順密亦預其行時騎將白奉進屯於滑州尋為滑帥符彥饒所殺軍衆大亂爭荷戈拔刃噉謼於外時馬萬為步軍都校不為遏之案通鑑云馬萬惶惑不知所為率步兵欲從亂舊五代史考異順密未明其心乃率部曲數百趨謂諸軍及萬曰滑臺去行闕二百里我等家屬在闕下爾輩如此不思血族乎奉進見殺過在彥饒擒送天子必立大功順我者賞之不順我者殺之萬曰善諸軍遂不敢動案通鑑云萬所部兵尚有呼躍者順密殺數人衆莫敢動舊五代史考異乃引軍北攻牙城執彥饒於樓上使裨將方太押送赴闕滑城遂定朝廷即以馬萬為滑州節度使時飛奏皆以萬為首故也後數日高祖知功由順密尋以順密為涇州留後至鎮未幾而卒高祖甚悼之贈, WYG: 左}
