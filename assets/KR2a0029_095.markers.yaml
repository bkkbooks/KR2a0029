  - {type: variant, offset: 185, length: 0, content: '', krp: 便殿詢謀則獨對敭于四輔自上元年後于長安東内置延英殿宰臣如有奏議聖㫖或有特宣皆于前一日上聞對御之時祗奉冕旒旁無侍衛獻可替否得曲盡于討倫捨短從長故無虞于漏洩君臣之際情理坦然伏望聖慈俯循故事或有事關軍國謀繫否臧未果决于聖懐要詢訪于臣軰則請依延英故事前一日𫝊宣或臣等有所聼聞切關利害難形文字須面敷敭臣等亦依故事前一日請開延英當君臣奏議之時秪請機要臣寮侍立左右兼乞稍霽威嚴恕臣荒拙雖乏鷹鸇之効庶盡葵藿之心詔曰卿等濟代英才}
  - {type: variant, offset: 186, length: 6, content: 河陽部內創別, WYG: 時碩徳或締搆于興王之日或經綸于纘聖之時鹽梅之任俱崇藥石之言並切請復延英之制以伸議政日規而況列聖遺芳皇朝盛事載詳徴引良切歎嘉恭惟五日起居先皇垂範俟百寮之俱退召四輔以獨昇接以温顔詢其理道計此時作事之意亦昔日延英之流朕叨獲嗣承切思遵守將成其美不爽兼行其五日起居仍令仍舊尋常公事亦可便舉奏聞或事属機宜理當秘密量事𦂳慢不限隔日及當日便可于閤門秪候且牓子奏聞請面敷敭卽當盡屏侍臣端居便殿佇聞髙議以慰虚懐朕或要見卿時亦令當時宣召但能務致理之實何必拘延英之名有事足可以討論有言足可以陳述宜以沃心為務勿以逆耳為虞勉罄謀猷以禆寡昧帝性仁恕聴納不倦嘗因朝㑹謂盧文紀等曰朕在藩時人說唐代為人主端拱而天下治蓋以外恃將校内倚謀臣故端拱而事辦朕荷先朝鴻}
  - {type: page-break, offset: 186, content: '', id: KR2a0029_WYG_095-12a, image: WYG0277/WYG0277-0416a.png}
