  - {type: variant, offset: 75, length: 1, content: 戰, WYG: 溫移鎮兖州振武軍節度使楊檀移鎮定州兼北面行營馬歩都虞候甲戌以定州節度使李周為京兆尹充西京畱守以樞密使天雄軍節度使范延光為檢校太師兼中書令充汴州節度使皇子鎮州節度使兼河南尹判六軍諸衛事左右街坊使重美加撿校太尉同平章事充天雄軍節度使餘如故辛已以右諫議大夫盧損為御史中丞以御史中丞張鵬為刑部侍郎壬午寧遠軍節度使馬存加兼侍中鎮南軍節度使馬希振加兼中書令詔順義軍節度使姚彦章加兼侍中已丑宰臣盧文紀等上皇妣魯國太夫人尊謚曰宣憲皇太后請擇日册命從之三月戊戌故太子太保趙鳯贈太傅辛丑以前汴州節度使趙延壽為許州節度使兼樞密使以夏州行軍司馬李彞殷為本州節度使兄彞超卒故也癸卯以静海軍節度使檢校太師兼中書令安南都䕶錢元銶為畱守太保餘如故丙午以給事中趙光輔為右散騎常侍戊申皇妹魏國夫人石氏封晉國長公主齊國公主趙氏封燕國長公主已酉}
