  - {type: variant, offset: 69, length: 5, content: 隸於麾下累, WYG: 有相士言帝如毗沙天王帝知之竊喜及卽位選軍士之魁偉者被以天王甲俾居宿衛因詔諸道造此甲而進之三司奏添徴蠶鹽錢及増麴價先是麴斤八十文增至一百五十文乙丑雲州節度使張溫移鎮晉州以西京畱守安重霸為雲州節度使二月庚午定州節度使王}
