  - {type: variant, offset: 166, length: 1, content: 移, WYG: 斬暉等以止之契丹國志契丹屢攻北邉時石敬瑭将大兵屯忻州潞王遣使賜軍士夏衣𫝊詔撫諭軍士呼萬嵗者數四敬瑭懼幕僚段希堯請誅其倡者敬瑭命劉知遠斬三十六人以殉潞王聞益疑之御史中丞盧損奏準天成二年七月勑毎月首十五日入閤罷五日起居臣以為中旬排仗有勞聖躬請只以月首入閤五日起居依舊又準天成三年五月長興二年七月勑許諸州節度使帯使相嵗薦寮属五人餘薦三人防禦團練使薦二人今乞行釐革又長興二年八月勑州縣佐官差充馬歩判官仍同一任乞行止絶依舊衙前選補詔曰今後藩臣帯使相許薦三人餘薦二人直属京防禦團練使薦一人餘並從之丁酉廻紇可汗仁美遣使貢方物西京弓弩指揮使任漢權奏六月二十一日與川軍戰于金州之漢陰王師不利其部下兵士除傷痍外已至鳳翔先是􅉦厔}
