  - {type: variant, offset: 103, length: 265, content: 一目開平二年自開封府押衙右親從指揮使檢校司空授右龍驤軍使三年自右監門衞將軍授左天武軍使遷右監門上將軍乾化三年與袁象先同誅朱友珪梁末帝授洺州刺史轉河陽留後乾化末邠州留後李保衡背李茂貞以城歸梁梁以彥威為邠州節度使其年五月茂貞遣將劉知俊率大軍攻之彥威固守踰年竟不能下或得其俘悉令放之秦人懷其惠遂無侵擾轉滑州節度使移鎮鄆州兼北面行營招討總大軍於河上師徒屢敗降授陝州留後莊宗入汴彥威自陝馳至請罪詔釋之一日莊宗於崇元殿宴諸將彥威與段凝袁象先等預會酒酣莊宗舉酒屬明宗曰此席宴客皆吾前歲之勁敵也一旦與吾同宴蓋卿前鋒之効也彥威等伏陛謝罪莊宗曰與卿話, WYG: ''}
