  - {type: variant, offset: 3233, length: 1062, content: 孔勍字鼎文兗州人後徙家宿州少便騎射為軍中小校事梁祖漸至郡守累遷齊州防禦使唐鄧節度使梁貞明中王球據襄州叛勍討平之因授山南東道節度使莊宗至洛陽勍自鎮來朝復令歸鎮尋移昭義節度使同光季年監軍楊繼源與都將謀據潞州事泄勍誅之明宗即位之歲詔還京師授河陽節度使未幾以太子太師致仕卒年七十九贈太尉永樂大典卷一萬八千一百二十九劉汴州雍邱人也世為宣武軍牙校少負壯節梁祖鎮汴州求自試補隊長從梁祖征伐所至有功遷為牙將歷滑徐襄三州都指揮使開平中襄帥王班為帳下所害王班原本作王斌今從冊府元龜改正影庫本粘籤亂軍推為留後詭從之翌日受賀衙庭享士伏甲幕下盡斬其亂將案通鑑考異引梁祖實錄八月丁酉賜劉王延順物以其違亂將之命來歸編遺錄斬李洪勅云始扶劉既奔竄以歸朝若使翌日便斬亂將則襄州何以至九月始收復蓋脫身歸朝及梁亡入唐妄云斬亂以自誇大耳舊五代史考異以功歷復亳二州刺史徵為侍衞都將出為安州刺史貞明中為晉州留後莊宗至汴來朝在晉州八年日與上黨太原之師交鬬於境上莊宗見而勞之曰劉侯無恙控我晉陽之南鄙歲時久矣不早相見頓首謝罪復命歸鎮正授節旄移鎮安州明宗即位遷鄧州節度使天成末以史敬鎔代之還京師卒贈侍中有子師道仕皇朝為右贊善大夫卒永樂大典卷九千九十八周知裕字好問幽州人也少事燕帥劉仁恭為騎將表為媯州刺史久之移刺德州天祐四年劉守光既平滄州乃以其幼子繼威為留後大將張萬進與知裕佐之繼威沖幼宣淫於萬進之家萬進殺之詰旦召知裕告其故萬進自稱留後署知裕為景州刺史會萬進納款於梁知裕先奔於汴梁主厚待之特置歸化軍歸化原本作歸比今從通鑑改正影庫本粘籤以知裕為指揮使凡軍士自河朔歸梁者皆隸於部下梁與莊宗交戰於河摧堅挫銳惟恃歸化一軍然歲將一紀位不及郡守同光初莊宗入汴知裕隨段凝軍解甲封丘明宗時為總管受降於郊外見知裕甚喜遙相謂曰周歸化今為吾人何樂如之因令諸子以兄事之莊宗撫憐尤異而諸校心妬之有壯士唐從益者因獵射之知裕遁而獲免莊宗遂誅從益出知裕為房州刺史魏王繼岌伐蜀召為前鋒騎將明宗即位移刺絳州改淄州刺史宿州團練使知裕老於軍旅勤於稼穡凡為郡勸課皆有政聲朝廷喜之遷安州留後淮上之風惡病者至於父母有疾不親省視甚者避於他室或時問訊即以食物揭於長竿之首委之而去知裕心惡之召鄉之頑狠者訶詰教導俾知父子骨肉之恩繇是弊風稍革長興末入為右神武統軍清泰初卒於官案歐陽史作應順中卒舊五代史考異贈太傅永樂大典卷八千九百九十九史臣曰夫才之良者在秦亦良也在虞亦良也故彥威而下昔為梁臣不虧亮節洎歸唐祚亦無醜聲蓋松貞不變於四時玉粹寧虞其烈燄故也况彥威之輔明宗也有翊戴之績晏球之伐中山也著戡定之功方之數公尤為優矣永樂大典卷八千九百九十七, WYG: 攷證}
