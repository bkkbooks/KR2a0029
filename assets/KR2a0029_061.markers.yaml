  - {type: variant, offset: 3313, length: 3, content: 於臨洺, WYG: 康延孝為鄭州防禦使檢校太保賜姓名繼琛以宋州節度使檢校太尉平章事袁象先依前為宋州節度使仍賜姓名紹安以許州匡國軍節度使檢校太尉同平章事温韜依前許州節度使仍賜姓名紹沖丁未日南至帝不受朝賀戊申中書門下上言以朝廷兵革雖寧支費猶闕應諸寺監各請置卿少卿監祭酒司業各一員博士兩員餘官並停唯太常寺事闗大禮大理寺事闗刑法除太常博士外許更置丞一員其王府及東宫官司天五官正奉御之屬凡闗不急司存並請未議除授其諸司郎中員外應有雙曹者且置一員左右常侍諫議大夫給事中起居郎起居舍人補闕拾遺各置一半三院御史仍委御史中丞條理申奏其停罷朝官仍各録名銜具罷任時日留在中書候見任官滿二十五箇月並據資品却與除官其}
