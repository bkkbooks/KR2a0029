  - {type: 'tls:seg', offset: 3541, content: '', id: KR2a0029_ZHSJ_061-d61p21s8}
  - {type: variant, offset: 3541, length: 241, content: 以勇力聞年二十南渡河遊梁不見用復歸莊宗以為孝義軍指揮使累從征伐有功同光中為曹州刺史以州兵屯汴州明宗自魏反兵南渡河而莊宗東幸汴州汴州節度使孔循懷二志使北門迎明宗西門迎莊宗所以供帳委積如一曰先至者入之鄴因責循曰主上破梁而得公有不殺之恩奈何欲納總管而負國循不答鄴度循不可爭而石敬瑭妻明宗女也時方在汴鄴欲殺之以堅人心循知其謀取之藏其家鄴無如之何而明宗已及汴乃將麾下兵五百騎西迎莊宗見於汜水嗚咽泣下莊宗亦為之噓唏乃使以兵為先鋒莊宗至汴西不得入還洛陽遇弒明宗入洛鄴請死於馬前明宗嘉歎久之明年荊南, WYG: 書令渤海王}
