  - {type: variant, offset: 10, length: 1, content: 三, krp: 郭崇韜權行中書事已丑御崇元殿制曰仗順討逆少康所以誅有窮纘業承基光武所以滅新莽咸以中興景命再造王猷經綸于草昧之中式遏于亂畧之際朕以欽承大寳顯荷鴻休雖繼前修固慚凉德誓平元惡期復本朝屬四海之阽危允萬邦之推戴近者親提組練徑掃氛祅振已墜之皇綱殄偷安之冦孽國讎方雪帝道爰開拯編甿覆溺之艱救率土倒懸之苦粤自朱温搆逆友貞嗣凶簒殺二君隳殘九廟虺毒久傷于宇宙狼貪肆噬于華夷剥喪元良凌辱神主帝里動黍離之嘆朝廷多棟橈之危棄徳崇奸窮兵黷武戰士疲勞于力役烝民耗竭其膏腴言念于斯軫傷彌切今則已梟逆豎大豁羣情覩厯數之有歸實神靈之匪昩得不臨深表誡馭朽為懐將𢎞濟于艱難宜特行于赦宥應偽命流貶責授官等已經量移者竝可復資徒流人放歸鄉里京畿及諸道見禁囚徒大辟罪降從流流己下咸赦除之其鄭珏等一}
