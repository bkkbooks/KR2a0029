  - {type: variant, offset: 3894, length: 170, content: 不載取歸州之事疑歐陽史有誤蓋薛史世久失傳十國春秋所引悉本通鑑考異殊不知歐陽史西方鄴傳本于薛史有可徵信也舊五代史考異數敗季興之兵鄴武人所為多不中法度判官譚善達數以諫鄴鄴怒遣人告善達受人金下獄善達素剛辭益不遜遂死于獄中鄴病見善達為祟卒于鎮永樂大典卷一萬八千一百二十九張遵誨魏州人也父為宗城令羅紹威殺牙軍之歲為梁軍所害遵誨奔太原武皇以為牙門將莊宗, WYG: 真}
