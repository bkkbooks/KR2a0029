  - {type: variant, offset: 1295, length: 1604, content: 親將蜀後主王衍幼年襲位其政多僻宦官王承休居中用事與成都尹韓昭內外相結專採擇聲色以固寵幸武臣宿將居常切齒重霸諂事承休特見委信案北夢瑣言重霸為簡州刺史貨無厭舊五代史考異梁末岐下削弱蜀人獨取秦成階等州重霸說承休求鎮秦州仍於軍中選山東驍果得數千人號龍武都以承休為軍帥重霸副焉俱在天水歲餘承休欲求旄鉞乃以隴西花木入獻又稱秦州山水之美人物之盛請後主臨幸而韓昭贊成之案太平廣記引王氏見聞錄云承休請從諸軍揀選官健得驍勇數千號龍武軍承休自為統帥並特加衣糧日有優給因乞秦州節度使且云願與陛下于秦州採掇美麗且說秦州風土多出國色仍請幸天水少主甚悅即遣仗節赴鎮應所選龍武精銳並充衙隊從行舊五代史考異同光二年十月蜀主率衆數萬由劍閣將出興鳳以遊秦州至興州遇魏王繼岌軍至狼狽而旋案九國志作王衍將之秦州以王宗弼力諫而止與薛史異承休遽聞東師入討大恐計無從出問於重霸對曰開府何患蜀中精兵不下十萬咫尺之險安有不濟縱東軍盡如狼虎豈能入劍門然國家有患開府特受主知不得失於奔赴此州制置事定無虞得失重霸願從開府赴闕承休素信以為忠赤重霸出秦州金帛以賂羣羌買由文山路歸蜀案九國志作取路以歸蜀文義較為明晰承休擁龍武軍及招置僅萬人從行令重霸權握部署州人祖送秦州軍亦列部隊承休登乘重霸馬前辭曰國家費盡事力收獲隴西若從開府南行隴州即時疏失請開府自行重霸且為國守藩承休既去重霸在秦州聞明宗起河北即時遣使以秦成等州來降天成初用為閬州團練使未幾召還為左衞大將軍常以姦佞揣人主意明宗尤愛之長興末明宗謂侍臣曰安重霸朕之故人以秦州歸國其功不細酬以團練防禦恐非懷來之道范延光曰將校內有自河東河北從陛下龍飛故人尚有未及團防者今若遽授重霸方鎮恐為人竊議明宗不悅未幾竟以同州鉞授之清泰初移授西京留守京兆尹先是秦雍之間令長設酒食私丐於部民者俗謂之擣蒜及重霸之鎮長安亦為之故秦人目重霸為擣蒜老其年冬改雲州節度居無何以病求代時家寄上黨及歸而卒重霸善悅人好賂遺時人目之為俊弟重進重進原本作道進今從冊府元龜改正影庫本粘籤案玉堂閒話作季弟道進舊五代史考異尤兇惡事莊宗以試劍殺人奔淮南案玉堂閒話云安重進性兇險莊宗潛龍時為小校常佩劍列于翊衞後攜劍南馳投于梁祖梁祖壯之俾隸淮之鎮戍復以射殺掌庾吏逃竄江湖淮帥得之擢為裨將舊五代史考異重霸在蜀聞之蜀主取之於吳用為裨將隨重霸為龍武小將戍長道又殺人奔歸洛陽案玉堂閒話云蜀破道進東歸明宗補為諸州馬步軍都指揮使後有過鞭背卒舊五代史考異重霸之子曰懷浦晉天福中為禁軍指揮使契丹寇澶州以臨陣忸怩為景延廣所誅永樂大典卷一萬八千一百二十九劉訓字遵範隰州永和人也出身行間初事武皇為馬軍隊長漸至散將屬河中王氏昆仲有尋戈之役訓從史儼攻陝州武皇討王行瑜以訓為前鋒後隸河中為隰州防禦都將居無何殺陝州刺史以郡歸莊宗歷瀛州刺史同光初拜左監衞大將軍三年授襄州節度使四年四月洛陽有變訓以私忿害節度副使胡裝族其家聞者寃之天成中荊南高季興叛詔訓為南面行營招討使知荊南行府事是時湖南馬殷請以舟師會及王師至荊渚殷軍方到岳州案通鑑劉訓至荊南楚王殷遣都指揮使許德勳等將水軍屯岳州高季興堅壁不戰求救于吳吳人遣水軍援之舊五代史考異仍傳意於訓許助軍儲弓甲之類久之略無至者荊渚地氣卑濕漸及霖潦糧運不繼人多疾疫訓本無將略人咸苦之及孔循至得襄之小校獻竹龍之術獻竹龍之術原本脫獻字今據府元龜增入影庫本粘籤及造竹龍二道傅於城下竟無所濟遂罷兵令將士散略居民而迴詔訓赴闕尋責授檀州刺史續勅濮州安置未幾起為龍武大將軍尋授建雄軍節度使移鎮延平卒贈太尉永樂大典卷九千九十八張敬詢勝州金河縣人世為振武軍牙校祖仲阮歷勝州刺史父漢環事武皇為牙將敬詢當武皇時專掌甲坊十五年以稱職聞復以女為武皇子存霸妻益見親信莊宗即位以為沁州刺史秩滿復用為甲坊使莊宗經略山東敬詢從軍歷博澤慈隰四州刺史同光末授耀州團練使郭崇韜之征蜀也以敬詢善督租賦乃表為利州留後明宗即位正授昭武軍節度使天成二年詔還京師復授大同節度使至鎮招撫室韋萬餘帳四年徵為左驍衞上將軍明年授滑, WYG: 徐}
