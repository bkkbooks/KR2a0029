  - {type: variant, offset: 641, length: 234, content: 武皇從平巢蔡光啟中吐渾赫連鐸寇雲中武皇使元信拒之元信兵敗於居庸關武皇性嚴急元信不敢還遂奔定州王處存待之甚厚用為突騎都校乾寧中處存子郜嗣位時梁軍攻河朔三鎮奔命不暇梁將張存敬軍奄至城下既無宿備郜懼挈其族奔太原元信從之武皇待之如初用為鐵林軍使梁將氏叔琮之攻河東也別將葛從周自馬嶺入元信伏于榆次挫其前鋒梁將李思安之攻上黨也王師將壁高河為梁軍所逼別將秦武者尤為難敵元信與鬬斃之繇是梁軍解去城壘得立武皇賜所乘馬及細鎧仗遷突陣都將莊宗嗣晉王位元信從救上黨破夾寨復澤潞以功授檢校司空遼, WYG: 汾}
