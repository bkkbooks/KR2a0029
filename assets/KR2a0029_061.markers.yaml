  - {type: variant, offset: 4213, length: 5, content: 鬱鬱不樂離, WYG: 董璋上言潞州軍變李繼逹領兵出城自刎而死節度副使李繼珂已安撫軍城已丑有司上言上辛祈糓于上帝請奉高祖神堯皇帝配孟夏雩祀請奉太宗文皇帝配季秋大享于明堂請奉太祖武皇帝配冬至日祀圜丘請奉獻祖文皇帝配孟冬祭神州地祇請奉懿祖昭聖皇帝配従之辛夘亳州太清宫道士上言聖祖𤣥元皇帝殿前枯檜再生一枝畫圖以進詔曰當聖祖舊殿生枯檜新枝應皇家再造之期顯大國中興之運同上林仆栁祥既叶于漢宣比南頓嘉禾瑞更超于光武宜標史冊以示寰瀛云五代會要唐高祖神堯皇帝武徳二年枯檜重華至安禄山僭號萎瘁𤣥宗自蜀歸}
