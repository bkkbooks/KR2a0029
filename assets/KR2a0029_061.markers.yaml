  - {type: variant, offset: 8, length: 0, content: '', WYG: 人皆本朝簪組儒苑品流雖博識多聞備明今古而修身慎行頗負祖先昩忠貞而不度安危專利禄而全虧名節合當大辟無恕近親朕以纘嗣丕基初平巨憝方務好生之道在行含垢之恩湯網垂仁既務全族舜刑投裔兼貸一身爾宜自新我全大體其為顯列不竝庶寮餘外應在周行悉仍舊貫凡居中外咸體朕懐乃貶梁宰相鄭珏為萊州司户蕭頃為登州司户翰林學士劉岳為均州司馬任贊房州司馬姚顗復州司馬封翹}
  - {type: page-break, offset: 8, content: '', id: KR2a0029_WYG_061-3b, image: WYG0277/WYG0277-0269b.png}
  - {type: variant, offset: 8, length: 0, content: '', krp: 人皆本朝簪組儒苑品流雖博識多聞備明今古而修身慎行頗負祖先昩忠貞而不度安危專利禄而全虧名節合當大辟無恕近親朕以纘嗣丕基初平巨憝方務好生之道在行含垢之恩湯網垂仁既務全族舜刑投裔兼貸一身爾宜自新我全大體其為顯列不竝庶寮餘外應在周行悉仍舊貫凡居中外咸體朕懐乃貶梁宰相鄭珏為萊州司户蕭頃為登州司户翰林學士劉岳為均州司馬任贊房州司馬姚顗復州司馬封翹}
  - {type: variant, offset: 9, length: 0, content: '', WYG: 州司馬李懌懐州司馬竇夢徴沂州司馬崇政院學士劉光素密州司户陸崇安州司户御史中丞王權隨州司户竝員外置同正員是日以梁將段凝上疏奏梁朝權臣趙巖等竝助成虐政結怨于人聖政惟新宜誅首惡乃下詔曰朕既殄偽庭顯平國患好生之令含𢎞雖切于予懐懲惡之規决斷難違于衆請況趙巖趙鵠等自朕収城數日布惠四方尚匿迹以潛形罔悛心而革面須行赤族以謝衆心其張漢傑昨于中都與王彦章同時俘獲此際未詳行止偶示哀矜今既上將陳詞羣情激怒徃日既彰于僭濫此時難漏于網羅宜寘國刑以塞羣論除妻兒骨肉外其他疎屬僕使竝從釋放敬翔李振首佐朱温共傾唐祚屠害宗屬殺戮朝臣既寰宇以皆知在人神而共怒敬翔雖聞自盡未豁幽寃宜與李振竝族于市疎屬僕使竝從原宥朱珪素聞狡蠧唯矜讒邪鬬惑人情枉害良善將清内外須切去除況衆狀指陳亦宜誅戮契丹實喇鄂博既棄其母又背其兄朕比重懐來厚加恩渥看同骨肉錫以姓名兼分符竹之榮疊被頒宣之渥而乃輒辜重惠復背明廷罔顧欺違竄歸偽室既同梟獍難貸刑章可并妻子同戮于市其朱氏近親趙鵠正身趙巖家属仰嚴加擒捕其餘文武職員將校一切不問是日趙巖張希逸張漢傑張漢倫張漢融朱珪敬翔李振及契丹實喇卾博等并其妻孥皆斬於汴橋下又詔除毁朱氏宗廟神王偽梁二主竝降為庶人天下官名府號及寺觀門額曽經改易者竝復舊名時帝欲發梁祖之墓斵棺燔柩河南尹張全義上章申理帝乃止令剗去闕室而已丁亥梁百官以誅凶族于崇元殿立班待罪詔各復其位洛陽縉紳舊聞記載張全義表云伏念臣誤棲惡木曽飲盗泉實有瑕疪未䝉昭雪因下詔雪之以樞宻使檢校太保守兵部尚}
