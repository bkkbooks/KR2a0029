  - {type: variant, offset: 4, length: 1, content: 卷, WYG: 巻三十宋門下侍郎參知政事監修國史薛居正等撰唐書第}
  - {type: variant, offset: 4, length: 1, content: 卷, krp: 巻三十宋門下侍郎參知政事監修國史薛居正等撰唐書第}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 莊宗紀四同光元年冬十月辛未朔日有蝕之是日皇后劉氏皇子繼岌歸鄴宫帝送于離亭歔欷而别詔宣徽使李紹宏宰相豆盧革租庸使張憲興唐尹王正言同守鄴城壬申帝御大軍自楊劉濟河癸酉至鄆州是夜三鼓渡汶時王彦章守中都甲戌帝攻之中都素無城守師既雲合梁衆自潰是日擒梁將王彦章及都監張漢傑趙廷隠劉嗣彬李知節康文通王山興等將吏二百餘人斬馘二萬奪馬千匹時既獲中都之㨗帝召諸將謀其所向或言且徇兖州徐圖進取唯李嗣源曰宜急趨汴州段凝方領大軍駐于河上假如便來赴援直路又阻决河須自滑州濟渡十萬之衆舟檝焉能卒辦此去汴城咫尺若晝夜兼程信宿即至段凝未起河壖夷門已為我有矣臣請以千騎前驅陛下御軍徐進鮮不克矣帝嘉之是夜嗣源率前軍先進翼日車駕即路丁丑次曹州郡將出降己卯遲明前軍至汴城嗣源令左右捉生攻封丘門梁開封尹王瓚請以城降俄而帝與大軍繼至王瓚迎帝自大梁門入梁朝文武官屬于馬前謁見陳叙世代唐臣陷在偽廷今日再睹中興雖死無恨帝諭之曰朕二十年血戰蓋為卿等家門無足憂矣各復乃位時梁末帝朱鍠己為其將皇甫麟所殺獲其首函之以獻是日賜樂工周匝幣帛周匝者帝之寵伶也胡栁之役陷于梁帝每思之至是謁見欣然慰接周匝因言梁教坊使陳俊保庇之恩垂泣推薦請除郡守帝亦許之庚辰帝御𤣥徳殿梁百官于朝堂待罪詔釋之壬午段凝所部馬歩軍五萬解甲于封丘凝等率大將先至請死詔各賜錦袍御馬金幣帝幸北郊撫勞降軍各令還本營丙戌詔曰懲惡勸善務振紀綱激濁揚清須明真偽蓋前王之令典為厯代之通規必按舊章以令多士而有志朋僭竊位沗崇高累世官而皆受唐恩貪爵禄而但從偽命或居台鉉或處權衡或列近職而預機謀或當峻秩而掌刑憲事分逆順理合去留偽宰相鄭珏等一}
