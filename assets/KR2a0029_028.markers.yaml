  - {type: variant, offset: 148, length: 333, content: 厚為招討使河陽李周彝為副青州賀德倫為應接使鄆州袁象先為副甲子梁祖自洛陽趨魏州遣楊師厚李周彝攻鎮州之棗強命賀德倫攻蓨縣三月壬午梁祖自督軍攻棗強甲申城陷屠之案通鑑作丙戌舊五代史考異時李存審與史建瑭以三千騎屯趙州相與謀曰梁軍若不攻蓨城必西攻深冀吾王方北伐以南鄙之事付我輩豈可坐觀其弊乃以八百騎趨冀州扼下博橋令史建瑭李都督分道擒生翌日諸軍皆至獲芻牧者數百人盡殺之縱數人逸去且告晉王至矣建瑭與李都督各領百餘騎旗幟軍號類梁軍與芻牧者雜行暮及賀德倫營門殺守門者縱火大呼俘斬而旋又執芻牧者斷其手令迴梁軍乃夜遁蓨人持鉏耰白挺追擊之悉獲其輜重案通鑑後梁紀云帝燒營夜遁迷失道委曲行百五十里戊子旦乃至冀州蓨之耕者皆荷鉏奮挺逐之委棄軍資器械不可勝計舊五代史考異梁祖聞之大駭自棗強馳歸貝州殺其將, WYG: 範}
