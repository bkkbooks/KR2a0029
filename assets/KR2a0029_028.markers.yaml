  - {type: variant, offset: 4929, length: 368, content: 遼史太祖紀四月圍幽州不克六月乙巳望城中有氣如烟火狀上曰未可攻也以大暑霖潦班師留盧國用守之是契丹主已於六月退師矣薛史及通鑑皆不載秋七月辛未帝遣李存審領軍與嗣源會於易州步騎凡七萬於是三將同謀銜枚束甲尋澗谷而行直抵幽州八月甲午自易州北循山而行李嗣源率三千騎為前鋒庚子循大房嶺而東距幽州六十里契丹萬騎遽至存審嗣源極力以拒之契丹大敗委棄毳幕廬弓矢羊馬不可勝紀進軍追討俘斬萬計辛丑大軍入幽州德威見諸將握手流涕翌日獻捷於鄴九月班師帝授存審檢校太傅嗣源檢校太保閻寶加同平章事十月帝自魏州還晉陽十一月復至魏州十二月帝觀兵於河上時梁人據楊劉城列柵相望帝率軍履河冰而渡盡平諸柵進攻楊劉城城中守兵三千人帝率騎軍環城馳射又令步兵持斧斬其鹿角負葭葦以堙塹帝自負一圍而進諸軍鼓譟而登遂拔其壘獲守將安彥之是夕帝宿楊劉天祐十五年春正月帝軍徇地至鄆濮時梁主在洛將修郊禮郊禮, WYG: ''}
