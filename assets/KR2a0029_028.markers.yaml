  - {type: variant, offset: 2428, length: 416, content: 亂軍之首迫德倫上章請却復六州之地梁主不從遂迫德倫歸於帝且乞師為援帝命馬步副總管李存審自趙州帥師屯臨清帝自晉陽東下與存審會案通鑑晉王引大軍自黃澤嶺東下與存審會于臨清猶疑魏人之詐按兵不進舊五代史考異賀德倫遣從事司空頲至軍密啟張彥狂勃之狀且曰若不翦此亂階恐貽後悔帝默然遂進軍永濟張彥謁見以銀槍効節五百人從皆被甲持兵以自衞帝登樓諭之曰汝等在城濫殺平人奪其妻女數日以來迎訴者甚衆當斬汝等以謝鄴人遽令斬彥及同惡者七人軍士股慄帝親加慰撫而退翌日帝輕裘緩策而進令張彥部下軍士被甲持兵環馬而從命為帳前銀槍衆心大服梁將劉鄩聞帝至以精兵萬人自洹水趣魏縣洹水原作桓水今據通鑑改正影庫本粘籤帝命李存審帥師禦之帝率親軍於魏縣西北夾河為柵六月庚寅朔帝入魏州賀德倫上符印請帝兼領魏州帝從之墨制授德倫大同軍節度令取便路赴任帝下令撫諭鄴人軍城畏肅民心大服是時以貝州張源德據壘拒命南通劉鄩又與滄州首尾相應聞德州無備遣別將襲之遂拔其城命遼州將馬通為德州刺史以扼滄貝之路滄貝, WYG: 左開道指揮使開道}
