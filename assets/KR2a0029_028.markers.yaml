  - {type: variant, offset: 3182, length: 1647, content: 兼行皆腹疾足腫加以山路險阻崖谷泥滑緣蘿引葛方得少進顛墜巖坂陷於泥淖而死者十二三前軍至樂平糗糒將竭聞帝軍追躡於後太原之衆在前羣情大駭鄩收合其衆還自邢州陳宋口渡漳水而東駐於宗城時魏之軍儲已乏軍儲原本作申諸今據文改正影庫本粘籤臨清積粟所在鄩欲引軍據之周德威初聞鄩軍之西自幽州率千騎至土門及鄩軍東下急趨南宮知鄩軍在宗城遣十餘騎迫其營擒斥候者斷其腕令還德威至臨清鄩起軍駐貝州帝率親騎次博州鄩軍於堂邑周德威自臨清率五百騎躡之是日鄩軍於莘縣帝營於莘西一舍城壘相望日夕交鬬八月梁將賀瓌襲取澶州帝遣李存審率兵五千攻貝州因塹而圍之冬十月有軍士自鄩軍來奔帝善待之乃劉鄩密令齎酖賂帝膳夫欲置毒於食中會有告者索其黨誅之天祐十三年春二月帝知劉鄩將謀速戰乃聲言歸晉陽以誘之實勞軍於貝州也令李存審守其營鄩謂帝已臨晉陽將乘虛襲鄴三月鄩遣其將楊延直自澶州率兵萬人楊延直原本作延值今據通鑑及歐陽史改正影庫本粘籤會於城下夜半至於南門之外城中潛出壯士五百人突入延直之軍譟聲動地梁軍自亂遲明鄩自莘引軍至城東與延直兵會鄩之來也李存審率兵踵其後李嗣源自魏城出戰俄而帝自貝州至鄩卒見帝驚曰晉王耶因引軍漸却至故元城西李存審大軍已成列矣軍前後為方陣梁軍於其間為圓陣四面受敵兩軍初合梁軍稍衄再合鄩引騎軍突西南而走帝以騎軍追擊之梁步軍合戰短兵既接帝軍鼓譟圍之數重埃塵漲天李嗣源以千騎突入其間衆皆披靡相躪如積帝軍四面斬擊棄甲之聲聞數十里衆既奔潰帝之騎軍追及于河上十百為羣赴水而死梁步兵七萬殲亡殆盡劉鄩自黎陽濟奔滑州是月梁主遣別將王檀率兵五萬自陰地關趨晉陽急攻其城昭義李嗣昭遣將石嘉才案梁紀作家才唐列傳作家財舊五代史考異率騎三百赴援時安金全張承業堅守於內嘉才救援於外檀懼乃燒營而遁追擊至陰地關時劉鄩敗於莘縣王檀遁於晉陽梁主聞之曰吾事去矣三月乙卯朔分兵以攻衞州壬戌刺史米昭以城降夏四月攻洺州下之五月帝還晉陽六月命偏師攻閻寶於邢州梁主遣捉生都將張溫率步騎五百為援至內黃溫率衆來奔秋七月甲寅朔帝自晉陽至魏州八月大閱師徒進攻邢州相州節度使張筠棄城遁去以袁建豐為相州刺史依舊隸魏州案通鑑作四月晉人拔洺州以魏州都巡檢使袁建豐為洺州刺史八月晉人復以相州隸天雄軍以李嗣源為刺史與薛史異舊五代史考異邢州節度使閻寶請以城降以忻州刺史蕃漢副總管李存審為邢州節度使以閻寶為西南面招討使遙領天平軍節度使是月契丹入蔚州案歐陽史及通鑑俱從薛史作蔚州遼史太祖紀神冊元年八月拔朔州擒節度使李嗣本與薛史異振武節度使李嗣本陷於契丹九月帝還晉陽梁滄州節度使戴思遠棄城遁去舊將毛璋入據其城毛璋原本作毛章今據列傳改正影庫本粘籤李嗣源帥師招撫璋以城降乃以李存審為滄州節度使以李嗣源為邢州節度使時契丹犯塞帝領親軍北征至代州北聞蔚州陷乃班師案遼史太祖紀十一月攻蔚新武媯儒五州自代北至河曲踰陰山盡有其地其圍蔚州敵樓無故自壞衆軍大譟乘之不踰時而破蓋由朔州進破蔚州也通鑑作晉王自將兵救雲州契丹聞之引去與遼史異是月貝州平以滄州降將毛璋為貝州刺史自是河朔悉為帝所有帝自晉陽復至於魏州魏州原本作媿州今據通鑑改正影庫本粘籤天祐十四年二月帝聞劉鄩復收殘兵保守黎陽遂率師以攻之不克而還是月甲午新州將盧文進殺節度使李存矩叛入契丹遂引契丹之衆寇新州存矩帝之諸弟也治民失政御下無恩故及於禍帝以契丹王阿保機與武皇屢盟於雲中約為兄弟急難相救至是容納叛將違盟犯塞乃馳書以讓之契丹攻新州甚急刺史安金全棄城而遁契丹以文進部將劉殷為刺史帝命周德威率兵三萬攻之營於城東俄而文進引契丹大至德威拔營而歸因為契丹追躡師徒多喪契丹乘勝寇幽州是時言契丹者或云五十萬或云百萬漁陽以北山谷之間車毳幕羊馬彌漫盧文進招誘幽州亡命之人教契丹為攻城之具飛梯衝車之類畢陳於城下鑿地道起土山四面攻城半月之間機變百端城中隨機以應之僅得保全軍民困弊上下恐懼德威間道馳使以聞帝憂形於色召諸將會議時李存審請急救燕薊且曰我若猶豫未行但恐城中生事李嗣源曰願假臣突騎五千以破契丹閻寶曰但當蒐選銳兵控制山險強弓勁弩設伏待之帝曰吾有三將無復憂矣夏四月命李嗣源率師赴援次於淶水淶水原本作涑水, WYG: ''}
