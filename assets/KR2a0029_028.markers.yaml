  - {type: variant, offset: 482, length: 1854, content: 正言許從實朱彥柔以其亡師於蓨故也梁祖先抱痼疾因是愈甚辛丑滄州都將張萬進殺留後劉繼威自為滄帥遣人送款于梁亦乞降于帝戊申周德威遣李存暉攻瓦橋關下之四月丁巳梁祖自魏南歸疾篤故也戊申李嗣源攻瀛州拔之五月乙卯朔周德威大破燕軍於羊頭岡案通鑑作龍頭岡考異引莊宗實錄作羊頭岡舊五代史考異擒大將單廷珪斬首五千餘級德威自涿州進軍于幽州營于城下閏月己酉攻其西門燕人出戰敗之六月戊寅梁祖為其子友珪所弒友珪僭即帝位于洛陽秋八月朱友珪遣其將韓勍康懷英牛存節率兵五萬急攻河中朱友謙遣使來求援帝命李存審率師救之十月癸未帝自澤州路赴河中遇梁將康懷英於平陽破之斬首千餘級追至白徑嶺白徑嶺原本作百徑據胡三省通鑑注云白徑嶺在河中安邑縣東今改正影庫本粘籤朱友謙會帝於猗氏梁軍解圍而去庚申周德威報劉守光三遣使乞和不報丁卯燕將趙行實來奔天祐十年春正月丁巳周德威攻下順州獲刺史王在思二月甲戌朔攻下安遠軍獲燕將一十八人庚寅梁朱友珪為其將袁象先所殺均王友貞即位於汴州丙申周德威報檀州刺史陳確以城降三月甲辰朔收盧臺軍乙丑收古北口時居庸關使胡令珪等與諸戍將相繼挈族來奔丙寅武州刺史高行珪遣使乞降時劉守光遣愛將元行欽牧馬於山北聞行珪有變率戍兵攻行珪行珪遣其弟行溫為質且乞應援周德威遣李嗣源李嗣本安金全率兵救武州降元行欽以歸四月甲申燕將李暉等二十餘人舉族來奔德威攻幽州南門壬辰劉守光遣使王遵化致書哀祈於德威德威戲遵化曰大燕皇帝尚未郊天何怯劣如是耶怯劣原本作惟劣今據文改正影庫本粘籤守光再遣哀祈德威乃以狀聞己亥劉光濬攻下平州獲刺史張在吉五月壬寅朔光濬進迫營州刺史楊靖以城降乙巳梁將楊師厚會劉守奇率大軍侵鎮州時帝之先鋒將史建瑭自趙州率五百騎入真定師厚大掠鎮冀之屬邑王鎔告急於周德威德威分兵赴援師厚移軍寇滄州張萬進懼遂降于梁遂降於梁原本作遂師今據文改正影庫本粘籤六月壬申朔帝遣監軍張承業至幽州與周德威會議軍事秋七月承業與德威率千騎至幽州西守光遣人持信箭一隻乞修和好承業曰燕帥當令子弟一人為質則可是日燕將司全爽等十一人並舉族來奔辛亥德威進攻諸城門壬子賊將楊師貴等五十人來降甲子五院軍使李信攻下莫州時守光繼遣人乞降將緩帝軍陰令其將孟脩阮通謀於滄州節度使劉守奇及求援於楊師厚帝之游騎擒其使以獻是月帝會王鎔於天長九月劉守光率衆夜出遂陷順州冬十月己巳朔守光帥七百騎步軍五千夜入檀州庚午周德威自涿州將兵躡之壬申守光自檀州南山而遁德威追及大敗之獲大將李劉張景紹及將吏八百五十人馬一百五十匹守光得百餘騎遁入山谷德威急馳扼其城門守光惟與親將李小喜等七騎奔入燕城己丑守光遣牙將劉化脩周遵業等以書幣哀祈德威庚寅守光乘城以病告復令人獻自乘馬玉鞍勒易德威所乘馬而去俄而劉光濬擒送守光偽殿直二十五人於軍門守光又乘城謂德威曰予俟晉王至即泥首俟命祈德威即馳驛以聞十一月己亥朔帝下令親征幽州甲辰發晉陽案歐陽史作十月劉守光請降王如幽州據薛史則帝發晉陽在十一月甲辰非十月也通鑑從薛史己未至范陽辛酉守光奉禮幣歸款於帝帝單騎臨城邀守光辭以佗日蓋為其親將李小喜所扼也是夕小喜來奔帝下令諸軍詰旦攻城壬戌梯並進軍士畢登帝登燕丹塚以觀之有頃擒劉仁恭以獻癸亥帝入燕城諸將畢賀十二月庚午墨制授周德威幽州節度使癸酉檀州燕樂縣人執劉守光幷妻李氏祝氏子繼祚以獻己卯帝下令班師自雲代而旋時鎮州王鎔定州王處直遣使請帝由井陘而西許之庚辰帝發幽州擄仁恭父子以行甲申次定州舍於關城翌日次曲陽曲陽原本作田陽今據文改正影庫本粘籤與王處直謁北嶽祠是日次行唐鎮州王鎔迎謁於路天祐十一年春正月戊戌朔王鎔以履新之日與其子昭祚昭誨奉觴上壽置宴鎔啟曰燕主劉太師頃為隣國今欲挹其風儀可乎帝即命主者破械引仁恭守光至與之同宴鎔饋以衣被飲食己亥帝發鎮州因與王鎔畋於行唐之西壬子至晉陽以組繫仁恭守光號令而入是日誅守光遣大將李存霸拘送仁恭于代州刺其心血奠告于武皇陵然後斬之案遼史太祖紀七年正月晉王李存勗拔幽州擒劉守光考遼太祖七年即天祐十年莊宗以天祐十年冬始拔幽州十一年正月乃凱旋也遼史誤以次年事先一年書之是月鎮州王鎔定州王處直遣使推帝為尚書令案通鑑考異引唐實錄云天祐八年晉王已稱尚書令薛史作天祐十一年與唐實錄異舊五代史考異初王鎔稱藩於梁梁以鎔為尚書令至是鎮定以帝南破梁軍北定幽薊乃共推崇焉使三至帝讓乃從之遂選日受冊開霸府建行臺如武德故事秋七月帝親將自黃沙嶺東下會鎮人進軍邢洺梁將楊師厚軍於漳東帝軍次張公橋既而裨將曹進金奔於梁帝軍不利而退八月還晉陽天祐十二年三月梁魏博節度使賀德倫遣使奉幣乞盟時楊師厚卒於魏州梁主乃割相衞澶三州別為一鎮以德倫為魏博節度使以張筠為相州節度使張筠, WYG: 蟾}
