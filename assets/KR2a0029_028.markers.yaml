  - {type: variant, offset: 5490, length: 870, content: 異秋八月辛丑朔大閱於魏郊河東魏博幽滄鎮定邢洺麟勝雲朔十鎮之師及奚契丹室韋吐渾之衆十餘萬部陣嚴肅旌甲照曜師旅之盛近代為最己酉梁兗州節度使張萬進遣使歸款帝自魏州率師次於楊劉略地至鄆濮而還遂營於麻家渡諸鎮列營十數梁將賀瓌謝彥章以軍屯濮州行臺村行臺村原本作待臺材今據通鑑改正影庫本粘籤結壘相持百餘日帝嘗以數百騎摩壘求戰謝彥章帥精兵五千伏於堤下帝以十餘騎登堤伏兵發圍帝十數重俄而帝之騎軍繼至攻於圍外帝於圍中躍馬奮擊决圍而出李存審兵至梁軍方退是時帝銳於接戰每馳騎出營存審必扣馬進諫帝伺存審有間即策馬而出顧左右曰老子妨吾戲耳至是幾危方以存審之言為忠也十二月庚子朔帝進軍距梁軍柵十里而止時梁將賀瓌殺騎將謝彥章於軍帝聞之曰賊帥自相魚肉安得不亡戊午下令軍中老幼令歸魏州悉兵以趣汴庚申大軍毀營而進辛酉次於臨濮梁軍捨營踵於後癸亥次胡柳陂遲明梁軍亦至帝率親軍出視諸軍從之梁軍已成陣橫亙數十里帝亦以橫陣抗之時帝與李存審總河東魏博之衆居其中周德威以幽薊之師當其西鎮定之師當其東梁將賀瓌王彥章全軍接戰帝以銀槍突入梁軍陣中斬擊十餘里賀瓌王彥章單騎走濮陽帝軍輜重在陣西望見梁軍旗幟皆驚走因自相蹈籍不能禁止帝一軍先敗周德威戰歿是時陂中有土山梁軍數萬先據之帝帥中軍至山下梁軍嚴整不動旗幟甚盛帝呼諸軍曰今日之戰得山者勝賊已據山吾與爾等各馳一騎以奪之帝率軍先登銀槍步兵繼進遂奪其山梁軍紛紜而下復於土山西結陣數里時日已晡矣或曰諸軍未齊不如還營詰朝可圖再戰閻寶曰深入賊境逢其大敵期於盡銳以决雌雄況賊帥奔亡衆心方恐今乘高擊下勢如破竹矣銀槍都將王建及被甲橫槊進曰賊將先已奔亡王之騎軍一無所損賊衆晡晚大半思歸擊之必破王但登山縱觀責臣以破賊之效於是李嗣昭領騎軍自土山北以逼梁軍王建及呼士衆曰今日所失輜重並在山下乃大呼以奮擊諸軍繼之梁軍大敗時元城令吳瓊貴鄉令胡裝各部役徒萬人貴鄉原本作賁鄉今據胡裝本傳改正影庫本粘籤於山下曳柴揚塵鼓譟助其勢梁軍不之測自相騰籍棄甲山積甲子命行戰場收獲鎧仗不知其數時帝之軍士有先入大梁問其次舍者梁人大恐驅市人以守其殘衆奔歸汴者不滿千人帝軍遂拔濮陽永樂大典卷七千一百五十六, WYG: 證}
