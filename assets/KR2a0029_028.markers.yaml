  - {type: punctuation, offset: 2847, content: 「, id: KR2a0029_ZHSJ_028-bkkpn560}
  - {type: variant, offset: 2847, length: 334, content: 滄只今據文改正影庫本粘籤秋七月梁澶州刺史王彥章棄城而遁畏帝軍之逼也以故將李巖為澶州刺史案通鑑考異引莊宗實錄作李嚴舊五代史考異帝至魏縣因率百餘騎覘梁軍之營是日陰晦劉鄩伏兵五千於河曲叢木間帝至伏兵忽起大譟而來圍帝數十重帝以百騎馳突奮擊梁軍辟易決圍而出案通鑑作自午至申乃得出亡其七騎舊五代史考異有頃援軍至乃解帝顧謂軍士曰幾為賊所笑是月劉鄩潛師由黃澤西趨晉陽至樂平而還遂軍於宗城宗城原本作宋城今據歐陽史劉鄩傳改正影庫本粘籤初鄩在洹水數日不出寂無聲迹帝遣騎覘之無斥候者城中亦無煙火之狀但有鳥止於壘上時見旗幟循堞往來帝曰我聞劉鄩用兵一步百變必以詭計誤我使視城中乃縛旗於芻偶之上使驢負之循堞而行得城中羸老者詰之云軍去已二日矣既而有人自鄩軍至者言兵已趨黃澤帝遽發騎追之時霖雨積旬鄩軍倍, WYG: 闗}
