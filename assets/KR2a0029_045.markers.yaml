  - {type: variant, offset: 85, length: 0, content: '', WYG: 二列傳十二楊師厚潁州斤溝人也為李罕之歩將以猛决聞尤善騎射及罕之敗退保澤州師厚與李鐸何絪等來降太祖署為忠武軍牙將繼歴軍職累遷檢校右僕射表授曹州刺史唐天復三年從太祖迎昭宗于岐下李茂貞以勁兵出戰為師厚所敗及王師範以青州叛太祖遣師厚率兵東討時淮賊王景仁以衆二萬來援師範師厚逆擊破之追至輔唐縣斬數百級授齊州刺史將之任太祖急召見于鄆西境遣師厚率歩騎屯于臨朐而聲言欲東援密州畱輜重于臨胊師範果出兵來擊師厚設伏于野追擊至聖王山殺萬餘衆擒都將}
