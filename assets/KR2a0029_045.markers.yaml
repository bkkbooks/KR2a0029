  - {type: variant, offset: 1863, length: 2095, content: 考異宣徽南院使驃騎大將軍左衞上將軍知內侍省孟漢瓊加開府儀同三司賜忠貞扶運保泰功臣保泰原本作衞泰今據冊府元龜改正影庫本粘籤丙午正衙命使冊皇太后曹氏戊申以前雄武軍節度使劉仲殷為右衞上將軍邢州節度使趙鳳加爵邑自是諸藩鎮文武臣僚皆次第加恩帝嗣位覃恩澤也以翰林學士中書舍人崔梲為工部侍郎依前充職以給事中張鵬為御史中丞以御史中丞龍敏為兵部侍郎以太僕少卿竇維為大理卿甲寅正衙命使冊皇太妃王氏集賢院上言準敕書修創凌煙閣尋奉詔問閣高下等級謹按凌煙閣都長安時在西內三清殿側畫像皆北面閣有中隔隔內面北寫功高宰輔隔內面原本作內回今據五代會要改正影庫本粘籤南面寫功高諸侯王隔外面次第圖畫功臣題贊自西京板蕩四十餘年舊日主掌官吏及畫像工人並已淪喪集賢院所管寫真官畫真官人數不少都洛後廢職今將起閣望先定佐命功臣人數請下翰林院預令寫真本及下將作監興功次序間架修建乃詔集賢御書院復置寫真官畫真官各一員餘依所奏丁巳安州奏此月七日夜節度使符彥超為部曲王希全所害案彥超被害通鑑從薛史作閏月五代春秋繫于正月殊異舊五代史考異廢朝一日戊午以前振武軍節度使安北都護高行周為彰武節度使辛酉以前鄆州使范政為少府監丙寅幸至德宮車駕至興教門有飛鳶自空而墜殭於御前是日大風晦冥二月乙亥以前鎮州節度使涇王從敏為宋州節度使從敏原本作使敏今從歐陽史家人傳改正影庫本粘籤己卯以前徐州節度使檢校太傅李敬周為安州節度使是日宣授鳳翔節度使潞王從珂為權北京留守以北京留守石敬瑭權知鎮州軍州事以鎮州范延光權知鄴都留守事以前河中節度使洋王從璋權知鳳翔軍軍府事庚寅幸山陵工作所是日西京留守王思同奏鳳翔節度使潞王從珂拒命丁酉王思同加同平章事充西面行營都部署以前邠州節度使藥彥稠為副部署案歐陽史辛卯西京留守王思同為西面行營都部署靜難軍節度使藥彥稠為副薛史作丁酉與歐陽史異據通鑑則思同以辛卯充都部署丁酉加同平章事也蓋采薛史歐陽史而兼用之舊五代史考異以河中節度使安彥威為西面兵馬都監以前定州節度使李德珫為權北京留守山陵使奏伏覩御札皇帝親奉靈駕至園陵伏見累朝故事人君無親送葬之儀請車駕不行不從乙未樞密使馮贇起復視事時贇丁母憂也己亥以司農卿張鎛為殿中監庚子殿直楚匡祚上言案原本避宋諱作楚祚今從通鑑增匡字監取亳州團練使李重吉至宋州繫於軍院重吉潞王之長子及幽於宋州帝猶以金帛賜之及聞西師咸叛方遣使殺之三月甲辰以前太僕少卿魏仁鍔為太僕卿興元節度使張虔釗奏會合討鳳翔丙午以右領衞上將軍武延翰為郢州刺史丁未洋州孫漢韶奏至興元與張虔釗同議進軍己酉以鎮州節度使范延光依前檢校太師兼侍中行興唐尹充天雄軍節度使北面水陸轉運制置使以北京留守河東節度使石敬瑭依前檢校太尉兼中書令其真定尹充鎮州節度使大同彰國振武威塞等軍蕃漢馬步總管如故辛亥以前定州節度使李德珫為北京留守充河東節度使許王從益加檢校太保前河中節度使洋王從璋加檢校太傅詔藩侯帶平章事以上薨許立神道碑差官撰文未帶平章事及刺史準令式合立碑者其文任自製撰不在奏聞乙卯興元張虔釗奏自鎮將兵赴鳳翔收大散關大散原本作大役今據通鑑改正影庫本粘籤宗正寺奏準故事諸陵有令丞各一員近例更委本縣令兼之緣河南洛陽是京邑兼令丞不便詔特置陵臺令丞各一員己未以前金吾大將軍李肅為左衞上將軍充山陵修奉上下宮都部署庚申西面步軍都監王景從等自軍前至奏今月十五日大軍進攻鳳翔十六日嚴衞右廂都指揮使尹暉引軍東面入城右羽林都指揮使楊思權引軍西面入城思權原本作世權今從歐陽史改正影庫本粘籤山南軍潰帝聞之謂康義誠等曰朕幼年嗣位委政大臣兄弟之間必無榛梗諸公大計見告朕獨難違事至於此何方轉禍朕當與左右自往鳳翔迎兄主社稷朕自歸藩於理為便朱弘昭馮贇不對義誠曰西師驚潰蓋由主將失策今駕下兵甲尚多臣請自往關西振其兵威扼其衝要義誠又累奏請行帝召侍衞都將以下宣曰先皇帝棄萬國朕於兄弟之中無心爭立一旦被召主喪便委社稷岐陽兄長果致猜嫌卿等頃從先朝千征萬戰今日之事寧不痛心今據府庫悉以頒賜卿等勉之乃出銀絹錢厚賜於諸軍是時方事山陵復有此賜府藏為之一空軍士猶負賞物揚言于路曰到鳳翔更請一分其驕誕無畏如是辛酉幸左藏庫視給將士金帛是日誅馬軍都指揮使朱洪實坐與康義誠忿爭故也癸亥以康義誠為鳳翔行營都招討使餘如故以王思同為副招討使以安從進為順化軍節度使充侍衞馬軍都指揮使詔左右羽林軍四十指揮改為嚴衞左右龍武神武軍改為捧聖甲子陝州奏潞王至潼關害西面都部署王思同案歐陽史作思同奔歸于京師死之與薛史異舊五代史考異乙亥宣諭西面行營將士俟平鳳翔日人賞二百千府庫不足以宮闈服翫增給詔侍衞馬軍都指揮使安從進京城巡檢是日從進已得潞王書檄潛布腹心矣丁卯潞王至陝州戊辰帝急召孟漢瓊不至召朱弘昭弘昭懼投于井安從進尋殺馮贇于其第案通鑑考異云張昭閔帝實錄帝召宏昭不至俄聞自殺乃令從進殺贇案從進傳贇首於陝則贇死非閔帝之命明矣孔本是夜帝以百騎出玄武門案契丹國志愍帝領五十騎自隨出奔衞州與薛史異案契丹國志愍帝領五十騎自隨出奔衞州宋史李洪信傳又作少帝東奔捧聖軍數百騎從行與是書異據下文王弘贄曰今以五十餘騎奔竄則作五十騎者是也殿本謂控鶴指揮使慕容遷曰爾誠有馬控鶴從予控鶴從予原本作縱鶴空子今從通鑑改正影庫本粘籤及駕出即闔門不行遷乃帝素親信者也臨危如是人皆惡之是月, WYG: 巻}
