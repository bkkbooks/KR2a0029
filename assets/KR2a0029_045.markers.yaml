  - {type: variant, offset: 163, length: 0, content: '', krp: 入朝詔兼潞州行營都招討使無何劉知俊據同州叛師厚與劉鄩率軍西討至潼關擒知俊弟知浣以獻知俊聞師厚至即西走鳯翔師厚進攻至長安時知俊已引岐冦據其城師厚以竒兵傍南山急行自西門而入賊將王建驚愕不知所為遽出降制加師厚檢校太尉頃之晉王與周徳威丁會符存審等以大衆攻晉州甚急太祖遣師厚帥兵援之軍至絳州晉軍扼䝉阬之險師厚整衆而前晉人乃徹圍而遁四年二月移}
  - {type: variant, offset: 164, length: 1, content: 汴, WYG: 陜州節度使五年正月王景仁敗于栢鄉晉人乘勝圍邢州掠魏博南至黎陽師厚受詔以兵屯衛州晉軍攻魏州不克而退師厚追襲過漳河解邢州之圍改授滑州節度使明年太祖北征令師厚以大軍棗強逾旬不能克太祖屢加督責師厚晝夜奮擊乃破之盡屠其城車駕還師厚屯魏州及庶人友珪篡位魏州衙内都指揮使潘晏與大將臧延範趙訓謀變有密告者師厚布兵擒捕斬之歐陽史云師厚乘間殺魏牙將潘晏臧延範等逐出節度使羅周翰越二日又有指揮使趙賓夜率歩軍擐甲俟旦為亂師厚以衙兵圍捕賓不能起乃越城而遁師厚遣騎追至肥鄉擒其黨百餘人歸斬于府門友珪即以師厚為魏博節度使檢校侍中未幾鎮人晉人侵魏之北鄙師厚率軍至唐店破之斬首五千級擒都將三千餘人是時師厚握河朔兵威望震主友珪患之詔師厚赴闕師厚乃率精兵萬人至洛陽嚴兵于都外自以十餘人入謁友珪懼厚禮而遣之及末帝將圖友珪遣使謀于師厚深陳欵効且馳書于侍衛軍使袁象先及主軍大將又遣都指揮使朱漢賓率兵至滑州以應禁旅友珪既誅末帝即位于東京首封師厚為鄴王加檢校太師中書令毎下詔不名以官呼之事無巨細必先謀于師厚師厚頗亦驕誕先是鎮人以我栢鄉不利之後屢擾邉境師厚總大軍直抵鎮州城下焚盪閭舎移軍掠藁城束鹿至深州而歸乾化五年三月卒于鎮廢朝三日贈太師師厚純謹敏幹深為太祖知遇委以重兵劇鎮他莫能及然而末年矜功恃衆驟萌不軌之意于是專割財賦置銀槍効軍節凡數千皆選摘驍鋭縱恣豢養復故時牙軍之態時人病之清異錄云槍材難得十全魏州石屋材多可用楊師厚時銀槍效節都皆采于此承前河朔之俗上元比屋夜遊及師厚作鎮乃課魏人户立燈竿千釭萬炬洞照一城縱士女嬉遊復彩畵舟舫令女妓櫂歌于御河縱酒彌日又于黎陽採巨石將紀徳政以鐡車負載驅牛數百以拽之所至之處丘墓廬舎悉皆毁壊百姓望之皆曰碑來及碑石纔至而師厚卒魏人以為悲來之應末帝聞其卒也于私庭受賀乃議裂魏州為兩鎮既而所樹親軍果為叛亂以招外冦致使河朔淪陷宗社覆滅由師厚兆之也牛存節字贊貞青州博昌人也本名禮太祖改而字之少以雄勇自負唐乾符末鄉人諸葛爽為河陽節度使存節往從之爽卒存節謂同輩曰天下洶洶當擇英主事之以圖富貴遂歸于太祖初授宣義軍小將屬蔡冦至金堤驛犯酸棗靈昌存節日與之鬬凡二十餘往毎往必執俘而還前後斬首二十餘級獲孳畜甚衆太祖擊蔡賊于板橋赤堈酸棗門封禪寺枯河北存節皆預其行與諸將于濮州南劉橋范縣大破鄆衆自此深為太祖奬遇文徳元年夏李罕之以并軍圍張宗爽于河陽太祖遣存節率軍赴之屬歲歉饟餽不至村民有儲乾椹者存節以器用錢帛易之以給軍食大破賊于浿河罕之引衆北走又預討徐宿有功及討河北存節前鋒下黎陽收臨河至内黄西以兵千餘人當魏人萬二千衆大破其陣殭仆蔽野太祖深所歎激謂有神兵之助大順元年改滑州左右廂牢城使與諸將討時溥累破賊軍景福元年秋改遏後都指揮使攻濮之役領軍先登遂拔其壘二年四月下徐州梟時溥存節力戰其功居多乾寧二年授檢校工部尚書三年夏太祖東討鄆州存節領軍次故樂亭扼其要路都指揮使龎師古屯馬頰存節密與都將王言謀入鄆壘十二月存節遣王言夜伏勇士于州西北以船踰濠舉梯登陴既而王言不克入存節獨率伏軍負梯䡴破其西甕城奪其濠橋諸軍俱進四年四月陷其城㝷與葛從周降下兖州加檢校右僕射其年秋大舉以伐淮南至濠州東聞前軍失利于清口諸軍退至淠河無復隊伍存節遏其後諸將釋騎歩鬬諸軍稍得濟收合所部竝敗兵共八千餘人至于淮涘時不食已四日矣存節訓勵部分以禦追冦遂得旋師五年除亳州刺史俄遷宣武軍都指揮使改宿州刺史明年淮賊大至彭城存節乃以歩下兵夜發直趣彭門淮人訝其神速震恐而退諸將服其智識光化二年罷歸復為左衙都將兼馬歩教練使天復元年授潞州馬歩都指揮使法令嚴整士庶安之及追赴行在士卒泣送者不絶于道加金紫光禄大夫檢校司空改滑州左衙歩軍指揮使知邢州軍州事天祐元年授邢州團練使時州纔及二百人晉人知之以大軍來冦太祖在鄴發長直兵二千人赴援存節率壯徤出鬬以家財賞激戰士并軍急攻七日不能克而去太祖召至勞慰久之厚賚金帛鞍馬加檢校司徒冬罷軍署為元帥府左都押衙四年太祖受禪除右千牛衛上將軍其秋攻潞州以存節為行營馬歩軍都排陣使開平二年二月自右監門衛上將軍轉右龍虎統軍駐畱洛下是歲王師敗于上黨晉人乘勝進迫澤州州城將陷河南畱守張全義召存節謀遂以本軍及右龍武羽林等軍往應接上黨師至天井關存節謂諸將曰是行也雖不奉詔㫖然要害之地不可致失時晉人新勝其鋒甚盛存節引衆而前銜枚夜至澤州守遇守埤者已縱火鼓噪以應外軍刺史保衙城不知所為存節纔入晉軍巳至矣乃分布守禦晉軍四面攻鬭開地道以入城存節亦以隧道應之逆戰于地中晉軍不能進又以勁弩射之中者人馬皆洞經十三日晉軍死傷者甚衆焚營而退郡以獲全太祖屢歎賞之五月遷左龍虎統軍充六軍馬歩都指揮使十月授絳州刺史三年四月除鄜州畱後六月劉知俊以同州叛㝷授同州畱後未幾加檢校太保同州節度使乾化二年加檢校太傅進封開國公存節戒嚴軍旅常若敵至先是州中井水鹹苦人不可飲及并人岐人來迫州城或以為兵士渴乏陷在旦夕存節乃肅拜䖍祝擇地鑿八十餘井其味皆甘淡由是人馬汲濯有餘衆以為至誠之感自八月至三年春末人馬未嘗釋甲以至冦退㝷加同平章事詔赴闕末帝召慰勉賞賜甚厚十一月加開府儀同三司食邑一千户授鄆}
