  - {type: variant, offset: 173, length: 0, content: '', WYG: 遏使父環鴻臚卿以檀貴累贈左僕射檀少英悟美形儀好讀兵書洞曉韜略唐中和中太祖鎮大梁檀為小將四年汴將楊彦洪破巢將尚讓李讜于尉氏門外檀在戰中摧鋒陷陣遂為太祖所知稍䝉擢用預破蔡賊于斤溝淝}
