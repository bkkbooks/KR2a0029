  - {type: variant, offset: 163, length: 0, content: '', WYG: 入朝詔兼潞州行營都招討使無何劉知俊據同州叛師厚與劉鄩率軍西討至潼關擒知俊弟知浣以獻知俊聞師厚至即西走鳯翔師厚進攻至長安時知俊已引岐冦據其城師厚以竒兵傍南山急行自西門而入賊將王建驚愕不知所為遽出降制加師厚檢校太尉頃之晉王與周徳威丁會符存審等以大衆攻晉州甚急太祖遣師厚帥兵援之軍至絳州晉軍扼䝉阬之險師厚整衆而前晉人乃徹圍而遁四年二月移}
