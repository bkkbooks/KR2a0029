  - {type: variant, offset: 174, length: 3, content: 東長興, WYG: 八角遷踏白都副將光啓二年從胡真擊淮西之衆解河陽之圍蔡賊張存敢乘亂據洛陽檀與勇士數十人潛入賊栅邀其輜重存敢遁走胡真至陜州開通貢路遣檀攻玉山寨降賊帥石令殷從擊秦宗賢于鄭州西北河灘之上于太祖馬前射賊將孫安應弦而斃三年佐都指揮使朱珍敗徐戎于孫師陂獲其將孫用和束詡以獻從擊蔡賊于板橋偏將李重裔追賊馬躓為蔡人所擒檀奪取而旋擭賊將薛注太祖破朱瑾于劉橋檀盡收其軍實文徳}
