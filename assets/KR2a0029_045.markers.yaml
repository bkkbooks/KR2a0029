  - {type: variant, offset: 307, length: 279, content: 明宗崩秘其喪六日考長興四年十一月癸酉朔二十日壬辰誅從榮二十六日戊戌明宗崩二十九日辛丑閔帝已至自鄴矣不得云秘喪六日也舊五代史考異十二月癸卯朔案五代春秋作癸亥朔蓋傳寫之訛歐陽史通鑑俱從薛史作癸卯舊五代史考異發喪於西宮帝於柩前即位丁未羣臣上表請聽政表再上詔允己酉中外將士給賜有差庚戌帝縗服見羣臣於廣壽門之東廡下宰臣馮道進曰陛下久居哀毀臣等咸願一覩聖顏朱弘昭前舉帽羣臣再拜而退御光政樓存問軍民辛亥賜司衣王氏死坐秦王事也癸丑以前鎮州節度使涇王從敏權知河南府事尋以盧質代之乙卯賜司儀康氏死事連王氏也丙辰以天雄軍節度判官唐汭為諫議大夫掌書記趙彖為起居郎元從都押衙宋令詢為磁, WYG: 張訓守密}
