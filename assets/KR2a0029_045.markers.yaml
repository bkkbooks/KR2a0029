  - {type: variant, offset: 171, length: 1, content: 移, WYG: 加淮南西北面行營招討使控扼淮濆邉境安之其冬蔣殷據徐州逆命存節方以大衆戍潁州得殷逆謀密以上聞遽奉詔與劉鄩同討之頓于埇上淮賊朱瑾以兵救殷距宿之兩舎聞存節兵大至即委糧棄甲而遁竟平徐州詔加大尉夏中病渴且痟屬河北用軍末帝令率軍屯陽畱以張劉鄩之勢存節忠憤彌篤未嘗言病料敵治戎旦夕愈厲病革詔歸汶陽翼日而卒將終戒其子知業知讓等以忠孝言不及他册贈太師存節武鷙慷慨有大節野戰壁守皆其所長威名聞于境外深為末帝所重而木強忠厚有賈復之風焉王檀字衆美京兆人也曽祖泚唐左金吾衛將軍隴州防禦使祖曜定難功臣渭橋}
