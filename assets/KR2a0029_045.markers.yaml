  - {type: variant, offset: 133, length: 0, content: '', WYG: 太祖討趙匡凝于襄陽命師厚統前軍以進趙匡凝嚴兵以備師厚至榖城西童山刋材造浮橋引軍過漢水一戰趙匡凝敗散擕妻子㳂漢遁去翼日表師厚為山南東道節度畱後舊唐書天祐三年六月甲申敕襄州近因趙匡凝作帥請别立忠義軍額既非往制固是從權忠義軍額宜停廢依舊為山南東道節度使即令南討荆州畱後趙匡明亦棄軍上峽不浹旬併下兩鎮乃正授襄州節度使先是漢南無羅城師厚始興板築周十餘里郛郭完壯開平元年}
