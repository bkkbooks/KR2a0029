  - {type: variant, offset: 4048, length: 828, content: 十九日為己巳故次日即為庚午朔舊五代史考異帝喜敬瑭拜舞於路帝下馬慟哭諭以潞王危社稷康義誠以下叛我無以自庇長公主見教逆爾於路謀社稷大計敬瑭曰衞州王弘贄宿舊諳事衞州原本作衡州今從通鑑改正影庫本粘籤且就弘贄圖之敬瑭即馳騎而前見弘贄曰主上播遷至此危迫吾戚屬也何以圖全弘贄曰天子避寇古亦有之然於奔迫之中亦有將相國寶法物所以軍長瞻奉不覺其亡也今宰執近臣從乎寶玉法物從乎詢之無有弘贄曰大樹將顛非一繩所維今以五十騎奔竄無將相一人擁從安能興復大計所謂蛟龍失雲雨者也今六軍將士總在潞邸矣公縱以戚藩念舊無奈之何案通鑑考異引南唐烈祖實錄弘贄曰今京國阽危百官無主必相率攜神器西向公何不囚少帝西迎潞王此萬全之計敬瑭然其言舊五代史考異考薛史采五代實錄多為晉帝諱言當以南唐實錄為得其實孔本遂與弘贄同謁於驛亭宣坐謀之敬瑭以弘贄所陳以聞弓箭庫使沙守榮賁洪進前謂敬瑭曰主上即明宗愛子公即明宗愛壻富貴既同受休戚合共之今謀於戚藩欲期安復翻索從臣國寶欲以此為辭為賊算天子耶乃抽佩刀刺敬瑭敬瑭親將陳暉扞之陳暉原本作陳運今從歐陽史改正影庫本粘籤守榮與暉單戰而死洪進亦自刎是日敬瑭盡誅帝之從騎五十餘輩獨留帝於驛乃馳騎趨洛四月三日潞王入洛五日即位七日廢帝為鄂王遣弘贄子殿直王巒之衞州時弘贄已奉帝幸州廨九日巒至帝遇鴆而崩時年二十一案契丹國志王巒至衞州進鴆于愍帝愍帝不飲巒縊殺之與薛史異歐陽史同薛史是日辰時白虹貫日皇后孔氏在宮中及王巒迴即日與其四子並遇害案遼史太宗紀云九年夏四月唐從珂殺其主自立人皇王倍上書請討又義宗列傳云明宗養子從珂弒其君自立倍密報太宗曰從珂弒君盍討之薛史及通鑑均不載孔本晉高祖即位諡曰閔與秦王及末帝子重吉並葬於徽陵域中封纔數尺路人觀者悲之永樂大典卷七千一百七十四史臣曰閔帝爰自冲年素有令問及徵從代邸入踐堯階屬軒皇之弓劍初遺吳王之几杖未賜吳王原本作辰王今據前漢書改正影庫本粘籤遽生猜間遂至奔亡蓋輔臣無安國之謀非少主有不君之咎以至越在草莽失守宗祧斯蓋天命之難諶土德之將謝故也永樂大典卷七千一百七十四, WYG: ''}
