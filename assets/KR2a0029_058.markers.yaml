  - {type: variant, offset: 9, length: 2, content: 書三, krp: 莊宗紀二梁祖自督軍攻棗強甲申城陷屠之甲申通鑑作丙戌周徳威大破燕軍于羊頭崗案通鑑作龍頭岡攷異引莊宗實録作羊頭岡}
  - {type: variant, offset: 12, length: 175, content: 四列傳第十趙光逢字延吉曾祖植嶺南節度使祖存約興元府推官父隱右僕射案舊唐書趙隱傳云隱字大隱京兆奉天人也大中三年應進士登第累加尚書左僕射廣明中卒考薛史作右僕射與舊唐書異光逢與弟光裔皆以文學德行知名案舊唐書光裔光啟三年進士擢第累遷司勳郎中弘文館學士改膳部郎中知制誥季述廢立之後旅遊江表以避患嶺南劉隱深禮之奏為副使因家嶺外光逢幼嗜墳典動守規檢議者目之為玉界尺, WYG: 一月己亥朔帝下令親征幽州}
