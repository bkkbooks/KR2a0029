  - {type: variant, offset: 1934, length: 182, content: 第十九人自登第凡十九年為宰相又昆仲之次第十九時亦異之案古今事類云鄭王玉當唐昭宗時作相文章理道典贍華美小字十九郎應舉十九年方及第又第十九人至相亦十九年時皆異之考王玉以光化中登第歷相梁唐而古今事類以為唐昭宗時作相誤也子遘太平興國中任正郎永樂大典卷一萬八千八百八十一崔協字思化遠祖清河太守第二子寅仕後魏為太子洗馬因為清河小房至唐朝盛為流品曾祖邠太常卿祖瓘吏部尚書父彥融楚, WYG: 澶}
