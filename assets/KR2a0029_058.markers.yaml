  - {type: variant, offset: 264, length: 1123, content: 左丞翰林承旨案舊唐書云釋褐鳳翔推官入朝為監察御史丁父憂免僖宗還京授太常博士歷禮部司勳吏部三員外郎集賢殿學士轉禮部郎中景福中以祠部郎中知制誥尋召充翰林學士正拜中書舍人戶部侍郎學士承旨改兵部侍郎尚書左丞學士如故舊唐書所載光逢爵秩較薛史為詳今備錄之昭宗幸石門光逢不從昭宗遣內養戴知權詔赴行在稱疾解官駕在華州拜御史中丞時有道士許巖士案原本脫士字今據新唐書及通鑑增入舊五代史考異瞽者馬道殷出入禁庭驟至列卿宮相因此以左道求進者衆光逢持憲紀治之皆伏法自是其徒頗息改禮部侍郎知貢舉光化中王道寖衰南北司為黨光逢素惟慎靜慮禍及己因挂冠伊洛屏絕交遊凡五六年門人柳璨登庸案歐陽史柳璨與光逢有舊恩案唐摭言云光化二年趙光逢放柳璨及第光逢後三年不遷時璨自內庭大拜光逢始以左丞徵入未幾璨坐罪誅死光逢膺大用與薛史微異舊五代史考異除吏部侍郎太常卿入梁為中書侍郎平章事累轉左僕射兼租庸使左僕射原本脫左字今據歐陽史增入影庫本粘籤上章求退以太子太保致仕梁末帝愛其才徵拜司空平章事無幾以疾辭授司徒致仕唐摭言云光逢膺大用居重地十餘歲七表乞骸守司空致仕居二年復徵拜上相殿本同光初弟光胤為平章事時謁問於私第嘗語及政事他日光逢署其戶曰請不言中書事其清淨寡慾端默如此嘗有女冠寄黃金一鎰於其室家時屬亂離女冠委化於他土後二十年金無所歸納於河南尹張全義請付諸宮觀其舊封尚在兩登廊廟四退邱園百行五常五常原本作五諦今據錦繡萬花谷所引薛史改正影庫本粘籤不欺闇室搢紳咸仰以為名教主天成初遷太保致仕封齊國公卒於洛陽詔贈太傅永樂大典卷一萬八千九百九十一趙光胤光逢之弟也案新舊唐書俱云趙隱子三人光逢光裔光胤為後唐相者光胤也薛史原本避宋諱宋諱稱光胤為光裔似混二人為一今改正俱以詞藝知名亦登進士第案舊唐書云大順二年進士登第天祐初累官至駕部郎中光胤仕梁歷清顯伯仲之間咸以方雅自高北人聞其名者皆望風欽重及莊宗平定汴洛時盧程以狂妄免郭崇韜自勳臣拜議者以為國朝典禮故實須訪前代名家咸曰光胤有宰相器薛廷珪李琪當武皇為晉王時嘗因為冊使至太原故皆有宿望當時咸謂宜處台司郭崇韜採言事者云廷珪朽老浮華無相業琪雖文學高傾險無士風皆不可相乃止同光元年十一月光胤與韋說並拜平章事光胤生於季末漸染時風雖欲躍鱗振翮仰希前輩然才力無餘未能恢遠朝廷每有禮樂制度沿革擬議以為己任同列既匪博通見其浮譚橫議莫之測也豆盧革雖憑門地在本朝時仕進尚微久從使府朝章典禮未能深悉光胤每有發論革但唯唯而已後革奏議或當光胤謂羣官曰昨有所議前座一言粗當近日差進學者其可已乎其自負如此先是條制權豪強買人田宅或陷害籍沒顯有屈塞者許人自理內官楊希朗者故觀軍容使復恭從孫也援例理復恭舊業事下中書光胤謂崇韜曰復恭與山南謀逆顯當國法本朝未經昭雪安得論理崇韜私抑宦者因具奏聞希朗泣訴於莊宗莊宗, WYG: ''}
