  - {type: variant, offset: 5276, length: 349, content: 考異長興中卒於福善里第時年六十子貞官至邑宰琪以在內署時所為制詔編為十卷目曰金門集大行於世永樂大典卷一萬三百八十九蕭頃字子澄京兆萬年人故相倣之孫京兆尹廩之子頃聰悟善屬文昭宗朝擢進士第歷度支巡官太常博士右補闕時國步艱難連帥倔強率多奏請欲立家廟於本鎮頃上章論奏乃止累遷吏部員外郎先是張濬自中書出為右僕射梁祖判官高劭使梁祖廕求一子出身官省寺皆稱無例濬曲為行之指揮甚急吏徒惶恐頃判云僕射未集郎官赴省上指揮公事且非南宮舊儀濬聞之慚悚致謝頃由是知名梁祖亦奬之頃入梁歷給諫御史中丞禮部侍郎知貢舉咸有能名自吏部侍郎拜中書門下平章事與李琪同輔梁室同輔原本作同轉今據文改正影庫本粘籤事多矛盾莊宗入汴頃坐貶登州司戶量移濮州司馬數年遷太子賓客天成初為禮部尚書太常卿太子少保致仕卒時年六十九輟朝一日贈太子少師永樂大典卷五千二百, WYG: 巻}
