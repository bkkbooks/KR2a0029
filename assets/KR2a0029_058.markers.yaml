  - {type: variant, offset: 5047, length: 225, content: 正影庫本粘籤雖曾彈奏而依違詞旨不敢正言其罪以是託疾三上章請老朝旨不允除授尚書左僕射自是之後尤為宰執所忌凡有奏陳靡不望風橫沮天成末明宗自汴州還洛琪為東都留司官班首奏請至偃師奉迎時琪奏中有敗契丹之凶黨破真定之逆城之言詔曰契丹即為凶黨真定不是逆城李琪罰一月俸又嘗奉敕撰霍彥威神道碑文琪梁之故相也彥威仕梁歷任不言其偽中書奏曰不分真偽是混功名望令改撰詔從之多此類也琪雖博學多才拙於遵養時晦知時不可為然猶多岐取進動而見排由己不能鎮靜也以太子太傅致仕案歐陽史作少傅, WYG: ''}
