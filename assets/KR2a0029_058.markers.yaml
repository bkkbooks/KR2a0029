  - {type: variant, offset: 3596, length: 1439, content: 北夢瑣言云梁李相國琪唐末以文學策名仕至御史昭宗播遷衣冠蕩析琪藏跡於荊楚間自晦其迹號華原李長官其堂兄光符宰宜都嘗厭薄之琪寂寞每臨流踞石摘樹葉而試草制詞吁嗟怏悵而投葉水中梁祖受禪徵入拜翰林學士今考梁書李珽傳珽歷為成汭趙匡凝掌書記蓋昭宗末年珽琪兄弟皆客荊楚後乃受知於梁祖也累遷戶部侍郎翰林承旨梁祖西抗邠岐北攻澤潞出師燕趙經略四方暫無寧歲而琪以學士居帳中專掌文翰下筆稱旨寵遇踰倫是時琪之名播於海內琪重然諾憐才奬善家門雍睦貞明龍德中龍德原本脫德字今據梁末帝紀增入影庫本粘籤歷兵禮吏侍郎受命與馮錫嘉張充郄殷象同撰梁太祖實錄三十卷遷御史中丞累擢尚書左丞中書門下平章事時琪與蕭頃同為宰相頃性畏慎深密琪倜儻負氣不拘小節中書奏覆多行其志而頃專掎摭其咎會琪除吏是試攝名銜改攝為守為頃所奏梁帝大怒將投諸荒裔而為趙巖輩所援罷相為太子少保莊宗入汴素聞琪名累欲大任同光初歷太常卿吏部尚書三年秋天下大水國計不充莊宗詔百僚許上封事陳經國之要琪因上疏曰臣聞王者富有兆民深居九重所重患者百姓凋耗而不知四海困窮而莫救下情不得上達羣臣不敢指言今陛下以水潦之災軍食乏闕焦勞罪己迫切疚懷避正殿以責躬訪多士而求理則何思而不獲何議而不臧止在改而行之足以擇其善者臣聞古人有言曰穀者人之司命也地者穀之所生也人者君之所理也有其穀則國力備定其地則人食足察其人則徭役均知此三者為國之急務也軒黃已前不可詳記自堯湮洪水禹作司空於時辨九等之田收什一之稅其時戶一千三百餘萬定墾地約九百二十萬頃約九百原本作絲八百今據文獻通考改正影庫本粘籤最為太平之盛及商革夏命重立田制每私田十畝種公田一畝水旱同之亦什一之義也洎乎周室立井田之法大約百里之國提封萬井出車百乘戎馬四百匹畿內兵車萬乘馬四萬匹以田法論之亦什一之制也故當成康之世比堯舜之朝戶口更增二十餘萬非他術也蓋三代以前皆量入以為出計農以立軍雖逢水旱之災而有凶荒之備降及秦漢重稅工商急關市之征倍舟車之算人戶既以減耗古制猶以兼行按此時戶口尚有千二百餘萬墾田亦八百萬頃至乎三國並興兩晉之後則農夫少於軍衆戰馬多於耕牛供軍須奪於農糧秣馬必侵於牛草秣馬原本作積馬今據文獻通考改正影庫本粘籤於是天下戶口只有二百四十餘萬洎隋文之代兩比隆及煬帝之年又三分去一我唐太宗文皇帝以四夷初定百姓未豐延訪羣臣各陳所見惟魏徵獨勸文皇力行王道由是輕徭薄賦不奪農時進賢良悅忠直天下粟價斗直兩錢自貞觀至於開元將及一千九百萬戶五千三百萬口墾田一千四百萬頃比之堯舜又極增加是知救人瘼者以重斂為病源料兵食者以惠農為軍政仲尼云百姓足君孰與不足臣之此言是魏徵所以勸文皇也伏惟深留宸鑒如以六軍方闕不可輕徭兩稅之餘猶須重斂則但不以折納為事一切以本色輸官又不以紐配為名止以正耗加納猶應感悅未至流亡況今東作是時羸牛將駕是時二字疑有舛誤考五代會要亦作是時今姑仍其舊影庫本粘籤數州之地千里運糧有此差徭必妨春種今秋若無糧草何以贍軍臣伏思漢文帝時欲人務農乃募人入粟得拜爵及贖罪景帝亦如之後漢安帝時水旱不足三公奏請富人入粟得關內候及公卿以下散官本朝乾元中亦曾如此今陛下縱不欲入粟授官願明降制旨下諸道合差百姓轉倉之處有能出力運官物到京師五百石以上白身授一初任州縣官有官者依資遷授欠選者便與放選放選原本作於選今據文獻通考改正影庫本粘籤千石以上至萬石不拘文武明示賞酬免令方春農人流散斯亦救民轉倉贍軍之一術也莊宗深重之尋命為國計使垂為輔相俄遇蕭牆之難而止及明宗即位豆盧革韋說得罪任圜陳奏請命琪為相為孔循鄭王玉排沮乃相崔協琪時為御史大夫安重誨於臺門前專殺殿直馬延馬延原本作馬廷考, WYG: ''}
