  - {type: variant, offset: 2253, length: 281, content: 度支巡官渭南尉直史館歷三署入梁為左司郎中萬年令給事中累官至兵部侍郎與中書舍人崔居儉相遇於幕次協厲聲而言曰崔蕘之子何敢相見居儉亦報之左降太子詹事俄拜吏部侍郎同光初改御史中丞憲司舉奏多以文字錯誤屢受責罰協器宇宏爽高談虛論多不近理時人以為虛有其表天成初遷禮部尚書太常卿因樞密使孔循保薦拜平章事初豆盧革韋說得罪執政議命相樞密使孔循意不欲河朔人居相位任圜欲相李琪而鄭王玉素與琪不協孔循亦惡琪謂安重誨曰李琪非無藝學但不廉耳朝論莫若崔協重誨然之因奏擇相明宗曰誰可乃以協對任圜奏曰重誨被人欺賣如崔協者少識文字時人謂之沒字碑臣比不知書無才而進已為天下笑何容中書之內更有笑端明宗曰易, WYG: 洺}
