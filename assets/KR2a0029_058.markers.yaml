  - {type: variant, offset: 2600, length: 833, content: 莊宗霸府書記故明宗呼之朝退宰臣樞密使休於中興殿之廡下孔循拂衣而去曰天下事一則任圜二則任圜崔協暴死則已不死會居此位重誨私謂圜曰今相位缺人協且可乎圜曰朝廷有李琪者學際天人奕葉軒冕論才校藝可敵時輩百人而讒夫巧沮忌害其能必捨琪而相協如棄蘇合之丸蘇合原本作蘇全今據通鑑及歐陽史改正影庫本粘籤取蛣蜣之轉也重誨笑而止然重誨與循同職循日言琪之短協之長故重誨竟從之而協登庸之後廟堂代筆假手於人朝廷以國庠事重命協兼判祭酒事協上奏每歲補監生二百為定物議非之案北夢瑣言明宗問宰相馮道盧質近日喫酒否對曰質曾到臣居亦飲數爵臣勸不令過度事亦如酒過則患生崔協強言于坐曰臣聞食醫心鏡酒極好不加藥餌足以安心神左右見其膚淺不覺哂之舊五代史考異四年春駕自夷門還京從至須水驛中風暴卒詔贈尚書左僕射諡曰恭靖子頎頌壽貞惟頌仕皇朝官至左諫議大夫終於鄜州行軍司馬永樂大典卷二千七百四十李琪字台秀五代祖憕天寶末禮部尚書東都留守安祿山東陷東都遇害累贈太尉諡曰忠懿憕孫寀元和朝位至給事中寀子敬方文宗朝諫議大夫敬方子縠廣明中為晉公王鐸都統判官案太平廣記引李琪集序作父敬佐王鐸滑州幕考李琪祖名敬方其父不得名敬疑太平廣記傳寫之訛舊五代史考異以收復功為諫議大夫琪即縠之子也年十三詞賦詩頌大為王鐸所知然亦疑其假手一日鐸召縠讌於公署召縠原本作茗縠今據文改正影庫本粘籤密遣人以漢祖得三傑賦題就其第試之琪援筆立成賦尾云得士則昌非賢罔共龍頭之友斯貴鼎足之臣可重宜哉項氏之敗亡一范增而不能用鐸覽而駭之曰此兒大器也將擅文價案太平廣記琪總角謁鐸鐸顧曰適蜀中詔到用夏州拓跋思恭為收復都統可作一詩否即秉筆立製云飛騎經巴棧洪恩及夏臺將從天上去人自日邊來此處金門遠何時玉輦迴早平關右賊莫待詔書催鐸益奇之因執琪手曰此真鳳毛也時年十四明年丁母憂因流寓齊魯然糠照薪俾夜作晝覽書數千卷間為詩賦唐僖宗再幸梁洋竊賦云哀痛不下詔登封誰上書舊五代史考異昭宗時李谿父子以文學知名琪年十八袖賦一軸謁谿谿覽賦驚異倒屣迎門出琪調啞鐘捧日等賦調啞鐘捧日等賦疑有脫字考夏文莊集所引薛, WYG: 刺}
