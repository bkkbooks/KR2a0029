  - {type: variant, offset: 1388, length: 316, content: 自見光胤言之希朗陳訴叔祖復光有大功於王室復光原本作復充今據新唐書改正影庫本粘籤伯祖復恭為張濬所搆得罪前朝當時強臣掣肘國命不行及王行瑜伏誅德音昭洗制書尚在相公本朝氏族諳練故事安得謂之未雪耶若言未雪吾伯氏彥博洎諸昆仲監護諸鎮何途得進漸至聲色俱厲光胤方恃名德為其所折悒然不樂又以希朗幸臣慮摭他事危己心不自安三年夏四月病疽卒贈左僕射永樂大典卷一萬六千九百九十一鄭王玉昭宗朝宰相綮之姪孫父徽河南尹張全義判官光化中登進士第案歐陽史云王玉少依全義居河南舉進士數不中全義以王玉屬有司乃得及第歷弘文館校書集賢校理監察御史入梁為補闕起居郎召入翰林累遷禮部侍郎充職王玉文章美麗旨趣雍容自策名登朝張全義皆有力焉案歐陽史云梁諸大臣以全義故數薦之貞明中拜平章事, WYG: ''}
