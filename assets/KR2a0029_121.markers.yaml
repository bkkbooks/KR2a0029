  - {type: variant, offset: 647, length: 125, content: 常夢神人以大傘見遺色如鬱金加道經一卷其後遂有天下及瓦橋不豫之際復夢向之神人來索傘與經夢中還之而驚起謂近侍曰吾夢不祥豈非天命將去耶遂召大臣戒以後事初幽州聞車駕將至父老或有竊議曰此不足憂且天子姓柴幽州為燕地燕者亦煙火之謂也此柴入火不利之兆安得成功卒如其言, WYG: 舊五代}
