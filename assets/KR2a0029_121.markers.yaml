  - {type: variant, offset: 2, length: 0, content: '', krp: 詔曰司勲員外郎李延古世荷國㤙兩業相位幸從筮仕累忝寵榮多厯嵗時不趨班列而自遷都卜洛紀律載張去明庭而非遙處别墅而無懼罔思報效姑務便安為臣之節如斯貽厥之謀何在須加懲責以肅朝倫九寺勾稽尚謂寛典可責授衛尉寺主簿司空圖亦追停前詔任從閑適圖唐史有傳舊唐書哀帝紀六月戊申勅前司勲員外郎賜緋魚袋李延古責授衛尉寺主簿九月壬寅勅前大中大夫尚書兵部侍郎賜紫金魚袋司空圖放選中條山盖延古與司空圖同時被劾其降勅則有先後也時全義既不能庇䕶乃密託楊師厚令敬義潛往依之因挈族客居衛州者累年師厚給遺周厚十二年莊宗定河朔史建瑭収新鄉敬義謁見是嵗上遣使迎至魏州署北京留守判官承制拜工部尚書奉使王鎔敬義以逺祖趙郡見鎔展維山之敬鎔遣判官李翥送贊皇集三巻令謁前代碑壠使還歸職太原監軍張承業尤不悦本朝宰輔子孫待敬義甚薄或面折于公宴或指言徳裕過惡敬義不得志鬱憤而卒同光二年贈右僕射五代史闕文司空圖字表聖自言泗州人少有俊才咸通中一舉登進士第惟好為文躁于進取頗自矜伐端士鄙之初從事使府衆登朝驟厯清要巢賊之亂車駕播遷圖有先人舊業在中條山極林泉之美圖自禮部員外郎因避地馬日以詩酒自娯屬天下板蕩士多往依之互相推奬由是聲名藉甚昭宗反正以户部侍郎徵至京師圖既負才慢世謂巳當為宰輔時要惡之稍抑其鋭圖憤憤謝}
  - {type: variant, offset: 3, length: 1, content: 亟, WYG: 復歸中條與人書疏不名官位但稱知非子又稱耐辱居士其所居曰禎貽谿谿上結茅屋命曰休休亭常自為記云臣謹案圖河中虞卿人少有文彩未為鄉里所稱會王疑自尚書郎出為絳州刺史圖以文謁之大為凝所賞歎由是知名未幾疑入知制誥遷中書舍人知貢舉擢圖上第頃之凝出為宣州觀察使辟圖為從事既渡冮御史府奏圖監察下詔迫之圖感知已之恩不忍輕離幕府滿百日不赴闗為臺司所劾遂以本官分司久之徴拜禮部員外郎俄知制誥故集中有文曰戀恩稽命㸃繫洛師于今十年方忝綸閣此豈躁于進取者耶舊史不詳一至于此圖見唐政多僻中官用事知天下必亂即棄官歸中條山尋以中書舍人徵又拜禮户部侍郎皆不起及昭宗播遷華下圖以密邇乗輿即時奔問復辭還山故詩曰多病形容五十年誰憐借笏趂朝參此豈有意于相位耶河中節度使王重榮請圖撰碑得絹數千匹圖致于虞鄉市心恣鄉人所取一日而盡是時盗賊充斥獨不入王官谷河中士人依圖避難全者甚衆昭宗東遷又以兵部侍郎召至洛下為栁璨所阻一謝而退梁祖受禪以禮部尚書徴辭以老疾卒時年八十餘臣又案梁室大臣如敬翔李振杜曉楊涉等皆唐朝舊族本當忠義立身重侯累將三百餘年一旦委質朱梁其甚者贊成弑逆惟圖以清直避世終身不事梁祖故梁史揭圖小瑕以冺大節者良有以也盧汝弼宣和書譜汝弼字子詰祖綸唐貞元中有詩名父簡求為河東節度使汝弼少力學不喜為世胄篤志科舉登進士第文彩秀麗一時士大夫稱之唐昭宗景福中擢進士第厯臺省昭宗自秦遷洛時為祠部郎中知制誥時梁祖凌弱唐室殄滅衣冠懼禍渡河由上黨歸于晉陽初武皇平王行瑜天子許承制授將吏官秩是時藩侯倔强者多偽行墨制武皇恥而不行長吏皆表授及莊宗嗣晉王位承制置吏又得汝弼有若符契由是除補之命皆出汝弼之手既而畿内官吏考課議擬奔走盈門頗以賄賂聞士論少之洎帝平定趙魏汝弼每請謁迎勞必陳説天命顒俟中興帝亦以宰輔期之建國前卒于晉宣和書譜贈兵部尚書李徳休字表逸趙郡贊皇人也祖絳山南西道節度使唐史有𫝊父璋宣州觀察使徳休登進士第厯鹽鐵官渭南尉右補闕侍御史天祐初兩京喪亂乃寓跡河朔定州節度使王處直辟為從事莊宗即位于魏州徵為御史中丞轉兵部吏部侍郎權知左丞以禮部尚書致仕卒時年七十四贈太子少保蘇循父特陳州刺史循咸通中登進士第累厯臺閣昭宗朝再至禮部尚書循性阿諛善承順茍容以希進取昭宗自遷洛之後梁祖凶勢日滋唐室舊臣隂懐主辱之憤名族之胄往往有違禍不仕者唯循希㫖附㑹及梁祖失律于淮南西屯于夀春要少帝欲授九錫朝臣或議是非循揚言云梁王功業顯大厯數有歸朝廷速宜揖讓當時朝士畏梁祖如虎罔敢違其言者明年梁祖逼禪循為冊禮副使梁祖既受命宴于𤣥徳殿舉酒曰朕夾輔日淺代徳未隆置朕及此者羣公推崇之意也楊涉張文蔚慚懼失對致謝而已循與張禕薛貽矩因盛陳梁祖之徳業應天順人之美循自以奉冊之勞旦夕望居宰輔而敬翔惡其為人謂梁祖曰聖祚惟新宜選端士以鎮風俗如循等輩俱無士行實唐家之䲭梟當今之狐魅彼專賣國以取利不可立惟新之朝初循子楷乾寧二年登進士第中使有奏御者云今年進士二十餘人僥倖者半物論以為不可昭宗命學士陸扆馮渥重試於雲韶殿及格者一十四人詔云蘇楷盧賡等四人詩句最畀蕪累頗甚曾無學業敢竊科名凂我至公難從濫進宜副所司落下不得再赴舉塲楷以此慙恨長幸國家之災昭宗遇弑輝王嗣位國命出于朱氏楷始得為起居郎栁璨陷害朝臣衣冠惕息無敢言者初梁祖欲以張廷範為太常卿裴樞以為不可栁璨懼梁祖之毒乃歸過於樞故裴趙罹白馬之禍楷因附璨復依廷範時有司初定昭宗諡號楷謂廷範曰諡者所以表行實前有司之諡先帝為昭宗所謂名實不副司空為樂卿余忝史職典章有失安得不言乃上疏曰帝王御宇察理亂以審汚隆祀享配天資諡號以定升降故臣下君上皆不得而私也先帝睿哲居尊恭儉垂化其于善美孰敢蔽虧然而否運莫興至理猶鬱遂致四方多事萬乘播遷始則宦監凶狂受幽辱于東内終則嬪嬙悖亂罹夭閼於中闈其于易名宜循考行有司先定尊諡曰聖穆景文孝皇帝廟號昭宗敢言溢美似異直書今郊禋有日祫祭惟時將期允愜列聖之心更在詳議新廟之稱庶使叶先朝罪巳之徳表聖上無私之明舊唐書云蘇楷目不知書僅能執筆其文羅衮作也太常卿張廷範奏議曰昭宗初實彰于聖徳後漸減于休明致季述幽辱于前茂貞刼幸于後雖數拘厄運亦道失始終違陵寢于西京徙兆民於東洛軔輦輅未踰于寒署行大事俄起於宫闈謹聞執事堅固之謂恭亂而不損之謂靈武而不遂之謂莊在國逢難之謂閔因事有功之謂襄今請改諡曰恭靈莊閔皇帝廟號襄宗輝王答詔曰勉依所奏哀咽良深楷附會幸災也如是及梁祖即位于汴楷自以遭遇千載之時敬翔深鄙其行尋}
