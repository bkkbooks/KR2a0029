  - {type: variant, offset: 773, length: 212, content: 臣曰世宗頃在仄微尤務韜晦及天命有屬嗣守鴻業不日破高平之陣逾年復秦鳳之封江北燕南取之如拾芥神武雄略乃一代之英主也加以留心政事朝夕不倦摘伏辯姦多得其理臣下有過必面折之常言太祖養成二王之惡以致君臣之義不保其終故帝駕馭豪傑失則明言之功則厚賞之文武參用莫不服其明而懷其恩也所以仙去之日遠近號慕然稟性傷於太察用刑失於太峻及事行之後亦多自追悔逮至末年漸用寬典知用兵之頻併憫黎民之勞苦蓋有意於康濟矣而降年不永美志不就悲夫永樂大典卷八千九百八, WYG: 巻六}
