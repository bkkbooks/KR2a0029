  - {type: variant, offset: 0, length: 0, content: '', krp: 欽定四庫全書舊五代史卷六十宋門下侍郎參知政事監修國史薛居正等撰唐書第三十六列傳十二李襲吉自言左相林甫之後父圖為洛陽令因家焉襲吉乾符末應進士舉遇亂避地河中依節度使李都為擢鹽鐵判官及王重榮代不喜文士時喪亂之後衣冠多逃難汾晉間襲吉訪舊至太原武皇署為府椽出宰榆杜光啟初武皇遇難上源記室沒焉既歸鎮辟掌奏者多不如指或有薦襲吉能文召試稱指即署為掌書記襲吉博學多通尤諳悉國朝近事為文精意練實動据典故無所放縱羽檄軍書辭理宏徤自武皇上源之難與梁祖不協乾寧末劉仁恭負恩其間論列是非交相聘答者數百篇警䇿之句播在人口文士稱之三年遷節度副使從討王行瑜拜右諫議大夫及師還渭北武皇不獲入覲為武皇作違離表中有警句云穴禽有異聽舜樂以猶來天路無梯望堯雲而不到昭宗覽之嘉歎洎襲吉入奏面詔諭之優賜特異北夢瑣言習吉從李克用至渭南令其入奏帝重其文章授諫議大夫使上事北省以榮之其年十二月師還太原王珂為浮梁於夏陽渡襲吉從軍時笮斷航破武皇僅免襲吉墜河得大冰承足沿流七八里還岸而止救之獲免天復中武皇議欲修好於梁命襲吉為書以貽梁祖書曰一别清徳十有餘年失意杯盤爭鋒劒㦸山長水闊難追二國之歡鴈逝魚沈久絶八行之賜比者僕與公實聫宗姓原忝恩知投分深情將期棲託論交馬上薦美朝端傾嚮仁賢未肯疎闕豈謂運由奇特謗起奸邪毒手尊拳交相於暮夜金戈鐵馬蹂踐于明時狂藥致其失歡陳事止于堪笑今則皆登貴位盡及中年蘧公亦要知非君子何勞用壯今公貴先列辟名過古人合縱連衡本務家邦之計擴地守境要存子孫之基文王貴奔奏之交仲尼譚損益之友僕顧慙虚薄舊忝眷私一言許心萬死不悔壯懷忠力猶勝他人盟于三光願赴湯火公又何必終年立敵懇意相窺徇一時之襟靈取四郊之倦弊今日得其小衆明日下其危牆弊師無遺鏃之憂鄰壤抱剥牀之痛又慮悠悠之黨妄瀆聽聞見僕韜勇枕威戢兵守境不量本末誤致窺覦且僕自壯嵗已前業經陷敵以殺戮為東作號兼并為永謀及其首陟師壇躬被公衮天子命我為羣后明公許我以下交所以斂迹愛人蓄兵務徳収燕薊則還其故將入蒲坂而不負前言况五載休兵三邊校士鐵騎犀甲雲屯谷量馬邑兒童皆為鋭將鷲峰宫闕咸作京坻問年猶少于仁明語地幸依于險阻有何覘覩便誤英聰况僕臨戎握兵粗有操斷屈伸進退久貯心期勝則撫三晉之民敗則徵五部之衆長驅席巻反首提戈但慮隳突中原為公後患四海羣謗盡歸仁明終不能見僕一夫得僕一馬鋭師儻失則難整齊請防後艱願存前好矧復隂山部落是僕懿親迴紇師徒累從外舍文靖求始畢之衆元海徵五部之師寛言虚詞猶或得志今僕散積財而募勇輩輦實貨以誘義戎徵其密親㗖以美利控弦跨馬寧有數乎但縁荷位天朝惻心疲瘵峩峩亭障未忍起戎亦望公深識鄙懐洞迴英鑒論交釋憾慮禍革心不聽浮譚以傷霸業夫易惟忌滿道貴持盈儻恃勇以喪師如擎盤而失水為蛇刻鶴幸賜徊翔僕少負褊心天與直氣間謀詭論誓不為之唯將藥石之譚願託金蘭之分儻愚衷未豁彼抱猶迷假令罄三朝之威窮九流之辨遣迴肝膈如俟河清今者執簡吐誠垂願保鑒僕自眷私暌阻翰墨徃來或有鄙詞稍侵英徳亦承嘉論每賜罵言叙歡既罷于尋戈焚謗幸蠲其載筆窮因尚口樂貴和心願袪沈閼之嫌以復塤箎之好今者卜于曩分不欲因人專遣使乎直詣鈴閤古者兵交兩地使在其間致命受辭幸存前志昔賢貴於投分義士難于屈讐若非仰戀恩私安可輕露肝膈悽悽丹慊炳炳血情臨紙嚮風千萬難述梁祖覽之至毒手尊拳之句怡然謂敬翔曰李公斗絶一隅安得此文士如吾之智筭得襲吉之筆才虎傅翼矣又讀至馬邑兒童隂山部落之句梁祖怒謂敬翔日李太原喘喘餘息猶氣吞宇宙可詬罵之及翔為報書詞理非勝由是襲吉之名愈重通鑑考異引唐末見聞録載全忠回書云前年洹水曾獲賢郎去年青山又擒列將盖梁之書檄皆此類也自廣明大亂之後諸侯割據方面競延名士以掌書檄是時梁有敬翔燕有馬郁華州有李巨川荆南有鄭準唐新纂云鄭準士族未第時佐荆門上谷蓮幕飛書走檄不讓古人秉直去邪無慚往哲考準為成汭書記汭封上谷郡王鳳翔有王超北夢瑣言唐末鳳翔判官王超推奉李茂貞挾曹馬之勢牋奏文檄恣意翺翔後為興元留後遇害有鳳鳴集二十巻行于世錢瑭有羅隱魏博有李山甫皆有文稱與襲吉齊名于時襲吉在武皇幕府垂十五年視事之暇唯讀書業文手不釋巻性恬于榮利奬誘後進不以巳能格物參决府事務在公平不交賂遺綽綽有士大夫之風槩焉天祐三年六月以風病卒于太原同光二年追贈禮部尚書王緘幽州劉仁恭故吏也少以刀筆直記室仁恭假以幕職令使鳳翔還經太原屬仁恭阻命武皇留之緘堅辭復命書詞稍抗武皇怒下獄詰之謝罪聽命乃署為推官厯掌書記契丹國志韓延徽傳延徽自契丹奔晉晉王欲置之幕府掌書記王緘嫉之延徽不自安求東歸省母遂復入契丹寓書于晉王叙所以北去之意且曰非不戀英主非不思故鄉所以不留正懼王緘之讒耳從莊宗經略山東承制授檢校司空魏博節度副使緘博學善屬文燕薊多文士緘後生未知名及在太原名位驟達燕人馬郁有盛名于鄉里而緘素以吏職事郁及郁在太原謂緘曰公在此作文士所謂避風之鳥受賜于魯人也每以公宴但呼王緘而巳十年從征幽州既獲仁恭父子莊宗命緘為露布觀其旨趣緘起草無所辭避義士以此少之胡栁之役緘隨輜重前行歿于亂兵際晩盧質還營莊宗問副使所在曰某醉不之知也既而緘凶問至莊宗流涕久之得其喪歸葬太原李敬義本名延古太尉衛公徳裕之孫初隨父煒貶連州遇赦得還嘗從事浙東自言遇涿道士謂之曰子方厄運不宜仕進敬義悚然對曰吾終老賤哉啄曰自此四十三年必遇聖王大任子其志之敬義以為然乃無心仕宦退歸洛南平泉舊業為河南尹張全義所知嵗時給遺特厚出入其門欲署幕職堅辭不就初徳裕之為將相也大有勲于王室出藩入輔綿厯累朝及留守洛陽有終焉之志于平泉置别墅採天下奇花異竹珍木怪石為園池之玩自為家戒序錄志其草木之得處刋于石云移吾片石折樹一枝非子孫也洎巢蔡之亂洛都灰燼全義披榛而創都邑李氏花木多為都下移掘樵人鬻賣園亭掃地矣有醒酒石徳裕醉即踞之最保惜者光化初中使有監全義軍得此石置於家園敬義知之泣謂全義曰平泉别業吾祖戒約甚嚴子孫不肖動違先㫖因託全義請石于監軍他日宴㑹全義謂監軍曰李員外泣告言内侍得衛公醒酒石其祖戒堪哀内侍能迴違否監軍忿然厲聲曰黄巢敗後誰家園池完復豈獨平泉有石哉全義始受黄巢偽命以為詬巳大怒曰吾今為唐臣非巢賊也即署奏笞斃之昭宗遷都洛陽以敬義為司勲員外郎栁璨之陷裴趙諸族希梁祖㫖奏云近年浮薄相扇趨競成風乃有卧邀軒冕視王爵如土梗者司空圖李敬義三度除官養望不至咸宜屏黜以勸事君者}
