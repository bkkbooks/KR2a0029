  - {type: variant, offset: 986, length: 2179, content: 四翌日病亟有詔回戈未到關而晏駕先是世宗之在民間也常夢神人以大傘見遺色如鬱金加道經一卷其後遂有天下及瓦橋不豫之際復夢向之神人來索傘與經夢中還之而驚起謂近侍曰吾夢不祥豈非天命將去耶遂召大臣戒以後事初幽州聞車駕將至父老或有竊議曰此不足憂且天子姓柴幽州為燕地燕者亦煙火之謂也此柴入火不利之兆安得成功卒如其言史臣曰世宗頃在仄微尤務韜晦及天命有屬嗣守鴻業不日破高平之陣逾年復秦鳳之封江北燕南取之如拾芥神武雄略乃一代之英主也加以留心政事朝夕不倦摘伏辯姦多得其理臣下有過必面折之常言太祖養成二王之惡以致君臣之義不保其終故帝駕馭豪傑失則明言之功則厚賞之文武參用莫不服其明而懷其恩也所以仙去之日遠近號慕然稟性傷於太察用刑失於太峻及事行之後亦多自追悔逮至末年漸用寬典知用兵之頻併憫黎民之勞苦蓋有意於康濟矣而降年不永美志不就悲夫永樂大典卷八千九百八十四翌日病亟有詔回戈未到關而晏駕先是世宗之在民間也常夢神人以大傘見遺色如鬱金加道經一卷其後遂有天下及瓦橋不豫之際復夢向之神人來索傘與經夢中還之而驚起謂近侍曰吾夢不祥豈非天命將去耶遂召大臣戒以後事初幽州聞車駕將至父老或有竊議曰此不足憂且天子姓柴幽州為燕地燕者亦煙火之謂也此柴入火不利之兆安得成功卒如其言史臣曰世宗頃在仄微尤務韜晦及天命有屬嗣守鴻業不日破高平之陣逾年復秦鳳之封江北燕南取之如拾芥神武雄略乃一代之英主也加以留心政事朝夕不倦摘伏辯姦多得其理臣下有過必面折之常言太祖養成二王之惡以致君臣之義不保其終故帝駕馭豪傑失則明言之功則厚賞之文武參用莫不服其明而懷其恩也所以仙去之日遠近號慕然稟性傷於太察用刑失於太峻及事行之後亦多自追悔逮至末年漸用寬典知用兵之頻併憫黎民之勞苦蓋有意於康濟矣而降年不永美志不就悲夫永樂大典卷八千九百八十四翌日病亟有詔回戈未到關而晏駕先是世宗之在民間也常夢神人以大傘見遺色如鬱金加道經一卷其後遂有天下及瓦橋不豫之際復夢向之神人來索傘與經夢中還之而驚起謂近侍曰吾夢不祥豈非天命將去耶遂召大臣戒以後事初幽州聞車駕將至父老或有竊議曰此不足憂且天子姓柴幽州為燕地燕者亦煙火之謂也此柴入火不利之兆安得成功卒如其言史臣曰世宗頃在仄微尤務韜晦及天命有屬嗣守鴻業不日破高平之陣逾年復秦鳳之封江北燕南取之如拾芥神武雄略乃一代之英主也加以留心政事朝夕不倦摘伏辯姦多得其理臣下有過必面折之常言太祖養成二王之惡以致君臣之義不保其終故帝駕馭豪傑失則明言之功則厚賞之文武參用莫不服其明而懷其恩也所以仙去之日遠近號慕然稟性傷於太察用刑失於太峻及事行之後亦多自追悔逮至末年漸用寬典知用兵之頻併憫黎民之勞苦蓋有意於康濟矣而降年不永美志不就悲夫永樂大典卷八千九百八十四翌日病亟有詔回戈未到關而晏駕先是世宗之在民間也常夢神人以大傘見遺色如鬱金加道經一卷其後遂有天下及瓦橋不豫之際復夢向之神人來索傘與經夢中還之而驚起謂近侍曰吾夢不祥豈非天命將去耶遂召大臣戒以後事初幽州聞車駕將至父老或有竊議曰此不足憂且天子姓柴幽州為燕地燕者亦煙火之謂也此柴入火不利之兆安得成功卒如其言史臣曰世宗頃在仄微尤務韜晦及天命有屬嗣守鴻業不日破高平之陣逾年復秦鳳之封江北燕南取之如拾芥神武雄略乃一代之英主也加以留心政事朝夕不倦摘伏辯姦多得其理臣下有過必面折之常言太祖養成二王之惡以致君臣之義不保其終故帝駕馭豪傑失則明言之功則厚賞之文武參用莫不服其明而懷其恩也所以仙去之日遠近號慕然稟性傷於太察用刑失於太峻及事行之後亦多自追悔逮至末年漸用寬典知用兵之頻併憫黎民之勞苦蓋有意於康濟矣而降年不永美志不就悲夫永樂大典卷八千九百八十四翌日病亟有詔回戈未到關而晏駕先是世宗之在民間也常夢神人以大傘見遺色如鬱金加道經一卷其後遂有天下及瓦橋不豫之際復夢向之神人來索傘與經夢中還之而驚起謂近侍曰吾夢不祥豈非天命將去耶遂召大臣戒以後事初幽州聞車駕將至父老或有竊議曰此不足憂且天子姓柴幽州為燕地燕者亦煙火之謂也此柴入火不利之兆安得成功卒如其言史臣曰世宗頃在仄微尤務韜晦及天命有屬嗣守鴻業不日破高平之陣逾年復秦鳳之封江北燕南取之如拾芥神武雄略乃一代之英主也加以留心政事朝夕不倦摘伏辯姦多得其理臣下有過必面折之常言太祖養成二王之惡以致君臣之義不保其終故帝駕馭豪傑失則明言之功則厚賞之文武參用莫不服其明而懷其恩也所以仙去之日遠近號慕然稟性傷於太察用刑失於太峻及事行之後亦多自追悔逮至末年漸用寬典知用兵之頻併憫黎民之勞苦蓋有意於康濟矣而降年不永美志不就悲夫永樂大典卷八千九百八十四翌日病亟有詔回戈未到關而晏駕先是世宗之在民間也常夢神人以大傘見遺色如鬱金加道經一卷其後遂有天下及瓦橋不豫之際復夢向之神人來索傘與經夢中還之而驚起謂近侍曰吾夢不祥豈非天命將去耶遂召大臣戒以後事初幽州聞車駕將至父老或有竊議曰此不足憂且天子姓柴幽州為燕地燕者亦煙