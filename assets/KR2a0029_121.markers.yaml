  - {type: variant, offset: 2, length: 0, content: '', WYG: 詔曰司勲員外郎李延古世荷國㤙兩業相位幸從筮仕累忝寵榮多厯嵗時不趨班列而自遷都卜洛紀律載張去明庭而非遙處别墅而無懼罔思報效姑務便安為臣之節如斯貽厥之謀何在須加懲責以肅朝倫九寺勾稽尚謂寛典可責授衛尉寺主簿司空圖亦追停前詔任從閑適圖唐史有傳舊唐書哀帝紀六月戊申勅前司勲員外郎賜緋魚袋李延古責授衛尉寺主簿九月壬寅勅前大中大夫尚書兵部侍郎賜紫金魚袋司空圖放選中條山盖延古與司空圖同時被劾其降勅則有先後也時全義既不能庇䕶乃密託楊師厚令敬義潛往依之因挈族客居衛州者累年師厚給遺周厚十二年莊宗定河朔史建瑭収新鄉敬義謁見是嵗上遣使迎至魏州署北京留守判官承制拜工部尚書奉使王鎔敬義以逺祖趙郡見鎔展維山之敬鎔遣判官李翥送贊皇集三巻令謁前代碑壠使還歸職太原監軍張承業尤不悦本朝宰輔子孫待敬義甚薄或面折于公宴或指言徳裕過惡敬義不得志鬱憤而卒同光二年贈右僕射五代史闕文司空圖字表聖自言泗州人少有俊才咸通中一舉登進士第惟好為文躁于進取頗自矜伐端士鄙之初從事使府衆登朝驟厯清要巢賊之亂車駕播遷圖有先人舊業在中條山極林泉之美圖自禮部員外郎因避地馬日以詩酒自娯屬天下板蕩士多往依之互相推奬由是聲名藉甚昭宗反正以户部侍郎徵至京師圖既負才慢世謂巳當為宰輔時要惡之稍抑其鋭圖憤憤謝}
