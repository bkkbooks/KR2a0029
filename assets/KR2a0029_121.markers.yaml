  - {type: variant, offset: 6, length: 2, content: 回戈, WYG: 云蘇楷髙貽休蕭聞禮等人才寢陋不可塵穢班行並勒歸田里循楷既失所望懼以前過獲罪乃退歸河中依朱友謙莊宗将即位于魏州時百家多缺乃求訪本朝衣冠友謙令赴行臺時張承業}
