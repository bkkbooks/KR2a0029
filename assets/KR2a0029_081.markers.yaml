  - {type: variant, offset: 2333, length: 1185, content: 襄州行營副部署宋彥筠為鄧州威勝軍節度使加檢校太尉山陵禮儀使撰高祖祔饗太廟酌獻樂章上之庚寅詔今後除授留守宜降麻制癸巳樂平公主史氏進封魯國大長公主壽安長公主烏氏進封衞國大長公主鄭國長公主杜氏進封宋國大長公主荊南高從誨累表讓尚書令之命己亥追封故秦國長公主為梁國長公主故永壽長公主為岐國大長公主故延慶長公主為邠國大長公主辛丑以義成軍節度使兼侍衞馬軍都指揮使李守貞充大行皇帝山陵一行都部署壬寅以宣徽北院使判三司劉遂清為鄭州防禦使以澶州防禦使李承福為宣徽北院使癸卯詔大行皇帝十一月十日山陵宜自十月一日至十一月二十日不坐放文武百官朝參甲辰上大行皇帝尊諡寶冊案五代會要天福七年中書門下奏山陵禮儀使狀高祖尊諡號及廟號伏准故事將啟殯宮前擇日命太尉率百僚奉諡冊告天于圜丘畢奉諡冊跪讀于靈前此累朝之制蓋以天命尊極不可稽留今所上高祖聖文章武明德孝皇帝尊諡寶冊伏緣去洛京地遠寶冊難以往來當司詳酌伏請祗差官往洛京奏告南郊太廟其日中書門下文武百官立班中書令侍中升靈座前讀寶冊行告諡之禮舊五代史考異百官素服班於天清殿禮儀使撰進高祖祔饗太廟酌獻樂章舞名禮儀使原本作禮俊使據上文云山陵禮儀使撰高祖祔饗太廟樂章上之蓋先進樂章至此乃請定舞名也原本俊字誤今改正影庫本粘籤請以咸和之舞為名從之冬十月辛亥朔百官素服臨於天清殿襄州利市廟封為順正王仍令本州修崇廟宇癸亥啟攢宮百官衣初喪服入臨甲子靈駕進發帝於朱鳳門外行遣奠之祭辭畢還宮丁丑太保盧質卒贈太子太師諡曰文忠己卯宰臣李崧母喪歸葬深州遣使弔祭之庚辰契丹遣使致祭於高祖賻馬三匹衣三襲十一月庚寅葬高祖皇帝於顯陵壬辰湖南奏前洪州節度使馬希振卒戊戌詔宰臣等分詣寺廟祈雪庚子祔高祖神主於太廟辛丑以右金吾衞大將軍權判三司董遇為三司使詔州郡稅鹽過稅斤七錢住稅斤十錢州府鹽院並省司差人勾當先是諸州府除蠶鹽外每年海鹽界分約收鹽價錢一千七萬貫高祖以所在禁法抵犯者衆遂開鹽禁許通商令州郡配徵人戶食鹽錢上戶千文下戶二百分為五等時亦便之至是掌賦者欲增財利難於驟變前法乃重其關市之征蓋欲絕其興販歸利於官也其後鹽禁如故鹽錢亦徵至今為弊焉是日詔天地宗廟社禝及諸祠祭等訪聞所司承管多不精潔宜令三司預支一年禮料物色於太廟置庫收貯差宗正丞主掌委監察使監當祭器祭服等未備者修製案五代會要敕差宗正丞石載仁專主掌監察御史宋彥昇監庫兼差供奉官陳審璘往洛京于太廟內隱便處修蓋庫屋五間俟畢日催促所支物色監送入庫交付訖取收領文狀歸閣每有祠祭諸司各請禮料至時委監庫御史宋彥昇宗正丞石載仁旋行給付其大祠中祠兼令監察御史檢點小祠即令行事官檢點如致慢易本司准格科罪其祭器未有者修製已有者更仰整飭舊五代史考異十二月辛酉以威武軍節度副使充福建管內諸軍都指揮使王亞澄為威武軍副大使知節度事詔諸道州府每遇大祭祀冬正寒食立春立夏雨雪未晴不得行極刑如有已斷下文案可取次日及雨雪定後施行乙丑以前鄧州節度使安審暉為左羽林統軍以前延州節度使丁審琪, WYG: 張敬詢}
