  - {type: variant, offset: 4608, length: 486, content: 開雕至此始得印本書也今附識於此影庫本粘籤賜帛五十段甲午有白烏棲作枋桐樹作坊使周務掠捕而進之辛丑引進使太府卿孟承誨使契丹詔京百司攝官親公事及五年與授初官癸卯以左諫議大夫司徒詡為給事中左司郎中王仁裕為右諫議大夫前鴻臚卿王均為少府監夏四月戊申朔日有蝕之庚戌以許州節度使趙在禮為徐州節度使以徐州節度使李從溫為許州節度使己巳中書門下奏請以六月二十七日降誕日為啟聖節從之是月河南河北關西諸州旱蝗分命使臣捕之案歐陽史作供奉官張福率威順軍捕蝗于陳州舊五代史考異五月己卯追封皇故長姊為吳國長公主癸未皇姪女永福縣主薨輟朝三日追封平昌郡主丁亥皇第二叔祖贈太師萬友追封秦王皇第三叔祖贈太尉萬銓案原本作詮今從歐陽史改贈太師追封趙王皇伯贈太傅敬儒贈太師追封宋王皇叔贈太尉福王德贈太師追封如故皇叔贈太傅暉贈太師追封韓王皇叔贈太尉通王殷皇叔贈太尉廣王威皇兄贈太傅郯王重裔並贈太師追封如故皇兄贈太師沂王重信追封楚王皇兄贈太傅虢王重乂皇兄贈太師夔王重進皇弟贈太尉陳王重杲等並贈太師追封如故仍令所司擇日冊命辛卯以御史中丞王易簡為尚書左丞以禮部侍郎張允為御史中丞以中書舍人吳承範為禮部侍郎以吏部侍郎王延為尚書右丞, WYG: ''}
