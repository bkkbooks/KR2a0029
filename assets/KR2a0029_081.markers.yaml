  - {type: variant, offset: 1257, length: 0, content: '', WYG: 工部尚書平章事丙辰諫議大夫致仕襲文宣公孔邈卒庚申以王建立孔循帶中書直省吏歸藩並追廻壬戌幽州節度使趙徳鈞兼北靣行營招討使鎭州節度使范延光加檢校太𫝊戊辰中書奏五月一日應在京九品已上官及諸道進奉使請準貞元七年勅就位起居永為恒式從之五月己巳朔帝御文明殿受朝丙子以䕫州節度使西方鄴卒輟朝丁丑大理卿李保殷卒已卯以忠武軍節度使索自通為京兆尹充西京畱守以左威衞上將軍朱漢賔為潞州節度使乙酉以黔州節度使安崇阮為䕫州節度使以左驍衞上將軍張温為洋州節度使以黔州畱後楊漢賔為本州節度使中書奏太常寺定少帝諡昭宣光烈孝皇帝廟號景宗伏以少帝今不入廟難以言宗只云昭宣光烈孝皇帝從之丁亥以鳯州武興軍畱後陳臯為武興軍節度使以新州威塞軍畱後翟璋為威塞軍節度使壬辰以權知尚書右丞崔居儉為尚書右丞詔葺天下廨宇丙申襄州奏荆南高從誨乞歸順雲州奏契丹犯塞六月辛丑以左散騎常}
