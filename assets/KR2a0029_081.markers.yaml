  - {type: variant, offset: 5317, length: 298, content: 考異乙卯以左羽林統軍安審暉為潞州節度使宿州奏飛蝗抱草乾死丙辰貝州奏逃戶凡三千七百遣供奉官衞延韜詣嵩山投龍祈雨戊午以西京留守馬從斌為左監門衞上將軍開封府界飛蝗自死庚申河南府奏飛蝗大下徧滿山野草苗木葉食之皆盡人多餓死禮部侍郎吳承範卒丙寅以將冊皇太后遣尚書左丞王易簡奏告天地陝州奏蝗飛入界傷食五稼及竹木之葉逃戶凡八千一百丁卯以給事中符蒙為禮部侍郎以左諫議大夫裴坦為給事中辛未遣內外臣僚二十八人分往諸道州府率借粟麥案通鑑七月己丑詔以年饑國用不足遣使者六十餘人于諸道括民穀與薛史異舊五代史考異時使臣希旨立法甚峻民間碓磑泥封之隱其數者皆斃之由是人不聊生物情胥怨是月諸州郡大蝗所至草木皆盡永樂大典卷一萬五千六百, WYG: 巻}
