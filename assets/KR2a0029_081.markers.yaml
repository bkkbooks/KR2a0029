  - {type: variant, offset: 3968, length: 321, content: 武臣僚除有公事合隨駕外並先次進發以侍衞親軍使景延廣充御營使癸丑以廣晉尹李德珫權鄴都留守己未車駕發鄴都曲赦都下禁囚甲子次封丘文武百官見於行宮乙丑至東京案遼史作丁未晉主至汴與薛史異五代春秋歐陽史通鑑並從薛史舊五代史考異甲戌以東京留守張從恩為權鄴都留守以皇弟檢校司徒重睿為檢校太保開封尹年幼未出閣差左散騎常侍邊蔚知府事丁丑以前太僕卿薛仁謙為衞尉卿河中逃戶凡七千七百五十九是時天下饑穀價翔踴人多餓殍右金吾衞上將軍劉處讓卒贈太尉三月己卯朔以中書令監修國史趙瑩為晉昌軍節度使以晉昌軍節度使桑維翰為侍中監修國史案通鑑作晉昌節度使兼侍中桑維翰為侍中胡三省注云桑維翰始居藩鎮而兼侍中今入朝正為門下省長官舊五代史考異辛巳以左散騎常侍盧重為祕書監以東京副留守羅周岳, WYG: 寳}
