  - {type: variant, offset: 50, length: 0, content: '', WYG: 未幾移鎭隴右思同好文士無賢不肖必館接賄遺嵗費數十萬在秦州累年邊民懷惠華戎寧息長興元年入朝見于中興殿明宗問秦州邊事對曰秦州與吐蕃接境蕃部多違法度臣設法招懷沿邊置寨四十餘所控其要害每蕃人互市飲食之界上令納器械因手指畫秦州山川要害控扼處明宗曰人言思同不管事豈}
