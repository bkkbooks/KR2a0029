  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書舊五代史巻六十五宋門下侍郎參知政事監修國史薛居正等撰唐書第四十一列傳十七李建及許州人本姓王父質建及少事李罕之為紀綱光啟中罕之謁武皇于晉陽因選部下驍勇者百人以獻建及在籍中後以功署牙職典義兒軍及賜姓名天祐七年}
