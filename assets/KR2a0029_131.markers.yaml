  - {type: variant, offset: 56, length: 3, content: 仁贍固, WYG: 妓使適至乃繫之于獄彥稠請誅審温拘送昭赴闕時思同已遣其子入朝言事朝廷嘉之乃以思同為鳳翔行營都部署起軍營于扶風三月十四日與張虔釗會于岐下梯衝大集十五日進收東西闕城城中戰備不完然死力禦扞外兵傷夷者十二三十六日復進攻其城潞王登陴泣諭于外聞者悲之張虔釗性􅄶詰旦西南用軍與都監皆血刃以督軍士軍士齊詬反攻虔釗虔釗躍馬避之時羽林指揮使楊思權引軍自西門先入思同未之知猶督士登城俄而嚴衛指揮使尹暉呼曰西城軍巳入城受賞矣軍士可解甲弃仗之聲振動天地日午亂軍畢集涇州張從賔邠州康福河中安彥威皆遁去十七日思同與藥彥稠萇從簡俱至長安劉遂雍閉闗不内乃奔潼闗二十二日潞王至昭應前鋒執思同來獻王謂左右曰思同計乖于事然盡心于所奉亦可嘉也顧謂趙}
