  - {type: variant, offset: 1, length: 1, content: 壽, WYG: 匡衛軍都校柏鄉之後汴將韓勍追周徳威至髙邑南野河上鎭定兵扼橋道韓勍選精兵先奪之莊宗登髙而望鎭定兵將衂謂建及曰如賊過橋則勢不可遏卿計如何建及于部選士二百挺搶大譟禦汴軍卻之于橋下二月王師攻魏魏人夜出犯我營建及設伏待之扼其歸路盡殪之劉鄩之營莘縣月餘不出忽一旦縱兵攻鎮定之營軍中騰亂建及率銀搶勁兵千人赴之擊敗汴軍追奔至其壘元城之戰建及首陷其陣授天雄軍教練使八月遷遼州刺史十四年從擊契丹于幽州破之十二月從攻楊劉自寅至午汴軍嬰城拒守建及自負葭葦堙壍率先登梯遂㧞之胡柳之役前軍逗撓際晚汴軍登土山建及一戰奪之莊宗欲收軍詰朝合戰建及横矟當前曰賊大將巳亡乘此易擊王但登山觀臣破賊即引銀槍效節大呼奮擊三軍增氣繇是王師復振以功檢校司空魏博内外衙都將十六年汴將賀瓌攻徳勝南城以戰船十餘艘竹笮維之扼斷津路王師不得渡城中矢石將盡守城將氏延賞危急莊宗令積帛軍門召能破賊船者津人有馬破龍者能水游乃令往見延賞延賞言危窘極矣所爭晷刻時棹船滿河流矢雨集建及被重鎧執矟呼曰豈有一衣帶水縱賊如此乃以二船實甲士皆短兵持斧徑抵梁之戰艦斧其笮又令上流具甕積薪其上順流縱火以攻其艦須臾煙焰騰熾梁軍斷纜而遁建及乃入南城賀瓌解而去其年十二月與汴將王瓚戰于戚城建及傷手莊宗解御衣金帶賜之建及有膽氣慷慨不羣臨陣鞠旅意氣横壯自莊宗至魏州建及都總内外衙銀槍效節帳前親軍善于撫御所得賞賜皆分給部下絶甘分少頗洽軍情又累立戰功雄勇冠絶雌劣者忌䜛之時宦官韋令圖監建及軍每于莊宗前言建及以家財驟施其趣向志意不小不可令典衙兵莊宗因猜之建及性既忠藎雖知讒搆不改其操十七年三月授代州刺史八月與李存審赴河中解同州之圍建及少遇禍亂久從戰陣矢石所中肌無完膚復有功見疑私心憤鬱是嵗卒于太原時年五十七石君立趙州昭慶人也亦謂之石家財初事代州刺史李克柔後隸李嗣昭為牙校厯典諸軍夾城之後君立每出挑戰瓌汴軍柵壘俘擒而還八年與汴軍戰于龍化園敗之獲其大將卜渥以獻嗣昭每出征俾君立為前鋒敵人畏之王檀之逼晉陽也城中無備安金全驅市人以登陴保聚不完時莊宗在魏博救應不暇人心危懼嗣昭遣君立率五百騎自上黨朝發暮至王檀游軍扼汾橋君立一戰敗之徑至城下馳突斬擊出入如神大呼曰昭義侍中大軍至矣是夜入城與安金全等分出諸門擊殺于外遲明梁軍敗走十七年將兵屯徳勝時汴軍自滑州轉餉以給楊村砦莊宗親率騎軍于河外循岸而上邀擊之汴人拒楊村五十里于河曲潘張村築壘以貯軍儲莊宗令諸軍攻之汴人設伏于要路逆戰偽敗王師乘之䠞入壘門梁伏兵起因與血戰君立與鎮州大將王釗隔入賊壘時諸將部校陷賊者十餘人君立被執送于汴梁王素知其驍勇欲用之為將械而下獄久之梁主遣人誘之君立曰敗軍之將難與議勇如欲將我我雖眞誠效命能信我乎人皆有君吾何忍反為仇人哉既而諸將被戮尚惜君立不之害同光元年莊宗至汴前一日梁主始令殺之髙行珪燕人也家世勇悍與弟行周俱有武藝初仕燕為騎將驍果出諸將之右燕帥劉守光僭逆不道莊宗令周徳威征之守光大懼以行珪為武州刺史令張掎角之勢時明宗將兵助徳威平燕俄聞行珪至率騎以禦之明宗諭以逆順之理行珪乃降守光將元行欽在山北聞行珪有變即率部下軍衆以攻行珪行珪遣弟行周告急于周徳威徳威命明宗李嗣本安金全將兵援之明宗破行欽于廣邊軍行欽亦降尋以行珪為朔州刺史厯忻嵐二郡遷雲州留後天成初授鄧}
