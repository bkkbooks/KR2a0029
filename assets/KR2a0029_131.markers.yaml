  - {type: variant, offset: 7, length: 0, content: '', krp: 佐行珪覩其貪猥因强諫之行珪不從後延策因入奏獻封章于闕下事有三條一請不禁過淮猪羊而禁絲緜疋帛以實中國一請于山林要害置軍鎭以絶㓂盜一述藩侯之弊請勅從事明諫諍之不從令諸軍校列班廷諍行珪聞之深銜之後因戍兵作亂誣奏延䇿與之同謀父子俱戮于汴聞者寃之未幾行珪以疾卒詔贈太尉張廷裕代北人也㓜事武皇于雲中從平黄巢討}
