  - {type: variant, offset: 53, length: 2, content: 渡淮, WYG: 言賊臣亂政屬先帝疾篤謀害秦王迎立嗣君自擅權柄以致殘害骨肉搖動蕃垣懼先人基業忽焉墜地故誓必入朝以除君側事濟之後謝病歸藩然藩邸素貧兵力俱困欲希國士共濟急難乃令小伶女十人以五絃技見思同因歡諷動又軍校宋審温者請使于雍若不從命即獨圖之又令推官郝昭府吏朱延乂以書檄起兵會副部署藥彥稠至方宴}
