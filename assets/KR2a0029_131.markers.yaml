  - {type: variant, offset: 50, length: 0, content: '', krp: 未幾移鎭隴右思同好文士無賢不肖必館接賄遺嵗費數十萬在秦州累年邊民懷惠華戎寧息長興元年入朝見于中興殿明宗問秦州邊事對曰秦州與吐蕃接境蕃部多違法度臣設法招懷沿邊置寨四十餘所控其要害每蕃人互市飲食之界上令納器械因手指畫秦州山川要害控扼處明宗曰人言思同不管事豈}
  - {type: variant, offset: 51, length: 0, content: '', WYG: 此耶時兩川叛欲用之且留左右故授右武衛將軍八月授西南面行營馬歩都虞侯九月遷京兆尹西京留守伐蜀之役為先鋒指揮使石敬瑭入大散闗思同恃勇先入劒闗大軍未相繼復被董璋兵逐出之及敬瑭班師思同以曾獲劒門之功移鎮山南西道三年兩州交兵明宗慮併在一人則朝廷難制密詔思同相度形勢即乘間用軍事未行而董璋敗八月復為京兆尹兼西京留守時潞}
