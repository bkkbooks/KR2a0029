  - {type: variant, offset: 40, length: 2, content: 改壽, WYG: 刺史思同母即劉仁恭之女也故思同初事仁恭為帳下軍校會劉守光攻仁恭于大安山思同以部下兵歸太原時年十六武皇命為飛騰指揮使從莊宗平定山東累典諸軍思同性疎俊粗有文性喜為詩什與人唱和自稱薊門戰客魏王繼岌待之若子時内養吕知柔侍興聖宫頗用事思同不平之吕為終南山詩末句有頭字思同和曰料伊直擬衝霄漢賴有青天壓著頭其所為詩句皆此類也每從征必在興聖帳下然同光朝位止鄭}
