  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書舊五代史巻七十二宋門下侍郎參知政事監修國史薛居正等撰唐書第四十八列傳二十四張承業字繼元本姓康同州人咸通中内常侍張泰畜為假子光啟中主郃陽軍事賜紫入為内供奉武皇之討王行瑜承業累奉使渭北因留監武皇軍事賊平改酒坊使三年昭宗將幸太原以承業與武皇善乃除為河東監軍密令迎駕既而昭宗幸華州就加左監門衛將軍駕在鳳翔承業屢請出師晉絳以為岐人犄角崔魏公之誅宦官也武皇偽戮罪人首級以奉詔匿承業于解律寺昭宗遇弑乃復請為監軍夾城之役遣承業求援于鳳翔時河中阻絶自離石渡河春冰方泮凌凘奔䠞艤舟不得渡因禱河神是夜夢神人謂曰子但渡流冰無患既寤津吏報曰河冰合矣凌晨躡冰而濟旋踵冰解使還武皇病篤啟手之夕召承業屬之曰吾兒孤弱羣臣縱横後事公善籌之承業奉遺顧爰立嗣王平内難䇿略居多既終易月之制即請出師救潞破賊夾城莊宗深感其意兄弟之親幸承業私第升堂拜母賜遺優厚時莊宗初行墨制凡除拜之命皆成于盧汝弼之手汝弼既自為户部侍郎乃請與承業改官及開國邑承業拒而不受其後但稱本朝舊官而已天祐中幽州劉守光敗其府掾馮道歸太原承業辟為本院巡官承業重其文章履行甚見待遇時有周𤣥豹者善人倫鑒與道不合謂承業曰馮生無前程公不可過用管書記盧質聞之曰我曾見杜黄裳司空冩真圖道之狀貌酷類焉將來必副大用𤣥豹之言不足信也承業薦為霸府從事焉柏鄉之役王師既迫汴營周徳威慮其奔衝堅請過舍莊宗怒其懦不聽垂帳而寢諸將不敢言事咸詣監軍請白承業遽至牙門褰帳而入撫莊宗曰此非王安寢時周徳威老将洞識兵勢姑務萬全言不可忽莊宗蹶然而興曰子方思之其夕收軍保鄗邑徳威討劉守光令承業往視賊勢因請莊宗自行果成大捷承業感武皇厚遇自莊宗在魏州垂十年太原軍國政事一委承業而積聚餘帑收兵市馬招攘流散勸課農桑成是霸基者承業之忠力也時貞簡太后韓徳妃伊淑妃諸宅王之貴洎王之介弟在晉陽宫或不以其道干于承業悉不聽踰法禁者必懲繇是貴戚斂手民俗丕變或有中傷承業于莊宗者言專㺯威柄廣納賂遺莊宗嵗時還晉陽宫省太后須錢蒱博給伶官嘗置酒于泉府莊宗酣飲命興聖宫使李繼岌為承業起舞既竟承業出寶帶幣馬奉之莊宗指錢積謂承業曰和哥無錢使七哥與此一積寶馬非殊惠也承業謝曰郎君哥勞承業自出巳俸錢此錢是大王庫物准擬支贍三軍不敢以公物為私禮也莊宗不悦使酒侵承業承業曰臣若勑使非為子孫之謀惜錢為大王基業王若自要散施何妨老夫不過財盡兵散一事無成莊宗怒顧元行欽曰取劍來承業引莊宗衣泣而言曰僕荷先王遺顧誓為本朝誅汴賊為王惜庫物斬承業首死亦無愧于先王今日請死閻寶解承業手令退承業詬寶曰黨朱温逆賊未嘗有一言効忠而敢依諂附揮拳踣之太后聞莊宗酒失急召入莊宗性至孝聞太后召叩頭謝承業曰吾杯酒之間忤于七哥太后必怪吾七哥為吾痛飲兩巵分謗可乎莊宗連飲四鍾勸承業竟不飲莊宗歸宫太后使人謂承業曰小兒忤特進巳笞矣可歸第翌日太后與莊宗俱幸其第慰勞之自是私謁幾絶十四年承制授開府儀同三司左衛上將軍燕國公固辭不受是時盧質在莊宗幕下嗜酒輕傲嘗呼莊宗諸弟為豚犬莊宗深衘之承業盧質被禍因乘間謂莊宗曰盧質多行無禮臣請為大王殺之可乎莊宗曰予方招禮賢士以開霸業七哥何言之過也承業因聳立而言曰太王若能如此何憂不得天下其後盧質雖成縱誕莊宗終能容之盖承業為之藻藉也十八年莊宗受諸道勸進將纂帝位承業以為晉王三代有功于國先人怒朱氏弑逆將復舊邦讐既未平不宜輕受推戴方疾作肩輿之鄴宫見莊宗曰王父子血戰三十餘年盖言報國仇讐復唐宗社今元兇未滅民賦已殫而遽先大號蠧耗財力臣以為不可一}
