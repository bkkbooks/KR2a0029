  - {type: 'tls:seg', offset: 1, content: '', id: KR2a0029_ZHSJ_144-d144p61s2}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 自咸通已來伏事宫掖每見國家冊命大禮儀仗法物百司庻務經年草定臨事猶有不可王若化家為國新立廟朝不可乖于制度制禮作樂未見其人臣以為不可二也舉事量力而行不可信于游譚也通鑑攷異引秦再思洛中記異云承業諫帝曰大王何不待誅克梁孽更乎吳蜀俾天下一家且先求唐氏子孫立之復更以天下讓有功者何人輒敢當之讓一月即一月牢讓一年即一年牢設使髙祖再生太原復出又胡為哉}
  - {type: page-break, offset: 2, content: '', id: KR2a0029_WYG_144-5b, image: WYG0277/WYG0277-0587b.png}
  - {type: variant, offset: 2, length: 0, content: '', krp: 自咸通已來伏事宫掖每見國家冊命大禮儀仗法物百司庻務經年草定臨事猶有不可王若化家為國新立廟朝不可乖于制度制禮作樂未見其人臣以為不可二也舉事量力而行不可信于游譚也通鑑攷異引秦再思洛中記異云承業諫帝曰大王何不待誅克梁孽更乎吳蜀俾天下一家且先求唐氏子孫立之復更以天下讓有功者何人輒敢當之讓一月即一月牢讓一年即一年牢設使髙祖再生太原復出又胡為哉}
  - {type: variant, offset: 3, length: 0, content: '', WYG: 大王一旦自立頓失從前仗義征代之㫖人情怠矣老夫是閹官不愛大王官職富貴直以受先王付屬之重欲為大王立萬年之基爾莊宗曰奈諸將何承業知莊宗不從因號泣而言之十九年十一月二日以疾卒于晉陽之第時年七十七貞簡太后聞喪遽至其第盡哀為之行服如兒姪禮同光初贈左武衛上将軍諡曰貞憲五代史闕文莊宗将即位于魏州承業自太原至謂莊宗曰吾王世奉唐家最為忠孝自貞觀以來王室有難未嘗不從所以老奴三十餘年為吾王捃拾財賦召補軍馬者誓滅逆賊朱温復本朝宗社耳今河朔甫定朱氏尚存吾王遽即大位可乎云云莊宗曰奈諸將意何承業知其不可諫止乃慟哭曰諸侯血戰者本為李家今吾王自取之誤老奴矣即歸太原不食而死臣謹案莊宗實録叙承業諫即位事甚詳惟吾王自取之言不書史官諱之也張居翰字徳卿咸通初掖庭令張從玫養之為子以廕入仕中和三年自容管監軍判官入為學士院判官遷樞密承㫖内府令賜緋昭宗在華下超授内常侍出監幽州軍事秩滿詔歸節度使劉仁恭表留之天復中詔誅宦官仁恭紿奏殺之匿于大安山之北谿天佑三年汴人攻滄州仁恭求援于武皇乃遣居翰與書記馬郁等率兵助武皇同攻潞州武皇因留之不遣李嗣昭節制昭義以居翰監其軍以燕軍三千為部下俄而汴將李思安築夾城以圍潞州居翰與嗣昭登城保守以至解圍自是嗣昭每出征令居翰知留後事同光元年夏四月召為樞密使加特進與郭崇韜對掌機務十月莊宗将渡河留居翰與李紹宏同守魏州莊宗入汴加驃騎大將軍知内侍省事依前充樞密使同光時宦官干政邦家之務皆出于郭崇韜居翰自以羇旅乘時擢居重地每于宣授不敢有所是非承顔免過而巳以此脱季年之禍四年三月偽蜀王衍既降詔遷其族于洛陽行及秦川時闗東巳亂莊宗慮衍為變中官向延嗣馳騎賫詔殺之詔云王衍一行並宜殺戮其詔已經印畫時居翰在密地覆視其詔即就殿柱揩去行字}
