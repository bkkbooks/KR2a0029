  - {type: variant, offset: 11, length: 0, content: '', WYG: 明宗鎮常山得侍左右明宗即位自諸司使累遷宣徽南院使漢瓊性通黠善交構初見秦王權重及挾王淑妃勢傾心事之及朱馮用事又與之締結秦王領兵至大津橋時漢瓊與朱馮及康義誠方㑹議于内庭謀猶未决漢瓊獨出死力先入殿門奏于明宗語在秦王𫝊漢瓊即自介馬以召禁軍秦王既誅翼日令漢瓊馳騎召閔帝于鄴通鑑遣漢瓊徵從厚且權知天雄府軍事閔帝嗣位尤恃恩寵期月之内累加開府儀同三司驃騎大將軍西軍既叛閔帝急召漢瓊欲令先入于鄴漢瓊藏匿不行潞王行及陜州乃悉召諸妓妾訣別欲手刃之衆知其心率皆藏竄初潞王失守于河中勒歸于清化里第時王淑妃恒令漢瓊𫝊敎㫖于潞王王善待之故漢瓊自謂潞王于巳有恩至是乃單騎至澠池謁見潞王因自慟哭欲有所陳潞王曰諸事不言可知漢瓊即自預從}
