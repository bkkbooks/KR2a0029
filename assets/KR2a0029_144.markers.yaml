  - {type: variant, offset: 3, length: 0, content: '', krp: 大王一旦自立頓失從前仗義征代之㫖人情怠矣老夫是閹官不愛大王官職富貴直以受先王付屬之重欲為大王立萬年之基爾莊宗曰奈諸將何承業知莊宗不從因號泣而言之十九年十一月二日以疾卒于晉陽之第時年七十七貞簡太后聞喪遽至其第盡哀為之行服如兒姪禮同光初贈左武衛上将軍諡曰貞憲五代史闕文莊宗将即位于魏州承業自太原至謂莊宗曰吾王世奉唐家最為忠孝自貞觀以來王室有難未嘗不從所以老奴三十餘年為吾王捃拾財賦召補軍馬者誓滅逆賊朱温復本朝宗社耳今河朔甫定朱氏尚存吾王遽即大位可乎云云莊宗曰奈諸將意何承業知其不可諫止乃慟哭曰諸侯血戰者本為李家今吾王自取之誤老奴矣即歸太原不食而死臣謹案莊宗實録叙承業諫即位事甚詳惟吾王自取之言不書史官諱之也張居翰字徳卿咸通初掖庭令張從玫養之為子以廕入仕中和三年自容管監軍判官入為學士院判官遷樞密承㫖内府令賜緋昭宗在華下超授内常侍出監幽州軍事秩滿詔歸節度使劉仁恭表留之天復中詔誅宦官仁恭紿奏殺之匿于大安山之北谿天佑三年汴人攻滄州仁恭求援于武皇乃遣居翰與書記馬郁等率兵助武皇同攻潞州武皇因留之不遣李嗣昭節制昭義以居翰監其軍以燕軍三千為部下俄而汴將李思安築夾城以圍潞州居翰與嗣昭登城保守以至解圍自是嗣昭每出征令居翰知留後事同光元年夏四月召為樞密使加特進與郭崇韜對掌機務十月莊宗将渡河留居翰與李紹宏同守魏州莊宗入汴加驃騎大將軍知内侍省事依前充樞密使同光時宦官干政邦家之務皆出于郭崇韜居翰自以羇旅乘時擢居重地每于宣授不敢有所是非承顔免過而巳以此脱季年之禍四年三月偽蜀王衍既降詔遷其族于洛陽行及秦川時闗東巳亂莊宗慮衍為變中官向延嗣馳騎賫詔殺之詔云王衍一行並宜殺戮其詔已經印畫時居翰在密地覆視其詔即就殿柱揩去行字}
  - {type: variant, offset: 4, length: 0, content: '', WYG: 書家字及衍就戮于秦川驛止族其近屬而已其偽官及從行者尚千餘人皆免其枉濫居翰之力也明宗入洛居翰謁見于至徳宫待罪泣涕乞歸田里詔許之乃辭歸長安仍以其子延貴為西京職事以供侍養天成三年四月以疾卒于長安時年七十一居翰性}
  - {type: page-break, offset: 4, content: '', id: KR2a0029_WYG_144-7b, image: WYG0277/WYG0277-0588b.png}
  - {type: variant, offset: 4, length: 0, content: '', krp: 書家字及衍就戮于秦川驛止族其近屬而已其偽官及從行者尚千餘人皆免其枉濫居翰之力也明宗入洛居翰謁見于至徳宫待罪泣涕乞歸田里詔許之乃辭歸長安仍以其子延貴為西京職事以供侍養天成三年四月以疾卒于長安時年七十一居翰性}
  - {type: variant, offset: 5, length: 0, content: '', WYG: 而静諳悉舊事在潞州累年每春課人育蔬種樹敦本惠農有仁者之心焉馬紹宏閹官也初與孟知祥同}
  - {type: variant, offset: 5, length: 0, content: '', krp: 而静諳悉舊事在潞州累年每春課人育蔬種樹敦本惠農有仁者之心焉馬紹宏閹官也初與孟知祥同}
  - {type: variant, offset: 6, length: 0, content: '', WYG: 中門使及周徳威薨莊宗兼領幽州令紹宏權知州事即位之初郭崇韜勲望髙舊在紹宏之下時徵潞州監軍張居翰與崇韜並為樞密使紹宏失望乃以為宣徽使紹宏以巳合當樞密任常鬱鬱側目于崇韜崇韜知其慊也乃置内勾之目令天下錢穀簿書悉委裁遣既而州郡供報輒滋煩費議者以為十羊九牧深所不可内勾之目人以為是妖言以下有闕文據通鑑李嗣源為謠言所屬危殆者數四賴宣徽使李昭宏左右營䕶以是得全天}
  - {type: page-break, offset: 6, content: '', id: KR2a0029_WYG_144-8a, image: WYG0277/WYG0277-0588c.png}
