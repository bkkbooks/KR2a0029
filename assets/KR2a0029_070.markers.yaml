  - {type: variant, offset: 67, length: 2071, content: 考異又令殺諸兄弟天祐九年周德威攻圍幽州守光困令行欽於山北募兵以應契丹時明宗為將攻行欽於山北與之接戰矢及明宗馬鞍既而以勢迫來降案通鑑考異引周太祖實錄云燕城危甲士亡散劉守光召元行欽行欽部下諸將以守光必敗赴召無益乃請行欽為燕帥稱留後行欽無如之何據薛史行欽未嘗自稱留後實錄誤也舊五代史考異明宗憐其有勇奏隸為假子後因從征討恩禮特隆常臨敵擒生必有所獲名聞軍中莊宗東定趙魏選驍健置之麾下因索行欽明宗不得已而遣之時有散指揮都頭名為散員命行欽為都部署賜姓名紹榮莊宗好戰勇于大敵或臨陣有急兵行欽必橫身解鬬翼衞之莊宗營於德勝也與汴軍戰于潘張王師不利諸軍奔亂莊宗得三四騎而旋中野為汴軍數百騎攢矟攻之事將不測行欽識其幟急馳一騎奮劍斷二矛斬一級汴軍乃解圍翼莊宗還宮莊宗因流涕言曰富貴與卿共之自是寵冠諸將官至檢校太傅忻州刺史及莊宗平梁授武寧軍節度使嘗因內宴羣臣使相預會行欽官為保傅當地褥下坐酒酣樂作莊宗生平戰陣之事因左右顧視曰紹榮安在所司奏云有勅使相預會紹榮散官殿上無位莊宗徹會不懌翌日以行欽為同平章事由是不宴百官於內殿但宴武臣而已三年行欽喪婦莊宗有所愛宮人生皇子者劉皇后心忌之會行欽入侍莊宗勞之曰紹榮喪婦復娶耶吾給爾婚財皇后指所忌宮人謂莊宗曰皇帝憐紹榮可使為婦莊宗難違所請微許之皇后即命紹榮謝之未退肩輿已出莊宗心不懌佯不豫者累日業已遣去無如之何及貝州軍亂趙在禮入魏州莊宗方擇將皇后曰小事不勞大將促紹榮指揮可也乃以行欽為鄴都行營招撫使招撫原本作詔拊今從通鑑改正影庫本粘籤領騎二千進討洎至鄴城攻之不能下退保於澶州未幾諸道之師稍集復進軍於鄴城之南及明宗為帥領軍至鄴行欽來謁於軍中拜起之際誤呼萬歲者再明宗驚駭遏之方止既而明宗營於城西行欽營於城南三月八日夜明宗為亂軍所迫唯行欽之軍不動按甲以自固明宗密令張虔釗至行欽營戒之曰且堅壁勿動計會同殺亂軍莫錯疑誤行欽不聽將步騎萬人棄甲而退自知失策且保衞州因誣奏明宗曰鎮帥已入賊軍終不為國使明宗既劫出鄴城令人走馬上章申理其事言臣且於近郡聽進止莊宗覽奏釋然曰吾知紹榮妄矣因令白從訓與明宗子繼璟至軍前欲令見明宗行欽縶繼璟於路明宗凡奏軍機拘留不達故旬日之間音驛斷絕及莊宗出成臯知明宗在黎陽復令繼璟渡河召明宗行欽即殺之仍勸班師四月一日莊宗既崩行欽引皇后存渥得七百騎出師子門將之河中就存霸存霸原本脫存字今據通鑑增入影庫本粘籤沿路部下解散從者數騎而已四日至平陸縣界為百姓所擒縣令裴進折其足案歐陽史作虢州刺史石潭折其足舊五代史考異檻車以獻明宗即位詔削奪行欽在身官爵斬於洛陽永樂大典卷一萬八千一百八十九夏魯奇字邦傑青州人也初事宣武軍為軍校與主將不協遂歸于莊宗以為護衞指揮使從周德威攻幽州燕將有單廷珪元行欽時稱驍勇魯奇與之鬬兩不能解將士皆釋兵縱觀幽州平魯奇功居多梁將劉鄩在洹水洹水原本作桓水今從歐陽史改正影庫本粘籤莊宗深入致師鄩設伏於魏縣西南葭蘆中莊宗不滿千騎案歐陽史作莊宗以百騎覘敵通鑑作百餘騎舊五代史考異汴人伏兵萬餘案通鑑作伏兵五千舊五代史考異大譟而起圍莊宗數重魯奇與王門關烏德兒等奮命決戰自午至申俄而李存審兵至方解魯奇持槍攜劍獨衞莊宗手殺百餘人烏德兒等被擒魯奇傷痍徧體自是莊宗尤憐之歷磁州刺史中都之戰汴人大敗魯奇見王彥章識之單馬追及槍擬其頸彥章顧曰爾非余故人乎即擒之以獻莊宗壯之賞絹千疋案九國志趙庭隱傳王彥章守中都庭隱在其軍中及彥章敗庭隱為莊宗所獲將以就戮大將夏魯奇奏曰此矬也其材可用遂釋之舊五代史考異梁平授鄭州防禦使四年授河陽節度使天成初移鎮許州加同平章事魯奇性忠義尤通吏道撫民有術及移鎮許田孟州之民萬衆遮道斷臥轍五日不發父老詣闕請留明宗令中使諭之方得離州明宗討荊南魯奇為副招討使頃之移鎮遂州案九國志李仁罕傳云夏魯奇稟朝廷之命繕治甲兵將圖蜀孟知祥與董璋謀先取魯奇令仁罕攻遂州董璋之叛與孟知祥攻遂州援路斷絕兵盡食窮案九國志李肇傳蜀師圍夏魯奇于遂州唐師來援劍門不守肇領兵赴普安以拒之唐師不得進魯奇自刎而卒時年四十九帝聞其死也慟哭之厚給其家贈太師齊國公永樂大典卷一萬八千一百二十九姚洪本梁之小校也在梁時經事董璋長興初率兵千人戍閬州璋叛領衆攻閬州璋密令人誘洪洪以大義拒之及璋攻城洪悉力拒守者三日禦備既竭城陷被擒璋謂洪曰爾頃為健兒由吾奬拔至此吾書誘諭投之於側何相負耶洪大罵曰老賊爾為天子鎮帥何苦反耶爾既辜恩背主吾與爾何恩而云相負爾為李七郎奴掃馬糞得一臠殘炙感恩無盡今明天子付與茅土貴為諸侯而驅徒結黨圖為反噬爾本奴才則無恥吾忠義之士不忍為也吾可為天子死不能與人奴苟生璋怒令軍士十人持刀刲割其膚燃鑊於前自取啗食洪至死大罵不已明宗聞之泣下置洪二子於近衞給賜甚厚永樂大典卷一萬八千一百八十九李嚴幽州人本名讓坤初仕燕為刺史涉獵書傳便弓馬有口辯多遊藝以功名自許同光中為客省使奉使於蜀及與王衍相見陳使者之禮因於笏記中具述莊宗興復之功其警句云纔過汶水汶水原本作濟水今從冊府元龜改正影庫本粘籤縛王彥章於馬前旋及夷門斬朱友貞於樓上嚴復聲韻清亮蜀人聽之愕然時蜀偽樞密使宋光嗣召嚴曲宴因以近事訊於嚴嚴對曰吾皇前年四月即位於鄴宮當月下鄆州十月四日親統萬騎破賊中都乘勝鼓行遂誅汴孽偽梁尚有兵, WYG: 巻}
