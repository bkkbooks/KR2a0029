  - {type: variant, offset: 2453, length: 2016, content: 異嚴與先鋒使康延孝將兵五千先驅閣道閣道原本作闕道今從通鑑改正影庫本粘籤或馳以詞說或威以兵鋒大軍未及所在降下延孝在漢州王衍與書曰可請李司空先來余即舉城納款衆咸以討蜀之謀始於嚴衍以甘言將誘而殺之欲不令往嚴聞之喜即馳騎入益州案歐陽史仍薛史作益州吳縝纂誤云成都唐初雖嘗有益州之名尋即改為蜀都後遂升為府自唐末歷五代不復謂之益州而古益州實不在此舊五代史考異衍見嚴於母前以母妻為託即日引蜀使歐陽彬迎謁魏王繼岌蜀平班師會明宗即位遷泗州防禦使兼客省使長興初安重誨謀欲控制兩川嚴乃求為西川兵馬都監庶効方略孟知祥覺之既至執而害之案九國志王彥銖傳李嚴之為監軍也密懷異謀知祥數其過命彥銖擒斬之嚴之左右無敢動者舊五代史考異贈太保嚴之母賢明婦人初嚴將赴蜀母曰汝前啟破蜀之謀今又入蜀將死報蜀人矣與汝永訣既而果如其言永樂大典卷一萬三百八十九李仁矩本明宗在藩鎮時客將也明宗即位錄其趨走之勞擢居內職復為安重誨所庇故數年之間遷為客省使左衞大將軍天成中因奉使東川董璋張筵以召之仁矩貪於館舍與倡妓酣飲日既中而不至大為璋所詬辱自是深銜之長興初璋既跋扈於東川重誨奏以仁矩為閬州節度使俾伺璋之反狀時物議以為不可及仁矩至鎮偵璋所為曲形奏報地里遐僻朝廷莫知事實激成璋之逆節由仁矩也長興元年冬十月璋自率凶黨以攻其城案九國志趙季良傳云朝廷以夏魯奇李仁矩分鎮遂閬季良言於孟知祥曰朝廷增兵二鎮張掎角之勢將有不測之變也公處親賢之地以忠信見疑儻失先機則禍不旋踵矣知祥曰計將安出季良曰我甲兵雖衆而勢孤易動請與東川董璋合從先平遂閬則朝廷兵至我無內顧之憂矣知祥從之蓋董璋之攻閬州其謀皆由于知祥也仁矩召軍校謀守戰利害皆曰璋久圖反計以賂誘士心凶氣方盛未可與戰宜堅壁以守之儻旬浹之間大軍東至即賊必退仁矩曰蜀兵懦安能當我精甲即驅之出戰兵未交為賊所敗既而城陷仁矩被擒舉族為璋所害永樂大典卷一萬三百八十九康思立晉陽人也少善騎射事武皇為爪牙署河東親騎軍使莊宗嗣位從解圍於上黨敗梁人於柏鄉及平薊丘後戰於河上皆有功累承制加檢校戶部尚書右突騎指揮使莊宗即位繼改軍帥賜忠勇拱衞功臣加檢校尚書右僕射天成元年授應州刺史尋移嵐州充北面諸蕃部族都監三年遷宿州團練使四年領昭武軍節度利巴集等州觀察處置等使改賜耀忠保節功臣長興初朝廷舉兵討東川董璋詔兼西面行營軍馬都指揮使二年移鎮陝州案通鑑潞王至靈寶思立謀固守陝城以俟康義誠先是捧聖五百騎戍陝為潞王前鋒至城下呼城上人曰禁軍十萬已奉新帝爾輩數人奚為徒累一城人塗地耳于是捧聖卒爭出迎思立不能禁亦出迎舊五代史考異清泰初改授邢臺累官至檢校太傅封會稽郡開國侯二年入為右神武統軍三年充北面行營馬軍都指揮使是歲閏十一月卒於軍年六十三思立本出陰山諸部性純厚善撫將士明宗素重之故即位之始以應州所生之地授焉其後歷三郡三鎮皆得百姓之譽末帝以其年高徵居環衞及出幸懷州以北師不利乃命思立統駕下騎軍赴團柏谷以益軍勢俄而楊光遠以大軍降於太原思立因憤激疾作而卒焉晉高祖即位追其宿舊為輟朝一日贈太子少師永樂大典卷一萬八千一百二十九案歐陽史作太子少傅舊五代史考異張敬達字志通代州人小字生鐵父審素有勇事武皇為列校歷廳直軍使同光初卒於軍敬達少以騎射著名莊宗知之召令繼父職平河南有功繼加檢校工部尚書明宗即位歷捧聖指揮使檢校尚書左僕射長興中改河東馬步軍都指揮使超授檢校司徒領欽州刺史三年加檢校太保應州節度使四年遷雲州時以契丹率族帳自黑榆林捺剌泊至沒越泊云借漢界水草敬達每聚兵塞下以遏其衝契丹竟不敢南牧邊人賴之清泰中自彭門移鎮平陽加檢校太傅從石敬瑭為北面兵馬副總管仍屯兵鴈門未幾晉高祖建義末帝詔以敬達為北面行營都招討使案歐陽史作太原四面招討使舊五代史考異仍使悉引部下兵圍太原以定州節度使楊光遠副焉尋統兵三萬營于晉安鄉末帝自六月繼有詔促令攻取敬達設長城連柵雲梯飛礮使工者運其巧思窮土木之力時督布者每有所構則暴風大雨平地水深數尺而城柵崩墮竟不能合其圍九月契丹至敬達大敗尋為所圍原本脫所圍二字今據冊府元龜增入影庫本粘籤晉高祖及蕃衆自晉安寨南門外長百餘里闊五十里布以帳用毛索鈴而部伍多犬以備警急營中嘗有夜遁者出則犬吠鈴動跬步不能行焉自是敬達與麾下部曲五萬人馬萬疋無由四奔但見穹廬如崗阜相屬諸軍相顧失色始則削木篩糞以飼其馬日望朝廷救軍及漸羸死則與將士分食之馬盡食殫副將楊光遠次將安審琦知不濟勸敬達宜早降以求自安敬達曰吾受恩於明宗位歷方鎮主上授我大柄而失律如此已有愧於心也今救軍在近旦暮雪恥有期諸公何相迫耶待勢窮則請殺吾攜首以降亦未為晚光遠審琦知敬達意未決恐坐成魚肉遂斬敬達以降案契丹國志楊光遠謀害張敬達諸將高行周陰為之備敬達疎于防禦推遠行周等清晨光遠上謁見敬達左右無人遂殺之舊五代史考異末帝聞其歿也愴慟久之時戎王告其部曲及漢之降者曰為臣當如此人令部人收葬之晉高祖即位後所有田宅咸賜其妻子焉時議者以敬達嘗事數帝亟立軍功及領藩郡不聞其濫繼屯守塞垣復能撫下而臨難固執不求苟免乃近代之忠臣也晉有天下不能追懋官封賞其事蹟非激忠之道也永樂大典卷六千六百五十一, WYG: 證}
