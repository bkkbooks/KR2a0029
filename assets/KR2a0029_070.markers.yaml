  - {type: variant, offset: 2250, length: 202, content: 海車書大同非晚光嗣曰余所未知唯岐下宋公我之姻好洞見其心反覆多端專謀跋扈大不足信也似聞契丹部族近日稍強大國可無慮乎嚴曰子言契丹之強盛孰若偽梁曰比梁差劣也嚴曰吾國視契丹如蚤蝨耳以其無害不足爬搔吾良將勁兵布天下彼不勞一郡之兵一校之衆則懸首街盡為奴擄但以天生四夷當置度外不在九州之本未欲窮兵黷武也光嗣聞辯對畏而奇之時王衍失政嚴知其可取使還具奏故平蜀之謀始於嚴郭崇韜起軍之日以嚴為三川招撫使案歐陽史作招討使舊五代史, WYG: ''}
