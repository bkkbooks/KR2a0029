  - {type: variant, offset: 61, length: 2, content: 大恩, WYG: 四月丁亥朔是書莊宗紀作丁丑明宗紀作丁亥前後互異攷是年正月戊午朔三月丁未朔則四月朔日當為丁丑五坊人善友案通鑑作鷹坊人善友胡三省注云鷹坊唐時五坊之一也善姓也按巴堅舊作阿保機今改阿都欲舊作阿咄欲今改}
