  - {type: variant, offset: 123, length: 232, content: 千餘戶及下車革前弊二十餘事逃民歸復賜詔褒美後歷鄧陝二鎮陽城之役周時為定州節度使大軍往來供饋無闕未幾遷鎮州節度使周稟性寬惠人庶便之開運末杜重威降於契丹引契丹主臨城諭之周泣曰受國重恩不能死戰而以兵降何面南行見人主與士大夫乎乃痛飲欲引決家人止之事不獲已及見契丹主授鄧州節度使檢校太師高祖定天下移鎮徐州加同平章事乾祐元年二月以疾卒於鎮輟視朝二日贈中書令周性寬恕不忤物情初刺信都州城西橋敗覆民租車周曰橋梁不飭刺史之過也乃還其所沈粟出私財以修之民庶悅焉永樂大典卷一萬八千一百三, WYG: ''}
