  - {type: 'tls:seg', offset: 1529, content: '', id: KR2a0029_ZHSJ_106-d106p7s23}
  - {type: variant, offset: 1529, length: 289, content: 漢球以目疾年高辭郡帝曰廣平小郡卿臥理有餘無以疾辭至郡未朞復以目疾請代而免乾祐二年秋卒於京師漢球雖出自行伍然長於撫理常以掊斂為戒民懷其惠身死之日家無餘財有管迥者漢球守郡日辟為判官及漢球卒於汴迥在洺州未之知一日忽謂所親曰太保遣人召我遂沐浴新衣冠無疾瞑目而終家人不知其故後數日方聞漢球卒永樂大典卷一萬八千一百三十二張瓘同州車渡村人故太原監軍使承業之猶子也承業唐書有傳唐天祐中承業佐唐武皇莊宗有功甚見委遇瓘聞之與昆仲五人自故里奔于太原莊宗皆任用之瓘天祐十三年補麟州刺史承業治家嚴毅小過無所容恕一姪為磁州副使以其殺河西賣羊客承業立捕斬之常誡瓘等曰汝車渡村百姓劉開道下賊劉開道下賊疑有脫字據, WYG: 仍}
