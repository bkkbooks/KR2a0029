  - {type: variant, offset: 4, length: 118, content: 卷一百六漢書八列傳第三王周魏州人少勇健從軍事唐莊宗明宗稍遷裨校以戰功累歷郡守晉天褔初天褔原本誤作天祉今據文改正影庫本粘籤范延光叛於魏州周從楊光遠攻降之安重榮以鎮州叛從杜重威討平之以功授貝州節度使歲餘移鎮涇州先是前帥張彥澤在任苛虐部民逃者, WYG: 巻}
