  - {type: variant, offset: 2500, length: 477, content: 代史考異時契丹守中山在明出師經略契丹乃棄城而去遂授鎮州留後乾祐元年五月正授鎮州節度使六月以疾卒于鎮贈侍中永樂大典卷九千九十九馬萬澶州人也少從軍善水游唐莊宗與梁軍對壘於河上莊宗於德勝渡夾河立南北寨會梁軍急攻南寨立南北寨原本脫會梁軍急攻南寨七字今據冊府元龜增入影庫本粘籤於中流聯戰艦以絕援路晝夜攻城者三日寨將氏延賞告急於莊宗莊宗隔河望敵無如之何乃召人能水游破賊者時萬兄弟皆應募遂潛行入南寨往來者三又助燒船艦汴軍遂退由此升為水軍小校漸典禁軍遙領刺史累遷奉國左廂都指揮使泗州防禦使晉天福二年夏范延光叛於鄴牙將孫銳率兵至黎陽朝廷遣侍衞馬軍都指揮使白奉進領兵渡滑州萬亦預其行時滑州節度使符彥饒潛通鄴下殺白奉進於牙署案薛史晉列傳符彥饒以忿爭殺白奉進非潛通鄴下也此傳蓋沿實錄傳聞之誤通鑑從晉列傳舊五代史考異萬領本軍兵士將助亂會奉國右廂都指揮使盧順密亦以兵至諭以逆順萬不得已與順密急趨公府執彥饒生送闕下朝廷即以萬為滑州節度使而盧順密酬之甚淺居無何晉高祖稍知其事即以順密為涇州兵馬留後漸薄於萬萬鎮鄧州未幾罷鎮授上將軍以目疾致仕乾祐三年四月卒輟視朝一日永樂大典卷一萬八千一百三, WYG: ''}
