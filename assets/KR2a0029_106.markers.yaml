  - {type: variant, offset: 788, length: 644, content: 母在洛孤危自處一旦為蕭翰所逼致令及此但遣人迎請太原勿以予子母為事或曰收拾諸處守營兵士與燕軍足以把城把城原本作將城今從通鑑改正影庫本粘籤以俟河北救應可也妃曰非謀也我子母亡國之餘安敢與人爭天下衆議籍籍猶以把城為詞審交曰余燕人也今城有燕軍固合為燕謀然事機有所不可此城經敵軍破除之後民力空匱餘衆幸存若更謀之不臧閉門拒守一月之內無復遺類諸軍勿言宜從太妃處分繇是從益遣使往太原貢奉高祖至汴罷使歸班隱帝嗣位用為汝州防禦使汝為近輔號為難治審交盡去煩弊無擾於民百姓歌之乾祐二年春卒年七十四郡人聚哭柩前所列狀乞留葬本州界立碑起祠以時致祭本州以聞詔曰朝廷之制皆有舊章牧守之官比無贈典其或政能殊異惠及蒸黎生有令名沒留遺愛褒賢奬善豈限彝章可特贈太尉吏民所請宜依故相國太師秦國公馮道聞之曰予嘗為劉汝州僚佐知其為人廉平慈善無害之良吏也刺遼磁治陳襄青皆稱平允不顯殊尤其理汝也又安有異哉民之租賦不能減也徭役不能息也寒者不能衣也餒者不能食也百姓自汲汲然而使君何有於我哉然身死之日致黎民懷感如此者誠以不行鞭朴不行刻剝不因公而循私不害物以利己確然行良吏之事薄罰宥過謹身節用節用原本脫用字今從冊府元龜增入影庫本粘籤安俸祿守禮分而已凡從事於斯者孰不能乎但前之守土者不能如是是以汝民咨嗟愛慕今天下戎馬之後四方兇盜之餘杼軸空而賦斂繁人民稀而倉廩匱謂之康泰未易輕言侯伯牧宰若能哀矜之不至聚斂不殺無辜之民民為邦本政為民本和平寬易即劉君之政安足稱耶復何患不至於令名哉道仍為著哀詞六章鐫於墓碑之陰焉永樂大典卷九千九十九武漢球澤州人也少拳勇潞帥李, WYG: ''}
