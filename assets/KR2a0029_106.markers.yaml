  - {type: variant, offset: 2071, length: 347, content: 遺安安既北走殷匿於丘墓獲免馳以歸我高祖嘉其首赴朝闕及魏州平以甘陵乏帥乃命殷為貝州節度使加檢校太傅乾祐初卒於鎮詔贈太師永樂大典卷一萬三百九十劉在明幽州人少有膽氣本州節度使劉守光用為親信出為平塞軍使守光敗歸於太原唐莊宗收為列校明宗時為捧聖左廂都指揮使領和州刺史從幸汴州至滎陽聞朱守殷叛用為前鋒至汴城率先登城賊平授汴州馬步軍都指揮使應順初為貝州刺史明年移趙州兼北面行營馬軍都指揮使以軍戍易州清泰末幽州節度使趙德鈞引軍赴團柏谷路由易州取在明軍從及德鈞兵敗在明奔歸懷州唐末帝令與萇從簡同守河陽晉祖至乃迎之京都事定出為單州刺史天福中李金全以安州叛安州原本作要州今據通鑑改正影庫本粘籤在明從李守貞攻之大破淮賊以功授安州防禦使明年移絳州楊光遠據青州叛召為行營馬步軍都指揮使領齊州防禦使青州平遷相州留後歷邢州晉州, WYG: ''}
