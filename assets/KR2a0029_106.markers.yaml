  - {type: variant, offset: 2979, length: 1376, content: 李彥從字士元汾州孝義人父德麟州司馬彥從少習武藝出行伍間高祖典禁軍以鄉里之舊任為親信國初用為左飛龍使檢校司空鎮州逐敵之際請兵于朝廷高祖令彥從率軍赴之乾祐初領恩州刺史趙暉討王景崇于岐下彥從為兵馬都監破川軍有功賊平授濮州刺史治有政能百姓悅之乾祐三年冬卒於郡永樂大典卷一萬三百九十郭謹字守節太原晉陽人謹少從軍能騎射歷河中教練使晉天福中遷奉國右廂都指揮使領禺州刺史三年轉奉國左廂都指揮泗州防禦使歲餘授侍衞步軍都指揮使兼寧江軍節度使六年從幸鄴七年晉祖崩少帝即位授彰德軍節度使領軍如故開運初出授鄜州二年入為左神武統軍三年復鎮鄜州高祖踐阼以鄉國舊臣加檢校太尉移鎮滑臺乾祐初復授彰德軍節度使二年就加檢校太師三年入朝加食邑是歲冬十月卒於位年六十輟視朝二日贈侍中永樂大典卷二萬二千一百六十一皇甫立代北人也唐明宗之刺代州署為牙校從歷藩鎮性純謹明宗深委信之王建立安重誨策名委質皆在立後明宗踐阼以立為忻州刺史長興末轉洺州團練使應順初遷鄜州節度使檢校太保清泰三年春移鎮潞州未幾改華州晉天福中授左神武統軍少帝即位歷左金吾衞上將軍累官至檢校太尉高祖定天下授特進太子太師致仕乾祐二年秋卒永樂大典卷一萬九百七十一白再榮本蕃部人也案歐陽史作不知其世家何人也舊五代史考異少從軍累遷護聖左廂指揮使晉末契丹犯闕明年契丹主北去再榮從帳至真定其年閏七月晦李筠何福進相率殺契丹帥麻答據甲仗庫敵勢未退筠等使人召再榮再榮端坐本營遲疑久之為軍吏所迫乃行翊日逐出麻答諸軍以再榮名次在諸校之右乃請權知留後事案東都事略李筠傳筠請馮道領節度道曰予主奏事而已留後事當議功臣為之以諸將之甲者為留後舊五代史考異再榮貪昧無決舉止多疑出入騎從露刃注矢諸校不相統攝互有猜貳奉國廂主王饒懼為再榮所幷乃據東門樓以兵自衞偽稱足疾不敢見再榮司天監趙延乂俱與之善乃來往解釋遂無相忌之意再榮以李崧和凝攜家在彼令軍士數百人環迫崧凝以求賞給崧凝各出家財與之再榮欲害崧以利其財前磁州刺史李穀謂再榮曰公與諸將為契丹所擄凌辱萬端旦夕憂死今日衆力逐出蕃戎鎮民死者不下三千人豈獨公等之功纔得生路便擬殺一宰相他日到闕儻有所問何以為辭再榮默然再榮又欲括率在城居民家財以給軍士李穀又譬解之乃止其漢人曾事麻答者盡拘之以取其財高祖以再榮為鎮州留後為政貪虐難狀鎮人呼為白麻答未幾移授滑州節度使箕斂誅求民不聊生乃徵還京師周太祖入京城軍士攻再榮之第迫脅再榮盡取財貨既軍士前啟曰某等軍健常趨事麾下一旦無禮至此今後何顏謁見即奮刃擊之挈其首而去後家人以帛贖葬之永樂大典卷一萬八千一百三十三張鵬鎮州鼓城人幼為僧知書有口辯喜大言後歸俗唐末帝為潞王時鵬往依焉及即位用為供奉官累監軍旅晉開運中契丹迫澶州澶州原本作泹州今從通鑑改正影庫本粘籤鵬為前鋒監押奮身擊敵被創而還其後累於邊城戍守士伍服其勇乾祐初授鎮州副使過鄴城高行周接之甚歡鵬因言及晉朝傾亡之事少帝任用失人藩輔之臣唯務積財富家不以國家為意以至宗社泯滅非獨帝王之咎也行周性寬和不以鵬言為過鵬既退行周左右謂行周曰張副使之言蓋譏令公也行周因發怒遂奏鵬怨國訛言故朝廷降詔就誅於常山時乾祐元年七月也永樂大典卷六千三百五十一史臣曰晉漢之際有以懋軍功勤王事取旌旄符竹者多矣其間有及民之惠者無幾焉如王周之閫政審交之民譽蓋其優者也漢球張瓘抑又次焉是宜紀之篇以示來者其餘皆不足觀也已張鵬以一言之失遽滅其身亦足誡後代多言橫議之徒歟永樂大典卷六千三百五十一, WYG: 攷證}
