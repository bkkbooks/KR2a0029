  - {type: variant, offset: 3970, length: 1480, content: 侍衞馬軍都指揮使梁漢璋充馬軍左右廂都指揮使侍衞步軍都指揮使李殷充步軍左右廂都指揮使左神武統軍張彥澤充馬軍左右廂都排陣使右神武統軍潘環充步軍左右廂排陣使丙申以端明殿學士尚書戶部侍郎馮玉為戶部尚書充樞密使三月戊戌契丹陷祁州祁州原本作祈今從五代春秋改正影庫本粘籤刺史沈斌死之乙巳左補闕袁範先陷契丹自賊中逃歸杜威奏與李守貞馬全節安審琦皇甫遇部領大軍赴定州易州刺史安審約奏二月三夜差壯丁斫敵營殺賊千餘人是日以符彥卿為北面行營馬步軍左右廂都排陣使以皇甫遇為北面行營馬步軍左廂排陣使以王周為馬步軍右廂排陣使丁未畋於戚城還幸景延廣安審信軍庚戌王師攻泰州刺史晉庭謙以城降易州奏郎山塞將孫方簡破契丹千餘人案歐陽史作孫方諫舊五代史考異郎山宋史作狼山東都事略仍作郎山蓋地名多用對音字今仍其舊影庫本粘籤斬蕃將諧里相公擄其妻以獻甲寅杜威奏收復滿城獲契丹首領沒剌相公幷蕃漢兵士二千人以前戶部尚書李懌為兵部尚書乙卯杜威奏收復遂城丙辰奏大軍自遂城却退至滿城時賊將趙延壽部曲來降言契丹主昨至古北口幽州走報漢軍大下收却泰州尋下令諸部令輜重入塞輕騎却迴戎王率五萬餘騎來勢極盛明日前鋒必至請為之備杜威李守貞謀曰我師糧運不繼深入賊疆而逢大敵亡之道也不如退還泰州觀其兵勢強弱而禦之軍士皆以為然是日還滿城丁巳至泰州戊午契丹前鋒已至己未大軍發泰州而南契丹踵其後是日次陽城庚申賊騎如牆而來我步軍為方陣以禦之選勁騎擊賊鬬二十餘合南行十餘里賊勢稍却渡白溝而去案通鑑庚申契丹大至晉軍與戰逐北十餘里契丹踰白溝而去歐陽史庚申杜威及契丹戰于陽城敗之俱與薛史同惟遼史云己未重威守貞引兵南遁追至陽城大敗之復以步卒為方陣來拒與戰二十餘合是遼師未嘗言敗也蓋當時南北軍俱有掩飾故紀載不同如此舊五代史考異辛酉杜威召諸將議曰戎首自來實為勍敵若不血戰吾輩何以求免諸將然之是日敵騎還遶官軍相去數里明日我軍成列而行蕃漢轉鬬殺聲震地纔行十餘里軍中人馬飢乏癸亥大軍至白團衞村下營案歐陽史作衞村通鑑考異引漢高祖實錄作白檀遼史從薛史舊五代史考異人馬俱渴營中掘井及水輒壞兵士取其泥絞汁而飲敵衆圍繞漸束其營案宋史藥元福傳晉師列方陣設拒馬為行砦契丹以奇兵出陣後斷糧道舊五代史考異是日東北風猛揚塵折樹契丹主坐車中謂衆曰漢軍盡來祇有此耳今日並可生擒然後平定天下令下馬拔鹿角飛矢雨集軍士大呼曰招討使何不用軍而令士卒虛死諸將咸請擊之杜威曰俟風勢稍慢觀其進退守貞曰此風助我也彼衆我寡黑風之內莫測多少若俟風止我輩無噍類矣即呼諸軍齊力擊賊張彥澤符彥卿皇甫遇等率騎奮擊風勢尤猛沙塵如夜敵遂大敗案宋史符彥卿傳時晉師居下風將戰弓弩莫施彥卿謂張彥澤皇甫遇曰與其束手就擒曷若死戰然未必死彥澤然之遂潛兵尾其後順風擊之契丹大敗又藥元福傳守貞與元福謀曰軍中饑渴已甚若候風反出戰吾屬為虜矣彼謂我不能逆風以戰宜出其不意以擊之此兵家之奇也元福乃率麾下開拒馬出戰諸將繼至契丹大敗舊五代史考異時步騎齊進追襲二十餘里至陽城東賊軍稍稍成列我騎復擊之乃渡河而去按晉師敗契丹于陽城在三月癸亥遼史與薛史同歐陽史作庚申誤守貞曰今日危急極矣幸諸君奮命吾事獲濟兩日以來人馬渴乏今喫水之後脚重難行速宜收軍定州保全而還上策也由是諸將整衆而還是時契丹主坐車中及敗走車行十餘里追兵既急獲一橐乘之而走乙丑杜威等大軍自定州班師入恆州夏四月丙子以車駕將還京差官往西京告天地宗廟社稷辛巳駕發澶州甲申至京師曲赦在京禁囚己亥己亥以前後干支推之作丁亥今無別本可考姑仍其舊影庫本粘籤詔鄴都依舊為天雄軍庚寅河東節度使劉知遠封北平王恆州節度使杜威加守太傅徐州趙在禮移鎮兗州宋州節度使兼侍衞親軍馬步都指揮使高行周移鎮鄆州侍衞如故鄴都留守馬全節改, WYG: ''}
