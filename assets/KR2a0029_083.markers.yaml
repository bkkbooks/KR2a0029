  - {type: variant, offset: 2151, length: 510, content: 加同平章事封閩國王丁巳青州楊光遠降光遠子承勳等斬觀察判官邱濤牙將白延祚楊贍杜延壽等首級送於招討使李守貞乃縱火大譟劫其父處於私第以城納款遣即墨縣令王德柔貢表待罪楊光遠亦遣節度判官楊麟奉表請死詔釋之閏月庚午以楊承信為右羽林將軍承祚為右驍騎衞將軍皆光遠之子先詣闕請罪故特授是官癸酉李守貞奏楊光遠卒初光遠既上表送降帝以光遠頃歲太原歸命欲曲全之議者曰豈有反狀滔天而赦之也乃命守貞便宜處置守貞遣人拉殺之以病卒聞乙酉前登州刺史張萬迪削奪官爵處斬青州節度判官楊麟配流威州掌書記任邈配流原州支使徐晏配流武州縱逢恩赦不在放還之限並以楊光遠叛故也工部尚書權知貢舉竇貞固奏試進士諸科舉人入策舊例夜試以三條燭盡為限天成二年改令晝試今欲依舊夜試從之曲赦青州管內罪人立功將士各賜優給青州吏民為楊光遠詿誤者一切不問青州行營招討使兗州節度使兼侍衞都虞候李守貞加同平章事副招討使河陽節度使符彥卿改許州節度使丙戌降青州為防禦使額以萊州刺史楊承勳為汝州防禦使己丑以工部尚書竇貞固為禮部尚書太常卿王延為工部尚書左丞王松為太常卿以前尚書右丞龍敏為尚書左丞癸巳以前安州防禦使李建崇為河陽兵馬留後以宣徽使翟光鄴為青州防禦使以內客省使李彥韜為宣徽北院使甲午以給事中邊光範, WYG: ''}
