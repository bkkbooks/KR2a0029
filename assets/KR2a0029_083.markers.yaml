  - {type: variant, offset: 5488, length: 1, content: 河, WYG: 守恩州刺史沙彦詢為應州節度使以潁州團練使高行周為安北都䕶充振武節度使壬申黔南節度使楊漢章棄城奔忠州為董璋所攻也乙亥制西川節度使孟知祥削奪官爵以其同董璋叛也丙子以前同州節度使羅周敬為左監門上將軍丁丑故兵部侍郎許光義贈禮部尚書辛巳西面軍前奏今月十三日階州刺史王𢎞贄瀘州刺史馮暉自利州取山路出劍門闗外倒下殺敗董璋守闗兵士三千人收復劍州甲申日南至帝御文明殿受朝賀丙戌以給事}
