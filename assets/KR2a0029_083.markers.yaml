  - {type: line-break, offset: 1301, content: '', id: ZHSJ__dup13339}
  - {type: variant, offset: 1301, length: 730, content: 翟光鄴為宣徽北院使己亥以滄州節度使王廷胤卒輟朝贈中書令冬十月壬寅兩浙節度使吳越國王錢弘佐加守太尉吳越國王原本脫吳字今據歐陽史增入影庫本粘籤庚戌以徐州節度使北面行營馬步都虞候趙在禮為北面行營副都統鄴都留守馬全節為北面行營副招討使甲寅以起居郎知制誥賈緯為戶部郎中知制誥戊午詔曰朕虔承顧命獲嗣丕基常懼顛危不克負荷宵分日昃罔敢怠寧夕惕晨興每懷祗畏但以恩信未著德教未敷理道不明咎徵斯至向者頻年災沴稼穡不登萬姓飢荒道殣相望上天垂譴涼德所招仍屬干戈尚興邊陲多事倉廩不足則輟人之餱食帑藏不足則率人之資財兵士不足則取人之丁中戰騎不足則假人之乘馬雖事不獲已而理將若何訪聞差去使臣殊乖體認不能敦於勉諭而乃臨以威刑自有所聞益深愧悼旋屬守臣叛命敵騎入邊致使甲兵不暇休息軍旅有征戰之苦人民有飛輓之勞疲瘵未蘇科徭尚急言念於茲寢食何安得不省過興懷側身罪己載深減損思召和平所宜去無用之資罷不急之務棄華取實惜費省功一則符先帝慈儉之規一則慕前王朴素之德向者造作軍器破用稍多但取堅剛不須華楚今後作坊製器械不得更用金銀裝飾比於遊畋素非所好凡諸服御尤欲去奢應天下府州不得以珍寶玩好及鷹犬為貢在昔聖帝明君無非惡衣菲食況於薄德所合恭行今後大官尚膳減去多品衣服帷帳務去華飾在禦寒溫而已峻宇雕牆昔人所誡玉杯象箸前代攸非今後凡有營繕之處丹堊雕鏤不得過度宮闈之內有非理費用一切禁止於戲繼聖承祧握樞臨極昧於至道若履春冰屬以天災流行國步多梗因時致懼引咎推誠期於將來庶幾有補更賴王公將相貴戚豪宗各啟乃心率由茲道共臻富庶以致康寧凡百臣僚宜體朕意十一月壬申詔曰蕃寇未平邊陲多事即日雖無侵軼亦須廣設隄防朕將親率虎貔躬擐甲冑候聞南牧即便北征不須先定日辰別行告諭所有供億宜令三司預行計度合隨從諸司職員並宜常備行計云己卯以陳州刺史梁漢, WYG: 孫}
