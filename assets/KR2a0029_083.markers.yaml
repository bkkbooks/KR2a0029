  - {type: variant, offset: 28, length: 1, content: 崇, WYG: 明堂殿受朝賀仗衛如常儀乙亥國子監請以監學生束脩及光學錢備監中修葺公用從之丙子帝謂宰臣曰時雪未降如何馮道曰陛下恭行儉德憂及烝民上合天心必有春澤是夜降雪其夕右散騎常侍蕭希甫封狀申樞宻稱得河堰衙官狀告本都將校二十餘人欲謀不軌至旦追問無狀斬所告人是日幸至德宫辛卯中書奏郊天有日合差大内畱守詔以宣徽南院使朱𢎞昭充二月戊戌幸稻田莊己亥黒水國主兀兒遣使貢方物翰林學士劉昫奏新學士入院舊試五題請今後停試詩賦秖試麻制答蕃書批答共三道仍請内賜題目定字數付本院召試從之五代㑹要載劉昫原奏云舊例學士入院除中書舍人不試餘官皆先試麻制各蕃批答各一道詩賦各一道號曰五題並于當日呈納從前毎遇召試多預出五題潛令宿搆其無黨援者即日起草罕能成功今請權停詩賦秪試三道仍内賜題目兼定字數從之有司奏皇帝致齋于明堂按舊服通天冠絳紗袍文武五品已上著袴褶近例秪著朝服從之乙巳中書奏皇帝朝獻太㣲宫太廟祭天地于圜丘準禮例親王為亞獻行事受誓戒從之以天雄軍節度使石敬瑭為御營使壬子帝宿齋于明堂殿癸丑朝獻太㣲宫是日宿齋于太廟詰旦請行饗禮甲寅赴南郊齋宫是夜㣲雨三鼓後晴明如晝乙邜祀昊天上帝于圜丘柴燎禮畢郊宫受賀是日御五鳯摟宣制改天成五年為長興}
