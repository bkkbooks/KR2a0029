  - {type: variant, offset: 793, length: 0, content: '', WYG: 康義誠為襄州節度使檢校太傅以左武衛上將軍劉彦琮為陜州節度使檢校太保庚寅制淑妃曹氏可立為皇后仍令擇日册命夏四月甲午朔國子司業張溥奏請復八館以廣生徒按六典監有六學國子太學四門律學書學算學是也而溥云八館謬矣丁酉前汴州節度使檢校太尉兼侍中}
