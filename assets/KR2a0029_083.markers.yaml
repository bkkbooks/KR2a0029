  - {type: variant, offset: 794, length: 3, content: 彥卿充, WYG: 習可太子太師致仕進封衛國公戊戌遂州節度使夏魯竒加同平章事皇子河中節度使從珂進位檢校太尉封開國公自是諸道節鎮皆次第加恩以郊禋覃慶澤故也巳亥幸㑹節園壬寅以樞宻使安重誨為畱守太尉兼中書令使如故青州節度使王建立加侍中移鎮潞州皇子河中節度使從珂奏臣今月五日閲}
