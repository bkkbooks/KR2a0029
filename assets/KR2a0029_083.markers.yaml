  - {type: variant, offset: 3404, length: 1, content: 李, WYG: 張延朗為檢校太傅行兵部尚書充三司使三司之有使額自延朗始也初中書覆奏授延朗諸道鹽鐵轉運等使兼判户部度支事奏入宣㫖曰㑹計之司國朝重事將總成其事額俾專委于近臣貴便一時何循往例兼移内職可示親規張延朗可充三司使班在宣徽使下癸卯北京奏生吐渾内附欲于嵐州安族帳都官員外郎知制誥張昭逺奏請依國朝舊例選郎官御史分行天下宣問風俗興利除害不報壬寅皇子河南尹判六軍諸衛事}
  - {type: page-break, offset: 3404, content: '', id: KR2a0029_WYG_083-11b, image: WYG0277/WYG0277-0365b.png}
  - {type: variant, offset: 3404, length: 1, content: 李, krp: 張延朗為檢校太傅行兵部尚書充三司使三司之有使額自延朗始也初中書覆奏授延朗諸道鹽鐵轉運等使兼判户部度支事奏入宣㫖曰㑹計之司國朝重事將總成其事額俾專委于近臣貴便一時何循往例兼移内職可示親規張延朗可充三司使班在宣徽使下癸卯北京奏生吐渾内附欲于嵐州安族帳都官員外郎知制誥張昭逺奏請依國朝舊例選郎官御史分行天下宣問風俗興利除害不報壬寅皇子河南尹判六軍諸衛事}
  - {type: variant, offset: 3406, length: 1, content: 溫, WYG: 榮封秦王仍令所司擇日册命五代㑹要長興元年九月太常禮院奏草定秦王儀注𫝊士叚顒議曰據開元禮臨軒册禮命諸王大臣其日受冊者朝服從第鹵簿與百官俱集朝堂就次受册訖通事舎人引不載謁朝還第之議自開元以後冊拜諸玉皆正衙門命詣延英進冊皇帝御内殿髙品引王人立于位髙品宣制讀册王受册訖歸院亦無乗輅謁朝之禮臣按五禮精義云古者皆因禘嘗而頒爵禄所以示無自専禀之於祖宗也个雖册命不在烝嘗然拜大官封大邑必至殿廷敬慎之道也今當司欲准開无禮其日秦王服朝服自理所乗輅車備鹵簿與群臣俱集朝堂就次受册訖至應天門外奉册置于載册之車秦王升輅出謁太廟訖歸理儀伏鹵簿如來時之儀從戊申兖州奏淮南海州都指揮使王傳拯殺本州刺史陳宣焚燒州城以所部兵士及家口五千人歸國至沂州帝遣使慰納之庚戌正衙命使册福慶長公主孟氏以前雄武軍節度使王思同}
  - {type: page-break, offset: 3406, content: '', id: KR2a0029_WYG_083-12a, image: WYG0277/WYG0277-0365c.png}
