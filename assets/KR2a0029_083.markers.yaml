  - {type: variant, offset: 2663, length: 319, content: 散騎常侍以樞密直學士吏部郎中李穀為給事中依前充職是月契丹耶律德光與趙延壽領全軍入寇圍恆州分兵陷鼓城城元氏高邑昭慶寧晉蒲澤欒城柏鄉等縣案遼史己卯圍恆州下其九縣歐陽史繫於乙酉之後疑誤前鋒至邢州河北諸州告急詔張從恩馬全節安審琦率師屯邢州趙在禮屯鄴都開運二年春正月戊戌朔帝不受朝賀不豫故也己亥張從恩部領兵士自邢州退至相州人情震恐趙在禮還屯澶州馬全節歸鄴都遣右神武統軍張彥澤屯黎陽詔西京留守景延廣將兵守胡梁渡契丹寇邢州侍衞馬軍都指揮使梁漢璋改鄭州防禦使典軍如故以齊州防禦使劉在明為相州留後癸卯以客省使孟承誨為內客省使滑州奏今月二日至四日相州路烽火不至甲辰以前汝州防禦使宋光鄴為左驍衞大將軍詔青州行營將校自副兵馬使以上各賜功臣名號乙巳帝復常膳以左威衞, WYG: 衛}
