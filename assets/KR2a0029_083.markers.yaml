  - {type: variant, offset: 2993, length: 380, content: 如故詔滑州節度使皇甫遇率兵赴邢州馬全節赴相州契丹寇洺磁犯鄴都西北界所在告急壬子王師與契丹相拒於相州北安陽河上皇甫遇慕容彥超率前鋒與敵騎戰於榆林店遇馬中流矢僅而獲免案遼史云皇甫遇與濮州刺史慕容彥超將兵千騎來覘遼軍至鄴都遇遼軍數萬且戰且却至榆林店遼軍繼至遇與彥超力戰百餘合遇馬斃步戰安審琦引騎兵踰水以救遼軍乃還與薛史所載互有詳略是夜張從恩引軍退保黎陽唯留五百人守安陽河橋既而知州符彥倫與軍校謀曰此夜紛紜人無固志五百疲兵安能守橋即抽入相州嬰城為備至曙賊軍萬餘騎已陣於安陽河北彥倫令城上揚旗鼓譟賊不之測至辰時渡河而南悉陳甲騎於城下如攻城之狀彥倫曰此敵將走矣乃出甲士五百於城北張弓弩以待之契丹果引去當皇甫遇榆林戰時至晚敵衆自相驚曰晉軍悉至矣戎王在邯鄲聞之即時北遁官軍亦南保黎陽甲寅以河陽留後李建崇為邢州留後以鳳州防禦使案原本下有闕文為河陽留後詔李守貞領兵屯滑州以宣徽北院, WYG: ''}
  - {type: variant, offset: 2993, length: 380, content: 如故詔滑州節度使皇甫遇率兵赴邢州馬全節赴相州契丹寇洺磁犯鄴都西北界所在告急壬子王師與契丹相拒於相州北安陽河上皇甫遇慕容彥超率前鋒與敵騎戰於榆林店遇馬中流矢僅而獲免案遼史云皇甫遇與濮州刺史慕容彥超將兵千騎來覘遼軍至鄴都遇遼軍數萬且戰且却至榆林店遼軍繼至遇與彥超力戰百餘合遇馬斃步戰安審琦引騎兵踰水以救遼軍乃還與薛史所載互有詳略是夜張從恩引軍退保黎陽唯留五百人守安陽河橋既而知州符彥倫與軍校謀曰此夜紛紜人無固志五百疲兵安能守橋即抽入相州嬰城為備至曙賊軍萬餘騎已陣於安陽河北彥倫令城上揚旗鼓譟賊不之測至辰時渡河而南悉陳甲騎於城下如攻城之狀彥倫曰此敵將走矣乃出甲士五百於城北張弓弩以待之契丹果引去當皇甫遇榆林戰時至晚敵衆自相驚曰晉軍悉至矣戎王在邯鄲聞之即時北遁官軍亦南保黎陽甲寅以河陽留後李建崇為邢州留後以鳳州防禦使案原本下有闕文為河陽留後詔李守貞領兵屯滑州以宣徽北院, krp: ''}
