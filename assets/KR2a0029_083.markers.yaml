  - {type: variant, offset: 5484, length: 1, content: 副, WYG: 政乞以男希聲為帥故有是命中書奏吏部流内銓諸色選人所試判兩節度欲委定其等第文優者超一資其次者次資又次者以同類道理全疎者于同類中少人户處注擬從之十一月庚申朔帝御文明殿册皇子秦王仗衛樂懸如儀甲子正衙命使册皇子宋王于鎭州是日幸龍門翼日馮道奏曰陛下宫中無事逰幸近郊則可矣若涉歴山險萬一馬足蹉跌則貽臣下之憂臣聞千金之子坐不垂堂百金之子立不倚衡况貴為天子豈可自輕哉帝斂容謝之退令小黄門至中書問道垂堂倚衡之義道因注解以聞帝深納之已已故太子少保致仕封舜􅀸贈太子少傅庚午應州節度使張敬達移雲州以捧聖都}
  - {type: page-break, offset: 5484, content: '', id: KR2a0029_WYG_083-15a, image: WYG0277/WYG0277-0367a.png}
