  - {type: variant, offset: 805, length: 0, content: '', WYG: 藥彦稠等攻之仍授彦温絳州刺史冀誘而擒之也詔從珂赴闕丁未以户部尚書李鏻為兖州行軍司馬坐引淮南覘人貽安重誨寳帯也戊申宰臣馮道加右僕射趙鳯加吏部尚書乙酉以左龍武統軍劉君鐸卒廢朝癸丑索自通藥彦稠等奏收復河中斬楊彦温傅首來獻初彦稠出師帝戒之曰與朕生致彦温吾將自訊之及收城斬首傳送帝怒彦稠等時議皆以為安重誨方弄國權從榮諸王敬事不暇獨忌從珂威名每于帝前屢言其短巧作窺圖冀能傾陷彦温旣誅從珂歸清化里第重誨謂馮道等曰蒲帥失守責帥之義法當如何翼日道等奏合行朝典帝不悦趙鳯堅奏故事有責帥之義所以激勵藩守帝曰皆非公等意也後數日帝于中興殿見宰臣趙鳯承重誨意又再論列帝黙然翼日重誨復自論奏帝極言以拒之語在末帝紀中帝又曰卿欲如何制置重誨曰于陛下父子之間臣不合言一禀聖㫖帝曰從佗私第間坐何煩奏也乃止以前邢州節度使檢校司徒李從温為左武衛上將軍丙辰以西京畱守檢校司徒索自通為河中節度使丁巳雲州奏掩襲契丹獲頭口萬計戊午帝御文明殿受册徽號册曰維長興元年歲次庚寅四月甲午朔二十五日戊午金紫光禄大夫守尚書左僕射兼門下侍郎同中書門下平章事充太㣲宫使𢎞文館大學士上柱國始平郡開國侯食邑一千五百户食實封一百户臣馮道銀青光禄大夫門下侍郎兼吏部尚書同中書門下平章事監修國史判集賢院事上柱國天水郡開國伯食邑七百户臣趙鳯及文武百官特進太子少傅上柱國酒泉郡開國侯食邑一千户臣李琪等五千八百九十七人言臣聞天不稱髙而體尊地不矜厚而形大厚無不載髙無不覆四時行于内萬物生其間總神祇之靈叶帝王之運日出而星辰自戢龍飛而雷雨皆行元氣和而天下和庶事正而天下正伏惟皇帝陛下天授一德時歴多艱翊太祖以興邦佐先皇而定難拯嗣昭于潞困救德威于燕危遏思逺而全鄴都誅彦章而下梁苑成再造之業由四征之功洎纂鴻圖每敷皇化去内庫而省庖膳出宫人而減伶官輕寳玉之珍却鷹鸇之貢淳風旣洽嘉瑞自臻故登極之前人皆不足改元之後時便有年遐荒旋斃于戎王重譯徑來于蠻子東廵而守殷殪北討而王都殱破契丹而燕趙無虞控靈武而𤓰沙並復近以饗上元而薦太廟就吉土而配昊天輅已降而雨霑事欲行而月見燔柴禮畢作解恩覃帝命咸均人情普悦非陛下有道有德至聖至明動不疑人静惟恭已常敦孝禮毎納忠言則何以臨御五年澄清四海時久纒于災害民驟見于和平休徴備載于簡編徽號過持于謙譲三年不允衆志皆堅天不以上帝自崇日不以大明自貴于烝民有惠于元后同符烈聖皆然舊章斯在今以明庭百辟列土諸侯中外同辭再三瀝懇臣等不勝大願謹奉玉寳玉册上號曰聖明神武文德恭孝皇帝伏惟皇帝陛下體堯舜之至道法日月于太虚威于夷狄恩及蟲魚奉國者繼加榮寵違天者咸就誅鋤典禮當告成之後夙夜思卽位之初千秋萬歲永混車書宰臣馮道之辭也庚申以左金吾上將軍史敬鎔為鄧州節度使以右金吾上將軍符彦超為兖州節度使以驍衛上將軍張敬詢為}
