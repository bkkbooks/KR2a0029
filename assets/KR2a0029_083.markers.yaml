  - {type: variant, offset: 848, length: 2, content: 左廂, WYG: 州事戍辰以安州節度使髙行珪卒輟朝有司上言皇后受册内外命婦並合奉賀今未有命婦準例上表稱賀中書諸道節度使但進表上言皇帝外命婦上皇后賀牋表進呈訖無報應皇親或有慶賀及起居章表内中進呈後秪宣示來使並不合答復從之壬申以權知昭義軍軍州事劉仲殷為潞州節度使檢校太傅丁丑帝臨軒命使册淑妃曹氏為皇后禮院上言百官上疏于皇后曰皇后殿下及六宫及率土婦人慶賀祇呼殿下不言皇后中書覆奏若祇呼殿下恐與皇太子無所分别凡上中宫表章呼皇后殿下若不形文字尋常祗呼皇后從之癸未太子少傅蕭頃卒廢朝甲申迴鶻可汗仁裕遣使貢方物辛邜以翰林承旨兵部侍郎李愚為太常卿壬辰以前滑州節度使李從璋為右驍衛上將軍六月丁酉以獲駕馬軍}
