  - {type: variant, offset: 2071, length: 938, content: 周為馬步軍都虞候癸巳武德使焦繼勳奏安從進遣弟從貴領兵千人取接均州刺史蔡行遇尋領所部兵掩殺賊軍七百餘人生擒安從貴截其雙腕却放入城戊戌以皇子重睿為銀青光祿大夫檢校尚書左僕射己亥北面軍前奏十三日未時於宗城縣西南大破鎮州賊軍宗城原本作宋城據通鑑注云宗城縣在魏州西北今改正影庫本粘籤殺一萬五千人餘黨走保宗城縣是夜三更破縣城前深州刺史史虔武自縛歸降獲馬三千疋絹三萬餘疋餘物稱是安重榮脫身遁走是日百官稱賀癸卯削奪安從進安重榮在身官爵右金吾上將軍萇從簡卒廢朝贈太師乙巳天下兵馬都元帥守尚書令吳越國王錢元瓘薨廢朝三日諡曰文穆是日帝習射於後苑諸軍都指揮使已上悉預焉賜物有差丁未南面行營都部署高行周奏今月十三日部領大軍至襄州城下相次降賊軍二千人其降兵馬軍詔以彰聖為號步軍以歸順為號庚戌以權知吳越國事錢弘佐為起復鎮軍大將軍檢校太師兼中書令杭州越州大都督鎮海鎮東等軍節度使封吳越國王壬子杜重威部領大軍至鎮州城下天福七年春正月丙辰朔不受朝賀用兵故也戊午以前將作監李鍇為少府監北面招討使杜重威奏今月已收復鎮州斬安重榮傳首闕下案遼史云戊辰晉函安重榮首來獻上數欲親討重榮至是乃止舊五代史考異帝御乾明樓乾明樓原本作韓明薛史前後皆作乾明五代會要亦作乾今改正影庫本粘籤宣露布訖大理卿受馘付市徇之百官稱賀曲赦廣晉府禁囚辛酉追贈皇弟三人故沂州馬步軍都指揮使贈太傅德再贈太尉追封福王故檢校太子賓客贈太傅殷再贈太尉追封通王故彰聖右第三軍都指揮使長州刺史贈太傅威再贈太尉追封廣王壬戌追贈皇子五人故右衞將軍贈太保重英再贈太傅追封虢王故權東京留守河南尹贈太傅重乂再贈太尉追封壽王故皇城副使贈太保重裔再贈太傅追封郯王故河陽節度使贈太尉重信再贈太師追封沂王故左金衞將軍贈太保重進再贈太傅追封夔王癸亥改鎮州為恆州成德軍為順國軍丙寅以門下侍郎平章事監修國史趙瑩為侍中青州節度使楊光遠加食邑改賜功臣名號兗州節度使桑維翰加檢校太保河東節度使劉知遠加兼侍中以鄆州節度使北面行營招討使侍衞親軍都指揮使杜重威為恆州順國軍節度使加兼侍中皇子廣晉尹兼功德使齊王重貴加兼侍中秦州節度使侯益加特進增食邑丁卯以判四方館事孟承誨為太府卿充職戊辰以滄州節度使安叔千為邢州節度使以北面行營副招討使邢州節度使馬全節為定州節度使馬全節原本作王節今從歐陽史改正影庫本粘籤, WYG: 晏球}
