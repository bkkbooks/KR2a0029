  - {type: variant, offset: 1616, length: 311, content: 告山南節度使安從進反則因其赴告之月而書之也舊五代史考異以西京留守高行周為南面行營都部署率兵討之以前同州節度使宋彥筠為副以宣徽南院使張從恩監護焉十二月丙戌朔以東京留守開封尹鄭王重貴為廣晉尹進封齊王以鄴都留守廣晉尹李德珫為開封尹充東京留守南面軍前奏十一月二十七日武德使焦繼勳先鋒都指揮使郭金海等於唐州南遇安從進賊軍一萬餘人大破之案宋史陳思讓傳思讓為先鋒右廂都監從武德焦繼勳領兵進討遇從進之師于唐州花山下急擊大破之舊五代史考異生擒衙內都指揮使安宏義案宋史焦繼勳傳作擒其牙將安洪義鮑洪等五十餘人舊五代史考異獲山南東道之印其安從進單騎奔逸安從進單騎奔逸通鑑作從進以數十騎奔還襄州與薛史微異今附識於此影庫本粘籤案焦繼勳等破安從進于唐州, WYG: 貢}
