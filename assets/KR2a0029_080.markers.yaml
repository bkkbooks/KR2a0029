  - {type: variant, offset: 73, length: 454, content: 節度使焦方為貝州節度使壬戌涇州奏西涼府留後李文謙今年二月四日閉宅門自焚遣元入西涼府譯語官與來人齎三部族蕃書進之以三司使劉審交為陳州防禦使癸亥以前鄆州節度使趙在禮為許州節度使以前鄴都留守廣晉尹高行周為河南尹西都留守詔改拱辰威和內直等軍並為興順甲子以宣徽使權西京留守張從恩判三司己巳以鄴都留守兼侍衞親軍馬步軍都指揮使廣晉尹劉知遠為太原尹充北京留守河東節度使仍割遼沁二州却隸河東以北京留守李德珫為廣晉尹充鄴都留守以昭義節度使馬全節為邢州節度使加同平章事甲戌詔今後諸道行軍副使不得奏薦骨肉為殿直供奉官己卯以前陝州節度使李從敏為昭義軍節度使以陝州節度使景延廣為河陽三城節度使兼侍衞親軍馬步軍都虞候以河陽節度使石贇為陝州節度使壬午突厥遣使朝貢以遙領壽州忠正軍節度使兼侍衞馬軍都指揮使李懷忠為同州節度使以宣徽北院使李守貞遙領忠正軍節度使侍衞馬軍指揮使甲申降御札取八月五日暫幸鄴都沿路供頓並委所司以官物排比州縣不得科率人戶丙戌以右諫議大夫趙遠為中書舍人吏部郎中鄭受益為右諫議大夫刑部郎中殷鵬為水部郎中知制誥殷鵬原本作殷鷴今從, WYG: ''}
