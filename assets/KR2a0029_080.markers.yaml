  - {type: variant, offset: 3467, length: 319, content: 考異翰林茶酒使張言使于契丹壬戌分命朝臣諸寺觀禱雨丙寅皇后為妹契丹樞密使趙延壽妻燕國長公主卒於幽州舉哀於外次辛未滑州節度使駙馬都尉史匡翰卒輟朝贈太保詔唐州湖陽縣蓼山神祠宜賜號為蓼山顯順之神乙亥以晉昌軍節度使安審琦為河中節度使以前亳州防禦使王令溫為貝州節度使丙子賜宰臣李崧白藤肩輿以起復故也丁丑以晉州節度使皇甫遇為河陽節度使以壽州節度使兼侍衞馬步軍指揮使李守貞為滑州節度使以夔州節度使兼侍衞步軍都指揮使郭謹為相州節度使皆典軍如故宰臣於寺觀禱雨閏月丙戌以兵部郎中司徒詡為右諫議大夫戊子兗州節度使桑維翰加特進封開國公庚寅以延州留後何建為延州節度使以引進使兼殿中監劉政恩為太子詹事壬辰宋州節度使安彥威奏修滑州黃河功畢案修河事薛史紀于閏月壬辰歐陽史作, WYG: 巻}
