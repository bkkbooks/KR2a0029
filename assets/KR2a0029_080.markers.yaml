  - {type: variant, offset: 3460, length: 3, content: 宋暉業, WYG: 已未殺齊州防禦使曹廷隠已未在壬戌前三日不應發配在後賜死轉在前也歐史疑訛壬午幽州趙徳鈞奏於府西邀殺契丹案通鑑作八月壬戌趙徳鈞邀擊契丹據是書八月係癸酉朔不得有壬戌疑通鑑誤邠州節度使李敬周李敬周通鑑作李敬通是書前後並作敬周歐陽史亦作敬周疑通鑑𫝊刻之訛以刺史竇廷琬拒命故也案竇廷琬反通鑑從是書作十月歐陽史繫於十月以前與是書異突厥首領張慕進等來朝貢案慕進歐陽史作慕晉壬午房知温奏荆南髙季興卒案髙季興卒通鑑作十二月丙辰詳見通鑑攷異檢校太保張希崇為汝州刺史案歐陽史作汝州防禦使通鑑從是書作刺史托諾巴摩哩舊作秃汭悲梅老今改伊埒雅遜舊作野利延孫今改託諾舊作秃餒今改爾珊舊作阿山今改哩衮舊作惕隠今改}
