  - {type: variant, offset: 4188, length: 1928, content: 六條已改正停廢詔褒之是春鄴都鳳翔兗陝汝恆陳等州旱鄆曹澶博相洺諸州蝗夏四月甲寅朔避正殿不視朝日蝕故也是日太陽不虧百官上表稱賀詔沿河藩郡節度使刺史並兼管內河堤使己未右諫議大夫鄭受益兩疏論張彥澤在涇州之日右諫議原本脫諫字今從通鑑增入影庫本粘籤違法虐民支解掌書記張式部曲楊洪等請下所司明申其罪皆留中不出庚申刑部郎中李濤張麟員外郎麻麟王禧同詣閣門上疏論張彥澤罪犯詞甚懇切案宋史李濤傳涇帥張彥澤殺記室張式奪其妻式家人詣闕上訴晉祖以彥澤有軍功釋其罪濤伏閤抗疏請置于法晉祖召見諭之濤植笏叩階聲色俱厲晉祖怒叱之濤執笏如初晉祖曰吾與彥澤有誓約恕其死濤厲聲曰彥澤私誓陛下不忍食其言范延光嘗賜鐵券今復安在晉祖不能答即拂衣起舊五代史考異辛酉詔張彥澤刳剔賓從誅剝生聚寃聲穢跡流聞四方章表繼來指陳甚切尚以曾施微功特示寬恩深懷曲法之慚貴徇議勞之典其張彥澤宜削一階仍降爵一紀其張式宜贈官張式父鐸弟守貞男希範並與除官仍於涇州賜錢十萬差人津置張式靈柩幷骨肉歸鄉所有先收納却張式家財物畜並令却還其涇州新歸業戶量與蠲減稅賦翌日以前涇州節度使張彥澤為左龍武大將軍案宋史楊昭儉傳昭儉與李濤論張彥澤不報會有詔命朝臣轉對或有封事亦許以不時條奏昭儉復上疏曰天子君臨四海日有萬幾懋建諍臣彌縫其闕今則諫臣雖設言路不通藥石之論不達于聖聰而邪佞之徒取容于左右御史臺紀綱之府彈糾之司銜寃者固當昭雪為蠹者難免放流陛下臨御以來寬仁太甚徒置兩司殆如虛器遂令節使慢侮朝章屠害幕吏始訴寃于丹闕反執送于本藩苟安跋扈之心莫恤寃抑之苦願回宸斷誅彥澤以謝軍吏舊五代史考異左龍武原本左作右今從歐陽史及通鑑改正影庫本粘籤戊辰廢雄州為昌化軍警州為威肅軍其軍使委本道差補故涇州節度掌書記張式贈尚書虞部郎中以式父鐸為沁州司馬致仕弟守貞為貝州清河縣主簿男希範為興元府文學甲戌詔皇子齊王就前河中府節度使康福第以教坊樂宴會前見任節度使戊寅前慶州刺史米廷訓追奪在身官爵配流麟州坐姦妻兄之女也是月州郡十六處蝗五月己亥中書門下奏時屬炎蒸事宜簡省應五日百官起居望令押班宰臣一員押百官班其轉對官兩員封付閣門使引進本官隨百僚退不用別出謝恩其文武內外官僚乞假寧覲搬家婚葬病損並門見門辭諸道進奉物等不用殿前排列引進使引至殿前奏云某等進奉奏訖其進奉使出其進奉專使朝見日班首一人致詞都附起居刺史幷行軍副使諸道馬步軍都指揮使已下差人到闕並門見門辭州縣官謝恩日甲頭一人都致詞不用逐人告官其供奉官殿直等如是當直及合於殿前排立者即入起居如不當直排立者不用每日起居委宣徽使點檢常須整齊從之時帝不豫難於視朝故也案遼史二月甲午遣使使晉索吐谷渾叛者契丹國志云遼以晉招納吐谷渾遣使責讓晉高祖憂悒成疾舊五代史考異左威衞上將軍衞審卒贈太子少保乙巳尊皇太妃劉氏為皇太后案徐無黨五代史記注云高祖所生母也舊五代史考異丁未工部侍郎韋勳改邢部侍郎壬子以左散騎常侍李光廷為祕書監給事中蕭愿為右散騎常侍蕭愿原本作肅原今據列傳改正影庫本粘籤左諫議大夫曹國珍為給事中太常卿裴坦為左諫議大夫是月州郡五奏大水十八奏旱蝗六月丁巳以兗州節度使桑維翰為晉昌軍節度使以前許州節度使安審琦為兗州節度使襄州都部署高行周奏安從進觀察判官李光圖出城請援送赴闕乙丑帝崩於保昌殿案通鑑考異云漢高祖實錄晉高祖大漸召近臣屬之曰此天下明宗之天下寡人竊而取之久矣寡人既謝當歸許王寡人之願也此說難信舊五代史考異壽五十一遺制齊王重貴於柩前即皇帝位喪紀並依舊制山陵務從節儉馬步諸軍優紀並從嗣君處分八月太常卿崔梲上諡曰聖文章武明德孝皇帝廟號高祖以其年十一月十日庚寅葬於顯陵宰臣和凝撰諡冊哀冊文永樂大典卷一萬五千六百四十四五代史補高祖尚明宗女宮中謂之石郎及將起兵于太原京師夜間狼皆羣走往往入宮中愍帝患之命諸班能射者分投捕逐謂之射狼或遇諸塗問曰汝何從而來對曰看射狼未幾高祖至蓋射音與石相近也五代史闕文梁開平初潞州行營使李思安奏函關縣穰鄉民伐樹樹仆自分為二中有六字如左書云天十四載石進梁帝藏於武庫時莫詳其義至帝即位識者曰天字取四字兩畫加之于傍即丙字也四字去中之兩畫加十字即申字也帝即位之年迺丙申也進者晉也石者姓也臣謹按天祐二十年歲在癸未其年莊宗建號改同光元年至清泰三年歲丙申其年晉祖即位改元天福元年自未至申凡十四載矣故讖書云天十四載石進者言自天祐滅後十四載石氏興於晉也豈不明乎而拆字解識以就丙申非也史臣曰晉祖潛躍之前沈毅而已及其為君也旰食宵衣禮賢從諫慕黃老之教樂清淨之風以絁為衣以麻為履故能保其社稷高朗令終然而圖事之初召戎為援獫狁自茲而孔熾黔黎由是以罹殃迨至嗣君兵連禍結卒使都城失守舉族為俘亦猶決鯨海以救焚何逃沒溺飲鴆漿而止渴終取喪亡謀之不臧何至於是儻使非由外援之力自副皇天之命以茲睿德惠彼蒸民雖未足以方駕前王亦可謂仁慈恭儉之主也永樂大典卷一萬五千六百四十四, WYG: 九攷證}
