  - {type: variant, offset: 87, length: 391, content: 后聞而諫曰自晉高祖建義及國家興運雖出於天意亦土地人民褔力同致耳未能惠其衆而欲奪其財非新天子卹隱之理也今後宮所積宜悉以散之設使不厚人無怨言高祖改容曰敬聞命矣遂停斂貸之議后傾內府以助之中外聞者無不感悅天褔十二年冊為皇后隱帝即位尊為皇太后永樂大典卷一萬六千三百九十案以下疑有闕文據通鑑云隱帝與李業等謀誅楊邠等議既定入白太后太后曰茲事何可輕發更宜與宰相議之業時在旁曰先帝嘗言朝廷大事不可謀及書生懦怯誤人太后復以為言帝忿曰國家之事非閨門所知拂衣而出又云南北軍遇於劉子陂帝欲自出勞軍太后曰郭威吾家故舊非死亡切身何以至此但按兵守城飛詔諭之觀其志趣必有辭理則君臣之禮尚全慎勿輕出帝不從薛史載於李業傳當係史家前後省文周太祖入京凡軍國大事皆請后發教令以行之是歲議立徐州節度使贇為帝案通鑑考異引隱帝實錄云初議立徐帥太后遣中使馳諭劉崇請崇入纘大位崇知立其子上章謙遜以當日事理推之既召湘陰不應復召崇疑傳聞之誤, WYG: 始備}
