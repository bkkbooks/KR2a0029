  - {type: variant, offset: 483, length: 427, content: 異以迎奉未至周太祖乃率羣臣拜章請后權臨朝聽政后於是稱誥焉及周太祖為六軍推戴上章具述其事且言願事后為慈母后下誥答曰侍中功烈崇高德聲昭著翦除禍亂安定乾坤謳歌有歸歷數攸屬所以軍民推戴億兆同歡老身未終殘年屬茲多難惟以衰朽託於始終載省來牋如母見待感念深意涕泗橫流云乃出戎衣玉帶以賜周太祖周太祖即位上尊號曰德聖皇太后居於太平宮周顯德元年春薨永樂大典卷一萬七千三百一十二案隱帝未立皇后據薛史張彥成傳云隱帝娶彥成女楊邠傳云隱帝所愛耿夫人欲立為后邠以為太速夫人卒隱帝欲以后禮葬邠又止之蓋隱帝在位三年崩時年二十故未及冊立皇后也又五代會要載漢高祖長女永寧公主降宋延渥天褔十二年四月封至乾祐二年十二月追封秦國長公主通鑑以永寧公主為晉高祖女蓋誤又王禹偁小畜集宋公神道碑云漢高祖領侍衞軍朝望甚重以公名家子又後唐之出也風骨俊秀異乎諸孤命長子承訓奉書于貴主先以襲衣名馬遺焉承訓即漢之開封尹魏王也公與貴主拒而不納漢祖又敕其子曰宋氏不諧勿復見我矣貴主知志不可奪遂許之延渥唐義寧公主之子也孔子, WYG: 證}
