  - {type: variant, offset: 30, length: 1, content: 原, WYG: 廟戊戌山陵使司空兼門下侍郎平章事馮道上表納政不允五月庚子朔御文明殿受朝賀乙巳以左龍武指揮使安審琦為左右捧聖都指揮使以右千牛上將軍符彦饒為左右嚴衛都指揮使丙午以端明殿學士韓昭𦙍為樞密使以莊宅使劉延朗為樞密副使以權知樞密事房暠為宣徽北院使以成徳軍節度使大同彰國振武威塞等軍蕃漢馬步都部署檢校太尉兼中書令駙馬都尉石敬瑭為北京留守河東節度使加檢校太師兼中書令都部署如故汴州節度使檢校太師兼侍中駙馬都尉趙延壽進封魯國公戊申中書門下奏太常禮院狀明宗以此月二十日祔廟宰臣攝太尉行事縁馮道在假李愚十八日私忌在致齋内劉昫又奏判三司免祀事五代㑹要清泰元年五月宰臣劉昫奏中書以近敕祠祭行事官致齋内唯祀事得行其餘悉斷又宰臣行事致齋内不押班不赴内殿起居不知印臣縁判三司公事其祀事國忌行香伏乞特免從之詔禮官叅酌有司上言李愚私忌在致齋内諸私忌日遇大朝㑹入閣宣召皆赴朝參今祔廟事大忌日屬私請比大朝㑹宣召例從之以陜}
