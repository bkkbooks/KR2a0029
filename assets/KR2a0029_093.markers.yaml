  - {type: variant, offset: 3337, length: 124, content: 子起家為衞尉寺主簿改著作佐郎左贊善大夫賜緋魚袋唐同光初遷大理正天成元年自將作少監轉大理少卿長興中歷昭武歸德兩鎮節度判官四年復入為大理少卿清泰中除殿中監天福五年拜大理卿八年轉光祿卿仁愿性溫雅明法書累居詳刑之地議讞疑獄號為稱職兄仁穎梁朝仕至諸衞將軍中年, WYG: 乙亥}
