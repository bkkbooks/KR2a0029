  - {type: variant, offset: 40, length: 2, content: 祖衍, WYG: 門下侍郎平章事監修國史李愚加特進充太㣲宫使𢎞文館大學士餘如故中書侍郎兼吏部尚書同平章事集賢院大學士判三司劉昫加門下侍郎兼吏部尚書平章事監修國史判三司癸亥秦州奏西川孟知祥出軍迫䧟成州以宣徽南院使右驍衛大将軍郝瓊為左驍衛上将軍職如故以前義州刺史張承祐為武勝軍留後戊辰以前右龍武統軍王景戡為右驍衛上將軍六月庚午朔改侍衛捧聖軍為彰聖改嚴衛軍為寧衛壬申封吴岳成徳公為靈應王禮秩同五岳帝初起遣使祭岳以求祐及登阼故有是報五代㑹要載中書門下奏天寶十載正月封吴公為成徳公與沂山㑹稽醫巫閭同封至徳二載十二月改吴山為岳祠享官屬一同五岳今國家以祈禱靈應宜示殊禮臣等商量請加封為靈應王從之幽州節度使趙徳鈞進封北平王青州節度使房知温進封東平王癸酉以前鄜州節度使索自通為右龍武統軍甲戌皇子左衛上将軍重美加檢校太保同平章事充鎮州節度使兼河南尹判六軍諸衛事丁丑詔天下見禁罪人委所在長吏躬親慮問疾速疏決庚辰幸至徳宫因幸房知温安元信范延光索自通李從敏弟壬午以檢校太子太傅致仕王建立為檢校太尉兼侍中鄆州節度使以前宋州節度使安元信為檢校太尉兼侍中潞州節度使癸未三司使劉昫奏天下户民自天成二年括定秋夏田税迨今八年近者相次有百姓詣闗訴田不均累行蠲放漸失税額望差朝臣一槩檢視不報甲申帝為故皇子亳州刺史重吉皇長女尼恵明大師幼澄舉哀行服羣臣詣閤門奉慰帝起兵之始重吉幼澄俱為閔帝所害乙酉以户部侍郎韓彦惲為絳州刺史以左武衛上将軍李肅為單州刺史丙戌襄州節度使趙在禮加同平章事甲午以武勝軍留後張承遷為華州節度使以皇城使宋審䖍為壽州節度使充侍衛步軍都指揮使以右衛上将軍劉仲殷為宋州節度使以侍衛步軍都指揮使壽州節度使皇甫遇為鄧州節度使以前華州節度使華温琦為太子太𫝊致仕丁酉左神武統軍周知裕卒贈太傅是月京師大旱熱甚暍死者百餘人秋七月庚子太子少保致仕崔沂卒癸夘鳳翔進偽蜀孟知祥来書稱大蜀皇帝獻書于大}
