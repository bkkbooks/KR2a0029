  - {type: variant, offset: 25, length: 1, content: 曾, WYG: 故至于是甲申帝以鄂王薨行服于内園羣臣奉慰癸未太后太妃出宫中衣服器用以助賞軍乙酉帝服衮冕御明堂殿文武百寮朝服就位宣制改應順元年為清泰元年大赦天下常赦不原者咸赦除之丁亥以宣徽北院使郝瓊為宣徽南院使權判樞密以前三司使王玫為宣徽北院使以隨駕牙將宋審䖍為皇城使劉延朗為莊宅使鳳翔節度判官韓昭𦙍為左諫議大夫充端明殿學士觀察判官馬𦙍孫為翰林學士掌書記李専美為樞宻院直學士戊子侍衛親軍都指揮使康誠義伏誅是日詔曰樞密使朱𢎞昭馮贇宣徽南院使孟漢瓊西京留守王思同前邠州節度使藥彦稠共相朋煽妄舉干戈互興離間之謀㡬構傾亡之禍宜行顯戮以快羣情仍削奪官爵云庚寅鳳翔奏西川孟知祥僣稱大蜀年號明徳有司上言皇帝以五月朔日御明堂殿受朝三日夏至祀皇地祇前二日奏告獻}
