  - {type: variant, offset: 4, length: 1, content: 卷, WYG: 巻四十六宋門下侍郎參知政事監修國史薛居正等撰唐書第二十二末帝紀上末帝諱從珂本姓王氏鎮州人也母宣憲皇后魏氏以光啟元年嵗在已已正月二十三日生帝于平山景福中明宗為武皇騎將畧地至平山遇魏氏擄之帝時年十餘嵗明宗養為已子小字二十三帝幼謹重寡言及壯長七尺餘方頤大體村貌雄偉以驍果稱明宗甚愛之在太原嘗與石敬瑭因擊毬同入于趙襄子之廟見其塑像屹然起立帝祕之私心自負及從明宗征討以力戰知名莊宗嘗曰阿三不惟與我同齒敢戰亦相類莊宗與梁軍戰于胡栁陂兩軍俱撓帝衛莊宗奪土山摧驍陣其軍復振時明宗先渡河莊宗不悦謂明宗曰公當為吾死渡河安往明宗待罪莊宗以帝從戰有功由是解愠天祐十八年莊宗營于河上議討鎮州留守符存審在徳勝砦未行梁人謂莊宗已北乃悉衆攻徳勝莊宗命明宗存審為兩翼以抗之自以中軍前進梁軍退郤帝以十數騎雜梁軍而退至壘門大呼斬首數級斧其望櫓而還莊宗大噱曰壯哉阿三賜酒一器同光元年四月從明宗襲破鄆州九月莊宗敗梁將王彦章于中都急趨汴州明宗將前軍帝率勁騎以從晝夜兼行率先下汴城莊宗勞明宗曰復唐社稷卿父子之功也二年以帝為衛州刺史時有王安節者昭宗朝相杜讓能之宅吏也安節少善賈得相術于竒士因事見帝于私邸退謂人曰真北方天王相也位當為天子終則我莫知也三年明宗奉詔北禦契丹以家在太原表帝為北京内衙指揮使莊宗不悦以帝為突騎都指揮使遣戍石門四年魏州軍亂明宗赴洛時帝在横水率部下軍士由曲陽孟縣趨常山與王建立㑹倍道兼行渡河而南由是明宗軍聲大振天成初以帝為河中節度使明年二月加檢校太保同平章事十一月加檢校太傅長興元年加檢校太尉先是帝與樞宻使安重誨在常山因杯盤失意帝以拳擊重誨腦中其櫛走而獲免帝雖悔謝然重誨終銜之及帝鎮河中重誨知其出入不時因矯宣中旨令牙將楊彦温遇出郭則閉門勿納是嵗四月五日帝閲馬于黄龍莊彦温閉城拒帝帝聞難遽還遣問其故彦温曰但請相公入朝此城不可入也帝止虞鄉以聞明宗詔帝歸闕遣藥彦稠將兵討彦温令生致之面要鞫問十一月收城彦温已死明宗以彦稠不能生致彦温甚怒之後數日安重誨以帝失守諷宰相論奏行法明宗不悦重誨又自論奏明宗曰朕為小將校時家徒衣食不足賴此兒荷石灰收馬糞存養以至今貴為天子而不能庇一兒卿欲行朝典朕未曉其義卿等可速退從他私第閒坐遂詔歸清化里第不預朝請帝尚懼重誨多方危陷但日諷佛書隂禱而已二年安重誨得罪帝即授左衛大將軍未㡬復檢校太傅同平章事行京兆尹充西京留守三年進位太尉移鳳翔節度使四年五月封潞王閔帝即位加兼侍中既而帝子重吉出刺亳州女尼入宫帝方憂不測應順元年二月移帝鎮太原是時不降制書唯以宣授而已帝聞之召寶佐將吏以謀之皆曰主上年幼未親庶事軍國大政悉委朱𢎞昭等王必無保全之理判官馬𦙍孫曰君命召不俟駕行焉諸君凶言非令圖也是夜帝令李専美草檄求援諸道欲誅君側之罪朝廷命王思同率師来討三月十五日外兵大集九國志李彦琦𫝊潞王守岐下諸道將急攻其壘彦琦時在圍中罄家財以給軍用十六日大將督衆攻城帝登城垂泣諭于外曰我年未二十從先帝征伐出生入死金瘡滿身樹立得社稷軍士從我登陣者多矣今朝廷信任賊臣殘害骨肉且我有何罪因慟哭聞者哀之時羽林都指揮使楊思權謂衆曰大相公吾主也遂引軍自西門入嚴衛都指揮使尹暉亦引軍自東門而入外軍悉潰十七日率居民家財以賞軍士是日帝整衆而東二十日次長安副留守劉遂雍以城降率京兆居民家財犒軍二十三日次靈口誅王思同二十四日次華州收藥彦稠繫獄二十五日次閿鄉王仲臯父子迎謁命誅之二十六日次靈寶河中節度使安彦威来降待罪宥之遣歸鎮陜州節度使康思立奉迎二十七日次陜州下令告諭京城二十八日康義誠軍前兵士相繼来降義誠詣軍門請罪帝宥之駕下諸軍畢至誅宣徽南院使孟漢瓊于路左是夜閔帝與帳下親騎百餘出𤣥武門而去夏四月壬申帝至蔣橋文武百官立班奉迎教旨以未拜梓宫未可相見俟㑹于至徳宫時六軍勲臣及節將内職已累表勸進是日帝入謁太后太妃至西宫伏梓宫慟哭宰相與百寮班見致拜帝答拜馮道等上牋勸進帝立謂羣臣曰予之此行事非獲已當俟主上歸闕園陵禮終退守藩服諸公言遽及此信無謂也衛州刺史王𢎞贄奏閔帝以前月二十九日至州癸酉皇太后下令降閔帝為鄂王又太后令曰先皇帝誕膺天睠光紹帝圖明誠動于三靈徳澤被于四海方期偃革遽歎遺弓自少主之承祧為奸臣之擅命離間骨肉猜忌磐維既輒易于藩垣復驟興于兵甲遂致輕離社稷大撓軍民萬世鴻基將墜于地皇長子潞王從珂位居冡嗣徳茂冲年乃武乃文惟忠惟孝前朝廓清多難有戰伐之大功纉紹丕圖有夾輔之盛業今以宗祧乏嗣園寢有期須委親賢俾居監撫免萬機之壅滯慰兆庶之推崇可起今月四日知軍國事權以書詔印施行是日監國在至徳宫宰臣馮道等率百官班于宫門待罪帝出于庭曰相公諸人何罪請復位乃退甲戌太后令曰先皇帝櫛風沐雨平定華夷嗣洪業于艱難致蒼生于富庶鄂王嗣位奸臣弄權作福作威不誠不信離間骨肉猜忌磐維鄂王輕捨宗祧不克負荷洪基大寶危若綴旒須立長君以紹丕搆皇長子潞王從珂日躋孝敬天縱聰明有神武之英姿有寛仁之偉畧先朝經綸草昧廓静寰區辛勤有百戰之勞忠貞賛一統之運臣誠子道冠古超今而又克已化民推心撫士率土之謳歌有屬上蒼之睠命攸臨一日萬㡬不可以暫曠九州四海不可以無歸况因山有期同軌斯至永言嗣守屬任元良宜即皇帝位乙亥監國赴西宫柩前告奠即位攝中書令李愚宣册書曰維應順元年嵗次甲午四月庚午朔六日乙亥文武百寮特進守司空兼門下侍郎同中書門下平章事充太微宫使𢎞文館大學士上柱國始平郡公食邑二千五百户臣馮道等九千五百}
