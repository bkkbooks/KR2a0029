  - {type: variant, offset: 32, length: 2, content: 祁縣, WYG: 節度使康思立為邢州節度使以同州節度使安重霸為西京留守以羽林右第一軍都指揮使春州刺史楊思權為邠州節度使已酉左監門衛將軍孔知鄴右驍衛將軍華光裔並勒停見任時差知鄴應州告廟稱疾辭命改差光裔復稱馬墜傷足故俱罷之庚戌以司空兼門下侍郎平章事馮道為檢校太}
