  - {type: variant, offset: 2156, length: 462, content: 官郎中翰林學士天福初以戶部侍郎為學士承旨嘗草制為宰相桑維翰所改梲以唐故事學士草制有所改者當罷職乃引經據爭維翰不能詰命權知二年貢舉時有進士孔英者素有醜行為當時所惡梲受命往見維翰維翰語素簡謂梲曰孔英來矣梲不諭其意以謂維翰以孔英為言乃考英及第物議大以為非遂罷學士拜尚書左丞遷太常卿後以風痹改太子賓客分司西京卒年六十八梲平生所著文章碑誄制詔甚多人有借本傳寫者則曰有前賢有來者奚用此為凡受託而作者必親札致之即焚其藁懼泄人之假手也梲笑不至矧怒不至詈接新進後生未嘗無誨焉羣居公會端坐寡言嘗云非止致人愛憎且或干人祖禰之諱指命僕役亦用禮節盛暑祁寒不使冒犯嘗自話於知友云某少時夢二人前引行路一人計地里曰一舍矣可以止一人曰此君當更進三十有八里復行如所言二人皆止之俄而驚覺梲常識是夢以為定命之限故六十七請退明年果終焉兄棆案世系表作榆舊五代史考異有隱德好釋氏閑居滑州嘗欲訪人於白馬津北及臨岸歎曰波勢洶湧如此安可濟乎乃止後徵拜左拾遺辭疾不赴永樂大典卷二千七百四十薛融汾州平遙人性純和以儒學為業初從雲州帥李存璋為幕職唐莊宗平河南歷鄆徐二鎮從事明宗初授華州, WYG: 䕶振武}
