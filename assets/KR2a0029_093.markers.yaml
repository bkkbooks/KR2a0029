  - {type: variant, offset: 3462, length: 539, content: 風恙廢於家凡十餘年仁愿事之出告反面如嚴父焉士大夫推為孝友仁穎善理家勤而且約婦女衣不曳地什物多歷年所如新市焉仁愿開運元年再為大理卿時隰州刺史王徹犯贓朝廷以徹功臣之後欲宥之仁愿累執奏不移竟遣伏法議者賞之開運二年以疾卒年五十一贈祕書監永樂大典卷六千三百五十一趙熙字績巨唐宰相齊國公光逢之猶子也起家授祕書省校書郎唐天成中累遷至起居郎數上章言事以稱旨尋除南省正郎天福中承詔與張昭遠等修唐史竟集其功開運中自兵部郎中授右諫議大夫賞筆削之功也及契丹犯闕偽旨遣使於晉州率配豪民錢幣以實行橐始受命之日條制甚嚴熙出衣冠族性素輕急既畏契丹峻法乃窮理搜索人甚苦之及晉之三軍及晉之三軍原本疑有舛誤今無別本可考姑仍其舊影庫本粘籤殺副使駱從朗案通鑑云契丹以節度副使駱從朗知晉州事大將藥可儔殺從朗舊五代史考異百姓相率持仗害熙於館舍識者傷之永樂大典卷一萬六千九百九十一李遐兗州人也少為儒有節操歷數鎮從事及升朝累遷尚書庫部員外郎高祖即位以皇子重乂保釐洛邑知遐強幹有守除為西京留守判官使之佐理復重其廉勤兼委監西京左藏庫會張從賓作亂張從賓原本作徒賓今從通鑑改正影庫本粘籤使人輦取繒帛以賞羣逆遐曰不奉詔書安敢承命遂為其下所害高祖聞而歎惜賻贈加等仍贈右諫議大夫其母田氏封京兆郡太君仍給遐所食月俸終母餘年其子俟服闋與官後又遣兗, WYG: 秦}
