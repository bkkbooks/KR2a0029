  - {type: page-break, offset: 25, content: '', id: KR2a0029_WYG_093-11a, image: WYG0277/WYG0277-0404c.png}
  - {type: variant, offset: 25, length: 1, content: 曾, krp: 故至于是甲申帝以鄂王薨行服于内園羣臣奉慰癸未太后太妃出宫中衣服器用以助賞軍乙酉帝服衮冕御明堂殿文武百寮朝服就位宣制改應順元年為清泰元年大赦天下常赦不原者咸赦除之丁亥以宣徽北院使郝瓊為宣徽南院使權判樞密以前三司使王玫為宣徽北院使以隨駕牙將宋審䖍為皇城使劉延朗為莊宅使鳳翔節度判官韓昭𦙍為左諫議大夫充端明殿學士觀察判官馬𦙍孫為翰林學士掌書記李専美為樞宻院直學士戊子侍衛親軍都指揮使康誠義伏誅是日詔曰樞密使朱𢎞昭馮贇宣徽南院使孟漢瓊西京留守王思同前邠州節度使藥彦稠共相朋煽妄舉干戈互興離間之謀㡬構傾亡之禍宜行顯戮以快羣情仍削奪官爵云庚寅鳳翔奏西川孟知祥僣稱大蜀年號明徳有司上言皇帝以五月朔日御明堂殿受朝三日夏至祀皇地祇前二日奏告獻}
  - {type: variant, offset: 27, length: 2, content: 偲唐, WYG: 室不坐比正旦冬至是日有祀事則次日受朝今祀在五鼔前質明行禮畢御殿在旦後請比例行之詔曰日出御殿舉祀事無妨宜依常年例史館奏凡書詔及處分公事臣下奏議望令近臣録付當館詔端明殿學士韓昭𦙍樞密直學士李専美録送辛夘以左諫議大夫盧損為右散騎常侍壬辰詔賜禁軍及鳳翔城下歸明將校錢帛各有差通鑑云禁軍在鳳翔歸命者自楊思權尹暉等各賜二馬一駝錢七十緡下至軍人錢二十緡其在京者各十緡初帝離岐下諸軍皆望以不次之賞及從至京師不滿所望相與謠曰去郤生菩薩扶起一條鐵其無厭如此丙申塟明宗皇帝于徽陵丁酉奉神主于}
