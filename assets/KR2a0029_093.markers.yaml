  - {type: variant, offset: 4544, length: 572, content: 章以導其趣人多傳之後妻以書達意勸其還家雲叟未嘗一覽悉投於火其絕累如此俄聞西嶽有五鬣松淪脂千年能去三尸因居於華陰與李道殷羅隱之友善時人目為三高士道殷有釣魚之術鈎而不餌又能化易金石無所不至雲叟恆目覩其事信而不求雲叟與梁室權臣李振善振欲祿之拒而不諾及振南遷雲叟千里徒步以省之識者高焉後妻兒繼謝每聞凶訃一哭而止時唯青衿二童子一琴一鶴從其遊處好棋塞之戲遇同侶則以晝繼夜雖寒風大雪臨簷對局手足皸裂亦無倦焉唐天成中召拜左拾遺不起與羅隱之朝夕遊處隱之以藥術取利雲叟以山田自給俱好酒能詩善長嘯有大瓠云可辟寒暑置酒於其中經時味不壞日攜就花木水石之間一酌一詠嘗因酒酣聯句鄭曰一壺天上有名物兩箇世間無事人羅曰醉却隱之雲叟外不知何處是天真高祖即位聞其名遣使齎書致禮徵為右諫議大夫雲叟稱疾不起上表陳謝高祖覽表嘉之賜近臣傳觀尋賜號逍遙先生以諫議大夫致仕月給俸祿雲叟好酒嘗為詠酒詩千二百言海內好名者書於縑緗以為贈貺復有越千里之外使畫工潛寫其形容列為屏障者焉其為時望所重也如此天福末以壽終時年七十四有文集二十卷行于世永樂大典卷一萬八千八百八十一史臣曰自古攀龍鱗附鳳翼坐達於雲衢者豈獨豐沛之士哉苟懷才抱器適會興王亦可以取貴於一時如盧質而下數君子是也至如國珍之讜直仁愿之友悌趙李二子沒于王事皆無忝于士林矣唯玉羽之貞退雲叟之肥遯足可以柅奔競之風激高尚之節也永樂大典卷一萬八千八百八十一, WYG: ''}
