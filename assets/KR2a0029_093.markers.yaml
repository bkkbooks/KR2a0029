  - {type: variant, offset: 2689, length: 623, content: 旅之事進退存亡之機未之學也座中聳然及登極遷尚書吏部郎中兼侍御史知雜事天福二年自左諫議大夫遷中書舍人自以文學非優不敢拜命復為諫議時詔修西京大內融以鄴下用兵國用不足上疏復罷之案通鑑薛融諫曰今宮室雖經焚毀猶侈于帝堯之茅茨所費雖寡猶多于漢文之露臺況魏城未下公私困窘誠非陛下修宮館之日俟海內平寧修之未晚舊五代史考異優詔嘉許俄轉御史中丞秩滿改尚書右丞分司西都天福六年以疾卒年六十餘永樂大典卷二萬一千三百六十七案歐陽史作年六十舊五代史考異曹國珍字彥輔幽州固安人也曾祖藹祖蟾父絢代襲儒素國珍少值燕薊亂離因落髮被緇客於河西延州延州原本作逮州今從歐陽史改正影庫本粘籤高萬興兄弟皆好文辟為從事國珍常以文章自許求貢禮闈且掌書奏期年入為左拾遺累遷至尚書郎每與人交傾財無吝性頗剛僻經藝史學非其所長好自矜衒多上章疏文字差誤數數有之為搢紳所誚高祖在藩時嘗通私謁以兄事之及即位國珍自比於嚴陵上表舊由是自吏部郎中拜左諫議大夫給事中案歐陽史張彥澤傳國珍與御史中丞王易簡率三院御史詣閤門連疏論張彥澤不報舊五代史考異又求為御史中丞時宰怒不復為請國珍銜之李崧之母薨遣諸弟護喪歸葬深州崧既起復乃出北郊路隅設奠公卿大夫皆送喪而出國珍固爭不行衆咸推其讜直高祖晏駕朝廷以宰臣馮道為山陵使及靈輴既發國珍上疏言馮道既為山陵使不得復入都城請除外佐以桑維翰入輔李崧請罷相位俾持喪制少帝覽奏以所言侵越出為陝州行軍司馬至任悒怏遘疾而卒永樂大典卷四千五百十三張仁愿字善政開封陳留人也祖晸唐右武衞大將軍父存敬梁河中, WYG: ''}
