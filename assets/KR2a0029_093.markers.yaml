  - {type: variant, offset: 19, length: 0, content: '', WYG: 也又石壕人胡杲通善天文帝召問之曰王貴不可言若舉動宜以乙未年及舉兵又問之杲通曰今嵗蔀首王者不宜建功立事若俟来朝入朝則福祚永逺矣其後皆騐夫如是則大寶之位必有冥數可輕道哉丙}
