  - {type: variant, offset: 35, length: 3, content: 累贈右, WYG: 同平章事充同州節度使以天雄軍節度使范延光為樞密使封齊國公鄆州節度使李從曮為鳳翔節度使辛亥以嚴衛都指揮使尹暉為齊州防禦使甲寅以侍衛馬軍都指揮順化軍節度使安從進為河陽節度使典軍如故太常卿盧文紀奏明宗一室酌獻舞曲請名雍熙之舞從之丁已以皇子銀青光禄大夫檢校工部尚書重美為檢校司徒守左衛上將軍自是諸道節度使刺史文武臣寮相繼加檢校官或階爵封邑以帝登位覃慶也戊午以隴州防禦使相里金為陜州節度使初帝以檄書告藩隣惟金遣判官薛文遇往来計事故以節鎮奨之宣徽北院使檢校工部尚書房暠加檢校司行左威衛大將軍使如故以樞密使左諫議大夫韓昭𦙍為刑部尚書使如故已未太白晝見以樞密副使劉延朗為左領軍大將軍職如故庚申左}
