  - {type: variant, offset: 1491, length: 309, content: 軒冕為貴雖布衣徒步視公卿蔑如也男女婚嫁不雜他姓欲聘其族厚贈金帛始許焉唐太宗曾降詔以戒其弊風終莫能改其間有未達者必曰姓崔盧李鄭了餘復何求耶其達者則邈在天表敻若千里人罕造其門浮薄自大皆此類也唯專美未嘗以氏族形於口吻見寒素士大夫恆恂恂如也人以此多之專美職岐下曾夢具裳簡立嵩山之頂及為端明殿學士學士李崧同列而班在其上因以所夢告崧且言某非德非勳安可久居此位處吾子之首乎因懇求他官尋移宣徽使崧深德之及高祖臨朝崧為樞密使與桑維翰同列維翰與專美亦有舊乃協力以奏之遂復朝序位至九卿專美曾使閩中遇風水漂至兩浙踰歲無恙而還至是善終人以為神道福謙之所致也永樂大典卷一萬三百九十盧詹字楚良京兆長安人也唐天祐中為河中從事莊宗即位擢為員外郎知制誥遷, WYG: ''}
