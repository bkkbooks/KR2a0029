  - {type: variant, offset: 24, length: 0, content: '', WYG: 賞百千至是以府蔵空匱于是有配率之令京城庶士自絶者相繼已夘衛州奏此月九日鄂王薨庚辰以宰臣劉昫判三司辛已邢州奏磁州刺史宋令詢自經而卒令詢鄂王在藩時都押牙}
  - {type: variant, offset: 24, length: 0, content: '', krp: 賞百千至是以府蔵空匱于是有配率之令京城庶士自絶者相繼已夘衛州奏此月九日鄂王薨庚辰以宰臣劉昫判三司辛已邢州奏磁州刺史宋令詢自經而卒令詢鄂王在藩時都押牙}
