  - {type: variant, offset: 43, length: 0, content: '', WYG: 皇帝且言見迫羣情以今年四月十二日即皇帝位云帝不答以前武州刺史鄭琮為右衛上將軍甲辰幸龍門佛寺禱雨乙已皇子故亳州團練使重吉贈太尉仍于宋州置廟丁未鳳翔節度使李從曮封西平王是日宰臣李愚劉昫因論公事于政事堂相詬辭甚鄙惡帝令樞密副使劉延朗宣諭曰卿等輔弼之臣不宜如是今後不得更然辛亥以太常卿盧文紀為中書侍郎平章事是日中書門下三上章請立中宫從之丁已制立沛國夫人劉氏為皇氏庚申太子少傅陳臯卒乙丑史官張昭逺以所撰莊宗朝列𫝊三十巻上之八月庚午詔蠲放長興四年十二月以前天下所欠殘税辛未以前尚書左丞姚顗為中書侍郎平章事詔應曾受御署官逐攝同一任正官依期限赴選徐無黨五代史注云御署官疑是廢帝初舉兵時所置之官以其非吏部正授故須有旨方得選荆南奏偽卒孟知祥卒其子昶嗣偽位壬申以尚書禮部侍郎鄭韜光為}
