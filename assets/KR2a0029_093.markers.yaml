  - {type: variant, offset: 4197, length: 345, content: 考異後唐清泰中為光祿少卿退歸秦中以林泉詩酒自樂冊府元龜卷八百一十三自號自然先生永樂大典卷八千五百七十宰臣張延朗手書而召高臥不從謂人曰庶孽代宗不可仕也及高祖入雒即受詔而來以所著自然經五卷貢之且告其老即日璽書褒美頒其器幣授少府監致仕月給俸錢及冬春二時服冊府元龜卷八百九十九案尹玉羽傳原本止存二條今采冊府元龜以存大概玉羽性仁恕好靜默與朋友交無怨棄御僕隸不好詈辱有過則諭而戒之有罪則禮而遣之家雖屢空不渝其廉時雖亂離不廢其業天福中卒有武庫集五十卷行于世鄭雲叟本名遨雲叟其字也以唐明宗廟諱故世傳其字焉本南燕人也案歐陽史作滑州白馬人舊五代史考異少好學耿介不屈唐昭宗朝嘗應進士舉不第因欲攜妻子隱于林壑其妻非之不肯行雲叟乃薄游諸郡獲數百緡以贍其家辭訣而去尋入少室山案歐陽史作入少室為道士舊五代史考異著擬峯詩三, WYG: 巻四}
