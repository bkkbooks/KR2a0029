草昧廓静寰區辛勤有百戰之勞忠貞賛一統之運臣誠子道冠古超今而又克已化民推心撫士率土之謳歌有屬上蒼之睠命攸臨一日萬㡬不可以暫曠九州四海不可以無歸况因山有期同軌斯至永言嗣守屬任元良宜即皇帝位乙亥監國赴西宫柩前告奠即位攝中書令李愚宣册書曰維應順元年嵗次甲午四月庚午朔六日乙亥文武百寮特進守司空兼門下侍郎同中書門下平章事充太微宫使𢎞文館大學士上柱國始平郡公食邑二千五百户臣馮道等九千五百}
