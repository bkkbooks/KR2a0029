  - {type: variant, offset: 11, length: 6, content: 九列傳第八盧, WYG: 暴卒見隂官凭几告叟曰為我言于潞王来年三月當為天子二十三年叟既蘇懼不敢言逾月復卒隂官見而叱之曰安得違吾旨不達其事再放汝還退見廊廡下簿書以問主者曰朝代將易此即昇降人爵之籍也及蘇詣帝親校劉延朗告之帝召而問之叟曰請}
