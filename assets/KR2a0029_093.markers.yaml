  - {type: variant, offset: 8, length: 1, content: 晉, WYG: 人上言帝王興運天地同符河出圖而洛出}
  - {type: variant, offset: 8, length: 1, content: 晉, krp: 人上言帝王興運天地同符河出圖而洛出}
  - {type: variant, offset: 10, length: 0, content: '', WYG: 雲從龍而風從虎莫不恢張八表覆育兆民立大定之基保無疆之祚人謠再洽天命顯歸須登宸極之尊以奉祖宗之祀伏惟皇帝陛下天資仁智神助機權奉莊宗于多難之時從先帝于四征之際凡當決勝無不成功洎正皇綱毎嚴師律為國家之志大守臣子之道全自泣遺弓常悲易月欲期同軌親赴因山而自鄂王承祧奸臣擅命致神祇之乏饗激朝野以歸心使屈者伸令否者泰人情大順天象至明聚東井以呈祥拱北辰而應運由是文武百辟岳牧羣賢至于比屋之倫盡祝當陽之位今則承太后慈旨守先朝逺圖撫四海九州享千齡萬祀臣等不勝大願謹上寶册禀太后令奉皇帝踐祚臣等誠慶誠忭謹言帝就殿之東楹受羣臣稱賀先是帝在鳳翔日有瞽者張濛自言知術數事太白山神其神祠即元魏時崔浩廟也時之否泰人之休咎濛告于神即𫝊吉凶之言帝親校房暠酷信之一日濛至府聞帝語聲駭然曰非人臣也暠詢其事即𫝊神語曰三珠併一珠驢馬沒人驅嵗月甲庚午中興戊已土暠請解釋曰神言予不知也長興四年五月府廨諸門無故自動人頗駭異遣暠問濛濛曰衙署小異勿怪不出三日當有恩命是夜報至封潞王及帝移鎮河東甚懼問濛濛曰王保無患王思同兵至又詰之濛曰王有天下不能獨力朝廷兵来迎王也王若疑臣臣惟一子請王致之麾下以質臣心帝乃以濛攝館驛巡官至是帝受册册曰維應順元年嵗次甲午四月庚午朔帝迴視房暠曰張濛神言甲庚午不亦異乎帝令暠共術士解三珠一珠事言三珠三帝也驢馬没人驅失位也帝即位之後以濛為將作少監同正仍賜金紫以酬之帝初封潞王言事者云潞字一足已入洛矣又帝在鳳翔日有何叟者年踰七}
