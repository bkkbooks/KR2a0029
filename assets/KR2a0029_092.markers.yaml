  - {type: variant, offset: 4878, length: 354, content: 李懌京兆人也祖褒唐黔南觀察使父昭戶部尚書懌幼而能文進士擢第解褐為校書郎集賢校理清河尉入梁歷監察御史右補闕殿中侍御史起居舍人禮部員外郎知制誥換都官郎中賜緋召入翰林為學士正拜舍人賜金紫仍舊內職莊宗平汴洛責授懷州司馬遇赦量移孟州入為衞尉少卿天成初復拜中書舍人充翰林學士在職轉戶部侍郎右丞充承旨時常侍張文寶知貢舉中書奏落進士數人仍請詔翰林學士院作一詩一賦下禮部為舉人格樣學士竇夢徵張礪輩撰格詩格賦各一格詩原本作權詩今從歐陽史改正影庫本粘籤送中書宰相未以為允夢徵等請懌為之懌笑而答曰李懌識字有數頃歲因人偶得及第敢與後生髦俊為之標格假令今却稱進士就春官求試落第必矣格賦格詩不敢應詔君子多其識大體天福中自工部尚書轉太常卿歷禮部刑部二尚書以多病留司於洛下不交人事開運末遇契丹入洛家事罄空尋以疾卒年七十餘永樂大典卷一萬三百九十, WYG: 攷證}
