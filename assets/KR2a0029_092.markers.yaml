  - {type: variant, offset: 303, length: 192, content: 而其人非且富有壽算復而歸之則筋骸已敗由是獲譴使不得為陽生公中夏之相輔也今為謁中天之祠若以某姓名求之神必許諾顗因為之虔禱而還白衣迎于山下曰余免其苦矣拜謝而退顗次年擢進士第梁貞明中歷校書郎登封令右補闕禮部員外郎召入翰林累遷至中書舍人唐莊宗平梁以例貶復州司馬歲餘牽復授左散騎常侍歷兵吏部侍郎尚書左丞唐末帝即位講求輔相乃書朝中清望官十餘人姓名置於瓶中清夜焚香而挾之既而得盧文紀與顗遂拜中書侍郎, WYG: 加同}
