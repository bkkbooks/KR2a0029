  - {type: variant, offset: 4469, length: 407, content: 考異故責詞略曰若以道路迢遙即鸞閣之台臣亦往若以筋骸衰減即鳳翔之冊使纔回既黷憲章須從殿黜云其實權不欲臣事契丹故堅辭之非避事以違命也踰歲授太子少傅致仕六年秋以疾卒年七十八贈左僕射永樂大典卷六千八百五十一韓惲字子重太原晉陽人曾祖俊唐龍武大將軍祖士則石州司馬父逵代州刺史惲世仕太原昆仲為軍職惟惲親狎儒士好為歌詩聚書數千卷乾寧中後唐莊宗納其妹為妃初為嫡室故莊宗深禮其家而惲以文學署交城文水令入為太原少尹莊宗平定趙魏為魏州支使莊宗即位授右散騎常侍從駕至洛陽轉尚書戶部侍郎天成初改秘書監俄而馮道為丞相與惲有同幕之舊以惲性謹厚尤左右之尋遷禮部尚書丁內憂服闋授戶部尚書明宗晏駕馮道為山陵使引惲為副使清泰初以充奉之勞授檢校尚書右僕射絳州刺史踰年入為太子賓客高祖登極以惲先朝懿戚深加禮遇除授貝州刺史時范延光有跋扈之狀惲懼其見逼遲留不敢赴任高祖不悅復授太子賓客尋改兵部尚書天福七年夏車駕在鄴惲病脚氣卒於龍興寺時年六十餘永樂大典卷三千六百七, WYG: 巻四}
