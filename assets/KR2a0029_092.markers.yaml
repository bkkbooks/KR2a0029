  - {type: variant, offset: 562, length: 1156, content: 分為三銓尚書一人曰尚書銓侍郎二人曰中銓東銓每歲集以孟冬三旬而選盡季春之月天成中馮道為相建言天下未一選人歲纔數百而吏部三銓分注雖曰故事其寔徒煩而無益始詔三銓合而為一而尚書侍郎共行選事至顗與盧文紀為相復奏分銓為三而循資長定舊格歲久多舛因增損之選人多不便之往往邀遮宰相喧訴不遜顗等無如之何廢帝為下詔書禁止高祖登極罷相為刑部尚書俄遷戶部尚書天福五年冬卒年七十五贈左僕射子惟和嗣顗疏于財而御家無術既死斂葬之資不備家人俟賻物及鬻第方能舉喪而去士大夫愛其廉而笑其拙永樂大典卷五千三百八十三呂琦呂琦傳永樂大典闕全篇今就散見各韻者共得四條排次前後以存梗概影庫本粘籤字輝山幽州安次人也祖壽瀛州景城主簿父兗滄州節度判官累至檢校右庶子永樂大典卷一萬七百六十五劉守光攻陷滄州琦父兗被擒族之琦時年十五案厚德錄作琦年十四舊五代史考異為吏追攝將就戮焉有趙玉者案厚德錄作李玉舊五代史考異幽薊之義士也久遊于兗之門下見琦臨危乃紿謂監者曰此子某之同氣也幸無濫焉監者信之即引之俱去行一舍琦困于徒步以足病告玉負之而行逾數百里因變姓名乞食于路乃免其禍永樂大典卷一萬四千五百八十一案厚德錄云李玉嘗客于滄洲呂兗門下劉守光破滄洲盡殺呂兗家兗子琦年十四玉負之以逃匄衣食以資之燕趙間以玉能存呂氏之孤推以為義士清泰中琦為給事中端明殿學士時玉已卒乃薦其子于知貢舉馬裔孫遂擢甲第考薛史作趙玉厚德錄作李玉薛史作琦年十五厚德錄作十四蓋傳聞之異孔本年弱冠以家門遇禍邈無所依乃勵志勤學多遊於汾晉永樂大典卷三千八百七十一唐天祐中莊宗方開霸府翹佇賢士墨制授琦代州軍事判官秩滿歸太原監軍使張承業重琦器量禮遇尤厚天成初拜琦殿中侍御史遷駕部員外郎兼侍御史知雜事會河陽帑吏竊財事發詔軍巡院之時軍巡使尹訓怙勢納賂枉直相反俄有訴寃於闕下者詔琦按之既驗其姦乃上言請治尹訓沮而不行琦連奏不已訓知其不免自殺於家其獄遂明蒙活者甚衆自是朝廷多琦之公直永樂大典卷二萬五百二十八高祖建義於太原唐末帝幸懷州趙德鈞駐軍于團柏谷末帝以琦嘗在德鈞幕下因令齎都統使官告以賜之且犒其軍焉及觀軍于北陲館于忻州會晉祖降下晉安寨遣使告于近郡琦適遇其使即斬之以聞尋率郡兵千人間道而歸案通鑑作帥州兵趣鎮州舊五代史考異高祖入洛亦弗之責止改授祕書監而已天福中預修唐書權掌選部皆有能名焉累遷禮部刑部戶部兵部侍郎階至金紫光祿大夫爵至開國子琦美丰儀有器㮣雖以剛直聞于時而內實仁恕初高祖謀求輔相時宰臣李崧力薦琦于高祖云可大用高祖數召琦于便殿言及當世事甚奇之方將倚以為相忽遇疾而逝人皆惜之永樂大典卷一萬七百六十五梁文矩字德儀鄆州人父景祕書少監梁福王友璋好接賓客文矩少遊其門初試太子校書轉祕書郎友璋領鄆州奏為項城令及移鎮徐方辟為從事友璋卒改兗州觀察判官時莊宗遣明宗襲據鄆州文矩以父母在鄆一旦隔越不知存亡為子之情戀望如灼遂間路歸鄆尋謁莊宗莊宗喜之授天平, WYG: 署静難}
