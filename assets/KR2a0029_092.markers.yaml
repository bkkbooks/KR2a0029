  - {type: variant, offset: 2501, length: 226, content: 常山舊五代史考異歸葬石邑時年六十八永樂大典卷一萬一百八十三裴字司東系出中眷裴氏世居河東為望族容止端秀性卞急剛直而無隱少而好學苦心文藝雖遭亂離手不釋卷唐光化三年擢進士第釋褐授校書郎歷諫職梁初當路推其文學遷翰林學士中書舍人唐莊宗時擢為禮部侍郎後以語觸當事改太子賓客旋授兵部尚書以老致仕天福初起為工部尚書復告老以右僕射致仕累知貢舉稱得士宰相馬裔孫桑維翰皆其所取進士也後裔孫知貢舉率新進士謁喜為詩曰詞場最重是持衡天遣愚夫受盛名三主禮闈年八十門生門下見門生當世榮, WYG: 京師死}
