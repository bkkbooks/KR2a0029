  - {type: variant, offset: 3692, length: 606, content: 新唐書宰相世系表祗德兵部尚書舊五代史考異贈太傅父顥案新唐書世系表顥字養正疑顥字是頤字之訛舊五代史考異河南尹贈太師其先世居滎陽自隋唐三百餘年公卿輔相蟬聯一門韜光唐宣宗之外孫萬壽公主之所出也生三日賜一子出身銀章朱紱及長美容止神爽氣澈不妄喜怒秉執名節為甲族所稱自京兆府參軍歷祕書郎集賢校理太常博士虞部比部員外郎司門戶部郎中河南京兆少尹太常少卿諫議大夫給事中梁貞明中懇求休退上表漏名責授寧州司馬莊宗平梁遷工禮刑部侍郎天成長興中歷尚書左右丞國初以戶部尚書致仕自襁褓迨于懸車凡事十一君越七十載所仕無官謗無私過三持使節不辱君命士無賢不肖皆恭己接納晚年背傴時人咸曰鄭傴不迂平生交友之中無怨隙親族之間無愛憎恬和自如性尚平簡及致政歸洛甚愜終焉之志天福五年秋寢疾而卒年八十贈右僕射永樂大典卷一萬八千八百八十一王權王權太平御覽作王欋與原本異通鑑歐陽史統作王權知欋字係傳刻之誤今仍其舊影庫本粘籤字秀山太原人積世衣冠曾祖起官至左僕射山南西道節度使冊贈太尉諡曰文懿唐史有傳祖龜浙東觀察使父蕘右司員外郎權舉進士解褐授祕書省校書郎集賢校理歷左拾遺右補闕梁祖革命御史司憲崔沂表為侍御史遷兼職方員外郎知雜事歲餘召入翰林為學士在院加戶部郎中知制誥歷左諫議大夫給事中充集賢殿學士判院事俄拜御史中丞唐莊宗平梁以例出為隨州司馬會赦量移許州月餘入為右庶子遷戶兵吏三侍郎尚書左丞禮部尚書判銓清泰中權知貢舉改戶部尚書華資美級罕不由之高祖登極轉兵部尚書天福中命權使於, WYG: ''}
