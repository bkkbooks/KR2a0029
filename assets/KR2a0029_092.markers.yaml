  - {type: variant, offset: 2728, length: 849, content: 桑維翰嘗私見不為迎送人問之曰我見桑公于中書庶僚也今見我于私第門生也人以為允卒年八十五贈太子太保永樂大典卷五千三百五吳承範字表微魏州人也父瓊右金吾衞將軍累贈太子少保承範少好學善屬文唐閔帝之鎮鄴都也聞其才名署為賓職承範懇求隨計閔帝許之長興三年擢進士第及閔帝即位授左拾遺清泰二年以本官充史館修撰與同職張昭等共修明宗實錄考張昭本名昭遠至漢初始去遠字薛史晉書已作張昭蓋從其最後之名今姑仍其舊影庫本粘籤轉右補闕依前充職高祖革命遷尚書屯田員外郎知制誥天福三年改樞密院直學士未幾自祠部郎中知制誥召充翰林學士正拜中書舍人賜金紫少帝嗣位遷禮部侍郎知貢舉尋遘疾而卒年四十二贈工部尚書承範溫厚寡言善希人旨桑維翰李崧尤重之嘗薦于高祖云可大用承範知之持重自養雖遇盛夏而猶服襦袴加之以純綿蓋慮有寒濕之患也然竟不獲其志其命也夫永樂大典卷三千三百二十一盧導字熙化其先范陽人也祖伯卿案新唐書宰相世系表卿太原少尹伯初之子也疑原本衍伯字舊五代史考異唐殿中侍御史父如晦案新唐書世系表作知晦舊五代史考異國子監丞贈戶部侍郎導少而儒雅美詞翰善談論唐天祐初登進士第釋褐除校書郎由均州鄖鄉縣令入為監察御史三遷職方員外郎充史館修撰改河南縣令禮部郎中賜紫轉右司郎中兼侍御史知雜事以病免閒居於漢上久之天成中以本官徵還拜右諫議大夫長興末為中書舍人權知貢舉明年春潞王自鳳翔擁大軍赴闕唐閔帝奔于衞州宰相馮道李愚集百官于天宮寺李愚原本作李遇今從通鑑改正影庫本粘籤將出迎潞王時軍衆離潰人情奔駭百官移時未有至者導與舍人張昭先至馮道請導草勸進牋導曰潞王入朝郊迎可也案通鑑作班迎舊五代史考異若勸進之事安可造次且潞王與主上皆太后之子或廢或立當從教令安得不稟策母后率爾而行馮道曰凡事要務實勸進其可已乎導曰今主上蒙塵在外遽以大位勸人若潞王守道以忠義見責未審何詞以對不如率羣臣詣宮門取太后進止即去就善矣道未及對會京城巡檢安從進報曰潞王至矣安得百僚無班即紛然而去是日潞王未至馮道等止于上陽門外又令導草勸進牋案歐陽史作潞王止于上陽門外道又令導草牋與薛史異通鑑作潞王未至三相息于上陽門外, WYG: ''}
