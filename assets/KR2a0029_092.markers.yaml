  - {type: variant, offset: 2067, length: 428, content: 光中任圜為真定尹擢為本府司錄不應命郭崇韜領其地辟為從事及明宗代崇韜以舊職縻之明宗即位入為文昌正郎安重誨薦為河南少尹判府事尋命為樞密院直學士時圭以受知於重誨重誨奏令圭與同列閻至俱昇殿侍立以備顧問明宗可之尋自左諫議大夫拜尚書右丞有入相之望圭敏于吏事重誨本不知書為事剛愎每於明宗前可否重務圭恬然終日不能剖正其事長興中重誨既誅圭出為貝州刺史未幾罷免退歸常山由是閉門杜絕人事雖親戚故人造者不見其面每遊別墅則乘婦人氈車以自蔽匿人莫知其心高祖登極徵為刑部侍郎判鹽鐵副使皆宰臣馮道之奏請也始圭在明宗時為右丞權判銓事道在中書嘗以堂判衡銓司所注官圭怒力爭之道亦微有不足之色至是圭首為道所舉方愧其度量遠不及也旋改吏部侍郎分知銓事而圭素厲廉守節大著公平之譽圭前為河南少尹日有嵩山術士遺圭石藥如斗謂圭曰服之可以延壽然不可中輟輟則疾作矣圭後服之神爽力健深寶惜焉清泰末圭在常山遇祕瓊之亂時貯於衣笥為賊所劫後不復得天福中疾生胸臆之間常如火灼圭知不濟求歸鄉里詔許之及涉河竟為藥氣所蒸卒於路案, WYG: ''}
