  - {type: variant, offset: 4518, length: 1, content: 合, WYG: 度使以捧日都指揮使鄭州防禦使李紹琛為陜州節度使以成徳軍馬步軍都指揮使右監門衛大將軍毛璋為華州節度使壬辰樞宻使郭崇韜再上表請退樞宻之識優詔不允癸已詔曰皇太后母儀天下子視羣生當别建宫闈顯標名號冀因稱謂益表尊嚴宜以長夀宫為名樞宻使郭崇韜奏時務利便一十五件優詔褒美甲午奚王李詔威吐渾李詔魯皆貢駞馬丁酉以武安軍衙内馬步軍都指揮使昭州刺史馬希範為永州刺史檢校太保癸夘以光禄大夫檢校左僕射行太常卿李燕為特進檢校司空依前太常卿以御史中丞李徳休為}
