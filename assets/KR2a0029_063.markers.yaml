  - {type: variant, offset: 67, length: 150, content: 定河南復名全義祖璉父誠世為田農全義為縣嗇夫嘗為令所辱乾符末黃巢起寃句全義亡命入巢軍巢入長安以全義為吏部尚書充水運使巢敗依諸葛爽於河陽累遷至裨校屢有戰功爽表為澤州刺史案洛陽搢紳舊聞記齊王張令公外傳云王在巢軍中知其必敗遂翻身歸國唐授王澤州刺史考是書則全義因巢敗始歸諸葛爽乃表為澤州刺史也舊聞記殊失事實殿本, WYG: 紀五同}
