  - {type: variant, offset: 5136, length: 304, content: 時方面諸侯皆行賂遺或求賂於繼麟雖僶俛應奉不滿其請且曰河中土薄民貧河中原本作荷平今從歐陽史改正影庫本粘籤厚貺難辦由是羣小咸怨遂加誣搆郭崇韜討巴蜀徵師於河中繼麟令其子令德率師赴之伶官景進與其黨搆曰昨王師初起繼麟以為討己頗有拒命之意若不除移如國家有急必為後患郭崇韜既誅宦官愈盛遂搆成其罪謂莊宗曰崇韜強項於蜀蓋與河中響應繼麟聞之懼將赴京師面訴其事其部將曰王有大於國密邇京城羣小流言何足介意端居奉職讒邪自銷不可輕行繼麟曰郭公功倍於我尚為人搆陷吾若得面天顏自陳肝膈則流言者獲罪矣四年正月繼麟入覲景進謂莊宗曰河中人有告變者言繼麟與崇韜謀叛聞崇韜死又與李存乂搆逆當斷不斷禍不旋踵羣閹異口同辭莊宗駭惑不能決是月二十三日授繼麟滑, WYG: 宋}
