  - {type: line-break, offset: 1954, content: '', id: ZHSJ__dup10300}
  - {type: variant, offset: 1955, length: 432, content: 帥梁帝季年趙張用事段凝為北面招討使驟居諸將之右全義知其不可遣使啟梁末帝曰老臣受先朝重顧蒙陛下委以副元帥之名臣雖遲暮尚可董軍請付北面兵柄庶分宵旰段凝晚進德未服人恐人情不和敗亂國政不聽全義託朱氏垂三十年梁祖末年猜忌宿將欲害全義者數四全義卑身曲事悉以家財貢奉洎梁祖河朔喪師之後月獻鎧馬以補其軍又以服勤盡瘁無以加諸故竟免於禍全義妻儲氏明敏有才略梁祖自柏鄉失律後連年親征河朔心疑全義或左右讒間儲氏每入宮委曲伸理有時怒不可測急召全義儲氏謁見梁祖厲聲言曰宗奭種田叟耳三十餘年洛城四面開荒斸棘招聚軍賦資陛下創業今年齒衰朽指景待盡而大家疑之何也梁祖遽笑而謂曰我無惡心嫗勿多言案齊王外傳云梁祖猜忌王慮為後患前後欲殺之者數四夫人儲氏面請梁祖得免梁祖遂以其子福王納齊王之女舊五代史考異莊宗平梁全義自洛赴覲泥首待罪莊宗撫慰久之案齊王外傳云再上表述屢為朱梁窺圖偶脫虎口逼為親且非素志乞雪表數句云伏念臣曾棲惡木曾飲盜泉實有瑕疵未蒙昭雪復下昭雪之令亦見洛陽搢紳舊聞記舊五代史考異以其年老令人掖而昇, WYG: ''}
