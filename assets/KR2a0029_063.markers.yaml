  - {type: variant, offset: 218, length: 1226, content: 啟初爽卒其子仲方為留後部將劉經與李罕之爭據洛陽罕之敗經於聖善寺聖善寺原本作聖喜今從新唐書改正影庫本粘籤乘勝欲攻河陽營於洛口經遣全義拒之全義乃與罕之同盟結義返攻經於河陽為經所敗收合餘衆與罕之據懷州乞師於武皇武皇遣澤州刺史安金俊助之進攻河陽劉經仲方委城奔汴罕之遂自領河陽表全義為河南尹案張齊賢撰齊王張令公外傳云初過三城謁節度使諸葛爽爽有人倫之鑒覩王之狀貌待之殊厚謂王曰他時名位在某之上勉之爽既沒王漸貴追思疇昔見知之恩未嘗報乃圖其形像於其私第日焚香供養之至于終身案諸葛爽死全義親逐其子而據其地乃復懸像事之以明其不背本此劇賊欺人之術耳舊五代史考異全義性勤儉善撫軍民雖賊寇充斥而勸耕務農由是倉儲殷積案洛陽搢紳舊聞記王每喜民力耕織者某家今年蠶麥善去都城一舍之內必馬足及之悉召其家老幼親慰勞之賜以酒食茶綵丈夫遺之布袴婦人裙衫時民間尚衣青婦人皆青絹為之取其新麥新繭對之喜動顏色民間有竊言者曰大王見好聲妓等閒不笑惟見好蠶麥即笑爾其真朴皆此類每觀秋稼見田中無草者必下馬命賓客觀之召田主慰勞之賜之衣物若見禾中有草地耕不熟立召田主集衆決責之若苗荒地生詰之民訴以牛疲或闕人耕鋤則田邊下馬立召其鄰仵責之曰此少人牛何不衆助之鄰仵皆伏罪即赦之自是洛陽之民無遠近民之少牛者相率助之少人者亦然田夫田婦相勸以耕桑為務是以家有蓄積水旱無飢民王誠信每水旱祈祭必具湯沐素食別寢至祠祭所儼然若對至尊容如不足遇旱祈禱未雨左右必曰王可開塔即無畏師塔也在龍門廣化寺王即依言而開塔未嘗不澍雨故當時俚諺云王禱雨買雨具舊五代史考異罕之貪暴不法軍中乏食每取給於全義二人初相得甚歡而至是求取無厭動加凌轢全義苦之案新唐書李罕之傳云張言善積聚罕之食乏士仰以給求之無涯言不能厭罕之拘河南官笞督之又東方貢輸行在者多為罕之所邀與薛史互有異同齊王外傳云罕之鎮三城知王專以教民耕織為務常宣言于衆曰田舍翁何足憚王聞之蔑如也每飛尺書于王求軍食及縑帛王曰李太傅所要不得不奉之左右及賓席咸以為不可與王曰第與之似若畏之者左右不曉罕之謂王畏己不設備因罕之舉兵收懷澤王乃密召屯兵潛師夜發遲明入三城罕之乃逃遁投河東朝廷即授王兼鎮三城文德元年四月罕之出軍寇晉絳全義乘其無備潛兵襲取河陽全義乃兼領河陽節度罕之求援於武皇武皇復遣兵助攻河陽會汴人救至而退梁祖以丁會守河陽全義復為河南尹檢校司空全義感梁祖援助之恩自是依附皆從其制初蔡賊孫儒諸葛爽爭據洛陽迭相攻伐七八年間都城灰燼滿目荊榛全義初至唯與部下聚居故市井邑窮民不滿百戶全義善於撫納課部人披榛種蓺披榛原本作被蓁今據歐陽史改正影庫本粘籤且耕且戰以粟易牛歲滋墾闢招復流散待之如子每農祥勸耕之始全義必自立畎畝餉以酒食政寬事簡吏不敢欺數年之間京畿無閑田編戶五六萬案齊王外傳云王始至洛於麾下百人中選可使者一十八人命之曰屯將每人給旗一口榜一道於舊十八縣中令招農戶令自耕種流民漸歸王於百人中又選可使者十八人命之曰屯副民之來者撫綏之除殺人者死餘但加杖而已無重刑無租稅流民之歸漸衆王又麾下選書計一十八人命之曰屯判官不一, WYG: ''}
