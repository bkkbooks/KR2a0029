  - {type: variant, offset: 3445, length: 346, content: 自據河陽其翻覆也如此自是托迹朱梁斲喪唐室惟勤課勸其實斂民附賊以固恩寵梁時月進鎧馬以補軍實及梁祖為友珪所弒首進錢一百萬以助山陵莊宗平中原全義合與敬翔李振等族誅又通賂於劉皇后乘莊宗幸洛言臣已有郊天費用夫全義匹夫也豈能自殖財賦其剝下奉上也又如此晚年保證明宗欲為子孫之福師方渡河鄴都兵亂全義憂恨不食終以餓死未死前其子繼業訟弟汝州防禦使繼孫莊宗貶房州司戶賜自盡其制略曰侵奪父權惑亂家事縱鳥獸之行畜梟獍之心其御家無法也又如此河南令羅貫方正文章之士事全義稍慢全義怒告劉皇后斃貫於枯木之下朝野寃之洛陽監軍使嘗收得李太尉平泉莊醒酒石全義求之監軍不與全義立殺之其附勢作威也又如此蓋亂世賊臣耳得保首領為幸已多晉天福中其子繼祚謀反伏誅識者知餘殃在其子孫也臣讀莊宗實錄見史官全義傳虛美尤甚至今負俗無識之士尚以全義為名臣, WYG: 命宜准}
