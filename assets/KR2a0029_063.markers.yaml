  - {type: variant, offset: 5531, length: 181, content: 考異命夏魯奇誅其族於河中初魯奇至友謙妻張氏率其家屬二百餘口見魯奇曰請疏骨肉名字無致他人橫死將刑張氏持先賜鐵券授魯奇曰皇帝所賜也是時百口塗地寃酷之聲行路流涕先是河中衙城閽者夜見婦人數十袨服靚塟僕馬炫耀自外馳騁笑語趨衙城閽者不知其故不敢詰至門排騎而入既而扃鎖如故復無人迹乃知妖鬼也又繼麟登逍遙樓聞哭聲四合詰日訊之巷無喪者隔歲乃族誅及明宗即位始下詔昭雪焉永樂大典卷二千, WYG: 巻}
