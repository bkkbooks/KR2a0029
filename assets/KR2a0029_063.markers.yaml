  - {type: variant, offset: 5085, length: 0, content: '', WYG: 檢校石僕射權北面水陸轉運制置使甲戌以順義軍畱後華温琪依前檢校太保充畱後乙亥以天策上將軍武安等軍節度使守太師中書令楚王馬殷可依前守太師兼尚書令詔在京諸道節度使刺史令各歸本任丁丑以前幽州節度使内外藩漢馬步總管檢校太師兼中書令李存審為宣武軍節度使餘如故巳夘帝御文明殿冊魏國夫人劉氏為皇后庚辰賜郭彦威姓名曰紹真癸未以宋州節度使李繼安依前檢校太尉同平章事宋州節度使以}
