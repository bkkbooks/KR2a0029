  - {type: variant, offset: 2690, length: 0, content: '', WYG: 傅同平章事李存霸權知潞州畱後以知保大軍軍州事高允韜為檢校太保庚戌以涇原節度使充奏王府諸道行軍司馬開府儀同三司檢校太尉兼侍中李從曮為檢校太尉兼中書令依前涇原節度使充奏王府諸道行軍司馬詔改應順門為永曜門太平門為萬春門通政門為廣政門鳳明門為韶和門萬春門為中興門解卸殿為端明殿是日詔曰皇綱已正紫禁方嚴凡事内官不合更居外地詔諸道應有宦官不計高低並仰逐處并家口發遣赴闕不得輒有停滯帝龍潛時寺人數已及五百至是合諸道赴闕者約千餘人皆給賜優贍服玩華侈委之事務付以腹心唐時宦官為内諸司使務諸鎮監軍出納王命造作威福昭宗以此亡國及帝奄有天下當知戒彼前車以為殷鑒一朝復興兹弊議者惜之新羅王金朴英遣使朝貢辛亥中書門下奏準本朝故事諸王内命婦宰臣學士中書舍人諸道節度防禦團練使畱後官告即中書帖官告院索綾紙褾軸下所司書冩印署畢進入宣賜其文武兩班及諸道官員並奏薦將校並合于所司送納朱膠綾紙價錢伏自偽梁不分輕重並從官給今後如非前件事例請官中不給告勅其内司大官侍衛將校轉官即不在此限從之壬子蜀主王衍致書于帝稱有詐為天使馳報收復汴州者詔捕之不獲癸丑有司奏郊祀前二日迎祔高祖太宗懿祖獻祖太祖神主于太廟議者以中興唐祚不宜以追封之祖雜有國之君以為昭穆自懿祖巳下宜别立廟于代州如後漢南陽故事可也幽州北面軍前奏契丹還塞詔李嗣源班}
