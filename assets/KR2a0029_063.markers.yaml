  - {type: variant, offset: 2690, length: 0, content: '', krp: 傅同平章事李存霸權知潞州畱後以知保大軍軍州事高允韜為檢校太保庚戌以涇原節度使充奏王府諸道行軍司馬開府儀同三司檢校太尉兼侍中李從曮為檢校太尉兼中書令依前涇原節度使充奏王府諸道行軍司馬詔改應順門為永曜門太平門為萬春門通政門為廣政門鳳明門為韶和門萬春門為中興門解卸殿為端明殿是日詔曰皇綱已正紫禁方嚴凡事内官不合更居外地詔諸道應有宦官不計高低並仰逐處并家口發遣赴闕不得輒有停滯帝龍潛時寺人數已及五百至是合諸道赴闕者約千餘人皆給賜優贍服玩華侈委之事務付以腹心唐時宦官為内諸司使務諸鎮監軍出納王命造作威福昭宗以此亡國及帝奄有天下當知戒彼前車以為殷鑒一朝復興兹弊議者惜之新羅王金朴英遣使朝貢辛亥中書門下奏準本朝故事諸王内命婦宰臣學士中書舍人諸道節度防禦團練使畱後官告即中書帖官告院索綾紙褾軸下所司書冩印署畢進入宣賜其文武兩班及諸道官員並奏薦將校並合于所司送納朱膠綾紙價錢伏自偽梁不分輕重並從官給今後如非前件事例請官中不給告勅其内司大官侍衛將校轉官即不在此限從之壬子蜀主王衍致書于帝稱有詐為天使馳報收復汴州者詔捕之不獲癸丑有司奏郊祀前二日迎祔高祖太宗懿祖獻祖太祖神主于太廟議者以中興唐祚不宜以追封之祖雜有國之君以為昭穆自懿祖巳下宜别立廟于代州如後漢南陽故事可也幽州北面軍前奏契丹還塞詔李嗣源班}
  - {type: punctuation, offset: 2691, content: 、, id: KR2a0029_ZHSJ_063-bkkpn573}
  - {type: variant, offset: 2691, length: 0, content: '', WYG: 鳳翔節度使秦王李茂貞上表請行藩臣之禮帝優報之甲寅帝于中興殿面賜郭崇韜鐡劵有司上言皇太后到闕皇帝合于銀臺門内奉迎詔親至懷州奉迎中書奏自二十三日後散齋内車駕不合遠出詔改至河陽奉迎以禮部尚書興唐尹王正言依前禮部尚書充租庸使乙卯渤海國遣使貢方物幽州奏媯州山後十三寨百姓却復新州戊午以前太子少師薛廷珪為檢校户部尚書太子少師致仕以前太子賓客封舜卿為太子少保致仕以前太子賓客李文規為户部侍郎致仕詔鹽鐡度支户部並委租庸使管轄庚申四方館上言請今後除隨駕將校及外方進奉専使文武班三品已上官可以内殿對見其餘並詣正衙以申常禮從之車駕幸河陽奉迎皇太后辛酉帝侍皇太后至文武百寮迎于上東門是日河中府上言稷山縣割隸絳州以太僕卿李紓為宗正卿以衛尉卿楊遘為太僕卿西京昭應縣華清宫道士張沖虚上言天尊院枯檜重生枝葉乙丑有司上言南郊朝享太廟舊例親王充亞獻終獻行事乃以皇子繼岌為亞獻皇弟存紀為終獻丙寅帝赴明堂殿致齋丁卯朝饗于太微宫戊辰饗太廟是日赴南郊二月已巳朔親祀昊天上帝于圜丘禮畢宰臣率百官就次稱駕還御五鳳樓宣制大赦天下應同光二年二月一日昧爽已前所犯罪無輕重常赦所不原者咸赦除之十惡五逆屠牛鑄錢故殺人合造毒藥持杖行刧官典犯贓不在此限應自來立功將校各與轉官仍加賞給文武常參官節度觀察防禦刺史軍主都虞候指揮使父母亡殁者並與追贈在者各與加爵増封諸藩鎮各賜一子出身仍封功臣名號畱後刺史官高者加階爵一級官卑者加官一資應本朝内外臣寮被朱氏殺害者特與追贈應諸州府不得令富室分外收貯見錢禁工人鎔錢為銅器勿令商人載錢出境近年已來婦女服飾異常寛博倍費縑綾有力之家不計卑賤悉衣錦繡宜令所在糾察應有百姓婦女曽經俘擄他處為婢妾者一任骨肉識認男子曽被刺面者給與憑據放逐營生召天下有能以書籍進納者各等第酬奬仰有司速檢勘天下户口正額墾田實數待憑條理以息煩苛是日風景和暢人胥悦服議者云五十年來無此盛禮然自此權臣愎戾伶官用事吏人孔謙酷加賦斂赦文之所原放謙復刻剥不行大失人心始于此矣庚午租庸使孔謙奏諸道剛運客旅多于私路茍免啇税請令所在關防嚴加捉搦從之癸酉宰臣豆盧革率百官上尊號曰昭文睿武至徳光孝皇帝凡三上表從之申戌詔曰汴州元管開封浚儀封丘雍丘尉氏陳畱六縣偽庭割許州鄢陵扶溝陳州太康鄭州陽武中牟曹州考城等縣屬焉其陽武匡城扶溝考城四縣宜今且隸汴州餘還本部丙子以隨駕參謀耿瑗為司天監丁丑以光禄大夫檢校司徒李筠為右騎衛上將軍戊寅幸李嗣源第作樂盡歡而罷己卯以河中節度使冀王李繼麟兼安邑解縣兩池𣙜鹽使辛已以檢校太師守}
