  - {type: variant, offset: 2790, length: 604, content: 封王邑萬三千戶凡領方鎮洛鄆陝滑宋三蒞河陽再領許州內外官歷二十九任尹正河洛凡四十年位極人臣善保終吉者蓋一人而已全義朴厚大度敦本務實起戰士而忘功名尊儒業而樂善道家非士族而奬愛衣冠開幕府辟士必求望實屬邑補奏不任吏人位極王公不衣羅綺心奉釋老而不溺左道如是數者人以為難自莊宗至洛陽趨向者皆由徑以希恩寵全義不改素履盡誠而已言事者以梁祖為我世讎宜斲棺燔柩全義獨上章申理議者嘉之劉皇后嘗從莊宗幸其第奏云妾孩幼遇亂失父母欲拜全義為義父許之全義稽首奏曰皇后萬國之母儀古今未有此事臣無地自處莊宗敦逼再三不獲已乃受劉后之拜既非所願君子不以為非然全義少長軍中立性朴滯凡百姓有詞訟以先訴者為得理以是人多枉濫為時所非又嘗怒河南縣令羅貫因憑劉后譖於莊宗俾貫非罪而死露屍於府門寃枉之聲聞於遠近斯亦良玉之微瑕也永樂大典卷六千三百五十五代史闕文梁乾化元年七月辛丑梁祖幸全義私第甲辰歸大內梁史稱上不豫厭秋暑幸宗奭私第數日宰臣視事於仁政亭崇政諸司並止於河南府廨署世傳梁祖亂全義之家婦女悉皆進御其子繼祚不勝憤欲剚刃於梁祖全義止之曰吾頃在河陽遭李罕之之難引太原軍圍閉經年啗木屑以度朝夕死在頃刻得他救援以至今日此恩不可負也其子迺止梁史云云者諱國惡也臣謹案春秋莊二年經曰十有二月夫人姜氏會齊侯于禚傳曰書姦也夫經言會者諱惡禮也傳書姦者暴其罪以垂誡也又莊二十二年傳書陳宗飲桓公酒公曰以火繼之辭曰臣卜其晝未卜其夜豈有天子幸人臣之家留止數日姦亂萌矣況全義本出巢賊敗依, WYG: ''}
