  - {type: variant, offset: 42, length: 0, content: '', WYG: 鄴都分司列職皆主上舊人委王正言何慮不辦革曰俱是失也設不獲巳以正言掌租庸取書于大臣或可辨矣若付之方面必敗人事謙以正言非德非勲懦而易制曰此議為便然非已志㝷掎正言之失泣訴于崇韜厚賂閹伶以求進用人知奸謟沮之乃上章請退帝怒其規避將寘于法樂人景進于帝前解喻而止王正言風病恍惚不能綜三司事景進屢言于帝乃以正言守禮部尚書以謙為租庸使謙以國用不足奏}
