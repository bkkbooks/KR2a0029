  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書舊五代史巻七十三宋門下侍郎參知政事監修國史薛居正等撰唐書第四十九列傳二十五毛璋本滄州小校梁將載思逺帥滄州時莊宗已定魏博思逺勢蹙棄州遁去璋㩀城歸莊宗玉堂閒話戴思逺任浮陽日有部曲毛璋為性輕悍常與數十卒追捕盗賊還宿于逆旅毛枕劒而寢夜分其劒忽大吼躍出鞘外從卒聞者愕然驚異毛亦神之乃持劒祝曰某若異日有此山河爾當更鳴躍否則巳毛復寢未熟劒吼躍如初毛深自負其後戴離鎮毛請畱戴從之未幾毛以州歸命于唐莊宗莊宗以毛為其州刺史後竟帥滄海歴貝州遼州刺史璋性兇悖有膽畧從征河上屢有戰功梁平授滄州節度使王師討蜀以璋為行營右廂馬軍都指揮使蜀平璋功居多明年蕭墻禍起繼岌自西川至渭南部下散亡其川貨妓樂為璋所掠明宗嗣位録平蜀功授邠州節度使璋旣家富于財有蜀之妓樂驕僣自大動多不法招致部下繕理兵仗朝廷移授昭義節度使璋謀欲不奉詔判官邊蔚宻言規責乃僶俛承命洎至潞州狂妄不悛每擁川妓于山亭院服赭黄縱酒令為王衍在蜀之戲事聞于朝徴為金吾上將軍其年秋東川節度使董璋上言毛璋男廷贇齎文書往西川慮有隂事因追廷贇及同行}
