  - {type: variant, offset: 38, length: 0, content: '', krp: 五月授懐州刺史乾化元年十二月梁祖北征迴過郡凝貢獻加等梁祖大恱梁祖復北凝迎奉進貢有加于前梁祖次相州刺史李思安迎奉疎怠梁祖怒貶思安制云懐州刺史段明逺少年治郡庶事惟公兩度祗奉行鑾數程宿食本界動無遺闕舉必周豐盖能罄竭于家財務在顯酬夫明奬觀明逺之忠勤若此見思安之悖慢何如其見賞如此其後遷鄭州刺史監大軍于河上梁末帝以戴思逺為北面招討使行師不利用王彦章代之受任之翌日取徳勝之南城軍聲大振張漢倫等推功于凝凝掎摭彦章之失以間之通鑑彦章棄鄒家口復趨楊劉逰奕將李紹興敗梁逰兵于清丘縣南段凝以為唐兵巳自上流渡驚駭失色而數彦章尤其深入梁末帝怒罷彦章兵權凝納賂于趙張二族求為招討使敬翔李振極言不可竟不能止凝以衆五萬營于髙陵津禆將康延孝叛歸莊宗延孝具陳梁軍虚實莊宗遂决長驅之計未幾莊宗入汴凝自滑率兵而南前鋒杜晏球至封丘解甲聽命翼日凝率大軍乞降于汴郊莊宗釋之復以凝為滑州兵馬畱後賜姓名紹欽有頃正授節度改兖州節度使凝初見莊宗因伶人景進通貨于宫掖凝天性姦佞巧言餙智善候人意其年契丹㓂幽州命宣徽使李紹宏監䕶諸軍以禦契丹凝與董璋戍瓦橋闗凝巧事紹宏嘗乘間奏凝盖世竒才可以大任屢請以兵柄委之郭崇韜奏曰凝亡國敗軍之將姦謟難狀不可信也凝在藩鎭私用庫物數萬計有司促償中貰其負同光三年四月移授鄧州節度使四年二月趙在禮據鄴城李紹宏詩用凝為大將莊宗許之令具方畧條奏凝所請偏禆皆取其已黨莊宗疑之乃止明宗至洛陽霍彦威怒其前事與温韜同收下獄詔釋之放歸田里明年竄于遼州竟與温韜同制賜死孔謙通鑑作魏州人莊宗同光初為租庸副使謙本州之幹吏上自天祐十二年帝平定魏博會計皆委制置謙能曲事權要效其才力帝委以泉貨之務設法箕歛}
  - {type: variant, offset: 39, length: 1, content: 月, WYG: 八年間軍儲獲濟及帝卽位于鄴城謙已當為租庸使物議以謙雖有經營濟贍之勞然人地尚卑不欲驟㧾重任樞宻使郭崇韜舉魏博觀察判官張憲為租庸使以謙為副謙悒然不樂者久之帝旣平梁汴謙徑自魏州馳之行在因謂崇韜曰魏都重地湏大臣彈壓以謙籌之非張憲不可崇韜以為忠告卽奏憲為鄴都副畱守乃命宰臣豆盧革專判租庸謙彌失望乃㝷草過失時革以手書便省庫錢數十萬謙以手書示崇韜亦辭避帝問當委何人為可崇韜曰孔謙雖久掌貨泉然物議未嘗居大任以臣所見當委張憲為便帝促徴之憲性精辨為時者所忌人不右之謙乘間訴于豆盧革曰租庸錢穀悉在眼前委一小吏可辨鄴都本根之地不可輕付于人興唐尹王正言無禆益之才徒有獨行}
