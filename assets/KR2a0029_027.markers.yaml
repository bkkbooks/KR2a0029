  - {type: variant, offset: 2290, length: 208, content: 鳳翔李茂貞邠州楊崇本合西川王建之師五萬以攻長安遣使會兵於帝帝遣張承業率師赴之九月邠岐蜀三鎮復大舉攻長安遣李嗣昭周德威將兵三萬攻晉州以應之德威與梁將尹皓戰于神山北梁人大敗是時晉之騎將夏侯敬受以一軍奔于梁德威乃退保隰州案歐陽史九月丁丑如懷州通鑑作周德威等聞梁帝將至乙未退保隰州是德威之退師因梁祖之親至也薛史唐紀不載天祐六年秋七月邠岐二帥及梁之叛將劉知俊俱遣使來告叛將原本作判將今據文改正影庫本粘籤將大舉以伐靈夏兼收關輔請, WYG: ''}
