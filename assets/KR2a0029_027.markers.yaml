  - {type: variant, offset: 5249, length: 1, content: 楊, krp: 知俊未至潞夾寨已䧟晉人引軍方攻澤州聞知俊至乃退尋改西路招討使六月大破岐軍于幕谷俘斬千計李荗貞僅以身免三年五月加檢校太尉兼侍中封大彭郡王時知俊威望益隆太祖雄猜日甚會佑國軍節度使王重}
  - {type: variant, offset: 5251, length: 0, content: '', WYG: 無罪見誅知俊居不自安乃據同州叛鍳戒録云彭城王劉知俊鎮同州日因築營墻掘得一物重八十餘片狀若油囊召賓幕將校問之劉源曰此是寃氣所結古來囹圄之地或有焉昔王充據洛陽修河南府獄亦獲此物源聞酒能忘憂奠以醇醪或可消釋耳然此物之出亦非吉徵也知俊命具酒饌祝酹復瘞之尋有叛城背主之事送款于李荗貞又分兵以襲雍華雍州節度使劉捍被擒送鳳翔害之華州蔡敬思被傷獲免太祖聞知俊叛遣近臣諭之曰朕待卿甚}
  - {type: variant, offset: 5251, length: 0, content: '', krp: 無罪見誅知俊居不自安乃據同州叛鍳戒録云彭城王劉知俊鎮同州日因築營墻掘得一物重八十餘片狀若油囊召賓幕將校問之劉源曰此是寃氣所結古來囹圄之地或有焉昔王充據洛陽修河南府獄亦獲此物源聞酒能忘憂奠以醇醪或可消釋耳然此物之出亦非吉徵也知俊命具酒饌祝酹復瘞之尋有叛城背主之事送款于李荗貞又分兵以襲雍華雍州節度使劉捍被擒送鳳翔害之華州蔡敬思被傷獲免太祖聞知俊叛遣近臣諭之曰朕待卿甚}
  - {type: variant, offset: 5252, length: 0, content: '', WYG: 何相負耶知俊報曰臣非背徳但畏死耳王重師不負陛下而致族滅太祖復遣使謂知俊曰朕不料卿為此昨重師得罪蓋劉捍言隂結邠鳳終不為國家用我今雖知枉濫悔不可追致卿如斯我心恨恨蓋劉捍誤于事也捍一死固未塞貴知俊不報遂分兵以守潼闗太祖命劉鄩率兵進討攻潼闗下之時知俊弟知浣為親衛指揮使聞知俊叛自洛奔至潼闗為鄩所擒害之尋而王師繼至知俊乃舉族奔于鳳翔李荗貞厚待之偽加檢校太尉兼中書令以土疆不廣無藩鎮以處之但厚給俸禄而已尋命率兵攻圍靈武且圖收圉之地靈武節度使韓遜遣使來告急太祖令康懐英率師救之師次邠州長城嶺為知俊邀擊懐英敗歸九國志云李彦琦劉知俊自靈武班師塗經長城嶺梁師率精鋭數萬躡其後彦琦與知俊罔設方畧擊敗之荗貞悦署為涇州節度使復命率衆攻興元進圍西縣㑹蜀軍救至乃退九國志王宗鐬傳云岐將劉知俊等領大軍分路來攻由階成路奪固鎮糧王宗侃唐襲等禦之至靑泥嶺為知俊所敗退保西縣會大雨漢江漲宗鐬自羅村得鄉導縁山而行數百里與宗播遇于鐵谷合軍出湯頭時知俊自斜谷山南直抵興州圍西縣軍人㪚掠巴中宗鐬與宗播襲之會王建亦至遂解西縣之圍既而為荗貞左右石簡顒等間之免其軍政寓于岐下掩闗厯年荗貞猶子繼崇鎮秦州因來寧覲言知俊途窮至此不宜以䜛嫉見疑荗貞乃誅簡顒等以安其心繼崇又請令知俊挈家居秦州以就豐給茂貞從之未幾邠州亂茂貞命知俊討之時邠州都校李保衡納欵于朝廷末帝遣霍彦威率衆先入于邠知俊遂圍其城半載不能下㑹李繼崇以秦州降于蜀知俊妻孥皆遷于成都遂解邠州之圍而歸岐陽以舉家入蜀終慮有忌因與親信百餘人夜斬闗奔蜀王建待之甚至即授偽武信軍節度使尋命}
