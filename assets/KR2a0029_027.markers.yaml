  - {type: variant, offset: 2664, length: 215, content: 州靈夏危蹙岐隴之師大舉決取河西帝令周德威將兵萬人西渡河以應之是役也劉知俊為岐人所搆乃自退九月德威班師冬十月梁祖遣大將李思安楊師厚率師營於澤州以攻上黨十一月鎮州王鎔遣使來求援是時梁祖以羅紹威初卒全有魏博之地因欲兼幷鎮定兼幷原本作兼兵今據文改正影庫本粘籤遣供奉官杜廷隱丁延徽督魏軍三千人入于深冀鎮人懼故來告難帝集軍吏議之咸欲按甲治兵徐觀勝負唯帝獨斷堅欲救之乃遣周德威率軍屯于趙州是月行營都招討使丁會卒十二月丁巳朔梁祖聞帝軍屯趙州命寧國, WYG: ''}
