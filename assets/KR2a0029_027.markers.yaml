  - {type: variant, offset: 5254, length: 0, content: '', WYG: 伐岐不克班師因圍隴州獲其帥桑𢎞志以歸乆之復命為都統再領軍伐岐時部將皆王建舊人多違節度不成功而還蜀人因而毁之先是王建雖加寵待然亦忌之嘗謂近侍曰吾漸衰耗恒思身後劉知俊非爾輩能駕馭不如早為之所又嫉其名者于里巷間作謡言云黑牛出圈㯶繩斷知俊色黔而丑生㯶繩者王氏子孫皆以宗承為名故以此搆之偽蜀天漢元年冬十二月建遣人捕知俊斬于成都府之炭市及王衍嗣偽位以其子嗣禋尚偽峨眉長公主拜駙馬都尉後唐同光末隨例遷于洛卒知俊族子嗣彬㓜從知俊征行累遷為軍校及知俊叛以不預其謀得不坐貞明末大軍與晉王對壘于徳勝乆之嗣彬率數騎奔于晉具言朝廷軍機得失又以家世讎怨將以報之晉王深信之即後給田宅仍賜錦衣玉帶軍中目為劉二哥居一年復來奔當時晉人謂是刺客以晉王恩澤之厚故不竊發龍徳}
  - {type: page-break, offset: 5254, content: '', id: KR2a0029_WYG_027-13b, image: WYG0277/WYG0277-0127b.png}
  - {type: page-break, offset: 5254, content: '', id: KR2a0029_WYG_027-14a, image: WYG0277/WYG0277-0127c.png}
  - {type: variant, offset: 5254, length: 0, content: '', krp: 伐岐不克班師因圍隴州獲其帥桑𢎞志以歸乆之復命為都統再領軍伐岐時部將皆王建舊人多違節度不成功而還蜀人因而毁之先是王建雖加寵待然亦忌之嘗謂近侍曰吾漸衰耗恒思身後劉知俊非爾輩能駕馭不如早為之所又嫉其名者于里巷間作謡言云黑牛出圈㯶繩斷知俊色黔而丑生㯶繩者王氏子孫皆以宗承為名故以此搆之偽蜀天漢元年冬十二月建遣人捕知俊斬于成都府之炭市及王衍嗣偽位以其子嗣禋尚偽峨眉長公主拜駙馬都尉後唐同光末隨例遷于洛卒知俊族子嗣彬㓜從知俊征行累遷為軍校及知俊叛以不預其謀得不坐貞明末大軍與晉王對壘于徳勝乆之嗣彬率數騎奔于晉具言朝廷軍機得失又以家世讎怨將以報之晉王深信之即後給田宅仍賜錦衣玉帶軍中目為劉二哥居一年復來奔當時晉人謂是刺客以晉王恩澤之厚故不竊發龍徳}
  - {type: variant, offset: 5255, length: 0, content: '', WYG: 年冬從王彦章戰于中都軍敗為晉人所擒晉王見之笑謂嗣彬曰爾可還予玉帶嗣彬惶恐請死遂誅之楊崇本不知何許人幼為李茂貞之假子因冐姓李氏名繼徽唐光化中茂貞表為邠州節度使天復元年冬太祖自鳳翔移軍北伐駐斾于邠郊命諸軍攻其城崇本懼出城請降太祖復置為邠州節度使仍令復其本姓名焉及師還遷其族于河中其後太祖因統戎往來由于蒲津以崇本妻素有姿色嬖之于别館其婦素剛烈私懐愧耻遣侍者讓崇本曰丈夫擁旄伏鉞不能庇其伉儷我已為朱公婦今生無面目對卿期于刀繩而已崇本聞之但灑淚念怒又昭宗自鳳翔回京崇本之家得歸邠州崇本恥其妻見辱因茲復貳于太祖乃遣使告茂貞曰朱氏兆亂謀危唐祚父為國家盤石不可坐觀其禍宜于此時畢命興復事茍不濟死為社禝可也茂貞乃遣使㑹兵于太原時四川王建亦令大將出師以助之岐蜀連兵以攻雍華關西大震太祖遣郴王友裕帥師禦之㑹友裕卒于行乃班師天祐三年冬十月崇本復領鳯翔邠涇秦隴之師㑹延州胡章之衆合五六}
