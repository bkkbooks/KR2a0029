  - {type: variant, offset: 5259, length: 0, content: '', WYG: 節度使劉知俊及康懐英帥師拒之崇本大敗復歸于邠州自是垂翅久之乾化元年冬為其子彦魯所毒而死彦魯自稱畱後領其軍事凡五十餘日為崇本養子李保衡所殺保衡舉其城來降末}
  - {type: variant, offset: 5259, length: 0, content: '', krp: 節度使劉知俊及康懐英帥師拒之崇本大敗復歸于邠州自是垂翅久之乾化元年冬為其子彦魯所毒而死彦魯自稱畱後領其軍事凡五十餘日為崇本養子李保衡所殺保衡舉其城來降末}
  - {type: variant, offset: 5260, length: 0, content: '', WYG: 命霍彦威為邠帥由是邠寧復為末帝所有蔣殷不知何許人幼孤隨其母適于河中節度使王重盈之家重盈憐之畜為已子唐天復初太祖既平蒲陜殷與從兄珂舉族遷于大梁太祖感王重榮之舊恩凡王氏諸子皆録用焉殷由是繼厯内職累遷至宣徽院使殷素與庶人友珪善友珪簒立命為徐州節度使乾化三年秋末帝以福王友璋鎭徐方殷自以為友珪之黨懼不受代遂堅壁以拒命時華州節度使王瓚殷之從弟也懼其連坐上章言殷本姓蔣非王氏之子也末帝乃下詔削奪殷在身官爵仍}
