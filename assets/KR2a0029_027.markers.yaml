  - {type: variant, offset: 1659, length: 443, content: 又以我少年嗣位未習戎事必有驕怠之心若簡練兵甲倍道兼行出其不意以吾憤激之衆擊彼驕惰之師拉朽摧枯未云其易解圍定霸在此一役甲子軍發自太原己巳至潞州北黃碾下營案原本作黃通鑑作黃碾胡三省注云黃碾村在潞州潞城縣今改正舊五代史考異五月辛未朔晨霧晦暝帝率親軍伏三垂崗下詰旦天復昏霧進軍直抵夾城時李嗣源總帳下親軍攻東北隅李存璋王霸率丁夫燒寨斸夾城為二道周德威李存審各分道進攻軍士鼓譟三道齊進李嗣源壞夾城東北隅率先掩擊梁軍大恐南向而奔投戈委甲噎塞行路斬萬餘級獲其將副招討使符道昭洎大將三百人芻粟百萬梁招討使康懷英得百餘騎出天井關而遁梁祖聞其敗也既懼而歎曰生子當如是李氏不亡矣吾家諸子乃豚犬爾初唐龍紀元年帝纔五歲案歐陽史克用破孟方立于邢州還軍上黨置酒三垂岡時莊宗在側方五歲考克用邢州之役在文德元年今以莊宗生年計之當從薛史作龍紀元年舊五代史考異從武皇校獵於三垂崗崗上有玄宗原廟在焉武皇於祠前置酒樂作伶人奏百年歌者陳其衰老之狀聲調悽苦武皇引滿捋鬚指帝曰老夫壯心未已二十年後此子必戰於此及是役也果符其言焉是月周德威, WYG: 古}
