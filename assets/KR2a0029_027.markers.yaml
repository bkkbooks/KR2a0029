  - {type: variant, offset: 3407, length: 198, content: 鎧仗費數十萬裝以組繡飾以金銀人望而畏之自巳及午騎軍接戰至晡梁軍欲抽退塵埃漲天德威周麾而呼曰汴人走矣帝軍齊譟以進魏人收軍漸退李嗣源率親軍與史建瑭安金全兼北部吐渾諸軍衝陣夾攻梁軍大敗棄鎧投仗之聲震動天地龍驤神威神捷諸軍殺戮殆盡通鑑云趙人以深冀之憾不顧剽掠但奮白刃追之梁之龍驤神捷精兵皆盡與薛史互有詳略今附識于此影庫本粘籤自陣至柏鄉數十里殭屍枕籍敗旗折戟所在蔽地夜漏一鼓帝軍入柏鄉梁軍輜重帳幄資財奴僕皆, WYG: 初}
