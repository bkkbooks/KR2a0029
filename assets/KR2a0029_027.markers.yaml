  - {type: variant, offset: 5208, length: 1, content: 父, WYG: 在朝廷受陛下恩澤亡夫何罪太祖凄然淚下曰幾忘此賊即遣人族師範于洛陽先掘坑于第側乃告之其弟師誨兄師悦及兒姪二百口咸盡戮焉時使者宣詔訖師範盛啓宴席令昆仲子弟列座謂使者曰死者人所不能免况有罪乎然予懼坑屍于下少長失序有愧于先人行酒之次令少長依次于坑所受戮人士痛之後唐同光三年三月詔贈太尉劉知俊字希賢徐州沛縣人也姿貎雄傑倜儻有大志始事徐帥時溥為列校溥甚器之後以勇畧見忌唐太順二年冬率所部二千人來降即署為軍校知俊披甲上馬輪劍入敵勇冠諸將太祖命左右義勝兩軍隸之尋用為左開道指揮使故當時人為之劉開道後討秦宗權及攻徐州皆有功尋補徐州馬步軍都指揮使攻海州下之遂奏授刺史天復初厯典懐鄭二州從平青州以功奏授同州節度使天祐三年冬以兵}
