  - {type: variant, offset: 5249, length: 1, content: 楊, WYG: 知俊未至潞夾寨已䧟晉人引軍方攻澤州聞知俊至乃退尋改西路招討使六月大破岐軍于幕谷俘斬千計李荗貞僅以身免三年五月加檢校太尉兼侍中封大彭郡王時知俊威望益隆太祖雄猜日甚會佑國軍節度使王重}
