  - {type: variant, offset: 5203, length: 1, content: 為, WYG: 宗權未平仍授溥徐州行營兵馬都統蔡賊平朱全忠與之争功遂相嫌怨淮南亂朝廷以全忠遥領淮南節度以平孫儒行密之亂汴人應援路出徐方溥阻之全忠怒出師攻徐自光啓至大順六七年間汴軍四集徐泗三郡民無耕稼頻嵗水災人喪十六七溥窘䠞求和于汴全忠曰移鎮則可朝廷以}
