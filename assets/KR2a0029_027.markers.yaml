  - {type: variant, offset: 4105, length: 851, content: 國家巨鎮冀安民而保族咸屈節以稱藩逆溫唯仗陰謀專行不義欲全吞噬先據屬州趙州特發使車來求援助予情惟盪寇義切親仁躬率賦輿赴茲盟約賊將王景仁將兵十萬屯據柏鄉遂驅三鎮之師授以七擒之略鸛鵝纔列梟獍大奔易如走坂之丸勢若燎原之火僵尸仆地流血成川組甲雕戈皆投草莽謀夫猛將盡作俘囚羣凶既快於天誅大憝須垂於鬼錄今則選蒐兵甲簡練車徒乘勝長驅翦除元惡凡爾魏博邢洺之衆感恩懷義之人乃祖乃孫為聖唐赤子豈狥虎狼之黨遂忘覆載之恩蓋以封豕長蛇馮陵荐食無方逃難遂被脅從空嘗膽以銜寃竟無門而雪憤既聞告捷想所慰懷今義旅徂征止于招撫昔耿純焚廬而向順蕭何舉族以從軍皆審料興亡能圖富貴殊勳茂業翼子貽孫轉禍見機決在今日若能詣轅門而效順開城堡以迎降長官則改補官資百姓則優加賞賜所經詿誤更不推窮三鎮諸軍已申嚴令不得焚燒廬舍剽掠馬牛但仰所在生靈各安耕織予恭行天罸罪止元凶已外歸明一切不問凡爾士衆咸諒予懷帝御親軍南征庚子至洺州梁祖令其將徐仁浦將兵五百徐仁浦通鑑作仁溥考薛史前後俱作浦今姑仍其舊影庫本粘籤夜入邢州張承業李存璋以三鎮步兵攻邢州遣周德威史建瑭將三千騎長驅至澶魏帝與李嗣源率親軍繼進二月戊午師次洹水周德威進至臨河己未魏帥羅周翰出兵五千塞石灰窰口周德威以騎掩擊迫入觀音門是日王師迫魏州帝舍於狄公祠西周翰閉壁自固帝軍攻之其城幾陷帝歎曰予為兒童時從先王渡河今其忘矣方春桃花水滿思一觀之誰從予者癸亥帝觀河於黎陽是時梁祖發兵萬餘將渡河聞王師至棄舟而退黎陽都將張從楚曹儒以部下兵三千人來降立其軍為左右匡霸使乙丑周德威自臨清狥地貝郡攻博州下東武朝城時澶州刺史張可臻棄城而遁遂攻黎陽下臨河淇門庚午梁祖在洛聞王師將攻河陽率親軍屯白馬坡案通鑑作白馬阪舊五代史考異壬申帝下令班師帝至趙州王鎔迎謁翌日大饗諸軍壬午帝發趙州歸晉陽留周德威戍趙州三月己丑鎮定州各遣使言幽州劉守光凶僭之狀請推為尚父以稔其惡乙未帝至晉陽宮召監軍張承業諸將等議幽州之事乃遣牙將戴漢超齎墨制幷六鎮書案原本作大鎮今據通鑑改正舊五代史考異六鎮原本作大鎮據通鑑晉王與王鎔及義武王處直昭義李嗣昭振武周德威天德宋瑤六, WYG: ''}
