  - {type: variant, offset: 5203, length: 1, content: 為, krp: 宗權未平仍授溥徐州行營兵馬都統蔡賊平朱全忠與之争功遂相嫌怨淮南亂朝廷以全忠遥領淮南節度以平孫儒行密之亂汴人應援路出徐方溥阻之全忠怒出師攻徐自光啓至大順六七年間汴軍四集徐泗三郡民無耕稼頻嵗水災人喪十六七溥窘䠞求和于汴全忠曰移鎮則可朝廷以}
  - {type: variant, offset: 5206, length: 0, content: '', WYG: 劉崇望代溥以溥為太子太師溥懼出城見害不受代汴將龐師古城兵于野溥求援于兖州朱瑾出兵救之值大雪糧盡而還城中守陴者飢甚加之疾疫汴將王重師牛存節夜乘梯而入溥與妻子登樓自焚而卒實景福二年也地入于汴王師範青州人父敬武初為平盧牙將唐廣明元年無棣人洪覇郎合羣盗于齊棣間節度使安師儒遣敬武討平之及巢賊犯長安諸藩擅易主帥敬武乃逐師儒自為留後王鐸承制授以節鉞後以出師勤王功加太尉平章事龍紀中敬武卒師範年幼三軍推之為帥棣州刺史張蟾叛于師範不受節度朝廷乃以崔安潛為平盧帥師範拒命張蟾迎安潛至郡同討師範師範遣將盧𢎞將兵攻蟾𢎞復叛與蟾通謀偽旋軍將襲青州師範知之遣重賂迎𢎞謂之曰吾以先人之故為軍府所推年方幼少未能幹事如公以先人之故}
  - {type: page-break, offset: 5206, content: '', id: KR2a0029_WYG_027-7b, image: WYG0277/WYG0277-0124b.png}
  - {type: variant, offset: 5206, length: 0, content: '', krp: 劉崇望代溥以溥為太子太師溥懼出城見害不受代汴將龐師古城兵于野溥求援于兖州朱瑾出兵救之值大雪糧盡而還城中守陴者飢甚加之疾疫汴將王重師牛存節夜乘梯而入溥與妻子登樓自焚而卒實景福二年也地入于汴王師範青州人父敬武初為平盧牙將唐廣明元年無棣人洪覇郎合羣盗于齊棣間節度使安師儒遣敬武討平之及巢賊犯長安諸藩擅易主帥敬武乃逐師儒自為留後王鐸承制授以節鉞後以出師勤王功加太尉平章事龍紀中敬武卒師範年幼三軍推之為帥棣州刺史張蟾叛于師範不受節度朝廷乃以崔安潛為平盧帥師範拒命張蟾迎安潛至郡同討師範師範遣將盧𢎞將兵攻蟾𢎞復叛與蟾通謀偽旋軍將襲青州師範知之遣重賂迎𢎞謂之曰吾以先人之故為軍府所推年方幼少未能幹事如公以先人之故}
  - {type: punctuation, offset: 5207, content: 、, id: KR2a0029_ZHSJ_027-bkkpn1149}
  - {type: variant, offset: 5207, length: 0, content: '', WYG: 不乏祀公之仁也如以為難與成事乞保首領以守先人墳墓亦唯命𢎞以師範年幼必無能為不為之備師範伏兵要路迎而享之預謂紀綱劉􅬸曰翼日盧𢎞至爾即斬之酬爾以軍校鄩如其言斬𢎞于座上及同亂者數人因戒厲士衆大行頒賞與之誓約自率之以攻棣州擒張蟾斬之安潛遁還長安師範雅好儒術少負縱横之學故安民禁暴各有方畧當時藩翰咸稱之及太祖平兖鄆遣朱友㳟攻之師範乞盟遂與通好天復元年冬李荗貞刼遷車駕幸鳯翔韓全誨矯詔加罪于太祖令方鎮出師赴難詔至貴州師範承詔泣下曰吾輩為天子藩籬君父有難畧無奮力者皆强兵自衛縱賊如此使上失守宗祧危而不持是誰之過吾今日成敗以之乃發使通楊行密遣將劉鄩襲兖州别將襲齊時太祖方圍鳯翔師範遣將張居厚部輿夫二百言有獻于太祖至華州城東華將婁敬思疑其有異部輿視之乃兵仗也居厚等因呼殺敬思聚衆攻西城時崔𦙍在華州遣部下閉闗拒之遂遁去是日劉鄩下兖州河南數十郡同日發太祖怒遣朱友寧率軍討之既而友寧為青軍所敗臨陣被擒傳首于淮南天復三年七月太祖復令楊師厚進攻屯于臨胊師厚屢敗青軍遂進寨于城下師範懼乃令副使李嗣業詣師厚乞降太祖許之嵗餘遣李振權典青州事因令師範舉家徙汴師範將至縞素乘驢請罪于太祖太祖以禮待之尋表為河陽節度使㑹韓建移鎮青州太祖帳餞于郊師範預焉太祖謂建曰公頃在華隂政事之暇省覧經籍此亦士君子之大務今之青土政簡務暇可復修華隂之故事建撝謙而已太祖又曰公讀書必須精意勿錯用心太祖以師範好儒前以青州叛故以此言譏之及太祖即位徴為金吾上將軍開平初太祖封諸子為王友寧妻號訴于太祖曰陛下化家為國人人皆得封崇妾夫早預艱難粗立勞効不幸師範反逆亡夫横屍疆塲寃讎}
  - {type: page-break, offset: 5207, content: '', id: KR2a0029_WYG_027-8a, image: WYG0277/WYG0277-0124c.png}
