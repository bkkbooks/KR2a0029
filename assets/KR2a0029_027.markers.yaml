  - {type: variant, offset: 477, length: 326, content: 之因從容啟於武皇武皇依違之及安塞不利之後安塞原作安寒今據通鑑改正影庫本粘籤時事多難梁將氏叔琮康懷英頻犯郊圻案懷英本名懷貞後因避梁末帝諱始改名懷英薛史前後統作懷英今仍其舊舊五代史考異土疆日蹙城門之外鞠為戰埸武皇憂形于色帝因啟曰夫盛衰有常理禍褔繫神道家世三代盡忠王室勢窮力屈無所愧心物不極則不反惡不極則不亡今朱氏攻逼乘輿窺伺神器陷害良善誣誑神祇以臣觀之殆其極矣大人當遵養時晦以待其衰何事輕為沮喪太祖釋然因奉觴作樂而罷及滄州劉守文為梁朝所攻其父仁恭遣使乞師武皇恨其翻覆不時許之帝白曰此吾復振之道也不得以嫌怨介懷且九分天下朱氏今有六七趙魏中山在佗廡下賊所憚者唯我與仁恭爾我之興衰繫此一舉不可失也太祖乃徵兵於燕攻取潞州既而丁會果以城來降天祐五年春正月武皇疾篤召監, WYG: ''}
