  - {type: variant, offset: 804, length: 223, content: 張承業大將吳珙謂曰吾常愛此子志氣遠大可付後事唯卿等所教及武皇厭代帝乃嗣王位于晉陽時年二十有四汴人方寇潞州周德威宿兵於亂柳案原本作亂楊考歐陽史作亂柳胡三省通鑑注云亂柳在潞州屯留縣界今改正舊五代史考異以軍城易帥竊議忷忷訛言播於行路帝方居喪將吏不得謁見監軍使張承業排闥至廬所言曰夫孝在不墜家業不同匹夫之孝且君父厭世嗣主未立竊慮兇猾不逞之徒有懷覬望又汴寇壓境利我凶衰苟或搖動則倍張賊勢訛言不息懼有變生請依顧命墨縗聽政保家安親此惟大孝帝於是始聽斷大事時振武, WYG: ''}
