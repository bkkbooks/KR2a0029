  - {type: variant, offset: 2883, length: 3, content: 王景仁, WYG: 知訓設家宴以餞瑾瑾事之愈遜翼日詣知訓第謝畱門久之知訓家僮私謂瑾曰政事相公此夕在白牡丹妓院侍者無得往瑾謂典謁曰吾不奈朝饑且歸既而知訓聞之愕然曰晚當過瑾瑾厚備供帳瑾有所乘名馬冬以錦帳貯之夏以羅幬䕶之愛妓桃氏有絶色善歌舞及知訓至奉巵酒}
