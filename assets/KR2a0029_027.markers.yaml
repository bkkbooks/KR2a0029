  - {type: variant, offset: 4, length: 187, content: 卷二十七唐書三莊宗紀第一莊宗光聖神閔孝皇帝諱存勗武皇帝之長子也母曰貞簡皇后曹氏以唐光啟元年歲在乙巳冬十月二十二日癸亥癸亥原本作癸巳五代會要作癸亥考舊唐書光啟元年十月壬寅朔無癸巳今從五代會要改正影庫本粘籤生帝於晉陽宮姙時曹后嘗夢神人黑衣擁扇夾侍左右載誕之辰紫氣出於牕戶及為嬰兒體貌奇特沈厚不羣武皇特所鍾愛及武皇之討王行瑜帝時年十一案歐陽史從薛史作十一吳縝纂誤據徐無黨注莊宗年四, WYG: 巻}
