  - {type: variant, offset: 3606, length: 198, content: 帝軍所有梁將王景仁韓勍李思安等以數十騎夜遁是役也斬首二萬級獲馬三千匹鎧甲兵仗七萬輜車鍋幕不可勝計擒梁將陳思權以下二百八十五人帝號令收軍於趙州既而梁人棄深冀二州而遁初杜廷隱之襲深冀也聲言分兵就食時王鎔將石公立戍深州欲杜關不納鎔遽令啟關命公立移軍於外廷隱遂據其城公立既出指城闉而言曰開門納盜後悔何追此城數萬生靈生為俘馘矣因投刃泣下數日廷隱閉城殺鎮兵數千人遂登陴拒守王鎔方命公立攻之即有備矣及柏鄉之敗兩, WYG: ''}
