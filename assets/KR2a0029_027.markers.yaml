  - {type: variant, offset: 3141, length: 243, content: 備梁軍以樵采為給為帝之遊軍所獲由是堅壁不出剉屋茅坐席以秣其馬衆心益恐天祐八年正月丁亥周德威史建瑭帥三千騎致師於柏鄉設伏於村塢間遣三百騎直壓其營梁將怒悉其軍結陣而來德威與之轉戰至高邑南梁軍列陣橫亙六七里時帝軍未成列李存璋引諸軍陣於野河之上梁軍以五百人爭橋案通鑑作梁軍橫亙數里競前奪橋鎮定步兵禦之勢不能支與此微異舊五代史考異鎮定之師與血戰梁軍敗而復整者數四帝與張承業登高觀望梁人戈矛如束申令之後囂聲若雷王師進退有序王師原本作王追今據文改正影庫本粘籤步騎嚴整寂然無聲帝臨陣誓衆人百其勇短兵既接, WYG: ''}
