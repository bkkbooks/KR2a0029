  - {type: variant, offset: 158, length: 0, content: '', krp: 日冦鄆境彼既以大軍臨我南鄙又憑恃決河謂我不能南渡志在收復汶陽此汴人之謀也臣謂叚凝保據河壖茍欲持我臣但請留兵守鄴保固楊劉陛下親御六軍長驅倍道直指大梁汴城無兵望風自潰若使偽主授首賊將自然倒戈半月之間天下必定如不決此計傍採浮譚臣恐不能濟也今嵗秋稼不登軍糧纔支數月決則成敗未知不決則坐見不濟臣聞作舍道邊三年不成帝王應運必有天命成敗天也在陛下獨斷莊宗蹶然而興曰正合吾意丈夫得則為王失則為擄行計決矣即日下令軍中家口並還魏州莊宗送劉皇后與興聖宫使繼岌至朝城西野亭泣别曰}
  - {type: punctuation, offset: 159, content: 、, id: KR2a0029_ZHSJ_115-bkkpn32}
  - {type: variant, offset: 159, length: 4, content: 洋蓬壁等, WYG: 勢危蹙今須一決事茍不濟無復相見乃留李紹宏及租庸使張憲守魏州大軍自楊劉濟河是嵗擒王彦章誅梁氏降叚凝皆崇韜贊成其謀也莊宗至汴州宰相豆盧革在魏州令崇韜權行中書事俄拜侍中兼樞密使及郊禮畢以崇韜兼領鎮冀}
  - {type: variant, offset: 159, length: 4, content: 洋蓬壁等, krp: 勢危蹙今須一決事茍不濟無復相見乃留李紹宏及租庸使張憲守魏州大軍自楊劉濟河是嵗擒王彦章誅梁氏降叚凝皆崇韜贊成其謀也莊宗至汴州宰相豆盧革在魏州令崇韜權行中書事俄拜侍中兼樞密使及郊禮畢以崇韜兼領鎮冀}
