  - {type: variant, offset: 2059, length: 1829, content: 月制落起復加檢校太師其年九月敕曰李從曮等世聯宗屬任重藩宣慶善有稱忠勤甚著既預維城之列宜新定體之文是降寵光以隆敦俾煥承家之美貴崇猶子之規宜於曮昶照上改稱從自長興元年明宗有事於南郊從曮入覲禮畢移鎮汴州四年復入覲改天平軍節度使及唐末帝起兵於岐下盡取從曮家財器仗以助軍須末帝發離岐城吏民扣馬乞以從曮為帥末帝許之清泰初即以從曮復為鳳翔節度使仍封秦國公晉高祖登極繼封岐王秦王累食邑至一萬五千戶食實封一千五百戶少帝嗣位加守太保開運三年冬卒於鎮年四十九從曮少敏悟善筆札性柔和無節操當莊宗新有天下因入覲獻寶裝針珥於皇后宮時以為佞但進退閑雅慕士大夫之所為有請謁者無賢不肖皆盡其敬鎮於岐山前後二紀每花繁月朗必陳勝會以賞之客有困於酒者雖吐茵墮幘而無厭色左右或有過未嘗笞責先人汧隴之間有田千頃竹千畝恐奪民利不令理之致岐陽父老再陳借寇之言借寇原本作借冠詳其文義當是用後漢書寇恂傳願復借寇君一年之事今改正影庫本粘籤良有以也子永吉歷數鎮行軍司馬永樂大典卷一萬三百九十五代史補李曮岐王之子昆仲間第六官至中書令世謂之六令公性情好戲為鳳翔節度因生辰隣道持賀禮使畢至有魏博使少年如美婦人秦鳳使矬陋且多髯二人坐又相接而魏使在下曮因曰二使車一妍一醜何不相嘲以為樂事魏博使恃少俊先起曰今日不幸與水草大王接席秦鳳使徐起應曰水草大王不敢承命然吾子容貌如此又坐次相接得非水草大王夫人耶在坐皆笑從昶茂貞之第二子也十餘歲署本道中軍使後唐同光中茂貞疾從昶年十五遣代兄從曮為涇州兩使留後朝廷尋加節制天成中明宗即位改鎮三峯累官至檢校太保會郊天大禮表請入覲以恩加檢校太傅俄有代歸闕授左驍衞上將軍改右龍武統軍統軍原本作維軍今從通鑑改正影庫本粘籤未幾出鎮許田在鎮三年清泰中復入為右龍武統軍再遷左龍武統軍晉天福三年冬卒於官時年四十贈太尉從昶生於紈綺少習華侈以逸遊讌樂為務而音律圖畫無不通之然性好談笑喜接賓客以文翰為賞曾無虛日復篤信釋氏時岐下有僧曰阿闍梨通五天竺語為士人所歸從昶凡歷三鎮無尤政可褒無苛法可貶人用安之亦將門之令嗣也弟從照歷隴州刺史諸衞大將軍卒永樂大典卷一萬三百九十茂勳茂貞之從弟也唐末為鳳翔都將茂貞表為鄜州節度使累官至兼侍中梁祖之圍鳳翔也茂勳兵屯岐山梁祖以羸師誘之命孔勍潛率勁兵襲下鄜州盡俘其家茂勳遂歸於梁改名周彝署元帥府行軍司馬開平中為河陽節度使從梁祖伐鎮州圍棗強縣時有一民縋城而出茂勳納之而不疑一日其民竊發以木檐擊茂勳踣於地案通鑑考異引唐餘錄云棗強民欲擊梁祖誤中茂勳蓋傳聞之異詞也附識於此舊五代史考異賴左右救至僅免居無何遷金吾上將軍副王瓚將兵於景店瓚令分屯西寨莊宗擊而敗之降為左衞上將軍逾年以太子太傅致仕同光中復名茂勳天成初以疾卒於洛陽永樂大典卷一萬三百九十高萬興河西人祖君佐鄜延節度判官父懷遷都押衙萬興與弟萬金俱有武幹効用於本軍河西自王行瑜敗後郡邑皆為李茂貞之所強據以其將胡敬璋為節度使萬興為敬璋騎將昆弟俱有戰功邠州節度使楊崇本者茂貞之假子也號李徽梁祖既弒昭宗茂貞繼徽與西川王建之師會於岐陽以圖興復皆陳兵關輔梁祖遣將王重師守雍州劉知俊守同州以拒之天祐五年冬敬璋卒崇本以其愛將劉萬子為鄜延帥萬子以兇暴而失士心又崇本為汴人所攻崇本為汴人所攻以上下文義求之疑有舛誤考冊府元龜所引薛史與永樂大典同今無別本可校姑仍其舊影庫本粘籤六年二月萬子葬敬璋將佐皆集於葬所萬興萬金因會縱兵攻萬子殺之歸款於汴梁祖以萬興為鄜延招撫使鄜延原本脫延字今據通鑑增入影庫本粘籤與劉知俊合兵攻收鄜坊丹延等州梁祖乃分四州為二鎮以萬興萬金皆為帥及萬金卒梁祖以萬興兼彰武保大兩鎮累加至太師中書令封北平王莊宗定河洛萬興來朝預郊禮陪位既還鎮復以舊爵授之同光三年十二月卒於位以其子允韜權典留後永樂大典卷五千五百三十八允韜字審機初仕梁朝起家授同州別駕尋加檢校右僕射改金紫光祿大夫檢校司空充保大軍內外馬步軍指揮使唐同光中檢校太保充保大軍兩使留後萬興卒允韜自理所奔喪天成初起復檢校太傅充延州節度使長興元年移鎮邢州頃之為右龍武統軍未幾授滑州節度使清泰二年八月卒於任年四十二詔贈太師永樂大典卷五千五百三十八韓遜本靈州之列校也會唐季之亂因據有其地朝廷乃授以節鉞梁初累加檢校太尉同平章事開平中梁將劉知俊自同州叛歸鳳翔李茂貞以地褊不能容乃借兵以窺靈武且圖牧圉之地知俊乃帥邠岐秦涇之師數萬攻遜於靈州遜極力以拒之久之知俊遁去梁祖嘉之自是累加官至中書令封潁川郡王遜亦善於為理部民請立生祠堂於其地梁祖許之仍詔禮部侍郎薛廷珪撰文以賜之其廟至今在焉貞明初遜卒於鎮永樂大典卷一萬八千一百二, WYG: ''}
