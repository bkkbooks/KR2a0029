  - {type: variant, offset: 155, length: 1, content: 同, WYG: 守兵部尚書充樞密使是時衛州陷於梁澶相之間寇鈔日至民流地削軍儲不給羣情恟恟以為覇業終不能就崇韜寢不安席俄而王彦章陷德勝南城敵勢滋蔓汴人急攻楊劉城明宗在鄆音驛斷絶莊宗登城四望計無従出崇韜啓曰叚凝阻絶津路茍王師不南鄆州安能保守臣請於博州東岸立栅以固通津但慮汴人偵知徑來薄我請陛下募敢死之士日以挑戰如三四日問賊軍未至則栅壘成矣崇韜率毛璋等萬人夜趨博州視矛㦸之端有光崇韜曰吾聞火出兵刃破賊之兆也至博州渡河版築晝夜不息崇韜于葭葦間據胡牀假寢覺袴中冷左右視之乃地也其忘疲勵力也如是居三日梁軍果至城壘低痺沙土㪚惡戰具不完汴將王彦章杜晏球率衆攻擊軍不得休息崇韜身先督衆四面拒戰有急即應城垂陷俄報莊宗領親軍次西岸梁軍聞之退走因解楊劉之圍未幾汴將康延孝來奔崇韜延於臥内訊其軍機延孝曰汴人將四道齊舉以困我軍莊宗憂之召諸將謀進取之䇿宣徽使李紹宏請棄鄆州與汴人盟以河為界無相侵冦莊宗不悦獨臥帳中召崇韜謂曰計將安出對曰臣不知書不能徴比前古請以時事言之自陛下十五年起義圖覇為雪家讐國恥甲胄生蟣虱黎人困輸輓今纂崇大號河朔士庶日望盪}
  - {type: page-break, offset: 155, content: '', id: KR2a0029_WYG_115-2b, image: WYG0277/WYG0277-0480d.png}
