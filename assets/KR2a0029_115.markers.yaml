  - {type: variant, offset: 157, length: 0, content: '', WYG: 纔得汶陽尺寸之地不敢保守况盡有中原乎將來嵗賦不充物議咨怨設若劃河為界誰為陛下守之臣自延孝言事已來晝夜籌度料我兵力算賊事機不出今年雌雄必決聞汴人決河自滑至鄆非舟楫不能濟又聞精兵盡在叚凝麾下王彦}
  - {type: variant, offset: 157, length: 0, content: '', krp: 纔得汶陽尺寸之地不敢保守况盡有中原乎將來嵗賦不充物議咨怨設若劃河為界誰為陛下守之臣自延孝言事已來晝夜籌度料我兵力算賊事機不出今年雌雄必決聞汴人決河自滑至鄆非舟楫不能濟又聞精兵盡在叚凝麾下王彦}
  - {type: variant, offset: 158, length: 0, content: '', WYG: 日冦鄆境彼既以大軍臨我南鄙又憑恃決河謂我不能南渡志在收復汶陽此汴人之謀也臣謂叚凝保據河壖茍欲持我臣但請留兵守鄴保固楊劉陛下親御六軍長驅倍道直指大梁汴城無兵望風自潰若使偽主授首賊將自然倒戈半月之間天下必定如不決此計傍採浮譚臣恐不能濟也今嵗秋稼不登軍糧纔支數月決則成敗未知不決則坐見不濟臣聞作舍道邊三年不成帝王應運必有天命成敗天也在陛下獨斷莊宗蹶然而興曰正合吾意丈夫得則為王失則為擄行計決矣即日下令軍中家口並還魏州莊宗送劉皇后與興聖宫使繼岌至朝城西野亭泣别曰}
