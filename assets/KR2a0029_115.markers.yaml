  - {type: variant, offset: 167, length: 0, content: '', WYG: 進封趙郡公邑二千户}
  - {type: variant, offset: 167, length: 0, content: '', krp: 進封趙郡公邑二千户}
  - {type: variant, offset: 168, length: 1, content: 姓, WYG: 鐡劵恕十死崇韜既位極人臣權傾内外謀猷獻納必盡忠規士族朝倫頗亦收奬人物内外翕然稱之初收汴洛稍通賂遺親友或規之崇韜曰余備位將相禄賜巨萬但偽梁之日賂遺成風今方面藩侯多梁之舊將皆吾君射鉤斬袪之人也一旦革面化為吾人堅拒其請得無懼乎藏余私室無異公帑及郊禋崇韜悉獻家財以助賞給時近臣勸莊宗以貢奉物為内庫珍貨山積公府賞軍不足崇韜奏請出内庫之財以助莊宗沉吟有靳惜之意是時天下已定冦讐外息莊宗漸務華侈以逞已欲洛陽大内宏敞宫宇深䆳宦官阿意順旨以希恩寵聲言宫中夜見鬼物不謀同辭莊宗駭異其事且問其故宦者曰見本朝長安大内六宫嬪御殆及萬人椒房蘭室無不充牣今宫室大半空間鬼神尚幽亦無所怪繇是景進王允平等于諸道採擇宫人不擇良賤内之宫掖三年夏雨河大水壞天津橋是時酷暑尤甚莊宗常擇髙樓避暑皆不稱旨宦官曰今大内樓觀不及舊時長安卿相之家舊日大明興慶兩宫樓觀百數皆雕楹畫拱干雲蔽日今官家納凉無可御者莊宗曰予富有天下豈不能辦一樓即令宫苑使經營之猶慮崇韜有所諫止使謂崇韜曰今年惡熱朕頃在河上五六月中與賊對壘行宫卑濕介馬戰賊恒若清涼今晏然深宫不耐暑毒何也崇韜奏陛下頃在河上汴寇未平廢寢忘食心在戰陣祁寒溽暑不介聖懷今寇既平中原無事縱耳目之玩不憂戰陣雖層臺百尺廣殿九筵未能忘熱於今日也願陛下思艱難創業之際則今日之暑坐變清涼莊宗黙然王允平等竟加營造崇韜復奏曰内中營造日有縻費屬當災饉且乞權亭不聴初崇韜與李紹宏同為内職及莊宗即位崇韜以紹宏素在已上舊人難制即奏澤潞監軍張居翰同掌樞密以紹宏為宣徽使紹宏大失所望泣涕憤鬰崇韜乃置内勾使應三司財賦皆令勾覆令紹宏領之冀塞其心紹宏怏悵不已崇韜自以有大功河洛平定之後權位熏灼恐為人所傾奪乃謂諸子曰吾佐主上大事了矣今為羣邪排毁吾欲避之歸鎮常山為菟裘之計其子延説等曰大人功}
