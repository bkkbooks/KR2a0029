  - {type: variant, offset: 395, length: 2, content: 奪據, WYG: 出於崇韜繼岌承命而已莊宗令内官李廷安李従襲吕知柔為都統府紀綱見崇韜幕府繁重將吏輻輳降人爭先賂遺都統府唯大將省謁牙門索然繇是大為詬恥及六軍使王宗弼歸疑行賂先招討府王衍以城都降崇韜居王宗弼之第宗弼選王衍之妓妾珍玩以奉崇韜求為蜀帥崇韜許之又與崇韜子廷誨謀令蜀人列狀見魏王請奏崇韜為蜀帥繼岌覽狀謂崇韜曰主上倚侍中如衡華安肻棄元老於蠻夷之地況余不敢議此九國志王宗弼𫝊宗弼送欵於魏王乃還城都盡輦内藏之寶貸歸於}
