  - {type: variant, offset: 170, length: 3, content: 茂貞僖, WYG: 及此一失其勢便是神龍去水為螻蟻所制尤直深察門人故吏又謂崇韜曰侍中勲業第一雖羣官側日未必能離間宜於此時堅辭機務上必不聼是有辭避之名塞其䜛慝之口魏國夫人劉氏有寵中宫未正宜贊成册禮上心必悦内得劉氏之助羣閹其如余何崇韜然之於足三上章堅辭樞密之位優詔不從崇韜乃密奏請立魏國夫人為皇后復奏時務利害二十五條皆便於時取悦人心又請罷樞密院事各歸本司以輕其權然宦官造謗不已三年堅乞罷兼領節鉞許之册府元龜云同光中崇韜再表辭鎮批答曰朕以卿久司樞要常處重難或遲疑未決之機詢諸先見或憂撓不定之事訪自必成至於贊朕丕基登兹大寶衆興異論卿獨堅言天命不可違唐祚必須復請納家族明設誓文及其密取汶陽興師入不測之地潛通河口貢謀占必濟之津人所不知卿惟合意迨中都肅聚羣黨窺陵朕決議平妖兼收浚水雖云先定更審前籌果盡贊成悉諧沉算斯即何須冒刃始顯殊庸況常山陸梁正虞未復卿能撫衆共定羣心惟朕知卿他人寕表所以賞卿之寵實異等倫沃朕之心非虛渥澤今卿再三謙遜重疊退辭始納常陽請歸上將又稱梁范不可兼權如此周身貴全名節古人操守未可比方既覽堅辭難沮來表其再讓汴州所宜依允㑹客省使李嚴使西川回言王衍可圖之狀莊}
