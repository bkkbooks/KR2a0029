  - {type: variant, offset: 3890, length: 1748, content: 洙遜之子也遜卒三軍推為留後梁末帝聞之起復正授靈武節度使特進檢校太傅同平章事貞明四年春靈武將軍尚貽敏等上言洙已服闋乞落起復梁末帝令中書商量宰臣奏曰舊例藩鎮落起復如先人已是一品階即與加爵如未是一品階即合加階乃授洙開府儀同三司唐莊宗明宗累加官爵天成四年夏洙卒朝廷以其弟澄弟澄原本作第登今從歐陽史改正影庫本粘籤為朔方軍節度觀察留後是歲有列校李賓作亂部內不安乃遣使上表請帥於朝廷明宗命前磁州刺史康福為朔方河西等軍節度靈威雄警涼等州觀察處置度支溫池榷稅等使仍遣福領兵萬人赴鎮其後靈武遂受代焉永樂大典卷三千六百七十五李仁福世為夏州牙將本拓拔氏之族也唐乾符中有拓拔思恭案歐陽史作思敬舊五代史考異為夏州節度使廣明之亂唐僖宗在蜀詔以思恭為京城西北收復都統預破黃巢有功僖宗賜姓故仁福亦以李為氏思恭卒弟思諫繼之梁開平元年授思諫檢校太尉兼侍中二年思諫卒三軍立其子彝昌為留後尋起復正授旄鉞三年春牙將高宗益等作亂彝昌遇害時仁福為蕃部指揮使本州軍吏迎立仁福為帥其年四月梁祖降制授仁福檢校司空充定難軍節度使未幾後唐武皇遣大將周德威會邠鳳之師五萬同攻夏州仁福固守月餘梁援軍至德威遁去梁祖喜之超授檢校太保太保原本脫保字今據歐陽史增入影庫本粘籤同平章事仁福自梁貞明龍德及後唐同光中累官至檢校太師兼中書令封朔方王長興四年三月卒於鎮其年追封虢王子彝超嗣永樂大典卷一萬八千一百三十三彝超仁福之次子也歷本州左都押牙防遏使仁福卒三軍立為帥矯為仁福奏云臣疾已甚已委彝超權知軍州事乞降真命明宗聞之遂以彝超為延州留後以延帥安從進為夏州留後朝廷慮不從命詔邠州節度使藥彥稠宮苑使安從益等率師援送從進赴鎮仍降詔諭之云近據西北藩鎮奏定難軍節度使李仁福薨朕以仁福自分戎閫遠鎮塞垣威惠俱行忠孝兼著當本朝播越之後及先皇興復之初爰及眇躬益全大節統臨有術遠邇咸安委仗方深凋殞何速忽窺所奏深愴予懷不朽之功既存於社稷有後之慶宜及於子孫但以彼藩地處窮邊每資經略厥子年纔弱冠年纔弱冠原本脫纔字今從冊府元龜增入影庫本粘籤未歷艱難或虧駕御之方定啟姦邪之便其李彝超已除延州節度觀察留後便勒赴任但夏銀綏宥等州最居邊遠久屬亂離多染夷狄之風少識朝廷之命既乍當於移易宜普示於渥恩應夏銀綏宥等州管內罪無輕重常赦所不原者幷公私債負殘欠稅物一切並放兼自刺史指揮使押衙已下皆勒依舊各與改轉官資朕自總萬幾惟弘一德內安華夏外撫戎夷先既懷之以恩後必示之以信且如李從曮之守岐隴疆土極寬高允韜之鎮鄜延甲兵亦衆咸能識時知變舉族歸朝從曮則見鎮大梁允韜則尋除鉅鹿次及昆仲並建節旄下至將僚悉分符竹又若王都之貪上谷上谷原本作上客今據文改正影庫本粘籤李賓之吝朔方或則結搆契丹偷延旦夕或則依憑党項竊據山河不稟除移唯謀旅拒纔興討伐已見覆亡何必廣引古今方明利害祇陳近事聊諭將來彼或要覆族之殃則王都李賓足為鑒戒彼或要全身之福則允韜從曮可作規繩朕設兩途爾宜自擇或慮將校之內親要之間幸彼幼沖恣其熒惑遂成騷動致累生靈今特差邠州節度使藥彥稠部領馬步兵士五萬人騎送安從進赴任從命者秋毫勿犯違命者全族必誅先令後行有犯無赦云其年夏四月彝超上言奉詔授延州留後已迎受恩命緣三軍百姓擁隔未放赴任明宗遣閤門使蘇繼彥齎詔促之五月安從進領軍至城下彝超不受代從進駐軍以攻之秋七月彝超昆仲登城謂從進曰孤弱小鎮不勞王師攻取虛煩國家餉運得之不武為僕聞天子乞容改圖時又四面党項部族萬餘騎薄其糧運而野無芻牧關輔之人運斗粟朿朿藁原本作朿膏今據文改正影庫本粘籤動計數千窮民泣血無所控訴復為蕃部殺掠死者甚衆明宗聞之乃命班師彝超亦上表謝罪乃授彝超檢校司徒充定難軍節度使既而修貢如初清泰二年卒於鎮弟彝興襲其位永樂大典卷一萬八千一百三十三彝興本名彝殷宋受命之初以犯廟諱故改之彝超既卒時彝興為夏州行軍司馬三軍推為留後唐末帝聞之正授定難軍節度使晉天福初加檢校太尉同平章事少帝嗣位加檢校太師八年秋彝興弟綏州刺史彝敏與其黨作亂為彝興所逐彝敏奔延州彝興押送到闕骨肉二百餘口朝廷以彝興之故縶送本道斬之開運元年春詔以彝興為契丹西南面招討使漢乾祐元年春加兼侍中是歲李守貞叛於河中潛使人搆之彝興為之出師駐於延州之北境既而聞守貞被圍乃收軍而退周顯德中累加至守太傅兼中書令封西平王皇朝建隆元年春制加守太尉始改名彝興乾德五年秋卒於鎮制贈太師追封夏王子光叡繼其位其後事具皇朝日曆永樂大典卷一萬八千一百三十三, WYG: ''}
