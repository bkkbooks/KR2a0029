  - {type: variant, offset: 181, length: 7, content: 正臣原本作尹臣, WYG: 以非才謬當戎事仗將士之忠力憑陛下之威靈庶幾克㨗若西川平定陛下擇帥如信厚善謀事君有節則孟知祥有焉望以蜀帥授之如宰輔闕人張憲有披榛之勞為人謹重而多識其次李琪崔居儉中朝士族富有文學可擇而任之莊宗御嘉慶殿置酒宴征西諸將舉酒屬崇韜曰繼岌未習軍政卿久從吾戰伐西面之事屬之於卿軍發十月十九日入大散闗崇韜以馬箠指山險謂魏王曰朝廷興師十萬已入此中儻不成功安有歸路}
