  - {type: variant, offset: 1452, length: 606, content: 考異及梁祖建號茂貞與王建會兵於太原志圖興復竟無成功茂貞疆土危蹙不遂僭竊之志但開岐王府署天官目妻為皇后鳴鞘掌扇宣詞令一如王者之制然尚行昭宗之正朔焉茂貞鼠形多智數軍旅之事一經耳目無忘之者性至寬有部將符道昭者人或告其謀變茂貞親至其家去其爪牙熟寢經宿而還軍士有鬬而訴者茂貞曰喫令公一椀不托不托通鑑作餺飥蓋當時俗語聲之轉也今仍其舊影庫本粘籤與爾和解遂致上下服之尤善事母母終茂貞哀毀幾滅性聞者嘉之但御軍整衆都無紀律當食則造庖廚往往席地而坐內外持管鑰者亦呼為司空太保與夫細柳大樹之威名蓋相遠矣及莊宗平梁茂貞自為季父以書賀之及聞莊宗入洛懼不自安方上表稱臣尋遣其子繼曮來朝詔茂貞仍舊官進封秦王所賜詔敕不名又以茂貞宿望耆老特加優禮及疾篤遣中使賜醫藥問訊同光二年夏四月薨年六十九謚曰忠敬子從曮嗣永樂大典卷一萬三百九十從曮茂貞之長子也未冠授諮議參軍賜緋魚袋尋遷領彭州副使鳳翔衙內都指揮使天復中自秦王府行軍司馬檢校太傅出為涇州兩使留後茂貞尋承制承制原本作承嗣今據文改正影庫本粘籤加開府儀同三司檢校太尉兼侍中四鎮北庭行軍彰義軍節度使及唐莊宗平梁茂貞令從曮入覲制加從曮兼中書令俄而茂貞薨遺奏權知鳳翔軍府事詔起復授鳳翔節度管內觀察處置等使三年九月以魏王繼岌伐蜀詔充供軍轉運應接使四年正月蜀平繼岌命部署王衍一行東下至岐監軍使柴重厚不與符印促令赴闕從曮至華下聞內難歸鎮明宗詔誅重厚從曮以軍民不擾重厚之力也不以前事為隙上表論救事雖不允時議嘉之天成元年, WYG: 巻}
