  - {type: variant, offset: 174, length: 0, content: '', WYG: 與崇韜議討伐之謀方擇大將時明宗為諸道兵馬總管當行崇韜自以宦者相傾欲立大功以制之乃奏曰契丹犯邊北面須藉大臣全倚總管鎮禦臣伏念興聖宫使繼岌徳望日隆大功未著宜依故事以}
