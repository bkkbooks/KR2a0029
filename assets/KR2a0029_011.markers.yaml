  - {type: variant, offset: 1286, length: 1, content: 主, WYG: 私人家先已有者所在送納長吏對靣毁棄如行勅後有人故違必當極法仍委所在州府差人檢察收捕明行處斷魏博節度使守太師兼中書令鄴王羅紹威薨帝哀慟曰天不使我一海内何奪忠臣之速也詔贈尚書令六月已未朔詔軍鎮勿起土功七月壬子宴宰臣河南尹翰林學士兩街使於甘水亭丙辰宴羣臣於宣威殿賜物有差劉知俊攻逼夏州通鑑七月岐王與汾涇二帥各遣使告晉請合兵攻定難節度使李仁福晉王遣振武節度使周徳威將兵㑹之合五萬衆圍夏州以宣化軍留後李思安為東北靣行營都指揮使陜州節度使楊師厚為西路行營招討使福州貢方物獻桐皮扇廣州貢犀玉獻船上薔薇水時陳許汝蔡潁五州境内有蝝為災俄而許州上言有野禽羣飛蔽空旬日之間食蝝皆盡是歳乃大有秋八月車駕西征已巳㳄陜府是時憫雨且命宰臣從官分禱靈迹日中而雨翼日止帝大悦辛未老人星見是日晏本府節度使楊師厚及扈從官於行宫賜師厚帛千匹仍授西路行營招討使丙子宴文武從官軍使已下設龜兹樂賜物有差九月丁亥朔命宰臣于競赴西都祀昊天上帝於圜丘甲午至西京下詔曰朕聞厯代帝王首推堯舜為人父母孰比禹湯睿謀髙}
