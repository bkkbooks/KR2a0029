  - {type: variant, offset: 1288, length: 1, content: 家, WYG: 於古先聖徳普聞於天下尚或卑躬待士屈已求賢俯仰星雲慮一民之遺逸網羅巖穴恐片善之韜藏延爵禄以徴求設丹青而訪召使其}
