  - {type: variant, offset: 1292, length: 8, content: 金華公主實歸羅氏, WYG: 王師擊賊獲馬多上獻至是盡止之葢欲邀其奮擊之功也乙巳王師敗蕃冦於夏州初劉知俊誘沙陁振武賊帥周德威涇原賊帥李繼鸞合步騎五萬大舉欲俯拾夏臺節度使李仁福兵力俱乏以急來告先是供奉官張漢玫宣諭在壁國禮使杜廷隠賜幣於夏及石堡寨聞賊至以防卒三百人馳入州旣}
