  - {type: variant, offset: 4, length: 1, content: 卷, WYG: 巻五宋門下侍郎參知政事監修國史薛居正等撰梁書第五太祖紀五開平三年九月癸巳朔御崇勲殿宴羣臣文武百官賜張宗奭楊師厚白綾各三百匹銀鞍轡馬丁酉上幸崇政院宴内臣賜院使敬翔直學士李班等繪綵有差以門下侍郎平章事薛貽矩判建昌宫事兼延資庫使制内外使臣復命未見便歸私第者朝廷命使臣下奉行惟於辭見之儀合守敬恭之道近者凡差出使往復皆越常規或已辭而尚在本家或未見而先歸私第但從已便莫稟王程在禮敬而殊乖置典章而私舉宜令御史臺别具條流事件具黜罰等奏聞庚子殿直王唐福自襄城走馬以大軍勝㨗逆將李洪歸降事上聞賜唐福絹銀有加宰臣百官上表稱賀壬寅開封府虞候李繼業齎襄州都指揮使陳暉奏狀以今月五日殺戮逆黨千人竝生擒都指揮使𫝊霸以下節級共五百人收復襄州人户歸業通鑑八月陳暉軍至襄州李洪逆戰大敗王求死九月丁酉抜其城斬叛兵千人執李洪楊䖍等送洛陽斬之癸卯帝御文明殿以收復襄漢受宰臣以下稱賀辛亥侍中韓建罷守太保左僕射同平章事楊涉罷守本官以太常卿趙光逢為中書侍郎平章事翰林學士奉㫖工部侍郎知制誥杜曉為尚書户部侍郎平章事詔曰秋冬之際隂雨相仍所司擇日拜郊或慮臨時妨事宜令别更擇日奏聞是月禮儀使奏據所司擇十月二日祀圜丘今參詳十月十七日以後入}
