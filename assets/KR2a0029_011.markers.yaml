  - {type: variant, offset: 1283, length: 2, content: 金華, WYG: 曰追養以禄王者推歸厚之恩欲靜而風人子抱終身之感其以刑部尚書致仕張筞及三品四品常參官二十二人先世各追贈一等乙丑宴崇政院帝在藩及踐阼勵精求理深戒逸樂未嘗命堂上歌舞是日止令内妓升階擊鼓弄曲甚懽至午而罷丁卯宋州節度使衡王友諒進瑞麥一莖三穗通鑑友諒獻瑞麥帝曰豐年為上瑞今宋州大水安用此為詔除本縣令名遣使詰責友諒丙戌幸建春門閲新樓至七里屯觀麥召從官食於樓河南張昌孫及蒲同主事吏賜物各有差帝過朝邑見鎮將位在縣令上問左右或對曰宿官秩髙帝曰令長字人也鎮使捕盜耳且鎮將多是邑民柰何得居民父母上是無禮也至是勅天下鎮使官秩無髙卑位在邑令下葉縣鎮遏使馮徳武於蔡州西平縣界殺戮山賊擒首領張濆等七人以獻鎮海軍節度使錢鏐擊髙灃於湖州大敗之梟夷擒殺萬人拔其郡湖州平先是灃以州叛入淮南故詔鏐討之也五月已丑朔以連雨不止至壬辰御文明殿命宰臣分拜祠廟自朔旦至癸已内外以午日奉獻巨萬計馬三千蹄餘稱是復相率助修内壘甲辰詔曰竒邪亂正假偽奪真旣刑典之不容宜犯違而勿赦應東西兩京及諸道州府創造假犀玉真珠腰帶璧珥竝諸色售用等一切禁斷不得輒更造作如}
