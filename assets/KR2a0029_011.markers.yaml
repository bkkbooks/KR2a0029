  - {type: variant, offset: 1282, length: 0, content: '', WYG: 正月壬辰朔帝御朝元殿受百官稱賀用禮樂也勅公事難於稽遲居處悉皆遙逺其逐日當直中書舍人及吏部司封知印郎官少府監及篆印文兼書冩告身人吏等並宜輪次於中書側近宿止乙未帝出師子門至榆林坡下閲教壬寅幸保寧毬塲錫宴宰臣及文武百官賜宰臣張宗奭已下分物有加賜廣王分物賜湖南開元寺禪長老可復號惠光大師仍賜紫衣二月乙丑幸甘水亭出師子門幸榆林東北陂教諸軍兵事賜潞州投歸軍使張行恭錦服銀帶竝食戊辰宴於金鑾殿甲戌以春時無事頻命宰臣及勲戚宴於河南府池亭辛已楊師厚赴鎮於陜寒食假諸道節度使郡守勲臣競以春服賀又連清明宴以鞍轡馬及金銀器羅錦進者迨千萬乃御宣威殿宴宰臣及文武官四品以上已丑出光政門至穀水觀麥一月壬辰幸崇政院宴勲臣已亥幸天驥院宴侍臣壬寅幸甘水亭宴宰臣勲戚翰林學士辛亥宴宰臣於内殿丙辰於興安毬塲大饗六軍樂春時也四月壬戌}
