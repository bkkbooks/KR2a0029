  - {type: variant, offset: 612, length: 1, content: 溫, krp: 及内外諸司使咸有進獻詔以冦盜未平凡諸給過所竝令司門郎中員外郎出給以杜姦詐十一月癸已朔帝齋於内殿不視朝甲午日長至五更一㸃自大内出於文明殿受宰臣以下起居自五鳳樓出南郊左右金吾太常兵部等司儀仗法駕鹵薄及左右内直控鶴等引從赴壇文武百官太保韓建以下班以候帝升壇告謝司天臺奏冬至日自夜半後祥風微扇帝座澄明至曉黄雲捧日丙申畋於上東門外戊戌制曰夫嚴親報本所以通神明流澤覃休所以惠黎庶斯葢邦家不易之道皇王自昔之規敢斁大猷兹惟古義粤朕受命於今三年何曽不寅畏晨興焦勞夕惕師唐虞之典上則於乾功挹殷夏之源下涵於民極欲使萬方有裕六辨無愆然而志有所未孚理有所未達致奸宄作釁旱霪為災驕將守邊擁牙旗而背義積隂馭氣陵王燭以干和載攷休徴式昭至警朕是以仰髙俯厚靡惜於責躬履薄臨淵冀昭於𤣥覽競競慄慄夙夜匪寧及夫動干戈而必契靈誅陳犧齋而克章善應苟非天垂丕佑神贊殊休則安可致夷兇渠就不戰之功變沴戾氣作有年之慶况靈旗北指喪犬羊於亂轍之間飛騎西臨下鄜翟若走丸之易息一隅之煙燧復千里之封疆而又掃蕩左馮討除峴首故得外戎内夏益知天命之攸歸喙息蚑行共識皇基之永固仰懷昭應欲報無階爰因南至之辰親展圜丘之禮兹惟大慶必及下民乃宏渙汗之私以錫叛羸之幸所冀漸増蘇息亟致和平噫朕自臨御以來歳}
  - {type: variant, offset: 614, length: 0, content: '', WYG: 尚邇氛昏未殄討伐猶頻甲兵須議於餽糧飛軛頻勞於編户事非獲已慮若納隍宜所在長吏倍切撫綏明加勉諭每宫中抽差徭役禁猾吏廣歛貪求免至流散靡依凋弊不濟宜令河南府開封府及諸道觀察使切加鈐轄刺史縣令不得因縁賦歛分外擾人凡關庶獄每望輕刑只候纔罷用軍必當便議優給徳音節文内有未該者宜令所司類例條件奏}
