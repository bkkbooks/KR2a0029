  - {type: variant, offset: 7, length: 420, content: 梁書十一后妃列傳第一案梁后妃傳永樂大典闕全篇其散見者僅得四條今采北夢瑣言五代會要諸書分註於下以存當日之事蹟文惠皇太后王氏開平初追諡永樂大典卷一萬三千三百五十二太祖性孝愿奉太后未嘗小失色朝夕視膳為士君子之規範帝嚴察用法無纖毫假貸太后言之帝頗為省刑永樂大典卷一萬七千一百七十案北夢瑣言云梁祖父誠蚤卒有三子俱幼母王氏攜養寄於同縣人劉崇家昆弟之中唯溫狡猾無行崇母撫養之崇兄弟嘗加譴杖一日偷崇家釜而竄為崇追回崇母遮護以免扑責善逐走鹿往往及而獲之又崇母常見其有龍蛇之異他日與仲兄存入黃巢軍作賊伯兄昱與母王氏尚依劉家溫既辭去不知存亡及溫領鎮於汴盛飾輿馬使人迎母於崇家王氏惶恐辭避深藏不之信謂人曰朱三落拓無行何處作賊送死焉能自致富貴汴帥非吾子也使者具陳離鄉去里之由歸國立功之事王氏方泣而信是日與崇母並迎歸汴溫盛禮郊迎人士改觀崇以舊恩位至列卿為商州刺史王氏以溫貴封晉國太夫人仲兄存於賊中為矢石所中而卒溫置酒於母歡甚語及家事謂母曰朱五經辛苦業儒不登一命今有子為, WYG: 月}
