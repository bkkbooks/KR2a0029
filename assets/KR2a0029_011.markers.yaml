  - {type: variant, offset: 1290, length: 1, content: 尼, WYG: 政樂在進賢葢繇國有萬機朝稱百揆非才不治得士則昌自朕光宅中區迄今三載宵分輟寐日旰忘餐思共力於廟謀庶永清於王道而乃朝廷之内或未盡於昌言軍旅之間亦罕聞於竒䇿眷言方岳下及山林豈無英竒副我延佇諸道都督觀察防禦使等或勲髙翊世或才號知人必於塗巷之賢備察蒭蕘之士詔到可精搜郡邑博訪賢良諭之以千載一時約之以髙官美秩諒無求備惟在得人如有卓犖不羈沈潛自負通霸王之上略達文武之大綱究古今刑政之源識禮樂質文之變朕則待之不次委以非常用佐經綸豈勞階級如或一言拔俗一事出羣亦當舍短從長隨才授任大小方圓之器寧限九流温良恭儉之人難誣十室勉思薦舉勿至因循俟爾發揚慰予翹渇仍從别勅處分辛丑以乆雨命宰臣薛貽矩榮定鼎門趙光逢祠嵩岳勅魏博管内刺史比來州務竝委督郵遂使曹官擅其威權州牧同於閑冗俾循通制宜塞異端竝依河南諸州例刺史得以專達壬寅頒奪馬令先}
