  - {type: variant, offset: 1301, length: 0, content: '', WYG: 外兵圍合廷隠漢玫與指揮使張初李君用率州民防卒與仁福部分固守畫夜戮力踰月及鄜延援至大軍奮擊敗之河東邠岐賊分路逃遁夏州圍解通鑑甲申遣夾馬指揮使李遇劉綰自鄜延趨銀夏李遇等至夏州岐晉兵皆解去丙午詔曰劉知俊貴為方伯尊極郡王而乃背誕朝思竄投賊壘固神人之共怒諒天地所不容雖命討除尚稽擒戮宜懸爵賞以大功名必有忠貞咸思憤發有生擒劉知俊者賞錢千萬授節度使首級次之得孟審登者錢百萬除刺史得孫亢卓瓌劉儒張鄰等賞有差乙卯宴㑹羣臣於宣威殿舊}
