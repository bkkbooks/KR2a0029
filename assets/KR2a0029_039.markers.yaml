  - {type: variant, offset: 1131, length: 0, content: '', WYG: 衛宫闕㝷與氏叔琮同受太祖密㫖弑昭宗于洛陽宫既而太祖自河中至責以慢于軍政貶崖州司户復其本姓名與氏叔琮同日賜死北夢瑣言云朱全忠請誅朱友諒氏叔琮以成濟之罪歸之友諒臨刑訴天曰天若有知他日亦當如我後全忠即位為子友珪所弑竟如其言案友諒當作友恭見後攷證王重師潁州長社人也材力兼人沈嘿大度臨事有權變劔矟之妙冠絶于一時唐中和末蔡冦陷許昌重師脱身而來太祖異其狀貎乃𨽻于拔}
