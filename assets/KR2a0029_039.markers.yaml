  - {type: punctuation, offset: 47, content: 、, id: KR2a0029_ZHSJ_039-bkkpn5}
  - {type: variant, offset: 49, length: 313, content: 太傅兼侍中孔勍以太子太師致仕癸丑詔取今月十七日幸鄴都甲寅以國子祭酒朱守素卒廢朝丙辰以鎮南軍節度使袁建豐卒廢朝鎮南原本作鎮方今據歐陽史改正影庫本粘籤詔贈太尉丁巳詔曰朕聞堯舜有恤刑之典貴務好生禹湯申罪己之言庶明知過今月七日據巡檢軍使渾公兒口奏稱有百姓二人以竹竿習戰鬬之事朕初聞奏報實所不容率爾傳宣令付石敬瑭處置今旦重誨敷奏今旦重誨敷奏原本作令旦今從冊府元龜改正影庫本粘籤方知悉是幼童為戲載聆讜議方覺失刑循揣再三愧惕非一亦以渾公兒誑誣頗甚石敬瑭詳覆稍乖致人枉法而殂處朕有過之地今減常膳十日以謝幽寃其石敬瑭是朕懿親合施極諫既茲錯誤宜示省循可罰一月俸渾公兒決脊杖二十仍銷在身職銜配流登州小兒骨肉賜絹五十匹粟麥各百石便令如法埋葬兼此後在朝, WYG: 司徒}
