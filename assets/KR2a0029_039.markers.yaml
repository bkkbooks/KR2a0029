  - {type: variant, offset: 1954, length: 2, content: 范延, WYG: 奏官至檢校左僕射尋拜毫州刺史練兵禦冦邉境肅然思安為性勇悍每統戎臨敵不大勝必大敗開平元年春率兵伐幽州營于桑乾河擄獲甚衆燕人大懼及軍迴率諸軍伐潞累月不克師人多逸太祖怒甚詔疏其罪盡奪其官爵委本郡以民户係焉踰歲起之復令領兵亦無巨績可紀太祖嘗因命將授鉞謂左右曰李思安當敵果敢無出其右者然毎遇藩方擇材吾將用之則敗聞必至如是者二三矣則知飛將數竒前史豈虛言哉乾化元年秋又以為相州刺史思安自謂當擁旄仗鉞及是殊不快意但日循晏安無意為政及太祖北征以候騎之誤落然無所具而復壁壘荒圮帑廩空竭太祖怒貶桞州司户尋賜死于相州通鑑開化元年丙午至相州刺史李思安不意帝猝至落然無具坐削宮爵二年正月丁卯帝至獲嘉追思李思安去歲供饋有闕貶柳州司户尋長流思安于崖州賜死鄧季筠宋州下邑人也少入黄巢軍𨽻于太祖麾下及太祖鎮汴首署為牙將主騎軍伐鄆之役生擒排陣將劉矯以獻唐大順初唐帝命丞相張濬伐太原太祖奉詔出師西至髙平與晉人接戰軍既不利季筠為晉人所擒克用見之甚喜釋縛待以賔禮俄典戎事季筠在并門凡四稔景福二年晉軍攻邢臺季筠領偏師預其役將及邢邢人陣于郊兩軍酣戰之際季筠出陣飛馬來歸太祖大加奬歎賞賚甚厚時初置㕔子都最為親軍命季筠主之旋改統親騎又遷將中軍天祐三年奏授登州刺史下車稱理登州舊無羅城及季筠至郡率丁壯以築之民甚安之因相與立碑以頌其績太祖受禪改鄭州刺史㝷主兵于河中為都指揮使時并人冦平陽季筠接戰于洪洞大克拜華州防禦使又繼領龍驤等諸軍騎士累官至檢校司空栢鄉之役季筠臨陣前却太祖亦未之罪乾化二年春太祖親伐鎮定駐于相州因閲馬怒其馬瘦與魏博軍校何令稠陳令勲同斬于纛下黄文靖金鄉人少附于黄巢黨中巢敗歸于太祖累署牙職繼遷諸軍指揮使從太祖南平巢蔡北定兖鄆皆有功唐大順中佐葛從周送朱崇節入潞㑹晉軍十餘萬近逼垣寨文靖慮孤軍難守乃與葛從周啓闉出師文靖為殿命矢刄皆外向持重而還晉人不敢逼其年冬與康懐英渡淮入壽春之境下安豐霍丘至}
