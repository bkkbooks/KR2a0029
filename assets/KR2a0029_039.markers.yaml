  - {type: variant, offset: 1926, length: 1, content: 權, WYG: 署珍為宣武右職以總腹心于是簡練軍伍裁制綱紀平巢破蔡多珍之力也始尚讓以驍騎五千人至繁臺珍與龎師古齊奉國等擊退之及黄巢敗珍與并帥李克用追至寃句而還㝷從太祖以汴宋亳之師入西華破王夏寨勇冠軍鋒以功加秩光啓元年署諸軍都指揮使始為上將于是軍焦夷敗蔡師鐡林三千人盡俘其將復西至汝鄭南過陳潁繚宋亳滑濮間與蔡賊交戰鏖伏襲殺不}
  - {type: page-break, offset: 1926, content: '', id: KR2a0029_WYG_039-5b, image: WYG0277/WYG0277-0174d.png}
