  - {type: variant, offset: 3577, length: 1931, content: 日契丹七千騎來援定州王師逆戰於唐河北唐河原本作康河今據通鑑改正影庫本粘籤大破之案通鑑壬戌王晏球破契丹于唐河北甲子追至易州所推長曆與薛史合戊辰詔福建節度使王延鈞可依前檢校太師守中書令進封閩王己巳王晏球奏此月二十一日追契丹至易州掩殺四十里擒獲甚衆故朔方節度使韓洙贈太尉以兵部侍郎王權御史中丞梁文矩並為吏部侍郎以左諫議大夫呂夢奇為御史中丞八月癸酉朔以翰林學士守中書舍人李懌劉昫並為戶部侍郎充職以吏部侍郎劉岳守祕書監以吏部侍郎韓彥惲守禮部尚書以戶部侍郎歸藹守太子賓客以戶部侍郎裴守兵部侍郎以中書舍人張文寶守刑部侍郎詔凡有姓犯廟諱者以本望為姓丁丑以檢校尚書右僕射守龍武大將軍劉訓為晉州節度使檢校太傅壬午幽州趙德鈞奏於府西邀殺契丹敗黨數千人生擒首領惕隱等五十餘人是時官軍襲殺契丹屬秋雨繼降泥濘莫進人饑馬乏散投村落所在村民持白梃毆殺之德鈞出兵接於要路幾無噍類帝致書喻其本國案通鑑作八月壬戌趙德鈞邀擊契丹據薛史八月係癸酉朔不得有壬戌疑通鑑誤辛卯以朔方軍留後韓璞為朔方軍節度使靈武雄警甘肅等州觀察使檢校司徒雄警疑當作雄邠考五代會要及冊府元龜俱作警又通鑑注云警州在涇原西今仍其舊影庫本粘籤帝聞隨鄧復郢均房之民父母骨肉有疾以長竿遙致粥食而餉之出嫁女夫家不遣來省疾乃下詔委長吏嚴加禁察房州奏新開山路四百里南通夔州畫圖以獻以前洋州節度使戴思遠為太子太保致仕庚子詔今後翰林學士入院以先後為班次承旨一員不計官資先後在學士之上閏月丁未兩浙節度觀察留後清海軍節度使檢校太師兼中書令錢元瓘可杭州越州大都督府長史充鎮東鎮海等軍節度使戊申趙德鈞獻戎俘於闕下其蕃將惕隱等五十人留於親衞餘契丹六百人皆斬之乙卯升楚州為順化軍以明州刺史錢元珦為本州節度使以吏部尚書蕭頃為太子少保契丹遣使來貢獻契丹平州刺史張希崇上表歸順乙丑陝州節度使李從敏移鎮滄州以宣徽南院使張延朗為陝州節度使詔在京遇行極法日宜不舉樂兼減常膳諸州遇行極法日禁聲樂己巳滑州掌書記孟昇匿母服大理寺斷處流特勅孟昇賜自盡觀察使觀察判官錄事參軍失其糾察各行殿罰襄邑縣民聞威父為人所殺不雪父寃有狀和解特勅處死是月二十七大水河水溢絳州地震九月乙亥以捧聖左右廂副都指揮使索自通為雲州節度使丁丑以太府卿判四方館事李郁為宗正卿壬午以晉州節度使安崇阮為左驍衞上將軍甲申吐蕃迴紇各遣使貢獻壬辰宰臣王建立進玉杯上有文曰傳國萬歲盃乙未詔德州流人溫韜遼州流人段凝嵐州司戶陶憲州司戶石知訥原州司馬聶嶼並宜賜死於本處暴其宿惡而誅之也丙申以邠州節度使梁漢顒為右威衞上將軍威衞原本作威武今從五代會要改正影庫本粘籤丁酉河陽節度使駙馬都尉趙延壽為檢校司徒己亥詔徐州節度使房知溫兼荊南行營招討使知荊南行府事冬十月甲辰制瓊華長公主孟氏可冊為福慶長公主丙午以滄州節度使李從敏兼北面招討使戊申帝臨軒命禮部尚書韓彥惲工部侍郎任贊往應州奉冊四廟詔邠州節度使李敬周攻慶州案通鑑作李敬通薛史前後並作敬周歐陽史亦作敬周疑通鑑傳刻之訛舊五代史考異以刺史竇廷琬拒命故也案竇廷琬反通鑑從薛史作十月歐陽史繫于十月以前與薛史異舊五代史考異戊午契丹平州刺史張希崇已下八十餘人見於元德殿頒賜有差突厥首領張慕進等來朝貢案歐陽史作慕晉舊五代史考異案張慕進來朝歐陽史作丁巳孔本甲子安州節度使高行珪奏屯駐左神捷左懷順軍士作亂已逐殺出城詔升壽州為忠正軍戊辰以雲州節度使索自通領壽州節度使以前雲州節度使張溫復為雲州節度使庚午夜西南有彗星長丈餘在牛星五度十一月癸酉日南至帝御崇元殿受朝賀甲戌捧聖指揮使何福進招收到安州作亂兵士五百人自指揮使已下至節級四十餘人並斬餘衆釋之壬午房知溫奏荊南高季興卒案高季興卒通鑑作十二月丙辰詳見通鑑考異舊五代史考異中書舍人劉贊奏請節度使及文班三品已上謝見通喚從之是日以契丹所署平州刺史光祿大夫檢校太保張希崇為汝州刺史案歐陽史作汝州防禦使通鑑從薛史作刺史舊五代史考異加檢校太傅己丑中書奏今後或有封冊請御正衙從之青州奏節度使霍彥威卒輟朝三日詔宰臣王建立權知青州軍州事庚寅禮部員外郎和凝奏應補齋郎並須引驗正身以防偽濫舊例使蔭一任官補一人今後改官須轉品即可如無子許以親姪繼限念書十卷試可則補從之甲午以尚書左僕射同平章事集賢殿大學士判三司王建立為青州節度使檢校太尉同平章事丙申帝謂侍臣曰古鐵券如何趙鳳對曰帝王誓文許其子子孫孫長享爵祿帝曰先朝所賜唯朕與郭崇韜李繼麟三人爾崇韜繼麟尋已族滅朕之危疑慮在旦夕於是嗟嘆久之趙鳳曰帝王執信故不必銘金鏤石矣吏部郎中何澤奏流外官請不試書判之類何澤原本作何譯今據歐陽史改正影庫本粘籤從之吐蕃遣使朝貢戊戌前安州節度副使范延榮幷男皆斬於軍巡獄為高行珪誣奏故也十二月壬寅朔詔真定府屬縣宜準河中鳳翔例升為次畿真定縣升為次赤甲辰邠州節度使李敬周奏收下慶州刺史竇廷琬族誅永樂大典卷七千一百六十四, WYG: ''}
