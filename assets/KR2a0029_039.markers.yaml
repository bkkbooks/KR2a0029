  - {type: variant, offset: 1946, length: 1, content: 兼, WYG: 安師儒戎政不治太祖命珍與李唐賔率歩騎以經略之始入境遇大雪令軍士無得休息一夕馳至壁下百梯並升遂乘其墉滑州平時太祖方謀濟師乃遣珍往淄州募兵行次任縣東面都統齊克讓伏兵于孫師陂以邀珍珍大破之進軍至牙山都虞候張仁遇白珍曰軍有不齊者當先斬本都將後以狀聞願許之珍怒其專乃斬仁遇以徇軍由是諸將感懼兵至乾封與淄人戰于白草口敗之青人以歩騎二萬列三寨于金嶺驛珍與戰連破之殱其師盡獲軍器戎馬是夕攻博昌大獲兵衆其後破盧瑭張眰及朱瑄朱瑾之衆平定曹濮未嘗不在戰中梁山之役始與李唐賔不協珍在軍嘗私迎其室于汴而不先請太祖疑之密令唐賔察之二將不相上下因而交諍唐賔夜斬關還汴以訴珍亦棄軍單騎而至太祖兩惜之故不罪俾還于師復以􅂿白騎士入陳亳間以邀蔡人遂南至斤溝破淮西石璠之師二萬擄璠以獻珍旋師自亳}
  - {type: page-break, offset: 1946, content: '', id: KR2a0029_WYG_039-6a, image: WYG0277/WYG0277-0175a.png}
  - {type: page-break, offset: 1946, content: '', id: KR2a0029_WYG_039-6b, image: WYG0277/WYG0277-0175b.png}
  - {type: variant, offset: 1946, length: 1, content: 兼, krp: 安師儒戎政不治太祖命珍與李唐賔率歩騎以經略之始入境遇大雪令軍士無得休息一夕馳至壁下百梯並升遂乘其墉滑州平時太祖方謀濟師乃遣珍往淄州募兵行次任縣東面都統齊克讓伏兵于孫師陂以邀珍珍大破之進軍至牙山都虞候張仁遇白珍曰軍有不齊者當先斬本都將後以狀聞願許之珍怒其專乃斬仁遇以徇軍由是諸將感懼兵至乾封與淄人戰于白草口敗之青人以歩騎二萬列三寨于金嶺驛珍與戰連破之殱其師盡獲軍器戎馬是夕攻博昌大獲兵衆其後破盧瑭張眰及朱瑄朱瑾之衆平定曹濮未嘗不在戰中梁山之役始與李唐賔不協珍在軍嘗私迎其室于汴而不先請太祖疑之密令唐賔察之二將不相上下因而交諍唐賔夜斬關還汴以訴珍亦棄軍單騎而至太祖兩惜之故不罪俾還于師復以踏白騎士入陳亳間以邀蔡人遂南至斤溝破淮西石璠之師二萬擄璠以獻珍旋師自亳}
  - {type: variant, offset: 1948, length: 5, content: 面水陸轉運, WYG: 趣静戎濟舟于滑破黎陽臨河李固三鎮軍于内黄敗樂從訓萬餘人分命聶金范居實略澶州與魏師遇于臨黄魏軍有豹子軍二千人戮之無噍類威振河朔復攻淮西至蔡夾河而寨敗賊將蕭皓之衆皆擁于河溺死之進軍蔡州營其西南既破羊馬垣遇雨班師珍以兵援劉瓚赴楚州至襄山南遇徐戎扼其路珍乃攻豐下之時溥乃以全師㑹戰于豐南其康里珍乃收豐破其三萬餘衆及蔡賊平珍比諸將功居多龍紀初與諸將屯于蕭縣以禦時溥珍慮太祖自至令諸軍葺馬廐以候廵撫李唐賓之禆將嚴郊獨慢馬軍候范權恃珍以督之唐賔素與珍不恊果怒乃見以訴其事珍亦怒曰唐賔無禮遂拔劍斬之珍命騎列狀陳其事太祖初聞唐賔之死驚駭與敬翔謀詐令有司收捕唐賔妻子下獄以安珍心太祖遂徑往蕭縣距蕭一舎珍率將校迎謁梁祖令武士執之責其專殺命丁㑹行戮都將霍存等數十人叩頭以救太祖怒以坐床擲之乃退李思安陳留張亭里人也初事汴將楊彦洪為騎士性拳勇未弱冠長七尺超然有乘時自奮之意唐中和三年太祖鎮汴嘗大閲戎旅覩其材甚偉之因錫名思安字貞臣思安善飛矟所向披靡每從太祖征伐常馳馬出敵陣之後測其厚薄而還或敵人有恃猛自衒者多命取之必鷹揚飈巻擒馘于萬衆之中出入自若如蹈無人之地太祖甚惜之命副王䖍裕為􅂿白將時巢蔡合從太祖毎遣偵邏必率先獨往巢敗走思安領所部百餘人追賊殺戮掩奪衆莫敢當㝷領軍襲蔡冦于鄭都將李唐賓馬躓而墜思安援槊刺追者唐賔復其騎而還又嘗與蔡人鬬當陣生擒賊將柳行實其後渡長淮下天長高郵二邑又拒孫儒迫濠州皆有竒績累遷都指揮}
