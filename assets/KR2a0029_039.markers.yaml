  - {type: variant, offset: 8, length: 0, content: '', krp: 宋門下侍郎參知政事監修國史薛居正等撰梁書第十九列傳九氏叔琮尉氏人也}
  - {type: variant, offset: 9, length: 3, content: 書十五, WYG: 中和末應募為騎軍初𨽻于龎師古為伍長叔琮壯勇沈毅膽力過人太祖討巢蔡于陳許間叔琮奮擊首出諸校太祖壯之自行伍間擢為後院馬軍都將時東伐徐鄆多歴年所叔琮身當矢石奮不顧命觀者許焉累遷為指揮使㝷奏授宿州刺史檢校右僕射太祖伐襄陽叔琮失利降為陽翟鎮遏使㝷又捍禦晉軍于洹水有功遷曹州刺史天復元年春領大軍攻拔澤潞叔琮遂引兵北掠太原師還除晉州節度使}
  - {type: page-break, offset: 9, content: '', id: KR2a0029_WYG_039-1b, image: WYG0277/WYG0277-0172b.png}
  - {type: variant, offset: 9, length: 3, content: 書十五, krp: 中和末應募為騎軍初𨽻于龎師古為伍長叔琮壯勇沈毅膽力過人太祖討巢蔡于陳許間叔琮奮擊首出諸校太祖壯之自行伍間擢為後院馬軍都將時東伐徐鄆多歴年所叔琮身當矢石奮不顧命觀者許焉累遷為指揮使㝷奏授宿州刺史檢校右僕射太祖伐襄陽叔琮失利降為陽翟鎮遏使㝷又捍禦晉軍于洹水有功遷曹州刺史天復元年春領大軍攻拔澤潞叔琮遂引兵北掠太原師還除晉州節度使}
  - {type: line-break, offset: 12, content: '', id: ZHSJ__dup6580}
  - {type: variant, offset: 13, length: 4, content: 宗紀第五, WYG: 年太祖屯軍于岐下晉軍潛襲絳州前軍不利晉軍恃勝攻臨汾叔琮嚴設備禦乃于軍中選壯士二人深目虬鬚貎如沙陀者令就襄陵縣牧馬于道間蕃冦見之不疑二人因雜其行間俄而伺隙各擒一人而來晉軍大驚且疑有伏兵遂退據蒲縣時太祖遣朱友寧將兵數萬赴應悉委叔琮節制既至諸將皆欲休軍叔琮曰若然則賊必遁矣遁則何功焉因夜出潛師截其歸路遇晉軍逰騎數百盡殺之遂攻其壘拔之斬獲萬餘衆奪馬三百匹太祖聞之喜謂左右曰殺蕃賊破太原非氏老不可叔琮乃長驅收汾州與晉人轉戰直抵并壘軍迴以其功奏加檢校司空自後累年晉軍不敢侵軼叔養士愛民甚有能政}
  - {type: page-break, offset: 13, content: '', id: KR2a0029_WYG_039-2a, image: WYG0277/WYG0277-0173a.png}
  - {type: page-break, offset: 13, content: '', id: KR2a0029_WYG_039-2b, image: WYG0277/WYG0277-0173b.png}
