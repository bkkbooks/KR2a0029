  - {type: variant, offset: 1923, length: 2, content: 樞密, WYG: 發其事無何擅遣禆將君練縱兵深入邠鳯君練敗北太祖聞之怒其專擅因追而斬之通鑑云劉捍至長安王重師不為禮捍譛之帝曰重師潜與邠岐通甲申貶溪州刺史尋賜自盡夷其族朱珍徐州豐縣雍鳯里人也太祖初起兵珍與龎師古許唐李暉丁㑹氏叔琮鄧季筠王武等八十餘人以中㳙從摧堅陷陣所向盪決及太祖鎮汴兼領招討}
