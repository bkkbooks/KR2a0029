  - {type: variant, offset: 1619, length: 295, content: 節度使王建立為右僕射兼中書侍郎平章事集賢殿大學士判三司西方鄴上言收復歸州以前鄭州刺史楊漢賓為洋州武定軍留後戊辰以前彰國軍節度副使陳臯為鳳州武興軍留後以前蔡州刺史孫漢韶為應州彰國軍留後以宣徽南院使范延光為樞密使以宣徽北院使判三司張延朗為宣徽南院使以前冀州刺史婁繼英為耀州團練使以懷州刺史張廷蘊為金州防禦使己巳命范延光權知鎮州軍府事西方鄴奏於歸州殺敗荊南賊軍太白山道士解元龜自西川至對於便殿稱年一百一歲既而上表乞西都留守兼西川制置使要修西京宮闕帝謂侍臣曰此人老耄自遠來朝方期別有異見反為身名甚可笑也賜號知白先生賜紫放歸山甲戌冊迴鶻可汗仁喻為順化可汗夏四月戊寅以汴州節度使石敬瑭為鄴都留守充天雄軍, WYG: ''}
