  - {type: variant, offset: 2171, length: 217, content: 從孟知祥之請也案九國志趙廷隱傳知祥至蜀康延孝陷漢州遣廷隱率兵擊破之擒延孝檻送闕下知祥奏加檢校司空漢州刺史遂留屯成都舊五代史考異洋州上言重開入蜀舊路三百餘里比今官路較二十五程而近癸巳殿中少監石知訥貶憲州司戶坐扇惑軍鎮也北面副招討宋州節度使王晏球以定州節度使王都反狀聞案遼史作三月王都以定州來歸五代春秋及通鑑並從薛史作四月庚子制義武軍節度使檢校太尉兼中書令太原王王都削奪官爵壬寅以王晏球為北面行營招討使知定州行軍州事以滄州節度使兼北面行營, WYG: 又遷左龍驤}
