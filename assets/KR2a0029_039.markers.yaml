  - {type: variant, offset: 2537, length: 926, content: 影庫本粘籤癸丑湖南馬殷奏二月中大破淮寇二萬生擒將士五百人中書上言諸道薦人宜酌定員數今後節度使每年許薦二人帶使相者許薦三人團練防禦使各一人節度觀察判官並聽旨授書記已下即許隨府從之以六軍判官尚書司封郎中史圭為右諫議大夫充樞密直學士詔州縣官以三十月為考限刺史以二十五月為限以到任日為始己未幽州奏契丹禿餒領二千騎西南趨定州以前同州節度使盧質行兵部尚書判太常卿事辛酉以天雄軍節度副使判興唐府事趙敬怡為樞密使詔曰上柱國勳之極也近代已來文臣官階稍高便授柱國歲月未深便轉上柱國武資初官便授上柱國今後凡加勳先自武騎尉十二轉方授上柱國十二轉原本作二輔今據新唐書百官志改正影庫本粘籤永作成規不令踰越丁卯鎮州奏今月十八日王師不利於新樂壬申王晏球奏今月二十一日大破定州賊軍及契丹於曲陽斬獲數千人王都與禿餒以數十騎復入於定州六月己卯以右金吾上將軍毛璋為左金吾上將軍以前安州節度使史敬鎔為右金吾上將軍以前華州節度使劉彥琮為左武衞上將軍壬午放內園鹿七頭於深山乙酉皇子故金槍指揮使檢校左僕射從璟贈太保己丑幽州趙德鈞奏殺契丹千餘人於幽州東獲馬六百匹壬辰宰臣馮道率百僚上表請上尊號曰聖明神武文德恭孝皇帝詔報不允丙申馮道等再上尊號不允戊戌以西京副留守知留守事張遵誨行京兆尹秋七月乙巳詔故偽蜀主王衍追封順正公以諸侯禮葬丙午以前武信軍節度使李敬周為邠州節度使丁未以滄州節度使安審通卒於師輟朝壬子以朔方節度使韓洙卒廢朝甲寅王晏球奏六月二十二日進攻逆城將士傷者三千人時晏球知城中有備未欲急攻朱宏昭張虔釗切於立功促攻賊壘晏球不得已而進兵遂致傷痍者衆乙卯以太子少保李茂勳卒輟朝己未己未原本作丁未考通鑑云東都民有犯私麴者留守孔循族之或請聽民造麴而于秋稅畝收五錢己未敕從之今改正影庫本粘籤詔弛麴禁許民間自造於秋苗上納徵麴價畝出五錢時孔循以麴法殺一家於洛陽或獻此議以為愛其人便於國故行之宗正卿李紓除名刑部侍郎馬縞貶綏州司馬刑部員外郎李慎儀貶階州司戶初李紓差攝陵臺令張保嗣等各虛稱試銜為奉先令王延朗所訟大理寺斷以詐假官論刑部詳覆稱非詐假大理執之召兩司廷議刑部理屈故有是貶紓續勅配隴州徒一年未幾詔曰天下州府例是攝官皆結試銜試銜原本作私銜今據五代會要改正影庫本粘籤或因勘窮便關詐假已前或有稱試銜一切不問此後並宜禁止曹, WYG: 登}
