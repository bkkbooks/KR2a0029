  - {type: variant, offset: 916, length: 274, content: 僖宗擢傳江西團練使俄拜鎮南節度使及為楊行密所攻洪傳首尾相應皆遣求援於太祖太祖遣朱友恭赴之大破淮寇于武昌二鎮稍寧及行密乘勝急攻洪鄂洪復乞師于太祖太祖命荊南成汭率荊襄舟師以赴之未至夏口汭敗溺死淮人遂陷鄂州洪為其所擒被害于廣陵市時唐天復二年也案九國志劉存傳存急焚鄂州城樓梁援兵將突圍而出諸將欲急擊之存曰擊之賊必復入復入則城愈固矣不若聽其遁去諸將皆曰善是日城陷擒杜洪父子斬于廣陵市天祐三年夏太祖表請為洪立廟于其鎮優詔可之太祖即位詔贈太傅先是鍾傳卒於江西其子繼之案九國志秦裴傳天祐三年洪州鍾傳卒州人立其子匡時江州刺史延規傳之養子忿不得立以其郡納款因授裴西南面, WYG: ''}
