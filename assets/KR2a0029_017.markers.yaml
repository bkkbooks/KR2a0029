  - {type: variant, offset: 3023, length: 771, content: 荊南留後是時唐室微弱諸道常賦多不上供唯匡凝昆仲雖強據江山然盡忠帝室貢賦不絕太祖將期受禪以匡凝兄弟並據藩鎮乃遣使先諭旨焉匡凝對使者流涕答以受國恩深豈敢隨時妄有他志使者復命太祖大怒天祐二年秋七月遣楊師厚率師討之八月太祖親領大軍南征仍請削匡凝在身官爵及師厚濟江匡凝以兵數萬逆戰大為師厚所敗匡凝乃燔其舟單舸急棹沿漢而遁于金陵後卒於淮南案新唐書云師厚繇陰谷伐木為梁匡凝以兵二萬瀕江戰大敗乃燔州單舸夜奔揚州行密見之曰君在鎮輕車重馬輸于賊今敗乃歸我邪匡明亦謀奔淮南子承規諫曰昔諸葛兄弟分仕二國若適揚州是自取疑也匡明謂然乃趨成都歐陽史云行密厚遇匡凝其後行密死楊渥稍不禮之渥方宴食青梅匡凝顧渥曰勿多食發小兒熱諸將以為慢渥遣匡凝海陵後為徐溫所殺初匡凝好聚書及敗楊師厚獲數千卷于第悉以來獻匡凝弟匡明字贊堯幼以父貴一子出身為江陵府文學及壯以軍功歷繡峽二州刺史成汭之敗其兄匡凝表為荊南留後未至鎮而朗陵之兵先據其城矣匡明領兵逐之遂鎮于渚宮天祐二年秋太祖既平襄州遣楊師厚乘勝以趨荊門匡明懼乃舉族上峽奔蜀王建待以賓禮及建稱帝用為大理卿工部尚書久之卒于蜀永樂大典卷一萬六千九百九十一張佶不知何郡人也案九國志佶京兆長安人乾寧初以明經中第累遷宣州從事復為秦宗權行軍司馬後與劉建峯據湖南推建峯為帥唐乾寧初劉建峯據湖南獨邵州不賓命都將馬殷討之期歲未克寸而建峯為部下所殺軍亂鄰寇且至是時佶為行軍司馬屬潭人謀帥曰張行軍即所奉也佶不得已而視事旬日之間威聲大振寇亦解去案九國志建峯將吏推佶為帥佶將入府常所乘馬忽爾踶齧不止正中佶髀佶謂將吏曰吾非汝主當迎馬公為之與薛史異新唐書劉建峯傳從九國志乃謂將吏曰佶才能不如馬公况朝廷重藩非其人不可因以牘召殷亦不疑稟命而至佶受拜謁禮畢命升階讓殷為帥佶即趨下率衆抃賀乃自請率師代殷攻邵州下之復為行軍司馬垂二十年殷果立大勳甚德佶開平初殷表佶為朗州永順軍節度使累加, WYG: ''}
