  - {type: variant, offset: 3814, length: 0, content: '', WYG: 門移軍于下博劉守竒以一軍自貝州掠冀州衡水阜城陷下博師厚自弓高渡御河逼滄州張萬進懼送欵師厚表請以萬進為青州節度使以劉守竒為滄州節度使詔曰太祖皇帝六月一日大忌朕聞姬周已還並用通喪之禮炎漢之後方行易月之儀厯代相沿萬幾斯重遂為故實難遽改更朕頃遘家寃近平内難倐臨祥制俯迫忌辰音容永逺而莫追號感彌深而難抑將欲表宅憂于中禁是宜輟聽政于外朝雖異常儀願申罔極宜輟五月二十二日至六月二十九日朝叅軍機急切公事即不得留滯並仰畫時聞奏施行宰臣文武百官三上表以}
  - {type: page-break, offset: 3814, content: '', id: KR2a0029_WYG_017-6b, image: WYG0277/WYG0277-0090b.png}
  - {type: variant, offset: 3814, length: 0, content: '', krp: 門移軍于下博劉守竒以一軍自貝州掠冀州衡水阜城陷下博師厚自弓高渡御河逼滄州張萬進懼送欵師厚表請以萬進為青州節度使以劉守竒為滄州節度使詔曰太祖皇帝六月一日大忌朕聞姬周已還並用通喪之禮炎漢之後方行易月之儀厯代相沿萬幾斯重遂為故實難遽改更朕頃遘家寃近平内難倐臨祥制俯迫忌辰音容永逺而莫追號感彌深而難抑將欲表宅憂于中禁是宜輟聽政于外朝雖異常儀願申罔極宜輟五月二十二日至六月二十九日朝叅軍機急切公事即不得留滯並仰畫時聞奏施行宰臣文武百官三上表以}
  - {type: variant, offset: 3815, length: 1, content: 志, WYG: 忌廢務多日請依舊制詔報曰朕聞禮非天降固可酌于人情事繫孝思諒無妨于國體今以甫臨忌日暫輟視朝冀全哀戚之情用表始終之節宰臣等累陳章表備述古今慮以萬幾之繁議以五日之請雖兹懇切難盡允俞况保身方荷于洪基敢言過毁而權制獲申于至性必在得中宜自今月二十九日輟至六月七日無煩抑請深體朕懐六月戊子以滄州順化軍節度使并潞鎭定副招討使檢校太傅同平章事張萬進為青州節度使秋九月甲辰以光禄大夫守御史大夫吳興郡開國侯姚洎為中書侍郎平章事十二月庚午以前鄆州節度檢校司徒食邑二千户福王友璋為許州節度使檢校太保是月晉王收幽州執偽燕主劉守光及其父仁㳟歸晉陽}
  - {type: page-break, offset: 3815, content: '', id: KR2a0029_WYG_017-7a, image: WYG0277/WYG0277-0090c.png}
  - {type: page-break, offset: 3815, content: '', id: KR2a0029_WYG_017-7b, image: WYG0277/WYG0277-0090d.png}
