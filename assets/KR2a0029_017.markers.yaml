  - {type: variant, offset: 1449, length: 248, content: 月柳條堪作打鍾槌偈終而卒傳得之不能測洎明年春淮帥引兵奄至洪州陷江南遂為楊氏有打鍾之偈人始悟焉田頵本揚府之大校也案九國志頵字德臣廬州合肥人朱延壽不知何許人案九國志延壽廬州舒城人與新唐書同唐天祐初楊行密雄據淮海時頵為宣州節度使延壽為壽州刺史頵以行密專恣跋扈嘗移書諷之曰侯王守方以奉天子古之制也其或踰越者譬如百川不朝于海雖狂奔猛注澶漫遐廣終為涸土不若恬然順流淼茫無窮也况東南之鎮揚為大塵賤刀布阜積金玉願公上恆賦頵將悉儲峙具單車從行密怒曰今財賦之行必由於汴適足以資于敵也不從時延壽方守壽春案九國志天復初北, WYG: ''}
