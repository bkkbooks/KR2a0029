  - {type: variant, offset: 607, length: 287, content: 狐疑望隣封而鼠竄名非霸越乘舟難效于陶朱志切投秦出境遂稱于張祿又云成為本姓郭乃冒稱本避犯禁之辜敢歸司寇別族受封之典誠愧諸侯伏乞聖慈許歸本姓云云其表甚為朝廷所重後因汭生辰淮南楊行密遣使致禮幣之外仍貺初學記一部準忿然以為不可謂汭曰夫初學記蓋訓童之書爾今敵國交聘以此書為貺得非相輕之甚耶宜書責讓汭不納準自嘆曰若然見輕敵國足彰幕府之無人也參佐無狀安可久遽請解職汭怒其去潛使人于途中殺之杜洪者江夏伶人案新唐書洪鄂州人鍾傳者豫章小校案新唐書傳洪州高安人唐光啟中秦宗權凶焰起屢擾江淮郡將不能城守洪傳各為部校因戰立威逐其廉使自稱留後朝廷因而命之案新唐書光啟二年洪乘虛入鄂自為節度留後僖宗即拜本, WYG: 天雄}
