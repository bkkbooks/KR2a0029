  - {type: variant, offset: 9, length: 0, content: '', krp: 第八末帝紀上末帝諱瑱初名友貞及即位改名鍠貞明中又改今諱太祖第四子也母曰元貞皇后張氏以唐文德元年戊申嵗九月}
  - {type: variant, offset: 10, length: 5, content: 七列傳第七, WYG: 二日生於東京帝美容儀性沈厚寡言雅好儒士唐光化三年授河南府參軍太祖受禪封均王時太祖初置天興軍最為親衛以帝為左天興軍使開平四年夏進位檢校司空依前天興軍使充東京馬步軍都指揮使乾化二年六月二日庶人友珪弑逆矯太祖詔遣供奉官丁昭溥馳至東京密令帝害博王友文友珪即位以帝為東京留守行開封尹檢校司徒友珪以簒逆居位羣情不附㑹趙巖至東京從帝私讌因言及社稷事帝以誠欵謀之巖曰此事易如反掌}
