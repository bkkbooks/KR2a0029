  - {type: variant, offset: 3879, length: 2, content: 高駢, WYG: 討王鎔為名遣澶州刺史行營先鋒步軍都指揮使王彦章領龍驤五百騎先入于魏州屯于金波亭詔以魏州軍兵之半𨽻于相州并徙其家焉又遣主者檢察魏之帑廩既而德倫促諸軍上路姻族辭決哭聲盈巷其徒乃相聚而謀曰朝廷以我軍府强盛故設法殘破况我六州厯代藩府軍門父子姻族相連未嘗逺出河門離親去族一旦遷于外郡生不如死三月二十九日夜魏軍乃作亂放火大掠首攻龍驤軍王彦章斬關而遁遲明殺德倫親軍五百餘人于牙城執德倫置之樓上有効節軍校張彦者最為麤暴膽氣伏人乃率無頼輩數百止其剽掠是日魏之士庶被屠戮者不可勝紀帝聞之遣使齎詔安撫通鑑夏四月帝遣供奉官扈異撫諭魏軍乃許張彦除郡厚賜將士優賞彦等不遜投詔于地侮罵詔使因廹德倫飛奏請却復相衛抽退劉鄩軍帝復遣諭曰制置已定不可改易如是者三彦等奮臂南向而罵曰傭保兒敢如是也復廹德倫列其事時有文吏司空頲者甚有筆才彦召見謂曰為我更草一狀詞宜抵突如更敢違則渡河擄之乃奏曰臣累拜封章上聞天聽在軍衆無非共切何朝廷皆以為閑半月三軍切切而戈矛未息一城生聚皇皇而控告無門惟希俯鑒丹𠂻茍從衆欲須垂聖允斷在不疑如或四向取謀俱慮六州俱失言非意外事在目前張彦又以楊師厚先兼招討使請朝廷依例授之故復逼德倫奏曰臣當道兵甲素精貔貅極鋭下視并汾之敵平吞鎭定之人特乞委臣招討之權試臣湯火之節茍無顯効任賜明誅詔報曰魏博冦敵接連封疆懸逺凡于應赴須在師徒是以别建節旄各令捍禦并鎭則委魏博控制澤潞則遣相衛枝梧咸逐便安貴均勞逸巳定不移之制宜從畫一之規至于征伐事權亦無定例且臨清王領鎭之日羅紹威守藩以來所領事銜本無招討秪自楊師厚先除陜滑二帥皆以招討兼權因兹帶過鄴中原本本不曾落下茍循事體寧恡施行况今劉鄩指鎭定出征康懐英往邠岐進討秪令統帥師旅亦無招討使銜切宜徧諭羣情勿興浮議倚注之意卿宜體之詔至張彦壊裂抵之于地謂德偷曰梁主不達時機聽人穿鼻城中擾攘未有所依我甲兵雖多須資勢援河東晉王統兵十萬匡復唐朝世與大梁仇讎若與我同力事無不濟請相公改圖以求多福德倫不得巳而從之乃遣牙將曹廷隱奉書求援于太原彦使德倫告諭軍城曰可依河東稱天祐十三年此後如有人將文字于河南往來便仰所在處置是月邠州留後李保衡以城歸順保衡楊崇本養子也崇本乃李茂貞養子任邠州二十餘年去嵗為其子彦魯所毒彦魯領知州事五十餘日保衡殺彦魯送欵于帝即以保衡為華州節度使以河陽留後霍彦威為邠州節度使五月晉王率師赴魏州節度使牛存節薨是月鳯翔李茂貞遣偽署涇州節度使劉知俊率師攻邠州以李保衡歸順故也自是凡攻圍十四月節度使霍彦威諸軍都指揮使黄貴堅守捍冦㑹救軍至岐人乃退六月庚寅晉王入魏州以賀德倫為大同軍節度使舉族遷于晉陽是月晉人陷德州秋七月又陷澶州刺史王彦章棄城來奔通鑑晉人夜襲澶州刺史王彦章在劉鄩營晉人獲其妻子是月劉鄩自洹水潛師由黄澤路西趨晉陽至樂平縣值霖雨積旬乃班師還次宗城遂至貝州軍於堂邑遇晉軍轉鬬數十里晉軍稍退翼日鄩移軍于莘八月賀瓌收復澶州九月以行營先鋒歩軍都指揮使行澶州刺史檢校太保王彦章為汝州防禦使依前行營先鋒步軍都指揮使壬午正衙命使册德妃張氏是夕妃薨冬十月辛亥康王友孜謀反伏誅是夕帝于寢殿熟寐忽聞御榻上寳劍有聲帝遽起視之而友孜之黨巳入于宫中帝揮之獲免清異録末帝夜于寢間擒刺客乃康王友孜所遣帝自戮之造雲母匣貯所用劍名匣曰䕶聖將軍之館壬午葬德妃張氏十一月乙丑改乾化五年為貞明元年十二月乙未詔升華原縣為崇州静勝軍以美原縣為裕州以為屬郡以偽命義勝軍節度使鼎耀等州觀察使特進檢校太保同平章事李彦韜為特進檢校太傅同平章事充静勝軍節度使崇裕等州觀察使河内郡開國侯仍復本姓温名昭圖昭圖華原賊帥也李茂貞以養子以華原為耀州美原為鼎州偽命昭圖}
