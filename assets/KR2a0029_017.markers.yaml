  - {type: 'tls:seg', offset: 4023, content: '', id: KR2a0029_ZHSJ_017-d17p12s29}
  - {type: variant, offset: 4023, length: 0, content: '', WYG: 守太傅兼中書令閩王王審知賜號忠勤保安興國功臣餘如故晉人陷洺州癸卯夜捉生都將李霸作亂龍驤都將杜晏球討平之時遣捉生軍千人戍楊劉軍出宋門外是夜由水門復入二鼓大譟火發燭城李霸}
  - {type: variant, offset: 4023, length: 0, content: '', krp: 守太傅兼中書令閩王王審知賜號忠勤保安興國功臣餘如故晉人陷洺州癸卯夜捉生都將李霸作亂龍驤都將杜晏球討平之時遣捉生軍千人戍楊劉軍出宋門外是夜由水門復入二鼓大譟火發燭城李霸}
  - {type: variant, offset: 4024, length: 1, content: 薛, WYG: 其徒燔建國門不克龍驤都將杜晏球屯鞠場聞亂兵至率騎擊之亂軍退走馬登建國門晏球奏曰亂者惟李霸一軍但守宫城遲明臣必破之未明晏球誅霸及其同惡京師方定是月以行營先鋒步軍都指揮使汝州防禦使王彦章為鄭州防禦使依前先鋒步軍都指揮使五月晉軍還太原六月晉人急攻邢州帝遣捉生都將張温率步騎五百人入于邢州至内黄温率衆降于晉人秋七月甲寅朔晉王自太原至魏州節度使張筠棄城奔京師邢州節度使閻寳以城降于晉王壬戌以淮南鎭東等軍節度使充淮南宣潤等道西面行營都統開府儀同三司尚父守尚書令吳越王錢鏐為諸道兵馬元帥餘如故以左僕射楊涉為太子太傅致仕八月丁酉以開府儀同三司太子太保致仕趙光逢為司空兼門下侍郎平章事𢎞文館太學士延資庫使充諸道監鐡轉運使九月晋王還太原滄州節度使戴思逺棄城來奔晋人陷貝州歐陽}
  - {type: page-break, offset: 4024, content: '', id: KR2a0029_WYG_017-16b, image: WYG0277/WYG0277-0095b.png}
  - {type: page-break, offset: 4024, content: '', id: KR2a0029_WYG_017-17a, image: WYG0277/WYG0277-0095c.png}
