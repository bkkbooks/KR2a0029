  - {type: variant, offset: 4026, length: 1, content: 微, WYG: 本紀二年九月晋人克貝州守將張源徳死之又死事傳畧云太祖時源德自金兵衛將軍為蔡州刺史貞明元年魏博節度使楊師厚卒末帝分魏相等六州為兩鎮遣劉鄩將兵萬人屯于魏魏軍叛降晋源德為鄩守貝州晋王入魏諸将欲先擊貝州晋王曰貝城小而堅攻之難卒下乃先襲破德州然後以兵五千攻源德源德堅守不下晋軍塹而圍之已而劉鄩大敗于故元城南走黎陽六鎮數十州之地皆歸晋獨貝一州圍之踰年不可下源德守既堅而貝人聞晋已盡}
