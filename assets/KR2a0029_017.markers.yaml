  - {type: variant, offset: 93, length: 253, content: 校領本郡兵戍荊南帥以其凶暴欲害之遂棄本軍奔於秭歸一夕巨蛇繞其身幾至於殞乃祝曰苟有所負死生唯命逡巡蛇亦解去後據歸州招輯流亡練士伍得兵千餘人沿流以襲荊南遂據其地朝廷即以旄金戊授之永樂大典卷五千九百四十是時荊州經巨盜之後居民才一十七家汭撫輯凋殘勵精為理通商訓農勤於惠養比及末年僅及萬戶永樂大典卷一萬一千八百二十七汭性豪暴事皆意斷又好自矜伐騁辯凌人深為識者所鄙永樂大典卷二千九百九十八初澧朗二州本屬荊南乾寧中為土豪雷滿所據汭奏請割隸唐宰相徐彥若執而不行汭由是銜之及彥若出鎮南海路過江陵汭雖加延接而猶怏怏嘗因對酒語及, WYG: ''}
