  - {type: variant, offset: 3825, length: 1, content: 治, WYG: 帝曰魏博六州精兵數萬蠹害唐室百有餘年羅紹威前㳟後倨太祖每深含怒太祖尸未屬纊師厚即肆隂謀蓋以地廣兵强得肆其志不如分削使如身使臂即無不從也陛下不以此時制之寧知後之人不為楊師厚耶若分割相魏為兩鎭則朝廷無北顧之患矣帝曰善即以平盧軍節度使賀德倫為天雄軍節度使遣劉鄩率兵六萬屯河朔詔曰分疆裂土雖賞勲勞建節屯師亦從機便比者魏博一鎭廵屬六州為河朔之大藩實國家之巨鎭}
