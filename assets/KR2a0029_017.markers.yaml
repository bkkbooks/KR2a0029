  - {type: variant, offset: 1698, length: 1141, content: 擁駕西幸昭宗聞延壽有武幹遣李儼間道齎詔授延壽蔡州節度使直頵之事密遣人告于頵曰公有所欲為者願為公執鞭頵聞之頗會其志乃召進士杜荀鶴具述其意復語曰昌本朝奉盟主在斯一舉矣即遣荀鶴具述密議自間道至大梁太祖大悅遽屯兵于宿州以會其變不數月事微洩行密乃先以公牒徵延壽案新唐書行密妻延壽姊也遣辯士召延壽疑不肯赴姊遣婢報故延壽疾走揚州次悉兵攻宣城頵戎力寡薄棄壁走不能越境為行密軍所得案九國志行密別遣臺濛王茂章率步騎以往頵委舟師于汪建王壇自出廣德迎戰大為濛所敗遂率殘衆遁保宛陵壇建聞其敗因盡以舟師歸款于行密十二月頵出外州柵疾戰橋陷馬墜為外軍所殺延壽飛騎赴命邇揚州一舍行密使人殺之案五國故事云延壽既至行密處正廳潛兵以見之俄而開目曰數年不見舅今日果相覩延壽惶駭遂叱壯士執而殺之舊五代史考異案九國志行密迎至寢門使人刺殺之新唐書從九國志當得其實薛史以為邇揚州一舍而見殺五代史補又以為行密自奮鐵槌殺之疑皆屬傳聞之誤其後延壽部曲有逸境至者具言其事又云延壽之將行也其室王氏勉延壽曰今若得兵柄果成大志是吉凶繫乎時非繫於吾家也然願日致一介以寧所懷一日介不至王氏曰事可知矣乃部分家僕悉授兵器遽闔中扉而捕騎已至不得入遂集家屬阜私帑發百燎合州廨焚之既而稽首上告曰妾誓不以皎然之軀為讎者所辱乃投火而死永樂大典卷四千八百五五代史補楊行密據淮南以妻弟朱氏衆謂之朱三郎者行密署為泗州防禦使泗州素屯軍朱氏驍勇到任恃衆自負行密雖悔度力未能制但姑息之時議以謂行密事勢去矣居無何行密得目疾雖瘉且詐稱失明其出入皆以人扶策不爾則觸牆抵柱至於流血姬妾僕隸以為實然往往無禮首尾僅三年朱氏聞之信而少懈弛行密度其計必中謂妻曰吾不幸臨老兩目如此男女輩幼小苟不諱則國家為他人所有今晝夜思忖不如召泗州三舅來使管勾軍府事則吾雖死無恨妻以為然遽發使述其意而召之朱氏大喜倍道而至及入謁行密恐其覺坐于中堂以家人禮見朱氏頗有德色方設拜行密奮袖中鐵槌以擊之正中其首然猶宛轉號叫久而方斃行密內外不測即時升堂廳召將吏等謂之曰吾所以稱兩目失明者蓋為朱三此賊今已擊殺兩目無事矣諸公知之否於是軍府大駭其僕妾嘗所無禮者皆自殺初行密之在民間也嘗為合肥縣手力有過縣令將鞭之行密懼且拜會有客自外入見行密每拜則廳之前簷皆叩地而令不之覺客知其非常乃遽升廳揖令于他處告以所見令驚遂恕之且勸事郡以自奮行密度本郡不足依乃投高駢駢死秦彥孫儒等作亂行密連誅之遂有淮南之地趙匡凝案新唐書匡凝字光儀蔡州人也父德諲初事秦宗權為列校當宗權強暴時表為襄州留後唐光啟四年夏六月德諲審宗權必敗乃舉漢南之地以歸唐朝仍遣使投分于太祖兼誓戮力同討宗權時太祖為蔡州四面行營都統使乃表德諲為副仍領襄州節度使蔡州平以功累加官爵封淮安王匡凝以父功為唐州刺史兼七州馬步軍都校及德諲卒匡凝自為襄州留後朝廷即以旄鉞授之作鎮數年甚有威惠累官至, WYG: ''}
