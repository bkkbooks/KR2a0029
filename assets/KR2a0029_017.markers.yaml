  - {type: variant, offset: 1195, length: 253, content: 攻匡時城陷擒匡時以獻歐陽史采用九國志新唐書延規作匡範與九國志異尋為楊行密所敗其地亦入于淮夷永樂大典卷四百九十一五代史補鍾傳雖起于商販尤好學重士時江西士流有名第者多因傳薦四遠騰然謂之曰英明諸葛浩素有詞學嘗為泗州管驛巡官仰傳之風因擇其所行事赫赫可稱者十條列于啟事以投之十啟凡五千字皆文理典贍傳覽之驚嘆謂賓佐曰此啟事每一字可以千錢酬之遂以五千貫贈仍辟在幕下其激勸如此上藍和尚失其名居于洪州上藍院精究術數大為鍾傳所禮一旦疾篤往省之且曰老夫于和尚可謂無間矣和尚或不諱得無一言相付耶上藍強起索筆作偈以授其末云但看來年二, WYG: 開府儀同}
