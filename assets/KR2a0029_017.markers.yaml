  - {type: variant, offset: 4005, length: 0, content: '', krp: 令廣德靖王全昱卒以浙江東道營田副使檢校太傅前常州刺史杜建徽􅔨領涇州節度使二月丙申右僕射門下侍郎平章事諸道鹽鐵轉運等使楊涉罷相守左僕射涉累上章以疾辭位故有是命是月命許州節度使王檀河陽節度使謝彦章汝州防禦使王彦章率師自隂地關抵晉陽急攻其壘不克而旋三月劉鄩率師與晉王大戰于故元城鄩軍敗績先是鄩駐于莘帝以河朔危急師老于外餉饋不充遣使賜鄩詔㣲有責讓鄩奏以寇勢方盛未可輕動帝又問鄩决勝之䇿鄩奏曰但人給糧十斛盡}
  - {type: variant, offset: 4006, length: 4, content: 云詔授朗, WYG: 破敵帝不悦復遣促戰鄩召諸將會議諸將欲戰鄩黙然一日引軍攻鎭定之營彼衆大駭上下騰亂俘斬甚衆時帝遣偏將楊延直領軍萬餘人屯澶}
  - {type: variant, offset: 4006, length: 4, content: 云詔授朗, krp: 破敵帝不悦復遣促戰鄩召諸將會議諸將欲戰鄩黙然一日引軍攻鎭定之營彼衆大駭上下騰亂俘斬甚衆時帝遣偏將楊延直領軍萬餘人屯澶}
  - {type: punctuation, offset: 4007, content: ：, id: KR2a0029_ZHSJ_017-bkkpn877}
  - {type: variant, offset: 4011, length: 6, content: 兵馬留後俄進, WYG: 以應鄩既而晉王詐言歸太原劉鄩以為信是月召楊延直會于魏城下鄩自莘率軍亦至與延直㑹既而晉王自貝州至鄩引軍漸退至故元城西與晋人决戰大為其所敗追襲至河上軍士赴水死者甚衆鄩自黎陽濟河奔滑州已已制以鄩為滑州宣義軍節度副大使知節度事晉人攻衛州䧟之又䧟惠州夏四月乙酉朔威}
  - {type: page-break, offset: 4011, content: '', id: KR2a0029_WYG_017-16a, image: WYG0277/WYG0277-0095a.png}
  - {type: variant, offset: 4011, length: 6, content: 兵馬留後俄進, krp: 以應鄩既而晉王詐言歸太原劉鄩以為信是月召楊延直會于魏城下鄩自莘率軍亦至與延直㑹既而晉王自貝州至鄩引軍漸退至故元城西與晋人决戰大為其所敗追襲至河上軍士赴水死者甚衆鄩自黎陽濟河奔滑州已已制以鄩為滑州宣義軍節度副大使知節度事晉人攻衛州䧟之又䧟惠州夏四月乙酉朔威}
