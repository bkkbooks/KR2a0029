  - {type: variant, offset: 3818, length: 0, content: '', WYG: 四年春正月壬寅以青州節度使張萬進為兖州節度使檢校太尉二月甲戌以感化軍節度使華商等州觀察使檢校太傅同平章事太原郡開國公康懐英為大安尹充永平軍節度使大安金棣等州觀察處置使夏四月丁丑以守司空平章事于兢為工部侍郎尋貶萊州司馬以其挾私與軍校遷改故也是日以行營左先鋒馬軍使濮州刺史王彦章為澶州刺史充行營先鋒步軍都指揮使加光禄大夫檢校太保封開國伯以永平軍節度使檢校太傅同平章事劉鄩為開封尹遥領鎭南軍節度使五月癸丑朔方軍留後檢校司徒韓洙起復授朔方軍節度使檢校太保秋七月晉王率師自黄澤嶺東下冦邢洺魏博節度使楊師厚軍于漳水之東晉將曹進金來奔晉軍遂退九月徐州節度使王殷反時朝廷以福王友璋鎭徐方殷不受代乃下詔削奪殷在身官爵仍令却還本姓蔣便委友璋及天平軍節度使牛存節開封尹劉鄩等進軍攻討是時蔣殷求救于淮南楊溥遣大將軍瑾率衆來援存節等逆擊敗之貞明元年春牛存節劉鄩㧞徐州逆賊蔣殷舉族自燔而死于火中得其屍梟首以獻詔福王友璋赴鎭閏二月甲午延州節度使太原西面招討應接使檢校太師兼中書令渤海郡王髙萬興進封渤海王三月辛酉朔以天平軍節度副大使知節度事兼淮南西北面行營招討應接等使檢校太傅同平章事牛存節為檢校太尉加食邑一千戸賞平徐之功也丁卯以右僕射兼門下侍郎同平章事監修國史判度支趙光逢為太子太保致仕魏博節度使楊師厚薨輟視朝三日}
