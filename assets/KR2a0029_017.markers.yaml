  - {type: variant, offset: 4005, length: 0, content: '', WYG: 令廣德靖王全昱卒以浙江東道營田副使檢校太傅前常州刺史杜建徽􅔨領涇州節度使二月丙申右僕射門下侍郎平章事諸道鹽鐵轉運等使楊涉罷相守左僕射涉累上章以疾辭位故有是命是月命許州節度使王檀河陽節度使謝彦章汝州防禦使王彦章率師自隂地關抵晉陽急攻其壘不克而旋三月劉鄩率師與晉王大戰于故元城鄩軍敗績先是鄩駐于莘帝以河朔危急師老于外餉饋不充遣使賜鄩詔㣲有責讓鄩奏以寇勢方盛未可輕動帝又問鄩决勝之䇿鄩奏曰但人給糧十斛盡}
