  - {type: variant, offset: 3809, length: 1, content: 卒, WYG: 癸未以西京内外諸軍馬步軍都指揮使檢校司徒左龍虎統軍濮陽郡開國侯袁象先為特進檢校太保同平章事充鎭南軍節度江南西道觀察處置等使開封尹判在京馬步諸軍事進討開國公増食邑一千戸丁酉宣義軍節度副大使知節度事鄭滑濮等州觀察使檢校太傅長沙郡開國公羅周翰加特進駙馬都尉五月乙已天雄軍節度使楊師厚及劉守竒率魏博邢洺徐兖鄆滑之衆十萬討鎭州庚戌營}
