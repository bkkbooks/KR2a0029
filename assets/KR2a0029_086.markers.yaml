  - {type: variant, offset: 832, length: 573, content: 垂之命忽蒙更生之恩省罪責躬九死未報今遣孫男延煦延寶奉表請罪陳謝以聞又帝紀云會同十一年正月朔出帝太后迎遼帝于封丘門外帝辭不見館於封禪寺遣其將崔廷勳以兵守之是時雨雪連旬外無供億上下凍餒太后使人謂寺僧曰吾嘗於此飯僧數萬今日豈不相憫耶僧辭以遼帝之意難測不敢獻食少帝陰祈守者乃稍得食遼降少帝為光祿大夫檢校太尉封負義侯遷于黃龍府即慕容氏和龍城也帝使人謂太后曰吾聞爾子重貴不從母教而至於此可求自便勿與俱行太后答曰重貴事妾謹慎所失者違先君之志絕兩國之歡然重貴此去幸蒙大惠全身保家母不隨子欲何所歸于是太后與馮后皇弟重睿子延煦延寶舉族從晉侯而北天祿元年四月帝至遼陽晉侯白衣紗帽與太后皇后上謁于帳中五月帝上陘取晉侯所從宦者十五人東西班十五人及皇子延煦而去八月帝下陘太后自馳至霸州謁帝求于漢兒城側賜地耕牧以為生許之帝以太后自行十餘日遣與延煦俱還遼陽二年徙晉侯太后于建州三年秋八月晉李太后病無醫藥仰天號泣戟手罵杜重威李守貞曰吾死不置汝病亟謂晉侯曰吾死焚其骨送范陽佛寺無使吾為邊地鬼也太妃安氏案文獻通考云安太妃代北人不知其世家生出帝帝立尊為皇太妃契丹國志云天祿二年春二月徙晉侯太后于建州中途安太妃卒遺命晉侯曰焚骨為灰南向颺之庶幾遺魂得返中國也少帝皇后張氏案五代會要云天福八年十月追冊考薛史少帝紀云追冊故妃張氏為皇后張從訓傳亦云高祖鎮太原為少帝娶從訓長女為妃是薛史當有張皇后傳, WYG: 亥}
