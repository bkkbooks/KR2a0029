  - {type: variant, offset: 1716, length: 339, content: 月二日勅前左御正齊國夫人吳氏進封燕國夫人書省魏國夫人崔氏進封梁國夫人前右御正天水郡夫人趙氏封衞國夫人司簿孟氏封汧國夫人前司簿李氏封隴西郡夫人弟子院使齊氏大使郭氏副使賈氏並封本縣君太后宮尚宮陳留郡夫人何氏進封鄭國夫人河南郡夫人元氏進封齊國夫人知客出使夫人石氏封武威郡夫人春宮姚氏常氏焦氏王氏陶氏魏氏趙氏七人並超封郡夫人寶省婉美趙氏封天水郡夫人武氏以下十一人並授春宮天福八年十一月勅清河郡夫人張氏彭城郡夫人劉氏並充太后宮司寶南陽郡夫人路氏出使夫人趙氏白氏並充皇后宮司賓開運二年八月勅又按薛史不載外戚傳據五代會要云晉高祖長女長安公主降楊承祚天福二年五月封至六年五月卒追封秦國公主至七年九月又追封梁國長公主從長女高平縣主第二女新平縣主第三女千乘縣主孫女永慶縣主並天福七年五月封今附識于此, WYG: 攷證}
