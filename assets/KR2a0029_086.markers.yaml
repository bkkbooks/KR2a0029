  - {type: variant, offset: 214, length: 617, content: 封永寧公主長興四年九月進封魏國公主清泰二年九月改封晉國長公主至天福六年十一月尊為皇后七年六月尊為皇太后開運四年三月與少帝同遷于契丹之黃龍府漢乾祐三年八月二十五日崩於蕃中之建丘文獻通考云天福二年有司請立皇后帝以宗廟未立謙抑未遑帝崩出帝即位乃尊為皇太后契丹國志載晉出帝降表云孫男臣重貴言頃者唐運告終中原失柄數窮否極天陷地傾先人有田一成有衆一旅兵連禍結力屈勢孤翁皇帝救難摧鋒興利除害躬擐甲冑深入寇場犯露蒙霜度鴈門之險馳風掣電行中冀之誅黃金戊一麾天下大定勢凌宇宙義感神明功成不居遂興晉祚則翁皇帝大有造于石氏也旋屬天降鞠凶先君即世臣仰承遺旨得紹前基諒闇之初荒迷失次凡有軍國重事皆委將相大臣至於擅繼宗祧即非稟命輕發文字輒敢抗尊自起釁端果貽赫怒禍至神惑運盡天亡十萬兵徒望風束手億兆黎庶延頸歸心臣負義包羞貪生忍恥自貽顛覆上累祖宗偷度晨昏苟存視息翁皇帝若惠顧疇昔稍霽雷霆未賜顯誅不絕先祀則百口荷更生之德一門銜罔報之恩雖所願焉非敢望也臣與太后妻馮氏於郊野面縛俟命皇太后降表云晉室皇太后媳婦李氏妾言張彥澤傅住兒等至伏蒙皇帝阿翁降書安撫者妾伏念先皇帝頃在幷汾適逢屯難危同累卵急若倒懸智勇俱窮朝夕不保皇帝阿翁發自冀北親抵河東跋履山川踰越險阻立平巨孽遂定中原救石氏之覆亡立晉朝之社稷不幸先帝厭代嗣子承祧不能繼好息民而反虧恩辜義兵戈屢動駟馬難追戚實自貽咎將誰執今穹旻震怒中外攜離上將牽羊六師解甲妾舉宗負釁視景偷生惶惑之中撫問斯至明宣恩旨曲賜含容慰諭丁寧神爽飛越豈謂, WYG: ''}
