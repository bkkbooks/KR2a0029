  - {type: variant, offset: 2857, length: 309, content: 改扶天啟運中正功臣尋降詔促帝赴任帝心疑之乃召僚佐議曰孤再受太原之日主上面宣云與卿北門一生無議除改今忽降此命莫是以去年忻州亂兵見迫忻州原本作沂州今據通鑑改正影庫本粘籤過相猜乎又今年千春節公主入覲當辭時謂公主曰爾歸心甚急欲與石郎反耶此疑我之狀固且明矣今天子用后族委邪臣沈湎荒惑萬機停壅失刑失賞不亡何待吾自應順中少主出奔之日覩人情大去不能扶危持顛憤憤於方寸者三年矣今我無異志朝廷自啟禍機不可安然死於道路況太原險固之地積粟甚多若且寬我我當奉之必若加兵我則外告鄰方北搆強敵興亡之數皎皎在天今欲發表稱疾以俟其意諸公以為何如案玉堂閒話云晉祖在幷部嘗從容謂賓佐云近因晝寢忽夢若頃年在洛京時與天子連鑣于路過舊第天子請某入其第某遜讓者數四, WYG: ''}
