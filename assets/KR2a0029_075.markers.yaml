  - {type: variant, offset: 469, length: 0, content: '', WYG: 道務安夷夏貴洽雍熙契丹王世預歡盟禮交聘問遽聞凶訃倍軫悲懷可輟今月十九日朝參丙午以巂州山後兩林百蠻都鬼主李卑晩為寧逺將軍大渡河山前卬川六姓都鬼主懷安郡王勿鄧摽莎為定逺將軍丁未幽州奏盧文進所率降户孳畜人口在平州西首尾約七十里庚戌以吏部侍郎盧文紀為御史中丞時御史大夫李琪三上表求解任故也以兵部侍郎劉岳為吏部侍郎以户部侍郎充端明殿學士馮道為兵部侍郎以中書舎人充端明殿學士趙鳯為户部侍郎竝依前充職壬子静江軍節度使桂州管内觀察使檢校太師兼中書令扶風郡王馬賓加食邑實封澧朗觀察使檢校太𫝊兼侍中馬希振加檢校太尉盧文進至幽州遣軍吏奉表來上十一月戊午以滄州畱後王景勘為邢州節度使青州奏得登州狀申契丹先攻逼渤海國自按巴堅身死雖已抽退尚畱兵馬在渤海扶餘城今渤海王弟}
