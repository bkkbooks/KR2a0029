  - {type: variant, offset: 3235, length: 2457, content: 考異掌書記桑維翰都押衙劉知遠贊成密計遂拒末帝之命朝廷以帝不奉詔降旨削奪官爵即詔晉州刺史北面副招討使張敬達領兵圍帝於晉陽張敬達原本作敬遠今從歐陽史改正影庫本粘籤帝尋命桑維翰詣諸道求援契丹遣人復書諾之約以中秋赴義案遼史太宗紀云七月丙申唐河東節度使石敬瑭為其主所討遣趙瑩求救時趙德鈞亦遣使至河東復遣桑維翰來告急遂許興師八月庚午自將以援敬瑭舊五代史考異六月北面招收指揮使安重榮以部曲數千人入城七月代州屯將安元信率一軍與西北面先鋒指揮使安審信引五百騎俱至八月懷州彰德軍使張萬迪等各率千餘騎來降是月外衆攻我甚急帝親當矢石人心雖固廩食漸困九月辛丑契丹主率衆自雁門而南案遼史九月丁酉入雁門戊戌次忻州己亥次太原舊五代史考異旌騎不絕五十里餘先使人報帝云吾欲今日便破賊可乎帝使人馳告曰皇帝赴難比要成功賊勢至厚可明旦穩審議戰未為晚也使未達契丹已與南軍騎將高行周符彥卿等合戰時張敬達楊光遠列陣西山下士未及成伍而行周彥卿為伏兵所斷捨軍而退敬達等步兵大敗死者萬人是夜帝出北門與戎王相見戎王執帝手曰恨會面之晚因論父子之義案遼史敬瑭率官屬來見帝執手撫慰之契丹國志云敬瑭見契丹帝問曰皇帝遠來士馬疲倦遽與唐大戰而勝何也帝曰始我謂唐必斷雁門諸路伏兵險要不可得進使人偵視皆無之是以長驅而深入我氣方銳乘此擊之是以勝之敬瑭歎服舊五代史考異明日帝與契丹圍敬達營寨南軍不復出矣帝與契丹本無結好自末帝見迫之後遣心腹何福以刀錯為信刀錯原本作刀錫今從冊府元龜改正影庫本粘籤一言親赴其難迅若流電信天意耶己酉唐末帝率親軍步騎三萬出次河橋辛亥末帝詔樞密使趙延壽分衆二萬為北面招討使又詔魏博節度使范延光統本軍二萬人屯遼州十月幽州節度使趙德鈞領所部萬餘人自上黨吳兒谷合延壽兵屯團谷口與敬達寨相去百里彌月竟不能相通案遼史初圍晉安分遣精兵守其要害以絕援兵之路趙延壽等皆逗留不進十一月戎王會帝於營謂帝曰我三千里赴義事須必成觀爾體貌恢廓識量深遠真國主也天命有屬時不可失欲徇蕃漢羣議冊爾為天子帝飾讓久之既而諸軍勸請相繼乃命築壇於晉陽城南案通鑑作築壇于柳林遼史亦作設壇晉陽舊五代史考異冊立為大晉皇帝戎王自解衣冠授焉案遼史太宗紀十一年冬十月甲子封敬瑭為晉王十一月丁酉冊敬瑭為大晉皇帝薛史及通鑑歐陽史俱不載先封晉王事案遼史十月甲子封敬瑭為晉王幸其府敬瑭與妻李氏率其親屬捧觴上壽考通鑑及契丹國志俱不載先封晉王孔本文曰維天顯九年歲次丙申十一月丙戌朔十二日丁酉大契丹皇帝若曰於戲元氣肇開樹之以君天命不恆人輔以德故商政衰而周道盛秦德亂而漢圖昌人事天心古今靡異咨爾子晉王神鍾睿哲天贊英雄叶夢日以儲祥應澄河而啟運迨事數帝歷試諸艱武略文經迺由天縱忠規孝節固自生知猥以眇躬奄有北土暨明宗之享國也與我先哲王保奉明契所期子孫順承患難相濟丹書未泯白日難欺顧予纂承匪敢失墜爾惟近戚實系本枝所以余視爾若子爾待予猶父也朕昨以獨夫從珂本非公族竊據寶圖棄義忘恩逆天暴物誅剪骨肉離間忠良聽任矯諛威虐黎獻華夷震悚內外崩離知爾無辜為彼致害敢徵衆旅來逼嚴城雖併吞之志甚堅而幽顯之情何負達於聞聽深激憤驚乃命興師為爾除患親提萬旅遠殄羣凶但赴急難罔辭艱險果見神祇助順卿士叶謀旗一麾而棄甲平山鼓三作而殭屍徧野雖以遂予本志快彼羣心將期稅駕金河班師玉塞矧今中原無主四海未寧茫茫生民若墜塗炭況萬幾不可以暫廢大寶不可以久虛拯溺救焚當在此日爾有庇民之德格于上下爾有戡難之勳戡難原本作甚艱今從契丹國志改正影庫本粘籤光于區宇爾有無私之行通乎神明爾有不言之信彰乎兆庶予懋乃德嘉乃丕績天之曆數在爾躬是用命爾當踐皇極仍以爾自茲幷土首建義旂宜以國號曰晉朕永與為父子之邦保山河之誓於戲補百王之闕禮行茲盛典成千載之大義遂我初心爾其永保兆民勉持一德慎乃有位允執厥中亦惟無疆之休其誡之哉禮畢帝鼓吹導從而歸案通鑑考異引廢帝實錄契丹立晉在閏月丁卯歐陽史及通鑑幷從薛史作十一月丁酉始梁開國之歲即前唐天祐四年也潞州行營使李思安奏壺關縣庶穰鄉鄉人伐樹樹倒自分兩片內有六字如左書云天十四載石進梁祖令藏於武庫然莫詳其義至帝即位識者曰天字取四字中兩畫加之於傍則丙字也四字去中之兩畫案原本作中去之兩畫今從冊府元龜改正加十字則申字也帝即位之年乃丙申也又易云晉者進也國號大晉皆符契焉又帝即位之前一年年在乙未鄴西有柵曰李固清淇合流在其側柵有橋橋下大鼠與蛇鬬鬬及日之申蛇不勝而死行人觀者數百識者志之後唐末帝果滅於申又末帝真定常山人也有先人舊廬其側有古佛剎剎有石像忽搖動不已人皆異之及重圍晉陽帝遣心腹案原本闕帝遣心腹四字今從冊府元龜增入何福徑騎求援北蕃蕃主自將諸部赴之不以繒帛不以珠金若響應聲謂福曰吾已兆於夢皆上帝命我非我意也案契丹國志引紀異錄云契丹主德光常晝寢夢一神人花冠美姿容輜軿甚盛忽自天而下衣白衣佩金帶執有異人十二隨其後內一黑兔入德光懷而失之神人語德光曰石郎使人喚汝汝須去覺告其母母忽之不以為異後復夢即前神人也衣冠儀貌儼然如故曰石郎已使人來喚汝既覺而驚復以告母母曰可命筮乃召巫筮言太祖從西樓來言中國將立天王要爾為助爾須去未浹旬唐石敬瑭反於河東為後唐張敬達所敗亟遣趙瑩持表重賂許割燕雲求兵為援契丹主曰我非為石郎興師乃奉天帝敕使也舊五代史考異時援兵未至偽將張敬達引軍逼城設柵柵將成必有大風暴雨柵無以立後築長城城就又為水潦所壞城終不能合晉陽有北宮宮城之上有祠曰毗沙門天王帝曾焚修默而禱之經數日城西北闉正受敵處軍候報稱夜來有一人長丈餘介金執殳行於城上久方不見帝心異之又牙城有僧坊曰崇福崇福原本作從福今從冊府元龜改正影庫本粘籤坊之廡下西北隅有泥神神之首忽一日有煙生其騰郁如曲突之狀坊僧奔赴以為人火所延及俯而視之無所有焉事尋達帝帝召僧之臘高者問焉僧曰貧道見莊宗將得天下曾有此煙觀此噴湧甚於當時兆可知矣自此日旁多有五色雲氣如蓮芰之狀帝召占者視之謂曰此驗應誰占者曰見處為瑞更應何人又帝每詰旦使慰撫守陴者率以為常忽一夕已暝城上有號令之聲聲不絕者三帝使人問之將吏云從上傳來者皆知神助時城中復有數家井泉暴溢不止及蕃軍大至合勢破之末帝之衆似拉朽焉斯天運使然非人力也是日帝言於戎王願以鴈門已北及幽州之地為戎王壽仍約歲輸帛, WYG: 巻}
