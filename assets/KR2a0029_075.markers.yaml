  - {type: variant, offset: 2398, length: 379, content: 士懇訴無以自明帝謂鞫吏曰兩訟未分何以為斷可殺馬刳腸而視其粟有則軍士誅無則婦人死遂殺馬馬腸無粟因戮其婦人境內肅然莫敢以欺事言者三月移鎮常山移鎮原本作以鎮今據文改正影庫本粘籤所歷方鎮以孝治為急見民間父母在昆弟分索者必繩而殺之勤於吏事廷無滯訟常山屬邑曰九門有人鬻地與異居兄議價不定乃移於他人他人須兄立券兄固抑之因訴於令令以弟兄俱不義送府帝監之曰人之不義由牧長新至教化所未能及吾甚愧焉若以至理言之兄利良田弟求善價順之則是沮之則非其兄不義之甚也宜重笞焉市田以高價者取之上下服其明及岐陽兵亂岐陽原本作伎陽今從通鑑改正影庫本粘籤推潞王為天子閔帝急詔帝赴闕欲以社稷為託閔帝自洛陽出奔於衞相遇於途遂與閔帝迴入衞州時閔帝左右將不利於帝帝覺之因擒其從騎百餘人閔帝知事不濟與帝長慟而別帝遣刺史王弘贄安置閔帝於公舍而去尋為潞王所害帝後長以此愧心焉清泰元年五月復授太原節度使北京留守充大, WYG: 巡}
