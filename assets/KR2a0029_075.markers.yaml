  - {type: variant, offset: 7, length: 4, content: 五晉書一, WYG: 三明宗紀三天成元年秋八月乙酉朔日有食之有司上言莊宗廟室酌獻請奏武成之舞從之鄆州節度使霍彦威移鎭青州丁亥莊宗神主祔廟有司請祧懿祖室從之詔陵州合州長流百姓豆盧革韋説等可竝自長流後縱逢恩赦不在原宥之限豆盧昇韋濤仍削除自前所受官秩壬辰以乆雨放百僚朝參詔天下疏理繫囚甲午汴州奏舊管曹州乞卻歸當道從之是日詔曰承前使府奏請判官率皆隨府除移停罷近年流例有異前規使府雖已除移判官元安舊職起今後若是朝廷除授者即不計使府除移如是使府奏請即皆隨府移罷舊例藩候帶平章事者所奏請判官殿中已上許奏緋中丞已上許奏紫今不帶平章事亦許同帶平章事例處分如防禦團練使奏請判官員外郎已下不在奏緋之限其所奏判官州縣官並須將厯任告身隨奏至京如未有官假稱試攝亦奏狀内分明署出如藩鎭畱後權知軍州事並不在奏請判官之限如刺史要奏州縣官須申本道請發表章不得自奏近日州使奏請從事本無官緒妄結虚銜不計職位}
  - {type: page-break, offset: 7, content: '', id: KR2a0029_WYG_075-1b, image: WYG0277/WYG0277-0328d.png}
  - {type: page-break, offset: 7, content: '', id: KR2a0029_WYG_075-2a, image: WYG0277/WYG0277-0329a.png}
