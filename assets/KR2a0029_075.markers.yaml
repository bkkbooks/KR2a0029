  - {type: variant, offset: 177, length: 0, content: '', WYG: 為亂軍所刧習即罷歸希望遣兵邀之習懼而還至滑州帝遣人招之習至乃從帝入汴希望聞魏軍亂遣兵圍守習家欲盡殺之公儼素受希望奬愛謂希望曰内侍宜分腹心之兵監四面守陴者則誰敢異圖希望從之公儼乘其無備圍希望之第擒而殺之公儼遂與州將李謹等謀㨿州城以邀符節即令軍府飛章畱已兼揚言符習在鎭人不便其政帝乃除公儼為登州刺史公儼不時赴任即以霍彥威代符習聚兵淄州以圖進取彥威至淄州㑹詔使至青州告諭公儼即赴所任彥威懲其初心遣人擒公儼于北海縣與同黨斬于州東有司上言莊宗祔}
