  - {type: variant, offset: 1229, length: 353, content: 四年二月趙在禮據鄴為亂朝廷遣元行欽招之不下招之原本作詔之今據冊府元龜改正影庫本粘籤羣議紛然以為非明宗不可莊宗乃以明宗為統帥時帝從行至魏諸軍有變叩馬請明宗帝河北明宗受霍彥威勸將自訴於天子遂佯諾諸軍亦恐事不果而散者甚衆明宗所全者唯常山一軍而已西次魏縣帝密言於明宗曰猶豫者兵家大忌必若求訴宜決其行某願率三百騎先趨汴水以探虎口如遂其志請大軍速進夷門者天下之要害也據之可以自雪安有上將與三軍言變他日有平手乎危在頃刻不宜恬然明宗至相州遂分驍騎三百付之遣帝由黎陽濟河自汴西門而入因據其城及明宗入汴莊宗親統師亦至城之西北五里登高歎曰吾不濟矣由此莊宗從兵大潰來歸明宗明宗尋遣帝令率兵為前鋒趨汜水關汜水原本作汎水今從通鑑改正影庫本粘籤俄而莊宗遇內難而崩是月明宗入洛嘉帝之功自總管府都校署陝府兵馬留後明宗即位改元天成五月加帝光祿, WYG: 禄}
