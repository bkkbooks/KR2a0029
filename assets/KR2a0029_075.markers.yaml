  - {type: variant, offset: 1025, length: 194, content: 睹其敵銳拔劍闢道肩護明宗而退敵人望之無敢襲者二十年十月從明宗觀梁人之楊村寨部曲皆不擐甲俄而敵出不意以兵掩明宗刃將及背帝挾戰戟而進一擊而凶酋落馬者數輩明宗遂解其難是歲莊宗即位於鄴改元同光遣明宗越河懸軍深入以取鄆鄆人始不之覺帝以五十騎從明宗涉濟突東門而入鄆兵來拒帝中刃翼明宗羅兵通衢嶷然不動會後騎繼至遂拔中城以據之既而平汴水滅梁室成莊宗一統集明宗大勳帝與唐末帝功居最莊宗朝官未顯者以帝不好矜伐, WYG: 狩于近郊臘}
