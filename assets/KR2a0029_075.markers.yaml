  - {type: variant, offset: 731, length: 193, content: 左軍雜以燕人前鋒不利德威死之莊宗率步衆五千固守高陵以避敵之銳明宗獨完右廣右廣原本作右黃據冊府元龜作右廣薛史莊宗紀亦作廣今改正影庫本粘籤伏於土山之下顧謂帝曰梁人首獲其利旌旂甚整何計可以挫之帝曰臘後寒如此出手墮指彼多步衆易進難退莫若啜糒飲水徐而困之且超乘徒行其勢不等一擊而破期在必勝明宗曰是吾心也會日暮梁軍列於平野五六萬人為一方陣麾游騎以迫唐軍帝曰敵將遁矣乃請明宗令士整冑寬而羅之命左射軍三, WYG: 吏四}
