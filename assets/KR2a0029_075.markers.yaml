  - {type: variant, offset: 1979, length: 208, content: 時秦王從榮奏伏見北面頻奏報契丹族移帳近塞吐渾突厥已侵邊地戍兵雖多未有統帥早宜命大將一人以安雲朔明宗曰卿等商量從榮與諸大臣奏曰將校之中唯石敬瑭康義誠二人可行帝素不欲為禁軍之副即奏曰臣願北行明宗曰卿為吾行事無不濟及受詔不落六軍副使帝復遷延辭避十一月乙酉明宗復謂侍臣曰雲州奏契丹自幽州移帳言就放牧終冬不退甚患深矣樞密使范延光奏曰已議石敬瑭與康義誠北行然其定奪即在宸旨帝奏曰臣雖不才爭敢避事但進退惟命明宗曰卿為吾行甚叶衆議由, WYG: 死亡皆}
