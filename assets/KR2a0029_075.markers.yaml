  - {type: variant, offset: 461, length: 7, content: 宗從莊宗征行命, WYG: 殿對之百僚稱賀庚寅以客省使李嚴領泗州防禦使以河中節度副使李鏻為太子賓客壬辰邠州節度使毛璋移鎭潞州巴州進嘉禾合穗甲午以前隰州刺史袁建豐遙領洪州節度使庚子幽州奏契丹平州守將偽署幽州節度使盧文進率戸口歸順百僚稱賀辛丑契丹遣使來告哀言國王按巴堅以今年七月二十七日卒詔曰朕近纘皇圖㳟修}
