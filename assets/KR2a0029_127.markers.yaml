  - {type: variant, offset: 99, length: 0, content: '', krp: 同乃以判官韋震為河南尹遂移全義為天平軍節度使守中書令東平王洛陽縉紳舊聞記齊王與梁祖互為中書令尚書令及梁祖兼四鎮齊王累表讓兼鎮葢潛識梁祖奸雄避其權位欲圖自全之計梁祖經營霸業外則干戈屢動内則帑庾多虛齊王悉心盡力傾竭財資助之其年八月昭宗遇弑輝王即位十月復以全義為河南尹兼忠武軍節度使判六軍諸衞事梁祖建號以全義兼河陽節度使封魏王開平二年冊拜太保兼陜虢節度使河陽尹四年冊拜太傅河南尹判六軍兼鄭滑等州節度使乾化元年冊拜太師二年朱友珪簒逆以全義為守太尉河南尹宋亳節度使兼國計使梁末帝嗣位於汴以全義為洛京留守兼鎮河陽未㡬授天下兵馬副元帥梁帝季年趙張用事段凝為北面詔討使驟居諸将之右全義知其不可遣使啟梁末帝曰老臣受先朝重顧䝉陛下委以副元帥之名臣雖遲暮尚可董軍請付北面兵柄庶分宵旰段凝晚進徳未服人恐人情不和敗亂國政不聽全義托朱氏垂三十年梁祖末年猜忌宿将欲害全義者數四全義單身曲事悉以家財貢奉洎梁祖河朔喪師之後月獻鎧馬以補其軍又以服勤盡瘁無以加諸故竟免於禍全義妻儲氏明敏有才略梁祖自柏鄉失律後連年親征河朔心疑全義或左右讒間儲氏每入宫委曲伸理有時怒不可測急召全義儲氏謁見梁祖厲聲言曰宗奭種田叟耳三十餘年洛城四面開荒斸棘招聚軍賦資陛下創業今年齒衰朽指景待盡而大家疑之何也梁祖遽笑而謂曰我無惡心嫗勿多言洛陽縉紳舊聞記梁祖猜忌王慮為後患前後欲殺之者數四夫女人儲氏面請梁祖得免梁祖遂以其子福王納齊王之莊宗平梁全義自洛赴覲泥首待罪莊宗撫慰久之以其年老令人掖而昇殿宴賜盡歡詔皇子繼岌皇弟存紀等皆兄事之先是天祐十五年梁末帝自汴趋洛将祀於圜丘時王師攻下楊劉狥地曹濮梁末帝懼急歸于汴其禮不遂然其法物咸在至是全義乃奏曰請陛下便幸洛陽臣已有郊禮之備翼日制以全義復為尚書令魏王河南尹明年二月郊禋禮畢以全義為守太尉中書令河南尹改封齊王兼領河陽先是朱梁時供御所費皆出河南府其後孔謙侵削其權中官各領内司使務或豪奪其田園居第全義乃悉録進納四年落河南尹授忠武軍節度使檢校太師尚書令㑹趙在禮據魏州都軍進討無功時明宗已為羣小間諜端居私第全義以卧疾聞變憂懼不食薨于洛陽私第時年七十五天成初冊贈太師諡曰忠肅全義歴守太師太傅太尉中書令封王邑萬三千戸凡領方鎮洛鄆陜滑宋三莅河陽再領許州内外官歴二十九任尹正河洛凡四十年位極人臣善保終吉者蓋一人而已全義樸厚大度敦本務實起戰士而忘功名尊儒業而樂善道家非士族而奨愛衣冠開幕府辟士必求望實屬邑補奏不任吏人位極公王不衣羅綺心奉釋老而不溺左道如數者人以為難自莊宗至洛陽趋向者皆由徑以希恩寵全義不改素履盡誠而已言事者以梁祖為我世讎宜斵棺燔柩全義獨上章申理議者嘉之劉皇后嘗従莊宗幸其第奏云妾孩幼遇亂失父母欲拜全義為義父許之全義稽首奏曰皇后為國之母儀古今未有此事臣無地自處莊宗敦逼再三不獲已乃受劉后之拜既非所願君子不以為非然全義少長軍中立性樸滯凡百姓有詞訟以先訴者為得理以是人多枉濫為時所非又嘗怒河南縣令羅貫因憑劉后譖于莊宗俾貫非罪而死露屍于府門寃枉之聲聞于逺近斯亦良玉之微瑕也五代史闕文梁乾化元年七月辛丑梁祖幸全義私第甲辰歸大内梁史稱上不豫厭秋暑幸宗奭私第數日宰臣視事于仁政亭崇政諸司並止于河南府廨署世傳梁祖亂全義之家婦女悉皆進御其子繼祚不勝橨恥欲剚刃于梁祖全義止之曰吾頃在河南遭李罕之之難引太原軍圍閉經年啗木屑以度朝夕死在頃刻得他救援以至今日此恩不可負也其子乃止梁史云云者諱國惡也臣謹按春秋莊二年經曰十有二月夫人姜氏㑹齊侯于禚傳曰書姦也夫經言㑹者諱惡禮也𫝊書姦者暴其罪以垂誡也又莊二十二年𫝊書陳完飲桓公酒公曰以火繼之辭曰臣卜其晝未卜其夜豈有天子幸人臣之家留止數日姦亂萌矣況全義本出巢賊敗依河陽節度使諸葛爽爽用為澤州刺史及爽死全義事其子仲方即與李罕之同逐仲方罕之帥河陽全義為河南尹未㡬又逐罕之自據河陽其翻覆也如此自是托迹朱梁斵喪唐室惟勤課勸其實斂民附賊以固恩寵梁時月進鎧馬以補軍實及梁祖為友珪所弑首進錢一百萬以助山陵莊宗平中原全義合與敬翔李振等族誅㐅通賂于劉皇后乘莊宗幸洛言臣己有郊天費用夫全義匹夫也豈能自殖財賦其剥下奉上也又如此晚年保證明宗欲為子孫之福師方渡河鄴都兵亂全義憂恨不食終以餓死未死前其子繼業訟弟汝州防禦使繼孫莊宗貶房州司户賜自盡其制畧曰侵奪父權惑亂家事繼鳥獸之行畜梟獍之心其御家無法也又如此河南令羅貫方正文章之士事全義稍慢全義怒告劉皇后斃貫于枯木之下朝野寃之洛陽監軍使嘗收得李太尉平泉莊醒酒石全義求之監軍不與全義立殺之其附勢作威也又如此盖亂世之賊臣耳得保首領為幸巳多晉天福中其子繼祚謀反伏誅識者知餘殃在其子孫也臣讀莊宗實録見史官叙全義𫝊虚美尤甚至今負俗無識之士尚以全義為名臣故因補闕文粗論事迹云朱友謙字徳光許州人本名簡祖巖父琮世為陳許小校廣明之亂簡出鄉里事澠池鎮将柏夔為部𨽻嘗為盜于石壕三鄉之間剽刼行旅後事陜州節度使王珙積勞至軍校珙性嚴急御下無恩牙将李璠者珙深所倚愛小有違忤暴加箠擊璠隂銜之光化元年珙與弟河中節度使珂相持干戈日尋珙兵屢敗部伍離心二年六月璠殺珙歸附汴人梁祖表璠為陜州節度使璠亦苛慘軍情不叶簡復攻璠璠冐刃獲免逃歸于汴三年梁祖表簡為陜州留後九月天子授以旄鉞車駕在鳯翔梁祖徃來簡事之益謹奏授平章事天復末昭宗遷都洛陽駐蹕于陜時朝士經亂簮裳不備簡獻裳百副請給百官朝容稍備以迎奉功遷檢校侍中簡與梁祖同宗乃陳情於梁祖曰僕位崇将相比無勲勞皆元帥令公生成之造也願以微生灰粉為効乞以姓名肩隨宗室梁祖深賞其心乃名之為友謙編入屬籍待遇同於已子友謙亦盡心叶贊功烈居多梁祖建號移授河中節度使檢校太尉累拜中書令封冀王及朱友珪弑逆友謙意不懌雖勉奉偽命中懐怏怏友珪徴之友謙辭以北面侵軼謂賓友曰友珪是先帝假子敢行大逆余位列維城恩踰父子論功校徳何讓伊人詎以平生附託之恩屈身于逆竪之手遂不奉命其年八月友珪遣大将牛存節康懐英韓勍攻之友謙乞師于莊宗莊宗親總軍赴援與汴軍遇於平陽大破之歐陽史晉王出澤潞以救之追懐英于解縣大敗之追至白逕嶺夜秉炬擊之懐英又敗因與友謙㑹于猗氏友謙盛陳感慨願敦盟約莊宗歡甚友謙乘醉鼾寢于帳中莊宗熟視之謂左右曰冀王真貴人也但恨其臂短耳及梁末帝嗣位以恩禮結其心友謙亦遜辭稱藩行其正朔天祐十七年友謙襲取同州以其子令徳為帥請節鉞于梁不獲友謙即請之於莊宗令幕客王正言以節旄賜之梁将劉鄩尹皓攻同州友謙來告急莊宗遣李嗣昭李存審将兵赴之敗汴軍于滑北解圍而還初劉鄩兵至蒲中倉儲匱乏人心離貳軍民将校咸欲歸梁友謙諸子令錫等亦説其父曰晉王雖推心于我然懸兵赴援急難相應寧我負人擇福宜重請納欵于梁候劉鄩兵退後與晉王修好友謙曰晉王親赴予急夜半秉燭戰賊面為盟誓不負初心昨聞吾告難命将星行助我資糧分我衣屨而欲翻覆背恵所謂鄧祁侯云人将不食吾餘也及破梁軍加守太尉西平王同光元年莊宗滅梁友謙覲于洛陽莊宗置宴饗勞寵錫無筭親酌觴屬友謙曰成吾大業者公之力也既歸藩請割慈隰二郡依舊𨽻河中不許詔以降州𨽻之又請解縣兩地榷鹽每額輸省課許之及郊禮畢以友謙為守太師尚書令進食邑至萬八千戸三年賜姓名繼麟編入屬籍賜之鐡券恕死罪以其子令徳為遂州節度使令錫為許州節度使一門三鎮諸子為刺史者六七人将校剖竹者又五六人恩寵之盛時無與比莊宗季年稍怠庶政巷伯伶官干預國事時方面諸侯皆行賂遺或求賂于繼麟雖僶俛應奉不滿其請且曰河中土薄民貧厚貺難辦由是羣小咸怨遂加誣搆郭崇韜討巴蜀徴師於河中繼麟令其子令徳率師赴之伶官景進與其黨搆曰昨王師初起繼麟以為討已頗有拒命之意若不除移如國家有急必為後患郭崇韜既誅宦官愈盛遂搆成其罪謂莊宗曰崇韜强項于蜀盖與河中響應繼麟聞之懼将赴京師面訢其事其部将曰王有大功於國密邇京城羣小流言何足介意端居奉職讒邪自銷不可輕行繼麟曰郭公功倍於我尚為人搆陷吾若得面天顔自陳肝膈則流言者獲罪矣四年正月繼麟入覲景進謂莊宗曰河中人有告變者言繼麟與崇韜謀叛聞崇韜死又與李存乂構逆當㫁不斷禍不旋踵羣閹異口同辭莊宗駭惑不能決是月二十三日授繼麟滑州節度使是夜令朱守殷以兵圍其第擒之誅於徽安門外詔繼岌誅令徳于遂州王思同誅令錫于許州呉縝纂誤云伶官史彥瓊𫝊友謙有子建徽被殺𫝊中未載命夏魯奇誅其族于河中初魯奇至友謙妻張氏率其家屬二百餘口見魯奇曰請疏骨肉名字無致他人横死将刑張氏持先賜鐡券授魯奇曰皇帝所賜也是時百口塗地寃酷之聲行路流涕先是河中衙城閽者夜見婦人數十祇服靚粧僕馬炫耀自外馳騁笑語趋衙城閽者不知其故不敢詰至門排騎而入既而扃鎖如故復無人迹乃知妖鬼也又繼麟登逍遥樓聞哭聲四合詰日訊之巷無喪者隔嵗乃族誅及明宗即位始下詔昭雪焉}
