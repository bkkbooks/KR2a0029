  - {type: variant, offset: 97, length: 1, content: 考, WYG: 巻六十三宋門下侍郎參知政事監修國史薛居正等撰唐書第三十九列𫝊十五張全義字國維濮州臨濮人初名居言賜名全義梁祖改為宗奭莊宗定河南復名全義祖璉父誠世為田農全義為縣嗇夫嘗為令所辱乾符末黄巢起寃句全義亡命入巢軍巢入長安以全義為吏部尚書充水運使巢敗依諸葛爽于河陽累遷至禆校屢有戰功爽表為澤州刺史光啟初爽卒其子仲方為留後部将劉經與李罕之爭據洛陽罕之敗經于聖善寺乘勝欲攻河陽營于洛口經遣全義拒之全義乃與罕之同盟結義返攻經于河陽為經所敗收合餘衆與罕之據懐州乞師于武皇武皇遣澤州刺史安金俊助之進攻河陽劉經仲方委城奔汴罕之遂自領河陽表全義為河南尹全義性勤儉善撫軍民雖賊寇充斥而勸耕務農由是倉儲殷積洛陽縉紳舊聞記王始至洛于麾下百人中選可使者一十八人命之曰屯将每人給旗一口榜一道于舊十八縣中令招農戸令自耕種流民漸歸王于百人中又選可使者十八人命之曰屯副民之來者撫綏之除殺人者死餘但加杖而已無重刑無租税流民之歸漸衆王又于麾下選書計一十八人命之曰屯判官不一二年十八屯中每屯戸至數千農隙選丁夫授以弓矢鎗劍為坐作進退之法行之一二年每屯増戸大者六七千次者四千下之二三千共得丁夫閑弓矢鎗劍者二萬餘人有賊盗即時擒捕之刑寛事簡逺近歸之如市五年之内號為富庶于是奏每縣除令簿主之罕之貪暴不法軍中乏食每取給于全義二人初相得甚歡而至是求取無厭動加凌轢全義苦之文徳元年四月罕之出軍寇晉絳全義乘其無備潛兵襲取河陽全義乃兼領河陽節度洛陽縉紳舊聞記罕之鎮三城知王専以教民耕織為務常宣言于衆曰田舍翁何足憚王聞之蔑如也每飛尺書于王求軍食及縑帛王曰李太傅所要不得不奉之左右及賓席咸以為不可與王曰第與之似若畏之者左右不曉罕之謂王畏己不設備因罕之舉兵收懐澤王乃密召屯兵潛師夜發遲明入三城罕之乃逃遁投河東朝廷即授王兼鎮三城罕之求援于武皇武皇復遣兵助攻河陽㑹汴人救至而退梁祖以丁㑹守河陽全義復為河南尹檢校司空全義感梁祖援助之恩自是依附皆從其制初蔡賊孫儒諸葛奭爭據洛陽迭相攻伐七八年間都城灰燼滿目荆榛全義初至惟與部下聚居故市井邑窮民不滿百戸全義善於撫納課部人披榛種蓺且耕且戰以粟易牛嵗滋墾闢招復流㪚待之如子每農祥勸耕之始全義必自立畎畝餉以酒食政寛事簡吏不敢欺數年之間京畿無閒田編戸五六萬乃築壘於故市建置府署以防外寇洛陽縉紳舊聞記王每喜民有耕織者其家今年蠶麥善去都城一舍之内必馬足及之悉召其家老㓜親慰勞之賜以酒食茶綵丈夫遺之布袴婦人裙衫時民間尚衣青婦人皆青絹為之取其新麥新繭對之喜動顔色民間有竊言者曰大王見好聲伎等間不笑惟見好蠶麥即笑耳其真樸皆此類每觀秋稼見田中無草禾者必下馬命賓客觀之召田主慰勞之賜之衣物若見中有草地耕不熟立召田主集衆決責之若苗荒地生詰之民訴以牛疲或闕人耕鋤則田邊下馬立召其鄰仵責之曰此少人牛何不衆助之鄰仵皆伏罪即赦之自是洛陽之民無逺近民之少牛者相率助之少人者亦然田夫田婦相勸以耕桑為務是以家有蓄積水旱無饑民王誠信每水旱祈祭必具湯沐素食别寢至祠祭所儼然若對至尊容如不足遇旱祈禱未雨左右必曰王可開塔即無是塔也塔在龍門廣化寺王即依言而開塔未嘗不澍雨故當時俚諺云王禱雨買雨具梁祖迫昭宗東遷命全義繕治洛陽宫城累年方集昭宗至洛陽梁祖将圖禪代慮全義心有}
