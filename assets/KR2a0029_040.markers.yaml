  - {type: variant, offset: 1449, length: 3080, content: 品已上官及諸道進奉使請準貞元七年勅就位起居永為恆式從之五月己巳朔帝御文明殿受朝丙子以夔州節度使西方鄴卒輟朝丁丑大理卿李保殷卒己卯以忠武軍節度使索自通為京兆尹充西京留守以左威衞上將軍朱漢賓為潞州節度使乙酉以黔州節度使安崇阮為夔州節度使以左驍衞上將軍張溫為洋州節度使以黔州留後楊漢賓為本州節度使中書奏太常寺定少帝諡昭宣光烈孝皇帝廟號景宗伏以少帝今不入廟難以言宗只云昭宣光烈孝皇帝從之案舊唐書哀帝紀云中書奏少帝行事不合稱宗今考五代會要天成三年博士呂朋龜議引君不逾年不入宗廟之禮請別立廟於園陵故不稱景宗非議其行事有失也舊唐書誤丁亥以鳳州武興軍留後陳臯為武興軍節度使以新州威塞軍留後翟璋為威塞軍節度使壬辰以權知尚書右丞崔居儉為尚書右丞詔葺天下廨宇丙申襄州奏荊南高從誨乞歸順雲州奏契丹犯塞六月辛丑以左散騎常侍姚顗為兵部侍郎壬寅夔州節度使楊漢章移鎮雲州以北京馬步軍都指揮使兼欽州刺史張敬達為鳳州節度使癸卯以前西京副留守事張遵誨行衞尉事充客省使國子博士田敏請葺四郊祠祭齋室丙午以沂州刺史張萬進為安北都護充振武軍節度使戊申以宿州團練使康思立為利州節度使登州刺史孫元停任坐在任無名科率故也詔鄴都仍舊為魏府鄴都仍舊為魏府考通鑑注云莊宗同光元年即位于魏州以魏州為興唐府建東京既遷洛同光三年復唐之舊以洛陽為東都改魏州之東京為鄴都至是復以為魏州今附識于此影庫本粘籤應魏府汴州益州宮殿悉去鴟尾賜節度使為衙署辛亥以權知朔方軍留後定難軍都知兵馬使韓澄為朔方留後癸丑以前潞州節度使符彥超為左驍衞上將軍詔諸道節度使行軍司馬名位雖高或帥臣不在其州事宜委節度副使權知又詔藩郡所請賓幕及主事親從者悉以名聞丙辰案通鑑作庚申舊五代史考異權知荊南軍府事高從誨上章首罪乞修職貢仍進銀三千兩贖罪案通鑑庚申高從誨自稱前荊南行軍司馬歸州刺史上表求內附薛史作丙辰與通鑑異孔本壬戌幸至德宮詔京城空地課人蓋造如無力者許人請射營構秋七月庚午以前西京留守判官張鎛為司農卿壬申貶前左金吾上將軍毛璋為儒州長流百姓尋賜自盡以其在藩鎮陰蓄奸謀故也甲戌御史中丞呂夢奇責授太子右贊善大夫坐曾借毛璋馬故也己卯以工部侍郎任贊為左散騎常侍以樞密直學士左諫議大夫充匭使閻至為工部侍郎充職遂州進嘉禾一莖九穗壬午以給事中判大理卿事許光義為御史中丞史館上言所編修莊宗一朝事迹欲名為實錄太祖獻祖懿祖名為紀年錄紀年錄原本作繫年錄考通鑑注玉海文獻通考並作紀年錄今改正影庫本粘籤從之案五代會要天成三年十二月史館奏據左補闕張昭遠狀嘗讀國書伏見懿祖昭烈皇帝自元和之初獻祖文皇帝于太和之際立功王室陳力國朝太祖武皇帝自咸通後來勤王戮力翦平多難頻立大功三換節旄再安京國莊宗皇帝終平大憝奄有中原倘闕編修遂成湮墜伏請與當館修撰參序條綱撰太祖莊宗實錄者伏見前代史館歸于著作國初分撰五代史方委大臣監修自大曆後來始奏兩員修撰當時選任皆取良能一代之書便成于手其後源流失緒波蕩不還冒當修撰之名曷揚褒貶之職及乎編修六典即云別訪通才况當館職在編修合行撰述敕宜依四年七月監修國史趙鳳奏奉勅修懿祖獻祖太祖莊宗四帝實錄自今年六月一日起手旋具進呈伏以凡關纂述務合品題承乾御宇之君行事方云實錄追尊冊號之帝約文祗可紀年所修前件史書今欲自莊宗一朝名為實錄其太祖以上並目為紀年錄從之考當時史館能審名實如此薛史列武皇于本紀識者譏之歐陽史始改莊宗紀舊五代史考異甲申以前荊南行軍司馬檢校太傅高從誨起復授檢校太傅兼侍中充荊南節度使丙戌涇州節度使李從昶移鎮華州以冀州刺史李金全為涇州節度使戊子中書奉今後新及第舉人有曾授正官及御署者欲約前任資序與除一官從之壬辰詔取來年二月二十一日有事於南郊八月丁酉朔大理正路阮奏切見春秋釋奠於文宣王而武成王廟久曠時祭請復常祀常祀原本作嘗祈今據五代會要改正影庫本粘籤從之戊戌中書奏太子少傅李琪所撰進霍彥威神道碑文不分真偽是混功名望令改撰從之琪梁之故相私懷感遇彥威在梁歷任不欲言偽梁故也辛丑詔亂離已來天下諸軍所掠生口有主識認即勒還之以前清河縣令襲酅國公食邑三千戶楊仁矩為祕書丞御史臺奏主簿朱穎是前中丞奏請合隨廳罷任詔曰主簿既為正秩况入選門顯自朝恩合終考限宜令仍舊守官甲辰以宰臣馮道為南郊大禮使兵部尚書盧質為禮儀使御史中丞許光義為儀仗使兵部侍郎姚顗為鹵簿使河南尹從榮為橋道頓遞使客省使衞尉卿張遵誨為修裝法物使乙巳黑水朝貢使骨至來朝授歸德司戈放還蕃丁未以翰林學士承旨禮部侍郎知制誥李愚為兵部侍郎職如故以中書舍人盧詹為禮部侍郎以兵部侍郎裴為太子賓客吐渾首領念公山來朝貢戊申帝服兗冕御文明殿追冊昭宣光烈孝皇帝庚戌以宰臣監修國史趙鳳兼判集賢院事以左散騎常侍任贊判大理卿事己未高麗王王建遣使貢方物辛酉詔準往例節度使帶平章事侍中中書令並列銜於勅牒側書使字今錢鏐是元帥尚父與使相名殊馬殷守太師尚書令是南省官資不合署勅尾今後勅牒內並落下乙卯党項首領朝貢甲子幸金真觀改賜建法大師賜紫尼智願為圓惠大師即武皇夫人陳氏也丙寅達靼來朝貢京城內有南州北州乃張全義光啟中所築案洛陽縉紳舊聞記引薛史此文而辨之云言光啟中築乃再葺而已非始築也其城壕今尚有遺跡焉舊五代史考異至是詔許人依街巷請射城濠任使平填蓋造屋宇九月丁卯中書奏據宗正寺申懿祖永興陵獻祖長寧陵太祖建極陵並在代州鴈門縣長寧原本作去寧建極原本作述極今據五代會要改正影庫本粘籤皇帝追尊四廟在應州金城縣詔應州升為望州金城鴈門並升為望縣辛酉太常博士段顒奏切見大祠則差宰相行事中祠則卿監行事小祠則委太祝奉禮並不差官今後請差五品官行事從之癸巳制天下兵馬元帥尚父吳越國王錢鏐可落元帥尚父吳越國王授太師致仕責無禮也先是上將軍烏昭遇使於兩浙以朝廷事私於吳人仍目鏐為殿下自稱臣謁鏐行拜蹈之禮及迴使副劉玫案通鑑作韓玫舊五代史考異具述其事故停削鏐官爵令致仕烏昭遇下御史臺尋賜自盡後有自浙中使還者言昭遇無臣鏐之事為玫所誣人頗以為寃乙未詔諸道通勘兩浙綱運進奉使並下巡獄冬十月丙申朔倂吏部三銓為一銓宜令本司官員同商量注擬連署申奏仍不得於私第注官戊戌以襄州兵馬都監守磁州刺史康福為朔方河西等節度使朔方原本作翔方今據通鑑改正影庫本粘籤靈威雄警凉等州觀察使時朔方將吏請帥於朝廷故命福往鎮之庚子以右金吾上將軍史敬鎔為左金吾上將軍以左驍衞上將軍符彥超為右金吾上將軍以前黔州節度使李承約為右驍衞上將軍以雲州節度使張敬詢為左驍衞上將軍以前華州節度使王景戡為右驍衞上將軍癸卯太常少卿蕭愿責授太子洗馬奪緋愿南郊行事與祠官同飲詰旦猶醉不能行禮為御史所劾也詔新授朔方節度使康福將兵萬人赴鎮己酉制復故荊南節度使高季興官爵辛亥升閬州為保寧軍壬子以內客省使左衞大將軍李仁矩為閬州節度使幸七星亭丙辰夏州進白鷹重誨奏曰夏州違詔進貢臣已止約帝曰善朝退帝密令左右進焉是日幸龍門十一月丁卯洛州水暴漲壞居人垣舍戊辰以刑部侍郎張文寶為右散騎常侍己巳以尚書右丞李光序為刑部侍郎癸酉升曹州濟陰縣為次赤以昭宣光烈孝皇帝溫陵所在故也甲戌奉國軍節度使王延稟加兼侍中從福建節度使王延鈞請也車駕出近郊試夏州所進白鷹戒左右勿令重誨知己卯日南至帝御文明殿受朝賀癸未祕書少監于嶠配振武長流百姓永不齒任為宰臣趙鳳誣奏也史官張昭遠等以新修獻祖懿祖太祖紀年錄共二十卷懿祖原本脫懿字今從五代會要改正影庫本粘籤莊宗實錄三十卷上之賜器帛有差案五代會要監修趙鳳修撰張昭遠呂咸休各賜繒綵銀器等舊五代史考異十二月丁酉靈武康福奏破野利大蟲兩族三百餘帳於方渠獲牛羊三萬戊戌詔應授官及封贈官誥舉人冬集等所費用物一切官破壬戌中書奏今後宰臣致齋內不押班不知印不赴內殿起居或遇國忌行事官已受誓戒宜不赴行香幷不奏刑殺公事大祠致齋內請不開宴每遇大忌前一日請不坐朝從之永樂大典卷七千一百六十五, WYG: 攷證}
  - {type: variant, offset: 1449, length: 3080, content: 品已上官及諸道進奉使請準貞元七年勅就位起居永為恆式從之五月己巳朔帝御文明殿受朝丙子以夔州節度使西方鄴卒輟朝丁丑大理卿李保殷卒己卯以忠武軍節度使索自通為京兆尹充西京留守以左威衞上將軍朱漢賓為潞州節度使乙酉以黔州節度使安崇阮為夔州節度使以左驍衞上將軍張溫為洋州節度使以黔州留後楊漢賓為本州節度使中書奏太常寺定少帝諡昭宣光烈孝皇帝廟號景宗伏以少帝今不入廟難以言宗只云昭宣光烈孝皇帝從之案舊唐書哀帝紀云中書奏少帝行事不合稱宗今考五代會要天成三年博士呂朋龜議引君不逾年不入宗廟之禮請別立廟於園陵故不稱景宗非議其行事有失也舊唐書誤丁亥以鳳州武興軍留後陳臯為武興軍節度使以新州威塞軍留後翟璋為威塞軍節度使壬辰以權知尚書右丞崔居儉為尚書右丞詔葺天下廨宇丙申襄州奏荊南高從誨乞歸順雲州奏契丹犯塞六月辛丑以左散騎常侍姚顗為兵部侍郎壬寅夔州節度使楊漢章移鎮雲州以北京馬步軍都指揮使兼欽州刺史張敬達為鳳州節度使癸卯以前西京副留守事張遵誨行衞尉事充客省使國子博士田敏請葺四郊祠祭齋室丙午以沂州刺史張萬進為安北都護充振武軍節度使戊申以宿州團練使康思立為利州節度使登州刺史孫元停任坐在任無名科率故也詔鄴都仍舊為魏府鄴都仍舊為魏府考通鑑注云莊宗同光元年即位于魏州以魏州為興唐府建東京既遷洛同光三年復唐之舊以洛陽為東都改魏州之東京為鄴都至是復以為魏州今附識于此影庫本粘籤應魏府汴州益州宮殿悉去鴟尾賜節度使為衙署辛亥以權知朔方軍留後定難軍都知兵馬使韓澄為朔方留後癸丑以前潞州節度使符彥超為左驍衞上將軍詔諸道節度使行軍司馬名位雖高或帥臣不在其州事宜委節度副使權知又詔藩郡所請賓幕及主事親從者悉以名聞丙辰案通鑑作庚申舊五代史考異權知荊南軍府事高從誨上章首罪乞修職貢仍進銀三千兩贖罪案通鑑庚申高從誨自稱前荊南行軍司馬歸州刺史上表求內附薛史作丙辰與通鑑異孔本壬戌幸至德宮詔京城空地課人蓋造如無力者許人請射營構秋七月庚午以前西京留守判官張鎛為司農卿壬申貶前左金吾上將軍毛璋為儒州長流百姓尋賜自盡以其在藩鎮陰蓄奸謀故也甲戌御史中丞呂夢奇責授太子右贊善大夫坐曾借毛璋馬故也己卯以工部侍郎任贊為左散騎常侍以樞密直學士左諫議大夫充匭使閻至為工部侍郎充職遂州進嘉禾一莖九穗壬午以給事中判大理卿事許光義為御史中丞史館上言所編修莊宗一朝事迹欲名為實錄太祖獻祖懿祖名為紀年錄紀年錄原本作繫年錄考通鑑注玉海文獻通考並作紀年錄今改正影庫本粘籤從之案五代會要天成三年十二月史館奏據左補闕張昭遠狀嘗讀國書伏見懿祖昭烈皇帝自元和之初獻祖文皇帝于太和之際立功王室陳力國朝太祖武皇帝自咸通後來勤王戮力翦平多難頻立大功三換節旄再安京國莊宗皇帝終平大憝奄有中原倘闕編修遂成湮墜伏請與當館修撰參序條綱撰太祖莊宗實錄者伏見前代史館歸于著作國初分撰五代史方委大臣監修自大曆後來始奏兩員修撰當時選任皆取良能一代之書便成于手其後源流失緒波蕩不還冒當修撰之名曷揚褒貶之職及乎編修六典即云別訪通才况當館職在編修合行撰述敕宜依四年七月監修國史趙鳳奏奉勅修懿祖獻祖太祖莊宗四帝實錄自今年六月一日起手旋具進呈伏以凡關纂述務合品題承乾御宇之君行事方云實錄追尊冊號之帝約文祗可紀年所修前件史書今欲自莊宗一朝名為實錄其太祖以上並目為紀年錄從之考當時史館能審名實如此薛史列武皇于本紀識者譏之歐陽史始改莊宗紀舊五代史考異甲申以前荊南行軍司馬檢校太傅高從誨起復授檢校太傅兼侍中充荊南節度使丙戌涇州節度使李從昶移鎮華州以冀州刺史李金全為涇州節度使戊子中書奉今後新及第舉人有曾授正官及御署者欲約前任資序與除一官從之壬辰詔取來年二月二十一日有事於南郊八月丁酉朔大理正路阮奏切見春秋釋奠於文宣王而武成王廟久曠時祭請復常祀常祀原本作嘗祈今據五代會要改正影庫本粘籤從之戊戌中書奏太子少傅李琪所撰進霍彥威神道碑文不分真偽是混功名望令改撰從之琪梁之故相私懷感遇彥威在梁歷任不欲言偽梁故也辛丑詔亂離已來天下諸軍所掠生口有主識認即勒還之以前清河縣令襲酅國公食邑三千戶楊仁矩為祕書丞御史臺奏主簿朱穎是前中丞奏請合隨廳罷任詔曰主簿既為正秩况入選門顯自朝恩合終考限宜令仍舊守官甲辰以宰臣馮道為南郊大禮使兵部尚書盧質為禮儀使御史中丞許光義為儀仗使兵部侍郎姚顗為鹵簿使河南尹從榮為橋道頓遞使客省使衞尉卿張遵誨為修裝法物使乙巳黑水朝貢使骨至來朝授歸德司戈放還蕃丁未以翰林學士承旨禮部侍郎知制誥李愚為兵部侍郎職如故以中書舍人盧詹為禮部侍郎以兵部侍郎裴為太子賓客吐渾首領念公山來朝貢戊申帝服兗冕御文明殿追冊昭宣光烈孝皇帝庚戌以宰臣監修國史趙鳳兼判集賢院事以左散騎常侍任贊判大理卿事己未高麗王王建遣使貢方物辛酉詔準往例節度使帶平章事侍中中書令並列銜於勅牒側書使字今錢鏐是元帥尚父與使相名殊馬殷守太師尚書令是南省官資不合署勅尾今後勅牒內並