  - {type: variant, offset: 381, length: 617, content: 梁史廣王全昱傳曰昱樸野常呼帝為三宮中博戲之事諱之夫梁祖弒二君弒一皇后名臣被害者不可勝紀及莊宗即位盡誅朱氏惟全昱先令終至道初知單州有稱廣王之後與尼訟田者豈以一言之善獨存其嗣耶案通鑑考異引王仁裕玉堂閑話曰骰子數匝廣王全昱忽駐不擲顧而向梁祖再呼朱三梁祖動容廣王曰你受它爾許大官職久遠家族得安否於是大怒擲戲具於階下抵其盆而碎之喑嗚眦睢數日不止與王禹偁所述微異舊五代史考異友諒全昱子初封衡王後嗣廣王永樂大典卷一萬六千六百二十八繼歷藩郡多行不法冊府元龜卷二百九十九坐弟友能反廢囚京師唐師入汴與友能友誨同日遇害永樂大典卷一萬六千六百二十八友能全昱子封惠王後為宋滑二州留後永樂大典卷一萬六千六百二十八案友能後以叛廢詳見末帝紀又通鑑云龍德元年夏四月陳州刺史惠王友能反舉兵趨大梁詔陝州留後霍彥威宣義節度使王彥章控鶴指揮使張漢傑將兵討之友能至陳留兵敗走還陳州諸軍圍之秋七月惠王友能降庚子詔赦其死降封房陵侯友誨全昱子封邵王永樂大典卷一萬六千六百二十八乾化元年以檢校兵部尚書充控鶴指揮使冊府元龜卷二百六十九坐友能反廢後為唐兵所殺永樂大典卷一萬六千六百二十六案通鑑云邵王友誨全昱之子也性穎悟人心多向之或言其誘致禁軍欲為亂梁主召友誨與其兄友諒友能並幽於別第及唐師將至梁主疑諸兄弟乘危謀亂幷皇弟賀王友雍建王友徽盡殺之考異曰薛史云友諒友能友誨莊宗入汴同日遇害按中都既敗均王親弟猶疑而殺之况其從弟嘗為亂者豈得獨存云云考通鑑以友諒等為末帝自殺考異祇以事理度之而不言所據何書, WYG: ''}
