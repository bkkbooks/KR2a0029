  - {type: variant, offset: 535, length: 3169, content: 州蓋入宋後避諱去匡字也今仍其舊又案遼史世宗紀天祿二年十月壬午南京留守魏王趙延壽薨考遼天祿二年即漢乾祐二年此時天福十二年延壽尚未死也此必因延壽為永康王所鎖而漢人傳其已死遂起復其子贊以絕其北向之心耳又考通鑑遣使弔祭河中因起復移鎮在七月甲午以後薛史繫于六月前後互異孔本是日契丹右僕射兼中書侍郎平章事張礪卒於鎮州丙辰車駕至洛兩京文武百僚自新安相次奉迎郇國公李從益唐明宗淑妃王氏皆賜死於東京甲子車駕至東京丙寅以漢州就糧歸捷指揮使張建雄為濮州刺史以金州守禦指揮使康彥環為金州防禦使建雄彥環皆因亂害本州刺史自知州事故有是命以北京知進奏王從璋為內客省使戊辰制大赦天下應天福十二年六月十五日昧爽已前天下見禁罪人已結正未結正已發覺未發覺除十惡五逆外罪無輕重咸赦除之諸州去年殘稅並放東西京一百里外放今年夏稅一百里內及京城今年屋稅並放一半契丹所授職任不議改更諸貶降官未量移者與量移已量移者與錄徒流人並放還應係欠省錢家業抵當外並放宜以國號為大漢年號依舊稱天福云案歐陽史六月戊辰改國號漢是戊辰以前猶未改國號也遼史太宗紀二月辛未河東節度使北平王劉知遠自立為帝國號漢蓋因其自立而牽連書之疑未詳考己巳詔青州襄州安州復為節鎮曹陳二州依舊為郡壬申北京留守劉崇加同平章事以中書舍人劉繼儒為宗正卿翰林學士承旨尚書兵部侍郎張允落職守本官以尚書左丞張昭為吏部侍郎案東都事略張昭傳昭舊名昭遠避漢高祖諱止稱昭舊五代史考異以左散騎常侍邊歸讜為禮部侍郎以左散騎常侍王仁裕為戶部侍郎充翰林學士承旨以右諫議大夫張沆為左散騎常侍充翰林學士以戶部侍郎李式為光祿卿以翰林學士尚書禮部侍郎邊光範為衞尉卿甲戌詔文武臣僚每遇內殿起居輪次上封事丁丑以湖南節度使馬希範卒輟視朝三日是月契丹所命相州節度使高唐英為屯駐指揮使王繼弘楚暉所殺秋七月己丑以御史中丞趙上交為太僕卿案上交本名遠避漢祖諱以字行見宋史舊五代史考異以戶部侍郎邊蔚為御史中丞甲午武安軍節度副使水陸諸軍副都指揮使判內外諸司江南西道觀察等使檢校太尉馬希廣可檢校太師兼中書令行潭州大都督天策上將軍充武安軍節度湖南管內觀察使江南諸道都統封楚王丙申以鄴都留守天雄軍節度使檢校太師守太傅兼中書令衞國公杜重威為宋州節度使加守太尉以宋州節度使檢校太師兼中書令高行周為鄴都留守加守太傅以鄆州節度使檢校太師兼侍中李守貞為河中節度使加兼中書令以河中節度使檢校太尉趙贊為晉昌軍節度使案宋史趙贊傳贊懼漢疑己潛遣親吏趙僊奉表歸蜀判官李恕者趙延壽賓佐深所委賴至家事亦參之及贊出鎮從為上介至是恕語贊曰燕王入遼非所願也漢方建國必務懷柔公若泥首歸朝必保富貴狼狽入蜀理難萬全儻若不容後悔無及公能聽納請先入朝為公申理贊即遣恕詣闕漢祖見恕問贊何以附蜀恕曰贊家在燕薊身受契丹之命自懷憂恐謂陛下終不能容招引西軍蓋圖苟免臣意國家甫定務安臣民所以令臣乞哀求覲漢祖曰贊之父子亦吾人也事契丹出於不幸今聞延壽落于陷穽吾忍不容贊耶恕未還贊已離鎮入朝即命為左驍衞將軍舊五代史考異以晉昌軍節度使張彥超為鄜州節度使加檢校太師庚子以徐州節度使檢校太師同平章事岐國公符彥卿為兗州節度使加兼侍中以鄧州節度使檢校太師王周為徐州節度使加同平章事以許州節度使檢校太保劉重進為鄧州節度使加檢校太傅以兗州節度使檢校太師兼侍中安審琦為襄州節度使檢校太師莒國公李從敏為西京留守加同平章事以鳳翔節度使檢校太師同平章事侯益依前鳳翔節度使加兼侍中辛丑故守司空兼門下侍郎平章事譙國公劉昫贈太保甲辰華州節度使侯章同州節度使張彥威涇州節度使史威並加檢校太尉以晉昌軍節度使檢校太保劉銖為青州節度使加檢校太尉同平章事以河中節度使檢校太尉白文珂為鄆州節度使加同平章事以青州節度使楊承信為安州節度加檢校太傅滑州節度使兼侍衞馬軍都指揮使劉信許州節度使兼侍衞步軍都指揮使史弘肇並加檢校太尉庚戌以司天監任延皓為殿中監以司天少監杜昇為司天監是月契丹永康王兀欲囚祖母述律氏於木葉山閏月辛酉以左衞上將軍皇甫立為太子太師致仕乙丑禁造契丹樣鞍轡器械服裝故開封尹桑維翰贈尚書令故西京留守景延廣贈中書令以前衞尉卿薛仁謙為司農卿丙寅唐故樞密使郭崇韜贈中書令故河中節度使安重誨贈尚書令故華州節度使毛璋贈侍中故汴州節度使朱守殷贈中書令丁卯故青州節度楊光遠贈尚書令追封齊王仍令所司追諡立碑唐故河中節度使西平王朱友謙追封魏王故樞密使馮贇贈中書令故河陽節度使判六軍康義誠贈中書令故西京留守京兆尹王思同故邠州節度使藥彥稠故襄州節度使安重進故鎮州節度使安重榮並贈侍中庚午以前延州留後薛可言為宣徽北院使以監察御史王度為樞密直學士新授宋州節度使杜重威據鄴都叛詔削奪重威官爵貶為庶人案通鑑杜重威之叛在七月至閏月庚午乃削奪官爵五代春秋歐陽史作閏七月杜重威拒命與通鑑異舊五代史考異以高行周為行營都部署率兵進討辛未以權樞密使楊邠為樞密使加檢校太傅以權樞