  - {type: variant, offset: 3706, length: 1353, content: 日暫幸澶魏己卯以前樞密使李崧為太子太傅以前左僕射和凝為太子太保庚辰車駕發京師冬十月癸未以太子太保李鏻為司徒以太子太傅盧文紀為太子太師以前磁州刺史李穀為左散騎常侍宋史李穀傳舊制罷外郡歸本官至是進秩奬之也殿本甲申車駕次韋城詔河北諸州見禁罪人自十月五日昧爽以前常赦所不原者咸赦除之壬辰日有黑子如鷄卵丙申以相州留後王繼弘為相州節度使加檢校太傅至鄴都城下案通鑑作戊戌至鄴都城下與薛史異舊五代史考異丙午詔都部署高行周督衆攻城帝登高阜以觀之時衆議未欲攻擊副部署慕容彥超堅請攻之是日王師傷夷者萬餘人不克而退十一月壬子雨木冰癸丑日南至從官稱賀於行宮己未湖南奏荊南節度使高從誨叛辛酉雨木冰壬申杜重威上表請命癸酉雨木冰雨木冰原本作大冰今從五代會要改正影庫本粘籤丁丑杜重威素服出降待罪於宮門詔釋其罪鄴都留守天雄軍節度使高行周加守太尉封臨清王以杜重威為檢校太師守太傅兼中書令楚國公己卯以許州節度使兼侍衞步軍都指揮使史弘肇為宋州節度使同平章事充侍衞親軍馬步軍都指揮使以滑州節度使兼侍衞馬軍都指揮使劉信為許州節度使同平章事充侍衞親軍馬步軍副都指揮使以澶州節度使慕容彥超為鄆州節度使同平章事以前定州節度使李殷為貝州節度使以鄭州防禦使郭從義為澶州節度使十二月辛巳朔以護聖左廂都指揮使岳州防禦使李洪信為遂州節度使充侍衞步軍都指揮使以護聖右廂都指揮使永州防禦使尚洪遷為夔州節度使充侍衞步軍都指揮使丙戌車駕發鄴都歸京癸巳至自鄴都甲午以皇子開封尹承訓薨廢朝三日追封魏王案通鑑云辛卯皇子開封尹承訓卒乙未追立為魏王與薛史紀日互異舊五代史考異丁酉帝舉哀於太平宮庚子司徒李鏻薨辛丑以前鄜州節度使郭謹為滑州節度使加檢校太尉戊申宿州奏部民餓死者八百六十有七人乾祐元年正月辛亥朔帝不受朝賀乙卯制大赦天下改天福十三年為乾祐元年自正月五日昧爽已前犯罪人除十惡五逆外罪無輕重咸赦除之己未改御名為暠辛酉詔諸道行軍副使兩使判官並不得奏薦帶使相節度使許奏掌書記支使節度推官不帶使相節度使只許奏掌書記節度推官其防禦團練判官軍事判官等聽奏所薦州縣官帶使相節度使許薦三人不帶使相二人防禦團練刺史一人云以前鄧州節度使燕國公馮道為守太師進封齊國公甲子帝不豫庚午以前宗正卿石光贊為太子賓客以太僕卿趙上交為祕書監丁丑故尚書左丞韓祚贈司徒二十七日丁丑帝崩於萬歲殿時年五十四祕不發喪庚辰太傅杜重威伏誅案契丹國志云漢祖召蘇逢吉楊邠史宏肇入受顧命曰承祐幼弱後事託在卿輩又曰善防杜重威是日殂逢吉等祕不發喪下詔稱重威父子因朕小疾謗議搖衆皆斬之磔死于巿巿人爭啖其肉舊五代史考異二月辛巳朔內降遺制皇子周王承祐可於柩前即皇帝位是日發哀其年三月太常卿張昭上諡曰睿文聖武昭肅孝皇帝廟號高祖十一月壬申葬於睿陵宰臣蘇禹珪撰諡冊哀冊文云永樂大典卷一萬六千九十八五代史補高祖嘗在晉祖麾下晉祖既起太原因高祖遂有天下先是豫章有僧號上藍者精於術數自唐末著讖云石榴花發石榴開議者以石榴則晉漢之謂也再言石榴者明享祚俱不過二世矣史臣曰在昔皇天降禍諸夏無君漢高祖肇起幷汾遄臨汴洛乘虛而取神器因亂而有帝圖雖曰人謀諒由天啟然帝昔蒞戎藩素虧物望洎登宸極未厭人心徒矜拯溺之功莫契來蘇之望良以急於止殺不暇崇仁燕薊降師既連營而受戮鄴臺叛帥因閉壘以偷生蓋撫御以乖方俾征伐之不息及回鑾輅尋墮烏號故雖有應運之名而未覩為君之德也永樂大典卷一萬六千九十八, WYG: 攷證}
