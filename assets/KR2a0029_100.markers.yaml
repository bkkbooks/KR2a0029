  - {type: variant, offset: 116, length: 418, content: 考異於是發哀成服辛卯詔取五月十二日車駕南幸甲午以判太原府事劉崇為北京留守命皇子承訓武德使李暉大內巡檢丙申帝發河東取陰地關路幸東京時星官言太歲在午不利南巡故路出陰地丁酉史弘肇奏澤州刺史翟令奇以郡來降案宋史李萬超傳史弘肇路經澤州刺史翟令奇堅壁拒命萬超馳至城下諭之曰今契丹北遁天下無主幷州劉公仗大義定中土所向風靡後服者族盍早圖之令奇乃開門迎納宏肇即留萬超權州事舊五代史考異是日契丹所署汴州節度使蕭翰迎郇國公李從益至東京請從益知南朝軍國事己亥蕭翰發離東京北去乙巳契丹永康王兀欲自鎮州還蕃行次定州案遼史作甲申次定州與薛史異舊五代史考異以定州節度副使耶律忠為定州節度使孫方簡為雲州節度使方簡不受命遂歸狼山戊申車駕至絳州本州刺史李從朗以郡降初契丹遣偏校成霸卿曹可璠等守其郡帝建義之始不時歸命及車駕至帝耀兵於城下不令攻擊從朗等遂降六月乙卯契丹河中節度使趙贊起復河中節度使案通鑑起復趙匡贊在七月甲午以後與薛史異又匡贊薛史作趙贊考贊即延壽之子仕宋歷廬延邠鄜, WYG: 巻}
