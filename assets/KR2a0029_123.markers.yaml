  - {type: variant, offset: 79, length: 5, content: 言甚切直世, WYG: 改隰州刺史染風痹于任明宗嗣位念及平昔副貳之舊詔赴洛下親幸其第撫問隆厚加檢校太傅遙授鎮南節度使俾請俸自給後卒于洛陽年五十六廢朝一日贈太尉子可鈞仕皇朝位至諸衛大將軍西方鄴定州滿城人也父再遇為州軍校鄴居軍中以勇力聞年二十南渡河遊梁不見用復歸莊宗以為孝義軍指揮使累從征伐皆有功同光中為曹州刺史命以州兵屯汴州明宗由魏州南渡河時莊宗東幸汴州汴州節度使孔循隱懷二志使北門迎明宗西門迎莊宗凡供帳委積悉如一曰先至者入之鄴因責循曰主上破梁室于公有不殺之㤙奈何欲納總管循不答鄴度循不可理爭以石敬瑭之妻明宗女也時方在汴欲先殺之以堅人心循知其謀取之藏其家鄴無如之何乃將麾下兵五百騎西迎莊宗見于汜水鳴咽泣下莊}
