  - {type: variant, offset: 72, length: 3, content: 諫止后, WYG: 佩劍列于翊衛後攜劒南馳投于梁主梁主壯之俾𨽻淮之鎮戍復以射殺掌庾吏逃竄江湖淮帥得之擢為禆將重霸在蜀聞之蜀主取之于吳用為禆將隨重霸為龍武小將戍長道又殺人奔歸洛陽太平廣記蜀破重進東歸明宗補為諸州馬步軍都指揮使後有過鞭背卒重霸之子曰懷浦晉天福中為禁軍指揮使契丹冦澶州以臨陣忸怩為景延廣所誅劉訓字遵範隰州永和人也出身行間初事武皇為馬軍隊長漸至散將屬河中王氏昆仲有尋戈之役訓從史儼攻陜州武皇討王行瑜以訓為前鋒後隸河中為隰州防禦都將居無何殺陜州刺史以郡歸莊宗厯􅘵州刺史同光初拜左監衛大將軍三年授襄州節度使四年四月洛陽有變訓以私忿害節度副使胡裝族其家聞者寃之天成中荆南髙季興叛詔訓為南面行營招討使知荆南行府事是時湖南馬殷請以舟師㑹及王師至荆渚殷軍方到岳州仍𫝊意于訓許助軍儲弓甲之類久之略無至者通鑑劉訓至荆南楚王殷遣都指揮使許徳勲等將水軍屯岳州髙季興堅壁不戰求救于吳吳人遣水軍救之荆渚地氣畀濕漸及霖潦糧運不繼人多疾疫訓本無將略人咸苦之及孔循至得襄之小校獻竹龍之術及造竹龍二道𫝊於城下竟無所濟遂罷兵令將士散略民而迴詔訓赴闕尋責授檀州刺史續勅濮州安置未㡬起為龍武大將軍尋授建雄軍節度使移鎮延平卒贈太尉張敬詢勝州金河縣人世為振武軍牙校祖仲阮厯勝州刺史父漢環事武皇為牙將敬詢當武皇時専掌甲坊十五年以稱職聞復以女為武皇子存霸妻益見親信莊宗即位以為沁州刺史秩滿復用為甲坊使莊宗經略山東敬詢從軍厯博澤慈隰四州刺史同光末授耀州團練使郭崇韜之征蜀也以敬詢善督租賦乃表為利州留後明宗即位正授昭武軍節度使天成二年詔還京師復授大同節度使至鎮招撫室韋萬餘帳四年徵為左驍衛上將軍明年授滑州節度使以河水連年溢堤乃自酸棗縣界至濮州廣隄防一丈五尺東西二百里民甚賴之三年秩滿歸京卒輟視朝一日劉彦琮字比徳雲中人也事武皇累從征役先是絳州刺史王瓘叛武皇言于彦琮意欲致之無幾從略于汾晉之郊彦琮奔絳瓘以為附巳待之甚厚因命為騎將㑹瓘出獵于馳驅之際彦琮刃瓘之首來獻武皇甚奇之從莊宗解上黨之圍同光初稍遷至鐵林指揮使磁州刺史後明宗赴難京師授華州留後尋正授節旄天成三年改左武衛上將軍未幾改陜州節度使尋移鎮邠州卒于鎮時年六十四贈太傅袁建豐武皇破巢時得于華隂年方九嵗愛其精神爽俊俾收養之漸長列于左右復習騎射補鐵林都虞候從破邠州王行瑜以功遷左親騎軍使轉突騎指揮使從莊宗解圍上黨破柏鄉陣累功遷右僕射左廂馬軍指揮使明宗為内衙指揮使建豐為副北討劉守光}
