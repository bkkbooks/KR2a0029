  front:
  - {type: variant, offset: 0, length: 1, content: 后, WYG: 欽定四庫全書舊五代史巻六十一宋門下侍郎參知政事監修國史薛居正等撰唐書第三十七列𫝊十三安金全代北人世為邊將少驍果便騎射武皇時為騎將屢從征討莊宗之救潞州及平河朔皆有戰功累為刺史以老病退居太原天祐中汴將王檀率師三萬乘莊宗在鄴來襲并州時城無備兵敵軍奄至監軍張承業大恐計無所出閲諸司丁匠登陴禦捍外攻甚急金全遽出謂承業曰老夫退居抱病不任軍事然吾王家屬在此王業本根之地如一旦為敵所有大事去矣請以庫甲見授為公備冦承業即時授之金全被甲跨馬召率子弟及退閒諸將得數百人夜出北門擊賊于羊馬城内梁人驚潰由是退却俄而石君立自潞州至汴軍退走微金全之奮命城幾危矣莊宗性矜伐凡大將立功不行賞故金全終莊宗世名位不進明宗與之有舊及登極授金全同平章事充振武軍節度使在任二年治民為政非所長詔赴闕俄而病卒廢朝二日初南北對壘汴之游騎每出必為金全所獲故梁之偵邏者咸懼目之為安五道盖比鬼將為五道之名也子審琦等皆位至方鎮別有𫝊審通金全之猶子也幼事莊宗累有戰功轉先鋒指揮使同光初為北京右廂馬軍都指揮使屯奉化軍四年春赴明宗急詔軍趨夷門為前鋒天成初授單州刺史改齊州防禦使兼諸道先鋒馬軍都指揮使奉詔北征從房知溫營于盧臺會龍晊部下兵亂審通脱身酒筵奪船以濟促騎士介馬及亂兵南行盡戮之以功授檢校太傅滄州節度使圍王都于中山躬冒矢石為飛石所中而卒贈太尉安元信字子言代北人父順琳為降野軍使元信以將家子便騎射幼事武皇從平巢蔡光啟中吐渾赫連鐸冦雲中武皇使元信拒之元信兵敗于居庸闗武皇性嚴急元信不敢還遂奔定州王處存待之甚厚用為突騎都校乾寧中處存子郜嗣位時梁軍攻河朔三鎮奔命不暇梁將張存敬軍奄至城下既無宿備郜懼挈其族奔太原元信從之武皇待之如初用為鐵林軍使梁将氏叔琮之攻河東也別將葛從周自馬嶺入元信伏于榆次挫其前鋒梁將李思安之攻上黨也王師將壁髙河為梁軍所逼別將秦武者尤為難敵元信與鬬斃之繇是梁軍解去城壘得立武皇賜所乘馬及細鎧仗遷突陣都將莊宗嗣晉王位元信從救上黨破夾寨復澤潞以功授檢校司空遼州刺史賜玉鞭名馬柏鄉之役日晩戰酣元信重傷莊宗自臨傅藥其年改檢校司徒武州刺史充内衙副都指揮使山北諸州都團練副使從莊宗定魏博移為博州刺史與梁對壘得勝渡元信為右廂排陣使未幾為大同軍節度使莊宗平定河南移授横海軍節度使時契丹犯邊元信與霍彦威從明宗屯}
