  - {type: variant, offset: 70, length: 1, content: 后, WYG: 之故秦人目重霸為𢷬蒜老其年冬改雲州節度居無何以病求代時家寄上黨及歸而卒重霸善悦人好賂遺時人目之為俊弟重進尤凶惡事莊宗以試劒殺人奔淮南玉堂間話安重進性凶險莊宗潛龍時為小校}
  - {type: variant, offset: 70, length: 1, content: 后, krp: 之故秦人目重霸為𢷬蒜老其年冬改雲州節度居無何以病求代時家寄上黨及歸而卒重霸善悦人好賂遺時人目之為俊弟重進尤凶惡事莊宗以試劒殺人奔淮南玉堂間話安重進性凶險莊宗潛龍時為小校}
