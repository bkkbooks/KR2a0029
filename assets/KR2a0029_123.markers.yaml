  body:
  - {type: 'tls:seg', offset: 0, content: '', id: KR2a0029_ZHSJ_123-d123p10s40}
  - {type: variant, offset: 2, length: 2, content: 諫止, WYG: 山元信恃功每對明宗以成敗勇怯戲侮彦威彦威不敢答明宗曰成由天地不由於人當氏叔琮圍太原公有何勇今國家運興致我等富貴乃起謝元信不復以彦威為戲明宗即位以元信嘗為内衛都校尤厚待}
  - {type: variant, offset: 2, length: 2, content: 諫止, krp: 山元信恃功每對明宗以成敗勇怯戲侮彦威彦威不敢答明宗曰成由天地不由於人當氏叔琮圍太原公有何勇今國家運興致我等富貴乃起謝元信不復以彦威為戲明宗即位以元信嘗為内衛都校尤厚待}
  - {type: punctuation, offset: 5, content: ，, id: KR2a0029_ZHSJ_123-bkkpn1}
  - {type: 'tls:seg', offset: 5, content: '', id: KR2a0029_ZHSJ_123-d123p10s41}
  - {type: variant, offset: 5, length: 1, content: 言, WYG: 加同中書門下平章事明年移鎮徐州王師之討髙季興襄帥劉訓逗撓軍期移授元信山南東道節度使以代訓嵗餘改歸徳軍節度使就加兼侍中明宗不豫求入末帝即位授潞州節度使加檢校太尉清泰三年二月以疾卒于鎮時年七十四贈太師晉髙祖即位以元信宿望令禮官定諡曰忠懿有子六人長曰友權厯諸衛大將軍次曰友親仕皇朝為滁州刺史卒于任安重霸雲州人也性狡譎多智算初自代北與明宗俱事武皇因負罪奔梁在梁復以罪奔蜀蜀以蕃人善騎射因為親將蜀後主王衍幼年襲位其政多僻宦官王承休居中用事與成都尹韓昭内外相結專採擇聲色以固寵幸武皇宿將居常切齒重霸諂事承休特見委信梁末岐下削弱蜀人獨取秦成階等州重霸説承休求鎮秦州仍於軍中選山東驍果得數千人號龍武都以承休為軍帥重霸副馬俱在天水歲餘承休欲求旄鉞乃以隴西花木入獻又秦州山水之美人物之盛請後主臨幸而韓昭贊成之太平廣記引王氏見聞録云承休請從諸軍揀選官健得驍男數千號龍武軍承休自為統帥並特加衣糧日有優給因乞秦州節度使且云願與陛下于秦州採掇美麗且説秦州風土多出國色請仍幸天水少主}
  - {type: page-break, offset: 5, content: '', id: KR2a0029_WYG_123-4b, image: WYG0277/WYG0277-0512b.png}
  - {type: page-break, offset: 5, content: '', id: KR2a0029_WYG_123-5a, image: WYG0277/WYG0277-0512c.png}
  - {type: variant, offset: 5, length: 1, content: 言, krp: 加同中書門下平章事明年移鎮徐州王師之討髙季興襄帥劉訓逗撓軍期移授元信山南東道節度使以代訓嵗餘改歸徳軍節度使就加兼侍中明宗不豫求入末帝即位授潞州節度使加檢校太尉清泰三年二月以疾卒于鎮時年七十四贈太師晉髙祖即位以元信宿望令禮官定諡曰忠懿有子六人長曰友權厯諸衛大將軍次曰友親仕皇朝為滁州刺史卒于任安重霸雲州人也性狡譎多智算初自代北與明宗俱事武皇因負罪奔梁在梁復以罪奔蜀蜀以蕃人善騎射因為親將蜀後主王衍幼年襲位其政多僻宦官王承休居中用事與成都尹韓昭内外相結專採擇聲色以固寵幸武皇宿將居常切齒重霸諂事承休特見委信梁末岐下削弱蜀人獨取秦成階等州重霸説承休求鎮秦州仍於軍中選山東驍果得數千人號龍武都以承休為軍帥重霸副馬俱在天水歲餘承休欲求旄鉞乃以隴西花木入獻又秦州山水之美人物之盛請後主臨幸而韓昭贊成之太平廣記引王氏見聞録云承休請從諸軍揀選官健得驍男數千號龍武軍承休自為統帥並特加衣糧日有優給因乞秦州節度使且云願與陛下于秦州採掇美麗且説秦州風土多出國色請仍幸天水少主}
  - {type: variant, offset: 7, length: 5, content: 切直世后后, WYG: 行悦即遣仗節赴鎮應所選龍武精鋭並克衙隊從同光二年十月蜀主率衆數萬由劒閣將出興鳳以遊秦州至興州遇魏王繼岌軍至狼狽而旋承休遽聞東師入討大恐計無從出問計于重霸曰開府何患蜀中精兵不下十萬咫尺之險安有不濟縱東軍盡如狼虎豈能入劒門然國家有患開府特受主知不得失于奔赴此州制置事定無虞得失重霸願從開府赴闕承休素信以為忠赤重霸出秦州金帛以賂羣羌買由州山路歸蜀承休擁龍武軍及招置僅萬人從行令重霸權握部署州人祖送秦州軍亦列部隊承休登乘重霸馬前辭曰國家費盡事力收獲隴西若從開府南行隴州即時踈失請閬府自行重霸且為國守藩承休既去重霸在秦州聞明宗起河北即時遣使以秦成等州來降天成初用為閬州團練使未幾召還為左衛大將軍}
