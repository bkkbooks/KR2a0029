  - {type: variant, offset: 76, length: 2, content: 諫止, WYG: 身先士伍轉都敎練使權蕃漢副總管莊宗入鄴以心腹幹能選為魏府都巡檢使劉鄩下衛磁洺三郡有功加檢校司空授洺州刺史于臨洺西敗梁將王遷數千人生獲將領七十餘人俄拜相州刺史徵赴河上豫戰于胡栁陂建豐嶺相州軍士行營在外委州事于小人失于撫馭指揮使孟守謙據城以叛建豐引兵討平}
