  - {type: variant, offset: 5971, length: 239, content: 鎮焉永樂大典卷一萬六千九百九十一張礪字夢臣案契丹國志云礪磁州滏陽人也孔本幼嗜學有文藻唐同光初擢進士第尋拜左拾遺直史館會郭崇韜伐蜀奏請礪掌軍書蜀平崇韜為魏王繼岌所誅時崇韜左右親信皆懼禍奔逃唯礪詣魏王府第慟哭久之時人服其高義永樂大典卷一萬三千九百十三天成初明宗知其名授翰林學士再丁父母憂服闋皆復入為學士歷禮部兵部員外郎知制誥充職未幾父之妾卒初妾在世礪以久侍先人頗亦敬奉諸幼子亦以祖母呼之及卒礪疑其事詢於同僚未有以對礪即托故歸於滏陽閑居三年不行其服論情制宜識者韙之永樂大典卷一萬七百九, WYG: ''}
