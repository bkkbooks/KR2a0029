  - {type: variant, offset: 4524, length: 1446, content: 考異又問田宅何在曰俱在幽州國母曰屬我矣又何獻也至天福二年夏德鈞卒於契丹永樂大典卷一萬八千一百三十案契丹國志云德鈞鬱鬱不多食踰年而死德鈞既卒國主釋延壽而用之舊五代史考異延壽本姓劉氏父曰邧常山人也常任蓨令梁開平初滄州節度使劉守文陷其邑時德鈞為偏將獲延壽幷其母种氏遂養之為子延壽姿貌妍柔稍涉書史尤好賓客亦能為詩案太平廣記引趙延壽傳云延壽幼習武略即戎之暇時復以篇什為意嘗在北庭賦詩曰占得高原肥草地夜深生火折林梢南人聞者傳之舊五代史考異及長尚明宗女興平公主初為汴州司馬明宗即位授汝州刺史歷河陽宋州節度使入為上將軍充宣徽使遷樞密使兼鎮徐州及高祖起義於晉陽唐末帝幸懷州委延壽北伐後高祖至潞州延壽與父德鈞俱陷北庭未幾契丹主以延壽為幽州節度使封燕王案遼史云德鈞卒以延壽為幽州節度使封燕王與薛史同契丹國志會同六年以延壽為盧龍節度使八年南征以延壽為魏博節度使封燕王與薛史異舊五代史考異尋為樞密使兼政事令案遼史云天顯末以延壽妻在晉詔取之以歸自是益激昂圖報會同初帝幸其第加政事令不言延壽為樞密使考契丹國志云會同改元參用蕃漢以延壽為樞密使兼政事令與薛史同舊五代史考異天福末契丹既與少帝絕好契丹主委延壽以圖南之事許以中原帝之延壽乃導誘蕃戎蠶食河朔晉軍既降於中渡戎王命延壽就寨安撫諸軍仍賜龍鳳赭袍使衣之而往謂之曰漢兒兵士皆爾有之爾宜親自慰撫延壽至營杜重威李守貞已下皆迎謁於馬前及戎王入汴時南北降軍數萬皆野次於陳橋戎王慮其有變欲盡殺之延壽聞之遽請見於戎王曰臣伏見今日已前皇帝百戰千征始收得晉國不知皇帝自要治之乎為他人取之乎戎王變色曰爾何言之過也朕以晉人負義舉國南征五年相殺方得中原豈不自要為主而為他人耶卿有何說速奏朕來延壽曰皇帝嘗知吳蜀與晉朝相殺否曰知延壽曰今中原南自安申西及秦鳳沿邊數千里並是兩界守戍之所將來皇帝歸國時又漸及炎蒸若吳蜀二寇交侵中國未知如許大世界教甚兵馬禦捍苟失隄防豈非為他人取也戎王曰我弗知也為之奈何延壽曰臣知上國之兵當炎暑之時沿吳蜀之境難為用也未若以陳橋所聚降軍團倂別作軍額以備邊防戎王曰我念在壺關陽城時亦曾言議未獲區分致五年相殺此時入手如何更不翦除延壽曰晉軍見在之數如今還似從前盡在河南誠為不可臣請遷其軍幷其家口於鎮定雲朔間以處之每歲差伊分番於河外沿邊防戍斯上策也戎王忻然曰一取大王商量由是陳橋之衆獲免長平之禍焉延壽在汴久之知戎王無踐言之意乃遣李崧達語於戎王求立以為皇太子崧不得已而言之戎王曰我於燕王無所愛惜但我皮肉堪與燕王使用亦可割也何況他事我聞皇太子天子之子合作燕王豈得為之也因命與燕王加恩時北來翰林學士承旨張礪擬延壽為中京留守大丞相錄尚書事都督中外諸軍事樞密使燕王如故案遼史云會同七年正月己丑授延壽魏博等州節度使封魏王延壽本傳亦言其先封燕王改封魏王是延壽入汴時已為魏王也薛史始終稱為燕王與遼史異舊五代史考異案遼史載張礪擬狀無樞密使燕王如故七字孔本戎王覽擬狀索筆塗却錄尚書事都督中外諸軍事之字乃付翰林院草制焉又以其子匡贊為河中節度使延壽在汴州復娶明宗小女為繼室先是延州節度使周密為其子廣娶焉已納財畢親迎有日矣至是延壽奪取之契丹主自汴迴至邢州命升延壽坐在契丹左右相之上契丹主死延壽下教於諸道稱權知南朝軍國事是歲六月一日為永康王兀欲所鎖籍其家財分給諸部尋以延壽入國竟卒於契丹案遼史世宗紀天祿二年十月壬午南京留守魏王趙延壽薨薛史漢高祖紀天福十二年起復其子贊蓋傳聞之誤案遼史云世宗即位以翌戴功授樞密使天祿二年薨考延壽謀自主為永康王所鎖遼史為之諱言記傳皆不載孔本匡贊歷漢周兩朝累授節鎮及統軍使仕皇朝歷廬延邠鄜等, WYG: 巻}
