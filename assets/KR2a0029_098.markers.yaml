  - {type: variant, offset: 43, length: 3760, content: 軍都指揮使重榮有膂力善騎射唐長興中為振武道巡邊指揮使犯罪下獄時高行周為帥欲殺之其母赴闕申告樞密使安重誨陰護之重誨原本作仲誨今據通鑑改正影庫本粘籤奏於明宗有詔釋焉張敬達之圍晉陽也高祖聞重榮在代北使人誘之案歐陽史作使張頴陰招重榮舊五代史考異重榮乃召邊士得千騎赴焉高祖大喜誓以土地及即位授成德軍節度使累加至使相自梁唐已來藩侯郡牧多以勳授不明治道例為左右羣小惑亂賣官鬻獄割剝蒸民率有貪猥之名其實賄賂半歸於下惟重榮自能鉤距凡有爭訟多廷辯之至於倉庫耗利百姓科徭悉入於己諸司不敢窺覬嘗有夫婦共訟其子不孝者重榮面加詰責抽劍令自殺之其父泣曰不忍也其母詬詈仗劍逐之重榮疑而問之乃其繼母也因叱出自後射之一箭而斃聞者莫不快意由此境內以為強明大得民情重榮起於軍伍暴獲富貴復覩累朝自節鎮遽升大位每謂人曰天子兵彊馬壯者當為之寧有種耶又以奏請過當為權臣所否心常憤憤遂畜聚亡命收巿戰馬有飛揚跋扈之志案通鑑云帝之遣重榮代祕瓊也戒之曰瓊不受代當別除汝一鎮勿以力取恐為患滋深重榮由是以帝為怯謂人曰祕瓊匹夫耳天子尚畏之況我以將相之重士民之衆乎舊五代史考異嘗因暴怒殺部校賈章以謀叛聞章有女一人時欲捨之女曰我家三十口繼經兵亂死者二十八口今父就刑存此身何為再三請死亦殺之鎮人由是惡重榮之酷而嘉賈女之烈焉天福中朝廷姑息契丹務安邊塞重榮每見蕃使必以箕踞慢罵會有梅里數十騎由其境內交言不遜因盡殺之契丹主大怒責讓朝廷朝廷隱忍未即加罪重榮乃密搆吐渾等諸族以為援助上表論之其略曰臣昨據熟吐渾節度使白承福赫連公德等各領本族三萬餘帳自應州地界奔歸王化續準生吐渾幷渾苾兩突厥三部落南北將沙陀安慶九府等各領部族老小幷牛羊車帳甲馬七八路慕化歸奔俱至五臺及當府地界已來安泊累據告勞具說被契丹殘害平取生口率略羊馬凌害至甚又自今年二月後來須令點檢強壯置辦人馬衣甲告報上秋向南行營諸蕃部等實恐上天不祐殺敗後隨例不存家族所以預先歸順兼隨府族各量點檢強壯人馬約十萬衆又準沿河党項及山前山後逸利越利諸族部落等首領幷差人各將契丹所授官告職牒旗號來送納例皆號泣告勞稱被契丹凌虐憤惋不已情願點集甲馬會合殺戮續又朔州節度副使趙崇與本城將校殺偽節度使劉山尋已安撫軍城乞歸朝廷臣相次具奏聞昨奉宣頭及累傳聖旨令臣凡有往復契丹更須承奉當候彼生頭角不欲自起釁端貴守初終不愆信誓仰認睿旨深惟匿瑕其如天道人心至務勝殘去虐須知機不可失時不再來竊以諸蕃不招呼而自至朔郡不攻伐以自歸蓋繫人情盡由天意更念諸陷蕃節度使等本自勳勞早居富貴沒身邊塞遭酷虐以異常企足朝廷冀傾輸而不已如聞傳檄盡願倒戈如臣者雖是愚蒙粗知可否不思忌諱罄寫丹衷細具敷陳冀裨萬一其表數千言大抵指斥高祖稱臣奉表罄中國珍異貢獻契丹凌虐漢人竟無厭足又以此意為書遺諸朝貴及藩鎮諸侯高祖憂其變也遂幸鄴都以詔諭之凡有十焉其略曰爾身為大臣家有老母忿不思難棄君與親吾因契丹而興基業爾因吾而致富貴吾不敢忘爾可忘耶且前代和親只為安邊今吾以天下臣之爾欲以一鎮抗之大小不等無自辱焉重榮愈恣縱不悛雖有此奏亦密令人與契丹幽州帥劉晞結託蓋重榮有內顧之心契丹幸我多事復欲侵吞中國契丹之怒重榮亦非本志也時重榮嘗與北來蕃使並轡而行指飛鳥射之應弦而落觀者萬衆無不快抃蕃使因輟所乘馬以慶之由是名振北方自謂天下可以一箭而定也又重榮素與襄州安從進連結及聞從進將議起兵其奸謀乃決天福六年冬大集境內饑民衆至數萬揚旌向闕聲言入覲朝廷遣杜重威帥師禦之遇於宗城軍纔成列有賊將趙彥之臨陣卷旗來奔重榮方戰聞彥之背己大恐退於輜重中王師因而擊之一鼓而潰重榮與十餘騎北走其下部衆屬嚴冬寒冽殺戮及凍死者二萬餘人重榮至鎮取牛馬革旋為甲使郡人分守夾城以待王師案宋史解暉傳安重榮反鎮州因舉兵向闕至宗城晉師逆戰大破之暉募軍中壯士百餘人夜擣賊壘殺獲甚衆暉頻中流矢而督戰自若顏色不撓以功遷列校舊五代史考異杜重威至有部將自西郭水門引官軍入焉殺守陴百姓萬餘人重威尋害導者自收其功重榮擁吐渾數百匿於牙城重威使人襲而得之斬首以進高祖御樓閱其俘馘宣露布訖遣漆其頭顱函送契丹永樂大典卷一萬八千一百三十二五代史補安重榮出鎮常懷不軌之計久矣但未發居無何中產朱鬃白馬黑鴉生五色雛以為鳳乃欣然謂天命在己遂舉兵反指揮令取宗嶺路以向闕時父老聞之往往竊議曰事不諧矣且王姓安氏曰鞍得背而穩何不取路貝州若由宗嶺是安及於鬃得無危乎未幾與王師先鋒遇一戰而敗安從進案歐陽史從進其先索葛部人也初事莊宗為護駕馬軍都指揮使領貴州刺史明宗時為保義彰武軍節度使愍帝即位徙領順化清泰中徙鎮山南東道晉高祖即位加同中書門下平章事天福六年高祖幸鄴討安重榮少帝以鄭王留守京師時和凝請於高祖曰陛下北征臣料安從進必反何以制之高祖曰卿意將奈何凝曰臣聞之兵法先人者奪人願陛下為空名宣敕十通授鄭王有急則命將往從進聞高祖往北遂反少帝以空名授李建崇郭金海討之從進引兵攻鄧州不克進至湖陽遇建崇等大駭以為神速復為野火所燒遂大敗從進自焚永樂大典卷二萬四百七十案薛史安從進傳殘闕所存一條與歐陽史大略相同張彥澤其先出於突厥後為太原人也祖父世為陰山府裨將彥澤少有勇力目睛黃而夜有光色顧視若鷙獸焉以騎射事後唐莊宗明宗以從戰有功繼領郡守高祖即位擢為曹州刺史從楊光遠圍范延光於鄴以功授華州節度使尋移鎮涇州累官至檢校太保有從事張式者以宗人之分受其知遇時彥澤有子為內職素不叶父意數行笞撻懼其楚毒逃竄外地齊州捕送到闕勅旨釋罪放歸父所彥澤上章請行朝典式以有傷名教屢諫止之彥澤怒引弓欲射之式慬而獲免尋令人逐式出衙式自為賓從彥澤委以庶務左右羣小惡之久矣因此讒搆互來迫脅云書記若不便出斷定必遭屠害式乃告病尋醫攜其妻子將奔衍州彥澤遣指揮使李興領二十騎追之戒曰張式如不從命即斬取頭來式懇告刺史遂差人援送到汾州節度使李周驛騎以聞朝廷以姑息彥澤之故有勅流式於商州彥澤遣行軍司馬鄭元昭詣闕論請面奏云彥澤若不得張式恐致不測高祖不得已而從之既至決口割心斷手足而死之式父鐸詣闕訴寃朝廷命王周代之周至任奏彥澤在郡惡跡二十六條逃散五千餘戶彥澤既赴闕刑法官李濤等上章請理其罪高祖下制止令削奪一階一爵而已時以為失刑少帝即位桑維翰復舉之尋出鎮安陽既至折節於士大夫境內稱理旋命領軍北屯定時易州地孤漕運不繼制令邢魏相衞飛輓以輸之百姓荷擔纍纍於路彥澤每援之以行見羸困者使其部衆代而助之洎至北邊不令百姓深入即遣騎士以馬負糧而去往來既速且無邀奪之患聞者嘉之陽城之戰彥澤之功出於諸將之右其後與敵接戰頻獻捷於闕下咸謂其感高祖不殺之恩補昔年之過也開運三年冬契丹既南牧杜重威兵次瀛州彥澤為契丹所啖密已變矣乃通款於戎王請為前導因促騎說重威引軍沿滹沱西援常山既而與重威通謀及王師降於中渡契丹主遣彥澤統二千騎趨京師以制少帝且示公卿兆民以存撫之意彥澤以是歲十二月十六日夜自封丘門斬關而入以兵圜宮城翌日遷帝於開封府舍凡內帑奇貨悉輦歸私邸仍縱軍大掠兩日方止案東都事略李處耘傳云居京師遇張彥澤之暴處耘善射獨當里門殺數十人里中賴之舊五代史考異時桑維翰為開封尹彥澤召至麾下待之不以禮維翰責曰去年拔公於罪人之中復領大鎮授以兵權何負恩一至此耶彥澤無以對是夜殺維翰盡取其家財彥澤自謂有功於契丹晝夜以酒樂自娛當在京巡檢之時出入騎從常數百人旗幟之上題曰赤心為主觀者無不竊笑又所居第財貨山積楚國夫人丁氏即少帝弟曹州節度使延煦之母也有容色彥澤使人取之太后遲迴未與彥澤立遣人載之而去其負國欺君也如是數日之內恣行殺害或軍士擒獲罪人至前彥澤不問所犯但瞋目出一手竪三指而已軍士承其意即出外斷其腰領焉彥澤與偽閤門使高勳不協因乘醉至其門害其仲父季弟暴屍於門外及契丹帳泊於北郊勳訴寃於戎王時戎王已怒彥澤剽掠京城遂令鎖之仍以彥澤罪惡宣示百官及京城士庶且云彥澤之罪合誅與否百官連狀具言罪在不赦巿肆百姓亦爭投狀疏彥澤之罪戎王知其衆怒遂令棄巿仍令高勳監決斷腕出鎖然後刑之勳使人剖其心以祭死者巿人爭其肉而食之永樂大典卷六千三百五十五代史補李濤常忿張彥澤殺邠州幕吏張式而取其妻濤率同列上疏請誅彥澤以謝西土高祖方姑息武夫竟不從未幾契丹南侵至中渡橋彥澤首降戎主喜命以本軍統蕃部控弦之士先入京師彥澤自以功不世出乃挾宿憾殺開封尹桑維翰濤聞之謂親知曰吾曾上疏請誅彥澤今國家失守彥澤所為如此吾之首領庸可保乎然無可奈何誰能伏藏溝瀆而取辱耶於是自寫門狀求見彥澤其狀云上疏請殺太尉人李濤謹隨狀納命彥澤覽之欣然降階迎之然濤猶未安復曰太尉果然相恕乎彥澤曰覽公門狀見納命二字使人怒氣頓息又何憂哉濤素滑稽知其必免又戲為伶人詞曰太尉既相恕何不將壓驚絹來彥澤大笑卒善待之趙德鈞本名行實幽州人也少以騎射事滄州連帥劉守文守文為弟守光所害遂事守光署為幽州軍校及唐莊宗伐幽州德鈞知其必敗乃遁歸莊宗莊宗善待之賜姓名曰紹斌累歷郡守從平梁遷滄州節度使同光三年移鎮幽州明宗即位遂歸本姓始改名德鈞其子延壽尚明宗女興平公主故德鈞尤承倚重天成中定州王都反契丹遣惕隱領精騎五千來援都至唐河為招討使王晏球所敗會霖雨相繼所在泥淖敗兵北走人馬饑疲德鈞於要路邀之盡獲餘衆擒惕隱已下首領數十人獻於京師明年王都平加兼侍中頃之加東北面招討使德鈞奏發河北數鎮丁夫開王馬口至游口以通水運凡二百里又於閻溝築壘以戍兵守之因名良鄉縣以備鈔寇又於幽州東築三河城北接薊州頗為形勝之要部民由是稍得樵牧德鈞鎮幽州凡十餘年案遼史天贊六年遣人以詔賜盧龍軍節度使趙德鈞七年趙德鈞遣人進時果蓋德鈞久在邊境嘗與契丹通好也舊五代史考異甚有善政累官至, WYG: 總管}
  - {type: variant, offset: 43, length: 3760, content: 軍都指揮使重榮有膂力善騎射唐長興中為振武道巡邊指揮使犯罪下獄時高行周為帥欲殺之其母赴闕申告樞密使安重誨陰護之重誨原本作仲誨今據通鑑改正影庫本粘籤奏於明宗有詔釋焉張敬達之圍晉陽也高祖聞重榮在代北使人誘之案歐陽史作使張頴陰招重榮舊五代史考異重榮乃召邊士得千騎赴焉高祖大喜誓以土地及即位授成德軍節度使累加至使相自梁唐已來藩侯郡牧多以勳授不明治道例為左右羣小惑亂賣官鬻獄割剝蒸民率有貪猥之名其實賄賂半歸於下惟重榮自能鉤距凡有爭訟多廷辯之至於倉庫耗利百姓科徭悉入於己諸司不敢窺覬嘗有夫婦共訟其子不孝者重榮面加詰責抽劍令自殺之其父泣曰不忍也其母詬詈仗劍逐之重榮疑而問之乃其繼母也因叱出自後射之一箭而斃聞者莫不快意由此境內以為強明大得民情重榮起於軍伍暴獲富貴復覩累朝自節鎮遽升大位每謂人曰天子兵彊馬壯者當為之寧有種耶又以奏請過當為權臣所否心常憤憤遂畜聚亡命收巿戰馬有飛揚跋扈之志案通鑑云帝之遣重榮代祕瓊也戒之曰瓊不受代當別除汝一鎮勿以力取恐為患滋深重榮由是以帝為怯謂人曰祕瓊匹夫耳天子尚畏之況我以將相之重士民之衆乎舊五代史考異嘗因暴怒殺部校賈章以謀叛聞章有女一人時欲捨之女曰我家三十口繼經兵亂死者二十八口今父就刑存此身何為再三請死亦殺之鎮人由是惡重榮之酷而嘉賈女之烈焉天福中朝廷姑息契丹務安邊塞重榮每見蕃使必以箕踞慢罵會有梅里數十騎由其境內交言不遜因盡殺之契丹主大怒責讓朝廷朝廷隱忍未即加罪重榮乃密搆吐渾等諸族以為援助上表論之其略曰臣昨據熟吐渾節度使白承福赫連公德等各領本族三萬餘帳自應州地界奔歸王化續準生吐渾幷渾苾兩突厥三部落南北將沙陀安慶九府等各領部族老小幷牛羊車帳甲馬七八路慕化歸奔俱至五臺及當府地界已來安泊累據告勞具說被契丹殘害平取生口率略羊馬凌害至甚又自今年二月後來須令點檢強壯置辦人馬衣甲告報上秋向南行營諸蕃部等實恐上天不祐殺敗後隨例不存家族所以預先歸順兼隨府族各量點檢強壯人馬約十萬衆又準沿河党項及山前山後逸利越利諸族部落等首領幷差人各將契丹所授官告職牒旗號來送納例皆號泣告勞稱被契丹凌虐憤惋不已情願點集甲馬會合殺戮續又朔州節度副使趙崇與本城將校殺偽節度使劉山尋已安撫軍城乞歸朝廷臣相次具奏聞昨奉宣頭及累傳聖旨令臣凡有往復契丹更須承奉當候彼生頭角不欲自起釁端貴守初終不愆信誓仰認睿旨深惟匿瑕其如天道人心至務勝殘去虐須知機不可失時不再來竊以諸蕃不招呼而自至朔郡不攻伐以自歸蓋繫人情盡由天意更念諸陷蕃節度使等本自勳勞早居富貴沒身邊塞遭酷虐以異常企足朝廷冀傾輸而不已如聞傳檄盡願倒戈如臣者雖是愚蒙粗知可否不思忌諱罄寫丹衷細具敷陳冀裨萬一其表數千言大抵指斥高祖稱臣奉表罄中國珍異貢獻契丹凌虐漢人竟無厭足又以此意為書遺諸朝貴及藩鎮諸侯高祖憂其變也遂幸鄴都以詔諭之凡有十焉其略曰爾身為大臣家有老母忿不思難棄君與親吾因契丹而興基業爾因吾而致富貴吾不敢忘爾可忘耶且前代和親只為安邊今吾以天下臣之爾欲以一鎮抗之大小不等無自辱焉重榮愈恣縱不悛雖有此奏亦密令人與契丹幽州帥劉晞結託蓋重榮有內顧之心契丹幸我多事復欲侵吞中國契丹之怒重榮亦非本志也時重榮嘗與北來蕃使並轡而行指飛鳥射之應弦而落觀者萬衆無不快抃蕃使因輟所乘馬以慶之由是名振北方自謂天下可以一箭而定也又重榮素與襄州安從進連結及聞從進將議起兵其奸謀乃決天福六年冬大集境內饑民衆至數萬揚旌向闕聲言入覲朝廷遣杜重威帥師禦之遇於宗城軍纔成列有賊將趙彥之臨陣卷旗來奔重榮方戰聞彥之背己大恐退於輜重中王師因而擊之一鼓而潰重榮與十餘騎北走其下部衆屬嚴冬寒冽殺戮及凍死者二萬餘人重榮至鎮取牛馬革旋為甲使郡人分守夾城以待王師案宋史解暉傳安重榮反鎮州因舉兵向闕至宗城晉師逆戰大破之暉募軍中壯士百餘人夜擣賊壘殺獲甚衆暉頻中流矢而督戰自若顏色不撓以功遷列校舊五代史考異杜重威至有部將自西郭水門引官軍入焉殺守陴百姓萬餘人重威尋害導者自收其功重榮擁吐渾數百匿於牙城重威使人襲而得之斬首以進高祖御樓閱其俘馘宣露布訖遣漆其頭顱函送契丹永樂大典卷一萬八千一百三十二五代史補安重榮出鎮常懷不軌之計久矣但未發居無何中產朱鬃白馬黑鴉生五色雛以為鳳乃欣然謂天命在己遂舉兵反指揮令取宗嶺路以向闕時父老聞之往往竊議曰事不諧矣且王姓安氏曰鞍得背而穩何不取路貝州若由宗嶺是安及於鬃得無危乎未幾與王師先鋒遇一戰而敗安從進案歐陽史從進其先索葛部人也初事莊宗為護駕馬軍都指揮使領貴州刺史明宗時為保義彰武軍節度使愍帝即位徙領順化清泰中徙鎮山南東道晉高祖即位加同中書門下平章事天福六年高祖幸鄴討安重榮少帝以鄭王留守京師時和凝請於高祖曰陛下北征臣料安從進必反何以制之高祖曰卿意將奈何凝曰臣聞之兵法先人者奪人願陛下為空名宣敕十通授鄭王有急則命將往從進聞高祖往北遂反少帝以空名授李建崇郭金海討之從進引兵攻鄧州不克進至湖陽遇建崇等大駭以為神速復為野火所燒遂大敗從進自焚永樂大典卷二萬四百七十案薛史安從進傳殘闕所存一條與歐陽史大略相同張彥澤其先出於突厥後為太原人也祖父世為陰山府裨將彥澤少有勇力目睛黃而夜有光色顧視若鷙獸焉以騎射事後唐莊宗明宗以從戰有功繼領郡守高祖即位擢為曹州刺史從楊光遠圍范延光於鄴以功授華州節度使尋移鎮涇州累官至檢校太保有從事張式者以宗人之分受其知遇時彥澤有子為內職素不叶父意數行笞撻懼其楚毒逃竄外地齊州捕送到闕勅旨釋罪放歸父所彥澤上章請行朝典式以有傷名教屢諫止之彥澤怒引弓欲射之式慬而獲免尋令人逐式出衙式自為賓從彥澤委以庶務左右羣小惡之久矣因此讒搆互來迫脅云書記若不便出斷定必遭屠害式乃告病尋醫攜其妻子將奔衍州彥澤遣指揮使李興領二十騎追之戒曰張式如不從命即斬取頭來式懇告刺史遂差人援送到汾州節度使李周驛騎以聞朝廷以姑息彥澤之故有勅流式於商州彥澤遣行軍司馬鄭元昭詣闕論請面奏云彥澤若不得張式恐致不測高祖不得已而從之既至決口割心斷手足而死之式父鐸詣闕訴寃朝廷命王周代之周至任奏彥澤在郡惡跡二十六條逃散五千餘戶彥澤既赴闕刑法官李濤等上章請理其罪高祖下制止令削奪一階一爵而已時以為失刑少帝即位桑維翰復舉之尋出鎮安陽既至折節於士大夫境內稱理旋命領軍北屯定時易州地孤漕運不繼制令邢魏相衞飛輓以輸之百姓荷擔纍纍於路彥澤每援之以行見羸困者使其部衆代而助之洎至北邊不令百姓深入即遣騎士以馬負糧而去往來既速且無邀奪之患聞者嘉之陽城之戰彥澤之功出於諸將之右其後與敵接戰頻獻捷於闕下咸謂其感高祖不殺之恩補昔年之過也開運三年冬契丹既南牧杜重威兵次瀛州彥澤為契丹所啖密已變矣乃通款於戎王請為前導因促騎說重威引軍沿滹沱西援常山既而與重威通謀及王師降於中渡契丹主遣彥澤統二千騎趨京師以制少帝且示公卿兆民以存撫之意彥澤以是歲十二月十六日夜自封丘門斬關而入以兵圜宮城翌日遷帝於開封府舍凡內帑奇貨悉輦歸私邸仍縱軍大掠兩日方止案東都事略李處耘傳云居京師遇張彥澤之暴處耘善射獨當里門殺數十人里中賴之舊五代史考異時桑維翰為開封尹彥澤召至麾下待之不以禮維翰責曰去年拔公於罪人之中復領大鎮授以兵權何負恩一至此耶彥澤無以對是夜殺維翰盡取其家財彥澤自謂有功於契丹晝夜以酒樂自娛當在京巡檢之時出入騎從常數百人旗幟之上題曰赤心為主觀者無不竊笑又所居第財貨山積楚國夫人丁氏即少帝弟曹州節度使延煦之母也有容色彥澤使人取之太后遲迴未與彥澤立遣人載之而去其負國欺君也如是數日之內恣行殺害或軍士擒獲罪人至前彥澤不問所犯但瞋目出一手竪三指而已軍士承其意即出外斷其腰領焉彥澤與偽閤門使高勳不協因乘醉至其門害其仲父季弟暴屍於門外及契丹帳泊於北郊勳訴寃於戎王時戎王已怒彥澤剽掠京城遂令鎖之仍以彥澤罪惡宣示百官及京城士庶且云彥澤之罪合誅與否百官連狀具言罪在不赦巿肆百姓亦爭投狀疏彥澤之罪戎王知其衆怒遂令棄巿仍令高勳監決斷腕出鎖然後刑之勳使人剖其心以祭死者巿人爭其肉而食之永樂大典卷六千三百五十五代史補李濤常忿張彥澤殺邠州幕吏張式而取其妻濤率同列上疏請誅彥澤以謝西土高祖方姑息武夫竟不從未幾契丹南侵至中渡橋彥澤首降戎主喜命以本軍統蕃部控弦之士先入京師彥澤自以功不世出乃挾宿憾殺開封尹桑維翰濤聞之謂親知曰吾曾上疏請誅彥澤今國家失守彥澤所為如此吾之首領庸可保乎然無可奈何誰能伏藏溝瀆而取辱耶於是自寫門狀求見彥澤其狀云上疏請殺太尉人李濤謹隨狀納命彥澤覽之欣然降階迎之然濤猶未安復曰太尉果然相恕乎彥澤曰覽公門狀見納命二字使人怒氣頓息又何憂哉濤素滑稽知其必免又戲為伶人詞曰太尉既相恕何不將壓驚絹來彥澤大笑卒善待之趙德鈞本名行實幽州人也少以騎射事滄州連帥劉守文守文為弟守光所害遂事守光署為幽州軍校及唐莊宗伐幽州德鈞知其必敗乃遁歸莊宗莊宗善待之賜姓名曰紹斌累歷郡守從平梁遷滄州節度使同光三年移鎮幽州明宗即位遂歸本姓始改名德鈞其子延壽尚明宗女興平公主故德鈞尤承倚重天成中定州王都反契丹遣惕隱領精騎五千來援都至唐河為招討使王晏球所敗會霖雨相繼所在泥淖敗兵北走人馬饑疲德鈞於要路邀之盡獲餘衆擒惕隱已下首領數十人獻於京師明年王都平加兼侍中頃之加東北面招討使德鈞奏發河北數鎮丁夫開王馬口至游口以通水運凡二百里又於閻溝築壘以戍兵守之因名良鄉縣以備鈔寇又於幽州東築三河城北接薊州頗為形勝之要部民由是稍得樵牧德鈞鎮幽州凡十餘年案遼史天贊六年遣人以詔賜盧龍軍節度使趙德鈞七年趙德鈞遣人進時果蓋德鈞久在邊境嘗與契丹通好也舊五代史考異甚有善政累官至, krp: 總管}
