  - {type: variant, offset: 4169, length: 351, content: 騰踐死者萬計時德鈞有愛將時賽率輕騎東還漁陽其部曲尚千餘人與散亡之卒俱集於潞州是日潞州節度使高行周亦自北還及至府門見德鈞父子在城闉上行周謂曰某與大王鄉人宜以忠言相告城中無斗粟可食請大王速迎車駕自圖安計無取後悔焉德鈞遂與延壽出降契丹高祖至德鈞父子迎謁於馬前高祖不禮之時契丹主問德鈞曰汝在幽州日所置銀鞍契丹直何在德鈞指示之契丹盡殺於潞之西郊遂鎖德鈞父子入蕃及見國母述律氏盡以一行財寶及幽州田宅籍而獻之國母謂之曰汝父子自覓天子何耶德鈞俛首不能對案通鑑云太后問曰汝近者何為在太原德鈞曰奉唐主之命太后曰汝從吾兒求為天子何妄語耶又自指其心曰此不可欺也又曰吾兒將行吾戒之云趙大王若引兵北向榆關亟須引歸太原不可救也汝欲為天子何不先擊退吾兒徐圖亦未晚汝為人臣既負其主不能擊敵又欲乘亂邀利所為如此何面目復求生乎德鈞俛首不能對, WYG: 温今改}
