  - {type: variant, offset: 6212, length: 1727, content: 案以下有闕文礪為戎王翰林學士開運末與契丹居南松門之內軒轡交織多繼燭接洽無厭倦色因密言曰此胡用法如此豈能久處京師及北去道路有觴酒豆肉必遺故客屬僚死之日囊裝惟酒食器皿而已識者無不高之冊府元龜卷七百九十六張礪字夢臣磁州滏陽人也祖慶父寶世為農礪幼嗜學有文藻在布衣時或覩民間爭競必為親詣公府辨其曲直其負氣也如此唐同光初擢進士第尋拜左拾遺直史館會郭崇韜伐蜀奏請礪掌軍書蜀平崇韜為魏王繼岌所誅時崇韜左右親信皆懼禍奔逃惟礪詣魏王府第慟哭久之時人皆服其高義及魏王班師礪從副招討使任圜東歸至利州會康延孝叛迴據漢州圜奉魏王命迴軍西討延孝時礪獻謀于圜請伏精兵于後先以羸師誘之圜深以為然延孝本驍將也任圜乃儒生也延孝聞圜至又覩其羸師殊不介意及戰酣圜發精兵以擊之延孝果敗遂擒之以歸是歲四月五日至鳳翔內官向延嗣奉莊宗命令誅延孝監軍李延襲已聞洛中有變故留延孝且害任圜之功故也圜未決礪謂圜曰此賊構亂遂致凱旋差晚且明公血戰擒賊安得違詔養禍是破檻放虎自貽其咎也公若不決余自殺此賊任圜不得已遂誅延孝天成初明宗知其名召為翰林學士再丁父母憂服闋皆復入為學士歷禮部兵部員外郎知制誥充職未幾父之妾卒初妾在世礪以久侍先人頗亦敬奉諸幼子亦以祖母呼之及卒礪疑其事詢于同僚未有以對礪即託故歸于滏陽閒居三年不行其服論情制宜識者韙之清泰中復授尚書比部郎中知制誥依前充學士高祖起于晉陽唐末帝命趙延壽進討又命翰林學士和凝與延壽偕行礪素輕凝慮不能集事因自請行唐末帝慰而許之及唐軍敗于團柏谷與延壽俱陷于契丹契丹以舊職縻之累官至吏部尚書契丹入汴授右僕射平章事集賢殿大學士隨至鎮州會契丹主卒永康王北去蕭翰自東京過常山乃引鐵騎圍其第時礪有疾方伏枕翰見礪責之曰爾言于先帝云不得任蕃人作節度使如此則社稷不永矣又先帝來時令我于汴州大內安下爾言不可又我為汴州節度使爾在中書何故行帖與我礪抗聲而對辭氣不屈翰遂鎖礪而去案遼史云礪抗聲曰此國家大體安危所係吾實言之欲殺即殺奚以鎖為舊五代史考異鎮州節度使麻答尋解其鎖是夜以疾卒家人燼其骨歸葬于滏陽礪素耿直嗜酒無檢始陷契丹時曾背契丹南歸為追騎所獲契丹主怒曰爾何捨我而去礪曰礪漢人也衣服飲食與此不同生不如死請速就刃契丹主顧通事高唐英曰我常戒爾輩善待此人致其逃去過在爾輩因笞唐英一百其為契丹主善待也如此礪平生抱義憐才急于奬拔聞人之善必攘袂以稱之見人之貧亦倒篋以濟之故死之之日中朝士大夫亦皆嘆惜焉蕭翰者契丹諸部之酋長也父曰阿鉢劉仁恭鎮幽州阿鉢曾引衆寇平州仁恭遣驍將劉鴈郎與其子守光率五百騎先守其州阿鉢不知為郡人所紿因赴牛酒之會為守光所擒契丹請贖之仁恭許其請尋歸其妹為阿保機妻則德光之母也翰有妹亦嫁於德光故國人謂翰為國舅契丹入東京以翰為宣武軍節度使契丹比無姓氏翰將有節度之命乃以蕭為姓翰為名自是翰之一族皆稱姓蕭契丹主北去留翰以鎮河南時漢高祖已建號於太原翰懼將北歸慮京師無主則衆皆為亂乃遣蕃騎至洛京迎唐明宗幼子許王從益知南朝軍國事從益至翰率蕃將拜於殿上翌日翰乃輦其寶貨鞍轡而北漢人以許王既立不復為亂果中其狡計翰行至鎮州遇張礪翰以舊事致忿就第數其失而鎖之翰歸本國為永康王兀欲所鎖尋卒於本土永樂大典卷五千二百二十五案遼史翰後以謀反伏誅與薛史異舊五代史考異劉晞者涿州人也父濟雍累為本郡諸邑令長晞少以儒學稱於鄉里嘗為唐將周德威從事後陷於契丹契丹以漢職縻之天福中契丹命晞為燕京留守嘗於契丹三知貢舉歷官至同平章事兼侍中隨契丹入汴授洛京留守會河陽軍亂晞走許州又奔東京蕭翰遣兵送晞至洛下契丹主死晞自洛復至東京隨蕭翰北歸遂留鎮州漢初與麻答同奔定州後卒於北蕃永樂大典卷九千九十九案契丹國志劉珂晞之子也尚世宗妹燕國公主舊五代史考異崔廷勳不知何許人也案通鑑注引宋白曰廷勳本河內人舊五代史考異形貌魁偉美鬚髯幼陷契丹歷偽命雲州節度使官至侍中契丹入汴遷少帝於封禪寺遣廷勳以兵防守尋授河陽節度使甚得民情契丹北行武行德率軍趨河陽廷勳為行德所逐乃與奚王拽剌保懷州尋以兵反攻行德行德出戰為廷勳所敗及契丹主死遂歸鎮州漢初與麻答同奔定州後沒於北蕃永樂大典卷二千七百四十史臣曰帝王之尊必由天命雖韓信彭越之勇吳濞淮南之勢猶不可以妄冀而況二安之庸昧相輔為亂固宜其自取滅亡也後之擁強兵蒞重鎮者得不以為鑒乎彥澤狼子野心盈貫而死晚矣德鈞諸人與晉事相終始故附見于茲焉, WYG: 攷證}
