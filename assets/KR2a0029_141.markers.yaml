  - {type: variant, offset: 420, length: 0, content: '', WYG: 宋光嗣召嚴曲宴因以近事訊于嚴嚴對曰吾皇前年四月卽位于鄴宫當月下鄆州十月四日親統萬騎破賊中都乘勝鼓前遂誅汴孽僞梁尚有兵三十萬謀臣猛將解甲倒戈西盡甘涼東漸海外南踰閩浙北極幽陵牧伯侯}
  - {type: variant, offset: 420, length: 0, content: '', krp: 宋光嗣召嚴曲宴因以近事訊于嚴嚴對曰吾皇前年四月卽位于鄴宫當月下鄆州十月四日親統萬騎破賊中都乘勝鼓前遂誅汴孽僞梁尚有兵三十萬謀臣猛將解甲倒戈西盡甘涼東漸海外南踰閩浙北極幽陵牧伯侯}
  - {type: variant, offset: 421, length: 4, content: 峻遙鎮青, WYG: 稱藩不暇家財入貢府實上供呉國本朝舊臣岐下先皇元老遣子入侍述職稱藩淮海之君卑辭厚貢湖湘荆楚杭越甌閩異貨竒珍府無虛月吾皇以德懷來以威欵附順則涵之以恩澤逆則問之以干戈四海車書大同非晩光嗣曰余所未知惟岐下宋公我之姻好洞見其心反覆多端專謀䟦扈大不足信也似聞契丹部族近日稍強大國可無慮乎嚴曰子言契丹之強盛孰若僞梁曰比梁差劣也嚴曰吾國視契丹如蚤蝨耳以其無害不足爬搔吾良將勁兵布天下彼不勞一郡之兵一校之衆則懸首槀街盡為奴擄但以天生四夷當置度外不在九}
  - {type: page-break, offset: 421, content: '', id: KR2a0029_WYG_141-7a, image: WYG0277/WYG0277-0575a.png}
  - {type: variant, offset: 421, length: 4, content: 峻遙鎮青, krp: 稱藩不暇家財入貢府實上供呉國本朝舊臣岐下先皇元老遣子入侍述職稱藩淮海之君卑辭厚貢湖湘荆楚杭越甌閩異貨竒珍府無虛月吾皇以德懷來以威欵附順則涵之以恩澤逆則問之以干戈四海車書大同非晩光嗣曰余所未知惟岐下宋公我之姻好洞見其心反覆多端專謀䟦扈大不足信也似聞契丹部族近日稍強大國可無慮乎嚴曰子言契丹之強盛孰若僞梁曰比梁差劣也嚴曰吾國視契丹如蚤蝨耳以其無害不足爬搔吾良將勁兵布天下彼不勞一郡之兵一校之衆則懸首槀街盡為奴擄但以天生四夷當置度外不在九}
