  - {type: variant, offset: 158, length: 0, content: '', WYG: 此吾書誘諭投之于側何相負耶洪大罵曰老賊爾為天子鎭帥何苦反耶爾旣孤恩背主吾與爾何恩而云相負爾為李七郎奴掃馬糞得一臠殘炙感恩無盡今明天子付與茅土貴為諸侯而驅徒結黨圖為反噬爾本奴才則無恥吾忠義之士不忍為也吾可為天子死不能與人奴茍生璋怒令軍士十人持刀刲割其膚燃鑊于前自取㗖食洪至死大罵不巳明宗聞之泣下置洪二子于近衛給賜甚厚李嚴幽州人本名讓坤初仕燕為刺史渉獵書傳便弓馬有口辯多遊藝以功名自許同}
