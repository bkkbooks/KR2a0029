  - {type: variant, offset: 450, length: 0, content: '', WYG: 改河東馬歩軍都指揮使超授檢校司徒領欽州刺史三年加檢校太保應州節度使四年遷雲州時以契丹率族帳自黒榆林至云借漢界水草敬達每聚兵塞下以遏其衝契丹竟不敢南牧邊人頼之清泰中自彭門移鎭平陽加檢校太傅從石敬瑭為北靣兵馬副總管仍屯兵鴈門未幾晉高祖建義末帝詔以敬達為北靣行營都招討使仍使悉引部下兵圍太原以定州節度使楊光遠副焉尋統兵三萬營于晉}
