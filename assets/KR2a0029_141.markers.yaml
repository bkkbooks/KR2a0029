  - {type: 'tls:seg', offset: 426, content: '', id: KR2a0029_ZHSJ_141-d141p63s3}
  - {type: variant, offset: 426, length: 0, content: '', WYG: 之本未欲窮兵黷武也光嗣聞辯對畏而竒之時王衍失政嚴知其可取使還具奏故平蜀之謀始于嚴郭崇韜起軍之日以嚴為三川招撫使嚴與先鋒使康延孝將兵五千先驅閣道或馳以詞説或威以兵鋒大軍未及所在降下延孝在漢州王衍與書曰可請李司空先來余卽舉城納欵衆咸以討蜀之謀始于嚴衍以甘言將誘而殺之欲不令徃嚴聞之喜卽馳騎入益州衍見嚴于母前以母妻為託即日引蜀使歐陽彬迎謁魏王繼岌蜀平班師㑹明宗即位遷泗州防禦使兼客省使長興初安重誨謀欲控制兩川嚴乃求為西川兵馬都監庻効方略孟知祥覺之旣至執而害之九國志王彦銖傳李嚴之為監軍也密懐異謀知祥數其過命彦銖擒斬之嚴之左右無敢動者贈太保嚴之母賢明婦人初嚴將赴蜀母曰汝前啟破蜀之謀今又入蜀將死報蜀人矣與汝永訣旣而果如其言李仁矩本明宗在藩鎭時客將也明宗卽位録其趨走之勞擢居内職復為安重誨所庇故數年之間遷為客省使左衛大將軍天成中因奉使東川董璋張筵以召之仁矩貪于館舍與娼妓酣飲日旣中而不至大為璋所詬辱自是深銜之長興初璋旣䟦扈于東川重誨奏以仁矩為閬州節度使俾伺璋之反狀時物議以為不及仁矩至鎭偵璋所為曲形奏報地里遐僻朝廷莫知事實激成璋之逆節由仁矩也長興元年冬十月璋自率兇黨以攻其城仁矩召軍校謀守戰利害皆曰璋乆圖反計以賂誘士心凶氣方盛未可與戰宜堅壁以守之儻旬浹之間大軍東至卽賊必退仁矩曰蜀兵懦安能當我精甲卽驅之岀戰兵未交為賊所敗旣而城䧟仁矩被擒舉族為璋所害康思立晉陽人也少善騎射事武皇為爪牙署河東親騎軍使莊宗嗣位從解圍于上黨敗梁人于栢鄉及平薊兵後戰于河上皆}
