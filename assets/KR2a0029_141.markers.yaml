  - {type: variant, offset: 465, length: 1, content: 妖, WYG: 力時督事者每有所構則暴風大雨平地水深數尺而城栅崩墮竟不能合其圍九月契丹至敬達大敗尋為所圍晉高祖及蕃衆自晉安寨南門外長百餘里闊五十里布以氊帳用毛索掛鈴而部伍多畜犬以備警急營中嘗有夜遁者岀則犬吠鈴動跬歩不能行焉自是敬達與麾下部曲五萬人馬萬匹無由四奔但見穹廬如崗阜相屬諸軍相顧失色始則削木篩糞以飼其馬日望朝廷救軍及漸羸死則與將士分食之馬盡食殫副將楊光遠次將安審琦知不濟勸敬達宜早降以求自安敬達曰吾受恩于明宗位歴方鎭主上授我大柄而失律如此已有愧于心}
