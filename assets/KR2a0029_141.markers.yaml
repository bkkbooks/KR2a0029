  - {type: variant, offset: 145, length: 3, content: 高尼辭, WYG: 散指揮都頭名為散員命行欽為都部署賜姓名紹榮莊宗好戰勇于大敵或臨陣有急兵行欽必横身解鬬翼圍之莊宗之營于徳勝也與汴軍戰于潘張王師不利諸軍奔亂莊宗得三四騎而旋中野為汴軍數百騎攢矟攻之事將不測行欽識其幟急馳一騎奮劎斷二矛斬一級汴軍乃解圍翼莊宗還宫莊宗因流涕言曰富貴與卿共之自是寵冠諸將官至檢校太傅忻州刺史及莊宗平梁授武寧軍節度使嘗因内宴羣臣使相預會行欽官為保傅當地褥下坐酒酣樂作莊宗叙生平戰陣之事因左右顧視曰紹榮安在所司奏云有勅使相預會紹榮散官殿上無位莊宗徹會不懌翌日以行欽為同平章事由是不宴百官于内殿但宴武臣而巳三年行欽喪婦莊宗有所愛宫人生皇子者劉皇后心忌之會行欽入侍莊宗勞之曰紹榮喪婦復娶耶吾給爾婚財皇后指所忌宫人謂莊宗曰皇帝憐紹榮可使為婦莊宗難違所請微許之皇后即命紹榮謝之未退肩輿巳岀莊宗心不懌佯不豫者累日業巳遣去無如之何及貝州軍亂趙在禮入魏州莊宗方擇將皇后曰小事不勞大將促紹勞指揮可也乃以行欽為鄴都行營招撫使領騎二千進討洎至鄴城攻之不能下退保于澶州未幾諸道之師稍集復進軍于鄴城之南及明宗為帥領軍至鄴行欽來謁于軍中拜起之際誤呼萬嵗者再明宗驚駭遏之方止旣而明宗營于城西行欽營于城南三月八日夜明宗為亂軍所迫惟行欽之軍不動按甲以自固明宗密令張䖍釗至行欽營戒之曰且堅壁勿動計會同殺亂軍莫錯疑誤行欽不聼將歩騎萬人棄甲而退自知失䇿且保衛州因誣奏明宗曰鎭帥巳入賊軍終不為國使明宗旣刼岀鄴城令人走馬上章申理其事言臣且于近}
