  - {type: variant, offset: 149, length: 0, content: '', WYG: 聽進止莊宗覽奏釋然曰吾知紹榮妄矣因令白從訓與明宗子繼璟至軍前欲令見明宗行欽縶繼璟于路明宗凡奏軍機拘留不逹故旬日之間音驛斷絶及莊宗岀成臯知明宗在黎陽復令繼璟渡河召明宗行欽即殺之仍勸班師四月一日莊宗旣崩行欽引皇后存渥得七百騎岀師子門將之河中就存霸沿路部下解散從者數騎而巳四日至平陸縣界為百姓所擒縣令裴進折其足檻車以獻明宗即位詔削奪行欽在身官爵斬于洛陽夏魯竒字邦傑青州}
  - {type: page-break, offset: 149, content: '', id: KR2a0029_WYG_141-4a, image: WYG0277/WYG0277-0573c.png}
  - {type: variant, offset: 149, length: 0, content: '', krp: 聽進止莊宗覽奏釋然曰吾知紹榮妄矣因令白從訓與明宗子繼璟至軍前欲令見明宗行欽縶繼璟于路明宗凡奏軍機拘留不逹故旬日之間音驛斷絶及莊宗岀成臯知明宗在黎陽復令繼璟渡河召明宗行欽即殺之仍勸班師四月一日莊宗旣崩行欽引皇后存渥得七百騎岀師子門將之河中就存霸沿路部下解散從者數騎而巳四日至平陸縣界為百姓所擒縣令裴進折其足檻車以獻明宗即位詔削奪行欽在身官爵斬于洛陽夏魯竒字邦傑青州}
  - {type: variant, offset: 150, length: 0, content: '', WYG: 也初事宣武軍為軍校與主將不協遂歸于莊宗以為䕶衛指揮使從周德威攻幽州燕將有單廷珪元行欽時稱驍勇魯竒與之鬬两不能解將士皆釋兵縱觀幽州平魯竒功居多梁將劉鄩在洹水莊宗深入致師鄩設伏于魏縣西南葭蘆中莊宗不滿千騎汴人伏兵萬餘大譟而起圍莊宗數重魯竒與王門關烏德兒等奮命決戰自午至申俄而李存審兵至方解魯竒持槍擕劎獨衛莊宗手殺百餘人烏德兒等被擒魯竒傷夷徧體自是莊宗尤憐之歴磁州刺史中都之戰汴人大敗魯竒見王彦章識之單馬追及搶擬其頸彦章顧曰爾非余故人乎即擒之以獻莊宗壯之賞絹千匹九國志趙庭隱𫝊王彦章守中都庭隱在其軍中及彦章敗庭隱為莊宗所獲將以就戮大將夏魯竒奏}
  - {type: page-break, offset: 150, content: '', id: KR2a0029_WYG_141-4b, image: WYG0277/WYG0277-0573d.png}
