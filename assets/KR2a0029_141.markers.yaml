  - {type: variant, offset: 152, length: 2, content: 地當, krp: 矬也其材可用遂釋之梁平授鄭州防禦使四年授河陽節度使天成初移鎭許州加同平章事魯竒性忠義尤通吏道撫民}
  - {type: variant, offset: 155, length: 0, content: '', WYG: 術及移鎭許田孟州之民萬衆遮道斷􅌱卧轍五日不發父老詣闕請留明宗令中使諭之方得離州明宗討荆南魯竒為副招討使頃之移鎭遂州九國志李仁罕𫝊夏魯竒稟朝廷之命繕治甲}
  - {type: page-break, offset: 155, content: '', id: KR2a0029_WYG_141-5a, image: WYG0277/WYG0277-0574a.png}
  - {type: variant, offset: 155, length: 0, content: '', krp: 術及移鎭許田孟州之民萬衆遮道斷鐙卧轍五日不發父老詣闕請留明宗令中使諭之方得離州明宗討荆南魯竒為副招討使頃之移鎭遂州九國志李仁罕𫝊夏魯竒稟朝廷之命繕治甲}
  - {type: variant, offset: 156, length: 1, content: 難, WYG: 將圖蜀孟知祥與董璋謀先取魯竒令仁罕攻遂州董璋之叛與孟知祥攻遂州援路斷絶兵盡食窮九國志李肇傳蜀帥圍夏魯竒于遂州唐師來援劎門不守肇領兵赴普安以拒之唐師不得進魯竒自刎而卒時年四十九帝聞其死也慟哭之厚給其家贈太師齊國公姚洪本梁之小校也在梁時經事董璋長興初率兵千人戍閬州璋叛領衆攻閬州璋密令人誘洪洪以大義拒之及璋攻城洪悉力拒守者三日禦備旣竭城䧟被擒璋謂洪曰爾頃為健兒由吾奬㧞}
