  - {type: variant, offset: 673, length: 227, content: 河中王珂為汴人所擄河中晉絳諸郡皆陷四月汾州刺史李瑭謀叛納款於汴嗣昭討之三日而拔斬瑭是月汴人初得蒲絳乃大舉諸道之師來逼太原汴將葛從周陷承天軍氏叔琮營洞渦驛太原四面汴軍雲合武皇憂迫計無從出嗣昭朝夕選精騎分出諸門掩擊汴營左俘右斬或燔或擊汴軍疲於奔命又屬霖雨軍多足腫腹疾糧運不繼五月氏叔琮引退嗣昭以精騎追之汴軍委棄輜重兵仗萬計六月嗣昭出師陰地陰地原本作陰陀考薛史前後皆作陰地胡三省云陰地關在晉州東北影庫本粘籤攻慈隰降其刺史唐禮張瓌是時天子在鳳翔汴人攻圍有密詔徵兵, WYG: 疑誤}
