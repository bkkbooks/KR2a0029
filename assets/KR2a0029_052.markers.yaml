  - {type: variant, offset: 2643, length: 1095, content: 轉米五萬貯於相州繼韜辭以經費不足請轉三萬有幕客魏琢牙將申蒙者申蒙原本作車蒙今據通鑑改正影庫本粘籤因入奏公事每摭陰事報繼韜云朝廷無人終為河南吞噬止遲速間耳由是陰謀叛計內官張居翰時為昭義監軍莊宗將即位詔赴鄴都潞州節度判官任圜時在鎮州亦奉詔赴鄴魏琢申蒙謂繼韜曰國家急召此二人情可知矣弟繼遠年十五六謂繼韜曰兄有家財百萬倉儲十年宜自為謀莫受人所制繼韜曰定哥以為何如曰申蒙之言是也河北不勝河南不如與大梁通盟國家方事之殷焉能討我無如此算乃令繼遠將百餘騎詐云於晉絳擒生遂至汴梁主見之喜因令董璋將兵應接營於潞州之南加繼韜同平章事改昭義軍為匡義軍繼韜令其愛子二人入質於汴及莊宗平河南繼韜惶恐計無所出將脫身於契丹會有詔赦之乃齎銀數十萬兩隨其母楊氏詣闕冀以賂免將行其弟繼遠曰兄往與不往利害一也以反為名何面更見天下不如深溝峻壁坐食積粟尚可苟延歲月往則亡無日矣或曰君先世有大功於國主上季父也弘農夫人無恙保獲萬全及繼韜至厚賂宦官伶人言事者翕然稱留後本無惡意姦人惑之故也嗣昭親賢不可無嗣楊夫人亦於宮中哀祈劉皇后后每於莊宗前泣言先人之功以動聖情由是原之在京月餘屢從畋遊寵待如故李存渥深訶詆之繼韜心不自安復賂伶閹求歸本鎮莊宗不聽繼韜潛令紀綱書諭繼遠欲軍城更變望天子遣己安撫事泄斬於天津橋南天津橋原本脫津字今從歐陽史增入影庫本粘籤二子齠年質於汴莊宗收城得之撫其背曰爾幼如是猶知能佐父造反長復何為至是亦誅仍遣使往潞州斬繼遠函首赴闕命繼儔權知軍州事繼達充軍城巡檢未幾詔繼儔赴闕時繼儔以繼韜所畜婢僕玩好之類悉為己有每日料選算校不時上路繼達怒謂人曰吾仲兄被罪父子誅死大兄不仁略無動懷而便蒸淫妻妾詰責貨財慚恥見人生不如死繼達服縗麻引數百騎坐於戟門呼曰為我反乎即令人斬繼儔首投於戟門之內副使李繼珂聞其亂也繼珂原本作繼瑽今從通鑑改正影庫本粘籤募巿人千餘攻於城門繼達登城樓知事不濟啟子城東門至其第盡殺其孥得百餘騎出潞城門將奔契丹行不十里麾下奔潰自剄於路隅天成初繼能為相州刺史母楊氏卒於太原繼能繼襲奔喪行服繼能笞掠母主藏婢責金銀數因笞至死家人告變言聚甲為亂繼能繼襲皆伏誅嗣昭諸子自相屠害幾於溘盡唯繼忠一人僅保其首領焉永樂大典卷一萬三百八十九裴約潞州之舊將也初事李嗣昭為親信及繼韜之叛約方戍澤州因召民泣而諭之曰余事故使已餘二紀每見分財享士志在平讎不幸薨歿今郎君父喪未葬郎君原本作郎書今據歐陽史改正影庫本粘籤即背君親余可倳刃自殺不能送死與人衆皆感泣既而梁以董璋為澤州刺史率衆攻城約拒久之告急於莊宗莊宗知其忠懇謂諸將曰朕於繼韜何薄於裴約何厚裴約能分逆順不附賊黨先兄一何不幸生此鴟梟乃顧李紹斌曰爾識機便為我取裴約來朕不藉澤州彈丸之地即遣紹斌率五千騎以赴之, WYG: ''}
