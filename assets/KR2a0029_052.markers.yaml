  - {type: variant, offset: 1793, length: 442, content: 戰周德威戰沒師無行列至晚方集汴人四五萬登無石山我軍懼形於色或請收軍保營詰旦復戰嗣昭曰賊無營壘去臨濮地遠日已晡晚皆有歸心但以精騎逗撓無令返旆晡後追擊破之必矣我若收軍拔寨賊人入臨濮俟彼整齊復來即勝負未決莊宗曰非兄言幾敗吾事軍校王建及又陳方略嗣昭與建及分兵於土山南北為掎角汴軍懼下山因縱軍擊之俘斬三萬級由是莊宗之軍復振十六年嗣昭代周德威權幽州軍府事九月以李紹宏代嗣昭出薊門百姓號泣請留截鞍惜別嗣昭夜遁而歸十七年六月嗣昭自德勝歸藩莊宗帳餞於戚城莊宗酒酣泣而言曰河朔生靈十年饋輓引領鶴望俟破汴軍今兵賦不充寇孽猶在坐食軍賦有愧蒸民嗣昭曰臣忝急難之地每一念此寢不安席大王且持重謹守惠養士民臣歸本藩簡料兵賦歲末春首即舉衆復來莊宗離席拜送如家人禮是月汴將劉鄩攻同州朱友謙告急嗣昭與李存審援之九月破汴軍於馮翊乃班師十九年莊宗親征張文禮於鎮州冬契丹三十萬奄至嗣昭從莊宗擊之敵騎圍之數十重良久不解嗣昭號泣赴之引三百騎橫擊重圍馳突出沒者數十合契丹退翼莊宗而還是時閻寶為鎮人所敗退保趙州莊宗命嗣昭代寶攻真定七月二, WYG: ''}
