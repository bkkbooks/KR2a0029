  - {type: variant, offset: 4317, length: 170, content: 賜姓名天祐四年逐康懷英於河西解汾州之圍加檢校司空充左廂馬軍都將戰王景仁有功加檢校司徒救河中府與梁人接戰應弦斃者甚衆而矟中其口及退莊宗親視其傷深加慰勉轉內衙馬步都將遼州刺史十二年從莊宗入魏擊劉鄩有功轉天雄軍都指揮使劉鄩之北趨樂平也嗣恩襲之倍程先入晉陽時城中無備得嗣恩兵至人百其勇鄩聞其先過乃遁莘之戰以功轉代州刺史充石嶺關以北都知兵馬使稍遷振武, WYG: 八月存孝擒新授昭義}
