  - {type: variant, offset: 921, length: 442, content: 陽一戰擒之明年正月嗣昭進兵蒲縣十八日汴將朱友寧氏叔琮將兵十萬來拒二十八日梁祖自率大軍至平陽嗣昭之師大恐三月十一日有白虹貫周德威之營候者云不利宜班師翌日氏叔琮犯德威之營汴軍十餘萬列陣四合德威嗣昭血戰解之乃保軍而退汴軍因乘之時諸將潰散無復部伍德威引騎軍循西山而遁朱友寧乘勝陷慈隰汾等州武皇聞其敗也遣李存信率牙兵至清源應接復為汴軍所擊汴軍營於晉祠嗣昭德威收合餘衆登城拒守汴人治攻具於西北隅四面營柵相望時鎮州河中皆為梁有孤城無援師旅敗亡武皇晝夜登城憂不遑食召諸將欲出保雲州嗣昭曰王勿為此謀兒等苟存必能城守李存信曰事勢危急不如且入北蕃別圖進取朱溫兵師百萬天下無敵關東河北受他指揮今獨守危城兵亡地儻彼築室反耕環塹深固則亡無日矣武皇將從之嗣昭亟爭不可猶豫未決賴劉太妃極言於內武皇且止數日亡散之衆復集嗣昭晝夜分兵四出斬將搴旗汴軍保守不暇二十一日朱友寧燒營退去嗣昭追擊復收汾慈隰等州五月雲州都將王敬暉據城叛振武石善友亦為部將契苾讓所逐嗣昭皆討平之天祐三年汴人攻滄景劉仁恭遣使求援十一月嗣昭合燕軍三萬進攻, WYG: ''}
