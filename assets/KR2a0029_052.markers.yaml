  - {type: variant, offset: 4492, length: 243, content: 年追赴行在卒於太原天成初明宗敦念舊勳詔贈太尉有子二人長曰武八騎射推於軍中嘗有時輩臂飢鷹矜其搏擊武八持鳴鏑一隻賭其狩獲暮乃多之戰契丹於新州歿焉案遼史太祖紀二年三月合戰於新州東殺李嗣本之子武八考武八本嗣恩子而遼史以為嗣本子蓋傳聞之誤幼曰從郎累為行軍司馬永樂大典卷一萬三百八十九史臣曰嗣昭以精悍勤勞佐經綸之業終沒王事得以為忠然其後嗣皆不免於刑戮者何也蓋殖貨無窮多財累愚故也抑苟能以清白遺子孫安有斯禍哉裴約以偏裨而效忠烈尤可貴也嗣本嗣恩皆以中涓之効參再造之功故可附於茲也永樂大典卷一萬三百八十九, WYG: 攷證}
