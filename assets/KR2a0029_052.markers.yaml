  - {type: variant, offset: 1381, length: 0, content: '', WYG: 通鑑克用表克修為昭義軍節度使在四年八月與是書異汴帥素忌武皇案梁紀作李克用乗醉任氣帝不平之攷新唐書沙陀𫝊亦作全忠忌克用桀邁難制與此紀合蓋全忠攻上源驛實忌其威名而欲害之非徒以其乗醉任氣也鎮州王景崇王景崇}
