  - {type: variant, offset: 2353, length: 203, content: 令莊宗即位贈太師隴西郡王長興中詔配饗莊宗廟庭嗣昭有子七人長曰繼儔澤州刺史次繼韜繼忠繼能繼襲繼遠皆夫人楊氏所生案嗣昭有子七人薛史僅言其六歐陽史仍薛史之舊據繼韜附傳有弟繼達合數之恰得七人也楊氏治家善積聚設法販鬻致家財百萬永樂大典卷一萬三百八十九繼韜小字留得少驕獪無賴嗣昭既卒莊宗詔諸子扶喪歸太原襄事諸子違詔以父牙兵數千擁喪歸潞莊宗令李存渥馳騎追諭兄弟俱忿欲害存渥存渥遁而獲免繼韜兄繼儔嗣昭長嫡也當襲父爵然柔而不, WYG: ''}
