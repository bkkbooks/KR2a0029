  - {type: variant, offset: 4490, length: 0, content: '', WYG: 孫揆案新唐書作七月戊申李克用執昭義節度使孫揆通鑑從是書作八月張濬之師出戰為存孝所敗案新唐書帝紀作十一月張濬及李克用戰於隂地敗績歐陽史亦作十一月與是書先後互異舊五代史巻二}
