  - {type: variant, offset: 108, length: 0, content: '', WYG: 作丁已與是書同歐陽史作丁未與是書異許州扶溝縣案扶溝下原本脱縣字今據文増入甲寅福建節度使王審知封閩王廣州節度使劉隱封南平王甲寅通鑑作庚子與是書異如活捉得劉知浣者賞錢一千貫文案一千原本作一萬今據通鑑長編引梁代賞功之典改正辛亥駕至蒲陜案通鑑作癸丑帝至陜與是書前後異其興善門仍令長官闗鎖興善原本作章善今據上文及五代㑹要}
