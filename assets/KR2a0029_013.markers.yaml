  - {type: variant, offset: 6386, length: 947, content: 萬屯于美原列柵十五其勢甚盛太祖命同州節度使劉知俊及康懷英帥師拒之崇本大敗復歸於邠州自是垂翅久之乾化元年冬案原本作乾化四年今從歐史校正為其子彥魯所毒而死彥魯自稱留後領其軍事凡五十餘日為崇本養子李保衡所殺保衡舉其城來降末帝命霍彥威為邠帥由是邠寧復為末帝所有永樂大典卷一萬八千一百二十七蔣殷不知何許人幼孤隨其母適于河中節度使王重盈之家重盈憐之畜為己子唐天復初太祖既平蒲陝殷與從兄珂舉族遷于大梁太祖感王重榮之舊恩凡王氏諸子皆錄用焉殷由是繼歷內職累遷至宣徽院使案蔣殷在唐末為宣徽副使譖殺蔣元暉遷宣徽使誣害何太后其罪與孔循等薛史未及詳載舊五代史考異殷素與庶人友珪善友珪篡立命為徐州節度使乾化四年秋末帝以福王友璋鎮徐方福王原本作福為今據文改正影庫本粘籤殷自以為友珪之黨懼不受代遂堅壁以拒命時華州節度使王瓚殷之從弟也懼其連坐上章言殷本姓蔣非王氏之子也末帝乃下詔削奪殷在身官爵仍令却還本姓命牛存節劉鄩等帥軍討之是時殷求救于淮南楊溥遣朱瑾率衆來援存節等逆擊敗之貞明元年春存節劉鄩攻下徐州殷舉族自燔而死于火中得其屍梟首以獻之永樂大典卷一萬八百三十一張萬進雲州人初為本州小校亡命投幽州劉守光厚遇之任為裨將滄州劉守文以弟守光囚父而竊據其位自領兵問罪尋敗於雞蘇守光遂兼有滄景之地令其子繼威主留務繼威年幼未能政事以萬進佐之凡關軍政一皆委任繼威兇虐類父嘗淫亂於萬進之家萬進怒而殺之又遣使歸於晉既而末帝遣楊師厚劉守奇潛兵掠鎮冀因東攻滄州萬進乞降案通鑑云乾化二年九月庚子萬進遣使奉表降於梁辛丑以萬進為義昌留後甲辰改義昌為順化軍以萬進為節度使此傳疑有闕文舊五代史考異師厚表青州節度使復遷兗州仍賜名守進案原本作方進今據本紀改正舊五代史考異萬進性既輕險專圖反側貞明四年冬據城叛命遣使送款於晉王末帝降制削其官爵仍復其本名遣劉鄩討之晉人不能救五年冬萬進危小將邢師遇潛謀內應開門以納王師遂拔其城萬進族誅永樂大典卷六千三百五十史臣曰夫雲雷搆屯龍蛇起陸勢均者交鬬力敗者先亡故瑄瑾時溥之流皆梁之吞噬斯亦理之常也唯瑾始以竊發有土終以竊發亡身傳所謂君以此始必以此終者乎師範屬衰季之運以興復為謀事雖不成忠則可尚雖貽族滅之禍亦可以與臧洪遊於地下矣知俊驍武有餘奔亡不暇六合雖大無所容身夫如是則豈若義以為勇者乎崇本而下俱以叛滅又何足以道哉永樂大典卷六千三百五十, WYG: ''}
