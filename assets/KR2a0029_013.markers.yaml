  - {type: variant, offset: 489, length: 1580, content: 葛爽傳云中和元年十一月簡鄉兵八萬大敗明年正月簡為牙將所殺新唐書本紀云中和三年二月魏博軍亂殺其節度使韓簡通鑑與新唐書同薛史誤作允中歷考諸書年月參差姓名舛異無可依據蓋唐末典章散佚故傳聞失實如此朝廷以瑄為天平軍節度使累加官至檢校太尉同平章事太祖初鎮大梁兵威未振連歲為秦宗權所圍士不解甲危殆日數四太祖以瑄同宗早兄事之乃遣使求援於瑄光啟末宗權急攻大梁瑄與弟瑾率兗鄆之師來援大敗蔡賊解圍而遁太祖感其力厚禮以歸之先是瑄瑾駐於大梁覩太祖軍士驍勇私心愛之及歸厚懸金帛於界上以誘焉諸軍貪其厚利私遁者甚衆太祖移牒以讓之瑄來詞不遜由是始搆隙焉及秦宗權敗太祖移軍攻時溥於徐州時瑄方右溥乃遣使來告太祖曰巢權巢權原本脫權字今據通鑑注增入影庫本粘籤繼為蛇虺毒螫中原與君把臂同盟輔車相依今賊已平殄人粗聊生吾弟宜念遠圖不可自相魚肉或行人之失辭疆吏之踰法可以理遣未得便暌和好投鼠忌器弟幸思之太祖方怒時溥通於孫儒不從其言及龐師古攻徐州瑄出師來援太祖深銜之徐既平太祖倂兵以攻鄆自景福元年冬遣朱友裕領軍渡濟至乾寧三年宿軍齊鄆間大小凡數十戰語在太祖紀中自是野無人耕屬城悉為我有瑄乃遣人求救於太原李克用遣其將李承嗣史儼等援之尋為羅弘信所扼援路既絕瑄瑾竟敗乾寧四年正月龐師古攻陷鄆州遁至中都北匿於民家為其所箠幷妻榮氏禽之來獻俱斬於汴橋下永樂大典卷二千三十三案舊唐書云瑄與妻榮氏出奔至中都為野人所害傳首汴州榮氏至汴州為尼與薛史異朱瑾瑄從父弟雄武絕倫性頗殘忍光啟中瑾與兗州節度使齊克讓婚瑾自鄆盛飾車服私藏兵甲以赴禮會親迎之夜甲士竊發擄克讓自稱留後及蔡賊鴟張瑾與太祖連衡同討宗權前後屢捷以功正授兗州節度使既得士心有兼幷天下之意太祖亦忌之瑾以厚利招誘太祖軍士以為間諜及太祖攻鄆瑾出師來援累與太祖接戰乾寧二年春太祖令大將朱友恭攻瑾掘塹柵以環之朱瑄遣將賀瓌及蕃將何懷寶赴援為友恭所擒十一月瑾從兄齊州刺史瓊以州降案原本齊州作濟州據通鑑及北夢瑣言改正舊五代史考異太祖令執賀瓌懷寶及瓊以狥於城下語曰卿兄已敗早宜効順瑾偽遣牙將瑚兒持書幣送降太祖自至延壽門外與瑾交語瑾謂太祖曰欲令大將送符印願得兄瓊來押領所貴骨肉盡布腹心也太祖遣瓊與客將劉捍取符笥瑾單馬立於橋上揮手謂捍曰可令兄來余有密款即令瓊往瑾先令騎士董懷進伏于橋下及瓊至懷進突出擒瓊而入俄而斬瓊首投於城外太祖乃班師及鄆州陷龐師古乘勝攻兗瑾與李承嗣方出兵求芻粟於豐沛間瑾之二子案新唐書作子用貞及大將康懷英判官辛綰小校閻寶以城降師古瑾無歸路即與承嗣將麾下士將保沂州刺史尹處賓案新唐書作尹懷賓拒關不納乃保海州為師古所逼遂擁州民渡淮依楊行密按新唐書刺史朱用芝以其衆與瑾奔楊行密行密表瑾領徐州節度使龐師古渡淮行密令瑾率師以禦之清口之敗瑾有力焉自是瑾率淮軍連歲北寇徐宿大為東南之患及行密卒子渭繼立以徐溫子知訓為行軍副使寵遇頗深後楊溥僭號知訓為樞密使知政事以瑾為同平章事仍督親軍時徐溫父子恃寵專政慮瑾不附己案陳彭年江南別錄云徐知訓初學兵法于朱瑾瑾悉心教之後與瑾有隙夜遣壯士殺瑾瑾手刃數人埋于舍後舊五代史考異貞明四年六月出瑾為淮寧軍節度使案原本淮寧作懷寧今據九國志改正舊五代史考異知訓設家宴以餞瑾瑾事之逾遜翌日詣知訓第謝留門久之知訓家僮私謂瑾曰政事相公此夕在白牡丹妓院侍者無得往瑾謂典謁曰吾不奈朝饑且歸既而知訓聞之愕然曰晚當過瑾瑾厚備供帳瑾有所乘名馬冬以錦帳貯之夏以羅幬護之愛妓桃氏案九國志作妻陶氏五國故事作愛姬姚氏有絕色善歌舞及知訓至奉巵酒為壽初以名馬奉知訓喜而言曰相公出鎮與吾暫別離恨可知願此盡歡瑾即延知訓於中堂出桃氏酒既醉瑾斬知訓首案五國故事作以手板擊殺之馬令南唐書云知訓因求馬於瑾瑾不與遂有隙俄出瑾為靜淮節度使瑾詣知訓別且願獻前馬知訓喜往謁瑾家瑾妻出拜知訓答拜瑾以笏擊踣遂斬知訓舊五代史考異示其部下因以其衆急趨衙城知訓之黨已闔門矣唯瑾得獨入與衙兵戰案九國志翟虔傳云虔驅率散卒共閉關瑾以是, WYG: 司}
