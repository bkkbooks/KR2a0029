  - {type: variant, offset: 4737, length: 2, content: 俊居, WYG: 劉隠各賜一子六品正員官髙季昌賜一子八品正員官賀德倫賜一子九品正員官癸巳觀稼于伊水登建春門幸㑹節坊張宗奭私第臨亭臯視物色賞賜甚厚左銀臺門朝參諸司使庫使已下不得帶從人入城親王許一二人執條床手簡餘悉止門外闌入者抵律閽守不禁與所犯同先是門通内無門籍且多勲戚車騎衆者尤不敢呵察至是有以客星凌犯上言者遂令止隔海清軍節度使守侍郎兼中書令劉隠薨輟朝三日百僚詣閤門奉慰六月乙卯命北面都招討使鎮國軍節度使楊師厚出屯邢洺丁巳鎮定鈔我湯隂詔曰常山背義易水效尤誘其蕃戎動我邊鄙南侵相魏東出邢洺是用遣將徂征為人除害但初頒赦令不欲食言宥而伐之諒非獲己况聞謀始}
