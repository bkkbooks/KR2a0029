  - {type: variant, offset: 2410, length: 2202, content: 英烈深忌之故瑾不敢預政及行密死子溥嗣位溫與張鎬爭權襲殺鎬自是事無大小皆决于溫既而溫復為自安之計乃以子知訓自代然後引兵出居金陵實欲控制中外知訓尤恣橫瑾居常嫉之一旦知訓欲得瑾所乘馬瑾怒遂擊殺知訓提其首請溥起兵誅溫溥素怯懦見之掩面而走瑾曰老婢兒不足為計亦自殺中外大駭且懼溫至遽以瑾屍暴之巿中時盛暑肌肉累日不壞至青蠅無敢輒泊人有病者或于暴屍處取土煎而服之無不愈時溥徐州人初為州之驍將唐中和初秦宗權據蔡州侵寇隣藩節度使支詳命溥率師以討之徐軍屢捷軍情歸順以節鉞授之冊府元龜卷四百一十二案薛史時溥傳永樂大典原闕今考冊府元龜引梁時溥一條當係薛史原文謹為補入又考舊唐書列傳云時溥彭城人徐之牙將黃巢據長安詔徵天下兵進討中和二年武寧軍節度使支詳遣溥與副將陳璠率師五千赴難行至河陰軍亂剽河陰縣迴溥招合撫諭其衆復集懼罪屯于境上詳遣人迎犒悉恕之溥乃移軍向徐州既入軍人大呼推溥為留後送詳于大彭館溥大出資裝遣陳璠援詳歸京詳宿七里亭其夜為璠所殺舉家屠害溥以璠為宿州刺史竟以違命殺詳溥誅璠又令別將帥軍三千赴難京師天子還宮授之節鉞及黃巢攻陳州秦宗權據蔡州與賊連結徐蔡相近溥出師討之軍鋒益盛每戰屢捷黃巢之敗也其將尚讓以數千人降溥後林言又斬黃巢首歸徐州時溥功居第一詔授檢校太尉中書令鉅鹿郡王宗權未平仍授溥徐州行營兵馬都統蔡賊平朱全忠與之爭功遂相嫌怨淮南亂朝廷以全忠遙領淮南節度以平孫儒行密之亂汴人應援路出徐方溥阻之全忠怒出師攻徐自光啟至大順六七年間汴軍四集徐泗三郡民無耕稼頻歲水災人喪十六七溥窘求和于汴全忠曰移鎮則可朝廷以尚書劉崇望代溥以溥為太子太師溥懼出城見殺不受代汴將龐師古陳兵于野溥求援于兗州朱瑾出兵救之值大雪糧盡而還城中守陴者饑甚加之疾疫汴將王重師牛存節夜乘梯而入溥與妻子登樓自焚而卒實景福二年也地入于汴王師範青州人父敬武初為平盧牙將唐廣明元年無棣人洪霸郎合羣盜於齊棣間節度使安師儒遣敬武討平之及巢賊犯長安諸藩擅易主帥敬武乃逐師儒自為留後王鐸承制授以節鉞後以出師勤王功加太尉平章事龍紀中敬武卒師範年幼三軍推之為帥棣州刺史張蟾叛於師範案原本作張儋今據新唐書改正舊五代史考異不受節度朝廷乃以崔安潛為平盧帥師範拒命張蟾迎安潛至郡同討師範師範遣將盧弘將兵攻蟾盧弘歐陽史作盧洪蓋避宣祖諱今仍薛史之舊影庫本粘籤弘復叛與蟾通謀偽旋軍將襲青州師範知之遣重賂迎弘謂之曰吾以先人之故為軍府所推年方幼少未能幹事如公以先人之故令不乏祀公之仁也如以為難與成事乞保首領以守先人墳墓亦唯命弘以師範年幼必無能為不為之備師範伏兵要路迎而享之預謂紀綱劉鄩曰翌日盧弘至爾即斬之酬爾以軍校鄩如其言斬弘於座上及同亂者數人因戒厲士衆大行頒賞與之誓約自率之以攻棣州擒張蟾斬之安潛遁還長安師範雅好儒術少負縱橫之學故安民禁暴各有方略當時藩翰咸稱之及太祖平兗鄆遣朱友恭攻之師範乞盟遂與通好天復元年冬李茂貞劫遷車駕幸鳳翔韓全誨矯詔加罪於太祖令方鎮出師赴難詔至青州師範承詔泣下曰吾輩為天子藩籬君父有難略無奮力者皆強兵自衞縱賊如此使上失守宗祧危而不持是誰之過吾今日成敗以之乃發使通楊行密案新唐書全忠圍鳳翔昭宗詔方鎮赴難以師範附全忠命楊行密部將朱瑾攻青州且欲代為平盧軍節度使師範聞之哭曰吾為國守藩君危不持可乎乃與行密連盟是師範之通行密因其將謀見代而始遣使也歐陽史作因乞兵于楊行密殊失事實而薛史亦未詳載遣將劉鄩襲兗州別將襲齊時太祖方圍鳳翔師範遣將張居厚部輿夫二百言有獻於太祖至華州城東華將婁敬思疑其有異剖輿視之乃兵仗也居厚等因大呼殺敬思聚衆攻西城時崔胤在華州遣部下閉關距之遂遁去是日劉鄩下兗州河南數十郡同日發太祖怒遣朱友寧率軍討之既而友寧為青軍所敗臨陣被擒傳首於淮南天復三年七月太祖復令楊師厚進攻屯於臨朐師厚累敗青軍遂進寨於城下師範懼乃令副使李嗣業詣師厚乞降案師範之降薛史與新唐書異薛史則以為兵臨城下而始降也新唐書云師厚圍青州敗師範兵于臨朐執諸將又獲其弟師克是時師範衆尚十餘萬諸將請决戰而師範以弟故乃請降歐陽史云弟師魯大敗遂傅其城而梁別將劉重霸下其棣州師範乃請降亦微有不同太祖許之歲餘遣李振權典青州事因令師範舉家徙汴師範將至縞素乘驢請罪於太祖太祖以禮待之尋表為河陽節度使會韓建移鎮青州太祖帳餞於郊師範預焉太祖謂建曰公頃在華陰政事之暇省覽經籍此亦士君子之大務今之青土政簡務暇可復修華陰之故事建撝謙而已太祖又曰公讀書必須精意勿錯用心太祖以師範好儒前以青州叛故以此言譏之及太祖即位徵為金吾上將軍開平初太祖封諸子為王友寧妻號訴於太祖曰陛下化家為國人人皆得崇封妾夫早預艱難粗立勞効不幸師範反逆亡夫橫屍疆場寃讎尚在朝廷受陛下恩澤亡夫何罪太祖淒然泣下曰幾忘此賊即遣人族師範於洛陽先掘坑於第側乃告之其弟師誨兄師悅及兒姪二百口咸盡戮焉時使者宣詔訖師範盛啟宴席令昆仲子弟列座謂使者曰死者人所不能免況有罪乎然予懼坑屍於下少長失序恐有愧於先人行酒之次令少長依次於坑所受戮人士痛之後唐同光三年三月詔贈太尉永樂大典卷一萬八千一百二十七劉知俊字希賢徐州沛縣人也姿貌雄傑倜儻有大志始事徐帥時溥為列校溥甚器之後以勇略見忌唐大順二年冬率所部二千人來降即署為軍校知俊被甲上馬輪劍入敵勇冠諸將太祖命左右義勝兩軍隸之尋用為左開道指揮使案原本作關道今據歐陽史改正舊五代史考異故當時人謂之劉開道從討秦宗權及攻徐州皆有功尋補徐州馬步軍都指揮使攻海州下之遂奏授刺史天復初歷典懷鄭二州從平青州以功奏授同州節度使天祐三年冬以兵五千破岐軍六萬於美原自是連克, WYG: 襄鄧}
