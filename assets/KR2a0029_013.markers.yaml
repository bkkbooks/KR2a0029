  - {type: variant, offset: 4867, length: 1518, content: 考異送款於李茂貞又分兵以襲雍華雍州節度使劉捍被擒送鳳翔害之華州蔡敬思被傷獲免太祖聞知俊叛遣近臣諭之曰朕待卿甚厚何相負耶知俊報曰臣非背德但畏死耳王重師不負陛下而致族滅太祖復遣使謂知俊曰朕不料卿為此昨重師得罪蓋劉捍言陰結邠鳳終不為國家用我今雖知枉濫悔不可追致卿如斯我心恨恨蓋劉捍悞予事也捍一死固未塞責知俊不報遂分兵以守潼關太祖命劉鄩率兵進討攻潼關下之時知俊弟知浣知浣原本作知院今據本紀及劉鄩傳改正影庫本粘籤為親衞指揮使聞知俊叛自洛奔至潼關為鄩所擒害之尋而王師繼至知俊乃舉族奔於鳳翔李茂貞厚待之偽加檢校太尉兼中書令以土疆不廣無藩鎮以處之但厚給俸祿而已尋命率兵攻圍靈武且圖牧圉之地靈武節度使韓遜遣使來告急太祖令康懷英率師救之師次邠州長城嶺為知俊邀擊懷英敗歸案九國志云李彥琦劉知俊自靈武班師塗經長城嶺梁將率精銳數萬躡其後彥琦與知俊同設方略擊敗之舊五代史考異茂貞悅署為涇州節度使復命率衆攻興元進圍西縣會蜀軍救至乃退案九國志王宗鐬傳云岐將劉知俊等領大軍分路來攻由階成路奪固鎮糧王宗侃唐襲等禦之至青泥嶺為知俊所敗退保西縣會大雨漢江漲宗鐬自羅村得鄉導緣山而行數百里與宗播遇于鐵谷合軍出湯頭時知俊自斜谷山南直抵興州圍西縣軍人散掠巴中宗鐬與宗播襲之會王建亦至遂解西縣之圍舊五代史考異既而為茂貞左右石簡顒等間之免其軍政寓於岐下掩關歷年茂貞猶子繼崇鎮秦州因來寧覲言知俊途窮至此不宜以讒嫉見疑茂貞乃誅簡顒等以安其心繼崇又請令知俊挈家居秦州以就豐給茂貞從之未幾邠州亂茂貞命知俊討之時邠州都校李保衡納款于朝廷末帝遣霍彥威率衆先入于邠知俊遂圍其城半載不能下會李繼崇以秦州降于蜀知俊妻孥皆遷於成都遂解邠州之圍而歸岐陽以舉家入蜀終慮猜忌因與親信百餘人夜斬關奔蜀王建待之甚至即授偽武信軍節度使尋命將兵伐岐不克班師因圍隴州獲其帥桑弘志以歸桑弘志原本桑作欒今據十國春秋改正影庫本粘籤久之復命為都統再領軍伐岐時部將皆王建舊人多違節度不成功而還蜀人因而毀之先是王建雖加寵待然亦忌之嘗謂近侍曰吾漸衰耗恆思身後劉知俊非爾輩能駕馭不如早為之所又嫉其名者於里巷間作謠言云黑牛出圈椶繩斷知俊色黔而丑生椶繩者王氏子孫皆以宗承為名故以此搆之偽蜀天漢元年冬十二月建遣人捕知俊斬於成都府之炭巿及王衍嗣偽位以其子嗣禋尚偽峨眉長公主拜駙馬都尉後唐同光末隨例遷於洛卒知俊族子嗣彬幼從知俊征行累遷為軍校及知俊叛以不預其謀得不坐貞明末大軍與晉王對壘於德勝久之嗣彬率數騎奔于晉具言朝廷軍機得失又以家世讎怨將以報之晉王深信之即厚給田宅仍賜錦衣玉帶軍中目為劉二哥居一年復來奔當時晉人謂是刺客以晉王恩澤之厚故不竊發竊發原本作竊法今據文改正影庫本粘籤龍德三年冬從王彥章戰于中都軍敗為晉人所擒晉王見之笑謂嗣彬曰爾可還予玉帶嗣彬惶恐請死遂誅之永樂大典卷九千九十八楊崇本不知何許人幼為李茂貞之假子因冒姓李氏名繼徽唐光化中茂貞表為邠州節度使天復元年冬太祖自鳳翔移軍北伐駐旆於邠郊命諸軍攻其城崇本懼出城請降太祖復置為邠州節度使仍令復其本姓名焉及師還遷其族於河中案舊唐書十一月乙亥邠州節度使李繼徽以城降全忠乃舍其孥于河中以繼徽從軍新唐書作辛未與舊唐書異其後太祖因統戎往來由於蒲津以崇本妻素有姿色嬖之於別館其婦素剛烈私懷愧恥遣侍者讓崇本曰丈夫擁旄仗鉞不能庇其伉儷我已為朱公婦今生無面目對卿期於刀繩而已崇本聞之但灑淚含怒及昭宗自鳳翔回京崇本之家得歸邠州崇本恥其妻見辱因茲復貳於太祖乃遣使告茂貞曰朱氏兆亂謀危唐祚父為國家磐石不可坐觀其禍宜於此時畢命興復事苟不濟死為社稷可也茂貞乃遣使會兵於太原時西川王建亦令大將出師以助之岐蜀連兵以攻雍華關西大震太祖遣郴王友裕帥師禦之會友裕卒於行乃班師天祐三年冬十月崇本復領鳳翔邠涇秦隴之師會延州胡章之衆合五, WYG: 巻}
