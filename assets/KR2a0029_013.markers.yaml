  - {type: variant, offset: 4730, length: 0, content: '', WYG: 景仁充北面行營都招討使潞州副招討使韓勍為副相州刺史李思安為先鋒使時鎮州王鎔定州王處直叛結連晉人故遣將討之五代㑹要十一月十四日司天奏月蝕不宜用兵時王景仁方總大軍北伐追之不及至五年正月二日果為後唐莊宗大敗于柏鄉十二月辛酉宴文武四品以上于宣威殿親閲禁軍命格鬬于教馬亭已已詔曰滑宋輝亳等州水澇敗傷人户愁嘆朕為民父母良用痛心其令本州分等級賑貸所在長吏監臨周給務令存濟壬辰賑貸東郡畿内如宋滑制乾化元年正月丙戌朔日有蝕之帝素服避殿百官守司以恭天事明復而止制曰兩漢以來日蝕地震百官各上封事指陳得失蓋欲周知時病盡達物情用緝國章以奉天誡朕每思逆耳罔忌觸鱗將洽政經庶開言路况兹謫見當有咎徴其在列辟羣臣危言正諫極萬邦之利害致六合之殷昌毗予一人永建皇極二日日旁有祲氣向背若環耳崇政使敬翔望之曰兵可憂矣帝為之旰食是日果為晉軍及鎮定之師所敗都將十餘人被擒餘衆奔潰庚寅制曰扈氏不恭固難去戰鬼方未服尚或勞師其蟻聚餘妖狐鳴醜類棄天常而拒命據地險以偷生言事討除將期戡定問罪止誅于元惡挺災可憫于遺黎每念傷痍良深愧歎應天兵所至之地宜令將帥節級嚴戒軍伍不得焚燒廬舍開發丘壠毁廢農桑驅掠士女使其背叛之俗知予弔伐之心又制曰戎機方切國用未殷養兵須藉于賦租税粟尚煩于力役所在長吏不得因縁徴發自務貪求茍有故違必行}
