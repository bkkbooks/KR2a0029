  - {type: variant, offset: 4746, length: 7, content: 叛案鑒戒錄云彭, WYG: 只罪李𢎞規一人其餘一切不問詔修天宫佛寺又湖南奏潭州僧法思桂州僧歸真竝乞賜紫衣從之七月帝不豫稍厭秋暑自辛丑幸㑹節坊張宗奭私第宰臣視事于歸仁亭子崇政使内諸司及翰林院竝止于河南令􅇬署至甲辰復歸大内八月庚申幸保寧殿閲天興控鶴兵事軍使將校各有賜癸亥老人星見戊辰幸故上陽宫至于榆林觀稼丙子閲四蕃將軍屯衛兵士于天津橋南至龍門廣化寺戊寅幸興安鞠場大教閲帝自指麾無不踊抃坐作進退聲振宫掖右神武統軍丁審衢對御以紅帛囊劍擬乘輿物帝曰宿將也恕之以劉重霸代其任九月辛巳朔帝御文明殿羣臣入閣刑法待制官各奏事己丑宴羣臣于興安殿庚子親御六師次于河陽甲辰至于衛州乙巳至于宜溝幸民劉達墅丙午至相州賞左親騎指揮使張仙右雲騎指揮使宋鐸嘗身先陷陣各賜帛十月辛亥朔駐蹕于相州宰臣洎文武從官竝詣行宫起居户部郎中孔昌序齎畱都百官冬朔起居表至自西京諸道節度使刺史諸藩府畱後各以冬朔起居表來上制以郢王友珪充控鶴指揮使諸軍都虞侯閻寳為御營使有司以立冬太廟薦享上言詔丞相杜曉赴西都攝祭行事癸丑閲武于州闉之南樓左龍驤都教練使鄧季筠魏博馬軍都指揮使何令稠右廂馬軍都指揮使陳令勲以部下馬瘦竝腰斬于軍門甲寅將以其夕幸魏縣命閣門使李郁報宰臣兼勅内外是夜車駕發軔于都署乙卯次洹水丙辰至魏縣先鋒將黄文靖伏誅己未帝御朝元門以回鶻吐蕃二大國首領入覲故也癸亥令諸軍指揮使及四蕃將軍賜食于行宫之外廡戊辰幸邑西之白龍潭以觀魚焉旣而漁人獲巨魚以獻帝命放之中流從臣以帝有仁惻之心皆相顧欣然是日名其潭曰萬歲潭丙子帝御}
