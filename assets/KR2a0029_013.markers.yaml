  - {type: variant, offset: 4754, length: 0, content: '', WYG: 東教塲閲兵諸軍都指揮北面招討使太尉楊師厚總領鐡馬歩甲十萬廣亘十數里陳焉士卒之雄鋭部隊之嚴肅旌旗之雜遝戈甲之炤曜屹若山岳勢動天地帝甚悦焉即命丞相洎文武從臣列侍賜食逮晚方歸十一月辛己朔上駐蹕魏縣從官自丞相而下竝詣行宫起居畱都文武百官及諸道節度使防禦使刺史諸藩府畱後各奉表起居壬午帝以邊事稍息宣命還京師通鑑帝以夾寨柏鄉屢失利故力疾北廵思一雪其恥意鬱鬱多躁忿功臣宿將往往以小過被誅衆心益懼既而晉趙兵不出十一月壬午帝南還車駕發自行闕夕次洹水縣癸未至内黄縣甲申至黎陽縣乙酉命從官丞相而下宴于行次丁亥次衛州戊子晨次新鄉夕止獲嘉己丑次武陟庚寅次温縣延州節度使髙萬興奏當軍都指揮使髙萬金統領兵士今月五日收鹽州偽刺史髙行存泥首來降丞相及文武百官各上表稱賀辛卯次孟州命散騎常侍孫隲右諫議大夫張衍光禄卿李翼各齎香祝版告祭于孟津之望祠畱都文武官左僕射楊渉洎孟州守李周彛等皆匍匐東郊迎拜其文武官竝令先還壬辰詰旦離孟州晚至都宣宰臣各赴望祠禱雨故事皆以兩省無功職事為之帝憂民重農以足食足兵為念爰自御極毎愆陽積隂多命丞相躬其事辛丑大雨雪宰臣及文武師長各奉表賀焉十二月詔以時雪稍愆命丞相及三省官各詣望祠祈禱癸酉臘假詔諸}
