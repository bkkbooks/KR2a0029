  - {type: 'tls:seg', offset: 4736, content: '', id: KR2a0029_ZHSJ_013-d13p16s4}
  - {type: variant, offset: 4736, length: 0, content: '', WYG: 行琮而撫遏其衆都將鄭遵與其下奉存儼為主而以衆情馳奏時東京留守博王友文不先請遂討其亂兵至鄢陵上聞之曰誅行琮功也然存儼方懼若臨之以兵蔡必速飛矣遂馳使還軍而擢授存儼蔡人安之壬戌詔曰東京舊邦久不巡幸宜以今月九日幸東都扈從文武官委中書門下量閑劇處分宰臣上言曰龍興天府久望法駕但陛下始康愈未宜渉寒願少畱清蹕從之五代㑹要二月敕食人之食者憂人之事況丞相尊位參決大政而堂封未給且無餐錢朕甚愧之宜令食萬錢之半甲子幸曜村民舍閲農事庚午幸白馬坡詔金吾大將軍待制官各奏事武安軍節度使馬殷進呈䖍州刺史盧延昌牋表䖍州本支郡也兵甚鋭自得韶州益强大昇為百勝軍使始洪州之䧟盧光稠願收復使府立功自効上因兼授江西觀察畱後光稠卒復命延昌領州事方伯亦頗慰薦楊渭遣人偽署爵秩延昌佯受官牒禮遣其使因湖南自表其事曰郡小寇迫欲緩其姧謀且開導貢路非敢貳也以其偽制來自陳上覽奏曰我方有北事不可不甚加撫䘏尋兼授鎮南將軍節度使觀察畱後命使慰勞九國志盧延昌歸命于呉偽乞命于梁三月辛卯以久旱令宰臣分禱靈迹翼日大㴻雨丙甲幸甘水亭召宰臣翰林學士尚書侍郎孔續已下八人扈從宴樂甚歡戊戌幸右龍虎軍召文武官四品已上宴于新殿甲辰幸左龍虎軍新殿宴文武官四品已上四月丁卯幸龍虎門召宰臣學士金吾上將軍大將軍侍宴廣化寺壬申契丹遣使來貢丁丑幸宣威殿宴文武官四品已上及軍使蕃客己卯又幸左龍虎軍宴羣臣詔曰邠岐未滅闗隴多虞宜擇親賢總兹戎任應闗西同雍華鄜延夏等六道兵馬并委冀王收管指揮凡有抽差先申西面都招討使仍别奏聞庶合機權以寧邊鄙五月甲申朔帝被冕旒御朝元殿視朝仗衛如式制改開平五年為乾化元年大赦天下詔方伯州牧近未加恩者並遷爵秩復大賚軍旅普宴于宣威殿賜帛各有差制封延州節度使髙萬興為渤海郡王諸道節度使錢鏐張宗奭馬殷王審}
