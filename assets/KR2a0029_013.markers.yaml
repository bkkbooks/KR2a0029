  - {type: variant, offset: 4731, length: 0, content: '', WYG: 典立法垂制詳刑定科傳之無窮守而勿失中書門下所奏新定格式律令己頒下中外各委所在長吏切務遵行盡革煩苛皆除枉濫用副哀矜之㫖無違欽恤之言詔徴陜州鎮國軍節度使楊}
