  - {type: variant, offset: 4741, length: 0, content: '', WYG: 帥臣致此厲階並由姦佞密通人使潛結沙陀旣懼罪誅乃生離叛今雖行討代己舉師徒亦開詔諭之門不阻歸降之路矧又王鎔處直未曽削爵除名若翻然改圖不逺而復必仍舊貫當保全功如有率衆向明拔州效順亦行殊賞冀徇來情免令受弊于疲民用示惟新于汚俗宜令行營都招討使及陳暉軍前准此敕文散加招諭將}
