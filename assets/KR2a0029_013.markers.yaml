  - {type: variant, offset: 4755, length: 1, content: 劉, WYG: 與河南尹左右金吾六統軍等較獵于近苑命大理卿王鄯使于安南左散騎常侍呉藹使于朗州皆以旌節官誥錫之也又命將作少監姜𢎞道為朗州旌節官使副五代㑹要舊制巡撫黜陟冊命弔贈入番等使選朝臣為之其宣慰加官送旌節即以中官為之今以三品送旌節新例也延州節度使髙萬行奏領軍于邠州界蒿子谷韋家寨殺戮寧慶兩州賊軍約二千餘人竝生擒都頭指揮使及奪馬器甲等事其入奏軍將使宣召赴内殿賜對以銀器綵物錫之宰臣及文武官各奉表賀是月魏博節度上言于涇縣北戮殺鎮州王鎔兵士七千餘人奪馬二千餘匹戈甲未}
