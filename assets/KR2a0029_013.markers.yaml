  - {type: variant, offset: 2072, length: 0, content: '', WYG: 外須執慿繇者其司門過所先須經中書門下㸃檢宜委宰臣趙光逢專判出給俾繇顯重冀絶姦源仍下兩京河陽及六軍諸衛御史臺各加鈐轄公私行李}
  - {type: variant, offset: 2072, length: 0, content: '', krp: 外須執慿繇者其司門過所先須經中書門下㸃檢宜委宰臣趙光逢專判出給俾繇顯重冀絶姦源仍下兩京河陽及六軍諸衛御史臺各加鈐轄公私行李}
  - {type: variant, offset: 2073, length: 324, content: 踰城而出傷足求馬不獲遂自刎案九國志米志誠傳志誠被甲親從十餘騎至天興門問瑾所向聞瑾已死乃歸暴其屍於巿盛夏無蠅蛆徐溫令投之于江部人竊收葬之溫疾亟夢瑾被髮引滿將射之溫乃為之禮葬立祠以祭之永樂大典卷二千三十一案馬令南唐書云初宿衞將李球馬謙挾楊隆演登樓取庫兵以誅知訓陣于門橋知訓與戰頻却朱瑾適自外來以一騎前視其陣曰不足為也因反顧一麾外兵爭進遂斬球謙亂兵皆潰瑾嘗有德於知訓者也及其凶終吳人皆謂曲在知訓舊五代史考異五代史補瑾之奔淮南也時行密方圖霸其為禮待有加于諸將數等瑾感行密見知欲立奇功為報但恨無入陣馬忽忽不樂一日晝寢夢老叟眉髮皓然謂瑾曰君長恨無入陣馬今馬生矣及隸報適退槽馬生一駒見臥未能起瑾驚曰何應之速也行往視之見骨目皆非常馬大喜曰事辦矣其後破杜洪取鍾傳未嘗, WYG: ''}
