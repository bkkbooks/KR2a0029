  - {type: variant, offset: 6193, length: 584, content: 萬六千九百五十八又勅朕以干戈尚熾華夏未寧宜循卑菲之言用致雍熙之化起八月一日常朝不御金鑾崇勳兩殿只於便殿聽政冊府元龜卷一百九十七辛亥制諸郡如有陣歿將士仰逐都安存家屬如有弟兄兒姪便給與衣糧充役冊府元龜卷一百九十五贈故山南東道節度使留後王班太保贈故同州觀察判官盧匪躬工部尚書班故河陽將累以軍功為郡守主留事於襄陽為小將王求所殺匪躬嘗為劉知俊判官知俊反不偕行為亂兵所害冊府元龜卷二百一十勅建國之初用兵未罷未罷原本作之罷今據五代會要改正影庫本粘籤諸道章表皆繫軍機不欲滯留用防緩急其諸道所有軍事申奏宜令至右銀臺門委客省畫時引進諸道公事即依前四方館准例收接冊府元龜卷一百九十一司天臺奏今月二十七日平明前東南丙上去山高三尺以來老人星見測在井宿十一度其色光明闊大冊府元龜卷二百二勅所在長吏放雜差役兩稅外不得妄有科配自今後州縣府鎮凡使命經過若不執勅文券並不得妄差人驢及取索一物已上又今歲秋田皆期大稔仰所在切如條流本分納稅及加耗外勿令更有科索切戒所繇人更不得於鄉村乞託擾人冊府元龜卷一百九十一閏八月襄陽叛將李洪差小將進表帝示以含弘特賜勅書慰諭又制左馮背叛左馮原本作左憑今據文改正影庫本粘籤元惡遁逃如聞相濟之徒多是脅從之輩若能迴心向國轉禍全身當與加恩必不問罪仍令同華雍等州切加招諭如能梟斬溫韜或以鎮寨歸化必加厚賞仍獎官班兼委本界招復人戶切加安存冊府元龜卷二百一十五己卯幸西苑觀稼冊府元龜卷二百五, WYG: 攷證}
