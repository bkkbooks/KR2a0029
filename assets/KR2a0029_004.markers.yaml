  - {type: variant, offset: 3002, length: 338, content: 陝兩浙節度使奏於常州東州鎮殺淮賊萬餘人獲戰船一百二隻冊府元龜卷二百一十七以行營左廂步軍指揮使賀瓌為左龍虎統軍以左天武軍夾馬指揮使尹皓為輝州刺史以右天武都頭韓瑭為神捷指揮使左天武第三都頭胡賞為右神捷指揮使仍賜帛有差以解晉州圍之功也冊府元龜卷二百一十以尹皓部下五百人為神捷軍通鑑注引薛史乙巳御內殿宴宰臣扈從官共四十五人丙午御毬場殿宣夾馬都指揮使尹皓韓瑭以下將士五百人賜酒食庚戌至西都御文思殿辛亥宰臣百僚起居於殿前遂宣赴內宴賜方物有差丁巳至東都永樂大典卷一萬六千七百四十六案通鑑考異引編遺錄作乙卯實錄作丁巳今考五代春秋作丁巳與薛史同歐陽史作丁未與薛史異舊五代史考異己未大明節諸道節度刺史各進獻鞍馬銀器綾帛以祝壽宰臣百官設齋相國寺永樂大典卷一萬六千四百八十七壬戌御宣和殿宴宰臣文武百官, WYG: ''}
