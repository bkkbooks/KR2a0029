  - {type: variant, offset: 2503, length: 220, content: 改新城縣曰新登長城縣曰長興樂成縣曰樂清避梁諱也舊五代史考異甲子夜東方有大流星光明燭地有聲如裂帛永樂大典卷七千八百六十六廣州上言白龍見圖形以進永樂大典卷五百二十九月丙子太原軍出陰地關南牧寇掠郡縣晉絳有備帝慮諸將翫寇乃下詔親議巡幸命有司備行丁丑翠華西狩宰臣翰林學士崇政院使金吾仗及諸司要切官皆扈從餘文武百官並在東京壬午達雒陽帝御文思殿受朝參許汝孟懷牧守來朝孟懷原本作盂懷今據文改正影庫本粘籤澤州刺史劉重霸面陳破敵之策癸未西幸宿新安丙戌至陝州駐蹕, WYG: 伐兖}
