  - {type: variant, offset: 3911, length: 2266, content: 御文明殿受朝賀冊府元龜卷二百五詔曰近年以來風俗未泰兵革且繁正月燃燈廢停已久今屬創開鴻業初建洛陽方在上春務達陽氣宜以正月十四十五十六日夜開坊市門一任公私燃燈祈福永樂大典卷六千六百六十六庚寅親享太廟冊府元龜卷一百八十九辛卯祀昊天上帝於圜丘是日降雪盈尺帝昇壇而雪霽禮畢御五鳳樓五鳳樓下原本衍一于字今據文刪去影庫本粘籤宣制大赦天下永樂大典卷四千三百七十六賜南郊行事官禮儀使趙光逢以下分物甲午上御文思殿宴羣臣賜金帛有差丙申賜文武官帛有差命宣徽使王殷押絹一萬匹幷茵褥圖帟二百六十件賜張宗奭永樂大典卷一萬三千七百一十九案歐陽史丙申羣臣上尊號曰睿文聖武廣孝皇帝改西京貞觀殿為文明殿含元殿為朝元殿二月改思政殿為金鑾殿勅東都曰自昇州作府建邑為都未廣邦畿頗虧國體其以滑州酸棗縣長垣縣鄭州中牟縣陽武縣宋州襄邑縣曹州戴邑縣許州扶溝縣鄢陵縣陳州太康縣等九縣宜並割屬開封府仍昇為畿縣冊府元龜卷一百九十六案輿地廣記朱梁時楊氏據江淮于是吳越錢氏上言以淮寇未平恥聞逆姓請改松陽縣為長松舊五代史考異丁酉宴羣臣於崇勳殿甲辰又宴羣臣於崇勳殿蓋藩臣進賀勉而從之永樂大典卷一萬六千七百四十八丙午宗正寺請修興極永安光天咸寧諸陵並令添修上下宮殿栽植松柏制可癸亥勅豐沛之基寢園所在悽愴動關於情理充奉自繫於國章宜設陵臺兼升縣望其輝州碭山縣宜為赤縣仍以本縣令兼四陵臺令冊府元龜卷一百八十九同州節度使劉知俊奏延州都指揮使高萬興部領節級家累三十八人來降三月以萬興檢校司徒為丹延等州安撫招誘等使冊府元龜卷二百一十五辛未詔曰同州邊隅繼有士衆歸化暫思巡撫兼要指揮今幸蒲陝今幸蒲陝原本作今宰今據文改正影庫本粘籤取九日進發甲戌車駕發西都百官奉辭于師子門外丁丑次陝州己卯次解縣河中節度使冀王友謙來奉迎庚辰至河中府冊府元龜卷二百五幸右軍舊杏園講武冊府元龜卷二百一十四丙戌以朔方節度使兼中書令韓遜為潁川王遜本靈州牙校唐末據本鎮朝廷因而授以節鉞永樂大典卷一萬九千八百一十七四月丙申朔駐蹕河中壬寅辰時駕巡于朝邑縣界焦黎店冀王友謙及崇政內諸司使扈從至申時迴冊府元龜卷二百五己亥御前殿宴宰臣及冀王友謙扈從官甲寅宴宰臣及扈從官於內殿永樂大典卷一萬六千七百四十八制易定節度使王處直進封北平王福建節度使王審知封閩王廣州節度使劉隱封南平王案甲寅通鑑作庚子與薛史異舊五代史考異同州節度使劉知俊封大彭郡王山南東道節度使楊師厚封弘農郡王冊府元龜卷一百九十六五月乙丑朔朝遂命宰臣及文武百官宴於內殿己卯車駕至西京癸未御崇勳殿宴宰臣及文武官四品以上己丑復御崇勳殿宴宰臣文武官四品以上永樂大典卷一萬六千七百四十八升宋州為宣武軍節鎮仍以亳輝潁為屬郡通鑑注引薛史六月庚戌同州節度使劉知俊據本郡反制令削奪劉知俊在身官爵仍徵發諸軍速令進討如有軍前將士懷忠烈以知機賊內朋徒憤脅從而識變便能梟夷逆豎擒獲凶渠務立殊功當行厚賞活捉得劉知俊者賞錢一萬貫文便授忠武軍節度使並賜莊宅各一所如活捉得劉知浣者賞錢一千貫文案一千原作一萬今據通鑑長編引梁代賞功之典改正舊五代史考異便與除刺史有官者超轉三階無官者特授兵部尚書如活捉得劉知俊骨肉及近上都將並梟送闕廷者賞賜有差冊府元龜卷二百一十六辛亥駕至蒲陝案通鑑作癸丑帝至陝與薛史前後異舊五代史考異文武百官於新安縣奉迎冊府元龜卷二百五劉知俊弟內直右保勝指揮使知浣自雒奔至潼關右龍虎軍十將張溫以上二十二人於潼關擒獲劉知浣送至行在勅劉知浣逆黨之中最為頭角龍虎軍親兵之內實冠爪牙昨者攻取潼關率先用命尋則擒獲知浣最上立功頗壯軍威將除國難所懸賞格便可支分許賜官階固須除授但昨捉獲劉知浣是張溫等二十二人一時向前共立功效其賞錢一千貫文數內一百貫文與最先打倒劉知浣衙官李稠四十三貫文與十將張溫二十人各與錢四十二貫八百五十文立功勅命便授郡府亦緣同時立功人數不少所除刺史難議偏頗宜令逐月共支給正刺史料錢二百貫文數內十將張溫一人每月與十貫文餘二十一人每月每人各分九貫文仍起七月一日以後支給人與轉官職仍勘名銜分析申奏當與施行冊府元龜卷二百一十是月知俊奔鳳翔同州平永樂大典卷三千五百一十三七月乙丑勅行營將士陣歿者咸令所在給槥櫝津置歸鄉里戰卒聞之悉感涕冊府元龜卷一百九十五丙寅命宰臣楊涉赴西都以孟秋享太廟冊府元龜卷一百八十九改章善門為左右銀臺門其左右銀臺門却改為左右興善門冊府元龜卷一百九十六勅大內皇牆使諸門素來未得嚴謹將令整肅須示條章宜令控鶴指揮應於諸門各添差控鶴官兩人守帖把門其諸司使幷諸司諸色人並勒於左右銀臺門外下馬不得將領行官一人輒入門𩹉其逐日諸道奉進客省使於千秋門外排當訖勒控鶴官舁撎至內門前準例令黃門殿直以下舁進輒不得令諸色一人到千秋門內其興善門仍令長官關鎖案興善原作章善今據上文及五代會要改正舊五代史考異不用逐日開閉是日又勅皇牆大內本尚深嚴宮禁諸門豈宜輕易未當條制交下因循苟出入之無常且公私之不便須加鈐轄用戒門閭宜令宣徽院使等切准此處分冊府元龜卷一百九十一進封幽州節度使河間郡王劉守光為燕王冊府元龜卷一百九十六案通鑑七月癸酉帝發陝州乙亥至洛陽寢疾舊五代史考異己丑夕寢殿棟折詰旦召近臣諸王視棟折之迹帝慘然曰幾與卿等不相見君臣對泣久之遂詔有司釋放禁人從八月朔日後減膳進素食禁屠宰避正殿修佛事以禳其咎永樂大典卷一萬六千五百七十一商州刺史李稠棄郡西奔本州將吏以都牙校李玫權知州事通鑑注引薛史八月甲午以秋稼將登霖雨特甚命宰臣以下禱於社稷諸祠永樂大典卷二千六百三十詔曰封嶽告功前王重事祭天肆覲有國恆規朕以眇身恭臨大寶既功德未敷於天下而災祥互降於域中慮於告謝之儀有缺齋虔之禮爰修昭報用契幽通宜令中書侍郎平章事于兢往東嶽祭拜禱祀訖聞奏于兢原本作於兢今據, WYG: 耳}
