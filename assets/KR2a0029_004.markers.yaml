  - {type: variant, offset: 1639, length: 863, content: 擊退襲至幕谷案歐陽史作漠谷五代春秋仍作幕谷大破之俘斬千計收其器甲宋文通僅以身免冊府元龜卷二百一十七詔曰敦尚儉素抑有前聞斥去浮華期臻至理如聞近日貢奉競務奢淫或奇巧蕩心或雕鐫溢目徒殫資用有費工庸此後應諸道進獻不得以金寶裝飾戈甲劍戟至於鞍勒不用塗金及雕刻龍鳳如有此色所司不得引進永樂大典卷一萬九千五百九十九邕州奏鏌山僧法通道璘有道行各賜紫衣冊府元龜卷一百九十四是月壬戌岳州為淮賊所據帝以此郡此郡原本作北郡今據文改正影庫本粘籤五嶺三湘水陸會合之地委輸商賈靡不由斯遂令荊湘湖南北舉舟師同力致討王師集淮夷毀壁焚郛郭而遁冊府元龜卷二百一十七秋七月甲戌大霖雨陂澤泛溢頗傷稼穡帝幸右天武軍河亭觀水冊府元龜卷二百五幸高僧臺閱禁衞六軍冊府元龜卷二百一十四詔曰車服以庸古之制也貴賤無別罪莫大焉應內外將相許以銀飾鞍勒其刺史都將內諸司使以降祇許用銅冀定尊卑永為條制仍令執法官糾察之冊府元龜卷一百九十一案五代會要載七月敕曰祭祀之儀有國大事如聞官吏慢于恪恭牲具禮容有異精審宜令御史臺疏其條件奏聞舊五代史考異癸巳以禪代已來思求賢哲乃下令搜訪牢籠之期以好爵待以優榮各隨其材咸使登用宜令所在長吏切加搜訪每得其人則疏姓名以聞如在下位不能自振者有司薦導之如任使後顯立功勞別加遷陟冊府元龜二百一十三勅禁屠宰兩月冊府元龜卷一百九十五甲午以高明門外繁臺為講武臺是臺西漢梁孝王之時嘗按歌閱樂於此當時因名曰吹臺其後有繁氏居於其側里人乃以姓呼之時代綿寢案綿寢原作綿浸今據通鑑注改正舊五代史考異雖官吏亦從俗焉帝每登眺蒐乘訓戎宰臣以是事奏而名之冊府元龜卷一百九十六案以上又見通鑑注所引薛史與冊府元龜相符惟字句稍有異同八月辛亥勅應有暴露骸骨各委差人埋瘞冊府元龜卷一百九十五兩浙錢鏐奏請重鑄換諸州新印冊府元龜卷一百九十一詔禁戢諸軍節級兵士及供奉官受旨殿直以下各脩禮敬冊府元龜卷一百九十一甲寅太史奏壽星見於南方冊府元龜卷二百二兩浙錢鏐奏改管內紫極宮為真聖觀冊府元龜卷一百九十四改臨安縣廣義鄉為衣錦鄉通鑑注引薛史案十國春秋吳越世家八月梁敕改唐山縣為吳昌縣唐興縣為天台縣又敕升杭越等州為大都督府, WYG: ''}
