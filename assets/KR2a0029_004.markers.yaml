  - {type: variant, offset: 12, length: 1, content: 第, WYG: 一九月帝遂與左右定計斬偽監軍使嚴實降於重榮案舊唐書僖宗紀朱温之降繫八月與是書異新唐書及通鑑俱繫九月與是書同疑舊唐書誤又嚴實原本訛作嚴貴今據歐陽史及通鑑改正乃詔授帝左金吾衛大將軍充河中行營副招討使案歐陽史云王鐸承制拜温金吾衛大將軍河中行營招討副使與是書謂僖宗招授者異攷舊唐書及通鑑則王鐸承制所拜乃華同節度在僖宗詔授以前歐陽史以詔授為王鐸承制當是删并之誤仍賜名全忠案是書及舊唐書通鑑皆作僖宗賜名惟鑑戒録云朱太祖統}
  - {type: page-break, offset: 12, content: '', id: KR2a0029_WYG_004-1b, image: WYG0277/WYG0277-0037d.png}
  - {type: variant, offset: 12, length: 1, content: 第, krp: 一九月帝遂與左右定計斬偽監軍使嚴實降於重榮案舊唐書僖宗紀朱温之降繫八月與是書異新唐書及通鑑俱繫九月與是書同疑舊唐書誤又嚴實原本訛作嚴貴今據歐陽史及通鑑改正乃詔授帝左金吾衛大將軍充河中行營副招討使案歐陽史云王鐸承制拜温金吾衛大將軍河中行營招討副使與是書謂僖宗招授者異攷舊唐書及通鑑則王鐸承制所拜乃華同節度在僖宗詔授以前歐陽史以詔授為王鐸承制當是删并之誤仍賜名全忠案是書及舊唐書通鑑皆作僖宗賜名惟鑑戒録云朱太祖統}
