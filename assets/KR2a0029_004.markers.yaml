  - {type: variant, offset: 3499, length: 411, content: 立二王三恪南郊禮儀使狀伏以詩稱有客書載虞賓實因禪代之初必行興繼之命俾之助祭式表推恩兼垂恪敬之文別示優崇之典徵於歷代襲用舊章謹按唐朝以後魏元氏子孫韓國公為三恪以周宇文氏子孫為介國公隋朝楊氏子孫為酅國公為二王後今伏以國家受禪封唐朝子孫李為萊國公今參詳合以介國公為三恪酅國公萊國公為二王後冊府元龜卷二百一十一案五代會要十二月改左右天武為龍虎軍左右龍虎為天武軍左右天威為羽林軍左右羽林為天威軍左右英武為神武軍左右神武為英武軍前朝置龍虎六軍謂之衞士至是以天武神武英武等六軍易其軍號而任勳舊焉舊五代史考異癸丑獵畋于含耀門外冊府元龜卷二百五開平三年正月戊辰朔帝御金祥殿受宰臣翰林學士稱賀文武百官拜表於東上閣門冊府元龜卷一百九十七己巳奉遷太廟四室神主赴西京太常儀仗鼓吹導引齋車文武百官奉辭於開明門外冊府元龜卷一百八十九甲戌發東都百官扈從次中牟縣乙亥次鄭州丙子次汜水縣河南尹張宗奭河陽節度使張歸霸並來朝戊寅次偃師縣己卯備法駕六軍儀仗入西都是, WYG: ''}
