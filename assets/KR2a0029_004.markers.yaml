  - {type: variant, offset: 14, length: 2, content: 開平, WYG: 鎮除中令日名温與崔相國連搆大事崔每奏太祖忠赤遷之闗東國無患矣昭宗遽敇太祖改名全忠議者謂全字人王也又在忠心甚不可也上方悔焉其説與諸史異葢𫝊聞之不同爾三年三月僖宗制授帝宣武軍節度使三月舊唐書作五月帝與許州田從異諸軍同收瓦子寨案瓦子寨原本訛作瓦子寨攷通鑑注云黄巢撤民居以為寨屋謂之瓦子寨則于字形近刋訛耳今改正三月庚辰僖宗降制就封帝為沛郡王案全忠之王舊唐書繫光唘元年三月據是書則元年惟増食邑至}
