  - {type: variant, offset: 14, length: 2, content: 開平, krp: 鎮除中令日名温與崔相國連搆大事崔每奏太祖忠赤遷之闗東國無患矣昭宗遽敇太祖改名全忠議者謂全字人王也又在忠心甚不可也上方悔焉其説與諸史異葢𫝊聞之不同爾三年三月僖宗制授帝宣武軍節度使三月舊唐書作五月帝與許州田從異諸軍同收瓦子寨案瓦子寨原本訛作瓦子寨攷通鑑注云黄巢撤民居以為寨屋謂之瓦子寨則于字形近刋訛耳今改正三月庚辰僖宗降制就封帝為沛郡王案全忠之王舊唐書繫光唘元年三月據是書則元年惟増食邑至}
  - {type: variant, offset: 18, length: 0, content: '', WYG: 三月乃進封也歐陽史從是書十一月滑州節度使安師儒以怠于軍政為部下所殺案舊唐書云十月壬子朔滑州軍亂逐其帥安師儒師儒奔汴朱全忠殺之歐陽史同新唐書云十月朱全忠陷滑州執義成軍節度使安師儒通鑑同據是書則師儒自為部下所殺與諸書互異又十一月新舊唐書俱作十月庚午賊將盧瑭領萬餘人于圃田北萬勝戍案通鑑攷異云長厯四月甲辰朔無庚午薛史誤今改舊唐書光啟三年四月正作甲辰朔以日數計之庚午乃四月二十七日也據此乃通鑑攷異之誤耳乃就加帝檢校太尉兼領淮南節度使案全忠兼領淮南舊唐書作光啓三年十一月歐陽史作十二月通鑑作閏十一月據是書則在九月以前與諸書異又是書下文作閏十二月通鑑作閏十一月未詳孰是九月亳州禆將謝殷逐刺史宋兖九月新唐書及通鑑俱作六月鄆州朱瑄瑄歐陽史作宣是時李璠郭言行至淮上為徐戎所扼不克進而還案歐陽史云璠之揚州行密不納據通鑑云李璠至泗州時溥以兵襲之郭言力戰得免而還是李璠未嘗至揚州也當以是書為得其實二月丙戌僖宗制以帝為蔡州四靣行營都統案全忠為四靣行營都統新唐書及通鑑作}
