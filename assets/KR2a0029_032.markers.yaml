  - {type: variant, offset: 222, length: 1406, content: 考異帝密召崇韜謂之曰予已許除郡經年未行我慚見二人卿當屈意行之故有是命甲辰以兗州節度使李紹欽依前檢校太保兗州節度使進封開國侯以邠州節度使韓恭依前檢校太保邠州節度使進封開國伯開國原作閑國今據冊府元龜改正影庫本粘籤丙午以福建節度使閩王王審知依前檢校太師守中書令福建節度使戊申幸郭崇韜第己酉詔天下收拆防城之具不得修濬池隍以西都留守京兆尹張筠依前檢校太保充西都留守甲寅以滄州節度使李紹斌充東北面招討使以兗州節度李紹欽為副招討使招討使原本作招詔今據文改正影庫本粘籤以宣徽使李紹宏為招討都監率大軍渡河而北時幽州上言契丹將寇河朔故也乙卯潞州叛將楊立遣使健步奉表乞行赦宥帝令樞密副使宋唐玉齎勅書招撫幽州上言契丹營於州東南丙辰渤海國王大諲撰遣使貢方物以澶州刺史李審益為幽州行軍司馬蕃漢內外都知兵馬使辛酉故澤潞節度使丁會贈太師詔割復州為荊南屬郡壬戌以權知鳳翔軍府事涇州節度使李曮為起復雲麾將軍右金吾大將軍同正依前檢校太尉兼中書令充鳳翔節度使乙丑以權知歸義軍留後曹義金為歸義軍節度使沙州刺史檢校司空丙寅李嗣源奏收復潞州幽州上言新授宣武軍節度使李存審卒六月甲戌中書侍郎兼吏部尚書平章事弘文館大學士豆盧革加右僕射餘如故侍中監修國史兼樞密使鎮州節度使郭崇韜進爵邑加功臣號中書侍郎平章事集賢殿大學士趙光裔加兼戶部尚書禮部侍郎平章事韋說加中書侍郎宋州奏節度使李紹安卒丙子李嗣源遣使部送潞州叛將楊立等到闕並磔於市潞州城峻而隍深隍深原本作王深今據文改正影庫本粘籤至是帝命剗平之因詔諸方鎮撤防城之備焉丁丑有司上言洛陽已建宗廟其北京太廟請停從之甲申以衞國夫人韓氏為淑妃燕國夫人伊氏為德妃仍令所司擇日冊命故河東節度副使守左諫議大夫李襲吉贈禮部尚書李襲吉原本作襲古今據歐陽史列傳改正影庫本粘籤故河東節度副使禮部尚書蘇循贈左僕射故河東觀察判官檢校右僕射司馬揆贈司空故河東留守判官工部尚書李敬義贈右僕射丙戌以順義軍節度使李令錫為許州節度使以前保義軍留後李紹真為徐州節度使以徐州節度使李紹榮為宋州節度使戊子汝州防禦使張繼孫賜死於本郡繼孫即齊王張全義之假子也本姓郝氏為兄繼業等訟其陰事故誅之案冊府元龜載張繼業為河陽兩使留後莊宗同光二年六月繼業上疏稱弟繼孫本姓郝有母尚在父全義養為假子令管衙內兵士自皇帝到京繼孫私藏兵甲招置部曲欲圖不軌兼私家淫縱無別無義臣若不自陳恐累家族勅曰有善必賞所以勸忠孝之方有惡必誅所以絕姦邪之迹其或罪狀騰於衆口醜行布於近親須舉朝章冀明國法汝州防禦使張繼孫本非張氏子孫自小丐養以至成立備極顯榮而不能酬撫育之恩履謙恭之道擅行威福常恣姦兇侵奪父權惑亂家事縱鳥獸之行畜梟獍之心有識者所不忍言無賴者實為其黨而又橫征暴斂虐法峻刑藏兵器於私家殺平人於廣陌罔思悛改難議矜容宜竄逐於遐方仍歸還於姓氏俾我勳賢之族永除污穢之風凡百臣僚宜體朕命可貶房州司戶參軍同正兼勒復本姓尋賜自盡仍籍沒資產己丑以迴鶻可汗仁美為英義可汗詔改輝州為單州庚寅故左僕射裴樞右僕射裴贄崔遠並贈司徒故靜海軍節度使獨孤損贈司空故吏部尚書陸扆贈右僕射故工部尚書王溥贈右僕射裴樞等六人皆前朝輔為梁祖所害於白馬驛至是追贈焉壬辰以天平軍節度使蕃漢總管副使開府儀同三司檢校太尉兼中書令李嗣源為宣武軍節度使蕃漢馬步總管餘如故甲午以樞密使特進左領軍衞上將軍知內侍省事張居翰為驃騎大將軍守左驍衞上將軍進封開國伯賜功臣號秋七月戊戌朔故宣武軍節度使李存審男彥超進其父牙兵八千七百人己亥中書門下奏每年南郊壇四祠祭太微宮, WYG: 巻十}
