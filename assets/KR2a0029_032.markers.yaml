雜錄云同光三年洛京積善坊得古文錢曰得一元寶順天元寶史不載何代鑄錢近見錢氏錢譜云史思明再陷洛陽鑄得一錢賊黨以為得一非佳號乃改順天蓋史思明所鑄錢也丙申寒食節帝與皇后出近郊遙饗代州親廟庚子詔取三月十七日車駕歸洛京壬寅符習奏修河隄畢功戊申帝召郭崇韜謂曰朕思在德勝寨時霍彥威段凝皆予之勍敵終日格鬬戰聲相聞安知二年之間在吾廡下吾無少康光武之才一旦重興基構者良由二三勳德同心輔翼故也朕有時夢寢如在戚城思念曩時挑戰鏖兵勞則勞矣然而揚旌伐鼓差慰人心殘壘荒溝依然在目予欲按德勝故寨與卿再陳舊事崇韜曰此去澶州不遠陛下再觀戰地益知王業之艱難豈不韙哉己酉車駕發鄴宮辛亥至德勝城案五代春秋作庚子帝幸鄴都遂幸德勝故城據薛史則己酉發鄴宮辛亥至德勝城與五代春秋異蓋五代春秋祇以下詔之日為據也登城四望指戰陣之處以諭宰臣渡河南觀廢柵舊阯至楊村寨沿河至戚城置酒作樂而罷壬子淮南楊溥遣使朝貢東京副留守張憲奏諸營家口一千二百人逃亡以艱食故也時宮苑使王允平伶人景進為帝廣采宮人不擇良家委巷殆千餘人車駕不給載以牛車纍纍於路焉庚辰車駕至自鄴案原本作庚辰歐陽史作庚申疑永樂大典傳寫之訛考通鑑及五代春秋皆作庚辰又疑原本不誤據上文正月甲午朔二月甲子朔三月癸巳朔則三月不得有庚辰也蓋其誤始於薛史而通鑑五代春秋皆襲其訛耳今姑從原本仍為辨正於此辛酉詔本朝以雍州為西京洛州為東都幷州為北都近以魏州為東京宜依舊以洛京為東都魏州改為鄴都與北都並為次府夏四月癸亥朔案五代春秋作辛亥朔通鑑從薛史日有蝕之以租庸副使孔循權知汴州軍州事丙寅淮南楊溥遣使貢方物壬申幸甘泉亭癸酉詔翰林學士承旨盧質覆試新及第進士案五代會要時以新及第進士符蒙正等尚干浮議故命盧質覆試租庸使奏時雨久愆請下諸道州府依法祈禱從之乙亥帝與皇后幸郭崇韜第又幸左龍武統軍朱漢賓之第戊寅以耀州為團練州其順義軍額宜停庚辰帝侍皇太后幸會節園遂幸李紹榮之第辛巳以旱甚詔河南府徙市造五方龍集巫禱祭癸未以兗州節度使李紹欽為鄧州節度使丁亥以鎮州節度使李嗣源兼北面水陸轉運使以徐州節度使李紹真為副禮部貢院新及第進士四人其王澈改為第一桑維翰第二符蒙正第三成僚第四禮部侍郎裴皡既無黜落特議寬容今後新及第人候過堂日委中書門下精加詳覆陝州奏木連理庚寅中書侍郎兼工部尚書平章事趙光胤卒案薛史二年六月光允加兼戶部尚書此處作工部前後互異未知孰是舊五代史考異廢朝三日五月壬辰朔淮南楊溥貢端午節物丁酉皇太妃劉氏薨於晉陽廢朝五日帝於興安殿行服時皇太后欲奔喪於晉陽百官上表請留乃止戊戌以鎮州行軍司馬知軍府事任圜為工部尚書戊申幸龍門廣化寺祈雨己酉黑水女真皆遣使朝貢戊午以鳳州衙內馬步軍都指揮使李繼昶為涇州節度使李繼昶原本作繼永今從歐陽史改正影庫本粘籤檢校太傅己未詔天下見禁罪人如無大過速令疎放幸玄元廟禱雨六月癸亥雲州上言去年契丹從磧北歸帳達靼因相掩擊其首領于越族帳自磧北以部族羊馬三萬來降已到南界今差使人來赴闕奏事甲子太白晝見丁卯以滄州節度使安元信充北面行營馬步軍都排陣使辛未以宗正卿李紓充昭宗少帝改卜園陵使壬申京師雨足自是大雨至於九月晝夜陰晦未嘗澄霽江河漂溢隄防壞決天下皆訴水災丁丑詔吳越王錢鏐將行冊禮準禮文合用竹冊宜令所司修製玉冊時郭崇韜秉政以為不可樞密承旨段徊贊其事故有是命癸丑以天德軍節度使管內蕃漢都知兵馬使劉承訓為天德軍節度觀察留後丙戌詔曰關內諸陵頃因喪亂例遭穿穴多未掩修其下宮殿宇法物等各令奉陵州府據所管陵園修製仍四時各依舊例薦饗每陵仰差近陵百姓二十戶充陵戶以備灑掃其壽陵等一十陵亦一例修掩量置陵戶戊子以刑部尚書李琪充昭宗少帝改卜園陵禮儀使己丑以工部郎中李途為京兆少尹充修奉諸陵使辛卯詔括天下私馬案五代會要詔下河南河北諸州和市戰馬官吏除一匹外匿者坐罪蓋當時私馬之禁如此將收蜀故也永樂大典卷七千一百五十七案三楚新錄莊宗謂高季興曰今天下負固不服者惟吳蜀耳朕欲先有事于蜀而蜀地險阻尤難江南才隔荊南一水朕欲先之卿以為何如季興對曰臣聞蜀地富民饒獲之可建大利江南國貧地狹民少得之恐無益臣願陛下釋吳先蜀時莊宗意亦欲伐蜀及聞季興之言果大悅舊五代史考異, krp: 攷證}
