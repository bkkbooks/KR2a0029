  - {type: variant, offset: 1629, length: 5589, content: 薦獻並宰臣攝太尉行事惟太廟遣庶僚行事此後太廟祠祭亦望差宰臣行事從之乙巳汴州雍丘縣大風拔木傷稼曹州大雨平地水三尺丙午以襄州節度使孔勍為潞州節度使李存霸為鄆州節度使鄆州原本作軍州今據冊府元龜改正影庫本粘籤乙酉幸龍門之雷山祭天神從北俗之舊事也辛亥以鄆州副使李紹珙為襄州留後以前澤州刺史董璋為邠州留後戊午西川王衍遣偽署戶部侍郎歐陽彬來朝貢稱大蜀皇帝上書大唐皇帝庚申以應州為雲州屬郡升新州為威塞軍節度使以媯儒武等州為屬郡壬戌皇子繼岌妻王氏封魏國夫人幽州奏契丹阿保機東攻渤海案遼史太祖紀天贊三年五月渤海殺其刺史張秀實而掠其民於東攻渤海之事闕而不載考五代會要同光二年七月契丹東攻渤海國與薛史同八月己巳詔洛京應有隙地任人請射修造有主者限半年令本主自修蓋如過限不見屋宇許他人占射案五代會要載此詔云藩方侯伯內外臣僚于京邑之中無安居之所亦可請射各自修營舊五代史考異辛未北京副留守太原尹孟知祥加檢校太傅增邑賜功臣號帝畋於西苑癸酉以租庸副使守衞尉卿孔謙為租庸使以右威衞上將軍孔循為租庸副使甲戌以權知汴州軍州事翰林學士承旨戶部尚書盧質為兵部尚書依前翰林學士承旨仍賜論思匡佐功臣丙子以雲州刺史雁門以北都知兵馬使安元信為大同軍節度留後以隰州刺史張廷裕為新州威塞軍節度留後丁丑樞密使郭崇韜上表請退不允戊寅租庸使守禮部尚書王正言罷使守本官辛巳詔諸道節度觀察防禦團練使團練原本作團簡今據文改正影庫本粘籤刺史並於洛陽修宅一區中書門下上言請今後諸道除節度副使兩使判官外其餘職員幷諸州軍事判官各任本處奏辟從之案五代會要同光二年八月八日中書門下奏諸道除節度副使及兩使判官除授外其餘職員幷軍事判官伏以翹車著詠戔帛垂文式重弓旌以光尊俎由是副知己之薦成接士之榮必當備悉行藏習知才行允奉幕中之畫以稱席上之珍爰自偽梁頗乖斯義皆從除授以佐藩宣因緣多事之秋慮爽得人之選將期推擇式示更張今後諸道除節度副使兩使判官除授外其餘職員幷諸州軍事判官等並任本道本州各當辟舉其軍事判官仍不在奏官之限舊五代史考異汴州奏大水損稼癸未租庸使孔謙進封會稽縣男仍賜豐財贍國功臣淮南楊溥遣使貢方物宋州大水鄆曹等州大風雨損稼丁亥中書門下侍郎奏請差左丞崔沂吏部尚書崔貽孫給事中鄭韜光李光序吏部員外郎盧損等同詳定選司長定格循資格十道圖從之案五代會要同光二年八月中書門下奏吏部三銓門下省南曹廢置甲庫格式流外銓等司公事並繫長定格循資格十道圖等前件格文本朝創立檢制姦濫倫官資頗謂精詳久同遵守自亂離之後巧偽滋多兼同光元年八月車駕在東京權判工部員外郎盧重本司起請一卷並以興復之始務切懷來凡有條流多失根本以至冬集赴選人並南郊行事官及陪位宗子共一千三百餘人銓曹檢勘之時互有援引去留之際不絕爭論若又依違必長訛濫望差權判尚書省銓左丞崔沂吏部侍郎崔貽孫給事中鄭韜光李光序吏部員外郎盧損等同詳定舊長定格循資格十道圖務令簡要可久施行從之舊五代史考異癸巳於朝參三日以霖雨故也陝州奏河水溢岸乙未中書門下上言諸陵臺令丞請停以本縣令知陵臺事從之九月癸卯畋於西北郊幽州上言契丹阿保機自渤海國迴軍內園新殿成名曰長春殿戊申以中書舍人權知貢舉裴皡為禮部侍郎以前鄭州防禦副使姜弘道為太僕卿侍中郭崇韜奏應三銓注授官員等三銓原本作正千今據五代會要改正影庫本粘籤內有自無出身入仕買覓鬼名告勅今將骨肉文書揩改姓名或歷任不足妄稱失墜或假人蔭緒託形勢論屬安排參選所司隨例注官如有人陳告特議超奬其所犯人檢格處分若同保人內有偽濫者並當駮放應有人身死之處今後並須申報本州於告身上批書身死月日分明付子孫今後銓司公事至春末並須了畢從之銓綜之司偽濫日久及崇韜條奏之後澄汰甚嚴放棄者十有七八放棄原本作坊歨今據五代會要改正影庫本粘籤衆情亦怨之己酉司天臺請禁私曆日從之庚戌有司自契丹至者言女真迴鶻黃頭室韋合勢侵契丹壬子有司上言八月二十二日夜熒惑犯星二度星周分也請依法禳之於京城四門懸東流水一罌兼令都市嚴備盜火止絕夜行從之甲寅幸郭崇韜第置酒作樂乙卯以前振武節度使安北都護馬存可依前檢校太尉兼侍中充寧遠軍節度容管觀察使存湖南馬殷之弟也丙辰黑水國遣使朝貢契丹寇幽州戊午宣宰臣於中書磨勘吏部選人謬濫者焚毀告勅冬十月戊辰帝畋於西北郊己巳故安義節度使贈太尉隴西郡王李嗣昭贈太師庚午正衙命使冊淑妃韓氏德妃伊氏以宰臣豆盧革韋說充冊使辛未詔今後支郡公事須申本道騰狀奏聞騰狀原本作膝將今據冊府元龜改正影庫本粘籤租庸使各有徵催祇牒觀察使貴全理體契丹寇易定北鄙壬申故大同軍防禦使李存璋贈太尉鄆州奏清河泛溢壞廬舍癸未畋於石橋甲戌河南尹張全義上言萬壽節日請於嵩山開瑠璃戒壇度僧百人從之乙亥故守太師尚書令秦王李茂貞追封秦王賜諡曰忠敬丁丑皇后差使賜兗州節度使李紹欽湯藥時皇太后行誥命皇后劉氏行教命互遣使人宣達藩后紊亂之弊人不敢言己卯汴鄆二州奏大水庚辰以前太僕卿楊遘為大理卿党項進白驢