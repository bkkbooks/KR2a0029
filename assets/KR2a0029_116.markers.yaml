  - {type: variant, offset: 12622, length: 463, content: 文鏐見謂之曰速收慮人恐踏破汝錢昭師笑曰汝錢欲踏破須是牛即可鏐喜以為社稷堅牢之義後至曾孫俶舉族入朝因而國除俶年屬丑為牛可謂牛踏錢而破矣錢鏐末年患雙目有醫人不知所從來自云累世醫內外障眼其術善於用針無不效者鏐聞召而使觀之醫人曰可治然大王非常人患殆天與之若醫是違天理也恐無益於壽幸思之鏐曰吾起自行伍跨有方面富貴足矣但得兩眼見物為鬼不亦快乎既而下手莫不應手豁然鏐喜所賜動以萬計醫人皆辭不受明年鏐卒僧契盈閩中人通內外學性尤敏速廣順初遊戲錢塘一旦陪吳越王遊碧浪亭時潮水初滿舟楫輻輳望之不見其首尾王喜曰吳越地去京師三千餘里而誰知一水之利有如此耶契盈對曰可謂三千里外一條水十二時中兩度潮時人謂之佳對時江南未通兩浙貢賦自海路而至青州故云三千里也史臣曰自唐末亂離海內分割荊湖江浙各據一方翼子貽孫多歷年所夫如是者何也蓋值諸夏多艱王風不競故也洎皇宋之撫運也因朗陵之肇亂命王師以有征一矢不亡二方俱服遂使瑤琨篠簜咸遵作貢之文江漢濉漳盡鼓朝宗之浪夫如是者何也蓋屬大統有歸人寰允洽故也唯錢氏之守杭越逾八十年蓋事大勤王之節與荊楚湖湘不侔矣永樂大典卷五千五百三十八, WYG: 七攷證}
