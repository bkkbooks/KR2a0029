  - {type: line-break, offset: 10, content: '', id: ZHSJ__dup18752}
  - {type: variant, offset: 13, length: 322, content: 傳第二高季興字貽孫陝州硤石人也本名季昌及後唐莊宗即位避其廟諱改焉幼隸於汴之賈人李七郎梁祖以李七郎為子賜姓名友讓梁祖嘗見季興於僕隸中其耳面稍異命友讓養之為子梁祖以季興為牙將漸能騎射唐天復中昭宗在岐下梁祖圍鳳翔日久鳳翔原本作龍翔今據通鑑改正影庫本粘籤衆議欲班師獨季興諫止之語在梁祖紀中既而竟迎昭宗歸京以季興為迎鑾毅勇功臣檢校大司空行宋州刺史從梁祖平青州改知宿州事遷潁州防禦使梁祖令復姓高氏擢為荊南兵馬留後荊州自唐乾符之後兵火互集井邑不完季興招葺離散流民歸復梁祖嘉之乃授節鉞梁開平中破雷彥恭於朗州加平章事荊南舊無外壘季興始城之遂厚斂於民招聚亡命自後僭臣於吳蜀梁氏稍不能制焉因就封渤海王嘗攻襄州為孔勍所敗及莊宗定天下季興來朝於洛陽加兼中書令時論多請留之, WYG: 𫝊九}
