  - {type: variant, offset: 12310, length: 178, content: 影庫本粘籤立倧異母弟俶為帥其年夏四月進思疽發背而卒越人快之以為陰靈之誅逆也永樂大典卷四千六百九十二俶元瓘之子倧之異母弟也倧既為軍校所幽時俶為溫州刺史衆以無帥遂迎立之時漢乾祐元年正月十五日也其年八月始授檢校太師兼中書令充鎮海鎮東等軍節度使東南面兵馬都元帥周廣順中累官至守尚書令中書令吳越國王皇朝建隆初復加天下兵馬大元帥其後事具皇朝日曆永樂大典卷四千六百九十二, WYG: 按巴堅舊作阿保機今改舊}
