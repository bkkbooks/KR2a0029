  - {type: variant, offset: 455, length: 483, content: 不迴中外之情其何以堪吾高枕無憂矣乃增築西面羅城備禦敵之具時梁朝舊軍多為季興所誘由是兵衆漸多跋扈之志堅矣明年冊拜南平王南平原本作南興今據十國春秋改正影庫本粘籤魏王繼岌平蜀盡選其寶貨浮江而下船至峽口會莊宗遇禍季興盡邀取之明宗即位復請夔峽為屬郡初俞其請後朝廷除刺史季興上言稱已令子弟權知郡事請不除刺史不臣之狀既形詔削奪其官爵天成初命西方鄴興師收復三州又遣襄州節度使劉訓總兵圍荊南以問其罪屬霖潦班師三年冬季興病脚氣而卒其子從誨嗣立累表謝罪請修職貢由是復季興官爵諡曰武信永樂大典卷一萬八千三百一十一從誨初仕梁歷殿前控鶴都頭鞍轡庫副使左軍巡使如京使左千牛大將軍荊南牙內都指揮使領濠州刺史改歸州刺史累官至檢校太傅初季興之將叛也從誨常泣諫之季興不從天成三年冬季興薨從誨乃上表謝罪復修職貢明宗嘉之尋命起復授荊南節度使兼侍中長興三年加檢校太尉應順中封南平王清泰初加檢校太師晉天福中加守中書令六年襄州安從進反王師攻討從誨饋軍食以助焉詔書褒美尋加守尚書令從誨上章固讓朝廷遣使敦勉竟不受其命時有術士言從誨年命有厄宜退避退避原本脫退字今從冊府元龜改正影庫本粘籤寵祿故也及契丹入汴漢高祖起義於太原, WYG: ''}
