  - {type: variant, offset: 3244, length: 9055, content: 日諡曰武穆子希聲嗣初殷微時隱隱見神人侍側因默記默記原本作默託今據文改正影庫本粘籤其形像及貴因謁衡山廟覩廟中神人塑像宛如微時所見者則知人之貴者必有陰物護之豈偶然哉永樂大典卷一萬八千一百二十八案以下原本殘闕希範晉天福中授江南諸道都統又加天策上將軍谿州洞蠻彭士愁案原本訛士秋今據歐陽史及通鑑改正舊五代史考異寇辰澧二州希範討平之士愁以五州乞盟乃銘於銅柱希範自言漢伏波軍援之後故鑄銅柱以繼之永樂大典卷八千二百二十一案此傳有闕文馬希廣希艹口咢傳全篇俱佚五代史補高郁為武穆王謀臣莊宗素聞其名及有天下且欲離間之會武穆王使其子希範入覲莊宗以希範年少易激發因其敷奏敏速乃撫其背曰國人皆言馬家社稷必為高郁所取今有子如此高郁安得取此耶希範居常嫉郁忽聞莊宗言深以為然及歸告武穆請誅之武穆笑曰主上爭戰得天下能用機數以郁資吾霸業故欲間之耳若梁朝罷王彥章兵權也蓋遭此計必至破滅今汝誅郁正落其彀中慎勿言也希範以武穆不決禍在朝夕因使誣告郁謀反而族滅之自是軍中之政往往失序識者痛之初郁與武穆俱起行陣郁貪且僭常以所居之井不甚清澈思所以澄汰之乃用銀葉護其四方自內至外皆然謂之拓𩹉其奉養過差皆此類也故莊宗得以媒蘖自後陰晦中見郁後竟為所患爾馬希範武穆之嫡子性奢侈嗣位未幾乞依故事置天策府僚屬於是擢從事有才行者有若都統判官李鐸靜江府節度判官潘武安軍節度判官拓拔坦都統掌書記李臯鎮南節度判官李莊昭順軍節度判官徐收澧州觀察判官彭繼英江南觀察判官廖圖昭順軍觀察判官徐中雅靜江府掌書記鄧懿文武平軍節度掌書記李松年鎮南軍節度掌書記衛曮昭順軍觀察支使彭繼勳武平軍節度推官蕭銖桂管觀察推官何仲舉武安軍節度巡官孟玄暉容管節度推官劉昭禹等十八人並為學士其餘列校自袁友恭張少敵等各以次授任莫不大興土木以建興府庭其最為壯麗者即有九龍金華等殿殿之成也用丹砂塗其壁凡用數十萬斤石每僚吏謁見將升殿但覺丹砂之氣藹然襲人其費用也皆此類初教令既下主者以丹砂非卒致之物相顧憂色居無何東境山崩湧出丹砂委積如丘陵於是收而用之契丹南侵聞其事以為希範非常人遽使冊為尚文希範得冊以為契丹推奉欣然當之矣丁思僅素有才略為馬氏騎將以希範受契丹冊命深恥之因謂希範曰今朝廷失守正忠臣義士奮發之時使馳檄四方引軍直趨京師驅契丹天子反正然後凱還如此則齊桓晉文不足數矣時不可失願大王急圖之希範本無遠略加以興作府署未畢不忍棄去遂寢思僅之謀思僅不勝其憤謂所親曰古人疾沒世而名不稱今遭逢擾攘不能立功於天下反顧戀數間屋子乎誠可痛也自是思僅常怏怏文昭王夫人彭氏封秦國夫人常往城北報恩寺燒香時僧魁謂之長老問曰夫人誰家婦女彭氏大怒索檐子疾驅而歸文昭驚曰何歸之速也夫人曰今日好沒興被箇老禿賊問妾是誰家婦女且大凡婦女皆不善之辭安得對妾而發文昭笑曰此所謂禪機也夫人宜答弟子是彭家女馬家婦是則通其理矣何怒之有乎夫人素負才智恥不能對乃曰如此則妾所謂無見性也於是慚赧數日石文德連州人形質矬陋好學尤工詩霸國時屢獻詩求用文昭以其寢陋未曾禮待文德由是窮悴有南宅王子者素重士延於門下其後文昭知之亦兼怒王宅欲庭辱文德而逐之居無何秦國夫人彭氏薨文昭傷悼乃命有文學者各撰挽詞文德亦獻十餘篇其一聯云月沉湘浦冷花謝漢宮秋文昭覽之大驚曰文德有此作用吾但以寢陋而輕之乃不如南宮小兒却能知賢耶於是始召文德而愧謝之未幾承制授水部員外郎充融州刺史文德晚尤好著述乃撰大唐新纂十三卷多名人遺事詞雖不工事或可采時以多聞許之何仲舉營道人美姿容年十三俊邁絕倫時家貧輸稅不及限李臯為營道令怒之乃荷項係獄將檟楚焉或有言於臯曰此子雖能為詩往往間立成希明府一察之臯聞遽召而問曰知汝有文且速敏今日之事若能文不加點為一篇以自述吾當貸汝仲舉援筆而成曰似玉來投獄拋家去就枷可憐兩片木夾却一枝花臯大驚因自為脫枷延上廳與之抗禮自是仲舉始銳意就學天成中入洛時秦王為河南尹尤重士仲舉與張杭江文蔚俱遊其門及其東薦也公舉數百人獨以仲舉為擅場仲舉因獻詩曰碧雲章句纔離手紫府神仙盡點頭秦王大悅稱賞不已故一舉上第及歸遇文昭馬氏承制依唐太宗故事於天策府置十八學士以為學士之首且執政柄而仲舉自以出於臯之門下雖策名中朝事臯未嘗暫懈臯感悅遂加引用未幾與之同列及出又為全衡二州刺史先是湖南尤多詩人其最顯者有沈彬廖凝劉昭禹尚顏齊己虛中之徒而仲舉在諸公間尤為輕淺惟李臯獨推許之往往對衆吟秋日晚望詩曰樹迎高鳥歸深野雲傍斜陽過遠山以足扣地嘆曰何仲舉乃詩家之高逸者也諸官見取舍其餘奴岳乃間氣爾故仲舉感臯之見知卒能自奮至於名節亦終始無玷論者以臯有知人之鑒歐陽彬衡山人世為縣吏至彬特好學工于詞賦馬氏之有湖南也彬將希其用乃攜所著詣府求見之禮必先通名紙有掌客吏衆謂樊知客好賄陰使人謂彬曰足下之來非徒然也實欲顯族致身而不以一物為貺其可乎彬恥以賄進竟不與既而樊氏怒擲名紙於地曰豈吏人之子欲干謁王侯耶彬深恨之因退而為詩曰無錢將乞樊知客名紙生毛不為通因而落魄街巿歌姬酒徒無所不狎有歌人瑞卿者慕其才遂延於家瑞卿能歌每歲武穆王生辰必歌于筵上時湖南自舊管七郡外又加武陵岳陽是九州彬作九州歌以授瑞卿至時使歌之實欲感動武穆既而竟不問彬嘆曰天下分裂之際廝徒負養皆能自奮我貧而至此耶計無所出思欲竄入鄰道但未有所向居無何聞西蜀圖綱將發彬遂謀入蜀且私謂瑞卿曰吾以干謁不遂居於汝家未嘗有倦色其可輕棄乎然士以功名為不朽不于此時圖之恐貽後悔今吾他適庶幾有成勿以為念瑞卿曰君於妾不可謂之無情然一旦不以妾自滯割愛而去得非功名之將至耶妾誠異之家財約數緡雖不豐願分為半以資路途彬亦不讓因以瑞卿所贈盡賂綱吏求為駕船僕夫綱吏許之既至蜀遂獻獨鯉朝天賦蜀主大悅擢居清要其後官至尚書左丞相出為夔州節度使既領夔州武穆王已薨其子希範繼立因致書于希範疇昔入蜀之由仍以衡山宗族為託希範得書大慚彬之親友悉免其賦役下令搜訪草澤由是士無賢不肖參謁皆延客之因彬所致也彬雅有風儀其為文辭近而理真聞之者雖不知書亦釋然曉之竟以此遇戴偃金陵人能為詩尤好規諷唐末罹亂游湘中值馬氏有國至文昭王以公子得位尤好奢侈起天策府搆九龍金華等殿土木之工斤斧之聲晝夜不絕偃非之自稱玄黃子著漁父詩百篇以獻欲譏諷之故其句有纔把咽喉吞世界蓋因奢侈致危亡又曰若須拋却便拋却莫待風高更水深文昭覽之怒一旦謂賓佐曰戴偃何如人時賓佐不測以偃為文昭所重或對曰偃詩人章句深為流輩所推許方今在貧悴大王哀之置之髯參短簿之間足矣文昭曰數日前獻吾詩想其為人大抵務以漁釣自娛爾宜賜碧湘湖便以遂其性亦優賢之道也即日使遷居湖上乃潛戒公私不得與之往還自是偃窮餓日至無以為計乃謂妻曰與汝結髮已生一男一女今度不惟擠于溝壑亦恐首領不得完全宜分兒遁去庶幾可免不然旦夕死矣於是舉骰子與妻子約曰彩多得兒彩少得女既擲偃彩少乃攜女相與慟哭而別偃將奔嶺南至永州會文昭薨乃止其後不知所終李臯與弟節俱在湖南幕下節亦有文學同光初馬氏武穆王授湖南諸道都統詔賜戰馬數百匹臯為謝表百餘字後思意艱澀時節在側臯顧謂之曰嘗聞馬有旋風之隊如何得一事為對節曰馬既有旋風隊軍亦有偃月營何患耶臯欣然下筆云尋當偃月之營擺作旋風之隊表遂成論者以此對最為親切僧洪道不知何許人通內外學道行尤高大為時人所重天福中居於衡州石羊鎮山谷中馬氏文昭王之嗣位也聞其名召于府使於報慈寺住持洪不應命文昭堅欲致之督責州縣憂懼計無所出率五七十人拱擁入州洪道知之乃引徒弟數輩轉徙入深山中得一岩遂且止息然離舊居抵於山岩下則衆鳥千萬和鳴而隨之州縣雖失其蹤或有相謂曰且深山之中衆鳥何故而鳴又聲韻優逸得非和尚在彼耶試尋果得之於岩所父老再拜曰和尚佛之徒也佛不遺衆生願大王崇重要與和尚相見輒不應召竄入山林於是和尚即得計矣而州縣與鄉村得無勞擾而和尚忍不為之開慈憫耶洪道於是始點頭曰如此則吾為汝行矣及至府文昭以國師待之未幾堅乞歸山文昭知不可留乃許焉其後竟不知所終初洪道之入岩也見一虎在穴乳二子徒弟大駭洪道吒曰無懼彼當移去言訖虎啣二子趨出穴至行之所感也如此馬希範常重一僧號報慈長老能入定觀人休咎希範因問之曰吾于富貴固無遺恨但不知者壽爾吾師以為何如報慈曰大王無憂當與佛齊年希範喜以為享壽無窮及薨也止於四十九先是希範常嫉高郁之為人因莊宗言而殺之至是方臨江觀競渡置酒未及飲而希範忽驚起顧其弟曰高郁來希廣亦驚曰高郁死久矣大王勿妄言而希範血自鼻出是夕遂卒馬希範卒判官李臯以希範同母弟希廣為天策府都尉撫御尤非所長大校張少敵憂之建議請立希廣庶兄武陵帥希艹口咢且曰希萼處長負氣觀其所為必不為都尉之下加之在武陵九溪蠻通好往來甚歡若不得立必引蠻軍為亂幸為思之李臯忽怒曰汝輩何知且先大王為都尉俱為嫡嗣不立之却用老婢兒可乎少敵曰國家之事不可拘以一途變而能通所以國長久也何嫡庶之云乎若明公必立都尉當妙設方略以制武陵使帖然不動乃可不然則社稷去矣臯愈怒竟不從少敵之謀少敵度無可奈何遂辭不出未幾希艹口咢果以武陵反引洞溪蠻數路齊進遂之長沙縊希廣于郊外而支解李臯自是湖南大亂未逾年而國滅一如少敵之言初希艹口咢之來也希廣以全軍付親校許可瓊使遂擊之可瓊覩希艹口咢衆盛恐懼夜送旗鼓乞降希艹口咢大喜於是兼可瓊之衆長驅而至希廣素奉佛聞之計無所出乃被緇衣引羣僧念寶勝如來謂之禳災頃之府廨火起人忽紛擾猶念誦之聲未輟其戇如此少敵憂之良有以也先是城中街道尚種槐其柳即無十一二至是內外一變皆種柳無復槐矣又居人夜間好織草鞋似槌芒之聲聞於郊野俄有童謠云湖南城郭好長街竟栽柳樹不栽槐百姓奔竄無一事只是槌芒織草鞋人無長少皆誦之未幾國亂百姓奔竄死于溝壑者十有八九至是議者始悟蓋長街者通內外之路也槐者為言懷也不栽槐蓋兄弟不睦以至國亡失孔懷之義也草鞋者遠行所用蓋百姓遠行奔竄之象也馬希艹口咢既立不治國事數與僚吏縱酒為樂有小吏謝廷擇者本帳下廝養有容貌希艹口咢素寵嬖之每筵會皆命廷擇預坐諸官甚有在下者於是衆怒往往偶語曰此輩舊制有燕會唯用兵守門以防他虞今與我等齊列何辱之甚耶其弟希崇因衆怒咄咄與其黨竊發擒希艹口咢囚之於衡陽又自立未數日江南遣袁州刺史邊鎬乘其亂領兵來伐希崇度不能敵遂降先是長沙童謠云鞭打馬走不暇未幾果為邊鎬所滅初鎬嘗為僧以覘湖南尤善弄鈸每侵晨必弄鈸行乞遇城往往擲起鈸以度門之高下及來湖南士庶頗有識之者廖氏虔州贛縣人有子三人伯曰圖仲曰偃季曰凝圖凝皆有詩名偃蹻勇絕倫由是豪橫遂為鄉里所憚江南命功臣鐘章為虔州刺史深嫉之於是圖與凝等議曰觀章所為但欲滅吾族矣若戀土不去禍且及矣於是領其族暨部等三千餘人具鎧仗號令而後行章不敢逐遂奔湖南時武穆王在位見其衆盛恐難制欲盡誅之或者曰大王姓馬而廖來歸廖者料也馬得料其勢必肥實國家大興之兆其可殺之乎武穆喜遂善待仍制下以凝為永州刺史圖為行軍司馬偃為天策府列校仍賜莊宅于衡山自稱逸人偃能於馬上挺身而立取溼衣振奮而服之以示輕捷荊南高季興次子忘其名管親軍雲猛都謂之雲猛郎君聞偃名因兩境交兵請與偃鬬偃欣然而往雲猛能用鎗見偃瘦小心輕之馳騎而刺偃垂及之偃佯落馬雲猛勢未及止偃自後奮戈一擊墮地因生擒之自是其名愈振故武穆王終世不為隣境所輕者偃之力焉至其子希範嗣位九溪蠻叛命偃率兵討之為流矢所傷死於蠻中凶訃至希範使人報其母張氏張氏不哭謂其使曰為妾謝大王舉家三百餘口受王分食解衣之賜雖盡死未足以上報況一子乎望大王勿以為念希範聞而嘆曰廖氏有此母欲不興其可得乎於是厚加存恤仍遣使召凝任為從事至希範薨國亂為江南所滅遂遷金陵唐主授以水部員外郎為洪州連昌縣令未幾又遷江州團練使凝為人不羈好恢諧嘗覽裴說經杜工部墓詩曰擬鑿孤墳破重教大雅生因曰如此裴說乃劫墳賊耳聞者笑之在江州盛暑嘗患體燥乃以一大桶盛冷水坐于其間或至終日雖賓友謁見出露其首與之談笑其簡率如此先是凝嘗夢人以印授之拜捧之際其印缺其一角凝不能測及授江州之命始悟曰印缺一角蓋偏裨之象也團練副使不亦宜乎時人異之劉言本朗州之牙將也初馬氏舉族為江南所俘朗州無帥衆乃推列校馬光惠為武平軍留後光惠署言為副使既而光惠躭荒僭侈軍情不附遂行廢黜以言代光惠為留後時周廣順二年秋也言既立北則遣使奉表於周太祖東亦上章於江南李景求正授旄鉞景未之許時邊鎬據湖南邊鎬原本作逮鎬今從通鑑改正影庫本粘籤潛遣人齎金帛說誘武陵谿洞諸蠻欲合勢以攻朗州會李景降偽詔徵言赴金陵言懼不從偽命以其年冬十月三日與其節度副使王進逵行軍司馬何敬真都指揮使周行逢等同領舟師以襲潭州九日攻拔益陽寨殺淮軍數千人十三日至潭州城下是夕邊鎬領其部衆棄城東走進逵敬真遂入據其城言乃遣牙將張崇嗣奉表於周太祖且言潭州兵戈之後焚燒殆盡乞移使府於朗州從之詔升朗州為大都督府在潭州之上廣順三年春正月制以言為檢校太師同平章事朗州大都督充武平軍節度使制置武安靜江等軍事又以王進逵為武安軍節度使何敬真為靜江軍節度使並檢校太尉以周行逢領集州集州原本作佳州今從宋史改正影庫本粘籤刺史充武安軍節度行軍司馬未幾言遣何敬真帥軍南擊廣賊敬真失律奔歸潭州為王進逵所殺其年秋進逵奏劉言與淮賊通連差指揮使鄭珓部領兵士欲併當道鄭珓為軍衆所執奔入武陵劉言尋為諸軍所廢臣已至朗州安撫訖周太祖詔劉言宜勒歸私第委王進逵取便安置言尋遇害朝廷乃正授進逵朗州節制顯德元年秋制以武安軍節度副使周行逢為鄂州鄂州原本作郁州今據東都事略改正影庫本粘籤節度使權知潭州軍府事加檢校太尉三年春正月世宗將伐淮甸詔進逵率兵入江南界二月進逵準詔而行仍遣部將潘叔嗣領兵五千為先鋒行及鄂州界叔嗣迴戈以襲朗州進逵聞之倍道先入武陵叔嗣遽攻其城進逵敗為叔嗣所殺遣人詣潭州請周行逢至朗州斬叔嗣於巿其年秋七月制以行逢為朗州大都督充武平軍節度使加兼侍中自是潭朗之地遂為行逢所有皇朝建隆初就加中書令四年行逢卒三軍立其子保權為帥未幾朗軍亂求救於朝廷及王師平定荊湖保權入朝由是湖湘之地盡為王土矣永樂大典卷九千九十九錢鏐杭州臨安縣人少拳勇喜任俠以解仇報怨為事唐乾符中事於潛於潛原本作烏潛今從新唐書改正影庫本粘籤鎮將董昌為部校屬天下喪亂黃巢寇嶺表江淮之盜賊羣聚大者攻州郡小者剽閭里董昌聚衆恣橫於杭越之間杭州八縣每縣召募千人為一都時謂之杭州八都以遏黃巢之衝要時有劉漢宏者聚徒據越州自稱節度使攻收鄰郡潤州牙將薛朗逐其節度使周寶自稱留後唐僖宗在蜀詔董昌討伐昌以軍政委鏐率八都之士進攻越州誅漢宏迴戈攻潤州擒薛朗江浙平董昌為浙東節度使越州刺史表鏐代己為杭州刺史唐景福中朝廷以李鋋為浙江西道鎮海軍節度使時孫儒楊行密交亂淮海煙塵數千里鏐常率師以為防捍孫儒據宣州不敢侵江浙由是鏐勳名日著久之李鋋終不至治所朝廷以鏐為鎮海軍節度仍移潤州軍額於杭州為治所又立威勝軍於越州董昌為節度使昌漸驕貴自言身應符讖又為祅人王百藝所誑僭稱尊號乃於越州自稱羅平國王年號大聖偽命鏐為兩浙都將鏐不受命以狀聞唐昭宗命鏐討昌乾寧四年鏐率浙西將士破越州擒昌以獻朝廷嘉其功賜鏐鐵券又除宰臣王溥為威勝軍節度使而兩浙士庶拜章請以鏐兼杭越二鎮朝廷不能制因而授之改威勝軍為鎮東鏐乃兼鎮海鎮東兩藩節制鏐既兼兩鎮精兵三萬而楊行密連歲興戎攻蘇湖潤等州欲兼幷兩浙累為鏐所敗亦為行密侵盜數州而鏐所部止一十三州而已天復中鏐大將許再思徐綰叛徐綰原本作徐綬今從九國志改正影庫本粘籤引宣州節度使田頵謀襲杭州田頵等率師掩至城下鏐激厲軍士一戰敗之生擒徐綰田頵遁走鏐於臨安故里興造第舍窮極壯麗歲時遊於里中車徒雄盛萬夫羅列其父寬每聞鏐至走竄避之鏐即徒步訪寬請言其故寬曰吾家世田漁為事未嘗有貴達如此爾今為十三州主三面受敵與人爭利恐禍及吾家所以不忍見汝鏐泣謝之鏐於唐昭宗朝位至太師中書令本郡王食邑二萬戶梁祖革命以鏐為尚父吳越國王梁末帝時加諸道兵馬元帥同光中為天下兵馬都元帥尚父守尚書令封吳越國王賜玉冊金印初莊宗至洛陽鏐厚陳貢奉求為國王及玉冊詔下有司詳議羣臣咸言玉簡金字唯至尊一人錢鏐人臣不可又本朝以來除四夷遠藩羈縻冊拜或有國王之號而九州之內亦無此事郭崇韜尤不容其僭而樞密承旨段徊姦倖用事能移崇韜之意曲為鏐陳情崇韜僶俛從之鏐乃以鎮海鎮東軍節度使名目授其子元瓘自稱吳越國王命所居曰宮殿府署曰朝廷其參佐稱臣僭大朝百僚之號但不改年號而已偽行制冊加封爵於新羅渤海海中夷落亦皆遣使行封冊焉明宗即位之初安重誨用事鏐嘗與重誨書云吳越國王謹致書于某官執事不暄涼重誨怒其無禮屬供奉官烏昭遇使於兩浙烏昭遇原本作馬昭遇考歐陽史通鑑十國春秋俱作烏今改正影庫本粘籤每以朝廷事私於吳人仍目鏐為殿下自稱臣謁鏐行舞蹈之禮及迴使副韓玫具述其事重誨因削鏐元帥尚父國王之號以太師致仕久之其子元瓘等上表陳時淮寇攻逼荊南明宗疑其同惡因降詔詰之元瓘等復遣使自淮南間道上表云竊念臣父天下兵馬都元帥吳越國王臣鏐爰自乾符之歲便立功勞至於天復之初已封茅土兩殄稽山之僭偽頻叨鳳詔之褒崇賜鐵券而礪岳帶河藏清廟而銘鐘鏤鼎歷事列聖竭誠累朝罄臣節以無虧荷君恩而益重楚茅吳柚常居羣后之先赤豹黃羆不在諸方之後雲臺寫像盟府書勳戮力本朝一心體國常誡臣兄弟曰汝等諸子須記斯言老父起自諸都早平多難素推忠勇實効辛勤遂蒙聖主之疇庸獲忝真王之列壤恆積滿盈之懼豫懷燕翼之憂蓋以恩禮殊尤寵榮亢極名品既逾於五等春秋將及於八旬不諱之談爾當靜聽而況手殲妖亂親覩興亡豈宜自為厲階更尋覆轍老身猶健且作國王之呼嗣子承家但守藩臣之分臣等鯉庭鯉庭原本作釐庭今據文改正影庫本粘籤灑袂鴈序書紳中心藏之敬聞命矣頃以濟陰歸邸梁苑稱尊所在英雄遞相倣互起投龜之詬皆興逐鹿之謀唯臣父王未嘗隨例從微至著悉蒙天子之絲綸啟土封王自守諸侯之土宇乙酉歲伏蒙莊宗皇帝遙降玉冊金印恩加曲阜營丘顯自大朝來封小國遂有強名之改補實無干紀之包藏兼使人徐筠等進貢之時禮儀有失尚蒙赦宥未置典刑敢不投杖責躬負荊請罪且爽為臣之禮誠乖事上之儀夙夜包羞寢食俱廢捧詔而神魂戰慄拜章而芒刺交幷伏以皇帝陛下濬哲文思含弘光大智周萬物日闢四方既容能改之非許降自新之路將功補過捨短從長矧茲近代相持豈足玄機遠料且臣本道與淮南雖連疆畛久結仇讎交惡尋盟十翻九覆縱敵已逾於三紀弭兵弭兵原本作弦兵今據文改正影庫本粘籤纔僅於數年諒非脣齒之邦真謂腹心之疾今奉詔書責問合陳本末端由布在衆多寧煩覼縷彼既人而無禮此亦和而不同近知侵軼荊門乖張事大儻王師之問罪願率衆以齊攻必致先登庶觀後効橫秋雕鶚祇待指呼躍匣蛟龍誓平讎隙今則訓齊樓櫓淬礪戈鋋決副天威冀明臣節伏以臣父王鏐已於汎海繼有飛章陳父子之丹誠高懸皎日展君臣之大義上指圓穹其將修貢賦於梯航混車書而表率如虧奉職自有陰誅今春已具表章未蒙便賜俞允地遠而經年方達天高而瀝懇難通伏乞聖慈曲行明命凌霜益翠始知松柏之心異日成功方顯忠貞之節臣元瓘等無任感激祈恩戰懼依投之至謹遣急脚間道奉絹表陳乞奏謝以聞明宗嘉之乃降制復授鏐天下兵馬都元帥尚父吳越國王未幾又詔賜上表不名案五代會要載長興二年四月詔曰周榮呂望有尚父之稱漢重蕭何有不名之禮錢鏐冠公侯之位統吳越之封宜示異恩俾當縟禮其錢鏐宜賜不名鏐在杭州垂四十年窮奢極貴錢塘江舊日海潮逼州城鏐大庀工徒鑿石填江又平江中羅剎石悉起臺榭廣郡郭周三十里邑屋之繁會江山之雕麗實江南之勝概也鏐學書好吟咏江東有羅隱者有詩名聞於海內依鏐為參佐鏐嘗與隱唱和隱好譏諷嘗戲為詩言鏐微時騎牛操梃之事鏐亦怡然不怒其通恕也如此鏐雖季年荒恣然自唐朝於梁室莊宗中興以來每來揚帆越海貢奉無闕故中朝亦以此善之鏐以長興三年三月二十八日薨年八十一制曰故天下兵馬都元帥尚父吳越國王錢鏐累朝元老當代勳賢位已極於人臣名素高於簡冊贈典既無其官爵易名宜示其優崇宜令所司定諡以王禮葬仍賜神道碑諡曰武肅鏐初事董昌時年甫壯室性尚剛烈時有儒士謁於主帥已進刺矣見鏐稍怠鏐怒投之羅剎江及典謁者將召鏐詐云客已拂衣去矣及為帥時有人獻詩云一條江水檻前流鏐不悅以為譏己尋害之迨於晚歲方愛人下士留心理道數十年間時甚歸美鏐尤恃崇盛分兩浙為數鎮其節制署而後奏左右前後皆兒孫甥姪軒陛服飾比於王者兩浙里俗咸曰海龍王梁開平中浙民上言請為鏐立生祠梁太祖許之令翰林學士李琪李琪原本作李琦今從通鑑改正影庫本粘籤撰生祠堂碑以賜之至今蒸黎饗之子孫保之斯亦近代之名王也永樂大典卷一萬八千一百二十五元瓘鏐第五子也起家為鹽鐵發運巡官表授尚書金部郎中賜金紫天復中本州裨校許再思等為亂構宣州節度使田頵頵領兵奄至鏐擊敗再思與頵通和頵要盟於鏐鏐徧召諸子問之曰誰能為吾為田氏之壻者例有難色時元瓘年十六進曰唯大王之命由是就親於宣州唐天祐初承制累遷檢校尚書左僕射內牙將指揮使數年之間伐叛禦寇大著勳績梁貞明四年夏鏐大舉伐吳以元瓘為水戰諸軍都指揮使戰棹抵東洲吳人以舟師拒戰元瓘為火筏順風揚灰以坌之白晝如霧吳師迷方遂敗之擒軍使彭彥章彭彥章原本脫章字今從九國志增入影庫本粘籤幷軍校七十餘人得戰艦四百隻吳人知不可校通好於鏐以功奏授鎮海軍節度副使檢校司徒梁末遷清海軍節度使檢校太傅同平章事後唐同光初加檢校太師兼中書令鎮東等軍節度觀察處置等使時鏐自為天下兵馬都元帥尚父守尚書令吳越國王及鏐為太師致仕元瓘累貢章疏乞復舊號唐明宗許之鏐既年高欲立嗣召諸子使各論功請讓於元瓘及鏐病篤召將吏謂之曰余病不起兒皆愚懦恐不能為爾帥與爾輩決矣帥當自擇將吏號泣言曰大令公有軍功多賢行仁孝已領兩鎮王何苦言及此鏐曰此渠定堪否曰衆等願奉賢帥即出符鑰數篚於前謂元瓘曰三軍言爾可奉領取此鏐薨遂襲父位唐長興四年遣將作監李鏻原本脫李鏻二字今據通鑑增入影庫本粘籤起復元瓘官爵又命戶部侍郎張文寶授兼尚書令清泰初封吳王二年封越王天福元年賜金印三年封吳越國王五年加天下兵馬元帥六年授天下兵馬都元帥其年夏有疾秋府署災焚之一空乃移於他所其燄皆隨而發焉元瓘因驚悸發狂以是歲八月二十四日薨年五十五歲諡曰文穆元瓘幼聰敏長於撫馭臨戎十五年決事神速為軍民所附然奢僭營造甚於其父故有回祿之災焉元瓘有詩千篇編其尤者三百篇命曰錦樓集浙中人士皆傳之子佐為嗣永樂大典卷四千六百九十二佐字玄祐元瓘薨遂襲其位晉天福末制授檢校太師兼中書令吳越王仍篆玉為冊以賜之前代玉冊冊夷王有之偽梁時欲厚於鏐首為式例故因而不改俄授開府儀同三司守太尉時以建安為淮寇所攻授東南面兵馬都元帥佐尋遣舟師進討淮人大敗以功加守太師漢高祖入汴佐首獻琛賮表率東道漢祖嘉之授諸道兵馬都元帥佐居列土凡七年境內豐阜祖父三世皆為元帥時以為榮漢初以疾卒於位諡曰忠獻佐幼好書性溫恭能為五七言詩凡官屬遇雪月佳景必同宴賞由此士人歸心其班品亦有丞相已下名籍而祿給甚薄罕能自濟每朝廷降吏則去其偽官或與會則公府助以僕馬處事齷齪多如此類然航海所入歲貢百萬王人一至所遺至廣故朝廷寵之為羣藩之冠佐有子昱年五歲未任庶務乃以其弟倧襲位永樂大典卷四千六百九十二倧性明敏嚴毅未立時常以佐性寬善疑掌兵權者難制及代佐為帥以禮法繩下宿將舊勳不甚優禮大將胡進思頗不平之乃密與親軍謀去倧漢祖入汴之歲十二月進思率甲士三百大譟突入衙署倧闔戶以拒之左右與之格鬬盡為進思所殺遂遷倧於別館以甲士援送幽於錦軍錦軍疑當作衣錦軍考冊府元龜, WYG: 省注}
  - {type: variant, offset: 3244, length: 9055, content: 日諡曰武穆子希聲嗣初殷微時隱隱見神人侍側因默記默記原本作默託今據文改正影庫本粘籤其形像及貴因謁衡山廟覩廟中神人塑像宛如微時所見者則知人之貴者必有陰物護之豈偶然哉永樂大典卷一萬八千一百二十八案以下原本殘闕希範晉天福中授江南諸道都統又加天策上將軍谿州洞蠻彭士愁案原本訛士秋今據歐陽史及通鑑改正舊五代史考異寇辰澧二州希範討平之士愁以五州乞盟乃銘於銅柱希範自言漢伏波軍援之後故鑄銅柱以繼之永樂大典卷八千二百二十一案此傳有闕文馬希廣希艹口咢傳全篇俱佚五代史補高郁為武穆王謀臣莊宗素聞其名及有天下且欲離間之會武穆王使其子希範入覲莊宗以希範年少易激發因其敷奏敏速乃撫其背曰國人皆言馬家社稷必為高郁所取今有子如此高郁安得取此耶希範居常嫉郁忽聞莊宗言深以為然及歸告武穆請誅之武穆笑曰主上爭戰得天下能用機數以郁資吾霸業故欲間之耳若梁朝罷王彥章兵權也蓋遭此計必至破滅今汝誅郁正落其彀中慎勿言也希範以武穆不決禍在朝夕因使誣告郁謀反而族滅之自是軍中之政往往失序識者痛之初郁與武穆俱起行陣郁貪且僭常以所居之井不甚清澈思所以澄汰之乃用銀葉護其四方自內至外皆然謂之拓𩹉其奉養過差皆此類也故莊宗得以媒蘖自後陰晦中見郁後竟為所患爾馬希範武穆之嫡子性奢侈嗣位未幾乞依故事置天策府僚屬於是擢從事有才行者有若都統判官李鐸靜江府節度判官潘武安軍節度判官拓拔坦都統掌書記李臯鎮南節度判官李莊昭順軍節度判官徐收澧州觀察判官彭繼英江南觀察判官廖圖昭順軍觀察判官徐中雅靜江府掌書記鄧懿文武平軍節度掌書記李松年鎮南軍節度掌書記衛曮昭順軍觀察支使彭繼勳武平軍節度推官蕭銖桂管觀察推官何仲舉武安軍節度巡官孟玄暉容管節度推官劉昭禹等十八人並為學士其餘列校自袁友恭張少敵等各以次授任莫不大興土木以建興府庭其最為壯麗者即有九龍金華等殿殿之成也用丹砂塗其壁凡用數十萬斤石每僚吏謁見將升殿但覺丹砂之氣藹然襲人其費用也皆此類初教令既下主者以丹砂非卒致之物相顧憂色居無何東境山崩湧出丹砂委積如丘陵於是收而用之契丹南侵聞其事以為希範非常人遽使冊為尚文希範得冊以為契丹推奉欣然當之矣丁思僅素有才略為馬氏騎將以希範受契丹冊命深恥之因謂希範曰今朝廷失守正忠臣義士奮發之時使馳檄四方引軍直趨京師驅契丹天子反正然後凱還如此則齊桓晉文不足數矣時不可失願大王急圖之希範本無遠略加以興作府署未畢不忍棄去遂寢思僅之謀思僅不勝其憤謂所親曰古人疾沒世而名不稱今遭逢擾攘不能立功於天下反顧戀數間屋子乎誠可痛也自是思僅常怏怏文昭王夫人彭氏封秦國夫人常往城北報恩寺燒香時僧魁謂之長老問曰夫人誰家婦女彭氏大怒索檐子疾驅而歸文昭驚曰何歸之速也夫人曰今日好沒興被箇老禿賊問妾是誰家婦女且大凡婦女皆不善之辭安得對妾而發文昭笑曰此所謂禪機也夫人宜答弟子是彭家女馬家婦是則通其理矣何怒之有乎夫人素負才智恥不能對乃曰如此則妾所謂無見性也於是慚赧數日石文德連州人形質矬陋好學尤工詩霸國時屢獻詩求用文昭以其寢陋未曾禮待文德由是窮悴有南宅王子者素重士延於門下其後文昭知之亦兼怒王宅欲庭辱文德而逐之居無何秦國夫人彭氏薨文昭傷悼乃命有文學者各撰挽詞文德亦獻十餘篇其一聯云月沉湘浦冷花謝漢宮秋文昭覽之大驚曰文德有此作用吾但以寢陋而輕之乃不如南宮小兒却能知賢耶於是始召文德而愧謝之未幾承制授水部員外郎充融州刺史文德晚尤好著述乃撰大唐新纂十三卷多名人遺事詞雖不工事或可采時以多聞許之何仲舉營道人美姿容年十三俊邁絕倫時家貧輸稅不及限李臯為營道令怒之乃荷項係獄將檟楚焉或有言於臯曰此子雖能為詩往往間立成希明府一察之臯聞遽召而問曰知汝有文且速敏今日之事若能文不加點為一篇以自述吾當貸汝仲舉援筆而成曰似玉來投獄拋家去就枷可憐兩片木夾却一枝花臯大驚因自為脫枷延上廳與之抗禮自是仲舉始銳意就學天成中入洛時秦王為河南尹尤重士仲舉與張杭江文蔚俱遊其門及其東薦也公舉數百人獨以仲舉為擅場仲舉因獻詩曰碧雲章句纔離手紫府神仙盡點頭秦王大悅稱賞不已故一舉上第及歸遇文昭馬氏承制依唐太宗故事於天策府置十八學士以為學士之首且執政柄而仲舉自以出於臯之門下雖策名中朝事臯未嘗暫懈臯感悅遂加引用未幾與之同列及出又為全衡二州刺史先是湖南尤多詩人其最顯者有沈彬廖凝劉昭禹尚顏齊己虛中之徒而仲舉在諸公間尤為輕淺惟李臯獨推許之往往對衆吟秋日晚望詩曰樹迎高鳥歸深野雲傍斜陽過遠山以足扣地嘆曰何仲舉乃詩家之高逸者也諸官見取舍其餘奴岳乃間氣爾故仲舉感臯之見知卒能自奮至於名節亦終始無玷論者以臯有知人之鑒歐陽彬衡山人世為縣吏至彬特好學工于詞賦馬氏之有湖南也彬將希其用乃攜所著詣府求見之禮必先通名紙有掌客吏衆謂樊知客好賄陰使人謂彬曰足下之來非徒然也實欲顯族致身而不以一物為貺其可乎彬恥以賄進竟不與既而樊氏怒擲名紙於地曰豈吏人之子欲干謁王侯耶彬深恨之因退而為詩曰無錢將乞樊知客名紙生毛不為通因而落魄街巿歌姬酒徒無所不狎有歌人瑞卿者慕其才遂延於家瑞卿能歌每歲武穆王生辰必歌于筵上時湖南自舊管七郡外又加武陵岳陽是九州彬作九州歌以授瑞卿至時使歌之實欲感動武穆既而竟不問彬嘆曰天下分裂之際廝徒負養皆能自奮我貧而至此耶計無所出思欲竄入鄰道但未有所向居無何聞西蜀圖綱將發彬遂謀入蜀且私謂瑞卿曰吾以干謁不遂居於汝家未嘗有倦色其可輕棄乎然士以功名為不朽不于此時圖之恐貽後悔今吾他適庶幾有成勿以為念瑞卿曰君於妾不可謂之無情然一旦不以妾自滯割愛而去得非功名之將至耶妾誠異之家財約數緡雖不豐願分為半以資路途彬亦不讓因以瑞卿所贈盡賂綱吏求為駕船僕夫綱吏許之既至蜀遂獻獨鯉朝天賦蜀主大悅擢居清要其後官至尚書左丞相出為夔州節度使既領夔州武穆王已薨其子希範繼立因致書于希範疇昔入蜀之由仍以衡山宗族為託希範得書大慚彬之親友悉免其賦役下令搜訪草澤由是士無賢不肖參謁皆延客之因彬所致也彬雅有風儀其為文辭近而理真聞之者雖不知書亦釋然曉之竟以此遇戴偃金陵人能為詩尤好規諷唐末罹亂游湘中值馬氏有國至文昭王以公子得位尤好奢侈起天策府搆九龍金華等殿土木之工斤斧之聲晝夜不絕偃非之自稱玄黃子著漁父詩百篇以獻欲譏諷之故其句有纔把咽喉吞世界蓋因奢侈致危亡又曰若須拋却便拋却莫待風高更水深文昭覽之怒一旦謂賓佐曰戴偃何如人時賓佐不測以偃為文昭所重或對曰偃詩人章句深為流輩所推許方今在貧悴大王哀之置之髯參短簿之間足矣文昭曰數日前獻吾詩想其為人大抵務以漁釣自娛爾宜賜碧湘湖便以遂其性亦優賢之道也即日使遷居湖上乃潛戒公私不得與之往還自是偃窮餓日至無以為計乃謂妻曰與汝結髮已生一男一女今度不惟擠于溝壑亦恐首領不得完全宜分兒遁去庶幾可免不然旦夕死矣於是舉骰子與妻子約曰彩多得兒彩少得女既擲偃彩少乃攜女相與慟哭而別偃將奔嶺南至永州會文昭薨乃止其後不知所終李臯與弟節俱在湖南幕下節亦有文學同光初馬氏武穆王授湖南諸道都統詔賜戰馬數百匹臯為謝表百餘字後思意艱澀時節在側臯顧謂之曰嘗聞馬有旋風之隊如何得一事為對節曰馬既有旋風隊軍亦有偃月營何患耶臯欣然下筆云尋當偃月之營擺作旋風之隊表遂成論者以此對最為親切僧洪道不知何許人通內外學道行尤高大為時人所重天福中居於衡州石羊鎮山谷中馬氏文昭王之嗣位也聞其名召于府使於報慈寺住持洪不應命文昭堅欲致之督責州縣憂懼計無所出率五七十人拱擁入州洪道知之乃引徒弟數輩轉徙入深山中得一岩遂且止息然離舊居抵於山岩下則衆鳥千萬和鳴而隨之州縣雖失其蹤或有相謂曰且深山之中衆鳥何故而鳴又聲韻優逸得非和尚在彼耶試尋果得之於岩所父老再拜曰和尚佛之徒也佛不遺衆生願大王崇重要與和尚相見輒不應召竄入山林於是和尚即得計矣而州縣與鄉村得無勞擾而和尚忍不為之開慈憫耶洪道於是始點頭曰如此則吾為汝行矣及至府文昭以國師待之未幾堅乞歸山文昭知不可留乃許焉其後竟不知所終初洪道之入岩也見一虎在穴乳二子徒弟大駭洪道吒曰無懼彼當移去言訖虎啣二子趨出穴至行之所感也如此馬希範常重一僧號報慈長老能入定觀人休咎希範因問之曰吾于富貴固無遺恨但不知者壽爾吾師以為何如報慈曰大王無憂當與佛齊年希範喜以為享壽無窮及薨也止於四十九先是希範常嫉高郁之為人因莊宗言而殺之至是方臨江觀競渡置酒未及飲而希範忽驚起顧其弟曰高郁來希廣亦驚曰高郁死久矣大王勿妄言而希範血自鼻出是夕遂卒馬希範卒判官李臯以希範同母弟希廣為天策府都尉撫御尤非所長大校張少敵憂之建議請立希廣庶兄武陵帥希艹口咢且曰希萼處長負氣觀其所為必不為都尉之下加之在武陵九溪蠻通好往來甚歡若不得立必引蠻軍為亂幸為思之李臯忽怒曰汝輩何知且先大王為都尉俱為嫡嗣不立之却用老婢兒可乎少敵曰國家之事不可拘以一途變而能通所以國長久也何嫡庶之云乎若明公必立都尉當妙設方略以制武陵使帖然不動乃可不然則社稷去矣臯愈怒竟不從少敵之謀少敵度無可奈何遂辭不出未幾希艹口咢果以武陵反引洞溪蠻數路齊進遂之長沙縊希廣于郊外而支解李臯自是湖南大亂未逾年而國滅一如少敵之言初希艹口咢之來也希廣以全軍付親校許可瓊使遂擊之可瓊覩希艹口咢衆盛恐懼夜送旗鼓乞降希艹口咢大喜於是兼可瓊之衆長驅而至希廣素奉佛聞之計無所出乃被緇衣引羣僧念寶勝如來謂之禳災頃之府廨火起人忽紛擾猶念誦之聲未輟其戇如此少敵憂之良有以也先是城中街道尚種槐其柳即無十一二至是內外一變皆種柳無復槐矣又居人夜間好織草鞋似槌芒之聲聞於郊野俄有童謠云湖南城郭好長街竟栽柳樹不栽槐百姓奔竄無一事只是槌芒織草鞋人無長少皆誦之未幾國亂百姓奔竄死于溝壑者十有八九至是議者始悟蓋長街者通內外之路也槐者為言懷也不栽槐蓋兄弟不睦以至國亡失孔懷之義也草鞋者遠行所用蓋百姓遠行奔竄之象也馬希艹口咢既立不治國事數與僚吏縱酒為樂有小吏謝廷擇者本帳下廝養有容貌希艹口咢素寵嬖之每筵會皆命廷擇預坐諸官甚有在下者於是衆怒往往偶語曰此輩舊制有燕會唯用兵守門以防他虞今與我等齊列何辱之甚耶其弟希崇因衆怒咄咄與其黨竊發擒希艹口咢囚之於衡陽又自立未數日江南遣袁州刺史邊鎬乘其亂領兵來伐希崇度不能敵遂降先是長沙童謠云鞭打馬走不暇未幾果為邊鎬所滅初鎬嘗為僧以覘湖南尤善弄鈸每侵晨必弄鈸行乞遇城往往擲起鈸以度門之高下及來湖南士庶頗有識之者廖氏虔州贛縣人有子三人伯曰圖仲曰偃季曰凝圖凝皆有詩名偃蹻勇絕倫由是豪橫遂為鄉里所憚江南命功臣鐘章為虔州刺史深嫉之於是圖與凝等議曰觀章所為但欲滅吾族矣若戀土不去禍且及矣於是領其族暨部等三千餘人具鎧仗號令而後行章不敢逐遂奔湖南時武穆王在位見其衆盛恐難制欲盡誅之或者曰大王姓馬而廖來歸廖者料也馬得料其勢必肥實國家大興之兆其可殺之乎武穆喜遂善待仍制下以凝為永州刺史圖為行軍司馬偃為天策府列校仍賜莊宅于衡山自稱逸人偃能於馬上挺身而立取溼衣振奮而服之以示輕捷荊南高季興次子忘其名管親軍雲猛都謂之雲猛郎君聞偃名因兩境交兵請與偃鬬偃欣然而往雲猛能用鎗見偃瘦小心輕之馳騎而刺偃垂及之偃佯落馬雲猛勢未及止偃自後奮戈一擊墮地因生擒之自是其名愈振故武穆王終世不為隣境所輕者偃之力焉至其子希範嗣位九溪蠻叛命偃率兵討之為流矢所傷死於蠻中凶訃至希範使人報其母張氏張氏不哭謂其使曰為妾謝大王舉家三百餘口受王分食解衣之賜雖盡死未足以上報況一子乎望大王勿以為念希範聞而嘆曰廖氏有此母欲不興其可得乎於是厚加存恤仍遣使召凝任為從事至希範薨國亂為江南所滅遂遷金陵唐主授以水部員外郎為洪州連昌縣令未幾又遷江州團練使凝為人不羈好恢諧嘗覽裴說經杜工部墓詩曰擬鑿孤墳破重教大雅生因曰如此裴說乃劫墳賊耳聞者笑之在江州盛暑嘗患體燥乃以一大桶盛冷水坐于其間或至終日雖賓友謁見出露其首與之談笑其簡率如此先是凝嘗夢人以印授之拜捧之際其印缺其一角凝不能測及授江州之命始悟曰印缺一角蓋偏裨之象也團練副使不亦宜乎時人異之劉言本朗州之牙將也初馬氏舉族為江南所俘朗州無帥衆乃推列校馬光惠為武平軍留後光惠署言為副使既而光惠躭荒僭侈軍情不附遂行廢黜以言代光惠為留後時周廣順二年秋也言既立北則遣使奉表於周太祖東亦上章於江南李景求正授旄鉞景未之許時邊鎬據湖南邊鎬原本作逮鎬今從通鑑改正影庫本粘籤潛遣人齎金帛說誘武陵谿洞諸蠻欲合勢以攻朗州會李景降偽詔徵言赴金陵言懼不從偽命以其年冬十月三日與其節度副使王進逵行軍司馬何敬真都指揮使周行逢等同領舟師以襲潭州九日攻拔益陽寨殺淮軍數千人十三日至潭州城下是夕邊鎬領其部衆棄城東走進逵敬真遂入據其城言乃遣牙將張崇嗣奉表於周太祖且言潭州兵戈之後焚燒殆盡乞移使府於朗州從之詔升朗州為大都督府在潭州之上廣順三年春正月制以言為檢校太師同平章事朗州大都督充武平軍節度使制置武安靜江等軍事又以王進逵為武安軍節度使何敬真為靜江軍節度使並檢校太尉以周行逢領集州集州原本作佳州今從宋史改正影庫本粘籤刺史充武安軍節度行軍司馬未幾言遣何敬真帥軍南擊廣賊敬真失律奔歸潭州為王進逵所殺其年秋進逵奏劉言與淮賊通連差指揮使鄭珓部領兵士欲併當道鄭珓為軍衆所執奔入武陵劉言尋為諸軍所廢臣已至朗州安撫訖周太祖詔劉言宜勒歸私第委王進逵取便安置言尋遇害朝廷乃正授進逵朗州節制顯德元年秋制以武安軍節度副使周行逢為鄂州鄂州原本作郁州今據東都事略改正影庫本粘籤節度使權知潭州軍府事加檢校太尉三年春正月世宗將伐淮甸詔進逵率兵入江南界二月進逵準詔而行仍遣部將潘叔嗣領兵五千為先鋒行及鄂州界叔嗣迴戈以襲朗州進逵聞之倍道先入武陵叔嗣遽攻其城進逵敗為叔嗣所殺遣人詣潭州請周行逢至朗州斬叔嗣於巿其年秋七月制以行逢為朗州大都督充武平軍節度使加兼侍中自是潭朗之地遂為行逢所有皇朝建隆初就加中書令四年行逢卒三軍立其子保權為帥未幾朗軍亂求救於朝廷及王師平定荊湖保權入朝由是湖湘之地盡為王土矣永樂大典卷九千九十九錢鏐杭州臨安縣人少拳勇喜任俠以解仇報怨為事唐乾符中事於潛於潛原本作烏潛今從新唐書改正影庫本粘籤鎮將董昌為部校屬天下喪亂黃巢寇嶺表江淮之盜賊羣聚大者攻州郡小者剽閭里董昌聚衆恣橫於杭越之間杭州八縣每縣召募千人為一都時謂之杭州八都以遏黃巢之衝要時有劉漢宏者聚徒據越州自稱節度使攻收鄰郡潤州牙將薛朗逐其節度使周寶自稱留後唐僖宗在蜀詔董昌討伐昌以軍政委鏐率八都之士進攻越州誅漢宏迴戈攻潤州擒薛朗江浙平董昌為浙東節度使越州刺史表鏐代己為杭州刺史唐景福中朝廷以李鋋為浙江西道鎮海軍節度使時孫儒楊行密交亂淮海煙塵數千里鏐常率師以為防捍孫儒據宣州不敢侵江浙由是鏐勳名日著久之李鋋終不至治所朝廷以鏐為鎮海軍節度仍移潤州軍額於杭州為治所又立威勝軍於越州董昌為節度使昌漸驕貴自言身應符讖又為祅人王百藝所誑僭稱尊號乃於越州自稱羅平國王年號大聖偽命鏐為兩浙都將鏐不受命以狀聞唐昭宗命鏐討昌乾寧四年鏐率浙西將士破越州擒昌以獻朝廷嘉其功賜鏐鐵券又除宰臣王溥為威勝軍節度使而兩浙士庶拜章請以鏐兼杭越二鎮朝廷不能制因而授之改威勝軍為鎮東鏐乃兼鎮海鎮東兩藩節制鏐既兼兩鎮精兵三萬而楊行密連歲興戎攻蘇湖潤等州欲兼幷兩浙累為鏐所敗亦為行密侵盜數州而鏐所部止一十三州而已天復中鏐大將許再思徐綰叛徐綰原本作徐綬今從九國志改正影庫本粘籤引宣州節度使田頵謀襲杭州田頵等率師掩至城下鏐激厲軍士一戰敗之生擒徐綰田頵遁走鏐於臨安故里興造第舍窮極壯麗歲時遊於里中車徒雄盛萬夫羅列其父寬每聞鏐至走竄避之鏐即徒步訪寬請言其故寬曰吾家世田漁為事未嘗有貴達如此爾今為十三州主三面受敵與人爭利恐禍及吾家所以不忍見汝鏐泣謝之鏐於唐昭宗朝位至太師中書令本郡王食邑二萬戶梁祖革命以鏐為尚父吳越國王梁末帝時加諸道兵馬元帥同光中為天下兵馬都元帥尚父守尚書令封吳越國王賜玉冊金印初莊宗至洛陽鏐厚陳貢奉求為國王及玉冊詔下有司詳議羣臣咸言玉簡金字唯至尊一人錢鏐人臣不可又本朝以來除四夷遠藩羈縻冊拜或有國王之號而九州之內亦無此事郭崇韜尤不容其僭而樞密承旨段徊姦倖用事能移崇韜之意曲為鏐陳情崇韜僶俛從之鏐乃以鎮海鎮東軍節度使名目授其子元瓘自稱吳越國王命所居曰宮殿府署曰朝廷其參佐稱臣僭大朝百僚之號但不改年號而已偽行制冊加封爵於新羅渤海海中夷落亦皆遣使行封冊焉明宗即位之初安重誨用事鏐嘗與重誨書云吳越國王謹致書于某官執事不暄涼重誨怒其無禮屬供奉官烏昭遇使於兩浙烏昭遇原本作馬昭遇考歐陽史通鑑十國春秋俱作烏今改正影庫本粘籤每以朝廷事私於吳人仍目鏐為殿下自稱臣謁鏐行舞蹈之禮及迴使副韓玫具述其事重誨因削鏐元帥尚父國王之號以太師致仕久之其子元瓘等上表陳時淮寇攻逼荊南明宗疑其同惡因降詔詰之元瓘等復遣使自淮南間道上表云竊念臣父天下兵馬都元帥吳越國王臣鏐爰自乾符之歲便立功勞至於天復之初已封茅土兩殄稽山之僭偽頻叨鳳詔之褒崇賜鐵券而礪岳帶河藏清廟而銘鐘鏤鼎歷事列聖竭誠累朝罄臣節以無虧荷君恩而益重楚茅吳柚常居羣后之先赤豹黃羆不在諸方之後雲臺寫像盟府書勳戮力本朝一心體國常誡臣兄弟曰汝等諸子須記斯言老父起自諸都早平多難素推忠勇實効辛勤遂蒙聖主之疇庸獲忝真王之列壤恆積滿盈之懼豫懷燕翼之憂蓋以恩禮殊尤寵榮亢極名品既逾於五等春秋將及於八旬不諱之談爾當靜聽而況手殲妖亂親覩興亡豈宜自為厲階更尋覆轍老身猶健且作國王之呼嗣子承家但守藩臣之分臣等鯉庭鯉庭原本作釐庭今據文改正影庫本粘籤灑袂鴈序書紳中心藏之敬聞命矣頃以濟陰歸邸梁苑稱尊所在英雄遞相倣互起投龜之詬皆興逐鹿之謀唯臣父王未嘗隨例從微至著悉蒙天子之絲綸啟土封王自守諸侯之土宇乙酉歲伏蒙莊宗皇帝遙降玉冊金印恩加曲阜營丘顯自大朝來封小國遂有強名之改補實無干紀之包藏兼使人徐筠等進貢之時禮儀有失尚蒙赦宥未置典刑敢不投杖責躬負荊請罪且爽為臣之禮誠乖事上之儀夙夜包羞寢食俱廢捧詔而神魂戰慄拜章而芒刺交幷伏以皇帝陛下濬哲文思含弘光大智周萬物日闢四方既容能改之非許降自新之路將功補過捨短從長矧茲近代相持豈足玄機遠料且臣本道與淮南雖連疆畛久結仇讎交惡尋盟十翻九覆縱敵已逾於三紀弭兵弭兵原本作弦兵今據文改正影庫本粘籤纔僅於數年諒非脣齒之邦真謂腹心之疾今奉詔書責問合陳本末端由布在衆多寧煩覼縷彼既人而無禮此亦和而不同近知侵軼荊門乖張事大儻王師之問罪願率衆以齊攻必致先登庶觀後効橫秋雕鶚祇待指呼躍匣蛟龍誓平讎隙今則訓齊樓櫓淬礪戈鋋決副天威冀明臣節伏以臣父王鏐已於汎海繼有飛章陳父子之丹誠高懸皎日展君臣之大義上指圓穹其將修貢賦於梯航混車書而表率如虧奉職自有陰誅今春已具表章未蒙便賜俞允地遠而經年方達天高而瀝懇難通伏乞聖慈曲行明命凌霜益翠始知松柏之心異日成功方顯忠貞之節臣元瓘等無任感激祈恩戰懼依投之至謹遣急脚間道奉絹表陳乞奏謝以聞明宗嘉之乃降制復授鏐天下兵馬都元帥尚父吳越國王未幾又詔賜上表不名案五代會要載長興二年四月詔曰周榮呂望有尚父之稱漢重蕭何有不名之禮錢鏐冠公侯之位統吳越之封宜示異恩俾當縟禮其錢鏐宜賜不名鏐在杭州垂四十年窮奢極貴錢塘江舊日海潮逼州城鏐大庀工徒鑿石填江又平江中羅剎石悉起臺榭廣郡郭周三十里邑屋之繁會江山之雕麗實江南之勝概也鏐學書好吟咏江東有羅隱者有詩名聞於海內依鏐為參佐鏐嘗與隱唱和隱好譏諷嘗戲為詩言鏐微時騎牛操梃之事鏐亦怡然不怒其通恕也如此鏐雖季年荒恣然自唐朝於梁室莊宗中興以來每來揚帆越海貢奉無闕故中朝亦以此善之鏐以長興三年三月二十八日薨年八十一制曰故天下兵馬都元帥尚父吳越國王錢鏐累朝元老當代勳賢位已極於人臣名素高於簡冊贈典既無其官爵易名宜示其優崇宜令所司定諡以王禮葬仍賜神道碑諡曰武肅鏐初事董昌時年甫壯室性尚剛烈時有儒士謁於主帥已進刺矣見鏐稍怠鏐怒投之羅剎江及典謁者將召鏐詐云客已拂衣去矣及為帥時有人獻詩云一條江水檻前流鏐不悅以為譏己尋害之迨於晚歲方愛人下士留心理道數十年間時甚歸美鏐尤恃崇盛分兩浙為數鎮其節制署而後奏左右前後皆兒孫甥姪軒陛服飾比於王者兩浙里俗咸曰海龍王梁開平中浙民上言請為鏐立生祠梁太祖許之令翰林學士李琪李琪原本作李琦今從通鑑改正影庫本粘籤撰生祠堂碑以賜之至今蒸黎饗之子孫保之斯亦近代之名王也永樂大典卷一萬八千一百二十五元瓘鏐第五子也起家為鹽鐵發運巡官表授尚書金部郎中賜金紫天復中本州裨校許再思等為亂構宣州節度使田頵頵領兵奄至鏐擊敗再思與頵通和頵要盟於鏐鏐徧召諸子問之曰誰能為吾為田氏之壻者例有難色時元瓘年十六進曰唯大王之命由是就親於宣州唐天祐初承制累遷檢校尚書左僕射內牙將指揮使數年之間伐叛禦寇大著勳績梁貞明四年夏鏐大舉伐吳以元瓘為水戰諸軍都指揮使戰棹抵東洲吳人以舟師拒戰元瓘為火筏順風揚灰以坌之白晝如霧吳師迷方遂敗之擒軍使彭彥章彭彥章原本脫章字今從九國志增入影庫本粘籤幷軍校七十餘人得戰艦四百隻吳人知不可校通好於鏐以功奏授鎮海軍節度副使檢校司徒梁末遷清海軍節度使檢校太傅同平章事後唐同光初加檢校太師兼中書令鎮東等軍節度觀察處置等使時鏐自為天下兵馬都元帥尚父守尚書令吳越國王及鏐為太師致仕元瓘累貢章疏乞復舊號唐明宗許之鏐既年高欲立嗣召諸子使各論功請讓於元瓘及鏐病篤召將吏謂之曰余病不起兒皆愚懦恐不能為爾帥與爾輩決矣帥當自擇將吏號泣言曰大令公有軍功多賢行仁孝已領兩鎮王何苦言及此鏐曰此渠定堪否曰衆等願奉賢帥即出符鑰數篚於前謂元瓘曰三軍言爾可奉領取此鏐薨遂襲父位唐長興四年遣將作監李鏻原本脫李鏻二字今據通鑑增入影庫本粘籤起復元瓘官爵又命戶部侍郎張文寶授兼尚書令清泰初封吳王二年封越王天福元年賜金印三年封吳越國王五年加天下兵馬元帥六年授天下兵馬都元帥其年夏有疾秋府署災焚之一空乃移於他所其燄皆隨而發焉元瓘因驚悸發狂以是歲八月二十四日薨年五十五歲諡曰文穆元瓘幼聰敏長於撫馭臨戎十五年決事神速為軍民所附然奢僭營造甚於其父故有回祿之災焉元瓘有詩千篇編其尤者三百篇命曰錦樓集浙中人士皆傳之子佐為嗣永樂大典卷四千六百九十二佐字玄祐元瓘薨遂襲其位晉天福末制授檢校太師兼中書令吳越王仍篆玉為冊以賜之前代玉冊冊夷王有之偽梁時欲厚於鏐首為式例故因而不改俄授開府儀同三司守太尉時以建安為淮寇所攻授東南面兵馬都元帥佐尋遣舟師進討淮人大敗以功加守太師漢高祖入汴佐首獻琛賮表率東道漢祖嘉之授諸道兵馬都元帥佐居列土凡七年境內豐阜祖父三世皆為元帥時以為榮漢初以疾卒於位諡曰忠獻佐幼好書性溫恭能為五七言詩凡官屬遇雪月佳景必同宴賞由此士人歸心其班品亦有丞相已下名籍而祿給甚薄罕能自濟每朝廷降吏則去其偽官或與會則公府助以僕馬處事齷齪多如此類然航海所入歲貢百萬王人一至所遺至廣故朝廷寵之為羣藩之冠佐有子昱年五歲未任庶務乃以其弟倧襲位永樂大典卷四千六百九十二倧性明敏嚴毅未立時常以佐性寬善疑掌兵權者難制及代佐為帥以禮法繩下宿將舊勳不甚優禮大將胡進思頗不平之乃密與親軍謀去倧漢祖入汴之歲十二月進思率甲士三百大譟突入衙署倧闔戶以拒之左右與之格鬬盡為進思所殺遂遷倧於別館以甲士援送幽於錦軍錦軍疑當作衣錦軍考冊府元龜, krp: 省注}
