  - {type: variant, offset: 2894, length: 326, content: 改正影庫本粘籤雷彥恭乘汭出師襲取荊州載其寶貨焚毀州城而去彥恭東連行密斷江嶺行商之路殷與高季興合勢攻彥恭於澧朗數年擒之盡有其地乃以張佶為朗州節度使由是兵力雄盛殷於梁貞明中貞明原本脫明字今據文增入影庫本粘籤為時姑息所求皆允累官至守太師兼中書令封楚王又上章請依唐秦王故事乃加天策上將軍之號又請官位內添制置靜江武平寧遠等軍事皆從之既封楚王仍請依唐諸王行臺故事署置天官幕府有文苑學士之號知詔令之名總制二十餘州自署官吏征賦不供民間採茶並抑而買之又自鑄鉛鐵錢凡天下商賈所齎寶貨入其境者祇以土產鉛鐵博易之無餘遂致一方富盛窮極奢侈貢奉朝廷不過茶數萬斤而已於中原賣茶之利歲百萬計唐同光初首脩職貢復授太師兼尚書令楚王天成初加守尚書令長興二年十一月十日薨於位時年七十八案歐陽史, WYG: ''}
