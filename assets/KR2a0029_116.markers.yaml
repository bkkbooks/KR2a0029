  - {type: variant, offset: 1114, length: 440, content: 荊南節度使守太傅中書令封南平王皇朝建隆元年秋卒諡曰貞懿其諸將之倚任者則有王保義保義本姓劉名去非幽州人少為縣吏粗暴無行習騎射敢鬬擊劉仁恭之子守奇善射唯去非許以為能守奇以兄守光奪父位亡入契丹又自契丹奔太原去非皆從之莊宗之伐燕也守奇從周德威引軍前進師次涿州刺史姜行敢登陴固守去非呼行敢曰河東小劉郎領軍來為父除兇爾何敢拒守奇免冑勞之行敢遙拜即開門迎降德威害其功密告莊宗言守奇心不可保莊宗召守奇還計事行次土門去非說守奇曰公不施寸兵下涿郡周公以得非己力必有如簧之間太原不宜往也公家於梁素有君臣之分宜往依之介福萬全矣守奇乃奔梁梁以守奇為滄州留後以去非為河陽行軍司馬時謝彥章移去非為郢州刺史及莊宗平河洛去非乃棄郡歸高季興為行軍司馬仍改易姓名自是季興父子倚為腹心凡守藩規畫出兵方略言必從之乾祐元年夏高從誨奏為武泰軍節度留後依前荊南行軍司馬加檢校太尉後卒於江陵永樂大典卷一萬八千一百一十一保勗季興之幼子也鍾愛尤甚季興在世時或因事盛怒左右不敢竊視唯保勗一見季興則怒自解故荊人目之為萬事休皇朝建隆四年春卒, WYG: ''}
