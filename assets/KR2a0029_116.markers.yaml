  - {type: variant, offset: 2034, length: 657, content: 自是震出入門下稱前進士而已同光中莊宗得天下季興懼而入覲時幕客皆贊成震獨以為不可謂季興曰大王本梁朝與今上世稱讎敵血戰二十年卒為今上所滅神器大寶雖歸其手恐餘怒未息觀其舊將得無加害之心宜深慮焉季興不從及至莊宗果欲留之樞密郭崇韜切諫以為不可天下既定四方諸侯雖相繼稱慶然不過子弟與將吏耳惟季興能躬自入覲可謂尊獎王室者也禮待不聞加等反欲留縻之何以來遠臣恐此事一行則天下解體矣莊宗遂令季興歸行已浹旬莊宗易慮遽以詔命襄州節度劉訓伺便囚之時季興至襄州就館而心動謂吏曰吾方寸擾亂得非朝廷使人追而殺吾耶梁先輩之言中矣與其住而生不若去而死遂棄輜重與部曲趫健者數百人南走至鳳林關已昏黑於是斬關而去既而是夜三更向之急遞果至襄州劉訓料其去遠不可追而止自是季興怨憤以兵襲取復州之監利玉沙二縣命震草奏請以江為界震又曰不可若然則師必至矣非大王之利也季興怒卒使為之既而奏發未幾朝廷遣夏魯奇房知溫等領兵來伐季興登城望之見其兵少喜欲開城出戰震復諫曰大王何不思之甚耶且朝廷禮樂征伐之所自出兵雖小而勢實大加以四方諸侯各以相吞噬為志但恨未見得其便耳若大王不幸或得一戰勝則朝廷徵兵於四方其誰不欲仗順而起以取大王之土地耶如此則社稷休矣為大王計者莫若致書於主帥且以牛酒為獻然後上表自劾如此則庶幾可保矣不然則非僕之所知也季興從之果班師震之裨贊皆此類也洎季興卒子從誨繼立震以從誨生於富貴恐相知不深遂辭居於龍山別業自號處士從誨見召皆跨黃牛直抵廳事前下呼從誨不以官閥但郎君而已末年尤好篇詠與僧齊己友善貽之詩曰陳琳筆硯甘前席用里煙霞憶共眠蓋以寫其高尚之趣也馬殷字霸圖許州鄢陵人也, WYG: ''}
