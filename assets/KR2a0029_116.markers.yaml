  - {type: variant, offset: 1575, length: 457, content: 地不為高氏所有則萬事休之言蓋先兆也永樂大典卷五千五百三十九五代史補高季興本陵州陝人為太祖裨將出為郢州防禦使時荊南成汭征鄂州不利而卒太祖命季興為荊南留後到未幾會武陵土豪雷彥恭作亂季興破之遂以功授荊南節鉞莊宗定天下季興首入覲因拜中書令封南平王初季興嘗從梁太祖出征引軍早發至逆旅未曉有嫗秉燭迎門具禮甚厚季興疑而問之對曰妾適夢有人叩關呼曰速起速起有裂土王來及起盥嗽畢秉燭開門而君子奄至得非所謂王者耶所以不敢慢爾季興喜及來荊南竟至封王高從誨季興之庶子而處長為性寬厚雖士人不如也天成中季興叛從誨力諫之不從及季興卒朝廷知從誨忠使嗣亦封南平王初季興之事梁也每行軍常以愛姬張氏自隨一旦軍敗攜之而竄遇夜悞入深澗中時張氏方姙行遲季興恐為所累俟其寢酣以劍刺岸邊欲壓殺之然後馳去既而岸欲崩張氏且驚起呼季興曰妾適夢大山崩而壓妾身有神人披金甲執戈以手托之遂免季興聞之謂必生貴子遂挈之行後生從誨梁震蜀郡人有才略登第後寓江陵高季興素聞其名欲任為判官震恥之然難於拒恐禍及因謂季興曰本山野鄙夫也非有意於爵祿若公不以孤陋令陪軍中末議但白衣從事可矣季興奇而, WYG: 崇韜}
