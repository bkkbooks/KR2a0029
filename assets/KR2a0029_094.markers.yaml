  - {type: variant, offset: 1519, length: 198, content: 取嵩山神冠冕之服以衣之張遇以其衆攻鄭州太與李瓊擊之賊衆敗走瓊中流矢而死太乃括率郡中財物以賞軍士因誘之欲同西去其衆不從太乃潛奔於洛陽案通鑑云戍兵既失太反譖太于契丹云脅我為亂太遣子師朗自訴于契丹契丹殺之舊五代史考異及劉晞南走許州案通鑑考異作劉禧舊五代史考異太殺晞牙校李暉入河南府行留守事既而嵩山賊帥張遇殺嗣密王傳首於太懸於洛市又有伊闕賊帥自稱天子領衆萬餘將入洛城集郊壇之上太率兵數百人逆擊破之賊衆遂潰, WYG: ''}
