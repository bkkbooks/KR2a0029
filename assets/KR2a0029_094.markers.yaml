  - {type: variant, offset: 7060, length: 3, content: 彥珣後, WYG: 作已已次陜州是書閔帝紀作丁夘通鑑從是書夏四月壬申帝至蔣橋文武百官立官奉迎案通鑑四月庚午朔太后令内諸司至乾壕迎潞王考異引廢帝實録作三月三十日癸酉皇太后下令降閔帝為鄂王案通鑑考異引閔帝實録七日廢帝為鄂王廢帝實録作癸酉薛歐二史從廢帝實録潞字一足已入洛矣洛原本訛潞今據册府元龜改正甲申案甲申疑當作壬午}
