  - {type: punctuation, offset: 1729, content: ：, id: KR2a0029_ZHSJ_094-bkkpn380}
  - {type: variant, offset: 1729, length: 551, content: 劉禧走許田復有潁陽妖巫姓朱號嗣密王誓衆于洛南天壇號萬餘人太帥部曲與朝士輩虛張旗幟一舉而逐之洛師遂安舊五代史考異河陽武行德遣使召太詐言欲推之為帥尋為行德所害永樂大典卷一萬八千一百三十一何建案九國志作何重建其先迴鶻人也代居雲朔間祖慶父懷福俱事後唐武皇為小校建少以謹厚隸於高祖帳下以掌為役及即位累典禁軍案九國志云重建初事晉祖為奉德馬軍都指揮使遙領驩睦二郡天福中自曹州刺史遷延州兵馬留後尋正授旄鉞案九國志云延州節度使丁審琪殘暴貪冒蕃部苦之重建以所部兵攻其城審琪遁去晉祖即以重建權節度兵馬留後下車諭以威福邊民安堵就加彰武軍節度使數年之間歷涇鄧貝澶孟五鎮節度使案九國志云皆以廉儉簡易稱累官至檢校太傅開運三年移鎮秦州是冬契丹入汴戎王遣人齎詔以賜建建憤然謂將吏曰吾事石氏二主累擁戎旃人臣之榮亦已極矣今日不能率兵赴難豈可受制於契丹乎即遣使齎表與其地送款於蜀孟昶待之甚厚偽加同平章事依前秦州節度使案九國志云時固鎮與鳳州未平重建悉經略討平之歲餘移閬州保寧軍節度使案九國志云昶大舉兵北伐遣張虔釗出大散關以重建為招討使由隴州路以進師無功而還加偽官至中書令後卒於蜀永樂大典卷五千六百三十二張廷蘊字德樞開封襄邑人也祖立贈驍衞將軍父及贈光祿大夫廷蘊少勇捷始隸宣武軍為伍長唐天復中奔太原武皇收於帳下為小校及莊宗救上黨戰柏鄉攻薊門下邢魏皆, WYG: 廢帝諱}
