  - {type: variant, offset: 6599, length: 218, content: 董溫琪為鎮州節度使擢瓊為衙內指揮倚以腹心及溫琪陷蕃瓊乃害溫琪之家載其屍都以一坎瘞之溫琪在任貪暴積鏹巨萬瓊悉輦之以藏其家遂自稱留後高祖即位遣安重榮代之授瓊齊州防禦使時重榮與蕃帥趙思溫同行部曲甚衆瓊不敢拒命尋峔銎貨由鄴中以赴任先是鄴帥范延光將謀叛遣牙將范鄴持書搆瓊瓊領書不答使者還具達其事延光深忿之及聞瓊過其境密使精騎殺瓊於夏津以滅其口一行金寶侍伎皆為延光所有由是延光異志益露焉永樂大典卷一萬二千八百六十六李彥珣邢州人也少為郡之牙吏唐天祐中, WYG: 和末}
