  - {type: variant, offset: 364, length: 1154, content: 其貪暴舊五代史考異應順初舉軍伐鳳翔從簡亦預其行會軍變乃東還道遇張廷蘊為廷蘊所執送於末帝末帝數之曰人皆歸我爾何背我而去也從簡曰事主不敢二心今日死生唯命末帝釋之清泰二年授潁州團練使高祖舉義末帝將議親征詔赴闕充副招討使隨駕至孟津除河陽節度使及趙延壽軍敗斷浮橋歸洛留從簡守河陽高祖自北而至從簡察軍情離散遂渡河迎謁高祖天福元年十二月授許州節度使改賜推忠佐運保國功臣二年秋移鎮徐州三年加開府儀同三司開府原本誤作開封今據文改正影庫本粘籤檢校太尉進封開國公食邑至一千五百戶授代歸闕受左金吾衞上將軍從簡性忌克而多疑歷州鎮凡十餘所在竪棘於公署纔通人行左右稍違忤即加鞭笞或至殺害其意不可測吏人皆側足而行其煩苛暴虐為武臣之最六年秋隨駕幸鄴都遇疾請告尋卒於鄉里年六十五贈太傅永樂大典卷一萬八千一百三十一案歐陽史作贈太師舊五代史考異潘環字楚奇洛陽人也父景厚以環貴授左監門上將軍致仕環少以負販為業始事梁邢州節度使閻寶為帳中親校及莊宗定魏博移兵攻邢寶遣環間道馳奏於梁梁末帝用為左堅銳夾馬都虞候累遷左雄威指揮使時梁人與莊宗對壘於河上環每預戰先登陷敵金瘡徧體案玉堂閒話云潘環常中流矢于面骨銜其鏃故負重傷醫至經年其鏃自出其瘡成漏終身不痊舊五代史考異莊宗知其名及平梁命典禁軍同光中從明宗北禦契丹鄴軍之亂從明宗入洛天成初授棣州刺史會定州王都反朝廷攻之以環為行營右廂步軍都指揮使賊平改易州刺史北面沿邊都部署後移刺慶州受代歸闕明宗召對顧侍臣曰此人勇敢少能偕者尋除宿州團練使清泰中移耀州天福中預平范延光授齊州防禦使四年升金州為節鎮以環為節度使久之入為左神武統軍開運初契丹入寇王師北征以環為北面行營步軍左廂排陣使預破契丹於陽城軍迴授澶州節度使累官至檢校太傅三年罷鎮歸闕俄受詔洛京巡檢其年冬戎王犯闕偽署劉晞為西京留守環乞罷巡警閑居洛陽遇河陽軍亂晞出奔未幾蕃將高牟翰以兵援晞入於洛慮環有變乃害之盡取其家財通鑑云晞疑環搆其衆逐己使牟翰殺之殿本漢高祖至京贈太尉環歷六部兩鎮所至以聚斂為務在宿州時有牙將因微過見怒環紿言笞之牙校因託一尼嘗熟於環者獻白金兩鋌尼詣環白牙校餉脚兩枚兩枚原本作兩枝今從冊府元龜改正影庫本粘籤求免其責環曰本幾脚尼曰三脚環復曰今兩脚能成乎尼則以三數致之當時號環為潘脚永樂大典卷一萬八千二百三十一方太字伯宗青州千乘人也少隸本軍為小校嘗戍登州劫海客事洩刺史淳于晏匿之遇赦免事定州節度使楊光遠光遠領兵赴晉陽本州軍亂太與馬萬盧順密等擒之使太縛送至闕尋從杜重威破張從賓於汜水以功除趙州刺史從楊光遠平范延光於鄴移刺萊州遷安州防禦使從少帝幸澶州與契丹戰於戚城中數創改鳳州防禦使行至中途遷河陽留後移邢州留後契丹犯闕偽命遙領洋州節度使充洛京巡檢與前洺州團練使李瓊俱至鄭州其屯駐兵士迫請太在城巡檢以備外盜號為鄭王時有嵩山賊帥張遇領衆萬餘於僧衆得梁朝故嗣密王朱乙遂推為天, WYG: 已}
