  - {type: variant, offset: 7068, length: 154, content: 臣曰昔從簡從莊宗戰於河上可謂勇矣及其為末帝守於孟津豈得為忠乎忠既無聞勇何足貴潘環方太雖咸負雄幹而俱歿亂世蓋方略不足以衞其身故也何建舉秦隴之封附巴卭之俗守方之寄其若是乎其餘皆儋珪析爵之流也亦可以垂名於是矣祕瓊既覆董氏之族旋為鄴帥所屠何報應之速也唯彥珣忍射其親殆非人類晉祖宥之不戮蓋失刑之甚也永樂大典卷一萬三百八, WYG: 巻四}
