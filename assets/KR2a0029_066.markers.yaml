  - {type: variant, offset: 3354, length: 0, content: '', krp: 攷五代㑹要内園裁接使係梁時雜使創置之官契丹按巴堅東攻渤海案遼史太祖紀天贊三年五月渤海殺其刺史張秀實而掠其民於東攻渤海之事闕而不載攷五代㑹要同光二年七月契丹東攻渤海與是書同每兩與减五十文案五代㑹要作每兩與减放五文已酉車駕發鄴宫辛亥至德勝城案五代春秋作庚子帝幸鄴都遂幸德勝故城據是書則己酉發鄴宫辛亥至德勝城與五代春秋異盖五代春秋祇以詔下之日為據也庚辰車駕至自鄴庚辰歐陽史作庚申考通鑑及五代春秋皆作庚辰据上文正月甲午朔二月甲子朔三月癸已朔則三月不得有庚辰也盖其誤始於是書而通鑑五代春秋皆襲其訛耳今姑從原本仍為辨正於此夏四月癸亥朔案五代春秋作辛亥朔通鑑從是書中書侍郎兼工部尚書平章事趙光𦙍卒案是書二年六月光𦙍加兼戶部尚書此處作工部前後互異未知何故按巴堅舊作阿保機今改裕悦舊作于越今改}
  - {type: line-break, offset: 3357, content: '', id: ZHSJ__dup10773}
  - {type: variant, offset: 3358, length: 0, content: '', WYG: 巻三十二}
  - {type: variant, offset: 3358, length: 0, content: '', krp: 巻三十二}
  - {type: variant, offset: 3359, length: 503, content: 異將兵討平之無幾党項劫迴鶻入朝使詔彥稠屯朔方就討党項之叛命者搜索盜賊盡獲迴鶻所貢馬寶玉擒首領而還尋授邠州節度使遣會兵制置鹽州蕃戎逃遁獲陷蕃士庶千餘人遣復鄉里受詔與延州節度使案原本有闕文歐陽史作靈武康福進攻夏州累月不克兵罷歸鎮閔帝嗣位與王思同攻鳳翔為副招討使禁軍之潰彥稠欲沿流而遁為軍士所擒而獻之時末帝已至華州令拘於獄誅之漢高祖即位與王思同並制贈侍中永樂大典卷一萬八千一百二十九宋令詢不知何許人也閔帝在藩時補為客將知書樂善動皆由禮長興中閔帝連殿大藩遷為都押衙都押衙原本作挾衙考契丹國志云宋王舊押衙宋令詢聞變自經卒原本挾字係傳寫之訛今改正影庫本粘籤參輔閫政甚有時譽閔帝深委之及閔帝嗣位朱馮用事不欲閔帝之舊臣在於左右乃出為磁州刺史閔帝蒙塵於衞令詢日令人奔問及聞帝遇害大慟半日自經而卒永樂大典卷一萬三千四十四史臣曰夫代大匠斲者猶傷其手況代天子執賞罰之柄者乎是以古之賢人當大任秉大政者莫不卑以自牧推之不有廓自公之道絕利己之欲然後能保其身而脫其禍也而重誨何人安所逃死古語云無為權首反受其咎重誨之謂歟自弘昭而下力不能衞社稷謀不能安國家相踵而亡又誰咎也唯令詢感故君之舊恩由大慟而自絕以茲隕命足以垂名永樂大典卷一萬三千四十四, WYG: 證}
