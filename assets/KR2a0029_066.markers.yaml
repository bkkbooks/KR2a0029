  - {type: variant, offset: 4, length: 2288, content: 卷六十六唐書四十二列傳第十八安重誨安重誨傳永樂大典全篇已佚今就其散見各韻者共得五條冊府元龜所引薛史共得三條通鑑注所引薛史一條排比先後以存梗概影庫本粘籤其先本北部豪長父福遷為河東將救兗鄆而沒通鑑注引薛史重誨自明宗龍潛時得給事左右及鎮邢州以重誨為中門使隨從征討凡十餘年委信無間勤勞亦至洎鄴城之變佐命之功獨居其右明宗踐祚領樞密使俄遷左領軍衞大將軍充職冊府元龜卷三百九案以下有闕文殿本明宗遣回鶻侯三馳傳至其國侯三至醴泉縣縣素僻無驛馬其令劉知章出獵不時給馬侯三遽以聞明宗大怒械知章至京師將殺之賴重誨從容為言乃得不死永樂大典卷一萬一千六百五十四明宗幸汴州重誨建議欲因以伐吳而明宗難之其後戶部尚書李鏻得吳諜者言徐知誥欲奉吳國以稱藩願得安公一言以為信鏻即引諜者見重誨重誨大喜以為然乃以玉帶與諜者使遺知誥為信其直千緡永樂大典一萬五千五百三十重誨為樞密使四五年間獨綰大任臧否自若環衞酋長貴戚近習無敢干政者弟牧鄭州子鎮懷孟身為中令任過其才議者謂必有覆餗之禍無何有吏人李虔徽弟揚言于衆云案歐陽史作樞密承旨李虔徽語其客邊彥溫云所載異詞舊五代史考異聞相者言其貴不可言今將統軍征淮南時有軍將密以是聞頗駭上聽冊府元龜卷九百四十二明宗謂重誨曰聞卿樹心腹私市兵仗欲自討淮南有之否重誨惶恐奏曰興師命將出自宸衷必是奸人結搆臣願陛下窮詰所言者翌日帝召侍衞指揮使安從進藥彥稠等謂之曰有人告安重誨私置兵仗將不利於社稷其若之何從進等奏曰此是奸人結搆離間陛下勳舊且重誨事陛下三十年從微至著無不盡心今日何苦乃圖不軌臣等以家屬保明家屬原本作家沒今據文改正影庫本粘籤必無此事帝意乃解永樂大典卷四百六十一重誨三上表乞解機務詔不允復面奏乞與臣一鎮以息謗議明宗不悅重誨奏不已明宗怒謂曰放卿出朕自有人即令武德使孟漢瓊至中書與宰臣商量重誨事馮道言曰諸人苟惜安令公解樞務為便趙鳳曰大臣豈可輕動公失言也道等因附漢瓊奏曰此斷自宸旨然重臣不可輕議移改由是兼命范延光為樞密使重誨如故永樂大典卷一萬一百一十三時以東川帥董璋恃險難制乃以武虔裕為綿州刺史董璋益懷疑忌遂縶虔裕以叛及石敬瑭領王師伐蜀峽路艱阻糧運不繼明宗憂之而重誨請行翌日領數騎而出日馳數百里西諸侯聞之莫不惶駭所在錢帛糧料星夜輦運人乘斃踣於山路者不可勝紀百姓苦之永樂大典卷一萬八千一百二十九重誨至鳳翔節度使朱弘昭延于寢室令妻子奉食器敬事尤謹重誨坐中言及昨有人讒搆幾不保全賴聖上保鑒苟獲全族因泣下重誨既辭弘昭遣人具奏重誨怨望出惡言不可令至行營恐奪石敬瑭兵柄而宣徽使孟漢瓊自西迴亦奏重誨過惡重誨已至三泉復令歸闕再過鳳翔朱弘昭拒而不納重誨懼急騎奔程未至京師制授河中帥既至鎮心不自安遂請致仕制初下其子崇贊崇緒走歸河中二子初至重誨駭然曰渠安得來家人欲問故原本作家人欲問故里今以文義求之里字當係衍文今刪去影庫本粘籤重誨曰吾知之矣此非渠意是他人教來吾但以一死報國家餘復何言翌日中使至見重誨號泣久之重誨曰公但言其故勿過相愍中使曰人言令公據城異志矣重誨曰吾一死未塞責已負君親安敢輒懷異志遽勞朝廷興師增聖上宵旰則僕之罪更萬萬矣時遣翟光鄴使河中如察重誨有異志則誅之既至李從璋自率甲士圍其第仍拜重誨于其庭重誨下階迎拜曰太傅過禮俛首方拜從璋以檛擊其首其妻驚走抱之曰令公死亦不遲太傅何遽如此幷擊重誨妻首碎並剝其衣服夫妻裸形踣于廊下血流盈庭翌日副使判官白從璋願以衣服覆其屍堅請方許及從璋疏重誨家財不及數千緡議者以重誨有經綸社稷之大功然志大才短不能迴避權寵親禮士大夫求周身輔國之遠圖而悉自恣胸襟果貽顛覆冊府元龜卷九百四十二案安重誨傳永樂大典中全篇已佚今采冊府元龜補之以存大概五代史補初知祥將據蜀也且上表乞般家屬時樞密使安重誨用事拒其請知祥曰吾知之矣因使密以金百兩為賂重誨喜而為敷奏詔許之及家屬至知祥對僚吏笑曰天下聞知樞密將謂天地間未有此誰知只銷此百金耶亦不足畏也遂守險拒命五代史闕文明宗令翟光鄴李從璋誅重誨於河中私第從璋奮檛擊重誨於地重誨曰某死無恨但恨不與官家誅得潞王他日必為朝廷之患言終而絕臣謹案明宗實錄是清泰帝朝修撰潞王即清泰帝也史臣避諱不敢直書嗚呼重誨之志節泯矣朱弘昭太原人也祖玟父叔宗皆為本府牙將弘昭事明宗在藩方為典客天成元年為文思使歷東川副使二年餘除左衞大將軍充內客省使三年轉宣徽南院使明宗親祀南郊弘昭為大內留守加檢校太傅出鎮鳳翔會朝廷命石敬瑭帥師伐蜀久未成功安重誨自請西行至鳳翔弘昭迎謁馬首請館於府署妻子羅拜捧巵為壽弘昭密遣人謂敬瑭曰安公親來勞軍觀其舉措孟浪儻令得至恐士心迎合迎合原本作逆合今據文改正影庫本粘籤則不戰而自潰也可速拒之必不敢前則師徒萬全也敬瑭聞其言大懼即日燒營遁還重誨聞之不敢西行案歐陽史敬瑭以糧餉不繼遽燒營還軍重誨亦以被讒召還舊五代史考異因反旆東還復過鳳翔弘昭拒而不納及重誨得罪其年弘昭入朝授左武衞上將軍充宣徽南院使長興三年十二月代康義誠為襄州節度使四年秦王從榮為元帥屢宣惡言執政大臣皆懼謀出避之樞密使范延光趙延壽日夕更見涕泣求去明宗怒而不許延壽使其妻興平公主入言於中延光亦因孟漢瓊王淑妃進說故皆得免未幾趙延壽出鎮汴州召弘昭於襄陽代為樞密使加同平章事十月范延光出鎮常山以三司使馮贇與弘昭對掌樞務馮贇原本作為贇今從通鑑改正影庫本粘籤與康義誠孟漢瓊同謀以殺秦王閔帝即位弘昭以為由己得立故於庶事高下在心及赦後覃恩弘昭首自平章事超加中書令素猜忌潞王致其釁隙以致禍敗潞王至陝閔帝懼欲奔馳手詔召弘昭圖之時將軍穆延輝在弘昭第曰急召罪我也其如之何吾兒婦君之女也可速迎歸無令受禍中使繼至弘昭援劍大哭至後庭欲自裁家人力止之使促之急弘昭曰窮至此耶乃自投於井安從進既殺馮贇斷弘昭首俱傳於陝州及漢高祖即位贈尚書令永樂大典卷二千, WYG: 巻}
