  - {type: variant, offset: 3118, length: 227, content: 軍諸衞事未幾鳳翔變起西軍不利義誠懼乃請行蓋欲盡率駕下諸軍送降於潞王求免也會與朱洪實議事不叶洪實因厲聲言義誠苞藏之志閔帝曖昧不能明辨而誅洪實及義誠率軍至新安諸軍爭先趨陝解甲迎降義誠以部下數十人見潞王請罪潞王雖罪其奸回未欲行法清泰元年四月斬於興教門外夷其族永樂大典卷一萬八千二十九藥彥稠沙陀三部落人幼以騎射事明宗累遷至列校明宗踐阼領澄州刺史河陽馬步都將從王晏球討王都於定州平之領壽州節度使侍衞步軍都虞候屬河中指揮使楊彥溫作亂彥稠改侍衞步軍都指揮使充河中副招討, WYG: 内園}
