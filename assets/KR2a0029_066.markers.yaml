  - {type: variant, offset: 3354, length: 0, content: '', WYG: 攷五代㑹要内園裁接使係梁時雜使創置之官契丹按巴堅東攻渤海案遼史太祖紀天贊三年五月渤海殺其刺史張秀實而掠其民於東攻渤海之事闕而不載攷五代㑹要同光二年七月契丹東攻渤海與是書同每兩與减五十文案五代㑹要作每兩與减放五文已酉車駕發鄴宫辛亥至德勝城案五代春秋作庚子帝幸鄴都遂幸德勝故城據是書則己酉發鄴宫辛亥至德勝城與五代春秋異盖五代春秋祇以詔下之日為據也庚辰車駕至自鄴庚辰歐陽史作庚申考通鑑及五代春秋皆作庚辰据上文正月甲午朔二月甲子朔三月癸已朔則三月不得有庚辰也盖其誤始於是書而通鑑五代春秋皆襲其訛耳今姑從原本仍為辨正於此夏四月癸亥朔案五代春秋作辛亥朔通鑑從是書中書侍郎兼工部尚書平章事趙光𦙍卒案是書二年六月光𦙍加兼戶部尚書此處作工部前後互異未知何故按巴堅舊作阿保機今改裕悦舊作于越今改}
