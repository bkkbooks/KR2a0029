  - {type: variant, offset: 2295, length: 424, content: 朱洪實案歐陽史作朱宏實舊五代史考異不知何許人以武勇累歷軍校長興中為馬軍都指揮使秦王為元帥以洪實驍果尤寵待之歲時曲遺頗厚於諸將及朱弘昭為樞密使勢燄尤甚洪實以宗兄事之意頗相協弘昭將殺秦王以謀告之洪實不以為辭時康義誠以其子事於秦府故恆持兩端及秦王兵扣端門洪實為孟漢瓊所使率先領騎軍自左掖門出逐秦王自是義誠陰銜之陰銜原本作陰衞今據文改正影庫本粘籤閔帝嗣位洪實自恃領軍之功義誠每言不為之下應順元年三月辛酉義誠將出征閔帝幸左藏庫親給軍士錢帛是時義誠與洪實同於庫中面論用兵利害案歐陽史云洪實見軍士無鬬志而義誠盡將以西疑其二心舊五代史考異洪實言出軍討逆累發兵師今聞小衂無一人一騎來者不如以禁軍據門自固彼安敢徑來然後徐圖進取全策也義誠怒曰若如此言洪實反也洪實曰公自反誰反其聲漸厲帝聞召而訊之洪實猶理前謀又曰義誠言臣圖反據發兵計義誠反必矣閔帝不能明辨遂命誅洪實既而義誠果以禁軍迎降潞王故洪實之死後人皆以為寃永樂大典卷二千三十二康義誠字信臣代北三部落人也少以騎射事武皇從, WYG: 攷證唐}
