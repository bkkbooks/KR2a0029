  - {type: variant, offset: 2721, length: 396, content: 入魏博補突騎使累遷本軍都指揮使同光末從明宗討鄴城軍亂迫明宗為主明宗不然義誠進曰主上不慮社稷阽危不思戰士勞苦荒躭禽色溺於酒樂今從衆則有歸守節則將死明宗納其言由是委之心膂明宗即位加檢校司空領富州刺史總突騎如故尋轉捧聖都指揮使鎮邠州刺史案歐陽史作汾州舊五代史考異明宗幸汴平朱守殷改侍衞馬軍都指揮使領江西節度使車駕歸洛授侍衞馬步軍都指揮使河陽節度使長興末加同平章事案玉堂閒話云長興中侍衞使康義誠常軍中差人于私宅充院子亦曾小有笞責忽一日憐其老而詢其姓氏則曰姓康別詰其鄉土親族息嗣方知是父遂相持而泣聞者莫不驚異舊五代史考異秦王為天下兵馬元帥氣焰燻灼大臣皆懼求為外任義誠以明宗委遇無以解退乃令其子以弓馬事秦王以自結明宗不豫秦王諷義誠為助諷義誠原本作捧義誠今據冊府元龜改正影庫本粘籤義誠曲意承奉亦非真誠及朱弘昭馮贇等懼禍謀於義誠義誠但云僕為將校不敢預議但相公所使耳及秦王既誅明宗宴駕閔帝即位加檢校太尉兼侍中判, WYG: 紀}
