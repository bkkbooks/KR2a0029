  - {type: variant, offset: 5, length: 0, content: '', WYG: 攻其艦案通鑑作木甖載薪沃油然火于上流縱之與是書異歐陽史作以大甕積薪自上流縱火與是書同髙行珪𫝊明宗諭以順逆之理行珪乃降守光將元行欽率部下攻行珪行珪遣弟行周告急于周德威案歐陽史行珪夜縋行周馳入晉見莊宗莊宗因遣明宗救武州比至行欽巳解去行珪乃降是行珪先求救于晉而後降也是書作降晉後告急㣲有異同王思同𫝊為帳下軍校案歐陽史作銀胡䩮指揮使飛騰指揮使案歐陽史作飛騰都指揮使位止鄭州刺史案歐陽史作以功遷神武十軍都指揮使累遷鄭州防禦使以五絃技見思同案歐陽史作遣伶奴安十十以五絃又令推官郝昭郝昭歐陽史作郝詡通鑑}
