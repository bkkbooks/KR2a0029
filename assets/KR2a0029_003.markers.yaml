  - {type: variant, offset: 4030, length: 0, content: '', WYG: 李克恭來降帝請河陽節度使朱崇節為潞州留後戊辰李克用自率蕃漢步騎數萬以圍潞州帝遣葛從周率驍勇之士夜中銜枚犯圍而入於潞九月壬寅帝至河陽遣都將李讜引軍趨澤潞行至馬牢川為晉人所敗帝又遣朱友裕張全義率精兵至鄆州北以為應援既而崇節從周棄潞來歸戊申帝廷責諸將敗軍之罪斬李􅀈李重𦙍以狥遂班師焉十月乙酉帝自河陽赴滑臺時奉詔將討太原先遣使假道於魏魏人不從先是帝遣行人雷鄴告糴於魏既而為牙軍所殺羅宏信懼故不敢從命遂}
