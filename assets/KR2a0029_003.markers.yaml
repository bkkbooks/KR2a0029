  - {type: variant, offset: 4108, length: 0, content: '', krp: 伐徐州二年四月丁丑龎師古下彭門梟時溥首以獻八月帝遣龎師古移兵攻兖駐於曲阜與朱瑾屢戰皆敗之十二月師古遣先鋒葛從周引軍以攻齊州刺史朱威告急於兖鄆既而朱瑄以援兵至遂固其壘乾寧元年二月帝親領大軍由鄆州東路北次於魚山朱瑄硯知即以兵逕至且圖速戰帝整軍出寨時瑄瑾已陣于前須臾東南風大起我軍旌旗失次甚有懼色即令騎士揚鞭呼􅀈哦而西北風驟發時兩軍皆在草莽中帝因令縱火既而烟熖亘天乘勢以攻賊陣瑄瑾大敗殺萬餘人餘衆擁入清河因築京觀於魚山之下駐軍數日而還二年正月癸亥遣朱友恭帥師復伐兖遂塹而圍之未幾朱瑄自鄆率步騎援糧欲入於兖友恭設伏以敗之盡奪其餉於高呉因擒蕃将安福順安福慶二月巳酉帝親領軍屯於單父以為友恭之援四月濠壽二州復為楊行密所陷是時太原遣將史儼兒李承嗣以萬騎馳入於鄆朱友恭遂歸於汴八月帝領親軍伐鄆至大仇遣前軍挑戰設伏於梁山以待之既而獲蕃將史完府奪馬數百匹朱瑄脱身遁去復入於鄆十月帝駐軍於鄆齊州刺史朱瓊遣}
