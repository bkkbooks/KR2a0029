則各如舊冊府元龜卷一百九十一辛未武安軍節度使馬殷進封楚王冊府元龜卷一百九十六以太府卿敬翔知崇政院翔與帷幄之謀故首擢焉永樂大典卷一萬二千一百十三, krp: ''}
