  - {type: punctuation, offset: 4109, content: （, id: KR2a0029_ZHSJ_003-bkkpn850}
  - {type: variant, offset: 4109, length: 0, content: '', WYG: 請降瓊即瑾之從父兄也帝因移軍至兖瓊果來降未幾瓊為朱瑾所紿掠而殺之帝即以其弟玭為齊州防禦使十一月朱瑄復遣將賀瓌柳存及蕃將何懷寳等萬餘人以襲曹州庻解兖州之圍也帝知之自兖領軍䇿馬先路至鉅野南追而敗之殺戮將盡生擒賀瓌栁存何懷寳及賊黨三千餘人是日申時狂風暴起沙塵拂湧帝曰此乃殺人未足耳遂下令盡殺所獲囚俘風亦止焉翼日贄賀懷等以示于兖帝素知瓌名乃釋之惟斬何懷寳于兖城之下乃班師十二月葛從周領兵復伐兖既至與朱瑾戰于壘下殺千餘衆擒其將孫漢筠巳下二十人遂旋師三年正月河東李克用既破邠州欲謀爭霸乃遣蕃將張汚落以萬騎寨於河北之莘縣聲言欲救兖鄆魏博節度使羅𢎞信患之使來求援二月帝領親軍屯於單父會寒食帝乃親拜文穆皇帝陵於碭山縣午溝里四月辛酉河東泛漲將壞滑城帝令决隄岸以分其勢為二河夾滑城而東為害滋甚是月帝遣許州刺史朱友恭領兵萬人渡淮以便宜從事時黄鄂二州累遣使求援故有是行五月命葛從周統軍屯於洹水以備蕃軍六月李克用帥蕃漢諸軍營于斥丘遣其男落落將鐵林小兒三千騎薄于洹水從周與戰大敗之生擒落落以獻克用悲駭請修舊好以贖其子帝不許遂縶落落送于羅𢎞信斬之越七日我軍還屯陽留以伐鄆八月復壁於洹水是時昭宗幸華州遣使就加帝檢校太師守中書令四年正月帝以洹水之師大舉伐鄆辛卯營於齊水之次龎師古令諸將撤木為橋乙未夜師古以中軍先濟聲振于鄆朱瑄聞之棄壁夜走葛從周逐之至中都北擒瑄並其妻男以獻尋斬汴橋下鄆州平乙亥帝入於鄆以朱友裕為鄆州兵馬留後時帝聞朱瑾與史儼兒在豐沛間搜索糧饋惟留康懷英以守兖州帝因乘勝遣葛從周以大軍襲兖懷英聞鄆失守俄又我軍大至乃出降朱瑾史儼兒遂奔淮南兖海沂密等州平乃以葛從周為兖州留後五月丁丑朱友恭遣使上言大破淮㓂于武昌收復黄鄂二州八月陜州節度使王珙遣使來乞師是時珙弟珂實為蒲帥迭相憤怒日尋干伐而珙兵寡故來求援帝遣張存敬楊師厚等領兵赴陜既而與蒲人戰于猗氏大敗之九月帝以兖鄆既平將士雄勇遂大舉南征命龎師古以徐宿宋滑之師直趨清口葛從周以兖鄆曹濮之衆徑赴安豐淮人遣朱瑾領兵以拒師古因決水以浸軍遂為淮人所敗師古殁焉葛從周行及濠梁聞師古之敗亦命班師}
