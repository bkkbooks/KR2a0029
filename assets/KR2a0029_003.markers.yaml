  - {type: variant, offset: 3592, length: 402, content: 瑞冊府元龜卷一百九十七案五代春秋五月李思安及晉人戰于潞城思安師敗績冊府元龜引薛史八月始命李思安代帥而五代春秋于五月已書李思安敗績疑有舛誤今仍錄五代春秋于六月以前以備參考影庫本粘籤六月幸乾元院宴召宰臣學士及諸道入貢陪臣永樂大典卷一萬六千七百四十六己亥帝御崇元殿內出追尊四廟上諡號玉冊寶共八副宰臣文武百官儀仗鼓吹導引至太廟行事癸卯司天監奏日辰內有戊字請改為武從之冊府元龜卷一百八十九案容齋續筆以為戊類成字故司天諂之殊不知戊字乃避梁祖曾祖茂琳諱非以其類成字也雲谷雜記嘗辨正之今崇福侯廟碑立於開平二年正作武辰可見當時避諱之體癸亥詔以前朝官僚譴逐南荒積年未經昭雪其間有懷抱材器為時所嫉者深負寃抑仍令錄其名姓盡復官資兼告諭諸道令津致赴闕如已亡沒並許歸葬以明恩蕩冊府元龜卷一百九十一以西都徽安門北路逼近大內宮垣兼非民便令移自榆林直趣端門之南冊府元龜卷一百九十六改耀州報恩禪院為興國寺冊府元龜卷一百九十四馬殷奏破淮寇靜海, WYG: 宣義}
