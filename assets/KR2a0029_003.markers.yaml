  - {type: variant, offset: 3483, length: 3, content: 進開平, WYG: 襲李罕之于河陽克之罕之單騎出奔因乞師于太原李克用為發萬騎以援之罕之遂收其衆偕晉軍合勢急攻河陽全義危急遣使求救于汴帝遣丁會牛存節葛從周領兵赴之大戰於溫縣晉人與罕之俱敗於是河橋解圍全義歸於河陽因以丁會為河陽畱後五月巳亥昭宗制以帝檢校侍中增食邑三千户戊辰詔改帝鄉錦衣里曰沛王里是月帝以兼有溫孟之地無西顧之患將大整師徒畢力誅蔡會蔡人趙徳諲舉漢南之地以歸於朝廷且遣使送款於帝仍誓戮力同討宗權帝表其事朝廷因以徳諲為蔡州四靣副都統又以河陽保義義昌三節度帝行軍司馬兼糧科應接至是帝領諸侯之師會徳諲以伐蔡賊於汝水之上遂薄其城五日之内樹二十八寨以環之葢象列宿之數也時帝親臨矢石一日飛矢中其左掖血漬單衣顧謂左右曰勿洩九月以糧運不繼遂班師是時帝知宗權殘孽不足為患遂移兵以伐之十月先遣朱珍領兵與時溥戰於呉康鎮徐人大敗連收豐蕭二邑溥擕㪚騎馳入彭門帝命分兵以攻宿州刺史張友携符印以降既而徐人閉壁堅守遂命龎師古屯兵守之而還是月蔡賊孫儒攻陷揚州自稱淮南節度使龍紀}
