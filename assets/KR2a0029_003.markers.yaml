  - {type: variant, offset: 3492, length: 5, content: 錢十萬貫紬, WYG: 級溥復入於彭門二月蔡將申叢遣使來告縳秦宗權於帳下折其足而囚之矣帝即日承制以叢為淮西留後未幾叢復為都將郭璠所殺是月璠執宗權來獻帝遣行軍司馬李璠牙校朱克讓檻進於長安既至昭宗御延喜樓受俘即斬宗權於獨栁樹下蔡州平昭宗詔加帝食實封一百户賜莊宅各一區三月又加帝檢校太尉兼中書令進封東平王賞平蔡之功也大順元年四月丙辰宿州小將張筠逐刺史張紹光擁衆以附時漙帝率親軍討之殺千餘人筠遂堅守乙卯時溥出兵暴碭山縣帝遣朱友裕以兵襲之敗徐軍三千餘衆獲沙陁援軍石君和等三千人斬於宿州城下}
