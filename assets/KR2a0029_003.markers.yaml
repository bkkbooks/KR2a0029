  - {type: variant, offset: 4167, length: 1703, content: 萬七千二百九十六八月以潞州軍前屯師旅壁壘未收乃別議戎帥於是以亳州刺史李思安充潞州行營都統冊府元龜卷一百九十九勅朝廷之儀封冊為重用報勳烈以隆恩榮固合親臨式光典禮舊章久缺自我復行今後每封冊大臣宜令有司備臨軒之禮永樂大典卷一萬六千七百五十一案五代會要八月敕云諸道所有軍事申奏令直至右銀臺門委客省使晝時引進尋常公事依前四方館收接舊五代史考異甲子平明前老人星見於南極壬申密州進嘉禾又有合歡榆樹並圖形以獻是月隰州奏大寧縣至固鎮上下二百里案前後多作李固鎮疑原本有脫字考通鑑亦間作固鎮蓋當時奏牘省文也今仍之舊五代史考異今月八日黃河清至十月如故冊府元龜卷二百二九月辛丑西京大內放出兩宮內人及前朝宮人任其所適冊府元龜卷一百九十五勅以近年文武官諸道奉使皆於所在分外停住踰年涉歲未聞歸闕非唯勞費州郡抑且侮慢國經臣節既虧憲章安在自今後兩浙福建廣州安南邕容等道使到發許住一月湖南洪鄂黔桂許住二十日荊襄同雍鎮定青滄許住十日其餘側近不過三五日凡往來道路據遠近里數日行兩驛如遇疾患及江河阻隔委所在長吏具事由奏聞如或有違當行朝典命御史點檢糾察以儆慢官冊府元龜卷一百九十一魏博羅紹威二男廷望廷矩年在幼稚皆有材器帝以其藩屏勳臣之冑宜受非次之用皆擢為郎恩命即行之後二子亦就班列紹威乃上章以齒幼未任公事乞免主印宿直從之冊府元龜卷二百一十浙西奏道門威儀鄭章道士夏隱言焚修精志妙達希夷推諸輩流實有道業鄭章宜賜號貞一大師仍名玄章隱言賜紫衣冊府元龜卷一百九十四案五代會要九月置左右天興左右廣勝軍仍以親王為軍使舊五代史考異十月帝以用軍未暇西幸文武百官等久居東京漸及疑訝令就便各許歸安只留韓建薛貽矩翰林學士張策韋郊杜曉中書舍人封舜卿張袞幷左右御史司天監宗正寺兼要當諸司節級外其宰臣張文蔚已下文武百官並先於西京祗候冊府元龜卷二百五庚午大明節內外臣僚各以奇貨良馬上壽故事內殿開宴召釋道二教對御談論宣旨罷之命閤門使以香合賜宰臣佛寺行香永樂大典卷一萬六千四百八十七駕幸繁臺講武永樂大典卷一萬六千八百三癸酉御史司憲薛廷珪奏請文武百官仍舊朝參先是帝欲親征河東命朝臣先赴雒都至是緩其期乃允所奏宰臣請每月初入閣望日延英聽政永為常式冊府元龜卷一百九十七山南東道節度使楊師厚進納趙匡凝東第書籍先是收復襄漢帝閱其圖書至是命師厚進焉冊府元龜卷一百九十四廣州進獻助軍錢二十萬又進龍腦腰帶珍珠枕玳瑁香藥等冊府元龜卷一百九十七十一月壬寅帝以征討未罷調補為先遂命盡赦逃亡背役髠黥之人各許歸鄉里冊府元龜卷一百九十五廣州進龍形通犀腰帶金托𩹉含稜玳瑁器百餘副香藥珍巧甚多冊府元龜卷一百九十七廣南管內獲白鹿並圖形來獻耳有兩缺按符瑞圖鹿壽千歲變白耳一缺今驗此鹿耳有二缺其獸與色皆應金行實表嘉瑞冊府元龜卷二百二十二月辛亥詔曰潞寇未平王師在野攻戰之勢難緩於寇圍飛輓之勤實勞於人力永言輟耒深用軫懷宜令長吏丁寧布告期以兵罷之日給復賦租於是人戶聞之皆忘其倦冊府元龜卷一百九十五詔故荊南節度使守中書令上谷王周汭贈太師故武昌軍節度使兼中書令西平王杜洪贈太傅先是鄂渚再為淮夷所侵攻圍甚急杜洪以兵食將盡繼來乞師帝料其隔越大江難以赴援兼以荊州據上游多戰艦去江夏甚邇因命周汭舉舟師沿流以救之薛史本紀仍當時詔誥之文稱成汭為周汭列傳仍作成汭謹附識于此影庫本粘籤汭於是引兵東下纔及鄂界遇朗州背盟作亂乘江陵之虛縱兵襲破之俘掠且盡既而汭士卒知之皆顧其家咸無鬬志遂為淮寇所敗將卒潰散汭盆恚自投於江汭之本姓犯文穆皇帝廟諱至是因追贈以其系出周文故賜姓周氏案薛史本傳仍作成汭舊五代史考異及汭兵敗之後武昌以重圍經年糧盡力困救援不至訖為淮寇所陷載洪以送淮師淮師原本作淮賜今據文改正影庫本粘籤遂殺之此二鎮也皆以忠貞歿於王事帝每言諸藩屏翰經綸之業必首痛汭洪之薨至是追贈之深加軫悼各以其子孫宗屬錄用焉冊府元龜卷二百一十棣州蒲臺縣百姓王知嚴妹以亂離併失怙恃因舉哀追感自截兩指以祭父母帝以遺體之重不合毀傷言念村閭何知禮教自今後所在郡縣如有截指割股不用奏聞是年諸道多奏軍人百姓割股青齊河朔尤多帝曰此若因心亦足為孝但苟免徭役自殘肌膚欲以庇身何能療疾並宜止絕冊府元龜卷一百九十一案五代會要十二月于輝州碭山縣崇德軍太祖榆社在碭山置使以領之始命朱彥讓為軍使舊五代史考異, WYG: ''}
