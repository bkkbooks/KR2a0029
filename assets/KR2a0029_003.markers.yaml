  - {type: variant, offset: 20, length: 2016, content: 丁亥帝迴自長蘆次于魏州節度使羅紹威以帝迴軍羅紹威原本作昭威今據歐陽史改正影庫本粘籤慮有不測之患由是供億甚至因密以天人之望切陳之帝雖拒而不納然心德之冊府元龜卷一百八十七壬寅帝至自長蘆是日有慶雲覆於府署之上冊府元龜卷二百三甲辰天子遣御史大夫薛貽矩來傳禪代之意永樂大典卷五千一百四十九貽矩謁帝陳北面之禮帝揖之升階貽矩曰殿下功德及人三靈所卜已定皇帝方議裁詔行舜禹之事臣安敢違既而拜伏於砌下帝側躬以避之冊府元龜卷一百八十七二月戊申帝之家廟棟間有五色芝生焉狀若芙蓉紫煙蒙護數日不散又是月家廟第一室神主上有五色衣自然而生識者知梁運之興矣永樂大典卷一萬七千一百六十七唐乾符中木星入南斗數夕不退諸道都統晉國公王鐸觀之問諸知星者吉凶安在咸曰金火土犯斗即為災唯木當為福耳或亦然之時有術士邊岡者洞曉天文博通陰陽曆數之妙窮天下之奇祕有先見之明雖京房管輅不能過也鐸召而質之岡曰惟木為福神當以帝王占之然則非福於今必當有驗於後未敢言之請他日證其所驗一日又密召岡因堅請語其詳至於三四岡辭不獲鐸乃屏去左右岡曰木星入斗帝王之兆也木在斗中朱字也以此觀之將來當有朱氏為君者也天戒之矣且木之數三其禎也應在三紀之內乎鐸聞之不復有言冊府元龜卷二百三天后朝有讖辭云首尾三鱗六十年兩角犢子自狂顛龍蛇相鬬血成川當時好事者解云兩角犢子牛也必有牛姓干唐祚故周子諒彈牛仙客李德裕謗牛僧孺皆以應圖讖為辭然朱字牛下安八牛下安八原本作牛不安八今據文改正影庫本粘籤八即角之象也故朱滔朱泚構喪亂之禍冀無妄之福豈知應之帝也永樂大典卷一萬九千三百九十六四月唐帝御札勅宰臣張文蔚等備法駕奉迎梁朝通鑑考異引薛史宋州刺史王臯進赤烏一雙又宰臣張文蔚正押傳國寶玉冊金寶及文武羣官諸司儀仗法物及金吾左右二軍離鄭州丙辰達上源驛是日慶雲見冊府元龜卷二百三令曰王者創業興邦立名傳世必難知而示訓從易避以便人案原本有闕文或稽其符命應彼開基之義垂諸象德之言爰考簡書求於往代周王昌發之號漢帝詢衎之文或從一德以徽稱或為二名而更易先王令典布在縑緗寡人本名兼于二字且異帝王之號仍兼避易之難郡職縣官多須改換況宗廟不遷之業憲章百世之規事叶典儀豈憚革易寡人今改名晃是以天意雅符於明德日光顯契於瑞文昭融萬邦理斯在是庶順玄穹之意永臻康濟之期宜令有司分告天地宗廟其舊名中外章疏不得更有迴避冊府元龜卷一百八十二時將受禪下教以本名二字異帝王之稱故改名通鑑注引薛史己未賜文武百官一百六十人本色衣一副冊府元龜卷一百九十七戊辰即位制曰王者受命於天光宅四海祗事上帝寵綏下民革故鼎新諒曆數而先定創業垂統知圖籙以無差神器所歸祥符合應是以三正互用五運相生前朝道消中原政散瞻烏莫定失鹿難追朕經緯風雷沐浴霜露四征七伐垂三十年糾合齊盟翼戴唐室隨山刊木罔憚胼胝投袂揮戈不遑寢處洎玄穹之所贊知唐運之不興莫諧輔漢之謀徒罄事殷之禮事殷原本作事般今據文改正影庫本粘籤唐主知英華已竭算祀有終釋龜鼎以如遺推劍紱而相授朕懼德弗嗣執謙允恭避駿命於南河眷清風於潁水而乃列嶽羣后盈廷庶官東西南北之人斑白緇黃之衆謂朕功蓋上下澤被幽深宜應天以順時俾化家而為國拒彼億兆至於再三且曰七政已齊萬幾難曠萬幾原本作萬機今據文改正影庫本粘籤勉遵令典爰正鴻名告天地神祇建宗廟社稷顧惟涼德曷副樂推慄若履冰懍如馭朽金行啟祚玉曆建元方弘經始之規宜布惟新之令可改唐天祐四年為開平元年國號大梁書載虞賓斯為令範詩稱周客蓋有明文是用先封以禮後嗣宜以曹州濟陰之邑奉唐主封為濟陰王凡曰軌儀並遵故實姬庭多士比是殷臣楚國羣材終為晉用歷觀前載自有通規但遵故事之文勿替在公之効應是唐朝中外文武舊臣見任前資官爵一切仍舊凡百有位無易厥章陳力濟時盡瘁事我古者興王之地受命之邦集大勳有異庶方霑慶澤所宜加等故豐沛著啟祚之美穰鄧有建都之榮用壯鴻基且旌故里爰遵令典先示殊恩宜升汴州為開封府建名東都其東都改為西都仍廢京兆府為雍州佑國軍節度使案五代會要四月改京兆府為大安府長安縣為大安縣萬年縣為大年縣仍置佑國軍節度使額始命韓建為佑國軍節度使舊五代史考異是日大酺賞賜有差永樂大典卷五千一百四十九案通鑑甲辰唐昭宣帝降御札禪位於梁以攝中書令張文蔚為冊禮使禮部尚書蘇循副之攝侍中楊涉為押傳國寶使翰林院學士張策副之御史大夫薛貽矩為押金寶使尚書左丞趙光逢副之帥百官備法駕詣大梁甲子張文蔚楊涉乘輅自上源驛至從冊寶諸司各備儀衞鹵簿前導百官從其後至金祥殿前陳之王被衮冕即皇帝位張文蔚蘇循奉冊升殿進讀楊涉張策薛貽矩趙光逢以次奉寶升殿讀已降帥百官舞蹈稱賀帝遂與文蔚等宴於玄德殿帝舉酒曰朕輔政未久此皆諸公推戴之力文蔚等慚懼俯伏不能對獨蘇循薛貽矩及刑部尚書張褘盛稱帝功德宜應天順人案朱梁篡位之事薛史應為詳載今全篇不可得見謹附錄通鑑於此宋州刺史王臯進兩歧麥陳州袁象先進白兔一付史館編錄兼示百官冊府元龜卷二百二詔在京百司及諸軍州縣印一例鑄換其篆文則各如舊冊府元龜卷一百九十一辛未武安軍節度使馬殷進封楚王冊府元龜卷一百九十六以太府卿敬翔知崇政院翔與帷幄之謀故首擢焉永樂大典卷一萬二千一百十三, WYG: ''}
