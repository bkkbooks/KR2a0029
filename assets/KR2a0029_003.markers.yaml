  - {type: variant, offset: 3441, length: 0, content: '', WYG: 俾募兵於東道且慮蔡人暴其麥苖期以夏首囘歸珍既至淄棣旬日之内應募者萬餘人又潛襲青州獲馬千匹鎧甲稱是乃鼓行而歸四月辛亥逹於夷門帝喜曰吾事濟矣是時賊將張晊屯於北郊秦賢屯於版橋各有衆數萬樹栅相連二十餘里其勢甚盛帝謂諸將曰此賊方今息師蓄銳以俟時必來攻我况宗權度我兵少又未知珍來謂吾畏懼止於堅守而已今出不意不如先擊之乃親引兵攻秦賢寨將士踊躍争先賊果不備連㧞四寨斬首萬餘級時賊衆以為神助庚午賊將盧瑭領萬餘人於圃田北萬勝戍夾汴水為營跨河為梁以扼運路帝擇精鋭以襲之是日昏霧四合兵及賊壘方覺遂突入掩殺赴水死者甚衆盧瑭自投於河河南諸賊連敗不敢復駐皆併在張晊寨自是蔡㓂皆懷震讋往往軍中自相驚亂帝旋師休息大行犒賞繇是軍士各懷憤激每遇敵無不奮勇五月丙子出酸棗門自卯至未短兵相接賊衆大敗追斬二十餘里僵仆就枕宗權恥敗益縱其虐乃自鄭州親領突將數人逕入張晊寨其日晚大星隕於賊壘有聲如雷辛巳兖鄆滑軍士皆來赴援乃陳兵于汴水之上旌旗器甲甚盛蔡人望之不敢出寨翼日分布諸軍齊攻賊寨自寅至申斬首二萬餘級會夜收軍獲牛馬輜重生口器甲不可勝計是夜宗權晊遁去遲明追之至陽武橋而還宗權至鄭州乃盡焚其廬舍屠其郡人而去始蔡人分兵㓂陜雒孟懷許汝皆先據之因是敗也賊衆恐懼咸棄之而遁帝乃慎選將佐俾完葺壁壘為戰守之備於是遠近流亡復歸者衆矣是時揚州節度使髙駢為裨將畢師鐸所害復有孫儒楊行密互相攻伐朝廷不能制乃就加帝檢校太尉兼領淮南節度使九月亳州禆將謝殷逐刺史宋兖自據其郡帝親領軍屯於太清宫遣霍存討平之帝之禦蔡㓂也鄆州朱瑄兖州朱瑾皆領兵來援及宗權既敗帝以瑄瑾宗人也又有力於己皆厚禮以歸之瑄瑾以帝軍士勇悍私心愛之乃密於曹濮界上懸金帛以誘之帝軍利其貨而赴者甚衆帝乃移檄以讓之朱瑄來使不遜乃命朱珍侵曹伐濮以懲其姦未幾珍伐曹州執刺史丘禮以獻遂移兵圍濮兖鄲之釁自茲而始矣通鑑攷異引髙若拙後史補云梁太祖皇帝到梁深有大志然兵力不足常欲外掠又虞四境之難每有鬱然之狀時有薦敬秀才於門下乃白梁祖曰明公方欲圖大事輜重必為四境所侵但令麾下將士詐為叛者而逃即明公奏於主上及告四鄰以自襲叛徒為名梁祖曰天降奇人以佐於吾初從其議一出而致衆十倍十月僖宗命水部郎中}
