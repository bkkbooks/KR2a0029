  - {type: variant, offset: 4113, length: 53, content: 考異己亥案長曆七月不得有己亥今考通鑑亦作七月己亥當是引薛史原文今仍之舊五代史考異追尊皇妣為皇太后永樂大典卷, WYG: 巻}
