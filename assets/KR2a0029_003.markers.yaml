  - {type: variant, offset: 2559, length: 6, content: 案五代會要四, WYG: 一日夜生於碭山縣午溝里是夕所居廬舍之上有赤氣上騰里人望之皆驚奔而來曰朱家火發矣及至則廬舍儼然既入隣人以誕孩告衆咸異之昆仲三人俱未冠而孤母擕養寄於蕭縣人劉崇之家帝既壯不事生業以雄勇自負里人多厭之崇以其慵惰每加譴杖惟崇母自幼憐之親為櫛髪嘗誡家人曰朱三非常人也汝輩當善待之家人問其故答曰我嘗見其熟寐之次化為一赤蛇然衆亦未之信也唐僖宗乾符中闗東薦饑羣賊嘯聚黄巢因之起於曹濮饑民願附者凡數萬帝乃辭崇家與仲兄存俱入巢軍以力戰屢㨗得補為隊長唐黄明元年十二}
