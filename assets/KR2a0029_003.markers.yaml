  - {type: variant, offset: 3345, length: 0, content: '', WYG: 人九月巳未僖宗就加帝檢校司徒同平章事封沛郡侯食邑千户光啟元年春蔡賊掠亳潁二郡帝帥師以救之遂東至於焦夷敗賊衆數千生擒賊將殷鐵林梟首以狥軍而還三月僖宗自蜀還長安改元光啟四月戊辰就加帝檢校太保增食邑千五百户十二月河中太原之師逼長安觀軍容使田令孜奉僖宗出幸鳯翔二年春蔡賊益熾時唐室微弱諸道州兵不為王室所用故宗權得以縱毒連陷汝洛懷孟唐鄧許鄭圜幅數千里殆絶人烟惟宋亳滑潁僅能閉壘而已帝累出兵與之交戰然或勝或負人甚危之三月庚辰僖宗降制就封帝為沛郡王是月僖宗移幸興元五月嗣襄王熅僭即帝位於長安改元為建貞遣使賫偽詔至汴帝命焚之於庭未幾襄王果敗}
