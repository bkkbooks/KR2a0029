  - {type: variant, offset: 193, length: 157, content: 文以節度判官趙瑩為翰林學士承旨守尚書戶部侍郎知河東軍府事以節度掌書記桑維翰為翰林學士守尚書禮部侍郎知樞密院事以觀察判官薛融為吏部郎中兼侍御史知雜事太原縣令羅周岳為左諫議大夫節度推官竇貞固為翰林學士軍城都巡檢使劉知遠為侍衞馬軍都指揮使客將景延廣為步軍都指揮使太原少尹李為尚書工部侍郎李原本作李今從通鑑改正影庫本粘籤閏, WYG: 四靣三}
