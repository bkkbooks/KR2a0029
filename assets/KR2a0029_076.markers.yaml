  - {type: variant, offset: 1641, length: 301, content: 賀仗衞如式乙卯日有蝕之案五代春秋作正月乙卯朔日食據通鑑考異引十國紀年蜀人亦以乙卯為朔蓋晉人避正朝日食故改甲寅朔耳是夜有赤白氣相間如耕墾竹林之狀自亥至丑生北濁過中天明滅不定徧二十八宿徹曙方散丁巳故皇弟敬德敬殷並贈太傅皇子重裔重進重英並贈太保右神武統軍康思立卒輟視朝贈太子少師是日詔曰唐莊宗陵名與國諱同宜改為伊陵應京畿及諸州縣舊有唐朝諸帝陵幷真源等縣並不為次赤却以畿甸緊望為定其逐處縣令不得以陵臺結銜考滿日依出選門官例指揮隔任後準格例施行其宋州亳州節度使刺史落太清宮使副名額太清原本作大靖今從五代會要改正影庫本粘籤庚申以前吏部郎中兼侍御史知雜事王松為左諫議大夫水部郎中王易簡本官知制誥定州奏契丹改幽州為南京, WYG: 參}
