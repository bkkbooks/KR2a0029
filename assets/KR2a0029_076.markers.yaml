  - {type: variant, offset: 1966, length: 7447, content: 異中書奏請立宗廟從之以翰林學士工部侍郎和凝為禮部侍郎依前充職詔內外文武臣僚並與加恩皇基初造示普恩也太子少保致仕華溫琪卒贈太子太保是日詔應朝臣中有藉才特除外任者秩滿無遺闕將來擬官之時在外一任同在朝一任升進其就便自求外職及不是特達選任者不在此限安州上言節度使盧文進殺行軍副使率部下親兵過淮案盧文進棄鎮奔吳通鑑作元年十二月五代春秋歐陽史作二年正月與薛史同舊五代史考異以前天平軍節度使檢校太尉兼侍中王建立為平盧軍節度使以守司空門下侍郎平章事弘文館大學士馮道兼諸道鹽鐵轉運等使天雄軍節度使兼中書令范延光改封秦國公加食邑實封鳳翔節度使兼中書令西平王李從曮加食邑實封乙丑以端明殿學士禮部侍郎呂琦為檢校工部尚書祕書監丙寅改中興殿為天福殿門名從之湖南節度使楚王馬希範加食邑實封改賜功臣名號前昭義節度使檢校太傅同平章事高行周起復右金吾衞大將軍依前昭義軍節度使泰寧軍節度使李從溫荊南節度使南平王高從誨歸德軍節度使趙在禮並加食邑實封改功臣名號以端明殿學士戶部侍郎李崧為兵部侍郎判戶部以左諫議大夫王松判度支魏府范延光奏當管夏津鎮捕賊兵士誤殺却新齊州防禦使祕瓊初延光將萌異志使人潛結於瓊諾之及是以瓊背其謀密使精騎殺之由是延光反狀明矣以工部侍郎李玘檢校右僕射為汾州刺史以前彰國軍節度使尹暉為左千牛衞上將軍是日詔曰西天中印土摩竭陀舍衞國大菩提寺三藏阿闍梨沙門室利縛羅宜賜號弘梵大師庚午涇州節度使李德珫徐州節度使安彥威秦州節度使康福延州節度使劉景巖襄州節度使安從進夏州節度使李彝殷並加食邑實封壬申正衙備禮冊贈故皇弟皇子等丙子故契丹人皇王歸葬人皇王原本作天皇王考契丹國志東丹王稱人皇王今改正影庫本粘籤輟視朝一日改汴州雍丘縣為杞縣避廟諱也戊寅以兵部侍郎判戶部李崧為中書侍郎同中書門下平章事充樞密使以權知樞密使事中書侍郎同中書門下平章事集賢殿學士桑維翰為樞密使是日詔曰應天開國恭己臨人宜覃繼絕之恩以廣延洪之道宜於唐朝宗屬中取一人封公世襲案五代會要載原敕云其唐朝宗屬中舊在朝及諸道為官者各據資歷考限滿日從品秩序遷已有出身任令參選舊五代史考異兼隋之酅公為二王後以後周介公備三恪主其祭祀及赴大朝會以前鎮國軍節度使皇甫立為神武統軍以前宗正卿李郁為太子賓客庚辰以吏部侍郎龍敏判戶部二月丙戌以尚食使安友規充葬明宗皇后監護使以河陽節度使安審暉為鄜州節度使癸巳詔停北京西北面計度司事吳越國王錢元瓘加食邑實封改賜功臣名號己亥詔應諸道行軍副使等得替後且就私家取便安止限一年後方得赴闕當便與比擬壬寅詔應諸道馬步都虞候自今後朝廷更不差補委自藩方於本州衙前大將中慎選久歷事任曉會刑獄者充以三年為限仍不得於元隨職員內差補以左散騎常侍孔昭序為太子賓客尚書左僕射劉昫右僕射盧質並加食邑實封甲辰以滄州留後馬全節為橫海軍節度使以太子賓客韓惲為貝州刺史左羽林統軍羅周敬為右金吾衞上將軍丙午以皇子左驍衞上將軍重信為檢校太保河陽三城節度使以權知河陽軍州事周瓌為安州節度使詔中外臣僚或因差使出入並不得薦屬人於藩鎮希求事任如有犯者並準唐長興二年勅條處分戊申中書舍人陳改左散騎常侍應在朝文武百僚及見任刺史先代未封贈者與加封贈母妻未封者並與封辛亥天和節天和原本作天河今從五代會要改正影庫本粘籤帝御長春殿召左右街僧錄威儀殿內譚經循舊式也三月甲寅制北京留守太原尹皇子重貴封食邑三百戶刑部侍郎張鵬改兵部侍郎己未御史臺奏唐朝定令式南衙常參文武百僚每日朝退於廊下賜食謂之常食自唐末亂離常食漸廢仍於入閤起居日賜食每入閤禮畢閤門宣放仗羣官俱拜謂之謝食至偽主清泰年中入閤禮畢更差中使至正衙門口宣賜食百官立班重謝此則交失唐朝賜食之意於禮實為太煩臣恐因循漸失根本起今後入閤賜食望不差中使口宣準唐明宗朝事例處分從之案五代會要載其年四月御史臺奏文武百官每月朔望入閤禮畢賜廊下食在京時祇於朝堂幕次兩廊下今在行朝于正衙門外權為幕次房廊隘狹伏恐五月一日朝會禮畢准例賜食于幕次難為排比伏見唐明宗時兩省官于文明殿前廊下賜食今未審入閤日權于正衙門內兩廊下排比賜食為復別有處分敕宜依唐明宗時舊規廊下賜食舊五代史考異中書奏準勅故庶人三月七日以王禮葬其妻男等並以禮葬請輟其日朝參一日從之以宣徽南院使楊彥詢為左監門衞上將軍依前充宣徽使兗州李從溫奏節度副使王謙搆軍士作亂尋已處置丙寅詔王者省方設教靡憚於勤勞養士撫民必從其宜便顧惟涼德肇啟丕圖常務去於煩苛冀漸臻於富庶念京城俶擾之後屬舟船焚爇之餘饋運頓虧支費殊闕將別謀於飛輓慮轉困於生靈以此疚心未嘗安席今以夷門重地梁苑雄藩梁苑原本作梁莊今從冊府元龜改正影庫本粘籤水陸交通舟車必集爰資經度須議按巡寧免暫勞所期克濟取今月二十六日巡幸汴州云案通鑑范延光聚卒繕兵悉召巡內刺史集魏州將作亂會帝謀徙都大梁桑維翰曰大梁北控燕趙南通江淮水陸都會資用富饒今延光反形已露大梁距魏不過十驛彼若有變大軍尋至所謂疾雷不及掩耳也丙寅下詔託以洛陽漕運有闕東巡汴州舊五代史考異以前貝州刺史史圭為刑部侍郎充諸道鹽鐵轉運副使前澤州刺史閻至為戶部侍郎詔車駕經過州府管界所有名山大川帝王陵廟名臣祠墓去路十里者宜令本州排比祗候駕經過日以酒脯祭告左僕射劉昫等議立宗廟以立高祖已下四親廟其始祖一廟伏候聖裁御史中丞張昭遠議請依隋唐之制立四廟推四世之中名位高者為太祖詔下百官定議百官請依唐制追尊四廟為定從之甲戌以右龍武統軍楊思權為左衞上將軍乙亥前鄜州節度使張萬進加檢校太傅前宋州節度使李從敏加檢校太尉以吏部郎中兼侍御史知雜事薛融為左諫議大夫以兵部郎中段希堯為右諫議大夫戊寅以戶部尚書王權為兵部尚書工部尚書崔居儉為戶部尚書兵部尚書李鏻為太子少保李鏻原本作李鄰今從歐陽史改正影庫本粘籤兵部尚書致仕裴為工部尚書東上閤門使李守貞為右龍武將軍充職庚辰車駕離京四月癸未朔至鄭州防禦使白景友進牲餼器皿帝曰不出民力否景友曰臣畏陛下法皆辦於己俸命收之甲申駕入汴州丁亥制應天福二年四月五日昧爽已前諸道州府見禁囚徒大辟已下罪無輕重並釋放天福元年已前諸道州府應係殘欠租稅並特除免諸道係徵諸色人欠負省司錢物宜令自偽清泰元年終已前所欠者據所通納到物業外並與除放昨者行至鄭州滎陽縣界路旁見有蟲食及旱損桑麥處桑麥原本作乘麥今據五代會要改正影庫本粘籤委所司差人檢覆量與蠲免租稅河陽管內酒戶百姓應欠天福元年閏十一月二十五日已前不敷年額麴錢並放其諸處應經兵火者亦與指揮當罪即誅式明常典既往可憫宜示深仁偽清泰中臣僚內有從誅戮者並許收葬天下百姓有年八十已上者與免一子差徭仍逐處簡署上佐官梁故滑州節度使王彥章効命當時致身所事稟千年之生氣流百代之令名宜令超贈太師子孫量才錄應諸道州府管界有自偽命抽點鄉兵之時多是結集劫盜因此畏懼刑章藏隱山谷宜令逐處曉諭招攜各令復業自今年四月五日已前為非者一切不問如兩月不歸業者復罪如初丁酉宣武軍節度使侍衞親軍使楊光遠加兼侍中己亥陝州節度使侍衞都虞候劉知遠加檢校太保庚子北京鄴都徐兗二州並奏旱詔今後立妃及拜免三公宰相及命將封親王公主宜令並降制命餘從令式處分夏五月壬子朔帝御崇元殿受朝賀仗衞如式詔洛京魏府管內所徵今年夏苗稅麥等宜放五分之一以微旱故也丙辰御史中丞張昭遠奏汴州在梁室朱氏稱制之年有京都之號及唐莊宗平定河南復廢為宣武軍至明宗行幸之時掌事者因緣修葺衙城遂挂梁室時宮殿門牌額當時識者或竊非之一昨車駕省方暫居梁苑臣觀衙城內齋閤牌額一如明宗行幸之時無都號而有殿名恐非典據臣竊尋秦漢已來寰海之內鑾輿所至多立宮名近代隋室於揚州立江都宮太原立汾陽宮岐州立仁壽宮岐州原本作岐周今據五代會要改正影庫本粘籤唐朝於太原立晉陽宮同州立長春宮岐州立九成宮宮中殿閤皆題署牌額以類皇居請準故事於汴州衙城門權挂一宮門牌額則其餘齋閤並可取便為名勅行闕宜以大寧宮為名湖南青草廟舊封安流侯進封廣利公洞庭廟進封靈濟公案洞庭廟不載舊封疑有脫文考五代會要十國春秋並與薛史同舊五代史考異磊石廟舊封昭靈侯進封威顯公案五代會要作廣利威顯公舊五代史考異黃陵二妃廟舊封懿節廟改封昭烈廟從馬希範之請也戊午以前成德軍節度判官張彭為太府卿壬戌詔在朝文武臣僚每人各進封事一件仍須實封通進務裨闕政用副虛懷甲子以虞部郎中知制誥于嶠為中書舍人以戶部郎中于遘為虞部郎中知制誥故太子少保致仕朱漢賓贈司空乙丑六宅使王繼弘送義州衙前收管前洺州團練使高信送復州收管二人於崇禮門內喧爭為臺司所劾故也戊辰翰林學士戶部員外郎知制誥竇貞固改工部郎中知制誥翰林學士都官郎中知制誥李慎儀改中書舍人仍賜金紫並依舊充職庚午制封皇第二十一女為長安公主封皇第十一妹烏氏為壽安長公主皇第十二妹史氏為永壽長公主皇第十三妹杜氏為樂平長公主壬申天雄軍節度使守太傅兼中書令興唐尹范延光進封臨清王加食邑三千戶鳳翔節度使檢校太師兼中書令西平王李從曮進封岐王丙子平盧軍節度使兼中書令王建立進封臨淄王昭信軍節度使侍衞馬軍都指揮使景延廣改寧江軍節度使典軍如故太常卿梁文矩梁文矩原本作文舉今從歐陽史改正影庫本粘籤奏定四廟諡號廟號陵號太常少卿裴垣奏定四廟皇后追尊諡號從之戊寅以中書舍人權知貢舉王延為御史中丞以翰林學士戶部侍郎知制誥崔梲為兵部侍郎充承旨以翰林學士承旨兵部侍郎程遜為檢校禮部尚書太常卿以檢校吏部尚書太常卿梁文矩為吏部尚書以御史中丞張昭遠為戶部侍郎以吏部尚書盧文紀為太子少傅己卯詔大社內先收掌唐朝罪人首級等宜令骨肉或先舊僚屬收葬其喪葬儀注不得過制案改葬梁末帝因婁繼英之請也事未及行而繼英誅死至九月甲寅始命安崇阮改葬詳見通鑑六月壬午朔制宗正卿石光贊奏滎陽道左有萬石君石奮之廟德行懿美宜示封崇用光遠祖之徽猷益茂我朝之盛典贈奮太傅癸未契丹使夷離畢來聘致馬二百匹及人參貂鼠皮走馬木椀等物乙酉翰林學士司封員外郎知制誥王仁裕改都官郎中右贊善大夫盧損改右散騎常侍前有朝貶故也以祕書少監致仕劉頎為鴻臚卿致仕前光祿少卿尹玉羽以少府監致仕丙戌宰臣李崧上表讓樞密使於趙