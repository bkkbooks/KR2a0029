  - {type: variant, offset: 1279, length: 907, content: 使薛仁謙為衞尉卿丙子以汝州防禦使宋彥筠為同州節度使以護聖左右軍都指揮使李懷忠為侍衞親軍馬軍都指揮使領壽州忠正軍節度使以奉國左右廂都指揮使郭謹為侍衞親軍步軍都指揮使夔州寧江軍節度使戊寅詔廢長春宮使額案五代會要載原勅云同州長春宮使額宜停沿宮職務委州司制置舊五代史考異己卯改明德殿為滋德殿宮城南門同名故也以華州節度使劉遂凝為右龍武統軍以右龍武統軍張廷蘊為絳州刺史絳州原本作降州今從通鑑改正影庫本粘籤庚辰徵前右拾遺鄭雲叟為右諫議大夫玉笥山道士羅隱之賜號希夷先生甲申以翰林學士承旨兵部侍郎崔梲權判太常卿以端明殿學士戶部侍郎和凝為翰林學士承旨樞密院學士尚書倉部郎中司徒詡樞密院學士尚書工部郎中顏衎並落職守本官樞密副使張從恩改宣徽使初廢樞密院故也先是桑維翰免樞密之務以劉處讓代之奏議多不稱旨及處讓丁母憂遂以密院印付中書故密院廢焉丙戌以韓昭裔為兵部尚書致仕馬裔孫為太子賓客致仕房暠為右驍衞大將軍致仕皆唐末帝之舊臣也戊子升永岳二州為團練使額改湘川縣為全州從馬希範之奏也五月壬寅朔帝御崇元殿受朝仗衞如式癸卯以左僕射劉昫兼太子太保封譙國公乙巳昭順軍節度使姚彥章卒升靈州方渠鎮為威州隸於靈武改舊威州為清邊軍戊申湖南節度使馬希範加天策上將軍以前邠州節度使安叔千為滄州節度使庚戌虞部郎中楊昭儉可本官知制誥辛亥置靜海軍於溫州靜海原本作清海今從十國春秋改正影庫本粘籤從錢元瓘之請也壬子以侍御史盧價為戶部員外郎知制誥戶部尚書崔居儉卒甲寅詔止絕朝臣不得外州府求覓表狀奏薦交親乙卯升金州為節鎮以懷德軍為使額以齊州防禦使潘環為懷德軍節度使右諫議大夫致仕鄭雲叟賜號逍遙先生仍給致仕官俸丁巳以刑部尚書姚顗為戶部尚書以兵部侍郎權判太常卿事崔梲為尚書左丞以工部侍郎任贊為兵部侍郎以禮部尚書李懌為刑部尚書以左丞盧詹為禮部尚書以左散騎常侍韋勳為工部侍郎庚申廢華清宮為靈泉觀辛酉御史臺奏省郎知雜之時赴臺禮上軍巡邸吏之輩咸集公參赤縣府司悉呈杖印今後年深御史判雜上事欲依前例從之丙寅以鎮海軍衙內統軍上直馬步軍都監檢校太傅睦州刺史陸仁章為同平章事遙領遂州武信軍節度使以鎮海軍興武左右開道都指揮使明州刺史仰仁銓為檢校太傅仰仁銓原本作任銓今從十國春秋改正影庫本粘籤同平章事領宣州, WYG: 招討}
