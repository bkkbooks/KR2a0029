  - {type: variant, offset: 2428, length: 1925, content: 道分為三十一卷是日詔先令天下州郡公私鑄錢近多鉛錫相兼缺薄小弱有違條制今後私鑄錢下禁依舊法案歐陽史七月丙辰復禁鑄錢薛史作七月戊申舊五代史考異壬戌以太子少師梁文矩為太子太保致仕閏七月庚午朔百官不入閣雨霑服故也壬申以中書侍郎平章事集賢殿大學士桑維翰為檢校司空兼侍中相州彰德軍節度使以彰德軍節度使王庭胤為義武軍節度使尚書戶部奏李自倫義居七世準勅旌表門閭義居七世據歐陽史云李自倫高祖訓訓生粲粲生則則生忠忠生自倫自倫生光厚六世同居薛史作七世未詳孰是影庫本粘籤案歐陽史作六世又旌表門閭歐陽史作正月與薛史作閏七月異舊五代史考異先有鄧州義門王仲昭六代同居案王仲昭歐陽史作登州人舊五代史考異其旌表有廳事步欄前列屏樹烏頭正門閥閱一丈二尺二柱相去一丈柱端安瓦桷墨染號為烏頭築雙闕一丈在烏頭之南三丈七尺烏頭之南原本作之內今從歐陽史改正影庫本粘籤夾街十有五步槐柳成列今舉此為例則令式不該詔王仲昭正廳烏頭門等制不載令文又無勅命既非故事難黷大倫案五代會要作既非故實恐紊彝章孔本宜從令式祇表門閭於李自倫所之前量地之宜高其外門門外綽楔綽楔原本作掉揳今從歐陽史改正影庫本粘籤門外左右各建一臺高一丈二尺廣狹方正稱臺之形圬以白泥四隅漆赤其行列樹植隨其事力其同籍課役一準令文壬午濮州刺史武從諫勒歸私第受贓十五萬故也丁酉故皇子河南尹重乂妻虢國夫人李氏落髮為尼賜名悟因仍錫紫衣法號及夏臘二十八月己亥朔河決博平甘陵大水辛丑以守司空兼門下侍郎平章事弘文館大學士馮道為守司徒兼侍中封魯國公壬寅詔曰皇圖革故庶政惟新宜設規程以諧公共其中書印祇委上位宰臣一人知當戊申前兵部尚書王權授太子少傅致仕己酉以天下兵馬副元帥鎮海鎮東等軍節度使檢校大師行中書令吳越王錢元瓘為天下兵馬元帥壬子升亳州為防禦使額依舊隸宋州丙辰司天監馬重績等進所撰新曆馬重績原本作崇績今從五代會要改正影庫本粘籤降詔褒之詔翰林學士承旨和凝制序命之曰調元曆九月辛未以右羽林統軍周密為鄜州節度使癸酉升婺州為武勝軍額丁丑宴羣臣於永福殿契丹使粘木孤來聘案遼史會同二年正月戊申晉遣金吾衞大將軍馬從斌考功郎中劉知新來貢珍幣丙辰晉遣使謝免沿邊四州錢幣七月戊申晉遣使進犀帶閏月乙酉遣使賜晉良馬八月己丑晉遣使貢歲幣奏輸戌亥二歲金幣于燕京舊五代史考異致牛馬等物己卯遙領洮州保順軍節度使鮑君福加檢校太師兼侍中判湖州諸軍事辛巳相州節度使桑維翰上言管內所獲賊人從來籍沒財產請止之詔今後凡有賊人準格律定罪不得沒納家資天下諸州準此癸未封唐許王李從益為郇國公案五代會要九月勅周受龍圖立夏殷之祀唐膺鳳曆開酅介之封乃睠前朝載稽舊典宜封土宇俾奉宗祧宜以郇國三千戶封唐許王李從益為郇國公云舊五代史考異奉唐之祀服色旌旗一依舊制仍以西京至德宮為廟牲幣器服悉從官給丙戌高麗王王建遣使貢方物己丑以中書侍郎平章事李崧權判集賢殿事庚寅詔停寒食七夕重陽及十月暖帳內外郡官貢獻丙申以威勝軍節度副使羅周岳為給事中中書舍人李詳改禮部侍郎禮部侍郎呂琦改刑部侍郎刑部侍郎王松改戶部侍郎戶部侍郎閻至改兵部侍郎中書舍人王易簡充史館修撰判館事冬十月戊戌朔故昭信軍節度使白奉進贈太尉丙午以太常卿程遜沒于海廢朝一日贈右僕射庚戌閩王王昶威武軍節度使王繼恭遣僚佐林思鄭元弼等朝貢致書於宰執致書原本作致聿今據文改正影庫本粘籤無人臣之禮帝怒詔令不受所貢應諸州綱運並令林思鄭元弼等押歸本道既而兵部員外郎李知損上疏請禁錮使人籍沒綱運可之收林思等下獄丙辰谿州刺史彭士愁以錦奬之兵與蠻部萬人掠辰澧二境湖南節度使馬希範遣牙兵拒之而退金州山賊度從讜等寇洵陽遣兵討平之十一月甲戌以太子賓客李延範為司農卿乙亥詔立唐高祖太宗及莊宗明宗閔帝五廟於洛陽案立唐廟於西京歐陽史作十二月與薛史作十一月異舊五代史考異丁丑祠部郎中知制誥吳承範改中書舍人充翰林學士翰林學士中書舍人竇貞固改御史中丞御史中丞薛融改尚書左丞尚書右丞王延改吏部侍郎尚書左丞崔梲改太常卿戊寅史館奏請令宰臣一人撰錄時政記案五代會要史館奏唐長壽二年右丞姚璹奏帝王謨訓不可闕文其仗下所言軍國政事令宰臣一人撰錄號時政記唐明宗朝又委端明殿學士撰錄逐季送付史館伏乞遵行者宜令宰臣一人撰述舊五代史考異逐時以備撰述從之己卯吏部侍郎龍敏改尚書左丞己丑以太子賓客楊凝式為禮部尚書致仕詔建錢鑪於欒川丙申諫議大夫致仕逍遙先生鄭雲叟卒十二月丁酉朔百官不入閣大雪故也己亥故皇子重英妻張氏落髮為尼賜名悟慎幷夏臘二十庚戌禮官奏來歲正旦王公上壽皇帝舉酒奏玄同之樂再飲奏文同之樂三飲奏同前從之歌辭不錄丙辰詔今後城郭村坊不得創造僧尼院舍丁巳帝謂宰臣曰大雪害民五旬未止京城祠廟悉令祈禱了無其驗豈非涼德不儲神休未洽者乎因令出薪炭米粟給軍士貧民等壬戌禮官奏正旦上壽宮懸歌舞未全且請雜用九部雅樂歌教坊法曲從之永樂大典卷一萬五千六百四十四, WYG: 攷證}
