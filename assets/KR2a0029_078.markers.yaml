  - {type: variant, offset: 171, length: 329, content: 希宗防禦原本作防御今從通鑑改正影庫本粘籤甲寅以侍衞步軍都指揮使寧江軍節度使景延廣為義成軍節度使以義成軍節度使馮暉為朔方軍節度使乙卯左諫議大夫曹國珍上言請於內外臣僚之中選才略之士聚唐六典前後會要禮閣新儀大中統類律令格式等精詳纂集俾無漏落別為書一部目為大晉政統從之其詳議官宜差太子少師梁文矩左散騎常侍張允大理卿張澄國子祭酒唐汭大理少卿高鴻漸國子司業田敏禮部郎中呂咸休司勳員外郎劉濤刑部員外郎李知損監察御史郭延升等一十九人充文矩等咸曰改前代禮樂刑憲為大晉政統則堯典舜典當以晉典革名列狀駁之曰作者之謂聖述者之謂明苟非聖明焉能述作若運因革故則事乃維新或改正朔而變犧牲或易服色而殊徽號是以五帝殊時不相沿樂三王異世不相襲禮至於近代率由舊章比及前朝日滋條目條目原本作真目今從, WYG: 賈進攷}
