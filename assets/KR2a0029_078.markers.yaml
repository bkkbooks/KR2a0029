  - {type: variant, offset: 614, length: 508, content: 宜直筆具載鴻猷若備錄前代之編年目作聖朝之政統此則是名不正也夫名不正則言不順而媚時掠美非其實矣若翦截其辭此則是文不備也夫文不備則啟爭端而禮樂刑政於斯亂矣若改舊條而為新制則未審何門可以刊削何事可以編聯既當革故從新又須廢彼行此則未知國朝能守而不失乎臣等同共參詳未見其可疏奏嘉之其事遂寢辛酉以前晉昌軍節度使李周為靜難軍節度使是日封皇第十一妹安定郡主為延慶長公主皇第十二妹廣平郡主為清平長公主二月辛卯改東京玉華殿為永福殿中書上言太原潛龍莊望建為慶昌宮使相鄉望改為龍飛鄉都尉里望改為神光里從之丁酉宰臣馮道左散騎常侍韋勳禮部員外郎楊昭儉自契丹使迴案馮道出使之期當從五代春秋作三年九月至四年二月始得歸也帝慰勞備至錫賚豐厚庚子以天和節宴羣官於廣政殿賜物有差三月癸卯朔三月癸卯朔原本作癸亥以前後干支考之當作癸卯今改正影庫本粘籤左僕射劉昫給事中盧重自契丹使迴頒賜器幣如馮道等乙巳迴鶻可汗仁美遣使貢方物中有玉狻猊實奇貨也丙午涇州節度使張萬進卒贈太師己未皇子開封尹鄭王重貴歸德軍節度使兼侍衞親軍馬步軍都指揮使劉知遠忠武軍節度使杜重威並加同中書門下平章事天平軍節度使趙在禮封衞國公庚申遣內臣趙處玭以版詔徵華山隱者前右拾遺鄭雲叟案歐陽史作左拾遺考, WYG: 引}
