  - {type: variant, offset: 2616, length: 722, content: 陵州刺史王暉所殺孟知祥已入梓州辛酉范延光奏曰孟知祥兼有兩川彼之軍衆皆我之將士料其外假朝廷形勢以制之然陛下苟不能屈意招攜彼亦無由革面帝曰知祥予故人也以賊臣間諜故茲阻隔今因而撫之何屈意之有由是遣供奉官李瓌案通鑑作李存瓌唐人避莊宗諱故去存字舊五代史考異使西川齎詔以賜知祥詔以霖雨積旬久未晴霽京城諸司繫囚並宜釋放甲子以大雨未止放朝參兩日洛水漲泛二丈廬舍居民有溺死者以前濮州刺史武延翰為右領軍上將軍前階州刺史王宏贄為左千牛上將軍金徐安穎等州大水鎮州旱詔應水旱州郡各遣使人存問秋七月辛巳朔以天下兵馬元帥尚父吳越國王錢鏐薨廢朝三日案五代春秋七月吳越王錢鏐薨蓋祇以薛史廢朝之日為據也通鑑作三月庚戌與九國志異舊五代史考異丙戌詔賜諸軍救接錢有差案救接錢疑有舛誤考冊府元龜亦作救接今仍其舊舊五代史考異戊子正衙命使冊高麗國王王建靈武奏夏州界党項七百騎侵擾當道出師擊破之生擒五十騎追至賀蘭山下賀蘭原本作駕蘭今從歐陽史改正影庫本粘籤己丑兩浙節度使錢元瓘起復加守尚書令青州節度使王晏球加兼中書令秦鳳兗宋亳潁鄧大水漂邑屋損苗稼夔州赤甲山崩壬辰以前太僕卿鄭繢為源臚卿以前兗州行軍司馬李鏻為戶部尚書乙未福建節度使王延鈞進絹表云吳越王錢鏐薨乞封臣為吳越王湖南馬殷官是尚書令殷薨請授臣尚書令不報戊戌太子賓客李光憲以禮部尚書致仕己亥以前靈武節度使康福為涇州度使幽州衙將潘杲上言知故使劉仁恭於大安山藏錢之所樞密院差人監往發之竟無所得以皇子西京留守京兆尹從珂為鳳翔節度使廢鳳州武興軍節制為防禦使幷所管興文二州並依舊隸興元府丁未以門下侍郎兼吏部尚書同平章事監修國史趙鳳為檢校太傅同平章事充邢州節度使詔諸州府遭水人戶各支借麥種及等第賑貸八月辛亥青州節度使王晏球卒廢朝二日以利州節度使孫漢韶兼西面, WYG: ''}
