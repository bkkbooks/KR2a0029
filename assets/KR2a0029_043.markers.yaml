  - {type: variant, offset: 152, length: 0, content: '', WYG: 同平事事遣兵援送不克而還先是李周彛棄鄜州自投歸國署為元帥府行軍左司馬寵冠霸府及道昭至以為右司馬使與周彛同領冦彦卿南大豐閻寳巳下大軍伐滄州及太祖幸魏州討牙軍中軍前有魏博將山河營指揮使左行遷聞府中有變引軍還屯歴亭自稱留後從亂者數萬人道昭佐周彛與彦卿巳下大破之殺四萬餘人擒左行遷斬之有史仁遇亦聚徒數萬據髙唐又破之擒仁遇以獻乘勝取澶博二州平之復殺萬餘人道昭性勇果多率先犯陣屢有摧失而周彛彦卿掎角繼進連以告捷䕶兵者上功不實皆以道昭為首太祖隂知之俱不議賞及滄州之圍也不用騎士令道昭牧馬于唐陽太祖受禪後委兵柄與康懐英等攻潞州以蚰蜒塹繚之飛鳥不度既踰歲晉人援至王師大敗道昭為晉軍所殺徐懐玉本名琮亳州焦夷縣人少以雄傑自任隨太祖起軍唐中和末從至大梁光啟初蔡冦屯金堤驛懐玉將輕騎連破之由是累遷親從副將改左長劍都虞候又從破蔡賊于板橋收秦宗權入寨奏加檢校右散騎常侍文徳初同諸軍解河陽之圍復從破徐宿乾寧中奏加檢校刑部尚書太祖賜名懐玉破朱瑾于金鄉南擒宗江以獻表授金紫光祿大夫檢校右僕射乾寧四年龎師古失利于清口懐玉獨完軍以退光化初轉滑州右都押牙兼右步軍指揮使俄奏授沂州刺史頃之王師範以青州叛屢出兵侵軼懐玉擊退之天復四年轉齊州防禦使加檢校司空從大軍迎駕于岐下歸署華州觀察留後一年復領所部兵戍雍州尋召赴河中補晉絳同華五州馬步都指揮使天祐三年授左羽林統軍轉右龍虎統軍領六軍之士赴澤州尋為晉軍所攻晝夜衝擊穴地而入懐玉率親兵逆殺于隧中晉軍遂退開平元年授曹州刺史加檢校司徒明年除晉州刺史其秋晉軍大至已乘其墉懐玉選親兵五十餘人擁殺下城晉軍既退出家財以賞戰士歲中晉軍又至懐玉領兵敗之于洪洞三年制授鄜坊節度使特進檢校太保練兵繕壁人頗安之加檢校太傅乾化二年庶人友珪既篡立河中朱友謙拒命遣兵襲鄜州懐玉無備尋為河中所擄囚于公館及友珪遣康懐英率師圍河中友謙慮懐玉有變遂害之懐玉材氣剛勇臨陣未嘗折退平生金瘡被體有戰將之名焉郭言太原人也家于南陽新野少以力穡養親鄉里稱之唐廣明中黄巢擁衆西犯秦雍言為巢黨所執後從太祖赴汴初為騎軍繼有戰功後擢為禆校言性剛直有權畧勤于戎事或以家財分給將士之貧者由是頗得士心屢將兵與蔡冦戰于浚郊每以少擊衆出必勝歸太祖嘉其勇果謂賓佐曰言乃吾之虎侯也時宗權支黨數十萬太祖兵不過數十旅每恨其寡與之不敵一日命言董數千人越河洛趨陜虢招召丁壯以實部伍言夏往冬旋得鋭士萬餘遂遷步軍都將自是隨太祖掩襲蔡冦斬獲掠奪不可勝紀宗權以兹敗北太祖盡收其地因命言將兵導逹貢奉以安郵𫝊自汴鄭迄于潼闗去奸恤弱甚得其所光啓中唐天子以太祖兵威日振命兼揚州節度使太祖遣幕吏李璠領兵赴維揚以制置為名時言為李璠前鋒深入淮甸破盱眙而還梁祖東伐徐鄆言將偏師略地千里頻逄冦敵言出竒決戰所向皆捷大挫東人之鋭太祖錄其績以排陣斬斫之號委之尋表為宿州刺史檢校右僕射于時徐宿兵鋒日夕相接控扼偵邏以言為首景福初時溥大舉來攻宿州言勇士野戰喜逄大敵自引鋭兵擊溥殺傷甚衆徐戎乃退言為流矢所中一夕而卒李唐賓陜州陜縣人也中和四年二月尚讓之冦繁臺也唐賓與李讜霍存並為巢將與太祖之軍戰于尉氏門外三月太祖破瓦子寨唐賓與王䖍裕來降時黄巢壁于東郊乃命唐賓摩其西闉焚焉王滿之師王夏之陣唐賓悉在戰中後與朱珍趣淄州所向摧敵及取滑平蔡前後破鄆淮徐之衆功與朱珍略等而驍勇絶倫善用矛未嘗不率先陷陣其善于治軍行師之道亦與珍齊名珍之擒石璠也唐賓亦㳂淮與郭言掎角下盱眙其後渡河破黎陽李固等鎮攻澶州下内黄敗魏州未嘗不與珍同暨攻蔡之役珍自西南破其外垣唐賓亦堙壕坎墉摧其東北隅及伐徐取豐時溥軍于吳康珍亟遇之未能却唐賓引本軍擊敗之珍遂大勝每興師必與珍偕用故往無不利然而剛中用壯遂為珍所害以謀叛聞太祖聞之痛惜累日及誅朱珍後令其妻孥至軍收𦵏而加弔祭焉王䖍裕瑯琊臨沂人也家于楚丘少有膽勇多力善射以弋獵為事唐乾符中諸葛爽聚徒于青棣間攻剽郡縣䖍裕依其衆及爽歸順乃以䖍裕及其衆隸于宣武軍太祖鎮汴四郊多事始議選將征討首以䖍裕綰騎兵恒為前鋒及太祖擊巢蔡于陳州䖍裕連拔數寨擒獲萬計巢孽既遁䖍裕躡其迹追至萬勝戍賊衆饑乏短兵纔接而潰太祖以其勞表授義州刺史蔡人日縱侵掠陳鄭許亳之郊頻年大戰䖍裕掩襲攻拒凡百餘陣勦戮生擒不知紀極秦宗賢冦汴南鄙太祖令䖍裕逆擊于尉氏不利而還太祖怒命削職拘于别部踰年邢州孟遷請降未㡬晉人伐邢孟遷遣使來乞師太祖先遣䖍裕選勇士百餘人徑往赴之伺夜突入邢州明日循堞樹立旗幟晉人不測乃退數月復來圍邢時太祖大軍方討兖鄆未及救援邢人困而携貳遷乃縶䖍裕送于太原尋為所害劉康乂夀州安豐縣人也以農桑為業唐乾符中闗東羣盗並起江淮間偏罹其苦因為巢黨所掠康乂沈黙有膂力善用矛槊然不樂為暴中和三年從太祖赴鎮委以腹心康乂枕戈擐甲夷險無憚其後累典親軍襲巢破蔡斬獲尤多累以戰功遷元從都將從太祖連年攻討徐兖鄆所向多㨗尤善于營壘}
