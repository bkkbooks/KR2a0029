  - {type: variant, offset: 153, length: 2, content: 西面, WYG: 諸軍壕寨使及太祖盡下三鎮議其功奏加檢校右僕射兼領軍衛尋遷宻州刺史政甚簡静時王師範叛據青州乞師于淮夷淮人遂攻宻州宻兵素少執銳者不滿千夫而淮賊踰萬康乂率老弱守陴自别領少壯日與接戰于宻之四郊俘擒千計賊知宻州虚弱援兵未至晝夜急攻遂䧟康乂為賊所害王彦章字賢明鄆州夀張縣人也祖秀父慶宗俱不仕以彦章貴秀贈左散騎常侍慶宗贈右武衛將軍彦章少從軍隸太祖帳下以驍勇聞稍遷軍職累典禁兵從太祖征討所至有功常持鐡槍衝堅䧟陣開平二年十月自開封府押牙左親從指揮使授左龍驤軍使三年轉左監門衛上將軍依前左龍驤軍使乾化元年改}
