  - {type: variant, offset: 5041, length: 12, content: 冬無雪永樂大典卷七千一百, WYG: 匹夫本朝擢居方面與皇帝十五年抗衡今日兵敗力窮死有常分皇帝縱垂矜宥何面目見人豈有為臣為將朝事梁而暮事晉乎得死幸矣晉王又謂李嗣源曰爾宜親往諭之庶可全活時彦章以重傷不能興嗣源至卧内以見之謂嗣源曰汝非邈佶烈乎邈佶烈盖嗣源小字也彦章素輕嗣源故以小字呼之既而晉王命肩輿隨軍至任城彦章以所傷痛楚堅乞遲留遂遇害時年}
  - {type: page-break, offset: 5041, content: '', id: KR2a0029_WYG_043-14b, image: WYG0277/WYG0277-0193d.png}
  - {type: variant, offset: 5041, length: 12, content: 冬無雪永樂大典卷七千一百, krp: 匹夫本朝擢居方面與皇帝十五年抗衡今日兵敗力窮死有常分皇帝縱垂矜宥何面目見人豈有為臣為將朝事梁而暮事晉乎得死幸矣晉王又謂李嗣源曰爾宜親往諭之庶可全活時彦章以重傷不能興嗣源至卧内以見之謂嗣源曰汝非邈佶烈乎邈佶烈盖嗣源小字也彦章素輕嗣源故以小字呼之既而晉王命肩輿隨軍至任城彦章以所傷痛楚堅乞遲留遂遇害時年}
