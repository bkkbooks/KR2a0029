  - {type: variant, offset: 5027, length: 0, content: '', WYG: 鄭州防禦使頃之授行營諸軍左廂馬軍都指揮使五年五月遷許州兩使留後軍職如故六年正月正授許州匡國軍節度使}
  - {type: variant, offset: 5027, length: 0, content: '', krp: 鄭州防禦使頃之授行營諸軍左廂馬軍都指揮使五年五月遷許州兩使留後軍職如故六年正月正授許州匡國軍節度使}
  - {type: variant, offset: 5028, length: 3, content: 職戊辰, WYG: 散指揮都頭都軍使進封開國候未㡬授北面行營副招討使七年正月移領滑州三年四月晦晉師陷鄆州中外大恐五月以彦章代戴思逺為北面招討使拜命之日促裝以赴滑臺遂自楊村砦浮河而下水陸俱進斷晉人得勝之浮梁攻南城拔之晉人遂棄北城併軍保楊劉彦章以舟師㳂流而下晉人盡徹北城拆屋木編栰置步軍其上上與彦章各行一岸毎遇轉灘水匯即中流交鬭流矢雨集或舟栰覆没比及楊劉凡百餘戰彦章急攻楊劉晝夜不息晉人極力固守垂陷者數四六月晉王親援其城彦章之重重壕複壘晉人不能入晉王乃于博州東岸築壘以應鄆州應章聞之馳軍而至急攻其柵自旦至午其城將拔㑹晉王以大軍來援彦章乃退七月晉王至楊劉彦章軍不利遂罷彦章兵權詔令歸闕以段凝為招討使先是趙張二族撓亂朝政彦章深惡之性復剛直不能緘忍及授招討之命因謂所親曰待我立功之後回軍之日當盡誅奸臣以謝天下趙張聞之私相謂曰我輩寧死于沙陁之手不當為彦章所殺因恊力以傾之時段凝以賄賂交結自求兵柄素與彦章不恊潛害其功隂行逗撓遂至王師不利竟退彦章而用段凝未及十旬國以之亡矣是歲秋九月朝廷聞晉人將自兖州路出師末}
