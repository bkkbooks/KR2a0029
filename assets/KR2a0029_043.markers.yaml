  - {type: variant, offset: 3535, length: 1429, content: 賜金器等瓌知祥甥也母在蜀故令瓌往焉瓌至蜀具述朝廷厚待之意知祥稱藩如初奏福慶長公主以今年正月十二日薨又奏五月三日大破東川董璋之衆於漢州收下東川又表立功將校趙季良等五人乞授節鉞部內刺史令錄已下官乞許墨制補授帝遣閤門使劉政恩充西川宣諭使乙巳契丹遣使自幽州進馬秦州地震冬十月己酉朔再遣供奉官李瓌使西川兼押賜故福慶長公主祭贈絹三千匹幷賜知祥玉帶先是兩川隔遠朝廷兵士不下三萬人至是知祥上表乞發遣兵士家屬入川詔報不允知祥所奏兩川部內文武將吏乞許權行墨制除補訖奏詔許之知祥所奏立功大將趙季良等五人正授節鉞續有處分襄州奏漢水溢壞民廬舍癸丑以太常卿劉岳卒廢朝己未以兵部侍郎張文寶為吏部侍郎以戶部侍郎藥縱之為兵部侍郎庚申幸至德宮因幸石敬瑭李從昶李從敏之第壬申大理少卿康澄上疏曰臣聞安危得失治亂興亡誠不繫於天時固非由於地利童謠非禍福之本妖祥豈隆替之源故雊雉昇鼎而桑穀生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長是知國家有不足懼者五有深可畏者六陰陽不調不足懼三辰失行不足懼小人訛言不足懼山崩川涸不足懼蟊賊傷稼不足懼此不足懼者五也賢人藏匿深可畏四民遷業深可畏上下相狥深可畏廉恥道消深可畏毀譽亂真深可畏直言蔑聞深可畏此深可畏者六也伏惟陛下尊臨萬國奄有八紘蕩三季之澆風振百王之舊典設四科而羅俊彥提二柄而御英雄所以不軌不物之徒咸思革面無禮無儀之輩相率悛心然而不足懼者願陛下存而勿論深可畏者願陛下修而靡忒加以崇三綱五常之教敷六府三事之歌則鴻基與五岳爭高盛業共磐石永固優詔奬之澄言可畏六事實中當時之病識者許之癸酉湖南馬希範荊南高從誨並進銀及茶乞賜戰馬帝還其直各賜馬有差丁丑帝謂范延光曰如聞禁軍戍守多不稟藩臣之命緩急如何驅使延光曰承前禁軍出戍便令逐處守臣管轄斷決近似簡易帝曰速以宣命條舉之十一月辛巳以三司使左武衞大將軍孟鵠為許州節度使以前許州節度使馮贇為宣徽使判三司以宣徽北院使孟漢瓊判院事壬午史館奏宣宗已下四廟未有實錄請下兩浙荊湖購募野史及除目報狀除目原本作際自今據五代會要改正影庫本粘籤從之案五代會要載十一月四日史館奏當館昨為大中以來迄于天祐四朝實錄尚未纂修尋具奏聞謹行購募勅命雖頒于數月圖書未貢于一編蓋以北土州城久罹兵火遂成滅絕難可訪求切恐歲月漸深耳目不接長為闕典過在攸司伏念江表列藩湖南奧壤至于閩越方屬勳賢戈鋌自擾于中原屏翰悉全于外府固多奇士富有羣書其兩浙福建湖廣伏乞詔旨委各于本道采訪宣宗懿宗僖宗昭宗以上四朝野史及逐朝日歷銀臺事宜內外制詞百司沿革簿籍不限卷數據有者抄錄上進若民間收得或隱士撰成即令各列姓名請議爵賞舊五代史考異癸未以左僕射致仕鄭王玉卒廢朝丁亥以河陽節度使兼六軍諸衞副使石敬瑭為河東節度使兼大同彰國振武威塞等軍蕃漢馬步總管時契丹帳族在雲州境上與羣臣議擇威望大臣以制北方故有是命己丑樞密使趙延壽加同平章事詔在京臣僚不得進奉賀長至馬及諸物甲午日南至帝御文明殿受朝賀己亥河中節度使李從璋加檢校太傅以右散騎常侍楊凝式為工部侍郎庚子以祕書監盧文紀為工部尚書以工部尚書崔居儉為太常卿以工部侍郎鄭韜光為禮部侍郎乙巳雲州奏契丹主在黑榆林南捺剌泊造攻城之具帝遣使賜契丹主銀器綵帛十二月戊申朔供奉官丁延徽倉官田繼勳並棄市坐擅出倉粟數百斛故也教坊伶官敬新磨受賄為人告帝令御史臺徵還其錢而後撻之癸丑幸龍門觀修伊水石堰賜丁夫酒食後數日有司奏丁夫役限十五日已滿工未畢請更役五日帝曰不唯時寒且不可失信於小民即止其役甲寅以太子賓客歸藹卒廢朝戊午以前宣徽使朱弘昭為襄州節度使康義誠為河陽節度使充侍衞親軍馬, WYG: 鋒}
