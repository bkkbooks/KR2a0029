  - {type: variant, offset: 1408, length: 423, content: 貢靈武軍將裴昭隱等二人與進奏官阮順之隱官馬一匹有司論罪合抵法帝曰不可以一馬殺三人命笞而釋之丙申西京奏百姓侯可洪於楊廣城內掘得宿藏玉四團進納賜可洪二百緡絹二百匹庚子以前鄜州節度使孫璋卒廢朝癸卯帝顧謂宰臣曰春雨稍多久未晴霽何也馮道對曰水旱作沴雖是天之常道然季春行秋令臣之罪也更望陛下廣敷恩宥久雨無妨於聖政也丁未以神捷神威雄武廣捷已下指揮改為左右羽林軍置四十指揮每十指揮立為一軍軍置都指揮使一人庚戌帝觀稼於近郊民有父子三人同挽犂耕者帝閔之賜耕牛三頭高麗國遣使朝貢以右領軍上將軍翟璋為右羽林統軍以前安州留後周知裕為左神武統軍夏四月甲寅詔諸道節度使未帶使相及防禦團練使刺史班位居檢校官高者為上如檢校官同以先授者為上前資在見任之下新羅王金溥遣使貢方物戊午中書奏準勅重定三京諸道州府地望次第者舊制以王者所都之地為上今都洛陽請以河南道為上河南原本作河內今從五代會要改正影庫本粘籤關內道為第二河東道為第三餘依舊制其五府按十道圖以鳳翔為首河中成都江陵興元為次中興初升, WYG: 廷議割}
