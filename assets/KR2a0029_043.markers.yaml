  - {type: variant, offset: 5032, length: 5, content: 畋於近郊射, WYG: 急遣彦章領保鑾騎士數千于東路守捉且以鄆州為敵人所據因圖進取令張漢傑為監軍一日彦章渡汶以略鄆境至遞坊鎮為晉人所襲彦章退保}
  - {type: variant, offset: 5032, length: 5, content: 畋於近郊射, krp: 急遣彦章領保鑾騎士數千于東路守捉且以鄆州為敵人所據因圖進取令張漢傑為監軍一日彦章渡汶以略鄆境至遞坊鎮為晉人所襲彦章退保}
