  - {type: variant, offset: 1953, length: 559, content: 自來升降極多今具見在其員依新定十道圖以次第為定從之契丹累遣使求歸則剌惕隱等幽州趙德鈞奏請不俞允帝顧問侍臣亦以為不可與帝意欲歸之會冀州刺史楊檀罷郡至闕帝問其事奏曰此輩來援王都謀危社禝陛下寬慈貸其生命茍若歸之必復向南放箭既知中國事情為患深矣帝然之既而只遣則骨舍利隨來使歸蕃不欲全拒其請也詔贈皇后曹氏曾祖父母已下為太傅太尉太師國夫人淑妃王氏曾祖父母已下為太子太保太傅太師國夫人壬戌前樞密使驃騎大將軍馬紹宏卒癸亥以懷化軍節度使李贊華為滑州節度使初帝欲以贊華為藩鎮范延光等奏以為不可帝曰吾與其先人約為兄弟故贊華來附吾老矣儻後世有守文之主則此輩招之亦不來矣由是近臣不能抗議甲子以太子賓客蕭蘧為戶部尚書致仕乙丑以天雄軍節度使宋王從厚兼中書令辛未以幽州節度使趙德鈞兼中書令五月壬午朔帝御文明殿受朝詔禁網羅彈射弋獵丁亥以二王後前詹事府司直楊延紹為右贊善大夫仍襲封酅國公食邑二千戶丁酉以太子太師致仕孔勍卒廢朝興元奏東西兩川各舉兵相持甲辰以文宣王四十三代孫曲阜縣主簿孔仁玉為兗州龔邱令襲文宣公戊申襄州奏漢江大漲水入州城壞民廬舍樞密使奏近知兩川交惡如令一賊兼有兩川撫衆守險恐難討除欲令王思同以興元之師伺便進取詔從之六月壬子朔幽州趙德鈞奏新開東南河自王馬口至淤口長一百六十五里闊六十五步深一丈二尺以通漕運舟勝千石畫圖以獻甲寅以權知高麗國事王建為, WYG: ''}
