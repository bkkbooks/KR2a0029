  - {type: variant, offset: 5038, length: 2, content: 奔鹿, WYG: 都十月四日晉王以大軍至彦章以衆拒戰兵敗為晉將夏魯竒所擒魯竒嘗事太祖與彦章素善及彦章敗識其語音曰此王鐡槍也揮矟刺之彦章重傷馬踣遂就擒晉王見彦章謂之曰爾常以孺子侍我今日服未又問我素聞爾善將何不保守兖州此邑素無城壘何以自固彦章對曰大事已去非臣智力所及晉王惻然親賜藥以封其創晉王素聞其勇悍欲全活之令中使慰撫以誘其意彦章曰此}
