  - {type: variant, offset: 5055, length: 1, content: 六, WYG: 一彦章性忠勇有膂力臨陣對敵奮不顧身嘗謂人曰李亞子鬭鷄小兒何足畏初晋王聞彦章授招討使自魏州急赴河上以備衝突至則徳勝南城已為所拔晉王嘗曰此人可畏當避其鋒一日晉王領兵迫潘張寨大軍隔河未能赴援彦章援槍登船叱舟人解䌫招討使賀瓌止之不可晉王聞彦章至抽軍而退其驍勇如此及晉髙祖遷都夷門嘉彦章之忠欵詔贈太師搜訪子孫錄用五代史𥙷王彦章之應募也同時有數百人而彦章營求為長衆皆怒曰彦章何人一旦自草野中出便欲居我輩之上是不自量之甚也彦章聞之乃對諸將指數百人曰我天與壯氣自度汝等不及故求作長耳汝等咄咄得非勝負將分之際耶且大凡徤兒開口便言死死則未暇且共汝輩赤脚入棘針地走三五遭汝等能乎衆初以為戯既而彦章果然衆皆失色無敢效之者太祖聞之以為神人遽擢用之賀徳倫其先河西部落人也父懐慶隸滑州軍為小校徳倫少為滑之牙將太祖領四鎮徳倫以本軍從繼立軍功累歴刺史留後遷平盧軍節度使乃魏博楊師厚卒朝廷以徳倫代其任貞明元年三月二十九日夜魏軍作亂執徳倫囚于别館盡殺其部衆為亂首張彦所迫遣使歸款于太原晉王自黄澤嶺東下至臨清徳倫遣從事司空頲宻啟晉王訴以張彦凌辱之事晉王至永濟斬彦等八人然後入于魏徳倫即以符印上晉王通鑑晉王既入徳倫上印節請王兼領天雄軍王固辭曰比聞汴冦侵逼貴道故親董師徒逺來相救又聞城中新罹塗炭故暫入存撫明公不垂鍳信乃以印節見推誠非素懐徳倫再拜曰今冦敵宻邇軍城新有大變人心未安徳倫心腹紀綱為張彦所殺殆盡形孤勢弱安能統軍一旦生事恐負大恩王乃受之㝷授雲州節度使行次河東監軍張承業留之不遣頃之王檀以急攻襲太原徳倫部下多奔逸承業懼其為變遂誅徳倫并其部曲盡殺之舊五代史巻二十一}
