  - {type: variant, offset: 46, length: 0, content: '', WYG: 官至檢校司徒乾寧四年八月與葛從周分統大軍渡淮以伐楊行宻十一月師古寨于清口寨地卑下玉堂閒話云龎從會軍五萬于清口所屯之地盖兵書謂之絶地人不駕肩行一舎方至夷坦之處或請遷移弗聼俄有告淮人決上流者曰水至矣師古怒其惑衆斬之九國志侯瓚𫝊時兵起倉卒加以隂寒士皆飲氷餐雪而行甫及梁營則竪戈植足鬬志未決朱瑾與瓚率五十騎潛濟淮入自壘北舞槊而馳囂聲雷沸梁兵皆殞眩不能舉遂斬龎從大將繼之死者大半湏臾我軍在淖中莫能戰而吳人襲焉故及于敗師古没于陣霍存洺州曲周縣人性驍勇善騎射在黄巢中已為將領唐中和四年太祖大破巢軍于王滿渡時存與葛從周張歸霸皆自巢軍來降太祖宥而納之其後破王夏寨擊殷鐡林並在戰中尋佐朱珍取滑臺攻淄川取博昌皆預戰立功時蔡賊張晊在汴北存以三千人夕犯其營破之用本部騎兵敗秦賢軍殺五千人連破四寨盡得其輜重從討盧瑭張晊殪萬餘人存功居多我軍之圍濮州也有賊升眺樓大詬太祖怒甚召存射之矢一發而屍隕其下賞賚甚厚復佐朱珍擒石璠破魏師敗徐戎又佐龎師古至吕梁敗時溥二千餘衆以是累遷官初王師渡淮乏食不甚利惟存軍戰有功淮賊乃引退太祖之討宿州也葛從周以水壊其垣丁會以師乘其墉存戰壘外敗其軍宿人乃降明年佐郴王友裕擊時溥于碭山破之獲蕃將石君和等五十人歐陽史云存代李唐賓攻時溥溥敗碭山存獲其將石君和等五十人梁攻宿州葛從周引水浸之丁㑹與存戰城下遂下之是歲復與晉軍戰于馬牢川始入為前鋒出則後拒晉不敢逼乃渡河襲淇門殺三千餘人曹州刺史郭紹賓之來歸也存以師援之遂代其任始朱友裕以大軍伐鄆臨其壁既而師陷圍中以急來告存領二百騎馳赴急退之太祖喜拔為諸軍都指揮使景福二年春太祖親至曹州留騎軍數千令存將之且曰有急則倍道兼行以赴之俄聞朱瑾領兵二萬入援彭門存乃領騎軍馳赴之與徐兖之衆合戰于石佛山下大敗之存亦中流矢而卒時人稱其忠勇初朱珍李唐賓之殁龎師古代珍存代唐賓戰伐功績多與師古同始遥領韶州牧又改賀州後用為權知曹州刺史官至檢校右僕射及太祖登極屢有征討因有猛士之歎一日幸講武臺閲兵謂諸將曰霍存在朕}
