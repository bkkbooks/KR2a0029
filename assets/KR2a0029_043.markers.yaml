  - {type: variant, offset: 215, length: 1184, content: 免取文解中書門下奏請親王官至兼侍中中書令則與見任宰臣分班定位宰臣居左諸親王居右如親王及諸使守侍中中書令亦分行居右其餘使相依舊從之渤海迴鶻吐蕃遣使朝貢大理正張居琭上言所頒諸州新定格式律令請委逐處各差法直官一人專掌檢討從之二月乙卯制晉國夫人夏氏追冊為皇后丙辰幸龍門詔故皇城使李從璨可贈太保詔出選門官罷任後周年方許擬議自於所司投狀磨勘送中書又詔罷城南稻田務以其所費多而所收少欲復其水利資於民間碾磑故也秦州奏州界三縣之外別有一十一鎮人戶係鎮將徵科欲隨其便宜復置隴城天水二縣以隸之詔從之甲子幸至德宮以右衞大將軍高居貞為右監門衞上將軍庚午以前華州節度使李從昶為左驍衞大將軍以前夔州節度使安崇阮為右驍衞上將軍原本脫夔州二字今據冊府元龜增入影庫本粘籤以前新州節度使翟璋為右領軍上將軍以右領軍上將軍羅周敬為右威衞上將軍辛未中書奏請依石經文字刻九經印板從之案五代會要長興三年二月中書門下奏請依石經文字刻九經印板敕令國子監集博士儒徒將西京石經本各以所業本經廣為抄寫仔細看讀然後僱召能雕字匠人各部隨帙刻印板廣頒天下如諸色人要寫經書並請依所印刻本不得更使雜本交錯蓋刻板之流行實始於此愛日齋叢鈔云通鑑載後唐長興三年二月辛未初令國子監校定九經雕印賣之又曰自唐末以來所在學校廢絕蜀毋昭裔出私財百萬營學館且請板刻九經蜀主從之由是蜀中文學復盛又曰唐明宗之世宰相馮道李愚請令判國子監田敏校定九經刻板印賣從之後周廣順三年六月丁巳板成獻之由是雖亂世九經傳布甚廣王仲言揮麈錄云毋昭裔貧賤時嘗借文選于交遊間其人有難色發憤異日若貴當板以鏤之遺學者後仕王蜀為宰相遂踐其言刊之印行書籍創見于此事載陶岳五代史補後唐平蜀明宗命太學博士李鍔書五經仿其製作刊板于國子監為監中刻書之始猗覺寮雜記云雕印文字唐以前無之唐末益州始有墨板後唐方鏤九經悉收人間所有經史以鏤板為正見兩朝國史此則印書已始自唐末矣案柳氏家訓序中和三年癸卯夏鑾輿在蜀之三年也余為中書舍人旬休閱書于重城之東南其書多陰陽雜記占夢相宅九宮五緯之流又有字書小學率雕板印紙浸染不可盡曉葉氏燕語正以此證刻書不始于馮道而沈存中又謂板印書籍唐人尚未盛行為之自馮瀛王始印五經自後典籍皆為板本大概唐末漸有印書特未盛行後人遂以為始于蜀也當五季亂離之際經籍方有託而流布于四方天之不絕斯文信矣舊五代史考異甲戌靈武奏都指揮使許審環等謀亂伏誅藥彥稠奏誅党項阿埋等十族案歐陽史二月己卯靜難軍節度使藥彥稠及党項戰于牛兒谷敗之據薛史則甲戌已奏捷非己卯也舊五代史考異與康福入白魚谷追襲叛黨獲大首領六人諸二千餘人孳畜數千及先劫掠到迴鶻物貨詔彥稠軍士所獲並令自收勿得箕斂己卯以前河中節度使索自通為鄜州節度使懷化軍節度使李贊華進契丹地圖詔司天臺除密奏留中外應奏曆象雲物水旱及十曜細行諸州災祥宜並報史館以備編修壬午藥彥稠進迴鶻可汗先送秦王金裝胡為党項所掠至是得之以獻帝曰先詔所獲令軍士自收今何進也令彥稠却與獲者, WYG: ''}
