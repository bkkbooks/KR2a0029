  - {type: variant, offset: 4, length: 1, content: 卷, WYG: 巻二十一宋門下侍郎參知政事監修國史薛居正等撰梁書第二十一列傳十一龎師古曹州南華人初名從以中涓從太祖性端愿未嘗離左右及太祖鎮汴樹置戎伍始得馬五百匹即以師古為偏將援陳破蔡累有戰功及朱珍以罪誅遂用師古為偏將揮使乃渡淮餉軍于廬夀攻滁州破天長下髙郵㳂淮轉戰所至克捷尋代朱友裕領軍攻下徐州斬時溥首以獻遂移軍伐兖州入中都寨于梁山敗朱瑄之衆襲至壘下又破朱瑾于清河從討汶陽與朱瑄朱瑾及晉將史儼兒戰于故樂亭大捷而迴乾寜}
