  - {type: variant, offset: 3256, length: 233, content: 平章事溫昭圖加檢校太尉甲午崇政院副使張希逸加金紫光祿大夫行祕書少監乙未起復雲麾將軍檢校太保壽州團練使張昌孫落起復授光祿大夫檢校太傅冬十月辛丑朔以前感化軍節度觀察留後特進檢校太保姚勍為左龍虎統軍充西都內外馬步軍都指揮使以洛苑使金紫光祿大夫檢校司徒守左威衞大將軍董璋為右龍虎統軍己酉以安南靜海節度使檢校司徒曲美為檢校太保同平章事庚戌以商州刺史康贊美為蔡州刺史十一月壬辰前懷州刺史朱勍授起復雲麾將軍依前懷州刺史十二月庚子朔晉王領軍迫行臺寨距寨十里結營而止北面招討使賀瓌殺許, WYG: ''}
