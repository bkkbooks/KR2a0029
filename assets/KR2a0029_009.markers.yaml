  - {type: variant, offset: 4655, length: 0, content: '', WYG: 㨂折之迹帝慘然曰幾與卿等不相見君臣對泣久之遂詔有司釋放禁人從八月朔日後減膳進素食禁屠宰避正殿修佛事以禳其咎商州刺史李稠棄郡西奔本州將吏以都牙校李玫權知州事八月甲午以秋稼將登霖雨特甚命宰臣以下禱于社稷諸祠詔曰封嶽告功前王重事祭天肆覲有國恒規朕以眇身恭臨大寶既功德未敷于天下而灾祥訝降于城中慮于告謝之儀有缺齋䖍之禮爰修昭報用契幽通宜令中書侍郎平章事于兢往東嶽祭拜禱祀訖聞奏又勅朕以干戈尚熾華夏未寜宜循卑菲之言用致雍熈之化起八月一日常}
