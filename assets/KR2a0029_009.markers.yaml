  - {type: variant, offset: 1716, length: 739, content: 令河南尹魏王張宗奭為西都留守貞明四年春正月晉人寇鄆濮之境車駕至自洛陽案五代春秋作己卯帝還東都舊五代史考異庚辰以蔡州刺史姚勍權知感化軍節度觀察留後乙酉以前靜難軍馬步軍都指揮使黃貴為蔡州刺史甲午以右領軍衞上將軍齊奉國為左金吾衞大將軍充街使二月遣將謝彥章帥衆數萬迫楊劉城甲子晉王來援楊劉城彥章之軍不利而退三月壬午以前右武衞上將軍張筠為左衞上將軍癸巳以鎮國軍節度押衙充本道馬步軍都指揮使江可復為衍州刺史壬寅鎮海鎮東等軍節度行軍司馬秦州節度使檢校太傅同平章事馬綽加檢校太尉同平章事依前鎮海鎮東等軍節度行軍司馬餘如故從錢鏐之請也夏四月丁未以宣徽使右衞上將軍趙縠權知青州軍州事以宣徽院副使韋堅權知本院事宣徽院原本作宣嶽院考五代會要宣徽院次于樞密院今改正影庫本粘籤己酉以銀青光祿大夫行中書侍郎同中書門下平章事權判戶部鄭王玉為金紫光祿大夫中書侍郎兼刑部尚書平章事集賢殿大學士判戶部上柱國仍進封滎陽郡開國侯加食邑五百戶以金紫光祿大夫行尚書吏部侍郎上柱國蘭陵縣開國男食邑三百戶蕭頃為中書門下平章事仍進封蘭陵縣開國伯加食邑四百戶庚戌以前崇德軍使前右武衞大將軍杜存為右領軍衞上將軍甲寅以刑部郎中充史館修撰竇專為翰林學士案專同州白水人貞固之父也貞固宋史有傳舊五代史考異初學士竇夢徵草錢鏐麻貶蓬萊尉帝召專入翰林遣崇政使李振問宰相云專是宰臣蕭頃女婿令中書商量可否中書奏曰宰相親情不居清顯避嫌之道雖著舊規若蒙特恩亦有近例固不妨事帝乃可之己未靈武節度使韓洙案原本作韓殊考韓遜傳洙即遜之子歐陽史雜傳亦作洙今改正舊五代史考異落起復授開府儀同三司依前檢校太傅同平章事癸亥以延州忠義軍節度使太原西面招討應接使檢校太師兼中書令渤海王高萬興兼鄜延兩道都制置使餘如故時萬興弟鄜州節度使萬金卒故有是命己巳以開府儀同三司守司空兼門下, WYG: ''}
