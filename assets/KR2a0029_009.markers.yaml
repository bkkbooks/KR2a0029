  - {type: variant, offset: 13, length: 2, content: 貞明, WYG: 外取三月一日離東京以宰臣韓建權判建昌宫事五代㑹要十月以尚書兵部侍郎李皎為建昌宫副使兵部侍郎姚洎為鹵簿使開封尹博王友文為東都畱守辛未契丹主按巴堅遣使貢良馬三月壬申帝親統六軍廵幸澤潞是日寅時車駕西幸宰臣并要切司局皆扈從晩次中牟下詔以去年六月後昭義行營陣殁都將吏卒死于王事追念忠赤乃錄其名氏各下本軍令給養妻孥}
