  - {type: variant, offset: 23, length: 2, content: 前淄, WYG: 同}
  - {type: variant, offset: 23, length: 2, content: 前淄, krp: 同}
  - {type: variant, offset: 26, length: 935, content: 刺史高允奇為右羽林統軍癸亥以前天平軍馬步軍都指揮使檢校太保朱勍為懷州刺史癸酉以右天武軍使石釗為密州刺史戊寅以前懷州刺史李建為安州刺史仍賜名知節己卯以宣義軍節度副大使知節度事案原本脫副字考新唐書百官志及五代會要副大使為藩鎮官爵今增入舊五代史考異北面行營副招討等使特進檢校太傅霍彥威為天平軍節度副大使知節度事二月甲申晉王攻我黎陽劉鄩拒之而退乙酉前蔡州刺史董璋權知宣義軍軍州事丁亥以前右羽林軍統軍梁繼業為左衞上將軍壬辰以租庸判官檢校司徒張紹珪為光祿卿依前充租庸判官癸巳以權知平盧軍軍州事客省使知銀臺事元湘為檢校司空甲午以飛龍使婁繼英為左武衞大將軍三月庚申以前平戎軍使檢校司徒郭紹賓為禧州刺史辛酉以前天平軍節度副使裴彥為隨州刺史戊寅湖州刺史錢傳璟蘇州刺史錢傳案原本作傳王玉今據十國春秋改正舊五代史考異鎮海軍節度副使錢傳瓘溫州刺史錢傳璲睦州刺史錢傳懿寶州刺史錢傳明州刺史錢傳球義州刺史錢傳峯州刺史錢傳珦案歐陽史職方志有封州而無峯州薛史前後俱作峯州未知何據今仍其舊舊五代史考異巒州刺史錢傳琰鎮海軍都知兵馬使錢傳等凡一十一人並加官勳階爵從吳越王錢鏐之請也案吳越備史載錢鏐諸子所加官勳階爵失載傳璟故十一人僅存其十又其名間有異同當以薛史為得實舊五代史考異夏四月庚辰以前行左武衞大將軍蔡敬思為右武衞上將軍辛巳以前安州刺史劉玘權知晉州軍州事以前密州刺史張實為潁州刺史充本州團練使癸未以六軍押牙充左天武軍使劉彥珪為澶州刺史辛卯以右千牛衞大將軍劉璩充契丹宣諭使詔諸道兵馬元帥開幕除吏一同天策上將府故事辛丑以清海軍元從都押牙隴州刺史吳鍔為檢校司空癸卯以兩浙衙內先鋒指揮使守峯州刺史錢傳珦為泗州刺史六月庚辰以前東京馬步都指揮使兼左天武軍使雷景從為汝州刺史充本州防禦使辛卯以租庸判官光祿大夫檢校司徒行光祿卿張紹珪為申州刺史壬辰以權知晉州建寧軍軍州事前安州刺史劉玘為建寧軍節度觀察留後秋七月丁巳以淄州刺史陳洪為棣州刺史乙丑以刑部員外郎封翹為翰林學士封翹原本作封堯今據封舜卿傳改正影庫本粘籤丙寅以汝州刺史楊延直為左衞大將軍以前左衞上將軍劉重霸為起復雲麾將軍右驍衞上將軍庚午以六軍諸衞副使起復雲麾將軍檢校太保張業為淄州刺史八月辛巳以左神武軍統軍周武為寧州刺史以左崇安指揮使前申州刺史劉仁鐸為衍州刺史戊子泰寧軍, WYG: ''}
