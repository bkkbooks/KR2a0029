  - {type: variant, offset: 1249, length: 1, content: 周, WYG: 劉重霸面陳破敵之䇿癸未西幸㝛新安丙戌至陜州駐蒲雍同華牧守皆進鎧甲騎馬戈㦸食味方物幽州都將康君紹等十人自蕃賊寨内來投又幽州騎將高彦章八十人騎先在并州乃于晉州軍前來降至是到行在皆賜分物衣服放歸本道以示懷服丁亥至陳州賜宴扈從官戊子延州賊軍宼上平闗又太原軍攻平陽烽火羽書畫夜繼至乙丑六軍統軍牛存節黄文靖各領所部將士赴行在甲午太原歩騎數萬攻逼晉絳踰旬不克知大軍至乃自焚其寨至夕而遁福州貢玳瑁琉璃犀象器并珍玩香藥奇品海味色類良多價累千萬十月已亥上在陜兩浙節度使奏于常州東州鎮殺淮賊萬餘人獲戰船一百二隻以行營左廂歩軍指揮使賀瓌為左龍虎統軍以左天}
