  - {type: variant, offset: 1241, length: 0, content: '', WYG: 竝其境内丁壯悉驅南征決戰以救上黨之急部落帳族馳馬勵兵數路齊進于銅鞮樹寨旗壘相望王師敗于潞州已丑令下諸州去年有蝗蟲下子處蓋前冬無雪今春亢陽致為災沴實傷壠畝必慮今秋重困稼穡自知多在荒陂榛蕪之内所在長吏各須分配地界精加翦撲以絶根本壬辰夜火星犯月太史奏災合在荆楚乃令設武備寛刑罰恤人禁暴以禳之軍前行營都將康懷英孫海金已下主將四十三人于右銀臺門進狀待罪帝以去年發軍之日不利有違兵法並釋放兼各賜分物酒食勞問封義昌軍節度使劉守文加中書令封太彭王盧龍軍節度使劉守光封河間郡王許州節度使馮行襲封長樂王是月癸未淮賊宼荆州石首縣襄陽舉舟師沿瀺港襲敗之六月辛亥以亢陽慮時政之闕乃詔曰邇者下民喪禮法吏舞文銓衡既失于選求州鎮又無其舉刺風俗未厚獄訟實繁職此之由上遭天譴至是決遣囚徒及戒勵中外丙寅月犯角㝛帝以其分野在兖州乃令長吏治戎}
