  - {type: 'tls:seg', offset: 1242, content: '', id: KR2a0029_ZHSJ_009-d9p12s3}
  - {type: variant, offset: 1242, length: 1, content: 戊, WYG: 設武備省獄訟恤疲病祈福禳災以順天戒丙辰邠岐來宼雍西編户困于逃避且芟害禾稼結營自固踰月同州劉知俊領所部兵擊退襲至幕谷大破之俘斬千計収其器甲宋文通僅以身免詔曰敦尚儉素抑有前聞斥去浮華期臻至理如聞近日貢奉競務奢淫或奇巧蕩心或雕鐫溢目徒殫資用有費工庸此後應諸道進獻不得以金寶裝飾戈甲劔㦸至于鞍勒不用塗金及雕刻龍鳯如有此色所司不得引進邕州奏鏌鎁山僧法通道璘有道行各賜紫衣是月壬戌岳州為淮賊所據帝以此郡五嶺三湘水陸㑹合之地委輸商賈靡不由斯遂令荆湘湖南北舉舟師同力致討王師既集淮夷毁壁焚郭而遁秋七月甲戌大霖雨陂澤泛溢頗傷稼穡帝幸右天武軍河亭觀水幸高僧臺閲禁衛六軍詔曰車服以庸古之制也貴賤無别罪莫大焉應内外將相許以銀飾鞍勒其刺史都將内諸司使以降祗取用銅兾定尊卑永為條制仍令執法官紏察之五代㑹要載七月敕曰祭祀之儀有國大事如聞官吏慢于恪恭牲具禮容有異精審宜令御史臺疏其條件奏聞癸已以禪代巳來思求賢哲乃下令搜訪牢籠之期以好爵待以優榮各隨其材咸使登用宜令所在長吏切加搜訪每得其人則疏姓名以聞如在下位不能自振者有司薦導之如任使後顯立功勞别加遷陟勅禁屠宰兩月甲午以高明門外繁臺為講武臺是臺西漢梁孝王之時嘗按歌閲樂于此當時因名曰吹臺其後有繁氏居于其側里人乃以姓呼之時代綿寢雖官吏亦從俗焉帝每登眺蒐乘訓戎宰臣以是事奏而名之八月辛亥勅應有暴露骸骨各委差人埋瘞兩浙錢鏐奏請重鑄換諸州新印詔禁戢諸軍節級兵士及供奉官受㫖殿直以下各脩禮敬甲寅太史奏夀星見于南方兩浙錢鏐奏改管内紫極宫為真聖觀改臨安縣廣義鄉為衣錦鄉十國春秋呉越世家八月梁敕封唐山縣為呉昌縣唐興縣為天台縣又敕升杭越等州為大都督府復改新城縣曰新登長城縣曰長興樂成曰樂清避梁諱也甲}
