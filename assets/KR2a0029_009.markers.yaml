  - {type: variant, offset: 1245, length: 1, content: 寧, WYG: 進九月丙子太原軍出隂地闗南牧宼掠郡縣晉絳有備帝慮諸將翫宼乃下詔親議廵幸命有司備行丁丑翠華西狩宰臣翰林學士崇政院使金吾仗及諸司要切官皆扈從餘文武百官竝在東京壬午達雒陽帝御文思殿受朝叅許汝孟懷牧守來朝澤}
