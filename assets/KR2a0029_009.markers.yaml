  - {type: variant, offset: 3530, length: 956, content: 聞之喜曰彼將帥不和亡無日矣案通鑑賀瓌密譖謝彥章于帝因與朱珪伏甲以殺彥章蓋賀瓌密奉帝旨也五代春秋歐陽史皆以賀瓌專殺為文恐非事實丁未以行營諸軍馬步都虞候光祿大夫檢校太保曹州刺史朱珪為檢校太傅充匡國軍節度觀察留後依前行營諸軍馬步都虞候癸丑詔曰行營諸軍馬步都虞候匡國軍節度觀察留後朱珪昨以寇戎未滅兵革方嚴所期朝夕之間克弭烟塵之患每於將帥別注憂勞而謝彥章孟審澄侯溫裕忽搆異圖將萌逆節賴朱珪挺施貞節密運沈機果致梟擒免資讎敵特加異殊之命用旌忠孝之謀便委雄藩俾荷隆渥可檢校太傅充平盧軍節度淄青登萊等州觀察處置押新羅渤海兩番等使兼行營諸軍馬步軍副都指揮使仍進封沛國郡開國侯乙巳起復雲麾將軍檢校太保陳州刺史惠王友能惠王原本作忠王今據歐陽史改正影庫本粘籤鎮國軍節度陝虢等州觀察處置等使起復雲麾將軍檢校太保邵王友誨並落起復加檢校太傅以前房州刺史牛知業為右羽林軍統軍癸亥北面招討使賀瓌率大軍與晉人戰於胡柳陂晉人敗績是日既晡復為晉人所敗初晉人起軍將襲東京乃下令軍中老弱悉歸於鄴是月二十二日晉王次臨濮賀瓌王彥章自行臺寨率軍躡之二十四日至胡柳陂晉王領軍出戰瓌軍已成列晉王以騎突之王彥章一軍先敗彥章走濮陽晉人輜重在陣西瓌領軍薄之晉人大奔自相蹈籍死者不可勝紀晉大將周德威歿於陣瓌軍乃登土山列陣於山之下晉王復領兵來戰瓌軍遂敗翌日晉人攻濮陽陷之京師戒嚴貞明五年春正月晉人城德勝夾河為柵二月乙巳以宣徽院副使韋堅權知徐州軍事三月己卯以華州感化軍留後尹皓為華州節度使加檢校太保同平章事癸未制削奪兗州節度使張守進在身官爵以其叛故也仍命劉鄩為兗州管內安撫制置使領兵以攻之案張守進歸晉本紀繫於五年三月張萬進傳作四年七月劉鄩傳仍作五年通鑑考異嘗並舉紀傳之互文以明薛史之難據因定從莊宗實錄作四年八月今以當日事勢考之藩鎮反覆向背無常陰謀詭祕姑示含容討罪遣師須有顯迹蓋守進潛附于晉自在四年秋至削奪官爵聲罪致討則五年春事也薛史采用舊聞不加修飾故語必徵實若五代春秋以守進叛為五年事歐陽史又以劉鄩討之為四年事皆刪改成文自為臆斷不如薛史之存其實也夏四月壬寅以永平軍留後兼判大安府事張筠為永平軍節度使檢校太保行大安尹庚戌以鎮海軍北面水陸都指揮使湖州刺史檢校太傅錢傳璟遙領宣州寧國軍節度使加同平章事是月賀瓌攻德勝南城以艨艟戰艦橫於河以扼津濟之路晉人斷其艨艟濟軍以援南城瓌等退軍五月己巳, WYG: ''}
