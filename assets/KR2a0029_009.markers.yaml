  - {type: variant, offset: 4577, length: 1, content: 鄭, WYG: 知浣自雒奔至潼闗右龍虎軍十將張温以上二十二人于潼闗擒獲劉知浣送至行在敕劉知浣逆黨之中最為頭角龍虎軍親兵之内實冠𤓰牙昨者攻取潼闗率先用命尋則擒獲知浣最上立功頗壯軍威將除國難所懸賞格便可支分許賜官階固須除授但昨捉獲劉知浣是張温等二十二人一時向前共立功效其賞錢一千貫文數内一百貫文與最先打倒劉知浣衙官李稠四十三貫文與十將張温二十人各與錢四十二貫八百五十文立功勅命便授郡府亦縁同時立功人數不少所除刺史難議偏頗宜令逐月共支給正刺史料錢二百貫文數内十將張温一人每月與十貫文餘二十一人每月每人各分九貫文仍起七月一日以後支給人與轉官職仍勘名銜分析申奏當與施行是月知俊奔鳯翔同}
