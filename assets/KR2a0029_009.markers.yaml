  - {type: variant, offset: 2596, length: 4, content: 少卿韋彖, WYG: 儀仗鼓吹導引齋車文武百官奉辭于開明門外甲戌發東都百官扈從次中牟縣乙亥次鄭州丙子次汜水縣河南尹張宗奭河陽節度使張歸霸並來朝戊寅次􅅯師縣已卯備法駕六軍儀仗入西都是日御文明殿受朝賀詔曰近年以來風俗未泰兵革且繁正月燃燈廢停已乆今屬創開鴻業初建洛陽方在上春務達陽氣宜以正月十四十五十六日夜開坊市門一任公私燃燈祈福庚寅親享太廟辛卯祀昊天上帝于圓丘是日降雪盈尺帝昇壇而雪霽禮畢御五鳯樓宣制大赦天下賜南郊行事官禮儀使趙光逢以下分物甲午上御文思殿宴羣臣賜金帛有差丙申賜文武官帛有差命宣徽使王殷押絹一萬疋并茵褥圖㡩二百六十件賜張宗奭歐陽史丙申羣臣上尊號曰睿文聖武廣孝皇帝改西京貞觀殿}
