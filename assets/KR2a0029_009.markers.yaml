  - {type: variant, offset: 1235, length: 0, content: '', WYG: 州壬子幸東京丙寅車駕幸繁臺觀稼鄢陵居人程震以兩岐麥穗并畫圖來進甲寅淮宼侵軼潭岳邊境欲援朗州以戰艦百餘艘揚帆西上泊鼎口湖南馬殷遣水軍都將黄瑀率樓船遮擊之賊衆沿流宵遁追至鹿角鎮詔以户部尚書致仕裴廸復為右僕射廸敏事慎言達吏治明籌算帝初建節旄于夷門廸一謁見如故知乃辟為從事自是之後歴三十年委四鎮租賦兵籍帑廩官吏獄訟賞罰經費運漕事無巨細皆得專之帝每出師即知軍州事逮于二紀不出梁之闉閎甚有禆贊之道禪代之嵗命為太常卿屬年已耆耄視聽昏塞不任朝謁遂請老許之朞月復起師長庶官焉五月丁丑}
