  - {type: variant, offset: 11, length: 1, content: 紀, WYG: 御金祥殿受宰臣文武百官及諸藩屏陪臣稱賀諸道貢舉一百五十七人見于崇元門封從子友寜為安王友倫為密王幽州劉守文進海東鷹鶻蕃馬氊罽方物自去冬少雪春深農事方興久無時雨兼慮有災疾帝深軫下民二月命庶官遍祀于羣望掩瘞暴露令近鎮案古法以禳祈旬日乃雨是月弑濟隂王帝以上黨未収因議撫廵便住西都赴郊禋之禮乃下令曉告}
