  - {type: variant, offset: 331, length: 239, content: 尚稱安北都護楊檀是檀在天成中未嘗改名又明宗紀前後皆稱檀州則地名亦不改疑談苑所紀不能無誤薛史紀傳異文亦未畫一丙辰詔端明殿學士班位宜在翰林學士之上今後如有轉改只於翰林學士內選任先是端明殿學士班在翰林學士之下又如三館例三館原本作玉館考新唐書百官志唐以集賢殿弘文館國史館為三館今改正影庫本粘籤官在職上趙鳳轉侍郎日諷宰相府移之既而禁林序列有不可之言安重誨奏行此敕時論便之癸亥宰臣鄭王玉加特進門下侍郎兼太微宮使崇文館大學士任圜加光祿大夫門下侍郎監修國史以端明殿學士尚書兵部侍郎馮道為中書侍郎, WYG: 貽矩開}
