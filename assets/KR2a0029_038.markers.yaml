  - {type: variant, offset: 134, length: 196, content: 粘籤荷玄穹之睠祐契兆庶之樂推檢玉泥金非敢期於薄德耕田鑿井誠有慕於前王將陳享謁之儀即備郊丘之禮宜更稱謂永耀簡編今改名為亶凡在中外宜體朕懷宣制訖百僚稱賀有司告郊廟社稷案楊文公談苑云唐時避諱最重人君即位多更名後唐尚沿其例明宗初名嗣源後改名亶於楊檀改稱光遠其金壇及檀州諸州縣皆從改更則幷偏旁字而亦改之當時明宗在御臣下避諱之嚴如此今考薛史楊光遠傳云初名檀唐天成中以明宗改御名為亶始改名光遠與談苑合然閔帝, WYG: ''}
