  - {type: variant, offset: 1521, length: 5423, content: 異新授夔州刺史西方鄴為副招討使共領川軍下峽州三面齊進甲辰兗州節度使房知溫加同平章事宋州節度使王晏球加檢校太傅丁未以禮部尚書蕭頃為太常卿戊申以御史大夫李琪為右僕射以太子賓客李鏻為戶部尚書以吏部侍郎李德休為禮部尚書以前吏部侍郎崔貽孫為吏部侍郎以端明殿學士戶部侍郎趙鳳為兵部侍郎依前充職庚戌詔諸道節度使男及親嫡骨肉未沾恩命者特許上聞河南府新安縣宜為次赤以雍陵在其界故也辛亥以刑部侍郎歸藹為戶部侍郎三月壬子朔以中書舍人馬縞為刑部侍郎幸會節園宰相樞密使及在京節度使共進錢絹請開宴癸丑遣供奉官賈俊使淮南案九國志作賈進考冊府元龜所引薛史亦作俊今仍其舊舊五代史考異甲寅以西川節度副使李敬周為遂州武信軍留後乙卯開府儀同三司司徒致仕趙光逢可太保致仕仍封齊國公以武信軍節度使李紹文卒廢朝丙辰宰臣判三司任圜奏諸道藩府請依天復三年已前許貢綾絹金銀隨其土產折進馬之直又請選孳生馬分置監牧並從之案五代會要任圜奏三京留守諸道節度觀察諸州防禦使刺史每年應聖節及正至等節貢奉或討伐勝捷各進獻馬伏見本朝舊事雖以獻馬為名多將綾絹金銀折充馬價蓋跋涉之際護養稍難因此羣方俱為定制自今後伏乞除蕃部進駝馬外諸州所進馬許依天復三年已前事例隨其土產折進價直冀貢輸之稍易又誠敬之獲申兼欲于諸處揀孳生馬準舊制分置監牧仍委三司使別具制置奏聞舊五代史考異太常丞段顒請國學五經博士各講本經以申橫經齒冑之義從之庚申以前澤潞節度使檢校太傅兼侍中孔勍為河陽節度使壬戌幸甘水亭甲子青州節度使霍彥威加檢校太尉兼中書令以大內皇城使守饒州刺史李從璋為應州節度使丁卯詔所在府縣糾察殺牛賣肉犯者準條科斷其自死牛即許貨賣肉斤不得過五錢鄉村民家死牛但報本村所由準例輸皮入官癸酉以戶部郎中知制誥盧詹為中書舍人盧詹原本作盧處今據列傳改正影庫本粘籤夏四月辛巳朔房知溫奏前月二十一日盧臺戍軍亂害副招討寧國軍節度使烏震尋與安審通斬殺亂兵訖案五代春秋盧臺戍軍亂房知溫討平之據薛史房知溫傳及通鑑知溫初誘戍軍為亂繼恐事不濟乃與安審通謀討亂兵也五代春秋所書殊非事實舊五代史考異帝聞之廢朝一日贈震太傅新羅國遣使貢方物丁亥以華州留後劉彥琮為本州節度使是日幸會節園宴近臣己丑以兵部侍郎崔居儉權知尚書左丞以戶部侍郎王權為兵部侍郎以禮部侍郎裴為戶部侍郎以翰林承旨守中書舍人李愚為禮部侍郎充職庚寅御史臺奏今月三日廊下食百官坐定兩省官方來自五品下輒起詔曰每赴廊餐如對御宴若行私禮是失朝儀各罰半月俸案五代會要長興三年五月詔文武兩班每遇入閤賜食從前御史臺官及諸朝官皆在敷政門外兩廊食惟北省官于敷政門內別坐既為隔門各不相見致行坐不齊難于肅整今後每遇入閤賜食北省官亦宜于敷政門外東廊下設席以北首為上待班齊一時就坐舊五代史考異詔盧臺亂軍龍晊所部鄴都奉節等九指揮三千五百人龍晊原本作龍今據通鑑改正影庫本粘籤在營家口骨肉並可全家處斬龍晊所部之衆即梁故魏博節度使楊師厚之所招置也皆天下雄勇之士目其都為銀槍効節僅八千人師厚卒賀德倫不能制西迎莊宗入魏從征河上所向有功莊宗一統之後雖數頒賚而驕縱無厭同光末自貝州劫趙在禮據有魏博及帝纘位在禮冀脫其禍潛奏願赴朝覲遂除皇子從榮為帥乃令北禦契丹是行也不支甲冑惟幟於長竿表隊伍而已故俛首遄征在途聞李嚴為孟知祥所害以為劍南阻絕互相煽動及屯於盧臺會烏震代房知溫為帥轉增浮說震與房知溫博於東寨日亭午大譟於營外知溫上馬出門為甲士所擁且曰不與兒郎為主更何處去知溫紿之曰馬軍皆在河西步卒獨何為也遂得躍馬登舟濟於西岸安審通戢騎軍不動知溫與審通謀伺便攻之令亂兵卷甲南行騎軍徐進部伍嚴整叛者相顧失色列炬宵行疲於荒澤遲明潛令外州軍別行知溫等遂擊亂軍橫尸於野餘衆復趨舊寨至則已焚之矣翌日盡戮之脫於叢草溝塍者十無二三迨夜竄於山谷稍奔於定州及王都之敗乃無噍類矣癸巳兗州節度使房知溫加侍中齊州防禦使安審通加檢校太傅並賞盧臺之功也丁酉偽吳楊溥遣移署右威衞將軍雷現貢端午禮幣雷現九國志作雷觀十國春秋仍作現今仍其舊影庫本粘籤辛丑以前利州節度使張敬詢為雲州節度使遣樞密使孔循赴荊南城下時招討使劉訓有疾故也甲辰以戶部侍郎韓彥惲為祕書監是日幸石敬瑭安重誨第丙午故振武節度使李嗣恩贈太尉以司封郎中充樞密院直學士閻至為左諫議大夫充職右諫議大夫梁文矩上言平蜀已來軍人剽略到西川人口甚多骨肉阻隔恐傷和氣請許收認帝仁慈素深因文矩之奏詔河南河北舊因兵火擄隔者並從識認是日郢州進白鵲五月癸丑以福建留後檢校太傅舒州刺史王延鈞為檢校太師守中書令充福建節度使瑯琊郡王以太常卿蕭頃為吏部尚書是日懷州進白鵲戊午以三司副使守太子賓客張格卒廢朝以翰林學士駕部郎中知制誥竇夢徵為中書舍人充職癸亥遣宣徽使張延朗調發郡縣糧運赴荊南城下仍以軍法從事以右龍武統軍崔公實為左龍武統軍以前復州刺史高行周為右龍武統軍割果州屬郡乙丑偽吳楊溥貢新茶滄州進白鶴庚午詔罷荊南之師既而令軍士散掠居民而迴詔文武臣僚及諸道節度使刺史有父母在者各與恩澤宰臣任圜表辭三司事乃以樞密院承旨孟鵠充三司副使權判六月壬午華州邢州進兩歧麥兗州進三足烏丙戌宰相任圜落平章事守太子少保丁亥詔天下除併無名額寺院以宣徽北院使張延朗為右武衞大將軍判三司宣徽北院使原本脫徽字今據文增入影庫本粘籤依前宣徽使檢校司徒辛卯大理少卿王鬱上言凡決極刑準敕合三覆奏近年已來全隳此法伏乞今後決前一日許一覆奏從之壬辰南面招討使知荊南行府事襄州節度使檢校太傅劉訓責授檢校右僕射守檀州刺史訓南征無功故有是譴詔喪葬之家送終之禮不得過度乙未戶部尚書李鏻上言請朝班自四品已上官各許薦令錄兩人五品官各薦簿尉兩人案五代會要作五品六品官各許薦簿尉兩人原本疑脫六品二字功過賞罰與舉者同之詔從之其所舉人仍於官告內標所舉姓名或有不公案原本脫公字今從五代會要增連坐舉主仍令三品已上各舉堪任兩使判官者丙申以天策上將軍湖南節度使開府儀同三司檢校太師守尚書令楚王馬殷為守太師尚書令封楚國王庚子幸白司馬陂祭突厥神從北俗之禮也秋七月庚戌朔以宋州節度使王晏球充北面行營副招討使癸丑以左金吾將軍烏昭遠為左衞上將軍充入蠻國信使中書奏馬殷封楚國王禮文不載國王之制請約三公之儀用竹冊從之壬戌西川節度副大使知節度事孟知祥加檢校太尉兼侍中東川董璋加爵邑以左効義指揮使元習為資州刺史右効義指揮使盧密為雅州刺史癸亥幸冷泉宮甲子以檢校工部尚書謝洪為宿州團練使夔州刺史西方鄴奏殺敗荊南賊軍收峽內三州案通鑑六月西方鄴敗荊南水軍于峽中復取夔忠萬三州薛史繫七月甲子蓋以奏聞之日為據歐陽史與薛史同舊五代史考異丙寅升夔州為寧江軍以鄴為節度使戊辰詔曰頃因本朝親王遙領方鎮遂有副大使知節度事副大使原本作正使今據新唐書百官志改正影庫本粘籤年代已深相沿未改其東川西川今後落副大使只云節度使庚午遂州留後李敬周鄜州留後劉仲殷並正授本州節度使壬申兗州節度使房知溫移鎮徐州徐州節度使安元信移鎮襄州滄州節度使趙在禮移鎮兗州以齊州防禦使安審通為滄州節度使是日詔陵州合州長流百姓豆盧革韋說等宜令逐處刺史監賜自盡案五代春秋作元年七月殺豆盧革韋說考歐陽史元年七月貶豆盧革為辰州刺史韋說蝄州刺史甲申流革于陵州說于合州二年七月殺豆盧革韋說與薛史同五代春秋統繫于元年誤也舊五代史考異其骨肉並放逐便是日逐段凝於遼州劉訓於濮州溫韜於德州甲戌太子少保任圜上表乞致仕仍於外地尋醫詔從之丁丑以左金吾大將軍曹廷隱為齊州防禦使八月己卯朔日有食之辛巳以右諫議大夫孔昭序為給事中以祕書少監崔憓為右諫議大夫壬午以右驍衞大將軍劉衡為左領衞上將軍以鄴都副留守趙敬怡為右衞上將軍判興唐府事乙酉昆明大鬼主羅殿王普露靜王九部落各差使隨牂牁清州八郡刺史宋朝化等一百五十三人來朝進方物各賜官告繒綵銀器放還蕃丙戌以御史中丞盧文紀為工部尚書以右諫議大夫梁文矩為御史中丞鄧州留後陶貶嵐州司馬以其為內鄉縣令盛歸仁所訟稅外科率故也仍賜歸仁緋袍魚袋癸巳幸皇子從榮第宣禁中伎樂觀宴從榮進馬及器幣帝因以伎樂賜之華州上言渭河泛濫害稼丁酉以吏部郎中襲文宣公孔邈為左諫議大夫史館修撰趙熙上言應內中公事及詔書奏對應不到中書者請委內臣一人抄錄月終送史館詔差樞密直學士錄送青州進芝草青州原本作星州今據冊府元龜改正影庫本粘籤新州奏契丹乞置互市癸卯汴州節度使朱守殷加兼侍中鄆州節度使符習加檢校太尉甲辰皇子從榮娶鄜州節度使劉仲殷女是夕禮會百僚表賀九月辛亥義武軍節度使檢校太尉兼中書令王都加食邑實封幽州節度使趙德鈞加檢校太尉鎮州節度使王建立加同平章事偽吳楊溥遣使以應聖節貢獻己未以前雲州節度使高行珪為鄧州節度使是日出御扎曰歷代帝王以時巡狩一則遵於禮制一則按察方區按察下原空一字今據冊府元龜增方字影庫本粘籤矧彼夷門控茲東夏當先帝戡平之始為眇躬殿守之邦俗尚貞純兵懷忠勇自元臣鎮靜庶事康和兆民咸樂於有年闔境彌堅於望幸事難違衆議在省方朕取十月七日親幸汴州庚申以衞尉卿李延光為大理卿北京留守李彥超上言先父存審本姓符氏蒙武皇賜姓乞卻還本姓從之乙丑夏州節度使李仁福鳳翔節度使李從曮李從曮作逢曮據上文李曮賜名從曮逢字當係從字之訛今改正影庫本粘籤朔方節度使韓洙並加食邑改賜功臣以汝州防禦使趙延壽為河陽節度使以比部郎中知制誥劉贊為中書舍人以河陽掌書記程遜為比部員外郎知制誥以代州刺史李德珫為蔚州刺史丙寅樞密使孔循兼東都留守襄州夏魯奇上言荊南高季興遣使持書乞修貢奉詔魯奇不納詔諸州錄事參軍不得兼使府賓職己巳鄧州節度使史敬鎔加檢校太保同州節度使盧質加檢校司徒御史臺奏每遇入閤舊例只一員侍御史在龍墀邊祗候彈奏公事或有南班失儀點檢不及今欲依常朝例差殿中侍御史二員押鐘鼓樓位仍各綴供奉班出入從之以青州節度副使淳于晏為亳州團練使契丹遣使梅老沒骨已下朝貢戊寅西川奏據黎州狀雲南使趙和於大渡河南起舍一間留信物十五籠幷雜牋詩一卷遞至闕下冬十月己卯朔帝御文明殿視朝癸未亳州刺史李鄴貶郴州司戶又貶崖州長流百姓所在賜自盡判官樂文紀配祁州責其違法黷貨也乙酉駕發西京詔留宰相崔協以奉祠祭丁亥帝宿於滎陽汴州朱守殷奏都指揮使馬彥超謀亂已處斬訖戊子次京水知朱守殷反帝親統禁軍倍程前進翌日至汴州攻其城拔之守殷伏誅丙申磁州刺史藥縱之上言藥縱之原本作縱正今據列傳改正影庫本粘籤今月十二日供奉官王仁鎬至稱制殺太子少保致仕任圜案安重誨害任圜五代春秋及通鑑俱不書日歐陽史作乙未殺太子少保致仕任圜據薛史作十二日是年十月為己卯朔十二日乃庚寅也與歐陽史異日舊五代史考異契丹遣使持書求碑石欲為其父表其葬所戊戌詔曰諸道州府自同光三年已前所欠秋夏稅租幷主持務局敗闕課利幷沿河舟船折欠天成元年殘欠夏稅並特與除放時重誨既搆任圜之禍恐人非之思沛恩於衆以掩己過乃奏曰三司積欠約二百萬貫虛繫帳額請並蠲放帝重違其意故有是詔時議者以蠲隔年之賦猶或惠民場院課利一概除之得不啟奸倖之門乎己亥詔曰太子少保致仕任圜早推勳舊曾委重難既退免於劇權俾優閑於外地而乃不遵禮分潛附守殷緘題罔避於嫌疑情旨頗彰於怨望自收汴壘備見綜由若務含弘是孤典憲尚全大體止罪一身已令本州私第自盡其骨肉親情僕使等並皆放罪辛丑詔曰后來其蘇動必從於人欲天監厥德靜宜布於國恩近者言幸浚郊暫離洛邑蓋逢歲稔共樂時康不謂奸臣遽彰逆狀為厲之階既甚覆宗之禍自貽以致近輔生靈遘此多端紛擾永言軫惻無輟寐興宜覃雨露之恩式表雲雷之澤應汴州城內百姓既經驚劫宜放二年屋稅諸處有曾受逆人文字者隨處焚毀應天下見禁囚徒除十惡五逆殺人放火劫盜合造毒藥官典犯贓偽行印信屠牛外罪無輕重並從釋放應有民年八十已上及家長者有廢疾者免一丁差役云以山南西道節度使張筠為西京留守張筠原本作張漢筠今考張筠傳筠未嘗名漢筠當係傳寫衍文今刪去影庫本粘籤行京兆尹青州節度使霍彥威差人走馬進箭一對賀誅朱守殷帝卻賜彥威箭一對傳箭番家之符信也起軍令衆則使之彥威本非蕃將以臣傳箭於君非禮也癸卯以權知汴州事陝州節度使石敬瑭為汴州節度使兼六軍諸衞副使侍衞親軍馬步都指揮使鳳翔奏地震丙午威武軍節度副使檢校太尉守建州刺史王延亶可同平章事守建州刺史充奉國軍節度副使兼威武軍節度副使詔割施州卻屬黔南十一月己酉帝祭蕃神於郊外庚戌以皇城使行袁州刺史李從敏為陝州節度使乙卯青州霍彥威鄆州符習來朝以太子詹事溫輦為吏部侍郎徐州房知溫來朝戊午黔南節度使李紹義加檢校太保庚申皇子河中節度使檢校太保同平章事從珂鄴都留守檢校太保同平章事從榮河南尹判六軍諸衞事檢校太保同平章事從厚並加檢校太傅進爵邑貝州刺史竇廷琬上言請制置慶州青白兩池逐年出絹十萬匹米萬石詔升慶州為防禦所以廷琬為使壬申詔霍彥威等歸藩詔太宗朝左僕射李靖可冊贈太保鄭州僕射陂可改為太保陂時議者以僕射陂者後魏孝文帝賜僕射李冲李冲原本作李种今據魏書改正影庫本粘籤故因以為名及是命之降以為李靖蓋誤也契丹遣使梅老等來乞通和十二月戊寅朔以前鳳翔留後高允貞為右監門上將軍詔以施州為夔州屬郡以其便近故也遣飛勝指揮使於契丹賜契丹王錦綺銀器等兼賜其母繡被纓絡己卯蔚州刺史周令武得代歸闕帝問北州事令武奏曰山北甚安諸蕃不相侵擾鴈門已北東西數千里斗粟不過十錢帝悅顧謂左右曰須行善事以副天道居數日帝延宰臣於元德殿言及民事馮道奏曰莊宗末年不撫軍民惑於聲樂遂致人怨國亂陛下自膺人望歲時豐稔亦淳化所致也更願居安思危帝然之許州地震庚辰皇子鄴都留守從榮移鎮太原以北京留守符彥超為潞州節度使乙酉以彰國軍節度使李從璋昧於政理詔歸闕敕新及第進士有聞喜宴逐年賜錢四十萬己丑兗州節度使趙在禮來朝詔出潛龍宅米以賑百官壬辰以太傅致仕齊國公趙光逢卒輟朝丙申許州節度使夏魯奇移鎮遂州庚子幸石敬瑭公署及康義誠私第甲辰狩於東郊臘也丙午追尊四廟以應州舊宅為廟永樂大典卷七千一百六十四, krp: 證}
