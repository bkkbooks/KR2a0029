  - {type: variant, offset: 126, length: 0, content: '', WYG: 考異引梁祖實録八月丁酉賜劉玘王延順物以其違亂将之命來歸編遺録斬李洪勅云始扶劉圮既奔竄以歸朝若使圯翌日便斬亂将則襄州何以至九月始収復盖圮脱身歸朝及梁亡入唐妄云斬亂以自誇大耳周知裕傳清㤗初卒於官案歐陽史作應順中卒托諾舊作秃餒今}
