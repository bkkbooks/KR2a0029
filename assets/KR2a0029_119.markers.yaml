  - {type: variant, offset: 32, length: 0, content: '', WYG: 轉運招撫等使契丹犯塞漁陽路梗震率師運糧三入薊門擢為河北道副招討遙領宣州節度使代房知温軍於盧臺及至軍會戍兵龍晊所部鄴都奉節等軍數千人作亂未及交印而遇害眀宗聞之廢朝一日詔贈太傅震略涉書史尤嗜左氏𫝊好為詩善筆札凡郵亭佛寺多有留題之迹及其遇禍燕趙之士}
