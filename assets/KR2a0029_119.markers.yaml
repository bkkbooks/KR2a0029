  - {type: variant, offset: 29, length: 1, content: 是, WYG: 禮部侍郎烏震冀州信都人也少孤自勤於鄉校弱冠從軍初為鎮州隊長以功漸升部將與符習從征於河上頗得士心聞張文禮弑王鎔志復主讎震泣請行兵及恒陽文禮執其母妻洎兒女十口誘之不迴攻城日急文禮忿之咸割鼻斷腕不絶其膚放至軍門觀者皆不忍正視震一痛而止憤激奮命身先矢石鎮州平以功授震深趙二州刺史其性純質以清直御下在河北獨有政聲移易州刺史兼南北面}
