  - {type: variant, offset: 48, length: 0, content: '', WYG: 橋鎮遏都知兵馬使㑹淮冦大至圍迪州城象先殫力禦備時援兵未至頗懷憂沮一日登北城憇息樓堞之上怳然若寤夢人告曰我陳璠也嘗板築是城舊第猶在今為軍舍可為我立廟即助公隂兵象先納之翼日淮冦急攻其壘梯䡴角進是日州城幾陷頃之有大風雨居民望見城上兵甲無算冦不敢進即時退去象先方信神鬼之助乃為之立祠至令里人禱祝不輟三年權知洺州軍州事天祐三年授陳州刺史檢校司空是嵗陳州大水民饑有物生於野形類蒲萄其實可食貧民賴焉梁開平二年授左英武軍使再遷左神武右羽林統軍三年轉右衛上將軍封汝南縣男四年權知宋州留後到任五月改天平軍兩使留後時鄆境再饑户民流散象先即開倉賑恤䝉賴者甚衆五年梁祖北征以象先為鎮定東西行營都招討應接副使進封開國伯領兵攻蓚縣不克而還俄奉㫖自鄆赴闕鄆人遮留毁石橋而不得進乃自他門而逸尋授左龍武統軍兼得衛親軍都指揮使乾化三年與魏博節度使楊師厚合謀誅朱友珪於洛陽梁末帝即位以功授檢校太保同平章事遙領洪州節度使行開封尹判在京馬步諸軍進封開國公四年授青州節度使加檢校太傅未㡬移鎮宋州加檢校太尉象先在宋凡十年初梁祖領四鎮權兵十萬威震天下闗東藩守皆其將吏方面補授由其保薦四方輿金輦壁駿奔結轍納賂於其庭如是者十餘年寖成風俗藩侯牧守下逮羣吏罕有㢘白者率皆掊斂剥下以事權門象先恃甥舅之勢所至藩府侵刻誅求尤甚以此家財巨萬莊宗初定河南象先率先入覲輦珍幣數十萬遍賂權貴及劉皇后伶官巷伯居旬日内外翕然稱之初梁將未復官資者凡上章奏姓名而巳}
