  - {type: variant, offset: 38, length: 6, content: 震壬戌偽命濠, WYG: 長公主象先即梁祖之甥也性寛厚不忤於物㓜遇亂慨然有憂時之意象先嘗射一水中鳥不中箭落水中下貫雙鯉見者異之梁祖鎮夷門象先起家授銀青光禄大夫檢校太子賓客兼御史中丞景福元年自檢校左省常侍遷檢校工部尚書充元從馬軍指揮使兼左静邊都指揮使乾寧五年再遷檢校右僕射左領軍衛將軍同正充宣武軍内外馬步軍都指揮使光化二年權知宿州軍州事天復元年表授刺史充本}
