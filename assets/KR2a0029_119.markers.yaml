  - {type: 'tls:seg', offset: 0, content: '', id: KR2a0029_ZHSJ_119-d119p13s34}
  - {type: variant, offset: 1, length: 6, content: 得江淮舟船遂, WYG: 領鎮州乃割相衛二州置義寧軍以習為節度使習奏曰魏博六州見係霸府不宜遽有割隸但授臣河南一鎮臣自攻取乃授天平軍節度東南面招討使習有器度性忠壯自莊宗十年沿河戰守習常以本軍從心無顧望諸將服其為人同光初以習為邢州節度明年移鎮青州四年二月趙在禮盜據魏州習受詔以淄青之師進討至則㑹軍亂習乃退軍渡河明宗自鄴赴洛遣使召之習不時而至既至謁眀宗於胙縣霍彦威謂習曰主上所知者十人公在其四何猶豫乎習乃從眀宗入汴眀宗即位加兼侍中}
