markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書舊五代史巻五十九宋門下侍郎參知政事監修國史薛居正等撰唐書第三十五列𫝊十一丁會字道隠夀州夀春人父季會幼放蕩縱横不治農産恒隨哀挽者學紼謳尤嗜其聲既長遇亂合雄兒為盜有志功名黄巢渡淮會從梁祖為部曲梁祖鎮汴會厯都押衙自梁祖誅宗權併時溥屠朱瑄走朱瑾會恒以兵從多立竒功文徳中表授懷州刺史厯滑州留後河陽節度使檢校司徒自河陽以疾致政於洛陽梁祖季年猜忌故将功大者多遭族滅會隂有避禍之志稱疾者累年天復元年梁祖菴有河中晉絳乃起會為昭義節度使昭宗幸洛陽加同平章事其年昭宗遇弑哀問至㑹三軍縞素流涕久之時梁祖親討劉守文於滄州駐軍於長蘆三年十二月王師攻㑹居旬日㑹以潞州歸於武皇北夢瑣言梁祖雄猜疑忌功臣忽謂敬翔曰吾夢丁㑹在前祗侯吾将乘馬欲出圉人以馬就臺忽為丁㑹跨之以出時夢中怒叱喝數聲因驚覺甚惡之是月丁㑹舉潞州軍民歸於河東矣引見㑹泣曰臣非不能守潞但以汴王簒弱唐祚猜嫌舊將臣雖䝉保薦之㤙而不忍相從今所謂吐盜父之食以見王也武皇納之賜甲第於太原位在諸將上五年汴將李思安圍潞州以會為都招討使檢校太尉莊宗嗣王位與㑹決謀破汴軍於夾城七年十一月卒於太原莊宗即位追贈太師有子七人知沆為梁祖所誅餘皆厯内職閻寶字瓊美鄆州人父佐海州刺史寶少事朱瑾為牙將瑾之失守於兖也寶與瑾将胡規康懷英歸汴梁皆擢任之自梁祖陳師河朔争霸闗西寶與葛從周丁會賀徳倫李思安各為大將統兵四出所至立功厯洺隨宿鄭四州刺史天佑六年梁祖以寶為邢洺節度使檢校太傅莊宗定魏博十三年攻相衛洺磁下之寶獨保邢州城孤援絶八月寶以邢州降莊宗嘉之進位檢校太尉同平章事遙領天平軍節度使東南面招討等使待以賓禮位在諸将上每有謀畫與之參決契丹之冦幽州周徳威危急寶與李存審從明宗擊契丹於幽州州西北解圍而還胡栁之役諸軍逗撓汴軍登無石山其勢甚盛荘宗望之畏其不敵且欲保營寶進曰王深入敵境偏師不利王彦章騎軍巳入濮州山下唯列步兵向晩皆有歸志我盡鋭擊之敗走必矣今若引退必為所乗我軍未集更聞賊勝即不戰而自潰也凡決勝料情情勢巳得斷在不疑今王之成敗在此一戰若不決勝設使餘衆渡河河朔非王有也王其勉之莊宗聞之聳聼曰微公㡬失計即引騎大譟奮矟登山大敗汴人十八年張文禮殺王鎔叛寶帥師進討八月収趙州進渡滹水擒賊黨張友順以獻九月進逼真定結營西南隅掘塹柵以環之決大悲寺漕渠以浸其郛十九年正月契丹三十萬乗援鎮州前鋒至新樂衆心憂之寶見莊宗指陳方略軍情乃安敵退加檢校侍中三月城中饑王處瑾之衆出城求食寶縱其出伏兵截擊之饑賊大至諸軍未集為賊所乗寶乃収軍退保趙州因慙憤成疾疽發背而卒時年六十同光初追贈太師晉天福中追封太原郡王有子八人宏倫宏儒皆位至郡守符習趙州昭慶縣人少從軍事節度使王鎔積功至列校自莊宗經略河朔與鎔連衡常令習率師從莊宗征討鎔為張文禮所害時習在徳勝寨文禮上書請習等歸鎮習雨泣訢於莊宗曰臣本趙人家世事王氏故使嘗授臣一劍俾臣平蕩兇冦自聞變故徒懷寃憤欲以自剄無益於營魂且文禮乃幽滄叛將趙王知人不盡過意任使致被反噬臣雖不武願在霸府血戰而死不能委身於兇首莊宗曰爾既懷舊君之愛可復仇乎吾當助爾習等舉身投地號痛感激謝曰王必以故使而輔翼之勞雪其寃恥臣不敢期師旅為助但悉本軍可以誅其逆䜿莊宗即令閻寳史建瑭助習討文禮乃以習為成徳軍兵馬留後及文禮誅將正授節鉞習不敢當其任辭曰臣縁故使未葬又無嗣息臣合服斬縗候臣禮制畢聽命及荘宗}
