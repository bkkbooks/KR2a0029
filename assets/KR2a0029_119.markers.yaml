  - {type: variant, offset: 8, length: 0, content: '', WYG: 歸本鎮屬青州守將王公儼拒命復授習天平軍節度使四年移汴州節度使宋史顔衎𫝊天成中為鄒平令符習初鎮天平習武臣之㢘慎者以書告屬邑毋聚斂為獻賀衎未領書以故規行之尋為吏}
  - {type: variant, offset: 8, length: 0, content: '', krp: 歸本鎮屬青州守將王公儼拒命復授習天平軍節度使四年移汴州節度使宋史顔衎𫝊天成中為鄒平令符習初鎮天平習武臣之㢘慎者以書告屬邑毋聚斂為獻賀衎未領書以故規行之尋為吏}
