  - {type: variant, offset: 35, length: 1, content: 江, krp: 河中節度使重盈之諸子也天復初梁祖既平河中追念王氏舊恩辟瓚為賓佐梁祖即位厯諸衛大將軍兖華兩鎮節度使開封尹貞明五年代賀瓌統軍駐於河上時李存審築壘於徳勝渡秋八月瓚率汴軍五萬自黎陽渡河將掩擊魏州眀宗出師拒之瓚至頓邱而旋於楊村夾河築壘架浮航自滑饋運相繼瓚嚴於軍法令行禁止然㡬略應變則非所長十一月瓚率其衆觀兵於戚城明宗以前鋒擊之復獲將李立十二月邏騎報汴之饋糧千計沿河而下可掩而取之莊宗遣徒兵五千設伏以待之使騎軍循河}
  - {type: variant, offset: 37, length: 0, content: '', WYG: 岸西上俘獲饋役數千瓚結陣河曲以待王師既而兵合一戰敗之瓚衆走保南城瓚以小舟北渡僅免是日獲馬千餘匹俘斬萬級王師乗勝徇地曹濮梁主以瓚失律令戴思逺代還及王師襲汴時瓊為開封府尹梁主聞王師將至自登建國門樓日夜垂泣時持國寶謂瓚曰吾終保有此者繫卿耳令瓚閲市人散徒登城為備洎明宗至封邱門瓚開門迎降翼日莊宗御𤣥徳殿瓚與百官待罪及進幣馬詔釋之仍令収梁主屍備槥櫝權厝于佛寺漆首函送於郊社居數日段凝上疏奏梁朝掌事權者趙巖等並助成虐政結怨於人聖政惟新宜誅首惡以謝天下於是張漢傑張漢融張漢倫張希逸趙縠朱珪等並族誅家財籍没瓚聞諸族當法憂悸失次毎出則與妻子訣别郭崇韜遣人慰譬之詔授宣武軍節度副使知府事檢校太傅如故歐陽史瓚伏地請死莊宗勞而起之曰朕與卿家世婚姻然人臣各為主耳復何罪耶因以為開封尹遷宣武軍節度使瓚心憂疑成疾十二月卒贈太子太師瓚雖為治嚴肅而慘酷有家世風自厯守藩鎮頗能除盜而明不能照下及尹政京邑委政於愛壻牙將幸廷蔚曲法納賄因縁為奸初汴人駐軍於河上軍計不足瓚請率汴之富户出助軍錢賦取不均人靡控訢至有雉經者又有富室致賂幸而免率者及明宗即位素知廷蔚之奸乃勒歸田里然瓚能優禮搢紳抑挫豪猾故當時士流皆稱仰焉袁象先宋州下邑人也自稱唐中宗朝中書令南陽郡王恕巳之後曾祖進朝成都少尹梁以象先貴累贈左僕射祖忠義忠武軍節度判官累贈司空父敬初太府卿累贈司徒駙馬都尉敬初娶梁祖之妹初封沛郡太君開平中追封長公主貞明中追封萬安}
