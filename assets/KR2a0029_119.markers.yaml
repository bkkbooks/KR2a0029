  - {type: variant, offset: 48, length: 0, content: '', krp: 橋鎮遏都知兵馬使㑹淮冦大至圍迪州城象先殫力禦備時援兵未至頗懷憂沮一日登北城憇息樓堞之上怳然若寤夢人告曰我陳璠也嘗板築是城舊第猶在今為軍舍可為我立廟即助公隂兵象先納之翼日淮冦急攻其壘梯䡴角進是日州城幾陷頃之有大風雨居民望見城上兵甲無算冦不敢進即時退去象先方信神鬼之助乃為之立祠至令里人禱祝不輟三年權知洺州軍州事天祐三年授陳州刺史檢校司空是嵗陳州大水民饑有物生於野形類蒲萄其實可食貧民賴焉梁開平二年授左英武軍使再遷左神武右羽林統軍三年轉右衛上將軍封汝南縣男四年權知宋州留後到任五月改天平軍兩使留後時鄆境再饑户民流散象先即開倉賑恤䝉賴者甚衆五年梁祖北征以象先為鎮定東西行營都招討應接副使進封開國伯領兵攻蓚縣不克而還俄奉㫖自鄆赴闕鄆人遮留毁石橋而不得進乃自他門而逸尋授左龍武統軍兼得衛親軍都指揮使乾化三年與魏博節度使楊師厚合謀誅朱友珪於洛陽梁末帝即位以功授檢校太保同平章事遙領洪州節度使行開封尹判在京馬步諸軍進封開國公四年授青州節度使加檢校太傅未㡬移鎮宋州加檢校太尉象先在宋凡十年初梁祖領四鎮權兵十萬威震天下闗東藩守皆其將吏方面補授由其保薦四方輿金輦壁駿奔結轍納賂於其庭如是者十餘年寖成風俗藩侯牧守下逮羣吏罕有㢘白者率皆掊斂剥下以事權門象先恃甥舅之勢所至藩府侵刻誅求尤甚以此家財巨萬莊宗初定河南象先率先入覲輦珍幣數十萬遍賂權貴及劉皇后伶官巷伯居旬日内外翕然稱之初梁將未復官資者凡上章奏姓名而巳}
  - {type: variant, offset: 49, length: 1, content: 廷, WYG: 崇韜奏曰河南征鎮將吏昭洗之後未有新官每上表章但書名姓未頒綸制必負憂疑即日復以象先為宋亳耀輝穎節度使依前檢校太尉平章事仍賜姓名紹安尋令歸鎮明年以郊禮象先復來朝是時制改宋州宣武軍為歸徳軍因侍宴莊宗}
  - {type: variant, offset: 49, length: 1, content: 廷, krp: 崇韜奏曰河南征鎮將吏昭洗之後未有新官每上表章但書名姓未頒綸制必負憂疑即日復以象先為宋亳耀輝穎節度使依前檢校太尉平章事仍賜姓名紹安尋令歸鎮明年以郊禮象先復來朝是時制改宋州宣武軍為歸徳軍因侍宴莊宗}
  - {type: punctuation, offset: 51, content: (, id: KR2a0029_ZHSJ_119-bkkpn9}
  - {type: variant, offset: 51, length: 0, content: '', WYG: 象先曰歸徳之名無乃著題否象先拜謝而退即命歸鎮其年夏以疾卒於理所年六十一冊贈太師周廣順中贈中書令追封是國公象先二子長曰正辭歴衢雄二州刺史次曰􅀢周顯徳中終於滄州節度使張温字徳潤魏州魏縣人也始仕梁祖為步直小將改崇明都校貞明初蔣殷以徐州叛從劉鄩討平之改左右捉生都指揮使莊宗伐邢臺獲之用為永清都厯校武州刺史山後八軍都將從莊宗襲契丹於幽州収新州厯銀槍効義都指揮使再任武州刺史同光初契丹陷媯儒檀順平薊六州武州獨全改授蔚州刺史天成初厯振武昭武留後尋授利州節度使入為右衛上將軍無㡬授洋州節度使右龍武統軍改雲州節制清泰初屯兵鴈門逐契丹出塞移鎮晉州嬰疾而卒詔贈太尉李紹文鄆州人本姓張名從楚少事朱瑄為帳下瑄敗歸於梁祖為四鎮牙校累典諸軍天祐八年從王景仁戰敗於柏鄉紹文與别將曹儒収殘衆退保相州王師之攻魏州也紹文率衆自黎陽渡河一時汴人大恐河無舟楫紹文懼為王師所逼乃剽黎陽臨河内黄至魏州歸於莊宗莊宗嘉納之賜姓名分其兩將三千人為左右匡霸軍旅仍令紹文曹儒分將之從周徳威討劉守光進檢校司空移將匡衛軍十二年授博州刺史預破劉鄩於故元城歴貝隰代三郡刺史領天雄軍馬步副都將屯於徳勝從閻寶討張文禮為馬步軍都虞候明宗収鄆州以紹文為右都押牙馬步軍都將從破王彦章於中都同光中厯徐滑二鎮副使知府事三年從}
