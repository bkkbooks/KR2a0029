  - {type: variant, offset: 35, length: 1, content: 江, WYG: 河中節度使重盈之諸子也天復初梁祖既平河中追念王氏舊恩辟瓚為賓佐梁祖即位厯諸衛大將軍兖華兩鎮節度使開封尹貞明五年代賀瓌統軍駐於河上時李存審築壘於徳勝渡秋八月瓚率汴軍五萬自黎陽渡河將掩擊魏州眀宗出師拒之瓚至頓邱而旋於楊村夾河築壘架浮航自滑饋運相繼瓚嚴於軍法令行禁止然㡬略應變則非所長十一月瓚率其衆觀兵於戚城明宗以前鋒擊之復獲將李立十二月邏騎報汴之饋糧千計沿河而下可掩而取之莊宗遣徒兵五千設伏以待之使騎軍循河}
