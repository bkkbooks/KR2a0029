  - {type: variant, offset: 528, length: 107, content: 景請委國事於齊丘景繇是御之及吳人遣鍾謨李德明奉表至行在帝尋遣德明復命於金陵德明因說李景請割江北之地求和於我而陳覺李徵古等以德明為賣國請戮之景遂殺德明及江南內附帝放鍾謨南歸謨本德明之黨也因譖齊丘等故齊丘等得罪放齊丘歸, WYG: 潼闗擒劉知浣見梁紀此𫝊不載舊五代史巻五十}
