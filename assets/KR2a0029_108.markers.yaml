  - {type: variant, offset: 4677, length: 1363, content: 隱帝嗣位詔贈右僕射永樂大典卷五百三十二劉鼎字公度徐州蕭縣人祖泰蕭縣令父崇梁太祖微時常傭力崇家及即位召崇用之歷殿中監商州刺史崇之母撫梁祖有恩梁氏號為國婆徐宋之民謂崇家為豢龍劉家鼎起家為大理評事歷尚書博士殿中侍御史起居郎清泰中自吏部員外郎出為渾州廉判入為刑部郎中充鹽鐵判官改吏部郎中兼侍御史知雜事乾祐初拜諫議大夫卒年五十五鼎善交游能談笑居家仁孝事繼母趙氏甚謹異母昆仲凡七人撫之如一性若寬易而典選曹按吏有風稜人稱為能子衮登進士第文彩遒雋仕周為左拾遺直史館早卒永樂大典卷九千九十九張允鎮州束鹿人父徵允幼學為儒仕本州為參軍張文禮之據州叛莊宗致討允隨文禮子處瑾請降於鄴不許與處瑾並繫於獄處瑾原本作處謹今從歐陽史改正影庫本粘籤鎮冀平宥之留於鄴署本府功曹趙在禮嬰城叛署節度推官從歷滄兗二鎮書記入為監察御史歷右補闕起居舍人充弘文館直學士水部員外郎知制誥清泰初皇子重美為河南尹典六軍諸衞事時朝廷選擇參佐以允剛介改給事中充六軍判官尋罷職轉左散騎常侍晉天福初允以國朝頻有肆赦乃進駮赦論曰管子云凡赦者小利而大害久而不勝其禍無赦者小害而大利久而不勝其福又漢紀云吳漢疾篤帝問所欲言對曰唯願陛下無為赦耳如是者何蓋行赦不以為恩不行赦亦不以為無恩為罰有罪故也竊觀自古帝王皆以水旱則降德音而宥過開狴牢以放囚冀感天心以救其災者非也假有二人訟一有罪一無罪若有罪者見捨則無罪者銜寃銜寃者彼何疏見捨者此何親乎如此則是致災之道非救災之術也自此小民遇天災則喜皆相勸為惡曰國家好行赦必赦我以救災如此即是國家教民為惡也且天道福善禍淫若以捨為惡之人而便變災為福則又是天助其惡民也細而究之必不然矣儻或天降之災蓋欲警誡人主節嗜欲務勤儉恤魚眾寡正刑罰不濫捨有罪不僭殺無辜使美化行於下聖德聞於上則雖有水旱亦不為沴矣豈以濫捨有罪而反能救其災乎彰其德乎是知赦之不可行也明哉帝覽而嘉之降詔奬飾仍付史館五年遷禮部侍郎凡三典貢部改御史中丞轉兵部侍郎知制誥充翰林學士承旨契丹入京城落職守本官案東都事略劉溫叟傳契丹入京師溫叟懼隨契丹北徙與承旨張允求去職契丹主怒欲黜為縣令趙延壽曰學士不稱職而求解者罷之可也得不黜乾祐初授吏部侍郎自誅史弘肇後京城士庶連甍恐悚允每朝退即宿於相國寺僧舍及北軍入京師允匿於佛殿藻井之上墜屋而卒時年六十五子鸞仕皇朝為太常少卿永樂大典卷六千三百五十一任延皓幷州人也業術數風雲之事晉高祖在太原重圍時高祖最為親要延皓以本業請見高祖甚加禮遇晉天福初延皓授太原掾尋改交城文水令皆高祖慰薦之力也高祖鎮太原延皓多言外事出入無間高祖左右皆憚之在文水聚斂財賄民欲陳訴延皓知之一日先誣告縣吏結集百姓欲劫縣庫高祖怒遣騎軍併擒縣民十數族誅之寃枉之聲聞於行路高祖即位累官至殿中監恃寵使氣人望而畏之雖宰輔之重延皓視之蔑如也劉崇在河東常日切齒及魏王承訓薨歸葬太原令延皓擇葬地時有山岡僧謂劉崇曰魏王葬地不吉恐有重喪未幾高祖崩崇以僧言奏之乃配流延皓於麟州路由文水市民擲瓦毆罵甚衆吏人救之僅免既至貶所劉崇令人殺之籍沒其家永樂大典卷九千三百五十一史臣曰李崧仕唐晉之兩朝聳伊臯之重望考其器業無忝台衡會多僻之朝被參夷之戮人之不幸天亦難忱逢吉秉蛇虺之心竊夔龍之位殺人不忌與國俱亡李崧之寃血未銷逢吉之梟首斯至冥報之事安可忽諸自李鏻而下凡數君子者皆踐履朝行彰施帝載國華邦直斯焉在哉惟延皓之醜行宜乎不得其死矣永樂大典卷九千三百五十一, WYG: 攷證}
