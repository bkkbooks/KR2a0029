  - {type: variant, offset: 174, length: 239, content: 於尺牘往來章表論列稍須文理合宜李侍御起草未能盡善呂曰公試代為之呂得崧所作示盧質馮道皆稱之繇是擢為興聖宮巡官獨掌奏記莊宗入洛授太常寺協律郎王師伐蜀繼岌為都統以崧掌書記蜀平樞密使郭崇韜為宦官誣搆繼岌遂殺崇韜父子外尚未知崧白繼岌曰王何為作此危事至於不容崇韜至洛誅之未晚今懸軍五千里無咫尺書詔便殺重臣非謀也繼岌曰吾亦悔之崧召書吏三四人登樓去梯取黃紙矯寫詔書倒使都統印發之翌日告諸軍軍情稍定及自蜀還案歐陽史師還繼岌死於道崧至京師明宗革命任圜以宰相判三司用崧為鹽鐵推官賜緋丁內艱歸鄉里服闋鎮, WYG: 将}
