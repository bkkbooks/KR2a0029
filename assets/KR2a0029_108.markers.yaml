吉深文好殺從高祖在太原時嘗因事高祖命逢吉靜獄以祈福祐逢吉盡殺禁囚以報及執朝政尤愛刑戮朝廷患諸處盜賊遣使捕逐逢吉自草詔意云應有賊盜其本家及四鄰同保人並仰所在全族處斬或謂逢吉曰為盜者族誅猶非王法鄰保同罪不亦甚乎逢吉堅以為是竟去全族二字時有鄆州捕賊使臣張令柔盡殺平陰縣十七村民平陰原本作手除今從通鑑改正影庫本粘籤良由此也逢吉性侈靡好鮮衣美食中書公膳鄙而不食私庖供饌務盡甘珍嘗於私第大張酒樂以召權貴所費千餘緡其妻武氏卒葬送甚盛班行官及外州節制有與逢吉相款洽者皆令齎送綾羅絹帛以備縞素失禮違度一至如此又性不拘名教繼母死不行服妻死未周其子並授官秩有庶兄自外至不白逢吉便見諸子逢吉怒且懼他日凌弱其子息乃密白高祖誣以他事杖殺之乾祐二年秋加守司空周太祖之將鎮鄴也逢吉奏請落樞密使隱帝曰有前例否逢吉奏白樞密之任方鎮帶之非便史弘肇曰兼帶樞密所冀諸軍稟畏竟從弘肇之議弘肇怨逢吉之異己逢吉曰此國家之事也且以內制外則順以外制內豈得便耶事雖不從物議多之居無何王章張飲會逢吉與史弘肇有謔言大為弘肇所詬逢吉不校幾至毆擊逢吉馳馬而歸自是將相失歡逢吉欲希外任以紓弘肇之怒既而中輟人問其故逢吉曰苟領一方鎮祇消得史公一處分處分原本作虛分考通鑑云逢吉欲求外鎮以避之既而中止曰吾去朝廷止煩史公一處公吾齏粉矣今改正影庫本粘籤則為齏粉矣李業輩惡弘肇楊邠等逢吉知之每見業等即微以言激怒之及弘肇等被害逢吉不預其謀聞變驚駭即受宣徽權知樞密院事尋令草制正授制入聞鄴兵至澶州乃止事急逢吉謂人曰蕭牆之變太覺匆遽主上若有一言見問必不至是矣數夕宿於金祥殿之東謂天官正王處訥曰夜來就枕未瞑已見李崧在傍生人與死人相接無吉事也及周太祖自鄴至汴官軍敗於劉子陂是夕逢吉宿於七里郊與同舍痛飲醉將自刎左右止之至曙與隱帝同抵民舍遂自殺周太祖定京城與聶文進等同梟於北市釋其家族其梟首之所適當李崧寃死之地廣順初詔就西京賜其子莊宅各一區永樂大典卷二千三百九十二五代史補高祖在河東幕府闕書記朝廷除前進士丘廷敏為之以高祖有異志恐為所累辭疾不赴遂改蘇逢吉未幾契丹南侵高祖仗順而起兵不血刃而天下定逢吉以佐命功自掌書記拜中書侍郎平章事逾年廷敏始選授鳳翔麟遊縣令過堂之日逢吉戲之且撫所坐椅子曰合是長官坐何故讓與鄙夫耶廷敏遂慚悚而退李鏻唐宗屬也父洎韶州刺史伯父湯咸通中為給事中懿宗除乳母楚國夫人壻為夏州刺史湯封還制書詔曰朕少失所親若非楚國夫人鞠養則無朕此身雖非朝典望卿放下仍今後不得援以為例湯乃奉詔其諒直如此鏻少舉進士累舉不第客游河朔稱清海軍掌書記謁定州王處直不見禮鏻即脫綠被緋入常山謁要人李弘規以宗姓請兄事之由是得進案歐陽史云鏻為人利口敢言趙王鎔辟為從事鎔卒復為王德明賓客德明使鏻聘於唐莊宗鏻密疏德明之罪且言可圖之狀莊宗嘉之及常山平以鏻為霸府支使嘗從容請於莊宗曰鏻有四子請誅之莊宗問其故對曰此輩生於常山稟勃亂之氣不可留也莊宗笑而止同光初授宗正卿俄兼工部侍郎常山有唐啟運陵鏻受富民李守恭賂署為陵臺令守恭暴橫為長吏所訴按之以聞鏻左授司農少卿削金紫未幾出為河府副使明宗即位歷兵部戶部侍郎工部戶部尚書長興中以與明宗有舊常貯入相之意從容謂時相曰唐祚中興宜敦宗室才高者合居相位僕雖不才曾事莊宗霸府見今上於藩邸時家代重侯累相靖安李氏不在諸侯之下論才較藝何讓衆人久置僕於朝行諸君安乎馮道趙鳳每怒其僭有頃鏻因淮南細人言事乃謂樞密使安重誨曰偽吳欲歸國久矣若朝廷先遣使諭之則旋踵而至矣重誨然之以玉帶與細人令往淮南為信久而不反由是出鏻為兗州行軍司馬得代歸闕復為戶部尚書尋轉兵部尚書有頃兼判太常卿事嘗權典選部銓綜失序物論非之晉天福中守太子少保開運中遷太子太保高祖至闕授守司徒數月而卒年八十八詔贈太傅永樂大典卷一萬三百九十龍敏字欲訥欲訥原本作慾誨今從太平御覽改正影庫本粘籤幽州永清人少學為儒仕鄉里為假掾劉守光不道敏避地浮陽會戴思遠渡河而南乃從之鄉人周知裕仕梁為裨將敏往依焉知裕屢薦不調敏丐游都邑累年唐莊宗定魏博敏聞故人馮道為霸府記室乃客于河中歲歸太原館於馮道之家監軍使張承業即署敏為巡官典監軍奏記莊宗平河洛徵為司門員外郎以家貧乏養求為興唐少尹踰年丁母喪退居鄴下會趙在禮據鄴城以敏鄉人強起令署事又為亂軍所迫敏不敢拒明年在禮鎮浮陽敏復居喪制服闋除戶部郎中改諫議大夫御史中丞時敏父咸式年七十咸式之父年九十餘供養二尊朝夕無懈咸式以敏貴得祕書監致仕敏為兵部侍郎奉使幽州鄉里耆舊留宴盡歡馮贇為北京留守奏敏為副贇入掌樞機敏為吏部侍郎敏學術不甚長炙外柔而內剛愛決斷大計清泰末從唐末帝在懷州時趙德鈞父子有異圖晉安砦旦夕憂陷末帝計無從出問計於從臣敏奏曰臣有一計請以援兵從東丹王李贊華取幽州路趨西樓契丹主必有北顧之患末帝然之而不能用敏又謂末帝親將李懿案通鑑作前鄭州防禦使李懿舊五代史考異曰君連姻帝戚社稷之危不俟翹足安得默默苟全耶懿因籌德鈞必破蕃軍之狀敏曰僕燕人也諳趙德鈞之為人膽小謀拙所長者守城砦嬰壕塹篤勵健兒耳若見大敵奮不顧身摧堅陷陣必不能矣況名位震主姦以謀身乎僕有狂策不知濟否苟能必行亦救寨之一術也懿請言之曰如聞駕前馬僅有五千匹請於其間選擇壯馬精甲健夫千人僕願得與郎萬金二人案通鑑云郎萬金為陳州刺史胡三省云萬金當時勇將也舊五代史考異由介休介休原本脫介字今據通鑑增入影庫本粘籤路出山夜冒敵騎循山入大砦千騎之內得其半濟則砦無虞矣張敬達等幽閉不知朝廷援兵近遠若知大軍在團柏谷中有鐵障亦可衝踏況敵騎乎末帝聞之曰龍敏之心極壯用之晚矣人亦以為大言然其慷慨感激皆此類也晉祖受命敏以本官判戶部遷尚書左丞丁父憂服闋復本官遷太常卿開運中奏命使越先是朝臣將命必拜起於浙帥敏至抗揖而已識者多之使還改工部尚書, krp: ''}
