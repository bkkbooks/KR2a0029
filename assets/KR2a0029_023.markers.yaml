  - {type: variant, offset: 815, length: 0, content: '', WYG: 二十三日追冊曰元貞皇后又北夢瑣言云梁祖魏國夫人張氏碭山富室女父㽔曽為宋州刺史温時聞張有姿色私心傾慕有麗華之歎及温在同州得張於兵間因以婦禮納之温以其宿欵深加禮異張賢明有禮温雖虎狼其心亦所敬伏每軍謀國計必先賢訪或巳出}
