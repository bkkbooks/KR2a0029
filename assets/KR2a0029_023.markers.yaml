  - {type: variant, offset: 816, length: 1, content: 範, krp: 中途有所不可張氏一介請旋如期而至其信重如此初收兖鄆得朱瑾妻温}
  - {type: variant, offset: 818, length: 3, content: 降且言, WYG: 之曰彼既無依寓於輜車張氏遣人召之瑾妻再拜張氏答拜泣下謂之曰兖鄆與司空同姓之國昆仲之間以小故尋戈致吾姒如此設不幸汴州失守妾亦似吾姒之今日也又泣下乃度為尼張恒給其費張既卒繼寵者非人及僭號後大縱朋淫骨月聚麀帷薄荒穢以致友珪之禍起於婦人殆能以柔婉之徳制豹虎之心如張氏者不亦賢乎案五代會要所載内職有梁太祖昭儀陳氏昭容李氏歐陽史並見家人傳末帝徳妃張氏五代㑹要云少帝妃張氏乾化五年九月二十四日册為徳妃其夕薨案歐陽史次妃郭氏傳云晉天福三年詔太社}
