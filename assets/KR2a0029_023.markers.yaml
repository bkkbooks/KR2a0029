  - {type: variant, offset: 1521, length: 1045, content: 魏博楊師厚卒朝廷分相魏為兩鎮遣鄩率大軍屯南樂以討王鎔為名既而魏軍果亂囚節度使賀德倫送款於太原六月晉王入魏州鄩以精兵萬人自洹水移軍魏縣晉王來覘鄩設伏於河曲叢木間俟晉王至大譟而進圍之數匝殺獲甚衆晉王僅以身免案通鑑作晉王帥騎馳突所向披靡自午至申乃得出亡其七騎而薛史以為殺獲甚衆晉王僅以身免蓋當時梁唐二史各有夸張掩飾故所紀互異如此通鑑所載當是據唐實錄是月鄩潛師由黃澤西趨太原將行慮為晉軍所追乃結蒭為人縛旗於上以驢負之循堞而行數日晉人方覺軍至樂平會霖雨積旬師不克進鄩即整衆而旋魏之臨清積粟之所鄩引軍將據之遇晉將周陽五自幽州率兵至鄩乃取貝州與晉軍遇於堂邑鄩邀擊却之追北五十餘里遂軍於莘縣增城壘浚池隍自莘及河築甬道以通餉路八月末帝賜鄩詔曰閫外之事全付將軍河朔諸州一旦淪沒勞師弊旅患難日滋退保河壖久無鬬志昨東面諸侯奏章來上皆言倉儲已竭飛輓不充于役之人每遭擒擄夙宵軫念惕懼盈懷將軍與國同休當思良畫如聞寇敵兵數不多宜設機權以時剪撲則予之負荷無累先人鄩奏曰臣受國深恩忝茲閫政敢不枕戈假寐罄節輸忠昨者比欲西取太原斷其歸路然後東收鎮冀解彼連鷄止於旬時再清河朔豈期天方稔亂國難未平纔出師徒積旬霖潦資糧殫竭軍士札瘥切慮蒼黃乖於統攝乃詢部伍皆欲旋歸凡次舍經行每張犄角又欲絕其餉道且據臨清纔及宗城纔及宗城原本脫城字今據通鑑增入影庫本粘籤周陽五奄至騎軍馳突變化如神臣遂領大軍保於莘縣深溝高壘享士訓兵日夜戒嚴伺其進取偵視營壘兵數極多樓煩之人皆能騎射最為勍敵未可輕謀臣若苟得機宜焉敢坐滋患難臣心體國天鑒具明末帝又遣使問鄩決勝之策鄩曰臣無奇術但人給糧十斛盡則破敵末帝大怒讓鄩曰將軍蓄米將療饑耶將破賊耶乃遣中使督戰鄩集諸校而謀曰主上深居宮禁未曉兵機與白面兒共謀終敗人事大將出征君命有所不受臨機制變安可預謀今揣敵人未可輕動諸君更籌之時諸將皆欲戰鄩默然他日復召諸將列坐軍門人具河水一器因命飲之衆未測其旨或飲或辭鄩曰一器而難若是滔滔河流可勝既乎衆皆失色居數日鄩率萬餘人薄鎮定之營時鄩軍奄至上下騰亂殺獲甚衆少頃晉軍繼至乃退二年三月鄩自莘引軍襲魏州與晉王戰於故元城王師敗績鄩脫身南奔自黎陽濟河至滑州尋授滑州節度使詔屯黎陽三年二月晉王悉衆來攻黎陽鄩拒之而退及鄩歸闕再授開封尹領鎮南軍節度使其年河朔失守朝廷歸咎於鄩鄩亦不自安上表避位九月落平章事授亳州團練使𩗗州原本作高州今據歐陽史改正影庫本粘籤屬淮人寇蔡潁亳三郡鄩奉命渡淮至霍丘大殲賊黨五年兗州節度使張萬進反北結晉人為援末帝遣鄩攻之鄩為兗州安撫制置使是冬萬進危小將邢師遇潛應王師遂拔其城梟萬進首以獻, WYG: ''}
