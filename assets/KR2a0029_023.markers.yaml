  - {type: variant, offset: 2598, length: 609, content: 州尹皓攻取同州先是河中朱友謙襲取同州以其子令德為留後表請旄鉞末帝怒命鄩討之其年九月晉將李嗣昭率師來援戰於城下王師不利敗兵走河南橋梁陷溺死者甚衆鄩以餘衆退保華州羅文寨先是鄩與河北朱友謙為婚家及王師西討行次陝州鄩遣使齎檄與友謙諭以禍福大計誘令歸國友謙不從如是停留月餘尹皓段凝輩素忌鄩遂搆其罪言鄩逗留養寇俾俟援兵末帝以為然及兵敗詔歸洛河南尹張宗奭承朝廷密旨逼令飲酖而卒案通鑑考異引莊宗實錄云憂恚發病卒通鑑從薛史時年六十四詔贈中書令子遂凝遂雍別有傳永樂大典卷一萬八千一百二十六賀瓌字光遠濮陽人也曾祖延以瓌貴贈左監門上將軍祖華贈左散騎常侍父仲元贈刑部尚書瓌少倜儻負雄勇之志遇世亂入軍朱瑄為濮州刺史兼鄆州馬步軍都指揮使拔為小將唐光啟初鄆州三軍推瑄為留後以瓌為馬步軍都指揮使表授檢校工部尚書及瑄與太祖搆隙瓌受瑄命數領軍於境上乾寧二年十月太祖親征兗鄆十一月瑄遣瓌與太原將何懷寶率兵萬餘人以援朱瑾師次待賓館待賓館原本作待實館今據通鑑改正影庫本粘籤斷我糧運太祖偵知之自中都引軍夜馳百餘里遲明至鉅野東與瓌等接戰兗人大敗瓌竄於棘塚之上大呼曰我是鄆州都將賀瓌願就擒幸勿傷也太祖聞之馳騎至塚前遂擒之幷獲何懷寶及將吏數十人徇於兗壁之下悉命戮之唯留瓌一人釋縛置之麾下尋署為教練使奏授檢校左僕射瓌感太祖全宥之恩私誓以身報國天復中預平青州王師範以功授曹州刺史兼先鋒都指揮使加檢校司空天祐二年與楊師厚從太祖平荊襄授荊南兩使留後未幾徵還為行營左廂步軍都指揮使, WYG: 公主}
