  - {type: variant, offset: 3521, length: 2282, content: 日晉王以輕騎挑戰瓌與彥章發伏兵奮擊晉王僅以身免先是瓌與彥章不協是歲冬十二月復為諸軍都虞候朱珪所搆瓌乃伏甲士殺彥章及濮州刺史孟審澄別將侯溫裕等於軍案玉堂閒話作侯溫疑傳聞之訛舊五代史考異案玉堂閒話梁朝與河北相持之際有偏將侯溫者軍中號為驍勇賀瓌為統率專制忌克以事殺之考侯溫裕作侯溫蓋傳聞之誤孔本以謀叛聞是月瓌與晉人大戰於胡柳陂晉人敗績臨陣斬晉將周陽五既晡瓌軍亦敗案歐陽史瓌陣無石山日暮晉軍攻之瓌軍下山擊晉軍瓌大敗據薛史莊宗紀與王建及傳乃是山為晉軍所奪晉軍下山擊瓌軍瓌大敗與歐陽史異五年春正月晉人城德勝夾河為柵四月瓌率大軍攻其南柵以艨艟戰艦阨其中流晉人斷我艨艟濟軍以援南柵瓌退軍於行臺尋以疾卒時年六十二詔贈侍中長子光圖仕後唐為供奉官永樂大典卷一萬八千一百二十七康懷英兗州人也本名懷貞避末帝御名故改之始以驍勇事朱瑾為列校唐乾寧四年春太祖既平鄆命葛從周乘勝急攻兗州時朱瑾在豐沛間搜索糧餉留懷英守其城及從周軍至懷英聞鄆失守乃出降太祖素聞其名得之甚喜尋署為軍校光化元年秋從氏叔琮伐襄漢懷英以一軍攻下鄧州三年從征河朔佐張存敬敗燕軍於易水之上天復元年冬太祖率師迎昭宗於鳳翔時李茂貞遣大將符道昭領兵萬餘屯武功以拒太祖命諸軍擊之以懷英為前鋒領衆先登一鼓而大破之擄甲士六千餘人奪馬二千匹翌日太祖方至顧左右曰邑名武功今首盪逆黨真武功也乃召懷英大加奬激仍以駿馬珍器賜之二年四月符道昭復領大軍屯於虢縣之漠谷其建寨之所前臨巨澗後倚峻阜險不可升太祖遣懷英提騎數千急擊之道昭以懷英兵寡有俯視之意乃率甲士萬人絕澗以挑戰懷英始以千騎夜鬬戰酣發伏以擊之岐軍大敗秋八月鄜帥李周彝屯軍於三原以援鳳翔太祖命懷英討之周彝拔軍而遁追至梨園因攻下翟州擒其守來獻俄而岐軍屯奉天太祖令懷英寨於岐軍之東北以備敵人一夕岐軍大至急攻其營懷英以夜中不可驚動諸軍獨以二千餘人抗數萬之衆自乙夜至四鼓身被十餘創岐軍不勝而退昭宗還京賜迎鑾毅勇功臣是歲淮人聞青兗之叛遣兵數萬以寇宿州太祖命懷英馳騎以救之淮人遁去即以懷英為權知宿州刺史天祐三年冬佐劉知俊破邠鳳之衆五萬於美原收五十餘寨乘勝引軍攻下鄜州以功授陝州節度使太祖受禪加檢校太保開平元年夏命將大軍以伐潞州將行太祖謂懷英曰卿位居上將勇冠三軍向來破敵摧鋒動無遺悔至於高爵重祿我亦無負於卿夫忠臣事君有死無二韓信所謂漢王載我以車衣我以衣食我以食食人之祿死人之憂我每思韓信此言真忠烈丈夫耳如丁會受我待遇之恩不謂不至懷黃拖紫裂土分茅設令木石偶人須感恩義一朝反噬倒戈授人苟有天道明神安能容此大凡辜恩負理忠良不為我今掃境內委卿卿當勉思竭盡况晉人新得上黨衆心未協和以十萬之師一舉可克予當置酒高會望卿歌舞凱旋懷英惶恐而退六月懷英領大軍至潞率衆晝夜攻城半月之間機巧百變懷英懼太祖之言期於必取乃築壘環城濬鑿池塹然而屢為晉將周德威騎軍所撓懷英不敢即戰太祖乃以李思安代之降為行營都虞候夏五月晉王率蕃漢大軍攻下夾城懷英逃歸詣銀臺門待罪太祖宥之改授右衞上將軍三年夏命為侍衞諸軍都指揮使尋出為陝州節度使兼西路行營副招討使及劉知俊奔鳳翔引岐軍以圖靈武太祖遣懷英率兵救之師次長城嶺為知俊邀擊懷英敗歸案歐陽史云還至昇平知俊掩擊之懷英大敗據通鑑懷貞等還至三水知俊遣兵據險邀之左龍驤軍使壽張王彥章力戰懷貞等乃得過懷貞與裨將李德遇許從實王審權分道而行皆與援兵不相值至昇平劉知俊伏兵山口懷貞大敗僅以身免德遇等軍皆沒蓋懷英過長城嶺之險已為邀擊後又敗於昇平也四年春移華州節度使乾化二年秋命為河中行營都招討使與晉軍戰於白徑嶺敗歸於陝末帝嗣位以岐軍屢犯秦雍命懷英為永平軍節度使大安尹累加官至中書令貞明中卒於鎮永樂大典卷一萬八千一百二十六王景仁案景仁本名茂章避梁諱改焉詳見通鑑注廬州合淝人材質魁偉性暴率無威儀善用槊頗推驍悍在淮南累職為都指揮使楊行密偽署宣州節度使行密死子渥自立忌其勇悍且有私憾欲害之案新唐書楊行密傳渥求茂章親兵不得宣輦帷帟以行茂章嫚罵不與踰年遣兵五千襲之茂章奔杭州與薛史異景仁棄宛陵以腹心百人歸吳越王錢鏐鏐辟為兩府行軍司馬具以狀聞太祖復命遙領宣州節度使檢校太傅同平章事案舊唐書天祐三年十二月詔淮南偽署宣歙觀察使檢校司徒王茂章可金紫光祿大夫檢校太保從錢鏐請也所載官爵與薛史異吳越備史作景仁領寧國軍節度使與薛史同舊五代史考異鏐以淮寇終為巨患欲速平之命景仁奉表至闕面陳水陸之計請合禁旅太祖異禮待之頒賜殊厚顧曰待我平代北寇當盡以王師付汝南討於是留京師每預丞相行列劉知俊之叛也從駕至陝始佐楊師厚西入關兵未交知俊棄馮翊走進克寸雍華降王建張君練頗預戰有功太祖嘉之時鎮定作逆朋附蕃醜遂擢為上將付步騎十萬為北面行營都招討使開平二年正月二日與晉軍戰於柏鄉王師敗績太祖怒甚拘之私第然以兩浙元勳所薦且欲收其後効止落平章事罷兵柄而已案歐陽史景仁及晉人戰大敗於柏鄉景仁歸訴於太祖太祖曰吾亦知之蓋韓勍李思安輕汝為客而不從節度爾與薛史異數月復其官爵末帝即位復用為南面北面行營招討應接使以兵萬餘人伐壽州至霍丘接戰案歐陽史作戰於霍山通鑑從薛史舊五代史考異擒賊將袁藂王彥威王璠等送京師俄而朱瑾以大軍至景仁力戰不屈常以數騎身先奮擊寇不敢逼乃引兵還及濟淮復為殿軍故不甚衄瑾亦不敢北渡案九國志朱景傳王茂章來寇度淮水可涉處立表識之景易置於深潭水中立表浮木之上茂章軍敗望表而涉溺死者大半積其尸為京觀是景仁實以敗歸傳云師不甚衄蓋梁史為景仁諱言也及歸病疽而卒詔贈太尉永樂大典卷六千八百五十史臣曰劉鄩以機略自負賀瓌以忠毅見稱懷英以驍勇佐時景仁以貞純許國較其器業皆名將也然雖有善戰之勞亦有敗軍之咎則知兵無常勝豈虛言哉然鄩之據兗州也盡誠於師範比跡於英公方之數侯加一等矣永樂大典卷六千八百五十, WYG: ''}
