  - {type: variant, offset: 554, length: 257, content: 不異於兒新婦已下並不失所劉將軍與爾各為其主爾其察之從周歔欷而退鄩料簡城中老疾及婦人浮食百姓不足與守者悉出之於外與將士同甘苦分衣食以抗外軍戢兵禁暴居人泰然從周攻圍既久鄩無外援人情稍有去就之意一日節度副使王彥溫踰城而奔守陴者從之而逸鄩之守兵禁之不可鄩即遣人從容告彥溫曰請副使少將人出非素遣者請勿帶行又揚言於衆曰素遣從副使行者即勿禁其擅去者族之守民聞之皆惑奔逸者乃止外軍聞之果疑彥溫有姦即戮之於城下自是軍城遂固及王師範兵力漸窘從周以禍福諭鄩俾之革面革面原本作薰面今據文改正影庫本粘籤鄩報曰俟青州本使歸降即以城池還納天復三, WYG: 乾化二}
