  - {type: variant, offset: 1313, length: 2, content: 節鉞, WYG: 畫工到未㡬人有知其謀者擒之武皇初甚怒既而親謂曰且吾素眇一目試召亟使冩之觀其所為如何及至武皇按膝厲聲曰淮南使汝來冩吾真必畫工之尤也冩吾不及十分即階下便是死汝之所矣畫工再拜下筆}
