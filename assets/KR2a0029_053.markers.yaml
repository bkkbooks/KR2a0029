  - {type: variant, offset: 701, length: 2, content: 思案, WYG: 暉殺刺史劉再立以城歸于劉仁恭武皇遣李嗣昭討之仁恭遣將以兵五萬來援雲州嗣昭退保樂安燕人擄敬暉棄城而去武皇怒笞嗣昭及李存審而削其官是時親軍萬衆皆邊部人動違紀律人甚苦之左右或以爲言武皇曰此輩膽畧過人數十年從吾征伐比年以來國藏空竭諸軍之家賣馬自給今四方諸侯皆懸重賞以募勇士吾若束之以法急則棄吾吾安能獨保此乎俟時開運泰吾固自能處置矣天祐元年閏四月汴帥迫天子遷都于洛陽}
