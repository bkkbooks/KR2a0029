  - {type: variant, offset: 663, length: 1, content: 已, WYG: 拔擒李瑭等斬于晉陽市氏叔琮旣旋軍過潞州擄孟遷以歸汴帥以丁會爲潞州節度使六月遷李嗣昭周徳威將兵出陰地攻慈隰二郡隰州刺史唐禮慈州刺史張瓌竝以城來降武皇以汴寇方盛難以兵服佯降心以緩其謀乃遺牙將張特持幣馬書檄以諭之陳當時利害請復舊好十一月壬子汴帥營于渭濱甲寅天子出幸鳯翔新唐書帝如鳯翔李茂貞韓全誨請召克用入衛克用間道遣使者奔問竝遺書全忠勸還汴全忠不答書武皇遣李嗣昭率兵三千自沁州趨平陽遇汴軍于晉州北斬首五百級}
