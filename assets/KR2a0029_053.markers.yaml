  - {type: variant, offset: 650, length: 0, content: '', krp: 書至懇切求援武皇報曰賊阻道路衆寡不敵救爾即與爾兩亡可與王郎棄城歸朝珂遂送欵于張存敬三月汴帥自大梁至河中王珂遂出迎尋徙于汴天子以汴帥兼鎭河中武皇自是不復能援京師霸業由是中否四月汴將氏叔琮率}
  - {type: variant, offset: 651, length: 2, content: 柄授, WYG: 五萬自太行路寇澤潞魏博大將張文恭領軍自新口入葛從周領兖鄆之衆自土門入張歸厚以邢洺之衆自馬嶺入定州王處直之衆自飛狐入侯言以晉絳之兵自陰地入氏叔琮康懐英營于澤州之昻車武皇令李嗣昭將三千騎赴澤州援李存璋而歸賀德倫氏叔琮軍至潞州孟遷開門迎沁州刺使蔡訓亦以城降于汴氏叔琮悉其衆趨石會關是時偏將李審建先統兵三千在潞州亦與孟遷降于汴及叔琮之入寇也審建爲其郷導汴人營于洞渦别將白奉國與鎭州大將石公立自井陘入陷承天軍及攻壽陽遼州刺史張鄂以城降于汴都人大恐時霖雨積旬汴軍屯聚旣衆芻糧不給復多痢瘧師人多死時大將李嗣昭李嗣源每夜率驍騎突營掩殺敵衆恐懼五月汴軍皆退氏叔琮軍出石會周德威}
