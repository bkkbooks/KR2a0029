  - {type: variant, offset: 1304, length: 0, content: '', WYG: 各王一方俟破賊之後訪唐朝宗室以嗣帝位然後各歸藩守武皇不從以書報之曰竊念本朝屯否巨業淪胥攀鼎駕以長違撫彤弓而自咎黙黙終古悠悠彼蒼生此厲階永爲痛毒視横流而莫救徒誓檝以興言别捧函題過垂奬諭省覽周旣駭惕異常淚下霑衿倍鬱申胥之素汗流浹背如聞蔣濟之言僕經事兩朝受恩三代位叨將相籍係宗枝賜鈇鉞以專征徵苞茅而問罪鏖兵校戰二十餘年竟未能斬新莽之頭顱斷蚩尤之肩髀以至廟朝顚覆豺虎縱横且授任分憂叨策冒寵龜玉毁櫝誰之咎歟俯閲指陳不勝慙恧然則君臣無常位陵谷有變遷或箠塞長河泥封函谷時移事改理有萬殊卽如周末虎争魏初鼎據孫權父子不顯授于漢恩劉備君臣自㣲興于涿郡得之不謝于家世失之無損于功名適當逐鹿之秋何惜華蟲之服惟僕累朝席寵奕世輸忠忝佩訓詞粗存家法善博奕者惟先守道治蹊田者不可奪牛誓于此生靡敢失節仰憑廟勝早殄寇讎如其事與願違則共臧洪遊于地下亦無恨矣惟公社稷元勲嵩衡降祉鎭九州之上地負一代之𢎞才合于此時自求多福所承良訊非僕深心天下其謂我何有國非吾節也慺慺孤懇此不盡陳五月梁祖遣其將康懷英率兵十萬圍潞州懷英驅率士衆築壘環城城中音信斷絶武皇遣周德威將兵赴援德威軍于余吾率先鋒挑戰日有俘獲懷英不敢卽戰梁祖以懷英無功乃以李思安代之思安引軍將營于潞城周德威以五千騎搏之梁軍大敗斬首千餘級思安退保堅壁别築外壘謂之夾寨以抗我之援軍梁祖調發山東之民以供饋運德威日以輕騎掩之運路難阻衆心益恐李思安乃自東南山口築夾道連接夾寨以通饋運自是梁軍堅保夾寨冬十月武皇有疾是時晉陽城無故自壞占者惡之天祐五年正月戊子朔武皇疾革辛卯崩于晉陽年五十三遺}
