  - {type: variant, offset: 562, length: 2, content: 於宗, WYG: 寇邢洺磁等州旬日之内三州連陷汴人以葛從周爲邢州節度使大將李存信收軍自馬嶺而旋八月壬戌天子自華還宫是時車駕初復而欲諸侯輯睦賜武皇詔令與汴帥通好武皇不欲先下汴帥乃致書于鎭州王鎔令導其意明年汴帥遣使奉書幣來修好武皇亦報之自是使車交馳朝野相賀九月武皇遣周德威李嗣昭率兵三萬出青山口以迫邢洺十月遇汴將葛從周于張公橋旣戰我軍大敗是月河中王珂來告急言王珙引汴軍來寇武皇遣李嗣昭將兵三千以援之屯于胡壁堡汴軍萬餘人來拒戰嗣昭擊退之十二月潞州節度使薛志勤卒澤州刺史李罕之以本軍夜入潞州據}
