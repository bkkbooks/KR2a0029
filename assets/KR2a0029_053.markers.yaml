  - {type: variant, offset: 328, length: 0, content: '', WYG: 竝來歸命皆笞而釋之十一月進攻武州甲寅攻新州十二月李匡儔命大將率步騎六萬救新州武皇選精甲逆戰燕軍大敗斬首萬餘級生獲將領百餘人曳練徇于新州城下是夜新州降辛亥進攻嬀州壬子燕兵復合于居庸關拒戰武皇命精騎}
  - {type: variant, offset: 328, length: 0, content: '', krp: 竝來歸命皆笞而釋之十一月進攻武州甲寅攻新州十二月李匡儔命大將率步騎六萬救新州武皇選精甲逆戰燕軍大敗斬首萬餘級生獲將領百餘人曳練徇于新州城下是夜新州降辛亥進攻嬀州壬子燕兵復合于居庸關拒戰武皇命精騎}
  - {type: variant, offset: 329, length: 6, content: 功檢校右僕射, WYG: 疲之令步將李存審由他道擊之自午至晡燕軍復敗甲寅李匡儔擕其族棄城而遁將之滄州隨行輜車臧獲妓妾甚衆滄帥盧彦威利其貨以兵攻匡儔于景城殺之盡擄其衆丙辰進軍幽州其守城大將請降武皇令李存審與劉仁恭入城撫勞居人如故市不改肆封府庫以迎武皇乾寧二年正月武皇在幽州命李存審劉仁恭徇諸屬郡二月以仁恭爲權幽州畱後}
