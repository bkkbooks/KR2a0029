  - {type: variant, offset: 565, length: 0, content: '', WYG: 以叛罕之報武皇曰薛鐵山新死潞民無主慮軍城有變輒專命鎮撫武皇令人讓之罕之乃歸于汴武皇遣李嗣昭將兵討之下澤州收罕之家屬拘送晉陽光化二年春正月李罕之陷沁州三月汴將葛從周氏叔琮自土門陷承天軍又陷遼州進軍榆次武皇令周德威擊之敗汴軍于洞渦驛叔琮棄營而遁德威追擊出石會關殺千餘人汴人復陷澤州五月武皇令都指揮使李君慶將兵收澤潞爲汴軍所敗而還以李嗣昭爲都指揮使進攻潞州八月嗣昭營于潞州城下前鋒下澤州時汴將賀德倫張歸厚等守潞州是月德倫等棄城而遁潞州平九月武皇表汾州刺史孟遷爲潞州節度使光化三年汴軍大寇河朔幽州劉仁恭乞師武皇遣周德威帥五千騎以援之七月李嗣昭攻堯山至内丘敗汴軍于沙河進攻洺州下之九月汴帥自將兵三萬圍洺州嗣昭棄城而歸葛從周設伏于青山口嗣昭之軍不利十月汴人}
