  - {type: variant, offset: 342, length: 7, content: 加檢校司空領郴, WYG: 華州韓建之亂先是三帥稱兵向闕同弱王室殺害宰輔時河中節度使王重盈卒重榮之子珂即武皇之子婿也權典軍政其兄珙爲陜州節度使瑤爲絳}
