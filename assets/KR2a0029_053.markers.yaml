  - {type: variant, offset: 2432, length: 2088, content: 年以本職兼領振武節度使時王師據德勝渡汴軍據楊村渡在上流汴人運洛陽竹木造浮橋以濟軍王師以船渡緩急難濟存進率意欲造浮橋軍吏曰河橋須竹笮大艑兩岸石倉鐵牛以為固今無竹石竊慮難成存進曰吾成算在心必有所立乃課軍造葦笮維大艦數十艘作土山植巨木於岸以纜之初軍中以為戲月餘橋成制度條上人皆服其勤智莊宗舉酒曰存進吾之杜預也賜寶馬御衣進檢校太保兼魏博馬步都將與李存審固守德勝十九年汴將王瓚率衆逼北城為地穴火車百道進攻存進隨機拒應或經日不得食汴軍退加檢校太傅王師討張文禮於鎮州閻寶李嗣昭相次不利而歿七月存進代嗣昭為招討進營東垣渡夾滹為壘沙土散惡垣壁難成存進斬伐林樹版築旬日而就賊不能寇九月王處球盡率其衆乘其無備奄至壘門存進聞之得部下數人出鬬驅賊於橋下俄而賊大至後軍不繼血戰而歿時年六十六同光時贈太尉存進行軍出師雖無奇迹然能以法繩其驕放營壘守戰之備特推精力議者稱之有子四人長曰漢韶永樂大典卷一萬三百八十九漢韶字享天享天原本作亨天考冊府元龜作享天九國志與冊府元龜同今改正影庫本粘籤幼有器局風儀峻整初事莊宗為定安軍使遷河東牢城指揮使時孟知祥權知太原軍府事會契丹侵北鄙表令漢韶率師進討既而大破契丹以功加檢校右僕射同光中為蔡州刺史天成初復姓孫氏尋授彰國軍留後累加檢校太保長興中為洋州節度使末帝之起於鳳翔也漢韶與興元張虔釗各帥部兵會王師於岐山下及西師俱叛漢韶逃歸本鎮案九國志閔帝嗣位加特進漢韶以其父名上表讓之改檢校左僕射制曰改會稽之字抑有前聞換瓌寶之文非無故事聞末帝即位心不自安乃與張虔釗各舉其城送款於蜀洎至成都孟知祥以漢韶舊人尤善待之案九國志漢韶與知祥汾上舊事及洛中更變相對感泣知祥曰豐沛故人相遇於此何樂如之於是賜第宅金帛供帳什物悉官給之偽命永平軍節度使孟昶嗣偽位歷興元遂州兩鎮連帥累偽官至中書令封樂安郡王年七十餘卒於蜀永樂大典卷一萬八千一百二十八李存璋字德璜雲中人武皇初起雲中存璋與康君立薛志勤等為奔走交從入關以功授國子祭酒累管萬勝雄威等軍從討李匡儔改義兒軍使光化二年授澤州刺史入為牢城使從李嗣昭討雲州叛將王暉平之改教練使檢校司空五年武皇疾篤召張承業與存璋授遺顧存璋爰立莊宗夷內難頗有力焉改河東馬步都虞候兼領鹽鐵初武皇稍寵軍士藩部人多干擾巿肆其豪奪法司不能禁莊宗初嗣位銳於求理存璋得行其志抑強扶弱誅其豪首期月之間紀綱大振弭羣盜務耕稼去姦宄息倖門當時稱其材幹從破汴軍於夾城轉檢校司徒柏鄉之役為三鎮排陣使十一年從盟朱友謙於猗氏授汾州刺史汴將尹皓攻慈州逆戰敗之十三年王檀逼太原存璋率汾州之軍入城固守授大同防禦使應蔚朔等州都知兵馬使秋契丹攻蔚州阿保機遣使馳木書求賂存璋斬其使契丹逼雲州存璋拒守城中有古鐵車乃鎔為兵仗以給軍士敵退以功加檢校太傅大同軍節度使應蔚等州觀察使十九年四月以疾卒於雲州府第同光初追贈太保平章事晉天福初追贈太師有子三人彥球為裨校戰歿於鎮州永樂大典卷一萬三百八十九李存賢字子良本姓王名賢許州人祖啟忠父惲案九國志李奉虔傳奉虔太原人本姓王氏祖欽唐隰州刺史父存賢佐唐武皇累著功賜姓李氏考薛史作許州人又作父惲不載其官爵與九國志異舊五代史考異賢少遇亂入黃巢軍武皇破賊陳許存賢來歸景福中典義兒軍為副兵馬使因賜姓名天祐三年從周德威赴援上黨營於交口五年權知蔚州刺史以禦吐渾六年權沁州刺史先是州當賊境不能保守乃於州南五十里據險立柵為治所已歷十餘年矣存賢至郡乃移復舊郡剗闢荊棘特立廨舍州民完集莊宗嘉之轉檢校司空真拜刺史九年汴人乘其無備來攻其城存賢擊退之十一年授武州刺史山北團練使十二年移刺慈州七月汴將尹皓攻州城存賢督軍拒戰汴軍攻擊百端月餘遁去十八年河中朱友謙來求援案吳縝纂誤據梁末帝紀及莊宗本紀當作十七年舊五代史考異命存賢率師赴之十九年汴將段凝軍五萬營臨晉蒲人大恐咸欲歸汴或問於存賢曰河中將士欲拘公降於汴存賢曰吾奉命援河中死王事固其所也汴軍退案歐陽史作擊退梁兵吳縝纂誤云朱友謙符存審劉鄩傳載鄩討友謙存審救之而鄩敗其事始末甚明無存賢擊走梁兵之事况大將自是存審安得隱其姓而存賢獨有功乎今考薛史止作汴軍退不言存賢擊退較歐陽史為得其實舊五代史考異以功加檢校司徒同光初授右武衞上將軍十一月入覲洛陽二年三月幽州李存審疾篤求入覲議擇帥代之方內宴莊宗曰吾披榛故人零落殆盡所殘者存審耳今復衰疾北門之事北門原本作北北今從歐陽史改正影庫本粘籤知付何人因目存賢曰無易於卿即日授特進檢校太保充幽州盧龍節度使案九國志梁人攻上黨莊宗親總大軍以援之存賢先登陷敵以功授盧龍軍節度使與薛史異舊五代史考異五月到鎮時契丹強盛城門之外烽塵交警一日數戰存賢性忠謹周慎晝夜戒嚴不遑寢食以至憂勞成疾卒於幽州時年六十五詔贈太傅存賢少有材力善角觝初莊宗在藩邸每宴私與王郁角觝鬬勝郁頻不勝莊宗自矜其能謂存賢曰與爾一博如勝賞爾一郡即時角觝存賢勝得蔚州刺史永樂大典卷一萬三百八十九按存賢為蔚州刺史在天祐五年蓋因角觝而得郡也歐陽史改薛史賞爾一郡為與爾一鎮以為盧龍節度使殊非事實史臣曰昔武皇之起幷汾也會鹿走於中原期龍戰於大澤蓄驍果之士以備鷹犬之用故自存信而下皆錫姓以結其心授任以責其效與夫董卓之畜呂布亦何殊哉唯存孝之勇足以冠三軍而長萬夫苟不為叛臣則可謂良將矣永樂大典卷一萬三百八十九, WYG: ''}
