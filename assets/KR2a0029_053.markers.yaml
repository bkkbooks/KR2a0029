  - {type: variant, offset: 1305, length: 5, content: 存孝定邢洺, WYG: 薄葬發喪後二十七日除服莊宗卽位追諡武皇帝廟號太祖陵在鴈門東五代史補太祖武皇本朱耶赤心之後沙陀部人也其先生于雕窠中酋長以其異生諸族傳飬之遂以諸爺為氏言非一父所飬也其後言訛以諸為朱以爺為耶至太祖生眇一目長而驍勇善騎射所向無敵時謂之獨眼龍大為部落所疾太祖恐禍及遂舉族歸唐授雲州刺史賜姓李名克用黄巢犯長安自北引兵赴難功成遂拜太原節度使封晉王武皇之有河東也威聲大振淮南楊行密常恨不識其狀貌}
  - {type: page-break, offset: 1305, content: '', id: KR2a0029_WYG_053-18b, image: WYG0277/WYG0277-0238b.png}
  - {type: variant, offset: 1305, length: 5, content: 存孝定邢洺, krp: 薄葬發喪後二十七日除服莊宗卽位追諡武皇帝廟號太祖陵在鴈門東五代史補太祖武皇本朱耶赤心之後沙陀部人也其先生于雕窠中酋長以其異生諸族傳飬之遂以諸爺為氏言非一父所飬也其後言訛以諸為朱以爺為耶至太祖生眇一目長而驍勇善騎射所向無敵時謂之獨眼龍大為部落所疾太祖恐禍及遂舉族歸唐授雲州刺史賜姓李名克用黄巢犯長安自北引兵赴難功成遂拜太原節度使封晉王武皇之有河東也威聲大振淮南楊行密常恨不識其狀貌}
