  - {type: variant, offset: 559, length: 0, content: '', WYG: 于宗城北存信進攻魏州十月武皇敗魏軍于白龍潭追擊至觀音門汴軍救至乃退十一月武皇徴兵于幽鎮定三州將迎駕于華下幽州劉仁恭託以契丹入寇俟敵退聽命乾寧四年正月汴軍陷兖鄆騎將李承嗣史儼與朱瑾同奔于淮南三月陜帥王珙攻河中王珂來告難武皇遣李嗣昭率二千騎赴之破陜軍于猗氏乃觧河中之圍至是天子遣延王戒丕至晉陽傳宣㫖于武皇朕不取卿言以及于此茍非英賢竭力朕何由再謁廟廷在卿表率予所望也七月武皇復徵兵于幽州劉仁恭辭㫖不遜武皇以書讓之仁恭捧書謾罵抵之于地仍囚武皇之行人八月大舉以伐仁恭九月師次蔚州戊寅晨霧晦暝占者云不利深入辛已攻安寨俄報燕將單可及領騎軍至矣武皇方置酒高㑹前鋒又報賊至矣武皇曰仁恭何在曰但見可及輩武皇張目怒曰可及輩何足爲敵仍促令出師燕軍已擊武皇軍寨武皇乘醉擊賊燕軍披靡時步兵望賊而退爲燕軍所乘大敗于木𤓰澗俄而大風雨震電燕軍觧去武皇方醒甲午師次代州劉仁恭遣使謝罪于武皇武皇亦以書報之自此有檄十餘返光化元年春正月鳯翔李茂貞華州韓建皆致書于武皇乞修和好同奬王室兼乞助丁匠修繕秦宫武皇許之四月汴將}
  - {type: page-break, offset: 559, content: '', id: KR2a0029_WYG_053-9a, image: WYG0277/WYG0277-0233c.png}
  - {type: page-break, offset: 559, content: '', id: KR2a0029_WYG_053-9b, image: WYG0277/WYG0277-0233d.png}
