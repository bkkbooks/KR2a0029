  - {type: variant, offset: 352, length: 0, content: '', krp: 與珂争河中遂訴于岐邠華三鎮言珂本蒼頭不當襲位珂亦訴于武皇武皇上表保薦珂乞授河中旄鉞詔可之三帥遂以兵入覲大掠京師請授王珂同州節度使王瑤河中節度使天子亦許之武皇遂舉兵表三帥之罪復移檄三鎮三鎮大懼是月次絳州刺史王瑤登陴拒命武皇攻之旬日而拔斬王瑤于軍門誅其黨千餘人七月次河中王珂迎謁于路已未同州節度使王行約棄城奔京師與左軍兵士刼掠西市都民大擾行約即行瑜弟也庚申樞密使駱全瓘以武皇之軍將至請天子幸右軍指揮使李繼鵬茂貞假子也本姓閻名珪與全瓘謀刼天子幸鳯翔左軍指揮使王行實亦行瑜之弟也與劉景宣欲刼天子幸邠州兩軍相攻縱火燒内門煙火蔽天天子急詔鹽州六都兵士令追殺亂兵左右軍退走王行瑜李茂貞聲言自來迎駕天子懼出幸南山駐蹕于莎城是夜熒惑犯心壬戌武皇進收同州聞天子幸石門遣判官王瓌奉表奔問天子遣使賜詔令與王珂同討邠鳯時武皇方攻華州俄聞李茂貞領兵士三萬至盩厔王行瑜領兵至興平欲往石門迎駕乃觧華州之圍進營渭橋天子遣延王戒丕丹王允齎詔促武皇兵直抵邠鳯八月乙酉供奉官張承業齎詔告諭涇帥張鐺巳領步騎三萬于京西北扼邠岐之路武皇進營渭北遣史儼將三千騎往石門扈駕遣李存信李存審會鄜延之兵攻行瑜之梨園寨天子削奪行瑜官爵以武皇爲天下兵馬都招討使以鄜州李思孝爲北面招討使以涇州張鐺爲西南面招討使天子又遣延王丹王賜武皇御衣及大將茶酒弓矢命二王兄事武皇延王傳天子密㫖云一昨非卿至此已爲賊庭行酒之人矣所慮者二凶締合卒難剪除且欲姑息茂貞令與卿修好俟梟斬行瑜更與卿商量武皇上表請駕還京令李存節領二千騎于京西北以防邠賊奔突辛亥天子還宫加武皇守太師中書令邠寧四面行營都統時王行瑜弟兄固守梨園寨我師攻之甚急李茂貞遣兵萬餘來援行瑜營于龍泉鎮茂貞自率兵三萬迫咸陽武皇奏請詔茂貞罷兵兼請削奪茂貞官爵詔曰茂貞勒兵蓋備非常尋已發遣歸鎮又言茂貞已誅李繼鵬李繼晸卿可切戒兵甲無犯土疆武皇請賜河中王珂旌節三表許之又表李罕之為副都統十月丙戌李存信于梨園寨北遇賊軍斬首千餘級自是賊閉壁不出戊子天子賜武皇内弟子四人又降朱書御札賜魏國夫人陳氏是月王行瑜因敗衂之後閉壁自固武皇令李罕之晝夜急攻賊軍乏食拔營而去李存信與罕之等先伏軍于阨路俟賊軍之至縱兵擊之殺戮萬計是日收梨園等三寨生擒行瑜之子知進竝母丘氏大將李元福等二百人送赴闕庭庚寅王行約王行實燒刼寧州遁走寧州守將徐景乞降武皇表蘇文建爲邠州節度使且于寧州爲治所十一月丁巳收龍泉寨時行瑜以精甲五千守之李茂貞出兵來援爲李罕之所敗邠賊遂棄龍泉寨而去行瑜復入邠州大軍進逼其城行瑜登城號哭曰行瑜無罪昨殺南北司大臣是岐帥將兵脅制主上請治岐州行瑜乞束身歸朝武皇報曰王尚父何恭之甚耶僕受命討三賊臣公其一也如能束身歸闕老夫未敢專命爲公奏取進止行瑜懼棄城而遁武皇收其城封府庫遽以捷聞旣而慶州奏王行瑜將家屬五百人到州界爲部下所殺傳首闕下武皇旣平行瑜還軍渭北十二月武皇營于雲陽候討鳯翔進止乙未天子賜武皇爲忠貞平難功臣進封晉王加實封二百戸武皇復上表請討李茂貞天子不允武皇私謂詔使曰觀主上意疑僕别有他腸復何言哉但禍不去胎憂患未已又奏臣統領大軍不敢逕赴朝覲遂班師}
