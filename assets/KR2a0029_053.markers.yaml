  - {type: variant, offset: 2020, length: 410, content: 騎從陣中易騎輕捷如飛獨舞鐵檛挺身陷陣萬人辟易蓋古張遼甘寧之比也存孝死武皇不視事旬日私憾諸將久之永樂大典卷一萬三百八十九李存進振武人本姓孫名重進案歐陽史太祖破朔州得之賜以姓名養為子父佺世吏單于府案九國志孫漢韶傳云祖昉嵐州刺史父存進振武軍節度使據薛史則存進父自名佺未嘗為刺史與九國志異重進初仕嵐州刺史湯羣為部校獻祖誅羣乃事武皇從入關還鎮太原署牙職景福中為義兒軍使賜姓名從討王行瑜以功授檢校常侍與李嗣昭同破王珙於河中光化三年契丹犯塞寇雲中改永安軍使鴈門以北都知兵馬使天復初破氏叔琮前軍於洞渦三年授石州刺史莊宗初嗣位入為步軍右都檢校司空師出井陘授行營馬步軍都虞候破汴軍於柏鄉論功授邠州刺史轉檢校司徒俄兼西南面行營招討使出師收慈州授慈沁二州刺史十二年定魏博授天雄軍都巡按使時魏人初附有銀槍効節都強傑難制效節原本作數節今從通鑑改正影庫本粘籤專謀騷動存進沈厚果斷犯令者梟首屍於巿諸軍無不惕息靡然向風十四年擢蕃漢馬步副總管從攻楊劉戰胡柳, WYG: ''}
