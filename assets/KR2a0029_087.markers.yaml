  - {type: variant, offset: 442, length: 4, content: 龐厚剛毅, WYG: 釋之丙申西京奏百姓侯可洪于楊廣城内掘得宿藏玉四團進納賜可洪二百緡絹二百匹庚子以前鄜州節度使孫璋卒廢朝癸夘帝顧謂宰臣曰春雨稍多久未晴霽何也馮道對曰水旱作沴雖是天之常道然季春行秋令臣之罪也更望陛下廣敷恩宥久雨無妨于聖政也丁未以神㨗神威}
