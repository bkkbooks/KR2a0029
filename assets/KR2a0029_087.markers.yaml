  - {type: variant, offset: 401, length: 4, content: 暉案歐陽, WYG: 始印五經自後典籍皆為板本大槩唐末漸有印書特未盛行後人遂以為始于蜀也當五季亂離之際經籍方有託而流布于四方天之不絶斯文信矣甲戌靈武奏都指揮使許審環等謀亂伏誅藥彦稠奏誅党項阿埋等十族與康福入白魚谷追襲叛黨獲大首領六人諸羌二千餘人孳畜數千及先刼掠到回鶻貨物詔彦稠軍士所獲並令自收勿得箕斂己夘以前河中節度使索自通為鄜州節度使懐化軍節度使李贊華進契丹地圖詔司天臺除密奏留中外應奏厯象雲物水旱及十曜細行諸州災祥一一並報}
