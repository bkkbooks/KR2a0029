  - {type: variant, offset: 397, length: 3, content: 考異韓, WYG: 補後唐平蜀明宗命太學博士李鍔書五經仿其製作刋板于國子監為監中刻書之始去倚覺寮雜記云雕印文字唐以前無之唐末益州始有墨板後唐方鏤九經悉收人間所有經史以鏤板為正見兩朝國史此則印書已始自唐末矣案栁氏家訓序中和三年癸夘夏鑾輿在蜀之三年也余為中書舍人旬休閱書于重城之東南其書多隂陽雜説占夢相宅九宫五緯之流又有字書小學率雕板印紙浸染不可盡曉葉氏燕語正以此證刻書不始于馮道而沈存中又謂板印書籍唐人尚未盛行為之自馮瀛}
