  - {type: variant, offset: 530, length: 1, content: 充, WYG: 楊檀罷郡至闕帝問其事奏曰此輩來援王都謀危社稷陛下寛慈貸其生命茍若歸之必復向南放箭既知中國事情為患深矣帝然之既而只遣哲爾格錫里隨來使歸蕃不欲全拒其請也詔贈}
  - {type: variant, offset: 530, length: 1, content: 充, krp: 楊檀罷郡至闕帝問其事奏曰此輩來援王都謀危社稷陛下寛慈貸其生命茍若歸之必復向南放箭既知中國事情為患深矣帝然之既而只遣哲爾格錫里隨來使歸蕃不欲全拒其請也詔贈}
  - {type: variant, offset: 532, length: 0, content: '', WYG: 后曹氏曾祖父母為太傅太尉太師國夫人淑妃王氏曾祖父祖父母為太子太保太傅太師國夫人壬戌前樞密使驃騎大將軍馬紹宏卒癸亥以懐化軍節度使李贊華為滑州節度使初帝欲以贊華為藩鎮范延光等奏以為不可帝曰吾與其先人約為兄弟故贊華來附吾老矣儻後世有守文之主則此輩招之亦不來矣由是近臣不能抗議甲子以太子賔客蕭蘧為户部尚書致仕乙丑以天雄軍節度使宋王從厚兼中書令辛未以幽州節度使趙徳鈞兼中書令五月壬午朔帝御文明殿受朝詔禁網羅彈射弋獵丁亥以二王後前詹事府司直楊延紹為右贊善大夫仍襲封酅國公食邑二千户丁酉以太子太師致仕孔勍卒廢朝興元奏東西兩川各舉兵相持甲辰以文宣王四十三代孫曲阜縣主簿孔仁玉為衮州龔邱令襲文宣公戊申襄州奏漢江大漲水入州}
