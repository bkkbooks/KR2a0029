  - {type: variant, offset: 381, length: 13, content: 堂叔也歐陽史作墮沙濠溺死舊, WYG: 五代會要長興三年二月中書門下奏請依石經文字刻九經印板㩽令國子監集博士儒徒將西京石經本各以所業本經廣為鈔冩仔細看讀然後僱召能雕字匠人各部隨帙刻印板廣頒天下如諸色人要冩經書並請依所印刻本不得更使雜本交錯去愛日齋叢鈔云通鑑載後唐長興三年二月辛未初令國子監校定九經雕印賣之又曰自唐末以來所在學校廢絶蜀毋昭裔出私財百萬營學館且請板刻九經蜀主從之由是蜀中文學復盛又曰唐明宗之世宰相馮道李愚請令判國子監田敏校定九經刻板印賣從之後周廣順三年六月丁巳板成獻之由是雖亂世九經𫝊布甚廣去王仲言揮麈録云毋昭裔貧賤時嘗借文選于交游問其人有難色發憤異日若貴當板以鏤之遺學者後仕王蜀為宰相遂踐其言刋之印行書籍創見于此事載陶岳}
