  - {type: variant, offset: 449, length: 3, content: 器局行, WYG: 父子三人同挽犁耕者帝閔之賜耕牛三頭髙麗國遣使朝貢以右領軍上將軍翟璋為右羽林統軍以前安州留後周知裕為左神武統軍夏四月甲寅詔諸道節度使未帶使相及防禦團練使刺史班位居檢校官髙者為上加檢校官同以先授者為上前資在見任之下新羅王金溥遣使貢方物戊午中書奏準勅重定三京諸州府地望次第者舊制以王者所都之地為上今都洛陽請以河南道為上關内道為第二河東道為第三餘依舊制其五府按十道圖以鳳翔為首河中成都江陵興元為次中興初升魏州為興唐府鎮州為真定府望升二府在五府之上合為七州餘依舊制又天下舊有八大都督府以靈州為首陜幽魏楊潞鎮徐為次其魏鎮已升為七府兼具員内相次升越杭福潭等州為都督望以十大都督府為額仍據升降次第以陜為首餘依舊制十道圖有大都䕶請以安東大都䕶為首防禦團練等使自來升降極多今具見在其員依新定十道圖以次第為定從之契丹累遣使求歸扎刺特哩衮等幽州趙徳鈞奏請}
