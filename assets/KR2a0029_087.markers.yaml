  - {type: variant, offset: 1890, length: 0, content: '', WYG: 以前許州節度使馮贇為宣徽使判三司以宣徽北院使孟漢瓊判院事壬午史館奏宣宗巳下四廟}
  - {type: variant, offset: 1890, length: 0, content: '', krp: 以前許州節度使馮贇為宣徽使判三司以宣徽北院使孟漢瓊判院事壬午史館奏宣宗巳下四廟}
  - {type: variant, offset: 1891, length: 1, content: 封, WYG: 有實録請下兩浙荆湖購募野史及除目報狀從之五代㑹要載十一月四日史館奏當館昨為大中以來迄于天祐四廟實録尚未纂修尋具奏聞謹行購募勅命雖頒于數月圖書未貢于一編蓋以北土州城久罹兵火遂成滅絶難可訪求切恐歳月漸深耳目不接長為闕典過在攸司仗念江表列藩湖南奥壤至于閩越方屬勲賢戈鋋自擾于中原屏翰悉全于外府固多奇士富有羣書其兩浙福建湖廣伏乞詔㫖委各于本道采訪宣宗懿宗僖宗昭宗以上四朝野史及逐朝日厯銀臺事宜内外制詞百司沿革簿籍不限巻數據有者抄録上進若民間收得或隠士撰成即令各列姓名請議爵賞癸未以左僕射致仕鄭珏卒廢朝丁亥以河陽節度使兼六軍諸衛副使石敬瑭為河東節度使兼大同彰國振武威塞等軍蕃漢馬歩總管時契丹帳族在雲州境上與羣臣議擇威望大臣以制北方故有是命己丑樞密使趙延夀加同平章事詔在京臣寮不得進奉賀長至馬及諸物甲午日南至帝御文明殿受朝賀己亥河中節度使李從璋加檢校太傅以右㪚騎常侍楊凝式為工部侍郎庚子以祕書監盧文紀為工部尚書以工部尚書崔居儉為太常卿以工部侍郎鄭韜光為禮部侍郎乙已雲州奏契丹主在黑榆林南捺刺泊造攻城之具帝遣使賜契丹主銀器綵帛十二月戊申朔供奉官丁延徽倉官田繼勲並棄市坐擅出倉粟數百斛故也教坊伶官敬新磨受賄為人告帝令御史臺徵還其錢而後撻之癸丑幸龍門觀修伊水石堰賜丁夫酒食後數日有司奏丁夫役限十五日已滿工未畢請更役五日帝曰不惟時寒且不可失信于小民即止其役甲寅以太子賔客歸藹卒廢朝戊午以前宣徽使朱𢎞昭為襄州節度使康義誠為河陽節度使充侍衛親軍馬步軍都指揮使壬戌以吏部侍郎姚顗為尚書左丞以尚書左丞}
