  - {type: variant, offset: 662, length: 345, content: 歷漢至周為右武衞左神武二將軍恭帝即位初為左衞將軍會高麗王昭加恩命曦副左驍衞將軍戴交充使淳化四年卒舊五代史考異剡王重胤案郯王以下諸王傳永樂大典原闕歐陽史云重胤高祖弟也亦不知其為親疏然高祖愛之養以為子故于名加重而下齒諸子通鑑齊王紀同重胤婦馮氏後為少帝后歐陽史載契丹入京師暴少帝之惡于天下曰納叔母于宮中亂人倫之大典是重胤實為高祖弟也五代會要作高祖第三子重胤天福七年四月追封郯王考郯王歐陽史作鄭王封爵亦異又案薛史唐紀清泰三年誅皇城副使石重裔敬瑭之子也考會要載高祖諸子無別名重裔者重裔疑即重胤史氏避宋太祖諱故作裔然通鑑高祖紀作敬瑭之子重胤齊王紀又作高祖少弟重胤早卒似兩紀實有兩人姑存之以備考舊五代史考異虢王重英案虢王傳永樂大典原闕考五代會要云重英高祖長子天福四年四月追封是書唐紀清泰三年七月己丑誅右衞, WYG: ''}
