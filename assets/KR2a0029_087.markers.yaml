  - {type: variant, offset: 1384, length: 0, content: '', krp: 物先賜金器等瓌知祥甥也母在蜀故令瓌往焉瓌至蜀具述朝廷厚待}
  - {type: variant, offset: 1385, length: 1, content: 女, WYG: 意知祥稱藩如初奏福慶長公主以今年正月十二日薨又奏五月三日大破東川董璋之衆于漢州收下東川又表立功將校趙季良等五人乞授節鉞部内刺史令録已下官乞許墨制補授帝遣閤門使劉政恩充西川宣諭使乙已契丹遣使自幽州進馬秦州地震冬十月己酉朔再遣供奉官李􅅛使西川兼押賜故福慶長公主祭贈絹三千匹并賜知祥玉帶先是兩川隔逺朝廷兵士不下三萬人至是知祥上表乞發遣兵士家屬入川詔報不允知祥所奏兩川部内文武將吏乞許權行墨制除補訖奏詔許之知祥所奏立功大將趙季良等五人正授節鉞續有處分襄州奏漢水溢壊民廬舍癸丑以太常卿劉岳卒廢朝已未以兵部侍郎張文寶為吏部侍郎以户部侍郎藥縱之為兵部侍郎庚申幸至徳宫因幸石敬瑭李從昶李從敏之第壬申大理少卿康澄上疏曰臣聞安危得失治亂興亡誠不繫于天時固非由于地利童謡非禍福之本妖祥豈隆替之源故雊雉昇鼎而桑穀生朝不能止殷宗之盛神馬長嘶而玉龜告兆不能延晉祚之長是知國家有不足懼者五有深可畏者六隂陽不調不足懼三辰失行不足懼小人訛言不足懼山崩川涸不足懼蟊賊傷稼不足懼此不足懼者五}
