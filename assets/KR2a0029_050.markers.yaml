  - {type: 'tls:seg', offset: 318, content: '', id: KR2a0029_ZHSJ_050-d50p3s41}
  - {type: variant, offset: 318, length: 363, content: 時士飢甚潛燒克讓營克讓走入關疑當時因齊克讓之名與李克讓同遂致傳聞輾轉失實耳歐陽史祇據薛史原文不為辨正今無可復考姑附識于此以部下六七騎伏於南山佛寺夜為山僧所害克讓既死紀綱渾進通冒刃獲免歸於黃巢中和二年冬武皇入關討賊屯沙苑黃巢遣使米重威齎賂修好因送渾進通至兼擒送害克讓僧十人武皇燔偽詔還其使盡誅諸僧為克讓發哀行服悲慟久之永樂大典卷一萬三百八十八克修字崇遠武皇從父弟也案歐陽史家人傳云太祖四弟曰克讓克修克恭克寧皆不知其父母名號據薛史則克修父名德成未嘗無名號也父德成初為天寧軍使從獻祖討龐勛以功授朔州刺史克修少便弓馬從父征討所至立功武皇節制鴈門以克修為奉誠軍使從入關為前鋒破黃揆於華陰敗尚讓於梁田坡蹙黃巢於光順門每戰皆捷勇懾諸軍賊平以功檢校刑部尚書左營軍使其年十月潞州牙將安居受來乞師請復昭義軍武皇遣大將賀公雅李筠安金俊等以兵從安金俊, WYG: 黄都尉都尉}
