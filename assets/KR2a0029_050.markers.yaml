  - {type: variant, offset: 2504, length: 303, content: 所未安富貴功名當宜自立天與不取後悔無及克寧曰公毋得不祥之言我家世立功三代父慈子孝天下知名苟吾兄山河有託我亦何求公無復言必斬爾首以徇克寧雖慈愛因心而日為凶徒惑亂羣凶之妻復以此言干克寧妻孟夫人說激百端夫人懼事泄及禍屢讓克寧由是愈惑會克寧因事殺都虞候李存質又請兼領大同節度以蔚朔為屬郡又數怒監軍張承業李存璋繇是知其有貳近臣史敬鎔素與存顥善盡知其事敬鎔告貞簡太后曰存顥與管內太保陰圖叛亂俟嗣王過其第即擒之幷太后子母欲送於汴州竊發有日矣莊宗召張承業李存璋謂曰季父所為如此無猶子之情骨肉不可自相魚肉吾即避路則禍亂不作矣承業曰老夫親承遺託言猶在耳存顥輩欲以太原降賊王乃何路求生不即討除亡無日矣因令吳珙吳珙原本作吳今從通鑑, WYG: 志}
