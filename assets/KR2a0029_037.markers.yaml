  - {type: variant, offset: 2887, length: 1, content: 據, krp: 殿名金鑾從嘉名也置大學士始以翔為之}
  - {type: variant, offset: 2892, length: 0, content: '', WYG: 云以金鑾為名非典也大學士與三館大學士同翔自釋褐東下遭遇霸王懷抱深沈有經濟之略起中和嵗至鼎革大運其間三十餘年扈從征伐出入惟幄庶務叢恒逹旦不寢唯在馬上䘯得晏息每有所禆贊亦未嘗顯諫上俛仰顧歩間微示持疑爾而太祖意已察必}
