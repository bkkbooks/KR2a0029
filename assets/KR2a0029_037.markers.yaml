  - {type: variant, offset: 1255, length: 3, content: 趙國公, WYG: 兼判戸部時柳璨在相位擅權縱暴傾陷賢儁宰相裴樞等五家及三省而下三十餘人咸抱寃就死搢紳以目不敢竊語其是非餘怒所注亦不啻十許輩文蔚殫其力解之乃止士人頼焉璨敗死文蔚兼度支鹽鐵使天祐四年天子以土運將革天命有歸四月命文蔚與楊涉等總率百僚奉禪位詔至大梁太祖受命文蔚等不易其位開平二年春暴卒于位詔贈右僕射文蔚沈邃重厚有大臣之風居家孝且悌雖位至清顯與仲季相雜在太夫人膝下一不異布素弟濟美早得心恙北夢瑣言云}
  - {type: page-break, offset: 1255, content: '', id: KR2a0029_WYG_037-2a, image: WYG0277/WYG0277-0163c.png}
