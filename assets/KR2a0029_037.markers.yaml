  - {type: variant, offset: 33, length: 263, content: 上言莊宗廟室酌獻請奏武成之舞從之鄆州節度使霍彥威移鎮青州丁亥莊宗神主祔廟有司請祧懿祖室從之詔陵州合州長流百姓豆盧革韋說等可並自長流後長流原本作長沙今據文改正影庫本粘籤縱逢恩赦不在原宥之限豆盧昇韋濤仍削除自前所受官秩壬辰以久雨放百僚朝參詔天下疏理繫囚甲午汴州奏舊管曹州乞卻歸當道從之是日詔曰承前使府奏請判官率皆隨府除移停罷近年流例有異前規使府雖已除移判官元安舊職起今後若是朝廷除授者即不計使府除移如是使府奏請即皆隨府移罷舊例藩侯帶平章事者所奏請判官殿中已上許奏緋中丞已上許奏紫今不帶平章事亦許同帶平章事例處分如防禦團練使奏請判官, WYG: 勲吏部}
