  - {type: variant, offset: 1255, length: 3, content: 趙國公, krp: 兼判戸部時柳璨在相位擅權縱暴傾陷賢儁宰相裴樞等五家及三省而下三十餘人咸抱寃就死搢紳以目不敢竊語其是非餘怒所注亦不啻十許輩文蔚殫其力解之乃止士人頼焉璨敗死文蔚兼度支鹽鐵使天祐四年天子以土運將革天命有歸四月命文蔚與楊涉等總率百僚奉禪位詔至大梁太祖受命文蔚等不易其位開平二年春暴卒于位詔贈右僕射文蔚沈邃重厚有大臣之風居家孝且悌雖位至清顯與仲季相雜在太夫人膝下一不異布素弟濟美早得心恙北夢瑣言云}
  - {type: variant, offset: 1259, length: 4, content: 格案原本, WYG: 裼尚書有五子文蔚彛憲濟美仁龜皆有名第至宰輔丞郎内一子忘其名少年聞壁魚食神仙字身有五色吞之可得仙因欲試之遂致心疾文蔚撫視殆三十年士君子稱之子鑄周顯徳中位至秘書監薛貽矩字熈用河東聞喜人祖存父廷望咸有令名貽矩風儀秀聳其與游者皆一時英妙藉甚于文塲間唐乾符中登進士第厯度支巡官集賢校理拾遺殿中起居舎人召拜翰林學士加禮部員外郎知制誥轉司勲郎中其職如故乾寧中天子幸石門貽矩以私屬相失不及于行在罷之旋除中書舎人再踐内署歴户部兵部侍郎學士承㫖及昭宗自鳯翔還京大翦閹寺貽矩尚為韓全誨等}
  - {type: page-break, offset: 1259, content: '', id: KR2a0029_WYG_037-3a, image: WYG0277/WYG0277-0164a.png}
