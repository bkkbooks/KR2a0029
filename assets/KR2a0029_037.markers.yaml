  - {type: variant, offset: 2847, length: 2, content: 裴上, WYG: 明年從征至澤州拜刑部侍郎平章事仍判户部尋還中書侍郎以風恙拜章乞骸改刑部尚書致仕郎日肩輿歸洛居于福善里修篁嘉木圖書琴酒以自適焉乾化二年秋卒所著典議三巻詞制歌詩二十巻牋表三十巻存于其家杜曉字明逺京兆杜陵人祖審權仕唐位至宰相父讓能官至守大尉平章事乾寧中邠鳯二鎭舉兵犯王畿讓能被其誣陷天子不得已賜死于臨臯驛曉居喪柴立幾至滅性憂滿服幅巾七升沉跡自廢者將十餘載光化中宰相崔𦙍判鹽鐵奏為巡官兼校書郎尋除畿尉直𢎞文館皆不起及昭宗東選宰相崔逺判户部又奏為巡官兼殿中丞或語之曰嵇中散死子紹埋没不自顯山濤以物理勉之乃仕吾子忍令杜氏嵗時以鋪席祭其先人同匹庶乎曉乃就官未幾拜左拾遺尋召為翰林學士轉膳部員外郎依前充職及崔逺得罪出守本官居數月以本官知制誥俄又召為學士遷郎中充職太祖受禪拜中書舎人職如故開平三年轉工部侍郎充承㫖明年秋拜中書侍郎平章事仍判户部庶人友珪簒位遷禮部尚書平章事集賢殿大學士依前判户部及袁象先之討友珪禁兵大縱曉中重創而卒末帝即位詔贈右僕射曉博贍有詞藻時論稱之兄光乂新唐書表光乂字啓之有心疹厥疾毎作或溢喙縱詬或揮梃追撲曉事之愈恭未嘗一日少怠居兩制之重祖述前載甚得王}
