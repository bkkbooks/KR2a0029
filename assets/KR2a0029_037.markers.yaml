  - {type: variant, offset: 2911, length: 2, content: 夏魯, WYG: 朕安歸翔泣奏曰臣受國恩僅將三紀從㣲至著皆先朝所遇雖名宰相實朱氏老奴耳事陛下如郎君以臣愚誠敢有所隠陛下初任段凝為將臣已極言小人朋附致有今日晉軍卽至段凝限水欲請陛下出居避狄陛下必不聽從欲請陛下出}
  - {type: variant, offset: 2911, length: 2, content: 夏魯, krp: 朕安歸翔泣奏曰臣受國恩僅將三紀從㣲至著皆先朝所遇雖名宰相實朱氏老奴耳事陛下如郎君以臣愚誠敢有所隠陛下初任段凝為將臣已極言小人朋附致有今日晉軍卽至段凝限水欲請陛下出居避狄陛下必不聽從欲請陛下出}
  - {type: variant, offset: 2914, length: 1, content: 移, WYG: 應敵陛下必不果決縱良平復生難以轉禍為福請先死不忍見宗廟隕墜言訖君臣相向慟哭及晉主陷都城有詔赦梁氏臣寮李振謂翔曰有制洗滌將朝新君翔曰新君若問其將何辭以對是夜翔在髙頭里第宿於車坊欲曙左右報曰崇政李太保已入朝翔返室嘆曰李振謬為丈夫耳朱氏與晉仇讎我等始同謀畫致君無狀今少主伏劍於國門縱新朝赦罪何面目入建國門也乃自經而卒數日并其族被誅初貞明中史臣李琪張袞郄殷象馮錫嘉奉詔修撰太祖實錄三十巻叙述非工事多漏略復詔翔補緝其闕翔乃别纂成三十巻目之曰大梁編遺錄與實錄偕行翔妻劉氏父為藍田令廣明之亂劉為巢將尚讓所得巢敗讓攜劉降於時溥及讓誅時溥納劉於妓室太祖平徐得劉氏嬖之屬翔喪妻因以劉氏賜之及翔漸貴劉猶出入太祖卧内翔情禮稍薄劉於曲室讓翔曰卿鄙余曽失身於賊耶以成敗言之尚讓巢之宰輔時􅄎國之忠臣論卿門地辱我何甚請從此辭翔謝而止之劉恃太祖之勢案下有缺文太祖四}
