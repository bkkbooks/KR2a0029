  - {type: variant, offset: 710, length: 538, content: 隨邀求職務凌壓平人及有力戶人於諸處行賂希求事務亦有州使妄稱修葺城池廨宇科賦於人及營私宅諸縣鎮所受州使文符如涉科斂人戶不得稟受州府不得賒買行人物色兼行科率已前條件州使如敢犯違許人陳告勘詰不虛量行奬賞宜令三京諸道州府準此處分新授青州節度使霍彥威奏處斬新登州刺史王公儼登州原本作詧州今從通鑑改正影庫本粘籤及同謀拒命指揮使李謹王居厚等八人訖初同光中符習為青州節度使宦官楊希望為監軍專制軍政趙在禮之據魏州習奉詔以本軍進討俄而帝為亂軍所劫習即罷歸希望遣兵邀之習懼而還至滑州帝遣人招之習至乃從帝入汴希望聞魏軍亂遣兵圍守習家欲盡殺之公儼素受希望奬愛謂希望曰內侍宜分腹心之兵監四面守陴者則誰敢異圖希望從之公儼乘其無備圍希望之第擒而殺之公儼遂與州將李謹等謀據州城以邀符節即令軍府飛章留己兼揚言符習在鎮人不便其政帝乃除公儼為登州刺史公儼不時赴任不時赴任當云因其不如期赴任考冊府元龜與薛史同今姑仍其舊影庫本粘籤即以霍彥威代符習聚兵淄州以圖進取彥威至淄州會詔使至青州告諭公儼即赴所任彥威懲其初心遣人擒公儼於北海縣與同黨斬於州東案通鑑彥威聚兵淄州以圖進取公儼懼乙未始之官丁酉彥威至青州追擒之舊五代史考異有司上言莊宗祔廟懿祖祧遷準例舍故而諱新懿祖例不諱忌日不行香從之壬子襄州節度使劉訓加檢校太傅以偽蜀右僕射, WYG: 年夏拜}
