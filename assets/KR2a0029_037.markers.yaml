  - {type: variant, offset: 2856, length: 8, content: 考方請替移詔曰有, WYG: 年夏四月太祖以邠岐侵擾遣劉知俊西討鄜延深憂不濟因宴顧翔以問西事翔剖析山川郡邑虛實軍粮多少悉以條奏如素講習左右莫不驚異太祖嘆賞久之乾化元年進位光禄大夫行兵部尚書金鑾殿大學士知崇}
