  - {type: variant, offset: 3140, length: 241, content: 雖深欲霈覃而未暇百蠻都首領李卑晚六姓蠻都首領勿鄧摽莎等天資智勇世稟忠勤梯航之道路纔通琛賮之貢輸已至率其種落竭乃悃誠備傾向化之心深奬來庭之意來庭原本作果庭今據文改正影庫本粘籤今則各頒國寵別進王封其巂州刺史李及大鬼主離吠等或遙貢表函或躬趨朝闕亦宜特授官資各遷階秩勉敦信義無墜冊書示爾金石之堅保我山河之誓欽承休命永保厥終壬辰帝狩於近郊臘故也甲午以契丹盧龍軍節度使盧文進為檢校太尉同平章事充滑州節度使戊戌詔嚴禁鑞錢案洪遵泉志引宋白續通典云天成元年十二月敕中外所使銅錢內鐵鑞錢即宜毀棄不得行使, WYG: 昭然}
