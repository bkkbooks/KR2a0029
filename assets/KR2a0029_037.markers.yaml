  - {type: variant, offset: 2901, length: 9, content: 獻芝草庚午河陽節度, WYG: 陛下不留聖念臣所未喻一也臣聞李亞子自墨縗統衆於今十年毎攻城臨陣無不親當矢石昨聞攻楊劉率先負薪渡水一鼓登城陛下儒雅守文未嘗如此俾賀瓌軰與之較力而望攘逐冦戎臣所未喻二也陛下所宜詢於黎老别運沈謀不然則憂未艾也臣雖駑怯受國恩深陛下必若乏材乞於邊陲効試末帝雖知其懇惻竟以趙張軰言翔怨望不之聽及王彥章敗於中都晉人長驅而南末帝急召翔謂之曰朕居常忽卿所奏果至今日事急矣勿以為懟且}
  - {type: page-break, offset: 2901, content: '', id: KR2a0029_WYG_037-9b, image: WYG0277/WYG0277-0167b.png}
