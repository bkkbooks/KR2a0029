  - {type: variant, offset: 3007, length: 0, content: '', WYG: 副使湖南馬殷為朗州雷滿所逼振奉命馳往和解殷滿皆稟命光啓三年十一月太祖遣振入奏於長}
  - {type: variant, offset: 3007, length: 0, content: '', krp: 副使湖南馬殷為朗州雷滿所逼振奉命馳往和解殷滿皆稟命光啓三年十一月太祖遣振入奏於長}
  - {type: variant, offset: 3008, length: 0, content: '', WYG: 舍於州邸邸吏程巖白振曰劉中尉命其姪希貞來計大事欲上謁願許之旣至巖乃先啓曰主上嚴急内官憂恐左中尉欲行廢黜之事巖等恊力以定中外敢以事告振顧希貞曰百嵗奴事三嵗主亂國不義廢君不祥非敢聞也況梁王以百萬之師匡輔天子禮樂尊戴猶恐不及幸熟計之希貞大沮而去及振復命劉季述等果作亂程巖率諸道邸吏牽帝下殿以立㓜主奉昭宗為太上皇振至陜陜已賀矣䕶軍韓彝範言其事振曰懿皇初昇遐韓中尉殺長立㓜以利其權遂亂天下今將軍復欲爾耶彝範郎文約孫也由是不敢言振東歸太祖方在邢洺遽還於汴大計未決季述遣飬子希度以唐之社稷欲輸於太祖又遣供奉官李奉本副介支彥勲詐賫上皇誥諭至皆季述黨也太祖未及迎命振又言曰夫竪刁伊戾之亂所以資霸者之事也今閹竪幽辱天子不能討無以令諸侯時監軍使劉重楚季述兄也舊相張濬寓於河}
  - {type: page-break, offset: 3008, content: '', id: KR2a0029_WYG_037-12a, image: WYG0277/WYG0277-0168c.png}
  - {type: page-break, offset: 3008, content: '', id: KR2a0029_WYG_037-12b, image: WYG0277/WYG0277-0168d.png}
  - {type: variant, offset: 3008, length: 0, content: '', krp: 舍於州邸邸吏程巖白振曰劉中尉命其姪希貞來計大事欲上謁願許之旣至巖乃先啓曰主上嚴急内官憂恐左中尉欲行廢黜之事巖等恊力以定中外敢以事告振顧希貞曰百嵗奴事三嵗主亂國不義廢君不祥非敢聞也況梁王以百萬之師匡輔天子禮樂尊戴猶恐不及幸熟計之希貞大沮而去及振復命劉季述等果作亂程巖率諸道邸吏牽帝下殿以立㓜主奉昭宗為太上皇振至陜陜已賀矣䕶軍韓彝範言其事振曰懿皇初昇遐韓中尉殺長立㓜以利其權遂亂天下今將軍復欲爾耶彝範郎文約孫也由是不敢言振東歸太祖方在邢洺遽還於汴大計未決季述遣飬子希度以唐之社稷欲輸於太祖又遣供奉官李奉本副介支彥勲詐賫上皇誥諭至皆季述黨也太祖未及迎命振又言曰夫竪刁伊戾之亂所以資霸者之事也今閹竪幽辱天子不能討無以令諸侯時監軍使劉重楚季述兄也舊相張濬寓於河}
  - {type: variant, offset: 3009, length: 2, content: 管內, WYG: 緱氏亦來謂太祖曰同中官則事易濟且得所欲唯振堅執不改獨曰行正道則大勲可立太祖英悟忽厲色曰張公勸我同勅使欲傾附自求宰相耶乃定䇿縶偽使李奉本支彥勲與希度等郎日請振將命於京師與宰相謀返正未幾劉季述伏誅昭宗復帝位太祖聞之喜召振執其手謂之曰卿所謀是吾本志穹蒼其知之矣自是益重之天祐二年春正月太祖召振謂曰王師範來降易嵗尚處故藩今將奏請徙授方面其為我馳騎以兹意逹之振至青州師範即日出公府以節度}
  - {type: page-break, offset: 3009, content: '', id: KR2a0029_WYG_037-13a, image: WYG0277/WYG0277-0169a.png}
  - {type: variant, offset: 3009, length: 2, content: 管內, krp: 緱氏亦來謂太祖曰同中官則事易濟且得所欲唯振堅執不改獨曰行正道則大勲可立太祖英悟忽厲色曰張公勸我同勅使欲傾附自求宰相耶乃定䇿縶偽使李奉本支彥勲與希度等郎日請振將命於京師與宰相謀返正未幾劉季述伏誅昭宗復帝位太祖聞之喜召振執其手謂之曰卿所謀是吾本志穹蒼其知之矣自是益重之天祐二年春正月太祖召振謂曰王師範來降易嵗尚處故藩今將奏請徙授方面其為我馳騎以兹意逹之振至青州師範即日出公府以節度}
  - {type: variant, offset: 3013, length: 0, content: '', WYG: 二印及文簿管鑰授於振師範雖已受代而疑撓特甚屢揮泣求貸其族振因以切理諭之曰公不念張繡事耶漢末繡屢與曹公立敵豈德之耶及袁紹遣使招繡賈詡曰袁家父子自不相容何能主天下英士曹公挾天子令諸侯其志大不以私讐為意不宜疑之今梁王亦豈以私怨害忠賢耶師範洒然大悟翼日以其族遷太祖乃表振為青州畱後未幾徴還唐自昭宗遷都之後王室微弱朝廷班行備員而已振皆頥指氣使旁若無人朋附者非次奬升私惡者沈棄振每自汴入洛朝中必有貶竄故唐朝人士目為䲭梟天祐中唐宰相枊璨希太祖㫖譖殺大臣裴樞陸扆}
