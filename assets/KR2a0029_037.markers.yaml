  - {type: variant, offset: 1791, length: 201, content: 之親宜於本名上加從字癸未文武百僚至張全義私第柩前立班辭以來月二日葬故也冬十月甲申朔詔賜文武百僚冬服緜帛有差近例十月初寒之始天子賜近侍執政大臣冬服帝顧謂判三司任圜曰百僚散未圜奏曰臣聞本朝給春冬服徧及百僚喪亂已來急於軍旅人君所賜未能周給今止近臣而已外臣無所賜帝曰外臣亦吾臣也卿宜計度圜遂與安重誨據品秩之差以定春冬之賜其後遂以為常右拾遺曹琮上疏內一件百僚朔望入閤及五日內殿起居請許三署寺監官輪次轉對奏事從之刑, WYG: 博士遷膳}
