  - {type: variant, offset: 1346, length: 1, content: 己, WYG: 累官自僕射至守司空在位綿五載然亦無顯赫事跡可紀扈從貝州還染時癘旬日卒于東京詔贈侍中張䇿字少逸燉煌人父同仕唐官至容管經略使䇿少聰警好學尤樂章句居洛陽敦化里嘗浚甘泉井得古鼎耳有篆字曰魏黄初元年春二月匠吉千且又製作奇巧同甚寳之䇿時在父旁徐言曰建安二十五年曹公薨改年為延康其年十月文帝受漢禪始號黄初則是黄初元年無二月明矣鼎文何謬歟同大驚亟遣啓書室取魏志展讀一不失所啓宗族奇之時年十三然而妙通因果酷奉空教}
