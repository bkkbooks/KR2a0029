  - {type: variant, offset: 2892, length: 0, content: '', krp: 云以金鑾為名非典也大學士與三館大學士同翔自釋褐東下遭遇霸王懷抱深沈有經濟之略起中和嵗至鼎革大運其間三十餘年扈從征伐出入惟幄庶務叢恒逹旦不寢唯在馬上䘯得晏息每有所禆贊亦未嘗顯諫上俛仰顧歩間微示持疑爾而太祖意已察必}
  - {type: variant, offset: 2893, length: 7, content: 正影庫本粘籤密, WYG: 行之故禆佐之迹人莫得知及太祖大漸召至御床前受顧托之命且深以并冦爲恨翔鳴咽不忍受命而退庶人友珪之篡位也以天下之望命翔為宰相友珪以翔先朝舊臣有所畏忌翔亦多稱病不綜政事末帝卽位趙張之族皆處權要翔愈不得志及劉鄩失河朔安彥之喪楊劉翔奏曰國家連年遣將出征封疆日削不獨兵驕將怯亦制置未得其術陛下處深宫之中與之計事者皆左右近習豈能量敵之勝負哉先皇時河朔半在親御虎臣驍將猶不得志於敵人今冦馬已至鄆}
