  - {type: variant, offset: 3385, length: 552, content: 考異庚子皇第二子金紫光祿大夫檢校司徒從榮可檢校太保同平章事天雄軍節度使鄴都留守以武安軍馬步軍都指揮使馬希範為澧州刺史鐵林都知事馬希杲為衡州刺史壬寅潁州刺史孫岳加檢校太保孫岳原本作孫崇今據歐陽史改正影庫本粘籤奬能政也丙午中書門下奏故事藩鎮節度觀察使帶平章事於都堂上事刊石記壁合納禮錢三千貫以充中書及兩省公使今欲各納禮錢五百千於中書立石亭子鐫勒宰臣使相官氏授上年月餘充修葺中書及兩省公署部堂什物從之庚戌御史臺奏京城坊市士庶工商之家有婢僕自經投井非理物故者近者已來凡是死亡皆是臺司左右巡舉勘檢施行已久仍恐所差人吏及街市胥徒同於民家因事邀脅邀脅原本作邀頡今從冊府元龜改正影庫本粘籤臣詢訪故事凡京城民庶之家死喪委府縣檢舉軍家委軍巡商旅委戶部然諸司檢舉後具事由申臺其間或枉濫情故臺司訪聞即行舉勘如是文武兩班官吏之家即是臺司檢舉臣請自今已後並準故事施行者詔曰今後文武兩班及諸道商旅凡有喪亡即準臺司所奏施行其坊市民庶軍士之家凡死喪及婢僕非理物故依臺司奏委府縣軍巡同檢舉仍不得縱其吏卒於物故之家妄有邀脅或恐暑月屍柩難停若待申聞檢舉縱無邀脅亦須經時日今後仰本家喚四鄰檢察若無佗故逐便葬埋如後別聞枉濫妄有保證官中訪知勘詰不虛本戶鄰保並行科罪如聞諸道州府坊市死喪取分巡院檢舉頗致淹停人多流怨亦仰約京城事例處分永樂大典卷七千一百六, WYG: 巻}
