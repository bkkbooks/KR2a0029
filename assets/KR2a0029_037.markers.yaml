  - {type: variant, offset: 2850, length: 1, content: 諸, WYG: 之體北夢瑣言云曉貌如削玉有制誥之才及典秩尚書志氣甚逺一旦非分而没咸寃惜焉豈三世為相道忌太盛歟敬翔字子振同州馮翊人唐神龍中平陽王暉之後也曾祖琬綏}
  - {type: variant, offset: 2850, length: 1, content: 諸, krp: 之體北夢瑣言云曉貌如削玉有制誥之才及典秩尚書志氣甚逺一旦非分而没咸寃惜焉豈三世為相道忌太盛歟敬翔字子振同州馮翊人唐神龍中平陽王暉之後也曾祖琬綏}
  - {type: variant, offset: 2854, length: 1, content: 經, WYG: 祖忻同州椽父袞集州刺史翔好讀書尤長刀筆應用敏捷乾符中舉進士不第及黄巢陷長安乃東出闗時太祖初鎭大梁有觀察支使王發者翔里人也翔徃依焉發以故人遇之然無由薦逹翔乆之計窘乃與人為牋刺徃徃有警句傳于軍中太祖比不知書章􅊾喜淺近語聞翔所作愛之謂發曰知公鄉人有才可與俱來及見應對稱㫖即補右職毎令從軍翔不喜武職求補文吏即署館驛巡官俾專掌􅊾奏太祖與蔡賊相拒累嵗城門之外戰聲相聞機略之間翔頗預之太祖大悦恨得翔之晩故軍謀政術一以諮之蔡賊平奏授太子中允賜緋從平兖鄆改檢校水部郎中太祖兼鎭淮南授揚府左司馬賜金紫乾寧中改光禄少卿充職天復中授檢校禮部尚書遙領蘓州刺史昭宗自岐下還長安御延喜樓召翔與李振登樓勞問翔授檢校右僕射太府卿賜號迎鑾協贊功臣太祖受禪自宣武軍掌書記前太府卿授檢校司空依前太府卿勾當宣徽院事尋改樞密院為崇政院以翔知院事開平}
