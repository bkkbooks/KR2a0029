  - {type: variant, offset: 181, length: 721, content: 以為弘信自言當得其實既而文建不洽軍情牙軍聚呼曰孰願為節度使者弘信即應曰白鬚翁早以命我可以君長爾曹唐文德元年四月牙軍推弘信為留後朝廷聞之即正授節旄乾寧中太祖急攻兗鄆朱瑄求援於太原時李克用遣大將李存信率師赴之假道於魏屯於莘縣存信御軍無法稍侵魏之芻牧弘信不平之太祖因遣使謂弘信曰太原志吞河朔迴戈之日貴道堪憂弘信懼乃歸款於太祖仍出師三萬攻李存信敗之案弘信攻李存信舊唐書與薛史同新唐書則云李存信侵魏芻牧弘信已不平既而李瑭復壁莘弘信厭其暴及聞梁王遣使相告乃迴戈攻瑭也與薛史異未幾李克用領兵攻魏營於觀音門外屬邑多拔太祖遣葛從周援之戰於洹水擒克用男落落以獻太祖令送於弘信斬之晉軍乃退是時太祖方圖兗鄆慮弘信離貳每歲時賂遺必卑辭厚禮弘信每有答貺太祖必對魏使北面拜而受之曰六兄比予有倍年之長兄弟之國安得以常隣遇之故弘信以為厚己其後弘信累官至檢校太尉封臨清王案舊唐書弘信先封豫章郡公進封北平王光化元年八月薨於位紹威襲父位為留後案舊唐書紹威自文德初授左散騎常侍充天雄軍節度副使自龍紀至乾寧十年之中累加官爵朝廷因而命之尋正授旄鉞累加檢校太尉兼侍中封長沙郡王昭宗東遷命諸道修洛邑紹威獨營太廟制加守侍中進封鄴王初至德中田承嗣盜據相魏澶博衞貝等六州召募軍中子弟置之部下號曰牙軍皆豐給厚賜不勝驕寵年代寖遠父子相襲親黨膠固其凶戾者強賈豪奪踰法犯令長吏不能禁變易主帥有同兒戲自田氏已後垂二百年案吳縝歐陽史纂誤云魏博自田承嗣專據至羅紹威時共一百五十餘年歐陽史作二百年誤蓋歐陽史仍薛史之誤也舊五代史考異主帥廢置出於其手如史憲誠何全韓君雄樂彥貞皆為其所立優奬小不如意則舉族被誅紹威懲其往弊雖以貨賂姑息而心銜之紹威嗣世之明年正月幽州劉仁恭擁兵十萬謀亂河朔進陷貝州長驅攻魏紹威求援於太祖太祖遣, WYG: ''}
