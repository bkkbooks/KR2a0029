  - {type: variant, offset: 1809, length: 191, content: 考異四年移汴州節度使安重誨素不悅習會汴人言習厚賦民錢以代納䤝及納軍租多收加耗由是罷歸京師案通鑑習自恃宿將議論多抗安重誨故重誨求其過奏之舊五代史考異授太子太師致仕求歸故里許之乃歸昭慶縣明宗以其子令謙為趙州刺史習飛揚痛飲案原本作飛鷹今考杜詩痛飲狂歌空度日飛揚跋扈為誰雄鷹字蓋揚字之訛今改正舊五代史考異周遊田里不集朋徒不過郡邑如此累年中風而卒贈太師子蒙嗣位至禮部侍郎永樂大典卷一萬八千一百, WYG: 巻}
