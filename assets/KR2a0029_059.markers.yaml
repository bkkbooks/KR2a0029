  - {type: variant, offset: 148, length: 4, content: 檢校司徒, WYG: 李嗣昭權知幽州軍府事三月帝兼領幽州遣近臣李紹宏提舉府事夏四月梁將賀􅅛圍徳勝南城百道攻擊復以艨艟扼斷津渡帝馳而往陣于北岸南城守將氏延賞告急且言矢石將盡帝以重賄召募能破賊艦者于是獻技者數十或言能吐火焚舟或能言禁呪兵刄悉命試之無驗帝憂于形色親從都將王建及進曰臣請効命乃以臣索連舟十艘選効節勇士三百人持斧被鎧鼓枻而進至中流梁樓船三層䝉以牛革懸板為楯建及率持斧者入艨艟間斬其竹笮破其懸楯又于上流取甕數百用竹笮維之積薪于上灌以脂膏火發亘空又以巨艦載甲士令乘煙鼓譟梁之樓船斷紲而下沈澄者殆半軍既得渡梁軍乃退命騎將追襲至濮陽俘斬千計賀瓌由此飲氣遘疾而卒秋七月帝歸晉陽八月梁將王瓚帥衆數萬}
  - {type: page-break, offset: 148, content: '', id: KR2a0029_WYG_059-1b, image: WYG0277/WYG0277-0259b.png}
