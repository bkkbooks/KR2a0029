  - {type: variant, offset: 1801, length: 0, content: '', WYG: 張憲權知鎮州軍州事同光元年春正月丙子五臺山僧獻銅鼎三言于山中石崖間得之二月新州團練使李嗣肱卒是時以諸藩鎮相繼上牋勸進乃命有司制置百官省寺仗衛法物期以四月行即位之禮以河東節度判官盧質為大禮使三月已卯以横海軍節度使内外蕃漢馬歩總管李存審為幽州節度使潞州留後李繼韜叛送欵于梁是月築即位壇于魏州牙城之南夏四月已巳帝昇壇祭告昊天上帝遂即皇帝位文武臣寮稱賀禮畢御應天門宣制改天祐二十年為同光元年大赦天下自四月二十五日昧爽以前除十惡五逆放火行刧持杖殺人官典犯贓屠牛鑄錢合造毒藥外罪無輕重咸赦除之應蕃漢馬歩將校並賜功臣名號超授檢校官巳髙者與一子六品正員官兵士並賜等第優給其戰殁功臣各加追贈仍定諡號民年八十已上與免一子役内外文武職官並可直言極諫無有隐諱貢選二司宜令有司速啇量施行雲應蔚朔易定幽燕及山後八軍秋夏税率量與蠲減民有三世已上不分居者與免雜徭諸道應有祥瑞不用奏聞赦書有所未該委所司條奏以聞云是歲自正月不雨人心憂恐宣赦之日澍雨溥降初唐咸通中金水土火四星聚于畢昴太史奏畢昴趙魏之分其下將有王者懿宗乃詔令鎮州王景崇被衮冕攝朝三日遣臣下備儀注軍府稱臣以厭之其後四十九年帝破梁軍于柏鄉平定趙魏至是即位于鄴宫是月以行臺左丞相豆盧革為門下侍郎同中書門下平章事太清宫使以行臺右丞相盧澄為中書侍郎平章事監修國史以前定州掌書記李徳休為御史中丞以河東節度判官盧質為兵部尚書充翰林學士承旨以河東掌書記馮道為户部侍郎充翰林學士以魏博鎮冀觀察判官張憲為工部侍郎充租庸使以中門使郭崇韜昭義監軍使張居翰並為樞宻使以權知幽州軍府事李紹宏為宣徽使以魏博節度判官王正言為禮部尚書行興唐尹以河東軍城都虞候孟知祥為太原尹充西京副留守以澤潞節度判官任圜為工部尚書兼真定尹充北京副留守詔升魏州為東京興唐府改元城縣為興唐縣貴郷縣為廣晉縣以太原為西京以鎮州為北都是時所管節度一十三州五十閏月丁丑以李嗣源為檢校侍中依前横海軍節度使内外蕃漢副總管以幽州節度使李存審為檢校太師兼中書令依前蕃漢馬步總管以河東節度使朱友謙為檢校太師兼尚書令安國軍節度使符習加同平章事定州節度使王都加檢校侍中是月追尊曾祖蔚州太保為照烈皇帝廟號懿祖夫人崔氏曰昭烈皇后追尊皇祖代州太保為文景皇帝廟號獻祖夫人秦氏曰文景皇后追尊皇考河東節度使太師中書令晉王為武皇帝廟號太祖詔于晉陽立宗廟以髙祖神堯皇帝太宗文皇帝懿宗昭聖皇帝昭宗聖穆皇帝及懿祖以下為七廟甲午契丹寇幽州至易定而還時有自鄆來者言節度使戴思逺領兵在河上州城無守兵可襲而取之帝召李嗣源謀曰昭義阻命梁將董璋攻迫澤州梁志在澤潞不慮别有事生汶陽無備不可失也嗣源以為然壬寅令嗣源率歩騎五千箝枚自河趨鄆是夜隂雨我師至城下鄆人不覺遂乘城而入鄆州平制以李嗣源為天平軍節度使梁主聞鄆州陷大恐乃遣王彦章代戴思逺總兵以來拒時朱守殷守徳勝南城帝懼彦章奔衝遂幸澶州五月辛酉彦章夜率舟師自楊村浮河而下斷徳勝之浮橋攻南城陷之帝令中書焦彦賓馳至楊劉固守其城命朱守殷撤徳勝北城屋木攻具浮河而下以助楊劉是時徳勝軍食芻茭薪炭數十萬計至是令人輦負入澶州事既倉卒耗失殆半朱守殷以所毁屋木編栰置歩軍于其上王彦章以舟師沿流而下各行一岸每遇轉灘水滙即中流交鬬流矢雨集或全舟覆没一彼一此終日百戰比及楊劉殆亡其半已已王彦章段凝率大軍攻楊劉南城焦彦賓與城守將李周極力固守梁軍晝夜攻擊百道齊進竟不能下遂結營于楊劉之南東西延袤十數柵六月巳亥帝親御軍至楊劉登城望見梁軍重壕複壘以絶其路帝乃選勇士持短兵出戰梁軍于城門外連延屈曲穿掘小壕伏甲兵于中候帝軍至則弓弩齊發師人多傷兵不得進帝患之問計于郭崇韜崇韜請于下流據河築壘以救鄆州又請帝日令勇士挑戰旬日之内寇若不至營壘必成帝善之即令崇韜與毛璋率數千人中夜往博州濟河東晝夜督役居六日營壘將成戊子梁將王彦章杜晏球領徒數萬晨壓帝之新壘時板築雖畢牆仞低庳戰具未備沙城散惡王彦章列騎環城虐用其人使步軍堙壕登堞又于上流下巨艦十餘艘扼斷濟路自旦至午攻擊百端城中危急帝自楊劉引軍陣于西岸城中望之大呼帝艤舟將渡梁軍遂解圍退保鄒家口秋七月丁未帝御軍沿河而南梁軍棄鄒家口夜遁委棄鍋甲芻糧千計戊午遣騎將李紹貽直抵梁軍壘梁益恐又聞李嗣源自鄆州引大軍將至已未夜梁軍拔營而遁復保于楊村帝軍屯于徳勝甲子帝幸楊劉城巡視梁軍故壘八月壬申朔帝遣李紹斌以甲士五千援澤州初李繼韜之叛也潞之舊將裴約以兵戍澤州不徇繼韜之逆既而梁遣董璋率衆攻其城約拒守久之告急于帝故遣紹斌救之未至而城巳陷裴約被害帝聞之嗟痛不已甲戌帝自楊劉歸鄴梁以段凝代王彦章為帥戊子凝帥衆五萬結營于王村自髙陵渡河帝軍遇之生擒梁前鋒軍士二百餘戮于都市庚寅帝御軍至朝城戊戌梁左右先鋒指揮使康延孝領百騎來奔帝虚懐引見賜御衣玉帶屏人問之對曰臣竊觀汴人兵衆不少論其君臣將校則終見敗亡趙巖趙鵠張漢傑居中專政締結宫掖賄賂公行段凝素無武畧一朝便見大用霍彦威王彦章皆宿將有名翻出其下自彦章獲徳勝南城梁主亦稍奬使彦章立性剛暴不耐凌制梁主一每發軍即令近臣監䕶進止可否悉取監軍處分彦章悒悒形于顔色自河津失利段凝彦章又獻謀欲數道舉軍令董璋以陜虢澤潞之衆趨石會闗以寇太原霍彦威統闗西汝洛之衆自相衛以寇鎮定段凝杜晏球領大軍以當陛下令王彦章張漢傑統禁軍以攻鄆州決取十月内大舉又自滑州南決破河堤使水東注曹濮之間至于汶陽瀰漫不絶以陷北軍臣在軍側聞此議臣惟汴入兵力聚不不少分則無餘陛下但待分兵領鐡騎五千自鄆州兼程直抵于汴不旬日天下事定矣帝懌然壯之九月壬寅朔帝在朝城凝兵至臨河南與帝之騎軍接戰是時澤潞叛衛州黎陽為梁人所據州以西相以南寇鈔日至編户流亡計其軍賦不支半年又王郁盧文進召契丹南侵瀛涿又聞梁人將圖大舉帝深憂之召將吏謀其大計或曰自我得汶陽以來湏大將固守城門之外元是賊疆細而料之得不如失今若馳檄告諭梁人却衛州黎陽以易鄆州指河為界約}
