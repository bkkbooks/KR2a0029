  - {type: variant, offset: 1520, length: 2, content: 習奏, WYG: 王處直為其子都幽於别室都自稱㽞後歐陽史王處直叛附于契丹其子都幽處直以來附十一月帝至鎮州城下張處瑾遣弟處琪幕客齊儉等候帝乞降言猶不遜帝命囚之時王師築土山以攻其壘城中亦起土山以拒之旬日之間機巧百變張處瑾令韓正時以千騎夜突圍將入定州與王處直議事為我游軍追擊破之餘衆保衡唐賊將彭贇斬正時以降十二月辛未王郁誘契丹案巴堅冦幽州契丹國志王處直在定州以鎮定為唇齒恐鎮亡而定孤乃潜使人語其子王郁使賂契丹令犯塞以救鎮州之圍王郁説太祖}
