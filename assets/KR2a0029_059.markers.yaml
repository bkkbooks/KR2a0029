  - {type: variant, offset: 809, length: 402, content: 西北解圍而還胡柳之役諸軍逗撓汴軍登無石山其勢甚盛莊宗望之畏其不敵且欲保營寶進曰王深入敵境偏師不利王彥章騎軍已入濮州山下唯列步兵向晚皆有歸志我盡銳擊之敗走必矣今若引退必為所乘我軍未集更聞賊勝即不戰而自潰也凡決勝料勢決戰料情情勢已得斷在不疑今王之成敗在此一戰若不決勝設使餘衆渡河河朔非王有也王其勉之莊宗聞之聳聽曰微公幾失計即引騎大譟奮矟登山大敗汴人十八年張文禮殺王鎔叛張文禮原本作大禮今據歐陽史改正影庫本粘籤寶帥師進討八月收趙州進渡滹水擒賊黨張友順以獻九月進逼真定結營西南隅掘塹柵以環之決大悲寺漕渠以浸其郛十九年正月契丹三十萬來援鎮州前鋒至新樂衆心憂之寶見莊宗指陳方略軍情乃安敵退加檢校侍中三月城中饑王處瑾之衆出城求食寶縱其出伏兵截擊之饑賊大至諸軍未集為賊所乘寶乃收軍退保趙州因慚憤成疾疽發背而卒時年六十同光初追贈太師晉天福中追封太原郡王有子八人宏倫宏儒皆位至郡守永樂大典卷九千八百二符習趙州昭慶縣人少從軍事, WYG: ''}
