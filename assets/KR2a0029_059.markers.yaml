  - {type: variant, offset: 2003, length: 2873, content: 烏震冀州信都人也少孤自勤於鄉校弱冠從軍初為鎮州隊長以功漸升部將與符習從征於河上頗得士心聞張文禮弒王鎔志復主讎雪泣請行兵及恆陽文禮執其母妻洎兒女十口誘之不迴攻城日急文禮忿之咸割鼻斷腕不絕於膚放至軍門觀者皆不忍正視震一慟而止憤激奮命身先矢石鎮州平以功授震深趙二州刺史其性純質以清直御下在河北獨有政聲移易州刺史案歐陽史作冀州舊五代史考異兼北面水陸轉運招撫等使契丹犯塞漁陽路梗震率師運糧三入薊門擢為河北道副招討遙領宣州節度使代房知溫軍於盧臺及至軍會戍兵龍晊所部鄴都奉節等軍數千人作亂龍晊原本作龍姪今據歐陽史改正影庫本粘籤未及交印而遇害明宗聞之廢朝一日詔贈太傅案歐陽史作太師舊五代史考異震略涉書史尤嗜左氏傳好為詩善筆札凡郵亭佛寺多有留題之跡及其遇禍燕趙之士皆歎惜之永樂大典卷一萬八千一百二十九王瓚故河中節度使重盈之諸子也天復初梁祖既平河中追念王氏舊恩辟瓚為賓佐梁祖即位歷諸衞大將軍兗華兩鎮節度使開封尹貞明五年代賀瓌統軍駐於河上時李存審築壘於德勝渡秋八月瓚率汴軍五萬自黎陽渡河將掩擊魏州明宗出師拒之瓚至頓丘而旋於楊村夾河築壘架浮航自滑饋運相繼瓚嚴於軍法令行禁止然機略應變則非所長十一月瓚率其衆觀兵於戚城明宗以前鋒擊之獲其將李立十二月邏騎報汴之饋糧千計沿河而下可掩而取之莊宗遣徒兵五千設伏以待之使騎軍循河南岸西上俘獲饋役數千瓚結陣河曲以待王師既而兵合一戰敗之瓚衆走保南城瓚以小舟北渡僅免是日獲馬千餘匹俘斬萬級王師乘勝狥地曹濮梁主以瓚失律令戴思遠代還及王師襲汴時瓚為開封府尹開封原本脫封字今據通鑑增入影庫本粘籤梁主聞王師將至自登建國門樓日夜垂泣時持國寶謂瓚曰吾終保有此者繫卿耳令瓚閱市人散徒登城為備洎明宗至封丘門瓚開門迎降翌日莊宗御玄德殿瓚與百官待罪及進幣馬詔釋之仍令收梁主屍備槥櫝權厝於佛寺漆首函送於郊社居數日段凝上疏奏梁朝掌事權者趙巖等並助成虐政結怨於人聖政維新宜誅首惡以謝天下於是張漢傑張漢融張漢倫張希逸趙縠朱珪等並族誅家財籍沒瓚聞諸族當法憂悸失次每出則與妻子訣別郭崇韜遣人慰譬之詔授宣武軍節度副使知府事檢校太傅如故案歐陽史云瓚伏地請死莊宗勞而起之曰朕與卿家世婚姻然人臣各為主耳復何罪邪因以為開封尹遷宣武軍節度使據薛史則瓚以宣武軍節度副使知府事未嘗遷秩也瓚心憂疑成疾十二月卒贈太子太師瓚雖為治嚴肅而慘酷有家世風自歷守藩鎮頗能除盜而明不能照下及尹政京邑委政於愛壻牙將辛廷蔚曲法納賄因緣為奸初汴人駐軍於河上軍計不足瓚請率汴之富戶出助軍錢賦取不均人靡控訴至有雉經者又有富室致賂幸而免率者及明宗即位素知廷蔚之奸乃勒歸田里然瓚能優禮搢紳抑挫豪猾故當時士流皆稱仰焉永樂大典卷六千六百八十袁象先宋州下邑人也自稱唐中宗朝中書令南陽郡王恕己之後曾祖進朝成都少尹梁以象先貴累贈左僕射祖忠義忠武軍節度判官累贈司空父敬初太府卿累贈司徒駙馬都尉敬初娶梁祖之妹初封沛郡太君開平中追封長公主貞明中追封萬安大長公主象先即梁祖之甥也性寬厚不忤於物幼遇亂慨然有憂時之意象先嘗射一水鳥不中箭落水中下貫雙鯉見者異之梁祖鎮夷門象先起家授銀青光祿大夫檢校太子賓客兼御史中丞景福元年自檢校左省常侍遷檢校工部尚書充元從馬軍指揮使兼左靜邊都指揮使乾寧五年再遷檢校右僕射左領軍衞將軍同正充宣武軍內外馬步軍都指揮使光化二年權知宿州軍州事天復元年表授刺史充本州團練埇橋鎮遏都知兵馬使會淮寇大至圍迫州城象先殫力禦備時援兵未至頗懷憂沮一日登北城憩其樓堞之上怳然若寢夢人告曰我陳璠也陳璠原本作揀璠今據冊府元龜改正影庫本粘籤嘗板築是城舊第猶在今為軍舍可為我立廟即助公陰兵象先納之翌日淮寇急攻其壘梯角進是日州城幾陷頃之有大風雨居民望見城上兵甲無算寇不能進即時退去象先方信鬼神之助乃為之立祠至今里人禱祝不輟三年權知洺州軍州事洺州原本作洛州今從歐陽史改正影庫本粘籤天祐三年授陳州刺史檢校司空是歲陳州大水民饑有物生於野形類蒲萄其實可食貧民賴焉梁開平二年授左英武軍使再遷左神武右羽林統軍三年轉右衞上將軍封汝南縣男四年權知宋州留後到任五月改天平軍兩使留後時鄆境再饑戶民流散象先即開倉賑卹蒙賴者甚衆五年梁祖北征以象先為鎮定東南行營都招討應接副使進封開國伯領兵攻蓨縣不克而還俄奉詔自鄆赴闕鄆人遮留毀石橋而不得進乃自他門而逸尋授左龍武統軍兼侍衞親軍都指揮使乾化三年與魏博節度使楊師厚合謀誅朱友珪於洛陽梁末帝即位以功授檢校太保同平章事遙領洪州節度使行開封尹判在京馬步諸軍進封開國公四年授青州節度使加檢校太傅未幾移鎮宋州加檢校太尉象先在宋凡十年初梁祖領四鎮統兵十萬威震天下關東藩守皆其將吏方面補授由其保薦四方輿金輦璧駿奔轡轍納賂於其庭如是者十餘年寖成風俗藩侯牧守下迨羣吏罕有廉白者率皆掊斂剝下以事權門象先恃甥舅之勢所至藩府侵刻誅求尤甚以此家財鉅萬莊宗初定河南象先率先入覲輦珍幣數十萬遍賂權貴及劉皇后伶官巷伯居旬日內外翕然稱之初梁將未復官資者凡上章奏姓名而已郭崇韜奏曰河南征鎮將吏昭洗之後未有新官每上表章但書名姓未頒綸制必負憂疑即日復以象先為宋亳耀輝潁節度使依前檢校太尉平章事仍賜姓名紹安尋令歸鎮明年以郊禮象先復來朝是時制改宋州宣武軍為歸德軍宋州原本作宗州今從通鑑改正影庫本粘籤因侍宴莊宗謂象先曰歸德之名無乃著題否象先拜謝而退即命歸鎮其年夏以疾卒於治所年六十一冊贈太師周廣順中贈中書令追封楚國公象先二子長曰正辭歷衢雄二州刺史次曰至周顯德中終於滄州節度使永樂大典卷五千一百十四張溫字德潤魏州魏縣人也案溫于潼關擒劉浣見梁紀此傳不載舊五代史考異始仕梁祖為步直小將改崇明都校貞明初貞明原本作貞宗今據薛史梁書改正影庫本粘籤蔣殷以徐州叛從劉鄩討平之改左右捉生都指揮使莊宗伐邢臺獲之用為永清都校歷武州刺史山後八軍都將從莊宗襲契丹於幽州收新州歷銀槍効義都指揮使再任武州刺史同光初契丹陷媯儒檀順平薊六州武州獨全改授蔚州刺史天成初歷振武昭武留後尋授利州節度使入為右衞上將軍無幾授洋州節度使右龍武統軍改雲州節制清泰初屯兵鴈門逐契丹出塞移鎮晉州嬰疾而卒詔贈太尉永樂大典卷六千六百六十李紹文鄆州人本姓張名從楚少事朱瑄為帳下瑄敗歸於梁祖為四鎮牙校累典諸軍天祐八年從王景仁戰敗於柏鄉紹文與別將曹儒收殘衆退保相州王師之攻魏州也紹文率衆自黎陽將渡河時汴人大恐河無舟檝紹文懼為王師所逼乃剽黎陽臨河內黃至魏州歸於莊宗莊宗嘉納之賜姓名分其兩將三千人為左右匡霸軍旅仍令紹文曹儒分將之從周德威討劉守光進檢校司空移將匡衞軍十二年授博州刺史預破劉鄩於故元城歷貝隰代三郡刺史領天雄軍馬步副都將屯於德勝從閻寶討張文禮為馬步軍都虞候明宗收鄆州以紹文為右都押衙馬步軍都將從破王彥章於中都同光中歷徐滑二鎮副使知府事三年從郭崇韜討西川為洋州節度留後領鎮江軍節度天成初為武信軍節度使尋卒於鎮永樂大典卷一萬一百八十九史臣曰昔丁會之事梁祖也功既隆矣禍將及矣挺身北首故亦宜然然食人之祿豈合如是哉閻寶再降於人夫何足貴焉符習雪故主之沉寃享通侯之貴位乃趙之奇士也奇士原本脫士字今考夏文莊集所引薛史作奇士今改正影庫本粘籤烏震不憫其親仁斯鮮矣雖慕樂羊之跡豈事文侯之宜瓚洎象先而下皆降將也又何足以譏焉永樂大典卷一萬一百八十九, WYG: ''}
  - {type: variant, offset: 2003, length: 2873, content: 烏震冀州信都人也少孤自勤於鄉校弱冠從軍初為鎮州隊長以功漸升部將與符習從征於河上頗得士心聞張文禮弒王鎔志復主讎雪泣請行兵及恆陽文禮執其母妻洎兒女十口誘之不迴攻城日急文禮忿之咸割鼻斷腕不絕於膚放至軍門觀者皆不忍正視震一慟而止憤激奮命身先矢石鎮州平以功授震深趙二州刺史其性純質以清直御下在河北獨有政聲移易州刺史案歐陽史作冀州舊五代史考異兼北面水陸轉運招撫等使契丹犯塞漁陽路梗震率師運糧三入薊門擢為河北道副招討遙領宣州節度使代房知溫軍於盧臺及至軍會戍兵龍晊所部鄴都奉節等軍數千人作亂龍晊原本作龍姪今據歐陽史改正影庫本粘籤未及交印而遇害明宗聞之廢朝一日詔贈太傅案歐陽史作太師舊五代史考異震略涉書史尤嗜左氏傳好為詩善筆札凡郵亭佛寺多有留題之跡及其遇禍燕趙之士皆歎惜之永樂大典卷一萬八千一百二十九王瓚故河中節度使重盈之諸子也天復初梁祖既平河中追念王氏舊恩辟瓚為賓佐梁祖即位歷諸衞大將軍兗華兩鎮節度使開封尹貞明五年代賀瓌統軍駐於河上時李存審築壘於德勝渡秋八月瓚率汴軍五萬自黎陽渡河將掩擊魏州明宗出師拒之瓚至頓丘而旋於楊村夾河築壘架浮航自滑饋運相繼瓚嚴於軍法令行禁止然機略應變則非所長十一月瓚率其衆觀兵於戚城明宗以前鋒擊之獲其將李立十二月邏騎報汴之饋糧千計沿河而下可掩而取之莊宗遣徒兵五千設伏以待之使騎軍循河南岸西上俘獲饋役數千瓚結陣河曲以待王師既而兵合一戰敗之瓚衆走保南城瓚以小舟北渡僅免是日獲馬千餘匹俘斬萬級王師乘勝狥地曹濮梁主以瓚失律令戴思遠代還及王師襲汴時瓚為開封府尹開封原本脫封字今據通鑑增入影庫本粘籤梁主聞王師將至自登建國門樓日夜垂泣時持國寶謂瓚曰吾終保有此者繫卿耳令瓚閱市人散徒登城為備洎明宗至封丘門瓚開門迎降翌日莊宗御玄德殿瓚與百官待罪及進幣馬詔釋之仍令收梁主屍備槥櫝權厝於佛寺漆首函送於郊社居數日段凝上疏奏梁朝掌事權者趙巖等並助成虐政結怨於人聖政維新宜誅首惡以謝天下於是張漢傑張漢融張漢倫張希逸趙縠朱珪等並族誅家財籍沒瓚聞諸族當法憂悸失次每出則與妻子訣別郭崇韜遣人慰譬之詔授宣武軍節度副使知府事檢校太傅如故案歐陽史云瓚伏地請死莊宗勞而起之曰朕與卿家世婚姻然人臣各為主耳復何罪邪因以為開封尹遷宣武軍節度使據薛史則瓚以宣武軍節度副使知府事未嘗遷秩也瓚心憂疑成疾十二月卒贈太子太師瓚雖為治嚴肅而慘酷有家世風自歷守藩鎮頗能除盜而明不能照下及尹政京邑委政於愛壻牙將辛廷蔚曲法納賄因緣為奸初汴人駐軍於河上軍計不足瓚請率汴之富戶出助軍錢賦取不均人靡控訴至有雉經者又有富室致賂幸而免率者及明宗即位素知廷蔚之奸乃勒歸田里然瓚能優禮搢紳抑挫豪猾故當時士流皆稱仰焉永樂大典卷六千六百八十袁象先宋州下邑人也自稱唐中宗朝中書令南陽郡王恕己之後曾祖進朝成都少尹梁以象先貴累贈左僕射祖忠義忠武軍節度判官累贈司空父敬初太府卿累贈司徒駙馬都尉敬初娶梁祖之妹初封沛郡太君開平中追封長公主貞明中追封萬安大長公主象先即梁祖之甥也性寬厚不忤於物幼遇亂慨然有憂時之意象先嘗射一水鳥不中箭落水中下貫雙鯉見者異之梁祖鎮夷門象先起家授銀青光祿大夫檢校太子賓客兼御史中丞景福元年自檢校左省常侍遷檢校工部尚書充元從馬軍指揮使兼左靜邊都指揮使乾寧五年再遷檢校右僕射左領軍衞將軍同正充宣武軍內外馬步軍都指揮使光化二年權知宿州軍州事天復元年表授刺史充本州團練埇橋鎮遏都知兵馬使會淮寇大至圍迫州城象先殫力禦備時援兵未至頗懷憂沮一日登北城憩其樓堞之上怳然若寢夢人告曰我陳璠也陳璠原本作揀璠今據冊府元龜改正影庫本粘籤嘗板築是城舊第猶在今為軍舍可為我立廟即助公陰兵象先納之翌日淮寇急攻其壘梯角進是日州城幾陷頃之有大風雨居民望見城上兵甲無算寇不能進即時退去象先方信鬼神之助乃為之立祠至今里人禱祝不輟三年權知洺州軍州事洺州原本作洛州今從歐陽史改正影庫本粘籤天祐三年授陳州刺史檢校司空是歲陳州大水民饑有物生於野形類蒲萄其實可食貧民賴焉梁開平二年授左英武軍使再遷左神武右羽林統軍三年轉右衞上將軍封汝南縣男四年權知宋州留後到任五月改天平軍兩使留後時鄆境再饑戶民流散象先即開倉賑卹蒙賴者甚衆五年梁祖北征以象先為鎮定東南行營都招討應接副使進封開國伯領兵攻蓨縣不克而還俄奉詔自鄆赴闕鄆人遮留毀石橋而不得進乃自他門而逸尋授左龍武統軍兼侍衞親軍都指揮使乾化三年與魏博節度使楊師厚合謀誅朱友珪於洛陽梁末帝即位以功授檢校太保同平章事遙領洪州節度使行開封尹判在京馬步諸軍進封開國公四年授青州節度使加檢校太傅未幾移鎮宋州加檢校太尉象先在宋凡十年初梁祖領四鎮統兵十萬威震天下關東藩守皆其將吏方面補授由其保薦四方輿金輦璧駿奔轡轍納賂於其庭如是者十餘年寖成風俗藩侯牧守下迨羣吏罕有廉白者率皆掊斂剝下以事權門象先恃甥舅之勢所至藩府侵刻誅求尤甚以此家財鉅萬莊宗初定河南象先率先入覲輦珍幣數十萬