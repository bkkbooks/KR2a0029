body:
  text: 舊五代史卷五十六唐書三十二列傳第八周德威字鎮遠小字陽五案葛從周碑作楊五舊五代史考異朔州馬邑人也初事武皇為帳中騎督驍勇便騎射膽氣智數皆過人久在雲中諳熟邊事望煙塵之警懸知兵勢乾寧中為鐵林軍使從武皇討王行瑜以功加檢校左僕射移內衙軍副光化二年三月光化原本作先作今從新唐書改正影庫本粘籤汴將氏叔琮率衆逼太原有陳章者以虓勇知名衆謂之夜叉言於叔琮曰晉人所恃者周陽五願擒之請賞以郡案歐陽史作梁軍圍太原令軍中曰能生得周陽五者為刺史與薛史微異舊五代史考異陳章嘗乘驄馬朱甲以自異武皇戒德威曰我聞陳夜叉欲取爾求郡宜善備之德威曰陳章大言未知鹿死誰手他日致師戒部下曰如陳上見陳夜叉爾等但走德威微服挑戰部下偽退陳章縱馬追之德威背揮鐵檛擊墮馬生獲以獻案通鑑作以戟擒之與薛史異由是知名天復中我師不利於蒲縣汴將朱友寧氏叔琮來逼晉陽時諸軍未集城中大恐德威與李嗣昭選募鋭兵出諸門攻其壘擒生斬馘汴人枝梧不暇乃退天祐三年與李嗣昭合燕軍攻潞州降丁會以功加檢校太保代州刺史代嗣昭為蕃漢都將李思安之寇潞州也德威軍於余吾時汴軍十萬築夾城圍潞州內外斷絶德威以精騎薄之屢敗汴人進營高河令遊騎邀其芻牧汴軍閉壁不出乃自東南山口築甬道樹柵以通夾城德威之騎軍倒牆堙塹日數十戰前後俘馘不可勝紀梁有驍將黃角鷹方骨崙皆生致之五年正月武皇疾篤德威退營亂柳武皇厭代四月命德威班師時莊宗初立德威外握兵柄頗有浮議內外憂之德威既至單騎入謁伏靈柩哭哀不自勝由是羣情釋然是月二十四日從莊宗再援潞州二十九日德威前軍營橫碾案莊宗紀作黃展舊五代史考異橫碾通鑑作黃展今考册府元龜引薛史亦作橫碾姑仍其舊影庫本粘籤距潞四十五里五月朔晨霧晦暝王師伏於三垂岡下翌日直趨夾城斬關破壘梁人大敗解潞州之圍初德威與李嗣昭有私憾武皇臨終顧謂莊宗曰進通忠孝不負我重圍纍年似與德威有隙以吾命諭之若不解重圍歿有遺恨莊宗達遺旨德威感泣由是勵力堅戰竟破強敵與嗣昭歡愛如初以功加檢校太保同平章事振武節度使六年岐人攻靈夏遣使來求助德威渡河以應之師還授蕃漢馬步總管七年十一月汴人據深冀汴將王景仁軍八萬次柏鄉鎮州節度使王鎔來告難帝遣德威率前軍出井陘屯於趙州十二月帝親征二十五日進薄汴營距柏鄉五里五里原本作互里考通鑑及歐陽史俱作五里今改正影庫本粘籤營於野河上汴將韓勍率精兵三萬鎧甲皆被繒綺金銀炫曜望之森然我軍懼形於色德威謂李存璋曰賊結陳而來觀其形勢志不在戰欲以兵甲耀威耳我軍人乍見其來謂其鋒不可當此時不挫其鋭吾軍不振矣乃遣存璋諭諸軍曰爾見此賊軍否是汴州天武健兒天武原本作太武考薛史前後俱作天武今改正影庫本粘籤皆屠沽傭販虛有表耳縱被精甲十不當一擒獲足以為資德威自率精騎擊其兩偏左馳右決出沒數四是日獲賊百餘人賊渡河而退德威謂莊宗曰賊驕氣充盛宜按兵以待其衰案歐陽史祇載德威勉諭其衆即告莊宗曰賊兵甚鋭未可與爭不載精騎擊退賊兵之事考下文有去賊咫尺限此一渠水云云則賊渡河而退一節紀載殊不可闕舊五代史考異莊宗曰我提孤軍救難解紛三鎮烏合之衆利在速戰卿欲持重吾懼其不可使也德威曰鎮定之士長於守城列陳野戰素非便習我師破賊唯恃騎軍平田廣野易為施功今壓賊營令彼見我虛實則勝負未可必也莊宗不悅退臥帳中德威患之謂監軍張承業曰王欲速戰將烏合之徒欲當劇賊所謂不量力也去賊咫尺限此一渠水彼若早夜以略彴渡之吾族其為俘矣若退軍鄗邑引賊離營彼出則歸復以輕騎掠其芻餉不踚月敗賊必矣承業入言莊宗乃釋然德威得降人問之曰景仁下令造浮橋數日果如德威所料二十七日乃退軍保鄗邑八年正月二日德威率騎軍致師於柏鄉設伏於村塢間今三百騎以壓汴營三百騎原本作七百考通鑑及歐陽史俱作三百今改正影庫本粘籤王景仁悉其衆結陳而來德威轉戰而退汴軍因而乘之至於鄗邑南時步軍未成列德威陳騎河上以抗之亭午兩軍皆陳莊宗問戰時德威曰汴軍氣盛可以勞逸制之造次較力殆難與敵古者師行不踰一舍蓋慮糧餉不給士有飢色今賊遠來決戰縱挾糗糒亦不遑食晡晚之後飢渴內侵戰陳外迫士心既倦將必求退乘其勞弊以生兵制之縱不大敗偏師必喪以臣所籌利在晡晚諸將皆然之時汴軍以魏博之人為右廣宋汴之人為左廣自未至申陳勢稍却德威麾軍呼曰汴軍走矣塵埃漲天魏人收軍漸退莊宗與史建瑭安金全等因衝其陳夾攻之大敗汴軍殺戮殆盡王景仁李思安僅以身免獲將校二百八十人八月劉守光僭稱大燕皇帝十二月遣德威率步騎三萬出飛狐與鎮州將王德明定州將程嚴等軍進討九年正月收涿州降刺史劉知溫五月七日劉守光令驍將單廷圭督精甲萬人出戰單廷圭薛史唐本紀作單無敵前後異名辨證在唐紀影庫本粘籤德威遇於龍頭岡初廷圭謂左右曰今日擒周陽五既臨陳見德威廷圭單騎持槍躬追德威垂及德威側身避之廷圭少退德威奮檛擊墜其馬生獲廷圭賊黨大敗斬首三千級獲大將李山海等五十二人十二日德威自涿州進軍良鄉良鄉原本作宜卿今從通鑑改正影庫本粘籤大城守光既失廷圭自是奪氣德威之師屢收諸郡降者相繼十年十一月擒守光父子幽州平十二月授德威檢校侍中幽州盧龍等軍節度使德威性忠孝感武皇奬遇嘗思臨難忘身案遼史周德威初至鎮盧文進引遼師攻之城幾陷以救得免此事薛史列傳不載十二年汴將劉鄩自洹水乘虛將寇太原德威在幽州聞之徑以五百騎馳入土門聞鄩軍至樂平不進德威徑至南宮以候汴軍初劉鄩欲據臨清以扼鎮定轉餉之路行次陳宋口德威遣將擒數十人皆倳刃於背縶而遣之案通鑑從莊宗實録作擒其斥候者數十人斷腕而縱之舊五代史考異既至謂劉鄩曰周侍中已據宗城矣案通鑑作臨清考異曰劉鄩見在宗城薛史云周侍中據宗城蓋臨清字誤耳舊五代史考異德威其夜急騎扼臨清劉鄩乃入貝州是時德威若不至則勝負未可知也十四年三月契丹寇新州德威不利退保范陽案遼史太祖紀神册二年三月辛亥攻幽州節度使周德威以幽並鎮定魏五州兵拒戰于居庸關之西戰于新州東大破之斬首三萬級又通鑑契丹主帥衆三十萬德威衆寡不敵大為契丹所敗舊五代史考異敵衆攻城僅二百日外援未至德威撫循士衆晝夜乘城竟獲保守十五年我師營麻口渡將大舉以定汴州德威自幽州率本軍至十二月二十三日軍次胡柳陂詰旦騎報曰汴軍至矣莊宗使問戰備德威奏曰賊倍道而來未成營壘我營柵已固守備有餘既深入賊疆須決萬全之策此去大梁信宿賊之家屬盡在其間人之常情孰不以家國為念以我深入之衆抗彼激憤之軍不以方略制之恐難必勝王但按軍保柵臣以騎軍疲之使彼不得下營際晚糧餉不給進退無據因以乘之破賊之道也莊宗曰河上終日挑戰恨不遇賊今款門不戰非壯夫也乃率親軍成列而出德威不獲已從之謂其子曰吾不知其死所矣莊宗與汴將王彥章接戰大敗之德威之軍在東偏汴之遊軍入我輜重輜重原本作輕重今從通鑑改正影庫本粘籤衆駭奔入德威軍因紛擾無行列德威兵少不能解父子俱戰歿先是鎮星犯上將星占者云不利大將是夜收軍德威不至莊宗慟哭謂諸將曰喪我良將吾之咎也德威身長面黑笑不改容凡對敵列陳凜凜然有肅殺之風中興之朝號為名將及其歿也人皆惜之同光初追贈太師天成中詔與李嗣昭符存審配饗莊宗廟廷晉高祖即位追封燕王子光輔歷汾汝州刺史永樂大典卷九千九百九十七符存審字德詳陳州宛邱人案歐陽史義兒傳唯符存審不在其列別自為傳蓋存審子彥卿有女為宋太宗后故存其本姓也舊名存父楚本州牙將存審少豪俠多智算言兵家事乾符末河南盜起存審鳩率豪右庇捍州里會郡人李罕之起自羣盜授光州刺史因往依之中和末罕之為蔡寇所逼棄郡投諸葛爽存審從至河陽為小校屢戰蔡賊有功諸葛爽卒罕之為其部將所逼出保懷州懷州原本作淮州今從新唐書改正影庫本粘籤部下分散存審乃歸於武皇武皇署右職令典義兒軍賜姓名存審性謹厚寵遇日隆自是武皇西征存審常從所至立功從討赫連鐸冒刃死戰血流盈袖武皇手自封瘡日夕臨問乾寧初討李匡儔存審前軍拔居庸關明年從討邠州時邠之徑兵屯龍泉寨四面懸崖石壁險固存審奮力拔之師旋授檢校左僕射副李嗣昭討李瑭於汾州擒之以功改左右廂步軍都指揮使天祐三年授蕃漢馬步副指揮使與李嗣昭降丁會於上黨從周德威破賊於夾城加檢校司徒授欣州刺史領蕃漢馬步都指揮使七年加檢校太保充蕃漢副總管莊宗擊汴人於柏鄉留存審守太原三月代李存璋戍趙州九年梁祖攻蓨縣存審與史建瑭李嗣肱赴援嗣肱原本作嗣臆考通鑑及歐陽史俱作肱今改正影庫本粘籤屯下博橋汴人驚亂燒營而遁以功遙領邢洺磁團練使案歐陽史作遷領邢州團練使舊五代史考異十二年魏博歸款於莊宗遣存審率前鋒據臨清以俟進取莊宗入魏存審屯魏縣以抗劉鄩六月鄩營莘縣存審與鎮定之師營莘西三十里一日數戰八月率師攻張源德於貝州十三年二月劉鄩自莘悉衆來襲我魏州存審以大軍踵其後戰於故元城大敗汴人從收澶衛磁洺等州秋邢州閻寶降授存審安國軍節度案五代會要同光元年始改邢州為安國軍據薛史此傳則晉人得邢州即改軍額疑會要誤也詳見通鑑考異舊五代史考異邢洺磁等州觀察使十月戴思遠棄滄州毛璋以城降授存審檢校太傅橫海軍節度使兼領魏博馬步軍都指揮使明年就加平章事十四年八月將兵援周德威於幽州敗契丹之衆冬破汴將安彥之於楊劉諸軍進營麻口時梁將謝彥章營行臺村莊宗勇於接戰每以輕騎當之遇窘者數四存審每俟其出必叩馬諫曰王將復唐宗社宜為天下自愛搴旗挑戰一劍之任無益聖德請責效於臣古人不以賊遺君父臣雖不武敢不代君之憂莊宗即時回駕十二月戰於胡柳晡晚之後存審引所部銀槍效節軍銀鎗原本作行鎗考通鑑唐莊宗初得魏博以其降卒置銀槍效節都歐陽史亦作銀槍今改正影庫本粘籤敗梁軍於土山下是日辰巳間周德威戰歿一軍逗撓梁軍四集存審與其子彥圖冒刃血戰出沒賊陳與莊宗軍合午後師復集擊敗汴人十六年春代周德威為內外蕃漢馬步總管於德勝口築南北城以據之七月汴將王瓚自黎陽渡河寇澶州存審拒戰瓚退營於楊村渡控我上遊自是日與交鋒對壘經年大小凡百餘戰十七年汴將劉鄩攻同州朱友謙求援於我遣存審與李嗣昭將兵赴之九月次河中進營朝邑時河中久臣於梁衆持兩端及諸軍大集芻粟暴貴嗣昭懼其翻覆將急戰以定勝負居旬日梁軍逼我營會望氣者言西南黑氣如鬬雞之狀當有戰陳存審曰我方欲決戰而形於氣象得非天贊歟是夜閲其衆詰旦進軍梁軍來迎戰大敗之追斬二千餘級自是梁軍保壘不出存審謂嗣昭曰吾初懼劉鄩據渭河偏師既敗彼若退歸懼我踵之獸窮搏人勿謂無事可開其歸路然後追奔乃令王建及牧馬於沙苑劉鄩尹皓知之保衆退去遂解同州之圍案歐陽史鄩以為晉軍且懈乃夜遁去存審追擊于渭河又大敗之舊五代史考異存審略地至奉先謁諸帝陵乃班師十八年王師討張文禮於鎮州李嗣昭李存進相次戰歿十九年遣存審率師進攻叛帥於城下文禮之將李再豐陰送款於存審李再豐原本作稱豐今據歐陽史改正影庫本粘籤我師中夜登城擒文禮之子處球等露布以獻鎮州平以功加檢校太傅兼侍中二十年正月師旋於魏州莊宗出城迎勞就第宴樂無何契丹犯燕薊郭崇韜奏曰汴寇未平繼韜背叛北邊捍禦非存審不可上遣中使諭之存審臥病羸瘠附奏曰臣效忠稟命靡敢為辭但痾恙纏綿未堪祗役既而詔存審以本官充幽州盧龍節度使自鎮州之任同光初加開府儀同三司檢校太師中書令食邑千戶賜號忠烈扶天啓運功臣十月平梁遷都洛陽存審以身為大將不得預收復中原之功舊疾愈作堅求入覲尋醫以情告郭崇韜時崇韜自負一時佐命之功無出己名功名事望素在存審之下權勢既隆人士輻湊不欲存審加於己上每有章奏求覲即陰沮之存審妻郭氏泣訴於崇韜曰吾夫於國粗效驅馳與公鄉里親舊公忍令死棄北荒何無情之如是崇韜益慚戁明年春疾甚上章懇切乞生覲天顏不許存審伏枕而歎曰老夫歷事二主垂四十年幸而遇今日天下一家遠夷極塞皆得面覲彤墀射鈎斬袪之人孰不奉觴丹陛獨豫壅隔豈非命哉漸增危篤崇韜奏請許存審入覲四月制授存審宣武軍節度使宣武原本脫武字今據歐陽史增入影庫本粘籤諸道蕃漢馬步總管詔未至五月十五日卒於幽州官舍時年六十三遺命葬太原存審遺奏陳不得面覲詞旨悽惋莊宗震悼久之廢朝三日贈尚書令存審少在軍中識機知變行軍出師法令嚴明決策制勝從無遺悔功名與周德威相匹皆近代之良將也常戒諸子曰豫本寒家少小攜一劍而違鄉里四十年間位極將相其間屯危患難履鋒冒刃入萬死而無一生身方及此前後中矢僅百餘乃出鏃以示諸子因以奢侈為戒存審微時嘗為俘囚將就戮於郊外臨刑指危垣謂主者曰請就戮於此下冀得壞垣覆尸旅魂之幸也主者哀之為移次焉遷延之際主將擁妓而飲思得歌者以助歡妓曰俘囚有符存審者妾之舊識每令擊節以贊歌令主將欣然馳騎而捨之豈非命也永樂大典卷一萬八千一百二十八彥超存審之長子也少事武皇纍歷牙職存審卒莊宗以彥超為汾州刺史同光末魏州軍亂詔彥超赴北京巡檢先是朝廷令內官呂鄭二人在太原一監兵一監倉庫及明宗入洛皇弟存霸單騎奔河東與呂鄭謀殺彥超與留守張憲案歐陽史作張憲欲納存霸薛史作存霸謀殺張憲彥超兩史紀載微異舊五代史考異通鑑考異云薛史張憲傳作張憲謀奉存霸為主符彥超傳又作存霸謀殺彥超前後互異今附識于此影庫本粘籤彥超覺之密與憲謀未決部下大譟州兵畢集張憲出奔是夕軍士殺呂鄭存霸於衙城詰旦聞洛城禍變彥超告諭三軍案宋史張昭傳云昭為張憲推官莊宗及難聞鄴中兵士推戴明宗憲部將符彥超合戍將應之憲死有害昭者執之以送彥超彥超曰推官正人無得害之又逼昭為榜安撫軍民舊五代史考異明宗又令其弟龍武都虞候彥卿馳騎安撫六月彥超入覲明宗召見撫諭尋授晉州留後未行會其弟前曹州刺史彥饒平宣武亂軍明宗喜召彥超謂之曰吾得爾兄弟力餘更何憂爾為我往河東撫育耆舊即授北京留守太原尹明年冬移授昭義節度使四年授驍衛上將軍改金吾上將軍長興元年授泰寧軍節度使尋移鎮安州彥超廝養中有王希全者小字佛留粗知事計委主貨財歲久耗失甚多彥超止於訶譴而已應順元年正月佛留聞朝廷多事因與任貨兒等謀亂一夕扣門言朝廷有急遞至彥超出至廳事佛留挾刃害之詰旦本州節度副使李端召州兵攻佛留等殺之餘衆奔淮南擒彥超部將趙溫等二十六人誅之彥超贈太尉存審次子彥饒晉史有傳次彥卿歷官鳳翔節度使守太師中書令封魏王今居於洛陽次彥能終於楚州防禦使次彥琳仕皇朝為金吾上將軍卒於任永樂大典卷一萬八千一百二十八
