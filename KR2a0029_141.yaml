body:
  text: 有走水槽槽有龍首其夕有走有走水槽槽有有走有有有有走水槽槽有龍首其有有走水槽槽有有走有有走水槽槽有龍首其夕悉飄行數十步而龍首斷焉識者曰石國姓也此兆非祥石氏其遷乎其絕乎二年正月汴州封丘門外壕水東北隅水上有文若大樹花葉芬敷之狀相連數十株宛若圖畫傾都觀之識者云唐景福中盧彥威浮陽壕水有樹文亦如此時有高尼辭郡人曰此地當有兵難至光化中其郡果為燕帥劉仁恭所陷三年九月大水太原葭蘆茂盛最上一葉如旗狀皆南指十二月己丑雨木冰是月戊戌霜霧大降草木皆如有走水槽槽有龍首其夕悉飄行數十步而龍首斷焉識者曰石國姓也此兆非祥石氏其遷乎其絕乎二年正月汴州封丘門外壕水東北隅水上有文若大樹花葉芬敷之狀相連數十株宛若圖畫傾都觀之識者云唐景福中盧彥威浮陽壕水有樹文亦如此時有高尼辭郡人曰此地當有兵難至光化中其郡果為燕帥劉仁恭所陷三年九月大水太原葭蘆茂盛最上一葉如旗狀皆南指十二月己丑雨木冰是月戊戌霜霧大降草木皆如冰漢乾祐元年八月李守貞叛于河中境內蘆葉皆若旗旒之狀周廣順三年春樞密使王峻遙鎮青州有司制旄節以備迎授前夕其節有聲主者曰昔後唐長興中安重誨授河中其節亦有聲斯亦木之妖也永樂大典卷八千六百十九孔本有走水槽槽有龍首其夕悉飄行數十步而龍首斷焉識者曰石國姓也此兆非祥石氏其遷乎其絕乎二年正月汴州封丘門外壕水東北隅水上有文若大樹花葉芬敷之狀相連數十株宛若圖畫傾都觀之識者云唐景福中盧彥威浮陽壕水有樹文亦如此時有高尼辭郡人曰此地當有兵難至光化中其郡果為燕帥劉仁恭所陷三年九月大水太原葭蘆茂盛最上一葉如旗狀皆南指十二月己丑雨木冰是月戊戌霜霧大降草木皆如冰漢乾祐元年八月李守貞叛于河中境內蘆葉皆若旗旒之狀周廣順三年春樞密使王峻遙鎮青州有司制旄節以備迎授前夕其節有聲主者曰昔後唐長興中安重誨授河中其節亦有聲斯亦木之妖也永樂大典卷八千六百十九孔本有走水槽槽有龍首其夕悉飄行數十步而龍首斷焉識者曰石國姓也此兆非祥石氏其遷乎其絕乎二年正月汴州封丘門外壕水東北隅水上有文若大樹花葉芬敷之狀相連數十株宛若圖畫傾都觀之識者云唐景福中盧彥威浮陽壕水有樹文亦如此時有高尼辭郡人曰此地當有兵難至光化中其郡果為燕帥劉仁恭所陷三年九月大水太原葭蘆茂盛最上一葉如旗狀皆南指十二月己丑雨木冰是月戊戌霜霧大降草木皆如冰漢乾祐元年八月李守貞叛于河中境內蘆葉皆若旗旒之狀周廣順三年春樞密使王峻遙鎮青州有司制旄節以備迎授前夕其節有聲主者曰昔後唐長興中安重誨授河中其節亦有聲斯亦木之妖也永樂大典卷八千六百十九孔本有走水槽槽有龍首其夕悉飄行數十步而龍首斷焉識者曰石國姓也此兆非祥石氏其遷乎其絕乎二年正月汴州封丘門外壕水東北隅水上有文若大樹花葉芬敷之狀相連數十株宛若圖畫傾都觀之識者云唐景福中盧彥威浮陽壕水有樹文亦如此時有高尼辭郡人曰此地當有兵難至光化中其郡果為燕帥劉仁恭所陷三年九月大水太原葭蘆茂盛最上一葉如旗狀皆南指十二月己丑雨木冰是月戊戌霜霧大降草木皆如冰漢乾祐元年八月李守貞叛于河中境內蘆葉皆若旗旒之狀周廣順三年春樞密使王峻遙鎮青州有司制旄節以備迎授前夕其節有聲主者曰昔後唐長興中安重誨授河中其節亦有聲斯亦木之妖也永樂大典卷八千六百十九孔本有走水槽槽有龍首其夕悉飄行數十步而龍首斷焉識者曰石國姓也此兆非祥石氏其遷乎其絕乎二年正月汴州封丘門外壕水東北隅水上有文若大樹花葉芬敷之狀相連數十株宛若圖畫傾都觀之識者云唐景福中盧彥威浮陽壕水有樹文亦如此時有高尼辭郡人曰此地當有兵難至光化中其郡果為燕帥劉仁恭所陷三年九月大水太原葭蘆茂盛最上一葉如旗狀皆南指十二月己丑雨木冰是月戊戌霜霧大降草木皆如冰漢乾祐元年八月李守貞叛于河中境內蘆葉皆若旗旒之狀周廣順三年春樞密使王峻遙鎮青州有司制旄節以備迎授前夕其節有聲主者曰昔後唐長興中安重誨授河中其節亦有聲斯亦木之妖也永樂大典卷八千六百十九孔本有走水槽槽有龍首其夕悉飄行數十步而龍首斷焉識者曰石國姓也此兆非祥石氏其遷乎其絕乎二年正月汴州封丘門外壕水東北隅水上有文若大樹花葉芬敷之狀相連數十株宛若圖畫傾都觀之識者云唐景福中盧彥威浮陽壕水有樹文亦如此時有高尼辭郡人曰此地當有兵難至光化中其郡果為燕帥劉仁恭所陷三年九月大水太原葭蘆茂盛最上一葉如旗狀皆南指十二月己丑雨木冰是月戊戌霜霧大降草木皆如冰漢乾祐元年八月李守貞叛于河中境內蘆葉皆若旗旒之狀周廣順三年春樞密使王峻遙鎮青州有司制旄節以備迎授前夕其節有聲主者曰昔後唐長興中安重誨授河中其節亦有聲斯亦木之妖也永樂大典卷八千六百十九孔本有走水槽槽有龍首其夕悉飄行數十步而龍首斷焉識者曰石國姓也此兆非祥石氏其遷乎其絕乎二年正月汴州封丘門外壕水東北隅水上有文若大樹花葉芬敷之狀相連數十株宛若圖畫傾都觀之識者云唐景福中盧彥威浮陽壕水有樹文亦如此時有高尼辭郡人曰此地當有兵難至光化中其郡果為燕帥劉仁恭所陷三年九月大水太原葭蘆茂盛最上一葉如旗狀皆南指十二月己丑雨木冰是月戊戌霜霧大降草木皆如冰漢乾祐元年八月李守