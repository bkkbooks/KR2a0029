body:
  text: 舊五代史卷六十二唐書三十八列傳第十四孟方立案歐陽史作邢州人通鑑作汧州人中和二年為澤州天井關戍將時黃巢犯關輔州郡易帥有同博奕先是沈詢高湜相繼為昭義節度怠於軍政及有歸秦劉廣之亂方立見潞帥交代之際乘其無備率戍兵徑入潞州自稱留後案舊唐書僖宗紀九月高潯牙將劉廣擅還潞州是月潯天井關戍將攻廣殺之自稱留後與薛史異以邢為府以審誨知潞州案此二句上下有脫文今無可復考六月李存孝下洺磁兩郡方立遣馬溉袁奉韜盡率其衆逆戰于琉璃陂存孝擊之盡殪生獲馬溉奉韜初方立性苛急恩不逮下攻圍纍旬夜自巡城慰諭守陴者皆倨方立知其不可用乃飲鴆而卒其從弟洺州刺史遷素得士心衆乃推為留後求援于汴時梁祖方攻時溥援兵不出案通鑑云全忠遣大將王虔裕將精甲數百間道入邢州共守大順元年遷執王虔裕等乞降武皇令安金俊代之通鑑考異引薛史案薛史孟方立傳永樂大典闕佚今就通鑑考異所引用者録之僅存梗概考新唐書列傳云孟方立邢州人始為澤州天井戍將稍遷游奕使中和元年昭義節度使高潯擊黃巢戰石橋不勝保華州為裨將成鄰所殺還據潞州衆怒方立率兵攻鄰斬之自稱留後擅裂邢洺磁為鎮治邢為府號昭義軍潞人請監軍使吳全勗知兵馬留後時王鐸領諸道行營都統以潞未定墨制假方立檢校左散騎常侍兼御史大夫知邢州事方立不受囚全勗以書請鐸願得儒臣守潞鐸使參謀中書舍人鄭昌圖知昭義留事欲遂為帥僖宗自用舊宰相王徽領節度時天子在西河關雲擾方立擅地而李克用窺潞州徽度朝廷未能制乃固讓昌圖昌圖治不三月輒去方立更表李殷鋭為刺史謂潞險而人悍數賊大帥為亂欲銷懦之乃徙治龍岡州豪傑重遷有懟言會克用為河東節度使昭義監軍祁審誨乞師求復昭義軍克用遣賀公雅李筠安金俊三部將擊潞州為方立所破又使李克修攻取之殺殷鋭遂並潞州表克修為節度留後初昭義有潞邢洺磁四州至是方立自以山東三州為昭義朝廷亦命克修以潞州舊軍畀之昭義有兩節自此始克修字崇遠克用從父弟精馳射常從征伐自左營軍使擢留後進檢校司空方立倚朱全忠為助故克用擊邢洺磁無虛歲地為鬬場人不能稼光啓二年克修擊邢州取故鎮進攻武安方立將呂臻馬爽戰焦岡為克修所破斬首萬級執臻等拔武安臨洺邯鄲沙河克用以安金俊為邢州刺史招撫之方立丐兵于王鎔鎔以兵三萬赴之克修還後二年方立督部將奚忠信兵三萬攻遼州以金啖赫連鐸與連和會契丹攻鐸師失期忠信三分其兵鼓而行克用伏兵於險忠信前軍沒既戰大敗執忠信餘衆走脫歸者才十二龍紀元年克用使李罕之李存孝擊邢攻磁洺方立戰琉璃陂大敗禽其二將被斧鑕狥邢壘呼曰孟公速降有能斬其首者假三州節度使方立力屈又屬州殘墮人心恐性剛急待下少恩夜自行陴兵皆倨告勞自顧不可復振乃還引鴆自殺從弟遷素得士心衆推為節度留後請援於全忠全忠方攻時溥不即至命王虔裕以精甲數百赴之假道羅弘信不許乃趨間入邢州大順元年存孝復攻邢遷挈邢洺磁三州降執王虔裕三百人獻之遂遷太原表安金俊為邢洺磁團練使以遷為汾州刺史歐陽史云天復元年梁遣氏叔琮攻晉出天井關遷開門降為梁兵鄉道以攻太原不克叔琮軍還過潞以遷歸于梁梁太祖惡其反覆殺之張文禮燕人也初為劉仁恭裨將性凶險多姦謀辭氣庸下與人交言癖於不遜自少及長專蓄異謀及從劉守文之滄州委將偏師守文省父燕薊據城為亂及敗奔於王鎔察鎔不親政事遂曲事當權者以求衒達每對鎔自言有將才孫吳韓白莫己若也鎔賞其言給遺甚厚因録為義男賜姓名德明由是每令將兵自柏鄉戰勝之後柏鄉原本作桓鄉今從通鑑改正影庫本粘籤常從莊宗行營素不知書亦無方略唯於懦兵之中萋菲上將言甲不知進退乙不識軍機以此軍人推為良將初梁將楊師厚在魏州文禮領趙兵三萬夜掠經宗因侵貝郡師厚先率步騎數千人設伏於唐店文禮大掠而旋士皆卷甲束兵夜凱歌行至唐店師厚伏兵四面圍合殺戮殆盡文禮單騎僅免自爾猶對諸將大言或讓之曰唐店之功不須多伐文禮大慚在鎮州既久見其政荒人僻常蓄異圖酒酣之後對左右每泄惡言聞者莫不寒心唯王鎔略無猜間漸為腹心乃以符習代其行營以文禮為防城使自此專伺間隙及鎔殺李弘規委政於其子昭祚昭祚原本作昭福今從歐陽史改正影庫本粘籤昭祚性逼戾未識人間情僞素養名持重坐作貴人既事權在手朝夕欲代其父向來附勢之徒無不族滅初李弘規李藹持權用事樹立親舊分董要職故奸宄之心不能搖動文禮頗深畏憚及弘規見殺其部下五百人懼罪將欲奔竄聚泣偶語未有所之文禮因其離心密以姦辭激之曰令公命我盡坑爾曹我念爾十餘年荷戈隨我為家為國我若不即殺汝則得罪於令公我若不言又負爾輩衆軍皆泣是夜作亂殺王鎔父子舉族灰滅唯留王昭祚妻朱氏通梁人尋間道告於梁曰王氏喪於亂軍普寧公主無恙文禮狥賊帥張友順所請因為留後於潭城視事以事上聞兼要節旄尋亦奉箋勸進莊宗姑示含容乃可其請文禮比廝役小人驟居人上行步動息皆不自安出則千餘人露刃相隨日殺不辜道路以目常慮我師問罪姦心百端南通朱氏北結契丹往往擒獲其使莊宗遣人送還文禮由是愈恐是歲八月莊宗遣閻寶史建瑭及趙將符習等率王鎔本軍進討師興文禮病疽腹及聞史建瑭攻下趙州驚悸而卒案文禮之卒遼史太祖紀作五月丁未與是書作八月異殿本其子處瑾處球祕不發喪軍府內外皆不知之每日於寢宮問安處瑾與其腹心韓正時參決大事同謀姦惡案遼史太祖紀天贊元年四月癸亥張文禮求援五月丁未張文禮卒其子處瑾遣人奉表來謝所紀月日與薛史異初文禮疽未發時舉家咸見鬼物昏瞑之後或歌或哭又野河色變如血游魚多死浮於水上識者知其必敗十九年三月閻寶為處瑾所敗莊宗以李嗣昭代之四月嗣昭為流矢所中尋卒於師命李存進繼之存進亦以戰歿乃以符存審為北面招討使攻鎮州是時處瑾危蹙日甚昭義軍節度判官任圜馳至城下諭以禍福處瑾登陴以誠告乃遣牙將張彭送款于行臺俄而李存審師至城下是夜趙將李再豐之子冲投縋以接王師李再豐原本作稱豐今從通鑑改正影庫本粘籤故諸軍登城遲明畢入獲處瑾處球處琪並其母及同惡人等皆折足送行臺鎮人請醢而食之又發文禮之尸磔之於市永樂大典卷六千三百五十董璋本梁之驍將也幼與高季興孔循俱事豪士李七郎為童僕李初名讓嘗以厚賄奉梁祖梁祖寵之因畜為假子賜姓朱名友讓璋既壯得隸於梁祖帳下後以軍功遷為列校梁龍德末潞州李繼韜送款於梁時潞將裴約方領兵戍澤州裴約原本作裴維今從歐陽史改正影庫本粘籤不狥繼韜之命據城以自固梁末帝遣璋攻陷澤州遂授澤州刺史是歲莊宗入汴璋來朝莊宗素聞其名優以待之尋令却赴舊任歲餘代歸時郭崇韜當國待璋尤厚同光三年夏命為邠州留後三年秋正授旄鉞九月大舉伐蜀以璋為行營右廂馬步都虞候馬步原本作馬部今從通鑑改正影庫本粘籤時郭崇韜為招討使凡有軍機皆召璋參決是冬蜀平以璋為劍南東川節度副大使知節度事天成初加檢校太傅二年加同平章事是時安重誨當國採人邪謀言孟知祥必不為國家使唯董璋性忠義可特寵任令圖知祥又璋之子光業為宮苑使在朝結託勢援爭言璋之善知祥之惡恩寵既優故璋益恣其暴戾初奉使東川者皆言璋不恭於朝廷四年夏時明宗將議郊天遣客省使李仁矩齎詔諭兩川又遣安重誨馳書於璋以徵貢奉約以五十萬為數既而璋訴以地狹民貧許貢十萬而已翌日璋於衙署設宴以召仁矩設宴原本作敝宴今從歐陽史改正影庫本粘籤日既中而不至璋使人偵之仁矩方擁倡婦與賓友酣飲於驛亭璋大怒遽領數百人執持戈戟驟入驛中令洞開其門仁矩惶駭走入閣中良久引出璋坐立仁矩於階下戟手罵曰當我作魏博都監爾為通引小將其時去就已有等威今日我為藩侯爾銜君命宿張筵席比為使臣何敢至午不來自共風塵耽酗豈於王事如此不恭祇如西川解斬客省使李嚴謂我不能斬公耶因目肘腋欲令執拽仁矩仁矩涕淚拜告僅而獲免璋乃馳騎入衙竟徹饌而不召洎仁矩復命益言璋不法未幾重誨奏以仁矩為閬州團練使尋升為節鎮長興元年夏明宗以郊禋禮畢加璋檢校太尉時兩川刺史嘗以兵為牙軍小郡不下五百人璋已疑間及聞除仁矩鎮閬州璋由是謀反乃決仍先與其子光業書曰朝廷割吾支郡為節制屯兵三千是殺我必矣爾見樞要道吾言如朝廷更發一騎入斜谷則吾必反與汝訣矣光業以書呈樞密承旨李虔徽會朝廷再發中使荀咸乂將兵赴閬州光業謂虔徽曰咸乂未至吾父必反吾身不足惜慮勞朝廷徵發請停咸乂之行吾父必保常日重誨不從咸乂未至璋已擅追綿州刺史武虔裕囚於衙署武虔裕原本作虛裕今從歐陽史改正影庫本粘籤虔裕安重誨之心腹也故先囚之五月璋傳檄於利閬遂等州責以間諜朝廷尋率其兵陷閬州擒節度使李仁矩軍校姚洪等害之先是璋欲謀叛先遣使持厚幣於孟知祥求為婚家且言為朝廷猜忌將有替移去則喪家住亦致討地狹兵少獨力不任願以小兒結婚愛女時知祥亦二於朝廷因許以為援既而知祥出師以圍遂州故璋攻閬州得恣其毒焉其年秋詔削奪璋在身官爵命天雄軍節度使石敬瑭為東川行營招討使率師以討之璋之子宮苑使光業並其族並斬於洛陽及石敬瑭率師進討以糧運不接班師明宗方務懷柔乃放西川進奏官蘇願東川軍將劉澄各歸本道別無詔旨祇云兩務求安時孟知祥其骨肉在京師者俱無恙焉因遣使報璋欲連表稱謝璋怒曰西川存得弟姪遂欲再通朝廷璋之兒孫已入黃泉何謝之有自是璋疑知祥背己始搆隙矣三年四月璋率所部兵萬餘人以襲知祥案九國志趙季良傳云季良嘗與知祥從容語曰璋性狼戾若堅守一城攻之難克及聞璋起兵知祥憂形於色季良曰璋不守巢穴此天以授公也既而璋果敗知祥與諸將率師拒之戰於漢州之彌牟鎮璋軍大敗得數十騎復奔於東川案九國志趙廷隱傳董璋襲廣漢將攻成都時東川廩藏充實部下多敢死之士其來也衆皆畏之知祥親督諸將與璋戰雞縱橋前頗為所挫廷隱僞遁璋逐之知祥與張公鐸繼進璋軍亂不成列廷隱整陳與知祥合擊之璋軍大敗先是前陵州刺史王暉為璋所邀寓於東川至是因璋之敗率衆以害之傳其首於西川永樂大典卷一萬八千一百三十
