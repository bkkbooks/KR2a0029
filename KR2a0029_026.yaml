body:
  text: 舊五代史卷二十六唐書二武皇紀下景福元年正月鎮州王鎔恃燕人之援率兵十餘萬攻邢州之堯山案通鑑云景福元年正月王鎔李匡威合兵十餘萬攻堯山與薛史同舊唐書作大順二年王鎔援邢州屯於堯山考此時邢州未叛於晉不得有王鎔之援師蓋即景福元年事誤移於前一年耳歐陽史從薛史武皇遣李存信將兵應援李存孝素與存信不協遞相猜二留兵不進武皇又遣李嗣勳李存審將兵援之大破燕趙之衆斬首三萬收其軍實三月武皇進軍渡滹沱攻欒城下鼓城城四月燕軍寇雲代武皇班師案舊唐書云景福元年二月庚寅太原易定之兵合勢攻鎮州王鎔復告難於幽州李匡威率步騎三萬赴之時太原之衆軍於常山易定之衆堅守固鎮燕趙之卒分拒之三月克用處存斂軍而退是興師以二月至三月始旋師也通鑑云三月李克用王處存合兵攻王鎔癸丑拔天長鎮戊午鎔與戰於新市大破之殺獲三萬餘人辛酉克用退屯欒城是進師退師皆在三月也薛史作三月進軍四月班師與諸書異八月赫連鐸誘幽州李匡威之衆八萬寇天成軍遂攻雲州營於州北連亙數里武皇潛軍入於雲州詰旦出騎軍以擊之斬獲數萬李匡威燒營而遁十月邢州李存孝叛納款於梁李存信構之也案舊唐書云大順元年十一月癸丑朔太原將邢州刺史李存孝自恃擒孫揆功合為昭義帥怨克用授康君立存孝自晉州率行營兵歸邢州據城上表歸朝仍致書張濬王鎔求援今考薛史大順二年存孝始為邢州節度無由於元年冬得據邢州也舊唐書特因存孝攻澤潞而牽連書之其年月則誤耳新唐書歐陽史通鑑並從薛史作景福元年十月景福二年春大舉以伐王鎔以其通好於李存孝也二月攻天長鎮旬日不下王鎔出師三萬來援武皇逆戰於叱日嶺下鎮人敗斬首萬餘級時歲饑軍乏食脯尸肉而食之進軍下井陘李存孝將兵夜入鎮州鎮人乞師於汴汴帥方攻時溥不暇應之乃求援於幽州李匡威率兵赴之武皇乃班師七月武皇討李存孝於邢州遂攻平山渡滹水攻鎮州王鎔懼以帛五十萬犒軍請修舊好仍以鎮冀之師助擊存孝許之武皇進圍邢州十二月武皇狩於近郊獲白兔有角長三寸乾寧元年三月邢州李存孝出城首罪縶歸太原轘於市邢洺磁三州平武皇表馬師素為邢州節度使案舊唐書作克用以大將馬師素權知邢洺團練事與薛史異五月鄆州節度使朱瑄為汴軍所攻遣使來乞師武皇遣騎將安福順安福應安福遷督精騎五百假道於魏州以應之案舊唐書云乾寧元年正月瑄瑾勢求救於太原李克用出師援之薛史作五月與舊唐書異考朱瑄朱瑾自魚山之敗其勢始當由正月遣使乞援至援師之出自在五月耳九月潞州節度使康君立以鴆死十月武皇自晉陽率師伐幽州初李匡儔奪據兄位燕人多不義之安塞軍戍將劉仁恭挈族歸於武皇武皇遇之甚厚仁恭數進畫於蓋寓言幽州可取之狀願得兵一萬指期平定武皇方討李存孝於邢州輟兵數千欲納仁恭不利而還匡儔由是驕怠數犯邊境武皇怒故率軍以討之是時雲州吐渾赫連鐸白義誠並來歸命皆笞而釋之案舊唐書昭宗紀六月壬辰克用攻陷雲州執赫連鐸新唐書昭宗紀六月赫連鐸與李克用戰於雲州死之通鑑從新唐書作李克用大破吐谷渾殺赫連鐸擒白義誠俱與薛史異考雲州諸部因討李匡儔而來歸自當在十月而諸書皆作六月恐未足據十一月進攻武州甲寅案甲寅字誤下文十二月有辛亥壬子甲寅則十一月不得有甲寅也據通鑑考異蓋薛史仍紀年録之誤攻新州十二月李匡儔命大將率步騎六萬救新州武皇選精甲逆戰燕軍大敗斬首萬餘級生獲將領百餘人曳練徇於新州城下是夜新州降辛亥進攻媯州媯州原本作僞州今從通鑑改正影庫本粘籤壬子燕兵復合於居庸關拒戰武皇命精騎以疲之令步將李存審由他道擊之自午至晡燕軍復敗甲寅李匡儔攜其族棄城而遁將之滄州隨行輜車臧獲妓妾甚衆滄帥盧彥威利其貨以兵攻匡儔於景城殺之盡虜其衆丙辰進軍幽州其守城大將請降武皇令李存審與劉仁恭入城撫勞居人如故市不改肆封府庫以迎武皇乾寧二年正月武皇在幽州命李存審劉仁恭徇諸屬郡二月以仁恭為權幽州留後從燕人之請也案舊唐書乾寧元年十二月以李匡威故將劉仁恭為幽州兵馬留後歐陽史亦作元年冬事皆因平幽州而終言之未嘗核其年月也通鑑從薛史作二年二月留腹心燕留德等十餘人分典軍政武皇遂班師凡駐幽州四十日六月武皇率蕃漢之師自晋陽趨三輔討鳳翔李茂貞邠州王行瑜華州韓建之亂先是三帥稱兵向闕同弱王室殺害宰輔時河中節度使王重盈卒重榮之子珂即武皇之子壻也權典軍政其兄珙為陝州節度使瑤為絳州刺史與珂爭河中遂訴於岐邠華三鎮言珂本蒼頭蒼頭原本作莊頭考舊唐書王重榮傳云王珙上言珂本家之蒼頭小字忠兒則莊頭確為訛字今改正影庫本粘籤不當襲位珂亦訴於武皇武皇上表保薦珂乞授河中旄鉞詔可之三帥遂以兵入覲大掠京師請授王珂同州節度使王瑤河中節度使天子亦許之武皇遂舉兵表三帥之罪復移檄三鎮三鎮大懼是月次絳州刺史王瑤登陴拒命武皇攻之旬日而拔斬王瑤於軍門誅其黨千餘人七月次河中王珂迎謁於路己未同州節度使王行約棄城奔京師與左軍兵士掠西市都民大擾行約即行瑜弟也庚申樞密使駱全瓘以武皇之軍將至請天子幸右軍指揮使李繼鵬茂貞假子也本姓閻名圭與全瓘謀天子幸鳳翔左軍指揮使王行實亦行瑜之弟也與劉景宣欲天子幸邠州兩軍相攻縱火燒內門煙火蔽天天子急詔鹽州六都兵士令追殺亂兵左右軍退走王行瑜李茂貞聲言自來迎駕天子懼出幸南山駐蹕於莎城是夜熒惑犯心壬戌武皇進收同州聞天子幸石門遣判官王瓌奉表奔問天子遣使賜詔令與王珂同討邠鳳時武皇方攻華州俄聞李茂貞領兵士三萬至盩厔王行瑜領兵至興平欲往石門迎駕乃解華州之圍進營渭橋天子遣延王戒丕丹王允齎詔促武皇兵直抵邠鳳八月乙酉供奉官張承業齎詔告諭案舊唐書七月丁卯上遣內官張承業傳詔克用軍便令監太原行營兵馬發赴新平薛史作八月乙酉與舊唐書月日互異相隔殊遠舊唐書又作八月乙酉朔延王至河中疑承業與延王同行據通鑑作壬午遣張承業詣克用軍蓋壬午遣使乙酉始至軍耳涇帥張鐺已領步騎三萬於京西北扼邠岐之路武皇進營渭北遣史儼將三千騎往石門扈駕遣李存信李存審會鄜延之兵攻行瑜之梨園寨天子削奪行瑜官爵以武皇為天下兵馬都招討使以鄜州李思孝為北面招討使以涇州張鐺為西南面招討使天子又遣延王丹王賜武皇御衣及大將茶酒弓矢命二王兄事武皇延王傳天子密旨云一昨非卿至此已為賊庭行酒之人矣所慮者二凶締合卒難翦除且欲姑息茂貞令與卿修好俟梟斬行瑜更與卿商量武皇上表請駕還京案舊唐書作壬寅李克用遣子存貞奉表行在請車駕還京考當時奉表者即後唐莊宗也莊宗未嘗名存貞舊唐書誤令李存節領二千騎於京西北以防邠賊奔突辛亥天子還宮加武皇守太師中書令邠寧四面行營都統時王行瑜弟兄固守梨園寨我師攻之甚急李茂貞遣兵萬餘來援行瑜營於龍泉鎮茂貞自率兵三萬迫咸陽武皇奏請詔茂貞罷兵兼請削奪茂貞官爵詔曰茂貞勒兵蓋備非常尋已發遣歸鎮又言茂貞已誅李繼鵬李繼晸卿可切戒兵甲無犯土疆武皇請賜河中王珂旌節三表許之又表李罕之為副都統十月丙戌李存信於梨園寨北遇賊軍斬首千餘級自是賊閉壁不出戊子天子賜武皇內弟子四人又降朱書御札賜魏國夫人陳氏是月王行瑜因敗衄之後閉壁自固武皇令李罕之晝夜急攻賊軍乏食拔營而去李存信與罕之等先伏軍於厄路俟賊軍之至縱兵擊之殺戮萬計是日收梨園等三寨生擒行瑜之子知進並母丘氏大將李元褔等二百人送赴闕庭庚寅王行約王行實燒劫寧州遁走寧州守將徐景乞降武皇表蘇文建為邠州節度使且於寧州為治所十一月丁巳案舊唐書作十一月癸未朔疑十一月不當有丁已據薛史上文十月有丙戌戊子則十一月斷非癸未朔矣通鑑所定月日皆從薛史收龍泉寨時行瑜以精甲五千守之李茂貞出兵來援為李罕之所敗邠賊遂棄龍泉寨而去行瑜復入邠州大軍進逼其城行瑜登城號哭曰行瑜無罪昨殺南北司大臣是岐帥將兵脅制主上請治岐州行瑜乞束身歸朝武皇報曰王尚父何恭之甚耶僕受命討三賊臣公其一也如能束身歸闕老夫未敢專命為公奏取進止行瑜懼棄城而遁武皇收其城封府庫遽以捷聞既而慶州奏王行瑜將家屬五百人到州界為部下所殺傳首闕下武皇既平行瑜還軍渭北十二月武皇營於雲陽案歐陽史晉軍渭北遇雨六十日考通鑑十二月乙酉李克用軍於雲陽辛亥引兵東歸無緣得有六十日也歐陽史誤候討鳳翔進止乙未天子賜武皇為忠貞平難功臣進封晉王加實封二百戶武皇復上表請討李茂貞天子不允武皇私謂詔使曰觀主上意疑僕別有他腸復何言哉但禍不去胎憂患未已又奏臣統領大軍不敢徑赴朝覲遂班師乾寧三年正月汴人大舉以攻兗鄆朱瑄朱瑾再乞師於武皇假道於魏州羅弘信許之乃令都指揮使李存信將步騎三萬與李承嗣史儼會軍以拒汴人存信軍於莘與朱瑾合勢頻挫汴軍汴帥患之乃間魏人存信御兵無法稍侵魏之芻牧者弘信乃與汴帥通出師三萬攻存信軍存信揭營而退保於洺州三月武皇大掠相魏諸邑攻李固洹水殺魏兵萬餘人進攻魏州案舊唐書六月庚戌李克用率沙陀並汾之衆五萬攻魏州及其郛大掠於其六郡陷城安洹水臨漳十餘邑報莘之怒也薛史作三月事蓋自三月興師至十月始退耳五月汴將葛從周氏叔琮引兵赴援六月李茂貞舉兵犯京師七月車駕幸華州是月武皇與汴軍戰於洹水之上鐵林指揮使落落被擒落落武皇之長子也既戰馬踣於坎武皇馳騎以救之其馬亦踣汴之追兵將及武皇背射一發而斃乃退九月李存信攻魏之臨清汴將葛從周等引軍來援大敗於宗城北存信進攻魏州十月武皇敗魏軍於白龍潭追擊至觀音門汴軍救至乃退十一月武皇徵兵於幽鎮定三州將迎駕於華下幽州劉仁恭託以契丹入寇俟敵退聽命乾寧四年正月汴軍陷兗鄆騎將李承嗣史儼與朱瑾同奔於淮南三月陝帥王珙攻河中王珂來告難武皇遣李嗣昭率二千騎赴之破陝軍於猗氏乃解河中之圍至是天子遣延王戒丕至晉陽傳宣旨於武皇朕不取卿言以及於此苟非英賢竭力朕何由再謁廟庭在卿表率豫所望也七月武皇復徵兵於幽州劉仁恭辭旨不遜武皇以書讓之仁恭捧書謾罵捧書疑當作持書考冊府元龜所引薛史亦作捧書今姑仍其舊影庫本粘籤抵之於地仍囚武皇之行人八月大舉以伐仁恭九月師次蔚州戊寅晨霧晦暝占者云不利深入辛巳攻安塞俄報燕將單可及領騎軍至矣武皇方置酒高會前鋒又報賊至矣武皇曰仁恭何在曰但見可及輩武皇張目怒曰可及輩何足為敵仍促令出師燕軍已擊武皇軍寨武皇乘醉擊賊燕軍披靡時步兵望賊而退為燕軍所乘大敗於木瓜澗俄而大風雨震電燕軍解去武皇方醒甲午師次代州劉仁恭遣使謝罪於武皇武皇亦以書報之自此有檄十餘返光化元年春正月鳳翔李茂貞華州韓建皆致書於武皇乞修和好同奬王室兼乞助丁匠修繕秦宮武皇許之四月汴將葛從周寇邢洺磁等州旬日之內三州連陷汴人以葛從周為邢州節度使大將李存信收軍自馬嶺而旋八月壬戌天子自華還宮是時車駕初復而欲諸侯輯睦賜武皇詔令與汴帥通好武皇不欲先下汴帥乃致書於鎮州王鎔令導其意明年汴帥遣使奉書幣來修好武皇亦報之自是使車交馳朝野相賀九月武皇遣周德威李嗣昭率兵三萬出青山口以迫邢洺十月遇汴將葛從周於張公橋張公橋原本作張恭考舊唐書唐鑑俱作張公今改正影庫本粘籤既戰我軍大敗是月河中王珂來告急言王珙引汴軍來寇武皇遣李嗣昭將兵三千以援之屯於胡壁堡汴軍萬餘人來拒戰嗣昭擊退之十二月潞州節度使薛志勤卒澤州刺史李罕之以本軍夜入潞州據城以叛罕之報武皇曰薛鐵山新死潞民無主慮軍城有變輒專命鎮撫武皇令人讓之罕之乃歸於汴武皇遣李嗣昭將兵討之下澤州收罕之家屬拘送晉陽光化二年春正月李罕之陷沁州三月汴將葛從周氏叔琮自土門陷承天軍又陷遼州進軍榆次武皇令周德威擊之敗汴軍於洞渦驛叔琮棄營而遁德威追擊出石會關石會關原本作名會考歐陽史通鑑俱作石會今改正影庫本粘籤殺千餘人汴人復陷澤州五月武皇令都指揮使李君慶將兵收澤潞為汴軍所敗而還以李嗣昭為都指揮使進攻潞州八月嗣昭營於潞州城下前鋒下澤州時汴將賀德倫張歸厚等守潞州是月德倫等棄城而遁潞州平九月武皇表汾州刺史孟遷為潞州節度使光化三年汴軍大寇河朔幽州劉仁恭乞師武皇遣周德威帥五千騎以援之七月李嗣昭攻堯山至內丘敗汴軍於沙河進攻洺州下之九月汴帥自將兵三萬圍洺州嗣昭棄城而歸葛從周設伏於青山口嗣昭之軍不利十月汴人乘勝寇鎮定鎮定懼皆納賂於汴是時周德威與燕軍劉守光敗汴人二萬於望都聞定州王郜來奔乃班師是月天子加武皇實封一百戶遣李嗣昭率步騎三萬攻懷州下之進攻河陽汴將閻寶率軍來援嗣昭退保懷州天復元年正月汴將張存敬攻陷晉絳二州以兵二萬屯絳州以扼援路二月張存敬迫河中王珂告急於武皇使者相望於路珂妻邠國夫人武皇愛女也亦以書至懇切求援武皇報曰賊阻道路衆寡不敵救爾即與爾兩亡可與王郎棄城歸朝珂遂送款於張存敬三月汴帥自大梁至河中王珂遂出迎尋徙於汴天子以汴帥兼鎮河中武皇自是不復能援京師霸業由是中否四月汴將氏叔琮率兵五萬自太行路寇澤潞魏博大將張文恭領軍自新口入葛從周領兗鄆之衆自土門入張歸厚以邢洺之衆自馬嶺入定州王處直之衆自飛狐入侯言以晉絳之兵自陰地入氏叔琮康懷英營於澤州之昂車昂車原本作昂卑考通鑑及冊府元龜俱作昂車今改正影庫本粘籤武皇令李嗣昭將三千騎赴澤州援李存璋而歸賀德倫氏叔琮軍至潞州孟遷開門迎沁州刺史蔡訓亦以城降於汴氏叔琮悉其衆趨石會關是時偏將李審建先統兵三千在潞州亦與孟遷降於汴及叔琮之入寇也審建為其鄉導汴人營於洞渦別將白奉國與鎮州大將石公立自井陘入自井陘入原本脫自字今據通鑑增入影庫本粘籤陷承天軍及攻壽陽遼州刺史張鄂以城降於汴都人大恐時霖雨積旬汴軍屯聚既衆芻糧不給復多痢瘧師人多死時大將李嗣昭李嗣源每夜率驍騎突營掩殺敵衆恐懼五月汴軍皆退氏叔琮軍出石會周德威李嗣昭以精騎五千躡之殺戮萬計初汴軍之將入寇也汾州刺史李瑭據城叛以連汴人至是武皇令李嗣昭李存審將兵討之是歲并汾饑粟暴貴人多附瑭為亂嗣昭悉力攻城三日而拔擒李瑭等斬於晉陽市氏叔琮既旋軍過潞州虜孟遷以歸汴帥以丁會為潞州節度使六月遣李嗣昭周德威將兵出陰地攻慈隰二郡隰州刺史唐禮慈州刺史張瓌並以城來降武皇以汴寇方盛難以兵服佯降心以緩其謀乃遣牙將張特持幣馬書檄以諭之陳當時利害請復舊好十一月壬子汴帥營於渭濱甲寅天子出幸鳳翔案新唐書帝如鳳翔李茂貞韓全誨請召克用入衛克用間道遣使者奔問並詒書全忠勸還汴全忠不答舊五代史考異武皇遣李嗣昭率兵三千自沁州趨平陽遇汴軍於晉州北斬首五百級天復二年二月李嗣昭周德威領大軍自慈隰進攻晉絳營於蒲縣乙未汴將朱友寧氏叔琮將兵十萬營於蒲縣之南乙巳汴帥自領軍至晉州德威之軍大恐三月丁巳有虹貫德威之營戊午氏叔琮率軍來戰德威逆擊為汴人所敗兵仗輜車委棄殆盡朱友寧長驅至汾州慈隰二州復為汴人所據辛酉汴軍營於晉陽之西北攻城西門周德威李嗣昭緣山保其餘衆而旋武皇驅丁壯登陴拒守汴軍攻城日急武皇召李嗣昭周德威等謀將出奔雲州嗣昭以為不可李存信堅請且入北蕃續圖進取嗣昭等固爭之太妃劉氏亦極言於內乃止居數日亡散之士復集軍城稍安李嗣昭與李嗣源夜入汴軍斬將搴旗敵人扞禦不暇自相驚擾丁卯朱友寧燒營而遁周德威追至白壁關白壁關原本作向辟今從歐陽史改正影庫本粘籤俘斬萬計因收復慈隰汾等三州天復三年正月天子自鳳翔歸京五月雲州都將王敬暉殺刺史劉再立以城歸於劉仁恭武皇遣李嗣昭討之仁恭遣將以兵五萬來援雲州嗣昭退保樂安燕人虜敬暉棄城而去武皇怒笞嗣昭及李存審而削其官是時親軍萬衆皆邊部人動違紀律人甚苦之左右或以為言武皇曰此輩膽略過人數十年從吾征伐比年以來國藏空竭諸軍之家賣馬自給今四方諸侯皆懸重賞以募勇士吾若束之以法急則棄吾吾安能獨保此乎俟時開運泰吾固自能處置矣天祐元年閏四月汴帥迫天子遷都於洛陽案新唐書帝東遷詔至太原克用泣謂其下曰乘輿不復西矣遣使者奔問行在舊五代史考異五月乙丑天子制授武皇叶盟同力功臣加食邑三千戶實封三百戶八月汴帥遣朱友恭弒昭宗於洛陽宮輝王即位告哀使至晉陽武皇南向慟哭三軍縞素天祐二年春契丹阿保機始盛武皇召之阿保機領部族三十萬至雲州與武皇會於雲州之東握手甚歡結為兄弟旬日而去留馬千匹牛羊萬計案武皇會契丹於雲州通鑑作開平元年新唐書作天祐元年與薛史異歐陽史與薛史同又契丹國志作晉王存勗與契丹連和會於東城殊誤東都事略契丹與晉王會在天祐三年遼史太祖與薛史同期以冬初大舉渡河天祐三年正月魏博既殺牙軍魏將史仁遇據高唐以叛遣人乞師於武皇武皇遣李嗣昭率三千騎攻邢州以應之遇汴將牛存節張筠於青山口嗣昭不利而還九月汴帥親率兵攻滄州幽州劉仁恭遣使來乞師武皇乃徵兵於仁恭將攻潞州以解滄州之圍仁恭遣掌書記馬郁都指揮使李溥等將兵三萬李溥原本作李俌考冊府元龜及通鑑俱作溥今改正影庫本粘籤會於晉陽武皇遣周德威李嗣昭合燕軍以攻澤潞十二月潞州節度使丁會開門迎降命李嗣昭為潞州節度使以丁會歸於晉陽天祐四年正月甲申汴帥聞潞州失守自滄州燒營而遁四月天子禪位於汴帥奉天子為濟陰王改元為開平國號大梁是歲四川王建遣使至勸武皇各王一方俟破賊之後訪唐朝宗室以嗣帝位然後各歸藩守武皇不從以書報之曰竊念本朝屯否巨業淪胥攀鼎駕以長違撫彤弓而自咎默默終古悠悠彼蒼生此厲階永為痛毒視橫流而莫救徒誓楫以興言別捧函題過垂奬諭省覽周既駭惕異常淚下霑襟倍鬱申胥之素汗流浹背如聞蔣濟之言蔣濟原本作蔣沇今從冊府元龜改正影庫本粘籤僕經事兩朝受恩三代位叨將相籍係宗枝賜鈇金戊以專征徵苞茅而問罪鏖兵校戰二十餘年竟未能斬新莽之頭顱斷蚩尤之肩髀以至廟朝顛覆豺虎縱橫且授任分憂叨榮冒寵龜玉毀櫝誰之咎歟俯閲指陳不勝慚恧然則君臣無常位陵谷有變遷或箠塞長河泥封函谷時移事改理有萬殊即如周末虎爭魏初鼎據孫權父子不顯授於漢恩劉備君臣自微興於涿郡得之不謝於家世失之無損於功名適當逐鹿之秋何惜華蟲之服唯僕纍朝席寵席寵原本作膺寵今從冊府元龜改正影庫本粘籤奕世輸忠忝佩訓詞粗存家法善博奕者唯先守道治蹊田者不可奪牛誓於此生靡敢失節仰憑廟勝早殄寇讎如其事與願違則共臧洪遊於地下亦無恨矣唯公社稷元勳嵩衡降祉鎮九州之上地負一代之弘才合於此時自求多褔所承良訊非僕深心天下其謂我何有國非吾節也慺慺孤懇此不盡陳五月梁祖遣其將康懷英率兵十萬圍潞州懷英驅率士衆築壘環城城中音信斷絶武皇遣周德威將兵赴援德威軍於余吾率先鋒挑戰日有俘獲懷英不敢即戰梁祖以懷英無功乃以李思安代之案李思安之代懷英通鑑作七月事與薛史繫五月異舊五代史考異思安引軍將營於潞城潞城原本作澤城考通鑑歐陽史五代春秋俱作李思安圍潞城今改正影庫本粘籤周德威以五千騎搏之梁軍大敗斬首千餘級思安退保堅壁別築外壘謂之夾寨以抗我之援軍梁祖調發山東之民以供饋運德威日以輕騎掩之運路艱阻衆心益恐李思安乃自東南山口築夾道連接夾寨以通饋運自是梁軍堅保夾寨冬十月武皇有疾是時晉陽城無故自壞占者惡之天祐五年正月戊子朔武皇疾革辛卯崩於晉陽年五十三遺令薄葬發喪後二十七日除服莊宗即位追諡武皇帝廟號太祖陵在鴈門永樂大典卷七千一百五十四五代史補太祖武皇本朱耶赤心之後沙陀部人也其先生于雕窠中酋長以其異生諸族傳養之遂以諸爺為氏言非一父所養也其後言訛以諸為朱以爺為耶至太祖生眇一目長而驍勇善騎射所向無敵時謂之獨眼龍大為部落所疾太祖恐禍及遂舉族歸唐授雲州刺史賜姓李名克用黃巢犯長安自北引兵赴難功成遂拜太原節度使封晉王武皇之有河東也威聲大振淮南楊行密常恨不識其狀貌因使畫工詐為商賈往河東寫之畫工到未幾人有知其謀者擒之武皇初甚怒既而謂所親曰且吾素眇一目試召之使寫觀其所為如何及至武皇按膝厲聲曰淮南使汝來寫吾真必畫工之尤也寫吾不及十分即階下便是死汝之所矣畫工再拜下筆時方盛暑武皇執八角扇因寫扇角半遮其面武皇曰汝諂吾也遽使別寫之又應聲下筆畫其臂弓撚箭之狀仍微合一目以觀箭之曲直武皇大喜因厚賂金帛遣之五代史闕文世傳武皇臨薨以三矢付莊宗曰一矢討劉仁恭汝不先下幽州河南未可圖也一矢擊契丹且曰阿保機與吾把臂而盟結為兄弟誓復唐家社稷今背約附賊汝必伐之一矢滅朱溫汝能成吾志死無憾矣莊宗藏三矢於武皇廟庭及討劉仁恭命幕吏以少牢告廟請一矢盛以錦囊使親將負之以為前驅凱旋之日隨俘馘納矢於太廟伐契丹滅朱氏亦如之又武皇眇一目謂之獨眼龍性喜殺左右有小過失必置於死初諱眇人無敢犯者嘗令寫真畫工即為撚箭之狀微瞑一目圖成而進武皇大悅賜豫甚厚史臣曰武皇肇跡陰山赴難唐室逐豺狼於魏闕殄氛祲於秦川賜姓受封奄有汾晉可謂有功矣然雖茂勤王之績而非無震主之威及朱旗屯渭曲之師俾翠輦有石門之幸比夫桓文之輔周室無乃有所愧乎洎失援於蒲絳久垂翅於并汾若非嗣子之英才豈有興王之茂業矧纍功積德未比於周文創業開基尚虧於魏祖追諡為武斯亦幸焉永樂大典卷七千一百五十四
