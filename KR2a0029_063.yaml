body:
  text: 舊五代史卷六十三唐書三十九列傳第十五張全義字國維濮州臨濮人初名居言案新舊唐書作張言薛史李罕之傳亦作張言與此傳異賜名全義梁祖改為宗奭莊宗定河南復名全義祖璉父誠世為田農全義為縣嗇夫嘗為令所辱乾符末黃巢起寃句全義亡命入巢軍巢入長安以全義為吏部尚書充水運使巢敗依諸葛爽於河陽纍遷至裨校屢有戰功爽表為澤州刺史案洛陽搢紳舊聞記齊王張令公外傳云王在巢軍中知其必敗遂翻身歸國唐授王澤州刺史考是書則全義因巢敗始歸諸葛爽乃表為澤州刺史也舊聞記殊失事實殿本光啓初爽卒其子仲方為留後部將劉經與李罕之爭據洛陽罕之敗經於聖善寺聖善寺原本作聖喜今從新唐書改正影庫本粘籤乘勝欲攻河陽營於洛口經遣全義拒之全義乃與罕之同盟結義返攻經於河陽為經所敗收合餘衆與罕之據懷州乞師於武皇武皇遣澤州刺史安金俊助之進攻河陽劉經仲方委城奔汴罕之遂自領河陽表全義為河南尹案張齊賢撰齊王張令公外傳云初過三城謁節度使諸葛爽爽有人倫之鑒覩王之狀貌待之殊厚謂王曰他時名位在某之上勉之爽既沒王漸貴追思疇昔見知之恩未嘗報乃圖其形像於其私第日焚香供養之至于終身案諸葛爽死全義親逐其子而據其地乃復懸像事之以明其不背本此劇賊欺人之術耳舊五代史考異全義性勤儉善撫軍民雖賊寇充斥而勸耕務農由是倉儲殷積案洛陽搢紳舊聞記王每喜民力耕織者某家今年蠶麥善去都城一舍之內必馬足及之悉召其家老幼親慰勞之賜以酒食茶綵丈夫遺之布袴婦人裙衫時民間尚衣青婦人皆青絹為之取其新麥新繭對之喜動顏色民間有竊言者曰大王見好聲妓等閒不笑惟見好蠶麥即笑爾其真朴皆此類每觀秋稼見田中無草者必下馬命賓客觀之召田主慰勞之賜之衣物若見禾中有草地耕不熟立召田主集衆決責之若苗荒地生詰之民訴以牛疲或闕人耕鋤則田邊下馬立召其鄰仵責之曰此少人牛何不衆助之鄰仵皆伏罪即赦之自是洛陽之民無遠近民之少牛者相率助之少人者亦然田夫田婦相勸以耕桑為務是以家有蓄積水旱無飢民王誠信每水旱祈祭必具湯沐素食別寢至祠祭所儼然若對至尊容如不足遇旱祈禱未雨左右必曰王可開塔即無畏師塔也在龍門廣化寺王即依言而開塔未嘗不澍雨故當時俚諺云王禱雨買雨具舊五代史考異罕之貪暴不法軍中乏食每取給於全義二人初相得甚歡而至是求取無厭動加凌轢全義苦之案新唐書李罕之傳云張言善積聚罕之食乏士仰以給求之無涯言不能厭罕之拘河南官笞督之又東方貢輸行在者多為罕之所邀與薛史互有異同齊王外傳云罕之鎮三城知王專以教民耕織為務常宣言于衆曰田舍翁何足憚王聞之蔑如也每飛尺書于王求軍食及縑帛王曰李太傅所要不得不奉之左右及賓席咸以為不可與王曰第與之似若畏之者左右不曉罕之謂王畏己不設備因罕之舉兵收懷澤王乃密召屯兵潛師夜發遲明入三城罕之乃逃遁投河東朝廷即授王兼鎮三城文德元年四月罕之出軍寇晉絳全義乘其無備潛兵襲取河陽全義乃兼領河陽節度罕之求援於武皇武皇復遣兵助攻河陽會汴人救至而退梁祖以丁會守河陽全義復為河南尹檢校司空全義感梁祖援助之恩自是依附皆從其制初蔡賊孫儒諸葛爽爭據洛陽迭相攻伐七八年間都城灰燼滿目荊榛全義初至唯與部下聚居故市井邑窮民不滿百戶全義善於撫納課部人披榛種藝披榛原本作被蓁今據歐陽史改正影庫本粘籤且耕且戰以粟易牛歲滋墾闢招復流散待之如子每農祥勸耕之始全義必自立畎畝餉以酒食政寬事簡吏不敢欺數年之間京畿無間田編戶五六萬案齊王外傳云王始至洛於麾下百人中選可使者一十八人命之曰屯將每人給旗一口榜一道於舊十八縣中令招農戶令自耕種流民漸歸王於百人中又選可使者十八人命之曰屯副民之來者撫綏之除殺人者死餘但加杖而已無重刑無租稅流民之歸漸衆王又麾下選書計一十八人命之曰屯判官不一二年十八屯申每屯戶至數千王命農隙每選丁夫教以弓矢槍劍為起坐進退之法行之一二年每屯增戶大者六七千次者四千下之三二千共得丁夫間弓矢者槍劍者二萬餘人有賊盜即時擒捕之關市人賦幾于無籍刑寬事簡遠近歸之如市五年之內號為富庶於是奏每縣除令簿主之舊五代史考異乃築壘於故市建置府署以防外寇梁祖迫昭宗東遷命全義繕治洛陽宮城纍年方集昭宗至洛陽梁祖將圖禪代慮全義心有異同乃以判官韋震為河南尹移全義為天平軍節度使守中書令東平王案齊王外傳云梁祖兼四鎮王纍表讓兼鎮蓋潛識梁祖姦雄避其權位欲圖自全之計爾舊五代史考異洛陽搢紳舊聞記齊王與梁祖互為中書令尚書令及梁祖兼四鎮齊王纍表讓兼鎮蓋潛識梁祖姦雄避其權位欲圖自全之計梁祖經營霸業外則干戈屢動內則帑庾俱虛齊王悉心盡力傾竭財資助之殿本其年八月昭宗遇弒輝王即位十月復以全義為河南尹兼忠武軍節度使判六軍諸衛事梁祖建號以全義兼河陽節度使封魏王開平二年冊拜太保兼陝虢節度使河陽尹四年冊拜太傅河南尹判六軍兼鄭滑等州節度使乾化元年冊拜太師二年朱友圭篡逆以全義為守太尉河南尹宋亳節度使兼國計使國計使原本作圖計使考五代會要云梁以建昌宮使治財賦後改為國計使今改正影庫本粘籤梁末帝嗣位於汴以全義為洛京留守兼鎮河陽未幾授天下兵馬副元帥梁帝季年趙張用事段凝為北面招討使驟居諸將之右全義知其不可遣使啓梁末帝曰老臣受先朝重顧蒙陛下委以副元帥之名臣雖遲暮尚可董軍請付北面兵柄庶分宵旰段凝晚進德未服人恐人情不和敗亂國政不聽全義託朱氏垂三十年梁祖末年猜忌宿將欲害全義者數四全義卑身曲事悉以家財貢奉洎梁祖河朔喪師之後月獻鎧馬以補其軍又以服勤盡瘁無以加諸故竟免於禍全義妻儲氏明敏有才略梁祖自柏鄉失律後連年親征河朔心疑全義或左右讒間儲氏每入宮委曲伸理有時怒不可測急召全義儲氏謁見梁祖厲聲言曰宗奭種田叟耳三十餘年洛城四面開荒斸棘招聚軍賦資陛下創業今年齒衰朽指景待盡而大家疑之何也梁祖遽笑而謂曰我無惡心嫗勿多言案齊王外傳云梁祖猜忌王慮為後患前後欲殺之者數四夫人儲氏面請梁祖得免梁祖遂以其子福王納齊王之女舊五代史考異莊宗平梁全義自洛赴覲泥首待罪莊宗撫慰久之案齊王外傳云再上表述屢為朱梁窺圖偶脫虎口逼為親且非素志乞雪表數句云伏念臣曾棲惡木曾飲盜泉實有瑕疵未蒙昭雪復下昭雪之令亦見洛陽搢紳舊聞記舊五代史考異以其年老令人掖而升殿宴賜盡歡詔皇子繼岌皇弟存紀等皆兄事之案通鑑全義獻幣馬千計帝命皇子繼岌皇弟存紀等兄事之是全義之得幸於莊宗由幣馬也洛陽搢紳舊聞紀齊王上表待罪莊宗降詔釋之及召見大喜開懷慰納若見平生故人盡魚水之契焉此蓋黨于全義者虛譽之辭殿本先是天祐十五年梁末帝自汴趨洛將祀於圓丘時王師攻下楊劉徇地曹濮梁末帝懼急歸於汴其禮不遂然其法物咸在至是全義乃奏曰請陛下便幸洛陽臣已有郊禮之備翌日制以全義復為尚書令魏王河南尹明年二月郊禋禮畢案歐陽史作全義再朝京師吳縝纂誤嘗辨正之以全義為守太尉中書令河南尹改封齊王兼領河陽先是朱梁時供御所費皆出河南府其後孔謙侵削其權中官各領內司使務或豪奪其田園居第全義乃悉録進納四年落河南尹授忠武軍節度使檢校太師尚書令會趙在禮據魏州都軍進討無功時明宗已為羣小間諜端居私第全義以臥疾聞變憂懼不食案通鑑全義力請明宗出師及聞明宗兵變故憂懼與此微異薨於洛陽私第時年七十五天成初冊贈太師諡曰忠肅全義歷守太師太傅太尉中書令封王邑萬三千戶凡領方鎮洛鄆陝滑宋三蒞河陽再領許州內外官歷二十九任尹正河洛凡四十年位極人臣善保終吉者蓋一人而已全義朴厚大度敦本務實起戰士而忘功名尊儒業而樂善道家非士族而奬愛衣冠開幕府辟士必求望實屬邑補奏不任吏人位極王公不衣羅綺心奉釋老而不溺左道如是數者人以為難自莊宗至洛陽趨向者皆由徑以希恩寵全義不改素履盡誠而已言事者以梁祖為我世讎宜斫棺燔柩全義獨上章申理議者嘉之劉皇后嘗從莊宗幸其第奏云妾孩幼遇亂失父母欲拜全義為義父許之全義稽首奏曰皇后萬國之母儀古今未有此事臣無地自處莊宗敦逼再三不獲已乃受劉后之拜既非所願君子不以為非然全義少長軍中立性朴滯凡百姓有詞訟以先訴者為得理以是人多枉濫為時所非又嘗怒河南縣令羅貫因憑劉后譖於莊宗俾貫非罪而死露尸於府門寃枉之聲聞於遠近斯亦良玉之微瑕也永樂大典卷六千三百五十五代史闕文梁乾化元年七月辛丑梁祖幸全義私第甲辰歸大內梁史稱上不豫厭秋暑幸宗奭私第數日宰臣視事於仁政亭崇政諸司並止於河南府廨署世傳梁祖亂全義之家婦女悉皆進御其子繼祚不勝憤欲剚刃於梁祖全義止之曰吾頃在河陽遭李罕之之難引太原軍圍閉經年啖木屑以度朝夕死在頃刻得他救援以至今日此恩不可負也其子乃止梁史云云者諱國惡也臣謹案春秋莊二年經曰十有二月夫人姜氏會齊侯于禚傳曰書姦也夫經言會者諱惡禮也傳書姦者暴其罪以垂誡也又莊二十二年傳書陳宗飲桓公酒公曰以火繼之辭曰臣卜其晝未卜其夜豈有天子幸人臣之家留止數日姦亂萌矣況全義本出巢賊敗依河陽節度使諸葛爽爽用為澤州刺史及爽死全義事爽子仲方即與李罕之同逐仲方罕之帥河陽全義為河南尹未幾又逐罕之自據河陽其翻覆也如此自是托迹朱梁斫喪唐室惟勤課勸其實斂民附賊以固恩寵梁時月進鎧馬以補軍實及梁祖為友圭所弒首進錢一百萬以助山陵莊宗平中原全義合與敬翔李振等族誅又通賂於劉皇后乘莊宗幸洛言臣已有郊天費用夫全義匹夫也豈能自殖財賦其剝下奉上也又如此晚年保證明宗欲為子孫之福師方渡河鄴都兵亂全義憂恨不食終以餓死未死前其子繼業訟弟汝州防禦使繼孫莊宗貶房州司戶賜自盡其制略曰侵奪父權惑亂家事縱鳥獸之行畜梟獍之心其御家無法也又如此河南令羅貫方正文章之士事全義稍慢全義怒告劉皇后斃貫於枯木之下朝野寃之洛陽監軍使嘗收得李太尉平泉莊醒酒石全義求之監軍不與全義立殺之其附勢作威也又如此蓋亂世賊臣耳得保首領為幸已多晉天福中其子繼祚謀反伏誅識者知餘殃在其子孫也臣讀莊宗實録見史官全義傳虛美尤甚至今負俗無識之士尚以全義為名臣故因補闕文粗論事迹云朱友謙字德光許州人本名簡祖巖父琮世為陳許小校廣明之亂簡去鄉里事澠池鎮將柏夔為部隸嘗為盜於石壕石壕原本作古壕今從通鑑改正影庫本粘籤三鄉之間剽劫行旅後事陝州節度使王珙積勞至軍校珙性嚴急御下無恩牙將李璠者珙深所倚愛小有違忤暴加箠擊璠陰銜之光化元年珙與弟河中節度使珂相持干戈日尋珙兵屢敗部伍離心二年六月璠殺珙歸附汴人梁祖表璠為陝州節度使璠亦苛慘軍情不叶簡復攻璠璠冒刃獲免逃歸於汴案新唐書王重榮傳李璠為節度使凡五月為部將朱簡所殺據薛史則璠逃歸於汴未嘗見殺也通鑑從薛史三年梁祖表簡為陝州留後九月天子授以旄鉞車駕在鳳翔梁祖往來簡事之益謹奏授平章事天復末昭宗遷都洛陽駐蹕於陝時朝士經亂簪裳不備簡獻裳百副請給百官朝容稍備以迎奉功遷檢校侍中簡與梁祖同宗乃陳情於梁祖曰僕位崇將相比無勳勞皆元帥令公生成之造也願以微生灰粉為效乞以姓名肩隨宗室梁祖深賞其心乃名之為友謙編入屬籍待遇同於己子案歐陽史作録以為子舊五代史考異友謙亦盡心叶贊功烈居多梁祖建號移授河中節度使檢校太尉纍拜中書令封冀王冀王原本作翼王今從通鑑改正影庫本粘籤案太平廣記路德延天祐中為左拾遺會河中節度使領鎮辟掌書記友謙初頗禮待之然德延性浮薄驕慢動多忤物友謙稍解體德延乃作孩兒詩五十韻以刺友謙友謙聞而大怒有以掇禍乃因醉沈之黃河孔本及朱友圭弒逆友謙意不懌雖勉奉僞命中懷怏怏案歐陽史作友圭立加友謙侍中吳縝已辨其誤舊五代史考異友圭徵之友謙辭以北面侵軼謂賓友曰友圭是先帝假子敢行大逆余位列維城恩踰父子論功校德何讓伊人詎以平生附托之恩屈身於逆豎之手遂不奉命其年八月友圭遣大將牛存節康懷英韓勍攻之案歐陽史友圭遣招討使韓勍將康懷英等擊友謙通鑑作九月丁未以感化節度使康懷貞為都招討使更以韓勍副之懷貞等與忠武節度使牛存節合兵五萬屯河中三書所載俱有異同殿本友謙乞師於莊宗莊宗親總軍赴援與汴軍遇於平陽大破之案歐陽史晉王出澤潞以救之追懷英于解州大敗之追至白徑嶺夜秉炬擊之懷英又敗舊五代史考異因與友謙會於猗氏友謙盛陳感慨願敦盟約莊宗歡甚友謙乘醉鼾寢於帳中莊宗熟視之謂左右曰冀王真貴人也但恨其臂短耳及梁末帝嗣位以恩禮結其心友謙亦遜辭稱藩行其正朔天祐十七年友謙襲取同州以其子令德為帥請節鉞於梁不獲案歐陽史末帝初不許已而許之制命未至友謙復叛通鑑從歐陽史舊五代史考異友謙即請之於莊宗令幕客王正言以節旄賜之梁將劉鄩尹皓攻同州尹皓原本作伊皓今從通鑑改正影庫本粘籤友謙來告急莊宗遣李嗣昭李存審將兵赴之敗汴軍於滑北解圍而還初劉鄩兵至蒲中倉儲匱乏人心離二軍民將校咸欲歸梁友謙諸子令錫等亦說其父曰晉王雖推心於我然懸兵赴援急難相應寧我負人擇福宜重請納款於梁候劉鄩兵退後與晉王修好友謙曰晉王親赴豫急夜半秉燭戰賊面為盟誓不負初心昨聞吾告難命將星行助我資糧分我衣屨而欲翻覆背惠所謂鄧祁侯云人將不食吾餘也及破梁軍加守太尉西平王同光元年莊宗滅梁友謙覲於洛陽莊宗置宴饗勞寵錫無算親酌觴屬友謙曰成吾大業者公之力也既歸藩請割慈隰二郡依舊隸河中不許詔以絳州隸之又請安邑解縣兩池榷鹽每額輸省課許之及郊禮畢以友謙為守太師尚書令進食邑至萬八千戶三年賜姓名繼麟編入屬籍賜之鐵券恕死罪以其子令德為遂州節度使令錫為許州節度使一門三鎮諸子為刺史者六七人將校剖竹者又五六人恩寵之盛時無與比莊宗季年稍怠庶政巷伯伶官干預國事時方面諸侯皆行賂遺或求賂於繼麟雖僶俯應奉不滿其請且曰河中土薄民貧河中原本作荷平今從歐陽史改正影庫本粘籤厚貺難辦由是羣小咸怨遂加誣搆郭崇韜討巴蜀徵師於河中繼麟令其子令德率師赴之伶官景進與其黨搆曰昨王師初起繼麟以為討己頗有拒命之意若不除移如國家有急必為後患郭崇韜既誅宦官愈盛遂搆成其罪謂莊宗曰崇韜強項於蜀蓋與河中響應繼麟聞之懼將赴京師面訴其事其部將曰王有大於國密邇京城羣小流言何足介意端居奉職讒邪自銷不可輕行繼麟曰郭公功倍於我尚為人搆陷吾若得面天顏自陳肝膈則流言者獲罪矣四年正月繼麟入覲景進謂莊宗曰河中人有告變者言繼麟與崇韜謀叛聞崇韜死又與李存乂搆逆當斷不斷禍不旋踵羣閹異口同辭莊宗駭惑不能決是月二十三日授繼麟滑州節度使是夜令朱守殷以兵圍其第擒之誅於徽安門外詔繼岌誅令德於遂州遂州原本作還州今從歐陽史改正影庫本粘籤王思同誅令錫於許州案吳縝纂誤云史彥瓊傳友謙有子建徽被殺傳止述二子亦闕文也舊五代史考異命夏魯奇誅其族於河中初魯奇至友謙妻張氏率其家屬二百餘口見魯奇曰請疏骨肉名字無致他人橫死將刑張氏持先賜鐵券授魯奇曰皇帝所賜也是時百口塗地寃酷之聲行路流涕先是河中衙城閽者夜見婦人數十袨服靚葬僕馬炫耀自外馳騁笑語趨衙城閽者不知其故不敢詰至門排騎而入既而扃鎖如故復無人迹乃知妖鬼也又繼麟登逍遙樓聞哭聲四合詰日訊之巷無喪者隔歲乃族誅及明宗即位始下詔昭雪焉永樂大典卷二千三十一史臣曰全義一逢亂世十領名藩而能免梁祖之雄猜受莊宗之厚遇雖由恭順亦繫貨財傳所謂貨以藩身者全義得之矣友謙嚮背為謀二三其德考其行事亦匪純臣然全族之誅禍斯酷矣得非鬼神害盈而天道惡滿乎永樂大典卷二千三十一
