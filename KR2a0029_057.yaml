body:
  text: 舊五代史卷五十七唐書三十三列傳第九郭崇韜字安時代州鴈門人也父弘正崇韜初為李克修帳下親信克修鎮昭義崇韜纍典事務以廉幹稱克修卒武皇用為典謁奉使鳳翔稱旨署教練使教練使原本作教諫今從歐陽史改正影庫本粘籤崇韜臨事機警應對可觀莊宗嗣位尤器重之天祐十四年用為中門副使與孟知祥李紹宏俱參機要俄而紹宏出典幽州留事幽州原本作曲州今從通鑑改正影庫本粘籤知祥懇辭要職先是中門使吳珙張虔厚忠而獲罪知祥懼求為外任妻璚華公主泣請於貞簡太后莊宗謂知祥曰公欲避路當舉其代知祥因舉崇韜乃署知祥為太原軍在城都虞候自是崇韜專典機務艱難戰伐靡所不從十八年從征張文禮於鎮州契丹引衆至新樂王師大恐諸將咸請退還魏州莊宗猶豫未決崇韜曰阿保機祇為王都所誘本利貨財非敦鄰好苟前鋒小衄遁走必矣況我新破汴寇威振北地乘此驅攘焉往不捷且事之濟否亦有天命莊宗從之王師果捷明年李存審收鎮州遣崇韜閲其府庫或以珍貨賂遺一無所取但市書籍而已莊宗即位於魏州崇韜加檢校太保守兵部尚書充樞密使是時衛州陷於梁陷于梁原本作韜于梁今據文改正影庫本粘籤澶相之間寇鈔日至民流地削軍儲不給羣情恟恟以為霸業終不能就崇韜寢不安席俄而王彥章陷德勝南城敵勢滋蔓汴人急攻楊劉城明宗在鄆音驛斷絶莊宗登城四望計無所出崇韜啓曰段凝阻絶津路苟王師不南鄆州安能保守臣請於博州東岸立柵以固通津請于博州原本作諸於傳州今據册府元龜改正影庫本粘籤但慮汴人偵知徑來薄我請陛下募敢死之士日以挑戰如三四日間案歐陽史作十日舊五代史考異賊軍未至則柵壘成矣崇韜率毛璋等萬人夜趨博州視矛戟之端有光崇韜曰吾聞火出兵刃破賊之兆也至博州渡河版築晝夜不息崇韜於葭葦間據胡床假寢覺袴中冷左右視之乃蛇也其忘疲勵力也如是居三日梁軍果至案歐陽史作六日壘成彥章果引兵急攻之舊五代史考異城壘低庳沙土散惡戰具不完汴將王彥章杜晏球率衆攻擊軍不得休息崇韜身先督衆四面拒戰有急即應城垂陷俄報莊宗領親軍次西岸梁軍聞之退走因解楊劉之圍未幾汴將康延孝來奔崇韜延於臥內訊其軍機延孝曰汴人將四道齊舉以困我軍莊宗憂之召諸將謀進取之策宣徽使李紹宏請棄鄆州與汴人盟以河為界無相侵寇案歐陽史作諸將皆言隔河難守據薛史則請以河為界者李紹宏一人耳與歐陽史異莊宗不悅獨臥帳中召崇韜謂曰計將安出對曰臣不知書不能徵比前古請以時事言之且陛下十五年起義圖霸為雪家讎國恥甲胄生蟣虱黎人困輸挽輸挽原本作輪今據文改正影庫本粘籤今纂崇大號河朔士庶日望蕩平才得汶陽尺寸之地不能保守況盡有中原乎將來歲賦不充物議咨怨設若劃河為界誰為陛下守之臣自延孝言事以來晝夜籌度料我兵力算賊事機不出今年雌雄必決聞汴人決河自滑至鄆非舟楫不能濟又聞精兵盡在段凝麾下王彥章日寇鄆境彼既以大軍臨我南鄙又憑恃決河謂我不能南渡志在收復汶陽此汴人之謀也臣謂段凝保據河壖苟欲持我臣但請留兵守鄴保固楊劉陛下親御六軍長驅倍道直指大梁汴城無兵望風自潰若使偽主授首賊將自然倒戈半月之間天下必定如不決此計傍採浮談臣恐不能濟也今歲秋稼不登軍糧才支數月決則成敗未知不決則坐見不濟臣聞作舍道邊三年不成帝王應運必有天命成敗天也在陛下獨斷莊宗蹶然而興曰正合吾意丈夫得則為王失則為虜行計決矣即日下令軍中家口並還魏州莊宗送劉皇后與興聖宮使繼岌至朝城西野亭泣別興聖宮使原本脫興字今據歐陽史增入影庫本粘籤曰事勢危今須一決事苟不濟無復相見乃留李紹宏及租庸使張憲守魏州大軍自楊劉濟河是歲擒王彥章誅梁氏降段凝皆崇韜贊成其謀也莊宗至汴州宰相豆盧革在魏州令崇韜權行中書事俄拜侍中兼樞密使及郊禮畢以崇韜兼領鎮冀州節度使進封趙郡公邑二千戶賜鐵券恕十死崇韜既位極人臣權傾內外謀猷獻納必盡忠規士族朝倫頗亦收奬人物內外翕然稱之初收汴洛稍通賂遺親友或規之崇韜曰余備位將相祿賜巨萬但偽梁之日賂遺成風今方面藩侯多梁之舊將皆吾君射鈎斬袪之人也一旦革面化為吾人堅拒其請得無懼乎藏余私室無異公帑及郊禋崇韜悉獻家財以助賞給時近臣勸莊宗以貢奉物為內庫珍貨山積公府賞軍不足崇韜奏請出內庫之財以助莊宗沉吟有靳惜之意是時天下已定寇讎外息莊宗漸務華侈以逞已欲洛陽大內宏敞宮宇深邃宦官阿意順旨以希恩寵聲言宮中夜見鬼物不謀同辭莊宗駭異其事且問其故宦者曰見本朝長安大內六宮嬪御殆及萬人椒房蘭室無不充牣今宮室大半空間鬼神尚幽尚幽原本作尚豳今從册府元龜改正影庫本粘籤亦無所怪繇是景進王允平等於諸道採擇宮人不擇良賤內之宮掖三年夏雨河大水壞天津橋是時酷暑尤甚莊宗常擇高樓避暑皆不稱旨宦官曰今大內樓觀不及舊時長安卿相之家舊日大明興慶兩宮樓觀百數皆雕楹畫栱干雲蔽日今官家納涼無可御者莊宗曰余富有天下豈不能辦一樓即令宮苑使經營之猶慮崇韜有所諫止使謂崇韜曰今年惡熱朕頃在河上五六月中與賊對壘行宮卑濕介馬戰賊恆若清涼今晏然深宮不耐暑毒何也崇韜奏陛下頃在河上汴寇未平廢寢忘食心在戰陳祁寒溽暑不介聖懷今寇既平中原無事縱耳目之玩不憂戰陳雖層臺百尺廣殿九筵未能忘熱於今日也願陛下思艱難創業之際則今日之暑坐變清涼莊宗默然王允平等竟加營造崇韜復奏曰內中營造日有縻費屬當災饉且乞權停不聽初崇韜與李紹宏同為內職內職原本作納職考五代會要云五代承唐制樞密使為內職原本納字誤今改正影庫本粘籤及莊宗即位崇韜以紹宏素在己上舊人難制即奏澤潞監軍張居翰同掌樞密以紹宏為宣徽使紹宏大失所望泣涕憤鬱崇韜乃置內勾使應三司財賦皆令勾覆令紹宏領之冀塞其心紹宏怏悵不已崇韜自以有大功河洛平定之後權位熏灼恐為人所傾奪乃謂諸子曰吾佐主上大事了矣今為羣邪排毀吾欲避之歸鎮常山為菟裘之計其子廷説等曰大人功名及此一失其勢便是神龍去水為螻蟻所制尤宜深察門人故吏又謂崇韜曰侍中勳業第一雖羣官側目必未能離間宜於此時堅辭機務上必不聽是有辭避之名塞其讒慝之口魏國夫人劉氏有寵魏國原本作衛國今據歐陽史改正影庫本粘籤中宮未正宜贊成册禮上心必悅內得劉氏之助羣閹其如余何崇韜然之於是三上章堅辭樞密之位優詔不從崇韜乃密奏請立魏國夫人為皇后復奏時務利害二十五條皆便於時取悅人心又請罷樞密院事各歸本司以輕其權然宦官造謗不已三年堅乞罷兼領節鉞許之案册府元龜云同光中崇韜再表辭鎮批答曰朕以卿久司樞要常處重難或遲疑未決之機詢諸先見或憂撓不定之事訪自必成至於贊朕丕基登茲大寶衆興異論卿獨堅言天命不可違唐祚必須復請納家族明設誓文及其密取汶陽興師入不測之地潛通河口貢謀占必濟之津人所不知卿惟合意逮中都嘯聚羣黨窺凌朕決議平妖兼收浚水雖云先定更審前籌果盡贊成悉諧沈算斯即何須冒刃始顯殊庸況常山陸梁正虞未復卿能撫衆共定羣心惟朕知卿他人寧表所以賞卿之寵實異等倫沃朕之心非虛渥澤今卿再三謙遜重疊退辭始納常陽請歸上將又稱梁苑不可兼權如此周身貴全名節古人操守未可比方既覽堅辭難沮來表其再讓汴州所宜依允會客省使李嚴使西川回言王衍可圖之狀莊宗與崇韜議討伐之謀方擇大將時明宗為諸道兵馬總管當行崇韜自以宦者相傾欲立大功以制之乃奏曰契丹犯邊北面須藉大臣全倚總管鎮禦臣伏念興聖宮使繼岌德望日隆大功未著宜依故事以親王為元帥付以討伐之權俾成其威望莊宗方愛繼岌即曰小兒幼稚安能獨行卿當擇其副崇韜未奏莊宗曰無踰於卿者乃以繼岌為都統崇韜為招討使是歲九月十八日率親軍六萬進討蜀川崇韜將發奏曰臣以非才謬當戎事仗將士之忠力憑陛下之威靈庶幾克捷若西川平定陛下擇帥如信厚善謀事君有節則孟知祥有焉望以蜀帥授之如宰輔闕人張憲有披榛之勞為人謹重而多識其次李琪崔居儉中朝士族富有文學可擇而任之莊宗御嘉慶殿置酒宴征西諸將征西原本脫征字今據册府元龜增入影庫本粘籤舉酒屬崇韜曰繼岌未習軍政卿久從吾戰伐西面之事屬之於卿軍發十月十九日入大散關崇韜以馬箠指山險謂魏王曰朝廷興師十萬已入此中儻不成功安有歸路今岐下飛挽才支旬日必須先取鳳州收其儲積方濟吾事乃令李嚴康延孝先馳書檄以諭偽鳳州節度使王承捷王承捷原本作丞捷今據九國志改正影庫本粘籤及大軍至承捷果以城降得兵八千軍儲四十萬次至故鎮偽命屯駐指揮使唐景思亦以城降得兵四千又下三泉得軍儲三十餘萬自是師無匱乏軍聲大振其招懷制置官吏補置師行籌畫軍書告諭皆出於崇韜繼岌承命而已莊宗令內官李廷安李從襲呂知柔為都統府紀綱見崇韜幕府繁重將吏輻輳降人爭先賂遺都統府唯大將省謁牙門索然繇是大為詬恥及六軍使王宗弼歸款六軍原本作大軍今據九國志改正影庫本粘籤行賂先招討府王衍以成都降崇韜居王宗弼之第宗弼選王衍之妓妾珍玩以奉崇韜求為蜀帥案九國志王宗弼傳宗弼送款于魏王乃還成都盡輦內藏之寶貨歸于其家魏王遣使徵犒軍錢數千萬宗弼輒靳之魏王甚怒及王師至令其子承班齎衍玩用直百萬獻于魏王並賂郭崇韜請以己為西川節度使魏王曰此吾家之物焉用獻為魏王入城翼日數其不忠之罪並其子斬之于市舊五代史考異崇韜許之案通鑑作崇韜陽許之舊五代史考異又與崇韜子廷誨謀令蜀人列狀見魏王請奏崇韜為蜀帥繼岌覽狀謂崇韜曰主上倚侍中如衡華安肯棄元老於蠻夷之地況余不敢議此李從襲等謂繼岌曰郭公收蜀部人情意在難測王宜自備由是兩相猜察莊宗令中官向延嗣賫詔至蜀向延嗣原本作廷嗣今據通鑑改正影庫本粘籤促班師詔使至崇韜不郊迎延嗣憤憤從襲謂之曰魏王貴太子也主上萬福郭公專弄威柄旁若無人昨令蜀人請己為帥郭廷誨擁徒出入貴擬王者所與狎遊無非軍中驍果蜀中凶豪晝夜妓樂歡宴指天畫地父子如此可見其心今諸軍將校無非郭氏之黨魏王懸軍孤弱一朝班師必恐紛亂吾屬莫知暴骨之所因相向垂涕延嗣使還具奏皇后泣告莊宗乞保全繼岌莊宗復閲蜀簿曰人言蜀中珠玉金銀不知其數何如是之微也延嗣奏曰臣問蜀人知蜀中寶貨皆入崇韜之門言崇韜得金萬兩銀四十萬名馬千匹王衍愛妓六十樂工百犀玉帶百廷誨自有金銀十萬兩犀玉帶五十藝色絶妓七十樂工七十他財稱是魏王府蜀人賂遺不過匹馬而已莊宗初聞崇韜欲留蜀心已不平又聞全有蜀之妓樂珍玩怒見顏色即令中官馬彥圭馳入蜀視崇韜去就如班師而已如實遲留則與繼岌圖之彥圭見皇后曰禍機之發間不容髮何能數千里外復稟聖旨哉皇后再言之莊宗曰未知事之實否詎可便令果決皇后乃自為教與繼岌令殺崇韜時蜀土初平山林多盜孟知祥未至崇韜令任圜張筠分道招撫慮師還後部曲不寧故歸期稍緩四年正月六日馬彥圭至軍決取十二日發成都赴闕令任圜權知留事以俟知祥諸軍部署已定彥圭出皇后教以示繼岌繼岌曰大軍將發他無釁端安得為此負心事公輩勿復言從襲等泣曰聖上既有口敕王若不行苟中途事泄為患轉深繼岌曰上無詔書徒以皇后教令安得殺招討使從襲等巧造事端以間之繼岌既無英斷僶俯從之詰旦從襲以繼岌之命召崇韜計事繼岌登樓避之崇韜入左右檛殺之崇韜有子五人廷信廷誨隨父死於蜀廷説誅於洛陽廷讓誅於魏州廷讓原本作承誼今據歐陽史改正影庫本粘籤廷議誅於太原家産籍沒明宗即位詔令歸葬仍賜太原舊宅廷誨廷讓各有幼子一人姻族保之獲免崇韜妻周氏攜養於太原崇韜服勤盡節佐佑王家草昧艱難功無與比西平巴蜀宣暢皇威身死之日夷夏寃之然議者以崇韜功烈雖多事權太重不能處身量力而聽小人誤計欲取太山之安如急行避迹其禍愈速性復剛戾遇事便發既不知前代之成敗又未體當時之物情以天下為己任孟浪之甚也及權傾四海車騎盈門士人諂奉漸別流品同列豆盧革謂崇韜案自漸別流品至此十二字原本闕佚今從册府元龜增入曰汾陽王代北人徙家華陰侍中世在鴈門得非祖德歟崇韜應曰經亂失譜諜先人常云去汾陽王四世革曰故祖德也因是旌別流品援引薄徒委之心腹佐命勳舊一切鄙棄舊僚有干進者崇韜謂之曰公雖代邸之舊然家無門閥深知公才技不敢驟進者慮名流嗤余故也及征蜀之行於興平拜尚父子儀之墓嘗從容白繼岌曰蜀平之後王為太子待千秋萬歲神器在手宜盡去宦官優禮士族不唯疏斥閹寺騸馬不可復乘案通鑑作扇馬考胡三省注引薛史亦作騸馬今仍其舊舊五代史考異內則伶官巷伯怒目切齒外則舊僚宿將戟手痛心掇其族滅之禍有自來矣復以諸子驕縱不法既定蜀川輦運珍貨實於洛陽之第籍沒之日泥封尚濕雖莊宗季年為羣小所惑致功臣不保其終亦崇韜自貽其災禍也永樂大典卷二萬二千一百六十史臣曰夫出身事主得位遭時功不可以不圖名不可以不立洎功成而名遂則望重而身危貝錦於是成文良玉以之先折故崇韜之誅蓋為此也是知強吳滅而范蠡去全齊下而樂生奔苟非其賢孰免於禍明哲之士當鑒於斯永樂大典卷二萬二千一百六十
