body:
  text: 舊五代史卷八十八晉書十四列傳第三景延廣字航川陝州人也父建纍贈太尉延廣少習射以挽強見稱梁開平中邵王朱友誨節制於陝邵王朱友誨原本作郡王諸友謀今從歐陽史改正影庫本粘籤召置麾下友誨坐謀亂延廣竄而獲免後事華州連帥尹皓皓引薦列校隸于汴軍從王彥章拒莊宗於河上及中都之敗彥章見擒而延廣被數創歸於汴唐天成中明宗幸夷門會朱守殷拒命尋平之延廣以軍校連坐將棄市高祖時為六軍副使掌其事見而惜之乃密遣遁去尋收為客將及張敬達之圍晉陽高祖付以戎事甚有干城之功高祖即位授侍衛步軍都指揮使檢校司徒遙領果州團練使轉檢校太保領夔州節度使四年出鎮滑臺五年加檢校太傅移鎮陝府六年召為侍衛馬步都虞候移鎮河陽七年轉侍衛親軍都指揮使檢校太尉其年夏高祖晏駕延廣與宰臣馮道等承顧命以少帝為嗣既發喪都人不得偶語百官赴臨未及內門皆令下馬由是有驕暴之失少帝既嗣位延廣獨以為己功尋加同平章事彌有矜伐之色朝廷遣使告哀契丹無表致書去臣稱孫契丹怒遣使來讓延廣乃奏令契丹回圖使喬榮案歐陽史作喬瑩遼史同薛史契丹國志云先是河陽牙將喬榮從趙延壽入遼遼帝以為回國使置邸大梁至是景延廣説帝囚榮于獄凡遼國販易在晉境者皆殺之奪其貨大臣皆言遼國不可負乃釋榮慰賜而遣之告戎王曰先帝則北朝所立今上則中國自策為鄰為孫則可無臣之理且言晉朝有十萬口橫磨劍翁若要戰則早來他日不禁孫子則取笑天下當成後悔矣由是與契丹立敵干戈日尋初高祖在位時宣借楊光遠騎兵數百延廣請下詔遣還光遠由此忿延廣怨朝廷遣使泛海搆釁天福八年十二月契丹乃南牧九年正月陷甘陵河北儲蓄悉在其郡少帝大駭親率六師進駐澶淵延廣為上將凡六師進退皆出胸臆少帝亦不能制衆咸憚而忌之契丹既至城下使人宣言曰景延廣喚我來相殺何不急戰一日高行周與蕃軍相遇於近郊以衆寡不敵急請濟師延廣勒兵不出是日行周幸而獲免及契丹退延廣猶閉柵自固士大夫曰昔與契丹絶好言何勇也今契丹至若是氣何憊也案契丹國志云遼帝帳中有小校亡去云遼帝已傳木書收軍北去景延廣疑有詐閉壁不敢追遼帝北歸所過焚掠民物殆盡孔本時延廣在軍母凶問至自澶淵津北移於津南不信宿而復蒞戎事曾無戚容下里之士亦聞而惡之時有太常丞王緒者因使德州回與延廣有隙因誣奏與楊光遠通謀遣吏縶於麾下鍛成其事判官盧億纍勸解不從尋有詔棄市時甚寃之少帝還京嘗幸其第進獻錫賚有如酬酢權寵恩渥為一朝之冠俄與宰臣桑維翰不協少帝亦憚其難制遂罷兵權出為洛都留守兼侍中由是鬱鬱不得志亦意契丹強盛國家不濟身將危矣但縱長夜飲無復以夾輔為意案宋史盧多遜傳父億景延廣鎮天平表億掌書記留守西洛又為判官時國用窘乏取民財以助軍河南府計出二十萬緡延廣欲並緣以圖羡利增為三十七萬緡億諫曰公位兼將相既富且貴今國帑空竭不得已而取資於民公何忍利之乎延廣慚而止舊五代史考異開運三年冬契丹渡滹水詔遣屯孟津將戒途由府署正門而出所乘馬騰立不進幾墜於地乃易乘而行時以為不祥之甚及王師降契丹延廣狼狽而還時契丹主至安陽遣別部隊長率騎士數千與晉兵相雜趨河橋入洛以取延廣戒曰如延廣奔吳走蜀便當追而致之時延廣顧慮其家未能引決案東都事略咱居潤傳咱居潤嘗為樞密院小吏景延廣留守西京補為右職契丹犯京師以兵圍延廣家故吏悉避去居潤為全護其家時論稱之舊五代史考異案宋史咱居潤傳晉室將亡景延廣委其族自洛赴難與是書異殿本契丹既奄至乃與從事閻丕輕騎謁契丹主於封丘與丕俱見縶焉案遼史將軍康祥執景延廣來獻舊五代史考異延廣曰丕臣之從事也以職相隨何罪而亦為縲囚契丹釋之因責延廣曰致南北失歡良由爾也乃召喬榮質證前事凡有十焉始榮將入蕃時紿延廣云某恐忽忘所達之語請紀於翰墨延廣信之乃命吏備記其事榮亦憸巧善事人者也慮他日見詰則執之以取信因匿其文於衣中至是延廣始以他語抗對榮乃出其文以質之延廣頓為所屈每服一事則受牙籌一莖此契丹法也延廣受至八莖但以面伏地契丹遂咄之命鎖延廣臂將送之北土是日至於陳橋民家草舍延廣懼燔灼之害至夜分伺守者怠則引手自扼其吭尋卒焉雖事已窮頓人亦壯之時年五十六漢高祖登極詔贈中書令案歐陽史作贈侍中據薛史延廣出為洛都留守已兼侍中矣贈官當是中書令延廣少時嘗泛洞庭湖中流阻風帆裂柂折衆大恐頃之舟人指波中曰賢聖來護此必有貴人矣尋獲濟焉竟位至將相非偶然也永樂大典卷一萬八千一百三十一李彥韜太原人也少事邢州節度使閻寶為皂隸寶卒高祖收於帳下及起義以少帝留守北京因留彥韜為腹心歷客將牙門都校以纖巧故厚承委用及少帝嗣位授蔡州刺史入為內客省使宣徽南院使未幾遙領壽州節度充侍衛馬軍都指揮使檢校太保俄改陳州節度使典軍如故每在帝側升除將相但與宦官近臣締結致外情不通陷君於危亡之地嘗謂人曰朝廷所設文官將何用也且欲澄汰而除廢之則可知其輔弼之道也及契丹犯闕遷少帝於開封府一日少帝遣人急召彥韜將與計事彥韜辭不赴命少帝怏恨久之其負國辜君也如是及少帝北遷戎王遣彥韜從行洎至蕃中隸於國母帳下永康王舉兵攻國母以偉王為前鋒國母發兵拒之以彥韜為排陳使彥韜降於偉王偉王置之帳下其後卒於幽州永樂大典卷一萬三百八十九張希崇字德峯幽州薊縣人也父行簡假薊州玉田令希崇少通左氏春秋復癖於吟詠天祐中劉守光為燕帥性慘酷不喜儒士希崇乃擲筆以自效守光納之漸升為裨將俄而守光敗唐莊宗命周德威鎮其地希崇以舊籍列於麾下尋遣率偏師守平州案歐陽史作劉守光不喜儒士希崇因事軍中為偏將將兵守平州是守光未敗即守平州非為德威所遣也與薛史異舊五代史考異阿保機南攻陷其城掠希崇而去阿保機詢希崇乃知其儒人也因授元帥府判官後遷盧龍軍行軍司馬繼改蕃漢都提舉使天成初偽平州節度使盧文進南歸契丹以希崇繼其任遣腹心總邊騎三百以監之希崇蒞事數歲契丹主漸加寵信一日登郡樓私自計曰昔班仲升西戍不敢擅還以承詔故也我今入關斷在胸臆何恬安於不測之地而自滯耶乃召漢人部曲之翹楚者謂曰我陷身此地飲酪被毛生不見其所親死為窮荒之鬼南望山川度日如歲爾輩得無思鄉者乎部曲皆泣下沾衣且曰明公欲全部曲南去善則善矣如敵衆何案歐陽史作麾下皆言兵多不可俱亡因勸希崇獨去舊五代史考異希崇曰俟明日首領至牙帳則先擒之契丹無統領其黨必散且平州去王帳千餘里待報至徵兵踰旬方及此則我等已入漢界深矣何用以衆少為病衆大喜是日希崇於郡齋之側坎隙地貯石灰明旦首領與羣從至希崇飲以醇酎數鍾既醉悉投於灰穽中斃焉其徒營於北郭遣人攻之皆潰圍奔去希崇遂以管內生口二萬餘南歸案遼史天顯元年七月盧龍行軍司馬張崇叛奔唐疑希崇在遼祇名崇歸唐後始加希字也然希崇歸唐在遼太宗時而遼史繫于太祖紀又希崇本繼盧文勝而遼史書其降在盧國用歸唐之前年月皆舛誤舊五代史考異唐明宗嘉之授汝州防禦使希崇既之任遣人迎母赴郡母及境希崇親肩板輿行三十里觀者無不稱歎歷二年遷靈州兩使留後先是靈州戍兵歲運糧經五百里有剽攘之患希崇乃告諭邊士廣務屯田歲餘軍食大濟璽書褒之因正授旄節清泰中希崇厭其雜俗頻表請覲詔許之至闕未久朝延以安邊有聞議內地處之改邠州節度使及高祖入洛與契丹方有要盟慮其為所取乃復除靈武案通鑑帝與契丹修好慮其復取靈武舊五代史考異希崇歎曰我應老於邊城賦分無所逃也因鬱鬱不得志久而成疾卒於任時年五十二希崇自小校纍官至開府儀同三司檢校太尉三歷方面封清河郡公食邑二千戶賜清邊奉國忠義功臣亦人生之榮盛者也案歐陽史作贈太師希崇素朴厚尤嗜書蒞事之餘手不釋卷不好酒樂不蓄姬僕祁寒盛暑必儼其衣冠廝養之輩未嘗聞褻慢之言事母至謹每食必侍立俟盥漱畢方退物議高之性雖仁恕或遇姦惡則嫉之若仇在邠州日有民與郭氏為義子自孩提以至成人因乘戾不受訓遣之郭氏夫婦相次俱死郭氏有嫡子已長時郭氏諸親與義子相約云是親子欲分其財物助而訟之前後數政不能理遂成疑獄希崇覽其訴判云父在已離母死不至止稱假子孤二十年撫養之恩儻曰親兒犯三千條悖逆之罪頗為傷害名教安敢理認田園其生涯並付親子所訟人與朋姦者委法官以律定刑聞者服其明希崇亦善觀象在靈州日見月掩畢口大星經月復爾乃歎曰畢口大星邊將也月再掩之吾其終歟果卒於郡子仁謙為嗣歷引進副使永樂大典卷六千三百五十一王庭胤字紹基其先安人也案安字上有脫文歐陽史王處直傳作京兆萬年人疑是長安祖處存定州節度使父鄴晉州節度使庭胤唐莊宗之內表也性勇剽狡捷鷹瞬隼視喑嗚眥睚則挺劍而不顧少為晉陽軍校以攻城野戰為務暑不息嘉樹之陰寒不處密室之下與軍伍食不異味居不異適故莊宗於親族之中獨加禮遇莊宗明宗朝纍歷貝欣密澶隰相六州刺史案歐陽史不載相州國初范延光據鄴稱亂高祖以庭胤纍朝宿將詔為魏府行營中軍使兼貝州防禦使城降賞勞授相州節度使尋移鎮定州先是契丹欲以王處直之子威為定州節度使處直則庭胤之叔祖也處直為養子都所篡時威北走契丹契丹納之至是契丹遣使諭高祖云欲使王威襲先人土地如我蕃中之制高祖答以中國將校自刺史團練防禦使序遷方授旄節請遣威至此任用漸令升進乃合中土舊規戎王深怒其見拒使人復報曰爾自諸侯為天子有何階級耶高祖畏其滋蔓則厚賂力拒其命契丹怒稍息遂連升庭胤俾鎮中山且欲塞其意也少帝嗣位改滄州節度使纍官至檢校太尉開運元年秋卒於位年五十四贈中書令有子五人長曰昭敏仕至金吾將軍卒永樂大典卷一萬八千一百三十一史匡翰字元輔鴈門人也父建瑭事莊宗為先鋒將敵人畏之謂之史先鋒纍立戰功唐書有傳匡翰起家襲九府都督歷代州遼州副使檢校太子賓客同光初為嵐憲朔等州都遊奕使改天雄軍牢城都指揮使再加檢校戶部尚書領潯州刺史天成中授天雄軍步軍都指揮使歲餘遷侍衛彰聖馬軍都指揮使高祖有天下也授檢校司空懷州刺史其妻魯國長公主即高祖之妹也尋轉控鶴都指揮使兼和州刺史駙馬都尉俄授檢校司徒鄭州防禦使未幾遷義成軍節度滑濮等州觀察處置管內河隄等使丁母憂尋起復本鎮案陶穀撰匡翰碑文云圃田待理漢殿掄才功臣旌佐國之名出守奉專城之寄蓋鄭州即在義成軍管內匡翰雖遷官不離本鎮也匡翰剛毅有謀略御軍嚴整接下以禮與部曲語未嘗稱名歷數郡皆有政聲案陶穀撰碑文云齋壇峻而金鼓嚴麻案宣而油幢出控梁苑之西郊殷乎威望撫國僑之遺俗綽有政聲與薛史合尤好春秋左氏傳每視政之暇延學者講説躬自執卷受業焉時發難問窮於隱奧流輩或戲為史三傳戲為原本作覷為今從册府元龜改正影庫本粘籤既自端謹不喜人醉幕客有關徹者狂率酣醟一日使酒怒謂匡翰曰明公昔刺覃懷與徹主客道至道至二字原文疑有舛誤考册府元龜所引薛史與永樂大典同今姑仍其舊影庫本粘籤事無不可今領節鉞數不相容且書記趙礪險詖之人也脅肩諂笑黷貨無厭而明公待之甚厚徹今請死近聞張彥澤臠張式未聞史匡翰斬關徹恐天下談者未有比類匡翰不怒引滿自罰而慰勉之其寬厚如此天福六年白馬河決匡翰祭之見一犬有角浮於水心甚惡之後數月遘疾而卒于鎮年四十詔贈太保子彥容歷宮苑使濮單宿三州刺史永樂大典卷一萬一百八十三梁漢顒太原人也少事後唐武皇初為軍中小校善騎射勇於格戰莊宗之破劉仁恭王德明及與梁軍對壘於德勝皆預其戰纍功至龍武指揮使檢校司空梁平授檢校司徒濮州刺史同光三年魏王繼岌統軍伐蜀以漢顒為魏王中軍馬步都虞候天成初授許州兵馬留後檢校太保尋為邠州節度使歲餘加檢校太傅充威勝軍節度唐鄧等州觀察處置等使在鎮二年移鎮許州許州原本作詳州今從通鑑改正影庫本粘籤長興四年夏以眼疾授太子少師致仕高祖素與漢顒有舊及即位之初漢顒進謁再希任使除左威衛上將軍天福七年冬以疾卒於洛陽年七十餘贈太子太保永樂大典卷六千六百十四楊思權邠州新平人也梁乾化初為軍校貞明二年轉弓箭指揮使檢校左僕射纍遷控鶴右第一軍使唐莊宗平梁補右廂夾馬都指揮使天成初遷右威衛將軍加檢校司空會秦王從榮鎮太原明宗乃以馮贇為副留守以思權為北京步軍都指揮使以佐佑之從榮幼驕狠不親公務明宗乃遣紀綱一人素善從榮者與之遊處俾從容諷導之嘗私謂從榮曰河南相公恭謹好善親禮端士有老成之風相公處長更宜自勵勿致聲問在河南之下從榮不悅因告思權曰朝廷人皆推從厚共非短我吾將廢棄矣思權曰請相公勿憂萬一有變但思權在處有兵甲足以濟事乃勸從榮招置部曲調弓礪矢陰為之備思權又謂使者曰朝廷教君伴相公終日言弟賢兄弱何也吾輩苟在豈不能與相公為主耶使者懼告馮贇乃密奏之明宗乃詔思權赴京師以秦王之故亦弗之罪也長興末為右羽林都指揮使遣戍興元閔帝嗣位奉詔從張虔釗討鳳翔洎至岐下思權首倡倒戈以攻虔釗尋領部下軍率先入城謂唐末帝曰臣既赤心奉殿下俟京城平定與臣一鎮勿置在防禦團練使內乃懷中出紙一幅謂末帝曰願殿下親書臣姓名以志之末帝命筆書可邠寧節度使及即位授推誠奉國保乂功臣靜難軍節度邠寧慶衍等州觀察處置等使檢校太保清泰三年入為右龍武軍統軍高祖即位除左衛上將軍進封開國公天福八年以疾卒年六十九贈太傅永樂大典卷六千五十二尹暉魏州人也少以勇健事魏帥楊師厚為軍士唐莊宗入魏擢為小校從征河上每於馬前步鬬有功莊宗即位連改諸軍指揮使天成長興中領數郡刺史纍遷嚴衛都指揮使唐應順中王師討末帝於岐下暉與楊思權首歸末帝約以鄴都授之末帝即位高祖入洛嘗遇暉於通衢暉馬上橫鞭以揖高祖高祖忿之後因謁謂末帝曰尹暉常才以歸命稱先陛下欲令出鎮名藩外論皆云不當末帝乃授暉應州節度使高祖即位改右衛大將軍時范延光據鄴謀叛以暉失意密使人齎蠟彈以榮利啖之暉得延光文字懼而思竄欲沿汴水奔於淮南高祖聞之尋降詔招喚未出王畿為人所殺子勳事皇朝纍歷軍職遷內外馬步都軍頭見為郢州防禦使永樂大典卷一萬八千一百三十一李從璋字子良後唐明宗皇帝之猶子也少善騎射從明宗歷戰河上有平梁之功唐同光末魏之亂軍迎明宗為帝從璋時引軍自常山過邢邢人以從璋為留後踰月明宗即位受詔領捧聖左廂都指揮使時天成元年五月也八月改大內皇城使加檢校司徒彰國軍節度使賜竭忠建策興復功臣旋以達靼諸部入寇從璋率麾下出討一鼓而破有詔褒之三年四月移鎮滑臺滑臺原本作體臺今從通鑑改正影庫本粘籤時明宗駐蹕於大梁從璋嘗召幕客謀曰車駕省方藩臣咸有進獻吾為臣為子安得後焉欲取倉廩羡餘以助其用諸君以為何如內有賓介白曰聖上寬而難犯行宮在近忽致上達則一幕俱罹其罪從璋怒翌日欲引弓射所言者朝廷知之改授右驍衛上將軍長興元年十月出鎮陝州二年五月遷河中節度使三年就加檢校太傅案從璋為河中節度以代安重誨也五代史闕文從璋見重誨拜于庭下重誨驚曰太傅過禮據此傳從璋至三年始加檢校太傅徙鎮河中時不應先稱為太傅舊五代史考異賜忠勤靜理崇義功臣四年五月制封洋王是歲明宗厭代閔帝嗣位尋受命代潞王於岐下會潞王舉兵入洛事遂寢高祖即位之元年十二月授威勝軍節度使降封隴西郡公二年九月終於任年五十一鄧人為之罷市思遺愛也詔贈太師從璋性貪黷懼明宗嚴正自滑帥入居環衛之後以除拜差跌心稍悛悟後歷數鎮與故時幕客不足者相遇無所憾焉蒲陝之日政有善譽改賜忠勤靜理之號良以此也及高祖在位愈畏其法故歿於南陽人甚惜之亦明宗宗室之白眉也子重俊永樂大典卷一萬八千一百二十重俊唐長興清泰中歷諸衛將軍高祖即位遙領池州刺史少帝嗣位授虢州刺史性貪鄙常為郡人所訟下御史臺抵贓至重太后以猶子之故救之乃歸罪於判官高獻止罷其郡未幾復居環列出典商州商民素貧重俊臨之割剝幾盡復御家不法其奴僕若履湯蹈火忤其意者或鞭之或刃之又殺從人孫漢榮掠其妻及受代歸洛漢榮母燕氏獲其子婦以訴於府尹景延廣牙將張守英謂燕曰重俊前朝枝葉今上中表河南尹其何以理不若邀其金帛私自和解策之上也燕從其言授三百緡而止後以青衣趙滿師因不勝楚毒踰垣訴景延廣云重俊與妹私姦及前後不法事延廣奏之詔遣刑部郎中王瑜鞫之王瑜原本作王踰今從通鑑改正影庫本粘籤盡得其實併以穢迹彰露而賜死於家永樂大典卷一萬三百八十九李從溫字德基代州崞縣人後唐明宗之猶子也明宗微時從溫執僕御之役後養為己子及歷諸藩署為牙校命典庫唐同光中奏授銀青光祿大夫檢校右散騎常侍纍加檢校司空充北京副留守明宗即位授安國節度使檢校司徒長興元年四月入為右武衛上將軍是歲復出鎮許田明年移北京留守加太傅四年正月改太平軍節度使五月制封兗王十一月移鎮定州兼北面行營副招討使尋又移鎮常山清泰中加同平章事改鎮彭門高祖即位之明年就加侍中七年加兼中書令八年再為許州節度使開府儀同三司封趙國公纍加食邑一萬戶實食封一千二百戶開運二年改河陽三城節度使三年二月卒于任年六十三贈太師追封隴西郡王從溫始以明宗本枝歷居藩翰無文武才略資濟代之用凡臨民以貨利為急在常山日覩牙署池潭凡十餘頃皆立木為岸而以修篁環之從溫曰此何用為悉命伐竹取木鬻於列肆獲其直以實用帑焉高祖即位從溫時在兗州多創乘輿器服為宗族切戒從溫弗聽其妻關氏素耿介一日厲聲於牙門云李從溫欲為亂擅造天子法物從溫敬謝悉命焚之家無敗纍關氏之力也後以多畜駝馬縱牧近郊民有訴其害稼者從溫曰若從爾之意則我産畜何歸乎其昏愚多此類也高祖性至察知而不問少帝嗣位太后教曰吾只有此兄慎勿繩之故愈加姑息以致年逾耳順終于牖下乃天幸也永樂大典卷一萬三百八十九張萬進突厥南鄙人也祖拽斤父臘萬進白美髯少而無賴事唐武皇以騎射著名攻城野戰奮不顧命嘗與梁軍對陳持鋭首短刀躍馬獨進及兵刃既刓則易以大鎚左右奮擊出沒進退無敢當者唐莊宗明宗素憐其雄勇復奬其戰功故纍典大郡天成長興中歷威勝保大兩鎮節制高祖有天下命為彰義軍節度使所至不治政由羣下洎至涇原日涇原原本作陘厚今從册府元龜改正影庫本粘籤凶恣彌甚每日於公庭列大鼎烹肥羜割胾方寸以噉賓佐皆流淚不能大嚼俟其他顧則致袂中又命巨觶行酒訴則辱之乃有持杯偽飲褰領裱而納之者既沉湎無節唯婦言是用其妻與幕吏張光載干預公政納錢數萬補一豪民為捕賊將領兵數百人入新平郡境邠帥以其事上奏有詔詰之光載坐流罪配于登州天福四年三月萬進疾篤月餘州兵將亂乃詔副使萬庭圭委其符印記室李升素憾凌虐知其將亡謂庭圭曰氣息將奄不保晨暮促移就第豈不宜乎庭圭從之萬進尋卒遂以藍輿祕尸而出即馳騎而奏之詔命既至而後發喪其妻素狠戾謂長子彥球曰萬庭圭逼迫危病驚擾而死不手戮之奚為生也庭圭聞之不敢往弔萬進假殯於精舍之下至轊車東轅凡數月之間郡民數萬無一饋奠者為不善者衆必棄之信矣夫永樂大典卷六千三百五十一史臣曰延廣功扶二帝任掌六師亦可謂晉之勳臣矣然而昧經國之遠圖肆狂言於強敵卒使邦家蕩覆宇縣丘墟書所謂唯口起羞者其斯人之謂歟彥韜既負且乘任重才微盜斯奪之固其宜矣希崇蔚有雄幹老於塞垣未盡其才良亦可惜楊尹二將因倒戈而仗鉞豈義士之所為其餘蓋以勳以親咸分屏翰唯萬進之醜德又何暇於譏焉永樂大典卷六千三百五十一
