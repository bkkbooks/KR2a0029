body:
  text: 舊五代史卷六十一唐書三十七列傳第十三安金全代北人世為邊將少驍果便騎射武皇時為騎將屢從征討莊宗之救潞州及平河朔皆有戰功纍為刺史以老病退居太原案遼史安金全以幽州戰敗故退廢不用此事薛史不載天祐中汴將王檀率師三萬乘莊宗在鄴來襲並州時城無備兵敵軍奄至監軍張承業大恐計無所出閲諸司丁匠登陴禦捍外攻甚急金全遽出謂承業曰老夫退居抱病不任軍事然吾王家屬在此王業本根之地如一旦為敵所有大事去矣請以庫甲見授為公備寇承業即時授之金全被甲跨馬召率子弟及退間諸將得數百人夜出北門擊賊於羊馬城內梁人驚潰由是退却俄而石君立自潞州至汴軍退走微金全之奮命城幾危矣莊宗性矜伐凡大將立功不時行賞故金全終莊宗世名位不進明宗與之有舊及登極授金全同平章事充振武軍節度使在任二年治民為政非所長詔赴闕俄而病卒廢視朝二日初南北對壘汴之游騎每出必為金全所獲故梁之偵邏者咸懼目之為安五道蓋比鬼將有五道之名也子審琦等皆位至方鎮別有傳永樂大典卷一萬八千一百二十九審通金全之猶子也幼事莊宗纍有戰功轉先鋒指揮使同光初為北京右廂馬軍都指揮使屯奉化軍四年春赴明宗急詔軍趨夷門為前鋒天成初授單州刺史單州原本作禪州今據通鑑改正影庫本粘籤改齊州防禦使兼諸道先鋒馬軍都指揮使奉詔北征從房知溫營於蘆臺會龍晊部下兵亂審通脫身酒筵奪船以濟促騎士介馬及亂兵南行盡戮之以功授檢校太傅滄州節度使圍王都於中山躬冒矢石為飛石所中而卒贈太尉永樂大典卷一萬二千五十四安元信字子言案五代時唐晉俱有安元信薛史並為立傳今附識于此舊五代史考異代北人父順琳為降野軍使元信以將家子便騎射幼事武皇從平巢蔡光啓中吐渾赫連鐸寇雲中武皇使元信拒之元信兵敗於居庸關武皇性嚴急元信不敢還遂奔定州王處存待之甚厚用為突騎都校乾寧中處存子郜嗣位時梁軍攻河朔三鎮奔命不暇梁將張存敬軍奄至城下既無宿備郜懼挈其族奔太原元信從之武皇待之如初用為鐵林軍使梁將氏叔琮之攻河東也別將葛從周自馬嶺入元信伏于榆次挫其前鋒梁將李思安之攻上黨也王師將壁高河為梁軍所逼別將秦武者尤為難敵元信與鬬斃之繇是梁軍解去城壘得立武皇賜所乘馬及細鎧仗遷突陳都將莊宗嗣晉王位元信從救上黨破夾寨復澤潞以功授檢校司空遼州刺史賜玉鞭名馬柏鄉之役日晚戰酣元信重傷莊宗自臨傅藥其年改檢校司徒武州刺史充內衙副都指揮使山北諸州都團練副使從莊宗定魏博移為博州刺史與梁對壘得勝渡元信為右廂排陳使未幾為大同軍節度使莊宗平定河南移授橫海軍節度使時契丹犯邊元信與霍彥威從明宗屯常山元信恃功每對明宗以成敗勇怯戲侮彥威彥威不敢答明宗曰成由天地不由於人當氏叔琮圍太原公有何勇今國家運興致我等富貴勿以小勝小捷挂於口吻取笑於長者乃起謝元信不復以彥威為戲明宗即位以元信嘗為內衙都校尤厚待之加同中書門下平章事明年移鎮徐州王師之討高季興襄帥劉訓逗撓軍期移授元信山南東道節度使以代訓歲餘改歸德軍節度使就加兼侍中明宗不豫求入末帝即位授潞州節度使加檢校太尉清泰三年二月以疾卒於鎮時年七十四贈太師晉高祖即位以元信宿望令禮官定諡曰忠懿有子六人長曰友權歷諸衛大將軍次曰友親為滁州刺史卒於任永樂大典卷一萬八千一百二十九安重霸雲州人也性狡譎多智算初自代北與明宗俱事武皇因負罪奔梁在梁復以罪奔蜀蜀以蕃人善騎射因為親將蜀後主王衍幼年襲位其政多僻宦官王承休居中用事與成都尹韓昭內外相結專採擇聲色以固寵幸武臣宿將居常切齒重霸諂事承休特見委信案北夢瑣言重霸為簡州刺史貨無厭舊五代史考異梁末岐下削弱蜀人獨取秦成階等州重霸說承休求鎮秦州仍於軍中選山東驍果得數千人號龍武都以承休為軍帥重霸副焉俱在天水歲餘承休欲求旄鉞乃以隴西花木入獻又稱秦州山水之美人物之盛請後主臨幸而韓昭贊成之案太平廣記引王氏見聞録云承休請從諸軍揀選官健得驍勇數千號龍武軍承休自為統帥並特加衣糧日有優給因乞秦州節度使且云願與陛下于秦州採掇美麗且說秦州風土多出國色仍請幸天水少主甚悅即遣仗節赴鎮應所選龍武精鋭並充衙隊從行舊五代史考異同光二年十月蜀主率衆數萬由劍閣將出興鳳以遊秦州至興州遇魏王繼岌軍至狼狽而旋案九國志作王衍將之秦州以王宗弼力諫而止與薛史異承休遽聞東師入討大恐計無從出問於重霸對曰開府何患蜀中精兵不下十萬咫尺之險安有不濟縱東軍盡如狼虎豈能入劍門然國家有患開府特受主知不得失於奔赴此州制置事定無虞得失重霸願從開府赴闕承休素信以為忠赤重霸出秦州金帛以賂羣羌買由文山路歸蜀案九國志作取路以歸蜀文義較為明晰承休擁龍武軍及招置僅萬人從行令重霸權握部署州人祖送秦州軍亦列部隊承休登乘重霸馬前辭曰國家費盡事力收獲隴西若從開府南行隴州即時疏失請開府自行重霸且為國守藩承休既去重霸在秦州聞明宗起河北即時遣使以秦成等州來降天成初用為閬州團練使未幾召還為左衛大將軍常以姦佞揣人主意明宗尤愛之長興末明宗謂侍臣曰安重霸朕之故人以秦州歸國其功不細酬以團練防禦恐非懷來之道范延光曰將校內有自河東河北從陛下龍飛故人尚有未及團防者今若遽授重霸方鎮恐為人竊議明宗不悅未幾竟以同州鉞授之清泰初移授西京留守京兆尹先是秦雍之間令長設酒食私丐於部民者俗謂之搗蒜及重霸之鎮長安亦為之故秦人目重霸為搗蒜老其年冬改雲州節度居無何以病求代時家寄上黨及歸而卒重霸善悅人好賂遺時人目之為俊弟重進重進原本作道進今從冊府元龜改正影庫本粘籤案玉堂閒話作季弟道進舊五代史考異尤凶惡事莊宗以試劍殺人奔淮南案玉堂閒話云安重進性凶險莊宗潛龍時為小校常佩劍列于翊衛後攜劍南馳投于梁祖梁祖壯之俾隸淮之鎮戍復以射殺掌庾吏逃竄江湖淮帥得之擢為裨將舊五代史考異重霸在蜀聞之蜀主取之於吳用為裨將隨重霸為龍武小將戍長道又殺人奔歸洛陽案玉堂閒話云蜀破道進東歸明宗補為諸州馬步軍都指揮使後有過鞭背卒舊五代史考異重霸之子曰懷浦晉天福中為禁軍指揮使契丹寇澶州以臨陳忸怩為景延廣所誅永樂大典卷一萬八千一百二十九劉訓字遵範隰州永和人也出身行間初事武皇為馬軍隊長漸至散將屬河中王氏昆仲有尋戈之役訓從史儼攻陝州武皇討王行瑜以訓為前鋒後隸河中為隰州防禦都將居無何殺陝州刺史以郡歸莊宗歷瀛州刺史同光初拜左監衛大將軍三年授襄州節度使四年四月洛陽有變訓以私忿害節度副使胡裝族其家聞者寃之天成中荊南高季興叛詔訓為南面行營招討使知荊南行府事是時湖南馬殷請以舟師會及王師至荊渚殷軍方到嶽州案通鑑劉訓至荊南楚王殷遣都指揮使許德勳等將水軍屯嶽州高季興堅壁不戰求救于吳吳人遣水軍援之舊五代史考異仍傳意於訓許助軍儲弓甲之類久之略無至者荊渚地氣卑濕漸及霖潦糧運不繼人多疾疫訓本無將略人咸苦之及孔循至得襄之小校獻竹龍之術獻竹龍之術原本脫獻字今據府元龜增入影庫本粘籤及造竹龍二道傅於城下竟無所濟遂罷兵令將士散略居民而回詔訓赴闕尋責授檀州刺史續敕濮州安置未幾起為龍武大將軍尋授建雄軍節度使移鎮延平卒贈太尉永樂大典卷九千九十八張敬詢勝州金河縣人世為振武軍牙校祖仲阮歷勝州刺史父漢環事武皇為牙將敬詢當武皇時專掌甲坊十五年以稱職聞復以女為武皇子存霸妻益見親信莊宗即位以為沁州刺史秩滿復用為甲坊使莊宗經略山東敬詢從軍歷博澤慈隰四州刺史同光末授耀州團練使郭崇韜之征蜀也以敬詢善督租賦乃表為利州留後明宗即位正授昭武軍節度使天成二年詔還京師復授大同節度使至鎮招撫室韋萬餘帳四年徵為左驍衛上將軍明年授滑州節度使以河水連年溢堤乃自酸棗縣界至濮州廣隄防一丈五尺東西二百里民甚賴之三年秩滿歸京卒輟視朝一日永樂大典卷六千三百五十劉彥琮字比德雲中人也事武皇纍從征役先是絳州刺史王瓘叛絳州原本作維州今據通鑑改正影庫本粘籤武皇言於彥琮意欲致之無幾從獵於汾晉之郊彥琮奔絳瓘以為附己待之甚厚因命為騎將會瓘出獵於馳驅之際彥琮刃瓘之首來獻武皇甚奇之從莊宗解上黨之圍同光初稍遷至鐵林指揮使磁州刺史後明宗赴難京師授華州留後尋正授節旄天成三年改左武衛上將軍未幾改陝州節度使尋移鎮邠州卒於鎮時年六十四贈太傅永樂大典卷六千二十袁建豐武皇破巢時得於華陰年方九歲愛其精神爽俊俾收養之漸長列於左右復習騎射補鐵林都虞候從破邠州王行瑜以功遷左親騎軍使轉突騎指揮使案歐史作突陳指揮使從莊宗解圍上黨破柏鄉陳纍功遷右僕射左廂馬軍指揮使明宗為內衙指揮使建豐為副北討劉守光常身先士伍轉都教練使權蕃漢副總管莊宗入鄴以心腹幹能選為魏府都巡檢使從征劉鄩下衛磁洺三郡有功加檢校司空授洺州刺史於臨洺西敗梁將王遷數千人生獲將領七十餘人俄拜相州刺史徵赴河上預戰於胡柳陂建豐領相州軍士行營在外委州事於小人失於撫馭指揮使孟守謙據城以叛案歐陽史作孟謙舊五代史考異建豐引兵討平之改隰州刺史染風痺於任明宗嗣位念及平昔副二之舊詔赴洛下親幸其第撫問隆厚加檢校太傅案歐陽史作太尉舊五代史考異遙授鎮南節度使俾請俸自給後卒於洛陽年五十六廢朝一日贈太尉子可鈞仕皇朝位至諸衛大將軍永樂大典卷一萬八千一百二十九西方鄴定州滿城人也父再遇為州軍校案歐史作汴州軍校疑原本脫一字鄴居軍中以勇力聞年二十南渡河遊梁不見用復歸莊宗以為孝義軍指揮使纍從征伐有功同光中為曹州刺史以州兵屯汴州明宗自魏反兵南渡河而莊宗東幸汴州汴州節度使孔循懷二志使北門迎明宗西門迎莊宗所以供帳委積如一曰先至者入之鄴因責循曰主上破梁而得公有不殺之恩奈何欲納總管而負國循不答鄴度循不可爭而石敬瑭妻明宗女也時方在汴鄴欲殺之以堅人心循知其謀取之藏其家鄴無如之何而明宗已及汴乃將麾下兵五百騎西迎莊宗見於汜水嗚咽泣下莊宗亦為之噓唏乃使以兵為先鋒莊宗至汴西不得入還洛陽遇弒明宗入洛鄴請死於馬前明宗嘉歎久之明年荊南高季興叛明宗遣襄州節度使劉訓等招討而以東川董璋為西南招討使乃拜鄴夔州刺史副璋以兵出三峽已而訓等無功見黜諸將皆罷璋未嘗出兵惟鄴獨取三州乃以夔州為寧江軍拜鄴節度使已而又取歸州案通鑑不載取歸州事歐陽史與薛史同近人撰十國春秋者謂他書不載取歸州之事疑歐陽史有誤蓋薛史世久失傳十國春秋所引悉本通鑑考異殊不知歐陽史西方鄴傳本于薛史有可徵信也舊五代史考異數敗季興之兵鄴武人所為多不中法度判官談善達數以諫鄴鄴怒遣人告善達受人金下獄善達素剛辭益不遜遂死于獄中鄴病見善達為祟卒于鎮永樂大典卷一萬八千一百二十九張遵誨魏州人也父為宗城令羅紹威殺牙軍之歲為梁軍所害遵誨奔太原武皇以為牙門將莊宗定山東遵誨以典客從歷幽鎮二府馬步都虞候幽鎮原本作幽鏦今據五代時盧龍軍稱幽州魏博軍稱鎮州鏦字係鎮字之訛今改正影庫本粘籤同光中為金吾大將軍明宗即位任圜保薦授西都副留守知留守事京兆尹天成四年入為客省使守衛尉卿及將有事於南郊為修儀仗法物使初遵誨自以歷位尹正與安重誨素亦相款衷心有望於節鉞及郊禋畢止為絳州刺史鬱鬱不樂離京之日白衣乘馬於隼旟之下至郡無疾翌日而卒永樂大典卷六千三百五十孫璋齊州歷城人出身行間隸梁將楊師厚麾下稍補奉化軍使莊宗入鄴纍遷澶州都指揮使明宗鎮常山擢為裨校鄴兵之變從明宗赴難京師天成初歷趙登二州刺史齊州防禦使王都之據中山璋為定州行營都虞候賊平加檢校太保長興初授鄜州節度使罷鎮卒於洛陽年六十一贈太尉永樂大典卷三千四百六十一史臣曰夫天地斯晦則帝王於是龍飛雲雷搆屯則王侯以之蟬蛻良以適遭亂世得奮雄圖故金全而下咸以軍旅之功坐登藩閫之位垂名簡冊亦可貴焉惟重霸以姦險而仗旄鉞蓋非數子之儔也永樂大典卷三千四百六十一
