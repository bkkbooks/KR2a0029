body:
  text: 舊五代史卷三十三唐書九莊宗紀第七同光三年秋七月丁酉以久雨詔河南府依法祈晴滑州上言黃河決壬寅皇太后崩於長壽宮帝執喪於內出遺令以示於外癸卯帝於長壽宮成服百官於長壽宮幕次成服後於殿前立班奉慰乙巳宰臣上表請聽政不允表再上敕旨宜廢朝七日丁未弘文館上言請依六典改弘文館為崇文館從之時樞密使郭崇韜亡父名弘豆盧革希崇韜指奏而改之案五代會要載同光三年敕云崇文館比與弘文館並置今請改稱頗協舊典蓋豆盧革曲為之説也洛水泛漲壞天津橋以舟濟渡日有覆溺者己酉宰臣百官上表請聽政又請復常膳表凡三上以刑部尚書李琪充大行皇太后山陵禮儀使河南尹張全義充山陵橋道排頓使孔謙充監護使壬子河陽陝州上言河溢岸以禮部尚書王正言案原本作直言今據歐陽史改正舊五代史考異為戶部尚書以御史中丞崔協為禮部尚書以刑部侍郎史館修撰判館事崔居儉為御史中丞以尚書左丞歸靄為刑部侍郎陝州上言河漲二丈二尺壞浮橋入城門居人有溺死者乙卯汴州上言汴水泛漲恐漂沒城池於州城東西權開壕口引水入古河澤潞上言自今月一日雨至十九日未止戊午以刑部尚書判太常卿兼判吏部尚書銓事李琪為吏部尚書依前判太常卿以兵部侍郎集賢殿學士判院事盧文紀為吏部侍郎以給事中李光序為尚書右丞許州滑州奏大水八月壬戌詔諸司人吏不許諸處奏薦如有勞績只許本司奏聞詔有司吳越王印宜以黃金鑄成其文曰吳越國王之印丁卯帝釋服百官奉慰於長壽宮戊辰客省使李嚴使蜀回初帝令往市蜀中珍玩蜀法嚴峻不許奇貨東出其許市者謂之入草物原本入草訛全草今據通鑑及册府元龜所引薛史改正舊五代史考異嚴不獲珍貨歸而奏之帝大怒曰物歸中夏者命之曰入草王衍寧免為入草之人耶由是伐蜀之意鋭矣庚辰幸壽安山陵作所鄴都大水御河泛溢癸未河南縣令羅貫長流崖州尋委河南府決痛杖一頓處死坐部內橋道不修故也及死人皆寃之甲申山陵禮儀使奏山陵封域之內先有丘墳合令子孫改卜舊例給其所費無子孫者官為瘞藏如是五品以上官所司仍以禮致祭從之鳳翔奏大水己酉中書門下上言據禮儀使狀準故事太常少卿定大行太后諡議太常卿署定訖告天地宗廟伏準禮文賤不得誄貴子不得爵母后必諡於廟者受成於祖宗今大行太后諡請太常卿署定後集百官連署諡狀訖讀於太廟太祖皇帝室然後差丞郎一人撰册文別定日命太尉上諡册於西宮靈座同日差官告天地太微宮宗廟如常告之儀從之青州大水蝗己丑以襄州留後李紹珙為襄州節度使以邠州留後董璋為邠州節度使九月辛卯朔河陽奏黃河漲一丈五尺癸巳中書上言大行皇太后諡議合讀於太廟太祖室其日集兩省御史臺五品已上尚書省四品已上諸司三品已上官於太廟序立從之鎮州衛州奏案原本脫鎮州二字今據册府元龜所引薛史增入舊五代史考異水入城壞廬舍乙未制封第三子鄴都留守興聖宮使檢校太尉同平章事判六軍諸衛事繼岌為魏王幸壽安陵庚子襄州奏漢江漲溢漂溺廬舍是日命大舉伐蜀詔曰朕夙荷丕基乍平偽室非不欲寵綏四海寵綏原本作寵維今據文改正影庫本粘籤協和萬邦庶正朔以遐同俾人倫之有序其或地居陬裔位極驕奢殊乖事大之規但蘊偷安之計則必徵諸典訓振以皇威爰興伐罪之師冀遏亂常之黨蠢茲蜀主世負唐恩間者父總藩宣任居統制屬朱溫東離汴水致昭皇西幸岐陽不務扶持反懷顧望盜據劍南之土宇全虧閫外之忳誠先皇帝早在並門將興霸業彼既曾馳書幣此亦復展謝儀後又特發使人專持聘禮彼則更不回一介之使答咫尺之書星歲俄移歡盟頓阻朕頃遵遺訓嗣統列藩追昔日之來誠繼先皇之舊好纍馳信幣皆絶酬還背惠食言棄同即異今觀孽豎紹據山河委閹宦以持權憑阻修而僭號早者曾上秦王緘札張皇蜀地聲塵形侮黷之言辭謗親賢之勳德昨朕風驅鋭旅電掃凶渠復已墜之宗祧纘中興之曆數捷音旋報復命仍稽使來而尚抗書題尚抗書題原本作尚挽考通鑑蜀主遣歐陽彬聘于唐書題稱大蜀皇帝奉書大唐皇帝知原本挽字殊誤據册府元龜所引薛史作尚抗今改正影庫本粘籤情動而先誇險固加以宋光葆輒陳狂計別啓姦謀將欲北顧秦川東窺荊渚人而無禮罪莫大焉昨客省使李嚴奉使銅梁近歸金闕凡於奏對備述端由其宋光嗣相見之時於坐上便有言説先問契丹強弱次數秦王是非度此苞藏可見情狀加以疏遠忠直朋比姦雄內則縱恣輕華競貪寵位競貪原本作竟食今據册府元龜改正影庫本粘籤外則滋彰法令𢀿耗生靈既德力以不量在神祇之共憤今命興聖宮使魏王繼岌充西川四面行營都統命侍中樞密使郭崇韜充西川東北面行營都招討制置等使荊南節度使高季興充西川東南面行營都招討使鳳翔節度使李曮充供軍轉運應接等使同州節度使李令德充行營招討副使陝府節度使李紹琛充行營蕃漢馬步軍都排陳斬斫使西京留守張筠充西川管內安撫應接使華州節度使毛璋充行營左廂馬步都虞候邠州節度使董璋充行營右廂馬步都虞侯客省使李嚴充西川管內招撫使總領闕下諸軍兼四面諸道馬步兵事取九月十八日進發凡爾中外宜體朕懷辛丑授魏王繼岌諸道行營都統餘如故繼岌既受都統之命以梁漢顒充中軍馬步都虞候兼馬步軍都指揮使張廷蘊為中軍步軍都指揮使牛景章充中軍左廂馬軍都指揮使沈斌充中軍右廂馬軍都指揮使卓瓌充中軍左廂步軍都指揮使王贄充中軍右廂步軍都指揮使中軍右廂原本脫廂字今據册府元龜增入影庫本粘籤供奉官李從襲充中軍馬步軍都監高品李廷安呂知柔充魏王衙通謁充魏王衙通謁原本作王衛今據册府元龜改正影庫本粘籤詔工部尚書任圜翰林學士李愚參魏王軍事丁未夕遍天陰雲北方有聲如雷野雉皆鳴俗所謂天狗落戊申魏王繼岌樞密使侍中郭崇韜進發西征案原本衍辛巳幸壽安陵甲寅八字今刪去太子少師致仕薛廷圭卒案原本作少保今據列傳改正舊五代史考異贈右僕射甲寅幸壽安陵司天上言自七月三日大雨至九月十八日後方晴三辰行度不見丁巳幸尖山射鴈冬十月庚申朔宰臣及文武三品以上官赴長壽宮上大行皇太后諡曰貞簡皇太后辛酉幸甘泉遂幸壽安陵壬戌魏王繼岌率師至鳳翔先遣使馳檄以諭蜀部丁卯奉皇太后尊諡寶册赴西宮靈座宰臣豆盧革攝太尉讀册文吏部尚書李琪讀寶文百官素服班於長壽宮門外奉慰淮南楊溥遣使進慰禮己巳中書上言貞簡太后陵請以坤陵為名從之初卜山陵帝欲祔於代州武皇陵奏議天子以四海為家不當分其南北乃於壽安縣界別卜是陵案五代會要載中書門下奏議云人君以四海為家不當分其南北洛陽是帝王之宅四時朝拜禮須便近不能遠幸代州今漢朝諸陵皆近秦雍國朝陵寢布列京畿後魏文帝自代遷洛之後園陵皆在河南兼敕功臣之家不許北葬今魏氏諸陵尚在京畿祔葬代州理未為允從之丙子以前翰林學士戶部侍郎馮道依前本官充職戊寅西征之師入大散關案九國志趙廷隱傳云自入敵境即禁兵士焚廬舍剽財物蜀人德之舊五代史考異偽命鳳州節度使王承捷故鎮屯駐指揮使唐景思次第迎降得兵一萬二千軍儲四十萬又下三泉得軍儲三十餘萬自是師無匱乏軍聲大振辛巳偽興州刺史王承鑒成州刺史王承朴棄城遁去康延孝大破蜀軍於三泉時王衍將幸秦州以其軍五萬屯於利州聞我師至遣步騎三萬逆戰於三泉延孝與李嚴以徑騎三千擊之蜀軍大敗斬首五千級餘衆奔潰王衍聞敗自利州奔歸成都斷吉柏津案通鑑作桔柏考歐陽史亦作吉柏今仍其舊舊五代史考異浮梁而去丁亥文武百官上表以貞簡皇太后靈駕發引請車駕不至山陵所戊子葬貞簡太后於坤陵己丑魏王繼岌至興州偽東川節度使宋光葆以梓綿劍龍普五州來降武定軍使王承肇以洋蓬璧三州來降興元節度使王宗威以梁開通渠麟五州來降階州刺史王承嶽納符印請命秦州節度使王承休王承休原本作成休今據通鑑及十國春秋改正影庫本粘籤棄城自扶州路奔於西川案太平廣記引王氏見聞記云王承休握鋭兵於天水兵刃不舉既知東軍入蜀遂擁麾下之師及婦女孩幼萬餘口金銀鏳帛於西蕃買路歸蜀沿路為西蕃虜奪凍餓相踐而死逮至蜀存者百餘人唯與田宗汭等脫身而至魏王使人問之曰親握重兵何得不戰曰畏大王神武不敢當其鋒曰何不早降曰蓋緣王師不入封部無門納款曰初入蕃部幾許人曰萬餘口今存者幾何曰才及百數魏王曰汝可償萬人之命遂斬之舊五代史考異十一月庚寅朔帝幸壽安號慟於坤陵戊戌以振武節度使朱守殷為兗州節度使徐州鄴都上言十月二十五日夜地大震康延孝至利州修吉柏津浮梁偽昭武軍節度使林思諤來降案原本作世諤今據通鑑十國春秋改正舊五代史考異辛丑魏王過利州帝賜王衍詔諭以禍福甲辰魏王至劍州偽武信軍節度使王宗壽以遂合渝瀘忠五州來降案九國志王宗壽傳王衍時為武信軍節度使唐師入境郭崇韜遣使遺宗壽書宗壽不納聞衍降乃治裝赴闕據薛史則王衍未送款宗壽已降矣與九國志異丁未高麗國遣使貢方物康延孝李嚴至漢州王衍遣人送牛酒請降李嚴遂先入成都戊申祔貞簡皇太后神主於太廟己酉魏王至綿州王衍遣使上箋歸命庚戌皇弟鄆州節度使存霸滑州節度使存渥左金吾大將軍晉州節度使存乂邢州節度使存紀並授起復雲麾將軍右金吾大將軍同正荊南節度使高季興奏收復歸夔忠等州辛亥魏王至德陽偽六軍使王宗弼報王衍舉家遷於西宅宗弼權稱西川兵馬留後又報偽樞密使宋光嗣景潤澄宣徽使李周輅歐陽晃同有異謀宣徽使原本作宣崇今據十國春秋改正影庫本粘籤惑亂蜀主已梟斬訖案九國志王宗弼傳唐師陷鳳州衍遣三招討屯三泉以拒唐師未戰三招討俱遁走因令宗弼守綿谷而誅三招討宗弼遂與三招討同送款於魏王乃還成都斬宋光嗣等函首送於魏王遷衍及母妻於西宮通鑑作李嚴至成都宗弼猶乘城為守備與九國志異壬子王衍遣使上表請降癸丑以吳越國馬步統軍使檢校太傅錢元球為檢校太尉守侍中充靜海軍節度使乙卯魏王至西川城北丙辰蜀主王衍出降語在衍傳案王衍出降在十一月丙辰通鑑與薛史同歐陽史作己酉蓋據其上箋歸命之日而先書之其實己酉唐師尚在綿州未入成都也五代春秋作十二月蜀王衍降尤誤丁巳大軍入成都法令嚴峻市不易肆自興師凡七十五日蜀平得兵士三萬兵仗七百萬糧三百五十三萬錢一百九十二萬貫金銀共二十二萬兩珠玉犀象二萬紋錦綾羅五十萬得節度州十郡六十四縣二百四十九己丑禮儀使奏貞簡皇太后升祔禮畢一應宗廟伎樂及諸祀並請仍舊從之十二月壬戌以前雲州節度使李存敬為同州節度使以同州節度使檢校太保同平章事李令德為遂州節度使以邠州節度使檢校太保董璋為劍南東川節度副大使知節度事以華州節度使毛璋為邠州節度使以左金吾大將軍史敬鎔為華州節度使丁卯以武寧軍節度副使李紹文為兗州觀察留後庚午宴諸王武臣於長春殿始用樂始用樂原本作紹用今據文改正影庫本粘籤丙子以北京副留守太原尹孟知祥為檢校太傅同平章事成都尹劍南西川節度副大使知節度事西山八國雲南都招撫等使以戶部尚書王正言為檢校吏部尚書守興唐尹充鄴都副留守以鄴都副留守興唐尹張憲檢校吏部尚書太原尹充北京副留守知留守事己卯以臘辰狩於白沙皇后皇子宮人畢從庚辰次伊闕辛巳次潭泊壬午次龕澗案原本潭泊訛覃泊龕澗訛寵澗今並從通鑑改正舊五代史考異癸未還宮是時大雪苦寒吏士有凍踣於路者伊汝之民飢乏尤甚衛兵所至責其供餉既不能給因壞其什器撤其廬舍而焚之甚於剽劫縣吏畏恐竄避於山谷間甲申出御札示中書門下以今歲水災異常所在人戶流徙以避徵賦關市之征抽納繁碎宜令宰臣商量條奏丙戌第三姑宋氏封義寧大長公主長姊孟氏封瓊華長公主案通鑑以瓊華為克讓女則莊宗之從姊也隆平集東都事略孟昶傳並云父知祥尚唐莊宗妹俱與薛史異舊五代史考異第十一妹張氏封瑤英長公主閏十二月甲午賜中書門下詔曰朕聞古先哲王臨御天下上則以無偏無黨為至治次則以足食足兵為遠謀緬惟前修誠可師範朕纂承鳳曆嗣守鴻圖三載於茲萬機是總非不知五兵未弭兆庶多艱蓋賴卿等寅亮居懷康濟為務冀盡賦輿之理洞詢盍徹之規今則潛按方區備聆謠俗或力役罕均其勞逸或賦租莫辨於後先但以督促為名煩苛不已被甲胄者何嘗充給趨朝省者轉困支持州閭之貨殖全疏天地之災祥屢應以至星辰越度越度原本作越展今據文改正影庫本粘籤旱潦不時農桑失業於丘園道殣相望於郊野生靈及此寢食寧遑豈非朕德政未孚焦勞自拙者耶朕昨親援毫翰軫念瘡痍一則詢爾謀猷一則表豫宵旰未披來奏轉撓於懷敢不翼翼罪躬乾乾軫慮咨爾四嶽弼豫一人何不舉賢才裨寡昧百辟之內羣后之間莫不有盡忠者被掩其能抱器者艱陳其力或草澤有遺逸之士山林多屈滯之人爾所不知吾將安訪卿等位尊調鼎名顯代天既逢不諱之朝何吝由衷之説當宜歷告中外急訪英髦應在仕及前資文武官已下至草澤之士有濟國治民除姦革弊者並宜各獻封章朕當選擇施行其近宣御札亦告諭內外體朕意焉是時兩河大水戶口流亡者十四五都下供饋不充軍士乏食乃有鬻子去妻老弱採拾於野殍踣於行路者州郡飛挽旋給京師租庸使孔謙日於上東門外佇望其來案原本作尚東門據通鑑注云洛城東面三門中曰建春左曰上東右曰永春今改正舊五代史考異算而給之加以所在泥潦輦運艱難愁歎之聲盈於道路四方地震天象乖越帝深憂之問所司濟贍之術孔謙比以吏進故無保邦濟民之要務唯以急刻賦斂為事樞密承旨段徊奏曰臣見本朝時或遇歲時災歉國費不足天子將求經濟之要則內出朱書御札以訪宰臣請陛下依此故事行之即命學士草詞帝親札以訪宰臣非帝憂民之實也時宰相豆盧革等依阿徇旨竟無所陳但云陛下威德冠天下今西蜀平定珍寶甚多可以給軍水旱作沴天之常道不足以貽聖憂中官李紹宏奏曰俟魏王旋軍之後俟魏王原本脫王字今據文增入舊庫本粘籤若兵額漸多饋挽難給請且幸汴州以便漕挽時羣臣獻議者亦多大較詞理迂闊不中時病唯吏部尚書李琪引古田租之法從權救弊之道上疏言之帝優詔以奬之丁酉詔偽蜀私署官員等惟名與器不可假人況是遐僻偏方僭竊偽署因時亂而濫稱名位歸國體而悉合削除但恐當本朝屯否之時有歷代簪纓之士既陷彼土遂授偽官又慮有曾受本朝渥恩當時已居班秩須為升降不可通同應偽署官至太師太傅及三少并太尉司徒司空侍中中書令左右僕射已上並宜降至六尚書臨時更約偽署高低為六行次第階至開府特進金紫者宜令文班降至朝散大夫武班降至銀青爵偽署將相已上與開國男餘並不得更稱封爵其有功臣者削去案此句疑有脫誤據五代會要作其有功臣名號並宜削去如是偽署節鎮伐罪之初率先向化及立功效者宜委繼岌崇韜臨時奬任其刺史但許稱使君不得更有檢校官其偽署班行正四品已上酌此降黜五品已下如不曾經本朝授官若材智有聞即許於府縣中量材任使如無材智可録如無材智可録原本脫無字今據五代會要增入影庫本粘籤止是蜀地土人並宜放歸田里如是西班有稱統軍上將軍者案原本作兩班今據五代會要改正舊五代史考異若是本朝功臣子孫及將相之嗣並據人材高下與諸衛小將軍府率中郎將次第授任如是小將軍已下據人材堪任使者宜委西川節度使衙前補押衙不堪任使者亦宜放歸田里應已前降官除軍前量事迹任使外餘並稱前銜候朝廷續據才行任使庚子彰武保大等節度使高萬興卒甲辰淮南楊溥遣使朝貢乙巳以晉州節度使李存乂為鄜州節度使以相州刺史李存確為晉州節度使丙午兩省諫官上疏請車駕不巡幸汴州凡三上章乃允庚戌魏王繼岌奏遣秦州副史徐藹齎書招諭南詔蠻又奏點到兩川馬九千五百三十匹案清異録莊宗滅梁平蜀志頗自逸命蜀匠織十幅無縫錦為被材被成賜名六合被舊五代史考異辛亥制皇第二弟存霸可封永王第三弟存美可封雍王第四弟存渥可封申王第五弟存乂可封睦王第六弟存確可封通王第七弟存紀可封雅王案原本作睢王考通鑑及歐陽史皆作雅王薛史宗室傳亦作雅王今改正舊五代史考異是歲日傍有背氣凡十三永樂大典卷七千一百五十七
