body:
  text: 舊五代史卷七十六晉書二高祖紀第二天福元年十一月己亥帝御北京崇元殿降制改長興七年為天福元年大赦天下十一月九日昧爽已前應在京及諸州諸色罪犯及曾授僞命職掌官吏並見禁囚徒已結正未結正已發覺未發覺罪無輕重常赦不原者咸赦除之應明宗朝所行敕命法制仰所在遵行不得改易其在京鹽貨元是官場出糴自今後並不禁斷一任人戶取便糴易仍下太原府更不得開場糴貨其麴其麴原本作其麵今從文獻通考改正影庫本粘籤每斤與減價錢三十文以節度判官趙瑩為翰林學士承旨守尚書戶部侍郎知河東軍府事以節度掌書記桑維翰為翰林學士守尚書禮部侍郎知樞密院事以觀察判官薛融為吏部郎中兼侍御史知雜事太原縣令羅周嶽為左諫議大夫節度推官竇貞固為翰林學士軍城都巡檢使劉知遠為侍衛馬軍都指揮使客將景延廣為步軍都指揮使太原少尹李為尚書工部侍郎李原本作李今從通鑑改正影庫本粘籤閏十一月甲子晉安寨副招討使楊光遠等殺上將張敬達以諸軍來降丙寅制以翰林學士承旨知河東軍府戶部侍郎知制誥趙瑩為門下侍郎同中書門下平章事監修國史以翰林學士權知樞密事禮部侍郎知制誥桑維翰為中書侍郎同中書門下平章事集賢殿大學士依前知樞密院事並賜推忠興運致理功臣甲戌車駕至昭義案歐陽史及通鑑並從薛史作甲戌至潞州遼史作辛未與薛史異舊五代史考異受趙德鈞延壽降是日戎王舉酒言於帝曰豫遠來赴義大事已成皇帝須赴京都今令太相溫勒兵相送至河梁要過河者任意多少豫亦且在此州俟京洛平定便當北轅執手相泣久不能別脫白貂裘以衣帝贈細馬二十匹細馬通鑑作良馬疑原本有誤考契丹國志亦作細馬今仍其舊影庫本粘籤戰馬一千二百匹仍誡曰子子孫孫各無相忘己卯至河陽北案薛史唐紀作庚辰晉帝至河陽遼史又作辛巳並與此紀異通鑑作己卯與此紀同舊五代史考異節度使萇從簡來降舟楫已具庚辰望見洛陽煙火相次有將校飛狀請進辛巳唐末帝聚其族與親將宋審虔等登玄武樓縱火自焚而死至晚車駕入洛唐兵解甲待罪皆慰而舍之帝止潛龍舊第百官稍稍見焉詔御史府促朝官入見詔文武兩班臣僚應事僞庭者並釋罪是日百辟謝恩於宮門之外甲申車駕入內御文明殿受朝賀用唐禮樂制大赦天下應中外諸色職掌官吏內曾有受僞命者一切不問僞庭賊臣張延朗劉延皓劉延朗等原本脫劉延朗三字今從冊府元龜增入影庫本粘籤並姦邪害物貪猥弄權罪既滿盈理難容貸除此三人已行敕命指揮外其有宰臣馬裔孫樞密使房皓宣徽使李專美河府節度使韓昭裔等四人並令釋放少帝宜令中書門下追尊定諡擇日禮葬妃孔氏宜行追冊祔葬應天下節度使刺史下賓席郡職及將校等委中書門下各與改轉官資其北京管內鹽鐺戶合納逐年鹽利昨者僞命指揮每斗須令人戶折納白米一斗五升極知百姓艱苦自今後宜令人戶以元納食鹽石斗數目每斗依時價計定錢數取人戶便穩折納斛斗其洛京管內逐年所配人戶食鹽起來年每斤特與減價錢十文應諸道商稅仰逐處將省司合收稅條例榜於本院前榜內該設名目者即得收稅十二月乙酉朔幸河陽餞送太相溫蕃部兵士歸國詔降末帝為庶人丁亥制以司空馮道守本官兼門下侍郎平章事弘文館大學士以步軍都指揮使符彥饒為滑州節度使以河陽節度使萇從簡為許州節度使以澤州刺史劉凝為華州節度使以皇子重乂為河南尹庚寅以滑州節度判官石光贊為宗正卿辛卯以舊相姚顗為刑部尚書姚顗原本作姚覬今從歐陽史改正影庫本粘籤時自秋不雨經冬無雪命羣官遍加祈禱癸巳以邠州節度使張希崇為靈武節度使鄧州節度使皇甫遇為定州節度使詔國朝文物制度起居入閣宜依唐明宗朝事例施行鎮州衙內都虞候祕瓊作亂逐副使李彥琦殺都指揮使胡章同州小校門鐸殺節度使楊漢賓燒劫州城丙申帝為明宗皇后曹氏薨舉哀於長春殿輟朝三日詔封故東丹王李贊華為燕王遣前單州刺史李肅部署歸葬本國以右拾遺吳涓為左補闕充樞密院學士己亥以汴州節度使李周充西京留守以前河中節度使李從璋為鄧州節度使慈州奏草寇攻城三日而退庚子帝為皇弟故彰聖指揮使敬殷沂州指揮使敬德檢校太子賓客敬友舉哀於長春殿以舊相盧文紀為吏部尚書以皇城使周環為大將軍充三司使以左贊善大夫馬重績為司天監青州奏節度使房知溫卒詔鄆州王建立以所部牙兵往青州安撫中書門下奏請以來年二月二十八日帝慶誕日為天和節從之天福二年春正月甲寅朔帝御文明殿受朝賀仗衛如式乙卯日有蝕之案五代春秋作正月乙卯朔日食據通鑑考異引十國紀年蜀人亦以乙卯為朔蓋晉人避正朝日食故改甲寅朔耳是夜有赤白氣相間如耕墾竹林之狀自亥至丑生北濁過中天明滅不定遍二十八宿徹曙方散丁巳故皇弟敬德敬殷並贈太傅皇子重裔重進重英並贈太保右神武統軍康思立卒輟視朝贈太子少師是日詔曰唐莊宗陵名與國諱同宜改為伊陵應京畿及諸州縣舊有唐朝諸帝陵並真源等縣並不為次赤却以畿甸緊望為定其逐處縣令不得以陵臺結銜考滿日依出選門官例指揮隔任後準格例施行其宋州亳州節度使刺史落太清宮使副名額太清原本作大靖今從五代會要改正影庫本粘籤庚申以前吏部郎中兼侍御史知雜事王松為左諫議大夫水部郎中王易簡本官知制誥定州奏契丹改幽州為南京案歐陽史作燕京通鑑遼史契丹國志並作南京舊五代史考異中書奏請立宗廟從之以翰林學士工部侍郎和凝為禮部侍郎依前充職詔內外文武臣僚並與加恩皇基初造示普恩也太子少保致仕華溫琪卒贈太子太保是日詔應朝臣中有藉才特除外任者秩滿無遺闕將來擬官之時在外一任同在朝一任升進其就便自求外職及不是特達選任者不在此限安州上言節度使盧文進殺行軍副使率部下親兵過淮案盧文進棄鎮奔吳通鑑作元年十二月五代春秋歐陽史作二年正月與薛史同舊五代史考異以前天平軍節度使檢校太尉兼侍中王建立為平盧軍節度使以守司空門下侍郎平章事弘文館大學士馮道兼諸道鹽鐵轉運等使天雄軍節度使兼中書令范延光改封秦國公加食邑實封鳳翔節度使兼中書令西平王李從曮加食邑實封乙丑以端明殿學士禮部侍郎呂琦為檢校工部尚書祕書監丙寅改中興殿為天福殿門名從之湖南節度使楚王馬希範加食邑實封改賜功臣名號前昭義節度使檢校太傅同平章事高行周起復右金吾衛大將軍依前昭義軍節度使泰寧軍節度使李從溫荊南節度使南平王高從誨歸德軍節度使趙在禮並加食邑實封改功臣名號以端明殿學士戶部侍郎李嵩為兵部侍郎判戶部以左諫議大夫王松判度支魏府范延光奏當管夏津鎮捕賊兵士誤殺却新齊州防禦使祕瓊初延光將萌異志使人潛結於瓊諾之及是以瓊背其謀密使精騎殺之由是延光反狀明矣以工部侍郎李玘檢校右僕射為汾州刺史以前彰國軍節度使尹暉為左千牛衛上將軍是日詔曰西天中印土摩竭陀舍衛國大菩提寺三藏阿闍梨沙門室利縛羅宜賜號弘梵大師庚午涇州節度使李德珫徐州節度使安彥威秦州節度使康福延州節度使劉景巖襄州節度使安從進夏州節度使李彝殷並加食邑實封壬申正衙備禮冊贈故皇弟皇子等丙子故契丹人皇王歸葬人皇王原本作天皇王考契丹國志東丹王稱人皇王今改正影庫本粘籤輟視朝一日改汴州雍丘縣為杞縣避廟諱也戊寅以兵部侍郎判戶部李嵩為中書侍郎同中書門下平章事充樞密使以權知樞密使事中書侍郎同中書門下平章事集賢殿學士桑維翰為樞密使是日詔曰應天開國恭己臨人宜覃繼絶之恩以廣延洪之道宜於唐朝宗屬中取一人封公世襲案五代會要載原敕云其唐朝宗屬中舊在朝及諸道為官者各據資歷考限滿日從品秩序遷已有出身任令參選舊五代史考異兼隋之酅公為二王後以後周介公備三恪主其祭祀及赴大朝會以前鎮國軍節度使皇甫立為神武統軍以前宗正卿李郁為太子賓客庚辰以吏部侍郎龍敏判戶部二月丙戌以尚食使安友規充葬明宗皇后監護使以河陽節度使安審暉為鄜州節度使癸巳詔停北京西北面計度司事吳越國王錢元瓘加食邑實封改賜功臣名號己亥詔應諸道行軍副使等得替後且就私家取便安止限一年後方得赴闕當便與比擬壬寅詔應諸道馬步都虞候自今後朝廷更不差補委自藩方於本州衙前大將中慎選久歷事任曉會刑獄者充以三年為限仍不得於元隨職員內差補以左散騎常侍孔昭序為太子賓客尚書左僕射劉昫右僕射盧質並加食邑實封甲辰以滄州留後馬全節為橫海軍節度使以太子賓客韓惲為貝州刺史左羽林統軍羅周敬為右金吾衛上將軍丙午以皇子左驍衛上將軍重信為檢校太保河陽三城節度使以權知河陽軍州事周瓌為安州節度使詔中外臣僚或因差使出入並不得薦屬人於藩鎮希求事任如有犯者並準唐長興二年敕條處分戊申中書舍人陳改左散騎常侍應在朝文武百僚及見任刺史先代未封贈者與加封贈母妻未封者並與封辛亥天和節天和原本作天河今從五代會要改正影庫本粘籤帝御長春殿召左右街僧録威儀殿內談經循舊式也三月甲寅制北京留守太原尹皇子重貴封食邑三百戶刑部侍郎張鵬改兵部侍郎己未御史臺奏唐朝定令式南衙常參文武百僚每日朝退於廊下賜食謂之常食自唐末亂離常食漸廢仍於入閣起居日賜食每入閣禮畢閣門宣放仗羣官俱拜謂之謝食至僞主清泰年中入閣禮畢更差中使至正衙門口宣賜食百官立班重謝此則交失唐朝賜食之意於禮實為太煩臣恐因循漸失根本起今後入閣賜食望不差中使口宣準唐明宗朝事例處分從之案五代會要載其年四月御史臺奏文武百官每月朔望入閣禮畢賜廊下食在京時祇於朝堂幕次兩廊下今在行朝于正衙門外權為幕次房廊隘狹伏恐五月一日朝會禮畢准例賜食于幕次難為排比伏見唐明宗時兩省官于文明殿前廊下賜食今未審入閣日權于正衙門內兩廊下排比賜食為復別有處分敕宜依唐明宗時舊規廊下賜食舊五代史考異中書奏準敕故庶人三月七日以王禮葬其妻男等並以禮葬請輟其日朝參一日從之以宣徽南院使楊彥詢為左監門衛上將軍依前充宣徽使兗州李從溫奏節度副使王謙搆軍士作亂尋已處置丙寅詔王者省方設教靡憚於勤勞養士撫民必從其宜便顧惟涼德肇啓丕圖常務去於煩苛冀漸臻於富庶念京城俶擾之後屬舟船焚爇之餘饋運頓虧支費殊闕將別謀於飛挽慮轉困於生靈以此疚心未嘗安席今以夷門重地梁苑雄藩梁苑原本作梁莊今從冊府元龜改正影庫本粘籤水陸交通舟車必集爰資經度須議按巡寧免暫勞所期克濟取今月二十六日巡幸汴州云案通鑑范延光聚卒繕兵悉召巡內刺史集魏州將作亂會帝謀徙都大梁桑維翰曰大梁北控燕趙南通江淮水陸都會資用富饒今延光反形已露大梁距魏不過十驛彼若有變大軍尋至所謂疾雷不及掩耳也丙寅下詔託以洛陽漕運有闕東巡汴州舊五代史考異以前貝州刺史史圭為刑部侍郎充諸道鹽鐵轉運副使前澤州刺史閻至為戶部侍郎詔車駕經過州府管界所有名山大川帝王陵廟名臣祠墓去路十里者宜令本州排比祗候駕經過日以酒脯祭告左僕射劉昫等議立宗廟以立高祖已下四親廟其始祖一廟伏候聖裁御史中丞張昭遠議請依隋唐之制立四廟推四世之中名位高者為太祖詔下百官定議百官請依唐制追尊四廟為定從之甲戌以右龍武統軍楊思權為左衛上將軍乙亥前鄜州節度使張萬進加檢校太傅前宋州節度使李從敏加檢校太尉以吏部郎中兼侍御史知雜事薛融為左諫議大夫以兵部郎中段希堯為右諫議大夫戊寅以戶部尚書王權為兵部尚書工部尚書崔居儉為戶部尚書兵部尚書李鏻為太子少保李鏻原本作李鄰今從歐陽史改正影庫本粘籤兵部尚書致仕裴為工部尚書東上閣門使李守貞為右龍武將軍充職庚辰車駕離京四月癸未朔至鄭州防禦使白景友進牲餼器皿帝曰不出民力否景友曰臣畏陛下法皆辦於己俸命收之甲申駕入汴州丁亥制應天福二年四月五日昧爽已前諸道州府見禁囚徒大辟已下罪無輕重並釋放天福元年已前諸道州府應係殘缺租稅並特除免諸道係徵諸色人缺負省司錢物宜令自僞清泰元年終已前所缺者據所通納到物業外並與除放昨者行至鄭州滎陽縣界路旁見有蟲食及旱損桑麥處桑麥原本作乘麥今據五代會要改正影庫本粘籤委所司差人檢覆量與蠲免租稅河陽管內酒戶百姓應缺天福元年閏十一月二十五日已前不敷年額麴錢並放其諸處應經兵火者亦與指揮當罪即誅式明常典既往可憫宜示深仁僞清泰中臣僚內有從誅戮者並許收葬天下百姓有年八十已上者與免一子差徭仍逐處簡署上佐官梁故滑州節度使王彥章效命當時致身所事稟千年之生氣流百代之令名宜令超贈太師子孫量才録應諸道州府管界有自僞命抽點鄉兵之時多是結集劫盜因此畏懼刑章藏隱山谷宜令逐處曉諭招攜各令復業自今年四月五日已前為非者一切不問如兩月不歸業者復罪如初丁酉宣武軍節度使侍衛親軍使楊光遠加兼侍中己亥陝州節度使侍衛都虞候劉知遠加檢校太保庚子北京鄴都徐兗二州並奏旱詔今後立妃及拜免三公宰相及命將封親王公主宜令並降制命餘從令式處分夏五月壬子朔帝御崇元殿受朝賀仗衛如式詔洛京魏府管內所徵今年夏苗稅麥等宜放五分之一以微旱故也丙辰御史中丞張昭遠奏汴州在梁室朱氏稱制之年有京都之號及唐莊宗平定河南復廢為宣武軍至明宗行幸之時掌事者因緣修葺衙城遂挂梁室時宮殿門牌額當時識者或竊非之一昨車駕省方暫居梁苑臣觀衙城內齊閣牌額一如明宗行幸之時無都號而有殿名恐非典據臣竊尋秦漢已來寰海之內鑾輿所至多立宮名近代隋室於揚州立江都宮太原立汾陽宮岐州立仁壽宮岐州原本作岐周今據五代會要改正影庫本粘籤唐朝於太原立晉陽宮同州立長春宮岐州立九成宮宮中殿閣皆題署牌額以類皇居請準故事於汴州衙城門權挂一宮門牌額則其餘齊閣並可取便為名敕行闕宜以大寧宮為名湖南青草廟舊封安流侯進封廣利公洞庭廟進封靈濟公案洞庭廟不載舊封疑有脫文考五代會要十國春秋並與薛史同舊五代史考異磊石廟舊封昭靈侯進封威顯公案五代會要作廣利威顯公舊五代史考異黃陵二妃廟舊封懿節廟改封昭烈廟從馬希範之請也戊午以前成德軍節度判官張彭為太府卿壬戌詔在朝文武臣僚每人各進封事一件仍須實封通進務裨闕政用副虛懷甲子以虞部郎中知制誥于嶠為中書舍人以戶部郎中于遘為虞部郎中知制誥故太子少保致仕朱漢賓贈司空乙丑六宅使王繼弘送義州衙前收管前洺州團練使高信送復州收管二人於崇禮門內喧爭為臺司所劾故也戊辰翰林學士戶部員外郎知制誥竇貞固改工部郎中知制誥翰林學士都官郎中知制誥李慎儀改中書舍人仍賜金紫並依舊充職庚午制封皇第二十一女為長安公主封皇第十一妹烏氏為壽安長公主皇第十二妹史氏為永壽長公主皇第十三妹杜氏為樂平長公主壬申天雄軍節度使守太傅兼中書令興唐尹范延光進封臨清王加食邑三千戶鳳翔節度使檢校太師兼中書令西平王李從曮進封岐王丙子平盧軍節度使兼中書令王建立進封臨淄王昭信軍節度使侍衛馬軍都指揮使景延廣改寧江軍節度使典軍如故太常卿梁文矩梁文矩原本作文舉今從歐陽史改正影庫本粘籤奏定四廟諡號廟號陵號太常少卿裴垣奏定四廟皇后追尊諡號從之戊寅以中書舍人權知貢舉王延為御史中丞以翰林學士戶部侍郎知制誥崔梲為兵部侍郎充承旨以翰林學士承旨兵部侍郎程遜為檢校禮部尚書太常卿以檢校吏部尚書太常卿梁文矩為吏部尚書以御史中丞張昭遠為戶部侍郎以吏部尚書盧文紀為太子少傅己卯詔大社內先收掌唐朝罪人首級等宜令骨肉或先舊僚屬收葬其喪葬儀注不得過制案改葬梁末帝因婁繼英之請也事未及行而繼英誅死至九月甲寅始命安崇阮改葬詳見通鑑六月壬午朔制宗正卿石光贊奏滎陽道左有萬石君石奮之廟德行懿美宜示封崇用光遠祖之徽猷益茂我朝之盛典贈奮太傅癸未契丹使夷離畢來聘致馬二百匹及人參貂鼠皮走馬木碗等物乙酉翰林學士司封員外郎知制誥王仁裕改都官郎中右贊善大夫盧損改右散騎常侍前有朝貶故也以祕書少監致仕劉頎為鴻臚卿致仕前光祿少卿尹玉羽以少府監致仕丙戌宰臣李嵩上表讓樞密使於趙瑩以瑩佐命之元臣也詔不允以前義成軍節度使李彥舜為左武衛大將軍以左散騎常侍唐汭為檢校禮部尚書國子祭酒以前左龍武統軍李承約為左驍衛上將軍戊子宰臣趙瑩自契丹使回案薛史不載趙瑩出使之月日五代春秋作三月趙瑩使契丹歐陽史作四月舊五代史考異癸巳東都奏瀍澗河溢壞金沙灘內舍屋幽州趙思溫奏瀛莫兩州元係當道其刺史常行周白彥球乞發遣至臣本府詔遣行周等赴闕甲午六宅使張言自魏府回奏范延光叛命滑州符彥饒飛奏有兵士自北來傳范延光到黎陽乞發兵屯禦宣遣客省使客省使原本作安省今從五代會要改正影庫本粘籤李守貞往延光所問罪尋命護聖都指揮使白奉進領騎士一千五百赴白馬渡巡檢乙未魏府范延光男間廄使守圖送御史臺攝荊南節度行軍司馬檢校太保歸州刺史王保義王保義原本作倞義今從十國春秋改正影庫本粘籤加檢校太傅知武泰軍節度觀察留後充荊南行軍司馬兼沿淮巡檢使襄州奏江水漲一丈二尺丁酉遣內班史進能押信箭一對往滑州賜符彥饒以前磁州刺史劉審交為魏府計度使以東都巡檢使張從賓充魏府西南面都部署遣侍衛使楊光遠領步騎一萬赴滑州以東都副留守張延播充洛京都巡檢使白奉進奏捉得賊卒張柔稱范延光差澶州刺史馮暉充一行都部署元從都押衙孫鋭充一行兵馬都監帝覽奏謂侍臣曰朕雖寡德寡謀自謂不居延光之下而馮暉孫鋭過於兒戲朝夕就擒安能抗拒大軍為我之患乎天平軍節度使安審琦起復舊任翰林學士禮部侍郎和凝改端明殿學士乙巳范延光差牙將王知新齎表到闕不令朝見收付武德司丁未詔侍衛使楊光遠充魏府四面都部署以張從賓充副兼諸軍都虞候昭義節度使高行周充魏府西面都部署是日張從賓亦叛與范延光叶謀害皇子河陽節度使重信皇子東都留守重己酉以奉國都指揮使侯益護聖都指揮使杜重威領步騎五千往屯汜水關備從賓之亂也案通鑑七月張從賓攻汜水關殺巡檢使宋廷浩帝戎服嚴整輕騎將奔晉陽以避之桑維翰叩頭苦諫曰賊鋒雖盛勢不能久請少待之不可輕動帝乃止舊五代史考異七月辛亥兩浙錢元瓘奏弟吳越土客馬步諸軍都指揮使靜海軍節度使元球非時入府欲謀為亂腰下搜得匕首已誅戮訖詔削元球在身官爵甲寅奉國都指揮使馬萬奏滑州節度使符彥饒作亂屠害侍衛馬軍都指揮使白奉進尋以所部兵擒到彥饒差立功都虞候方太押送赴闕尋賜死於路是日削奪范延光在身官爵以馬萬為滑州節度使以昭義節度使高行周為河南尹東都留守充西面行營諸軍都部署以護聖左右廂都指揮使杜重威為昭義軍節度使兼侍衛馬軍都指揮使案原本脫馬軍都三字今從通鑑增入充西面行營副部署以奉國都指揮使侯益為河陽節度使案宋史侯益傳晉祖召益謂曰宗社危若綴旒卿能為朕死耶益曰願假鋭卒五千人破賊必矣以益為西面行營副都部署據薛史高行周為都部署杜重威為副部署不言侯益為副都部署與宋史異舊五代史考異以右神武統軍王周充魏府行營步軍都指揮使以滑州節度使馬萬充魏府行營馬軍都指揮使案原本脫馬軍都三字今從通鑑增入舊五代史考異以左僕射劉昫充東都留守兼判河南府事杜重威等奏收下汜水關破賊千人張從賓及其殘黨奔投入河案宋史侯益傳益率禁兵數千人次虎牢從賓軍萬餘人夾汜水而陳益親鼓士乘之大敗其衆擊殺殆盡汜水為之不流從賓乘馬入河溺死據薛史祇言破賊千人與宋史異舊五代史考異兼收到護聖指揮使曹再晟一百人騎稱背賊投來並送赴行闕升貝州為防禦使額皇子故東都留守重乂贈太傅皇子故河陽節度使重信贈太尉敕朋助張從賓逆人張延播張繼祚等十人宜令收捕親的骨肉並處斬丁卯以唐開府儀同三司守太尉兼中書令西平王李晟五代孫楫為耀州司戶參軍示勸忠之義也壬申帝御崇元殿備禮冊四廟親授寶冊於使攝太尉守司空門下侍郎平章事馮道使副攝司徒守工部尚書裴赴洛京行禮甲戌以宰臣趙瑩判戶部以吏部侍郎判戶部龍敏為東都副留守詔洛京留司百官並赴闕安州軍亂指揮使王暉害節度使周環周環原本作周璀今從通鑑改正影庫本粘籤於理所案王暉害周環五代春秋通鑑俱不書日歐陽史作丙子薛史作甲戌諸史所載俱異舊五代史考異遣右衛上將軍李金全領千騎赴安州八月辛巳以許州節度使萇從簡為徐州節度使以陝州節度使侍衛馬步軍都虞候劉知遠為許州節度使以權北京留守徐州節度使安彥威為太原尹北京留守河東節度使宰臣監修國史趙瑩奏請循近例依唐明宗朝凡有內庭公事及言動之間委端明殿學士或樞密院學士侍立冕旒繫日編録逐季送當館其百司公事亦望逐季送當館旋要編修日曆從之丁亥以前宋州宋州原本作家州今從歐陽史改正影庫本粘籤節度使李從敏為陝州節度使戊子以尚書左丞鄭韜光為戶部尚書致仕改元德殿為廣政殿門名從之庚子華州渭河泛溢害稼宰臣馮道加開府儀同三司食邑實封左僕射劉昫加特進兼鹽鐵轉運等使故東京留守判官李遐可贈右諫議大夫其母田氏封京兆郡太君子孫量才録仍加賻贈長給遐在身祿俸終母之世先是遐監左藏庫於洛陽會張從賓叛令強取錢帛遐拒而不與因而遇害故有是命乙巳詔天下見禁囚徒除十惡五逆放火劫舍持杖殺人合造毒藥官典犯贓缺負官錢外其餘不問輕重已發覺未發覺已結正未結正並從釋放應自張從賓作亂以來有曾被張從賓及張延播脅從染樜者及符彥饒下隋身軍將等兼安州王暉徒黨除已誅戮外並從釋放一切不問張繼祚在喪紀之中承逆竪之意顯從叛亂難貸刑章乃眷先臣實有遺德遽茲乏祀深所軫懷其一房家業準法雖已籍沒所有先臣並祖父母墳莊祠堂並可交付骨肉主張應自梁朝後唐以來前後奉使及北京沿邊管界虜掠往向北人口宜令官給錢物差使齎持往彼收贖放歸本家云繼祚故齊王全義之子也齊王原本作濟王今從歐陽史改正影庫本粘籤故有是詔丙午詔天下刑獄繫囚染疾者宜差醫工治療官中量給藥價事輕者仍許家人看候合杖者俟損日決遣九月庚戌朔以前太府卿兼通事舍人陳瓚為衛尉卿兼通事舍人壬子故安遠軍節度使周環贈太傅甲寅皇子北京留守知河東軍府事太原尹重貴加檢校太保為右金吾衛上將軍以右龍武統軍安崇阮為右衛上將軍以前保太軍節度使檢校太尉張萬進為右龍衛軍統軍以右領軍衛上將軍權知安州軍州事李金全為安遠軍節度使魏府招討使楊光遠進攻城圖戊午以太子賓客孔昭序為工部尚書致仕將作少監高鴻漸上言伏覩近年已來士庶之家死喪之苦當殯葬之日被諸色音聲伎藝人等作樂攪擾求覓錢物請行止絶從之庚申靜江軍節度使檢校太尉同平章事馬希杲加階爵及功臣名號希杲原本作希皋今從十國春秋改正影庫本粘籤以前兵部侍郎楊凝式為檢校兵部尚書太子賓客故右金吾衛上將軍羅周敬贈太傅乙丑鄧州節度使李從璋卒贈太師改興唐府為廣晉府興唐縣為廣晉縣癸酉以左諫議大夫判度支王松為尚書工部侍郎甲戌貝衛兩州奏河溢害稼乙亥以將作監王岯為太子賓客十月壬午以宣徽南院使左監門衛上將軍楊彥詢為鄧州威勝軍節度使詔選人試判兩道以左司郎中張瑑為右諫議大夫以刑部侍郎鹽鐵轉運副使史圭為吏部侍郎以曹州刺史宋光業為宣徽北院使以左金吾衛大將軍高漢筠為左驍衛大將軍充內客省使以宣徽北院使左驍衛大將軍劉處讓為左監門衛上將軍充宣徽南院使丙戌遣使祀五嶽四瀆故天平軍節度使閻寶追封太原郡王故大同軍節度使李存璋贈太師故瀛州刺史李嗣頵贈太尉故相州刺史史建瑭故代州刺史王建及並贈太保故幽州節度使周德威追封燕王燕王原本作王今從薛史唐書改正影庫本粘籤十一月庚戌賜楊光遠空名官告自司空至常侍凡四十道將士立功者得補之而後奏中書上言準唐貞元二年九月五日敕文官充翰林學士及皇太子諸王侍讀武官充禁軍職事並不常朝參其在三館等諸職事者並朝參訖各歸所務自纍朝以來文武在內廷充職兼判三司或帶職額及六軍判官等例不赴常朝元無正敕準近敕文武職事官未升朝者按舊制並赴朔望朝參其翰林學士侍讀三館職事望準元敕處分其諸在內廷諸司使等每受正官之時來赴正衙謝後不赴常朝大朝會不離禁廷位次三司職官免常朝唯赴大朝會其京師未升朝官員祇赴朔望朝參帶諸司職掌者不在此例文官除翰林端明殿學士樞密院學士中書省知制誥外有兼官兼職者仍各發遣本司公事從之丙辰太子賓客王岯卒改洛京潛龍宅為廣德宮北京潛龍宅為興義宮戊午中書奏準雜令車駕巡幸所祗承者賜贈並同京官從之戊辰鎮海鎮東節度使吳越王錢元瓘元瓘原本作元權今從十國春秋改正影庫本粘籤加天下兵馬副元帥封吳越國王庚午以右拾遺李浣充翰林學士甲戌命太常卿程遜兵部員外郎韋梲充吳越國王加恩使丙子以戶部侍郎張昭遠守本官充翰林學士仍知制誥丁丑湖南馬希範貢寶裝龍鳳器用結銀花果子等物帝覽之謂侍臣曰奇巧蕩心斯何用耳但以來遠之道不欲阻其意聞者服之壬午安州李金全上言奉詔抽臣元隨左都押衙胡漢筠其人染重病候損日赴闕漢筠本滑吏也從金全歷數鎮而濫聲喧聞帝知之欲授以他職免陷功臣漢筠懼其罪遂託疾由是勸金全二於朝廷自此始也十二月以監察御史徐台符為尚書膳部員外郎知制誥以右補闕史官修撰吳承範為尚書屯田員外郎知制誥左諫議大夫薛融改中書舍人辭而不拜尚書水部郎中知制誥王易簡改中書舍人故隴西郡王李嗣昭追封韓王故橫海軍節度使安審通贈太師辛丑湖南節度使兼中書令楚王馬希範加食邑實封改賜扶天佐運同德致理功臣甲辰車駕幸相國寺祈雪永樂大典卷一萬五千六百四十三
