body:
  text: 舊五代史卷七十八晉書四高祖紀第四天福四年春正月癸卯帝御崇元殿受朝賀仗衛如式丙午召太子太師致仕范延光宴于便殿以延光歸命之後慮懷疑懼故休假之內錫以款密帝謂之曰無忿疾以傷厥神無憂思以勞厥衷朕方示信於四方豈食言於汝也延光俯伏拜謝其心遂安丁未以西京副留守龍敏為吏部侍郎戊申盜發唐閔帝陵己酉朔方軍節度使張希崇卒贈太師以澶州防禦使張從恩為樞密副使希崇原本作希宗防禦原本作防御今從通鑑改正影庫本粘籤甲寅以侍衛步軍都指揮使寧江軍節度使景延廣為義成軍節度使以義成軍節度使馮暉為朔方軍節度使乙卯左諫議大夫曹國珍上言請於內外臣僚之中選才略之士聚唐六典前後會要禮閣新儀大中統類律令格式等精詳纂集俾無漏落別為書一部目為大晉政統從之其詳議官宜差太子少師梁文矩左散騎常侍張允大理卿張澄國子祭酒唐汭大理少卿高鴻漸國子司業田敏禮部郎中呂咸休司勳員外郎劉濤刑部員外郎李知損監察御史郭延升等一十九人充文矩等咸曰改前代禮樂刑憲為大晉政統則堯典舜典當以晉典革名列狀駁之曰作者之謂聖述者之謂明苟非聖明焉能述作若運因革故則事乃維新或改正朔而變犧牲或易服色而殊徽號是以五帝殊時不相沿樂三王異世不相襲禮至於近代率由舊章比及前朝日滋條目條目原本作真目今從册府元龜改正影庫本粘籤多因行事之失改為立制之初或臣奏條章君行可否皆表其年月紀以姓名聚類分門成文作則莫不悉稽前典垂範後昆述自聖賢歷於朝代得金科玉條之號設亂言破律之防守而行之其來尚矣皇帝陛下運齊七政歷契千年爰從創業開基莫不積功纍德所宜直筆具載鴻猷若備録前代之編年目作聖朝之政統此則是名不正也夫名不正則言不順而媚時掠美非其實矣若翦截其辭此則是文不備也夫文不備則啓爭端而禮樂刑政於斯亂矣若改舊條而為新制則未審何門可以刊削何事可以編聯既當革故從新又須廢彼行此則未知國朝能守而不失乎臣等同共參詳未見其可疏奏嘉之其事遂寢辛酉以前晉昌軍節度使李周為靜難軍節度使是日封皇第十一妹安定郡主為延慶長公主皇第十二妹廣平郡主為清平長公主二月辛卯改東京玉華殿為永福殿中書上言太原潛龍莊望建為慶昌宮使相鄉望改為龍飛鄉都尉里望改為神光里從之丁酉宰臣馮道左散騎常侍韋勳禮部員外郎楊昭儉自契丹使回案馮道出使之期當從五代春秋作三年九月至四年二月始得歸也帝慰勞備至錫賚豐厚庚子以天和節宴羣官於廣政殿賜物有差三月癸卯朔三月癸卯朔原本作癸亥以前後干支考之當作癸卯今改正影庫本粘籤左僕射劉昫給事中盧重自契丹使回頒賜器幣如馮道等乙巳回鶻可汗仁美遣使貢方物中有玉狻猊實奇貨也丙午涇州節度使張萬進卒贈太師己未皇子開封尹鄭王重貴歸德軍節度使兼侍衛親軍馬步軍都指揮使劉知遠忠武軍節度使杜重威並加同中書門下平章事天平軍節度使趙在禮封衛國公庚申遣內臣趙處玭以版詔徵華山隱者前右拾遺鄭雲叟案歐陽史作左拾遺考薛史前後俱作右拾遺今仍其舊舊五代史考異玉笥山道士羅隱之靈州戍將王彥忠據懷遠城作叛帝遣供奉官齊延祚乘驛而往彥忠率衆出降延祚矯制殺之詔齊延祚辜我誓言擅行屠戮彰殺降之罪隳示信之文宜除名決重杖一頓配流王彥忠贈官收葬辛酉封回鶻可汗仁美為奉化可汗癸亥以左龍武統軍皇甫遇為鎮國軍節度使張彥澤為彰義軍節度使夏四月壬申朔以河中節度副使薛仁謙為衛尉卿丙子以汝州防禦使宋彥筠為同州節度使以護聖左右軍都指揮使李懷忠為侍衛親軍馬軍都指揮使領壽州忠正軍節度使以奉國左右廂都指揮使郭謹為侍衛親軍步軍都指揮使夔州寧江軍節度使戊寅詔廢長春宮使額案五代會要載原敕云同州長春宮使額宜停沿宮職務委州司制置舊五代史考異己卯改明德殿為滋德殿宮城南門同名故也以華州節度使劉遂凝為右龍武統軍以右龍武統軍張廷蘊為絳州刺史絳州原本作降州今從通鑑改正影庫本粘籤庚辰徵前右拾遺鄭雲叟為右諫議大夫玉笥山道士羅隱之賜號希夷先生甲申以翰林學士承旨兵部侍郎崔梲權判太常卿以端明殿學士戶部侍郎和凝為翰林學士承旨樞密院學士尚書倉部郎中司徒詡樞密院學士尚書工部郎中顏衎並落職守本官樞密副使張從恩改宣徽使初廢樞密院故也先是桑維翰免樞密之務以劉處讓代之奏議多不稱旨及處讓丁母憂遂以密院印付中書故密院廢焉丙戌以韓昭裔為兵部尚書致仕馬裔孫為太子賓客致仕房皓為右驍衛大將軍致仕皆唐末帝之舊臣也戊子升永嶽二州為團練使額改湘川縣為全州從馬希範之奏也五月壬寅朔帝御崇元殿受朝仗衛如式癸卯以左僕射劉昫兼太子太保封譙國公乙巳昭順軍節度使姚彥章卒升靈州方渠鎮為威州隸於靈武改舊威州為清邊軍戊申湖南節度使馬希範加天策上將軍以前邠州節度使安叔千為滄州節度使庚戌虞部郎中楊昭儉可本官知制誥辛亥置靜海軍於溫州靜海原本作清海今從十國春秋改正影庫本粘籤從錢元瓘之請也壬子以侍御史盧價為戶部員外郎知制誥戶部尚書崔居儉卒甲寅詔止絶朝臣不得外州府求覓表狀奏薦交親乙卯升金州為節鎮以懷德軍為使額以齊州防禦使潘環為懷德軍節度使右諫議大夫致仕鄭雲叟賜號逍遙先生仍給致仕官俸丁巳以刑部尚書姚顗為戶部尚書以兵部侍郎權判太常卿事崔梲為尚書左丞以工部侍郎任贊為兵部侍郎以禮部尚書李懌為刑部尚書以左丞盧詹為禮部尚書以左散騎常侍韋勳為工部侍郎庚申廢華清宮為靈泉觀辛酉御史臺奏省郎知雜之時赴臺禮上軍巡邸吏之輩咸集公參赤縣府司悉呈杖印今後年深御史判雜上事欲依前例從之丙寅以鎮海軍衙內統軍上直馬步軍都監檢校太傅睦州刺史陸仁章為同平章事遙領遂州武信軍節度使以鎮海軍興武左右開道都指揮使明州刺史仰仁銓為檢校太傅仰仁銓原本作任銓今從十國春秋改正影庫本粘籤同平章事領宣州寧國軍節度使從錢元瓘之請也六月辛未朔陳郡民王武穿地得黃金數餅州牧取而貢之帝曰宿藏之物既非符寶不合入官命付所獲之家庚辰西京大風雨應天福門屋瓦皆飛鴟吻俱折辛卯詔禮部貢舉宜權停一年秋七月庚子朔日有蝕之西京大水伊洛瀍澗盡溢壞天津橋癸卯以華清宮使李頃為右領軍衛上將軍甲辰以定州節度使皇甫遇為潞州節度使檢校太尉以潞州節度使侯益為徐州節度使案宋史侯益傳天福四年晉祖追念虎牢之功遷武寧軍節度同平章事薛史不載同平章事五代會要所載天福中使相有侯益與宋史同舊五代史考異戊申御史中丞薛融等上詳定編敕三百六十八道分為三十一卷是日詔先令天下州郡公私鑄錢近多鉛錫相兼缺薄小弱有違條制今後私鑄錢下禁依舊法案歐陽史七月丙辰復禁鑄錢薛史作七月戊申舊五代史考異壬戌以太子少師梁文矩為太子太保致仕閏七月庚午朔百官不入閣雨霑服故也壬申以中書侍郎平章事集賢殿大學士桑維翰為檢校司空兼侍中相州彰德軍節度使以彰德軍節度使王庭胤為義武軍節度使尚書戶部奏李自倫義居七世準敕旌表門閭義居七世據歐陽史云李自倫高祖訓訓生粲粲生則則生忠忠生自倫自倫生光厚六世同居薛史作七世未詳孰是影庫本粘籤案歐陽史作六世又旌表門閭歐陽史作正月與薛史作閏七月異舊五代史考異先有鄧州義門王仲昭六代同居案王仲昭歐陽史作登州人舊五代史考異其旌表有廳事步欄前列屏樹烏頭正門閥閲一丈二尺二柱相去一丈柱端安瓦桷墨染號為烏頭築雙闕一丈在烏頭之南三丈七尺烏頭之南原本作之內今從歐陽史改正影庫本粘籤夾街十有五步槐柳成列今舉此為例則令式不該詔王仲昭正廳烏頭門等制不載令文又無敕命既非故事難黷大倫案五代會要作既非故實恐紊彝章孔本宜從令式祇表門閭於李自倫所之前量地之宜高其外門門外綽楔綽楔原本作掉揳今從歐陽史改正影庫本粘籤門外左右各建一臺高一丈二尺廣狹方正稱臺之形圬以白泥四隅漆赤其行列樹植隨其事力其同籍課役一準令文壬午濮州刺史武從諫勒歸私第受贓十五萬故也丁酉故皇子河南尹重乂妻虢國夫人李氏落髮為尼賜名悟因仍錫紫衣法號及夏臘二十八月己亥朔河決博平甘陵大水辛丑以守司空兼門下侍郎平章事弘文館大學士馮道為守司徒兼侍中封魯國公壬寅詔曰皇圖革故庶政惟新宜設規程以諧公共其中書印祇委上位宰臣一人知當戊申前兵部尚書王權授太子少傅致仕己酉以天下兵馬副元帥鎮海鎮東等軍節度使檢校大師行中書令吳越王錢元瓘為天下兵馬元帥壬子升亳州為防禦使額依舊隸宋州丙辰司天監馬重績等進所撰新曆馬重績原本作崇績今從五代會要改正影庫本粘籤降詔褒之詔翰林學士承旨和凝制序命之曰調元曆九月辛未以右羽林統軍周密為鄜州節度使癸酉升婺州為武勝軍額丁丑宴羣臣於永福殿契丹使粘木孤來聘案遼史會同二年正月戊申晉遣金吾衛大將軍馬從斌考功郎中劉知新來貢珍幣丙辰晉遣使謝免沿邊四州錢幣七月戊申晉遣使進犀帶閏月乙酉遣使賜晉良馬八月己丑晉遣使貢歲幣奏輸戌亥二歲金幣于燕京舊五代史考異致牛馬等物己卯遙領洮州保順軍節度使鮑君福加檢校太師兼侍中判湖州諸軍事辛巳相州節度使桑維翰上言管內所獲賊人從來籍沒財産請止之詔今後凡有賊人準格律定罪不得沒納家資天下諸州準此癸未封唐許王李從益為郇國公案五代會要九月敕周受龍圖立夏殷之祀唐膺鳳曆開酅介之封乃眷前朝載稽舊典宜封土宇俾奉宗祧宜以郇國三千戶封唐許王李從益為郇國公云舊五代史考異奉唐之祀服色旌旗一依舊制仍以西京至德宮為廟牲幣器服悉從官給丙戌高麗王王建遣使貢方物己丑以中書侍郎平章事李嵩權判集賢殿事庚寅詔停寒食七夕重陽及十月暖帳內外郡官貢獻丙申以威勝軍節度副使羅周嶽為給事中中書舍人李詳改禮部侍郎禮部侍郎呂琦改刑部侍郎刑部侍郎王松改戶部侍郎戶部侍郎閻至改兵部侍郎中書舍人王易簡充史館修撰判館事冬十月戊戌朔故昭信軍節度使白奉進贈太尉丙午以太常卿程遜沒于海廢朝一日贈右僕射庚戌閩王王昶威武軍節度使王繼恭遣僚佐林思鄭元弼等朝貢致書於宰執致書原本作致聿今據文改正影庫本粘籤無人臣之禮帝怒詔令不受所貢應諸州綱運並令林思鄭元弼等押歸本道既而兵部員外郎李知損上疏請禁錮使人籍沒綱運可之收林思等下獄丙辰溪州刺史彭士愁以錦奬之兵與蠻部萬人掠辰澧二境湖南節度使馬希範遣牙兵拒之而退金州山賊度從讜等寇洵陽遣兵討平之十一月甲戌以太子賓客李延範為司農卿乙亥詔立唐高祖太宗及莊宗明宗閔帝五廟於洛陽案立唐廟於西京歐陽史作十二月與薛史作十一月異舊五代史考異丁丑祠部郎中知制誥吳承範改中書舍人充翰林學士翰林學士中書舍人竇貞固改御史中丞御史中丞薛融改尚書左丞尚書右丞王延改吏部侍郎尚書左丞崔梲改太常卿戊寅史館奏請令宰臣一人撰録時政記案五代會要史館奏唐長壽二年右丞姚璹奏帝王謨訓不可闕文其仗下所言軍國政事令宰臣一人撰録號時政記唐明宗朝又委端明殿學士撰録逐季送付史館伏乞遵行者宜令宰臣一人撰述舊五代史考異逐時以備撰述從之己卯吏部侍郎龍敏改尚書左丞己丑以太子賓客楊凝式為禮部尚書致仕詔建錢爐於欒川丙申諫議大夫致仕逍遙先生鄭雲叟卒十二月丁酉朔百官不入閣大雪故也己亥故皇子重英妻張氏落髮為尼賜名悟慎並夏臘二十庚戌禮官奏來歲正旦王公上壽皇帝舉酒奏玄同之樂再飲奏文同之樂三飲奏同前從之歌辭不録丙辰詔今後城郭村坊不得創造僧尼院舍丁巳帝謂宰臣曰大雪害民五旬未止京城祠廟悉令祈禱了無其驗豈非涼德不儲神休未洽者乎因令出薪炭米粟給軍士貧民等壬戌禮官奏正旦上壽宮懸歌舞未全且請雜用九部雅樂歌教坊法曲從之永樂大典卷一萬五千六百四十四
