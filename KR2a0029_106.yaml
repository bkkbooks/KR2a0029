body:
  text: 舊五代史卷一百六漢書八列傳第三王周魏州人少勇健從軍事唐莊宗明宗稍遷裨校以戰功纍歷郡守晉天褔初天褔原本誤作天祉今據文改正影庫本粘籤范延光叛於魏州周從楊光遠攻降之安重榮以鎮州叛從杜重威討平之以功授貝州節度使歲餘移鎮涇州先是前帥張彥澤在任苛虐部民逃者五千餘戶及下車革前弊二十餘事逃民歸復賜詔褒美後歷鄧陝二鎮陽城之役周時為定州節度使大軍往來供饋無闕未幾遷鎮州節度使周稟性寬惠人庶便之開運末杜重威降於契丹引契丹主臨城諭之周泣曰受國重恩不能死戰而以兵降何面南行見人主與士大夫乎乃痛飲欲引決家人止之事不獲已及見契丹主授鄧州節度使檢校太師高祖定天下移鎮徐州加同平章事乾祐元年二月以疾卒於鎮輟視朝二日贈中書令周性寬恕不忤物情初刺信都州城西橋敗覆民租車周曰橋梁不飭刺史之過也乃還其所沈粟出私財以修之民庶悅焉永樂大典卷一萬八千一百三十二劉審交字求益幽州文安人也祖海父師遂審交少讀書尤精吏道起家署北平主簿轉興唐令本府召補牙職劉守光之僭號偽署兵部尚書燕亡歸於太原莊宗知之用為諸府從事同光初趙德鈞鎮幽州朝廷以內官馬紹宏為北面轉運使辟審交為判官王都據定州叛朝廷命王晏球進討以審交為轉運供軍使王都平以勞授遼州刺史遼州原本作達州今據册府元龜改正影庫本粘籤明年復為北面供軍轉運使改磁州刺史以母年高去官就養及丁內艱毀瘠過禮服闋不出纍年案歐陽史作不調纍年舊五代史考異晉高祖踐阼范延光以魏州叛命楊光遠以總兵討之復召審交為供饋使鄴中平命審交為三司使授右衛大將軍六年夏出為陳州防禦使歲餘移襄州防禦使審交治襄漢撫綏有術民庶懷之青州楊光遠平降平盧軍為防禦州復用審交為防禦使纍官至檢校太傅時用軍之後審交矜恤撫理凋弊復蘇契丹破晉審交以代歸蕭翰在都復用為三司使翰歸蕃李從益在汴州召高行周武行德將委以軍事皆不受命尋聞高祖起義於太原史弘肇在澤潞都人大懼時有燕軍千人守捉諸門案杜重威傳作千五百人舊五代史考異李從益母王淑妃詢於文武臣僚曰豫子母在洛孤危自處一旦為蕭翰所逼致令及此但遣人迎請太原勿以豫子母為事或曰收拾諸處守營兵士與燕軍足以把城把城原本作將城今從通鑑改正影庫本粘籤以俟河北救應可也妃曰非謀也我子母亡國之餘安敢與人爭天下衆議籍籍猶以把城為詞審交曰余燕人也今城有燕軍固合為燕謀然事機有所不可此城經敵軍破除之後民力空匱餘衆幸存若更謀之不臧閉門拒守一月之內無復遺類諸軍勿言宜從太妃處分繇是從益遣使往太原貢奉高祖至汴罷使歸班隱帝嗣位用為汝州防禦使汝為近輔號為難治審交盡去煩弊無擾於民百姓歌之乾祐二年春卒年七十四郡人聚哭柩前所列狀乞留葬本州界立碑起祠以時致祭本州以聞詔曰朝廷之制皆有舊章牧守之官比無贈典其或政能殊異惠及蒸黎生有令名沒留遺愛褒賢奬善豈限彝章可特贈太尉吏民所請宜依故相國太師秦國公馮道聞之曰豫嘗為劉汝州僚佐知其為人廉平慈善無害之良吏也刺遼磁治陳襄青皆稱平允不顯殊尤其理汝也又安有異哉民之租賦不能減也徭役不能息也寒者不能衣也餒者不能食也百姓自汲汲然而使君何有於我哉然身死之日致黎民懷感如此者誠以不行鞭朴不行刻剝不因公而循私不害物以利己確然行良吏之事薄罰宥過謹身節用節用原本脫用字今從册府元龜增入影庫本粘籤安俸祿守禮分而已凡從事於斯者孰不能乎但前之守土者不能如是是以汝民咨嗟愛慕今天下戎馬之後四方凶盜之餘杼軸空而賦斂繁人民稀而倉廩匱謂之康泰未易輕言侯伯牧宰若能哀矜之不至聚斂不殺無辜之民民為邦本政為民本和平寬易即劉君之政安足稱耶復何患不至於令名哉道仍為著哀詞六章鐫於墓碑之陰焉永樂大典卷九千九十九武漢球澤州人也少拳勇潞帥李嗣昭倚為親信事唐莊宗明宗繼為禁軍裨校清泰中會晉高祖引契丹為援與朝廷隔絶遂歸晉祖天褔初授趙州刺史趙州原本訛作趙祖今據文改正影庫本粘籤入為奉國軍都指揮使出刺曹州開運初遷耀州團練使高祖至東京授洺州刺史漢球以目疾年高辭郡帝曰廣平小郡卿臥理有餘無以疾辭至郡未期復以目疾請代而免乾祐二年秋卒於京師漢球雖出自行伍然長於撫理常以掊斂為戒民懷其惠身死之日家無餘財有管迥者漢球守郡日辟為判官及漢球卒於汴迥在洺州未之知一日忽謂所親曰太保遣人召我遂沐浴新衣冠無疾瞑目而終家人不知其故後數日方聞漢球卒永樂大典卷一萬八千一百三十二張瓘同州車渡村人故太原監軍使承業之猶子也承業唐書有傳唐天祐中承業佐唐武皇莊宗有功甚見委遇瓘聞之與昆仲五人自故里奔于太原莊宗皆任用之瓘天祐十三年補麟州刺史承業治家嚴毅小過無所容恕一姪為磁州副使以其殺河西賣羊客承業立捕斬之常誡瓘等曰汝車渡村百姓劉開道下賊劉開道下賊疑有脫字據薛史劉知俊傳云當時稱知俊為劉開道蓋承業謂瓘少時嘗從劉知俊作賊也今姑仍原文影庫本粘籤慣作非為今須改行若故態不除死無日矣故瓘所至不敢誅求晉天褔中為密州刺史秩滿入居環衛乾祐三年夏卒於官輟視朝一日永樂大典卷六千三百五十李殷薊州人也自後唐莊宗明宗晉高祖朝以偏校遞遷歷官至檢校司徒纍為郡守性沈厚所草泣無苛暴之名晉少帝禦契丹於澶淵殷典禁旅駕還授鄜州留後俄加檢校太保開運中授定州節度使將行啓少帝曰臣之此行破敵必矣衆皆壯其言及至郡威略無聞敵再至首納降款後隨契丹至常山其將解里遣殷與契丹首領楊安同拒我師於洺水俄而安退殷以橐裝馬遺安安既北走殷匿於丘墓獲免馳以歸我高祖嘉其首赴朝闕及魏州平以甘陵乏帥乃命殷為貝州節度使加檢校太傅乾祐初卒於鎮詔贈太師永樂大典卷一萬三百九十劉在明幽州人少有膽氣本州節度使劉守光用為親信出為平塞軍使守光敗歸於太原唐莊宗收為列校明宗時為捧聖左廂都指揮使領和州刺史從幸汴州至滎陽聞朱守殷叛用為前鋒至汴城率先登城賊平授汴州馬步軍都指揮使應順初為貝州刺史明年移趙州兼北面行營馬軍都指揮使以軍戍易州清泰末幽州節度使趙德鈞引軍赴團柏谷路由易州取在明軍從及德鈞兵敗在明奔歸懷州唐末帝令與萇從簡同守河陽晉祖至乃迎之京都事定出為單州刺史天福中李金全以安州叛安州原本作要州今據通鑑改正影庫本粘籤在明從李守貞攻之大破淮賊以功授安州防禦使明年移絳州楊光遠據青州叛召為行營馬步軍都指揮使領齊州防禦使青州平遷相州留後歷邢州晉州留後案通鑑云契丹入汴建雄留後劉在明朝于契丹以節度副使駱知朗知州事舊五代史考異高祖踐阼授幽州道行營都部署案通鑑在明先為成德軍留後繼授幽州道馬步都部署與薛史前後互異舊五代史考異時契丹守中山在明出師經略契丹乃棄城而去遂授鎮州留後乾祐元年五月正授鎮州節度使六月以疾卒于鎮贈侍中永樂大典卷九千九十九馬萬澶州人也少從軍善水遊唐莊宗與梁軍對壘於河上莊宗於德勝渡夾河立南北寨會梁軍急攻南寨立南北寨原本脫會梁軍急攻南寨七字今據册府元龜增入影庫本粘籤於中流聯戰艦以絶援路晝夜攻城者三日寨將氏延賞告急於莊宗莊宗隔河望敵無如之何乃召人能水遊破賊者時萬兄弟皆應募遂潛行入南寨往來者三又助燒船艦汴軍遂退由此升為水軍小校漸典禁軍遙領刺史纍遷奉國左廂都指揮使泗州防禦使晉天福二年夏范延光叛於鄴牙將孫鋭率兵至黎陽朝廷遣侍衛馬軍都指揮使白奉進領兵渡滑州萬亦預其行時滑州節度使符彥饒潛通鄴下殺白奉進於牙署案薛史晉列傳符彥饒以忿爭殺白奉進非潛通鄴下也此傳蓋沿實録傳聞之誤通鑑從晉列傳舊五代史考異萬領本軍兵士將助亂會奉國右廂都指揮使盧順密亦以兵至諭以逆順萬不得已與順密急趨公府執彥饒生送闕下朝廷即以萬為滑州節度使而盧順密酬之甚淺居無何晉高祖稍知其事即以順密為涇州兵馬留後漸薄於萬萬鎮鄧州未幾罷鎮授上將軍以目疾致仕乾祐三年四月卒輟視朝一日永樂大典卷一萬八千一百三十二李彥從字士元汾州孝義人父德麟州司馬彥從少習武藝出行伍間高祖典禁軍以鄉里之舊任為親信國初用為左飛龍使檢校司空鎮州逐敵之際請兵于朝廷高祖令彥從率軍赴之乾祐初領恩州刺史趙暉討王景崇于岐下彥從為兵馬都監破川軍有功賊平授濮州刺史治有政能百姓悅之乾祐三年冬卒於郡永樂大典卷一萬三百九十郭謹字守節太原晉陽人謹少從軍能騎射歷河中教練使晉天福中遷奉國右廂都指揮使領禺州刺史三年轉奉國左廂都指揮泗州防禦使歲餘授侍衛步軍都指揮使兼寧江軍節度使六年從幸鄴七年晉祖崩少帝即位授彰德軍節度使領軍如故開運初出授鄜州二年入為左神武統軍三年復鎮鄜州高祖踐阼以鄉國舊臣加檢校太尉移鎮滑臺乾祐初復授彰德軍節度使二年就加檢校太師三年入朝加食邑是歲冬十月卒於位年六十輟視朝二日贈侍中永樂大典卷二萬二千一百六十一皇甫立代北人也唐明宗之刺代州署為牙校從歷藩鎮性純謹明宗深委信之王建立安重誨策名委質皆在立後明宗踐阼以立為欣州刺史長興末轉洺州團練使應順初遷鄜州節度使檢校太保清泰三年春移鎮潞州未幾改華州晉天福中授左神武統軍少帝即位歷左金吾衛上將軍纍官至檢校太尉高祖定天下授特進太子太師致仕乾祐二年秋卒永樂大典卷一萬九百七十一白再榮本蕃部人也案歐陽史作不知其世家何人也舊五代史考異少從軍纍遷護聖左廂指揮使晉末契丹犯闕明年契丹主北去再榮從帳至真定其年閏七月晦李筠何福進相率殺契丹帥麻答據甲仗庫敵勢未退筠等使人召再榮再榮端坐本營遲疑久之為軍吏所迫乃行翊日逐出麻答諸軍以再榮名次在諸校之右乃請權知留後事案東都事略李筠傳筠請馮道領節度道曰豫主奏事而已留後事當議功臣為之以諸將之甲者為留後舊五代史考異再榮貪昧無決舉止多疑出入騎從露刃注矢諸校不相統攝互有猜二奉國廂主王饒懼為再榮所並乃據東門樓以兵自衛偽稱足疾不敢見再榮司天監趙延乂俱與之善乃來往解釋遂無相忌之意再榮以李嵩和凝攜家在彼令軍士數百人環迫嵩凝以求賞給嵩凝各出家財與之再榮欲害嵩以利其財前磁州刺史李穀謂再榮曰公與諸將為契丹所虜凌辱萬端旦夕憂死今日衆力逐出蕃戎鎮民死者不下三千人豈獨公等之功才得生路便擬殺一宰相他日到闕儻有所問何以為辭再榮默然再榮又欲括率在城居民家財以給軍士李穀又譬解之乃止其漢人曾事麻答者盡拘之以取其財高祖以再榮為鎮州留後為政貪虐難狀鎮人呼為白麻答未幾移授滑州節度使箕斂誅求民不聊生乃徵還京師周太祖入京城軍士攻再榮之第迫脅再榮盡取財貨既軍士前啓曰某等軍健常趨事麾下一旦無禮至此今後何顏謁見即奮刃擊之挈其首而去後家人以帛贖葬之永樂大典卷一萬八千一百三十三張鵬鎮州鼓城人幼為僧知書有口辨喜大言後歸俗唐末帝為潞王時鵬往依焉及即位用為供奉官纍監軍旅晉開運中契丹迫澶州澶州原本作泹州今從通鑑改正影庫本粘籤鵬為前鋒監押奮身擊敵被創而還其後纍於邊城戍守士伍服其勇乾祐初授鎮州副使過鄴城高行周接之甚歡鵬因言及晉朝傾亡之事少帝任用失人藩輔之臣唯務積財富家不以國家為意以至宗社泯滅非獨帝王之咎也行周性寬和不以鵬言為過鵬既退行周左右謂行周曰張副使之言蓋譏令公也行周因發怒遂奏鵬怨國訛言故朝廷降詔就誅於常山時乾祐元年七月也永樂大典卷六千三百五十一史臣曰晉漢之際有以懋軍功勤王事取旌旄符竹者多矣其間有及民之惠者無幾焉如王周之閫政審交之民譽蓋其優者也漢球張瓘抑又次焉是宜紀之篇以示來者其餘皆不足觀也已張鵬以一言之失遽滅其身亦足誡後代多言橫議之徒歟永樂大典卷六千三百五十一
