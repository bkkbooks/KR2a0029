body:
  text: 舊五代史卷四十唐書十六明宗紀第六天成四年春正月壬申朔帝御崇元殿受朝賀仗衞如儀幽州節度使趙德鈞奏臣孫贊年五歲默念論語孝經案宋史作贊七歲誦書二十七卷舊五代史考異舉童子於汴州取解就試幽州原本作邠州論語原本作何論今從冊府元龜改正影庫本粘籤詔曰都尉之子太尉之孫能念儒書備彰家訓不勞就試特與成名宜賜別勅及第附今年春牓案宋史云特賜童子及第附長興三年禮部春牓薛史作天成四年春牓與宋史異舊五代史考異戊子放元年應欠秋稅以左衞上將軍安崇阮為黔南節度使壬辰迴鶻入朝使掣撥等五人各授懷化司戈放還以北京副留守馮贇為宣徽使判三司戊戌禁天下虛稱試攝銜西川孟知祥奏支屬刺史乞臣本道自署二月乙巳王晏球奏此月三日收復定州案歐陽史作二月癸卯王晏球克定州與薛史合通鑑作癸丑考癸丑非二月三日也疑傳寫之訛舊五代史考異獲王都首級生擒契丹禿餒等二千餘人百僚稱賀詔取今月二十四日車駕還東京辛亥以北面行營招討使宋州節度使王晏球為鄆州節度使加兼侍中以北面行營副招討使滄州節度使李從敏為定州節度使以北面行營兵馬都監鄭州防禦使張虔釗為滄州節度使幽州節度使趙德鈞加兼侍中乙卯以樞密使趙敬怡權知汴州軍州事趙敬怡原本作敬貽今從歐陽史改正影庫本粘籤丙辰邢州奏定州送到偽太子李繼陶已處置訖辛酉帝御咸安樓受定州俘馘百官就列宣露布於樓前禮畢以王都首級獻於太社王都男四人弟一人禿餒父子二人並磔於市案五代會要尚書兵部宣露布于樓前宣訖尚書刑部侍郎張文寶奏曰逆賊王都首級請付所司大理卿蕭希甫受之以出獻于郊社其王都男幷蕃將等磔于開封橋舊五代史考異時露布之文類制勅之體蓋執筆者悞頗為識者所嗤樞密使趙敬怡卒贈太傅以端明殿學士趙鳳權知汴州軍州事甲子車駕發汴州丙寅至鄭州賜左僕射致仕鄭王玉錢二十萬丁卯宰相崔協卒詔贈尚書右僕射東都留守太子少傅李琪等奏至偃師縣奉迎時琪奏章中有敗契丹之凶黨破真定之逆城之言詔曰契丹即為凶黨真定不是逆城李琪罰一月俸庚午車駕至自汴州三月甲戌馮道進表乞命相丙戌詔皇城使李從璨貶授房州司戶參軍仍令盡命從璨帝之諸子也先是帝巡幸汴州留從璨以警大內從璨因遊會節園會節原本作曾筠考通鑑注云會節園在洛陽城中張全義鎮洛歲久私第在會節坊室宇園池為一時巨麗輸之官以為會節園今改正影庫本粘籤酒酣戲登御榻安重誨奏之故置於法焉壬辰中書奏今後羣臣內有乞假覲省者請量賜茶藥從之乙未以前鄆州節度使符習為汴州節度使丙申詔鄴都幽鎮滄邢易定等州管內百姓除正稅外放免諸色差配以討王都之役有輓運之勞也夏四月庚子朔禁鐵鑞錢案通鑑作鐵錫錢胡三省注云馬殷得湖南鑄錫為錢本用之境內其後遂流入中國疑原本鑞字誤考冊府元龜亦作鐵鑞錢今仍其舊舊五代史考異壬寅重修廣壽殿成有司請以丹漆金碧飾之帝曰此殿經焚不可不修但務宏壯不勞華侈湖南奏敗荊南賊軍於石首鎮詔沿邊置場買馬不許蕃部直至闕下先是党項諸蕃凡將到馬無駑良並云上進國家雖約其價以給之及計其館穀錫賚所費不可勝紀計司以為耗𢀿中華遂止之壬子以皇子北京留守河東節度使從榮為河南尹判六軍諸衞事以皇子河南尹判六軍諸衞事從厚為北京留守以河陽節度使趙延壽為宋州節度使以侍衞親軍都指揮使鎮南軍節度使康義誠為河陽節度使契丹寇雲州癸丑契丹遣捺括梅里等來朝貢稱取禿餒等骸骨並斬於北市甲寅以端明殿學士趙鳳為門下侍郎兼工部尚書平章事案歐陽史本紀作端明殿學士尚書兵部侍郎趙鳳為門下侍郎兼工部尚書同平章事趙鳳傳作禮部侍郎與本紀異見吳縝纂誤舊五代史考異丙辰諫議大夫致仕襲文宣公孔邈卒庚申以王建立孔循帶中書直省吏歸藩並追迴壬戌幽州節度使趙德鈞兼北面行營招討使鎮州節度使范延光加檢校太傅戊辰中書奏五月一日應在京九品已上官及諸道進奉使請準貞元七年勅就位起居永為恆式從之五月己巳朔帝御文明殿受朝丙子以夔州節度使西方鄴卒輟朝丁丑大理卿李保殷卒己卯以忠武軍節度使索自通為京兆尹充西京留守以左威衞上將軍朱漢賓為潞州節度使乙酉以黔州節度使安崇阮為夔州節度使以左驍衞上將軍張溫為洋州節度使以黔州留後楊漢賓為本州節度使中書奏太常寺定少帝諡昭宣光烈孝皇帝廟號景宗伏以少帝今不入廟難以言宗只云昭宣光烈孝皇帝從之案舊唐書哀帝紀云中書奏少帝行事不合稱宗今考五代會要天成三年博士呂朋龜議引君不逾年不入宗廟之禮請別立廟於園陵故不稱景宗非議其行事有失也舊唐書誤丁亥以鳳州武興軍留後陳臯為武興軍節度使以新州威塞軍留後翟璋為威塞軍節度使壬辰以權知尚書右丞崔居儉為尚書右丞詔葺天下廨宇丙申襄州奏荊南高從誨乞歸順雲州奏契丹犯塞六月辛丑以左散騎常侍姚顗為兵部侍郎壬寅夔州節度使楊漢章移鎮雲州以北京馬步軍都指揮使兼欽州刺史張敬達為鳳州節度使癸卯以前西京副留守事張遵誨行衞尉事充客省使國子博士田敏請葺四郊祠祭齋室丙午以沂州刺史張萬進為安北都護充振武軍節度使戊申以宿州團練使康思立為利州節度使登州刺史孫元停任坐在任無名科率故也詔鄴都仍舊為魏府鄴都仍舊為魏府考通鑑注云莊宗同光元年即位于魏州以魏州為興唐府建東京既遷洛同光三年復唐之舊以洛陽為東都改魏州之東京為鄴都至是復以為魏州今附識于此影庫本粘籤應魏府汴州益州宮殿悉去鴟尾賜節度使為衙署辛亥以權知朔方軍留後定難軍都知兵馬使韓澄為朔方留後癸丑以前潞州節度使符彥超為左驍衞上將軍詔諸道節度使行軍司馬名位雖高或帥臣不在其州事宜委節度副使權知又詔藩郡所請賓幕及主事親從者悉以名聞丙辰案通鑑作庚申舊五代史考異權知荊南軍府事高從誨上章首罪乞修職貢仍進銀三千兩贖罪案通鑑庚申高從誨自稱前荊南行軍司馬歸州刺史上表求內附薛史作丙辰與通鑑異孔本壬戌幸至德宮詔京城空地課人蓋造如無力者許人請射營構秋七月庚午以前西京留守判官張鎛為司農卿壬申貶前左金吾上將軍毛璋為儒州長流百姓尋賜自盡以其在藩鎮陰蓄奸謀故也甲戌御史中丞呂夢奇責授太子右贊善大夫坐曾借毛璋馬故也己卯以工部侍郎任贊為左散騎常侍以樞密直學士左諫議大夫充匭使閻至為工部侍郎充職遂州進嘉禾一莖九穗壬午以給事中判大理卿事許光義為御史中丞史館上言所編修莊宗一朝事迹欲名為實錄太祖獻祖懿祖名為紀年錄紀年錄原本作繫年錄考通鑑注玉海文獻通考並作紀年錄今改正影庫本粘籤從之案五代會要天成三年十二月史館奏據左補闕張昭遠狀嘗讀國書伏見懿祖昭烈皇帝自元和之初獻祖文皇帝于太和之際立功王室陳力國朝太祖武皇帝自咸通後來勤王戮力翦平多難頻立大功三換節旄再安京國莊宗皇帝終平大憝奄有中原倘闕編修遂成湮墜伏請與當館修撰參序條綱撰太祖莊宗實錄者伏見前代史館歸于著作國初分撰五代史方委大臣監修自大曆後來始奏兩員修撰當時選任皆取良能一代之書便成于手其後源流失緒波蕩不還冒當修撰之名曷揚褒貶之職及乎編修六典即云別訪通才况當館職在編修合行撰述敕宜依四年七月監修國史趙鳳奏奉勅修懿祖獻祖太祖莊宗四帝實錄自今年六月一日起手旋具進呈伏以凡關纂述務合品題承乾御宇之君行事方云實錄追尊冊號之帝約文祗可紀年所修前件史書今欲自莊宗一朝名為實錄其太祖以上並目為紀年錄從之考當時史館能審名實如此薛史列武皇于本紀識者譏之歐陽史始改莊宗紀舊五代史考異甲申以前荊南行軍司馬檢校太傅高從誨起復授檢校太傅兼侍中充荊南節度使丙戌涇州節度使李從昶移鎮華州以冀州刺史李金全為涇州節度使戊子中書奉今後新及第舉人有曾授正官及御署者欲約前任資序與除一官從之壬辰詔取來年二月二十一日有事於南郊八月丁酉朔大理正路阮奏切見春秋釋奠於文宣王而武成王廟久曠時祭請復常祀常祀原本作嘗祈今據五代會要改正影庫本粘籤從之戊戌中書奏太子少傅李琪所撰進霍彥威神道碑文不分真偽是混功名望令改撰從之琪梁之故相私懷感遇彥威在梁歷任不欲言偽梁故也辛丑詔亂離已來天下諸軍所掠生口有主識認即勒還之以前清河縣令襲酅國公食邑三千戶楊仁矩為祕書丞御史臺奏主簿朱穎是前中丞奏請合隨廳罷任詔曰主簿既為正秩况入選門顯自朝恩合終考限宜令仍舊守官甲辰以宰臣馮道為南郊大禮使兵部尚書盧質為禮儀使御史中丞許光義為儀仗使兵部侍郎姚顗為鹵簿使河南尹從榮為橋道頓遞使客省使衞尉卿張遵誨為修裝法物使乙巳黑水朝貢使骨至來朝授歸德司戈放還蕃丁未以翰林學士承旨禮部侍郎知制誥李愚為兵部侍郎職如故以中書舍人盧詹為禮部侍郎以兵部侍郎裴為太子賓客吐渾首領念公山來朝貢戊申帝服兗冕御文明殿追冊昭宣光烈孝皇帝庚戌以宰臣監修國史趙鳳兼判集賢院事以左散騎常侍任贊判大理卿事己未高麗王王建遣使貢方物辛酉詔準往例節度使帶平章事侍中中書令並列銜於勅牒側書使字今錢鏐是元帥尚父與使相名殊馬殷守太師尚書令是南省官資不合署勅尾今後勅牒內並落下乙卯党項首領朝貢甲子幸金真觀改賜建法大師賜紫尼智願為圓惠大師即武皇夫人陳氏也丙寅達靼來朝貢京城內有南州北州乃張全義光啟中所築案洛陽縉紳舊聞記引薛史此文而辨之云言光啟中築乃再葺而已非始築也其城壕今尚有遺跡焉舊五代史考異至是詔許人依街巷請射城濠任使平填蓋造屋宇九月丁卯中書奏據宗正寺申懿祖永興陵獻祖長寧陵太祖建極陵並在代州鴈門縣長寧原本作去寧建極原本作述極今據五代會要改正影庫本粘籤皇帝追尊四廟在應州金城縣詔應州升為望州金城鴈門並升為望縣辛酉太常博士段顒奏切見大祠則差宰相行事中祠則卿監行事小祠則委太祝奉禮並不差官今後請差五品官行事從之癸巳制天下兵馬元帥尚父吳越國王錢鏐可落元帥尚父吳越國王授太師致仕責無禮也先是上將軍烏昭遇使於兩浙以朝廷事私於吳人仍目鏐為殿下自稱臣謁鏐行拜蹈之禮及迴使副劉玫案通鑑作韓玫舊五代史考異具述其事故停削鏐官爵令致仕烏昭遇下御史臺尋賜自盡後有自浙中使還者言昭遇無臣鏐之事為玫所誣人頗以為寃乙未詔諸道通勘兩浙綱運進奉使並下巡獄冬十月丙申朔倂吏部三銓為一銓宜令本司官員同商量注擬連署申奏仍不得於私第注官戊戌以襄州兵馬都監守磁州刺史康福為朔方河西等節度使朔方原本作翔方今據通鑑改正影庫本粘籤靈威雄警凉等州觀察使時朔方將吏請帥於朝廷故命福往鎮之庚子以右金吾上將軍史敬鎔為左金吾上將軍以左驍衞上將軍符彥超為右金吾上將軍以前黔州節度使李承約為右驍衞上將軍以雲州節度使張敬詢為左驍衞上將軍以前華州節度使王景戡為右驍衞上將軍癸卯太常少卿蕭愿責授太子洗馬奪緋愿南郊行事與祠官同飲詰旦猶醉不能行禮為御史所劾也詔新授朔方節度使康福將兵萬人赴鎮己酉制復故荊南節度使高季興官爵辛亥升閬州為保寧軍壬子以內客省使左衞大將軍李仁矩為閬州節度使幸七星亭丙辰夏州進白鷹重誨奏曰夏州違詔進貢臣已止約帝曰善朝退帝密令左右進焉是日幸龍門十一月丁卯洛州水暴漲壞居人垣舍戊辰以刑部侍郎張文寶為右散騎常侍己巳以尚書右丞李光序為刑部侍郎癸酉升曹州濟陰縣為次赤以昭宣光烈孝皇帝溫陵所在故也甲戌奉國軍節度使王延稟加兼侍中從福建節度使王延鈞請也車駕出近郊試夏州所進白鷹戒左右勿令重誨知己卯日南至帝御文明殿受朝賀癸未祕書少監于嶠配振武長流百姓永不齒任為宰臣趙鳳誣奏也史官張昭遠等以新修獻祖懿祖太祖紀年錄共二十卷懿祖原本脫懿字今從五代會要改正影庫本粘籤莊宗實錄三十卷上之賜器帛有差案五代會要監修趙鳳修撰張昭遠呂咸休各賜繒綵銀器等舊五代史考異十二月丁酉靈武康福奏破野利大蟲兩族三百餘帳於方渠獲牛羊三萬戊戌詔應授官及封贈官誥舉人冬集等所費用物一切官破壬戌中書奏今後宰臣致齋內不押班不知印不赴內殿起居或遇國忌行事官已受誓戒宜不赴行香幷不奏刑殺公事大祠致齋內請不開宴每遇大忌前一日請不坐朝從之永樂大典卷七千一百六十五
