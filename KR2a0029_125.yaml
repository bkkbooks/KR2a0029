body:
  text: 如行周之比者幾何人哉如如行周之如行周如行如如行周之比者幾何人哉如行如行如如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峯摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文召龔黃為比也永樂大典卷一萬三千四十四
