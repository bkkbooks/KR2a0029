body:
  text: 改壽州節度使及王師渡改壽改壽州節度改壽州改壽州節改壽州節改壽州節度使改壽州改壽州改壽州改改壽州節度使及王師渡淮而仁贍固守甚堅洎世宗駐蹕於其壘北數道齊攻填塹陷壁晝夜不息如是者纍月世宗臨城以諭之而仁贍但遜詞以謝及車駕還京命李重進總兵守之復乘間陷我南寨自是圍之愈急城中饑死者甚衆三年冬淮寇復來救援列寨於紫金山來道相屬纍然數十里垂及壽壁而重進兵幾不能支世宗患之遂復議親征車駕至壽春命今上率師破紫金山之衆擒其應援使陳承昭以獻仁贍聞援兵既敗計無所出但扼腕浩歎而已會世宗以紫金山之捷飛詔以諭之時仁贍臥疾已亟因翻然納款案歐陽史云仁贍固守三月病甚已不知人其副使孫羽詐為仁贍書以城降是仁贍未嘗親納款于周也薛史作翻然納款蓋仍周實録原文未及釐正舊五代史考異而城內諸軍萬計皆屏改壽州節度使及王師渡淮而仁贍固守甚堅洎世宗駐蹕於其壘北數道齊攻填塹陷壁晝夜不息如是者纍月世宗臨城以諭之而仁贍但遜詞以謝及車駕還京命李重進總兵守之復乘間陷我南寨自是圍之愈急城中饑死者甚衆三年冬淮寇復來救援列寨於紫金山來道相屬纍然數十里垂及壽壁而重進兵幾不能支世宗患之遂復議親征車駕至壽春命今上率師破紫金山之衆擒其應援使陳承昭以獻仁贍聞援兵既敗計無所出但扼腕浩歎而已會世宗以紫金山之捷飛詔以諭之時仁贍臥疾已亟因翻然納款案歐陽史云仁贍固守三月病甚已不知人其副使孫羽詐為仁贍書以城降是仁贍未嘗親納款于周也薛史作翻然納款蓋仍周實録原文未及釐正舊五代史考異而城內諸軍萬計皆屏息以聽其命及見於行在世宗撫之甚厚賜與加等復令入城養病尋授天平軍節度使兼中書令制出之日薨於其家年五十八世宗聞之遣使弔祭命內臣監護喪事追封彭城郡王後以其子崇讚為懷州刺史仁贍輕財重士法令嚴肅重圍之中其子崇諫犯軍禁即令斬之故能以一城之衆連年拒守逮其來降而其下未敢竊議者保其後嗣抑有由焉崇讚仕周纍為郡守幼子崇諒後自江南歸於本朝亦位至省郎改壽州節度使及王師渡淮而仁贍固守甚堅洎世宗駐蹕於其壘北數道齊攻填塹陷壁晝夜不息如是者纍月世宗臨城以諭之而仁贍但遜詞以謝及車駕還京命李重進總兵守之復乘間陷我南寨自是圍之愈急城中饑死者甚衆三年冬淮寇復來救援列寨於紫金山來道相屬纍然數十里垂及壽壁而重進兵幾不能支世宗患之遂復議親征車駕至壽春命今上率師破紫金山之衆擒其應援使陳承昭以獻仁贍聞援兵既敗計無所出但扼腕浩歎而已會世宗以紫金山之捷飛詔以諭之時仁贍臥疾已亟因翻然納款案歐陽史云仁贍固守三月病甚已不知人其副使孫羽詐為仁贍書以城降是仁贍未嘗親納款于周也薛史作翻然納款蓋仍周實録原文未及釐正舊五代史考異而城內諸軍萬計皆屏息以聽其命及見於行在世宗撫之甚厚賜與加等復令入城養病尋授天平軍節度使兼中書令制出之日薨於其家年五十八世宗聞之遣使弔祭命內臣監護喪事追封彭城郡王後以其子崇讚為懷州刺史仁贍輕財重士法令嚴肅重圍之中其子崇諫犯軍禁即令斬之故能以一城之衆連年拒守逮其來降而其下未敢竊議者保其後嗣抑有由焉崇讚仕周纍為郡守幼子崇諒後自江南歸於本朝亦改壽州節度使及王師渡淮而仁贍固守甚堅洎世宗駐蹕於其壘北數道齊攻填塹陷壁晝夜不息如是者纍月世宗臨城以諭之而仁贍但遜詞以謝及車駕還京命李重進總兵守之復乘間陷我南寨自是圍之愈急城中饑死者甚衆三年冬淮寇復來救援列寨於紫金山來道相屬纍然數十里垂及壽壁而重進兵幾不能支世宗患之遂復議親征車駕至壽春命今上率師破紫金山之衆擒其應援使陳承昭以獻仁贍聞援兵既敗計無所出但扼腕浩歎而已會世宗以紫金山之捷飛詔以諭之時仁贍臥疾已亟因翻然納款案歐陽史云仁贍固守三月病甚已不知人其副使孫羽詐為仁贍書以城降是仁贍未嘗親納款于周也薛史作翻然納款蓋仍周實録原文未及釐正舊五代史考異而城內諸軍萬計皆屏息以聽其命及見於行在世宗撫之甚厚賜與加等復令入城養病尋授天平軍節度使兼中書令制出之日薨於其家年五十八世宗聞之遣使弔祭命內臣監護喪事追封彭城郡王後以其子崇讚為懷州刺史仁贍輕財重士法令嚴肅重圍之中其子崇諫犯軍禁即令斬之故能以一城之衆連年拒守逮其來降而其下未敢竊議者保其後嗣抑有由焉崇讚仕周纍為郡守幼子崇諒後自江南歸於本朝亦位至省郎永樂大典卷九千九改壽州節度使及王師渡淮而仁贍固守甚堅洎世宗駐蹕於其壘北數道齊攻填塹陷壁晝夜不息如是者纍月世宗臨城以諭之而仁贍但遜詞以謝及車駕還京命李重進總兵守之復乘間陷我南寨自是圍之愈急城中饑死者甚衆三年冬淮寇復來救援列寨於紫金山來道相屬纍然數十里垂及壽壁而重進兵幾不能支世宗患之遂復議親征車駕至壽春命今上率師破紫金山之衆擒其應援使陳承昭以獻仁贍聞援兵既敗計無所出但扼腕浩歎而已會世宗以紫金山之捷飛詔以諭之時仁贍臥疾已亟因翻然納款案歐陽史云仁贍固守三月病甚已不知人其副使孫羽詐為仁贍書以城降是仁贍未嘗親納款于周也薛史作翻然納款蓋仍周實録原文未及釐正舊五代史考異而城內諸軍萬計皆屏息以聽其命及見於行在世宗撫之甚厚賜與加等復令入城養病尋授天平軍節度使兼中書令制出之日薨於其家年五十八