body:
  text: 舊五代史卷九十四晉書二十列傳第九萇從簡陳州人也世以屠羊為業力敵數人善用槊初事後唐莊宗為小校每遇攻城召人為梯頭梯頭原本作楊頭今從歐陽史改正影庫本粘籤從簡多應募焉莊宗為其勇擢領帳前親衛兼步軍都指揮使一日莊宗領大軍與梁軍對陳登高丘而坐敵人有執大幟揚其武者莊宗指之謂左右曰猛士也從簡曰臣為大王取之莊宗慮其不捷不許從簡退乃潛領十數騎挺身而入奪幟以歸萬衆鼓譟莊宗壯之錫賚甚厚又嘗中箭而鏃入於骨使醫工出之以刃鑿骨恐其痛也良久未能搖動從簡嗔目謂曰何不沈鑿洎出之左右無不惻然從簡顏色自若其勇壯皆此類也從簡所為多不法莊宗以其戰鬬多捷常屈法赦之賜姓名曰紹瓊後加謁誠匡國功臣纍官至金紫光祿大夫檢校太保景州刺史歷洺州團練使及梁平典蔡州同光四年授許州節度使會莊宗晏駕未及赴鎮而止明宗登極例復本姓歷麟汝汾金四州刺史案北夢瑣言云明宗尤惡貪貨面戒汝州刺史萇從簡為其貪暴舊五代史考異應順初舉軍伐鳳翔從簡亦預其行會軍變乃東還道遇張廷蘊為廷蘊所執送於末帝末帝數之曰人皆歸我爾何背我而去也從簡曰事主不敢二心今日死生唯命末帝釋之清泰二年授潁州團練使高祖舉義末帝將議親征詔赴闕充副招討使隨駕至孟津除河陽節度使及趙延壽軍敗斷浮橋歸洛留從簡守河陽高祖自北而至從簡察軍情離散遂渡河迎謁高祖天福元年十二月授許州節度使改賜推忠佐運保國功臣二年秋移鎮徐州三年加開府儀同三司開府原本誤作開封今據文改正影庫本粘籤檢校太尉進封開國公食邑至一千五百戶授代歸闕受左金吾衛上將軍從簡性忌克而多疑歷州鎮凡十餘所在竪棘於公署才通人行左右稍違忤即加鞭笞或至殺害其意不可測吏人皆側足而行其煩苛暴虐為武臣之最六年秋隨駕幸鄴都遇疾請告尋卒於鄉里年六十五贈太傅永樂大典卷一萬八千一百三十一案歐陽史作贈太師舊五代史考異潘環字楚奇洛陽人也父景厚以環貴授左監門上將軍致仕環少以負販為業始事梁邢州節度使閻寶為帳中親校及莊宗定魏博移兵攻邢寶遣環間道馳奏於梁梁末帝用為左堅鋭夾馬都虞候纍遷左雄威指揮使時梁人與莊宗對壘於河上環每預戰先登陷敵金瘡遍體案玉堂間話云潘環常中流矢于面骨銜其鏃故負重傷醫至經年其鏃自出其瘡成漏終身不痊舊五代史考異莊宗知其名及平梁命典禁軍同光中從明宗北禦契丹鄴軍之亂從明宗入洛天成初授棣州刺史會定州王都反朝廷攻之以環為行營右廂步軍都指揮使賊平改易州刺史北面沿邊都部署後移刺慶州受代歸闕明宗召對顧侍臣曰此人勇敢少能偕者尋除宿州團練使清泰中移耀州天福中預平范延光授齊州防禦使四年升金州為節鎮以環為節度使久之入為左神武統軍開運初契丹入寇王師北征以環為北面行營步軍左廂排陳使預破契丹於陽城軍回授澶州節度使纍官至檢校太傅三年罷鎮歸闕俄受詔洛京巡檢其年冬戎王犯闕偽署劉晞為西京留守環乞罷巡警間居洛陽遇河陽軍亂晞出奔未幾蕃將高牟翰以兵援晞入於洛慮環有變乃害之盡取其家財通鑑云晞疑環搆其衆逐己使牟翰殺之殿本漢高祖至京贈太尉環歷六部兩鎮所至以聚斂為務在宿州時有牙將因微過見怒環紿言笞之牙校因託一尼嘗熟於環者獻白金兩鋌尼詣環白牙校餉腳兩枚兩枚原本作兩枝今從册府元龜改正影庫本粘籤求免其責環曰本幾腳尼曰三腳環復曰今兩腳能成乎尼則以三數致之當時號環為潘腳永樂大典卷一萬八千二百三十一方太字伯宗青州千乘人也少隸本軍為小校嘗戍登州劫海客事泄刺史淳于晏匿之遇赦免事定州節度使楊光遠光遠領兵赴晉陽本州軍亂太與馬萬盧順密等擒之使太縛送至闕尋從杜重威破張從賓於汜水以功除趙州刺史從楊光遠平范延光於鄴移刺萊州遷安州防禦使從少帝幸澶州與契丹戰於戚城中數創改鳳州防禦使行至中途遷河陽留後移邢州留後契丹犯闕偽命遙領洋州節度使充洛京巡檢與前洺州團練使李瓊俱至鄭州其屯駐兵士迫請太在城巡檢以備外盜號為鄭王時有嵩山賊帥張遇領衆萬餘於僧衆得梁朝故嗣密王朱乙遂推為天子取嵩山神冠冕之服以衣之張遇以其衆攻鄭州太與李瓊擊之賊衆敗走瓊中流矢而死太乃括率郡中財物以賞軍士因誘之欲同西去其衆不從太乃潛奔於洛陽案通鑑云戍兵既失太反譖太于契丹云脅我為亂太遣子師朗自訴于契丹契丹殺之舊五代史考異及劉晞南走許州案通鑑考異作劉禧舊五代史考異太殺晞牙校李暉入河南府行留守事既而嵩山賊帥張遇殺嗣密王傳首於太懸於洛市又有伊闕賊帥自稱天子領衆萬餘將入洛城集郊壇之上太率兵數百人逆擊破之賊衆遂潰案通鑑考異引實録方太傳云劉禧走許田復有潁陽妖巫姓朱號嗣密王誓衆于洛南天壇號萬餘人太帥部曲與朝士輩虛張旗幟一舉而逐之洛師遂安舊五代史考異河陽武行德遣使召太詐言欲推之為帥尋為行德所害永樂大典卷一萬八千一百三十一何建案九國志作何重建其先回鶻人也代居雲朔間祖慶父懷福俱事後唐武皇為小校建少以謹厚隸於高祖帳下以掌為役及即位纍典禁軍案九國志云重建初事晉祖為奉德馬軍都指揮使遙領歡睦二郡天福中自曹州刺史遷延州兵馬留後尋正授旄鉞案九國志云延州節度使丁審琪殘暴貪冒蕃部苦之重建以所部兵攻其城審琪遁去晉祖即以重建權節度兵馬留後下車諭以威福邊民安堵就加彰武軍節度使數年之間歷涇鄧貝澶孟五鎮節度使案九國志云皆以廉儉簡易稱纍官至檢校太傅開運三年移鎮秦州是冬契丹入汴戎王遣人齎詔以賜建建憤然謂將吏曰吾事石氏二主纍擁戎旃人臣之榮亦已極矣今日不能率兵赴難豈可受制於契丹乎即遣使齎表與其地送款於蜀孟昶待之甚厚偽加同平章事依前秦州節度使案九國志云時固鎮與鳳州未平重建悉經略討平之歲餘移閬州保寧軍節度使案九國志云昶大舉兵北伐遣張虔釗出大散關以重建為招討使由隴州路以進師無功而還加偽官至中書令後卒於蜀永樂大典卷五千六百三十二張廷蘊字德樞開封襄邑人也祖立贈驍衛將軍父及贈光祿大夫廷蘊少勇捷始隸宣武軍為伍長唐天復中奔太原武皇收於帳下為小校及莊宗救上黨戰柏鄉攻薊門下邢魏皆從之後戰於莘縣及胡柳陂繼為流矢所中金瘡之痕盈於面首莊宗寵之統御營黃甲軍常在左右纍加檢校兵部尚書帳前步軍都虞候充諸軍濠寨使同光初從明宗收汶陽加檢校尚書右僕射充魏博三城巡檢使時皇后劉氏在鄴每縱其下擾人廷蘊多斬之聞者壯焉梁平承詔入覲改帳前都指揮使兼左右羽林都虞候會李繼韜故將楊立叛詔遣明宗為招討使元行欽為都部署廷蘊為前鋒歐陽史云李繼韜叛于潞州莊宗遣明宗為招討使元行欽為部署廷蘊為馬步軍都指揮使將兵為前鋒吳縝纂誤據梁本紀及元行欽李繼韜傳云並無明宗元行欽張廷蘊攻潞州之事今考薛史本言廷蘊平潞州楊立之叛歐陽史以為平李繼韜殊誤通鑑從薛史舊五代史考異軍至上黨日已暝矣憩軍方定廷蘊首率徑兵百餘輩踰洫坎城而上守陴者不能禦尋斬關延諸軍入焉明宗行欽達明而始至其城已下明宗甚慊之軍還軍還原本作軍遷今據文改正影庫本粘籤改左右羽林都指揮使加檢校司空行申州刺史同光末從皇子魏王繼岌伐蜀授行營中軍都指揮使蜀平明宗嗣位遷懷州刺史賜竭忠建策興復功臣加檢校司徒旋移金州防禦使加檢校太保繼授潁州團練使沿淮招安使應順中轉隴州防禦使清泰中進封清河郡公高祖即位入為右龍武統軍遷絳州防禦使少帝嗣位領左軍衛上將軍加特進開運三年冬以老病求歸於宋城明年卒於家時年六十九廷蘊所識不過數字而性重文士下汶陽日首獲鄆帥戴思遠判官趙鳳訊之曰爾狀貌必儒人也勿隱其情鳳具言之尋引薦於明宗明宗令送赴行臺尋除鳳翰林學士及鳳入相頗與廷蘊相洽數言於近臣安重誨重誨亦以廷蘊苦戰出於諸將之右力保薦之明宗以廷蘊取潞之日不能讓功於己故恆蓄宿忿至使廷蘊位竟不至方鎮亦命矣夫廷蘊歷七郡家無餘積年老耄期終於牖下良可嘉也長子光被歷通事舍人永樂大典卷一萬一百三十一郭延魯字德興沁州綿上人也父饒後唐武皇時以軍功嘗為本郡守凡九年有遺愛焉延魯少有勇善用槊莊宗以舊將之子擢為保衛軍使頻戍塞下捍契丹有功及即位賜協謀定亂功臣加檢校兵部尚書右神武都指揮都知兵馬使天成中汴州朱守殷叛守殷原本作宋殷今據通鑑改正影庫本粘籤延魯從車駕東幸至其地坎壘先登守殷平以功授汴州步軍都指揮使加檢校尚書左僕射長興中纍加檢校司徒歷天雄軍北京馬步軍都校遙領梧州刺史清泰中遷復州刺史正俸之外未嘗斂貸庶事就理一郡賴焉秩滿百姓上章舉留朝廷嘉之高祖即位遷單州刺史加檢校太保賜輸誠奉義忠烈功臣到任踰月以疾卒於理所時年四十七詔贈太傅永樂大典卷二萬二千一百六十一郭金海本突厥之族少侍昭義節度使李嗣昭常從征伐金海好酒所為不法自潞州過山東入邢洺界為劫盜嗣昭雖知之然惜其拳勇每優容之天祐中纍職至昭義親騎指揮使同光二年遷本道馬軍都指揮使天成初入為捧聖指揮使長興三年改護聖都虞候天福二年從王師討范延光於魏州以功轉本軍都指揮使領黃州刺史高祖幸鄴宣金海領部兵巡檢東京其年十一月安從進謀犯闕金海為襄州道行營先鋒都指揮使與李建崇等同於唐州湖陽遇從進軍萬餘人金海以一旅之衆突擊大敗之策勳授檢校太保商州刺史案洛陽縉紳舊聞記王師攻城金海為飛矢所中扶傷歸營從進用計污金海以金瓶貯酒金合盛藥懸城上呼而勞之金海目不知書惟利是貪取瓶與合歸營且不聞於元戎元戎等疑之乃馳驛奏晉祖念花山之功不加罪城下就除金州團練使併其兵放他部金海之任居常悒悒不樂至於捐館舊五代史考異俄移慶州秩滿歸闕途中遇疾而卒年六十一永樂大典卷二萬一千四百五十洛陽縉紳舊聞記從進與金海相遇于花山金海蕃將善用槍時罕與敵拳勇過人喜戰鬬欲立奇功兩陳相去數里從進素管騎兵金海久在麾下從進亦待之素厚乃躍馬引數百騎乘高去金海陳數百步厲聲呼郭金海金海獨鞭馬出于陳數十步免胄側身高聲自稱曰金海從進又前行數十步勞之曰金海安否我素待爾厚略不知恩今日敢來共我相殺金海應聲答曰官家好看大王負大王甚事大王今日反金海舊事大王乞與大王一箭地大王回去若不去喫取金海槍言訖援槍鞭馬疾趨其陳從進懼躍馬而進師遂相接大為金海焦繼勳摧敗奏到晉祖大喜賞賜有差從進自此喪氣嬰城自固王師為連城重塹以守之月餘王師攻城城上矢下如雨王師被傷者衆是日金海為飛矢集身扶傷歸營明日從進用計汙金海欲使朝廷疑之以金瓶貯酒金合盛藥以索懸之城上呼郭金海金海知之力疾扶創而往城上勞金海曰大王知爾中箭創甚賜爾金瓶金合酒與風藥金海目不知書惟利是貪取瓶與合歸營且不聞于元戎元戎等疑之乃馳驛奏晉祖以花山之功不加罪城下就除金州團練併其兵于他部金海之任居常悒悒不樂至于捐館殿本劉處讓字德謙滄州人也祖信纍贈太子少保父瑜纍贈太子少師梁貞明初張萬進帥兗州處讓事之為親校萬進據城叛梁遣大將劉鄩討之時唐莊宗屯軍於麻口渡萬進密遣處讓乞師於莊宗莊宗未即應之乃於軍門截耳曰主帥急難使我告援苟不得請死亦何避莊宗義之將舉兵渡河俄聞城陷乃止因以墨制授處讓行臺左驍衛將軍俄改客省副使梁平加檢校兵部尚書纍將命稱旨天成初轉檢校尚書右僕射依前充職歲餘遷引進使長興三年轉檢校司空左威衛大將軍其職如故四年西川孟知祥跋扈不通朝貢朝廷方議懷柔乃遣處讓為官告國信使復命轉檢校司徒應順初授欣州刺史檢校太保充西北面都計度使備北寇也清泰二年入為左驍衛大將軍三年夏魏博屯將張令昭逐其帥以城叛朝廷命范延光領兵討之以處讓為河北都轉運使及高祖舉義於太原處讓從至洛陽乃授宣徽北院使天福二年轉左監門衛上將軍充宣徽南院使范延光之據鄴也高祖命宣武軍節度使楊光遠領兵討之時處讓奉詔與光遠同參議軍政會張從賓作亂於河陽處讓自黎陽分兵討襲從賓平復與楊光遠同攻鄴城四年冬范延光將謀納款尚或遲留處讓首入其城以禍福諭之延光乃降以功加檢校太傅先是桑維翰李嵩兼充樞密使處讓以莊宗已來樞密使罕有宰臣兼者因萌心以覬其位及楊光遠討伐鄴城軍機大事高祖每命處讓宣達時光遠恃軍權多有越體論奏高祖依違而已光遠慊之頻與處讓宴語及之處讓訴曰非聖旨也皆出維翰等意及楊光遠入朝遂於高祖前面言執政之失高祖知其故不得已乃罷維翰等以處讓為樞密使時處讓每有敷奏高祖多不稱旨會處讓丁繼母憂高祖因議罷樞密使其本院庶事並委宰臣分判處讓居喪期年起復授彰德軍節度使澶衛等州觀察處置等使處讓勤於公務孜孜求理馭吏民不至苛察人甚便之高祖幸鄴都處讓竭家財貢奉至於薪炭膏沐之細悉供億焉六年除右金吾衛上將軍處讓自以嘗經重任又歷方鎮謂其入朝必當要職一旦除授金吾有所不足少帝即位之初處讓與宰臣言有協翼之論覃恩之際又未擢用一日至中書宰臣馮道趙瑩李嵩和凝在列處讓因酒酣歷詆諸相道笑而不答月餘稱病八年從駕歸汴寄居於封禪寺遇疾而卒年六十三贈太尉再贈太師子保勳仕皇朝位至省郎永樂大典卷九千九百九李瓊字隱光滄州饒安人也少籍本軍為騎士莊宗平河朔隸明宗麾下漸升為小校同光二年明宗受詔以本部兵送糧入薊門時高祖從行至涿州與敵相遇高祖陷於圍中瓊顧諸軍已退密牽高祖鐵衣指東而遁至劉李河劉李河通鑑作琉璃河考薛史前後作劉李蓋地名多用對音今仍其舊影庫本粘籤為敵所襲瓊浮水先至南岸高祖至河中馬倒順流而下瓊以所執長矛援高祖出之又以所跨馬奉高祖瓊徒步護之奔十餘里乃入涿州高祖薦於明宗明宗賞之尋超授軍職同光末明宗討趙在禮於鄴鄴軍既變明宗退至魏縣遣高祖以騎士三百疾趨汴州時莊宗遣騎將西方鄴守其城高祖憂之使瓊以徑兵突封丘門而入高祖踵之鄴尋歸命浚郊遂定及高祖領陝州奏補雲騎指揮使俄改侍衛牙隊指揮使長興中從高祖討東川至劍州使瓊以部下兵破賊軍數千身中重創軍還改龍武指揮使清泰中屯雲州纍擒獲契丹人馬以功改右捧聖軍指揮使唐末帝以瓊元事高祖乃自寨下移授單州馬步軍副指揮使高祖即位補護聖都指揮使又念疇昔輟馬導護之力前後所賜金帛甚厚但未升爵位瓊亦鬱鬱然久之領橫州刺史五年出典申州微有政聲少帝嗣位入為殿前散員都指揮使遙領雷州俄遷棣州刺史遇楊光遠以青州叛自統本部兵攻其城且以書誘瓊瓊拒之以書上進朝廷嘉之開運二年改洺州團練使纍官至加檢校司空三年授護聖右廂都指揮使領嶽州團練使時洺州吏民列狀保留朝廷不允及杜重威降敵改授瓊威州刺史行及鄭州遇羣盜攻郡與方太禦賊中流矢而卒年六十五永樂大典卷一萬三百四十高漢筠字時英齊州歷山人也曾祖詣嘗為是邑令故家焉漢筠少好書傳嘗詣長白山講肄會唐末齊魯交兵梁氏方霸乃擲筆謁焉尋納於軍門未幾出為衛州牙校唐天祐中莊宗入魏分兵諭其屬郡時漢筠以利病説衛之牧守俾送款於莊宗以漢筠為功尋移洺州都校其後改常山為北京以漢筠為皇城使加檢校兵部尚書左驍衛將軍同正明宗即位除成德軍節度副使俄以荊門用軍促詔漢筠移倅襄州權知軍州事長興中歷曹亳二州刺史秩滿加檢校司徒行左金吾衛大將軍清泰末高祖建義於河東唐末帝遣晉昌節度使張敬達率師圍太原委漢筠巡撫其郡及敬達遇害節度副使田承肇率部兵攻漢筠於府署漢筠乃啓關延承肇謂曰僕與子俱承朝寄而相迫何甚承肇曰我欲扶公為節度使漢筠曰老夫耄矣不敢首為亂階死生繫子籌之承肇目左右令前諸軍投刃於地曰高金吾纍朝宿德不可枉殺承肇以衆意難拒遂謝云與公戲耳遂與連騎以還高祖入洛飛詔徵之遇諸途乃入覲尋遷左驍衛大將軍內客省使天福三年正月遘疾終東京之私第時年六十六漢筠性寬厚儀容偉如也雖歷戎職未嘗有非法之言出於口吻多慕士大夫所為復以清白自負在襄陽有孽吏常課外獻白金二十鎰漢筠曰非多納牟則刻削闤闠吾有正俸此何用焉因戒其主者不復然其白金皆以狀上進有詔嘉之及蒞濟陰部民安之四邑飯僧凡有萬八千人在亳州三年歲以己俸百千代納逋租斯亦近代之良二千石也長子貞文仕皇朝為開封少尹卒永樂大典卷五千百三十八孫彥韜字德光汴州浚儀人也少以勇力應募從軍梁祖之兼領四鎮擢彥韜於行間歷諸軍偏校及唐莊宗與梁軍對壘於河上彥韜知梁運將季乃間行渡河北歸莊宗莊宗嘉而納之授親從右廂指揮使及莊宗平梁出為晉州長步都校加檢校兵部尚書天成初遷綿州刺史檢校尚書左僕射至郡踰年以考課見稱就加檢校司空長興清泰中歷密沂濮三州刺史纍官至檢校太保賜竭忠建策興復功臣高祖即位復授密州刺史尋卒於任年六十四彥韜出於軍旅植性和厚理綿州日甚著綏懷之譽故有賞典旌焉在濮陽屬清泰末羣寇人郡郡人大擾彥韜率帳下百人一呼破之人皆感之但不能守廉養正以終令譽長興中罷密州赴闕苞苴甚厚起甲第於洛陽踰月而成華堂廣廡亞王公之家見者嗤之故淹翔五郡位不及廉察抑有由也永樂大典卷一萬八千一百三十二王傅拯王傅拯歐陽史作傅極考通鑑俱作拯今仍其舊影庫本粘籤吳江人也父綰偽虔州節度使傅拯初事楊溥為黑雲右廂都指揮使領本軍戍海州唐長興元年傅拯殺海州刺史陳宣焚州城以所部兵五千人來歸明宗喜而納之授金紫光祿大夫檢校司徒曹州刺史尋移濮州清泰中遷貝州防禦使秩滿有代會范延光叛以兵要傅拯入魏城疑而不用延光降高祖授傅拯諸衛將軍出為寧州刺史境接蕃部以前弊政滋章民甚苦之傅拯自下車除去弊政數十件百姓便之不數月移刺虢州離寧州日衙門聚數千人拆橋遮道以留之及赴虢略為理清靜蒸民愛戴如寧州焉開運中歷武州刺史受代歸洛遇疾卒傅拯家本多財尤好賓各及歷數郡不事生産將即世甚貧匱物論惜之永樂大典卷六千五百二十祕瓊鎮州平山人也父弘遇以善射歷本軍偏校纍官至慶州刺史瓊亦有勇清泰中董溫琪為鎮州節度使擢瓊為衙內指揮倚以腹心及溫琪陷蕃瓊乃害溫琪之家載其尸都以一坎瘞之溫琪在任貪暴積鏹巨萬瓊悉輦之以藏其家遂自稱留後高祖即位遣安重榮代之授瓊齊州防禦使時重榮與蕃帥趙思溫同行部曲甚衆瓊不敢拒命尋峔銎貨由鄴中以赴任先是鄴帥范延光將謀叛遣牙將范鄴持書搆瓊瓊領書不答使者還具達其事延光深忿之及聞瓊過其境密使精騎殺瓊於夏津以滅其口一行金寶侍伎皆為延光所有由是延光異志益露焉永樂大典卷一萬二千八百六十六李彥珣邢州人也少為郡之牙吏唐天祐中明宗鎮其地彥土旬素無檢節因洽於左右明宗即位以為通事舍人嘗遣使東川行至其境其僕從為董璋所收彥珣竄還以失敬故也朝廷攻璋詔授行營步軍都監彥珣素不孝於父母在鄉絶其供饋同列惡其鄙惡旋出為外任清泰中遷河陽行軍司馬遇張從賓為亂因朋助之從賓敗奔於魏州范延光既叛署為步軍都監委以守陴招討使楊光遠以彥珣見用欲撓延光而誘彥珣乃遣人就邢臺訪得其母令於城下以招之彥珣識其母發矢以斃之見者傷之及隨延光出降授坊州刺史近臣以彥珣之惡逆奏於高祖高祖曰赦命已行不可改也遂令赴郡後不知其所終也永樂大典卷一萬三百八十九案歐陽史彥珣後以坐贓誅史臣曰昔從簡從莊宗戰於河上可謂勇矣及其為末帝守於孟津豈得為忠乎忠既無聞勇何足貴潘環方太雖咸負雄幹而俱歿亂世蓋方略不足以衛其身故也何建舉秦隴之封附巴卭之俗守方之寄其若是乎其餘皆儋圭析爵之流也亦可以垂名於是矣祕瓊既覆董氏之族旋為鄴帥所屠何報應之速也唯彥珣忍射其親殆非人類晉祖宥之不戮蓋失刑之甚也永樂大典卷一萬三百八十九
