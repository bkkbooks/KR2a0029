body:
  text: 潁亳之人隨至京師衆保潁亳之人隨至京師衆保證之潁亳之人隨至京潁亳潁亳之人隨至京師衆潁亳之人隨至京師衆保證之潁潁亳潁亳之人隨至京師衆保證之弘肇乃令鞫告事者具伏誣陷即斬之遂奏釋景思顯德初河東劉崇帥衆來寇世宗親總六師以禦之及陣於高平景思於世宗馬前距踴數四且曰願賜臣堅甲一聯以觀臣之効用世宗由是知其名因以高平陣所得降軍數千人署為効順指揮命景思董之使于淮上三年春世宗親征淮甸景思繼有戰功乃命遙領饒州刺史未幾改授濠州行刺史令帥衆攻圍濠州濠州原本作灝州今從通鑑改正影庫本粘籤四年冬因力戰為賊鋒所傷數日而卒世宗甚憫之詔贈武清軍節度使永樂大典卷六千三百七十一史臣曰自古為人臣者望重則必危功崇則難保自非賢者疇能免之況王鄴帥昧明哲之規周太祖乃雄猜之主欲無及禍其可得乎自福進而下皆將潁亳之人隨至京師衆保證之弘肇乃令鞫告事者具伏誣陷即斬之遂奏釋景思顯德初河東劉崇帥衆來寇世宗親總六師以禦之及陣於高平景思於世宗馬前距踴數四且曰願賜臣堅甲一聯以觀臣之効用世宗由是知其名因以高平陣所得降軍數千人署為効順指揮命景思董之使于淮上三年春世宗親征淮甸景思繼有戰功乃命遙領饒州刺史未幾改授濠州行刺史令帥衆攻圍濠州濠州原本作灝州今從通鑑改正影庫本粘籤四年冬因力戰為賊鋒所傷數日而卒世宗甚憫之詔贈武清軍節度使永樂大典卷六千三百七十一史臣曰自古為人臣者望重則必危功崇則難保自非賢者疇能免之況王鄴帥昧明哲之規周太祖乃雄猜之主欲無及禍其可得乎自福進而下皆將帥之英也擁旌作翰諒亦宜然唯彥超以捍寇而沒可不謂忠乎永樂大典卷六千三百七十一潁亳之人隨至京師衆保證之弘肇乃令鞫告事者具伏誣陷即斬之遂奏釋景思顯德初河東劉崇帥衆來寇世宗親總六師以禦之及陣於高平景思於世宗馬前距踴數四且曰願賜臣堅甲一聯以觀臣之効用世宗由是知其名因以高平陣所得降軍數千人署為効順指揮命景思董之使于淮上三年春世宗親征淮甸景思繼有戰功乃命遙領饒州刺史未幾改授濠州行刺史令帥衆攻圍濠州濠州原本作灝州今從通鑑改正影庫本粘籤四年冬因力戰為賊鋒所傷數日而卒世宗甚憫之詔贈武清軍節度使永樂大典卷六千三百七十一史臣曰自古為人臣者望重則必危功崇則難保自非賢者疇能免之況王鄴帥昧明哲之規周太祖乃雄猜之主欲無及禍其可得乎自福進而下皆將帥之英也擁旌作翰諒亦宜然唯彥超以捍寇而沒可不謂忠乎永樂大典卷六千三百七十一潁亳之人隨至京師衆保證之弘肇乃令鞫告事者具伏誣陷即斬之遂奏釋景思顯德初河東劉崇帥衆來寇世宗親總六師以禦之及陣於高平景思於世宗馬前距踴數四且曰願賜臣堅甲一聯以觀臣之効用世宗由是知其名因以高平陣所得降軍數千人署為効順指揮命景思董之使于淮上三年春世宗親征淮甸景思繼有戰功乃命遙領饒州刺史未幾改授濠州行刺史令帥衆攻圍濠州濠州原本作灝州今從通鑑改正影庫本粘籤四年冬因力戰為賊鋒所傷數日而卒世宗甚憫之詔贈武清軍節度使永樂大典卷六千三百七十一史臣曰自古為人臣者望重則必危功崇則難保自非賢者疇能免之況王鄴帥昧明哲之規周太祖乃雄猜之主欲無及禍其可得乎自福進而下皆將帥之英也擁旌作翰諒亦宜然唯彥超以捍寇而沒可不謂忠乎永樂大典卷六千三百七十一潁亳之人隨至京師衆保證之弘肇乃令鞫告事者具伏誣陷即斬之遂奏釋景思顯德初河東劉崇帥衆來寇世宗親總六師以禦之及陣於高平景思於世宗馬前距踴數四且曰願賜臣堅甲一聯以觀臣之効用世宗由是知其名因以高平陣所得降軍數千人署為効順指揮命景思董之使于淮上三年春世宗親征淮甸景思繼有戰功乃命遙領饒州刺史未幾改授濠州行刺史令帥衆攻圍濠州濠州原本作灝州今從通鑑改正影庫本粘籤四年冬因力戰為賊鋒所傷數日而卒世宗甚憫之詔贈武清軍節度使永樂大典卷六千三百七十一史臣曰自古為人臣者望重則必危功崇則難保自非賢者疇能免之況王鄴帥昧明哲之規周太祖乃雄猜之主欲無及禍其可得乎自福進而下皆將帥之英也擁旌作翰諒亦宜然唯彥超以捍寇而沒可不謂忠乎永樂大典卷六千三百七十一潁亳之人隨至京師衆保證之弘肇乃令鞫告事者具伏誣陷即斬之遂奏釋景思顯德初河東劉崇帥衆來寇世宗親總六師以禦之及陣於高平景思於世宗馬前距踴數四且曰願賜臣堅甲一聯以觀臣之効用世宗由是知其名因以高平陣所得降軍數千人署為効順指揮命景思董之使于淮上三年春世宗親征淮甸景思繼有戰功乃命遙領饒州刺史未幾改授濠州行刺史令帥衆攻圍濠州濠州原本作灝州今從通鑑改正影庫本粘籤四年冬因力戰為賊鋒所傷數日而卒世宗甚憫之詔贈武清軍節度使永樂大典卷六千三百七十一史臣曰自古為人臣者望重則必危功崇則難保自非賢者疇能免之況王鄴帥昧明哲之規周太祖乃雄猜之主欲無及禍其可得乎自福進而下皆將帥之英也擁旌作翰諒亦宜然唯彥超以捍寇而沒可不謂忠乎永樂大典卷六千三百七十一潁亳之人隨至京師衆保證之弘肇乃令鞫告事者具伏誣陷即斬之遂奏釋景思顯德初河東劉崇帥衆來寇世宗親總六師以禦之及陣於高平景思於世宗馬前距踴數四且曰願賜臣堅甲一聯以觀臣之効用世宗由是知其名因以高平陣所得降軍數千人署為効順指揮命景思董之使