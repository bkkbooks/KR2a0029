body:
  text: 舊五代史卷一百漢書二高祖本紀下天福十二年夏五月乙酉朔契丹所署大丞相政事令東京留守燕王趙延壽為永康王兀欲所縶既而兀欲召蕃漢臣僚於鎮州牙署矯戎王遺詔命兀欲嗣位案遼史世宗紀作四月戊寅即皇帝位歐陽史通鑑契丹國志俱從薛史作五月與遼史異舊五代史考異於是發哀成服辛卯詔取五月十二日車駕南幸甲午以判太原府事劉崇為北京留守命皇子承訓武德使李暉大內巡檢丙申帝發河東取陰地關路幸東京時星官言太歲在午不利南巡故路出陰地丁酉史弘肇奏澤州刺史翟令奇以郡來降案宋史李萬超傳史弘肇路經澤州刺史翟令奇堅壁拒命萬超馳至城下諭之曰今契丹北遁天下無主並州劉公仗大義定中土所向風靡後服者族盍早圖之令奇乃開門迎納宏肇即留萬超權州事舊五代史考異是日契丹所署汴州節度使蕭翰迎郇國公李從益至東京請從益知南朝軍國事己亥蕭翰發離東京北去乙巳契丹永康王兀欲自鎮州還蕃行次定州案遼史作甲申次定州與薛史異舊五代史考異以定州節度副使耶律忠為定州節度使孫方簡為雲州節度使方簡不受命遂歸狼山戊申車駕至絳州本州刺史李從朗以郡降初契丹遣偏校成霸卿曹可璠等守其郡帝建義之始不時歸命及車駕至帝耀兵於城下不令攻擊從朗等遂降六月乙卯契丹河中節度使趙贊起復河中節度使案通鑑起復趙匡贊在七月甲午以後與薛史異又匡贊薛史作趙贊考贊即延壽之子仕宋歷廬延邠鄜四州蓋入宋後避諱去匡字也今仍其舊又案遼史世宗紀天祿二年十月壬午南京留守魏王趙延壽薨考遼天祿二年即漢乾祐二年此時天福十二年延壽尚未死也此必因延壽為永康王所鎖而漢人傳其已死遂起復其子贊以絶其北向之心耳又考通鑑遣使弔祭河中因起復移鎮在七月甲午以後薛史繫于六月前後互異孔本是日契丹右僕射兼中書侍郎平章事張礪卒於鎮州丙辰車駕至洛兩京文武百僚自新安相次奉迎郇國公李從益唐明宗淑妃王氏皆賜死於東京甲子車駕至東京丙寅以漢州就糧歸捷指揮使張建雄為濮州刺史以金州守禦指揮使康彥環為金州防禦使建雄彥環皆因亂害本州刺史自知州事故有是命以北京知進奏王從璋為內客省使戊辰制大赦天下應天福十二年六月十五日昧爽已前天下見禁罪人已結正未結正已發覺未發覺除十惡五逆外罪無輕重咸赦除之諸州去年殘稅並放東西京一百里外放今年夏稅一百里內及京城今年屋稅並放一半契丹所授職任不議改更諸貶降官未量移者與量移已量移者與録徒流人並放還應係欠省錢家業抵當外並放宜以國號為大漢年號依舊稱天福云案歐陽史六月戊辰改國號漢是戊辰以前猶未改國號也遼史太宗紀二月辛未河東節度使北平王劉知遠自立為帝國號漢蓋因其自立而牽連書之疑未詳考己巳詔青州襄州安州復為節鎮曹陳二州依舊為郡壬申北京留守劉崇加同平章事以中書舍人劉繼儒為宗正卿翰林學士承旨尚書兵部侍郎張允落職守本官以尚書左丞張昭為吏部侍郎案東都事略張昭傳昭舊名昭遠避漢高祖諱止稱昭舊五代史考異以左散騎常侍邊歸讜為禮部侍郎以左散騎常侍王仁裕為戶部侍郎充翰林學士承旨以右諫議大夫張沆為左散騎常侍充翰林學士以戶部侍郎李式為光祿卿以翰林學士尚書禮部侍郎邊光範為衛尉卿甲戌詔文武臣僚每遇內殿起居輪次上封事丁丑以湖南節度使馬希範卒輟視朝三日是月契丹所命相州節度使高唐英為屯駐指揮使王繼弘楚暉所殺秋七月己丑以御史中丞趙上交為太僕卿案上交本名遠避漢祖諱以字行見宋史舊五代史考異以戶部侍郎邊蔚為御史中丞甲午武安軍節度副使水陸諸軍副都指揮使判內外諸司江南西道觀察等使檢校太尉馬希廣可檢校太師兼中書令行潭州大都督天策上將軍充武安軍節度湖南管內觀察使江南諸道都統封楚王丙申以鄴都留守天雄軍節度使檢校太師守太傅兼中書令衛國公杜重威為宋州節度使加守太尉以宋州節度使檢校太師兼中書令高行周為鄴都留守加守太傅以鄆州節度使檢校太師兼侍中李守貞為河中節度使加兼中書令以河中節度使檢校太尉趙贊為晉昌軍節度使案宋史趙贊傳贊懼漢疑己潛遣親吏趙仙奉表歸蜀判官李恕者趙延壽賓佐深所委賴至家事亦參之及贊出鎮從為上介至是恕語贊曰燕王入遼非所願也漢方建國必務懷柔公若泥首歸朝必保富貴狼狽入蜀理難萬全儻若不容後悔無及公能聽納請先入朝為公申理贊即遣恕詣闕漢祖見恕問贊何以附蜀恕曰贊家在燕薊身受契丹之命自懷憂恐謂陛下終不能容招引西軍蓋圖苟免臣意國家甫定務安臣民所以令臣乞哀求覲漢祖曰贊之父子亦吾人也事契丹出於不幸今聞延壽落于陷穽吾忍不容贊耶恕未還贊已離鎮入朝即命為左驍衛將軍舊五代史考異以晉昌軍節度使張彥超為鄜州節度使加檢校太師庚子以徐州節度使檢校太師同平章事岐國公符彥卿為兗州節度使加兼侍中以鄧州節度使檢校太師王周為徐州節度使加同平章事以許州節度使檢校太保劉重進為鄧州節度使加檢校太傅以兗州節度使檢校太師兼侍中安審琦為襄州節度使檢校太師莒國公李從敏為西京留守加同平章事以鳳翔節度使檢校太師同平章事侯益依前鳳翔節度使加兼侍中辛丑故守司空兼門下侍郎平章事譙國公劉昫贈太保甲辰華州節度使侯章同州節度使張彥威涇州節度使史威並加檢校太尉以晉昌軍節度使檢校太保劉銖為青州節度使加檢校太尉同平章事以河中節度使檢校太尉白文珂為鄆州節度使加同平章事以青州節度使楊承信為安州節度加檢校太傅滑州節度使兼侍衛馬軍都指揮使劉信許州節度使兼侍衛步軍都指揮使史弘肇並加檢校太尉庚戌以司天監任延皓為殿中監以司天少監杜升為司天監是月契丹永康王兀欲囚祖母述律氏於木葉山閏月辛酉以左衛上將軍皇甫立為太子太師致仕乙丑禁造契丹樣鞍轡器械服裝故開封尹桑維翰贈尚書令故西京留守景延廣贈中書令以前衛尉卿薛仁謙為司農卿丙寅唐故樞密使郭崇韜贈中書令故河中節度使安重誨贈尚書令故華州節度使毛璋贈侍中故汴州節度使朱守殷贈中書令丁卯故青州節度楊光遠贈尚書令追封齊王仍令所司追諡立碑唐故河中節度使西平王朱友謙追封魏王故樞密使馮贇贈中書令故河陽節度使判六軍康義誠贈中書令故西京留守京兆尹王思同故邠州節度使藥彥稠故襄州節度使安重進故鎮州節度使安重榮並贈侍中庚午以前延州留後薛可言為宣徽北院使以監察御史王度為樞密直學士新授宋州節度使杜重威據鄴都叛詔削奪重威官爵貶為庶人案通鑑杜重威之叛在七月至閏月庚午乃削奪官爵五代春秋歐陽史作閏七月杜重威拒命與通鑑異舊五代史考異以高行周為行營都部署率兵進討辛未以權樞密使楊邠為樞密使加檢校太傅以權樞密副使郭威為副樞密使加檢校太保以權三司使王章為三司使加檢校太傅壬申故晉昌軍節度使趙在禮贈中書令故曹州節度使石贇贈侍中故滑州節度使皇甫遇贈中書令故同州節度使劉繼勳故貝州節度使梁漢璋皆贈太尉故宣徽使孟承誨贈太保丁丑有彗出於張旬日而滅己卯陝州節度使趙暉加階爵晉州節度使王晏加檢校太尉河陽節度使武行德加階爵延州節度使高允權加檢校太尉鄧州節度使常思加檢校太尉移鎮潞州庚辰追尊六廟以太祖高皇帝世祖光武皇帝為不祧之廟高曾已下四廟追尊諡號已載於前矣是日權太常卿張昭上六廟樂章舞名太祖高皇帝室酌獻請依舊奏武德之舞世祖光武皇帝室酌獻請依舊奏大武之舞文祖明元皇帝室酌獻請奏靈長之舞德祖恭僖皇帝室酌獻請奏積善之舞翼祖昭獻皇帝室酌獻請奏顯仁之舞顯祖章聖皇帝室酌獻請奏章慶之舞其六廟歌詞文多不録八月壬午朔鎮州駐屯護聖左廂都指揮使白再榮等逐契丹所命節度使麻答復其城麻答與河陽節度使崔廷勳洛京留守劉晞並奔定州馳驛以聞庚寅以洺州團練使薛懷讓為邢州節度使辛卯詔恆州復為鎮州順國軍復為成德軍乙未以護聖左廂都指揮使恩州團練使白再榮為鎮州留後丙申詔天下凡關賊盜不計贓物多少案驗不虛並處死以兩浙節度使守太師兼中書令吳越國王錢弘佐薨廢朝三日丙午以吐渾府節度使檢校太尉王義宗為沁州刺史依前吐渾節度使己酉以刑部尚書竇貞固為吏部尚書是日薛懷讓奏收復邢州殺偽命節度副使知州事劉鐸案歐陽史丙申安國軍節度使薛懷讓殺契丹之將劉鐸入于邢州薛史祇載奏聞之期不言收復為何日與歐陽史異孔本初懷讓為洺州防禦使契丹麻答發健步督洺州糧運懷讓殺之以聞帝遣郭從義與懷讓攻取邢州蕃將楊袞來援鐸懷讓拒之不勝退保洺州敵騎掠其部民大被其苦會鎮州逐麻答楊衮收兵而退鐸乃上表請命懷讓乘其無備遣人紿鐸云奉詔襲契丹請置頓於郡案宋史薛懷讓傳懷讓遣人紿鐸云我奉詔為邢州帥據薛史則懷讓實紿鐸奉詔襲契丹以庚寅授邢州節度使非紿之也特託言置頓于郡耳舊五代史考異鐸開門迎之即為懷讓所害時人寃之鐸初受契丹命為邢州都指揮使及永康王以高奉明為節度使麻答署鐸為邢州副使兼都指揮使帝至東京奉明歸鎮州令鐸知邢州事至是遇害庚戌文武百僚上表請以二月四日降誕日為聖壽節從之前晉昌軍節度副使李肅可左驍衛上將軍致仕是月遣使諸道和巿戰馬九月甲子宰臣蘇逢吉兼戶部尚書蘇禹圭兼刑部尚書丁卯以吏部侍郎權判太常卿事張昭為太常卿戊辰故易州刺史郭璘贈太傅甲戌宰臣蘇逢吉加左僕射監修國史蘇禹圭加右僕射集賢殿大學士以吏部尚書竇貞固為守司空兼門下侍郎平章事弘文館大學士案宋史竇貞固傳初帝與貞固同事晉祖甚相得時蘇逢吉蘇禹圭自霸府僚佐驟居相位思得舊臣冠首以貞固持重寡言有時望乃拜司空門下侍郎平章事舊五代史考異以翰林學士行中書舍人李濤為中書侍郎兼戶部尚書平章事案宋史李濤傳杜重威叛濤密疏請親征高祖覽奏以濤堪任宰輔故有是命舊五代史考異宋史李濤傳杜重威據鄴叛高祖命高行周慕容彥超討之二帥不協濤密疏親征高祖覽奏以濤堪任宰輔即拜中書侍郎兼戶部侍郎平章事殿本是日權太常卿張昭上疏奏改一代樂名戊寅詔以杜重威叛命取今月二十九日暫幸澶魏己卯以前樞密使李嵩為太子太傅以前左僕射和凝為太子太保庚辰車駕發京師冬十月癸未以太子太保李鏻為司徒以太子太傅盧文紀為太子太師以前磁州刺史李穀為左散騎常侍宋史李穀傳舊制罷外郡歸本官至是進秩奬之也殿本甲申車駕次韋城詔河北諸州見禁罪人自十月五日昧爽以前常赦所不原者咸赦除之壬辰日有黑子如雞卵丙申以相州留後王繼弘為相州節度使加檢校太傅至鄴都城下案通鑑作戊戌至鄴都城下與薛史異舊五代史考異丙午詔都部署高行周督衆攻城帝登高阜以觀之時衆議未欲攻擊副部署慕容彥超堅請攻之是日王師傷夷者萬餘人不克而退十一月壬子雨木冰癸丑日南至從官稱賀於行宮己未湖南奏荊南節度使高從誨叛辛酉雨木冰壬申杜重威上表請命癸酉雨木冰雨木冰原本作大冰今從五代會要改正影庫本粘籤丁丑杜重威素服出降待罪於宮門詔釋其罪鄴都留守天雄軍節度使高行周加守太尉封臨清王以杜重威為檢校太師守太傅兼中書令楚國公己卯以許州節度使兼侍衛步軍都指揮使史弘肇為宋州節度使同平章事充侍衛親軍馬步軍都指揮使以滑州節度使兼侍衛馬軍都指揮使劉信為許州節度使同平章事充侍衛親軍馬步軍副都指揮使以澶州節度使慕容彥超為鄆州節度使同平章事以前定州節度使李殷為貝州節度使以鄭州防禦使郭從義為澶州節度使十二月辛巳朔以護聖左廂都指揮使嶽州防禦使李洪信為遂州節度使充侍衛步軍都指揮使以護聖右廂都指揮使永州防禦使尚洪遷為夔州節度使充侍衛步軍都指揮使丙戌車駕發鄴都歸京癸巳至自鄴都甲午以皇子開封尹承訓薨廢朝三日追封魏王案通鑑云辛卯皇子開封尹承訓卒乙未追立為魏王與薛史紀日互異舊五代史考異丁酉帝舉哀於太平宮庚子司徒李鏻薨辛丑以前鄜州節度使郭謹為滑州節度使加檢校太尉戊申宿州奏部民餓死者八百六十有七人乾祐元年正月辛亥朔帝不受朝賀乙卯制大赦天下改天福十三年為乾祐元年自正月五日昧爽已前犯罪人除十惡五逆外罪無輕重咸赦除之己未改御名為皓辛酉詔諸道行軍副使兩使判官並不得奏薦帶使相節度使許奏掌書記支使節度推官不帶使相節度使只許奏掌書記節度推官其防禦團練判官軍事判官等聽奏所薦州縣官帶使相節度使許薦三人不帶使相二人防禦團練刺史一人云以前鄧州節度使燕國公馮道為守太師進封齊國公甲子帝不豫庚午以前宗正卿石光贊為太子賓客以太僕卿趙上交為祕書監丁丑故尚書左丞韓祚贈司徒二十七日丁丑帝崩於萬歲殿時年五十四祕不發喪庚辰太傅杜重威伏誅案契丹國志云漢祖召蘇逢吉楊邠史宏肇入受顧命曰承祐幼弱後事託在卿輩又曰善防杜重威是日殂逢吉等祕不發喪下詔稱重威父子因朕小疾謗議搖衆皆斬之磔死于巿巿人爭啖其肉舊五代史考異二月辛巳朔內降遺制皇子周王承祐可於柩前即皇帝位是日發哀其年三月太常卿張昭上諡曰睿文聖武昭肅孝皇帝廟號高祖十一月壬申葬於睿陵宰臣蘇禹圭撰諡册哀册文云永樂大典卷一萬六千九十八五代史補高祖嘗在晉祖麾下晉祖既起太原因高祖遂有天下先是豫章有僧號上藍者精於術數自唐末著讖云石榴花發石榴開議者以石榴則晉漢之謂也再言石榴者明享祚俱不過二世矣史臣曰在昔皇天降禍諸夏無君漢高祖肇起並汾遄臨汴洛乘虛而取神器因亂而有帝圖雖曰人謀諒由天啓然帝昔蒞戎藩素虧物望洎登宸極未厭人心徒矜拯溺之功莫契來蘇之望良以急於止殺不暇崇仁燕薊降師既連營而受戮鄴臺叛帥因閉壘以偷生蓋撫御以乖方俾征伐之不息及回鑾輅尋墮烏號故雖有應運之名而未覩為君之德也永樂大典卷一萬六千九十八
