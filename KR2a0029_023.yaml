body:
  text: 舊五代史卷二十三梁書二十三列傳第十三劉鄩密州安丘縣人也祖綬密州戶掾累贈左散騎常侍父融安丘令累贈工部尚書鄩幼有大志好兵略涉獵史傳唐中和中事青州節度使王敬武為小校敬武卒三軍推其子師範為留後朝廷命崔安潛崔安潛原本作守潛今從新唐書改正影庫本粘籤鎮青州州人拒命棣州刺史張蟾將襲師範師範遣都指揮使盧弘攻棣州弘反與蟾通偽旋軍以襲師範師範知之設伏兵以迎弘既而享之先誡鄩曰弘至即斬之鄩如約斬弘於座上同亂者皆誅之師範以鄩為馬步軍副都指揮使攻下棣州殺張蟾朝廷因授師範平盧軍節度使光化初師範表鄩為登州刺史歲餘移刺淄州署行軍司馬天復元年昭宗幸鳳翔太祖率四鎮之師迎於岐下李茂貞與內官韓全誨矯詔徵天下兵入援師範覽詔慷慨泣下遣腹心乘虛襲取太祖管內州郡所在同日竊發其事多泄唯鄩以偏師陷兗州遂據其郡初鄩遣細人詐為鬻油者覘兗城內虛實及出入之所視羅城下一水竇可以引衆而入遂誌之鄩乃告師範請步兵五百宵自水竇銜枚而入案金華子云鄩以大竹藏兵仗與薛史異一夕而定軍城晏然市民無擾案金華子云鄩入據子城甲兵精銳城內人皆束手莫敢旅拒加以州將悍人情不附鄩因而撫治民皆安堵舊五代史考異太祖命大將葛從周攻之案金華子作兗帥張姓疑傳聞之誤時從周為節度使領兵在外州城為鄩所據家屬悉在城中鄩善撫其家移就外第供給有禮升堂拜從周之母及從周攻城鄩以板輿請母登城母告從周曰劉將軍待我甚至不異於兒新婦已下並不失所劉將軍與爾各為其主爾其察之從周歔欷而退鄩料簡城中老疾及婦人浮食百姓不足與守者悉出之於外與將士同甘苦分衣食以抗外軍戢兵禁暴居人泰然從周攻圍既久鄩無外援人情稍有去就之意一日節度副使王彥溫踰城而奔守陴者從之而逸鄩之守兵禁之不可鄩即遣人從容告彥溫曰請副使少將人出非素遣者請勿帶行又揚言於衆曰素遣從副使行者即勿禁其擅去者族之守民聞之皆惑奔逸者乃止外軍聞之果疑彥溫有姦即戮之於城下自是軍城遂固及王師範兵力漸窘從周以禍福諭鄩俾之革面革面原本作薰面今據文改正影庫本粘籤鄩報曰俟青州本使歸降即以城池還納天復三年十一月師範告降且言先差行軍司馬劉鄩領兵入兗州請釋其罪亦以告鄩鄩即出城聽命案劉鄩叛附于梁新唐書昭宗紀作十月丁丑與薛史作十一月異舊五代史考異太祖嘉其節㮣以為有李英公之風案原本訛殷公考新唐書李勣封英國公今改正舊五代史考異鄩既降從周具行裝服馬請鄩歸大梁鄩曰未受梁王捨釋之旨乘肥衣裘非敢聞命即素服跨驢而發及將謁見太祖令賜冠帶鄩曰纍囚負罪請就縶而入太祖不許及見慰撫移時且飲之酒鄩以量小告太祖太祖曰取兗州量何大耶旋授元從都押牙太祖牙下諸將皆四鎮舊人鄩一旦以羈旅之臣驟居衆人之右及與諸將相見並用階庭之禮太祖尤奇重之未幾表為鄜州留後是時邠岐之衆屢寇其境鄩禦捍備至太祖以其地遠慮失鄩即令棄郡引軍屯於同州天祐二年二月授右金吾衞大將軍充街使三年正月太祖授元帥之任以鄩為元帥府都押牙執金吾如故開平元年授右金吾上將軍充諸軍馬步都指揮使其年秋與諸將征潞州遷檢校司徒三年二月轉右威衞上將軍依前諸軍馬步都虞候五月改左龍武統軍充侍衞親軍馬步軍都指揮使其年夏同州劉知俊反引岐人襲據長安分兵扼河潼太祖幸陝命鄩西討即奮取潼關擒知俊弟知浣以獻遂引兵收復長安知俊棄郡奔鳳翔太祖以鄩為佑國同州軍兩使留後尋改佑國軍為永平軍以鄩為節度使檢校司徒行大安尹金州管內觀察使是時西鄙未寧密邇寇境鄩練兵撫衆獨當一面四年加檢校太保同平章事庶人友珪篡位加檢校太傅乾化三年正月丁內艱友珪命起復視事末帝即位尤深倚重明年夏詔鄩歸闕授開封尹遙領鎮南軍節度使旋屬晉人寇河朔鄩奉詔與魏博節度使楊師厚禦之而退九月徐州節度使蔣殷據城叛時朝廷以福王友璋鎮徐方殷不受代末帝遣鄩與鄆帥牛存節率兵攻之殷求援於淮夷偽吳楊溥遣大將朱瑾領衆赴援鄩逆擊破之貞明元年春城陷殷舉族自燔於火中得其尸梟首以獻詔加檢校太尉三月魏博楊師厚卒朝廷分相魏為兩鎮遣鄩率大軍屯南樂以討王鎔為名既而魏軍果亂囚節度使賀德倫送款於太原六月晉王入魏州鄩以精兵萬人自洹水移軍魏縣晉王來覘鄩設伏於河曲叢木間俟晉王至大譟而進圍之數匝殺獲甚衆晉王僅以身免案通鑑作晉王帥騎馳突所向披靡自午至申乃得出亡其七騎而薛史以為殺獲甚衆晉王僅以身免蓋當時梁唐二史各有夸張掩飾故所紀互異如此通鑑所載當是據唐實錄是月鄩潛師由黃澤西趨太原將行慮為晉軍所追乃結蒭為人縛旗於上以驢負之循堞而行數日晉人方覺軍至樂平會霖雨積旬師不克進鄩即整衆而旋魏之臨清積粟之所鄩引軍將據之遇晉將周陽五自幽州率兵至鄩乃取貝州與晉軍遇於堂邑鄩邀擊却之追北五十餘里遂軍於莘縣增城壘浚池隍自莘及河築甬道以通餉路八月末帝賜鄩詔曰閫外之事全付將軍河朔諸州一旦淪沒勞師弊旅患難日滋退保河壖久無鬬志昨東面諸侯奏章來上皆言倉儲已竭飛輓不充于役之人每遭擒擄夙宵軫念惕懼盈懷將軍與國同休當思良畫如聞寇敵兵數不多宜設機權以時剪撲則予之負荷無累先人鄩奏曰臣受國深恩忝茲閫政敢不枕戈假寐罄節輸忠昨者比欲西取太原斷其歸路然後東收鎮冀解彼連鷄止於旬時再清河朔豈期天方稔亂國難未平纔出師徒積旬霖潦資糧殫竭軍士札瘥切慮蒼黃乖於統攝乃詢部伍皆欲旋歸凡次舍經行每張犄角又欲絕其餉道且據臨清纔及宗城纔及宗城原本脫城字今據通鑑增入影庫本粘籤周陽五奄至騎軍馳突變化如神臣遂領大軍保於莘縣深溝高壘享士訓兵日夜戒嚴伺其進取偵視營壘兵數極多樓煩之人皆能騎射最為勍敵未可輕謀臣若苟得機宜焉敢坐滋患難臣心體國天鑒具明末帝又遣使問鄩決勝之策鄩曰臣無奇術但人給糧十斛盡則破敵末帝大怒讓鄩曰將軍蓄米將療饑耶將破賊耶乃遣中使督戰鄩集諸校而謀曰主上深居宮禁未曉兵機與白面兒共謀終敗人事大將出征君命有所不受臨機制變安可預謀今揣敵人未可輕動諸君更籌之時諸將皆欲戰鄩默然他日復召諸將列坐軍門人具河水一器因命飲之衆未測其旨或飲或辭鄩曰一器而難若是滔滔河流可勝既乎衆皆失色居數日鄩率萬餘人薄鎮定之營時鄩軍奄至上下騰亂殺獲甚衆少頃晉軍繼至乃退二年三月鄩自莘引軍襲魏州與晉王戰於故元城王師敗績鄩脫身南奔自黎陽濟河至滑州尋授滑州節度使詔屯黎陽三年二月晉王悉衆來攻黎陽鄩拒之而退及鄩歸闕再授開封尹領鎮南軍節度使其年河朔失守朝廷歸咎於鄩鄩亦不自安上表避位九月落平章事授亳州團練使𩗗州原本作高州今據歐陽史改正影庫本粘籤屬淮人寇蔡潁亳三郡鄩奉命渡淮至霍丘大殲賊黨五年兗州節度使張萬進反北結晉人為援末帝遣鄩攻之鄩為兗州安撫制置使是冬萬進危小將邢師遇潛應王師遂拔其城梟萬進首以獻十一月制授泰寧軍節度使檢校太尉同平章事六年六月授河東道招討使與華州尹皓攻取同州先是河中朱友謙襲取同州以其子令德為留後表請旄鉞末帝怒命鄩討之其年九月晉將李嗣昭率師來援戰於城下王師不利敗兵走河南橋梁陷溺死者甚衆鄩以餘衆退保華州羅文寨先是鄩與河北朱友謙為婚家及王師西討行次陝州鄩遣使齎檄與友謙諭以禍福大計誘令歸國友謙不從如是停留月餘尹皓段凝輩素忌鄩遂搆其罪言鄩逗留養寇俾俟援兵末帝以為然及兵敗詔歸洛河南尹張宗奭承朝廷密旨逼令飲酖而卒案通鑑考異引莊宗實錄云憂恚發病卒通鑑從薛史時年六十四詔贈中書令子遂凝遂雍別有傳永樂大典卷一萬八千一百二十六賀瓌字光遠濮陽人也曾祖延以瓌貴贈左監門上將軍祖華贈左散騎常侍父仲元贈刑部尚書瓌少倜儻負雄勇之志遇世亂入軍朱瑄為濮州刺史兼鄆州馬步軍都指揮使拔為小將唐光啟初鄆州三軍推瑄為留後以瓌為馬步軍都指揮使表授檢校工部尚書及瑄與太祖搆隙瓌受瑄命數領軍於境上乾寧二年十月太祖親征兗鄆十一月瑄遣瓌與太原將何懷寶率兵萬餘人以援朱瑾師次待賓館待賓館原本作待實館今據通鑑改正影庫本粘籤斷我糧運太祖偵知之自中都引軍夜馳百餘里遲明至鉅野東與瓌等接戰兗人大敗瓌竄於棘塚之上大呼曰我是鄆州都將賀瓌願就擒幸勿傷也太祖聞之馳騎至塚前遂擒之幷獲何懷寶及將吏數十人徇於兗壁之下悉命戮之唯留瓌一人釋縛置之麾下尋署為教練使奏授檢校左僕射瓌感太祖全宥之恩私誓以身報國天復中預平青州王師範以功授曹州刺史兼先鋒都指揮使加檢校司空天祐二年與楊師厚從太祖平荊襄授荊南兩使留後未幾徵還為行營左廂步軍都指揮使開平二年十月授左龍虎軍馬步都指揮使十二月改左衞上將軍充六軍馬步都虞候三年五月轉右龍虎統軍未幾加檢校司徒邢州團練使四年二月改澤州刺史充昭義軍節度留後檢校太保進封開國侯乾化二年七月授相州刺史尋加檢校太傅有頃轉左龍虎統軍案歐陽史太祖即位累遷相州刺史末帝時遷左龍虎統軍據薛史瓌遷統軍不繫年月歐陽史特以太祖時左龍虎統軍有袁象先而揣度言之耳貞明二年慶州叛為李繼陟所據瓌以本官充西面行營馬步軍都指揮使兼諸軍都虞候與張筠案原本訛張節今據通鑑考異改正舊五代史考異破涇鳳之衆三萬下寧衍二州三年秋慶州平十二月瓌以功授滑州宣義軍節度使依前檢校太傅加同平章事尋授北面行營招討使四年春晉人取楊劉城據之八月瓌與許州節度使謝彥章領大軍營於濮州之行臺村對壘數月一日晉王以輕騎挑戰瓌與彥章發伏兵奮擊晉王僅以身免先是瓌與彥章不協是歲冬十二月復為諸軍都虞候朱珪所搆瓌乃伏甲士殺彥章及濮州刺史孟審澄別將侯溫裕等於軍案玉堂閒話作侯溫疑傳聞之訛舊五代史考異案玉堂閒話梁朝與河北相持之際有偏將侯溫者軍中號為驍勇賀瓌為統率專制忌克以事殺之考侯溫裕作侯溫蓋傳聞之誤孔本以謀叛聞是月瓌與晉人大戰於胡柳陂晉人敗績臨陣斬晉將周陽五既晡瓌軍亦敗案歐陽史瓌陣無石山日暮晉軍攻之瓌軍下山擊晉軍瓌大敗據薛史莊宗紀與王建及傳乃是山為晉軍所奪晉軍下山擊瓌軍瓌大敗與歐陽史異五年春正月晉人城德勝夾河為柵四月瓌率大軍攻其南柵以艨艟戰艦阨其中流晉人斷我艨艟濟軍以援南柵瓌退軍於行臺尋以疾卒時年六十二詔贈侍中長子光圖仕後唐為供奉官永樂大典卷一萬八千一百二十七康懷英兗州人也本名懷貞避末帝御名故改之始以驍勇事朱瑾為列校唐乾寧四年春太祖既平鄆命葛從周乘勝急攻兗州時朱瑾在豐沛間搜索糧餉留懷英守其城及從周軍至懷英聞鄆失守乃出降太祖素聞其名得之甚喜尋署為軍校光化元年秋從氏叔琮伐襄漢懷英以一軍攻下鄧州三年從征河朔佐張存敬敗燕軍於易水之上天復元年冬太祖率師迎昭宗於鳳翔時李茂貞遣大將符道昭領兵萬餘屯武功以拒太祖命諸軍擊之以懷英為前鋒領衆先登一鼓而大破之擄甲士六千餘人奪馬二千匹翌日太祖方至顧左右曰邑名武功今首盪逆黨真武功也乃召懷英大加奬激仍以駿馬珍器賜之二年四月符道昭復領大軍屯於虢縣之漠谷其建寨之所前臨巨澗後倚峻阜險不可升太祖遣懷英提騎數千急擊之道昭以懷英兵寡有俯視之意乃率甲士萬人絕澗以挑戰懷英始以千騎夜鬬戰酣發伏以擊之岐軍大敗秋八月鄜帥李周彝屯軍於三原以援鳳翔太祖命懷英討之周彝拔軍而遁追至梨園因攻下翟州擒其守來獻俄而岐軍屯奉天太祖令懷英寨於岐軍之東北以備敵人一夕岐軍大至急攻其營懷英以夜中不可驚動諸軍獨以二千餘人抗數萬之衆自乙夜至四鼓身被十餘創岐軍不勝而退昭宗還京賜迎鑾毅勇功臣是歲淮人聞青兗之叛遣兵數萬以寇宿州太祖命懷英馳騎以救之淮人遁去即以懷英為權知宿州刺史天祐三年冬佐劉知俊破邠鳳之衆五萬於美原收五十餘寨乘勝引軍攻下鄜州以功授陝州節度使太祖受禪加檢校太保開平元年夏命將大軍以伐潞州將行太祖謂懷英曰卿位居上將勇冠三軍向來破敵摧鋒動無遺悔至於高爵重祿我亦無負於卿夫忠臣事君有死無二韓信所謂漢王載我以車衣我以衣食我以食食人之祿死人之憂我每思韓信此言真忠烈丈夫耳如丁會受我待遇之恩不謂不至懷黃拖紫裂土分茅設令木石偶人須感恩義一朝反噬倒戈授人苟有天道明神安能容此大凡辜恩負理忠良不為我今掃境內委卿卿當勉思竭盡况晉人新得上黨衆心未協和以十萬之師一舉可克予當置酒高會望卿歌舞凱旋懷英惶恐而退六月懷英領大軍至潞率衆晝夜攻城半月之間機巧百變懷英懼太祖之言期於必取乃築壘環城濬鑿池塹然而屢為晉將周德威騎軍所撓懷英不敢即戰太祖乃以李思安代之降為行營都虞候夏五月晉王率蕃漢大軍攻下夾城懷英逃歸詣銀臺門待罪太祖宥之改授右衞上將軍三年夏命為侍衞諸軍都指揮使尋出為陝州節度使兼西路行營副招討使及劉知俊奔鳳翔引岐軍以圖靈武太祖遣懷英率兵救之師次長城嶺為知俊邀擊懷英敗歸案歐陽史云還至昇平知俊掩擊之懷英大敗據通鑑懷貞等還至三水知俊遣兵據險邀之左龍驤軍使壽張王彥章力戰懷貞等乃得過懷貞與裨將李德遇許從實王審權分道而行皆與援兵不相值至昇平劉知俊伏兵山口懷貞大敗僅以身免德遇等軍皆沒蓋懷英過長城嶺之險已為邀擊後又敗於昇平也四年春移華州節度使乾化二年秋命為河中行營都招討使與晉軍戰於白徑嶺敗歸於陝末帝嗣位以岐軍屢犯秦雍命懷英為永平軍節度使大安尹累加官至中書令貞明中卒於鎮永樂大典卷一萬八千一百二十六王景仁案景仁本名茂章避梁諱改焉詳見通鑑注廬州合淝人材質魁偉性暴率無威儀善用槊頗推驍悍在淮南累職為都指揮使楊行密偽署宣州節度使行密死子渥自立忌其勇悍且有私憾欲害之案新唐書楊行密傳渥求茂章親兵不得宣輦帷帟以行茂章嫚罵不與踰年遣兵五千襲之茂章奔杭州與薛史異景仁棄宛陵以腹心百人歸吳越王錢鏐鏐辟為兩府行軍司馬具以狀聞太祖復命遙領宣州節度使檢校太傅同平章事案舊唐書天祐三年十二月詔淮南偽署宣歙觀察使檢校司徒王茂章可金紫光祿大夫檢校太保從錢鏐請也所載官爵與薛史異吳越備史作景仁領寧國軍節度使與薛史同舊五代史考異鏐以淮寇終為巨患欲速平之命景仁奉表至闕面陳水陸之計請合禁旅太祖異禮待之頒賜殊厚顧曰待我平代北寇當盡以王師付汝南討於是留京師每預丞相行列劉知俊之叛也從駕至陝始佐楊師厚西入關兵未交知俊棄馮翊走進克寸雍華降王建張君練頗預戰有功太祖嘉之時鎮定作逆朋附蕃醜遂擢為上將付步騎十萬為北面行營都招討使開平二年正月二日與晉軍戰於柏鄉王師敗績太祖怒甚拘之私第然以兩浙元勳所薦且欲收其後効止落平章事罷兵柄而已案歐陽史景仁及晉人戰大敗於柏鄉景仁歸訴於太祖太祖曰吾亦知之蓋韓勍李思安輕汝為客而不從節度爾與薛史異數月復其官爵末帝即位復用為南面北面行營招討應接使以兵萬餘人伐壽州至霍丘接戰案歐陽史作戰於霍山通鑑從薛史舊五代史考異擒賊將袁藂王彥威王璠等送京師俄而朱瑾以大軍至景仁力戰不屈常以數騎身先奮擊寇不敢逼乃引兵還及濟淮復為殿軍故不甚衄瑾亦不敢北渡案九國志朱景傳王茂章來寇度淮水可涉處立表識之景易置於深潭水中立表浮木之上茂章軍敗望表而涉溺死者大半積其尸為京觀是景仁實以敗歸傳云師不甚衄蓋梁史為景仁諱言也及歸病疽而卒詔贈太尉永樂大典卷六千八百五十史臣曰劉鄩以機略自負賀瓌以忠毅見稱懷英以驍勇佐時景仁以貞純許國較其器業皆名將也然雖有善戰之勞亦有敗軍之咎則知兵無常勝豈虛言哉然鄩之據兗州也盡誠於師範比跡於英公方之數侯加一等矣永樂大典卷六千八百五十
