body:
  text: 舊五代史卷八十六晉書十二后妃列傳第一案薛史晉后妃傳永樂大典已佚今取歐陽史晉家人傳與五代會要諸書互校則事多舛誤奴李太后在長興中進封魏國公主清泰二年改封晉國長公主而歐陽史則云清泰二年封魏國長公主少帝冊故妃張氏為皇后而歐陽史不載其姓氏蓋歐陽史以文章自負祇取薛史原文任意刪削未嘗考其事之本末也今采五代會要通鑑契丹國志文獻通考所載晉后妃事分註互綴以補薛史之闕且以備歐陽史之考證焉高祖皇后李氏案五代會要云高祖皇后李氏唐明宗第三女天成三年四月封永寧公主長興四年九月進封魏國公主清泰二年九月改封晉國長公主至天福六年十一月尊為皇后七年六月尊為皇太后開運四年三月與少帝同遷于契丹之黃龍府漢乾祐三年八月二十五日崩於蕃中之建丘文獻通考云天福二年有司請立皇后帝以宗廟未立謙抑未遑帝崩出帝即位乃尊為皇太后契丹國志載晉出帝降表云孫男臣重貴言頃者唐運告終中原失柄數窮否極天陷地傾先人有田一成有衆一旅兵連禍結力屈勢孤翁皇帝救難摧鋒興利除害躬擐甲冑深入寇場犯露蒙霜度鴈門之險馳風掣電行中冀之誅黃金戊一麾天下大定勢凌宇宙義感神明功成不居遂興晉祚則翁皇帝大有造于石氏也旋屬天降鞠凶先君即世臣仰承遺旨得紹前基諒闇之初荒迷失次凡有軍國重事皆委將相大臣至於擅繼宗祧即非稟命輕發文字輒敢抗尊自起釁端果貽赫怒禍至神惑運盡天亡十萬兵徒望風束手億兆黎庶延頸歸心臣負義包羞貪生忍恥自貽顛覆上累祖宗偷度晨昏苟存視息翁皇帝若惠顧疇昔稍霽雷霆未賜顯誅不絕先祀則百口荷更生之德一門銜罔報之恩雖所願焉非敢望也臣與太后妻馮氏於郊野面縛俟命皇太后降表云晉室皇太后媳婦李氏妾言張彥澤傅住兒等至伏蒙皇帝阿翁降書安撫者妾伏念先皇帝頃在幷汾適逢屯難危同累卵急若倒懸智勇俱窮朝夕不保皇帝阿翁發自冀北親抵河東跋履山川踰越險阻立平巨孽遂定中原救石氏之覆亡立晉朝之社稷不幸先帝厭代嗣子承祧不能繼好息民而反虧恩辜義兵戈屢動駟馬難追戚實自貽咎將誰執今穹旻震怒中外攜離上將牽羊六師解甲妾舉宗負釁視景偷生惶惑之中撫問斯至明宣恩旨曲賜含容慰諭丁寧神爽飛越豈謂已垂之命忽蒙更生之恩省罪責躬九死未報今遣孫男延煦延寶奉表請罪陳謝以聞又帝紀云會同十一年正月朔出帝太后迎遼帝于封丘門外帝辭不見館於封禪寺遣其將崔廷勳以兵守之是時雨雪連旬外無供億上下凍餒太后使人謂寺僧曰吾嘗於此飯僧數萬今日豈不相憫耶僧辭以遼帝之意難測不敢獻食少帝陰祈守者乃稍得食遼降少帝為光祿大夫檢校太尉封負義侯遷于黃龍府即慕容氏和龍城也帝使人謂太后曰吾聞爾子重貴不從母教而至於此可求自便勿與俱行太后答曰重貴事妾謹慎所失者違先君之志絕兩國之歡然重貴此去幸蒙大惠全身保家母不隨子欲何所歸于是太后與馮后皇弟重睿子延煦延寶舉族從晉侯而北天祿元年四月帝至遼陽晉侯白衣紗帽與太后皇后上謁于帳中五月帝上陘取晉侯所從宦者十五人東西班十五人及皇子延煦而去八月帝下陘太后自馳至霸州謁帝求于漢兒城側賜地耕牧以為生許之帝以太后自行十餘日遣與延煦俱還遼陽二年徙晉侯太后于建州三年秋八月晉李太后病無醫藥仰天號泣戟手罵杜重威李守貞曰吾死不置汝病亟謂晉侯曰吾死焚其骨送范陽佛寺無使吾為邊地鬼也太妃安氏案文獻通考云安太妃代北人不知其世家生出帝帝立尊為皇太妃契丹國志云天祿二年春二月徙晉侯太后于建州中途安太妃卒遺命晉侯曰焚骨為灰南向颺之庶幾遺魂得返中國也少帝皇后張氏案五代會要云天福八年十月追冊考薛史少帝紀云追冊故妃張氏為皇后張從訓傳亦云高祖鎮太原為少帝娶從訓長女為妃是薛史當有張皇后傳歐陽史削而不書殊為疏矣皇后馮氏案五代會要云開運三年十月冊通鑑云天福八年冬十月戊申立吳國夫人馮氏為皇后初高帝愛少弟重胤養以為子及留守鄴都娶副留守馮濛女為其婦重胤早卒馮夫人寡居有美色帝見而悅之高祖崩梓宮在殯帝遂納之羣臣皆賀帝謂馮道等曰皇太后之命與卿等不任大慶羣臣出帝與夫人酣飲過梓宮前醊而告曰皇太后之命與先帝不任大慶左右失笑帝亦自笑謂左右曰我今日作新婿何如夫人與左右皆大笑太后雖恚而無如之何既正位中宮頗預政事后兄玉時為禮部郎中鹽鐵判官帝驟擢用至端明殿學士戶部侍郎與議政事文獻通考云契丹入京師后隨帝北遷不知所終又案五代會要載晉內職云高祖潁川郡夫人蔡氏天福三年八月勅少帝寶省李氏封隴西郡夫人張氏封春宮夫人充皇后宮尚宮並天福八年十二月二日勅前左御正齊國夫人吳氏進封燕國夫人書省魏國夫人崔氏進封梁國夫人前右御正天水郡夫人趙氏封衞國夫人司簿孟氏封汧國夫人前司簿李氏封隴西郡夫人弟子院使齊氏大使郭氏副使賈氏並封本縣君太后宮尚宮陳留郡夫人何氏進封鄭國夫人河南郡夫人元氏進封齊國夫人知客出使夫人石氏封武威郡夫人春宮姚氏常氏焦氏王氏陶氏魏氏趙氏七人並超封郡夫人寶省婉美趙氏封天水郡夫人武氏以下十一人並授春宮天福八年十一月勅清河郡夫人張氏彭城郡夫人劉氏並充太后宮司寶南陽郡夫人路氏出使夫人趙氏白氏並充皇后宮司賓開運二年八月勅又按薛史不載外戚傳據五代會要云晉高祖長女長安公主降楊承祚天福二年五月封至六年五月卒追封秦國公主至七年九月又追封梁國長公主從長女高平縣主第二女新平縣主第三女千乘縣主孫女永慶縣主並天福七年五月封今附識于此
