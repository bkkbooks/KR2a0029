body:
  text: 舊五代史卷二十四梁書二十四列傳第十四李珽字公度隴西燉煌人五世祖忠懿公憕有大節見唐史父縠仕懿僖朝官至右諫議大夫珽聰悟有才學尤工詞賦僖宗朝晉公王鐸提兵柄鎮滑臺滑臺原本作體臺今據文改正影庫本粘籤縠賓席鐸見珽大賞歎之年二十四登進士第解褐授校書郎拜監察御史俄丁內艱先是父旅殯在遠家貧無以襄事與弟琪當臘雪以單縗扶杖銜哀告人由是兩克遷祔而珽日不過食一溢恆羸臥喪廬中不能興大為時賢所歎憂闋再徵為御史以瘠不起成汭之鎮荊州辟為掌書記踰時乃就天復中淮寇大舉圍夏口逼巴陵太祖患之飛命成汭率水軍十萬援于鄂珽入言曰今舳艫容介士千人載稻倍之緩急不可動吳人剽輕若為所絆則武陵武安皆我之讎也將有後慮不如遣驍將屯巴陵大軍對岸一月不與戰則吳寇糧絕而鄂州圍解矣汭性剛決不聽淮人果乘風縱火舟盡焚兵盡溺汭亦自沈於江朗人潭人遂入荊渚一如所料未幾襄帥趙匡凝復奏為掌記入為左補闕又明年太祖為元帥以襄陽貳於己率兵擊破之趙匡凝奔揚州太祖復署珽為天平軍掌書記天平原本作天申今據新唐書改正影庫本粘籤一日大會將佐指珽曰此真書記也滄州節度使劉守文拒命太祖引兵十餘萬圍之久而未下乃召珽草檄珽即就外次筆不停綴登時而成大為太祖嗟賞受禪之歲宰臣除為考功員外郎知制誥珽揣太祖未欲首以舊僚超拜清顯三上章固辭優詔褒允尋以本官監曹州事曹去京數舍吏民豪猾前後十餘政未有善罷者珽在任期歲衆庶以寧入為兵部郎中崇政院學士未幾以許帥馮行襲疾甚出為許州留後先是行襲有牙兵二千皆蔡人也太祖深以為憂乃遣珽馳往以伺察之珽至傳舍召將吏親加撫慰行襲欲使人代受詔珽曰東首加朝服禮也乃於臥內宣詔令善自補養苟有不諱子孫俱保後福行襲泣謝遂解二印以授珽代掌軍府軍太祖覽奏曰予固知珽必辦吾事行襲門戶不朽矣乃以珽為匡國軍留後尋徵為左諫議大夫兼宣徽副使從征至魏縣過內黃因侍立於行廄太祖顧曰此何故名內黃珽曰河南有外黃小黃案歐陽史改小黃為下黃困學紀聞引漢書地理志陳留有外黃小黃縣以五代史記為誤改也舊五代史考異小黃歐陽史作下黃考困學紀聞云五代通錄李珽曰河南有外黃小黃漢地理志陳留有外黃小黃縣五代史記改小黃為下黃誤也當從通錄殿本故此有內黃又曰在何處對曰秦有外黃都尉案原本作郡尉今據漢書地理志及歐陽史改正舊五代史考異理外黃有故墉今在雍丘小黃為高齊所廢其故墉今在陳留太祖稱奬數四及庶人友珪篡位除右散騎常侍充侍講學士案歐陽史作侍講舊五代史考異內討之日軍士大擾珽其夕為亂兵所傷卒於洛陽珽性孝友與弟琪有敦睦之愛為搢紳所稱永樂大典卷一萬三百八十八案歐陽史有裴迪韋震傳今原文已佚無可采補殿本盧曾字孝伯其先范陽人也頗好書有所執守始為齊州防禦使朱瓊從事案新唐書通鑑與薛史梁紀皆稱朱瓊為齊州刺史惟盧曾傳作防禦使疑有舛誤瓊降預其謀與之皆來瓊沒太祖辟為宣義幕職曾性忠狷好貢直又不能取容於衆每勳府讌語稍洽曾率然糾正輒又忤旨左長直軍使劉捍委任方重曾亦不能平冀王友謙初定陝府命曾往議事有使院小將從行嗜酒荒逸過度曾復命欲發其罪致疏於袖中累日未果言小將恐事洩先誣告曾使酒幾敗軍事劉捍因證之由是罷職歸於齊之別墅俄而王師範起兵叛太祖促召曾謂之曰子能緩頰說青州使無背盟吾不負子矣曾持檄以往既至青師範囚之送於淮南遇害後太祖暴師範之罪曰喪我骨肉殺我賓僚遂族誅之因召曾二子皆授以官永樂大典卷二千二百十二孫隲滑臺人嗜學知書微有辭筆唐光啟中魏博從事公乘億以女妻之因教以牋奏程式時中原多難文章之士縮影竄跡不自顯億既死魏帥以章表牋疏淹積兼月不能發一字或以隲為言即署本職主奏記事累遷職自支使掌記至節度判官奏官自校書御史郎官中丞檢校常侍至兵部尚書太祖御天下念潛龍時隲奉其主好問往來數十返甚錄之開平三年除右諫議大夫滿歲遷左散騎常侍隲雅好聚書有六經漢史洎百家之言凡數千卷皆簡翰精至披勘詳定得暇即朝夕躭翫曾無少怠乾化二年春太祖將議北巡選朝士三十餘人扈從二月甲子車駕發自洛陽禺中次白馬頓召文武官就食以從臣未集駐蹕以俟之命飛騎促於道而隲與諫議大夫張衍兵部郎中張儁等累刻方至太祖性本卞急因茲大怒並格殺於前墀永樂大典卷三千五百六十案通鑑考異引梁祖實錄云賜自盡通鑑從莊宗實錄作撲殺之舊五代史考異張儁字彥臣祖父咸有聞於時儁少孤自修飾善為五言詩其警句頗為人所稱唐廣明中黃巢犯京師天子幸蜀士皆竄伏窟穴以保其生儁亦晦跡浮泛不失其道及僖宗還京師由校書郎西畿尉登朝為御史補闕起居郎起居郎原本脫郎字今據文增入影庫本粘籤司勳員外萬年縣令以事黜官峽中將十年太祖即位用宰臣薛貽矩為鹽鐵使儁與貽矩同年登第甚知其才即奏為鹽鐵判官遷職為禮部郎中兼職如故乾元二年二月扈從後至與孫隲張衍同日遇禍於白馬頓永樂大典卷六千三百五十張衍字元用河南尹魏王宗奭之猶子也其父死於兵間衍樂讀書為儒始以經學就舉不中選時諫議大夫鄭徽退居洛陽以女妻之遂令應辭科不數上登第唐昭宗東遷以宗奭勳力隆峻衍由校書郎拜左拾遺旋召為翰林學士太祖即位罷之特拜考功郎中俄遷右諫議大夫衍巧生業樂積聚太祖將北伐頗以扈從間糜耗力用繫意屢干託宰執求免是行太祖微聞之又屬應召稽晚與孫隲等同日遇禍永樂大典卷六千三百五十杜荀鶴池州人案辛文房唐才子傳荀鶴字彥之牧之微子也善為詩辭句切理為時所許既擢第復還舊山案唐才子傳荀鶴嘗謁梁王朱全忠與之坐忽無雲而雨王以為天泣不祥命作詩稱意王喜之荀鶴寒進連敗文場甚苦至是送春官大順二年裴贄侍郎放第八人登科正月十日放榜正荀鶴生朝也王希羽獻詩曰金榜曉懸生世日玉書潛記上昇時九華山色高千尺未必高於第八枝又唐新纂云荀鶴舉進士及第東歸過夷門獻梁太祖詩句云四海九州空第一不同諸鎮府封王是則荀鶴之受知於梁祖舊矣不待田頵之箋問而始被遇也時田頵在宣州甚重之頵將起兵乃陰令以箋問至太祖遇之頗厚及頵遇禍太祖以其才表之尋授翰林學士主客員外郎既而恃太祖之勢凡搢紳間己所不悅者日屈指怒數將謀盡殺之苞蓄未及泄丁重疾旬日而卒永樂大典卷一萬五千七百三十案唐才子傳荀鶴以天祐元年卒北夢瑣言又作梁受禪後拜翰林學士五日而卒未詳孰是羅隱案唐才子傳隱字昭諫舊五代史考異餘杭人案澗泉日記作新城人詩名於天下尤長於詠史然多所譏諷以故不中第大為唐宰相鄭畋李蔚所知隱雖負文稱然貌古而陋畋女幼有文性嘗覽隱詩卷諷誦不已畋疑其女有慕才之意一日隱至第鄭女垂簾而窺之自是絕不詠其詩唐廣明中因亂歸鄉里節度使錢鏐辟為從事案唐新纂羅隱初為吳令後以羅紹威薦為錢鏐所辟據薛史則隱自歸里即為鏐從事後復為紹威薦也與新纂異開平初太祖以右諫議大夫徵不至魏博節度使羅紹威密表推薦乃授給事中年八十餘終於錢塘案澗泉日記云唐光啟三年吳越王表奏為錢塘令遷著作郎辟掌書記天祐三年充判官梁開平二年授給事中三年遷發運使是年卒葬於定山鄉金部郎中沈崧銘其墓舊五代史考異有文集數卷行於世永樂大典卷五千六百七十八案唐才子傳云隱所著讒書讒本淮海寓言湘南應用集甲乙集外集啟事等並行于世舊五代史考異五代史補羅隱在科場恃才傲物尤為公卿所惡故六舉不第時長安有羅尊師者深於相術隱以貌陋恐為相術所棄每與尊師接談常自大以沮之及其累遭黜落不得已始往問焉尊師笑曰貧道知之久矣但以吾子決在一第未可與語今日之事貧道敢有所隱乎且吾子之於一第也貧道觀之雖首冠羣英亦不過簿尉爾若能罷舉東歸霸國以求用則必富且貴矣兩途吾子宜自擇之隱懵然不知所措者數日隣居有賣飯媼見隱驚曰何辭色之沮喪如此莫有不決之事否隱謂知之因盡以尊師之言告之媼歎曰秀才何自迷甚焉且天下皆知羅隱何須一第然後為得哉不如急取富貴則老婆之願也隱聞之釋然遂歸錢塘時錢鏐方得兩浙置之幕府使典軍中書檄其後官給事中初隱罷上中書之日費窘因抵魏謁鄴王羅紹威將入其境先貽書其家世鄴王為姪幕府僚吏見其書皆怒曰羅隱一布衣爾而姪視大王其可乎紹威素重士且曰羅隱名振天下王公大夫多為所薄今惠然肯顧其何以勝得在姪行為幸多矣敢不致恭諸公慎勿言於是擁旆郊迎一見即拜隱亦不讓及將行紹威贈以百萬他物稱是仍致書於鏐謂叔父鏐首用之曹唐郴州人少好道為大小遊仙詩各百篇又著紫府玄珠一卷皆三清十極紀勝之事其遊仙之句則有漢武帝宴西王母詩云花影暗回三殿月樹聲深鎖九門霜又云樹底有天春寂寂人間無路月茫茫皆為士林所稱其後遊信州館於開元寺三學院一旦臥疾衆僧忽見二青衣緩步而至且四向顧視相謂曰只此便是樹底有天春寂寂人間無路月茫茫言訖直入唐之臥室衆僧驚異亦隨之而入踰閾而青衣不復見但見唐已殂矣先是唐與羅隱相遇隱有題牡丹詩云若教解語應傾國任是無情亦動人唐因戲隱曰此非賦牡丹乃題女子障耳隱應聲曰猶勝足下鬼詩唐曰其詞安在隱曰只樹底有天春寂寂人間無路月茫茫得非鬼詩唐無言以對至是青衣亦援引此句而唐尋卒則隱之言豈偶然哉仇殷不知何郡人也開平中仕至欽天監明於象緯歷數藝術精密近無其比光化中太祖在滑遣密王友倫以兵三萬禦幽州之師十餘萬深慮其不敵召殷問曰陣可行乎曰其十四日過禺中乎又問之曰賊敗塗地又曰既望當見捷書果如其言不失晷刻太祖之在長蘆也諸將請攻壁號令軍中人負藁二圍置千積俄而雲集殷曰何用或以所謀告之殷曰我占矣不見攻壁象無乃自退乎翌日有騎馳報丁會以潞州叛太祖令盡焚其藁而還不克攻開平中殷一日朝罷過崇政院使敬翔直閤翔問之曰月犯房次星其逼若綴是何祥也曰常度耳殷欲不言既過數步自度不可默乃反言曰三兩日當有不順語至無或驟恐宜先白上知既二日陝府奏同州劉知俊閉關作叛初王景仁之出師也殷上言太陰虧不利深入太祖遽遣使止之已敗於柏鄉矣案北夢瑣言云柏鄉狼狽梁祖亦自咎曰違犯天道不取仇殷之言也薛史以為太祖遽遣使止之與北夢瑣言異殷所見觸類如是不可備錄然而畏慎特甚居常寢默未嘗敢顯言縱言事跡唯其語音不可盡曉以故屢貽責罰後卒於官永樂大典卷一萬四千八百四段深不知何許人開平中以善醫待詔於翰林時太祖抱疾久之其溲甚濁僧曉微侍藥有徵賜紫衣師號錫賚甚厚頃之疾發曉微剝服色去師號因召深問曰疾愈復作草藥不足恃也我左右粒石而効者衆矣服之如何深對曰臣嘗奉詔診切陛下積憂勤失調護脈代芤而心益虛臣以為宜先治心心和平而溲變清當進飲劑而不當粒石也臣謹案太倉公傳曰中熱不溲者不可服石石性精悍有大毒凡餌毒藥如甲兵不得已而用之非有危殆不可服也太祖善之令進飲劑疾稍愈乃以幣帛賜之永樂大典卷二萬一千六百九
