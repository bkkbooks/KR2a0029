body:
  text: 詔翰林學士今後逐日起居當直者仍赴晚朝是月江南李景殺其臣偽太傅中書令宋齊丘偽兵部侍郎陳覺偽鎮南軍節度副使李徵古等初帝之南征也吳人大懼覺與徵古皆齊丘門人因進說於景請委國事於齊丘景繇是御之及吳人遣鍾謨李德明奉表至行在帝尋遣德明復命於金陵德明因說李景請割江北之地求和於我而陳覺李徵古等以德明為賣國請戮之景遂殺德明及江南內附帝放鍾謨南歸謨本德明之黨也因譖齊丘等故齊丘等得罪放齊丘歸九華山覺等貶官尋並害之景既誅齊丘等令鍾謨到闕具言其事故書永樂大典卷八千九百八十四詔翰林學士今後逐日起居當直者仍赴晚朝是月江南李景殺其臣偽太傅中書令宋齊丘偽兵部侍郎陳覺偽鎮南軍節度副使李徵古等初帝之南征也吳人大懼覺與徵古皆齊丘門人因進說於景請委國事於齊丘景繇是御之及吳人遣鍾謨李德明奉表至行在帝尋遣德明復命於金陵德明因說李景請割江北之地求和於我而陳覺李徵古等以德明為賣國請戮之景遂殺德明及江南內附帝放鍾謨南歸謨本德明之黨也因譖齊丘等故齊丘等得罪放齊丘歸九華山覺等貶官尋並害之景既誅齊丘等令鍾謨到闕具言其事故書永樂大典卷八千九百八十四詔翰林學士今後逐日起居當直者仍赴晚朝是月江南李景殺其臣偽太傅中書令宋齊丘偽兵部侍郎陳覺偽鎮南軍節度副使李徵古等初帝之南征也吳人大懼覺與徵古皆齊丘門人因進說於景請委國事於齊丘景繇是御之及吳人遣鍾謨李德明奉表至行在帝尋遣德明復命於金陵德明因說李景請割江北之地求和於我而陳覺李徵古等以德明為賣國請戮之景遂殺德明及江南內附帝放鍾謨南歸謨本德明之黨也因譖齊丘等故齊丘等得罪放齊丘歸九華山覺等貶官尋並害之景既誅齊丘等令鍾謨到闕具言其事故書永樂大典卷八千九百八十四詔翰林學士今後逐日起居當直者仍赴晚朝是月江南李景殺其臣偽太傅中書令宋齊丘偽兵部侍郎陳覺偽鎮南軍節度副使李徵古等初帝之南征也吳人大懼覺與徵古皆齊丘門人因進說於景請委國事於齊丘景繇是御之及吳人遣鍾謨李德明奉表至行在帝尋遣德明復命於金陵德明因說李景請割江北之地求和於我而陳覺李徵古等以德明為賣國請戮之景遂殺德明及江南內附帝放鍾謨南歸謨本德明之黨也因譖齊丘等故齊丘等得罪放齊丘歸九華山覺等貶官尋並害之景既誅齊丘等令鍾謨到闕具言其事故書永樂大典卷八千九百八十四詔翰林學士今後逐日起居當直者仍赴晚朝是月江南李景殺其臣偽太傅中書令宋齊丘偽兵部侍郎陳覺偽鎮南軍節度副使李徵古等初帝之南征也吳人大懼覺與徵古皆齊丘門人因進說於景請委國事於齊丘景繇是御之及吳人遣鍾謨李德明奉表至行在帝尋遣德明復命於金陵德明因說李景請割江北之地求和於我而陳覺李徵古等以德明為賣國請戮之景遂殺德明及江南內附帝放鍾謨南歸謨本德明之黨也因譖齊丘等故齊丘等得罪放齊丘歸九華山覺等貶官尋並害之景既誅齊丘等令鍾謨到闕具言其事故書永樂大典卷八千九百八十四詔翰林學士今後逐日起居當直者仍赴晚朝是月江南李景殺其臣偽太傅中書令宋齊丘偽兵部侍郎陳覺偽鎮南軍節度副使李徵古等初帝之南征也吳人大懼覺與徵古皆齊丘門人因進說於景請委國事於齊丘景繇是御之及吳人遣鍾謨李德明奉表至行在帝尋遣德明復命於金陵德明因說李景請割江北之地求和於我而陳覺李徵古等以德明為賣國請戮之景遂殺德明及江南內附帝放鍾謨南歸謨本德明之黨也因譖齊丘等故齊丘等得罪放齊丘歸九華山覺等貶官尋並害之景既誅齊丘等令鍾謨到闕具言其事故書永樂大典卷八千九百八十四詔翰林學士今後逐日起居當直者仍赴晚朝是月江南李景殺其臣偽太傅中書令宋齊丘偽兵部侍郎陳覺偽鎮南軍節度副使李徵古等初帝之南征也吳人大懼覺與徵古皆齊丘門人因進說於景請委國事於齊丘景繇是御之及吳人遣鍾謨李德明奉表至行在帝尋遣德明復命於金陵德明因說李景請割江北之地求和於我而陳覺李徵古等以德明為賣國請戮之景遂殺德明及江南內附帝放鍾謨南歸謨本德明之黨也因譖齊丘等故齊丘等得罪放齊丘歸九華山覺等貶官尋並害之景既誅齊丘等令鍾謨到闕具言其事故書永樂大典卷八千九百八十四詔翰林學士今後逐日起居當直者仍赴晚朝是月江南李景殺其臣偽太傅中書令宋齊丘偽兵部侍郎陳覺偽鎮南軍節度副使李徵古等初帝之南征也吳人大懼覺與徵古皆齊丘門人因進說於景請委國事於齊丘景繇是御之及吳人遣鍾謨李德明奉表至行在帝尋遣德明復命於金陵德明因說李景請割江北之地求和於我而陳覺李徵古等以德明為賣國請戮之景遂殺德明及江南內附帝放鍾謨南歸謨本德明之黨也因譖齊丘等故齊丘等得罪放齊丘歸九華山覺等貶官尋並害之景既誅齊丘等令鍾謨到闕具言其事故書永樂大典卷八千九百八十四詔翰林學士今後逐日起居當直者仍赴晚朝是月江南李景殺其臣偽太傅中書令宋齊丘偽兵部侍郎陳覺偽鎮南軍節度副使李徵古等初帝之南征也吳人大懼覺與徵古皆齊丘門人因進說於景請委國事於齊丘景繇是御之及吳人遣鍾謨李德明奉表至行在帝尋遣德明復命於金陵德明因說李景請割江北之地求和於我而陳覺李徵古等以德明為賣國請戮之景遂殺德明及江南內附帝放鍾謨南歸謨本德明之黨也因譖齊丘等故齊丘等得罪放齊丘歸九華山覺等貶官