body:
  text: 舊五代史卷三十九唐書十五明宗紀第五天成三年春正月戊申朔帝御崇元殿受朝賀仗衛如式辛亥前河陽節度使檢校太傅兼侍中孔勍以太子太師致仕癸丑詔取今月十七日幸鄴都甲寅以國子祭酒朱守素卒廢朝丙辰以鎮南軍節度使袁建豐卒廢朝鎮南原本作鎮方今據歐陽史改正影庫本粘籤詔贈太尉丁巳詔曰朕聞堯舜有恤刑之典貴務好生禹湯申罪己之言庶明知過今月七日據巡檢軍使渾公兒口奏稱有百姓二人以竹竿習戰鬬之事朕初聞奏報實所不容率爾傳宣令付石敬瑭處置今旦重誨敷奏今旦重誨敷奏原本作令旦今從册府元龜改正影庫本粘籤方知悉是幼童為戲載聆讜議方覺失刑循揣再三愧惕非一亦以渾公兒誑誣頗甚石敬瑭詳覆稍乖致人枉法而殂處朕有過之地今減常膳十日以謝幽寃其石敬瑭是朕懿親合施極諫既茲錯誤宜示省循可罰一月俸渾公兒決脊杖二十仍銷在身職銜配流登州小兒骨肉賜絹五十匹粟麥各百石便令如法埋葬兼此後在朝及諸道州府凡有極刑並須子細裁遣不得因循百僚進表稱賀己未中書門下奏國子祭酒望令宰相兼判案五代會要載原奏云祭酒之資歷朝所貴爰從近代不重此官況屬聖朝方勤庶政須宏雅道以振時風望令宰臣一員兼判國子祭酒舊五代史考異乃詔崔協判之辛酉以前潞州節度使毛璋為右金吾上將軍以左驍衛上將軍華溫琪為右金吾大將軍以春州刺史張虔釗為鄭州防禦使契丹陷平州案契丹陷平州歐陽史作丁巳通鑑不書日考平州自梁開平中劉守光以賂契丹天成元年盧文進舉其地以歸於唐至三年復為遼人所取自是平州遂屬於遼宋人論石晉賂遼故地兼及平州蓋未詳考今附識于此舊五代史考異詔應廟諱文字只避正文其偏旁文字不用虧缺點畫契丹遣使禿汭悲梅老等貢獻帝遣指揮使奔托山押國信賜契丹王妻奔托山原本作賁托山考通鑑作奔胡三省云奔姓也今改正影庫本粘籤戊辰以隨駕馬軍都指揮使富州刺史康義誠兼領鎮南軍節度使以隨駕步軍都指揮使潮州刺史楊漢章遙領寧國軍節度使中書上言舊制遇二月十五日玄元皇帝降聖節休假三日準會昌元年二月敕休假一日請準近敕從之吐蕃野利延孫等六人回鶻米里都督等四人並授歸德懷遠將軍放還蕃庚午册贈故瀛州刺史李嗣頵為太尉壬申册贈故皇子檢校司空從諲為太保甲戌制以楚國夫人曹氏為淑妃以韓國夫人王氏為德妃仍令所司擇日册命二月丁丑朔有司上言太陽合虧既而有雲不見羣官表賀詔巡幸鄴都事宜停庚辰偽吳楊溥遣使貢獻賀誅朱守殷帝以荊南拒命通連淮夷不納其使遣還壬午以光祿卿韋寂卒廢朝贈禮部尚書癸未工部尚書盧文紀貶石州司馬員外安置文紀私諱業文紀私諱業原本作諱葉今從册府元龜改正影庫本粘籤時新除于鄴為工部郎中舊例僚屬名與長官諱同或改其任文紀素與宰相崔協有隙故中書未議改官于鄴授官之後文紀自請連假鄴尋就位及差延州官告使副未行文紀參告且言候鄴回日終請換曹鄴其夕自經而死故文紀貶官以倉部郎中何澤為吏部郎中奬伏閣諫巡幸鄴都也丁亥天德軍節度使郭承豐加檢校司徒辛卯以山南西道節度使張筠為左驍衛上將軍案通鑑作左衛上將軍歐陽史從薛史作左驍衛舊五代史考異詔中外羣臣父母亡沒者並與追封贈癸巳以禮部尚書崔貽孫卒輟朝甲午以吐渾寧朔奉化兩府都知兵馬使李紹魯為吐渾寧朔府都督乙未以樞密使兼東都留守孔循為許州節度使兼東都留守鄧州節度使高行圭移鎮安州應州節度使李從璋移鎮滑州滑州節度使盧文進移鎮鄧州鄧州原本作礎今據歐陽史盧文進傳改正影庫本粘籤丁酉以責授檀州刺史劉訓為右龍武大將軍己亥回鶻可汗仁喻遣都督李阿山等貢獻案歐陽史作戊戌舊五代史考異壬寅以左金吾大將軍羅周敬為同州節度使甲辰以威塞軍節度使張廷裕卒廢朝詔贈太保以耀州團練使孫嶽為閬州團練使以左監門上將軍高允貞為右金吾衛大將軍以右金吾衛大將軍華溫琪為左金吾衛大將軍三月丁未朔以久雨詔文武百辟極言時政得失丁巳以邢州節度使王景戡為華州節度使邢州原本作汧州今從册府元龜改正影庫本粘籤以前北京副留守李從溫為邢州節度使己未以宰臣鄭王玉為開府儀同三司左僕射致仕加食邑五百戶庚申以前復州刺史翟章為新州威塞軍留後中書奏孟夏薦饗合宰相行事在朝只有宰相二員今東都留守孔循帶平章事宜令攝太尉行事孔循稱使相有戎機不司祠祭重事癸亥以前鎮州節度使王建立為右僕射兼中書侍郎平章事集賢殿大學士判三司西方鄴上言收復歸州以前鄭州刺史楊漢賓為洋州武定軍留後戊辰以前彰國軍節度副使陳臯為鳳州武興軍留後以前蔡州刺史孫漢韶為應州彰國軍留後以宣徽南院使范延光為樞密使以宣徽北院使判三司張延朗為宣徽南院使以前冀州刺史婁繼英為耀州團練使以懷州刺史張廷蘊為金州防禦使己巳命范延光權知鎮州軍府事西方鄴奏於歸州殺敗荊南賊軍太白山道士解元龜自西川至對於便殿稱年一百一歲既而上表乞西都留守兼西川制置使要修西京宮闕帝謂侍臣曰此人老耄自遠來朝方期別有異見反為身名甚可笑也賜號知白先生賜紫放歸山甲戌册回鶻可汗仁喻為順化可汗夏四月戊寅以汴州節度使石敬瑭為鄴都留守充天雄軍節度使加同平章事以樞密使權知鎮州軍府事檢校太保范延光為鎮州節度使兼北面水陸轉運使范延光原本作廷光今據歐陽史改正影庫本粘籤以司農卿鄭繢為太僕卿壬午夔州節度使東南面副招討使西方鄴加檢校太保甲申皇第三女石氏封永寧公主永寧原本作求寧今從五代會要改正影庫本粘籤第十三女趙氏封興平公主仍令所司擇日册命幽州上言契丹有書求樂器乙酉達靼遣使朝貢以隨駕馬軍都指揮使康義誠為侍衛親軍馬步軍都指揮使丙戌樞密使安重誨兼河南尹以皇子河南尹判六軍諸衛事從厚為汴州節度使判六軍如故丁亥復州奏湖南大破淮賊於道人磯以西川馬步軍都指揮使趙廷隱兼漢州刺史從孟知祥之請也案九國志趙廷隱傳知祥至蜀康延孝陷漢州遣廷隱率兵擊破之擒延孝檻送闕下知祥奏加檢校司空漢州刺史遂留屯成都舊五代史考異洋州上言重開入蜀舊路三百餘里比今官路較二十五程而近癸巳殿中少監石知訥貶憲州司戶坐扇惑軍鎮也北面副招討宋州節度使王晏球以定州節度使王都反狀聞案遼史作三月王都以定州來歸五代春秋及通鑑並從薛史作四月庚子制義武軍節度使檢校太尉兼中書令太原王王都削奪官爵壬寅以王晏球為北面行營招討使知定州行軍州事以滄州節度使兼北面行營馬軍都指揮使安審通為副招討使兼諸道馬軍都指揮使以左散騎常侍蕭希甫兼判大理卿事西京奏前樞密使張居翰卒五月乙巳朔回鶻可汗仁喻封順化可汗丁未鄴都留守天雄軍節度使石敬瑭河陽節度使趙延壽並加駙馬都尉以右僕射李琪為太子少傅辛亥沙州節度使曹義金加爵邑王晏球上言收奪得定州北西二關城北西二關原本作比三關今從通鑑增改影庫本粘籤癸丑湖南馬殷奏二月中大破淮寇二萬生擒將士五百人中書上言諸道薦人宜酌定員數今後節度使每年許薦二人帶使相者許薦三人團練防禦使各一人節度觀察判官並聽旨授書記已下即許隨府從之以六軍判官尚書司封郎中史圭為右諫議大夫充樞密直學士詔州縣官以三十月為考限刺史以二十五月為限以到任日為始己未幽州奏契丹禿餒領二千騎西南趨定州以前同州節度使盧質行兵部尚書判太常卿事辛酉以天雄軍節度副使判興唐府事趙敬怡為樞密使詔曰上柱國勳之極也近代已來文臣官階稍高便授柱國歲月未深便轉上柱國武資初官便授上柱國今後凡加勳先自武騎尉十二轉方授上柱國十二轉原本作二輔今據新唐書百官志改正影庫本粘籤永作成規不令踰越丁卯鎮州奏今月十八日王師不利於新樂壬申王晏球奏今月二十一日大破定州賊軍及契丹於曲陽斬獲數千人王都與禿餒以數十騎復入於定州六月己卯以右金吾上將軍毛璋為左金吾上將軍以前安州節度使史敬鎔為右金吾上將軍以前華州節度使劉彥琮為左武衛上將軍壬午放內園鹿七頭於深山乙酉皇子故金槍指揮使檢校左僕射從璟贈太保己丑幽州趙德鈞奏殺契丹千餘人於幽州東獲馬六百匹壬辰宰臣馮道率百僚上表請上尊號曰聖明神武文德恭孝皇帝詔報不允丙申馮道等再上尊號不允戊戌以西京副留守知留守事張遵誨行京兆尹秋七月乙巳詔故偽蜀主王衍追封順正公以諸侯禮葬丙午以前武信軍節度使李敬周為邠州節度使丁未以滄州節度使安審通卒於師輟朝壬子以朔方節度使韓洙卒廢朝甲寅王晏球奏六月二十二日進攻逆城將士傷者三千人時晏球知城中有備未欲急攻朱宏昭張虔釗切於立功促攻賊壘晏球不得已而進兵遂致傷痍者衆乙卯以太子少保李茂勳卒輟朝己未己未原本作丁未考通鑑云東都民有犯私麴者留守孔循族之或請聽民造麴而于秋稅畝收五錢己未敕從之今改正影庫本粘籤詔弛麴禁許民間自造於秋苗上納徵麴價畝出五錢時孔循以麴法殺一家於洛陽或獻此議以為愛其人便於國故行之宗正卿李紓除名刑部侍郎馬縞貶綏州司馬刑部員外郎李慎儀貶階州司戶初李紓差攝陵臺令張保嗣等各虛稱試銜為奉先令王延朗所訟大理寺斷以詐假官論刑部詳覆稱非詐假大理執之召兩司廷議刑部理屈故有是貶紓續敕配隴州徒一年未幾詔曰天下州府例是攝官皆結試銜試銜原本作私銜今據五代會要改正影庫本粘籤或因勘窮便關詐假已前或有稱試銜一切不問此後並宜禁止曹州刺史成景宏貶綏州司戶參軍續敕長流宥州尋賜自盡坐受本州倉吏錢百緡也壬戌齊州防禦使曹廷隱以奏舉失實配流永州續敕賜自盡案歐陽史作己未殺齊州防禦使曹廷隱己未在壬戌前三日不應發配在後賜死轉在前也歐陽史疑訛舊五代史考異甲子王晏球奏今月十九日契丹七千騎來援定州王師逆戰於唐河北唐河原本作康河今據通鑑改正影庫本粘籤大破之案通鑑壬戌王晏球破契丹于唐河北甲子追至易州所推長曆與薛史合戊辰詔福建節度使王延鈞可依前檢校太師守中書令進封閩王己巳王晏球奏此月二十一日追契丹至易州掩殺四十里擒獲甚衆故朔方節度使韓洙贈太尉以兵部侍郎王權御史中丞梁文矩並為吏部侍郎以左諫議大夫呂夢奇為御史中丞八月癸酉朔以翰林學士守中書舍人李懌劉昫並為戶部侍郎充職以吏部侍郎劉嶽守祕書監以吏部侍郎韓彥惲守禮部尚書以戶部侍郎歸藹守太子賓客以戶部侍郎裴守兵部侍郎以中書舍人張文寶守刑部侍郎詔凡有姓犯廟諱者以本望為姓丁丑以檢校尚書右僕射守龍武大將軍劉訓為晉州節度使檢校太傅壬午幽州趙德鈞奏於府西邀殺契丹敗黨數千人生擒首領惕隱等五十餘人是時官軍襲殺契丹屬秋雨繼降泥濘莫進人飢馬乏散投村落所在村民持白梃毆殺之德鈞出兵接於要路幾無噍類帝致書喻其本國案通鑑作八月壬戌趙德鈞邀擊契丹據薛史八月係癸酉朔不得有壬戌疑通鑑誤辛卯以朔方軍留後韓璞為朔方軍節度使靈武雄警甘肅等州觀察使檢校司徒雄警疑當作雄邠考五代會要及册府元龜俱作警又通鑑注云警州在涇原西今仍其舊影庫本粘籤帝聞隨鄧復郢均房之民父母骨肉有疾以長竿遙致粥食而餉之出嫁女夫家不遣來省疾乃下詔委長吏嚴加禁察房州奏新開山路四百里南通夔州畫圖以獻以前洋州節度使戴思遠為太子太保致仕庚子詔今後翰林學士入院以先後為班次承旨一員不計官資先後在學士之上閏月丁未兩浙節度觀察留後清海軍節度使檢校太師兼中書令錢元瓘可杭州越州大都督府長史充鎮東鎮海等軍節度使戊申趙德鈞獻戎俘於闕下其蕃將惕隱等五十人留於親衛餘契丹六百人皆斬之乙卯升楚州為順化軍以明州刺史錢元珦為本州節度使以吏部尚書蕭頃為太子少保契丹遣使來貢獻契丹平州刺史張希崇上表歸順乙丑陝州節度使李從敏移鎮滄州以宣徽南院使張延朗為陝州節度使詔在京遇行極法日宜不舉樂兼減常膳諸州遇行極法日禁聲樂己巳滑州掌書記孟升匿母服大理寺斷處流特敕孟升賜自盡觀察使觀察判官録事參軍失其糾察各行殿罰襄邑縣民聞威父為人所殺不雪父寃有狀和解特敕處死是月二十七大水河水溢絳州地震九月乙亥以捧聖左右廂副都指揮使索自通為雲州節度使丁丑以太府卿判四方館事李郁為宗正卿壬午以晉州節度使安崇阮為左驍衛上將軍甲申吐蕃回紇各遣使貢獻壬辰宰臣王建立進玉杯上有文曰傳國萬歲杯乙未詔德州流人溫韜遼州流人段凝嵐州司戶陶憲州司戶石知訥原州司馬聶嶼並宜賜死於本處暴其宿惡而誅之也丙申以邠州節度使梁漢顒為右威衛上將軍威衛原本作威武今從五代會要改正影庫本粘籤丁酉河陽節度使駙馬都尉趙延壽為檢校司徒己亥詔徐州節度使房知溫兼荊南行營招討使知荊南行府事冬十月甲辰制瓊華長公主孟氏可册為福慶長公主丙午以滄州節度使李從敏兼北面招討使戊申帝臨軒命禮部尚書韓彥惲工部侍郎任贊往應州奉册四廟詔邠州節度使李敬周攻慶州案通鑑作李敬通薛史前後並作敬周歐陽史亦作敬周疑通鑑傳刻之訛舊五代史考異以刺史竇廷琬拒命故也案竇廷琬反通鑑從薛史作十月歐陽史繫于十月以前與薛史異舊五代史考異戊午契丹平州刺史張希崇已下八十餘人見於元德殿頒賜有差突厥首領張慕進等來朝貢案歐陽史作慕晉舊五代史考異案張慕進來朝歐陽史作丁巳孔本甲子安州節度使高行圭奏屯駐左神捷左懷順軍士作亂已逐殺出城詔升壽州為忠正軍戊辰以雲州節度使索自通領壽州節度使以前雲州節度使張溫復為雲州節度使庚午夜西南有彗星長丈餘在牛星五度十一月癸酉日南至帝御崇元殿受朝賀甲戌捧聖指揮使何福進招收到安州作亂兵士五百人自指揮使已下至節級四十餘人並斬餘衆釋之壬午房知溫奏荊南高季興卒案高季興卒通鑑作十二月丙辰詳見通鑑考異舊五代史考異中書舍人劉贊奏請節度使及文班三品已上謝見通喚從之是日以契丹所署平州刺史光祿大夫檢校太保張希崇為汝州刺史案歐陽史作汝州防禦使通鑑從薛史作刺史舊五代史考異加檢校太傅己丑中書奏今後或有封册請御正衙從之青州奏節度使霍彥威卒輟朝三日詔宰臣王建立權知青州軍州事庚寅禮部員外郎和凝奏應補齋郎並須引驗正身以防偽濫舊例使蔭一任官補一人今後改官須轉品即可如無子許以親姪繼限念書十卷試可則補從之甲午以尚書左僕射同平章事集賢殿大學士判三司王建立為青州節度使檢校太尉同平章事丙申帝謂侍臣曰古鐵券如何趙鳳對曰帝王誓文許其子子孫孫長享爵祿帝曰先朝所賜唯朕與郭崇韜李繼麟三人爾崇韜繼麟尋已族滅朕之危疑慮在旦夕於是嗟嘆久之趙鳳曰帝王執信故不必銘金鏤石矣吏部郎中何澤奏流外官請不試書判之類何澤原本作何譯今據歐陽史改正影庫本粘籤從之吐蕃遣使朝貢戊戌前安州節度副使范延榮並男皆斬於軍巡獄為高行圭誣奏故也十二月壬寅朔詔真定府屬縣宜準河中鳳翔例升為次畿真定縣升為次赤甲辰邠州節度使李敬周奏收下慶州刺史竇廷琬族誅永樂大典卷七千一百六十四
