body:
  text: 舊五代史卷十一梁書十一后妃列傳第一案梁后妃傳永樂大典闕全篇其散見者僅得四條今采北夢瑣言五代會要諸書分注於下以存當日之事迹文惠皇太后王氏開平初追諡永樂大典卷一萬三千三百五十二太祖性孝願奉太后未嘗小失色朝夕視膳為士君子之規範帝嚴察用法無纖毫假貸太后言之帝頗為省刑永樂大典卷一萬七千一百七十案北夢瑣言云梁祖父誠蚤卒有三子俱幼母王氏攜養寄於同縣人劉崇家昆弟之中唯溫狡猾無行崇母撫養之崇兄弟嘗加譴杖一日偷崇家釜而竄為崇追回崇母遮護以免撲責善逐走鹿往往及而獲之又崇母常見其有龍蛇之異他日與仲兄存入黃巢軍作賊伯兄昱與母王氏尚依劉家溫既辭去不知存亡及溫領鎮於汴盛飾輿馬使人迎母於崇家王氏惶恐辭避深藏不之信謂人曰朱三落拓無行何處作賊送死焉能自致富貴汴帥非吾子也使者具陳離鄉去里之由歸國立功之事王氏方泣而信是日與崇母並迎歸汴溫盛禮郊迎人士改觀崇以舊恩位至列卿為商州刺史王氏以溫貴封晉國太夫人仲兄存於賊中為矢石所中而卒溫置酒於母歡甚語及家事謂母曰朱五經辛苦業儒不登一命今有子為節度使無忝前人矣母不懌良久謂溫曰汝致身及此信為英特行義未必如先人朱二與汝同入賊軍身死蠻徼孤男稚女艱食無告汝未有恤孤之心英特即有諸無取也溫垂涕謝罪即令召諸兄子皆至汴友寧友倫皆立軍功位至方鎮元貞皇后張氏乾化中追諡永樂大典卷一萬三千三百五十二案五代會要太祖皇后張氏早崩開平二年追封賢妃至乾化二年十一月二十三日追册曰元貞皇后又北夢瑣言云梁祖魏國夫人張氏碭山富室女父蕤曾為宋州刺史溫時聞張有姿色私心傾慕有麗華之歎及溫在同州得張於兵間因以婦禮納之溫以其宿款深加禮異張賢明有禮溫雖虎狼其心亦所景伏每軍謀國計必先延訪或已出師中途有所不可張氏一介請旋如期而至其信重如此初收兗鄆得朱瑾妻溫告之曰彼既無依寓於輜車張氏遣人召之瑾妻再拜張氏答拜泣下謂之曰兗鄆與司空同姓之國昆仲之間以小故尋戈致吾姒如此設不幸汴州失守妾亦似吾姒之今日也又泣下乃度為尼張給其費張既卒繼寵者非人及僭號後大縱朋淫骨肉聚麀帷薄荒穢以致友圭之禍起於婦人始能以柔婉之德制豺虎之心如張氏者不亦賢乎又案五代會要所載內職有梁太祖昭儀陳氏昭容李氏歐陽史並見家人傳末帝德妃張氏永樂大典卷一千二百六十六案五代會要少帝妃張氏乾化五年九月二十四日册為德妃其夕薨又案歐陽史次妃郭氏傳云晉天福三年詔太社先藏罪人首級許親屬收葬乃出末帝首遣右衛將軍安崇阮與妃同葬之妃卒洛陽龐元英文昌雜録云梁均王晉天福中始葬故妃張氏獨存考功員外商鵬為志文曰七月有期不見望陵之妾九疑無色空餘泣竹之妃今案末帝德妃張氏早薨後與末帝同葬而次妃郭氏天福中尚存歐陽史不明言同葬者為何妃文昌雜録誤以尚存者為故妃張氏蓋傳聞之失實也今薛史梁后妃傳雖闕參考梁末帝紀及晉高祖紀定為德妃張氏同葬云又案五代史無外戚傳五代會要云梁太祖長女安陽公主降羅廷規開平二年八月追封長樂公主降趙巖開平元年五月十一日封普寧公主降昭祚王氏開平元年五月十一日封金華公主開平二年十月封真寧公主乾化三年十月五日封少帝長女壽春公主乾化三年四月五日封第二女壽昌公主貞明元年九月二十三日封今考通鑑考異引梁功臣列傳云羅廷規尚安陽公主又尚金華公主薛史羅紹威傳亦載開平四年詔金華公主出家為尼是金華公主實歸羅氏而五代會要不載亦闕文也
