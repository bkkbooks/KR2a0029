body:
  text: 舊五代史卷三十四唐書十莊宗紀第八同光四年春正月戊午朔帝不受朝賀契丹寇渤海壬戌壬成原本作丙戌據上文為戊午朔下文有癸亥甲子不得先丙戌歐陽史作壬戌降死罪以下囚今改正影舊庫本粘籤詔以去歲災沴物價騰踊自今月三日後避正殿減膳撤樂以答天譴應去年遭水災州縣秋夏稅賦並與放免自壬午年已前所欠殘稅及諸色課利已有敕命放免者尚聞所在却有徵收宜令租庸司切準前敕處分應京畿內人戶有停貯斛斗者並令減價出糶如不遵行當令檢括西川王衍父子及偽署將相官吏除已行刑憲外一切釋放天下禁囚除十惡五逆官典犯贓屠牛毀錢放火劫舍持刃殺人準律常赦不原外應合抵極刑者遞降一等其餘罪犯悉與減降逃背軍健並放逐便癸亥河中節度使李繼麟來朝諸州上言準宣為去年十月地震集僧道起消災道場甲子魏王繼岌殺樞密使郭崇韜於西川夷其族丙寅百官上表請復常膳凡三上表乃允之西川行營都監李廷安進西川樂官進西川樂官原本脫西字今據文增入影庫本粘籤二百九十八人契丹寇女真渤海戊寅契丹阿保機遣使貢良馬庚辰帝異母弟鄜州節度使存乂伏誅存乂郭崇韜之子壻也故亦及於禍是日以河中節度使守太師兼尚書令西平王李繼麟為滑州節度使尋令朱守殷以兵圍其第案歐陽史作圍其館胡三省云歐陽史蓋謂朱友謙無私第在洛陽也據雲谷雜記唐末藩鎮入朝館舍皆稱邸第似無庸更易其字通鑑仍從薛史作第舊五代史考異誅之夷其族辛巳吐渾奚各遣使貢馬鎮州上言部民凍死者七千二百六十人又奏準宣進花果樹栽及抽樂人梅審鐸赴京甲申以鄆州節度使永王存霸為河中節度使以滑州節度使申王存渥為鄆州節度使乙酉內人景姹上言昭宗遇難之時皇屬千餘人同時遇害為三穴瘞於宮城西古龍興寺北請改葬從之仍詔河南府監護其事丙戌回鶻可汗阿咄欲遣使貢良馬鎮州上言平棘等四縣部民餓死者二千五十人丁亥詔朱友謙同惡人史武等七人已當國法並籍沒家産武等友謙舊將時皆為刺史並以無罪族誅案通鑑云友謙舊將史武等七人時為刺史皆坐族誅蓋以薛史為據於七人姓名不為全載考歐陽史丁亥殺李繼麟之將史武薛敬容周唐殷楊師太王景來仁白奉國可補薛史所未備二月己丑以宣徽南院使南院原本作北院考歐陽史及通鑑俱作南院今改正影庫本粘籤知內侍省兼內勾特進右領軍衛上將軍李紹宏為驃騎大將軍守左武衛上將軍知內侍省充樞密使甲午以鄭州刺史李紹奇為河陽節度使以樂人景進為銀青光祿大夫檢校右散騎常侍守御史大夫進以俳優嬖幸善采訪閭巷鄙細事以啓奏復密求妓媵以進恩寵特厚魏州錢穀諸務及招兵市馬悉委進監臨孔謙附之以希寵常呼為八哥諸軍左右無不托附至於士人亦有因之而求仕進者每入言事左右紛然屏退惟以陷害熒惑為意焉是日帝幸冷泉校獵乙未宰臣豆盧革上言請支州縣官實奉以責課效丙申武德使史彥瓊自鄴馳報稱今月六日貝州屯駐兵士突入都城剽劫坊市初帝令魏博指揮使楊仁晸率兵戍瓦橋至是代歸有詔令駐於貝州上歲天下大水十月鄴地大震自是居人或有亡去他郡者每日族談巷語云城將亂矣人人恐悚皆不自安十二月以戶部尚書王正言為興唐尹為興唐尹原本脫唐字今據列傳增入影庫本粘籤知留守事正言年耄風病事多忽忘比無經治之才武德使史彥瓊者以伶官得幸帝待以腹心之任都府之中威福自我正言以下皆脅肩低首曲事不暇由是政無統攝姦人得以窺圖洎郭崇韜伏誅人未測其禍始皆云崇韜已殺繼岌自王西川故盡誅郭氏先是有密詔令史彥瓊殺朱友謙之子澶州刺史建徽史彥瓊夜半出城不言所往詰旦閽報正言曰史武德夜半馳馬而去不知何往是日人情震駭訛言云劉皇后以繼岌死於蜀已行弒逆帝已晏駕故急徵彥瓊其言播於鄴市貝州軍士有私寧親於都下者掠此言傳於貝州軍士皇甫暉等因夜聚蒱博不勝遂作亂劫都將楊仁晸曰我輩十有餘年為國家效命甲不離體已至吞併天下主上未垂恩澤翻有猜嫌防戍邊遠經年離阻鄉國及得代歸去家咫尺不令與家屬相見今聞皇后弒逆京邑已亂將士各欲歸府寧親請公同行仁晸曰汝等何謀之過耶今英主在上天下一家從駕精兵不下百萬西平巴蜀威振華夷公等各有家族何事如此軍人乃抽戈露刃環仁晸曰三軍怨怒咸欲謀反苟不聽從須至無禮仁晸曰吾非不知此但丈夫舉事須計萬全軍人即斬仁晸裨將趙在禮聞軍亂衣不及帶將踰垣而遁亂兵追及白刃環之曰公能為帥否否則頭隨刃落在禮懼即曰吾能為之衆遂呼譟中夜燔劫貝郡詰旦擁在禮趨臨清剽永濟館陶永濟原本作求齊今據通鑑改正影庫本粘籤五日晚有自貝州來者言亂兵將犯都城都巡檢使孫鐸等急趨史彥瓊之第告曰賊將至矣請給鎧仗登陴拒守彥瓊曰今日賊至臨清計程六日方至為備未晚孫鐸曰賊來寇我必倍道兼行一朝失機悔將何及請僕射率衆登陴鐸以徑兵千人伏於王莽河逆擊之賊既挫勢須至離潰然後可以剪除如俟甚凶徒薄於城下必慮姦人內應則事未可測也彥瓊曰但訓士守城何須即戰時彥瓊疑孫鐸等有他志故拒之是夜三更賊果攻北門彥瓊時以部衆在北門樓聞賊呼譟即時驚潰彥瓊單騎奔京師遲明亂軍入城孫鐸與之巷戰不勝攜其母自水門而出獲免晡晚趙在禮引諸軍據宮城宮城原本作官城通鑑作宮城胡三省注云帝即位于魏州以牙城為宮城今改正影庫本粘籤署皇甫暉趙進等為都虞侯斬斫使案九國志趙進傳云莊宗入洛猶行遣屯廩祿既薄又不時給士卒多怨憤思亂者十七同光末進與本軍皇甫暉等共推趙在禮相率夜犯鄴城鄴中士卒莫有鬬志進等因陷其城未踰旬兵數萬在禮署進衙內都虞候三城巡檢使通鑑作趙在禮據宮城署皇甫暉及軍校趙進為馬步都指揮使與九國志異諸軍大掠興唐尹王正言謁在禮望塵再拜是日衆推在禮為兵馬留後草奏以聞帝怒命宋州節度使元行欽率騎三千赴鄴都招撫詔徵諸道之師進討丁酉淮南楊溥遣使賀平蜀己亥魏王繼岌奏康延孝擁衆反回寇西川遣副招討使任圜率兵追討之庚子福建節度副使王延翰奏節度使王審知委權知軍府事邢州左右步直軍四百人據城叛步直原本作徒直通鑑作步直胡三省注云步直謂步兵長直者也今改正影庫本粘籤推軍校趙太為留後詔東北面副招討使李紹真率兵討之辛丑元行欽至鄴都進攻南門以詔書招諭城中趙在禮獻羊酒勞軍登城遙拜行欽曰將士經年離隔父母不取敕旨歸寧上貽聖憂追悔何及儻公善為敷奏俾從渙汗某等亦不敢不改過自新行欽曰上以汝輩有社稷功必行赦宥因以詔書諭之皇甫暉聚衆大詬即壞詔行欽以聞帝怒曰收城之日勿遺噍類壬寅行欽自鄴退軍保澶州甲辰從馬直宿衛軍士王溫等五人夜半謀亂殺本軍使為衛兵所擒磔於本軍之門丙辰以右散騎常侍韓彥惲為戶部侍郎丁未鄴都行營招撫使元行欽率諸道之師再攻鄴都戊申以洋州留後李紹文為夔州節度使詔河中節度使永王存霸歸藩己酉以樞密使宋唐玉為特進左威衛上將軍充宣徽南院使庚戌諸軍大集於鄴都進攻其城不克行欽又大治攻具城中知其無赦晝夜為備朝廷聞之益恐連發中使促繼岌西征之師繼岌以康延孝據漢州中軍之士從任圜進討繼岌端居利州利州原本作則州今據十國春秋改正影庫本粘籤不獲東歸是日飛龍使顏思威部署西川宮人至辛亥淮南楊溥遣使貢方物西京上言客省使李嚴押蜀主王衍至本府壬子以守太尉中書令河南尹兼河陽節度使齊王張全義為檢校太師兼尚書令充許州節度使東川董璋奏準詔誅遂州節度使李令德於本州夷其族癸丑湖南馬殷奏湖南馬殷原本脫馬字今據文增入影庫本粘籤福建節度使王審知疾甚副使王延翰已權知軍府事請降旄節司天監上言自二月上旬後晝夜陰雲不見天象自二十六日方晴至月終星辰無變以右衛上將軍朱漢賓知河南府事甲辰命蕃漢總管李嗣源統親軍赴鄴都以討趙在禮帝素倚愛元行欽鄴城軍亂即命為行營招討使久而無功時趙太據邢州王景戡據滄州自為留後河朔郡邑多殺長吏帝欲親征樞密使與宰臣奏言京師者天下根本雖四方有變陛下宜居中以制之但命將出征無煩躬御士伍帝曰紹榮討亂未有成功繼岌之軍尚留巴漢餘無可將者斷在自行樞密使李紹宏等奏曰陛下以謀臣猛將取天下今一州之亂而云無可將者何也總管李嗣源是陛下宗臣創業已來艱難百戰何城不下何賊不平威略之名振於夷夏以臣等籌之若委以專征鄴城之寇不足平也帝素寬大容納無疑於物自誅郭崇韜朱友謙之後閹宦伶官交相讒諂邦國大事皆聽其謀繇是漸多猜惑不欲大臣典兵既聞奏議乃曰豫恃嗣源侍衛卿當擇其次者又奏曰以臣等料之非嗣源不可河南尹張全義亦奏云河朔多事久則患生宜令總管進兵如倚李紹榮輩未見其功帝乃命嗣源行營是日延州知州白彥琛奏綏銀兵士剽州城謀叛綏銀原本作經銀據通鑑注云綏銀為夏州所屬今改正影庫本粘籤魏王繼岌傳送郭崇韜父子首函至闕下詔張全義收瘞之乙巳以右武衛上將軍李肅為安邑解縣兩池榷鹽使以吏部尚書李琪為國計使三月丁未朔案通鑑作丁巳朔與薛史異李紹真奏收復邢州擒賊首趙太等二十一人徇於鄴都城下皆磔於軍門庚戌李紹真自邢州赴鄴都城下案通鑑作庚申李紹真引兵至鄴都營於城西北以太等徇於鄴城下而殺之與薛史異辛亥以威武軍節度副使福建管內都指揮使檢校太傅守江州刺史王延翰為福建節度使依前檢校太傅壬子李嗣源領軍至鄴都營於西南隅甲寅進營於觀音門外下令諸軍詰旦攻城是夜城下軍亂案通鑑作壬戌李嗣源至鄴都甲子夜軍亂考異引莊宗實録作壬戌至鄴都癸亥夜軍士張破敗作亂與薛史異日通鑑從薛史舊五代史考異迫嗣源為帝遲明亂軍擁嗣源及霍彥威入於鄴城復為皇甫暉等所脅嗣源以詭詞得出詭詞原本作詭記今據文改正影庫本粘籤夜分至魏縣時嗣源遙領鎮州詰旦議欲歸藩上章請罪安重誨以為不可語在明宗紀中翌日遂次於相州元行欽部下兵退保衛州以飛語上奏嗣源一日之中遣使上章申理者數四帝遣嗣源子從審案從審歐陽史作從璟考通鑑從審自衛州歸莊宗賜名繼璟與歐陽史異與中使白從訓齎以諭嗣源行至衛州從審為元行欽所械不得達是日西面行營副招討使任圜奏收復漢州擒逆賊康延孝丙辰荊南高季興上言請割峽內夔忠萬等三州却歸當道依舊管係又請雲安監初將議伐蜀詔高季興令率本軍上峽自收元管屬郡軍未進夔忠萬三州已降季興數請之因賂劉皇后及宰臣樞密使內外叶附乃俞其請戊午詔河南府預借今年秋夏租稅時年飢民困百姓不勝其酷京畿之民多號泣於路議者以為劉盆子復生矣庚申詔潞州節度使孔勍赴闕以右龍虎統軍安崇阮權知潞州是日忠武軍節度使齊王張全義薨壬戌宰臣豆盧革率百官上表以魏博軍變請出內府金帛優給將士不報時知星者上言客星犯天庫宜散府藏又云流星犯天棓主御前有急兵帝召宰臣於便殿皇后出宮中葬奩銀盆各二并皇子滿哥三人滿哥原本作蒲哥今據歐陽史家人傳改正影庫本粘籤謂宰臣曰外人謂內府金寶無數向者諸侯貢獻旋供賜與今宮中有者葬奩嬰孺而已可鬻之給軍革等惶恐而退癸亥以偽置昭武軍節度使林思諤為閬州刺史是日出錢帛給賜諸軍兩樞密使及宋唐玉景進等各貢助軍錢幣是時軍士之家乏食婦女掇蔬於野及優給軍人皆負物而詬曰吾妻子已殍矣用此奚為甲子元行欽自衛州率部下兵士歸帝幸耀店以勞之案通鑑作鷂店胡三省注云薛史作耀店今仍其舊舊五代史考異西川輦運金銀四十萬至闕分給將士有差元行欽請車駕幸汴州帝將發京師遣中官向延嗣馳詔所在誅蜀主王衍仍夷其族乙丑車駕發京師戊辰遣元行欽將騎軍沿河東向壬申帝至滎澤以龍驤馬軍八百騎為前軍遣姚彥溫董之彥溫行至中牟率所部奔於汴州時潘環守王村寨有積粟數萬亦奔汴州是時李嗣源已入於汴帝聞諸軍離散精神沮喪至萬勝鎮即命旋師登路旁荒冢置酒視諸將流涕俄有野人進雉因問冢名對曰里人相傳為愁臺帝彌不悅罷酒而去是夜次汜水初帝東出關從駕兵二萬五千及復至汜水已失萬餘騎乃留秦州都指揮使張塘以步騎三千守關帝過罌子谷罌子谷原本作罌子谷考舊唐書罌子谷在成臯通鑑亦作罌今改影庫本粘籤道路險狹每遇衛士執兵仗者皆善言撫之曰適報魏王繼岌又進納西川金銀五十萬到京當盡給爾等軍士對曰陛下賜與太晚人亦不感聖恩帝流涕而已又索袍帶賜從官內庫使張容哥對曰頒給已盡衛士叱容哥曰致吾君社稷不保是此閹豎抽刀逐之或救而獲免容哥謂同黨曰皇后惜物不散軍人歸罪於吾輩事若不測吾輩萬段願不見此禍因投河而死案隆平集內臣李承進逮事唐莊宗太祖嘗問莊宗時事對曰莊宗好畋獵每次近郊衛士必控馬首曰兒郎輩寒冷望陛下與救接莊宗隨所欲給之如此者非一晚年蕭牆之禍由賞賚無節威令不行也太祖歎曰二十年夾河戰爭不能以軍法約束此輩誠兒戲舊五代史考異甲戌次石橋案通鑑作甲申次石穚西與薛史異歐陽史作甲戌至自萬勝與薛史合帝置酒野次悲啼不樂謂元行欽等諸將曰鄴下亂離寇盜蜂起總管迫於亂軍存亡未測今訛言紛擾朕實無聊卿等事余已來富貴急難無不共之今茲危賴爾籌謀而竟默默無言坐觀成敗豫在滎澤之日欲單騎渡河訪求總管面為方略招撫亂軍卿等各吐胸襟共陳利害今日俾余至此卿等如何元行欽等百餘人垂泣而奏曰臣本小人蒙陛下撫養位極將相危難之時不能立功報主雖死無以塞責乞申後效以報國恩於是百餘人皆援刀截髮置髻於地以斷首自誓上下無不悲號識者以為不祥是日西京留守張筠部署西征兵士到京見於上東門外晡晚帝還宮初帝在汜水衛兵散走京師恐駭不寧及帝至人情稍安乙亥百官進名起居安義節度使孔勍奏點校兵士防城準詔運糧萬石進發次時勍已殺監軍使據城詭奏也丙子樞密使李紹宏與宰相豆盧革韋説會於中興殿之廊下商議軍機因奏魏王西征兵士將至車駕且宜控汜水宜控汜水原本作宜撫汜水今從通鑑改正影庫本粘籤以俟魏王從之午時帝出上東門親閲騎軍誡以詰旦東幸申時還宮四月丁丑朔案歐陽史及通鑑五代春秋俱作四月丁亥朔考遼史天顯元年即同光四年亦作四月丁亥朔唯薛史作丁丑與諸書異案是年正月係戊午朔三月係丁未朔則四月朔日自當為丁丑蓋薛史據當時實録其月日有可徵信也以永王存霸為北都留守申王存渥為河中節度使是日車駕將發京師從駕馬軍陳於宣仁門外步兵陳於五鳳門外帝內殿食次從馬直指揮使郭從謙自本營率所部抽戈露刃至興教門大呼與黃甲兩軍引弓射興教門帝聞其變自宮中率諸王近衛禦之逐亂兵出門既而焚興教門緣城而入登宮牆歡譟帝御親軍格鬬殺亂兵數百俄而帝為流矢所中亭午崩於絳霄殿之廡下時年四十三琬琰集載宋實録王全斌傳云同光末蕭牆有變亂兵逼宮城近臣宿將皆釋甲潛遁惟全斌與符彥卿等十數人居中拒戰莊宗中流矢扶掖歸絳霄殿全斌慟哭而去東都事略符彥卿傳云郭從謙之亂莊宗左右皆引去惟彥卿力戰殺十餘人莊宗崩彥卿慟哭而去參考薛史何福進傳時莊宗親軍惟彥卿福進數十而已是時帝之左右例皆奔散唯五坊人善友案通鑑作鷹坊人善友胡三省注云鷹坊唐時五坊之一也善姓也舊五代史考異斂廊下樂器簇於帝尸之上發火焚之及明宗入洛止得其燼骨而已天成元年七月丁卯有司上諡曰光聖神閔孝皇帝廟號莊宗是月丙子葬於雍陵永樂大典卷七千一百五十八五代史補莊宗之嗣位也志在渡河但恨河東地狹兵少思欲百練其衆以取必勝於天下乃下令曰凡出師騎軍不見賊不許騎馬或步騎前後已定不得越軍分以避險惡其分路並進期會有處不得違晷刻並在路敢言病者皆斬之故三軍懼法而戮力皆一以當百故朱梁舉天下而不能禦卒為所滅良有以也初莊宗為公子雅好音律又能自撰曲子詞其後凡用軍前後隊伍皆以所撰詞授之使揭聲而唱謂之御製至於入陳不論勝負馬頭才轉則衆歌齊作故凡所鬬戰人忘其死斯亦用軍之一奇也莊宗好獵每出未有不蹂踐苗稼一旦至中牟圍合忽有縣令忘其姓名犯圍諫曰大凡有國家者當視民如赤子性命所繫陛下以一時之娛恣其蹂踐使比屋囂然動溝壑之慮為民父母豈其若是耶莊宗大怒以為遭縣令所辱遂叱退將斬之伶官鏡新磨者知其不可乃與羣伶齊進挽住令佯為詬責曰汝為縣令可以指麾百姓為兒既天子好獵即合多留間地安得縱百姓耕鋤皆遍妨天子鷹犬飛走耶而又不能自責更敢咄咄吾知汝當死罪諸伶亦皆嘻笑繼和於是莊宗默然其怒少霽頃之恕縣令罪五代史闕文莊宗嘗因博戲覩骰子采有暗相輪者心悅之乃自置暗箭格凡博戲並認采之在下者及同光末鄴都兵亂從謙以兵犯興教門莊宗禦之中流矢而崩識者以為暗箭之應史臣曰莊宗以雄圖而起河汾以力戰而平汴洛家讎既雪國祚中興雖少康之嗣夏配天光武之膺圖受命亦無以加也然得之孔勞失之何速豈不以驕於驟勝逸於居安忘櫛沐之艱難徇色禽之荒樂外則伶人亂政內則牝雞司晨靳吝貨財激六師之憤怨徵搜輿賦竭萬姓之脂膏大臣無罪以獲誅衆口吞聲而避禍夫有一於此未或不亡矧咸有之不亡何待靜而思之足以為萬代之炯誡也永樂大典卷七千一百五十八
