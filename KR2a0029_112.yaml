body:
  text: 舊五代史卷一百一十二周書三太祖紀第三廣順元年冬十月己丑朔宰臣王峻獻唐張蘊古大寶箴謝偃惟皇誡德賦二圖惟皇原本作雖皇今從文苑英華改正影庫本粘籤詔報曰朕生長軍戎勤勞南北雖用心於鈐匱且無暇於詩書世務時艱粗經閱歷閱歷原本脫閱字今從冊府元龜增入影庫本粘籤前言往行未甚討尋卿有佐命立國之勳居代天調鼎之任恆慮眇德未及古人於是採掇箴規弼諧寡昧披文閱理懌意怡神究為君治國之源審修己御人之要帝王之道盡在於茲辭翰俱高珠寶何貴再三省覽深用愧嘉其所進圖已令於行坐處張懸所冀出入看讀用為鑒戒壬辰潞州奏巡檢使陳思讓監軍向訓破河東軍於虒亭案通鑑陳思讓敗北漢兵在十月辛卯蓋辛卯得捷次日始奏聞也又虒亭原本作褫亭今從通鑑及宋史改正癸巳以刑部侍郎司徒詡為戶部侍郎以左散騎常侍張煦為刑部侍郎以給事中呂咸休為左散騎常侍甲午絳州防禦使孫漢英卒辛丑荊南奏湖南亂大將軍陸孟俊執偽節度使馬希萼遷於衡州立希萼弟希崇為留後將吏二千餘人遇害者半牙署庫藏焚燒殆盡乙巳詔倂吏部三銓為一銓委本司長官通判丙午晉州巡檢王萬敢奏河東劉崇入寇營於州北辛亥潞州奏河東賊軍寇境乙卯荊南奏淮南遣鄂州節度使劉仁贍以戰船二百艘於今月二十五日入岳州丙辰詔樞密使王峻率兵援晉州丁巳以左衞將軍申師厚為河西軍節度使檢校太保師厚素與王峻善及峻貴師厚羈旅無依日於峻馬前望塵而拜會西涼請帥帝令擇之無欲去者峻乃以師厚奏之師厚亦欣然求往尋自前鎮將授左衞將軍檢校工部尚書翌日乃有涼州之命賜旌節駝馬繒帛以遣之十一月己未朔荊南奏淮南大將邊鎬率兵三萬自袁州路趨潭州袁州原本作阮州今從通鑑改正影庫本粘籤馬希崇遣從事送牌印納器仗鎬入城稱武安軍節度使馬氏諸族及將吏千餘人皆徙于金陵甲子夜東南白虹亙天以新晉州節度使王彥超為晉絳行營馬軍都虞候乙丑命王峻出征晉州帝幸西莊以餞之甲戌日南至羣臣拜表稱賀甲申葬故貴妃張氏丁亥詔唐朝五廟舊在至德宮安置應屬徽陵莊田園舍宜令新除右監門將軍李重玉為主其緣陵緣廟法物除合留外所有金銀器物充遷葬故淑妃王氏及許王從益外其餘並給與重玉及尼惠英惠燈惠能惠嚴等令重玉以時祀陵廟務在豐潔重玉故皇城使李從璨之子皇城使原本作皇晟使今從五代會要改正影庫本粘籤明宗之孫惠英等亦明宗親屬也故帝授重玉官秩令主先祀卹王者之後也十二月戊子朔詔以劉崇入寇取當月三日暫幸西京庚寅詔巡幸宜停時王峻駐軍陝府聞帝西巡遣使馳奏不勞車駕順動帝乃止乙未幸西莊兗州慕容彥超上言乞朝覲詔允之尋稱部內草寇起不敢離鎮戊申鄆州奏慕容彥超據城反己酉王峻奏劉崇逃遁王師已入晉州案宋史陳思讓傳王峻援晉州以思讓與康延昭分為左右廂排陣使令率軍自烏嶺至絳州與大軍合崇燒營遁去思讓又與藥元福襲破之舊五代史考異廣順二年春正月戊午朔不受朝賀以宿兵在外故也庚申王峻奏起近鎮丁夫二萬城晉州壬戌修東京羅城凡役丁夫五萬五千兩旬而罷甲子以侍衞步軍都指揮使曹英為兗州行營都部署以齊州防禦使史延韜為副部署以皇城使向訓為兵馬都監陳州防禦使藥元福為馬步都虞候率兵討慕容彥超案隆平集慕容彥超盜據兗海周祖命曹英為帥向訓副之參用藥元福以兵從謂元福曰已敕英訓勿以軍禮見汝及元福至英訓皆父事焉舊五代史考異諸軍入兗州界不得下路停止村舍犯者以軍法從事丙寅徐州巡檢供給官張令彬奏破淮賊于沭陽斬首千餘級擒賊將燕敬權時慕容彥超求援於淮南淮南偽主李景發兵援之師於下邳聞官軍至退趨沭陽遂破之庚午高麗權知國事王昭遣使貢方物壬申鎮州何福進差人部送先擒獲到河東賊軍二百餘人至闕下詔給巾履衫袴以釋之戊寅徐州部送沭陽所獲賊將燕敬權等四人至闕下詔賜衣服金帛放歸本土敬權等感泣謝罪帝召見謂之曰夫惡凶邪奬忠順天下一也我之賊臣撓亂國法嬰城作逆殃及生靈不意吳人助茲凶慝非良算也爾歸當言之於爾君初漢末遣三司軍將路昌祚於湖南市茶屬淮南將邊鎬陷長沙淮南原本作懷南今從通鑑改正影庫本粘籤昌祚被賊送金陵及敬權自大朝歸具以帝言告于李景景乃召昌祚延坐從容久之且稱美大朝皇帝聖德廣被恩沾鄰土深有依附國家之意及罷遣偽宰相宋齊丘宴昌祚於別館又令訪昌祚在湖南遭變之時亡失綱運之數命依數償之給茗荈萬八千斤遣水運至江夏仍厚給行裝遣之歸闕二月庚寅府州防禦使折德扆奏河東賊軍寇境率州兵破之斬首二千級辛卯太白經天癸巳以權知高麗國事王昭為高麗國王庚子府州防禦使折德扆奏收河東界岢嵐軍癸卯詔先獲河東鄉軍一百餘人各給錢鞋放歸鄉里壬子太子太師致仕安審暉卒三月庚申幸南莊令從臣習射戊辰以樞密院直學士左諫議大夫王溥為中書舍人充翰林學士以內客省使恩州團練使鄭仁誨為樞密副使詔宣徽北院使翟光鄴權知永興軍府事甲戌迴鶻遣使貢方物庚辰詔西京莊宅司內侍省宮苑司內園等四司所管諸巡繫稅戶二千五百並還府縣其廣德昇平二宮並停廢應行從諸莊園林亭殿房舍什物課利宜令逐司依舊收管夏四月丙戌朔日有食之帝避正殿百官守司丁亥詔停蔡州鄉軍戊子以京師旱分命羣臣禱雨癸巳制削奪慕容彥超在身官爵甲午高麗國冊使衞尉卿劉卒乙卯詔取來月五日車駕赴兗州城下慰勞將士以樞密副使鄭仁誨為右衞大將軍依前充職兼權大內都點檢以中書侍郎平章事判三司李穀為權東京留守兼判開封府事五月丙辰朔帝御崇元殿受朝仗衞如儀庚申車駕發京師案五代春秋作庚辰帝東征歐陽史從薛史作庚申戊辰至兗州城下乙亥收復兗州斬慕容彥超夷其族詔端明殿學士顏衎權知兗州軍州事壬午曲赦兗州管內罪人取五月二十七日已前所犯罪大辟已下咸赦除之慕容彥超徒黨有逃避潛竄者及城內將吏等並放罪自慕容彥超違背以來鄉城內有接便為非者一切不問諸軍將士沒於王事者各與賻贈都頭已上與贈官兗州城內及官軍下寨四面去州五里內今年所徵夏秋稅及沿徵錢物並放十里內只放夏稅一州管界今夏苗子三分放一分城內百姓遭毀拆舍屋及遭燒焚者給賜材木諸處差到人夫內有遭矢石死者各給絹三匹仍放戶下三年徭役云癸未詔兗州降為防禦州仍為望州六月乙酉朔帝幸曲阜縣謁孔子祠既奠將致拜左右曰仲尼人臣也無致拜帝曰文宣王百代帝王師也得無敬乎即拜奠於祠前其所奠酒器銀鑪並留於祠所遂幸孔林拜孔子墓帝謂近臣曰仲尼亞聖之後今有何人對曰前曲阜令襲文宣公孔仁玉是仲尼四十三代孫有鄉貢三禮顏涉是顏淵之後即召見仁玉賜緋賜緋原本作賜排今從冊府元龜改正影庫本粘籤口授曲阜令顏涉授主簿便令視事仍敕兗州修葺孔子祠宇墓側禁樵採丙戌車駕還京初帝以五月十三日至兗州賊尚拒守至十七日晝夢道士一人進書卷首云車駕來月二日還京其下文字絕多不能盡記既寤以夢告宰臣又四日而城拔帝至軍凡駐蹕九日而賊平果以六月二日發離城下近代親征克捷無如此之速也是日大雨城下行宮水深數尺其日晚至中都縣帝笑謂侍臣曰今日若不離城下則當為潦所溺矣戊戌車駕至自兗州案歐陽史作庚子至自兗州五代春秋從薛史作戊戌辛丑以靈武節度使馮暉卒輟朝一日壬寅前翰林學士李澣自契丹中上表陳奏機事且言偽幽州節度使蕭海貞欲謀嚮化帝甚嘉之案宋史李澣傳海貞與澣相善澣乘間諷海貞以南歸之計海貞納之周廣順二年澣因定州孫方諫密表言契丹衰微之勢周祖嘉焉遣諜者田重霸齎詔慰撫仍命澣通信澣復表述契丹主幼弱多寵好擊鞠大臣離貳若出師討伐因與通好乃其時也屬中原多故不能用其言舊五代史考異癸卯德妃董氏薨乙巳詔宣徽南使袁判開封府事辛亥以朔方軍衙內都虞候馮繼業復起為朔方軍兵馬留後甲寅幸舊宅為德妃舉哀故也秋七月丙辰詔內外臣僚每遇永壽節舊設齋供今後中書門下與文武百官共設一齋侍衞親軍都指揮使已下共設一齋樞密使內諸司使已下共設一齋其餘前任職員及諸司職掌更不得開設道場及設齋是日大風雨破屋拔樹尚書省都堂有龍穿屋壞獸角而去西壁有爪迹存焉襄州大水丁卯詔復升陳州曹州為節鎮以侍衞馬軍都指揮使洋州節度使郭崇為陳州節度使以侍衞步軍都指揮使曹英為曹州節度使並典軍如故以陳州防禦使藥元福為晉州節度使辛未詔相州節度使李筠權知潞州軍州事丙子以小底都指揮使漢州刺史李重進為大內都點檢兼馬步都軍頭領恩州團練使以內殿直都知駙馬都尉張永德領和州刺史張永德原本作承德今從宋史改正影庫本粘籤充小底第一軍都指揮使八月甲申朔翰林學士刑部尚書張沆落職守本官以中書舍人史館修撰判館事徐台符為禮部尚書充翰林學士承旨以兵部侍郎韋勳為尚書右丞以尚書右丞于德辰為吏部侍郎以戶部侍郎邊歸讜為兵部侍郎以禮部侍郎趙上交為戶部侍郎以樞密直學士左散騎常侍陳觀為工部侍郎依前充職以刑部侍郎景範為左司郎中充樞密直學士乙酉樞密使王峻上章請解樞衡凡三上章詔不充庚寅潁州奏先於淮南俘獲孳畜已准詔送還本土甲午詔止絕吏民詣闕舉請刺史縣令賜宰臣李穀白藤肩輿時穀以今年七月因步履傷臂請告數旬詔穀扶持三司刻名印署事仍放朝參庚子潞州節度使常思移鎮宋州相州節度使李筠移鎮潞州壬寅鄆州節度使高行周薨癸丑詔改鹽麴法鹽麴犯五斤已上處死煎鹽者犯一斤已上處死先是漢法不計斤兩多少並處極刑至是始革之九月庚午以大理卿劇可久為太僕卿以左庶子張仁瑑為大理卿以司天監趙延趙延原本作廷義今從通鑑改正影庫本粘籤為太府卿兼判司天監事詔北面沿邊州鎮自守疆埸不得入北界俘掠乙亥鎮州奏契丹寇深冀州遣龍捷都指揮使劉誨牙內都指揮使何繼筠等率兵拒之而退時契丹聞官軍至掠冀部丁壯數百隨行狼狽而北冀部被擄者望見官軍鼓譟不已官軍不敢進其丁壯盡為蕃軍所殺而去丁丑以鄭州防禦使白重贊為相州留後戊寅樂壽都監杜延熙奏於瀛州南殺敗契丹斬首三百級獲馬四十七匹癸未帝姨母韓氏追封楚國夫人故第四姊追封福慶長公主癸未易州奏契丹武州刺史石越來奔冬十月丙戌以前晉州節度使王彥超為河陽節度使庚寅詔諸州罷任或朝覲並不得以器械進貢先是諸道州府各有作院每月課造軍器逐季搬送京師進納其逐州每年占留繫省錢帛不少謂之甲料仍更於部內廣配土產物徵斂數倍民甚苦之除上供軍器外節度使刺史又私造器甲以進貢為名功費又倍悉取之於民帝以諸州器甲造作不精兼占留屬省物用過當乃令罷之仍選擇諸道作工赴京作坊以備役使乙未永興軍奏宣徽北院使知軍府事翟光鄴卒丁酉葬德妃德妃上疑脫董字考冊府元龜亦無董字蓋上文已云癸巳德妃董氏薨此處可從省文也今仍其舊影庫本粘籤廢朝戊戌以宣徽南院使袁權知永興軍府事以樞密直學士工部侍郎陳觀權知開封府事己亥升鉅野縣為濟州以樞密院副使鄭仁誨為宣徽北院使兼樞密副使庚子幸樞密院王峻請之也甲辰宰臣李穀以臂傷未愈上表辭位凡三上章詔報不允丁未滄州奏自十月已前蕃歸漢戶萬九千八百戶是時北境饑饉人民轉徙襁負而歸中土者散居河北州縣凡數十萬口十一月丙辰荊南奏朗州大將劉言以今年十月三日領兵趨長沙十五日至潭州淮南所署湖南節度使邊鎬岳州刺史宋德權並棄城遁去庚申以前少府監馬從斌為殿中監壬戌樞密使王峻亡妻崔氏追封趙國夫人非故事也乙丑刑部尚書張沆卒辛未陝州折從阮移鎮邠州以前宋州節度使李洪義為安州節度使癸酉青州符彥卿移鎮鄆州鄆州原本作均州今從通鑑改正影庫本粘籤甲戌詔曰累朝已來用兵不息至於繕治甲冑未免配役生靈多取于民助成軍器就中皮革尤峻科刑稍犯嚴條皆抵極典鄉縣以之生事姦猾得以侵漁宜立所規用革前弊應天下所納牛皮今將逐所納數三分內減二分其一分於人戶苗畝上配定每秋夏苗共十頃納連角皮一張其黃牛納乾筋四兩水牛半斤犢子皮不在納限牛馬驢騾皮筋角今後官中更不禁斷只不得將出化外敵境州縣先置巡檢牛皮節級並停丙子詔曰應內外文武官僚幕職州縣官舉選人等今後有父母祖父母亡歿未經遷葬者其主家之長不得輒求仕進所由司亦不得申舉解送如是卑幼在下者不在此限己卯日南至帝御崇元殿受朝賀仗衞如儀十二月丙戌權武平軍留後劉言遣牙將張崇嗣入奏於十月十三日與節度副使王進逵行軍司馬何敬貞指揮使周行逢等同共部領戰棹攻收湖南偽節度使邊鎬當夜出奔王進逵等已入潭州案九國志王逵傳逵朗州武陵人或名進逵邊鎬為武安軍節度使召劉言入覲言不行謀于逵曰江南召我不往必加兵於我矣為之奈何逵曰鎬之此來以制置潭朗為名公如速行正入其算武陵負江湖之阻帶甲百萬乃欲拱手臣異姓乎鎬新至長沙經略未定乘人心憤怒引兵攻鎬可一鼓而擒也言然之乃遣與何景真等同起兵于武陵號十指揮使以攻邊鎬逵率舟師南上至長沙邊鎬大駭以所部奔歸江南諸州屯守皆罷之盡復湖外之地舊五代史考異癸巳太子太師致仕安叔千卒甲午詔今後諸侯入朝不得進奉買宴丁酉皇子澶州節度使榮落起復加同平章事戊戌太子少傅致仕王延卒壬寅幸西莊乙巳以端明殿學士顏衎權知開封府事御史臺奏請改左右衞復為左右屯衞請改左右衞當作左右威衞蓋當時奏牘之文因避御名故去威字今仍其舊影庫本粘籤從之避御名也是冬無雪廣順三年春正月壬子朔帝御崇元殿受朝賀仗衞如儀幸太平宮起居漢太后甲寅賜羣臣射於內鞠場乙卯武平軍兵馬留後劉言奏潭州兵戈之後焚燒殆盡乞移使府於武陵從之詔升朗州為大都督府在潭州之上丙辰以武平軍節度使留後檢校太尉劉言為檢校太師同平章事行朗州大都督充武平軍節度兼三司水陸轉運等使制置武安靜江等軍事進封彭城郡公武平軍節度副使權知潭州軍州事檢校太傅王進逵為檢校太尉行潭州刺史充武安軍節度使以武安軍行軍司馬兼衙內步軍都指揮使檢校太傅何敬貞為檢校太尉行桂州刺史充靜江軍節度使以張倣領眉州刺史充武平軍節度副使以朱元琇領黃州刺史充靜江軍節度副使以周行逢領集州刺史充武安軍節度行軍司馬自進逵而下皆劉言將校也邠州奏慶州略蕃部野鷄族略奪商旅野雞原本作黑雞今從通鑑及宋史改正影庫本粘籤侵擾州界詔遣寧州刺史張建武等率兵掩襲仍先賜敕書安撫如不從命即進軍問罪辛酉詔賜朗州劉言應兩京及諸道舊屬湖南樓店邸第乙丑詔諸道州府繫屬戶部營田及租稅課利等除京兆府莊宅務贍國軍榷鹽務兩京行從莊外其餘並割屬州縣所徵租稅課利官中只管舊額其職員節級一切停廢應有客戶元佃繫省莊田桑土舍宇便賜逐戶充為永業仍仰縣司給與憑由應諸處元屬營田戶部院及繫縣人戶所納租中課利起今年後並與除放所有見牛犢並賜本戶官中永不收繫云帝在民間素知營田之弊至是以天下繫官莊田僅萬計悉以分賜見佃戶充永業是歲出戶三萬餘百姓既得為己業比戶欣然於是葺屋植樹敢致功力又東南郡邑各有租牛課戶往因梁太祖渡淮軍士掠民牛以千萬計梁太祖盡給與諸州民輸租課自是六十餘載時移代改牛租猶在百姓苦之至是特與除放未幾京兆府莊宅務及榷鹽務亦歸州縣依例處分或有上言以天下繫官莊田甚有可惜者若遣貨之當得三十萬緡亦可資國用帝曰苟利於民與資國何異丁卯戶部侍郎權知貢舉趙上交奏諸科舉人欲等第各加對義場數進士除詩賦外別試雜文一場從之兩浙弔祭使左諫議大夫李知損責授登州司馬員外置登州原本脫登字今從李知損本傳增入影庫本粘籤仍令所在馳驛放遣知損銜命江浙所經藩郡皆強貸於侯伯為青州知州張凝所奏故有是命己巳幸南莊臨水亭見雙鳧戲於池上帝引弓射之一發疊貫從臣稱賀庚午以前邠州節度使侯章為鄧州節度使前萊州刺史葉仁魯賜死坐為民所訟故也辛未詔樞密使王峻巡視河堤峻請行故從之辛巳幸南莊閏月甲申朗州劉言潭州王進逵奏廣賊占據桂管深入永州界俘劫遣朗州行軍司馬何敬真與指揮使朱全琇陳順等率水陸軍五萬進擊丙戌迴鶻遣使貢方物詔故梁租庸使趙巖姪崇勳見居陳州量賜繫官店宅從王峻之請也辛卯定州奏契丹攻義豐軍出勁兵夜斫蕃營斬首六十級契丹遁去甲午鎮州奏契丹寇境遣兵追襲至無極而還案契丹國志作無極山薛史無山字當係史家省文今姑仍其舊影庫本粘籤丙申皇子澶州節度使榮來朝壬寅以樞密使尚書左僕射同平章事監修國史王峻兼青州節度使餘如故延州衙內指揮使高紹基奏言父允權患脚膝令臣權知軍州事癸卯陳州奏吏民請與前刺史李穀立祠堂從之時穀為宰相聞郡人陳請遜讓數四乃止甲辰鄴都留守王殷加檢校太尉依前同平章事丙午鎮州節度使何福進河陽節度使王彥超並加檢校太尉潞州節度使李筠加檢校太傅丁未延州節度使高允權卒己酉開封府奏都城內錄到無名額僧尼寺院五十八所詔廢之二月辛亥朔以前西京留守白文珂為太子太師致仕進封韓國公癸丑安州節度使李洪義侍衞馬軍都指揮使郭崇侍衞步軍都指揮使曹英並加檢校太尉唐州方城縣令陳守愚棄市坐剋留戶民蠶鹽一千五百斤入己也內制國寶兩座詔中書令馮道書寶文其一以皇帝承天受命之寶為文其一以皇帝神寶為文按傳國寶始自秦始皇令李斯篆之歷代傳授事具前史至唐末帝自燔之際以寶隨身遂俱焚焉晉高祖受命特制寶一座開運末北戎犯闕少帝遣其子延煦送于戎王戎王訝其非真少帝上表具訴其事及戎王北歸齎以入蕃漢朝二帝未暇別製至是始創為之庚申遣將作監李瓊知陝州軍州事甲子樞密使平盧軍節度使尚書左僕射平章事監修國史王峻責授商州司馬員外置所在馳驛發遣戊辰左監門上將軍李建崇卒延州牙內都指揮使高紹基奏交割軍府與副使張圖己巳朗州劉言奏當道先遣行軍司馬何敬真率兵掩擊廣賊行及潭州部衆奔潰湖南王進逵以敬真失律已梟首訖以樞密直學士工部侍郎陳觀為祕書監陳觀原本作陳官今從宋史顏衎傳改正影庫本粘籤壬申鳳翔少尹桑能責授鄧州長史能晉相維翰之庶弟也坐據維翰別第為人所訟故也癸酉以戶部侍郎知貢舉趙上交為太子詹事是歲新進士中有李觀者不當策名物議諠然中書門下以觀所試詩賦失韻勾落姓名故上交移官丁丑幸南莊賜從官射命客省使向訓權知延州軍州事永樂大典卷八千九百八十
