body:
  text: 舊五代史卷五梁書五太祖紀第五開平三年九月御崇勳殿宴羣臣文武百官賜張宗奭楊師厚白綾各三百匹銀鞍轡馬丁酉上幸崇政院宴內臣賜院使敬翔直學士李班等繒綵有差永樂大典卷一萬六千七百四十六案通鑑丁未以保義節度使王檀為潞州東面行營招討使辛亥侍中韓建罷守太保左僕射平章事楊涉罷守本官太常卿趙光逢為中書侍郎平章事翰林學士奉旨工部侍郎知制誥杜曉為尚書戶部侍郎平章事册府元龜卷一百九十九制內外使臣復命未見便歸私第者朝廷命使臣下奉行唯於辭見之儀合守敬恭之道近者凡差出使往復皆越常規或已辭而尚在本家或未見而先歸私第但從己便莫稟王程在禮敬而殊乖置典章而私舉宜令御史臺別具條流事件具黜罰等奏聞册府元龜卷一百九十一庚子殿直王唐福自襄城走馬以天軍勝捷逆將李洪歸降事上聞賜唐福絹銀有加宰臣百官上表稱賀壬寅開封府虞候李繼業齎襄州都指揮使程暉奏狀案歐陽史作行營招討使左衛上將軍陳暉舊五代史考異以今月五日殺戮逆黨千人並生擒都指揮使傅霸以下節級共五百人收復襄州人戶歸業事案歐陽史九月壬寅陳暉克襄州據薛史則陳暉以壬寅奏捷非以是日克城考通鑑克城繫九月丁酉與薛史今月五日正合歐陽史蓋據奏捷之日而書之耳舊五代史考異通鑑八月陳暉軍至襄州李洪逆戰大敗王求死九月丁酉拔其城斬叛兵千人執李洪楊虔等送洛陽斬之殿本癸卯帝御文明殿以收復襄漢襄漢下原本衍收字今據文刪去影庫本粘籤受宰臣以下稱賀册府元龜卷四百三十五詔曰秋冬之際陰雨相仍所司擇日拜郊或慮臨時妨事宜令別更擇日奏聞是月禮儀使奏今節十一月二日冬至一陽生之辰宜行親告之禮從之册府元龜卷一百九十三河中奏準宣詔使有銅牌者所至即易騎以遣册府元龜卷一百九十一十月癸未大明節帝御文明殿設齋僧道召宰臣翰林學士預之諸道節度刺史及內外諸司使咸有進獻永樂大典卷一萬六千四百八十七詔以寇盜未平凡諸給過所並令司門郎中案司門原本作司關考五代會要有司門郎中今改正舊五代史考異員外郎出給以杜姦詐永樂大典卷六千九百二十十一月癸巳朔帝齋於內殿不視朝甲午日長至五更一點自大內出於文明殿受宰臣以下起居自五鳳樓出南郊左右金吾太常兵部等司儀仗法駕鹵簿及左右內直控鶴等引從赴壇文武百官太保韓建以下班以候帝升壇告謝册府元龜卷一百九十三司天臺奏冬至日自夜半後祥風微扇帝座澄明至曉黃雲捧日册府元龜卷二百二丙申畋于上東門外册府元龜卷二百五戊戌制曰夫嚴親報本所以通神明流澤覃休所以惠黎庶斯蓋邦家不易之道皇王自昔之規敢斁大猷茲唯古義粵朕受命于今三年何曾不寅畏晨興焦勞夕惕師唐虞之典上則於乾功挹殷夏之源下涵於民極欲使萬方有裕六辨無愆然而志有所未孚理有所未達致姦宄作釁旱霪為災驕將守邊擁牙旗而背義積陰馭氣陵玉燭以干和載考休徵式昭至警朕是以仰高俯厚靡惜於責躬履薄臨淵冀昭于玄覽兢兢栗栗夙夜匪寧及夫動干戈而必契靈誅陳犧齋而克章善應苟非天垂丕佑神贊殊休則安可致夷凶渠致字疑有脫誤蓋册府元龜引薛史原文偶有舛誤也今無別本可校姑仍其舊影庫本粘籤就不戰之功變沴戾氣作有年之慶况靈旗北指喪犬羊于亂轍之間飛騎西臨下鄜翟若走丸之易息一隅之煙燧復千里之封疆而又掃蕩左馮討除峴首故得外戎內夏內夏原本作內憂今據文改正影庫本粘籤益知天命之攸歸喙息蚑行共識皇基之永固仰懷昭應欲報無階爰因南至之辰親展圜丘之禮茲惟大慶必及下民乃弘渙汗之私以錫疲羸之幸所冀漸臻蘇息亟致和平噫朕自臨御以來歲時尚邇氛昏未殄討伐猶頻甲兵須議於餽糧飛挽頻勞於編戶事非獲已慮若納隍宜所在長吏倍切撫綏明加勉諭每官中抽差徭役禁猾吏廣斂貪求免至流散靡依凋不濟宜令河南府開封府及諸道觀察使切加鈐轄刺史縣令不得因緣賦斂分外擾人凡關庶獄每望輕刑只候才罷用軍必當便議優給德音節文內有未該者宜令所司類例條件奏聞册府元龜卷一百九十一己亥以司門郎中羅廷規充魏博節度副使知府事仍改名周翰時鄴王紹威病日甚慮以後事故奏請焉通鑑考異引薛史辛丑幸穀水册府元龜卷二百五戊午御文明殿册太傅張宗奭為太保韓建受册畢按原本疑有脫訛金吾仗引升輅車儀仗導謁太廟訖赴尚書省上册府元龜卷一百九十九幸榆林坡閲兵教諸都馬步兵册府元龜卷二百十四敕改乾文院為文思院行從殿為興安殿毬場為興安毬場又改弓箭庫殿為宣威殿册府元龜卷一百九十六靈州奏鳳翔賊將劉知俊率邠岐秦涇之師侵迫州城帝遣陝州康懷英華州寇彥卿率兵攻迫邠寧以緩朔方之寇册府元龜卷二百十六案五代春秋十一月秦人來侵靈州陝州康懷英侵秦克寧慶衍三州秦人來襲懷英師敗于升平十二月乙丑臘較獵于甘泉驛册府元龜卷二百五以蒲州肇迹之地且因經略鄜延於是巡幸數月暇日遊豫至焦梨店頗述前事念王重榮舊功下詔褒奬而封崇之册府元龜卷二百十一國子監奏創造文宣王廟仍請率在朝及天下現任官僚俸錢每貫每月克寸一十五文充土木之值允之是歲以所率官僚俸錢修文宣王廟册府元龜卷一百九十四福建節度使王審知奏捨錢造寺一所請賜寺額敕名大梁萬歲之寺仍許度僧四十九人册府元龜卷一百九十四贈牢牆使王仁嗣司空故同州押衙史肇右僕射押衙王彥洪高漢詮丘奉言仇瓊並刑部尚書王筠御史司憲初知俊將叛謀會諸將詢所宜仁嗣等持正不撓悉罹其酷至是褒贈之册府元龜卷二百一十劉守光上言于薊州西與兄守文戰生擒守文通鑑注引薛史開平四年正月壬辰朔帝御朝元殿受百官稱賀用禮樂也册府元龜卷一百九十七敕公事難於稽遲居處悉皆遙遠其逐日當直中書舍人及吏部司封知印郎官少府監及篆印文兼書寫告身人吏等並宜輪次于中書側近宿止册府元龜卷一百九十一帝出師子門至榆林坡下閲教册府元龜卷二百十四壬寅幸保寧毬場錫宴宰臣及文武百官賜宰臣張宗奭已下分物有加賜廣王分物永樂大典卷一萬六千七百四十六賜湖南開元寺禪長老可復號惠光大師仍賜紫衣册府元龜卷一百九十四案五代春秋正月燕王守光克滄州通鑑引薛史劉守光生擒守文在三年十二月五代春秋作正月克滄州與薛史前後互異今附録五代春秋于正月末以備參考影庫本粘籤二月乙丑幸甘水亭册府元龜卷二百五帝出師子門幸榆林東北坡教諸軍兵事册府元龜卷二百十四賜潞州投歸軍使張行恭錦服銀帶並食册府元龜卷二百十五己丑出光政門至穀水觀麥册府元龜卷一百九十八戊辰宴於金鑾殿甲戌以春時無事頻命宰臣及勳戚宴於河南府池亭辛巳楊師厚赴鎮于陝寒食假諸道節度使郡守勳臣競以春服賀又連清明宴以鞍轡馬及金銀器羅錦進者逮千萬乃御宣威殿宴宰臣及文武官四品已上三月壬辰幸崇政院宴勳臣己亥幸天驥院宴侍臣壬寅幸甘水亭宴宰臣宴宰臣原本脫宴字今據文增入影庫本粘籤勳戚翰林學士辛亥宴宰臣於內殿丙辰於興安毬場大饗六軍樂春時也永樂大典卷一萬六千七百四十六四月壬戌詔曰追養以祿王者推歸厚之恩欲靜而風人子抱終身之感其以刑部尚書致仕張策及三品四品常參官二十二人先世先世原本作先正今據文改正影庫本粘籤各追贈一等册府元龜卷二百十乙丑宴崇政院帝在藩及踐阼勵精求理深戒逸樂未嘗命堂上歌舞是日止令內妓升階擊鼓弄曲甚歡至午而罷册府元龜卷一百九十七丁卯宋州節度使衡王友諒進瑞麥一莖三穗册府元龜卷二百二案通鑑云友諒獻瑞麥帝曰豐年為上瑞今宋州大水安用此為詔除本縣令名遣使詰責友諒容齋續筆亦載此事疑皆采薛史原文而册府元龜徵引梁書有所刪節也謹附載于此丙戌幸建春門閲新樓至七里屯觀麥召從官食于樓河南張昌孫及蒲同主事吏賜物各有差册府元龜卷二百五帝過朝邑見鎮將位在縣令上問左右或對曰宿官秩高帝曰令長字人也鎮使捕盜耳且鎮將多是邑民奈何得居民父母上是無禮也至是敕天下鎮使官秩無高卑位在邑令下册府元龜卷一百九十一葉縣鎮遏使馮德武於蔡州西平縣界殺戮山賊擒首領張濆等七人以獻册府元龜卷四百三十五鎮海軍節度使錢鏐擊高澧於湖州大敗之案九國志高澧以三年十月叛四年二月奔吳薛史繫于四月蓋以奏聞之日為據舊五代史考異梟夷擒殺萬人拔其郡湖州平先是澧以州叛入淮南故詔鏐討之也册府元龜卷二百十六五月己丑朔以連雨不止至壬辰御文明殿命宰臣分拜祠廟永樂大典卷二千六百三十二自朔旦至癸巳內外以午日奉獻巨萬計馬三千蹄餘稱是復相率助修內壘册府元龜卷一百九十七甲辰詔曰奇邪亂正假偽奪真既刑典之不容宜犯違而勿赦應東西兩京及諸道州府制造假犀玉真珠腰帶璧珥並諸色售用等一切禁斷不得輒更造作如公私人家先已有者所在送納長吏對面毀棄如行敕後有人故違必當極法仍委所在州府差人檢察收捕明行處斷册府元龜卷一百九十一魏博度使守太師兼中書令鄴王羅紹威薨帝哀慟曰天不使我一海內何奪忠臣之速也詔贈尚書令册府元龜卷二百四六月己未朔詔軍鎮勿起土功册府元龜卷一百九十一七月壬子宴宰臣河南尹翰林學士兩街使于甘水亭丙辰宴羣臣於宣威殿賜物有差册府元龜卷一百九十七劉知俊攻逼夏州案通鑑七月岐王與邠涇二帥各遣使告晉請合兵攻定難節度使李仁福晉王遣振武節度使周德威將兵會之合五萬衆圍夏州案五代春秋八月晉人秦人侵夏州與薛史及通鑑異舊五代史考異以宣化軍留後李思安為東北面行營都指揮使陝州節度使楊師厚為西路行營招討使册府元龜卷二百十六西路行營原本作兩路今從通鑑改正影庫本粘籤福州貢方物獻桐皮扇廣州貢犀玉獻舶上薔薇水册府元龜卷一百九十七時陳許汝蔡潁五州境內有蝝為災俄而許州上言有野禽羣飛蔽空旬日之間食蝝皆盡是歲乃大有秋永樂大典卷五千一百九八月車駕西征己巳次陝府是時憫雨且命宰臣從官分禱靈迹日中而雨翌日止帝大悅永樂大典卷二千六百三十二案五代春秋八月晉人秦人來侵夏州庚午次陝府辛未老人星見是日宴本府節度使楊師厚及扈從官于行宮賜師厚帛千匹仍授西路行營招討使丙子宴文武從官軍使已下設龜茲樂賜物有差册府元龜卷一百九十七九月丁亥朔命宰臣于兢赴西都祀昊天上帝於圜丘册府元龜卷一百九十三甲午至西京案五代春秋作九月己丑帝還西都歐陽史同通鑑作己丑上發陝甲午至洛陽舊五代史考異下詔曰朕聞歷代帝王首推堯舜為人父母孰比禹湯睿謀高出於古先聖德普聞於天下尚或卑躬待士屈己求賢俯仰星雲慮一民之遺逸網羅巖穴恐片善之韜藏延爵祿以徵求設丹青而訪召使其為政樂在進賢蓋繇國有萬幾朝稱百揆非才不治得士則昌自朕光宅中區迄今三載宵分輟寐日旰忘餐思共力於廟謀庶永清於王道而乃朝廷之內或未盡於昌言軍旅之間亦罕聞於奇策眷言方嶽下及山林豈無英奇副我延佇諸道都督觀察防禦使等或勳高翊世或才號知人必於塗巷之賢備察芻蕘之士詔到可精搜郡邑博訪賢良喻之以千載一時約之以高官美秩諒無求備唯在得人如有卓犖不羈沉潛自負通霸王之上略達文武之大綱究古今刑政之源識禮樂質文之變朕則待之不次委以非常用佐經綸豈勞階級如或一言拔俗一事出羣亦當舍短從長隨才授任大小方圓之器寧限九流溫良恭儉之人難誣十室勉思薦舉勿至因循俟爾發揚慰豫翹渴仍從別敕處分册府元龜卷二百十三辛丑以久雨命宰臣薛貽矩禜定鼎門趙光逢祠嵩嶽永樂大典卷一千五百二十一敕魏博管內刺史比來州務並委督郵遂使曹官擅其威權州牧同于間冗俾循通制宜塞異端並依河南諸州例刺史得以專達壬寅頒奪馬令先是王師擊賊獲馬多上獻至是盡止之蓋欲邀其奮擊之功也册府元龜卷一百九十一乙巳王師敗蕃寇於夏州初劉知俊誘沙振武賊帥周德威涇原賊帥李繼鸞合步騎五萬大舉欲俯拾夏臺節度使李仁福兵力俱乏以急來告先是供奉官張漢玫宣諭在壁國禮使杜廷隱賜幣于夏案廷隱原本作定隱下仍作廷隱今據九國志改正舊五代史考異及石堡寨聞賊至以防卒三百人馳入州既而大兵圍合廷隱漢玫與指揮使張初李君用率州民防卒與仁福部分固守晝夜戮力踰月及鄜延援至大軍奮擊敗之河東邠岐賊分路逃遁夏州圍解案通鑑甲申遣夾馬指揮使李遇劉綰自鄜延趨銀夏李遇等至夏州岐晉兵皆解去舊五代史考異丙午詔曰劉知俊貴為方伯尊極郡王而乃背誕朝恩竄投賊壘固神人之共怒諒天地所不容雖命討除尚稽擒戮宜懸爵賞以大功名必有忠貞咸思憤發有生擒劉知俊者賞錢千萬授節度使首級次之得孟審登者錢百萬除刺史得將孫坑卓瓌劉儒張鄰等賞有差册府元龜卷二百十六乙卯宴會羣臣於宣威殿册府元龜卷一百九十七
