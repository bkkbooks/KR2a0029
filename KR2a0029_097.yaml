body:
  text: 舊五代史卷九十七晉書二十三列傳第十二范延光案遼史避太宗諱作延廣舊五代史考異字子環子環歐陽史作子瓌考冊府元龜亦作環今仍其舊影庫本粘籤鄴郡臨漳人也少隸於郡牙唐明宗牧相州收為親校同光中明宗下鄆州梁兵屯楊劉口以扼之先鋒將康延孝潛使人送款於明宗明宗欲使人達機事於莊宗方難其選延光請行遂以蠟書授之延光既至奏莊宗曰楊劉渡控扼已定未可圖也請築壘馬家口以通汶陽之路莊宗從之復遣歸鄆州俄而梁將王彥章攻馬家口所築新壘明宗恐城中不備又遣間行告莊宗請益兵中夜至河上為梁兵所獲送夷門下獄榜笞數百威以白刃終不洩其事復為獄吏所護在獄半年不復理問及莊宗將至汴城獄吏即去其桎梏拜謝而出之乃見於路側莊宗喜授銀青光祿大夫檢校工部尚書明宗登極擢為宣徽使與霍彥威平青州王公儼遷檢校司徒明宗之幸夷門也至滎陽聞朱守殷拒命延光曰若不急攻賊堅矣請騎兵五百臣先赴之則人心必駭明宗從其請延光自酉時至夜央馳二百餘里奄至城下與賊交鬬翌日守陴者望見乘輿乃相率開門延光乃入與賊巷戰至厚載門盡殲其黨明宗喜之明年遷樞密使權知鎮州軍府事尋正授節旄加檢校太保長興中以安重誨得罪再入為樞密使加同平章事案明宗紀長興二年九月辛丑樞密使檢校太傅刑部尚書范延光加同平章事四年九月戊寅樞密使范延光加兼侍中是延光為同平章事時已由檢校太保進加太傅後復加侍中今泰安縣有長興四年九月冥福院牒石刻所列延光官銜仍作太傅蓋賜牒時尚未加侍中也傳中不載係史家前後省文既而以秦王從榮不軌恐及其禍屢請外任明宗久之方許遂出鎮常山清泰中復召為樞密使未幾出為汴州節度使會魏府屯將張令昭逐其帥劉延皓據城以叛唐末帝命延光討而平之遂授鄴都留守加檢校太師兼中書令門下有術士張生者自云妙通術數當延光微時言將來必為將相延光既貴酷信其言歷數鎮嘗館於上舍延光謂之曰余夢大蛇自臍入腹半而掣去之是何祥也張生曰蛇者龍也入腹為帝主之兆明矣延光自是稍萌僭竊之意及高祖建義於太原唐末帝遣延光以本部二萬屯遼州與趙延壽掎角合勢及延壽兵敗延光促還故心不自安高祖入洛尋封臨清王以寬其反側後延光擅殺齊州防禦使祕瓊而聚兵部下復收部內刺史入城高祖甚疑之乃東幸夷門時延光有牙校孫銳者與延光有鄉曲之舊軍機民政一以委焉故魏博六州之賦無半錢上供符奏之間有不如意者銳即對延光毀之其兇戾也如此初朝廷遣使封延光為臨清王因會僚屬延光暴得疾伏枕經旬銳乃密惑羣小召澶州刺史馮暉等以不臣之謀逼於延光延光亦惑於術者因而聽之天福二年夏六月遣銳與暉將步騎二萬南抵黎陽案通鑑云延光以馮暉為都部署以孫銳為兵馬都監舊五代史考異時銳以女妓十餘輩從之擁蓋操扇必歌吹而後食將士煩熱覩之解體尋為王師所敗賊衆退還鄴城高祖繼遣楊光遠討之延光知事不濟乃殺孫銳以歸其罪發人齎表待罪且邀姑息高祖不許及經歲受圍城中饑窘高祖以師老民勞思解其役遣謁者入謂之曰卿既危蹙破在旦夕能返掌轉規改節歸我我當以大藩處之如降而殺之則何以享國明明白日可質是言因賜鐵券改封高平郡王案歐陽史作東平郡王移鎮天平延光謂門人李式曰案歐史作副使李式主上敦信明義言無不踐許以不死則不死矣因撤守備案通鑑云延光猶遷延未決宣徽南院使劉處讓復入諭之延光意乃決舊五代史考異素服請降及赴汶上踰月入覲尋表請罷免高祖再三答諭方允制以延光為太子太師致仕居闕下期歲高祖每召賜飲宴待之與羣臣無間一日從容上奏願就河陽私邸以便頤養高祖許之延光攜妻子輦奇貨從焉每過郡邑多為關吏所糾時楊光遠居守洛下兼領孟懷既利其財復漸測朝廷密旨遂奏云延光國之奸臣若不羈縻必北走胡南入吳請召今西都居止高祖允之光遠使其子承勳以兵環其第逼令自裁延光曰明天子在上賜金書許我不死爾之父子何得脅制如此明旦則以白刃驅之令上馬之浮橋排於水中光遠紿奏云延光投河自溺而死水運軍使曹千獲其屍郡東繆家灘高祖聞之輟朝二日詔許歸葬於鄴仍贈太師案歐陽史云歸葬相州已葬墓輒崩破其棺槨頭顱皆碎延光初為近臣及領重鎮禮賢接士動皆由禮故甚獲當時之譽洎鎮常山日以部將梁漢唐獲王都名馬入罪而取之在魏州日以齊州防禦使祕瓊獲董溫琪珠金妓妾及經其境復害而奪之物議由是減之及懼罪以謀叛復忍恥以偷生不能引決遂至強死何非夫之甚也永樂大典卷一萬六千五百一十七張從賓未詳何許人也始事唐莊宗為小校從戰有功唐天成中自捧聖指揮使領澄州刺史遷左右羽林都校從藥彥稠討楊彥溫於河中平之長興中領壽州忠正軍節度使加檢校太保侍衞步軍都指揮使從賓素便佞每進言明宗多納之有供奉官丁延徽者性貪狡時奉詔監廩以犯贓下獄權貴多為救解明宗怒不許從賓因奏他事言及延徽明宗曰非但爾言蘇秦說予亦不得也延徽竟就戮長興末從賓出鎮靈武加檢校太傅高祖即位受代入覲會駕東幸留從賓警巡洛下一日逢留司御史於天津橋從兵百人不分路而過排御史於水中從賓紿奏其酒醉其兇傲如此及范延光據鄴城叛詔從賓為副部署使從楊光遠同討延光會延光使人誘從賓從賓時在河陽乃起兵以應之先害皇子重信及入洛又害皇子重乂取內庫金帛以給部伍因東據汜水關且欲觀望軍勢高祖命杜重威侯益分兵討之從賓大敗乘馬入河溺水而死焉永樂大典卷六千三百五十一張延播者汶陽人也始為郡之牙將唐同光初明宗下其城因收隸左右天成中累授檢校司空兩河發運營田使柳州刺史長興元年出牧蔡州加檢校司徒入為左領軍衞大將軍充客省使伐蜀之役命為馬軍都監三年遷鳳州防禦使西面水陸轉運使高祖即位除東都副留守車駕幸汴遣兼洛京巡檢使張從賓作亂令延播知河南府事從賓敗伏誅永樂大典卷六千三百五十一楊光遠小字阿檀及長止名檀唐天成中以明宗改御名亶以偏傍字犯之始改名光遠案薛史唐紀清泰二年楊檀始改名光遠非天成中即改名也舊五代史考異字德明其先沙陀部人也父阿啜後改名瑊事唐武皇為隊長光遠事莊宗為騎將唐天祐中莊宗遣振武節度使周德威討劉守光於幽州因令光遠隸於德威麾下後與德威拒契丹於新州一軍以深入致敗因傷其臂遂廢罷於家莊宗即位思其戰功命為幽州馬步軍都指揮使檢校尚書右僕射戍瓦橋關久之明宗朝歷媯瀛易冀四州刺史光遠雖不識字然有口辯通於吏理在郡有政聲明宗頗重之長興中契丹有中山之敗生擒其將李和等數十人送於闕下其後契丹既通和遣使乞歸之明宗與大臣謀議特放還蕃一日召光遠於便殿言其事光遠曰李和等北土之善戰者彼失之如喪手足又在此累年備諳中國事若放還非便明宗曰蕃人重盟誓既通歡好必不相負光遠曰臣恐後悔不及也明宗遂止深嘉其抗直後自振武節度使移鎮中山累加檢校太傅將兵戍蔚州高祖舉義於太原唐末帝遣光遠與張敬達屯兵於城下俄而契丹大至為其所敗圍其寨久之軍中糧盡光遠乃與次將安審琦等殺敬達擁衆歸命從高祖入洛加檢校太尉充宣武軍節度使同平章事判六軍諸衞事是時光遠每對高祖常挹然不樂高祖慮有不足密遣近臣訊之光遠附奏曰臣貴為將相非有不足但以張生鐵死得其所臣弗如也衷心內愧是以不樂生鐵蓋敬達之小字也高祖聞其言以光遠為忠純之最者也其實光遠故為其言以邀高祖之重信也明年范延光據鄴城叛高祖命光遠率師討之將濟河會滑州軍亂時軍衆欲推光遠為主光遠曰自古有折臂天子乎且天子豈公輩販弄之物晉陽之降乃勢所窮迫今若為之直反賊也由是其下惕然無復言者高祖聞之尤加寵重光遠既圍延光尋授魏博行府節度使兵柄在手以為高祖懼己稍干預朝政或抗有所奏高祖亦曲從之復下詔以其子承祚尚長安公主次子承信皆授美官恩渥殊等為當時之冠桑維翰為樞密使往往彈射其事光遠心銜之及延光降光遠入朝面奏維翰擅權高祖以光遠方有功於國乃出維翰鎮相州光遠為西京留守案通鑑考異云晉高祖實錄天福三年壬辰維翰崧罷樞密使庚子光遠始入朝對于便殿十一月戊申光遠為西京留守天福四年閏七月壬申維翰出為相州節度使與此傳先後互異舊五代史考異兼鎮河陽因罷其兵權光遠由此怨望潛貯異志多以珍玩奉契丹訴己之屈又私養部曲千餘人撓法犯禁河洛之人恆如備盜尋冊拜太尉兼中書令時范延光致仕輦囊裝妓妾居於河陽光遠利其奇貨且慮為子孫之讎因奏延光不家汴洛出舍外藩非南走淮夷則北走契丹宜早除之高祖以許之不死鐵券存焉持疑未允光遠乃遣子承勳以甲士圍其第逼令自裁延光曰天子在上安得如此乃遣使者乞移居洛下行及河橋擯於流而溺殺之矯奏云延光自投河朝廷以適會其意弗之理後踰歲入覲高祖為置曲宴教坊伶人以光遠暴斂重賦因陳戲譏之光遠殊無慚色高祖謂光遠曰元城之役卿左右皆立功未曾旌賞今各與一郡俾釐任以榮之因命為刺史者凡數人時王建立自青州移鎮上黨乃以光遠為平盧軍節度使封東平王光遠面奏請與長子同行尋授承勳萊州防禦使及赴任僕從妓妾至千餘騎滿盈僭侈為方岳之最下車之後唯以刻剝為事少帝嗣位冊拜太師封壽王案宋史馬仁鎬傳晉天福中青州楊光遠將圖不軌以仁鎬為節度副使伺其動靜歷二年或譖仁鎬于朝改護國軍行軍司馬仁鎬至河中數月光遠反書聞舊五代史考異後因景延廣上言請取光遠麾下所借官馬三百疋光遠怒曰此馬先帝賜我何以復取是疑我也遂遣人潛召取子承祚自單州奔歸朝廷乃就除淄州刺史以從其便光遠益驕因此搆契丹述少帝違好之短且言大饑之後國用空虛此時一舉可以平定開運元年正月契丹南牧陷我博陵少帝幸澶淵三月契丹退命李守貞符彥卿率師東討光遠素無兵衆唯嬰城自守守貞以長連城圍之冬十一月承勳與弟承信承祚見城中人民相食將盡知事不濟勸光遠乞降冀免於赤族光遠不納曰我在代北時嘗以紙錢駝馬祭天池皆沉沒人言合有天子分宜且待時勿輕言降也承勳慮禍在旦夕與諸弟同謀殺節度判官丘濤親校杜延壽楊贍白延祚等梟其首級遣承祚送於守貞因縱火大譟劫其父幽於私第以城納款遣即墨縣令王德柔貢表待罪光遠亦上章自首少帝以頃歲太原歸命欲曲全之執政曰豈有逆狀滔天而赦之也乃命守貞便宜處置守貞遣人拉殺之案歐陽史守貞遣客省副使何延祚殺之於其家舊五代史考異以病卒聞漢高祖即位詔贈尚書令追封齊王仍令立碑未幾其碑石無故自折案歐陽史作碑石既立天大雷電擊折之舊五代史考異可知其陰責也永樂大典卷六千五十二五代史補楊光遠滅范延光之後朝廷以其功高授青州節度封東平王奄有登萊沂密數郡既而自負強盛舉兵友朝廷以宋州節度李守貞嘗與光遠有隙乃命李討之李受詔欣然志在必取莫不身先矢石光遠見而懼之度不能禦遂降初光遠反書至中外大震時百官起居次忽有朝士揚言於衆曰楊光遠欲謀大事吾不信也光遠素患禿瘡其妻又跛自古豈有禿頭天子跛脚皇后耶於是人心頓安未幾光遠果降承勳光遠之長子也始名承貴避少帝名改焉以父廕歷光濮州刺史光遠兼鎮河陽命制置三城事光遠移鎮青州授萊州防禦使在郡亦頗理嘗憤父側之奸黨欲殺之每省父父為匿焉及光遠搆釁嬰城以叛承勳赴之敵退為王師所圍踰歲糧盡與其弟承祚背父之命出降王師朝廷授汝州防禦使尋改鄭州案宋史楊承信傳光遠死承信與弟承祚詣闕請死詔釋之以承信為右羽林將軍承祚為右驍衞將軍放歸服喪私第尋安置鄭州舊五代史考異及戎王入汴遣騎士自圃田召至責其害父背己使臠其肉而殺之以其弟承信為青州節度使永樂大典卷六千五十二盧文進字國用案遼史文進字大用案南唐書文進字大用遼史太祖紀神冊元年晉幽州節度盧國用來降二年晉新州裨將盧文進殺節度李文矩來降則國用與文進顯係二人然天顯元年又書盧龍節度使盧國用叛奔于唐即文進歸唐之事也疑文進入遼以後遂以字行修遼史者雜采諸書誤作兩人耳舊五代史考異范陽人也身長七尺飲啖過人望之偉如也少事劉守光為騎將唐莊宗攻燕以文進首降遙授壽州刺史初莊宗得山後八軍以愛弟存矩為新州團練使以總領之莊宗與劉鄩對壘於莘縣命存矩於山後召募勁兵又令山北居民出戰馬器仗每鬻牛十頭易馬一匹人心怨咨時存矩團結五百騎令文進將之與存矩俱行至祁溝關軍士聚謀曰我輩邊人棄父母妻子為他血戰千里送死固不能也衆曰擁盧將軍却還新州據城自守奈我何因大呼揮戈趣傳舍害存矩於榻下文進撫膺曰奴輩累我矣因環尸而泣曰此輩既害郎君我何面目見王案遼史存矩取文進女為側室文進心常內愧因與亂軍殺存矩與薛史異因為亂軍所擁反攻新州不克案馬令南唐書云文進攻新州不克夜走墜塹一躍而出明日視之乃郡之黑龍潭也絕岸數丈深不可測又嘗有大蛇徑至座間引首及膝文進取食飼之而去由是自負舊五代史考異又攻武州又不利周德威命將追討文進遂奔契丹偽命為幽州兵馬留後部分漢軍常別為營寨未幾文進引契丹寇新州自是戎師歲至驅擄數州士女教其織工作中國所為者悉備契丹所以彊盛者得文進之故也案遼史云文進引契丹軍攻新州刺史安金全不能守棄城去周德威援之進攻新州契丹衆數萬德威不勝大敗奔歸文進與契丹進攻幽州且二百日城中危困晉王親將兵救之方始解去契丹以文進為幽州節度使又以為盧龍節度使與薛史所載官階微異同光之世為患尤深文進在平州率奚族勁騎鳥擊獸搏來忽往燕趙諸州荊榛滿目軍屯涿州每歲運糧自瓦橋至幽州勁兵猛將援遞糧車然猶為寇所鈔奔命不暇皆文進導之也及明宗即位之明年文進自平州率所部十餘萬衆來奔行及幽州先遣使上表曰頃以新州團練使李存矩提衡羣邑掌握恩威虐黎庶則毒甚於豺狼聚賦斂則貪盈於溝壑人不堪命士各離心臣即拋父母之邦入朔漠之地幾年鴈塞徒向日以傾心一望家山每銷魂而斷目李子卿之河畔空有怨辭石季倫之樂中莫陳歸引近聞皇帝陛下皇天眷命清明在躬握紀乘乾鼎新革故始知大幸有路朝宗便貯歸心祗伺良會臣十月十日決計殺在城契丹取十一日離州押七八千車乘領十五萬生靈十四日已達幽州云洎至洛陽明宗寵待彌厚授滑州節度使檢校太尉歲餘移鎮鄧州累加同平章事入為上將軍長興中復出鎮潞州擒奸卹隱甚獲當時之譽清泰中改安州節度使及高祖即位與契丹敦好文進以嘗背契丹居不自安案馬令南唐書文進居數鎮頗有善政兵民愛之其將行也從數騎至營中別其裨將李藏機告以避契丹之意將士皆拜為訣舊五代史考異天福元年十二月乃殺行軍司馬馮知兆案南唐書作姚知兆歐陽史與薛史同舊五代史考異節度副使杜重貴等率其部衆渡淮奔於金陵李待之尤重案馬令南唐書云烈祖以文進為天雄統軍舊五代史考異偽命為宣州節度使後卒於江南永樂大典卷二千二百十二案金陵志文進自潤州召還以左衞上將軍兼中書令范陽郡王奉朝請李金全本唐明宗之小豎也其先出於吐谷渾金全驍勇善騎射少從明宗征伐以力戰有功明宗即位連典大郡天成中授涇州節度使在鎮數年以掊斂為務長興中受代歸闕始進馬數十匹不數日又進之明宗召而謂之曰卿患馬多耶何進貢之數也又謂曰卿在涇州日為理如何無乃以馬為事否金全慚謝而退案歐陽史徙鎮橫海久之罷為右衞上將軍四年夏授滄州節度使累官至檢校太傅清泰中罷鎮歸闕久留於京師高祖即位之明年安州屯將王暉殺節度使周環詔遣金全以騎兵千人鎮撫其地未及境暉為部下所殺金全至亂軍數百人皆不自安金全說遣赴闕密伏兵於野盡殺之又擒其軍校武彥和等數十人斬之案歐陽史作武克和案歐陽史南唐書俱作武克和通鑑從是書殿本初金全之將行也高祖戒之曰王暉之亂罪莫大焉但慮封守不寧則民受其弊因折矢飛詔約以不戮一人仍許以暉為唐州刺史又謂金全曰卿之此行無失吾信及金全至聞彥和等當為亂之日劫掠郡城所獲財貨悉在其第遂殺而奪之案通鑑云彥和且死呼曰王暉首惡天子猶赦之我輩脅從何罪乎舊五代史考異高祖聞之以姑息金全故不究其事尋授以旄節金全有親吏胡漢筠者案歐陽史作胡漢榮胡漢筠歐陽史及南唐書俱作胡漢榮通鑑從是書殿本勇譎嗇褊貪詐殘忍軍府之政一以委之高祖聞其事遣吏賈仁紹案通鑑作仁沼考異云薛史作仁紹今從實錄歐陽史南唐書與通鑑同舊五代史考異往代其職且召漢筠漢筠內疚惶怖金全乃列狀稱疾以聞及仁紹至漢筠鴆而殺之案馬令南唐書云胡漢榮所為多不法晉高祖患之不欲因漢榮以累功臣為選廉吏賈仁沼代之且召漢榮漢榮教金全留己而不遣金全客龐令圖諫曰仁沼昔事王晏球有大功晏球欲厚賞之仁沼退而不言此天下之忠臣也及頒賜所俘物仁沼悉以分故人親戚之貧者此天下之廉士也宜納仁沼而遣漢榮漢榮聞之夜使人殺令圖而鴆仁沼舊五代史考異天福五年夏高祖命馬全節為安州節度使以代金全漢筠自以昔嘗拒命復聞仁紹二子將訴置毒之事居不自安乃紿謂金全曰邸吏劉珂使健步倍道兼行密傳其意云受代之後朝廷將以仁紹之事詰公之罪金全大駭命從事張緯函表送款於淮夷淮人遣偽將李承裕以代金全金全即日南竄其妓樂車馬珍奇帑藏皆為承裕所奪與其黨數百人束身夜出曉至义川引領北望泣下而去及至金陵李授以節鎮案馬令南唐書云烈祖以金全為天威統軍遷潤州節度使舊五代史考異後卒於江南永樂大典卷一萬三百九十史臣曰延光昔為唐臣綽有令譽洎逢晉祚顯恣狂謀既力屈以來降尚靦顏而惜死孟津之歿乃取笑於千載也從賓而下俱怙亂以滅身亦何足與議也文進懼強敵之威金全為輿臺所賣事雖弗類叛則攸同咸附島夷皆可醜也永樂大典卷一萬三百九十
