body:
  text: 舊五代史卷四十六唐書二十二末帝紀上末帝諱從珂本姓王氏鎮州人也母宣憲皇后魏氏以光啓元年歲在乙巳正月二十三日生帝於平山景福中明宗為武皇騎將略地至平山遇魏氏虜之帝時年十餘歲明宗養為己子案通鑑考異引唐廢帝實録云廢帝諱從珂明宗之元子也母曰宣憲皇后魏氏鎮州平山人中和末明宗徇地山東留戍平山得魏后帝以光啓元年正月二十三日生於外舍屬用兵不息音問阻絶帝甫十歲方得歸宗今考五代會要歐陽史諸書皆作養子惟實録作元子疑因太后令稱為皇長子而傅會也通鑑仍從薛史小字二十三帝幼謹重寡言及壯長七尺餘方頤大體材貌雄偉以驍果稱明宗甚愛之在太原嘗與石敬瑭因擊毬同入于趙襄子之廟見其塑像屹然起立帝祕之私心自負及從明宗征討以力戰知名莊宗嘗曰阿三不惟與我同齒敢戰亦相類莊宗與梁軍戰於胡柳陂兩軍俱撓帝衛莊宗奪土山摧驍陳其軍復振時明宗先渡河莊宗不悅謂明宗曰公當為吾死渡河安往明宗待罪莊宗以帝從戰有功由是解慍天祐十八年莊宗營於河上議討鎮州留守符存審在德勝寨未行梁人謂莊宗已北乃悉衆攻德勝德勝原本作得勝今從通鑑改正影庫本粘籤莊宗命明宗存審為兩翼以抗之自以中軍前進梁軍退却帝以十數騎雜梁軍而退至壘門大呼斬首數級斧其望櫓而還莊宗大噱曰壯哉阿三賜酒一器同光元年四月從明宗襲破鄆州九月莊宗敗梁將王彥章於中都急趨汴州明宗將前軍帝率徑騎以從晝夜兼行率先下汴城莊宗勞明宗曰復唐社稷卿父子之功也二年以帝為衛州刺史時有王安節者昭宗朝相杜讓能之宅吏也杜讓能原本作社誼能今從新唐書改正影庫本粘籤安節少善賈得相術於奇士因事見帝於私邸退謂人曰真北方天王相也位當為天子終則我莫知也三年明宗奉詔北禦契丹以家在太原表帝為北京內衙指揮使莊宗不悅以帝為突騎都指揮使遣戍石門四年魏州軍亂明宗赴洛時帝在橫水率部下軍士由曲陽盂縣趨常山與王建立會倍道兼行渡河而南由是明宗軍聲大振天成初以帝為河中節度使明年二月加檢校太保同平章事十一月加檢校太傅長興元年加檢校太尉先是帝與樞密使安重誨在常山因杯盤失意帝以拳擊重誨腦中其櫛走而獲免帝雖悔謝然重誨終銜之及帝鎮河中重誨知其出入不時因矯宣中旨令牙將楊彥溫遇出郭則閉門勿納是歲四月五日帝閲馬於黃龍莊閲馬原本作問軍今從通鑑改正影庫本粘籤彥溫閉城拒帝帝聞難遽還遣問其故彥溫曰但請相公入朝此城不可入也帝止虞鄉以聞明宗詔帝歸闕遣藥彥稠將兵討彥溫令生致之面要鞫問十一月收城彥溫已死明宗以彥稠不能生致彥溫甚怒之後數日安重誨以帝失守諷宰相論奏行法明宗不悅重誨又自論奏明宗曰朕為小將校時家徒衣食不足賴此兒荷石灰收馬糞存養以至今貴為天子而不能庇一兒卿欲行朝典朕未曉其義卿等可速退從他私第間坐遂詔歸清化里第清化里原本脫清字今從通鑑注所引薛史增入影庫本粘籤不預朝請帝尚懼重誨多方危陷但日諷佛書陰禱而已二年安重誨得罪帝即授左衛大將軍未幾復檢校太傅同平章事行京兆尹充西京留守三年進位太尉移鳳翔節度使四年五月封潞王閔帝即位加兼侍中既而帝子重吉出刺亳州女尼入宮帝方憂不測應順元年二月移帝鎮太原是時不降制書唯以宣授而已帝聞之召賓佐將吏以謀之皆曰主上年幼未親庶事軍國大政悉委朱弘昭等王必無保全之理判官馬裔孫曰君命召不俟駕行焉諸君凶言非令圖也是夜帝令李專美草檄求援諸道李專美原本作專養今從薛史李專美傳改正影庫本粘籤欲誅君側之罪朝廷命王思同率師來討三月十五日外兵大集案通鑑考異是年三月辛丑朔是十五為乙卯也九國志李彥琦傳潞王守岐下諸道將急攻其壘彥琦時在圍中罄家財以給軍用舊五代史考異十六日大將督衆攻城帝登城垂泣諭於外曰我年未二十從先帝征伐出生入死金瘡滿身樹立得社稷軍士從我登陳者多矣今朝廷信任賊臣殘害骨肉且我有何罪因慟哭聞者哀之時羽林都指揮使楊思權謂衆曰大相公吾主也遂引軍自西門入嚴衛都指揮使尹暉亦引軍自東門而入外軍悉潰十七日率居民家財以賞軍士是日帝整衆而東二十日次長安副留守劉遂雍以城降率京兆居民家財犒軍二十三日次靈口案通鑑唐紀作零口考冊府元龜亦作靈口今仍其舊舊五代史考異誅王思同二十四日次華州收藥彥稠繫獄二十五日次閿鄉王仲臯父子迎謁命誅之二十六日次靈寶河中節度使安彥威來降待罪宥之遣歸鎮陝州節度使康思立奉迎二十七日次陝州案歐陽史作己巳次陝州薛史閔帝紀作丁卯通鑑從薛史舊五代史考異下令告諭京城二十八日康義誠軍前兵士相繼來降義誠詣軍門請罪帝宥之駕下諸軍畢至誅宣徽南院使孟漢瓊於路左是夜閔帝與帳下親騎百餘出玄武門而去夏四月壬申帝至蔣橋文武百官立班奉迎案通鑑四月庚午朔太后令內諸司至乾壕迎潞王考異引廢帝實録作三月三十日舊五代史考異教旨以未拜梓宮未可相見俟會於至德宮時六軍勳臣及節將內職已纍表勸進是日帝入謁太后太妃至西宮伏梓宮慟哭宰相與百僚班見致拜帝答拜馮道等上箋勸進馮道原本作焉道考契丹國志云百官班見潞王答拜馮道等上箋勸進知焉字係馮字之訛今改正影庫本粘籤帝立謂羣臣曰豫之此行事非獲已當俟主上歸闕園陵禮終退守藩服諸公言遽及此信無謂也衛州刺史王弘贄奏閔帝以前月二十九日至州癸酉皇太后下令降閔帝為鄂王案通鑑引閔帝實録七日廢帝為鄂王廢帝實録作癸酉薛歐陽二史從廢帝實録舊五代史考異又太后令曰先皇帝誕膺天眷光紹帝圖明誠動於三靈德澤被於四海方期偃革遽歎遺弓自少主之承祧為奸臣之擅命離間骨肉猜忌磐維既輒易於藩垣復驟興於兵甲遂致輕離社稷大撓軍民萬世鴻基將墜於地皇長子潞王從珂位居冢嗣德茂冲年乃武乃文惟忠惟孝前朝廓清多難有戰伐之大功纘紹丕圖有夾輔之盛業今以宗祧乏祀園寢有期須委親賢俾居監撫免萬機之壅滯慰兆庶之推崇可起今月四日知軍國事權以書詔印施行是日監國在至德宮至德宮原本作直德今從通鑑改正影庫本粘籤宰臣馮道等率百官班於宮門待罪帝出於庭曰相公諸人何罪請復位乃退甲戌太后令曰先皇帝櫛風沐雨平定華夷嗣洪業於艱難致蒼生於富庶鄂王嗣位奸臣弄權作福作威不誠不信離間骨肉猜忌磐維鄂王輕捨宗祧不克負荷洪基大寶危若綴旒須立長君以紹丕搆皇長子潞王從珂日躋孝敬天縱聰明有神武之英姿有寬仁之偉略先朝經綸草昧廓靜寰區辛勤有百戰之勞忠貞贊一統之運臣誠子道冠古超今而又克己化民推心撫士率土之謳歌有屬上蒼之眷命攸臨一日萬機不可以暫曠九州四海不可以無歸况因山有期同軌斯至永言嗣守屬任元良宜即皇帝位乙亥監國赴西宮柩前告奠即位攝中書令李愚宣冊書曰維應順元年歲次甲午四月庚午朔六日乙亥文武百僚特進守司空兼門下侍郎同中書門下平章事充太微宮使太微原本作大徵今從新唐書改正影庫本粘籤弘文館大學士上柱國始平郡公食邑二千五百戶臣馮道等九千五百九十三人上言帝王興運天地同符河出圖而洛出書雲從龍而風從虎莫不恢張八表覆育兆民立大定之基保無疆之祚人謠再洽天命顯歸須登宸極之尊以奉祖宗之祀伏惟皇帝陛下天資仁智神助機權奉莊宗於多難之時從先帝於四征之際凡當决勝無不成功洎正皇綱每嚴師律為國家之志大守臣子之道全自泣遺弓常悲易月欲期同軌親赴因山而自鄂王承祧奸臣擅命致神祇之乏饗激朝野以歸心使屈者伸令否者泰人情大順天象至明聚東井以呈祥拱北辰而應運由是文武百辟嶽牧羣賢至於比屋之倫盡祝當陽之位今則承太后慈旨守先朝遠圖撫四海九州享千齡萬祀臣等不勝大願謹上寶冊稟太后令奉皇帝踐祚臣等誠慶誠忭謹言帝就殿之東楹受羣臣稱賀先是帝在鳳翔日有瞽者張濛自言知術數張濛原本作張澄考歐陽史及冊府元龜並作濛今改正影庫本粘籤事太白山神其神祠即元魏時崔浩廟也時之否泰人之休咎濛告於神即傳吉凶之言帝親校房皓酷信之一日濛至府聞帝語聲駭然曰非人臣也皓詢其事即傳神語曰三珠並一珠驢馬沒人驅歲月甲庚午中興戊己土皓請解釋曰神言豫不知也長興四年五月府廨諸門無故自動人頗駭異遣皓問濛濛曰衙署小異勿怪不出三日當有恩命是夜報至封潞王及帝移鎮河東甚懼問濛濛曰王保無患王思同兵至又詰之濛曰王有天下不能獨力朝廷兵來迎王也王若疑臣臣唯一子請王致之麾下以質臣心帝乃以濛攝館驛巡官至是帝受冊冊曰維應順元年歲次甲午四月庚午朔帝回視房皓曰張濛神言甲庚午不亦異乎帝令皓共術士解三珠一珠事言三珠三帝也驢馬沒人驅失位也帝即位之後以濛為將作少監同正仍賜金紫以酬之帝初封潞王言事者云潞字一足已入洛矣案原本作一足已入潞矣今據冊府元龜改正又帝在鳳翔日有何叟者年踰七十暴卒見陰官憑几告叟曰為我言於潞王來年三月當為天子二十三年叟既蘇懼不敢言逾月復卒陰官見而叱之曰安得違吾旨不達其事再放汝還退見廊廡下簿書以問主者曰朝代將易此即升降人爵之籍也及蘇詣帝親校劉延朗告之帝召而問之叟曰請質之此言無徵戮之可也後人云二十三蓋帝之小字也案太平廣記引王氏見聞録作馬步判官何某即位後擢為天興縣令孔本又石壕人胡杲通善天文帝召問之曰王貴不可言若舉動宜以乙未年及舉兵又問之杲通曰今歲蔀首王者不宜建功立事若俟來歲入朝則福祚永遠矣其後皆驗夫如是則大寶之位必有冥數可輕道哉丙子詔河南府率京城居民之財以助賞軍丁丑又詔預借居民五箇月房課不問士庶一概施行帝素輕財好施自岐下為諸軍推戴告軍士曰候入洛人賞百千至是以府藏空匱於是有配率之令京城庶士自絶者相繼己卯衛州奏此月九日鄂王薨庚辰以宰臣劉昫判三司案夢溪筆談載應順元年案檢一通乃除宰相劉昫兼判三司堂檢前有擬狀云具官劉昫右經國才高正君志切方屬體元之運實資謀始之規宜注宸衷委司判計漸期富庶永贊聖明臣等商量望授依前中書侍郎兼吏部尚書同中書門下平章事充集賢殿大學士兼判三司散官勳封如故未審可否如蒙允許望付翰林降制處分謹録奏聞其後有制書曰宰臣劉昫右可兼判三司公事宜令中書門下依此施行付中書門下准此四月十日用御前新鑄之印押檢二人乃馮道李愚也案此條可考見五代時案檢之式今附録於此孔本辛巳邢州奏磁州刺史宋令詢自經而卒令詢鄂王在藩時都押牙也故至於是甲申案下文有癸未疑當作壬午舊五代史考異帝以鄂王薨行服於內園羣臣奉慰癸未太后太妃出宮中衣服器用以助賞軍乙酉帝服袞冕御明堂殿文武百僚朝服就位宣制改應順元年為清泰元年大赦天下常赦不原者咸赦除之丁亥以宣徽北院使郝瓊為宣徽南院使權判樞密院以前三司使王玫為宣徽北院使以隨駕牙將宋審虔為皇城使劉延朗為莊宅使鳳翔節度判官韓昭裔為左諫議大夫充端明殿學士觀察判官馬裔孫為翰林學士掌書記李專美為樞密院直學士戊子侍衛親軍都指揮使康義誠伏誅案五代春秋乙酉誅康義誠朱弘昭馮贇然弘昭投井死贇為安從進所殺俱在三月未嘗與義誠同日伏誅也歐陽史作戊子殺康義誠及藥彥稠通鑑作己丑殺彥稠舊五代史考異是日詔曰樞密使朱弘昭馮贇宣徽南院使孟漢瓊西京留守王思同前邠州節度使藥彥稠共相朋煽妄舉干戈互興離間之謀幾構傾亡之禍宜行顯戮以快羣情仍削奪官爵云庚寅鳳翔奏西川孟知祥僭稱大蜀年號明德有司上言皇帝以五月朔日御明堂殿受朝三日夏至祀皇地祇前二日奏告獻祖室不坐比正旦冬至是日有祀事則次日受朝今祀在五鼓前質明行禮畢御殿在旦後請比例行之詔曰日出御殿舉祀事無妨宜依常年例史館奏凡書詔及處分公事臣下奏議望令近臣録付當館詔端明殿學士韓昭裔樞密直學士李專美録送辛卯以左諫議大夫盧損為右散騎常侍壬辰詔賜禁軍及鳳翔城下歸明將校錢帛各有差案通鑑云禁軍在鳳翔歸命者自楊思權尹暉等各賜二馬一駝錢七十緡下至軍人錢二十緡其在京者各十緡舊五代史考異初帝離岐下諸軍皆望以不次之賞及從至京師不滿所望相與謠曰去却生菩薩扶起一條鐵其無厭如此案通鑑作除去菩薩扶立生鐵胡三省注云閔帝小字菩薩丙申葬明宗皇帝於徽陵丁酉奉神主於太廟戊戌山陵使司空兼門下侍郎平章事馮道上表納政不允五月庚子朔御文明殿受朝賀乙巳以左龍武指揮使安審琦為左右捧聖都指揮使以右千牛上將軍符彥饒為左右嚴衛都指揮使丙午以端明殿學士韓昭裔為樞密使以莊宅使劉延朗為樞密副使以權知樞密事房皓為宣徽北院使以成德軍節度使大同彰國振武威塞等軍蕃漢馬步都部署檢校太尉兼中書令駙馬都尉石敬瑭為北京留守河東節度使加檢校太師兼中書令都部署如故汴州節度使檢校太師兼侍中駙馬都尉趙延壽進封魯國公戊申中書門下奏太常禮院狀明宗以此月二十日祔廟宰臣攝太尉行事緣馮道在假李愚十八日私忌在致齊內劉昫又奏判三司免祀事案五代會要清泰元年五月宰臣劉昫奏中書以近敕祠祭行事官致齊內唯祀事得行其餘悉斷又宰臣行事致齊內不押班不赴內殿起居不知印臣緣判三司公事其祀事國忌行香伏乞特免從之舊五代史考異詔禮官參酌有司上言李愚私忌在致齊內諸私忌日遇大朝會入閣宣召皆赴朝參今祔廟事大忌日屬私請比大朝會宣召例案五代會要載此奏下有差李愚從事五字薛史刪去從之以陝府節度使康思立為邢州節度使以同州節度使安重霸為西京留守以羽林右第一軍都指揮使春州刺史楊思權為邠州節度使己酉左監門衛將軍孔知鄴右驍衛將軍華光裔並勒停見任時差知鄴應州告廟稱疾辭命改差光裔復稱馬墜傷足故俱罷之庚戌以司空兼門下侍郎平章事馮道為檢校太尉同平章事充同州節度使以天雄軍節度使范延光為樞密使封齊國公鄆州節度使李從曮為鳳翔節度使辛亥以嚴衛都指揮使尹暉為齊州防禦使甲寅以侍衛馬軍都指揮順化軍節度使安從進為河陽節度使典軍如故太常卿盧文紀奏明宗一室酌獻舞曲請名雍熙之舞從之丁巳以皇子銀青光祿大夫檢校工部尚書重美為檢校司徒守左衛上將軍自是諸道節度使刺史文武臣僚相繼加檢校官或階爵封邑以帝登位覃慶也戊午以隴州防禦使相里金為陝州節度使陝州原本作隰州今從通鑑及歐陽史改正影庫本粘籤初帝以檄書告藩鄰唯金遣判官薛文遇往來計事故以節鎮奬之宣徽北院使檢校工部尚書房皓加檢校司空行左威衛大將軍使如故以樞密使左諫議大夫韓昭裔為刑部尚書使如故己未太白晝見以樞密副使劉延朗為左領軍大將軍職如故庚申左僕射門下侍郎平章事監修國史李愚加特進充太微宮使弘文館大學士餘如故中書侍郎兼吏部尚書同平章事集賢院大學士判三司劉昫加門下侍郎兼吏部尚書平章事監修國史判三司癸亥秦州奏西川孟知祥出軍迫陷成州以宣徽南院使右驍衛大將軍郝瓊為左驍衛上將軍職如故以前義州刺史張承祐為武勝軍留後戊辰以前右龍武統軍王景戡為右驍衛上將軍六月庚午朔改侍衛捧聖軍為彰聖改嚴衛軍為寧衛壬申封吳嶽成德公為靈應王禮秩同五嶽帝初起遣使祭嶽以求祐及登祚故有是報案五代會要載中書門下奏天寶十載正月封吳山成德公與沂山會稽醫巫閭同封至德二載十二月改吳山為嶽祠享官屬一同五嶽今國家欲祈禱靈應宜示殊禮臣等商量請加封為靈應王從之舊五代史考異幽州節度使趙德鈞進封北平王青州節度使房知溫進封東平王癸酉以前鄜州節度使索自通為右龍武統軍甲戌皇子左衛上將軍重美加檢校太保同平章事充鎮州節度使兼河南尹判六軍諸衛事丁丑詔天下見禁罪人委所在長吏躬親慮問疾速疏決庚辰幸至德宮因幸房知溫安元信范延光索自通李從敏第壬午以檢校太子太傅致仕王建立為檢校太尉兼侍中鄆州節度使以前宋州節度使安元信為檢校太尉兼侍中潞州節度使癸未三司使劉昫奏天下戶民自天成二年括定秋夏田稅逮今八年近者相次有百姓詣闕訴田不均纍行蠲放漸失稅額望差朝臣一概檢視不報甲申帝為故皇子亳州刺史重吉皇長女尼惠明大師幼澄舉哀行服羣臣詣閣門奉慰帝起兵之始重吉幼澄俱為閔帝所害乙酉以戶部侍郎韓彥惲為絳州刺史以左武衛上將軍李肅為單州刺史丙戌襄州節度使趙在禮加同平章事甲午以武勝軍留後張承祐為華州節度使以皇城使宋審虔為壽州節度使充侍衛步軍都指揮使以右衛上將軍劉仲殷為宋州節度使以侍衛步軍都指揮使壽州節度使皇甫遇為鄧州節度使以前華州節度使華溫琪為太子太傅致仕丁酉左神武統軍周知裕卒贈太傅是月京師大旱熱甚暍死者百餘人秋七月庚子太子少保致仕崔沂卒癸卯鳳翔進僞蜀孟知祥來書稱大蜀皇帝獻書于大唐皇帝且言見迫羣情以今年四月十二日即皇帝位云帝不答以前武州刺史鄭琮為右衛上將軍甲辰幸龍門佛寺禱雨乙巳皇子故亳州團練使重吉贈太尉仍於宋州置廟丁未鳳翔節度使李從曮封西平王是日宰臣李愚劉昫因論公事於政事堂相詬辭甚鄙惡帝令樞密副使劉延朗宣諭曰卿等輔弼之臣不宜如是今後不得更然辛亥以太常卿盧文紀為中書侍郎平章事是日中書門下三上章請立中宮從之丁巳制立沛國夫人劉氏為皇后庚申太子少傅陳臯卒乙丑史官張昭遠以所撰莊宗朝列傳三十卷上之八月庚午詔蠲放長興四年十二月以前天下所缺殘稅辛未以前尚書左丞姚顗為中書侍郎平章事詔應曾受御署官逐攝同一任正官依期限赴選案徐無黨五代史注云御署官疑是廢帝初舉兵時所置之官以其非吏部正授故須有旨方得選荊南奏僞蜀孟知祥卒其子昶嗣僞位壬申以尚書禮部侍郎鄭韜光為刑部侍郎以前工部侍郎楊凝式為禮部侍郎甲戌以前金州防禦使婁繼英為右神武統軍以右神武統軍高允貞為左神武統軍乙亥以翰林學士承旨工部尚書知制誥李懌為太常卿以翰林學士戶部侍郎知制誥程遜為學士承旨甲申以兵部侍郎龍敏為吏部侍郎以祕書監崔居儉為工部尚書乙酉以右武衛上將軍張繼祚為右衛上將軍以右驍衛上將軍王景戡為左衛上將軍以右領衛上將軍劉衛為左武衛上將軍以右千牛上將軍王陟為右領軍上將軍以司農卿兼通事舍人判四方館事王景崇為鴻臚卿依前通事舍人判四方館丁亥右龍武統軍索自通卒辛卯禮部尚書致仕李光憲卒甲午以太子少傅盧質為太子少師乙未以前邢州節度使趙鳳為太子太保詔文武百官差使宜令依倫次中書置簿不得重疊若當使者自緣有事或不欲行者注簿便當一使自長興三年正月後已曾奉使者便為簿首已後差者次第注之有司上言皇后受冊內外命婦上箋無答教從之丙申御文明殿冊皇后命使攝太尉宰臣盧文紀使副攝司徒右諫議大夫盧損詣皇后宮行禮畢恩賜有差九月己亥以久雨分命朝臣禜都城門告宗廟社稷辛丑夜有星如五斗器西南流尾迹長數丈屈曲如龍形又衆星亂流不可勝數京師大雨雹如彈丸曹州刺史藥縱之卒甲辰以霖霪甚詔都下諸獄委御史臺憲録問諸州縣差判官令録親自録問畫時疏理畫時二字原本疑有舛誤考五代會要亦作畫今姑仍其舊影庫本粘籤壬子中書門下舉行長興三年敕常年薦送舉人州郡行鄉飲酒之時帖太常草定儀注奏聞甲寅以前潞州節度使檢校太尉同平章事盧文進為安州節度使己未雲州奏契丹寇境案遼史太宗紀李從珂弒其主自立人皇王倍自唐上書請討八月自將南伐九月乙卯次雲州自太宗之伐唐人皇王召之也舊五代史考異冬十月辛未有雉金色止於中書政事堂中書門下奏請以正月二十三日皇帝誕慶日為千春節從之戊寅宰臣李愚劉昫罷相以愚守左僕射昫守右僕射契丹寇雲應州詔河東節度使石敬瑭率兵屯代州戊子宰臣姚顗奏吏部三銓近年並為一司望令依舊分銓從之辛卯以左衛上將軍李宏元卒廢朝贈司徒癸巳以禮部郎中知制誥呂琦守本官充樞密院直學士十一月辛丑以刑部侍郎鄭韜光為尚書右丞以光祿少卿烏昭遠為少府監秦州節度使張延朗奏率師伐蜀中書門下奏二十六日明宗忌陛下初遇忌辰不同常歲請於忌辰前後各一日不坐朝從之御史臺奏前任節度使刺史行軍副使雖每日於便殿起居每遇五日起居亦合綴班從之丙午以前興州刺史馮暉配同州衙前安置暉為興州刺史屯乾渠蜀人來侵暉自屯所奔歸鳳翔故有是責丁未詔振武新州河東西北邊經契丹蹂踐處放免三年兩稅差配時契丹初退故也癸丑以前華州節度使王萬榮為左驍衛上將軍致仕甲寅以振武節度使楊光遠充大同彰國振武威塞等軍兵馬都虞候以前右金吾大將軍穆延暉為右武衛上將軍壬戌以禮部侍朗楊凝式為戶部侍郎甲子以中書舍人盧導為禮部侍郎十二月丁卯朔詔修奉本朝諸帝陸寢己巳以北面馬軍都指揮使易州刺史安叔千為安北都護振武節度使以齊州防禦使尹暉為彰國軍節度使庚午詔葬庶人從榮有司上言依貞觀中庶人承乾以公禮葬從之乙亥以秦州節度使張延朗為中書侍郎同平章事判三司案五代會要二年三月宰臣張延朗奏臣判三司公事每日內殿祗候其合綴前班押班伏乞特免從之舊五代史考異以中書侍郎平章事盧文紀為門下侍郎平章事監修國史以中書侍郎平章事姚顗兼集賢殿大學士以前邠州節度使康福為秦州節度使丙戌夜有白氣東西亙天庚寅幸龍門祈雪自九月至是無雨雪故也永樂大典卷一千七百七十四
