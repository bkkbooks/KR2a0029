body:
  text: 舊五代史卷一百五漢書七宗室列傳第二魏王承訓字德輝高祖之長子也少溫厚美姿儀高祖尤鍾愛在晉纍官至檢校司空國初授左衛上將軍左衛原本作左衡今從歐陽史改正影庫本粘籤高祖將赴洛命承訓北京大內巡檢未幾詔赴闕授開封尹檢校太尉同平章事以天褔十二年十二月十一日薨於府署年二十六高祖發哀於太平宮哭之大慟以至於不豫是月追封魏王歸葬於太原永樂大典卷六千七百六十陳王承勳亦高祖之幼子也國初授右衛大將軍隱帝嗣位加檢校太尉同平章事遙領興元尹俄代侯益為開封尹進位檢校太師兼侍中乾祐三年冬十一月蕭牆之亂隱帝崩軍情欲立勳為嗣案立勳為嗣疑脫承字冊府元龜引薛史亦同蓋承勳在隱帝時避御名故去承字也薛史仍當時實録之舊未及改歸畫一今姑仍其舊舊五代史考異時勳已病大臣及諸將請候勳起居太后令左右以臥榻舁之以見諸將就視知勳之不能興故議立劉贇周廣順元年春卒周太祖下詔封陳王永樂大典卷六千七百六十蔡王信高祖之從弟也少從軍漸至龍武小校高祖鎮並州為興捷軍都將興捷軍原本作興睫今從冊府元龜改正影庫本粘籤領龔州刺史檢校太保國初為侍衛馬軍都指揮使檢校太傅兼義成軍節度使尋移鎮許州加太尉同平章事高祖寢疾大漸楊邠受密旨遣信赴鎮信即時戒路不得奉辭雨泣而去隱帝即位加檢校太師關輔賊平就加侍中信性昏懦黷貨無厭喜行酷法掌禁軍時左右有犯罪者召其妻子對之臠割令自食其肉或從足支解至首血流盈前而命樂對酒無仁愍之色未嘗接延賓客在鎮日聚斂無度會高祖山陵梓宮經由境上信率掠吏民以備迎奉百姓苦之初聞殺楊邠史弘肇遽啓宴席集參佐賓幕令相致賀曰我謂天無眼令我三年不能適意主上孤立幾落賊手諸公勸我一杯可也俄蕭牆之變憂不能食尋有太后令言立湘陰公即令其子往徐州奉迎數日陳思讓率馬軍經過城西但令供頓不敢出城未幾澶州軍變王峻遣前申州刺史馬鐸領軍赴州巡檢鐸引軍入城信惶惑自殺廣順初追封蔡王永樂大典卷六千七百六十湘陰公贇為徐州節度使乾祐元年八月中有雲見五色冊府元龜卷九百五十一明年冬杪有鳥翔集於鮮碧堂庭樹黃質朱喙金目青翼紺趾玄尾有類於鳳有賓佐嘆曰野鳥入室主人將去旬浹而不知所之永樂大典卷一萬一千四百八十五乾祐三年冬十一月周太祖駐軍於京師議立嗣君奉太后誥立贇為嗣傳誥之際馮道笏墜於地左右惡之永樂大典卷一萬七千三百一十一馮道至贇出郊迎常所乘馬比甚馴服至是馬蹄囓奔逸人不可制乃以他馬代之時以為不祥永樂大典卷一萬一千六百五十五將離彭城嘗一日天有白光一道自西來照城中如晝有聲如雷時人謂之天裂又有巨星墜於徐野殷然有聲或謂之天狗後贇果廢死冊府元龜卷九百五十一案湘陰公傳原本殘闕今采冊府元龜補之以存大概五代史補郭忠恕七歲童子及第富有文學尤工篆隸嘗有人於龍山得鳥迹篆忠恕一見輒誦如宿習乾祐中湘陰公鎮徐州辟為推官周祖之入京師也少主崩於北岡周主命宰相馮道迎湘陰公將立之至宋州高祖已為三軍推戴忠恕知事變乃正色責道曰令公纍朝大臣誠信著於天下四方談士無賢不肖皆以為長者今一旦返作脫空漢前功業並棄令公之心安乎道無言對忠恕因勸湘陰公殺道以奔河東公猶豫未決遂及於禍忠恕竄迹久之晚年尤好輕忽卒以此敗坐除名配流焉案湘陰公傳原本殘闕考十國春秋湘陰公傳云湘陰公贇世祖子也高祖愛之以為己子乾祐元年拜武寧軍節度使二年加同平章事郭威既敗慕容彥超于北郊隱帝遇弒威入京師謂諸大臣密相推戴及見宰相馮道等道殊無意威不得已見道下拜而道猶受拜如平時徐勞之曰公行良苦威意色皆沮以為大臣未有推己意又難于自立因與王峻入白太后推擇漢嗣羣臣乃共奏曰武寧節度使贇高祖愛以為子宜立為嗣乃遣太師馮道率百官往迎道揣威意不在贇直前問曰公此舉由衷乎威指天為誓道既行語左右曰吾生平不作謬語人今謬語矣道見贇傳太后意召之贇行至宋州威已自澶州為兵士擁還京師王峻慮贇左右生變遣侍衛馬軍指揮使郭崇威以兵七百騎衛贇崇威至宋州贇登樓問崇威所以來之意崇威曰澶州軍變懼未察之遣崇威護衛非惡意也贇召崇威崇威不敢進馮道出與崇威語崇威乃登樓見贇時護聖指揮使張令超帥步兵為贇宿衛判官董裔說贇曰觀崇威瞻視舉措必有異謀道路皆言郭威已為天子而陛下深入不止禍其至哉請急召令超諭以禍褔使夜以兵劫崇威所屬士卒明日掠睢陽金帛募士卒北走太原彼新定京邑未暇追我此策之上也贇猶豫未決是夕崇威密誘令超歸郭氏盡奪贇部下兵郭威以書召道先歸留其副趙上交王度奉贇入朝太后道乃辭贇先還贇謂道曰寡人此來所恃者以公三十年舊相是以不疑道默然贇客將賈貞等數目道欲圖之贇曰勿草草事豈出于公耶道已去崇威乃幽贇于外館殺賈貞董裔及牙內都虞候劉褔孔目官夏昭度等郭威已監國太后乃下詔曰比者樞密使威志安宗社議立長君以徐州節度使贇高祖親近立為漢嗣乃自藩鎮召赴京師雖誥命已行而軍情不附天道在北人心靡東適當改卜之初俾應分土之命贇可降授開府儀同三司檢校太師上柱國封湘陰公贇卒以殺死舊五代史考異
