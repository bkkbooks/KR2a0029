body:
  text: 舊五代史卷一百七漢書九列傳第四史弘肇字化元鄭州滎澤人也父潘本田家弘肇少遊俠無行拳勇健步日行二百里走及奔馬梁末每七戶出一兵弘肇在籍中後隸本州開道都選入禁軍嘗在晉祖麾下遂留為親從及踐阼用為控鶴小校高祖鎮太原奏請從行升為牙校後置武節左右指揮以弘肇為都將遙領雷州刺史雷州原本作纍州今據歐陽史改正影庫本粘籤高祖建號之初代州王暉叛以城歸契丹弘肇征之一鼓而拔尋授許州節度使充侍衛步軍都指揮使會王守恩以上黨求附契丹主命大將耿崇美率衆登太行欲取上黨高祖命弘肇以軍應援軍至潞州契丹退去翟令奇以澤州迎降會河陽武行德遣人迎弘肇遂率衆南下與行德合故高祖由蒲陝赴洛如歸弘肇前鋒之功也弘肇嚴毅寡言部轄軍衆有過無舍兵士所至秋毫不犯部下有指揮使嘗因指使少不從命弘肇立撾殺之將吏股栗以至平定兩京無敢干忤從駕征鄴回加同平章事充侍衛親軍都指揮使兼鎮宋州高祖大漸與樞密使楊邠周太祖蘇逢吉等同受顧命隱帝嗣位加檢校太師兼侍中居無何河中永興永興原本作求與今據通鑑改正影庫本粘籤鳳翔連橫謀叛關輔大擾朝廷日有徵發羣情憂惴亦有不逞之徒妄搆虛語流布京師弘肇都轄禁軍警衛都邑專行刑殺略無顧避無賴之輩望風匿迹路有遺棄人不敢取然而不問罪之輕重理之所在但云有犯便處極刑枉濫之家莫敢上訴巡司軍吏因緣為姦嫁禍脅人不可勝紀案宋史邊歸讜傳史弘肇怙權專殺閭里告訐成風歸讜言曰邇來有匿名書及言風聞事搆害良善有傷風化遂使貪吏得以報復私怨讒夫得以肆其虛誕請明行條制禁遏誣妄凡顯有披論具陳姓名其匿名書及風聞事者並見止絶論者韙之舊五代史考異時太白晝見民有仰觀者為坊正所拘立斷其腰領又有醉民抵忤一軍士則誣以訛言棄市其他斷舌決口斫筋折足者僅無虛日故相李嵩為部曲誣告族戮於市取其幼女為婢自是仕宦之家畜僕隸者皆以姑息為意而舊勳故將失勢之後為廝養輩之所脅制者往往有之軍司孔目吏解暉性狡而酷凡有推劾隨意鍛鍊人有抵軍禁者被其苦楚無不自誣以求死所都人遇之莫敢仰視有燕人何福殷者福殷原本作福因今據通鑑改正影庫本粘籤案歐陽史作何福進疑訛舊五代史考異以商販為業嘗以十四萬市得玉枕遣家僮及商人李進賣於淮南易茗而回家僮無行隱福殷貨財數十萬福殷責其償不伏遂杖之未幾家僮詣弘肇上變言契丹主之入汴也趙延壽遣福殷齎玉枕陰遺淮南以致誠意弘肇即日遣捕福殷等繫之解暉希旨榜掠備至福殷自誣連罪者數輩並棄市妻女為弘肇帳下分取之其家財籍沒弘肇不喜賓客嘗言文人難耐輕我輩謂我輩為卒可恨可恨弘肇所領睢陽其屬府公利委親吏楊乙就府檢校貪戾凶橫負勢生事吏民畏之副戎已下望風展敬聚斂刻剝無所不至月率萬緡以輸弘肇一境之內嫉之如讎案東都事略薛居正傳史弘肇領侍衛親軍威震人主殘忍自恣人莫敢忤其意其部下吏告民犯鹽禁法當死居正疑其不實召詰之乃其吏以私憾而誣之也逮捕吏鞫之具伏以吏抵法宏肇雖怒甚竟亦無以屈也舊五代史考異周太祖平河中班師推功於衆以弘肇有翊衛鎮重之功言之於隱帝即授兼中書令隱帝自關西賊平之後昵近小人太后親族頗行干託弘肇與楊邠甚不平之太后有故人子求補軍職弘肇怒而斬之帝始聽樂賜教坊使玉帶諸伶官錦袍往謝弘肇弘肇讓之曰健兒為國戍邊忍寒冒暑未能遍有霑賜爾輩何功敢當此賜盡取袍帶還官其凶戾如此周太祖有鎮鄴之命弘肇欲其兼領機樞之任蘇逢吉異其議弘肇忿之翌日因竇貞固飲會貴臣悉集弘肇厲色舉爵屬周太祖曰昨晨廷論一何同異今日與弟飲此楊邠蘇逢吉亦舉大爵曰此國家之事也何足介意俱飲釂弘肇又厲聲言曰安朝廷定禍亂直須長槍大劍至如毛錐子毛錐原本作毛鍾考通鑑作毛錐胡三省注云毛錐謂筆也以束毛為筆其形如錐也今改正影庫本粘籤焉足用哉三司使王章曰雖有長槍大劍若無毛錐子贍軍財賦自何而集弘肇默然少頃而罷未幾三司使王章於其第張酒樂時弘肇與宰相樞密使及內客省使閻晉卿等俱會酒酣為手勢令弘肇不熟其事而閻晉卿坐次弘肇屢教之蘇逢吉戲弘肇曰近坐有姓閻人何憂罰爵弘肇妻閻氏本酒妓也弘肇謂逢吉譏之大怒以醜語詬逢吉逢吉不校弘肇欲毆逢吉逢吉策馬而去弘筆遽起索劍意欲追逢吉楊邠曰蘇公是宰相公若害之致天子何地公細思之邠泣下弘肇索馬急馳而去邠慮有非常連鑣而進送至第而還自是將相不協如水火矣隱帝遣王峻將酒樂於公子亭以和之竟不能解其後李業郭允明後贊聶文進居中用事不悅執政又見隱帝年漸長厭為大臣所制嘗有忿言業等乃乘間譖弘肇等隱帝稍以為信業等乃言弘肇等專權震主終必為亂隱帝益恐嘗一夕聞作坊鍛甲之聲疑外有兵仗卒至達旦不寐自是與業等密謀禁中欲誅弘肇等議定入白太后太后曰此事豈可輕發耶更問宰臣等李業在側曰先皇帝言朝廷大事莫共措大商量太后又言之隱帝怒曰閨門之內焉知國家之事拂衣而出內客省使閻晉卿潛知其事乃詣弘肇私第將欲告之弘肇以他事拒之不見乾祐三年冬十一月十三日弘肇入朝案歐陽史漢臣傳作十月吳縝纂誤云漢隱帝紀周太祖紀俱作十一月傳誤也舊五代史考異與樞密使楊邠三司使王章同坐於廣政殿東廡下廣政殿原本作廣徵今從通鑑改正影庫本粘籤俄有甲士數十人自內而出害弘肇等於閣夷其族先是弘肇第數有異嘗一日於階砌隙中有煙氣蓬勃而出禍前二日昧爽有星落於弘肇前三數步如迸火而散俄而被誅周太祖踐阼追封鄭王以禮葬官為立碑弘肇子德珫德珫原本作德玩今從通鑑改正影庫本粘籤乾祐中授檢校司空領忠州刺史粗讀書親儒者常不悅父之所為貢院嘗録一學科於省門叫譟申中書門下宰相蘇逢吉令送侍衛司請痛笞刺面德珫聞之白父曰書生無禮有府縣御史臺非軍務治也公卿如此蓋欲彰大人之過弘肇深以為然即破械放之後之識者尤嘉德珫之為人焉弘肇弟福比在滎陽別墅聞禍匿於民間周太祖即位纍遷間廄使仕皇朝歷諸衛將軍永樂大典卷一萬一百八十三案宋史李崇矩傳史弘肇為先鋒都校聞崇矩名召署親吏乾祐初弘肇總禁兵兼京城巡檢多殘殺軍民左右稍稍引去惟崇矩事之益謹及弘肇誅獨得免周祖與弘肇素厚善即位訪求弘肇親舊得崇矩謂之曰我與史公受漢厚恩勠力同心共獎王室為姦邪所搆史公卒罹大禍我亦僅免汝史家故吏也為我求其近屬我將恤之崇矩上其母弟福崇矩素主其家盡籍財産以付福周祖嘉之舊五代史考異楊邠魏州冠氏人也少以吏給事使府後唐租庸使孔謙即其妻之世父也謙領度支補勾押官歷孟華鄆三州糧料使高祖為鄴都留守用為左都押衙案歐陽史作右都舊五代史考異高祖鎮太原益加親委漢國建遷檢校太保權樞密使汴洛平正拜樞密使檢校太傅及高祖大漸與蘇逢吉史弘肇等同受顧命輔立嗣君隱帝即位宰臣李濤上章請出邠與周太祖為藩鎮邠等泣訴於太后由是罷濤而相邠加中書侍郎兼吏部尚書同平章事仍兼樞密使時中書除吏太多訛謬者衆及邠居相位帝一以委之凡南衙奏事中書除命先委邠斟酌如不出邠意至於一簿一掾亦不聽從邠雖長於吏事不識大體常言為國家者但得帑藏豐盈甲兵強盛至於文章禮樂並是虛事何足介意也平河中並加右僕射邠既專國政觸事苛細條理煩碎前資官不得於外方居止自京師至諸州府行人往來並須給公憑所由司求請公憑者朝夕填咽旬日之間民情大擾行路擁塞邠乃止其事時史弘肇恣行慘酷殺戮日衆都人士庶相目於路邠但稱弘肇之善太后弟武德使李業求為宣徽使隱帝與太后重違之私訪於邠邠以朝廷內使遷拜有序不可超居遂止隱帝所愛耿夫人欲立為后邠亦以為太速夫人卒隱帝欲以后禮葬邠又止之隱帝意不悅左右有承間進甘言者隱帝益怒之案此下當有缺文殿本邠繕甲兵實帑廩俾國用不闕邊鄙粗寧亦其功也永樂大典卷六千五十二案宣和書譜云邠末年留意縉紳延客門下知經史有用乃課吏傳寫舊五代史考異王章大名南樂人也少為吏給事使府同光初隸樞密院後歸本郡纍職至都孔目官後唐清泰末屯駐捧聖都虞候張令昭作亂張令昭原本作會昭今從歐陽史改正影庫本粘籤逐節度使劉延皓自稱留後章以本職為令昭役使末帝遣范延光討平之搜索叛黨甚急章之妻即白文珂之女也文珂與副招討李敬周善以章為托及攻下逆城敬周匿之載于橐褚中竄至洛下匿於敬周之私第及末帝敗章為省職歷河陽糧料使高祖典侍衛親軍詔為都孔目官從至河東專委錢穀國初授三司使檢校太傅從征杜重威於鄴下明年高祖崩隱帝即位加檢校太尉同平章事居無何蒲雍岐三鎮叛是時契丹犯闕之後國家新造物力未充章與周太祖史弘肇楊邠等盡心王室知無不為罷不急之務惜無用之費收聚財賦專事西征軍旅所資供饋無乏及三叛平賜與之外國有餘積然以專於權利剝下過當斂怨歸上物論非之舊制秋夏苗租民稅一斛別輸二升謂之雀鼠耗乾祐中輸一斛者別令輸二斗目之為省耗謂之省耗原本作雀耗今從通鑑改正胡三省通鑑注云唐明宗天成元年四月赦文應納夏秋稅子先有省耗每斗一升今後祇納正數不量省耗如此則天成以前已有省耗每斛更輸一斗天成罷輸之後至漢興王章復令輸省耗而又倍舊數取之也謹附識于此影庫本粘籤百姓苦之又官庫出納緡錢皆以八十為陌至是民輸者如舊官給者以七十七為陌遂為常式案歸田録用錢之法自五代以來以七十七為百謂之省陌今市井交易又克寸其五謂之依除舊五代史考異民有訴田者雖無十數戶章必命全州覆視幸其廣有苗額以增邦賦曾未數年民力大困章與楊邠不喜儒士郡官所請月俸皆取不堪資軍者給之謂之間雜物命所司高估其價估定更添謂之撎估章亦不滿其意隨事更令更添估章急於財賦峻於刑法民有犯鹽礬酒麴之令雖絲毫滴瀝盡處極刑吏緣為姦民不堪命章與楊邠同郡尤相親愛其奬用進拔者莫非鄉舊常輕視文臣曰此等若與一把算子未知顛倒何益於事後因私第開宴席召賓客史弘肇蘇逢吉乘醉喧詬而罷章自是忽忽不樂潛求外任邠與弘肇深阻其意而私第數有怪異章愈懷憂恐乾祐三年冬與史弘肇楊邠等遇害夷其族妻白氏禍前數月而卒無子惟一女適戶部員外郎張貽肅羸疾踰年扶病就戮永樂大典卷六千八百五十李洪建太后母弟也事高祖為牙將高祖即位纍歷軍校遙領防禦使史弘肇等被誅以洪建為權侍衛馬步軍都虞候及鄴兵南渡命洪建誅王殷之族洪建不即行之但遣人監守其家仍令給饌竟免屠戮周太祖入京城洪建被執王殷感洪建之恩纍祈周太祖乞免其死不從遂殺之洪建弟業永樂大典卷一萬三百九十業昆仲凡六人案昭聖弟六人洪信洪義宋史有傳歐陽史作昆弟七人舊五代史考異業處其季故太后尤憐之高祖置之麾下及即位纍遷武德使出入禁中業恃太后之親稍至驕縱隱帝嗣位尤深倚愛兼掌內帑四方進貢二宮費委之出納業喜趨權利無所顧避執政大臣不敢禁詰會宣徽使闕宣徽使原本作宜徵今從通鑑改正影庫本粘籤業意欲之太后亦令人微露風旨於執政時楊邠史弘肇等難之業由是積怨蕭牆之變自此而作楊史既誅業權領侍衛步軍都指揮使北郊兵敗業自取金寶懷之策馬西奔行至陝郊其節度使洪信即其長兄也不敢匿於家業將奔太原至絳州境為盜所殺盡奪而去永樂大典卷一萬三百九十閻晉卿者欣州人也家世富豪少仕並門歷職至客將高祖在鎮頗見信用乾祐中歷閣門使判四方館未幾關西亂郭從義討趙思綰於京兆晉卿偏師以攻賊壘案宋史李韜傳周祖征三叛韜從白文珂攻河中兵傅其城文珂夜詣周祖議犒軍留韜城下時營柵未備李守貞乘虛來襲營中忽見火發知賊驟至惶怖失據客省使閻晉卿率左右數十人遇韜于月城側謂韜曰事急矣城中人悉被黃紙甲為火光所照色俱白此殊易辨奈軍士無鬬志何韜憤怒曰豈有食君祿而不為國致死耶即援矟而進軍中死士十餘輩隨韜犯賊鋒蒲有猛將躍馬持戈擬韜韜刺之洞胸而墜又連殺數十人蒲軍遂潰因擊大破之舊五代史考異賊平為內客省使案宋史李韜傳載晉卿討賊時已為客省使薛史作賊平之後始授此職與宋史異舊五代史考異丁父憂起復前職時宣徽使闕晉卿以職次事望合當其任既而久稽拜命晉卿頗怨執政會李業等謀殺楊史詔晉卿謀之晉卿退詣弘肇將告其事弘肇不見晉卿憂事不果夜懸高祖御容於中堂泣禱於前遲明戎服入朝內難既作以晉卿權侍衛馬軍都指揮使北郊兵敗晉卿乃自殺於家永樂大典卷一萬八千一百三十二聶文進聶文進傳永樂大典已佚今采册府元龜以補其闕影庫本粘籤並州人少給事於高祖帳下高祖鎮太原甚見委用職至兵馬押司官高祖入汴授樞密院承旨歷領軍屯衛大將軍遷領衛大將軍仍領舊職册府元龜卷七百六十六遇周太祖出征稍至驕橫久未遷改深所怨望與李業輩搆成變亂史弘肇等遇害之前夕文進與同黨預作宣詔制置朝廷之事凡關文字並出文進之手明日難作文進點閲兵籍徵發軍衆指揮取舍以為己任內外咨稟前後填咽太祖在鄴被搆初謂文進不預其事驗其事迹方知文進亂階之首也大詬詈之太祖過封丘帝次於北郊文進告太后曰臣在此請宮中勿憂兵散之後文進召同黨痛飲歌笑自若遲明帝遇禍文進奔竄為軍士所追梟其首册府元龜卷九百三十五後贊案通鑑作後匡贊薛史避宋諱去匡字舊五代史考異後贊傳永樂大典僅存一條今引册府元龜以補其闕影庫本粘籤為飛龍使贊母本倡家也與父同郡往來其家生贊從職四方父未嘗離郡贊既長疑其所生及為內職不欲父之來寓書以致其意父自郡至京師直抵其第贊不得已而奉之永樂大典卷一萬七千一百九十五乾祐末宰相楊邠侍衛親軍使史弘肇執權贊以久次未遷頗懷怨望乃與樞密承旨聶文進等搆變及難作贊與同黨更侍帝側剖判戎事且防間言北郊兵敗贊竄歸兗州慕容彥超執之以獻有司鞫贊伏罪周太祖命誅之册府元龜卷九百五十二郭允明者小名竇十河東人也幼隸河東制置使范徽柔被誅允明遂為高祖廝養服勤既久頗得高祖之歡心高祖鎮太原稍歷牙職及即位纍遷至翰林茶酒使兼鞍轡庫使隱帝嗣位尤見親狎每恃寵驕縱略無禮敬與相州節度使郭謹以同宗之故頗交結謹在鎮允明常齎御酒以遺之不以僭上犯禁為意其他輕率悉皆類此執政大臣頗姑息之嘗奉使荊南車服導從有同節度使將州縣郵驛奔馳畏懾節度使高保融承迎不暇高保融原本作深融今從通鑑改正影庫本粘籤允明潛使人步度越壁之高庳池隍之廣隘以動荊人冀得重賄乾祐末兼飛龍使未幾與李業輩搆變楊邠等諸子允明親刃之於朝堂西廡下王章女壻戶部員外郎張貽肅血流逆注聞者哀之及北郊之敗允明迫帝就民舍手行弒逆尋亦自殺永樂大典卷二萬二千一百六十一劉銖陝州人也少事梁邵王朱友誨為牙將晉天福中高祖為侍衛親軍都指揮使與銖有舊乃表為內職高祖出鎮並門用為左都押牙銖性慘毒好殺高祖以為勇斷類己深委遇之國初授永興軍節度使從定汴洛移鎮青州加同平章事隱帝即位加檢校太師兼侍中銖立法深峻令行禁止吏民有過不問輕重未嘗貸免每親事小有忤旨即令倒曳而出至數百步外方止膚體無完者每杖人遣雙杖對下謂之合歡杖或杖人如其歲數謂之隨年杖在任擅行賦斂每秋苗一畝率錢三千夏苗一畝錢二千以備公用部內畏之脅肩重迹乾祐中淄青大蝗銖下令捕蝗略無遺漏田苗無害先是濱海郡邑皆有兩浙回易務厚取民利自置刑禁追攝王民前後長吏利其厚賂不能禁止銖即告所部不得與吳越徵負擅行追攝浙人惕息莫敢干命朝廷懼銖之剛戾難制因前沂州刺史郭瓊自海州用兵還過青州遂留之即以符彥卿代銖符彥卿原本作言卿今據通鑑改正影庫本粘籤銖即時受代案隆平集郭瓊傳云劉銖守平盧稱疾不朝隱帝疑其叛詔瓊領兵屯青州銖將害之張宴伏兵幕下瓊無懼色銖亦不敢發瓊為言去就禍福銖趨召舊五代史考異離鎮之日有私鹽數屋雜以糞穢填塞諸井以土平之彥卿發其事以聞銖奉朝請久之每潛戟手於史弘肇楊邠第會李業輩同誅弘肇等銖喜謂業輩曰君等可謂僂儸兒矣尋以銖權知開封府事周太祖親族及王峻家並為銖所害周太祖入京城執之下獄銖謂妻曰我則死矣君應與人為婢耳妻曰明公所為如是雅合為之周太祖遣人讓銖曰昔日與公常同事漢室寧無故人之情家屬屠滅公雖奉君命加之酷毒一何忍哉公家亦有妻子還顧念否銖但稱死罪遂啓太后並一子誅之而釋其妻案歐陽史作赦其妻子舊五代史考異周太祖踐阼詔賜銖妻陝州莊宅各一區永樂大典卷六千三百五十五代史闕文漢隱帝朝銖為開封尹周祖自鄴起兵銖盡誅周祖之家子孫婦女十數人極其慘毒及隱帝遇害周祖以漢太后令收銖下獄使人責之銖對曰某為漢家戮叛族耳不知其他周祖怒遂殺之臣謹按周世宗朝史官修漢隱帝實録銖之忠言諱而不載史臣曰臣觀漢之亡也豈繫於天命哉蓋委用不得其人聽斷不符於理故也且如弘肇之淫刑楊邠之粃政李業晉卿之設計文進允明之狂且雖使成王為君周公作相亦不能保宗社之安延歲月之命況隱帝逢吉之徒其能免乎易曰大君有命開國承家小人勿用必亂邦也當乾祐之末也何斯言之驗歟惟劉銖之忍酷又安能逭於一死乎永樂大典卷二萬二千一百六十一
