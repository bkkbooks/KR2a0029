body:
  text: 舊五代史卷九十六晉書二十二列傳第十一孔崇弼案新唐書世系表作昌弼字佐化薛史作崇弼蓋避後唐廟諱改舊五代史考異孔崇弼傳永樂大典僅存一條今引册府元龜以補其闕影庫本粘籤初仕後唐自吏部郎中授給事中時族兄昭序案世系表作昌序字昭舉薛史作昭序疑亦因避諱而改也舊五代史考異繇給事中改左常侍兄弟同居門下時論榮之册府元龜卷七百八十二崇弼天福中遷左散騎常侍永樂大典卷一萬三千三百三十九無他才但能談笑戲玩人物揚眉抵掌取悅於人册府元龜卷九百四十四五年詔令泛海使於杭越先是浙中贈賄每歲恆及萬緡時議者曰孔常侍命奇薄何消盈數有命即無財有財即無命明年使還果海中船壞空手而歸永樂大典卷一萬三千三百三十九案此傳原本殘闕陳保極閩中人也好學善屬文後唐天成中擢進士第秦王從榮聞其名辟為從事從榮素急暴後怒保極不告出遊宰相門以馬箠鞭之尋出為定州推官從榮敗執政知其屈擢居三署歷禮部倉部員外郎初桑維翰登第之歲保極時在秦王幕下因戲謂同輩曰近知今歲有三箇半人及第蓋其年收四人保極以維翰短陋故謂之半人也天福中維翰既居相位保極時在曹郎慮除官差跌心不自安乃乞假南遊將謀退迹既而襄鄧長吏以行止入奏維翰乃奏於高祖曰保極閩人多狡恐逃入淮海即以詔追赴闕將下臺鍛成其事同列李嵩極言以解之因令所司就所居鞫之貶為衛尉寺丞仍奪金紫尋復為倉部員外郎竟以銜憤而卒保極無時才有傲人之名而性復鄙吝所得利祿未嘗奉身但蔬食而已每與人奕棋敗則以手亂其局蓋拒所賭金錢不欲償也及卒室無妻兒唯囊中貯白金十鋌為他人所有時甚嗤之永樂大典卷三千一百三十九王瑜其先范陽人也父欽祚仕至殿中監出為義州刺史瑜性凶狡然雋辨驍果騎射刀筆之長亦稱於當代起家纍為從事天福中授左贊善大夫會濮郡秋稼豐衍稅籍不均命乘使車按察定計既至郡謂校簿吏胡蘊惠鶚曰余食貧久矣室無增資為我致意縣宰且求假貸由是濮之部內五邑令長共斂錢五十萬私獻於瑜瑜即以書上奏高祖覽章歎曰廉直清慎有如此者誠良臣也於是二吏五宰即時停黜擢瑜為太府少卿杜重威之鎮東平也瑜父欽祚為節度副使及重威移鎮常山瑜乃詭計干重威使奏己為恆州節度副使竟代其父位歲餘入為刑部郎中丙午歲父欽祚刺舉義州瑜歸寧至郡會契丹據有中夏何建以秦州歸蜀秦州原本作泰州今從通鑑改正影庫本粘籤瑜説欽祚曰若不西走當屬契丹矣厲色數諫其父怒而不從因其臥疾涉旬瑜仗劍而脅之曰老懦無謀欲趨炮烙不即為計則死於刃下父不得已而聽之時隴東屯兵扼其川路將北趣蕃部假途而因與郡盜酋長趙徽歃血為約以兄事之謂徽曰西至成都余身為相余父為將爾當領一大郡能遂行乎徽曰諾瑜慮為所賣先致其妻孥館於郡中行有期矣徽潛召其黨伺於郊外子夜瑜舉族行輜重絡繹十有餘里徽之所親循溝澮而遁至馬峽路隅舉燧相應其黨起於伏莽斷欽祚之首貫諸長矛平生聚蓄金幣萬計皆為賊所掠少長百口殺之殆盡瑜尚獨戰千人矢不虛發手無射捍其指流血及窘乃夜竄山谷落髮為僧月餘為樵人所獲縶送岐州為侯益所殺時年三十九始瑜有姑寡居來歸其家以前夫遺腹有子經數年不産每因事預告人吉凶無不驗者時契丹來犯闕前月餘謂瑜曰暴兵將至宜速去之苟不去亂必及矣後瑜果死此謂天作孽猶可違自作孽不可逭也永樂大典卷六千八百五十一張繼祚故齊王全義之子也始為河南府衙內指揮使全義卒除金吾將軍旋授蔡州刺史纍官至檢校太保明宗郊天充供頓使復除西衛上將軍唐清泰末丁母憂天福初喪制未闋會張從賓作亂發兵迫脅取赴河陽令知留守事從賓敗與二子詔戮於市始繼祚與范延光有舊嘗遣人以馬遺之屬朝廷起兵將討鄴城為巡兵所獲奏之高祖深忌之及敗宰臣桑維翰以父珙早事齊王奏欲雪之高祖不允案通鑑云史館修撰李濤上言張全義有再造洛邑之功乞免其族遂止誅繼祚妻子舊五代史考異遂止罪繼祚一房不纍其族永樂大典卷六千三百五十鄭阮洺州人也少為本郡牙將莊宗略地山東以阮首歸義旗繼遷軍職阮有子自幼事明宗中門使安重誨重誨以其桀黠愛之及明宗即位擢阮至鳳翔節度副使會唐末帝鎮其地阮稍狎之末帝嗣位以阮為趙州刺史而阮性貪濁民間細務皆密察而糾之令納賂以贖罪有屬邑令因科醵拒命密以束素募人陰求其過後竟停其職人甚非之又嘗以郡符取部內凶肆中人隸其籍者遣於青州舁喪至洺郡人憚其遠願輸直百緡以免其行阮本無喪即受直放還識者曰此非吉兆也未幾改曹州刺史為政愈弊高祖建義入洛阮自郡來朝旋為本州指揮使石重立所殺舉族無孑遺永樂大典卷一萬八千八百八十一胡饒大梁人也少事本鎮連帥為都吏歷馬步都虞候會唐明宗鎮其地與部將王建立相善明宗即位建立領常山奏饒為真定少尹饒本憸人既在府幕無士君子之風嘗因事趙郡有平棘令張鵬者獻策請建立於境內每縣所管鄉置鄉直一人令月書縣令出入行止饒乃導而薦焉建立行之彌年詞訟蜂起四郡大擾天成末王都搆亂陰使結建立為兄弟之國時饒又曾薦梁時右庶子張澄為判官建立亦狎之澄素不知書每座則以陰符鬼谷為己任建立時密以王都之盟告之澄與饒俱贊成其事會王師圍中山其事遂寢凡饒之凶戾如此清泰初馮道出鎮同州饒時為副使道以重臣稀於接洽饒忿之每乘酒於牙門詬道道必延入待以酒肴致敬而退道謂左右曰此人為不善自當有報吾何怒焉饒後間居河陽天福二年夏會張從賓作亂饒謁於麾下請預其行從賓敗饒以王建立方鎮平盧走投之建立延入城斬之以聞聞者快焉永樂大典卷二千二百四十一劉遂清字得一青州北海人梁開封尹鄩之猶子也父琪以鴻臚卿致仕遂清少敏惠初事梁為保鑾軍使歷內諸司使莊宗入汴不改其職明宗即位加檢校尚書僕射委以西都監守踰歲以中山王都有不臣之迹除遂清為易州刺史俾遏其寇衝既至郡大有禦侮之略境內賴焉王都平加檢校司空遷棣州刺史天成長興中歷典淄興登三郡案通鑑潞王紀帝之起鳳翔也召興州刺史劉遂清遲疑不至聞帝入洛乃悉集三泉西縣金牛桑林戍兵以歸自散關以南城鎮悉棄之皆為蜀人所有入朝帝欲治罪以其能自歸乃赦之舊五代史考異咸有善政高祖即位之二年授鳳州防禦使加檢校司徒會丁母憂起復授內客省使右監門衛大將軍六年駕幸鄴都轉宣徽北院使兼判三司加檢校太保七年少帝嗣位加右領軍衛上將軍仍賜竭誠翊戴保節功臣八年出領鄭州加檢校太傅開運二年遷安州防禦使未幾上表稱疾詔許就便回至上蔡終於郵舍時三年四月也遂清性至孝牧淄川日自北海迎其母赴郡母既及境遂清奔馳路側控轡行數十里父老觀者如堵當時榮之遂清素不知書但多計畫判三司日每給百官俸料與判官議曰斯輩非盡有才能多世祿之家宜澄其污而留其清者或對曰昔唐朝渾郭顏段每一赦出以一子出身率為常制且延賞垂裕為國美談未有因月給而欲沙汰恐未當也羣論由此減之永樂大典卷九千九十八房皓京兆長安人也少為唐宰臣崔魏公家臣後因亂客於蒲州天成中唐末帝出鎮河中皓於路左迎謁求事軍門末帝愛之使治賓客及末帝登極歷南北院宣徽使尋與趙延壽同為樞密使時薛文遇劉延朗之徒居中用事皓雖處密地其聽用之言十不得三四但隨勢可否不為事先每朝廷有大事皓與端明學士等環坐會議多於衆中俯首而睡其避事也如此高祖即位以皓濡足閏朝不專與奪故特恩原之命為左驍衛大將軍留於西京開運元年春卒於洛陽永樂大典卷六千一百四十九孟承誨大名人也始為本府牙校遇高祖臨其地升為客將後奏為宗城令秩滿以百姓舉留移常山城令皆有善政高祖有天下擢為閣門副使纍遷宣徽使官至檢校司空太府卿右武衛大將軍及少帝嗣位以植性纖巧善於希旨復與權臣宦官密相表𩹉凡朝廷恩澤美使必承誨為之一歲之中數四不已由是居第華敞財帛纍積及契丹入汴張彥澤引兵逼宮城少帝召承誨計之承誨匿身不赴少帝既出宮寓於開封府舍具以承誨背恩之事告彥澤令捕而殺之其妻女並配部族漢高祖即位詔贈太保永樂大典卷一萬一千一百十三劉繼勳衛州人也唐天成中高祖鎮鄴都繼勳時為客將高祖愛其端謹籍其名於帳下從歷數鎮及即位擢為閣門使出為淄州刺史遷澶州防禦使俄改鄭州自宣徽北院使拜華州刺史歲餘鎮同州始少帝與契丹絶好繼勳亦預其謀及契丹主至闕繼勳自鎮來朝契丹責之時馮道在側繼勳事急指道曰少帝在鄴道為首相與景延廣謀議遂致南北失歡臣位至卑未嘗措言今請問道道細知之契丹主曰此老子不是好閙人無相牽引皆爾輩為之繼勳不敢復對繼勳時有疾契丹主因令人候其疾狀云有風痹契丹主曰北方地涼居之此疾可愈乃命鎖繼勳尋解之以疾終於家案通鑑云契丹主聞趙在禮死乃釋繼勳繼勳憂憤而卒舊五代史考異漢高祖入汴贈太尉永樂大典卷九千九十九鄭受益案新唐書宰相世系表字謙光舊五代史考異唐宰相餘慶之曾孫也餘慶生浣浣生從讜兩為太原節度使再登相位從讜兄處誨為汴州節度使家襲清儉深有士風中朝禮法以鄭氏為甲處誨生受益受益亦以文學致身纍歷臺閣自尚書郎遷右諫議大夫天福七年夏以張彥澤數為不道上章請行國典旬日不報又貢表切言訐直無所忌執政稍惡之俄而以病請告歸長安高祖晏駕以不赴國哀停任會赦拜京兆少尹宰相趙瑩出鎮咸秦以受益朝班舊僚眷待甚至屬天下率借金穀乃謂瑩曰京兆戶籍登耗民力虛實某備知之矣品而定之可使平允瑩信之因使與王人同掌其事受益既經廢棄薄於仕宦遂阿法射利冀為生生之資又素恃門望陵轢同幕內姦外直羣情無相洽者及贓污事發騰於衆口瑩不得已遂按之其直百萬八年冬賜死於家受益數世公臺一朝自棄士君子皆惜之永樂大典卷一萬八千八百八十八程遜程遜傳永樂大典僅存一條今引册府元龜以補其闕影庫本粘籤字浮休壽春人案此下有闕文殿本召入翰林充學士自兵部侍郎承旨授太常卿天福三年秋命使吳越十國春秋云禮部尚書程遜為加恩使殿本母羸老雙瞽遜未嘗白執政以辭之將行母以手捫其面號泣以送之永樂大典卷一萬六千七百七十七仲秋之夕陰暝如晦遜嘗為詩曰幽室有時聞鴈叫空庭無路見蟾光同僚見之訝其詩語稍異及使回遭風水而溺焉册府元龜卷九百五十一案通鑑考異晉實録天福二年十一月加錢元瓘副元帥國王程遜等為加恩使四年十月丙午以程遜沒于海廢朝贈官程遜傳云天福三年秋使吳越使回溺死元瓘傳云天福三年封吳越國王蓋二年冬制下遜等以三年至杭州不知溺死在何年而晉朝以四年十月始聞之也舊五代史考異李郁字文緯唐之宗屬也少歷宗寺官天成長興中纍遷為宗正卿性平允所歷無愛憎毀譽高祖登極授光祿卿一日晝寢夢食巨棗覺而有疾謂其親友曰嘗聞棗字重來呼魂之象也余神氣逼抑將不免乎天福五年夏卒贈太子太保永樂大典卷一萬三百九十鄭玄素京兆人避地鶴鳴峯下萃古書千卷採薇蕨而弦誦自若善談名理或問水旺冬而冬涸泛盛乃在夏何也玄素曰論五行者以氣不以形木旺春以其氣溫火旺夏以其氣熱金旺秋以其氣清水旺冬以其氣冷若以形言則萬物皆萌於春盛於夏衰於秋藏於冬不獨水然也人以為明理後益入廬山青牛谷高臥四十年初玄素好收書而所收鍾王法帖墨迹如新人莫知所從得有與厚者問之乃知玄素為溫韜甥韜常發昭陵盡得之韜死書歸玄素焉今有書堂基存永樂大典卷一萬八千八百八十一馬重績字洞微少學數術明太一五紀八象三統大曆居於太原仕晉拜太子右贊善大夫遷司天監天福三年重績上言曆象王者所以正一氣之元宣萬邦之命而古今所記考審多差宣明氣朔正而星度不驗崇玄五星得而歲差一日以宣明之氣朔合崇玄之五星二曆相參然後符合自前世諸曆皆起天正十一月為歲首用太古甲子為上元積歲愈多差闊愈甚臣輒合二曆創為新法以唐天寶十四載乙未為上元雨水正月中氣為氣首詔下司天監仁琦仁琦原本作人琦今從五代會要改正影庫本粘籤張文皓等考核得失仁琦等言明年庚子正月朔用重績曆考之皆合無舛乃下詔班行之號調元曆行之數歲輒差遂不用重績又言漏刻之法以中星考晝夜為一百刻八刻六十分刻之二十為一時時以四刻十分為正此自古所用也今失其傳以午正為時始下侵未四刻十分而為午由是晝夜昏曉皆失其正請依古改正從之重績卒年六十四永樂大典卷一萬一千二百四十陳玄京兆人也家世為醫初事河中王重榮乾符中後唐武皇自太原率師攻王行瑜路出於蒲中時玄侍湯藥武皇甚重之及還太原日侍左右武皇性剛暴樂殺人無敢言者玄深測其情每有暴怒則從容啓諫免禍者不一以是晉人深德之勳貴賂遺盈門性好酒樂施隨得而無私積明宗朝為太原少尹入為太府卿長興中集平生所驗方七十五首並修合藥法百件號曰要術刊石置於太原府衙門之左以示於衆病者賴焉天福中以耄期上表求退以光祿卿致仕卒於晉陽年八十餘永樂大典卷三千一百三十五史臣曰夫彰善疸惡麟史之為義也瑜不掩瑕虹玉之為德也故自崇弼而下善者既書之其不善者亦書之庶使後之君子見善如不及見惡如探湯也至如重績之曆法陳玄之醫道亦不可漏其名而弗紀也永樂大典卷三千一百三十五
