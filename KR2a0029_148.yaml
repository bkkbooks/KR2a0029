body:
  text: 旋具申奏及報吏部此後旋具旋具申奏及旋具旋具旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其年十月詔曰選部公事比置三銓所有員闕選人分在三處每至注擬之際資難得相當況今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行今當開泰之期宜軫單平之衆自今後合格選人歷任無違礙者並仰吏部南曹判成如文解差錯不合式樣罪在發解官吏永樂大典卷一萬六千七百八十三旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其年十月詔曰選部公事比置三銓所有員闕選人分在三處每至注擬之際資難得相當況今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行今當開泰之期宜軫單平之衆自今後合格選人歷任無違礙者並仰吏部南曹判成如文解差錯不合式樣罪在發解官吏永樂大典卷一萬六千七百八十三旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其年十月詔曰選部公事比置三銓所有員闕選人分在三處每至注擬之際資難得相當況今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行今當開泰之期宜軫單平之衆自今後合格選人歷任無違礙者並仰吏部南曹判成如文解差錯不合式樣罪在發解官吏永樂大典卷一萬六千七百八十三旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其年十月詔曰選部公事比置三銓所有員闕選人分在三處每至注擬之際資難得相當況今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行今當開泰之期宜軫單平之衆自今後合格選人歷任無違礙者並仰吏部南曹判成如文解差錯不合式樣罪在發解官吏永樂大典卷一萬六千七百八十三旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其年十月詔曰選部公事比置三銓所有員闕選人分在三處每至注擬之際資難得相當況今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行今當開泰之期宜軫單平之衆自今後合格選人歷任無違礙者並仰吏部南曹判成如文解差錯不合式樣罪在發解官吏永樂大典卷一萬六千七百八十三旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其年十月詔曰選部公事比置三銓所有員闕選人分在三處每至注擬之際資難得相當況今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行今當開泰之期宜軫單平之衆自今後合格選人歷任無違礙者並仰吏部南曹判成如文解差錯不合式樣罪在發解官吏永樂大典卷一萬六千七百八十三旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其年十月詔曰選部公事比置三銓所有員闕選人分在三處每至注擬之際資難得相當況今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行今當開泰之期宜軫單平之衆自今後合格選人歷任無違礙者並仰吏部南曹判成如文解差錯不合式樣罪在發解官吏永樂大典卷一萬六千七百八十三旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其年十月詔曰選部公事比置三銓所有員闕選人分在三處每至注擬之際資難得相當況今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行今當開泰之期宜軫單平之衆自今後合格選人歷任無違礙者並仰吏部南曹判成如文解差錯不合式樣罪在發解官吏永樂大典卷一萬六千七百八十三旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其年十月詔曰選部公事比置三銓所有員闕選人分在三處每至注擬之際資難得相當況今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行今當開泰之期宜軫單平之衆自今後合格選人歷任無違礙者並仰吏部南曹判成如文解差錯不合式樣罪在發解官吏永樂大典卷一萬六千七百八十三旋具申奏及報吏部此後中書及銓司以到任月日用闕永為定制其年十月詔曰選部公事比置三銓所有員闕選人分在三處每至注擬之際資難得相當況今年選人不多宜令三銓公事併為一處委本司長官通判同商量可否施行今當開泰之期宜軫單平之衆自今後合格選人歷任無違礙者並仰吏部南曹判成如文解差錯不合式樣罪在發解官吏永樂大典卷一萬六千七百八十三
