body:
  text: 舊五代史巻四十九宋門下侍郎參知政事監修國史薛居正等撰唐書第二十五后妃列傳一武皇帝貞簡皇后曹氏莊宗之母也太原人以良家子嬪于武皇姿質閒麗性謙退而明辨雅為秦國夫人所重常從容謂武皇曰妾觀曹姬非常婦人王其厚待之武皇多内寵乾寧初平燕薊得李匡儔妻張氏姿色絶代嬖幸無雙時姬侍盈室罕得進御唯太后恩顧不衰武皇性嚴急左右有過必峻于譴罰無敢言者唯太后從容救解卽為解顔及荘宗載誕體貌竒傑武皇異而憐之太后益寵貴諸夫人咸出其下后亦恭勤内助左右稱之武皇薨荘宗嗣晉王位時李克寧李存顥謀變人情危懼太后召監軍張承業指荘宗謂之曰先人把臂授公此兒如聞外謀欲孤付託公等但置予母子有地毋令乞食于沛幸矣承業因誅存顥克寧以清内難荘宗善音律喜伶人謔浪太后嘗提耳誨之天祐七年鎮定求援荘宗促命治兵太后曰予齒漸衰兒但不墜先人之業為幸矣何事櫛風沐雨離我晨昏荘宗曰禀先王遺旨須滅仇讐山東之事機不可失及發太后餞于汾橋悲不自勝荘宗平定趙魏駐于鄴城毎一嵗之内馳駕歸寧者數四民士服其仁孝太后初封晉國夫人莊宗卽位命宰臣盧損奉册書上皇太后尊號其年平定河南西幸洛陽令皇弟存渥皇子繼岌就太原迎奉莊宗親至懐州迎歸長壽宫太后素與劉太妃善分訣之後悒然不樂俄聞太妃寝疾尚醫中使問訊結徹既而謂荘宗曰吾與太妃恩如伯仲彼經年抱疾但見吾面差足慰心吾暫至晉陽旬朔與之俱来莊宗曰時方暑毒山路﨑嶇無煩徃復可令存渥輩迎侍太妃乃止及凶問至太后慟哭累旬由是不豫尋崩于長壽宫同光三年冬十月上謚曰貞簡皇太后葬于壽安陵太妃劉氏武皇之正室也案劉太妃傳原本闕佚攷北夢瑣言云晉王李克用妻劉夫人常隨軍行至于軍機多所宏益先是汴州上源驛有變晉王憤恨欲四軍攻之夫人曰公為國討賊而以杯酒私忿必若攻城即曲在于我不如囘師自有朝廷可以論列于是班退天復中周徳威為汴軍所敗三軍潰散汴軍乗我晉王危懼與李存信議欲出保雲州夫人曰存信本北方牧羊兒也焉知成敗王常笑王行瑜棄城失勢被人屠割今復欲效之何也王頃嵗避難塞外幾遭陷害頼遇朝廷多事方得復歸今一旦出城便有不測之變焉能逺及晉王止行居數日亾散之士復集軍城安定夫人之力也五代㑹要云同光元年四月册為皇太妃歐陽史云荘宗即位册尊曹氏為皇太后而以嫡母劉氏為皇太妃太妃徃謝太后太后有慚色太妃曰願吾兒享國無窮使吾獲没于地以從先君幸矣復何言哉莊宗滅梁入洛使人迎太后歸洛居長壽宫而太妃獨留晉陽同光三年五月太妃薨魏國夫人陳氏襄州人本昭宗之宫嬪也乾寧二年武皇奉詔討王行瑜駐軍于渭北昭宗降朱書御札出陳氏及内妓四人以賜武皇陳氏素知書有才貎武皇深加寵重及光化之後時事多艱武皇常獨居深念嬪媵鮮得侍謁唯陳氏得召見陳氏性既靜退不以寵侍自侈武皇常呼為阿媎及武皇大漸之際陳氏侍醫藥垂泣言妾為王執掃除之役十有四年矣王萬一不幸妾将何託既不能以身為殉願落髮為尼為王讀一藏佛經以報平昔武皇為之流泣及武皇薨陳氏果落髪持經法名智願後居于洛陽佛寺莊宗賜號建法大師天成中明宗幸其院改賜圓惠大師晉天福中卒於太原追諡光國大師塔以惠寂為名也莊宗神閔敬皇后劉氏案劉后𫝊原本闕佚攷北夢瑣言云荘宗劉皇后魏州成安人家世寒微太祖攻魏州取成安得后時年五六嵗歸晉陽宫為太后侍者敎吹笙及笄姿色絶衆聲伎亦所長太后賜荘宗為韓國夫人侍者後誕皇子繼岌寵待日隆他日成安人劉叟詣鄴宫見上稱夫人之父有内臣劉建豐認之即昔日黄鬚丈人后之父也劉氏方與嫡夫人爭寵皆以門族誇尚劉氏耻為寒家白荘宗曰妾去鄉之時妾父死于亂兵是時環屍而哭妾固無父是何田舎翁詐偽及此乃于宫門笞之其實后即叟之長女也荘宗好俳優宫中暇日自負蓍囊藥篋令繼岌相隨以后父劉叟以醫卜為業也后方晝眠及造其卧内自稱劉衙推訪女后大恚笞繼岌然為太后不禮復以韓夫人居正無以發明大臣希旨請册劉氏為皇后議者以后出于寒賤好興利聚財初在鄴宫令人設法稗販所鬻樵蘓菓茹亦以皇后為名正位之後凡貢奉先入後宫惟冩佛經施尼師他無所賜闕下諸軍困乏以至妻子餓殍宰相請出内庫俵給后将出粧具銀盆兩口皇子滿喜等三人令鬻以贍軍一旦作亂亡國滅族與夫褒姒妲己無己也先是荘宗自為俳優名曰李天下雜于塗粉優雜之間時為諸優扑抶摑搭竟為嚚婦恩伶之傾玷有國者得不以為前鑒劉后以囊盛金合犀帶四欲于太原造寺為尼沿路復通皇弟存渥同簀而寝明宗聞其穢即令自殺攷歐陽史作禆将袁建豐得后納之晉宫而北夢瑣言作内臣劉建豐亦傳聞之異辭也淑妃韓氏莊宗正室案韓淑妃傳原本闕佚攷五代㑹要云同光二年十二月册以宰臣豆盧革韋説為册使出應天門登輅車鹵簿鼓吹前導至永福門降車入右銀臺門至淑妃宫受册于内文武百官立班稱賀徳妃伊氏莊宗次室案伊徳妃傳原本闕佚攷北夢瑣言云莊宗皇帝嫡夫人韓氏後為淑妃伊氏為徳妃又言夫人夏氏後嫁李贊華所謂東丹王即按巴堅長子性酷毒侍婢微過即以刀刲火灼夏氏少長宫掖不忍其凶求離婚歸河陽節度使夏魯竒家後為尼也歐陽史家人傳明宗立悉放荘宗時宫人虢國夫人夏氏歸夏魯竒家後嫁李贊華與北夢瑣言微異遼史又以夏氏為荘宗皇后疑誤又案五代㑹要荘宗朝内職又有昭義侯氏封汧國夫人昭媛白氏封沂國夫人出使美宣鄧氏封魏國夫人御正楚真張氏封涼國夫人司簿徳美周氏封宋國夫人侍真吴氏封延陵郡夫人懿才王氏封太原郡夫人咸一韓氏封昌黎郡夫人瑶芳張氏封清河郡夫人懿徳王氏封瑯琊郡夫人宣一馬氏封扶風郡夫人並同光二年十一月勅明宗昭懿皇后夏氏生秦王從榮及閔帝同光初后以疾崩明帝即位追封為晉國夫人長興中明宗以秦宋二王位望既隆因思從貴之義乃下制曰故晉國夫人夏氏素推仁徳久睦宗親嘗施内助之方不見中興之盛予當御極子並為王有鵲巢之高無翬衣之貴貞魂永逝懿範常存考本朝之文沿追册之制將慰懐于九族冀叶慶于四星宜追册為皇后兼定懿號既而有司上諡曰昭懿和武顯皇后曹氏案曹后傳原本闕佚攷五代㑹要云天成三年正月册為淑妃長興元年正月十四日册為皇后應順元年正月册為皇太后至清泰三年閏十一月隨末帝崩于後樓晉高祖使人䕶葬至天福五年正月二十八日追册曰和武顯皇后宣憲皇后魏氏案魏后𫝊原本闕佚據通鑑考異引唐廢帝實録云宣憲皇后魏氏鎮州平山人中和末明宗徇地山東留戍平山得魏后又云明宗為裨将性濶達不能治生曹后亦疎于畫畧生計所資惟宣憲而已五代會要云初封魯國太夫人清泰二年二月中書門下奏臣聞漢昭帝承祚御厯奉尊諡于雲陽魏明帝繼體守文思外家于甄舘而皆追從徽號祔饗廟庭克隆敬本之文式叶愛親之道臣等又覽國史竊見𤣥宗皇帝母曰昭成皇后竇氏代宗皇帝母曰章敬太后呉氏始嬪朱邸俄閟𤣥宫鴻圖既屬于明君尊號咸追于聖母伏以魯國夫人發祥沙麓貽慶河洲三后最賢周母允成于天統四妃有子唐宫先啟于帝基仰惟當宁之情彌軫寒泉之思久虚殷薦慮損皇猷臣等謹上尊諡曰宣憲皇太后請依昭成皇太后故事擇日備禮册命又臣等伏聞先太后舊陵永祔先祠則都下難崇别廟既追尊諡合剏閟宫按漢朝故事園寝不在王幾或就寝所便立寝祠今商量上諡後權立同廟以申告献配祀之禮請俟他年從之據歐陽史云議建陵寢而太康石敬瑭反乃于京師河南府東立寢宫年又案五代㑹要所載明宗時内職徳妃王氏天成三正月册立長興二年四月進號淑妃應順元年正月十三日册為太妃至周廣順元年四月追諡賢妃昭儀王氏封齊國夫人昭容葛氏封周國夫人昭媛劉氏封趙國夫人孫氏封楚國夫人御正張氏封曹國夫人司寶郭氏封魏國夫人司贊于氏封鄭國夫人尚服王氏封衛國夫人司記崔氏封蔡國夫人司膳翟氏封滕國夫人司醖呉氏封莒國夫人婕妤高氏封渤海郡夫人美人沈氏封太原郡夫人順御朱氏封呉郡夫人司飾聊氏封潁川郡夫人司衣劉氏封彭城郡夫人司藥孟氏封成陽郡夫人梳篦張氏封清河郡夫人司服王氏封太原郡夫人櫛篦𫝊氏封潁川郡夫人知客張氏賜號尚書故江氏追封濟陽郡夫人以上皆長興三年九月勅其名號皆中書門下按六典内職仿而行之内人李氏封隴西縣君崔氏封清河縣君李氏封成紀縣君田氏封成陽縣君白氏封南陽縣君並長興四年二月勅前代内職皆無封君之禮此一時之制閔帝哀皇后孔氏案孔后傳原本闕佚據通鑑云孔循隂遣人結王徳妃求納其女徳妃請娶循女為從厚妃帝許之庚寅皇子從厚納孔循女為妃五代㑹要云初封魯國夫人應順元年四月為末帝所害晉天福五年正月二十八日追諡為哀皇后末帝劉皇后應州人也天成中封為沛國夫人清泰初百官三上表請立中宫遂立為皇后后性強戾末帝甚憚之故其弟延皓自鳯翔牙校環嵗之間厯樞宻使出為鄴都留守皆由后内政之力也及延皓為張令昭所逐執政請行朝典后力制之止從罷免而已晉高祖入洛后與末帝俱就燔焉史臣曰三代之興亡雖由于帝皇亦繫於妃后故夏之興也以塗山及其亡也以妺喜商之興也以簡狄及其亡也以妲己周之興也以文母及其亡也以褒氏觀夫貞簡之為人也雖未偕于前代亦無虧于懿範而劉后以牝雞之晨皇業斯墜則與夫三代之興亡同矣餘無進賢輔佐之徳又何足道哉案五代史無外戚傳據五代㑹要武皇長女瓊華長公主降孟知祥同光二年十二月封第二女瑶英長公主降張延釗同光三年二月封明宗長女永寧公主降晉高祖第十三女興平公主降趙延壽天成三年四月封至長興四年九月改封齊國公主至清泰三年二月進封燕國長公主第十四女壽安公主長興四年六月封第十五女永樂公主長興四年六月封今攷㑹要所載亦多舛互如瓊華公主十國春秋諸書作太祖弟克譲之女㑹要以為武皇長女此傳聞之異辭也莊宗女義寧公主降宋廷浩廷浩仕至房州刺史晉初為汜水闗使張從賓之叛戰死見東都事畧及宋史又王禹偁小畜集有宋渥神道碑云母義寧公主天福中晉祖以嘗事莊宗有舊君之禮每貴主入見聼其不拜時兵戎方熾經費不充惟公主之家賜予甚原盡而復取亦無倦色一日晉祖從容謂貴主曰朕于主家無所愛惜但朝廷多事府庫甚虚主所知矣今輦轂之下桂王為憂可命渥分司西京以豐就養因厚遣之且勅留司具晨昏伏臘之用至于醯醢率有備焉㑹要不載荘宗女㡬人是其闕畧也惟明宗諸女記之稍詳然攷薛史趙延夀傳其娶明宗小女為繼室歐陽史亦云耶律徳光為延壽娶從益妺是為永安公主而㑹要不載則其闕漏者亦多矣舊五代史巻四十九
