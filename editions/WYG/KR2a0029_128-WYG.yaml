body:
  text: 舊五代史巻六十三攷證唐列𫝊十五張全義𫝊初名居言案新舊唐書作張言是書李罕之𫝊亦作張言俱與此𫝊異巢敗依諸葛爽于河陽屢有戰功爽表為澤州刺史案洛陽縉紳舊聞記齊王張令公外𫝊云王在巢軍中知其必敗遂翻身歸國唐授王澤州刺史攷是書則全義因巢敗始歸諸葛爽乃表為澤州刺史也舊間記殊失事實詔皇子繼岌皇弟存紀等皆兄事之案通鑑全義獻幣馬千計帝命皇子繼岌皇弟存紀等兄事之是全義之得幸於莊宗由幣馬也洛陽縉紳舊聞記齊王上表待罪莊宗降詔釋之及召見大喜開懐慰納若見平生故人盡魚水之契焉此葢黨於全義者虛譽之辭朱友謙𫝊簡復攻璠璠冐刃獲免逃歸於汴案新唐書王重榮𫝊李璠為節度使凡五月為部将朱簡所殺據是書則璠逃歸於汴未嘗見殺也通鑑歐陽史俱従是書待遇同於已子案歐陽史作録以為子其年八月友珪遣大将牛存節康懐英韓勍攻之案歐陽史友珪遣招討使韓勍将康懐英等擊友謙通鑑作九月丁未以感化節度使康懐貞為副招討使更以韓勍副之懐貞等與忠武節度使牛存節合兵五萬屯河中三書所載俱有異同友謙襲取同州以其子令徳為帥請節鉞於梁不獲案歐陽史末帝初不許已而許之制命未至友謙復叛通鑑従歐陽史舊五代史巻六十三攷證
