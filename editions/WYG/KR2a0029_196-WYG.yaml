body:
  text: 舊五代史巻九十八宋門下侍郎參知政事監修國史薛居正等撰晉書第二十四列傳十三安重榮朔州人祖從義利州刺史父全勝州刺史振武蕃漢馬步軍都指揮使重榮有膂力善騎射唐長興中為振武道巡邊指揮使犯罪下獄時高行周為帥欲殺之其母赴闕申告樞宻使安重誨隂䕶之奏于明宗有詔釋焉張敬逹之圍晉陽也高祖聞重榮在代北使人誘之重榮乃召邊士得千騎赴焉高祖大喜誓以土地及即位授成德軍節度使累加至使相自梁唐已來藩侯郡牧多以勲授不明治道例為左右羣小感亂賣官鬻獄割剝蒸民率有貪猥之名其實賄賂半歸于下惟重榮自能鉤距凡有争訟多庭辯之至于倉庫耗利百姓科徭悉入于已諸司不敢窺覬嘗有夫婦共訟其子不孝者重榮面加詰責抽劔令自殺之其父泣曰不忍也其母詬詈仗劔逐之重榮疑而問之乃其繼母也因叱出自後射之一箭而斃聞者莫不快意由此境内以為強明大得民情重榮起于軍伍暴得富貴復覩累朝自節鎮遽升大位毎謂人曰天子兵強馬壯者當為之寧有種耶又以奏請過當為權臣所否心常憤憤遂畜聚亡命收市戰馬有飛揚跋扈之志通鑑帝之遣重榮伐秘瓊也戒之曰瓊不受代當别除汝一鎮勿以力取恐為患滋深重榮由是以帝為怯謂人曰秘瓊匹夫耳天子尚畏之况我以將相之重士民之衆乎嘗因暴怒殺部校賈章以謀叛聞章有女一人時欲捨之女曰我家三十口繼經兵亂死者二十八口今父就刑存此身何為再三請死亦殺之鎮人由是惡重榮之酷而嘉賈女之烈焉天福中朝廷姑息契丹務安邊塞重榮每見蕃使必以箕踞慢罵㑹有羙稜數十騎由其境内交言不遜因盡殺之契丹主大怒責讓朝廷朝廷隱忍未即加罪重榮乃宻搆吐渾等諸族以為援助上表論之其累曰臣昨據熟吐渾節度使白承福赫連公德等各領本族三萬餘帳自應州地界奔歸王化續凖生吐渾並渾葜苾兩突厥三部落南北將沙陀安慶九府等各領部族老小并牛羊車帳甲馬七入路慕化歸奔俱至五臺及當府地界已來安泊累據告勞具説被契丹殘害平取生口率畧羊馬凌害至甚又自今年二月後來須領㸃檢壯強置辦人馬衣甲告報上秋向南行營諸蕃部等實恐上天不祐殺敗後隨例不存家族所以預先歸順兼隨府族各量㸃檢強壯人馬約十萬衆人凖沿河名項及山前山後逸利越利諸族部落等首領並差人各將契丹所授官告職牒旗號來送納例皆號泣告勞稱被契丹凌虐憤惋不巳情願㸃集甲馬㑹合殺戮續又朔州節度使趙崇與夲城將校殺偽節度使劉山尋已安撫軍城乞歸朝廷臣相次具奏聞昨奉宣頭及累傳聖㫖令臣凡有往復契丹更須承奉當侯彼生頭角不欲自起釁端貴守初終不愆信誓仰認睿㫖深惟匿瑕其如天道人心至務勝殘去虐須知機不可失時不再來竊以諸蕃不招呼而自至朔郡不攻伐以自歸蓋繫人情盡由天意更念諸䧟蕃節度使等夲自勲勞早居富貴沒身邊塞遭酷虐以異常企足朝廷冀傾輸而不已如聞傳檄盡願倒戈如臣者雖是愚䝉粗知可否不思忌諱罄冩丹衷細具敷陳冀禆萬一其表數千言大抵指斥高祖稱臣奉表罄中國珍異貢獻契丹凌虐漢人竟無厭足又以此意為書遺諸朝貴及蕃鎮諸候高祖憂其變也遂幸鄴都以詔諭之凡有十焉其畧曰爾身為大臣家有老母忿不思難棄君與親吾因契丹而興基業爾因吾而致富貴吾不敢忘爾可忘耶且前代和親只為安邊今吾以天下臣之爾欲以一鎮抗之大小不等無自辱焉重榮愈恣縱不悛雖有此奏亦宻令人與契丹幽州師劉晞結託葢重榮有内顧之心契丹幸我多事復欲侵吞中國契丹之怒重榮亦非本志也時重榮嘗與北來蕃使並轡而行指飛鳥射之應弦而落觀者萬衆無不快抃蕃使因輟所乘馬以慶之由是名振北方自謂天下可以一箭而定也又重榮素與襄州安從進連結及聞從進將議起兵而奸謀乃决天福六年冬大集境内飢民衆至數萬揚旌向闕聲言入覲朝廷遣杜重威帥師禦之遇于宗城軍纔成列有賊將趙彦之臨陣巻甲來奔重榮方戰聞彦之背已大恐退于輜重中王師因而擊之一鼓而潰重榮與十餘騎北走其下部衆屬嚴冬寒冽殺戮及凍死者二萬餘人重榮至鎮取牛馬革旋為甲使郡人分守夾城以待王師宋史解暉傳安重榮反鎮州因舉兵向闕至宗城晉師逆戰大破之暉募軍中壯士百餘夜擣賊壘殺殺獲甚衆暉頻中流矢而督戰自若顔色不撓以功遷列校杜重威至有部將自西郭水門引官軍入焉殺守陴百姓萬餘人重威尋害導者自收其功重榮擁吐渾數百匿于牙城重威使人襲而得之斬首以進高祖御樓閲其浮馘宣露布訖遣漆其頭顱函送契丹五代史補安重榮出鎮常懐不軌之計乆矣但未發居無何廐中産朱鬃白馬黑鴉主丑色雛以為鳯乃欣然謂天命在已遂舉兵反指揮以取宗嶺路以向闕時父老聞之往往竊議曰事不諧矣且王姓安氏曰鞍得背而稳何不取路貝州若由宗我是鞍及于鬃得無危乎未㡬與王師先鋒遇一戰而敗安從進歐陽史從進其先索葛部人也初事莊宗為䕶駕馬軍都指揮使領貝州刺史明宗時為保義彰武軍節度使􅉖帝即位從領順化清泰中徙鎮山南東道晉高祖即位加同中書門下平章事天福六年高祖幸鄴討安重榮少帝以鄭王畱守京師時和凝請于高祖曰陛下北征臣料安從進必反何以制之高祖曰卿意將奈何凝曰臣聞之兵法先人者奪人願陛下為空名宣敕十通授鄭王有急則命將往從進聞高祖往北遂反少帝以空名授李建崇都金海討之從進引兵攻鄧州不克進至湖陽遇建崇等大駭以為神速復為野火所燒遂大敗從進自焚張彦澤其先出于突厥後為太原人也祖父世為陰山府禆將彦澤少有勇力目晴黄而夜有光色顧視若鷙獸焉以騎射事後唐莊宗明宗以從戰有功繼領郡守高祖即位擇為曹州刺史從楊光逺圍范延光于鄴以功授華州節度使尋移鎮涇州累官至檢校太保有從事張式者以宗人之分受其知遇時彦澤有子為内職素不叶父意數行笞撻懼其楚毒逃竄外地齊州捕送到闕敕㫖釋罪放歸父所彦澤上章請行朝典式以有傷名敎屢諫止之彦澤怒引弓欲射之式僅而獲免尋令人逐式出衙式自為賔從彦澤委以庶務左右羣小惡之久矣因此䜛搆互來迫脅云書記若不便出斷定必遭屠害式乃告病尋醫㩦其妻子將奔衍州彦澤遣指揮使李興領二十騎追之戒曰張式如不從命即斬取頭來式懇告刺史遂差人援送到汾州節度使李周驛騎以聞朝廷以姑息彦澤之故有勅流式于商州彦澤遣行軍司馬鄭元昭詣闕論請面奏云彦澤若不得張式恐致不測高祖不得已而從之既至決口割心斷手足而死之式父鐸詣闕訢寃朝廷命王周代之周至任奏彦澤在郡惡跡二十六條逃散五千餘户彦澤既赴闕刑法官李濤等上章謂理其罪高祖下制止令削奪一階一爵而已時以為失刑少帝即位桑維翰復舉之尋出鎮安陽既至折節于士大夫境内稱理旋命領軍北屯恒定時易州地孤漕運不繼制令刑魏相衞飛輓以輸之百姓荷檐纍纍于路彦澤毎援之以行見嬴困者使其部衆代而助之泊至北邊不令百姓深入即遣騎士以馬負糧而去往來既速且無邀奪之患聞者嘉之陽城之戰彦澤之功出于諸將之右其後與敵接戰頻獻捷于闕下咸謂其感高祖不殺之恩補昔年之過也開運三年冬契丹旣南牧杜重威具决瀛州彦澤為契丹所啖宻已變矣乃通欵于戎王請為前導因促騎説重威引軍沿滹水西援常山旣而與重威通謀及王師降于中渡契丹主遣彦澤統二千騎趨京師以制少帝且示公卿逃民以存撫之意彦澤以是歳十二月十六日夜自封丘閂斬關而入以兵圜宫城翌日遷帝于開封府舍凡内帑竒貨悉輦歸私邸仍縱軍大掠兩日方止東都事畧李處耘傳云居京師遇張彦澤之暴處耘善射獨當里門殺數十人里中賴之時桑維翰為開府尹彦澤召至麾下待之不以禮維翰責曰去年拔公于罪人之中復領大鎮授以兵權何負恩一至此耶彦澤無以對是夜殺維翰盡取其家財彦澤自謂有功于契丹晝夜以酒樂自娛當在京巡檢之時出入騎從常數百人旗幟之上題曰赤心為主觀者無不竊笑又所居第財貨山積楚國夫人丁氏即少帝弟曹州節度使延煦之母也有容色彦澤使人取之太后遲迴未與彦澤立遣人載之而去其負國欺君也如是數日之内恣行殺害或軍士擒獲罪人至前彦澤不問所犯但瞋目出一手竪三指而已軍士承其意即出外斷其腰領焉彦澤與閤門使高勲不恊因乘醉至其門害其仲父季弟暴屍于門外及契丹帳泊于北郊勲訴寃于戎王時戎王已怒彦澤剽掠京城遂令鎻之仍以彦澤罪惡宣示百官及京城士庶且云彦澤之罪合誅與否百官連狀具言罪在不赦市肆百姓亦争投狀䟽彦澤之罪戎王知其重怒遂令棄市仍令高勲監决斷腕出鎖然後刑之勲使人剖其心以祭死者市人争其肉而食之五代史補李濤常憤張彦澤殺邠州幕吏張式而取其妻濤率同列上䟽請誅彦澤以謝西土高祖方姑息武夫竟不從未幾契丹南侵至中渡橋彦澤首降戎王喜命以本軍統蕃部控弦之士先入京師彦澤自以功不世出乃挾宿憾殺開封尹桑維翰濤聞之謂親知曰吾曾上䟽請誅彦澤今國家失守彦澤所為如此吾之首領容可保乎然無可奈何誰能伏藏溝瀆而取辱耶于是自冩門狀求見彦澤其狀云上䟽請殺太尉人李濤謹隨狀納命彦澤覽之欣然降堦迎之然濤未安復曰太尉果然相恕乎彦澤澤曰覧公門狀見納命二字使人怒氣頓息又何憂哉濤素滑稽知其必免又戯為伶人詞曰太尉既相恕何不將壓驚絹來彦澤大笑卒善待之趙德鈞本名行實幽州人也少以騎射事滄州連帥劉守文守文為弟守光所害遂事守光署為幽州軍校及唐莊宗代幽州德鈞知其必敗乃遁歸莊宗莊宗善待之賜姓名曰紹斌累歴郡守從平梁遷滄州節度使同光三年移鎮幽州明宗即位遂歸本姓始改名德釣其子延壽尚明宗女興平公主故德釣尤承倚重天成中定州王都反契丹遣特哩領精騎五千來援都至唐河河為招討使王晏球所敗㑹霖雨相繼所在泥淖敗兵北走人馬饑疲德鈞于要路邀之盡獲餘衆擒特哩衮已下首領數十人獻于京師明年王都平加兼侍中頃之加東北西招討使德鈞奏發河北數鎮丁夫開王馬口至㳺口以通水運凡二百里又于閻溝築壘以戍兵守之因名良鄉縣以備鈔冦又于幽州東築三河城北接薊州頗為形勝之要部民由是稍得樵牧德鈞鎮幽州凡十餘年甚有善政累官至檢校太師兼中書令封北平王遼史天贊六年遣人以詔賜盧龍軍節度使趙德釣七年趙德釣遣人進時果葢德釣久在邊境嘗與契丹通好也清泰三年夏晉高祖起義于晉陽九月契丹敗張敬逹之軍于太原城下唐末帝詔德鈞以本軍由飛狐路出賊後邀之時德釣子延夀為樞宻使唐末帝命帥軍屯上黨德鈞乃以所部銀鞍契丹直三千騎至鎮州率節度使董温琪同赴征行自吳兒峪路趨昭義與延夀㑹于西唐店十一月以德釣為諸道行營都統以延夀為太原南面招討使遣端明殿學士吕𤦺齎賜官告兼令犒軍𤦺從容言天子委任之意德鈞曰既以兵相委焉敢惜死時范延光領兵二萬軍于遼州德鈞欲併其軍奏請與延光㑹合唐末帝諭延光疑其姦謀不從德鈞延夀自潞州引軍至團柏谷德鈞累奏乞授延夀鎮州節度末帝不悦謂左右曰趙德鈞父子堅要鎮州茍能逐退蕃戎要代予位亦所甘心若翫寇要君但恐犬兔俱斃朝廷繼馳書詔促令進軍德釣持疑不果乃遣使于契丹原齎金幣求立以為帝仍許晉祖長鎮太原契丹主不之許及楊光逺以晉安寨降于契丹德鈞父子自團柏谷南走潞州一行兵士投戈棄甲自相騰踐死者萬計時德釣有愛將時賽率輕騎東還漁陽其部尚有千餘人與散亡之卒俱集于潞州是日潞州節度使高行周亦自北還及至府門見德鈞父子在城闉上行周謂曰某與大王鄉人宜以忠言相告城中無斗粟可食請大王速迎車駕自圗安計無取後悔焉德鈞遂與延夀出降契丹高祖至德釣父子迎謁于馬前高祖不禮之時契丹主問德釣曰汝在幽州日所置銀鞍契丹直何在德釣揩示之契丹盡殺于潞之西郊遂鏁德釣父子入蕃及見國母舒嚕氏盡以一行財寳及幽州田宅籍而獻之國母謂之曰汝父子自覔天子何也德鈞俛首不能對通鑑太后問曰汝近者何為在太原德鈞曰奉唐主之命太后曰汝從吾兒求為天子何妄語耶又自指其心曰此不可欺也又曰吾兒將行吾戒之云趙大王若引兵北向榆關亟須引歸太原不可救也汝欲為天子何不先擊退吾兒徐圖亦未晚汝為人臣既負其主不能擊敵又欲乘亂邀利所為如此復面目求生乎德釣俛首不能對又問田宅何在曰臣在幽州國母曰屬我矣又何獻也天福二年夏德鈞卒于契丹契丹國志德鈞鬱鬱不多食踰年而死德鈞既卒國主釋延夀而用之延夀本姓劉氏父曰邟常山人也常任蓚令梁開平初滄州節度使劉守文䧟其邑時德鈞為偏將獲延夀并其母种氏遷養之為子延夀姿貌奸柔稍渉書史尤好賔客亦能為詩太平廣記引趙延夀傳云延夀㓜習武畧即戎之暇時復以篇什為意嘗在北庭賦詩曰占得高原肥草地夜深生火折林稍南人聞者𫝊之及長尚明宗女興平公主初為汴州司馬明宗即位授汝州刺史歴河陽宋州節度使入為上將軍充宣徽使遷樞宻使兼鎮徐州及高祖起義于晉陽唐末帝幸懷州委延夀北伐後高祖至潞州延夀與父德鈞俱䧟北庭未幾契丹主以延夀為幽州節度使封燕王尋為樞宻使兼政事令天福末契丹與少帝絶好契丹主委延夀以圖南之事許以中原帝之延夀乃𨗳誘蕃戎􅀢食河朔諸軍既降于中渡戎王命延夀就寨安撫諸軍仍賜龍鳯赭袍使衣之而往謂之曰漢兒兵士皆爾有之爾宜親自慰撫延夀至營杜重威李守貞已下皆迎謁于馬前及戎王入汴時降軍數萬皆野次于陳橋戎王慮其有變欲盡殺之延夀聞之遽請見于戎王曰臣伏見今日已前皇帝百戰十征始收得晉國不知皇帝自要治之乎為他人治之乎戎王變色曰爾何言之過也朕以晉人負義舉國南征五年相殺方得中原豈不自要為主而為他人耶卿有何説速奏朕來延夀曰皇帝嘗知吳蜀與晉朝相殺否曰知延夀曰今中原南自安申西及秦鳯沿邊數千里竝是兩界守戍之所將來皇帝歸國時又漸及炎蒸若吳蜀二寇交侵中國未知如許大世界教其兵馬禦捍茍失隄防豈非為他人取也戎王曰我弗知也為之奈何延夀曰臣知止國之兵當炎暑之時沿吳蜀之境難為用也未若以陳橋所聚降軍團併别作軍額以備邊防戎王曰我念在壺關失斷陽城時亦㑹言議未獲區分致五年相殺此時入手如何更不翦除延夀曰晉軍見在之數如今還似從前盡在河南誠為不可臣請遷其軍竝其家口于鎮定雲朔間以處之每歳差伊分畨于河外沿邊防戎斯上䇿也戎王忻然曰一取大王商量由是陳橋之衆獲免長平之禍焉延夀在汴久之知戎王無踐言之意乃遣李崧達語于戎王求立為皇太子崧不得已而言之戎王曰我于燕王無所愛惜但我皮肉堪與燕王使用亦可割也何况他事我聞皇太子天子之子合作燕王豈得為之也因命與燕王加恩時北來翰林學士承㫖張礪擬延夀為中京留守大丞相録尚書事都督中外諸軍事樞密使燕王如故戎王覧擬狀索筆圍却録尚書事都督中外諸軍事之字乃付翰林院草制焉又以其子匡贊為河中節度使延夀在汴州復娶明宗小女為繼室先是延州節度使周密為其子廣娶焉已納財畢親迎有日矣至是延夀奪取之契丹主自汴迴至邢州命升延夀坐在契丹左右相之上契丹主死延夀下敎于諸道稱權知南朝軍國事是歳六月一日為永康王烏裕所鎮籍其家財分給諸部尋以延夀入國竟卒于契丹子贊歴漢周兩朝累授節鎮及統軍使仕皇朝歴廬延邠鄜等四鎮焉張礪字夢臣磁州滏陽人也祖慶父實世為農礪㓜嗜學有文藻在布衣時或覩民間争競必為親詣公府辨其曲直其負氣也如此唐同光初擢進士第尋拜左拾遺直史館㑹郭崇韜伐蜀奏請礪掌軍書蜀平崇韜為魏王繼岌所誅時崇韜左右親信皆懼禍奔逃惟礪詣魏王府地慟哭久之時人皆服其高義及魏王班師礪從副招討使任還東歸至利州㑹康延孝叛迴據漢州圜奉魏王命迴軍西討延孝時礪獻謀于圜請伏精兵于後先以嬴師誘之圜深以為然延孝本驍將也任圜乃儒生也延孝聞圜至又覩其羸師殊不介意及戰酣圜發精兵以擊之延孝果敗遂擒之以歸是歳四月五日至鳯翔内官向延嗣奉莊宗命令誅延孝監軍李延襲已聞洛中有變故留延孝且害任圜之功故也圜未決礪謂圜曰此賊構亂遂致凱旋差晩且明公血戰擒賊安得違詔養禍是破檻放虎自貽其咎也公若不決余自殺此賊任圜不得已遂誅延孝天成初明宗知其名召為翰林學士再丁父母憂服闋皆復入為學士歴禮部兵部貟外郎知制詰充職未幾父之妾卒初妾在世礪以久侍先人頗亦敬奉諸㓜子亦以祖母呼之及卒礪疑其事詢于同寮未有以對礪即託故歸于滏陽間居三年不行其服論情制宜識者韙之清泰中復授尚書比部郎中知制誥依前充學士高祖起于晉陽唐末帝命趙延夀進討又命翰林學士和凝與延夀偕行礪素輕凝慮不能集事因自請行唐末帝慰而許之及唐軍敗于團柏谷與延夀俱敗于契丹契丹以舊職縻之累官至吏部尚書契丹入汴授右僕射平章事集賢殿大學士隨至鎮州㑹契丹主卒永康王北去蕭翰自東京過常山乃引鐵騎圍其第時礪有疾方伏枕翰見礪責之曰爾言于先帝云不得任蕃人作節度使如此則社稷之永矣又先帝來時令我于汴州大内安下爾言不可又我為汴州節度使爾在中書何故行帖與我礪抗聲而對辭氣不屈翰遂鎖礪而去遼史礪抗聲曰此國家大體安危所繫吾實言之欲殺即殺奚以鎻為鎮州節度使滿逹尋解其鎮是夜以疾卒家人燼其骨歸葬于滏陽礪素耿直嗜酒無檢始陷契丹時曽背契丹南歸為追騎所獲契丹主怒曰爾何捨我而去礪曰礪漢人也衣服飲食與此不同生不如死請速就刃契丹主顧通事高唐英曰我常戒爾軰善待此人致其逃去過在爾軰因笞唐英一百其為契丹主善待也如此礪平生抱義憐才急于契拔聞人之善必攘􅃑以稱之見人之貧亦倒篋以濟之故死之之日中朝士大夫亦皆嘆惜焉蕭翰者契丹諸部之長也父曰阿巴劉仁㳟鎮幽州阿巴㑹引衆寇平州仁㳟遣驍將劉鴈郎與其子守光率五百騎先守其州阿巴不知為郡人所紿因赴牛酒之㑹為守光所擒契丹請贖之仁㳟許其請尋歸阿巴妹為按巴堅妻則契丹主德光之母也翰有妹亦嫁于德光故國人謂翰為國舅契丹入東京以翰為宣武軍節度使契丹比無姓氏翰將有節度之命乃以蕭為姓翰為名自是翰之一族皆稱姓蕭契丹主北去畱翰以鎮河南時漢高祖已建號于太原翰懼將北歸慮京師無主則衆皆為亂乃遣蕃騎至洛京迎唐明宗㓜子許王從益知南朝軍國事從益至翰率蕃將拜于殿上翌日翰乃輦其實貨鞍轡而北漢人以許王既立不復為亂果中其狡計翰行至鎮州遇張礪翰以舊事致忿就第數其失而鎖之翰歸本國為永康王烏裕所鎖尋卒于本土劉晞者涿州人也父濟雍累為本郡諸邑令長晞少以儒學稱于鄉里嘗為唐將周德威從事後陷于契丹契丹以漢職縻之天福中契丹命晞為燕京畱守嘗于契丹三知貢舉歴官至同平章事兼侍中隨契丹入汴授洛京畱守㑹河陽軍亂晞走許州又奔東京蕭翰遣兵援晞至洛下契丹主死晞自洛復至東京隨蕭翰北歸遂畱鎮州漢初與滿逹勒同奔定州後卒于北蕃契丹國志劉珂晞之于也尚世宗妹燕國公主崔廷勲不知何許人也通鑑注引宋白曰廷勲本河内人形貌魁偉美鬚髯㓜陷北庭歴仕至雲州節度使官至侍中契丹入汴遷少帝于封禪寺遣廷勲以兵防守尋授河陽節度使甚得民情契丹北行武行德率軍趨河陽廷勲為行德所逐乃與奚王伊喇保懷州尋以兵反攻行德行德出戰為廷勲所敗及契丹主死遂歸鎮州漢初與滿逹同奔定州後没于北蕃史臣曰帝王之尊必由天命雖韓信彭越之勇吳濞淮南之勢猶不可以妄冀而况二安之庸昧相輔為亂固宜其自取滅亡也後之擁強兵涖重鎮者得不以為鑒乎彦澤狼子野心盈貫而死晚矣德釣諸人與晉事相終始故附見于茲焉舊五代史巻九十八
