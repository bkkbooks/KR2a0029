body:
  text: 舊五代史巻一百四十攷證志二厯志正元厯案玉海作正統五代會要作正元創為新厯一部二十一巻案玉海引崇文總目作二十巻五行得朞之數五行原本訛五之今據五代會要改正法者數之節也法原本訛百今據五代會要改正以通法進統法得七十二萬案七十二萬原本作七千二百萬考下文以通法進全率得七千二百萬謂之大率則此當云以通法進統法得七十二萬謂之全率原本全率之數併作大率之數蓋傳寫之訛今據歐陽史改正欽天步月離術離䇿二十七二十七原本訛作一十七案以統法除離率得二十七日及餘分今據歐陽史改正交中一十三四千三百六十三四千三百原本訛作四千四百案交䇿半之為交中當從歐陽史作四千三百今改正欽天歩五星術歳星厯率二百六十二萬九千七百六十一七十八案七百六十一歐陽史作九百六十六非也據厯率半之為率中彼此互訂此條當以是書為正厯中一百八十二四千四百八十八十九案小分八十九原本作九十六非也據厯中倍之為厯率倍八十九適得大分一小分七十八此條當以歐陽史為正今據改太白周䇿五百八十三案原本作周䇿五百八十三萬考周率滿統法得周䇿五百八十三日及餘分萬字係衍文歐陽史亦無萬字今刪去厯中一百八十二案原本作厯中一百八十二萬考厯率半之滿統法得厯中一百八十二日萬字係衍文歐陽史亦無萬字今刪去舊五代史巻一百四十攷證
