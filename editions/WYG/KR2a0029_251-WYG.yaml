body:
  text: 舊五代史巻一百二十七宋門下侍郎參知政事監修國史薛居正等撰周書第十八列傳七盧文紀字子持京兆萬年人以下原本有闕文長興末為太常卿文紀形貎魁偉語音高朗占對鏗鏘健于飲啖奉使蜀川路由岐下時唐末帝為岐師以主禮待之觀其儀形㫖趣遇之頗厚清泰初中書闕輔相末帝訪之于朝左右曰臣見班行中所譽當大拜者姚顗盧文紀崔居儉耳或品藻三人才行其心愈惑末帝乃俱書當時清望達官數人姓名投琉璃缾中月夜焚香禱請于天旭旦以筯挾之首得文紀之名次即姚顗末帝素已竒待歡然命之即授中書侍郎同平章事與姚顗同升相位時朝廷兵革之後宗社甫寜外宼内侵强臣在境文紀處經綸之地無輔弼之謀所論者親愛朋黨之小瑕所紏者銓選擬掄之㣲纇時有蜀人史在徳為太常丞出入權要之門評品朝士多有譏彈乃上章云文武兩班宜選能進用見在軍都將校朝廷士大夫竝請閲試澄汰能者進用否者黜退不限名位高下疏下中書文紀以為非已怒甚召諫議盧損為覆狀辭㫖蕪漫為衆所嗤三年夏晉祖引契丹拒命既而大軍挫衂官寨受圍八月親征過徽陵拜于闕門休于仗舍文紀扈從帝顧謂之曰朕聞主憂臣辱予自鳳翔來首命卿為宰相聽人所論將為便致太平寇孽紛紛令萬乘自行戰賊于汝安乎文紀惶恐致謝時末帝季年天奪其魄聲言救寨其實倦行初次河陽召文紀張延朗謀議文紀曰敵騎倏徃忽來無利則去大寨牢固足以枝梧况已有三處救兵可以不戰而解使人督促責以成功輿駕且駐河橋詳觀事勢况地處舟車之要正當天下之心必若未能解圍去亦非晚㑹延朗與趙延夀款密傍奏曰文紀之言是也故令延夀北行末帝坐俟其敗晉祖入洛罷相為吏部尚書再遷太子少傅少帝嗣位改太子太傅漢祖登極轉太子太師時朝官分司在洛雖有留臺御史紀綱亦多不整肅遂逐文紀别令檢轄侍御史趙礪及糾分司朝臣中有行香拜表疎怠者楊邠怒凡有病不在朝謁者皆與致仕官時文紀别令檢轄之職頗甚滋章因疾請假復為留臺所奏遂以本官致仕歐陽史周太祖入立即拜司空于家廣順元年夏卒年七十六贈司徒輟視朝二日文紀平生積財巨萬及卒為其子龜齡所費不數年間以至蕩盡由是多藏者以為誡焉馬𦙍孫字慶先棣州商河人以下原本有闕文唐末帝即位用為翰林學士户部郎中知制誥賜金紫未滿歲改中書舍人禮部侍郎皆帶禁職尋拜中書侍郎平章事𦙍孫純儒性多凝滯遽登相位未悉朝廷舊事初馮道罷同州入朝拜司空唐朝故事三公為加官無單拜者是時朝議率爾命道制出或曰三公正宰相便合參大政又云合受册衆言藉藉盧文紀又欲祭祀時便令掃除馮道聞之曰司空掃除職也吾無所憚既而知非乃止劉昫為僕射性剛羣情嫉之乃共贊右常侍孔昭序論行香次第言常侍侍從之臣行立合在僕射之前疏奏上御史臺定例同光巳來李琪盧質繼為僕射質性輕脱不能守師長之體故昭序輕言𦙍孫以羣情不悦劉昫馮道欲微抑之乃責臺司須檢則例而臺吏言舊不見例據南北班位即常侍在前俄屬國忌將就列未定𦙍孫即判臺狀曰既有援據足可遵行各示本官劉朐怒揮袂而退自後日責臺司定例崔居儉謂南宫同列曰從昭序言語是朝廷人總不解語也且僕射師長也中丞大夫就班修敬常侍班在南宫六卿之下况僕射乎已前騎省年深望南宫二侍郎如仰霄漢癡人舉止何取笑之深耶衆聞居儉言紛議稍息文士哂𦙍孫堂判有援據二字其中書百職𦙍孫素未諳練無能專决但署名而巳又少見賓客時人目之為三不開謂口不開印不開門不開也及太原事起唐末帝幸懐州𦙍孫留司在洛未幾趙徳鈞父子有異志官砦危急君臣計無所在俄而𦙍孫自洛來朝衆相謂曰馬相此來必有安危之策既至獻綾三百匹卒無獻可之言晉祖受命廢歸田里𦙍孫好古慕韓愈之為人尤不重佛及廢居里巷追感唐宋之平昔之遇乃依長壽僧舍讀佛書冀申冥報歳餘枕藉黄巻中見華嚴楞嚴詞理富贍由是酷賞之仍抄撮之相形于歌詠謂之法喜集又纂諸經要言為佛國記凡數千言或嘲之曰公生平以傅奕韓愈為髙識何前倨而後恭是佛佞公耶公佞佛耶𦙍孫笑而答曰佛佞予則多矣李崧相晉用李專美為贊善𦙍孫以賓客致仕專美轉少卿𦙍孫得太子詹事晉漢公卿以𦙍孫好為文章皆欣然待之太祖即位就加檢校禮部尚書太子賓客分司在洛每閉關養素惟事謳吟著述嗜八分書題尺酬答必親札以􅃷其墨蹟𦙍孫將卒之前覩白虺縁于庭槐驅之失所在𦙍孫感賦鵬之文作槐蟲賦以見志廣順三年秋九月卒于洛陽詔贈太子少傅輟視朝一日𦙍孫初為河中從事因事赴闕宿于邏店其地有上邏神祠見夢神見召待以優禮手授二筆其筆一大一小覺而異焉及為翰林學士𦙍孫以為契鴻筆之兆旋知貢舉私相謂曰此二筆之應也泊入中書上事堂吏奉二筆熟視太小如昔時夢中所授者及卒後旬日有侍婢靈語一如𦙍孫聲氣處分家事皆有倫理時人奇之和凝字成績汶陽須昌人也九代祖逢堯唐高宗時為監察御史自逢堯以下仕皆不顯曽祖敞祖濡皆以凝貴累贈太師父矩贈尚書令矩性嗜酒不拘禮節雖素不知書見士未嘗有慢色必罄家財以延接凝㓜而聰敏姿狀秀拔神采射人少好學書一覧者咸達其大義年十七舉明經至京師忽夢人以五色筆一束以與之謂曰子有如此才何不舉進士自是才思敏贍十九登進士第滑帥賀瓌知其名辟置幕下凝善射時􅅛與唐莊宗相拒于河上戰胡柳陂瓌軍敗而北惟凝隨之􅅛顧曰子勿相隨當自努力凝對曰丈夫受人知有難不報非素志也但恨未得死所旋有一騎士來逐瓌凝叱之不止遂引弓而射應弦而斃􅅛獲免既而謂諸子曰昨非和公無以至此和公文武全才而有志氣後必享重位爾宜謹事之遂以女妻之由是聲望益隆後歴鄆鄧洋三府從事唐天成中入拜殿中侍御史歴禮部侍部二員外改主客員外郎知制誥尋詔入翰林充學士轉主客郎中充職兼權知貢舉貢院舊例放牓之日設棘于門及閉院門以防下第不逞者凝令徹棘啓門是日寂無喧者所收多才名之士時議以為得人澠水燕談范質初舉進士時和凝知貢舉凝常以宰輔自期登第之日名第十三人及覽質文尤加賞歎即以第十三名處之場屋間謂之傳衣鉢若禪宗之相付授也後質果繼凝登相位明宗益加器重遷中書舍人工部侍郎皆充學士晉有天下拜端明殿學士兼判度支轉户部侍郎㑹廢端明之職復入翰林充承㫖晉祖每召問以時事言皆稱㫖五年拜中書侍郎平章事六年秋晉髙祖將幸鄴都時襄州安從進反狀巳彰凝乃奏曰車駕離闕安從進或有悖逆何以待之晉髙祖曰卿意如何凝曰以臣料之先人有奪人之心臨事即不及也欲預出宣勅十數道密付開封尹鄭王令有緩急即旋填將校姓名令領兵擊之晉髙祖從之及聞唐鄧奏報鄭王如所勅遣騎將李建崇監軍焦繼勲等領兵討焉相遇于湖陽從進出于不意甚訝其神速以至于敗由凝之力也少帝嗣位加右僕射開運初罷相守本官未幾轉左僕射漢興授太子太保國初遷太子太傅顯徳二年秋以背疽卒于其第年五十八輟視朝兩日詔贈侍中凝性好修整自釋褐至登台輔車服僕從必加華楚進退容止偉如也又好延納後進士無賢不肖皆虛懐以待之或致其仕進故甚有當時之譽平生為文章長于短歌豔曲尤好聲譽有集百巻自篆于版模印數百帙分恵于人焉宋朝類苑和魯公凝有豔詞一編名香奩集凝後賢乃嫁其名為韓偓今世傳韓偓香奩集乃凝所為也凝生平著述分為演輪遊蓺孝悌疑獄香奩籯金六集自為遊蓻集序云子有香奩籯金二集不行于世凝在政府避議論諱其名又欲後人知故于遊蓺集序實之此凝之意也長子峻卒于省郎次子峴錦繡萬花谷引范蜀公䝉求云和峴晉相和凝之子峴生㑹凝入翰林加金紫知貢舉凝喜曰我生平美事三者併集此于宜于我矣因名曰三美仕皇朝為司勲員外郎蘇禹珪字𤣥錫其先出于武功近世家髙密今為郡人也父仲容以儒學稱于鄉里唐末舉九經補廣文助教遷輔唐令累贈太師禹珪性謙和虚襟接物克構父業以五經中第辟遼州倅職厯青鄆從事轉潞并管記累檢校官至户部郎中漢髙祖作鎮并門奏為兼判開運末契丹入汴漢祖即位于晉陽授中書侍郎平章事漢祖莅阼兼刑部尚書俄加右僕射集賢殿大學士漢祖大漸與蘇逢吉楊邠等受顧命立少主明年轉左僕射三年冬太祖入平内難禹珪遁入都城為兵士所擄翼日太祖令人求之既見撫慰甚至尋復其位國初加守司空尋罷相守本官世宗嗣位封莒國公未幾受代歸第顯徳三年正月旦與客對食之際暴疾而卒時年六十二禹珪純厚長者遭遇漢祖及蘇逢吉夷滅禹珪恬然無咎時人以為積善之報也子徳祥登進士第累厯臺省景範淄川長山人以下原本有闕文據世宗紀景範父名初以户部郎中致仕世宗之南征也命為東京副留守車駕迥自河東世宗以艱于國用乃以範為中書侍郎平章事判三司册府元龜載世宗即位七月癸巳制曰朕自履宸極思平泰階出一令慮下民之未從行一事懼上𤣥之罔祐晨興夕惕終嵗于兹雖禮讓漸開興行而風雨未之咸若豈刑政之所闕而徳教之未孚哉由是進用良臣輔宣𤣥化雖朕志先定亦輿情具瞻爰擇良辰誕敷明命樞宻院直學士中大夫尚書工部侍郎上柱國晉陽縣開國男食邑三百户賜紫金魚袋景範昔佐先帝毎罄嘉謨逮事渺躬愈傾忠節奉上得大臣之體檢身為君子之儒一昨戎輅親征皇都是守贊勲賢於留府副徵發于行營軍政所需國用無闕今則靈臺偃革宣室圖功思先朝欲用之言成聖考得賢之美俾參大政仍掌利權爾其聴聴朕言徃敷𤣥化予欲則垂象而清品彚爾則順天道以叙彛倫予欲恤刑名而息戰争爾則謹憲章而恢廟略天人之際懸合軍民之事罔渝則國相之尊非爾孰處邦計之重惟才是臧勉思倜儻以致君勿效因循而保位佇聞成績用副虚懐可正議大夫中書侍郎平章事判三司範為人厚重剛正無所屈撓然理繁治劇非其所長雖悉心盡瘁終無稱職之譽世宗知之因其有疾乃罷司計尋以父䘮罷相東歸顯徳二年冬以疾卒于鄉里優詔贈侍中官為立碑焉史臣曰夫以稽古之力取秉鈞之位者豈常人乎然文紀耽于貨殖𦙍孫傷于齷齪則知全其徳者鮮矣如成績之文采𤣥錫之履行景範之純厚皆得謂之君子儒矣以之爰立何用不臧舊五代史巻一百二十七
