body:
  text: 舊五代史巻六宋門下侍郎參知政事監修國史薛居正等撰梁書第六太祖紀六開平四年十月乙亥東京博王友文入覲召之也己卯以新修天驥院開宴落成内外竝獻馬而魏博進絹四萬疋為駔價壬午以冬設禁軍幸興安鞠場召文武百官宴幸開化大閲軍實十一月丁亥朔幸廣王第作樂辛卯宴文武四品以上于宣威殿庚戌幸左龍虎軍宴羣臣甲寅幸右龍虎軍宴羣臣戊戌詔曰自朔至今暴風未息諒惟不德致此咎徴皇天動威罔敢不懼宜徧命祈禱副朕意焉差官分往祠所止風己亥日南至帝被衮冕御朝元殿列細仗奏樂于庭羣臣稱賀帝略于伊水乙巳詔曰闗防者所以譏異服察異言也况天下未息兵民多姦改形易衣覘我戎事比者有諜皆以詐敗而未嘗罪所過地叛將逃卒竊其妻孥而影附使者亦未嘗詰其所經今海内未同而緩法弛禁非所以息姦詐止奔亡也應在京諸司不得擅給公騐如有出外須執慿繇者其司門過所先須經中書門下㸃檢宜委宰臣趙光逢專判出給俾繇顯重冀絶姦源仍下兩京河陽及六軍諸衛御史臺各加鈐轄公私行李復不得帶挾家口向西其襄鄧鄜延等道並同處分以寧國軍節度使王景仁充北面行營都招討使潞州副招討使韓勍為副相州刺史李思安為先鋒使時鎮州王鎔定州王處直叛結連晉人故遣將討之五代㑹要十一月十四日司天奏月蝕不宜用兵時王景仁方總大軍北伐追之不及至五年正月二日果為後唐莊宗大敗于柏鄉十二月辛酉宴文武四品以上于宣威殿親閲禁軍命格鬬于教馬亭已已詔曰滑宋輝亳等州水澇敗傷人户愁嘆朕為民父母良用痛心其令本州分等級賑貸所在長吏監臨周給務令存濟壬辰賑貸東郡畿内如宋滑制乾化元年正月丙戌朔日有蝕之帝素服避殿百官守司以恭天事明復而止制曰兩漢以來日蝕地震百官各上封事指陳得失蓋欲周知時病盡達物情用緝國章以奉天誡朕每思逆耳罔忌觸鱗將洽政經庶開言路况兹謫見當有咎徴其在列辟羣臣危言正諫極萬邦之利害致六合之殷昌毗予一人永建皇極二日日旁有祲氣向背若環耳崇政使敬翔望之曰兵可憂矣帝為之旰食是日果為晉軍及鎮定之師所敗都將十餘人被擒餘衆奔潰庚寅制曰扈氏不恭固難去戰鬼方未服尚或勞師其蟻聚餘妖狐鳴醜類棄天常而拒命據地險以偷生言事討除將期戡定問罪止誅于元惡挺災可憫于遺黎每念傷痍良深愧歎應天兵所至之地宜令將帥節級嚴戒軍伍不得焚燒廬舍開發丘壠毁廢農桑驅掠士女使其背叛之俗知予弔伐之心又制曰戎機方切國用未殷養兵須藉于賦租税粟尚煩于力役所在長吏不得因縁徴發自務貪求茍有故違必行重典立法垂制詳刑定科傳之無窮守而勿失中書門下所奏新定格式律令己頒下中外各委所在長吏切務遵行盡革煩苛皆除枉濫用副哀矜之㫖無違欽恤之言詔徴陜州鎮國軍節度使楊師厚至京見于崇勲殿帝指授方畧依前充北面都招討使恩賫甚厚使督軍進發五代㑹要二月晉師侵魏州楊師厚帥師援邢州晉人還師二月丙辰朔帝御文明殿羣臣入閤以蔡州順化軍指揮使王存儼權知軍州事蔡人久習叛逆刺史張慎思又裒歛無狀帝追慎思至京而久未命代右廂指揮使劉行琮乘虚作亂因縱火驅擁為渡淮計存儼誅行琮而撫遏其衆都將鄭遵與其下奉存儼為主而以衆情馳奏時東京留守博王友文不先請遂討其亂兵至鄢陵上聞之曰誅行琮功也然存儼方懼若臨之以兵蔡必速飛矣遂馳使還軍而擢授存儼蔡人安之壬戌詔曰東京舊邦久不巡幸宜以今月九日幸東都扈從文武官委中書門下量閑劇處分宰臣上言曰龍興天府久望法駕但陛下始康愈未宜渉寒願少畱清蹕從之五代㑹要二月敕食人之食者憂人之事況丞相尊位參決大政而堂封未給且無餐錢朕甚愧之宜令食萬錢之半甲子幸曜村民舍閲農事庚午幸白馬坡詔金吾大將軍待制官各奏事武安軍節度使馬殷進呈䖍州刺史盧延昌牋表䖍州本支郡也兵甚鋭自得韶州益强大昇為百勝軍使始洪州之䧟盧光稠願收復使府立功自効上因兼授江西觀察畱後光稠卒復命延昌領州事方伯亦頗慰薦楊渭遣人偽署爵秩延昌佯受官牒禮遣其使因湖南自表其事曰郡小寇迫欲緩其姧謀且開導貢路非敢貳也以其偽制來自陳上覽奏曰我方有北事不可不甚加撫䘏尋兼授鎮南將軍節度使觀察畱後命使慰勞九國志盧延昌歸命于呉偽乞命于梁三月辛卯以久旱令宰臣分禱靈迹翼日大㴻雨丙甲幸甘水亭召宰臣翰林學士尚書侍郎孔續已下八人扈從宴樂甚歡戊戌幸右龍虎軍召文武官四品已上宴于新殿甲辰幸左龍虎軍新殿宴文武官四品已上四月丁卯幸龍虎門召宰臣學士金吾上將軍大將軍侍宴廣化寺壬申契丹遣使來貢丁丑幸宣威殿宴文武官四品已上及軍使蕃客己卯又幸左龍虎軍宴羣臣詔曰邠岐未滅闗隴多虞宜擇親賢總兹戎任應闗西同雍華鄜延夏等六道兵馬并委冀王收管指揮凡有抽差先申西面都招討使仍别奏聞庶合機權以寧邊鄙五月甲申朔帝被冕旒御朝元殿視朝仗衛如式制改開平五年為乾化元年大赦天下詔方伯州牧近未加恩者並遷爵秩復大賚軍旅普宴于宣威殿賜帛各有差制封延州節度使髙萬興為渤海郡王諸道節度使錢鏐張宗奭馬殷王審知劉隠各賜一子六品正員官髙季昌賜一子八品正員官賀德倫賜一子九品正員官癸巳觀稼于伊水登建春門幸㑹節坊張宗奭私第臨亭臯視物色賞賜甚厚左銀臺門朝參諸司使庫使已下不得帶從人入城親王許一二人執條床手簡餘悉止門外闌入者抵律閽守不禁與所犯同先是門通内無門籍且多勲戚車騎衆者尤不敢呵察至是有以客星凌犯上言者遂令止隔海清軍節度使守侍郎兼中書令劉隠薨輟朝三日百僚詣閤門奉慰六月乙卯命北面都招討使鎮國軍節度使楊師厚出屯邢洺丁巳鎮定鈔我湯隂詔曰常山背義易水效尤誘其蕃戎動我邊鄙南侵相魏東出邢洺是用遣將徂征為人除害但初頒赦令不欲食言宥而伐之諒非獲己况聞謀始不自帥臣致此厲階並由姦佞密通人使潛結沙陀旣懼罪誅乃生離叛今雖行討代己舉師徒亦開詔諭之門不阻歸降之路矧又王鎔處直未曽削爵除名若翻然改圖不逺而復必仍舊貫當保全功如有率衆向明拔州效順亦行殊賞冀徇來情免令受弊于疲民用示惟新于汚俗宜令行營都招討使及陳暉軍前准此敕文散加招諭將安衆懼特舉明恩鎮州只罪李𢎞規一人其餘一切不問詔修天宫佛寺又湖南奏潭州僧法思桂州僧歸真竝乞賜紫衣從之七月帝不豫稍厭秋暑自辛丑幸㑹節坊張宗奭私第宰臣視事于歸仁亭子崇政使内諸司及翰林院竝止于河南令􅇬署至甲辰復歸大内八月庚申幸保寧殿閲天興控鶴兵事軍使將校各有賜癸亥老人星見戊辰幸故上陽宫至于榆林觀稼丙子閲四蕃將軍屯衛兵士于天津橋南至龍門廣化寺戊寅幸興安鞠場大教閲帝自指麾無不踊抃坐作進退聲振宫掖右神武統軍丁審衢對御以紅帛囊劍擬乘輿物帝曰宿將也恕之以劉重霸代其任九月辛巳朔帝御文明殿羣臣入閣刑法待制官各奏事己丑宴羣臣于興安殿庚子親御六師次于河陽甲辰至于衛州乙巳至于宜溝幸民劉達墅丙午至相州賞左親騎指揮使張仙右雲騎指揮使宋鐸嘗身先陷陣各賜帛十月辛亥朔駐蹕于相州宰臣洎文武從官竝詣行宫起居户部郎中孔昌序齎畱都百官冬朔起居表至自西京諸道節度使刺史諸藩府畱後各以冬朔起居表來上制以郢王友珪充控鶴指揮使諸軍都虞侯閻寳為御營使有司以立冬太廟薦享上言詔丞相杜曉赴西都攝祭行事癸丑閲武于州闉之南樓左龍驤都教練使鄧季筠魏博馬軍都指揮使何令稠右廂馬軍都指揮使陳令勲以部下馬瘦竝腰斬于軍門甲寅將以其夕幸魏縣命閣門使李郁報宰臣兼勅内外是夜車駕發軔于都署乙卯次洹水丙辰至魏縣先鋒將黄文靖伏誅己未帝御朝元門以回鶻吐蕃二大國首領入覲故也癸亥令諸軍指揮使及四蕃將軍賜食于行宫之外廡戊辰幸邑西之白龍潭以觀魚焉旣而漁人獲巨魚以獻帝命放之中流從臣以帝有仁惻之心皆相顧欣然是日名其潭曰萬歲潭丙子帝御城東教塲閲兵諸軍都指揮北面招討使太尉楊師厚總領鐡馬歩甲十萬廣亘十數里陳焉士卒之雄鋭部隊之嚴肅旌旗之雜遝戈甲之炤曜屹若山岳勢動天地帝甚悦焉即命丞相洎文武從臣列侍賜食逮晚方歸十一月辛己朔上駐蹕魏縣從官自丞相而下竝詣行宫起居畱都文武百官及諸道節度使防禦使刺史諸藩府畱後各奉表起居壬午帝以邊事稍息宣命還京師通鑑帝以夾寨柏鄉屢失利故力疾北廵思一雪其恥意鬱鬱多躁忿功臣宿將往往以小過被誅衆心益懼既而晉趙兵不出十一月壬午帝南還車駕發自行闕夕次洹水縣癸未至内黄縣甲申至黎陽縣乙酉命從官丞相而下宴于行次丁亥次衛州戊子晨次新鄉夕止獲嘉己丑次武陟庚寅次温縣延州節度使髙萬興奏當軍都指揮使髙萬金統領兵士今月五日收鹽州偽刺史髙行存泥首來降丞相及文武百官各上表稱賀辛卯次孟州命散騎常侍孫隲右諫議大夫張衍光禄卿李翼各齎香祝版告祭于孟津之望祠畱都文武官左僕射楊渉洎孟州守李周彛等皆匍匐東郊迎拜其文武官竝令先還壬辰詰旦離孟州晚至都宣宰臣各赴望祠禱雨故事皆以兩省無功職事為之帝憂民重農以足食足兵為念爰自御極毎愆陽積隂多命丞相躬其事辛丑大雨雪宰臣及文武師長各奉表賀焉十二月詔以時雪稍愆命丞相及三省官各詣望祠祈禱癸酉臘假詔諸王與河南尹左右金吾六統軍等較獵于近苑命大理卿王鄯使于安南左散騎常侍呉藹使于朗州皆以旌節官誥錫之也又命將作少監姜𢎞道為朗州旌節官使副五代㑹要舊制巡撫黜陟冊命弔贈入番等使選朝臣為之其宣慰加官送旌節即以中官為之今以三品送旌節新例也延州節度使髙萬行奏領軍于邠州界蒿子谷韋家寨殺戮寧慶兩州賊軍約二千餘人竝生擒都頭指揮使及奪馬器甲等事其入奏軍將使宣召赴内殿賜對以銀器綵物錫之宰臣及文武官各奉表賀是月魏博節度上言于涇縣北戮殺鎮州王鎔兵士七千餘人奪馬二千餘匹戈甲未知其數竝擒都將以下四十餘人兩浙進大方茶二萬觔琢畵宫衣五百副廣州貢犀象竒珍及金銀等其估數千萬安南兩使畱後曲美通鑑十二戊午以静海曲美為節度使進筒中蕉五百匹龍腦鬱金各五瓶他海貨等有差又進南蠻通好金器六物銀器十二并乾陁綾花繓越􅀈等雜織竒巧者各三十件福建進户部所支𣙜課葛三萬五千匹舊五代史巻六
