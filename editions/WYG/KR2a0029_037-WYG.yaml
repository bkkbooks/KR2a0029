body:
  text: 舊五代史巻十八宋門下侍郎參知政事監修國史薛居正等撰梁書第十八列傳八張文蔚字右華河間人也父裼唐僖宗朝累為顯官文蔚幼礪文行求知取友藹然有佳士之稱唐乾符初登進士第時丞相裴坦兼判鹽鐵解褐署巡官未幾以畿尉直館丁家艱以孝聞中和嵗僖宗在蜀大冦未滅急于軍費移鹽鐵于揚州命李都就判之奏為轉運巡官駕還長安除監察御史遷左補闕侍御史起居舎人司勲吏部員外郎拜司勲郎中知制誥歲滿授中書舎人丁母憂退居東畿哀毁過禮服闋復拜中書舎人俄召入翰林為承㫖學士屬昭宗初還京闕皇綱寖微文蔚所發詔令靡失厥中論者多之轉户部侍郎仍依前充職尋出為禮部侍郎天祐元年夏拜中書侍郎平章事兼判戸部時柳璨在相位擅權縱暴傾陷賢儁宰相裴樞等五家及三省而下三十餘人咸抱寃就死搢紳以目不敢竊語其是非餘怒所注亦不啻十許輩文蔚殫其力解之乃止士人頼焉璨敗死文蔚兼度支鹽鐵使天祐四年天子以土運將革天命有歸四月命文蔚與楊涉等總率百僚奉禪位詔至大梁太祖受命文蔚等不易其位開平二年春暴卒于位詔贈右僕射文蔚沈邃重厚有大臣之風居家孝且悌雖位至清顯與仲季相雜在太夫人膝下一不異布素弟濟美早得心恙北夢瑣言云張裼尚書有五子文蔚彛憲濟美仁龜皆有名第至宰輔丞郎内一子忘其名少年聞壁魚食神仙字身有五色吞之可得仙因欲試之遂致心疾文蔚撫視殆三十年士君子稱之子鑄周顯徳中位至秘書監薛貽矩字熈用河東聞喜人祖存父廷望咸有令名貽矩風儀秀聳其與游者皆一時英妙藉甚于文塲間唐乾符中登進士第厯度支巡官集賢校理拾遺殿中起居舎人召拜翰林學士加禮部員外郎知制誥轉司勲郎中其職如故乾寧中天子幸石門貽矩以私屬相失不及于行在罷之旋除中書舎人再踐内署歴户部兵部侍郎學士承㫖及昭宗自鳯翔還京大翦閹寺貽矩尚為韓全誨等作畫贊悉記于内侍省屋壁間坐是謫官天祐初除吏部侍郎不至太祖素重之嘗言之于朝即日拜吏部尚書俄遷御史大夫四年春唐帝命貽矩持詔赴大梁議禪代之事貽矩至盛稱太祖功德請就北面之禮太祖雖謙抑不納待之甚至受禪之嵗夏五月拜中書侍郎平章事兼判户部明年夏進拜門下侍郎監修國史判度支又遷𢎞文館大學士充鹽鐵轉運使累官自僕射至守司空在位綿五載然亦無顯赫事跡可紀扈從貝州還染時癘旬日卒于東京詔贈侍中張䇿字少逸燉煌人父同仕唐官至容管經略使䇿少聰警好學尤樂章句居洛陽敦化里嘗浚甘泉井得古鼎耳有篆字曰魏黄初元年春二月匠吉千且又製作奇巧同甚寳之䇿時在父旁徐言曰建安二十五年曹公薨改年為延康其年十月文帝受漢禪始號黄初則是黄初元年無二月明矣鼎文何謬歟同大驚亟遣啓書室取魏志展讀一不失所啓宗族奇之時年十三然而妙通因果酷奉空教未弱冠落髪為僧居雍之慈恩精廬頗有高致廣明末大盗犯闕䇿遂返初服奉父母逃難君子多之及丁家艱以孝聞服滿自屏郊藪一無干進意若是者十餘載方出為廣文博士改秘書郎王行瑜帥邠州辟為觀察支使帶水曹員外郎賜緋及行瑜反太原節度使李克用奉詔討伐行瑜敗死邠州平䇿與婢肩輿其親南出邠境屬邊寨積雪為行者所哀太祖聞而嘉之奏為鄭滑支使尋以内憂去職制闋除國子博士遷膳部員外郎不一嵗華帥韓建辟為判官及建領許州又為掌記天復中䇿奉其主書幣來聘太祖見而喜曰張夫子且至矣即奏為掌記兼賜金紫天祐初表其才拜職方郎中兼史館修撰俄召入為翰林學士轉兵部郎中知制誥依前修史未幾遷中書舎人職如故太祖受禪改工部侍郎加承㫖其年冬轉禮部侍郎明年從征至澤州拜刑部侍郎平章事仍判户部尋還中書侍郎以風恙拜章乞骸改刑部尚書致仕郎日肩輿歸洛居于福善里修篁嘉木圖書琴酒以自適焉乾化二年秋卒所著典議三巻詞制歌詩二十巻牋表三十巻存于其家杜曉字明逺京兆杜陵人祖審權仕唐位至宰相父讓能官至守大尉平章事乾寧中邠鳯二鎭舉兵犯王畿讓能被其誣陷天子不得已賜死于臨臯驛曉居喪柴立幾至滅性憂滿服幅巾七升沉跡自廢者將十餘載光化中宰相崔𦙍判鹽鐵奏為巡官兼校書郎尋除畿尉直𢎞文館皆不起及昭宗東選宰相崔逺判户部又奏為巡官兼殿中丞或語之曰嵇中散死子紹埋没不自顯山濤以物理勉之乃仕吾子忍令杜氏嵗時以鋪席祭其先人同匹庶乎曉乃就官未幾拜左拾遺尋召為翰林學士轉膳部員外郎依前充職及崔逺得罪出守本官居數月以本官知制誥俄又召為學士遷郎中充職太祖受禪拜中書舎人職如故開平三年轉工部侍郎充承㫖明年秋拜中書侍郎平章事仍判户部庶人友珪簒位遷禮部尚書平章事集賢殿大學士依前判户部及袁象先之討友珪禁兵大縱曉中重創而卒末帝即位詔贈右僕射曉博贍有詞藻時論稱之兄光乂新唐書表光乂字啓之有心疹厥疾毎作或溢喙縱詬或揮梃追撲曉事之愈恭未嘗一日少怠居兩制之重祖述前載甚得王言之體北夢瑣言云曉貌如削玉有制誥之才及典秩尚書志氣甚逺一旦非分而没咸寃惜焉豈三世為相道忌太盛歟敬翔字子振同州馮翊人唐神龍中平陽王暉之後也曾祖琬綏州刺史祖忻同州椽父袞集州刺史翔好讀書尤長刀筆應用敏捷乾符中舉進士不第及黄巢陷長安乃東出闗時太祖初鎭大梁有觀察支使王發者翔里人也翔徃依焉發以故人遇之然無由薦逹翔乆之計窘乃與人為牋刺徃徃有警句傳于軍中太祖比不知書章􅊾喜淺近語聞翔所作愛之謂發曰知公鄉人有才可與俱來及見應對稱㫖即補右職毎令從軍翔不喜武職求補文吏即署館驛巡官俾專掌􅊾奏太祖與蔡賊相拒累嵗城門之外戰聲相聞機略之間翔頗預之太祖大悦恨得翔之晩故軍謀政術一以諮之蔡賊平奏授太子中允賜緋從平兖鄆改檢校水部郎中太祖兼鎭淮南授揚府左司馬賜金紫乾寧中改光禄少卿充職天復中授檢校禮部尚書遙領蘓州刺史昭宗自岐下還長安御延喜樓召翔與李振登樓勞問翔授檢校右僕射太府卿賜號迎鑾協贊功臣太祖受禪自宣武軍掌書記前太府卿授檢校司空依前太府卿勾當宣徽院事尋改樞密院為崇政院以翔知院事開平三年夏四月太祖以邠岐侵擾遣劉知俊西討鄜延深憂不濟因宴顧翔以問西事翔剖析山川郡邑虛實軍粮多少悉以條奏如素講習左右莫不驚異太祖嘆賞久之乾化元年進位光禄大夫行兵部尚書金鑾殿大學士知崇政院事平陽郡侯前朝因金巒坡以為門名與翰林院相接故得為學士者稱金巒以美之今殿名金鑾從嘉名也置大學士始以翔為之五代會要云以金鑾為名非典也大學士與三館大學士同翔自釋褐東下遭遇霸王懷抱深沈有經濟之略起中和嵗至鼎革大運其間三十餘年扈從征伐出入惟幄庶務叢恒逹旦不寢唯在馬上䘯得晏息每有所禆贊亦未嘗顯諫上俛仰顧歩間微示持疑爾而太祖意已察必改行之故禆佐之迹人莫得知及太祖大漸召至御床前受顧托之命且深以并冦爲恨翔鳴咽不忍受命而退庶人友珪之篡位也以天下之望命翔為宰相友珪以翔先朝舊臣有所畏忌翔亦多稱病不綜政事末帝卽位趙張之族皆處權要翔愈不得志及劉鄩失河朔安彥之喪楊劉翔奏曰國家連年遣將出征封疆日削不獨兵驕將怯亦制置未得其術陛下處深宫之中與之計事者皆左右近習豈能量敵之勝負哉先皇時河朔半在親御虎臣驍將猶不得志於敵人今冦馬已至鄆州陛下不留聖念臣所未喻一也臣聞李亞子自墨縗統衆於今十年毎攻城臨陣無不親當矢石昨聞攻楊劉率先負薪渡水一鼓登城陛下儒雅守文未嘗如此俾賀瓌軰與之較力而望攘逐冦戎臣所未喻二也陛下所宜詢於黎老别運沈謀不然則憂未艾也臣雖駑怯受國恩深陛下必若乏材乞於邊陲効試末帝雖知其懇惻竟以趙張軰言翔怨望不之聽及王彥章敗於中都晉人長驅而南末帝急召翔謂之曰朕居常忽卿所奏果至今日事急矣勿以為懟且使朕安歸翔泣奏曰臣受國恩僅將三紀從㣲至著皆先朝所遇雖名宰相實朱氏老奴耳事陛下如郎君以臣愚誠敢有所隠陛下初任段凝為將臣已極言小人朋附致有今日晉軍卽至段凝限水欲請陛下出居避狄陛下必不聽從欲請陛下出奇應敵陛下必不果決縱良平復生難以轉禍為福請先死不忍見宗廟隕墜言訖君臣相向慟哭及晉主陷都城有詔赦梁氏臣寮李振謂翔曰有制洗滌將朝新君翔曰新君若問其將何辭以對是夜翔在髙頭里第宿於車坊欲曙左右報曰崇政李太保已入朝翔返室嘆曰李振謬為丈夫耳朱氏與晉仇讎我等始同謀畫致君無狀今少主伏劍於國門縱新朝赦罪何面目入建國門也乃自經而卒數日并其族被誅初貞明中史臣李琪張袞郄殷象馮錫嘉奉詔修撰太祖實錄三十巻叙述非工事多漏略復詔翔補緝其闕翔乃别纂成三十巻目之曰大梁編遺錄與實錄偕行翔妻劉氏父為藍田令廣明之亂劉為巢將尚讓所得巢敗讓攜劉降於時溥及讓誅時溥納劉於妓室太祖平徐得劉氏嬖之屬翔喪妻因以劉氏賜之及翔漸貴劉猶出入太祖卧内翔情禮稍薄劉於曲室讓翔曰卿鄙余曽失身於賊耶以成敗言之尚讓巢之宰輔時􅄎國之忠臣論卿門地辱我何甚請從此辭翔謝而止之劉恃太祖之勢案下有缺文太祖四鎮時劉已得國夫人之號車服驕侈婢媵皆珥珠翠其下别置爪牙典謁書幣聘使交結藩鎭近代婦人之盛無出其右權貴皆相附麗寵信言事不下於翔當時貴逹之家從而效之敗俗之甚也五代史補敬翔應三傳數舉不第發憤投太祖願備行陣太祖問曰足下通春秋久矣今吾主盟其為戰欲效春秋時可乎翔曰不可夫禮樂猶不相沿襲況兵者詭道宜其變化無窮若復如春秋時則所謂務虚名而喪其實效大王之事去矣太祖大悦以為知兵遽延之幕府委以軍事竟至作相李振字興緒唐潞州節度使抱眞之曾孫也祖父皆至郡守振仕唐自金吾將軍改台州刺史會盗㨿浙東不克之任因西歸過汴以䇿略於太祖太祖奇之辟為從事太祖兼領鄆州署天平軍節度副使湖南馬殷為朗州雷滿所逼振奉命馳往和解殷滿皆稟命光啓三年十一月太祖遣振入奏於長安舍於州邸邸吏程巖白振曰劉中尉命其姪希貞來計大事欲上謁願許之旣至巖乃先啓曰主上嚴急内官憂恐左中尉欲行廢黜之事巖等恊力以定中外敢以事告振顧希貞曰百嵗奴事三嵗主亂國不義廢君不祥非敢聞也況梁王以百萬之師匡輔天子禮樂尊戴猶恐不及幸熟計之希貞大沮而去及振復命劉季述等果作亂程巖率諸道邸吏牽帝下殿以立㓜主奉昭宗為太上皇振至陜陜已賀矣䕶軍韓彝範言其事振曰懿皇初昇遐韓中尉殺長立㓜以利其權遂亂天下今將軍復欲爾耶彝範郎文約孫也由是不敢言振東歸太祖方在邢洺遽還於汴大計未決季述遣飬子希度以唐之社稷欲輸於太祖又遣供奉官李奉本副介支彥勲詐賫上皇誥諭至皆季述黨也太祖未及迎命振又言曰夫竪刁伊戾之亂所以資霸者之事也今閹竪幽辱天子不能討無以令諸侯時監軍使劉重楚季述兄也舊相張濬寓於河南緱氏亦來謂太祖曰同中官則事易濟且得所欲唯振堅執不改獨曰行正道則大勲可立太祖英悟忽厲色曰張公勸我同勅使欲傾附自求宰相耶乃定䇿縶偽使李奉本支彥勲與希度等郎日請振將命於京師與宰相謀返正未幾劉季述伏誅昭宗復帝位太祖聞之喜召振執其手謂之曰卿所謀是吾本志穹蒼其知之矣自是益重之天祐二年春正月太祖召振謂曰王師範來降易嵗尚處故藩今將奏請徙授方面其為我馳騎以兹意逹之振至青州師範即日出公府以節度觀察二印及文簿管鑰授於振師範雖已受代而疑撓特甚屢揮泣求貸其族振因以切理諭之曰公不念張繡事耶漢末繡屢與曹公立敵豈德之耶及袁紹遣使招繡賈詡曰袁家父子自不相容何能主天下英士曹公挾天子令諸侯其志大不以私讐為意不宜疑之今梁王亦豈以私怨害忠賢耶師範洒然大悟翼日以其族遷太祖乃表振為青州畱後未幾徴還唐自昭宗遷都之後王室微弱朝廷班行備員而已振皆頥指氣使旁若無人朋附者非次奬升私惡者沈棄振每自汴入洛朝中必有貶竄故唐朝人士目為䲭梟天祐中唐宰相枊璨希太祖㫖譖殺大臣裴樞陸扆等七人於滑州白馬驛時振自以咸通乾符中甞應進士舉累上不第尤憤憤乃謂太祖曰此軰自謂清流宜投於黄河永為濁流太祖笑而從之泊太祖受禪自宣義軍節度副使檢校司徒授殿中監累遷户部尚書庶人友珪簒立代敬翔為崇政院使末帝即位趙張二族用事遂為所間謀猷獻替多不見從振每稱疾避事龍徳末閑居私第將朞矣晉主入汴振謁見首罪郭崇韜指振謂人曰人言李振一代奇才吾今見之乃常人耳㑹段凝等疏梁氏權要之臣振與敬翔等同日族誅史臣曰文蔚貽矩皆唐朝之舊臣遇梁室之强禪奉君命以來使狎神器以授之逄時若斯亦為臣者之不幸也抑不為其相不亦善乎杜曉著文雅之稱張䇿有冲澹之量咸登台席無忝士林敬翔李振始輔霸圖終成帝業及國之亡也一則殞命以明節一則視息以偷生以此較之翔為優矣振始有濁流之言終取赤族之禍報應之事固以昭然舊五代史巻十八
