body:
  text: 舊五代史巻二十九攷證唐莊宗紀三未㡬鄩憂恚發病卒案梁書劉鄩𫝊作遇酖而卒鎮州大將張文禮殺其帥王鎔案歐陽史作正月趙將張文禮弑其君鎔五代春秋作三月趙人張文禮殺其君鎔與是書繫二月前後互異遂引軍涿州陷之案契丹陷涿州在天祐十八年李嗣弼傳作天祐十九年紀𫝊互異行䑓右丞相盧澄盧澄歐陽史作盧程攷北夢𤨏言亦作澄今仍其舊帝令中書焦彦賓馳至楊劉固守其城案通鑑作帝令宦者焦延賓急趨楊劉與鎮使李周固守其城六月已亥帝觀御軍至楊劉案已亥通鑑作乙亥帝艤舟將渡梁軍遂解圍案歐陽史作六月及王彦章戰于新壘敗之据是書則王彦章因救至而解圍未嘗敗績也遣騎將李紹貽李紹貽通鑑作李紹榮至遞公鎮遞公鎮通鑑從莊宗實録作遞坊鎮攷是書明宗紀亦作遞坊惟通鑑攷異所引薛史作遞公今姑仍其舊按巴堅舊作阿保機今改舊五代史巻二十九攷證
