body:
  text: 舊五代史巻八攷證梁末帝紀上末帝諱瑱案瑱原本訛􅖰今從歐陽史改正太祖第四子也案歐陽史作第三子五代㑹要與是書同蓋并假子傅王友文而數之也以帝為左天興軍使案原本脱使字今據歐陽史増入帝乃遣人告趙巖袁象先傅暉朱珪等案原本脱暉字今據通鑑増入近雪家讎案原本脱家字今據冊府元龜増入濮陽郡開國侯袁象先濮陽原本作傅陽今據象先本𫝊改正師厚自弓髙渡逼滄州張萬進懼滄州原本作凉州攷歐陽史劉守光𫝊萬進乃滄州守將今改正滄州順化軍節度使張萬進為青州節度使案順化原本作順俟今據通鑑注滄州為順化軍改正又青州通鑑作平盧攷後文是時賀德倫為平盧節度使當從此書作青州為是冦邢洺邢原本作鄜今據五代春秋七月來侵邢州改正貞明元年春牛存節劉鄩拔徐州案徐州之拔是書本紀及蔣殷傅俱不書月五代春秋及歐陽史俱作正月通鑑作二月通鑑攷異又作乾化四年十一月未詳孰是判度支趙光逢逄原本作逯今據唐書列傳改正既須日有戰争案原本脱戰争二字今據册府元龜増入王彦章為汝州防禦使汝州原本作許州今據通鑑改正康王友孜謀反案友孜通鑑作友敬與是書異十一月乙丑改乾化五年為貞明元年案通鑑考異引吳越備史作正月壬辰朔改元大赦歐陽史五代春秋俱從是書舊五代史巻八攷證
