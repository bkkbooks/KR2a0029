body:
  text: 舊五代史巻六十八攷證唐列𫝊二十劉岳𫝊奉詔撰新書儀一部文約而理當案歐陽史謂其事出鄙俚兩史褒貶微有異同張文寶𫝊信風至淮南界案通鑑作風飄至天長陳乂𫝊除膳部員外郎知制誥累遷中書舍人案通鑑作閏月以膳部郎中知制誥陳乂為給事中充樞密直學士與此𫝊互有詳畧劉賛𫝊案通鑑作劉瓉舊五代史巻六十八攷證
