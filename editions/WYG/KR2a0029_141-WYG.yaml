body:
  text: 舊五代史巻七十宋門下侍郎參知政事監修國史薛居正等撰唐書第四十六列傳二十二元行欽本幽州劉守光之愛將守光之奪父位也令行欽攻大恩山又令殺諸兄弟天祐九年周徳威攻圍幽州守光困蹙令行欽於山北募兵以應契丹時明宗為將攻行欽于山北與之接戰矢及明宗馬鞍旣而以勢迫來降明宗憐其有勇奏隸為假子後因從征討恩禮特隆常臨敵擒生必有所獲名聞軍中莊宗東定趙魏選驍健置之麾下因索行欽明宗不得巳而遣之時有散指揮都頭名為散員命行欽為都部署賜姓名紹榮莊宗好戰勇于大敵或臨陣有急兵行欽必横身解鬬翼圍之莊宗之營于徳勝也與汴軍戰于潘張王師不利諸軍奔亂莊宗得三四騎而旋中野為汴軍數百騎攢矟攻之事將不測行欽識其幟急馳一騎奮劎斷二矛斬一級汴軍乃解圍翼莊宗還宫莊宗因流涕言曰富貴與卿共之自是寵冠諸將官至檢校太傅忻州刺史及莊宗平梁授武寧軍節度使嘗因内宴羣臣使相預會行欽官為保傅當地褥下坐酒酣樂作莊宗叙生平戰陣之事因左右顧視曰紹榮安在所司奏云有勅使相預會紹榮散官殿上無位莊宗徹會不懌翌日以行欽為同平章事由是不宴百官于内殿但宴武臣而巳三年行欽喪婦莊宗有所愛宫人生皇子者劉皇后心忌之會行欽入侍莊宗勞之曰紹榮喪婦復娶耶吾給爾婚財皇后指所忌宫人謂莊宗曰皇帝憐紹榮可使為婦莊宗難違所請微許之皇后即命紹榮謝之未退肩輿巳岀莊宗心不懌佯不豫者累日業巳遣去無如之何及貝州軍亂趙在禮入魏州莊宗方擇將皇后曰小事不勞大將促紹勞指揮可也乃以行欽為鄴都行營招撫使領騎二千進討洎至鄴城攻之不能下退保于澶州未幾諸道之師稍集復進軍于鄴城之南及明宗為帥領軍至鄴行欽來謁于軍中拜起之際誤呼萬嵗者再明宗驚駭遏之方止旣而明宗營于城西行欽營于城南三月八日夜明宗為亂軍所迫惟行欽之軍不動按甲以自固明宗密令張䖍釗至行欽營戒之曰且堅壁勿動計會同殺亂軍莫錯疑誤行欽不聼將歩騎萬人棄甲而退自知失䇿且保衛州因誣奏明宗曰鎭帥巳入賊軍終不為國使明宗旣刼岀鄴城令人走馬上章申理其事言臣且于近郡聽進止莊宗覽奏釋然曰吾知紹榮妄矣因令白從訓與明宗子繼璟至軍前欲令見明宗行欽縶繼璟于路明宗凡奏軍機拘留不逹故旬日之間音驛斷絶及莊宗岀成臯知明宗在黎陽復令繼璟渡河召明宗行欽即殺之仍勸班師四月一日莊宗旣崩行欽引皇后存渥得七百騎岀師子門將之河中就存霸沿路部下解散從者數騎而巳四日至平陸縣界為百姓所擒縣令裴進折其足檻車以獻明宗即位詔削奪行欽在身官爵斬于洛陽夏魯竒字邦傑青州人也初事宣武軍為軍校與主將不協遂歸于莊宗以為䕶衛指揮使從周德威攻幽州燕將有單廷珪元行欽時稱驍勇魯竒與之鬬两不能解將士皆釋兵縱觀幽州平魯竒功居多梁將劉鄩在洹水莊宗深入致師鄩設伏于魏縣西南葭蘆中莊宗不滿千騎汴人伏兵萬餘大譟而起圍莊宗數重魯竒與王門關烏德兒等奮命決戰自午至申俄而李存審兵至方解魯竒持槍擕劎獨衛莊宗手殺百餘人烏德兒等被擒魯竒傷夷徧體自是莊宗尤憐之歴磁州刺史中都之戰汴人大敗魯竒見王彦章識之單馬追及搶擬其頸彦章顧曰爾非余故人乎即擒之以獻莊宗壯之賞絹千匹九國志趙庭隱𫝊王彦章守中都庭隱在其軍中及彦章敗庭隱為莊宗所獲將以就戮大將夏魯竒奏曰此矬也其材可用遂釋之梁平授鄭州防禦使四年授河陽節度使天成初移鎭許州加同平章事魯竒性忠義尤通吏道撫民有術及移鎭許田孟州之民萬衆遮道斷􅌱卧轍五日不發父老詣闕請留明宗令中使諭之方得離州明宗討荆南魯竒為副招討使頃之移鎭遂州九國志李仁罕𫝊夏魯竒稟朝廷之命繕治甲兵將圖蜀孟知祥與董璋謀先取魯竒令仁罕攻遂州董璋之叛與孟知祥攻遂州援路斷絶兵盡食窮九國志李肇傳蜀帥圍夏魯竒于遂州唐師來援劎門不守肇領兵赴普安以拒之唐師不得進魯竒自刎而卒時年四十九帝聞其死也慟哭之厚給其家贈太師齊國公姚洪本梁之小校也在梁時經事董璋長興初率兵千人戍閬州璋叛領衆攻閬州璋密令人誘洪洪以大義拒之及璋攻城洪悉力拒守者三日禦備旣竭城䧟被擒璋謂洪曰爾頃為健兒由吾奬㧞至此吾書誘諭投之于側何相負耶洪大罵曰老賊爾為天子鎭帥何苦反耶爾旣孤恩背主吾與爾何恩而云相負爾為李七郎奴掃馬糞得一臠殘炙感恩無盡今明天子付與茅土貴為諸侯而驅徒結黨圖為反噬爾本奴才則無恥吾忠義之士不忍為也吾可為天子死不能與人奴茍生璋怒令軍士十人持刀刲割其膚燃鑊于前自取㗖食洪至死大罵不巳明宗聞之泣下置洪二子于近衛給賜甚厚李嚴幽州人本名讓坤初仕燕為刺史渉獵書傳便弓馬有口辯多遊藝以功名自許同光中為客省使奉使于蜀及與王衍相見陳使者之禮因于笏記中具述莊宗興復之功其警句云纔過汶水縳王彦章于馬前旋及夷門斬朱友貞于樓上嚴復聲韻清亮蜀人聞之愕然時蜀僞樞密使宋光嗣召嚴曲宴因以近事訊于嚴嚴對曰吾皇前年四月卽位于鄴宫當月下鄆州十月四日親統萬騎破賊中都乘勝鼓前遂誅汴孽僞梁尚有兵三十萬謀臣猛將解甲倒戈西盡甘涼東漸海外南踰閩浙北極幽陵牧伯侯王稱藩不暇家財入貢府實上供呉國本朝舊臣岐下先皇元老遣子入侍述職稱藩淮海之君卑辭厚貢湖湘荆楚杭越甌閩異貨竒珍府無虛月吾皇以德懷來以威欵附順則涵之以恩澤逆則問之以干戈四海車書大同非晩光嗣曰余所未知惟岐下宋公我之姻好洞見其心反覆多端專謀䟦扈大不足信也似聞契丹部族近日稍強大國可無慮乎嚴曰子言契丹之強盛孰若僞梁曰比梁差劣也嚴曰吾國視契丹如蚤蝨耳以其無害不足爬搔吾良將勁兵布天下彼不勞一郡之兵一校之衆則懸首槀街盡為奴擄但以天生四夷當置度外不在九州之本未欲窮兵黷武也光嗣聞辯對畏而竒之時王衍失政嚴知其可取使還具奏故平蜀之謀始于嚴郭崇韜起軍之日以嚴為三川招撫使嚴與先鋒使康延孝將兵五千先驅閣道或馳以詞説或威以兵鋒大軍未及所在降下延孝在漢州王衍與書曰可請李司空先來余卽舉城納欵衆咸以討蜀之謀始于嚴衍以甘言將誘而殺之欲不令徃嚴聞之喜卽馳騎入益州衍見嚴于母前以母妻為託即日引蜀使歐陽彬迎謁魏王繼岌蜀平班師㑹明宗即位遷泗州防禦使兼客省使長興初安重誨謀欲控制兩川嚴乃求為西川兵馬都監庻効方略孟知祥覺之旣至執而害之九國志王彦銖傳李嚴之為監軍也密懐異謀知祥數其過命彦銖擒斬之嚴之左右無敢動者贈太保嚴之母賢明婦人初嚴將赴蜀母曰汝前啟破蜀之謀今又入蜀將死報蜀人矣與汝永訣旣而果如其言李仁矩本明宗在藩鎭時客將也明宗卽位録其趨走之勞擢居内職復為安重誨所庇故數年之間遷為客省使左衛大將軍天成中因奉使東川董璋張筵以召之仁矩貪于館舍與娼妓酣飲日旣中而不至大為璋所詬辱自是深銜之長興初璋旣䟦扈于東川重誨奏以仁矩為閬州節度使俾伺璋之反狀時物議以為不及仁矩至鎭偵璋所為曲形奏報地里遐僻朝廷莫知事實激成璋之逆節由仁矩也長興元年冬十月璋自率兇黨以攻其城仁矩召軍校謀守戰利害皆曰璋乆圖反計以賂誘士心凶氣方盛未可與戰宜堅壁以守之儻旬浹之間大軍東至卽賊必退仁矩曰蜀兵懦安能當我精甲卽驅之岀戰兵未交為賊所敗旣而城䧟仁矩被擒舉族為璋所害康思立晉陽人也少善騎射事武皇為爪牙署河東親騎軍使莊宗嗣位從解圍于上黨敗梁人于栢鄉及平薊兵後戰于河上皆有功累承制加檢校户部尚書右突騎指揮使莊宗即位繼改軍帥賜忠勇拱衛功臣加檢校尚書右僕射天成元年授應州刺史尋移嵐州充北靣諸蕃部族都監三年遷宿州團練使四年領昭武軍節度利巴集等州觀察處置等使改賜耀忠保節功臣長興初朝廷舉兵討東川董璋詔兼西靣行營軍馬都指揮使二年移鎭陜州通鑑潞王至靈寶思立謀固守陜城以俟康義誠先是捧聖五百騎戍陜為潞王前鋒至城下呼城上人曰禁軍十萬已奉新帝爾數人人奚為徒累一城人塗地耳于是捧聖卒爭出迎思立不能禁不得已办出迎清泰初改授邢臺累官至檢校太傅封㑹稽郡開國侯二年入為右神武統軍三年充北靣行營馬軍都指揮使是歲閏十一月卒于軍年六十三思立本出隂山諸部性純厚善撫將士明宗素重之故即位之始以應州所生之地授焉其後歴三郡三鎭皆得百姓之譽末帝以其年高徴居環衛及出幸懷州以北師不利乃命思立統駕下騎軍赴團栢谷以益軍勢俄而楊光遠以大軍降于太原思立因憤激疾作而卒焉晉高祖卽位追其宿舊為輟朝一日贈太子少師張敬達字志通代州人小字生鐵父審素有勇事武皇為列校歴㕔直軍使同光初卒于軍敬達少以騎射著名莊宗知之召令繼父職平河南有功繼加檢校工部尚書明宗即位歴捧㫖指揮使檢校尚書左僕射長興中改河東馬歩軍都指揮使超授檢校司徒領欽州刺史三年加檢校太保應州節度使四年遷雲州時以契丹率族帳自黒榆林至云借漢界水草敬達每聚兵塞下以遏其衝契丹竟不敢南牧邊人頼之清泰中自彭門移鎭平陽加檢校太傅從石敬瑭為北靣兵馬副總管仍屯兵鴈門未幾晉高祖建義末帝詔以敬達為北靣行營都招討使仍使悉引部下兵圍太原以定州節度使楊光遠副焉尋統兵三萬營于晉安鄉末帝自六月繼有詔促令攻取敬達設長城連栅雲梯飛礟使工者運其巧思窮土木之力時督事者每有所構則暴風大雨平地水深數尺而城栅崩墮竟不能合其圍九月契丹至敬達大敗尋為所圍晉高祖及蕃衆自晉安寨南門外長百餘里闊五十里布以氊帳用毛索掛鈴而部伍多畜犬以備警急營中嘗有夜遁者岀則犬吠鈴動跬歩不能行焉自是敬達與麾下部曲五萬人馬萬匹無由四奔但見穹廬如崗阜相屬諸軍相顧失色始則削木篩糞以飼其馬日望朝廷救軍及漸羸死則與將士分食之馬盡食殫副將楊光遠次將安審琦知不濟勸敬達宜早降以求自安敬達曰吾受恩于明宗位歴方鎭主上授我大柄而失律如此已有愧于心也今救軍在近旦暮雪恥有期諸君何相迫耶待勢窮則請殺吾㩗首以降亦未為晩光遠審琦知敬達意未決恐坐成魚肉遂斬敬逹以降契丹國志楊光逺謀害張敬逹諸將高行周隂為之備敬逹踈于防禦推遠行周等清晨光遠上謁見敬達左右無人遂殺之末帝聞其殁也愴慟乆之時戎王告其部曲及漢之降者曰為臣當如此人令部人收葬之晉高祖即位後所有田宅咸賜其妻子焉時議者以敬達嘗事數帝亟立軍功及領藩郡不聞其濫繼屯守塞垣復能撫下而臨難固執不求茍免乃近代之忠臣也晉有天下不能追懋官封賞其事蹟非激忠之道也舊五代史巻七十
