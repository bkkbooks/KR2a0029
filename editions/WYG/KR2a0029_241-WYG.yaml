body:
  text: 舊五代史巻一百二十一宋門下侍郎參知政事監修國史薛居正等撰周書第十二后妃列傳太祖聖穆皇后柴氏邢州龍岡人世家豪右太祖㣲時在洛陽聞后賢淑遂聘之東都事畧張永德周太祖柴后本唐莊宋之嬪御也莊宗没明宗遣歸其家行至河上父母迓之會大風雨止於逆旅數日有一丈夫走過其門衣弊不自庇后見之驚曰此何人耶逆旅主人曰此馬歩軍使郭雀兒者也后異其人欲嫁之請於父母恚曰汝帝左右人歸當嫁節度使奈何欲嫁此人后曰此貴人也不可失也囊中裝分半與父母我取其半父母知不可奪遂成婚於逆旅中所謂郭雀兒即周太祖也太祖壯年喜飲博好任俠不拘細行后規其大過毎有内助之力焉世宗皇帝卽后之姪也幼而謹愿后甚憐之故太祖養之為巳子太祖嘗寢后見五色小蛇入觀鼻間心異之知其必貴敬奉愈厚未及貴而厭代太祖即位乃下制曰義之深無先於作配禮之重莫大於追崇朕當宁載思撫存懐舊河洲令德猶傳荇菜之詩媯汭大名不及珩璜之貴俾盛副筓之禮以伸求劍之情故夫人柴氏代籍貽芳湘靈集慶體柔儀而陳闕翟芬若椒藺持貞操以選中當譽光圖史懿範尚留於閨閫昌言有助於箴規深惟望氣之艱彌歎藏舟之速將開寳祚俄謝璧台宜正號於軒宫俾潛耀於坤象可追命為皇后仍令所司定諡備禮册命既而有司上諡曰聖穆顯德初太祖神主入廟以后祔於其室淑妃楊氏鎮州真定人父𢎞裕真定少伊東都事畧楊廷璋傳父𢎞裕少漁貂裘陂有以二石㕍授之者其翼一揜左一揜右曰吾北岳使也言訖不知所之是年生女為周太祖淑妃明年生廷璋當河朔三鎮全盛時所屬封疆制之於守帥故韶顔美媛皆被選於王宫妃幼以良家子中選事趙王王鎔張文禮之亂妃流離於外唐明宗在藩録其遺逸安重誨保庇妃家致其仕進父母即以妃嫁於鄉人石光輔不敷年􅊔居太祖佐漢之初屬聖穆皇后棄世聞妃之賢遂以禮聘之宋史楊廷璋傳有姊寡居京師周祖㣲時欲聘之姊不從令媒氏傳言恐逼姊以告廷璋廷璋往見周祖歸姊曰此人恣貎異常不可拒姊乃從嫁之妃睦族撫孤宜家内助甚有力焉晉天福末卒於太原因留𦵏於晉郊廣順元年九月追册為淑妃太祖凡一后三妃及嵩陵就掩皆議陪祔時以妃喪在賊境未及遷定世宗乃詔有司於嵩陵之側預營一冢以虚之俟賊平即議襄事顯德元年夏世宋征河東果成素志為妃兄廷璋蚤事太祖即位累厯内職出為晉州節度使皇朝撫運移鎮邢州又改鄜州受代歸闕卒於私第貴妃張氏恒州真定人也祖記成德軍節度判官檢校兵部尚書父同芝本州諮呈官檢校工部尚書事趙王王鎔厯職中要天佑末趙將張文禮殺王鎔以鎮州歸梁莊宗命將符存審討平之時妃年尚幼有幽州伊將武從諌者駐斾於家見妃韶令乃為其子聘之武氏家在太原太祖從漢鎮祖并門屬楊夫人以疾終無何武氏子卒太祖素聞妃之賢遂内為繼室太祖貴累封至呉國夫人漢隠帝末蕭墻變起屠害大臣太祖在鄴都被讒妃與諸皇屬同日遇害於東京舊第太祖踐阼追册為貴妃𤼵哀故世宗有起復之命世宗嗣位以太祖舊宅即妃遇禍之地因施為僧院以皇建為名焉德妃董氏常山靈夀人也祖文廣唐深州録事參軍父光嗣趙州昭慶尉妃孩提頴悟始能言聼按絲管而能辨其聲年七嵗遇鎮州亂親黨羇離與妃相失潞州牙將得之匿於家中其妻以息女不育得妃憐之過於所生母教師箴功容克備妃家悲念其兄瑀諸處求訪垂六七年後潞將入官於朝妃之鄉親頗有知者瑀見潞將欣歸之時年十三妃歸踰年嫁為里人劉進超之妻進超為内職及契丹破晉之嵗䧟蕃殁焉妃嫠居洛陽太祖楊淑妃與妃鄉親平居恒言妃賢德太祖從漢祖幸洛因憶淑妃之言尋以禮納之鼎命初建張貴妃遇禍中宫虚位乃册為德妃太祖自聖穆皇后蚤世以來屢失邦媛中幃内助唯妃存焉加以結珮脫簪率由令範廣順三年夏遇疾醫藥之際屬太祖兖海之徵車駕將行妃奏曰正當暑毒勞陛下省巡明𤼵宵徴須人供侍司簿已下典事者各已處分從行太祖曰妃疾未平數令診視此行在近無繁内人及太祖駐蹕魯中妃志欲令内人進𤼵中使往來言之太祖手勑鄭仁誨曰切慮德妃以朕至兖州行營津置内人承侍縁諸軍在野不可自安令鄭仁誨專心體候如德妃津置内人東來便須上聞約住或取索鞍馬不得供應如意堅確即下手勑示之既而平定兖州車駕還京妃疾無減俄卒於大内時年三十九輟朝三日妃長兄瑀以左贊善大夫致仕仲兄𤣥之季兄自明皆累厯郡守世宗貞惠皇后劉氏將家女也㓜歸於世宗漢乾祐中世宗在西班后始封彭城縣君世宗隨太祖在鄴后留居邸第漢末李業等作亂后與貴妃張氏及諸皇族同日遇禍國初追封彭城郡夫人顯德四年夏四月追册為皇后諡曰貞惠陵曰惠陵宣懿皇后符氏祖存審事後唐武皇莊宗位極將相追封秦王父彦卿天雄軍節度使封魏王后初適李守貞之子崇訓漢乾祐中守貞叛於河中太祖以兵攻之及城䧟崇訓自刃其弟妹次將及后后時匿於屏處以帷箔自蔽崇訓倉皇求后不及遂自刎后因獲免太祖入河中令人訪而得之即遣女使送於其父自是后常感太祖大惠拜太祖為養父世宗鎮澶淵日太祖為世宗聘之后性和惠善候世宗之㫖世宗或暴怒於下后必從容救解世宗甚重之及即位册為皇后世宗將南征后常諫止之言甚切直世宗亦為之動容泊車駕駐於淮甸久冐炎暑后因憂恚成疾顯德二年七月二十一日崩於滋德殿時年二十有六世宗甚悼之既而有司上諡曰宣懿𦵏於新鄭陵曰懿陵案世宗有兩符后其後符后即宣懿之女弟也入宋稱符大后是書不為立傳未免闕畧工五代史補世宗皇后符氏即魏王彦卿之女時有相視之大驚宻告魏王曰此女貴不可言李守貞素有異志因與子崇訓娶之禮畢守貞甚有喜色其後據河中叛髙祖為樞宻使受命出征后知髙祖與其父有舊城破之際據堂門而坐叱諸軍曰我符魏王女也魏王與樞宻大尉兄弟之不若汝等慎勿無禮於是諸軍聳然引退頃之髙祖至喜曰此女於此紛挐之際保全可謂非常人也乃歸之魏王至世宗即位納為皇后既免河中之難其母欲使出家資其福夀后不悅曰死生有命誰能髠首跣足以求茍活也母度不可逼遂止世宗素以后賢又聞命不以出家為念愈賢之所以為天下母也史臣曰周室后妃凡六人而追册者四故中闈内則罕得而聞唯董妃符后之懿範亦無媿于彤管矣案薛史無外戚傳考五代會要云周太祖第三女樂安公主為漢室所害廣順元年二月進封至顯徳四年四月又追封莒國長公主第四女壽安公主降張永徳廣順元年四月追封至顯徳元年又追封晉國長公主第五女永寕公主廣順元年九月追封至顯德四年四月又追封梁國長公主舊五代史巻一百二十一
