body:
  text: 舊五代史巻十七宋門下侍郎參知政事監修國史薛居正等撰梁書第十七列𫝊七成汭淮西人少年任俠乘醉殺人為讎家所捕因落髪為僧冒姓郭氏新唐書云入蔡賊中為賊帥假子更姓名為郭禹亡匿久之及貴方復本姓唐僖宗朝為蔡州軍校領本郡兵戍荆南帥以其凶暴欲害之遂棄本軍奔于秭歸一夕巨蛇繞其身幾至于殞乃祝曰茍有所負死生惟命逡巡蛇亦解去後據歸州招輯流亡練士伍得兵千餘人㳂流以襲荆南遂據其地朝廷即以旄鉞授之是時荆州經巨盜之後居民才一十七家汭撫輯凋殘勵精為理通商訓農勤于恵養比及末年僅及萬户案以下有闕文汭性豪暴事皆意斷又好自矜伐騁辯凌人深為識者所鄙初澧朗二州本屬荆南乾寧中為土豪雷滿所據汭奏請割隸唐宰相徐彦若執而不行汭由是銜之及彦若出鎮南海路過江陵汭雖加延接而猶怏怏嘗因對酒語及其事彦若曰今公位尊方面自比桓文雷滿者偏州一草賊爾今公何不加兵而反怨朝廷乎汭赧然而屈案以下有闕文累官至檢校太尉封上谷郡王楊行密以兵圍鄂州汭出師以援鄂淮寇乘之以火焚其艦汭投江而死天祐三年夏太祖以汭没于王事上表于唐帝請為汭立廟于荆門優詔可之五代史補鄭準不知何許人性諒直能為文長于箋奏成汭鎮荆南辟為推官汭甞讎殺人懼為吏所捕改姓郭氏及為荆南節度使命準為表乞歸本姓準援筆而成其畧云臣門非寇盖家本軍戎親朋之内盱睢為人報怨昆弟之間㸃染無處求生背故國以狐疑望隣封而鼠竄名非霸越乘舟難效于陶朱志切投秦出境遂稱于張禄又云成為本姓郭乃冐稱本避犯禁之辜敢歸司寇别族受封之典誠愧諸侯伏乞聖慈許歸本姓云云其表甚為朝廷所重後因汭生辰淮南楊行密遣使致禮幣之外仍貺初學記一部準忿然以為不可謂汭曰夫初學記盖訓童之書爾今敵國交聘以此書為貺得非相輕之甚耶宜書責讓汭不納準自歎曰若然見輕敵國足彰幕府之無人也參佐無状安可久遽請解職汭怒其去潛使人于途中殺之杜洪者江夏伶人鍾𫝊者豫章小校唐光啟中秦宗權凶焰飈起屢擾江淮郡將不能城守洪傳各為部校因戰立威逐其亷使自稱留後朝廷因而命之新唐書光啟二年洪乘虚入鄂自為節度留後僖宗即拜本軍節度使中和三年傳逐江西觀察使髙茂卿遂有洪州僖宗逐傳江西團練使俄拜鎮南節度使及為楊行密所攻洪傳首尾相應皆遣求援于太祖太祖遣朱友恭赴之大破淮寇于武昌二鎮稍寧及行密乘勝急攻洪鄂洪復乞師于太祖太祖命荆南成汭率荆襄舟師以赴之未至夏口汭敗溺死淮人遂陷鄂州洪為其所擒被害于廣陵市時唐天復二年也九國志劉存傳存急焚鄂州城樓梁援兵将突圍而出諸将欲急擊之存曰擊之賊必復入復入則城愈固矣不若聽其遁去諸将皆曰善是日城陷擒杜洪父子斬於廣陵市天祐三年夏太祖表請為洪立廟於其鎮優詔可之太祖即位詔贈太𫝊先是鍾傳卒于江西其子繼之九國志秦斐傳天祐三年洪州鍾傳卒州人立其子匡時江州刺史延規𫝊之養子忿不得立以其郡納欵因授斐西南面行營招討使攻匡時城陷擒匡時以獻尋為楊行密所敗其地亦入于淮夷五代史補鍾傳雖起于商販尤好學重士時洒西士流有名第者多因𫝊薦四逺騰然謂之曰英明諸葛浩素有詞學甞為泗州管驛巡官仰𫝊之風因擇其所行事赫赫可稱者十條列于啟事以投之十啟凡五千字皆文理典贍𫝊覽之驚嘆謂賔佐曰此啟事每一字可以千錢酬之遂以五千貫贈仍辟在幕下其激勤如此上藍和尚失其名居于洪州上藍院精究術數大為鍾傳所禮一旦疾篤往省之且曰老夫子和尚或謂無間矣和尚或不諱得無一言相付耶上藍強起索筆作偈以授其末云但看來年二三月桞條堪作打鍾槌偈終而卒傳得之不能測洎明年春淮帥引兵奄至洪州陷江南遂為楊氏有打鍾之偈人始悟焉田頵本揚府之大校也九國志頵字徳臣廬州合肥人朱延夀不知何許人九國志延壽廬州舒城人唐天祐初楊行密雄據淮海時頵為宣州節度使延夀為夀州刺史頵以行宻專恣跋扈嘗移書諷之曰侯王守方以奉天子古之制也其或踰越者譬如百川不朝于海雖狂奔猛注澶漫遐廣終為涸土不若恬然順流淼茫無窮也況東南之鎮揚為大塵賤刀布阜積金玉願公上恒賦頵將悉儲峙具單車從行密怒曰今財賦之行必由于汴適足以資于敵也不從時延夀方守夀春九國志天復初北司擁駕西幸昭宗聞延夀有武幹遣李儼間道齎詔授延夀蔡州節度使直頵之事密遣人告于頵曰公有所欲為者願為公執鞭頵聞之頗會其志乃召進士杜荀鶴具述其意復語曰昌本朝奉盟主在斯一舉矣即遣荀鶴具述密議自間道至大梁太祖大悦遽屯兵於宿州以㑹其變不數月事㣲洩行密乃先以公牒徵延夀新唐書行密妻延夀姊也遣辯士召延夀疑不肯赴姊遣婢報故延夀疾走揚州次悉兵攻宣城頵戎力寡薄棄壁走不能越境為行密軍所得九國志行密别遣臺蒙王茂章率步騎以往頵委舟師于汪建王壇自出廣徳迎戰大為濛所敗遂率殘衆遁保宛陵壇建聞其敗因盡以舟師歸欵于行密十二月頵出外州柵疾戰橋陷馬墜為外軍所殺延夀飛騎赴命邇揚州一舍行密使人殺之其後延夀部曲有逸境至者具言其事又云延夀之将行也其室王氏勉延夀曰今若得兵柄果成大志是吉凶繫乎時非繫于吾家也然願日致一介以寧所懷一日介不至王氏曰事可知矣乃部分家僕悉授兵器遽闔中扉而捕騎已至不得入遂集家屬阜私帑發百燎合州廨焚之既而稽首上告曰妾誓不以皎然之軀為讎者所辱乃投火而死五代史補楊行密據淮南以妻弟朱氏衆謂之朱三郎者行密署為泗州防禦使泗州素制屯軍朱氏驍勇到任恃衆自負行密雖悔度力未能但姑息之時議以為行密事勢去矣居無何行密得目疾雖瘉且詐稱失明其出入皆以人扶策不爾則觸牆抵柱至于流血姬妾僕隷以為寔然往往無禮首尾僅三年朱氏聞之信而少懈弛行密度其計必中謂妻曰吾不幸臨老兩目如此男女卑糼茍不諱則國家為他人所有今晝夜思忖不如召泗州三舅來使管勾軍府事則吾雖死無恨妻以為然遽發使述其意而召之朱氏大喜倍道而行及入謁行密恐其覺坐于中堂以家人禮見朱氏頗有徳色方設拜行密奮䄂中鐡槌以擊之正中其首然猶宛轉號呌久而方斃行密内外不測即時升堂㕔召将吏等謂之曰吾所以兩目失明者盖為朱三此賊今已擊殺兩目無事矣諸公知之否于是軍府大駭其僕妾嘗所無禮者皆自殺初行密之在民間也嘗為合肥縣手力有過縣令将鞭之行密懼且拜會有客自外入見行密每拜則㕔之前簾皆叩地而令不之覺客知其非常乃遽升㕔揖令于他處告以所見令驚遂恕之且勸事郡以自奮行密度本郡不足依乃投髙駢死死秦彦孫儒等作亂行宻速誅之遂有淮南之地趙匡凝新唐書匡凝字光儀蔡州人也父徳諲初事秦宗權為列校當宗權強暴時表為襄州留後唐光啟四年夏六月徳諲審宗權必敗乃舉漢南之地以歸唐朝仍遣使投分于太祖兼誓戮力同討宗權時太祖為蔡州四面行營都統使乃表徳諲為副仍領襄州節度使蔡州平以功累加官爵封淮安王匡凝以父功為唐州刺史兼七州馬歩軍都校及徳諲卒匡凝自為襄州留後朝廷即以旄鉞授之作鎮数年甚有威惠累官至檢校太尉兼中書令匡凝氣貎甚偉好自修飾每整衣冠必使人持巨鑑前後照之對客之際烏巾上微覺有塵即令侍妓持紅拂以去之人有誤犯其家諱者往往遭其檟楚其方嚴也如是光化初匡凝以太祖有清口之敗密附于淮夷太祖遣氏叔琮率師伐之未幾其沁州刺史趙璠越墉來降隋州刺史趙匡璘臨陣就擒俄而康懐英攻下鄧州匡凝懼遣使乞盟太祖許之自是附庸于太祖及成汭敗于鄂州匡凝表其弟匡明為荆南留後是時唐室㣲弱諸道常賦多不上供惟匡凝昆仲雖強據江山然盡忠帝室貢賦不絶太祖將期受禪以匡凝兄弟竝據藩鎮乃遣使先諭㫖焉匡凝對使者流涕答以受國恩深豈敢隨時妄有他志使者復命太祖大怒天祐二年秋七月遣楊師厚率師討之八月太祖親領大軍南征仍請削匡凝在身官爵及師厚濟江匡凝以兵數萬逆戰大為師厚所敗匡凝乃燔其舟單舸急棹㳂漢而遁于金陵後卒于淮南新唐書云師厚繇隂谷伐木為梁匡凝以兵二萬瀕江戰大敗乃燔舟單舸夜奔揚州行密見之曰君在鎮輕車重馬輸于賊今敗乃歸我邪匡明亦謀奔淮南子承規諫曰昔諸葛兄弟分仕二國若適揚州是自取疑也匡明謂然乃趨成都歐陽史云行密厚遇匡凝其後行密死楊渥稍不禮之渥方宴食青梅匡凝顧渥曰勿多食發小兒熱諸将以為慢渥遷匡凝海陵後為徐温所殺初匡凝好聚書及敗楊師厚獲數千巻于第悉以來獻匡凝弟匡明字賛堯幼以父貴一子出身為江寧府文學及壯以軍功厯繡峽二州刺史成汭之敗其兄匡凝表為荆南留後未至鎮而朗陵之兵先據其城矣匡明領兵逐之遂鎮于渚宫天祐二年秋太祖既平襄州遣楊師厚乘勝以趨荆門匡明懼乃舉族上峽奔蜀王建待以賓禮及建稱帝用為大理卿工部尚書久之卒于蜀張佶不知何郡人也九國志佶京兆長安人乾寧初以明經中第累遷宣州從事復為秦宗權行軍司馬後與劉建峯據湖南推建峯為帥唐乾寧初劉建峯據湖南獨邵州不賔命都將馬殷討之期嵗未尅而建峯為部下所殺軍亂鄰寇且至是時佶為行軍司馬屬潭人謀帥曰張行軍即所奉也佶不得已而視事旬日之間威聲大振冦亦解去九國志建峯將吏推佶為帥佶將入府常所乘馬忽爾踶􅲪不止正中佶髀佶謂將吏曰吾非汝生當迎馬公為之乃謂將吏曰佶才能不如馬公况朝廷重藩非其人不可因以牘召殷亦不疑禀命而至佶受拜謁禮畢命升階讓殷為帥佶即趨下率衆抃賀乃自請率師代殷攻邵州下之復為行軍司馬垂二十年殷果立大勲甚徳佶開平初殷表佶為朗州永順軍節度使累加檢校太傅同平章事乾化元年夏四月卒于位九國志乾化初移鎮桂林卒于治所詔贈侍中雷滿新唐書滿字秉仁武陵洞蠻也始為朗州小校唐廣明初王仙芝焚刼江陵是時朝廷以髙駢為節度使駢擢滿為禆將以領蠻軍駢移鎮淮南復隸部曲以悍獷趫徤知名中和初擅率部兵自廣陵逃歸于朗㳂江恣殘暴始為荆人大患矣率一歲中三四移兵入其郛焚蕩驅掠而去唐朝姑務息兵即以澧朗節度使授之累官至檢校太傅同平章事滿貪穢慘毒盖非人類又嘗于府署濬一深潭構大亭于其上毎隣道使車經由必召讌于中且言此水府也中有蛟龍竒怪萬態惟余能游焉或酒酣對客即取筵中寳器亂擲于潭中因自禠其衣祼露其文身遽躍入水底徧取所擲寳器戯弄于水面乆之方出復整衣就座其詭誕如此及死子彦恭繼之新唐書滿以天復元年卒于彦威自立弟彦恭結忠義節度使趙匡凝以逐彦威蠻蜑狡獪深有父風燼墟落榜舟檝上下于南郡武昌之間殆無人矣又與淮蜀結連阻絶王命太祖詔湖南節度使馬殷荆南節度使髙季昌練精兵五千遣將倪可福統之下澧州與潭兵合先是滿塹沅江以周其壘門臨長橋勢不可入殷極其兵力攻圍周歲彦恭食盡兵敗間使求救于淮夷及淮軍來援髙季昌逆戰于治津馬頭岸大破之俄而攻陷朗州彦恭單棹遁去馬殷擒其弟彦雄及逆黨七人械送至闕皆斬于汴橋下時開平二年十一月也史臣曰成汭鍾杜田朱之流皆因否運雄據大藩雖無濟代之勞且有勤王之節功雖不就志亦可嘉若較其誠明則田頵延夀斯為優矣匡凝一門昆仲千里江山失守藩垣不克負荷斯乃劉景升之子之徒歟張佶有讓帥之賢雷滿辱俾侯之寄優劣可知矣舊五代史巻十七
