body:
  text: 舊五代史巻七十六宋門下侍郎參知政事監修國史薛居正等撰晉書第二髙祖紀二天福元年十一月己亥帝御北京崇元殿降制改長興七年爲天福元年大赦天下十一月九日昩爽巳前應在京及諸州諸色罪犯及曾授僞命職掌官吏幷見禁囚徒巳結正未結正已發覺未發覺罪無輕重常赦不原者咸赦除之應明宗朝所行質命法制仰所在遵行不得改易其在京鹽貨元是官場岀糴自今後竝不禁斷一任人户取便糴易仍下太原府更不得開場糴貨其麴每斤與減價錢三十文以節度判官趙瑩爲翰林學士承旨守尚書户部侍郎知河東軍府事以節度掌書記桑維翰為翰林學士守尚書禮部侍郎知樞宻院事以觀察判官薛融為吏部郎中兼侍御史知雜事太原縣令羅周岳爲左諫議大夫節度推官竇貞固爲翰林學士軍城都廵檢使劉知逺為侍衛馬軍都指揮使客將景延廣為步軍都指揮使太原少尹李玘爲尚書工部侍郎閏十一月甲子晉安寨副招討使楊光逺等殺上將張敬逹以諸軍來降丙寅制以翰林學士承㫖知河東軍府戸部侍郎知制誥趙瑩爲門下侍郎同中書門下平章事監修國史以翰林學士權知樞密事禮部侍郎知制誥桑維翰為中書侍郎同中書門下平章事集賢殿大學士依前知樞密院事竝賜推忠興運致理功臣甲戌車駕至昭義受趙德鈞延壽降是日戎王舉酒言于帝曰予遠來赴義大事已成皇帝須赴京都今令大詳衮勒兵相送至河梁要過河者任意多少予亦且在此州俟京洛平定便當北轅執手相泣久不能别脱白貂裘以衣帝贈細馬二十匹獸馬一千二百匹仍誡曰子子孫孫各無相㤀己夘至河陽北節度使萇從簡來降舟楫已具庚辰望見洛陽煙火相次有將校飛狀請進辛巳唐末帝聚其族與親將審宋䖍等登𤣥武樓縱火自焚而死至晚車駕入洛唐兵解甲而罪皆慰而舍之帝止濳龍舊地百官稍稍見焉詔御史府促朝官入見詔文武兩班臣僚應事偽廷者竝釋罪是日百辟謝恩于宫門之外甲申車駕入内御文明殿受朝賀周唐禮樂制大赦天下應中外諸色職掌官吏内曾有受僞命者一切不問僞廷賊臣張延朗劉延皓劉延朗等竝姦邪害物貪猥弄權罪旣滿盈理難容貸除此三人巳行敕命指揮外其有宰臣馬𦙍孫樞密使房暠宣徽使李專美河府節度使韓昭𦙍等四人並令釋放少帝宜令中書門下追尊定諡擇日禮葬妃孔氏宜行追冊祔葬應天下節度使刺史下賓席郡職及將校等委中書門下各與改轉官資其北文管内鹽鐺户合納逐年鹽利昨者僞命指揮每斗須令人戸折納白米一斗五升極知百姓艱苦自今後宜令人戸以元納石鹽石斗数目每斗依時價計定錢數取人戸便穩折納斛斗其洛京管内逐年所配人戸食鹽起來年每斤特與減價錢十文應諸道商稅仰逐處將省司合収稅條例牓于本院前牓内該設名目者卽得收稅十二月乙酉􅄑河陽餞送大詳衮蕃部兵士歸國詔降末帝爲庶人人丁亥制以司空馮道守本官兼門下侍郎平章事𢎞文館大學士以歩軍都指揮使符彥饒爲滑州節度使以河陽節度使萇從簡爲許州節度使以澤州刺史劉凝爲華州節度使以皇子重乂爲河南尹庚寅以滑州節度判官石光贊爲宗正卿辛卯以舊相姚顗爲刑部尚書時自秋不雨經冬無雪命羣官徧加祈禱癸巳以邠州節度使張希崇爲靈武節度使鄧州節度使皇使遇爲定州節度使詔國朝文物制度起居入閤宜依唐明宗朝事例施行鎭州衙内都虞候祕瓊作亂逐副使李彥琦殺都指揮使胡章同州小校門鐸殺節度使楊漢賓燒劫州城丙申帝為明宗皇后曹氏薨舉哀長春殿于輟朝三日詔封故東丹王李贊華為燕王遣前單州刺史李肅部署歸葬本國以右拾遺吳涓爲左補闕充樞密院學士己亥以汴州節度使李周充西京留守以前河中節度使李從璋爲鄧州節度使磁州奏草冦攻城三日而退庚子帝為皇弟故彰聖指揮使敬殷沂州指揮使敬德檢校太子賓客敬友舉哀于長春殿以舊相盧文紀爲吏部尚書以皇城使周環爲大將軍充三司使以左贊善大夫馬重績爲司天監青州奏節度使房知溫卒詔鄆州王建立以所部牙兵徃青州安撫中書門下奏請以來年二月二十八日帝慶誕日爲天和節從之天福二年春正月甲寅朔帝御文明殿受朝賀仗衛如式乙卯日有蝕之是夜有赤白氣相間如耕墾林竹之狀自亥至丑生北濁過中天明滅不定徧二十八宿徹曙方散丁巳故皇弟敬徳敬殷竝贈太傅皇子重裔重進重英竝贈太保右神武統軍康思立卒輟視朝贈太子少師是日詔曰唐莊宗陵名與國諱同宜改為伊陵應京畿及諸州縣舊有唐朝諸帝陵幷眞源等縣竝不爲次赤郤以畿甸為望為定其逐處縣令不得以陵臺結銜考滿日依出選門官例指揮隔任後準格施行例其宋州亳州節度使刺史落太清宫使副名額庚申以前吏部郎中兼侍御史知雜事王松為左諫議大夫水部郎中王易簡本官制誥知定州奏契丹改幽州為南京中書奏請立宗廟從之以翰林學士工部侍郎和凝爲禮部侍郎依前充職詔内外文武臣僚竝與加恩皇基初造示普恩也太子少保致仕華溫琪卒贈太子太保是日詔應朝臣中有藉才特除外任者秩滿無遺闕將來擬官之時在外一任同在朝一任升進其就便自求外職及不是特達選任者不在此限也州上言節度使盧文進殺行軍副使率步下親兵過淮以前天平軍節度使檢校太尉兼侍中王建立爲平盧軍節度使以守司空門下侍郎平章事𢎞文館大學士馮道兼諸道鹽鐵轉運等使天雄軍節度使兼中書令范延光改封秦國公加食邑實封鳳翔節度使兼中書令西平王李從曮加食邑實封乙丑以端明殿學士禮部侍郎吕琦為檢校工部尚書祕書監丙寅改中興殿爲天福殿門名從之湖南節度使楚王馬希範加食邑實封改賜功臣名號前昭義節度使檢校太傅同平章事髙行周起復右金吾衛大將軍依前昭義軍節度使泰寕軍節度使李從溫荆南節度使南平王髙從誨歸徳軍節度使趙在禮竝加食邑實封改功臣名號以端明殿學士戸部侍郎李崧爲兵部侍郎判戸部以左諫議大夫王松判度支魏府范延光奏當管夏津鎮捕賦兵士誤殺郤新齊州防禦使祕瓊初延光將萌異志使人濳結于瓊諾之及是以瓊背其謀密使精騎殺之由是延光反狀明矣以工部侍郎李玘檢校右僕射為汾州刺史以前彰國軍節度使尹暉為左千牛衛上將軍是日詔曰西天中印土摩竭陁舍衛國大菩提寺三藏阿闍梨沙門室利縛囉宜賜號𢎞梵大師庚午涇州節度使李徳珫徐州節度使安彥威秦州節度使康福延州節度使劉景巖襄州節度使安從進夏州節度使李彞殷竝加食邑實封壬申正衙備禮冊贈故皇弟皇子等丙子故契丹人皇王歸葬輟視朝一日改汴州雍丘為杞杞縣避廟諱也戊以兵部侍郎判戸部寅李崧為中書侍郎同中書門下平章事充樞密使以權知樞密使事中書侍郎同中書門下平章事集賢殿學士桑維翰為樞密使是日詔曰應天開國恭己臨人宜覃繼絶之恩以廣延洪之道宜於唐朝宗屬中取一人封公世襲兼隋之酅公為三王後以後周介公備三恪主其祭祀及赴大朝會五代會要戴原敕云其唐朝宗屬中舊在朝及諸道為官者各據資歴考限滿日從品秩序遷已有出身任令參選以前鎭國軍節度使皇甫立為神武統軍以前宗正卿李郁為太子賔客庚辰以吏部侍郎龍敏判户部二月丙戌以尚食使安友規充葬明宗皇后監護使以河陽節度使安審暉為鄜州節度使癸巳詔停北京西北面計度司事吳越國王錢元瓘加食邑實封改賜功臣名號已亥詔應諸道行軍副使等得替後且就私家取便安止限一年後方得赴闕當便與比擬壬寅詔應諸道馬步都虞候自今後朝廷更不差補委自藩方于本州衙前大將中慎選久歴事任曉會行獄者充以三年限仍不得于元隨職員内差補以左散騎常侍孔子昭序為太子賔客尚書左僕射劉昫右僕射盧質加食邑食封甲辰以滄州留後馬全節為横海軍節度使以太子賓客韓惲為貝州刺史左羽林統軍羅周敬為右金吾衛上將軍丙午以皇子左驍衛上將軍重信為檢校太保河陽三城節度使以權知河陽軍州事周瓌為安州節度使詔中臣外僚或因差使出入竝不得薦屬人于藩鎮希求事任如有犯者竝準唐長興二年敕條處分戊申中書舎人陳乂改左散騎常侍應在朝文武百僚及見任刺史先代未封贈者與加封贈母妻未叙封者竝與叙封辛亥天和節帝御長春殿召左右街僧録威儀殿内譚經循舊式也三月甲寅制北京留守太原尹皇子重貴封食邑三百戸刑部侍郎張鵬改兵部侍郎己未御史臺奏唐朝定令式南衙常參文武百僚每日朝退于廊下賜食謂之常食自唐末辭離常食漸廢仍于入閤賜居日賜食每入閤禮畢閤門宣放仗羣官俱拜謂之謝食至偽主清泰年中入閤禮畢更差中使至正衙門口宣賜食百官立班重謝此則交失唐朝賜食之意于禮實為太煩臣恐因循漸失根本起今後入閤賜食望不差中使口宣準唐明宗朝事例處分從之五代會要載其年四月御史臺奏文武百官每月朔朢入閤禮畢賜廊下食在京時祗于廟堂幕次两廊下今在行朝于正衙門外權為幕次房廊隘陜伏恐五月一日朝會禮畢準例賜食于幕次難為排比伏見唐明宗時两省官于文明殿前廊下賜食今未審入閤日權于正衙門内两廊下排比賜食為復别有處分敕宜依明宗時舊規廊下賜食中書奏準敕故庶人三月七日以王禮葬其妻男等竝以禮葬其妻其日朝參一日從之以宣徽南院使楊彥詢爲左監門衛上將軍依前充宣徽使兖州李從溫奏節度副使王謙搆軍士作亂尋已處置丙寅詔王者省方設教靡憚于勤勞養士撫民必從其宜便顧惟涼德肇啓丕圖常務去于煩苛冀漸臻于富庶念京城俶擾之後屬舟船焚􅅡之餘饋運頓虧支費殊闕將别謀于飛輓慮轉困于生靈以此疚心未嘗安席今以夷門重地梁苑雄藩水陸交通舟車畢集爰資經度須議按廵寧免暫勞所期克濟取今月二十六日廵幸汴州云通鑑范延光聚卒繕兵悉召廵内刺史集魏州大作亂會帝謀徏都大梁桑維翰曰大梁北控燕趙南通江淮水陸都都資用富饒今延光反形已露大梁距魏不過十驛彼若有變大軍尋至所謂疾雷不及掩耳也丙寅下詔託以洛陽漕運有闕東廵汴州以前貝州刺史史圭為刑部侍郎充諸道鹽鐵轉運副使前澤州刺史閻至為戸部侍郎詔車駕經過州府管界所有名山大川帝王陵廟名臣等去路十里者宜令本州排比祗候駕經過日以祭脯祭告左僕射劉昫等議立宗廟以立高祖以下四親廟其始祖一廟伏候聖裁御史中丞張昭逺議請依隋唐之制立四廟推四世之中名位高者為太祖詔下百官定議百官請依唐廟追尊四廟為定從之甲戌以右龍武統軍楊思權為左衛上將軍乙亥前鄜州節度使張萬進加檢校太傅前宋州節度使李從敏加檢校太尉以吏部郎中兼待御史知雜事薛融為左諫議大夫以兵部郎中段希堯為右諫議大夫戊寅以戸部尚書王權為兵部尚書工部尚書崔居儉為戸部尚書兵部尚書李鏻為太子少保兵部尚書致仕裴皥為工部尚書東上閤門使李守貞為右龍武將軍充職庚辰車駕離京四月癸未朔至鄭州防禦使白景友進牲餼器皿帝曰不出民力否景友曰臣畏陛下法皆辦于已俸命収之甲申駕入汴州丁亥制應天福二年四月五日昧爽已前諸道州府見禁囚徒大辟已下罪無輕重竝釋放天福元年諸道州府應係殘已前欠租稅竝特除免諸道係徵諸色人欠負省司錢物宜令自偽清泰元年終已前所欠者據所通納到物業外竝與除放昨者行至鄭州滎陽縣界路旁見有蟲食及旱損桑麥處委所司差人檢覆量與蠲免租税河陽管内酒戸百姓應欠天福元年閏十一月二十五日已前不敷年額麴錢竝放其諸處應經兵火者亦與指揮當罪卽誅式明常典旣往可憫宜示深仁偽清泰中臣僚内有從誅戮者竝許收葬天下百姓有年八十已上者與免一子差徭仍逐處簡署上佐官梁故滑州節度使王彥章効命當時致身所事稟千年之生氣流百代之令名宜令超贈太師子孫量才叙録應諸道州府營界有自偽命抽㸃鄉兵之時多是集劫結盜因此畏懼刑章藏隱山谷宜令逐處曉諭招攜各令復業自今年四月五日巳前為非者一切不問如兩月不歸業者復罪如初丁酉宣武軍節度使侍衛親軍使楊光遠加兼侍中己亥陜州節度使侍衛都虞侯劉知逺加檢校太保庚子北京業都徐兖二州竝奏早詔今後立妃及拜免三公宰相及命將封王公主宜令竝降制命餘從令式親處分夏五月壬子朔帝御崇元殿受朝賀仗衛如式詔洛京魏府管内所徵今年夏苗稅物等宜放五分之一以微旱故也丙辰御史中丞張昭逺奏汴州在梁室朱氏稱制之年有京都之號及唐莊宗平定河南復廢為宣武軍至明宗行幸之時掌事者因縁修葺衙城遂挂梁宫室時殿門牌額當時識者或竊非之一昨車駕省方暫居梁苑臣觀衙城内齋閤牌額一如明宗行􅄑之時無都號而有殿名恐非典據臣竊尋漢秦已來寰海之内鑾輿所至多立宫名近代隋室于揚州立江都宫太原立汾陽宫岐州立仁夀宫唐朝于太原立晉陽宫同州立長春宫岐州立九成宫宫中殿閤皆題署牌以類皇居準準故事于汴州衙城門權挂一宫門牌額則餘齋閤竝可取便為名敕行闕宜以大寧宫為名湖南青草廟舊封安流侯進封廣利公洞庭廟進封靈濟公磊石廟舊封昭靈候進封威顯公黄陵二妃廟舊封懿節廟改封昭烈廟從馬希範之請也戊午以前成德軍節度判官張彭為太府卿壬戌詔在朝文武臣僚每人各進封事一件仍須實封通進務裨闕政用副虚懐甲子以虞部部郎中知制誥于嶠為中書舎人以戸部郎中于遘為部郎中知制誥故太子少保致仕朱漢賔贈司空乙丑六宅使王繼𢎞送義州衙前収管前洺州團練使髙信送復州収管二人于崇禮門内喧争爲臺司所劾故也戊辰翰林學士戸部員外郎知制誥竇固貞改工部郎中知制誥翰林學士都官郎中知制誥李慎儀改中書舎人仍賜金紫竝依舊充職庚午制封皇第二十一女為長安公主封皇第十一妺烏氏為壽安長公主皇第十二妹史氏為永壽長公主皇第十三妹杜氏為樂平長公主壬申天雄軍節度使守太傅兼中書令興唐尹范延光進封臨清王加食邑三千戸鳳翔節度使檢校太師兼中書令西平王李從曮進封岐王丙子平盧軍節度使兼中書令王建立進封臨淄王昭信軍節度使侍衛馬軍都指揮使景延廣改寧江軍節度使典軍如故太常卿梁文矩奏定四廟諡號廟號陵廟太常少卿裴垣奏定四廟皇后追尊諡號從之戊寅以中書舎人權知貢舉王延爲御史中丞以翰林學士戸部侍郎知制誥崔棁為兵部侍郎充承㫖以翰林學士承㫖兵部侍郎程遜為檢校禮部尚書太常以檢校卿禮部尚書太常卿梁文矩為吏部尚書以御史中丞張昭逺為户部侍郎以吏部尚書盧文紀為太子少傅己邜詔太社内先収掌唐朝罪人首級等宜令骨肉或先舊僚屬収葬其喪葬儀制不得過制六月壬午朔制宗正卿石光贊奏滎陽道左有萬石君石奮之朝徳行懿美宜示封崇用光逺祖之徽猷益茂我朝之典盛贈奮太傅癸未契丹使伊勒希巴來聘致馬二百匹及人參貂鼠皮走馬木椀等物乙酉翰林學士司封員外郎知制誥王仁裕改都官郎中右贊大夫善盧損改右散騎常侍前有朝貶故也以祕書少監致仕劉頎為鴻臚卿致仕前光禄少卿尹玉羽以少府監致仕丙戌宰臣李崧上表讓樞密使于趙瑩以瑩佐命之元臣也詔不允以前義成軍節度使李彥舜為左武衛大將軍以左散騎常侍唐汭爲檢校禮部尚書國子祭酒以前左龍武統軍李承約為左驍衛上將軍戊子宰臣趙瑩自契丹使廻癸巳東都奏瀍澗河溢壊金沙灘内舎屋幽州趙思溫奏瀛莫两州元係當道其刺史常行周白彥球乞發遣至臣本府詔遣行周等赴闕甲午六宅使張言自魏府廻奏范延光叛命滑州符彥饒飛奏有兵士自北來傳范延光到黎陽乞發兵屯禦宣遣客省使李守貞往延光所問罪尋命䕶聖都指揮使白奉進領騎士一千五百赴白馬渡廵檢乙未魏府范延光男閑廏使守圖送御史臺攝荆南節度行軍司馬檢校太保歸州刺史王保義加檢校太傅知武泰軍節度觀察畱後充荆南行軍司馬兼沿淮檢使廵襄州奏江水漲一丈二尺丁酉遣内班史進能押信箭一對往滑州賜符彥饒以前磁州刺史劉審交為魏府計度使以東都廵檢使張從賓充魏府西南面都部署遣侍衛使楊光逺領步騎一萬赴滑州以東都副留守張延播充洛京都廵檢使白奉進奏捉得賦卒張柔稱范延光差澶州刺史馮暉充一行都部署元從都押衙孫鋭充一行兵馬都監帝覧奏謂侍臣曰朕雖薄徳寡謀自謂不居近光之下而馮暉孫鋭過于兒戲朝夕就擒安能抗拒大軍為我之患乎天平軍節度使安審𤦺起復舊任翰林學士禮部侍郎和凝改端明殿學士乙巳范延光差牙將王知新齎表到闕不令朝見収付武徳司丁未詔侍衛使楊光逺充魏府西面都部署以張從賔充副兼諸軍都虞候昭義節度使髙行周充魏府西面都部署是日張從賔亦叛與范延光協謀害皇子河陽節度使重信皇子東都留守重乂己酉以奉國都指揮使侯益護聖都指揮使我重威領歩騎五千往屯汜水關僃從賓之亂通鑑七月張從賔攻汜水關攻廵檢使宋廷浩帝戎服嚴輕騎將奔晉陽以避之桑維翰叩頭苦諫曰賦鋒雖盛勢不能久請少待之不可輕動帝久乃止七月辛亥兩浙錢元瓘奏弟吳越士客馬歩諸軍都指揮史静海軍節度使元球非時入府欲謀為亂腰下搜得匕首巳誅戮訖詔削元球在身官爵甲寅奉國都指揮使馬萬奏滑州節度使符彥驍作亂屠害侍衛馬軍都指揮使白奉進尋以所部兵擒到彥饒差立功都虞侯方太押送赴闕尋賜死于路是日削奪范延光在身官爵以馬萬為滑州節度使以昭義節度使髙行周為河南尹東都留守充西面行營諸軍都部署以護聖左右廂都指揮使杜重威為昭義節度使兼侍衛馬軍都指揮使充西面行營副部署以奉國都指揮使侯益爲河陽節度使以右神武統軍王周充魏府行營步軍都指揮使以滑州節節使馬萬充魏府行營馬軍都指揮使以左僕射劉昫充東都留守兼判河南府事杜重威奏収下汜水等闗破賊千人張從賔及其殘黨奔投入河兼収到護聖指揮使曹再晟一百人騎稱背賊投來竝送赴行闕升貝州為防禦使額皇子故東都留守重乂贈太傅皇子故河陽節度使重信贈太尉敕朋助張從賓逆人張延播張繼祚等十人宜令収捕親的骨肉竝處斬二卯以唐開府儀同三司守太尉兼中書令西平王李晟五代孫艥為耀州司戸參軍示勸忠之義也壬申帝御崇元殿備禮冊四廟親授寳冊于使攝太尉守司空門下侍郎平章事馮道使副攝司徒守工部尚書裴皥赴洛京行禮甲戌以宰臣趙瑩判戸部以吏部侍郎判戸部龍敏為東都副留詔洛守京留司百官竝赴闕安州軍亂指揮使王暉害節度使周瓌于理所遣右衛上將軍李金全領千騎赴安八月辛已州以許州節度使萇從簡為徐州節度使以陜州節度使侍衛馬步軍都虞知逺劉侯為許州節度使以權北京留守徐州節度使安彦威為太原尹北京留守河東節度使宰臣監修國史趙瑩奏請循近例依唐明宗朝凡有内廷公事及言動之間委端明殿學士或樞宻院學士侍立冕旒繫日編緑逐季送當館其百司公事亦望逐季送當館旋要編修日歴從之丁亥以前宋州節度使李從敏為郟州節度使戊子以尚書致仕鄭韜光為戸部尚書致仕改𤣥徳殿為廣政殿門名從之庚子華州奏渭河泛溢害稼宰臣馮道加開府儀同三司食邑實封左僕射劉昫加特進兼鹽鐵轉運等使故東京留守判官李遐可贈右諫議大夫其母田氏封京兆郡太君子孫量才叙録仍加賻贈長結遐在身俸禄終母之世先是遐監左藏庫于洛䧄會張從賔叛令强取錢帛遐拒而不與因而遇害故有是命乙巳詔天下見禁囚徒除十惡五逆放火劫舍持仗殺人合造􅧆藥官典犯贜欠負官賤外其餘不問輕重已發覺未發覺已結正未結正竝從釋放應自張從賓作亂有曾被張從賓及賓及延播張脅從染汙者及符彦饒下隨身軍將等兼安州王暉徒黨除已誅戮外竝從釋放一切不問張繼祚在䘮紀之中承逆豎之意顯從叛亂難貸刑章乃睠先臣實有遺徳遽兹乏祀深所軫懐其一房家業準法雖巳藉殁所有先臣并祖父母墳莊嗣堂竝可交付骨肉主張應自梁朝後唐已來前紅奉使及北京沿邉管界擄掠往向北人口宜令官結錢物差使齎持往彼収贖放歸本家云繼祚故齊王全義之子也故有是詔丙午詔天下刑獄繫囚染疾者宜差醫工治療官中量給藥價事輕者仍許家人看候合杖者俟損日決遺九月庚戌朔以前太府卿兼通事舍人陳瓚為衛尉卿兼通事舎人壬子故安逺軍節度使周懷贈太傅甲寅皇子北京留守知河東軍府事太原尹重貴加檢校太保為右金吾衛上將軍以右龍武統軍安崇院為右衛上將軍以前保太軍節度使檢校太府張萬進為右龍衛軍統軍以右領軍衛上將軍權安州軍州事知李金全為安逺軍節度使魏府招討使楊光逺進攻城圖戊午以太子賓客孔昭序為工部尚書致仕將作少監髙鴻漸上言伏覩近年已來士庶之家死喪之苦當殯葬之日被諸色音並伎藝人等作樂攪擾求覓錢物親行止絶從之庚申靜江軍節度使檢校太尉同平章事馬希杲加階爵及功臣名號以前兵部侍郎楊凝式為檢校兵部尚書太子賓客故右金吾衛上將軍羅周敬贈太傅乙丑鄧州節度使李從璋卒贈太師改興唐府為廣晉府興唐縣為廣晉縣以左諫議癸酉大夫判度支王松為尚書工部侍郎甲戌貝衛兩州奏河溢害稼乙亥以將作監王岯為太子賓客十月壬午以宣徽南院使左監門衛上將軍楊彥詢為鄧州威勝軍節度使詔選人試判兩道以左司郎中張瑑為右諫議大夫以刑部侍郎鹽鐵轉運副使史圭為吏部侍郎以曹州刺史宋光業為宣徽北院使以左金吾衛大將軍髙漢筠為左驍衛大將軍充内客省使以宣徽北院使左驍衛大將軍劉處讓為左監門衛上將軍充宣徽南院使丙戌遺使祀五嶽四瀆故天平軍節度使閻寶追封太原郡王故大同軍節度使李存璋贈太師故瀛州刺史李嗣頵贈太尉故相州刺史史建瑭故代州刺史王建及竝贈太保故幽州節度使周徳威追封燕王十一月庚戌賜楊光逺空名官告自司空至常侍凡四十道將士立功者得補之而後奏中書上言準唐貞元二年九月五日敕文官充翰林學士及皇太子諸王侍讀武官充禁軍職事竝不常朝參其在三館等諸職事者竝朝參訖各歸所務自累朝以來文武在内廷充職兼判三司或帯職額及六軍判官等例不赴常朝元無正敕準近敕文武職事官未升朝者按舊制竝赴朔朢朝參其翰林學士侍讀三館職事望準元敕處分其諸在内廷諸司使等每受正官之時來赴正衙謝後不赴常朝大朝會不離禁廷位次三司職官免常朝惟赴大朝㑹其京司未升朝官員祗赴朔朢朝參帯諸司職掌者不在此例文官除端明殿翰林學士樞密院學士中書省知制誥外有兼官兼職者仍各發遣本司公事從之丙辰太子賓客王岯卒改潞京濳龍宅為廣徳宫北京濳龍宅為興義宫戊午中書奏準雜令車駕廵幸所祗承者賜㑹竝同京官從之戊辰鎮海鎮東節度使吳越王錢元瓘加天下兵馬副元帥封吳越國王庚午以右拾遺李澣充翰林學士甲戌命太常卿程遜兵部員外郎韋梲充吳越國王加恩使丙子以戸部侍郎張昭逺守本官充翰林學士仍知制誥丁丑湖南馬希範貢寶裝龍鳳器銀花果子等物帝覽之謂侍臣曰竒巧蕩心斯何用耳但以來逺之道用結不欲阻其意聞者服之壬午安州李金全上言奉詔抽臣元隨左都押衙胡漢筠其人染重病侯損日赴闕漢筠本滑吏也從金全歴数鎭而濫聲諠聞帝知之欲授以他職免陷功臣漢筠懼其罪遂託疾由是勸金全貳于朝廷自此始也十二月以監察御史徐台符爲尚書膳部員外郎知制誥以右補闕史官修撰吳承範為尚書屯田員外郎知制誥左諫議大夫薛融改中書舎人辭而不拜尚書水部郎中知制誥王易簡改中書舎人故隴西郡王李嗣昭追封韓王故横海軍節度使安審通贈太師辛丑湖南節度使兼中書令楚王馬希範加食邑實封改賜扶天佐運同徳致理功臣甲辰車駕幸相國寺祈雪舊五代史巻七十六
