body:
  text: 舊五代史巻三十一宋門下侍郎參知政事監修國史薛居正等撰唐書第七莊宗紀五同光二年春正月庚子朔帝御明堂殿受朝賀仗衛如式壬寅南郊禮儀使太常卿李燕進太廟登歌酌獻樂舞名懿祖室曰昭徳之舞獻祖室曰文明之舞太祖室曰應天之舞昭宗室曰永平之舞甲辰幽州上言契丹入冦至瓦撟契丹國志時契丹日益强盛遣使就唐求幽州以處盧文進以天平軍節度使李嗣源為北面行營都招討使陜州畱後霍彦威為副率軍援幽州已巳故宣武軍節度副使權知軍州事檢校太傅王瓚贈太子太師丁未詔改朝元殿復為明堂殿又改崇勲殿為中興殿戊申以振武軍節度使檢校太傅同平章事李存霸權知潞州畱後以知保大軍軍州事高允韜為檢校太保庚戌以涇原節度使充奏王府諸道行軍司馬開府儀同三司檢校太尉兼侍中李從曮為檢校太尉兼中書令依前涇原節度使充奏王府諸道行軍司馬詔改應順門為永曜門太平門為萬春門通政門為廣政門鳳明門為韶和門萬春門為中興門解卸殿為端明殿是日詔曰皇綱已正紫禁方嚴凡事内官不合更居外地詔諸道應有宦官不計高低並仰逐處并家口發遣赴闕不得輒有停滯帝龍潛時寺人數已及五百至是合諸道赴闕者約千餘人皆給賜優贍服玩華侈委之事務付以腹心唐時宦官為内諸司使務諸鎮監軍出納王命造作威福昭宗以此亡國及帝奄有天下當知戒彼前車以為殷鑒一朝復興兹弊議者惜之新羅王金朴英遣使朝貢辛亥中書門下奏準本朝故事諸王内命婦宰臣學士中書舍人諸道節度防禦團練使畱後官告即中書帖官告院索綾紙褾軸下所司書冩印署畢進入宣賜其文武兩班及諸道官員並奏薦將校並合于所司送納朱膠綾紙價錢伏自偽梁不分輕重並從官給今後如非前件事例請官中不給告勅其内司大官侍衛將校轉官即不在此限從之壬子蜀主王衍致書于帝稱有詐為天使馳報收復汴州者詔捕之不獲癸丑有司奏郊祀前二日迎祔高祖太宗懿祖獻祖太祖神主于太廟議者以中興唐祚不宜以追封之祖雜有國之君以為昭穆自懿祖巳下宜别立廟于代州如後漢南陽故事可也幽州北面軍前奏契丹還塞詔李嗣源班師鳳翔節度使秦王李茂貞上表請行藩臣之禮帝優報之甲寅帝于中興殿面賜郭崇韜鐡劵有司上言皇太后到闕皇帝合于銀臺門内奉迎詔親至懷州奉迎中書奏自二十三日後散齋内車駕不合遠出詔改至河陽奉迎以禮部尚書興唐尹王正言依前禮部尚書充租庸使乙卯渤海國遣使貢方物幽州奏媯州山後十三寨百姓却復新州戊午以前太子少師薛廷珪為檢校户部尚書太子少師致仕以前太子賓客封舜卿為太子少保致仕以前太子賓客李文規為户部侍郎致仕詔鹽鐡度支户部並委租庸使管轄庚申四方館上言請今後除隨駕將校及外方進奉専使文武班三品已上官可以内殿對見其餘並詣正衙以申常禮從之車駕幸河陽奉迎皇太后辛酉帝侍皇太后至文武百寮迎于上東門是日河中府上言稷山縣割隸絳州以太僕卿李紓為宗正卿以衛尉卿楊遘為太僕卿西京昭應縣華清宫道士張沖虚上言天尊院枯檜重生枝葉乙丑有司上言南郊朝享太廟舊例親王充亞獻終獻行事乃以皇子繼岌為亞獻皇弟存紀為終獻丙寅帝赴明堂殿致齋丁卯朝饗于太微宫戊辰饗太廟是日赴南郊二月已巳朔親祀昊天上帝于圜丘禮畢宰臣率百官就次稱駕還御五鳳樓宣制大赦天下應同光二年二月一日昧爽已前所犯罪無輕重常赦所不原者咸赦除之十惡五逆屠牛鑄錢故殺人合造毒藥持杖行刧官典犯贓不在此限應自來立功將校各與轉官仍加賞給文武常參官節度觀察防禦刺史軍主都虞候指揮使父母亡殁者並與追贈在者各與加爵増封諸藩鎮各賜一子出身仍封功臣名號畱後刺史官高者加階爵一級官卑者加官一資應本朝内外臣寮被朱氏殺害者特與追贈應諸州府不得令富室分外收貯見錢禁工人鎔錢為銅器勿令商人載錢出境近年已來婦女服飾異常寛博倍費縑綾有力之家不計卑賤悉衣錦繡宜令所在糾察應有百姓婦女曽經俘擄他處為婢妾者一任骨肉識認男子曽被刺面者給與憑據放逐營生召天下有能以書籍進納者各等第酬奬仰有司速檢勘天下户口正額墾田實數待憑條理以息煩苛是日風景和暢人胥悦服議者云五十年來無此盛禮然自此權臣愎戾伶官用事吏人孔謙酷加賦斂赦文之所原放謙復刻剥不行大失人心始于此矣庚午租庸使孔謙奏諸道剛運客旅多于私路茍免啇税請令所在關防嚴加捉搦從之癸酉宰臣豆盧革率百官上尊號曰昭文睿武至徳光孝皇帝凡三上表從之申戌詔曰汴州元管開封浚儀封丘雍丘尉氏陳畱六縣偽庭割許州鄢陵扶溝陳州太康鄭州陽武中牟曹州考城等縣屬焉其陽武匡城扶溝考城四縣宜今且隸汴州餘還本部丙子以隨駕參謀耿瑗為司天監丁丑以光禄大夫檢校司徒李筠為右騎衛上將軍戊寅幸李嗣源第作樂盡歡而罷己卯以河中節度使冀王李繼麟兼安邑解縣兩池𣙜鹽使辛已以檢校太師守尚書令河南尹判六軍諸衞事魏王張全義為守太尉兼中書令河陽節度使河南尹改封齊王以開府儀同三司守尚書令秦王李茂貞依前封秦王餘如故仍賜不拜不名五代會要太常禮院奏李茂貞封冊之命宜准故襄州節度使趙匡凝之例施行秦王受冊自備革輅一乘載冊犢車一乘并本品鹵簿鼓吹如儀從之是日帝幸左龍武軍癸未宰臣豆盧革率百官上表請立中宫制以魏國夫人劉氏為皇后仍令所司擇日備禮冊命丁亥以天平軍節度使蕃漢總管副使開府儀同三司檢校太傅兼中書令李嗣源為檢校太尉依前天平軍節度使加實封百户並賜鐡劵以前安國軍節度副使檢校太保左衛上將軍李存乂為晉州節度使檢校太傅以北京皇城畱守檢校太保左威衛上將軍李存紀為邢州節度使加檢校太傅以蕃漢馬步都虞候兼東京馬步軍都指揮使檢校太保朱守殷為振武節度使加檢校太傅戊子以前右龍武軍都虞候守左龍武大將軍李詔竒為鄭州防禦使以楚州防禦使張繼孫為汝州防禦使已丑以振武軍節度使權安義畱後檢校太傅平章事李存霸為潞州節度使以捧日都指揮使鄭州防禦使李紹琛為陜州節度使以成徳軍馬步軍都指揮使右監門衛大將軍毛璋為華州節度使壬辰樞宻使郭崇韜再上表請退樞宻之識優詔不允癸已詔曰皇太后母儀天下子視羣生當别建宫闈顯標名號冀因稱謂益表尊嚴宜以長夀宫為名樞宻使郭崇韜奏時務利便一十五件優詔褒美甲午奚王李詔威吐渾李詔魯皆貢駞馬丁酉以武安軍衙内馬步軍都指揮使昭州刺史馬希範為永州刺史檢校太保癸夘以光禄大夫檢校左僕射行太常卿李燕為特進檢校司空依前太常卿以御史中丞李徳休為兵部侍郎以吏部侍郎崔協為御史中丞三月甲辰故河陽節度使王師範贈太尉乙巳以滄州節度使檢校太傅同平章事符習為青州節度使以北京衙内馬步軍都指揮使右領軍衛大將軍李紹斌為滄州節度使鎮州奏契丹犯塞詔李嗣源率師屯邢州丙午以荆南節度使守中書令渤海王高季興依前檢校太師兼尚書令封南平王以幽州節度行軍司馬李存賢依前檢校太保為幽州節度使中書門下上言近以諸州奏薦令録頗亂規程請今後節度使管三州巳上每年許奏管内官三人如管三州巳下只奏兩人仍須課績尤異方得上聞防禦使只許奏一人刺史無奏薦之例從之巳酉以太子少保李琪為刑部尚書庚戌幽州奏契丹冦新城是日詔諸軍將校自檢校司空以下宜賜叶謀定亂匡國功臣自檢校僕射尚書常侍及諫議大夫並賜忠果拱衞功臣初帶憲銜者並賜忠烈功臣節級長行並賜扈蹕功臣中書門下上言州縣官在任考滿即具關申送吏部格式本道不得差攝官替正官從之五代會要同光二年中書門下奏刺史縣令有政績尤異為衆所知武招復户口能増加賦税者或辨雪寃獄能拯人命者或去害物之積弊立利世之新規有益時政為衆所推者即仰本處逐件分明聞奏當儀奬擢或在任貪猥誅戮生靈公事不治為政怠惰亦知懲罰其州縣官任滿三考即具闕中送吏部格式侯勑除銓注其本道不得差攝官替正授者從之有司上言皇帝四月一日御文明殿受冊徽號合服衮冕御殿前一日散齋於内殿從之是日李嗣源上表乞退兵權詔不允日時伶人景進用事閹官竸進故重臣憂懼拜章請退癸丑左諫議大夫竇専上言請廢租庸使名目事歸三司疏奏不服唐州奏木連理詔先省員官除巳别授官外其左散騎常侍李文矩等三十人却復舊官太子詹事石戩等五人宜以本官致仕將作少監岑保嗣等十四人續勅處分丙辰責授萊州司户鄭班等一十一人並量移近地尚書户部侍郎知貢舉趙頎卒以中書舍人裴皥權知貢舉禁用鉛錫錢丁巳中書門下奏懿祖陵請以永興為名獻祖陵請以長寜為名太祖陵請以建極為名從之淮南楊􅄎遣使貢賀郊天禮物十國春秋吳世家王遣右衛上將軍許確進賀郊天録二十兩錦綺羅一千二百疋細茶五百斥象牙四株犀角十株於唐戊午詔應南郊行事官並付三銓磨勘優與處分巳未以大理卿張紹珪充制置安邑解縣兩池榷鹽使辛左龍武軍以皇子繼岌代張全義判六軍諸衛事故也癸亥以彰武保大等軍節度使北平王高萬興可依前延州鄜州節度使檢校太保兼中書令北平王甲子幸東宅夏四月己巳朔帝御文明殿具兖冕受冊尊號曰昭文睿武至徳光孝皇帝壬申以成徳軍節度行軍司馬權知府事任圜為檢校石僕射權北面水陸轉運制置使甲戌以順義軍畱後華温琪依前檢校太保充畱後乙亥以天策上將軍武安等軍節度使守太師中書令楚王馬殷可依前守太師兼尚書令詔在京諸道節度使刺史令各歸本任丁丑以前幽州節度使内外藩漢馬步總管檢校太師兼中書令李存審為宣武軍節度使餘如故巳夘帝御文明殿冊魏國夫人劉氏為皇后庚辰賜郭彦威姓名曰紹真癸未以宋州節度使李繼安依前檢校太尉同平章事宋州節度使以許州節度使李繼沖依前檢校太尉同平章事宋州節度使以襄州節度使孔勍依前檢校太傅同平章事襄州節度使甲午以樞宻副使通議大夫行内侍省内侍宋唐王為左監門衛將軍同正依前樞宻副使以内客省使通議大夫行内侍省内侍楊希朗為右監門衛將軍同正依前内客省使並賜推忠匡佐功臣車駕幸龍門丙戌囘鶻遣使貢方物巳丑以夏州節度使李仁福依前檢校太師兼中書令夏州節度使封朔方王以朔方河西等軍節度使韓洙依前檢校太傅兼侍中充朔方河西等軍節度使靈鹽威警雄涼甘肅等州觀察使辛卯以宣徽南院使判内侍省兼内局特進左監門將軍同正李紹宏為右領軍衛上將軍癸巳以靜江軍節度使扶風郡王馬賨為檢校太師兼中書令依前靜江軍節度使以朗州節度使馬希振為檢校太傅兼侍中依前朗州節度使鳳翔節度使秦玉李茂貞薨丙申潞州小校楊立據城叛以李嗣源為招討使陜州畱後李紹真為副率師以討之舊五代史巻三十一
