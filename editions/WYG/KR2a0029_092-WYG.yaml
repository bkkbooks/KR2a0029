body:
  text: 舊五代史巻四十五考證唐閔帝紀閔帝諱從厚小字菩薩奴明宗第三子也案歐陽史作明宗第五子呉縝常辨其誤今攷五代會要亦作第三子與是書同十二月癸夘朔案五代春秋作癸亥朔蓋𫝊冩之訛歐陽史通鑑俱從是書作癸夘節度使符彦超為部曲王希全所害案彦超被害通鑑從是書作閏月五代春秋繫于正月殊誤丁酉王思同加同平章事充西面行營都部署以前邠州節度使藥彦稠為副部署案歐陽史辛夘西京留守王思同為西面行營都部署静難軍節度使藥彦稠為副是書作丁酉與歐陽史異据通鑑則思同以辛夘充都部署丁酉加同平章也蓋採薛歐二史而兼用之殿直楚匡祚上言楚匡祚原本作楚祚今從通鑑增匡字陜州奏潞王至潼關害西面都部署王思同歐陽史作思同奔歸于京師死之與是書異是夜帝以百騎出𤣥武門案契丹國志愍帝領五十騎自隨出奔衛州宋史李洪信𫝊又作少帝東奔捧聖軍數百騎從行與是書異据下文王𢎞贄曰今以五十騎奔竄則作五十騎者是也九日巒至帝遇酖而崩案契丹國志云王巒至衛州進酖于愍帝愍帝不飲巒縊殺之與是書異舊五代史巻四十五攷證
