body:
  text: 舊五代史巻九十七攷證晉列傳十二范延光傳改封高平郡王案歐陽史作東平郡王延光謂門人李式曰歐陽史作謀於副使李式楊光逺傳唐天成中以明宗改御名為亶以偏傍字犯之始改光逺案是書唐紀清泰二年楊檀始改名光逺非天成中即改名也光逺入朝面奏維翰擅權高祖以光逺方有功于國乃出維翰鎮相州光逺為西京留守案通鑑攷異云晉高祖實録天福三年壬辰維翰崧罷樞宻使庚子光逺始入朝對于便殿十一月戊申光逺為西京留守天福四年閏七月壬申維翰出為相州節度使與此傳先後互異其碑石無故自折案歐陽史作碑石既立天大雷電擊折之盧文進傳文進字國用案遼史太祖紀神册元年晋幽州節度使國用來降二年晉新州禆將盧文進殺節度使李文矩來降則國用與文進顯係二人然天顯元年又書盧龍軍節度使盧國用叛奔于唐即文進歸唐之事也疑文進入遼以後遂以字行修遼史者雜採諸書誤作两人耳行軍司馬馮知兆馮知兆南唐書作姚知兆歐陽史與是書同李金全傳軍校武彦和案歐陽史南唐書俱作武克和通鑑從是書親吏胡漢筠胡漢筠歐陽史及南唐書俱作胡漢榮通鑑從是書遣吏賈仁紹案仁紹通鑑作仁沼考異云薛史作仁紹今從實録歐陽史南唐書與通鑑同扎拉舊作則剌今改舊五代史巻九十七攷證
