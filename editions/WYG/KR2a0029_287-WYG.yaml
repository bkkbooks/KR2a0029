body:
  text: 舊五代史巻一百四十五宋門下侍郎參知政事監修國史薛居正等撰志七樂志下周廣順元年太祖初即大位惟新庶政時太常卿邊蔚上疏請改舞名其略云前朝改祖孝孫所定十二成之名文舞曰治安之舞武舞曰振德之舞今請改治安為政和之舞振德為善勝之舞前朝改貞觀中二舞名文舞曰觀象之舞武舞曰講功之舞今請改觀象為崇德之舞講功為象成之舞又議改十二成今改為順十二順樂曲名祭天神奏禋成請改為昭順之樂祭地祇奏順成請改為寧順之樂祭宗廟奏裕成請改為肅順之樂祭天地宗廟登歌奏肅成今請改為感順之樂皇帝臨軒奏政成請改為治順之樂王公出入奏弼成請改為忠順之樂皇帝食舉奏德成請改為康順之樂皇帝受朝皇后入宫奏扆成請改為雍順之樂皇太子軒懸出入奏𦙍成請改為温順之樂元日冬至皇帝禮㑹登歌奏慶成請改為禮順之樂郊廟爼入奏騂成請改為禋順之樂皇帝祭享酌獻讀祝及飲福受胙奏壽成請改為福順之樂梁武帝改九夏為十二雅以恊陽律陰呂十二管旋宮之義祖孝孫改為十二和開元中乃益三和前朝去二和改一雅今去雅只用十二順之曲祭孔宣父齊太公廟降神奏師雅請同用禮順之樂三公升殿下階履行同用弼成今請同用禮順之樂享藉田同用寧順之樂曲詞文多不載五代會要邊蔚請添召樂師令在寺習樂勅太常寺見管兩京雅樂節級樂工共四十人外更添六十人内三十八人宜抽教坊貼部樂官兼充餘二十二人宜令本寺照名充塡仍令三司定支春冬衣糧月報聞奏其舊管四十人亦量添請世宗顯德元年即位有司上太祖廟室酌獻奏明德之舞五年六月命中書舍人竇儼參詳太常雅樂十一月翰林學士竇儼上疏論禮樂刑政之源其一曰請依唐㑹要所分門類上自五帝迄于聖朝凡所施為悉命編次凡關禮樂無有闕漏名之曰大周通禮俾禮院掌之其三曰伏請命博通之士上自五帝迄于聖朝凡樂章沿革總次編録繫于歴代樂録之後永為定式名之曰大周正樂俾樂寺掌之依文教習務在齊肅詔曰竇儼所上封章備陳政要舉當今之急務疾近世之因循器識可嘉辭理甚當故能立事無愧莅官所請編集大用通禮大周正樂宜依仍令于内外職官前資前名中選擇文學之士同共編集具名以聞委儼總領其事所須紙筆下有司供給六年春正月樞密使王朴奉詔詳定雅樂十二律旋相為宫之法幷造律準上之其奏疏略曰夫樂作于人心成聲于物聲氣既和反感于人心者也所假之物大小有數九者成數也是以黄帝吹九寸之管得黄鍾之聲為樂之端也半之清聲也倍之緩聲也三分其一以損益之相生之聲也十二變而復黄鍾之總數也乃命之曰十二律旋迭為均均有七調合八十四調播之于八音著之于歌頌宗周而上率由斯道自秦而下旋宫聲廢洎東漢雖有太子丞鮑鄴興之人亡而政息無嗣續之者漢至隋埀十代凡數百年所存者黄鍾之宮一調而已十二律中惟用七聲其餘五律謂之啞鐘蓋不用故也唐太宗復古道乃用祖孝孫張文牧攷正雅樂而旋宮八十四調復見于時在懸之器方無啞者安史之亂京都為墟器之與工十不存一所用歌奏漸多紕繆逮乎黄巢之餘工器都盡購募不獲文記亦亡集官詳酌終不知其制度時有太常博士商盈孫案周官考工記之文鑄鎛鐘十二編鐘二百四十處士蕭承訓校定石磬今之在懸者是也雖有樂器之狀殊無相應之和逮乎朱梁後唐歴晉與漢皆享國不逺未暇及干禮樂以至于十二鎛鐘不問聲律宮商但循環而擊編鐘編磬徒懸而巳絲竹匏土僅有七聲作黄鍾之宮一調亦不和備其餘八十三調于是乎冺絶樂之缺壊無甚于今陛下天縱文武奄宅中區思復三代之風臨視樂懸親自考聽知其亡失深動上心乃命中書舍人竇儼參詳太常樂事不踰月調品八音粗加和㑹以臣嘗學律歴宣示古今樂録令臣討論臣雖不敏敢不奉詔遂以周法以秬黍校定尺度長九寸虚徑三分為黄鍾之管與見在黄鍾之聲相應以上下相生之法推之得十二律管以為衆管互吹用聲不便乃作律凖十三弦宣聲長九寸張弦各如黄鍾之聲以第八弦六尺設柱為林鍾第三弦八尺設柱為太蔟第十弦五尺三寸四分設柱為南吕第五弦七尺一寸三分設柱為姑洗第十二弦四尺七寸五分設柱為應鍾第七弦六尺三寸三分設柱為㽔賓第二弦八尺四寸四分設柱為大呂第九弦五尺六寸三分設柱為夷則第四弦七尺五寸一分設柱為夾鍾第十一弦五尺一分設柱為無射第六弦六尺六寸八分設柱為中呂第十三弦四尺五寸設柱為黄鍾之清聲十二律中旋用七聲為均為均之主者宫也徵商羽角變宮變徴次焉發其均主之聲歸乎本音之律七聲迭應而不亂乃成其調均有七調聲有十二均合八十四調歌奏之曲由之出焉伏以旋宮之聲乆絶一日而補出臣獨見恐未詳悉望集百官及内外知音者校其得失然後依調制曲八十四調曲有數百見存者九曲而巳皆謂之黄鍾之宮今詳其音數内三曲即是黄鍾宮聲其餘六曲錯雜諸調蓋傳習之誤也唐初雖有旋宫之樂至于用曲多與禮文相違既不敢用唐為則臣又懵學獨力未能備究古今亦望集多聞知禮文者上本古曲下順常道定其義理于何月行何禮合用何調何曲聲數長短幾變㡬成議定而制曲方可乆長行用所補雅樂旋宫八十四調幷所定尺所吹黄鍾管所作律凖謹同上進世宗善之詔尚書省集百官詳議兵部尚書張昭等議曰昔帝鴻氏之制樂也將以範圍天地恊和人神侯八節之風聲測四時之正氣器之清濁不可以筆授聲之善否不可以口傳故鳬氏鑄金伶倫截竹為律呂相生之算宫商正和之音乃播之于管弦宣之于鐘石然後覆載之情訢合陰陽之氣和同八風從律而不奸五色成文而不亂空桑孤竹之韻足以禮神雲門大夏之容無虧觀德然月律有旋宫之法備于太師之職經秦滅學雅道陵夷漢初制氏所調惟存鼓舞旋宫十二均更用之法世莫得聞漢元帝時京房善易别音探求古義以周官均法毎月更用五音乃立凖調旋相為宫成六十調又以日法析為三百六十傳于樂府而編懸復舊律吕無差遭漢中㣲雅音淪缺京房凖法屢有言者事終不成錢褒空記其名沈重但條其説六十律法寂寥不傳梁武帝素精音律自造四通十二笛以鼓八音又引古五正二變之音旋相為宫得八十四調與律潗所調音同數異侯景之亂其音又絶隋朝初定雅樂羣黨沮議歴載不成而沛公鄭譯因龜兹琵琶七音以應月律五正二變七調克諧旋相為宫復為八十四調工人萬寳常又减其絲數稍全古淡隋髙祖不重雅樂令儒官集議博士何妥駁奏其鄭萬所奏八十四調竝廢隋氏郊廟所奏惟黄鍾一均與五郊迎氣雜用㽔賓但七調而巳其餘五鐘懸而不作三朝宴樂用縵樂九部迄于革命未能改更唐太宗受命舊工祖孝孫張文收整比鄭譯萬寳常所均七音八十四調方得絲管竝施鐘石俱奏七始之音復振四廟之韻皆調自安史亂離咸秦盪覆崇牙樹羽之器掃地無餘戞擊搏拊之工窮年不嗣郊廟所奏何異南箕波蕩不還知音始絶臣等竊以音之所起出自人心夔曠不能常㤗人亡則音息世亂則樂崩若不深知禮樂之情安能明制作之本陛下心苞萬化學富三雍觀兵耀武之功已光鴻業尊祖禮神之致尤軫皇情乃睠奉常痛淪樂職親閲四懸之器思復九奏之音爰命廷臣重調鍾律樞密使王朴採京房之凖法練梁武之通音攷鄭譯寳常之七均校孝孫文收之九變積累黍以審其度聽聲詩以測其情依權衡嘉量之前文得備數和聲之大㫖施于鐘虡足洽蕭韶臣等今月十九日于太常寺集命太樂令賈峻奏王朴新法黄鍾調七均音律和諧不相凌越其餘十一管諸調望依新法教習以備禮寺視用其五郊天地宗廟社稷三朝大禮合用十二管諸調竝載唐史開元禮近代常行廣順中太常卿邉蔚奉勅定前件祠祭朝㑹舞名樂曲歌詞寺司合有簿籍伏恐所定與新法曲調聲韻不協請下太常寺檢詳校試如或乖舛請本寺依新法聲調别撰樂章舞曲令歌者誦習永為一代之法以光六樂之書世宗覽奏善之乃下詔曰禮樂之重國家所先近朝巳來雅音廢墜雖時運之多故亦官守之因循遂使擊拊之音空畱梗槩旋相之法莫究指歸樞密使王朴博識古今懸通律吕討尋舊典撰集新聲定六代之正音成一朝之盛事其王朴所奏旋宫之法宜依張昭等議狀行仍令有司依調制曲其間或有疑滯更委王朴裁酌施行自是雅樂之音稍克諧矣右雅樂制作
