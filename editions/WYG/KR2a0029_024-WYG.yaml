body:
  text: 舊五代史巻十一考證梁后妃列𫝊一末帝徳妃張氏案龎元英文昌雜錄云梁均王晉天福中始葬故妃張氏獨存考功員外啇鵬為誌文曰七月有期不見望陵之妾九疑無色空餘泣竹之妃今考五代㑹要徳妃張氏早薨歐陽史次妃郭氏莊宗入宫度為尼是晉天福中尚存者郭妃非徳妃與末帝同葬者徳妃非郭妃也歐陽史不明言同葬者為何妃文昌雜錄誤以尚存者為故妃張氏盖𫝊聞之失實也舊五代史巻十一考證
