body:
  text: 舊五代史巻八宋門下侍郎參知政事監修國史薛居正等撰梁書第八末帝紀上末帝諱瑱初名友貞及即位改名鍠貞明中又改今諱太祖第四子也母曰元貞皇后張氏以唐文德元年戊申嵗九月十二日生於東京帝美容儀性沈厚寡言雅好儒士唐光化三年授河南府參軍太祖受禪封均王時太祖初置天興軍最為親衛以帝為左天興軍使開平四年夏進位檢校司空依前天興軍使充東京馬步軍都指揮使乾化二年六月二日庶人友珪弑逆矯太祖詔遣供奉官丁昭溥馳至東京密令帝害博王友文友珪即位以帝為東京留守行開封尹檢校司徒友珪以簒逆居位羣情不附㑹趙巖至東京從帝私讌因言及社稷事帝以誠欵謀之巖曰此事易如反掌成敗在招討楊令公之手但得一言諭禁軍其事立辦巖時典禁軍洎還洛以謀告侍衛親軍袁象先帝令腹心馬愼交之魏州見師厚且言成事之日賜勞軍錢五十萬緡仍許兼鎭愼交燕人也素有膽辨乃説師厚曰郢王殺君害父簒居大位宫中荒淫靡所不至洛下人情已去東京物望所歸公若因而成之則有輔立之功討賊之効師厚猶豫未决謂從事曰吾于郢王君臣之分已定無故改圖人謂我何愼交曰郢王以子弑父是曰元兇均王為君為親正名仗義彼若一朝事成令公何情自處師厚驚曰幾誤計耳乃令小校王舜賢至洛密與趙巖袁象先圖議時有左右龍驤都在東京帝偽作友珪詔遣還洛下先是劉重遇部下龍驤一指揮于懐州叛經年搜捕其黨帝因遣人激怒其衆曰郢王以龍驤軍嘗叛追汝等洛下將盡坑之翼日乃以偽詔示之通鑑攷異云梁太祖實録丙戌東京言龍驤軍准詔追赴西京軍情不肯進發實友珪徴之非友貞偽作但激怒言坑之耳諸軍憂恐將校垂泣告帝乞指生路帝諭之曰先帝三十餘年經營社稷千征萬戰爾等皆曾從行今日先帝尚落人姧計爾等安所逃避因出梁祖御容以示諸將帝欷歔而泣曰郢王賊害君父違天逆地復欲屠滅親軍爾等茍能自趨洛陽擒取逆竪告謝先帝即轉禍為福矣衆踊躍曰王言是也皆呼萬嵗請帝為主時偽鳯厯元年二月十五日也帝乃遣人告趙巖袁象先傅暉朱珪等十七日象先引禁軍千人突入宫城遂誅友珪事定象先遣趙巖賫𫝊國寳至東京請帝即位于洛陽帝報之曰夷門太祖創業之地居天下之衡北拒并汾東至淮海國家藩鎭多在厥東命將出師利于便近若都洛下非良圖也公等如堅推戴册禮宜在東京賊平之日即謁洛陽陵廟是月帝即位于東京乃去鳯厯之號稱乾化三年詔曰我國家賞功罰罪必叶朝章報德伸免敢欺天道茍顯違于法制雖蹔滯于嵗時終振大綱須歸至理重念太祖皇帝嘗開霸府有事四方迨建皇朝載遷都邑毎以主留重務居守難才慎擇親賢方膺寄任故博王友文才兼文武識達古今俾分憂于在浚之郊亦共理于興王之地一心無易二紀于茲嘗施惠于士民實有勞于家國去嵗郢王友珪常懐逆節已露凶鋒將不利于君親欲竊窺于神器此際値先皇寢疾大漸日臻博王乃密上封章請嚴宫禁因以萊州刺史授于郢王友珪纔覩宣頭俄行大逆豈有自縱兵于内殿却翻事于東都又矯詔書枉加刑戮乃奪博王封爵又改姓名寃恥兩深欺誑何極伏頼上𤣥垂祐宗社降靈俾中外以叶謀致遐邇之共怒尋平内難獲𠞰元兇既雪恥于同天且免譏于共國朕方期遁世敢竊臨人遽迫推崇爰膺纘嗣寃憤既伸于幽顯霈澤宜及于下泉博王宜復官爵仍令有司擇日歸葬云三月丁未制曰朕仰膺天睠近雪家讎旋聞將相之謀請紹祖宗之業羣情見廹三讓莫從祗受推崇懼不負倚方欲蒸嘗寢廟煙類郊丘合徴文體之辭用表事神之敬其或于文尚淺在理未周亦冀隨時别圖制義雖臣子行孝重更名于已孤而君父稱尊貴難知而易避今則䖍遵古典詳考前聞允諧龜筮之占庶合帝王之道載惟凉德尤愧嘉名中外羣寮當體朕意宜改名鍠庚戌以天雄軍節度使充潞州行營都招討使開府儀同三司檢校太尉兼侍中𢎞農郡王揚師厚為檢校太師兼中書令進封鄴王壬戌以夏州節度使檢校太尉同平章事李仁福為檢校太師進封隴西郡王戊辰以邢州保義軍留復檢校太保戴思逺為檢校太傅充邢州節度使庚午以鎭東軍節度副使充兩浙西面都指揮使行睦州刺史馬綽為檢校太傅同平章事領秦州雄武軍節度使進封開國侯是月文武百官上言請以九月十二日帝降誕日為明聖節休假三日從之夏四月癸未以西京内外諸軍馬步軍都指揮使檢校司徒左龍虎統軍濮陽郡開國侯袁象先為特進檢校太保同平章事充鎭南軍節度江南西道觀察處置等使開封尹判在京馬步諸軍事進討開國公増食邑一千戸丁酉宣義軍節度副大使知節度事鄭滑濮等州觀察使檢校太傅長沙郡開國公羅周翰加特進駙馬都尉五月乙已天雄軍節度使楊師厚及劉守竒率魏博邢洺徐兖鄆滑之衆十萬討鎭州庚戌營于鎭之南門外壬子晉將史建塘自趙州領騎五百入于鎭州師厚知其有備自九門移軍于下博劉守竒以一軍自貝州掠冀州衡水阜城陷下博師厚自弓高渡御河逼滄州張萬進懼送欵師厚表請以萬進為青州節度使以劉守竒為滄州節度使詔曰太祖皇帝六月一日大忌朕聞姬周已還並用通喪之禮炎漢之後方行易月之儀厯代相沿萬幾斯重遂為故實難遽改更朕頃遘家寃近平内難倐臨祥制俯迫忌辰音容永逺而莫追號感彌深而難抑將欲表宅憂于中禁是宜輟聽政于外朝雖異常儀願申罔極宜輟五月二十二日至六月二十九日朝叅軍機急切公事即不得留滯並仰畫時聞奏施行宰臣文武百官三上表以國忌廢務多日請依舊制詔報曰朕聞禮非天降固可酌于人情事繫孝思諒無妨于國體今以甫臨忌日暫輟視朝冀全哀戚之情用表始終之節宰臣等累陳章表備述古今慮以萬幾之繁議以五日之請雖兹懇切難盡允俞况保身方荷于洪基敢言過毁而權制獲申于至性必在得中宜自今月二十九日輟至六月七日無煩抑請深體朕懐六月戊子以滄州順化軍節度使并潞鎭定副招討使檢校太傅同平章事張萬進為青州節度使秋九月甲辰以光禄大夫守御史大夫吳興郡開國侯姚洎為中書侍郎平章事十二月庚午以前鄆州節度檢校司徒食邑二千户福王友璋為許州節度使檢校太保是月晉王收幽州執偽燕主劉守光及其父仁㳟歸晉陽乾化四年春正月壬寅以青州節度使張萬進為兖州節度使檢校太尉二月甲戌以感化軍節度使華商等州觀察使檢校太傅同平章事太原郡開國公康懐英為大安尹充永平軍節度使大安金棣等州觀察處置使夏四月丁丑以守司空平章事于兢為工部侍郎尋貶萊州司馬以其挾私與軍校遷改故也是日以行營左先鋒馬軍使濮州刺史王彦章為澶州刺史充行營先鋒步軍都指揮使加光禄大夫檢校太保封開國伯以永平軍節度使檢校太傅同平章事劉鄩為開封尹遥領鎭南軍節度使五月癸丑朔方軍留後檢校司徒韓洙起復授朔方軍節度使檢校太保秋七月晉王率師自黄澤嶺東下冦邢洺魏博節度使楊師厚軍于漳水之東晉將曹進金來奔晉軍遂退九月徐州節度使王殷反時朝廷以福王友璋鎭徐方殷不受代乃下詔削奪殷在身官爵仍令却還本姓蔣便委友璋及天平軍節度使牛存節開封尹劉鄩等進軍攻討是時蔣殷求救于淮南楊溥遣大將軍瑾率衆來援存節等逆擊敗之貞明元年春牛存節劉鄩㧞徐州逆賊蔣殷舉族自燔而死于火中得其屍梟首以獻詔福王友璋赴鎭閏二月甲午延州節度使太原西面招討應接使檢校太師兼中書令渤海郡王髙萬興進封渤海王三月辛酉朔以天平軍節度副大使知節度事兼淮南西北面行營招討應接等使檢校太傅同平章事牛存節為檢校太尉加食邑一千戸賞平徐之功也丁卯以右僕射兼門下侍郎同平章事監修國史判度支趙光逢為太子太保致仕魏博節度使楊師厚薨輟視朝三日初師厚握强兵據重鎭每邀朝廷姑息及薨輟視朝三日或者以為天意租庸使趙巖租庸判官邵贊獻議于帝曰魏博六州精兵數萬蠹害唐室百有餘年羅紹威前㳟後倨太祖每深含怒太祖尸未屬纊師厚即肆隂謀蓋以地廣兵强得肆其志不如分削使如身使臂即無不從也陛下不以此時制之寧知後之人不為楊師厚耶若分割相魏為兩鎭則朝廷無北顧之患矣帝曰善即以平盧軍節度使賀德倫為天雄軍節度使遣劉鄩率兵六萬屯河朔詔曰分疆裂土雖賞勲勞建節屯師亦從機便比者魏博一鎭廵屬六州為河朔之大藩實國家之巨鎭所分憂寄允謂重難將叶事機須期通濟但縁鎭定賊境最為魏博親鄰其次相衛兩州皆控澤潞山口兩道並連于晉土分頭常冦于魏封既須日有戰争未若俱分節制免勞兵力因奔命于兩途稍泰人心俾安居于終日其相州宜建節度為昭德軍以澶衛兩州為屬郡以張筠為相州節度使已丑魏博軍亂囚節度使賀德倫是時朝廷既分魏博六州為兩鎭命劉鄩統大軍屯于南樂以討王鎔為名遣澶州刺史行營先鋒步軍都指揮使王彦章領龍驤五百騎先入于魏州屯于金波亭詔以魏州軍兵之半𨽻于相州并徙其家焉又遣主者檢察魏之帑廩既而德倫促諸軍上路姻族辭決哭聲盈巷其徒乃相聚而謀曰朝廷以我軍府强盛故設法殘破况我六州厯代藩府軍門父子姻族相連未嘗逺出河門離親去族一旦遷于外郡生不如死三月二十九日夜魏軍乃作亂放火大掠首攻龍驤軍王彦章斬關而遁遲明殺德倫親軍五百餘人于牙城執德倫置之樓上有効節軍校張彦者最為麤暴膽氣伏人乃率無頼輩數百止其剽掠是日魏之士庶被屠戮者不可勝紀帝聞之遣使齎詔安撫通鑑夏四月帝遣供奉官扈異撫諭魏軍乃許張彦除郡厚賜將士優賞彦等不遜投詔于地侮罵詔使因廹德倫飛奏請却復相衛抽退劉鄩軍帝復遣諭曰制置已定不可改易如是者三彦等奮臂南向而罵曰傭保兒敢如是也復廹德倫列其事時有文吏司空頲者甚有筆才彦召見謂曰為我更草一狀詞宜抵突如更敢違則渡河擄之乃奏曰臣累拜封章上聞天聽在軍衆無非共切何朝廷皆以為閑半月三軍切切而戈矛未息一城生聚皇皇而控告無門惟希俯鑒丹𠂻茍從衆欲須垂聖允斷在不疑如或四向取謀俱慮六州俱失言非意外事在目前張彦又以楊師厚先兼招討使請朝廷依例授之故復逼德倫奏曰臣當道兵甲素精貔貅極鋭下視并汾之敵平吞鎭定之人特乞委臣招討之權試臣湯火之節茍無顯効任賜明誅詔報曰魏博冦敵接連封疆懸逺凡于應赴須在師徒是以别建節旄各令捍禦并鎭則委魏博控制澤潞則遣相衛枝梧咸逐便安貴均勞逸巳定不移之制宜從畫一之規至于征伐事權亦無定例且臨清王領鎭之日羅紹威守藩以來所領事銜本無招討秪自楊師厚先除陜滑二帥皆以招討兼權因兹帶過鄴中原本本不曾落下茍循事體寧恡施行况今劉鄩指鎭定出征康懐英往邠岐進討秪令統帥師旅亦無招討使銜切宜徧諭羣情勿興浮議倚注之意卿宜體之詔至張彦壊裂抵之于地謂德偷曰梁主不達時機聽人穿鼻城中擾攘未有所依我甲兵雖多須資勢援河東晉王統兵十萬匡復唐朝世與大梁仇讎若與我同力事無不濟請相公改圖以求多福德倫不得巳而從之乃遣牙將曹廷隱奉書求援于太原彦使德倫告諭軍城曰可依河東稱天祐十三年此後如有人將文字于河南往來便仰所在處置是月邠州留後李保衡以城歸順保衡楊崇本養子也崇本乃李茂貞養子任邠州二十餘年去嵗為其子彦魯所毒彦魯領知州事五十餘日保衡殺彦魯送欵于帝即以保衡為華州節度使以河陽留後霍彦威為邠州節度使五月晉王率師赴魏州節度使牛存節薨是月鳯翔李茂貞遣偽署涇州節度使劉知俊率師攻邠州以李保衡歸順故也自是凡攻圍十四月節度使霍彦威諸軍都指揮使黄貴堅守捍冦㑹救軍至岐人乃退六月庚寅晉王入魏州以賀德倫為大同軍節度使舉族遷于晉陽是月晉人陷德州秋七月又陷澶州刺史王彦章棄城來奔通鑑晉人夜襲澶州刺史王彦章在劉鄩營晉人獲其妻子是月劉鄩自洹水潛師由黄澤路西趨晉陽至樂平縣值霖雨積旬乃班師還次宗城遂至貝州軍於堂邑遇晉軍轉鬬數十里晉軍稍退翼日鄩移軍于莘八月賀瓌收復澶州九月以行營先鋒歩軍都指揮使行澶州刺史檢校太保王彦章為汝州防禦使依前行營先鋒步軍都指揮使壬午正衙命使册德妃張氏是夕妃薨冬十月辛亥康王友孜謀反伏誅是夕帝于寢殿熟寐忽聞御榻上寳劍有聲帝遽起視之而友孜之黨巳入于宫中帝揮之獲免清異録末帝夜于寢間擒刺客乃康王友孜所遣帝自戮之造雲母匣貯所用劍名匣曰䕶聖將軍之館壬午葬德妃張氏十一月乙丑改乾化五年為貞明元年十二月乙未詔升華原縣為崇州静勝軍以美原縣為裕州以為屬郡以偽命義勝軍節度使鼎耀等州觀察使特進檢校太保同平章事李彦韜為特進檢校太傅同平章事充静勝軍節度使崇裕等州觀察使河内郡開國侯仍復本姓温名昭圖昭圖華原賊帥也李茂貞以養子以華原為耀州美原為鼎州偽命昭圖為節度使至是歸欵故有是命貞明二年春正月庚申以皇伯父宋州節度使開府儀同三司檢校太師兼中書令廣王全昱為守中書令餘如故通鑑二年春正月宣武節度使守中書令廣德靖王全昱卒以浙江東道營田副使檢校太傅前常州刺史杜建徽􅔨領涇州節度使二月丙申右僕射門下侍郎平章事諸道鹽鐵轉運等使楊涉罷相守左僕射涉累上章以疾辭位故有是命是月命許州節度使王檀河陽節度使謝彦章汝州防禦使王彦章率師自隂地關抵晉陽急攻其壘不克而旋三月劉鄩率師與晉王大戰于故元城鄩軍敗績先是鄩駐于莘帝以河朔危急師老于外餉饋不充遣使賜鄩詔㣲有責讓鄩奏以寇勢方盛未可輕動帝又問鄩决勝之䇿鄩奏曰但人給糧十斛盡則破敵帝不悦復遣促戰鄩召諸將會議諸將欲戰鄩黙然一日引軍攻鎭定之營彼衆大駭上下騰亂俘斬甚衆時帝遣偏將楊延直領軍萬餘人屯澶州以應鄩既而晉王詐言歸太原劉鄩以為信是月召楊延直會于魏城下鄩自莘率軍亦至與延直㑹既而晉王自貝州至鄩引軍漸退至故元城西與晋人决戰大為其所敗追襲至河上軍士赴水死者甚衆鄩自黎陽濟河奔滑州已已制以鄩為滑州宣義軍節度副大使知節度事晉人攻衛州䧟之又䧟惠州夏四月乙酉朔威武軍節度使守太傅兼中書令閩王王審知賜號忠勤保安興國功臣餘如故晉人陷洺州癸卯夜捉生都將李霸作亂龍驤都將杜晏球討平之時遣捉生軍千人戍楊劉軍出宋門外是夜由水門復入二鼓大譟火發燭城李霸與其徒燔建國門不克龍驤都將杜晏球屯鞠場聞亂兵至率騎擊之亂軍退走馬登建國門晏球奏曰亂者惟李霸一軍但守宫城遲明臣必破之未明晏球誅霸及其同惡京師方定是月以行營先鋒步軍都指揮使汝州防禦使王彦章為鄭州防禦使依前先鋒步軍都指揮使五月晉軍還太原六月晉人急攻邢州帝遣捉生都將張温率步騎五百人入于邢州至内黄温率衆降于晉人秋七月甲寅朔晉王自太原至魏州節度使張筠棄城奔京師邢州節度使閻寳以城降于晉王壬戌以淮南鎭東等軍節度使充淮南宣潤等道西面行營都統開府儀同三司尚父守尚書令吳越王錢鏐為諸道兵馬元帥餘如故以左僕射楊涉為太子太傅致仕八月丁酉以開府儀同三司太子太保致仕趙光逢為司空兼門下侍郎平章事𢎞文館太學士延資庫使充諸道監鐡轉運使九月晋王還太原滄州節度使戴思逺棄城來奔晋人陷貝州歐陽史本紀二年九月晋人克貝州守將張源徳死之又死事傳畧云太祖時源德自金兵衛將軍為蔡州刺史貞明元年魏博節度使楊師厚卒末帝分魏相等六州為兩鎮遣劉鄩將兵萬人屯于魏魏軍叛降晋源德為鄩守貝州晋王入魏諸将欲先擊貝州晋王曰貝城小而堅攻之難卒下乃先襲破德州然後以兵五千攻源德源德堅守不下晋軍塹而圍之已而劉鄩大敗于故元城南走黎陽六鎮數十州之地皆歸晋獨貝一州圍之踰年不可下源德守既堅而貝人聞晋已盡有河北城中食且盡乃勸源德出降源德不從遂見殺己夘天平軍節度副大使知節度事檢校太師兼中書令瑯邪郡王王檀薨八月丁酉以開府儀同三司中書侍郎兼吏部尚書同平章事集賢殿大學士判戸部敬翔為右僕射兼門下侍郎平章事監修國史判度支以光禄大夫中書侍郎同平章事鄭珏為特進兼刑部尚書平章事集賢殿大學士判戸部十月晉王自太原至魏州是月前昭義軍節度使檢校太師兼侍中陳留郡王葛從周薨是嵗河北諸州悉入于晋舊五代史巻八
