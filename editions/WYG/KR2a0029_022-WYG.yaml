body:
  text: 舊五代史巻十考證梁末帝紀下宣州節度使錢傳璟宣原本訛亘今據十國春秋改正應宋亳潁鄆齊魏滑案原本脫魏字今據冊府元龜增入充知匭使匭原本作匱考通典唐三省官有知匭使今改正朱友謙襲陷同州節度使程全暉單騎奔京師案歐陽史本紀朱友謙殺節度使程全暉至列傳亦言全暉奔京師紀傳互異宜以是書為正華温琪為静勝軍留後案通鑑作貞明六年事與是書繫龍徳元年異鎮州大將王徳明殺其帥王鎔案五代春秋三月趙人張文禮殺其君鎔是書及通鑑作二月夏四月陳州刺史惠王友能反案歐陽史作三月與是書異詔張漢傑率兵進討漢傑原本作衡傑今據通鑑改正王彦章率舟師自楊村寨浮河而下舟師原本訛州師今據通鑑改正帝召控鶴都將皇甫麟案通鑑考異引莊宗實録作皇甫麟歐陽史從是書作麟舊五代史巻十考證
