body:
  text: 舊五代史巻四十八宋門下侍郎參知政事監修國史薛居正等撰唐書第二十四末帝紀下清泰三年春正月辛夘朔帝御文明殿受朝賀仗衞如式乙未百濟遣使獻方物戊戌幸龍門佛寺祈雪癸夘以給事中充樞密院直學士呂琦為端明殿學士以六軍諸衞判官尚書工部郎中薛文遇為樞密院直學士乙巳以上元夜京城張燈帝微行置酒于趙延壽之第丁未皇子河南尹判六軍諸衞事重美封雍王己未以前司農卿王彦鎔為太僕卿二月戊辰吐渾寧朔兩軍留後李可久加檢校司徒可久本姓白氏前朝賜姓庚子監修國史姚顗史官張眧逺李祥呉承範等修撰明宗實録三十巻上之五代㑹要同修撰官中書舍人張昭逺李祥直館左拾遺呉承範左拾遺揚昭儉等各頒賚有差以大理卿竇維為光禄卿以前許州節度判官張登為大理卿丁丑以太常卿李鏻為兵部尚書以兵部尚書梁文矩為太常卿庚辰以前鄜州節度使皇甫立為潞州節度使辛巳以前均州刺史仇暉為左威衞上将軍保順軍節度使鮑君福加檢校太尉同平章事丁亥以昭義節度使安元信卒廢朝三月庚子中書門下奏準閤門分析内外官辭見謝規例請州判官軍将進奉到闕舊例門見門辭今後只令朝見依舊門辭新除諸道判官書記以下無例中謝並放謝放辭得替到京無例見今後兩使判官許中謝赴任即門辭其書記以下並依舊例朝臣文五品武四品以上舊例中謝止以下無例對謝今請依天成四年正月勑凡升朝官並許中謝諸道都押衙馬步都指揮虞候鎮将諸色塲院無例謝辭並進牓子放謝放辭得替到闕無例入見在京鹽麴税官兩宫巡即許申謝新徐令録並中謝次日門辭兼有口勑誡勵文武兩班所差弔祭使及告廟祠祭只正衙辭不赴内殿諸道進奏官到闕見併假進牓子門辭従之辛丑權知福建節度使王昶奏節度使王延鈞以去年十月十四日卒是時延鈞父子雖僭竊于閩嶺猶稱藩於朝廷故有是奏甲辰以右神武統軍楊漢章為彰武軍節度使丙午以翰林學士禮部侍郎馬𦙍孫為中書侍郎同平章事丁巳以端明殿學士吕琦為御史中丞案通鑑吕琦與李崧建和親契丹之䇿為薛文遇所沮改為御史中丞盖疎之也戊午御史中丞盧損責授右贊善大夫知雜侍御史韋税責授太僕寺丞侍御史魏遜責授太府寺主簿侍御史王岳責授司農寺主簿初延州保安鎮将白文審聞兵興岐下専殺郡人趙思謙等十餘人已伏其罪復下臺追繫推鞫未竟㑹去年五月十二日徳音除十惡五逆放大殺人外並放盧損輕易即破械釋文審帝大怒收文審誅之臺司稱奉徳音釋放不得追領祗證中書誥云徳音言不在追窮枝蔓無不得追領祗證六字擅改勑語大理斷以失出罪人論故有是命是月有蛇鼠鬭于師子門外鼠生而蛇死夏四月己未朔以左衞上将軍王景戡為左神武統軍以右領軍上将軍李頃為華清宫使戊辰以太子詹事盧演為工部尚書致仕辛未以中書舍人史館修撰張昭逺為禮部侍郎以前滄州節度使李金全為右領軍上将軍是月有熊入京城搏人五月辛卯以河東節度使兼大同彰國振武威塞等軍蕃漢馬步總管檢校太師兼中書令駙馬都尉石敬瑭為鄆州節度使進封趙國公以河陽節度使充侍衞馬步軍都指揮使宋審䖍為河東節度使甲午以前晉州節度使大同彰國振武威塞等軍蕃漢副總管張敬達充西北面蕃漢馬步都部署落副總管乙未詔諸州兩使判官畿赤令有闕取省郎遺補丞博少列宫寮選擇擢任以忠正軍節度使侍衞步軍都指揮使張彥琪為河陽節度使充侍衞馬軍都指揮使以彰聖都指揮使饒州刺史符彥饒為忠正軍節度使充侍衞步軍都指揮使丙申以雍王重美與汴州節度使范延光結婚詔兖王従温主之丁酉以國子祭酒馬縞卒廢朝戊戌昭儀奏河東節度使石敬瑭叛以鴻臚卿兼通事舍人判四方館王景崇為衞尉卿充引進使壬寅削奪石敬瑭官爵便令張敬達進軍攻討乙夘以晉州節度使張敬達為太原四面兵馬都部署尋改為招討使以河陽節度使侍衞馬軍都指揮使張彥琪為太原四面馬步軍都指揮使以邢州節度使安審琦為太原四面馬軍都指揮使以陜州節度使相里金為太原四面步軍都指揮使以右監門上将軍武廷翰為壕寨使丙辰以定州節度使楊光逺為太原四面兵馬副部署兼馬步都虞侯尋改為太原四面副招討使都虞侯如故以前彰武軍節度使髙行周為太原四面招撫兼排陣使初帝疑河東有異志與近臣語及其事帝曰石郎與朕近親在不疑之地流年毁譽朕心自明萬一失歡如何和解左右皆不對翼日欲移石敬瑭于鄆州房暠等堅言不可司天監趙延乂亦言星辰失度尤宜安靜由是稍緩其事㑹薛文遇獨宿于禁中帝召之諭以太原之事文遇奏曰臣聞作舍于道三年不成國家利害斷自宸㫖以臣料之石敬瑭除亦叛不除亦叛不如先事圖之帝喜曰聞卿此言豁吾憤氣先是有人言國家明年合得一賢佐主謀平定天下帝意亦疑賢佐者屬在文遇即令手書除目子夜下學士院草制翼日宣制之際兩班失色居六七日敬瑭上章云明宗社稷陛下纂承未契輿情宜推令辟許王先朝血緒養徳皇闈儻循當璧之言免負䦧墻之議帝覽奏不悦手攘抵地召馬𦙍孫草詔報曰父有社稷𫝊之於子君有禍難倚之於親卿于鄂王故非疏逺往嵗衞州之事天下皆知今朝許王之言人誰肯信英賢立事安肯如斯云戊申張敬達奏西北面先鋒都指揮使安審信率雄義左第二指揮二百二十七騎並部下共五百騎剽刼百井叛入太原又奏大軍已至太原城下詔安審信及雄義兵士妻男並處斬家產没官先是雄義都在伏州屯戍其指揮使安元信謀殺伏州刺史張朗事洩戍兵自潰奔安審信軍審信與之入太原太常奏于河南府東權立宣憲太后寢宫従之己酉振武節度使安叔干奏西北界巡檢使安重榮驅掠戍兵五百騎叛入太原以新授河東節度使宋審䖍為宣州節度使充侍衞馬軍都指揮使壬子鄴都屯駐捧聖都虞候張令昭逐節度使劉延皓據城叛翌日令昭召副使邊仁嗣已下逼令奏請節旄六月辛酉天雄軍節度使劉延皓削奪官爵勒歸私第癸亥以天雄軍守禦右捧聖第二軍都虞候張令昭為檢檢司空行右千牛将軍權知天雄軍府事丙寅御敷政殿遣工部尚書崔居儉奉宣憲皇太后寶冊於寢宫時陵園在河東適㑹兵興故權於京城修奉寢宫上諡焉已已以西上閤門副使少府監兼通事舍人劉頎為鴻臚卿職如故庚午詔曰時雨稍愆頗傷農稼分命朝臣祈禱辛未工部尚書致仕許寂卒以權知魏府事右千牛将軍張令昭為齊州防禦使以捧聖右第三指揮使邢立為徳州刺史以捧聖第五指揮使康福進為鄚州刺史甲戌以汴州節度使范延光為天雄軍四面招討使知行府事丙子以西京留守李周為天雄軍四面副招討使兼兵馬都監詔河東将佐節度判官趙瑩以下十四人並籍没家產秋七月戊子范延光奏領軍至鄴都攻城次己丑誅右衞上将軍石重英皇城副使石重裔皆敬瑭之子也時重英等匿於民家井中獲而誅之并族所匿之家奚首領達喇罕遣通事介老奏奚王李素姑謀叛入契丹已處斬訖達喇罕權知本部落事辛夘沂州奏誅都指揮使石敬徳并族其家敬瑭之弟也乙未以前彰武軍節度使髙行周為潞州節度使充太原四面招撫排陣使以潞州節度使皇甫立為華州節度使丁酉雲州節度使沙彥珣奏此月二日夜步軍指揮使桑遷作亂以兵圍于城彥珣突圍出城就西山據雷公口三日招集兵士入城誅亂軍軍城如故辛丑以将作監丞介國公宇文頡為汝州襄城令乙巳以衞尉卿聶延祚為太子賓客戊申范延光奏此月二十一日收復鄴都羣臣稱賀己酉以禮部侍郎張昭逺為御史中丞以御史中丞吕琦為禮部侍郎充端明殿學士庚戌中書奏劉延皓賓佐等帥臣既已削奪其行軍司馬李延筠副使邊仁嗣以下望命放歸田里奏入帝大怒詔大理曰帥臣失守已行削奪其寮佐合當何罪既而竟依中書所奏壬子詔范延光誅張令昭部下五指揮及忠鋭忠肅兩指揮繼范延光奏追兵遣襲張令昭部下敗兵至邢州沙河斬首三百級并獻張令昭邢立李貴等首級又奏獲張令昭同惡捧聖指揮使米全以下諸指揮使都頭凡十三人並磔于府門癸丑左衞上将軍仇暉卒洺州奏擒獲魏府作亂捧聖指揮使馬彥柔以下五十八人邢磁州相次擒獲亂兵並送京師彰聖指揮使張萬迪以部下五百騎叛入太原詔誅家屬于懐州本營八月戊午契丹遣使摩哩入朝己未以汴州節度使范延光為天雄軍節度使守太傅兼中書令以西京留守李周為汴州節度使檢校太尉同平章事癸亥應州奏契丹三千騎迫城詔端明殿學士吕琦徃河東忻代諸屯戍所犒軍以左龍武大将軍袁㠖為右監門上将軍以振武軍節度使安叔千充代北兵馬都部署己巳雲州沙彥珣奏供奉官李讓勲送夏衣到州縱酒淩轢軍都行刼殺兵馬都監張思殷都指揮使党行進其李讓勲已處斬訖張敬達奏造五龍橋攻太原城次戊寅以鎮州節度使董温琪充東北面副招討使己夘洺州獻野蠒二十斤辛巳張敬達奏賊城内出騎軍三十隊步卒三十人衝長連城髙行周襲殺入壕溺死者大半擒賊将安小喜以下百餘人甲馬一百八十匹九月甲辰張敬達奏此月十五日與契丹戰于太原城下王師敗績時契丹王自率部族來援太原髙行周符彥卿率左右廂騎軍出鬭蕃軍引退已時後蕃軍復成列張敬達楊光逺安審琦等陣於賊城西北倚山横陣諸将奮擊蕃軍屢郤至晡我騎軍将移陣蕃軍如山而進王師大敗投兵仗相籍而死者山積是夕收合餘衆保于晉祠南晉安寨蕃軍塹而圍之自是音聞阻絶朝廷大恐是日遣侍衛步軍都指揮使符彥饒率兵屯河陽詔范延光率兵由青山路趨榆次詔幽州趙徳鈞由飛狐路出敵軍後輝州防禦使潘環合防戍軍出磁隰以援張敬達以前絳州刺史韓彥惲為太子賓客契丹王移帳於栁林乙巳詔取二十二日幸北面軍前戊申帝發京師路經徽陵帝親行謁奠夕次河陽召羣臣議進取盧文紀勸帝駐河橋庚戌樞密使趙延壽先赴潞州辛亥幸懐州召吏部侍郎龍敏訪以機事敏勸帝立東丹王賛華為契丹主以兵援送入蕃則契丹王有後顧之患不能久駐漢地矣帝深以為然竟不行其謀遼史義宗𫝊云倍雖在異國常思其親問安之使不絶後明宗養子従珂弑其君自立倍密報太宗曰従珂弑君盍討之是東丹王實啟兵端唐君臣或知其隂謀故龍敏之説不行帝自是酣飲悲歌形神慘沮臣下勸其親征則曰卿輩勿説石郎使我心膽墮地其怯憊也如此冬十月丁巳夜彗星出虚危長尺餘壬戌詔天下括馬又詔民十户出兵一人器甲自備契丹國志唐發民為兵每七户出征夫一人自備鎧仗謂之義軍凡得馬二千餘匹征夫五千人民間大擾戊辰代州刺史張朗超授檢校太保以其屢殺敵衆故以是命奨之癸酉幽州趙徳鈞以本軍三千騎與鎮州董温琪由呉兒谷趋潞州十一月戊子以趙徳鈞為諸道行營都統以趙延壽為河東道南面行營招討使以劉延朗副之庚寅以范延光為河東道東南面行營招討使以李周副之帝以吕琦嘗佐幽州幕乃命賫都統官告以賜徳鈞兼犒軍士琦至従容宣帝委任之意徳鈞曰既以兵相委焉敢惜死徳鈞志在併范延光軍奏請與延光㑹合帝以詔諭延光延光不従丁酉延州上言節度使楊漢章為部衆所殺以前坊州刺史劉景嚴為延州留後庚子趙徳鈞奏大軍至團柏谷前鋒殺蕃軍五百騎范延光奏軍至榆次蕃軍退入河東川界潘環奏隰州逐退蕃軍壬寅趙徳鈞奏軍出谷口蕃軍漸退契丹王見駐栁林砦時徳鈞累奏乞授延壽鎮州節制帝怒曰徳鈞父子堅要鎮州茍能逐退蕃戎要代予位亦甘心矣若翫寇要君但恐犬兎俱斃徳鈞聞之不悦閏月丙辰日南至羣臣稱賀于行宫帝曰晉安寨内将士應思家國矣因泣下久之丁巳以岢嵐軍為勝州辛酉以右龍武統軍李従昶為左龍武統軍以前邠州節度使楊思權為右龍武統軍壬戌丹州刺史康承詢停任配流鄧州時承詢奉詔率義軍赴延州義軍亂承詢奔鄜州故有是責甲子太原行營副招討使楊光逺殺招討使張敬達于晉安寨以兵降契丹時契丹圍寨自十一月以後芻糧乏絶軍士毁居屋茅淘馬糞削松柹以供䬴飼馬尾鬛相食俱盡楊光逺謂敬達曰少時人馬俱盡不如奮命血戰十得三四猶勝坐受其弊敬達曰更少待之一日光逺伺敬達無備遂殺之與諸将同降契丹時馬猶有五千匹戎王並以漢軍與石敬瑭其馬及甲仗即齎驅出塞丁夘戎王立石敬瑭為大晉皇帝約為父子之國改元為天福戎王與晉髙祖南行趙徳鈞父子與諸將自團柏谷南奔王師為蕃騎所蹙投戈棄甲自相騰踐擠于巖谷者不可勝紀己巳帝聞晉安寨為敵所陷詔移幸河陽時議以魏府軍尚全戎王必憚山東未敢南下車駕可幸鄴城帝以李崧與范延光相善召入謀之薛文遇不知而繼至帝變色崧躡文遇足乃出帝曰我見此物肉鸇適擬抽刀刺之崧曰文遇小人致誤大事刺之益醜崧因請帝歸京壬申車駕至河陽甲戌晉髙祖與戎王至潞州戎王遣蕃将大詳衮率五千騎送晉髙祖南行丁丑車駕至自河陽時左右勸帝固守河陽居數日符彥饒張彥琪至奏帝不可城守是日晚至東上門小黄門鳴鞘於路索然無聲己夘帝遣馬軍都指揮使宋審䖍率千餘騎至白馬阪言踏陣地時諸将謂審䖍曰何地不堪交戰誰人肯立于此審䖍乃請帝還宫庚辰晉髙祖至河陽辛巳辰時帝舉族與皇太后曹氏自燔于𤣥武樓晉髙祖入洛得帝燼骨于火中來年三月詔葬于徽陵之封中帝在位二年年五十二五代史闕文晉髙祖引契丹圍晉安寨降楊光逺清泰帝至自覃懐京師父老迎帝於上東門外帝垂泣不止父老奏曰臣等伏聞前唐時中國有難帝王多幸蜀以圖進取陛下何不且入西川帝曰本朝兩川節度使皆用文臣所以𤣥宗僖宗避寇幸蜀今孟氏已稱尊矣吾何歸乎因慟哭入内舉族自焚史臣曰末帝負神武之才有人君之量由尋戈而踐阼慙徳應深及當宁以居尊政經未失屬天命不祐人謀匪臧坐俟焚如良可悲矣稽夫衽金甲于河壖之際斧眺樓于梁壘之時出沒如神何其勇也及乎駐革輅于覃懐之日絶羽書于汾晉之辰涕淚霑襟何其怯也是知時之來也雕虎可以生風運之去也應龍不免為醢則項藉悲歌于帳下信不虚矣舊五代史卷四十八
