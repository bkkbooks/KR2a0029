body:
  text: 舊五代史巻二十一攷證梁列𫝊十一龎師古𫝊始表為天平軍節度留後尋授徐州節度使案師古先為留後繼授節度通鑑止作留後誤霍存𫝊用本部騎兵敗秦賢軍秦賢王䖍裕𫝊作秦宗賢有賊升眺樓大詬眺樓原本作昭樓今据歐陽史改符道昭𫝊符道昭淮西人案歐陽史作蔡州人徐懐玉𫝊授左羽林統軍案歐陽史作右羽林統軍郭言𫝊破盱貽而還案通鑑作言力戰得免梁祖紀亦作不克而還與此𫝊異李唐賓𫝊時溥軍于吴康吴康原本訛吴唐今據歐陽史改正王䖍裕𫝊時太祖大軍方討兖鄆未及救援案通鑑攷異云是時全忠方攻時溥未討兖鄆也𫝊誤劉康乂𫝊尋遷宻州刺史宻州原本訛宣州今據新唐書昭宗紀改正王彦章𫝊彦章字賢明鄆州夀張縣人也賢明歐陽史作子明夀張歐陽史作夀昌領保鑾騎士數千于東路守捉案歐陽史從家𫝊作五百人又作畫像記極辨舊史領數千人以往之非攷通監云梁主命王彦章將保鑾士及他兵合萬人屯兖鄆之境又通鑑李嗣源敗彦章于遞坊鎮獲將士三百人斬首二百級使彦章所將止于五百恐師徒盡喪不應尚能再戰也彦章忠于所事力竭而亡非戰之罪歐陽史必欲減其兵數轉非實録舊五代史巻二十一攷證
