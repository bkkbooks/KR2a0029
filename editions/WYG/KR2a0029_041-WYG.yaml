body:
  text: 舊五代史巻二十宋門下侍郎參知政事監修國史薛居正等撰梁書第二十列𫝊十謝瞳字子明福州人唐咸通末舉進士因畱長安三歲不中第廣明初黄巢陷長安遂投跡于太祖洎居門下未嘗一日不在左右及太祖據同州遂署右職其年秋太祖與河中交戰再不利連上章請兵于巢僞右軍都尉孟楷抑而不進瞳揣太祖有澤福意乃進説曰黃家以數十萬之師値唐朝久安人不習戰因利乘便遂下兩京然始竊僞號任用已失其所今將軍勇冠三軍力戰于外而孟楷專務壅蔽奏章不達下爲庸才所制無獨斷之明破亡之兆必矣况土德未厭外兵四集漕運波注日以收復爲名惟將軍察之太祖曰我意素决爾又如是復何疑哉翼日遂定策戮僞監軍使悉衆歸順于河中王重榮表瞳爲檢校屯田員外郎賜緋令奉表于蜀唐僖宗大悦召入顧問錫賚甚厚以功授朝散大夫太子率更令賜紫爲陵州刺史治郡一歲改檢校右散騎常侍通刺史在任四考頗有政績秋罷詣蜀行在太祖遣人迎之龍紀二年至東京勞賚彌厚賜第墅各一區錢千緡表爲亳州團練使兼太清宫副使加檢校工部尚書是年冬太祖征淮南過郡因求侍府幕表爲宣義軍節度副使充兩使畱後瞳在滑十三年部内増户約五萬益兵數千人累遷至大中大夫檢校右僕射卒于滑開平初追贈司徒司馬鄴字表仁其先河内温人也祖德璋仕唐爲杞王傅父諲左武衛大將軍鄴資䕃出身頗知書累官至大列唐天復初韓建用爲同州節度畱後昭宗之幸鳳翔也太祖引兵入關前鋒至左馮翊鄴持印鑰迎謁道左太祖以兵圍華州命入城招諭韓建建果出降及大軍在岐下遣奏事于昭宗再入復出又使于金州説其帥馮行襲俾堅攀附後厯宣武天平等軍從事開平元年拜右武衛上將軍三年使于兩浙時淮路不通乘驛者迂迴萬里陸行則出荆襄潭桂入嶺自畨禺泛海至閩中達于杭越復命則備舟楫出東海至于登萊而揚州諸步多賊舩過者不敢循岸必高帆逺引海中謂之入陽以故多損敗鄴在海逾年漂至躭羅國一行俱溺後詔贈司徒劉捍開封人父行仙宣武軍大將捍少爲牙職太祖初鎭夷門以捍聰敏擢副典客唐中和四年夏太祖以朱珍爲淄州刺史令收兵于淄青間命捍監其兵路逄大敵皆破之入博昌獲精兵三萬以歸四月合大軍敗蔡賊秦宗賢數萬衆于汴西文德元年十一月蔡將申叢折宗權足納欵于太祖使捍奏其事加兼御史大夫光化三年六月太祖北伐鎭定至常山而王鎔危懾送欵于太祖命捍入璧門傳諭時兩軍未整守門者戈㦸千匝捍馳騎而入竟達其命又移師以攻中山至懐德驛大破定人五萬衆王處直乞降捍復單馬入州安撫而迴太祖迎昭宗于岐下以捍爲親軍指揮天復三年正旦宋文通令客將郭啓竒使于太祖命捍復命昭宗聞其至卽召見詢東兵之事仍以錦服銀鞍勒馬賜之翼日授光禄大夫檢校司空登州刺史昭宗還京改常州刺史賜號迎鑾毅勇功臣四月太祖伐王師範于青州改左右長直都指揮使天祐三年正月授宋州刺史四月加檢校司徒太祖授禪授左龍虎統軍兼元從親軍馬步都虞候及上黨纒兵太祖親往廵撫以捍爲御營使大軍次昻車斥候來告蕃戎逼澤州命捍以兵千人赴之并軍遂遁車駕還京授捍侍衛親軍都指揮使晉人侵晉州從幸陜迴加檢校太保及從駕幸河中詔追王重師赴行在以捍爲雍州節度觀察畱後纔踰月劉知俊據同州反潛使人以厚利啗捍將校遂爲部下所執送于知俊知俊縶捍歸于鳳翔爲李茂貞所害開平四年贈太傅末帝卽位又贈太尉捍便習賓贊善于將迎自司賓局及征討四出必預其間雖無决戰争鋒之績而承命奔走敷揚命令勤幹涖職以至崇顯焉王敬蕘潁州汝隂人世爲郡武吏唐乾符初敬蕘爲本州都知兵馬使中和初冦難益熾郡守庸怯不能自固敬蕘遂代之監郡俄眞拜刺史加檢校右散騎常侍時州境荒饑大冦繼至黃巢數十萬衆寨于州南敬蕘極力抗禦逾旬而退俄又宗權之衆凌暴益甚合圍攻壁皆力屈而去蔡賊復遣將刁君務以萬衆來逼敬蕘列陣當之身先馳突殺敵甚多由是竟全郡壘逺近歸附及淮人不恭太祖屢以軍南渡路由州境敬蕘悉心供億太祖甚嘉之乾寧二年署爲㳂淮上下都指揮使四年冬龎師古敗于清口敗軍逃歸者甚衆路出于潁時雨雪連旬軍士凍餒敬蕘自淮燎薪相屬于道郡中設糜糗餅餌以待之全活者甚衆由是表知武寧軍節度徐宿觀察畱後數月眞拜武寧軍節度使天復二年入爲右龍武統軍天祐三年轉左衛上將軍開平元年八月以疾致仕尋卒于其第敬蕘魁傑沈勇多力善戰所用槍矢皆以純鐵鍜就槍重三十餘斤摧鋒突陣率以此勝雖非太祖舊臣而逺輸懇欵保境合兵以輔興王之運有足稱者高劭字子將淮南節度使騈之從子也父泰黔中觀察使唐僖宗避敵在蜀駢鎭淮南爲都統兼諸道鹽鐵使兵賦在已朝廷優假之以故劭幸而早官年十四遙領華州刺史光啓中以駢命逼晉公王鐸于鄭俄而州陷于蔡劭爲賊所得使人守之戒四門曰無出高大夫劭伺守者稍惰佯爲乞食者過危垣取殍者衣坌身易服得佗兒抱之行出東郊門人以爲丐者不之止及稍逺棄所抱兒疾趨至中牟遂達于汴太祖以客禮遇之尋表爲亳州團練副使知州事又數年辟爲宣武軍節度判官在幕下頗以氣直自許後監鄭州事復權知徐州畱後唐昭宗之鳳翔太祖迎奉未出劭有疑謀遂令赴華州詣丞相府以議其事行至高陵爲盗所害馬嗣勲濠州鍾離縣人世爲軍吏嗣勲有口辯習武藝初爲州客將唐景福元年三月太祖以壽州刺史江儒反下蔡鎭使李立率兵攻濠梁刺史張遂俾嗣勲持州印籍户口以歸于太祖乾寧二年三月楊行密復攻濠州張遂遣嗣勲求援于太祖俄而郡陷嗣勲無所歸卽署爲元從押牙副典客頗稱任使光化元年三月太祖令往光州説刺史劉存背淮賊以向國又從李彦威復黃州及武昌縣獲刺史瞿章俄復使光州持幣馬以賜劉存㑹淮賊急攻光州存與嗣勲率兵大戰敗而走之又遣使于蜀及歸得其助軍貲實甚多天復中太祖迎昭宗于岐下軍至華之西闉使嗣勲入見韓建卽時同出迎謁及羅紹威將殺牙軍遣使告于太祖求爲外援時安陽公主初卒于魏太祖乃遣嗣勲率長直官千人實兵仗于槖中肩舁以入于魏聲言來致祭㑹葬牙軍不之覺天祐三年正月十六日夜嗣勲與紹威親軍同攻牙軍至曙盡殪之嗣勲重傷旬日而卒開平中累贈太保張存敬譙郡人也性剛直有膽勇臨危無所畏憚唐中和中從太祖赴汴以其折節頗見親昵授爲右騎都將從討巢蔡凡歴百戰多于危慼之間顯有竒畧由是頻立殊効光啓中李罕之㑹晉軍圍張宗奭于盟津太祖遣丁㑹葛從周存敬同往馳救存敬引騎軍先犯敵將諸軍翼之敵騎大敗乃解河橋之圍大順三年爲諸軍都虞侯佐霍存董大軍收宿州以功奏加檢校兵部尚書太祖東征徐兖存敬屢有俘斬之功凡受指顧皆與機㑹矢石所及必以身先太祖尤加優異以爲行營都指揮使檢校右僕射乾寧三年充武寧軍畱後行潁州刺史光化二年夏四月幽滄侵凌魏郡復以存敬爲都指揮使三年大舉與葛從周連統諸軍攻浮陽樹數十柵圍劉守文累月時幽州劉仁恭舉兵來援存敬潛軍擊之于乾寧軍南老鴉堤是日燕人大敗斬首五萬級生擒馬愼交已下一百餘人獲馬萬蹄其年秋九月引軍收鎭州存敬勒衆渉滹沲河師人鼓行而進逄鎭之遊兵數千因逐之直入鎭之壅門收鞍馬牛駞萬計翼日鎭人納質而旋尋爲宋州刺史踰年甚有能政復擁衆伐薊門數旬間連下瀛莫祁景四州擒俘不可勝紀自懷德驛與中山兵接戰枕屍數十里中山開壁請降天復元年春太祖以河中節度使王珂與太原結親憑恃驕恣命存敬統大軍討之即日收絳州擒刺史陶建釗降晉州刺史張漢瑜二郡平進圍河中王珂請降太祖嘉之乃以存敬爲䕶國軍畱後未幾檢校司空尋移宋州刺史將之任所寢疾踰旬卒于河中太祖聞之痛惜移晷開平初追贈太保乾化三年又追贈太傅子仁愿晉天福中仕至大理冦彦卿字俊臣大梁人也祖琯父裔皆宣武軍牙校太祖鎭汴以彦卿將家子擢在左右弱冠選爲通贊官太祖爲元帥補元帥府押牙充四鎭通贊官行首兼右長直都指揮使累奏授檢校司徒領洺州刺史羅紹威將殺牙軍遣使告于太祖太祖命彦卿使于魏密與紹威謀之竟成其事彦卿之力也彦卿身長八尺隆凖方面語音如鐘善騎射好書史復善伺太祖之旨凡所作爲動皆云合太祖每言曰敬翔劉捍冦彦卿蓋爲我而生其見重如此太祖有所乘烏馬號一丈烏嘗以賜彦卿天復中太祖迎昭宗于鳳翔累與岐軍對陣時彦卿爲諸道馬步軍都排陣使嘗躬擐甲胄乘其所賜烏馬馳騁于陣前太祖目之曰眞神王也昭宗還京賜迎鑾毅勇功臣改邢州刺史尋遷亳州團練使案通鑑開平二年帝從呉越王錢鏐之請以亳州團練使冦彦卿爲東南面行營都指揮使使擊淮南十一月彦卿帥衆一千襲霍丘爲土豪朱景所敗又攻廬壽二州皆不勝淮南遣滁州刺史李儼拒之九國志朱景傳梁祖聞景名命冦彦卿率勁騎三千襲霍丘圖取景且諭梁祖之意令降景率其徒戰于丘墟林澤中射死者無數彦卿兵折力殫而去太祖受禪爲華州節度使加檢校太保歲餘入爲左金吾衛大將軍充街使一日過天津橋有老人悞衝其騶道者排之落橋而斃爲御史所彈太祖不得已責授左衛中郎將不數月除相州防禦使依前行營諸軍排陣使未幾授河陽節度使加檢校太傅及太祖遇弑彦卿追感舊恩圖御容以奠之每因對客言及先朝舊事卽涕泗交流末帝嗣位遥領興元節度使東南面行營都招討使以拒淮冦尋改右金吾衛上將軍貞明初授鄧州節度使㑹淮人圍安陸彦卿奉詔領兵解圍大破淮賊而迴四年卒于鎭時年五十七詔贈侍中彦卿貞幹明敏善事人主然怙寵作威多忌好殺雖顯立功名而猶爲識者之所鄙焉史臣曰案原本有闕文存敬有提鼓之勞彦卿遇攀鱗之㑹俱爲藩后亦其宜哉舊五代史巻二十
