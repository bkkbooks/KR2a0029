body:
  text: 舊五代史巻五十九攷證唐列𫝊十一丁㑹傳梁祖季年猜忌故將功大者多遭族滅會隂有避禍之志案梁祖季年無誅戮大臣之事考朱珍李讜先後為梁祖所殺丁會葢鑒於前事也見通鑑考異閻寶𫝊梁祖以寶為節度使檢校太傅案歐陽史太祖時為諸軍都虞候末帝時以寶為保義軍節度使與是書詳畧先後互異符習𫝊飛揚痛飲飛揚原本作飛鷹今攷杜詩痛飲狂歌空度日飛揚跋扈為誰雄鷹字疑揚字之訛今改烏震𫝊移易州刺史易州歐陽史作冀州詔贈太傅太傅歐陽作太師張温傅案温於潼闗擒劉知浣見梁紀此𫝊不載舊五代史巻五十九攷證
