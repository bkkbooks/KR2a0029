body:
  text: 舊五代史巻七十九攷證晉書高祖紀五五月丙戌安州節度使李金全叛詔新授安州節度使馬全節以洛汴汝鄭單宋陳蔡曹濮十州之兵討之案五代春秋五月李金全叛附于吳馬全節帥師討安州呉人救安州全節敗呉師克安州金全奔呉六月放呉俘還歐陽史作五月李金全叛六月克安州馬令南唐書作六月安州節度使李金全來降遣鄂州屯營使李承裕帥師迎之紀月互異執其僞都監杜光鄴僞都監馬令南唐書作監軍通事舎人尋遣使押光鄴等太子太師致仕范延光卒于河陽廢朝二日案歐陽史作西京畱守楊光逺殺太子太師范延光考本傳延光本爲楊光逺推墮溺水死爲之輟朝諱之也於桐墟渡淮桐墟原本作桐廬据通鑑注引九域志云宿州蘄縣有桐墟鎮自桐墟而南至渦口則濟淮矣今改正丁卯案歐陽史作九月丁卯原本疑有脱字𤼵并鎮忻代四州山谷吐渾令還舊地案晉逐吐谷渾在天福六年通鑑與是書同考天福六年即遼㑹同四年也遼史作會同三年晉以并鎮忻代之吐谷渾來歸與是書異甲戌北京遣牙將劉從以吐渾大首領白承福念龎里赫連功徳來朝案通鑑四月辛巳北京畱守李徳珫遣牙校以吐谷渾酋長白承福入朝是書作五月甲戌與通鑑異歐陽史從是書鎮州節度使安重榮執契丹使伊喇案遼史作二月晉安重榮執使者伊喇是書作六月先後互異實里舊作舎利今改伊喇舊作拽刺今改舊五代史巻七十九攷證
