body:
  text: 舊五代史巻一百二十九宋門下侍郎參知政事監修國史薛居正等撰周書第十九列傳九常思字克恭太原人也父仁岳河東牙將累贈太子太師唐莊宗之為晉王也廣募勝兵時思以趫悍應募累從戎役後為長直都校歴捧聖軍使晉初遷六軍都虞候漢高祖出鎮并門奏以思從行尋表為河東牢城都指揮使以勤幹見稱漢國初建授檢校太保遥領鄧州漢有天下遷檢校太尉昭義軍節度使乾祐初李守貞叛於河中太祖征之朝廷命思帥部兵以副焉既而御衆無能勒歸舊藩思在上黨凡五年無令譽可稱唯以聚欽為務性又鄙恡未嘗與賓佐有酒肴之㑹嘗有從事欲求謁見者思覽刺而怒曰彼必是來獵酒也命典客者飲而遣之其鄙恡也如是太祖受命就加平章事初太祖微時以季父待思及即位遣其妻入覲太祖拜之如家人之禮仍呼為叔母其恩顧如是廣順二年秋思來朝加兼侍中移鎮宋州三年夏詔赴闕改授平盧軍節度使思將赴鎮奏太祖云臣在宋州出鎮得絲十餘萬兩謹以上進請行徴督太祖頷之尋詔本州折劵以諭其民及到鎮未㡬染風痺之疾上表請尋醫既而舁疾歸洛顯徳元年春卒年六十有九贈中書令翟光鄴字化基濮州鄄城人父景珂倜儻有膽氣梁貞明初唐莊宗始駐軍于河上景珂率聚邑人守永定驛固守踰年後為北軍所攻景珂戰歿衆潰光鄴時年十歳為明宗軍所俘以其頴悟俾侍左右字之曰永定既冠沈毅有謀莅事寡過明宗即位時深委遇累遷至皇城使檢校司空長興中樞密使安重誨得罪時光鄴與中官孟小僧頗有力焉居無何出為耀州團練使清泰初入為左監門衛太將軍晉天福中歴棣沂二州刺史西京副留守開運初授宣徽使楊光逺叛滅青州平除為防禦使朝廷以兵亂之後人物彫弊故命光鄴理之光鄴好聚書重儒者虛齊論議唯求理道時郡民䘮亡十之六七而招懷撫諭視之如傷故朞月之間流亡載輯契丹入汴偽命權知曹州李從益假號以光鄴明宗舊臣署為樞密使漢祖至汴改左領衛大將軍乾祐初遷右金吾衛大將軍充街使檢校太保太祖踐阼復授宣徽使左千牛衛上將軍檢校太傅數月兼樞密副使㑹永興李洪信入朝代知軍府事廣順二年十月卒于長長安時年四十六光鄴有器度慎密敦厚出於天然喜愠不形於色事繼母以孝聞兄弟皆雍睦雖食禄日久家無餘貲任金吾日假官屋數間以蔽風雨親族累重糲食纔給人不堪其憂光鄴處之晏如也賔朋至則貰酒延之談説終日略無厭倦士大夫多之及權知京兆以寛静為治前政有煩苛之事一切停罷百姓便之及病甚召親隨于卧内戒之曰氣絶之後以死歸洛不得于此停留慮煩軍府言訖而終京兆吏如喪所親或有以漿酒遥奠者樞密使王峻素重光鄴且欲厚䘏其家為之上請故自終及塟所賜賻賵㡬數千計詔贈太子少師光鄴膚革肥晳善于攝養故司天監趙延又有袁許之術嘗謂人曰翟君外厚而内薄雖貴而無壽果如其言曹英字徳秀舊名犯今上御名故改焉本常山鎮定人父全武事趙王王鎔為列校英因得𨽻于鎔之帳下及張文禮之亂唐莊宗奄有其地乃錄鎔之左右署為散指揮使明宗即位英侍于仗下問其祖考英以實對明宗曰乃朕之舊也擢為本班行首每加顧遇晉天福中遷弩手軍使平張從賔于汜水以功授本軍都校漢初改奉國軍主加檢校司徒兼康州刺史乾祐初李守貞據河中叛授行營歩軍都校河中平遷本軍廂主領岳州防禦使隨太祖在魏為北面行營歩軍都校從平内難國初以翊戴功授昭武節度使檢校太傅侍衞歩軍都指揮二年春總兵討慕容彦超于兖州梯衝塹壘頗力焉夏五月太祖親征因併兵攻䧟其城及凱旋領彰信軍節度使典軍如故世宗嗣位加同平章事授成徳軍節度使車駕自太原廽加兼侍中顯徳元年冬卒於鎮時年四十九制贈中書令英性沈厚謙㳟有禮雖衽席之際接對賔客亦未嘗造次及卒縉紳之士亦皆惜之李彦頵字徳循太原人也本以商賈為業太祖鎮鄴寘之左右及即位歴綾錦副使㩁易使世宗嗣位以彦頵有舊超授内客省使未㡬知相州軍府事尋改延州兵馬留後到鎮頗以殖貨為意窺圖䞉利侵漁蕃漢部人羣情大擾㑹世宗南征蕃部結聚圍廹州城彦頵閉壁自守求援于隣道頼救兵至乃解世宗不悦徴赴京師然猶委曲庇䕶竟不之責尋為西京水南廵檢使居無何命權知泗州軍州事改滄州兩使留後彦頵到任處置乖方大為物情所鄙顯徳六年秋受代歸闕遇疾而卒時年五十二李暉字順光瀛州束城人弱冠應募于龍驤軍漢祖領河東暉請從因得署為河東牙將漢有天下授檢校司徒大内皇城使未㡬遷宣徽南院使乾祐初拜河陽節度使檢校太傅太祖登極加同平章事尋移鎮滄州顯徳元年就加兼侍中二年秋以世宗誕慶節來朝改邠州節度使五年移鎮鳯翔歳餘卒於鎮優詔贈中書令暉之儀貌不及于常人而位極將相年登耳順袁許之術夫何恃哉然性貪鄙而好小惠以邀虛譽故在河陽及滄州日民皆詣闕請以碑以頌其美識者亦未之許也李建崇潞州人少從軍善騎射初事唐武皇為鐵林都將轉突騎飛騎二軍使從莊宗攻常山案巴堅來援莊宗率親軍千騎遇于滿城兵少為契丹所圍時建崇為親將與契丹格鬭自午至申㑹李嗣昭騎至契丹乃解去同光中自龍武捧聖都指揮使出歴襄秦徐雍都指揮使建崇性純厚處身任遇不能巧宦以致久滯偏裨明宗嘗掌牙兵與建崇共事及即位甚愍之連授磁沁二郡入晉為申州刺史天福七年冬襄州安從進搆逆率衆冦南陽時建崇領歩騎千餘屯於葉縣開封尹鄭王遣宣徽使張從恩皇城使焦繼勲卒在京諸軍㑹建崇軍拒賊至湖陽縣之花山遇從進軍建崇接戰大敗之以功授亳州團練使襄陽平遷安州防禦使歴河陽邢州兵馬留後漢初入為右衛大將軍年逾七十神氣不衰建崇始自代北事武皇至是四十餘年前後所掌兵麾下部曲多至節鉞零落殆盡唯建崇雖位不及藩屏而康强自適以至朞耄太祖即位授左監門衛上將軍廣順三年春卒贈黔南節度使王重裔陳州宛丘人父逹歴安均洺三州刺史因家于洺重裔幼沉厚有勇善騎射年未及冠事莊宗為㕔直管契丹直從安汴洛累為禁軍指揮使晉天福中鎮州安重榮謀叛稱兵指闕朝廷命杜重威率師拒之賊陣于宗城東晉遣騎軍擊之再合不動杜重威懼謀欲抽退重裔曰兵家忌退但請公分麾下兵擊其兩翼重裔為公䧟陣當其中軍彼必狼狽矣重威從之重榮即時退䠞遂敗以功遷䕶聖右廂都指揮使領費州刺史漢初仍典禁軍從征鄴都平遷深州刺史淮夷以李守貞故數侵邊地以重裔為亳州防禦使又令于徐州廵檢兼知軍州就加檢校太傅太祖踐阼加爵邑改功臣廣順元年夏以疾卒孫漢英太原人也父重進事唐武皇莊宗為大將賜姓名存進唐書有傳漢英少事戎伍稍至都將嘗為東面馬軍都指揮使清泰初興元節度使張度釗失律于岐下遂以其地西臣於蜀漢英兄漢韶時為洋州節度使因兹阻隔亦送欵于蜀由是漢英與弟漢筠久之不調漢乾祐中太祖西征蒲雍以漢英戚里之分秦于軍中指使蒲雍平班師隠帝以漢英為綘州刺史檢校司徒廣順元年冬卒於都許遷鄆州人也初為本州牙將性剛褊漢乾祐初為左屯衛將軍與少府監馬從斌同監造漢祖山陵法物節財省用减數萬計改左監門大將軍又加檢校司空漢末權知隰州太祖踐阼劉崇遣子鈞率兵㓂平陽路由于隰賊衆攻城城中兵少遷感激指諭士鬭兼倍賊衆傷夷尋自退去太祖降詔撫諭正授隰州刺史遷切于除盜嫉惡過當或釘磔賊人令部下臠割悮斷不合死罪人其家詣闕致訟詔下開封府獄時陳觀為知府素與遷不協深劾其事欲追遷對訟太祖以事狀可原但罷郡而已遷既奉朝請因大詬陳觀謂王峻曰相公執政所與參議宜求賢徳如陳觀者為儒無家行為官多任情茍知其微屠沾兒恥與為侣况明公乎峻無以沮之既而嬰疾請告歸汶上而卒趙鳯冀州棗强縣人幼讀書舉童子既長兇豪多力以殺人暴掠為事吏不能禁安重榮鎮常山招聚叛亡鳯乃應募既而犯法當死即破械踰獄遁而獲免天福中趙延壽為契丹鄉導歳侵深翼鳯往依焉宋史荆罕儒傳罕儒少無賴與趙鳯張輦為羣盜晉天福中相率詣范陽委䞇燕王趙延壽得掌兵權契丹主素聞其桀黠署為羽林軍使累遷羽林都指揮使常令將兵在邊貝冀之民日罹其患晉末契丹入洛鳯從至東京授宿州防禦使漢祖即位受代歸闕尋授河陽行軍司馬乾祐初入為龍武將軍丁父憂起復授右千牛衛大將軍漢末都城變起兵集之夜無不剽之室唯鳯里閭兵不敢犯人皆服其膽勇廣順初用為宋亳宿三州廵檢使鳯出於伏莽尤知盜之隠伏乃誘致盜魁於麾下厚待之每桴鼓之發無不擒捕衆以為能然平民因捕盜而破家者多矣鳯善事人或使臣經由靡不傾財厚奉故得延譽而掩其醜迹太祖聞其幹事用為單州刺史既剛忿不仁得位愈熾刑獄之間尤為不道常抑奪人之妻女又以進奉南郊為名率歛部民財貨為人所訟廣順三年十二月詔削奪鳯在身官爵尋令賜死齊藏珍少歴内職累遷諸衛將軍前後監押兵師在外頗稱幹事然險詖無行殘忍辯給無不畏其利口廣順中奉命滑州界廵䕶河隄以弛慢致河决除名配沙門島世宗在西班時與藏珍同列每聆其談論或剖判世務似有可采及即位自流所徴還秦鳯之役命監偏師及淮上用兵復委監䕶與軍校何起領兵降下光州藏珍欺隠官物甚多超以為不可藏珍曰沙門島已有屋數間不妨再去矣其不畏法也如此世宗既破紫金山砦追吴㓂至渦口因與藏珍言及克㨗之狀對曰陛下神武之功近代無比于文徳則未光世宗頷之又問以揚州之事對曰揚州地實卑濕食物例多腥腐臣去歳在彼人以鱓魚饋臣者視其盤中虬屈一如虵虺之狀假使鸛鵲有知亦應不食豈况於人哉其敷奏大率多此類聞者無不悚然一日又奏云唐景思已為刺史臣猶未䝉聖澤世宗俛而從之時濠梁未下即命為濠州行州刺史及張永徳與李重進有間言藏珍嘗游説重進洎壽陽兵迴諸將中有以藏珍之言上奏者世宗怒急召赴闕四年夏以其冐稱檢校官罪按其事而斃之葢不欲暴其惡跡也王環本真定人唐天成初孟知祥鎮西川環往事之及知祥建號環累典軍衛孟昶嗣位環常宿衛于中顯徳二年秋王師西伐時環為鳯州節度使初偏師傅其城下為環所敗裨將胡立為環所擒是冬王師大集急攻其城蜀之援兵相次敗走環聞之守備愈堅王師攻擊數月方克城陷環就擒及到闕世宗以忠於所事釋其罪授右驍衛大將軍四年冬世宗南征環隨駕至泗州遇疾而卒張彦超本沙陀部人也素有郤克之疾時號為跛子初以騎射事唐莊宗為馬直軍使莊宗入汴授神武指揮使明宗嘗以為養子天成中擢授蔚州刺史素與晉高祖不恊屬其總戎于太原遂舉其城投於契丹即以為雲州節度使契丹之南侵也彦超率部衆頗為鎮魏之患及契丹入汴遷侍衛馬軍都校尋授晉昌軍節度使漢高祖入洛彦超飛表輸誠移授保大軍節度使乾祐初奉詔歸闕止奉朝請而已太祖自鄴入平内難隠帝令彦超董騎軍為拒劉子陂兵亂彦超先謁見太祖廣順中授神武統軍顯徳三年冬以疾終於第制贈太子太師張頴太原人駙馬都尉永徳之父也宋史列傳永徳并州陽曲人家世饒財曽祖丕尚氯節後唐武皇鎮太原急於用度多嚴選富家子掌帑庫或調度不給即坐誅沒入貲産丕為之滿歳府財有餘宗人政當次補其任率族屬泣拜請丕濟其急丕又為代掌一年鄉里服其義也累為藩郡列校由内職歴諸衛將軍國初以戚里之故自華州行軍司馬歴郢懷二州刺史遷安州防禦使頴性下急峻刻不容人之小過雖左右親信亦皆怨之部曲曹澄有處女頴逼而娶之澄遂與不逞之徒數人同謀害頴中夜挾刄入於寢門執頴而殺之遂奔於金陵世宗征淮南以永徳之故遣江南李景令執澄等送行在及至世宗以澄等賜永徳俾甘心而戮之劉仁贍略通儒術好兵書在澤國甚有聲望吴主知之累遷為偽右監門衛將軍歴黄袁二州刺史所至稱治洎李景僭襲偽位俾掌親軍遷鄂州節度使居數年復以兵柄任之改壽州節度使及王師渡淮而仁贍固守甚堅洎世宗駐驛于其壘北數道齊攻填塹陷壁晝夜不息如是者累月世宗臨城以諭之而仁贍但遜詞以謝及車駕還京命李重進總兵守之得乘間陷我南砦自是圍之愈急城中饑死者甚衆三年冬淮冦復來救援列砦于紫金山夾道相屬纍然數十里埀及壽璧而重進兵㡬不能支世宗患之遂復議親征車駕至壽春命今上率師破紫金山之衆擒其應援使陳承昭以獻仁贍聞援兵既敗計無所出但扼吭浩嘆而已㑹世宗以紫金山之㨗飛詔以諭之時仁贍卧疾已亟因飜然納欵而城内諸軍萬計皆屏息以聽其命及見於行在世宗撫之甚厚賜與加等復令入城養病尋授天平軍節度使兼中書令制出之日薨于其家年五十八世宗聞之遣使弔祭命内臣監䕶喪事追封彭城郡王後以其子崇讚為懷州刺史仁贍輕財重士法令嚴肅重圍之中其子崇諫犯軍禁即令斬之故能以一城之衆連年拒守逮其來降而其下未敢竊議者保其後嗣抑有由焉崇讚仕周累為郡守㓜子崇諒後自江南歸於本朝亦位至省郎舊五代史巻一百二十九
