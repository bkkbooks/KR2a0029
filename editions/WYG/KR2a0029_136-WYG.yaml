body:
  text: 舊五代史巻六十七攷證唐列𫝊十九盧程𫝊盧程唐朝右族祖懿父藴案歐陽史作不知其世家何人趙鳳𫝊以為䕶鑾學士案五代會要作䕶鑾書制學士拜鳳中書舍人及入汴改授禮部員外郎案歐陽史作拜中書舍人翰林學士李愚𫝊歴許鄧觀察判官案歐陽史作罷為鄧州觀察判官屬趙鳳出鎮邢臺乃拜中書侍郎平章事案歐陽史任圜罷相乃拜愚中書侍郎同平章事吳縝簒誤云明宗紀天成二年六月任圜罷長興二年李愚為平章事自任圜罷至此巳五年矣與愚入相年月太逺盖史之所書本謂趙鳳而誤為任圜也任圜𫝊嗣昭為帥於軍圜代總其事案歐陽史作嗣昭戰殁圜代將其軍先是使人食劵皆出於户部食劵通鑑作館劵清泰中制贈太傅案歐陽史作愍帝即位贈圜太傅是書作廢帝清泰中未是孰是舊五代史巻六十七攷證
