body:
  text: 舊五代史巻五十八攷證唐列傳十趙光逢𫝊父隠右僕射案舊唐書作左僕射僖宗朝登進士第僖宗原本作昭宗據舊唐書光逢係乾符五年進士當作僖宗今改正時有道士許巖士許巖士原本脱士字今據新唐書及通鑑増入李琪𫝊敬方子縠廣明中為晋公王鐸都統判官案太平廣記引李琪集序作父敬佐王鐸滑州幕考李琪祖名敬方其父不得名敬疑太平廣記𫝊冩之訛戍馬四百匹四百原本作四千今據漢書改正以太子太傅致仕案太傅歐陽史作少傅舊五代史巻五十八攷證
