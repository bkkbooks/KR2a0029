body:
  text: 舊五代史巻五十一考證唐宗室列𫝊三薛王存禮武皇子案是書不言存禮為武皇第㡬子據五代㑹要太祖第二子存美第三子存霸第四子存禮第五子存渥第六子存乂第七子存確第八于存紀與是書所叙微有異同魏王繼岌莊宗子也案莊宗紀稱繼岌為第三子然莊宗長子次子之名是書及五代會要俱不載従璨明宗諸子案五代㑹要以従璨為明宗第四子冊府元龜作諸子與明宗紀同今仍其舊従益召髙行周武行徳欲拒漢髙祖案是書但載従益拒漢事考宋史趙上交𫝊云漢祖将至従益遣上交馳表獻欵盖獻欵乃淑妃従益本意也歐陽史兩存之其事始備舊五代史巻五十一考證
