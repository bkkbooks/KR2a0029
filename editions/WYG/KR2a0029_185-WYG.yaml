body:
  text: 舊五代史巻九十二攷證晉列傳七姚顗𫝊惟兵部侍郎司空圗深器之案歐陽史作中條山處士司空圗一見竒之据新唐書卓行傳司空圗為戸部侍郎以疾歸昭宗在華台為兵部侍郎辭不赴是圗非處士也吕𤦺傳琦年十五案厚徳録作琦年十四有趙玊者趙玊厚徳録作李玊尋率郡兵千人間道而歸案通鑑作帥州兵趣鎮州史圭傳卒于路案歐陽史作卒于常山盧導傳祖伯卿案新唐書宰相世系表卿太原少尹伯初之子也疑原本衍伯字父如晦如晦新唐書世系表作如晦郊迎可也郊迎通鑑作班迎是日潞王未至馮道等止于上陽門外又令導草勸進牋案歐陽史作潞王止于上陽門外道又促導草牋與是書異通鑑作潞王未至三相息于上陽門外與是書同鄭韜光𫝊父顥案新唐書世系表顥字養正疑顥字是頣字之訛王權傳先是宰相馮道使于契丹纔回權亦自鳯翔册禮使回案通鑑攷異引周世宗實録馮道傳云契丹遣使加徽號于晉祖晉亦獻徽號于契丹始命兵部尚書王權銜其命權辭以老病晉祖謂馮道曰此行非卿不可道無難色据此𫝊馮道自契丹使回始命王權奉使道亦未嘗再使契丹也與周實録異舊五代史巻九十二攷證
