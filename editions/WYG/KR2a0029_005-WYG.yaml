body:
  text: 舊五代史巻二宋門下侍郎叅知政事監修國史薛居正等撰梁書第二太祖紀二光化元年正月帝遣葛從周統諸將畧地於山東遂次於邢洺三月昭宗以帝兼領天平軍節度使餘如故四月滄州節度使盧廷彥為燕軍所攻棄城奔於魏魏人送於汴是月帝以大軍至鉅鹿屯於城下敗晉軍萬餘衆於青山口俘馬千餘匹丁夘遣從周分兵攻洺州斬刺史邢善益擒將五十餘人五月己巳邢州刺史馬師素棄城遁去辛未磁州刺史袁奉滔自剄而死五日之内連下三州因以葛從周兼邢州昭義軍節度使留後帝遂班師是時襄州節度使趙匡凝聞帝軍有清口之敗密附於淮夷七月帝遣氏叔琮率師伐之未幾其泌州刺史趙璠越墉來降隨州刺史趙匡琳臨陣就擒二年正月淮南楊行密舉全呉之衆精甲五萬以伐徐州帝領大軍禦之行密聞帝親征乃收軍而退時幽州節度使劉仁恭大舉蕃漢兵號十萬以伐魏遂攻䧟具州州民萬餘户無少長悉屠之進攻魏州魏人來乞師帝遣朱友倫張存敬李思安等先屯於内黄帝遂親征三月與燕軍戰於内黄北燕軍大敗殺二萬餘衆奪馬二千餘匹擒都將單無敵己下七十餘人通鑑單可及幽州驍將號單無敵是月葛從周自山東領其部衆馳以救魏翼日乘勝諸將張存敬以下連破八寨遂逐燕軍北至於臨清壅其殘冦於御河溺死者甚衆仁恭奔於滄州六月帝表丁會為潞州節度使以李罕之疾亟故也又遣葛從周由固鎭路入於潞州以援丁會七月壬辰朔海州陳漢賓擁所部三千奪於淮南戊戌晉人䧟澤州帝遣召葛從周於潞畱賀徳倫以守之未幾德倫為晉人所逼遂棄潞而歸繇是潞州復為晉人所有十一月陜州都將朱簡殺畱後李璠自稱畱後送款於帝三年四月遣葛從周以兖鄆滑魏之師伐滄州五月庚寅攻德州拔之梟刺史傳公和於城上己亥進攻浮陽六月燕帥劉仁恭大舉來援從周與諸將逆戰於乾寧軍老鵶隄大破之殺萬餘衆俘其將佐馬愼交已下百餘人既而以連雨遂班師八月河東遣李進通襲䧟洺州執刺史朱紹宗帝遣葛從周自鄴縣渡漳水屯於黄龍鎭親領中軍渉沙而寨晉人懼而宵遁洺州復平九月帝以仁恭進通之入冦也皆繇鎭定為其囊橐卽以葛從周為上將以伐鎮州遂攻下臨城渡滹沱以環其城帝領親軍繼至鎭帥王鎔懼納質請盟仍獻文繒二十萬以犒戎士帝許之十月晉人以帝宿兵於趙遂南下大行急攻河陽畱後候言與都將閻寳力戰固守僅而獲全十一月以張存敬為上將自甘陵發軍北侵幽薊連拔瀛莫二郡遂移軍以攻中山定帥王郜以精甲二萬戰於懐德亭盡殪之郜懼奔於太原遲明大軍集於城下郜季父處直特印鑰乞降亦以繒帛三十萬為獻帝即以處直代郜領其鎭焉是月燕人劉守光赴援中山寨於易水之上繼為康懷英張存敬等所敗斬獲甚衆繇是河朔知懼皆弭伏焉是歳唐左軍中尉劉季述幽昭宗於東宫内立皇子徳王裕為帝仍遣其養子希度來言願以唐之神器輸於帝帝時方在河朔聞之遽還於汴大計未决會李振自長安使迴因言於帝曰夫竪刁伊戾之亂所以資覇者之事也今閹竪幽辱天子王不能討無以令諸侯帝悟因請振復使於長安與時宰潛謀反正天復元年正月乙酉朔唐宰相崔𦙍潛使人以帝密㫖告於侍衛軍將孫德昭己下令誅左右中尉劉季述王仲先等即時迎昭宗於東内御樓反正癸己降制進封帝為梁王酬反正之功也昭宗之廢也汴之邸吏程巖牽昭宗衣下殿帝聞之召巖至汴折其足送於長安杖殺之是時河中節度使王珂結援於太原帝怒遣大將張存敬率將渉河繇舎山路鼓行而進戊申攻下絳州壬子晉州刺史孟漢瑜舉郡来降帝即以大將侯言權領晉州何絪權領絳州晉絳平己未大軍至河中存敬命繚其垣而攻之壬戌蒲人颺表幡以請降庚午帝至河中以張存敬權領河中軍府事河中平帝乃東還是月李克用遣牙將張特來聘請尋舊好帝亦遣使報命三月癸未朔帝歸自河中是月遣大將賀德倫氏叔琮領大軍以伐太原叔琮等自太行路入魏博都將張文恭自磁州新口入葛從周以兖鄆之衆自土門路入洺州刺史張歸厚以本軍自馬嶺入定州刺史王處直以本軍自飛狐入晉州侯言自隂地入澤州刺史李存璋棄郡奔歸太原叔琮引軍逼潞州節度使孟遷乞降河東屯將李審建王周領歩軍一萬騎二千詣叔琮歸命乃進軍趨太原四月乙邜大軍出石會關營於洞渦驛都將白奉國自井陘入收承天軍張歸厚引兵至遼州刺史張鄂迎降氏叔琮即日與諸軍至陽城下城中雖時出精騎來戰然危蹙己甚將謀遁矣會叔琮以芻糧不給遂班師五月癸夘昭宗以帝兼領䕶國軍節度使河中尹六月庚申帝發自大梁丁夘視事於河中以素服出郊拜故節度使王重榮墓尋辟其子瓚為節度判官請故相張濬為重榮撰碑帝自中和初歸唐首依重榮至是思其舊徳故思禮若是七月甲寅帝東還梁邸十月戊戌奉密詔赴長安是時朝廷既誅劉李述以韓全誨張𢎞彦為兩軍中尉袁易簡周敬容為樞密使是時軍國大政專委宰相崔𦙍每事裁抑宦官宦官側目𦙍一日於便殿奏欲盡去之全誨等屬垣聞之嘗於昭宗前祈哀自訴自是昭宗敇𦙍每有密奏令進囊封全誨等乃訪京城美婦人十數以進使求宫中隂事昭宗不悟𦙍謀漸泄中官視𦙍眥裂以重賂甘言誘藩臣以為城社時因讌聚則相向流涕時𦙍掌三司貨泉全誨等教禁兵伺𦙍出聚而呼譟訴以冬衣減損又於昭宗前訴之昭宗不得已罷𦙍知政事𦙍怒急召帝請以兵入輔故有是行戊申行次河中同州留後司馬鄴華之幕吏也舉郡來降辛亥駐軍於渭濱華帥韓建遣使奉牋納款又以銀三萬兩助軍是日行次零口癸丑聞長安亂昭宗為閹官韓全誨等劫遷西幸鳯翔蓋避帝之兵鋒也翼日遂命旋師夕次於赤水乙夘大軍集於州城下韓建惶駭失措即以城降丙辰帝表建權知忠武軍事促令赴任同華二州平是時唐太子太師盧知猷等二百六十三人列狀請帝速請迎奉已未遂帥諸軍發自赤水壬戌次於咸陽偵者云天子昨暮至岐山旦日宋文通扈蹕入其闉矣是時岐人遣大將符道昭領兵萬人屯於武功以拒帝帝遣康懷英敗之擄甲士六千餘衆乙丑次於岐山文通遣使奉書自陳其失請帝入覲丙辰及岐闉文通遣渝約閉壁不獲通復次於岐山是時昭宗累遣使齎朱書御札賜帝遣帝收軍還本道帝診之曰此必文通全誨之謀也皆不奉詔癸酉飛章奉辭且移軍北伐乙亥至邠州節度使李繼徽舉城降繼徽因請去文通所賜李姓復本宗楊氏又請納其帑以為質帝皆從之仍易其名曰崇本邠州平己丑唐丞相崔𦙍京兆尹鄭元規至華州以速迎奉為請許之二年正月帝復次於武功岐人堅壁不下乃迴軍於河中二月聞晉軍大舉南下聲言來援鳯翔帝遣朱友寧帥師會晉州刺史氏叔琮以禦之帝以大軍繼其後三月友寧叔琮與晉軍戰於晉州之北大敗之生擒克用男廷鸞帝喜謂左右曰此岐人之所恃也今既如此岐之變動不久矣四月岐人遣符道昭領大軍屯於虢縣康懷英帥驍騎敗之丁酉唐丞相崔𦙍自華來謁帝屢述艱運危急事不可緩又慮羣閹擁昭宗幸蜀且告帝帝為動容𦙍將辭啓宴於府署帝舉酒𦙍情激於哀因自持樂版聲曲以侑酒帝甚悦座中以良馬珍玩之物賚旣行命諸將繕戎具五月丁丑帝復西征六月丁丑次於虢縣癸未與岐軍大戰自辰至午殺萬餘衆擒其將校數百人乘勝遂逼其壘七月丙午岐軍復出求戰帝軍不利是月遣孔勍帥師取鳯隴成三州皆下之是時岐人相率結寨於諸山以避帝軍帝分兵以討浹旬之内并平之九月甲戌帝以岐軍諸寨連結稍盛因親統千騎登高診之時秋空澄霽烟靄四絶忽有紫雲如繖葢凝於龍旌之上久之方散觀者咸訝之是時帝以岐人堅壁不戰且慮師老思欲旋斾以歸河中因密召上將數人語其事時親從指揮使高季昌獨前出抗言曰天下雄傑窺此舉者一歳矣今岐人己困願少俟之帝嘉其言因曰兵法貴以正理以竒勝者詐也乘機集事必由是乎乃命季昌密募人入岐以紿之尋有騎士馬景堅願應命且曰是行也必無生理願録其孥帝悽然止其行景固請乃許之明日軍出北夢瑣言云時因朱友倫總騎軍且至將大出兵迓之諸寨屏匿如無人景因躍馬西走直叩岐闉詐以軍怨東遁為告且言列寨尚畱萬餘人俟夕將遁矣宜速掩之李茂貞信其言案李茂貞即宋文通此紀前後互異葢仍當時軍撽之文未及改從畫一遽啓二扉悉衆來冦時諸軍以介馬待之中軍一鼓百營俱進又分遣數騎以據其闉岐人進不能駐其趾退不能入其壘殺戮蹂踐不知其數茂貞繇是喪胆但閉壁而己十一月癸夘鄜帥李周彞新唐書作李茂勲茂勲即周彛也統兵萬餘人屯於岐之北原與城中舉􅇏以相應翼日帝以周彞旣離本部鄜畤必無守備因命孔勍乘虚襲下之甲寅鄜州平周彞聞之收軍而遁茂貞旣失鄜州之援愕然有瓦解之懼繇是議還警蹕誅閹寺以自贖焉三年正月甲寅岐人啓壁唐昭宗降使宣問慰勞兼傳密㫖尋又命翰林學士韓渥趙國夫人寵顔齎詔押賜帝紫金酒器御衣玉帯丙辰華州畱後李存審遣飛騎來告青州節度使王師範遣牙將張厚輦甲胄弓槊詐言來獻欲盗據州城事覺已擒之矣是日師範又遣其將劉鄩盗據兖州丁已昭宗遣中使押送軍容使韓全誨己下三千餘人首級以示帝甲子昭宗發離鳯翔幸左劔寨權駐蹕帝營帝素服待罪昭宗命學士傳宣免之帝即入見稱罪拜伏者數四既而促召升殿密邇御座且曰宗廟社稷是卿再造朕與戚屬是卿再生因解所御玉帯面以賜帝帝亦以玉鞍勒馬金銀器紋錦御饌酒菓等躬自拜進焉及翠華東行帝匹馬前導十餘里宣令止之己巳昭宗至長安謁太廟御長樂樓禮畢謂帝曰朕生入舊京是卿之力也自古救君之危曾無有如是者况今日再及清廟得親奉觴酒奠於先皇帝室前卿之德朕知不能報矣即召帝執手聲淚者久之翼日誅宦官第五可範等五百餘人於内侍省三月庚辰制以帝為守太尉兼中書令宣武宣義天平䕶國等軍節度使諸道兵馬副元帥加食邑三千户實封四百户仍賜囘天再造竭忠守正功臣戊戌帝建斾東還昭宗御延喜樓送之旣醉遣内臣賜帝御製楊桞詞五首三月戊午至大梁時以青州未平命軍士休澣以俟東征四月丙子巡師於臨朐亟命逼其城與青州兵戰於城下大敗之是夕淮將王景仁以所部援軍宵遁帝遣楊師厚追及輔唐殺千人乘勝攻下密州八月戊辰以伐叛之柄委於楊師厚帝乃東還九月癸夘師厚率大軍與王師範戰於臨朐青軍大敗殺萬餘人并擒師範第師克即時徙寨以逼其城辛亥偏將劉重覇擒棣州刺史邵播來獻播師範之謀主也帝命斃之戊午師範舉城請降青州平翼日分命將校畧地於登萊淄棣等州皆下之繇是東漸至海皆為梁土也帝復命師範權知青州軍州事師範乃請以錢二十萬貫犒軍帝許之十月辛巳䕶駕都指揮使朱友倫因擊鞠墮馬卒於長安訃至帝大怒以為唐室大臣欲謀叛已致友倫暴死十一月丁酉青將劉鄩舉兖州來降鄩王師範之將也師範令竊據兖州久之及聞師範降鄩乃歸命帝以鄩善事其主待之甚優鄩署為元帥府都押牙權知鄜州畱後天祐元年正月己酉帝發自大梁西赴河中京師聞之為之震懼是時將議迎駕東幸洛陽慮唐室大臣異議帝乃密令䕶駕都指揮使朱友諒矯昭宗命收宰相崔𦙍京兆尹鄭元規等殺之又邠岐兵士侵逼京畿帝因是上表竪請昭宗幸洛昭宗不得已而從之帝乃率諸道丁匠財力同搆洛陽宫不數月而成二月乙亥昭宗駐蹕于陜帝自河中來覲謁見行營因灑涕而言曰李茂貞等竊謀禍亂將迫乘輿老臣無狀請陛下東遷為社稷大計也昭宗命延于寢室見何皇后面賜酒器及衣物何后謂帝曰此後大家夫婦委身于全忠矣因欷歔泣下後數日帝開宴于陜之私第請駕臨幸翼日帝辭歸洛陽昭宗開内宴時有宮人與昭宗附耳而語韓建躡帝之足帝遽出以為圖己因連上章請車駕幸洛十國春秋呉世家三月丁巳唐帝遣問使以絹詔告難于我及西川河東等令紏率藩鎮以圖匡復詔有云朕至洛陽則為全矣忠所幽閉詔敇皆岀其手朕意不得復通三月丁未昭宗制以帝兼判左右神䇿及六軍諸衛事是時昭宗累遣中使及内夫幸洛帝以陜州小藩非萬乘久畱之地期以四月内東幸閏月丁酉昭宗發自陜郡壬寅次于糓水是時昭宗左右唯小黄門及打毬供奉内園小兒二百餘人帝猶忌之是日密令醫官許昭逺告變乃設饌于别幄召而盡殺之皆坑于幕下先是選二百餘人形貌大小一如内園人物之狀至是使一人擒二人縊于坑所即䝉其衣及戎具自飾昭宗初不能辨久而方察自是昭宗左右前後皆梁人矣甲辰車駕至洛都帝與宰相百官導駕入宫乙夘昭宗以帝為宣武宣義䕶國忠武四鎮節度使時帝請以鄆州援張全義故有此命五月丙寅昭宗宴羣臣曰昨來御樓前一夜亡失赦書賴梁王收得副本不然誤事宰執不得無過矣是日宴次昭宗入内召帝于内殿曲宴帝不測其事不敢奉詔又曰卿不欲來即令敬翔入來帝密遣翔出乃止己已奉辭東歸乙亥至天梁六月帝遣都將朱友裕率師討邠州節度使楊崇本叛故也癸丑帝西征遂朝于洛陽七月甲子昭宗宴帝于文思鞠塲乙丑帝發東都壬申至河中八月壬寅昭宗遇弑于大内遺制以輝王祝為嗣乙巳帝自河中引軍而西癸丑次于永夀邠軍不出九月辛未班師十月癸已至洛陽詣西内臨于梓宫前祗見于嗣君辛丑制以案此下有闕文帝至自西征十一月癸酉光州遣使來求援時光州歸款于帝尋為淮人所攻故來乞師戊寅帝南征度淮次于霍丘大掠廬夀之境淮人乃棄光州而去二年正月庚申進攻夀州夀人堅壁不出丁亥帝自霍丘班師二月辛夘帝至自南征甲午青州節度使王師範至大梁帝待以賓禮尋表援河陽節度使七月辛酉天子賜帝迎鑾紀功碑樹于洛陽庚午遣大將軍楊師厚率前軍討趙匡凝于襄州辛未帝南征表趙匡凝罪狀削奪官爵八月楊師厚進収唐鄧復鄂隨均房等七州帝駐軍漢江北自循江干經度濟師之所九月甲子師厚于隂谷江口造梁以濟師趙匡凝率兵二萬振于江濱師厚麾兵進擊襄人大敗殺萬餘衆乙丑趙匡凝焚其舟率親軍載經舸沿漢而遁丙寅帝濟江至中流舟壊將没者數四比及岸舟沉是日入襄城帝因周視府署帑藏悉空惟于西廡下有一亭牕户儼然扃鎻甚密遂令破鎻啓扉中有一大匱緘鐍甚至又令破其匱内有金銀數百錠帝因歎曰亂兵旣入公私財貨固無孑遺矣此帑當有隂物主之不令常人所得俟我以有之耶遂以百餘錠賜楊師厚襲荆州畱後趙匡明棄城上陜奔蜀荆襄二州平帝以都將賀瓌權領荆州楊師厚權領襄州即表其事十月丙戌朔天子以帝為諸道兵馬元帥辛夘帝自襄州引軍由光州路趨淮南將發敬翔切諫請班師以全軍勢帝不聽壬辰次于棗陽遇大雨頗阻師行之勢軍至夀春夀春人堅壁清野以待帝帝乃遷舎于正陽十一月丙辰大軍北濟十國春秋柴再用抄其復軍斬首三千級獲輜重萬計帝至汝隂深悔淮南之行躁煩尤甚師友雜志朱全忠嘗與僚佐及遊客坐于大栁之下全忠獨言曰此樹宜為車轂衆莫應有遊客數人起應曰宜為車轂全忠勃然厲聲曰書生輩好順口玩人皆此類也車須用夾轂栁木豈可為之顧左右數十人捽言為車轂者悉撲殺之丁夘帝至自南征辛未天子命帝為相國總百揆以宣武宣義天平䕶國天雄武順佑國河陽義武昭義保義武昭武定泰寧平盧匡國武寧忠義荆南等二十一道為魏國案舊唐書尚有忠武鎮國二道此闕載進封帝為魏王入朝不趨劔履上殿贊拜不名兼備九錫之命癸未唐中書門下奏中書印已送相國中書公事權用中書省印甲申中書門下奏天下州縣名與相國魏王家諱同者請易之十二月乙酉朔帝讓相國魏王九錫之命丙戌京百司各差官齎本司須知孔目竝印赴魏國送納甲午天子以帝堅讓九錫之命乃命宰相栁燦來使且述揖讓之意焉丁酉帝又讓九錫之命詔畧曰但以鴻名難掩懿實須彰宜且徇于奏陳未便行于典册又改諸道兵馬元帥為天下兵馬元帥是時帝以唐朝百官服飾多闕乃製造逐色衣服請朝廷等第賜之其所給俸錢仍請自來年正月全支三年正月幽滄稱兵將冦于魏魏人乞師且以牙軍驕悍謀欲誅之遣親吏臧延範密告于帝帝隂許之乙丑北征先是帝之愛女適羅氏是月卒于鄴城因以兵仗數千事實于橐中遣客將馬嗣勲領長直軍千人雜以工匠丁夫肩其橐而入于魏聲言為帝女設祭魏人信而不疑庚午夜嗣勲率其衆與羅紹威親軍數百人同攻牙軍遲明盡殺之死者七千餘人洎于嬰孺亦無畱者是月帝次于内黄聞之馳騎至魏時魏之大軍方與帝軍同伐滄州聞牙軍之死即時奔還帝之軍追及厯亭殺賊幾千餘衆乃擁大將史仁遇保于高唐帝遣兵圍之是月天子詔河南尹張全義部署修制相國魏王法物三月甲寅天子命帝總判鹽鐵度支户部等三司事帝再上章切讓之乃止四月癸未攻下高唐軍民無少長皆殺之生擒逆首史仁遇以獻帝命支解之未幾又攻下澶博貝衛等州皆為魏軍殘黨所據故也是時晉人圍邢州刺史牛存節堅壁固守帝遣符道昭帥師救之晉人乃遁去五月帝畧地于洺州旣而復入于魏七月己未自魏班師是日收復相州自是魏境悉平壬申帝歸自魏八月甲辰以滄州未平復命北征九月丁夘營于長蘆一夕帝夢白龍附于兩肩左右瞻顧可畏怳然驚寤十月辛己邠州楊崇本以鳯翔邠寧涇鄜秦隴之衆合五六萬來冦屯于美原列十五寨其勢甚盛帝命同州節度使劉知俊都將康懷英帥師禦之知俊等大破邠冦殺二萬餘衆奪馬三千餘匹擒其列校百餘人楊崇本胡章僅以身免十一月庚戌懐英乘勝進軍遂收鄜州十二月乙丑帝以文武常叅官每月一五九日赴朝奏請備廊飡詔從之遂自長蘆班師案以上疑有闕文據舊唐書哀帝紀戊辰李克用與幽州之衆同攻潞州全忠守將丁會以澤潞降太原克用以其子嗣昭為畱後甲戌全忠燒長蘆營旋軍聞潞州陷故也以寨内糗糧山積帝命焚之滄帥劉守文以城中絶食因致書於帝乞畱餘糧以救饑民帝為畱十餘囷以與之容齊續筆滄州還師悉焚諸營資糧在舟中者鑿而沈之守文遺全忠書曰城中數萬口不食􅂾月矣與其焚之為煙沈之為泥願乞其所餘以救之全忠為之畱數囷滄人頼以濟舊五代史巻二
