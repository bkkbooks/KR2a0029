body:
  text: 舊五代史巻九十三宋門下侍郎參知政事監修國史薛居正等撰晉書第十九列傳八盧質字子徵河南人也曽祖偲唐太原府祁縣尉累贈右僕射祖衍唐刑部侍郎太子賔客累贈太保父望唐尚書司勲郎中累贈太子少傅質幼聰慧善屬文年十六陜帥王重盈奏授芮城令能以色養又為同州澄城令從私便也秩滿改秘書郎丁母憂歸河南故里天祐三年北遊太原時李襲吉在武皇幕府以女妻之武皇憐其才承制授檢校兵部郎中充河東節度掌書記賜緋魚袋武皇厭代其弟克寧握兵柄有嗣襲之望質與張承業等密謀同立莊宗為嗣有翊贊之功及莊宗四征質皆從行十六年轉節度判官檢校禮部尚書十九年莊宗將即帝位命為大禮使累加至銀青光禄大夫檢校右僕射二十年授行臺禮部尚書莊宗既登極欲相之質性疎逸不喜居髙位固辭獲免尋以本官兼太原尹充北京留守事未赴任改户部尚書知制誥充翰林學士承㫖同光元年冬從平大梁權判租庸事踰月隨駕都洛旋授詔權知汴州軍府事時孔謙握利權志在聚歛累移文于汴配民放絲質堅論之事雖不行時論賞之俄又改金紫光禄大夫兵部尚書知制誥翰林學士承㫖仍賜論思匡佐功臣㑹覆試進士質以后從諫則聖為賦題以堯舜禹湯傾心求過為韻舊例賦韻四平四側質所出韻乃五平三側由是大為識者所誚天成元年制授特進檢校司空同州節度使時宰相馮道以詩餞别其警句云視草北來唐學士擁旄西去漢將軍儒者榮之明年改賜耀忠匡定保節功臣就加檢校司徒三年入拜兵部尚書判太僕卿事四年進封開國公長興二年授檢校太保河陽節度使未幾移鎮滄州入為右僕射及秦王得罪奉詔權知河南府事應順初遷檢校太傅正拜河南尹後改太子少師清泰末復為右僕射髙祖登極質以㣲恙分司洛宅少帝嗣位拜太子太保天福七年秋卒于洛陽年七十六累贈太子太師諡曰文忠五代會要漢乾祐元年九月其子尚書兵部員外郎盧瓊上章請諡下大尚議諡曰文忠子十一人惟第六子瓊任至省郎餘歴州縣焉李專美字翊啇京兆萬年人也曽祖隨光禄卿祖正範尚書庫部郎中專美少篤學文以父樞唐昭宗時常應進士舉為覆試所落不許再入專美心愧之由是不遊文場偽梁貞明中河南尹張全義以專美名族之後奏為陸渾尉秩滿改舞陽令專美性亷謹大著政聲後唐天成中安邑𣙜鹽使李肅辟為推官時唐末帝鎮河中見其敦雅心重之末帝一日曽召肅讌於衙署專美亦預坐末帝謂肅曰某夜來夢主上召去與宋王同剃却頭何也坐客都無對者專美屏人謂曰將來必為嗣主由是愈重焉末帝留守長安奏為從事及移鎮鳳翔遷為記室末帝即位除尚書庫部郎中賜金紫充樞密院直學士初末帝起自鳯翔大許諸軍厚賞泊至洛陽閲内庫金帛不過二三萬尋又配率京城户民雖行捶楚亦所獲無幾末帝憂之㑹專美宿于禁中末帝召而讓之曰卿士人子弟常言有才術今致我至此不能度運以濟時事留才術何施也專美惶恐待罪良久奏曰臣才力駑劣屬當興運陛下猥垂録任無以禆益聖朝然府藏空竭軍賞不給非臣之罪也臣思明宗棄代之際是時府庫濫賞已竭繼以鄂王臨朝紀綱大壊縱有無限之財賦不能滿驕軍谿壑之心所以陛下孤立岐陽而得天下臣以為國之存亡不專在行賞須刑政立于上恥格行于下賞當功罰當罪則近于理道也若陛下不改覆車之轍以賞無賴之軍徒困蒸民存亡未可知也今宜取見在財賦以給之不必踐前言而希茍悅末帝然之及其行賞雖不愜于軍士然洛陽户民獲免鞭笞之苦由專美之敷揚也尋轉給事中明年遷兵部侍郎端明殿學士未幾改檢校尚書右僕射守秘書監充宣徽北院使髙祖入洛以例除名三年復授衛尉少卿繼遷鴻臚大理卿開運中以病卒時年六十二專美之逺祖本出姑臧大房與清河小房崔氏北祖第二房盧氏昭國鄭氏為四望族皆不以才行相尚不以軒冕為貴雖布衣徒步視公卿蔑如也男女婚嫁不雜他往欲聘其族厚贈金帛始許焉唐太宗曽降詔以戒其弊風終莫能改其間有未達者必曰姓崔盧李鄭了餘復何求耶其逺者則邈在天表夐若千里人罕造其門浮薄自大皆此類也唯專美未嘗以氏族形于口吻見寒素士大夫恒恂恂如也人以此多之專美職岐下曽夢具裳簡立嵩山之頂及為端明殿學士學士李崧同列而班在其上因以所夢告崧且言某非徳非勲安可乆居此位處吾子之首乎因懇求他官尋移宣徽使崧深徳之及髙祖臨朝崧為樞密使與桑維翰同列維翰與專美亦有舊乃協力以奏之遂復朝序位至九卿專美曽使閩中遇風水漂至兩浙踰歳無恙而還至是終善人以為神道福謙之所至也盧詹字楚良京兆長安人也唐天祐中為河中從事莊宗即位擢為員外郎知制誥遷中書舍人天成中拜禮部侍郎知貢舉歴御史中丞兵部侍郎尚書左丞工部尚書詹性剛直議論不避權貴執政者常惡之天福初拜禮部尚書分司洛下與右僕射盧質散騎常侍盧重俱在西都數相過從三人俱嗜酒好遊山水塔廟林亭花竹之地無不同往酣飲為樂人無間然洛中朝士目為三盧㑹常委順性命不營財利開運初卒于洛陽詹家無長物喪具不給少帝聞之賜布帛百叚粟麥百斛方能襄其葬事贈太子少保崔梲字子文博陵安平人累世冠冕曽祖元受舉進士直史館祖銖安濮二州刺史父涿刑部郎中梲少好學梁貞明三年舉進士甲科為開封尹王瓚從事梲性至孝父􅃰有疾謂親友曰死生有命無醫為也梲侍之衣不解帶有賔至必拜泣告于門外請方便勸其進藥涿終莫之從及丁憂哀毁過制明宗朝授監察御史不應命踰年詔再下乃就列焉累遷都官郎中翰林學士天福初以户部侍郎為學士承㫖嘗草制為宰相桑維翰所改梲以唐故事學士草制有所改者當罷職乃引經據爭維翰不能詰命權知二年貢舉時有進士孔英者素有醜行為當時所惡梲受命往見維翰維翰語素簡謂梲曰孔英來矣梲不諭其意以謂維翰以孔英為言乃考英及第物議大以為非遂罷學士拜尚書左丞遷大常卿後以風痺改太子賔客分司西京卒年六十八梲平生所著文章碑誄制詔甚多人有借本傳寫者則曰有前賢有來者奚用此為凡受託而作者必親札致之即焚其藁懼泄人之假手也梲笑不至哂怒不至詈接新進後生未嘗無誨焉羣居公㑹端坐寡言嘗云非止致人愛憎且或千人祖禰之諱指命僕役亦用禮節盛暑祁寒不使冐犯嘗自話於知友云某少時夢二人前引行路一人計地里曰一舍矣可以止一人曰此君當更進三十有八里復行如所言二人皆止之俄而驚覺梲常識是夢以為定命之限故六十七請退明年果終焉兄棆有隱徳好釋氏閑居滑州嘗欲訪人于白馬津比及臨岸歎曰波勢􅍅湧如此安可濟乎乃止後徵拜左拾遺辭疾不赴薛融汾州平遥人性純和以儒學為業初從雲州帥李存璋為幕職唐莊宗平河南歴鄆徐二鎮從事明宗初授華州節度判官長興四年入為右補闕直𢎞文館歳餘改河東觀察判官㑹高祖鎮太原遂居于幕府清泰末高祖將舉義延賔席而厯問之次及融對曰融本儒生秖曽讀三五卷書至于軍旅之事進退存亡之機未之學也座中聳然及登極遷尚書吏部郎中兼侍御史知雜事天福二年自左諫議大夫遷中書舍人自以文學非優不敢拜命復為諫議時詔修西京大内融以鄴下用兵國用不足上䟽復罷之通鑑薛融諫曰今宫室雖經焚毁猶侈于帝堯之茅茨所費雖寡猶多于漢文之露臺况魏城未下公私困窘誠非陛下修宫館之日俟海内平寧修之未晚優詔嘉許俄轉御史中丞秩滿改尚書右丞分司西都天福六年以疾卒年六十餘曹國珍字彦輔幽州固安人也曽祖藹祖蟾父絢代襲儒素國珍少值燕薊亂離固落髮被緇客于河西延州高萬興兄弟皆好文辭為從事國珍常以文章自許求貢禮闈且掌書奏期年入為左拾遺累遷至尚書郎毎與人交傾財無恡性頗剛僻經藝史學非其所長好自矜􅃷多上章疏文字差誤數數有之為縉紳所誚高祖在藩時嘗通私謁以兄事之及即位國珍自比于嚴陵上表叙舊由是自吏部郎中拜左諫議大夫給事中歐陽史張彦澤傳國珍與御史中丞王易簡率三院御史詣閣門連疏論張彦澤不報又求為御史中丞時宰政不復為請國珍衘之李崧之母薨遣諸弟䕶喪歸葬深州崧既起復乃出北郊路隅設奠公卿大夫皆送喪而出國珍固爭不行衆咸推其讜直高祖晏駕朝廷以宰臣馮道為山陵使及靈輴既發國珍上疏言馮道既為山陵使不得復入都城請除外佐以桑維翰入輔李崧請罷相位俾持喪制少帝覽奏以所言侵越出為陜州行軍司馬至任悒快遘疾而卒張仁愿字善政開封陳留人也祖晸唐右武衞大將軍父存敬梁河中節度觀察留後累贈中書令梁書有傳仁愿梁貞明初以勲臣之子起家為衞尉寺主簿改著作佐郎左贊善大夫賜緋魚袋唐同光初遷大理正天成元年自將作少監轉大理少卿長興中歴昭武歸徳兩鎮節度判官四年復入為大理少卿清泰中除殿中監天福五年拜大理卿八年轉光禄卿仁愿性温雅明法書累居詳刑之地議􅀈疑獄號為稱職兄仁頴梁朝仕至諸衞將軍中年以風恙廢于家凡十餘年仁愿事之出告反靣如嚴父焉士大夫推為孝友仁頴善理家勤而且約婦女衣不曵地什物多厯年所如新市焉仁愿開運元年再為大理卿時隰州刺史王澈犯贓朝廷以澈功臣之後欲宥之仁愿累執奏不移竟遣伏法議者賞之開運二年以疾卒年五十一贈秘書監趙熈字績巨唐宰相齊國公光逢之猶子也起家授秘書省校書郎唐天成中累遷至起居郎數上章言事以稱㫖尋除南省正郎天福中承詔與張昭逺等修唐史竟集其功開元中自兵部郎中授右諫議大夫賞筆削之功也及契丹入汴遣使於晉州率配豪民錢幣以實行橐始授命之日條制甚嚴熈出於衣冠之族性素輕急既畏契丹峻法乃窮力搜索人甚苦之及晉之三軍殺副使駱從郎通鑑契丹以節度使駱從郎知晉州事大將藥可儔殺從郎百姓相率持仗害熈于館舍識者傷之李遐兖州人也少為儒有節操歴數鎮從事及升朝累遷尚書庫部員外郎高祖即位以皇子重乂保釐洛邑知遐强幹有守除為西京留守判官使之佐理復重其亷勤兼委監西京左藏庫㑹張從賔作亂使人輦取繒帛以賞羣逆遐曰不奉詔書安敢承命遂為其下所害高祖聞而歎惜賻贈加等仍贈右諫議大夫其母田氏封京兆郡太君仍給遐所食月俸終母餘年其子俟服闋與官後又遣兖州節度使李從温就其舊業賜牲幣綿帛等物以旌其忠也尹玉羽京兆長安人唐天復中隨計京師甚有文稱㑹有苴杖之喪累歲羸疾冬不釋菅屨期不變倚廬制闋隱居杜門無仕宦之意梁貞明中劉鄩辟為保大軍節度判官歴雍汴滑兖從事以下有闕文考宋黎持移石經記石經舊在務本坊自天祐中韓建築新城而石經委棄于野至未梁時劉鄩守長安從幕吏尹玉羽之請輦入城中置于北地即唐尚書省之西隅也唐清泰中為光禄少卿退歸秦中以林泉詩酒自樂自號自然先生宰臣張延郎手書而召高卧不從謂人曰庶孽代宗不可仕也及高祖入雒即受詔而來以所著自然經五巻貢之且告其老即日璽書褒美頒其器幣授少府監致仕月給俸錢及冬春二時服天福中卒有武庫集五十巻行於世鄭雲叟本名遨雲叟其字也以唐明中廟諱故世傳其字也本南燕人也少好學耿介不屈唐昭宗朝嘗應進士舉不第因欲携妻子隐于林壑其妻非之不肯行雲叟乃薄游諸郡獲數百緡以贍其家辭訣而去尋入少室山著擬峰詩三十六章以導其趣人多傳之後妻以書達意勸其還家雲叟未嘗一覽悉投於火其絶累如此俄聞西嶽有五粒松淪脂千年能去三尸因居於華隂與李道殷羅隱之友善時人目為三高士道殷有釣魚之術鈎而不餌又能化易金石無所不至雲叟恒目覩其事信而不求雲叟與梁室權臣李振善振欲禄之拒而不諾及振南遷雲叟千里徒步以省之識者高焉後妻兒繼謝每聞凶訃一哭而止時惟青衿二童子一琴一鶴從其遊處好棋塞之戯遇同侣則以晝繼夜雖寒風大雪臨簷對局手足皸裂亦無倦焉唐天成中召拜左拾遺不起與羅隱之朝夕遊處隱之以藥術取利雲叟以山田自給俱好酒能詩善長嘯有大瓠云可辟寒暑置酒於其中經時味不壊日携就花木水石之間一酌一詠嘗因酒酣聨句鄭曰一壺天上有名物兩箇世間無事人羅曰醉却隱之雲叟外不知何處是天真髙祖即位聞其名遺使賫書致禮徵為右諫議大夫雲叟稱疾不起上表陳謝髙祖覽表嘉之賜近臣傳觀尋賜號逍遥先生以諫議大夫致仕月給俸禄雲叟好酒嘗為詠酒詩千二百言海内好名者書于縑緗以為贈貺復有越千里之外使畫工潛寫其形容列為屏障者焉其為時望所重也如此天福末以壽終時年七十四有文集二十巻行於世史臣曰自古攀龍鱗附鳯翼坐達于雲衢者豈獨豐沛之士哉茍懐才抱器適㑹興王亦可以取貴于一時如盧質而下數君子是也至如國珍之讜直仁愿之友悌趙李二子没於王事皆無沗於士林矣惟王羽之貞退雲叟之肥遯足可以柅奔兢之風激高尚之節也舊五代史巻九十三
