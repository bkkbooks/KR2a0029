body:
  text: 舊五代史巻一百十九宋門下侍郎參知政事監修國史薜居正等撰周書第十世宗紀六顯德六年春正月丁未朔帝御崇元殿受朝賀伏衛如式壬子高麗國王王昭遣使貢方物已卯以翰林學士中書舍人申文炳為左㪚騎常侍辛酉女眞國遣使貢獻壬戌青州奏節度使陳王安審琦為部曲所殺乙丑賜諸將射於内鞠塲戊辰幸迎春苑甲戌詔毎年新及第進士及諸科聞喜宴宜令宣徽院指揮排比乙亥詔禮部貢院今後及第舉人依逐科等第定人數姓名並所試文字奏聞候勅下放榜云是月樞宻使王朴詳定雅樂十二律旋相為宫之法並造律準上之詔上書省集百官詳議亦以為可語在樂志二月庚辰發徐宿宋單等州丁夫數萬濬汴河甲申𤼵滑亳二州丁夫濬五丈河東流于定陶入于濟以通青鄆水運之路又疏導蔡河以通陳潁水運之路乙酉詔諸道應差攝官各支半俸丙戌以翰林學士承㫖尚書兵部侍郎陶穀為尚書吏部侍郎充職詔升湖州為節鎭以宣德軍為軍額以湖州刺史錢偡為夲州節度使從兩浙錢俶之請也辛丑幸迎春苑甲辰右補闕王德成責授右贊善大夫坐舉官不當也詔賜諸道州府供用糧草有差三月庚申樞宻使王朴卒甲子詔以北境未復取此月内幸滄州以宣徽南苑使吳延祚為權東京留守判開封府事以宣徽北苑使昝居潤為副使以三司使張羙為大内都部署東都事畧張羙傳世宗北征以羙為大内都檢㸃命諸將各領馬歩諸軍及戰棹赴滄州已巳濠州奏鍾離縣飢民死者五百九十有四癸酉詔廢諸州銅魚五代會要顯德六年勅諸道牧守毎遇除移特降制書何假符契其請納銅魚宜廢之甲戌車駕𤼵京師夏四月辛卯車駕次滄州以前左諫議大夫薛居正為刑部侍郎是日帝率諸軍北征壬辰至乾寧軍偽寧州刺史王洪以城降丁酉駕御龍舟率舟師順流而北首尾數十里辛丑至益津闗通鑑至益津闗契丹守將終廷暉以城降自此以西水路漸隘舟師難進乃捨舟登陸壬寅宿於野次時帝先期而至大軍未集隨駕之士不及一旅賴今上率材官騎士以衛乘輿癸卯今上先至瓦橋闗偽守將姚内斌以城降隆平集姚内斌平州人也世宗北征將兵至瓦橋闗内斌為闗使開門請降世宗以為汝州刺史甲辰鄚州刺史劉楚信以州來降五月乙已朔帝駐蹕於瓦橋闗侍衛親軍都指揮使李重進及諸將相繼至行在瀛州刺史髙彦暉以本城歸順闗南平凡得州三縣十七户一萬八千三百六十是役也王師數萬不亡一矢邊界城邑皆望風而下丙午帝與諸將議攻幽州諸將皆以為未可帝不聽是夜帝不豫乃止戊申定州節度使孫行友奏攻下易州擒偽命刺史李在欽來獻斬於軍市乙酉以瓦橋闗為雄州宋史陳思讓傳得瓦橋闗為雄州思讓為都部署率兵署守以益津闗為霸州宋史韓令坤傳為霸州都部署率所部兵戍之是日先鋒都指揮使張藏英破契丹數百騎於瓦橋闗北攻下固安縣詔𤼵濱棣二州丁夫城霸州庚戌遣侍衛都指揮使李重進率兵出土門入河東城界壬子車駕𤼵雄州還京泉州節度使劉從効遣别駕王禹鍚奉貢於行在帝以泉州比臣江南李景方歸奉國家不欲奪其所屬但錫詔褒羙而已丁卯西京奏太常卿致仕司徒詡卒已已侍衛都指揮使李重進奏破河東賊軍於百井斬首二千級甲戌上至自雄州却掃編周世宗既定三關遇疾而退至澶淵遲留不行雖宰輔近臣問疾者皆莫得見中外恟懼時張永德為澶州節度使永德尚周太祖之女以親故獨得至卧内于是羣臣因永徳言曰天下未定根本空虚四方諸侯惟幸京師之有變今澶汴相去甚邇不速歸以安人情顧憚旦夕之勞而遲回於此如有不可諱奈宗廟何永德然之承間為世宗言如羣臣旨世宗問誰使汝為此言永德對以羣臣之意皆願為此世宗熟思乆之嘆曰吾固知汝必為人所教獨不喻吾意哉然觀汝之窮薄惡足當此即日趣駕歸京師六月乞亥朔潞州李筠奏攻下遼州獲偽刺史張丕旦丙子以皇女薨輟朝三日戊寅鳯翔奏節度史李暉卒鄭州奏河決原武詔宣徽南院使吳延祚𤼵近縣丁夫二萬人以塞之庚辰命宣徽北院使昝居潤判開封府事晉州節度使楊廷璋奏率兵入河東界招降堡岩一十三所癸未立魏王符彦卿女為皇后仍令所司擇日備禮册命以王長子宗訓為特進左衛上將軍封梁王以第二子宗讓為左驍衛上將軍封燕國公賜江南進奉使李從善錢二萬貫絹二萬匹銀一萬兩賜兩浙進奉使吳延福錢三千貫絹五千匹銀噐三千兩丁亥以前青州節度使李洪義為永興軍節度使永興軍節度使王彦超移鎭鳯翔戊子潞州部送所獲遼州刺史張丕旦等二百四十五人以獻詔釋之已丑宰臣范質王溥並參知樞宻院事以樞宻使魏仁溥為中書侍郎平章事集賢殿大學士依前充樞宻使以宣徽南院使吳延祚為樞宻使行左驍衛上將軍以宋州節度使侍衛都虞候韓通為侍衛親軍副都指揮使加檢校太尉同平章事澶州節度使兼殿前都檢㸃駙馬都尉張永德落軍職加檢校太尉同平章事以今上為殿前都㸃檢加檢校太傅依前忠武軍節度使帝之北征也凡供軍之物皆令自京逓送行在一日忽於地中得一木長二三尺如人之揭物者其上卦全題云㸃檢做觀者莫測何物也至是今上始受㸃檢之命明年春果自此職以副人望則㸃檢作之言乃神符也辛卯以宣徽北院使判開封事昝居潤為左領軍上將軍充宣徽南院使以三司使左領衛大將軍張羙為左監門衛上將軍充宣徽北院使判三司東都事畧張羙傳羙少為三司小吏澶州糧料使世宗鎭澶州每有求取羙悉力應之及即位連歲征討糧餽無乏羙之力也然每思澶州所為終不以公忠待之癸已帝崩於萬歲殿聖壽三十九甲午宣遺制梁王於柩前即皇帝位服紀月日一依舊制是日羣臣奉梁王即位於殿東楹中外𤼵哀其年八月翰林學士判太常寺事竇儼上諡曰睿武孝文皇帝廟號世宗十一月壬寅朔葬於慶陵宰臣魏仁浦撰諡册文玉浦撰哀冊文云五代史補世宗在民間嘗與鄴中大商頡跌氏忌其名往江陵販賣茶貨至江陵見有卜者王處士其術如神世宗因頡跌氏同往問焉方布卦怱有一著躍出卓然而立卜者大驚曰吾家筮法十餘世矣常記曾祖以來遺言凡卜筮而蓍自躍而出者其人貴不可言况又卓立不倒得非為天下之主乎遽起再拜世宗雖佯為詰責而私心甚喜於逆旅中夜置酒與頡跌氏半酣戲曰王處士以我當為天子若一旦到此足下要何官請言之頡跌氏曰某三十年作估來未有不由京洛者毎見税官坐而獲利一日所入可以敵商賈數月私心羡之若大官為天子某願得京洛税官足矣世宗笑曰何望之卑耶及承郭氏之後踐作頡跌猶在召見竟如初言以與之戰世宗之征東也駐蹕於髙平劉崇兼契丹之衆來迎時帥多持兩端而王師不利親軍帥樊愛能等各退衂世宗赫怒躍馬入陣引五十人直衝崇之牙帳崇方張樂飲酒以示閒暇及其奄至莫不驚駭失次世宗因以奮擊遂敗之追奔於城下凱旋駐蹕潞州且欲出其不意以誅退衂者乃置酒髙會指樊愛能等數人責之曰汝輩皆累朝宿將非不能用兵者也然退衂者無他誠欲將寡人作物貨賣與劉崇爾不然何寡人親戰而劉崇始敗耶如此則卿等雖萬死不足以謝天下宜其曲膝引頸以待斧誅言訖命行刑壯士擒出皆斬之於是立功之士以次行賞自行伍㧞於軍廂者甚衆其恩威並著皆此類也初劉崇求援於契丹得騎數千及覩世宗兵少悔之曰吾觀周師易與耳契丹之衆宜忽用但以我兵攻戰自當萬全如此則不惟破敵亦足使契丹見而心服一舉而有兩利兵之機也諸將以為然乃使人謂契丹主將曰柴氏與吾主客之勢不煩足下餘刃敢請勒兵登髙觀之可也契丹不知其謀從之洎世宗之陣也三軍皆賈勇争進無不一當百契丹望而畏之故不救而崇敗論者曰世宗患諸將之難制也乆矣思欲誅之未有其釁髙平之役可謂天假故皆斬决而無貸焉自是姑息之政不行朝廷始尊大自非英主其孰能為之哉世宗既下江北駐蹕於建安以書召偽主主惶恐命鍾謨李徳明為使以見世宗徳明素有詞辯以利害說世宗使罷兵世宗且知之乃盛陳兵師排旗幟戈㦸為門頃道以凑御然後引徳明等入見世宗謂之曰汝江南自以為唐之後衣冠禮樂世無比何故與寡人隔一帶水更不𤼵一使奉書相問惟泛海以通契丹舍華事夷禮將安在今又聞汝以詞說寡人罷兵是將寡人比六國時一羣痴漢何不知人之甚也汝愼勿言當速歸報汝主令徑來跪寡人兩拜則無事矣不然則寡人須看金陵城借府庫以犒軍汝等得無悔乎于是徳明等戰懼不能措一辭即日告歸及見偽主具陳世宗英烈也狀恐非四方所能敵偽主計無所出遂上表服罪且乞保江南之地以奉宗廟修職貢其詞甚哀世宗詐之因曰叛則征服則懐寡人之心也于是遣使者齎書安之然後凱還論者以世宗加兵於江南不獨臨之以威抑亦諭之以禮可謂得大君之體矣陳搏陜西人能為詩數舉不第慨然有塵外之趣隱居華山自是其名大振世宗之在位也以四方未服思欲牢籠英傑且以摶曽踐塲屋不得志而隠必有竒才逺畧於是召到闕下拜左拾遺摶不就堅乞歸山世宗許之未幾賜之書勅陳摶朕以汝髙謝人寰栖心物外養太浩自然之氣應少微處士之星既不屈於王侯遂甘隱于岩壑樂我中和之化慶乎下武之期而能逺渉山涂暫來城關决旬延遇𢎞益居多白雲暫駐于帝鄉好爵難縻於達士昔堯唐之至聖有巢許為外臣朕雖寡薄庶遵前鑒恐山中所闕己令華州刺史每事供須乍反故山履兹春序緬懷髙尚當適所宜故兹撫問想宜知悉即陶榖之詞也初搏之見召嘗為詩一章云草澤吾皇詔圖南搏姓陳三峯十年客四海一閒人世熊從來薄詩情自得眞超然居物外何必使為臣好事者欣然謂之答詔詩世宗以張昭逺好古直甚重之因問日朕欲一賢相卿試為言朝廷誰可昭逺對曰以臣所見莫若李濤世宗嘗薄濤之為人聞昭逺之舉甚驚曰李濤本非重厚朕以為無大臣體卿首舉此何也昭逺曰陛下所聞止名行曾不聞材畧如何耳且濤事晉髙祖曽上疏論邠州節度使張彦澤蓄無君心宜早圖之不然則為國患晉祖不納其後契丹南侵彦澤果有中渡之變晉社殱焉先帝潛龍時亦上疏請觧其兵權以備非常之變少主不納未㡬先帝遂有天下以國家安危未兆間濤已先見非賢而何臣所首舉之者正為此也世宗曰今卿言甚公然此人終不可於中書安置居無何濤亦卒濤為人不拘禮法與弟澣雖甚雍睦然聚話之際不典之言往往間作澣娶禮部尚書竇寧固之女年甲稍髙成婚之夕竇氏出參濤輒望塵下拜澣驚曰大哥風狂耶新婦參阿伯豈有答禮儀濤應曰我不風只將謂是親家母澣且慙且怒既坐竇氏復拜濤又又手當胸作歇後語曰慙無竇建繆作梁山喏喏喏時聞者莫不絶倒凡濤于閨門之内不存禮決也如此世宗以為無大臣體不復任用宜哉究世宗志在四方常恐運祚連而功業不就以王朴精術數一旦從容問之曰朕當得㡬年對曰陛下用心以蒼生為念天髙聽卑自當䝉福臣固陋輒以所學推之三十年後非所知也世宗喜曰若如卿言寡人當以十年開拓天下十年養百姓十年致太平足矣其後自瓦橋關回戈未到關而晏駕計在位止及五年餘六箇月五六乃三十之成數也盖朴婉而言之沿世宗末年大舉以取幽州契丹聞其親征君臣恐懼邊城壘皆望風而下凡蕃部之在幽州者亦連宵遁去車駕至瓦橋關探邏是實甚喜以為大勲必集登髙阜因以觀六師頃之有父老百餘輩持牛酒以獻世宗問曰此地何名對曰厯世相傳謂之病龍臺黙然遽上馬馳去是夜聖體不豫翌日病亟有詔回戈未到關而晏駕先是世宗之在民間已常夢神人以大傘見遺色如鬱金加道經一巻其後遂有天下及瓦橋不豫之際復夢向之神人來索傘與經夢中還之而驚起謂近侍曰吾夢不祥豈非天命將去耶遂詔大臣戒以後事初幽州聞車駕將至父老或有竊議曰此不足憂且天子姓柴幽州為燕燕者亦烟火之謂也此柴入火不利之兆安得成功卒如其言史臣曰世宗頃在側微尤務韜晦及天命有屬嗣守鴻業不日破髙平之陣逾年復秦鳯之封江北燕南取之如拾芥神武雄畧乃一代之英主也加以留心政事朝夕不倦摘伏辯姦多得其理臣下有過必面折之常言太祖養成二王之惡以致君臣之義不保其終故帝駕馭豪傑失則明言之功則厚賞之文武參用莫不服其明而懐其恩也所以仙去之日逺近號慕然稟性傷於太察用刑失於大峻及事行之後亦多自追悔逮至末年漸用寛典知用兵之頻併憫黎民之勞苦盖有意於康濟矣而降年不永羙志不就悲夫舊五代史巻一百十九
