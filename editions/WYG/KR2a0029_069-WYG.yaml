body:
  text: 舊五代史巻三十四宋門下侍郎參知政事監修國史薛居正等撰唐書第十莊宗紀八同光四年春正月戊午朔帝不受朝賀契丹㓂渤海壬戌詔以去嵗因被災沴物價騰踊自今月三日後避正殿減膳撤樂以答天譴應去年遭水災州縣秋夏税賦並與放免自壬午年已前所欠殘税及諸色課利已有勅命放免者尚聞所在却有徴收宜令租庸司切準前勅處分應京畿内人户有停貯斛㪷者並令減價出糶如不遵行當令撿括西川王衍父子及偽署將相官吏除已行刑憲外一切釋放天下禁囚除十惡五逆官典犯贓屠牛毁錢放火刧舍持刃殺人準律常赦不原外應合抵極刑者遞降一等其餘罪犯悉與減降逃背軍健並放逐便癸亥河中節度使李繼麟來朝諸州上言準宣為去年十月地震集僧道起消災道場甲子魏王繼岌殺樞宻使郭崇韜於西川夷其族丙寅百官上表請復帝膳凡三上表乃允之西川行營都監李廷安進西川樂官二百九十八人契丹㓂女真渤海戊寅契丹按巴堅遣使貢良馬庚辰帝異母弟鄜州節度使存乂伏誅存乂郭崇韜之子婿也故亦及于禍是日以河中節度使守太師兼尚書令西平王李繼麟為滑州節度使尋令朱守殷以兵圍其第誅之亦夷其族辛已吐渾奚各遣使貢馬鎮州上言部民凍死者七千二百六十人又奏準宣進花菓樹栽及抽樂人梅審鐸赴京甲申以鄆州節度使永王存霸為河中節度使以滑州節度使申王存渥為鄆州節度使乙酉内人景姹上言昭宗遇難之時皇屬千餘人同時遇害為三穴瘞於宫城西古龍興寺北請改𦵏從之仍詔河南府監䕶其事丙戌囘鶻可汗阿都欲遣使貢良馬鎮州上言平棘等四縣部民餓死者二千五十人丁亥詔朱友謙同惡人史武等七人已當國法並籍沒家產武等友謙舊將時皆為刺史並以無罪族誅歐陽史丁亥殺李繼麟之將史武薛敬容周唐殷楊師太王景來仁白奉國滅其族二月已丑以宣徽南院使知内侍省兼内勾特進右領軍衛上將軍李紹宏為驃騎大將軍守左武衛上將軍知内侍省充樞宻使甲午以鄭州刺史李紹竒為河陽節度使以樂人景進為銀青光禄大夫檢校右散騎常侍守御史大夫進以俳優嬖幸善采訪閭巷鄙細事以啟奏復宻求妓媵以進恩寵特厚魏州錢榖諸務及招兵市馬悉委進監臨孔謙附之以希寵常呼為八哥諸軍左右無不托附至于士人亦有因之而求仕進者毎入言事左右紛然屏退惟以䧟害熒惑為意焉是日帝幸冷泉校獵乙未宰臣豆盧革上言請支州縣官實俸以責課効丙申武德使史彦瓊自鄴馳報稱今月六日貝州屯駐兵士突入都城剽刧坊市初帝令魏博指揮使楊仁晸率兵戍瓦橋至是代歸有詔令駐于貝州上嵗天下大水十月鄴地大震自是居人或有亡去他郡者每日族談巷語云城將亂矣人人恐悚皆不自安十二月以户部尚書王正言為興唐尹知畱守事正言年耄風病事多忽忘比無經治之才武徳使史彥瓊者以伶官得幸帝待以腹心之任都府之中威福自我正言已下皆脅肩低首曲事不睱由是政無統攝姦人得以窺圖洎郭崇韜伏誅人未測其禍始皆云崇韜已殺繼岌自王西川故盡誅郭氏先是有宻詔令史彦瓊殺朱友謙之子澶州刺史建徽彦瓊夜半出城不言所往詰旦閽報正言曰史武徳夜半馳馬而去不知何往是日人情震駭訛言云劉皇后以繼岌死于蜀已行弑逆帝已晏駕故急徴彦瓊其言播于鄴市貝州軍士有私親寧于都下者掠此言𫝊于貝州軍士皇甫暉等因夜聚蒲博不勝遂作亂刧都將楊仁晸曰我輩十有餘年為國家効命甲不離體已至吞併天下主上未垂㤙澤翻有猜嫌防戍邉逺經年離阻鄉國及得代歸去家起尺不令與家屬相見今聞皇后弑逆京邑巳亂將士各欲歸府寧親請公同行仁晸曰汝等何謀之過耶今英主在上天下一家從駕精兵不下百萬西平巴蜀威振華夷公等各有家族何事如此軍士乃抽戈露刃環仁晸曰三軍怨怒咸欲謀反茍不聽從須至無禮仁晸曰吾非不知此但丈夫舉事當計萬全軍人即斬仁晸禆將趙在禮聞軍亂衣不及帯將踰垣而遁亂兵追及白刃環之曰公能為帥否否則頭隨刃落在禮懼即曰吾能為之衆遂呼譟中夜燔刧貝郡詰旦擁在禮趨臨清剽永濟館陶五日晩有自貝州來者言亂兵將犯都城都廵檢使孫鐸等急趨史彦瓊之第告曰賊將至矣請給鎧仗登俾拒守彦瓊曰今日賊至臨清計程六日方至為備未晩孫鐸曰賊來㓂我必倍道兼行一朝失機悔將何及請僕射率衆登陴鐸以勁兵千人伏於王莽河逆擊之賊既挫勢須至離潰然後可以翦除如俟其㓙徒薄於城下必慮奸人内應則事未可測也彦瓊曰但訓士守城何須即戰時彦瓊疑孫鐸等有他志故拒之是夜三更賊果攻北門彦瓊時以部衆在北門樓聞賊呼譟即時驚潰彦瓊單騎奔京師遲明亂軍入城孫鐸與之巷戰不勝擕其母自水門而出獲免晡晚趙在禮引諸軍據宫城署皇甫暉趙進等為都虞候斬斫使諸軍大掠興唐尹王正言謁在禮望塵再拜是日衆推在禮為兵馬畱後草奏以聞帝怒命宋州節度使元行欽率騎三千赴鄴都招撫詔徴諸道之師進討丁酉淮南楊溥遣使賀平蜀已亥魏王繼岌奏康延孝擁衆反迴冦西川遣副招討使任圜率兵追討之庚子福建節度副使王延翰奏節度使王審知委權知軍府事邢州左右步直軍四百人據城叛推軍校趙太為畱後詔東北面副招討使李紹真率兵討之辛丑元行欽至鄴都進攻南門以詔書招諭城中趙在禮獻羊酒勞軍登城遙拜行欽曰將士經年離隔父母不取勅㫖歸寧上貽聖憂追悔何及儻公善為敷奏俾從渙汗某等亦不敢不改過自新行欽曰上以汝輩有社稷功必行赦宥因以詔書諭之皇甫暉聚衆大詬即壞詔行欽以聞帝怒曰收城之日勿遺噍類壬寅行欽自鄴退軍保澶州甲辰從馬直宿衛軍士王温等五人夜半謀亂殺本軍使為衛兵所擒磔於本軍之門丙午以右散騎常侍韓彦惲為户部侍郎丁未鄴都行營招撫使元行欽率諸道之師再攻鄴都戊申以洋州畱後李紹文為夔州節度使詔河中節度使永王存覇歸藩已酉以樞宻使宋唐玉為特進左威衛上將軍充宣徽南院使庚戌諸軍大集於鄴都進攻其城不克行欽又大治攻具城中知其無赦晝夜為備朝廷聞之益恐連發中使促繼岌西征之師繼岌以康延孝據漢州中軍之士從任圜進討繼岌端居利州不獲東歸是日飛龍使顔思威部署西川宫人至辛亥淮南楊溥遣使貢方物西京上言客省使李嚴押蜀主王衍至本府壬子以守太尉中書令河南尹兼河陽節度使齊王張全義為檢校太師兼尚書令充許州節度使東川董璋奏准詔誅遂州節度使李令徳於本州夷其族癸丑湖南馬殷奏福建節度使王審知疾甚副使王延翰已權知軍府事請降旌節司天監上言自二月上旬後晝夜隂雲不見天象自二十六日方晴至月終星辰無變以右衛上將軍朱漢賔知河南府事甲辰命蕃漢總管李嗣源統親軍赴鄴都以討趙在禮帝素倚愛元行欽鄴城軍亂即命為行營招討使久而無功時趙太據邢州王景戡據滄州自為留後河朔郡邑多殺長吏帝欲親征樞宻使與宰臣奏言京師者天下根本雖四方有變陛下冝居中以制之但命將出征無煩躬御士伍帝曰紹榮討亂未有成功繼岌之軍尚留巴漢餘無可將者斷在自行樞宻使李紹宏等奏曰陛下以謀臣猛將取天下今一州之亂而云無可將者何也總管李嗣源是陛下宗臣創業已來艱難百戰何城不下何賊不平威畧之名振於夷夏以臣等籌之若委以専征鄴城之㓂不足平也帝素寛大容納無疑於物自誅郭崇韜朱友謙之後閹宦伶官交相䜛謟邦國大事皆聽其謀繇是漸多猜惑不欲大臣典兵既聞奏議乃曰予恃嗣源侍衛卿當擇其次者又奏曰以臣等料之非嗣源不可河南尹張全義亦奏云河朔多事久則患生宜令總管進兵如倚李紹榮輩未見其功帝乃命嗣源行營是日延州知州白彦琛奏綏銀兵士剽州城謀叛魏王繼岌傳送郭崇韜父子首函至關下詔張全義收瘞之乙巳以右武衛上將軍李肅爲安邑解縣兩池㩁鹽使以吏部尚書李琪為國計使三月丁未朔李紹真奏收復邢州擒賊首趙太等二十一人狥于鄴都城下皆磔于軍門庚戌李紹真自邢州赴鄴都城下辛亥以威武軍節度副使福建管内都指揮使檢校太傅守江州刺史王延翰為福建節度使依前檢校太傅壬子李嗣源領軍至鄴都營于西南隅甲寅進營于觀音門外下令諸軍詰旦攻城是夜城下軍亂廹嗣源為帝遲明亂軍擁嗣源及霍彦威入于鄴城復為皇甫暉趙進等所脅嗣源以詭詞得出夜分至魏縣時嗣源遙領鎮州詰旦議欲歸藩上章請罪安重誨以為不可語在明宗紀中翼日遂次于相州元行欽部下兵退保衛州以飛語上奏嗣源一日之中遣使上章申理者數四帝遣嗣源子從審與中使白從訓賫詔以諭嗣源行至衛州從審為元行欽所械不得達是日西面行營副招討使任圜奏收復漢州擒逆賊康延孝丙辰荆南高季興上言請割峽内夔忠萬等三州却歸當道依舊管係又請雲安監初將議伐蜀詔高季興令率本軍上峽自收元管屬郡軍未進夔忠萬三州已降季興數請之因賂劉皇后及宰臣樞宻使内外叶附乃俞其請戍午詔河南府預借今年夏秋租税時年饑民困百姓不勝其酷京畿之民多號泣于路議者以為劉盆子復生矣庚申詔潞州節度使孔勍赴闕以右龍虎統軍安崇阮權知潞州是日忠武軍節度使齊王張全義薨壬戌宰臣豆盧革率百官上表以魏博軍變請出内府金帛優給將士不報時知星者上言客星犯夫庫宜散府蔵又云流星犯天棓主御前有急兵帝召宰臣於便殿皇后出宫中粧匳銀盆各二并皇子滿哥三人謂宰臣曰外人謂内府金寳無數向者諸侯貢獻旋供賜與今宫中有者粧匳嬰孺而已可鬻之給軍革等惶恐而退癸亥以偽置昭武軍節度使林思諤為閬州刺史是日出錢帛給賜諸軍兩樞宻使及宋唐玉景進等各貢助軍錢幣是時軍士之家乏食婦女掇蔬於野及優給軍人皆負物而詬曰吾妻子已殍矣用此奚為甲子元行欽自衛州率部下兵士歸帝幸耀店以勞之西川輦運金銀四十萬至闕分給將士有差元行欽請車駕幸汴州帝將發京師遣中官向延嗣馳詔所在誅蜀主王衍仍夷其族乙丑車駕發京師戊辰遣元行欽將騎軍沿河東向壬申帝至滎澤以龍驤馬軍八百騎為前軍遣姚彦温董之彦温行至中牟率所部奔于汴州時潘瓌守王村寨有積粟數萬亦奔汴州是時李嗣源已入于汴帝聞諸軍離散精神沮喪至萬勝鎮即命旋師登路旁荒塜置酒視諸將流涕俄有野人進雉因問塜名對曰里人相傳為愁臺帝彌不悦罷酒而去是夜次氾水初帝出東關從駕兵二萬五千及復至汜水巳失萬餘騎乃留秦州都指揮使張瑭以步騎三千守關帝過甖子谷道路險狹毎遇衛士執兵仗者皆善言撫之曰適報魏王繼岌又進納西川金銀五十萬到京當盡給爾等軍士對曰陛下賜與太晩人亦不感聖恩帝流涕而已又索袍帯賜從官内庫使張容哥對曰頒給已盡衛士叱容哥曰致吾君社稷不保是此閹豎抽刀逐之或救而獲免容哥謂同黨曰皇后惜物不散軍人歸罪于吾輩事若不測吾輩萬段願不見此禍因投河而死隆平集内臣李承進逮事唐莊宗太祖嘗問莊宗時事對曰莊宗好畋獵毎次近郊衛士必控馬首曰兒郎輩寒冷望陛下與救接莊宗隨所欲給之如此者非一晚年蕭墻之禍由賞賚無節威令不行也太祖嘆曰二十年夾河戰争不能以軍法約束此輩誠兒戲甲戌次石橋帝置酒野次悲啼不樂謂元行欽等諸將曰鄴下亂離㓂盜蜂起總管廹于亂軍存亡未測令訛言紛擾朕實無聊卿等事予以來富貴急難無不共之令兹危䠞賴爾籌謀而今黙黙無言坐觀成敗予在滎澤之日欲單騎渡河訪求總管面為方略招撫亂軍卿等各吐胷襟共陳利害今日俾予至此卿等如何元行欽等百餘人垂泣而奏曰臣本小人䝉陛下撫養位極將相危難之時不能立功報主雖死無以塞責乞申後効以報國恩于是百餘人皆援刀截髮置鬚于地以斷首自誓上下無不悲號識者以為不祥是日西京留守張筠部署西征兵士到京見于上東門外晡晚帝還宫初帝在氾水衛兵散走京師恐駭不寧及帝至人情稍安乙亥百官進名起居安義節度使孔勍奏㸃校兵士防城準詔運糧萬石進發次時勍已殺監軍使據城詭奏也丙子樞宻使李紹宏與宰相豆盧革韋説㑹於中興殿之廊下商議軍機因奏魏王西征兵士將至車駕且宜控氾水以俟魏王從之午時帝出上東門親閲騎軍誡以詰且東幸申時還宫四月丁丑朔以永王存霸為北都留守申王存渥為河中節度使是日車駕將發京師從駕馬軍陳于寛仁門外歩兵陳于五鳯門外帝内殿食次從馬直指揮使郭從謙自本營率所部抽戈露刃至興教門大呼與黄甲兩軍引弓射興教門帝聞其變自宫中率諸王近衛禦之逐亂兵出門既而焚興教門縁城而入登宫牆讙譟帝御親軍格鬭殺亂兵數百俄而帝為流矢所中亭午崩于絳霄殿之廡下時年四十二琬琰集載宋實録王全斌𫝊云同光末蕭牆有變亂兵逼宫城近臣宿將皆釋甲潛遁惟全斌與符彦卿等十數人居中拒戰莊宗中流矢扶掖歸絳霄殿全斌痛哭而去東都事畧符彦卿𫝊云郭從諫之亂莊宗左右皆引去唯彦卿力戰殺十餘人莊宗崩彦卿痛哭而去是時帝之左右例皆奔散唯五坊人善友歛廊下樂器簇于帝屍之上發火焚之及明宗入洛止得其燼骨而已天成元年七月丁卯有司上諡曰光聖神閔孝皇帝廟號莊宗是月丙子𦵏于雍陵五代史補莊宗之嗣位也志在渡河但恨河東地狹兵少思欲百練其衆以取必勝于天下乃下令曰凡出師騎軍不見賊不許騎馬或歩騎前後已定不得越軍分以避險惡其分路並進期㑹有處不得違晷刻并在路敢言病者皆斬之故三軍懼法而戳力皆一以當百故朱梁舉天下而不能禦卒為所滅良有以也初莊宗為公子時雅好音律又能自撰曲子詞其後凡用軍前後隊伍皆以所撰詞授之使揭聲而唱謂之御製至于入陣不論勝負馬頭纔轉則衆歌齊作故凡所鬬戰人忘其死斯亦用軍之一竒也忽莊宗好獵每出未有不蹂踐苖稼一旦至中牟圍合有縣令忘其姓名犯圍諫曰大凡有國家者當視民如赤子性命所繫陛下以一時之娛恣其蹂踐使比屋囂然動溝壑之慮為民父母豈若是耶莊宗大怒以為遭縣令所辱遂叱退將斬之伶官鏡新磨者知其不可乃與群伶齊進挽住令佯為詬責曰汝為縣可以指麾百姓為兒既天子好獵即合多留閒地安得縱百姓耕鋤皆徧妨天子鷹犬飛走耶而又不能自責更敢咄咄吾知汝當死罪諸伶亦皆嘻笑繼和于是莊宗黙然其怒少霽頃之恕縣令罪五代史闕文莊宗嘗因博戲覩骰子采有暗相輪者心悦之乃自置暗箭格凡博戲並認采之在下者及同光末鄴都兵亂從謙以兵犯興教門莊宗禦之中流矢而崩識者以為暗箭之應史臣曰莊宗以雄圖而起河汾以力戰而平汴洛家讐既雪國祚中興雖少康之嗣夏配天光武之膺圖受命亦無以加也然得之孔勞失之何速豈不以驕于驟勝逸于居安忘櫛沐之艱難狥色禽之荒樂外則伶人亂政内則牝雞司晨靳恡貨財激六師之憤怨徴搜輿賦竭萬姓之脂膏大臣無罪以獲誅衆口吞聲而避禍夫有一于此未或不亡矧咸有之不亡何待静而思之足以為萬世之炯戒也舊五代史巻三十四
