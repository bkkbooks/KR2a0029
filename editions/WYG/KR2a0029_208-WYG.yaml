body:
  text: 舊五代史卷一百四宋門下侍郎參知政事監修國史薛居正等撰漢書第六后妃列傳一高祖皇后李氏晉陽人也高祖㣲時嘗牧馬于晉陽别墅因夜入其家刼而取之及高祖領藩鎮累封魏國夫人高祖建義于太原欲行頒賚于軍士以公帑不足議率井邑助成其事后聞而諫曰自晉高祖建義及國家興運雖出于天意亦土地人民福力同致耳未能惠其衆而欲奪其財非新天子䘏隱之理也今後宫所積宜悉以散之設使不厚人無怨言高祖改容曰敬聞命矣遂停歛貸之命后傾内府以助之中外聞者無不感悦天福十二年册為皇后隱帝即位尊為皇太后案以下疑有闕文據通鑑云隱帝與李業等謀誅楊邠等議既定入白太后太后曰兹事何可輕發更宜與宰相議之業時在旁曰先帝嘗言朝廷大事不可謀及書生懦怯誤人太后復以為言帝忿曰國家之事非閨門所知拂衣而出又云南北遇于劉子陂帝欲自出勞軍太后曰郭威吾家故舊非死亡切身何以至此但按兵守城飛詔諭之觀其志趣必有辭理則君臣之禮尚全慎勿輕出帝不從周太祖入京凡國軍大事皆請后發教令以行之是歲議立徐州節度使贇為帝以迎奉未至周太祖乃率羣臣拜章請后權臨朝聽政后于是稱誥焉及周太祖為六軍推戴上章具述其事且言願事后為慈母后下誥答曰侍中功烈崇高德聲昭著翦除禍亂安定乾坤謳歌有歸厯數攸屬所以軍民推戴億兆同歡老身未終殘年屬兹多難惟以衰朽託于始終戴省來牋如母見待感念深意涕泗横流云仍出戎衣玉帶以賜周太祖周太祖即位上尊號曰德聖皇太后居于太平宫周顯德元年春薨案隱帝未立皇后據是書張彦成傳云隱帝娶彦成女楊邠傳云隱帝所愛耿夫人欲立為后邠以為太速夫人卒隱帝欲以后禮葬邠又止之蓋隱帝在位三年崩時年二十故未及册立皇后也又五代會要載漢髙祖長女永寧公主降宋延渥天福十二年四月封至乾祐二年十二月追封秦國長公主舊五代史卷一百四
