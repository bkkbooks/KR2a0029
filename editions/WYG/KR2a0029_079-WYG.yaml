body:
  text: 舊五代史巻三十九宋門下侍郎參知政事監修國史薛居正等撰唐書第十五明宗紀五天成三年春正月戊申朔帝御崇元殿受朝賀仗衛如式辛亥前河陽節度使檢校太傅兼侍中孔勍以太子太傅致仕癸丑詔取今月十七日幸鄴都甲寅以國子祭酒朱守素卒廢朝丙辰以鎮南軍節度使袁建豐卒廢朝詔贈太尉丁巳詔曰朕聞堯舜有恤刑之典務貴好生禹湯申罪已之言庶明知過今月十七日據巡檢軍使渾公兒口奏稱有百姓二人以竹竿習戰鬪之事朕初聞奏報實所不容率爾𫝊宣令付石敬瑭處置今且重誨敷奏方知悉是幼童為戯載聆讜議方覺失刑循揣再三愧惕非一亦以渾公兒誑誣頗甚石敬瑭詳覆稍乖致人枉法而殂處朕有過之地今減常膳十日以謝幽寃其石敬瑭是朕懿親合施極諫既兹錯誤宜示省循可罰一月俸渾公兒決脊杖二十仍銷在身職銜配流登州小兒骨肉賜絹五十匹粟麥各百石便令如法埋葬兼此後在朝及諸道州府凡有極形並須子細裁遣不得因循百寮進表稱賀已未中書門下奏國子祭酒望令宰相兼判乃詔崔協判之五代㑹要載原奏云祭酒之資歴朝所貴爰從近代不重此官況屬聖朝方勤庶政須宏雅道以振時風望令宰臣一員兼判國子祭酒辛酉以前潞州節度使毛璋為右金吾上將軍以左驍衛上將軍華温琪為右金吾大將軍以春州刺史張䖍釗為鄭州防禦使時契丹方陷平州癸亥詔應廟諱文字只避正文其偏旁文字不用虧缺㸃畫契丹遣使托諾巴摩哩等貢獻帝遣指揮使奔托山押國信賜契丹王妻戊辰以隨駕馬軍都指揮使富州刺史康義誠兼領鎮南軍節度使以隨駕步軍都指揮使潮州刺使楊漢章遥領寧國軍節度使中書上言舊制遇二月十五日𤣥元皇帝降聖節休假三日凖會昌元年二月勅休假一日請準近勅從之吐蕃伊埒雅遜等六人回鶻米里都督等四人並授歸徳懐逺將軍悉放還蕃庚午册贈故􅘵州刺史李嗣頵為太尉壬申冊贈故皇子檢校司空從諲為太保甲戌制以楚國夫人曹氏為淑妃以韓國夫人王氏為徳妃仍令所司擇日冊命二月丁丑朔有司上言太陽合虧既而有雲不見羣官表賀詔巡幸鄴都宜停庚辰偽呉楊溥遣使貢獻賀誅朱守殷帝以荆南拒命通連淮夷不納其使遣還壬午以光祿卿韋寂卒廢朝贈禮部尚書癸未工部尚書盧文紀貶石州司馬員外安置文紀私諱業時新除于鄴為工部郎中舊例寮屬名與長官諱同或改其任文紀素與宰相崔協有隙故中書未議改官于鄴授官之後文紀自請連假鄴尋就位及差延州官告使副未行文紀參告且言候鄴回日終請換曹鄴其夕自經而死故文紀貶官以倉部郎中何澤為吏部郎中奨伏閤諫巡幸鄴都也丁亥天徳軍節度使郭承豐加檢校司徒辛邜以山南西道節度使張筠為左驍衛上將軍詔中外羣臣父母亡沒者並與追封贈癸已以禮部尚書崔貽孫卒輟朝甲午以吐渾寧朔奉化兩府都知兵馬使李紹魯為吐渾寧朔府都督乙未以樞密使兼東都留守孔循為許州節度使兼東都留守鄧州節度使髙行珪移鎮安州應州節度使李從璋移鎮滑州滑州節度使盧文進移鎮鄧州丁酉以責授檀州刺史劉訓為右龍武大將軍已亥回鶻克汗仁喻遣都督李爾珊等貢獻壬寅以左金吾大將軍羅周敬為同州節度使甲辰以威塞軍節度使張廷裕卒廢朝詔贈太保以耀州團練使孫岳為閬州團練使以左監門上將軍髙允貞為右金吾衛大將軍以右金吾衛大將軍華温琪為左金吾衛大將軍三月丁未朔以久雨為災詔文武百辟極言時政得失丁已以邢州節度王景戡為華州節度使以前北京副留守李從温為邢州節度使已未以宰臣鄭珏為開府儀同三司左僕射致仕加食邑五百户庚辰以前復州刺史翟章為新州威塞軍畱後中書奏孟夏薦饗合宰相行事在朝只有宰相二員今東都留守孔循帶平章事宜令攝太尉行事孔循稱使相有戎機不當司祠祭重事癸亥以前鎮州節度使王建立為右僕射兼中書侍郎平章事集賢殿大學士判三司西方鄴上言收復歸州以前鄭州刺史楊漢賔為洋州武定軍留後戊辰以前彰國軍節度副使陳皋為鳳州武興軍留後以前蔡州刺史孫漢韶為應州彰國軍留後以宣徽南院使范延光為樞密使以宣徽北院使判三司張延朗為宣徽南院使以前冀州刺史婁繼英為耀州團練使以懐州刺史張廷藴為金州防禦使已巳命范延光權知鎮州軍府事西方鄴奏于歸州殺敗荆南賊軍數千人時有太白山道士解元龜自西川至對于便殿稱年一百一歳既而上表乞西都留守兼西川制置使要修西京宫闕帝謂侍臣曰此人老耄自逺來朝方期别有異見反為身名甚可笑也賜號知白先生賜紫放歸山甲戌冊回鶻可汗仁喻為順化可汗夏四月戊寅以汴州節度使石敬瑭為鄴都留守充天雄軍節度使加同平章事以樞密使權知鎮州軍府事檢校太保范延光為鎮州節度使兼北面水陸轉運使以司農卿鄭繢為太僕卿壬午虁州節度使東南面副招討使西方鄴加檢校太保甲申皇第三女石氏封永寧公主第十三女趙氏封興平公主仍令所司擇日册命幽州上言契丹有書求樂器乙酉達靼遣使朝貢以隨駕馬軍都指揮使康義誠為侍衛親軍馬步軍都指揮使丙戌樞密使安重誨兼河南尹以皇子河南尹判六軍諸衛事從厚為汴州節度使判六軍如故丁亥復州奏湖南大破淮賊于道人磯以西川馬步軍都指揮使趙廷隠兼漢州刺史從孟知祥之請也九國志趙廷隠傳知祥至蜀康延孝陷漢州遣廷隠率兵擊破之擒延孝檻送闕下知祥奏加檢校司空漢州刺史遂留屯成都洋州上言重開入蜀舊路三百餘里比今官路較二十五程而近癸已殿中少監石知納貶憲州司户坐煽惑軍鎮也北面副招討宋州節度使王晏球以定州節度使王都反狀聞庚子制義武軍節度使檢校太尉兼中書令太原王王都削奪官爵壬寅以王晏球為北面行營招討使知定州行軍州事以滄州節度使兼北面行營馬軍都指揮使安審通為副招討使兼諸道馬軍都指揮使以左㪚騎常侍蕭希甫兼判大理卿事西京奏前樞密使張居翰卒五月乙已朔回鶻可汗仁喻封順化可汗丁未鄴都留守天雄軍節度使石敬瑭河陽節度使趙延夀並加駙馬都尉以右僕射李琪為太子少傅辛亥沙州節度使曹義金加爵邑王晏球上言收奪得定州北西二關城癸丑湖南馬殷奏二月中大破淮冦二萬生擒將士五百人中書上言諸道薦人總與不可全阻又難今後節度使每年許薦二人帶使相者許薦三人團練防禦使各一人節度觀察判官並聽旨授書記以下即許隨府從之以六軍判官尚書司封郎中史圭為右諫議大夫充樞密直學士詔州縣官以三十月為考限刺史以二十五月為限以到任日為始已未幽州奏契丹託諾領二千騎西南趣定州以前同州節度使盧質行兵部尚書判太常卿事辛酉以天雄軍節度副使判興唐府事趙敬怡為樞密使詔曰上柱國勲之極也近代已來文臣官階稍髙便授柱國歳月未深便轉上柱國武資初官便授上柱國今後凡加勲先自武騎尉十二轉方授上柱國永作成規不令踰越丁夘鎮州奏今月十八日王師不利于新樂壬申王晏球奏今月二十一日大破定州賊軍及契丹于曲陽斬獲數千人王都與塔納以數十騎復入于定州六月已夘以右金吾上將軍毛璋為左金吾上將軍以前安州節度使史敬鎔為右金吾上將軍以前華州節度使劉彦琮為左武衛上將軍壬午放内園鹿七頭于深山乙酉皇子故金槍指揮使檢校左僕射從璟贈太保已丑幽州趙徳鈞奏殺契丹千餘人于幽州東獲馬六百匹壬辰宰臣馮道率百寮上表請上尊號曰聖明神武文徳恭孝皇帝詔報不允丙申馮道等再上尊號不允戊戌以西京副留守知留守事張遵誨行京兆尹秋七月乙巳詔故偽蜀主王衍追封順正公以諸侯禮葬丙午以前武信軍節度使李敬周為邠州節度使丁未以滄州節度使安審通卒于師輟朝壬子以朔方節度使韓洙卒廢朝甲寅王晏球奏六月二十二日進攻逆城將士傷者三千人時晏球知城中有備未欲急攻朱宏昭張䖍釗切于立功促攻賊壘晏球不得已而進兵遂致傷痍者衆乙夘以太子少保李茂勲卒輟朝已未詔弛麴禁許民間自造于秋苗上紉徴麴價畝出五錢時孔循以麴法殺一家于洛陽或獻此議以為愛其人便于國故行之宗正卿李紓除名刑部侍郎馬縞貶綏州司馬刑部員外郎李慎儀貶階州司户初李紓差攝陵臺令張保嗣等各虛稱試銜為奉先令王延朗所訟大理寺斷以詐假官論刑部詳覆稱非詐假大理執之召兩司廷議刑部理屈故有是貶紓續勅配隴州徒一年未幾詔曰天下府州例是攝官皆結試銜或因勘窮便關詐假已前或有稱試銜一切不問此後並宜禁止曹州刺史成景宏貶綏州司户參軍續勅長流宥州尋賜自盡坐受本州倉吏錢百緡也壬戌齊州防禦使曹廷隠以奏舉失實配流永州續勅賜自盡甲子王晏球奏今月十九日契丹七千騎來援定州王師逆戰于唐河北大破之追至滿城又破之斬二千級獲馬千匹戊辰福建節度使王延鈞可依前檢校太師守中書令進封閩王已已王晏球奏此月二十一日追契丹至易州掩殺四十里擒獲甚衆故朔方節度使韓洙贈太尉以兵部侍郎王權御史中丞梁文矩並為吏部侍郎以左諫議大夫吕夢奇為御史中丞八月癸酉朔以翰林學士守中書舍人李懌劉昫並為户部侍郎充職以吏部侍郎劉岳守祕書監以吏部侍郎韓彦惲守禮部尚書以户部侍郎韓藹守太子賔客以户部侍郎裴皥守兵部侍郎以中書舍人張文寶守刑部侍郎詔凡有姓犯廟諱者以本望為姓丁丑以檢校尚書右僕射守龍武大將軍劉訓為晉州節度使檢校太傅壬午幽州趙徳鈞奏于府西邀殺契丹敗黨數千人生擒首領特哩衮及其屬凡五十餘人是時官軍襲殺契丹屬秋雨繼降泥濘莫進人饑馬乏㪚投村落所在村民持白挺毆殺之徳鈞出兵接于要路惟奇峯嶺北有馬潛遁脫者數十餘無噍類帝致書諭其本國辛夘以朔方軍留後韓璞為朔方軍節度使靈武雄警甘肅等州觀察使檢校司徒帝聞隨鄧復郢均房之民父母骨肉有疾以長竿遥致粥食而餉之出嫁女夫家不遣來省疾乃下詔委長吏嚴加禁察房州奏新開山路四百里南通虁州畫圖以獻以前洋州節度使戴思逺為太子太保致仕庚子詔今後翰林學士入院以先後為班次承㫖一員不計官資先後在學士之上閏月丁未兩浙節度觀察畱後清海軍節度使檢校太師兼中書令錢元瓘可杭州越州大都督府長史充鎮東鎮海等軍節度使戊申趙徳鈞獻戎俘于闕下其蕃將特哩衮等五十人畱于親衛餘契丹六百人皆斬之乙夘升楚州為順化軍以明州刺史錢元珦為本州節度使以吏部尚書蕭頃為太子少保契丹遣使來貢獻契丹平州刺史張希崇上表歸順乙丑陜州節度使李從敏移鎮滄州以宣徽南院使張延朗為陜州節度使詔在京遇行極法日宜不舉樂兼減常膳諸州遇行極法日禁聲樂已已滑州掌書記孟昇匿母服大理寺斷處流特勅孟昇賜自盡觀察使觀察判官録事參軍失其糾察各行殿罰襄邑縣民聞威父為人所殺不雪父寃有狀和解特勅處死是月二十七大水河水溢絳州地震九月乙亥以捧聖左右廂副都指揮使索自通為雲州節度使丁丑以太府卿判四方館事李郁為宗正卿壬午以晉州節度使安崇阮為左驍衛上將軍甲申吐蕃回紇各遣使貢獻壬辰宰臣王建立進玉杯上有文曰𫝊國萬歳盃乙未詔徳州流人温韜遼州流人段凝嵐州司户陶玘憲州司户石知訥原州司馬聶嶼並宜賜死于本處暴其宿惡而誅之也丙申以邠州節度使梁漢顒為右威衛上將軍丁酉河陽節度使駙馬都尉趙延夀為檢校司徒已亥詔徐州節度使房知温兼荆南行營招討使知荆南行府事冬十月甲辰制瓊華長公主孟氏可册為福慶長公主丙午以滄州節度使李從敏兼北面招討使戊申帝臨軒命禮部尚書韓彦惲工部侍郎任贊往應州奉册四廟詔邠州節度使李敬周攻慶州以刺史竇廷琬拒命故也戊午契丹平州刺史張希崇已下八十餘人見于𤣥徳殿頒賜有差突厥首領張慕進等來朝貢甲子安州節度使髙行珪奏屯駐左神捷左懐順軍士作亂已逐殺出城詔升夀州為忠正軍戊辰以雲州節度使索自通領夀州節度使以前雲州節度使張温復為雲州節度使庚午夜西南有彗星長丈餘在牛星五度十一月癸酉日南至帝御崇元殿受朝賀甲戌捧聖指揮使何福進招收到安州作亂兵士五百人自指揮使已下至節級四十餘人並斬餘衆釋之壬午房知温奏荆南髙季興卒中書舍人劉贊奏請節度使及文班三品已上謝見通喚從之是日以契丹所署平州刺史光祿大夫檢校太保張希崇為汝州刺史加檢校太傅已丑中書奏今後或有封册請御正衙從之青州奏節度使霍彦威卒輟朝三日詔宰臣王建立權知青州軍州事庚寅禮部員外郎和凝奏應補齋郎並須引驗正身以防偽濫舊例使䕃一任官補一人今後改官須轉品即可如無子許以親姪繼限念書十巻試可則補從之甲午以尚書左僕射同平章事集賢殿大學士判三司王建立為青州節度使檢校太尉同平章事丙申帝謂侍臣曰古鐵券如何趙鳳對曰帝王誓文許其子子孫孫長享爵祿帝曰先朝所賜惟朕與郭崇韜李繼麟三人爾崇韜繼麟㝷已族滅朕之危疑慮在旦夕于是嗟嘆久之趙鳳曰帝王執信故不必銘金鏤石矣吏部郎中何澤奏流外官請不試書判之類從之吐蕃遣使朝貢戊戌前安州節度副使范延榮並男皆斬于軍巡獄為髙行珪誣奏故也十二月壬寅朔詔真定府屬縣宜準河中鳳翔例升為次畿真定縣升為次赤甲辰邠州節度使李敬周奏收下慶州刺史竇廷琬族誅舊五代史巻三十九
