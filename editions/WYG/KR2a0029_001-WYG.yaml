body:
  text: 舊五代史目録上正史類宋門下侍郎參知政事監修國史薛居正等撰巻一梁書一太祖本紀一巻二梁書二太祖本紀二巻三梁書三太祖本紀三巻四梁書四太祖本紀四巻五梁書五太祖本紀五巻六梁書六太祖本紀六巻七梁書七太祖本紀七巻八梁書八末帝本紀上巻九梁書九末帝本紀中巻十梁書十末帝本紀下巻十一梁書十一后妃列傳一文惠王太后元貞張皇后張徳妃巻十二梁書十二宗室列傳二廣王全昱友諒惠王友能邵王友誨安王友寧密王友倫郴王友裕傅王友文庶人友珪福王友璋賀王友雍建王友徽康王友孜巻十三梁書十三列傳三朱瑄朱瑾時溥王帥範劉知俊楊崇本蔣殷張萬進巻十四梁書十四列傳四羅紹威趙犨弟昶王珂􅀈兄珙巻十五梁書十五列傳五韓建李䍐之馮行襲孫徳昭趙克裕張慎思巻十六梁書十六列傳六葛從周謝彦章胡眞張歸霸張歸厚張歸弁巻十七梁書十七列傳七成汭杜如鍾傳田額朱延壽趙匡凝張信雷滿巻十八梁書十八列傳八張文蔚薛貽矩張策杜曉敬翔李振巻十九梁書十九列傳九氏叔琮朱友恭王重師朱珍李思安鄧季筠黄文靖胡規李讜李重裔范居實巻二十梁書二十列傳十謝瞳司馬鄴劉捍王敬蕘高劭馬嗣勲張存敬冦彥卿巻二十一梁書二十一列傳十一龎師古霍存符道昭徐懐玉郭言李唐賓王䖍裕劉康乂王彥章巻二十二梁書二十二列傳十二楊帥厚牛存節王檀巻二十三梁書二十三列傳十三劉鄩賀瓖康懐英王景仁巻二十四梁書二十四列傳十四李珽盧會孫騭張儁張衍杜荀鶴羅隐仇殷段深巻二十五唐書一武皇本紀上巻二十六唐書二武皇本紀下巻二十七唐書三莊宗本紀一巻二十八唐書四莊宗本紀二巻二十九唐書五莊宗本紀三巻三十唐書六莊宗本紀四巻三十一唐書七莊宗本紀五巻三十二唐書八莊宗本紀六巻三十三唐書九莊宗本紀七巻三十四唐書十莊宗本紀八巻三十五唐書十一明宗本紀一巻三十六唐書十二明宗本紀二巻三十七唐書十三明宗本紀三巻三十八唐書十四明宗本紀四卷三十九唐書十五明宗本紀五巻四十唐書十六明宗本紀六巻四十一唐書十七明宗本紀七巻四十二唐書十八明帝本紀八巻四十三唐書十九明宗本紀九巻四十四唐書二十明宗本紀十巻四十五唐書二十一閏帝本紀巻四十六唐書二十二末帝本紀上巻四十七唐書二十三末帝本紀中巻四十八唐書二十四末帝本紀下巻四十九唐書二十五后妃列傳一貞簡曹太后劉太妃魏國夫人陳氏神閔劉皇后韓淑妃伊徳妃昭懿夏皇后和武曹皇后宣憲魏太后孔皇后劉皇后巻五十唐書二十六宗室列傳二克讓克修子嗣胘克恭克寧巻五十一唐書二十七宗室列傳三永王存霸邕王存美薛王存禮申王存渥睦王存乂通王存確魏王繼岌弟繼潼等繼璟㤗王從榮從璨許王從益重吉雍王重美巻五十二唐書二十八劉傳四李嗣昭子繼編裴約李嗣本李嗣㤙巻五十三唐書二十九列傳五李存信李存孝李存進子漢韶李存璋李存賢巻五十四唐書三十列傳六王鎔子昭誨王處直子都巻五十五唐書三十一列傳七康君立薛志勤史建瑭李承嗣史儼蓋寓伊廣李承勲史敬鎔巻五十六唐書三十二列傳八周徳成符存審子彥超巻五十七唐書三十三列傳九郭崇韜巻五十八唐書三十四列傳十趙光逢鄭珏崔恊李琪蕭頃巻五十九唐書三十五列傳十一丁㑹閻實符習烏震王瑻袁象先張温李紹文巻六十唐書三十六列傳十二李襲吉王緘李敬義盧汝弼李徳休蘇循巻六十一唐書三十七列傳十三安金全從子審安重霸劉訓張敬詢劉彥琮袁建豐西方鄴張遵誨孫璋巻六十二唐書三十八列傳十四孟方立張文禮董璋巻六十三唐書三十九列傳十五張全義朱友謙巻六十四唐書四十列傳十六霍彥威王晏球戴思逺朱漢賓孔勍劉玘周知裕巻六十五唐書四十一列傳十七李建及石君立高行珪張延裕王思同宗自通巻六十六唐書四十二列傳十八安重誨朱𢎞昭朱洪實康義誠藥彥稠宋令詢巻六十七唐書四十三列傳十九豆盧革韋説盧程趙鳯李愚任圜巻六十八唐書四十四列傳二十薛廷珪崔沂劉岳封舜卿竇夢徴李保殷歸藹孔邈張文寳陳乂劉瓚巻六十九唐書四十五列傳二十一張憲王正言胡裝崔貽孫孟鵠孫岳張延朗劉延皓劉延朗巻七十唐書四十六列傳二十二元行欽夏魯竒姚洪李嚴李仁矩康思立張敬達巻七十一唐書四十七列傳二十三馬郁司室頲曹廷隠蕭希甫藥縀之賈馥馬縞羅貫張格許寂周𤣥豹巻七十二唐書四十八列傳二十四張承業張居翰馬紹宏孟漢瓊巻七十三唐書四十九列傳三十五毛璋聶璵温韜殷凝孔謙李鄴巻七十四唐書五十列傳二十六康延李朱守殷楊立竇延琬張䖍釗楊彥温舊五代史目録上
