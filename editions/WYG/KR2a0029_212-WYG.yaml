body:
  text: 舊五代史巻一百六考證漢列傳三劉審交傳服闋不出累年案歐陽史作不調累年時有燕軍千人守捉諸門千人杜重威傳或作千五百人劉在明傳高祖踐阼授幽州道行營都部署案通鑑在明先爲成德軍留後繼授幽州道馬歩都部署與是書前後互異馬萬傳時滑州節度使符彦饒潛通鄴下殺白奉進於牙署案是書晋列傳符彦饒以忿争殺白奉進非之潛通鄴下也此傳盖沿實録傳聞之誤通鑑從晋列傳白再榮傳本蕃部人也案歐陽史作不知其世家何人也嘉哩舊作解里今改滿逹勒舊作麻答今改舊五代史巻一百六考證
