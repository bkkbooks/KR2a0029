body:
  text: 舊五代史巻九十五攷證晉列傳十皇甫遇𫝊常山人也案歐陽史作常山真定人假令失此二将將何面目以見天子案通鑑作坐失皇甫太師吾屬何顔以見天子胡三省注云皇甫遇未必加官至太師也而安審琦以太師稱之葢五季之亂官賞無章當時相稱謂不論其品秩就人臣極品而稱之据是書遇累官至檢校太師審琦盖稱其檢校之官也胡注似未詳考梁漢璋傳與契丹騎五千相遇于浮陽之北界苦戰竟日以衆寡不侔為流矢所中殁陣案遼史髙模翰傳云晉以魏府節度使杜重威領兵三十萬来拒模翰以麾下三百人逆戰殺其先鋒梁漢璋餘兵敗走與是書異考通鑑云杜威等至瀛州聞契丹将髙模翰先已引兵潜出威遣梁漢璋将二千騎追之遇契丹于南陽務敗死盖漢璋以二千騎當敵騎五千衆寡不侔以致敗績遼史恐不足據周瓌𫝊暉遂掠城中財帛士女欲奔江南尋為其下所殺案歐陽史作王暉南走為從進兵所殺與是書異通鑑作暉時奔吴部將胡進殺之與是書同沈贇𫝊契丹以精騎剗其門邀之州兵䧟賊案歐陽史作斌兵多死通鑑作契丹以精騎奪其城門州兵不得還吴巒𫝊即與雲州將吏闔門拒守契丹大怒攻之半嵗不能下髙祖致書于契丹乃解闈而去案遼史太宗紀云唐大同軍節度判官吴巒嬰城拒命遣崔廷勲闈其城庚申上親征至城下諭之巒降與是書異通鑑從是書舊五代史巻九十五攷證
