  text: 舊五代史巻三十一攷證唐莊宗紀五開府儀同三司守尚書令秦王李茂貞秦王通鑑作岐王鎮州奏契丹塞詔李嗣源率師屯邢州案通鑑詔横海節度使李紹斌北京指揮使李從珂帥騎兵分道備之與是書異靈鹽威警雄涼甘肅等州觀察使案威警疑當作威涇攷通鑑注云警州在涇原西今仍其舊舊五代史巻三十一攷證
