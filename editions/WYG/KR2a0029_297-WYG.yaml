front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0029_WYG_297-1a, image: WYG0278/WYG0278-0590a.png}
body:
  text: 舊五代史巻一百五十宋門下侍郎參知政事監修國史薛居正等撰志十二郡縣志河南道西京河南府兖州宋州滑州陳州許州曹州陜州亳州青州鄭州汝州密州單州潁州濟州濮州濱州蔡州闗西道雍州同州京兆府華州耀州衍州乾州武州隴州良州涇州府州原州雄州鄜州警州威州河東道并州武州太原府雲州潞州應州澤州絳州晉州慈州新州隰州遼州勝州沁州府解州河中河北道魏州府大名府真定滄州鎮州景州德州雄州邢州幽州磁州縣澶州州貝州州相州州泰州州新成定博莫深瑞州軍静安劔南道蜀州彭州漢州江南道黔州婺處州湖温州州州秀州蘇州全州邵州杭州郴州福州建州台州道州明州鄂州䖍州潭州淮南道安州壽州廬州縣楚州天長山南道襄州復鄧州金唐州州州忠州集州萬州鳳州䕫州唐州利州商州䦘州隨州果州合州朗州軍雄勝隴右道泰州洮州成州嶺南道邕州唐州恩州潘州溥州桂州思案以上所載郡縣當是以開元十道圖為本惟五代之改制及仍唐舊制者則闕焉疑原本有所節删今仍録於巻首以存其舊梁開平元年梁祖初開國升汴州為開封府建名東京元管開封浚儀陳留雍丘封丘尉氏六縣至是割滑州之酸棗長垣鄭州之中牟陽武宋州之襄邑曹州之戴邑許州之扶溝鄢陵陳州之太康九縣𨽻焉後唐復降為汴州以宣武軍為額其陽武長垣扶溝考城等四縣仍且𨽻汴州其餘五縣卻還本部晉天福中復升為東京復以前五縣𨽻之漢周並因之單州本單父縣梁為輝州後唐同光二年復舊𨽻宋州周廣順中割𨽻曹州案以上二條見太平御覽其餘郡縣闕略不全今考是書諸志多本五代會要謹采五代會要附載於後後唐長興三年四月中書門下奏據十道圖舊制以王者所都之地為上本朝都長安遂以闗内道為上今宗廟宫闕皆在洛陽請以河南道為上闗内道為二河東道第三河北道第四劔南道第五江南道第六淮南道第七山西道第八隴右道第九嶺南道第十從之河南道滑州酸棗縣長垣縣梁開平三年二月割𨽻汴州後唐同光二年酸棗縣卻𨽻滑州長垣縣卻改為匡城縣晉天福三年十月酸棗縣卻割𨽻開封府鄭州中牟縣陽武縣梁開平三年二月割𨽻汴州後唐同光二年二月勑中牟縣卻𨽻鄭州晉天福三年十月中牟縣卻割屬開封府宋州襄邑縣梁開平三年二月割𨽻汴州後唐同光二年卻𨽻宋州晉天福三年十月復割𨽻開封府曹州戴邑縣梁開平三年二月割𨽻曹州後唐同光二年二月復為考城縣許州扶溝縣鄢陵縣梁開平三年二月割𨽻汴州後唐同光二年二月鄢陵縣卻𨽻許州天成元年九月扶溝縣卻𨽻許州晉天福三年十月並割屬開封府陳州大康縣梁開平三年二月割𨽻汴日後唐同光二年二月復𨽻陳州晉天福三年十月卻屬開封府單州楚丘縣梁開平四年四月割𨽻宋州碭山縣後唐同光二年二月勑碭山縣偽梁剏為輝州併單州後理所于輝州今宜卻屬單州其輝州依舊為碭山縣汝州葉縣襄城縣後唐同光二年十二月租庸使奏二縣原屬汝州今𨽻許州伏緣最鄰京畿户口全少伏乞郤割𨽻許州從之臨汝縣周顯德三年三月廢密州輔唐縣梁開平三年八月改為安丘縣後唐同光元年十月復為輔唐縣晉天福七年七月改為膠西縣避國諱也濟州周廣順二年九月以鄆州鉅野升為州其地望為上割兖州任城中都單州金鄉等縣𨽻之至其年十二月又割鄆州鄆城縣𨽻之中都縣郤𨽻鄆州濱州周顯德三年六月勑以贍國軍升為州其地望為上直屬京割棣州渤海蒲台兩縣𨽻之闗内道京兆府奉先縣梁開平三年二月割𨽻同州後唐同光三年二月郤𨽻京兆府武功縣好畤縣後唐長興元年五月勑併臨等四鄉𨽻京兆府渭南縣周顯德三年四月割屬華州同官縣梁開平三年三月割𨽻同州後唐同光三年七月割𨽻耀州美原縣後唐同光三年七月割𨽻耀州華州洛南縣後唐同光三年六月河中府奏韓城郃陽澄城縣偽梁割屬當府其澄城縣今請却立同州韓城郃陽縣且屬當州從之天成元年七月敕韓城郃陽二縣却割𨽻同州隴州汧陽縣汧源縣呉山縣後唐長興元年五月依舊割𨽻隴州涇州平凉縣後唐清泰三年正月涇州奏平凉縣自吐蕃䧟渭州權於平凉縣為渭州理所遂罷平凉縣又有安耀武兩鎮兼屬平凉其賦租節日並無縣管今却置平凉縣管安國耀武兩鎮捌户從之臨涇縣後唐清泰三年二月原州刺史翟建奏本州自䧟吐蕃權于臨涇縣為理所臨涇元屬涇州刺史只管捕盗其人户即涇州管縣既無屬縣刺舉可施伏乞割深涇屬當州從之鄜州鄜城縣梁開平三年四月改為昭化縣後唐同光元年十月復為鄜城縣咸寧縣周顯德三年三月十日廢威州晉天福四年五月敕靈州方渠鎮宜升為威州𨽻靈武仍割寧州木波馬嶺二鎮𨽻之周廣順三年三月改為環州顯德四年九月降為通逺軍衍州周顯德五年六月廢為定平鎮𨽻邠州武州周顯德五年六月廢為潘源縣𨽻渭州河東道絳州梁開平四年四月割屬晉州後唐同光二年六月却割屬河中府慈州隰州後唐同光二年六月割𨽻晉州儀州梁開平三年閏八月勅兖州管内已有沂州其儀州改為遼州晉天福五年三月并沁州割𨽻潞州六年七月并沁州却𨽻太原解州漢乾祐元年九月升解縣為州割河中府聞喜安邑解三縣為屬邑河中府稷山縣後唐同光二年正月割𨽻絳州慈州仵城縣呂香縣周顯德三年三月降河北道鎮州後唐同光元年四月改為北京至十一月復改為成德縣幽州北平縣後唐長興三年八月改為燕平縣滄州長蘆縣乾符縣周顯德三年十月併入清池縣無棣縣周顯德五年改為保順軍弓高縣周顯德六年二月併入東光縣博州武水縣周顯德三年十月併入聊城深州博野縣周顯德四年五月割𨽻定州澤州梁開平元年六月割𨽻河陽四年二月却𨽻潞州德州晉天福五年十一月移就長河縣為理所泰州後唐天成二年三月升奉化軍為泰州以清州縣為理所至晉開運二年九月移就滿城縣至周廣順二年二月廢州其滿城割𨽻易州雄州霸州周顯德六年五月以瓦橋闗為雄州割咨城歸義二縣𨽻之益津闕為霸州割文安大成二縣𨽻之地望並為中州時初平闗南故也劒南道蜀州唐興縣梁開平二年八月改為陶胡縣後唐同光元年十月復為唐興縣彭州唐昌縣梁開平二年八月改為歸化縣後唐同光元年十月復為唐昌縣江南道杭州臨安縣梁開平二年正月改為安國縣福州閩清縣梁開化元年十月移就梅溪場置蘇州呉江縣梁開平三年閏八月兩浙奏與呉江松江置縣明州望海縣梁開平三年閏八月兩浙奏置處州松陽縣梁開平四年五月改為長松縣秀州晉天福三年十月兩浙錢元瓘奏以杭州嘉興縣置湘州晉天福四年四月湖南馬希範奏以湘州縣置州仍置清湘縣並割灌陽縣𨽻之淮南道壽州周顯德四年移於潁州下蔡縣仍以下蔡縣為倚郭以舊壽州為壽春縣盛唐縣梁開平二年八月改為􅏦山縣後唐同光元年十月復為盛唐山南道復州梁乾化二年十月割𨽻荆南後唐天成二年五月却𨽻襄州晉天福五年七月直屬京並為防禦果州後唐天成二年五月𨽻利州唐州慈丘縣周顯德三年三月廢鄧州臨湍縣漢乾祐元年正月改為臨瀬縣避廟諱也菊潭縣向城縣周顯德三年三月廢商州乾化縣漢乾祐二年六月改為乾祐縣割𨽻京兆襄州樂鄉縣周顯德六年二月併入宣城隴右道秦州天水縣隴城縣後唐長興三年二月秦州奏見管長道成紀天水三縣外有十鎮徵科並係鎮將今請以歸化恕水五龍黃土四鎮就歸化鎮復置舊龍城赤砂染坊夕陽南冶鉄務五鎮就赤砂鎮復置舊天水縣其白石大澤良恭三鎮割屬長道縣從之成州同谷縣栗亭縣後唐清泰三年六月秦州奏階州元管將利福州兩縣並無遷鎮成州元管同谷縣餘並是鎮便係徵科今欲取成州西南近便鎮分併入同谷縣其東界四鎮别創一縣者州西南有府城長豐魏平三鎮其地東至泥陽鎮界二十五里北至黃竹路金砂鎮界五十里南至興州界三十里西至白石鎮界一百一十里西南至舊階州界砂地嶺四十五里其三嶺管界併入同谷縣廢其鎮額州東界有勝仙泥陽金砂栗亭四鎮東至鳳州姜贍鎮界十五里南至界州界二十里北至高橋三十五里西至同谷界三十五里北至秦州界六十七里欲併其四鎮地於栗亭縣其徴科委縣司捕盗委鎮司從之嶺南道潘州茂明縣梁開平元年五月改為越常縣至後唐同光元年十月復為茂明縣桂州純化縣梁開平元年五月改為歸化縣後唐同光元年十月復為純化縣邕州晉天福七年七月改為誠州避廟諱溥州晉開運三年三月升桂州全義縣為州仍改全義縣為德昌縣并割桂州臨川廣明義寧等三縣𨽻之從湖南馬希範奏也舊五代史巻一百五十
