body:
  text: 舊五代史巻五十八宋門下侍郎參知政事監修國史薛居正等撰唐書第三十四列𫝊十趙光逢字延吉曾祖植嶺南節度使祖存約興元府推官父隐右僕射光逢與弟光裔皆以文學徳行知名舊唐書光裔光啟三年進士擢第累遷司勲郎中𢎞文館學士改膳部郎知制誥季述廢立之後旅游江表以避患嶺南劉隐深禮之奏為副使因家嶺外光逢㓜嗜典墳動守規檢議者目之為玉界尺僖宗朝登進士第踰月辟度支廵官歴官臺省内外兩制俱有能名轉尚書左丞翰林承旨昭宗幸石門光逢不從昭宗遣内養戴知權詔赴行在稱疾解官駕在華州拜御史中丞時有道士許巖士瞽者馬道殷出入禁庭驟至列卿宫相因此以左道求進者衆光逢持憲紀治之皆伏法自是其徒頗息改禮部侍郎知貢舉光化中王道寢衰南北司為黨光逢素性慎静慮禍及巳因挂冠伊洛屏絶交逰凡五六年門人栁璨登庸除吏部侍郎太常卿案唐摭言云光化二年趙光逢於栁璨及第後三年不遷時璨自内庭大拜光逢始以左丞徵入入梁為中書侍郎平章事累轉左僕射兼租庸使上章求退以太子太保致仕梁末帝愛其才徵拜司空平章事無㡬以疾辭授司徒致仕唐摭言云光逢膺大用居重地十餘嵗上表乞骸守司空致仕唐二年復徵拜上相同光初弟先𦙍為平章事時謁問於私第嘗語及政事他日光逢署其户曰請不言中書事其清浄寡慾端黙如此嘗有女冠寄黄金一鎰于其家時屬亂離女冠委化於他土後二十年金無所歸納於河南尹張全義請付諸宫觀其舊封尚在兩登廊廟四退邱園百行五常不欺闇室搢紳咸仰以為名敎主天成初遷太保致仕封齊國公卒於洛陽詔贈太傅光𦙍光逢之弟也案新唐書俱云趙隠子三人光逢光裔光𦙍為後唐相者光𦙍也原本避宋諱稱光𦙍為光裔似混二人為一今改正俱以詞藝知名亦登進士第舊唐書云大順二年進士登第天祐初累官至駕部郎中光􅏷仕梁厯清顯伯仲之間咸以方雅自髙北人聞其名者皆望風欽重及莊宗平定汴洛時盧程以狂妄免郭崇韜自勲臣拜議者以為國朝典禮故實須訪前代名家咸曰光􅏷有宰相器薛廷珪李琪當武皇為晉王時當因為冊使至太原故皆有宿望當時咸謂宜處台司郭崇韜採言事者云廷珪朽老浮華無相業琪雖文學髙傾險無士風皆不可相乃止同光元年十一月光􅏷與韋説並拜平章事光􅏷生於季末漸染時風雖欲躍鱗振翮仰希前輩然才力無餘未能恢逺朝廷每有禮樂制度沿革擬議以為巳任同列既匪博通見其浮譚横議莫之測也豆盧革雖慿門地在本朝時仕進尚微久從使府朝章典禮未能深悉光𦙍每有發論革但唯唯而巳後革奏議或當光􅏷謂羣官曰昨有所議前座一言粗當近日差進學者其可巳乎其自負如此是條制權豪强買人田宅或陷罪害籍没顯有屈塞者許人自理内官楊希朗者故觀軍容使復㳟從子也援例理復恭舊業事下中書光􅏷謂崇韜曰復恭與南山謀逆顯當國法本朝未經昭雪安得論理崇韜私抑宦者因具奏聞希朗泣訢於莊宗莊宗令自光􅏷言之希朗陳訢叔祖復光有大功於王室室伯祖復恭為張濬所搆得罪前朝當時强臣掣肘國命不行及王行瑜伏誅徳音昭洗制書尚在相公本朝世族諳練故事安得謂之未雪耶若言未雪吾伯氏彦博洎諸昆仲監䕶諸鎮何途得進漸至聲色俱厲光􅏷方恃名徳為其所折悒然不樂又以希朗幸臣慮摭他事危已心不自安三年夏四月病疽卒贈左僕射鄭珏昭宗朝宰相綮之姪孫父徽河南尹張全義判官光化中登進士第歐陽史云珏舉進士數不中全義以珏屬有司乃得及第厯𢎞文館校書集賢校書監察御史入梁為補闕起居郎召入翰林累遷禮部侍郎充職珏文章美麗旨趣雍容自策名登朝張全義皆有力焉貞明中拜平章事莊宗入汴責授萊州司户未㡬量移曹州司馬張全義言於郭崇韜將復相之尋入為太子賓客明宗即位任圜自蜀至安重誨不欲圜獨拜宰輔共議明堂一人共之孔循言珏貞明時久在中書性畏慎而長者美詞翰好人物重誨即奏與任圜並命為相有頃珏以老病耳疾不任中書事四上章請明宗惜之久而方允乃授開府儀同三司行尚書左僕射致仕仍賜鄭州庄一區明宗自汴還洛陽遣中使撫問賜錢二十萬食羊百口長興初卒贈司空初珏應進士十九年方登第名姓為第十九人自登第凡十九年為宰相又昆仲之次第十九時亦異之子遘太平興國中任正郎崔協字思化逺祖清河太守第二子寅仕後魏為太子洗馬因為清河小房至唐朝盛為流品曾祖邠太常卿祖瓘吏部尚書父彦融楚州刺史彦融素與崔蕘善嘗為萬年令蕘謁於縣彦融未出見案上有尺題皆賂遺中貴人蕘知其由徑始惡其為人及除司勲郎中蕘為左丞通刺不見蕘謂曰郎中行止鄙雜故未見宰相知之改楚州刺史卒於任誡其子曰世世無忘蕘故其子弟嘗與崔讎協即彦融之子也幼有孝行登進士第釋褐為度支巡官渭南尉直史館厯三署入梁為左司郎中萬年令給事中累官至兵部侍郎與中書舍人崔居儉相遇於幕次協厲聲而言曰崔蕘之子何敢相見居儉亦報之左降太子詹事俄拜吏部侍郎同光初改御史中丞憲司舉奏多以文字錯誤屢受責罰協器宇宏爽髙談虚論多不近理時人以為虚有其表天成初遷禮部尚書太常卿因樞密使孔循保薦拜平章事初豆盧革韋説得罪執政議命相樞密使孔循意不欲河朔人居相位任圜欲相李琪而鄭珏素與琪不協孔循亦惡琪謂安重誨曰李琪非無藝學但不㢘耳朝論莫若崔協重誨然之因奏擇相明宗曰誰可乃以協對任圜奏曰重誨被人所賣如崔協者少識文字時人謂之没字碑臣比不知書無才而進已為天下笑何容中書之内更有笑端明宗曰易州刺史韋肅人言名家待我嘗厚置於此位何如肅茍未可則馮書記是先朝判官為稱宗呼之朝退宰臣樞密使休于中興殿之廡下孔循拂衣而去曰天下事一則任圜二則任圜崔協暴死則已不死㑹居此位重誨私謂圜曰今相位缺人協且可乎圜曰朝廷有李琪者學際天人奕業軒冕論才校藝可敵時輩百人而讒夫巧沮忌害其能必舍琪而相協如棄蘇合之丸取蛣蜣之轉也重誨笑而止然重誨與循同職循日言琪之短協之長故重誨竟從之而協登庸之後廟堂秉筆假手于人朝廷以國庠事重命協兼判祭酒事協上奏毎嵗補監生二百為定物議非之北夢瑣言明宗問宰相馮道盧質近日喫酒否封曰質曽到臣居亦飲數爵臣勸不令過度事亦如酒過則患生崔協强言于坐曰臣聞食以心鏡酒極好不加藥餌足以安心神左右見其膚淺不覺哂之四年春駕自夷門還京從至須水驛中風暴卒詔贈尚書左僕射諡曰恭靖子頎頌夀貞惟頌仕皇朝官至左諫議大夫卒于鄜州行軍司馬李琪字台秀五代祖登天寳末禮部尚書東都畱守安禄山陷東郡遇害累贈太尉諡曰忠懿憕孫寀元和朝位至給事中宷子敬方文宗朝諫議大夫敬方子縠廣明中為晉公王鐸都統判官以收復功為諫議大夫琪即縠之子也年十三詞賦詩頌大為王鐸所知然亦疑其假手一曰鐸召縠讌于公署密遣人以漢祖得三傑賦題就其第試之琪援筆立成賦尾云得士則昌非賢罔共龍頭之友斯貴鼎足之臣可重宜哉項氏之敗亾一范増而不能用鐸覽而駭之曰此兒大器也將擅文價太平廣記琪總角謁鐸鐸顧曰適蜀中詔到用夏製州拓跋思㳟為收復都統可作一詩否即秉筆立云飛騎經巴棧鴻恩及夏臺將從天上去人自日邉來此處金門遠何時玉輦迴蚤平關右賊莫待詔書催鐸益竒之因執琪手曰此真鳯毛也時年十四明年丁母憂因流寓青齊然糠照薪俾夜作晝覽書數千巻間為詩賦唐僖宗再幸梁洋竊賦云哀痛不下詔登封誰上書昭宗時李谿父子以文學知名琪年十八䄂賦一軸謁谿谿覽賦驚異倒屣迎門出琪調啞鍾捧日等賦謂琪曰余嘗患近年文士辭賦皆數句之後未見賦題吾子入句見題偶屬典麗吁可畏也琪由是益知名舉進士第天復初應博學宏詞居第四等授武功縣尉辟轉運巡官遷左拾遺殿中侍御史自琪為諫官憲職凡時政有所不便必封章論列文章秀麗覽之者􅁯倦琪兄珽亦登進士第才藻富贍兄弟齊名而尤為梁祖所知以珽為崇政學士琪自左補闕入為翰林學士北夢瑣言梁李相國琪唐末以文學策名仕致御史昭宗播遷衣冠蕩折琪藏跡于荆楚間自晦其迹號華原李長官其堂兄光符宰宜都嘗厭薄之琪寂寞毎臨流踞石摘樹葉而試草制詞吁嗟怏悵而投葉水中梁祖受禪徴入拜翰林學士累遷户部侍即翰林承㫖梁祖西抗邠岐北攻澤潞出師燕趙經畧四方暫無寧歲而琪以學士居帳中專掌文翰下筆稱㫖寵遇踰倫是時琪之名播海内琪重然諾憐才奬善家門雍睦貞明龍徳中歴兵禮吏侍郎受命與馮錫嘉張充郗殷象同撰梁太祖實録三十巻遷御史中丞累擢尚書左丞中書門下平章事時琪與蕭頃同為宰相頃性畏慎深密琪倜儻負氣不拘小節中書奏覆多行其志而頃專掎摭其咎㑹琪除吏是試躡名銜改攝為守為頃所奏梁帝大怒將投諸荒裔而為趙巖輩所援罷相為太子少保莊宗入汴素聞琪名累欲大任同光初歴太常卿吏部尚書三年秋天下大水國計不充莊宗召百寮許上封事陳經國之要琪因上疏曰臣聞王者富有兆民深居九重所重患者百姓凋耗而不知四海困窮而莫救下情不得上逹羣臣不敢指言今陞下以水潦之災軍食乏闕焦勞罪已迫切疚懷避正殿以責躬訪多士而求理則何思而不獲何議而不臧止在改而行之足以擇其善者臣聞古人有言曰穀者人之司命也地者榖之所生也人者君之所理也有其穀則國力備定其地則人食足察其人則徭役均知此三者為國之急務也軒黄已前不可詳記自堯湮洪水禹作司空于時辨九等之田收什一之税其時户一千三百餘萬定墾地約九百二十萬頃最為太平之盛及啇革夏命重立田制每私田十畝種公田九畝水早同之亦什一之義也洎乎周室立井田之法大約百里之提封萬萬井出車百乘戎馬四百匹畿内兵車萬乘馬四萬匹以田法論之亦什一之制也故當成康之世比堯舜之朝户口更増二十餘萬非他術也蓋三代以前皆計入以為出計農以立軍雖逢水旱之災而有凶荒之備降及秦漢重税工啇急闗市之征倍舟車之算人户既以减耗古制猶以兼行按此時户口尚有千二百餘萬墾田亦八百萬頃至于三國並興兩晉之後則農夫少于軍衆戰馬多于耕牛供軍須奪于農糧秣馬必侵于牛草于是天下户口只有二百四十餘萬洎隋文之代兩漢比隆及焬帝之年又三分去一我唐太宗文皇帝以四夷初定百姓未豐延訪羣臣各陳所見惟魏徴獨勸文皇力行王道由是輕徭薄賦不奪農時進賢良悦忠真天下粟價㪷直兩錢自貞觀至于開元將及一千九百萬户五千三百萬口墾田一千四百萬頃比之堯舜又極増加是知救人瘼者以重歛為病源料兵食者以專農為軍政仲尼云百姓足君孰與不足臣之此言是魏徴所以勸文皇也伏惟深畱宸鑒如以六軍方闕不可輕徭兩税之餘猶須重歛則但不以折納為事一切以本色輸官又不以紐配為名止以征耗加納猶應感悦未至流亡況今東作是時羸牛將駕數州之地千里運糧有此差徭必方春種今秋若無糧草何以贍軍臣伏思漢文帝時欲人務農乃幕人入粟得拜爵及贖罪景帝亦如之後漢安帝時水旱不足三公奏請富人入粟得闗内候及公卿以下散官本朝乾元中亦曽如此今陛下縱不欲入粟授官願明降制㫖下諸道令差百姓轉倉之處有能出力運官物到京師五百石以上白身授一初任州縣官有官者依資遷授欠選者使與放選千石以上至萬石不拘文武明示賞酬免令方春農人流㪚斯亦救民轉倉贍軍之一術也莊宗深重之尋命為國計使埀為輔相俄遇蕭牆之難而止及明宗即位豆盧革韋説得罪任圜陳奏請命琪為相為孔循鄭珏排沮乃相崔協琪時為御史大夫安重誨于䑓門前專殺殿直馬延雖曽彈奏而依違詞旨不敢正言其罪以是託疾三上章請老朝㫖不允除授尚書左僕射自是之後尤為宰執所忌凡有奏陳靡不望風横沮天成末明宗自汴州遷洛琪為東都畱司官班首奏請㫖偃師奉迎時琪奏中有敗契丹之兇黨破真定之逆城之言詔曰契丹即為兇黨真定不是逆城李琪罰一月俸又嘗奉勅撰霍彦威神道碑文琪梁之故相也敘彦威仕梁歴任不言其偽中書奏曰不分真偽是混功名望令改撰詔從之多此類也琪雖博學多才拙于遵養時晦知時不可為然猶多岐取進動而見排由已不能鎮靖也以太子太傅致任長興中卒于福善里第時年六十子貞官至邑宰琪以在内署時所為制詔編為十卷目曰金門集大行于世蕭頃字子澄京兆萬年人故相倣之孫京兆尹廩之子頃聰悟善屬文昭宗廟擢進士第歴度支巡官太常博士右補闕時國步難難連師倔强率多奏請欲立家廟于本鎮頃上章論奏乃止累遷吏部員外郎先是張濬自中書出為右僕射梁祖判官高劭使梁祖廕求一子出身官省寺皆稱無例濬曲為行之指揮甚急吏徒惶恐頃判云僕射未集郎官赴省上指揮公事且非南宫舊儀濬聞之慙悚致謝頃由是知名梁祖亦奬之頃入梁歴給諫御史中丞禮部侍郎知貢舉咸有能名自吏部侍郎拜中書門下平章事與李琪同輔梁室事多矛盾莊宗入汴頃坐貶登州司户量移濮州司馬數年遷太子賓客天成初為禮部尚書太常卿太子少保致仕卒時年六十九輟朝一曰贈太子少師史臣曰夫相輔之才從古難得蓋文學政事履行謀猷不可缺一故也如數君子者皆互有所長亦近代之良相也如齊公之明節李琪之文章足以圭表搢紳笙簧典誥陟之廊廟宜無愧焉舊五代史巻五十八
