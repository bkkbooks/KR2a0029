body:
  text: 舊五代史巻一百五十攷證志十二郡縣志曹州之戴邑案職方考開平元年割曹州之考城更曰戴邑𨽻開封此祗云曹州之戴邑未見分晰其陽武長垣扶溝考城等陽武原本訛武陽今據唐書地理志改正華州洛南縣案此下注文所載韓城郃陽澄城等縣似不相屬據職方考洛南故屬商州周割屬華州此本當是脫去洛南沿革小注又脫去同州郃陽縣澄城縣韓城縣等大字今無别本可校姑仍其舊附識於此湘州案湘州二字原本誤作小字連注文一段與秀州下注接冩文不相屬考唐開元十道圖潭鄂等州原𨽻江南道應以湘州另為一條作大字其天福四年四月馬希範奏云云作小注今改正舊五代史巻一百五十攷證
