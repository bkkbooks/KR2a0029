body:
  text: 舊五代史巻十三考證梁列傳三朱瑄傳敬武遣將曹全晸案新唐書及通鑑俱作曹存實舊唐書歐陽史與是書同部將崔君預據城叛全晸攻之案舊唐書韓簡傳云曹全晸為簡所敗死之鄆將崔君裕收合殘衆保鄆州朱瑄傳云崔君裕權知州事全晸知其兵寡襲君裕據韓簡傳則全晸死而君裕保其城據朱瑄傳則君裕為全晸所殺二傳自相矛盾是書從朱瑄傳又君預諸史俱作君裕光啓初魏博韓允中攻鄆案新唐書作中和初魏博韓簡東窺曹鄆考舊唐書韓允中傳乾符元年十一月卒子簡起復為節度觀察留後新唐書本紀亦云是考鄆者韓簡非允中也通鑑作中和二年韓簡擊鄆州當得其實是書訛作允中與諸史年月姓氏舛異朱瑾傳瑾從兄齊州刺史瓊以州降齊州原本作濟州據通鑑及北夣瑣言改正瑾之二子案新唐書作瑾子用貞刺史尹處賔案新唐書作尹懐賔出瑾為淮寧軍節度使淮寧原本作懐寧據九國志改正愛妓姚氏案九國志作妻陶氏王師範𫝊棣州刺史張蟾叛于師範張蟾原本作張儋今據新唐書改正劉知俊傳尋用為左開道指揮使開道原本作闗道今據歐陽史改正楊崇本傳乾化元年案原本作乾化四年今據歐陽史改正張萬進傳仍賜名守進守進原本作方進今據本紀改正舊五代史巻十三考證
