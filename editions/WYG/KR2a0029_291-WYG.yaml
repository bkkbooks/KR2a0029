body:
  text: 舊五代史巻一百四十七宋門下侍卽參知政事監脩國史薛居正等撰志九刑法志案刑法志原本闕佚梁太祖開平三年十一月詔太常卿李燕御史蕭頃中書舍人張衮户部侍郎崔沂大理卿王鄯刑部郎中崔誥共刪定律令格式四年十二月宰臣薛貽矩奏太常卿李燕等重刋定律令三十巻式二十巻格一十巻目録一十三巻律䟽三十巻凡五部一十帙共一百三巻勅中書舍人李仁儉詣閣門奉進伏請目為大梁新定格式律令仍頒下施行從之原註是時大理卿李保殷進所撰刑律總要十二巻唐莊宗同光元年十二月御史臺奏當司刑部大理寺本朝法書自朱温僣逆刪改事條或重貨財輕入人命或自狥枉過濫加刑罰今見在三司収貯刑書並是偽廷刪改者兼偽廷先下諸道追取本朝法書焚燬或經兵火所遺皆無舊本節目只定州勑庫有本朝法書具在請勑定州節度使速寫副本進納庶刑法令式並合夲朝舊制從之未㡬定州王都進納唐朝格式律令凡二百八十六巻二年二月刑部尚書盧價奏纂集同光刑律統類凡一十三巻上之周太祖廣順元年六月勑侍御史盧億刑部員外郎曹匪躬大理正段濤同議定重寫法書一百四十八巻先是漢隱帝末因兵亂法書亡失至是大理奏重寫律令格式統類編勑凡改㸃畫及義理之悞字凡二百一十四以晉漢及國初事闗刑法勑條凡二十六件分為二巻附于編勑目為大周續編勑命省寺行用焉宋史盧億周初為侍御史漢末兵亂法書亡失至是大理奏重寫律令格式統類編勑乃詔億與刑部員外曹匪躬大理正段濤同加議定舊本以京兆府改同五府開封大名府改同河南府長安萬年改為次赤縣開封浚儀大名元城改為赤縣又定東京諸門薰風等為京城門明德等為皇城門啓運等為宮城門昇龍等為宫門崇元等為殿門廟諱書不成字凡改㸃畫及義理之誤字二百一十有四又以晉漢及周初事關刑法敕條者分為二巻附編勑目為大周續編勑詔行之二年二月中書門下奏准元年正月五日赦書節文今後應犯竊盗贓及和姦者並依晉天福元年已前條制施行諸處犯罪人等除反逆罪外其餘罪並不籍没家産誅及骨肉一依格令處分者請再下明𠡠頒示天下乃下詔曰赦書節文明有釐革切慮邉城逺郡未得審詳宜更申明免至差誤其盗賊若是强盗並准自來格條斷遣其犯竊盗者計贓絹滿三匹已上者並集衆决殺其絹以本處上估價為定不滿三匹者等第决斷應有夫婦人被强姦者男子决殺婦人不坐其犯和姦者並准律科斷罪不至死其餘姦私罪犯准格律處分應諸色罪人除謀反大逆外其餘並不得誅殺骨肉籍没家産先是晉天福中𠡠凡和姦者男子婦人並處極法至是始改從律文焉世宗顯德四年五月中書門下奏准宣法書行用多時文意古質條目繁細使人難㑹兼前後𠡠格互換重疊亦難詳定宜令中書門下竝重刪定務從節要所貴天下易為詳究者伏以刑法者御人之銜勒救弊之斧斤故鞭撲不可一日弛之于家刑法不可一日廢之于國雖堯舜淳古之代亦不能舍此而致理矣今奉制旨刪定律令有以見聖君欽恤明罰勑法之意也竊以律令之書政理之本經聖賢之損益爲古今之章程歴代以來謂之彞典今朝廷之所行用者一十二巻律疏三十巻式二十巻令三十巻開成格一十巻大中統類一十二巻後唐以來至漢末編勑三十二巻及皇朝制勑等折獄定刑無出于此律令則文辭古質㸔覽者難以詳明格𠡠則條目繁多檢閱者或有疑誤加之邊遠之地貪猾之徒縁此爲姦寖以成弊方屬盛明之運宜申畫一之規所兾民不䧟刑吏知所守臣等商量望准聖㫖施行仍差侍御史知雜事張湜太子右庶子劇可乆殿中侍御史帥汀職方郎中鄧守中倉部郎中王瑩司封員外郎賈玭太常博士趙礪國子博士李光贊大理正蘇曉太子中允王伸等一十人編集新格勒成部帙律令之有難解者就文訓釋格勑之有繁雜者隨事刪除止要諧理省文兼且直書易㑹其中有輕重未當便于古而不便于今矛盾相違可于此而不可于彼盡宜改正無或牽拘候編集畢日委御史臺尚書省四品以上及兩省五品以上官參詳可否送中書門下議定奏取進止詔從之自是湜等於都省集議刪定仍令大官供膳五年七月中書門下奏侍御史知雜事張湜等九人奉詔編集刑書悉有條貫兵部尚書張昭等一十人参詳㫖要更加損益臣質臣溥據文評議備見精審其所編集者用律為正辭㫖之有難解者釋以䟽意義理之有易了者略其䟽文式令之有附近者次之格勑之有廢置者又次之事有不便於該説未盡者别立新條於本條之下其有文理深古慮人疑惑者别以朱字訓釋至于朝廷之禁令州縣之常科各以類分悉令編附所冀發函展巻綱目無遺究本討原刑政咸在其所編集勒成一部别有目録凡二十一巻刑名之要盡統於茲目之為大周刑統欲請頒行天下與律疏令式通行其刑法統類開成格編勑等採掇既盡不在法司行使之限自來有宣命指揮公事及三司臨時條法州縣見今施行不在編集之數應該京百司公事逐司各有見行條件望令本司刪集送中書門下詳議聞奏勅宜依仍頒行天下乃賜侍御史知雜事張湜等九人各銀器二十兩雜綵三十匹賞刪定刑統之勞也案以下疑原本有闕佚唐同光二年六月已已勑應御史臺河南府行臺馬步司左右軍廵院見禁囚徒據罪輕重限十日内並湏決遣申奏仍委四京諸道州府見禁囚徒速宜疏决不得淹停兼恐内外形勢官員私事寄禁切要止絶俾無寃滯三年五月已未在京及諸道州府所禁罪人如無大過速令䟽决不得淹滯六月甲寅𠡠刑以秋冬雖闗惻隱罪多連累翻慮滯淹若或十人之中止爲一夫扺死豈可以輕附重禁錮逾時言念哀矜又難全廢其諸司囚徒罪無輕重並宜各委本司據罪詳斷申奏輕者即時踈理重者候過立春至秋分然後行法如是事繫軍機須行嚴令或謀惡逆或畜奸邪或行刼殺人難於留滯並不在此限天成元年十一月庚申勑應天下州使繫囚除大辟罪以上委所在長史速推勘决斷不得傍追證對經過食宿之地除當死刑外並仰釋放兼不許懲治二年春左拾遺李同上言天下繫囚請委長史逐旬親自引問質其罪狀眞虗然後論之以法庶無枉濫從之六月大理少卿王欝上言凡决極刑合三覆奏近年以來全不守此伏乞今後前一日令各一覆奏奉𠡠宜依八月西京奏奉近勑在京犯極刑者令决前一日各一覆奏縁當府地逺此後凡有極刑不審准條疏覆奏奉勑㫖昨六月二十日所降𠡠文秪為應在洛京有犯極刑者覆奏其諸道已降㫖命准舊例施行今詳西京所奏尚未明近勑兼慮諸道有此疑惑故令曉諭十月辛丑德音爲政之要切在無私聽訟之方唯期不濫天下諸州官員如有善推疑獄及曾雪寃濫兼有異政者當具姓名聞奏别加甄奬長興元年二月制曰欲通和氣必在伸寃將設公方實資奬善州縣官僚能雪寃獄活人生命者許非時選仍加階超資注官與轉服色已著緋者與轉兼官二年二月辛亥𠡠朕猥以眇躬薦承鴻業念彼疲瘵勞於寐興或慮官不得人因成紊亂或慮刑非其罪遂至怨嗟王化所興獄訟為本茍無訓勵必有滯淹近日諸道百姓或諸多違犯或小可鬬爭官吏曲縱胥徒巧求瑕釁初則滋張節目作法拘囚終則誅剥貨財市恩出㧞外憑公道内徇私情無理者轉務遷延有理者却思退縮積成訛弊漸失紀綱自今後切委逐處官吏州牧縣宰等深體余懷各舉爾職凢關推究速與剸裁如敢茍縱依違遂成枉濫或經䑓訴屈或投匭伸寃勘問不虚其元推官典並當責罰其逐處觀察使刺史别議朝典宜令諸道州府各依此處分所管属郡委本道嚴切指揮八月丁卯𠡠三京諸道州府刑獄近日訪問依前禁繫人多不旋决諸道宜令所在各委長吏專切推窮不得有滯淹四月前濮州録事叅軍崔琮上言諸道獄囚恐不依法拷掠或不勝苦致斃翻以病聞請置病囚院兼加醫藥中書覆云有罪當刑仰天無恨無病致斃沒地銜寃燃死灰而必在至仁照露盆而須資異鑑書著欽哉之㫖禮標侀也之文因彰善于泣辜更推恩于扇暍所謂置病囚院望依仍委隨長史專切經心或有病囚當時遣醫人診候治療後據所犯輕重决斷如敢故違致病囚負屈身亡本處官吏並加嚴斷兼毎及官至五日一度差人洗刷枷匣應順元年二月戊午詔應三京諸道州府繫囚據罪輕重疾速斷遣比來停滯湏奏取裁不便區分故為留滯今後凡有刑獄據理斷遣如有勑推按理合奏聞不在此限清泰元年五月丁丑詔在京諸獄及天下州府見繫罪人正當暑毒之時未免拘囚之苦誠知負罪特軫予懷恐法吏生情滯於决斷詔至所在長吏親自慮問據輕重疾速斷遣無淹滯晉天福二年八月勑下刑部大理寺御史臺及三京諸道州府今後或有繫囚染疾者竝令逐處軍醫看候于公廨錢内量支藥價或事輕者仍許家人候看四年九月相州節度使桑維翰奏管内所獲賊人從來籍没財産云是鄴都舊例格律未見明文𠡠今後凡有賊人准格定罪不得没納家貲天下諸州准此處分三月庚午詳定院奏前守洪洞縣主簿盧燦進䇿云伏以刑獄至重朝廷所難尚書省分職六司天下謂之㑹府且諸道决獄若關人命即刑部不合不知欲請州府凡斷大辟罪人訖逐季具有無申報刑部仍具録案欵事節竝本判官馬歩都虞候司法参軍法直官馬步司判官名銜申聞所貴或有案内情曲不圓刑部可行覆勘如此則天下遵守法律不敢輕易刑書非唯免有銜寃抑亦勸其立政者臣等参詳伏以人命至重國法湏精雖載舊章更宜條理誠爲允當望賜施行從之五月詔曰刑獄之難古今所重但闗人命實動天心或有寃䰟則傷和氣應諸道州府凡有囚徒據推勘到案欵一一盡理子細檢律令格勑其間或有疑者准令文讞大理寺亦疑申尚書省省寺明有指歸州府然後决遣五年三月丙子詔曰自大中六年已来釐爾稱寃决杖流配訴雖有理不在申明今後據其所陳與為勘斷釐爾之罪准律别科六年秋七月庚辰詔曰政教所切獄訟惟先推窮湏察於事情斷遣必遵於條法用𢎞欽恤以致和平應三京鄴都及諸道州府見禁諸色人等宜令逐處長史常切提撕疾速决遣毎務公當勿使滯淹天福八年四月壬申𠡠朕自臨寰宇思致和平以四海爲家慮有一物失所毎念狴牢之内或多枉撓之人屬此炎蒸倍宜軫憫冀絶滯淹之歎用資欽恤之人應三京鄴都及諸道州府見禁罪人等宜令逐處長史嚴切指揮本推司及委本所判官疾速結絶斷遣不得淹延及致寃濫仍付所司開運二年五月壬戌殿中丞桑簡能上封事曰伏以天地育萬物廣博厚之恩帝王牧黎元行寛大之令是知恤刑緩獄乃爲政之先布德行惠實愛民之本今盛夏之月農事方殷是雷風長養之時乃動植蕃蕪之際宜順時令以𢎞至仁竊以諸道州府都郡縣應見禁罪人或有乆在囹圄稍滯區分胥吏侮文枝蔓乃衆捶楚之下或䧟無辜縲絏之中莫能自理茍一人拘繫則數人營財物用既殫工業亦罷若此之類實繁有徒切恐官吏因循寖成斯弊伏乞降詔㫖令所在刑獄委長史親自録問量罪疾速斷遣務絶寃濫勿得淹留庶免虚禁平人妨奪農力兾召和氣以慶明時勑曰囹圄之中縲絏之苦奸吏茍窮於枝蔓平人用費於貨財由茲滯淹兼致屈塞桑簡能體茲軫憫專有敷陳請長史躬親免獄官抑逼深為允當宜再頒行宜依十月甲子秘書省著作郎邊玕上封事曰臣聞從諫如流人君之令範極言無隱臣子之常規蓋欲表大國之任人致萬邦之無事前文備載可舉而行伏以皇帝陛下德合上𤣥運膺下武旰食宵衣而軫念好生惡殺以推仁凡措典刑固無寃枉然以照臨之内州郡尤多若不再具舉明伏恐漸成奸弊臣竊見諸道刑獄前朝曾降𠡠文凡是禁繫罪人五日一度録問但以年月稍逺漸致因循或長史事煩不暇躬親㸃檢或胥徒啓倖妄要追領證明慮有涉於淫刑即恐傷於和氣伏乞特降詔𠡠自今後諸道並委長史五日一度當面同共録問所冀處法者無倖銜寃者獲伸俾令四海九州咸歌聖德五風十雨永致昌期勑曰人之命無以復生國之刑不可濫舉雖一成之典務在公平而三覆其詞所宜詳審凡居法吏合究獄情邊玕近陟周行俄陳讜議更彰欽恤宜允申明三年十一月丁未左拾遺竇儼上疏曰臣伏覩名例律䟽云死刑者古先哲王則天垂象本欲生之義期止殺絞斬之坐皆刑之極也又准天成三年閏八月二十三日勑行極法日宜不舉樂减常膳又刑部式决重杖一頓處死以代極法斯皆人君哀矜不捨之道也竊以蚩尤為五虐之科尚行鞭朴漢祖約三章之法止有死刑絞者筋骨相連斬者頭頸異處大辟之目不出兩端滛刑所興近聞數等蓋縁外地不守通規肆率情性或以長釘貫篸人手足或以短刀臠割人肌膚乃至累朝半生半死俾寃聲而上達致和氣以有傷將𢎞守位之仁在峻推行之令欲乞特下明勑嚴加禁斷者勑曰文物方興刑罰須當有罪宜從於正法去邪漸契於古風竇儼所貢奏章實禆理道宜依所奏准律令施行漢乾祐二年正月勑政貴寛易刑尚哀矜慮滋蔓之生奸實軫傷而是念今屬三元改候四序履端將兾和平無如獄訟應三京鄴都諸道州府見繫罪人委逐處長史躬親慮問其於决斷務在公平但見其情即為具獄勿令率引遂致淹停無縱舞文有傷和氣四月甲午勑曰月届正陽候當小暑乃挺重出輕之日是恤刑議獄之辰有罪者速就勘窮薄罰者畫時䟽决用符時令勿縱滯淹三京鄴都諸道州府在獄見繫罪人宜令所司疾速斷遣無致淹滯枉濫五月辛未𠡠政化所先獄訟攸切不唯枉撓兼慮滯淹適當長養之時正屬熇蒸之候累行條貫俾速施行靡不丁寕未曽奏報再頒告諭無或因循應三京鄴都諸道州府詔至宜具䟽放已行未行申奏無致逗留周廣順三年四月乙亥勑朕以時當化育氣屬炎蒸乃思縲絏之人是軫哀矜之念慮其非所案鞫淹延或枉濫窮屈而未得伸宣或饑渇疾病而無所控告以罪當刑者唯彼自召法不可移非理受苦者為上不明安得無慮欽恤之道夙宵靡寕應諸道州府見繫罪人宜令官吏疾速推鞠據輕斷遣不得淹滯仍令獄吏洒掃牢獄當令虗歇洗滌枷械無令蚤虱供給水漿無令饑渴如有疾患令其家人㸔承囚人無主官差醫工診候勿致病亡循典法之成規順長嬴之時令俾無淹滯以致治平又賜諸州詔曰朕以敷政之勤惟刑是重既未能化人於無罪則不可為上而失刑况時當長嬴事貴清適念囹圄之閉固復桎梏之拘縻處於炎蒸何異焚灼在州及所屬刑獄見繫罪人卿可躬親録問省略區分于入務不行者令務開繫有理湏申者速期疎决俾皆平允無至滯淹又以獄吏逞任情之奸囚人被非法之苦冝加檢察勿縱侵欺常令净掃獄房洗刷枷匣知其饑渴共與水漿有病者聽骨肉看承無主者遣醫工救療勿令非理致斃以致和氣有傷卿忠幹分憂仁明茫事必能奉詔體我用心睠委于茲興寐無已餘從𠡠命處分顯德元年十一月帝謂侍臣曰天下所奏獄訟多追引證甚致淹延有及百餘日而未决者其中有徒黨反告者刼主陳訴者及妄遭牽引者慮獄吏作倖遲留致生人休廢活業朕毎念此彌切疚懷此後宜條貫所在藩郡令選明幹寮吏當其訴訟如獄不滯留人無枉撓明具聞奏量與甄奬内外官當贖之法梁唐皆無定制多示優容或因時分輕重晉天福六年五月尚書刑部員外郎李象請今後凡是散官不計髙􅊠若犯罪不得當贖亦不得上請詳定院覆奏應内外文武官有品官者自從品官法無品官有散試官者應内外帯職廷臣賔從有功將校等並請同九品官例其京都運廵使及諸道州府衙前職員内外雜任鎭將等並請准律不得上請當贖其廵司馬步雖有曾歴品者亦請同流外職准律杖罪以下决罸例徒罪以上仍依當贖法至周顯德五年七月新定刑統今後定罪諸道行軍司馬節度副使副留守准從五品官例諸道兩使判官防禦團練副使准從六品官例節度掌書記團判官兩蕃營田等使判官准從七品官例諸道推廵及軍事判官准從八品官例諸軍將校内諸司使使副供奉殿直臨時奏聽𠡠㫖由是内外品官當贖之法始有定制焉舊五代史巻一百四十七
