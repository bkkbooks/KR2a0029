body:
  text: 舊五代史卷三宋門下侍郎參知政事監修國史薛居正等撰梁書第三太祖紀三開平元年正月丁亥帝迴自長蘆次于魏州節度使羅紹威以帝迴軍慮有不測之患由是供億甚至因密以天人之望切陳之帝雖拒而不納然心徳之壬寅帝至自長蘆是日有慶雲覆于府署之上甲辰天子遣御史大夫薛貽矩來𫝊禪代之意貽矩謁帝陳北面之禮帝揖之升階貽矩曰陛下功徳及人三靈所卜已定皇帝方議裁詔行舜禹之事臣安敢違既而拜伏于砌下帝側躬以避之二月戊申帝之家廟棟間有五色芝生焉狀若芙蓉紫烟䝉䕶數日不散又是月家廟第一室神主上有五色衣自然而生識者知梁運之興矣唐乾符中木星入南斗數夕不退諸道都統晉國公王鐸觀之問諸知星者吉凶安在咸曰金火土犯斗即爲灾惟木當爲福耳或亦然之時有術士邉岡者洞曉天文博通隂陽歴數之妙窮天下之竒秘有先見之明雖京房管輅不能過也鐸召而質之岡曰惟木爲福神當以帝王占之然則非福于今必當有驗于後未敢言之請他日證其所驗一日又密召岡因堅請語其詳至于三四岡辭不獲鐸乃屏去左右岡曰木星入斗帝王之兆也木在斗中朱字也以此觀之将來當有朱氏爲君者也天戒之矣且木之數三其禎也應在三紀之内乎鐸聞之不復有言天后朝有䜟辭云首尾三鱗六十年兩角犢子自狂顚龍蛇相闘血成川當時好事者解云兩角犢子牛也必有牛姓干唐祚故周子諒弹牛仙客李徳裕謗牛僧儒皆以應圖䜟爲辭然朱字牛下安八八即角之象也故朱滔朱泚構喪亂之禍冀無妄之福豈知應之帝也四月唐帝御札勅宰臣張文蔚等備法駕奉迎梁朝宋州刺史王臯進赤烏一雙又宰臣張文蔚正押傳國寳玉冊金寳及文武羣官諸司儀仗法物及金吾左右二軍離鄭州丙辰逹上源驛是日慶雲見令曰王者創業興邦立名傳世必難知而示訓從易避以便人案此下有闕文或稽其符命應彼開基之義垂諸象徳之言爰攷簡書求于徃代周王昌發之號漢帝詢衍之文或從一徳以徽稱或爲二名而更易先王令典布在縑緗寡人本名兼于二字且異帝王之號仍兼避易之難郡職縣官多須改換况宗廟不遷之業憲章百世之規事叶典儀豈憚革易寡人今改名晃是以天意雅符于明徳日光顯契于瑞文昭融萬邦理斯在是庶順𤣥穹之意永臻康濟之期宜令有司分告天地宗廟其舊名中外章疏不得更有迴避時將受禪下教以本名二字異帝王之稱故改名已未賜文武百官一百六十人本色衣一副戊辰即位制曰王者受命于天光宅四海祗事上帝寵綏下民革故鼎新諒歴數而先定創業垂統知圖籙以無差神器所歸祥符合應是以三正互用五運相生前朝道消中原政散瞻烏莫定失鹿難追朕經緯風雷沐浴霜露四征七伐垂三十年紏合齊盟翼戴唐室隨山刊木岡憚胼胝投􅃑揮戈不遑寢處泊𤣥穹之所贊知廣運之不興莫諧輔漢之謀徒罄事殷之禮唐主知英華巳竭算祀有終釋龜鼎以如遺推劔紱而相授朕懼徳弗嗣執謙允恭避駿命于南河眷清風于潁水而乃列嶽羣后盈廷庶官東西南北之人班白緇黄之衆謂朕功蓋上下澤被幽深宜應天以順時俾化家而爲國拒彼億兆至于再三且曰七政已齊萬機難曠勉遵令典爰正鴻名告天地神祗建宗廟社稷顧惟凉徳曷副樂推慄若履冰懐如馭朽金行啟祚玉歴建元方宏經始之規宜布惟親之令可改唐天祐四年爲開平元年國號大梁書載虞賔斯爲令範詩稱周客蓋有明文是用先封以禮後嗣宜以曺州濟隂之邑奉唐主封爲濟隂王凡曰軌儀並遵故實姫庭多士比是殷臣楚國群材終爲晉用歴觀前載自有通規但遵故事之文勿替在公之効應是唐朝中外文武舊臣見任前資官爵一切仍舊凡百有位無易厥章陳力濟時盡瘁事我古者興王之地受命之邦集大勲有異庶方霑慶澤所宜加等故豐沛著啟祚之美穰鄧有建都之榮用壯鴻基且旌故里爰遵令典先示殊㤙宜升汴州爲開封府建名東都其東都改爲西都仍廢京兆府爲雍州佑國軍節度使五代㑹要四月改京兆府爲大安府長安縣爲大安縣萬年縣爲大年縣仍置佑國軍節度使額始命韓建爲佑國軍節度使是日大酺賞賜有差通鑑甲辰唐昭宣帝降御札禪位于梁以攝中書令張文蔚爲冊禮使禮部尚書蘇循副之攝侍中楊渉爲押傳國寳使翰林院學士張䇿副之御史大夫薛貽矩爲押金寳使尚書左丞趙光逢副之帥百官備法駕詣大梁甲子張文蔚楊渉乘輅自上源驛至從冊寳諸司各備儀衛鹵簿前導百官從其後至金祥殿前陳之王被衮冕即皇帝位張文蔚蘇循奉冊升殿進讀楊渉張䇿薛貽矩趙光逢以次奉寳升殿讀已降帥百官舞蹈稱賀帝遂興文蔚等宴于元徳殿帝舉酒曰朕輔政未乆此皆諸公推戴之力文蔚等慙懼俯伏不能對獨蘇循薛貽矩及刑部尚書張禕盛稱帝功徳宜應天順人宋州刺史王臯進兩岐麥陳州袁象先進白兔一付史館編録兼示百官詔在京司及諸軍州縣印一例鑄換其篆文則各如舊辛未武安軍節度使馬殷進封楚王以太府卿敬翔知崇政院翔與帷幄之謀故首擢焉追尊四代廟號髙祖嬀州府君上諡曰宣元皇帝廟號肅祖太廟第一室陵號興極陵祖妣髙平縣君范氏追諡宣僖皇后皇曽祖宣惠王上諡曰光獻皇帝廟號敬祖第二室陵號永安祖妣秦國夫人楊氏追諡光孝皇后皇祖武元王上諡曰昭武皇帝廟號憲祖第三室陵號光天祖妣呉國夫人劉氏追諡昭懿皇后皇考文明王上諡曰文穆皇帝廟號烈祖第四室陵號咸寕皇妣晉國太夫人王氏追諡文惠皇后以宣武節度副使皇子友文爲開封尹判建昌院事友文本康氏子也帝養以爲子是月制宫殿門及都門名額正殿爲崇元殿東殿爲元徳殿内殿爲金祥殿萬嵗堂爲萬嵗殿門如殿名帝自謂以金徳王又以福建上獻鸚鵡諸州相繼上白烏白兎洎白蓮之合蒂者以爲金行應運之兆故名殿曰金祥以大内正門爲元化門皇牆南門爲建國門滴漏門爲啟運門下馬門爲升龍門元徳殿前門爲崇明門正殿東門為金烏門西門為玉兎門正衙東門為崇禮門東偏門為銀臺門宴堂門為徳陽門天王門為賔天門皇墻東門為寛仁門浚儀門為厚載門皇墻西門爲神獸門望京門爲金鳯門宋門爲觀化門尉氏門爲髙明門鄭門爲開明門梁門爲乾象門酸棗門爲興和門封丘門爲含耀門曺門爲建陽門升開封浚儀爲赤縣尉氏封丘雍丘陳留爲畿縣五代㑹要四月改左右長眞爲左右龍虎軍左右内衙爲左右羽林軍左右堅銳夾馬突將爲左右神武軍左右親隨軍將馬軍爲左右龍驤軍五月以唐朝宰臣張文蔚楊渉並爲門下侍郎平章事以御史大夫薛貽矩爲中書侍郎平章事帝初受禪求理尤切委宰臣搜訪賢良或有在下位抱負器業乆不得伸者特加擢用有明政理得失之道規救時病者可陳章疏當親鍳擇利害施行然後賞以爵秩有晦跡丘園不求聞逺者令彼長吏備禮邀致冀無遺逸之恨進封河南尹兼河陽節度使張全義爲魏王兩浙節度使錢鏐進封呉越王辛已有司奏以降誕之日爲大明節休假前後各一日壬午保義軍節度使朱友謙進百官衣二百副乙酉立皇兄全昱爲廣王皇子友文爲博王友珪爲郢王友璋爲福王友雍爲賀王友徽爲建王辛卯以東都舊第爲建昌宫改判建昌宫事爲建昌宫使初帝創業之時以四鎭兵馬倉庫籍繁因總置建昌院以領之至是改爲宫蓋重其事也甲午詔天下管屬及州縣官名犯廟諱者各宜改換城門郎改爲門局卽茂州改爲汶州桂州慕化縣改爲歸化縣潘州茂名縣改爲越裳縣魏泰東軒筆録京師呼城外爲州東州西州南州北而韋城相城胙城等縣但呼韋縣相縣胙縣蓋沿梁時避諱之舊也詔樞密院宜改爲崇政院以知院事敬翔爲院使改文思院爲乾文院同和院改爲儀鸞院五代會要五月改御食使爲司膳使小馬坊使爲天驥使以西都水北宅爲大昌官廢雍州太清宫改西都太微宫亳州太清宫皆爲觀諸州紫極宫皆爲老君廟泉州僧智宣自西域囘進辟支佛骨及梵夾經律丙申御元徳殿宴犒諸軍使劉捍符道昭已下賜物有差是月青州許州定州三鎭節度使請開内宴各賜方物以青州節度使韓建守司徒平章事帝以建有文武材且詳于稼穡利害軍旅之事籌度經費欲盡詢焉恩澤特異于時罕有比者隨拜爲上相賜賚甚厚宿州刺史王儒進白兎一濮州刺史圖嘉禾瑞麥以進廣州進竒寳名樂品類甚多河南尹張全義進開平元年已前羡餘錢十萬貫紬六千匹綿三十萬兩仍請毎年上供定額每歳貢絹三萬匹以爲常式荆南髙季昌進瑞橘數十顆質狀有味倍勝常貢且橘當冬熟今方仲夏時人咸異其事因稱爲瑞六月幸乾元院宴召宰臣學士及諸道入貢陪臣已亥帝御崇元殿内出追尊四廟上諡號玉冊寳共八副宰臣文武百官儀仗鼓吹導引至太廟行事癸卯司天監奏日辰内有戊字請改爲武從之癸亥詔以前朝官僚譴逐南荒積年未經昭雪其間有懐抱材器為時所嫉者深負寃抑仍令録其名姓盡復官資兼告諭諸道令津致赴闕如已亡殁並許歸塟以明恩蕩以西都徽安門北路逼近大内宫垣兼非民便令移自榆林直趣瑞門之南改耀州報恩禪院為興國寺馬殷奏破淮寇静海軍節度使曲裕卒七月丙申以静海軍行營司馬權知留後曲顥起復為安南都䕶充節度使五代㑹要七月勅建國遷都新其制况山河之險表裏為防今二京俱在關東以内仍以潼關隷陕州復置河潼軍使命州刺史兼領之其月勅改武牢關為軍仍置虎牢關軍使己亥追尊皇妣為皇太后八月以潞州軍前屯師旅壁壘未收乃别議戎帥于是以亳州刺史李思安充潞州行營都統勅朝廷之儀封冊為重用報勲烈以隆恩榮固合親臨式光典禮舊章乆缺自我復行今後每封冊大臣宜令有司備臨軒之禮五代㑹要八月敕諸道所有軍事申奏令直至右銀臺門委各省使畫時引進尋常公事依前四方館收接甲子平明前老人星見于南極壬申密州進嘉禾又有合歡榆樹並圖形以獻是月隰州奏大寧縣至固鎮上下二百里今月八日黄河清至十日如故九月辛丑西京大内放出兩宫内人及前朝宮人任其所適勅以近年文武官諸道奉使皆于所在分外停住踰年渉歳未聞歸闕非惟勞費州郡抑且侮慢國經臣節既虧憲章安在自今後兩浙福建廣州安南邕容等道使到發許住一月湖南洪鄂黔桂許住二十日荆㐮同雍鎭定青滄許住十日其餘側近不過三五日凡徃來道路據逺近里數日行兩驛如遇疾患及江河阻隔委所在長吏且事由奏聞如或有違當行朝典命御史㸃檢紏察以儆慢官魏博羅紹威二男廷望廷矩年在幼稚皆有材器帝以其藩屏勲臣之胄宜受非次之用皆擢為郎恩命既行之後二子亦就班列紹威乃上章以齒幼未任公事乞免主印宿直從之封鎭東軍神祠為崇福候浙西奏道門威儀鄭章道士夏隐言焚修精志妙逹希夷推諸輩流實有道業鄭章宜賜號貞一大師仍名𤣥章隐言賜紫衣五代㑹要九月置左右天興左右廣勝軍仍以親王為軍使十月帝以用軍未睱西幸文武百官等乆居東京漸及疑訝令就便各許歸安只留韓建薛貽矩翰林學士張䇿韋郊杜曉中書舍人封舜卿張衮并左右御史司天監宗正寺兼要當諸司節級外其宰臣張文蔚已下文武百官並先于西京祗候庚午大明節内外臣僚各以竒貨良馬上壽故事内殿開宴召釋道二教對御談論宣㫖罷之命閤門使以香合賜宰臣佛寺行香駕幸繁臺講武癸酉御史司憲薛廷珪奏請文武百官仍舊朝叅先是帝欲親征河東命朝臣先赴雒都至是緩其期乃允所奏宰臣請每月初入閤望日延英聽政永為常式山南東道節度楊師厚進納趙匡凝東第書籍先是收復襄漢帝閱其圖書至是命師厚進焉廣州進獻助軍錢二十萬又進龍腦腰帶珍珠枕玳瑁香藥等十一月壬寅帝以征討未罷調補為先遂命盡赦逃亡背役髠黥之人各許歸鄉里廣州進龍形通犀腰帶金托裏含稜玳瑁器百餘副香藥珍巧甚多廣南管内獲白鹿並圖形來獻耳有兩缺按符瑞圖鹿壽千歳變白耳一缺今驗此鹿耳有二缺其獸與色皆應金行實表嘉瑞十二月辛亥詔曰潞寇未平王師在野攻戰之勢難緩于寇圍飛輓之勤實勞于人力永言輟來深用軫懐宜令長吏丁寧布告期以兵罷之日給復賦租于是人户聞之皆忘其倦詔故荆南節度使守中書令上谷王周汭贈太師故武昌軍節度使兼中書令西平王杜洪贈太傅先是鄂渚再為淮夷所侵攻圍甚急杜洪以兵食將盡繼來乞師帝料其隔越大江難以赴援兼以荆州據上游多戰艦去江夏甚邇因命周汭舉舟師沿流以救之汭于是引兵東下纔及鄂界遇朗州背盟作亂乘江陵之虛縱兵襲破之俘掠且盡既而汭士卒知之皆顧其家咸無鬬志遂為淮寇所敗將卒潰散汭忿恚自投于江汭之本姓犯文穆皇帝廟諱至是因追贈以其系出周文故賜姓周氏及汭兵敗之後武昌以重圍經年糧盡力困救援不至訖為淮寇所陷載洪以送淮師遂殺之此二鎭皆以忠貞殁于王事帝毎言諸藩屏翰經綸之業必首痛汭洪之薨至是追贈之深加軫悼各以其子孫宗屬録用焉棣州蒲臺縣百姓王知嚴妹以亂離并失怙恃因舉哀追感自截兩指以祭父母帝以遺體之重不合毀傷言念村閭何知禮教自今後所在郡縣如有截指割股不用奏聞是年諸道多奏軍人百姓割股青齊河朔尤多帝曰此若因心亦足為孝但茍免徭役自殘肌膚欲以庇身何能療疾並宜止絶五代㑹要十二月于輝州碭山縣置崇徳軍太祖榆社在碭山置使以領之始命朱彦讓為軍使舊五代史巻三
