body:
  text: 舊五代史巻六攷證梁太祖紀六相州刺史李思安為先鋒使相原本訛湘今據通鑑改正向背若環耳環耳原本訛環爾今據五代㑹要改正以其偽制來自陳偽原本訛為今改正守侍中兼中書令劉隠卒案劉隠卒五代㑹要五代春秋俱作五月惟通鑑作三月與是書異丁巳鎮定抄我湯隂湯隂原本作蕩隂今從通鑑及歐陽史改正命閤門使李郁報宰臣兼敕内外案李郁下衍寳字今據列傳刪正己未帝御朝元門以回鶻吐蕃入覲故也案己未歐陽史作乙未舊五代史巻六攷證
