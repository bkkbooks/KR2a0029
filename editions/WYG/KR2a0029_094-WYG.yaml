body:
  text: 舊五代史巻四十六考證唐末帝紀上末帝諱從琦本姓王氏鎮州人也母宣憲皇后魏氏以光啟元年嵗在已已正月二十三日生帝于平山景福中明宗為武皇騎將略地至平山遇魏氏擄之帝時年十餘嵗明宗養為已子案通鑑考異引唐廢帝實録云廢帝諱從珂明宗之元子也母曰宣憲皇后魏氏鎮州平山人中和末明宗徇地山東留戍平山得魏后帝以光啟元年正月二十三日生於外舍屬用兵不息音問阻絶帝甫十嵗方得歸宗今考五代㑹要歐陽史通鑑諸書皆作養子惟實録作元子疑因太后令稱為皇長子而傅㑹也二十三日次靈口靈口通鑑唐紀作零口考册府元龜亦作靈口今仍其舊二十七日次陜州案歐陽史作已已次陜州是書閔帝紀作丁夘通鑑從是書夏四月壬申帝至蔣橋文武百官立官奉迎案通鑑四月庚午朔太后令内諸司至乾壕迎潞王考異引廢帝實録作三月三十日癸酉皇太后下令降閔帝為鄂王案通鑑考異引閔帝實録七日廢帝為鄂王廢帝實録作癸酉薛歐二史從廢帝實録潞字一足已入洛矣洛原本訛潞今據册府元龜改正甲申案甲申疑當作壬午以下文即癸未也舊五代史巻四十六考證
