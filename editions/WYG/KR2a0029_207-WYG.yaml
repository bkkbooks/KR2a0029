body:
  text: 舊五代史巻一百三考證漢隠帝紀下鳯翔行營都部署趙暉奏前月二十四日収復鳯翔案歐陽史作正月趙暉克鳯翔據是書則収復鳯翔在二年十二月非三年春事也歐陽史盖誤以告㨗之月為収復之月耳五代春秋作十二月収復鳯翔誅王景崇為得其實澶州刺史李洪義案宋史洪義本名洪威避周太祖諱改䕶聖左讓都指揮使郭崇案東都事畧郭崇初名崇威避周太祖諱止稱崇庚辰至滑州節度使宋延渥開迎降案歐陽史作庚辰義成軍節度使宋延渥叛附於郭威與是書同通鑑作辛巳與是書異郭允明知事不濟乃剚刃於帝而崩案通鑑攷異引劉恕曰允明帝所親信何由弑逆蓋郭威兵殺事成之日諱之因允明自殺而歸罪耳已丑太后誥曰案原本作乙丑與五代春秋同今從通鑑改作已丑舊五代史卷一百三攷證
