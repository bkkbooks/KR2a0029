body:
  text: 舊五代史巻二十一宋門下侍郎參知政事監修國史薛居正等撰梁書第二十一列傳十一龎師古曹州南華人初名從以中涓從太祖性端愿未嘗離左右及太祖鎮汴樹置戎伍始得馬五百匹即以師古為偏將援陳破蔡累有戰功及朱珍以罪誅遂用師古為偏將揮使乃渡淮餉軍于廬夀攻滁州破天長下髙郵㳂淮轉戰所至克捷尋代朱友裕領軍攻下徐州斬時溥首以獻遂移軍伐兖州入中都寨于梁山敗朱瑄之衆襲至壘下又破朱瑾于清河從討汶陽與朱瑄朱瑾及晉將史儼兒戰于故樂亭大捷而迴乾寜四年正月復統諸軍伐鄆拔之擒其帥朱瑄以獻始表為天平軍節度留後尋授徐州節度使官至檢校司徒乾寧四年八月與葛從周分統大軍渡淮以伐楊行宻十一月師古寨于清口寨地卑下玉堂閒話云龎從會軍五萬于清口所屯之地盖兵書謂之絶地人不駕肩行一舎方至夷坦之處或請遷移弗聼俄有告淮人決上流者曰水至矣師古怒其惑衆斬之九國志侯瓚𫝊時兵起倉卒加以隂寒士皆飲氷餐雪而行甫及梁營則竪戈植足鬬志未決朱瑾與瓚率五十騎潛濟淮入自壘北舞槊而馳囂聲雷沸梁兵皆殞眩不能舉遂斬龎從大將繼之死者大半湏臾我軍在淖中莫能戰而吳人襲焉故及于敗師古没于陣霍存洺州曲周縣人性驍勇善騎射在黄巢中已為將領唐中和四年太祖大破巢軍于王滿渡時存與葛從周張歸霸皆自巢軍來降太祖宥而納之其後破王夏寨擊殷鐡林並在戰中尋佐朱珍取滑臺攻淄川取博昌皆預戰立功時蔡賊張晊在汴北存以三千人夕犯其營破之用本部騎兵敗秦賢軍殺五千人連破四寨盡得其輜重從討盧瑭張晊殪萬餘人存功居多我軍之圍濮州也有賊升眺樓大詬太祖怒甚召存射之矢一發而屍隕其下賞賚甚厚復佐朱珍擒石璠破魏師敗徐戎又佐龎師古至吕梁敗時溥二千餘衆以是累遷官初王師渡淮乏食不甚利惟存軍戰有功淮賊乃引退太祖之討宿州也葛從周以水壊其垣丁會以師乘其墉存戰壘外敗其軍宿人乃降明年佐郴王友裕擊時溥于碭山破之獲蕃將石君和等五十人歐陽史云存代李唐賓攻時溥溥敗碭山存獲其將石君和等五十人梁攻宿州葛從周引水浸之丁㑹與存戰城下遂下之是歲復與晉軍戰于馬牢川始入為前鋒出則後拒晉不敢逼乃渡河襲淇門殺三千餘人曹州刺史郭紹賓之來歸也存以師援之遂代其任始朱友裕以大軍伐鄆臨其壁既而師陷圍中以急來告存領二百騎馳赴急退之太祖喜拔為諸軍都指揮使景福二年春太祖親至曹州留騎軍數千令存將之且曰有急則倍道兼行以赴之俄聞朱瑾領兵二萬入援彭門存乃領騎軍馳赴之與徐兖之衆合戰于石佛山下大敗之存亦中流矢而卒時人稱其忠勇初朱珍李唐賓之殁龎師古代珍存代唐賓戰伐功績多與師古同始遥領韶州牧又改賀州後用為權知曹州刺史官至檢校右僕射及太祖登極屢有征討因有猛士之歎一日幸講武臺閲兵謂諸將曰霍存在朕安有此勞苦耶諸君其思之他日語又如是累贈官至太保子彦威後唐明宗朝為青州節度使符道昭淮西人性强敏有武畧秦宗權用為心膂使監督諸軍後為騎將尤能布陣勇聞于時然剛而無操善迎人意一見若盡肺腑必甚愛其才而道昭之心腹颺矣秦宗權之將敗也有薛潛者支擘隊伍道昭謂所私曰蔡弱矣乃歸潛潛欲敗復奔洋州依葛從佐攻興元軍不利復奔于岐宋文通愛之養為已子名繼遠遂易其宗及得軍職悉超儕伍後為巴州刺使又奏為隴州防禦使兼中軍都指揮使太祖迎奉昭宗駐軍于岐下道昭頻領騎士敢鬬戰屢為王師所敗遂來降太祖素聞其名待之甚厚昭宗反正奏授秦州節度使同平事事遣兵援送不克而還先是李周彛棄鄜州自投歸國署為元帥府行軍左司馬寵冠霸府及道昭至以為右司馬使與周彛同領冦彦卿南大豐閻寳巳下大軍伐滄州及太祖幸魏州討牙軍中軍前有魏博將山河營指揮使左行遷聞府中有變引軍還屯歴亭自稱留後從亂者數萬人道昭佐周彛與彦卿巳下大破之殺四萬餘人擒左行遷斬之有史仁遇亦聚徒數萬據髙唐又破之擒仁遇以獻乘勝取澶博二州平之復殺萬餘人道昭性勇果多率先犯陣屢有摧失而周彛彦卿掎角繼進連以告捷䕶兵者上功不實皆以道昭為首太祖隂知之俱不議賞及滄州之圍也不用騎士令道昭牧馬于唐陽太祖受禪後委兵柄與康懐英等攻潞州以蚰蜒塹繚之飛鳥不度既踰歲晉人援至王師大敗道昭為晉軍所殺徐懐玉本名琮亳州焦夷縣人少以雄傑自任隨太祖起軍唐中和末從至大梁光啟初蔡冦屯金堤驛懐玉將輕騎連破之由是累遷親從副將改左長劍都虞候又從破蔡賊于板橋收秦宗權入寨奏加檢校右散騎常侍文徳初同諸軍解河陽之圍復從破徐宿乾寧中奏加檢校刑部尚書太祖賜名懐玉破朱瑾于金鄉南擒宗江以獻表授金紫光祿大夫檢校右僕射乾寧四年龎師古失利于清口懐玉獨完軍以退光化初轉滑州右都押牙兼右步軍指揮使俄奏授沂州刺史頃之王師範以青州叛屢出兵侵軼懐玉擊退之天復四年轉齊州防禦使加檢校司空從大軍迎駕于岐下歸署華州觀察留後一年復領所部兵戍雍州尋召赴河中補晉絳同華五州馬步都指揮使天祐三年授左羽林統軍轉右龍虎統軍領六軍之士赴澤州尋為晉軍所攻晝夜衝擊穴地而入懐玉率親兵逆殺于隧中晉軍遂退開平元年授曹州刺史加檢校司徒明年除晉州刺史其秋晉軍大至已乘其墉懐玉選親兵五十餘人擁殺下城晉軍既退出家財以賞戰士歲中晉軍又至懐玉領兵敗之于洪洞三年制授鄜坊節度使特進檢校太保練兵繕壁人頗安之加檢校太傅乾化二年庶人友珪既篡立河中朱友謙拒命遣兵襲鄜州懐玉無備尋為河中所擄囚于公館及友珪遣康懐英率師圍河中友謙慮懐玉有變遂害之懐玉材氣剛勇臨陣未嘗折退平生金瘡被體有戰將之名焉郭言太原人也家于南陽新野少以力穡養親鄉里稱之唐廣明中黄巢擁衆西犯秦雍言為巢黨所執後從太祖赴汴初為騎軍繼有戰功後擢為禆校言性剛直有權畧勤于戎事或以家財分給將士之貧者由是頗得士心屢將兵與蔡冦戰于浚郊每以少擊衆出必勝歸太祖嘉其勇果謂賓佐曰言乃吾之虎侯也時宗權支黨數十萬太祖兵不過數十旅每恨其寡與之不敵一日命言董數千人越河洛趨陜虢招召丁壯以實部伍言夏往冬旋得鋭士萬餘遂遷步軍都將自是隨太祖掩襲蔡冦斬獲掠奪不可勝紀宗權以兹敗北太祖盡收其地因命言將兵導逹貢奉以安郵𫝊自汴鄭迄于潼闗去奸恤弱甚得其所光啓中唐天子以太祖兵威日振命兼揚州節度使太祖遣幕吏李璠領兵赴維揚以制置為名時言為李璠前鋒深入淮甸破盱眙而還梁祖東伐徐鄆言將偏師略地千里頻逄冦敵言出竒決戰所向皆捷大挫東人之鋭太祖錄其績以排陣斬斫之號委之尋表為宿州刺史檢校右僕射于時徐宿兵鋒日夕相接控扼偵邏以言為首景福初時溥大舉來攻宿州言勇士野戰喜逄大敵自引鋭兵擊溥殺傷甚衆徐戎乃退言為流矢所中一夕而卒李唐賓陜州陜縣人也中和四年二月尚讓之冦繁臺也唐賓與李讜霍存並為巢將與太祖之軍戰于尉氏門外三月太祖破瓦子寨唐賓與王䖍裕來降時黄巢壁于東郊乃命唐賓摩其西闉焚焉王滿之師王夏之陣唐賓悉在戰中後與朱珍趣淄州所向摧敵及取滑平蔡前後破鄆淮徐之衆功與朱珍略等而驍勇絶倫善用矛未嘗不率先陷陣其善于治軍行師之道亦與珍齊名珍之擒石璠也唐賓亦㳂淮與郭言掎角下盱眙其後渡河破黎陽李固等鎮攻澶州下内黄敗魏州未嘗不與珍同暨攻蔡之役珍自西南破其外垣唐賓亦堙壕坎墉摧其東北隅及伐徐取豐時溥軍于吳康珍亟遇之未能却唐賓引本軍擊敗之珍遂大勝每興師必與珍偕用故往無不利然而剛中用壯遂為珍所害以謀叛聞太祖聞之痛惜累日及誅朱珍後令其妻孥至軍收𦵏而加弔祭焉王䖍裕瑯琊臨沂人也家于楚丘少有膽勇多力善射以弋獵為事唐乾符中諸葛爽聚徒于青棣間攻剽郡縣䖍裕依其衆及爽歸順乃以䖍裕及其衆隸于宣武軍太祖鎮汴四郊多事始議選將征討首以䖍裕綰騎兵恒為前鋒及太祖擊巢蔡于陳州䖍裕連拔數寨擒獲萬計巢孽既遁䖍裕躡其迹追至萬勝戍賊衆饑乏短兵纔接而潰太祖以其勞表授義州刺史蔡人日縱侵掠陳鄭許亳之郊頻年大戰䖍裕掩襲攻拒凡百餘陣勦戮生擒不知紀極秦宗賢冦汴南鄙太祖令䖍裕逆擊于尉氏不利而還太祖怒命削職拘于别部踰年邢州孟遷請降未㡬晉人伐邢孟遷遣使來乞師太祖先遣䖍裕選勇士百餘人徑往赴之伺夜突入邢州明日循堞樹立旗幟晉人不測乃退數月復來圍邢時太祖大軍方討兖鄆未及救援邢人困而携貳遷乃縶䖍裕送于太原尋為所害劉康乂夀州安豐縣人也以農桑為業唐乾符中闗東羣盗並起江淮間偏罹其苦因為巢黨所掠康乂沈黙有膂力善用矛槊然不樂為暴中和三年從太祖赴鎮委以腹心康乂枕戈擐甲夷險無憚其後累典親軍襲巢破蔡斬獲尤多累以戰功遷元從都將從太祖連年攻討徐兖鄆所向多㨗尤善于營壘充諸軍壕寨使及太祖盡下三鎮議其功奏加檢校右僕射兼領軍衛尋遷宻州刺史政甚簡静時王師範叛據青州乞師于淮夷淮人遂攻宻州宻兵素少執銳者不滿千夫而淮賊踰萬康乂率老弱守陴自别領少壯日與接戰于宻之四郊俘擒千計賊知宻州虚弱援兵未至晝夜急攻遂䧟康乂為賊所害王彦章字賢明鄆州夀張縣人也祖秀父慶宗俱不仕以彦章貴秀贈左散騎常侍慶宗贈右武衛將軍彦章少從軍隸太祖帳下以驍勇聞稍遷軍職累典禁兵從太祖征討所至有功常持鐡槍衝堅䧟陣開平二年十月自開封府押牙左親從指揮使授左龍驤軍使三年轉左監門衛上將軍依前左龍驤軍使乾化元年改行營左先鋒馬軍使加金紫光祿大夫檢校司空依前左監門衛上將軍二年庶人友珪篡位加檢校司徒三年正月授濮州刺史本州馬歩軍都指揮使依前先鋒馬軍使未㡬改先鋒步軍都指揮使四年為澶州刺史進封開國伯五年三月朝廷議割魏州為兩鎮慮魏人不從遣彦章率精騎五百屯鄴城駐于金波亭以備非常是月二十九日夜魏軍作亂首攻彦章于館舎彦章南奔七月晉人攻䧟澶州彦章舉家䧟没通鑑云晉人夜襲澶州陷之刺史王彦章在劉鄩營晉人獲其妻子晉王遷其家于晉陽待之甚厚遣細人間行誘之彦章即斬其使以絶之後數年其家被害九月授汝州防禦使檢校太保依前行營先鋒步軍都指揮使貞明二年四月改鄭州防禦使三年十二月授西面行營馬軍都指揮使加檢校太傅依前鄭州防禦使頃之授行營諸軍左廂馬軍都指揮使五年五月遷許州兩使留後軍職如故六年正月正授許州匡國軍節度使充散指揮都頭都軍使進封開國候未㡬授北面行營副招討使七年正月移領滑州三年四月晦晉師陷鄆州中外大恐五月以彦章代戴思逺為北面招討使拜命之日促裝以赴滑臺遂自楊村砦浮河而下水陸俱進斷晉人得勝之浮梁攻南城拔之晉人遂棄北城併軍保楊劉彦章以舟師㳂流而下晉人盡徹北城拆屋木編栰置步軍其上上與彦章各行一岸毎遇轉灘水匯即中流交鬭流矢雨集或舟栰覆没比及楊劉凡百餘戰彦章急攻楊劉晝夜不息晉人極力固守垂陷者數四六月晉王親援其城彦章之重重壕複壘晉人不能入晉王乃于博州東岸築壘以應鄆州應章聞之馳軍而至急攻其柵自旦至午其城將拔㑹晉王以大軍來援彦章乃退七月晉王至楊劉彦章軍不利遂罷彦章兵權詔令歸闕以段凝為招討使先是趙張二族撓亂朝政彦章深惡之性復剛直不能緘忍及授招討之命因謂所親曰待我立功之後回軍之日當盡誅奸臣以謝天下趙張聞之私相謂曰我輩寧死于沙陁之手不當為彦章所殺因恊力以傾之時段凝以賄賂交結自求兵柄素與彦章不恊潛害其功隂行逗撓遂至王師不利竟退彦章而用段凝未及十旬國以之亡矣是歲秋九月朝廷聞晉人將自兖州路出師末帝急遣彦章領保鑾騎士數千于東路守捉且以鄆州為敵人所據因圖進取令張漢傑為監軍一日彦章渡汶以略鄆境至遞坊鎮為晉人所襲彦章退保中都十月四日晉王以大軍至彦章以衆拒戰兵敗為晉將夏魯竒所擒魯竒嘗事太祖與彦章素善及彦章敗識其語音曰此王鐡槍也揮矟刺之彦章重傷馬踣遂就擒晉王見彦章謂之曰爾常以孺子侍我今日服未又問我素聞爾善將何不保守兖州此邑素無城壘何以自固彦章對曰大事已去非臣智力所及晉王惻然親賜藥以封其創晉王素聞其勇悍欲全活之令中使慰撫以誘其意彦章曰此是匹夫本朝擢居方面與皇帝十五年抗衡今日兵敗力窮死有常分皇帝縱垂矜宥何面目見人豈有為臣為將朝事梁而暮事晉乎得死幸矣晉王又謂李嗣源曰爾宜親往諭之庶可全活時彦章以重傷不能興嗣源至卧内以見之謂嗣源曰汝非邈佶烈乎邈佶烈盖嗣源小字也彦章素輕嗣源故以小字呼之既而晉王命肩輿隨軍至任城彦章以所傷痛楚堅乞遲留遂遇害時年六十一彦章性忠勇有膂力臨陣對敵奮不顧身嘗謂人曰李亞子鬭鷄小兒何足畏初晋王聞彦章授招討使自魏州急赴河上以備衝突至則徳勝南城已為所拔晉王嘗曰此人可畏當避其鋒一日晉王領兵迫潘張寨大軍隔河未能赴援彦章援槍登船叱舟人解䌫招討使賀瓌止之不可晉王聞彦章至抽軍而退其驍勇如此及晉髙祖遷都夷門嘉彦章之忠欵詔贈太師搜訪子孫錄用五代史𥙷王彦章之應募也同時有數百人而彦章營求為長衆皆怒曰彦章何人一旦自草野中出便欲居我輩之上是不自量之甚也彦章聞之乃對諸將指數百人曰我天與壯氣自度汝等不及故求作長耳汝等咄咄得非勝負將分之際耶且大凡徤兒開口便言死死則未暇且共汝輩赤脚入棘針地走三五遭汝等能乎衆初以為戯既而彦章果然衆皆失色無敢效之者太祖聞之以為神人遽擢用之賀徳倫其先河西部落人也父懐慶隸滑州軍為小校徳倫少為滑之牙將太祖領四鎮徳倫以本軍從繼立軍功累歴刺史留後遷平盧軍節度使乃魏博楊師厚卒朝廷以徳倫代其任貞明元年三月二十九日夜魏軍作亂執徳倫囚于别館盡殺其部衆為亂首張彦所迫遣使歸款于太原晉王自黄澤嶺東下至臨清徳倫遣從事司空頲宻啟晉王訴以張彦凌辱之事晉王至永濟斬彦等八人然後入于魏徳倫即以符印上晉王通鑑晉王既入徳倫上印節請王兼領天雄軍王固辭曰比聞汴冦侵逼貴道故親董師徒逺來相救又聞城中新罹塗炭故暫入存撫明公不垂鍳信乃以印節見推誠非素懐徳倫再拜曰今冦敵宻邇軍城新有大變人心未安徳倫心腹紀綱為張彦所殺殆盡形孤勢弱安能統軍一旦生事恐負大恩王乃受之㝷授雲州節度使行次河東監軍張承業留之不遣頃之王檀以急攻襲太原徳倫部下多奔逸承業懼其為變遂誅徳倫并其部曲盡殺之舊五代史巻二十一
