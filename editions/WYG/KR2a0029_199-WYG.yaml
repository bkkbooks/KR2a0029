body:
  text: 舊五代史巻九十九攷證漢髙祖紀一帝大破偉王于忻口案漢祖破偉王是書作開運元年正月歐陽史漢本紀作三年五月晉本紀又載開運元年正月辛丑劉知逺及契丹偉王戰于秀容敗之兩紀年月互異應以是書為據三年五月加太尉是月帝誅吐渾白承福等五族案歐陽史作八月殺吐渾白承福等族壬寅契丹主𤼵自東京還本國案遼史太宗紀作四月丙辰朔𤼵自汴州與是書異歐陽史及通鑑俱從是書作壬寅殺契丹數十人案契丹國志作殺遼兵數百丙子契丹主耶律徳光率于鎮之欒城案遼史太宗紀四月丁丑崩于欒城與是書異歐陽史及通鑑俱從是書作丙子朗鄂舊作朗五今改舊五代史巻九十九攷證
