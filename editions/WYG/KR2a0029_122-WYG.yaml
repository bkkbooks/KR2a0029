body:
  text: 舊五代史巻六十攷證唐列傳十二李襲吉傳李襲吉北夢瑣言作李習吉乾符末應進士舉案唐新纂作應廣文舉不第出宰榆杜案北夢瑣言作攝榆次令李敬義傳移吾片石案原本脫移字今据册府元龜增入李徳休傳徳休原本作徳林今案其字表逸林字疑休字之訛今改舊五代史巻六十攷證
