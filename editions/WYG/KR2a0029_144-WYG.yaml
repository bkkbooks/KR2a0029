front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0029_WYG_144-1a, image: WYG0277/WYG0277-0585a.png}
body:
  text: 舊五代史巻七十二宋門下侍郎參知政事監修國史薛居正等撰唐書第四十八列傳二十四張承業字繼元本姓康同州人咸通中内常侍張泰畜為假子光啟中主郃陽軍事賜紫入為内供奉武皇之討王行瑜承業累奉使渭北因留監武皇軍事賊平改酒坊使三年昭宗將幸太原以承業與武皇善乃除為河東監軍密令迎駕既而昭宗幸華州就加左監門衛將軍駕在鳳翔承業屢請出師晉絳以為岐人犄角崔魏公之誅宦官也武皇偽戮罪人首級以奉詔匿承業于解律寺昭宗遇弑乃復請為監軍夾城之役遣承業求援于鳳翔時河中阻絶自離石渡河春冰方泮凌凘奔䠞艤舟不得渡因禱河神是夜夢神人謂曰子但渡流冰無患既寤津吏報曰河冰合矣凌晨躡冰而濟旋踵冰解使還武皇病篤啟手之夕召承業屬之曰吾兒孤弱羣臣縱横後事公善籌之承業奉遺顧爰立嗣王平内難䇿略居多既終易月之制即請出師救潞破賊夾城莊宗深感其意兄弟之親幸承業私第升堂拜母賜遺優厚時莊宗初行墨制凡除拜之命皆成于盧汝弼之手汝弼既自為户部侍郎乃請與承業改官及開國邑承業拒而不受其後但稱本朝舊官而已天祐中幽州劉守光敗其府掾馮道歸太原承業辟為本院巡官承業重其文章履行甚見待遇時有周𤣥豹者善人倫鑒與道不合謂承業曰馮生無前程公不可過用管書記盧質聞之曰我曾見杜黄裳司空冩真圖道之狀貌酷類焉將來必副大用𤣥豹之言不足信也承業薦為霸府從事焉柏鄉之役王師既迫汴營周徳威慮其奔衝堅請過舍莊宗怒其懦不聽垂帳而寢諸將不敢言事咸詣監軍請白承業遽至牙門褰帳而入撫莊宗曰此非王安寢時周徳威老将洞識兵勢姑務萬全言不可忽莊宗蹶然而興曰子方思之其夕收軍保鄗邑徳威討劉守光令承業往視賊勢因請莊宗自行果成大捷承業感武皇厚遇自莊宗在魏州垂十年太原軍國政事一委承業而積聚餘帑收兵市馬招攘流散勸課農桑成是霸基者承業之忠力也時貞簡太后韓徳妃伊淑妃諸宅王之貴洎王之介弟在晉陽宫或不以其道干于承業悉不聽踰法禁者必懲繇是貴戚斂手民俗丕變或有中傷承業于莊宗者言專㺯威柄廣納賂遺莊宗嵗時還晉陽宫省太后須錢蒱博給伶官嘗置酒于泉府莊宗酣飲命興聖宫使李繼岌為承業起舞既竟承業出寶帶幣馬奉之莊宗指錢積謂承業曰和哥無錢使七哥與此一積寶馬非殊惠也承業謝曰郎君哥勞承業自出巳俸錢此錢是大王庫物准擬支贍三軍不敢以公物為私禮也莊宗不悦使酒侵承業承業曰臣若勑使非為子孫之謀惜錢為大王基業王若自要散施何妨老夫不過財盡兵散一事無成莊宗怒顧元行欽曰取劍來承業引莊宗衣泣而言曰僕荷先王遺顧誓為本朝誅汴賊為王惜庫物斬承業首死亦無愧于先王今日請死閻寶解承業手令退承業詬寶曰黨朱温逆賊未嘗有一言効忠而敢依諂附揮拳踣之太后聞莊宗酒失急召入莊宗性至孝聞太后召叩頭謝承業曰吾杯酒之間忤于七哥太后必怪吾七哥為吾痛飲兩巵分謗可乎莊宗連飲四鍾勸承業竟不飲莊宗歸宫太后使人謂承業曰小兒忤特進巳笞矣可歸第翌日太后與莊宗俱幸其第慰勞之自是私謁幾絶十四年承制授開府儀同三司左衛上將軍燕國公固辭不受是時盧質在莊宗幕下嗜酒輕傲嘗呼莊宗諸弟為豚犬莊宗深衘之承業盧質被禍因乘間謂莊宗曰盧質多行無禮臣請為大王殺之可乎莊宗曰予方招禮賢士以開霸業七哥何言之過也承業因聳立而言曰太王若能如此何憂不得天下其後盧質雖成縱誕莊宗終能容之盖承業為之藻藉也十八年莊宗受諸道勸進將纂帝位承業以為晉王三代有功于國先人怒朱氏弑逆將復舊邦讐既未平不宜輕受推戴方疾作肩輿之鄴宫見莊宗曰王父子血戰三十餘年盖言報國仇讐復唐宗社今元兇未滅民賦已殫而遽先大號蠧耗財力臣以為不可一也臣自咸通已來伏事宫掖每見國家冊命大禮儀仗法物百司庻務經年草定臨事猶有不可王若化家為國新立廟朝不可乖于制度制禮作樂未見其人臣以為不可二也舉事量力而行不可信于游譚也通鑑攷異引秦再思洛中記異云承業諫帝曰大王何不待誅克梁孽更乎吳蜀俾天下一家且先求唐氏子孫立之復更以天下讓有功者何人輒敢當之讓一月即一月牢讓一年即一年牢設使髙祖再生太原復出又胡為哉今大王一旦自立頓失從前仗義征代之㫖人情怠矣老夫是閹官不愛大王官職富貴直以受先王付屬之重欲為大王立萬年之基爾莊宗曰奈諸將何承業知莊宗不從因號泣而言之十九年十一月二日以疾卒于晉陽之第時年七十七貞簡太后聞喪遽至其第盡哀為之行服如兒姪禮同光初贈左武衛上将軍諡曰貞憲五代史闕文莊宗将即位于魏州承業自太原至謂莊宗曰吾王世奉唐家最為忠孝自貞觀以來王室有難未嘗不從所以老奴三十餘年為吾王捃拾財賦召補軍馬者誓滅逆賊朱温復本朝宗社耳今河朔甫定朱氏尚存吾王遽即大位可乎云云莊宗曰奈諸將意何承業知其不可諫止乃慟哭曰諸侯血戰者本為李家今吾王自取之誤老奴矣即歸太原不食而死臣謹案莊宗實録叙承業諫即位事甚詳惟吾王自取之言不書史官諱之也張居翰字徳卿咸通初掖庭令張從玫養之為子以廕入仕中和三年自容管監軍判官入為學士院判官遷樞密承㫖内府令賜緋昭宗在華下超授内常侍出監幽州軍事秩滿詔歸節度使劉仁恭表留之天復中詔誅宦官仁恭紿奏殺之匿于大安山之北谿天佑三年汴人攻滄州仁恭求援于武皇乃遣居翰與書記馬郁等率兵助武皇同攻潞州武皇因留之不遣李嗣昭節制昭義以居翰監其軍以燕軍三千為部下俄而汴將李思安築夾城以圍潞州居翰與嗣昭登城保守以至解圍自是嗣昭每出征令居翰知留後事同光元年夏四月召為樞密使加特進與郭崇韜對掌機務十月莊宗将渡河留居翰與李紹宏同守魏州莊宗入汴加驃騎大將軍知内侍省事依前充樞密使同光時宦官干政邦家之務皆出于郭崇韜居翰自以羇旅乘時擢居重地每于宣授不敢有所是非承顔免過而巳以此脱季年之禍四年三月偽蜀王衍既降詔遷其族于洛陽行及秦川時闗東巳亂莊宗慮衍為變中官向延嗣馳騎賫詔殺之詔云王衍一行並宜殺戮其詔已經印畫時居翰在密地覆視其詔即就殿柱揩去行字改書家字及衍就戮于秦川驛止族其近屬而已其偽官及從行者尚千餘人皆免其枉濫居翰之力也明宗入洛居翰謁見于至徳宫待罪泣涕乞歸田里詔許之乃辭歸長安仍以其子延貴為西京職事以供侍養天成三年四月以疾卒于長安時年七十一居翰性和而静諳悉舊事在潞州累年每春課人育蔬種樹敦本惠農有仁者之心焉馬紹宏閹官也初與孟知祥同為中門使及周徳威薨莊宗兼領幽州令紹宏權知州事即位之初郭崇韜勲望髙舊在紹宏之下時徵潞州監軍張居翰與崇韜並為樞密使紹宏失望乃以為宣徽使紹宏以巳合當樞密任常鬱鬱側目于崇韜崇韜知其慊也乃置内勾之目令天下錢穀簿書悉委裁遣既而州郡供報輒滋煩費議者以為十羊九牧深所不可内勾之目人以為是妖言以下有闕文據通鑑李嗣源為謠言所屬危殆者數四賴宣徽使李昭宏左右營䕶以是得全天成元年二月已丑期以宣徽南院使李紹宏為樞密使孟漢瓊本鎮州王鎔之小䜿也明宗鎮常山得侍左右明宗即位自諸司使累遷宣徽南院使漢瓊性通黠善交構初見秦王權重及挾王淑妃勢傾心事之及朱馮用事又與之締結秦王領兵至大津橋時漢瓊與朱馮及康義誠方㑹議于内庭謀猶未决漢瓊獨出死力先入殿門奏于明宗語在秦王𫝊漢瓊即自介馬以召禁軍秦王既誅翼日令漢瓊馳騎召閔帝于鄴通鑑遣漢瓊徵從厚且權知天雄府軍事閔帝嗣位尤恃恩寵期月之内累加開府儀同三司驃騎大將軍西軍既叛閔帝急召漢瓊欲令先入于鄴漢瓊藏匿不行潞王行及陜州乃悉召諸妓妾訣別欲手刃之衆知其心率皆藏竄初潞王失守于河中勒歸于清化里第時王淑妃恒令漢瓊𫝊敎㫖于潞王王善待之故漢瓊自謂潞王于巳有恩至是乃單騎至澠池謁見潞王因自慟哭欲有所陳潞王曰諸事不言可知漢瓊即自預從臣之列尋戮于路左史臣曰承業感武皇之大惠佐莊宗之中興既義且忠何以階也夫如是則晉之勃貂秦之景監去之逺矣居翰改一字于詔書救千人之濫死可不謂之仁人矣乎如紹宏之争權漢瓊之構禍乃宦者之常態也又何足以道哉舊五代史巻七十二
