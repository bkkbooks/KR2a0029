body:
  text: 舊五代史巻三十二宋門下侍郎參知政事監修國史薛居正等撰唐書第八莊宗紀六同光二年夏五月己亥帝御文明殿冊齊王張全義爲太尉禮畢全義赴尚書首領事左諫議大夫竇專不降階爲御史所劾專援引舊典宰相不能詰寢而不行庚子太常卿李燕卒壬寅以教坊使陳俊爲景州刺史内園使儲德源爲憲州刺史皆梁之伶人也初帝平梁俊與德源皆爲寵伶周匝所薦帝因許除郡郭崇韜以爲不可伶官言之者衆帝密召崇韜謂之曰予已許除郡經年未行我慙見二人卿當屈意行之故有是命清異録同光旣即位猶襲故態身預俳優尚方進御中褁名品日新今伶人所頂尚有傳其遺製者甲辰以兖州節度使李紹欽依前檢校太保兖州節度使進封開國侯以邠州節度使韓恭依前檢校太保邠州節度使進封開國伯丙午以福建節度使閩王王審知依前檢校太師守中書令福建節度使戊申幸郭崇韜第己酉詔天下收拆防城之具不得修濬池隍以西都畱守京兆尹張筠依前檢校太保充西都畱守甲寅以滄州節度使李紹斌充東北面招討使以兖州節度李紹欽爲副招討使以宣徽使李紹宏爲招討都監率大軍渡河而北時幽州上言契丹將冦河朔故也乙卯潞州叛將楊立遣使健步奉表乞行赦宥帝令樞密副使宋唐玉賫勑書招撫幽州上言契丹營于州東南丙辰渤海國王大諲譔遣使貢方物以澶州刺史李審益爲幽州行軍司馬蕃漢内外都知兵馬使辛酉故澤潞節度使丁㑹贈太師詔割復州爲荆南屬郡壬戌以權知鳯翔軍府事涇州節度使李曮爲起復雲麾將軍右金吾大將軍同正依前檢校太尉兼中書令充鳯翔節度使乙丑以權知歸義軍畱後曹義金爲歸義軍節度使沙州刺史檢校司空丙寅李嗣源奏收復潞州幽州上言新授宣武軍節度使李存審卒六月甲戌中書侍郎兼吏部尚書平章事𢎞文館大學士豆盧革加右僕射餘如故侍中監修國史兼樞密使鎭州節度使郭崇韜進爵邑加功臣號中書侍郎平章事集賢殿大學士趙光𦙍加兼戶部尚書禮部侍郎平章事韋説加中書侍郎宋州奏節度使李紹安卒丙子李嗣源遣使部送潞州叛將楊立等到闕並磔于市潞州城峻而隍深至是帝命剗平之因詔諸方鎭撤防城之備焉丁丑有司上言洛陽己建宗廟其北京太廟請停從之甲申以衞國夫人韓氏爲淑妃燕國夫人伊氏爲德妃仍令所司擇日冊命故河東節度副使守左諫議大夫李襲吉贈禮部尚書故河東節度副使禮部尚書蘇循贈左僕射故河東觀察判官檢校右僕射司馬揆贈司空故河東畱守判官工部尚書李敬義贈右僕射丙戌以順義軍節度使李令錫爲許州節度使以前保義軍畱後李紹眞爲徐州節度使以徐州節度使李紹榮爲宋州節度使戊子汝州防禦使張繼孫賜死于本郡繼孫卽齊王張全義之假子也本姓郝氏爲兄繼業等訟其隂事故誅之冊府元龜載張繼業爲河陽兩使畱後荘宗冋光二年六月繼業上疏稱弟繼孫本姓郝有母尚在父全義養爲假子令管衙内兵士自皇帝到京繼孫私藏兵甲招置部曲砍圖不軌兼私家淫縱無别無義臣若不自陳恐累家族勑曰有善必賞所以勸忠孝之方有惡必誅所以絶姦邪之迹其或罪狀騰于衆口醜行布于近親須舉朝章冀明國法汝州防禦使張繼孫本非張氏子孫自小丐飬以至成立備極顯榮而不酬撫育之㤙履謙恭之道擅行威福常恣姦兇侵奪父權惑亂家事縱鳥獸之行畜梟獍之心有識者所不忍言無賴者實為其黨而又横征暴斂虐法峻刑藏兵器于私家殺平人于廣陌罔思悛改難議矜容宜竄逐于遐方仍還歸于姓氏俾我勲賢之族永除汚穢之風凡百臣僚宜體朕命可貶房州司户參軍同正兼勒復本姓尋賜自盡仍籍没資産己丑以回鶻可汗仁美爲英義可汗詔改輝州爲單州庚寅故左僕射裴樞右僕射裴贄崔逺並贈司徒故静海軍節度使獨孤損贈司空故吏部尚書陸扆贈右僕射故工部尚書王溥贈右僕射裴樞等六人皆前朝宰輔爲梁祖所害于白馬驛至是追贈焉壬辰以天平軍節度使蕃漢總管副使開府儀同三司檢校太尉兼中書令李嗣源爲宣武軍節度使蕃漢馬步總管餘如故甲午以樞密使特進左領軍衞上將軍知内侍省事張居翰爲驃騎大將軍守左驍衞上將軍進封開國伯賜功臣號秋七月戊戌朔故宣武軍節度使李存審男彥超進其父牙兵八千七百人已亥中書門下奏每年南郊壇四祠祭太微宫五薦獻竝宰臣攝太尉行事惟太廟遣庶僚行事此後太廟祠祭亦望差宰臣行事從之乙已汴州雍丘縣大風拔木傷稼曹州大雨平地水三尺丙午以襄州節度使孔勍爲潞州節度使李存霸爲鄆州節度使乙酉幸龍門之雷山祭天神從北俗之舊事也辛亥以鄆州副使李紹珙爲襄州畱後以前澤州刺史董璋爲邠州畱後戊午西川王衍遣偽署户部侍郎歐陽彬來朝貢稱大蜀皇帝上書大唐皇帝庚申以應州爲雲州屬郡昇新州爲威塞軍節度使以嬀儒武等州爲屬郡壬戌皇子繼岌妻王氏封魏國夫人幽州奏契丹按巴堅東攻渤海八月己已詔洛京應有隙地任人請射修造有主者限半年令本主自修蓋如過限不見屋宇許他人占射五代㑹要載此詔云藩方侯伯内外臣僚于京邑之中無安居之所亦可請射各自修營辛未北京副畱守太原尹孟知祥加檢校太傅增邑賜功臣號帝畋于西苑癸酉以租庸副使守衞尉卿孔謙爲租庸使以右威衞上將軍孔循爲租庸副使甲戌以權知汴州軍州事翰林學士承旨戶部尚書盧質爲兵部尚書依前翰林學士承旨仍賜論思匡佐功臣丙子以雲州刺史鴈門以北都知兵馬使安元信爲大同軍節度畱後以隰州刺史張廷裕爲新州威塞軍節度畱後丁丑樞密使郭崇韜上表請退不允戊寅租庸使守禮部尚書王正言罷使守本官辛已詔諸道節度觀察防禦團練使刺史竝于洛陽修宅一區中書門下上言請今後諸道除節度副使雨使判官外其餘職員并諸州軍事判官各任本處奏辟從之五代會要同光二年八月八日中書門下奏諸道除節度使及兩使判官除授外其餘職員并軍事判官伏以翹車著詠戔帛垂文武重弓旌以光尊俎由是副已知之薦成接士之榮必當備悉行藏習知才行允奉幕中之畫以稱席上之珍爰自僞梁頗乖斯義皆從除授以佐藩宣因縁多事之秋慮爽得人之選將期推擇式示更張今後諸道除節度副使判官兩使除授外其餘職員并諸州軍判官等竝任本道本州各當辟舉其軍事判官仍不在奏官之限汴州奏大水損稼癸未租庸使孔謙進封㑹稽縣男仍賜豐財贍國功臣淮南楊溥遣使貢方物宋州大水鄆曹等州大風雨損稼丁亥中書門下侍郎奏請差左丞崔沂吏部侍郎崔貽孫給事中鄭韜光李光序吏部員外郎盧損等同詳定選司長定格循資格十道圖從之五代會要同光二年八月中書門下奏吏部三銓下省南曹廢置甲庫格式流外銓等司公事竝繫長定格循資格十道圖等前件格文本朝創立檢制姦濫倫敘官資頗謂精詳久同遵守自亂離之後巧偽滋多兼同光元年八月車駕在東京權判工部員外郎盧重本司起請一巻竝以興復之始務切懷來凡有條流多失根本以至冬集赴選人竝南郊行事官及陪位宗子共一千三百餘人銓曹檢勘之時互有援引去畱之際不絶爭論若又依違必長訛濫望差權判尚書省銓左丞崔沂吏部侍郎崔貽孫給事中鄭韜光李光序吏部員外郎盧損等同詳定舊長定格十資格十道圖務令簡要可久施行從之癸已放朝參三日以霖雨故也陜州奏河水溢岸乙未中書門下上言諸陵臺令丞請停以本縣令知陵臺事從之九月癸卯畋于西北郊幽州上言契丹按巴堅自渤海國廻軍内園新殿成名曰長春殿戊申以中書舍人權知貢舉裴皥爲禮部侍郎以前鄭州防禦副使姜𢎞道爲太僕卿侍中郭崇韜奏應三銓注授官員等内有自無出身入任買覔鬼名告勑今將骨肉文書楷改姓名或歴任不足妄稱失墜或假人䕃緒託形勢論屬安排參選所司隨例注官如有人陳告特議超奨其所犯人檢格處分若同保人内有僞濫者竝當駮放應有人身死之處今後竝須申報本州于告身上批書身死月日分明付子孫今後銓司公事至春末竝須了畢從之銓綜之司僞濫日乆及崇韜條奏之後澄汰甚嚴放棄者十有七八衆情亦怨之已酉司天臺請禁私歴日從之庚戌有司自契丹至者言女眞回鶻黄頭室韋合勢侵契丹壬子有司上言八月二十二日夜熒惑犯星二度星周分也請依法禳之于京城四門懸東流水一罌兼令都市嚴備盗火止絶夜行從之甲寅幸郭崇韜第置酒作樂乙卯以前振武節度使安北都䕶馬存可依前檢校太尉兼侍中充寧逺軍度容管觀察使存湖南馬殷之弟也丙辰黒水國遣使朝貢契丹冦幽州戊午宣宰臣于中書磨勘吏部選人謬濫者焚毁告勑冬十月戊辰帝畋于西北郊己已故安義節度使贈太尉隴西郡王李嗣昭贈太師庚午正衙命使冊淑妃韓氏德妃伊氏以宰臣豆盧革韋説充冊使辛未詔今後支郡公事須申本道騰狀奏聞租庸使各有徴催秖牒觀察使貴全理體契丹寇易定北鄙壬申故大同軍防禦使李存璋贈太尉鄆州奏清河泛溢壞廬舍癸未畋于石橋甲戌河南尹張全義上言萬壽節日請于嵩山開璢璃戒壇度僧百人從之乙亥故守太師尚書令秦王李茂貞追封秦王賜諡曰忠敬丁丑皇后差使賜兖州節度使李紹欽湯藥時皇太后行誥命皇后劉氏行教命互遣使人宣逹藩后紊亂之弊人不敢言已卯汴鄆二州奏太水庚辰以前太僕卿楊遘爲大理卿党項進白驢奚王李紹威進駞馬幽州奏契丹入寇至近郊辛已故天雄軍節度副使王緘贈司空壬午以天下兵馬都元帥尚父守尚書令吳越國王錢鏐可依前天下兵馬都元帥尚父守尚書令封吳越國王癸未幸小馬坊閲馬甲申以兩浙兵馬畱後清海軍節度嶺南東道觀察等使守太尉兼侍中廣州刺史錢元瓘爲檢校太師兼中書令充兩浙節度觀察畱後餘如故以鎭東軍節度副大使江南管内都招討使建武軍節度嶺南西道觀察等使檢校太傅守侍中知蘇州中吳軍軍州事行邕州刺史錢元璙爲檢校太尉兼中書令餘如故辛卯天平軍監軍使柴重厚可特進右領衞將軍同正充鳯翔監軍使甲午以宣武軍節度押牙李從溫李從璋李從榮李從厚李從璨竝銀青光祿大夫檢校右㪚騎常侍兼御史大夫宣武軍節度押牙李從臻可檢校國子祭酒兼御史中丞自從温而下皆李嗣源諸子也十一月丙申靈武奏甘州回鶻可汗仁美卒其弟狄銀權主國事吐渾白都督族帳移于代州東南己亥幸六宅宴諸弟壬寅尚書左丞判吏部尚書銓事崔沂貶麟州司馬吏部侍郎崔貽孫貶朔州司馬給事中鄭韜光貶寧州司馬吏部員外盧損貶府州司户時有選人吳延皓取亡叔告身故舊名求仕事發延皓付河南府處死崔沂已下貶官宰相豆盧革趙光𦙍韋説詣閤門待罪詔釋之癸卯帝畋于伊闕侍衞金槍馬萬餘騎從帝一發中大鹿是日命從官拜梁祖之陵物議非之其夕宿于張全義之别墅甲辰宿伊闕縣乙已宿椹磵時騎士圍山㑹夜顚墜崖谷死傷甚衆丙午復命衞兵分獵殺獲萬計是夜方歸京城六街火炬如晝丁未賜羣臣鹿肉有差庚戌制改節將一十一人功臣號辛亥以兵部侍郎李德休爲吏部侍郎壬子日南至百官拜表稱賀以昭儀侯氏爲汗國夫人昭容夏氏爲虢國夫人昭媛白氐爲沛國夫人出使美宣鄧氏爲魏國夫人御正楚眞張氏爲涼國夫人司簿德美周氏爲宋國夫人侍眞吳氏爲渤海郡夫人其餘竝封郡夫人丁已河中節度使守太師兼尚書令西平王李繼麟可依前守太師兼尚書令河中䕶國軍節度使西平王仍賜鐡劵戊午幸李嗣源李紹榮之第縱酒作樂是日鎭州地震契丹冦蔚州十二月戊辰幸西苑校獵己巳詔汴州節度使李嗣源歸鎭通鑑云己巳命宣武軍節度使李嗣源將宿衛兵三萬七千人赴汴州遂如幽州禦契丹庚午帝與皇后劉氏幸張全義第酒酣帝命皇后拜全義爲養父全義惶恐致謝復出珍貨貢獻翼日皇后傳制命學士草謝全義書學士趙鳯密疏陳國后無拜人臣爲父之禮帝雖嘉之竟不能已其事壬申以教坊使王承顏爲興州刺史丙子詔取來年正月七日幸魏州庚辰畋于近郊至夕還宫壬午契丹寇嵐州党項遣使貢方物乙酉幸龍門佛寺祈雪丙戌以徐州節度使李紹眞爲北面行營副招討使戊子李嗣源奏部署大軍自宣武軍北征淮南楊溥遣使貢獻己丑幸龍門庚寅詔河南尹張全義爲洛京畱守判在京諸軍事是日日傍有背氣凡十二同光三年春正月甲午朔帝御明堂殿受朝賀仗衞如式丙申詔以昭宗少帝山陵未備宜令有司别選園陵改葬尋以年饑財匱而止契丹寇幽州戊戌詔起今後特恩授官及侍衞諸軍將校内諸司等官其告身官給舊例朱膠錢臺省禮錢竝停其餘合徴臺省禮錢比舊數五分中許徴一分特恩者不徴兵吏部兩司逐月各支錢四十貫文充吏人食直少府監鑄錢造印文今後不得徴納銅炭價直其料物官給庚子車駕發京師幸鄴以前許州節度使李紹沖爲太子少保以前邠州節度使韓恭爲右金吾大將軍充兩街使以前安州節度使朱漢賓爲左龍武統軍庚戌車駕至鄴命青州節度使符習修酸棗河隄先是梁末帝次河隄引水東注至鄆濮以限我軍至是方修之丙辰幽州上言節度使李存賢卒二月甲子朔詔興唐府管内有百姓隨絲鹽錢每兩與減五十文逐年所俵蠶鹽每㪷與減五十文小菉豆稅每畆與減放三升都城内所徴稅絲水與除放丙寅定州節度使王都來朝丁卯畋于近郊己已召從臣擊毬于鞠埸辛未許州上言襄城葉縣準勑割隸汝州其扶溝等縣請郤隸當州從之甲戌以滄州節度使李紹斌爲幽州節度使依前檢校太保以大同軍畱後安元信爲滄州節度使乙亥幸王莽河射鴈丙子李嗣源奏涿州東南殺敗契丹生擒首領三十人符習奏修隄役夫遇雪寒逃散樞密使郭崇韜上表辭兼鎭時帝命李紹斌鎭幽州以其時望未重欲以李嗣源爲鎭帥且爲紹斌聲援移郭崇韜兼領汴州召崇韜議之崇韜奏以爲當因懇辭兼領庚辰以宣武軍節度使李嗣源爲鎭州節度使辛已以皇子繼潼繼嵩繼蟾繼嶢竝檢校司徒皆冲幼未出閤突厥渤海國皆遣使貢方物帝幸近郊射鴈甲申以樞密使郭崇韜爲依前守侍中監修國史兼樞密使加食邑實封廣南劉巖遣使奉書于帝稱大漢國王致書上大唐皇帝乙酉帝射鴨于郭泊丙戌定州節度使檢校太尉兼侍中王都進封開國公加食邑實封戊子幸近郊射鴈工部尚書崔柅卒贈右僕射三月癸已朔賜扈從諸軍將士優給自二十千至一千甲午振武軍節度使洛京内外蕃漢馬步使朱守殷奏昨修月陂隄至德宫南獲玊璽一紐獻之詔示百官騐其文曰皇帝行寳四字方圓八寸厚二寸背紐交龍光瑩精妙守殷又于役所得古文錢四百六十六内二十六文曰得一元寳四百四十曰順天元寳上之龎元英文昌雜録云同光三年洛京積善坊得古文錢曰得一元寳順天元實史不載何代鑄錢近見錢氏錢譜云史思明再陷洛陽鑄得一錢賊黨以為得一非佳號乃改順天蓋史思明所鑄錢也丙申寒食節帝與皇后出近郊遙饗代州親廟庚子詔取三月十七日車駕歸洛京壬寅符習奏修河隄畢功戊申帝召郭崇韜謂曰朕思在德勝寨時霍彥威段凝皆予之勍敵終日格鬬戰聲相聞安知二年之間在吾廡下吾無少康光武之才一旦重興基構者良由二三勲德同心輔翼故也朕有時夢寢如在戚城思念曩時挑戰鏖兵勞則勞矣然而掦旌伐鼓差慰人心殘壘荒溝依然在目予欲按德勝故寨與卿再陳舊事崇韜曰此去澶州不遠陛下再觀戰地益知王業之艱難豈不韙哉已酉車駕發鄴宫辛亥至德勝城登城四望指戰陣之處以諭宰臣渡河南觀廢柵舊阯至楊村寨㳂河至戚城置酒作樂而罷壬子淮南楊􅄎遣使朝貢東京副畱守張憲奏諸營家口一千二百人逃亡以艱食故也時宫苑使王允平伶人景進爲帝廣采宫人不擇良家委巷殆千餘人車駕不給載以牛車纍纍于路焉庚辰車駕至自鄴辛酉詔本朝以雍州爲西京洛州爲東都并州爲北都近以魏州爲東京宜依舊以洛京爲東都魏州改爲鄴都與北都竝爲次府夏四月癸亥朔日有蝕之以租庸副使孔循權知汴州軍州事丙寅淮南楊􅄎遣使貢方物壬申幸甘泉亭癸酉詔翰林學士承旨盧質覆試新及第進士五代㑹要時以新及第進士符䝉正等尚于浮議故命盧質覆試租庸使奏時雨乆愆請下諸道州府依法祈禱從之乙亥帝與皇后幸郭崇韜第又幸左龍武統軍朱漢賓之第戊寅以耀州爲團練州其順義軍額宜停庚辰帝侍皇太后幸㑹節園遂幸李紹榮之第辛已以旱甚詔河南府徙市造五方龍集巫禱祭癸未以兖州節度使李紹欽爲鄧州節度使丁亥以鎭州節度使李嗣源兼北面水陸轉運使以徐州節度使李紹眞爲副禮部貢院新及第進士四人其王澈改為第一桑維翰第二符䝉正第三成僚第四禮部侍郎裴皥旣無黜落特議寛容今後新及第人候過堂日委中書門下精加詳覆陜州奏木連理庚寅中書侍郎兼工部尚書平章事趙光𦙍卒廢朝三日五月壬辰朔淮南楊􅄎貢端午節物丁酉皇太妃劉氏薨于晉陽廢朝五日帝于興安殿行服時皇太后欲奔喪于晉陽百官上表請畱乃止戊戌以鎭州行軍司馬知軍府事任圜爲工部尚書戊申幸龍門廣化寺祈雨己酉黒水女眞皆遣使朝貢戊午以鳯州衙内馬步軍都指揮使李繼昶爲涇州節度使檢校太傅己未詔天下見禁罪人如無大過速令疎放幸𤣥元廟禱雨六月癸亥雲州上言去年契丹從磧北歸悵逹靼因相掩擊其首領裕悅族帳自磧北以部族羊馬三萬來降已到南界今差使人來赴闕奏事甲子太白晝見丁卯以滄州節度使安元信充北面行營馬步軍都排陣使辛未以宗正卿李紓充昭宗少帝改卜園陵使壬申京師雨足自是大雨至于九月晝夜隂晦未嘗澄霽江河漂溢隄防壞決天下皆訴水災丁丑詔吳越王錢鏐將行冊禮準禮文合用竹冊宜令所司修製玉冊時郭崇韜秉政以爲不可樞密承旨段徊贊其事故有是命癸丑以天德軍節度使管内蕃漢都知兵馬使劉承訓爲天德軍節度觀察畱後丙戌詔曰闗内諸陵頃因䘮亂例遭穿穴多未掩修其下宫殿宇法物等各令奉陵州府據所管陵園修製仍四時各依舊例薦饗每陵仰差近陵百姓二十户充陵戶以備灑掃其壽陵等一十陵亦一例修掩量置陵戶戊子以刑部尚書李琪充昭宗少帝改卜園陵禮儀使己丑以工部郎中李途爲京北少尹充修奉諸陵使辛卯詔括天下私馬五代㑹要詔下河南河北諸州和市戰馬官吏除一匹外匿者坐罪將收蜀故也三楚新録莊宗謂髙季興曰今天下負固不服者惟吳蜀耳朕欲先有事于蜀而蜀地險阻尢難江南才隔荆南一水朕欲先之卿以為何如季興對曰臣聞蜀地富民饒獲之可建大利江南國貧地狄民少得之恐無益臣願陛下釋吳先蜀時荘宗意亦欲伐蜀及聞季興之言果大悦舊五代史巻三十二
