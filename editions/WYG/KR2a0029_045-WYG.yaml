body:
  text: 舊五代史巻二十二宋門下侍郎參知政事監修國史薛居正等撰梁書第二十二列傳十二楊師厚潁州斤溝人也為李罕之歩將以猛决聞尤善騎射及罕之敗退保澤州師厚與李鐸何絪等來降太祖署為忠武軍牙將繼歴軍職累遷檢校右僕射表授曹州刺史唐天復三年從太祖迎昭宗于岐下李茂貞以勁兵出戰為師厚所敗及王師範以青州叛太祖遣師厚率兵東討時淮賊王景仁以衆二萬來援師範師厚逆擊破之追至輔唐縣斬數百級授齊州刺史將之任太祖急召見于鄆西境遣師厚率歩騎屯于臨朐而聲言欲東援密州畱輜重于臨胊師範果出兵來擊師厚設伏于野追擊至聖王山殺萬餘衆擒都將八十人未幾萊州刺史王師誨以兵救師範又大敗之自是師範不復敢戰師厚移軍至于城下師範力屈竟降天復四年三月加檢校司徒徐州節度使天祐元年加諸軍行營馬歩都指揮使二年八月太祖討趙匡凝于襄陽命師厚統前軍以進趙匡凝嚴兵以備師厚至榖城西童山刋材造浮橋引軍過漢水一戰趙匡凝敗散擕妻子㳂漢遁去翼日表師厚為山南東道節度畱後舊唐書天祐三年六月甲申敕襄州近因趙匡凝作帥請别立忠義軍額既非往制固是從權忠義軍額宜停廢依舊為山南東道節度使即令南討荆州畱後趙匡明亦棄軍上峽不浹旬併下兩鎮乃正授襄州節度使先是漢南無羅城師厚始興板築周十餘里郛郭完壯開平元年加檢校太保同平章事明年又加檢校太傅三年三月入朝詔兼潞州行營都招討使無何劉知俊據同州叛師厚與劉鄩率軍西討至潼關擒知俊弟知浣以獻知俊聞師厚至即西走鳯翔師厚進攻至長安時知俊已引岐冦據其城師厚以竒兵傍南山急行自西門而入賊將王建驚愕不知所為遽出降制加師厚檢校太尉頃之晉王與周徳威丁會符存審等以大衆攻晉州甚急太祖遣師厚帥兵援之軍至絳州晉軍扼䝉阬之險師厚整衆而前晉人乃徹圍而遁四年二月移授陜州節度使五年正月王景仁敗于栢鄉晉人乘勝圍邢州掠魏博南至黎陽師厚受詔以兵屯衛州晉軍攻魏州不克而退師厚追襲過漳河解邢州之圍改授滑州節度使明年太祖北征令師厚以大軍棗強逾旬不能克太祖屢加督責師厚晝夜奮擊乃破之盡屠其城車駕還師厚屯魏州及庶人友珪篡位魏州衙内都指揮使潘晏與大將臧延範趙訓謀變有密告者師厚布兵擒捕斬之歐陽史云師厚乘間殺魏牙將潘晏臧延範等逐出節度使羅周翰越二日又有指揮使趙賓夜率歩軍擐甲俟旦為亂師厚以衙兵圍捕賓不能起乃越城而遁師厚遣騎追至肥鄉擒其黨百餘人歸斬于府門友珪即以師厚為魏博節度使檢校侍中未幾鎮人晉人侵魏之北鄙師厚率軍至唐店破之斬首五千級擒都將三千餘人是時師厚握河朔兵威望震主友珪患之詔師厚赴闕師厚乃率精兵萬人至洛陽嚴兵于都外自以十餘人入謁友珪懼厚禮而遣之及末帝將圖友珪遣使謀于師厚深陳欵効且馳書于侍衛軍使袁象先及主軍大將又遣都指揮使朱漢賓率兵至滑州以應禁旅友珪既誅末帝即位于東京首封師厚為鄴王加檢校太師中書令毎下詔不名以官呼之事無巨細必先謀于師厚師厚頗亦驕誕先是鎮人以我栢鄉不利之後屢擾邉境師厚總大軍直抵鎮州城下焚盪閭舎移軍掠藁城束鹿至深州而歸乾化五年三月卒于鎮廢朝三日贈太師師厚純謹敏幹深為太祖知遇委以重兵劇鎮他莫能及然而末年矜功恃衆驟萌不軌之意于是專割財賦置銀槍効軍節凡數千皆選摘驍鋭縱恣豢養復故時牙軍之態時人病之清異錄云槍材難得十全魏州石屋材多可用楊師厚時銀槍效節都皆采于此承前河朔之俗上元比屋夜遊及師厚作鎮乃課魏人户立燈竿千釭萬炬洞照一城縱士女嬉遊復彩畵舟舫令女妓櫂歌于御河縱酒彌日又于黎陽採巨石將紀徳政以鐡車負載驅牛數百以拽之所至之處丘墓廬舎悉皆毁壊百姓望之皆曰碑來及碑石纔至而師厚卒魏人以為悲來之應末帝聞其卒也于私庭受賀乃議裂魏州為兩鎮既而所樹親軍果為叛亂以招外冦致使河朔淪陷宗社覆滅由師厚兆之也牛存節字贊貞青州博昌人也本名禮太祖改而字之少以雄勇自負唐乾符末鄉人諸葛爽為河陽節度使存節往從之爽卒存節謂同輩曰天下洶洶當擇英主事之以圖富貴遂歸于太祖初授宣義軍小將屬蔡冦至金堤驛犯酸棗靈昌存節日與之鬬凡二十餘往毎往必執俘而還前後斬首二十餘級獲孳畜甚衆太祖擊蔡賊于板橋赤堈酸棗門封禪寺枯河北存節皆預其行與諸將于濮州南劉橋范縣大破鄆衆自此深為太祖奬遇文徳元年夏李罕之以并軍圍張宗爽于河陽太祖遣存節率軍赴之屬歲歉饟餽不至村民有儲乾椹者存節以器用錢帛易之以給軍食大破賊于浿河罕之引衆北走又預討徐宿有功及討河北存節前鋒下黎陽收臨河至内黄西以兵千餘人當魏人萬二千衆大破其陣殭仆蔽野太祖深所歎激謂有神兵之助大順元年改滑州左右廂牢城使與諸將討時溥累破賊軍景福元年秋改遏後都指揮使攻濮之役領軍先登遂拔其壘二年四月下徐州梟時溥存節力戰其功居多乾寧二年授檢校工部尚書三年夏太祖東討鄆州存節領軍次故樂亭扼其要路都指揮使龎師古屯馬頰存節密與都將王言謀入鄆壘十二月存節遣王言夜伏勇士于州西北以船踰濠舉梯登陴既而王言不克入存節獨率伏軍負梯䡴破其西甕城奪其濠橋諸軍俱進四年四月陷其城㝷與葛從周降下兖州加檢校右僕射其年秋大舉以伐淮南至濠州東聞前軍失利于清口諸軍退至淠河無復隊伍存節遏其後諸將釋騎歩鬬諸軍稍得濟收合所部竝敗兵共八千餘人至于淮涘時不食已四日矣存節訓勵部分以禦追冦遂得旋師五年除亳州刺史俄遷宣武軍都指揮使改宿州刺史明年淮賊大至彭城存節乃以歩下兵夜發直趣彭門淮人訝其神速震恐而退諸將服其智識光化二年罷歸復為左衙都將兼馬歩教練使天復元年授潞州馬歩都指揮使法令嚴整士庶安之及追赴行在士卒泣送者不絶于道加金紫光禄大夫檢校司空改滑州左衙歩軍指揮使知邢州軍州事天祐元年授邢州團練使時州纔及二百人晉人知之以大軍來冦太祖在鄴發長直兵二千人赴援存節率壯徤出鬬以家財賞激戰士并軍急攻七日不能克而去太祖召至勞慰久之厚賚金帛鞍馬加檢校司徒冬罷軍署為元帥府左都押衙四年太祖受禪除右千牛衛上將軍其秋攻潞州以存節為行營馬歩軍都排陣使開平二年二月自右監門衛上將軍轉右龍虎統軍駐畱洛下是歲王師敗于上黨晉人乘勝進迫澤州州城將陷河南畱守張全義召存節謀遂以本軍及右龍武羽林等軍往應接上黨師至天井關存節謂諸將曰是行也雖不奉詔㫖然要害之地不可致失時晉人新勝其鋒甚盛存節引衆而前銜枚夜至澤州守遇守埤者已縱火鼓噪以應外軍刺史保衙城不知所為存節纔入晉軍巳至矣乃分布守禦晉軍四面攻鬭開地道以入城存節亦以隧道應之逆戰于地中晉軍不能進又以勁弩射之中者人馬皆洞經十三日晉軍死傷者甚衆焚營而退郡以獲全太祖屢歎賞之五月遷左龍虎統軍充六軍馬歩都指揮使十月授絳州刺史三年四月除鄜州畱後六月劉知俊以同州叛㝷授同州畱後未幾加檢校太保同州節度使乾化二年加檢校太傅進封開國公存節戒嚴軍旅常若敵至先是州中井水鹹苦人不可飲及并人岐人來迫州城或以為兵士渴乏陷在旦夕存節乃肅拜䖍祝擇地鑿八十餘井其味皆甘淡由是人馬汲濯有餘衆以為至誠之感自八月至三年春末人馬未嘗釋甲以至冦退㝷加同平章事詔赴闕末帝召慰勉賞賜甚厚十一月加開府儀同三司食邑一千户授鄆州節度使四年加淮南西北面行營招討使控扼淮濆邉境安之其冬蔣殷據徐州逆命存節方以大衆戍潁州得殷逆謀密以上聞遽奉詔與劉鄩同討之頓于埇上淮賊朱瑾以兵救殷距宿之兩舎聞存節兵大至即委糧棄甲而遁竟平徐州詔加大尉夏中病渴且痟屬河北用軍末帝令率軍屯陽畱以張劉鄩之勢存節忠憤彌篤未嘗言病料敵治戎旦夕愈厲病革詔歸汶陽翼日而卒將終戒其子知業知讓等以忠孝言不及他册贈太師存節武鷙慷慨有大節野戰壁守皆其所長威名聞于境外深為末帝所重而木強忠厚有賈復之風焉王檀字衆美京兆人也曽祖泚唐左金吾衛將軍隴州防禦使祖曜定難功臣渭橋鎮遏使父環鴻臚卿以檀貴累贈左僕射檀少英悟美形儀好讀兵書洞曉韜略唐中和中太祖鎮大梁檀為小將四年汴將楊彦洪破巢將尚讓李讜于尉氏門外檀在戰中摧鋒陷陣遂為太祖所知稍䝉擢用預破蔡賊于斤溝淝河八角遷踏白都副將光啓二年從胡真擊淮西之衆解河陽之圍蔡賊張存敢乘亂據洛陽檀與勇士數十人潛入賊栅邀其輜重存敢遁走胡真至陜州開通貢路遣檀攻玉山寨降賊帥石令殷從擊秦宗賢于鄭州西北河灘之上于太祖馬前射賊將孫安應弦而斃三年佐都指揮使朱珍敗徐戎于孫師陂獲其將孫用和束詡以獻從擊蔡賊于板橋偏將李重裔追賊馬躓為蔡人所擒檀奪取而旋擭賊將薛注太祖破朱瑾于劉橋檀盡收其軍實文徳元年三月討羅𢎞信敗魏人于内黄檀獲其將周儒邵神劔以歸補衝山都虞候是歲與諸軍平蔡州明年佐朱珍大破時溥之衆檀獲賊將何肱改左踏白馬軍副將預征兖鄆累立戰功大順元年從龎師古渡淮深入討孫儒之亂奪邵伯堰破髙陲軍檀奮命擊賊刃傷左臂未幾遷順義都將天復中從太祖率四鎮之師圍鳯翔以迎昭宗屢立戎効遷左踏白指揮使從攻王師範于青丘檀以偏師收復密郡永陽志云張訓守密州刺史朱全忠至青州訓謂諸將曰汴人將至何以禦之諸將請焚城大掠而歸訓曰不可乃封府庫植旗幟于城上遣嬴弱居前自以精兵殿其後而去全忠遣王檀攻密州數日乃敢入城遂權知軍州事充本州馬歩軍都指揮使㝷表授檢校右僕射守密州刺史郡接淮戎舊無壁壘乃率夫修築羅城六旬而畢居民頼之加檢校司空開平二年六月授邢州保義軍節度使檢校司徒三年加檢校太保充潞州東北面行營招討使乾化元年正月王景仁與晉人戰于栢鄉王師敗績河朔大震景仁與衆為敵騎所追檀嚴設備應接敗軍助以資裝獲濟者甚衆俄而晉軍大至重圍四合土山地穴晝夜攻擊太祖憂之檀密上表請駕不親征而悉力枝梧竟全城壘三月以功就加檢校太傅同平章事七月又加開府儀同三司檢校太尉進封瑯琊郡王命宣徽使趙殷衡賫詔慰諭賜絹千疋銀千兩賞守禦邢州之功也庶人友珪僭位授鄧州宣化軍節度使檢校太尉兼侍中末帝即位移授許州匡國軍節度使加檢校太師五年蔡州刺史王彦温作亂檀受詔討平之加兼中書令貞明元年三月魏博軍亂六月晉王入魏州分兵收下屬郡河北大擾檀受詔與開封尹劉鄩掎角進師以援河北檀攻澶州魏縣下之擒賊將李巖王開關以獻頃之檀密疏請以竒兵西趣河中自隂地關襲取晉陽末帝許之即馳兵而去二年二月師至晉陽晝夜急攻其壘并州幾陷既而蕃將石家才自潞州以援兵至檀引軍大掠而還㝷授天平軍副大使知節度使事充鄆齊曹等州觀察等使先是檀招誘羣盜選其勁悍者寘于帳下以為爪牙至是數輩竊發突入府第檀素不為備遂為所害時年五十一節度副使裴彦聞變率府兵盡擒諸賊州城帖然㝷册贈太師謚曰忠毅葬于開封縣之臯門原有子六人皆升朝列史臣曰夫大都偶國春秋所非當師厚之據鄴城也綰數萬之甲兵擅六州之輿賦名既震主勢亦滔天逮其喪亡湏議分割由兹以失河朔因是以啓晉人詩所謂誰生厲階者師厚之謂歟存節王檀俱出身事主底力圖功觀其方畧皆將帥之良者也舊五代史巻二十二
