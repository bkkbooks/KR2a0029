body:
  text: 舊五代史巻八十二宋門下侍郎參知政事監修國史薛居正等撰晉書第八少帝紀二天福八年秋七月丁丑朔京師雨水深三尺辛巳許州節度使李從温來朝進封楚國公壬午以前河陽節度使皇甫遇為右龍武統軍丁亥以宣徽南院使李承福為同州節度使癸巳改陜州甘棠驛為通津驛避廟諱也甲午正衙命冊皇太后以宰臣李崧充使右散騎常侍李慎儀為副丁酉幸南莊召從駕臣僚習射路左農人各賜布衫麻屨八月戊申右衛上將軍楊思權卒贈太傅辛亥分命朝臣一十三人分檢諸州旱苗涇青磁鄴都共奏逃户凡五千八百九十諸縣令佐以天災民餓攜牌印納者五癸酉以前昭義節度使李從敏為左龍武統軍九月戊寅尊秦國夫人安氏為皇太妃帝所生母也丁亥追冊故魏國夫人張氏為皇后帝之元妃也丙子以金部郎中知制誥馮玉為檢校尚書右僕射充潁州團練使戊子前潁州團練使田令方追奪在身官爵勒歸私第坐前任耀州日額外配民麯錢納歸私室故也延州奏綏州刺史李彞敏抛棄城郡與弟彞俊等五人將骨肉二百七十口來投當州押送赴闕稱與兄夏州節度使彞殷偶起猜嫌互相攻伐故也辛卯夏州奏差宥州刺史李仁立權知綏州癸已故綘州刺史張從訓贈太尉追冊皇后之父也甲午夏州李彞殷奏衙内都指揮使拓拔崇斌等五人作亂當時收擒處斬訖相次綏州刺史李彞敏擅將兵士直抵城門尋差人掩殺彞敏知事不濟與弟五人將家南走詔李彞敏潛結􅇯黨顯恣逆謀骨肉之間尚興屠害照臨之内難以含容送夏州處斬丙申幸大年莊遂幸侍衛使景延廣第延廣進金玉器玩賜延廣玉帶名馬母妻賓佐部曲僮僕賜賚咸及之庚子以右諫議大夫邊光範為給事中以吏部郎中劉知新為右諫議大夫是月諸州郡括借到軍食以籍來上吏民有隠落者並處極法州縣二十七蝗餓死者數十萬冬十月戊申制以吳國夫人馮氏為皇后仍令所司擇日備禮冊命庚戌封皇第十一妺為嘉興長公主第十二妹為永泰長公主是夕五更有彗見于東方在角旬日而滅壬子以權知延州軍州事前鳳州防禦使杜威為延州留後甲寅以國子祭酒兼戸部侍郎田敏充𢎞文館學士判館事以吏部侍郎張昭逺充史館修撰判館事以給事中司徒詡充集賢殿學士判院事西京奏百姓馬知饒殺男吳九不死以其侵母食也詔赦之甲子以前延州節度使何建為涇州節度使丙寅以涇州節度使王周為陜府節度使已已以左散騎常侍權知開封府事邊蔚為工部侍郎依前知府事壬申以前兵部侍郎李玘為吏部侍郎癸酉命使攝太尉右僕射平章事和凝使副攝司徒給事中邊光範追册故魏國夫人張氏為皇后奉寳冊至西莊影殿行禮鹵簿儀仗如式十一月丁丑以鄧州節度使宋彥筠為晉州節度使以涇州節度使何建為鄧州節度使己卯以前鄴都留守廣晉尹李徳珫為涇州節度使丙申所司奏議故天下兵馬都元帥吳越國王錢元瓘諡曰莊穆詔改為文穆戊戌遣前復州防禦使吳巒權知貝州軍事詔節度使王令温赴闕庚子單州軍事判官趙岳奏刺史楊承祚初夜開門出城稱為母病往青州寧親于孔目官齊琪處留下牌印臣已行用權知州事辛丑高麗遣使朝貢昭化軍節度使瑞慎等州觀察等使杜建徽進封鄖國公遣侍衛步軍都指揮使郭謹領兵赴鄆州十二月乙巳朔遣左領軍衛將軍蔡行遇押兵士屯于鄆州仍遣供奉官殿直二十六人自河隂至海口分擘地分巡檢以青州節度使楊光逺謀叛故也庚戌前左御正齊國夫人吳氏已降二十一人並封郡國夫人太后宫皇后宫知客夫人等亦如之太子太保致仕梁文矩卒贈太子太傅癸丑詔河陽節度使符彥卿宋州節度使高行周貝州節度使王令温同州節度使李承福陳州梁漢璋亳州李萼懐州薛懐讓並赴闕分命使臣諸州郡巡檢以契丹入寇故也遣給事中邊光範前登州刺史郭彥威使于契丹行至恒州敵已犯境不能進留于公館數月不達其命而囘遼史天福八年二月乙夘晉遣使進先帝遺物辛酉晉遣使請居汴從之三月丁未晉主至汴遣使來謝五月己亥遣使如晉致生辰禮六月辛酉晉遣使貢金秋八月丁未朔晉復貢金己未如奉聖州晉遣其子延煦來朝甲寅以單州刺史楊承祚為登州刺史從其便也華州陜府奏逃户凡一萬二千三百乙丑臘車駕不出詔前陜州節度使石贇率諸節度使畋于近郊太子賓客聶延祚卒丁卯詔宣徽使劉繼勲就杜威園亭會節度使統軍等習射淄州奏青州節度使楊光逺反遣兵士取淄州劫刺史翟進宗入青州是冬大饑河南諸州餓死者一萬六千餘口開運元年春正月甲戌朔是夕陣雲掩北斗之魁星乙亥滄恒貝鄴馳告契丹前鋒趙延壽趙延昭引五萬騎入冦將及甘陵青州楊光逺召之也己卯契丹陷貝州知州吳巒死之庚辰以宋州節度使高行周為北面行營都部署以河陽節度使符彥卿為馬軍左廂排陣使以右神武統軍皇甫遇為馬軍右廂排陣使以陜州節度使王周為步軍左廂排陣使以左羽林統軍潘瓌為步軍右廂排陣使太原奏契丹入鴈門圍忻代二州恒滄邢三州上言契丹大至是嵗天下餓死者數十萬人詔逐處長吏瘞之壬午詔取此月十三日車駕北征以前邠州節度使李周為權東京留守乙酉車駕發東京丁亥敵騎至黎陽以侍衛馬軍都指揮使李守貞為前軍都虞候河北危蹙諸州求救者人使相望戊子車駕至澶州以貝州節度使王令温為鄧州節度使時令温弟令崇自契丹至訴以舉族陷于甘陵故有是命辛卯鄴都留守張從恩遣人夜縋城間行奏契丹主以鐵騎三四萬建牙帳于元城以趙延壽為魏博節度使改封魏王延壽日率騎軍摩壘而退甲午以北京留守劉知逺為幽州道行營招討使以恒州節度使杜威副之定州節度使馬全節為都虞候其職員將校委招討使便宜署置乙未大霧中有白虹相偶占者曰斯為海淫其下必將有戰詔率天下公私之馬以資騎軍丙申契丹攻黎陽遣右武衛上將軍張彥澤等率勁騎三千以禦之己亥遣譯語官孟守忠致書于契丹主求修舊好守忠自敵帳迴契丹主復書曰已成之勢不可改也辛丑太原奏與契丹戰于秀谷斬首三千級生擒五百人獲敵將一十七人賊軍散入鵶鳴谷已進軍追襲二月甲辰朔遣石贇守麻家口何建守楊劉鎮白再榮守馬家渡安彥威守河陽鄆州奏博州刺史周儒以城降契丹又與楊光逺潛約引契丹于馬家渡濟河時郭謹在汶陽遣左武衛將軍蔡行遇率數百騎赴之遇伏兵于葭葦中突然而出轉鬭數合部下皆遁行遇為賊所執鋒鏑重傷不能乗馬坐畚中舁至幕帳遣李守貞等水陸進兵而下以救汶陽丙午先鋒指揮使石公霸與契丹遇于戚城之北為契丹所圍高行周符彥卿方息于林下聞賊至駭愕督軍而進契丹衆甚盛被圍數重遣人馳告景延廣請益師延廣遲留候帝進止行周等大譟瞋目奮擊賊衆傷死者甚多帝自御親兵救之方解宋史符彥卿傳契丹騎兵數萬圍髙行周于鐡丘諸將莫敢當其鋒彥卿獨引數百騎擊之遼人遁去行周得免高懐徳𫝊至戚城被圍數重援兵不至危甚懐徳左右射縱横馳突衆皆披靡挾父而出登戚城古臺置酒以勞三將咸咎延廣不遣兵赴難相對泣下戊申契丹築壘于馬家渡東岸以騎軍列于外以禦王師李守貞以師搏之遂破其衆賊騎散走赴河溺死者數千遂拔其壘初西岸敵軍數萬鼓譟揚旗以助其勢及見東岸兵敗號哭而去獲馬八百匹生擒賊將七十八人部衆五百人送行在悉斬之辛亥夏州節度使李彞殷合蕃漢之兵四萬抵麟州濟河侵契丹之境以牽脅之壬子以彞殷為契丹西南面招討使易州刺史安審約奏戰契丹于北平賊退保祁溝關㫁其橋梁而還癸丑博州殘兵至自賊中周儒之降也賊執其軍士將獻于幕帳行次中途守者夜寢其中軍士一人自解桎梏為諸兵釋縛取賊戈矛盡殺援者二百餘人南走而歸至河無舟浮水而過溺死之餘所存者六十七人是日日有黄白暈二白虹夾日而行己未滄州奏賊衆三千人援送所掠人口寳貨等由長蘆入蕃以輕騎邀之斬獲千餘人人口輜重悉委之而走庚申宰臣馮道等再上表請聽樂皆不允時帝自期年之後于宫中間舉細聲女樂及親征以來日于左右召淺蕃軍校奏三絃胡琴和以羌笛擊節鳴鼓更舞迭歌以為娯樂常謂侍臣曰此非音樂也故馮道等奏請舉樂詔旨未允而止壬戌楊光逺率兵圍棣州刺史李瓊以州兵擊之棄營而遁冀州奏敗賊軍于城下見舁棺者訊其降者曰戚城之戰上將金頭王中流矢而死此其櫬也癸亥以前鄧州節度使何建為東南面馬步軍都部署率師屯汶陽甲子蜀人冦我階州三月癸酉朔契丹主領兵十餘萬來戰時契丹偽棄元城寨已旬日矣伏精騎于頓丘故城以待王師通鑑鄴都留守張從恩屢奏敵已遁去大軍欲進追之會霖雨而止設伏累日人馬飢頓趙延壽謀曰晉軍悉在河上畏我鋒鋭不敢前進不如徑造城下四面而進攻奪其橋梁天下定矣契丹主然之是日前軍高行周在戚城之南賊將趙延壽趙延昭以數萬騎出王師之西契丹主自擁精騎出王師之東兩軍接戰交相勝負至晡時契丹主以勁兵中央出而來帝御親軍列為後陣東西濟河為偃月之勢旗幟鮮盛士馬嚴整契丹主望之謂左右曰楊光逺言晉朝兵馬半已餓死今日觀之何其壯耶敵騎往來馳突王師植立不動萬弩齊彀飛矢蔽空賊軍稍却會有亡者告契丹主曰南軍東面人少沿河城柵不固可以攻之契丹乃率精騎以攻東邊王師敗走敵騎追之時有夾馬軍士千餘人在堤間治水寨旗幟之末出于堰埭敵望見之以為伏兵所起追騎乃止久之復戰王師又退李守超以數百騎短兵直進擊之敵稍却戰塲之地人馬死者無筭㫁箭殘鏃横厚數寸遇夜賊擊鉦抽軍而退夜行三十里而舍焉䕶聖指揮使協霸協霸二字上疑有脱文亡入賊中夷其族䕶聖第二軍都指揮使安重懐指揮使烏韓七監軍何彥超等臨陣畏怯手失兵仗悉斬之乙亥契丹主帳内小校竊其主所乗馬來奔云契丹巳傳木書收軍北去契丹國志云景延廣疑有詐閉壁不敢追遼帝北歸所過焚掠民物殆盡齊州奏青州賊軍冦明水鎮壬午禮部尚書盧詹卒贈太子少保甲申契丹車帳已過貝州以趙延昭守貝州遼史三月壬午留趙延昭守貝州徙所俘户于内地辛卯定州馬全節攻泰州拔之俘其兵士二千人雜畜戎仗稱是癸已北京留守兼中書令劉知逺封太原王餘如故是日詔天下抽㸃鄉兵凡七戸出一士六戸資之仍自具兵仗以武定為軍號太常丞王緒棄市緒家于青州常致書于楊光逺緒有妾之兄慊緒不為賙給遂告與光逺連謀密書述朝廷機事遂收捕斬之夏四月車駕在澶州滄州奏契丹陷徳州刺史尹居璠為敵所執甲辰鄴都留守張從恩來朝丁未加從恩平章事還鄴己酉詔取今月八日車駕還京令髙行周王周留鎮澶淵近地兵馬委便宜制置甲寅至自澶州曲赦京城大辟以下罪人丁已升冀州為防禦使額同華奏人民相食己未以右武衛上將軍張彥澤為右神武統軍辛酉以鄆州節度使侍衛親軍都指揮使景延廣為西京留守以宋州節度使高行周為侍衛親軍都指揮使以侍衛親軍都虞候義成軍節度使李守貞為兖州節度使典軍如故是日分命文武臣寮三十六人往諸道州府括率錢帛以次軍門癸亥以西京留守安彥威為晉昌軍節度使以晉昌軍節度使趙瑩為華州節度使以左龍武統軍皇甫遇為滑州節度使是日置酒宫中召景延廣謂之曰卿有佐命之功命保釐伊洛非酬勲之地也因解御衣寳帶以賜之丙寅隴州奏餓死者五萬六千口五月壬申朔太原劉知逺奏邊境未寧軍用甚廣所封王爵乞未行冊命戊寅遣侍衛親軍都虞候李守貞率步騎二萬討楊光逺于青州丁亥以鄴都留守張從恩為貝州行營都部署通鑑張從恩上言趙延昭雖㩀貝州麾下兵皆久客思歸宜速進軍攻詔以從恩為貝州行營都部署以滑州節度使皇甫遇為行營都虞候以左神武統軍潘瓌掌騎兵右神武統軍張彥澤掌步兵辛卯張從恩奏貝州賊將趙延昭縱火大掠棄城而遁通鑑延昭屯于瀛莫阻水自固以李守貞為青州行營都部署以河陽節度使符彥卿副之戊戌以鄧州節度使何建為貝州永清軍節度使是月澤潞上言餓死者凡五千餘人六月辛丑朔王師拔淄州斬楊光逺偽署刺史劉翰辛卯以太尉兼侍中馮道為檢校太師兼侍中充同州節度使丙午詔復置樞密院以侍中桑維翰為中書令充樞密使權開封府尹李周卒輟朝贈太師辛亥以邢州節度使安叔干為晉州節度使加同平章事以晉州節度使宋彥筠為陜州節度使以吏部郎中李榖充樞密直學士丙辰滑州河決漂注曹單濮鄆等州之境環梁山合于汶濟宋史楊昭儉傳河決數郡大發丁夫以本部帥董其役既而塞之晉少主喜詔立碑紀其事昭儉表諫曰陛下刻石紀功不若降哀痛之詔摛翰頌美不若頒罪已之文言甚切至少主嗟賞之卒罷其事戊午升府州為團練使額庚申襄州獻白鵲甲子復置翰林學士乙丑宰臣等三上表請聽樂詔允之戊辰以門下侍郎王松為左丞以右丞王易簡為吏部侍郎以右散騎常侍蕭愿為秘書監以右諫議大夫王仁裕為給事中以給事中李式為左散騎常侍以金部郎中知制誥徐台符為翰林學士以禮部郎中李澣本官知制誥充翰林學士以刑部郎中劉温叟改都官郎中充翰林學士以主客員外郎范質充翰林學士御史張宜改倉部員外郎知制誥庚午以前晉州節度使周密為左龍武統軍以同州節度使李懐忠為左羽林統軍舊五代史巻八十二
