body:
  text: 舊五代史巻五十五宋門下侍郎參知政事監修國史薛居正等撰唐書第三十一列傳七康君立蔚州興唐人世為邊豪乾符中為雲州牙校事防禦使段文楚時羣盜起河南天下將亂代北仍歳阻饑諸部豪傑咸有嘯聚邀功之志㑹文楚稍削軍人儲給戍兵咨怨君立與薛鐵山程懷信王行審李存章等謀曰段公懦人難與共事方今四方雲擾武威不振丈夫不能于此時立功立事非人豪也吾等雖權係部衆然以雄勁聞於時者莫若沙陁部復又李振武父子勇冠諸軍吾等合勢推之則代北之地旬月可定功名富貴事無不濟也君立等乃夜謁武皇言曰方今天下大亂天子付將臣以邊事歲偶饑荒便削儲給我等邊人焉能守死公家父子素以威惠及五部當共除虐帥以謝邊人孰敢異議者武皇曰明天子在上舉事當有朝典公等勿輕議予家尊逺在振武萬一相迫俟予稟命君立等曰事機巳洩遲則變生曷俟千里咨稟衆因聚譟擁武皇比及雲州衆且萬人師營鬭雞臺城中械文楚以應武皇之軍既收城推武皇為大同軍防禦留後衆狀以聞朝廷不悦詔徵兵來討俄而獻祖失振武武皇失雲州朝廷命招討使李鈞幽州李可舉加兵于武皇攻武皇于蔚州君立從擊可舉之師屢㨗及獻祖入達靼君立保感義軍武皇授鴈門節度以君立為左都押牙從入闗逐黄孽收長安武皇還鎮太原授檢校工部尚書先鋒軍使文徳初李罕之既失河陽來歸于武皇且求援焉乃以君立充南面招討使李存孝副之率師二萬助罕之攻取河陽三月與汴將丁㑹牛存節戰于沇河臨陣之次騎將安休休叛入汴軍君立引退八月授汾州刺史大順元年潞州小校安居受反武皇遣君立討平之授檢校左僕射昭義節度使自武皇之師連嵗略地於邢洺攻孟方立君立常率澤潞之師以為掎角景福初檢校司徒食邑千户二年李存孝據邢州叛武皇命君立討之以功加檢校太保乾寧初存孝平班師存孝既死武皇深惜之怒諸將無解慍者初李存信與存孝不協屢相傾奪而君立素與存信善九月君立至太原武皇㑹諸將酒博因語及存孝事流涕不巳時君立以一言忤旨武皇賜酖而殂時年四十八明宗即位以念舊之故詔贈太傅薛志勤蔚州奉誠人小字鐡山初為獻祖帳中親信乾符中與康君立共推武皇定雲州以功授右牙都校從入達靼武皇授節鴈門志勤領代北軍使從入闗收京城以功授檢校工部尚書河東右都押牙先鋒右軍使從武皇救陳許平黄巢武皇遇難于上源驛汴將楊彦洪連車樹栅遮絶巷陌時騎從皆醉宴席既闌汴軍四面攻傳舍志勤虓勇冠絶復酒膽激壯因獨登驛樓大呼曰朱僕射負恩無行邀我司空圖之吾三百人足以濟事因彎弧發射矢無虚發汴人死者數十志勤私謂武皇曰事急矣如至五鼔吾屬無遺類矣可速行因扶武皇而去雷雨暴猛汴人扼橋志勤以其屬血戰擊敗之得侍武皇還營由是恩顧益厚大順初張濬以天子之師來侵太原十月大軍入隂地志勤與李承嗣率騎三千抗之敗韓建之軍于䝉坑進收晉絳以功授忻州刺史二年從討鎮州收天長臨城志勤皆先登陷陣勇敢無前王暉據雲州叛討平之以志勤為大同軍防禦使檢校司空乾寧初代康君立為昭義節度使光化元年十二月以疾卒于潞時年六十二史建瑭字國寶父敬思鴈門人仕郡至牙校武皇節制鴈門敬思為九府都督從入闗定京師及鎮太原為裨將中和四年從援陳許為前鋒敗黄巢於汴上追賊至徐兖常將騎挺身酣戰勇冠諸軍是時天下之師雲集軍中無不推伏六月衛從武皇入汴州舍於上源驛是久為汴人所攻敬思方大醉因蹶然而興操弓與汴人鬭矢不虚發汴人死者數百夜分冒雨方達汴橋左右扶武皇決圍而去敬思後拒血戰而沒武皇還營知失敬思流涕久之建瑭以父廕少仕軍門光化中典昭徳軍與李嗣昭攻汾州率先登城擒叛將李瑭以獻授檢校工部尚書李思安之圍上黨也建瑭為前鋒與總管周徳威赴援時汴人夾城深固援路斷絶建瑭日引精騎設伏擒生夜犯汴營驅斬千計敵人不敢芻牧汴將王景仁營於柏鄉建瑭與周徳威先出井陘髙邑之戰日巳晡晩汴軍有歸志建瑭督部落精騎先陷其陣夾攻魏滑之間遂長驅追擊夜入柏鄉俘斬數千計論功加檢校左僕射師還留戍趙州汴將氏延賞數犯趙之南鄙建瑭設伏柏鄉獲延賞獻之九年梁祖親攻蓨縣時王師併攻幽州聲言汴軍五十萬將冦鎮定都將符存審謂建瑭曰梁軍儻以五十萬來我等何以待之裨將趙行實曰走入土門為上䇿存審曰事未可知但老賊在東别將西來尚可徐圖不旬日楊師厚圍棗強賀徳倫圍蓨縣梁祖自至攻城甚急存審曰吾王方事北面南鄙之事付我等數人今西道無兵坐滋賊勢何以為謀老賊若不下蓨阜必西攻深冀與公等料閲騎軍偵視賊勢乃選精騎八百趨信都存審扼下博橋建瑭與李嗣肱分道擒生建瑭乃分麾下三百騎為五軍自將一軍深入各命俘掠梁軍之芻牧者還㑹下博橋翼日諸軍皆至獲芻牧者數百人聚而殺之緩數十人令其逸去各曰沙陁軍大至矣梁軍震恐明日建瑭嗣肱為梁軍服色與芻牧者相雜晡晩及賀徳倫寨門殺守門者縱火大譟斬俘而去是夜梁祖燒營而遁比至貝州迷失道路委棄兵仗不可勝計十二年魏博歸款建瑭與符存審前軍屯魏縣十三年敗劉鄩于元城收澶州以建瑭為刺史檢校司空外衙騎軍都將尋厯貝相二州刺史屯於徳勝十八年與閻寶討張文禮為馬軍都將八月攻趙州獲刺史王鋌進逼鎮州為流矢所中卒于軍時年四十六李承嗣代州鴈門人父佐方承嗣少仕郡補右職中和二年從武皇討賊闗輔為前鋒王師之攻華隂黄巢令偽客省使王汀㑹軍機於黄揆承嗣擒之以獻賊平以功授汾州司馬改榆次鎮將光啟初從討蔡賊于陳許上源之難遣承嗣奉表行在陳訢其事觀軍容田令孜館而慰諭令達情於武皇姑務協和仍授以左散騎常侍朱玫之亂遣承嗣率軍萬人援鄜州至渭橋迎扈車駕王行瑜既殺朱玫承嗣㑹鄜夏之師入定京城獲偽相裴徹鄭昌圖函送朱玫襄王首獻于行在駕還宫賜號迎鑾功臣檢校工部尚書守嵐州刺史賜犒軍錢二萬貫時車駕初還三輔多盜承嗣按兵警禦輦轂乂安及還屯於鄜留别將焉嘉福五百騎宿衞孟方立之襲遼州也武皇遣承嗣設伏於榆社以待之邢人既至承嗣發伏擊其歸兵大敗之獲其將奚忠信以功授洺州刺史及張濬之加兵於太原也時鳳翔軍營霍邑承嗣率一軍攻之岐人夜遁追擊至趙城合大軍攻平陽旬有三日而拔師還改敎練使檢校司徒乾寧二年兖鄆為汴人所攻勢漸危蹙使乞師於武皇遣承嗣率三千騎假道於魏渡河援之時李存信屯於莘縣既而羅𢎞信背盟掩擊王師因之隔絶及瑄瑾失守承嗣與朱瑾史儼同入淮南承嗣史儼皆驍將也淮人得之軍聲大振十國春秋莫列傳太祖署為淮南行軍副使武皇深惜之如失左右手乃遣趙岳間道使於淮南請歸承嗣等楊行密許之遣使陳令存修好於武皇其年九月汴將龐師古葛從周同出師將収淮南朱瑾率淮南軍三萬與承嗣設伏於清口大敗汴人生獲龎師古行密嘉其雄才留而不遣仍奏授檢校太尉領鎮海軍節度使天祐九年淮人聞莊宗有柏鄉之捷乃以承嗣為楚州節度使以張掎角十七年七月卒於楚州時年五十五史儼代州鴈門人以便騎射給事于武皇為帳中親將驍果絶衆善擒生設伏望塵揣敵所向皆捷自武皇入定三輔誅黄巢毎出師皆從乾寧中從討王行瑜師次渭北遣儼率五百騎䕶駕石門時京城大擾士庶奔逃散布南山儼分騎警衞比駕還京盜賊不作以功授檢校右散騎常侍屯於三橋者累月昭宗寵錫優異明年與李承嗣率騎渡河援兖鄆時汴軍雄盛自青徐兖鄆柵壘相望儼與騎將安福順等毎以數千騎直犯營壘左俘右斬汴軍為之披靡及朱瑾失守與李承嗣等奔淮南淮人比善水軍不閑騎射既得儼等軍聲大振尋挫汴軍於清口其後併鍾𫝊擒杜洪削錢鏐成行密之霸迹者皆儼與承嗣之力也淮人館遇甚厚妻孥第舍必推其甲故儼等盡其死力十國春秋云儼累官滁州刺史天祐十三年卒於廣陵蓋寓蔚州人祖祚父慶世為州之牙將武皇起雲中寓與康君立等推轂佐佑之因為腹心武皇節制鴈門署職為都押牙領嵐州刺史洎移鎮太原改左都抑牙檢校左僕射武皇與之決事言無不從凡出征行靡不衞從通鑑光啟二年駕幸興元大將盖寓説克用曰鑾輿播遷天下皆歸咎于我今不誅朱玫黜李熅無以自湔洗克用從之又通鑑考異引紀年錄云偽使至太原太祖詰其事狀曰皆朱玫所為將斬之以徇大將盖寓等言云云太祖蟠偽詔械其使馳檄諭諸鎮曰今月二十日得襄王偽語及朱玫文字云田令孜脅遷鑾駕播越梁洋行至半塗六軍變擾遂至蒼黄而晏駕不知弑逆者何人永念丕基不可無主昨四鎮藩后推朕纂承巳于正殿受冊畢改元大赦者李煴出自贅疣名汙藩邸智昏菽麥識昧機權李符擄之以塞辭朱玫賣之以為利吕不韋之奇貨可見姦邪蕭世誠之上囊期于匪夕近者當道徑差健步奉表起居行朝現駐巴梁宿衞比無騷動而朱玫脅其孤騃自號台衡敢云首亂階明言晏駕熒惑藩鎮凌弱廟朝云乾寧二年從入闗討王行瑜特授檢校太保開國侯食邑一千户領容管觀察經略使光化初車駕還京授檢校太傅封成陽郡公寓性通點多智數善揣人主情武皇性嚴急左右難事無委遇者小有違忤即寘于法惟寓承顔希旨規其趨向婉辭順意以盡參裨武皇或暴怒將吏事將不測寓欲救止必佯佐其怒以責之武皇怡然釋之有所諫諍必徵近事以為喻自武皇鎮撫太原最推親信中外將吏無不景附朝廷藩鄰信使結託先及武皇次入寓門既總軍中大柄其名震主梁祖亦使姦人離間暴揚于天下言蓋寓已代李聞者寒心武皇略無疑間初武皇既平王行瑜還師渭北暴雨六十日諸將或請入覲且云天顔咫尺安得不行覲禮武皇意未決寓白曰車駕自石門還京寢未安席比為行瑜兄弟驚駭乗輿今京師未寧姦宄流議大王移兵渡渭必恐復動宸情君臣始終不必朝覲但歸藩守姑務動王是忠臣之道也武皇笑曰蓋寓尚阻吾入覲況天下人哉即日班師天祐二年三月寓病篤武皇日幸其第手賜藥餌初寓家每事珍膳窮極海陸精於府饌武皇非寓家所獻不食每幸寓第其徃如歸恩寵之洽時無與比及其卒也哭之彌慟莊宗即位追贈太師伊廣字言原本闕一字元和中右僕射慎之後廣中和末除授忻州刺史遇天下大亂乃委質於武皇廣襟情灑落善占對累厯右職授汾州刺史時武皇主盟諸侯景附軍機締結聘遺旁午廣奉使稱㫖累遷至檢校司徒乾寧四年從征劉仁恭武皇之師不利于成安寨廣歿于賊有女為莊宗淑妃子承俊歴貝遼二州刺史李承勲者與廣同為牙將善于奉使名聞軍中承勳累遷至太原少尹劉守光之僭號也莊宗遣承勲往使問其釁端承勲至豳州見守光如藩方聘問之禮謁者曰燕王為帝矣可行朝禮承勲曰吾大國使人太原亞尹是唐帝除授燕王自可臣其部人安可臣我哉守光聞之不悦拘留於獄數日而出詰之曰臣我乎承勲曰燕君能臣我王則我臣之吾有死而已安敢辱命㑹王師討守光承勲竟殁于燕史敬鎔太原人事武皇為帳中綱紀甚親任之莊宗初嗣晉王位李克寧陰構異圖將害莊宗事發有日矣克寧密引敬鎔以邪謀論之既而敬鎔白貞簡太后惶駭召張承業李存璋等圖之克寧等伏誅以功累厯郡同光初為華州節度使移鎮安州天成中入為金吾上將軍期年復授鄧州至鎮數月卒贈太尉舊五代史巻五十五
