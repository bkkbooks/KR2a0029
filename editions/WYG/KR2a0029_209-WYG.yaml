body:
  text: 舊五代史巻一百五宋門下侍郎參知政事監修國史薛居正等撰漢書第七宗室列傳二魏王承訓字德輝高祖之長子也少温厚美姿儀高祖尤鍾愛在晉累官至檢校司空國初授左衛上將軍高祖將赴洛命承訓北京大内巡檢未幾詔赴闕授開封尹檢校太尉同平章事以天福十二年十二月十一日薨于府署年二十六高祖發哀于太平宫哭之大慟以至于不豫是月追封魏王歸葬于太原陳王承勲高祖之幼子也國初授右衛大將軍隱帝嗣位加檢校太尉同平章事遙領興元尹俄代侯益為開封尹進位檢校太師兼侍中乾祐三年冬十一月蕭牆之亂隱帝崩軍情欲立勲為嗣時勲已病大臣及諸將請候勲起居太后令左右以卧榻舁之以見諸將就視知勲之不能興故議立劉贇周廣順元年春卒周太祖下詔封陳王蔡王信高祖之從弟也少從軍漸至龍武小校漢祖鎮并州為興捷軍都將領龔州刺史檢校太保國初為侍衛馬軍都指揮使檢校太𫝊兼義成軍節度使尋移鎮許州加太尉同平章事髙祖寢疾大漸楊邠受宻㫖遣信赴鎮信即時戒路不得奉辭雨泣而去隱帝即位加檢校太師闗輔賊平就加侍中信性昏懦黷貨無厭喜行酷法掌禁軍時左右有犯罪者召其妻子對之臠割令自食其肉或從足支解至首血流盈前而命樂對酒無仁愍之色未嘗接延賓客在鎮日聚斂無度㑹髙祖山陵梓宫經由境上信率掠吏民以備迎奉百姓苦之初聞殺楊邠史𢎞肇遽啓宴席集參佐賓幕令相致賀曰我謂天無眼令我三年不能適意主上孤立幾落賊手諸公勸我一杯可也俄蕭牆之變憂不能食尋有太后令言立湘隂公即令其子往徐州奉迎數日陳思讓率馬軍經過城西但令供頓不敢出城未幾澶州軍變王峻遣前申州刺史馬驛領軍赴州巡檢鐸引軍入城信惶惑自殺廣順初追封蔡王湘陰公贇為徐州節度使乾祐元年八月中有雲見五色明年冬杪有鳥翔集于鮮碧堂庭樹黄質朱喙金目青翼紺趾𤣥尾僅𩔖于鳯有賓佐嘆曰野鳥入室主人將去旬浹而不知所之乾祐三年冬十一月周太祖駐軍于京師議立嗣君奉太后誥立贇為嗣傳誥之際馮道笏墜于地左右惡之馮道至贇出郊迎常所乗馬比甚馴服至是馬蹄囓奔􅇣人不可制乃以他馬代之時以為不祥將離彭城嘗一日天有白光一道自西來照城中如畫有聲如雷時人謂之天裂又有巨星墜于徐野殷然有聲或謂之天狗後贇果廢死案湘隂公傳原本殘闕攷十國春秋相陰公傳云湘陰公贇世祖子也髙祖愛之以為已子乾祐元年拜武寧軍節度使二年加同平章事郭威既敗幕容彥超于北郊隱帝遇弑威入京師謂諸大臣宻相推戴及見宰相馮道等道殊無意威不得巳見道下拜而道猶受拜如平時徐勞之曰公行良苦威意色皆沮以為犬臣未有推已意又難于自立因與王峻入白太后推擇漢嗣羣臣乃共奏曰武寧節度使贇高祖愛以為子宜立為嗣乃遣太師馮道率百官徃迎道揣威意不在贇直前問曰公此舉由衷乎威指天為誓道既行語左右曰吾生平不作謬語人今謬語矣道見贇傳太后意召之贇行至宋州威已自澶州為兵士擁還京師王峻慮贇左右生變遣侍衞馬軍指揮使郭崇威以兵七百騎衛贇崇威至宋州贇登樓問崇威所以來之意崇威曰澶州軍變懼未察之遣崇威䕶衞非惡意也贇召崇威崇威不敢進馮道出與崇威語崇威乃登樓見贇時䕶聖指揮使張令超帥步兵為贇宿衛判官董裔説贇曰觀崇威瞻視舉措必有異謀道路皆言郭威巳為天子而陛下深入不止禍其至哉請急召令超諭以禍福使夜以兵刼崇威所屬士卒明日掠睢陽金帛募士卒北走太原彼新定京邑未暇追我此䇿之上也贇猶豫未決是夕崇威宻誘令超歸郭氏盡奪贇部下兵郭威以書召道先歸留其副趙上交王度奉贇入朝大后道乃辭贇先還贇謂道曰寡人此來所恃者以公三十年舊相是以不疑道黙然贇客將賈貞等數目道欲圖之贇曰勿草草事豈出于公耶道已去崇威乃幽贇于外舘殺賈貞董裔及牙内都虞候劉福孔日官夏昭度等郭威已監國太后乃下誥曰比者樞宻使威志安宗社議立長君以徐州節度使贇髙祖親近立為漢嗣乃自藩鎮召赴京師雖誥命已行而軍情不附天道在北人心靡束適當改卜之初俾應分土之命贇可降授開府儀同三司檢校大師上柱國封湘陰公贇卒以殺死五代史補郭忠恕七歲童子及弟富有文學尤工篆隸嘗有人于龍山得鳥跡篆忠恕一見輒誦如宿習乾祐中湘陰鎮徐州辟為推官周祖之入京師也少主崩于北崗周主命宰相馮道迎湘隂公將立之至宋州髙祖已為三軍推戴忠恕知事變乃正色責道曰今公累朝大臣誠信著于天下四方談士無賢不肖皆以為長者今一旦返作脱空漢前功業並棄令公之心安乎道無言對忠恕因勸湘陰公殺道以奔河東公猶豫未決遂及于禍忠恕竄迹乆之晚年尤好輕忽卒以此敗坐除名配流焉舊五代史卷一百五
