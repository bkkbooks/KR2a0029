body:
  text: 舊五代史巻八十三攷證晉少帝紀三八月辛丑命十五將以禦契丹案東都事畧亦載出帝命十五將出征事歐陽史云劉知逺為北面行營都統杜威為都招討使葢畧之也壬辰太原奏代州刺史白文珂破契丹于七里烽案通鑑作丙子契丹冦遂城樂壽深州刺史康彥進擊却之與是書異歐陽史契丹國志並與是書同圍恒州分兵陷鼓城槀城元氏髙邑昭慶寧晉蒲澤欒城栢鄉等縣案遼史已卯圍恒州下其九縣歐陽史繫于乙酉之後疑誤易州奏郎山塞將孫方簡破契丹千餘人案孫方簡歐陽史作孫方諫賊勢稍却渡白溝而去案通鑑庚申契丹大至晉軍與戰逐北十餘里契丹踰白溝而去歐陽史庚申杜威及契丹戰于陽城敗之俱與是書同惟遼史云己未重威守貞引兵南遁追至陽城大敗之復以走卒為方陣來拒與戰十餘合是遼師未嘗言敗也葢當時南北軍俱有掩飾故紀載不同如此大軍至白團衛村下營案歐陽史作衞村通鑑攷異引漢高祖實録作白檀遼史從是書作白團衞村嘉哩舊作諧里今改黙埒舊作沒剌今改舊五代史巻八十三攷證
