body:
  text: 舊五代史巻一百四十宋門下侍郎參知政事監修國史薛居正等撰志二厯志古先哲王受命而帝天下者必先觀象以垂法治厯以明時使萬物服其風化四海同其正朔然後能允釐下土欽若上元故虞舜之紹唐堯先齊七政武王之得箕子首叙九疇皇極肉是而允興人時以之而不忒歴代已降何莫由斯粤自軒黃肇正天統歲躔辛卯厯法時成故黃帝始用辛卯厯顓頊次用乙卯厯虞用戊午厯夏用丙寅厯商用甲寅厯周用丁已厯魯用庚子厯秦用乙卯厯漢用太初厯四分厯三統厯凡三本魏用黃初景初厯凡二本晉用元始厯合元萬分厯凡二本宋用大明厯元嘉厯凡二本齊用天保厯同章厯正象厯凡三本後魏用興和厯正光厯正元厯凡三本梁用大同厯乾象厯永昌厯凡三本後周用天和厯丙寅厯明元厯凡三本隋用甲子厯開皇厯皇極厯大業厯凡四本唐用戊寅厯麟德厯神龍厯大衍厯元和觀象厯長慶宣明厯寶應厯正元厯景福崇元厯凡九本洎梁氏之應運也乗唐室陵遲之後黃巢離亂之餘衆職未修三辰孰驗故當時歲厯猶用宣明崇元二法叅而成之及晉祖肇位司天監馬重績始造新厯奉表上之云臣聞為國者正一氣之元宣萬邦之命爰資厯以立章程長慶宣明雖氣朔不渝即星躔罕驗景福崇元縱五厯甚正而年差一日今以宣明氣朔崇元星緯二厯相參方得符合自古諸厯皆以天正十一月為歲首循太古甲子為上元積歲彌多差闊至甚臣改法定元創為新厯一部二十一巻七章上下經二巻算草八巻立成十二巻取唐天寶十四載乙未立為上元以雨水正月朔為歳首謹詣閤門上進玉海調元厯蓋倣曹士為小厯之舊唐建中時曹士蒍始變古法以顯慶五年為上元雨水為歲首世謂之小厯晉高祖命司天少監趙仁錡張文皓秋官正徐皓天文叅謀趙延乂杜昇杜崇龜等以新厯與宣明崇元考覈得失俾有司奉而行之因賜號調元厯仍命翰林學士承旨和凝撰序其後數載法度寖差至周顯德二年世宗以端明殿學士左散騎常侍王朴明於厯算乃命朴考而正之朴奉詔歲餘撰成欽天厯十五巻上之表云臣聞聖人之作也在乎知天人之變者也人情之動則可以言知之天道之動則當以數知之數之為用也聖人以之觀天道焉歲月日時由斯而成陰陽寒暑由斯而節四方之政由斯而行夫為國家者履端立極必體其元布政考績必因其歲禮動樂舉必正其朔三農百工必授其時五刑九伐必順其氣庶務有為必從其日月六籍宗之為大典百王執之為要道是以聖人受命必治厯數故得五紀有常度庶徵有常應正朔行之於天下也自唐而下凡厯數朝亂日失天垂將百載天之厯數汩陳而已矣今陛下順考古道寅畏上天咨詢庶官振舉墜典以臣薄游曲藝常涉舊史遂降述作之命俾究迎推之要雖非能者敢不奉詔乃包萬象以立法齊七政以立元測圭箭以候氣審朓朒以定朔明九道以步月校遲疾以推星考黃道之斜正辨天勢之升降而交蝕詳焉夫立天之道曰陰與陽陰陽各有數合則化成矣陽之䇿三十六陰之䇿二十四竒偶相命兩陽三陰同得七十二同則陰陽之數合七十二者化成之數也化成則謂之五行之數五行得朞之數過者謂之氣盈不及謂之朔虛至於應變分用無所不通所謂包萬象矣故以七十二為經法經者常也常用之法也法者數之節也隨法進退不失舊位故謂之通法以通法進經法得七千二百謂之統法自元入經先用此法統厯之諸法也以通法進統法得七十二萬氣朔之下収分必盡謂之全率以通法進全率得七千二百萬謂之大率而元紀生焉元者歲月日時皆甲子日月五星合在子正之宿當盈縮先後之中所謂七政齊矣古之植圭於陽城者以其近洛故也蓋尚嫌其中乃在洛之東偏開元十二年遣使天下候影南距林邑國北距橫野軍中得浚儀之岳臺應南北弦居地之中皇家建國定都於梁今樹圭置箭測岳臺晷漏以為中數晷漏正則日之所至氣之所應得之矣日月皆有盈縮日盈月縮則後中而朔月盈日縮則先中而朔自古朓朒之法率皆平行之數入厯既有前次而又衰稍不倫皇極舊述則迂迴而難用降及諸厯則踈逺而多失今以月離朓朒隨厯較定日躔朓朒臨用加減所得者入離定日也一日之中分為九限逐限損益衰稍有倫朓朒之法所謂審矣赤道者天之弦帶也其勢圓而平紀宿度之常數焉黃道者日軌也其半在赤道内半在赤道外去赤極逺二十四度度當與赤道交則其勢斜當去赤道逺則其勢直當斜則日行宜遲當直則日行宜速故二分前後加其度二至前後減其度九道者月軌也其半在黃道内半在黃道外去黃道極逺六度出黃道謂之正交入黃道謂之中交若正交在秋分之宿中交在春分之宿則比黃道益斜若正交在春分之宿中交在秋分之宿則比黃道反直若正交中交在二至之宿則其勢差斜故較去二至二分逺近以考斜正乃得加減之數自古雖有九道之說蓋亦知而未詳空有祖述之文全無推步之用今以黃道一周分為八節一節之中分用九道盡七十二道而復使日月二軌無所隱其斜正之勢焉九道之法所謂明矣星之行也近日而疾逺日而遲去日極逺勢盡而留自古諸厯分段失實隆降無准今日行分尚多次日便留自留而退唯用平行仍以入段行度為入厯之數皆非本理遂至乖戾今校定逐日行分積逐日行分以為變段於是疾漸而遲勢盡而留留自留而行亦積微而後多别立諸段變厯以推變差俾諸段變差際會相合星之遲疾可得而知之矣自古相傳皆謂去交十五度以下則日月有蝕殊不知日月之相掩與闇虚之所射其理有異焉今以日月徑度之大小較去交之逺近以黃道之斜正天勢之升降度仰視旁視之分數則交虧得其實矣乃以一篇步日一篇步月一篇步星案以下脫一篇歩發斂五字下云以卦候滅没為之下篇者言為步發斂之下篇歐陽史約其文稱謹以歩日步月步星步發斂為四篇是也以卦候滅没為之下篇都四篇為厯經一巻厯十一巻草三巻顯德三年七政細行厯一巻臣檢討先代圖籍今古厯書皆無蝕神首尾之文蓋天竺胡僧之祅說也只自符天卜祝小術不能舉其大體遂為等接之法蓋從假用以求徑捷於是乎交有逆行之數後學者不能詳知便言厯者有九道以為注厯之恒式今並削而去之昔在唐堯欽若昊天陛下親降聖謨考星象日月星辰唐堯之道也其厯謹以顯德欽天為名天道元逺非微臣之所盡知但竭兩竭以奉明詔疎畧乖謬甘俟罪戾世宗覽之親為製序仍付司天監行用以來年正旦為始自前諸厯並廢玉海欽天於朔分之下立小分謂之杪說者謂前代諸厯朔餘未有杪者若可用杪何待求日法以齊朔分也其厯經一巻今聊紀於後以備太史氏之周覽焉顯德欽天厯經演紀上元甲子距今顯德三年丙辰積七千二百六十九萬八千四百五十二欽天統法七千二百欽天經法七十二欽天通法一百欽天步日躔術歲率二百六十二萬九千七百六十四十軌率二百六十二萬九千八百四十四八十朔率二十一萬二千六百二十二十八歲䇿三百六十五一千七百六十四十軌䇿三百六十五一千八百四十四八十歲中一百八十三四千四百八十二十軌中一百八十二四千五百二十二四十朔䇿二十九三千八百二十二十八氣䇿一十五一千五百七十三三十五象䇿七二千七百五十七七周紀六十歲差八十四四十辰則六百八刻二十四分案以上題稱步日躔術及後歩月離術步五星術合為厯經四篇者之三又皆僅列用数而不及推步據歐陽史云舊史亡其步發斂一篇而在者三篇簡畧不完然則是書原文固已闕矣欽天步月離術離率一十九萬八千三百九十三九交率一十九萬五千九百三十七九十七五十六離䇿二十七三千九百九十三九交䇿二十七一千五百二十七九十七五十六望䇿一十四五千五百一十一十四交中一十三四千三百六十三九十八七十八離朔一七千二十七一十九交朔二二千二百九十二三十四十四中淮一千七百三十六中限四千七百八十平離九百六十三程節八百欽天步五星術歲星周率二百八十七萬一千九百七十六六變率二十四萬二千二百一十五六十六厯率二百六十二百九千七百六十一七十八周䇿三百九十八六千三百七十六六厯中一百八十二四千四百八十八十九變段變日變度變厯晨見一十七三三十七二二十四順遲二十五二九一二十九退遲一十四一一十二空二十八退疾二十七四三十八一三十七後留二十六三十二順疾九十一十六六十三一十一一十三順疾九十一十六六十三一十一一十三前留二十六三十二退疾二十七四三十八一三十七退遲一十四一一十二空二十八順遲二十五二九一二十九夕伏一十七三三十七二二十四熒惑周率五百六十一萬五千四百二十二一十一變率二百九十八萬五千六百六十一七十一厯率二百六十二萬九千七百六十周䇿七百七十九六千六百二十二一十一厯中百八十二四千四百八十變段變日變度變厯晨見七十三五十三六十八五十五十八順疾七十三五十一一四十八三次疾七十一四十六六十九四十四一十七次遲七十一四十五三十三四十二五十八順遲六十二一十九二十九一十八二十前留八六十九退遲一十一五十八空四十四退疾二十一七四十六二四十退疾二十一七四十六二四十退遲一十一五十八空四十四後留八六十九順遲六十二一十九二十九一十八二十次遲七十一四十五三十三四十二五十八次疾七十一四十六六十九四十四一十七順疾七十三五十一一四十八三夕伏七十三五十三六十八五十五十八鎮星周率二百七十二萬二千一百七十六九十變率九萬二千四百一十六五十厯率二百六十二萬九千七百五十九八十周䇿三百七十八五百七十六九十厯中一百八十二四千四百七十九九十變段變日變度變厯晨見一十九二七一一十四順疾六十五六三十八三五十一順遲一十九空六十三空三十五前留三十七三退遲一十六空四十三空一十四退疾三十三二三十五空六十退疾三十三二三十五空六十退遲一十六空四十三空一十四後留三十七三順遲一十九空六十三空三十五順疾六十五六三十八三五十一夕伏一十九二七一一十四太白周率四百二十萬四千一百四十三九十六變率四百二十萬四千一百四十三九十六厯率二百六十二萬九千七百五十五十六周䇿五百八十三六千五百四十三九十六厯中一百八十二四千四百七十五二十八變段變日變度變厯夕見四十二五十三四十五十一一十七順疾九十六一百二十一五十七一百一十六三十九次疾七十三八十三十七七十七一次遲三十三三十四一三十二四十順遲二十四一十一六十一一十一二十四前留六六十九退遲四一二十二空三十一退疾六三六十五一二十二夕伏七四四十一三十七晨見七四四十一三十七退疾六三六十五一二十二退遲四一二十二空三十一後留六六十九順遲二十四一十一六十一一十一二十四次遲三十三三十四一二十二四十次疾七十三八十三十七七十七一順疾九十六一百二十一五十七一百一十六三十九晨伏四十二五十三四十五十一一十七辰星周率八十三萬四千三百三十五五十二變率八十三萬四千三百三十五五十二厯率二百六十二萬九千七百六十四十四周䇿一百一十五六千三百三十五五十二厯中一百八十二四千四百八十二十二變段變