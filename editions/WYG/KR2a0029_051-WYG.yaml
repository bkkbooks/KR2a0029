body:
  text: 舊五代史巻二十五宋門下侍郎叅知政事監修國史薛居正等撰唐書第一武皇紀上太祖武皇帝諱克用本姓朱耶氏其先隴右金城人也始祖拔野唐貞觀中為墨離軍事從太宗討髙麗薛延陁有功為金方道副都䕶因家於𤓰州太宗平薛延陁諸部於安西北庭置都䕶屬之分同羅僕骨之人置沙陁都督府蓋北庭有磧曰沙陁故固以為名焉永徽中以拔野為都督其後子孫五世相承曽祖盡忠貞元中繼為沙陁府都督既而為吐蕃所䧟乃舉其族七千帳徙於甘州盡忠尋率部衆三萬東奔俄而吐蕃追兵大至盡忠戰殁祖執宜即盡忠之長子也收合餘衆至於靈州徳宗命為隂山府都督元和初入為金吾將軍遷蔚州刺史代北行營招撫使新唐書沙陁𫝊元和三年盡忠欵靈州塞詔處其部鹽州置隂山府以執宜為府兵馬使朝長安授特進金吾衞將軍從攻鎮州進蔚州刺史破吳元濟授檢校刑部尚書長慶初破賊深州入朝留宿衞拜金吾衞將軍太和中授隂山府都督代北行營招撫使莊宗即位追諡為昭烈皇帝廟號懿祖烈考國昌本名赤心唐朔州刺史咸通中討龎勛有功入為金吾上將軍賜姓李氏名國昌代州有唐故龍武軍統軍檢校司徒贈太保隴西李公神道碑云公諱國昌字徳興仍係鄭王房出為振武節度使尋為吐渾所襲退保於神武川及武皇鎮太原表為代北軍節度使中和三年薨莊宗即位追諡為文皇廟號獻祖武皇即獻祖之第三子也母秦氏以大中十年丙子嵗九月二十二日生於神武川之新城在姙十三月載誕之際母艱危者竟夕族人憂駭市藥於鴈門遇神叟告曰非巫醫所及可馳歸盡率部人披甲持旄擊鉦鼓躍馬大噪環所居三周而止族人如其教果無恙而生是時虹光燭室白氣充庭井水暴溢武皇始言喜軍中語齠齔善騎射與儕類馳騁嬉戲必出其右年十三見雙鳬翔於空射之連中衆皆臣伏新城北有毗沙天王祠祠前井一日沸溢武皇因持巵酒而奠曰予有尊主濟民之志無何井溢故未察其禍福惟天王若有神竒可與僕交談奠酒未已有神人被金甲持戈隱然出於壁間見者大驚走惟武皇從容而退繇是益自負獻祖之討龎勛也武皇年十五從征摧鋒䧟陣出諸將之右軍中目為飛虎子賊平獻祖授振武節度使武皇為雲中牙將嘗在雲中宿於别館擁妓醉寢有俠兒持刃欲害武皇及突入曲室但見烈火熾赫於帳中俠兒駭異而退又嘗與達靼部人角勝逹靼指雙鵰於空曰公能一發中否武皇即彎弧發矢連貫雙鵰邊人拜伏及壯為雲中守促使事防禦使支謨與同列晨集廨舍因戯升郡閣踞謨之座謨亦不敢詰乾符三年朝廷以叚文楚為代北水陸發運雲州防禦使時嵗薦饑文楚稍削軍食諸軍咸怨武皇為雲中防邊督將部下争訴以軍食不充邉校程懐素王行審蓋寓李存璋薛鐡山康君立等即擁武皇入雲州衆且萬人營於鬬鷄臺城中械文楚出以應於外諸將列狀以聞請授武皇旄鉞朝廷不允徴諸道兵以討之乾符五年黄巢渡江其勢滋蔓天子乃悟其事以武皇為大同軍節度使檢校工部尚書冬獻祖出師討党項吐渾赫連鐸乘虚陷振武舉族為吐渾所擄武皇至定邊軍迎獻祖歸雲州雲州守將拒闗不納武皇略蔚朔之地得三千人屯神武川之新城赫連鐸晝夜攻圍武皇昆弟三人四面應賊俄而獻祖自蔚州引軍至吐渾退走自是軍勢復振天子以赫連鐸為大同軍節度使仍命進軍以討武皇乾符六年春朝廷以昭義節度使李鈞充北面招討使將太原之師過石嶺闗屯於代州與幽州李可舉會赫連鐸同攻蔚州獻祖以一軍禦之武皇以一軍南抵遮虜城以拒李鈞是冬大雪弓弩弦折南軍若寒臨戰大敗奔歸代州李鈞中流矢而卒廣明元年春天子復命元師李涿率兵數萬屯代州武皇令軍使傅文達起兵於蔚州朔州刺史髙文集與薛葛安慶等部將縳文達送於李涿六月李涿引大軍攻蔚州獻祖戰不利乃率其族奔於達靼部居數月吐渾赫連鐸密遣人賂逹靼以離間獻祖既而漸生猜阻武皇知之毎召其豪右射獵於野或與之百歩馳射馬鞭或以懸針樹葉為的中之如神由是部人心伏不敢竊發俄而黄巢自江淮北渡武皇椎牛釃酒饗其酋首酒酣喻之曰予父子為賊臣讒間報國無由今聞黄巢北犯江淮必為中原之患一日天子赦宥有詔徴兵僕與公等向南而定天下是予心也人生世間光景幾何曷能終老沙堆中哉公等勉之達靼知無留意皆釋然無間是嵗十一月黄巢冦潼闗天子令河東監軍陳景思為代北起軍使收兵破賊十二月黄巢犯長安僖宗幸蜀陳景思與李友金發沙陁諸部五千騎南赴京師友金即武皇之族父也通鑑友金初與高文集竝降於李琢故得與陳景思南赴京師中和元年二月友金軍至絳州將渡河刺史瞿稹謂陳景思曰巢賊方盛不如且還代北徐圖利害四月友金旋軍鴈門瞿稹至代州半月之間募兵三萬營於崞縣之西其軍皆北邊五部之衆不閑軍法瞿稹李友金不能制友金謂景思曰興大衆成大事當威名素著則可以伏人今軍雖數萬茍無善帥進亦無功吾兄李司徒父子去嵗獲罪於國家今寄北部雄武之略為衆所推若驃騎急奏召還代北之人一麾響應則妖賊不足平也景思然之促奏行在天子乃以武皇為鴈門節度使仍令以本軍討賊新唐書王重榮傳重榮懼黄巢復振憂之與楊復光計復光曰我世與李克用共憂悉其人忠不顧難死義如已若乞師焉事蔑不濟万遣使者約連和李友金發五百騎齎詔召武皇於達靼武皇即率達靼諸部萬人趨鴈門五月整兵二萬南嚮京師太原鄭從讜以兵守石嶺闗武皇乃引軍出他道至太原城下㑹大雨班師於鴈門中和二年八月獻祖自達靼部率其族歸代州十月武皇率忻代蔚朔達靼之軍三萬五千騎赴難於京師先移檄太原鄭從讜拒闗不納武皇以兵擊之進軍至城下遣人齎幣馬遺從讜從讜亦遣人饋武皇貨幣饔餼軍器武皇南去自隂地趨晉綘十二月武皇至河中中和三年正月晉國公王鐸承制授武皇東北面行營都統武皇令其弟克修領前鋒五百騎渡河視賊黄巢遣將米重威齎重賂及偽詔以賜武皇武皇納其賂以給諸將燔其偽詔是時諸道勤王之師雲集京畿然以賊勢尚熾未敢争鋒及武皇將至賊帥相謂曰鴉兒軍至當避其鋒武皇以兵自夏陽濟河二月營於乾坑店黄巢大將尚讓林言王璠趙璋等引軍十五萬屯於梁田坡翼日大軍合戰自午及晡巢賊大敗是夜賊衆遁據華州武皇進軍圍之巢弟黄鄴黄揆固守三月尚譲引大軍赴援武皇率兵萬餘逆戰於零口巢軍大敗武皇進軍渭橋翼日黄揆棄華州而遁王鐸承制授武皇鴈門節度使檢校尚書左儀射四月黄巢燔長安收其餘衆東走藍闗武皇進收京師七月天子授武皇金紫光禄大夫檢校左僕射河東節度使舊唐書僖宗紀五月制以鴈門以北行營節度忻代蔚朔等州觀察處置等使檢校尚書左僕射代州刺史上柱國食邑七百戸李克用檢校司空同平章事兼太原尹北京留守充河東節度管内觀察處置等使新唐書沙陀𫝊云收京師功第一進同中書門下平章事隴西郡公未幾以克用領河東節度是時武皇既收長安軍勢甚雄諸侯之師皆畏之武皇一目微眇故其時號為獨眼龍是月武皇仗節赴鎮遣使報鄭從讜請治裝歸朝武皇次於郊外因往赴鴈門寧覲獻祖八月自鴈門赴鎮河東時年二十有八十一月平潞州表其弟克修為昭義節度使潞帥孟方立退保於邢州十二月許帥田從異汴帥朱温徐帥時溥陳州刺史趙犨各遣使來告以巢蔡合從凶鋒尚熾請武皇共力討賊中和四年春武皇率蕃漢之師五萬自澤潞將下天井闗河陽節度使諸葛爽辭以河橋不完仍屯兵於萬善數日移軍自河中南渡趨汝洛四月武皇合徐汴之師破尚讓於太原斬獲萬計進攻賊於西華賊將黄鄴棄營而遁是夜大雨巢營中驚亂乃棄西華之壘退營陳州北故陽里五月癸亥大雨震電平地水深數尺賊營為水所漂而潰戊辰武皇引軍營於中牟大破賊於王滿渡庚午巢賊大至濟汴而北是夜復大雨賊黨驚潰武皇營於鄭州賊衆分冦汴境武皇渡汴遇賊將渡而南半濟擊之大敗之臨陣斬賊將李周王濟安陽景彪等是夜賊大敗殘衆保於胙縣寃句大軍躡之黄巢乃携妻子兄弟千餘人東走武皇追賊至於巢州是月班師過汴汴帥迎勞於封禪寺請武皇休於府第乃以從官三百人及監軍使陳景思館於上源驛是夜張樂陳宴席汴帥自佐饗出珍幣侑勸武皇酒酣戲諸侍妓與汴帥握手叙破賊事以為樂汴帥素忌武皇乃與其將楊彦洪密謀竊發彦洪於巷陌連車樹栅以枙奔竄之路時武皇之從官皆醉俄而伏兵竊發來攻𫝊舍武皇方大醉譟聲動地從官十餘人捍賊侍人郭景銖滅燭扶武皇以茵幕裹之匿於牀下以水洒面徐曰汴帥謀害司空武皇方張目而起引弓抗賊有頃煙火四合復大雨震電武皇得從者薛鐡山賀回鶻等數人而去雨水如澍不辨人物隨電光登尉氏門縋城而出得還本營監軍陳景思大將史敬思竝遇害武皇既還營與劉夫人相向慟哭詰旦欲勒軍攻汴夫人曰司空比為國家討賊赴東諸侯之急雖汴人謀害自有朝廷論列若反戈攻城則曲在我也人得以為辭乃收軍而去馳檄於汴帥汴帥報曰竊發之夜非僕本心是朝廷遣天使與牙將楊彦洪同謀也武皇自虎牢闗西趨蒲陜而旋秋七月至太原武皇自以累立大功為汴帥怨圖䧟没諸將乃上章申理及武皇表至朝廷大恐遣内臣宣諭尋加守太傅同平章事隴西郡王光啟元年三月幽州李可舉鎮州王景崇連兵冦定州節度使王處存求援於武皇武皇遣大將康君立安老薛可郭啜率兵赴之五月鎮人攻無極武皇親領兵救之鎮人退保新城武皇攻之斬首萬餘級獲馬千匹王處存亦敗燕軍於易州十一月河中王重榮遣使來乞師且言邠州朱玫鳯翔李符將加兵於已初武皇與汴人搆怨前後八表請削奪汴帥官爵自以本軍進討天子累遣内臣楊復恭宣㫖令且全大體武皇不時奉詔天子頗右汴帥時觀軍容使田令孜君側擅權惡王重榮與武皇膠固將離其勢乃移重榮於定州重榮告於武皇武皇上章言李符朱玫挾邪忌正黨庇朱温臣已㸃檢蕃漢軍五萬取來年渡河先斬朱玫李符然後平盪朱温新唐書王重榮傳詔克用將兵援河中重榮貽克用書且言奉密詔湏公到使我圖公此令孜朱全忠朱玫之惑上也因示偽詔克用方與全忠有隙信之請討全忠反玫天子覽表遣使譬喻百端軺𫝊相望既而朱玫引邠鳯之師攻河中王重榮出師拒戰朱玫軍於沙苑對壘月餘十二月武皇引軍渡河與朱玫決戰玫大敗收軍夜遁入於京師時京城大駭天子幸鳯翔武皇退軍於河中光啟二年正月僖宗駐蹕於寳雞武皇自河中遣使上章請車駕還京且言大軍止誅凶黨時田令孜請僖宗南幸興元武皇遂班師朱玫於鳯翔立嗣襄王煴為帝以偽詔賜武皇武皇燔之械其使馳檄諸方鎮遣來使奉表於行在九月武皇遣昭義節度使李克修討孟方立於邢州大敗方立之衆於焦崗斬首數千級以大將安金俊為邢州刺史以撫其降人十月進攻邢州邢人出戰又敗之孟方立求據於鎮州鎮人出兵三萬以援方立克修班師光啟三年六月河中節度使王重榮為部將常行儒所殺武皇表重榮兄重盈為帥七月武皇以安金俊為澤州刺史時張全義自河陽據澤州及李罕之收復河陽召全義令守洛陽全義乃棄澤州而去故以金俊守之文徳元年二月僖宗自興元還京三月僖宗崩昭宗即位以武皇為開府儀同三司檢校太師兼侍中隴西郡王食邑七千戸食實封二百戸河南尹張全義潛兵夜襲李罕之於河陽城䧟舉族為全義所擄罕之踰垣獲免遂來歸於武皇遣李存孝薛阿檀史儼兒安金俊安休休將七千騎送罕之至河陽汴將丁㑹牛存節葛從周将兵赴援李存孝率精騎逆戰於温縣汴人既扼太行之路存孝殿軍而退騎將安休休以戰不利奔於蔡武皇以罕之為澤州刺史遥領河陽節度使十月邢州孟方立遣大將奚忠信將兵三萬冦遼州武皇大破之斬首萬級生擒奚忠信龍紀元年五月遣李罕之李存孝攻邢州六月下磁州邢將馬溉率兵數萬來拒戰罕之敗之於琉璃陂生擒馬溉徇於城下孟方立恚恨飲酖而死三軍立其姪遷為留後使求援於汴汴將王䖍裕率精甲數百入於邢州罕之等班師大順元年遣李存孝攻邢州孟遷以邢洺磁三州降執汴將王䖍裕三百人以獻武皇徙孟遷於太原以安金俊為邢洺團練使三月昭義軍節度使李克修卒以李克恭為潞州節度使是月武皇攻雲州拔其東城赫連鐸求援於燕燕帥李匡威将兵三萬以赴之戰於城下燕軍大敗時徐州時溥為汴軍所攻遣使來求援武皇命石君和由兖鄆以赴之五月潞州軍亂殺節度使李克恭州人推牙將安居受為留後南結汴將時潞之小將馮霸擁叛徒三千騎駐於沁水居受使人召之馮霸不至居受懼出奔至長子為村胥所殺𫝊首於霸霸遂入潞州自為留後武皇遣大將康君立李存孝等攻之汴將朱崇節葛從周等兵入潞州以固之是時幽州李匡威雲州赫連鐸與汴帥協謀連上表請加兵於太原宰相張濬孔緯贊成其事六月天子削奪武皇官爵以張濬為招討使以京兆尹孫揆為副華州韓建為行營都虞候以汴帥為河東南面招討使幽州李匡威為河東北面招討使雲州赫連鐸為副汴將朱友裕將兵屯晉綘時汴軍已據潞州又遣大將李讜等率軍數萬急攻澤州武皇遣李存孝自潞州將三千騎以援之汴將鄧季筠以一軍犯陣存孝追擊擒其都將十數人獲馬千騎匹是夜李讜收軍而退大軍掩擊至馬牢闗斬首萬餘級追襲至懐州而還存孝復引軍攻潞州八月存孝擒新授昭義節度使孫揆初朝廷授揆節鉞以本軍取刀黄嶺路赴任存孝偵知之引騎三百伏於長子縣崖谷間揆建牙持節褒衣大蓋擁衆而行存孝械揆等口遂擒揆及中使韓歸範并將校五百人存孝械揆等以組練繫之環於潞州遂獻於武皇武皇謂揆曰公縉紳之士安信徐歩可至達官何用如是揆無以對今繫於晉陽獄武皇將用為副使使人誘之揆言不遜遂殺之九月汴將葛從周棄潞州而遁武皇以康君立為潞州節度使以李存孝為汾州刺史十月張濬之師入晉州遊軍至汾隰武皇遣薛鐡山李承嗣將騎三千出隂地闗營於洪洞遣李存孝將兵五千營於趙城華州韓建以壯士三百人冒犯存孝之營存孝追擊直壓晉州西門張濬之師出戰為存孝所敗自是閉壁不出存孝引軍攻綘州十二月晉州刺史張行恭棄城而奔韓退張濬由含山路遁去大順二年春正月武皇上章申理其略曰臣今身無官爵名是罪人不敢歸陛下藩方且欲於何中寄寓進退行止伏候聖裁天子尋就加守中書令歐陽史二月復拜克用河東節度使隴西郡王加檢校太師無中書令是月魏博為汴將葛從周所冦節度使羅𢎞信遣使來求援武皇出師以赴之三月邢州節度使安知建叛奔青州天子以知建為神武統軍自棣州沂河歸朝鄆州朱瑄邀斬於河上𫝊首晉陽以李存孝為邢州節度使四月武皇大舉兵討赫連鐸於雲州遣騎將薛阿檀率前軍以進攻武皇設伏兵於御河之上大破之因塹守其城七月武皇進兵栁㑹赫連鐸力屈食盡奔於吐渾部遂歸幽州雲州平武皇表石善友為大同軍防禦使邢州節度使李存孝以鎮州王鎔託附汴人謀亂河朔北連燕冦請乘雲代之捷平定燕趙武皇然之八月大蒐於晉陽遂南巡澤潞略地懐孟河陽趙克裕望風送欵請修隣好九月蒐於邢州十月李存孝董前軍攻臨城鎮人五萬營於臨城西北龍尾崗武皇令李存審李存賢以歩軍攻之鎮人大敗殺獲萬計拔臨城進攻元氏幽州李匡威以歩騎五萬營於鄗邑以援鎮州武皇分兵大掠旋軍邢州舊五代史巻二十五
