body:
  text: 舊五代史巻五十五攷證唐列𫝊七康君立𫝊君立等乃夜謁武皇案通鑑考異引趙鳳紀年録云邊校程懷信康君立等十餘帳日譁於太祖之門疑非事實新唐書作夜謁克用通鑑作潛詣蔚州說克用皆以是書為據武皇賜酖而殂案通鑑考異引唐遺録作君立為杖死與是書異史建塘𫝊建瑭乃分麾下三百騎為五軍案歐陽史作建瑭分其麾下五百騎為五隊是書作三百騎史異文也時年四十六案歐陽史作四十二史儼𫝊儼與騎將安福順等每以數千騎直犯營壘案史儼援兖鄆在乾寧二年冬是書梁太祖紀正月擒蕃將安福順然則安福順不當與史儼同行疑𫝊文有訛字舊五代史巻五十五攷證
