body:
  text: 舊五代史巻一百一考證漢𨼆帝紀上三月二十四日行次永興思綰等作亂突入府城㩀城以叛案歐陽史云四月壬午永興軍將趙思綰叛附於李守貞據是是趙思綰據城叛在三月非四月事五代春秋通鑑俱從是書八月壬午命樞密使郭威赴河中府軍前案是書周太祖紀云七月西面師徒大集未果進取其月十三日制授帝同平章事即遣西征據此紀周太祖以七月庚申加同平章事八月壬午命赴河中府軍前非一時事也二紀前後自相矛盾歐陽史漢周本紀亦各仍是書之舊未能參考畫一通鑑定從是書漢紀舊五代史巻一百一考證
