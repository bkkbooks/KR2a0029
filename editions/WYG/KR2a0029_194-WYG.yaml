body:
  text: 舊五代史巻九十七宋門下侍郎參知政事監修國史薛居正等撰晉書第二十三列傳十二范延光字子環鄴郡臨漳人也少隸于郡牙唐明宗牧相州收為親校同光中明宗下鄆州梁兵屯楊劉口以扼之先鋒將康延孝潛使人送欵于明宗明宗欲使人達機事于莊宗方難其選延光請行遂以蠟書授之延光既至奏莊宗曰楊劉渡控扼已定未可圖也請築壘馬家口以通汶陽之路莊宗從之復遣歸鄆州俄而梁將王彦章攻馬家口所築新壘明宗恐城中不偹又遣間行告莊宗請益兵中夜至河上為梁兵所獲送夷門下獄榜笞數百威以白刃終不洩其事復為獄吏所䕶在獄半年不復理問及莊宗將至汴城獄吏即去其桎梏拜謝而出之乃見于路側莊宗喜授銀青光禄大夫檢校工部尚書明宗登極擢為宣徽使與霍彦威平青州王公儼遷檢校司徒明宗之幸夷門也至滎陽聞朱守殷拒命延光曰若不急攻賊堅矣請騎兵五百臣先赴之則人心必駭明宗從其請延光自酉時至夜央馳二百餘里奄至城下與賊交闘翌日守陴者望見乗輿乃相率開門延光先入與賊巷戰至厚載門盡殲其黨明宗喜之明年遷樞宻使權知鎮州軍府事㝷正授節旄加檢校太保長興中以安重誨得罪再入為樞密使加同平章事既而以秦王從榮不軌恐及其禍屢請外任明宗久之方許遂出鎮常山清泰中復詔為樞密使未幾出為汴州節度使會魏府屯將張令昭逐其帥劉延皓據城以叛唐末帝命延光討而平之遂授鄴都留守加檢校太師兼中書令門下有術士張生自云妙通術數當延光㣲時言將來必為將相延光既貴酷信其言歴數鎮常館于上舍延光謂之曰余夢大蛇自腹入腹半而掣去之是何祥也張生曰蛇者龍也入腹為帝主之兆明矣延光自是稍萌僭竊之意及高祖建義于太原唐末帝遣延光以本部二萬屯遼州與趙延壽掎角合勢及延夀兵敗延光促還故心不自安高祖入洛㝷封臨清王以寛其反側後延光擅殺齊州防禦使祕瓊而聚兵部下復收部内刺史入城高祖甚疑之乃東幸夷門時延光有牙校孫銳者與延光有鄉曲之舊軍機民政一以委焉故魏博六州之賦無半錢上供符奏之間有不如意者銳即對延光毁之其兇戾也如此初朝廷遣使封延光為臨清王因會寮屬延光暴得疾伏枕經旬銳乃宻惑群小召澶州刺史馮暉等以不臣之謀逼于延光延光亦惑于術者因而聽之天福二年夏六月遣銳與暉將歩騎二萬南抵黎陽通鑑云延光以馮暉為都部署以孫鋭為兵馬都監時銳以女妓十餘輩從之擁盖操扇必歌吹而後食將士煩熱覩之觧體㝷為王師所敗賊衆退還鄴城高祖繼遣楊光逺討之延光知事不濟乃殺孫銳以歸其罪發人齎表待罪且邀姑息高祖不許及經歲受圍城中飢窘高祖以師老民勞思解其役遣謁者入謂之曰卿既危蹙破在旦夕能返掌轉規改節歸我我當以大藩處之如降而殺之則何以享國明明白日可質是言因賜鐡劵改封高平郡王移鎮天平延光謂門人李式曰主上敦信明義言無不踐許以不死則不死矣因撤去守備通鑑延光猶遷延未决宣徽南院使劉處譲復入論之延光意乃决素服請降及赴汶上踰月入覲㝷表請罷免高祖冄三答諭方允制以延光為太子太師致仕居闕下期嵗高祖毎召賜飲宴待之與羣臣無間一日從容上奏願就河陽私邸以便頥養高祖許之延光攜妻子輦竒貨從焉毎過郡邑多爲關吏所糺時楊光遠居守洛下兼領孟懐既利其財復漸測朝廷宻㫖遂奏云延光國之奸臣若不覊縻必北走胡南入吳請召令西都居止高祖允之光逺使其子承勲以兵環其第逼令自裁延光曰明天子在上賜金書許我不死爾之父子何得脅制如此明旦則以白刃驅之令上馬之浮橋排于水中光逺紿奏云延光投河自溺而死水運軍使曹千獲其屍于郡東繆家灘高祖聞之輟朝二日詔許歸葬于鄴仍贈太師延光初為近臣及領重鎮禮賢接士動皆由禮故甚獲當時之譽洎鎮常山日以部将梁漢唐獲王都名馬入罪而取之在魏州日以齊州防禦使秘瓊獲董温琪珠金妓妾及經其境復害而奪之物議由是減之及懼罪以謀叛復忍耻以偷生不能引决遂至強死何非夫之甚也張從賓未詳何許人也始事唐荘宗為小校從戰有功唐天成中自奉聖指揮使領澄州刺史遷左右羽林都校從藥彦稠討楊彦温于河中平之長興中領夀州忠正軍節度使加檢校太保侍衛歩軍都指揮使從賓素便佞毎進言明宗多納之有供奉官丁延徽者性貪狡時奉詔監廪以犯贓下獄權貴多為救解明宗怒不許從賓因奏他事言及延徽明宗曰非但爾言蘓秦說予亦不得也延徽竟就戮長興末從賓出鎮靈武加檢校大傅高祖即位受代入覲會駕東幸留從賓警廵洛下一日逢留司御史于天津橋從兵百人不分路而過排御史于水中從賓紿奏其酒醉其兇傲如此及范延光據鄴城叛詔從賓爲副部署使從楊光遠同討延光㑹延光使人誘從賓從賓時在河陽乃起兵以應之先害皇子重信及入洛又害皇子重乂取内庫金帛以給部伍因東據氾水闗且欲觀望軍勢高祖命杜重威侯益分兵討之從賓大敗乗馬入河溺水而死焉張延播者汶陽人也始爲郡之牙將唐同光初明宗下郡城因收隸左右天成中累授檢校司空兩河發運營田使桞州刺史長興元年出牧蔡州加檢校司徒入爲左領軍衞大將軍充客省使伐蜀之役命爲馬軍都監三年遷鳯州防禦使西面水陸轉運使高祖卽位除東都副畱守車駕幸汴遣兼洛京巡檢使張從賓作亂令延播知河南府事從賓敗伏誅楊光逺小字阿檀及長止名檀唐天成中以明宗改御名為亶以偏傍字犯之始改名光逺字徳明其先沙􅀈部人也父阿噔啜後改名堿事唐武皇爲隊長光逺事荘宗為騎将唐天祐中荘宗遣振武節度使周徳威圍劉守光于幽州因令光逺隸於徳威麾下後與德威拒契丹于新州率軍以深入致敗因傷其臂遂廢罷扵家莊宗即位思其戰功命為幽州馬歩軍都指揮使檢校尚書右僕射戍瓦橋闗久之明宗朝歴嬀瀛易冀四州刺史光逺雖不識字然有口辨通于吏理在郡有政聲明宗頗重之長興中契丹有中山之敗生擒其將札拉等数十人送于闕下其後契丹既通和遣使乞歸之明宗與大臣謀議特放還番一日召光遠於便殿言其事光遠曰扎拉等北土之善戰者彼失之如䘮手足又在此累年偹諳中國事若放還非便明宗曰畨人重盟誓既通歡好必不相負光逺曰臣恐後悔不及也明宗遂止深嘉其抗直後自振武節度使移鎮中山累加檢校太傅將兵戍蔚州高祖舉義于太原唐末帝遣光逺與張敬達屯兵于城下俄而契丹大至爲其所敗圍其寨久之軍中糧盡光逺乃與次將安審琦等殺敬達擁衆歸命從髙祖入洛加檢校太尉充宣武軍節度使同平章事判六軍諸衛事是時光逺毎對高祖常悒然不樂高祖慮有不足宻遣近臣訊之光遠附奏曰臣貴為将相非有不足但以張生鐵死得其所臣弗如也𠂻心内愧是以不樂生鐡蓋敬達之小字也高祖聞其言以光逺爲忠純之最者也其實光逺故爲其言以邀高祖之重信也明年范延光據鄴城叛高祖命光遠率師討之將濟河㑹滑州軍亂時軍衆欲推光逺為主光逺曰自古有折臂天子乎且天子蓋公輩販弄之物晋陽之降乃勢所窮廹今若為之直反賊也由是其下惕然無復言者高祖聞之尤加寵重光逺既圍延光㝷授魏愽行府節度使兵柄在手以為高祖懼已稍干預朝政或抗有所奏高祖亦曲從之復下詔以其子承祚尚長安公主次子承信皆授美官恩渥殊等爲當時之冠桑維翰爲樞宻使往往弹射其事光遠心衘之及延光降光逺入朝面奏維翰擅權高祖以光逺方有功于國乃出維翰鎮相州光逺為西京留守兼鎮河陽因罷其兵權光逺由是怨望潛貯異志多以珍玩奉契丹訴己之屈又私飬部曲千餘人撓法犯禁河洛之人恒如偹盗㝷册拜太尉兼中書令時范延光致仕輦囊裝妓妾居于河陽光逺利其竒貨且慮為子孫之讎因奏延光不家汴洛出舍外藩非南走淮夷則北走契丹宜早除之髙祖以許之不死鐡劵在焉持疑未允光逺乃遣子承勲以甲士圍其第逼令自裁延光曰天子在上安得如此乃遣使者乞移居洛下行及河橋擯于流而溺殺之矯奏云延光自投河朝廷以適㑹其意弗之理後踰嵗入覲高祖為置曲宴教坊伶人以光逺暴歛重賦因陳戯譏之光逺殊無慙色高祖謂光逺曰元城之役卿左右皆立功未曾旌賞令各與一郡俾釐任以榮之因命為刺史者凡數人時王建立自青州移鎮上黨乃以光逺為平盧軍節度使封東平王光逺面奏請與長子同行㝷授承勲萊州防禦使及赴任僕從妓妾至千餘騎滿盈僭侈為方岳之最下車之後惟以刻剥為事少帝嗣位册拜太師封夀王宋史馬仁鎬傳晋天福中青州楊光逺将圖不軌以仁鎬為節度副史伺其動静歴二年或譖仁鎬于朝改䕶國軍行軍司馬仁鎬至河中及数月光逺反書聞後因景延廣上言請取光逺麾下所借官馬二百匹光逺怒曰此馬先帝賜我何以復取是疑我也遂遣人潛召次子承祚自單州奔歸朝廷乃就除淄州刺史以從其便光遠益驕因此搆契丹述少帝違好之短且言大飢之後國用空虚此時一舉可以平定開運元年正月契丹南牧䧟我博陵少帝幸檀淵三月契丹退命李守貞符彦卿率師東討光逺素無兵衆唯嬰城自守守貞以長連城圍之冬十一月承勲與弟承信承祚見城中人民相食將盡知事不濟勸光遠乞降冀免于赤族光逺不納曰我在代北時嘗以紙錢駝馬祭天池皆沉没人言合有天子分宜且待時勿輕言降也承勲慮禍在朝夕與諸弟同謀殺節度判官邱濤親校杜延夀楊贍白延祚等裊其首乃遣承祚送于守貞因縱火大譟刧其父幽于私第以城納欵遣即墨縣令王徳柔貢表待罪光逺亦上章自首少帝以頃歲太原歸命欲曲全之執政曰豈有逆状㴞天而赦之也乃命守貞便宜處置守貞遣人拉殺之以病卒聞歐陽史守貞遣客省副使何延祚殺之于其家漢高祖即位詔贈尚書令追封齊王仍令立碑未幾其碑石無故自折可知其隂責也五代史補楊光逺滅范延光之後朝廷以其功高授青州節度封東平王奄有登萊沂宻数郡既而自負強盛舉兵反朝廷以宋州節度李守貞嘗與光逺有隙乃命李討之李受詔欣然志在必取莫不身先矢石光逺見而懼之度不能禦遂降初光逺反書至中外大震時百官起居次忽有朝士掦言于衆曰楊光逺欲謀大事吾不信也光逺素患秃瘡其妻又跛自古豈有秃頭天子跛脚皇后耶于是人心頓安未幾光逺果降承勲光逺之長子也始名承貴避少帝名改焉以父廕歴光濮州刺史光逺兼鎮河陽命制置三城事光逺移鎮青州授萊州防禦使在郡亦頗理嘗憤父側之奸黨欲殺之毎省父父為匿焉及光逺搆釁嬰城以叛承勲赴之敵退為王師所圍踰嵗糧盡與其弟承祚背父之命出降王師朝廷授汝州防禦使尋改鄭州宋史楊承信傳光逺死承信與弟承祚詣闕請死詔釋之以承信為右羽林将軍承祚為右驍衞将軍放歸服䘮私第㝷安置鄭州及戎王入汴遣騎士自圃田召至責其害父背已使臠其肉而殺之以其弟承信為青州節度使盧文進字國用范陽人也身長七尺飲啖過人望之偉如也少事劉守光為騎將唐莊宗攻燕以文進首降遥授夀州刺史初莊宗得山後八軍以愛弟存矩為新州團練使以總領之荘宗與劉鄩對壘于莘縣命存矩于山後召募勁兵又令山北民各出戰馬噐仗毎鬻牛十頭易馬一匹人心怨咨時存矩團結五百騎令文進將之與存矩俱行至祁溝關軍士聚謀曰我輩邉人棄父母妻子為他血戰千里送死固不能也衆曰擁盧將軍却還新州據城自守奈我何因大呼揮戈趣傳舍害存矩于榻下文進撫膺曰奴輩累我矣因環尸而泣曰此輩既害郎君我何面目見王契丹國志云存矩取文進女為側室文進心常内愧因與亂軍殺存矩因爲亂軍所擁反攻新州不克馬令南唐書文進攻新州夜走墜塹一躍而出明日視之乃郡之黒龍潭也絶岸數丈深不可測又嘗有大蛇徑至座間引首及膝文進取食飼之而去由是自負又攻武州又不利周德威命将征討文進遂奔契丹命為幽州兵馬留後部分漢軍常别爲營寨未㡬文進引契丹宼新州自是戎師數至驅擄數州士女教其織紝工作中國所為者悉偹契丹所以強盛者得文進之故也契丹國志云文進引契丹軍攻新州刺史安金全不能守棄城去周徳威援之進攻新州契丹衆數萬徳威不勝大敗奔歸文進與契丹進攻幽州且二百日城中危困晉王親将兵救之方始解去契丹以文進為幽州節度使又以為盧龍節度使同光之世爲患尤深文進在平州率奚族勁騎鳥擊獸摶倐來忽徃燕趙諸州荆榛滿目軍屯涿州毎嵗運糧自瓦橋至幽州勁兵猛將援遞糧草然猶為契丹所鈔奔命不暇皆文進導之也及明宗即位之明年文進自平州率所部十餘萬衆來奔行及幽州先遣使上表曰頃以新州團練使李存矩提衡郡邑掌握恩威虐黎庻則毒甚于豺狼聚賦歛則貪盈于溝壑人不堪命士各離心臣即抛父母之邦入朔漠之地幾年鴈塞徒向日以傾心一望家山毎銷魂而㫁目李子卿之河畔空有怨辭石季倫之樂中莫陳歸引近聞皇帝陛下皇天眷命清明在躬握紀乘乾鼎新革故始知大幸有路朝宗便貯歸心祗伺良㑹臣十月十日決計殺在城契丹取十一日離州押七八千車乘領十五萬生靈十四日已逹幽州云泊至洛陽明宗寵待彌厚授滑州節度使檢校太尉嵗餘移鎮鄧州累加同平章事入為上將軍長興中復出鎮潞州擒奸䘏隠甚獲當時之譽清泰中改安州節度使及高祖即位與契丹敦好文進以嘗背契丹居不自安馬令南唐書文進居數鎮頗有善政兵民爱之其将行也從數騎至營中别其禆將李藏機告以避契丹之意将士皆拜為訣天福元年十二月乃殺行軍司馬馮知兆節度副使杜重貴等率其部衆渡淮奔于金陵李昪待之尤重馬令南唐書云烈祖以文進為天雄統軍偽命為宣州節度使後卒于江南金陵志文進自潤州召還以左衞上将軍兼中書令范陽郡王奉朝請李金全本唐明宗之小豎也其先出于吐谷渾金全驍勇善騎射少從明宗征伐以力戰有功明宗即位連典大郡天成中授涇州節度使在鎮數年以掊歛為務長興中受代歸闕始進馬數十匹不數日又進之明宗召而謂之曰卿患馬多耶何進貢之數也又謂曰卿在涇州日為理如何無乃以馬為事否金全慚謝而退四年夏授滄州節度使累官至檢校太傅清泰中罷鎮歸闕久留于京師高祖即位之明年安州屯將王暉殺節度使周瓌詔遣金全以騎兵千人鎭撫其地未及境暉為部下所殺金全至亂軍数百人皆不自安金全説遣赴闕宻伏兵于野盡殺之又擒其軍校武彦和等數十人斬之初金全之將行也高祖戒之曰王暉之亂罪莫大焉但慮封守不寕則民受其弊因折矢飛詔約以不戮一人仍許以暉為唐州刺史又謂金全曰卿之此行無失吾信及金全至聞彦和等當為亂之日刧掠郡城所獲財貨悉在其第遂殺而奪之通鑑彦和且死呼曰王暉首惡天子猶赦之我輩脅從何罪乎高祖聞之以姑息金全故不究其事㝷授以旄節金全有親吏胡漢筠者勇譎嗇褊貪詐殘忍軍府之政一以委之高祖聞其事遣吏賈仁紹徃代其職且召漢筠漢筠内疚惶怖金全乃列狀稱疾以聞及仁紹至漢筠鴆而殺之馬令南唐書胡漢榮所為多不法晋高祖患之不欲因漢榮以累功臣為選亷吏賈仁沼代之且召漢榮漢榮教金全留已而不遣金全客龎令圗諫曰仁沼昔事王晏球有大功晏球欲厚賞之仁沼退而不言此天下之忠臣也及頒賜所俘物仁沼悉以分故人親戚之貧者此天下之亷士也宜納仁沼而遣漢榮漢榮聞之夜使人殺令圗而鴆仁沼天福五年夏高祖命馬全節爲安州刺史使以代金全漢筠自以昔嘗拒命復聞仁紹二子將訴寘毒之事居不自安乃紿謂金全曰邸吏劉珂使健歩倍道兼行密傳其意云受代之後朝廷將以仁紹之事詰公之罪金全大駭命從事張緯函表送欵于淮夷淮人遣偽將李承裕以代金全金全即日南竄其妓樂車馬珍竒帑藏皆為承裕所奪與其黨數百人束身夜出曉至􅆜川引領北望泣下而去及至金陵李昪授以節鎮馬令南唐書云烈祖以金全為天威統軍遷潤州節度使後卒于江南史臣曰延光昔為唐臣綽有令譽洎逢晋祚顯恣狂謀既力屈以來降尚靦顔而惜死孟津之殁乃取笑于千載也從賓而下俱怙亂以滅身亦何足與議也文進懼強敵之威金全為輿䑓所賣事雖弗類叛則攸同咸附島夷皆可醜也舊五代史巻九十七
