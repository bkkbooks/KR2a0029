body:
  text: 舊五代史巻一百二十二宋門下侍郎參知政事監修國史薛居正等撰周書第十三宗室列傳二剡王侗太祖子初名青哥漢末遇害太祖即位詔贈太尉賜名侗顯德四年追封杞王信太祖子初名意哥漢末遇害太祖即位詔贈司空賜名信顯德四年追封案太祖諸子早歲遇害本無事蹟原本過於簡畧疑有删節今據歐陽史家人傳云初帝舉兵於魏漢以兵圍帝第時張貴妃與諸子青哥意哥姪守筠奉超定哥皆被誅青哥意哥不知其母誰氏太祖即位詔故第二子青哥贈太尉賜名侗第三子意哥贈司空賜名信皇姪守筠贈左領軍衛將軍以筠聲近榮為世宗避更名守愿奉超贈左監門衛將軍定哥贈左十牛將軍賜名遜世宗顯德四年夏四月癸未詔曰禮以縁情恩以悼往矧在友于之列尤鍾惻愴之情故皇弟贈太保侗贈司空信景運初啓天年不登俾於終鮮實動予懷侗可贈太傅追封剡王信司徒杞王又詔日故皇從弟贈左領軍衛將軍守愿贈右監門衛將軍奉超贈左千牛衛將軍遜等頃因季世不享遐齡每念非辜難忘有慟守衛可贈左衛大將軍奉超右衞大將軍遜右武衛大將軍越王宗誼世宗子漢末遇害顯德四年追封曹王宗讓世宗子顯德六年封紀王熈謹世宗子顯德六年封皇朝乾德二年卒蘄王熈誨世宗子顯德六年封歐陽史家人傳云世宗子七人長曰宜哥次二皆未名次日恭皇帝次日熈讓次日熈謹次日熈誨皆不知其母為誰氏宜哥與其二皆為漢誅太祖即位詔賜皇孫名誼贈左驍衛大將軍誠左武衞大將軍誠左屯衛大將軍顯德三年羣臣請封宗室世宗以謂為國日淺恩信未及於人須功徳大成慶流於世而後議之可也明年夏四月癸已先封太祖諸子又詔曰父子之道聖賢不忘再思夭閼之端愈動悲傷之抱故皇子左驍衛大將軍誼左武衛大將軍誠左屯衛大將軍誠等載惟往事有足傷懷宜增一字之封仍贈三台之秩誼可贈太尉追封越王諴太傅吳王誠太保韓王而皇子在者皆不封六年北復三關遇疾還京師六月癸未皇子宗訓特進左衛上將軍封梁王而宗讓亦拜左驍衛上將軍封燕國公後十日而世宗崩梁王即位是為恭皇帝其年八月宗讓更名熈讓封曹王熈謹熈誨皆前未封爵遂拜熈謹右武衛大將軍封紀王熈誨右領軍衛大將軍封蘄王乾德二年十月熈謹卒熈讓熈誨不知其所終舊五代史巻一百二十二
