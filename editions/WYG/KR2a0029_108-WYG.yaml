body:
  text: 舊五代史巻五十三攷證唐列傳五李存信傳存信本姓張案梁紀作張汚落葢本名汚落賜名存信李存孝傳位至将帥案歐陽史作位至将相呉縝纂誤云存孝本傳止為邢州留後未嘗為平章事何故云位至将相耶李存進傳父佺世吏單于案九國志孫漢韶傳云祖昉嵐州刺史父存進振武軍節度使據是書存進父名佺未嘗為刺史與九國志異李存賢傳李存賢字子良本姓王名賢許州人祖啟忠父惲案九國志李奉䖍傳奉䖍太原人本姓王氏祖欽唐隰州刺史父存賢佐唐武皇累著功賜姓李氏攷是書作許州人又作父惲不載其官爵與九國志異十八年河中朱友謙來求援案呉縝纂誤據梁末帝紀及荘宗本紀當作十七年汴軍退案歐陽史作擊走梁兵呉縝纂誤云朱友謙符存審劉鄩傳載鄩討反謙存審救之而鄩敗其事始末甚明無存賢擊走梁兵之事况大将自是存審安得隱其姓而存賢獨有功乎今攷是書止作汴軍退不言存賢擊退較歐陽史為得其實即日授特進檢校太保充幽州盧龍節度使案九國志梁人攻上黨荘宗親率大軍以援之存賢先登䧟敵以功授盧龍軍節度使與是書異存賢勝得蔚州刺史按存賢為蔚州刺史在天祐五年葢因角觝而得郡也歐陽史作與爾一鎮以為盧龍節度使與是書異按巴堅舊作阿保機今改舊五代史巻五十三攷證
