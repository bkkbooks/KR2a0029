body:
  text: 舊五代史卷六十四考證唐列傳十六霍彦威傳存憐其爽邁飬為已子案通鑑注以彦威為霍存之子與是書異值青州王公儼拒命改平盧節度至鎮擒公儼斬之案歐陽史彦威徙鎮平盧朱守殷反伏誅考朱守殷反明宗遣范延光馳兵斬之非出彦威之力疑以是書所載為得其實王晏球傳髙行周以龍武右軍攻其右行周歐陽史作行珪朱漢賓傳謚曰貞恵案五代㑹要作正慧引太常博士林弼議曰漢賔散已俸以代荒逋濟疲俗而臻富庶所涖之地綽有政聲知進退存亡之理得善始令終之道謹案諡法中道不撓保節掦名曰正愛民好學寛裕慈仁曰慧請諡曰正慧從之是書及歐陽史俱作貞恵未知何据劉圯傳翌日受賀衙庭享士伏甲幕下盡斬其亂将案通鑑考異引梁祖實録八月丁酉賜劉玘王延順物以其違亂将之命來歸編遺録斬李洪勅云始扶劉圮既奔竄以歸朝若使圯翌日便斬亂将則襄州何以至九月始収復盖圮脱身歸朝及梁亡入唐妄云斬亂以自誇大耳周知裕傳清㤗初卒於官案歐陽史作應順中卒托諾舊作秃餒今改特哩衮舊作惕隠今改舊五代史巻六十四攷證
