body:
  text: 舊五代史巻一百三十七宋門下侍郎叅知政事監修國史薛居正等撰外國列傳一契丹者古匈奴之種也代居遼澤之中潢水南岸南距榆關一千一百里榆關南距幽州七百里本鮮卑之舊地也其風土人物世代君長前史載之詳矣唐咸通末其王曰薩勒札疆土稍大累來朝貢光啟中其王沁丹者乗中原多故北邊無備遂蠶食諸郡達靼奚室韋之屬咸被驅役族帳寖盛有時入冦劉仁恭鎮幽州素知契丹軍情偽選將練兵乗秋深入踰摘星嶺討之霜降秋暮即燔塞下野草以困之馬多饑死即以良馬賂仁恭以市牧地仁恭季年荒恣出居大安山契丹背盟數來冦鈔時劉守光戍平州契丹錫利王子率萬騎攻之守光偽與之和張幄幕於城外以享之部族就席伏甲起擒錫利王子入城部族聚哭請納馬五千以贖之不許沁丹乞盟納賂以求之自是十餘年不能犯塞及沁丹政衰有别部長耶律按巴堅最推雄勁族長漸盛遂代沁丹為主先是契丹之先大賀氏有勝兵四萬分為八部每部皆號大人内推一人為主建旗鼓以尊之每三年第其名以代之及按巴堅為主乃怙強恃勇不受諸族之代遂自稱國主天祐四年大冦雲中後唐武皇遣使連和因與之面會於雲中東城大具享禮延入帳中約為兄弟謂之曰唐室為賊所簒吾欲今冬大舉弟可以精騎二萬同収汴洛按巴堅許之賜與甚厚留馬三千匹以答貺左右咸勸武皇可乗門掠之武皇曰逆賊未殄不可失信於部落自亡之道也乃盡禮遣之及梁祖建號按巴堅亦遣使送名馬女口貂皮等求封冊梁祖與之書曰朕今天下皆平惟有太原未服卿能長驅精甲徑至新莊為我翦彼仇讐與爾便行封冊莊宗初嗣世亦遣使告哀賂以金繒求騎軍以救潞州答其使曰我與先王為兄弟兒即吾兒也寧有父不助子耶許出師會潞平而止劉守光末年苛慘軍士亡叛皆入契丹洎周德威攻圍幽州燕之軍民多為冦所掠既盡得燕中人士教之文法由是慚盛十三年八月按巴堅率諸部號稱百萬自麟勝陷振武長驅雲朔北邊大擾莊宗赴援於代敵衆方退十四年新州大將盧文進為衆所廹殺新州團練使李存矩於祁溝關返攻新武周德威以衆擊之文進不利乃奔於契丹引其衆陷新州周德威率兵三萬以討之敵騎援新州德威為敵所敗殺傷殆盡契丹乗勝攻幽州是時或言契丹三十萬或言五十萬幽薊之北所在敵騎皆滿莊宗遣明宗與李存審閻寶將兵救幽州遂解其圍語在莊宗紀中十八年十月鎮州大將張文禮弑其帥王鎔莊宗討之時定州王處直與文禮合謀遣威帥軍使王郁復引契丹為援十二月按巴堅傾塞入冦攻圍幽州李紹宏以兵城守契丹長驅陷􅃰郡執刺史李嗣弼進攻易定至新樂渡沙河王郁遣使告急時莊宗在鎮州行營聞前鋒報曰敵渡沙河軍中咸恐議者請權釋鎮州之圍以避之莊宗曰霸王舉事自有天道契丹其如我何國初突厥入冦至於渭北髙祖欲棄長安遷都樊鄧太宗曰獫狁孔熾自古有之未聞遷移都邑霍去病漢廷將帥猶且志滅匈奴況帝王應運而欲移都避冦哉文皇雄武不數年俘二突厥為衞士今吾以數萬之衆安集山東王德明厮養小人按巴堅生長邊地豈有退避之理吾何面視蒼生哉爾曹但駕馬同行看吾破敵莊宗親御鐵騎五千至新城北遇契丹前鋒萬騎莊宗精甲自桑林突出光明照日諸部愕然緩退莊宗分二廣以乗之敵騎散退時沙河微氷其馬多陷按巴堅退保望都是夜莊宗次定州翌日出戰遇奚長托諾五千騎莊宗親軍千騎與之鬬為敵所圍外救不及莊宗挺馬奮躍出入數四酣戰不解李嗣昭聞其急也灑泣而往攻破敵陣掖莊宗而歸時契丹值大雪野無所掠馬無芻草凍死者相望於路按巴堅召盧文進以手指天謂之曰天未令我到此乃引衆北去莊宗率精兵騎躡其後每經按巴堅野宿之所布秸在地方而環之雖去無一莖亂者莊宗謂左右曰蕃人法令如是豈中國所及莊宗至幽州發二百騎偵之皆為契丹所獲莊宗乃還天祐末按巴堅乃自稱皇帝署中國官號其俗舊隨畜牧素無邑屋得燕人所教乃為城郭宮室之制於漠北距幽州三千里名其邑曰西樓邑屋門皆東向如車帳之法城南别作一城以實漢人名曰漢城城中有佛寺三僧尼千人其國人號按巴堅為天皇王同光中按巴堅深著闢地之志欲収兵大舉慮渤海踵其後三年舉其衆討渤海之遼東今托諾盧文進據營平等州擾我燕薊明宗初簒嗣遣供奉官姚坤告哀至西樓邑屬按巴堅在渤海又徑至慎州﨑嶇萬里既至謁見按巴堅延入穹廬按巴堅身長九尺被錦袍大帶垂後與妻對榻引見坤坤未致命按巴堅先問曰聞爾漢土河南河北各有一天子信乎坤曰河南天子今年四月一日洛陽軍變今凶問至矣河北總管令公比為魏州軍亂先帝詔令除討既聞内難軍衆離心及京城無主上下堅冊令公請主社稷今已順人望登帝位矣按巴堅號咷聲淚俱發曰我與河東先世約為兄弟河南天子吾兒也近聞漢地兵亂㸃得甲馬五萬騎比欲自往洛陽救助我兒又縁渤海未下我兒果致如此寃哉泣下不能已又謂坤曰今漢土天子初聞洛陽有難不急救致令及此坤曰非不急切地逺阻隔不及也又曰我兒既殂當合取我商量安得自便坤曰吾皇將兵二十年位至大總管所部精兵三十萬衆口一心堅相推戴違心則立見禍生非不知稟天皇王意旨無奈人心何其子托雲在側謂坤曰漢使勿多談因引左氏牽牛蹊田之說以折坤坤曰應天順人不同匹夫之義祗如天皇初領國事豈是強取之耶按巴堅因曰理當如此我漢國兒子致有此難我知之矣聞此兒有宮婢二千樂官千人終日放鷹走狗躭酒嗜色不惜人民任使不肖致得天下皆怒我自聞如斯常憂傾覆一月前已有人來報知我兒有事我便舉家斷酒解放鷹犬休罷樂官我亦有諸部家樂千人非公晏未嘗妄舉我若所為似我兒亦應不能持久矣自此願以為戒又曰漢國兒與我雖父子亦曾彼此讐敵俱有惡心與爾今天子無惡足得歡好爾先復命我續將馬萬騎至幽鎮以南與爾家天子面為盟約我要幽州令漢兒把捉更不復侵入漢界又問漢収得西川信不坤曰去年九月出兵十一月十六日収下東西川得兵馬二十萬金帛無算皇帝初即位未辦送來續當遣使至矣按巴堅忻然曰聞西有劍閣兵馬從何過得坤曰川路雖險然先朝収服河南有精兵四十萬良馬十萬匹但通人行處便能去得視劍閣如平地耳按巴堅善漢語謂坤曰吾解漢語歴口不敢言懼部人效我令兵士怯弱故也坤至止三日按巴堅病傷寒一夕大星殞於其帳前俄而卒於扶餘城時天成元年七月二十七日也其妻舒嚕氏自率衆䕶其喪歸西樓坤亦從行得報而還既而舒嚕氏立其次子得光為渠帥以總國事尋遣使告哀明宗為之輟朝明年正月葬按巴堅於木葉山偽諡曰大聖皇帝按巴堅凡三子長曰人皇王托雲即東丹王也次曰元帥太子即德光也幼曰阿敦少君德光本名耀衢芝後慕中華文字遂改焉唐天成初按巴堅死其母令德光權主牙帳令少子阿敦少君往渤海國代托雲托雲將立而德光素為部族所伏又其母亦常鍾愛故因而立之明宗時德光遣使摩琳等三十餘人來修好又遣使為父求碑石明年許之賜與甚厚并賜其母瓔珞錦綵自是山北安靜蕃漢不相侵擾三年德光偽改為天顯元年是歲定州王都作亂求援於契丹德光遂陷平州托諾以騎五千援都於中山招討使王晏球破之於曲陽托諾走保賊城其年七月又遣特哩衮率七千騎救定州王晏球逆戰於唐河北大破之幽州趙德鈞以生兵接於要路生擒特哩衮等首領五千餘人獻於闕下明年王都平擒托諾及餘衆斬之自是契丹太挫數年不敢窺邊嘗遣使紐赫美稜來求托諾骸骨明宗怒其詐斬之長興二年東丹王托雲在闕下其母繼發使申報朝廷亦優容之長興末契丹廹雲州明宗命晉高祖為河東節度使兼北面蕃漢總管清泰三年晉高祖為張敬達等攻圍甚急遣指揮使何福賫表乞師願為臣子德光白其母曰兒昨夢太原石郎發使到國今果至矣事符天意必須赴之德光乃自率五萬騎由雁門至晉陽即日大破敬達之衆於城下尋冊晉高祖為大晉皇帝約為父子之國割幽州管内及新武雲應朔州之地以賂之仍每歲許輸帛三十萬時幽州趙德鈞屯兵於團柏谷遣使至幕帳求立巳為帝以石氏世襲太原德光對使指帳前一石曰我已許石郎為父子之盟石爛可改矣楊光逺等殺張敬達降於契丹德光戲謂光逺曰曰爾軰大是惡漢兒不用鹽酪食却一萬匹戰馬光逺等大慚晉高祖南行德光自送至潞州時趙德鈞趙延壽自潞州出降於契丹德光鏁之令隨牙帳晉高祖入洛尋遣宰相趙瑩致謝於契丹天福三年又遣宰相馮道左僕射劉昫等持節冊德光及其母氏徽號賫鹵簿儀仗法服車輅於本國行禮德光大恱尋遣使奉晉高祖為英武明義皇帝是歲契丹改天顯十一年為㑹同元年以趙延壽為樞密使升幽州為南京以趙思温為南京留守既而德光請晉高祖不稱臣不上表來往緘題止用家人禮但云兒皇帝晉祖厚賫金帛以謝之晉祖奉契丹甚至歲時問遺慶弔之禮必令優厚每敵使至即於别殿致敬德光每有邀請小不如意則來譴責晉祖每屈已以奉之終晉祖世略無釁隙及少帝嗣位遣使入契丹德光以少帝不先承稟擅即尊位所賫文字略去臣禮大怒形於責讓朝廷使去即加譴辱會契丹廻國使喬榮北歸侍衞親軍都指揮使景延廣謂榮曰先朝是契丹所立嗣君乃中國自冊稱孫可矣稱臣未可中國自有十萬口橫磨劍要戰即來榮至本國具言其事德光大怒會青州楊光逺叛遣使搆之明年冬德光率諸部南下開運元年春陷祁州直抵大河少帝幸澶州以禦之其年三月德光敗於陽城棄其車帳乗一槖駞奔至幽州因怒其失律自大首領以下各杖數百唯趙延壽免焉是時契丹連歲入冦晉氏疲於奔命邊民被苦幾無寧日晉相桑維翰勸少帝求和於契丹以紓國難少帝許之乃遣使奉表稱臣卑辭首過使廻德光報曰但使桑維翰景延廣自來并割定鎮與我則可通和也朝廷知其不可乃止時契丹諸部頻出征蕃國君臣稍厭兵革德光母常謂蕃漢臣僚曰南朝漢兒爭得一向卧耶自古及今惟聞漢來和蕃不聞蕃去和漢待伊漢兒的當廻心則我亦不惜通好也三年樂壽監壽王巒繼有密奏苦言瀛鄚可取之狀十月少帝遣杜重威李守貞等率兵經畧十一月蕃將高牟翰敗晉師於瀛州之北梁漢璋死之契丹主聞晉既出師自率諸部由易定抵鎮州杜重威等自瀛州西趨常山至中渡橋敵已至矣兩軍隔滹水而砦焉十二月十日杜重威率諸軍降於契丹語在晉少帝紀中十二月德光入鎮州大犒將士十四日自鎮州南行中渡降軍所釋甲仗百萬計並令於鎮州収貯戰馬數萬匹長驅而北命張彦澤領二千騎先趨東京遣重威部轄降兵取邢相路前進晉少帝遣子延煦延寶奉降表於契丹并傳國寶一紐至牙帳明年春正月朔日德光至汴北文武百官迎於路是日入宮至昏復出次於赤崗五日偽制降晉少帝為負義侯於黃龍府安置七日德光復自赤崗入居於大内分命使臣於京城及往諸道括借錢帛偽命以李崧為西㕔樞密使以馮道為太傅以左僕射和凝及北來翰林學士承旨張礪為宰相二月朔日德光服漢法服坐崇元殿受蕃漢朝賀偽制大赦天下改晉國為大遼國以趙延壽為大丞相兼政事令充樞密使兼中京留守降東京為防禦州尋復為宣武軍十五日漢髙祖建號於晉陽德光聞之削奪漢祖官爵是月晉州潞州並歸河東時盜賊所在羣起攻刼州郡斷澶州浮梁契丹大恐沿河諸藩鎮並以腹心鎮之三月朔日德光坐崇元殿行入閣之禮覩漢家儀法之盛大恱以蕃大將蕭翰為忭州節度使十七日德光北還發離東京宿於赤崗有大聲如雷起於牙帳之下契丹自黎陽濟河次湯陰縣界有一崗土人謂之愁死崗德光憩於其上謂宣徽使高勲曰我在上國以打圍食肉為樂自及漢地每每不快我若得歸本土死亦無恨勲退而謂人曰其語偷殆將死矣時賊帥梁暉據相州德光親率諸部以攻之四月四日屠其城而去德光聞河陽軍亂謂蕃漢臣寮曰我有三失殺上國兵士打草穀一失也天下括錢二失也不尋遣節度使歸藩三失也十六日次於欒城縣殺胡林之側時德光已得寒熱疾數日矣命胡人賫酒脯禱於得疾之地十八日晡時有大星落於穹廬之前若迸火而散德光見之西望而唾連呼曰劉知逺滅劉知逺滅是月二十一日卒時年四十六主契丹凡二十二年契丹人破其屍摘去腸胃以鹽沃之載而北去漢人目之為帝羓焉案以下原本闕佚據五代會要云四月十八日德光卒於欒城五月宣遺制以永康王襲位永康王者東丹王之長子以其月二十一日領部族歸國改會同十年為天禄元年自稱天授皇帝漢乾祐三年十一月率騎數萬陷邢州之内邱縣深州之就陽縣周廣順元年正月太祖命左千牛衞將軍朱憲往修和好永康王亦遣使報命獻良馬四匹太祖復遣尚書左丞田敏供奉官蔣光遂銜命往聘其年四月田敏等廻永康王遣使獻碧玉金鍍銀裹鞍轡并馬四十匹其月太祖又命左金吾將軍姚漢英左神武將軍華光裔往使其年九月永康王為部下大寧王所弑德光之子勒所部兵誅大寧王自立稱應厯元年號天順皇帝顯德元年春太原劉崇將圖南冦契丹將楊衮率騎萬餘以助之三月世宗親征與崇戰於潞州高平縣之南原崇軍大敗契丹衆棄甲而遁二年三月命許州節度使王彦超等築壘於李晏口與契丹數千騎戰於安平縣敗之舊五代史巻一百三十七
