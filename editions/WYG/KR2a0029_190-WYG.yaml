body:
  text: 舊五代史巻九十五宋門下侍郎參知政事監修國史薛居正等撰晉書第二十一列傳十皇甫遇常山人也父武流寓太原嘗為遮虜軍使遇少好勇及壯虬髯善騎射唐明宗在藩時隸于麾下累從戰有功明宗即位遷龍武指揮使遙領嚴州刺史後出討東川為行營左軍都指揮使應順清泰中累歴團練防禦使尋遷鄧州節度使所至苛暴以誅斂為務其幕客多私去以避其累髙祖入洛移領中山俄聞與鎭州安重榮為婚家乃移鎭上黨又改平陽咸以憸人執事政事隳紊及鎭河陽部内創别業開畎水泉以通漑灌所經墳墓悉毁之部民以朝廷方姑息郡帥莫之敢訴少帝即位罷歸闕下二年契丹南宼從至澶州戰于鄆州北津契丹衆大敗溺死者數千人以功拜滑州節度使三年契丹率衆屯邯鄲遇與安審琦慕容彦超等禦之遇將渡漳河契丹前鋒大至遇引退轉鬬二十里至鄴南榆林遇謂審琦等曰彼衆我寡走無生路不如血戰遂自辰及未戰百餘合所傷其衆遇所乘馬中鏑而斃遇有紀綱杜知敏以馬授遇遇得馬復戰久之稍解杜知敏巳為所獲遇謂彦超曰知敏蒼黄之中以馬授我義也安可使陷于賊中遂與彦超躍馬取知敏而還敵騎壯之俄而生軍復合遇不能解時審琦已至安陽河謂首將張從恩曰皇甫遇等未至必為敵騎所圍若不急救則成擒矣從恩曰敵甚盛無以枝梧將軍獨往何益審琦曰成敗命也設若不濟則與之俱死假令失此二將將何面目以見天子遂率鐡騎北渡赴之契丹見塵起謂救軍併至乃引去遇與彦超中數創得還時諸軍嘆曰此三人皆猛將也遇累官至檢校太師同中書門下平章事四年契丹復至從杜重威營滹水重威送欵于契丹遇不預其議及降心不平之時戎王欲遣遇先入汴遇辭之因私謂人曰我身荷國恩位兼將相旣不能死于軍陣何顔以見舊主更受命圖之所不忍也明日行及趙郡泊其縣舍顧從者曰我巳信宿不食疾甚矣主辱臣死無復南行因絶吭而殞遠近聞而義之漢髙祖登極詔贈中書令周廣順三年正月遇妻宋國夫人霍氏上言請度為尼周太祖許之仍賜紫衣號貞範大師法名惠圓又賜夏臘十王清字去瑕洺州曲周人也父度世為農清少以勇力端厚稱于鄉里後唐明宗領行臺置歩直軍清預其募漸升為小校同光初從戰于河上有功賜忠烈功臣明宗即位自天成至清泰末歴嚴衛寧衛指揮使加檢校右散騎常侍天福元年髙祖建義入洛加檢校刑部尚書改賜扈蹕忠孝功臣三年從楊光遠平范延光于鄴改奉國軍都虞侯六年襄州安從進叛從髙行周討之踰年不下一日清請先登諸軍繼其後會有内應者遂拔其城清以中重創有詔褒慰七年改賜推忠保運功臣加金紫光禄大夫領溪州刺史八年詔遣以所部兵屯于鄴九年春契丹南牧圍其城清與張從恩守之少帝飛蠟詔勉諭錫之第宅契丹退以干城功繼遷軍額開運二年春三月從杜重威北征解陽城之圍加檢校司徒是歲秋七月詔遣與皇甫遇援糧入易州十一月從杜重威收瀛州聞契丹大至重威率諸軍沿滹水而西將保常山及至中渡橋契丹巳屯于北岸自其月二十七日至十二月五日軍不能解時戎王至留騎之精者以禦我分其弱者自故靈都城縁其山足渉滹沱之淺處引衆而南至趙郡凡百餘里斷我飛輓且扼歸路清知勢蹙謂重威曰軍去常山五百里守株于此營孤食盡將若之何請以歩兵二千為前鋒奪橋開路公可率諸軍繼之期入常山必濟矣重威可之遣宋彦筠俱行清一擊獲其橋契丹為之小卻重威猶豫不進密巳貳于國矣彦筠退走清列陣北岸嚴戒部曲日暮酣戰不息契丹以生軍繼至我軍無寸刃以益之清與其下殁焉時年五十三通鑑清謂其衆曰上將握兵坐觀吾輩困急而不救此必有異志吾輩當以死報國耳衆感其言莫有退者至暮戰不息契丹以新兵繼之清及士衆盡死由是諸軍皆奪氣契丹尋于所戰之地築一京觀及漢髙祖即位使人平之贈清太傅是歲清子守鈞于本邑義化别業招魂以葬之也梁漢璋字國寳應州人也少以勇力事唐明宗歴突騎奉德指揮使髙祖郎位之二年遙領欽州刺史三年加檢校司空改䕶聖都指揮使七年遷檢校司徒遙領閬州團練使八年授陳州防禦使從少帝澶州還改檢校太保鄭州防禦使充侍衛馬軍都指揮使旋除永清軍兵馬畱後俄正授節制是歲詔領千騎戍冀州尋以杜重威北討詔以漢璋充北面馬軍都排陣使遣收淤口關與契丹騎五千相遇于浮陽之北界苦戰竟日以衆寡不侔為流矢所中殁于陣即是歲十一月也時年四十九漢璋熟于戎馬累有軍功及為藩郡所至好聚斂無善政可紀及鎭甘陵甚有平契丹之志但以所領偏師驟逢勍敵故有是衂焉是月其子海榮進漢璋所乘鞭馬及器仗帝傷之乃贈太尉漢璋有弟漢瑭亦以善用槊有名于時天成中為魏府効節軍使攻定州王都漢瑭督所部一軍首入其城獲王都及蕃將托輝名馬數駟時范延光鎭常山欲其駿者漢瑭不諾後漢瑭屯兵趙郡因事奏而殺之時人寃之白奉進字徳昇雲州清塞軍人也父曰逹子世居朔野以弋獵為事奉進少善騎射後唐武皇鎭太原奉進謁于軍門以求自効武皇納于麾下莊宗之破夾寨也奉進挺身首犯賊鋒莊宗覩而壯之後從戰山東河上繼以功遷龍武指揮使同光中魏王繼岌伐蜀擢為親軍指揮使天成長興中統上軍加檢校右散騎常侍應順中轉捧聖右廂都指揮使檢校刑部尚書賜忠順保義功臣遙領封州刺史清泰中加檢校右僕射唐州刺史治郡踰年甚有政績髙祖郎位徴赴闕超加檢校司徒充䕶聖左廂都指揮使遙領歙州刺史始奉進有女嫁于皇子重信故髙祖尤所倚愛二年改䕶聖左右廂都指揮使是歲車駕幸夷門五月領昭信軍節度充侍衛馬軍都指揮使六月范延光據鄴為亂詔遣率騎軍三千北屯滑臺時符彦饒為滑州節度使一夕有軍士夜掠居人奉進捕之凡獲五盗三在奉進本軍二在彦饒麾下尋命俱斬之彦饒怒其不先告深銜之明日奉進左右勸奉進面謝奉進然之以從騎數人候彦饒于牙城旣入且述其過彦饒曰軍中法令各有部分何得將滑州兵士一例處斬殊無主客之義乎奉進曰軍士抵法寧有彼我今僕以咎自陳而公怒不息莫是與范延光同反耶因拂衣而起彦饒不畱其帳下介士大譟擒奉進殺之是日歩軍都校馬萬次校盧順密聞奉進遇害率其歩衆攻滑之子城執彦饒送于京師戮于班荆館北髙祖以奉進倉卒遇禍歎惜久之詔贈太傅盧順密汶陽人也初事梁將戴思遠為歩校思遠為鄆州節度使領部兵屯德勝渡畱順密守其城順密覩北軍日盛遂遁歸莊宗且言鄆城方虚可以襲而取之莊宗信之尋遣明宗率衆趨鄆果拔之由順密之始謀也莊宗尋以順密列于帳下累遷為軍校明宗即位歴數郡刺史順密性篤厚臨諸軍撫百姓皆有仁愛之譽及髙祖車駕幸夷門范延光據鄴城叛髙祖命諸將相次領軍討之順密亦預其行時騎將白奉進屯于滑州尋為滑帥符彦饒所殺軍衆大亂爭荷戈拔刃噉謼于外時馬萬為歩軍都校不為遏之通鑑云馬萬惶惑不知所為率歩兵欲從亂順密未明其心乃率部曲數百趨謂諸軍及萬曰滑臺去行闕二百里我等家屬在闕下爾輩如此不思血族乎奉進見殺過在彦饒擒送天子必立大功順我者賞之不順我者殺之萬曰善諸軍遂不敢動通鑑云萬所部兵尚有呼躍者順密殺數人衆莫敢動乃引軍北攻牙城執彦饒于樓上使禆將方太押送赴闕滑城遂定朝廷即以馬萬為滑州節度使時飛奏皆以萬為首故也後數日髙祖知功由順密尋以順密為涇州畱後至鎭未幾而卒髙祖甚悼之贈驍衛上將軍周瓌晉陽人也少端厚善書計自髙祖時歴鎭藩翰用為腹心累職至牙門都校凡帑廪出納咸以委瓌經十餘年未嘗以微累見誤髙祖甚重之及即位命權判三司事未幾辭曰臣才輕任重恐終不濟茍以避事冒寵獲罪願陛下哀其疲駑優以散秩臣之幸也髙祖可之尋命權總河陽三城事數月改授安州節度使臨民有惠御軍甚嚴一境安之先是威和指揮使王暉領部下兵屯于安陸瓌至鎭待之甚厚俄聞范延光叛于魏博張延賓宼于汜水暉以瓌髙祖之元臣也幸國朝方危遂害瓌于理所自總州事以為延光勝則附之敗則渡江而遁斯其計也旣而襄陽安從進遣行軍司馬張朏會復州兵于要路以徼之李金全承詔繼至暉遂掠城中財帛士女欲奔江南尋為其下所殺金全至盡誅其黨髙祖聞瓌遇害歎息久之詔贈太傅沈贇字安時徐州下邳人少有膽氣初事梁太祖為小校天祐三年補同州左崇勇馬軍指揮使入典衛兵歴龍驤拱宸都指揮使累有戰功及莊宗平梁隨段凝等降不改其職同光三年從魏王繼岌平蜀屬康延孝叛魏王署贇為一行馬歩都虞候領兵從任圜襲擊延孝于漢州擒之以獻未及䇿勲會明宗登極天成初授檢校司空虢州刺史其後歴壁隨石衛威衍忻趙八州刺史累官至檢校太保賜輸忠宣力功臣開運元年為祁州刺史其年冬契丹入宼自恒州迴以羸兵驅牛羊過其城下贇乃出州兵以擊之契丹以精騎剗其門邀之州兵陷賊趙延夀知其無備與蕃賊急攻之仍呼謂贇曰沈使君我故人也擇禍莫若輕早以城降無自辱也贇登城呼曰侍中父子誤計陷于契丹忍以氊幕之衆殘害父母之邦不自羞慙反有德色沈贇寧為國家死必不效汝所為也翼日城陷贇自剄而卒家屬為賊所擄吳巒字寳川汶陽盧縣人也少好學以經業從鄉試下第唐長興初為沙彦珣從事累遷大同軍節度判官髙祖建號契丹之援太原也彦珣據雲中二三顧望及契丹還塞彦珣出城迎謁尋為所擄時巒在城中謂其衆曰豈有禮義之人而臣于異姓乎即與雲州將吏闔門拒守契丹大怒攻之半歲不能下髙祖致書于契丹乃解圍而去召巒歸闕授徐州節度使再遷右諫議大夫為復州防禦使數年罷歸初國家以甘陵水陸要衝之地慮契丹南侵乃飛輓芻粟以實其郡為大軍累年之備王令温之為帥也有軍校邵珂者性兇率悖慢令温因事使人代之不復齒用閒居城中其子殺人以重賂償之其事方解尋為州吏所恐又悉財以彌其口自是尤蓄怨恨因使無頼者亾入契丹言州有積粟内無勁兵圍而攻之克之必矣及令温入朝執政者以巒雲中之難有善守之功遂令乘軺而徃權知貝州軍州事旣至會大寒軍士無衣者悉衣之平生廉儉囊無資用以至壞帳幕以賙之其推心撫士如此邵珂一見因求自効即聽而任之巒素為書生旁無爪牙珂慷慨自陳願効死左右巒遣督義兵守城之南門天福九年正月契丹大至其一日大譟環其城明日陳攻具于四墉三日契丹主躬率歩奚及激海夷等四面進攻巒衆投薪于夾城中繼以炬火敵之梯衝焚爇殆盡是日敵復合圍郡中丁壯皆登城守陴俄而珂自南門引敵騎同入巒守東門未知其事左右告曰邵珂背矣巒顧城中已亂即馳馬還公館投井而死契丹遂屠其城朝野士庻聞者咸歎惜之翟璋未詳何許人也好勇多力時目為大蟲即癡虎之稱也後唐天福初自鄴都馬歩軍都指揮使領平州刺史尋改復州防禦使三年三月遷新州威塞軍兩使畱後四年五月正授旄節長興元年二月加檢校太保入為右領軍衛上將軍轉左羽林統軍清泰中復領新州髙祖建義割新州屬契丹時契丹大軍歸國遣璋于管内配率犒宴之資須及十萬緡山後地貧民不堪命始戎王以軟語撫璋璋謂必得南歸及委璋平叛奚圍雲州皆有功故畱之不遣璋鬱鬱不得志遇疾不治卒程福贇未詳何許人也性沈厚有勇力累為軍校天福七年冬杜重威討鎭州與安重榮大戰于宋城以功遷洺州團練使檢校太保未幾入為奉國左廂都指揮使九年春少帝將幸澶淵福贇部下有軍士文榮等八人潛謀作亂于本營縱火福贇尋領心腹之士撲滅之福贇亦有所傷福贇性本純厚又以車駕順動祕而不奏同列李殷居福贇下無名欲危福贇以自升遂密陳其事云福贇若不為亂何得無言少帝至封丘出福贇為商州刺史尋下獄鞫之福贇終不自明以至見殺人甚寃之郭璘邢州人也初事後唐明宗漸升為軍校天福中為奉國指揮使歴數郡刺史開運中移領易州契丹攻其郡璘率勵士衆同其甘苦敵不能克復以州兵擊賊數獲其利朝廷嘉之就加檢校太保契丹主嘗謂左右曰吾不畏一天下乃為此人所抑挫重威降契丹使通事耿崇美誘其民衆璘不能制城旣降璘為崇美所害漢髙祖即位詔贈太傅史臣曰觀前代人臣之事跡多矣若乃世道方泰則席寵恃禄者實繁世運旣屯則效死輸忠者無幾如皇甫遇憤激而殁王清以血戰而亾近世以來幾人而已其或臨難捐軀或守方遇害比夫惑妖艷以喪其命因醇醪以亾其身者蓋相去之逺矣唯順密遏滑之肇亂以救晉室之臨危亦可謂之忠矣舊五代史巻九十五
