body:
  text: 舊五代史巻十七攷證梁書列𫝊七成汭𫝊唐宰相徐彦若彦若原本作産若今據新唐書改正田頵𫝊延壽邇揚州一舎行宻使人殺之案九國志行宻迎至寢門使人刺殺之新唐書從九國志是書以為揚州見殺五代史補又以為行宻自奮鐡槌殺之𫝊聞各異雷滿𫝊彦㳟單棹遁去案通鑑攷異引梁太祖實錄云彦恭没溺于江通鑑從紀年録作奔廣陵歐陽史與通鑑同舊五代史巻十七攷證
