body:
  text: 舊五代史巻二十七宋門下侍郎參知政事監修國史薛居正等撰唐書第三莊宗紀一莊宗光聖神閔孝皇帝諱存勗武皇帝之長子也母曰貞簡皇后曹氏以唐光啓元年歲在乙巳冬十月二十二日癸亥生帝于晉陽宫姙時曹后常夢神人黒衣擁扇夾侍左右載誕之辰紫氣出于窓戸及為嬰兒體貎竒特沈厚不羣武皇特所鍾愛及武皇之討王行瑜帝時年十一從行初令入覲獻㨗迎駕還宫昭宗一見駭之曰此兒有竒表因撫其背曰兒將來之國棟也勿忘忠孝于予家因賜鸂䳵酒巵翡翠盤北夢瑣言云昭宗曰此子可亞其父時人號曰亞子賊平授檢校司空隰州刺史改汾晉二郡皆遥領之帝洞曉音律常令歌舞于前十三習春秋手自繕冩畧通大義及壯便射騎膽畧絶人其心豁如也武皇起義雲中部下皆北邊勁兵及破賊迎鑾功居第一由是稍優寵士伍因多不法或陵侮官吏豪奪士民白晝剽攘酒博喧競武皇緩于禁制唯帝不平之因從容啓于武皇武皇依違之及安塞不利之後時事多難梁將氏叔琮康懐英頻犯郊圻土疆日蹙城門之外鞠為戰場武皇憂形于色帝因啟曰夫盛衰有常理禍福有神道家世三代盡忠王室勢窮力屈無所愧心物不極則不反惡不極則不亡今朱氏攻逼乘輿窺伺神器陷害良善誣誑神祗以臣觀之殆其極矣大人當遵飬時晦以待其衰何事輕為沮喪太祖釋然因奉觴作樂而罷及滄州劉守文為梁朝所攻其父仁恭遣使乞師武皇恨其翻覆不時許之帝白曰此吾復振之道也不得以嫌怨介懷且九分天下朱氏今有六七趙魏中山在他廡下賊所憚者唯我與仁恭爾我之興衰繫此一舉不可失也太祖乃徵兵于燕攻取潞州既而丁會果以城來降天祐五年春正月武皇疾篤召監軍張承業大將吳珙謂曰吾常愛此子志氣逺大可付後事唯卿等所教及武皇厭代帝乃嗣王位于晉陽時年二十有四汴人方冦潞州周徳威宿兵于亂柳以軍城易帥竊議忷忷訛言播于行路帝方居喪將吏不得謁見監軍使張承業排闥至廬所言曰夫孝在不墜家業不同匹夫之孝且君父厭世嗣主未立竊慮兇猾不逞之徒有懐覬望又汴㓂壓境利我凶衰苟或揺動則倍張賊勢訛言不息懼有變生請依顧命墨縗聽政保家安親此惟大孝帝于是始聽斷大事時振武節度使克寧卽帝之季父也為管内蕃漢馬歩都知兵馬使典握兵柄帝以軍府事讓季父曰兒年幼稚未通庶政雖承遺命恐未能彈壓季父勲德俱高衆情推伏且請制置軍府俟兒有立聽季父處分克寧曰亡兄遺命屬在我兒孰敢異議因率先拜賀初武皇奬勵戎功多畜庶孽衣服禮秩如嫡者六七輩比之嗣王年齒又長部下各綰強兵朝夕聚議欲謀為亂及帝紹統或强項不拜鬱欎憤惋託疾廢事㑹李存顥以隂計干克寧曰兄亡弟立古今舊事季父拜姪理所未安克寧妻素剛狠因激怒克寧隂圖禍亂存顥欲于克寧之第謀害張承業李存璋等以并汾九州歸附于梁送貞簡太后為質克寧意將激發乃擅殺大將李存質請授巳雲州節度使割蔚朔應三州為屬郡帝悉俞允然知其隂禍有日矣克寧俟帝過其第則圖竊發時幸臣史敬鎔者亦為克寧所誘盡得其情乃來告帝帝謂張承業曰季父所為如此無猶子之情骨肉不可自相魚肉予當避路則禍亂不作矣承業曰臣受命先王言猶在耳存顥輩欲以太原降賊王欲何路求生不即誅除亡無日矣因召吳珙李存璋李存敬朱守殷諭共謀衆咸憤怒二月壬戌命存璋伏甲以誅克寧遂靖其難是月唐少帝崩于曹州梁祖使人酖之也帝聞之舉哀號慟三月周徳威尚在亂栁梁將李思安屢為徳威所敗閉壁不出是時梁祖自將兵至澤州以劉知俊為招討使以代思安以范君實劉重霸為先鋒牛存節為撫遏統大軍營于長子四月帝召徳威軍歸晉陽汴人既見班師知我國禍以為潞州必取援軍無俟再舉遂停斥候梁祖亦自澤州歸洛帝知其無備乃謂諸將曰汴人聞我有喪必謂不能興師又以我少年嗣位未習戎事必有驕怠之心若簡練兵甲倍道兼行岀其不意以吾憤激之衆擊彼驕惰之師拉朽摧枯未云其易解圍定霸在此一役甲子軍發自太原已巳至潞州北黃碾下營五月辛未朔晨霧晦暝帝率親軍伏三垂崗下詰旦天復昏霧進軍直抵夾城時李嗣源總帳下親軍攻東北隅李存璋王霸率丁夫燒寨斸夾城為二道周德威李存審各分道進攻軍士皷譟三道齊進李嗣源壞夾城東北隅率先掩擊梁軍大恐南向而奔投戈委甲噎塞行路斬萬餘級獲其將副招討使符道昭洎大將三百人芻粟百萬梁招討使康懷英得百餘騎岀天井關而遁梁祖聞其敗也既懼而歎曰生子當如是李氏不亡矣吾家諸子乃豚犬爾初唐龍紀元年帝纔五歲從武皇校獵于三垂峝崗上有𤣥宗原廟在焉武皇于祠前置酒樂作伶人奏百年歌者陳其衰老之狀聲調悽苦武皇引滿捋鬚指帝曰老夫壯心未巳二十年後此子必戰于此及是役也果符其言焉是月周徳威乘勝攻澤州刺史王班登城拒守梁將劉知俊自晉綘將兵赴援徳威退保髙平帝遂班師于晉陽告廟飲至賞勞有差乃下令于國中禁盜賊恤孤寡徴隐逸止貪暴峻隄防寛獄訟期月之間其俗丕變帝每出于路遇饑寒者必駐馬而臨問之由是人情大悦王霸之業自茲而基矣六月鳯翔李茂貞邠州楊崇本合西川王建之師五萬以攻長安遣使㑹兵于帝帝遣張承業率師赴之九月邠岐蜀三鎮復大舉攻長安遣李嗣昭周徳威將兵三萬攻晉州以應之徳威與梁將尹皓戰于神山北梁人大敗是時晉之騎將夏侯敬受以一軍奔于梁徳威乃退保隰州天祐六年秋七月邠岐二帥及梁之叛將劉知俊俱遣使來告將大舉以伐靈夏兼收闗輔請出兵晉綘以張兵勢八月帝御軍南征先遣周徳威李存審丁㑹統大軍出隂地闗攻晉州為地道壊城二十餘步城中血戰拒守梁祖遣楊師厚領兵赴援徳威乃收軍而退通鑑引莊宗實録云汴軍至䝉阬周徳威逆戰敗之斬首三百級師厚退保絳州是役也小將蕭萬通戰殁師厚進營平陽徳威收軍而退天祐七年秋七月鳯翔李茂貞邠州楊崇本皆遣使來㑹兵同討靈夏且言劉知俊三敗汴軍于寧州靈夏危蹙岐隴之師大舉決取河西帝令周徳威將兵萬人西渡河以應之是役也劉知俊為岐人所搆乃自退九月徳威班師冬十月梁祖遣大將李思安楊師厚率師營于澤州以攻上黨十一月鎮州王鎔遣使來求援是時梁祖以羅紹威初卒全有魏博之地因欲求兼并鎮定遣供奉官杜廷隐丁延徽督魏軍三千人入于深冀鎮人懼故來告難帝集軍吏議之咸欲按甲治兵徐觀勝負唯帝獨斷堅欲救之乃遣周徳威率軍屯于趙州是月行營都招討使丁㑹卒十二月丁已朔梁祖聞帝軍屯趙州命寧國軍節度使王景仁為北面行營招討使韓勍為副相州刺史李思安為前鋒㑹魏州之兵以討王鎔又令閻寳王彦章率二千騎㑹景仁于邢洺丁丑景仁營于栢鄉帝遂親征自贊皇縣東下辛巳至趙州與周徳威兵合帝令史建瑭以輕騎嘗冦獲芻牧者二百人問其兵數精兵七萬是日帝觀兵于石橋南詰旦進軍距栢鄉一舎周徳威史建瑭率蕃落勁騎以挑戰四面馳射梁軍閉壁不出乃退翼日進軍距栢鄉五里遣騎軍逼其營梁將韓勍李思安率步騎三萬鎧甲炫曜其勢甚盛分道以薄帝軍徳威且戰且退距河而止既而徳威偵知梁人造浮橋乃退保髙邑乙酉致師于栢鄉帝禱戰于光武廟栢鄉無芻粟之地梁軍以樵采為給為帝之游軍所獲由是堅壁不出剉屋茅坐席以秣其馬衆心益恐天祐八年正月丁亥周徳威史建瑭帥三千騎致師于栢鄉設伏于村塢間遣三百騎直壓其營梁將怒悉其軍結陣而來徳威與之轉戰至髙邑南梁軍列陣横亘六七里時帝軍未成列李存璋引諸軍陣于野河之上梁軍以五百人争橋鎮定之師與血戰梁軍敗而復整者數四帝與張承業登髙觀望梁人戈矛如束申令之後嚻聲若雷王師進退有序步騎嚴整寂然無聲帝臨陣誓衆人百其勇短兵既接無不奮力梁有龍驤神威拱宸等軍皆武勇之士也每一人鎧仗費數十萬装以組繡飾以金銀人望而畏之自已及午騎軍接戰至脯梁軍欲抽退塵埃漲天徳威周麾而呼曰汴人走矣帝軍齊譟以進魏人收軍漸退李嗣源率親軍與史建瑭安金全兼北部吐渾諸軍衝突夾攻梁軍大敗棄鎧投仗之聲震動天地龍驤神威神㨗諸軍殺戮殆盡自陣至栢鄉數十里殭屍枕籍敗旗折㦸所在蔽地夜漏一鼓帝軍入栢鄉梁軍輜重帳幄資財奴僕皆為帝軍所有梁將王景仁韓勍李思安等以數十騎夜遁是役也斬首二萬級獲馬三千匹鎧甲兵仗七萬輜車鍋幕不可勝計擒梁將陳思權以下二百八十五人帝號令收軍于趙州既而梁人棄深冀二州而遁初杜廷隐之襲深冀也聲言分兵就食時王鎔將石公立戌深州欲杜闗不納鎔遽令啓闗命公立移軍于外廷隐遂據其城公立既出指城闉而言曰開門納盜後悔何追此城數萬生靈生為俘馘矣因投刃泣下數日廷隐閉城殺鎮兵數千人遂登陴拒守王鎔方命公立攻之即有備矣及栢鄉之敗兩州之人悉為奴擄老弱者皆坑之已亥遣史建瑭周徳威徇地于邢魏先馳檄以諭之冊府元龜載晉王諭邢洺魏博衛滑諸郡縣檄天祐八年正月周徳威等破賊狥地邢洺先馳檄諭邢洺魏博衛滑諸郡縣曰王室遇屯七廟被陵夷之酷昊天不弔萬民罹塗炭之灾必有英主奮庸忠臣仗順斬長鯨而清四海靖祅祲以泰三靈予位沗維城任當分閫念茲顛覆詎可宴安故仗威文輔合之規問羿浞凶狂之罪逆温碭山庸𨽻巢孽餘凶當僖宗奔播之初我太祖掃平之際束身泥首請命牙門苞藏姦詐之心惟示婦人之態我太祖􅀈憐窮鳥曲為開懐特發表章請帥梁汴纔出萑蒲之澤便居茅社之尊殊不感恩遽行猜忌我國家祚隆周漢迹盛伊唐二十聖之鎡基三百年之文物外則五侯九伯内則百辟千官或代襲簮纓或門𫝊忠孝皆遭陷害永抱沉寃且鎮定兩藩國家巨鎮冀安民而保族咸屈節以稱藩逆温唯伏隂謀専行不利欲全吞噬先據屬州趙州特發使車來求援助予情惟盪冦義切親仁躬率賦輿赴兹盟約賊將王景仁將兵十萬屯據栢鄉遂驅三鎮之師授以七擒之畧鸛鵝纔列梟獍大奔易如走坂之九勢若燎原之火僵尸仆地流血成川組甲雕戈皆投草莽謀夫猛將盡作俘囚羣凶既快于天誅大憝須垂于鬼錄今則選蒐兵甲簡練車徒乗勝長驅翦除元惡凡爾魏博邢洺之衆感㤙懐義之人乃祖乃孫為聖唐赤子豈狥虎狼之黨遂忘覆載之㤙盖以封豕長蛇凴陵薦食無方逃難遂被脅從空嘗膽以銜冤竟無門而雪憤既聞告㨗想所慰懐今義旅徂征止于招撫昔耿純焚廬而向順蕭何舉族以從軍皆審料興亡能圖富貴殊勲茂業翼子貽孫轉褐見幾決在今日若能詣轅門而效順開城堡以迎降長官則改補官資百姓則優加賞賜所經詿誤更不推窮三鎮諸軍已申嚴令不得焚燒廬舍剽剠馬牛但仰所在生靈各安耕織予恭行天罰罪止元凶已外歸明一切不問几爾士衆咸諒予懐帝御親軍南征庚子至洺州梁祖令其將徐仁浦將兵五百夜入邢州張承業李存璋以三鎮步兵攻邢州遣周徳威史建瑭將三千騎長驅至澶魏帝與李嗣源率親軍繼進二月戊午師次洹水周徳威進至臨河已未魏帥羅周翰出兵五千塞石灰窰口周徳威以騎掩擊迫入觀音門是日王師迫魏州帝舍于狄公祠西周翰閉壁自固帝軍攻之其城㡬陷帝歎曰予為兒童時從先王渡河今其忘矣方春桃花水滿思一觀之誰從予者癸亥帝觀河于黎陽是時梁祖發兵萬餘將渡河聞王師至棄舟而退黎陽都將張從楚曹儒以部下兵三千人來降立其軍為左右匡霸使乙丑周徳威自臨清狥地貝郡攻博州下東武朝城時澶州刺史張可臻棄城而遁遂攻黎陽下臨河淇門庚午梁祖在洛聞王師將攻河陽率親軍屯白馬坡壬申帝下令班師帝至趙州王鎔迎謁翼日大饗諸軍壬午帝發趙州歸晉陽留周徳威戌趙州三月巳丑鎮定州各遣使言幽州劉守光凶僭之狀請推為尚父以稔其惡乙未帝至晉陽宫召監軍張承業諸將等議幽州之事乃遣牙將戴漢超齎墨制并六鎮書推劉守光為尚書令尚父守光由是凶熾日甚遂邀六鎮奉册五月六鎮使至幽州梁使亦集通鑑攷異引莊宗實錄云三月巳丑鎮州遣押衙劉光業至言劉守光凶淫縱毒欲自尊大請稔其惡以咎之推為尚父乙未上至晉陽宫召張承業諸將等議討燕之謀諸將亦云宜稔其惡上令押衙戴漢超持墨制及六鎮書如幽州其辭曰天祐八年三月二十七日天徳軍節度使宋瑶振武節度使周徳威昭義節度使李嗣昭易定節度使王䖏直鎮州節度使王鎔河東節度使尚書令晉王謹奉冊進盧龍横海等軍節度檢校太尉中書令燕王為尚書令尚父五月六鎮使至汴使亦集六月守光令有司定尚父採訪使議是月梁祖遣都招討使楊師厚將兵三萬屯邢州帝令李嗣昭岀師掠相衛而還秋七月帝㑹王鎔于承天軍鎔武皇之友也帝奉之盡敬捧巵酒為夀鎔亦捧酒醻帝鎔幼子昭誨從行因許為婚八月甲子幽州劉守光僭稱大燕皇帝年號應天九月庚子梁祖將親軍自洛渡河而北至相州聞帝軍未出乃止十月幽州劉守光殺帝之行人李承勲忿其不行朝禮也十一月辛丑燕人侵易定王䖏直來告難十二月甲子帝遣周徳威劉光濬李嗣源及諸將率蕃漢之兵發晋陽伐劉守光于幽州舊五代史巻二十七
