body:
  text: 舊五代史巻一百二宋門下侍郎參知政事監修國史薛居正等撰漢書第四隱帝紀中乾祐二年春正月乙巳朔制曰朕以𣺌躬獲纘洪緒念守噐承祧之重懐臨深履薄之憂屬以𤣥道猶艱王室多故天降重戾國有大喪奸臣樂禍以圖危羣㓂幸灾而伺隟力役未息兵革方殷朕所以嘗膽履氷廢飱輟寐雖居億兆之上不以九五為尊漸兾承平永安遐邇内則禀太后之慈訓外則仗多士之忠勲股肱叶謀爪牙宣力西摧三叛撫其背而扼其喉北挫諸蕃斷其臂而折其脊次則巴卭嘯聚淮海猖狂􅂊聞矢接􅄡交已見山摧岸沮㓂難少息師徒無虧兼以修奉園陵崇建宗廟右賢左戚同寅協恭多事之中大禮無闕負荷斯重哀感良深今以三陽布和四序更始宜申兌澤允答天休䘏獄緩刑赦過宥罪當萬物之莩甲開三面之網羅順彼𤼵生以召和氣應乾祐二年正月一日昧爽已前天下見禁罪人除十惡五逆官典犯賍合造毒藥刼家殺人正身外其餘並放河府李守貞鳯翔王景崇永興趙思綰等比與國家素無讎釁偶因疑懼遂至叛違然以彼之生靈朕之赤子久䧟孤壘可念非辜易子析骸填溝委壑為人父母寜不軫傷但以屈已愛人先王厚徳包垢含辱列聖美談宜推濟物之恩用廣好生之道其李守貞等宜令逐處都部署分明曉諭若能翻然歸順朕即待之如初當保始終享其富貴明申信誓固無改移其或不順推誠堅欲拒命便可應時攻擊尅日盪平候收復城池罪止元惡其餘註誤一切不問重念征討已來勞役滋甚兵猶在野民未息肩急賦繁徴財殫力匱矜䘏之澤未被于疲羸愁嘆之聲幾盈于道路即俟邊􅄡少弭國患漸除當議優饒兾獲蘇息諸道蕃侯郡守等咸分寄任共體憂勞更宜念彼瘡痍倍加勤䘏䆒鄉閭之疾苦去州縣之煩苛勸課耕桑省察􅁈濫共恢庻政用副憂勞凡百臣寮當體朕意壬子賜前昭義軍節度使張從恩衣一襲金帶鞍馬綵帛等時有投無名文字誣告從恩者故特有是賜以安其心乙夘河府軍前奏今月四日夜賊軍偷研河西寨捕斬七百餘級時蜀軍自大散闗來援王景崇郭威自將兵赴岐下將行戒白文珂劉詞等曰賊之驍勇並在城西慎為儆備既行至華州聞川軍退敗且憂文珂等為賊奔突遂兼程而㢠廻賊城内偵知郭威西行于正月四日夜遣賊將王三鐡等宋史王繼勲傳繼勲有武勇在軍陣常用鐡鞭鐡槊鐡撾軍中目為王三鐡率驍勇千餘人㳂流南行坎岸而登為三道來攻賊軍已入王師砦中劉詞極力拒之短兵既接遂敗之二月丙子詔諸道州府所征乾祐元年夏秋苗畝上紐征白米稈草已納外並放是日旦黒霧四塞丁丑夕大風乙酉以前房州刺史李筠夫為鴻臚卿戊子前右監門將軍喬逹及其兄契丹偽命客省使榮等皆棄市逹李守貞之妹婿也故皆誅之庚寅徐州廵檢使成徳欽奏至峒峿鎮遇淮賊破之殺五百人生擒一百二十人戊戌大雨霖庚子詔左諫議大夫賈緯等修撰髙祖實録三月丙辰以北京衙内指揮使劉鈞為汾州防禦使夏四月丙子以荆南節度行軍司馬武㤗軍節度留後王保義為檢校太尉領武㤗軍節度使行軍如故丁丑潁州獻紫􅇠白􅇠是月幽定滄貝深冀等州地震辛已太白經天辛丑幸道宫禱雨五月甲辰朔故湖南節度使檢校太尉兼中書令扶風郡公贈太師馬希聲追封衡陽王戊申以前邠州節度使安審約為左神武統軍以前洛京副留守袁㠖為右神武統軍乙卯河府軍前奏今月九日河中節度副使周光遜棄賊河西寨與將士一千一百三十人來奔已未右監門大將軍許遷上言奉使至博州博平縣界覩蝝生彌亘數里一夕並化為蝶飛去辛酉兖鄆齊三州奏蝝生乙丑永興趙思綰遣牙將劉成詣闕乞降制授趙思綰華州節度留後檢校太保以永興城内都指揮使常彦卿為虢州刺史丁卯宋州奏蝗抱草而死已已湖南奏蠻㓂賀州遣大將軍徐進率兵援之戰于風陽山下大敗蠻獠斬首五千級六月癸酉朔日有食之兖州奏捕蝗二萬斛魏博宿三州蝗抱草而死乙亥潁州獻白鹿戊寅安州節度使楊信奏亡父光遠蒙賜神道碑鐫勒畢無故中斷詔别令斷石鐫勒已卯滑濮澶曹兖淄青齊宿懐相衛博陳等州奏蝗分命中使致祭于所在川澤山林之神開封府滑曹等州蝗甚遣使捕之宋史段思恭傳隱帝蝗詔偏祈山川思恭上言赦過宥罪議獄緩刑茍獄訟平允則災害不生望令諸州速決重刑無致淹濫必召和平從之壬午月犯心星辛卯㢠廻鶻遣使貢方物丙申改商州乾元縣為乾祐縣𨽻京兆府是月邠寧澤潞涇延鄜坊晉絳等州旱秋七月辛亥湖南奏析長沙縣東界為龍喜縣從之丙辰樞密使郭威奏收復河府羅城李守貞退保子城丁已永興都部署郭從義奏新除華州留後趙思綰自今月三日授華州留後凖詔赴任三移行期仍要鎧甲以給牙兵及與之竟不遵路至九日夕有部曲曹彦進告思綰欲于十一日夜與同惡五百人奔南山入蜀是日詰旦再促上路云俟夜進途臣尋與王峻入城分兵守四門其趙思綰部下軍各已執帶遂至牙署令趙思綰至則執之與一行徒黨並處置訖甲子樞密使郭威奏收復河中府逆賊李守貞自燔而死丙寅以權凉州留後折逋嘉施為河西軍節度留後兖州奏捕蝗二萬斛丁卯前洺州團練使武漢球卒戊辰永興軍節度使兼兵馬都部署郭從義加同平章事徙華州節度使郭從義奏處斬前廵檢使喬守溫供奉官王益時知化任繼勲等守溫受髙祖命廵檢京兆㑹王益自鳯翔押送趙思綰等赴闕行京兆守溫迎益于郊外思綰等突然作亂遂據其城及郭從義率兵攻討令守溫部署役夫守温有愛姫陷在賊城為思綰所錄及收城從義盡得思綰之婢僕守温求其愛姫從義雖與之意有所慊遂𤼵前罪密啓于郭威請除之與王益等併誅焉兖州奏捕蝗四萬斛壬午西京留臺侍御史趙礪彈奏太子太保王延太子洗馬張季凝等自去年五月後來毎稱請假俱是不任拜起詔延等宜以本官致仕甲申以陜州節度使充河中一行兵馬都部署白文珂為西京㽜守加兼侍中潞州節度充河中一行副都署常思加檢校以太師以右散騎常侍盧撰為戸部侍即致仕辛卯右拾遺髙守瓊上言仕官年未三十請不除授縣令詔起今後諸色選人年及七十者宜注優散官年少未厯資考者不得注擬縣令癸已以翰林學士工部尚書張沆為禮部尚書沆卜塟先人以内署無例乞假乃上章請解職以赴塟事遂落職以遣之乙未宣徽南院使永興行營兵馬都監王峻宣徽北院使河府行營兵馬都監吳䖍裕並加檢校太傅九月乙巳樞密使郭威檢校太師兼侍中宋州節度使兼侍衛親軍都指揮使史𢎞肇加兼中書令初郭威平河中迴朝廷議加恩威奏曰臣出兵已來輦轂之下無犬吠之憂俾臣得專一其事軍旅所聚貲糧不乏此皆居中大臣鎮撫謀畫之功也臣安敢獨擅其美乎帝然之于是𢎞肇與宰相樞宻使三司使次第加恩既而諸大臣以恩之所被皆朝廷親近之臣而宗室劉信及青州劉銖等皆國家元勲必有不平之意且外慮諸侯以朝廷有私于親近也于是議及四方侯伯普加恩焉丙午西京留守判官時彦澄推官姜蟾少尹崔淑並免居官坐不隨府罷職為留臺侍御史趙礪所彈也已酉以右千牛上將軍孫漢贇為絳州刺史禮部尚書判吏部尚書銓事王松停見任坐子仁寳為李守貞從事也尋卒于其第辛亥宰臣竇貞固加守司徒蘇逢吉加守司空蘇禹珪加左僕射楊邠加右僕射依前兼樞密使太子太師致仕皇甫立卒癸丑三司使王章加邑封乙卯鄴都髙行周加守太師襄州安審琦加守太傅兖州府符彦卿加守太保北京劉崇加兼中書令丁已澶州李洪信移鎮陜州以侍衛馬軍都指揮使遂州節度使李洪義為澶州節度使已未許州劉信加兼侍中開封尹侯益進封魯國公鄆州慕容彦超青州劉銖並加兼侍中湖南馬希廣奏于八月十八日大破朗州馬希蕚之衆辛酉靈州馮暉夏州李彞殷並加兼中書令右衛將軍石懿左武衛將軍石訓並停任懿等以八月中秋享晉五廟命倡婦宿于齋宫鴻臚寺劾之故有是責癸亥鎮州武行徳鳯翔趙暉並加檢校太師鄴都磁相邢洺等州奏霖雨害稼西京奏洛水溢岸乙丑晉州王晏同州張彦贇邠州侯章涇州史懿滄州王景延州髙允權並加檢校太師冬十月庚午朔契丹入㓂是日定州孫方簡徐州劉贇並加同平章事以利州節度使宋延渥為滑州節度使甲戌皇弟興元節度使勲加檢校太師丙子相州郭謹貝州王繼𢎞邢州薛懐讓並加檢校太尉庚辰安州楊信鄧州劉重進加檢校太師河陽李暉加檢校太傅壬午兩浙錢𢎞俶加守尚書令湖南馬希廣加守太尉癸未監修國史蘇逢吉史官賈緯以所撰髙祖實錄二十巻上之丙戌荆南髙保融加檢校太師兼侍中以殿前都部署江州防禦使李建為遂州節度使充侍衛馬軍都指揮使以奉國左廂都指揮使永州防禦使王殷為䕫州節度使充侍衛歩軍都指揮使契丹陷貝州髙老鎮南至鄴都北境又西北至南宫堂陽殺掠吏民數州之地大被其苦藩郡守將閉關自固遣樞宻使郭威率師廵邊仍令宣徽使王峻參預軍事庚寅府州折從阮進封岐國公豐州郭勲進封虢國公十一月壬寅鄜州留後王饒加檢校太傅癸丑以吳越國王錢𢎞俶母吳氏為順徳太夫人時議者曰封贈之制婦人有國邑之號死乃有諡后妃公主亦然唐則天女主自我作古乃生有則天之號韋庻人有順聖之號知禮者非之近代梁氏賜張宗奭妻號曰賢懿又改為莊惠今以吳氏為順徳皆非古之道也乙卯以大府卿劉皥為宗正卿十二月庚午朔湖南奏静江軍節度使馬希贍以今年十月十八日卒廢朝二日辛未日暈三重戊寅司徒門下侍郎平章事竇貞固奏請修晉朝實録詔史官賈緯竇儼王伸等修撰以禮部尚書張沆復為翰林學士壬午皇帝二十一姊永寧公主進封秦國長公主頴州奏破淮賊于正陽舊五代史卷一百二
