body:
  text: 舊五代史巻一百三十五宋門下侍郎參知政事監修國史薛居正等撰僭偽列傳第二劉守光深州樂夀人也其父仁恭初隋父晟客于范陽晟以軍吏補新興鎮將事莭度使李可舉仁恭幼多智機數陳力於軍中李全忠之攻易定也别將于晏圍易州累月不能拔仁恭穴地道以陷之軍中號日劉窟頭稍遷禆校仁恭志大氣豪自言嘗夢大佛幡出於指端或云年四十九當領旄節此言頗泄燕帥李匡威惡之不欲令典軍改為府掾出為景城令屬瀛州兵亂殺郡守仁恭募白丁千人討平之匡威壯其才復使為帳中爪牙令將兵戍蔚州兵士以過期不代思歸流怨㑹李匡儔奪兄位戍軍擁仁恭為帥欲攻幽州比至居庸闗為府兵所敗仁恭挈族奔于太原武皇遇之甚厚賜田宅以處之出為壽陽鎮將從征吐渾仁恭數進畫於盖寓言幽州可圖之狀願得步騎萬人即指期可取武皇從之泊仁恭舉兵屢不克捷唐乾寧元年十一月武皇親征匡儔十二月破燕軍於威塞進拔媯州收居庸二十六日匡儔弃城而遁武皇令李存審與仁恭入城撫勞封府庫即以仁恭為幽州節度使留腹心燕留得等十餘人分典軍政武皇乃還二年七月武皇討王行瑜師於渭北上章請授仁恭節鉞九月天子以仁恭為檢校司空幽州盧龍軍節度使三年羅𢎞信背盟武皇遣李存信攻魏州徴兵於燕仁恭託以契丹入冦俟敵退聼命四年七月武皇聞兖鄆俱陷復徴兵於仁恭數月之間使車結轍仁恭辭㫖不遜武皇以書譲之仁恭覽書嫚罵拘其使人晉之戍兵在燕者皆拘之復以厚利誘晉之驍將由是亡命者衆矣八月武皇討仁恭九月五日次安塞軍九日渡木瓜澗大為燕軍所敗死傷大半既而仁恭告捷於梁祖梁祖聞之喜因表仁恭加平章事仁恭又遣使於武皇自陳邊將擅興之罪武皇以書報之仁恭既絶於晉恒懼討罸募兵練衆常無虛月光化元年三月令其長子襲滄州盧彦威委城而遁遂兼有滄景德三郡以守文為畱後請節鉞於朝昭宗怒其擅興不時與之㑹中使至范陽仁恭私之曰旄節吾自有但要長安本色耳何以累章見阻為吾言之其悖戾如此仁恭兵鋒益盛每戰多捷以為天贊遂有吞噬河朔之志二年正月仁恭率幽滄步騎十萬號三十萬將兼併魏博鎮定師次貝州一皷而拔無少長皆屠之清水為之不流羅紹威求援於汴汴將李思安葛從周赴之思安屯内黄仁恭兵圍魏州聞汴軍在内黄戒其子守文曰李思安怯懦汝之智勇比之十倍當先殄此鼠軰次擄紹威守文與單可及率漁陽精甲五萬夾清水而上思安設伏於内黄清水之左袁象先設伏於清水之右思安逆戰於繁陽城偽不勝徐退燕人追躡至於内黄思安步兵成列迥繫之燕人將引退左右伏兵發燕兵大敗臨陣斬單可及守文單騎僅免五萬之衆無生還者時葛從周率邢洺之衆入魏州與賀德倫李暉出繫賊營是夜仁恭燒營遁走汴人長驅追繫自魏至長河數百里殭屍蔽地敗旗折㦸纍纍於路鎮人又邀擊於東境燕軍復敗仁恭自是埀翅不振者累年汴人乘勝攻滄州仁恭率師援之營於乾寧軍汴將氏叔琮逆戰燕軍逗撓退保瓦橋乃卑辭厚禮乞師於晉武皇遣兵逼邢洺以應之十月汴人陷瀛鄚二州晉將周德威將兵出飛狐仁恭復脩好於晉天祐三年七月梁祖自將兵攻滄州營於長蘆仁恭師徒屢喪乃酷法盡發部内男子十五已上七十已下各自備兵粮以從軍閭里為之一空部内男子無貴賤並黥其面文曰定霸都士人黥其臂文曰一心事主繇是燕薊人士例多黥湼或伏竄而免仁恭閲衆得二十萬進至瓦橋汴人深溝髙壘以攻滄州内外阻絶仁恭不能合戰城中大饑人相簒啖析骸而㸑丸土而食轉死骨立者十之六七自七月至十月仁恭遣使求援於晉前後百餘軰武皇乃徴兵於燕仁恭遣都將李溥夏侯景監軍張居翰書記馬郁等以兵三萬來㑹十二月合晉師以攻洛州降丁㑹乃解滄州之圍是時天子播遷中原多故仁恭嘯傲薊門志意盈滿師道士王若訥祈長生羽化之道幽州西有名山曰大安山仁恭乃於其上盛飾舘宇僭擬宫掖聚室女艶婦窮極侈麗又招聚緇黄合仙丹講求法要又以瑾泥作錢令部内行使盡斂銅錢於大安山嶺鑿穴以藏之藏畢即殺匠石以滅其口又禁江表茶商自擷山中草葉為茶以邀厚利改山名為大恩山仁恭冇嬖妾曰羅氏美姿色其子守光烝之事洩仁恭怒笞守光謫而不齒四年四月汴將李思安以急兵攻幽州營扵石子河仁茶在大安山城中無備守光自外帥兵來援登城拒守汴軍既退守光乃自為幽州節度令其部將李小喜元行欽將兵攻大安山仁恭遣兵拒戰為小喜所敗乃擄仁恭歸幽州囚於别室仁恭左右迨至婢媵與守光不協者卑誅之其兄守文在滄州聞父被囚聚兵大哭諭之曰哀哀父母生我劬勞自古豈有讎父者吾家生此梟獍吾生不如死即率滄德之師討之守光逆戰於鷄蘇為守文所敗既而守文詐悲單馬立於陣場泣諭於衆曰勿殺吾弟時守光驍將元行欽識之被擒滄兵失帥自潰守光乃縶兄於别室援以叢棘乘勝進攻滄州滄州賓佐孫鶴吕兖已推守文子延祚為帥守光攜守文於城下攻圍累月城中乏食米斗直三萬人首一級亦直十千軍士食人百姓食墐土驢馬相遇食其鬃尾士人出入多為强者屠殺久之延祚力窮以城降於守光守文尋亦遇害守光性本庸昧以父兄失勢謂天所助淫虐滋甚每刑人必以鐡籠盛之薪火四逼又為鐡刷劀剔人面嘗衣赭黄袍顧謂將吏曰當今海内四分五裂吾欲南面以朝天下諸君以為何如賓佐有孫鶴者骨鯁方畧之士也率先對曰王西有并汾之患北有契丹之虞乘時觀釁專待薄人彼若結黨連衡侵我疆塲地形雖險勢不可支甲兵雖多守恐不暇縱能却敵未免生憂王但捬士愛民補兵完賦義聲馳於天下諸候自然推戴今若恃兵與險未見良圖守光不悦及梁軍據深冀王鎔乞師於守光孫鶴勸守光出援軍以圖霸業守光不從及莊宗有栢鄉之捷守光謀攻易定諷動鎮人欲為河朔元帥莊宗乃興鎮州節度使王容易定節度使王處直昭義節度使李嗣昭振武節度使周徳威天德軍節度使宋瑤同遣使奉册推守光為尚父以稔其惡守光不悟謂藩鎮畏已仍以諸鎮狀送梁祖言臣被晉王等推臣為尚父堅辭不獲又難推違臣竊料所宜不如陛下與臣河北道都統則并鎮之叛不足平殄矣梁祖知其詐優答之仍命閤門使王曈供奉官史彦璋等使于燕册守光為河北道採訪使六月梁使至守光令所司定尚父採訪使儀注所司取唐朝册太尉禮以示之守光曰此儀注中何無郊天改元之事梁使曰尚父雖尊猶是人臣守光怒投於地謂將吏曰方今天下鼎沸英雄角逐朱公創號於夷門楊渭假名於淮海王建自尊於巴蜀荗貞矯制於岐陽皆因茅土之封自假帝王之制然兵虛力寡疆塲多虞我大燕地方二千里帶甲三十萬東有魚鹽之饒北有塞馬之利我南面稱帝誰如我何今為尚父孰當帝者公等促具帝者之儀予且為河朔天子燕之將吏竊議以為不可守光置斧鑕於庭令將佐曰今三方協贊予難重違擇日而帝矣從我者賞横議者誅孫鶴對曰滄州破敗僕乃罪人大王寛容乃至今日不敢阿㫖以悞家國茍聽臣言死且無悔守光大怒推之伏鑕令軍士割其肉生噉之鶴大呼曰百日之外必有急兵矣守光命窒其口寸斬之有識為之嗟惋乃悉召部内官吏教習朝儀邊人既非素習舉措失容相顧誚笑八月十三日守光僭號大燕皇帝改年曰應天以梁使王曈判官齊涉為宰相史彦璋為御史大夫偽册之日契丹陷平州莊宗聞之大笑監軍張承業曰惡不積不足以滅身老氏所謂將欲取之必先與之今守光狂蹶請遣使省問以觀其釁十月莊宗令太原少尹李承勲徃使承勲至守光怒不稱臣械之於獄十二月莊宗遣周徳威出飛狐㑹鎮定之師以討之德威攻圍厯年屬郡皆下守光堅保幽州求援於梁北誘契丹救終不至十年十月守光遣使持幣馬見徳威乞降又乘城呼曰予俟晉王至即出城十一月莊宗親征二十三日至幽州單騎臨城召守光曰丈夫成敗須決所向公將何如守光曰某俎上肉耳莊宗愍之折弓為盟許其保全守光辭以佗日莊宗乃令諸軍攻之二十四日四面畢攻莊宗登燕太子墓觀之俄而數騎執仁恭并其孥來獻檀州逰奕將李彦暉於燕樂縣獲守光并妻李氏男繼珣繼方繼祚等來獻初守光城破後携其妻子將走關南依劉守竒㳂路寒瘡足踵經日不食至燕樂縣匿於坑谷令妻祝氏乞食於田父張師造家恠婦人異狀詰之遂俱擒焉莊宗方晏府第引仁恭守光至席父子號泣謝罪莊宗慰撫之曰徃事不復言人誰無過改之為貴乃歸之傅舍是月已邜晉人執守光及仁恭露布表其罪驅以班師十一年正月至晉陽仁恭父子荷校於露布之下父母唾面罵守光曰逆賊破家如是守光俯首不顧自范陽至晉陽涉千餘里所在聚觀呼守光為劉黒子略無媿色莊宗以仁恭守光徇於都城即告南宫七廟禮畢守光與李小喜鄭藏斐劉延卿及其二妻㫮伏誅李小喜者本晉之小校先奔於燕守光以為愛將守光雖㓙淫出於天性然而稔惡侈毒抑亦小喜贊成守光將敗前一日來降守光將死大呼曰臣之悞計小喜熒惑故也若罪人不死臣必訢於地下莊宗急召小喜至令證辯小喜瞑目叱守光曰囚父殺兄烝淫骨肉亦我教耶莊宗怒小喜失禮先斬之守光慟哭曰王將定天下臣請於騎何不且留指使二妻讓之曰皇帝事勢及此生不如死即延頸就戮守光猶哀訢不已既誅命判官司馬揆備轊櫝祭醊瘞於城西三里龍山下令副使盧汝弼李存霸拘送仁恭至代州於武皇陵前刺心血以祭誅於鴈門山下自仁恭乾寧二年春入幽州至天祐十年父子相承十九年而滅劉陟即劉龑初名陟其先彭城人祖仁安仕唐為潮州長史因家嶺表父謙素有才識唐咸通中宰相韋宙出鎮南海謙時為牙校職級甚卑然氣貌殊常宙以猶女妻之妻以非其類堅止之宙曰此人非常流也他日我子孫或可依之謙後果以軍功拜封州刺史兼賀水鎮使甚有稱譽謙之長子曰隐即韋氏女所生也㓜而竒特及謙卒賀水諸將有無賴者幸變作亂隱定計誅之連帥劉崇龜聞其才署為右都校復領賀水鎮俄奏兼封州刺使用法清肅威望頗振唐昭宗以嗣薛王知柔石門扈蹕功授清海軍節度使詔下有府之牙將盧琚譚玘謀不稟朝命隱舉部兵誅琚玘以聞知柔至深徳之辟為行軍司馬委以兵賦唐昭宗命宰相徐彦若代知柔復署前職彦若在鎮二年臨薨手表奏隱為兩使留後昭宗未之許命宰相崔逺為節度使逺行及江陵聞嶺表多盜懼隱違詔遲留不進㑹逺復入相乃詔以隱為留後然久未即真及梁祖為元帥隱遣使持重賂以求保薦梁祖即表其事遂降旄節梁開平初恩寵殊厚遷檢校大尉兼侍中封大彭郡王梁祖郊禋禮畢加檢校太師兼中書令又命兼領安南都䕶充清海静海兩軍節度使進封南海王開平四年三月卒陟隱之弟也隱卒代據其位及梁末帝嗣位務行姑息之政乃盡以隠之官爵授陟先是邕州葉廣畧容州龎巨源或自擅兵賦數侵廣之西鄙陟舉兵討之邕容皆敗因附庸於陟又交州土豪曲承美亦專據其地送欵於梁因正授旄鉞陟不平之遣將李知順伐之執承美以獻陟自是盡有嶺表之地及聞錢鏐册封呉越王陟恥穪南海之號乃嘆曰中原多故誰為真主安能萬里梯航而事偽庭乎梁貞明三年八月陟乃僭號於廣州國號大漢偽改元為乾亨明年僭行郊禮赦其境内及改名巖陟僭位之後廣聚南海珠璣西通黔蜀得其珍玩窮奢極侈娯僭一方與嶺北諸藩歲時交聘及聞莊宗平梁遣偽宫苑使何詞來聘稱大漢國主致書上大唐皇帝莊宗召見於鄴宫問南海事狀且言本國已發使臣大陳物貢期今秋即至初陟聞莊宗兵威甚盛故令何詞來視虛實時朝政已紊莊宗亦不能以道制御逺方南海貢亦不至自是與中國遂絶唐同光三年冬白龍見於南海改偽乾亨元年為白龍元年陟又改名龔以符龍之瑞也白龍四年春又改大有元年是歲陟僭行籍田之禮陟之季年有梵僧善占筭之術謂陟不利名龔他年慮有此姓敗事陟又改名龑龑讀為儼古文無此字盖妄撰也陟性雖聰辯然好行苛虐至有炮烙刳剔截舌灌鼻之刑一方之民若據爐炭惟厚自奉養廣務華靡末年起玉堂珠殿飾以金碧翠羽嶺北行商或至其國皆召而示之誇其壯麗每對北人自言家本咸秦耻為蠻夷之主又呼中國帝王為洛州刺史其妄自尊大皆此類也晉天福七年夏四月陟以疾卒凡僭號二十六年年五十四偽謚為天皇大帝廟號髙祖陵曰康陵子玢嗣玢陟長子也初封賓王又封秦王陟卒遂襲位偽號光天玢性庸昩僭位之後大恣荒淫尋為其弟晟等所弑在位一年偽謚為殤帝晟陟第二子也偽封勤王又封晉王玢之立也多行淫虐人皆患之晟因與其弟偽越王昌等同謀弑玢自立為帝改元為應乾又改為乾和晟率性荒暴得志之後專以威刑御下多誅㓕舊臣及其昆仲數年之間宗族殆盡又造生地獄凡湯鑊鐡床之類無不備焉人有小過咸被其苦及湖南馬氏昆弟尋戈晟因其釁遣兵攻桂林管内諸郡及郴連梧賀等州皆克之自此全有南越之地周顯德五年秋八月晟以疾卒偽謚曰文武光聖明孝皇帝廟號中宗陵曰昭陵是嵗晟以六月望夜宴於甘泉宫是夕月有蝕之測在牛女之度晟自覽占書既而投之於地曰自古豈有長存者乎因縱長夜之飲至是而卒鋹晟長子也偽封衛王晟卒乃襲偽位時年十七改元為大寳鋹性庸懦不能治其國政事咸委於閹宦復有宫人具冠帶預職官理外事者由是綱紀大壞先是廣州法性寺有菩提樹一株髙一百四十尺大十圍傳云蕭梁時西域僧真諦之所手植盖四百餘年矣皇朝乾德五年夏為大風所拔是歲秋鋹之寢室屢為雷震識者知其必亡皇朝開寳三年夏王師始議南征四年二月五日王師壓廣州鋹盡焚其府庫將赴火而死既而不能引決尋為王師所擒舉族遷於京師皇上赦而不誅仍賜爵為恩赦侯其後事具皇家日厯陟始自梁貞明三年僭號厯三世四主至皇朝開寳四年凢五十五年而亡劉崇太原人漢髙祖之從弟也少無賴好陸博意錢之戱弱冠𨽻河東軍唐長興中遷虢州軍校漢祖鎮并汾奏為河東步軍都指揮使逾年授麟州刺史復為河東馬步軍都指揮使兼三城廵檢使遥領泗州防禦使漢祖起兵於河東以崇為特進檢校太尉行太原尹是歲五月漢祖南行以崇為北京留守尋加同平章事隱帝嗣位加檢校太師兼侍中乾祐二年九月加兼中書令時漢隱帝以幼年在位政在大臣崇亦招募亡命繕完兵甲為自全之計朝廷命令多不稟行徴歛一方略無虛日人甚苦之三年十一月隱帝遇害朝廷議立崇之子徐州節度使贇為主㑹周太祖為軍衆所推降封贇為湘隂公崇乃遣牙將李䛒奉書求贇歸藩㑹贇已死唯以優辭答之周廣順元年正月崇僭號於河東穪漢改名旻仍以乾祐為年號署其子承鈞為侍衛親軍都指揮使太原尹以判官鄭拱趙華為宰相副使李瓌代州刺史張暉為腹心尋遣承鈞率兵攻晉隰二州不克而退九月崇自領兵由隂地闗冦晉州乞師於契丹契丹以五千騎助之合兵以攻平陽又分兵冦昭義周太祖遣樞宻使王俊等率大軍以援晉絳崇聞周師至遂焚營而遁是歲晉絳大雪崇駐軍六十餘日邊民走險自固兵無所掠士有飢色北至太原十亡三四二年二月崇遣兵三千餘衆冦府州為折徳扆所破其所部岢嵐軍為德扆所取崇自僭稱之後以重幣求援於契丹仍稱侄以事之契丹偽册為英武皇帝及周世宗嗣位崇復乞師於契丹以圖入冦契丹遣將楊衮合勢大舉來迫潞州顯德元年三月周世宗親征與崇戰於髙平大敗之崇與親騎十數人踰山而遁中夜迷懵不知所適刦村民使為鄉導誤趨晉州路行百餘里方覺崇怒殺鄉導者得佗路而去乃易名號被毛褐張樺笠而行至沁州與從者三五騎止於郊舍寒餒尤甚潛令告偽刺史李廷誨廷誨饋盤飡解衣裘而與之每至屬邑縣吏奉食匕箸未舉聞周師至即蒼黄而去崇年老力憊伏於馬上日夜奔􅇡僅能支持距太原一舍其子承鈞夜以兵百人迎之而入及周師臨城下崇氣懾自固閉壘不出月餘世宗乃旋軍顯徳二年十一月崇以病死其子承鈞襲偽位鈞之事跡具皇家日厯史臣曰守光逆天反道從古所無迨至臨刑尚求免死非唯惡之極也抑亦愚之甚也劉晟據南極以稱雄屬中原之多事泊乎奕世遇我昌朝力憊而亡不冺其嗣亦其幸也劉崇以亡國之餘竊偽王之號多見其不知量也今元惡雖斃遺孽尚存勢蹙民殘不亡何待舊五代史巻一百三十五
