body:
  text: 舊五代史巻一百九考證漢列傳五杜重威傳遣給事中陳觀等陳觀歐陽史避私諱作陳同趙思綰傳即令讓能為表章遣牙將劉成琦入朝案宋史郭從義傳作從義繫書矢上射入城中説思綰令降與是書異并部下叛黨新授虢州刺史常彦卿等五百餘人並誅案宋史郭從義傳作三百餘人滿達勒舊作麻答今改嘉哩舊作解里今改舊五代史巻一百九考證
