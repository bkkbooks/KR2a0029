body:
  text: 舊五代史巻十九攷證列傳九氏叔琮傳太祖伐襄陽叔琮失利案舊唐書光化元年汴將氏叔琮陷趙匡凝之隨唐鄧等州是書趙巨凝傳亦云太祖遣氏叔琮伐之匡凝懼乞盟是役也實以勝歸而叔琮本傳獨言失利未知所據令就襄陵縣牧馬于道間案襄陵原本作襄陽今據歐陽史改正貶白州司户案舊唐書作貝州與氏叔琮同日賜死案此朱友恭事是書及歐陽史通鑑俱同北夢瑣言作友諒誤王重師傳潁州長社人也潁州歐陽史作許州太祖異其狀貎乃𨽻其拔山都案拔山原本作技山歐陽史作㧞山攷當時軍旅皆以都名如黒雲都銀搶都效節都横街都之類今從歐陽史改正并増入都字朱珍傳敗樂從訓萬餘人案通鑑作樂從訓來告急遣都輝使朱珍等分兵救從訓與此傳異李重𦙍傳于是與李讜並戮于河橋案原本脫與字今増入范居實傳與葛從周張存敬率兵救魏案原本脱從字今増入舊五代史卷十九攷證
