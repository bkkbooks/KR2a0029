body:
  text: 舊五代史巻一百三十五考證僭偽列傳二劉守光傳汴人陷嬴鄚二州鄚原本訛鄭今据歐陽史改正書記馬郁馬郁原本作馬都今据是書列傳改盡斂銅錢于大安山嶺銅錢原本作錢鏄引用錯謬今据歐陽史改正即殺匠石以滅其口案莊子石乃匠者之名詞家引用泛作工匠解者非乃紀事之文亦沿其誤殊乖史體今姑仍原文而駁正于此劉陟傳謙之長子曰隱梁開平初封大彭郡王梁祖郊禋禮畢進封南海王案東都事略不載隱封南海王宋史不載隱封大彭郡王與是書互有詳略考五代㑹要劉隱進封南海王在開平四年舊五代史巻一百三十五考證
