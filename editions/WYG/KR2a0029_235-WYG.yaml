body:
  text: 舊五代史巻一百十八宋門下侍郎參知政事監修國史薛居正等撰周書第九世宗紀五顯徳五年春正月癸未朔帝在楚州城下從臣詣行宫稱賀隆平集馬仁瑀傳世宗征淮南登楚州永寒飛樓距城百歩城卒詬罵左右射莫能及召仁瑀至應弦而斃乙酉䧏同州為郡右驍衛将軍王環卒丙戌右龍武将軍王漢璋奏攻海州戍子詔諸道幕職州縣官竝以三周年為考限閏月不在其内州府不得差攝官贊正官云已丑詔侍衛馬軍都指揮使韓令坤權知楊州軍府事庚寅發楚州管内丁壯開鸛河以通運路乙已帝親攻楚州時今上在楚州城北晝夜不解甲胃親冒矢石麾兵以登城丙午㧞之斬偽守将張彦卿等六軍大掠城内軍民死者萬餘人廬舍焚之殆盡陸游南唐書張彦卿傳云保大末周世宗南侵彦卿為楚州防禦使周師鋭甚旬日間海泰州静海軍皆破元宗亦命焚東都官寺民廬從其民渡江世宗親御旗鼓攻楚州自城以外皆已下發州民濬老鸛可遣齊雲戰艦數百自淮入江勢如震烈焰彦卿獨不為動及梯衝臨城鑿城為河窟室實柴而焚之城皆摧圮遂陷彦卿猶結陣城内誓死奮擊謂之巷鬬日暮轉至州􅅟長短兵皆盡彦卿猶取繩床摶戰及兵馬都監鄭昭業等千餘人皆死之無一人生降者周兵死者亦甚衆世宗怒盡屠城中居民焚其室廬然得彦卿子光祐不殺也又趙鼎臣竹隱畸士集云當城中之危也彦卿方與諸将立城上因泣諫以周唐强弱勢不足以相支又城危甚而外無一人援恐旦夕徒死無益勸彦卿趣降彦卿頷之因顧諸将指曰視彼諸将方囬顧彦卿則抽劔斷其子首擲諸地慷慨泣謂諸将曰此彦卿子勸彦卿䧏周彦卿受李家厚恩誼不䧏此城吾死所也諸軍欲降任䧏第勿勸我勸我者同此子矣于是諸将愕昭亦泣莫敢言降二月甲寅偽命天長軍使易贇以城歸順戊午車駕發楚州南巡丁夘駐蹕于廣陵詔發揚州部内丁夫萬餘人城揚州帝以揚州焚盪之後居民南渡遂于故城内就東南别築新壘戊辰遣使祭故淮南節度使楊行密故昇府節度使徐温等墓癸酉幸揚子渡觀大江乙亥黄州刺史司超奏破淮賊三千人擒偽舒州刺史施仁望丙子隰州奏河東賊軍逃遁時劉鈞聞帝南征發兵圍隰州巡檢使李謙溥以州兵拒之而退東都事畧楊廷璋傳隰州闕守乃請監軍李謙溥至隰并人來圍其城或請速救之廷璋曰賊遽至必未攻城乃募死士百餘人潛諭謙溥相應夜銜枚擊之并人大漬逐北數十里又李謙􅄎傳云隰州闕守謙溥攝州事至則濬城隍嚴兵備未旬日而并人至方盛暑謙溥服絺綌揮羽扇引二小吏登城徐歩并人望之勒兵不敢動三月壬午朔幸泰州丁亥復幸廣陵辛卯幸迎鑾江口遣右武衛大将軍李繼勲率舟師至島以觀寇癸已帝臨江望見賊船數十艘命今上帥戰棹以追之賊軍退去今上直抵南岸焚其營栅而逥甲午以右武衛大将軍李繼勲為左領軍上将軍乙未殿前都虞侯慕容延釗奏大破賊軍于東㳍州丙申江李景遣其臣臣兵部侍郎陳覺奉表陳情兼貢羅縠紬絹三千匹乳茶三千斤及香藥犀象等覺至行在覩樓船戰棹已泊于江岸以為自天而降愕然大駭丁酉荆南髙保融奏本道舟師已至鄂州戊戌兩浙錢俶奏差發戰棹四百艘水軍萬七千人已泊江岸請師期已亥今上率水軍破賊船百餘隻于𤓰歩是日李景遣其臣劉承遇奉表以廬舒蘄黄等四州來獻且請以江為界帝報曰皇帝恭問江南國主使人至省奏請分割舒廬蘄黄等州畫江為界者頃逢多事莫通玉帛之歡適自近年遂搆干戈之役兩地之交兵未息蒸民之受弊斯多一昨再辱使人重尋前意将敦久要須盡縷陳今者承遇爰來封函復至請割州郡仍定封疆猥形信誓之辭備認始終之意旣能如是又復何求邊陲頓静于煙塵師旅便還于京闕永言欣慰深切誠懷其常潤一路及沿江兵棹今已指揮抽退兼兩浙荆南湖南水陸兵士各令罷兵其廬黄蘄三路将士亦遣抽㧞近内候彼中起揭逐處将員及軍都家口丁畢秪請差人勾喚在彼将校割州城云淮南平凡得州十四縣六十户二十二萬六千五百七十四先是李景以江南危蹙謀欲傳位于世子使附庸于我故遣陳覺上表陳叙至是帝以既許其通好乃降書以答之曰别覩來章備形縟㫖叙此日傳讓之意述向來髙尚之懷仍以數歳已還交兵不息備論追悔之亊無非尅責之辭雖古人有引咎責躬因災致懼亦無以過此也况君血氣方剛春秋甚富為一方之英主得百姓之歡心卽今南北才通疆埸甫定是玉帛交馳之始乃干戈載戢之初豈可髙謝君臨輕辭世務與其慕希夷之道曷若行康濟之心重念天災流行分野常亊前代賢哲所不能逃茍盛徳之日新則景福之彌遠勉修政理勿倦經論保髙義于初終垂逺圖于家國流芳貽慶不亦美乎庚子詔曰比者以近年貢舉頗是因循頻詔有司精加試練所冀去畱無濫優劣昭然昨據貢院奏今年新及第進士等所試文字或有否臧爰命辭臣再今考覆庶涇渭之不雜免玉石之相參其劉坦戰貽慶李頌徐緯張覲等詩賦稍優宜放及第王汾據其文辭亦未精當念以頃曾剥落将與成名熊若谷陳保衡皆是逺人深可嗟念亦放及第郭峻趙保雍楊丹安𤣥度張昉董咸則杜思道等未甚苦辛竝從退黜更宜修進以俟将來知貢舉右諫議大夫劉濤選士不當有失用心責授右贊善大夫俾今省過以戒當官先是濤于東京放牓後引新及第進士劉坦已下一十五人赴行在帝命翰林學士李昉覆試故有是命壬寅復幸揚州改廬州軍額為保信軍甲辰以右龍武統軍趙贊為廬州節度使以殿前都虞候慕容延釗為淮南節度使兼殿前副指揮使遣鹽城監使申屠諤齎書及御馬一十匹金銀銜全散馬四十匹羊千口賜江南李景諤先為王師所俘故遣之丙午江南李景遣所署宰相馮延已獻犒軍銀十萬兩絹十萬匹錢十萬貫茶五十萬斤米麥二十萬石庚戌詔故淮南節度使楊行密故昇府節度使徐温各給守冢户應江南臣寮有先代墳墓在江北者委所在長吏差人檢校辛亥李景遣所署臨汝郡公徐遼進買宴錢二百萬并遣伶官五十人與遼俱來獻壽觴夏四月癸丑宴從臣及江南進奉使馮延已等于行宫徐遼代李景捧壽觴以獻進金酒器御衣犀帶金銀錦綺鞍馬等乙卯車駕發揚州還京丙辰太常博士權知宿州軍州亊趙礪除名坐推劾弛慢也先是翰林醫官馬道𤣥進狀訢壽州界被賊殺却男獲正賦見在宿州本州不為勘斷帝大怒遣端明殿學士竇儀乘馹往按之及獄成坐族死者二十四人儀奉辭之日帝㫖甚峻故儀之用刑傷于深刻戊午以前延州畱後李彦頵為滄州畱後庚申新太廟成遷五廟神主入于其室壬申至自淮南癸酉命宣徽北院使昝居潤判開封府事甲戌澶州節度使張永徳準詔赴北邊以契丹犯境故也丁丑兩浙奏四月十九日杭州火廬舍府署焚燒殆盡五月辛已朔上御崇元殿受朝伏衛如式詔侍衛諸軍及諸道将士各賜等第優給應行營将士殁于王事者各與贈官親的子孫竝量才録用傷夷殘廢者别賜救接淮南諸州及徐宿宋毫陳頴許蔡等州所欠去年秋夏税物竝與除放云丙戌命端明殿學士竇儀判河南府兼知西畱守亊辛卯以襄州節度使安審琦為青州節度使以許州節度使韓通為宋州節度使依前兼侍衛馬步都虞侯以宋州節度使向訓為襄州節度使以今上為忠武軍節度使依前殿前都指揮使淮南之役今上之功居最是命之降雖云酬勲止于移鎮而已賞典太輕物議不以為允癸已以左武衛上将軍武行徳為鄜州節度使以右神武統軍宋延渥為滑州節度使小畜集宋延渥神道碑云五月授義成軍節度使其制畧曰長驅下瀬之師若渉無人之境除凶戡難爾旣立夫殊庸礪岳盟河予豈忌于豐報南燕舊邦北闕伊邇河壖作翰遥臨白馬之忘穰下統戎卽鎮卧龍之地以前同州留後王暉為相州留後乙未立東京羅城諸門名額東二門曰寅賔延春南三門曰朱明景風畏景西二門曰迎秋肅政北三門曰𤣥徳長景愛景辛丑幸懷信驛乙已詔在朝文資官各再舉堪為幕職令錄一人戊申以襄州節度使向訓兼西南面水陸𤼵運招討使已酉以太府卿馮延魯充江南國信使以衛尉少卿鍾謨為副賜李景御衣玉帶錦綺羅糓帛共十萬匹金器千兩銀器萬兩御馬五匹金玉鞍轡全散馬百匹羊三百匹賜江南世子李𢎞冀器幣鞍馬等别賜李景書曰皇帝恭問江南國主煮海之利在彼海濵屬彊壌之初分慮供食之有闕江左諸軍素號繁饒然川澤之間舊無斤鹵之地曽承素旨常在所懷願願均収積之餘以助軍旅之用已下三司逐年支撥供軍食鹽三十萬石又賜李景今年歴日一軸六月庚午命中書舍人竇儼參定雅樂辛未放先俘獲江南兵士四千七百人歸本國壬申有司奏御膳料上批曰朕之常膳今後減半餘人依舊癸酉禘于太廟乙亥兵部尚書張昭等撰太祖實祿三十巻成上之賜噐帛有差丁丑以中書舍人張正為工部侍郎充江北諸州水陸轉運使成寅詔諫議太夫宜依舊為正五品上仍班在給事中之下秋七月癸未以右散騎常侍髙防為户部侍郎以左驍衛上將軍李洪信為右龍武統軍以左領軍上將軍李繼勲為右羽林統軍以工部尚書田敏為太子少保以刑部侍郎裴巽為尚書左丞以左武衞上將軍蒒懷譲為太子太師以右羽林大將軍李萼為右千牛衛上將軍自敏已下皆致仕丙戌中書門下新進冊定大周刑統奉刺班行天下丁亥賜諸道節度使刺史均田圖各一面唐同州刺史元稹在郡日奏均户民租賦帝因覽其文集而善之乃寫其辭為圖以賜藩郡時帝將均定天下賦税故先以此圖徧賜之五代會要載原詔云朕以寰宇雖安蒸民未泰當乙夜觀書之際較前賢阜俗之方近覽元稹長慶集見在同州時所上均田表較當時之利病曲盡其情俾一境之生靈咸受其賜傳于方冊可得披尋因令製素成圖直書其事庻王公觀覽觸目驚心利國便民無亂條制背經合道盡繫變通但要適宜所冀濟務翳乃勛舊共庇黎元今賜元稹所奏均田圖一靣至可領也閏月壬子廢衍州為定平縣廢武州為潘原縣壬戌河決河隂縣溺死者四十二人辛丑幸新授青州節度使安審琦第癸酉邢州留後陳思讓奏破河東賊軍千餘人于西山下斬首五百級八月庚辰延州奏溠溪水漲壞州城溺死者百餘人已丑太子太師致仕宋彦筠卒辛丑江南李景上表乞降詔書不允九月丁已以大府卿馮延魯為刑部侍郎以衛尉少卿鍾謨為給事中竝放歸江南時延魯鍾謨自江南復命李景復奏欲傳位于其世子𢎞冀帝亦以書答之甲子賜江南羊萬口馬三百匹槖駞三十頭賜兩浙錢俶羊五千口馬二百匹槖駞二十頭乙丑賜宰臣樞密使及近臣宴于玉津圍已已占城國王釋利因徳漫遣使貢方物壬子天清節羣臣詣廣徳殿上夀江南進奉使啇崇義代李景捧夀觴以獻宋類苑云湯悦父殷舉唐末有才名本名崇義建隆初避宜祖諱改姓湯初在呉為舍人受詔撰掦州孝先寺碑世宗親往駐驛此寺讀其文賞歎及畫江議定後主遣悦入貢世宗為之加禮自淮上用兵凡書詔多悦之作特為典贍切于事情世宗毎覽江南文字形于嗟嘆當時沈遇馬士瓦等皆不稱職復用陶榖李防于舍人其後用扈載率由此也冬十月已卯以户部侍郎高防為西南面水陸轉運使將用師于巴卭故也宋史髙防傳世宗謀伐蜀以防為西南面水陸轉運制置使屢發芻糧赴鳯州為征討之備丙戌邠州李暉移鎮鳯翔戊子幸迎春苑已丑太常卿司徒詡以本官致仕壬辰帝狩于近郊癸已前相州節度使王饒卒甲午左監門上將軍許文縝右千牛上將軍邊鎬衛尉卿周延搆竝歸江南乙未詔淮南諸州鄉軍竝放歸農丁酉遣左散騎常侍艾頴等均定河南六十州税賦五代會要載賜諸道均田詔曰朕以干戈旣弭寰海漸寕言念地征罕臻藝極須竝行均定所冀永適重輕卿受任方隅深窮治本必須副寡昧平分之意察鄉閭治弊之原明示條章用分寄任竚令集事允屬推公今差使臣徃彼檢括餘從别勅十一月丁未朔詔翰林學士竇儼集文學之士撰集大周通禮大周正樂從儼之奏也幸亥日南至帝御崇元殿受朝賀仗衛如式已未昭義李筠奏破遼州長清砦獲偽命磁州刺史李再興甲子帝狩于近郊十二月丁丑朔朗州奏醴陵縣三仙觀山中舊有田二萬頃久為山石閉塞今年七月十七日夜暴雷劈開其路復通已卯楚州兵馬都監武懷恩棄市坐擅殺䧏軍四人也丙戌詔重定諸道州府幕職令錄佐官料錢其州縣官俸户宜停已丑楚州防禦使張順賜死坐在任隠落㩁税錢五十萬官絲綿二千兩也壬辰詔兩京及五府少尹司參軍各省一員六􅈠判司内秖直户法二曹餘及諸州觀察支使兩番判官竝省甲子帝狩于近郊乙未鄧州劉重進移鎮邠州滑州宋延渥移鎮鄧州以前河中節度使王仁鎬為邢州節度使以邢州留後陳恩譲為滑州留後已亥詔翰林學士今後逐日起居當直者仍赴晚朝是月江南李景殺其臣偽太傅中書令宋齊丘偽兵部侍郎陳覺偽鎮南軍節度副使李徴古等初帝之南征也呉人大懼覺與徴古皆齊丘門人因進説于景請委國事于齊丘景繇是銜之及呉人遣鍾謨李徳明奉表至行在帝尋遣徳明復命于金陵徳明因説李景請割江北之地求和于我而陳覺李徴古等以徳明為賣國請戮之景遂殺徳明及江南内附帝放鍾謨南歸謨本徳明之黨也因譖齊丘等故齊丘等得罪放齊丘歸九華山覺等貶官尋竝害之景旣誅齊丘等令鍾謨到闕具言其事故書舊五代史巻一百十八
