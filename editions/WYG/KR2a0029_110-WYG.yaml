body:
  text: 舊五代史巻五十四考證唐列𫝊六王鎔𫝊紹鼎卒子景崇立案新唐書藩鎮𫝊紹鼎卒子幼未能事以元逵次子紹懿為留後紹懿卒乃復授紹鼎子景崇與是書異自是燕帥李匡威頻嵗出軍以為鎔援案太平廣記引劉氏耳目記趙王鎔方在幼沖而燕軍冦北鄙王選將拒之有勇士陳立劉幹投刺軍門願以五百人當冦翼日立卒于鋒刃之下幹唱凱而還據是書鎔方以燕帥為援未嘗與燕軍戰疑耳目記𫝊聞之誤館于寶壽佛寺案歐陽史作館于梅子園和昭訓為都籌畫和昭訓宋史趙上交𫝊作和少微都又與青徐岐潞梓五帥蠟書以離間之案通鑑作青徐潞益梓五帥胡三省注云是時青帥霍彦威徐帥房知温潞帥毛璋益帥孟知祥梓帥董璋是書有岐帥而無益帥與通鑑異歐陽史從是書托諾舊作秃餒今改舊五代史巻五十四攷證
