body:
  text: 舊五代史巻二十五攷證唐武皇紀上中和三年薨案新唐沙陀𫝊作光昌三年國昌卒與是書異以武皇為大同軍節度使案歐陽史作拜克用為大同防禦使新唐書作以國昌為大同軍防禦使通鑑作以國昌為大同節度使俱與是書異天子復命元帥李涿案歐陽史作招討使李琢通鑑亦作琢俱與是書異與薛葛安慶等部將案新唐書作薩葛首領米海萬安慶天子乃以武皇為鴈門節度使案新唐書表中和二年以河東忻代二州穎鴈門節度更大同節度為鴈門節度治代州是中和二年以前雁門非鎮名也據舊唐書初赦克用拜代州刺史忻代兵馬留後二年擢雁門節度神䇿天寧軍鎮遏忻代觀察使是克用為雁門節度實在位二年是書作元年疑誤十一月平潞州表其弟克修為昭義節度使案通鑑克用表克修為昭義軍節度使在四年八月與是書異汴帥素忌武皇案梁紀作李克用乗醉任氣帝不平之攷新唐書沙陀𫝊亦作全忠忌克用桀邁難制與此紀合蓋全忠攻上源驛實忌其威名而欲害之非徒以其乗醉任氣也鎮州王景崇王景崇舊唐書作王鎔攷藩鎮𫝊景崇以中和二年卒子鎔繼立是光啟初冦定州者當為王鎔也通鑑從舊唐書光啟元年三月節度使王處存求援於武皇武皇遣大將康君立安老薛可郭啜率兵赴之五月鎮人攻無極武皇親領兵救之案曲陽天安廟李克用題名碑云李克用以幽鎮侵擾中山領蕃漢歩騎五十萬親來救援時中和五年二月二十一日也至三月十七日以幽州請就和斷遂郤班師攷舊唐書中和五年三月丙辰朔丁夘駕至京師已已御宣政殿大赦改元是三月之十四日已改光啟曲陽去京師逺故未知耳又克用親援處存與通鑑遣將唐君立異今攷是書武皇先遣康君立等與通鑑合繼乃親領兵救之與題名碑合惟是書作五月碑作三月微有互異耳乃移重榮於定州案歐陽史作徙重榮於兖州攷新唐書王重榮𫝊亦云令孜徙重榮兖海節度使與是書異武皇上章言李符朱玫挾邪忌正李符歐陽史作李昌符蓋唐實録避獻祖諱故去昌字孟方立恚恨飲酖而死三軍立其姪遷為留後案舊唐書昭宗紀歐陽史莊宗紀皆以孟遷為方立之弟新唐書孟方立𫝊作方立之從弟此紀又作方立之姪未詳孰是六月天子削奪武皇官爵六月新唐書作五月以張濬為招討使案新唐書本紀作張濬為行營都招討宣慰使張濬𫝊作河東行營兵馬招討制置使歐陽史作太原四面行營兵馬都統華州韓建為行營都虞候案歐陽史作韓建為副使新唐書張濬𫝊作韓建為供軍使八月存孝擒新授昭義節度使孫揆案新唐書作七月戊申李克用執昭義節度使孫揆通鑑從是書作八月張濬之師出戰為存孝所敗案新唐書帝紀作十一月張濬及李克用戰於隂地敗績歐陽史亦作十一月與是書先後互異舊五代史巻二十五攷證
