body:
  text: 舊五代史巻四宋門下侍郎參知政事監修國史薛居正等撰梁書第四太祖紀四開平二年正月癸酉帝御金祥殿受宰臣文武百官及諸藩屏陪臣稱賀諸道貢舉一百五十七人見于崇元門封從子友寜為安王友倫為密王幽州劉守文進海東鷹鶻蕃馬氊罽方物自去冬少雪春深農事方興久無時雨兼慮有災疾帝深軫下民二月命庶官遍祀于羣望掩瘞暴露令近鎮案古法以禳祈旬日乃雨是月弑濟隂王帝以上黨未収因議撫廵便住西都赴郊禋之禮乃下令曉告中外取三月一日離東京以宰臣韓建權判建昌宫事五代㑹要十月以尚書兵部侍郎李皎為建昌宫副使兵部侍郎姚洎為鹵簿使開封尹博王友文為東都畱守辛未契丹主按巴堅遣使貢良馬三月壬申帝親統六軍廵幸澤潞是日寅時車駕西幸宰臣并要切司局皆扈從晩次中牟下詔以去年六月後昭義行營陣殁都將吏卒死于王事追念忠赤乃錄其名氏各下本軍令給養妻孥三年内官給糧賜丁丑幸澤州辛已以同州節度使劉知俊為潞州行營招討使壬午宴扈駕羣臣并勞知俊賜以金帶戰袍寶劍茶藥甲申登東北隅逍遥樓蒐閲騎乘旌甲滿野丙申招討使劉知俊上章請車駕還東京蓋小郡湫隘非久駐蹕之所達覽帝俞其請以鴻臚卿李嵸唐室宗屬封萊國公為二王後有司奏萊國公李嵸合畱三廟于西都選地位建立廟宇以備四仲祀祭命度支供給以遵彝典四月以吏部侍郎于兢為中書侍郎平章事以翰林奉㫖學士張䇿為刑部侍郎平章事時帝在澤州拜二相于行在丙午車駕離澤州丁未駐蹕于懷州宴宰臣文武百官辛亥至鄭州壬子幸東京丙寅車駕幸繁臺觀稼鄢陵居人程震以兩岐麥穗并畫圖來進甲寅淮宼侵軼潭岳邊境欲援朗州以戰艦百餘艘揚帆西上泊鼎口湖南馬殷遣水軍都將黄瑀率樓船遮擊之賊衆沿流宵遁追至鹿角鎮詔以户部尚書致仕裴廸復為右僕射廸敏事慎言達吏治明籌算帝初建節旄于夷門廸一謁見如故知乃辟為從事自是之後歴三十年委四鎮租賦兵籍帑廩官吏獄訟賞罰經費運漕事無巨細皆得專之帝每出師即知軍州事逮于二紀不出梁之闉閎甚有禆贊之道禪代之嵗命為太常卿屬年已耆耄視聽昏塞不任朝謁遂請老許之朞月復起師長庶官焉五月丁丑王師圍潞州將及二年李進通危在旦夕不俟攻繫當自降太原李存朂以厚幣誘結北蕃諸部竝其境内丁壯悉驅南征決戰以救上黨之急部落帳族馳馬勵兵數路齊進于銅鞮樹寨旗壘相望王師敗于潞州已丑令下諸州去年有蝗蟲下子處蓋前冬無雪今春亢陽致為災沴實傷壠畝必慮今秋重困稼穡自知多在荒陂榛蕪之内所在長吏各須分配地界精加翦撲以絶根本壬辰夜火星犯月太史奏災合在荆楚乃令設武備寛刑罰恤人禁暴以禳之軍前行營都將康懷英孫海金已下主將四十三人于右銀臺門進狀待罪帝以去年發軍之日不利有違兵法並釋放兼各賜分物酒食勞問封義昌軍節度使劉守文加中書令封太彭王盧龍軍節度使劉守光封河間郡王許州節度使馮行襲封長樂王是月癸未淮賊宼荆州石首縣襄陽舉舟師沿瀺港襲敗之六月辛亥以亢陽慮時政之闕乃詔曰邇者下民喪禮法吏舞文銓衡既失于選求州鎮又無其舉刺風俗未厚獄訟實繁職此之由上遭天譴至是決遣囚徒及戒勵中外丙寅月犯角㝛帝以其分野在兖州乃令長吏治戎事設武備省獄訟恤疲病祈福禳災以順天戒丙辰邠岐來宼雍西編户困于逃避且芟害禾稼結營自固踰月同州劉知俊領所部兵擊退襲至幕谷大破之俘斬千計収其器甲宋文通僅以身免詔曰敦尚儉素抑有前聞斥去浮華期臻至理如聞近日貢奉競務奢淫或奇巧蕩心或雕鐫溢目徒殫資用有費工庸此後應諸道進獻不得以金寶裝飾戈甲劔㦸至于鞍勒不用塗金及雕刻龍鳯如有此色所司不得引進邕州奏鏌鎁山僧法通道璘有道行各賜紫衣是月壬戌岳州為淮賊所據帝以此郡五嶺三湘水陸㑹合之地委輸商賈靡不由斯遂令荆湘湖南北舉舟師同力致討王師既集淮夷毁壁焚郭而遁秋七月甲戌大霖雨陂澤泛溢頗傷稼穡帝幸右天武軍河亭觀水幸高僧臺閲禁衛六軍詔曰車服以庸古之制也貴賤無别罪莫大焉應内外將相許以銀飾鞍勒其刺史都將内諸司使以降祗取用銅兾定尊卑永為條制仍令執法官紏察之五代㑹要載七月敕曰祭祀之儀有國大事如聞官吏慢于恪恭牲具禮容有異精審宜令御史臺疏其條件奏聞癸已以禪代巳來思求賢哲乃下令搜訪牢籠之期以好爵待以優榮各隨其材咸使登用宜令所在長吏切加搜訪每得其人則疏姓名以聞如在下位不能自振者有司薦導之如任使後顯立功勞别加遷陟勅禁屠宰兩月甲午以高明門外繁臺為講武臺是臺西漢梁孝王之時嘗按歌閲樂于此當時因名曰吹臺其後有繁氏居于其側里人乃以姓呼之時代綿寢雖官吏亦從俗焉帝每登眺蒐乘訓戎宰臣以是事奏而名之八月辛亥勅應有暴露骸骨各委差人埋瘞兩浙錢鏐奏請重鑄換諸州新印詔禁戢諸軍節級兵士及供奉官受㫖殿直以下各脩禮敬甲寅太史奏夀星見于南方兩浙錢鏐奏改管内紫極宫為真聖觀改臨安縣廣義鄉為衣錦鄉十國春秋呉越世家八月梁敕封唐山縣為呉昌縣唐興縣為天台縣又敕升杭越等州為大都督府復改新城縣曰新登長城縣曰長興樂成曰樂清避梁諱也甲子夜東方有大流星光明燭地有聲如裂帛唐州上言白龍見圖形以進九月丙子太原軍出隂地闗南牧宼掠郡縣晉絳有備帝慮諸將翫宼乃下詔親議廵幸命有司備行丁丑翠華西狩宰臣翰林學士崇政院使金吾仗及諸司要切官皆扈從餘文武百官竝在東京壬午達雒陽帝御文思殿受朝叅許汝孟懷牧守來朝澤州刺史劉重霸面陳破敵之䇿癸未西幸㝛新安丙戌至陜州駐蒲雍同華牧守皆進鎧甲騎馬戈㦸食味方物幽州都將康君紹等十人自蕃賊寨内來投又幽州騎將高彦章八十人騎先在并州乃于晉州軍前來降至是到行在皆賜分物衣服放歸本道以示懷服丁亥至陳州賜宴扈從官戊子延州賊軍宼上平闗又太原軍攻平陽烽火羽書畫夜繼至乙丑六軍統軍牛存節黄文靖各領所部將士赴行在甲午太原歩騎數萬攻逼晉絳踰旬不克知大軍至乃自焚其寨至夕而遁福州貢玳瑁琉璃犀象器并珍玩香藥奇品海味色類良多價累千萬十月已亥上在陜兩浙節度使奏于常州東州鎮殺淮賊萬餘人獲戰船一百二隻以行營左廂歩軍指揮使賀瓌為左龍虎統軍以左天武軍夾馬指揮使尹皓為輝州刺史以右天武都頭韓瑭為神捷指揮使左天武第三都頭胡賞為右神捷指揮使仍賜帛有差以解晉州圍之功也以尹皓部下五百人為神捷軍乙已御内殿宴宰臣扈從官共四十五人丙午御毬塲殿宣夾馬都指揮使尹皓韓瑭以下將士五百人賜酒食庚戌至西都御文明殿辛亥宰臣百寮起居于殿前遂宣赴内宴賜方物有差丁已至東都已未大明節諸道節度刺史各進獻鞍馬銀器綾帛以祝夀宰臣百官設齋相國寺壬戌御宣和殿宴宰臣文武百官十一月辛未御宣和殿宴宰臣文武百官以大駕還京故也庚辰御宣和殿宴宰臣文武百官出開明門登高僧臺閲兵諸道節度使刺史各進賀冬田器鞍馬綾羅等戊子賜文武百官帛乙未又宴宰臣文武百官于宣和殿通鑑癸已中書侍郎同平章事張策以刑部尚書致仕以左僕射楊涉同平章事十二月立二王三恪南郊禮儀使狀伏以詩稱有客書載虞賔實因禪代之初必行興繼之命俾之助祭式表推恩兼垂恪敬之文别示優崇之典徴于歴代襲用舊章謹按唐朝以後魏元氏子孫韓國公為三恪以周宇文氏子孫為介國公隋朝楊氏子孫為酅國公為二王後今伏以國家受禪封唐朝子孫李嵸為萊國公今參詳合以介國公為三恪酅國公萊國公為二王後五代㑹要十二月改左右天武為龍虎軍左右龍虎為天武軍左右天威為羽林軍左右羽林為天威軍左右英武為神武軍左右神武為英武軍前朝置龍虎六軍謂之衛士至是以天武神武英武等六軍易其軍號而任勲舊焉癸丑獵畋于含耀門外開平三年正月戊辰朔帝御金祥殿受宰臣翰林學士稱賀文武百官拜表于東上閣門已已奉遷太廟四室神主赴西京太常儀仗鼓吹導引齋車文武百官奉辭于開明門外甲戌發東都百官扈從次中牟縣乙亥次鄭州丙子次汜水縣河南尹張宗奭河陽節度使張歸霸並來朝戊寅次􅅯師縣已卯備法駕六軍儀仗入西都是日御文明殿受朝賀詔曰近年以來風俗未泰兵革且繁正月燃燈廢停已乆今屬創開鴻業初建洛陽方在上春務達陽氣宜以正月十四十五十六日夜開坊市門一任公私燃燈祈福庚寅親享太廟辛卯祀昊天上帝于圓丘是日降雪盈尺帝昇壇而雪霽禮畢御五鳯樓宣制大赦天下賜南郊行事官禮儀使趙光逢以下分物甲午上御文思殿宴羣臣賜金帛有差丙申賜文武官帛有差命宣徽使王殷押絹一萬疋并茵褥圖㡩二百六十件賜張宗奭歐陽史丙申羣臣上尊號曰睿文聖武廣孝皇帝改西京貞觀殿為文明殿含元殿為朝元殿二月改思政殿為金鑾殿勅東都曰自昇州作府建邑為都未廣邦畿頗虧國體其以滑州酸棗縣長垣縣鄭州中牟縣陽武縣宋州襄邑縣曹州戴邑縣許州扶溝縣鄢陵縣陳州太康縣等九縣宜並割屬開封府仍昇為畿縣輿地廣記朱梁時楊氏據江淮于是呉越錢氏上言以淮㓂未平恥聞逆姓請改松陽縣為長松丁酉宴羣臣于崇勲殿甲辰又宴羣臣于崇勲殿蓋藩臣進賀勉而從之丙午宗正寺請修興極永安光天咸寜諸陵並令添修上下宫殿栽植松柏制可癸亥勅豐沛之基寢園所在悽愴動闗于情理充奉自繫于國章宜設陵臺兼升縣望其輝州碭山縣宜為赤縣仍以本縣令兼四陵臺令同州節度使劉知俊奏延州都指揮使高萬興部領節級家累三十八人來降三月以萬興檢校司徒為丹延等州安撫招討等使辛未詔曰同州邊隅繼有士衆歸化暫思廵撫兼要指揮今幸蒲陜取九日進發甲戌車駕發西都百官奉辭于師子門外丁丑次陜州已卯次解縣河中節度使冀王友謙來奉迎庚辰至河中府幸右軍舊杏園講武丙戌以朔方節度使兼中書令韓遜為潁川王遜本靈州牙校唐末據本鎮朝廷因而授以節鉞四月丙申朔駐蹕河中壬寅辰時駕廵于朝邑縣界焦黎店冀王友謙及崇政内諸司使扈從至申時廻已亥御前殿宴宰臣及冀王友謙扈從官甲寅宴宰臣及扈從官于内殿制易定節度使王處直進封北平王福建節度使王審知封閩王廣州節度使劉隱封南平王同州節度使劉知俊封大彭郡王山南東道節度使楊師厚封𢎞農郡王五月乙丑朔朝遂命宰臣及文武百官宴于内殿已卯車駕至西京癸未御崇勲殿宴宰臣及文武官四品以上已丑復御崇勲殿宴宰臣文武官四品以上升宋州為宣武軍節鎮仍以亳輝潁為屬郡六月庚戌同州節度使劉知俊據本郡反制令削奪劉知俊在身官爵仍徴發諸軍速令進討如有軍前將士懷忠烈以知機賊内朋徒憤脅從而識變便能梟夷逆竪擒獲凶渠務立殊功當行厚賞活捉得劉知俊者賞錢一萬貫文便授忠武軍節度使竝賜莊宅各一所如活捉得劉知浣者賞錢一千貫文便與除刺史有官者超轉三階無官者特授兵部尚書如活捉得劉知俊骨肉及近上都將竝梟送闕廷者賞賜有差辛亥駕至蒲陜文武百官于新安縣奉迎劉知俊弟内直右保勝指揮使知浣自雒奔至潼闗右龍虎軍十將張温以上二十二人于潼闗擒獲劉知浣送至行在敕劉知浣逆黨之中最為頭角龍虎軍親兵之内實冠𤓰牙昨者攻取潼闗率先用命尋則擒獲知浣最上立功頗壯軍威將除國難所懸賞格便可支分許賜官階固須除授但昨捉獲劉知浣是張温等二十二人一時向前共立功效其賞錢一千貫文數内一百貫文與最先打倒劉知浣衙官李稠四十三貫文與十將張温二十人各與錢四十二貫八百五十文立功勅命便授郡府亦縁同時立功人數不少所除刺史難議偏頗宜令逐月共支給正刺史料錢二百貫文數内十將張温一人每月與十貫文餘二十一人每月每人各分九貫文仍起七月一日以後支給人與轉官職仍勘名銜分析申奏當與施行是月知俊奔鳯翔同州平七月乙丑勅行宫將士陣歿者咸令所在給槥櫝津置歸鄉里戰卒聞之悉感涕丙寅命宰臣楊渉赴西都以孟秋享太廟改章善門為左右銀臺門其左右銀臺門郤改為左右興善門敕大内皇牆使諸門素來未得嚴謹將令整肅須示條章宜令控鶴指揮應于諸門各添差控鶴官兩人守帖把門其諸司使并諸司諸色人竝勒于左右銀臺門外下馬不得將領行官一人輒入門裏其逐日諸道奉進客省使于千秋門外排當抗勒控鶴官舁擡至内門前準例令黄門殿直以下舁進輒不得令諸色一人到千秋門内其興善門仍令長官闗鎻不用逐日開閉是日又敕皇牆大内本尚深嚴宫禁諸門豈宜輕易未當條制交下因循茍出入之無常且公私之不便須加鈐轄用戒門閭宜令宣徽院使等切准此處分進封幽州節度使河間郡王劉守光為燕王通鑑七月癸酉帝發陜州乙亥至洛陽寢疾已丑夕寢殿棟折詰旦召近臣諸王視㨂折之迹帝慘然曰幾與卿等不相見君臣對泣久之遂詔有司釋放禁人從八月朔日後減膳進素食禁屠宰避正殿修佛事以禳其咎商州刺史李稠棄郡西奔本州將吏以都牙校李玫權知州事八月甲午以秋稼將登霖雨特甚命宰臣以下禱于社稷諸祠詔曰封嶽告功前王重事祭天肆覲有國恒規朕以眇身恭臨大寶既功德未敷于天下而灾祥訝降于城中慮于告謝之儀有缺齋䖍之禮爰修昭報用契幽通宜令中書侍郎平章事于兢往東嶽祭拜禱祀訖聞奏又勅朕以干戈尚熾華夏未寜宜循卑菲之言用致雍熈之化起八月一日常朝不御金鑾崇勲兩殿只于便殿聽政辛亥制諸郡如有陣殁將士仰逐都安存家屬如有弟兄兒姪便給與衣糧充役贈故山東道節度使畱後王珏太保贈故同州觀察判官盧匪躬工部尚書珏故河陽將累以軍功為郡守主畱事于襄陽為小將王求所殺匪躬嘗為劉知俊判官知俊反不偕行為亂兵所害勅建國之初用兵未罷諸道章表皆繫軍機不欲滯畱用防緩急其諸道所有軍事申奏宜令至右銀臺門委客省畫時引進諸道公事即依前四方館准例収接司天臺奏今月二十七日平明前東南丙上去山高三尺以來老人星見測在井㝛十一度其色光明闊大敕所在長吏放雜差役兩税外不得妄有科配自今後州縣府鎮凡使命經過若不執勅文劵並不得妄差人驢及取索一物巳上又今嵗秋田皆期大稔仰所在切如條流本分納税及加耗外勿令更有科索切戒所繇人更不得于鄉村乞託擾人閏八月襄陽叛將李洪差小將進表帝示以含宏特賜敕書慰諭又制左馮背叛元惡遁逃如聞相濟之徒多是脅從之輩若能廻心向國轉禍全身當與加恩必不問罪仍令同華雍等州切加招諭如能梟斬温韜或以鎮寨歸化必加厚賞仍奬官班兼委本界招復人户切加安存已卯幸西苑觀稼舊五代史巻四
