body:
  text: 舊五代史巻十六宋門下侍郎參知政事監修國史薛居正等撰梁書第十六列傳六葛從周字通美濮州鄄城人也曾祖阮祖遇賢父簡累贈兵部尚書從周少豁達有智畧初入黄巢軍漸至軍校唐中和四年三月太祖大破巢軍于王滿渡從周與霍存張歸霸昆弟相率來降七月從太祖屯兵于西華破蔡賊王夏寨太祖臨陣馬踣賊衆來追甚急從周扶太祖上馬與賊軍格鬬傷面矢中于肱身被數槍奮命以衞太祖頼張延壽廻馬轉鬬從周與太祖俱免退軍溵水諸將並削職惟擢從周延壽為大校其後入長葛靈井大敗蔡賊至斤溝淝河殺鐵林三千人獲九寨都虞候王涓太祖遣郭言募兵于陜州有黄花子賊據于温谷從周擊破之又破秦賢之衆于榮陽尋佐朱珍收兵于淄青間時兖州齊克讓軍于任城從周敗之擒其將吕全真淄人不受制復與之戰獲其驍將鞏約㑹青州以歩騎萬餘人列三寨于金嶺以扼要害從周與朱珍大殱其衆據其將楊昭範五人而還至大梁不解甲徑至板橋擊蔡賊破盧瑭寨瑭自溺而死又于赤堈殺蔡軍二萬餘人從討謝殷于亳州擒之廻襲曹州擄刺史丘𢎞禮以歸與兖鄆軍遇于臨濮之劉橋殺數萬人朱瑄朱瑾僅以身免擒都將鄒務卿巳下五十人從太祖至范縣復與朱瑄戰擄尹萬榮等三人遂平濮州未幾與朱珍擊蔡賊于亳間獲都將石璠文徳元年魏博軍亂樂從訓來告急從太祖渡河拔黎陽李固臨河等鎮至内黄破魏軍萬餘衆獲其將周儒等十人李罕之引并人圍張全義于河陽從周與丁會張存敬牛存節率兵赴援大破并軍殺蕃漢二萬人解河陽之圍以功表授檢校工部尚書從朱珍討徐州拔豐縣敗時溥于呉康得其輜重加檢校刑部尚書佐龎師古討孫儒于淮南略地至廬壽滁等州下天長高郵破邵伯堰廻軍攻濠州殺刺史魏勲得餉船十隻大順元年八月并帥圍潞州太祖遣從周率敢死之士夜銜枚犯圍而入㑹王師不利于馬牢州即棄上黨而歸其年十二月與丁會諸將討魏州連收十邑明年正月大破魏軍于永定橋魏軍五敗斬首萬餘級十月佐丁㑹攻宿州從周壅水灌其城刺史張筠以郡降從討兗州破朱瑾之軍于馬溝景福二年二月與諸將大破徐兗之兵于石佛山八月與龎師古同攻兖州乾寜元年三月軍至新太縣朱瑾令都將張約李胡椒率三千人來拒戰師古遣從周張存敬掩襲生擒張約李胡淑等都將數十人二年十月圍兗州兖人不出從周詐掦言并人鄆人來救即引軍趨高呉夜半却潛歸寨朱瑾果出兵攻外壕我軍士突出掩殺千餘人生擒都將張漢筠從周累立戰功自懷州刺史厯曹宿二州刺史累遷檢校左僕射三年五月并帥以大軍侵魏遣其子落落率二千騎屯洹水從周以馬歩二千人擊之殺戮殆盡擒落落于陣并師號泣而去遂自洹水與龎師古渡河擊鄆四年正月下之從周乗勝伐兖㑹朱瑾出師在徐境其將康懷英以城降以功授兖州留後檢校司空玉堂閑話云葛侍中鎮兖之日威名著于敵中河北諺曰山東一條葛無事莫撩撥復領兵萬餘人渡淮討楊行密至濠州聞龎師古清口之敗遽班師光化元年四月率師經略山東時并師以大軍屯邢洺從周至鉅鹿與并軍遇大破之并帥遁走我軍追襲至青山口數日之内邢洺磁三州連下斬首二萬級獲将吏一百五十人即以從周兼領邢州留後十月復破并軍五千騎于張公橋晉將李嗣昭急破邢州陣于城門外從周大破之擒蕃將賁金鐵慕容騰百餘人二年春幽州劉仁恭率軍十萬㓂魏州屠貝郡從周自邢臺馳入魏州燕軍突上水關攻館陶門從周與賀徳倫率五百騎出戰謂門者曰前有敵不可返顧命盍其門從周等極力死戰大敗燕人擒都將薛突厥王郃郎等翼日破其八寨追擊至臨清劉仁恭走滄州從周授宣義軍行軍司馬五月并人討李罕之于潞州太祖以丁㑹代罕之令從周馳入上黨七月并人陥澤州太祖召從周令賀徳倫守潞州徳倫等尋棄城而歸三年四月領軍討滄州先攻徳州下之及進攻孚陽幽州劉仁恭大舉來援時都監蔣𤣥暉謂諸將曰吾王命我䕶軍志在攻取今燕帥來赴不可外戰當縱其入壁聚食囷廩力屈糧盡必不可取也從周對曰兵在機機在上將非督䕶所言也乃令張存敬氏叔琮守其寨從周逆戰于乾寜軍老鵶堤大破燕軍斬首三萬獲將佐馬慎交已下百餘人奪馬三千匹八月并人攻邢洺從太祖破之從周追襲至青山口斬首五千級獲其將王郃郎楊師恱等得馬千匹表授檢校太保兼徐州兩使留後尋為兖州節度使天復元年三月與氏叔琮討太原從以兖鄆之衆自土門路入與諸軍會于晉陽城下以糧運不給班師頃之從周染疾㑹青州將劉鄩陥兖州太祖命討之遂力疾臨戎三年十一月鄩舉城降以功授檢校大傅太祖以從周抱疾既乆命康懐英代之授左金吾上將軍以風恙不任朝謁改右衞上將軍致仕養疾偃師縣亳邑鄉之别墅頃之授太子太師依前致仕末帝即位制授潞州節度使令坐食其俸加開府儀同三司檢校太師兼侍中封陳留郡王累食邑至七千户命近臣賫旌節就别墅以賜之貞明初卒于家册贈太尉謝彦章許州人㓜事從周為養父從周憐其敏慧教以兵法常以千錢于大盤中布其行陣偏伍之狀示以出没進退之節彦章盡得其訣及壯事太祖為騎將末帝嗣位用為兩京馬軍都軍使累與晉軍接戰有功尋領河陽節度使及從周卒臨喪行服躬預葬事時人義之彦章後為許州節度使檢校太傅貞明四年冬滑州節度使賀瓌為北面招討使彦章為排陣使同領大軍駐于行臺寨與晉人對壘彦章時領騎軍與之挑戰晉人或望我軍行陣整肅則相謂曰必兩京太傅在此也不敢以名呼其為敵人所憚如此是時咸謂賀瓌能將歩軍彦章能領騎士既名聲相軋故瓌心忌之一日與瓌同設伏于郊外瓌指一方地謂彦章曰此地岡阜隆起中央坦夷好列栅之所尋而晉人舎之故瓌疑彦章與晉人通又瓌欲速戰彦章欲持重以老敵人瓌益疑之㑹為行營馬歩都虞候朱珪所誣瓌遂與珪協謀因享士伏甲以殺彦章及濮州刺史孟審澄别將候温裕等于軍以謀叛聞晉王聞之喜曰彼將帥如是亡無日矣審澄温裕亦善將騎軍然所領不過三千騎多而益辦惟彦章有焉將略之外好優禮儒士與晉人對壘于河上恒褒衣博帯動皆由禮或臨敵御衆則肅然有上將之威毎敦陣整旅左旋右抽雖風馳雨驟亦無以喻其迅捷也故當時騎士咸樂為用及其遇害人皆惜之胡真江陵人也體貌洪壯長七尺善騎射少為縣吏及在巢㓂中㓂推為名將隨巢渉淮浙䧟許洛入長安及太祖以衆歸唐真時為元從都將通鑑云温見巢兵勢日蹙知其將亡親將胡真謝瞳勸温歸國從至梁苑表授檢校刑部尚書頻從破巢蔡于陳鄭間尋以竒兵襲取滑州乃署為滑州節度使留後復表為鄭滑節度使檢校右僕射數年徴為右金吾衛大將軍俄拜寜遠軍節度使容州刺史檢校太保卒贈太傅張歸霸字正臣清河人祖進言陽榖令父實亦有宦緒少倜儻好兵術唐乾符中㓂盜蜂起歸霸率昆弟三人棄家投黄巢頗以勇略聞巢陥長安遂署為左畨功臣中和中巢領徒走宛丘時太祖在汴奉詔南討巢黨日窘歸霸昆仲與葛從周李讜等相率來降尋補宣武軍劇職光啟二年與蔡將張存戰于盧氏三年夏又與蔡將盧瑭戰于雙丘復與秦宗賢戰于萬勝皆敗而殱之翼日宗權遣將張郅來㓂列寨于赤堈一日出騎將較勝歸霸為飛戈所中即拔馬却逸控弦一發賊洞頸而墜遂兼騎而還太祖時于高丘下瞰備見其狀面加賞激厚以金帛及所獲馬錫之又嘗被命以控弦之士五百人伏于壕内太祖統數百騎稍逼其寨蔡人果以鋭士摩壘來追歸霸發伏兵掩殺千餘人奪馬數十匹尋奏授檢校左㪚騎常侍其後從太祖代鄆副李唐賔渡淮咸著竒績文徳初大軍臨蔡州賊將蕭顥來斫寨歸霸與徐懷玉各以所領兵自東南二扉分出合勢殺賊蔡人大敗及太祖整衆離營㓂塵已息太祖召至賞之曰昔耿弇不俟光武擊張歩言不以賊遺君父弇之功爾其二焉大順中郭紹賔拔曹州歸霸提兵數千守之俄而朱瑾統大軍自至歸霸與丁㑹逆擊之于金鄉瑾大敗擒賊將宗江等七十餘人曹州以寜明年破濮州生擒刺史邵儒又佐葛從周與晉軍戰于洹水生獲克用愛子落落復與燕人戰于内黄殺仁恭兵三萬餘衆戎績超特居諸將之右累官至檢校左僕射光化二年權知邢州事明年春李嗣昭以蕃漢五萬來㓂歸霸堅壁設備晉軍不敢顧其城遂移軍攻洺州陥焉時太祖在滑頗慮邢之失守及葛從周復洺嗣昭北遁歸霸出兵襲之殺二萬餘衆捷至賞錫殊等旋以功奏加檢校司空天祐初遷萊州刺史秩滿授左衛上將軍又除曹州刺史其秋加檢校司徒副劉知俊禦邠鳯之㓂敗之太祖受禪拜右龍虎統軍改左驍衛上將軍充河陽諸軍都指揮使明年夏六月就除河陽節度使檢校太保尋加同平章事二年秋七月卒于位詔贈太傅梁末帝徳妃張氏即歸霸女也末帝嗣位以歸霸子漢鼎漢傑並為近職漢鼎早亡漢傑貞明中為控鶴指揮使領兵討惠王于陳州擒之當貞明龍徳之際漢傑昆仲分掌權要藩鎮除拜多出其門叚凝因之遂竊兵柄及莊宗入汴漢傑與兄漢倫弟漢融同日伏誅于汴橋下張歸厚字徳坤通鑑攷異引梁功臣列傳云歸厚祖興父處讓少驍勇有機略尤長于弓槊之用中和末與兄歸霸自巢軍相率來降太祖署為軍校時淮而兵力方壯太祖之師尚寡歸厚以少擊衆往無不㨗光啟三年春與秦宗賢戰于萬勝大破之其夏蔡將張晊以數萬衆屯于赤堈歸厚嘗與晊單騎鬬于陣晊不能支而奔師徒乗此大捷太祖大悦立署為騎軍長仍以鞍馬器幣錫之及佐朱珍討時溥寨于豐蕭之間歸厚乗徐壘如行坦途甚為諸將歎伏龍紀初奏遷檢校工尚尚書其年冬復伐徐歸厚以偏師逕進至九里山下與徐兵遇時我之叛將陳璠在賊陣中歸厚忽見之因嗔目大罵單馬直往期于必取㑹飛矢中左目而退徐戎甚衆莫敢追之大順元年奏加檢校兵部尚書又命統親軍是歲郴王遷寨未知所往忽逢兖鄆賊㓂甚衆太祖亟登道左高阜以觀之命歸厚領所部㕔子馬直突之出没二十餘合賊大敗將北而救軍雲至歸厚即綴賊若戰請太祖以數十騎先還時歸厚所乗馬中流矢而踣乃持槊歩鬬漸退賊不敢逼太祖至寨亟命張筠劉儒飛騎來迎然謂已殁矣歸厚體被二十餘箭尚復拒戰筠等既至賊解乃歸太祖見之撫背泣下曰得歸厚身全縱廣喪戎馬何足計乎便令肩㫒歸汴日降問賚恩㫖甚厚尋遷中軍指揮使景福初從太祖伐鄆帝軍不利太祖為㓂所逼歸厚殿馬翼衛左右馳射矢發如雨賊騎千百披靡而退明年與葛從周禦晉軍于洹水殊績尤著詔加檢校右僕射其後討滄州復洺州咸以功聞太祖録其勲命權知洺州事是郡嘗兩為晉人所陥井邑蕭條歸厚撫之數月之内民庶翕然太祖自鎮定還覩其緝理之政大喜賞之天復元年冬真拜洺州刺史加檢校左僕射尋授絳州刺史三年秋改晉州刺史乃檢校司空唐帝遷都洛陽除右神武統軍天祐二年改左羽林統軍與徐懐玉同守澤州時晉軍五萬來攻郡中戎士甚寡歸厚極力拒守并軍乃還太祖受禪加檢校司空開平二年夏劉知俊以同州叛歸厚副楊師厚劉鄩等討平之秋軍還授亳州團練使乾化元年拜鎮國軍節度使陜虢等州觀察處置等使明年夏以疾卒于位詔贈太祖子漢卿張歸弁字從冕始與兄歸霸歸厚同歸太祖得置為牙校時太祖初鎮宣武屢命歸弁結好于近境頗得行人之儀乾寕中以偏師佐葛從周禦并軍于洹水光啟中又佐張存敬與燕人戰于内黄積前後功表授檢校工部尚書大順初攻兖鄆命歸弁佐衡王友謙屯單父軍聲大振尋為齊州指揮使屬青帥王師範叛遣將詐為賈人挽車數十乗匿兵器于其中將謀竊發歸弁察而擒之州城以寜明年春青冦大舉來伐州兵既寡民意頗揺有本郡都將康文爽等三人欲謀外應即時擒獲誅之人心遂定歸弁又罄發私帑賞給士伍青人遂遁青州平超加檢校右僕射遥領愛州刺史從征荆襄迴轉檢校左僕射天祐三年春太祖入魏誅牙軍魏之郡邑多叛歸弁與諸將等分布攻討封境悉平而歸弁于高唐攻賊太猛飛矢中于臆太祖嘉之命賜鞍勒馬一匹金帶一條夏五月命權知晉州冬十一月真授晉州刺史加檢校司空太祖受禪改滑州長劒指揮使開平二年秋九月并軍圍平陽詔歸弁統兵救之軍至解其圍加檢校司徒三年春三月寢疾卒于滑州之私第子漢融史臣曰從周以驍武之才事雄猜之主而能取功名于馬上啟手足于牖下静而言之斯為賢矣彦章蔚有將才死于讒口身既没矣國亦隨之惜哉歸霸昆仲皆脫身于巨盜之流宣力于興王之運由介胄而析圭爵可不謂壯夫與舊五代史巻十六
