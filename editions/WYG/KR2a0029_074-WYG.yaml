body:
  text: 舊五代史巻三十六考證唐明宗紀二西都知府張籛張籛原本作張鏐今據通鑑改正故萬州司户朱友謙萬州原本作萭州今據歐陽史改正樞密承旨段佪段佪九國志作段懷攷歐陽史及通鑑並作段佪今仍其舊正衙威容正衙原本訛王衛今據冊府元龜改正是日塟莊宗于雍陵雍陵原本作永陵攷徐無黨五代史注莊宗陵名雍陵石晉時避諱稱伊陵原本永字誤今改正又莊宗塟日通鑑從哀冊文作丙子是書從實録作乙亥改王參之本名案王參疑有舛誤据冊府元龜引薛史亦作參今無可攷姑仍其舊舊五代史巻三十六考證
