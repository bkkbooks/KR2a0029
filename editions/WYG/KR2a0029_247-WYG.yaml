body:
  text: 舊五代史巻一百二十四攷證周列傳四王殷傳瀛洲人案歐陽史作大名人劉詞傳轉劒直指揮使案歐陽史作長劒指揮使贈中書令案歐陽史作贈侍中据是書則詞以兼侍中贈中書令非贈侍中也疑歐陽史誤史彦超傳與龍㨗都指揮使何徴戌晉州案歐陽史作彦超遷虎㨗都指揮使與是書異史懿傳本名犯太祖廟諱故改焉案本名二句疑為後人竄入考史懿名匡懿避太祖御名故去匡字薛史成于開寳六年不應預稱為太祖或係宋人讀是書者附注于後遂混入正文也舊五代史巻一百二十四攷證
