body:
  text: 舊五代史巻八十二攷證晉少帝紀二以青州節度使楊光逺謀叛故也案楊光逺反五代春秋作十一月與是書作十二月異歐陽史從是書乙亥滄恒貝鄴馳告契丹前鋒趙延壽趙延昭引五萬馳入冦將及甘陵案歐陽史作甲戌朔契丹冦滄州據遼史云甲戌朔趙延壽延昭率前鋒五萬騎次任丘與歐陽史合太原奏契丹入雁門圍忻代二州案通鑑契丹入雁門不書日遼史作丙子入雁門圍忻代乙酉車駕發東京丁亥敵騎至黎陽案歐陽史作丙戌契丹冦黎陽辛卯鄴都留守張從恩遣人夜縋城間行奏契丹主以鐡騎三四萬建牙帳于元城以趙延壽為魏博節度使改封魏王案遼史己丑次元城授延壽魏博節度使封魏王率所部屯南樂葢遼人屯于元城自在己丑晉人至辛卯始得奏聞也歐陽史作辛卯契丹屯于元城趙延壽冦南樂殊誤己亥遣譯語官孟守忠致書于契丹主求修舊好案遼史云辛丑晉遣使來修舊好詔割河北諸州及遣桑維翰景延廣來議與是書微異鄧州奏博州刺史周儒以城降契丹案博州刺史周儒降于契丹歐陽史通鑑契丹國志俱作正月是書及遼史作二月舊五代史巻八十二攷證
