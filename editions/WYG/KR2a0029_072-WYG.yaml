body:
  text: 舊五代史巻三十五攷證唐書明宗紀三代祖諱敎敎原本作敖今據五代㑹要改正皇考諱霓歐陽史云父電未知孰是襲破李存信於莘縣莘縣原本作華縣今據新唐書藩鎮𫝊改正柏鄉之役柏鄉原本訛松鄉今據通鑑改正吾當與天皇較力耳天皇原本作人皇攷遼史太祖稱為天皇讓宗追稱人皇莊宗初年侵幽州者乃太祖非讓宗也今改正十二月契丹入冦三年正月帝領兵破契丹于涿州案歐陽史云冬契丹侵漁陽嗣源敗之於涿州入冦破敵皆作冬間事盖順文併叙之耳當以是書為徴實請令公帝河北河北原本作河中今據通鑑改正獲官馬二千匹案歐陽史作掠小坊馬三千匹四月丁亥朔案丁亥朔與莊宗紀異據莊宗紀三月丁未朔則四月當作丁丑據此紀下文有已丑甲午則當作丁亥前後參差未詳孰是已丑案通鑑作乙丑疑傳冩之訛歐陽史從是書作已丑以樞密副使孔循為樞密使案歐陽史作左驍衞大將軍孔循為樞密使呉縝纂誤云孔循傳作左衞大將軍為樞密使俱與是書異按巴堅舊作阿保機今改舊五代史巻三十五攷證
