body:
  text: 舊五代史巻四十攷證唐明宗紀六贊年五歲黙念論語孝經案宋史作贊七歲誦書二十七巻宜賜别勅及第附今年春牓案宋史云特賜童子及第附長興三年禮部春牓是書作天成四年春牓與宋史異二月乙已王晏球奏此月三日收復定州案歐陽史作二月癸卯王晏球克定州與是書合通鑑作癸丑攷癸丑非二月三日也疑𫝊冩之誤禁鐡鑞錢鐡鑞錢通鑑作鐡錫錢攷胡三省注云馬殷得湖南鑄錫為錢本用之境内其後遂流入中國疑原本鑞字誤攷册府元龜亦作鐡鑞錢今仍其舊以端明殿學士趙鳯為門下侍郎兼工部尚書平章事案歐陽史本紀作端明殿學士尚書兵部侍郎趙鳯為門下侍郎兼工部尚書同平章事趙鳯𫝊作禮部侍郎與本紀異見吴縝纂誤伏以少帝今不入廟難以言宗案舊唐書哀帝紀云中書奏少帝行事不合稱宗攷五代㑹要天成二年博士吕明龜議引君不逾年不入宗廟之禮請别立廟于園陵故不稱景宗非議其行事有失也舊唐書誤丙辰權知荆南府事高從誨上章首罪丙辰通鑑作庚申使副劉玫劉玫通鑑作韓玫徹伯爾舊作掣撥今改托諾舊作秃餒今改紐赫羙稜舊作捺括梅里今改郭濟舊作骨至今改舊五代史巻四十考證
