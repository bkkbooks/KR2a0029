body:
  text: 舊五代史巻一百四十七攷證志九刑法志統類編敕統類原本訛統数今据文獻通考改正倉部郎中倉部原本訛臧部今據新唐書百官志改正前濮州録事參軍崔琮崔琮原本作崔瑽今据冊府元龜改正相州莭度使桑維翰相州原夲訛松州今据通鑑改正團判官團判官疑當作團練判官考五代㑹要亦作團判官今姑仍其舊舊五代史巻一百四十七攷證
