body:
  text: 舊五代史巻一百一宋門下侍郎參知政事監修國史薛居正等撰漢書第三𨼆帝紀上𨼆皇帝諱承祐高祖第二子也母曰李太后以唐長興二年嵗在辛卯三月七日生帝于鄴都之舊第高祖鎮太原署節院使累官至檢校尚書右僕射國初授左衛大將軍檢校司空遷大内都㸃檢檢校太保乾祐元年正月二十七日高祖崩祕不發喪二月辛已授特進檢校太尉同平章事封周王宣制畢有頃召文武百寮赴萬嵗殿内降大行皇帝遺制云周王承祐可于柩前即皇帝位服紀日月一依舊制是日内外發哀成服初高祖欲改年號中書門下進擬乾和二字高祖改為乾祐至是與御門相符甲申羣臣上表請聽政詔答不允凡四上表從之丁亥帝于萬嵗殿門東廡下見羣臣尊母后為皇太后已丑徐州節度使王周卒庚寅以前晉州畱後劉在明為鎮州畱後幽州馬步軍都部署加檢校太尉是日工部尚書龍敏卒壬辰右衛大將軍王景崇奏于大散關大敗蜀軍俘斬三千人初契丹犯京師侯益趙贊皆受其命節制岐蒲聞高祖入洛頗懷反仄朝廷移贊于京兆侯益與贊皆求援于蜀蜀遣何建率軍出大散關以應之至是景崇糾合岐雍邠徑之師以破之癸已制大赦天下自乾祐元年二月十三日昧爽已前所犯罪人已結正未結正已發覺未發覺常赦所不原者咸赦除之中外文武臣寮並與加恩馬步將士各賜優給唐晉兩朝求訪子孫立為二王後云丙午鳳翔巡檢使王景崇遣人送所獲偽蜀將校軍士四百三十八人至闕下詔釋之仍各賜衣服以兵部侍郎張允為吏部侍郎以工部侍郎司徒詡為禮部侍郎丁未以光禄卿李式為尚書右丞以禮部侍郎邊歸讜為刑部侍郎以刑部侍郎盧價為兵部侍郎三月甲寅帝始御廣政殿羣臣起居殿中少監胡崧上言請禁斫伐桑棗為薪城門所由專加捉搦從之丙辰鄴都畱守太制中書令臨清王高行周進封鄴王北京畱守檢校太尉同平章事劉崇加宋州節度使兼侍衛親軍馬步軍都指揮使檢校太尉同平章事史𢎞肇並加檢校太師兼侍中前邢州節度使安叔千以太子太師致仕戊午以右諫議大夫于德辰為兵部侍郎庚申河中節度使檢校太師兼中書令李守貞加守太傅進封魯國公襄州節度使檢校太師兼中書令虢國公安審琦加守太保進封齊國公兖州節度使檢校太師兼侍中岐國公符彦卿加兼中書令進封魏國公許州節度使兼侍衛親軍副都指揮使檢校太尉同平章事劉信加檢校太師壬戌以宰臣竇貞固為山陵使吏部侍郎叚希堯為副使太常卿張昭為禮儀使兵部侍郎盧價為鹵簿使御史中丞邊蔚為儀仗使丙寅以前鳳翔節度使兼西南面兵馬都部署檢校太師兼侍中侯益為開封尹加兼中書令宋史侯益傳益率數十騎奔入朝𨼆帝遣侍臣問益連結蜀軍之由益對曰臣欲誘之出闗掩殺之且隠帝笑之益厚賂史𢎞肇輩言王景崇之横恣諸權資深庇䕶之乃授以開封尹兼中書令西京畱守檢校太師平章事莒國公李從敏夏州節度使檢校太師同平章事李彛殷並加兼侍中青州節度使檢校太尉同平章事劉銖鄆州節度使檢校太尉同平章事慕容彦超並加檢校太師詔改廣晉府為大名府晉昌軍為承興軍戊辰靈州節度使檢校太師同平章事馮暉加兼侍中河陽節度使武行德滄州節度使王華景州節度使侯章晉州節度使王晏並依前檢校太尉加同平章事庚午徑州節度使史懿潞州節度使常思同州節度使張彦威延州節度使髙允權並依前檢校太尉加同平章事澶州節度使郭從事邢州節度使薛懷讓並自檢校太傅加檢校太尉以前奉國右廂都指揮使王饒為鄜州畱後甲戌以邠州節度使檢校太尉同平章事王守恩為永興軍節度使加檢校太師以滑州節度使檢校太尉郭謹為邠州節度使以前鎮州畱後檢校太傅白再筠為滑州節度使加檢校太尉以陜州節度使檢校太尉同平章事趙暉為鳯翔節度使以前河中節度使檢校太尉同平章事白文珂為陜州節度使殿中監任延浩配流鄜州坐為劉崇所奏故也丙子鄧州節度使劉重進相州節度使王繼𢎞安州節度使楊信並自檢校太傅加檢校太尉以鎮州畱後兼幽州一行馬步軍都部署檢校太傅劉在明為鎮州節度使加檢校太師部署如故貝州節度使檢校太𫝊李殷加檢校太尉定州節度使檢校太尉孫方簡府州節度使檢校太傅折從阮並加檢校太師丁丑中書侍郎兼戸部尚書平章事李濤罷免勒歸私第時蘇逄吉等在中書樞密使楊邠副樞密使郭威等權勢甚盛中書毎有除授多為邠等所抑濤不平之因上疏請出邠等以藩鎮授之樞密之務宜委逄吉禹珪疏入邠等知之乃見太后泣訴其事太后怒濤由是獲譴先是中書厨釡鳴者數四未幾濤罷免西道諸州奏河中李守貞謀叛發兵據潼關夏四月辛已陜州兵馬監押王玉奏収復潼關定州孫方簡奏三月二十七日契丹棄定州遁去壬午以樞密使楊邠為中書侍郎兼吏部尚書平章事使如故以副樞密使郭威為樞密使加檢校太尉三司使王章加檢校太尉同平章事郢州刺史尹實奏荆南起兵在境上欲攻城是日以澶州節度使郭從義為永興軍一行兵馬都部署時供奉官時知化王益自鳳翔部署前永興節度使趙贊部下牙兵趙思綰等三百餘人赴闕三月二十四日行次永興思綰等作亂􅊳入府城據城以叛故命從義帥師以討之甲申王景崇奏趙思綰叛見起兵攻討丁亥幸道宫佛寺禱雨戊子東南面兵馬都元帥兩浙節度使檢校太師兼中書令呉越國王錢𢎞倧加諸道兵馬都元帥天策上將軍湖南節度使檢校太師兼中書令楚王馬希廣加守中書令以陜州節度使白文珂為河中府城下一行都部署庚寅宰臣竇貞固蘇逄吉蘇禹珪並進封開國公辛卯削奪李守貞在身官爵甲午以翰林學士承㫖户部侍郎王仁裕為户部尚書以翰林學士左散騎常侍張沆為工部尚書以翰林學士中書舍人范質為戸部侍郎以樞密直學士尚書比部員外郎王度為祠部郎中並依前充職以侍衛步軍都指揮使尚洪遷充西南面行營都虞侯以客省使王峻為西南面行營兵馬都監戊戌以宣徽南院使扈彦珂為左金吾上將軍庚子以左金吾大將軍充兩街使檢校太傅劉承贇為徐州節度使甲辰以宣徽北院使薛可言為右金吾上將軍以皇城使李暉為宣徽南院使乙已定州節度使孫方簡奏復入于本州初方簡為狼山寨主叛晉歸契丹及契丹降中渡之師乃以方簡為定州節度使契丹主死永康王嗣位即以蕃將耶律忠代之移方簡為雲州節度使方簡不受命遂歸狼山高祖至闕方間歸欵復以中山命之是嵗三月二十七日契丹棄定州隳城壁焚室廬盡驅人民入蕃惟餘空城瓦礫而已至是方簡自狼山囬保定州是月河决原武縣河北諸州旱徐州餓死民九百三十有七五月已酉朔國子監奏周禮儀禮公羊榖梁四經未有印板欲集學官考校雕造從之已未囘鶻遣使朝貢丁卯前翰林學士徐臺符自幽州逃歸乙亥河決滑州魚池六月戊寅朔日有食之庚辰以内客省使王峻為宣徽北院使依前永興城下兵馬都監以冀州牢城指揮使張廷翰為冀州刺史時廷翰殺本州刺史何行通自知州事故有是命甲申以皇弟右衛大將軍勲為興元節度使檢校太尉同平章事豐州節度使郭勲加檢校太師辛卯永興兵馬都部署郭從義奏得王景崇報有兵自隴州來欲投河下追襲至鄜城荆南節度使髙從誨上表歸命從誨嘗拒朝命至是方遣牙將劉扶詣闕請罪丙申鎮州奏節度使劉在明卒戊戌以河陽節度使武行德為鎮州節度使以宣徽南院使李暉為河陽節度使以相州節度使王繼𢎞為貝州節度使壬寅荆南高從誨入貢謝恩釋罪丙午以前永興軍節度使王守恩為西京畱守是月河北旱青州蝗秋七月戊申朔相州節度使王繼𢎞殺節度叛官張易以訛言聞是時法尚深刻藩郡凡奏刑殺不䆒其實即順其請故當時從事鮮賔客之禮重足一跡而事之猶不能免其禍焉壬子以工部侍郎李榖充西南面行營都轉運使乙卯禮儀使張昭上高祖廟尊號獻舞名并歌辭舞曲請以觀德為名歌辭不録丙辰以久旱幸道宫佛寺禱雨是日大㴻開封言陽武雍丘襄邑三縣蝗為鸜鵒聚食詔禁捕鸜鵒庚申樞密使郭威加同平章事辛酉滄州上言自今年七月後幽州界投來人口凡五千一百四十七北土饑故也乙丑以宣徽北院使王峻為宣徽南院使以内客省使呉䖍裕為宣徽北院使戊辰以遂州節度使兼侍衞親軍馬軍都指揮李洪信為澶州節度使以澶州節度使郭從義為永興軍節度使兼行營都部署庚午故兵部尚書李懌贈尚書左僕射鎮州奏凖詔處斬節度副使張鵬訖鵬以一言之失為鄴帥高行周所奏故命誅之乙亥新授鳳翔節度使趙暉奏與八作使王繼濤領部下兵同赴鳳翔時王景崇拒命故也八月已卯以華州節度使侯章為邠州節度使以左金吾上將軍扈彦珂為華州節度使壬午命樞密使郭威赴河中府軍前詔河府永興鳳翔行營諸軍一稟威節制時李守貞王景崇趙思綰連衡作叛朝廷雖命白文珂常思攻討河中物議以二帥非守貞之敵中外憂之及是命之降人情大愜癸巳以奉國左廂都指揮使閬州防禦使劉詗為䕫州節度使充侍衞步軍都指揮使兼河中行營都虞候以䕶聖左廂都指揮使岳州防禦使李洪義為遂州節度使充侍衞馬軍都指揮使乙未兩浙節度使檢校太尉兼侍中呉越國王錢𢎞俶加檢校太師兼中書令東南面兵馬都元帥𢎞俶故呉越王元瓘之子也先是其兄𢎞倧襲父位㝷為部下所廢以𢎞俶代之故特加是命焉新授鳳翔節度使趙暉奏部署兵士赴鳳翔城下癸卯郭威奏今月二十三日大軍已抵河府賊城至二十六日開長連塹畢築長連城次九月戊申侯益部曲王守筠自鳳翔來奔言益家屬盡為王景崇所害壬子郭威奏破河府賊軍于城下甲寅故䕫州節度使兼侍衞步軍都指揮使尚洪遷贈太尉乙丑雪書不時也戊辰鳳翔都部署趙暉奏大破川軍于大散關殺三千餘人其餘棄甲而遁隆平集藥元福從趙暉進討兵衆寡數倍他將皆為郤元福擁數百騎獨出令日敢囘頭者斬衆效死以戰遂有成功壬申郭威奏得郭從義報今月十四日鳳翔王景崇兵士離本城尋遣監軍李彦從率兵襲至法門寺西殺戮二千餘人詔陞河中府解縣為解州冬十月丙子朔山陵使竇貞固上大行皇帝陵名曰睿陵從之丁丑夕嵗星入太㣲戊寅趙暉奏破王景崇賊軍于鳳翔城下甲申吐蕃遣使獻方物丙戌右羽林將軍張播停任坐檢田受請託也丁亥中書舍人張誼責授房州司戸兵部郎中馬承翰責授慶州司戸並員外置所在馳驛發遣先是誼與李翰俱銜命于兩浙覩其驕僭之失形于譏誚兼乘醉有輕肆之言錢宏俶恥之摭其過以奏之朝廷以方務懷柔故有是命甲辰延州奏夏州李􅃔殷先出兵臨州境欲應接李守貞今郤抽退十一月甲寅誅太子太傅李崧及其弟司封員外郎嶼國子博士㠖夷其族為部曲誣告故也詔曰稔惡圖危難逃天網虧忠負義必速神誅李崧頃在前朝最居重危略無禆益遂至滅亡及事契丹又為親密士民俱憤險佞可知先皇帝含垢掩瑕推恩念舊擢居一品俾列三師不謂潛有包藏謀危社稷散差人使潛結奸兇俯近山陵擬為叛亂按其所告咸已伏辜宜正典章用懲奸逆其李崧李嶼李㠖一家骨肉及同謀作亂人並從極法云庚申大行皇帝靈駕進發辛酉荆南奏節度使高從誨卒壬申葬髙祖皇帝于睿陵十二月丁丑荆南節度副使檢校太傅行峽州刺史高保融起復授荆南節度使檢校太尉同平章事渤海郡侯壬午帝被衮冕御崇元殿授六廟寳冊正使宰臣蘇禹珪使副大府卿劉曍赴西京行禮兖州奏淮賊先于沂州界立栅首月十七日已歸海州為李守貞牽制也南唐書嗣主六年李守貞遣從事朱元李平奉表來乞師以潤州李金全為西面行營招撫使夀州劉彦貞為副諫議大夫查文徽為監軍使兵部侍郎魏岑為沿淮巡撫使河中平遽班師又李金全傳云出師沐陽諸將鋭于進取金全獨以為逺不相及乃止庚寅奉高祖神主于西京太廟淮南偽主李璟奉書于帝云先因河府李守貞求援又聞大國㳂淮屯軍當國亦于境上防備昨聞大朝収軍當國尋已徹備其商旅請依舊日通行朝廷不報辛卯羣臣上表請以三月九日誕聖日為嘉慶節從之延州節度使高允權奏得都頭李彦李遇等告太子太師致仕劉景巖與鄉軍指揮使髙志結集草宼欲取臘辰窺圖州城㝷請使臣與指揮使李勲聊將兵士巡檢偵邏劉景巖果出兵鬭敵時即殺敗其劉景巖㝷獲斬之詔曰劉景巖年已衰暮身處退閒曾無止足之心輒肆包藏之毒結集徒黨窺同藩垣所賴上將輸忠三軍恊力盡除醜𩔖克殄渠魁其劉景巖次男前德州刺史行琮己行極法長男渭州刺史行謙孫男邢州馬軍指揮使崇勲特放是冬多昏霧日晏方解舊五代史巻一百一
