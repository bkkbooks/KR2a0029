body:
  text: 舊五代史巻二十二攷證列傳十二梁楊師厚傳晉軍扼䝉阬之險阬原本作􅖺考通鑑注云䝉阬在汾水之東東西三百餘里蹊徑不通即此處也今改正晉人乃徹圍而遁案通鑑攷異引梁實録云生擒賊將蕭萬通等賊由是棄寨而遁莊宗實録云汴軍至䝉阬周徳威逆戰敗之二軍各言勝㨗其互異如此通鑑從是書牛存節傳牛存節字贊貞贊貞原本作替貞夏文莊集引是書又作潜真今據歐陽史改正大破賊于浿河浿河原本訛􅯤河今據歐陽史及通鑑改正存節訓勵部分以禦追冦遂得旋師案舊唐書作牛存節一軍以先渡獲免與是書所云追冦旋師異末帝令率軍屯陽畱案陽畱即楊劉見通鑑攷異又攷李重進碑作楊留新唐書作楊劉葢地名通用王檀傳補衝山都虞候衝山原本訛衡山今㨿歐陽史改正舊五代史巻二十二攷證舊五代史卷二十二攷證
