body:
  text: 舊五代史巻十六攷證梁列𫝊六葛從周𫝊破蔡賊王夏寨王夏原本作五夏今據通鑑改正從周詐揚言并人鄆人來救案通鑑朱瑾告急于河東李克用遣大將史儼李承嗣將數千騎假道于魏以救之是河東實遣師來授非從周詐言也此蓋覘知兖人告急乘并師尚未至乃揚言己至多方以誤之耳又本紀作十二月此作十月辦正巳見本紀養疾偃師縣亳邑鄉之别墅别墅原本作别堃今改正謝彦章傳必兩京太傅在此也兩京原本作西京今據通鑑改正張歸霸傳歸霸為飛戈所中飛戈歐陽史作飛矢張歸厚傳命歸厚領所部㕔子馬㕔子馬原本作厲子馬攷通鑑注㕔子都係當時軍旅之名今改正與葛從周禦晉軍于洹水葛從周原本作郭從周今據通鑑改正舊五代史巻十六攷證
