body:
  text: 舊五代史巻十二考證梁宗室列𫝊二友誨𫝊後為唐兵所殺案王禹偁五代史闕文莊宗即位盡誅朱氏是書與歐陽史俱同惟通鑑云梁王召友誨與其兄友諒友能竝幽于别第及唐師將至梁主疑諸兄弟乘危謀亂并皇弟賀王友雍建王友徽盡殺之未知所據宻王友倫傳因引兵往八議闗案八議原本訛作八識今據通鑑改正于是存追封朗王友寧追封安王友倫追封宻王案五代㑹要開平二年追封皇從子友寧為安王友倫為宻王四年追封皇兄存為朗王據是書作一時竝封未知孰是郴王友裕傳遂以數騎遁于山中案數騎通鑑作二千騎歐陽史與是書同康王友孜傳案友孜通鑑及五代會要作友敬惟歐陽史與是書同舊五代史巻十二考證
