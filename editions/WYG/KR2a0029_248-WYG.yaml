body:
  text: 舊五代史巻一百二十五宋門下侍郎參知政事監修國史薛居正等撰周書第十六列傳五趙暉字重光澶州人也弱冠以驍果應募始隸于莊宗帳前與大梁兵經百餘戰以功遷馬直軍使同光中從魏王破蜀命暉分統所部南戍蠻服明宗即位徵還授禁軍指揮使晉有天下參掌衛兵從馬全節圍安陸佐杜重威戰宗城皆有功改奉國指揮使開運末以部兵屯于陜屬契丹入汴慨然有憤激之意及聞漢祖建義于并門乃與部将王晏侯章戮力叶謀逐契丹所命官屬據有陜州即時馳騎聞于漢祖通鑑契丹主賜趙暉詔即以為保義留後暉斬契丹使者焚其詔遣支使河間趙矩奉表晉陽漢祖乃命暉為保義軍節度陜虢等州觀察處置等使漢祖之幸東京路出于陜暉戎服朝于路左手控六飛達于行宫君臣之義如舊結焉旋加檢校太尉乾祐初移鎮鳳翔加同平章事屬王景崇叛據岐山及期不受代朝廷即命暉為西南面行營都部署統兵以討之時李守貞叛于蒲趙思綰據于雍與景崇皆逓相為援又引蜀軍出自大散關勢不可遏暉領兵數千數戰而勝然後塹而圍之暉屢使人挑戰賊終不出乃潜使千餘人于南城一舍之外擐甲執兵偽為蜀兵旗幟循南山而下詐令諸軍聲言川軍至矣須臾西南塵起城中以為信乃令數千人潰圍而出以為應援暉設伏而待一鼓而盡殪之自是景崇膽破不復敢出明年春拔之加檢校太保兼侍中國初就加兼中書令三年春拜章請覲詔從之入朝授歸徳軍節度使顯徳元年受代歸闕以疾告老授太子太師致仕進封秦國公尋卒于其第年六十七制贈尚書令王守恩字保信太原人父建立潞州節度使封韓王晉書有傳守恩以門䕃幼為内職遷懐衛二州刺史後歴諸衛将軍開運末契丹陷中原守恩時因假告歸于潞時潞州節度使張從恩懼契丹之盛将朝于戎王以守恩婚家甚倚信之乃移牒守恩請權為巡檢使從恩既去守恩以潞城歸于漢祖仍盡取從恩之家財通檻云從恩以副使趙行遷知留後牒守恩權巡檢使與髙防佐之髙防與守恩謀遣指揮使李萬超白晝率衆大譟斬趙行遷推守恩權知昭義留後守恩殺契丹使者舉鎮來降宋史李萬超傳云張從恩将棄城歸契丹會前驍衛将軍王守恩服喪私第從恩即委以後事遁去反契丹使至專領郡務守恩遂無所預萬超奮然謂其部下曰我輩垂餌虎口苟延旦夕之命今欲殺使保其城非止逃生亦足建勲業汝曹能乎衆皆躍然喜曰敢不唯命逆率所部大譟入府署殺其使推守恩為帥列状以聞漢祖從其請乃命史𢎞肇統兵先渡河至潞見萬超語之曰收復此州公之力也吾欲殺守恩以公為帥可乎萬超對曰殺契丹使以推守恩葢為社稷計耳今若賊害于人自取其利非宿心也𢎞肇大奇之漢祖即以守恩為昭義軍節度使漢有天下移鎮邠寧加同平章事乾祐初遷永興軍節度使時趙思綰已據長安及改授西京留守守恩性貪鄙委任羣小以掊斂為務雖病廢殘癃者亦不免其税率人甚苦之洛都嘗有豪士為二姓之會守恩乃與伶人數輩夜造自為賀客因獲百數笏而退太祖迥自河中駐軍于洛陽詔以白文珂代之守恩甚懼而洛人有曽為守恩非理割剥者皆就其第徵其舊物守恩一一償之及赴闕止奉朝請而已乾祐末既殺史𢎞肇等漢少帝召羣臣上殿以諭之時守恩越班而颺言曰陛下今日始睡覺矣其出言鄙俚如此國初授左衛上将軍顯徳初改右金吾衛上将軍封許國公二年冬舁疾歸洛而卒五代史補周髙祖為樞密鳳翔永興河中三鎮反髙祖帶職出討之迥戈路由洛陽時王守恩為留守以使相自專乗檐子迎髙祖于郊外髙祖遥見大怒且疾驅入于公館久之始令人傳㫖托以方浴守恩不知其怒但安坐俟久時白文珂在髙祖麾下召而謂曰王守恩乗檐子俟吾誠無禮也安可久為留守汝宜亟去代之文珂不敢違于是即時禮上頃之吏馳去報守恩曰白侍中受樞密命為留守訖守恩大驚奔馬而歸但見家屬數百口皆被逐于通衢中百姓莫不聚觀其亦有乗便號叫索取貸錢物者髙祖使吏籍其數立命償之家財為之一空朝廷悚然不甚為理孔知濬字秀川徐州滕縣人故太子太師致仕勍之猶子也父延緘左武衛大将軍致仕年九十餘卒知濬仕梁為天興軍使同光末勍鎮昭義時莊宗用唐朝故事以黄門為監軍皆恃恩暴横節将不能制明宗鄴城之變諸鎮多殺監軍時監潞者懼誅欲誘鎮兵謀變知濬伏甲于室凌晨監軍來謁執而殺之軍城遂寧明宗嘉之洎勍罷鎮以知濬為澤州刺史入為左驍衛大将軍長興清泰中歴唐復成三郡刺史晉髙祖即位用為奉國右廂都指揮使領舒州刺史從征范延光于鄴遷宿州團練使俄改隴州防禦使開運中移刺鳳州累官至檢校太傅河池據關防之要密邇卭蜀兵少勢孤知濬撫士得宜人皆盡力故西疆無牧圉之失契丹主稱制署滑州節度使漢祖受命自鎮入朝隠帝嗣位授密州防禦使踰歳以疾受代歸朝廣順三年冬卒于京師王繼𢎞冀州南宫人少嘗為盜攻剽閭里為吏所拘械繫于鎮州獄㑹赦免死配隸本軍時明宗作鎮致之麾下晉髙祖為明宗将署為帳中小校天福中為六軍副使性負氣不遜禁中與同列忿爭出配義州軍歳餘為奉國指揮使從契丹主至相州遂令以本軍戍守契丹主留髙唐英為相州節度使唐英善待繼𢎞每造其第則升堂拜繼𢎞之母贈遺甚厚倚若親戚又給以兵仗畧無猜忌㑹契丹主死漢祖趨洛唐英遣使歸欵漢祖大悦将厚待唐英使未迴繼𢎞與指揮使樊暉等共殺唐英繼𢎞自稱留後令判官張易奉表于漢祖人或責以見利忘義繼𢎞曰吾儕小人也若不因利乗便以求富貴畢世以來未可得志也及漢祖征杜重威至徳清軍繼𢎞來朝乃正授節旄是歳就加檢校太傅節度判官張易每見繼𢎞不法必切言之繼𢎞以為輕已乾祐中因事誣奏殺之尋又害觀察推官張制漢末移鎮貝州就加檢校太尉廣順初加同平章事三年六月移鎮河陽㑹永壽節入覲遇疾卒于京師詔贈侍中子永昌仕皇朝歴内諸司使馮暉魏州人也始為効節軍士拳勇騎射行伍憚之初事楊師厚為隊長唐莊宗入魏以銀槍効節為親軍與梁人對壘河上暉以犒給稍薄因竄入南軍梁将王彦章寘之麾下莊宗平河南暉首罪赦之從明宗征潞州誅楊立有功又從魏王繼岌伐蜀蜀平授䕫州刺史時荆州髙季興叛以兵攻其城暉拒之屢敗荆軍長興中為興州刺史以乾渠為治所會兩川叛蜀人來侵暉以衆寡不敵奔歸鳳翔朝廷怒其失守詔于同州衙職安置未幾從晉髙祖討蜀蜀人守劍門領部下兵踰越險阻從他道出于劍門之左掩擊之殺守兵殆盡㑹晉祖班師朝廷以暉為澶州刺史晉天福初范延光據鄴叛以暉為馬步都将孫鋭為監軍自六明鎮渡河将襲滑臺尋為官軍所敗暉退歸鄴為延光城守明年秋暉因出戰而降授滑州節度使檢校太傅鄴平移鎮靈武初張希崇鎮靈州以久在北蕃頗究邊事數年之間侵盜並息希崇卒未有主帥蕃部冦鈔無復畏憚朝廷以暉强暴之名聞于遐徼故以命之及暉到鎮大張宴席酒殽豐備羣夷告醉爭陳獻賀暉皆以錦綵酬之蕃情大悦党項拓拔彦昭者州界部族之大者暉至來謁厚加待遇仍為治第豐其服玩因留之不令歸部河西羊馬由是易為交市暉朞年得馬五千匹而蕃部歸心朝議患之隆平集藥元福傳西戎三族攻靈州命元福佐朔方節度使馮暉討之朔方距威州七百里地無水草謂之旱海攜糧至暉食盡詰朝行四十里而敵騎數萬扼要路暉大懼遣人致賂求成雖許及日中猶未决暉曰奈何元福曰彼正欲困我耳察其勢敵雖衆特依西山而陣者其精兵也請以驍鋭先薄西山彼或少郤當舉黄旗為識暉善其謀斬馘殆盡晉開運初桑維翰輔政欲圗大舉以制北戎命将佐十五人皆列藩之帥也惟暉不預其數乃上章自陳且言未老可用而制書見遺詔報云非制書忽忘實以朔方重地蕃部窺邊非卿雄名何以彈壓比欲移卿内地受代亦須奇才暉得詔甚善又達情乞移鎮邠州即以節旄授之行未及邠又除陜州暉獻馬千匹駞五百頭在陜未幾除侍衛步軍都指揮使兼領河陽即以王令温為靈武節度使暉既典禁兵兼領近鎮為朝廷縻留頗悔離靈武及馮玉李彦韜用事暉善奉之未幾復以暉為朔方節度使加檢校太師漢髙祖革命就加同平章事隠帝嗣位加兼侍中國初加中書令封陳留王廣順三年夏病卒年六十追贈衛王子繼業朔方衛内都虞候暉亡三軍請知軍府事因授檢校太保充朔方兵馬留後皇朝乾徳中移于内地今為同州節度使髙允權延州人祖懐逺本郡牙将懐逺生二子長曰萬興次曰萬金梁唐之間為延州節度使卒于鎮允權即萬金子也雖出于将門不嫻武藝起家為義川主簿歴膚施縣令罷秩歸延州之第晉開運末以周密為延帥延有東西二城其中限以深澗及契丹入汴一日州兵亂攻密密固守東城亂兵既無帥亦無敢為帥者或曰取髙家西宅郎君為帥可也是夜未曙允權方寢亂軍排闥請知留後事遂居于西城與密相拒數日河東遣供奉官陳光穂宣撫河西允權乃遣支使李彬奉表太原周密棄東城而去漢祖遣使就加允權檢校太傅仍正授旄鉞漢祖入汴允權屢修貢奉隠帝即位加檢校太尉同平章事允權與夏州李彛興不協其年李守貞據河中叛密搆彛興為援及朝廷用兵夏州軍逼延州允權上章論列彛興亦紛然自訴朝廷賜詔和解之太子太師致仕劉景巖允權妻之祖也退老于州之别墅景巖舊事髙氏為牙將亦嘗為延帥甚得民心景巖以允權婚家後輩心輕之允權恒忌其强是歳冬盡殺景巖之家收其家財萬計以謀叛聞朝廷不能辦關西賊平方面例覃恩命就加允權檢校太師太祖即位加兼侍中廣順三年春卒其子紹基匿喪久之又擅主軍政欲邀承襲觀察判官李彬以為不可當聴朝㫖紹基與羣小等惡其異議乃殺彬紿奏云彬接搆内外謀殺都指揮使及行軍副使自據城池已誅戮訖其妻子及諸房骨肉尋令捕繫次太祖聞之詔並釋之仍令都送汝州安置後朝廷令六宅使張仁謙徃巡檢紹基乃𤼵喪以聞輟視朝兩日折從阮字可久本名從逺避漢髙祖舊名下一字故改焉代家雲中父嗣倫為麟州刺史累贈太子太師從阮性温厚弱冠居父喪以孝聞唐莊宗初有河朔之地以代北諸郡屢為邊患起從阮為河東牙将領府州副使同光中授府州刺史長興初入朝明宗以從阮洞習邊事加檢校工部尚書復授府州刺史晉髙祖起義以契丹有援立之恩賂以雲中河西之地從阮由是以郡北屬既而契丹欲盡徙河西之民以實遼東人心大擾從阮因保險拒之晉少帝嗣位北絶邊好乃遣使持詔諭從阮令出師明年春從阮率兵深入邊界連拔十餘砦開運初加檢校太保遷本州團練使其年兼領朔州刺史安北都䕶振武軍節度使契丹西南面行營馬步都虞候漢祖建號晉陽引兵南下從阮率衆歸之尋升府為永安軍析振武之勝州并沿河五鎮以隸焉授從阮光禄大夫檢校太尉永安軍節度府勝等州觀察處置等使仍賜功臣名號乾祐元年加特進檢校太師明年春從阮舉族入覲朝廷命其子徳扆為府州團練使授從阮武勝軍節度使太祖受命加同平章事尋移鎮滑州又改陜州二年冬授靜難軍節度使世宗即位就加兼侍中以年老上章請代優詔許之顯徳二年冬赴闕行次西京以疾卒時年六十四制贈中書令王饒字受益慶州華地人也父柔以饒貴累贈太尉饒沈毅有才幹始事晉髙祖天福初授控鶴軍使稍遷奉國軍校累加檢校尚書左僕射六年從杜重威平常山以功加檢校司空遷本軍都校領運州刺史時安從進叛于㐮陽晉祖命髙行周率兵討之以饒為行營步軍都指揮使賊平授深州刺史逾年復入為奉國都校加檢校司徒領欽州刺史未幾改本軍右廂都指揮使領閬州團練使晉末契丹據中原漢祖建義于晉陽尋尅復諸夏惟常山郡為契丹所據時饒在其郡乃與李筠白再榮之儔承間竊𤼵盡逐其黨漢祖嘉之授鄜州觀察留後加光禄大夫賜爵開國侯復移授鎮國軍節度使加檢校太傅國初就加同平章事賜推誠奉義翊戴功臣顯徳初以郊丘禮畢加檢校太尉移鎮貝州世宗嗣位加兼侍中改彰徳軍節度使滿歳受代入奉朝請顯徳四年冬以疾卒于京東之私第年五十九追封巢國公饒性寛厚體貌詳雅所莅藩鎮民皆便之每接賓佐必怡聲緩氣恂恂如也故士君子亦以此多之孫方諫鄭州清苑縣人也本名方簡廣順初以犯廟諱故改焉定州西北二百里有狼山山上有堡邊人賴之以避剽掠之患因中置佛舍有尼深意者俗姓孫氏主其事以香火之教聚其徒聲言屍不壊因復以衣襟瞻禮信奉有同其生方諫即其宗人也嗣行其教率衆不食葷茹其黨推之為砦主晉開運初定帥表為邊界遊奕使宋史孫行友傳方諫懼主帥捕逐乃表歸朝因署為東北面招收指揮使且賜院額曰勝福毎契丹軍來必率其徒襲擊之鎧仗畜産所得漸多人益依以避難焉易定帥聞于朝因以方諫為邊界遊奕使行友副之自是捍禦多所殺獲乗勝入祁溝關平庸城破飛狐塞契丹頗畏之求請多端因少不得志潜通于契丹戎王之入中原也以方諫為定州節度使尋以其将耶律忠代之改方諫雲州節度使方諫恚憤與其黨歸狼山不受契丹命漢初契丹隳定州城壘燒􅋹廬舍盡驅居民而北中山為之一空方諫自狼山率其部衆迴保定州上表請命漢祖嘉之即授以節鉞累官至使相太祖受命加兼侍中未幾改華州節度使朝廷以其弟行友為定州留後宋史云行友上言偵得契丹離合願得勁兵三千乗間平定幽州乃移方諫鎮華州以行友為定州留後又以弟議為徳州刺史兄弟子姪職内廷者凡數人世宗嗣位史彦超代之車駕駐蹕于并門方諫自華覲于行在從大駕南巡以疾就醫于洛下尋授同州節度使加兼中書令未及赴任以疾卒于洛陽年六十二輟視朝兩日詔贈太師其弟行友繼為定州節度使皇朝乾徳中以其妖妄惑衆詔毁狼山佛寺遷其尼朽骨赴京遣焚于北郊以行友為諸衛大将軍自是妖徒遂息焉續通鑑長編建隆二年八月義成節度使同平章事孫行友在鎮逾八年而狼山妖尼深意黨益盛上初即位行友不自安累表乞解官歸山上不許行友懼乃繕治甲兵将棄其帑還據山寨以叛兵馬都監樂繼能密奏其事上遣閤門副使武懐節馳騎會鎮趙之兵偽稱巡邊直入定州行友不之覺既而出詔示之令舉族歸朝行友蒼皇聴命既至命侍御史李維岳即訊得實已酉制削奪行友官爵禁錮私第取尼深意尸焚之都城西北隅行友弟易州刺史方進姪保塞軍使全暉皆詣闕待罪詔釋之史臣曰昔晉之季也敵騎長驅中原無主漢祖雖思拯溺未果圗南趙暉首變陜郊同扶義舉漢之興也暉有力焉命以作藩斯無媿矣守恩乗時效順雖有可觀好利殘民夫何足貴允權方諫因版蕩之世竊屏翰之權比夫畫雲臺之功臣何相去之逺也舊五代史巻一百二十五
