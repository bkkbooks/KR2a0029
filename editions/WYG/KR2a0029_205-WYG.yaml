body:
  text: 舊五代史巻一百二考證漢隱帝紀中安州節度使楊信案楊信本名承信在隱帝時避御名去承字是書仍當時實錄之舊丁已永興都部署郭從義奏新除華州留後趙思綰與一行徒黨竝處置訖案歐陽史作郭威殺華州留後趙思綰于京兆蓋威命從義圖之耳甲子樞宻使郭威奏收復河中府逆賊李守貞自燔而死案通鑑壬戌李守貞自焚死歐陽史作甲子克河中祗以奏聞之日為㩀也五代春秋繫於六月殊誤亥宰臣竇貞固加守司徒案宋史竇貞固傳作隱帝即位加司徒考貞固加司徒在乾祐二年宋中作即位所加盖未詳考以利州節度使宋延渥為滑州節度使案延渥為利州節度使於前未見王禹偁宋公神道碑云少帝嗣統授檢校太尉使持節利州諸軍事行利州刺史盖延渥扵元年出鎮利州二年復改鎮也是書未及詳載舊五代史巻一百二考證
