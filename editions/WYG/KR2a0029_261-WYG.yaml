body:
  text: 舊五代史巻一百三十二宋門下侍郎參知政事監修國史薛居正等撰世襲列第一李茂貞本姓宋名文通深州博野人祖鐸父端唐乾符中鎮州有博野軍宿衞京師屯於奉天文通時𨽻本軍為市巡累遷至隊長黄巢犯闕博野軍留於鳳翔時鄭畋理兵於岐下畋遣文通以本軍敗尚讓之衆於龍尾坡以功為神策軍指揮使朱玫之亂唐僖宗冄幸興元文通扈蹕山南論功第一遷檢校太保同平章事洋蓬璧等州節度使賜姓名茂貞僖宗親為製字曰正臣光化二年王行瑜殺朱玫於京師李昌符擁兵於岐下詔茂貞與陳佩等討之三年誅昌符車駕還京以茂貞為鳳翔節度使加檢校太尉兼侍中隴西郡王大順二年觀軍容使楊復恭得罪奔山南與楊守亮據興元叛茂貞與王行瑜討平之詔以宰相徐彦若鎮興元茂貞違詔表其假子繼徽為留後堅請旄鉞昭宗不得已而授之自是茂貞恃勲恣横擅兵窺伺頗干朝政始萌問鼎之志矣旣而逐涇原節度使張球洋州節度使楊守忠鳳州刺史滿存皆奪據其地奏請子弟為牧伯朝廷不能制大臣奏議言其過者茂貞即上章論列辭㫖不遜姦邪者因之附麗遂成朋黨朝政於是隳焉昭宗性英俊不任其偪欲加討伐乾寧初命宰臣杜讓能調發軍旅師未越境為茂貞所敗茂貞乘勝進屯三橋京師大震士庶奔散天子乃誅中尉西門重遂李周潼等謝之茂貞嚴兵不解勢將指闕抗言讓能之罪誅之方罷及韋昭度李谿為相茂貞聽崔昭緯之邪説復沮其事表昭度等無相業不可置之台司恐亂天下詔報曰軍旅之事吾則與藩臣圖之朝廷命相出自朕懷又請授王珙河中節度使詔報曰太原表先至已許王珂不可追改乾寧二年五月茂貞與王行瑜韓建稱兵入覲京師震恐天子御樓待之抗表請殺宰相韋昭度李谿以謝天下移王珙於河中既還留其假子繼鵬宿衛即閻珪也時後唐武皇上表請討三鎮以寧關輔是嵗七月太原之師至河中繼鵬與中尉景宣之子繼晟迫車駕幸鳳翔昭宗曰太原軍未至鑾輿不可輒動朕與諸王固守大内卿等安輯京師如太原實至吾可以方略制之繼鵬與景宣中尉駱全瓘因燔燒東市中夜大譟昭宗登承天門樓避亂令捧日都將李雲守樓下繼鵬率衆攻雲昭宗憑軒慰諭繼鵬彎弧大呼矢拂御衣中樓桷侍臣掖昭宗下樓還宫繼鵬即縱火攻宫門昭宗召諸王謀其所向李雲奏曰事急矣請且幸臣營雲乃與扈蹕都將李君慶衛昭宗啓夏門出駐華嚴寺晡晚出幸南山之莎城駐於石門山之佛寺是月武皇至渭北遣副使王瓌奉表行在昭宗以武皇為行營都統進討邠岐茂貞懼斬繼鵬繼晟上表待罪昭宗原之武皇曰不誅茂貞關輔無由寧謐時附茂貞者奏云若太原盡殄邠岐必入關輔京師憂未艾也乃詔武皇與茂貞和及行瑜誅武皇班師茂貞怨望驕横如故明年五月制授茂貞東川節度使仍命通王覃王治禁軍於闕下如茂貞違詔即討之茂貞懼將赴鎮王師至興平夜自驚潰茂貞因出乘之官軍大敗車駕倉卒出幸華州茂貞之衆因犯京師焚燒宫闕大掠坊市而去自此長安大内盡為邱墟矣四年昭宗復命宰臣孫偓統軍進討韓建諫止令茂貞上章請雪光化中加茂貞尚書令岐王令其子繼筠以兵宿衞天復元年十月梁祖攻同華勢逼京師十一月六日繼筠與中尉韓全誨劫昭宗幸鳳翔茂貞遂與全誨矯詔徵兵天下將討梁祖宰相崔裔召梁祖引四鎮之兵屯於岐下重溝複壘圍守三年茂貞山南諸州盡為王建所陷涇原秦隴邠鄜延夏皆降於汴茂貞獨據孤城内外援絶乃請車駕還京求和於汴即斬韓全誨等二十人首級送於梁祖自是兵力殫盡埀翅不振懼梁祖復討請落尚書令許之九國志李彥𤦺傳彥𤦺本姓楊氏鳳翔李茂貞委以心腹之任易姓李氏齒於諸子後昭宗西幸梁祖迎駕攻逼岐下者累年及昭宗東還長圍方解大軍之後府庫空竭彥琦請使甘州以通囘鶻往復二載美玉名馬相繼而至所獲萬計茂貞頼之及梁祖建號茂貞與王建㑹兵於太原志圖興復竟無成功茂貞疆土危蹙不遂僭竊之志但開岐王府署天官目妻為皇后鳴鞘掌扇宣詞令一如王者之制然尚行昭宗之正朔焉茂貞鼠形多智數軍旅之事一經耳目無忘之者性至寬有部將符昭者人或告其謀變茂貞親至其家去其爪牙熟寢經宿而還軍士有鬭而訴者茂貞曰喫令公一椀不托與爾和解遂致上下服之尤善事母母終茂貞哀毁幾滅性聞者嘉之但御軍整衆都無紀律當食則造庖廚往往席地而坐内外持管鑰者亦呼為司空太保與夫細柳大樹之威名葢相遠矣及莊宗平梁茂貞自為季父以書賀之及聞莊宗入洛懼不自安方上表稱臣尋遣其子繼曮來朝詔茂貞仍舊官進封秦王所賜詔敕不名又以茂貞宿望耆老特加優禮及疾篤遣中使賜醫藥問訊同光二年夏四月薨年六十九諡曰忠敬子從曮嗣從曮茂貞之長子也未冠授諮議參軍賜緋魚袋尋遷領彭州副使鳳翔衙内都指揮使天復中自秦王府行軍司馬檢校太傅出為涇州兩使留後茂貞尋承制加開府儀同三司檢校太尉兼侍中四鎮北庭行軍彰義軍節度使及唐莊宗平梁茂貞令從曮入覲制加從曮兼中書令俄而茂貞薨遺奏權知鳳翔軍府事詔起復授鳳翔節度管内觀察處置等使三年九月以魏王繼岌伐蜀詔充供軍轉運應接使四年正月蜀平繼岌命部署王衍一行東下至岐監軍使柴重厚不與符印促令赴闕從曮至華下聞内難歸鎮明宗詔誅重厚從曮以軍民不擾重厚之力也不以前事為隙上表論救事雖不允時議嘉之天成元年五月制落起復加檢校太師其年九月敕曰李從曮等世聯宗屬任重藩宣慶善有稱忠勤甚著既預維城之列宜新定體之文是降寵光以隆惇敘俾煥承家之美貴從猶子之規宜於曮昶照上改稱從自長興元年明宗有事於南郊從曮入覲禮畢移鎮汴州四年復入覲改天平軍節度使及唐末帝起兵於岐下盡取從曮家財器仗以助軍須末帝發離岐城吏民扣馬乞以從曮為帥末帝許之清泰初即以從曮復為鳳翔節度使仍封秦國公晉高祖登極繼封岐王秦王累食邑至一萬五千户食實封一千五百户少帝嗣位加守太保開運三年冬卒於鎮年四十九從曮少敏悟善筆札性柔和無節操當莊宗新有天下因入覲獻寶裝針珥於皇后宫時以為佞但進退閑雅慕士大夫之所為有請謁者無賢不肖皆盡其敬鎮於岐山前後二紀毎花繁月朗必陳勝㑹以賞之客有困於酒者雖吐茵墮幘而無厭色左右或有過未嘗笞責先人汧隴之間有田千頃竹千畝恐奪民利不令理之致岐陽父老再陳借寇之言良有以也子永吉厯數鎮行軍司馬五代史補李曮岐王之子昆仲間第六官至中書令世謂之六令公性情好戲為鳳翔節度因生辰鄰道持賀禮使畢至有魏博使少年如美婦人秦鳳使矬陋且多髯二人坐又相接而魏使在下曮因曰二使車一姸一醜何不相嘲以為樂事魏博使恃少俊先起曰今日不幸與水草大王接席秦鳳使徐起應曰水草大王不敢承命然吾子容貌如此又坐次相接得非水草大王夫人耶在坐皆笑從昶茂貞之第二子也十餘歲署本道中軍使後唐同光中茂貞疾從昶年十五遣代兄從曮為涇州兩使畱後朝廷尋加節制天成中明宗即位改鎮三峯累官至檢校太保會郊天大禮表請入覲以恩加檢校太傅俄有代歸闕授左驍衞上將軍改右龍武統軍未幾出鎮許田在鎮三年清泰中復入為右龍武統軍冄遷左龍武統軍晉天福三年冬卒於官時年四十贈太尉從昶生於紈綺少習華侈以逸遊讌樂為務而音律圖畫無不通之然性好談笑喜接賓客以文翰為賞曾無虛日復篤信釋氏時岐下有僧曰阿闍棃通五天竺語為士人所歸從昶凡歴三鎮無尤政可褒無苛法可貶人用安之亦將門之令嗣也弟從照歴隴州刺史諸衞大將軍卒茂勲茂貞之從弟也唐末為鳳翔都將茂貞表為鄜州節度使累官至兼侍中梁祖之圍鳳翔也茂勲兵屯岐山梁祖以羸師誘之命孔勍潛率勁兵襲下鄜州盡俘其家茂勲遂歸於梁改名周彞署元帥府行軍司馬開平中為河陽節度使從梁祖伐鎮州圍棗強縣時有一民縋城而出茂勲納之而不疑一日其民竊發以木檐擊茂勲踣于地賴左右救至僅免居無何遷金吾上將軍副王瓚將兵於景店瓚令分屯西寨莊宗擊而敗之降為左衞上將軍逾年以太子太傅致仕同光中復名茂勲天成初以疾卒於洛陽高萬興河西人祖君佐鄜延節度判官父懷遷都押衙萬興與弟萬金俱有武幹効用於本軍河西自王行瑜敗後郡邑皆為李茂貞之所強據以其將胡敬璋為節度使萬興為敬璋騎將昆弟俱有戰功邠州節度使楊崇本者茂貞之假子也號李繼徽梁祖既弑昭宗茂貞繼徽與西川王建之師會於岐陽以圖興復皆陳兵關輔梁祖遣將王重師守雍州劉知俊守同州以拒之天祐五年冬敬璋卒崇本以其愛將劉萬子為鄜延帥萬子以兇暴而失士心又崇本為汴人所攻六年二月萬子葬敬璋將佐皆集於葬所萬興萬金因會縱兵攻萬子殺之歸欵於汴梁祖以萬興為鄜延招撫使與劉知俊合兵攻收鄜坊丹延等州梁祖乃分四州為二鎮以萬興萬金皆為帥及萬金卒梁祖以萬興兼彰武保大兩鎮累加至太師中書令封北平王莊宗定河洛萬興來朝預郊禮陪位既還鎮復以舊爵授之同光三年十二月卒於位以其子允韜權典留後允韜字審機初仕梁朝起家授同州别駕尋加檢校右僕射改金紫光禄大夫檢校司空充保大軍内外馬歩軍指揮使唐同光中檢校太保充保大軍兩使留後萬興卒允韜自理所奔喪天成初起復檢校太傅充延州節度使長興元年移鎮郉州頃之為右龍武統軍未幾授滑州節度使清泰二年八月卒於任年四十二詔贈太師韓遜本靈州之列校也會唐季之亂因據有其地朝廷乃授其節鉞梁初累加檢校太尉同平章事開平中梁將劉知俊自同州叛歸鳳翔李茂貞以地褊不能容乃借兵以窺靈武且圖牧圉之地知俊乃率邠岐秦涇之師數萬攻遜於靈州遜竭力以拒之乆之知俊遁去梁祖嘉之自是累加官至中書令封頴川郡王遜亦善於為理部民請立生祠堂於其地梁祖許之仍詔禮部侍郎薛廷珪撰文以賜之其廟至今在焉貞明初遜卒於鎮洙遜之子也遜卒三軍推為留後梁末帝聞之起復正授靈武節度使特進檢校太傅同平章事貞明四年春靈武將軍尚貽敏等上言洙已服闋乞落起復梁末帝令中書商量宰臣奏曰舊例藩鎮落起復如先人已是一品階即與加爵如未是一品階即合加階乃授洙開府儀同三司唐莊宗明宗累加官爵天成四年夏洙卒朝廷以其弟澄為朔方軍節度觀察留後是歲有列校李賓作亂部内不安乃遣使上表請帥於朝廷明宗命前磁州刺史康福為朔方河西等軍節度靈威雄警涼等州觀察處置度支温池𣙜税等使仍遣福領兵萬人赴鎮其後靈武遂受代焉李仁福世為夏州牙將本拓跋氏之族也唐乾符中有拓跋思恭為夏州節度使廣明之亂唐僖宗在蜀詔以思恭為京城西北收復都統預破黄巢有功僖宗賜姓故仁福亦以李為氏思恭卒弟思諫繼之梁開平元年授思諫檢校太尉兼侍中二年思諫卒三軍立其子彞昌為留後尋起復正授旄鉞三年春牙將高宗益等作亂彞昌遇害時仁福為蕃部指揮使本州軍吏迎立仁福為帥其年四月梁祖降制授仁福檢校司空充定難軍節度使未幾後唐武皇遣大將周德威㑹邠鳳之師五萬同攻夏州仁福固守月餘梁援軍至德威遁去梁祖喜之超授檢校太保同平章事仁福自梁貞明龍徳及後唐同光中累官至檢校太師兼中書令封朔方王長興四年三月卒於鎮其年追封虢王子彞超嗣彞超仁福之次子也歴本州左都押衙遷防遏使仁福卒三軍立為帥矯為仁福奏云臣疾已甚巳委彞超權知軍州事乞降真命明宗聞之遂以彞超為延州留後以延帥安從進為夏州留後朝廷慮不從命詔邠州節度使藥彥稠宫苑使安從益等率師援送從進赴鎮仍降詔諭之云近據西北藩鎮奏定難軍節度使李仁福薨朕以仁福自分戎閫遠鎮塞垣威惠俱行忠孝兼著當本朝播越之後及先皇興復之初爰及眇躬益全大節統臨有術遠邇咸安委仗方深凋殞何速忽窺所奏深愴予懷不朽之功既存於社稷有後之慶宜及於子孫但以彼藩地處窮邉毎資經略厥子年纔弱冠未歴艱難或虧駕御之方定啓姦邪之便其李彞超巳除延州節度觀察留後便勒赴任但夏銀綏宥等州最居遷遠乆屬亂離多染西番之風少識朝廷之命既乍當於移易宜普示於渥恩應夏銀綏宥等州管内罪無輕重常赦所不原者并公私債負殘欠税物一切竝放兼自刺史指揮使押衙巳下皆勒依舊各與改轉官資朕自總萬機惟宏一德内安華夏外撫戎夷先既懷之以恩後必示之以信且如李從曮之守岐隴疆土極寬高允韜之鎮鄜延甲兵亦衆咸能識時知變舉族歸朝從曮則見鎮大梁允韜則尋除鉅鹿次及昆仲竝建節旄而下至將僚悉分符竹又若王都之貪上谷李賓之恡朔方或則結搆契丹偷延旦夕或則依憑党項竊據山河不稟除移惟謀旅拒纔興討伐已見覆亡何必廣引古今方明利害祗陳近事聊諭將來彼或要覆族之殃則王都李賓足為鑒戒彼或要全身之福則允韜從曮可作規繩朕設兩途爾宜自擇或慮將校之内親要之間幸彼幼沖恣其熒惑遂成搔動致累生靈今特差邠州節度使藥彥稠部領馬歩兵士五萬人騎送安從進赴任從命者秋毫勿犯違命者全族必誅先令後行有犯無舍云其年夏四月彞超上言奉詔授延州留後已迎受恩命縁三軍百姓擁隔未放赴任明宗遣閤門使蘇繼彥齎詔促之五月安從進領軍至城下彞超不受代從進駐軍以攻之秋七月彞超昆仲登城謂從進曰孤弱小鎮不勞王師攻取虚煩國家餉運得之不武為僕聞天子乞容改圖時又四面党項部族萬餘騎薄其糧運而野無芻牧關輔之人運斗粟束藁動計數千窮民泣血無所控訢復為蕃部殺掠死者甚衆明宗聞之乃命班師彞超亦上表謝罪乃授彞超檢校司徒充定難軍節度使既而修貢如初清泰二年卒於鎮弟彞興襲其位彞興本名彞殷皇朝受命之初以犯廟諱故改之彞超既卒時彞興為夏州行軍司馬三軍推為留後唐末帝聞之正授定難軍節度使晉天福初加檢校太尉同平章事少帝嗣位加檢校太師八年秋彞興弟綏州刺史彞敏與其黨作亂為彞興所逐彞敏奔延州彞興押送到闕骨肉二百餘口朝廷以彞興之故縶送本道斬之開運元年春詔以彞興為契丹西南面招討使漢乾祐元年春加兼侍中是歲李守貞叛於河中潛使人搆之彞興為之出師駐於延州之北境既而聞守貞被圍乃收軍而退周顯德中累加至守太傅兼中書令封西平王皇朝建隆元年春制加守太尉始改名彞興乾德五年秋卒於鎮制贈太師追封夏王子光叡繼其位其後事具皇朝日歴舊五代史巻一百三十二
