body:
  text: 舊五代史巻七十五攷證晉書高祖紀一本衛大夫碏漢丞相奮之後案歐陽史作其姓石氏不知其得姓之始皇考諱紹雍紹雍原本作詔雍考五代㑹要歐陽史俱作紹雍今改正命帝領親騎號三討軍三討軍歐陽史作左射軍乃命築壇于晉陽城南案通鑑作築壇于栁林遼史亦作設壇于晉陽嵗次丙申十一月丙戌朔十二日丁酉引廢帝實録契丹立晉誤在閏月丁夘辨正在唐紀歐陽史及通鑑並從晉紀作十一月丁酉四字去中之兩畫案原本作中去之兩畫今從冊府元龜改正帝遣心腹何福輕騎求援北蕃案原本闕帝遣心腹四字今從冊府元龜増入舊五代史巻七十五攷證
