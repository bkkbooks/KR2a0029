body:
  text: 舊五代史巻九十一宋門下侍郎參知政事監修國史薛居正等撰晉書第十七列傳六房知温字伯玉兖州瑕丘人也少有勇力籍名于本軍為赤甲都官健玉堂閒話知温少年與外弟徐某為盜于兖鄆之境梁將葛從周鎮其地選寘麾下時部將牛存節屯于鎮好摴博每求辨采者知温以善博見推因得待左右遂熟于存節及王師範遣劉鄩據兖州梁祖命存節將兵討之知温夕縋出奔存節喜而納焉明夜竊良馬一駟復入城鄩乃擢為禆將鄩降𨽻于同州劉知俊知俊補為克和軍使知俊奔岐改𨽻魏州楊師厚以為馬鬬軍校漸升至親随指揮使繼加檢校司空莊宗入魏賜姓名紹英改天雄軍馬步都指揮使加檢校司徒澶州刺史行臺右千牛衛大將軍莊宗平梁歴曹貝州刺史權充東北面蕃漢馬步都虞候遣戌瓦橋關明宗自鄴入洛知温與王晏球首赴焉明宗自總管府署知温滑州兩使留後天成元年授兖州節度使明宗即位詔充北面招討屯子盧臺軍以盧文進來歸加特進同平章事賞招討之功也後除烏震為招討副使代知温歸鎮知温怒震遽至有怨言因縱博誘牙兵殺震于席上㑹次將安審通保騎軍隔河按甲不動知温懼不濟乃束身渡水復結審通逐其亂軍以奏時朝廷姑息知温下詔于鄴盡殺軍士家口老㓜凡數萬清漳為之變色尋詔遣知温就便之鎮以安反側俄改徐州節度使加兼侍中會朝廷起兵伐髙季興授荆南招討使知行府事尋丁母憂起復雲麾將軍墨縗即戎竟無功而還長興中節制文陽越二年除平盧軍節度使累官至開府儀同三司檢校太師兼中書令封東平王食邑五千户食實封三百户天福元年冬十二月辛巳卒于鎮贈太尉歸塟于瑕丘詔立神道碑知温性麤獷動罕由禮毎迎待王人不改戎服寡言笑多縱左右排辱賔寮他日知悞亦無愧色始與唐末帝嘗失意于杯盤間以白刃相恐及末帝即位知温憂甚末帝乃封王爵以寧之也知温徑赴洛陽申其宿過且感新恩末帝開懐以厚禮慰而遣之及還郡厚歛不已積貨數百萬治第于南城出則以妓樂相隨任意所之曽不以政事為務有幕客顔衎者正直之士也委曲陳其利病知温不能用焉及髙祖建議入洛尚不即進獻耀兵于牙帳之下衎正色謂曰清泰富有天下多力善戰豈明公之比而天運有歸坐成灰燼今青州遷延不貢何以求安千百武夫無足為恃深為大王之所憂也知温遂馳表稱賀青人乃安未幾以沈湎成疾而卒部曲將吏分其所聚例為富室衎又勸其子彦儒進錢十萬貫以助國用朝廷除彦儒為沂州刺史其家幸獲别全皆衎之力也王建立遼州榆社人也曽祖秋祖嘉父弁累贈太保建立少鷙猛無檢明宗領代州刺史擢為虞候將莊宗鎮晉陽以諸陵在代郡遣女使饗祭其下有擾于民者建立必捕而笞之莊宗怒令收之為明宗所䕶而免由是知名明宗歴遷藩鎮皆署為牙門都校累奏加檢校司空及明宗為魏軍所迫時皇后曹氏淑妃王氏在常山使建立殺其監䕶并部下兵故明宗家屬因而保全及即位以功授鎮州節度副使加檢校司徒旋為留後未幾正授節旄繼加檢校太尉同平章事會王都據中山叛密使通弟兄之好通鑑王都隂與謀復河北故事建立陽許而密奏之安重誨素與建立不協知其事奏之明宗慮陷建立尋徴赴闕通鑑建立奏重誨專權來入朝面言其狀帝召之拜右僕射兼中書侍郎平章事判鹽鐵户部度支充集賢殿大學士天成四年出為青州節度使五年移鎮上黨辭不赴任請退居丘園制以太子少保致仕建立自是鬱鬱不得志長興中嘗欲求見中㫖不許皆重誨蔽之也清泰初末帝召赴闕授天平軍節度使建立少歴軍校職當捕盜及位居方伯為政嚴烈閭里有惡跡者必族而誅之其刑失于濫者不可勝紀故當時人目之為王垜疊言殺其人而積其屍也後聞末帝失勢殺副使李彦贇及從事一人報其私怨人甚鄙之髙祖即位再為青州節度使累加檢校太尉兼中書令建立晚年歸心釋氏飯僧營寺戒殺慎獄民稍安之天福二年封臨淄王明年封東平王五年入覲髙祖曰三紀前老兄宜賜不拜仍許肩輿入朝上殿則使二宦者掖之論者榮之尋表乞休致髙祖不允乃授潞州節度使割遼沁二州為上黨屬郡加檢校太師進封韓王以光其故里至鎮踰月而疾作有大星墜于府署建立即召賔介竺岳草遺章又謂其子守恩曰榆社之地桑梓存焉桑以飬生梓以送死余生為壽宫刻銘石室死當速葬葬必從儉違吾是言非孝也旋以病篤而卒年七十册贈尚書令建立先人之墳在于榆社其崗阜重複松檜靄然占者云後出公候故建立自為墓恐子孫易之也子守恩周書有傳康福蔚州人世為本州軍校祖嗣蕃漢都知兵馬使累贈太子太師父公政歴職至平塞軍使累贈太傅福便弓馬少事後唐武皇累補軍職充承天軍都監莊宗嗣位嘗謂左右曰我本蕃人以羊馬為活業彼康福者體貌豐厚宜領財貨可令總轄馬牧由是署為馬坊使大有蕃息及明宗為亂兵所迫將離魏縣㑹福牧小坊馬數千匹于相州乃驅而歸明宗即位授飛龍使俄轉磁州刺史充襄州兵馬都監尋以江陵叛命朝廷舉兵伐之以福為荆南道行營兵馬都監俄以王師無功而還福善諸蕃語明宗視政之暇每召入便殿諮訪時之利病福即以蕃語奏之樞密使重誨惡焉常面戒之曰康福但亂奏事有日斬之福懼㑹靈武兵馬留後韓潯以人情不恊慮為所圖上表請帥制加福光禄大夫檢校司空行涼州刺史充朔方河西等軍節度靈威雄警甘肅等州觀察處置管内營田押蕃落温池𣙜税等使福之是拜盖重誨嫉而出之福泣而辭之明宗宣重誨别與商議重誨奏曰臣累奉聖㫖令與康福一事今福驟升節鎮更欲何求况已有成命難于改移明宗不得已謂福曰重誨不肯非朕意也福辭明宗曰朕遣兵援助勿過憂也因令將軍牛知柔領兵送赴鎮行次青岡峽㑹大雪令人登山望之見川下煙火吐蕃數千帳在焉冦不之覺因分軍三道以掩之蕃衆大駭棄帳幕而走殺之殆盡獲玉璞羊馬甚多到鎮歳餘西戎皆欵附改賜福耀忠匡定保節功臣累加官爵福鎮靈武凡三歳每歳大稔倉儲盈羨有馬千駟因為人所譖安重誨奏曰累據使臣所言康福大有寳貨必負朝廷明宗密遣人謂曰朕何負于卿而有異心耶福奏曰臣受國重恩有死無貳豈願負于聖人此必䜛人之言也因表乞入覲不允及再上章隨而赴闕移授彰義軍節度使又轉邠州檢校太傅清泰中移鎮秦州加特進開國侯充西面都部署髙祖受命就加檢校太尉開國公未幾又加同平章事及移領河中加兼侍中以天和節入覲改賜輸忠守正翊亮功臣加開府儀同三司増食邑至五千户實封五百户久之受代歸闕天福七年秋卒于京師年五十八贈太師謚曰武安福無軍功屬明宗龍躍有際會之幸擢自小校暴為貴人每食非羊之全髀不能飫腹與士大夫交言懵無所别在天水日嘗有疾幕客謁問福擁衾而坐客有退者謂同列曰錦衾爛兮福聞之遽召言者怒視曰吾雖生于塞下乃唐人也何得以為爛奚因叱出之由是諸客不敢措辭復有末客姓駱其先與後唐懿祖來自金山府因公讌福謂從事輩曰駱評事官則卑門族甚髙真沙陀人聞者竊笑焉子三人長曰延沼歴隨澤二州刺史次曰延澤延壽俱歴内職焉安彦威字國俊代州崞縣人少時以軍卒得𨽻唐明宗麾下彦威性善射頗諳兵法明宗愛之累歴藩鎮彦威常為衙將所至以謹厚見稱明宗入立秦王從榮鎮鄴都以彦威為䕶聖指揮使從榮判六軍彦威入司禁衞遥領鎮州節度使髙祖即位尤倚彦威即拜為北京留守加同平章事通鑑彦威入朝上曰吾所重者信與義昔契丹以義救我我今以信報之聞其徴求不已公能屈節奏之深稱朕意對曰陛下以蒼生之故猶卑辭厚幣以事之臣何屈節之有上悦移鎮宋州是時何决滑州命彦威集丁夫塞之彦威出私錢募民治隄隄成滑人頼之遷西京留守歳饑彦威開倉廩賑饑有犯法者皆寛貸民免于流散彦威之力也旋丁母憂哀毁過制少帝與契丹搆釁授彦威北面行營副都統彦威悉率家財佐軍人稱其忠開運中卒贈太師彦威與太妃為同宗少帝以舅事之彦威未嘗自以為言及卒太妃與少帝臨喪人始知為國戚聞者益重其人焉李周字通理邢州内丘人也唐潞州節度使抱真之後曽祖融祖毅父矩皆不仕周年十六為内丘捕賊將以任使自負時河朔羣盜充斥南北交兵行旅無援者不敢出郡邑有士人盧岳家于太原􅂝妻子囊橐寓于逆旅進退無所保唯與所親相對流涕周憫之請援送以歸行經西山中有賊夜于林麓間俟之射盧岳中其馬周大呼曰爾為誰耶賊聞其聲相謂曰李君至此矣即時散走岳全其行裝至于家周將辭去岳謂周曰岳明歴象善知人子有竒表方頥隆準眉目疎朗身長七尺乃將相之材也河東李氏將有天下子宜事之以求富貴周辭以母老而歸既而梁將葛從周拔邢洺唐武皇麾兵南下築壘于青山口周向背莫決因思盧岳之言乃投青山寨將張汚落武皇賞之補萬勝黄頭軍使武皇之平雲州莊宗之戰栢鄉周皆有功遷匡霸都指揮使莊宗入魏率兵屯臨河陽劉所至與士伍同甘苦周尤善守備一日奔母喪以他將伐之既出則其城將陷莊宗即遣追之使墨縗從事㑹莊宗北征周與寺人焦彦賔守楊劉城九國志焦彦賔傳彦賔字英服滄州清池人少聰敏多知畧事武皇尤所委信及莊宗即位遷左監門衞將同正四方館使出䕶邢州軍梁將王彦章以數萬衆攻之周日夜乘城躬當矢石使人馳告莊宗請百里趨程以紓其難莊宗曰李周在内朕何憂也遂日行二舍不廢畋獵既至士衆絶糧三日矣及攻圍既解莊宗謂周曰㣲卿九拒之勞諸公等為梁人所擄矣同光中歴相蔡二州刺史及蜀平授西川節度副使天成二年春遷遂州兩使留後尋正授節旄未幾受代歸闕三年秋出為邠州節度使㑹慶州刺史竇廷琬據城拒命周奉詔討平之長興清泰中歴徐安雍汴四鎮所至無苛政人皆樂之髙祖有天下復鎮邠州累官至檢校太師兼侍中及罷鎮赴闕㑹少帝幸澶淵以周累朝耆徳乃命為東京留守車駕還京授開封尹及遘疾夢焚旌旗鎧甲因自嗟嘆上章請退尋卒于官時年七十四詔贈太師陪葬于明宗徽陵之北張從訓字徳恭本姑臧人其先迴鶻别𣲖隨沙陁徙居雲中後從唐武皇家于太原從訓遂為太原人祖君政雲州長史識蕃字通佛理父存信河東蕃漢馬步軍都指揮使武皇賜姓名眷同親嫡前史有傅天福中贈太師中書令追封趙國公從訓讀儒書精騎射初為散員大將天祐中轄沙陁數百人屯壺關十餘歳節度使李嗣昭委遇之莊宗與梁人相拒于徳勝口徵赴軍前補充先鋒遊奕使俄轉雲㨗指揮使檢校司空賜名繼鸞從諸子之行也明宗㣲時嘗在存信麾下為都押牙與從訓有舊及即位授石州刺史復舊姓名歴憲徳二州刺史髙祖之鎮太原也為少帝娶從訓長女為妃清泰初授唐州刺史三年髙祖舉義從訓奉唐末帝詔徵赴行在分領鄉兵次于團栢谷兵敗宵遁潛身民間髙祖入洛有詔搜訪月餘乃出焉及見戚里之故深加軫惻尋授絳州刺史檢校太保在任數年天福中卒于官年五十二少帝以后父之故超贈太尉弟從恩仕皇朝為右金吾衛上將軍卒李繼忠字化逺後唐昭義軍節度使兼中書令嗣昭之第二子嗣昭唐書有傳繼忠少善騎射從父征討有功莊宗乎制授檢校兵部尚書充感義馬軍指揮使改潞府司馬加檢校尚書右僕射充安義都巡檢使天成中自北京大内皇城使轉河東行軍司馬入為右驍衛將軍未幾授成徳軍司馬加檢校司徒髙祖即位二年三月授沂州刺史加檢校太保尋移棣州刺史繼忠舊苦風痺皆辭以地逺乃授單州刺史仍加輸忠奉國功臣三年入為右神武統軍四年三月出領隰州七年八月移刺澤州開運元年復入為右監門大將軍三年秋以疾卒于東京年五十一始繼忠母楊氏善治産平生積財鉅萬及髙祖建義于太原楊已終繼忠舉族家于晉陽時以諸軍方困契丹援兵又至髙祖乃使人就其第疏其複壁取其舊積所獲金銀紈素甚廣至于巾履瑣屑之物無不取足髙祖既濟大事感而竒之故車駕入洛繼忠雖有舊恙連領大郡皆楊氏之力也李頃陳州項城人即河陽節度使兼侍中罕之子也罕之梁書有傳唐光啓中罕之與河南張全義為仇交相攻擊罕之兵敗北投太原武皇以澤州處之罕之將赴任留頃為質焉時莊宗未弱冠因與頃遊處甚相昵狎光啓初罕之自澤州襲據潞州送欵于梁武皇以頃父叛將殺之莊宗密與駿騎使逃出境頃遂奔河南梁祖以其父子歸巳委遇甚厚天福中梁祖自鳳翔送唐昭宗歸長安留軍萬人命姪友倫與頃總之以宿衛為名及梁祖逼禪累掌禁兵倚為肘腋庶人友珪立授頃檢校尚書右僕射右羽林統軍梁末帝之誅友珪頃預其謀尋歴隨州刺史復為右羽林統軍同光初莊宗入汴召頃見之莊宗忻然授衞州刺史加光禄大夫校校太保明宗朝授衍州刺史長興中檢校太傅右神武統軍髙祖即位之二年加特進檢校太尉右領軍衛上將軍三年進封開國伯五年遷左領軍衛上將軍尋以病卒年七十制贈太師頃性温雅不暴虐凡刺郡統衆頗有畏愛及卒人甚惜之子産弼在太原日因頃走歸梁朝武皇怒下蠶室加熏腐之刑後籍于内侍省卒焉周光輔太原人後唐蕃漢馬步總管幽州節度使徳威之長子也徳威有𫝊在唐書光輔年甫十歳補幽州中軍兵馬使有成人之志徳威以牙軍委之麾下咸取决焉及長體貌魁偉練于戎事父卒授嵐州刺史從莊宗平梁遷檢校尚書左僕射汝州防禦使仍賜協謀定亂功臣天成初移汾州四年入為右監門衞大將軍長興清泰中歴陳懐磁三郡繼加檢校司徒髙祖即位授蔡州刺史歳餘卒于郡時年三十五贈太保光輔以功臣子歴數郡皆無濫政竟善終于官雖享年不永亦可嘉也光輔有弟數人光貞歴義乾二州刺史入為諸衞將軍光遜繼為蔡州刺史光贊任青州行軍司馬及楊光逺叛滅貶商州司馬㑹赦徵還尋卒于家符彦饒唐莊宗朝蕃漢總管存審之第二子也存審唐書有傳彦饒少驍勇能騎射唐天祐十五年冬莊宗與梁大戰于胡柳陂彦饒與弟彦圖俱從其父血戰有功莊宗壯之因用為騎將同光中以功授曹州刺史明宗即位改刺沂州天成中屯守梁園㑹起軍北戍塞下時有偏校以宣武乏帥迫彦饒為之彦饒紿許其請明日殺為惡者奏之時人嘉其方畧長興中為金州防禦使為政甚有民譽其後畧遷節鎮天福初為滑州節度使累官至檢校太傅二年七月范延光據鄴都叛朝廷遣侍衞馬軍都指揮使白奉進率騎軍三千屯于州之開元寺一日彦饒與奉進因事忿争于牙署事具奉進𫝊中是時奉進厲聲曰爾莫是與范延光同及耶拂衣而起彦饒不留帳下介士大譟擒奉進殺之奉進從騎散走傳呼于外時步軍都校馬萬次校盧順密聞奉進被害即率其部衆攻滑之子城執彦饒以出遣禆校方大拘送闕下行及赤岡南髙祖遣中使害于路左羅周敬字尚素鄴王紹威之第三子也紹威梁書有傳周敬㓜聰明八歳學為詩往往傳于人口起家授檢校尚書禮部員外郎梁乾化中以兄周翰節制滑臺卒于官乃以周敬繼之命為兩使留後尋正授旄鉞時年十歳未幾改授許州節度使繼加檢校尚書左僕射踰三年徵授秘書監檢校司空駙馬都尉尚梁普安公主旋移光禄卿莊宗即位歴左右金吾大將軍初唐天祐中紹威嘗建第于洛陽福善里及莊宗入洛以梁租庸使趙巖宅賜明宗同光中明宗在洛以趨内稍逺乃召周敬議易其第周敬諾之後明宗即位一日夢中見一人儀形􅅛秀若素識者夢中問曰此得非前宅主羅氏子及寤訪其子孫左右對曰周敬見列明廷召至果符夢中所見明宗謂侍臣曰朕不欲使大勲之後久無土地因授同州節度使加檢校太保長興中入為左監門衞上將軍四遷諸衛上將軍天福二年卒時年三十二贈太傅鄭琮太原人也始事唐武皇為五院軍小校屢有軍功莊宗在河上為馬步都虞候戎伍之事一覩不忘凡所詰問應答如流故所在知名唐同光末從明宗伐魏州時軍情有變明宗退守魏縣未知趨向安重誨將徵兵于四方琮在帳前歴數諸道屯軍及主將姓名附口傳檄相次而至明宗即位嘉其功授防州刺史秩滿父老請留三年授左羽林統軍唐長興二年二月出刺武州髙祖即位復居環衞久之以俸薄家貧鬱鬱不得志天福中以疾終于官贈司徒舊五代史巻九十一
