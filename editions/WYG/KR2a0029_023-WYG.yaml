body:
  text: 舊五代史巻十一宋門下侍郎參知政事監修國史薛居正等撰梁書第十一后妃列傳一文惠皇太后王氏開平初追諡太祖性孝厚奉太后未嘗小失色朝夕視膳為士君子之規範帝嚴察用法無纎毫假貸太后言之帝頗為省刑北夢􅖰言梁祖父誠蚤率有三子俱幼母王氏携養寄於同縣人劉崇家昆弟之中唯温狡猾無行崇母撫養之崇弟兄嘗加譴杖一日偷崇家釡而竄為崇追回崇母遮䕶之以免撲責善逐走鹿往往及而獲之又崇母常見其有龍蛇之異他日與仲兄存入黄巢軍作賊伯兄昱與母王氏尚依劉家温既辭去不知存亡及温領鎮于汴盛飾輿馬使人迎母于崇家王氏惶恐辭避深藏不之信謂人曰朱三落拓無行何處作賊送死焉能自致寓貴汴帥非吾子也使者具陳離鄉去里之由歸國立功之事王氏方泣而信是日與崇母竝迎歸汴温盛禮郊迎人士改觀崇以舊恩位至列卿為商州刺史王氏以温貴封晉國太夫人仲兄存於賊中為矢石所中而卒温置酒于母歡甚語及家事謂母曰朱五經辛苦業儒不登一命今有子為節度使無忝前人矣母不懌良久謂温曰汝致身及此信為英特然行誼未必如先人朱二與汝同入賊軍身死蠻徼孤男稚女艱食無告汝未有恤孤之心英特即有諸無取也温垂涕謝罪即令召諸兄子皆至汴友寜友倫皆立軍功位至方鎮元貞皇后張氏乾化中追諡五代會要云太祖皇后張氏早崩開平二年追封賢妃至乾化二年十一月二十三日追冊曰元貞皇后又北夢瑣言云梁祖魏國夫人張氏碭山富室女父㽔曽為宋州刺史温時聞張有姿色私心傾慕有麗華之歎及温在同州得張於兵間因以婦禮納之温以其宿欵深加禮異張賢明有禮温雖虎狼其心亦所敬伏每軍謀國計必先賢訪或巳出師中途有所不可張氏一介請旋如期而至其信重如此初收兖鄆得朱瑾妻温告之曰彼既無依寓於輜車張氏遣人召之瑾妻再拜張氏答拜泣下謂之曰兖鄆與司空同姓之國昆仲之間以小故尋戈致吾姒如此設不幸汴州失守妾亦似吾姒之今日也又泣下乃度為尼張恒給其費張既卒繼寵者非人及僭號後大縱朋淫骨月聚麀帷薄荒穢以致友珪之禍起於婦人殆能以柔婉之徳制豹虎之心如張氏者不亦賢乎案五代會要所載内職有梁太祖昭儀陳氏昭容李氏歐陽史並見家人傳末帝徳妃張氏五代㑹要云少帝妃張氏乾化五年九月二十四日册為徳妃其夕薨案歐陽史次妃郭氏傳云晉天福三年詔太社先藏罪人首級許親屬收𦵏乃出末帝首遣右衛將軍安崇阮與妃同𦵏之妃卒洛陽陽又案五代史無外戚傳五代會要云梁太祖長女安公主降羅延規開平二年八月追封長樂公主降趙巖開平元年五月十一日封普寜公主降昭祚王氏開平元年五月十一日封金華公主開平二年十月封真寧公主乾化三年十月五日封少常長女夀春公主乾化三年四月五日封第二女夀昌公主貞元元年九月二十三日封今攷通鑑攷異引梁功臣列傳云羅延規尚安陽公主又尚金華公主是書羅紹威傳亦載開平四年詔金華公主出家載為尼是金華公主實歸羅氏五代會要闕舊五代史巻十一
