body:
  text: 舊五代史巻九十八攷證晉列傳十三安重榮傳高祖聞重榮在北使人誘之案歐陽史作使張頴隂招重榮趙延夀傳未幾契丹主以延夀為幽州節度使封燕王案遼史云德鈞卒以延夀為幽州節度使封燕王與是書同契丹國志㑹同六年以延夀為盧龍節度使八年南征以延夀為魏博節度使封燕王與是書異尋為樞密使兼政事令案遼史天顯末以延夀妻在晉詔取之以歸自是益激昂圗報㑹同初帝幸其弟加政事令不言延夀為樞密使攷契丹國志云㑹同改元參用蕃漢以延夀為樞密使兼政事令與是書同燕王如故案遼史㑹同七年正月已丑授延夀魏博等州節度使封魏王延夀本傳亦言其先封燕王改封魏王是延夀入汴時已為魏王也是書始終稱為燕王與遼史異蕭翰傳尋卒于本土案遼史翰後以謀反伏誅與是書異美稜舊作梅里今改特哩衮舊作惕隐今改舒嚕舊作述律今改烏裕舊作兀欲今改滿逹舊作麻答今改阿巴舊作阿鉢今改按巴堅舊作阿保機今改伊喇舊作拽剌今改舊五代史巻九十八攷證
