body:
  text: 舊五代史巻七十六考證晉書高祖紀二甲戌車駕至昭義案歐陽史通鑑並從是書作甲戌至潞遼史作辛未與是書異己夘至河陽北案是書唐紀作庚辰晉帝至河陽遼史又作辛巳並與此紀異通鑑作己夘與此紀同乙夘日有蝕之案五代春秋作正月乙夘朔日食通鑑考異引十國紀年蜀人亦以乙夘為朔盖晉人避正朔日食故改甲寅朔耳定州奏契丹改幽州為南京南京歐陽史作燕京通鑑遼史契丹國志並作南京安州上言節度使盧文進殺行軍副使率部下親兵過淮案盧文進棄鎮奔吳通鑑作元年十二月五代春秋歐陽史作二年正月與是書同洞庭廟進封靈濟公案洞庭廟不載舊封疑有脱文考五代會要十國春秋並與是書同磊石廟舊封昭靈候進封威顯公威顯公五代㑹要作廣利威顯公以奉國都指揮使侯益為河陽節度使案宋史侯益傳晉祖召益謂曰宗社危若綴旒卿能為朕死耶益曰願假銃卒五千人破賊必矣以益為西靣行營副都部署据是書高行周為都部署杜重威為副部署不言侯益為副都部署與宋史異杜重威等奏收下汜水關破賊千人張從賓及其殘黨奔投入河案宋史侯益傳益率禁兵數千人次虎牢從賓軍萬餘人夾汜水而陣益親鼓士乘之大敗其衆擊殺殆盡汜水為之不流從賓乘馬入河溺死据是書祇言破賊千人與宋史異安州軍亂指揮使王暉害節度使周瓌於理所案王暉害周瓌五代春秋通鑑俱不書日歐陽史作丙子是書作甲戌諸史所載俱異大詳衮舊作大相温今改伊勒希巴舊作夷離畢今改舊五代史巻七十六考證
