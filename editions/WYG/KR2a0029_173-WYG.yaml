body:
  text: 舊五代史巻八十六攷證晉后妃列傳一高祖皇后李氏案五代會要李后在長興中進封魏國公主清泰二年改封晉國長公主歐陽史作清泰二年封魏國長公主誤少帝皇后張氏案是書少帝紀及五代㑹要俱云天福八年追冊故妃張氏為皇后歐陽史缺載富珠哩舊作𫝊住兒今改舊五代史卷八十六攷證
