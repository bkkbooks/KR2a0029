body:
  text: 舊五代史巻六十四宋門下侍郎參知政事監修國史薛居正等撰唐書第四十列傳十六霍彥威字子重洺州曲周人也梁将霍存得之於村落間年十四從征討存憐其爽邁飬為已子存梁史有傳彥威未弱冠為梁祖所知擢在左右漸升戎秩亟立戰功甞中流矢眇其一目開平二年自開封府押衙右親從指揮使檢校司空授右龍驤軍使三年自右監門衛將軍授左天武軍使遷右監門上将軍乾化三年與袁象先同誅朱友珪梁末帝授洺州刺史轉河陽留後乾化末邠州留後李保衡背李茂貞以城歸梁梁以彥威為邠州節度使其年五月茂貞遣將劉知俊率大軍攻之彥威固守踰年竟不能下或得其俘悉令放之秦人懐其徳遂無侵擾轉滑州節度使移鎭鄆州兼北面行營招討總大軍於河上師徒屢敗降授陜州留後荘宗入汴彥威自陜馳至請罪詔釋之一日莊宗於崇元殿宴諸将彥威與段凝袁象先等預為酒酣荘宗舉酒屬明宗曰此度宴客皆吾前嵗之勁敵也一旦與吾同宴葢卿前鋒之効也彥威等伏陛謝罪荘宗曰與卿話舊無足畏也因賜御衣器幣盡歡而罷尋放歸藩明年從明宗平潞州授徐州節度使契丹犯塞荘宗以明宗為北面招討使命彥威為副彥威善言論頗能接奉明宗尤重之趙太叛於刑州奉詔討平之時趙在禮據魏州與明宗㑹兵於鄴下大軍夕亂明宗為其所逼彥威從入魏州皇甫暉等尤忌彥威欲殺之彥威機辯開説竟免及出彥威部下兵士獨全衛䕶明宗至魏縣時明宗欲北趨常山彥威與安重誨懇請赴闕從至洛陽彥威首率卿相勸進于至徳宫旬日之間内外機事皆決于彦威擅収段凝温韜下獄將寘于法安重誨謂曰温段罪惡負于梁室衆所知矣今主上克平内艱冀安萬國豈為公報仇耶至天成初除鄆州節度使值青州王公儼拒命改平盧軍節度至鎮擒公儼斬之明年冬肆覲于汴州明宗接遇甚厚累官至檢校太尉兼中書令三年冬卒于理所年五十七奏至之日明宗方出近郊忽聞奏訃掩泣歸宫輟朝三日至月終不舉樂五代㑹要天成四年六月敕故平盧軍節度使霍彦威勛名顯著宅兆己營度遵定諡之規俾議送終之制宜以三公禮塟冊贈太師晉國公諡曰忠武子承訓弟彦珂累歴刺史皇朝乾徳中立明宗廟于洛州詔以彦威配饗廟庭王晏球字瑩之自言洛都人少遇亂為蔡賊所掠汴人杜氏畜之為子因冒姓杜氏晏球少沈勇有斷倜儻不羣梁祖之鎮汴也選富家子有材力者置之帳下號曰㕔子都清異録宣武㕔子都尤勇悍其弩張一大機則十二小機皆發用連珠大箭無遠不及晋人極畏此晏球預選從梁祖征伐所至立功累遷㕔子都指揮使梁開平三年自開封府押府充直左耀武指揮使授右千牛衛將軍軍職如故朱友珪之簒位也懐州龍驤守禦軍作亂欲入京城已至河陽友珪命晏球出騎迎戰擊亂軍獲軍使劉重遇以功轉左龍驤第一指揮使梁末帝嗣位以晏球為龍驤四軍都指揮使貞明二年四月十九日夜汴州捉生都將李覇等作亂縱火焚剽攻建國門梁末帝登樓拒戰晏球聞亂先得龍驤馬五百屯於鞠塲俄而亂兵以竿竪麻布沃油焚建國樓勢将危急晏球隔門窺亂兵見無甲胄即出騎擊之奮力血戰俄而羣賊散走梁末帝見騎軍討賊呼曰非吾龍驤之士乎晏球奏曰亂者惟李霸一都陛下但守宫城遲明臣必破之既而晏球盡戮亂軍全營族誅以功授單州刺史尋領軍于河上為行營馬都指揮兼諸軍将排陣使荘宗入汴晏球率騎軍入援至封丘聞梁末帝殂即觧甲降于莊宗明年與霍彥威北捍契丹授齊州防禦使北面行營馬軍都指揮使仍賜姓氏名紹䖍鄴之亂明宗入赴内難晏球時在瓦橋遣人招之明宗至汴晏球率騎從至京師以平定功授宋州節度使上章求還本姓名天成二年授北面行營副招討以兵戍滿城是嵗王都據定州通鑑都遣人説北面副招討使王晏球晏球不從乃以金遺晏球帳下使圖之不克癸巳晏球以都反状聞壬寅以晏球為北面招討使權知定州行州事契丹遣托諾率騎千餘來援都突入定州晏球引軍保曲陽王都托諾出軍拒戰晏球督厲軍士令短兵擊賊戒之曰迴首者死符彥卿以龍武左軍攻其左髙行周以龍武右軍攻其右奮劒揮撾應手首落賊軍大敗於嘉山之下追襲至於城門俄而契丹首領特哩衮率勇騎五千至唐河是時大雨晏球出師逆戰特哩衮復敗追至易州河水暴漲所在陷没俘獲二千騎而還特哩衮以餘衆北走幽州趙德鈞令牙將武從諫以騎邀擊德鈞分扼諸要路旬日之内盡獲特哩衮已下酋長七百餘人契丹遂弱晏球圍城既乆帝遣使督攻城晏球曰賊壘堅峻但食三州租税撫恤黎民愛養軍士彼自當魚潰帝然者言晏球能與将士同其甘苦所得禄賜私財盡以饗士日具飲饌與将校筵宴待軍士有禮軍中無不敬伏其年冬平賊自初戰至於城拔不戮一士上下歡心物議以為有將帥之畧以功授天下軍節度使未幾移鎮青州就加兼中書令長興三年卒于鎮時年六十贈太尉子徹位至懐州刺史戴思逺本梁之故將也初事梁祖以武幹知名開平元年自右羽林統軍加檢校司徒出為晋州刺史二年授右監門上將軍尋改華州防禦使三年自左天武使復授右羽林統軍郢王友珪簒位授洺州團練使貞明中為邢州留後遷本州節度使屬燕將張萬進殺滄州留後劉繼威以城歸梁末帝命思逺鎮之莊宗平定魏博以兵臨滄徳思逺棄鎮渡河歸汴累遷天平軍節度使兼北面招討使將兵與莊宗對壘乆之莊宗討張文禮于鎮州契丹求援莊宗追襲契丹至幽州思逺聞之總兵以襲魏州至魏店遇明宗騎軍適至思逺乃西渉洹水陷成安復歸楊村砦盡率其衆攻徳勝北城城中危急符存審晝夜乘城以拒之莊宗自薊五日馳至魏州思逺聞之觧去及明宗襲下鄆州思逺罷軍權降授宣化軍留後其年莊宗入汴思逺自鄧州入朝復令歸鎮明宗即位移授洋州節度使及西川俱叛思逺以董璋故人避嫌請代徴入朝宿衛以年告老授太子少保致仕清㤗二年八月卒于家朱漢賓字績臣亳州譙縣人也父元禮始為郡將梁太祖聞其名擢為軍校從龎師古渡淮戰殁于淮南漢賓少有膂力形神壯偉膽氣過人梁祖以其父死王事選置帳下編入屬籍梁祖之攻兖鄆也朱瑾募驍勇數百人黥雙鴈于其頰立為鴈子都梁祖聞之亦選數百人别為一軍號為落鴈都署漢賓為軍使當時目為朱落鴈後與諸將破蔡賊有功天福中授右羽林統軍入梁歴天威軍使左羽林統軍出為磁州刺史滑宋二州留後亳曹二州刺史安州節度使莊宗至洛陽漢賓自鎮入覲後令還鎮明年授左龍武統軍莊宗甞幸漢賓之第漢賓妻進酒上食奏家樂以娯之自是漢賓頗䝉寵待同光四年正月冀王朱友謙入朝明宗居洛陽以友謙故人置酒于第莊宗諸王在席友謙坐在永王存霸之上酒酣漢賓以大觴奉友謙曰公雖名位髙坐于皇弟之上非宜也僕與公俱在梁朝以宗盟相厚自公入朝三發單亟候問畧無報復忽余卑位不亦甚乎元行欽恐其紛然為觧之方止不數日友謙赤族趙在禮據魏州元行欽率軍進討詔漢賓權知河南府事明宗以漢賓為右衛上將軍樞密使安重誨方當委重漢賔密令結託得為婚家天成末為潞州節度使移鎭晉州重誨既誅漢賓復為上將軍明年秋漢賓告老授太子少保致仕清㤗二年六月卒時年六十四漢賓少勇健及晩嵗飲啖過人其狀貎偉如也凡所履歴不聞踰法梁時嘗統軍屯魏州莘縣適值連師去郡諸軍咸以利見誘請自為留後漢賓則斬其言者拒而不從聞者賞焉在曹日飛蝗去境父老歌之臨平陽遇旱親齊潔禱龍子祠踰日雨足四封大稔咸以為善政之所致也及致仕東還亳郡見鄉舊親戚淪没者有塋兆未辦則給以棺歛有婚嫁未畢則助以資幣受其恵者數百家郡人義之尋還洛陽有第在懐仁里北限洛水南枕通衢層屋連甍脩木交幹笙歌羅綺日以自娱養彼天和保其餘齒此乃近朝知止之良將也晉髙祖即位贈太子少傳諡曰貞恵子四人長曰崇勲官至左武衛將軍孔勍字鼎文兖州人後徙家宿州少便騎射為軍中小校事梁祖漸至郡守累遷齊州防禦使唐鄧節席使梁貞明中王球據襄州叛勍平之因授山南東道節度使莊宗至洛陽勍自鎮來朝復令歸鎮尋移昭義節度使同光季年監軍楊繼源與都將謀據潞州事泄勍誅之明宗即位之嵗詔還京師授河陽節度使未幾以太子太師致仕卒年七十九贈太尉劉玘汴州雍丘人也世為宣武軍牙校玘少負壯節梁祖鎮汴州玘求自試補隊長從梁祖征伐所至有功遷為牙將歴滑徐襄三州都指揮使開平中襄帥王班為帳下所害亂軍推玘為留後玘詭從之翌日受賀衙庭享士伏甲幕下盡斬其亂将以功歴復亳二州刺史徴為侍衛都將出為安州刺史貞明中為晋州留後荘宗至汴玘來朝在晉州八年日與上黨太原之師交鬬于境上荘宗見而營之曰劉侯無恙控我晋陽之南鄙嵗時乆矣不早相見玘頓首謝罪復命歸鎭正授節旄移鎭安州明宗即位遷鄧州節度使天平末以史敬鎔代之玘還京師卒贈侍中有子師道仕皇朝右贊善大夫卒周知裕字好問幽州人也少事燕帥劉仁恭為騎將表為媯州刺史久之移刺德州天祐四年劉守光既平滄州乃以其㓜子繼威為留後大将張萬進與知裕佐之繼威冲㓜宣淫于萬進之家萬進殺之詰旦召知裕告其故萬進自稱留後署知裕為景州刺史㑹萬進納欵于梁知裕先奔于汴梁主厚待之特置歸化軍以知裕為指揮使凡軍士自河朔歸梁者皆𨽻于部下梁與荘宗交戰于河摧堅挫鋭恃歸化一軍然嵗将能一紀位不及郡守同光初莊宗入汴知裕随段凝軍觧甲封丘明宗時為總管受降于郊外見知裕甚喜遙相謂曰周歸化今為吾人何樂如之因令諸子以兄事之莊宗撫憐尤異而諸校心妬之有壯士唐從益者因獵射之知裕遁而獲免莊宗遂誅從益出知裕為房州刺史魏王繼岌伐蜀召為前鋒騎將明宗即位移刺絳州改淄州刺史宿州圍練使知裕老于軍旅勤于稼穡凡為郡勸課皆有政聲朝廷喜之遷安州留後淮上之風惡病者至于父母有疾不親省視甚者避于他室或時問訊即以食物掲于長竿之首委之而去知裕心惡之召鄉之頑狠者訶詰教導俾知父子骨肉之恩繇是弊風稍革長興末入為右神武統軍清㤗初卒于官贈太傅史臣曰夫才之良者在秦亦良也在虞亦良也故彦威而下昔為梁臣不虧亮節泊歸唐祚亦無醜聲蓋松貞不變于四時玉粹寧虞其烈燄故也况彦威之輔明宗也有翌戴之績晏球之伐中山也著戡定之功方之數公尤為優矣舊五代史巻六十四
