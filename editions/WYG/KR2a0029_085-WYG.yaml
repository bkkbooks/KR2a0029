body:
  text: 舊五代史巻四十二宋門下侍郎參知政事監修國史薛居正等撰唐書第十八明宗紀八長興二年春正月庚申朔帝御明堂殿受朝賀仗衛如儀乙丑詔曰故天䇿上將軍守太師尚書令楚國王馬殷品位俱高封崇已極無官可贈宜賜諡及神道碑文仍以王禮塟壬申契丹東丹王托雲自渤海國率衆到闕帝慰勞久之錫賚加等百寮稱賀丙子以沙州節度使曹義金兼中書令丁丑東丹王托雲進本國印三紐庚辰以靜江軍節度使馬賔卒廢朝贈尚書令丙戌荆南節度使髙從誨落起復加兼中書令二月已丑朔以宋州節度使趙延夀為左武衛上將軍充宣徽北院使癸巳詔貢院舊例夜試進士今後晝試排門齊入即日試畢丁酉幸至徳宫又幸安元信東丹王托雲之第辛丑以鴻臚卿致仕賈馥卒廢朝以樞密院使守太尉兼中書令安重誨為檢校太師兼中書令充河中節度使進封沂國公已酉以右威衛上將軍陳皋為洋州節度使詔諸府少尹上任以二十五日為限諸州刺史諸道行軍司馬副使兩使判官以下賔職團練軍事判官推官府縣官等並以三十日為限幕職隨府者不在此例癸丑邠州節度使李敬周移鎮徐州詔禁天下開發無主墳墓三月辛酉詔渤海國人皇王托雲宜賜姓東丹名慕華仍授檢校太保東安都䕶兖懐化軍節使瑞鎮等州觀察等使其從慕華歸國部校各授懐化歸徳將軍中郎將先于定州擒獲蕃將特里衮宜賜姓狄名懐惠扎古宜賜姓列名知恩並授檢校右散騎常侍錫里扎拉宜賜姓原名知感裕勒古宜賜姓服名懷造奚王副使格斯齊宜賜姓乙名懐宥三人並授檢校太子賔客甲子以前鴻臚卿王瓊為太僕卿丙寅以皇子從珂為右衛大將軍從珂自河中失守歸清化里第至是安重誨出鎮河中帝召見泣而謂之曰如重誨意爾安得更相見耶因有是命壬申以滄州節度使孔循卒廢朝乙亥以西京留守權知興元軍府事王思同為山南西道節度使充西靣行營馬歩軍都虞侯庚辰以少府監聶延祚為殿中監以前雲州節度使楊漢章為安州節度使乙酉太師致仕錢鏐復授天下兵馬都元帥尚父呉越國王以其子兩浙節度使元瓘等上表首罪故有是命丁亥以太常卿李愚為中書侍郎平章事集賢殿大學士夏四月辛卯制徳妃王氏進位淑妃詔錢鏐依舊賜不名誅内官安希倫以其受安重誨密指今于内中伺帝起居故也丁酉幸㑹節園宴羣臣因幸河南府詔罷州縣官到任後率斂為地圖又禁人毁廢所在碑碣戊戌詔今年四月禘饗太廟故昭義節度使李嗣昭故幽州節度使周徳威故汴州節度使符存審並配饗莊宗廟庭己亥以前徐州節度使張䖍釗為鳯翔節度使癸卯以汴州節度副使藥縱之為户部侍郎前宗正卿李諧為將作監甲辰以宣徽北院使左衛上將軍趙延夀為檢校太傅行禮部尚書充樞密使乙巳潞州節度使劉仲殷移鎮秦州帝幸龍門佛寺祈雨己酉天雄軍節度使石敬瑭兼六軍諸衛副使辛亥以前鳯翔節度使朱𢎞昭為左武衛上將軍充宣徽南院使壬子以兵部尚書盧質為河陽節度使甲寅以遂州節度使夏魯竒没于王事廢朝詔曰久􅄽時雨深疚于心宜委諸州府長吏親問刑獄省察寃濫見禁囚徒除死罪外並放五月戊午朔帝御文明殿受朝庚申以三司使行工部尚書張延朗為兖州節度使辛酉詔近聞百執事等或親居内職或貴列廷臣或宣逹君恩或勾當公事經由列鎮干撓諸侯指射職員安排親昵或潜示㫖意或顯發書題自今後一切止絶有所犯者發薦人貶官求薦人流配如逐處長吏自循人情只仰被替人詣闕上訢長吏罰兩月俸發薦人更加一等被替人却令依舊甲子都官郎中知制誥崔棁上言請搜訪宣宗已來野史以備編修從之丁卯詔諸州府城郭内依舊禁麴其麴官中自造減舊價之半貨賣應田畝上所徴麴錢並放鄉村人户一任私造時甚便之戊辰中書奏應朝臣丁憂者望加頒賚從之丁丑以祕書監劉岳為太常卿己卯以武徳使孟漢瓊為右衛大將軍知内侍省充宣徽北院使辛巳以前相州刺史孟鵠為左驍衛大將軍充三司使甲申以權知朗州軍州事守永州刺史馬希範為洪州節度使檢校太傅以權知桂州軍府事富州刺史馬希􅂜為鄂州節度使檢校司徒乙酉以左金吾大將軍薄文為晉州留後鴻臚卿桞膺將齋郎文書賣與同姓人柳居則伏罪大理寺斷當大辟縁經赦減死追奪見任官終身不齒詔應見任前資守選官等所有本朝及梁朝出身厯任告身並仰送納委所在磨勘換給公慿只以中興已來官告及近受文書叙理其諸色䕃補子孫如非虚假不計庶嫡並宜叙録如實無子孫别立人繼嗣已補得身名者只許叙䕃一人其不合叙使文書限百日内焚毁須絶此後更敢將合焚文書參選求仕其所犯之人並𫝊者並當極法應合得資䕃出身人並須依格依令施行閏月庚寅制河中節度使檢校太師兼中書令安重誨可太子太師致仕是日重誨男崇緒等潜歸河中以右散騎常侍張文寳為兵部侍郎䕫州節度使安崇阮棄城歸闕待罪于閤門詔釋之時董璋冦峽内諸州崇阮望風遁走壬辰陜州節度使李從璋移鎮河中癸丑升盧州為昭順軍甲午以衡州刺史姚彦章為昭順軍節度使丁酉安重誨奏男崇贊崇緒等到州臣已拘送赴闕崇緒至陜州詔令下獄已亥詔安重誨宜削奪在身官爵並妻阿張男崇贊崇緒等並賜死其餘親不問壬寅以尚書左丞崔居儉為工部尚書以吏部侍郎王權為尚書左丞丙午以隨駕馬軍都指揮使宣州節度使安從進為陜州節度使丁未以前中書舍人楊凝式為左散騎常侍戊申以右龍武統軍王景戡為新州節度使已酉以右領軍上將軍李肅為左金吾大將軍壬子以隨駕歩軍都指揮使藥彦稠為邠州節度使癸丑以邠州節度使劉行琮卒廢朝贈太傅詔有司及天下州縣于律令格式六典中録本局公事書于㕔壁令其遵行六月丁巳朔復置明法科同開元禮乙丑以皇子左衛大將軍從珂依前檢校太傅加同平章事行京兆尹充西京留守庚午以邠州節度使張温為右龍武統軍甲戌以魏徴八代孫韶為安定縣主簿乙亥以鎮州節度使宋王從厚為興唐尹以石敬瑭為河陽天雄軍節度使以天雄軍節度使石敬班為河陽節度使依前六軍諸衛副使丙子詔諸道觀察使均補苗税將有力人户出剰田苗補貧下不迨頃畝有嗣者排改檢括自今年起為定額乙卯定州節度使李從敏移鎮州節度使盧質為滄州節度使庚辰皇孫太子舍人重羙授司勲員外郎重真已下六人並授同正將軍及檢校官壬午以前秦州節度使李德珫為定州節度使兼北靣行營副招討使太原地震詔天下州府斷獄先于案牘之上坐所該律令格式及新勅然後區分乙酉以前黔州節度使楊漢賔為羽林統軍詔止絶諸射係省店宅莊園秋七月庚寅以權侍衛馬軍都指揮使登州刺史張從實為夀州節度使兼侍衛歩軍都指揮使壬辰福建王延鈞上言當境廟七所乞封王號勅如諸史𫝊有名宜封為閩越富義王其餘任自于境内祭享乙未詔諸道奏薦州縣官使相先許一年薦三人今許薦五人不帶使相先許薦二人今許薦三人直屬京防禦團練使先許薦一人今許薦二人詔應州縣官内有曽在朝行及曽佐幕府罷任後準前資朝官賔從别處分其帶省銜并内供奉裏行及諸已出選門者或降授令録罷任後並依出選門例處分便與除官更不在赴常調州縣官其間書得十六考者準格叙加朝散階亦準出選門例處分三司奏先許百姓造麴不來官場收買伏恐課額不逮請復已前麴法鄉户與在城條法一例指揮仍據已造到麴納官量支還麥本從之甲辰前晉州節度使朱漢賔授太子少保致仕庚戌大理正劇可久責授登州司户刑部員外郎裴選責責授衛尉寺丞刑部侍郎李光序判大理卿事任贊各降一官罰一季俸坐斷罪失入也八月丙寅詔天下州府商税務並委逐處差人依省司年額勾當納官以故鎮州節度使趙王王鎔男昭晦為朝議大夫司農少卿賜紫金魚袋繼絶也辛丑升䖍州為昭信軍癸亥以太常少卿盧文紀為秘書監以祕書監馬縞為太子賔客左監門上將軍羅周敬為右領軍上將軍前懐州刺史婁繼英為監門上將軍乙丑詔大理寺官員等宜同臺省官例升進法直官比禮直官任使仍于諸道贓罰錢内每月支錢一百貫文賜刑部大理兩司其刑部于所賜錢三分與一分丙寅以武平軍節度使馬希振依前檢校太尉兼侍中充䖍州昭信軍節度使詔百官職吏應選授外官者考滿日並委本州申奏追還本司依舊職行公事已已太傅致仕王建立太子少保致仕朱漢賔皆上章求歸鄉里詔内外致仕官凡要出入不在拘束之限辛未以翰林學士兵部侍郎劉昫守本官充端明殿學士以左拾遺直樞密院李崧充樞密直學士壬申以左龍武統軍李承約為潞州節度使癸酉詔文武百官五日内殿起居仍舊其輸次轉對若有封事許非時上表朔望入閤待制候對一依舊制乙亥翰林學士工部侍郎竇夢徴卒丁丑以前西京副留守梁文矩為兵部尚書已卯詔不得薦銀青階為州縣官壬午詔應有朝臣藩侯郡守凡欲營𦵏未曽封贈許追封贈禮部尚書致仕李徳休卒九月丙戌以前兖州節度使符彦超為左龍武統軍已亥懐化軍節度使東丹慕華賜姓李名贊華改封隴西縣開國公應有先配諸軍契丹並賜姓名詔天下營田務只許耕無主荒田各召浮客不得留占屬縣編户辛丑樞密使檢校太傅刑部尚書范延光加同平章事使如故壬寅以中書舍人封翹為禮部侍郎禮部侍郎盧澹為户部侍郎癸卯許州節度使李從温移鎮河東詔天下州縣官不得與部内富民于公㕔同坐辛亥詔五坊見在鷹隼之類並可就山林解放今後不許進獻冬十月戊午以前北京留守太原尹馮贇為許州節度使辛酉左補闕李詳上疏以北京地震多日請遣使臣往被慰撫察問疾苦祭祀山川從之先是太原留後密奏無敢言者及詳有是奏帝甚嘉之改賜章服丙寅詔應在朝臣寮藩侯郡守準例合得追贈者新授命後便于所司投狀旋與施行封妻䕃子準格合得者亦與施行外官曽任朝班據在朝品秩格例合得封贈叙封者並與施行其補䕃據資䕃合得者先受官者先與收補後受官者據月日次第施行從之十一月甲申朔日有蝕之己丑日南至帝御文明殿受賀丁酉以翰林學士起居郎張礪為兵部員外郎知制誥充職以汝州防禦使張希崇為靈州兩使留後庚子以左威衛上將軍華温琪為華州節度使福建節度使王延鈞奏誅建州節度使王延禀及其子繼雄壬寅詔今後諸道兩使判官罷任一年與比擬書記支使防禦團練判官二年推巡軍事判官並三年後與比擬仍每遇除授量與改轉官資或階勲職次云以御史中丞劉贊為刑部侍郎以鳯州節度使孫岳充西靣閤道使壬子鄆州奏黄河暴漲漂溺四千餘户癸丑以給事中崔衍為御史中丞十二月甲寅朔詔開鐵禁許百姓自鑄農器什器之屬于夏秋田畝上毎畝輸農器錢一錢五分乙卯畋于西郊丁已以彰武軍節度使劉訓卒庚朝庚午以前利州節度使康思立為陜州節度使秦州地震丁丑詔司司所過西川兵士家屬常令瞻給舊五代史巻四十二
