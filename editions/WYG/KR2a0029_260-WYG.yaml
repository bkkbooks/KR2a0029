body:
  text: 舊五代史巻一百三十一考證周列傳十一王延傳改少傅致仕案歐陽史作以太子少保致仕賈緯傳開運中累遷中書舍人案王珪華陽集賈文元墓誌銘作曽祖緯晉中書舍人宋史賈昌期傳因之然緯實終于周非終于晉也宋祁景文集又作漢周間中書舍人据此傳緯仕漢間未嘗再為舍人疑景文集誤趙延乂傳案歐陽文作趙延義孫晟傳朱氏被誅晟乃匿跡更名棄其妻子亡命于陳宋間案孫晟一名忌南唐書云天成中與髙輦同事秦王從榮從榮敗忌亡命至正陽未及渡追騎奄至疑其状偉異睨之忌不顧坐淮岸捫敝衣捉虱追者乃捨去是以晟為秦王賓客而出亡也與是書異歐陽史從是書滿達舊作麻答今改舊五代史巻一百三十一考證
