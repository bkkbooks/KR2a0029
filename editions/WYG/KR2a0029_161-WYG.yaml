body:
  text: 舊五代史巻八十考證晉書髙祖紀六乙亥遣前邢州節度使楊彦詢使于契丹案楊彦詢使于契丹歐陽史通鑑俱從是書作九月遼史作二月己未晉遣楊彦詢來貢且言鎮州安重榮跋扈狀遂留不遣與是書異丁丑襄州安從進舉兵叛案安從進及歐陽史五代春秋俱作十月通鑑從是書作十一月遼史作十二月戊子晉遣使來告山南節度使安從進反則因其赴告之月而書之也生擒衙内都指揮使安𢎞義案宋史焦繼勲傳作擒其牙將安洪義鮑洪等五十餘人是日鎮州節度使安重榮稱兵向闕案安重榮反歐陽史通鑑俱從是書作十二月五代春秋繫于十月之後遼史作十一月丙寅晉以討安重榮來告與是書異遣前齊州防禦使宗光鄴宋光鄴遼史避諱作宋暉業宋州節度使安彦威奏修滑州黄河功畢案修河事是書紀于閏月壬辰歐陽作三月歸徳軍節度使安彦威塞決河于滑州盖以奉使之月言是書以奏功之日言也詔改鄴都宣明門為朱鳯門朱鳯門五代會要作來鳯門皇城南門為乾明門北門為𤣥徳門東門為萬春門西門為千秋門案五代會要晉改皇城四門為乾明𤣥徳萬春千秋在天福六年是書統繫于七年與會要異舊五代史巻八十考證
