body:
  text: 舊五代史巻一百二十四宋門下侍郎參知政事監修國史薛居正等撰周書第十五列傳四王殷瀛州人曽祖昌裔本州别駕祖光滄州教練使因家焉唐末幽滄大亂殷父咸珪避地南遷因投於魏軍殷自言生於魏州之開元寺旣長從軍漸為偏將唐同光末為華州馬歩軍副使因家於華下天成中移授靈武都指揮使乆之代還清泰中張令昭據鄴叛殷從范延光討之首冒矢石率先登城以功授祁州刺史尋改原州殷性謙謹好禮事母以孝聞每與人結交從違皆先禀于母母命不從殷必不往雖在軍旅交遊不雜及為刺史政事小有不佳母察之立殷於庭詰責而杖之歐陽史殷為刺史政事有小失母責之殷即取杖授婢僕自笞於母前晉天福中丁内艱尋有詔起復授憲州刺史殷上章辭曰臣為末將出處無損益于國家臣本燕人值鄉國離亂少罹偏罸因母鞠養訓導方得成人不忍遽釋苴麻遠離廬墓伏願許臣終母䘮紀晉髙祖嘉而許之晉少帝嗣位㑹殷服闋召典禁軍累遷奉國右廂都指揮使漢祖受命從討杜重威于鄴下殷與劉詞皆率先力戰矢中于首乆之出折鏃于口中以是漢祖嘉之乾祐末遷侍衛歩軍都指揮使領䕫州節度使㑹契丹寇邊遣殷領兵屯澶州及李業等作亂漢隠帝密詔澶帥李洪義遣圖殷洪義懼不克反以變告殷殷與洪義同遣人至鄴請太祖赴内難殷從平京師授侍衛親軍都指揮使太祖即位授天雄軍節度使加同平章事典軍如故殷赴鎮以侍衛司局從凡河北征鎮有戎兵處咸禀殷節制又于民間多方聚斂太祖聞而惡之因使宣諭曰朕離鄴時帑廪所儲不少卿與國家同體隨要取給何患無財三年夏太祖征兖還殷迎謁于路宴賜而去及王峻得罪太祖遣其子飛龍使承誨往謁令口諭峻之過惡以慰其心三年秋以永夀節上表請覲太祖雖允其請且慮殷之不誠尋遣使止之何福進在鎮州素惡殷之太横福進入朝摭其隂事以奏之太祖遂疑之是年冬以郊禋有日殷自鎮入覲太祖令依舊内外廵警殷出入部從不下數百人又以儀形魁偉觀者無不聳然一日遽入奏曰郊禮在近兵民大集臣城外防警請量給甲仗以備非常太祖難之時中外以太祖嬰疾歩履稍艱多不視朝俯逼郊禋殷有震主之勢頗憂之太祖乃力疾坐於滋徳殿殷入起居即命執之尋降制流竄及出都城遽殺之衆情乃安是歳春末鄴城寺寺鐘懸絶而落又火光出幡竿之上殷之入覲也都人餞于離亭上馬失鐙翻墮于地人訝其不祥果及于禍太祖尋令澶帥鄭仁誨赴鄴殷次子為衙内指揮使不候謁仁誨誅之遷其家屬于登州何福進字善長太原人父神劒累贈左驍衛大將軍福進少從軍以饒勇聞唐同光末郭從謙以兵圍莊宗於大内福進時為宿衛軍校獨出死力拒戰于内後明宗知而嘉之擢為奉聖軍校出為磁州刺史充北面行營先鋒都校清泰中自彰聖都虞候率本軍從范延光平鄴以功厯鄭隴二州防禦使開運中由潁州團練使入拜左驍衛大將軍屬契丹陷中原令中朝文武臣寮數十人隨帳北歸時福進預其行行次鎮州聞戎王巳斃其黨尚據鎮陽遂與李筠白再榮之儔合謀力戰盡逐契丹據有鎮陽時漢祖已建號于河東詔以福進為北面行營馬歩都虞候尋拜曹州防禦使檢校太保太祖出鎮于鄴將謀北伐奏以福進自隨及太祖入平内難以輔佐功拜忠武軍節度使不數月移鎮鎮州數年之間北鄙無事及聞太祖將有事于南郊拜章入覲改天平軍節度使加同平章事未及之任卒于東京之私第年六十有六時顯徳元年正月也累贈中書令子繼筠仕皇朝領建武軍節度使卒劉詞字好謙元城人梁貞明中事故鄴帥楊師厚以勇悍聞唐莊宗入魏亦列于麾下兩河之戰無不預焉同光初為效節軍使轉劒直指揮使尋以忤于權臣出為汝州小校凡畱滯十餘年清泰初詔諸道選驍果以實禁衛由是得入典禁軍晉初從侯益收汜水關佐楊光遠平鄴都累遷奉國第一軍都虞候後從馬全節伐安陸敗淮賊萬餘衆晉祖嘉之授奉國都校累加檢校司空又從杜重威敗安重榮於京城及圍鎮陽詞自登雲梯身先士伍以功加檢校司徒沁州刺史時王師方討襄陽尋命詞兼行營都虞候襄陽平遷本州團練使在郡歳餘臨事之暇必被甲枕戈而卧人或問之詞曰我以勇敢而登貴仕不可一日而忘本也若信其温飽則筋力有怠將来何以報國也及漢有天下復為奉國右廂都校遥領閬州防禦使從太祖平鄴加檢校太保乾佑初李守貞叛于河中太祖征之朝廷以為侍衛歩軍都指揮使遥領寜江軍節度使充行營馬歩都虞候命分屯於河西二年正月守貞遣敢死之士數千夜入其營皆惶懼不知所為惟詞神氣自若令於軍中曰此小盗耳不足驚也遂免胄横戈叱短兵以擊之賊衆大敗而退自是守貞䘮膽不復有奔突之意河中平太祖嘉之表其功為華州節度使歳餘移鎮邢臺太祖受命加同平章事三年秋改鎮河陽顯徳初世宗親征劉崇詞奉命領所部兵隨駕行及髙平南遇樊愛能等自北退迴且言官軍巳敗止詞不行詞不聽疾驅而北世宗聞而嘉之尋命為隨駕都部署又授河東道行營副部署其年夏車駕還京授永興軍節度使加兼侍中行京兆尹二年冬以疾卒於鎮年六十有五贈中書令諡曰忠惠詞發身軍校亟厯戎事常以忠勇自負洎領藩鎮能靖恭為治無苛政以擾民諡曰忠惠議者韙之子延欽仕皇朝為控鶴廂使王進幽州良鄉人少落魄不事生業為人勇悍走及奔馬嘗聚衆為盗封境患之符彦超為河朔郡守以賂誘置之左右長興初彦超鎮安州屬部曲王希全搆亂軍州令進齎變狀聞於朝廷明宗賞其㨗足詔隸于軍中洎契丹内宼戰於膠口進獨追擒六十七人時漢祖總侍衛親軍知其驍果擢為馬前親校漢祖鎮河東或邊上警急令進齎封章達於闕下自并至汴不六七日復焉由是恩撫頗厚繼任戎職累遷至奉國軍都指揮使從太祖入平内難以功遷虎㨗右廂都指揮使厯汝鄭防禦使亦有政聲俄授相州節度使為政之道頓減于前議者惜之顯徳元年秋以疾卒于任贈檢校太師史彦超雲州人也性驍獷有膽氣累功至龍㨗都指揮使太祖之赴内難彦超以本軍從國初與虎㨗都指揮使何徴戌晉州㑹劉崇與契丹入宼攻圍州城月餘是時本州無帥知州王萬敢不協物情彦超與何徴協力固拒累挫賊鋒攻撃日急禦捍有備軍政甚嚴居人無擾及朝廷遣樞密使王峻總兵為援宼戎宵遁太祖嘉其善守之功賞賜甚厚未幾授龍㨗右廂都指揮使尋授鄭州防禦使劉崇之寇潞州也車駕親征以彦超為先鋒都指揮使髙平之戰先登陷陣以功授華州節度使先鋒如故大軍至河東城下契丹營于忻代之間遥應賊勢詔天雄軍節度使符彦卿率諸將屯忻州以拒之彦卿襲契丹于忻口彦超以先鋒軍追蕃宼離大軍稍遠賊兵伏發為賊所陷世宗痛惜乆之詔贈太師示加等也仍命優恤其家焉史懿字繼美代郡人也本名犯太祖廟諱故改焉考建瑭事唐莊宗為先鋒都校唐書有傳莊宗之伐鎮陽時建瑭為流矢所中而卒懿時年甫弱冠莊宗以其父歿於王事召拜昭徳軍使俄遷先鋒左右廂都校俾嗣其家聲天成中為􅃰州刺史晉初由趙州刺史遷洺州團練使尋厯亳鳯二州防禦使晉祖以其弟翰尚晉國長公主故尤所注意天福中授彰武軍節度觀察留後開運初厯澶貝二鎮節度使三年移鎮涇原未幾契丹入中原時四方征鎮為戎王所召者靡不麏至惟懿堅壁拒命仍送欵于漢祖漢有天下就拜檢校太尉同平章事及賜功臣名號廣順初加檢校太師兼侍中進封邠國公顯徳元年春以抱病歸朝東都事畧楊廷璋傳周太祖嘗諭廷璋圖涇帥史懿廷璋屏左右示以詔書懿受代入朝遂免禍途經洛卒于其第年六十二贈中書令王令温字順之瀛州河間人也父迪徳州刺史累贈太子太師令温少以武勇稱初隸唐莊宗麾下稍遷㕔直軍校明宗以之為統帥嘗與契丹戰于上谷明宗臨陣馬逸為敵所迫令温乃以所乘馬授明宗而自力戰飛矢連發敵兵為之稍却及明宗即位厯遷神武彰聖都校晉初自淄州刺史遷洺州團練使及安重榮稱兵于鎮州晉祖以令温為行營馬軍都指揮使與都帥杜重威敗賊於宗城以功授亳州防禦使尋拜永清軍節度使屬契丹来宼時令温奉詔入朝契丹遂陷貝州其家屬因没於契丹晉少帝憫之授武勝軍節度使未幾移鎮延州又及靈武漢有天下復為永清軍節度使尋改安州國初加檢校太尉同平章事世宗嗣位遷鎮安軍節度使罷鎮歸朝顯徳三年夏以疾卒時年六十有二詔贈侍中周密字徳峯應州神武川人也初事後唐武皇為軍職莊宗之平常山明宗之襲汶陽密皆從征有功莊宗平梁授鎮州馬軍都指揮使明宗即位累遷河東馬歩軍副都指揮使晉天福初除冀州刺史累官至檢校司徒入為右羽林統軍檢校太保四年秋授保大軍節度使檢校太傅屬部民作亂密討平之尋移鎮晉州加檢校太尉開運中入拜右龍武統軍三年秋出鎮延州其年冬契丹陷中原延州軍亂立髙允權為帥時密據東城允權據西城相拒乆之㑹漢髙祖建義于太原遣使安撫密乃棄其城奔於太原隨漢祖歸汴乆居於闕下廣順初授太子太師致仕顯徳元年春卒時年七十五長子鋭仕皇朝為内職次子廣厯諸衛大將軍李懷忠字光孝太原晉陽人父海本府軍校懷忠形質魁壯初事唐莊宗隸于保衛軍夾城之役懷忠率先登城以功補本軍副兵馬使莊宗平定山東累遷保衛軍使天成中厯陜府許州滄州都指揮使遥領辰州刺史清泰初以河西蕃部宼鈔命懷忠率方渠晉祖受命以懷忠故人召典禁兵三遷䕶聖左右廂都指揮使遥領夀州節度使檢校太保未幾為同州節度使檢校太傅少帝嗣位入為右羽林統軍改左武衛上將軍廣順中以太子太𫝊致仕三年夏卒年六十六詔贈太子太師白文珂字徳温太原人也曾祖辯父君威遼州刺史文珂初事後唐武皇補河東牙將改遼州副使莊宗嗣位轉振武都指揮使天成中鎮州節度使王建立表為本州馬歩軍都指揮使遥授舒州刺史檢校司空厯青州魏府都指揮使厯瀛蔚忻代四州刺史領代州日兼蕃漢馬歩都部署漢髙祖鎮并門表為副留守檢校太保漢國初建授河中節度使西南面招討使檢校太傅漢祖定兩京改天平軍節度使加同平章事未幾鎮陜州檢校太師㑹河中李守貞叛詔充河中府行營都部署時文珂已老朝議恐非守貞之敵乃命太祖西征河中平文珂授西京留守河南尹太祖踐阼加兼中書令頃之以太子太師致仕世宗即位封晉國公顯徳元年卒于西京年七十九輟視朝一日子廷誨仕皇朝厯諸衛將軍卒白延遇字希望太原人也幼畜於晉之公宫年十三從晉祖伐蜀以趫悍見稱晉有天下厯典禁軍累遷至於校司空天福中晉祖在鄴安重榮叛於鎮州帥衆數萬詣闕而来晉祖命杜重威統諸將以禦之時延遇不預其行乃泣告晉祖願以身先許之及陣于宗城延遇率其屬先犯之斬級數十戰既酣而劒亦折諸將由是推伏晉祖聞之即命中使以寳劒良馬賜之常山平以功授檢校司徒充馬軍左廂都校後出為汾州刺史遷復州防禦使國初加檢校太傅尋受代歸闕屬太祖親征兖海以延遇為先鋒都校兖州平授齊州防禦使歳餘改兖州防禦使在兖二年為政有聞人甚安之州民數百詣闕乞立徳政碑以頌其羙顯徳三年冬世宗命宰臣李穀為淮南道軍都部署乃詔延遇為先鋒都校三年春帥其所部與韓令坤先入揚州軍聲甚振尋命以别部屯于盛唐前後敗淮賊萬餘衆四年夏世宗廻自夀春制以延遇為同州節度使未赴任復命帥衆南征是年冬以疾卒于濠州城下詔贈太尉唐景思秦州人也幼以屠狗為業善角觝戲初事偽蜀為軍校唐同光中莊宗命魏王繼岌帥師伐蜀時景思以所部戍于固鎮首以其城降於繼岌乃授興州刺史為貝州行軍司馬屬契丹攻其城因陷于幕廷趙延夀素知其名令隸于帳下署為所部壕砦使開運末契丹據中原以景思為亳州防禦使領事之日㑹草㓂數萬攻圍其城景思悉力以拒之後數日城陷景思挺身而出使人告于隣郡得援軍數百逐其草㓂復有其城亳民賴是以濟漢初改授鄧州行軍司馬常鬰鬰不得志後受代歸闕乾祐中命景思為沿淮廵檢使屢挫淮賊時史𢎞肇淫刑黷貨多織羅南北富商殺之奪其財大開告密之門景思部下有僕夫希求無厭雖委曲待之不滿其心一日拂衣而去見𢎞肇言景思受淮南厚賂私貯器械欲為内應𢎞肇即令親吏殿三十騎往收之告者謂收吏曰景思多力十夫之敵也見便殺之不然則無及矣收騎至景思迎接有欲擒之者景思以兩手抱之大呼曰寃哉景思何罪設若有罪死亦非晚何不容披雪公等皆丈夫安忍如此都將命釋之引告者面證景思言受淮南賂景思曰我從人家人竝在此若有十緡貯積亦是受賂言我貯甲仗除官賜外有一事亦是私貯使者搜索其家惟衣一笥軍籍糧簿而巳乃寛之景思曰使但械繋送我入京先是景思别有紀綱王知權者在京聞景思被誣乃見史𢎞肇曰唐景思赤心為國某服事三十年孝于父母義于朋友被此誣罔何以伸陳某請先下獄願公追劾景思免至􅁈横𢎞肇憫之令在獄日與酒食景思既桎梏就路潁亳之人隨至京師衆保證之𢎞肇乃令鞫告事者具伏誣陷即斬之遂奏釋景思顯徳初河東劉崇帥衆来㓂世宗親揔六師以禦之及陣于髙平景思於世宗馬前距踴數四且曰願賜臣堅甲一聨以觀臣之効用世宗由是知其名因以髙平陣所得降軍數千人署為効順指揮命景思董之使于淮上三年春世宗親征淮甸景思繼有戰功乃命遥領饒州刺史未幾改授濠州行刺史令率衆攻圍濠州四年冬因力戰為賊鋒所傷數日而卒世宗甚憫之詔贈武清軍節度使史臣曰自古為人臣者望重則必危功崇則難保自非賢者疇能免之况王鄴帥昧明哲之規周太祖乃雄猜之主欲無及禍其可得乎自福進而下皆將帥之英也擁旌作翰諒亦宜然惟彦超以捍冦而没可不謂忠乎舊五代史巻一百二十四
