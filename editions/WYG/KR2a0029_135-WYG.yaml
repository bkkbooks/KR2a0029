body:
  text: 舊五代史巻六十七宋門下侍郎參知政事監修國史薛居正等撰唐書第四十三列𫝊十九豆盧革祖籍同州刺史父瓚舒州刺史宣和書譜云失其世系革少值亂難避地鄜延轉入中山王處直禮之辟于幕下有奏記之譽因牡丹會賦詩諷處直以桑柘為意言甚古雅漸加器仰轉節度判官而理家無法獨請謁見處直處直慮布政有缺有所規諫斂版出迎乃為嬖人祈軍職矣天祐末莊宗將即位講求輔相盧質以名家子舉之徵拜行臺左丞相同光初拜平章事及登廊廟事多錯亂至于官階擬議前後倒置屢為省郎蕭希甫駮正革改之無難色莊宗初定汴洛革引薦韋説冀諳事體與已同功説既登庸復事流品舉止輕脱怨歸于革又説之子俱授拾遺父子同官為人所刺遂改授員外郎革請説之子濤為𢎞文館學士説請革之子㫒為集賢學士交致阿私有同市井識者醜之革自作相之後不以進賢勸能為務唯事修鍊求長生之術嘗服丹砂嘔血數日垂死而愈天成初將塟莊宗以革為山陵使及木主歸廟不出私第専俟旄鉞數日無耗為親友促令入朝安重誨對衆辱之日山陵使名銜尚在不俟新命便履公朝意謂邊人可欺也側目者聞之思有所中初蕭希甫有正諫之望革嘗阻之遂上疏論革與説茍且自容致君無狀復誣其縱田客殺人冒元亨上第遂貶為辰州刺史仍令所在馳驛發遣後鄭玨任圜等連上三章請不行後命乃下制曰豆盧革韋説等身為輔相手握權衡或端坐稱臣或半笑奏事于君無禮舉世寧容革則暫委利權使私俸禄文武百辟皆從五月起支父子二人偏自正初給遣説則自居重位全紊大綱叙䕃貪榮亂兒孫于昭穆賣官潤屋換令錄之身名醜行疊彰羣情共怒雖居牧守未塞非尤革可責授費州司户參軍説可夷州司户參軍皆員外置司正員並所在馳驛發遣尋貶陵州長流百姓委長吏常知所在天成二年夏詔令逐處刺史監賜自盡其骨肉並放逐便子㫒官至檢校正郎服金紫尋亦削奪寳晉齋法書賛載豆盧革田園帖云大徳欲要一居處畿甸間舊無田園鄜州雖有三兩處莊子縁百姓租佃多年累有令公大王書請卻給還人户盖不欲侵奪疲民兼慮無知之輩妄有影庇包役云云岳珂曰此帖乃與僧往還書其畏强藩避罪罟盖慄慄淵冰然其後卒以故縱田客貶夜郎正坐所畏信乎亂邦之不可居也是時據鄜乃髙萬興官檢校太師中書令封北平王即革所謂令公大王者官故梁授唐命維新而顓面正朝者不能致褫鞶之誅而反竊貢秉旄之佞唐之不競有自來矣韋説福建觀察使岫之子也案以下有闕文莊宗定汴洛説與趙光􅏷同制拜平章事説性謹重奉職常不造事端時郭崇韜秉政説等承順而巳政事得失無所措言初或有言于崇韜銓選渝濫選人或取他人出身銜或取父兄資緒與令史囊槖罔冒崇韜乃條奏其事其後郊天行事官數十人多有告勅偽濫因定去留塗毁告身者甚衆選人號哭都門之外議者亦以為積弊累年一旦澄汰太細懼失惟新含垢之意時説與郭崇韜同列不能執而止之頗遭物議説之親黨告之説曰此郭漢子之意也及崇韜得罪説懼流言所鍾乃令門人左拾遺王松吏部員外郎李慎義等上疏云崇韜往日專權不􅈺故事塞仕進之門非奬善之道疏下中書説等覆奏深詆崇韜識者非之又有王傪者能以多岐取事納賂于説説以其名犯祖諱遂改之為操擬官于近甸及明宗即位説常慮身危每求庇于任圜常保䕶之説居有井昔與鄰家共之因嫌鄙雜築垣于外鄰人訟之為希甫疏論以為井有貨財及按之本人惟稱有破斧一所反招虚妄初貶溆州刺史尋責授夷州司户參軍初説在江陵與髙季興相知及入中書亦常通信幣自討西蜀季興請攻峽内莊宗許之如能得三州俾為屬郡西川既定季興無尺寸之功洎明宗纘承季興頻請三郡朝廷不得已而與之革説方在中書亦預其議及季興占據獨歸其罪流于合州明年夏詔曰陵州合州長流百姓豆盧革韋説頃在先朝擢居重任欺公害物黷貨賣官靜惟肇亂之端更有難容之事且夔忠萬三州地連巴蜀路扼荆蠻接皇都弭難之功徇逆帥僭求之勢罔予視聽率意制移將千里之土疆開通狡穴動兩川之兵賦禦捍經年致朕莫遂偃戈猶煩運䇿近者西方鄴雖復要害髙季興尚固窠巢增吾旴食之憂職爾朋姦之計而又自居貶所繼出流言茍刑戮之稽時處忠良于何地宜令逐處刺史監賜自盡歐陽史説子濤晉天福初為尚書膳部員外郎卒盧程唐朝右族祖懿父藴厯仕通顯程天復末登進士第崔魏公領鹽鐵署為巡官昭宗遷洛陽栁璨陷右族程避地河朔客遊燕趙或衣道士服干謁藩伯人未知之豆盧革客遊中山依王處直盧汝弼來太原程與革弼皆朝族知舊因往來依革處直禮遇未優故投於太原汝弼因為延譽莊宗署為推官尋改支使程褊淺無他才惟務恃門地口多是非篤厚君子尤薄之初判官王緘從軍掌文翰胡栁之役緘没于軍莊宗歸寧太原置酒公宴舉酒謂張承業曰予今于此會取一書記先以巵酒辟之即舉酒屬巡官馮道道以所舉非次抗酒辭避莊宗曰勿謙挹無踰于卿也時以職列序遷則程當為書記汝弼亦左右之程既失職私懷憤惋謂人曰主上不重人物使田里兒居余上先是莊宗嘗于帳中召程草奏程曰叨忝成名不􅈺筆硯由是文翰之選不及于程時張承業専制河東留守事人皆敬憚舊例支使監諸廩出納程訢于承業曰此事非僕所長請擇能者承業叱之曰公稱文士即合飛文染翰以濟霸國嘗命草辭自陳短拙及留職務又以為辭公所能者何也程垂泣謝之後歴觀察判官莊宗將即位求四鎮判官可為宰輔者時盧汝弼蘇循相次淪没當用判官盧質質性疎放不願重位求留太原乃舉定州判官豆盧革次舉程即詔徵之並命為平章事程本非重器驟歴顯位舉止不恒時朝廷草創庶物未備班列蕭然寺署多缺程革受命之日即乘肩輿騶導喧沸莊宗聞呵導之聲詢于左右曰宰相擔子入門莊宗駭異登樓視之笑曰所謂似是而非者也頃之遣程使晉陽宫册皇太后山路險阻往復綿邈程安坐肩輿所至州縣驅率丁夫長吏迎謁拜伏輿前少有忤意因加笞辱及汴將王彦章陷徳勝南城急攻楊劉莊宗御軍苦戰臣下憂之咸白宰臣欲連章規諫請不躬御士伍豆盧革言及漢髙臨廣武事矢及于胸紿云中足程曰此劉季失䇿衆皆縮頸嘗論近世士族或曰員外郎孔明龜善和宰相之令緒宣聖之系孫得非盛歟程曰止于孔子之後盛則吾不知也親黨有假驢夫于程者程帖府給之府吏訢云無例程怒鞭吏背時任圜為興唐少尹莊宗從姊壻也慿其寵戚因詣程程方衣鶴􅌁華陽巾慿几決事見圜怒詈曰是何蟲豸恃婦力耶宰相取給于府縣得不識舊體圜不言而退是夜馳至博平而訢于莊宗莊宗怒謂郭崇韜曰朕誤相此癡物敢辱予九卿促令自盡崇韜亦怒事幾不測賴盧質横身解之遂降為右庻子莊宗既定河南程隨百官從幸洛陽沿路墜馬因病風而卒贈禮尚書趙鳳幽州人也少為儒唐天祐中燕帥劉守光盡率部内丁夫為軍伍而黥其面為儒者患之多為僧以避之鳳亦落髮至太原頃之從劉守奇奔梁梁用守奇為博州刺史表鳳為判官案下有闕文為鄆州節度判官唐莊宗聞鳳名得之甚喜以為䕶鑾學士後莊宗即位拜鳳中書舍人及入汴改授禮部員外郎莊宗及劉皇后幸張全義第后奏曰妾五六嵗失父母毎見老者思念尊親泣下以全義年徳妾欲父事之以慰孤女之心莊宗許之命鳳作牋上全義定往來儀注鳳上書極諫不納天成初置端明殿學士鳳與馮道俱任其職時任圜為宰相為安重誨所傾以至罷相歸磁州及未守殷以汴州叛馳驛賜圜自盡既而鳳哭謂安重誨曰任圜義士也肯造逆謀以讐君父乎如此濫刑何以安國重誨笑而不責是冬權知貢舉明年春有僧自西國取經回得佛牙大如拳褐漬皴裂進于明宗鳳揚言曰曾聞佛牙鎚鍛不壞請試之隨斧而碎時宫中所施巳踰數千緡聞毁乃止及車駕還洛留知汴州事尋授中書侍郎平章事李之儀姑溪居士集趙鳳為莊宗實録將何挺論昫疏不載昫既相遂引鳳共政事長興中安重誨出鎮河中人無敢言者惟鳳極言于上前曰重誨是陛下家臣其心終不背主五年秉權賢豪俯伏但不周防自貽浸潤明宗以為朋黨不悦其奏重誨獲罪乃出為邢州節度使及閔帝䝉塵于衛州鳳集賓佐軍校垂涕曰主上播遷渡河而北吾輩安坐不赴奔問于禮可乎軍校曰唯公所使將行聞閔帝遇弑而止清秦初召還授太保既而病足不能朝謁疾篤自為蓍筮卦成投蓍而嘆曰吾家世無五十者而復窮賤吾年巳五十又為將相豈有遐夀哉清泰二年三月卒鳳性豁達輕財重義凡士友以窮厄告者必傾其資而餉之人士以此多之也李愚字子晦自稱趙郡平棘西祖之後家世為儒父瞻業應進士不第遇亂徙家渤海之無棣以詩書訓子孫愚童齔時謹重有異常兒年長方志學徧閲經史慕晏嬰之為人初若晏平為文尚氣格有韓栁體勵志端莊風神峻整非禮不言行不茍且愚初以艱貧求為假官滄州盧彦威署安陵簿丁憂服闋隨計之長安屬闗輔亂離頻年罷舉客于蒲華之間光化中軍容劉季述王奉先廢昭宗立裕王五月餘諸侯無奔問者愚時在華隂致書于華帥韓建其略曰僕闗東一布衣耳幸讀書為文每見君臣父子之際有傷敎害義之事常痛心切齒恨不得抽腸蹀血肆之市朝明公居近闗重鎮君父幽辱月餘坐視凶逆而㤀勤王之舉僕所未諭也僕竊計中朝輔弼雖有志而無權外鎮諸侯雖有權而無志惟公明忠義社稷是依往年車輅播遷號泣奉迎累嵗供饋再復朝廟義感人心至今歌詠此時事勢尤異于前明公地處要衝位兼將相自宫闈變故已涉旬時若不號令率先以圖反正遲疑未決一朝山東侯伯倡義連衡鼔行而西明公求欲自安如何決䇿此必然之勢也不如馳檄四方諭以逆順軍聲一振則元兇破膽浹旬之間二豎之首𫝊于天下計無便于此者建深禮遇之堅辭還山天福初駕在鳳翔汴軍攻蒲華愚避難東歸洛陽時衛公李徳裕孫道古在平泉舊墅愚往依焉子弟親採梠負薪以給朝夕未嘗干人故少師薛廷珪掌貢籍之嵗登進士第又登宏訶科授河南府參軍遂卜居洛表白沙之别墅梁有禪代之謀栁璨希旨敎害朝士愚以衣冠自相殘害乃避地河朔與宗人李延光客于山東梁末帝嗣位雅好儒士延光素相欵奉得侍講禁中屢言愚之行髙學膽有史魚蘧瑗之風召見嗟賞久之擢為左拾遺俄充崇政院直學士或預咨謀而儼然正色不畏强禦衡王入朝重臣李振輩皆致拜惟愚長揖末帝讓之曰衡王朕之兄朕猶致拜崇政使李振等皆拜爾何傲耶對曰陛下以家人禮兄振等私臣也臣居朝列與王無素安敢諂事其剛毅如此晉州節度使華温琪在任違法籍民家財其家訟于朝制使劾之伏罪梁末帝以先朝草昧之臣不忍加法愚堅按其罪梁末帝詔曰朕若不與鞫窮謂予不念赤子若或遂行典憲謂予不念功臣為爾君者不亦難乎其華温琪所受贓宜官給代還所訟之家貞明中通事舍人李霄傭夫毆僦舍人致死法司按律罪在李霄愚白李霄手不鬬毆傭夫致死安得坐其主耶以是忤旨愚自拾遺再遷膳部員外郎賜緋改司勲員外郎賜紫至是罷職厯許鄧觀察判官初在内職慈州舉子張礪依焉貞明中礪自河陽北歸莊宗補授太原府掾出入崇闥之間揄揚愚之節槩及言愚之所為文仲尼遇顔回夀夷齊非餓人等篇北人望風稱之洎莊宗都洛陽鄧帥俾奏章入朝諸貴見之禮接如舊尋為主客郎中數月召為翰林學士三年魏王繼岌征蜀請為都統判官仍帶本職從軍時物議以蜀險阻未可長驅郭崇韜問計于愚愚曰如聞蜀人厭其主荒恣倉卒必不為用宜乘其人二三風馳電擊彼必破膽安能守險及前軍至固鎮收軍食十五萬斛崇韜喜謂愚曰公能料事吾軍濟矣招討判官陳乂至寶雞稱疾乞留在後愚厲聲曰陳乂見利則進懼難則止今大軍涉險人心易惑正可斬之以徇繇是軍人無遲留者是時軍書羽檄皆出其手蜀平就拜中書舍人師還明宗即位時西征副招討使任圜為宰相雅相欽重屢言于安重誨請引為同列屬孔循用事援引崔協以塞其請俄以本職權知貢舉改兵部侍郎充翰林承旨長興初除太常卿屬趙鳳出鎮邢臺乃拜中書侍郎平章事轉集賢殿大學士長興季年秦王恣横權要之臣避禍不暇邦之存亡無敢言者愚性剛介往往形言然人無唱和者後轉門下侍郎監修國史兼吏部尚書與諸儒修成創業功臣𫝊三十巻愚初不治第既命為相官借延賓館居之嘗有疾詔近臣宣諭延之中堂設席惟筦秸使人言之明宗時賜帷帳茵褥職官分紀云長興四年愚病明宗遣中使宣問愚所居寢室蕭然四壁病榻敝氊而已中使具言其事帝曰宰相俸錢幾何而委頓如此詔賜絹百疋錢百千帷帳什物二十三事閔帝嗣位志修徳政易月之制纔除便延訪學士讀貞觀政要太宗實録有意于郅理愚私謂同列曰吾君延訪少及吾輩位髙責重事亦堪憂奈宗社何皆惕息而不敢言以恩例進位左僕射清泰初徽陵禮畢馮道出鎮同州愚加特進太微宫使𢎞文館大學士宰相劉昫與馮道為婚家道既出鎮兩人在中書或舊事不便要釐革者對論不定愚性太峻因曰此事賢家翁所為更之不亦便乎昫憾其言切于是每言必相折難或至諠呼無幾兩人俱罷相守本官清泰二年秋愚已嬰疾率多請告累表乞骸不允卒于位任圜京兆三原人祖清成都少尹父茂𢎞避地太原奏授西河令有子五人曰圖回圜團風彩俱異武皇愛之以宗女妻圜厯代憲二郡刺史李嗣昭典兵于晉陽與圜遊處甚洽及鎮澤潞請為觀察支使解褐賜朱紱圜美姿容有口辯嗣昭為人間諜于莊宗方有微隙圜奉使往來常申理之克成友于之道圜之力也及丁母憂莊宗承制起復潞州觀察判官賜紫常山之役嗣昭為帥于軍圜代總其事號令如一敵人不知莊宗聞之倍加奬賞是秋復以上黨之師攻常山城中萬人突出大將孫文進死之賊逼我軍圜麾騎士擊之頗有殺獲嘗以禍福諭其城中鎮人信之使乞降及城潰誅元惡之外官吏咸保其家屬亦以圜所庇䕶焉莊宗改鎮州為北京以圜為工部尚書兼真定尹北京副留守知留守事明年郭崇韜兼鎮改行軍司馬充北面水陸轉運使仍知府事同光三年歸朝守工部尚書崇韜伐蜀奏令從征西蜀平署圜黔南節度使懇辭遂止魏王班師行及利州康延孝叛以勁兵八千迴刧西川繼岌聞之夜半命中使李延安召圜圜方寢延安登其牀以告之圜衣不及帶遽見繼岌繼岌泣而言曰紹琛負恩非尚書不能制即署圜為招討副使與都指揮使梁漢顒等率兵攻延孝于漢州擒之旋至渭南繼岌遇害圜代總全師朝于洛陽明宗嘉其功拜平章事判三司圜揀拔賢俊杜絶倖門百官俸入為孔謙減折圜以廷内為國家羽儀故優假班行禁其虚估朞月之内府事充贍朝廷修葺軍民咸足雖憂國如家而切于功名故為安重誨所忌嘗與重誨會于私第有妓善歌重誨求之不得嫌隙自兹而深矣先是使人食劵皆出于户部重誨止之俾須内出爭于御前往復數四竟為所沮通鑑安重誨與圜爭于上前往復數四聲色俱厲上退朝宫人問上適與重誨論事為誰上曰宰相宫人曰妾在長安宮中未嘗見宰相樞密奏事敢如是者盖輕大家耳上愈不悦因求罷三司天成二年除太子少保致仕出居磁州及朱守殷叛重誨乘間誣其結搆立遣人稱制就害之乃下詔曰太子少保致仕任圜早推勲舊曾委重難既退免于劇權俾優閒于外地而乃不遵禮分潛附守殷緘題罔避于嫌疑情㫖頗彰于怨望自収汴壘備見縱由若務含𢎞是孤典憲尚全大體止罪一身宜令本州于私第賜自盡圜受命之日聚族酣飲神情不撓清泰中制贈太傅子徹仕皇朝位至度支郎中卒史臣曰韋説承舊族之胄佐新造之邦業雖謝于財成罪未聞于昭著而乃為權臣之所忌顧後命以無逃静而言之亦可憫也盧程器狹如是形渥攸宜趙鳳李愚咸以文學之名俱踐巖廊之位校其貞節愚復優焉任圜有縱横濟物之才無明哲保身之道退猶不免吁可悲哉舊五代史巻六十七
