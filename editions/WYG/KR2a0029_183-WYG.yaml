body:
  text: 舊五代史巻九十一攷證晉列傳六房知温傳及末帝即位知温憂甚案歐陽史作愍帝出奔知温乘間有窺覦之意與是書㣲異建立傳以太子少保致仕案通鑑作以太傅致仕歐陽史從是書康福傳靈武兵馬留後韓潯韓潯通鑑歐陽史俱作韓洙弟澄福鎮靈武凡三歳每歳大稔倉儲盈羡有馬千駟因為人所譛安重誨曰累據使臣所言康福大有寳貨必負朝廷案靈武受代康福領節度在天成四年次年為長興元年安重誨討蜀二年賜死是康福之任靈武甫匝嵗而重誨已去朝再期而賜死矣此傳云福鎮靈武凡三歳每歳大稔重誨奏其必負朝廷疑有舛誤歐陽史仍是書之舊安彦威傳彦威入司禁衛遥領鎮州節度使案歐陽史作遷捧聖指揮使領寧國軍指揮使李周傳案是書莊宗紀作李周明宗紀作李敬周盖本名敬周入晉後避諱去敬字是書雜采諸書未及改歸畫一通鑑與是書同張從訓傳為少帝娶從訓長女為妃案宋史張從恩傳晉祖鎮河東為少帝娶從恩女今攷五代㑹要及是書本紀俱作從訓疑宋史係傳聞之訛舊五代史巻九十一攷證
