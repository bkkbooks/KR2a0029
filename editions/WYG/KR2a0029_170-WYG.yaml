body:
  text: 舊五代史巻八十五宋門下侍郎參知政事監修國史薛居正等撰晉書第十一少帝紀五開運三年冬十月甲子正衙命使册皇太妃安氏乙丑以樞宻直學士禮部侍郎邊光範爲翰林學士以給事中邊歸讜爲左㪚騎常侍以翰林學士祠部員外郎知制誥張沆爲右諫議大夫辛未以鄴都留守杜威爲北面行營都招討使以侍衛親軍都揮使鄆州節度使李守貞爲兵馬都監兖州安審琦爲左右廂都指揮使徐州符彦卿爲馬軍左廂都指揮使滑州皇甫遇爲馬軍右廂都指揮使貝州梁漢璋爲馬軍都排陣使前鄧州宋彦筠爲歩軍左廂都指揮使奉國左廂都指揮使王饒爲歩軍右廂都指揮使洛州團練使薛懐讓爲先鋒都指揮使案通鑑載當時勑牓曰先取瀛鄭安定關南次復幽燕盪平塞北蓋狃于陽城之役而驟驕也癸酉冊吳國夫人馮氏為皇后乙亥以侍衛馬軍都指揮使李彦韜權知侍衛司事丙戌鳯翔節度使秦王李從曮薨輟朝贈尚書令丁亥邠州節度使李徳珫卒輟朝贈太尉十一月戊子朔以給事中盧撰為右㪚騎常侍以尚書兵部郎中兼侍御史知雜事陳觀為左諌議大夫觀以祖諱義乞改官尋授給事中庚寅樞宻使中書侍郎兼户部尚書平章事馮玉加尚書右僕射以皇子鎮寧軍節度使延煦為陜州節度使以陜州留後焦繼勲為鳯翔留後以前定州留後安審琦為邠州留後以右僕射和凝為左僕射甲午兩浙節度使吳越國王錢𢎞佐起復舊任丁酉詔李守貞知幽州行府事戊申日南至御崇元殿受朝賀是月北面行營招討使杜威率諸将領大軍自鄴北征師次瀛州城下貝州節度使梁漢璋戰死杜威等以漢璋之敗遂收軍而退行次武強聞戎王入冦欲取直路自冀貝而南㑹張彦澤領騎自鎮定至且言契丹可破之狀於是大軍西趍鎮州十二月丁巳朔以下疑有闕文據通鑑云丁巳朔李縠自書宻奏具言大軍危急之勢請車駕幸滑州遣高行周符彦卿扈從及𤼵兵守澶州河陽以備敵之奔衝遣軍将闗勲走馬上之巳未杜威奏駐軍于中渡橋庚申以前司農卿儲延英爲太子賓客詔徐州符彦卿屯澶州辛酉詔澤潞鄴都邢洛河陽運粮赴中渡杜威遣人口奏軍前事宜勢迫故也壬戌又遣高行周屯澶州景延廣守河陽博野縣都監張鵬入奏蕃軍事勢丙寅定州李殷奏前月二十八日夜領捉生四百人往曲陽嘉山下逢賊軍車帳殺千餘人獲馬二百匹詔宋州高行周充北面行營都部署符彦卿充副邢州方太充都虞候領後軍駐于河上以備敵騎之奔衝也時契丹遊騎渉滹水而南至欒城縣自是中渡寨爲蕃軍隔絶探報不通朝廷大恐故委行周等繼領兵師守扼津要且以張其勢也己巳邢州方太奏此月六日契丹與王師戰于中渡王師不利奉國都指揮使王清戰死庚午幸沙臺射壬申始聞杜威李守貞等以此月十日率諸軍降于契丹是夜相州節度使張彦澤受契丹命率先鋒二千人自封丘門斬闗而入癸酉旦張彦澤頓兵于明徳門外京城大撓前曹州節度使石贇死之帝之堂叔也時自中渡寨隔絶之後帝與大臣端坐憂危國之衛兵悉在北面計無所出十六日聞滹水之降是夜偵知張彦澤巳至滑州召李崧馮玉李彦韜入内計事方議詔河東劉知逺起兵赴難至五鼓初張彦澤引蕃騎入京宫中相次火起帝自攜劔驅擁后妃巳下十數人将同赴火爲親校薛超所持俄自寛仁門逓入契丹主與皇太后書帝乃止旋令撲滅烟火大内都㸃檢康福全在寛仁門宿衛登樓覘賊彦澤呼而下之癸酉帝奉表于契丹主曰孫臣某言今月十七日寅時相州節度使張彦澤都監富珠哩部領大軍入京齎到翁皇帝賜太后書示于滹沱河降下杜威一行馬歩兵士見領蕃漢歩騎來幸汴州者往者唐運告終中原失馭數窮否極天缺地傾先人有田一成有衆一旅兵連禍結力屈勢孤翁皇帝救患摧鋒興利除害躬擐甲胄深入冦塲犯露䝉霜度鴈門之險馳風掣電行中冀之誅黄鉞一麾天下大定勢凌宇宙義感神明功成不居遂興晉祚則翁皇帝有大造于石氏也旋屬天降鞠凶先君即世臣遵承遺㫖纘紹前基諒闇之初荒迷失次凡有軍國重事皆委将相大臣至于擅繼宗祧既非禀命輕𤼵文字輒敢抗尊自啓釁端果貽赫怒禍至神惑運盡天亡十萬師徒皆望風而束手億兆黎庶悉延頸以歸心臣負義包羞貪生忍恥自貽顚覆上累祖宗偷度晨昏茍存視息翁皇帝若惠顧疇昔稍霽雷霆未賜靈誅不絶先祀則百口荷更生之徳一門銜罔報之恩雖所愿焉非敢望也臣與太后并妻馮氏及舉家戚屬見于郊野面縛俟罪次所有國寳一面金印三面今遣長子陜府節度使延煦次子曹州節度使延寳管押進納并奉表請罪陳謝以聞甲戌張彦澤遷帝與太后及諸宫屬于開封府遣控鶴指揮使李榮将兵監守是夜開封尹桑維翰宣徽使孟承誨皆遇害帝以契丹主将至欲與太后出迎彦澤先表之禀契丹主之㫖報云比欲許爾朝覲上國臣寮奏言豈有兩箇天子道路相見今賜所佩刀子以慰爾心己卯皇子延煦延寳自帳中廻得僞詔慰撫帝表謝之時契丹主以所送𫝊國寳製造非工與載籍所述者異使人來問帝進狀曰頃以偽主王從珂于洛京大内自焚之後其真𫝊國寶不知所在必是當時焚之先帝受命旋製此寳在位臣寮備知其事臣至今日敢有隱藏云時移内庫至府帝使人取帛數段主者不與謂使者曰此非我所有也又使人詣李崧求酒崧曰臣有酒非敢愛惜慮陛下杯酌之後憂躁所作别有不測之事臣以此不敢奉進丙戌晦百官宿封禪寺明年正月朔契丹主次東京城北百官列班遙辭帝于寺詣北郊以迎契丹主帝舉族出封丘門肩舉至野契丹主不與之見遣泊封禪寺文武百官素服紗㡌迎謁契丹主于郊次俯伏俟罪契丹主命起之親自慰撫契丹主遂入大内至昏出宫是夜宿于赤堈契丹主下詔應晉朝臣寮一切仍舊朝廷儀制竝用漢禮戊子殺鄭州防禦使楊承勲責以背父之罪令左右臠割而死遼史以其弟承信為平盧軍節度使襲父爵己丑斬張彦澤于市以其剽刦京城恣行屠害也遼史以張彦澤擅徙重貴開封殺桑維翰縱兵大掠不道斬于市庚寅洛京留守景延廣自扼吭而死辛卯契丹制降帝為光禄大夫檢校太尉封負義侯黄龍府安置其地在渤海國界癸巳遷帝于封禪寺遣蕃大将崔廷勲将兵守之癸卯帝與皇太后李氏皇太妃安氏皇后馮氏皇弟重睿皇子延煦延寳俱北行以宫嬪五十人内官三十人東西班五十人醫官一人控鶴官四人御厨七人茶酒三人儀鸞司三人軍健二十人從行宰臣趙瑩樞宻使馮玉侍衛馬軍都指揮使李彦韜随帝入蕃契丹主遣三百騎援送而去所經州郡長史迎奉皆為契丹主阻絶有所供饋亦不通宋史李榖傳少帝䝉塵而北舊臣無敢侯謁者榖獨拜迎于路君臣相對泣下榖曰臣無狀負陛下因傾囊以獻嘗一日帝與太后不能得食乃殺畜而啖之帝過中渡橋閱杜重威營寨之迹慨然憤歎謂左右曰我家何負為此賊所破天乎天乎于是號慟而去至幽州傾城士庶迎看于路見帝慘沮無不嗟嘆宣政雜録徽宗北狩經薊縣梁魚務有還鄉橋石少帝所命名也里人至今呼之駐留旬餘州将承契丹命犒帝于府署趙延夀母以食饌來獻自范陽行數十程過薊州平州至榆闗沙塞之地畧無供給毎至宿頓無非路次一行乏食宫女從官但採木實野蔬以救飢弊又行七八日至錦州契丹廹帝與妃后往拜案巴堅遺像帝不勝屈辱泣曰薛超誤我不令我死以至今日也又行數十程渡遼水至黄龍府此即戎王所命安置之地也六月契丹國母召帝一行往懷密州州在黄龍府西北千餘里行至遼陽皇后馮氏以帝陷蕃過受艱苦令内官潛求毒藥将自飲之并以進帝不果而止又行二百里㑹國母為永康王所執永康王請帝却往遼陽城駐泊帝遣使奉表于永康且賀克㨗自是帝一行稍得供給漢乾祐元年四月永康王至遼陽帝與太后竝詣帳中帝御白衣紗㡌永康止之以常服謁見帝伏地雨泣自陳過咎永康使左右扶帝上殿慰勞乆之因命設樂行酒從容而罷永康帳下從官及教坊内人望見故主不勝悲咽内人皆以衣帛藥餌獻遺于帝及永康發離遼陽取内官十五人東西班十五人及皇子延煦竝令隨帳上陘陘即蕃王避暑之地也有綽諾錫里者即永康之妻兄也知帝有小公主在室詣帝求之帝辭以年㓜不可又有東西班數輩善于歌唱綽諾又請之帝乃與之後數日永康王馳取帝㓜女而去以賜綽諾至八月永康王下陘太后馳至霸州詣永康求于漢兒城寨側近賜養種之地永康許諾令太后于建州住泊漢乾祐二年二月帝自遼陽城𤼵赴建州行至中路太妃安氏得疾而薨乃焚之載其燼骨而行帝自遼陽行十數日過儀州霸州遂至建州節度使趙延暉盡禮奉迎館帝于衙署中其後割寨地五千餘頃其地至建州數十里帝乃令一行人員于寨地内築室分耕給食于帝是嵗舒嚕王子遣契丹數騎詣帝取内人趙氏聶氏疾馳而去趙聶者帝之寵姬也及其被奪不勝悲憤漢乾祐三年八月太后薨周顯徳初有漢人自寨北而至者言帝與后及諸子俱無恙猶在建州其隨從職官役使人輩自蕃中亡歸物故者大半矣郡齋讀書志云晉朝䧟蕃記范質撰質石晉末在翰林為出帝草降表知其事為詳記少主初遷于黄龍府後居于建州凡十八年而卒按契丹丙午嵗入汴順數至甲子嵗為十八年實太祖乾徳二年也景五代史補少主之嗣位也契丹以不俟命而擅立又延廣辱其使契丹怒舉國南侵以駙馬都尉杜重威等領駕下精兵甲禦之于中流河橋既而契丹之衆巳深入而重威等奏報未到朝廷時桑維翰罷相為開封府尹謂僚佐曰事急矣非大臣鉗口之時乃叩内閣求見欲請車駕親征以固将士之心而少主方在後苑調鷹至暮竟不召維翰退而嘆曰國家阽危如此草澤逋客亦宜下問况大臣求見而不召耶事亦可知矣未幾杜重威之徒降于契丹少主遂北遷史臣曰少帝以中人之才嗣将墜之業屬上天不祐仍嵗大饑尚或絶强敵之歡盟鄙輔臣之謀畧奢淫自縱謂有㤗山之安委託非人坐受平陽之辱族行萬里身老窮荒自古亡國之醜者無如帝之甚也千載之後其如耻何傷哉舊五代史巻八十五
