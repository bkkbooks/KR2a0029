body:
  text: 舊五代史巻一百十七攷證周世宗紀四是夜賊将朱元朱仁裕孫璘各舉砦來䧏案通鑑云辛卯夜朱元與先鋒壕寨使朱仁裕等舉寨萬餘人䧏據是書則朱元等之䧏即在庚寅與通鑑異壽州劉仁贍上表乞䧏案通鑑攷異云仁贍䧏書盖其副使孫羽等為之歐陽史本傳亦言孫羽詐為仁贍書以城䧏與是書所載俱異壬午彭城郡夫人劉氏追册為皇后案歐陽史作癸未追册與是書異壬申駕發京師案壬申原本作壬辰考五代春秋作十月壬辰帝南征與是書同歐陽史作壬申南征通鑑作壬申帝發大梁與是書異据下文有壬午則十月不應有壬辰疑原本係傳冩之誤今從歐陽史通鑑改正以内客省使昝居潤為宣徽北院使權東京留守案上文以王朴為權東京留守不應復以命昝居潤据東都事畧昝居潤傳世宗幸淮上命為副留守疑原本脱副字壬戌偽命濠州團練郭廷謂以城歸順案郭廷謂以城䧏歐陽史作庚申通鑑作辛酉與是書異舊五代史巻一百十七攷證
