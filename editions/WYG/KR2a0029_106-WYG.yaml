body:
  text: 舊五代史巻五十二攷證唐列𫝊四李嗣昭𫝊初嗜酒案歐陽史作初喜嗜酒呉縝纂誤云喜即嗜也疑謄喜字武皇乃以嗣昭為昭義節度使案舊唐書作太原李克用以其子嗣昭為留後考嗣昭本克柔養子舊唐書以為武皇子殊誤嗣昭有子七人長曰繼儔澤州刺史次繼韜繼忠繼能繼襲繼逺案嗣昭有子七人此𫝊僅載其六歐陽史仍薛史之舊据繼韜附𫝊有弟繼達合數之恰得七人也李繼韜𫝊命為安義軍兵馬留後案通鑑注云後唐改昭義為安義葢為嗣昭避諱也歐陽史仍作昭義裴約𫝊即遣紹斌率五千騎以赴之李紹斌歐陽史作李存審考是書莊宗紀亦作紹斌疑歐陽史誤李嗣恩𫝊戰契丹於新州殁焉案遼史太祖紀二年三月合戰于新州東殺李嗣本之子武八考武八本嗣恩子而遼史以為嗣本子盖𫝊聞之誤按巴堅舊作阿保機今改舊五代史巻五十二攷證
