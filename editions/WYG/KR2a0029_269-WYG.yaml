body:
  text: 舊五代史巻一百三十六宋門下侍郎參知政事監修國史薛居正等撰僭偽列傳第三王建陳州項城人唐末𨽻名於忠武軍秦宗權據蔡州懸重賞以募之建始自行間得補軍侯廣明中黄巢䧟長安僖宗幸蜀時梁袓為巢將領衆攻襄鄧宗權遣小校鹿晏𢎞從監軍楊復光率師攻之建亦預行是歳復光入援京師明年破賊收京城初復光以忠武軍八千人立為八都晏𢎞與建各一都校也復光死晏𢎞率八都迎扈行在至山南乃攻剽金商諸郡縣得兵數萬進逼興元節度使牛叢棄城而去晏𢎞因自為留後以建等屬郡刺史不令之任俄而晏𢎞正授節旄恐部下謀已多行忍虐繇是部衆離心建與别將韓建友善晏𢎞益猜二建偽待之厚引入卧内二建懼夜登城慰守陴者因月下共謀所向謂韓建曰僕射甘言厚徳是疑我也禍難無日矣早冝擇利而行韓曰善因率三千人以趨行在僖宗嘉之賜與巨萬分其兵為五都仍以舊校主之即晋暉李師泰張造與二建也因號曰隨駕五都田令孜皆録為假子及僖宗還宫建等分典神䇿軍皆遥領刺史光啟初從僖宗再幸興元令孜懼逼求為西川監軍楊復㳟代為觀軍容使建等素為令孜所厚復恭懼不附巳乃出五將為郡守以建為壁州刺史及天子還京復恭以楊守亮鎮興元尤畏建侵已屢召之建不安其郡因招合溪洞豪猾有衆八千㓂閬州陷之復攻利州刺史王珙棄城而去建播剽二郡所至殺掠守亮不能制東川節度使顧彦朗初於闗輔破賊時與建相聞每遣人勞問分貨幣軍食以給之故建不侵梓遂西川節度使陳敬瑄憂其膠固謀於監軍田令孜曰王八吾子也彼無他腸作賊山南實進退無歸故也吾馳咫尺之書可以坐置麾下即飛書招建建大喜遣使謂彦朗曰監軍阿父遣信見招僕欲詣成都省阿父因依陳太師得一大都是所願也即之梓州見彦朗留家寄東川選精甲三千之成都行次鹿頭或謂敬瑄曰建今之劇賊鴟視狼顧專謀人國邑儻其即至公以何等處之彼建雄心終不居人之下公如以將校遇之是養虎自貽其患也敬瑄懼乃遣人止建遽修城守建怒遂據漢州領輕兵至成都敬瑄讓之曰彼何為者而犯吾疆理建軍吏報曰閬州司徒北寄東川而軍容太師使者繼召今復拒絶何也司徒不惜改轅而東而北省太師反為拒絶慮顧梓州復相嫌閒謂我何心故也使我來報且欲寄食漢州公勿復疑時光啟三年居浹旬建盡取東川之衆設梯衝攻成都三日不尅而退復保漢州月餘大剽蜀土進逼彭州百道攻之敬瑄出兵來援建解圍縱兵大掠十一州皆罹其毒民不聊生建軍勢日盛復攻成都敬瑄患之顧彦朗亦懼侵巳昭宗即位彦朗表請雪建擇大臣為蜀帥移敬瑄他鎮乃詔宰臣韋昭度鎮蜀以代敬瑄敬瑄不受代天子怒命顧彦朗楊守亮討之時昭度以建為牙内都校董其部兵鑑戒録云昭度以部兵置行府及王師無功建謂昭度曰相公興數萬之衆討賊未効餉運交不相屬近聞雒陽以來藩鎮相噬朝廷姑息不暇與其勞師以事蠻方不如從而赦之且以兵威靖中原是國之本也相公盍歸朝覲與主上畫之昭度持疑未决一日建陰令軍士於行府門外擒昭度親吏臠而食之建徐啟昭度曰葢軍士乏食以至於是耶昭度大懼遂留符節與建即日東還纔出劒門建即嚴兵守門不納東師月餘建攻西州管内八州所至響應遂急攻成都田令孜登城謂建曰老夫與八哥相厚太師久以知聞有何嫌恨如是困我之甚耶建曰軍容父子之恩心何敢忘但天子付以兵柄太師孤絶朝廷故也茍太師悉心改圖何福如之又曰吾欲與八哥軍中相欵如何曰父子之義何嫌也是夜令孜攜蜀帥符印入建軍授建建泣謝曰太師初心大過致有今日相戾既此推心一切如舊翌日敬瑄啟闗迎建以蜀帥讓之建乃自稱留後表陳其事明年春制授檢校太傅成都尹西川節度副大使知節度事管内觀察處置雲南八國招撫等使時龍紀元年也移敬瑄於雅州安置仍以其子為刺史既行建令人殺之於路令孜仍舊監軍事數月或告令孜通鳯翔書問下獄餓死蜀檮杌云敬瑄廢處雅州以其子為刺史既行建遣殺於三江令孜仍監其軍復以令孜隂附鳯翔下獄餓死建雄猜多機畧意甞難測既有蜀土復欲窺伺東川又以彦朗婚姻之舊未果行㑹彦朗卒弟彦暉代為梓帥交情稍怠李茂貞乘其有閒宻搆彦暉因與茂貞連盟闗征疆吏之閒與蜀人得失大順末建出師攻梓州彦暉求援於鳯翔李茂貞岀師援之建即圍解自是秦川交惡者累年後建大起蜀軍敗岐梓之兵於利州彦暉懼乞和請與岐人絶許之景福中山南之師宼東川彦暉求援於建建出兵赴之大敗興元之衆洎軍旋建乘虚奄襲梓州擄彦暉置於成都遂兼有两川自此軍鋒益熾天福初李茂貞韓全誨却遷車駕在鳯翔梁祖攻圍歴年建外修好於汴指茂貞罪狀又隂與茂貞閒使往來且言堅壁勿和許以出師赴援因分命諸軍攻取興元比及梁祖解圍茂貞山南諸州皆為建所有自置守將及茂貞垂翅天子遷雒陽建復攻茂貞之秦隴等州茂貞削弱不能守或勸建因取鳯翔建曰此言失䇿吾所得已多不俟復增岐下茂貞雖常才然名望宿素與朱公力争不足守境有餘韓生所謂入為扞蔽出為席藉是也適宜援而固之為吾盾鹵耳及梁祖將謀强禪建與諸藩同謀興復乃令其將康晏率兵三萬會於鳯翔數與汴將王重師戰不利而還趙匡凝之失荆襄也弟匡明以其孥奔蜀建因得䕫峽忠萬等州及梁祖開國蜀人請建行劉備故事建自帝於成都改元永平五年改元通正是年冬改元天漢又改元光天在位十二年年七十二子衍嗣衍建之㓜子也建卒衍龍偽位改元乾德六年十二月改明年為咸康秋九月衍奉其母徐妃同逰於青城山駐於上清宫時宫人皆衣道服頂金蓮花冠衣畫雲霞望之若神仙及侍宴酒酣皆免冠而退則其髻髽然又構怡神亭以佞臣韓昭等為狎客雜以婦人以恣荒宴或自旦至暮繼之以燭偽嘉王宗壽侍宴因以社稷國政為言言發涕流至於再三同宴佞臣潘在迎等始奏衍云嘉王好酒悲因翻恣諧謔取笑而罷自是忠正之臣結舌矣時中國多故衍得以自安唐荘宗平梁遣使告捷於蜀蜀人恟懼致禮復命稱大蜀國主致書上大唐皇帝詞理稍抗荘宗不能容遣客省使李嚴報聘且市宫中珍玩蜀人皆禁而不出衍既冲騃軍國之政咸委於人有王宗弼者為六軍使總外任宋光嗣者為樞密使總内任洎嚴至蜀光嗣等曲宴因言中國近事嚴亦引近事折之語在嚴𫝊光嗣等聞嚴辯對畏而奇之及嚴使還奏莊宗曰王衍騃童耳宗弼等總其兵柄但益家財不恤民事君臣上下唯務窮奢其舊勲故老棄而不仕蠻蜑之人痛深瘡痏以臣料之大兵一臨望風瓦解莊宗深然之遂蒐兵括馬有平蜀之志唐師未起時偽東川節度使宋承葆獻計於衍云唐國兵强不早為謀後將焉救請於嘉州松江造戰艦五百艘募水軍五千自江下峽臣以東師出襄鄧水陸俱進東北㳂邊嚴兵據險南師出江陵利則進取否則退保硤口又選三蜀驍壯三萬急攻岐雍東據河潼北招契丹㗖以美利見可則進否則據散闗以固吾圉事縱不捷亦攻敵人之心矣衍不從唐同光三年九月十日莊宗下制伐蜀命興聖宫使魏王繼岌為都統樞密使郭崇韜為行營都招討其月十八日魏王統闕下諸軍發洛陽十一月二十一日魏王至徳陽衍報云比與將校謀歸國偽樞密使宋光嗣景潤澄南北院宣徽使李周輅歐陽晃等四人異謀熒惑臣各已處斬今送納首級是日衍上表曰臣衍先人建乆在坤維受先朝寵澤一開土宇將四十年頃以梁孽興災洪圖版盪不可助逆遂乃從權勉狥衆情止王三蜀固非獲已未有所歸臣輒紹鎡基且安生聚臣衍誠惶誠恐伏惟皇帝陛下嗣堯舜之業陳陽武之師廓定寰區削平兇逆梯航垂集文軌混同臣方議改圖便期納欵遽聞王師致討實抱驚危今則将千里之封疆盡為王土冀萬家之臣妾皆沐皇恩必當輿櫬乞降負荆請命伏惟皇帝陛下㢠廻照臨之造施覆幬之仁别示哀矜以安反側儻墳塋而獲祀實存沒以知歸臣無任望恩䖍禱之至己酉年十一月日臣王衍上表其月二十七日魏王至成都北五里昇仙橋偽百官班於橋下衍乘行輿至素衣白馬牽羊草索係首面縛啣璧輿櫬而後魏王下馬受其璧崇韜釋其縛及燔其櫬衍率偽百官東北舞蹈謝恩禮畢拜魏王崇韜李嚴皆答拜二十八日王師入成都自起師至入蜀城凡七十五日按以下原本殘闕据歐陽史云同光四年衍行至秦川驛荘宗用伶人景進計遣宦者向延嗣誅其族天成二年封衍順正公以諸侯塟杖五代史補王建在許下時尤不逞嘗坐事遭徒但無痕爾及據蜀得馬涓為從事涓好詆訐建恐為所譏因問曰竊聞外議以吾曾遭徒刑有之乎涓對曰有之建恃無杖痕且對衆因􅃝背以示涓曰請足下試看有遭杖責而肌肉如是耶溳知其詐乃撫背而嘆曰大奇當時何處得此好膏藥來賔佐皆失色而涓晏然禮王建之僣號也惟翰林學士最承恩顧侍臣或諫其過建曰葢汝軰未之見也且吾在神䇿軍時主内門魚鑰見唐朝諸帝待翰林學士雖交友不若也今我恩顧比當時才有百分之一爾何謂之過當耶論者多之道杜光庭長安人應九經舉不第時長安有潘師尊者術甚髙僖宗所重光庭素所希慕數逰其門當僖宗之幸蜀也觀蜀中道門牢落思得名士以主張之駕囘詔潘尊師使於两街求其可者尊師奏曰臣觀两街之衆道聽塗説一時之俊即有之至於掌教之士恐未合應聖㫖臣於科場中識九經杜光庭其人性簡而氣清量寛而識逺且困於風塵思欲脱屣名利乆矣以臣愚思之非光庭不可僖宗召而問之一見大悦遂令披戴仍賜紫衣號曰廣成先生遂馳驛遣之及王建據蜀待之愈厚又號為天師光庭嘗以道德二經注者雖多皆未能演暢其㫖因著廣成義八十巻已術稱是識者多之孟知祥字保裔邢州龍岡人也祖察父道世為郡校伯父方立終於邢洺節度使從父遷位至澤潞節度使知祥在後唐荘宗同光三年授西川節度副大使知節度事天成中安重誨專權用事以知祥荘宗舊識方據大藩慮久而難制潜欲圖之是時客省使李嚴以嘗使於蜀洞知其利病因獻謀於重誨請以已為西川監軍庻效畧以制知祥朝廷可之及嚴至蜀知祥延接甚至徐謂嚴曰都監前因奉使請兵伐蜀遂使東西两川俱至破滅川中之人其怨已深今既復來人情大駭固奉為不暇也案此句疑有舛誤即遣人拽下階斬於階前歐陽史云李嚴至境上遣人持書候知祥知祥盛兵見之冀嚴懼而不來嚴聞之自若天成二年正月嚴至成都知祥置酒召嚴因責嚴曰今諸方鎮巳罷監軍公何得來鑑誡録云李嚴於天成初復來臨䕶孟祖加之禮分從容數其五罪命劔斬之其後朝廷每除劒南牧守皆令提兵而往或千或百分守郡城時董璋作鎮東川已數年矣亦有雄據之意會朝廷以夏魯奇鎮遂州李仁矩鎮閬州皆領兵數千人赴鎮復授以密㫖令制禦两川董璋覺之乃與知祥通好結為婚家以固輔車之勢知祥慮唐軍驟至與閬兵合則勢不可支吾遂與璋協謀令璋以本部軍先取閬州知祥遣大將軍李仁罕趙廷隱率軍圍遂州長興元年冬唐軍伐蜀至劒門二年以遂閬既陷又糧運不接乃班師三年知祥又破董璋乃自領東西两川節度使應順元年以劔東南西川節度使蜀王稱帝於蜀改元明德七月卒年六十一案孟知祥傳永樂大典原闕今采冊府元龜僣偽部以存梗槩昶知祥之第三子也宋朝事實云昶初名仁贊揮塵餘話云昶字保元母李氏本莊宗之嬪御以賜知祥唐天祐十六年歲在已夘十一月十四日生昶於太原及知祥鎮蜀昶與其母從知祥妻瓊華長公主同入於蜀知祥僣號偽册為皇太子知祥卒遂襲其偽位時年十六尚稱明德元年及偽明徳四年冬偽詔改明年為廣政元年是歲即晋天福三年也偽廣政十三年偽上尊號為睿文英武仁聖明孝皇帝皇朝乾德三年春王師平蜀詔昶舉族赴闕賜甲第於京師迨其臣下賜賚甚厚尋册封楚王是歲秋卒於東京時年四十七事具皇家日歴自知祥同光二年丙戌歲入蜀父子相繼凡四十年而亡五代史補孟知祥之入蜀視其險固隂有割據之志洎抵成都值晚且憇於郊外有推小車子過者其物皆以袋盛知祥見問曰汝車所勝幾袋答曰盡力不過两袋知祥惡之其後果两世而國滅孟知祥與董璋有隙舉兵討之璋素勇悍聞知祥之來也以為送死諸將两端李鎬為知祥判官深憂之及将戰知祥欲示閑暇自書一字以遣董璋無何舉筆輒誤書董為重字不悦乆之鎬在側大喜且引諸将賀於馬前知祥不測曰事未可測何賀耶鎬曰其董字艸下施重今大王去草書重是董已無頭此必勝之兆也於是三軍欣然一戰而董璋敗史臣曰昔張孟陽為劒閣銘云惟蜀之門作固作鎮世濁則逆道清斯順是知自古坤維之地遇亂代則閉之而不通逢興運則取之如俯拾然唐氏之入蜀也兵力雖勝帝道猶昏故數年間得之復失及皇上之平蜀也煦之以堯日和之以舜風故比戸之民悦而從化且夫王衍之遭季世也則赤族於秦川孟昶之遇明代也則受封於楚甸雖俱為亡國之主何幸與不幸相去之逺也舊五代史卷一百三十六
