body:
  text: 舊五代史巻四十七宋門下侍郎參知政事監修國史薛居正等撰唐書第二十三末帝紀中清泰二年春正月丙申朔帝御明堂殿受朝賀仗衛如式乙已中書門下奏遇千春節凡刑獄公事奏覆候次月施行今後請重繫者卽候次月輕繫者卽節前奏覆決遣從之戊申宗正寺奏北京應州曹州諸陵望差本州府長官朝拜五代㑹要載宗正寺原奏云北京永興長寧建極三陵應州遂衍奕三陵准曹州温陵例下本州府官朝拜雍坤和徽四陵差太常宗正卿朝拜從之巳酉北京奏光禄卿致仕周𤣥豹卒庚申鄴都進天王甲帝在藩時有相士言帝如毗沙天王帝知之竊喜及卽位選軍士之魁偉者被以天王甲俾居宿衛因詔諸道造此甲而進之三司奏添徴蠶鹽錢及増麴價先是麴斤八十文增至一百五十文乙丑雲州節度使張溫移鎮晉州以西京畱守安重霸為雲州節度使二月庚午定州節度使王從溫移鎮兖州振武軍節度使楊檀移鎮定州兼北面行營馬歩都虞候甲戌以定州節度使李周為京兆尹充西京畱守以樞密使天雄軍節度使范延光為檢校太師兼中書令充汴州節度使皇子鎮州節度使兼河南尹判六軍諸衛事左右街坊使重美加撿校太尉同平章事充天雄軍節度使餘如故辛已以右諫議大夫盧損為御史中丞以御史中丞張鵬為刑部侍郎壬午寧遠軍節度使馬存加兼侍中鎮南軍節度使馬希振加兼中書令詔順義軍節度使姚彦章加兼侍中已丑宰臣盧文紀等上皇妣魯國太夫人尊謚曰宣憲皇太后請擇日册命從之三月戊戌故太子太保趙鳯贈太傅辛丑以前汴州節度使趙延壽為許州節度使兼樞密使以夏州行軍司馬李彞殷為本州節度使兄彞超卒故也癸卯以静海軍節度使檢校太師兼中書令安南都䕶錢元銶為畱守太保餘如故丙午以給事中趙光輔為右散騎常侍戊申皇妹魏國夫人石氏封晉國長公主齊國公主趙氏封燕國長公主已酉有司上言宣憲皇后未及山陵權于舊陵所建廟從之辛亥功徳使奏毎年誕節諸州府奏薦僧道其僧尼欲立講論科講經科表白科文章應制科持念科禪科聲贊科道士欲立經法科講論科文章應制科表白科聲贊科焚修科以試其能否從之丙辰以右龍武統軍李徳珫為涇州節度使庚申以鎮州節度使知軍府事董溫琪為鎮州節度使檢校太保壬戌以左右彰聖都指揮使富州刺史安審琦領楚州順化軍節度使軍職如故審琦受閔帝命西征至鳯翔而降故有是命是月太常丞史在徳上䟽言事其畧曰朝廷任人率多濫進稱武士者不閑計䇿雖被堅執銳戰則棄甲窮則背軍稱文士者鮮有藝能多無士行問䇿謀則杜口作文字則倩人所謂虚設具員枉耗國力逢陛下惟新之運是文明革弊之秋臣請應内外所管軍人凡勝衣甲者請宣下本部大將一一考試武藝短長權謀深淺居下位有將才者便拔為大將居上位無將畧者移之下軍其東班臣僚請内出䇿題下中書令宰臣面試如下位有大才者便拔居大位處大位無大才者卽移之下僚其疏大約如此盧文紀等見其奏不悅班行亦多憤悱故諫官劉濤楊昭儉等上疏請出在徳疏辨可否宣行中書覆奏亦駁其錯誤帝詔學士馬𦙍孫謂曰史在徳語太凶其實難容朕初臨天下湏開言路若朝士以言獲罪誰敢言者爾代朕作詔勿加在徳之罪詔曰左補闕劉濤等奏太常丞史在徳所上章疏中書門下駁奏未奉宣諭乞特施行分明黜陟朕嘗覽貞觀故事見太宗之治理以貞觀昇平之運太宗明聖之君野無遺賢朝無闕政盡善盡美無得而名而陜縣丞皇甫徳參輒上封章恣行訕謗人臣無禮罪不容誅賴文貞之彌縫恕徳參之狂瞽魏徴奏太宗曰陛下思聞得失只可恣其所陳若所言不中亦何損于國家朕毎思之誠要言也遂得下情上逹徳盛業隆太宗之道彌光文貞之節斯著朕惟寡昧獲奉宗祧業業兢兢懼不克荷思欲率循古道簡抜時材懐忠抱直之人虚心渴見便佞詭随之說杜耳惡聞史在徳近所獻陳誠無避忌中書以文字紕繆比類僭差改易人名觸犯廟諱請歸憲法以示戒懲蓋以中書旣委參詳合盡事理朕纘承前緒誘勸將來多言數窮雖聖祖之所戒千慮一得兾愚者之可從因覽文貞之言遂寛在徳之罪已令停寢不遣宣行劉清等官列諫垣宜陳讜議請定短長之理以行黜陟之文昔魏徴則請賞徳叅今濤等請黜在徳事同言異何相遠哉將議允俞恐虧開納方朝廷粗理俊乂畢臻畱一在徳不足為多去一在徳未足為少茍可懲勸朕何憂焉但縁情在傾輸理難黜責濤等敷奏朕亦優容宜體含𢎞勉思竭盡凡百在下悉聽朕言夏四月辛已宰臣判三司張延朗奏州縣官徴科條格其令錄在任徴科依限了絶一年加階兩年與試銜三年皆及限了絶與服色攝任者一年内了絶及攝二年三年内皆及限與真命其主簿同縣令條本判官一年加階二年改試銜三年轉官本曺官省限内了絶與試銜諸節級三年内並了絶者與賞錢三十貫其責罰依天成四年五月五日勑施行從之癸未御史中丞盧損等進清㤗元年以前十一年制勑堪悠乆施行者三百九十四道編為三十巻其不中選者各令所司封閉不得行用詔其新編勑如可施行付御史臺頒行以宰相盧文紀兼太微宫使𢎞文館大學士姚顗加門下侍郎監修國史張延朗兼集賢殿大學士以樞密使韓昭𦙍為中書侍郎兼兵部尚書平章事乙酉以前武勝軍節度使張萬進為鄜州節度使辛卯以宣徽南院使劉延皓為刑部尚書充樞密使以司天監耿瑗為太府卿以偽蜀右衛上將軍胡杲通為司天監以宣徽北院使房暠為左衛上將軍充宣徽南院使以樞密副使劉延朗為左領軍上將軍充宣徽北院使兼樞密副使五月丙申新州振武奏契丹冦境乙已詔天下見禁因徒自五月十二日以前除十惡五逆放火燒舍持仗殺人官典犯贓偽行印信合造毒藥并見欠省錢外罪無輕重一切釋放庚戌詔不得貢奉寶装龍鳳雕鏤刺作組織之物中書奏準勑凡廟諱但廻避正文其偏旁文字不在減少㸃畫今定州節度使楊檀檀州金壇等名酌情制宜並請改之其表章文案偏旁字闕㸃畫凡臣寮名渉偏旁亦請改名詔曰偏旁文字音韻懸殊止避正呼不宜全改楊檀賜名光遠餘依舊甲寅以户部侍郎楊凝式為秘書監以尚書禮部侍郎盧導為尚書右丞以尚書右丞鄭韜光為尚書左丞丙辰以端明殿學士李導美為兵部侍郎以端明殿學士李崧為户部侍郎以翰林學士馬𦙍孫為禮部侍郎以禮部郎中充樞密院直學士呂琦為給事中並充職如故太子少保致仕任圜贈尚書右僕射以順化軍節度使兼彰聖都指揮使北面行營排陣使安審珂為邢州節度使庚申以兵部尚書李鏻為太常卿以禮部尚書王權為户部尚書以太常卿李懌為禮部尚書癸亥以六軍諸衛判官給事中張允為右散騎常侍六月甲子朔新州上言契丹入冦乙丑有司上言宣憲皇太后陵請以順從為名從之振武奏契丹二萬騎在黒榆林丁卯以太子少保致仕朱漢賔卒廢朝壬申命史官修撰明宗實録契丹冦應州以新州節度使楊漢賔為同州節度使以前晉州節度使翟璋為新州節度使庚辰北面招討使趙徳鈞奏行營馬歩軍都虞候定州節度使楊光遠行營排陣使邢州節度使安審琦帥本軍至易州見進軍追襲契丹次河東節度使石敬瑭奏邉軍乏芻糧其安重榮廵邉兵士欲移振武就糧從之尋又奏懐孟租稅請指揮于忻代州輸納朝廷以邉儲不給詔河東户民積粟處量事抄借仍于鎭州支絹五萬匹送河東充博采之直是月北面轉運副使劉福配鎮州百姓車子一千五百乘運糧至代州時水旱民飢河北諸州困于飛輓逃潰者甚衆軍前使者繼至督促糧運由是生靈咨怨辛已詔諸州府署醫博士丙戌以前許州節度使李從昶為右龍武統軍以前彰國軍節度使沙彦珣為右神武統軍秋七月丙申石敬瑭奏斬挾馬都指揮使李暉等三十六人以謀亂故也時敬瑭以兵屯忻州一日軍士喧譟遽呼萬歳乃斬暉等以止之契丹國志契丹屢攻北邉時石敬瑭将大兵屯忻州潞王遣使賜軍士夏衣𫝊詔撫諭軍士呼萬嵗者數四敬瑭懼幕僚段希堯請誅其倡者敬瑭命劉知遠斬三十六人以殉潞王聞益疑之御史中丞盧損奏準天成二年七月勑毎月首十五日入閤罷五日起居臣以為中旬排仗有勞聖躬請只以月首入閤五日起居依舊又準天成三年五月長興二年七月勑許諸州節度使帯使相嵗薦寮属五人餘薦三人防禦團練使薦二人今乞行釐革又長興二年八月勑州縣佐官差充馬歩判官仍同一任乞行止絶依舊衙前選補詔曰今後藩臣帯使相許薦三人餘薦二人直属京防禦團練使薦一人餘並從之丁酉廻紇可汗仁美遣使貢方物西京弓弩指揮使任漢權奏六月二十一日與川軍戰于金州之漢陰王師不利其部下兵士除傷痍外已至鳳翔先是􅉦厔鎮將劉贇引軍入川界為蜀將全師郁所敗金州都監崔處訥重傷諸州屯兵潰散金州防禦使馬全節收合州兵固守獲全以樞密使劉延皓為天雄軍節度使甲辰以右神武統軍沙彦珣權知雲州乙已以徐州節度使張敬逹充北面行營副總管時契丹入邉石敬瑭屢請益兵朝廷軍士多在北鄙俄聞忻州諸軍呼譟帝不悅乃命敬逹為北軍之副以減敬瑭之權也丁已宰臣盧文紀等上疏其畧曰臣近䝉召對面奉天㫖凡軍國大事利害可否卿等合盡言者臣等謬處臺衡奉行制勑但緣事理互有區分軍戎不在于職司錢穀非關于局分茍陳異見卽類侵官況才不濟時識非經遠因五日起居之例于兩班旅見之時略獲對敭兼承顧問衛士周環于階陛庶臣羅列于殿庭四面聚觀十手所指臣等苟欲各伸愚短此時安敢敷陳韓非昔懼于説難孟子亦憂于言責臣竊奉本朝政事肅宗初平冦難再復寰瀛頗經渉于艱難尤勤勞于委任毎正衙奏事則泛咨訪于羣臣及便殿詢謀則獨對敭于四輔自上元年後于長安東内置延英殿宰臣如有奏議聖㫖或有特宣皆于前一日上聞對御之時祗奉冕旒旁無侍衛獻可替否得曲盡于討倫捨短從長故無虞于漏洩君臣之際情理坦然伏望聖慈俯循故事或有事關軍國謀繫否臧未果决于聖懐要詢訪于臣軰則請依延英故事前一日𫝊宣或臣等有所聼聞切關利害難形文字須面敷敭臣等亦依故事前一日請開延英當君臣奏議之時秪請機要臣寮侍立左右兼乞稍霽威嚴恕臣荒拙雖乏鷹鸇之効庶盡葵藿之心詔曰卿等濟代英才鎮時碩徳或締搆于興王之日或經綸于纘聖之時鹽梅之任俱崇藥石之言並切請復延英之制以伸議政日規而況列聖遺芳皇朝盛事載詳徴引良切歎嘉恭惟五日起居先皇垂範俟百寮之俱退召四輔以獨昇接以温顔詢其理道計此時作事之意亦昔日延英之流朕叨獲嗣承切思遵守將成其美不爽兼行其五日起居仍令仍舊尋常公事亦可便舉奏聞或事属機宜理當秘密量事𦂳慢不限隔日及當日便可于閤門秪候且牓子奏聞請面敷敭卽當盡屏侍臣端居便殿佇聞髙議以慰虚懐朕或要見卿時亦令當時宣召但能務致理之實何必拘延英之名有事足可以討論有言足可以陳述宜以沃心為務勿以逆耳為虞勉罄謀猷以禆寡昧帝性仁恕聴納不倦嘗因朝㑹謂盧文紀等曰朕在藩時人說唐代為人主端拱而天下治蓋以外恃將校内倚謀臣故端拱而事辦朕荷先朝鴻業卿等先朝舊臣每一相見除承奉外畧無社稷大計一言相救坐視朕之寡昧其如宗社何文紀等引咎致謝因奏延英故事故有是詔八月庚午滑州節度使高乆韜卒壬申以右衛上將軍王景戡為左衛上將軍以右神武統軍婁繼英為右衛上將軍已卯以西上閤門使行少府少監兼通事舍人蘇繼顔為司農卿職如故辛已以權知雲州右神武統軍沙彦珣為雲州節度使鄴都殺人賊陳延嗣并母妹妻等并棄市延嗣父子相承與其妹妻于諸州郡誘人殺之而奪其財前後被殺者數百人至是事泄而誅之癸未以前潞州行軍司馬陳𤣥為將作監以𤣥善醫故有是命丁亥以洺州團練使李彦舜為義武軍節度使檢校太傅太原奏逹靼部族于靈丘安置已丑以太子少保致仕戴思遠卒廢朝庚寅以前兖州節度使楊漢章為左神武統軍以前邢州節度使康思立為右神武統軍潞州奏前雲州節度使安重霸卒九月已亥以河陽節度使侍衛馬軍都指揮使安從進為襄州節度使以襄州節度使趙在禮為宋州節度使癸卯以忠正軍節度使侍衛歩軍都指揮使宋審䖍為河陽節度使典軍如故已酉禮部貢院奏進士請夜試童子衣舊表薦重置明算道舉舉人落第後别取文解五科試紙不用中書印用本司印並從之以宣徽南院使房暠為刑部尚書充樞密使以宣徽北院使充樞密副使劉延朗為宣徽南院使充樞密副使丙辰以左僕射李愚卒廢朝冬十月丁卯幸崇道宫甘泉亭已已以左衛上將軍李頃為左領軍上將軍北面行營總管石敬瑭奏自代州歸鎮庚午以晉州節度使張溫卒廢朝甲戌幸趙延壽張延朗等丁丑以端明殿學士兵部侍郎李専美為秘書監充宣徽北院使庚寅以左諫議大夫唐汭為左散騎常侍十一月庚子以左驍衛上將軍郝瓊為左金吾上將軍以光祿卿王玟為太子賔客以徐州節度使張敬逹為晉州節度使依前充大同振武威塞彰國等軍兵馬副總管丁未以秘書少監丁濟為太子詹事乙卯以前金州防禦使馬全節為滄州畱後通鑑劉延朗欲羣議沸騰帝聞之渤海國遣使朝貢十二月戊辰禁用鈆錢壬申以中書侍郎兼兵部尚書充樞密使韓昭𦙍為檢校司空同平章事充河中節度使甲戌以宗正少卿李延祚為將作監致仕丁丑故武安軍州節度使累贈太傅劉建峯贈太尉從湖南之請也戊寅太常奏來年正月一日上辛祀昊天上帝于圓丘依禮大祠不朝詔曰祀事在質明前儀仗在日出後事不相妨宜依常年受朝壬午以翰林學士承㫖户部侍郎程遂為兵部侍郎翰林學士工部侍郎崔梲為户部侍郎翰林學士中書舍人和凝為工部侍郎並依前充職乙酉以前祕書監楊凝式為兵部侍郎已丑以前同州節度使馮道為司空以尚書右僕射劉昫為左僕射以太子少師盧質為左僕射以兵部侍郎馬縞兼國子祭酒舊五代史巻四十七
