body:
  text: 舊五代史巻十九宋門下侍郎參知政事監修國史薛居正等撰梁書第十九列傳九氏叔琮尉氏人也唐中和末應募為騎軍初𨽻于龎師古為伍長叔琮壯勇沈毅膽力過人太祖討巢蔡于陳許間叔琮奮擊首出諸校太祖壯之自行伍間擢為後院馬軍都將時東伐徐鄆多歴年所叔琮身當矢石奮不顧命觀者許焉累遷為指揮使㝷奏授宿州刺史檢校右僕射太祖伐襄陽叔琮失利降為陽翟鎮遏使㝷又捍禦晉軍于洹水有功遷曹州刺史天復元年春領大軍攻拔澤潞叔琮遂引兵北掠太原師還除晉州節度使明年太祖屯軍于岐下晉軍潛襲絳州前軍不利晉軍恃勝攻臨汾叔琮嚴設備禦乃于軍中選壯士二人深目虬鬚貎如沙陀者令就襄陵縣牧馬于道間蕃冦見之不疑二人因雜其行間俄而伺隙各擒一人而來晉軍大驚且疑有伏兵遂退據蒲縣時太祖遣朱友寧將兵數萬赴應悉委叔琮節制既至諸將皆欲休軍叔琮曰若然則賊必遁矣遁則何功焉因夜出潛師截其歸路遇晉軍逰騎數百盡殺之遂攻其壘拔之斬獲萬餘衆奪馬三百匹太祖聞之喜謂左右曰殺蕃賊破太原非氏老不可叔琮乃長驅收汾州與晉人轉戰直抵并壘軍迴以其功奏加檢校司空自後累年晉軍不敢侵軼叔養士愛民甚有能政天復三年為鄜州留後㝷真領保大軍節度使檢校司徒及昭宗東遷徴為右龍虎統軍以衛洛陽天祐元年八月與朱友恭同受太祖密㫖弑昭宗于大内既而責以軍政不理貶白州司户㝷賜自盡叔琮將死呼曰賣我性命欲塞天下之謗其如神理何乾化二年詔許歸葬朱友恭壽春人本姓李名彦威丱角事太祖性潁利善體太祖意太祖憐之因畜為巳子賜姓初名克讓後改之時初建左長劍都以友恭董之從太祖四征稍立軍功累遷諸軍都指揮使檢校左僕射乾寧中授汝州刺史加檢校司空光化初淮夷侵鄂渚武昌帥杜洪來乞師太祖遣友恭將兵萬餘濟江應援引兵至龍沙九江而還軍聲大振時淮冦據黄州友恭攻陷其壁獲賊將瞿章俘斬萬計途經安陸因襲殺刺史武瑜盡收其衆以功為潁州刺史加檢校司徒天復中為武寧軍留後天祐初昭宗東遷洛邑徴拜左龍虎統軍以衛宫闕㝷與氏叔琮同受太祖密㫖弑昭宗于洛陽宫既而太祖自河中至責以慢于軍政貶崖州司户復其本姓名與氏叔琮同日賜死北夢瑣言云朱全忠請誅朱友諒氏叔琮以成濟之罪歸之友諒臨刑訴天曰天若有知他日亦當如我後全忠即位為子友珪所弑竟如其言案友諒當作友恭見後攷證王重師潁州長社人也材力兼人沈嘿大度臨事有權變劔矟之妙冠絶于一時唐中和末蔡冦陷許昌重師脱身而來太祖異其狀貎乃𨽻于拔山都每于軍前効用頗出儕類文徳中令董左右長劒軍太祖伐上蔡重師力戰有功及討兖鄆擢為指揮使奏授檢校右僕射重師枕戈擐甲五六年于齊魯間凡經百餘戰由是威震敵人㝷授檢校司空為潁州刺史乾寧中太祖攻濮州縱兵壊其墉濮人因屯火塞其壊壘烟焰亘空人莫敢越重師方苦金瘡卧于軍次諸將或勉之乃躍起命壯士悉取軍中氊罽投水中擲於火上重師然後率精銳持短兵突入諸軍踵之濮州乃䧟重師為劍槊所傷身被八九創丁壯荷之還營且將斃矣太祖驚惜尤甚曰雖得濮壘而失重師奈何亟命以竒藥療之彌月始愈㝷至平盧軍留後加檢校司徒其後北伐幽滄鎮定屢與晉軍接戰頗得士心故多勝㨗天祐中授雍州節度使加同平章事數年治戎䘏民頗有威惠開平中為劉捍所搆太祖深疑之然未有以發其事無何擅遣禆將君練縱兵深入邠鳯君練敗北太祖聞之怒其專擅因追而斬之通鑑云劉捍至長安王重師不為禮捍譛之帝曰重師潜與邠岐通甲申貶溪州刺史尋賜自盡夷其族朱珍徐州豐縣雍鳯里人也太祖初起兵珍與龎師古許唐李暉丁㑹氏叔琮鄧季筠王武等八十餘人以中㳙從摧堅陷陣所向盪決及太祖鎮汴兼領招討使署珍為宣武右職以總腹心于是簡練軍伍裁制綱紀平巢破蔡多珍之力也始尚讓以驍騎五千人至繁臺珍與龎師古齊奉國等擊退之及黄巢敗珍與并帥李克用追至寃句而還㝷從太祖以汴宋亳之師入西華破王夏寨勇冠軍鋒以功加秩光啓元年署諸軍都指揮使始為上將于是軍焦夷敗蔡師鐡林三千人盡俘其將復西至汝鄭南過陳潁繚宋亳滑濮間與蔡賊交戰鏖伏襲殺不知其數㑹滑州節度使安師儒戎政不治太祖命珍與李唐賔率歩騎以經略之始入境遇大雪令軍士無得休息一夕馳至壁下百梯並升遂乘其墉滑州平時太祖方謀濟師乃遣珍往淄州募兵行次任縣東面都統齊克讓伏兵于孫師陂以邀珍珍大破之進軍至牙山都虞候張仁遇白珍曰軍有不齊者當先斬本都將後以狀聞願許之珍怒其專乃斬仁遇以徇軍由是諸將感懼兵至乾封與淄人戰于白草口敗之青人以歩騎二萬列三寨于金嶺驛珍與戰連破之殱其師盡獲軍器戎馬是夕攻博昌大獲兵衆其後破盧瑭張眰及朱瑄朱瑾之衆平定曹濮未嘗不在戰中梁山之役始與李唐賔不協珍在軍嘗私迎其室于汴而不先請太祖疑之密令唐賔察之二將不相上下因而交諍唐賔夜斬關還汴以訴珍亦棄軍單騎而至太祖兩惜之故不罪俾還于師復以􅂿白騎士入陳亳間以邀蔡人遂南至斤溝破淮西石璠之師二萬擄璠以獻珍旋師自亳北趣静戎濟舟于滑破黎陽臨河李固三鎮軍于内黄敗樂從訓萬餘人分命聶金范居實略澶州與魏師遇于臨黄魏軍有豹子軍二千人戮之無噍類威振河朔復攻淮西至蔡夾河而寨敗賊將蕭皓之衆皆擁于河溺死之進軍蔡州營其西南既破羊馬垣遇雨班師珍以兵援劉瓚赴楚州至襄山南遇徐戎扼其路珍乃攻豐下之時溥乃以全師㑹戰于豐南其康里珍乃收豐破其三萬餘衆及蔡賊平珍比諸將功居多龍紀初與諸將屯于蕭縣以禦時溥珍慮太祖自至令諸軍葺馬廐以候廵撫李唐賓之禆將嚴郊獨慢馬軍候范權恃珍以督之唐賔素與珍不恊果怒乃見以訴其事珍亦怒曰唐賔無禮遂拔劍斬之珍命騎列狀陳其事太祖初聞唐賔之死驚駭與敬翔謀詐令有司收捕唐賔妻子下獄以安珍心太祖遂徑往蕭縣距蕭一舎珍率將校迎謁梁祖令武士執之責其專殺命丁㑹行戮都將霍存等數十人叩頭以救太祖怒以坐床擲之乃退李思安陳留張亭里人也初事汴將楊彦洪為騎士性拳勇未弱冠長七尺超然有乘時自奮之意唐中和三年太祖鎮汴嘗大閲戎旅覩其材甚偉之因錫名思安字貞臣思安善飛矟所向披靡每從太祖征伐常馳馬出敵陣之後測其厚薄而還或敵人有恃猛自衒者多命取之必鷹揚飈巻擒馘于萬衆之中出入自若如蹈無人之地太祖甚惜之命副王䖍裕為􅂿白將時巢蔡合從太祖毎遣偵邏必率先獨往巢敗走思安領所部百餘人追賊殺戮掩奪衆莫敢當㝷領軍襲蔡冦于鄭都將李唐賓馬躓而墜思安援槊刺追者唐賔復其騎而還又嘗與蔡人鬬當陣生擒賊將柳行實其後渡長淮下天長高郵二邑又拒孫儒迫濠州皆有竒績累遷都指揮使奏官至檢校左僕射尋拜毫州刺史練兵禦冦邉境肅然思安為性勇悍每統戎臨敵不大勝必大敗開平元年春率兵伐幽州營于桑乾河擄獲甚衆燕人大懼及軍迴率諸軍伐潞累月不克師人多逸太祖怒甚詔疏其罪盡奪其官爵委本郡以民户係焉踰歲起之復令領兵亦無巨績可紀太祖嘗因命將授鉞謂左右曰李思安當敵果敢無出其右者然毎遇藩方擇材吾將用之則敗聞必至如是者二三矣則知飛將數竒前史豈虛言哉乾化元年秋又以為相州刺史思安自謂當擁旄仗鉞及是殊不快意但日循晏安無意為政及太祖北征以候騎之誤落然無所具而復壁壘荒圮帑廩空竭太祖怒貶桞州司户尋賜死于相州通鑑開化元年丙午至相州刺史李思安不意帝猝至落然無具坐削宮爵二年正月丁卯帝至獲嘉追思李思安去歲供饋有闕貶柳州司户尋長流思安于崖州賜死鄧季筠宋州下邑人也少入黄巢軍𨽻于太祖麾下及太祖鎮汴首署為牙將主騎軍伐鄆之役生擒排陣將劉矯以獻唐大順初唐帝命丞相張濬伐太原太祖奉詔出師西至髙平與晉人接戰軍既不利季筠為晉人所擒克用見之甚喜釋縛待以賔禮俄典戎事季筠在并門凡四稔景福二年晉軍攻邢臺季筠領偏師預其役將及邢邢人陣于郊兩軍酣戰之際季筠出陣飛馬來歸太祖大加奬歎賞賚甚厚時初置㕔子都最為親軍命季筠主之旋改統親騎又遷將中軍天祐三年奏授登州刺史下車稱理登州舊無羅城及季筠至郡率丁壯以築之民甚安之因相與立碑以頌其績太祖受禪改鄭州刺史㝷主兵于河中為都指揮使時并人冦平陽季筠接戰于洪洞大克拜華州防禦使又繼領龍驤等諸軍騎士累官至檢校司空栢鄉之役季筠臨陣前却太祖亦未之罪乾化二年春太祖親伐鎮定駐于相州因閲馬怒其馬瘦與魏博軍校何令稠陳令勲同斬于纛下黄文靖金鄉人少附于黄巢黨中巢敗歸于太祖累署牙職繼遷諸軍指揮使從太祖南平巢蔡北定兖鄆皆有功唐大順中佐葛從周送朱崇節入潞㑹晉軍十餘萬近逼垣寨文靖慮孤軍難守乃與葛從周啓闉出師文靖為殿命矢刄皆外向持重而還晉人不敢逼其年冬與康懐英渡淮入壽春之境下安豐霍丘至光州而還光化春晉將李嗣昭周徳威冦于山東文靖佐葛從周統大軍禦之至沙河敗晉軍五千餘騎遂逐之越張公橋乃止後旬日復與晉人戰于邢州之北擒蕃將賁金鐡慕容藤李存建等百餘人奪馬數千匹㝷以功表授檢校左僕射耀州刺史天祐二年春命佐楊師厚深入淮甸越壽春侵廬江軍至大獨山遇淮夷殺五千餘衆振旅而還改蔡州刺史加檢校司空又遷潁州刺史太祖受禪復為蔡州刺史入為左神武統軍又改左龍驤使乾化元年從太祖北征因閲馬得罪命斬之文靖驍果善戰諸將皆惜之胡規兖州人初事朱瑾為中軍都校兖州平署為宣武軍都虞候佐葛從周伐鎮定從張存敬收晉絳皆有功署為河中都虞候榷鹽務天復中太祖迎駕至岐下以規權知洽州昭宗還長安詔授皇城使及東遷以為御營使駕至洛授内園莊宅使天祐三年佐李周彛討相州獨當州之一面頗以功聞軍還權知耀州事明年討滄州為諸軍壕寨使太祖受禪除右羽林統軍㝷佐劉鄩統兵收潼關擒劉知浣獻之乃以為右龍虎統軍兼侍衛指揮使乾化元年詔修洛河堤堰軍士因之斬伐百姓園林太甚河南尹張宗奭奏之規得罪賜死李讜河中臨晉人少時逰秦雍間為人勇悍多力甚有氣誼唐廣明初黄巢陷長安讜遂得仕于其間巢以讜為内樞密使葢讜曽委質于宦者出入于宫禁間巢以此用焉其後巢軍既敗讜乃束身歸于太祖署為左徳勝騎軍都將從太祖討蔡賊頗立軍功及東伐兖鄆以所部士伍俘獲甚衆改元從騎將表授檢校右僕射郴王友裕領兵攻澤州時太祖駐大軍于盟津乃令讜將兵越太行授以籌謀讜頗違節度久而無功太祖遣追還廷責其罪戮之于河橋李重𦙍宋州下邑人狀貎雄武初在黄巢黨中推為剛鷙唐中和四年五月同尚讓李讜等率衆至繁臺與太祖之軍相拒及巢冦漸衰乃率衆來降太祖素識之拔用不次署為先鋒歩軍都頭與胡真援河陽逼懐州重𦙍以部下兵突之射中蕃將安休休又令與李讜率騎軍至陜應接郭言迴次澠池破賊帥黄花子之衆改滑州夾馬指揮使蔡賊圍汴重𦙍以歩兵攻下三寨擄獲甚多太祖大舉伐宗權俾重𦙍以滑兵為先鋒及東伐徐州下豐蕭二邑轉右廂馬歩軍指揮使大順元年秋從郴王友裕收澤州與晉軍戰于馬牢川王師敗績迴守河陽太祖謂諸將曰李讜重𦙍違我節度不能立功頗辜任使于是與李讜並戮于河橋范居實絳州翼城人事太祖初為隊將從討巢蔡有功又從朱珍收滑州改左廂都虞候預破兖鄆功遷感義都頭鄭州馬軍指揮使幽州劉仁恭舉衆南下冦魏郡北闉居實與葛從周張存敬率兵救魏大破幽滄之衆于内黄太祖迎昭宗于岐下以居實為河中馬軍都指揮使及昭宗還京賜迎鑾毅勇功臣遙領錦州刺史又遷左龍驤馬軍都指揮使從征淮南迴改登州刺史轉左神勇軍使開平元年用軍于潞州命居實統軍以解澤州之圍授耀州刺史令以郡兵屯固鎮㝷除澤州刺史居實拳勇善戰頗立軍功在郡以戎備不理詔追赴闕暴其翫冦之罪而斬之史臣曰叔琮而下咸以鷹犬之才適遇雲龍之㑹勤勞王室踐履將壇然俱不得其死豈不惜哉得非鳥盡弓藏理當如是耶將梁祖之雄猜無漢髙之大度歟乃知自古帝王能保全功臣者惟光武一人而巳矣語曰弑父與君亦不從也而叔琮友恭從之何也既為盜跖所嗾豈免成濟之誅臨終之言益彰其醜也舊五代史巻十九
