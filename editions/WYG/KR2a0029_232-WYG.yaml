body:
  text: 舊五代史巻一百十六攷證周世宗紀三壬申今上破淮賊萬五千人于清流山案六一居士集豊樂亭記太祖以周師破李景兵十五萬于清流闗下與是書作萬五千人異攷國志談苑云太祖提周師甚寡當李景兵十五萬于清流山下臨陣親斬驍将皇甫暉疑豊樂亭記即本于此苐皇甫暉以傷重被擒而談苑云臨陣親斬小説家多傅㑹之詞恐不足信舊五代史巻一百十六攷證
