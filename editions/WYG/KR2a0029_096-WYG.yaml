body:
  text: 舊五代史卷四十七攷證唐末帝紀中枉耗國力枉耗通鑑注引薛史作枉費攷册府元龜亦作枉耗今仍其舊辛邜以宣徽南院使劉延皓為刑部尚書充樞宻使案劉延皓充樞宻使歐陽史作五月與是書繫四月異通鑑従是書侍衛歩軍都指揮使宋審䖍宋審䖍原本脱䖍字今據通鑑増入渤海國遣使朝貢案歐陽史作九月乙邜渤海遣使者来五代㑹要作十二月渤海遣使列周卿等入朝貢方物俱與是書作十一月異翰林學士工部侍郎崔梲崔梲原本訛崔櫓今據歐陽史改正舊五代史巻四十七考證
