  text: 舊五代史巻五十七攷證唐列𫝊九郭崇韜𫝊如三四日間案歐陽史作十日居三日梁軍果至案歐陽史作六日壘成彦章果引兵急攻之崇韜許之案通鑑作崇韜陽許之騸馬不可復乗騸馬通鑑作扇馬考胡三省注引薛史亦作騸馬今仍其舊按巴堅舊作阿保機今改舊五代史巻五十七攷證
