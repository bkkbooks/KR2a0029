body:
  text: 舊五代史巻七考證梁太祖紀七仍命押領送至貝貝原本訛具今據通鑑改畧封訖案此下疑有闕文今無可校姑仍之晨發衛州案原本脱發字今據文増入三月庚辰朔次于棗彊縣之西原案通鑑辛己趣棗彊與是書異丙戌奏下棗彊縣車駕即日南還丁亥復至貝州案通鑑帝以蓨縣未下引兵攻之丁亥始至縣西戊子至冀州與是書異地又案五代春秋二月侵趙克棗彊與是書異月四月己酉幸魏州案通鑑乙已帝發貝州丁未至魏州俱在三月與是書異宜徴有喜之術喜原本訛嘉今改正九宫貴神貴原本訛降今據通典及新唐書改正舊五代史巻七考證
