body:
  text: 舊五代史卷一百七考證漢列傳四史𢎞肇傳有燕人何福殷者案歐陽史作何福進疑訛乾祐三年冬十一月十三日𢎞肇入朝十一月歐陽史漢臣傳作十月呉縝纂誤云漢隐帝紀周太祖紀俱作十一月傳誤也楊邠傳用為左都押衙左都歐陽史作右都李業附傳業昆仲凢六人案昭聖太后弟六人洪信洪義宋史作昆弟七人閻晋卿傳賊平為内客省使案宋史李韜傳載晋卿討賊時已為客省使是書作賊平之後始授此職與宋史異舊五代史卷一百七攷證
