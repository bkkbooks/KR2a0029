body:
  text: 舊五代史巻八十宋門下侍郎参知政事監修國史薛居正等撰晉書第六髙祖紀六天福六年秋七月己未朔帝御崇元殿視朝庚申升陳州為防禦使額辛酉以前鄧州節度使焦方為貝州節度使壬戌涇州奏西涼府留後李文謙今年二月四日閉宅門自焚遣元入西涼府譯語官與來人賫三部族蕃書進之以三司使劉審交為陳州防禦使癸亥以前鄆州節度使趙在禮為許州節度使以前鄴都留守廣晉尹髙行周為河南尹西都留守詔改拱辰威和内直等軍並為興順甲子以宣徽使權西京留守張從恩判三司已巳以鄴都留守兼侍衛親軍馬歩軍都指揮使廣晉尹劉知逺為太原尹充北京留守河東節度使仍割遼沁二州却隸河東以北京留守李徳珫為廣晉尹充鄴都留守以昭義節度使馬全節為邢州節度使加同平章事甲戌詔今後諸道行軍副使不得奏薦骨肉為殿直供奉官已卯以前陜州節度使李從敏為昭義軍節度使以陜州節度使景延廣為河陽三城節度使兼侍衞親軍馬步軍都虞侯以河陽節度使石贇為陜州節度使壬午突厥遣使朝貢以遙領壽州忠正軍節度使兼侍衞馬軍都指揮使李懷忠為同州節度使以宣徽北院使李守貞遙領忠正軍節度使侍衞馬軍指揮使甲申降御札取八月五日暫幸鄴都沿路供頓並委所司以官物排比州縣不得科率人户丙戌以右諫議大夫趙逺為中書舎人吏部郎中鄭受益為右諫議大夫刑部郎中殷鵬為水部郎中知制誥八月戊子朔以皇子開封尹鄭王重貴為東京留守以天平軍節度使兼侍衞親軍馬步軍副都指揮使杜重威為侍衞親軍馬步軍都指揮使以宣徽南院使張從恩為東京内外兵馬都監改奉徳馬軍為䕶聖放文武百官朝参取便先赴鄴都壬辰車駕發東京已亥至鄴左右金吾六軍儀仗排列如儀迎引入内改舊澶州為徳清軍以内客省使劉遂清為宣徽北院使判三司壬寅制應天福六年八月十五日昧爽已前諸色罪犯常赦所不原者咸赦除之其持伏行劫及殺人賊並免罪移鄉配逐處軍都收管犯枉法贓者雖免罪不得再任用諸徒流人並放還貶降官未量移與量移者約資叙用天福五年終已前殘税並放應河東起義之初及收復鄴都汜水立功將校並與加恩亡歿者與追贈自東京至鄴都緣路昨因行幸有損踐田苗處據畎畝與放今年租税鄴都營内有潛龍時在職者並與加恩耆年八十已上者版授上佐官天下農器並許百姓自鑄造亡命山澤者招唤歸業百日不出者復罪如初唐梁國公狄仁傑宜追贈官秩應天福三年已前敗闕塲院官無家業者並與除放其人免罪永不任使私下債負徴利及一倍者並放主持者不在此限丁未以客省使將作監丁知浚為内客省使引進使鴻臚卿王景崇為客省使殿中監判四方館事劉政恩為引進使壬子改鄴都皇城南門應天門為乾明門大明館為都亭驛甲寅遣光祿卿張澄國子博士謝攀使髙麗行冊禮九月己未以兵部侍郎閻至為吏部侍郎辛酉滑州河決一溉東流鄉村户民擕老幼登邱冢為水所隔餓死者甚衆壬申忠武建武等軍節度使守太傅兼中書令行蘇州睦州刺史錢元璙進封彭城郡王遙領廣州清海軍節度使判婺州軍州事錢元懿為檢校太師乙亥遣前邢州節度使楊彦詢使于契丹錫賫甚厚丁丑吐渾遣使朝貢壬午夜有彗星出于西方長二丈餘在房一度尾跡穿天市垣東行踰月而滅丙戌兖州上言水自西來漂沒秋稼冬十月丁亥朔遣鴻臚少卿魏玭等四人分往滑濮鄆澶視水害苗稼己丑詔以胡梁度月城為大通軍浮橋為大通橋壬寅詔唐梁國公狄仁傑可贈太師十一月丁未鄭王夫人張氏薨福州王延羲遺使貢方物甲寅遺太子賓客聶延祚吏部郎中盧撰持節冊天下兵馬元帥守尚書令呉越國王錢元瓘甲子以御史中丞王松為尚書右丞中書舎人史館修撰判館事王易簡為御史中丞户部侍郎張昭逺為兵部侍郎國子祭酒田敏以本官兼户部侍郎辛未太妃皇后至自東京壬申遣給事中李式考功郎中張鑄折節冊閩國王王延羲甲戌太子少傅致仕王瓘卒贈左僕射丁丑襄州安從進舉兵叛以西京留守髙行周為南面行營都部署率兵討之以前同州節度使宋彦筠為副以宣徽南院使張從恩監䕶焉十二月丙戌朔以東京留守開封尹鄭王重貴為廣晉尹進封齊王以鄴都留守廣晉尹李徳珫為開封尹充東京留守南面軍前奏十一月二十七日武徳使焦繼勲先鋒都指揮使郭金海等于唐州南遇安從進賊軍一萬餘人大破之案宋史陳思讓傳思讓為先鋒右廂都監從武徳焦繼勲領兵進討遇從進之師于唐州花山下急擊大破之生擒衙内都指揮使安𢎞義獲山南東道之印安從進單騎奔逸丁亥詔襄州行營都部署髙行周權知襄州軍州事是日鎮州節度使安重榮稱兵向闕以侍衞親軍馬步軍都指揮使杜重威為北面行營招討使率兵擊之以邢州節度使馬全節為副以前貝州節度使王周為馬步軍都虞侯癸巳武徳使焦繼勲奏安從進遣弟從貴領兵千人取接均州刺史蔡行遇尋領所部兵掩殺賊軍七百餘人生擒安從貴截其雙腕却放入城戊戌以皇子從睿為銀青光祿大夫檢校尚書左僕射己亥北面軍前奏十三日未時于宗城縣西南大破鎮州賊軍殺一萬五千人餘黨走保宗城縣是夜三更破縣城前深州刺史史䖍武自縛歸降獲馬三千疋絹三萬餘疋餘物稱是安重榮脱身遁走是日百官稱賀癸卯削奪安從進安重榮在身官爵右金吾上將軍萇從簡卒廢朝贈太師乙巳天下兵馬都元帥守尚書令呉越國王錢元瓘薨廢朝三日諡曰文穆是日帝習射于後苑諸軍都指揮使已上悉預焉賜物有差丁未南面行營都部署髙行周奏今月十三日部領大軍至襄州城下相次降賊軍二千人其降兵馬軍詔以彰聖為號步軍以歸順為號庚戌以權知呉越國事錢𢎞佐為起復鎮軍大將軍檢校太師兼中書令杭州越州大都督鎮海鎮東等軍節度使封呉越國王壬子杜重威部領大軍至鎮州城下天福七年春正月丙辰朔不受朝賀用兵故也戊午以前將作監李鍇為少府監北面招討使杜重威奏今月二日收復鎮州斬安重榮傳首闕下帝御乾明樓宣露布訖大理卿受馘付市徇之百官稱賀曲赦廣晉府禁囚遼史云戊辰晉函安重榮首來獻上數欲親討重榮至是乃止辛酉追贈皇弟三人故沂州馬步軍都指揮使贈太傅徳再贈太尉追封福王故檢校太子賓客贈太傅殷再贈太尉追封通王故彰聖右第三軍都指揮使長州刺史贈太傅威再贈太尉追封廣王壬戌追贈皇子五人故右衞將軍贈太保重英再贈太傅追封虢王故權東京留守河南尹贈太傅重又再贈太尉追封壽王故皇城副使贈太保重裔再贈太傅追封郯王故河陽節度使贈太尉重信再贈太師追封沂王故左金吾衞將軍贈太保重進再贈太傅追封夔王癸亥改鎮州為恒州成徳軍為順國軍丙寅以門下侍郎平章事監修國史趙瑩為侍中青州節度使楊光逺加食邑改賜功臣名號兖州節度使桑維翰加檢校太保河東節度使劉知逺加兼侍中以鄆州節度使北面行營招討使侍衞親軍都指揮使杜重威為恒州順國軍節度使加兼侍中皇子廣晉尹兼功徳使齊王重貴加兼侍中秦州節度使侯益加特進增食邑丁卯以判四方館事孟承誨為太府卿充職戊辰以滄州節度使安叔千為邢州節度使以北面行營使副招討使邢州節度使馬全節為定州節度使以定州節度使王延𦙍為滄州節度使以前邢州節度使楊彦詢為華州節度使恒州立功將校王温以降等第除郡庚午契丹遣使來聘是日上元節六街諸寺燃燈御乾明門觀之夜半還宫壬申延州節度使丁審琦加爵邑鄧州節度使安審徽加檢校太傅陜州節度使石贇加檢校太傅乙亥契丹遣使來聘河陽節度使加侍衞馬步軍都虞侯景延廣加檢校太尉改鄆州節度使典軍如故以前貝州節度使北面行營馬步軍都虞侯王周為河陽節度使加檢校太保丁丑以刑部侍郎竇貞固為門下侍郎以禮部郎中邊歸讜為比部郎中知制誥壬午以河陽節度使王周為涇州節度使以涇州節度副使王欽祚為殿中監二月丁亥皇妹清平公主進封衞國長公主契丹遣使來聘己丑宴于武徳殿新恒州節度使杜重威已下諸軍副兵馬使已下悉預焉賜物有差己亥以曹州防禦使何建為延州留後涇州奏差押牙陳延暉賫勅書往西涼府本府都指揮使等請以陳延暉為節度使辛丑宰臣李松丁母憂起復舊任延州蕃㓂作亂同州鄜州各起牙兵討平之丙午詔鄧唐随郢諸州多有曠土宜令人户取便開耕與免五年差税三月己未兵部尚書韓惲卒庚申遣前齊州防禦使宋光鄴翰林茶酒使張言使于契丹壬戌分命朝臣諸寺觀禱雨丙寅皇后為妹契丹樞密使趙延壽妻燕國長公主卒于幽州舉哀于外次辛未滑州節度使駙馬都尉史匡翰卒輟朝贈太保詔唐州湖陽縣蓼山神祠宜賜號為蓼山顯順之神乙亥以晉昌軍節度使安審琦為河中節度使以前亳州防禦使王令温為貝州節度使丙子賜宰臣李崧白藤肩輿以起復故也丁丑以晉州節度使皇甫遇為河陽節度使以壽州節度使兼侍衞馬軍都指揮使李守貞為滑州節度使以夔州節度使兼侍衞歩軍都指揮使郭謹為相州節度使皆典軍如故宰臣于寺觀禱雨閠月丙戌以兵部郎中司徒詡為右諫議大夫戊子兖州節度使桑維翰加特進封開國公庚寅以延州留後何建為延州節度使以引進使兼殿中監劉政恩為太子詹事壬辰宋州節度使安彦威奏修滑州黄河功畢詔于河決之地建碑立廟丙申以鄜州節度使周密為晉州節度使以左羽林統軍符彦卿為鄜州節度使壬寅詔百官五日一度起居日輪定兩員具所見以封事奏聞詔改鄴都宣明門為朱鳯門武徳殿為視政殿文思殿為崇徳殿畫堂為天清殿寢殿為乾福殿其門悉從殿名皇城南門為乾明門北門為𤣥徳門東門為萬春門西門為千秋門羅城南塼門為廣運門觀音門為金明門橙槽門為清景門㓂氏門為永芳門朝臣門為景風門大城南門為昭明門觀音門為廣義門北河門為静安門魏縣門為應福門㓂氏門為迎春門朝臣門為興仁門上斗門為延清門下斗門為通逺門戊申宋州節度使安彦威封邠國公賞修河之勞也癸丑涇州節度使王周奏前節度使張彦澤在任日不法事二十六條已改正停廢詔襃之是春鄴都鳯翔兖陜汝恒陳等州旱鄆曹澶博相洺諸州蝗夏四月甲寅朔避正殿不視朝日蝕故也是日太陽不虧百官上表稱賀詔沿河藩郡節度使刺史並兼管内河堤使己未右諫議大夫鄭受益兩疏論張彦澤在涇州之日違法虐民支解掌書記張式部曲楊洪等請下所司明申其罪皆留中不出庚申刑部郎中李濤張麟員外郎麻麟王禧同詣閣門上疏論張彦澤罪犯詞甚懇切宋史李濤傳涇帥張彦澤殺記室張式奪其妻式家人詣闕上訴晉祖以彦澤有軍功釋其罪濤伏閣抗疏請寘于法晉祖召見諭之濤植笏叩階聲色俱厲晉祖怒叱之濤執笏如初晉祖曰吾與彦澤有誓約恕其死濤厲聲曰彦澤私誓陛下不忍食其言范延光嘗賜鐡劵今後安在晉祖不能答即拂衣而起辛酉詔張彦澤刳剔賓從誅剝生聚寃聲穢跡流聞四方章表繼來指陳甚切尚以曾施微功特示寛恩深懷曲注之慙貴狥議勞之典其張彦澤宜削一階仍降爵一紀其張式宜贈官張式父鐸弟守貞男希範並與除官仍于涇州賜錢十萬差人津置張式靈柩并骨肉歸鄉所有先收納却張式家財物畜並令却還其涇州新歸業户量與蠲减税賦翌日以前涇州節度使張彦澤為左龍武大將軍宋史楊昭儉傳昭儉與李濤論張彦澤不報會有詔令朝臣轉對或有對事亦許以不時條奏昭儉復上疏曰天子君臨四海日有萬幾懋建諍臣彌縫其闕今則諫臣雖設言路不通藥石之論不達于聖聰而邪佞之徒取容于左右御史臺紀綱之府彈紏之司銜寃者固當昭雪為蠧者難免放流陛下臨御以來寛仁太甚徒置兩司殆如虚器遂令節使慢侮朝章屠害幕吏始訴寃于丹闕反執送于本藩茍安跋扈之心莫恤寃抑之苦願囘宸斷誅彦澤以謝軍吏戊辰廢雄州為昌化軍警州為威肅軍其軍使委本道差補故涇州節度掌書記張式贈尚書虞部郎中以式父鐸為沁州司馬致仕弟守貞為貝州清河縣主簿男希範為興元府文學甲戌詔皇子齊王就前河府節度使康福第以教坊樂宴會前見任節度使戊寅前慶州刺史米廷訓追奪在身官爵配流麟州坐姦妻兄之女也是月州郡十六蝗五月己亥中書門下奏時屬炎蒸事宜簡省應五日百官起居望令押班宰臣一員押百官班其轉對官兩員封付閣門使引進本官随百寮進不用别出謝恩其文武内外官寮乞假寧覲搬家婚葬病損並門見門辭諸道進奉物等不用殿前排列引進使引至殿前奏云某等進奉奏訖令進奉使使出其進奉專使朝見日班首一人致詞都附起居刺史并行軍副使諸道馬歩軍都指揮使已下差人到闕並門見門辭州縣官謝恩曰甲頭一人都致詞不用逐人告官其供奉官殿直等如是當直及合于殿前排立者即入起居如不當直排立者不用每日起居委宣徽使㸃撿嘗須整齊從之時帝不豫難于視朝故也遼史二月甲午遣使使晉索吐谷渾叛者契丹國志云遼以晉招納吐谷渾遣使責讓晉髙祖憂悒成疾左威衞上將軍衞審􅀈卒贈太子少保乙已尊皇太妃劉氏為皇太后徐無黨五代史記注云髙祖所生母也丁巳工部侍郎韋勲改刑部侍郎壬子以左散騎常侍李光廷為秘書監給事中蕭愿為右散騎常侍左諫議大夫曹國珍為給事中太常卿裴坦為左諫議大夫是月州郡五奏大水十八奏旱蝗六月丁巳以兖州節度使桑維翰為晉昌軍節度使以前許州節度使安審琦為兖州節度使襄州都部署髙行周奏安從進觀察判官李光圖出城請援送赴闕乙丑帝崩于保昌殿壽五十一遺制齊王重貴于柩前即皇帝位喪紀並依舊制山陵務從節儉馬步諸軍優紀並從嗣君處分通鑑考異云漢髙祖實錄晉髙祖大漸召近臣屬之曰此天下明宗之天下寡人竊而處之久矣寡人既謝當歸許王寡人之願也此説難信八月太常卿崔棁上諡曰聖文章武明徳孝皇帝廟號髙祖以其年十一月十日庚寅葬于顯陵宰臣和凝撰諡冊哀冊文五代史補髙祖尚明宗女宫中謂之石郎及將起兵于太原京師夜間狼皆羣走往往入宫中愍帝患之命諸班能射者分頭捕逐謂之射狼或遇諸塗問曰汝何從而來對曰看射狼未幾髙祖至盖射亦石也縣五代史闕文梁開平初潞州行營使李思安奏函關穰鄉民伐樹樹仆自分為二中有六字如左書云天十四載石進梁帝藏于武庫時莫詳其義至帝即位識者曰天字取四字兩畫加之于旁即丙字也四字去中之兩畫加十字即申字也帝即位之年廼丙申也進者晉也石者姓也臣謹按天祐二十年嵗在癸未其年莊宗建號改同光元年至清㤗三年嵗丙申其年晉祖即位改元天福元年自未至申凡十四載矣故䜟書云天十四載石進者言自天祐滅後十四載石氏興于晉也豈不明乎而拆字解䜟以就丙申非也史臣曰晉祖潛躍之前沈毅而已及其為君也旰食宵衣禮賢從諫慕黄老之教樂清净之風以絁為衣以麻為履故能保其社稷髙朗令終然而圖事之初召戎為援玁狁自兹而孔熾黔黎由是以罹殃迨至嗣君兵連禍結卒使都城失守舉族為俘亦猶决鯨海以救焚何逃沒溺飲鴆漿而止渴終取喪亡謀之不臧何至于是儻使非由外援之力自副皇天之命以兹睿徳惠彼蒸民雖未足以方駕前王亦可謂仁慈恭儉之主也舊五代史巻八十
