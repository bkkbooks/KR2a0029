body:
  text: 舊五代史巻三十八宋門下侍郎參知政事監修國史薛居正等撰唐書第十四明宗紀四天成二年春正月癸丑朔帝御明堂殿受朝賀仗衞如常儀制曰王者祗敬宗祧統臨寰宇必順體元之典特新制義之文朕以眇躬獲承丕構襲三百年之休運繼二十聖之耿光馭朽納隍夕惕之心罔怠法天師古日躋之道惟勤今則載戢干戈渾同書軌荷𤣥穹之睠祐契兆庶之樂推檢玉泥金非敢期於薄徳耕田鑿井誠有慕於前王将陳享謁之儀即備郊丘之禮宜更稱謂永耀簡編今改名為亶凡在中外宜體朕懐宣制訖百僚稱賀有司吿郊廟社稷丙辰詔端明殿學士班位宜在翰林學士之上今後如有轉改只於翰林學士内選任先是端明殿學士班在翰林學士之下又如三館例官在職上趙鳯轉侍郎日諷宰相府移之既而禁林序列有不可之言安重誨奏行此敕時論便之癸亥宰臣鄭珏加特進門下侍郎兼太微宫使崇文館大學士任圜加光禄大夫門下侍郎監修國史以端明殿學士尚書兵部侍郎馮道為中書侍郎平章事集賢殿大學士以太常卿崔恊為中書侍郎平章事戊辰以前鄧州節度使劉玘卒廢朝左拾遺李同上言天下繫囚請委長吏逐旬親自引問質其罪狀真虛然後論之以法庶無枉濫従之辛未皇子河中節度使従珂加同平章事以鎮州留後檢校司徒王建立為鎮州節度使檢校太傅癸酉皇第三子金紫光禄大夫檢校司徒従厚加檢校太保同平章事河南尹判六軍諸衞事北面副招討房知温奏營州界奚陁羅支内附乙亥以監門衞大将軍傅璉為右武衞上将軍丙子詔曰頃自本朝多難雅道中微皆尚浮華罕持廉讓其有除官蘭省今秩柏臺或以人事相疎或以私讎見訝稍乖敬奉遽至棄捐盖司長之振威處君恩而何地今後應新授官朝謝後可準例上事司長不得輒以私事阻滯其本官亦不得因遭抑挫託故請假戊寅皇子従厚領事于河南府宰相鄭珏已下㑹送非例也己夘樞密使光禄大夫檢校太保行兵部尚書安重誨加開府儀同三司檢校太傅兼侍中樞宻使檢校太保守祕書監孔循加檢校太傅同平章事詔崇文館依舊為𢎞文館初同光中宰相豆盧革以同列郭崇韜父名𢎞希其意奏改之今乃復焉辛巳詔曰亂離斯久法制多隳不有舉明従何禁止起今復三京及州使職員名目是押衙兵馬使騎馬得有暖坐諸都軍将衙官使下繫名糧者只得衣紫皁庶人商旅只著白衣此後不得參雜兼有富戸或投名于勢要以求影庇或希假於攝貴以免丁徭仰所在禁勘以肅奸欺二月壬午朔新羅遣使朝貢丁亥以北京皇城使李繼朗為龍武大将軍北京都指揮使李従瑧為左衞大将軍捧聖都指揮使李従璨為右監門衞大将軍戊子以前北面水陸轉運招撫使守冀州刺史烏震領宣州節度使庚寅陜州節度使檢校司徒石敬瑭加檢校太傅兼六軍諸衞副使壬辰西川節度使孟知祥奏泗州防禦使充西川兵馬都監李嚴煽揺軍衆尋已處斬以潁州刺史孫岳為耀州團練使丙申以従馬直指揮使郭従謙為景州刺史尋令中使誅之夷其族以其首謀大逆以弑莊宗也以尚書左丞崔沂為太子少保致仕壬寅制曰荆南節度使開府儀同三司守太尉兼尚書令南平王髙季興可削奪官爵仍令襄州節度使劉訓充南面招討使知荆南行府事許州節度使夏魯奇為副招討使統蕃漢馬步四萬人進討以其叛故也又命湖南節度使馬殷以湖南全軍㑹合以東川節度使董璋充東南面招討使新授夔州刺史西方鄴為副招討使共領川軍下峽州三面齊進通鑑考異梓夔皆在荆南之西南而云東南面者盖據夔所向言之梓甲辰兖州節度使房知温加同平章事宋州節度使王晏球加檢校太傅丁未以禮部尚書蕭頃為太常卿戊申以御史大夫李琪為右僕射以太子賓客李璘為戸部尚書以吏部侍郎李徳休為禮部尚書以前吏部侍郎崔貽孫為吏部侍郎以端明殿學士户部侍郎趙鳯為兵部侍郎依前充職庚戌詔諸道節度使男及親嫡骨肉未沾恩命者特許上聞河南府新安縣宜為次赤以雍陵在其界故也辛亥以刑部侍郎歸藹為户部侍郎三月壬子朔以中書舍人馬縞為刑部侍郎幸㑹節園宰相樞密使及在京節度使共進錢絹請開宴癸丑遣供奉官賈俊使淮南甲寅以西川節度副使李敬周為遂州武信軍留後乙卯開府儀同三司司徒致仕趙光逢可太保致仕仍封齊國公以武信軍節度使李紹文卒廢朝丙辰宰臣判三司任圜奏諸道藩府請依天復三年已前許貢綾絹金銀隨其土產折進馬之直又請選孳生馬分置監馬並従之五代㑹要任圜奏三京留守諸道節度觀察諸州防禦使刺史每年應聖節及正至等節貢奉或討代勝捷各進獻馬伏見本朝舊事雖以獻馬為名多将綾絹金銀折充馬價盖跋涉之際䕶養稍難因此羣方俱為定制自今後伏乞除蕃部進駝馬外諸州所進馬許依天復三年以前事例隨其土產折進價直冀貢輸之稍易又誠敬之獲申兼欲于諸處揀孳生馬準舊制分置監牧仍委三司使别具制置奏聞太常丞段顒請國學五經博士各講本經以申横經齒胄之義従之庚申以前澤潞節度使檢校太傅兼侍中孔勍為河陽節度使壬戌幸甘水亭甲子青州節度使霍彥威加檢校太尉兼中書令以大内皇城使守饒州刺史李従璋為應州節度使丁夘詔所在府縣糾察殺牛賣肉犯者準條科斷其自死牛即許貨賣肉斤不得過五錢郷村民家死牛但報本村所由準例輸皮入官癸酉以户部郎中知制誥盧詹為中書舍人夏四月辛巳朔房知温奏前月二十一日盧臺戍軍亂害副招討寧國軍節度使烏震尋與安審通斬殺亂兵訖帝聞之廢朝一日贈震太傅新羅國遣使貢方物丁亥以華州留後劉彥琮為本州節度使是日幸㑹節園宴近臣己丑以兵部侍郎崔居儉權知尚書左丞以户部侍郎王權為兵部侍郎以禮部侍郎裴皥為户部侍郎以翰林承㫖守中書舍人李愚為禮部侍郎充職庚寅御史臺奏今月三日廊下餐百官坐定兩省官方來自五品已下輒起詔曰每赴廊餐如對御宴若行私禮是失朝儀各罰半月俸五代㑹要長興三年五月詔文武兩班每遇入閤賜食従前御史臺官及諸朝官皆在敷政門外兩廊食惟北省官于敷政門内别坐既為隔門各不相見致行坐不齊難于肅整今後每遇入閤賜食北省官亦宜於敷政門外東廊下設席以北首為上待班齊就坐詔盧臺亂軍龍晊所部鄴都奉節等九指揮三千五百人在營家口骨肉並可全家處斬龍晊所部之衆即梁故魏博節度使楊師厚之所招置也皆天下雄勇之士目其都為銀槍効節僅八千人師厚卒賀徳倫不能制西迎莊宗入魏従征河上所向有功莊宗一統之後雖數頒賚而驕衆無厭同光末自貝州劫趙在禮據有魏博及帝纘位在禮冀脱其禍潛奏願赴朝覲遂除皇子従榮為帥乃令北禦契丹是行也不支甲胄惟幟于長行表隊伍而已故俛首遄征在途聞李嚴為孟知祥所害以為劒南阻絶互相煽動及屯于盧臺㑹烏震代房知温為帥轉増浮説震與房知温博于東寨日亭午大譟於營外知溫上馬出門為甲士所擁且曰不與兒郎為主更何處去知温紿之曰馬軍皆在河西步卒獨何為也遂得躍馬登舟濟於西岸安審通戢騎軍不動知温與審通謀伺便攻之令亂兵巻甲南行騎軍徐進部伍嚴整叛者相顧失色列炬宵行疲於荒澤遲明潛令外州軍别行知温等遂擊亂軍横尸于野餘衆復趋舊寨至則已焚之矣翼日盡戮之脱於叢草溝塍者十無二三迨夜竄于山谷稍奔於定州及王都之敗乃無噍類矣癸巳兖州節度使房知温加侍中齊州防禦使安審通加檢校太傅並賞盧臺之功也丁酉偽吴楊􅄎遣移署右威衞将軍雷現貢端午禮幣辛丑以前利州節度使張敬詢為雲州節度使遣樞密使孔循赴荆南城下時招討使劉訓有疾故也甲辰以户部侍郎韓彥惲為祕書監是日幸石敬瑭安重誨第丙午故振武節度使李嗣恩贈太尉以司封郎中充樞密院直學士閻至為左諫議大夫充職右諫議大夫梁文矩上言平蜀已來軍人剽略到西川人口甚多骨肉阻隔恐傷和氣請許收認帝仁慈素深因文矩之奏詔河南河北舊因兵火擄隔者並従識認是日郢州進白鵲五月癸丑以福建留後檢校太傅舒州刺史王延鈞為檢校太師守中書令充福建節度使琅琊郡王以太常卿蕭頃為吏部尚書是日懐州進白鵲戊午以三司副使守太子賓客張格卒廢朝以翰林學士駕部郎中知制誥竇夢徴為中書舍人充職癸亥遣宣徽使張延朗調發郡縣糧運赴荆南城下仍以軍法従事以右龍武統軍崔公實為左龍武統軍以前復州刺史髙行周為右龍武統軍割果州屬郡乙丑偽呉楊溥貢新茶滄州進白鶴庚午詔罷荆南之師既而令軍士散掠居民而迴詔文武臣僚及諸道節度使刺史有父母在者各與恩澤宰臣任圜表辭三司事乃以樞宻院承㫖孟鵠充三司副使權判六月壬午華州邢州進兩岐麥兖州進三足烏丙戌宰相任圜落平章事守太子少保丁亥詔天下除併無名額寺院以宣徽北院使張延朗為右武衞大将軍判三司依前宣徽使檢校司徒辛夘大理少卿王鬱上言凡決極刑準敕合三覆奏近年已來全隳此法伏乞今後決前一日許一覆奏従之壬辰南面招討使知荆州南行府事襄州節度使檢校太傅劉訓責授檢校右僕射守檀州刺史訓南征無功故有是譴詔喪葬之家送終之禮不得過度乙未户部尚書李璘上言請朝班自四品已上官各許薦令録兩人五品官各薦簿尉兩人功過賞罰與舉者同之詔従之其所舉人仍于官告内標所舉姓名或有不公連坐舉主仍令三品已上各舉堪任兩使判官者丙申以天䇿上将軍湖南節度使開府儀同三司檢校太師守尚書令楚王馬殷為守太師尚書令封楚國王庚子幸白司馬坡祭突厥神従北俗之禮也秋七月庚戌朔以宋州節度使王晏球充北面行營副招討使癸丑以左金吾将軍烏昭逺為左衞上将軍充入蠻國信使中書奏馬殷封楚國王禮三不載國王之制請約三公之儀用竹冊従之壬戌西川節度副大使知節度事孟知祥加檢校太尉兼侍中東川董瑋加爵邑以左効義指揮使元習為資州刺史右効義指揮使盧密為雅州刺史癸亥幸冷泉宫甲子以檢校工部尚書謝洪為宿州團練使夔州刺史西方鄴奏殺敗荆南賊軍收峽内三州丙幸升夔州為寧江軍以鄴為節度使戊辰詔曰頃因本朝親王遥領方鎮遂有副大使知節度事年代已深相沿未改其東川西川今後落副大使只云節度使庚午遂州留後李敬周鄜州留後劉仲殷並正授本州節度使壬申兖州節度使房知温移鎮徐州徐州節度使安元信移鎮襄州滄州節度使趙在禮移鎮兖州以齊州防禦使安審通為滄州節度使是日詔陵州合州長流百姓豆盧革韋説等宜令逐處刺史監賜自盡其骨肉並放逐便是日逐段凝于遼州劉訓于濮州温韜于徳州甲戌太子少保任圜上表乞致仕仍于外地尋醫詔従之丁丑以左金吾大将軍曹廷隠為齊州防禦使八月己夘朔日有食之辛巳以右諫議大夫孔昭序為給事中以祕書少監崔憓為右諫議大夫壬午以右驍衞大将軍劉衡為左領衞上将軍以鄴都副留守趙敬怡為右衞上将軍判興唐府事乙酉昆明大鬼主羅殿王普露靜王九部落各差使隨牂牁清州八郡刺史宋朝化等一百五十三人來朝進方物各賜官吿繒綵銀器放還蕃丙戌以御史中丞盧文紀為工部尚書以左諫議大夫梁文矩為御史中丞鄧州留後陶玘貶嵐州司馬以其為内鄉縣令盛歸仁所訟税外科率故也仍賜歸仁緋袍魚袋癸巳幸皇子従榮第宣禁中伎樂觀宴従榮進馬及器幣帝因以伎樂賜之華州上言渭河泛濫害稼丁酉以吏部郎中襲文宣公孔邈為左諫議大夫史館修撰趙熙上言應内中公事及詔書奏對應不到中書者請委内臣一人抄録月終送史館詔差樞宻直學士録送青州進芝草新州奏契丹乞置互市癸夘汴州節度使朱守殷加兼侍中鄆州節度使符習加檢校太尉甲辰皇子従榮娶鄜州節度使劉仲殷女是夕禮㑹百僚表賀九月辛亥義武軍節度使檢校太尉兼中書令王都加食邑實封幽州節度使趙徳鈞加檢校太尉鎮州節度使王建立加同平章事偽呉楊溥遣使以應聖節貢獻己未以前雲州節度使髙行珪為鄧州節度使是日出御札曰歴代帝王以時巡狩一則遵乎禮制一則按察方區矧彼夷門控兹東夏當先帝勘平之始為眇躬殿守之邦俗尚貞純兵懐忠勇自元臣鎮靜庶事康和兆民咸樂于有年闔境彌堅於望幸事難違衆議在有方朕取十月七日親幸汴州庚申以衞尉卿李延光為大理卿北京留守李彥超上言先父存審本姓符氏䝉武皇賜姓乞郤還本姓従之乙丑夏州節度使李仁福鳯翔節度使李従曮朔方節度使韓洙並加食邑改賜功臣以汝州防禦使趙延壽為河陽節度使以比部郎中知制誥劉贊為中書舍人以河陽掌書記程遜為比部員外郎知制誥以代州刺史李徳珫為蔚州刺史丙寅樞宻使孔循兼東都留守襄州夏魯奇上言荆南髙季興遣使持書乞修貢奉詔魯奇不納詔諸州録事參軍不得兼使府賓職己巳鄧州節度使史敬鎔加檢校太保同州節度使盧質加檢校司徒御史臺奏每遇入閤舊例只一員侍御史在龍墀邊祗候彈奏公事或有南班失儀㸃檢不及今欲依常朝例差殿中侍御史二員押鐘鼔樓位仍各綴供奉班出入従之以青州節度副使淳于晏為亳州團練使契丹遣使美稜瑪古已下朝貢戊寅西川奏據黎州狀雲南使趙和于大渡河南起舍一間留信物十五籠並雜牋詩一巻遞至闕下冬十月已夘朔帝御文明殿視朝癸未亳州刺史李鄴貶郴州司户又貶崖州長流百姓所在賜自盡判官樂文紀配祁州責其違法黷貨也乙酉駕發西京詔留宰相崔協以奉祠祭丁亥帝宿于滎陽汴州朱守殷奏都指揮使馬彥超謀亂已處斬訖戊子次京水知朱守殷反帝親統禁軍倍程前進翼日至汴州攻其城拔之守殷伏誅丙申磁州刺史藥縦之上言今月十二日供奉官王仁鎬至稱制殺太子少保致仕任圜契丹遣使持書求碑石欲為其父表其葬所戊戌詔曰諸道州府自同光三年己前所欠秋夏税租并主持務局敗闕課利并沿河舟船折欠天成元年殘欠夏税並特與除放時重誨既構任圜之禍恐人非之思沛恩于衆以掩已過乃奏曰三司積欠約二百萬貫虛繫帳額請並蠲放帝重違其意故有是詔時議者以蠲隔年之賦猶或恵民場院課利一槩除之得不啟奸倖之門乎己亥詔曰太子少保致仕任圜早推勲舊曾委重難既退免于劇權俾優閒于外地而乃不遵禮分潛附守殷緘題罔避於嫌疑情㫖頗彰于怨望自收汴壘備見蹤由若務含𢎞是孤典憲尚全大體止罪一身已令本州私第自盡其骨肉親情僕使等並皆放罪辛丑詔曰后來其蘇動必従于人欲天監厥徳靜宜布于國恩近者言幸浚郊暫離洛邑盖逢嵗稔共樂時康不謂奸臣遽彰逆狀為厲之階既甚覆宗之禍自貽俾我生靈遘兹紛擾永言軫惻無輟寐興宜覃雨露之恩式表雲雷之澤應汴州城内百姓既經驚劫宜放二年屋税諸處有曾受逆人文字者隨處焚毁應天下見禁囚徒除十惡五逆殺人放火劫盜合造毒藥官典犯贓偽行印信屠牛外罪無輕重並従放釋應有民年八十己上及家長者有廢疾者免一丁差役云以山南西道節度使張筠為西京留守行京兆尹青州節度使霍彥威差人走馬進箭一對賀誅朱守殷帝郤賜彥威箭一對𫝊箭蕃家之符信也起軍令衆則使之彥威本非蕃将以臣𫝊箭于君非禮也癸夘以權知汴州事陜州節度使石敬瑭為汴州節度使兼六軍諸衞副使侍衞親軍馬步都指揮使鳯翔奏地震丙午威武軍節度副使檢校太尉守建州刺史王延亶可同平章事守建州刺史充奉國軍節度副使兼威武軍節度副使詔割施州卻屬黔南十一月己酉帝祭蕃神于郊外庚戌以皇城使行袁州刺史李従敏為陜州節度使乙夘青州霍彥威鄆州符習來朝以太子詹事温輦為吏部侍郎徐州房知温來朝戊午黔南節度使李紹義加檢校太保庚申皇子河中節度使檢校太保同平章事従珂鄴都留守檢校太保同平章事従榮河南尹判六軍諸衞事檢校太保同平章事従厚並加檢校太傅進爵邑貝州刺史竇廷琬上言請制置慶州青白兩池逐年出絹十萬匹米萬石詔升慶州為防禦所以廷琬為使壬申詔霍彥威等歸藩詔太宗朝左僕射李靖可冊贈太保鄭州僕射陂可改為太保陂時議者以僕射陂者後魏孝文帝賜僕射李沖故因以為名及是命之降以為李靖盖誤也契丹遣使摩琳等來乞通和十二月戊寅朔以前鳯翔留後髙允貞為右監門上将軍詔以施州為夔州屬郡以其便近故也遣飛勝指揮使于契丹賜契丹王錦綺銀器等兼賜其母繡被瓔珞己夘蔚州刺史周令武得代歸闕帝問北州事令武奏曰山北甚安諸蕃不相侵擾鴈門已北東西數千里斗粟不過十錢帝悦顧謂左右曰須行善事以副天道居數日帝延宰臣于𤣥徳殿言及民事馮道奏曰莊宗末年不撫軍民惑于聲樂遂致人怨國亂陛下自膺人望歲時豐稔亦淳化所致也更願居安思危帝然之許州地震庚辰皇子鄴都留守従榮移鎮太原以北京留守符彥超為潞州節度使乙酉以彰國軍節度使李従璋昧于政理詔歸闕敇新及第進士有聞喜宴逐年賜錢四十萬己丑兖州節度使趙在禮來朝詔出潛龍宅米以賑百官壬辰以太傅致仕齊國公趙光逢卒輟朝丙申許州節度使夏魯奇移鎮遂州庚子幸石敬瑭公署及康義誠私第甲辰狩于東郊臘也丙午追尊四廟以應州舊宅為廟舊五代史巻三十八
