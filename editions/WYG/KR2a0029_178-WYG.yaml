body:
  text: 舊五代史巻八十九宋門下侍郎參知政事監修國史薛居正等撰晉書第十五列傳四桑維翰字國僑洛陽人也父拱事河南尹張全義為客將維翰身短面廣殆非常人既壯每對鑑自歎曰七尺之身安如一尺之面由是慨然有公輔之望三楚新録馬希範入覲塗經淮上時桑維翰旅遊楚泗間知其來遽謁之曰僕聞楚之為國挾天子而令諸侯其勢不可謂卑也加以利盡南海公室大富足下之來也非傾府庫之半則不足以供芻粟之費今僕貧者敢以萬金為請惟足下濟之希範輕薄公子覩維翰形短而腰長語魯而且醜不覺絶倒而笑既而與數百縑維翰大怒拂衣而去性明惠善詞賦春渚紀聞桑維翰試進士有司嫌其姓黜之或勸勿試維翰持鐵硯示人曰鐵硯穿乃改業著日出扶桑賦以見志唐同光中登進士第洛陽縉紳舊聞記桑魏公父拱為河南府客將桑魏公將應舉父乗間告齊王張全義曰某男粗有文性今被同人相率欲取解俟王旨齊王曰有男應舉好可令秀才將巻軸來魏父之父趨下再拜既歸令子侵早投書啓獻文字數軸王請見魏公父教之趨階王曰不可既應舉便是貢士可歸客司謂魏公父曰他道路不同莫管他終以客禮見王一見奇之禮遇頗厚是年王力言于當時儒臣由是擢上第髙祖領河陽辟為掌書記歴數鎮皆從及建義太原首預其謀復遣為書求援于契丹果應之俄以趙徳鈞發使聘契丹髙祖懼其改謀命維翰詣幕帳述其始終利害之義其約乃定通鑑趙徳鈞以金帛賂契丹主云若立已為帝請即以見兵南平洛陽與契丹為兄弟之國仍許石氏常鎮河東契丹主自以深入敵境晉安未下徳鈞兵尚强范延光在其東又恐山北諸州邀其歸路欲許徳鈞之請帝聞之大懼亟使維翰見契丹主説之曰大國舉義兵以救孤危一戰而唐兵瓦解退守一柵食盡力窮趙北平父子不忠不信畏大國之彊且素蓄異志按兵觀變非以死狥國之人何足可畏而信其誕妄之辭貪毫末之利棄垂成之功乎且使晉得天下將竭中國之財以奉大國豈此小利之比乎契丹主曰爾見捕鼠者乎不備之猶或􅲪傷其手况大敵乎對曰今大國已扼其喉安能􅲪人乎契丹主曰吾非有渝前約也但兵家權謀不得不爾對曰皇帝以信義救人之急四海之人俱屬耳目奈何二三其命使大義不終臣竊為皇帝不取也跪于帳前自旦至暮涕泣爭之契丹乃從之指帳前石謂徳鈞使者曰我已許石郎此石爛可改矣及高祖建號制授翰林學士禮部侍郎知樞密院事尋改中書侍郎平章事集賢殿大學士充樞密院使高祖幸夷門范延光據鄴叛張從賓復自河洛舉兵向闕人心恟恟時有人候于維翰者維翰從容談論怡怡如也時皆服其度量及楊光逺平鄴朝廷慮兵驕難制維翰請速散其衆尋移光逺鎮洛陽光逺由是怏怏上疏論維翰去公狥私除改不當復營邸肆于兩都之下與民爭利高祖方姑息外將事不獲已因授維翰檢校司空兼侍中出為相州節度使時天福四年七月也先是相州管内所獲盜賊皆籍沒其財產云是河朔舊例及維翰作鎮以律無明文具事以奏之詔曰桑維翰佐命功全臨戎寄重舉一方之往事合四海之通規況賊盜之徒律令具載比為撫萬姓而安萬國豈忍罪一夫而破一家聞將相之善言成國家之美事既資王道實契人心今後凡有賊人准格律定罪不得沒納家貲天下諸州皆准此處分自是劫賊之家皆免籍沒維翰之力也嵗餘移鎮兖州時吐渾都督白承福為契丹所迫舉衆内附高祖方通好于契丹拒而不納鎮州節度使安重榮患契丹之强欲謀攻襲戎師往返路出于真定者皆潛害之密與吐谷渾相結至是納焉而致于朝既而安重榮抗表請討契丹且言吐渾之請是時安重榮握强兵據重鎮恃其驍勇有飛揚跋扈之志晉祖覽表猶豫未決維翰至重榮已畜奸謀且懼朝廷違其意乃密上疏曰竊以防未萌之禍亂立不拔之基扃上繫聖謀動符天意非臣淺陋所可窺圗然臣逢世休明致位通顯無功報國省已愧心其或事繫安危理闗家國茍猶緘黙實負君親是以區區之心不能自已近者相次得進奏院狀報吐渾首領白承福已下舉衆内附鎮州節度使安重榮上表請討契丹臣方遥朝闕未測端倪竊思陛下頃在并汾初罹屯難師少糧匱援絶計窮勢若綴旒困同懸磬契丹控弦玉塞躍馬龍城直度隂山徑絶大漠萬里赴難一戰夷凶救陛下累卵之危成陛下覆盂之業皇朝受命于此六年彼此通歡亭障無事雖卑辭降節屈萬乗之尊而庇國息民實數世之利今者安重榮表契丹之罪方恃勇以請行白承福畏契丹之强將假手以報怨恐非逺慮有惑聖聰方今契丹未可與爭者有其七焉契丹數年來最强盛侵伐鄰國吞滅諸蕃救援河東功成師克山後之名藩大郡盡入封疆中華之精甲利兵悉歸廬帳即今土地廣而人民衆戎器備而戰馬多此未可與爭一也契丹自告捷之後鋒鋭氣雄南軍因敗衂已來心沮膽怯況今夏秋雖稔而帑廩無餘黎庶雖安而貧弊益甚戈甲雖備而鍛礪未精士馬雖多而訓練未至此未可與爭者二也契丹與國家恩義非輕信誓甚篤雖多求取未至侵凌豈可先發釁端自為戎首縱使因之大克則後患仍存其或偶失沈機則追悔何及兵者凶器也戰者危事也茍議輕舉安得萬全未可與爭者三也王者用兵觀釁而動是以漢宣帝得志于匈奴因單于之爭立唐太宗立功于突厥由頡利之不道方今契丹王抱雄武之量有戰伐之機部族輯睦蕃國畏伏土地無災孳畜繁庶蕃漢雜用國無釁隟此未可與爭者四也引弓之民遷徙鳥舉行逐水草軍無饋運居無竈幕往無營柵便苦澀任勞役不畏風霜不顧飢渇皆華人之所不能此未可與爭者五也戎人皆騎士利在坦途中國用徒兵喜于隘險趙魏之北燕薊之南千里之間地平如砥步騎之便較然可知國家若與契丹相持則必屯兵邊上少則懼强敵之衆固須堅壁以自全多則患飛輓之勞必須逐寇而速返我歸而彼至我出而彼迴則禁衛之驍雄疲于奔命鎮定之封境畧無遺民此未可與爭者六也議者以陛下于契丹有所供億謂之耗蠧有所卑遜謂之屈辱微臣所見則曰不然且以漢祖英雄猶輸貸于冒頓神堯武略尚稱臣于可汗此謂達于權變善于屈伸所損者微所利者大必若因兹交構遂成釁隟自此則嵗嵗徴發日日轉輸困天下之生靈空國家之府藏此為耗蠧不亦甚乎兵戈既起將帥擅權武吏武臣過求姑息邊藩逺郡得以驕矜外剛内柔上陵下替此為屈辱又非多乎此未可與爭者七也願陛下思社稷之大計采將相之善謀勿聽樊噲之空言宜納婁敬之逆耳然後訓撫士卒養育黔黎積穀聚人勸農習戰以俟國有九年之積兵有十倍之强主無内憂民有餘力便可以觀彼之變待彼之衰用已之長攻彼之短舉無不克動必成功此計之上者也惟陛下熟思之臣又以鄴都襟帶山河表裏形勢原田沃衍户賦殷繁乃河朔之名藩實國家之巨屏即今主帥赴闕軍府無人臣竊思慢藏誨盜之言恐非勇夫重閉之意願迴深慮免起奸謀欲希陛下暫整和鑾略謀巡幸雖櫛風沐雨上勞于聖躬而杜漸防微實資于睿略省方展義今也其時臣受主恩深憂國情切智小謀大理淺詞繁俯伏惟懼于僣踰禆補或希于萬一謹冒死以聞疏奏留中不出高祖召使人于内寢傳密旨于維翰曰朕比以北面事之煩懣不快今省所奏釋然如醒朕計已決卿可無憂七年夏高祖駕在鄴都維翰自鎮來朝改授晉昌軍節度使少帝嗣位徴拜侍中監修國史頻上言請與契丹和為上將景延廣所否明年楊光逺搆契丹有澶淵之役凡制敵下令皆出于延廣維翰與諸相無所與之及契丹退維翰使親黨受寵于少帝者密致自薦曰陛下欲制北戎以安天下非維翰不可少帝乃出延廣守洛以維翰守中書令再為樞密使𢎞文館大學士繼封魏國公事無巨細一以委之數月之間百度寖理然權位既重而四方賂遺咸湊其門故仍嵗之間積貨鉅萬由是澆競輩得以興謗未幾内省客使李彥韜端明殿學士馮玉皆以親舊用事與維翰不協間言稍入維翰漸見疎忌將加黜退賴宰相劉昫李崧奏云維翰元勲且無顯過不宜輕有進退少帝乃止尋以馮玉為樞密使以分維翰之權後因少帝微有不豫維翰曾密遣中使達意于太后請為皇弟重睿擇師傅以教道之少帝以此疑其有他俄而馮玉作相與維翰同在中書會舍人盧賈秩滿玉乃下筆除賈為工部侍郎維翰曰詞臣除此官稍慢恐外有所議因不署名屬維翰休暇玉竟除之自此維翰與玉尤不相協俄因少帝以重睿擇師傅言于玉玉遂以詞激少帝尋出維翰為開封府尹維翰稱足疾罕預朝謁不接賓客是嵗秋霖經月不歇一日維翰出府門由西街入内至國子門馬忽驚逸御者不能制維翰落水久而方蘇或言私邸亦多怪異親黨咸憂之及戎王至中渡橋維翰以國家安危繫在朝夕迺詣執政異其議又求見帝復不得對維翰退而謂所親曰若以社稷之靈天命未改非所能知也若以人事言之晉氏將不血食矣開運三年十二月十日王師既降契丹十六日張彥澤以前鋒騎軍陷都城戎王遣使遺太后書云可先使桑維翰景延廣逺來相接甚是好事是日凌旦都下軍亂宫中火發維翰時在府署左右勸使逃避維翰曰吾國家大臣何所逃乎即坐以俟命時少帝已受戎王撫慰之命乃謀自全之計因思維翰在相時累貢謀畫請與契丹和慮戎王到京窮究其事則顯彰已過故欲殺維翰以滅其口因令圖之張彥澤既受少帝密旨復利維翰家財乃稱少帝命召維翰維翰束帶乗馬行及天街與李崧相遇交談之次有軍吏于馬前揖維翰赴侍衛司維翰知其不可顧謂崧曰侍中當國今日國亡翻令維翰死之何也崧甚有愧色是日彥澤遣兵守之十八日夜為彥澤所害時年四十九即以衣帶加頸報戎王云維翰自經而死戎王報曰我本無心害維翰維翰不合自致戎王至闕使人驗其狀令殯于私第厚撫其家所有田園邸第並令賜之及漢高祖登極詔贈尚書令維翰少時所居恒有魑魅家人咸畏之維翰往往被竊其衣撮其巾櫛而未嘗改容當兩朝秉政出上將楊光逺景延廣俱為洛川守又嘗一制除節將十五人各領軍職無不屈而服之理安陽除民弊二十餘事在兖海擒豪賊過千人亦冦恂尹翁歸之流也開運中朝廷以長子坦為屯田員外郎次子塤為秘書郎維翰謂同列曰漢代三公之子為郎廢已久矣近或行之甚諠外議乃抗表固讓不受尋改坦為大理司直塤為祕書省正字議者美之初高祖在位時詔廢翰林學士院由是併内外制皆歸閣下命舍人直内廷數年之間尤重其選及維翰再居宥密不信宿奏復置學士院凡署職者皆其親舊時議者以維翰相業素高公望所屬雖除授或黨亦弗之咎也五代史補桑維翰形貌甚怪往往見之者失次張彥澤素以驍勇稱每謁候雖冬月未嘗不雨汗及中渡變生彥澤引蕃部至欲逞其威乃領衆突入開封府弓矢亂發且問桑維翰安在維翰聞之乃厲聲曰吾為大臣使國家如此其死宜矣張彥澤安得無禮乃升㕔安坐謂彥澤曰汝有何功帶使相已臨方面當國家危急不能盡犬馬之力以為報効一旦背叛助契丹作威為賊汝心安乎彥澤覩其詞氣慨然股慄不敢仰視退曰吾不知桑維翰何人今日之下威稜猶如此其再可見耶是夜令壯士就府縊殺之當維翰之縊也猶瞋目直視嘘其氣再三每一嘘皆有火出其光赫然三嘘之外火盡滅就視則奄然矣趙瑩字𤣥輝華隂人也曽祖溥江陵縣丞祖孺祕書正字父居晦為農瑩風儀美秀性復純謹梁龍徳中始解褐為康延孝從事後唐同光中延孝鎮陜州會莊宗伐蜀命延孝為騎將將行留瑩監修金天神祠功既集忽夢神召于前亭待以優禮謂瑩曰公富有前程所宜自愛因遺一劒一笏覺而駭異明宗即位以高祖為陜府兩使留後瑩時在郡以前官謁之一見如舊相識即奏署管記髙祖歴諸鎮皆從之累使闕下官至御史大夫賜金紫髙祖再鎮并州位至節度判官髙祖建號授瑩翰林學士承旨金紫光禄大夫户部侍郎知太原府事尋遷門下侍郎同平章事監修國史車駕入洛使持聘謝契丹及還加光禄大夫兼吏部尚書判戸部初瑩為從事丁母憂髙祖不許歸華下以麤縗隨幕人或短之及入相以敦讓汲引為務監修國史日以唐代故事殘缺署能者居職纂補實録及修正史二百巻行于時瑩首有力焉少帝嗣位拜守中書令明年檢校太尉本官出為晉昌軍節度使是時天下大蝗境内捕蝗者獲蝗一斗給粟一斗使飢者獲濟逺近嘉之未幾移鎮華州嵗餘入為開封尹開運末馮玉李彥韜用事以桑維翰才望素重而瑩柔而可制因共稱之乃出維翰復瑩相位加𢎞文館大學士及李崧馮玉議出兵應接趙延壽而以杜重威為都督部署瑩私謂馮李曰杜中令國之懿親所求未愜心恒怏怏安可更與兵權若有事邊陲只李守貞將之可也及契丹陷京城契丹主遷少帝于北塞瑩與馮玉李彥韜俱從契丹永康王代立授瑩太子太保周廣順初遣尚書左丞田敏報命于契丹遇瑩于幽州瑩得見華人悲悵不已謂田敏曰老身漂零寄于此近聞室家喪逝弱子無恙䝉中朝皇帝倍加存恤東京舊第本屬公家亦聞優恩特給善價老夫至死無以報効于是南望稽首涕泗横流先是漢高祖以入蕃將相第宅徧賜隨駕大臣故以瑩第賜周太祖太祖時為樞密副使召瑩子前刑部郎中易則告之曰所賜第除素屬版籍外如有别契劵為已所置者可歸本直即以千餘緡遺易則易則惶恐辭讓周太祖堅與之方受故瑩言及之未幾瑩卒于幽州時年六十七瑩初被疾遣人祈告于契丹主願歸骨于南朝使羈魂幸復鄉里契丹主閔而許之及卒遣其子易從家人數輩䕶喪而還仍遣大將送至京師周太祖感歎久之詔贈太傅仍賜其子絹五百匹以備喪事令歸葬于華隂故里劉昫字耀逺涿州歸義人也祖乗幽府左司馬父因幽州巡官昫神彩秀拔文學優贍與兄晅弟曍俱有鄉曲之譽唐天祐中契丹陷其郡昫被俘至新州逃而獲免後居上國大寧山與吕夢奇張麟結庵共處以吟誦自娛會定州連帥王處直以其子都為易州刺史署昫為軍事衙推及都去任乞假還鄉都招昫至中山會其兄晅自本郡至都薦于其父尋署為節度衙推不踰嵗命為觀察推官歴二年都簒父位時都有客和少微素嫉晅搆而殺之昫越境而去寓居浮陽節度使李存審辟為從事莊宗即位授太常博士尋擢為翰林學士繼改膳部員外郎賜緋比部郎中賜紫丁母憂服闋授庫部郎中依舊充職明宗即位拜中書舍人歴户部侍郎端明殿學士明宗重其風儀愛其温厚長興中拜中書侍郎兼刑部尚書平章事時昫入謝遇大祠明宗不御中興殿閤門白舊禮宰相謝恩須正殿通喚請候來日樞密使趙延壽曰命相之制下已數日中謝無宜後時因即奏之遂謝于端明殿昫自端明殿學士拜相而謝于本殿士子榮之清泰初兼判三司加吏部尚書門下侍郎監修國史時與同列李愚不協動至忿爭時論非之未㡬俱罷知政事昫守右僕射以張延朗代判三司初唐末帝自鳳翔至切于軍用時王玫判三司詔問錢榖玫具奏其數及命賞軍甚愆于素通鑑帝問王玫以府庫之實對有數百萬在既而閲實金帛不過三萬兩匹末帝怒用昫代玫昫乃搜索簿書命判官高延賞計窮詰勾及積年殘租或塲務販負皆虚係賬籍條奏其事請可徴者急督之無以償官者蠲除之通鑑清泰二年八月逋諸道捕租三百三十八萬吏民相與歌詠惟主典怨沮及罷相之日羣吏相賀昫歸無一人從之者葢憎其太察故也天福初張從賓作亂于洛陽害皇子重乂詔為東都留守判河南府事尋以本官判鹽鐵未㡬奉使入契丹還遷太子太保兼左僕射封譙國公俄改太子太傅開運初授司空平章事監修國史復判三司契丹主至不改其職昫以眼疾乞休致契丹主授昫守太保契丹主北去留于東京其年夏以病卒年六十漢高祖登極贈太保初昫避難河朔匿于北山蘭若有賈少瑜者為僧輟衾袍以温燠之及昫官達致少瑜進士及第拜監察御史聞者義之馮玉以下有闕文歐陽史云字景臣定州人也少帝嗣位納馮后于中宫后即玉之妹也玉既聮戚里恩寵彌厚俄自知制誥中書舍人出為潁州團練使遷端明殿學士户部侍郎尋加右僕射軍國大政一以委之以下有闕文通鑑云馮玉每善承迎帝意由是益有寵嘗有疾在家帝謂諸宰相曰自刺史以上俟馮玉出乃得除其倚任如此玉乗勢弄權四方賂遺輻輳其門由是朝政益壊張彥澤陷京城軍士爭湊其第家財巨萬一夕罄空玉假蓋而出猶繞指以諂彥澤且請引送玉璽于契丹主將利其復用玉從少帝北遷契丹命為太子少保至周太祖廣順二年其子傑自幽州不告父而亡歸玉懼譴責尋以憂恚卒于蕃中五代史補馮玉嘗為樞密使有朝使馬承翰素有口辨一旦持刺來謁玉玉覽刺輒戲曰馬既有汗宜卸下鞍承翰應聲曰明公姓馮可謂死囚逢獄玉自以失言遽延而謝之殷鵬字大舉大名人也以雋秀為鄉曲所稱弱冠擢進士第唐閔帝之鎮魏州聞其名辟為從事及即位命為右拾遺歴左輔闕考功員外郎充史館修撰遷刑部郎中鵬姿顔若婦人而性巧媚天福中擢拜中書舍人與馮玉同職玉本非代言之才所得詞目多托鵬為之玉嘗以姑息字問於人人則以辜負字教之玉乃然之當時以為笑端鵬之才比玉雖優其纎佞過之後玉出郡借第以處之分禄食之及玉為樞密使擢為本院學士每有庶寮秉鞹謁玉故事宰臣以履見之鵬多在玉所見客亦然有丞郎王易簡退而有言鵬銜之及契丹入汴有人獲玉與鵬有籖記字皆朝廷上列有不得志欲左授者則易簡是其首焉玉既北行鵬亦尋以病卒史臣曰維翰之輔晉室也罄弼諧之志㕘締搆之功觀其効忠亦可謂社稷臣矣況和戎之䇿固非誤計及國之亡也彼以滅口為謀此掇殁身之禍則畫䇿之難也豈期如此哉是以韓非慨慷而著説難者當為此也悲夫趙瑩際會風雲優㳺藩輔雖易簀于絶域終歸柩于故園蓋仁信之行通于遐邇故也劉昫有真相之才克全嘉譽馮玉乗君子之器終殁窮荒其優劣可知矣舊五代史巻八十九
