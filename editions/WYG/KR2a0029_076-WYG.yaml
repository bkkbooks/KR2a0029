body:
  text: 舊五代史巻三十七攷證唐書明宗紀三内出象笏三十四靣三十四歐陽史作三十二偽蜀右僕射中書侍郎平章事趙國公張格張格原本作張裕攷舊唐書張濬𫝊濬次子格仕蜀為平章事今改正偽署幽州莭度使盧文進盧文進遼史作盧國用葢文進在遼改名國用耳國王按已堅以七月二十七日卒案遼史太祖紀作七月辛巳上崩可輟今月十九日朝參案歐陽史作廢朝三日契丹次案契丹次葢言契丹方即次也是書前後如攻城次鎭州次多单用次字疑即當時案牘之文今仍其舊附識于此按巴堅舊作阿保機今改舊五代史巻三十七考證
