body:
  text: 舊五代史巻一百三宋門下侍郎參知政事兼修國史薛居正等撰漢書第五𨼆帝紀下乾祐三年春正月已亥朔帝不受朝賀鳯翔行營都部署趙暉奏前月二十四日収復鳳翔逆賊王景崇舉族自燔而死丁未鳳翔節度使充西南行營都部署趙暉加兼侍中戊申密州刺史王萬敢奏奉詔領兵入海門界至荻水鎮俘掠焚蕩更請益兵詔前沂州刺史郭瓊率禁軍赴之庚戌前永興軍節度副使安友規除名流登州沙門島先是友規權知永興軍府事及趙思綰之奔衝友規失守城池至是乃正其罪焉癸亥以前邠州節度使宋彦筠為太子太師致仕丙辰分命使臣赴永興鳳翔河中収葬用兵巳來所在骸骨時已有僧聚髑髏二十萬矣前沂州刺史郭瓊奏部署兵士深入海州賊界是月有狐登明徳樓主者獲之狐毛長而腹下别有二足二月辛已青州奏郭瓊部署兵士自海州迴至當道甲申樞密使郭威巡邊迴丁亥汝州防禦使劉審交卒乙未以前安州節度使劉遂凝為左武衛上將軍以鄜州節度使焦繼勲為左衛上將軍以前永興軍節度使趙贊為左驍衛上將軍三月已亥徐州部送所獲淮南都將李暉等三十三人狥于市給衫㡌放還本土是月鄴都畱守髙行周兖州符彦卿鄆州慕容彦超西京畱守白文珂鎮州武行徳安州楊信潞州常思府州折從阮皆自鎮來朝嘉慶節故也戊午宴羣臣于永福殿帝初舉樂壬戌鄴都髙行周移鎮鄆州兖州符彦卿移鎮青州並加邑封甲子西京畱守白文珂潞州常思鎮州武行徳並進邑封鄆州慕容彦超移鎮兖州夏四月戊辰朔邢州薛懷讓移鎮同州相州郭謹河陽李暉並進邑封庚午府州折從阮移鎮鄧州辛未故深州刺史史萬山贈太傅先是契丹入邊萬山城守郭威遣索萬進率騎七百屯深州一日契丹數千騎廹州東門萬山父子率兵百餘人襲之契丹偽退十餘里而伏兵發萬山血戰急請救於萬進萬進勒兵不出萬山死之遼史世宗紀天禄三年殺深州刺史史萬山契丹亦解去時倫以萬進為罪故加萬山贈典焉壬申華州劉嗣移鎮邢州安州楊信移鎮鄜州貝州王令温移鎮安州並加邑封以鄜州留後王饒為華州節度使以其來朝故也丁丑尚食奉御王紹隠除名流􅀈門島坐匿軍營女口也辛巳以宣徽北院使呉䖍裕為鄭州防禦使時樞密使楊邠上章乞解樞機帝命中使諭之曰樞機之職捨卿用之忽有此章莫有人離間否䖍裕在傍颺言曰樞密重地難以久處俾後來者迭居相公辭讓是也中使還具奏帝不悦故有是命壬午以樞密使郭威鄴都留守依前樞密使詔河北諸州應兵申錢帛糧草一禀郭威處分癸未府州永安軍額宜停命降為團練州戊子翰林學士承㫖户部尚書王仁裕罷職守兵部尚書左千牛上將軍張瓘卒庚寅以西南面水陸轉運使尚書工部侍郎李榖為陳州刺史左金吾上將軍致仕馬萬率甲午以前華州節度使安審信為左衛上將軍以前潞州節度使張從恩為右衛上將軍五月戊戌朔帝御崇元殿受朝丙午以皇弟興元節度使勲為開封尹加兼中書令未出閤甲子詔諸道州府差置散從官大府五百人上州三百人下州二百人勒本處團集管係立節級檢校敎習以警偹州城閏月癸已京師大風雨壊營舍吹鄭門扉起十數歩而墮㧞大木數十震死者六七人水平地餘尺池隍皆溢是月宫中有怪物投瓦石擊忩撼扉人不能制六月庚子以國子祭酒田敏為尚書右丞癸邜太僕卿致仕謝攀卒輟視朝一日鄭州奏河決原武縣界乙邜司天臺上言鎮星逆行至太微左掖門外自戊申年八月十二日入太微西垣犯上將屏星執法勾已往來至已酉年十一月十二日方出左掖門順行自今年正月十日夜復逆行入東垣至右掖門秋七月庚午河陽奏河漲三丈五尺乙亥倉州奏積雨約一丈二尺安州奏溝河泛溢州城内水深七尺丙子帝御崇元殿授皇太后册命宰臣蘓逢吉行禮辛巳三司使奏州縣令録用官請據户籍多少量定俸户縣三千户以上令月十千主簿八千二千户以上令月八千主簿五千二千户以下令月六千主簿四千毎户月出錢五百並以管内中等户充録事㕘軍判司俸錢視州界令佐取其多者給之其俸户與免縣司差役從之八月辛亥以䝉州城隍神為靈感王從湖南請也時海賊攻州人禱於神城得不䧟故有是請辛酉給事中陶榖上言請停五日内殿轉對從之壬戌以兵部侍郎於徳辰為御史中丞邊蔚為兵部侍郎九月辛巳朗州節度使馬希蕚奏請於京師别置邸院不允是時希蕚與其弟湖南節度使希廣方搆䦧墻之怨故有是請帝以湖南巳有邸務不可更置由是不允仍命降詔和解焉冬十月已亥帝狩於近郊丙午湖南馬希廣遣使上章且言荆南淮南廣南三道結搆欲分割湖湘乞聊𤼵兵師以為援助時朝廷方議起軍㑹内難不果行丁未兩浙錢𢎞俶加諸道兵馬元帥戊申彰德軍節度使郭謹卒癸丑以前同州節度使張彦贇為相州節度使辛酉月犯心大星十一月甲子朔日有蝕之乙丑永州唐將軍嗣贈太保從湖南請也已巳日南至帝御崇元殿受朝賀仗衛如式辛未詔侍衛歩軍都指揮使王殷將兵屯澶州丙子誅樞密使楊邠侍衛都指揮使史𢎞肇三司使王章夷其族是日平旦甲士數十人由廣政殿出至東廡下害邠等於閣内死於亂刄之下又誅𢎞肇弟小底軍都虞侯𢎞朗如京使甄彦竒内常侍辛從審楊邠子比部員外郎廷偘右衛將軍廷偉左贊善大夫廷倚王章姪右領衛將軍旻子婿户部員外郎張昭蕭樞密院副承宣郭顒控鶴都虞侯髙進侍衛都承局荆南金三司都勾官柴訓等分兵収補邠等家屬及部曲傔從盡戮之少頃樞密承㫖聶文進急召宰臣百寮班於崇元殿庭宣曰楊邠史𢎞肇王章等同謀叛逆欲危宗社並斬之與卿等同慶班退召諸軍將校至萬歳殿帝親諭史𢎞肇等欲謀逆亂之狀且言𢎞肇等欺朕年㓜專權擅命使汝輩常懐憂恐自此朕自與汝等為主必無横憂也諸軍將校拜謝而退召前任節度使刺史統軍等上殿諭之帝遣軍士守捉宫城諸門比近日旰朝臣歩出宫門而去是日晴霽無雲而昏霧濛濛有如㣲雨人情惴恐日將午載楊邠等十餘尸分暴於南北市是日帝遣腹心賫密詔往澶州鄴都令澶州節度使李洪義誅侍衛歩軍都指揮使王殷令鄴都屯駐䕶聖左廂都指揮使郭崇奉國法廂都指揮使曹英害樞密使郭威及宣徽使王峻急詔揮州高行周青州符彦卿永興郭從義兖州慕容彦超同州蒒懐讓鄭州呉䖍裕陳州李榖等赴闕以宰臣蘓逢吉權知樞密院事前青州劉銖權知開封府事衛馬軍都指揮使李洪建判侍衛司事内客省使閻晉卿權侍衛馬軍都指揮使丁丑澶州節度使李洪義受得密詔知事不克乃引使人見王殷殷與洪義遣本州副使陳光穗賫所受密詔馳至鄴都宋史少帝遣供奉官孟業齎密詔令洪義殺王殷洪義素怯懦慮殷覺遷延不敢𤼵遽引業見殷殷乃錮業送密詔於周祖郭威得之即召王峻郭崇曹英及諸軍將校至牙署視詔兼告楊史諸公􅁈枉之狀且曰汝等當奉行詔㫖㫁予首以報天子自収功名郭崇等與諸將校前曰此事必非聖意即是李業等竊𤼵假如此輩便握權柄固得安乎事可陳論何須自棄致千載之下被此惡名崇等闕從公入朝面自洗雪於是將校等請威入朝以除君側之惡共安天下東都事畧漢隠帝遣使害太祖魏仁浦曰公有大功於朝廷握强兵臨重鎮以䜛見疑豈可坐而待斃教以易其語云又誅將士以激怒衆心太祖納其言翌日郭威以衆南行戊寅鄴兵至澶州庚辰至滑州節度使宋延渥開門迎降是日詔前開封尹侯益前鄜州節度使張彦超權侍衛馬軍都指揮使閻晉卿鄭州防禦使呉䖍裕等率禁軍赴澶州守捉辛巳帝之小􅆆驡脱自北廻先是帝遣驡脱偵鄴軍所至為㳺騎所獲郭威即遣廻因令附奏赴闕之意仍以密奏藏驡脱衣領中帝覧奏即召李業示之聶文進郭允明在傍懼形於色初議車駕幸澶州及聞鄴兵已至河上乃止帝大懼私謂宰臣竇貞固等曰昨來之事太草草耳李業等請帝傾府庫以給諸軍宰相蘓禹珪以為未可業拜禹珪於帝前曰相公且為官家莫惜府庫遂下令侍衛軍人給二十緡下軍各給十緡其北來將士亦凖此仍遣北來將士在營子弟各賫家問向北諭之壬午鄴軍至封丘慕容彦超自鎮馳至帝逐以軍旅之事委之宋史侯益傳云周太祖起兵隠帝議出師禦之益獻計曰王者無敵於天下兵不宜輕出况大明戍卒家屬盡在京城不如閉闗以挫其脱遣其母妻𤼵降以詔之可不戰而定慕容彦超以為益衰老作儒夫計沮之彦超謂帝曰陛下勿憂臣當生致其魁首彦超退見聶文進詢北來兵數彦超懼曰大是劇賊不宜輕耳又遣袁㠖劉重進王知則等出師以繼前軍慕容彦超以大軍駐於七里郊掘塹以自衛都下率坊市出酒食以餉軍癸未車駕勞軍即日還宫翌日慕容彦超掦言曰官家宫中無事明日再出觀臣破賊甲申車復出幸七里店軍營王師陣於劉子陂與鄴軍相望太后以帝至晚在外遣中使謂聶文進曰賊軍在近大須用意文進曰有臣在必不失䇿縱有一百箇郭威亦當生擒之耳彦超輕脱先擊北軍郭威命何福進王彦超李筠等大合騎以乗之彦超退卻死者百餘人於是諸軍奪氣稍稍奔於北軍呉䖍裕張彦超等相繼而去慕容彦超以部下十數騎奔兖州是夜帝與宰臣從官宿於野次侯益焦繼勲潛奔鄴軍乙酉旦帝䇿馬至𤣥化門劉銖在門上問帝左右兵馬何在乃射左右帝廻與蘓逢吉郭允明詣西北村舍郭允明知事不濟乃剚刃於帝而崩時年二十蘓逢吉郭允明皆自殺是日周太祖自迎春門入諸軍大掠煙火四𤼵翌日至晡方定前滑州節度使白筠再為亂兵所害吏部侍郎張允墜屋而死周太祖既入京城命有司遷帝梓平於太平宫或曰可依魏髙貴卿公故事以公禮葬之周祖曰予顛沛之中不能䕶衛至尊以至於此若又貶降人謂我何於是詔擇日舉哀命前宗卿劉臯主喪丙戌太后誥曰髙祖皇帝翦亂除兇變家為國救生靈於塗炭創王業於艱難甫定寰區遽遺弓劎樞密使郭威楊邠侍衛使史𢎞肇三司使王章親承顧命輔立少君恊力同心安邦定國旋屬四方多事三叛連銜呉蜀内侵契丹啟釁蒸黎兇懼宗社阽危郭威授任專徴提戈進討躬當矢石盡掃煙塵外㓂盪平中原寧謐復以强敵未殄邉塞多艱允賴寳臣往臨大鄴彊塲有藩籬之固朝廷寛宵旰之憂不謂兇堅連謀羣小得志密藏鋒刄竊𤼵殿庭已殺害其忠良方奏聞於少主無辜受戮有口稱􅁈而又潛差使臣矯賫宣命謀害樞密使郭威宣徽使王峻侍衛歩軍都指揮使王殷等人知無罪天不助奸今者郭威王峻澶州節度使李洪義前州方禦使何福進前福州防禦使王彦超前博州刺史李筠北面營行馬歩都指揮使郭崇歩軍都指揮使曹英䕶聖都指揮使白重贊索萬進田景咸樊愛能李萬全史彦超奉國都指揮使張鐸王暉胡立弩手指揮使何贇等徑領兵師來安社稷逆黨皇城使李業内客省使閻晉卿樞密都承㫖聶文進飛龍使後贊翰林茶酒使郭允明等脅君於大内出戰於近郊及至窮力遂行弑逆􅁈憤之極今古未聞今則兇黨既除羣情共悦神噐不可以無主萬機不可以久曠宜擇賢君以安天下河東節度使崇許州節度使信皆髙祖之弟徐州節度使贇開封尹承勲髙祖之男俱列盤維皆居屏翰宜令文武百官議擇嗣君以成大統云樞密使郭威以蕭墻變起宗祏無奉率羣臣候大后請定所立且言開封尹承勲髙祖皇帝之愛子也請立為嗣太后告以承勲嬴病日久不能自舉周太祖與諸将請視承勲起居及視之方信遂議立髙祖從子徐州節度使贇為嗣已丑大后誥曰天未悔禍䘮亂宏多嗣王㓜冲羣兇蔽惑搆奸謀於造次縱毒蠆於斯須将相大臣連頸受戮股肱良佐無罪見屠行路咨嗟羣心扼腕則髙祖之洪烈將墜於地頼大臣郭威等激掦忠義拯濟顛危除惡蔓以無遺俾綴旒之不絶宗祧事重纘繼才難既聞将相之謀復考蓍龜之兆天人協贊社稷是依徐州節度使贇禀上聖之資抱中和之德先皇如子鍾愛特深固可以子育兆民君臨萬國宜令所司擇日備法駕奉迎即皇帝位於戯神􅄊至重天歩方艱致理保邦不可以不敬貽謀聽政不可以不勤允執厥中袛膺景命是日遣前太師馮道等徃徐奉迎周太祖以嗣君未至萬機不可暫曠率羣臣請太后臨朝誥曰曰昨以奸邪搆釁亂我邦家勲徳効忠剪除兇慝俯從人欲巳立嗣君宗社危而再安紀綱壊而復振皇帝法駕未至庶事方殷百辟上言請予莅政宜允輿議權總萬機止於浹旬即復明辟云按前代故事太上皇稱誥太皇太后皇太后曰令今云誥有司誤也以宣徽南院使王峻為樞密使右神武充軍袁㠖為宣徽南院使陳州刺史李榖權判三司歩軍都指揮使王殷為侍衛親軍馬歩都指揮使䕶聖左廂都指揮使郭崇為侍衛馬軍都統揮奉國左廂都指揮使曹英為侍衛歩軍都指揮使鎮州邢州馳奏契丹㓂洺州䧟内丘縣時丹契永康王烏裕率部旋兩道入邊内丘城小而固契丹攻之五日不下敵人傷者甚衆時有官軍五百在城防戍攻急官軍降於敵屠其城而去遼史宗紀十月自將南代攻而下安平内丘束鹿等城大獲還庚寅樞密使郭威奏左軍巡勘得飛龍使後贊欵伏與蘓逢吉李業閻晉卿聶文進郭允明等同謀令散員都虞侯奔徳等下手殺害史𢎞等肇等權開封伊劉銖具伏明附李業為亂屠害将相家屬其劉銖等凖誥㫖處置訖并蘇逄吉郭允明閻晉卿聶文進首級並梟於南北市其骨肉故棄辛邜河北諸州馳報契丹深入太后誥曰王室多故邊境未寧内難雖平外㓂仍熾據北面奏報强敵奔衝􅁇𤼵兵師未聞平殄須勞上将暫自臨戎宜令樞密使郭威部署大軍早謀掩擊其軍國庶事權委宰臣竇貞固蘓禹珪樞密使王峻等啇量施行在京馬歩兵士委王殷都大提舉十二月甲午朔郭威領大軍北徴丁酉以翰林學士尚書户部侍郎知制誥范質為樞密副使東都事畧周太祖徴李手貞每朝廷遣使齎詔處分軍事皆中機㑹太祖問誰為此辭使者以范質封太祖曰宰相噐也太祖起兵入京師遽令草太后誥及議迎湘隠公儀注乃白太后以質為兵部侍郎樞密副使陜州李洪信奏馬歩都指揮使聶召奉國指揮使楊德䕶聖指揮使庸審澄等與節度使判官路濤掌書記張洞都押衙門紹勍等同情謀叛並殺之惟康審澄夜中放火斬闗奔歸京師初朝議以諸道方鎮皆是勲臣不諳政理其都押衙孔目官令三司軍將内選才補之藩帥不悅故洪信因朝廷多故誣奏加害焉壬寅湖南上言郎州馬希蕚引五谿蠻及淮南洪州軍來攻當道望量差兵士於淮境牽引乙巳遣前淄州刺史陳恩讓領軍入淮南界以便進宜進取辛亥遣宰相蘇禹珪及朝臣十員往宋州迎奉嗣君壬子樞密使郭威次澶州何福進已下及諸軍将士扶擁威請為天子即日南還威上章於太后言為諸軍所迫班師庚申威至北郊駐軍於臯門村許州巡檢前申州刺史馬鐸奉節度使劉信自殺壬戌奉太后誥命樞密使侍中郭威監國中外庶事並取監國處分先是樞密使王峻以湘隂公已在宋州慮聞澶州之事左右變生遣侍衛馬軍指揮使郭崇率七百騎往衛之東都事畧郭崇傳王峻遣崇率七百騎拒贇遇於睢陽崇曰澶州兵變遣崇來衞乘輿非有他也具言軍情有屬天命已定贇執崇手而泣崇即送贇就館已未太后誥曰比者樞密使郭威志安社稷議立長君以徐州節度使贇髙祖近親立為漢嗣爰自藩鎮徴赴京師雖誥命尋行而軍情不附天道在北人心靡東適當改卜之初俾膺分土之命贇可降授開府儀同三司檢校太師上柱國封湘隂公食邑三千户食實封五百户明年正月丁邜大后誥奉符寳於監國可即皇帝位周太祖踐阼奉太后為母遷於西宫上尊號曰昭聖太后是月十五日周太祖與百寮詣帝殯宫成服親奠不視朝七日又詔太常定諡曰隠以年八月二日復遣前宗正卿之劉皥䕶靈輴備儀仗塟於許州陽翟縣之穎陵附神主於髙祖之寢宫帝姿貌白晳眉目疎朗未即位時目多閃掣唾洟不止即位之始遽無此比及内難將作復如故帝自闗西平定之後稍自驕易然畏憚大臣未至縱恣嘗因乾象差忒宫中或有怪異召司天監趙延又訊其休咎延乂對以修德即無患既退遣中使就問延乂曰何者為德延又勸讀貞觀政要邇後與聶文進郭允明後贊狎習信其邪説以至於敗髙祖之徴鄴城也一旦帝語太祖曰我夜來夣爾為驢負我升天既捨爾俄變為龍捨我南去是何祥周太祖撫掌而笑冥符肸蠁豈偶然哉史成曰隠帝以尚幼之年嗣新造之業受命之主徳非禹湯輔政之臣復非伊吕將欲保延洪之軍守不㧞之基固不可得也然西摧三叛雖僅滅於攙搶而内稔羣􅇯俄自取於狼狽自古覆宗絶祀之速者未有如帝之甚也噫蓋人謀之弗臧非天命之遽奪也舊五代史巻一百三
