body:
  text: 舊五代史巻六十九攷證唐列𫝊二十一張憲𫝊上怒戒有司速治行宫之庭礙事者畢去竟毁即位壇案歐陽史作場未成莊宗怒命兩虞候亟毁壇以為場與是書異通鑑從歐陽史李存渥自洛陽至案存渥歐陽使作永王存霸考唐家人𫝊存渥與劉皇后同奔至風谷為部下所殺是存渥未至太原其至太原者存霸也是𫝊作存渥疑誤孟鵠𫝊鵠自租庸勾官擢為客省副使租庸勾官北夢瑣言作三司勾押官劉延皓𫝊父茂成案歐陽史作茂威延皓即劉后之弟也案通鑑攷異引廢帝實録以延皓為劉后之姪與是書異歐陽史通鑑俱從是書出為鄴都留守案歐陽史作天雄軍節度使劉延朗𫝊清泰初除宣徽北院使案歐陽史廢帝既立以延朗為莊宅使舊五代史巻六十九攷證
