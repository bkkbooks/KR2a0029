body:
  text: 舊五代史巻十四攷證梁列𫝊四羅紹威𫝊其後𢎞信封臨清王案舊唐書𢎞信先封豫章郡公進封北平王與是書異自田氏以後垂二百年案呉縝歐陽史纂誤云魏博自田承嗣專據至羅紹威時共一百五十餘年歐陽史作二百年誤盖歐陽史仍是書之誤也太祖自内黄馳至鄴至鄴原本作至葉據歐陽史改正嵗漕百萬石以給宿衛太祖深然之案通鑑攷異引梁功臣𫝊云紹威馳簡獻替意互合者十得五六太祖嘆曰竭忠力一人而已又引莊宗實録曰紹威隂有覆温之志而賂温益厚温怪其曲事慮蓄奸謀而莫之察乃賜紹威妓妾數人未半嵗召還以此得其隂事其紀載互異如此竊謂紹威有謀慮得梁王信任宜也然以梁主雄險而紹威又因盡誅牙軍有自弱之悔則此時猜忌諒亦有之未可偏廢其説趙犨𫝊父叔文案叔文原本訛叔义今據新唐書改正王僊芝起于曹濮僊芝原本作僊茈今據新舊唐書改正文德元年文德原本作大德今改正充大内皇墻使皇墻原本作皇城考五代㑹要梁時避諱改皇城使為皇墻使今改正趙昶𫝊假寐于闉闍闉闍原本作閫闍今改正時宗權未滅案上篇趙犨傳云蔡州平以犨為忠武軍節度使据此傳則昶為忠武節度使宗權二𫝊互異趙珝𫝊珝犨季弟也案新唐書以珝為犨子是書及歐陽史通鑑皆以珝為犨弟新唐書應訛王珂𫝊小字忠兒忠兒舊唐書作蟲兒令何絪守晉州何絪原本作何緯今據通鑑改正舊五代史巻十四攷證
