body:
  text: 舊五代史巻二十三攷證梁列傳十三劉鄩𫝊朝廷命崔安潛鎮青州安潛原本訛守潛今據新唐書改正太祖命大將葛從周攻之大將葛從周金華子作兖帥張姓疑𫝊聞之誤鄩即出城聽命案劉鄩叛附於梁新唐書昭宗紀作十月丁丑與是書作十一月異以為有李英公之風英公原本訛殷公攷新唐書李勣封英國公今改正殺獲甚衆晉王僅以身免案通鑑作晉王帥騎馳突所向披靡自午至申乃得出亡其七騎與此云僅以身免異葢當時梁唐二史各有夸張掩飾故所紀不同如此逼令飲酖而卒按通鑑攷異引莊宗實録作憂恚發病卒賀瓌傳張筠破涇鳯之衆三萬張筠原本訛張節令據通鑑攷異改正别將侯温裕等侯温裕玉堂閒話作侯温疑𫝊聞之異舊五代史巻二十三攷證
