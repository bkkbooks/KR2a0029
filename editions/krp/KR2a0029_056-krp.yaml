body:
  text: 舊五代史巻二十七攷證唐莊宗紀一及武皇之討王行瑜帝時年十一案歐陽史從是書作十一吳縝纂誤據徐無黨注莊宗年四十三逆推之當以甲辰年生乾寧二年破王行瑜時當云年十二今考五代㑹要莊宗以光啟元年生年四十二北夢瑣言載莊宗獻王行瑜㨗年十一與薛歐二史俱同徐注作年四十三誤汴將氏叔琮康懐英案懐英本名懐貞後因避梁末帝諱始改名懐英是書前後統作懐英今仍其舊周徳威宿兵于亂柳亂柳原本作亂楊攷歐陽史作亂柳胡三省通鑑注云亂柳在潞州屯留縣界今改正以并汾九州歸附于梁案并汾九州通鑑作河東九州胡三省注云河東領并遼沁汾石忻代嵐憲九州附識于此承業曰臣受命先王案先王原本作先帝攷晉王嗣位之初武皇尚未追稱為帝今改正二月壬戌壬戌原本作丙戌今據通鑑改正至潞州北黄碾下營黄碾原本作黄􅀈通鑑作黄碾胡三省注云黄碾村在潞州潞城縣今改正初唐龍紀元年帝纔五嵗案歐陽史克用破孟方立于邢州還軍上黨置酒三垂岡時莊宗在側方五歲攷克用邢州之役在文徳元年今以莊宗生年計之當從是書作龍紀元年周徳威乘勝攻澤州刺史王班登城拒守案通鑑攷異引莊宗列𫝊云李存璋進攻澤州刺史王班棄城而去與是書異徳威乃退保隰州案通鑑作周徳威等聞梁帝將至乙未退保隰州是徳威之退師因梁祖之親至也是書不載距柏鄉五里五里原本作七里今據歐陽史及通鑑改正梁軍以五百人争橋競案通鑑作梁軍横亘數里競前奪橋鎮定步兵禦之勢不能支與此㣲異率親軍屯白馬坡白馬坡通鑑作白馬阪並六鎮書六鎮原本作大鎮今據通鑑改正十一月辛丑燕人侵易定案通鑑作戊申燕主守光將兵二萬冦易定是書作辛丑與通鑑異舊五代史巻二十七攷證
