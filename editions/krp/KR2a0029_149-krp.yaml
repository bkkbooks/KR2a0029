body:
  text: 舊五代史巻七十四攷證唐列𫝊二十六朱守殷傳車駕將廵幸外議諠然初以為平呉又云制置東諸侯守殷乃生雲夢之疑遂殺都校馬彦超副使宗敬守殷驅市人閉壁以叛明宗途㳄京水聞之親統禁軍倍程直􅔰其壘長圍夾攻縋城甚衆守殷力屈盡殺其族引頸令左右盡其命案儒林公議云朱守殷與霍彦威同立明宗尋判諸軍事兼河南伊旋除宣武軍節度使時樞密使安重誨用事汴之財利遣中人宄權之守殷軍用不給累表杭論重謁既而復奪之守殷不平頗出怨言重誨奏其反收明宗親率師討之車駕至汴京守殷自以本無不臣之意為權臣誣奏登明門望明宗叩頭號哭稱寃明宗思其功許以開門自親重誨已麾軍登陴勢不可遏城䧟誅之攷守殷之叛歐陽史通鑑與是書無異辭而儒林公議以為守殷本無反心為重誨所䧟葢傳聞之互異也楊立傳有詔以潞兵三萬人戍涿州案通鑑作發安議兵三十戍涿州命明宗與李紹真攻討李紹真通鑑作李紹榮舊五代史巻七十二攷證
