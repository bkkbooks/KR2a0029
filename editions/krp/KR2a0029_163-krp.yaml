body:
  text: 舊五代史巻八十一攷證晉少帝紀一命瑯琊王震案歐陽史作博士王震遣判四方館事朱崇節案歐陽史作四方館使宋崇節恒州順國軍節度使杜威案杜重威避少帝諱去重字至漢始復故少帝紀皆作杜威乙丑至東京案遼史作丁未晉王至汴與是書異五代春秋歐陽史通鑑並從是書河南河北闗西諸州旱蝗分命使臣捕之案歐陽史作供奉官張福率威順軍捕蝗于陳州仍遣諸司使梁進超等七人分往開封府界捕之案歐陽史作癸亥供奉官七人率奉國軍捕蝗于京畿與是書異辛未遣内外臣寮二十八人分往諸道州府率借粟麥案通鑑七月己丑詔以年饑國用不足遣使者六十餘人于諸道括民穀與是書異舊五代史巻八十一攷證
