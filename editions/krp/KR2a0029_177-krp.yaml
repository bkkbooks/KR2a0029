body:
  text: 舊五代史巻八十八攷證晉列傳三景延廣傳契丹㢠廻國使喬榮榮歐陽史作瑩廻國使通鑑作廻圖契丹國志仍從是書作廻國時延廣顧慮其家未能引决案宋史昝居潤傳晉室將亡景延廣委其族自洛赴難與是書異詔贈中書令案歐陽史作贈侍中張希崇𫝊守光敗唐莊宗命周徳威鎮其地希崇以舊籍列于麾下尋遣率偏師守平州案歐陽史作劉守光不喜儒士希崇因事軍中為偏將將兵守平州是守光未敗即守平州非為德威所遣也與是書異希崇遂以管内生口二萬餘南歸案遼史天顕元年七月盧龍行軍司馬張崇叛奔唐疑希崇在遼祗名崇歸唐後始加希字也然希崇歸唐在遼太宗時而遼史繫于太祖紀又希崇本繼盧文勝而遼史書其降在盧國用歸唐之前年月皆舛誤及髙祖入洛與契丹方有要盟慮為其所取乃復除靈武案通鑑作帝與契丹修好慮其復取靈武王庭𦙍傳累厯貝忻宻澶隰相六州刺史案歐陽史不載相州李從璋傳二年五月遷河中節度使三年就加檢校太傅案從璋為河中節度以代安重誨也五代史闕文從璋見重誨拜于庭下重誨驚曰太傅過禮㨜此傳從璋至三年始檢校太傅徙鎮河中時不應先稱為太傅案巴堅舊作阿保機今改舊五代史巻八十八攷證
