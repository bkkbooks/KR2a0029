body:
  text: 舊五代史六十六攷證唐列𫝊十八安重誨𫝊無何有吏人李䖍徽弟掦言于衆云案歐陽史作樞宻承㫖李䖍徽語其客邉彦温云所載詞異朱𢎞昭𫝊敬瑭聞其言即日燒營遁還重誨聞之不敢西行案歐陽史作敬瑭以糧餉不繼遽燒營還軍重誨亦以被讒召還朱洪實𫝊洪實歐陽史作𢎞實疑薛史避宣祖諱故改𢎞作洪攷通鑑朱𢎞昭上一字犯宣祖諱洪實本未嘗犯諱也今仍是書原文康義誠𫝊鎮邠州刺史邠州歐陽史作汾州藥彦稠𫝊充河中副招討使案歐陽史作招討使舊五代史巻六十六攷證
