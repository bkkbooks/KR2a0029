body:
  text: 舊五代史巻五十一宋門下侍郎參知政事監修國史薛居正等撰唐書第二十七宗室列𫝊三永王存霸武皇子莊宗第二弟同光三年封莊宗敗為軍卒所殺歐陽史云存霸歴昭義天平河中三軍節度使居京師食俸禄而已趙在禮反乃遣存霸于河中莊宗再幸氾水徙存霸北京留守通鑑云李紹榮欲奔河中就永王存霸従兵稍散存霸亦率衆千人棄鎮奔晉陽又云存霸至晉陽従兵逃㪚俱盡存霸削髪僧服謁李彥超願為山僧幸垂庇䕶軍士爭欲殺之彥超曰六相公來當奏取進止軍士不聽殺之于府門之碑下邕王存美武皇子莊宗第三弟同光三年封莊宗敗不知所終通鑑云存美以病風偏枯得免居于晉陽薛王存禮武皇子同光三年封莊宗敗不知所終申王存渥莊宗第四弟歐陽史存渥與存霸存紀皆莊宗同母弟同光三年封莊宗敗與劉皇后同奔太原為部下所殺通鑑云存渥至晉陽李彥超不納走至風谷為其下所殺睦王存乂莊宗第五弟同光三年封案以下原闕歴鄜州刺史後以郭崇韜壻為莊宗所殺北夢瑣言云莊宗異母弟存乂以郭崇韜女壻伏誅先是郭崇韜既誅之後朝野駭惋議論紛然莊宗令閹人察訪外事言存乂于諸將坐上訴郭氏之無罪其言怨望又于妖術人楊千郎家飲酒聚㑹攘臂而泣楊千郎者魏州賤民自言得墨子術于婦翁能役使隂物帽下召食物果實之類又蒱博必勝人有拳握之物以法必取又説煉丹乾永易人形破扄鐍貴要間神奇之官至尚書郎賜紫其妻出入宫禁承恩用事皇弟存乂常朋淫于其家至是與存乂並罹其禍通王存確莊宗第六弟雅王存紀莊宗第七弟同光三年封莊宗敗並為霍彥威所殺梁紀太祖有子廷鸞落落盧文進𫝊莊宗又有弟存矩今宗室𫝊皆不載魏王繼岌莊宗子也莊宗即位于魏州以繼岌充北都留守及以鎮州為北都又命為留守五代㑹要三年九月二十三日封為魏王三年伐蜀以繼岌為都統郭崇韜為招討使十月戊寅至鳯州武興軍節度使王承捷以鳯興文扶四州降甲申至故鎮康延孝收興州時偽蜀主王衍率親軍五萬在利州令步騎親軍三萬逆戰于三泉康延孝李嚴以勁騎三千犯之蜀軍大敗斬首五千級餘皆奔潰王衍聞其敗也棄利州奔歸西川斷吉柏津浮梁而去己丑繼岌至興州偽蜀東川節度使宋光葆以梓潼劔龍普等州來降武定軍節度使王承肇以洋蓬壁三州符印降興元節度使王宗威以梁開通渠麟等五州符印送降階州王承岳納符印秦州節度使王承休棄城而遁辛丑繼岌過利州戊申至劔州乙酉至錦州王衍遣使上牋乞降丁巳入成都自興師出洛至定蜀計七十五日走丸之勢前代所無師回至渭南聞莊宗敗師徒潰散自縊死太平廣記引王氏見聞録云魏王繼岌伐蜀迴軍在道而有鄴都之變莊宗與劉后命内臣張漢賓齎急詔所在催魏王歸闕張漢賓乘馹倍道急行至興元西縣逢魏王宣𫝊詔㫖王以本軍方討漢川康延孝相次繼來欲候之出山以陳凱歌漢賓督之有軍謀陳岷比事梁與漢賓熟密問張曰天子改換且是何人張色莊曰我當面奉宣詔魏王況大軍在行談何容易陳岷曰久忝知聞故敢諮問兩日來有一信風新人已即位矣復何形迹張乃説來時問李嗣源過河未知近事岷曰魏王且請盤桓以觀其勢未可前邁張以莊宗命嚴不敢遷延督令進發魏王至渭南遇害矣繼湩繼嵩繼蟾繼嶢並莊宗子同光三年拜光禄大夫檢校司徒未封莊宗敗並不知所終清異録唐福慶公主下降孟知祥長興四年明宗晏駕唐室亂莊宗諸兒削髪為苾蒭間道走蜀時知祥新稱帝為公主厚待猶子賜予千計従審明宗長子性忠勇沈厚摧堅陷陣人罕偕焉從莊宗于河上累有戰功莊宗器賞之用為金槍指揮使明宗在魏府為軍士所逼莊宗詔従審曰爾父于國有大功忠孝之心朕自明信今為亂兵所刼爾宜自去宣朕㫖無令有疑従審行至中途為元行欽所制復與歸洛下莊宗改其名為繼璟以為己子命再往従審固執不行願死于御前以明丹赤従莊宗赴汴州明宗之親舊多䇿馬而去左右或勸従審令自脱終無行意尋為元行欽所殺天成初贈太保秦王従榮明宗第二子也明宗踐阼天成初授鄴都留守天雄軍節度使三年移北京留守充河東節度使四年入為河南尹一日明宗謂安重誨曰近聞従榮左右有詐宣朕㫖令勿接儒生儒生多懦恐鈍志相染朕方知之頗駭其事余比以従榮方幼出臨大藩故選儒雅賴其禆佐今聞此姦憸之言豈朕之所望也鞫其言者将戮之重誨曰若遽行刑又慮賓従難處且望嚴誡遂止従榮為詩與従事髙輦等更相唱和自謂章句獨步于一時有詩千餘首號曰紫府集長興中以本官充天下兵馬大元帥従榮乃請以嚴衞捧聖步騎兩指揮為秦府衙兵每入朝以數百騎従行出則張弓挾矢馳騁盈巷既受元帥之命即令其府屬僚佐及四方遊士各試檄淮南書一道陳已將廓清宇内之意初言事者請為親王置師𫝊明宗顧問近臣執政以従榮名勢既隆不敢忤㫖即奏云王官宜委従榮乃奏刑部侍郎劉贊為王傅又奏翰林學士崔棁為元帥府判官明宗曰學士代予詔令不可擬議従榮不悦退謂左右曰既付以元帥之任而阻予請僚佐又未諭制㫖也復奏刑部侍郎任贊従之宋史趙上交𫝊秦王従榮開府兼判軍衞以上交為虞部員外郎充六軍諸衞推官李澣張沆魚崇逺皆白衣在秦府悉與上交友善累遷司封郎中充判官従榮素豪邁不遵禮法好昵羣小上交従容言曰王位尊嚴當修令徳以慰民望王忍為此獨不見恭世子戾太子之事乎従榮怒出之歴涇秦二鎮節度判官從榮及禍僚屬皆坐斥上交由是知名後舉兵犯宫室敗死廢為庶人通鑑明宗紀云己丑大漸秦王従榮入問疾帝俛首不能舉王淑妃曰従榮在此帝不應従榮出聞宫中皆哭従榮意帝已殂明旦稱疾不入是夕帝實小愈而従榮不知従榮自知不為時論所與恐不得為嗣與其黨謀欲以兵入侍先制權臣壬辰従榮自河南府常服将步騎千人陳于天津橋孟漢瓊被甲乗馬召馬軍都指揮使朱洪實使捋五百騎討従榮従榮方據胡床坐橋上遣左右召康義誠端門已閉叩左掖門従門隙窺之見朱洪實引騎兵北來走白徙榮従榮大驚命取鐡掩心擐之坐調弓矢俄而騎兵大至従榮走歸府僚佐皆竄匿牙兵掠嘉善坊潰去従榮與妃劉氏匿牀下皇城使安従益就斬之以其首獻丙申追廢從榮為庶人五代㑹要云清泰元年葬以公禮辟五代史補秦王從榮明宗之愛子好為詩判河南府髙輦為推官輦尤能為詩賓主相遇甚歡自是出入門下者當時名士有若張杭髙文蔚何仲舉之徒莫不分廷抗禮更唱迭和時干戈之後武夫用事睹従榮所為皆不悦于是康知訓等竊議曰秦王好文交逰者多詞客此子若一旦南面則我等轉死溝壑不如早圖之髙輦知其謀因勸秦王托疾此輩須來問候請大王伏壯士出其不意皆斬之庶㡬免禍矣従榮曰至尊在上一旦如此得無危乎輦曰子弄父兵罪當笞爾不然則悔無及矣従榮猶豫不決未㡬及禍髙輦棄市初從榮之敗也髙輦竄于民家且落髪為僧既擒獲知訓以其毁形難認復使巾幘著緋驗其真偽然後用形輦神色自若厲聲曰朱衣纔脱白刃難逃觀者笑之從璨明宗諸子性剛直好客疎財意豁如也天成中為右衞大將軍時安重誨方秉事權従璨亦不之屈重誨常以此忌之明宗幸汴留従璨為大内皇城使一日召賓友于㑹節園酒酣之後戲登于御榻安重誨奏請誅之詔曰皇城使従璨朕巡幸汴州使警大内乃全乖委任但恣遨遊于予行従之園頻恣歌歡之㑹仍施峻法顯辱平人致彼喧譁達於聞聽方當立法固不黨親宜貶授房州司房參軍仍令盡命長興中重誨之得罪也命復舊官仍贈太保許王従益明宗之幼子也宫嬪所生明宗命王淑妃母之嘗謂左右曰唯此兒生于皇宫故尤所鍾愛長興未封許王晉髙祖即位以皇后即其姊也乃養従益于宫中晉天福中以従益為二王後改封郇國公食邑三千户其後與母歸浴陽及開運末契丹主至汴以従益遥領曹州節度使復封許王與王妃尋歸西京㑹契丹主死其汴州節度使蕭翰謀歸北地慮中原無主軍民大亂則已亦不能按轡徐歸矣乃詐稱契丹主命遣人迎従益於洛陽令知南朝軍國事従益與王妃逃于徽陵以避之使者至不得已而赴焉従益于崇元殿見羣官蕭翰率蕃首列拜于殿上羣官趋拜于殿下乃偽署王松為左丞相趙上交為右丞相李式翟光鄴為樞密使王景崇為宣徽使餘官各有署置又以北來燕将劉祚為權侍衞使充在京巡檢翰北歸従益餞于北郊及漢髙祖将離太原従益召髙行周武行徳欲拒漢髙祖行周等不從且奏其事漢髙祖怒車駕将至闕従益與王妃俱賜死于私第時年十七時人哀之五代史闕文漢髙祖自太原起軍建號至洛陽命郭従義先入京師受密㫖殺王淑妃與許王従益淑妃臨刑號泣曰吾家子母何罪吾既為契丹所立非敢與人爭國何不且留吾兒每年寒食使持一盂飯灑明宗陵寢聞者無不泣下重吉末帝長子為控鶴都指揮使閔帝嗣位出為亳州團練使末帝兵起為閔帝所害通鑑云詔遣殿直楚匡祚執亳州李重吉幽于宋州又云遣楚匡祚殺李重吉于宋州匡祚榜捶重吉責其家財清泰元年詔贈太尉仍令宋州選隙地置廟明宗紀閔帝有子重哲授銀青光禄大夫檢校工部尚書歐陽史家人𫝊不𫝊雍王重美末帝第二子清泰三年封晉兵入與末帝俱自焚死通鑑云洛陽自閒兵敗衆心大震居人四出逃竄山谷門者請禁之雍王重美曰國家多難未能為百姓主徒増惡名耳不若聽其自便事寧自還乃出令任従所適衆心差安又云皇后積薪欲燒宫室重美諫曰新天子至必不露居他日重勞民力死而遺怨将安用之乃止史臣曰繼岌以童騃之嵗當統帥之任雖成功于劒外尋求死于渭濱盖運盡天亾非儒子之咎也従審感厚遇之恩無茍免之意死于君側得不謂之忠乎従榮以狂躁之謀賈覆亾之禍謂為大逆則近厚誣従璨為權臣所忌従益為强敵所脅俱不得其死亦良可傷哉重美聽洛民之奔亾止母后之燔熱身雖燼於紅燄言則耀乎青編童年若斯可謂賢矣舊五代史巻五十一
