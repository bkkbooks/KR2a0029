body:
  text: 舊五代史巻五十六攷證唐列𫝊八周徳威𫝊有陳章者以虓勇知名衆謂之夜乂言於叔琮曰晉人所恃者周陽五願擒之請賞以郡案歐陽史作梁軍圍太原令軍中曰能生得周陽五者為刺史與是書微異徳威前軍營横碾横碾莊宗紀作黄展徳威自率精騎擊其兩偏獲賊百餘人賊渡河而退徳威謂莊宗曰賊驕氣充盛宜按兵以待其衰案歐陽史祗載徳威勉諭其衆即告莊宗曰賊兵甚鋭未可與争不載精騎擊退賊兵之事考下文有去賊咫尺限此一渠水云云則賊渡河而退一節紀載殊不可闕徳威遣將擒數十人皆倳刃於背縶而遣之案通鑑從莊宗實録作擒其斥候者數十人斷腕而縱之周侍中已據宗城矣宗城通鑑作臨清考異曰劉鄩見在宗城薛史云周侍中據宗城盖臨清字誤耳符存審傳以功遙領邢洺磁團練使案歐陽史作遷領邢州團練使秋邢州閻寶降授存審安國軍節度案五代㑹要同光元年始改邢州為安國軍据是書此傳則晉人得邢州即改軍額疑㑹要誤也詳見通鑑考異符彦超傳皇弟存霸單騎奔河東與吕鄭謀殺彦超與留守張憲案歐陽史作張憲欲納存霸是書作存霸謀殺張憲彦超兩史紀載微異舊五代史巻五十六攷證
