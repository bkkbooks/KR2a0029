body:
  text: 舊五代史巻十四宋門下侍郎參知政事監修國史薛居正等撰梁書第十四列𫝊四羅紹威舊唐書云紹威字端已魏州貴鄉人父𢎞信本名宗弁初為馬牧監事節度使樂彦貞光啓末彦貞子從訓驕盈太横招聚兵甲欲誅牙軍牙軍怒聚譟攻之從訓出據相州牙軍廢彦貞囚于龍興寺逼令為僧尋殺之推小校趙文建為留後先是𢎞信自言于所居遇一白鬚翁謂之曰爾當為土地主如是者再心竊異之既而文建不洽軍情牙軍聚呼曰孰願為節度使者𢎞信即應曰白鬚翁早以命我可以君長爾曹唐文德元年四月牙軍推𢎞信為留後朝廷聞之即正授節旄乾寧中太祖急攻兖鄆朱瑄求援于太原時李克用遣大將李存信率師赴之假道于魏屯于莘縣存信御軍無法稍侵魏之芻牧𢎞信不平之太祖因遣使謂𢎞信曰太原志吞河朔逥戈之日貴道堪憂𢎞信懼乃歸欵于太祖仍出師三萬攻李存信敗之未幾李克用領兵攻魏營于觀音門外屬邑多拔太祖遣葛從周援之戰于洹水擒克用男落落以獻太祖令送于𢎞信斬之晉軍乃退是時太祖方圖兖鄆慮𢎞信離貳每嵗時賂遺必卑辭厚禮𢎞信每有答貺太祖必對魏使北面拜而受之曰六兄比予有倍年之長兄弟之國安得以常隣遇之故𢎞信以為厚已其後𢎞信累官至檢校太尉封臨清王光化元年八月薨于位紹威襲父位為留後舊唐書云紹威自文徳初授左散騎常侍充天雄軍節度副使自龍紀至乾寧十年之中累加官爵朝廷因而命之尋正授旄鉞累加檢校太尉兼侍中封長沙郡王昭宗東遷命諸道修洛邑紹威獨營太廟制加守侍中進封鄴王初至德中田承嗣盜據相魏澶博衛貝等六州召募軍中子弟置之部下號曰牙軍皆豐給厚賜不勝驕寵年代寖逺父子相襲親黨膠固其凶戾者强賈豪奪踰法犯令長吏不能禁變易主帥有同兒戱自田氏以後垂二百年主帥廢置出于其手如史憲誠何全皥韓君雄樂彦貞皆為其所立優奬小不如意則舉族被誅紹威懲其往弊雖以貨賂姑息而心銜之紹威嗣世之明年正月幽州劉仁恭擁兵十萬謀亂河朔進陷貝州長驅攻魏紹威求援于太祖太祖遣李思安援之屯于洹水葛從周自邢洺引軍入魏州燕將劉守文單可及與王師戰于内黄大敗之乗勝追躡㑹從周亦出軍掩擊又敗燕軍斬首三萬餘級三年紹威遣使㑹軍同攻滄州以報之自是紹威感太祖援助之恩深加景附紹威見唐祚衰凌羣雄交亂太祖兵强天下知必有禪代之志故傾心附結賛成其事每慮牙軍變易心不自安天祐初州城地無故自陷俄而小校李公佺謀變紹威愈懼乃定計圖牙軍遣使告太祖求為外援太祖許之遣李思安㑹魏博軍再攻滄州先是安陽公主薨于魏太祖因之遣長直軍校馬嗣勲選兵千人伏兵仗于巨橐中肩舁以入魏州言助女𦵏事天祐三年正月五日太祖親率大軍濟河聲言視行營于滄景牙軍頗疑其事是月十六日紹威率奴客數百與嗣勲同攻之時宿于牙城者千餘人遲明盡誅之凡八千家皆赤其族州城為之一空翼日太祖自内黄馳至鄴時魏軍二萬方與王師同圍滄州聞城中有變乃擁大將史仁遇保于髙唐六州之内皆為勍敵太祖遣諸將分討之半嵗方平自是紹威雖除其偪然尋有自弱之悔不數月復有孚陽之役紹威飛輓饋運自鄴至長蘆五百里疊跡重軌不絶于路又于魏州建元帥府署沿道置亭候供牲牢酒備軍幕什器上下數十萬人一無闕者及太祖逥自長蘆復過魏州紹威乗間謂太祖曰邠岐太原終有狂譎之志各以興復唐室為詞王宜自取神器以絶人望天與不取古人所非太祖深感之及登極加守太傅兼中書令賜號扶天啓運竭節功臣車駕將入洛奉詔重修五鳳樓朝元殿巨木良匠非當時所有倐架于地泝流西立于舊址之上張設綈繡皆有副焉太祖甚喜以寳帶名馬賜之先是河朔三鎮司管鑰備洒掃皆有閹人紹威曰此類皆宫禁指使豈人臣家所宜畜也因搜獲三十餘輩盡以來獻太祖嘉之開平中加守太師兼中書令邑萬户紹威甞以臨淄海岱罷兵嵗久儲庾山積惟京師軍民多而食益寡願于太行伐木下安陽淇門斵船三百艘置水運自大河入洛口嵗漕百萬石以給宿衛太祖深然之㑹紹威遘疾革遣使上章乞骸骨太祖撫案動容顧使者曰亟行語而主為我强飯如有不可諱當世世貴爾子孫以相報也仍命其子周翰監總軍府及訃至輟朝三日冊贈尚書令紹威在鎮凡十七年年三十四薨紹威形貌魁偉有英傑氣攻筆札曉音律性復精悍明敏服膺儒術明達吏理好招延文士聚書萬巻開學館置書樓每歌酒宴㑹與賓佐賦詩頗有情致太平廣記引羅紹威𫝊云當時藩牧之中最獲文章之譽每命幕客作四方書檄小不稱意壊裂抵棄自孹牋起草下筆成文雖無藻麗之風幕客多所不及江東人羅隠者佐錢鏐軍幕有詩名于天下紹威遣使賂遺叙南巷之敬隠乃聚其所為詩投寄之紹威酷嗜其作因目已之所為曰偷江東集至今鄴中人士諷詠之紹威甞有公讌詩云簾前澹泊雲頭日座上蕭騷雨脚風雖深于詩者亦所歎伏紹威子三人長曰廷規位至司農卿尚太祖女安陽公主又尚金華公主早卒次曰周翰繼為魏博節度使通鑑攷異引梁功臣𫝊六周翰起復雲麾將軍充天雄軍節度留後尋檢校司徒正授魏博節度使亦早卒季曰周敬厯滑州節度使别有𫝊開平四年夏詔金華公主出家為尼居于宋州𤣥静寺盖太祖推恩于羅氏令終其婦節也五代史補云羅鄴王紹威俊邁有詞學尤好戲判常有人向官街中鞴驢置鞍于地值牛車過急行碾破其鞍驢主怒毆駕車者為廂司所擒紹威更不按問遂判其狀云鄴城大道甚寛何故駕車碾鞍領鞴驢漢子科決待駕車漢子喜歡詞雖俳諧理甚切當論者許之趙犨其先天水人代為忠武牙將曾祖賓祖英竒父叔文皆厯故職犨幼有竒智齠齔之時與隣里小兒戲于道左恒分布行列為部伍戰陣之狀自為董帥指顧有節如夙習焉羣兒皆禀而從之無敢亂其行者其父目而異之曰吾家千里駒也必大吾門矣及赴鄉校誦讀之性出于同輩弱冠有壯節好功名妙于弓劍氣義勇果郡守聞之擢為牙校唐㑹昌中壺闗作亂隨父北征收天井闗未幾從王師征蠻浹月方克惟忠武將士轉戰溪洞之間斬獲甚衆本道録其勲陟為馬步都虞候乾符中王僊芝起于曹濮大縱其徒侵掠汝鄭犨乃率步騎數千襲之賊黨南奔及黄巢陷長安天子幸蜀中原無主人心騷動于是陳州數百人相率告許州連帥願得犨知軍州事其帥即以狀聞于是天子下詔以犨守陳州刺史既視事乃謂將吏曰賊巢之虐徧于四方茍不為長安市人所誅則必驅殘黨以東下况與忠武久為仇讐凌我土疆勢必然也乃遣增垣墉濬溝洫實倉廪積薪芻凡四門之外兩舎之内民有資糧者悉令輓入郡中繕甲兵利劍矟弓弩矢石無不畢備又招召勁勇寘之麾下以仲弟昶為防遏都指揮使以季弟珝為親從都知兵馬使長子麓次子霖皆分領鋭兵黄巢在長安果為王師四面扼束食盡人饑謀東奔之計先遣驍將孟楷擁徒萬人直入項縣犨引兵擊之賊衆大潰斬獲畧盡生擒孟楷中和三年朝廷聞其功就加檢校兵部尚書俄轉右僕射不數月加司空進潁川縣伯巢黨知孟楷為陳所擒大驚憤乃悉衆東來先據溵水後與蔡州秦宗權合勢以攻宛丘陳人懼焉犨恐衆心擕離乃于衆中揚言曰忠武素稱義勇淮陽亦謂勁兵是宜戮力同心捍禦羣冦建功立節去危就安諸君宜圖之况吾家食陳禄久矣今賊衆圍逼衆寡不均男子當于死中求生又何懼也且死于為國不猶愈于生而為賊之伍耶汝但觀吾之破賊敢有異議者斬之由是衆心靡不踴躍無何開門與賊接戰每戰皆捷賊衆益怒巢于郡北三四里起八僊營如宫闕之狀又修百司廨署儲蓄山峙蔡人濟以甲胄軍無所闕焉凡圍陳三百日大小數百戰雖兵食將盡然人心益固犨因令間道奉羽書乞師于太祖太祖素多犨之勇果乃許之四年四月太祖引大軍與諸軍㑹于陳之西北陳人望旗鼓出軍縱火急攻巢寨賊衆大潰重圍遂解獻捷于行在五年八月除犨為蔡州節度使于時巢黨雖敗宗權益熾六七年間屠膾中原陷二十餘郡惟陳去蔡百餘里兵少力㣲日與争鋒終不能屈文德元年蔡州平朝廷議勲以犨檢校司徒充㤗寧軍節度使又改授浙西節度使不離宛丘兼領二鎮龍紀元年三月又以平巢蔡功就加平章事充忠武軍節度使仍以陳州為理所由是中原塵静唐帝復歸長安陳許流亡之民襁負歸業犨設法招撫人皆感之犨兄弟三人時稱雍睦一日念仲弟昶同心王事共立軍功乃下令盡以軍州事付于昶遂上表乞骸後數月寢疾卒于陳州官舎年六十六𦵏于宛丘縣之先域累贈太尉犨雖盡忠唐室保全陳州然黙識太祖雄傑每降心託跡為子孫之計故因解圍之後以愛子結親又請為太祖立生祠于陳州朝夕拜謁數年之間悉力委輸凡所徴調無不率先故能保其功名長子麓位至列卿次子霖改名巖尚太祖女長樂公主開平初授衛尉卿駙馬都尉二年九月權知洺州軍州事俄轉天威軍使十二月授右羽林統軍改右衛上將軍充大内皇墻使三年七月出為宿州團練使旋移州刺史其後累厯近職連典禁軍預誅庶人友珪有功末帝即位用為租庸使守户部尚書巖以勲戚自負貨賂公行天下之賄半入其門又以身尚公主聞唐朝駙馬都尉杜悰位極將相以服御飲饌自奉務極華侈巖恥其不及由是豐其飲膳嘉羞法饌動費萬錢僦斂網商其徒如市權勢燻灼人皆阿附及唐莊宗滅梁室巖踰垣而逸素與徐州温韜相善巖往依之既至韜斬巖首送京師昶字大東犨仲弟也弱冠習兵機沈黙大度神形灑落臨事有通變之才及兄犨為陳州刺史以昶為防禦都指揮使未幾巢將孟楷擁衆萬餘據項城縣昶與兄犨領兵擊破之擒楷以歸不數月巢黨悉衆攻陳以報孟楷之役又蔡冦合從兇醜百萬棲于陳郊陳人大恐一夕昶因巡警假寐于闉闍恍惚間如有隂助昶異而待之遲明開門決戰人心兵勢勇不可遏若有隂兵前導是日擒賊將數人斬首千餘級羣兇氣沮其後連日交戰無不應機俘斬未甞小衂以至重圍數月士心如一及賊敗圍解朝廷紀勲昶一門之中疊加爵秩當時方鎮之内言忠勇者言守禦者言功勲者言政事者皆以犨昶為首焉及犨遥領泰寧軍節度以昶為本州刺史檢校右僕射俄而犨有疾遂以軍州盡付于昶詔授兵馬留後旋遷忠武軍節度使亦以陳州為理所時宗權未滅中原方受其毒陳蔡封疆相接昶每選精鋭深入蔡境蔡賊雖衆終不能抗以至宗權敗焉朝廷賞勲加檢校司徒昶以大冦削平之後益留心于政事勸課農桑大布恩恵景福元年秋陳許將吏耆老録其功詣闕以聞天子嘉之命文臣撰德政碑植于通衢以旌其功俄加同平章事昶自圍解之後恒曰梁王之恩不敢忘也是後太祖每有征伐昶訓練兵甲饋輓供億無有不至乾寧二年寢疾薨于鎮年五十三追贈太尉珝字有節犨季弟也幼而剛毅器宇深沉既冠好書籍及壯工騎射尤精三略及犨為陳州刺史以珝為親從都知兵馬使時巢黨東出商鄧與蔡賊㑹衆至百餘萬掘長壕五百道攻陳陳人大懼珝與二兄堅心誓衆激勵將校約以死節珝以祖先松楸去郭數里慮為羣盜穿發乃夜縱心膂之士遷柩入城府庫舊有巨弩數百枝機牙皆缺工人咸謂不可用珝即創意制度自調弦筈置之雉堞間矢激五百餘步凡中人馬皆洞達胷腋羣賊畏之不敢逼近自仲秋至于首夏軍食將竭士雖不飽而堅拒之志不移會太祖率大軍解其圍珝兄弟抆泣感謝其後朝廷議功加檢校右僕射遥領處州刺史犨薨昶為忠武軍節度使珝遷為行軍司馬檢校司空昶薨珝知忠武軍留後珝公幹之才播于逺邇至于符籍虛實財穀耗登備閲其根本民之利病無不洞知庶事簡㢘公私俱濟太祖深加慰薦尋加特進檢校司徒充忠武軍節度使陳州土壤卑疎每嵗壁壘摧圯工役不暇珝遂營度力用俾以甓周砌四墉自是無霖潦之虞光化二年加檢校太保平章事明年檢校侍中進封天水郡公珝博通前古以陳州本伏羲所都南頓乃光武舊地遂稽考古制崇飾廟貌為四民祈福之所又詢鄧艾故址決翟王河以溉稻粱大實倉廪民獲其利珝兄弟節制陳許繼擁旌鉞共二十餘年陳人愛戴風化大行天復元年冬韓建為忠武軍節度使乃徴珝知同州匡國軍節度留後時太祖統軍岐下珝輸輓調發旁午道途俄而昭宗還長安詔徴入覲錫迎鑾功臣之號珝因堅辭藩鎮遂加檢校太傅右金吾衛上將軍及扈從東遷嵗餘以痼疾免官遂歸淮陽未幾薨于私第年五十五詔贈侍中陳人為之罷市子縠仕至左驍衛大將軍宣徽北院使唐莊宗入汴與從兄巖皆族誅王珂河中人祖縱鹽州刺史父重榮河東節度使破黄巢有大功封瑯琊郡王珂本重榮兄重簡之子出繼重榮唐僖宗光啓三年重榮為部將常行儒所害推重榮弟重盈為蒲帥以珂為行軍司馬及重盈卒軍府推珂為留後時重盈子珙為陜州節度使瑶為絳州刺史由是争為蒲帥瑶珙連上章論列又與太祖書云珂非吾兄弟盖余家之蒼頭也小字忠兒安得繼嗣珂亦上章云亡父有興復之功又遣使求援于太原李克用為保薦于朝昭宗可之既而珙厚結王行瑜李茂貞韓建為援三鎮互相表薦昭宗詔諭之曰吾以太原與重榮有再造之功已俞其奏矣乾寧二年五月三鎮率兵入覲賊害時政請以河中授珙瑶又連兵以攻河中克用聞之出師以討三鎮瑶珙兵退晉師拔絳州擒瑶斬之及克用駐軍于渭北昭宗以珂為河中節度使正授旄鉞克用因以女妻珂珂至太原謝婚成禮克用令李嗣昭將兵助珂攻珙于陜焉光化末太祖謂張存敬曰珂恃太原之勢侮慢隣封爾為我持一繩以縛之天復元年春存敬兵下晉絳令何絪守晉州以阨太原援師二月大軍逼河中珂妻書告太原曰敵勢攻逼朝夕為俘囚乞食于大梁矣大人安忍不救克用曰前途既阻衆寡不敵救則與爾兩亡可與王郎歸朝廷珂復求救于李茂貞茂貞不答珂勢窮蹙即登城謂存敬曰吾與汴王有家世事分公宜退舎俟汴王至吾自聽命存敬即日退舎三月太祖自洛陽至先哭于重榮之墓蒲人聞之感悦珂欲面縛牽羊以見太祖曰太師阿舅之恩何時可忘郎君若以亡國之禮相見黄泉其謂我何歐陽史云梁太祖自同州降唐即依重榮以母王氏故事重榮為舅及珂出迎于路握手歔欷聨轡而入乃以居敬守河中珂舉家徙于汴後入覲被殺于華州𫝊舎珙少有俊氣才兼文武性甚驕虐屬世多故遂代伯父重霸為陜州節度使為政苛暴且多猜忌殘忍好殺不以生命為意内至妻孥宗屬外則賓幕將吏一言不合則五毒將施鞭笞刳斮無日無之奢縱聚斂民不堪命由是左右惕懼憂在不測唐光化二年夏六月為部將李璠所殺璠自稱留後因是陜州不復為王氏所有史臣田紹威始為唐雄據魏地當土德之季運倡梁祖以强禪在梁則為佐命也在唐則豈得為忠臣乎趙犨以淮揚咫尺之地抗黄巢百萬之衆功成事立有足多者巖縠非賢遽泯其嗣惜哉王珂奕世山河勢危被擄乃魏豹之徒與舊五代史巻十四
