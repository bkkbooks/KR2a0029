body:
  text: 舊五代史巻八十九攷證晉列傳四桑維翰傳維翰使親黨受寵于少帝者密致自薦曰陛下欲制北戎以安天下非維翰不可案歐陽史作維翰隂使人説帝與是書同通鑑作或謂帝曰欲安天下非桑維翰不可與是書異張彥澤既受少帝密旨案通鑑攷異云彥澤既降契丹豈肯復受少帝之命當係彥澤自以私怨殺維翰非受命于少帝也所有田園邸第並令賜之案歐陽史作貲財盡為彥澤所掠趙瑩傳授瑩太子太保案遼史作太子太傅劉昫傳歴户部侍郎案是書唐明宗紀作兵部侍郎與此傳異歐陽史從是書本紀授昫守太保案歐陽史作罷為太保舊五代史巻八十九攷證
