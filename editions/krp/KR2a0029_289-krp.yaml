body:
  text: 舊五代史巻一百四十六宋門下侍郎參知政事監脩國史薛居正等撰志八食貨志案食貨志序原本闕佚巻中惟鹽法載之較詳其田賦雜税諸門僅存大畧疑明初是書已有殘闕也今無可採補姑存其舊梁祖之開國也屬黄巢大亂之後以夷門一鎮外嚴烽堠内辟汙萊厲以耕桑薄以租賦士雖若戰民則樂輸二紀之間俄成霸業及末帝與莊宗對壘於河上河南之民雖困于輦運亦未至流亡其義無他蓋賦歛輕而丘園可戀故也及莊宗平定梁室任吏人孔謙為租庸使峻法以剥下厚歛以奉上民産雖竭軍食尚虧加之以兵革因之以饑饉不三四年以致顛隕其義無他蓋賦役重而寰區失望故也案以上見容齋三筆所引薛史繹其文義當係食貨志序今録于巻首唐同光三年二月勅魏府小菉豆税毎畆减放三升城内店寺園囿比來無税頃因為命遂有配徵後來以所徵物色添助軍裝衣賜將令通濟宜示矜蠲今據𦂳慢去處于見輪税絲上毎兩作三等酌量納錢収市軍裝衣賜其絲仍與除放其年閏十二月吏部尚書季琪上言請賦税不以折納為事一切以本色輸官又不以紐配為名止以正税加納勅曰本朝徵科惟配有兩税至于折納當不施為宜依李琪所論應遂税合納錢物斛斗鹽錢等宜令租庸司指揮並准元徵本色輸納不得改更若合有移改即須具事由聞奏天成元年四月勅應納夏秋税先有省耗毎斗一升今後止納正税數不量省耗四年五月戸部奏三京鄴都諸道州府逐年所徵夏秋税租兼鹽麴折徵諸般錢穀起徵各視其地節候早晚分立期限其月勑百姓今年夏苖委人户自通供手狀具頃畆多少五家為保委無隱漏攢連狀本州具狀送省州縣不得迭差人檢括如人户隱欺許令陳告其田倍令并徵長興二年六月勅委諸道觀察使屬縣於毎村定有力人户充村長與村人議有力人户出剩田苖補貧下不迨肯者即具狀徵収有詞者即排叚撿括自今年起為定額有經災沴及逐年逋處不在此限三年十二月三司奏請諸道上供税物充兵士衣賜不足其天下所納斛斗及錢除支贍外請依時折納綾羅絹帛從之晉天福四年正月𠡠應諸道節度刺史不得擅加賦役及於縣邑别立監徵所納田租委人户自量自槩周顯德三年十月宣三司指揮諸道州府今後夏税以六月一日起徵秋税至十月一日起徵永為定制五年七月賜諸道均田圗十月命左散騎常侍艾頴等三十四人下諸州檢定民租周顯德六年春諸道使臣回總計檢到户二百三十萬九千八百一十二唐同光二年度支造請牓示府州縣鎭軍民商旅凡有買賣並須使八十陌錢二月詔曰錢者古之泉布蓋取其流行天下布散人間無積滯則交易通多貯藏則士農困故西漢興改幣之制立告緡之條所以權蓄賈而防大姦也宜令所司散下州府常須檢察不得令富室分外収貯見錢又工人銷鑄為銅噐兼沿邊州鎮設法鈐轄勿令商人搬載出境三月知唐州晏駢安奏市肆間㸃檢錢帛内有錫鑞小錢揀得不少皆是江南綱商挾帯而來詔曰帛布之幣雜以鈆錫惟是江湖之外盗鑄尤多市肆之間公行無畏因是綱商挾帯舟檝往來換易好錢藏貯富室實為蠧弊須有條流宜令京城諸道於坊市行使錢内㸃檢雜惡鉛錫錢並宜禁斷沿江州縣毎有舟船到岸嚴加覺察不許將雜鉛錫惡錢往來換易好錢如有私載並行収納天成元年八月中書門下奏訪聞近日諸道州府所賣器價貴多是銷鎔見錢以邀厚利乃下詔曰宜令遍行曉告如原舊係銅器及碎銅即許鑄造器仍生銅器物毎斤價定二百文熟銅器物毎斤四百文如違省價買賣之人依盗鑄錢律文科斷清泰二年十二月詔御史䑓曉告中外禁用鉛錢如違犯准條流處分晉天福二年詔禁一切銅器其銅鏡今後官鑄造於東京置場貨賣許人収買於諸處興販去周廣順元年三月勑銅法今後官中更不禁斷一任興販所在一色即不得㵼破為銅器貨賣如有犯者有人糺告捉獲所犯人不計多少斤兩並處死其地分所由節級决脊杖十七放隣保人决臋杖十七放其告事人給與賞錢一百貫文江南因唐舊制饒州置永平監嵗鑄錢池州永寕監建州永豐監並嵗鑄錢杭州置保興監鑄錢唐同光二年二月詔曰㑹計之重鹹鹺居先矧彼兩池實有豐利頃自兵戈擾攘民庶流離既場務以隳殘致程課之虧失重茲葺理湏伏規模將立事以成功在從長而就便宜令河中節度使兾王李繼麟兼充制置度安邑解縣兩池𣙜鹽使便可制一一條貫五代㑹要同光三年二月勑魏府毎年所徴隨絲塩錢毎兩與减放五文逐年俵賣蠶塩食䀋大䀋甜次冷䀋毎斗與减五十欒䀋與减三十夫成元年四月勑諸州府百姓合散蠶䀋今後毎年秪二月内一度俵散依夏税限納錢長興四年五月七日諸道塩鐵轉運使奏諸道州府䀋法條流元末一槩定奪謹具如後應食顆塩州府省司各置𣙜糶折博塲院應是鄉村並通私商興販所有折博並毎年人户蠶塩並不許将帯一斤一兩入城侵奪𣙜糶課利如違犯者一兩已上至一斤買賣人各杖六十一斤已上至三斤買賣人各杖七十三斤已上至五斤買賣人各杖八十五斤已上至十斤買賣人各徒二年十斤已上不計多少買賣人各决脊杖二十處死所有犯鹽人隨行錢物驢畜等並納入官所有元本家業莊田如是全家迯走者即行㸃納仍許般載脚户經過店主並脚下人力等糾告等第支與優給如知情不告與賣塩人同罪其犯塩人經過處地分門司廂界廵檢節級所由并諸色闗連人等不專覺察委本州臨時斷訖報省如是門司闗津口鋪捉獲私塩即依下項等第一半賞錢一斤以上至十斤支賞錢二十千五十斤已上至一百斤支賞錢三十千一百斤已上支賞錢五十千應食未塩地界州府縣鎭並有𣙜糶塲院久來内外禁法即未一槩條流應刮鹹煎鹽不計多少斤兩竝處極法兼許四鄰及諸色人等陳告等第支給賞錢欲指揮此後犯一兩已上至一斤買賣人各杖六十一斤已上至二斤買賣人各杖七十二斤已上至三斤買賣人各徒一年三斤已上至五斤買賣人各徒二年五斤已上買賣人各决脊枚二十處死如是收到鹹土鹽水即委本處煎錬鹽數准條科斷或有已曽違犯不至死刑經斷後公然不懼條流再犯者不計斤両多少所犯人竝處極法其有𣙜糶塲院員寮節級人力煎鹽池客竈户般鹽船綱押綱軍將衙官梢工等具知鹽法如有公然偷盗官鹽或將貨買其買賣人及涡盤主人知情不告竝依前項刮鹹例五斤已上處死其諸色關連人等竝合支賞錢即准洛京邢鎮條流事例指揮顆未青白等鹽元不許界分参雜其顆鹽先許通商之時指揮不得將帯入末鹽地界如有違犯一斤一両竝處極法所有隨行物色除鹽外一半納官一半與捉事人充賞其餘鹽色末有畫一條流其洛京并鎭定邢州管内多北京末鹽入界捉獲並依洛京條流科斷欲指揮此後但是顆末青白諸色鹽侵界叅雜捉獲並准洛京條流施行一應諸道今後若捉獲犯私鹽麴人罪犯分明正該條法便仰斷遣訖奏若稍涉疑誤祗須申奏取裁晉天福中河南河北諸州除俵散蠶鹽徵錢外毎年末鹽界分塲務約糶一十七萬貫有餘言事者稱雖得此錢百姓多犯鹽法請將上件食鹽錢於諸道州府計户毎户一貫至二百為五等配之然徒任人逐便興販既不虧官又益百姓朝廷行之諸處塲務亦且仍舊俄而鹽貨頓賤去出鹽逺處州縣毎斤不過二十文近處不過一十文掌事者又難驟改其法奏請重制鹽塲税蓋欲絶其興販歸利於小官也七年十二月宣㫖下三司應有往來鹽貨悉税之過税毎斤七文住税毎斤十文其諸道州府應有屬州鹽務並令省司差人勾當既而糶鹽雖多而人户鹽錢又不放免至今民甚苦之五代㑹要晉天福元年十一月赦節文洛京管内逐年所配人户食鹽起來年毎斗减放十丈周廣順元年九月詔改鹽法凡犯五斤已上者處死煎鹻鹽犯一斤已上者處死先是漢法不記斤兩多少並處極刑至是始革之三年三月詔曰青白池務素有定規祗自近年頗乖循守比來青鹽一石抽税錢八百文足陌鹽一斗白鹽一石抽税錢五百文鹽五升其後青鹽一石抽錢一千鹽一斗訪問更改已來不便商販蕃人漢户求利艱難宜與優饒庶令存濟今後毎青鹽一石依舊抽税錢八百文以八十五為陌鹽一斗白鹽一石抽税錢五百鹽五升此外更不得别有邀求訪聞邊上鎮鋪於蕃漢户市易糶糴衷私有抽税今後一切止絶五代㑹要周廣順二年九月十八日勑條流禁私鹽麴法如後一諸色犯鹽麴所犯一斤已下至一兩杖八十配役五斤已下一斤已上徒三年配役五斤已上並决重杖一頓處死一應所犯鹽麴關津門司廂廵門保如有透漏並行勘斷已一刮鹻煎鍊私鹽所犯一斤已下徒三年配役一斤上並决重杖一頓處死犯私鹽若捉到鹻水秪煎成鹽秤盤定罪逐處凡有鹻鹵之地所在官吏節級所由常須廵檢村坊鄰保逓相覺察若有所犯處彰露並行勘斷死一所犯私鹽捉事告事人各支賞錢以係省錢充至刑者賞錢五十千不及死刑者三十千色一顆末鹽各有界分若將本地分鹽侵越疆界同諸犯鹽例科斷一鄉村人户所請蠶鹽秪得將歸裛蠒供食不得别將博易貨賣投託與人如違並同諸色犯鹽例科斷若是所請蠶鹽道路津濟須經過州府縣鎭委三司明行指揮其一凡買鹽麴並須於官塲務内買若衷私投託興販買賣人並同諸色犯鹽麴例如一諸官塲官務如有羡餘岀剩塩麴並許盡㡳報官衷私貨賣者買賣人並同諸色犯鹽麴科斷若鹽舖酒店户及諸色人與塲院衷私貨賣者並同罪科斷一所犯私鹽麴有同情共犯者若是骨肉卑㓜奴婢同犯秪罪家長主首不知情秪罪造意者餘减等科斷若是他人同犯並同罪斷若與他人同犯據逐人脚下所犯斤両依輕重斷遣並一州城縣鎭郭下人户係屋税合請鹽者若是州府於城内請給若是外縣鎭郭下人户亦許將鹽歸家供食仰本縣預取逐户合請鹽數目攢定丈賬部領人户請㧞勒本處官吏及所在塲務同㸃檢入城若縣城郭下人户城外别有莊田亦仰夲縣預先分擘開坐勿令一處分給供使鹽三年十二月勑諸州府并外縣鎭城内其居人屋税今後不俵其鹽錢亦不徴納所有鄉村人户合請蠶鹽所在州城縣鎮嚴切檢校不得放入城門顯德元年十二月世宗謂侍臣曰朕覽食末鹽州郡犯私鹽多于顆鹽界分蓋卑濕之地易為刮鹹煎造豈惟違我榷法兼又汚我好鹽况末鹽煎錬般運費用倍于顆鹽今宜分割十餘州令食顆鹽不惟輦運省力兼且少人犯禁自是曹宋已西十餘州皆盡食顆鹽五代㑹要顯德二年八月二十四日宣頭節丈改立鹽法如後一贍國軍堂陽務邢洺州鹽務應有垜垜貯鹽貨處并煎鹽塲竈及應是鹻地並須四面修置墻塹如是地里遥遠難為修置墻塹即作壕籬為規隔内偷盗夾帯官鹽兼於壕籬外煎造鹽貨便仰收捉及許諸色人陳告所犯不計多少斤兩並决重杖一頓處死其經歴地分及門司節級人員並當量罪勘斷所有捉事告事人賞錢二十千一斤已上至十斤賞錢三十千一十斤已上賞錢五十千一應有不係官中煎鹽處鹻地並湏標識委本州府差公幹職員與廵監節級村保地主鄰人同共廵檢若諸色人偷刮鹵地便仰収捉及許人陳告若勘逐不虗捉事人毎獲一人賞絹一十匹獲二人賞絹二十匹獲三人已上不計人數賞絹五十匹刮鹻煎鹽人并知情人所犯不計多少斤兩並决重杖一頓處死其刮鹻處地分並刮鹻人住處廵檢節級所由村保等各徒二年半令衆一月依舊勾當刮鹻處地主不切檢校徒二年令衆一月一顆鹽地分界内有人刮鹻煎煉鹽貨所犯並依前法鹽一令縁改價賣鹽慮有别界分鹽貨遞相侵犯及將入城諸色犯鹽人令下三司依下項條流科斷其犯鹽人隨行物色給與本家其鹽没納入官所經歴地分節級人員竝行勘斷一両至一斤决臀杖十五令衆半月捉事告事人賞錢五千一斤已上至一十斤徒一年半令衆一月捉事人賞錢七千十斤已上不計多少徒二年配發運務役一年捉事告事人賞錢十千一諸州府人户所請蠶鹽不得于鄉村衷私貨賣及信團頭脚户縣司請鹽節級所由等尅折糶賣如有犯者依諸色犯鹽例科斷一如有人于河東界將鹽過來及自家界内有人往彼興販鹽貨所犯者竝處斬其犯鹽人隨行驢畜資財竝與捉事人充賞慶州青白榷稅院元有透稅條流所有隨行驢畜物色一半支與捉事人充賞其餘一半并鹽竝納入官欲竝且依舊一斗已上至三斗杖七十三斗已上至五斗徒一年五斗已上處死安邑解縣両池榷鹽院河府節度使兼判之時申到畫一事件條流等准勑牒兩池所出鹽舊日若無文榜如擅將一斤一両准元勑條竝處極法其犯鹽人應有錢物竝與捉事充賞者切以兩池禁棘峻阻不通人行四面各置塲門弓射分擘鹽池分居住並在棘圍裏面更不别有差遣祗令廵䕶鹽池如此後有人偷盗官鹽一斤一両出池其犯鹽人竝准元勑條流處分應有隨行錢物竝納入官其捉事人依下項定支優給若是廵檢弓射池塲門子自不專切廵察致有透漏到棘圍外被别人捉獲及有糾告兼同行反告官中更不坐罪陳告人亦依捉事人支賞應有知情偷盗官鹽之人亦依犯鹽人一例處斷其不知情闗連人臨時酌情定罪所有透漏地分弓射及池塲門子如是透漏出鹽一十斤已下徒一年半一十斤已上至二十斤支賞錢一十千二十斤已上至五十斤支賞錢二十千五十斤已上至一百斤支賞殘三十千一百斤已上支賞錢五十千前項所定奪到鹽法條流其應屬州府捉獲抵犯之人便委本州府檢條流科斷訖申奏别報省司其屬省院捉到犯鹽之人干死刑者即勘情罪申上候省司指揮不至極刑者便委務司准條流决放訖申報從之三年十月勑漳河已北州府界元是官塲糶鹽今後除城郭草市内仍舊禁法其鄉村並許鹽貨通商逐處有鹹鹵之地一任人户煎鍊興販則不得踰越漳河入不通髙地界文獻通考五年既取江北諸州唐主奉表入貢因白帝以江南無鹵田願得海陵鹽監南屬以贍軍帝曰海陵在江北難以交居當别有處分乃詔嵗支鹽三十萬斛以給江南士卒稍稍歸之周顯德二年正月世宗謂侍臣曰轉輸之物向來皆給斗耗自晉漢已來不與支破食廪所納新物尚除省耗况水路所般豈無損折起今後毎石宜與耗一斗後唐天成三年七月詔曰應三京鄴都諸道州府鄉村人户自今年七月後於是秋田苖上毎畆納麴錢五文足陌一任百姓自造私麴醖酒供家其錢隨夏秋徵納其京都及諸道州府縣鎭坊界内應逐年買官麴酒户便許自造麴醖酒貨賣仍取天成二年正月至年終一年逐户計算都買麴錢數内十分只納二分以充榷酒錢便從今年七月後管數徵納榷酒户外其餘諸色人亦許私造酒麴供家即不得衷私賣酒如有故違便即糾察勒依中等酒户納榷其坊村一任沽賣不在納榷之限時孔循以麴法殺一家于洛陽或獻此意以為愛其人便于國故行之長興元年二月赦書節文諸道州府人户毎秋苖一畆上元徵麴錢五文今後特放二文只徵三文二年詔曰酒醴所重麴蘖是須縁賣價太高禁條頗峻士庶因斯而扺犯刑名由是以滋彰爰行改革之文庶息煩苛之政各隨苖量定稅錢訪聞數年已來雖犯法者稀而傷民則甚蓋以亂離日乆貧下户多纔遇昇平便勤稼穡各務耕田鑿井孰能枕麴藉糟既隨例以均攤遂抱虚而輸納漸成凋弊深可憫傷况欲置豐財必除時病有利之事方切施行無名之求尤宜廢罷但得日新之理何辭夕改之嫌應在京諸道苖畆上所徵麴錢等便從今年夏竝放其麴官中自造委逐州减舊價一半于在城撲斷貨買除在城居人不得私造外鄉村人户或要供家一任私造勑下之日人甚説之顯德四年七月詔曰諸道州府麴務今後一依往例官中禁法賣麴逐處先置都務候勑到日竝仰停罷據見在麴數准備貨買兼據年計合使麴數依時蹋造候人户將到價錢據數給麴不得賖賣抑配與人舊五代史巻一百四十六
