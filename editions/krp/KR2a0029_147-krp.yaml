body:
  text: 舊五代史巻七十三攷證唐列𫝊二十五毛璋𫝊授滄州節度使滄州歐陽史作華州段凝傳其後遷鄭州刺史監大軍于河上案歐陽史遷凝鄭州刺史使監兵于河上李振亟請罷之太祖曰凝未有罪振曰待其有罪則社稷亡矣然終不罷也據此則凝監河上軍為梁祖時事通鑑攷異云晉人取魏博然後與梁以河為境故常以大兵守之太祖時未也就使當時屯兵河上亦未繫社稷之安危此必均王時事也中貰其負案中貰其負句原本疑有脱誤攷冊府元龜與是書同今仍其舊舊五代史巻七十三攷證
