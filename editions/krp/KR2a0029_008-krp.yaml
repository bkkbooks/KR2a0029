body:
  text: 舊五代史巻三攷證梁太祖紀三節度使羅紹威紹威原本作昭威今據歐陽史改判建昌院事案原本脱昌字今増以青州節度使韓建守司徒平章事青原本訛清今改正癸卯司天監奏日辰内有戊字請改為武從之案容齋三筆以為戊類成字故司天諂之不知戊字乃避梁祖曾祖茂林諱非以其類成字也雲谷雜記嘗辦正之今崇福侯廟碑立於開平二年上作武寅足證當時避諱之體是日隰州奏大寧縣至固鎭上下二百里案是書前後多作李固鎮疑原本有脱字考通鑑亦間作固鎮葢當時奏牘省文也今仍之舊五代史巻三攷證
