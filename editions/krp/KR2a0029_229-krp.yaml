body:
  text: 五代史巻一百十五宋門下侍郎參知政事監修國史薛居正等撰周書第六世宗紀二顯徳二年春正月辛未朔帝不受朝賀辛卯詔在朝文班各舉堪為令録者一人雖姻族近親亦無妨嫌授官之日各署舉主姓名若在官貪濁不任懦弱不理竝量事狀重輕連坐舉主乙未詔應逃户莊田竝許人請射承佃供納税租如三周年内本户來歸者其桑田不計荒熟竝交還一半五周年内歸業者三分交還一分如五周年外歸業者其莊田除本户墳塋外在在交付之限其近北地諸州應有陷蕃人户自蕃界來歸業者五周年内來者三分交還二分十周年内來者交還一半十五周年來者三分交還一分十五周年外來者不在交還之限二月戊申遣使赴西京賜太子太師致仕候益白文珂宋彥筠等茶藥錢帛各有差仍降詔存問壬戌詔曰善操理者不能有全功善處身者不能無過失雖堯舜禹湯之上聖文武成康之至明尚猶思逆耳之言求苦口之藥何况後人之不逮哉朕承先帝之靈居至尊之位渉道猶淺經事未深常懼昏䝉不克負荷自臨宸樞已過周星至刑政取捨之間國家措置之事豈能盡是湏有未周朕猶自知人豈不察而在位者未有一人指朕躬之過失食禄者曽無一言論時政之是非豈朕之寡昧不足與言邪豈人之循黙未肯盡心邪豈左右前後有所畏忌邪豈高卑踈近自生間别邪古人云君子大言受大禄小言受小禄又云官箴王闕則是士大夫之有禄仕無不言之人然則為人上者不能感其心而致其言此朕之過也得不來骨鯁之辭詢正直之議共申禆益庶洽治平朕于卿大夫才不能盡知面不能盡識若不採其言而觀其行審其意而察其忠則何以見器畧之淺深知任用之當否若言之不入罪實在予茍求之不言咎将誰執應内外文武臣僚今後或有所見所聞竝許上章論諫若朕躬之有闕失得以盡言時政之有瑕疵勿宜有隠方來名實豈尚虚華茍或素不工文但可直書其事辭有謬誤者固當捨短言渉傷忤者必與留中所冀盡情免至多慮諸有司局公事者各宜舉職事有不便者華之可也理有可行者舉之可也勿務因循漸成訛謬臣僚有出使在外迴者茍或知黎庶之利病聞官吏之優劣當具敷奏以廣聽聞班行職位之中遷除改轉之際即當考陳力之輕重較言事之否臧奉公切直者當議甄升臨事蓄縮者湏期抑退翰林學士兩省官職居侍從乃論思諫諍之司御史臺官任處憲綱是擊搏糺彈之地論其職分尤異羣臣如逐任官内所獻替啓發彈舉者至月限滿合遷轉時宜令中書門下先奏取進止三月辛未以李晏口為静安軍其軍南距冀州百里北距深州三十里夾胡盧河為壘通鑑浚胡盧河在正月至三月始建軍額先是貝冀之境密邇戎疆居常敵騎渉河而南馳突往來洞無阻礙北鄙之地民不安居帝乃按圖定䇿遣許州節度使王彥超曹州節度使韓通等領兵他徙築壘于李晏口以兵戍守功未畢契丹衆尋至彥超等擊退之及壘成頗扼要害自是敵騎雖至不敢渉河邉民稍得耕牧焉壬辰尚書禮部貢院進新及第進士李覃等一十六人所試詩賦文論䇿文等詔曰國家設貢舉之司求英俊之士務詢文行方中科名比聞近來已來多有濫進或以年勞而得第或因媒勢以出身今嵗所放舉人試令看驗果見紕繆湏至去留其李覃何曮楊徽之趙鄰幾等四人宜放及第其嚴説武允成王汾閭丘舜卿任惟吉周度張慎徽王翥馬文劉選程浩然李震等一十二人藝學未精竝宜勾落且令苦學以俟再來禮部侍郎劉温叟失于選士頗属因循㨿其過尤合行譴謫尚視寛恕特與矜容劉温叟放罪其将來貢舉公事仍令所司别具條理以聞夏四月庚戌以内客省使李彥頵為延州留後辛亥詔應自外新除御史未經朝謝行過州府不得受館驛供給及所在公禮乙卯詔于京城四面别築羅城期以來春興役戊午以翰林學士給事中竇儀為禮部侍郎依前充職以禮部侍郎劉温叟為太子詹事癸亥以翰林學士中書舍人楊昭儉為御史中丞是月詔翰林學士承㫖徐台符已下二十餘人各撰為君難為臣不易論平邉䇿各一首帝親覽之宋史陶榖傳世宗謂宰相曰朕觀厯代君臣治平之道誠為不易又念唐晉失徳之後亂臣黠将僣竊者多今中原甫定呉蜀幽并尚未平附聲教未能逺被宜令近臣各為論䇿宣導經濟之畧乃命承㫖徐台符以下二十餘人各撰為君難為臣不易論平邉䇿以進其畧率以脩文徳來逺人為意惟榖與竇儀楊昭儉王朴以封疆密邇江淮當用師取之世宗自克髙平常訓兵講武思混一天下及覽其䇿欣然聽納由是平南之意益堅矣五月辛未廻鶻遣使貢方物鳯翔節度使王景上言奉詔攻收秦鳯二州已于今月一日領軍由大散闗路進軍次先是晉末契丹入晉秦州節度使何建以秦成階三州入蜀蜀人又取鳯州至是秦鳯人户怨蜀之苛政相次詣闕乞舉兵收復舊地乃詔景與宣徽南院向訓率師以赴焉東都事畧王漙傳世宗将討秦鳯溥薦向拱遂平之世宗因宴酌巵酒賜之曰成吾邉功卿擇帥之力也甲戌詔曰釋氏貞宗聖人妙道助勸善其利甚優前代以來累有條貫近年已䧏頗紊規繩近覽諸州奏聞繼有緇徒犯法盖無科禁遂至尤違私度僧尼日増猥雜剏脩寺院漸至繁多鄉村之中其弊轉甚漏網背軍之輩茍剃削以逃刑行姦為盜之徒託住持而隠惡将隆教法湏辨否臧宜舉舊章用革前弊諸道州府縣鎮村坊應有勑額寺院一切仍舊其無勑額者並仰停廢所有功徳佛像及僧尼並騰併于合留寺院内安置天下諸縣城郭内若無勑額寺院秖于合停廢寺院内選功徳屋宇最多者或寺院僧尼各留一所若無尼住秖留僧寺院一所諸軍鎮坊郭及二百户已上者亦依諸縣例指揮如邉遠州郡無勑額寺院處于停廢寺院内僧尼各留兩所今後並不得剏造寺院蘭若公王戚里諸道節刺已下今後不得奏請剏造寺院及請開置戒壇男子女子如有志願出家者並取父母祖父母處分已孤者取同居伯叔兄處分候聽許方得出家男年十五已上念得經文一百紙或讀得經文五百紙女年十三已上念得經文七十紙或讀得經文三百紙者經本府陳状乞剃頭委録事参軍本判官試驗經文其未剃頭間湏留髪髻如有私剃頭者却勒還俗其本師主决重杖勒還俗仍配役三年兩京大名府京兆府青州各處置戒壇侯受戒時兩京委祠部差官引試其大名府等三處秖委本判官録事参軍引試如有私受戒者其本人師主臨壇三綱知事僧尼並同私剃頭例科罪應合剃頭受戒人等逐處聞奏候勑下委祠部給付慿由方得剃頭受戒應男女有父母祖父母在别無兒息侍養不聽出家曽有罪犯遭官司刑責之人及棄背父母逃亡奴婢姦人細作惡逆徒黨山林亡命未獲賊徒負罪潛竄人等並不得出家剃頭如有寺院輒容受者其本人及師主三綱知事僧尼鄰房同住僧並仰收捉禁勘申奏取裁僧尼俗士自前多有捨身燒臂鍊指釘截手足帯鈴掛燈諸般毁壊身體戲弄道具符禁左道妄稱率現還魂坐化聖水聖燈祅幻之類皆是聚衆眩惑流俗今後一切止絶如有此色人仰所在嚴斷逓配邉逺仍勒歸俗其所犯罪重者準格律處分毎年造僧帳兩本其一本奏聞一本申祠部逐年四月十五日後勒諸縣取索管界寺院僧尼数目申州州司攅帳至五月終已前文帳到京僧尼籍帳内無名者並勒還俗其廵禮行脚出入往來一切取便是嵗諸道供到帳籍所存寺院凡二千六百九十四所廢寺院凡三萬三百三十六僧尼係籍者六萬一千二百人戊寅以刑部侍郎邉光範為戸部侍郎以前御史中丞裴巽為刑部侍郎己卯刑部員外郎陳渥賜死坐檢齊州臨邑縣民田失實也渥為人清苦臨事有守以微累而當極刑時論惜之戊子以沙州留後曹元忠為沙州節度使檢校太尉同平章事丙申禮部侍郎竇儀奏請廢童子明經二科及條貫考試次第從之六月己酉以曹州節度使韓通充西南面行營都虞候丙辰以亳州防禦使陳思譲為邢州留後庚申詔兩京及諸道州府不得奏薦留守判官兩使判官少尹防禦團練軍事判官如是随幕已曽任此職者聽奏防禦團練刺史州各置推官一員辛酉廢景州為定逺軍癸亥以前延州節度使袁㠖為滄州節度使以前邢州節度使田景咸為鄧州節度使秋七月丁卯朔以鳯翔節度使王景兼西南面行營都招討使以宣徽南院使鎮安軍節度使向訓兼西南面行營都監戊辰太子太傅魯國公和凝卒八月癸卯兵部尚書張昭太常卿田敏等奏議減祠祭所用犧牲之数由是圜丘方澤及太廟即用太牢餘皆以羊代之丁未中書侍郎平章事判三司景範罷判三司加銀青光禄大夫依前中書侍郎平章事進封開國伯以樞密院承㫖張美權判三司辛亥詔今後應有病患老弱馬並送同州沙苑監衛州牧馬監就彼水草以盡飲齕之性庚子太子太師致仕趙暉卒乙丑詔曰今後諸處祠祭應有牲牢香幣饌料供具等仰委本司官吏躬親檢校務在精至行事儀式依附禮經大祠祭合樂者仍湏祀前教習凡闗祀事宜令太常博士及監察御史用心㸃檢稍或因循必行朝典九月丙寅朔詔禁天下銅器始議立監鑄錢癸未以太子賔客趙上交為吏部侍郎以吏部侍郎于徳辰司徒詡並為太子賔客乙酉詔文武百寮今後遇天清節依近臣例各賜衣服辛卯西南面招討使王景部送所獲西川軍校姜暉已下三百人至闕甲午潞州部送先擒到河東兵馬監押程支等二百人至闕詔所獲西川河東軍校已下並釋之各賜錢帛有差閏月壬子西南面招討使王景奏大破西川賊軍于黄花谷擒偽命都監王巒孫韜等一千五百餘人九國志李廷珪傳周師攻秦鳯以廷珪為北路行營都統高彥儔吕彥珂為招討廷珪遣先鋒指揮使李進以兵㨿馬嶺分兵斜谷營于白澗将腹背以攻周師又遣染院使王巒領兵出唐倉與周師遇蜀師敗走王巒死之而馬嶺斜谷之兵聞之皆退奔高彥儔與諸将謀退守青泥嶺由是秦鳯階成之地皆䧟于周矣癸丑秦州偽命觀察判官趙玭以本城䧏詔以玭為郢州刺史宋史趙玭傳高彥儔出師救援未至聞軍敗因潰歸玭閔門不納召官属諭之曰今中朝兵甲無敵于天下自用師西征戰無不勝蜀中所遣将皆武勇者卒皆驍健者然殺戮遁逃之外幾無孑遺我輩安忍坐受其禍去危就安當在今日衆皆俯伏聽命玭遂以城歸順世宗欲命以藩鎮宰相范質不可乃授郢州刺史先是帝以西師久次艱于糧運命今上乘馹赴軍前以觀攻戰之勢及迴具以事勢上奏帝甚悦至是果成功焉甲子秘書少監許遜責授蔡州别駕坐先假竇氏圖書隠而不還也冬十月庚午召近臣射于苑中賜金器鞍馬有差辛未成州歸順癸酉以給事中王敏為工部侍郎戊寅高麗國遣使朝貢丁丑右散騎長侍康澄責授環州别駕左司郎中史又𤣥責授商州長史左驍衛大将軍元覇責授均州别駕右驍衛将軍林延禔責授登州長史澄等奉使浙中㢠廻日以私便停留逾時復命故有是責右諫議大夫李知捐配流沙門島坐妄貢章疏斥讟貴近及求使兩浙故也己丑前太常卿邉蔚卒是月始議南征十一月乙未朔以宰臣李穀為淮南道前軍行營都部署知廬壽等州行府事以許州節度使王彥超為行營副部署命侍衛馬軍都指揮使韓令坤等一十二将各帯征行之號以從焉己亥諭淮南州縣詔曰朕自纉承基構統御寰瀛方當躬已臨朝誕修文徳豈欲興兵動衆專耀武功顧兹昏亂之邦湏舉弔伐之義蠢爾淮甸敢拒大邦因唐室之陵遲接黄冦之紛亂飛掦䟦扈垂六十年盜據一方僣稱偽號幸数朝之多事與北境以交通厚啓戎心誘為邉患晉漢之代寰海未寧而乃招納叛亡朋助凶惡李金全之據安陸李守貞之叛河中大起師徒來為應授攻侵高密殺掠吏民迫奪閩越之封疆塗炭湘潭之士庶以至我朝啓運東魯不庭發兵而應接叛臣觀釁而慿凌徐部沐陽之役曲直可知尚示包荒猶稽問罪邇後維掦一境連嵗阻饑我國家念彼災荒大許糴易前後擒獲将士皆遣放還自來禁戢邉兵不令侵撓我無所負彼實多姦勾誘契丹至今未已結連并冦與我為讎罪惡難名人神共憤今則推輪命将鳴鼓出師徴浙右之楼舩下朗陵之戈甲東西合勢水陸齊攻呉孫皓之計窮自當歸命陳叔寳之数盡何處偷生應淮南将士軍人百姓等久隔朝廷莫聞聲教雖從偽俗應樂華風必湏善擇安危早圖去就如能投戈獻疑舉郡來降具牛酒以犒師納圭符而請命車服玉帛豈恡旌酬土地山河誠無愛惜刑賞之令信若丹青茍或執迷寕免後悔王師所至軍政甚明不犯秋毫有如時雨百姓父老各務安居剽擄焚燒必令禁止云高麗國王王昭加開府儀同三司檢校太尉依前使持節𤣥莵州都督大義軍使王如故辛亥以前滄州節度使李暉為邠州節度使壬子潞州奏破河東賊軍于祁縣癸丑西南面行營都部署王景奏收復鳯州獲偽命節度使王環乙卯曲赦秦鳯階成等州管内罪人自顯徳二年十一月已前凡有罪犯無問輕重一切釋放丁已前邠州節度使折從阮卒己未邢州奏河東劉崇死壬戌淮南前軍都部署李穀奏先鋒都指揮使白延遇破淮賊于來逺鎮十二月丙寅以左金吾大将軍蓋萬為右監門上将軍丁卯淄州奏前中書侍郎同平章事景範卒庚午右金吾衛上将軍王守恩卒辛未安州奏盜殺防禦使張穎是日翰林學士承㫖徐台符卒甲戌李穀奏破淮賊二千人于壽州城下丙子以左諫議大夫權知開封府事王朴為左散騎常侍充端明殿學士依前權知開封府事永興軍奏節度使劉詞卒己卯李穀奏破淮賊千餘人于山口鎮丙戌樞密使鄭仁誨卒辛卯西南面行營都部署王署差人部送所獲偽鳯翔節度使王環至闕詔釋之仍賜鞍馬衣服尋授右驍衛按原本闕一字将軍是冬命起居郎陶文舉徴殘租于宋州文舉本酷吏也宋民被其刑者凡数千冤號之聲聞于道路有悼髦之輩不勝其刑而死者数人物議以為不允舊五代史巻一百十五
