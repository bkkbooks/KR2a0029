body:
  text: 舊五代史巻九十四攷證晉列傳九萇從簡𫝊贈太𫝊案歐陽史作贈太師方太𫝊及劉晞南走許州劉晞通鑑攷異作劉禧何建𫝊何建九國志作何重建張廷藴𫝊㑹潞州李繼儔故將楊立嬰城叛詔遣明宗為招討使元行欽為都部署廷藴為前鋒案歐陽史云李繼韜叛于潞州莊宗遣明宗為招討使元行欽為都署廷藴為馬歩軍都指揮使將兵為前鋒呉縝纂誤居梁本紀及元行欽李繼韜𫝊云並無明宗元行欽張廷藴攻潞州之事今考是書本言廷藴平潞州楊立之叛歐陽史以為平李繼韜殊誤通鑑從是書舊五代史巻九十四攷證
