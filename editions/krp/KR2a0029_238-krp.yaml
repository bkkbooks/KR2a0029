body:
  text: 舊五代史巻一百十九考證周世宗紀六甲辰鄚州刺史劉楚信以州來降案鄚州之降通鑑從是書作四月遼史作五月疑誤壬子車駕𤼵雄州還京案遼史作五月辛未周師退與是書異通鑑從是書作壬子長子宗訓案恭帝宗訓通鑑注作第四子歐陽史漢家人傳世宗子七人長曰宜哥次二皆未名次曰恭皇帝是亦以宗訓為第四子也是紀作王長子葢宜哥與其二皆為漢誅指其現存者而言耳第二子宗讓宗讓歐陽史作宗誼獲偽刺史張丕旦張丕旦通鑑作張丕以宣徽南院使吳延祚為樞宻使行左驍衛上將軍案歐陽使三月吳延祚為左驍衛上將軍樞宻使與是書異通鑑從是書作六月癸已帝崩於萬歲殿案歐陽史作滋德殿與是書異五代會要五代春秋俱作萬歲殿與是書同舊五代史巻一百十九考證
