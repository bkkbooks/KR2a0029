body:
  text: 舊五代史巻六十一攷證唐列𫝊十三安金全傳莊宗性矜伐凡大將立功不時行賞故金全名位不進案遼史金全以幽州戰敗故退廢不用與是書異安元信𫝊案五代時唐晉俱有安元信是書並為立𫝊今附識于此安重霸𫝊蜀主率衆數萬由劍閣將出興鳳以遊秦州至興州遇魏王繼岌軍至狼狽而走案九國志作王衍將之秦州以王宗弼力諫而止與是書異袁建豐𫝊轉突騎指揮使突騎歐陽史作突陣指揮使孟守謙據城以叛孟守謙歐陽史作孟謙加檢校太傅太傅歐陽史作太尉西方鄴𫝊父再遇為州軍校案歐陽史作汴州軍校疑原本脱汴字巳而又取歸州案通鑑不載取歸州事歐陽史與薛史同近人撰十國春秋者謂他書不載取歸州之事疑歐陽史有誤盖薛史世久失𫝊十國春秋所引悉本通鑑考異殊不知歐陽史西方鄴𫝊本於薛史有可徵信也舊五代史巻六十一攷證
