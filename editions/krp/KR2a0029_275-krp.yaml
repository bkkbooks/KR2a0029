body:
  text: 舊五代史巻一百三十九宋門下侍郎參知政事監修國史薛居正等撰志一天文志案天文志序原本闕佚然其日食星變諸門事蹟具存較歐陽史司天考為詳備今考五代會要所載星變物異諸門與司天考互有詳畧蓋五代典章散佚各記所聞未能畫一也叅考諸書當以是書為得其實焉日食梁太祖乾化元年正月丙戌朔日有食之時言事者多引漢高祖末年日食於歲首梁祖甚惡之於是素服避正殿百官各守本司是日有司奏雲初陰晦事同不蝕百寮奉表稱賀末帝龍德三年十月辛未朔日有食之唐莊宗同光三年四月癸亥朔時有司奏日食在卯主歲大旱明宗天成元年八月乙酉朔日有食之二年八月已卯朔日有食之三年二月丁丑朔日食其日陰雲不見百官稱賀長興元年六月癸已朔日食其日陰㝠不見至夕大雨二年十一月甲申朔先是司天奏朔日合食二分伏緣所食微少太陽光影相鑠伏恐不辨虧闕請其日不入閤百官守司從之晉高祖天福二年正月乙卯先是司天奏正月二日太陽虧蝕宜避正殿開諸營門蓋藏兵器半月不宜用軍是日太陽虧十分内蝕三分在尾宿十七度日出東方以帶蝕三分漸生至卯時復滿三年正月戊申朔司天先奏其日日食至是日不食内外稱賀四年七月庚子朔時中書門下奏謹按舊禮日有變天子素服避正殿太史以所司救日於社陳五兵五鼓五麾東㦸西矛南弩北楯中央置鼓服從其位百職廢務素服守司重列於庭每等異位向日而立明復而止今所司法物咸不能具去歲正旦日蝕唯謹藏兵仗皇帝避正殿素食百官守司今且欲依近禮施行從之七年四月甲寅朔是日百官守司太陽不蝕上表稱賀八月戊申朔日有蝕之少帝開運元年九月庚午朔日有蝕之二年八月甲子朔日有蝕之三年三月壬戌朔日有蝕之漢隱帝乾祐三年十一月甲子朔日有蝕之周太祖廣順二年四月丙戌朔日有蝕之月食梁太祖開平四年十二月十四日夜先是司天奏是日月食不宜用兵時王景仁方總大軍北伐追之不及至五年正月二日果為後唐莊宗大敗於柏鄉唐莊宗同光三年三月戊申月食九月甲辰月食明宗天成三年十二月乙卯月食四年六月癸丑望月食十二月庚戌月食晉高祖天福二年七月丙寅月食五年十一月丁丑月食鶉首之分少帝開運二年三月戊子月食九月丙戌月食漢高祖天福十二年十二月乙未月食周世宗顯德三年正月戊申月食五年十一月辛未月食月暈唐明宗天成元年十一月月暈匝火木彗孛梁太祖乾化二年四月甲戌夜彗見於靈臺之西唐明宗天成三年十月庚午夜西南有孛長丈餘東南指在宿五度末帝清泰三年九月乙丑彗出虚危長尺餘形細微經天壘哭星晉高祖天福六年九月有彗星長丈餘八年十月庚戌夜有彗見於東方西指尾長一丈在角九度周太祖顯德三年正月壬戌夜有星孛於參角甚芒指於東南五星凌犯梁太祖開平二年正月乙亥歲星犯月乾化二年五月壬戌熒惑犯心大星去心四度順行占曰心為帝王之星其年六月五日帝崩唐莊宗同光二年八月戊子熒惑犯星三年三月丙申熒惑犯上相四月甲申熒惑犯左執法六月丙寅歲犯右執法九月己亥熒惑在江東犯第一星案歐陽史九月丙辰太白歲相犯是書不載疑有闕文明宗天成元年八月癸卯太白犯心大星辛亥熒惑犯上將九月庚午熒惑犯右執法己卯熒惑犯左執法十月戊子熒惑犯上相十二月熒惑犯氐二年正月甲戌熒惑歲相犯二月辛卯熒惑犯鍵閉三月熒惑犯上相六月辛丑熒惑犯房九月壬子歲犯房三年正月壬申太白熒惑合於奎八月癸卯熒惑犯上將乙卯熒惑犯右執法庚午太白犯左執法九月庚辰鎮歲合於箕辛已太白熒惑合於軫十二月壬寅熒惑犯房太白歲相犯於斗四年三月壬辰歲犯牛九月丙子熒惑入哭星長興元年六月乙卯太白犯天罇十一月壬戌熒惑犯氐十二月丙辰熒惑犯天江二年正月乙亥太白犯羽林四月甲寅熒惑犯羽林八月辰犯端門十一月丙戌太白犯鍵三年四月庚辰熒惑犯積尸九月庚寅太白犯哭星十一月己亥太白犯壁壘四年八月己未五鼓三籌熒惑近天髙星歲星近司怪太白近軒轅大星案歐陽史九月辛已太白犯右執法是書不載末帝清泰元年六月甲戌太白犯右執法晉高祖天福元年三月壬子熒惑犯積尸四年四月辛已太白犯東井北轅甲申太白犯五諸侯五月丁未太白犯輿鬼中星六年八月辛卯太白犯軒轅九月己卯熒惑犯上將八年八月丙子熒惑犯右掖十月丙辰熒惑犯進賢少帝開運元年二月壬戌太白犯昴己巳熒惑犯天鑰四月丁已太白犯五諸侯七月甲申太白犯東井八月甲辰熒惑入南斗十月壬戌熒惑犯哭星案此條歐陽史不載十二月太白犯辰二年八月甲戌歲犯東井九月甲寅太白犯南斗魁十一月甲午朔太白犯哭星漢天福十二年十月己丑太白犯亢距星乾祐元年八月己丑鎮星入太微西垣戊戌歲犯右執法十月丁丑歲犯左執法二年九月壬寅太白犯右執法庚戌太白犯鎮丁卯太白犯歲十一月鎮星始出太微之左掖門自元年八月己丑鎮星入太微垣犯上將左右執法内屏謁者勾已往來凡四百四十三日方出左掖三年六月乙卯鎮犯左掖七月甲申熒惑犯司怪八月癸卯太白犯房庚戌太白犯心大星十月辛酉太白犯歲周廣順元年二月丁已歲犯咸池己未熒惑犯五諸侯三月甲子歲守心己卯熒惑犯鬼壬午熒惑犯天尸四月甲午歲犯鈎鈐二年七月熒惑犯井鉞八月乙未熒惑犯天罇九月辛酉熒惑犯鬼庚戌熒惑掩右執法十月壬辰太白犯進賢三年四月乙丑熒惑犯靈臺五年熒惑犯上將顯德六年六月庚子熒惑與心大星合度光芒相射先是熒惑勾已於房心間凡數月至是與心大星合度是夜順行案此條歐陽史不載星晝見唐同光三年六月己已太白晝見天成元年七月庚申太白晝見長興二年五月己亥歲星晝閏閏五己已歲星晝見八月戊子太白晝見三年十月壬申太白晝見四年五月癸卯太白晝見清泰元年五月己未太白晝見漢天福十三年四月丙子太白晝見乾祐二年四月壬午太白晝見周廣順二年二月庚寅太白經天流星梁乾化元年十一月甲辰東方有流星如數升器出畢宿口曵光三丈餘有聲如雷唐長興二年九月丙戌夜二皷初東北方有小流星入北斗魁滅至五皷初西北方次北有流星狀如半升器初小後大速流如奎滅尾迹凝天屈曲似雲而散光明燭地又東北有流星如大桃出下台星西北速流至斗柄第三星旁滅五皷後至明中天及四方有小流星百餘流注交橫應順元年春二月辛未夜有大星如五升器流於東北有聲如雷清泰元年九月辛丑夜五皷初有大星如五斗器而南流尾迹長數丈赤色移時盤屈如龍形蹙縮如二鏵相鬬而散又一星稍小東流有尾迹凝成白氣食頃方散晉天福三年三月壬申夜四皷後東方有大流星狀如三升器其色白長尺餘屈曲流出河鼓星東三尺流丈餘滅周顯德元年正月庚寅子夜後東北有大星墜有聲如雷牛馬震駭六街皷人方寐而驚以為曉鼓乃齊伐鼓以應之至曙方知之三月高平之役戰之前夕有大流星如日流行數丈墜於賊營之所雲氣梁開平二年三月丁丑夜月有蒼白暈又有白氣如人形十餘皆東向出於暈内九月乙酉平旦西方有氣如人形甚衆皆若俯伏之狀經刻乃散唐同光二年日有背氣凡十二三年九月丁未夜遍天陰雲北方有聲如雷四面雞雉皆雊俗謂之天狗落是歲日有背氣凡十三是月司天監奏自七月三日陰雲大雨至九月十八日後方晴三辰行度災祥數日不見閏十二月庚午日有黑氣似日交相錯磨測在室十度天成二年十二月壬辰西南有赤氣如火燄燄約二千里占者云不出二年其下當有大兵長興三年六月司天監奏自月初至月終每夜陰雲蔽天不辨星月應順元年四月九日白虹貫日是時閔帝遇害晉天福初高祖將建義於太原日傍多有五色雲如蓮芰之狀二年正月丙辰一鼓初北方有赤氣向西至戌亥地東北至丑地已來向北闊三丈餘狀如火光赤氣内見紫微宮共北斗諸星其氣乍明乍暗至三㸃後後有白氣數條相次西行直至三鼓後散漢乾祐二年十二月日暈三重上有背氣周顯德三年十二月庚午白虹貫日氣暈勾環舊五代史巻一百三十九
