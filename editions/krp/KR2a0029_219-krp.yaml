body:
  text: 舊五代史巻一百十宋門下侍郎參知政事監修國史薛居政等撰周書第一太祖紀一太祖聖神恭肅文武孝皇帝姓郭氏諱威字文仲邢州堯山人也或云本常氏之子㓜隨母適郭氏故冐其姓焉五代㑹要周虢叔之後高祖諱璟廣順初追尊為睿和皇帝廟號信祖陵曰温陵高祖妣張氏追諡睿恭皇后曽祖諱諶漢贈太保追尊為明憲皇帝廟號僖祖陵曰齊陵曽祖妣鄭國夫人申氏追諡明孝皇后祖諱藴漢贈太傅追尊為翼順皇帝廟號義祖陵曰節陵五代㑹要温陵齊陵節陵皆無陵所遥申朝拜祖妣陳國夫人韓氏追諡翼敬皇后皇考諱簡漢贈太師追尊為章肅皇帝廟號慶祖陵曰欽陵皇妣燕國夫人王氏追諡為章徳皇后后以唐天祐元年甲子嵗七月二十八日生帝于堯山之舊宅載誕之夕紅光照室有聲如爐炭之裂星火四迸帝生三嵗家徙太原居無何皇考為燕軍所陷殁于王事帝未及齠齔章德太后蚤世姨母楚國夫人韓氏提擕鞠養及長形神魁壯趨向竒崛愛兵好勇不事田産天祐末潞州節度使李嗣昭常山戰殁子繼韜自稱留後南結梁朝據城阻命乃散金以募豪傑帝時年十八避吏故關依故人常氏遂徃應募帝負氣用剛好鬭多力繼韜奇之或踰法犯禁亦多假借焉嘗逰上黨市有市屠壯健衆所畏憚帝以氣凌之因醉命屠割肉小不如意叱之屠者怒坦腹謂帝曰爾敢刺我否帝即剚其腹市人執之屬吏繼韜惜而逸之其年莊宗平梁繼韜伏誅麾下牙兵配從馬直帝在籍中時年二十一帝性聰敏喜筆劄及從軍旅多閲簿書軍志戎政深窮綮肯人皆服其敏嘗省昭義李瓊瓊方讀閫外春秋即取視之曰論兵也兄其教我即授之深通義理宋史李瓊傳唐莊宗募勇士即應募與周祖等十人約為兄弟一日㑹飲瓊熟視周祖知非常人因舉酒祝曰凡我十人龍蛇混合異日富貴無相忘茍渝此言神降之罰皆刺臂出血為誓周祖與瓊情好尤密嘗造瓊見其危坐讀書因問所讀何書瓊曰此閫外春秋所謂以正守國以竒用兵較存亡治亂記賢愚成敗皆在此也周祖令讀之謂瓊曰兄當教我自是周祖出入常䄂以自隨遇暇輙讀毎問難瓊謂瓊為師天成初明宗幸浚郊時朱守殷嬰城拒命帝從晉高祖一軍率先登城晉祖領副侍衞以帝長于書計召置麾下令掌軍籍前後將臣無不倚愛初聖穆皇后嬪于帝帝方匱乏而后多資從東都事畧柴后資周太祖以金帛使事漢高祖嘗晝寢有小虺五色出入顴鼻之間后遽見愕然在太原時有神尼與帝同姓見帝謂李瓊曰我宗天上大仙頂上有肉角當為世界主清泰末晉起于河東時河陽節度使張彦琪為侍衞歩軍都指揮使奉命北伐帝從之營于晉祠是時屋壞同處數人俱斃唯帝獨無所傷漢高祖為侍衞馬步都虞候召置左右所居官舍之鄰吳氏有青衣佳娘者為山魈所魅鬼能人言而投瓦石鄰伍無敢過吳氏之舍者帝過之其鬼寂然帝去如故如是者冄或謂鬼曰爾既神向者客來又何寂然鬼曰彼大人者繇是軍中異之范延光叛于魏命楊光遠討之帝當行意不願從或謂帝曰楊公當朝重勲子不欲從何也帝曰楊公素無英雄氣得我何用能用我其劉公乎漢祖累鎮藩閫皆從之及鎮并門尤深待遇出入帷幄受腹心之寄帝亦悉心竭力知無不為及吐渾白可乆叛入契丹帝勸漢祖誅白承福等五族得良馬數千匹財貨百萬計以資軍開運末契丹入汴晉帝北遷帝與蘇逢吉楊邠史𢎞肇等勸漢祖建號以副人望漢高祖即位晉陽時百度草創四方猶梗經綸締搆帝有力焉授權樞密副使檢校司徒漢高祖至汴正授樞密副使檢校太保乾祐元年春漢高祖不豫及大漸與蘇逄吉等同授顧命隱帝嗣位拜樞密使加檢校太尉舊制樞密使未加使相者不宣麻制至是宣之自帝始也東都事畧魏仁浦傳仁浦少為刀筆吏隸樞密院太祖問以卒乘數仁浦對曰帶甲者六萬太祖喜曰天下事不足憂也有頃河中李守貞據城反朝廷憂之諸大臣共議進取之計史𢎞肇曰守貞河陽一客司耳竟何能為帝曰守貞雖不習戎行然善接英豪得人死力亦勍敵宜審料之乃命白文珂常思率兵攻取師未至而趙思綰竊據永興王景崇反狀亦露朝廷遣郭從義王峻討趙思綰七月西面師徒大集未果進取其月十三日制授帝同平章事即遣西征以安慰招撫為名詔西而諸軍並取帝節度時論以白文珂常思非守貞之敵聞帝西行羣情大愜宋史李穀傳周祖討河中榖掌轉運時周祖巳有人望潛貯異志屢以諷穀穀但對以人臣當盡節奉上而巳八月六日帝𤼵離京師二十日師至河中宋史扈彦珂傳周祖為樞密使總兵出征時議多以先討景崇思綰為便周祖意未決彦珂曰三叛連衡推守貞為主宜先擊河中河中平則永興鳳翔失勢矣今捨近圖遠若景崇思綰逆戰于前守貞兵其後腹背受敵為之奈何周祖從其言命白文珂營于河西帝營于河東不數日周設長塹復築長連城以廹之帝在軍居常接賓客與大將讌語即襃衣博帶或遇巡城壘對陳敵幅巾短後與衆無殊臨矢石冐鋒刄必以身先與士伍分甘共苦稍立功効者厚其賜與微有傷痍者親為循撫士無賢不肖有所陳啓溫顔以接俾盡其情人之過忤未嘗介意故君子小人皆思効用守貞聞之深以為憂十二月帝以蜀軍屯大散關即親率牙兵徃鳳翔永興相度將發謂白文珂劉詞曰困獸猶鬭當謹備之帝至華州聞蜀軍退敗遂還二年正月五日夜李守貞遣將王三鐵領千餘人夜突河西砦果為劉詞等力戰敗之先是軍中禁酒帝有愛將李審犯令斬之以徇五月九日取河西砦主周光遜以砦及部衆千餘人來降十七日下令攻城㑹西北大風揚沙晦㝠帝令禱河伯祠奠訖而風止自是晝夜攻之七月十三日帝率三砦將士奪賊羅城二十一日城陷守貞舉家自焚而死帝前夢河神告曰七月下旬上帝當滅守貞之族至是收復賊壘城中人言見帝營上有紫氣如樓閣華蓋之狀東都事畧王漙傳周太祖將兵討三叛以溥為從事三叛既平朝士及藩鎮嘗以書徃來詞意渉于悖逆者太祖籍其名欲按之漙諫曰魑魅伺夜而出日月既照則氛沴消矣請焚之以安反側太祖從之二年八月五日帝自河中班師其月二十七日入朝漢帝命升階撫勞酌御酒以賜之鍚賚優厚翌日漢帝議賞勲欲兼方鎮帝辭之乃止帝以出征時㕔子都七十三人具籍獻之九月五日制加檢校太師兼侍中十月契丹入㓂前鋒至邢洺具魏河北告急帝受詔率師赴北邊以宣徽南院使王峻為監軍其月十九日帝至邢州遣王峻前軍趨鎮定時契丹巳退帝大閲欲臨㓂境詔止之三年二月班師三月十七日制授鄴都留守樞密使如故時漢帝以北戎為患委帝以河朔之任宰相蘇逢吉等議藩臣無兼樞密使例史𢎞肇以帝受任之重茍不兼密務則難以便宜從事竟從𢎞肇之議詔河北諸州凡事一禀帝節度帝將北行啓漢帝曰陛下富有春秋萬幾之事宜審于聽斷文武大臣乃心王室凡事諮詢即無敗失漢帝斂容謝之帝至鄴盡去煩弊之事不數月閫政有序一方晏然詔書褒羙一夕在山亭院齋中忽有黄氣起于前上際于天帝于黄氣中見星文紫微文昌爛然在目既而告之星者曰予于室中見天象不其異乎對曰坐見天衢物不能隔至貴之祥也異日牙署中有紫氣起于幡竿龍首凡三日十一月十四日澶州節度使李洪義侍衞步軍都指揮使王殷遣澶州副使陳光穗至鄴都報京師有變是月十三日旦羣小等害史𢎞肇等前一夕李業等遣心腹賫密詔至澶州令李洪義殺王殷又令䕶聖左廂都指揮使郭崇等害帝于鄴城十三日洪義受得密詔恐事不濟乃以密詔示王殷殷與洪義即遣陳光穗馳報于帝十四日帝方與宣徽使王峻坐議邊事忽得洪義文字遽歸牙署峻亦未知其事帝初知楊史諸公被誅神情惘然又見移禍及巳伸訴無所即集三軍將校諭之曰予從微至著輔佐國家先皇登遐親受顧托與楊史諸公彈壓經謀忘寢與食一旦無狀盡已誅夷令有詔來取予首級爾等宜奉行詔㫖斷予首以報天子各圖功業且不累諸君也崇等與諸將校泣于前言曰此事必非聖意即是左右小人誣罔竊發假令此輩握重柄國得安乎宜得投論以判忠佞何事信單車之使而自棄千載之下空受惡名崇等願從明公入朝面自洗雪除君側之惡共安天下衆然之遂請帝南行帝即嚴駕首途十六日至澶州王殷迎謁慟哭時隱帝遣小豎鸗脱偵鄴軍所在為游騎所執帝即遣迴令附奏隱帝赴闕之由仍以密奏置鸗脱衣領中奏曰臣發迹寒賤遭遇聖明既富且貴實過平生之望唯思報國敢有他圖今奉詔命忽令郭崇等殺臣即時俟死而諸軍不肯行刑逼臣赴闕令臣請罪上前仍言致有此事必是陛下左右譖臣耳今鸗脱至此天假其便得伸臣心三五日當及闕朝陛下若以臣有欺天之罪臣豈敢惜死若實有譖臣者乞陛下縳送軍前以快三軍之意則臣雖死無恨今託鸗脱附奏以聞十七日帝至滑州節度使宋延渥開門迎納帝將發滑臺召將士謂之曰主上為讒邪所惑誅殺勲臣吾之此來事不獲巳然以臣拒君寜論曲直汝等家在京師不如奉行前詔我以一死謝天子實無所恨將校前啓曰國家負公公不負國請公速行無遲乆安邦雪怨正在此時既王峻諭軍曰我得公處分俟平定京城許爾等旬日剽掠衆皆踊躍十九日隱帝遣左神武統軍袁義前鄧州節度使劉重進率禁軍來拒與前開封尹侯益等屯赤㟠是夜俱退二十日隱帝整陣于劉子陂二十一日兩陣俱列慕容彦超率軍奮擊帝遣何福進王彦超李筠等大合騎以乘之慕容彦超退却死者百餘人于是南軍奪氣稍稍奔于北軍慕容彦超與數十騎東奔兗州吳䖍裕張彦超等相繼來見帝是夜侯益焦繼勲潛至帝營帝慰勞遣還二十二日旦郭允明弑漢隱帝于北郊初官軍之敗帝謂宋延渥曰爾國親可速往衛主上兼附奏請陛下得便速奔臣軍免為左右所圖及延渥至亂兵雲合即惶駭而還是旦帝望見天子旌旗于高坡之上謂隱帝在其下既免胄釋馬而前左右慮有不測請帝止帝泣曰吾君在此又何憂焉及至前隱帝已去矣帝歔欷久之俄聞隱帝遇弑號慟不巳帝至𤣥化門劉銖雨射城外帝迴車自迎春門入諸軍大掠煙火四發帝止于舊第何福進以部下兵守明德門翌日王殷郭崇言曰若不止剽掠比夜化為空城耳由是諸將部分斬其剽者至晡乃定帝與王峻詣太后宫起居請立嗣君乃以高祖姪徐州節度使贇入繼大統語在漢紀二十七日帝以嗣君未至請太后臨朝㑹鎮定州馳奏契丹入冦河北諸州告急太后命帝北征十二月一日帝發離京師四日至滑州駐馬數日㑹湘隂公遣使慰勞諸將受宣之際相顧不拜皆竊言曰我輩陷京師各各負罪若劉氏復立則無種矣或有以其言告帝者帝愕然即時進途十六日至澶州是日旭旦日邊有紫氣來當帝之馬首十九日下令諸軍進發二十日諸軍將士大譟趨驛如墻而進帝閉門拒之軍士登墻越屋而入請帝為天子亂軍山積登階匝陛扶抱擁廹或有裂黄旗以被帝體以代赭袍山呼震地帝在萬衆之中聲氣沮喪悶絶數四左右親衞星散竄匿帝即登城樓稍得安息諸軍遂擁帝南行時河水初解浮梁未搆是夜北風凛烈比旦水堅可渡諸軍遂濟衆謂之凌橋濟竟氷泮時人異之時湘隂公巳駐宋州樞密使王峻在京聞澶州之變遣侍衞馬軍指揮使郭崇率七百騎赴宋州以衞湘隂公二十五日帝至七里店羣臣謁見遂營于臯門村二十七日漢太后令曰樞密使侍中郭威以英武之才兼内外之任剪除禍亂𢎞濟艱難功業格天人望冠世今則軍民愛戴朝野推崇宜總萬幾以允羣議可監國中外庶事並取監國處分二十八日監國詔曰寡人出自軍戎本無德望因緣際㑹叨竊寵靈高祖皇帝甫在經綸待之心腹洎登大位尋付重權當顧命之時受忍死之寄與諸勲舊輔立嗣君旋屬三叛連衡四郊多壘謬膺朝㫖委以專征兼守重藩俾當勍敵敢不横身戮力竭節盡心冀肅静于疆塲用保安于宗社不謂姦邪搆亂將相連誅偶脱鋒鋩克平患難志安劉氏願報漢恩推擇長君以紹丕搆遂奏太后請立徐州相公奉迎已在于道途行李未及于都輦尋以北面事急冦騎深侵遂領師徒徑往掩襲行次近鎮巳渡洪河十二月二十日將登澶州軍情忽變旌旗倒指喊呌連天引𬒮牽襟迫請為主環繞而逃避無所紛紜而逼脅愈堅頃刻之間安危莫保事不獲巳須至徇從于是馬歩諸軍擁至京闕今奉太后誥㫖以時運艱危機務難曠俾令監國遜避無由僶俛遵承夙夜憂愧云時文武百官内外將帥藩臣郡守等相繼上表勸進三十日夜御營西北隅歩軍將校因醉揚言昨澶州馬軍扶策今歩軍亦欲扶策尋令虞候詰其姓名昧旦擒而斬之其一軍仍納甲仗遣中使監送就糧所廣順元年春正月丁卯漢太后誥曰遂古巳來受命相繼是不一姓傳諸百王莫不人心順之則興天命去之則廢昭然事迹著在典書予否運所丁遭家不造姦邪搆亂朋黨横行大臣冤枉以被誅少主倉卒而及禍人自作孽天道寜論監國威深念漢恩切安劉氏既平亂略復正頽綱思固護于基扄擇繼嗣于宗室而獄訟盡歸于西伯謳謡不在于丹朱六師竭推戴之誠萬國仰欽明之德鼎革斯契圖籙有歸予作佳賓固以為幸今奉符寶授監國可即皇帝位於戯天禄在躬神器自至允集天命永綏兆民敬之哉是日帝自臯門入大内御崇元殿即皇帝位制曰自古受命之君興邦建統莫不上符天意下順人心是以夏德既衰爰啓有商之祚炎風不競肇開皇魏之基朕早事前朝乆居重位受遺輔政敢忘伊霍之忠仗鉞臨戎復委韓彭之任匪躬盡瘁焦思勞心討叛渙于河潼張聲援于岐雍竟平大憝粗立微勞纔旋斾于關西尋統兵于河朔訓齊師旅固䕶邊陲只將身許國家不以賊遺君父外憂少息内患俄生羣小連謀大臣遇害棟梁既壞社稷將傾朕方在藩維以遭讒搆逃一生于萬死徑赴闕庭梟四罪于九衢幸安區宇將延漢祚擇立劉宗徴命已行軍情忽變朕以衆庶所迫逃避無由扶擁至京尊戴為主重以中外勸進方岳推崇僶俛雖順于羣心臨御實慙于涼德改元建號祇率于舊章革故鼎新宜覃于霈澤朕本姬氏之遠裔虢叔之後昆積慶累功格天光表盛德既延于百世大命復集于𦕈躬今建國宜以大周為號可改漢乾祐四年為廣順元年自正月五日昧爽巳前應天下罪人常赦所不原者咸赦除之故樞密使楊邠侍衞都指揮使史𢎞肇三司使王章等以勞定國盡節致君千載逢時一旦同命悲感行路憤結重泉雖尋雪于沈冤宜更伸于渥澤並可加等追贈備禮歸葬葬事官給仍訪子孫叙用其餘同遭枉害者亦與追贈馬歩諸軍將士等戮力叶誠輸忠効義先則平持内難後乃推戴朕躬言念勲勞所宜旌賞其原屬將士等各與等第超加恩命仍賜功臣名號已帶功臣者别與改賜應左降官未量移者與量移巳量移者與復資巳復資者量加叙錄亡官失爵之人宜與齒用配流徒役人並許放還諸處有犯罪逃亡之人及山林草冦等一切不問如赦到後一月不歸本業者復罪如初内外前任見任文武官寮致仕官各與加恩應在朝文武臣寮内諸司使諸道行軍副使藩方馬歩都指揮使如父母在未有恩澤者即與恩澤巳有者更與恩澤如亡没未曽追封贈者亦與封贈巳封贈者更與封贈應天下州縣所欠乾祐元年二年巳前夏秋殘税及沿徴物色并三年夏税諸色殘欠並與除放澶州已來官路兩邉共二十里内并乾祐三年殘税欠税並與除放應河北沿邊州縣自去年九月後來曾經契丹蹂踐處其人户應欠乾祐三年終已前積年殘欠諸色税物並與除放應係三司主持錢穀敗闕場院官取乾祐元年終已前徴納外灼然無抵當者委三司分析聞奏天下倉場庫務宜令節度使專切鈐轄掌納官吏一依省條指揮不得别納㪷餘秤耗舊來所進羡餘物色今後一切停罷應乘輿服御之物不得過為華飾宫闈器用務從朴素太官常膳一切減損諸道所有進奉以助軍國之費其珍巧纖華及竒禽異獸鷹犬之類不得輙有獻貢諸無用之物不急之務並宜停罷帝王之道德化為先崇飾虚名朕所不取茍致治之未洽雖多端以奚為今後諸道所有祥瑞不得輙有奏獻古者用刑本期止辟今兹作法義切禁非蓋承弊之時非猛則姦兇難制及知勸之後在寛則典憲得宜相時而行庶臻中道今後應犯竊盜賊贓及和姦者並依晉天福元年已前條制施行應諸犯罪人等除反逆罪外其罪並不得籍没家産誅及骨肉一依格令處分天下諸侯皆有親戚自可慎擇委任必當克効參禆朝廷選差理或未當宜矯前失庶叶通規其先於在京諸司差軍將充諸州郡元從都押衙孔目官内知客等並可停廢仍勒却還舊處職役近代帝王陵寢合禁樵採唐莊宗明宗晉高祖各置守陵十户以近陵人户充漢高祖皇帝陵署職員及守宫人時日薦饗并守陵人户等一切如故仍以晉漢之胄為二王後委中書門下處分云司天上言今國家建號以木德代水准經法國以姓墓為臘請以未日為臘從之時議者曰昔武王勝殷嵗集于房國家受命金木集于房文王厄羑里而卦遇明夷帝脱于鄴大衍之數復得明夷則周為國號符于文武矣先是丁未年夏六月土金木火四星聚于張占者云當有帝王興于周者故漢祖建國由平陽陜服趨洛陽以應之及隱帝將嗣位封周王以符其事而帝以姬虢之胄復繼宗周而天人之契炳然矣昔武王以木徳王天下宇文周亦承木德而三朝皆以木代水不其異乎戊辰前曹州防禦使何福進受宣權許州節度使前復州防禦使王彦超受宣權徐州節度使前澶州節度使李洪義受宣權宋州節度使已已上漢太后尊號曰昭聖皇太后是日詔有司擇日為故主發哀五代㑹要載原勅云漢高祖為義帝發喪魏明帝正禅陵尊號一時達禮千古所稱況朕乆事前朝常參大政雖遷虞事夏見奪于羣情而四海九州咸知予夙志宜令所司擇日為故主舉哀仍備山陵葬禮辛未有司上言皇帝為故主舉哀日服縞素直領深衣腰經等成服畢祭奠不視朝七日坊市禁音樂文武内外臣寮成服後毎日赴太平宫臨三日止七日釋服至山陵啓攢塗日服初服輴車出城班辭釋服從之壬申前博州刺史李筠受宣權滑州節度使癸酉樞密使檢校太傅王峻加同平章事以前澶州節度使李洪義為宋州節度使加同平章事以滑州節度副使陳觀為左散騎常侍鄴都留守判官王溥為左諫議大夫並充樞密院直學士以元從都押衙鄭仁誨爲客省使知客押牙向訓為宫苑使北京留守劉崇遣押牙鞏廷美致書求劉贇歸藩帝報曰朕在澶州之時軍情推戴之際先差來直省李光美備見必想具言而況遐邇所聞在後盡當知悉湘隂公比在宋州駐泊見令般取赴京但勿憂疑必令得所惟公在彼固請安心若能同力扶持别無顧慮即當便封王爵永鎮北門鐵契丹書必無愛惜其諸情素並令來人口宣遣千牛衞將軍朱憲充入契丹使先是去年契丹永康王烏裕冦邢趙陷内丘及迴鄂約遣使與漢隱帝書通鑑契丹之攻内邱也死傷頗多又値月食軍中多妖異契丹主不敢深入引兵還遣使請和于漢使至境上㑹朝廷有蕭墻之變帝定京城迴至澶州遇蕃使至遂與入朝至是遣朱憲伴送來使歸蕃兼致書叙革命之由仍以金酒器一副玉帶一遺鄂約晉州節度使王晏殺行軍司馬徐建以通河東聞乙亥鄆州節度使守太師兼中書令齊王高行周進位尚書令襄州節度使檢校太師守太傅兼中書令齊國公安審琦進封南陽王青州節度使檢校太師守太保兼中書令魏國公符彦卿進封淮陽王䕫州節度使侍衞親軍馬步軍都指揮使檢校太傅王殷加同平章事充鄴都留守典軍如故丙子帝赴太平宫為漢隱帝發喪百官陪位如儀是日湘隂公元從右都押衙鞏廷美教練使楊温等據徐州以拒命帝遣新授節度使王彦超率兵馳赴之仍賜廷美等勅書通鑑帝復遺劉贇書曰爰念斯人盡心于主足以賞其忠義何由責以悔尤俟新節度入城當各除刺史公可更以委曲示之丁丑荆南高保融奏去年十一月朗州節度使馬希蕚破潭州十二月十八日縊殺馬希廣至十九日希蕚自稱天策上將軍武平靜江寜遠等軍節度使嗣楚王戊寅湘隂公殂已卯以前太師齊國公馮道為中書令𢎞文館大學士以司徒兼門下侍郎同平章事𢎞文館大學士竇貞固為侍中兼修國史以左僕射平章事集賢殿大學士蘇禹珪為守司空平章事夏州節度使李彞興進封隴西郡王荆南高保融進封渤海郡王靈武馮暉進封陳留郡王西京白文珂兗州慕容彦超鳳翔趙暉並加兼中書令詔王彦超率兵攻徐州庚辰故樞密使左僕射平章事楊邠追封恒農郡王故宋州節度使兼侍衞親軍都指揮使史𢎞肇追封鄭王故三司使檢校太尉平章事王章追封瑯琊郡王是日詔曰朕以𦕈末之身託于王公之上懼徳弗類撫躬靡遑豈可化未及人而過自奉養道未方古而不知節量與其耗費以勞人曷若儉約而克已昨者所頒赦令巳述至懷宫闈服御之所須悉從減損珍巧纖竒之厥貢並使寢停尚有未該再宜條舉應天下州府舊貢滋味食饌之物所宜除減其兩浙進細酒海味薑𤓰湖南枕子茶乳糖白沙糖橄欖子鎮州高公米水梨易定栗子河東白社梨米粉菉豆粉玉屑籸子麵永興御田紅秔米新大麥麵興平蘇栗子華州麝香羚羊角熊膽獺肝朱柿熊白河中樹紅棗五味子輕鍚同州石𨫼餅晉絳葡萄黄消梨陜府鳳栖梨襄州紫薑新筍橘子安州折粳米糟味青州水梨河陽諸雜果子許州御李子鄭州新筍鵝梨懷州寒食杏仁申州蘘荷亳州萆薢㳂淮州郡淮白魚如聞此等之物雖皆出于土産亦有取于民家未免勞煩率皆糜費加之力役負荷馳驅道途積于有司之中甚為無用之物今後並不須進奉諸州府更有舊例所進食味其未該者宜奏取進止又詔在朝文武臣僚各上封事凡有益國利民之事速具以聞通鑑詔曰朕生長軍旅不親學問未知治天下之道文武官有益國利民之術各具封事以聞咸宜直書其事勿事辭藻辛已鎮州武行徳晉州王晏相州張彦成潞州常思邠州侯章並加兼侍中以侍衞馬軍都指揮使果州防禦使檢校太保郭崇為洋州節度使檢校太𫝊典軍如故以侍衞歩軍都指揮使岳州防禦使曹英為利州節度使檢校太𫝊典軍如故癸未涇州史懿延州高允權滄州王景永興郭從義定州孫方簡並加兼侍中鄜州楊信同州薛懷讓貝州王繼𢎞並加同平章事乙酉華州王饒河中扈彦珂鄧州折從阮邢州劉詞並加同平章事丙戌幸西莊潞州奏得石㑹關使王延美報河東劉崇於正月十六日僭號丁亥以前澶州節度使李洪義為宋州節度使加同平章事以曹州防禦使北面行營馬歩都排陣使何福進為許州節度使加檢校太𫝊以博州刺史北面行營右廂排陣使李筠為滑州節度使加檢校太保戊子有司上言准赦書以晉漢之胄為二王後其唐五廟仲祀合廢從之庚寅宗正寺奏請依晉漢故事遷漢七廟神主入昇平宫行仲享之禮以漢宗子為三獻從之舊五代史巻一百十
