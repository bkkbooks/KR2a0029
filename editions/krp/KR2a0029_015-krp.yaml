  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0029_WYG_015-1a, image: WYG0277/WYG0277-0083a.png}
body:
  text: 舊五代史巻七宋門下侍郎參知政事監修國史薛居正等撰梁書第七太祖紀七乾化二年正月宣上元夜任諸市及坊市各㸃彩燈金吾不用禁夜近年以來以都下聚兵太廣未嘗令坊市㸃燈故也甲申以時雪久愆命丞相及三省官羣望祈禱詔曰謗木求規集囊貢事將禆理道豈限側言應内外文武百官及草澤竝許上封事極言得失以丁審衢為陳州而審衢厚以鞍馬金帛為謝恩之獻帝慮其漁民復其獻而停之封保義節度使王檀為琅琊郡王命供奉官朱嶠于河南府宣取先收禁定州進奉官崔騰竝傔從一十四人竝釋放仍命押領送至貝騰唐户部侍郎㓗之子也廣明䘮亂客于北諸侯為定州節度使王處存所辟去載領貢獻至闕未幾其帥稱兵遂縶之至是帝念賓介之來人已出境特命縱而歸焉丙戌有司以孟春太廟薦享上言命丞相杜曉攝祭行事丙申夕熒惑犯房第二星二月庚戌中和節御崇勲殿召丞相大學士河南尹畧封訖于萬春門外廡賜以酒食五代㑹要二月追封故魏博節度使羅𢎞信為趙王癸丑勅曰今載春寒頗甚雨澤仍愆司天監占以夏秋必多霖潦宜令所在郡縣告喻百姓備淫雨之患庚申御宣威殿開宴丞相洎文武官屬咸被召列侍竟日而罷壬戌帝將巡按北境中外戒嚴詔以河南尹守中書令判六軍事張宗奭為大内畱守中書門下奏差定文武官領務尤切宜扈駕者三十八人詔工部尚書李皎左散騎常侍孫騭左諫議大夫張衍兵部侍郎劉邈兵部郎中張雋光禄少卿盧秉彛竝令扈蹕甲子發自雒師夕次河陽通鑑云至白馬頓賜從官食多未至遣騎趣之于路左散騎常侍孫騭右諫議大夫張衍兵部郎中張雋最後至帝命撲殺之乙丑次温縣丙寅次武陟懐州刺史叚明逺迎拜于境上其内外所備咸豐霈焉丁卯次獲嘉戊辰次衛州之新鄉己己晨發衛夕止淇門内衙十將使以十指揮兵士至于行在辛未駐蹕黎陽癸酉發自黎陽夕次内黄甲戌次昌樂縣丁丑次于永濟縣青州節度使賀德倫奏統領兵士赴歴亭軍前戊寅至貝州命四丞相及學士李琪盧文度知制誥竇賞等十五人扈從其左常侍韋戩等二十三人止焉己卯發自貝州夕駐蹕于野落三月庚辰朔次于棗彊縣之西原通鑑辛己至下博南登觀津冢趙將符習引數百騎巡邏不知是帝遽前逼之或告曰晉兵大至矣帝棄行幄亟引兵趣棗强與楊師厚軍合丙戌鎮定諸軍招討使楊師厚奏下棗彊縣車駕即日疾馳南還丁亥復至貝州庚寅楊師厚與副招討李周彛等准詔來朝辛卯詔丞相翰林六學士文武從官都招討使及諸軍統指揮使等賜食于行殿壬辰命以羊酒等各賜從官甲午幸貝州之東闉閲武乙未帝復幸東闉閲騎軍敕以攻下棗彊縣有功將校杜暉等一十一人竝超加檢校官衙官宋彦等二十五人竝超授軍職丙午次濟源縣詔曰淑律將遷亢陽頗甚宜令魏州差官祈禱龍潭戊申詔曰雨澤愆期祈禱未應宜令宰臣各于魏州靈祠精加祈禱五代㑹要三月詔曰夫隆興邦國必本于人民惠養疲嬴凡資于令長苟選求之踰濫固撫理之乖違如聞吏部擬官中書降授或縁親舊所請或為勢要所于姑徇私情靡求才實兹念蠧弊宜舉條章今後應中書用人及吏部注擬竝宜省蕃身之才業騐為政之否臧必有可觀方可任用如或尚行請説猶假貨財其所司人吏必當推窮重加懲斷四月己酉幸魏州金波亭賜宴宰臣文武官及六學士甲寅夕月掩心大星丙辰勅近者星辰違度式在修禳宜令兩京及宋州魏州取此月至五月禁斷屠宰仍各于佛寺開建道塲以迎福應已未次黎陽縣通鑑乙卯博王友文來朝請帝還東都丁己發魏州己未至黎陽以疾淹畱東都畱守官吏奉表起居賜丞相從官酒食有差己巳至東都博王友文以新創食殿上言并進准備内宴錢三千貫銀器一千五百兩辛未宴于食殿召丞相及文武從官等侍焉帝泛九曲池御舟傾帝堕溺于池中宫女侍官扶持登岸驚悸久之制加建昌宫使金紫光禄大夫檢校司徒開封尹博王友文為特進檢校太保兼開封尹依前建昌宫使充東都畱守戊寅車駕發自東京夕次中牟縣五月己卯朔從官文武自丞相而下竝詣行殿起居親王及諸道藩帥咸奉表來上庚辰發鄭州至榮陽河南尹魏王宗奭望塵迎拜河陽畱後贊懐州刺史叚明逺等邐迤來迎夕次汜水縣帝召魏王宗奭入對便于御前賜食數刻乃退壬午駐蹕于汜水宰臣河南尹六學士竝于内殿起居敕以建昌宫事委宰臣于兢領之五代㑹要其年六月廢昌宫以河南尹魏王張宗奭為國計使凡天下金榖兵戎舊𨽻建昌宫者悉主之癸未帝發自汜水宣令邵贊叚明逺各歸所理午憇任村頓夕次孝義宫畱都文武禮部尚書孔續而下道左迎拜次偃師甲申至都文武臣奉迎于東郊渤海遣使臣貢宰臣薛貽矩抱恙在假不克扈從宣問旁午仍命且駐東京以俟良愈及薨帝震悼頗久命雒苑使曹守璫往弔祭之又命輟六日七日八日朝參丞相文武竝詣上閤門進名奉慰丁亥以彗星謫見詔兩京見禁囚徒大辟罪以下逓減一等限三日内疏理訖聞奏五代㑹要彗見于靈臺之西至五月始降赦宥罪以答天譴又云五月壬戌夜熒惑犯心大星去心四度順行司天奏大星為帝王之星宜修省以答天譴詔曰生育之人爰當暑月乳哺之愛方及薰風儻肆意于刲屠豈推恩于長養俾無殄暴以助發生宜令兩京及諸州府夏季内禁斷屠宰及採捕天民之窮諒由賦分國章所在亦務興仁所在鰥寡孤獨廢疾不濟者委長吏量加賑䘏史載葬枯用彰軫恤禮稱掩骼將致和平應兵戈之地有暴露骸骨委所在長吏差人專功收瘞國癘之文尚標七祀良藥之市亦載三醫用憐無告之人宜徴有喜之術凡有疫之處委長吏檢尋醫方于要路曉示如有家無骨肉兼困窮不濟者即仰長吏差醫給藥救療之辛卯詔曰亢陽滋甚農事已傷宜令宰臣于兢赴中嶽杜曉赴西嶽精切祈禱其近京靈廟宜委河南尹五帝壇風師雨師九宫貴神委中書各差官祈之通鑑閏月壬戌帝疾甚謂近臣曰我經營天下三十年不意太原餘孽更昌熾如此吾觀其志不小天復奪我年伐死諸兒非彼敵也吾無葬地矣因哽咽絶而復蘇帝長子郴王友裕早卒次假子友文帝特愛之常畱守東都兼建昌宫使次郢王友珪其母亳州營倡也為左右控鶴都指揮使次均王友貞為東都馬步都指揮使初元貞張皇后嚴整多智帝敬憚之后殂帝縱意聲色諸子雖在外常徴其婦入侍帝往往亂之友文婦王氏色美帝尤寵之雖未以友文為太子帝意常屬之友珪心不平友珪常有過帝撻之友珪益不自安帝疾甚命王氏召友文于東都欲與之訣且付以後事友珪婦張氏亦朝夕侍帝側知之密告友珪曰大家以傳國寳付王氏懐往東都吾屬死無日矣夫婦相泣左右或説之曰事急計生何不改圖時不可失六月丁丑朔帝命敬翔出友珪為萊州刺史即令之官己宣㫖未行勅時左遷者多追賜死友珪益恐戊寅友珪易服微入左龍虎軍見統軍韓勍以情告之勍亦見功臣宿將多以小過被誅懼不自保遂相與合謀勍以牙兵五百人從友珪雜控鶴士入伏于禁中夜斬關入至寢殿侍疾者皆散走帝驚起問反者為誰友珪曰非它人也帝曰我固疑此賊恨不早殺之汝悖逆如此天地豈容汝乎友珪曰老賊萬叚友珪僕夫馮廷諤刺帝腹刄出于背友珪自以敗氈裹之瘞于寢殿秘不發䘮遣供奉官丁昭溥馳詣東都命均王友貞殺友文己卯矯詔稱博王友文謀逆遣兵突入殿中賴郢王友珪忠孝將兵誅之保全朕躬然疾因震驚彌致危殆宜令友珪權主軍國之務韓勍為友珪謀多出府庫金帛賜諸軍及百官以取悦辛己丁昭溥還聞友文己死乃發䘮宣遺制友珪即帝位友珪塟太祖于伊闕縣號宣陵五代㑹要太祖崩年六十一中書侍郎平章事杜曉撰哀冊文門下侍郎平章事趙光逄撰諡冊文太常卿李燕撰諡議史五代史補太祖朱全忠黄巢之先鋒巢入長安以刺王鐸圍同州太祖遂降鐸承制拜同州刺史黄巢滅淮蔡間秦宗權復盛朝廷以淮蔡與汴州相接太祖汴人必究其能否遂移授宣武軍節度使以討宗權未幾滅之自是威福由己朝廷不能制遂有天下先是民間傳讖曰五公符又謂之李淳風轉天歌其字有八牛之年識者以八牛乃朱字則太祖革命之應焉太祖之用兵也法令嚴峻每戰逐隊主帥或有没而不反者其餘皆斬之謂之跋隊斬自是戰無不勝然健兒且多竄匿州郡疲于追捕因下令文面健兒文面自此始也昭五代史闕文世傳梁太祖迎昭宗于鳯翔素服待臯宗佯為鞵系脱呼梁祖曰全忠為吾繫鞵梁祖不得己跪而結之流汗浹背時天子扈蹕尚有衛兵昭宗意謂左右擒梁祖以殺之其如無敢動者自是梁祖被召多不至盡去昭宗禁衛皆用汴人矣臣謹案梁祖以天復三年迎唐昭宗于岐下嵗在甲子其年改天祐至國初建隆庚申嵗纔五十六年矣然則乾徳七十嵗人皆目覩其事葢唐室自懿宗失政天下亂離故武宗以下實録不傳于世昭宗一朝全無記注梁祖在位止及六年均帝朝詔史臣修梁祖實録岐下繫鞵之事恥而不書晉天福中史臣張昭重修唐史始有昭宗本紀但云即位之始有㑹昌之風岐陽事迹不能追補此亦明唐昭宗有英睿之氣而衰運不振又明左右無忠義奮發之臣致梁祖得行其志有所警誡不可不書舊五代史巻七
