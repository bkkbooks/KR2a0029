body:
  text: 舊五代史巻一百三十八宋門下侍郎參知政事監修國史薛居正等撰外國列傳二吐蕃本漢西𦍑之地或云南凉秃髪利鹿孤之後其子孫以秃髪為國號語訛為吐蕃國人號其主為贊普置大論小論以理國事其俗随畜牧無常居然亦有城郭都城號邏些城不知節侯以麥熱為嵗首唐時屢為邉患初唐分天下為十道河西隴右三十三州凉州最為大鎮天寶至八監牧馬三十萬又置都䕶以控制之安禄山之亂肅宗在靈武悉召河南戍卒收復兩京吐蕃乗虛取河西隴右華人百萬皆䧟於吐蕃開成時朝廷常遣使至西城見甘凉𤓰沙等州城邑如故䧟吐蕃之人見唐使者旌節夾道迎呼涕泣曰皇帝猶念䧟吐蕃生靈否其人皆天寶中䧟吐蕃者子孫其語言小訛而衣服未改至五代時吐蕃已㣲弱回鶻党項諸𦍑夷分侵其地而不有其人民值中國衰亂不能撫有惟甘凉𤓰沙四州常自通於中國甘州為回鶻牙帳而凉𤓰沙三州將吏猶稱唐官數來請命自梁太祖時常以靈武節度使兼領河西節度而觀察甘肅威等州然雖有其名而凉州自立守將唐長興四年凉州留後孫超遣大將拓㧞承謙及僧道士耆老楊通信等至京師明宗拜孫超節度使清㤗元年留後李文謙來請命後數年凉州人逐出文謙靈武馮暉遣牙將吴繼興代文謙為留後是時天福七年明年晉高祖遣涇州押牙陳延暉賫詔書安撫凉州凉州人共刼留延暉立以為刺史至漢隠帝時凉州留後折逋嘉施來請命漢即以為節度使嘉施土豪也周廣順二年嘉施遣人市馬京師是時樞密使王峻用事峻故人申師厚者少起盗賊為衮州牙將與峻相友善後峻貴師厚弊衣蓬首曰侯峻出馬前訴以饑寒峻未有以發而嘉施等來請帥峻即建言凉州深入夷狄中國未嘗命吏請帥募府率供奉官能徃者月餘無應募者乃奏起師後為左衛将軍己而拜河西節度使師厚去凉州奏薦押牙副使崔虎心陽妃谷首領沈念般等及中國留人子孫王廷翰温崇樂劉少英為將吏又自安國鎮至凉州立三州以控扼諸羗用其酋豪為刺史然凉州以夏雜處師厚小人不能撫有至世宗時師厚留其子而逃歸凉州遂絶於中國獨𤓰沙二州終五代常來沙州梁開平中有節度使張奉自號金山白衣天子至唐莊宗時回鶻來朝沙州留後曹義金亦遣使附回鶻以來莊宗拜義金為歸義軍節度使𤓰沙等州觀察處置等使晉天福五年義金卒子元徳立至七年沙州曹元忠𤓰州曹元深皆遣使來周世宗時又以元忠為歸義軍節度使元恭為瓜州團練使其所貢碙砂羚羊角波斯錦安西白㲲金星礬大鵬沙眊褐玉團皆因其來者以名見而其卒立世子史皆失其紀而吐蕃不見於梁世唐天成三年回鶻王仁喻來朝吐蕃亦遣使附以來自此數至中國明宗常御端明殿見其使者問其牙帳所居曰西去涇州三千里明宗賜以虎皮人一張皆披以拜委身宛轉落其氊㡌髮亂如蓬明宗及左右皆大笑至漢隠帝時猶來朝後遂不復至史亦失其君世云回鶻其先匃奴之種也後魏時號為鐡勒亦名回紇唐元和四年本國可汗遣使上言改為回鶻義取廻旋搏擊如鶻之迅㨗也本牙在天徳西北婆陵水上距京師八千餘里唐天寶中安祿山犯闕有助國討賊之功累朝尚主自號天驕大為唐朝之患㑹昌初其國為黠戞斯所侵部族擾亂乃移帳至天徳振武間時為石雄劉沔所襲破之復為幽州節度使張仲武所攻餘衆西奔歸於吐蕃吐蕃處之甘州由是族帳㣲弱其通中國世以中國為舅朝廷每賜書詔亦常以甥呼之梁乾化元年十一月遣都督周易言等入朝進供太祖御朝元殿引對以易言為右監門衛大將軍同正以石壽兒石論思竝為右千牛衛將軍同正仍以左監門衛將軍楊沼充押領回鶻還蕃使通事舍人五代㑹要以易言為右監門衛大将軍同正弟畧麥之石論思竝為右千牛衝將軍同正李屋珠安塩山竝為右千牛衛將軍同正仍以左監門衛上将軍楊沼為左驍衛上将軍充押領回鶻還蕃使通事舍人仇𤣥通為判官厚賜繒帛放令歸國又賜其入朝僧凝盧宜李思宜延籛等紫衣後唐同光二年四月其本國權知可汗仁美遣都督李引釋迦副使鐡林都監楊福安等共六十六人來貢方物并獻善馬九匹莊宗召對於文明殿乃命司農卿鄭繢将作少監何延嗣持節冊仁美為英義可汗至其年十一月仁美卒其弟狄銀嗣立遣都督安千等朝貢狄銀卒毆陽史同光四年狄寧卒阿咄欲令亦遣使來貢名馬天成三年二月其權知可汗仁裕遣都督李阿山等一百二十人入貢明宗召對於崇元殿賜物有差其年三月命使冊仁裕為仁化可汗四年又遣都督掣撥等五人來朝授掣撥等懐化司戈遣令還蕃長興元年十二月遣使翟未思三十餘人進馬八十匹玉一團四年七月復遣都督李未等三十人來朝進白鶻一聯明宗召對於廣壽殿廣加錫賚仍命解放其鶻清㤗二年七月遣都督陳福海已下七十八人進馬三百六十匹玉二十團八月勑回鶻朝貢使宻録都督陳福海可懐化郎将副使逹奚相温可懐化司階監使屈宻録阿撥可歸徳司戈判官安均可懐化司戈晉天福三年十月遣使都督李萬全等朝貢以萬全為歸義大將軍監使雷福徳為順化將軍四年三月又遣都督拽里敦來朝兼貢方物其月命衛尉卿邢徳昭持節就冊為奉化可汗毆陽史晉高祖時又加冊命阿咄欲不知其為狄銀親疏亦不知卒而仁裕訖五代常代常來朝貢史亦失其紀五年正月遣都督石海金等來貢良馬百駟并白玉團白玉鞍轡等謝其封冊漢乾祐元年五月遣使李屋等入朝貢馬并白玉藥物等七月以入朝使李屋為歸徳大將軍副使安鐡山監使未相温為歸徳將軍判官翟毛哥為懐化將軍周廣順元年二月遣使並麾尼貢玉團七十有七白㲲貂皮氂牛尾藥物等先是晉漢己來回鶻每至京師禁民以私市易其所有寶貨皆鬻之人官民間市易者罪之至是周太祖命盡去舊法每回鶻來者聼私下交易官中不得禁詰繇是玉之價直十損七八顯徳六年二月又遣使朝貢獻玉並碙砂等物皆不納所入馬量給價錢時世宗以玉雖稱寶無益國用故因而却之高麗本扶餘之别種其國都平壤城即漢樂浪郡之故地在京師東四千餘里東渡海至於新羅西北渡遼水至於營州南渡海至於北濟北至靺鞨東西三千一百里南北二千里其官大者號大對盧比一品總知國事三年一代若稱職名不拘年限對盧已下官總十二級外置州縣六餘大城置傉薩一人比都督小城置道使一人比刺史其下各有僚佐分曹掌事其王以白羅為冠白皮小帶咸以金餙唐貞觀末太宗伐之不能下至總章初高宗命李勣率軍征之遂㧞其城分其地為郡縣及唐之末年中原多事其國遂自立君長前王姓高氏唐同光氏成中累遣使朝貢周顯徳六年高麗遣使貢紫白水晶二千顆渤海靺鞨其俗呼其王為可毒夫對靣呼聖牋奏呼基下父曰老王母曰太妃妻曰貴妃長子曰副王諸子曰王子世以大氏為酋長黒永靺鞨其俗皆編髪性凶悍無憂戚貴壯而賤老俗無文字兵器有角弓楛矢新羅其國俗重元曰相慶賀每以是月拜日月之神婦人以髪繞頭用綵其珠為餙髪甚鬒美党項其俗皆土着居有棟宇織毛罽以覆之尚武其人多壽至百五十六十嵗不事生業好為盗賊党項自同光以後大姓之强者各自來朝貢明宗時詔㳂邉置埸市馬諸夷皆入市國中有回鶻党項馬最多明宗招懐逺人馬來無駑壮皆集而所售過常直徃來館給道路倍費其每至京師明宗為御殿見之勞以酒食既醉連袂歌呼道其土風以為樂去又厚以賜賫嵗耗百萬計唐大臣皆患之數以為言乃詔吏就邉埸售馬給直止其來朝而党項利其所得來不可止其在靈慶之間者數犯邉為盗自河西回鶻朝貢中國道其部落輙邀刼之執其使者賣之佗族以易牛馬明宗遣靈武康福邠州藥彦稠等出兵討之福等擊破阿埋韋悉褒勒强頼埋厮骨尾及其大首領連香李八薩王都統悉那埋摩侍御乞埋嵬悉逋等族殺數千人獲其牛羊鉅萬計及其所刼外國寶玉等悉以賜軍士由是党項之患稍息其佗諸族散處㳂邉界上甚衆然皆無國邑君長故莫得而紀次云昆明部落其俗椎髻跣足酋長披虎皮下者披氊於闐其俗好事妖神占城本地鳥之大者有孔雀䍧牱蠻其國法刼盗者三倍還贜殺人者出牛馬三十頭乃得贖死舊五代史巻一百三十八
