body:
  text: 舊五代史巻一百二十八宋門下侍郎叅知政事監修國史薛居正等撰周書第十九列傳九王朴字文伯東平人也父序以朴貴贈左諫議大夫朴幼警慧好學善屬文漢乾祐中擢進士第解褐授校書郎依樞密使楊邠館于邠第是時漢室寖亂大臣交惡朴度其必危因乞告東歸未幾李業輩作亂害邠等三族凡遊其門下者多被其禍而朴獨免國初世宗鎮澶淵朝廷以朴為記室及世宗為開封尹拜右拾遺充開封府推官世宗嗣位授比部郎中賜紫二年夏世宗命朝廷文學之士二十餘人各撰䇿論一首以試其才時朴獻平邊䇿云唐失道而失吳蜀晉失道而失幽并觀所以失之由知所以平之術當失之時莫不君暗政亂兵驕民困近者姦于内逺者叛于外小不制而至于大大不制而至于僭天下離心人不用命吳蜀乗其亂而竊其號幽并乗其間而據其地平之之術在乎反唐晉之失而已必先進賢退不肖以清其時用能去不能以審其材恩信號令以結其心賞功罰罪以盡其力恭儉節用以豐其財徭役以時以阜其民俟其倉廩實器用備人可用而舉之彼方之民知我政化大行上下同心力强財足人和将和有必取之勢則知彼情状者願為之間諜知彼山川者願為之先導彼民與此民之心同是與天意同與天意同則無不成之功攻取之道從易者始當今吳國東至海南至江可撓之地二千里從少備處先撓之備東則撓西備西則撓東必奔走以救其弊奔走之間可以知彼之虚實衆之强弱攻虚擊弱則所向無前矣勿大舉但以輕兵撓之彼人怯知我師入其地必大發以來應數大發則必民困而國竭一不大發則我獲其利彼竭我利則江北諸州乃國家之所有也既得江北則用彼之民揚我之兵江之南亦不難而平之也如此則用力少而收功多得吳則桂廣皆為内臣岷蜀可飛書而召之如不至則四面並進席巻而蜀平矣吳蜀平幽可望風而至惟并必死之冦不可以恩信誘必須以强兵攻之然其力已喪不足以為邊患可為後圗候其便則一削以平之方今兵力精練器用具備羣下知法諸将用命一稔之後可以平邊此歳夏秋便可于沿邊貯納臣書生也不足以講大事至于不達大體不合機變望陛下寛之世宗覽之愈重其器識未幾遷左諫議大夫知開封府事初世宗以英武自任喜言天下事常憤廣明之後中土日蹙值累朝多事尚未克復慨然有包舉天下之志而居常計事者多不喻其㫖惟朴神氣勁峻性剛决有斷凡所謀畫動惬世宗之意由是急于登用尋拜左散騎常侍充端明殿學士知府如故是時初廣京城朴奉命經度凡通衢委巷廣袤之間靡不由其心匠及世宗南征以朴為東京副留守車駕還京改户部侍郎兼樞密副使未幾遷樞密使檢校太保頃之丁内艱尋起復授本官四年冬世宗再幸淮甸兼東京留守京邑庶務悉以便宜制之比及入蹕都下肅如也黙記引閒談録云朴性剛烈大臣藩鎮皆憚之世宗收淮南俾朴留守時以街巷隘狹例從展拆朴怒廂校弛慢于通衢中鞭背數十其人忿然歎云宣補廂虞候豈得便從决朴微閒之命左右擒至立斃于馬前世宗聞之笑謂近臣曰此大愚人去王朴面前誇宣補廂虞候宜其死矣六年三月世宗令樹斗門于汴口不踰時而歸朝是日朴方過前司空李穀之第交談之頃疾作而仆于座遽以肩舁歸第一夕而卒時年四十五黙記云王朴仕周世宗制禮作樂考定聲律正星歴修刑統百廢俱起又取三關取淮南皆朴為謀然事世宗纔四年耳使假之壽考安可量也世宗聞之駭愕即時幸其第及柩前以所執玉鉞卓地而慟者數四贈賻之類率有加等優詔贈侍中宋史王侁傳朴卒世宗幸其第召見諸孤以侁為東頭供奉官朴性敏鋭然傷于太剛毎稠人廣座之中正色髙談無敢觸其鋒者故時人雖服其機變而無恭懿之譽其筆述之外多所該綜至如星緯聲律莫不畢殫其妙所撰大周欽天歴及律準並行于世黙記云周世宗于禁中作功臣閣畫當時大臣如李穀鄭仁誨之屬太祖即位一日過功臣閣風開半門正與朴像相對太祖望見卻立聳然整御袍襟帶磬折鞠躬左右曰陛下貴為天子彼前朝之臣禮何過也太祖以手指御袍云此人在朕不得此袍著其敬畏如此太五代史闕文周顯徳中朴與魏仁浦俱為樞密使時祖皇帝已掌禁兵一日有殿直乗馬誤衝太祖導從太祖自詣密地訴其無禮仁浦令徽院勘詰朴謂太祖曰太尉名位雖髙未加使相殿直廷臣也與太尉比肩事主太尉况帶職不宜如此太祖唯唯而出臣謹案朴之行事傳于人口者甚衆而史氏闕書臣聞重修太祖實録已于李穀傳中見朴遺事今復補其大者况太祖太宗在位毎稱朴有上輔之器朝列具聞楊凝式華隂人也游宦紀聞載凝式年譜云唐咸通十四年癸巳凝式是年生故題識多自稱癸巳人又别傳去凝式景度父涉唐末梁初再登台席罷相守左僕射卒歐陽史楊涉傳云祖收父嚴呉縝簒誤云收與嚴乃兄弟非父子也又游宦紀聞載楊氏家譜云唐修行楊氏系出越公房本出中山相結次子繼生洛州刺史暉暉生河間太守恩恩生越恭公鈞出居馮翊至藏器徒潯陽唐相楊收之父曰遺直生四子名皆從又曰發假收嚴以四時為義故發之子名皆從木假之子從火收之子從金嚴之子從木嚴生涉涉生凝式而收乃藏器之兄涉之伯也新五代史記唐六臣傳乃以收為涉之祖嚴之父非也凝式體雖蕞眇而精神穎悟宣和書譜云凝式形貌寢侻然精神矍然要大于身富有文藻大為時輩所推唐昭宗朝登進士第解褐授度支巡官再遷祕書郎直史館梁開平中為殿中侍御史禮部員外郎三川守齊王張宗奭見而嘉之請以本官充留守巡官梁相趙光𦙍素重其才奏為集賢殿直學士改考功員外郎唐同光初授比部郎中知制誥尋以心疾罷去改給事中史館修撰判館事明宗即位拜中書舍人復以心疾不朝而罷長興中歴右常侍工戸二部侍郎以舊恙免改祕書監清泰初遷兵部侍郎唐末帝按兵于懐覃凝式在扈從之列頗以心恙諠譁子軍砦末帝以其才名優容之詔遣歸洛晉天福初改太子賓客尋以禮部尚書致仕閒居伊洛之間恣其狂逸多所干忤自居守以降咸以俊才耆徳莫之責也晉開運中宰相桑維翰知其絶俸艱于家食奏除太子少保分司于洛漢乾祐中歴少傅少師太祖總兵凝式候于軍門且以年老不任戎事上訴太祖特為奏免之廣順中表求致政尋以右僕射得請顯徳初改左僕射又改太子太保並懸車元年冬卒于洛陽年八十五詔贈太子太傅凝式長于歌詩别傳云凝式詩什亦多雜以詼諧少從張全義辟故作詩紀全義之徳云洛陽風景實堪哀昔日曽為瓦子堆不是我公重葺理至今猶自一堆灰他類若此張從恩尹洛凝式自汴還時飛蝗蔽日偶與之俱凝式先以詩寄曰押引蝗蟲到洛京合消郡守逺相迎從恩弗怪也然凝式詩自佳其題壁有院似禪心靜花如覺性圎清麗可喜善于筆扎洛川寺觀藍牆粉壁之上題紀殆徧時人以其縱誕有風子之號焉别傳云凝式雖仕歴五代以心疾閒居故時人目以風子其筆迹遒放宗師歐陽詢與顔真卿而加以縱逸既久居洛多遨遊佛道祠遇山水勝槩輒留連賞詠有垣牆圭缺處顧視引筆且吟且書若與神㑹率寳䕶之其號或姓名或時稱癸巳人或稱楊虚白或稱希維居士或稱關西老農其所題後或真或草不可原詰而論者謂其書自顔中書後一人而已其佯狂之迹甚著卜第于尹京之側遇入府前輿後馬猶以為遲乃杖䇿徒行市人隨笑之嘗迫冬家人未挾纊㑹有故人過洛贈以緜五十兩絹百端凝式悉留之修行尼舍俾造韈以施崇徳普明兩寺飯僧其家雖號寒啼飢而凝式不屑屑也留守聞其事乃自製衣給米遺之凝式笑謂家人曰我固知留守必見賙也每旦起將出僕請所之楊曰宜東遊廣愛僕又曰不若西遊石壁寺凝式舉鞕曰姑遊廣愛僕又以石壁為請凝式乃曰姑遊石壁聞者拊掌五代史補楊凝式父涉為唐宰相太祖之篡唐祚也涉當送傳國璽時凝式方冠諫曰大人為宰相而國家至此不可謂之無過而更手持天子印綬以付他人保富貴其如千載之後云云何其宜辭免之時太祖恐唐室大臣不利于已徃徃隂使人來探訪羣搢紳之士及禍甚衆渉常不自保者數日忽聞凝式言大駭曰汝滅吾族于是神色沮喪恐事泄即日遂佯狂時人謂之楊風子也薛仁謙守守訓代居河東近世徙家于汴今為浚儀人也父延魯仕唐為汝州長史累贈吏部尚書仁謙謹厚廉恪深通世務梁鄴王羅紹威甚重之累署府職唐莊宗即位于魏授通事舍人梁開平中三聘于吳得使者之體遷衛尉少卿引進副使累加檢校兵部尚書長興中轉客省使鴻臚少卿出為建雄軍節度副使進階光禄大夫檢校左僕射改光禄少卿晉天福初授檢校司空河中節度副使歸朝為衛尉太僕二卿丁繼母憂居喪制滿授司農卿漢乾祐中以本官致仕周初改太子賓客致仕仍加檢校司徒進封侯爵顯徳三年冬以疾終年七十八贈工部尚書初仁謙隨莊宗入汴也有舊第為梁朝六宅使李賓所據時賓逺適而仁謙復得其第或告云賓之家屬厚藏金帛在其第内仁謙立命賓親族盡出所藏而後入焉論者美之子居正皇朝門下侍郎平章事蕭愿字惟恭梁宰相頃之子也頃明宗朝終于太子少保唐書有傳初愿之曽祖倣唐僖宗朝入相接客之次愿為兒童戲效傳呼之聲倣謂客曰余豈敢以得位而喜所幸奕世壽考吾今又有曽孫在目前矣愿弱冠舉進士第解褐為校書郎改畿尉直史館監察殿中侍御史遷比部員外右司郎中太常少卿明宗朝祀太微宫愿乗醉預公卿之列為御史所彈左遷右贊善大夫未幾授兵部郎中復金紫丁内艱服闋自左司郎中拜右諌議大夫歴給事中右常侍祕書監改太子賓客廣順元年春卒贈禮部尚書愿性純謹承事父母未嘗不束帶而見然性嗜酒無節職事弛慢為兵部郎中日常掌告身印覃恩之次頗怠職司父頃為吏部尚書代愿視印篆其散率如此愿卒時年七十餘其母猶在一門壽考人罕及者盧損其先范陽人也近世任于嶺表父潁遊宦于京師損少學為文梁開平初舉進士性頗剛介以髙情逺致自許與任贊劉昌素薛鈞髙總同年擢第所在相詬時人謂之相罵牓及任贊劉昌素居要切之地而損自異不相親狎時左丞李琪素薄劉昌素之為人常善待損琪有女弟眇長年婚對不售乃以妻損損慕琪聲稱納之及琪為輔相致損仕進梁貞明中累遷至右司員外郎唐天成初由兵部郎中史館修撰轉諫議大夫屢上書言事詞理淺陋不為名流所知清泰中盧文紀作相密與損參議時政初長興中唐末帝鎮河中損嘗為加恩使副及末帝即位用為御史中丞拜命之日以自前憲司不能振舉綱領俾風俗頽壊乃大為條奏而有平明放鑰日出守端之語大為士人嗤鄙有頃誤詳赦書失出罪人停任晉天福中復為右散騎常侍轉祕書監大失所望即拜章辭位乃授戸部尚書致仕退居潁川時少保李鏻年將八十善服氣導引損以鏻之遐齡有道術酷慕之仍以潁川逼于城市乃卜居陽翟誅茅種藥山衣野服逍遥于林圃之間出則柴車鶴氅自稱具茨山人晚年與同輩五六人于大隗山中疏泉鑿坯為隠所誓不復出山久之齒髮不衰似有所得廣順三年秋卒時年八十餘贈太子少傅王仁裕字徳輦天水人少孤不從師訓年二十五方有意就學一夕夢剖其腸胃引西江水以浣之又睹水中砂石皆有篆文因取而吞之及寤心意豁然自是姿性絶髙案以下有闕文輿地紀勝云王仁裕知貢舉時所取進士三十三人皆一時名公卿李昉王溥為冠有詩萬餘首勒成百巻目之曰西江集葢以嘗夢吞西江文石遂以為名焉輿地紀勝仁裕所著有紫泥集西江集入洛記共百巻後為兵部尚書太子少保卒裴羽字用化唐僖宗時宰相䞇之子也羽少以父任為河南壽安尉入梁遷御史臺主簿改監察御史唐明宗時為吏部郎中使于閩遇颶風飄至錢塘時安重誨用事削奪吳越王封爵羽被留于錢塘經歳不得歸後重誨死吳越復通中國羽始得還晉初累遷禮部侍郎太常卿廣順初為左散騎常侍卒贈工部尚書羽之使閩也正使陸崇卒于吳越羽載其喪還歸其橐裝時人義之段希堯河内人也祖約定州户掾贈太常少卿父昶晉州神山縣令累贈太子少保希堯少有器局累歴州縣唐天成中為衛州録事叅軍㑹晉髙祖作鎮于鄴聞其勤幹奏改洺州糾曹及晉祖鎮太原辟為從事清泰中晉祖總戎于代北一日軍亂遽呼萬歳晉髙祖惑之希堯曰夫兵猶火也弗戢将自焚遽請戮其亂首乃止明年晉祖将舉義于太原召賓佐謀之希堯極言以拒之晉祖以其純朴弗之咎也晉祖龍飛霸府舊僚皆至達官惟希堯止授省郎而已天福中稍遷右諌議大夫尋命使于吳越及乗舟汎海風濤暴起檝師僕從皆相顧失色希堯謂左右曰吾生平履行不欺暗室昭昭天鑒豈無祐乎汝等但以吾為託必當無患言訖而風止乃獲利渉使迴授萊州刺史檢校尚書右僕射未赴任改懐州六年秋移棣州刺史兼榷鹽礬制置使少帝嗣位加檢校司空開運中歴户部兵部侍郎漢初遷吏部侍郎判東西兩銓事國初拜工部尚書世宗嗣位轉禮部尚書顯徳三年夏卒于洛陽時年七十九贈太子少保子思恭右諫議大夫司徒詡字徳音清河郡人也父倫本郡督郵以清白稱詡少好讀書通五經大義弱冠應鄉舉不第唐明宗之鎮邢臺詡徃謁之甚見禮遇命試吏于邯鄲歴永年項城令皆有能名長興初唐末帝鎮河中奏辟為從事未幾徵拜左補闕史館修撰秦王從榮之開府也朝廷以詡為户部員外郎充河南府判官秦王遇害以例貶寧州司馬清泰初入為兵部員外郎晉祖踐阼改刑部郎中充度支判官樞密直學士由兵部郎中遷左諫議大夫給事中充集賢殿學士判院事轉左散騎常侍工部侍郎歴知許齊亳三州事漢初除禮部侍郎凡三主貢部自起部貳卿不數年間徧歴六曹由吏部侍郎拜太子賓客世宗即位授太常卿時世宗留意于雅樂議欲考正其音而詡為足疾所苦居多假告遂命以本官致仕顯徳六年夏卒于洛陽之私第年六十有六贈工部尚書詡善談論性嗜酒喜賓客亦信浮圗之教漢乾祐中嘗使于吳越航海而徃至渤澥之中睹水色如墨舟人曰其下龍宫也詡因炷香興念曰龍宫珍寳無用俟迴棹之日當以金篆佛書一帙用伸䞇獻洎復經其所遂以經一圅投于海中俄聞梵唄絲竹之音喧于舡下舟人云此龍王來迎其經矣同舟百餘人皆聞之無不歎訝焉邊蔚字得昇長安人父操華州下邽令累贈太子少師宋史邊珝華州鄭人也曽祖頡石泉令祖操下邽令父蔚太常卿蔚幼孤篤學有鄉里譽從交辟歴晉陜華三府從事唐莊宗之伐蜀大軍出于華下時屬華方闕帥蔚為記室詔令權領軍府事供億軍儲甚有幹濟之稱及明宗入洛遣李冲齎詔于關右盡誅閹官冲性深刻而華人有為閹官所累者冲欲盡戮之蔚以理救䕶獲免者甚衆毛璋之鎮邠寧奏為廉判時璋為麾下所惑有跋扈之意蔚因乗間極言諭以逆順之理璋即時遣其子入貢朝廷以蔚有贊畫之效錫以金紫改許州戎判晉天福初自涇州戎幕徴拜虞部員外郎鹽鐡判官歴開封廣晉少尹晉少帝嗣位拜左散騎常侍判廣晉府事轉工部左右侍郎再知開封府事開運初出為亳州防禦使為政清肅亳民感之歳餘入為户部侍郎漢初拜御史中丞轉兵部侍郎太祖受命復知開封府事遷太常卿後以足疾辭位顯徳二年冬卒于家時年七十一子玕珝俱仕皇朝為省郎王敏字待問單州金鄉人性純直少力學攻文登進士第後依杜重威凡歴數鎮從事漢初重威叛于鄴時敏為留守判官嘗泣諫重威懇請歸順重威始雖不從及其窮也納敏之言以其城降時魏之飢民十猶四五咸保其餘生者敏之力也入朝拜侍御史世宗鎮澶淵太祖以敏謹厚遂命為澶州節度判官及世宗尹正王畿改開封少尹世宗嗣位權知府事旋拜左諫議大夫給事中遷刑部侍郎敏嘗以子壻陳南金薦于曹州節度使李繼勲表為記室其後繼勲僨軍于壽春及歸闕而無待罪之禮世宗以繼勲武臣不之責也因遷怒南金謂其禆贊無状乃黜之敏由是連坐遂免其官歳餘復拜司農卿顯徳四年秋以疾卒舊五代史巻一百二十八
