body:
  text: 舊五代史巻四十四攷證唐明宗紀十以端明殿學士尚書兵部侍郎劉昫為中書侍郎平章事案歐陽史劉昫𫝊作長興三年拜中書侍郎兼刑部尚書同中書門下平章事與本紀繫年先後互異見呉縝纂誤二月癸丑朔案上文正月為戊寅朔則二月不得為癸丑朔原文疑有舛誤帝於便殿問范延光内外見管馬數案錦繡萬花谷引薛史作范延慶疑𫝊冩之訛以刑部侍郎劉贊為秘書監刑部侍郎通鑑作兵部侍郎歐陽史從是書以著作佐郎尹拙為左拾遺直史館案五代會要尹拙為左拾遺王慎徽為右拾遺並直史館是書闕載王慎徽戊子帝不豫案歐陽史本紀十月壬申幸上和亭得疾家人𫝊十一月戊子雪明宗幸宫西上和亭得傷寒疾紀𫝊互異見吳縝纂誤壬辰天下大元帥守尚書令兼侍中秦王從榮領兵陣于天津橋内出禁軍拒之從榮敗奔河南府遇害案五代春秋作壬午誅從榮蓋𫝊冩之訛歐陽史及通鑑並從是書作壬辰舊五代史巻四十四攷證
