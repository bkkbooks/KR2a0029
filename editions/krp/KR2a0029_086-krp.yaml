body:
  text: 舊五代史巻四十二攷證唐明宗紀八壬申契丹東丹托雲自渤國國率衆到闕案托雲歸唐五代春秋作二年正月蓋以到闕之日為據歐陽史作四年十一月丙戌盖以奏聞之日為據以沙州節度使曹義金兼中書令沙州原本作汝州今據通鑑改正甲寅以遂州節度使夏魯竒没于王事廢朝案通鑑庚月庚午李仁罕䧟遂州夏魯竒自殺毆陽史作四月甲寅董璋䧟遂州武信軍節度使夏魯竒死之蓋歐陽史以奏聞之日為䧟城之月也見禁囚徒除死罪外並放案歐陽史作乙卯以旱赦流罪以下囚與是書作壬子異詔安重誨宜削奪在身官爵並妻阿張男崇贊崇緒等並賜死案重誨見殺是書作閏月已亥歐陽史作閏五月丁酉五代春秋作五月以前黔州節度使楊漢賔為羽林統軍漢賔原本作漢章考上文有雲州節度使楊漢章不應黔州節度使與之同名今據通鑑改正辛亥詔五坊見在鷹準之類並可就山林解放辛亥歐陽史作丁亥通鑑從是書托雲舊作突欲今改哩衮舊作惕隱今正托古舊則骨今改錫里扎拉舊作舍利則剌今改勒古舊作棫骨今改格斯齊舊作竭失訖今改舊五代史巻四十二攷證
