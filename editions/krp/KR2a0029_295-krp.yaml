body:
  text: 舊五代史巻一百四十九宋門下侍郎參知政事監修國史薛居正等撰志十一職官志夫官非位無以分貴賤位非品無以定高卑是以歴代史官咸有所紀皆窮源而討本期與世以作程迨乎唐祚方隆𤣥宗在宥採累朝之故事考衆職之遐源申命才臣著成六典其勲階之等級品職之重輕則已備載於其中矣故今之所撰不敢相沿祖述五代之命官以踵百王之垂範或釐革升降則謹而志之俾後之為天官卿者得以觀焉梁開平三年三月詔升尚書令為正一品按唐六典尚書正二品是時以將授趙州王鎔此官故升之後唐天成四年八月詔曰朝廷每有將相恩命凖往例諸道節度使帶平章事兼侍中中書令並列銜於勑牒後側書使字今兩浙節度使錢鏐是元帥尚父與使相名殊承前列銜乆未改正湖南節度使馬殷先兼中書令之時理宜齒於相位今守太師尚書令是南省官資不合列署勑尾今後每署將相勑牒宜落下錢鏐馬殷官位仍永為常式梁開平二年四月改左右丞為左右司侍郎避廟諱也至後唐同光元年十月復舊為左右丞後唐長興元年九月詔曰臺轄之司官資並設左右貂素來相類左右揆不至相懸以此比方豈宜分别自此宜升尚書右丞官品與左丞並為正四品右都省後唐長興四年九月勑馮贇有經邦之茂業宜進位於公台但縁平章事字犯其父名不欲斥其家諱可改同平章事為同中書門下二品後至周顯德中樞密使呉廷祚亦加同中書門下二品避其諱也晉天福五年二月勑以門下侍郎中書侍郎並為清望正三品九月詔曰六典云中書舎人掌侍奉進奏參議表章凡詔旨制勑璽書策命皆按故事起草進畫既下則署而行之其禁有四一曰漏洩二曰稽緩三曰違失四曰忘誤所以重王命也古昔已來典實斯在爰從近代别創新名今運屬興王事從師古俾仍舊貫以耀前規其翰林學士院公事宜並歸中書舎人七年五月中書門下上言有司檢尋長興四年八月二十一日勑凖官品令侍中中書令正三品按會要大歴二年十一月陞為正二品左右常侍從三品按會要廣德二年五月陞為正三品門下中書侍郎正四品大歴二年十一月陞為正三品諫議大夫正五品按續會要會昌二年十二月陞為正四品以備中書門下四品之闕御史大夫從三品會昌二年十二月陞為正三品御史中丞正五品亦與大夫同時陞為正四品勑宜各凖元勑處分仍添入令文永為定制又詔門下侍郎班在常侍之下俸禄同常侍周顯德五年六月勑諌議大夫宜依舊正五品上仍班位在給事中之下按唐典諌議大夫四員正五品上皆隸門下省班在給事中之下至會昌二年十一月中書門下奏陞為正四品下仍分為左右以備兩省四品之闕故其班亦陞在給事中之上近朝自諌議大夫拜給事中者官雖序遷位則降等至是以其遷次不備故改正焉右兩省後唐清泰二年十一月制以前同州節度使檢校太尉同平章事馮道為守司空時議者曰自隋唐以來三公無職事自非親王不恒置於宰臣為加官無單置者道在相位時帶司空及罷鎮未命官議者不練故事率意行之及制出言議紛然或云便可綜中書門下事或云須册拜開府及就列無故事乃不就朝堂叙班臺官兩省官入就列方入宰臣退踵後先退劉昫又以罷相為僕射出入就列一與馮道同議者非之及晉天福中以李鏻為司徒周廣順初以竇貞固為司徒蘇禹珪為司空遂以為例議者不復有云右三公後唐天成元年夏六月以李琪為御史大夫自後不復除其年冬十一月丙子諸道進奏官上言今月四日中丞上事臣等禮合至臺比期不越前規依舊傳語忽䝉處分通出尋則再取指揮要明審的又䝉問大夫相公上事日如何臣等訴云大夫曾為宰相進奏官伏事中書事體之間實為舊吏若以别官除授合云傳語勞來又堅令通出臣等出身藩府不會朝儀拒命則恐有奏聞遵稟則全隳則例伏恐此後到臺參賀儀則不定者詔曰御史臺是大朝執憲之司乃四海繩違之地凡居中外皆不整齊藩侯尚展於公參邸吏豈宜於抗禮遽觀論列可驗侮輕但以喪亂孔多紀綱隳紊霜威掃地風憲銷聲今則景運惟新皇圖重正稍加提舉漸止澆訛宜令御史臺凡闗舊例並須舉行如不稟承當行朝典時盧文紀初拜中丞領事於御史府諸道進奏官來賀文紀曰事例如何臺吏喬德威等言朝廷在長安日進奏官見大夫中丞如胥吏見長官之禮及梁氏將革命本朝微弱諸藩強據人主大臣姑息邸吏時中丞上事邸吏雖至皆於客次傳語竟不相見自經兵亂便以為常文紀令臺吏諭以舊儀相見據按端簡通名賛拜邸吏輩既出怒不自勝相率於閤門求見騰口喧訴明宗謂趙鳳曰進奏官比外何官鳳對曰府縣發遞祗候之流也明宗曰乃吏役耳安得慢吾法官乃下此詔晉天福五五年二月以御史中丞為清望正四品按唐典御史中丞正五品上今始升之三年三月壬戌御史臺奏按六典侍御史掌糾舉百寮推鞫獄訟居上者判臺知公廨雜事次知西推贓贖三司受事次知東推理匭勑宜依舊制遂以駕部員外郎兼侍御史知雜事劉皥為河南尹自是無省郎知雜者開運二年八月勑御史臺凖前朝故事以郎中員外郎一人兼侍御史知雜事近年停罷獨委年深御史知雜振舉之間紀綱未峻宜遵舊事庻叶通規宜却於郎署中選清慎強幹者兼侍御史知雜事右御史臺昔唐朝擇中官一人為樞密使以出納帝命職官分紀唐樞密使與兩軍中尉謂之四貴天祐元年廢項安世家說唐於政事堂後列五房有樞密房以主曹務則樞密之任宰相主之未始他付其後寵任宦人始以樞密歸之内侍至梁開平元年五月改樞密院為崇政院始命敬翔為院使仍置判官一人自後改置副使一人二年十一月置崇政院直學士二員選有政術文學者為之其後又改為直崇政院後唐同光元年十月崇政院依舊為樞密院命宰臣郭崇韜兼樞密使亦置直院一人晉天福四年四月以樞密副使張從恩為宣徽使權廢樞密院故也先是晉祖以宰臣桑維翰兼樞密使懇求免職只在中書遂以宣徽使劉處讓代之每有奏議多不稱旨其後處讓丁憂乃以樞密印付中書門下故有是釐改也開運元年六月勅依舊置樞密院以宰臣桑維翰兼樞密使從中書門下奏請也周顯德六年六月命司徒平章事范質禮部尚書平章事王溥並參知樞密院事梁開平元年四月始置建昌院以博王友文判院事以太祖在藩時四鎮所管兵車賦稅諸色課利按舊簿籍而主之其年五月中書門下奏請以判建昌院事為建昌宫使仍以東京太祖潛龍舊宅為宫也二年二月以侍中案原本有闕文据五代會要以侍中韓建判建昌宫事判建昌宫事至十月以尚書兵部侍郎李皎為建昌宫副使三年九月以門下侍郎平章事薛貽矩兼延資庫使判建昌宫至四年十二月以李振為建昌宫副使乾化二年五月以門下侍郎平章事于兢兼延資庫使判建昌宫事其年六月廢建昌宫以河南尹魏王張宗奭為國計使凡天下金榖兵戎舊𨽻建昌宫者悉主之至後唐同光四年二月以吏部尚書李琪為國計使自後廢其名額不置後唐同光元年十一月以左監門衛將軍判内侍省李紹宏兼内勾凡天下錢榖簿書悉委裁遣自是州縣供帳繁費議者非之又内勾之名人以為不祥之言二年正月勑鹽鐵度支户部三司凡闗錢物並委租庸使管轄踵梁之舊制也天成元年四月詔廢租庸院依舊為鹽鐵户部度支三司委宰臣一人專判長興元年八月以許州節度使張延朗行工部尚書充三司使班在宣徽使之下三司置使自延朗始也唐朝已來户部度支掌泉貨鹽鐵時置使名户部度支則尚書省本司郎中侍郎判其事天寶中楊慎矜王鉷楊國忠繼以聚貨之術媚上受寵然皆守户部度支本官别帶使額亦無所改作下及劉晏第五琦亦如舊制自後亦以宰臣各判一司不置使額乾符後天下兵興隨處置租庸使以主調發兵罷則停梁時乃置租庸使專天下泉貨莊宗中興秉政者不閑典故踵梁朝故事復置租庸使以魏博故吏孔謙專使務斂怨於下斵喪王室者實租庸之弊故也洎明宗嗣位思革其弊未及下車乃詔削除使名但命重臣一人判其事曰判三司至是延朗自許州入再掌國計白於樞密使請置三司名宣下中書議其事宰臣以舊制覆奏授延朗特進行工部尚書充諸道鹽鐵轉運等使兼判户部度支事從舊制也明宗不從竟以三司使為名焉梁開平三年正月改思政殿為金鑾殿至乾化元年五月置大學士員始命崇政院使敬翔為之前朝因金巒坡以為門名與翰林院相接故為學士者稱金鑾焉梁氏因之以為殿名仍改巒為鑾從美名也大學士與三館大學士同青箱雜記梁祖都汴庻事草創貞明中始於今右長慶門東北創小屋數十間為三館湫隘尤甚又周廬徼道咸出其間衛士騶卒朝夕喧雜每受詔撰述皆移他所後唐天成元年五月勑翰林學士尚書户部侍郎知制誥馮道翰林學士中書舎入趙鳳俱以本官充端明殿學士非舊號也時明宗登位每四方書奏多令樞密使安重誨讀之不曉文義於是孔循獻議始置端明殿學士之名命道等為之二年正月勑端明殿學士宜令班在翰林學士上今後如有轉改仍只於翰林學士内選任初置端明殿學士名目如三館之例職在官下趙鳳轉侍郎遣人諷任圜移職在官上至今為例職官分紀晉天福五年廢端明殿學士開運元年桑維翰為樞密使復奏置學士同光元年四月置䕶鑾書制學士以尚書倉部員外郎趙鳳為之時莊宗初建號故特立此名非故事也八月賜翰林學士承旨户部尚書盧質論思匡佐功臣亦非常例也天成三年八月勑掌綸之任擢才以居或自初命而升或自顯秩而授蓋重厥職靡繫其官雖事分皆同而行綴或異誠由往日未有定規議官位則上下不恒論職次則後先未當宜行顯命以正近班今後翰林學士入院並以先後為定惟承旨一員出自朕意不計官資先後在學士之上仍編入翰林志其年十一月勑新除翰林學士張昭逺早踐綸闈乆司史筆曾居憲府累陟貳卿今既擢在禁林所宜别宣班序其立位宜次崔梲宋史張昭傳晉天福二年宰相桑維翰薦昭為翰林學士内署故事以先後入為次不繫官序特詔昭立位次承旨崔梲據宋史則此勑當在晉天福中是書繫於唐天成三年後疑原本有脫誤晉開運元年六月勑翰林學士與中書舎人分為兩制各置六員偶自近年權停内署况司詔命必在深嚴將使從宜却仍舊貫宜復置翰林學士院周顯德五年十一月詔曰翰林學士職係禁庭地居親近與班行而既異在朝請以宜殊起今後當直下直學士並宜令逐日起居其當直學士仍赴晚朝舊制翰林院學士與常參官五日一度起居時世宗欲令朝夕謁見訪以時事故有是詔右内職後唐天成三年五月詔曰開府儀同三司階之極太師官之極封王爵之極上柱國勲之極近代已來文臣官階稍高便授柱國歲月未深便轉上柱國武資不計何人初官便授上柱國官爵非無次第階勲備有等差宜自此時重修舊制今後凡是加勲先自武騎尉經十二轉方授上柱國永作成規不令踰越雖有是命竟不革前例右勲格後唐清泰二年秋九月庚申尚書考功上言今年五月翰林學士程遜所上封事内請自宰相百執事外鎮節度使刺史應係公事官逐年書考較其優劣遂檢尋唐書六典會要考課令書考第從之時議者曰考績之法唐堯三代舊制西漢以刺史六條察郡守五曹尚書綜庻績法尤精察吏有檢繩漢末亂離舊章弛廢魏武於軍中權制品第議吏清濁用人按吏頓爽前規隋唐已來始著於令漢代郡守入為三公魏晉之後政在中書左右僕射知政事午前視禁中午後視省中三臺百職無不統攝以是論之宰輔慿何較考自天寶末權置使務已後庻事因循尚書諸司漸致有名無實廢墜已乆未知慿何督責程遜所上亦未詳本源其時所司雖有舉明大都諸官亦無考較之事右較考梁開平元年四月詔開封府司録叅軍及六曹椽屬宜各置一員兩畿赤縣置令簿尉各一員二年十月省諸道州府六曹掾屬只留户曹一員通判六曹後唐同光元年十一月中書門下奏諸寺監各請只置大卿監祭酒司業各一員博士兩員其餘官屬並請權停惟太常寺事闗大禮大理寺事闗刑法除太常博士外許更置丞一員其王府及東宫屬司天五官正奉御之類凡不急司存並請未議除授其諸司郎中員外郎應有雙曹處且署一員左右㪚騎常侍諌議大夫給事中起居郎起居舎人補闕拾遺各置一半三院侍御史仍委御史中丞條理申奏即日停罷朝官仍各録名氏具罷任月日留在中書候見任官滿二十五箇月並據資品却與除官從之周顯德五年十二月詔兩京五府少尹司録叅軍先各置兩員起今後只置一員六曹判司内只置戸曹法曹各一員其餘及諸州支使兩蕃判官並省右增减梁開平元年五月改御食使為司膳使小馬坊使為天驥使文思院使為乾文院使同和院使為儀鸞院使其年又改城門郎為門局郎避廟諱也唐同光元年十一月依舊為城門郎後唐天成元年十一月詔曰雄武軍節度使官銜内宜兼押蕃落使職官分紀長興元年分飛龍院為左右院以小馬坊為右飛龍院二年七月詔曰頃因本朝親王遥鎮其在鎮者遂云副大使知節度事但年代已深相沿未改今天下侯伯並正節旄惟東西兩川未落副大使字宜令今後只言節度使晉天福五年四月丙午詔曰承㫖者承時君之㫖非近侍重臣無以稟朕命宣予言是以大朝會宰臣承㫖草制詔學士承㫖若無區别何表等威除翰林承㫖外殿前承㫖宜改為殿直密院承㫖宜改為承宣御史臺三司闔門客省所有承旨並令别定其名周廣順二年十二月詔改左右威衛復為屯衛避御名也右改制後唐同光二年三月中書門下奏糾轄之任時謂外臺宰字之官古稱列爵如非朝命是廢國章近日諸道多是各列官銜便指州縣請朝廷之正授樹藩鎮之私恩頗亂規程宜加條制自今後大鎮節度使管三州已上者毎年許奏管内官三人如管三州以下者許奏管内官二人仍須有課績尤異方得上聞若止於檢慎無瑕科徵及限是守常道只得書考旌嘉不得特有薦奏其防禦使每年只許奏一人若無尤異不得奏薦刺史無奏薦之例不得輒亂規程其年八月中書奏偽庭之時諸藩叅佐皆從除授自今後諸道除節度副使兩使判官除授外其餘職員并諸州軍事判官各任本處奉辟其軍事判官仍不在奏官之限所冀招延之禮皆合於前規簡辟之間無聞於濫舉從之長興二年十一月詔曰闕員有限人數常多須以高低定其等級起今後兩使判官罷任後宜一年外與比擬書記支使防禦團練判官等二年外推巡防禦團練推官軍事判官等並三年後與比擬仍每遇除授量與改轉官資或階勲或職資其有殊常勤績者别議優陞若有文學知術超邁羣倫或為衆所稱或良知迥舉察驗的實者不拘年月之限清泰二年八月中書門下上言前大御監五品陞朝官西班將軍皆在任許滿二十五月如衝替已經二十月即别任用少卿監舊例三任四任方入大卿監五品三任四任方入少卿監今後並秪三任逐任須月限滿無殿責者便入此官西班將軍罷任一年許求官舊例三任四任方入大將軍今祗無殿責或曾任金吾將街使藩鎮刺史特勑並不拘此例諸道除兩使判官外書記已下任自辟請應朝官除外任罷任後一年方許陳乞諸道賓席未曾陞朝者若官兼三院御史即除中下縣令兼大夫中丞秘書少監郎中員外郎與清資初任陞朝官檢校官至尚書常侍秘書監庻子陞朝便與少卿監諸州防禦團練判推官並請本州辟諸中書不更除授應出選門官帶三院御史供奉裏行及省銜罷任後周年許陳乞諸州别駕不除令録仍守本官月限得替後一年許陳乞長史司馬因攝奏正未有官者送名從之三年五月乙未詔曰近以内外臣寮出入迭處稍均勞逸免滯轉遷應兩司判官畿赤令取郎中員外補闕拾遺三丞五博少列宫寮選擇擢任一則俾藩方侯伯别耀賓階次則致朝列人臣備諳時政今後或有滿闕便宜依此施行周廣順元年夏五月辛已詔朝廷設爵命官求賢取士或以資叙進或以科級陞至有白首窮經方諧一第半生守選始遂一官是以國無幸民士不濫進近年州郡奏廌多無出身前官或因權勢書題或是衷私請托既難阻意便授真恩遂使躁求僥倖之徒爭遊捷徑辛苦孤寒之士盡泣窮途將期激濁揚清所宜循名責實今後州府不得奏薦無前官及無出身人如有竒才異行越衆超羣亦許具名以聞便可隨表赴闕當令有司考試朕亦親自披詳斷其否臧俾之陞黜庻使人不謬舉野無遺才顯德二年六月詔兩京諸道州府留守判官兩使判官少尹防禦團練軍事判官今後並不得奏薦其防禦團練刺史州各置推官一員右釐革晉天福三年十一月起居郎殷鵬上言竊聞司封格式内外文武臣寮纔陞朝籍者無父母便與追封贈父母在即未叙未封以臣所見誠為不可此則輕生者而重死者棄今人而録故人其榮何有其理安在又云父母在品秩及格者即以封其母不加其父便加邑號兼曰太君遂令妻則旁若無夫子則上若無父豈有父則賤而母則貴夫則卑而妻則尊若謂其父未合加恩安得其母受賜若謂以子便合貴曷得其父不先封伏以父尊母卑天地之道尊無二上國家同體今授封父無爵名教不順莫大於兹臣伏乞自今後文武臣寮父母在其父母已有官爵者即叙進資品以及格式或不任禄仕即可授以致仕或同正官所貴得以叙封妻室即父母俱榮孝子無不逮之感閨門交映聖君覃慶賞之恩噫荷陛下孝治之風受陛下榮親之禄者静而屈指不過數人陛下得以特議舉行編為令式勸天下之為善令域中之望風自然見前代之闕文成我朝之盛典况唐長興元年德音内一節應在朝中外臣寮父母在並與加恩司封不行明制堅執前文儻布新恩兼合舊勑庻使事君事父恒遵一體之規為子為臣不失兩全之義臣又聞司封令式内外臣寮官階及五品已上者即與封妻廕子固不分於清濁但秪言其品秩且諌議大夫給事中中書舎人並是五品贊善大夫洗馬中允奉御等亦是五品若論朝廷之委任宰臣之擬論出入之階資中外之瞻望則天壤相懸矣及其叙封乃為一貫相沿至此甚非而况北省為陛下侍從之臣南宫掌陛下經綸之務憲臺執陛下紀綱之司首冠羣寮總為三署當職尤重責望非輕此則清列十年不遂顯榮之願彼則雜班兩任便承封廕之恩事不均平理宜改革伏乞自今後應諸官及五品已上者即依舊制施行應三署清望官及六品已上便與封廕清濁既異品秩宜升仍下所司議為恒式從之漢乾祐元年七月詔尚書省集議内外臣寮父在母承子廕叙封追封合加太字否以聞尚書省奏議曰今詳前後勑條凡母皆加太字存殁並同此即是父殁母存即叙封進封内加太字母殁追封亦加太字故云存殁並同若是父字據勑格無載為母加太字處若以近勑因子貴與父命官父自有官即妻從夫品可以封妻父在不合以其子加母太字若雖有因子之官其品尚卑未得廕妻亦不合用子廕之限從之周顯德六年冬十二月壬辰尚書兵部上言本司廕補千牛進馬在漢乾祐中散失勑文自來只凖晉編勑及堂帖施行伏縁前後不同請别降勑命詔曰今後應廕補子孫宜令逐品許補一人直候轉品方得更補不得於本品内重叠収補如是所補人有身故除名落藩廢疾及應舉及第内只許於本品内再補一人太子進馬太子千牛不用収補詹事依祭酒例施行兵部尚書侍郎舊例不許收補宜許收補致仕官歴任中曾任在朝文班三品武班二品及丞郎給舎已上金吾大將軍節度防禦團練留後者方得補廕皇廕人其祖父曾授著皇朝官秩方得收補應合收補人須是本官親子孫年貌合格别無渝濫方許施行餘從舊例處分右封䕃梁開平四年四月勑諸州鎮使官秩無高卑並在縣令之下其年九月詔曰魏博管内刺史比來州務並委督郵遂使曹官擅其威權州牧同於閒冗俾循通制宜塞異端並宜依河南諸州例刺史得以專達時議者曰唐朝憲宗時烏重𦙍為滄州節度使嘗以河朔十六年能抗拒朝命者以奪刺史權與縣令職而自作威福耳若二千石各得其柄又有鎮兵雖安史挾奸豈能據一墉而叛哉遂奏以所管德棣景三州各還刺史職分州兵並𨽻收管是後雖幽鎮魏三道以河北舊風自相傳襲唯滄州一道獨稟命受代自重𦙍制置使然也則梁氏之更張正合其事矣後唐長興二年正月詔曰要道纔行則千岐共貫宏綱一舉則萬目畢張前王之法制罔殊百代之科條悉在無煩改作各有定規守程式者心逸日休率胸臆者心勞日拙天垂萬象星辰之分野靡差地載羣倫岳瀆之方隅不易儻各司其局則皆盡其心且律令格式六典凡闗庻政互有區分乆不舉行遂至隳紊宜凖舊制令百司各於其間録出本局公事巨細一一抄冩不得漏落纎毫集成巻軸仍粉壁書在公㕔若未有廨署者文書委官司主掌仍毎有新授官到令自冩録一本披尋或因顧問之時應對須知次第無容曠闕每在執行使庶寮則守法奉公宰臣則提綱振領必當彛倫攸叙所謂至道不繁何必朞年然後報政宜令御史臺遍加告諭催促限兩月内抄録及粉壁書冩須畢其間或有未可便行及曾釐革事件委逐司旋申中書門下當更叅酌奏覆施行其年八月勑今後大理寺官員宜同臺省官例升進其法直官比禮直官任使應順元年春三月戊午宗正上言故事諸陵有令丞各一員近令丞不俱置便委本縣令兼之縁河南洛陽是京邑恐兼令丞不便詔特置陵臺令丞各一員右雜録舊五代史巻一百四十九
