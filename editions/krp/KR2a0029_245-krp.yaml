body:
  text: 舊五代史卷一百二十三宋門下侍郎參知政事監修國史薛居正等撰周書第十四列傳三高行周字尚質幽州人也生于媯州懐戎軍之鵰窠里曽祖順厲世戍懐戎父思繼昆仲三人俱雄豪有武幹聲馳朔塞唐武皇之平幽也表劉仁恭為帥仍留兵以戍之以思繼兄為先鋒都將媯州刺史思繼為中軍都將順州刺史思繼弟為後軍都將昆仲分掌燕兵部下士伍皆山北之豪也仁恭深憚之武皇將歸私謂仁恭曰髙先鋒兄弟勢傾州府為燕患者必此族也宜善籌之久之太原戍軍恣横思繼兄弟制之以法所殺者多太祖怒詬讓仁恭乃訴以高氏兄弟遂倂遇害仁恭因以先鋒子行珪為牙將諸子竝列帳下厚撫之以慰其心時行周十餘嵗亦補職在仁恭左右行珪别有傳在唐書及莊宗收燕以行周隸明宗帳下常與唐末帝分率牙兵明宗征燕率其下擁從郷人趙徳鈞謂明宗曰行周心甚謹厚必享貴位梁將劉鄩之據莘也與太原軍對壘旦夕轉鬭常一日兩軍成列元行欽為敵軍追躡劍中其面血戰未解行周以麾下精騎突陣解之行欽獲免莊宗方寵行欽召行周撫諭賞勞而欲置之帳下又念于明宗帳下已奪行欽更取行周恐傷其意密令人以利禄誘之行周辭曰總管用人亦為國家事總管猶事王也余家昆仲脱難再生承總管之厚恩忍背之乎及兩軍屯于河上覘知梁軍自汴入楊村寨明宗晨至斗門設伏將邀之衆寡不敵反為所乗時矛矟叢萃勢甚危䠞行周聞之出騎横擊梁軍遂得解去明宗之襲鄆州也行周為前鋒㑹夜分澍雨人無進志行周曰此天贊也彼必無備是夜渉河入東城比曙平之莊宗平河南累加檢校太保領端州刺史同光末出守綘州明宗即位特深委遇天成中從王晏球圍定州敗王都擒托輝皆有功賊平遷潁州團練使長興初以北邊䧟契丹用為振武節度使明年以河西用軍移鎭延安清㤗初改潞州節度使晉祖建義于太原唐末帝命張敬逹征之行周與符彦郷為左右排陣使契丹主入援太原也行周彦郷引騎拒之尋為契丹所敗遂與敬逹保晉安砦累月救軍不至楊光逺欲圖敬逹行周乃引壯士䕶之敬逹性戅不知其營䕶謂人曰行周毎踵余後其意何也繇是不復敢然敬逹遂為光逺所害晉祖入洛令行周還藩加同平章事晉祖都汴以行周為西京畱守未幾移鄴都晉祖幸鄴㑹安從進叛命行周為襄州行營都部署明年秋平定漢南晉少帝嗣位加兼侍中移鎭睢陽開運初從幸澶淵拒敵于河上車駕還京代景延廣為侍衛親軍都指揮使移鄆州節度使時李彦韜為侍衛親虞候可否在已行周雖典禁兵心遊事外退朝歸第門宇翛然賔友過後但引滿而已尋改歸徳軍節度使以李守貞代掌兵柄許行周歸藩晉軍䧏于中渡也少帝命行周與符彦郷同守澶州戎王入汴召赴京師㑹草㓂攻宋州急遣行周歸鎭宋史高懷徳傳杜重威降契丹京東諸州羣盗大起懷徳堅壁清野敵不能入行周率兵歸鎭敵遂解去及契丹主死于欒城契丹將蕭翰立許王李從益知南朝軍國事遣死士召行周辭之以疾退謂人曰衰世難輔况兒戲乎漢高祖入汴加守太傅兼中書令代李守貞為天平節度使杜重威據鄴叛漢祖以行周為招討使總兵討之鄴平授鄴都留守加守太尉進爵臨清王乾祐中入覲加守太師進封鄴王復授天平節鉞改封齊王太祖踐阼加守尚書令増食邑至一萬七千户太祖以行周耆年宿將賜詔不名但呼王位而已慕容彦超據兖叛太祖親征奉迎輿駕傾家載贄奉觴進俎率以身先太祖待之逾厚廣順二年秋以疾薨于位享年六十八賵賻加等册贈尚書令追封奉王諡曰武懿子懷徳皇朝駙馬都尉宋州節度使安審琦字國瑞其先沙陁部人也祖山盛朔州牢城都校贈太傅父金全安北都䕶振武軍節度使累贈太師唐書有傳審琦性驍果善騎射㓜以良家子事莊宗為義直軍使遷本軍指揮使天成初唐末帝由潞邸出鎭河中奏審琦為牙兵都校未幾入為歸化指揮使王師伐蜀充行營馬軍都指揮使及凱旋改龍武右廂都校領富州刺史清㤗初為捧聖指揮使領順化軍節度使其年鎭邢州兼北面行營排軍陣使從張敬逹圍太原及楊光遠舉晉安寨䧏于晉祖審琦亦預焉晉祖踐阼加檢校太傅同平章事充天平軍節度使兼侍衛馬歩軍都指揮使旋以母喪起復天福三年就加檢校太尉尋改晉昌軍節度使京兆尹七年移鎭河中晉少帝嗣位加檢校太師開運末朝廷以北戎入㓂以審琦為北面行營馬軍左右廂都指揮使與諸將㑹兵于洺州俄而敵騎大至時皇甫遇慕容彦超亦預其行乃率所部兵與敵戰于安陽河上時遇馬為流矢所中勢已危蹶諸將相顧莫有敢救者審琦謂首將張從恩曰皇甫遇等未至必為敵騎所圍若不急救則為擒矣從恩曰敵勢甚盛無以枝梧將軍獨往何益審琦曰成敗命也若不濟與之俱死假令失此二將何面目以見天子遂率鐵騎北渡敵見塵起謂救兵至乃引去遂救遇與彦超而還晉少帝嘉之加兼侍中移領許州未幾移鎭兖海漢有天下授襄州節度使兼中書令屬荆人叛命潛遣舟師數千屠襄郢審琦禦之而遁朝廷賞功就加守太保進封齊國公歳餘又加守太傅國初封南陽王顯徳初進封陳王世宗嗣位加守太尉三年拜章請覲優詔許之加守太師増食邑至一萬五百戸食實封二千三百戸審琦鎭襄沔僅一紀嚴而不殘威而不暴故南邦之民甚懷其惠五年移平盧軍節度使承詔赴鎭因朝于京師世宗以國之元老禮遇甚厚車駕親幸其第以寵之六年正月七日夜為其隸人安友進安萬合所害時年六十三初友進與審琦之愛妾私通有年數矣其妾常慮事泄見誅因與友進謀害審琦友進甚有難色其妾曰爾若不從我當反告友進乃許之至是夕審琦沈醉寢于帳中其妾乃取審琦所枕劒與友進友進猶惶駭不敢剚刃遽召其黨安萬合便殺審琦既而慮事泄乃引其帳下數妓盡殺以滅其跡不數日友進等竟敗悉為子守忠臠而戮之世宗聞之震悼輟視朝三日詔贈尚書令追封齊王守忠仕皇朝累為郡守安審暉字明逺審琦之兄也起家自長直軍使轉外衙左廂軍使從莊宗平幽薊戰山東定河南皆預其功同光中授蔚州刺史天成初改汝州防禦副使歴鳯翔徐州節度副使河東行軍司馬晉高祖龍飛以霸府上僚授振武兵馬留後遷河陽節度使不踰月移鎭鄜州丁内艱起復視事五年李金全據安州叛詔馬全節為都部署領兵討之以審暉為副安陸平移鎭鄧州進位檢校太傅六年冬襄州安從進叛舉漢南之衆北攻南陽南陽素無城壁唯守衙城賊傅城下審暉登陴召賊師以讓之從進不克而退襄州平就加檢校太尉少帝嗣位加檢校太師罷鎭授右羽林統軍歳餘出鎭上黨屬契丹内侵授邢州節度使居無何目疾暴作上章求代歸于京師養疾累年太祖即位召于内殿從容顧問尤所歎重將以禄起之審暉辭以暮齒願就頥養拜太子太師致仕封魯國公累食邑五千户實封四百户廣順二年春卒年六十三廢朝二日詔贈侍中諡曰静子守鏻仕皇朝為贊善大夫安審信字行光審琦之從父兄也父金祐世為沙陁部偏禆名聞邊塞審信習騎射從父金全天成初為振武節度使補為牙將俄而兄審通為滄州節度使用為衙内都虞候歴同陜許三州馬歩軍都指揮使晉祖起義于太原唐末帝命張敬逹以兵攻之而審信率先以部下兵遁入并州晉祖以其故人得之甚悦其妻與二子在京師皆為唐末帝所戮但貸其老母而已契丹既䧏晉安砦晉高祖以審信為汾州刺史檢校太保充馬歩軍副部署晉祖入洛授河州節度使檢校太尉同平章事審信性既翻覆率多疑忌在蒲中時毎王人告諭騎從稍多必潛設備以防其圖已尋歴許兗州鎮所至以聚斂為務民甚苦之㑹朝廷謀大舉北伐凡藩候皆預將師以審信為馬歩軍右廂都排陣使俄改華州節度使漢初移鎭同州入為左衞上將軍國初轉右金吾上將軍三年夏四月太祖御乾元殿入閣審信不赴班位為御史所彈詔釋之時審信乆病神情恍惚開臺司奏劾掦言曰趨朝偶晚未是大過何用彈舉我終進奉二萬緍盡逐此乞索兒輩未幾以病請退授太子太師致仕是歳秋卒年六十贈侍中諡曰成穆李從敏字叔逹唐明宗之猶子也沈厚寡言善騎射多計數初莊宗召見試弓馬用為衙内馬軍指揮使從平汴洛補帳前都指揮使遷捧聖都將明宗移鎭真定表為成徳軍馬歩軍都指揮使從明宗入洛補皇城使出為陜府節度使王都據定州叛命王晏球為招討使率師討之以從敏為副領滄州節度使王都平移授定州尋代范延光為成徳軍節度使加檢校太尉封涇王鎮州有市人劉方遇家富于財方遇卒無子妻弟田令遵者㓜為方遇治財善殖貸劉族乃共推令遵為方遇子親族共立劵書以為誓信累年後方遇二女取資于令遵不如意乃訟令遵冐姓奪父家財從敏令叛官陸浣鞫其獄而殺令遵北夢瑣言云鎮州市人劉方遇家財數十萬方遇妻田氏蚤卒田之妹為尼常出入方遇家方遇使尼長髪為繼室有田令遵者方遇之妻弟也善貸殖方遇以所積財令令遵興殖焉方遇有子年㓜二女皆嫁方遇疾卒子㓜不能督家業方遇妻及二女以家財素為令遵興殖乃聚族合謀請以令遵姓劉為方遇繼嗣即令鬻劵人安美為親族請嗣劵書既定乃遣令遵服斬衰居喪而二女初立令遵時先邀毎月供財二萬及後求取無厭而石李二女夫使二女詣本府論訢云令遵冐姓奪父家財令遵下獄石李二夫族與本府要吏親黨上至府師判官行軍司馬隨使都押衙各受方遇二女賂錢數千緍而以令遵與姊及書劵安美同情共盗俱棄市人知其寃令遵父詣臺訢寃詔本州節度副使符䝉掌書記徐台符鞫之備明姦狀及詰二女伏行賂于節度使趙環代判高知柔觀察判官陸浣竝捕下獄具服贓罪事連從敏甚懼乃令其妻赴洛陽入宫告王淑妃明宗知之怒曰朕用從敏為節度使而枉法殺人我羞見百官又令新婦奔赴不須見吾面時王淑妃頗庇䕶之趙環等三人竟棄市從敏等止于罰俸而已北夢瑣言從敏初欲削官中宫哀祈竟罰一年俸長興初移鎮宋州唐末帝起兵于鳯翔其子重吉為毫州防禦使從敏承朝廷命害之清㤗中從敏與洋王從璋竝罷歸第待之甚薄嘗宫中同飲既醉末帝謂從璋從敏曰爾等何物處雄藩大鎮二人大懼賴曹太后見之叱曰官家醉爾輩速出去方得解晉祖革命降封莒國公再領陜州尋移鎮上黨入為右龍武綂軍出為河陽節度使漢祖入汴移授西京留守累官檢校太師同平章事隠帝即位就加兼侍中改封秦國公歳餘以王守恩代還廣順元年春以疾卒年五十四詔贈中書令諡曰恭惠鄭仁誨字日新晉陽人父霸累贈太子太師仁誨㓜事唐驍將陳紹光恃勇使酒嘗乗醉抽佩劒將剚刄于仁誨左右無不奔避唯仁誨端立以俟畧無懼色紹光因擲劒于地謂仁誨曰汝有此器度必當享人間富貴及紹光典郡仁誨累為右職後退歸郷里以色養為樂漢高祖之鎮河東也太祖累就其第與之燕語毎有質問無不以正理為答太祖深噐之漢有天下太祖初領樞務即召為從職及太祖西征嘗密贊軍機西師凱旋累遷至檢校吏部尚書太祖踐阼旌佐命功授檢校司空客省使兼大内都㸃檢恩州團練使尋為樞密副使踰年轉宣徽北院使右衛大將軍出鎮澶淵轉檢校太保入為樞密使加同平章事世宗之北征也以仁誨為東京留守調𤼵軍須供億無闕車駕廽加兼侍中尋丁内艱未幾起復顯徳二年冬疾亟世宗幸其第親加撫問欷歔乆之及卒世宗親臨其喪哭踰數舉是時世宗將行近臣奏云歳道非便不宜臨喪弗聴然而先之以桃茢之事時以為得禮誨為人端厚謙損造次必由于禮及居樞務雖權位崇重而能孜孜接物無自矜之色及終故朝廷咸惜之詔贈中書令追封韓國公諡曰忠正既葬命翰林學士陶糓撰神道碑文官為建立表特恩也子勲累歴内職蚤卒絶嗣初廣順末王殷受詔赴闕太祖遣仁誨赴鄴都廵檢及殷得罪仁誨不奉詔即殺其子蓋利其家財妓樂也及仁誨卒而無後人以為陰責焉張彦成潞城人也曽祖静汾州刺史祖述澤州闕史父礪昭義行軍司馬彦成初為并門牙將天成中自秦州鹽鐡務官改鄆州都押牙漢祖鎮北門表為行軍司馬以隠帝娶其女特見親愛從平汴洛累加特進檢校太尉同州節度使隠帝即位就加同平章事太祖之伐河中彦成有饋輓之勞河中平加檢校太師乾祐三年冬移鎮相州廣順初就加兼侍中尋移鎭南陽三年秋代歸授右金吾衛上將軍其年秋以疾卒年六十贈侍中宋史楊克讓傳乾祐中同州節度張彦成表授掌書記周廣順初彦成移鎮安陽穰下克譲以舊職從行彦成入為執金吾病篤奏稱其林可用克譲以彦成死未葬不忍就禄退居别墅俟張氏子外除時論稱之安叔千沙陁三部落之種也父懷盛事唐武皇以驍勇聞叔千習騎射從莊宗定河南為奉安部將天成初王師伐定州命為先鋒都指揮使王都平授㤗州刺史連判涿易二郡清㤗初契丹㓂鴈門叔千從晉祖迎戰敗之進位檢校太保振武節度使晉祖踐阼就加同平章事天福中歴邠滄邢晉四鎮節度使叔千鄙野而無文當時謂之安没字言若碑碣之無篆籕但虗有其表耳開運初朝廷將大舉北伐授行營都排陣使俄改左金吾衛上將軍契丹入汴百僚迎見于赤岡契丹主登髙岡駐馬而撫諭漢官叔千出班獨立契丹主曰爾是安没字否卿比在邢州日遠輸誠欵我至此汝管取一喫飯處叔千拜謝而退俄授鎭國軍節度使漢初遇代歸京自以嘗附幕庭居常愧惕久之授太子太師致仕尋請造歸洛廣順二年冬卒年七十二詔贈侍中宋彦筠雍丘人也初隸滑州軍梁氏與莊宗夾河之戰彦筠時為戰棹都指揮使以勞遷開封府牙校莊宗有天下擢領禁軍伐蜀之役率所部從康延孝為前鋒蜀平歴維渝二州刺史明宗在位連典數郡晉初自汝州防禦使討安從進于襄陽以功拜鄧州節度使累官至檢校太尉未幾歴晉陜二鎮晉少帝嗣位再領鄧州尋移鎮河中漢初授太子太師致仕國初拜左衛上將軍世宗嗣位復為太子太師致仕顯徳四年冬卒于西京之私第輟視朝一日詔贈侍中初彦筠入成都據一甲第第中資貨鉅萬妓女數十輩盡為其所有一旦與其主母㣲忿遽擊殺之自後常有所睹彦筠心不自安乃修浮屠法以禳之因而溺志于釋氏其後毎歳至金仙入涅之日常衣斬縗號慟于其像前其倿佛也如是家有侍婢數十人皆令削髮披緇以侍左右大為當時所誚又性好貨殖能圖什一之利良田甲第相望于郡國將終以伊洛之間田莊十數區上進竝籍于官焉史臣曰近代領戎藩列王爵禄厚而君子不議望重而人主不疑能自晦于飲酌之間保功名于始終之際如行周之比者幾何人哉奕世藩翰固亦宜然審琦有分閫之勞乏御家之道峰摧玉折蓋不幸也其餘雖擁戎旃未聞閫政固不足與文卲龔黄為比也舊五代史巻一百二十三
