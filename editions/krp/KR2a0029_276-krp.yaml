body:
  text: 舊五代史卷一百三十九攷證志一天文志乾化二年五月壬戌熒惑犯心案歐陽史作正月丙申熒惑犯房第二星與是書異五代會要與是書同内屏謁者勾已勾已原本訛旬巳今據歐陽史改正長興二年五月己亥歲星晝見案歐陽史作癸亥太白晝見應順元年春應順原本訛廣順今據歐陽史改正舊五代史巻一百三十九攷證
