body:
  text: 舊五代史巻九十六宋門下侍郎參知政事監修國史薛居正等撰晉書第二十二列傳十一孔崇弼唐僖宗宰相緯之子也仕後唐自吏部郎中授給事中時族兄昭序繇給事中改左常侍兄弟同居門下時論榮之崇弼天福中遷左㪚騎常侍無他才但能談笑戯玩人物揚眉抵掌取悅于人五年詔令泛海使于杭越先是浙中贈賄每歲恒及萬緡時議者曰孔常侍命奇薄何消盈數有命即無財有財即無命明年使還果海中船壞空手而歸案以下殘闕陳保極閩中人也好學善屬文後唐天成中擢進士第秦王從榮聞其名辟為從事從榮素急暴後怒保極不告出遊宰相門以馬箠鞭之尋出為定州推官從榮敗執政知其屈擢居三署歴禮部倉部員外郎初桑維翰登第之歲保極時在秦王幕下因戯謂同輩曰近知今歲有三箇半人及第蓋其年收四人保極以維翰短陋故謂之半人也天福中維翰既居相位保極時在曹郎慮除官差跌心不自安乃乞假南遊將謀退跡既而襄鄧長吏以行止入奏維翰乃奏于高祖曰保極閩人多狡恐逃入淮海即以詔追赴闕將下臺鍜成其事同列李崧極言以解之因令所司就所居鞫之貶為衞尉寺丞仍奪金紫尋復為倉部員外郎竟以銜憤而卒保極無時才有傲人之名而性復鄙恡所得利禄未嘗奉身但蔬食而巳每與人奕棊敗則以手亂其局蓋拒所賭金錢不欲償也及卒室無妻兒唯囊中貯白金十鋌為他人所有時甚嗤之王瑜其先范陽人也父欽祚仕至殿中監出為義州刺史瑜性兇狡然雋辯驍果騎射刀筆之長亦稱于當代起家累為從事天福中授左贊善大夫會濮郡秋稼豐衍稅籍不均命乘使車按察大計既至郡謂校簿吏胡藴惠鶚曰余食貧久矣室無增貲為我致意縣宰且求假貸由是濮之部内五邑令長共歛錢五十萬私獻于瑜瑜即以書上奏高祖覽章歎曰廉直清愼有如此者誠良臣也于是二吏五宰即時停黜擢瑜為太府少卿杜重威之鎭東平也瑜父欽祚為節度副使及重威移鎭常山瑜乃詭計干重威使奏已為恒州節度副使竟代其父位歲餘入為刑部即中丙午歲父欽祚刺舉義州瑜歸寧至郡會契丹據有中夏何建以秦州歸蜀瑜說欽祚曰若不西走當事契丹矣厲色數諫其父怒而不從因其臥疾涉旬瑜仗劍而脅之曰老懦無謀欲趨炮烙不即為計則死于刃下父不得已而聽之時隴東屯兵扼其川路將北趣蕃部假途而因與郡盜酋長趙徽㰱血為約以兄事之謂徽曰西至成都余身為相余父為將爾當領一大郡能遂行乎徽曰諾瑜慮為所賣先致其妻孥館于郡中行有期矣徽潛召其黨伺于郊外子夜瑜舉族行而輜重絡繹十有餘里徽之所親循溝澮而遁至馬峽路隅舉燧相應其黨起于伏莽斷欽祚之首貫諸長矛平生聚蓄金幣萬計皆為賊所掠少長百口殺之殆盡瑜尚獨戰千人矢不虗發手無射捍其指流血及窘乃夜竄山谷落髪為僧月餘為樵人所獲縶送岐州為侯益所殺時年三十九始瑜有姑寡居來歸其家以前夫遺腹有子經數年不產每因事預告人吉凶無不驗者時契丹入中原前月餘謂瑜曰暴兵將至宜速去之茍不去亂必及矣後瑜果死此謂天作孽猶可違自作孽不可活也張繼祚故齊王全義之子也始為河南府衙内指揮使全義卒除金吾將軍旋授蔡州刺史累官至檢校太保明宗郊天充供頓使復除西衞上將軍唐清泰末丁母憂天福初喪制未闋會張從賓作亂發兵迫脅取赴河陽令知畱守事從賓敗與二子詔戮于市始繼祚與范延光有舊嘗遣人以馬遺之屬朝廷起兵將討鄴城為廵兵所獲奏之高祖深忌之及敗宰臣桑維翰以父珙早事齊王奏欲雪之高祖不允通鑑史館修撰李濤上言張全義有再造洛邑之功乞免其族遂止誅繼祚妻子遂止罪繼祚一房不累其族鄭阮洺州人也少為本郡牙將唐莊宗畧地山東以阮首歸義旗繼遷軍職阮有子自㓜事明宗中門使安重誨重誨以其桀黠愛之及明宗即位擢阮至鳯翔節度副使會末帝鎭其地阮稍狎之末帝嗣位以阮為趙州刺史而阮性貪濁民間細務皆密察而紀之令納賂以贖罪有屬邑令因科醵拒命密以束素募人隂求其過後竟停其職人甚非之又嘗以郡符取部内凶肆中人隸其籍者遣于青州舁喪至洺郡人憚其遠願翰直百緡以免其行阮本無喪即受直放還識者曰此非吉兆也未幾改曹州刺史為政愈弊高祖建義入洛阮自郡來朝旋為本州指揮使石重立所殺舉族無孑遺胡饒大梁人也少事本鎭連帥為都吏歴馬歩都虞侯會唐明宗鎭其地與部將王建立相善明宗即位建立領常山奏饒為眞定少尹饒本憸人既在府幕無士君子之風嘗因事趙郡有平棘令張鵬者獻策請建立于境内每縣所管鄉置鄉直一人令月書縣令出入行止饒乃導而薦焉建立行之彌年詞訟蜂起四郡大擾天成末王都搆亂隂使結建立為兄弟之國時饒又曾薦梁時右庻子張澄為判官建立亦狎之澄素不知書毎座則以隂符鬼谷為已任建立時宻以王都之盟告之澄與饒俱贊成其事會王師圍中山其事遂寢而饒之兇戾如此清泰初馮道出鎮同州饒時為副使道以重臣稀于接洽饒忿之毎乘酒于牙門詬道道必延入待以酒餚致敬而退道謂左右曰此人為不善自當有報吾何怒焉饒後閒居河陽天福二年夏會張從賓作亂饒謁于麾下請預其行從賓敗饒以王建立方鎮平盧走投之建立延入城斬之以聞聞者快焉劉遂清字得一青州北海人梁開封尹鄩之猶子也父琪以鴻臚卿致仕遂清少敏惠初仕梁為保鑾軍使歴内諸司使莊宗入汴不改其職明宗即位加檢校尚書僕射委以西都監守踰嵗以中山王都有不臣之跡除遂清為易州刺史俾遏其寇衝既至郡大有禦侮之略境内賴焉王都平加檢校司空遷棣州刺史天成長興中歴典淄興登三郡咸有善政通鑑潞王紀帝之起鳯翔也召興州刺史劉遂清遲疑不至聞帝入洛乃悉集三泉西縣金林桑林戍兵以歸自散關以南城鎮悉棄之皆為蜀人所有入朝帝欲治罪以其能自歸乃赦之高祖即位之二年授鳯州防禦使加檢校司徒會丁母憂起復授内客省使右監門衞大將軍六年駕幸鄴都轉宣徽北院使兼判三司加檢校太保七年少帝嗣位加右領軍衞上將軍仍賜竭誠翊戴保節功臣八年出領鄭州加檢校太傅開運二年遷安州防禦使未幾上表稱疾詔許就便廻至上蔡終于郵舎時三年四月也遂清性至孝牧溜川日自北海迎其母赴郡母既及境遂清奔馳路側控㘘行數十里父老觀者如堵當時榮之遂清素不知書但多計畫判三司日每給百官俸料與判官議曰斯輩非盡有才能多世禄之家宜澄其汚而留其清者或對曰昔唐朝渾郭顔段每一赦出以一子出身率為常制且延賞垂裕為國美譚未有因月給而欲沙汰恐未當也羣倫由此減之房暠京兆長安人也少為唐宰臣崔魏公家臣後因亂客于蒲州天成中唐末帝出鎮河中暠于路左迎謁求事軍門末帝愛之使治賓客及末帝登極厯南北院宣徽使尋與趙延夀同為樞宻使時薛文遇劉延朗之徒居中用事暠雖處宻地其聽用之言十不得三四但隨勢可否不為事先毎朝廷有大事暠與端明學士等環坐會議多于衆中俛首而睡其避事也如此高祖即位以暠濡足閏朝不專予奪故特恩原之命為左驍衞大將軍留于西京開運元年春卒于洛陽孟承誨大名人也始為本府牙校遇髙祖臨其地升為客將後奏為宗城令秩滿以百姓舉留于常山槀地令皆有善政髙祖有天下擢為閤門副使累遷宣徽使官至檢校司空太府卿右武衞大將軍及少帝嗣位以植性纎巧善于希㫖復與權臣宦官宻相表裏凡朝廷恩澤美使必承誨為之一嵗之中數四不已由是居第華敞財帛積累及契丹入汴張彦澤引兵逼宫城少帝召承誨計之承誨匿身不赴少帝既出宫寓于開封府舎具以承誨背恩之事告彦澤令捕而殺之其妻女並配部族漢髙祖即位詔贈太保劉繼勳衞州人也唐天成中髙祖鎮鄴都繼勳時為客將髙祖愛其端謹籍其名于帳下從厯數鎮及即位擢為閤門使出為淄州刺史遷澶州防禦使俄改鄭州自宣徽北院使拜華州刺史嵗餘移鎮同州始少帝與契丹絶好繼勳亦與其謀及契丹主至闕繼勳自鎮來朝契丹責之時馮道在側繼勳事急指道曰少帝在鄴道為首相與景延廣謀議遂致南北失歡臣位至卑未嘗措言今請問道道細知之契丹主曰此老子不是好閙人無相牽引皆爾輩為之繼勳不敢復對繼勳時有疾契丹主因令人侯其疾狀云有風痺契丹主曰北方地凉居之此疾可愈乃命鏁繼勲尋解之以疾終于家通鑑契丹主聞趙在禮死乃釋繼勲繼勲憂憤而卒漢髙祖入汴贈太尉鄭受益新唐書宰相世系表字謙光唐宰相餘慶之曽孫也餘慶生澣澣生從讜兩為太原節度使再登相位從讜兄處誨為汴州節度使家襲清儉深有士風中朝禮法以鄭氏為甲處誨生受益受益亦以文學致身累厯䑓閣自尚書即遷右諫議大夫天福七年夏以張彦澤數為不道上章請行國典旬日不報又貢表切言訐直無所忌執政稍惡之俄而以病請告歸長安髙祖晏駕以不赴國哀停任㑹赦拜京兆少尹宰臣趙瑩出鎮咸秦以受益朝班舊僚眷待甚至屬天下率借金穀乃謂瑩曰京兆户籍登耗民力虚實某偹知之矣品而定之可使平允瑩信之因使與王人同掌其事受益既經廢薄于仕宦遂阿法射利冀為生生之資又素恃門望陵轢同幕内奸外直羣情無相洽者及贓汚事發騰于衆口瑩不得已遂接之其直百萬八年冬賜死于家受益數世公台一朝自棄士君子皆惜之程遜字浮休夀春人以下有闕文召入翰林充學士自兵部侍郎承㫖授太常卿天福三年秋命使呉越十國春秋云禮部尚書程遜為加㤙使母羸老雙瞽遜未嘗白執政以辭之將行母以手捫其面號泣以送之仲秋之夕隂暝如晦遜嘗為詩曰幽室有時聞鴈呌空庭無路見蟾光同僚見之訝其詩語稍異及使廻遭風水而溺焉李郁字文緯唐之宗屬也少厯宗寺官天成長興中累遷為宗正卿性平允所厯無愛憎毁譽髙祖登極授光禄卿一日晝寢夢食巨棗覺而有疾謂其親友曰嘗聞棗字重來呼魂之象也余神氣逼抑將不免乎天福五年夏卒贈太子太保馬重績字洞㣲少學數術明太一五紀八象三統大厯居于太原仕晉拜太子右贊善大夫遷司天監天福三年重績上言厯象王者所以正一氣之元宣萬邦之命而古今所記考審多差宣明氣朔正而星度不驗崇𤣥五星得而嵗差一日以宣明之氣朔合崇𤣥之五星二厯相參然後符合自前世諸厯皆起天正十一月為嵗首用太古甲子為上元積嵗愈多差濶愈甚臣輒合二厯創為新法以唐天寳十四載乙未為上元雨水正月中氣為氣首詔下司天監趙仁琦張文皓等考覈得失仁𤦺等言明年庚子正月朔用重績厯考之皆合無舛乃下詔頒行之號調元厯行之數嵗輒差遂不用重績又言漏刻之法以中星考晝夜為一百刻八刻六十分刻之二十為一時時以四刻十分為正此自古所用也今失其傳以午正為時始下侵未四刻十分而為午由是晝夜昬曉皆失其正請依古改正從之重績卒年六十四陳𤣥京兆人也家世為醫初事河中王重榮乾符中後唐武皇自太原率師攻王行瑜路出于蒲中時𤣥侍湯藥武皇甚重之及還太原日侍左右武皇性剛暴樂殺人無敢言者𤣥深測具情毎有暴怒則從容啟諫免禍者不一以是晉人深德之勳貴賂遺盈門性好酒樂施隨得而無私積明宗朝為太原少尹入為太府卿長興中集平生所驗方七十五首并修合藥法百件號曰要術刋石置于太原府衙門之左以示于衆病者頼焉天福中以耄期上表求退以光禄卿致仕卒于晉陽年八十餘史臣曰夫彰善癉惡麟史之為義也瑜不掩瑕虹玉之為德也故自崇弼而下善者既書之其不善者亦書之庻使後之君子見善如不及見惡如探湯也至如重績之厯法陳𤣥之醫道亦不可漏其名而弗紀也舊五代史巻九十六
