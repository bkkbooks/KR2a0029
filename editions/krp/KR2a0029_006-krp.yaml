body:
  text: 舊五代史巻二考證梁太祖紀二磁州刺史袁奉滔磁州案歐史磁訛恵今據新唐書及通鑑改正是時襄州節度趙匡凝趙匡凝沿宋諱作趙凝今據舊唐書及歐陽史增匡字隨州刺史趙匡琳趙匡琳沿宋諱作趙璘今增匡字正月先屯於内黄案舊唐書及通鑑俱以屯内黄為三月事由是潞州復為晉人所有案澤潞懷三州之下新唐書及通鑑俱作八月歐陽史從是書作七月洺州復平案洺州之平通鑑作九月舊唐書及歐陽史俱作八月連拔瀛莫二州案新唐書昭宗紀九月甲寅朱全忠䧟瀛州十月辛酉䧟莫州通鑑與新唐書同攷舊唐書俱作九月事是書俱作十一月天復元年正月乙酉朔案乙酉朔通鑑與是書同舊唐書作甲申攷昭宗本紀癸未夜孫德昭等以兵攻劉季述王仲先通鑑作德昭等謀以除夜伏兵俟之以癸未為除夜則正朔斷為甲申也作乙酉朔似誤癸巳降制進封帝為梁王案全忠進封新舊唐書皆作二月與是書作正月異定州刺史王處直以本軍自飛孤入案新舊唐書王處直三字原本闕今據通鑑増入會氏叔琮以芻糧不給遂班師案旋師之期歐陽作三月是書唐紀作五月又與此紀作四月異罷𦙍知政事案崔𦙍罷知政事新舊唐書皆作十一月甲戌與是書異己丑唐丞相崔𦙍京兆尹鄭元規至華州案舊唐書作十二月己夘崔𦙍至三原砦通鑑作癸未俱與是書作己丑異癸未與岐軍大戰案岐軍之敗新舊唐書皆繫五月與是書作六月異願録其孥案録原本訛戮今參攷夢𤨏言據文改正甲寅鄜州平周彛聞之收軍而遁案鄜州平新舊唐書皆繫十二月與是書繫十一月異華州留後李存審案李存審三字疑有舛誤攷王師範傳作崔𦙍在華州是日師範又遣其將劉鄩盗據兖州案劉鄩䧟兖州新舊唐書俱作丙午與是書作丙辰異昭宗御延喜樓送之喜原本訛熹今據通鑑改正戊午師範舉珹請降案師範之降舊唐書作十一月丁酉新唐書與是書同朱友倫因擊鞠墮馬卒於長安友倫九國志趙廷隱傳作友亮攷歐陽史及通鑑並作友倫九國志訛䕶駕都指揮使朱友諒友諒歐陽史梁紀作友謙誤攷歐陽史家人傳亦作友諒與是書同表趙匡凝罪狀削奪官爵案削奪趙匡凝官爵舊唐書作八月丁未與是書作七月辛未異武昭武定泰寧平盧匡國案武昭原本脫武字匡國沿宋諱作章國今據歐陽史増改舊五代史巻二攷證
