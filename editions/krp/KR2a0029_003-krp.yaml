body:
  text: 舊五代史巻一宋門下侍郎參知政事監修國史薛居正等撰梁書第一太祖紀一太祖神武元聖孝皇帝姓朱氏諱晃本名溫宋州碭山人其先舜司徒虎之後髙祖黯曾祖茂琳祖信父誠帝即誠之第三子母曰文惠王皇后五代會要梁肅祖宣元皇帝諱黯舜司徒虎四十二代孫開平元年七月追尊宣元皇帝廟號肅祖葬興極陵敬祖光獻皇帝諱茂琳宣元皇帝長子母曰宣僖皇后范氏開平元年七月追尊光獻皇帝廟號敬祖葬永安陵憲祖昭武皇帝諱信光獻皇帝長子母曰光孝皇后楊氏開平元年七月追尊昭武皇帝廟號憲祖葬光天陵烈祖文穆皇帝諱誠昭武皇帝長子母曰昭懿皇后劉氏開平元年七月追尊文穆皇帝廟號烈祖葬咸寧陵以唐大中六年嵗在壬申十月二十一日夜生於碭山縣午溝里是夕所居廬舍之上有赤氣上騰里人望之皆驚奔而來曰朱家火發矣及至則廬舍儼然既入隣人以誕孩告衆咸異之昆仲三人俱未冠而孤母擕養寄於蕭縣人劉崇之家帝既壯不事生業以雄勇自負里人多厭之崇以其慵惰每加譴杖惟崇母自幼憐之親為櫛髪嘗誡家人曰朱三非常人也汝輩當善待之家人問其故答曰我嘗見其熟寐之次化為一赤蛇然衆亦未之信也唐僖宗乾符中闗東薦饑羣賊嘯聚黄巢因之起於曹濮饑民願附者凡數萬帝乃辭崇家與仲兄存俱入巢軍以力戰屢㨗得補為隊長唐黄明元年十二月甲申黄巢陷長安遣帝領兵屯於東渭橋是時夏州節度使諸葛爽率所部屯於櫟陽巢命兵招諭爽爽遂降於巢中和元年二月巢以帝為東南靣行營先鋒使令攻南陽下之六月帝歸長安巢親勞於㶚上七月巢遣帝西拒邠岐鄜夏之師於興平所至皆立功二年二月巢以帝為同州防禦使使自攻取帝乃自丹州南行以擊左馮翊㧞之遂據其郡時河中節度使王重榮屯兵數萬紏兵諸候以圖興復帝時與之鄰封屢為重榮所敗遂請濟師於巢表章十上為偽左軍使孟楷所蔽不達又聞巢軍勢蹙諸校離心帝知其必敗九月帝遂與左右定計斬偽監軍使嚴實舉郡降于重榮重榮即日飛章上奏時僖宗在蜀覽表而喜曰是天賜予也乃詔授帝左金吾衛大將軍充河中行營副招討使仍賜名全忠自是率所部與河中兵士偕行所向無不克㨗三年三月僖宗制授帝宣武軍節度使依前充河中行營副招討使仍令侯收復京闕即得赴鎮四月巢軍自藍闗南走帝與諸侯之師俱收長安乃率部下一旅之衆仗節東下七月丁卯入於梁苑是時帝年三十有二時蔡州刺史秦宗權與黄巢餘孽合從肆虐共圍陳州乆之僖宗乃命帝為東北面都招討使時汴宋連年阻饑公私俱困帑廪皆虚外為大敵所攻内則驕軍難制交鋒接戰日甚一日人皆危之惟帝鋭氣益振是歳十二月帝領兵於鹿邑與巢衆相遇縱兵擊之斬首二千餘級乃引兵入毫州因是兼有譙郡之地四年春帝與許州田從異諸軍同收瓦子寨殺賊數萬衆是時陳州四面賊寨相望驅擄編氓殺以充食號為舂磨寨帝分兵剪撲大小凡四十戰四月丁巳收西華寨賊將黄鄴單騎奔陳帝乘勝追之鼓噪而進㑹黄巢遁去遂入陳州刺史趙犨迎於馬前俄聞巢黨尚在陳北故陽壘帝遂逕歸大梁是時河東節度使李克用奉僖宗詔統騎軍數千同謀破賊與帝合勢於中牟北邀擊之賊衆大敗於王滿渡多束手來降時賊將霍存葛從周張歸厚張歸霸皆匍匐於馬前悉宥而納之遂逐殘㓂東至於寃句五月甲戌帝與晉軍振旅歸汴館克用於上源驛既而備犒宴之禮克用乗醉任氣帝不平之是夜命甲士圍而攻之會大雨雷電克用因得於電光中踰垣遁去惟殺其部下數百人而已六月陳人感解圍之惠為帝建生祠堂於其郡是嵗黄巢雖殁而蔡州秦宗權繼為巨孽有衆數萬攻陷鄰郡殺掠吏民屠害之酷更甚巢賊帝患之七月遂與陳人共攻蔡賊於激水殺數千人九月巳未僖宗就加帝檢校司徒同平章事封沛郡侯食邑千户光啟元年春蔡賊掠亳潁二郡帝帥師以救之遂東至於焦夷敗賊衆數千生擒賊將殷鐵林梟首以狥軍而還三月僖宗自蜀還長安改元光啟四月戊辰就加帝檢校太保增食邑千五百户十二月河中太原之師逼長安觀軍容使田令孜奉僖宗出幸鳯翔二年春蔡賊益熾時唐室微弱諸道州兵不為王室所用故宗權得以縱毒連陷汝洛懷孟唐鄧許鄭圜幅數千里殆絶人烟惟宋亳滑潁僅能閉壘而已帝累出兵與之交戰然或勝或負人甚危之三月庚辰僖宗降制就封帝為沛郡王是月僖宗移幸興元五月嗣襄王熅僭即帝位於長安改元為建貞遣使賫偽詔至汴帝命焚之於庭未幾襄王果敗七月蔡人逼司州節度使鹿宴𢎞使來求救帝遣葛從周等率師赴援師未至而城陷宴𢎞為蔡賊所害十一月滑州節度使安師儒以怠於軍政為部下所殺帝聞之乃遣朱珍李唐賓襲而取之由是遂有滑臺之地十二月僖宗降制就加帝檢校太傅改封呉興郡王食邑三千户是嵗鄭州為蔡賊所陷刺史李璠單騎來奔帝宥而納之以為行軍司馬宗權既得鄭益驕帝遣禆將邏於金隄驛與賊相遇因擊之賊衆大敗追至武陽橋斬首千餘級帝每與蔡人戰於四郊既以少擊衆常出奇以制之但患師少未快其㫖宗權又以巳衆十倍於帝恥於頻敗乃誓衆堅决以攻夷門既而獲蔡之諜者備知其事遂謀濟師焉三年春二月乙已承制以朱珍為淄州刺史俾募兵於東道且慮蔡人暴其麥苖期以夏首囘歸珍既至淄棣旬日之内應募者萬餘人又潛襲青州獲馬千匹鎧甲稱是乃鼓行而歸四月辛亥逹於夷門帝喜曰吾事濟矣是時賊將張晊屯於北郊秦賢屯於版橋各有衆數萬樹栅相連二十餘里其勢甚盛帝謂諸將曰此賊方今息師蓄銳以俟時必來攻我况宗權度我兵少又未知珍來謂吾畏懼止於堅守而已今出不意不如先擊之乃親引兵攻秦賢寨將士踊躍争先賊果不備連㧞四寨斬首萬餘級時賊衆以為神助庚午賊將盧瑭領萬餘人於圃田北萬勝戍夾汴水為營跨河為梁以扼運路帝擇精鋭以襲之是日昏霧四合兵及賊壘方覺遂突入掩殺赴水死者甚衆盧瑭自投於河河南諸賊連敗不敢復駐皆併在張晊寨自是蔡㓂皆懷震讋往往軍中自相驚亂帝旋師休息大行犒賞繇是軍士各懷憤激每遇敵無不奮勇五月丙子出酸棗門自卯至未短兵相接賊衆大敗追斬二十餘里僵仆就枕宗權恥敗益縱其虐乃自鄭州親領突將數人逕入張晊寨其日晚大星隕於賊壘有聲如雷辛巳兖鄆滑軍士皆來赴援乃陳兵于汴水之上旌旗器甲甚盛蔡人望之不敢出寨翼日分布諸軍齊攻賊寨自寅至申斬首二萬餘級會夜收軍獲牛馬輜重生口器甲不可勝計是夜宗權晊遁去遲明追之至陽武橋而還宗權至鄭州乃盡焚其廬舍屠其郡人而去始蔡人分兵㓂陜雒孟懷許汝皆先據之因是敗也賊衆恐懼咸棄之而遁帝乃慎選將佐俾完葺壁壘為戰守之備於是遠近流亡復歸者衆矣是時揚州節度使髙駢為裨將畢師鐸所害復有孫儒楊行密互相攻伐朝廷不能制乃就加帝檢校太尉兼領淮南節度使九月亳州禆將謝殷逐刺史宋兖自據其郡帝親領軍屯於太清宫遣霍存討平之帝之禦蔡㓂也鄆州朱瑄兖州朱瑾皆領兵來援及宗權既敗帝以瑄瑾宗人也又有力於己皆厚禮以歸之瑄瑾以帝軍士勇悍私心愛之乃密於曹濮界上懸金帛以誘之帝軍利其貨而赴者甚衆帝乃移檄以讓之朱瑄來使不遜乃命朱珍侵曹伐濮以懲其姦未幾珍伐曹州執刺史丘禮以獻遂移兵圍濮兖鄲之釁自茲而始矣通鑑攷異引髙若拙後史補云梁太祖皇帝到梁深有大志然兵力不足常欲外掠又虞四境之難每有鬱然之狀時有薦敬秀才於門下乃白梁祖曰明公方欲圖大事輜重必為四境所侵但令麾下將士詐為叛者而逃即明公奏於主上及告四鄰以自襲叛徒為名梁祖曰天降奇人以佐於吾初從其議一出而致衆十倍十月僖宗命水部郎中王贊撰紀功碑以賜帝是月帝親帥騎數千巡師於濮上因破朱瑄援師於范縣丁未攻陷濮州刺史朱裕單騎奔鄆尋為鄆人所敗踰月乃還十二月僖宗遣使賜帝鐵劵又命翰林承㫖劉崇望撰徳政碑以賜帝閏月甲寅帝請行營司馬李璠權知淮南畱後乃遣大將郭言領兵援送以赴揚州文徳元年正月帝率師東赴淮海行次宋州聞揚行密已㧞揚州遂還是時李璠郭言行至淮上為徐戎所扼不克進而還帝怒遂謀伐徐二月丙戌僖宗制以帝為蔡州四靣行營都統繇是諸鎭之師皆受帝之節制三月庚子昭宗即位是月蔡人石璠領萬衆以剽陳亳帝遣朱珍率精騎數千擒璠以獻四月戊辰魏博樂彦禎失律其子從訓出奔相州使來乞師帝遣朱珍領大將濟河連收黎陽臨河二邑既而魏軍推小校羅𢎞信為帥𢎞信既立遣使送款于汴帝優而納之遂命班師是月河南尹張全義襲李罕之于河陽克之罕之單騎出奔因乞師于太原李克用為發萬騎以援之罕之遂收其衆偕晉軍合勢急攻河陽全義危急遣使求救于汴帝遣丁會牛存節葛從周領兵赴之大戰於溫縣晉人與罕之俱敗於是河橋解圍全義歸於河陽因以丁會為河陽畱後五月巳亥昭宗制以帝檢校侍中增食邑三千户戊辰詔改帝鄉錦衣里曰沛王里是月帝以兼有溫孟之地無西顧之患將大整師徒畢力誅蔡會蔡人趙徳諲舉漢南之地以歸於朝廷且遣使送款於帝仍誓戮力同討宗權帝表其事朝廷因以徳諲為蔡州四靣副都統又以河陽保義義昌三節度帝行軍司馬兼糧科應接至是帝領諸侯之師會徳諲以伐蔡賊於汝水之上遂薄其城五日之内樹二十八寨以環之葢象列宿之數也時帝親臨矢石一日飛矢中其左掖血漬單衣顧謂左右曰勿洩九月以糧運不繼遂班師是時帝知宗權殘孽不足為患遂移兵以伐之十月先遣朱珍領兵與時溥戰於呉康鎮徐人大敗連收豐蕭二邑溥擕㪚騎馳入彭門帝命分兵以攻宿州刺史張友携符印以降既而徐人閉壁堅守遂命龎師古屯兵守之而還是月蔡賊孫儒攻陷揚州自稱淮南節度使龍紀元年正月龎師古攻下宿遷縣進軍於吕梁時溥領軍二萬晨壓師古之軍而陣師古促戰敗之斬首二千餘級溥復入於彭門二月蔡將申叢遣使來告縳秦宗權於帳下折其足而囚之矣帝即日承制以叢為淮西留後未幾叢復為都將郭璠所殺是月璠執宗權來獻帝遣行軍司馬李璠牙校朱克讓檻進於長安既至昭宗御延喜樓受俘即斬宗權於獨栁樹下蔡州平昭宗詔加帝食實封一百户賜莊宅各一區三月又加帝檢校太尉兼中書令進封東平王賞平蔡之功也大順元年四月丙辰宿州小將張筠逐刺史張紹光擁衆以附時漙帝率親軍討之殺千餘人筠遂堅守乙卯時溥出兵暴碭山縣帝遣朱友裕以兵襲之敗徐軍三千餘衆獲沙陁援軍石君和等三千人斬於宿州城下六月辛酉淮南孫儒遣使修好於帝帝表其事請以淮南節度授於儒焉辛未昭宗命帝為宣義軍節度使充河東東靣行營招討使時朝廷宰臣張濬將兵討太原故也八月甲寅昭義都將馮霸殺沙陁所署節度使李克恭來降帝請河陽節度使朱崇節為潞州留後戊辰李克用自率蕃漢步騎數萬以圍潞州帝遣葛從周率驍勇之士夜中銜枚犯圍而入於潞九月壬寅帝至河陽遣都將李讜引軍趨澤潞行至馬牢川為晉人所敗帝又遣朱友裕張全義率精兵至鄆州北以為應援既而崇節從周棄潞來歸戊申帝廷責諸將敗軍之罪斬李􅀈李重𦙍以狥遂班師焉十月乙酉帝自河陽赴滑臺時奉詔將討太原先遣使假道於魏魏人不從先是帝遣行人雷鄴告糴於魏既而為牙軍所殺羅宏信懼故不敢從命遂通好於太原十二月辛丑帝遣丁會葛從周率衆渡河取黎陽臨河又令龎師古霍存下淇門衛縣帝徐以大軍繼其後二年春正月魏軍屯於内黄丙辰帝與之接戰自内黄至永定橋魏軍五敗斬首萬餘級羅𢎞信懼遣使持厚幣請和帝命止其焚掠而歸其俘𢎞信繇是悅服而聽命焉乃收軍屯於河上八月已丑帝遣丁會急攻宿州刺史張筠堅守其壁會乃率衆於州東築堰壅汴水以浸其城十月壬午筠遂降宿州平十一月丁未曹州禆將郭紹賓殺刺史郭饒舉郡來降是月徐將劉知俊率衆二千來降自是徐軍不振十二月兖州朱瑾領軍三萬㓂單父帝遣丁會領大軍襲之敗於金鄉界殺二萬餘衆瑾單馬遁去景福元年正月遣丁會於兖州界徙其民數千户於許州二月戊寅帝親征鄆先遣朱友裕屯軍於斗門甲申次衛南有飛鳥止於峻堞之上鳴噪甚厲副使李璠曰將有不如意之事是夜鄆州朱瑄率步騎萬人襲朱友裕於斗門友裕㧞軍南去乙酉帝晨救斗門不知友裕之退前至斗門者皆為鄆人所殺帝追襲鄆人至瓠河不及遂頓兵於村落間時朱瑄尚在濮州丁亥遇朱瑄率兵將歸於鄆遂來衝擊帝䇿馬南馳為賊所追甚急前後浚溝躍馬而過張歸厚援矟力戰於其後乃免時李璠與都將數人皆為鄆軍所殺五月丙午遣朱克讓率衆暴兖鄆之麥十一月遣朱友裕率兵攻濮州下之擒刺史邵儒以獻濮州平遂命移軍伐徐州二年四月丁丑龎師古下彭門梟時溥首以獻八月帝遣龎師古移兵攻兖駐於曲阜與朱瑾屢戰皆敗之十二月師古遣先鋒葛從周引軍以攻齊州刺史朱威告急於兖鄆既而朱瑄以援兵至遂固其壘乾寧元年二月帝親領大軍由鄆州東路北次於魚山朱瑄硯知即以兵逕至且圖速戰帝整軍出寨時瑄瑾已陣于前須臾東南風大起我軍旌旗失次甚有懼色即令騎士揚鞭呼􅀈哦而西北風驟發時兩軍皆在草莽中帝因令縱火既而烟熖亘天乘勢以攻賊陣瑄瑾大敗殺萬餘人餘衆擁入清河因築京觀於魚山之下駐軍數日而還二年正月癸亥遣朱友恭帥師復伐兖遂塹而圍之未幾朱瑄自鄆率步騎援糧欲入於兖友恭設伏以敗之盡奪其餉於高呉因擒蕃将安福順安福慶二月巳酉帝親領軍屯於單父以為友恭之援四月濠壽二州復為楊行密所陷是時太原遣將史儼兒李承嗣以萬騎馳入於鄆朱友恭遂歸於汴八月帝領親軍伐鄆至大仇遣前軍挑戰設伏於梁山以待之既而獲蕃將史完府奪馬數百匹朱瑄脱身遁去復入於鄆十月帝駐軍於鄆齊州刺史朱瓊遣使請降瓊即瑾之從父兄也帝因移軍至兖瓊果來降未幾瓊為朱瑾所紿掠而殺之帝即以其弟玭為齊州防禦使十一月朱瑄復遣將賀瓌柳存及蕃將何懷寳等萬餘人以襲曹州庻解兖州之圍也帝知之自兖領軍䇿馬先路至鉅野南追而敗之殺戮將盡生擒賀瓌栁存何懷寳及賊黨三千餘人是日申時狂風暴起沙塵拂湧帝曰此乃殺人未足耳遂下令盡殺所獲囚俘風亦止焉翼日贄賀懷等以示于兖帝素知瓌名乃釋之惟斬何懷寳于兖城之下乃班師十二月葛從周領兵復伐兖既至與朱瑾戰于壘下殺千餘衆擒其將孫漢筠巳下二十人遂旋師三年正月河東李克用既破邠州欲謀爭霸乃遣蕃將張汚落以萬騎寨於河北之莘縣聲言欲救兖鄆魏博節度使羅𢎞信患之使來求援二月帝領親軍屯於單父會寒食帝乃親拜文穆皇帝陵於碭山縣午溝里四月辛酉河東泛漲將壞滑城帝令决隄岸以分其勢為二河夾滑城而東為害滋甚是月帝遣許州刺史朱友恭領兵萬人渡淮以便宜從事時黄鄂二州累遣使求援故有是行五月命葛從周統軍屯於洹水以備蕃軍六月李克用帥蕃漢諸軍營于斥丘遣其男落落將鐵林小兒三千騎薄于洹水從周與戰大敗之生擒落落以獻克用悲駭請修舊好以贖其子帝不許遂縶落落送于羅𢎞信斬之越七日我軍還屯陽留以伐鄆八月復壁於洹水是時昭宗幸華州遣使就加帝檢校太師守中書令四年正月帝以洹水之師大舉伐鄆辛卯營於齊水之次龎師古令諸將撤木為橋乙未夜師古以中軍先濟聲振于鄆朱瑄聞之棄壁夜走葛從周逐之至中都北擒瑄並其妻男以獻尋斬汴橋下鄆州平乙亥帝入於鄆以朱友裕為鄆州兵馬留後時帝聞朱瑾與史儼兒在豐沛間搜索糧饋惟留康懷英以守兖州帝因乘勝遣葛從周以大軍襲兖懷英聞鄆失守俄又我軍大至乃出降朱瑾史儼兒遂奔淮南兖海沂密等州平乃以葛從周為兖州留後五月丁丑朱友恭遣使上言大破淮㓂于武昌收復黄鄂二州八月陜州節度使王珙遣使來乞師是時珙弟珂實為蒲帥迭相憤怒日尋干伐而珙兵寡故來求援帝遣張存敬楊師厚等領兵赴陜既而與蒲人戰于猗氏大敗之九月帝以兖鄆既平將士雄勇遂大舉南征命龎師古以徐宿宋滑之師直趨清口葛從周以兖鄆曹濮之衆徑赴安豐淮人遣朱瑾領兵以拒師古因決水以浸軍遂為淮人所敗師古殁焉葛從周行及濠梁聞師古之敗亦命班師舊五代史巻一
