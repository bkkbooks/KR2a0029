body:
  text: 舊五代史卷一百十七宋門下侍郎參知政事監修國史薛居正等撰周書第八世宗四顯德四年春正月己丑朔帝御崇元殿受朝賀仗衛如儀詔天下見禁罪人除大辟外一切釋放壬寅兵部尚書張昭上言奉詔編修太祖實録及梁唐二末主實録伏以撰漢書者先為項籍編蜀記者首序劉璋貴神器之傳授有因厯数之推遷得序伏縁漢隠帝君臨在太祖之前其厯試之績竝在隠帝朝内請先修隠帝實録以全太祖之事竊又以唐末主之前有閔帝在位四月出奔于衛亦未編紀請修閔帝實録其清泰帝實録詣書為廢帝實録允之案自唐末主以上原文疑有脱誤據五代會要云梁末主之上有郢王友珪簒弑居位未有紀録請依宋書劉例書為元凶友珪其末主請依古義書曰後梁實録又唐末主之前有應順帝在位四月出奔亦未編紀請書為前廢帝清泰主為後廢帝其書竝為實録丁未淮南道招討使李重進奏破淮賊五千人于壽州北先是李景遣其弟偽齊王達率全軍來援壽州達留駐濠州遣其将許文縝邉鎬朱元領兵数萬泝淮而上至紫金山設十餘砦與城内烽火相應又築夾道数里将抵壽春為運糧之路至是為重進所敗戊申詔取來月幸淮南宋史李榖傳師老無功時請罷兵為便世宗令范質王溥就榖謀之榖手疏請親征有必勝之利者三世宗大悦用其策二月寅申以前工部侍郎王敏為司農卿辛酉詔每遇入閤日賜百官廊下食從舊制也淮南道行營都監向訓奏破淮賊二千于黄蓍砦甲戌以樞密副使王朴為權東京留守兼判開封府以三司使張美為大内都廵檢乙亥車駕發京師乙酉次下蔡三月唐寅旦帝率諸軍駐于紫金山下命今上率親軍登山擊賊連破数砦斬獲数千斷其來路賊軍首尾不相救是夜賊将朱元朱仁裕孫璘各舉砦來䧏䧏其衆萬餘人翌日盡陷諸砦殺獲甚衆擒賊大将建州節度使許文縝前湖南節度使邉鎬其餘黨沿流東奔帝自率親騎沿淮北岸追賊及晡馳二百餘里至鎭淮軍殺獲数千人奪戰艦糧船数百艘錢帛器仗不可勝数甲午詔發近縣丁夫城鎮淮軍仍搆浮梁于淮上廬州都部署劉重進奏殺賊三千人于壽州東山口皆紫金山之潰兵也戊戌授宣徽南院使淮南節度使向訓為徐州節度使充淮南道行營都監即命屯鎮淮上己亥帝自鎮淮軍復幸下蔡壬寅賜淮南䧏軍許文縝邉鎬已下萬五百人衣服錢帛有差丙午壽州劉仁贍上表乞䧏帝遣閤門使張保續入城慰撫翌日仁贍復令子崇讓上表請罪戊申幸壽州城北劉仁贍與将佐已下及兵士萬餘人出䧏帝慰勞乆之恩賜有差庚戌詔移壽州于下蔡以故壽州為壽春縣是日曲赦壽州管内見禁罪人自今月二十一日已前凡有過犯竝從釋放應歸順職員竝與加恩壽州管界去城五十里内放今年秋夏租税自來百姓有曾受江南文字聚集山林者竝不問罪如有曾相傷害者今後不得更有相酬及經官論訴自用出已求被擄却骨肉者不計逺近竝許本家識認官中給物收贖曾經陣敵處所暴露骸骨竝仰收拾埋瘞自前政令有不便于民者委本州條例聞奏當行釐革辛亥以偽命清淮軍節度使檢校太尉兼侍中劉仁贍為特進檢校太尉兼中書令鄆州節度使以右羽林軍楊信為壽州節度使是日劉仁贍卒壬子以江南偽命西北面行營都監使舒州團練使朱元為蔡州防禦使以江南偽命文徳殿使壽州監軍周延構為衛尉卿以江南偽命壽州營田副使孫羽為太僕卿以壽州節度判官鄭牧為鴻臚卿賞歸心也癸丑追奪前許州行軍司馬韓倫在身官爵配流沙門島倫侍衛馬軍指揮使令坤之父也令坤領陳州倫在州干預郡政掊歛之暴公私患之為項城民武都等所訟帝命殿中侍御史率汀就按之倫詐報汀云準詔赴闕汀即奏之帝愈恕遽令追劾盡得其實故有是命宋史韓令坤傳云倫法當棄市令坤泣請于世宗遂免死遣左諫議大夫尹日就于壽州開倉賑飢民丙辰車駕發下蔡還京夏四月己已車駕至自下蔡辛未以江南偽命西北面行營應援使前永安軍節度使檢校太尉許文縝為左監門衛上将軍檢校太尉以偽命西北面行營應援都軍使前武安軍節度使邉鎬爲左千牛衛上将軍檢校太𫝊丙子宰臣李榖以風痺經年上章請退凡三上章不允宋史李榖傳榖扶疾入見便殿詔令不拜命坐御坐側以抱疾久請辭相位世宗怡然勉之謂曰譬如家有四子一人有疾棄而不飬非父之道也朕君臨萬方卿處輔相之位君臣之間分義斯在奈何以禄奉為言榖愧謝而退丁丑斬内供奉官孫延希于都市御厨使董延勛副使張皓武徳副使盧繼昇竝停職時重修永福殿命延希督役上見役夫有就瓦中噉飯以柿為匕者大怒斬延希而罷延勛等壬午故彭城郡夫人劉氏追册為皇后癸未故皇子贈左驍衛大将軍誼再贈太尉追封越王故皇子贈左武衛大将軍誠再贈太傅追封呉王故皇子贈左屯衛大将軍諴再贈太保追封韓王故皇弟贈太保侗再贈太傅追封郯王故皇弟贈司空信再贈司徒追封杞王故皇第三妺樂安公主追册莒國長公主故皇第五妹永寧公主追册梁國長公主故皇從弟贈左領軍大将軍守愿再贈左衛大将軍故皇從弟贈左監門将軍奉超再贈右衛大将軍故皇從弟贈左千牛衛将軍愻再贈右武衛大将軍甲申以先䧏到江南兵士團結為三十指揮號懐徳軍五月丁亥朔帝御崇元殿受朝仗衛如式己丑以修修永福殿改為廣政殿辛卯以端午賜文武百僚衣服書始也癸已侍衛親軍都指揮使宋州節度使充淮南道行營都招討李重進加檢校太傅兼侍中以宣徽南院使淮南節度使向訓為徐州節度使加檢校太尉同平章事丙申斬密州防禦副使侯希進于本郡時太常博士張糺檢視本州夏苗移牒希進分檢希進以不奉朝㫖不從糺具事以聞帝怒遣使斬之丁酉以滑州節度使兼殿前都㸃檢駙馬都尉張永徳為潭州節度使加檢校太尉以今上為滑州節度使加檢校太保依前殿前殿前都指揮使今上以三年十月宣授同州節度使未于正衙宣制至是移鎮滑臺故自永州防禦使授焉以侍衛馬軍都指揮使洋州節度使韓令坤為陳州節度使加檢校太傅以權侍衛歩軍都指揮使岳州防禦使袁彥為曹州節度使加檢校太保竝典軍如故己亥以左神武統軍劉重進為鄧州節度使以虎捷左廂都指揮使閬州防禦使趙晁為河陽節度使以兖州防禦使白延遇為同州節度使辛丑宰臣范質李榖王溥竝加爵邑改功臣樞密使魏仁浦加檢校太傅進封開國公辛亥知廬州行府事劉重劉重進奏殺敗賊獲戰船三十艘壬子以宣徽北院使呉延祚為宣徽南院使權西京留守判河南府事是月詔中書門下差官詳定格律中書門下奏差侍御史知雜事張湜等一十人詳定候畢日委御史臺尚書省四品已上兩省五品已上官參詳可否送中書門下議定奏取進止從之六月丁已前濠州刺史齊藏珍以罪棄市己未以責授耀州司馬鍾謨為衛尉少卿賜紫帝既誅孫晟尋竄謨為耀州既而悔之故有是命辛酉西京奏伊陽山谷中有金屑民淘取之詔勿禁乙酉詔在朝文資官再舉堪為令録從事者各一人秋七月丁亥以前徐州節度使檢校太師兼中書令武行徳為左衛上将軍先是詔行徳分兵屯定逺縣既為淮寇所襲王師死者数百人帝懲其僨軍之咎故以環衛處之以前河陽節度使李継勲為右衛大将軍責壽春南砦之敗也壬辰以刑部尚書王易為太子少保致仕以右監門衛上将軍葢萬為左衛上将軍致仕己酉司農卿王敏卒甲辰詔曰準令諸論田宅婚姻起十一月一日至三月三十日止者州縣争論舊有釐革每至農月貴塞訜端近聞官吏因循由此成弊凡有訴競故作逗遛至時而不與盡辭入務而即便停罷強猾者因兹得計孤弱者無以自伸起今後應有人論訴陳詞状至二月三十日權停若是交相侵奪情理妨害不可停滯者不拘此限八月乙卯朔兵部尚書張昭上疏望準唐朝故事置制舉以罩英才帝覽而善之因命昭具制舉合行事件條奏以聞丙辰以太常卿田敏為工部尚書以太子賔客司徒詡為太常卿辛未詔在朝武班各舉武勇膽力堪為軍職者一人甲戌賜左監門上将軍許文縝右千牛上将軍邉鎬右衛大将軍王環衛尉卿周延構大府卿馮延魯太僕卿鄭牧鴻臚卿孫羽衛尉少卿鍾謨工部郎中何幼沖各冬服絹二百匹綿五百兩文縝已下皆呉蜀之士也乙亥宰臣李榖罷相守司空加食邑實封榖抱疾周嵗累上表求退至是方允其請以樞密副使户部侍郎王朴為樞密使檢校太保癸未前濮州刺史胡立自偽蜀廻蜀主孟昶寓書于帝其末云昶昔在齠齓即離并都亦承皇帝鳯起晉陽龍興汾水合叙鄉闗之分以陳玉帛之歡儻䝉惠以嘉音佇望專馳信使謹因胡立行次聊陳感謝披述云初王師之伐秦鳯也以立為排陣使既而為蜀所擒及秦鳯平得降軍数千人其後帝念其懐土悉放歸蜀至是蜀人知感故歸立于我昶本生于太原故其書意願與帝推鄉里之分帝怒其抗禮不答九月甲申朔宰臣王溥樞密使王朴皆丁内艱竝起復舊位以侍衛馬歩軍都指揮使宋州節度使李重進為鄆州節度使典軍如故己丑以前翰林學士禮部侍郎竇儀為端明殿學士依前禮部侍郎冬十月丙辰賜京城内新修四寺額以天清天壽顯静顯寧為名壬戌左藏庫使符令光棄市時帝再議南征先期勅令光廣造軍士袍𥜗不即辦集帝怒命斬之時宰臣等至庭救解帝起入營遂戮于都市令光出勲閥之後厯職内庭以請自守累總總繁劇甚有亷幹之譽帝素重其為人每加委用至是以小過見誅人皆寃之戊午詔懸制科凡三其一曰賢良方正能直言極諫科其二曰經學優深可為師法科其三曰詳閑吏理達于教化科不限前資見任職官黄依草澤竝許應詔時兵部尚書張昭條奏請興制舉故有是命癸亥河東偽命麟州刺史楊重訓以城歸順授重訓本州防禦使檢校太𫝊戊辰詔取月内車駕暫幸淮上己已以樞密使王朴為權東京留守以三司使張美為大内都㸃檢壬辰駕發京師壬午以前鄆州節度使郭從義為徐州節度使以徐州節度使向訓為宋州節度使十一月癸未朔以内客省使昝居潤為宣徽北院使權東京留守丙戌車駕至濠州城下戊子親破十八里灘砦在濠州東北淮水之中四面阻水上令甲士数百人跨駞以濟今上騎軍浮水而渡遂破其砦擄其戰艦而迴癸已帝親率諸軍攻濠州奪闗城破水砦賊衆大敗焚戰艦七十餘艘斬首二千級進軍攻羊馬城丙申夜偽濠州團練使郭廷謂上表陳情且言家在江南欲遣人禀命于李景從之辛丑帝自濠州率大軍水陸齊進循淮而下命今上率精騎為前鋒癸卯大破淮賊于渦口斬首五千級收降卒二千餘人奪戰船三百艘遂鼓行而東以追奔寇晝夜不息沿江城柵所至皆下乙巳至泗州今上乗麾軍焚郭門奪月城帝親冐失石以攻其壘丙午日南至從臣拜賀于月城之上十二月乙卯泗州守将范再遇以其城䧏授再遇宿州團練使戊午帝自泗州率衆東下命今上領兵行于南岸與帝夾淮而進己未至清口追及淮賊軍行鼓譟之聲聞数十里辛酉至楚州西北大破賊衆水陸俱奔有賊船数艘順流而逸帝率驍騎與今上追之数十里今上擒賊大将偽保義軍節度使江北都應援使陳承昭以獻収獲舟船除焚盪外得三百餘艘将士除殺溺外得七千餘人初帝之渡淮也比無水戰之偹每遇賊之戰棹無如之何敵人亦以此自恃有輕我之意帝即于京師大集工徒修成艛艦踰嵗得数百艘兼得江淮舟船遂令所獲南軍教北人習水戰出沒之勢未幾舟師大偹至是水陸皆捷故江南大震壬戌偽命濠州團練使郭廷謂以城歸順乙丑雄武軍使崔萬廸以漣水歸順丙寅以郭廷謂亳州防禦使隆平集廷謂望金陵大慟再拜然後以城䧏世宗曰江南諸将惟卿断渦口橋破定逺塞足以報李景禄矣濠上使李景自守亦不能為乃授以亳州防禦使以偽命濠州兵馬都監陳遷為沂州團練使以偽命保義軍節度使陳承昭為右監門上将軍江南李景遣兵驅擄掦州士庶渡江焚其州郭而去丙子故同州節度使白延遇贈太尉故濠州刺史唐景思贈武清軍節度使丁丑泰州平舊五代史巻一百十七
