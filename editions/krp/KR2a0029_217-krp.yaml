body:
  text: 舊五代史巻一百九宋門下侍郎參知政事監修國史薛居正等撰漢書第十一列傳六杜重威其先朔州人近世徙家于太原祖興振武牙將父堆金事唐武皇為先鋒使重威少事明宗自䕶聖軍校領防州刺史其妻即晉高祖妹也累封宋國大長公主天福初命重威典禁軍遙授舒州刺史二年張從賓搆亂據汜水晉高祖遣重威與侯益率衆破之以功授潞州節度使與楊光遠降范延光于鄴城改許州節度使兼侍衞親軍馬歩軍副指揮使尋加同平章事未幾移鎮鄆州遷侍衞親軍馬歩軍都指揮使通鑑馮道李崧屢薦重威之能以為都指揮使充隨駕御管使及鎮州安重榮稱兵向闕命重威禦之敗重榮于宗城重榮奔據常山重威尋㧞其城斬重榮首傳于闕下授成德軍節度使所得重榮家財及常山公帑悉歸於已晉髙祖知而不問至鎮復重斂於民税外加賦境内苦之通鑑重威所至黷貨民多逃亡嘗出過市謂左右曰人言我驅盡百姓何市人之多也少帝嗣位與契丹絶好契丹主連年伐晉重威但閉壁自守部内城邑相繼破陷一境生靈受屠戮重威任居方面未嘗以一士一騎救之每敵騎數十驅漢人千萬過城下如入無人之境重威但登陴注目畧無邀取之意開運元年秋加北面行營招討使二年領大軍下秦州滿城遂城契丹主自古北口迴軍追躡王師重威等狼狽而旋至陽城為契丹所困㑹大風狂猛軍情憤激符彥卿張彥澤等引軍四出敵衆大潰諸将欲追之重威曰逢賊得命更望複子乎遂收軍馳歸常山先是重威於州内括借錢帛吏民大被其苦人情咸怨重以境内凋弊十室九空重威遂無留意連上表乞歸朝不俟報即時上路朝廷以邉上重鎮主帥擅離茍有奔衝慮失禦備然亦無如之何即以馬全節代之重威尋授鄴都留守㑹鎮州軍食不繼遣殿中監王欽祚就本州和市重威私第有粟十餘萬斛遂録之以聞朝廷給絹數萬匹償其粟直重威大忿曰我非反逆安得籍没耶三年冬晉少帝詔重威與李守貞等率師經畧瀛鄚師至瀛州城下晉騎將梁漢璋與契丹接戰漢璋死焉重威即時迴軍次武强聞契丹主南下乃西趨鎮州至中渡橋與契丹夾滹水而營十二月八日宋彥筠王清等率數千人渡滹沲陣於北岸為敵所破時契丹游軍巳至欒城道路隔絶人情危蹙重威密遣人詣敵帳潛布腹心契丹主大悦許以中原帝之重威庸暗深以為信一日伏甲於内召諸將㑹告以降敵之意諸將愕然以上將既變乃俛首聽命遂連署降表令中門使高勲齎送敵帳軍士解甲舉聲慟哭是日有大霧起於降軍之上契丹主使重威衣赭袍以示諸軍尋偽加守太傅鄴都留守如故契丹主南行命重威部轄晉軍以從既至東京駐晉軍於陳橋士伍飢凍不勝其苦重威每出入衢路為市民所詬俛首而巳契丹下令括率京城錢帛將相公私雷同率配重威與李守貞各萬緡乃告契丹主曰臣等以十萬漢軍降于皇帝不免配借臣所不甘契丹主笑而免之尋羣盗斷澶州浮梁契丹乃遣重威歸藩明年三月契丹主北去至相州城下重威與妻石氏詣牙帳貢獻而迴髙祖車駕至闕以重威為宋州節度使加守太尉重威懼閉城拒命詔高行周率兵攻討重威遣其子𢎞遂等告急于鎮州滿逹勒乞師救援且以𢎞遂為質滿達勒遣蕃將楊衮赴之未幾鎮州諸軍逐滿達勒楊衮至洺州而迴十月高祖親征車駕至鄴城之下遣給事中陳觀等齎詔入城許其歸命重威不納數日高祖親率諸軍攻其壘不克王師傷夷者萬餘人宋史杜漢徽傳云從高行周討杜重威于鄴城屢為流矢所中身被重創猶力戰觀者壯之高祖駐軍數旬城中糧盡屑麴餅以給軍士吏民踰壘而出者甚衆皆無人色至是重威牙將詣行宫請降復遣節度判官王敏奉表請罪賜優詔敦勉許其如初重威即遣其子𢎞遂妻石氏出候高祖重威繼踵出降素服俟罪復其衣冠賜見即日制授檢校太師守太傅兼中書令鄴城士庶殍殕者十之六七先是契丹遣幽州指揮使張璉以部下軍二千餘人屯鄴時亦有燕軍一千五百人在京師㑹高祖至闕有上變者言燕軍謀亂盡誅于繁臺之下咸稱其寃有逃奔于鄴者備言其事故張璉等懼死與重威膠固守城畧無叛志高祖亦悔其前失累令宣諭許以不死璉等于城上揚言曰繁臺之誅燕軍何罪既無生理以死為期璉一軍在圍中重威推食解衣盡力姑息燕軍驕悍憑陵吏民子女金帛公行豪奪及重威請命璉等邀朝廷信誓詔許璉等却歸本土及出降盡誅璉等將數十人其什長巳下放歸幽州將出漢境剽畧而去高祖遣三司使王章樞密副使郭威録重威部下將吏盡誅之籍其財産與重威私帑分給將士車駕還宫高祖不豫既而大漸顧命之際謂近臣將佐曰善防重威帝崩遂收重威重威子𢎞璋𢎞璉𢎞㻧誅之詔曰杜重威猶貯禍心未悛逆節梟音不改虺性難馴昨朕小有不安罷朝數日而重威父子潛肆兇言怨謗大朝扇惑小輩今則顯有陳告備驗姦期既負深恩須寘極法其杜重威父子並處斬所有晉朝公主及外親族一切如常仍與供給重威父子巳誅陳尸于通衢都人聚觀者詬罵蹴擊軍吏不能禁屍首狼籍斯須而盡𢎞璉重威之子也累官至陳州刺史隆平集黨進㓜為天雄軍節度使杜重威奴重威愛其淳謹雖長猶令與婢妾雜侍重威敗周祖得之以為鐵騎都虞候重威之後寒餓進常分俸以給士大夫或媿焉李守貞河陽人也少桀黠落魄事本部為牙將晉高祖鎮河陽用為典客後移數鎮皆從之及即位累遷至客省使天福中李金全以安州叛淮夷入冦晉高祖命馬全節討之守貞監䕶其軍賊平以守貞為宣徽使少帝即位授滑州節度兼侍衞馬軍都指揮使未幾改侍衞都虞候開運元年春敵衆犯澶魏少帝幸澶州契丹主遣將滿達勒以竒兵由鄆州馬家口濟河立柵于東岸守貞率師自澶州馳赴之契丹大敗溺死者數千人獲馬數百匹偏禆七十餘人有頃敵退晉少帝還京以守貞為兖州節度使依前侍衞都虞候五月以守貞為青州行營都部署率兵二萬東討楊光遠命符彥卿為副十一月光遠子承勲等乞降守貞入城害光遠于别第光遠有孔目官吏宋顔者盡以光遠財寶名姬善馬告于守貞得之置于帳下近例官軍克復城隍必降德音洗滌瑕穢時樞密使桑維翰以光遠同惡數十輩潛竄未出搜索甚急故制書乆不下或有告宋顔匿于守貞處者朝廷取而殺之守貞由是怨維翰時行營將士所給賞賜守貞盡以黦茶染木薑藥之𩔖分給之軍中大怨乃以帛包所得物如人首級目之為守貞頭懸于樹以詛之守貞班師加同平章事以楊光遠東京第賜之守貞因取連宅軍營以廣其第大興土木治之嵗餘為京師之甲行幸賜宴恩禮無比開運二年春契丹主以全軍南下前鋒至相州湯隂縣詔守貞屯滑州少帝再幸澶州以守貞為北面行營都監與招討使杜重威北伐洎獲陽城之㨗遂收軍而還四月車駕還京以守貞為侍衞副都指揮使移鎮宋州加檢校太師三年春詔守貞率師巡邊至衡水獲鄚州刺史趙思英而還居無何代高行周為侍衞親軍都指揮使移鎮鄆州意頗觖望㑹宰臣李崧加侍中守貞謂樞密使直學士殷鵬曰樞密何功便加正相先是桑維翰以元勲舊徳為樞密使守貞位望素處其下毎憚之與李彥韜馮玉輩恊力排斥維翰竟罷樞務李崧勢分疎遠守貞得以凌蔑其年夏契丹冦邊以守貞為北面行營都部署少帝開曲宴于内殿以寵其行教坊伶人獻語云天子不須憂北冦守貞面上管幽州既罷守貞有自負之色以其言誇詫于外既而率兵至定州北與契丹偏師遇斬蕃將嘉哩而還九月加兼侍中㑹契丹遣瀛州刺史偽降于少帝請發大軍應接朝廷信之十月詔杜重威為北面行營招討使以守貞為兵馬都監知幽州行府事先是守貞領兵冄由鄴都杜重威厚加贈遺曲意承迎守貞悦之毎于帝前稱舉請委征討之柄至是守貞重威等㑹兵于鄴遂趨瀛州瀛州不應貝州節度使梁漢璋為蕃將高牟翰所敗死之王師遂還師至深州聞契丹大至乃西趨鎮州至滹沲之中渡與敵相遇官軍營于滹水之南未幾敵騎潛渡至欒城斷我糧路尋則王清戰死杜重威遂與守貞歸命契丹授守貞司徒依前鄆州節度使從契丹至汴時京輦之下契丹充斥都人士庶若在塗炭二帥出入揚揚市人詬之畧無慙色有頃河北及京東草㓂大起澶州浮橋為羣賊所斷契丹主甚恐乃命諸帥各歸本鎮守貞遂赴汶陽高祖入汴守貞懼而來朝授守貞太保移鎮河中居無何高祖晏駕杜重威被誅守貞愈不自安乃潛畜異計乾祐元年三月先致書于權臣布求保證而完城郭繕甲兵晝夜不息守貞以漢室新造嗣君纔立自謂舉無遺策又有僧捴倫者以占術干守貞謂守貞有人君之位通鑑浚儀人趙修已素善術數自守貞鎮滑州署司户參軍累從移鎮為守貞言時命不可妄動前後切諫非一守貞不聽乃稱疾歸里未幾趙思綰以京兆叛遣使奉表送御衣于守貞守貞自謂天時人事合符于已乃潛給草賊令所在竊𤼵遣兵據潼關宋史王繼勲傳李守貞之叛令繼勲據潼關為郭從義所破朝廷命白文珂常思等領兵問罪復遣樞密使郭威西征官軍初至守貞以諸軍多曾隸于麾下自謂素得軍情坐俟扣城迎巳及軍士詬譟大失所望宋史馬全義傳李守貞鎮河中召置帳下及守貞叛周主討之全義毎率敢死士夜出攻周祖壘多所殺傷守貞貪而無謀性多忌刻全義累為畫䇿皆不能用俄而王景崇據岐下與趙思綰遣使推奉守貞乃自號秦王思綰景崇皆受守貞署置又遣人齎蠟彈于吳蜀契丹以求應援馬令南唐書朱元傳守貞以河中反漢命周太祖討之元與李平奉守貞表來乞師未復而守貞敗既而城中糧盡殺人為食召捴倫詰其休咎捴倫至曰王自有天分人不能奪然分野災變俟磨滅將盡存留一人一騎即王鵲起之際也守貞深以為信洎攻城守貞欲𤼵石以拒外軍礮竿子不可得無何上游汎一筏至其木悉可為礮竿守貞以為神助又嘗因宴㑹將佐守貞執弧矢遥指一虎䑛掌圖曰我若有非常之事當中虎舌引弓一發中之左右拜賀守貞亦自負焉宋史吳䖍裕傳周祖討三叛以䖍裕為河中行營都監率䕶聖諸軍五千以徃李守貞出兵五千餘設梯橋分五路于長璉城西北以禦周祖周祖令䖍裕率大軍横擊之蒲人敗守奪其梯橋殺傷大半及周光遜以西砦降其勢益窘人情離散官軍攻城愈急守貞乃潛于衙署多積薪蒭為自焚之計二年七月城陷舉家蹈火而死王師入城于煙中獲其屍斷其首函之并獲數子二女與其黨俱獻于闕下隱帝御明徳楼受俘馘宣露布百寮稱賀禮畢以俘馘徇于都城守貞首級梟于南市諸子并賊黨孫愿劉芮張延嗣劉仁裕僧捴倫靖㻌張球王廷秀焦文傑安在欽等並磔于西市餘皆斬之五代史闕文符后先適河中節度使李守貞之子崇訓守貞嘗得術士善聽聲知人貴賤守貞舉族悉令術士聽之獨言后大富貴當母儀天下守貞信之因曰吾婦尚為皇后吾可知也遂謀叛及城䧟后獨免周祖為世宗娶之顯徳中册為后趙思綰魏府人也唐同光末趙在禮之據魏城也思綰隸于帳下累從之在禮卒趙延壽籍其部曲盡付于其子贊思綰即其首領也高祖定河洛贊自河中移京兆尹贊以乆事契丹常慮國家終不能容乃與鳯翔侯益謀引蜀兵為援又令判官李恕入朝請覲贊不待報赴闕留思綰等數百人在京兆㑹高祖遣王景崇等西赴鳯翔行次京兆時思綰等數百人在焉思綰等比是趙在禮御士本不刺面景崇齊藏珍既至京兆欲令文面以防逋逸景崇㣲露風㫖思綰厲聲先請自刺以率其下景崇壯之藏珍竊言曰思綰麤暴難制不如殺之景崇不聽但率之同赴鳯翔朝廷聞之遣供奉官王益部署思綰等赴闕思綰既𤼵行至途中謂其黨常彦卿曰小太尉巳入佗手吾輩至則併死矣小太尉葢謂趙贊也彦卿曰臨機制變子勿復言王益至永興副使安友規巡檢使喬守温出迎于郊外離亭置酒思綰前曰部下軍士巳在城東安下縁家屬在城欲各將家今夜便宿城東守温等然之思綰等辭去與部下並無兵仗纔入西門有州校坐門側思綰遽奪其佩劍即斬之其衆持白挺殺守門軍士十餘人分衆守捉諸門思綰刼庫兵以授之遂據其城時乾祐元年三月二十四日也翌日集城中丁壯得四千餘人濬池隍脩樓櫓旬浹之間戰守皆備尋遣人送欵于河中李守貞遣使齎偽詔授思綰晉昌軍節度使檢校太尉朝廷聞之命郭從義王峻帥師伐之及攻其城王師傷者甚衆乃以長塹圍之經年糧盡遂殺人充食思綰嘗對衆取人膽以酒吞之告衆曰吞此至一千即膽氣無敵矣太平廣記賊臣趙思綰自倡亂至敗凡食人肝六十六無不面剖而膾之二年夏食既盡思綰計無從出時左驍衛上將軍致仕李肅寓居城中因與判官程讓能同言于思綰曰太尉比與國家無嫌但負罪懼誅遂為急計今朝廷三處用兵一城未下太尉若翻然效順率先歸命以功補過庶幾無患若坐守窮城端然待斃則何貴于智也洛陽縉紳舊聞記趙思綰主藍田副鎮有罪巳𤼵李公肅時為環衛將兼雍耀三白渠使雍耀莊宅使節度副使權軍府事䕶而脱之來謝于李公公歸宅張夫人詰之曰趙思綰庸賤人公何以免其過既來謝又何必見之乎曰某比不言夫人問須言之思綰者雖賤類審觀其狀貌眞亂臣賊子恨位下未有逆跡不然除去之可也夫人曰既不能除去何妨以小惠啖之無使銜怨自後夫人密遣人令思綰之妻來參夫人厚以衣物賜之前後與錢物甚多及漢朝公以上將軍告老歸雍未乆思綰過雍遂閉門據雍城叛衣冠之族遭塗炭者衆公全家免禍終以計勸思綰納欵遂㧞雍城思綰然之即令讓能為章表遣牙將劉成琦入朝制授思綰華州留後檢校太保以常彦卿為虢州刺史遣内臣齎官告國信賜之既受命遲留未𤼵郭從義王峻等籌之曰狼子野心終不可用留之必貽後悔耳既而從義王峻等緩轡入城陳列歩騎至牙署遣人召思綰曰太保登途不暇出祖對飲一杯便申仳别思綰至則執之遂斬于市并族其家東都事畧郭從義傳云思綰困甚從義遣人誘之佯許以華州節鉞思綰信之遂開門送欵從義入城思綰謁見即遣武士執之思綰臨刑市人爭投瓦石以擊之軍吏不能禁是日并部下叛黨新授虢州刺史常彦卿等五百餘人並誅之籍思綰家財得二十餘萬貫入于官始思綰入城丁口僅十餘萬及開城惟餘萬人而巳其餓殍之數可知矣舊五代史巻一百九
