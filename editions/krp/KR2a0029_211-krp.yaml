body:
  text: 舊五代史卷一百六宋門下侍郎參知政事監修國史薛居正等撰漢書第八列傳三王周魏州人少勇健從軍事唐莊宗明宗稍遷禆校以戰功累歴郡守晉天福初范延光叛于魏州周從楊光遠攻降之安重榮以鎭州叛從杜重威討平之以功授貝州節度使歲餘移鎭涇州先是前帥張彦澤在任苛虐部民逃者五千餘户及下車革前弊二十餘事逃民歸復賜詔褒美後歴鄧陜二鎭陽城之役周時爲定州節度使大軍徃來供饋無闕未幾遷鎭州節度使周禀性寛惠人庶便之開運末杜重威降于契丹引契丹主臨城諭之周泣曰受國重恩不能死戰而以兵降何面目南行見人主與士大夫乎乃痛飲欲引決家人止之事不獲已乃見契丹主授鄧州節度使檢校太師高祖定天下移鎭徐州加同平章事乾祐元年二月以疾卒于鎭輟視朝二日贈中書令周性寛恕不忤物情初刺信都州城西橋敗覆民租車周曰橋梁不飭刺史之過也乃還其所沈粟岀私財以修之民庶悅焉劉審交字求益幽州文安人也祖海父師遂審交少讀書尤精吏道起家署北平主簿轉興唐令本府召補牙職劉守光之僭號僞署兵部尚書燕亡歸于太原莊宗知之用爲諸府從事同光初趙德鈞鎭幽州朝廷以内官馬紹宏爲北面轉運使辟審交爲判官王都據定州叛朝廷命王晏球進討以審交爲轉運供軍使王都平以勞授遼州刺史明年復爲北面供軍轉運使改磁州刺史以母年高去官就養及丁内艱毁瘠過禮服闋不岀累年晉高祖踐阼范延光以魏州叛命楊光遠以總兵討之復召審交爲供饋使鄴中平命審交爲三司使右衞大將軍六年夏岀爲陳州防禦使歲餘之移襄州防禦使審交治襄漢撫綏有術民庶懷之青州楊光遠平降平盧軍爲防禦州復用審交爲防禦使累官至檢校太傅時用軍之後審交矜恤撫理凋弊復蘇契丹破晉審交以代歸蕭翰在都復用爲三司使翰歸蕃李從益在汴州召高行周武行德將委以軍事皆不受命尋聞高祖起義于太原史𢎞肇在澤潞都人大懼時有燕軍千人守捉諸門李從益母王淑妃詢于文武臣寮曰予子母在洛孤危自處一旦爲蕭翰所逼致令及此但遣人迎請太原勿以予子母爲事或曰收拾諸處守營兵士與燕軍足以把城以俟河北救應可也妃曰非謀也我子母亡國之餘安敢與人爭天下衆議籍籍猶以把城爲詞審交曰余燕人也今城有燕軍固合爲燕謀然事機有所不可此城經敵軍破除之後民力空匱餘衆幸存若更謀之不臧閉門拒守一月之内無復遺類諸軍無言宜從太妃處分繇是從益遣使徃太原貢奉高祖至汴罷使歸班隱帝嗣位用爲汝州防禦使汝爲近輔號爲難治審交盡去煩弊無擾于民百姓歌之乾祐二年冬卒年七十四郡人聚哭柩前所列狀乞畱葬本州界立碑起祠以時致祭本州以聞詔曰朝廷之制皆有舊章牧守之官比無贈典其或政能殊異惠及蒸黎生有令名没畱遺愛褒賢奬善豈限彛章可特贈太尉吏民所請宜依故相國太師秦國公馮道聞之曰予嘗爲劉汝州僚佐知其爲人亷平慈善無害之良吏也刺遼磁治陳襄青皆稱平允不顯殊尤其理汝也又安有異哉民之租賦不能減也徭役不能息也寒者不能衣也餒者不能食也百姓之汲汲然而使君何有于我哉然身死之日致黎民懷感如此者誠以不行鞭朴不行刻剥不因公而徇私不害物以利已確然行良吏之事薄罰宥過謹身節用安俸禄守禮分而巳凡從事于斯者孰不能乎但前之守王者不能如是是以汝民咨嗟愛慕今天下戎馬之後四方兇盜之餘杼柚空而賦歛繁人民稀而倉廩匱謂之康泰未易輕言侯伯牧宰若能哀矜之不至聚歛不殺無辜之民民爲邦本政爲民本和平寛易即劉君之政安足稱耶復何患不至于令名哉道仍爲著哀詞六章鐫于墓碑之隂焉武漢球澤州人也少拳勇潞師李嗣昭倚爲親信事唐莊宗明宗繼爲禁軍禆校清㤗中㑹晉高祖引契丹爲援與朝廷隔絶遂歸晉祖天福初授趙州刺史入爲奉國軍都指揮使岀刺曹州開運初遷耀州團練使高祖至東京授洺州刺史漢球以目疾年高辭郡帝曰廣平小郡卿卧理有餘無以疾辭至郡未期復以目疾請代而免乾祐二年秋卒于京師漢球雖岀自行伍然長于撫理常以掊斂爲戒民懷其惠身死之日家無餘財有管逈者漢球守郡日辟爲判官及漢球卒于汴逈在洺州未之知一日忽謂所親曰太保遣人召我遂沐浴新衣冠無疾瞑目而終家人不知其故後數日方聞漢球卒張瓘同州車渡村人故太原監軍使承業之猶子也承業唐書有傳唐天祐中承業佐唐武皇莊宗有功甚見委遇瓘聞之與昆仲五人自故里奔于太原莊宗皆任用之瓘天祐十三年補麟州刺史承業治家嚴毅小過無所容恕一姪爲磁州副使以其殺河西賣羊客承業立捕斬之常誡瓘等曰汝車渡村百姓劉開道下賊慣作非爲今須改行若故熊不除死無日矣故瓘所至不敢誅求晉天福中爲密州刺史秩滿入居環衞乾祐三年夏卒于官輟視朝一日李殷薊州人也自後唐莊宗明宗晉高祖朝以偏校遞遷歴官至檢校司徒累爲郡守性沈厚所莅無苛暴之名晉少帝禦契丹于澶淵殷典禁旅駕還授鄜州畱後俄加檢校太保開運中授定州節度使將行啓少帝曰臣之此行破敵必矣衆皆壯其言及至郡威畧無聞敵再至首納降款後隨契丹至常山常山將耶律嘉哩遣殷與契丹首領楊安同拒我師于洺水俄而安退殷以槖裝駞馬遺安安旣北走殷匿于丘獲免馳以歸我高祖嘉其首赴朝闕及魏州平以甘陵乏帥乃命殷爲貝州節度使加檢校太𫝊乾祐初卒于鎮詔贈太師傅劉在明幽州人少有膽氣本州節度使劉守光用爲親信岀爲平塞軍使守光敗歸于太原唐莊宗收爲列校明宗時爲捧聖左廂都指揮使領和州刺史從幸汴州至滎陽聞朱守殷叛用爲前鋒至汴城率先登城賊平授汴州馬歩軍都指揮使應順初爲貝州刺史明年移趙州兼北面行營馬軍都指揮使以軍戍易州清㤗末幽州節度使趙德鈞引軍赴團栢谷路由易州取在明軍從及德鈞兵敗在明奔歸懷州唐末帝令與萇從簡同守河陽晉祖至乃迎之京都事定出爲單州刺史天福中李金全以安州叛在明從李守貞攻之大破淮賊以功授安州防禦使明年移絳州楊光逺據青州叛召爲行營馬歩軍都指揮使領齊州防禦使青州平遷相州畱後歴邢州晉州畱後通鑑契丹入汴建雄畱後劉在明朝于契丹以節度副使駱知朗知州事高祖踐阼授幽州道行營都部署時契丹守中山在明岀師經畧契丹乃棄城而去遂授鎭州畱後乾祐元年五月正授鎭州節度使六月以疾卒于鎭贈侍中馬萬澶州人也少從軍善水游唐莊宗與梁軍對壘于河上莊宗于德勝渡夾河立南北寨會梁軍急攻南寨于中流聯戰艦以絶援路晝夜攻城者三日塞將氏延賞告急于莊宗莊宗隔河望敵無如之何乃召人能水游破賊者時萬兄弟皆應募遂潛行入南塞徃來者三又助燒船艦汴軍遂退由此升爲水軍小校漸典禁軍遥領刺史累遷奉國左廂都指揮使泗州防禦使晉天福二年夏范延光叛于鄴牙將孫鋭率兵至黎陽朝廷遣侍衞馬軍都指揮使白奉進領兵渡滑州萬亦預其行時滑州節度使符彥饒潛通鄴下殺白奉進于牙署萬領本軍兵士將助亂會奉國右廂都指揮使盧順密亦以兵至論以逆順萬不得已與順密急趨公府執彥饒生送闕下朝廷卽以萬爲滑州節度使而盧順密酬之甚淺居無何晉高祖稍知其事卽以順密爲涇州兵馬畱後漸簿于萬萬鎭鄧州未幾罷鎭授上將軍以目疾致仕乾祐三年四月卒輟視朝一日李彥從字士元汾州孝義人父德麟州司馬彥從少習武藝出行伍間高祖典禁軍以鄉里之舊任爲親信國初用爲左飛龍使檢校司空鎭州逐敵之際請兵于朝廷高祖令彥從率軍赴之乾祐初領恩州刺史趙暉討王景崇于岐下彥從爲兵馬都監破川軍有功賊平授濮州刺史治有政績百姓悅之乾祐三年冬卒于郡聲郭謹字守節太原晉陽人謹少從軍能騎射歴河中教練使晉天福中遷奉國右廂都指揮使領禺州刺史三年轉奉國左廂都指揮泗州防禦使歲餘授侍衞歩軍都指揮使兼寜江節度使六年從幸鄴都七年晉祖崩少帝卽位授彰德軍節度使領軍如故開運初出授鄜州二年入爲左神武統軍三年復鎭麟州高祖踐阼以鄉國舊臣加檢校太尉移鎭滑臺乾祐初復授彰德軍節度使二年就加檢校太師三日入朝加食邑是歲冬十月卒于位年六十輟視朝二日贈侍中皇甫立代北人也唐明宗之刺代州署爲牙校從歴藩鎭性純謹明宗深委信之王建立安重誨䇿名委質皆在立後明宗踐阼以立爲忻州刺史長興末轉洺州團練使廣順初遷鄜州節度使檢校太保清㤗三年春移鎭潞州未幾改華州晉天福中授左神武統軍少帝卽位歴左金吾衞上將軍累官至檢校太尉高祖定天下授特進太子太師致仕乾祐二年秋卒白再榮本蕃部人也少從軍累遷䕶聖左廂指揮使晉末契丹入汴明年契丹主北去再榮從部帳至眞定其年閏七月晦李筠何福晉相救殺契丹帥滿逹勒據甲仗庫敵勢未退筠等使人召再榮再榮端坐本營遲疑乆之爲軍吏所廹乃行翊日逐出滿逹勒諸軍以再榮名次在諸校之右乃請權知畱後事東都事畧李筠傳筠請馮道領節度道日予主奏事而巳畱後事當議功臣爲之以諸將之甲者爲畱後再榮貪昧無決舉止多疑出入騎從露刃注矢諸校不相統攝互有猜貳奉國廂主王饒懼爲再榮所并乃據東門樓以兵自衞僞稱足疾不敢見再榮司天監趙延乂俱與之善乃來徃解釋遂無相忌之意再榮以李崧和凝擕家在彼令軍士數百人環廹崧凝以求賞給崧各出家財與之衍再榮欲害崧以利其財前磁州刺史李穀謂再榮曰公與諸將爲契丹所擄淩辱萬端旦夕憂死今日衆力遂出蕃戎鎭民死者不下三千人豈獨公等之功纔得生路便擬殺一宰相他日到闕儻有所問何以爲辭再榮黙然再榮又欲括率在城居民家財以給軍士李榖又譬解之乃止其漢人曾事滿逹勒者盡拘之以取其財高祖以再榮爲鎭州畱後爲政貪虐難狀鎭人呼爲白滿逹勒未幾移授滑州節度使箕歛誅求民不聊生乃徴還京師周太祖入京城軍士攻再榮之第廹脅再榮盡取財貨旣軍士前啓曰某等軍健常趨事麾下一旦無禮至此今後何顔謁見卽奮刃擊之挈其首而去後家人以帛贖葬之張鵬鎭州皷城人幼爲僧知書有口辯喜大言後歸俗唐末帝爲潞王時鵬徃依焉及卽位用爲供奉官累監軍旅晉開運中契丹迫澶州鵬爲前鋒監押奮身擊敵被創而還其後累于邊城戍守士伍服其勇乾祐初授鎭州副使過鄴城高行周接之甚歡鵬因言及晉朝傾亡之事少帝任用失人藩輔之臣唯務積財富家不以國家爲意以至宗社泯滅非獨帝王之咎也行周性寛和不以鵬言爲過鵬旣退行周左右謂行周曰張副使之言蓋譏令公也行周因發怒遂奏鵬怨國訛言故朝廷降詔就誅于常山時乾祐元年七月也史臣曰晉漢之際有以懋軍功勤王事取旌旄符竹者多矣其間有及民之惠者無幾焉如王周之閫政審交之民譽蓋其優者也漢球張瓘抑又次焉是宜紀之篇以示來者其餘皆不足觀也已張鵬以一言之失遽滅其身亦足誡後代多言横議之徒歟舊五代史巻一百六
