body:
  text: 舊五代史巻六十五宋門下侍郎參知政事監修國史薛居正等撰唐書第四十一列傳十七李建及許州人本姓王父質建及少事李罕之為紀綱光啟中罕之謁武皇于晉陽因選部下驍勇者百人以獻建及在籍中後以功署牙職典義兒軍及賜姓名天祐七年改匡衛軍都校柏鄉之後汴將韓勍追周徳威至髙邑南野河上鎭定兵扼橋道韓勍選精兵先奪之莊宗登髙而望鎭定兵將衂謂建及曰如賊過橋則勢不可遏卿計如何建及于部選士二百挺搶大譟禦汴軍卻之于橋下二月王師攻魏魏人夜出犯我營建及設伏待之扼其歸路盡殪之劉鄩之營莘縣月餘不出忽一旦縱兵攻鎮定之營軍中騰亂建及率銀搶勁兵千人赴之擊敗汴軍追奔至其壘元城之戰建及首陷其陣授天雄軍教練使八月遷遼州刺史十四年從擊契丹于幽州破之十二月從攻楊劉自寅至午汴軍嬰城拒守建及自負葭葦堙壍率先登梯遂㧞之胡柳之役前軍逗撓際晚汴軍登土山建及一戰奪之莊宗欲收軍詰朝合戰建及横矟當前曰賊大將巳亡乘此易擊王但登山觀臣破賊即引銀槍效節大呼奮擊三軍增氣繇是王師復振以功檢校司空魏博内外衙都將十六年汴將賀瓌攻徳勝南城以戰船十餘艘竹笮維之扼斷津路王師不得渡城中矢石將盡守城將氏延賞危急莊宗令積帛軍門召能破賊船者津人有馬破龍者能水游乃令往見延賞延賞言危窘極矣所爭晷刻時棹船滿河流矢雨集建及被重鎧執矟呼曰豈有一衣帶水縱賊如此乃以二船實甲士皆短兵持斧徑抵梁之戰艦斧其笮又令上流具甕積薪其上順流縱火以攻其艦須臾煙焰騰熾梁軍斷纜而遁建及乃入南城賀瓌解而去其年十二月與汴將王瓚戰于戚城建及傷手莊宗解御衣金帶賜之建及有膽氣慷慨不羣臨陣鞠旅意氣横壯自莊宗至魏州建及都總内外衙銀槍效節帳前親軍善于撫御所得賞賜皆分給部下絶甘分少頗洽軍情又累立戰功雄勇冠絶雌劣者忌䜛之時宦官韋令圖監建及軍每于莊宗前言建及以家財驟施其趣向志意不小不可令典衙兵莊宗因猜之建及性既忠藎雖知讒搆不改其操十七年三月授代州刺史八月與李存審赴河中解同州之圍建及少遇禍亂久從戰陣矢石所中肌無完膚復有功見疑私心憤鬱是嵗卒于太原時年五十七石君立趙州昭慶人也亦謂之石家財初事代州刺史李克柔後隸李嗣昭為牙校厯典諸軍夾城之後君立每出挑戰瓌汴軍柵壘俘擒而還八年與汴軍戰于龍化園敗之獲其大將卜渥以獻嗣昭每出征俾君立為前鋒敵人畏之王檀之逼晉陽也城中無備安金全驅市人以登陴保聚不完時莊宗在魏博救應不暇人心危懼嗣昭遣君立率五百騎自上黨朝發暮至王檀游軍扼汾橋君立一戰敗之徑至城下馳突斬擊出入如神大呼曰昭義侍中大軍至矣是夜入城與安金全等分出諸門擊殺于外遲明梁軍敗走十七年將兵屯徳勝時汴軍自滑州轉餉以給楊村砦莊宗親率騎軍于河外循岸而上邀擊之汴人拒楊村五十里于河曲潘張村築壘以貯軍儲莊宗令諸軍攻之汴人設伏于要路逆戰偽敗王師乘之䠞入壘門梁伏兵起因與血戰君立與鎮州大將王釗隔入賊壘時諸將部校陷賊者十餘人君立被執送于汴梁王素知其驍勇欲用之為將械而下獄久之梁主遣人誘之君立曰敗軍之將難與議勇如欲將我我雖眞誠效命能信我乎人皆有君吾何忍反為仇人哉既而諸將被戮尚惜君立不之害同光元年莊宗至汴前一日梁主始令殺之髙行珪燕人也家世勇悍與弟行周俱有武藝初仕燕為騎將驍果出諸將之右燕帥劉守光僭逆不道莊宗令周徳威征之守光大懼以行珪為武州刺史令張掎角之勢時明宗將兵助徳威平燕俄聞行珪至率騎以禦之明宗諭以逆順之理行珪乃降守光將元行欽在山北聞行珪有變即率部下軍衆以攻行珪行珪遣弟行周告急于周徳威徳威命明宗李嗣本安金全將兵援之明宗破行欽于廣邊軍行欽亦降尋以行珪為朔州刺史厯忻嵐二郡遷雲州留後天成初授鄧州節度使尋移鎭安州行珪性貪鄙短于為政在安州日行事多不法副使范延策者幽州人也性剛直累為賓職及佐行珪覩其貪猥因强諫之行珪不從後延策因入奏獻封章于闕下事有三條一請不禁過淮猪羊而禁絲緜疋帛以實中國一請于山林要害置軍鎭以絶㓂盜一述藩侯之弊請勅從事明諫諍之不從令諸軍校列班廷諍行珪聞之深銜之後因戍兵作亂誣奏延䇿與之同謀父子俱戮于汴聞者寃之未幾行珪以疾卒詔贈太尉張廷裕代北人也㓜事武皇于雲中從平黄巢討王行瑜自行間漸升為小將莊宗定魏補天雄軍左廂馬歩都虞侯厯蔚慈隰三州刺史同光三年除新州節度使塞上多事廷裕無控制之術邊鄙常聳天成三年卒于治所詔贈太保王思同幽州人也父敬柔厯瀛平儒檀營五州刺史思同母即劉仁恭之女也故思同初事仁恭為帳下軍校會劉守光攻仁恭于大安山思同以部下兵歸太原時年十六武皇命為飛騰指揮使從莊宗平定山東累典諸軍思同性疎俊粗有文性喜為詩什與人唱和自稱薊門戰客魏王繼岌待之若子時内養吕知柔侍興聖宫頗用事思同不平之吕為終南山詩末句有頭字思同和曰料伊直擬衝霄漢賴有青天壓著頭其所為詩句皆此類也每從征必在興聖帳下然同光朝位止鄭州刺史明宗在軍時素知之即位後用為同州節度使未幾移鎭隴右思同好文士無賢不肖必館接賄遺嵗費數十萬在秦州累年邊民懷惠華戎寧息長興元年入朝見于中興殿明宗問秦州邊事對曰秦州與吐蕃接境蕃部多違法度臣設法招懷沿邊置寨四十餘所控其要害每蕃人互市飲食之界上令納器械因手指畫秦州山川要害控扼處明宗曰人言思同不管事豈及此耶時兩川叛欲用之且留左右故授右武衛將軍八月授西南面行營馬歩都虞侯九月遷京兆尹西京留守伐蜀之役為先鋒指揮使石敬瑭入大散闗思同恃勇先入劒闗大軍未相繼復被董璋兵逐出之及敬瑭班師思同以曾獲劒門之功移鎮山南西道三年兩州交兵明宗慮併在一人則朝廷難制密詔思同相度形勢即乘間用軍事未行而董璋敗八月復為京兆尹兼西京留守時潞王鎮鳯翔與之鄰境及潞王不禀朝㫖致書于秦涇雍梁邠諸師言賊臣亂政屬先帝疾篤謀害秦王迎立嗣君自擅權柄以致殘害骨肉搖動蕃垣懼先人基業忽焉墜地故誓必入朝以除君側事濟之後謝病歸藩然藩邸素貧兵力俱困欲希國士共濟急難乃令小伶女十人以五絃技見思同因歡諷動又軍校宋審温者請使于雍若不從命即獨圖之又令推官郝昭府吏朱延乂以書檄起兵會副部署藥彥稠至方宴而妓使適至乃繫之于獄彥稠請誅審温拘送昭赴闕時思同已遣其子入朝言事朝廷嘉之乃以思同為鳳翔行營都部署起軍營于扶風三月十四日與張虔釗會于岐下梯衝大集十五日進收東西闕城城中戰備不完然死力禦扞外兵傷夷者十二三十六日復進攻其城潞王登陴泣諭于外聞者悲之張虔釗性𥚹詰旦西南用軍與都監皆血刃以督軍士軍士齊詬反攻虔釗虔釗躍馬避之時羽林指揮使楊思權引軍自西門先入思同未之知猶督士登城俄而嚴衛指揮使尹暉呼曰西城軍巳入城受賞矣軍士可解甲弃仗之聲振動天地日午亂軍畢集涇州張從賔邠州康福河中安彥威皆遁去十七日思同與藥彥稠萇從簡俱至長安劉遂雍閉闗不内乃奔潼闗二十二日潞王至昭應前鋒執思同來獻王謂左右曰思同計乖于事然盡心于所奉亦可嘉也顧謂趙守鈞曰思同爾之故人可行迓之于路逹予撫慰之意思同至潞王譲之曰賊臣傾我國家殘害骨肉非予弟之過我起兵岐山蓋誅一二賊臣耳爾何首鼠兩端多方悞我今日之罪其可逃乎思同曰臣起自行間受先朝爵命秉旄仗銊累厯重藩終無顯效以答殊遇臣非不知攀龍附鳳則福多扶衰救弱則禍速但恐瞑目之後無靣見先帝釁鼓膏原縲囚之常分也潞王為之改容徐謂之曰且憩歇潞王欲用之而楊思權之徒恥見其靣屢啟于劉延朗言思同不可留慮失士心又潞王入長安時尹暉盡得思同家財及諸妓女故尤惡思同與劉延朗亟言之屬王醉不待報殺思同并其子徳勝潞王醒召思同左右報巳誅之矣潞王怒延朗累日嗟惜之及漢高祖即位詔贈侍中索自通字得之太原清源人也父繼昭以自通貴授國子監祭酒致仕自通少能騎射嘗于山墅射獵莊宗鎮太原時遇之于野訊其姓名即補右畨㕔直軍使後因從獵射中走鹿轉指揮使佐周徳威攻燕軍于涿州擒燕將郭在鈞從莊宗定魏博改突騎指揮使明宗即位自隨駕左右廂馬軍都指揮授忻州刺史嵗餘召還復典禁兵領韶州刺史出為大同軍節度使累嵗移鎮忠武改京兆尹西京留守楊彥温據河中作亂自通率師討平之授河中節度使尋自鄜州入為右龍武統軍初自通既平楊彥温代末帝鎮河中臨事失于周旋末帝深銜之案通鑑自通至鎮承安重誨指籍軍府甲仗數上之以為從珂私造賴王徳妃居中保䕶從珂由是得免及末帝即位自通憂悸求死清㤗元年七月因朝退渉洛自溺而卒子萬進周顯徳中厯任方鎮舊五代史巻六十五
