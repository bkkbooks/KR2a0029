body:
  text: 舊五代史巻一百四十四宋門下侍郎參知政事監修國史薛居正等撰志六樂志上古之王者理定制禮功成作樂所以昭事天地統和人神歴代已來舊章斯在洎唐季之亂咸鎬為墟梁運雖興英莖掃地莊宋起于朔野經始霸圖其所存者不過邉部鄭聲而已先王雅樂殆將泯絶當同光天成之際或有事清廟或祈祀泰壇雖簨虡猶施而宫商孰辨遂使磬襄鼗武入河漢而不歸湯濩舜韶混陵谷而俱失洎晉髙祖奄登大寳思迪前規爰詔有司重興二舞旋屬烽火為亂明法罔修漢祚幾何無暇制作周顯徳五年冬將立嵗仗有司以崇牙樹羽宿設于殿庭世宗因親臨樂懸試其聲奏見鐘磬之類有設而不擊者訊于工師皆不能對世宗惻然乃命翰林學士判太常寺事竇儼參詳其制又命樞密使王朴攷正其聲朴乃用古累黍之法以審其度造成律準其狀如琴而巨凡設十三弦以定六律六吕旋相為宫之義世宗善之申命百官議而行之今亦備紀于後以志五代雅樂沿樂之由焉梁開平初太祖受禪始建宗廟凡四室每室有登歌酌獻之舞肅祖宣元皇帝室曰大合之舞敬祖光憲皇帝室曰象功之舞憲祖昭武皇帝室曰來儀之舞烈祖文祖皇帝室曰昭徳之舞登歌樂章各一首五代會要云太常少卿楊煥撰二年春梁祖將議郊禋有司撰進樂名舞名樂曰慶和之樂舞曰崇徳之舞皇帝行奏慶順奠玉帛登歌奏慶平迎俎奏慶肅酌獻奏慶熙飲福酒奏慶隆送文舞迎武舞奏慶融亞獻奏慶和終獻奏慶休樂章各一首太廟迎神舞名開平皇帝行盥手登歌飲福酒徹豆送神皆奏樂樂章各一首唐莊宗光聖神閔孝皇帝廟室酌獻舞武成之舞登歌樂章一首五代會要云尚書兵部侍郎崔居儉撰明宗聖徳和武欽孝皇帝廟室酌獻舞雍熙之舞登歌樂章一首五代會要云太常卿盧文紀撰晉髙祖聖文章武明徳孝皇帝廟室酌獻舞咸和之舞登歌樂章一首五代會要云太子賓客判太常寺事趙光輔撰漢文祖明元皇帝廟室酌獻舞靈長之舞徳祖㳟僖皇帝廟室酌獻舞積善之舞翼祖昭獻皇帝廟室酌獻舞顯仁之舞顯祖章聖皇帝廟室酌獻舞章慶之舞登歌樂章各一首五代會要云太常卿張昭撰高祖睿文聖武昭肅孝皇帝廟室酌獻舞觀徳之舞登歌章章一首周信祖睿和皇帝廟室酌獻舞肅雍之舞僖祖明憲皇帝廟室酌獻舞章徳之舞義祖翼順皇帝廟室酌獻舞善慶之舞慶祖章肅皇帝廟室酌獻舞觀成之舞登歌樂章各一首太祖聖神恭肅文武孝皇帝廟室酌獻舞明徳之舞世宗睿武孝文皇帝廟室酌獻舞定功之舞登歌樂章各一首五代會要太祖廟室樂章太常卿田敏撰世宗廟室樂章翰林學士判太常寺事竇儼撰樂章詞多不録右樂章晉天福四年十二月禮官奏來嵗正旦王公上夀皇帝舉酒請奏𤣥同之樂再舉酒奏文同之樂從之五年始議重興二舞詔曰正冬二節朝會舊儀廢于離亂之時興自和平之代將期備物全繫用心須議擇人同為定制其正冬朝會禮節樂章二舞行列等事宜差太常卿崔棁御史中丞竇貞固刑部侍郎吕琦禮部侍郎張允與太常寺官一一詳定禮從新意道在舊章庻知治世之和漸見移風之善其年秋梲等具述制度上奏云案禮云天子以徳為車以樂為御大樂與天地同和大禮與天地同節又曰安上治人莫善于禮移風易俗莫善于樂故樂書議舞云夫樂在耳曰聲在目曰容聲應乎耳可以聼知容藏于心難以貎覩故聖人假干戚羽旄以表其容發揚蹈厲以見其意聲和合則大樂備矣又案義鏡問鼓吹十二案合于何所答云周禮鼓人掌六鼓四金漢朝乃有黄門鼓吹崔豹古今注云因張騫使西域得摩訶兜勒一曲李延年増之分為二十八曲梁置鼓吹清商令二人唐又有堈鼓金鉦大鼓長鳴歌簫笳笛合為鼓吹十二案大享會則設于懸外此乃是設二舞及鼓吹十二案之由也今議一從令式排列教習文舞郎六十四人分為八佾每佾八人左手執籥禮云葦籥伊耆氏之樂也周禮有籥師教國子爾雅曰籥如笛三孔而短大者七孔謂之簅歴代巳來文舞所用凡用籥六十有四右手執翟周禮所謂羽舞也書云舞干羽于兩階翟山雉也以雉羽分析連攢而為之二人執纛前引數于舞人之外舞人冠進賢冠服黄紗中單皂領褾白練􅗩襠白布大口袴革帶烏皮履白布襪武舞郎六十四人分為八佾左手執干干楯今之旁牌所以翳身也其色赤中畫獸形故謂之朱干周禮所謂兵舞取武象用楯六十有四右手執戚斧也上飾以玉故謂之玉戚二人執旌前引旌似旗而小綘色畫升龍二人執鼗鼔二人執鐸周禮有四金之奏其三曰金鐸以通鼓形如大鐸仰而振之金錞二每錞二人舉之一人奏之周禮四金之奏一曰金錞以和鼓銅鑄為之其色𤣥其形圓若權上大下小高三尺六寸有六分圍二尺四寸上有伏虎之狀旁有耳獸形銜鐶二人執鐃以次之周禮四金之奏二曰金鐃以上鼔如鈴無舌揺柄以鳴之二人掌相在左禮云理亂以相制如小鼓用皮為表實之以糠撫之節樂二人掌雅右右禮云訊疾以雅以木為之狀如漆筩而揜口大二尺圍長五尺六寸以羖皮輓之旁有二紐髹畫賓醉而出以器築地明行不失節武舞人服弁平巾幘金支緋絲大袖緋絲布裲襠甲金飾白練􅗩襠錦騰蛇起梁帶豹文大口布袴烏皮靴工人二十數于舞人之外武弁朱褠革帶烏皮履白練􅗩襠白布襪殿庭仍加鼓吹十二案義鏡云帝設氈案以氈為牀也今請制大牀十二牀容九人振作歌樂其牀為熊羆貙豹騰倚之狀以承之象百獸率舞之意分置于建鼓之外各三案毎案羽葆鼓一大鼓一金錞一歌二人簫二人笳二人十二案樂工百有八人舞郎一百三十有二人取年十五巳上弱冠已下容止端正者其歌曲名號樂章詞句中書條奏差官修撰從之歐陽史崔棁傳高祖詔太常復文武二舞詳定正冬朝會禮及樂章自唐末之亂禮樂制度亡失已乆棁與御史中丞竇貞固刑部侍郎吕𤦺禮部侍郎張允等草定之其年冬至髙祖會朝崇元殿庭設宫懸二舞在北登歌在上文舞郎八佾六十有四人冠進賢黄紗袍白中單白練􅗩襠白布大口袴革帶履左軌籥右秉翟執纛引者二人武舞郎八佾六十有四人服平巾幘緋絲布大袖繡襠甲金飾白練􅗩襠錦騰蛇起梁帶豹文大口袴烏靴左執干右執戚執旌引者二人加鼓吹十二案負以熊豹以象百獸率舞案設羽葆鼓一大鼓一金錞一歌簫笳各二人王公上夀天子舉爵奏𤣥同二舉登歌奏文同舉食文舞昭徳武舞成功之曲禮畢髙祖大悦賜棁金帛羣臣左右都者皆贊歎之然禮樂廢久而制作簡繆又繼以龜兹部霓裳法曲參亂雅音其樂工舞郎多教坊伶人百工商賈州縣避役之人又無老師良工教習明年正旦復奏于庭而登歌發聲悲離煩慝如薤露虞殯之音舞者行列進退皆不應節聞者皆悲憤間運二年太常少卿陶穀奏廢二舞漢高祖受命之年秋九月權太常卿張昭上疏奏改一代樂名其略曰昔周公相成王制禮作樂殿庭徧奏六代舞所謂雲門大咸大韶大夏大濩大武也周室既衰王不不振諸樂多廢惟大韶大武二曲存焉秦漢已來名為二舞文舞韶也武舞武也漢時改為文始五行之舞歴代因而不改貞觀作樂之時祖孝孫改隋文舞為治康之舞武舞為凱安之舞貞觀中有秦王破陣樂功成慶善樂二舞樂府又用為二舞是舞有四馬前朝行用年深不可遽廢俟國家偃伯靈臺即别召工師更其節奏今改其名具書如左祖孝孫所定二舞名文舞曰治康之舞請改治安之舞武舞曰凱安之舞請改為振徳之舞貞觀中二舞名文武功成慶善樂前朝名九功舞請改為觀象之舞秦王破陣樂前朝名為七德舞請改為講功之舞其治安振德二舞請依舊郊廟行用以文舞降神武舞送神其觀象講功二舞請依舊宴會行用又請改十二和樂云昔周朝奏六代之樂即今二舞之類是也其賔祭常用别有九夏之樂即肆夏皇夏等是也梁武帝善音樂改九夏為十二雅前朝祖孝孫改雅為和示不相沿也臣今改和為成取韶樂九成之義也十二成樂曲名祭天神奏豫和之樂請改為禋成祭地祇奏順和請改為順成祭宗廟奏永和請改為裕成祭天地宗廟登歌奏肅和請改為肅成皇帝臨軒奏太和請改為政成王公出入奏舒和請改為弼成皇帝食舉及飲宴奏休和請改為德成皇帝受朝皇后入宫奏正和請改為扆成皇太子軒懸出入奏承和請改為𦙍成元日冬至皇帝禮會登歌奏昭和請改為慶成郊廟俎入奏雍和請改為騂成皇帝祭享酌獻讀祝文及飲福受胙奏夀和請改為夀成祖孝孫元定十二和曲開元朝又奏三和遂有十五和之名凡制作禮法動依典故梁置十二雅蓋取十二天之成數契八音十二律之變輒益三和有乖稽古又縁祠祭所用不可盡去臣取其一焉祭孔宣父齊太公廟降神奏宣和請為師雅之樂三公升殿會訖下階履行奏裓和請廢同用弼成享先農耕藉奏豐和請廢同用順成已上四舞十二成雅樂等曲今具録合用處所及樂章首數一一條例在下其歌詞文多不録舊五代史巻一百四十四
