body:
  text: 舊五代史巻一百考證漢高祖紀下矯戎王遺詔命烏裕嗣位案遼史世宗紀作四月戊寅即皇帝位歐陽史通鑑契丹國志俱從是書作五月與遼史異乙已契丹永康王烏裕自鎮州還蕃行次定州案遼史作甲申次定州與是書異河中節度使趙贊起復河中節度使案遼史世宗紀天祿二年十月壬午南京留守魏王趙延夀薨攷遼天祿二年即漢乾祐二年此時天福十二年延夀尚未死也此必因延夀為永康王所鎖而漢人𫝊其已死遂起復其子贊以絶其北向之心耳攷證一条於乙已契丹永康王鄂約後新授宋州節度使杜重威㨿鄴都叛詔削奪重威官爵貶為庻人案通鑑杜重威之叛在七月至閏月庚午乃削奪官爵五代春秋歐陽史作閏七月杜重威拒命與通鑑異懷讓遣人紿鐸云奉詔襲契丹請置頓于郡案宋史薛懷讓傳懷讓遣人紿鐸云我奉詔為邢州帥据是書則懷讓實紿鐸奉詔襲契丹以庚寅授邢州節度使非紿之也特託言置頓于郡耳丙申至鄴都城下案通鑑作戊戌至鄴都城下與是書異甲午以皇子開封尹承訓薨廢朝三日追封魏王案通鑑辛夘皇子開封尹承訓卒乙未追立為魏王與是書紀日互異舊五代史巻一百攷證
