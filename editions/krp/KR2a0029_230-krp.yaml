body:
  text: 舊五代史巻一百十五攷證周世宗紀二癸丑西南面行營都部署王景奏收復鳯州案癸丑歐陽史作戊申己未邢州奏河東劉崇死案通鑑作顯徳元年十一月北漢主殂遣使告于契丹攷異据王保衡見聞要録及劉繼顒神道碑疑是書作二年為誤今改遼史穆宗紀應厯五年十一月漢王崇殂應厯五年即周廣順二年也與是書合盖薛史遼史皆以實録為據五代春秋亦作二年舊五代史巻一百十五攷證
