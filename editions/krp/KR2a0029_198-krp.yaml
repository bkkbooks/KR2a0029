body:
  text: 舊五代史巻九十九宋門下侍郎參知政事監修國史薛居正等撰漢書第一髙祖紀上髙祖睿文聖武昭肅孝皇帝姓劉氏諱暠本名知逺及即位改今諱其先本沙陁部人也四代祖諱湍帝有天下追尊為明元皇帝廟號文祖陵曰懿陵五代㑹要湍為東漢顯宗第八子淮陽王昞之後髙祖母隴西李氏追諡明貞皇后曾祖諱昻晉贈太保追尊為㳟僖皇帝廟號德祖陵曰沛陵五代㑹要懿陵沛公皆無陵所遥申朝拜曽祖母號國太夫人楊氏追諡㳟惠皇后祖諱僎晉贈太傅追尊為昭獻皇帝廟號翼祖陵曰威陵祖母魯國太夫人李氏追諡為昭穆皇后皇考諱琠事後唐武帝為列校晉贈太師追尊為章聖皇帝廟號顯祖陵曰肅陵皇妣吳國太夫人安氏追諡章懿皇后以唐乾寕二年嵗在乙卯二月四日遂生帝于大原帝弱不好弄嚴重寡言及長面紫色目晴多白初事唐明宗列于麾下明宗與梁人對栅于德勝時晉髙祖為梁人所襲馬甲連革斷帝輟騎以授之取斷革者自跨之徐殿其後晉髙祖感而壯之明宗踐阼晉髙祖為比京畱守以帝前有䕶援之力奏移麾下署為牙門都校應順初晉髙祖鎮常山唐明帝召赴闕㑹閔帝出奔與晉髙祖相遇于途遂俱入衛州泊于郵舍閔帝左右謀害晉髙祖帝密遣御士石敢䄂鎚立于晉髙祖後及有變敢擁晉髙祖入一室以巨木塞門敢㝷死焉帝卒衆盡殺閔帝左右遂免晉髙祖于難通鑑攷異引漢髙祖實録云是夜偵知少帝伏甲欲與從臣謀害晉髙祖詐屏人對語方坐庭廡帝密遺御士右敢䄂鎚立于後俄頃伏甲者起敢有勇力擁晉祖入一室以巨木塞門敢力當其鋒死之帝解佩刀遇夜晦以在地葦炬未然者奮擊之衆謂短兵也遂㪚走地以匿身長垣下聞帝親将李洪信謂人曰石太尉死矣帝隔垣呼洪信曰大尉無恙乃踰垣出就洪信兵共䕶晉祖殺建謀者以少主授王𢎞贄清泰元年晉髙祖復鎮河東三年夏移鎮汶陽帝勸晉髙祖舉義贊成密計經綸之始中外賴之晋髙祖以帝為北京馬歩軍都指揮使及契丹以全軍赴難大破張敬逹之衆于晉陽城下有降軍千餘人晉髙祖將置之于親衛帝盡殺之晉國初建加檢校司空充侍衛馬步都指揮使權㸃檢隨駕六軍諸衛事㝷改陜州節度使充侍衛親軍馬步都虞候契丹主送晉髙祖至上黨指帝謂髙祖曰此都軍甚操刺無大故不可棄之晉髙祖入洛委帝巡警都邑肅然無敢犯令天福二年夏四月加檢校太保八月改許州節度使典軍如故三年夏四月加檢校太傅冬十月授侍衛親軍馬步軍都指揮使十一月移授宋州加檢校太尉十二月加同平章事時帝與杜重威同制加恩帝憤然不樂懇讓不受杜門不出者數日通鑑知逺自以有佐命功重威起于外戚無大功恥與之同制制下數日杜門四表辭不受晉髙祖怒召宰相趙瑩等議洛帝兵權任歸私第瑩等以為不可乃遣端明殿學士和凝就第宣諭帝乃承命五年三月改鄴都畱守兼侍衛親軍馬步軍都指揮使九月奉詔赴闕晉髙祖幸其第六年七月授北京畱守河東節度使七年正月加侍中時天下大蝗惟不入河東界六月晉髙祖崩于鄴宫少帝即位加帝檢校太師八年三月進位中書令開運元年正月契丹南下契丹主以大軍直抵澶州遣蕃將偉王率兵入雁門朝廷以帝為幽州道行營招討使帝大破偉王于忻口㝷奉詔起兵至土門軍至樂平㑹契丹退乃還三月封太原王七月兼北面行營都統二年四月封北平王三年五月加守太尉是月帝誅吐渾白承福等五族凡四百人以别部王義宗統其餘衆九月案以下有脱文犯塞帝親率牙兵至朔州南陽武谷大破之東都事畧郭進傳契丹屠安陽髙祖遺進拒戰契丹敗走以功除刺史十一月契丹主率蕃漢大軍由易定抵鎮州杜重威等駐軍于中渡橋以禦之十二月十日杜重威等以全軍降于契丹十七日相州節度使張彦澤授契丹命陷京城遷少帝于開封府帝聞之大駭分兵守境以備寇患天福十二月春正月丁亥朔契丹主入東京癸已晉少帝蒙塵于封禪寺癸卯少帝比遷二月丁已朔契丹主具漢法服御崇元殿受朝制改晋國為大遼國大赦天下號㑹同十年是月帝遣牙將王峻奉表于契丹契丹主賜詔襃美呼帝為兒又賜木柺一蕃法貴重大臣方得此賜亦猶漢儀䁑几杖之此也王峻特柺而歸契丹望之皆避路及峻至太原帝知契丹政亂乃議建號焉是月秦州節度使何建以其地入于蜀戌辰河東行軍司馬張彦威與文武將吏等以中原無主帝威望日隆羣情所屬上牋勸進帝謙讓不允自是羣官三上牋諸軍將吏緇黄耆老相次迫請教答允之庚午陜州屯駐奉國指揮使趙暉候章都頭王晏殺契丹監軍及副使劉愿暉自稱留後契丹因授暉陜州兵馬畱後候章為本州馬步軍都指揮使王晏為副都指揮使暉等不受命宋史王晏傳開運末晏與本軍都校趙暉忠衛都校候章等戍陜州㑹契丹至汴遣其將劉愿據陜恣行暴虐晏與暉等謀曰今契丹南侵天下􅍅􅍅英雄豪傑固當乘時自奮且聞太原劉公威德逺被人心歸服若殺愿送欵河東為天下唱首則取富貴如反掌耳暉等然之晏乃率敢死士數人夜踰城入府署刼庫兵給其徒遲明斬愿首懸府門外衆請暉為帥章為本城副指揮使内外廵檢使兼都虞候遣其子漢倫奉表晉陽辛未帝于太原宫受册即皇帝位制改晉開運四年為天福十二年契丹國志云漢主仍稱天福年號曰予未忍忘晉也甲戌帝以晉帝舉族北遷憤惋乆之是日率親兵趨土門路邀迎晉帝至壽陽聞其已過乃還契丹聞帝建號偽制削奪帝官爵以通事耿崇美為潞州節度使高唐英為相州節度使崔廷勲為河陽節度使以為要害之地丁丑磁州賊帥梁暉據相州巳卯帝遣都將史𢎞肇率兵討代州平之初代州刺史王暉叛歸契丹𢎞肇一鼓而㧞之斬暉以徇庚辰權晉州兵馬畱後張晏洪奏軍亂殺知州副使駱從朗及括錢使諫議大夫趙熈以城歸順時晉州畱後劉在明赴東京朝于契丹從朗知軍州事帝方遣使張晏洪辛處明等告諭登極從朗囚之本城大將藥可儔殺從朗于理所州民相害率趙熈三軍請晏洪為留後處明為都監辛巳權陜州畱後趙暉權潞州畱後王守恩並上表歸順癸未澶州賊帥王瓊與其衆斷本州浮橋瓊敗死之時契丹以族人朗鄂為檀州節度使契丹性貪虐吏民苦之瓊為水運什長乃搆夏津賊帥張乙得千餘人㳂河而上中夜竊發自南城殺守將絶浮航入北城朗悟據牙城以拒之數日㑹契丹救至瓊敗死焉契丹主初聞其變也懼甚由是大河之南無乆畱之意㝷遺天雄軍節度使杜重威歸鎮三月丙戌朔詔河東管内自前税外雜色徴配一切除放是日契丹主坐崇元殿行入閣之禮契丹主以舅蕭翰為宣武軍節度使辛卯權延州畱後髙允權遣判官李彬奏本道節度使周密為三軍所逐以允權知畱後事上表歸順未幾帝召密赴行在壬辰丹州都指揮使高彦珣殺契丹所命刺史據城歸命壬寅契丹主發自東京還本國是日宿于赤崗至晡有大聲如雷起于敵帳之下契丹自黎陽濟河遂趨相州庚戌帝以北京馬歩都指揮使泗州防禦使檢校太保劉崇為太原尹檢校太尉以北京馬步軍都虞候敦從義為鄭州防禦使檢校太保以北京興㨗左廂都指揮使李洪信為陳州刺史檢校司徒以興捷右廂都指揮使尚洪遷為單州刺史檢校司徒以北京武節左廂都指揮使盖萬為蔡州刺史以武節右廂都指揮使周暉為濮州刺史以保寧都指揮使朱奉千為隨州刺史辛亥吐渾節度使王義宗加檢校太尉以前忻州刺史秦習為耀州團練使癸丑以北京副畱守檢校司徒白文珂為河中節度使檢校太尉夏四月巳未以北京馬軍都指揮使集州刺史劉信為滑州節度使充侍衛馬軍都指揮使檢校太傅以北京隨使右都押衙楊邠為權樞密使檢校太保以北京武節度指揮使雷州刺史史𢎞肇為許州節度使充侍衛步軍都指揮使檢校大傅以北京牢城都指揮使壁州刺史常思為鄧州節度使檢校太傅兼權北京馬步軍都指揮使三城巡檢使以河東行軍司馬張彦威為同州節度使檢校太保以蕃漢兵馬都孔目官郭威為權樞宻􅀈檢校司徒以河東左都押運扈彦珂為宣徽南院司檢校司徒以右都押衙王浩為宣徽北院使檢校司徒以兩使都孔目官王章為權三司使檢校太保是日契丹主取相州殺畱後梁暉宋史李榖傳潛遺河朔酋豪梁暉入據安陽契丹主患之即謀北旋㑹有告契丹以城中虚弱者契丹還攻安陽陷其城暉磁州滏陽人少為盗㑹契丹入汴暉收集徒黨先入磁州無所侵犯遣使送欵于帝暉偵知相州頗積兵仗且無守備遂以三月二十一日夜與其徒踰垣而入殺契丹數十人奪器甲數萬計遂據其城契丹主先遺相州節度使髙唐英率兵討之未㡬契丹主至城下是月四日攻㧞之遂屠其城翼日契丹主北去命髙唐英鎮之唐英閲城中遺民得男女七百人而已乾祐中王繼𢎞鎮相州奏于城中得髑髏十餘萬殺人之數從可知也庚申以石州刺史易全章為洛州團練使以前遼州刺史安真為宿州團練使以嵐州刺史孟行超為頴州團練使以汾州刺史武彦𢎞為曹州防禦使以前憲州刺史慕容信為齊州防禦使以遼州刺史薛瓊為毫州防禦使以沁州刺史李漢韜為汝州防禦使癸亥册魏國夫人李氏為皇后甲子以皇長子承訓為左衛上將軍第二子承祐為左衞大將軍第三子承勲為右衞大將軍皇女彭城郡君宋氏封永寧公主皇姪承贇為右衞上將軍以河東節度使官蘓逢吉為中書侍郎同平章事集賢殿大學士以河東觀察判官蘓禹珪為中書侍郎同平章事升府州為節度加永安軍額以振武節度使府州練團使折從阮為永安軍節度使行府州刺史檢校太尉以北京隨使左都押衙劉銖為河陽節度使以河東支使韓祚為左諫議大夫充樞密直學士乙丑遣史𢎞肇率兵一萬人趨潞州丙寅以權知潞州軍州事左驍衞大將軍王守恩為潞州節度使檢校太保以權㸃檢延州軍州事髙充權為延州節度使檢校太保以岢嵐軍使鄭謙為忻州刺史遥領應州節度使充忻代二州義軍都部署丁卯以河東都巡館驛沿河廵檢使閻萬進為嵐州刺史領朔州節度使充嵐憲二州義軍都制置戊辰權河陽畱後武行德以城來歸初契丹主將發東京船載五庫兵仗自汴浮何欲置之于北地遺奉國都虞候武行德部送與軍士千餘人并家屬俱行至河隂軍亂奪兵仗殺契丹監吏衆推行德為帥與河隂屯駐軍士合乃自汜水抵河陽河陽偽命節度使崔廷勲率兵拒之兵敗行德等追躡之廷勲棄城而遁行德因據其城隆平集武行德傅行德䧟于契丹偽請自効因遣送將校數十人䕶所取尚方鎧甲還契丹至河隂行德謂衆曰我與若等能為邊地鬼也衆素伏其威名皆曰惟命遂攻孟州走其節度使崔廷勲悉以府庫分諸校而權領州事遣其弟行友詣太原勸進偽命西京畱守劉晞棄洛城南走許州遂奔東京洛京廵檢使方太自署知畱守事未㡬大為武行德所害是日蕃將耿崇美屯澤州史𢎞肇遺先鋒將馬誨率兵擊之崇美退保懷州崔廷勲以契丹衆攻武行德于河陽行德出戰為廷勲所敗汴州蕭翰遺蕃將髙牟翰將兵援送劉晞復歸于洛牟翰至殺前澶州節度使潘環于洛陽辛未以河陽都部署武行德為河陽節度使檢校太尉充一行馬步軍都􅀈署甲戌潞州節度使王守恩加檢校太尉以前棣州刺史慕容彦超為澶州節度使檢校太保丙子契丹主耶律德光卒于鎮之樂城趙延夀于鎮州自稱權知國事辛已陜州節度使趙暉加檢校太尉華州節度使兼陜州馬步軍都指揮使侯章加檢校太傅以陜府馬步軍副都指揮使兼綘州防禦使王晏為晉州節度使檢校太傅以丹州都指揮使權知軍州事髙彦珣為丹州刺史隆平集王晏傅云漢祖威名未振而晏等歸之甚善即授以節度使舊五代史巻九十九
