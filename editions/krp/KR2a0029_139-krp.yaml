body:
  text: 舊五代史巻六十九宋門下侍郎參知政事監修國史薛居正等撰唐書第四十五列𫝊二十一張憲字允中晉陽人世以軍功為牙校憲始童丱喜儒學勵志横經不拾晝夜太原地雄邊服人多尚武恥于學業惟憲與里人藥縱之精力遊學弱冠盡通諸經尤精左𫝊嘗袖行所業謁判官李襲吉一見欣歎既辭謂憲曰子勉之將來必成佳器石州刺史楊守業喜聚書以家書示之聞見日博莊宗為行軍司馬廣延髦俊素知憲名令朱守殷賫書幣延之嵗餘釋褐交城令秩滿莊宗嗣世補太原府司録參軍時霸府初開幕客馬郁王緘燕中名士盡與之遊十二年莊宗平河朔念藩邸之舊徵赴行臺十五年授監察賜緋署魏博推官自是恒簪筆扈從十五年王師戰胡栁周徳威軍不利憲與同列奔馬北渡梁軍急追殆將不濟至晩渡河人皆陷水而没憲與從子朗履氷而行將及岸水陷朗泣以馬箠引之憲曰吾兕去矣勿使俱陷朗曰忍季父如此俱死無恨朗偃伏引箠憲躍身而出是夜莊宗令于軍中求憲或曰與王緘俱殁矣莊宗垂涕求尸數日聞其免也遣使慰勞尋改掌書記水部郎中賜金紫歴魏博觀察判官從討張文禮鎮州平授魏博鎮冀十郡觀察判官改考功郎中兼御史中丞權鎮州留事莊宗即位詔遷魏都校尚書工部侍郎充租庸使八月改刑部侍郎判吏部銓兼太清宫制使荘宗遷洛陽以憲檢校吏部尚書興唐尹東京副留守知留守事憲學識優深尤精吏道剖析聽斷人不敢欺三年春車駕幸鄰時易定王都來朝宴于行宫將擊鞠初莊宗行即位之禮卜鞠場吉因築壇于其間至是詔毁之憲奏曰即位壇是陛下祭接天神受命之所自風燥雨濕之外不可輒毁亦不可修魏繁陽之壇漢汜水之墠到今猶有兆象存而不毁古之道也即命治之于宫西數日來成會憲以公事獲讁閤門待罪上怒戒有司速治行事之庭礙事者畢去竟毁即位壇憲私謂郭崇韜曰不祥之甚忽其本也秋崇韜將兵征蜀以手書告憲曰允中避事久矣余受命西征已奏還公黄閤憲報曰庖人之代尸祝所謂非吾事也時樞密承㫖段佪當權任事以憲從龍舊望不欲憲在朝廷會孟知祥鎮蜀州選北京留守佪揚言曰北門國家根本非重徳不可輕授今之取才非憲不可趨時者因附佪勢巧中傷之又曰憲有相業然國祚中興宰相在天子面前得失可以改作一方之事制在一人惟北面事重十一月授憲銀青光禄大夫檢校吏部尚書太原尹北京留守知府事四年二月趙在禮入魏州時憲家屬在魏闗東俶擾在禮善待其家遣人賫書至太原誘憲憲斬其使書不發函而奏既而明宗為兵衆所劫諸軍離散地逺不知事實或謂憲曰蜀軍未至洛陽窘急總管又失兵權制在諸軍之手又聞河朔推戴事若實然或可濟否憲曰治亂之機間不容髮以愚所斷事未可知愚聞藥縱之言總管徳量仁厚素得士心餘勿多言志此而巳四月五日李存渥自洛陽至口傳莊宗命並無書詔惟云天子授以隻箭𫝊之為信衆心惑之時事莫測左右獻畫曰存渥所乘馬巳戢其飾復召人謀事必行隂禍因欲據城寧我負人宜早為之所但戮吕鄭二宦且繫存渥徐觀其變事萬全矣憲良久曰吾本書生無軍功而致身及此一旦自布衣而紆金紫向來仕宦非出他門此畫非吾心也事苟不濟以身徇義東都事略張昭𫝊昭勸憲奉表明宗以勸進憲曰吾書生也天子委以保釐之任吾豈苟生者乎昭曰此古之大節公能行之忠臣也憲既死論者以昭能成憲之節翌日符彦超誅吕鄭軍城大亂燔剽達曙憲初聞有變出奔沂州既而有司糾其委城之罪四月二十四日賜死于晉陽之千佛院幼子凝隨父走亦為收者加害明宗郊禮大赦有司請昭雪從之憲沈静寡欲喜聚圖書家書五千巻視事之餘手自刋校善彈琴不飲酒賓寮宴語但論文嘯咏而巳士友重之憲長子守素仕晉位至尚書郎王正言鄆州人父志濟隂令正言早孤貧從沙門學工詩密州刺史賀徳倫令歸俗署郡職徳倫鎮青州表為推官移鎮魏州改觀察判官莊宗平定魏博正言仍舊職任小心端慎與物無競嘗為同職司空頲所凌正言降心下之頲誅代為節度判官同光初守户部尚書興唐尹時孔謙為租庸副使常畏張憲頲特不欲其領使乃白郭崇韜留憲于魏州請宰相豆盧革判租庸未㡬復以盧質代之孔謙白云錢穀重務宰相事多簿籍留滯又云盧質判二日便借官錢皆不可任意謂崇韜必令巳代其任時物議未允而止謙沮喪久之李紹宏曰邦計國本時號怨府非張憲不稱職即日徵之孔謙段佪白崇韜曰邦計雖重在侍中眼前但得一人為使即可魏博六州户口天下之半王正言操守有餘智力不足若朝廷任使庻㡬與人共事若専制方隅未見其可張憲才器兼濟宜以委之崇韜即奏憲留守魏州徵王正言為租庸使正言在職主諾而已權柄出于孔謙正言不耐繁浩簿領縱横觸事遺忘物論以為不可即以孔謙代之正言守禮部尚書三年冬代張憲為興唐尹留守鄴都時武徳使史彦瓊監守鄴都廩帑出納兵馬制置皆出彦瓊將佐官吏頥指氣使正言不能以道御之但趦趄聽命至是貝州戍兵亂入魏州彥瓊望風敗走亂兵剽劫坊市正言促召書吏冩奏章家人曰賊巳殺人縱火都城巳陷何奏之有是日正言引諸僚佐謁趙在禮通鑑正言索馬不能得乃帥僚佐步出將門謁在禮望塵再拜請罪在禮曰尚書重徳勿自平屈余受國恩與尚書共事但思歸之衆倉卒見迫耳因拜正言厚加慰撫明宗即位正言求為平盧軍行軍司馬因以授之竟卒于任胡裝禮部尚書曾之孫汴將楊師厚之鎮魏州裝與副使李嗣業有舊因往依之薦授貴鄉令及張彦之亂嗣業遇害裝罷秩客于魏州莊宗初至裝謁見求假官司空頲以其居官貪濁不得調者久之十三年莊宗還太原裝候于離亭謁者不内乃排闥而入曰臣本朝公卿子孫從兵至此殿下比襲唐祚勤求英俊以壯霸圖臣雖不才比于進九九納豎刁頭須亦所庶幾而羈旅累年執事者不垂顧錄臣不能赴海觸樹走胡適越今日歸死于殿下也莊宗愕然曰孤未之知何至如是賜酒食慰遣之謂郭崇韜曰便與擬議是嵗署館驛巡官未幾授監察御史裏行遷節度巡官賜緋魚袋尋歴推官檢校員外郎裝學書無師法工詩非作者僻于題壁所至宫亭寺觀必書爵里人或譏之不以為愧時四鎮幕賓皆金紫装獨恥銀艾十七年莊宗自魏州之徳勝與賓僚城樓餞別既而羣僚離席裝獨留獻詩三篇意在章服莊宗舉大鍾屬裝曰員外能釂此乎裝飲酒素少略無難色為之一舉而釂莊宗即解紫袍賜之同光初以裝為給事中從幸洛陽時連年大水百官多窘裝求為襄州副使四年洛陽變擾節度使劉訓以私忿族裝誣奏云装欲謀亂人士寃之崔貽孫新唐書宰相世系表貽孫字伯垂祖𤣥亮左散騎常侍世系表𤣥亮字晦孫虢州刺史父芻言潞州判官貽孫以門族登士第以監察升朝監清資美職及為省郎于江南迴以櫜裝營別墅于漢上之穀城退居自奉清江之上綠竹遍野狹徑深密維舟西岸人莫造焉時人甚髙之及李振貶均州貽孫曲奉之振入朝貽孫累遷丞郎同光初除吏部侍郎銓選疎謬貶官塞地馳驛至潞州致書于府師孔勍曰十五年穀城山裏自謂逸人二千里沙塞途中今為逐客勍以其年八十奏留府下明年量移澤州司馬遇赦還京宰相鄭珏以姻戚之分復擬吏部侍郎天官任重昏耄罔知後遷禮部尚書致仕而卒北夢瑣言莊貽孫年過八十求進不休囊橐之資素有貯積性好干人喜得小惠有子三人自貽孫左降之後各于舊業争分其利甘㫖醫藥未有奉者貽孫以書責之云生有明君宰相死有天曹地府吾雖考終豈放汝耶孟鵠魏州人莊宗初定魏博選幹吏以計兵賦以鵠為度支孔目官明宗時為郭洺節度使每曲意承迎明宗甚徳之及孔謙專典軍賦徵督苛急明宗嘗切齒及即位鵠自租庸勾官擢為客省副使樞密承㫖遷三司副使出為相州刺史會范延光再遷樞密乃徵鵠為三司使初鵠有計畫之能及專掌邦賦操割依違名譽頓减期年發疾求外任仍授許州節度使謝恩退帝目送之顧謂侍臣曰孟鵠掌三司㡬年得至方鎮范延光奏曰鵠于同光世已為三司勾官天成初為三司副使出刺相州入判三司又二年帝曰鵠以幹事遽至方鎮争不勉旃鵠與延光俱魏人厚相結託暨延光掌樞務援引判三司又致節鉞明宗知之故以此言譏之到任未周嵗卒贈太保孫岳稷州人也强幹有才周歴府衛右職天成中為潁耀二州刺史閬州團練使所至稱治遷鳳州節度使受代歸京秦王從榮欲以岳為元帥府都押衙事未行馮贇舉為三司使時豫密謀朱馮患從榮之恣横岳曾極言其禍之端康義誠聞之不悦及從榮敗義誠召岳同至河南府檢閲府藏時紛擾未定義誠密遣騎士射之岳走至通利坊為騎士所害識與不識皆痛之子璉歴諸衛將軍藩閫節度副使張延朗汴州開封人也事梁以租庸吏為鄆州糧科使明宗克鄆州得延朗復以為糧科使後徙鎮宣武成徳以為元從孔目官長興元年始置三司使拜延朗特進工部尚書充諸道鹽鐵轉運等使兼判户部度支事詔以延朗充三司使末帝即位授禮部尚書兼中書侍郎平章事判三司延朗再上表辭曰臣濫承雨露擢處鈞衡兼叨選部之銜仍掌計司之重況中省文章之地洪鑪陶鑄之門臣自揣量何以當處是以繼陳章表疊貢情誠乞請睿恩免貽朝論豈謂御批累降聖㫖不移决以此官委臣非器所以强收涕泗勉遏怔忪重思事上之門細料盡忠之路竊以位髙則危至寵極則謗生君臣莫保于初終分義難防于毁譽臣者保兹重任忘彼至公狥情而以免是非偷安而以固富貴則内欺心腑外負聖朝何以報君父之大恩望子孫之延慶臣若但行王道唯守國章任人必取當才决事須依正理確違形勢堅塞倖門則可以振舉宏綱彌縫大化助陛下含容之澤彰國家至理之風然而讒邪者必起憾詞憎嫉者寧無謗譏或慮至尊未悉羣謗難明不更拔本尋源便俟甘瑕受玷臣心可忍臣恥可消只恐山林草澤之人稱量聖制冠履軒裳之士輕懷朝廷臣又以國計一司掌其經費利權二務職在捃収將欲養四海之貧民無過薄賦贍六軍之勁士又藉豐儲利害相隨取與難酌若使罄山採木竭澤求魚則地官之敎化不行國本之傷殘益甚取怨黔首是黷皇風況諸道所徵賦租雖多數額時逢水旱或遇蟲霜其間則有減無添所在又申逃係欠乃至軍儲官俸帝汲汲于供須夏税秋租毎懸懸于繼續況今内外倉庫多是罄空逺近生民或聞饑歉伏願朝廷尚添軍額更益師徒非時之𫝊糴難為異日之區分轉大竊慮年支有闕國計可憂望陛下節例外之破除放諸項以儉省不添冗食且止新兵務急去繁以寛經費減奢從儉漸俟豐盈則屈者知恩叛者從化彌兵有日富俗可期臣又聞治民尚清為政務易易則繁苛並去清則偏黨無施若擇其良牧委在正人則境内蒸黎必獲蘇息官中倉庫亦絶侵欺伏望誡兒在之處官無乖撫俗擇將來之蒞事更審求賢儻一一得人則農無所苦人人致理則國復何憂但奉公善政者不惜重酬昧理無功者勿頒厚俸益彰有道兼絶狥情伏望陛下念臣布露之前言閲臣驚憂于後患察臣愚直杜彼䜛邪臣即但副天心不防人口庻㡬萬一仰答聖明末帝優詔答之召于便殿謂之曰卿所論奏深中時病形之切言頗救朕失國計事重日得商量無過勞慮也延朗不得巳而承命延朗有心計善理繁劇晉髙祖在太原朝廷猜忌不欲令有積聚係官財貨留使之外延朗悉遣取之晉髙祖深銜其事及晉陽起兵末帝議親征然亦采浮論不能果決延朗獨排衆議請末帝北行識者韙之晉髙祖入洛送臺獄以誅之其後以選求計使難得其人甚追悔焉劉延皓應州渾元人祖建立父茂成皆以軍功推為邊將延皓即劉后之弟也末帝鎮鳳翔署延皓元隨都校奏加檢校户部尚書清泰元年除宫苑使加檢校司空俄改宣徽南院使檢校司徒二年遷樞密使太保出為鄴都留守檢校太傅延皓御軍失政為屯將張令昭所逐出奔相州尋詔亭所任及晉髙祖入洛延皓逃匿龍門廣化寺數日自經而死延皓始以后戚自藩􅀈出入左右甚以温厚見稱故末帝嗣位之後委居近密及出鎮大名而所執一變掠人財賄納人園宅聚歌僮為長夜之飲而三軍所給不時内外怨之因為令昭所逐時執政以延皓失守請舉舊章末帝以劉后内政之故止從罷免而巳由是清泰之政弊矣劉延朗宋州虞城人也末帝鎮河中時為軍城馬步都虞候後納為腹心及鎮鳳翔署為孔目吏末帝將圖起義為捍禦之備延朗計公私粟帛以贍其急及西師納降末帝赴洛皆無所闕焉末帝甚賞之清泰初除宣徽北脘使俄以劉延皓守鄴改副樞密使累官至檢校太傅時房暠為樞密使但髙枕閑眠啟奏除授一歸延朗由是得志凡藩侯郡牧自外入者必先賂延朗後議進貢賂厚者先居内地賂薄者晩出邊藩故諸將屢有怨訕末帝不能察之及晉髙祖入洛延朗將竄于髙山與從者數輩過其私第指而嘆曰我有錢三十萬貫聚于此不知為何人所得其愚暗如此尋捕而殺之舊五代史巻六十九
