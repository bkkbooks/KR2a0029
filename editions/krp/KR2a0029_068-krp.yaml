body:
  text: 舊五代史巻三十三攷證唐莊宗紀七禮部尚書王正言正言原本作直言今據歐陽史改正其許市者謂之入草物入草原本訛全草今據通鑑及册府元龜所引薛史改正鎮州衛州奏案原本脫鎮州二字今據册府元龜所引薛史増入太子少師致仕薛廷珪卒少師原本作少保今據列傳改正斷吉柏津吉柏通鑑作桔柏攷歐陽史亦作吉柏今仍其舊梁偽昭武軍節度使林思諤來降思諤原本作世諤今據通鑑十國春秋改正偽武信軍節度使王宗壽以遂合渝瀘忠五州來降案九國志王宗夀傳唐師入境郭崇韜遣使遺宗壽書宗夀不納聞衍降乃治装赴闕歐陽史蜀世家亦言宗壽獨不降聞衍已銜璧大慟從衍東遷據是書則王衍未送欵宗夀已降疑𫝊聞之誤丙辰蜀主王衍出降案王衍出降在十一月丙辰通鑑與是書同歐陽史作己酉盖據上牋歸命而先書之其實己酉唐師尚在綿州未入成都也五代春秋作十二月蜀王衍降尤誤辛巳次潭泊壬午次龕澗潭泊原本訛覃泊龕澗原本訛寵澗今並從通鑑改正長姊孟氏封瓊華長公主案通鑑以瓊華為克讓女則莊宗之從姊也隆平集東都事畧孟昶𫝊並云父知祥尚唐莊宗妹俱與是書異日於上東門外佇望其來上東門原本作尚東門據通鑑注云洛城東面三門中曰建春左曰上東右曰永春今改正如是西班有稱統軍上將軍者西班原本作兩班今據五代㑹要改正第七弟存紀可封雅王雅王原本作睢王攷通鑑及歐陽史皆作雅王是書宗室𫝊亦作雅今改正舊五代史巻三十三攷證
