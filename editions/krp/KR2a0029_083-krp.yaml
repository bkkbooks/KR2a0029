body:
  text: 舊五代史巻四十一宋門下侍郎參知政事監修國史薛居正等撰唐書第十七明宗紀七長興元年春正月丙寅朔帝御明堂殿受朝賀仗衛如常儀乙亥國子監請以監學生束脩及光學錢備監中修葺公用從之丙子帝謂宰臣曰時雪未降如何馮道曰陛下恭行儉德憂及烝民上合天心必有春澤是夜降雪其夕右散騎常侍蕭希甫封狀申樞宻稱得河堰衙官狀告本都將校二十餘人欲謀不軌至旦追問無狀斬所告人是日幸至德宫辛卯中書奏郊天有日合差大内畱守詔以宣徽南院使朱𢎞昭充二月戊戌幸稻田莊己亥黒水國主兀兒遣使貢方物翰林學士劉昫奏新學士入院舊試五題請今後停試詩賦秖試麻制答蕃書批答共三道仍請内賜題目定字數付本院召試從之五代㑹要載劉昫原奏云舊例學士入院除中書舍人不試餘官皆先試麻制各蕃批答各一道詩賦各一道號曰五題並于當日呈納從前毎遇召試多預出五題潛令宿搆其無黨援者即日起草罕能成功今請權停詩賦秪試三道仍内賜題目兼定字數從之有司奏皇帝致齋于明堂按舊服通天冠絳紗袍文武五品已上著袴褶近例秪著朝服從之乙巳中書奏皇帝朝獻太㣲宫太廟祭天地于圜丘準禮例親王為亞獻行事受誓戒從之以天雄軍節度使石敬瑭為御營使壬子帝宿齋于明堂殿癸丑朝獻太㣲宫是日宿齋于太廟詰旦請行饗禮甲寅赴南郊齋宫是夜㣲雨三鼓後晴明如晝乙邜祀昊天上帝于圜丘柴燎禮畢郊宫受賀是日御五鳯摟宣制改天成五年為長興元年大赦天下除十惡五逆放火劫舎屠牛官典犯贓偽行印信合造毒藥外罪無輕重咸赦除之天成四年終諸道所欠殘税及場院欠折並特放免羣臣職位帯平章事侍中中書令並與改郷名里號朝臣及蕃侯郡守亡父母及父母在并妻室未沾恩命者並與恩澤應私債出利已經倍者秪許徴本巳經兩倍者本利並放河陽管内人户每畝舊徴橋道錢五文今後不徴諸道州府每畝先徴麴錢五文今特放二文云啇州吏民以刺史郭知瓊善政聞詔褒之三月丁邜幸㑹節園遂幸河南府靈武奏殺戮蕃賊二千人壬申鳯翔節度使李從曮進封岐國公移鎮汴州甲戌延州節度使髙允韜移鎮邢州丙子以宣徽使朱𢎞昭為鳯翔節度使潞州節度使朱漢賔加檢校太傅移鎭晉州徐州節度使房知温移鎮鄆州鄆州節度使王晏球移鎮青州宰臣馮道率百寮拜表請上尊號曰聖明神武文德恭孝皇帝詔報不允壬午許州節度使孔循移鎮滄州陜州節度使張延朗移鎮許州加檢校太傅滄州節度使張䖍釗移鎮徐州加檢校太保癸未詔貶右散騎常侍集賢殿學士判院事蕭希甫為嵐州司户參軍仍馳驛發遣坐誣告之罪也宰臣馮再請上尊號詔允之丙戌以侍衛親軍馬步軍都指揮使河陽節度使康義誠為襄州節度使檢校太傅以左武衛上將軍劉彦琮為陜州節度使檢校太保庚寅制淑妃曹氏可立為皇后仍令擇日册命夏四月甲午朔國子司業張溥奏請復八館以廣生徒按六典監有六學國子太學四門律學書學算學是也而溥云八館謬矣丁酉前汴州節度使檢校太尉兼侍中符習可太子太師致仕進封衛國公戊戌遂州節度使夏魯竒加同平章事皇子河中節度使從珂進位檢校太尉封開國公自是諸道節鎮皆次第加恩以郊禋覃慶澤故也巳亥幸㑹節園壬寅以樞宻使安重誨為畱守太尉兼中書令使如故青州節度使王建立加侍中移鎮潞州皇子河中節度使從珂奏臣今月五日閲馬于黄龍莊衙内指揮使楊彦温據城叛臣尋時詰問稱奉宣命胡三省通鑑注云樞宻院用宣三省用堂帖臣見在虞鄉縣帝遣西京畱守索自通侍衛步軍都指揮使藥彦稠等攻之仍授彦温絳州刺史冀誘而擒之也詔從珂赴闕丁未以户部尚書李鏻為兖州行軍司馬坐引淮南覘人貽安重誨寳帯也戊申宰臣馮道加右僕射趙鳯加吏部尚書乙酉以左龍武統軍劉君鐸卒廢朝癸丑索自通藥彦稠等奏收復河中斬楊彦温傅首來獻初彦稠出師帝戒之曰與朕生致彦温吾將自訊之及收城斬首傳送帝怒彦稠等時議皆以為安重誨方弄國權從榮諸王敬事不暇獨忌從珂威名每于帝前屢言其短巧作窺圖冀能傾陷彦温旣誅從珂歸清化里第重誨謂馮道等曰蒲帥失守責帥之義法當如何翼日道等奏合行朝典帝不悦趙鳯堅奏故事有責帥之義所以激勵藩守帝曰皆非公等意也後數日帝于中興殿見宰臣趙鳯承重誨意又再論列帝黙然翼日重誨復自論奏帝極言以拒之語在末帝紀中帝又曰卿欲如何制置重誨曰于陛下父子之間臣不合言一禀聖㫖帝曰從佗私第間坐何煩奏也乃止以前邢州節度使檢校司徒李從温為左武衛上將軍丙辰以西京畱守檢校司徒索自通為河中節度使丁巳雲州奏掩襲契丹獲頭口萬計戊午帝御文明殿受册徽號册曰維長興元年歲次庚寅四月甲午朔二十五日戊午金紫光禄大夫守尚書左僕射兼門下侍郎同中書門下平章事充太㣲宫使𢎞文館大學士上柱國始平郡開國侯食邑一千五百户食實封一百户臣馮道銀青光禄大夫門下侍郎兼吏部尚書同中書門下平章事監修國史判集賢院事上柱國天水郡開國伯食邑七百户臣趙鳯及文武百官特進太子少傅上柱國酒泉郡開國侯食邑一千户臣李琪等五千八百九十七人言臣聞天不稱髙而體尊地不矜厚而形大厚無不載髙無不覆四時行于内萬物生其間總神祇之靈叶帝王之運日出而星辰自戢龍飛而雷雨皆行元氣和而天下和庶事正而天下正伏惟皇帝陛下天授一德時歴多艱翊太祖以興邦佐先皇而定難拯嗣昭于潞困救德威于燕危遏思逺而全鄴都誅彦章而下梁苑成再造之業由四征之功洎纂鴻圖每敷皇化去内庫而省庖膳出宫人而減伶官輕寳玉之珍却鷹鸇之貢淳風旣洽嘉瑞自臻故登極之前人皆不足改元之後時便有年遐荒旋斃于戎王重譯徑來于蠻子東廵而守殷殪北討而王都殱破契丹而燕趙無虞控靈武而𤓰沙並復近以饗上元而薦太廟就吉土而配昊天輅已降而雨霑事欲行而月見燔柴禮畢作解恩覃帝命咸均人情普悦非陛下有道有德至聖至明動不疑人静惟恭已常敦孝禮毎納忠言則何以臨御五年澄清四海時久纒于災害民驟見于和平休徴備載于簡編徽號過持于謙譲三年不允衆志皆堅天不以上帝自崇日不以大明自貴于烝民有惠于元后同符烈聖皆然舊章斯在今以明庭百辟列土諸侯中外同辭再三瀝懇臣等不勝大願謹奉玉寳玉册上號曰聖明神武文德恭孝皇帝伏惟皇帝陛下體堯舜之至道法日月于太虚威于夷狄恩及蟲魚奉國者繼加榮寵違天者咸就誅鋤典禮當告成之後夙夜思卽位之初千秋萬歲永混車書宰臣馮道之辭也庚申以左金吾上將軍史敬鎔為鄧州節度使以右金吾上將軍符彦超為兖州節度使以驍衛上將軍張敬詢為滑州節度使以閬州防禦使孫岳為鳯州節度使詔改鳯翔管内應州為匡州信州為晏州改新州管内武州為毅州五月乙丑鄭州防禦使張進副使咸繼威並停任以盜掠城中居人故也丙寅以少府監韋肅為洺州刺史以潞州節度使王建立為太傅致仕建立素與安重誨不恊因其入朝乃言建立自鎭歸朝過鄴都日有扇搖之言以是罪之故令致仕丁邜以前興元節度使劉仲殷㩲知潞州軍州事戍辰以安州節度使髙行珪卒輟朝有司上言皇后受册内外命婦並合奉賀今未有命婦準例上表稱賀中書諸道節度使但進表上言皇帝外命婦上皇后賀牋表進呈訖無報應皇親或有慶賀及起居章表内中進呈後秪宣示來使並不合答復從之壬申以權知昭義軍軍州事劉仲殷為潞州節度使檢校太傅丁丑帝臨軒命使册淑妃曹氏為皇后禮院上言百官上疏于皇后曰皇后殿下及六宫及率土婦人慶賀祇呼殿下不言皇后中書覆奏若祇呼殿下恐與皇太子無所分别凡上中宫表章呼皇后殿下若不形文字尋常祗呼皇后從之癸未太子少傅蕭頃卒廢朝甲申迴鶻可汗仁裕遣使貢方物辛邜以翰林承旨兵部侍郎李愚為太常卿壬辰以前滑州節度使李從璋為右驍衛上將軍六月丁酉以獲駕馬軍都指揮使貴州刺史安從進為宣州節度使充䕶駕馬軍都指揮使以獲駕步軍都指揮使澄州刺史藥彦稠為壽州節度使兼獲步軍都指揮使甲辰以皇城使安崇緒為河陽留後重誨子也鳯翔奏所管良晏匡三州並無屬縣請却改為縣從之仍舊為軍鎭前振武節度使安金全卒壬子中書門下奏詳覆到禮部院今年及第進士李飛樊吉夏侯珙吳沺王德柔李榖等六人望放及第其盧價等七人及賔貢鄭朴望許令將來就試知貢舉張文寳試士不得精當望罰一季俸從之丁已皇子北京畱守河東節度使從厚移領鎭州以左武衛上將軍李從温為許州節度使秋七月甲子以宣徽南院使行右衛上將軍判三司馮贇為北京畱守太原尹巳已以鄧州節度使史敬鎔卒廢朝甲戌以左威衛上將軍梁漢顒為鄧州節度使前兖州節度使趙在禮為左驍衛上將軍庚辰奉國軍節度使兼威武軍節度副使檢校太尉兼侍中王延禀加兼中書令詔諸州得替防禦團練使刺史並宜于班行比擬如未有員闕可隨常參官逐日立班新例也辛巳詔揀年少宫人及西川宫人並還其家無家可歸者任從所適甲申以前齊州防禦使孫璋為鄜州節度使戊子以右散騎常侍陸崇卒廢朝崇為福建册使卒于明州贈兵部尚書宿州進白安重誨謂其使曰豐年為上瑞懷狡性雖白何為命退歸八月甲午以前鄧州節度使盧文進為左衛上將軍北京奏吐渾千餘帳内附于天池川安置禁在京百司影射州縣税户乙未捧聖軍使李行德十將張儉告宻人邉彦温並族誅以其誣告安重誨私市兵仗故也以前許州節度使張延朗為檢校太傅行兵部尚書充三司使三司之有使額自延朗始也初中書覆奏授延朗諸道鹽鐵轉運等使兼判户部度支事奏入宣㫖曰㑹計之司國朝重事將總成其事額俾專委于近臣貴便一時何循往例兼移内職可示親規張延朗可充三司使班在宣徽使下癸卯北京奏生吐渾内附欲于嵐州安族帳都官員外郎知制誥張昭逺奏請依國朝舊例選郎官御史分行天下宣問風俗興利除害不報壬寅皇子河南尹判六軍諸衛事從榮封秦王仍令所司擇日册命五代㑹要長興元年九月太常禮院奏草定秦王儀注𫝊士叚顒議曰據開元禮臨軒册禮命諸王大臣其日受冊者朝服從第鹵簿與百官俱集朝堂就次受册訖通事舎人引不載謁朝還第之議自開元以後冊拜諸玉皆正衙門命詣延英進冊皇帝御内殿髙品引王人立于位髙品宣制讀册王受册訖歸院亦無乗輅謁朝之禮臣按五禮精義云古者皆因禘嘗而頒爵禄所以示無自専禀之於祖宗也个雖册命不在烝嘗然拜大官封大邑必至殿廷敬慎之道也今當司欲准開无禮其日秦王服朝服自理所乗輅車備鹵簿與群臣俱集朝堂就次受册訖至應天門外奉册置于載册之車秦王升輅出謁太廟訖歸理儀伏鹵簿如來時之儀從戊申兖州奏淮南海州都指揮使王傳拯殺本州刺史陳宣焚燒州城以所部兵士及家口五千人歸國至沂州帝遣使慰納之庚戌正衙命使册福慶長公主孟氏以前雄武軍節度使王思同為左武衛上將軍以前鳯州節度使陳臯為右威衛上將軍壬子正衙命使赴大原册永寕公主石氏乙邜以左監門衛上將軍陳延福卒廢朝丙辰皇子鎭州節度使從厚封宋王仍令擇日册命九月乙丑階州刺史王𢎞贄上言一州主客户纔及千數並無縣局臣今檢括得新舊主客已及三千二百欲依舊額立將利福津二縣請置令佐從之丁丑詔天下諸州府不得奏薦著紫衣官員為州縣官戍寅升尚書右丞為正四品癸未利閬遂三州奏東川節度使董璋謀叛結連西川孟知祥甲申以鎭州節度使范延光為檢校太傅守刑部尚書充樞宻使利州閬州進納東川檄書言將兵擊利閬責以間諜朝廷為名乙酉以左驍衛上將軍趙在禮為同州節度使兼四面行營馬步軍都指揮使樞宻院直學士守工部侍郎閻至樞宻院直學士守尚書右丞史圭並轉户部侍郎依前充職以翰林學士守户部侍郎李懌為尚書右丞以翰林學士户部侍郎劉昫為兵部侍郎以翰林學士中書舎人竇夢徴為工部侍郎依前充職以中書舎人劉贊為御史中丞以御史中丞許光義為兵部侍郎以兵部侍郎姚顗為吏部侍郎丙戌詔東川節度使董璋可削奪在身官爵仍徴兵進討丁亥以西川節度使孟知祥兼西南面供饋使天雄軍節度使石敬瑭兼東川行營都招討使以遂州節度使夏魯竒兼東川行營招討副使庚寅以右衛上將軍王思同為京兆尹充西京畱守兼西南行營馬步都虞侯冬十月壬辰以太子少傅李琪卒廢朝癸巳以鄜州節度使米君立卒廢朝詔凡賻贈布帛言段不言端匹段者二丈也宜令三司依此給付甲午正衙命使冊興平公主于宋州節度使駙馬都尉趙延壽之私第己亥以左驍衛上將軍李從璋為陜州節度使陜州節度使劉彦琮移鎭邠州尚書博士田敏請依舊典藏氷頒氷以銷隂陽愆伏之沴詔從之五代會要載原勅云藏氷之制載在前經獻廟之儀廢于近代旣朝臣之特舉案典禮以宜行田敏所奏祭司寒獻羔事宜依其桃弧棘矢事久不行理難備創其諸侯亦宜准往制藏氷乙已供奉官張仁暉自利州迴奏董璋攻陷閬州節度使李仁矩舉家遇害丁未宫苑使董光業并妻子並斬于都市璋之子也辛亥以武安軍節度副使洪鄂道行營副都統檢校太尉馬希聲為武安軍節度使加兼侍中時湖南馬殷奏久病不任軍政乞以男希聲為帥故有是命中書奏吏部流内銓諸色選人所試判兩節度欲委定其等第文優者超一資其次者次資又次者以同類道理全疎者于同類中少人户處注擬從之十一月庚申朔帝御文明殿册皇子秦王仗衛樂懸如儀甲子正衙命使册皇子宋王于鎭州是日幸龍門翼日馮道奏曰陛下宫中無事逰幸近郊則可矣若涉歴山險萬一馬足蹉跌則貽臣下之憂臣聞千金之子坐不垂堂百金之子立不倚衡况貴為天子豈可自輕哉帝斂容謝之退令小黄門至中書問道垂堂倚衡之義道因注解以聞帝深納之已已故太子少保致仕封舜卿贈太子少傅庚午應州節度使張敬達移雲州以捧聖都指揮使守恩州刺史沙彦詢為應州節度使以潁州團練使高行周為安北都䕶充振武節度使壬申黔南節度使楊漢章棄城奔忠州為董璋所攻也乙亥制西川節度使孟知祥削奪官爵以其同董璋叛也丙子以前同州節度使羅周敬為左監門上將軍丁丑故兵部侍郎許光義贈禮部尚書辛巳西面軍前奏今月十三日階州刺史王𢎞贄瀘州刺史馮暉自利州取山路出劍門闗外倒下殺敗董璋守闗兵士三千人收復劍州甲申日南至帝御文明殿受朝賀丙戌以給事中鄭韜光為左散騎常侍青州奏得登州狀契丹按巴堅男東丹王托雲越海來歸國契丹國志東丹王失職怨望率其部四十人越海歸唐十二月乙未荆南奏湖南節度使楚國王馬殷薨廢朝三日庚子以前襄州節度使安元信為宋州節度使辛丑幸苑中丁未以二王後祕書丞襲國公楊仁矩卒輟朝贈工部郎中庚戌湖南節度使馬希聲起復加兼中書令壬子以樞宻院直學士户部侍郎閻至為澤州刺史樞宻院直學士户部侍郎史圭為貝州刺史甲寅遣樞宻使安重誨赴西面軍前時帝以蜀路險阻進兵艱難潼闗已西物價甚賤百姓輓運至利州率一斛不得一㪷謂侍臣曰闗西勞擾未有成功誰能辦吾事者朕須自行安重誨曰此臣之責也臣請行帝許之言訖而辭翼日遂行甲寅故西川兵馬都監泗州防禦使李嚴贈太傅丙辰車駕畋于西山臘也丁已迴鶻遣使來朝貢戊午故荆南節度使檢校太尉兼尚書令南平王髙季興贈太尉舊五代史巻四十一
