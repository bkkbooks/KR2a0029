body:
  text: 舊五代史巻九十四宋門下侍郎參知政事監修國史薛居正等撰晉書第二十列傳九萇從簡陳州人也世以屠羊為業力敵數人善用槊初事後唐莊宗為小校每遇攻城召人為梯頭從簡多應募焉莊宗為其勇擢領帳前親衛兼歩軍都指揮使一日莊宗領大軍與梁軍對陣登高丘而坐敵人有執大幟揚其武者莊宗指之謂左右曰猛士也從簡曰臣為大王取之莊宗慮其不㨗不許從簡退乃潛領十數騎挺身而入奪幟以歸萬衆皷譟莊宗壯之錫賚甚厚又嘗中箭而鏃入于骨使醫工出之以刄鑿骨恐其痛也良久未能揺動從簡嗔目謂曰何不沈鑿洎出之左右無不惻然從簡顔色自若其勇壯皆此類也從簡所為多不法莊宗以其戰鬬多㨗常屈法赦之賜姓名曰紹瓊後加竭誠匡國功臣累官至金紫光祿大夫檢校太保景州刺史厯洺州團練使及梁平典蔡州同光四年授許州節度使㑹莊宗晏駕未及赴鎮而止明宗登極例復本姓厯麟汝汾金四州刺史北夢𤨏言云明宗尤惡貪貨面戒汝州刺史萇從簡為其貪暴應順初舉軍伐鳳翔從簡亦預其行㑹軍變乃東還道遇張廷藴為廷藴所執送于末帝末帝數之曰人皆歸我爾何背我而去也從簡曰事主不敢二心今日死生唯命末帝釋之清泰二年授潁州團練使高祖舉義末帝將議親征詔赴闕充副招討使隨駕至孟津除河陽節度使及趙延夀軍敗斷浮橋歸洛留從簡守河陽高祖自北而至從簡察軍情離散遂渡河迎謁高祖天福元年十二月授許州節度使改賜推忠佐運保國功臣二年秋移鎮徐州三年加開府儀同三司檢校太尉進封開國公食邑至一千五百户受代歸闕授左金吾衛上將軍從簡性忌刻而多疑厯州鎮凡十餘所在堅棘于公署纔通人行左右稍違足而忤即加鞭笞或至殺害其意不可測吏人皆側行其煩苛暴虐為武臣之最六年秋隨駕幸鄴都遇疾請告尋卒于鄉里年六十五贈太傅潘環字楚竒洛陽人也父景厚以環貴授左監門上將軍致仕環少以負販為業始事梁邢州節度使閻寳為帳中親校及莊宗定魏博移兵攻邢寳遣環間道馳奏于梁梁末帝用為左堅鋭夾馬都虞侯累遷左雄威指揮使時梁人與莊宗對壘于河上環毎預戰先登陥敵金瘡徧體玉堂間談云潘環常中流矢于靣骨銜其鏃故負重傷醫療至經年其鏃自出其瘡成漏終身不痊莊宗知其名及平梁命典禁軍同光中從明宗北禦契丹鄴軍之亂從明宗入洛天成初授𨽻州刺史㑹定州王都反朝廷攻之以環為行營右廂歩軍都指揮使賊平改易州刺史北面㳂邊都部署後移刺慶州受代歸闕明宗召對顧侍臣曰此人勇敢少能偕者尋除宿州團練使清泰中移耀州天福中預平范延光授齊州防禦使四年升金州為節鎮以環為節度使久之入為左神武統軍開運初契丹入冦王師北征以環為北面行營歩軍左廂排陣使預破契丹于陽城軍逥授澶州節度使累官至檢校太傅三年罷鎮歸闕俄受詔洛京巡檢其年冬戎王入汴署劉晞為西京留守環乞罷巡警閑居洛陽遇河陽軍亂晞出奔未幾蕃將高牟翰以兵援晞入于洛慮環有變乃害之盡取其家財通鑑云晞疑潘構其衆逐已使謨翰殺之漢高祖至京贈太尉環厯六部兩鎮所至以聚斂為務在宿州時有牙將因微過見怒環紿言笞之牙將因託一尼嘗熟于環者獻白金兩錠尼詣環白牙校餉𨫼脚兩枚求免其責環曰𨫼本幾脚尼曰三脚環復曰今兩脚能成𨫼乎尼則以三數致之當時號環為潘𨫼脚方太字伯宗青州千乘人也少𨽻本軍為小校嘗戍登州劫海客事洩刺史淳于晏匿之遇赦免事定州節度使楊光逺光逺領兵赴晉陽本州軍亂太與馬萬盧順密等擒之使太縛送至闕尋從杜重威破張從賔于汜水以功除趙州刺史從楊光逺平范延光于鄴移刺萊州遷安州防禦使從少幸澶州與契丹戰于于戚城中數創改鳳州防禦使行至中途遷河陽留後移邢州留後契丹入汴命遥領洋州節度使充洛京巡檢與前洺州團練使李瓊俱至鄭州其屯駐兵士廹請太在城巡檢以備外盜號為鄭王時有嵩山賊帥張遇領衆萬餘于僧衆得梁朝故嗣宻王朱乙遂推為天子取嵩山神冠冕之服以衣之張遇以其衆攻鄭州太與李瓊擊之賊衆敗走瓊中流失而死太乃括率郡中財物以賞軍士因誘之欲同西去其衆不從太乃潛奔于洛陽通鑑云戍兵既失太反譛太于契丹云脅我為亂太遣子師朗自訴于契丹契丹殺之及劉晞南走許州太殺晞牙校李暉入河南府行留守事既而嵩山賊帥張遇殺嗣宻王𫝊首于太懸于洛市又有伊闕賊帥自稱天子領衆萬餘將入洛城集郊壇之上太率兵數百人逆擊破之賊衆遂潰通鑑考異引實録方太傳云劉禧走許田復有潁陽妖巫姓朱號嗣宻王誓衆于洛南郊天壇號萬餘人太帥部曲與朝士輩虗張旗幟一舉而逐之洛師遂安河陽武行徳遣使召太詐言欲推之為帥尋為行徳所害何建其先迴鶻人也代居雲朔間祖慶父懐福俱事後唐武皇為小校建少以謹厚𨽻于髙祖帳下以掌廐為役及即位累典禁軍九國志云重建初事晉祖為奉徳馬軍都指揮使遥領驩睦二郡天福中自曹州刺史遷延州兵馬留後尋正授旄銊九國志云延州節度使丁審琪殘暴貧冒蕃部苦之重建以所部兵攻其城審琪遁去晉祖即以重建權節度兵馬留後下車諭以威福邊民安堵就加彰武軍節度使數年之間厯涇鄧貝澶孟五鎮節度使九國志云皆以亷儉簡易稱累官至檢校太傅開運三年移鎮秦州是冬契丹入汴戎王遣人齎詔以賜建建憤然謂將吏曰吾事石氏二主累擁戎旃人臣之榮亦已極矣今日不能率兵赴難豈可受制于契丹乎即遣使齎表與其地送欵于蜀孟㫤待之甚厚偽加同平章事依前秦州節度使九國志云時固鎮與鳯州未平重建悉經畧討平之歳餘移閬州保寧軍節度使九國志云昶大舉兵北伐遣張䖍劍出大散闗以重建為招討使由隴州路以進師無功而還加偽官至中書令後卒于蜀張廷藴字徳樞開封襄邑人也祖立贈驍衛將軍父及贈光祿大夫廷藴少勇㨗始𨽻宣武軍為伍長唐天福中奔太原武皇收于帳下為小校及莊宗救上黨戰栢鄉攻薊門下邢魏皆從之後戰于莘縣及胡栁陂繼為流矢所中金瘡之痕盈于面首莊宗寵之統御營黄甲軍常在左右累加檢校兵部尚書帳前歩軍都虞侯充諸軍濠寨使同光初從明宗收汶陽加檢校尚書右僕射充魏博三城巡檢使時皇后劉氏在鄴每縱其下擾人廷藴多斬之聞者壯焉梁平承詔入覲改帳前都指揮使兼左右羽林都虞侯㑹潞州李繼儔故將楊立嬰城叛詔遣明宗為招討使元行欽為都部署廷藴為前鋒軍至上黨日己暝矣憇軍方定廷蘊首率勁兵百餘輩踰洫坎城而上守陴者不能禦尋斬闗延諸軍入焉明宗行欽逹明而始至其城已下明宗甚慊之軍還改左右羽林都指揮使加檢校司空行申州刺史同光末從皇子魏王繼岌伐蜀授行營中軍都指揮使蜀平明宗嗣位遷懷州刺史賜竭忠建策興復功臣加檢校司徒旋移金州防禦使加檢校太保繼授潁州團練使㳂淮招安使應順中轉隴州防禦使清泰中進封清河郡公高祖即位入為右龍武統軍遷綘州防禦使少帝嗣位領左軍衛上將軍加特進開運三年冬以老病求歸于宋城明年卒于家時年六十九廷蘊所識不過數字而性重文士下汶陽日首獲鄆帥戴思逺判官趙鳳訊之曰爾狀貎必儒人也勿隱其情鳳具言之尋引薦于明宗明宗令送赴行臺尋除鳯翰林學士及鳳入相頗與廷藴相洽數言于近臣安重誨重誨亦以廷藴苦戰出于諸將之右力保薦之明宗以廷藴取潞之日不能讓功于己故恒蓄宿忿至使廷藴位竟不至方鎮亦命矣夫廷緼厯七郡家無餘積年老耋期終于牖下良可嘉也長子光被厯通事舍人郭延魯字徳興沁州綿上人也父饒後唐武皇時以軍功嘗為本郡守凡九年有遺愛焉延魯少有勇善用槊莊宗以舊將之子擢為保衛軍使頻戍塞下捍契丹有功及即位賜協謀定亂功臣加檢校兵部尚書右神武都指揮都知兵馬使天成中汴州朱守殷叛延魯從車駕東幸至其地坎壘先登守殷平以功授汴州歩軍都指揮使加檢校尚書左僕射長興中累加檢校司徒厯天雄軍北京馬歩軍都校遥領梧州刺史清泰中遷復州刺史正俸之外未嘗斂貸庻事就理一郡賴焉秩滿百姓上章舉留朝廷嘉之高祖即位遷單州刺史加檢校太保賜輸誠奉義忠烈功臣到任踰月以疾卒于理所時年四十七詔贈太𫝊郭金海本突厥之族少侍昭義節度使李嗣昭常征從伐金海好酒所為不法自潞州過山東入邢洺界為刼盗嗣昭雖知之然惜其拳勇毎優容之天祐中累職至昭義親騎指揮使同光二年遷本道馬軍都指揮使天成初入為捧聖指揮使長興三年改䕶聖都虞侯天福二年從王師討范延光于魏州以功轉本軍都指揮使領黄州刺史高祖幸鄴宣金海領部兵檢校東京其年十一月安從進謀犯闕金海為襄州道行營先鋒都指揮使與李建崇等同于唐州湖陽遇從進軍萬餘人金海以一旅之衆突擊大敗之策勲授檢校太保商州刺史俄移慶州秩滿歸闕途中遇疾而卒年六十一洛陽縉紳舊聞記從進于金海相遇于花山金海蕃將善用槍時罕與敵拳勇過人喜戰鬬欲立竒功兩陣相去數里從進素管騎兵金海久在麾下從進亦待之素厚乃躍馬引數百騎乗高去金海陣數百歩厲聲呼郭金海金海獨鞭馬出于陣數十歩免胄側身高聲自稱曰金海從進又前行數十歩勞之曰金海安否我素待你厚畧不知恩今日敢來共我相殺金海應聲答曰官家好㸔大王負大王甚事大王今日反金海舊事大王乞與大王一箭地大王回去若不去喫取金海槍言訖援槍鞭馬疾趨其陣從進懼躍馬而進師遂相接大為金海焦繼勲押陣奏到晉祖大喜賞賜有差從進自此喪氣嬰城自固王師為連城重塹以守之月餘王師攻城城上矢下如雨王師被傷者衆是日金海為飛矢集身扶傷歸營明日從進用計汙金海欲使朝廷疑之以金瓶貯酒金合盛藥以索懸之城上呼郭金海金海知之力疾扶創而徃城上勞金海曰大王知你中箭創甚賜爾金瓶金合酒與風藥金海目不知書惟利是貪取瓶與合歸營且不聞于元戎元戎等疑之乃馳驛奏晉祖以花山之功不加罪城下就除金州團練併其兵于他部金海之任居常悒悒不樂至于捐館劉處讓字徳謙滄州人也祖信累贈太子少保父瑜累贈太子少師梁貞明初張萬進帥兖州處讓事之為親校萬進據城叛梁遣大將劉鄩討之時唐莊宗屯軍于麻口渡萬進宻遣處讓乞師于莊宗莊宗未即應之乃于軍門截耳曰主帥急難使我告援茍不得請死亦何避莊宗義之將舉兵渡河俄聞城陥乃止因以墨制授處讓行臺左驍衛將軍俄改客省副使梁平加檢校兵部尚書累將命稱旨天成初轉檢校尚書右僕射依前充職歳餘遷引進使長興三年轉檢校司空左威衛大將軍其職如故四年西川孟知祥䟦扈不通朝貢朝廷方議懷柔乃遣處讓為官告國信使復命轉檢校司徒應順初授忻州刺史檢校太保充西北靣都計度使備北㓂也清泰二年入為左驍衛大將軍三年夏魏博屯將張令昭逐其帥以城叛朝廷命范延光領兵討之以處讓為河北都轉運使及高舉義于太原處讓讓從至洛陽乃授宣徽北院使天福二年轉左監門衛上將軍充宣徽南院使范延光之據鄴也高祖命宣武軍節度使楊光逺領兵討之時處讓奉詔與光逺同叅議軍政㑹張從賔作亂于河陽處讓自黎陽分兵討襲從賔平復與楊光逺同攻鄴城四年冬范延光將謀納欵尚或遲留處讓首入其城以禍福諭之延光乃降以功加檢校太𫝊先是桑維翰李崧兼充樞宻使處讓以莊宗已來樞宻使罕有宰臣兼者因盟心以覬其位及楊光逺討伐鄴城軍機大事高祖每命處讓宣逹時光逺恃軍權多有越體論奏高祖依違而已光逺慊之頻與處讓宴語及之處讓訴曰非聖旨也皆出維翰等意及楊光逺入朝遂于高祖前靣言執政之失高祖知其故不得已乃罷維翰等以處讓為樞宻使時處讓每有敷奏高祖多不稱㫖㑹處讓丁繼母憂高祖因議罷樞宻使其本院庶事竝委宰臣分判處讓居喪期年起復授彰徳軍節度使澶衛等州觀察處置等事處讓勤于公務孜孜求理驛吏民不至苛察人甚便之高祖幸鄴都處讓竭家財貢奉至于薪炭膏沭之細悉供億焉六年除右金吾衛上將軍處讓自以嘗經重任又厯方鎮謂其入朝必當要職一旦除授金吾有所不足少帝即位之初處讓與宰臣言有恊翼之論覃恩之際又未擢用一日至中書宰臣馮道趙滎李崧和凝在列處讓因酒酣厯詆諸相道笑而不答月餘稱病八年從駕歸汴寄居于封禪寺遇疾而卒年六十三贈太尉再贈太師子保勲仕皇朝位至省郎李瓊字隱光滄州饒安人也少籍本軍為騎士莊宗平河朔𨽻明宗麾下漸升為小校同光二年明宗受詔以本部兵送糧入薊門時高祖從行至涿州與敵相遇高祖陥于圍中瓊顧諸軍已退宻牽高祖鐵衣指東而遁至劉李河為敵所襲瓊浮水先至南岸高祖至河中馬倒順流而下瓊以所執長茅授高祖出之又以所跨馬奉高祖瓊徒歩䕶之奔十餘里乃入涿州高祖薦于明宗明宗賞之尋起授軍職同光末明宗封趙在禮于鄴鄴軍既變明宗退至魏縣遣高祖以騎士三百疾趨汴州時莊宗遣騎將西方鄴守其城髙祖憂之使瓊以勁兵突封丘門而入高祖踵之鄴尋歸命浚郊遂定及髙祖領陜州奏補雲騎指揮使俄改侍衛牙隊指揮使長興中從高祖討東川至劔州使瓊以部下兵破賊軍數千身中重創軍還改龍武指揮使清泰中屯雲州累擒獲契丹人馬以功改右捧聖軍指揮使唐末帝以瓊元事髙祖乃自寨下移授單州馬歩軍副指揮使髙祖即位補䕶聖都指揮使又念疇昔輟馬導䕶之力前後所賜金帛甚厚但未升爵位瓊以欝欝然久之領横州刺史五年出典申州微有政聲少帝嗣位入為殿前散員都指揮使遥領雷州俄遷棣州刺史遇楊光逺以青州叛自統本部兵攻其城且以書誘瓊瓊因拒之以書上進朝廷嘉之開運二年改洺州團練使累官至加檢校司空三年授䕶聖右廂都指揮使領岳州團練使時洺州吏民列狀保留朝廷不允及杜重威降敵改授瓊威州刺史行及鄭州遇羣盜攻郡與方太禦賊中流矢而卒年六十五高漢筠字時英齊州厯山人也曽祖詣嘗為是邑令故家焉漢筠少好書𫝊嘗詣長白山講肄㑹唐末齊魯交兵梁氏方覇乃擲筆謁焉尋納于軍門未幾出為衛州牙校唐天祐中莊宗入衛分兵諭其屬郡時漢筠以利病説衛之牧守俾送欵于莊宗以漢筠為功尋移洛州都校其後改常山為北京以漢筠為皇城使加檢校兵部尚書左驍衛將軍同正明宗即位除成徳軍節度副使俄以荆門用軍促詔漢筠移倅襄州權知軍州事長興中厯曹亳二州刺史秩滿加檢校司徒行左金吾衛大將軍清泰末高祖建義于河東唐末帝遣晉昌節度使張敬達率師圍太原委漢筠巡撫其郡及敬達遇害節度副使田承肇率部兵攻漢筠于府署漢筠乃啟闗延承肇謂曰僕與子俱承朝寄而相迫何甚承肇曰我欲扶公為節度使漢筠曰老夫耄矣不敢首為亂階死生繫子籌之承肇目左右令前諸軍投刄于地曰高金吾累朝宿徳不可枉殺承肇以衆意難拒遂謝云與公戲耳漢筠促騎以還高祖入洛飛詔徴之遇諸途乃入覲尋遷左驍衛大將軍内客省使天福三年正月遘疾終東京之私第時年六十六漢筠性寛厚儀容偉如也雖厯戎職未嘗有非法之言出于口吻多慕士大夫所為復以清白自負在襄陽有孽吏常課外獻白金二十鎰漢筠曰非多納麳麰則刻削闤闠吾有正俸此何用焉因戒其主者不復然其白金皆以狀上進有詔嘉之及莅濟隂部民安之四邑飯僧凡有萬八千人在亳州三年歳以已俸百千代納逋租斯亦近代之良二千石也長子貞文仕皇朝為開封少尹卒孫彦韓字徳光汴州浚儀人也少以勇力應募從軍梁祖之兼領四鎮擢彦韜于行間厯諸軍偏校及唐莊宗與梁軍對壘于河上彦韜知梁運將季乃間行渡河北歸莊宗莊宗嘉而納之授親從右廂指揮使及莊宗平梁出為晉州長歩都校加檢校兵部尚書天成初遷綿州刺史檢校尚書左僕射至郡踰年以考課見稱就加檢校司空長興清泰中厯宻沂濮三州刺史累官至檢校太保賜謁忠建䇿興復功臣高祖即位復授宻州刺史尋卒于任年六十四彦韜出于軍旅植性和厚理綿州日甚著綏懷之譽故有賞典旌焉在濮陽屬清泰末羣㓂入郡郡人大擾彦韜率帳下百人一呼破之人皆感之但不能守亷養正以終令譽長興中罷宻州赴闕苞苴甚厚起甲第于洛陽踰月而成華堂廣廡亞王公之家見者嗤之故淹翔五郡位不及亷察抑有由也王𫝊拯呉江人也父綰偽䖍州節度使傅拯初事楊溥為黒雲右廂都指揮使領本軍戍海州唐長興元年傅拯殺海州刺史陳宣焚州城以所部兵五千人來歸明宗喜而納之救金紫光祿大夫檢校司徒曹州刺史尋移濮州清太中遷貝州防禦使秩滿有代㑹范延光叛以兵要傅拯入魏城疑而不用延光降高祖授傅拯諸衛將軍出為寧州刺史境接蕃部以前弊政滋章民甚苦之傅拯自下車除去弊政數十件百姓便之不數月移刺虢州離寧州日衙門聚數千人拆橋遮道以留之及赴虢治理清靜蒸民愛戴如寧州焉開運中厯武州刺史受代歸洛遇疾卒傅拯家本多財尤好賔客及厯數郡不事生産將即世甚貧匱物論惜之袐瓊鎮州平山人也父遇以善射厯本軍偏校累官至慶州刺史瓊亦有勇清泰中董溫琪為鎮州節度使擢瓊為衙内指揮倚以腹心及温琪䧟蕃瓊乃害温琪之家戴其屍都以一坎瘞之温琪在任貪暴積鏹巨萬瓊悉輦之以藏其家遂自稱留後高祖即位遣安重榮代之授瓊齊州防禦使時重榮與蕃帥趙思温同行部曲甚重瓊不敢拒命尋槖其竒貨由鄴中以赴任先是鄴帥范延光將謀叛遣牙將范鄴持書搆瓊瓊領書不答使者還具逹其事延光深忿之及聞瓊過其境宻使精騎殺瓊于夏津以滅其口一行金寳侍伎皆為延光所有由是延光異志益露焉李彦珣邢州人也少為郡之牙吏唐天祐中明宗鎮其地彦㫬素無檢節因洽于左右明宗即位以為通事舍人嘗遣使東川行至其境其僕從為董璋所收彦珣竄還以失敬故也朝廷攻璋詔授行營歩軍都監彦珣素不孝于父母在鄉絶其供饋同列惡其鄙惡旋出為外任清泰中遷河陽行軍司馬遇張從賔為亂因朋助之從賔敗奔于魏州范延光既叛署為歩軍都監委以守陴招討使楊光逺以彦珣見用欲撓延光而誘彦珣乃遣人就邢臺訪得其母令于城下以招之彦珣識其母發矢以斃之見者傷之及隨延光出降授坊州刺史近臣以彦珣之惡逆奏於高祖高祖曰赦命已行不可改也遂令赴郡後不知其所終焉歐陽史云彦珣後以坐贜珠史臣曰昔從簡從莊宗戰于河上可謂勇矣及其為末帝守于孟津豈得為忠乎忠既無聞勇何足貴潘環方太雖咸負雄幹而俱殁亂世盖方畧不足以衞其身故也何建舉秦隴之封附巴邛之俗守方之寄其若是乎其餘皆儋珪析爵之流也亦可以垂名于是矣秘瓊既覆董氏之族旋為鄴帥所屠何報應之速也唯彦珣忍射其親殆非人類晋祖宥之不戮蓋失刑之甚也舊五代史巻九十四
