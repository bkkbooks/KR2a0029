body:
  text: 舊五代史巻一百三十一宋門下侍郎參知政事監修國史薛居正等撰周書第二十二列傳十二劉曍字克明晉丞相譙國公昫之弟也昫晉書有傳曍少離鄉里唐天祐中梁将劉鄩襲太原軍至樂平時曍客于縣舍為鄩軍所俘謝彦章見之知其儒者待之以禮謂其鄉人劉去非曰為君得一宗人即令曍見之去非詢其爵里乃親族也對泣久之自是隨去非客于彦章門下彦章得罪去非為郢州刺史曍隨之郡莊宗平河洛去非以嘗從劉守奇歸梁深懼獲罪乃棄郡投髙興于荆南曍累為荆州攝官既而兄昫明宗朝為學士遣人召歸梁漢顒鎮鄧州辟為從事入為監察御史歴水部員外郎史館修撰長興末宰臣趙鳳鎮邢臺表為節度判官清泰初入為起居郎改為部員外郎兼侍御史知雜事移河南少尹兵部郎中轉大府卿漢祖受命用為宗正卿周初改衛尉卿廣順元年冬十月税居于東京夜夢鬼詫之曰公于我塜上安床深不奉益曍問鬼姓氏曰李丕文曍曰君言殊誤都城内豈可塜耶曰塜本在野張十八郎展城時圍入忽寤又半月復夢前鬼曰公不相信屈觀吾舍可乎即以手掊地豁然見華第花木叢萃房廊雕煥立曍于西廡久之見一團火如電前來漸近即前鬼也引曍深入岀其拏泣拜如有所託曍問丕文鬼事曰冥司各有部屬外不知也曍曰余官何至再三不對苦訊之曰齊王判官曍曰張令公為齊王去世久矣今鄆州髙令公為齊王余方為列卿豈復為賓佐乎鬼曰不知也曍既寤欲掘而視之既而又告同僚曰鬼雖見訴其如吾税舍何乃止廣順二年春朝廷以曍為髙麗冊使三月至鄆節度使髙行周以曍嗜酒留連累日旦夕沈醉其月二十三日晨興櫛髮状如醉寐男泳視之已卒矣太平廣記云銜命使吳越路由鄆州卒于郵亭時年六十一其年八月鄆帥齊王髙行周亦夢鬼請齊王判官得無是乎曍從儒學好聚書嗜酒無儀檢然衷抱無他急于行義士友以此多之張沆字太𤣥徐州人父嚴本州牙将沆少力學攻詞賦登進士第唐明宗子秦王好文然童年疎率動不由禮每賓僚大集手自出題令面前賦詩少不如意則壊裂抵棄沆初以刺謁秦生屬合座客各為南湖㕔記因謂沆曰聞生名久矣請為此文沆不獲已從之及羣士記成獨取沆所為勒之于石由是署為河南府巡官秦王敗勒歸鄉里晉初桑維翰秉政沆以文干進用為著作佐郎集賢校理遷右拾遺維翰出鎮奏為記室從維翰入朝授殿中侍御史歳餘自侍御史改祠部員外郎知制誥召入翰林為學士維翰罷相馮玉用事不欲沆居禁密改右諫議大夫罷其職漢祖至汴轉右常侍復用為學士未幾遷工部尚書充職明年以營奉葬事求解職改禮部尚書及歸朝復為學士太祖以沆耳疾罷職改刑部尚書廣順二年秋命為故齊王髙行周冊贈使復命而卒贈太子少保沆性儒雅好釋氏雖久居禄位家無餘財死之日圗書之外唯使鄆之貲耳嗣子尚幼親友慮其耗散上言于太祖乃令三司差人主塟餘貲市邸舍以贍其孤焉沆記覽文史好徵求僻事公家應用時出一聨以炫奇筆故不為馮玉所重雖有瞶疾猶出入金門凡五六年漢隠帝末年楊史遇害翌日沆方知之聴猶未審忽問同僚曰竊聞盜殺史公其盜獲否是時京師恟懼之次聞者笑之有士人申光遜者與沆友善沆未病時夢沆手出小佛塔示光遜視其上有詩十四字云今生不見故人面明月髙髙上翠樓光遜既寤心惡之俄聞沆卒張可復字伯恭徳州平原人也父達累贈户部侍郎可復略通儒術少習吏事梁末薄遊于魏鄴王羅紹威表為安陽簿唐天成初依晉公霍彦威于青州為從事晉公以其滑稽好避事目為姦兎兒長興中入朝拜監察御史六遷至兵部郎中賜金紫晉天福中自西京留守判官入為秘書少監改左司郎中開運中遷左諫議大夫漢乾祐初湘隂公鎮徐方朝行中選可以從戎者因授武寧軍節度副使檢校禮部尚書及世宗鎮澶淵改鎮寧軍節度行軍司馬三年徵拜給事中世宗嗣位以澶淵幕府之舊拜右散騎常侍顯徳元年秋以疾卒年七十三制贈户部尚書可復無他才唯以謹愿保長年加之迂懦多為同列清俊者所侮而累階至金紫居三品之秩亦其命耶于徳辰字進明元城人也幼敏悟篤志好學及射策文塲數上不調後唐明宗鎮邢州徳辰徃謁焉明宗見而器之因得假官于屬邑後繼歴州縣歴仕晉漢周官至贈工部尚書王延字世美鄭州長豐人也少為儒善詞賦會鄉曲離亂不獲從鄉薦因客于浮陽隨滄帥戴思逺入梁嘗以所為賦謁梁相李琪琪覽之欣然曰此道近難其人王生升我堂矣由是人士稱之尋薦為即墨縣令歴徐宋鄆青四鎮從事長興初鄉人馮道趙鳳在相位擢拜左補闕踰年以水部員外知制誥再遷中書舍人賜金紫清泰末以本官權知貢舉時有舉子崔頎者故相協之子也協素與吏部尚書盧文紀不睦及延将入貢院文紀謂延曰舍人以謹重聞于時所以去冬老夫在相位時與諸相首以長者聞奏用掌文衡然貢闈取士頗多面目説者云越人善泅生子方晬乳母浮之水上或駭然止之乳母曰其父善泅子必無溺今若以名下取士即此類也舍人當求實才以副公望延退而謂人曰盧公之言葢為崔頎也縱與其父不悦致意何至此耶來春以頎登甲科其年改御史中丞歳滿轉尚書右丞奉使兩浙吳人深重之復命授吏部侍郎改尚書左丞拜太常卿歴工禮刑三尚書周初以疾求分司西洛授太子少保既而連月請告為留臺所糾改少傅致仕廣順二年冬卒時年七十三子億仕皇朝為殿中丞申文炳字國華洛陽人也父鄂唐左千牛衛将軍文炳長興中進士擢第釋褐中正軍節軍推官歴孟懐支使鄆城陜縣二邑宰自澶州觀察判官入為右補闕晉開運初授虞部員外知制誥轉金部郎中充職廣順中召為學士遷中書舍人知貢舉玉壺清話李慶顯徳中舉進士工詩有云醉輕浮世事老重故鄉人樞密王朴以此一聨薦于申文炳文炳知貢舉遂為第三人顯徳五年秋以疾解職授左散騎常侍六年秋卒于家時年五十文炳為文典雅有訓誥之風執性紓緩待搢紳以禮中年而卒皆惜之扈載少好學善屬文賦頌碑贊尤其所長廣順初隨計于禮部文價為一時之最是歳升髙等載因遊相國寺見庭竹可愛作碧鮮賦題其壁世宗聞之遣小黄門就壁録之覽而稱善因拜水部員外郎知制誥遷翰林學士賜緋宋史李穀傳扈載以文章馳名樞密使王朴薦令知制誥除書未下朴詣中書言之穀曰斯人命薄慮不克享耳朴曰公在衡石之地當以材進人何得言命而遺才載遂知制誥遷翰林學士未幾卒世謂朴能薦士穀能知人載已病不能謝居百餘日乃力疾入直學士院世宗憐之賜誥還第遣太醫視疾載為翰林學士年三十六卒載始自解褐至於終纔四年而與劉衮皆有才無命時論惜之劉袞彭城人神爽氣俊富有文藻由進士第任左拾遺與扈載齊名年二十八而卒案扈載傳原本殘闕賈緯真定獲鹿人也宋祁景文集賈令君墓誌銘賈氏自唐司空魏國公耽世貫滄州南皮子孫稍稍徙真定五世祖諒髙祖瑾曽祖處士諱初有至性疾世方亂守鄉里不肯事四方祖諱緯少苦學為文唐末舉進士不第遇亂歸河朔本府累署參軍邑宰唐天成中范延光鎮定州表授趙州軍事判官遷石邑縣令緯屬文之外勤于撰述以唐代諸帝實録自武宗已下闕而不紀乃採掇近代傳聞之事及諸家小説第其年月編為唐年補録凡六十五巻識者賞之景文集緯博學善詞章論議明鋭一時諸儒皆屈唐自武宗後史録亡散君掇拾殘餘為唐季補録數十萬言敘成敗事甚悉書顯于時晉天福中入為監察御史改太常博士緯常以史才自負鋭于編述不樂曲臺之任乃陳情于相座又與監修國史趙瑩詩曰滿朝唯我相秉柄無親讎三年司大董最切是編修史才不易得勤勤處處求愚從年始立東觀思優游昔時人未許今來虚白頭春臺與秋閣徃徃興歸愁信運北闕下不繫如虚舟綿蕝非所好一日疑三秋何當適所願便如昇瀛洲未幾轉屯田員外郎改起居郎史館修撰又謂瑩曰唐史一百三十巻止于代宗已下十餘朝未有正史請與同職修之瑩以其言上奏晉祖然之謂李崧曰賈緯欲修唐史如何對曰臣每見史官輩言唐朝近百年來無實録既無根本安能編紀緯聞崧言頗怒面責崧沮已崧曰與公鄉人理須相惜此事非細安敢輕言緯與宰臣論説不已明年春敕修唐史緯在籍中月餘丁内艱歸真定開運初服闋復起居郎修撰如故尋以本官知制誥緯長于記注應用文筆未能過人而議論剛强儕類不平之因目之為賈鐡嘴開運中累遷中書舍人契丹入京師隨契丹至真定後與公卿還朝授左諫議大夫緯以久次綸閣比望丞郎之拜及遷諫署􅔵望彌甚蘇逢吉監修國史以緯頻投文字甚知之尋充史館修撰判館事乾祐中受詔與王伸竇儼修漢髙祖實録緯以筆削為已任然而褒貶之際憎愛任情晉相桑維翰執政之日緯之為人不甚見禮緯深銜之及敘維翰傳身没之後有白金八千鋌他物稱是翰林學士徐台符緯邑人也與緯相善謂緯曰竊聞吾友書桑魏公白金之數不亦多乎但以十目所覩不可厚誣緯不得已改為白金數千鋌緯以撰述之勞每詣宰執懇祈遷轉遇内難不果太祖即位改給事中判館如故先是竇貞固奏請修晉朝實録既竟亦望陞擢貞固猶在相位乃上疏抗論除拜不平既而以所撰日厯示監修王峻皆媒孽貞固及蘇禹珪之短歴詆朝士之先達者峻惡之謂同列曰賈給事家有士子亦要門閥無玷今滿朝並遭非毁教士子何以進身乃于太祖前言之出為平盧軍行軍司馬時符彦卿鎮青州以緯文士厚禮之緯妻以緯左遷駭惋傷離病留于京緯書候之曰勉醫藥來春與子同歸䕶鹿廣順二年春緯卒及訃至妻一慟而終果雙柩北歸聞者歎之緯有集三十巻目曰草堂集並所撰唐年補録六十五巻皆傳于世趙延文字子英秦州人曽祖省躬以明術數為通州司馬遇亂避地于蜀祖師古黔中經畧判官父温珪仕蜀為司天監温珪長于袁許之術兼之推步王建時深䝉寵待延問得失事微差跌即被詰譲臨終謂其子曰技術雖是世業吾仕蜀已來幾由技術而死爾輩能以他途致身亦良圗也延乂少以家法仕蜀由廕為奉禮部翰林待詔蜀亡入洛時年三十天成中得蜀舊職延乂世為星官兼通三式尤長于袁許之鑒清泰中嘗與樞宻直學士吕琦内宿于内廷琦因從容密問國家運祚延乂曰來年厄㑹之期俟過别論琦訊之不已延乂曰保邦在刑政保祚在福徳者下官實有恤緯之僭其年會諸公罕有卓絶福徳者下官實有恤緯之僭其年兼衛尉少卿晉天福中代馬重績為司天監契丹入京師隨至鎮州時契丹将滿達為帥㑹漢髙祖定兩京控鶴都将李筠與諸校密謀劫庫兵逐契丹猶豫未决謀于延乂因假以術數贊成之契丹既去還京師官秩如舊廣順初加檢校司徒本官如故太祖數召對焉歐陽史周太祖自魏以兵入京師召延乂問漢祚短促者天數耶延乂言王者撫天下當以仁恩徳澤而漢淫酷刑法枉濫天下稱寃此其所以亡也是時太祖方以兵圍蘇逢吉劉銖第欲誅其族聞延乂言悚然因貸其族二家獲全延乂善交遊達機變兼有技術見者歡心二年授太府卿判司天監事其年夏初火犯靈臺延乂自言星官所忌又言身命官災併未幾其子卒尋又妻卒俄而延乂嬰疾故人省之舉手曰多謝諸親死灾不可逭也尋卒年五十八贈光禄卿沈遘字期逺睢陽人也父振貝州永濟令累贈左諫議大夫遘幼孤以苦學為志弱冠登進士第釋褐除校書郎由御史臺主簿拜監察御史凡五遷至金部郎中充三司判官廣順中以本官知制誥世宗嗣位擢為翰林院學士歳滿拜中書舍人充職顯徳三年夏以扈從南征因而遇疾歸及京而卒遘為人謙和勤于椄下每文士投䞇必擇其賢者而譽之故當時後進之士多歸焉李知損字化機大梁人也少輕薄利口無行梁朝時以牒刺篇詠出入于内臣之門繇是浪得虚譽時人目之為李羅隠後累為藩鎮從事入朝拜左補闕歴刑兵二員外度支判官右司郎中坐受搉鹽使王景遇厚賂謫于均州漢初歸朝除右司郎中兼侍御史知雜事廣順中拜右諫議大夫時王峻為樞密使知損以與峻有舊遂詣峻求使于江浙峻為上言太祖素聞知損所為甚難之峻曰此人如或辱命譴之可也太祖重違其請遂可之知損既受命大怒其荒誕之意遂假貲于人廣備行李及即路所經州郡無不强貸又移書于青州符彦卿借錢百萬及在郵亭行止穢雜王峻聞而復奏之乃責授棣州司馬世宗即位切于求人素聞知損狂狷好上封事謂有可采且欲聞外事即命徵還遽與復資數月之間日貢章疏多斥讟貴近自謀進取又上章求為過海使世宗因發怒仍以其醜行日彰故命除名配沙門島知損将行謂所親曰余嘗遇善相者言我三遂之後當居相位余自此而三矣子姑待我後歳餘卒于海中其庸誕也如此五代史補李知損官至諫議大夫好輕薄時人謂之李羅隠至于親友間徃還簡牘徃徃引里巷常談謂之偶對常有朝士奉使回以土物為贈其意猶望郤回知損覺之且貽書謝之曰在小子一時間郤擬送去恐大官兩羅裏更不将來乾祐中奉使鄭州時宋彦筠為節度彦筠小字忙兒因宴㑹彦筠酒酣輒問曰衆人何為號足下為羅隠對曰下官平素好為詩其格致大抵如羅隠耳故人為號彦筠曰不然葢為足下輕薄如羅隠知損大怒厲聲曰只如令公人皆謂之宋忙兒未必便能放牛滿座皆笑孫晟本名鳳南唐書云孫忌髙密人一名鳳又名晟少舉進士性隂賊好姦謀少為道士工詩于廬山簡寂觀畫唐詩人賈島像懸于屋壁以禮事之觀主以為妖妄執杖驅出之大為時輩所嗤改儒服謁唐莊宗于鎮州授祕書省著作佐郎南唐書云豆盧革為相雅知忌辟為判官天成初朱守殷據夷門叛時晟為幕賓贊成其事是時晟常擐甲露刃以十數騎自隨巡行于市多所屠害汴人為之切齒城陷朱氏被誅晟乃匿跡更名棄其妻子亡命于陳宋間歐陽史云安重誨惡晟以為教守殷反者晟也畫其像購之不可得遂族其家晟奔于吳㑹同惡者送之過淮吳人方納叛亡即以偽官授之晟亦微有詞翰李昪偽尊楊浦為譲皇之冊文即晟之詞也故江南尤重之二十年間累歴偽任財貨邸第頗適其意晟以家妓甚衆每食不設食㡬令衆妓各執一食器周待于其側謂之肉臺盤其自養稱愜也如是南唐書忌為舒州節度使治軍嚴有歸化卒二人正晝挺白刃入府求忌殺之入自西門吏士倉卒莫能禦適忌間行在東門聞亂得民家馬乗之奔桐城叛卒不得忌乃殺都押衙李建崇而逸忌坐貶光禄卿顯徳三年春王師下廣陵江左驚窘李景偽署晟為司空令奉貢于行在世宗遣右常侍劉悦伴之賜與甚厚洎隨駕到闕舍于都亭驛禮遇殊優每召見飲之醇醴問以江南事晟但言吳畏陛下之神武唯以北面為求保無二也先是張永徳守下蔡素與李重進不協每宴将校多暴其短一日永徳乗醉乃大言重進潜蓄姦謀當時将校無不驚駭繇是人情大擾後密遣親信乗驛上言世宗不聴亦不介意一日重進自壽陽去其部從直指永徳帳下宴飲終日而去自此人情稍安時李景覘而知之因密令人齎蠟書遺重進勸為不軌重進以其蠟書進呈世宗覽之皆斤讟反間之言世宗怒晟前言失實因急召侍衛都虞候韓通令收晟下獄與其從者百餘人皆誅之南唐書云世祖命都承㫖曹翰䕶至右軍巡院猶飲之酒數酌翰起日相公得罪賜自盡晟怡然整衣索笏東南望再拜曰臣受恩深謹以死謝從者二百人亦皆誅死于東相國寺翌日宰臣上謁世宗親諭之始知其事實議者以晟昔構禍于梁民今伏法于梁獄報應之道豈徒然哉晟性慷慨常感李景之厚遇誓死以報之釣磯立談云晟将命周朝自知不免私謂副使王崇質曰吾思之熟矣終不忍負永陵一坏土餘非所知也及将下獄世宗令近臣問以江南可取之状晟黙然不對臨刑之際整其衣冠南望金陵再拜而言曰臣惟以死謝遂伏誅舊五代史巻一百三十一
