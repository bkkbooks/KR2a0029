body:
  text: 舊五代史卷八十四宋門下侍郎參知政事堅修國史薛居正等撰晉書第十少帝紀四開運二年夏五月丙申朔帝御崇元殿受朝大赦天下丁酉以右衛上將軍馬萬為左金吾上將軍致仕戊戌陜州節度使宋彦筠移鎮鄭州澶州節度使何建移鎮河陽以左神武統軍潘瓌為澶州節度使以宣徽北院使李彦韜遥領夀州節度使兼侍衛馬軍都指揮使以滄州節度使田武遥領䕫州節度使兼侍衛步軍都指揮使辛亥白虹貫日壬子宰臣桑維翰劉昫李崧和凝竝加階爵禮部尚書竇貞固改刑部尚書太常寺卿王松改工部尚書以尚書左丞龍敏為太常卿以翰林學士承㫖兵部侍郎李慎儀為尚書左丞以御史中丞張允為兵部侍郎知制誥充翰林學士承㫖以左諌議大夫顔衎為御史中丞宋史顔衎傳喪亂之後朝綱不振衎執憲頗有風采嘗上言纔除御史者旋授外藩賔佐復有以私故細事求假外拜州郡無㕘謁之儀出入失風憲之體漸恐四方得以輕易百辟無所準繩請自今藩鎮幕僚勿得任䑓官雖親王宰相出鎮亦不得奏充賔佐非奉制勘事勿得出京自餘不令釐雜務詔惟辟召人幕餘從其請以兵部侍郎𢎞文館學士判館事田敏為國子祭酒以戸部侍郎段希堯為兵部侍郎以工部侍郎邊蔚為戸部侍郎依前權知開封府事以左散騎常侍李式為工部侍郎以給事中王仁裕為左散騎常侍甲寅以華州節度使趙瑩為開封尹以皇弟開封尹重睿為秦州節度使以宣徽南院使劉繼勲為華州節度使以前鄆州節度使張從恩為晉州節度使丙辰杜威來朝定州奏大風雹北岳廟殿宇樹木悉摧拔之六月乙丑朔帝御崇元殿百官入閣監修國史劉昫史官張昭逺等以新修唐書紀志列傳并目録凡二百三巻上之賜器帛有差癸酉以恒州節度使杜威為天雄軍節度使充鄴都留守以鄴都留守馬全節為恒州節度使以翰林學士金部郎中知制誥徐台符為中書舍人以翰林學士禮部郎中知制誥李瀚為中書舍人翰林學士都官郎中劉温叟加知制誥翰林學士主客員外郎范質改比部郎中知制誥竝依舊充職祠部員外郎知制誥張沆本官充學士以太常少卿陶榖為中書舍人宋史陶榖傳榖性急率嘗與兖帥安審信集㑹杯酒相失為審信所奏時方姑息武臣榖坐責授太常少卿嘗上言頃涖西臺每見臺司詳斷刑獄少有即時決者至于閭閻夫婦小有争訟淹滯即時坊市死亡喪塟必俟臺司判狀奴婢病亡亦須檢驗吏因縁為姦而邀求不已經旬不獲埋瘞望申條約以革其弊從之俄拜中書舍人已亥以邠州節度使劉景巖為陜州節度使已卯新授恒州節度使馬全節卒輟朝贈中書令壬午大理卿張仁愿卒贈秘書監遣刑部尚書竇貞固等分詣寺觀禱雨已丑以定州節度使王周為恒州節度使以前易州刺史安審約為定州留後是月兩京及州郡十五竝奏旱秋七月乙未朔以侍衛步軍都指揮使領䕫州節度使田武為昭義軍節度使甲寅左諫議大夫李元龜奏請禁止天下僧尼典買院舍從之丙辰前少府監李鍇貶坊州司戸坐冐請逃死吏人衣糧入已故也庚申以前齊州防禦使薛可言為延州兵馬留後八月甲子朔日有蝕之中書舍人陶榖奏請權廢太常寺二舞郎從之丙寅宰臣和凝罷相守右僕射以樞密使馮玉為中書侍郎平章事使如故乙亥詔諸御史今後除準式請假外不得以細故小事請假離京除奉制命差推事及按察外不得以諸雜細務差出丙子以靈州節度使馮暉為邠州節度使加檢校太尉以前鄜州節度使丁審琪為左羽林統軍以前鄜州節度使郭謹為左神武統軍西京留司御史臺奏新授鄧州節度使宋彦筠于銀沙灘斬㕔頭鄭温詔鞫之欵云彦筠出身軍旅不知事體不合專擅行法詔釋其罪以工部尚書王松權知貢舉丁丑以前晉州節度使安叔千為右金吾上將軍以三司副使給事中李榖為磁州刺史充北面水陸轉運使分遣使臣于諸道率馬戊寅以左金吾上將軍皇甫立為左衛上將軍以右羽林統軍李懷忠為左武衛上將軍庚辰新授潞州節度使田武卒輟朝贈太尉戊子湖南奏靜江軍節度使馬希杲卒九月丙申以西京留守北面馬步軍都排陣使景延廣為北面行營副招討使丁酉以刑部侍郎趙逺為戸部侍郎以工部侍郎李式為刑部侍郎以中書舍人盧價為工部侍郎價久次綸闈舊例合轉禮部侍郎或御史中丞宰臣馮玉擬此官桑維翰以為資望淺不署狀無何維翰休沐數日玉獨奏行之維翰由是不樂與玉有間矣已亥幸繁臺觀馬遂幸李守貞第庚子以晉州節度使張從恩為潞州節度使吏部侍郎張昭逺加階爵酬修唐史之勞也宋史張昭逺傳加金紫階進爵邑戊申升曹州為節鎮以威信軍為軍額詔李守貞率兵屯澶州已酉月掩昴宿以宣徽北院使焦繼勲為宣徽南院使以内客省使孟承誨為宣徽北院使壬子以前太子詹事王居敏為鴻臚卿李專美為大理卿以太子賔客致仕馬𦙍孫為太子詹事甲寅移泰州理所于滿城縣乙卯詔相州節度使張彦澤率兵屯恒州冬十月戊寅以河陽節度使何建為涇州節度使以許州節度使李從温為河陽節度使以前鄭州節度使石贇為曹州節度使庚午遣使太子賔客羅周岳使副太子右庶子王延濟册兩浙節度使錢𢎞佐為守太尉辛未右金吾衛上將軍楊彦詢卒贈太子太師丁丑髙麗遣使貢方物庚辰以前延州節度使王令温為靈州節度使庚寅以邢州兵馬留後劉在明為晉州兵馬留後以前河陽留後方太為邢州留後癸已升陳州為節鎮以鎮安軍為軍額十一月戊戌以邠州節度使馮暉兼侍衛步軍都指揮使充北面行營先鋒馬歩軍都指揮使以權知髙麗國事王武為檢校太保使持節𤣥莵州都督充大義軍使封髙麗國王癸卯日南至帝御崇元殿受朝賀戊申兩浙奏順化軍節度使錢鐸卒甲寅以壽州節度使侍衛馬軍都指揮使李彦韜為陳州節度使典軍如故丙辰前商州刺史李俊除名坐受財枉法也十二月乙丑以兩浙節度使吳越國王錢𢎞佐兼東南面兵馬都元帥丙寅以吳越國金馬左廂都指揮使湖州刺史胡思進遥領䖍州昭信軍節度使以吳越國金馬右廂都指揮使明州刺史闞璠遥領宣州寕國軍節度使竝典軍如故左羽林統軍丁審琪卒贈太尉辛未以工部侍郎盧價為禮部侍郎以右散騎常侍集賢殿學士判院事司徒詡為工部侍郎依前充職以前中書舍人殷鵬為給事中充樞密直學士以給事中劉知新為右散騎常侍乙亥陜府節度使劉景巖來朝丁丑狩于近郊獵也巳卯光禄卿致仕陳𤣥卒于太原庚辰命使册髙麗國王王武癸未以前兖州節度使安審信為華州節度使丁亥以樞密使中書令桑維翰為開封尹以司空門下侍郎平章事劉昫判三司以左僕射門下侍郎平章事李崧為守侍中充樞密使以開封尹趙瑩為中書令𢎞文館大學士以宣徽南院使焦繼勲知陜州軍州事宋史焦繼勲傳西人冦邊朝議發師致討繼勲抗疏請行拜秦州觀察使兼諸蕃水陸轉運使既至推恩信設方畧招誘諸部相率奉玉帛牛酒乞盟邊境以安俄徙知陜州已丑邠州節度使馮暉準詔來朝是歳帝毎遇四方進獻器皿多以銀于外府易金而入謂左右曰金者貴而且輕便于人力識者以為北遷之兆也宋史劉濤傳少帝奢侈常以銀易金廣其器皿李崧判三司令上庫金之數及崧以原簿較之少數千鎰崧責曰帑庫通式一曰不受虗數毫釐則有重典濤曰帑司常有報不盡數以備宣索崧令有司劾濤濤事廹以情告樞密使桑維翰乃止罰一月俸開運三年春正月癸已朔帝御崇元殿受朝賀仗衛如式詔改鑄天下合同印書詔印御前竝以黄金為之已亥貝州梁漢璋奏蕃冦屯聚將謀入冦詔符彦卿屯荆州口宋史符彦卿傳再出河朔彦卿不與易其行佐配以羸師數千戍荆州口癸卯以前華州節度使劉繼勲為同州節度使以陜州節度使劉景巖為鄧州節度使丙午以宣徽南院使知陜州事焦繼勲為陜州留後丁未刑部員外王涓賜私家自盡坐私用官錢經營求利也右司郎中李知損貶均州司戸員外置馳驛發遣坐前任度支判官日與解縣𣙜鹽使王景遇交遊借貸故也已酉詔侍衛親軍副都指揮使李守貞率師巡撫北邊辛亥以皇弟秦州節度使重睿為許州節度使以許州節度使安審琦為兖州節度使以兖州節度使趙在禮為晉昌軍節度使癸丑以涇州節度使何建為秦州節度使以前貝州節度使史威為涇州節度使乙卯定州奏契丹入冦已未二王後守太僕少卿襲酅國公楊延壽除名配流威州終身勿齒延壽奉命于磁州檢苗受贓二百餘匹準律當絞有司以二王後入議故貸其死二月壬戌朔日有蝕之詔滑州皇甫遇率兵援糧入易定等州甲子以滄州留後王景為本州節度使右僕射和凝逐月别給錢五萬傔糧芻粟等優舊相也辛未魯國大長公主史氏薨輟朝三日丙子光禄卿致仕王𢎞贄卒贈太常卿迴鶻遣使貢方物升桂州全義縣為溥州仍𨽻桂州其全義縣改為徳昌縣從湖南馬希範所請也壬午以前晉昌軍節度使安彦威充北面行營副都統以宣徽北院使兼太府卿孟承誨為右武衛大將軍充職是日幸南莊命臣寮汎舟飲酒因幸杜威園醉方歸内甲申河陽節度使李從温薨輟朝贈太師三月壬辰朔以權知河西節度事張遵古為河西留後乙未以御史中丞顔衎為戸部侍郎以戸部侍郎趙逺為御史中丞丙申以邠州節度使兼侍衛步軍都指揮使馮暉為河陽節度使以前涇州節度使李徳珫為邠州節度使李守貞奏大軍至衡水巳亥奏獲鄭州刺史趙思㳟癸卯奏大軍迴至冀州戸部侍郎顔衎上表以母老乞解官就養從之戊申以皇子齊州防禦使延煦為澶州節度使辛亥密州上言饑民殍者一千五百庚申以瓜州刺史曹元忠為沙州留後夏四月辛酉朔李守貞自北班師到關大原奏吐渾白可久奔歸契丹諸侯咸有異志乙亥宰臣詣寺觀禱雨曹州奏部民相次餓死凡三千人時河南河北大饑殍殕甚衆沂宻兖鄆冦盜羣起所在屯聚剽刼縣邑吏不能禁兖州節度使安審琦出兵捕逐為賊所敗戊寅幸相國寺禱雨皇子延煦與晉昌軍節度使趙在禮結婚命宗正卿石先贊主之五月庚寅朔以兵部郎中劉皥為太府卿戊戌以前同州節度使馮道為鄧州節度使定州奏部民相次擄殺流移約五千餘户青州奏全家殍死者一百一十二户沂州奏淮南遣海州刺史領兵一千五百人應接賊頭常知及詔兖州安審琦領兵捕逐甲辰以前太子賔客韋勲為太子賔客兖州安審琦奏淮賊抽退賊頭常知及與相次首領武約等竝乞歸命丁未幸大年莊遊舩習射帝醉甚賜羣官器帛過差夜分方歸内戊申以鄜州留後李殷為定州節度使辛亥詔皇甫遇為北面行營都部署張彦澤為副李殷為都監領兵赴易定等州尋止其行甲寅以貝州留後梁漢璋為貝州節度使以左神武統軍郭謹為鄜州節度使六月庚申朔登州奏文登縣部内有銅佛像四甆佛像十自地踴出狼山招收指揮使孫方簡叛據狼山歸契丹乙丑詔諸道不得横薦官寮如本處幕府有闕即得奏薦丙寅以前招義軍節度使李從敏為河陽節度使以河陽節度使兼侍衛步軍都指揮使馮暉為靈州節度使壬午以鄆州節度使兼侍衛親軍都指揮使髙行周為宋州節度使加兼中書令充北面行營副都統以宋州節度使侍衛親軍都指揮使以下有闕文定州奏蕃冦壓境詔李守貞為北面行營都部署滑州皇甫遇為南宼相州張彦澤充馬軍都指揮使定州李殷充步軍都指揮使七月壬辰以禮部尚書王延為刑部尚書以工部尚書王松為禮部尚書以太常卿龍敏為工部尚書以左丞李慎儀為太常卿以吏部侍郎張昭逺為左丞以右丞李詳為吏部侍郎以前義州刺史李玘為右丞前晉昌軍節度使安彦威薨輟朝贈太師丙申兩浙節度使吳越國王錢𢎞佐加守太師北京留守河東節度使北平王劉知逺加守太尉滄州奏蕃冦攻饒安縣揚劉口河決西岸水濶四十里以前鄧州節度使劉景巖為太子太師致仕辛亥宋州榖熟縣河水雨水一槩東流漂没秋稼丁巳大理卿李專美卒戊午詔偽清泰朝經削奪官爵朱𢎞昭馮贇康義誠王思同藥彦稠等竝復其官爵自夏初至是河南河北諸州郡餓死者數萬人羣盜蜂起剽畧縣鎮霖雨不止川澤汎漲損害秋稼八月己未朔以左諫議大夫裴羽為給事中庚申李守貞皇甫遇駐軍定州辛酉幸南莊召從臣宴樂至暮還宫詔潞州運粮十三萬赴恒州癸亥以右散騎常侍張煦為青州刺史李守貞奏大軍至望都縣相次至長城北遇敵千餘騎轉鬭四十里斬蕃將嘉哩相公丁卯詔班師庚午以前亳州防禦使邊蔚為户部侍郎以刑部侍郎李式為户部侍郎充三司副使以禮部侍郎盧價為刑部侍郎以樞密直學士左散騎常侍邊光範為禮部侍郎充職宋史邊光範傳少帝以光範藩邸舊僚待遇尤厚因遊宴見光範位翰林學士下即日拜尚書禮部侍郎知制誥充翰林學士仍直樞密院辛未以右龍武統軍周宻為延州節度使癸酉河東節度使劉知逺奏誅吐渾大首領白承福白鐵匱赫連海龍等竝夷其族凡四百口盖利其孳畜財寳也人皆寃之甲戌以大理少卿劇可久為大理卿棣州刺史慕容彦超削奪在身官爵房州安置坐前任濮州擅出省倉麥及私賣官麯準法處死太原節度使劉知逺上表救之故貸其死丙戌靈州馮暉奏與威州刺史藥元福于威州土橋西一百里遇吐蕃七千餘人大破之斬首千餘級是月秦州雨兩旬不止鄴都雨水一丈洛京鄭州貝州大水鄴都夏津臨清兩縣餓死民凡三千三百盜入臨濮費縣秋九月壬辰鄆州節度使侍衛親軍都指揮使李守貞加兼侍中滑州節度使皇甫遇進封邠國公相州節度使張彦澤加檢校太尉甲午以權知威武軍節度使李𢎞逹為檢校太尉同平章事充福建節度使知閩國事乙未前商州刺史李俊賜死坐與親妹姦及行劔斫殺女使又殺部曲孫漢榮強姦其妻準法棄市詔賜死于家已亥張彦澤奏破蕃賊于定州界斬首二十餘級追襲百餘里生擒蕃將四人摘得金耳環二副進呈癸卯太原奏破契丹于楊武谷殺七千餘人甲辰以天䇿上將軍江南諸道都統楚王馬希範兼諸道兵馬都元帥詔開封府以霖雨不止應京城公私僦舍錢放一月乙巳詔安審𤦺率兵赴鄴都皇甫遇赴相州丙午以太子少保楊凝式為太子少傅以刑部尚書王延為太子少保前頴州團練使竇貞固為刑部尚書是月河南河北關西諸州奏大水霖雨不止溝河汎溢水入城郭及損害秋稼是月契丹瀛州刺史詐為書與樂壽將軍王巒愿以本城歸順且言城中蕃軍不滿千人請朝廷發軍襲取之已為内應又云今秋苦雨州澤漲溢自瓦橋以北水勢無際戎王已歸本國若聞南夏有變地逺阻水雖欲奔命無能及也又巒繼有宻奏苦言瀛鄚可取之狀先是前歳中車駕駐于河上曽遣邊將遺書于幽州趙延壽勸令歸國延壽㝷有報命依違而已是歳三月復遣鄴都杜威致書于延壽且述朝㫖啖以厚利仍遣洺州軍將趙行實賫書而徃潛申欵宻行實曽事延壽故遣之七月行實自燕迴得延壽書且言久陷邊廷愿歸中國乞發大軍應接即拔身南去叙致懇切辭㫖綿宻時朝廷欣然從之復遣趙行實計㑹延壽大軍應接之所有瀛州大將遣所親齎蠟書至闕下告云欲謀翻變以本城歸命未幾會彼有告變者事不果就至是瀛州守將劉延祚受戎王之命詐輸誠款以誘我軍國家深以為信遂有出師之議舊五代史卷八十四
