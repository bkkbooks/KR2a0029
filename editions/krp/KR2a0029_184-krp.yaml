body:
  text: 舊五代史巻九十二宋門下侍郎參知政事監修國史薛居正等撰晉書第十八列傳七姚顗字伯真京兆萬年人曽祖希齊湖州司功參軍祖宏慶蘇州刺史父荆國子祭酒顗少憃敦厚靡事容貌任其自然流輩未之重唯兵部侍郎司空圖深器之以女妻焉顗性仁恕多為僕妾所欺心雖察之而不能面折終身無喜怒不知錢百之為陌黍百之為銖凡家人市貨百物入増其倍出减其半不詢其由無擔石之儲心不隕穫唐末隨計入洛出逰嵩山有白衣大夫拜于路側請為童僕顗辭不納乃曰鬼神享于徳君子孚于信余則鬼也將以托賢者之徳通化工之信幸無辭焉昔余掌事隂府承命攝人之魂氣名氏同而其人非且富有夀算復而歸之則筋骸已敗由是獲譴使不得為陽生公中夏之相輔也今為謁中天之祠若以某姓名救之神必許諾顗因為䖍禱而還白衣迎於山下曰余免其苦矣拜謝而退顗次年擢進士第梁貞明中厯校書郎登封令右補闕禮部員外郎召入翰林累遷至中書舍人唐莊宗平梁以例貶復州司馬歲餘牽復授左㪚騎常侍厯兵吏部侍郎尚書左丞唐末帝即位講求輔相乃書朝中清望官十餘人姓名置于瓶中清夜焚香而挾之既而得盧文紀與顗遂拜中書侍郎平章事制前一日嵩山白衣來謁謂顗曰公明日為相其言無差㝠𢾗固先定矣高祖登極罷相為刑部尚書俄遷户部尚書天福五年冬卒年七十五贈左僕射子惟和嗣顗疎于財而御家無術既死歛葬之資不備家人俟賻物及鬻第方能舉喪而去士大夫愛其亷而鄙其拙吕琦字輝山幽州安次人也祖夀瀛州景城主簿父兖滄州節度判官累至檢校右庶子劉守光攻䧟滄州𤦺父兖被擒族之琦時年十五爲吏追攝將就戮焉有趙玉者幽薊之義士也乆逰于兖之門下見琦臨危乃紿謂監者曰此子某之同氣也幸無濫焉監者信之即引之俱去行一舍琦困于徒步以足病告玉負之而行逾數百里因變姓名乞食于路乃免其禍年弱冠以家門遇禍邈無所依乃勵志勤學多遊于汾晉唐天祐中莊宗方開霸府翹佇賢士墨制授𤦺代州軍事判官秩滿歸太原監軍使張承業重𤦺器量禮遇尤厚天成初拜琦殿中侍御史遷駕部員外郎兼侍御史知雜事㑹河陽帑吏竊財事發詔軍廵院鞫之時軍廵使尹訓恃勢納賂枉直相反俄有訴寃于闕下者詔琦按之既驗其姦乃上言請治尹訓沮而不行琦連奏不已訓知其不免自殺于家其獄遂明䝉活者甚衆自是朝廷多琦之公直髙祖建義于太原唐末帝幸懐州趙徳鈞駐軍于團栢谷末帝以琦嘗在徳鈞幕下因令賚都統使官告以賜之且犒其軍焉及觀軍于北陲館于忻州㑹晉祖降下晉安寨遣使告于近郡琦適遇其使即斬之以聞尋率羣兵千人間道而歸髙祖入洛亦弗之責止改授秘書監而已天福中預修唐書權掌選部皆有能名焉累遷禮部刑部户部兵部侍郎階至金紫光禄大夫爵至開國子𤦺美風儀有器概雖以剛直聞于時而内實仁恕初高祖謀求輔相時宰臣李崧力薦琦于高祖云可大用髙祖數召琦于便殿言及當世事甚竒之方將倚以為相忽遇疾而逝人皆惜之梁文矩字徳儀鄆州人父景秘書少監梁福王友璋好接賔客文矩少逰其門初試太子校書轉秘書郎友璋領鄆州奏為項城令及移鎮徐方辟為從事友璋卒改兖州觀察判官時莊宗遣明宗襲據鄆州文矩以父母在鄆一旦隔越不知存亡為子之情戀望如灼遂間路歸鄆尋謁莊宗莊宗喜之授天平軍節度掌書記在明宗幕下明宗厯汴恒二鎮皆隨府遷職天成初授右諌議大夫知宣武軍軍州事厯御史中丞吏部侍郎禮部尚書西都副畱守判京兆府事繼改兵部尚書文矩以嘗事霸府每懐公輔之望時高祖自外鎮入覲嘗薦于明宗曰梁文矩早事陛下甚有勤勞未升相輔外論慊之明宗曰乆忘此人吾之過也尋有㫖降命會丁外憂而止清泰初拜太常卿高祖即位授吏部尚書改太子少師文矩喜清静之敎聚道書數千巻企慕赤松畱侯之事而服食尤盡其善後因風痺上章請退以太子太保致仕居洛陽乆之天福八年以疾卒時年五十九贈太子太𫝊史圭常山人也其先與王武俊來于塞外因家石邑高祖曽厯鎮陽牙校父鈞假安平九門令圭好學工詩長于吏道唐光化中厯阜城饒陽尉改房子寕晉元氏樂夀博陸五邑令為寕晉日擅給驛廪以貸飢民民甚感之及為樂夀令里人為之立碑同光中任圜為真定尹擢為本府司錄不應命郭崇韜領其地辟為從事及明宗代崇韜以舊職縻之明宗即位入為文昌正郎安重誨薦為河南少尹判府事尋命為樞宻院直學士時圭以受知于重誨重誨奏令圭與同列閻至俱升殿侍立以備顧問明宗可之尋自左諫議大夫拜尚書右丞有入相之望圭敏于吏事重誨本不知書為事剛愎每于明宗前可否重務圭恬然終日不能剖正其事長興中重誨既誅圭出為貝州刺史未幾罷職退歸常山由是閉門杜絶人事雖親戚故人造者不見其面每逰别墅則乗婦人氊車以自蔽匿人莫知其心髙祖登極徴為刑部侍郎判鹽鐵副使皆宰臣馮道之奏請也始圭在明宗時為右丞權判銓事道在中書嘗以堂判衡銓司所注官圭怒力爭之道亦微有不足之色至是􅀢首為道所舉方愧其度量逺不及也旋改吏部侍郎分知銓事而圭素保亷守節大著公平之譽圭前為河南少尹曰有嵩山術士遺圭石藥如斗謂圭曰服之可以延夀然不可中輟輟則疾作矣圭後服之神爽力健深寳惜焉清泰末圭在常山遇秘瓊之亂時貯于衣笥為賊所刼不可復得天福中疾生胷臆之間常如火灼圭知不濟求歸郷里詔許之及涉河竟為藥氣所蒸卒于路歸塟石邑時年六十八裴皥字司東系出中眷裴氏世居河東為望族皥容止端秀性卞急剛直而無隠少而好學苦心文藝雖遭亂離手不釋巻唐光化三年擢進士第釋褐授校書郎厯諫職梁初當路推其文學遷翰林學士中書舎人唐莊宗時擢為禮部侍郎後以語觸當事改太子賔客旋授兵部尚書以老致仕天福初起為工部尚書復告老以右僕射致仕皥累知貢舉稱得士宰相馬裔孫桑維翰皆其所取進士也後裔孫知貢舉引新進士謁皥皥喜為詩曰詞塲最重是持衡天遣愚夫受盛名三主禮闈年八十門生門下見門生當時榮之維翰嘗私見皥皥不為迎送人問之皥曰我見桑公于中書庶寮也今我見于私第門生也聞者以為允卒年八十五贈太子太保吳承範字表微魏州人也父瓊右金吾衛將軍累贈太子少保承範少好學善屬文唐閔帝之鎮鄴都也聞其才名署為賔職承範懇求隨計閔帝許之長興三年春擢進士第及閔帝即位授左拾遺清泰二年以本官充史館修撰與同職張昭逺等共修明宗實錄轉右補闕依前充職高祖革命遷尚書屯田員外郎知制誥天福三年改樞宻院直學士未幾自祠部郎中知制誥召充翰林學士正拜中書舍人賜金紫少帝嗣位遷禮部侍郎知貢舉尋遘疾而卒年四十二贈工部侍郎承範温厚寡言善希人㫖桑維翰李崧尤重之嘗薦于高祖云可大用承範知之持重自養雖遇盛夏而猶服襦袴加之以純綿蓋慮有寒濕之患也然竟不獲其志其命也夫盧導字熈化其先范陽人也祖伯卿唐殿中侍御史父如晦國子監丞贈戸部侍郎導少而儒雅美詞翰善談論唐天祐初登進士第釋褐除校書郎由均州鄭郷縣令入為監察御史三遷職方員外郎充史館修撰改河南縣令禮部郎中賜紫轉右司郎中兼侍衘史知雜事以病免閑居于漢上乆之天成中以本官徴還拜右諫議大夫長興末為中書舎人權知貢舉明年春潞王自鳯翔擁大軍赴闕唐閔帝奔于衛州宰相馮道李愚集百官于天宫寺將出迎潞王時軍衆離潰人情奔駭百官移時未有至者導與舍人張昭逺先至馮道請導草勸進牋導曰潞王入朝郊迎可也若勸進之事安可造次且潞王與主上皆太后之子或廢或立當從敎令安得不禀策母后率爾而行馮道曰凡事務要實勸進其可巳乎導曰今主上䝉塵在外遽以大位勸人若潞王守道以忠義見責未審何詞以對不如率羣臣詣宫門取太后進止即去就善矣道未及對㑹京城廵檢安從進報曰潞王至矣安得百寮無班即紛然而去是日潞王未至馮道等止于上陽門外又令導草勸進牋導執之如初李愚曰舍人之言是也吾輩信罪人矣導之守正也如是天福中由禮部侍郎遷尚書右丞判吏部尚書銓事秩滿拜吏部侍郎六年秋卒于東京時年七十六鄭韜光字龍府洛京清河人也曽祖絪為唐宰相祖祗徳國子祭酒新唐書宰相世系表祗徳兵部尚書贈太傅父顥河南尹贈太師其先世居滎陽自隋唐三百餘年公卿輔相蟬聯一門韜光唐宣宗之外孫萬夀公主之所出也生三日賜一子出身銀章朱紱及長羙容止神爽氣澈不妄喜怒秉執名節爲甲族所稱自京兆府叅軍歴秘書郎集賢校理太常博士虞部比部員外郎司門户部郎中河南京兆少尹太常少卿諫議大夫給事中梁貞明中懇求休退上表漏名責授寕州司馬莊宗平梁遷工禮刑部侍郎天成長興中厯尚書左右丞國初以户部尚書致仕自襁褓迨至懸車凡事十一君越七十載所仕無官謗無私過三持使節不辱君命士無賢不肖皆㳟已接納晚年背傴時人咸曰鄭傴不迂平生交友之中無怨隟親戚之間無愛憎恬和自如性尚平簡及致政歸洛甚惬終焉之志天福五年秋寢疾而卒年八十贈右僕射王權字秀山太原人積世衣冠曽祖起官至左僕射山南西道節度使册贈太尉諡曰文懿唐史有傳祖龜浙東觀察使父蕘右司員外郎權舉進士觧褐授秘書監校書郎集賢校理厯左拾遺右補闕梁祖革命御史司憲崔沂表為侍御史遷兼職方員外郎知雜事歲餘召入翰林為學士左院加戸部郎中知制誥厯左諫議大夫給事中充集賢殿學士判院事俄拜御史中丞唐莊宗平梁以例出為隨州司馬會赦量移許州月餘入為右庶子遷戸兵吏三侍郎尚書左丞禮部尚書判銓清泰中權知貢舉改戸部尚書華資羙級罕不由之髙祖登極轉兵部尚書天福中命權使于契丹權以前世累為將相未嘗有奉使而稱陪臣者謂人曰我雖不才年已耄矣豈有逺使于契丹乎違詔得罪亦所甘心由是停任先是宰相馮道使于契丹纔囬權亦自鳯翔册禮使囬故責詞畧曰若以道路迢遥即鸞閤之臺臣亦往若以筋骸衰減即鳯翔之册使纔囬既黷憲章須從殿黜云其實權不欲臣事契丹故堅辭之非避事以違命也踰嵗授太子少𫝊致仕六年秋以疾卒年七十八贈左僕射韓惲字子重太原晉陽人曽祖俊唐龍武大將軍祖士則石州司馬父逵代州刺史惲世仕太原昆仲為軍職唯惲親狎儒士好為歌詩聚書數千巻乾寕中後唐莊宗納其妹為妃初為嫡室故莊宗深禮其家而惲以文學署交城文水令入為太原少尹莊宗平定趙魏為魏州支使莊宗即位授左㪚騎常侍從駕至洛陽轉尚書户部侍郎天成初改秘書監俄而馮道為丞相與惲有同幕之舊以惲性謹厚尤左右之尋遷禮部尚書丁内憂服闋授户部尚書明宗晏駕馮道為山陵使引惲為副使清泰初以充奉之勞授檢校尚書右僕射絳州刺史踰年入為太子賔客高祖登極以惲先朝懿戚深加禮遇除授貝州刺史時范延光有跋扈之狀惲懼其見逼遲畱不敢赴任高祖不悅復授太子賔客尋改兵部尚書天福七年夏車駕在鄴惲病脚疾卒于龍興寺時年六十餘李懌京兆人也祖褒唐黔南觀察使父昭户部尚書懌㓜而能文進士擢第觧褐為校書郎集賢校理清河尉入梁厯監察御史右補闕殿中侍御史起居舍人禮部員外郎知制誥換都官郎中賜緋召入翰林爲學士正拜舍人賜金紫仍舊内職莊宗平汴洛責授懷州司馬遇赦量移孟州入為衛尉少卿天成初復拜中書舎人充翰林學士在職轉戸部侍郎右丞充承旨時常侍張文寳知貢舉中書奏落進士數人仍請詔翰林學士院作一詩一賦下工部為舉人格様學士竇夢徴張礪輩撰格詩格賦各一送中書宰相未以為允夢徴等請懌爲之懌笑而答曰李懌識字有數頃歲因人偶得及第敢與後生髦俊為之標格假令今郤稱進士就春官求試落第必矣格賦格詩不敢應詔君子多其識大體天福中自工部尚書轉太常卿厯禮部刑部二尚書以多病畱司于洛下不交人事開運末遇契丹入洛家事罄空尋以疾卒年七十餘舊五代史巻九十二
