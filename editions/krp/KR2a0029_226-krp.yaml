body:
  text: 舊五代史巻一百十三攷證周太祖紀四又殺牛族素與野雞族有憾殺牛族原本作殺牛于族攷通鑑五代㑹要宋史東都事略俱作殺牛族知原本于字衍今刪以前西京留守莒國公王守恩為左衛上将軍王守恩原本作守思今據通鑑改正舊五代史卷一百十三攷證
