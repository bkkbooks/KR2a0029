body:
  text: 舊五代史巻一百十八攷證周世宗紀五丙戌右龍武將軍王漢璋奏攻海州案通鑑作丁亥王漢璋奏克海州歐陽史亦作丁亥取海州是書袛載丙戌攻海州而不載取城之日疑有闕文丙午㧞之案歐陽史通鑑俱作丁未充楚州與是書異五代春秋從是書作丙午天長軍使易贇易贇通鑑作易文贇乙未殿前都虞候慕容延釗奏大破賊軍于東㳍州案通鑑作甲午延釗奏大破唐兵于東㳍州與是書異日舊五代史巻一百十八攷證
