body:
  text: 舊五代史巻一百十三宋門下侍郎參知政事監修國史薛居正等撰周書第四太祖紀四廣順三年春三月庚辰朔以相州留後白重贊為滑州節度使以鄭州防禦使王進為相州節度使以前兖州防禦使索萬進為延州節度使以亳州防禦使張鐸為同州節度使甲申以皇子澶州節度使榮為開封尹兼功徳使封晉王仍令所司擇日備禮冊命丙戌以宣徽北院使兼樞密副使鄭仁誨為澶州節度使以殿前都指揮使李重進領泗州防禦使以客省使向訓為内客省使已丑以棣州團練使王仁鎬為右衛大将軍充宣徽北院使兼樞密副使庚寅端明殿學士尚書兵部侍郎顔衎落職守本官宋史顔衎傳衎權知開封府王峻敗罷職守兵部侍郎以翰林學士中書舍人王溥為戸部侍郎充職以左司郎中充樞密直學士景範為左諫議大夫充職祕書監陳觀責授左贊善大夫留司西京坐王峻黨也癸巳大風雨土戊申幸南荘夏四月甲寅禁沿邉民鬻兵仗與蕃人戊辰河中節度使王景移鎮鳯翔宋州節度使常思進移鎮青州鳯翔節度使趙暉移鎮宋州河陽節度使王彥超移鎮河中賜朗州劉言絹三百匹以兵革之後匱乏故也詔在京諸軍将士持支救接五月已卯朔帝御崇元殿受朝賀仗衛如儀辛巳前慶州刺史郭產欽勒歸私第國初以彥欽再刺慶州兼掌𣙜鹽彥欽擅加𣙜錢民夷流怨州北十五里寡婦山有蕃部曰野雞族彥欽作法擾之蕃情獷猂好為不法彥欽乃奏野雞族掠奪綱商帝遣使賫詔撫諭望其率化蕃人既苦彥欽貪政不時報命朝廷乃詔邠州節度使折從阮寧州刺史張建武進兵攻之建武勇于立功徑取野雞族帳擊殺数百人又殺牛族素與野雞族有憾且聞官軍討代相聚餉饋欣然迎奉官軍利其財貨孳畜遂劫奪之翻為族所誘至包山負險之地官軍不利為蕃人迫逐投崖墜澗而死者数百人從阮等以兵自保不相救應帝怒彥欽及建武俱罷其任及彥欽至京師故有是命丁亥新授青州節度使常思進在宋州日出放得絲四萬一千四百兩請徵入官詔宋州給還人户契劵其絲不徵甲午中書侍郎同平章事集賢殿大學士權判門下省事花質可權監修國史六月壬子滄州奏契丹幽州𣙜鹽制置使兼防州刺史知盧臺軍事張藏英以本軍兵士及職員戸人孳畜七千頭口歸化癸丑以前開封尹楚國公候益為太子太師以前西京留守莒國公王守恩為左衛上将軍以前興軍節度使李洪信為左武衛上將軍甲寅以左衛上將軍宋彥筠為太子少師以太子少師楊凝式為尚書右僕射致仕癸亥前河陽節度使王繼𢎞卒己巳太子太傅李懐忠卒是月河南河北諸州太水霖雨不止川陂漲溢襄州漢水溢入城深一丈五尺居民皆乗筏登樹羣烏集潞州河南無烏秋七月戊寅朔徐州言龍出豐縣村民井中即時澍雨漂没城邑癸未太子賔客馬𦙍孫卒甲申鄴都王殷奏乞朝覲凡三上章允之尋以北邉奏契丹事機詔止其行以左金吾上將軍安審信為太子太師致仕丁亥以右金吾上將軍張從恩為左金吾上將軍以前鄧州節度使張彥成為右金吾上將軍己丑以虎捷左廂都指揮使永州防禦使韓通為陜州留後庚寅太府卿判司天監趙延乂卒辛卯以前西京副留守盧價為太子賔客乙未以御史中丞邉光範為禮部侍郎以刑部侍郎張煦為御史中丞以翰林學士承㫖尚書禮部侍郎徐台符為刑部侍郎充職丙申太子太師致仕安審信卒丁酉詔曰京兆鳯翔府同華邠延鄜耀等州所管州縣軍鎮頃因唐末藩鎮殊風久厯嵗時未能釐革政途不一何以敎民其婚田爭訟賦税丁徭合是令佐之職其擒姦捕盜庇䕶部民合是軍鎮警察之職今後各守職分專切提撕如所職疎遣各行按責其州府不得差監徵軍將下縣戊戌衛尉少卿李温美責授房州司户參軍温美奉使祭海便道歸家家在壽光縣為縣吏馮勲所訟故黜之供奉官武懐贊棄市坐盜馬價入已也壬寅以鴻臚少卿趙修已為司監八月已酉帝幸南荘丙辰内衣庫使齊藏珍除名配沙門島藏珍奉詔修河不于役所部轄私至近縣止宿及報隄防危急安寝不動遂致横流故有是責庚申邢州節度使劉詞移鎮河陽辛酉以龍捷左廂都指揮使閬州防禦使田景咸為刑州留後丁卯河㳏河隂京師霖雨不止給賜諸軍將士薪芻有差癸酉以翰林學士户部侍郎王溥為端明殿學士甲戌潭州王進逵奏朗州劉言與淮賊通連差指揮使鄭珓部領兵士欲倂當道鄭珓為軍衆所執奔入武陵劉言尋為諸軍所廢臣已至朗州安撫訖詔劉言勒歸私第委王進逵取便安置是月所在州郡奏霖雨連緜漂沬田稼損壊城郭廬舍九月已卯太子少保盧損卒丁酉深州上言樂壽縣兵馬都監杜延熙為戍兵所害先是齊州保寧郡兵士屯于樂壽都頭劉彥章等殺延熈為亂時鄭州開道指揮使張萬友亦屯于樂壽然不與之同朝廷急遣供奉官馬諤省其事諤乃與萬友擒彥章等十三人斬之餘衆奔齊州是月多隂曀木再華冬十月戊申朔詔以來年正月一日有事于南郊諸道州府不得以進奉南郊為名輒有率斂已酉右金吾上將軍張彥成卒庚戌以前同州節度使薛懐讓為左屯衛上將軍以尚書左丞兼判國子監田敏權判太常卿以禮部尚書王易權兵部尚書太常奏郊廟社稷壇位制度請下所司修奉從之以中書令馮道為南郊大禮使以開封尹晉王榮為頓遞使權兵部尚書王易為鹵簿使御史中丞張煦為儀仗使權判太常卿田敏為禮儀使以前潁州防禦郭瓊為權宗正卿甲寅以前光禄卿丁知浚復為光禄卿丙辰幸南荘西荘已未前寧州刺史張建武責授右司禦副率以野雞族失利故也以前翰林學士工部侍郎魚崇諒為禮部侍郎充翰林學士時崇諒解職于陜州就養至是再除禁職仍賜詔召之令本州給行裝鞍馬侍親歸朝以太子賔客張昭為戸部尚書以太子賔客李濤為刑部尚書詔中書令馮道赴西京迎奉太廟神主甲子中書令馮道率百官上尊號曰聖明文武仁德皇帝答詔不允凡三上章允之仍俟郊禮畢施行壬申鄴都邢洺等州皆上言地震鄴都尤甚十一月辛已廢共城稻田務任人佃蒔乙酉日南至帝不受朝賀庚寅鎮州節度使何福進奏乞朝覲三奏允之詔侍衛歩軍都指揮使曹英權知鎮州軍府事癸已以将作監李瓊為濟州刺史壬寅詔重定天下縣邑除畿赤外其餘三千户已上為望縣二千户已上為緊縣一千户已上為上縣五百户已上為中縣不滿五百戸為中下縣十二月戊申雨木冰是日四廟神主至西郊帝郊迎奠饗奉神主入于太廟設奠安神而退壬子前單州刺史趙鳯賜死坐為民所訟故也甲寅詔諸道州府縣鎮城内人户舊請蠶鹽徵價起今後竝停甲子鎮州節度使何福進來朝乙丑鄴都留守王殷來朝丙寅禮儀使奏皇帝郊廟行事請以晉王榮為亞獻通攝終獻行事從之已已左補闕王伸停任坐檢田于亳州虚憑紐配故也辛未鄴都留守侍衛親軍都指揮使王殷削奪在身官爵長流登州尋賜死于北郊其家人骨肉竝不問罪癸酉帝宿齋于崇元殿為來年正月一日親祀南郊也時帝已不豫甲戌宿于太廟乙亥質明帝親饗太廟自齋宫乗歩輦至廟庭被衮冕令近臣翼侍陞階止及一室行禮俛首而退餘命晉王率有司終其禮是日車駕赴郊宫顯徳元年春正月丙子朔帝親祀圜丘禮畢詣郊宫受賀車駕還宫御明徳楼宣制大赦天下改廣順四年為顯徳元年自正月一日昧爽己前應犯罪人常赦所不原者咸赦除之内外将士各優給文武職官竝與加恩内外命婦竝與進封寺監攝官七周年已上者同明經出身今後諸寺監不得以白身署攝升朝官兩任已上著緑十五周年與賜緋著緋十五年與賜紫州縣官曾經五度參選雖未及十六考與授朝散大夫階年七十已上授優散官賜緋應奉郊廟職掌人員竝與恩澤今後不得以梁朝及清㤗朝為偽朝偽主天下帝王陵廟及名臣墳墓無後官為檢校云宣赦畢帝御崇元殿受冊尊號禮畢羣臣稱賀時帝郊祀御楼受冊有司多畧其禮以帝不豫故也先是有占者言鎮星在氐房乃鄭宋之分當京師之地兼氐宿主帝王路寝若散財以致福遷幸以避災庶幾可以驅禳矣帝以遷幸煩費不可輕議散財可矣故有郊禋之命洎嵗暮帝疾増劇郊廟之禮蓋勉而行之耳戊寅詔廢鄴都依舊為天雄軍大名府在京兆府之下庚辰制皇子開封尹晉王榮可開府儀同三司檢校太尉兼侍中行開封尹功徳使判内外兵馬事襄州安審琦進封陳王鄆州符彥卿進封衛王移鎮天雄軍荆南高保融進封南平王夏州李彛興進封西平王甲申宋州趙暉進封韓國公青州常思進封萊國公徐州王晏進封滕國公鄧州侯章進封申國公西京武行徳進封譙國公許州郭從義加檢校太師鳯翔王景進封裒國公華州孫方諫進封蕭國公自趙暉已下竝加開府儀同三司乙酉分命朝臣往諸州開倉减價出糶以濟饑民詔潭州依舊為大都督府在朗州桂州之上丙戌以澶州節度使鄭仁誨為樞密使加同平章事鄜州楊信加開府儀同三司進封杞國公邠州折從阮加開封儀同三司改封鄭國公滄州李暉加檢校太尉宋州李洪義加檢校太師貝州王饒加檢校太尉以陳州節度使兼侍衛馬軍都指揮使郭崇為澶州節度使加同平章事以曹州節度使兼侍衛歩軍都指揮使曹英為鎮州節度使加同平章事潭州王進逵加特進兼侍中河陽劉詞加檢校太尉河中王彥超加同平章事以鎮州節度使何福進為鄆州節度使加同平章事潞州李筠加同平章事戊子晉州藥元福滑州白重贊相州王進同州張鐸竝加檢校太傅以延州節度使索萬進為曹州節度使加檢校太傅定州留後孫行友邢州留後田景咸陜州留後韓通靈武留後馮繼業竝正授節度使庚寅夜東北有大星墜其聲如雷壬辰宰臣馮道加守太師范質加尚書左僕射監修國史李榖加右僕射集賢殿大學士以端明殿學士尚書戸部侍郎王溥為中書侍郎平章事東都事畧太祖将大漸促召學士草制以溥為中書侍郎同中書門下平章事已宣制太祖曰吾無恨矣司徒竇貞固進封汧國公司空蘓禹珪進封莒國公竝加開府儀同三司以宣徽南院使知永興軍府事袁㠖為延州節度使以宣徽北院使兼樞密副使王仁鎬為永興軍節度使以前安州節度使王令温為陳州節度使以殿前都指揮使泗州防禦使李重進為武信軍節度使檢校太保典軍如故以龍捷左廂都指揮使睦州防禦使樊愛能為侍衛馬軍都指揮使洋州節度使加檢校太保以虎捷左廂都指揮使累州防禦使何徽為侍衛歩軍都指揮使利州節度使加檢校太保以樞密承㫖魏仁浦為樞密副使是日已時帝崩于滋徳殿聖壽五十一祕不發䘮乙未遷神柩于萬嵗殿召文武百官班于殿庭宣遺制晉王榮可于柩前卽皇帝位服紀月日一如舊制云是嵗自正月朔日後景色昏晦日月多暈及嗣君卽位之日天氣晴朗中外肅然帝自郊禋後其疾乍瘳乍劇晉王省侍不離左右東都事畧李重進周太祖之甥母卽福慶長公主重進年長于世宗及太祖寝疾召重進受顧命令拜世宗以定君臣之分累諭晉王曰我若不起此疾汝卽速治山陵不得久留殿内陵所務從儉素應縁山陵役力人匠竝湏和雇不計近逺不得差配百姓陵寢不湏用石柱費人功只以甎代之用瓦棺紙衣臨入陵之時召近税户三十家為陵户下事前揭開瓦棺徧視過陵内切不得傷他人命勿修下宫不要守陵宫人亦不得用石人石獸只立一石記子鐫字云大周天子臨晏駕與嗣帝約縁平生好儉素只令著瓦棺紙衣𦵏若違此言隂靈不相助又言朕攻收河府時見李家十八帝陵園廣費錢物人力竝遭開發汝不聞漢文帝儉素𦵏在霸陵原至今見在如毎年寒食無事時即仰量事差人灑掃如無人去只遙祭兼仰于河府魏府各葬一副劒甲澶州葬通天冠綘紗袍東京葬一副平天冠衮龍服千萬千萬莫忘朕言二月甲子太常卿田敏上尊諡曰聖神恭肅文武皇皇帝廟號太祖四月乙已𦵏于嵩陵宰臣李穀撰諡冊文王溥撰哀冊文五代史補髙祖之為樞密使也毎出入常恍然覩人前導状若臺省人吏其服色一緋一緑高祖以為不詳深憂之及河中鳯翔永興等處反詔命高祖征之一舉而二鎮瓦解自是權傾天下論者以為功高不賞郭氏其危乎髙祖聞而恐懼居無何忽覩前導者服色緋者改紫緑者改緋高祖心始安曰被二人者但見其升不見其降吉兆也未幾遂為三軍所推戴高祖之入京師也三軍分擾殺人爭物者不可勝数時有趙童子者知書善射至防禦使覩其紛擾竊憤之乃大呼于衆中曰樞宻太尉志在除君側以安國所謂兵以義舉鼠輩敢爾乃賊也豈太尉意耶于是持弓矢于所居巷口據牀坐凡軍人之來侵犯者皆殺之由是居人賴以保全僅数千家其間亦有致金帛于門下用為報答已堆集如丘陵焉童子見而笑曰吾豈求貨者耶于是盡歸其主高祖聞而異之隂謂世宗曰吾聞人間讖云趙氏合當為天子觀此人才略度量近之矣不早除去吾與汝其可保乎使人誣告收付御史府劾而誅之洎高祖厭世未十年而皇宋有天下趙氏之讖乃應于斯知王者不死信矣哉高祖征李守貞軍次河上高祖盧其争濟臨岸而諭之未及坐忽有羣鴉噪于上高祖退十餘歩引弓将射之矢未及發而岸崩其釁裂之勢在高祖足下高祖棄弓顧羣雅而笑曰得非天使汝驚動吾耶如此則李守貞不足破矣于是三軍欣然各懐鬬志矣五代史闕文周太祖在漢隠帝朝為樞密使将兵伐河中李守貞時馮道守太師不與朝政以請告周祖謁道于私第問伐蒲䇿道辭以不在其位不敢議國事周祖固問之道不得己謂周祖曰相公頗知博乎周祖微時好蒱博屢以此抵罪疑道譏己勃然變色道曰是行亦猶博也夫博財多者氣豪而勝財寡者心怯而輸守貞在晉累典禁兵自謂軍情附已遂謀反耳今相公誠能不惜官錢廣施惠愛明其賞罰使軍心許國則守貞不足慮也周祖曰恭聞命矣故伐蒲之役周祖以便宜從事卒成大功然亦軍旅歸心終移漢祚又周祖自鄴起兵赴闕漢隱帝兵敗遇害于劉子波周祖入京師百官謁周祖見道猶設拜意道便行推戴道授拜如平時徐曰侍中此行不易周祖氣沮故禪代之謀稍緩及請道詣徐州冊湘隂公為漢嗣道曰侍中由衷乎周祖設誓道曰莫敎老夫為謬語令為謬語人臣謹案周世宗朝詔御史臣修周祖實禄故道之事所宜諱矣史臣曰周太祖昔在初濳未聞多譽洎平衍蒲阪北鎮鄴臺有統御之勞顯英偉之量旋屬漢道斯季天命有歸總虎旅以盪神京不無慙徳攬龍圖而登帝位遂闡皇風朞月而弊政皆除逾嵗而羣情大服何遷善之如是蓋應變以無窮者也所以魯國兇徒望風而散幷門遺孽引曰偷生及鼎駕之将昇命瓦棺而薄𦵏勤儉之美終始可稱雖享國之非長亦開基之有裕矣然而二王之誅議者譏其不能駕馭權豪傷于猜忍卜年斯促抑有由焉舊五代史巻一百十三
