body:
  text: 舊五代史巻五宋門下侍郎參知政事監修國史薛居正等撰梁書第五太祖紀五開平三年九月癸巳朔御崇勲殿宴羣臣文武百官賜張宗奭楊師厚白綾各三百匹銀鞍轡馬丁酉上幸崇政院宴内臣賜院使敬翔直學士李班等繪綵有差以門下侍郎平章事薛貽矩判建昌宫事兼延資庫使制内外使臣復命未見便歸私第者朝廷命使臣下奉行惟於辭見之儀合守敬恭之道近者凡差出使往復皆越常規或已辭而尚在本家或未見而先歸私第但從已便莫稟王程在禮敬而殊乖置典章而私舉宜令御史臺别具條流事件具黜罰等奏聞庚子殿直王唐福自襄城走馬以大軍勝㨗逆將李洪歸降事上聞賜唐福絹銀有加宰臣百官上表稱賀壬寅開封府虞候李繼業齎襄州都指揮使陳暉奏狀以今月五日殺戮逆黨千人竝生擒都指揮使𫝊霸以下節級共五百人收復襄州人户歸業通鑑八月陳暉軍至襄州李洪逆戰大敗王求死九月丁酉抜其城斬叛兵千人執李洪楊䖍等送洛陽斬之癸卯帝御文明殿以收復襄漢受宰臣以下稱賀辛亥侍中韓建罷守太保左僕射同平章事楊涉罷守本官以太常卿趙光逢為中書侍郎平章事翰林學士奉㫖工部侍郎知制誥杜曉為尚書户部侍郎平章事詔曰秋冬之際隂雨相仍所司擇日拜郊或慮臨時妨事宜令别更擇日奏聞是月禮儀使奏據所司擇十月二日祀圜丘今參詳十月十七日以後入十一月節十一月二日冬至一陽生之辰宜行親告之禮從之河中奏准宣詔使有銅牌者所至即易騎以遣十月癸未大明節帝御文明殿設齋僧道召宰臣翰林學士預之諸道節度刺史及内外諸司使咸有進獻詔以冦盜未平凡諸給過所竝令司門郎中員外郎出給以杜姦詐十一月癸已朔帝齋於内殿不視朝甲午日長至五更一㸃自大内出於文明殿受宰臣以下起居自五鳳樓出南郊左右金吾太常兵部等司儀仗法駕鹵薄及左右内直控鶴等引從赴壇文武百官太保韓建以下班以候帝升壇告謝司天臺奏冬至日自夜半後祥風微扇帝座澄明至曉黄雲捧日丙申畋於上東門外戊戌制曰夫嚴親報本所以通神明流澤覃休所以惠黎庶斯葢邦家不易之道皇王自昔之規敢斁大猷兹惟古義粤朕受命於今三年何曽不寅畏晨興焦勞夕惕師唐虞之典上則於乾功挹殷夏之源下涵於民極欲使萬方有裕六辨無愆然而志有所未孚理有所未達致奸宄作釁旱霪為災驕將守邊擁牙旗而背義積隂馭氣陵王燭以干和載攷休徴式昭至警朕是以仰髙俯厚靡惜於責躬履薄臨淵冀昭於𤣥覽競競慄慄夙夜匪寧及夫動干戈而必契靈誅陳犧齋而克章善應苟非天垂丕佑神贊殊休則安可致夷兇渠就不戰之功變沴戾氣作有年之慶况靈旗北指喪犬羊於亂轍之間飛騎西臨下鄜翟若走丸之易息一隅之煙燧復千里之封疆而又掃蕩左馮討除峴首故得外戎内夏益知天命之攸歸喙息蚑行共識皇基之永固仰懷昭應欲報無階爰因南至之辰親展圜丘之禮兹惟大慶必及下民乃宏渙汗之私以錫叛羸之幸所冀漸増蘇息亟致和平噫朕自臨御以來歳時尚邇氛昏未殄討伐猶頻甲兵須議於餽糧飛軛頻勞於編户事非獲已慮若納隍宜所在長吏倍切撫綏明加勉諭每宫中抽差徭役禁猾吏廣歛貪求免至流散靡依凋弊不濟宜令河南府開封府及諸道觀察使切加鈐轄刺史縣令不得因縁賦歛分外擾人凡關庶獄每望輕刑只候纔罷用軍必當便議優給徳音節文内有未該者宜令所司類例條件奏聞已亥以羅周翰為天雄軍節度副使知府事從鄴王紹威請也辛丑幸穀水戊午御文明殿册太傅張宗奭太保韓建受册畢金吾仗引昇輅車儀仗導謁太廟訖赴尚書省上幸榆林坡閲兵教諸都馬步兵教改乾文院為文思院行殿為興宅殿毬塲為興安毬塲又改弓箭庫殿為宣武殿靈州奏鳯翔賊將劉知俊率邠岐秦涇之師侵廹州城帝遣陜州康懷英華州冦彦卿率兵攻廹邠寧以緩朔方之冦五代春秋十一月秦人來侵靈州陜州康懷英侵秦克寧慶衍三州秦人來襲懷英兵敗於昇平十二月乙丑臘較獵於甘泉驛以蒲州肇迹之地且因經畧鄜延於是巡幸數月暇日㳺豫至焦梨店頗述前事念王重榮舊功下詔褒奬而封崇之國子監奏創造文宣王廟仍請率在朝及天下現任官僚俸錢每貫每月尅一十五文充土木之植允之是歳以所率官僚俸錢修文宣王廟福建節度使王審知奏捨錢造寺一所請賜寺額勅名大梁萬歳之寺仍許度僧四十九人贈牢牆使王仁嗣司空故同州押衙史肇右僕射押衙王彦洪髙漢詮丘奉言仇瓊並刑部尚書王筠御史司憲初劉知俊將叛謀會諸將詢所宜仁嗣等持正不撓悉罹其酷至是褒贈之劉守光上言於薊州西與兄守文戰生擒守文開平四年正月壬辰朔帝御朝元殿受百官稱賀用禮樂也勅公事難於稽遲居處悉皆遙逺其逐日當直中書舍人及吏部司封知印郎官少府監及篆印文兼書冩告身人吏等並宜輪次於中書側近宿止乙未帝出師子門至榆林坡下閲教壬寅幸保寧毬塲錫宴宰臣及文武百官賜宰臣張宗奭已下分物有加賜廣王分物賜湖南開元寺禪長老可復號惠光大師仍賜紫衣二月乙丑幸甘水亭出師子門幸榆林東北陂教諸軍兵事賜潞州投歸軍使張行恭錦服銀帶竝食戊辰宴於金鑾殿甲戌以春時無事頻命宰臣及勲戚宴於河南府池亭辛已楊師厚赴鎮於陜寒食假諸道節度使郡守勲臣競以春服賀又連清明宴以鞍轡馬及金銀器羅錦進者迨千萬乃御宣威殿宴宰臣及文武官四品以上已丑出光政門至穀水觀麥一月壬辰幸崇政院宴勲臣已亥幸天驥院宴侍臣壬寅幸甘水亭宴宰臣勲戚翰林學士辛亥宴宰臣於内殿丙辰於興安毬塲大饗六軍樂春時也四月壬戌詔曰追養以禄王者推歸厚之恩欲靜而風人子抱終身之感其以刑部尚書致仕張筞及三品四品常參官二十二人先世各追贈一等乙丑宴崇政院帝在藩及踐阼勵精求理深戒逸樂未嘗命堂上歌舞是日止令内妓升階擊鼓弄曲甚懽至午而罷丁卯宋州節度使衡王友諒進瑞麥一莖三穗通鑑友諒獻瑞麥帝曰豐年為上瑞今宋州大水安用此為詔除本縣令名遣使詰責友諒丙戌幸建春門閲新樓至七里屯觀麥召從官食於樓河南張昌孫及蒲同主事吏賜物各有差帝過朝邑見鎮將位在縣令上問左右或對曰宿官秩髙帝曰令長字人也鎮使捕盜耳且鎮將多是邑民柰何得居民父母上是無禮也至是勅天下鎮使官秩無髙卑位在邑令下葉縣鎮遏使馮徳武於蔡州西平縣界殺戮山賊擒首領張濆等七人以獻鎮海軍節度使錢鏐擊髙灃於湖州大敗之梟夷擒殺萬人拔其郡湖州平先是灃以州叛入淮南故詔鏐討之也五月已丑朔以連雨不止至壬辰御文明殿命宰臣分拜祠廟自朔旦至癸已内外以午日奉獻巨萬計馬三千蹄餘稱是復相率助修内壘甲辰詔曰竒邪亂正假偽奪真旣刑典之不容宜犯違而勿赦應東西兩京及諸道州府創造假犀玉真珠腰帶璧珥竝諸色售用等一切禁斷不得輒更造作如公私人家先已有者所在送納長吏對靣毁棄如行勅後有人故違必當極法仍委所在州府差人檢察收捕明行處斷魏博節度使守太師兼中書令鄴王羅紹威薨帝哀慟曰天不使我一海内何奪忠臣之速也詔贈尚書令六月已未朔詔軍鎮勿起土功七月壬子宴宰臣河南尹翰林學士兩街使於甘水亭丙辰宴羣臣於宣威殿賜物有差劉知俊攻逼夏州通鑑七月岐王與汾涇二帥各遣使告晉請合兵攻定難節度使李仁福晉王遣振武節度使周徳威將兵㑹之合五萬衆圍夏州以宣化軍留後李思安為東北靣行營都指揮使陜州節度使楊師厚為西路行營招討使福州貢方物獻桐皮扇廣州貢犀玉獻船上薔薇水時陳許汝蔡潁五州境内有蝝為災俄而許州上言有野禽羣飛蔽空旬日之間食蝝皆盡是歳乃大有秋八月車駕西征已巳㳄陜府是時憫雨且命宰臣從官分禱靈迹日中而雨翼日止帝大悦辛未老人星見是日晏本府節度使楊師厚及扈從官於行宫賜師厚帛千匹仍授西路行營招討使丙子宴文武從官軍使已下設龜兹樂賜物有差九月丁亥朔命宰臣于競赴西都祀昊天上帝於圜丘甲午至西京下詔曰朕聞厯代帝王首推堯舜為人父母孰比禹湯睿謀髙出於古先聖徳普聞於天下尚或卑躬待士屈已求賢俯仰星雲慮一民之遺逸網羅巖穴恐片善之韜藏延爵禄以徴求設丹青而訪召使其為政樂在進賢葢繇國有萬機朝稱百揆非才不治得士則昌自朕光宅中區迄今三載宵分輟寐日旰忘餐思共力於廟謀庶永清於王道而乃朝廷之内或未盡於昌言軍旅之間亦罕聞於竒䇿眷言方岳下及山林豈無英竒副我延佇諸道都督觀察防禦使等或勲髙翊世或才號知人必於塗巷之賢備察蒭蕘之士詔到可精搜郡邑博訪賢良諭之以千載一時約之以髙官美秩諒無求備惟在得人如有卓犖不羈沈潛自負通霸王之上略達文武之大綱究古今刑政之源識禮樂質文之變朕則待之不次委以非常用佐經綸豈勞階級如或一言拔俗一事出羣亦當舍短從長隨才授任大小方圓之器寧限九流温良恭儉之人難誣十室勉思薦舉勿至因循俟爾發揚慰予翹渇仍從别勅處分辛丑以乆雨命宰臣薛貽矩榮定鼎門趙光逢祠嵩岳勅魏博管内刺史比來州務竝委督郵遂使曹官擅其威權州牧同於閑冗俾循通制宜塞異端竝依河南諸州例刺史得以專達壬寅頒奪馬令先是王師擊賊獲馬多上獻至是盡止之葢欲邀其奮擊之功也乙巳王師敗蕃冦於夏州初劉知俊誘沙陁振武賊帥周德威涇原賊帥李繼鸞合步騎五萬大舉欲俯拾夏臺節度使李仁福兵力俱乏以急來告先是供奉官張漢玫宣諭在壁國禮使杜廷隠賜幣於夏及石堡寨聞賊至以防卒三百人馳入州旣而外兵圍合廷隠漢玫與指揮使張初李君用率州民防卒與仁福部分固守畫夜戮力踰月及鄜延援至大軍奮擊敗之河東邠岐賊分路逃遁夏州圍解通鑑甲申遣夾馬指揮使李遇劉綰自鄜延趨銀夏李遇等至夏州岐晉兵皆解去丙午詔曰劉知俊貴為方伯尊極郡王而乃背誕朝思竄投賊壘固神人之共怒諒天地所不容雖命討除尚稽擒戮宜懸爵賞以大功名必有忠貞咸思憤發有生擒劉知俊者賞錢千萬授節度使首級次之得孟審登者錢百萬除刺史得孫亢卓瓌劉儒張鄰等賞有差乙卯宴㑹羣臣於宣威殿舊五代史巻五
