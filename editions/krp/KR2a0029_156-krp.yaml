body:
  text: 舊五代史巻七十八宋門下侍郎參知政事監修國史薛居正等撰晉書第四髙祖紀四天福四年春正月癸卯帝御崇元殿受朝賀仗衞如式丙午召太子太師致仕范廷光宴于便殿以延光歸命之後慮懷疑懼故休假之内鍚以欵密帝謂之曰無忿疾以傷厥神無憂思以勞厥衷朕方示信于四方豈食言于汝也延光俯伏拜謝其心遂安丁未以西京副畱守龍敏為吏部侍郎戊申盗發唐閔帝陵己酉朔方軍節度使張希崇卒贈太師以澶州防禦使張從恩為樞密副使甲寅以侍衞步軍都指揮使寧江軍節度使景延廣為義成軍節度使以義成軍節度使馮暉為朔方軍節度使乙卯左諫議大夫曹國珍上言請于内外臣寮之中選才畧之士聚唐六典前後會要禮閣新儀大中統類律令格式等精詳纂集俾無漏落别爲書一部目為大晉政統從之其詳議官宜差太子少卿梁文矩左散騎常侍張允大理卿張澄國子祭酒唐汭大理少卿高鴻漸國子司業田敏禮部郎中吕咸休司勲員外郎劉濤刑部員外郎李知損監察御史郭延升等一十九人充文矩等咸曰改前代禮樂刑憲爲大晉政統則堯典舜典當以晉典革名列狀駮之曰作者之謂聖述者之謂明茍非聖明焉能述作若運因革故則事乃惟新或改正朔而變犧牲或易服色而殊徽號是以五帝殊時不相㳂樂三王異世不相襲禮至于近代率由舊章比及前朝日滋條目多因行事之失改爲立制之初或臣奏條章君行可否皆表其年月紀以姓名聚類分門成文作則莫不悉稽前典垂範後昆述自聖賢歴于朝代得金科玉條之號設亂言破律之防守而行之其來尚矣皇帝陛下運齊七政歴契千年爰從創業開基莫不積功累徳所宜直筆具載鴻猷若備録前代之編年目作聖朝之政統此則是名不正也夫名不正則言不順而媚時掠美非其實矣若翦截其辭此則是文不備也夫文不備則啓爭端而禮樂刑政于斯亂矣若改舊條而爲新制則未審何門可以刋削何事可以編聨既當革故從新又須廢彼行此則未知國朝能守不能守乎臣等同共參詳未見其可䟽奏嘉之其事遂寢辛酉以前晉昌軍節度使李周爲靜難軍節度使是日封皇第十一姝安定郡主爲延慶長公主皇第十二妹廣平郡主爲清平長公主二月辛卯改東京玉華殿爲永福殿中書上言太原潛龍莊望建爲慶長宮使相鄉望改爲龍飛鄉都尉里望改爲神光里從之丁酉宰臣馮道左散騎常侍韋勲禮部員外郎楊昭儉自契丹使廻帝慰勞備至錫賚豐厚庚子以天和節宴羣官于廣政殿賜物有差三月癸卯朔左僕射劉晌給事中盧重自契丹使廻頒賜器幣如馮道等乙賜廻鶻可汗仁美遣使供方物中有王狻猊實竒貨也丙午涇州節度使張萬進卒贈太師己未皇子開封尹鄭王重貴歸徳軍節度使兼侍衛親軍馬歩軍都指揮使劉知遠忠武軍節度使杜重威並加同中書門下平章事天平軍節度使趙在禮封衛國公庚申遣内臣趙處玭以版詔徴華山隠者前右拾遺鄭雲叟玉筍山道士羅隠之靈州戍將王彦忠據懷逺城作叛帝遣供奉官齊延祚乘驛而往彦忠率衆出降延祚矯制殺之詔齊延祚辜我誓言擅行屠戮彰殺降之罪隳示信之文宜除名決重杖一頓配流王彦忠贈官收𦵏辛酉封㢠廻鶻可汗仁美爲奉化可汗癸亥以左龍武統軍皇甫遇爲鎮國軍節度使張彦澤爲彰義軍節度使夏四月壬申朔以河中節度副使薛仁謙爲衛尉卿丙子以汝州防禦使宋彦筠為同州節度使以䕶聖左右軍都指揮使李懷忠爲侍衛親軍馬軍都指揮使領壽州忠正軍節度使以奉國左右廂都指揮使郭謹爲侍衛親軍歩軍都指揮使領州寧江軍節度使戊寅詔廢長春宫使額五代會要載原勅云同州長春宫使額宜停沿宫職務委州司制置乙卯改明徳殿為滋徳殿宫城南門同名故也以華州節度使劉遂凝爲右龍武統軍以右龍武統軍張延藴爲絳州刺史庚辰徴前右拾遺鄭雲叟爲右諫議大夫玉笥山道士羅隱之賜號希夷先生甲申以翰林學士承㫖兵部侍郎崔梲權判太常卿以端明殿學士户部侍郎和凝爲翰林學士承旨樞密院學士尚書倉部郎中司徒詡樞密院學士尚書工部郎中顔衎並落職守本官樞密副使張從恩改宣徽使初廢樞密院故也先是桑維翰免樞密之務以劉處讓代之奏議多不稱旨及處讓丁母憂遂以密院印付中書故密院廢焉戊戌以韓昭𦙍爲兵部尚書致仕馬𦙍孫爲太子賓客致仕房暠爲右驍衛大將軍致仕皆唐末帝之舊臣也戊子升永岳二州爲團練使額改湘川縣爲全州從馬希範之奏也五月壬寅朔帝御崇元殿受朝仗衛如式癸卯以左僕射劉昫兼太子太保封譙國公乙巳照順軍節度使姚彦章卒升靈州方渠鎮爲威州𨽻于靈武改舊威州爲清邊軍戊申湖南節度使馬希範加天䇿上將軍以前邠州節度使安叔千爲滄州節度使庚戌虞部郎中楊昭儉可本官知制誥辛亥置静海軍于温州從錢元瓘之請也壬子以侍御史盧價爲户部員外郎知制誥户部尚書崔檢卒甲寅詔止絶朝臣不得外州府求覔表狀奏薦交親乙卯升金州爲節鎮以懷徳軍爲使額以齊州防禦使潘瓌爲懷徳軍節度使右諫議大夫致仕鄭雲叟賜號逍遥先生仍給致仕官俸丁已以刑部尚書姚顗爲户部尚書以兵部侍郎權判太常卿事崔梲爲尚書左丞以工部侍郎任贊爲兵部侍郎以禮部尚書李懌爲刑部尚書以左丞盧詹爲禮部尚書以左散騎常侍韋勲爲工部侍郎庚申廢華清宫爲靈泉觀辛酉御史臺奏省郎知雜之時赴臺禮上軍廵邸吏之輩咸集公參赤縣府司悉呈杖印今後年深御史判雜上事欲依前例從之丙寅以鎮海軍衙内統軍上置馬歩軍都監檢校太𫝊睦州刺史陸仁章爲同平章事遥領遂州武信軍節度使以鎮海軍興武左右開道都指揮使明州刺史仰仁銓爲檢校太𫝊同平章事領宣州寧國軍節度使從錢元瓘之請也六月辛未朔陳郡民王武穿地得黃金數餅州牧取而貢之帝曰宿藏之物既非符寶不合入官命付所獲之家庚辰西京大風雨應天福門屋瓦皆飛鴟吻俱折辛卯詔禮部貢舉宜權停一年秋七月庚子朔日有食之西京大水伊洛瀍澗盡溢壞天津橋癸卯以華清宫使李頃爲右領軍衛上將軍甲辰以定州節度使皇甫遇爲潞州節度使檢校太尉以潞州節度使侯益爲徐州節度使戊申御史中丞薛融等上詳定編勅三百六十八道分爲三十一巻是日詔先令天下州郡公私鑄錢近多鉛錫相兼缺薄小弱有違條制今後私鑄錢下禁依舊法壬戌以太子少保梁文矩爲太子太保致仕閏七月庚午朔百官不入閣雨霑服故也壬申以中書侍郎平章事集賢殿大學士桑維翰爲檢校司空兼侍中相州彰徳軍節度使以彰徳軍節度使王延𦙍爲義武軍節度使尚書户部奏李自倫義居七世準勅旌表門閭先有鄧州義門王仲昭六代同居其旌表有㕔事歩欄前列屏樹烏頭正門閥閲一丈二尺二柱相去一丈柱端安瓦桶墨染號爲烏頭築雙闕一丈在烏頭之南三丈七尺夾街十有五歩槐柳成列今舉此爲例則令式不該詔王仲昭正㕔烏頭門等制不載令文又無勅命既非故事難黷大倫宜從令式秖表門閭于李自倫所居之前量地之宜高其外門門外安綽楔門外左右各建一臺高一丈二尺廣狹方正稱臺之形圬以白泥四隅漆赤其行列樹植隨其事力其同籍課役一準令文壬午濮州刺史武從諫勒歸私第受贓十五萬故也丁酉故皇子河南尹重乂妻虢國夫人李氏落髪爲尼賜名悟因仍錫紫衣法號及夏臘二十八月已亥朔河決博平甘陵大水辛丑以守司空兼門下侍郎平章事𢎞文館大學士馮道爲守司徒兼侍中封魯國公壬寅詔曰皇圖革故庻政惟新宜設規程以諧公共其中書印秖委上位宰臣一人知當戊申前兵部尚書王權授太子少𫝊致仕乙酉以天下兵馬副元帥鎮海鎮東等軍節度使檢校太師行中書令呉越王錢元瓘爲天下兵馬元帥壬子升亳州爲防禦使額依舊隸宋州丙辰司天監馬重績等進所撰新歴降詔襃之詔翰林學士承旨和凝制序命之曰調元歴九月辛未以右羽林統軍周密爲鄜州節度使癸酉升婺州爲武勝軍額丁丑宴羣臣于永福殿契丹使黙納庫來聘致牛馬大腊顛騱十四遼史會同二年正月戊申晉遣金吾衛大將軍馬從斌考功郎中劉知新來貢珍幣丙辰晉遣使謝免沿邊四州錢幣七月戊申晉遣使進犀帶閏月乙酉遣使賜晉良馬八月乙丑晉遣使貢歲幣奏輸戌亥二歲金幣于燕京已卯遥領洮州保順軍節度使鮑君福加檢校太師兼侍中判湖州諸軍事辛巳相州節度使桑維翰上言管内所獲賊人從來籍没財産請止之詔今後凡有賊人凖格律定罪不得没納家資天下諸州凖此癸未封唐許王李從益爲郇國公奉唐之祀服色旌旗一依舊制仍以西京至徳宫爲廟牲幣器服悉從官給五代會要九月勅周受龍圖立夏殷之祀唐膺鳯歴開酅介之封乃睠前朝載稽舊典宜封土宇俾奉宗祧宜以郇國三千户封唐許王李從益爲郇國公云丙戌高麗王王建遣使貢方物己丑以中書侍郎平章事李崧權判集賢殿事庚寅詔停寒食七夕重陽及十月暖帳内外羣官貢獻丙申以威勝軍節度副使羅周岳為給事中中書舎人李詳改禮部侍郎禮部侍郎吕琦改刑部侍郎刑部侍郎王松改户部侍郎户部侍郎閻至改兵部侍郎中書舎人王易簡充史館修撰判館事冬十月戊戌朔故昭信軍節度使白奉進贈太尉丙午以太常卿程遜没于海廢朝一日贈右僕射庚戌閩王王昶威武軍節度使王繼恭遣僚佐林思鄭元弼等朝貢致書于宰執無人臣之禮帝怒詔令不受所貢應諸州綱運並令林思鄭元弼等押歸本道既而兵部員外郎李知損上䟽請禁錮使人籍没綱運可之收林思等下獄丙辰谿州刺史彭士愁以錦蔣之兵與蠻部萬人掠辰澧二境湖南節度使馬希範遣牙兵拒之而退金州山賊度從讜等寇洵陽遣兵討平之十一月甲戌以太子賓客李延範為司農卿乙亥詔立唐高祖太宗及莊宗明宗閔帝五廟于洛陽丁丑祠部郎中知制誥呉承範改中書舎人充翰林學士翰林學士中書舎人竇貞固改御史中丞御史中丞薛融改尚書左丞尚書右丞王延改吏部侍郎尚書左丞崔梲改太常卿戊寅史館奏請令宰臣一人撰録時政記逐時以備撰述從之五代會要史館奏唐長壽二年右丞姚璹奏帝王謨訓不可闕文其仗下所言軍國政事令宰臣一人撰録號時政記唐明宗朝又委端明殿學士撰録逐季送付史館伏乞遵行者宜令宰臣一員撰述己卯吏部侍郎龍敏改尚書左丞己丑以太子賓客楊凝式爲禮部尚書致仕詔建錢鑪于欒川丙申諫議大夫致仕逍遥先生鄭雲叟卒十二月丁酉朔百官不入閣大雪故也己亥故皇子重英妻張氏落髪爲尼賜名悟慎并夏臘二十庚戌禮官奏來歲正旦王公上壽皇帝舉酒奏𤣥同之樂再飲奏文同之樂三飲奏同前從之歌辭不録丙辰詔今後城郭村坊不得創造僧尼院舎丁巳帝謂宰臣曰大雪害民五旬未止京城祠廟悉令祈禱了無其騐豈非涼徳不儲神休未洽者乎因令岀薪炭米粟給軍士貧民等壬戌禮官奏正旦上壽宫懸歌舞未全且請雜用九部雅樂歌教坊法曲從之舊五代史巻七十八
