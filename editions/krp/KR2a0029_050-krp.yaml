body:
  text: 舊五代史巻二十四攷證梁書列傳十四李珽傳河南有外黄小黄小黄歐陽史作下黄攷困學紀聞云五代通録李珽曰河南有外黄小黄漢地理志陳留有外黄下黄縣五代史記改小黄為下黄誤也當從通録秦有外黄都尉都尉原本作郡尉今據漢書地理志及歐陽史改正充侍講學士案歐陽史作侍講盧曽傳始為齊州防禦使朱瓊從事案新唐書通鑑與是書梁記皆稱朱瓊為齊州刺史惟此傳作防禦使疑有舛誤孫隲傳並格殺于前墀案通鑑攷異引梁實録作賜死通鑑作撲殺于前墀杜荀鶴傳旬日而卒案唐才子傳荀鶴以天祐元年卒北夢𤨏言作梁受禪後拜翰林學士五日而卒未知孰是羅隱傳羅隱餘杭人案澗泉日記作新城人因亂歸鄉里節度使錢鏐辟為從事案唐新纂羅隱初為呉令後以羅紹威薦為錢鏐所辟據是書則隱自歸里即為鏐從事後復為紹威薦也與新纂異仇殷傳殷上言太隂虧不利深入太祖遽遣使止之己敗于柏鄉矣案北夢𤨏言云柏鄉狼狽梁祖亦自咎曰違犯天道不取仇殷之言也此云太祖遽遣使止之與北夢瑣言異舊五代史巻二十四攷證
