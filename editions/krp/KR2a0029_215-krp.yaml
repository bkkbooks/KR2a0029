body:
  text: 舊五代史巻一百八宋門下侍郎參知政事監修國史薛居正等撰漢書第十列傳五李崧深州饒陽人父舜卿本州錄事參軍崧幼而聰敏十餘歳為文家人竒之弱冠本府署為參軍其父嘗謂宗人李鏻曰大醜生處形竒氣異前途應不居徒勞之地頼吾兄誨激之大醜即崧之小字也同光初魏王繼岌為興聖宮使兼領鎮州節鉞崧以參軍從事時推官李蕘掌書崧見其起草不工密謂掌事吕柔曰令公皇子天下瞻望至於尺牘徃來章表論列稍須文理合冝李侍御起草未能盡善呂曰公試代為之呂得崧所作示盧質馮道皆稱之繇是擢為興聖宮巡官獨掌奏記莊宗入洛授太常寺協律郎王師代蜀繼岌為都統以崧掌書記蜀平樞密使郭崇韜為宦官誣搆繼岌遂殺崇韜父子外尚未知崧白繼岌曰王何為作此危事至於不容崇韜至洛誅之未晚今懸軍五千里無咫尺書詔便殺重臣非謀也繼岌曰吾亦悔之崧召書吏三四人登樓去梯取黄紙矯寫詔書倒使都統印𤼵之翌日告諸軍軍情稍定及自蜀還明宗革命任圜以宰相判三司用崧為鹽鐵推官賜緋丁内艱歸鄉里服闋鎭帥范延光奏署掌書記延光為樞密使拜拾遺直樞密院遷補闕起居郎尚書郎充職如故長興末改翰林學士清泰初拜端明殿學士户部侍郎先士長興三年冬契丹八雲中朝廷欲命重將鎭太原時晉祖為六軍副使以秦王從榮不軌懇求外任深有北門之望而大臣以晉髙祖方握兵柄難以議之一日明宗怒其未奏范延光趙延壽等無對退歸本院共議其事方欲以康義誠為之時崧最在下位聳立請曰朝廷重兵多在北邊須以重臣為師以某所見非石太尉不可也㑹明宗令中使促之衆乃從其議翌日晉祖既受太原之命使心腹達意於崧云壘浮圖須與合郤尖葢感之深也及清㤗末晉祖入洛崧與呂琦俱竄匿於伊闕民家旬日晉髙祖召為户部侍郎判户部踰月拜中書侍郎同平章事與桑維翰並兼樞密使維翰鎮相州未幾廢樞密院事歸中書加尚書右僕射從幸鄴丁外艱恩制起復崧上章數四懇辭其命優詔不允復上章不報崧不得已而視事晉少帝嗣位復用桑維翰為樞密使命崧兼判三司未幾代維翰為樞密使與馮玉對掌機密開運末崧王信契丹之詐經畧瀛鄚中渡之敗落其姦謀契丹入京師趙延壽張礪素稱崧之才契丹主善遇之以崧為太子太師充樞密使契丹主嘗謂左右曰我破南朝秪得李崧一人而已從契丹北行留於鎮州髙祖平汴洛乃以崧之居第賜蘇逄吉第中宿藏之物皆為逄吉所有其年秋鎭州逐滿達勒崧與馮道和凝十數人歸闕授太子太𫝊崧對朝之權右謙挹承顔未嘗忤㫖嘗以宅劵獻蘇逄吉不悦崧二弟嶼嶬酣酒無識與楊邠蘇逢吉子弟杯酒之間時言及奪我居第逄吉知之宋史陶榖傳李崧以宅券獻逄吉不悦而菘子弟數出怨言崧懼移疾不岀崧族子昉嘗徃候崧崧語昉曰邇來朝廷于我有何議昉曰無他聞唯陶給事徃徃於稠人中厚誣叔父崧嘆曰榖自單州判官吾取為集賢校理不數年擢掌詔命吾何負於陶氏子哉及崧遇禍昉嘗因公事詣榖榖問昉識李侍中否昉斂衽應曰逺從叔耳穀曰李氏之禍榖出力焉昉聞之汗出有部曲葛延遇者逋李嶼船傭嶼撻之督其所負遇有同輩李澄亦事逄吉葛延遇夜寄宿于澄家以嶼見督情告遂一夕同謀告變逄吉覽狀示史𢎞肇其日逄吉遣吏召崧至第從容語及葛延遇告變之事崧以幼女為託逄吉遣吏送于侍衛獄既行崧恚曰自古未有不亡之國不死之人及為吏所鞫乃自誣伏罪舉家遇害少長悉尸於市人士冤之東都事畧王漙傳世宗嘗問漢相李崧蠟彈書結契丹有記其詞者否漙曰崧有此肯示人耶蘇逄吉輩䧟之耳世家遂優贈崧官崧與徐台符同學相善乾祐三年秋台符夣崧謂曰予之冤横得請于帝矣及蘇史之誅並梟首于市當崧所誅之地未幾葛延遇李澄亦以戮死宋史李昉傳晉侍中崧與昉同宗且同里時人謂崧為東李家昉為西李漢末崧被誅至宋其子璨自蘇州常熟縣令赴調昉為訟其父冤且言周太祖已為昭雪贈官還其田宅錄璨而官之然璨幾五十尚淹州縣之職詔授璨著作佐郎後官至資善大夫蘇逢吉長安人父悅逢吉母早喪而恱鰥居旁無侍者性嗜酒雖所飲不多然潄醪終日佗人供膳皆不稱㫖俟逢吉庖彖方肯下筯悅初仕蜀官升朝列逢吉初學為文嘗代父染翰悦嘗為髙祖從事甚見禮遇因從容薦逢吉曰老夫耄矣才噐無取男逢吉粗學援毫性復恭恪如公不以㹠犬之㣲願令事左右髙祖召見以神精爽惠甚憐之有頃擢為賓佐凡有謀議立侍其側高祖素嚴毅及鎮太原位望崇重從事稀得謁見惟逢吉日侍左右兩使文簿堆案盈几左右不敢輙通逢吉置於懐袖俟其恱色則諮之多見其可髙祖建號於太原逢吉自節度判官拜同平章事集賢殿大學士車駕至汴朝廷百司庶務逢吉以為已任參決處置並出胷臆雖有當有否而事無留滯㑹翰林學士李濤從容侍帝言及霸府二相官秩未崇逢吉旋加吏部尚書未幾轉左僕射監修國史從征杜重威於鄴下數乘醉抵辱周太祖及髙祖大漸與楊邠史𢎞肇等卧内同受顧命李濤與逢吉論甥舅之契相得甚歡濤之入相逢吉甚有力焉㑹濤上章請出兩樞密為方鎮帝怒罷濤相勒歸私第時論疑濤承逢吉之風旨先是髙祖踐阼之後逢吉與蘇禹珪俱在中書有所除拜多違舊制用捨升䧏率意任情至有自白丁而升宦路由流外而除令錄者不可勝數物論紛然高祖方倚信二相莫敢言者尤貪財貨無所顧避求進之士稍有物力者即遣人㣲露風旨許以美秩及楊邠為相稍奪二蘇之權自是盡斂手而已邠每懲二蘇之失艱於除拜至於諸司補吏與門胄出身一切停罷時論以邠之蔽固亦由逢吉禹珪本不能至公於物之所致也初高祖至汴以故相馮道李崧為契丹所俘竚于眞定乃以崧第賜逢吉道第賜禹珪崧於西洛有别業亦為逢吉所有及眞定逐契丹崧道歸朝崧弟嶼以逢吉占據其第時出怨言未幾崧以西京宅劵獻於逢吉不悦㑹崧有僕夫欲誣告謀反逢吉誘致其狀即告史𢎞肇令逮捕其家逢吉遣直省吏召崧至第即令監至侍衞獄翌日所司以獄辭上其李嶼疑招云與兄崧弟㠖與家僮二十人商議比至山陵𤼵引之時同放火謀亂其告是實葢自誣之辭也逢吉仍以筆添注二十人字為五十人封下有司盡誅崧家時人冤之歸咎於逢吉逢吉深文好殺從高祖在太原時嘗因事髙祖命逢吉静獄以祈福祐逢吉盡殺禁囚以報及執朝政尤愛刑戮朝廷患諸處盗賊遣使捕逐逢吉自草詔意云應有賊盜其本家及四隣同保人並仰所在全族處斬或謂逢吉曰為盗者族誅猶非王法隣保同罪不亦甚乎逢吉堅以為是僅去全族二字時有鄆州捕賊使臣張令柔盡殺平隂縣十七村民良由此也逢吉性侈靡好鮮衣美食中書供膳鄙而不食私庖供饌務盡甘珍嘗於私第大張酒樂以召權貴所費千餘緡其妻武氏卒葬送甚盛班行官及外州節制有與逢吉相欵洽者皆令齎送綾羅絹帛以備縞素失禮違度一至如此又性不拘名教繼母死不行服妻死未周其子並授官秩有庶兄自外至不白逢吉便見諸子逢吉怒且懼他日凌弱其子息乃密白髙祖誣以他事杖殺之乾祐二年秋加守司空周太祖之將鎮鄴也逢吉奏請落樞密使隱帝曰有前例否逢吉奏曰樞密之任方鎮帯之非便史𢎞肇曰兼帯樞密所冀諸軍禀畏竟從𢎞肇之議𢎞肇怨逢吉之異巳逢吉曰此國家之事也且以内制外則順以外制内豈得便耶事雖不從物議多之居無何王章張飲㑹逢吉與史𢎞肇有謔言大為𢎞肇所詬逢吉不校幾至歐擊逢吉馳馬而歸自是將相失歡逢吉欲希外任以紓𢎞肇之怒既而中輟人問其故逢吉曰茍領一方鎭秪消得史公一處分則為虀粉矣李業輩惡𢎞肇楊邠等逢吉知之每見業等即微以言激怒之及𢎞肇等被害逢吉不預其謀聞變驚駭即受宣徽使知樞密院事尋令草制正授制入聞鄴兵至澶州乃並事急逢吉謂人曰蕭牆之變太覺匆遽主上若有一言見問必不至是矣數夕宿于金祥殿之東謂天官正王處訥曰夜來就枕未瞑巳見李崧在傍生人與死人相接無吉事也及周太祖自鄴至汴官軍敗於劉子陂是夕逢吉宿於七里郊與同舍痛飲醉將自刎左右止之至曙與隱帝同抵民舍遂自殺周太祖定京城與聶文進等同梟於北市釋其家族其梟首之處適當李松冤死之地廣順初詔就西京賜其子莊宅各一區五代史補髙祖在河東幕府闕書記朝廷除前進士丘廷敏為之以髙祖有異志恐為所累辭疾不赴遂改蘇逢吉未幾契丹南侵高祖伏順而起兵不血刄而天下定逢吉以佐命功自掌書記拜中書侍郎平章事逾年廷敏始選授鳯翔麟遊縣令過堂之日逢吉戯之且撫所坐椅子曰合是長官坐何故讓與鄙夫耶廷敏遂慚悚而退李鏻唐宗屬也父洎韶州刺史伯父湯咸通中為給事中懿宗除乳母楚國夫人聓為夏州刺史湯封還制書詔曰朕少失所親若非楚國夫人鞠養則無朕此身雖非朝典望卿放下仍今後不得授以為例湯乃奉詔其諒直如此鏻少舉進士累舉不第客遊河朔稱清海軍掌書記謁定州王處直不見禮鏻即脱綠被緋入常山謁要人李𢎞規以宗姓請兄事之由是得進趙王鎔辟為從事鎔卒復為王徳明賓客徳明使鏻聘於唐莊宗鏻密疏徳明之罪且言可圖之狀莊宗嘉之及常山平以鏻為霸府支使嘗從容請於莊宗曰鏻有四子請誅之莊宗問其故對曰此輩生於常山稟勃亂之氣不可留也莊宗笑而止同光初授宗正卿俄兼工部侍郎常山有唐啟運陵鏻受富民李守恭賂署為陵臺令守恭暴横為長吏所訴按之以聞鏻左授司農少卿削金紫未幾出為河府副使明宗即位歴兵部户部侍郎工部户部尚書長興中以與明宗有舊常貯入相之意從容謂時相曰唐祚中興宜敦敘宗室才髙者合居相位僕雖不才曾事莊宗霸府見今上於藩邸時家代重侯累相靖安李氏不在諸族之下論才較藝何讓衆人乆眞僕於朝行諸君安乎馮道趙鳳每怒其僭有頃鏻因淮南細人言事乃謂樞密使安重誨曰偽呉欲歸國乆矣若朝廷先遣使諭之則旋踵而至矣重誨然之以玉帯與細人令徃淮南為信乆而不反由是出鏻為兖州行軍司馬得代歸闕復為户部尚書尋轉兵部尚書有頃兼判太常卿事嘗權典選部銓綜失序物論非之晉天福中守太子少保開運中遷太子太保髙祖至闕授守司徒數月而卒時年八十八詔贈太𫝊龍敏字欲納幽州永清人少學為儒仕鄉里為假掾劉守光不道敏避地浮陽㑹戴思逺渡河而南乃從之鄉人周知裕任梁為禆將敏徃依焉知裕屢薦不調敏丐遊都邑累年唐莊宗定魏博敏聞故人馮道為霸府記室乃客於河中歳歸太原館於馮道之家監軍使張承業即署敏為巡官典監軍奏記莊宗平河洛徴為司門員外郎以家貧乏養求為興唐少尹踰年丁母喪退居鄴下㑹趙在禮據鄴城以敏鄉人强起令署事又為亂軍所廹敏不敢拒明年在禮鎮浮陽敏復居喪制服闋除户部郎中改諫議大夫御史中丞時敏父咸式年七十咸式之父年九十餘供養二尊朝夕無懈咸式以敏貴得祕書監致仕敏為兵部侍郎奉使幽州鄉里耆舊留宴盡歡馮贇為北京留守奏敏為副贇入掌樞密敏為吏部侍郎敏學術不甚長然外柔而内剛愛决斷大計清㤗末從唐末帝在懐州時趙徳鈞父子有異圖晉安砦旦夕憂䧟末帝計無從出問計於從臣敏奏曰臣有一計請以援兵從東丹王李贊華取幽州路趨西樓契丹主必有北顧之患末帝然之而不能用敏又謂末帝親將李懿曰君連姻帝戚社稷之危不俟翹足安得黙黙茍全耶懿因籌徳鈞必破蕃軍之狀敏曰僕燕人也諳趙徳鈞之為人膽小謀拙所長者守城砦嬰壕塹篤勵徤兒耳若見大敵奮不顧身摧堅䧟陣必不能矣况名位震主姦以謀身乎僕有狂䇿不知濟否茍能必行亦救寨之一術也懿請言之曰如聞駕前馬僅五千匹請于其間選壯馬精甲健夫千人僕願與郎萬金二人通鑑郎萬金為陳州刺史胡三省云萬金當時勇將也由介休路出山夜冐敵騎循山入大砦千騎之内得其半濟則砦無虞矣張敬達等幽閉不知朝廷援兵近逺若知大軍在團栢谷中鐵障亦可衝踏况敵騎乎末帝聞之曰龍敏之心極壯用之晚矣人亦以為大言然其慷慨感激皆此類也晉祖受命敏以本官判户部遷尚書左丞丁父憂服闋復本官俄移太常卿開運中奉命使越先是朝臣將命必拜起於浙帥敏至抗揖而已識者多之使還改工部尚書乾祐元年春疽𤼵于背聞髙祖晏駕乃扶病於秘第縞素而臨後旬日卒于家時年六十三隱帝嗣位詔贈右僕射劉鼎字公度徐州蕭縣人祖㤗蕭縣令父崇梁太祖微時常傭力崇家及即位召崇用之歴殿中監商州刺史崇之母撫梁祖有恩梁氏號為國婆徐宋之民謂崇家為拳龍劉家鼎起家為大理評事歴尚書博士殿中侍御史起居郎清㤗中自吏部員外郎出為渾州亷判入為刑部郎中充鹽鐵判官改吏部郎中兼侍御史知雜事乾祐初拜諫議大夫卒年五十五鼎善交遊能談笑居家仁孝事繼母趙氏甚謹異母昆仲凡七人撫之如一性若寛易而典選曹按吏有風稜人稱為能子衮登進士第文彩遒儁仕周為左拾遺直史館早卒張允鎭州束鹿人父徴允㓜學為儒仕本州為參軍張文禮之據州叛莊宗致討允随文禮子處瑾請降于鄴不允與處瑾並繫于獄鎭冀平宥之留于鄴署本府功曹趙在禮嬰城叛署節度推官從歴滄兖二鎮書記入為監察御史歴右補闕起居舍人充𢎞文館直學士水部員外郎知制誥清㤗初皇子重美為河南尹典六軍諸衞事時朝廷選參伍以允剛介改給事中充六軍判官尋罷職轉左㪚騎常侍晉天福初允以國朝頻有肆赦乃進駮赦論曰管子云凡赦者小利而大害乆而不勝其禍無赦者小害而大利乆而不勝其福又漢紀云呉漢疾篤帝問所欲言對曰唯願陛下無為赦耳如是者何葢行赦不以為恩不行赦亦不以為無恩為罰有罪故也竊觀自古帝王皆以水旱則降徳音而宥過開狴牢以放囚冀感天心以救其災者非也假有二人訟一有罪一無罪若有罪者見捨則無罪者銜冤銜寃者彼何疎見捨者此何親乎如此則是致災之道非救災之術也自此小民遇天災則喜皆相勸為惡曰國家好行赦必捨我以救災如此即是國家教民為惡也且天道福善禍淫若以捨為惡之人而便變災為福則又是天助其惡民也細而救之必不然矣儻或天降之災盖欲警誡人主節嗜欲務以儉恤鰥寡正刑罰不濫捨有罪不僭殺無辜使美化行于下聖徳聞于上則雖有水旱亦不為殄矣豈勤濫捨有罪而反能救其災乎彰其徳乎是知赦之不可行也明哉帝覽而嘉之降詔奬飾仍付史館五年遷禮部侍郎凡三典貢部改御史中丞轉兵部侍郎知制誥充翰林學士承㫖契丹入京城落職守本官東都事畧劉温叟傳契丹入京師温叟懼隨契丹北徙與承㫖張允求去職契丹主怒欲黜為縣令趙延夀曰學士不稱職而求解者罷之可也得不黜乾祐初授吏部侍郎自誅史𢎞肇後京城士庶連薨恐悚允每朝退即宿于相國寺僧舍及北敵入京師允匿于佛殿藻井之上墜屋而卒時年六十五子鸞仕皇朝為太常少卿任延皓并州人也業術數風雲之事晉髙祖在太原重圍時髙祖最為親要延皓以本業請見髙祖甚加禮遇晉天福初延皓授太原掾尋改交城文水令皆髙祖慰薦之力也髙祖鎭太原延皓多言外事出入無間髙祖左右皆憚之在文水聚斂財賄民欲陳訢延皓知之一日光誣告縣吏結集百姓欲刼縣庫髙祖怒遣騎軍併擒縣民十數族誅之冤枉之聲聞于行路髙祖即位累官至殿中監恃寵使氣人望而畏之雖宰輔之重延皓視之蔑如也劉崇在河東日常切齒及魏王承訓甍歸葬太原令延皓擇葬地時有山岡僧謂劉崇曰魏王葬地不吉恐有重喪未幾髙祖崩崇以僧言奏之乃配流延皓于麟州路由文水市民擲瓦歐罵甚衆吏人救之僅免既至貶所劉崇令人殺之籍没其家史臣曰李崧仕唐晉之兩朝聳伊臯之重望考其器業無忝台衡㑹多僻之朝被慘夷之戮人之不幸天亦難忱逄吉秉蛇虺之心竊䕫龍之位殺人不忌與國倛亡李崧之冤血未銷逢吉之梟首斯至𡨕報之事安可忽諸自李鏻而下凡數君子者皆踐履朝行彰施帝載國華邦直斯焉在哉惟延皓之醜行宜乎不得其死矣舊五代史巻一百八
