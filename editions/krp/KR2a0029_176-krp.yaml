body:
  text: 舊五代史卷八十八宋門下侍郎參知政事監修國史薛居正等撰晉書第十四列傳三景延廣字航川陜州人也父建累贈太尉延廣少習射以挽强見稱梁開平中卲王朱友誨節制于陜召置麾下友誨坐謀亂延廣竄而獲免後事華州連帥尹皓皓引薦列校隸于汴軍從王彦章拒莊宗于河上及中都之敗彦章見擒而延廣被數創歸于汴唐天成中明宗幸夷門會朱守殷拒命尋平之延廣以軍校連坐將棄市高祖時為六軍副使掌其事見而惜之乃宻遣遁去尋収為客將及張敬逹之圍晉陽高祖付以戎事甚有干城之功高祖卽位授侍衛步軍都指揮使檢校司徒遥領果州團練使轉檢校太保領夔州節度使四年出鎮滑臺五年加檢校太保移鎮陜府六年召為待衛馬步都虞候移鎮河陽七年轉侍衛親軍都指揮使檢校太尉其年夏高祖晏駕延廣與宰臣馮道等承顧命以少帝為嗣旣發喪都人不得偶語百官赴臨未及内門皆令下馬由是有驕暴之失少帝旣嗣位延廣獨以為已功尋加同平章事彌有矝伐之色朝廷遣使告哀契丹無表致書去臣稱孫契丹怒遣使來讓延廣乃奏令契丹㢠廻國使喬榮契丹國志先是河陽牙將喬榮從趙延壽入遼遼帝以為囘國使置邸大梁至是景延廣説帝囚榮于獄凡遼國貿易在晉境者皆殺之奪其貨大臣皆言遼國不可負乃釋榮慰賜而歸之告戎王曰先帝則北朝所立今上則中國自策為隣為孫則可無臣之理且言晉朝有十萬口横磨劍翁若要戰則早來他日不禁孫子則取笑天下當成後悔矣由是與契丹立敵干戈日尋初高祖在位時宣借楊光遠騎兵數百延廣請下詔遣還光逺由此忿延廣怨朝廷遣使汎海搆釁天福八年十二月契丹乃南牧九年正月䧟甘陵河北儲蓄悉在其郡少帝大駭親率六師進駐澶淵延廣為上將凢六師進退皆出胷臆少帝亦不能制衆咸憚而忌之契丹旣至城下使人宣言曰景延廣喚我來相殺何不急戰一日高行周與蕃軍相遇于近郊以衆寡不敵急請濟師延廣勒兵不出是日行周幸而獲免及契丹退延廣猶閉柵自固士大夫曰昔與契丹絶好言何勇也今契丹至若是氣何憊也時延廣在軍母凶問至自澶淵津北移于津南不信宿而復莅戎事曽無戚容下俚之士亦聞而惡之時有太常丞王緒者因使徳州㢠廻與延廣有隙因誣奏與楊光逺通謀遣吏縶于麾下鍜成其事判官盧億累勸觧不從尋有詔棄市時甚寃之少帝還京嘗幸其第進獻錫賚有如酬酢權寵恩渥為一朝之冠俄與宰臣桑維翰不恊少帝亦憚其難制遂罷兵權出為洛都畱守兼侍中由是鬱鬱不得志亦意契丹强盛國家不濟身將危矣但縱長夜飲無復以夾輔為意宋史盧多遜傳父億景延廣鎮天平表億掌書記畱守西路又為判官時周用窘乏取民財以助軍河南府畱守二十萬緡延廣欲並縁以圖羡利増為三十七萬緡億諫曰公位兼將相旣富且貴今國帑空竭不已而取貲于民公何忍利之乎延廣乃慚而止開運三年冬契丹渡滹水詔遣屯孟津將戒途由府署正門而出所乘馬騰立不進幾墜于地乃易乘而行時以為不祥之甚及王師䧏契丹延廣狼狽而還時契丹主至安陽遣别部隊長率騎士數千與晉兵相雜趨河橋入洛以取延廣戒曰如延廣奔呉走蜀便當追而致之時延廣顧慮其家未能引决契丹旣奄至乃與從事閻丕輕騎謁契丹主于封兵與丕俱見縶焉遼史將軍康祥執景延廣來獻延廣曰丕臣之從事也以職相隨何罪而亦為縲囚契丹釋之因責延廣曰致南北失歡良由爾也乃召喬榮質證前事凢有十焉始榮將入蕃時紿延廣云其恐忽忘所逹之語請于翰墨延廣信之乃命吏備記其事榮亦檢巧善人者也慮他日見詰則執之以取信因匿其文于衣中至是延廣始以他語抗對榮乃出其文以質之延廣頓為所屈毎一事則受牙籌一莖此契丹法也延廣受至八巠但以面伏地契丹遂咄之命鏁延廣臂將送之死北土是日至于陳橋民家草舍延廣懼燔灼之害至夜分伺守者怠則引手自扼其吭尋卒焉雖事巳窮頓人亦壯之時年五十六東都事畧昝居潤嘗為樞宻院小吏景延廣畱守西京補為右職契丹犯京師以兵圍延廣家故吏悉避去居潤為全䕶其家時論頗稱之漢高祖登極詔贈中書令延廣少時嘗泛洞庭湖中流阻風波檣且折衆大恐頃之舟人指波中曰賢聖來䕶此必有貴人矣尋獲濟焉竟位至將相非偶然也李彦韜太原人也少事邢州節度使閻寳為皂隸寳卒高祖収于帳下及起義以少帝留守北京因留彦韜為腹心厯客將牙門都校以纎巧故厚承委用及少帝嗣位授蔡州刺史入為内客省使宣徽南院使未㡬遥領夀州節度充侍衛馬軍都指揮使檢校太保俄改陳州節度使典軍如故毎在帝側升除將相但與宦官近臣締結致外情不通陷君于危亡之地嘗謂人曰朝廷所設文官將何用也且欲澄汰而除廢之則可知其輔弼之道也及契丹犯闕遷少帝于開封府一日少帝遣人急召彦韜將與計事彦韜辭不赴命少帝怏恨乆之其負國辜君也如是及少帝北遷戎王遣彦韜從行泊至蕃中隸于國母帳下永康王舉兵攻國母以偉王為前鋒國母𤼵兵拒之以彦韜為排陣使彦韜䧏于偉王偉王置之帳下其後卒于幽州張希崇字徳峯幽州薊縣人也父行簡假薊州玉田令希崇少通左氏春秋復癖于吟詠天祐中劉守光為燕帥性慘酷不喜儒士希崇乃擲筆以自效守光納之漸升為禆將俄而守光敗唐莊宗命周徳威鎮其地希崇以舊籍列于麾下尋遣率偏師守平州案巴堅南攻䧟其城掠希崇而去案巴堅詢希崇乃知其儒人也因授元帥府判官後遷盧龍軍行軍司馬繼改蕃漢都提舉使天成初契丹平州節度使盧文進南歸契丹主以希崇繼其任遣腹心總邊騎三百以監之希崇莅事數歳契丹主漸加寵信一日登郡樓私自計曰昔班仲升西戍不敢擅還以承詔故也我今入關斷自胷臆何恬于不測之地而自滯耶乃召漢人部中之翹楚者曰我䧟身此地飲酪被毛生不見其所親死為窮荒之鬼南望山川度日如歳爾輩得無思鄉者乎部曲皆泣下沾衣且曰明公欲全部曲南去善則善矣如敵衆何歐陽史作麾下皆言兵多不可俱亡因勸希崇獨去希崇曰俟明日首領至牙帳則先擒之契丹無統領其黨必㪚且平州去王帳千餘里待報至徴兵踰旬方及此則我等已入漢界深矣何用以衆少為病衆大喜是日希崇牙郡齋之側坎隙地貯石灰明旦首領與羣從至希崇飲以醇酒數鍾旣醉悉投于灰穽中斃焉其徒營于北郭遣人攻之皆潰圍奔去希崇遂以營内生口二萬餘南歸唐明宗嘉之授汝州防禦使希崇旣之任遣人迎母赴郡母及境希崇親肩板輿行三十里觀者無不稱歎厯二年遷靈州両使畱後先是靈州戍兵歳軍糧經五百里有剽攘之患希崇乃告諭邊士廣務屯田歳餘食大濟壐書褒之因正授旄節清泰中希崇厭其雜俗頻表請覲詔許之至闕未乆朝廷以安邊有聞議内地處之改邠州節度使及高祖入洛于契丹方有要盟盧其為所取乃復除靈武希崇歎曰我應老于邊城賦分無所逃也因鬱鬱不得志乆而成疾卒于任時年五十二希崇自小校累官至開府儀同三司檢校太尉三厯方面封清河郡公食邑三千户賜靖邊奉國忠義功臣亦人生之榮盛者也歐陽史贈太師希崇素朴厚尤嗜書莅事之餘手不釋巻不好酒樂不蓄姫僕祁寒盛暑必儼其衣冠厮養之輩未嘗聞䙝慢之言事母至謹毎食必侍立俟盥漱畢方退物議高之性雖仁恕或遇姦惡則嫉之若仇在邠州日有民與郭氏為義子自孩提以至成人因愎戾不受訓遣之郭氏夫婦相次俱死郭氏有嫡子已長時郭氏諸親與義子相約云是親子欲分其財物助而訟之前後數鎮不能理遂成疑獄希崇覽其訢判云父在已離母死不至止稱假子孤二十年撫養之恩儻曰親兒犯三千條悖逆之罪頗為傷害名教安敢理認田園其生涯並付親子所訟人與朋姦者委法官以律定刑聞者服其明希崇亦善觀象在靈州日見月掩畢口大星經月復爾乃歎曰畢口大星邊將也月再掩之吾其終歟果卒于郡子仁謙為嗣厯引進副使王庭𦙍字紹基其先長安人也祖處存定州節度使父鄴晉州節度使庭𦙍唐莊宗之内表也性勇剽狡捷鷹瞬隼視喑嗚䀝睚則挺劍而不顧少為晉陽軍校以攻城野戰為務暑不息嘉樹之䕃寒不處宻室之下與軍伍食不異味居不異適故莊宗于親族之中獨加禮遇莊宗明宗朝累厯貝忻宻澶濕相六州刺史國初范延光據鄴稱亂高祖以庭𦙍累朝宿將詔為魏府行營中軍使兼貝州防禦使城䧏賞勞授相州節度使尋移鎮定州節度使處直則庭𦙍之叔祖也處直為養子都所篡時北走契丹契丹納之至是契丹遣使諭高祖云欲使王威襲先人土地如我蕃中之制高祖答以中國將校自刺史團練防禦使序遷方授旄節請遣威至此任用漸令升進乃合中土舊規戎王深怒其見拒使人復報曰爾自諸侯為天子有何階耶高祖畏其滋蔓則厚賂力拒其命契丹怒稍息遂連升庭𦙍俾鎮中山且欲塞其意也少帝嗣位改滄州節度使累官至檢校太尉開運元年秋卒于位年五十四贈中書令有子五人長曰昭敏仕至金吾將軍卒史匡翰字元輔鴈門人也父建瑭事莊宗為先鋒將敵人畏之謂之史先鋒累立戰功唐書有𫝊匡翰起家襲九府都督厯代州遼州副使檢校太子賔客同光初為嵐憲朔等州都逰奕使改天雄軍牢都指揮使再加檢校户部尚書領潯州刺史天成中授天雄軍步軍都指揮使歳餘遷侍衛彰聖馬軍都指揮使高祖有天下改授檢校司空懐州刺史其妻魯國長公主卽高祖之妹也尋轉控鶴都揮使兼和州刺史駙馬都尉俄授檢校司徒鄭州防禦使未幾遷義成軍節度滑濮等州觀察處置管内河隄等使丁母憂尋起復本鎮案陶榖撰匡翰碑文云圃田待理漢殿掄才功臣旌國佐之名出守奉專城之寄蓋鄭州卽在義成軍營内匡翰雖遷官不離本鎮也匡翰剛毅有謀畧御軍嚴整接下以禮與部曲語未嘗稱名厯數郡皆有政聲陶榖碑文云齋壇峻而金鼔嚴麻案宣而曲幢出控梁苑之西郊殷孚威望撫國僑之遺俗綽有政聲尤好春秋左氏傳毎視政之暇延學者講説躬自執巻受業焉時發難問窮于隠奥流輩或戯謂史三傳旣自端謹不喜人醉幕客有關徹者狂率酣醟一日使酒怒目謂匡翰曰明公昔刺覃懷與徹主客隨至事無不可今領節鉞數不相容且書記趙礪險詖之人也脅肩諂笑黷貨無厭而明公待之甚厚徹今請死近聞張彦澤臠張式未聞匡翰斬關徹恐天下談者未有比類匡翰不怒引滿自罰而慰勉之其寛厚如此天福六年白馬河决匡翰祭之見一犬有角浮于水心甚惡之後數日遘疾而卒于鎮年四十詔贈太保子彦客厯宫苑使湊單宿三州刺史梁漢顒太原人也少事後唐武皇初為軍中小校善騎射勇于格戰莊宗之破劉仁恭王德明及與梁軍對壘于德勝皆預其戰累功至龍武指揮使檢校司空梁平授檢校司徒濮州刺史同光三年魏王繼岌統軍伐蜀以漢顒為魏王中軍馬步都虞候天成初授許州馬兵畱後檢校太保尋為邠州節度使歳餘加檢校太傳充威勝軍節度唐鄧等州觀察處置等使在鎮二年移鎮許州長興四年夏以眼疾授太子少師致仕高祖素與漢顒有舊及卽位之初漢顒進謁再希任使除左威衛上將軍天福七年冬以疾卒于洛陽年七十餘贈太子太保楊恩權邠州新平人也梁乾化初為軍校貞明二年轉弓箭指揮使檢校左僕射累遷控鶴右第一軍使唐莊宗平梁補右廂夾馬都指揮使天成初遷右威衛將軍加檢校司空會秦王從榮鎮太原明宗乃以馮贇為副畱守以思權為北京歩軍都指揮使以佐佑之從榮幼驕狠不親公務明宗乃遣紀綱一人素善從榮者與之逰處俾從容諷導之嘗私謂從榮曰河南相公恭謹好善親禮端士有老成之風相公處長更宜自勵勿致聲聞在河南之下從榮不悦因告思權曰朝廷人皆推從厚共非短我吾將廢棄矣思權曰請相公勿憂萬一有變但思權在處有兵甲足以濟事乃勸從榮招置部曲調弓礪矢陰為之備思權又謂使者曰朝廷教君伴相公終日言弟賢兄弱何也吾輩苟在豈不能與相公為主耶使者懼告贇贇乃宻奏之明宗乃詔思權赴京師以奏王之欲亦弗之罪也長興末為右羽林都指揮使遣戍興元閔帝嗣位奉詔從張䖍釗討鳯翔洎至岐下思權首倡倒戈以攻䖍釗尋領部下軍率先入城謂唐末帝曰臣旣赤心奉殿下俟京城平定與臣一鎮勿置在防禦團練使内乃懷中出紙一幅謂未帝曰願殿下親書臣姓名以志之未帝命筆書可邠寧節度使及卽位授推誠奉國保乂功臣静難軍節度邠寧慶衍等州觀察處置等使檢校太保清泰三年入為右龍武軍統軍高祖卽位除左衛上將軍進封開國公天福八年以疾卒年六十九贈太傅尹暉魏州人也少以勇徤事魏帥楊師厚為軍士唐莊宗入魏擢為小校從征河上毎于馬前歩鬭有功莊宗即位連改諸軍指揮使天成長興中領數郡刺史累遷嚴衛都指揮使唐應順中王師討末帝于岐下暉與楊思權首歸末帝約以鄴都授之末帝卽位高祖入洛嘗遇暉于通衢暉馬上横鞭以揖高祖高祖忿之後因謁謂末帝曰尹暉常才以歸命稱光陛下欲令出鎮名藩外論皆云不當末帝乃授暉應州節度使高祖卽位改右衛大將軍時范延光據鄴謀叛以暉失意宻使人齎蠟彈以榮利啖之暉得延光文字懼而思竄欲㳂汴水奔于淮南高祖聞之尋䧏詔招喚未出王畿為人所殺子勲事皇朝累厯軍職遷内外馬歩都軍領見為郢州防禦使李從璋字子良後唐明宗皇帝之猶子也少善騎射從明宗厯戰河上有平梁之功唐同光末魏之亂軍迎明宗為厯戰璋時引軍自常山過邢邢人以從璋為畱後踰月明宗卽位受詔領捧聖左廂都指揮使時天成元年五月也八月改大内皇城使加檢校司徒彰國軍節度使賜竭忠建策興復功臣旋以逹靼諸部入冦從璋率麾下出討一鼓而破有詔褒之三月四月移鎮滑臺時明宗駐蹕于大梁從璋嘗召幕客謀曰車駕省方藩臣咸有進獻吾為臣為子安得後焉欲取倉廪羨餘以助其用諸君以為何如内有賔介白曰聖上寛而難犯行宫在近忽致上逹則一幕俱罹其罪從璋怒翌日欲引弓射所言朝廷知之改授右驍衛上將軍長興元年十月出鎮陜州二年五月遷河中節度使三年就加檢校太𫝊賜忠勤静理崇義功臣四年五月制封洋王是歳明宗厭代閔帝嗣位尋受命代潞王于岐下會潞王舉兵入洛事遂寢高祖即位之元年十二月授威勝軍節度使封隴西郡公二年九月終于任年五十一鄧人為之罷市思遺愛也詔贈太師從璋性貪黷懼明宗嚴正自滑帥入居環衛之後以除拜差跌心稍悛悟後厯數鎮與故時幕客不足者相遇無所憾焉蒲陜之日政有善譽改賜忠勤静理之號良以此也及高祖在位愈畏其法故沒于南陽人甚惜之亦明宗宗室之白眉也子重俊重俊唐長興清泰中厯諸衛將軍高祖即位遥領池州刺史少帝嗣位授虢州刺史性貪鄙嘗為郡人所訟下御史臺扺贓至重太后以猶子之故救之乃歸罪于判官高獻止罷其郡未幾復居環列出典商州商民素貧重俊臨之割剥幾盡復御家不法其奴僕若履湯蹈火忤其意者或鞕之或刄之又殺從人孫榮漢掠其妻及受代歸洛漢榮母燕氏獲其子婦以訴于府尹景延廣牙將張守英謂燕曰重俊前朝枝葉今上中表河南尹其何以理不若邀其金帛私自和觧策之上也燕從其言授三百緡而止後以青衣趙滿師因不勝楚毒踰坦訴景延廣云重俊與妹私姦及前後不法事延廣奏之詔遣刑部郎中瑜鞫之盡得其實併以穢跡彰露而賜死于家李從温字徳基代州啍縣人後唐明宗之猶子也明宗㣲時從溫執僕御之役後養為已子及厯諸藩署為牙校命典廏庫唐同光中奏授銀青光禄大夫檢校右散騎常侍累加檢校司空充北京副留守明宗即位授安國節度使檢校司徒長興元年四月入為右武衛上將軍是歲復出鎮許田明年移北京留守加太傅四年正月改太平軍節度使五月制封兖王十一月移鎮定州兼北靣行營副招討使尋又移鎮常山清泰中加同平章事改鎮彭門高祖即位之明年就加侍中七年加兼中書令八年再為許州節度使開府儀同三司封趙國公累加食邑一萬戸實食封一千二百戸開運二年改河陽三城節度使三年二月卒于任年六十三贈太師追封隴西郡王從溫始以明宗本枝厯居藩翰無文武才畧資濟代之用凡臨民以漁利為急在常山日覩牙署池潭凡十餘頃皆立木為岸而以修篁環之從溫曰此何用為悉命伐竹取木鬻于列肆獲其直以實私帑焉高祖即位從溫時在兖州多創乘輿器服為宗族切戒從溫弗聽其妻關氏素耿介一日厲聲于牙門云李從溫欲為亂擅造天子法物從溫敬謝悉命焚之家無敗累關氏之力也後以多畜駝馬縱牧近郊民有訴其害稼者從溫曰若從爾之意則我産畜何歸乎其昏愚多此類也髙祖性至察知而不問少帝嗣位太后教曰吾只有此兄慎勿繩之故愈加姑息以致年逾耳順終于牖下乃天幸也張萬進突厥南鄙人也祖拽斤父臘萬進白晳羙髯少而無賴事唐武皇以騎射著名攻城野戰奮不顧命嘗與梁軍對陣持鋭首短刀躍馬獨進及兵刄既刓則易以大鎚左右奮擊出沒進退無敢當者唐莊宗明宗素憐其雄勇復奬其戰功故累典大郡天成長興中厯威勝保太兩鎮節制髙祖有天下命為彰義軍節度使所至不治政由羣下洎至涇原凶恣彌甚毎日于公庭列大鼎烹肥羜割胾方寸以噉賓佐皆流淚不能大嚼俟其他顧則致袂中又命巨觶行酒辭則辱之乃有持杯偽飲褰領裱而納之者旣沉湎無節惟婦言是用其妻與幕吏張光載干預公政納錢數萬補一豪民為捕賊將領兵數百人入新平郡境邠帥以其事上奏有詔詰之光載坐流罪配于登州天福四年三月萬進疾篤月餘州兵將亂乃詔副使萬庭圭委其符印記室李昇素憾凌虐知其將亡謂庭圭曰氣息將奄不保晨暮促移就第豈不宜庭圭從之萬進尋卒遂以藍轝祕屍而出卽馳騎而奏之詔命既至後發喪其妻素狠戾謂長子彦球曰萬庭圭逼廹危病驚擾而死不手戮之奚為生也庭圭聞之不敢徃弔萬進假殯于精舍之下至轊車東轅凡數月之間郡民數萬無一饋奠者為不善者衆必棄之信矣夫史臣曰延廣功扶二帝任掌六師亦可謂晉之勲臣矣然而昧經國之遠圖肆狂言于强敵卒使邦家蕩覆㝢縣丘墟書所謂惟口起羞者其斯人之謂歟彦韜旣負且乘任重才㣲盗斯奪之固其宜矣希崇蔚有雄幹老于塞垣未盡其才良亦可惜楊尹二將因倒戈而仗銊豈不義士之所為其餘蓋以勲以親咸分屏翰惟萬進之醜德又何假于譏焉舊五代史卷八十八
