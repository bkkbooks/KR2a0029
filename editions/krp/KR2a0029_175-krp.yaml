body:
  text: 舊五代史巻八十七攷證晉宗室列傳二廣王敬威傳敬威弟贇案歐陽史髙祖有兄敬儒弟敬徳敬殷是書不為立傳疑有闕文又贇歐陽史作敬贇韓王暉傳八年册贈太師案暉歐陽史作敬暉贈太師歐陽史作贈太傅加贈太師剡王重𦙍案歐陽史晉家人傳重𦙍髙祖弟也通鑑齊王紀同重𦙍婦馮氏後為少帝后歐陽史載契丹入京師暴少帝之惡于天下曰納叔母于宫中亂人倫之大典是重𦙍實為髙祖弟也五史㑹要作髙祖第三子重𦙍天福七年四月追封剡王考剡王歐陽史作鄭王封爵亦異又案是書唐紀清泰三年誅皇城副使石重裔敬瑭之子也攷會要載髙祖諸子無别名重裔者重裔疑即重𦙍史氏避宋太祖諱故作裔然通鑑髙祖紀作敬瑭之子重𦙍齊王紀又作髙祖少帝重𦙍早卒似兩紀實有兩人姑存之以偹攷虢王重英案五代㑹要重英髙祖長子通鑑攷異引廢帝實録作姪男供奉官重𦙍又廣本英作殷楚王重信傳髙祖第二子案五代㑹要作第四子壽王重乂傳髙祖第三子案五代㑹要作第二子通鑑攷異作姪男陳王重杲案重杲小字馮六歐陽史云髙祖少子曰馮六舊説以重睿為幼子非也今考五代㑹要作髙祖第六子重杲第七子重睿與歐陽史異舊五代史巻八十七攷證
