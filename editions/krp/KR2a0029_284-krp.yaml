body:
  text: 舊五代史巻一百四十三攷證志五禮志下寳應元年寳應原本訛寳寧考新唐書寳應係代宗年號無所謂寳寧者今改正並著具緋衣幘子緋衣原本作綘衣今據五代會要改正天成三年十一月太常定唐少帝為昭宣光烈孝皇帝四年八月戊申明宗服袞冕御文明殿追册昭宣光烈孝皇帝歐陽史作四年五月乙酉追諡與是志定諡册廟月日俱不符舊五代史巻一百四十三攷證
