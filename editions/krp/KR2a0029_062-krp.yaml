body:
  text: 舊五代史巻三十考證唐莊宗紀四以趙光𦙍為中書侍郎平章事集賢殿大學士案歐陽史作趙光𦙍為中書侍郎不載大學士銜與是書詳畧異甲子車駕發汴州十二月庚午朔車駕至西京案歐陽史作甲子如京洛庚午至自汴州是書作西京盖其時未改永平軍為西京故尚仍梁制稱洛陽為西京也又通鑑考異云諸書但謂之洛京未嘗詔改西京為洛京至同光三年始詔依舊以洛京為東都或者以永平為西京時即改梁西京為洛京而史脱其文也歐陽史於元年冬即書洛京未審所據詔改偽梁永平軍大安府復為西京京兆府案歐陽史作十一月辛酉復永平軍為西都與是書日月互異實喇鄂博舊作撒刺阿撥今改舊五代史巻三十考證
