body:
  text: 舊五代史巻一攷證梁太祖紀一九月帝遂與左右定計斬偽監軍使嚴實降於重榮案舊唐書僖宗紀朱温之降繫八月與是書異新唐書及通鑑俱繫九月與是書同疑舊唐書誤又嚴實原本訛作嚴貴今據歐陽史及通鑑改正乃詔授帝左金吾衛大將軍充河中行營副招討使案歐陽史云王鐸承制拜温金吾衛大將軍河中行營招討副使與是書謂僖宗招授者異攷舊唐書及通鑑則王鐸承制所拜乃華同節度在僖宗詔授以前歐陽史以詔授為王鐸承制當是删并之誤仍賜名全忠案是書及舊唐書通鑑皆作僖宗賜名惟鑑戒録云朱太祖統四鎮除中令日名温與崔相國連搆大事崔每奏太祖忠赤遷之闗東國無患矣昭宗遽敇太祖改名全忠議者謂全字人王也又在忠心甚不可也上方悔焉其説與諸史異葢𫝊聞之不同爾三年三月僖宗制授帝宣武軍節度使三月舊唐書作五月帝與許州田從異諸軍同收瓦子寨案瓦子寨原本訛作瓦子寨攷通鑑注云黄巢撤民居以為寨屋謂之瓦子寨則于字形近刋訛耳今改正三月庚辰僖宗降制就封帝為沛郡王案全忠之王舊唐書繫光唘元年三月據是書則元年惟増食邑至二年三月乃進封也歐陽史從是書十一月滑州節度使安師儒以怠于軍政為部下所殺案舊唐書云十月壬子朔滑州軍亂逐其帥安師儒師儒奔汴朱全忠殺之歐陽史同新唐書云十月朱全忠陷滑州執義成軍節度使安師儒通鑑同據是書則師儒自為部下所殺與諸書互異又十一月新舊唐書俱作十月庚午賊將盧瑭領萬餘人于圃田北萬勝戍案通鑑攷異云長厯四月甲辰朔無庚午薛史誤今改舊唐書光啟三年四月正作甲辰朔以日數計之庚午乃四月二十七日也據此乃通鑑攷異之誤耳乃就加帝檢校太尉兼領淮南節度使案全忠兼領淮南舊唐書作光啓三年十一月歐陽史作十二月通鑑作閏十一月據是書則在九月以前與諸書異又是書下文作閏十二月通鑑作閏十一月未詳孰是九月亳州禆將謝殷逐刺史宋兖九月新唐書及通鑑俱作六月鄆州朱瑄瑄歐陽史作宣是時李璠郭言行至淮上為徐戎所扼不克進而還案歐陽史云璠之揚州行密不納據通鑑云李璠至泗州時溥以兵襲之郭言力戰得免而還是李璠未嘗至揚州也當以是書為得其實二月丙戌僖宗制以帝為蔡州四靣行營都統案全忠為四靣行營都統新唐書及通鑑作正月癸亥舊唐書作五月與是書異㑹蔡人趙徳諲舉漢南之地以歸於朝廷案徳諲之降新舊唐書及通鑑俱繫五月與是書同歐陽史叙其事于正月疑有舛誤二月蔡將申叢遣使來告縳宗權於帳下案宗權之執舊唐書作文徳元年十二月新唐書作十一月歐陽史作正月與是書作龍紀元年二月者互異未詳孰是三月又加帝檢校太尉兼中書令進封東平王案全忠進封舊唐書繫四月與是書異十月壬午筠遂降宿州平案宿州之下舊唐書繫十一月新唐書歐陽史通鑑俱與是書同十一月丁未曹州禆將郭紹賓殺刺史郭饒舉郡來降案新唐書十一月已未曹州禆將郭銖殺其刺史郭詞叛附全忠通鑑同與是書異遂領兵於村落間案領字攷文義應是頓字之譌今改次于魚山魚山歐陽史作漁山攷通鑑亦作魚山今仍其舊盡奪其餉於高呉高呉通鑑作高梧攷是書前後俱作高吳今仍其舊是時太原遣將史儼兒李承嗣以萬騎馳入于鄆案史儼兒通鑑作史儼攷舊唐書初兖鄆求援于太原克用令蕃將史完府何懷寳等以千騎赴之不言赴鄆為何時據此書下文云八月獲蕃将史完府十月擒何懷寳然則四月馳入鄆者當是史完府何懷寳非史儼兒李承嗣也參攷是書唐武皇紀及李承嗣傳承嗣等入鄆定在二年之冬此紀似有舛誤通鑑并采梁唐帝紀亦未詳攷朱瑄脱身遁去案朱瑄之敗通鑑繫九月辛未與是書繫八月異歐陽史從是書十月帝駐單于鄆齊州刺史朱瓊遣使請降十月新唐書昭宗紀作十一月及蕃将何懐寶等萬餘人以襲曹州何懐寳通鑑作薛懐寳攷舊唐書亦作何懐寳今仍之十二月葛從周領兵復伐兖案通鑑云全忠去兖留葛從周将兵守之與是書異又是書葛從周𫝊乃十月事辛卯營于濟水之次案胡三省云漢以後無濟水此濟水葢即鄆城清河水也是時珙弟珂實為蒲帥珂原本訛琦今據新唐書王重榮𫝊改正九月帝以兖鄆既平將士雄勇遂大舉南征案舊唐書昭宗紀師古渡淮在十月而清口之敗在十一月是書繫于九月葢因南征之議實始于九月遂牽連書之亦未暇細詳月日耳歐陽史改作九月攻淮南則清口之役乃因雨雪而敗有九國志可攷斷非九月事也舊五伐史巻一攷證
