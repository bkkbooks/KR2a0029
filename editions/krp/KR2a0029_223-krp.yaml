body:
  text: 舊五代史巻一百十二宋門下侍郎參知政事監修國史薛居正等撰周書第三太祖紀三廣順元年冬十月已丑朔宰臣王峻獻唐張蘊古大寳箴謝偃惟皇誡德賦二圖詔報曰朕生長軍戎勤勞南北雖用心于鈐匱且無暇于詩書世務時艱粗經閲厯前言往行未甚討尋卿有佐命立國之勲居代天調鼎之任恒慮䏚德未及古人于是采掇箴規弼諧寡昧披文閱理懌意怡神究為君治國之源審修已御人之要帝王之道盡在于兹辭翰俱高珠寳何貴再三省覽深用愧嘉其所進圖已令于行坐處張懸所冀出入看讀用為鑒戒壬辰潞州奏廵檢使陳思讓監軍向訓破河東賊軍于虒亭癸已以刑部侍郎司徒詡為户部侍郎以左㪚騎常侍張煦為刑部侍郎以給事中呂咸休為左㪚騎常侍甲午絳州防禦使孫漢英卒辛丑荆南奏湖南亂大将軍陸孟俊執偽節度使馬希萼遷于衡州立希萼弟希崇為留後将吏二千餘人遇害者半牙署庫藏焚燒殆盡乙已詔併吏部三銓為一銓委本司長官通判丙午晉州廵檢王萬敢奏河東劉崇入寇營于州北辛亥潞州奏河東賊軍寇境乙卯荆南奏淮南遣鄂州節度使劉仁瞻以戰船二百艘于今月二十五日入岳州丙辰詔樞密使王峻率兵援晉州丁巳以左衛将軍申師厚為河西軍節度使檢校太保師厚素與王峻善及峻貴師厚羈旅無依日于峻馬前望塵而拜㑹西涼請帥帝令擇之無欲去者峻乃以師厚奏之師厚亦欣然求往尋自前鎭将授左衛将軍檢校工部尚書翼日乃有涼州之命賜旌節駝馬繒帛以遣之十一月已未朔荆南奏淮南大将邉鎬率兵三萬自袁州路趨潭州馬希崇遣從事送牌印納器仗鎬入城稱武安軍節度使馬氏諸族及将吏千餘人皆徙于金陵甲子夜東南白虹亘天以新晉州節度使王彥超為晉絳行營馬軍都虞候乙丑命王峻出征晉州帝幸西荘以錢之甲戌日南至羣臣拜表稱賀甲申𦵏故貴妃張氏丁亥詔唐朝五廟舊在至德宮安置應屬徽陵荘田園舍宜令新除右監門将軍李重玉為主其縁陵縁廟法物除合留外所有金銀器物充遷𦵏故淑妃王氏及許王從益外其餘竝給與重玉及尼惠英惠燈惠能惠嚴等令重玉以時祀陵廟務在豐㓗重玉故皇城使李從璨之子明宗之孫惠英等亦明宗親屬也故帝授重玉官秩令主先祀䘏王者之後也十二月戊子朔詔以劉崇入寇取當月三日暫幸西京庚寅詔廵幸宜停時王峻駐軍陜府聞帝西廵遣使馳奏不勞車駕順動帝乃止乙未幸西荘兖州慕容彥超上言乞朝覲詔允之尋稱部内草寇起不敢離鎭戊申鄆州奏慕容彥超㨿城反已酉王峻奏劉崇逃遁王師已入晉州宋史陳思讓傳王峻援晉州以思讓與康延昭分為左右廂排陣使令率軍自烏嶺路至絳州與大軍合崇燒營遁去思讓又與藥元福襲破之廣順二年春正月戊午朔不受朝賀以宿兵在外故也庚申王峻奏起近鎭丁夫二萬城晉州壬戌修東京羅城凡役丁夫五萬五千兩旬而罷甲子以侍衞歩軍都指揮使曹英為兖州行營都部署以齊州防禦使史延韜為副都署以皇城使向訓為兵馬都監陳州防禦使藥元福為馬步都虞候率兵討慕容彥超陳平集慕容彥超盜據兖海周祖命曹英為帥向訓副之參用藥元福以兵從謂元福曰已勅英訓勿以軍禮見汝及元福至英訓皆父事焉諸軍入兖州界不得下路停止村舍犯者以軍法從事丙寅徐州廵檢供給官張令彬奏破淮賊于沭陽斬首千餘級擒賊将燕敬權時慕容彥超求援于淮南淮南偽主李景發兵援之師于下邳聞官軍至退趨沭陽遂破之庚午髙麗權知國事王昭遣使貢方物壬申鎮州何福進差人部送先擒獲到河東賊軍二百餘人至闕下詔給巾履衫袴以釋之戊寅徐州部送沭陽所獲賊将燕敬權等四人至闕下詔賜衣人金帛放歸本土敬權等感泣謝罪帝召見謂之曰夫惡兇邪奨忠順天下一也我之賊臣撓亂國法嬰城作逆殃及生靈不意呉人助兹凶惡非良算也爾當歸言之于爾君初漢末遣三司軍将路昌祚于湖南市茶屬淮南将邉鎬陷長沙昌祚被賊送金陵及敬權自大朝歸具以帝言告于李景景乃召昌祚延坐從容久之且稱美大朝皇帝聖德廣被恩沾鄰土深有依附國家之意及罷遣偽宰相宋齊丘宴昌祚于别館又命訪昌祚在湖南遭變之時亾失綱運之数命依数償之給茗荈萬八千斤遣水運至江夏仍厚給行装遣之歸闕二月庚寅府州防禦使折德扆奏河東賊軍寇境率州兵破之斬首二千級辛卯太白經天癸已以權知髙麗國事王昭為高麗國王庚子府州防禦使折德扆奏收河東界岢嵐軍癸卯詔先獲河東鄉軍一百餘人各給錢鞋放歸鄉里壬子太子太師致仕安審暉卒三月庚申幸南荘令從臣習射戊辰以樞密院直學士左諫議大夫王溥為中書舍人充翰林學士以内客省使恩州團練使鄭仁誨為樞宻副使詔宣徽北院使翟光鄴權知永興軍府事甲戌囘鶻遣使貢方物庚辰詔西京荘宅司内侍省宫苑司内園等四司所管諸廵係税户二千五百竝還府縣其廣德昇平二宫竝停廢應行從諸荘園林亭殿房舍什物課利宜令逐司依舊收管夏四月丙戌朔日有食之帝避正殿百官守司丁亥詔停蔡州鄉軍戊子以京師旱分命羣臣禱雨癸已制削奪慕容彥超在身官爵甲午髙麗國冊使衛尉卿劉皥卒乙卯詔取來月五日車駕赴兖州城下慰勞将士以樞密副使鄭仁誨為右衛大将軍依前充職兼權大内都㸃檢以中書侍郎平章事判三司李榖為權東京留守兼判開封府事五月丙辰朔帝御崇元殿受朝仗衛如儀庚申車駕發京師戊辰至兖州城下乙亥收復兖州斬慕容彥超夷其族詔端明殿學士顔衎權知兖州軍州事壬午曲赦兖州管内罪人取五月二十七日已前所犯罪大辟已下咸赦除之慕容彥超徒黨有逃避潛竄者及城内将吏等竝放罪自慕容彥超違背已來鄉州内有接便為非者一切不問諸軍将士殁于王事者各與賻贈都頭已上與贈官兖州城内及官軍下寨四面去州五里内今年所徴夏秋税及沿徵錢物竝放十里内只放一州管界今夏苗子三分放一分城内百姓遭毁拆舍屋及遭燒焚者給賜材木諸處差到人夫内有遭矢石死者各給絹三匹仍放户下三年徭役云癸未詔兖州降為防禦州仍為望州六月乙酉朔帝幸曲阜縣謁孔子祠既奠将致拜左右曰仲尼人臣也無致曰帝曰文宣王百代帝王師也得無敬乎即拜奠于祠前其所奠酒器銀鑪竝留于祠所遂幸孔林拜孔子墓帝謂近臣曰仲尼亞聖之後今有何人對曰前曲阜令襲文宣公孔仁玉是仲尼四十三代孫有鄉貢三禮顔涉是顔淵之後即召見仁玉賜緋口授曲阜令顔涉授主簿便令視事仍勅兖州修葺孔子祠宇墓側禁樵採丙戌車駕還京初帝以五月十三日至兖州賊尚拒守至十七日晝夢道士一人進書巻首云車駕來月二日還京其下文字絶多不能盡記既寤以夢告宰臣又四日而城拔帝至軍凡駐蹕九日而賊平果以六月二日發離城下近代親征克捷無如此之速也是日大雨城下行宫水深数尺其日晚至中都縣帝笑謂侍臣曰今日若不離城下則當為潦所溺矣戊戌車駕至自兖州辛丑以靈武節度使馮暉卒輟視朝一日壬寅前翰林學士李澣自契丹中上表陳奏機事且言偽幽州節度使蕭海貞欲謀嚮化帝甚嘉之宋史李澣傳海貞與澣相善澣乘間諷海貞以南南歸之計海貞納之周廣順二年澣因定州孫方諫密表言契丹衰微之勢周祖嘉焉遣諜者田重霸賫詔慰撫仍命澣通信澣復表述契丹主幼弱多寵好擊鞠大臣離貳若出師討伐因與通好乃其時也屬中原多故不能用其言癸卯德妃董氏薨乙已詔宣徽南院使袁㠖判開封府事辛亥以朔方軍衙内都虞候馮繼業復起為朔方軍兵馬留後甲寅幸舊宅為德妃舉哀故也秋七月丙辰詔内外臣僚毎遇永壽節舊設齋供今後中書門下與文武百姓其設一齋侍衛親軍都指揮使已下共設一齋樞密使内諸司使已下共設一齋其餘前任職員及諸司職掌更不得開設道埸及設齋是日大風雨破屋拔樹尚書省都堂有龍穿屋壞獸角而去西壁有爪迹存焉襄州大水丁卯詔復升陳州曹州為節鎭以侍衛馬軍都指揮使洋州節度使郭崇為陳州節度使以侍衛步軍都指揮使曹英為曹州節度使竝典軍如故以陳州防禦使藥元福為晉州節度使辛未詔相州節度使李筠權知潞州軍州事丙子以小底都指揮使漢州刺史李重進為大内都㸃檢兼馬步都軍頭令恩州團練使以内殿直都知駙馬都尉張永德領和州刺史充小底第一軍都指揮使八月甲申朔翰林學士刑部尚書張沆落職守本官以中書舍人史館修撰判舘事徐台符為禮部尚書兖翰林學士承㫖以兵部侍郎韋勲為尚書右丞以尚書右丞于徳辰為吏部侍郎以戸部侍郎邉歸讜為兵部侍郎以禮部侍郎趙上交為戸部侍郎以樞密直學士左散騎常侍陳觀為工部侍郎依前充職以刑部侍郎景範為左司郎中充樞密直學士乙酉樞密使王峻上章請解樞衡凡三上章詔不允庚寅潁州奏先于淮南俘獲孳畜已準詔送還本土甲午詔止絶吏民詣闕舉請刺史縣令賜宰臣李榖白藤肩輿時榖以今年七月因步履傷臂請告数旬詔榖扶持三司刻名印署事仍放朝參庚子潞州節度使常思移鎭宋州相州節度使李筠移鎮潞州壬寅鄆州節度使高行周薨癸丑詔改鹽麴法鹽麴犯五斤已上處死煎鹻鹽者犯一斤已上處死先是漢法不計斤兩多少竝處極刑至是始革之九月庚午以大理卿劇可乆為太僕卿以左庶子張仁瑑為大理卿以司天監趙延乂為太府卿兼判司天監事詔北面沿邉州鎭日守疆埸不得入北界俘掠乙亥鎭州奏契丹寇深冀州遣龍捷都指揮使劉誨牙内都指揮使何繼筠等率兵拒之而退時契丹聞官軍至掠冀部丁壮数百隨行狼狽而北冀部被擄者望見官軍鼓譟不已官軍不敢進其丁壮盡為蕃軍所殺而去丁丑以鄭州防禦使白重贊為相州留後戊寅樂壽都監杜延熙奏于瀛州南殺敗契丹斬首三百級獲馬四十七匹癸未帝姨母韓氏追封楚國夫人故第四姊追封福慶長公主易州奏契丹武州刺史石越來奔冬十月丙戌以前晉州節度使王彥超為河陽節度使庚寅詔諸州罷任或朝覲竝不以器械進貢先是諸道州府各有作院每月課造軍器逐季搬送京師進納其逐州每年占留係省錢帛不少謂之甲料仍更于部内廣配土產物徵斂数倍民甚苦之除上供軍器外節度使刺史又私造器甲以進貢為名功費又倍悉取之于民帝以諸州器甲造作不精兼占留屬省物用過當乃令罷之仍選擇諸道作工赴京作坊以偹役使乙未永興軍奏宣徽北院使知軍府事翟光鄴卒丁酉𦵏德妃廢朝戊戌以宣徽南院使袁㠖權知永興軍府事以樞密直學士工部侍郎陳觀權知開封府事已亥升鉅野縣為濟州以樞密院副使鄭仁誨為宣徽北院使兼樞密副使庚子幸樞密院王峻請之也甲辰宰臣李穀以臂傷未愈上表辭位凡三上章詔報不允丁未滄州奏自十月已前蕃歸漢户萬九千八百戸是時北境饑饉人民轉徙襁負而歸中土者散居河北州縣凡数十萬口十一月丙辰荆南奏朗州大将劉言以今年十月三日領兵趨長沙十五日至潭州淮南所署湖南節度使邉鎬岳州刺史宋徳權竝棄城遁去庚申以前少府監馬從斌為殿中監壬戌樞密使王峻亡妻崔氏追封趙國夫人非故事也乙丑刑部尚書張沆卒辛未陜州折從阮移鎭邠州以前宋州節度使李洪義為安州節度使癸酉青州符彥卿移鎭鄆州甲戌詔曰累朝已來用兵不息至于繕治甲胄未免配役生靈多取于民助成軍器就中皮革尤峻科刑稍犯嚴條皆抵極典鄉縣以之生事姦猾得以侵漁宜立所規用革前弊應天下所納牛皮今将逐所納数三分内減二分其一分于人户苖畝上配定每秋夏苗共十頃納連角皮一張其黄牛納乾筋四兩水牛半斤犢子皮不在納限牛馬驢騾皮筋角今後官中更不禁斷只不得将出化外敵境州縣先置廵檢牛皮節級竝停丙子詔曰應内外文武官寮幕職州縣官舉選人等今後有父母祖父母亡殁未經遷𦵏者其主家之長不得輒求仕進所由司亦不得申舉解送如是卑幼在下者不在此限已卯日南至帝御崇元殿受朝賀仗衛如儀十二月丙戌權武平軍留後劉言遣牙将張崇嗣入奏于十月十三日與節度副使王進逵行軍司馬何敬貞指揮使周行逄等同共部領戰棹攻收湖南偽節度使邉鎬當夜出奔王進逵等已人潭州九國志王逵傳逵朗州武陵人或名進逵邉鎬為武安軍節度使召劉言入覲言不行謀于逵曰江南召我不往必加兵于我矣為之奈何逵曰鎬之此來以制置潭朗為名公如速行正入其算武陵負江湖之阻帶甲百萬乃欲拱手臣異姓乎鎬新至長沙經畧未定乘人心憤怒引兵攻鎬可一鼓而擒也言然之乃遣與何景眞等同起兵于武陵號十指揮使以攻邉鎬逵率舟師南上至長沙邉鎬大駭以所部奔歸江南諸州屯守皆罷之盡復湖外之地癸巳太子太師致仕安叔千卒甲午詔今後諸侯入朝不得進奏買宴丁酉皇子澶州節度使榮落起復加同平章事戊戌太子少傅致仕王延卒壬寅幸西荘乙已以端明殿學士顔衎權知開封府事御史臺奏請改左右威衛復為左右屯衛從之避御名也是冬無雪廣順三年春正月壬子朔帝御崇元殿受朝賀仗衛如儀幸太平宫起居漢太后甲寅賜羣臣射于内鞠埸乙卯武平軍兵馬留後劉言奏潭州干戈之後焚燒殆盡乞移使府于武陵從之詔升朗州為大都督府在潭州之上丙辰以武平節度使留後檢校太尉劉言為檢校太師同平章事行朗州大都督充武平軍節度兼三司水陸轉運等使制置武安静江等軍事進封彭城郡公武平軍節度使使權知潭州軍州事檢校太傅王進逵為檢校太尉行潭州刺史充武安軍節度使以武安軍行軍司馬兼衙内歩軍都指揮使檢校太傅何敬貞為檢校太尉行桂州刺使充静江軍節度使以張倣領睂州刺史充武平軍節度副使以朱元琇領黄州刺史充靜江軍節度副使以周行逢領集州刺史充武安軍節度行軍司馬自進逵而下皆劉言将校也邠州奏慶州略蕃部野雞族略奪商旅侵擾州界詔遣寕州刺史張建武等率兵掩襲仍先賜勅書安撫如不從命卽進軍問罪辛酉詔賜朗州劉言應兩京及諸道舊屬湖南楼店邸第乙丑詔諸道州府係屬户部營田及租稅課利等除京兆府荘宅務贍國軍𣙜鹽務兩京行從荘外其餘竝割属州縣所徵租税課利官中只管舊額其職員節級一切停廢應有客户元佃係省荘田桑土舍宇便賜逐户充為永業仍仰縣司給與憑由應諸處元属营田戸部院及係縣人户所納租中課利起今年後竝與除放所有見牛犢竝賜本戸官中永不收係云帝在民間素知營田之弊至是以天下係官荘田僅萬計悉以分賜見佃戸充永業是嵗出户三萬餘百姓既得為已業比戸欣然于是葺屋植樹敢致功力又東南郡邑各有租牛課戸往因梁太祖渡淮軍士掠民牛以千萬計梁太祖盡給與諸州民輸租課自是六十餘載時移代改牛租猶在百姓苦之至是特與除放未㡬京兆府荘宅務及𣙜鹽務亦歸州縣依例處分或有上言以天下係官荘田甚有可惜若遣貨之當得三十萬緡亦可資國用帝曰苟利于民與資國何異丁卯户部侍郎權知貢舉趙上交奏諸科舉人欲等第各加封義塲数進士除詩賦外别試雜文一塲從之兩浙弔祭使左練議大夫李知損責授登州司馬員外置仍令所在馳驛放遣知損銜命江浙所經藩郡皆強貸于侯伯為青州知州張凝所奏故有是命己巳幸南荘臨水亭見雙鳧戲于池上帝引弓射之一發疊貫從臣稱賀庚午以前邠州節度使侯章為鄧州節度使前萊州刺史葉仁魯賜死坐為民所訟故也辛未詔樞密使王峻廵視河隄峻請行故從之辛未幸南荘閏月甲申朗州劉言潭州王進逵奏廣賊占據桂管深入永州界俘劫遣朗州行軍司馬何敬貞與指揮使未全琇陳順等率水陸軍五萬進擊丙戌囘鶻遣使貢方物詔故梁租庸使趙巖姪崇勲見居陳州量賜係官店宅從王峻之請也辛卯定州奏契丹攻義豊軍出勁兵夜斫蕃營斬首六十級契丹遁去甲午鎮州奏契丹寇境遣兵追襲至無極而還丙申皇子澶州節度使榮來朝壬寅以樞密使尚書左僕射同平章事監修國史王峻兼青州節度使餘如故延州衙内指揮使高紹基奏言父允權患腳膝令臣權知軍州事癸卯陳州奏吏民請與前刺史李穀立祠堂從之時穀為宰相聞郡人陳請遜讓数四乃止甲辰鄴都留守王殷加檢校太尉依前同平章事丙午鎮州節度使何福進河陽節度使王產超竝加校太尉尉潞州節度使李筠加檢校太傅丁未延州節度使高允權卒己酉開封奏都城内録到無名額僧尼寺院五十八所詔廢之二月辛亥朔以前西京留守白文珂為太子太師致仕進封韓國公癸丑安州節度使李洪義侍衛馬軍都指揮使郭崇侍衛步軍都指揮使曹英竝加檢校太尉唐州方城縣令陳守愚棄市坐剋留户民蠶鹽一千五百斤入已也内制國寳兩座詔中書令馮道書寳文其一以皇帝承天受命之寳為文其一以皇帝神寳為文案傳國寳始自秦始皇令李斯篆之厯代傳授事具前史至唐末帝自燔之際以寳隨身遂俱焚焉晉高祖受命特製寳一座開運末北戎犯闕少帝遣其子延煦送于戎王戎王訝其非眞少帝上表具訴其事及戎王北歸賫以入蕃漢朝二帝未暇别製至是始創為之庚申遣将作監李瓊知陜州軍州事甲子樞密使平盧軍節度使尚書左僕射平章事監修國史王峻責授商州司馬員外置所在馳驛發遣戊辰左監門上将軍李建崇卒延州牙内都指揮使高紹基奏交割軍府與副使張圖己巳朗州劉言奏當道先遣行軍司馬何敬貞率兵掩擊廣賊行及潭州部衆奔潰湖南王進逵以敬貞失律已梟首訖以樞密直學士工部侍郎陳觀為祕書監壬申鳯翔少尹桑能責授鄧州長史能晉相維翰之庶弟也坐㨿維翰别第為人所訟故也癸酉以户部侍郎知貢舉趙上交為太子詹事是嵗新進士中有李觀者不當策名物議諠然中書門下以觀所試詩賦失韻勾落姓名故上交移官丁丑幸南荘賜從官射命客省使向訓權知延州軍州事舊五代史巻一百十二
