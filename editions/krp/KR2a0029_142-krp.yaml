body:
  text: 舊五代史巻七十攷證唐列傳二十二元行欽傳令行欽攻大恩山大恩山歐陽史作大安山考通鑑注引薛史亦作大恩李嚴𫝊以嚴為三川招撫使歐陽史作招討使即馳騎入益州案歐陽史亦與是書同呉縝簒誤云成都自唐末歴五代不復謂之益州况此正古蜀郡成都之地而古益州實不在此康思立傳贈太子少師少師歐陽史作少傅舊五代史巻七十攷證
