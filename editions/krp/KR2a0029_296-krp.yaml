body:
  text: 舊五代史巻一百四十九攷證志十一職官志四曰忘誤忘誤册府元龜作失誤考五代會要職官分紀俱作忘今仍其舊又改為直崇政院直崇政院原本作直崇文院今從五代會要改正亦置直院一人案五代會要作亦置院使一人石林燕語作改為樞密院直學士䕃補千牛進馬進馬原本訛進貝考職官分紀有太子進馬貝字係傳冩之訛今改正舊五代史巻一百四十九攷證
