body:
  text: 舊五代史巻一百三十四宋門下侍郎參知政事監修國史薛居正等撰僭偽列傳第一楊行宻廬州人少孤貧有膂力日行三百里唐中和之亂天子幸蜀郡將遣行宻徒步奏事如期而復北夢瑣言鄭綮嘗典楊行宻為本州步奏官光啓初秦宗權擾淮右頻寇廬壽郡將募能致戰擒賊者計級賞之行宻以膽力應募徃必有獲得補為隊長行宻乃自募百餘人皆虓勇無行者殺都將自權州兵郡將即以符印付之而行朝廷因正授行宻廬州刺史光啓三年揚州節度使高騈失政委任妖人吕用之軰牙將畢師鐸懼為用之所譖自高郵起兵以襲廣陵為用之所卻乃乞師于宣州秦彦且言事克之日願以揚州帥之彦先遣將秦稠以兵三千人助師鐸攻陷廣陵高騈署師鐸為行軍司馬未幾秦彥率大衆并家屬渡江入揚州軍府自稱節度使初揚州未陷吕用之詐為高騈檄徵兵于廬州及城陷行宻以萬人奄至畢師鐸之入廣陵也吕用之出奔于外至是委質于行宻行宻攻廣陵營于大明寺秦畢出兵以攻行宻之營短兵纔接行宻偽遁秦畢之兵争入其栅以取金帛行宻發伏兵以擊之秦畢大敗退走其壁自是不復出戰其年九月秦畢害高騈于幽所少長皆死同坎瘞于道院北垣下行宻攻圍彌急城中食盡米㪷四十千居人相啗略盡十月城陷秦畢走東塘行宻入廣陵輦外寨之粟以食飢民即日米價減至三千十一月蔡賊孫儒以衆萬人自淮西奄至還據外寨行宻輜重牛羊軍食未入城者皆為儒所有時秦畢來自東塘與儒軍合自是西門之外復為敵境矣初吕用之遇行宻于天長紿行宻曰用之有白金五千鋌瘞于所居之廡下寇平之日願備將士倡樓一醉之資至是行宻閱兵用之在側謂用之曰僕射許此軰銀何負心也遽命斬于三橋之下夷其族行宻旣有廣陵遣使至大梁陳歸附之意是時梁祖兼領淮南乃遣牙將張廷範使于淮南與行宻結盟尋遣行軍司馬李璠權知淮南畱後令都將郭言以兵援送行宻初則厚禮廷範及聞李璠之行勃然有拒命之意廷範懼易衣夜遁遇梁祖于宋州備言行宻不軌之心酌其兵勢未可圖也乃追李璠等還即表行宻為淮南畱後文德元年正月孫儒殺秦彥畢師鐸于高郵引軍襲廣陵下之儒自稱節度使行宻收其衆歸于廬江十一月梁祖遣大將龎師古自潁上渡淮討孫儒之亂師古引兵深入淮甸不利還龍紀元年孫儒出攻宣州行宻乘虛襲揚州北通時溥孫儒引軍復攻行宻大順元年行宻危蹙率衆夜遁出據宣州儒復入揚州二年乃蒐練兵甲以攻行宻屬江淮疾疫師人多死儒亦臥病為部下所執送于行宻殺之行宻自宣城長驅入于廣陵盡得孫儒之衆自光啟末高騈失守之後行宻與畢師鐸秦彥孫儒逓相窺圖六七年中兵戈競起八州之内鞠為荒榛圜幅數百里人煙斷絶行宻旣併孫儒乃招合遺散與民休息政事寛簡百姓便之蒐兵練將以圖霸道所得孫儒之衆皆淮西之驍果也選五千人豢養于府第厚其衣食驅之即戰靡不爭先甲胄皆以黒繒飾之命曰黒雲都乾寧二年行宻盡有淮南之地昭宗乃降制授行宻淮南節度副大使知節度事管内營田觀察處置等使開府儀同三司檢校太傅同中書門下平章事兼揚州大都府長史上柱國𢎞農郡王食邑三千户食實封一百户四年梁祖平兖鄆朱瑾及沙陀將李承嗣史儼等皆奔淮南行宻待之優厚任以為將瑾與承嗣皆位至方伯是歲行宻縱兵侵掠鄰部兩浙錢璆江西鍾傅鄂州杜洪皆遣使求救于梁梁祖遣朱友恭率步騎萬人渡江取便討伐行宻先令都將翟章據黄州及梁師至即棄郡南渡固守武昌寨行宻遣將馬珣以精兵五千助之友恭與杜洪大破其衆遂㧞武昌寨擒翟章并淮軍三千餘人獲馬五百匹淮夷大恐八月梁祖遣葛從周領步騎萬人自霍丘渡淮遣龎師古率大軍營于清口淮人決堰縱水流潦大至又令朱瑾率勁兵以襲汴軍汴軍大敗師古死之葛從周聞師古之敗自濠梁班師至淠河為淮人所乘諸軍僅得北歸光化二年行宻遣大將張歸厚禦之而退天復三年青州王師範叛乞師于淮南行宻遣將王景仁率師二萬以援之攻討密州七月梁祖大破師範及景仁之衆景仁遁還追至輔唐殺數千人進取密州天祐元年十一月淮人攻光州梁祖率軍抵霍丘略地于廬壽之境淮人遁去二年正月進攻壽州淮人閉壁不出大掠而還是月行宻攻陷鄂州擒節度使杜洪戮于揚州市梁之戍兵數千人亦陷焉其後江西鍾傅宣州田頵俱為行密所併三年行宻以疾卒于廣陵及其子渭僭號僞追尊為太祖武皇帝渥字奉天行宻長子也行宻卒渥遂襲偽位自稱吳王委軍政于大將張顥渥性猜忍不能御下天祐五年六月渥為顥所殺顥将納欵于梁遂自稱畱後委别將徐溫握兵柄居無何溫復殺顥立行宻次子渭為主及渭僭號偽追尊為景帝渭渥之弟也旣立政事咸委于徐溫時溫為鎭海軍節度内外馬步軍都指揮使乃于上元縣置昇州盛開幕府自握兵柄于上流其子知訓等于揚州居以秉政凡十餘年溫乃册渭為天子國號大吳改唐天祐十六年為武義元年渭以溫為大丞相都督中外諸軍事渭僭號凡三年而卒諡為惠帝溥行宻幼子也初封丹陽王渭卒徐溫乃推溥為主復僭偽號唐同光元年荘宗平梁遷都于洛陽十二月溥遣使章景來朝稱大呉國主致書上大唐皇帝其辭㫖卑遜有同箋表明年八月又遣其司農卿盧蘋貢方物及獻貞簡太后珍玩荘宗命左藏庫使王居敏通事舍人張朗等以名馬報之郭崇韜之平西州也淮人大懼將去偽號稱藩于唐時崇韜欲陳舟師下峽為平呉之策㑹崇韜旣誅洛城有變淮人聞之比屋相慶明宗纂嗣溥復遣使修好安重誨奏曰楊溥旣不稱藩無足與之抗禮來偵國情不如辭絶乃館其使不受所貢遣之唐天成二年十月徐溫卒追封為齊王溫之養子李昪代溫佐輔秉政數年位至太尉中書令録尚書事襲封齊王偽加九錫晉天福二年溥不得已遜位于昪昪遷溥于潤州築丹陽宫以處之溥自是服羽衣習辟穀之術年餘以幽死昪又遷其族于海陵呉人謂其居為永寜宫周顯德中李景聞周師渡淮慮楊氏為變使人盡殺之自唐大順二年行宻始有淮南之地至溥遜位凡四十七年而亡五代史補楊行宻嘗命宣州刺史田頵領兵圍錢塘錢鏐危急遣其子元璙修好于行宻元璙風神俊邁行宻見之甚喜因以其女妻之遽命頵罷兵初頵之圍城也嘗遣使候錢鏐起居鏐厚待之將行復與之小飲時羅隠皮日休在坐意以頵之師無能為也且欲譏之于是日休為令取一字四靣被圍而不失其本音因曰其字上加艸為萁菜下加石為碁子左加玉為琪玉右加月為期㑹羅隠取于字上加雨為舞雩下加皿為盤孟左加玉為玗玉右加邑為䢴地使者取亾字譏錢鏐必亾取亾上加艸為芒下加心為㤀右加邑為邙左加心為忙其令頗不通合坐皆嬉笑之使大慙而去未幾頵果班師先是行宻與鏐勢力相敵其為憤怒猶水火之不弱也行宻嘗命以大索為錢貫號曰穿錢眼鏐聞之毎歳命以大斧科桞謂之斫楊頭至是以元璙通婚二境漸睦穿眼斫頭之論始止李昪本海州人偽呉大丞相徐溫之養子也溫字敦美亦海州人初從淮南節度使楊行宻起兵于廬州漸至軍校唐末青州王師範為梁祖所圍乞師于淮南楊行宻發兵赴之溫時為小將亦預其行師次青之南鄙師範已敗淮兵大掠而還昪時幼穉為温所虜温愛其慧黠遂育為已子名曰知誥天祐初行宻卒其子渥嗣㑹左衛都指揮使張顥殺渥欲歸命于梁温謂顥曰此去梁國徃復三千里不月餘事不成軍國未有主無主將亂不如有所主徐圖其事顥然之乃立渥弟為帥溫尋殺顥渭偽授溫常州刺史檢校司徒温畱廣陵遣昪知州事是歲唐天祐五年也七年丁母憂起復授檢校太尉温州刺史充本州團練觀察使八年宣州叛溫與都將柴再用討平之加同中書平章事充淮南行軍司馬内外馬步都指揮使鎭海軍節度浙江西道觀察等使十二年八月溫出鎭潤州以其子知訓知政事加溫鎭海軍管内水陸馬步軍都軍使兼寧國軍節度宣歙池等州觀察使時昪為溫屬郡昇州刺史乃大理郡廨溫表移其府于金陵偽授昇州大都督府長史充鎭海軍節度副大使知節度事以昪為鎭海軍節度副使行潤州刺史充本州團練使十五年知訓授淮南行軍副使内外馬步軍都指揮使通判軍府事居無何知訓為大將朱瑾所殺溫以昪代知政事明年溫册楊渭為天子僭稱大呉改唐天祐十六年為武義元年十八年渭死溫聞之自金陵馳歸掦州夜入廣陵議有所立或有希溫㫖言及蜀先主遺命諸葛亮之事溫厲聲曰若楊氏無男有女當立矣無得異議由是羣心乃定遂迎丹陽王溥于潤州以其年六月十八日即偽位改元為順義自是溫父子愈盛中外共專其國楊氏主祭而已溫累官至竭忠定難建國功臣大丞相都督中外諸軍事諸道都統鎭海寧國等軍節度宣歙池等州管内營田觀察等使開府儀同三司守太師中書令金陵尹東海王食邑一萬户實封五百户偽順義七年改乾貞元年即後唐天成二年其年十月二十三日溫卒偽贈大元帥進封齊王諡曰忠武昪前夢溫負登山逾月溫卒昪乃偽授輔政興邦功臣知内外左右事開府儀同三司守太尉中書令宣城公昪自平朱瑾之亂遂執呉政天成四年偽呉改太和元年是歲昪出鎭金陵尋封東海王至清㤗二年改天祚元年其年以金陵為齊國封昪為齊王乃追諡溫為忠武王廟號太祖昪又進位太尉録尚書事留鎭金陵以其子景總政于揚州未幾偽加昪九錫建天子旌旗改金陵為西都以揚州為東都昪開國依齊梁故事用徐玠為齊國右丞相宋齊丘為左丞相以為謀主偽呉天祚三年楊溥遜位于昪國號大齊改元為昇元建都于金陵時晉氏天福二年也昪乃冊楊溥為讓皇其册文曰受禪老臣知誥謹上册皇帝為高尚思𤣥𢎞古譲皇云仍以其子遥領平盧軍節度使遷于海陵昪自云唐𤣥宗第六子永王璘之裔唐天寳米安禄山連陷兩京𤣥宗幸蜀詔以璘為山南嶺南黔中江南四道節度採訪等使璘至廣陵大募兵甲有窺圖江左之志後為官軍所敗死于大庾嶺北故昪指之以為逺祖因還姓李氏始改名昪國號大唐尊徐溫為義祖昪僭位凡七年子景立景本名璟及將臣于周以犯廟諱故改之昪之長子也釣磯立談云烈祖一日晝寢夢一黄龍出殿之西楹矯首向内如窺伺狀烈祖驚起使人偵之顧見𤣥宗方倚楹而立遣人候上動静于是立嫡之意遂决昪卒乃襲偽位改元為保太以仲弟遂為皇太弟季弟逹為齊王仍于父柩前設盟約兄弟相繼景僭號之後屬中原多事北土亂離雄據一方行餘一紀其地東暨衢婺南及五嶺西至湖湘北據長淮凡三十餘州廣袤數千里盡為其所有近代僭竊之地最為强盛又嘗遣使私賂北戎俾為中國之患自固偷安之計南唐書云契丹遣二使來告曰晉少主逆命背約自貽廢黜吾主欲與唐繼先世之好將册君為中原主嗣主曰孤守江淮社稷已固與宋梁阻隔若爾主不㤀先好惠賜行人受賜多矣其他不敢拜命之辱周顯德二年冬世宗始議南征以宰臣李穀為前軍都部署是冬周師圍壽春三年春世宗親征淮甸大敗淮寇于正陽遂進攻壽州尋又今上敗何延錫于渦口擒皇甫暉于滁州景聞之大懼遣其臣鍾謨李德明等奉表于世宗乞為附庸之國仍歲貢百萬之數又進金銀器幣及犒軍牛酒未幾又遣其臣孫晟王崇質等奉表修貢且言景願割濠壽泗楚光海等六州之地𨽻于大朝乞罷攻討世宗未之許時李德明等見周師急攻壽春慮不能保乃奏云寛臣等五日之誅容臣等自徃江南取本國章表舉江北諸州盡獻于大朝世宗許其行乆之德明等不至乃權議囘鑾惟畱偏師數千圍壽春而巳四年春世宗再駕南征三月大敗江南援軍于紫金山尋下壽州乃命班師是歲冬十月世宗復臨淮甸連下濠泗二郡進攻楚州明年春正月援之遂移幸揚州駐大軍于迎鑾將議濟北景聞之自謂亾在朝夕乃謀欲傳位其世子使稱藩于周南唐書正月改元交泰元年遣其臣陳覺奉表陳情且順世宗之㫖焉覺至世宗召對于御幄是時江北諸州惟廬舒蘄黄四郡未下世宗因謂覺曰江南李主若能以江北之地盡歸于我則朕亦不至窮兵黷武覺聞命欣然卽遣人過江取景表以廬舒蘄黄等四州來上乞畫江為界仍歲貢地征數十萬世宗許之乃還京自是景始行大朝正朔上章稱唐國主臣景累遣使修貢亦不失外臣之禮焉皇朝建隆二年夏景以疾卒于金陵時年四十六以其子煜襲偽位其後事具皇家日厯五代史補李昪本為徐溫所養溫殺張顥權出于已自稱大丞相中書令都統及出居金陵以嫡子知訓為丞相昪為潤州節度昪始為宣州忽得潤州甚怏怏將白溫辭之宋齊丘素與昪善因謂昪曰知訓驕倨不可大用殆必有損足焚巢之患宣州去江都逺難為應潤州方隔一水爾有急則可以立功慎勿辭也昪聞之釋然遂行至潤州未幾知訓果為朱瑾所殺是夜江都亂火光亘天昪望之曰宋公之言中矣遂引軍渡江盡誅朱瑾之黨後解甲去備待徐溫之至且喜且怒因謂昪曰猶幸汝在潤州不然吾家大事將去矣汝于兄弟中有大功者耶即日用昪為左僕射知政事以代知訓昪善于撫御内外之心翕然而歸之故徐溫卒未幾而江南遂為昪所有先是江南童謡云東海鯉魚飛上天東海即徐之望也鯉者李也蓋言李昪一且自溫家起而為君爾初昪既蓄異志且欲諷動僚屬雪天大會酒酣出一令須借雪取古人名仍詞理通貫時齊丘徐融在坐昪舉杯為令曰雪下紛紛便是白起齊丘曰著屐過街必湏雍齒融意欲挫昪等遽曰明朝日出爭奈蕭何昪大怒是夜收融投于江自是與謀者惟齊丘而巳宋齊丘豫章人父嘗在鍾傳幕下齊丘素落魄父卒家計蕩盡巳在窮悴朝夕不能度時姚洞天為淮南騎將素好士齊丘欲謁之且囊空無備紙筆之費計無所出但于逆旅杜門而坐如此殆數日鄰房有散樂女尚幼問齊丘曰秀才何以數日不出齊丘以實告女曰此甚小事秀才何吝出一言相示耶乃惠以數緡齊丘用市紙筆為詩咏以投洞天其略曰某學武無成攻文失志歲華蹭蹬身事蹉跎胷中之萬仞青山壓低氣宇頭上之一輪紅日燒盡風雲加以天步陵遲皇綱廢絶四海淵黒中原血紅挹飛蒼走黄之辯有出鬼沒神之機洞天怒其言大不即接見齊丘窘急乃更其啟翼日復至其略曰有生不如無生為人不如為鬼又云其為誠懇萬端只為飢寒二字洞天始憫之漸加以拯救徐溫聞其名召至門下及昪之有江南也齊丘以佐命功遂至將相乃上表以散樂女為妻以報㝛惠許之毎韓熙載仕江南官至諸行侍郎晚年不羈女僕百人延請賔客而先令女僕與之相見或調戲或毆擊或加以爭奪靴笏無不曲盡然後熙載始緩步而出習以為常復有醫人及燒錬僧數軰毎來無不升堂入室與女僕等雜處偽主知之雖怒以其大臣不欲直指其過因命待詔畫為圖以賜之使其自愧而熙載視之安然王審知字信通光州固始人父恁世為農民廣明中黄巢犯闕江淮盗賊蜂起有賊帥王緒者自稱將軍陷固始縣審知兄潮時為縣佐緒署為軍正蔡賊秦宗權以緒為光州刺史尋遣兵攻之緒率衆渡江所在剽掠自南康轉至閩中入臨汀自稱刺史緒多疑忌部將有出已之右者皆誅之潮與豪首數軰共殺緒具衆求帥乃刑牲㰱血為盟植劍于前祝曰拜此劍動者為將軍至潮拜劍躍于地衆以為神異即奉潮為帥時泉州刺史廖彥若為政貪暴軍民苦之聞潮為理整肅耆老乃奉牛酒遮道請畱潮因引兵圍彥若歲餘克之乃平狼山賊帥薛藴兵鋒日盛唐光啓二年福建觀察使陳巖表潮為泉州刺史大順中巖卒子婿范暉自稱畱後潮遣審知將兵攻之踰年城中食盡力斬暉而降由是盡有閩嶺五州之地潮即表其事昭宗因建威武軍于福州以潮為節度福建管内觀察使審知為副審知為觀察副使有過潮猶加捶撻審知無怨色潮寢疾舍其子延興延虹延豐延休命審知知軍府事十二月丁未潮薨審知以讓其兄審邽審邽以審知有功辭不受審知自稱福建畱後表于朝廷唐末為威武軍節度福建觀察使累遷檢校太保封琅邪郡王梁朝開國累加中書令封閩王王審知德政碑云潮付公以戎旅仍具表奏尋加刑部尚書威武軍畱後儀授金紫光禄大夫右僕射本軍節度使又改光禄大夫檢校司空轉特進檢校司徒又轉檢校太保琅邪郡王食邑四千戸食實封一百戸是時楊氏據江淮故閩中與中國隔越審知毎歲朝貢泛海至登萊抵岸徃復頗有風水之患漂没者十四五後唐莊宗即位遣使奉貢制加功臣進爵邑審知起自隴畝以至富貴毎以節儉自處選任良吏省刑惜費輕徭薄歛與民休息三十年間一境晏然同光元年審知卒子延翰嗣為弟延鈞所殺延鈞審知次子後唐長興三年上言吳越國王錢鏐薨乞封為吳越王不報未幾自稱帝國號大閩改元龍啓然猶稱藩于朝廷清㤗元年遇弑子昶嗣昶嗣偽位朝廷因授昶福建節度使晉天福三年遣使貢奉至闕止稱閩王其子繼恭稱節度使晉祖乃下制封昶為閩王改元通大後遇弑審知少子延羲嗣通大延羲嗣偽位改元永隆在位六年遇弑兄延政自稱帝于福州晉開運三年為李景所滅五代史補王潮之來福建也値連帥陳巖卒子婿范暉自稱畱後潮攻㧞之盡有其地遂為褔建觀察使至其弟審知立雖天下多事猶能脩具職貢朝廷嘉之封閩王審知卒子延鈞嗣無識輙改審知制度僭稱大閩改元龍啓其後為子昶殺昶多行不道閩人殺之立從父延羲改元永隆延羲不恤政事國亂為其將連重遇所殺王氏之族遂滅先是梁朝有王霸者即王氏之逺祖為道士居于福州之怡山時愛二皂莢樹因其下築壇為朝禮之所其後丹成冲虛而去霸嘗云吾之子孫當有王于此方者乃自為讖藏之于地唐光啟中爛柯道士徐景𤣥因于壇東北隅取土獲其詩曰樹枯不用伐壇壞不須結不滿一千年自有兒孫列又曰後來是三王潮水蕩禍殃巖逄二乍間未免有銷亾子孫依吾道代代封閩疆議者以為潮蕩禍殃謂王潮除其禍患以開基業也巖逄二乍間為陳巖逄王潮未幾而亾上地為其所有也代代封閩疆謂潮與審知也代代盖兩世之稱明享國不過潮與審知兩世耳初王潮嘗假道于洪州時鍾傳為洪州節度使以王潮若得福建境土相接必為己患隂欲誅之有僧上藍者通于術數動皆先知大為鍾所重因入謁察傳詞氣驚曰令公何故起惡意是欲殺王潮否傳不敢隐盡以告之上藍曰老僧視王潮與福建有縁必變彼處作一好世界令公宜加禮厚待若必殺之令公之福去矣于是傳加以援送及審知之嗣位也楊行宻方盛常有吞東南之志氣審知居常憂之因其先人嘗為上藍所知乃使人齎金帛徃遺之號曰送供且問國之休咎使回上藍以十字為報其詞曰不怕羊入屋只怕錢入腹審知得之歎曰羊者楊也腹者福也得非福州之患不在楊行宻而在錢氏乎今内外將吏無姓錢者必為子孫後世之憂矣至延羲為連重遇所殺諸將爭立江南乘其時命查文徽領兵伐之經年不能下會兩浙救兵至文徽腹背受敵遂大敗自是福州果為錢氏所有入腹之懴始應蓋國之興衰皆冥數决定矣徐寅登第歸閩中途經大梁因獻太祖遊大梁賦時梁祖與太原武皇為讎敵武皇眇一目而又出自沙陀部落寅欲曲媚梁祖故詞及之云一眼匈奴望英威而膽落未幾有人得其本示太原者武皇見而大怒及莊宗之滅梁也四方諸侯以為唐室復興奉琛為慶者相繼王審知在閩中亦遣使至唐遽召其使問曰徐寅在否使不敢隐以無恙對荘宗慘然曰汝歸語王審知父母之讎不可同天徐寅指斥先帝今聞在彼中何以容之使回具以告審知曰如此則唐主欲殺徐寅爾今殺則未敢奉詔但不可以用矣即日戒閽者不得引接徐寅坐是終身止于祕書正字任江為建州人工于詩乾祐中福州王氏國亂有故人福州官屬恐禍及一旦亾去將奔江南乃間道謁為經數日為且與草投江南表其人未出境遭邊吏所擒仍于囊中得所撰表章于是收為與奔者俱械而送為臨刑詞色不撓且曰嵇康之將死也顧日影而彈琴吾今琴則不暇彈賦一篇可矣乃索筆為詩曰衙鼓侵人急西傾日欲斜黄泉無旅店今夜㝛誰家聞者莫不傷之黄滔在閩中為王審知推官一旦饋之魚時滔方與徐寅對談遂請代為謝箋寅援筆而成其略曰銜諸斷索纔從羊續懸來列在琱盤便到馮驩食處時人大稱之史臣曰昔唐祚横流異方割據行宻以高材㨗足啟之于前李昪以履霜堅冰得之于後以偽易偽逾六十年洎有周興薄伐之師皇上示懐柔之德而乃走梯航而入貢奉正朔以來庭如是則長江之險又何足以恃哉審知僻據一隅僅將數世始則可方于吳芮終則竊效于尉佗與夫穴蜂井蛙亦何相逺哉五紀之亾蓋其幸也舊五代史巻一百三十四
