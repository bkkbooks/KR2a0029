body:
  text: 舊五代史巻四攷證梁太祖紀四二月案通鑑二月癸亥酖殺濟陰王于曹州新唐書昭宣帝紀亦云二月遇弑歐陽史作正月已亥卜郊于西都弑濟陰王與諸書異辛巳以同州節度使劉知俊為潞州行營招討使案辛已歐陽史通鑑俱作壬午時帝在澤州拜二相于行在案通鑑云癸已張文蔚卒癸卯楊渉罷為右僕射是二相之拜以代文蔚渉也又承㫖學士梁代避諱改為奉㫖通鑑及歐陽史仍作承㫖壬子幸東京案五代春秋作丙午帝還東都歐陽史作壬子至津州惟通鑑與是書同淮寇侵軼潭岳邊境侵軼原本作侵軹今據文改正王師敗于潞州案潞州之敗歐陽史作五月已丑通鑑作壬申帝以此郡五嶺三湘水陸㑹合之地此郡原本作北郡今據文改正時代綿寢綿寢原本作綿浸今據通鑑注改正丙戌至陜州丙戌通鑑作乙酉丁已至東都案通鑑考異引編遺錄作乙卯實錄作丁已今攷五代春秋作丁已與是書同歐陽史作丁未與是書異許州扶溝縣案扶溝下原本脱縣字今據文増入甲寅福建節度使王審知封閩王廣州節度使劉隱封南平王甲寅通鑑作庚子與是書異如活捉得劉知浣者賞錢一千貫文案一千原本作一萬今據通鑑長編引梁代賞功之典改正辛亥駕至蒲陜案通鑑作癸丑帝至陜與是書前後異其興善門仍令長官闗鎖興善原本作章善今據上文及五代㑹要改正舊五代史巻四考證
