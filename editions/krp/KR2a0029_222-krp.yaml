body:
  text: 舊五代史卷一百十一攷證周太祖紀二相州張彦成張彦成原本作彦威今據列傳改正丙子幸宰臣王峻第案丙子歐陽史作戊寅癸亥定州奏契丹永康王鄂約為部下所殺案遼史世宗以九月癸亥遇弑不應定州即能于癸亥入奏疑原文有舛誤烏裕舊作兀欲今改郭濟舊作骨支今改努瑚舊作耨姑今改舊五代史巻一百十一攷證
