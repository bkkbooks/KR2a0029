body:
  text: 舊五代史巻九考證梁末帝紀中以宣義軍節度副大使知節度事案原本脱副字考新唐書百官志及五代會要副大使為藩鎭官爵今増入蘓州刺史錢傳璙傳璙原本作傳珏今據十國春秋改正峯州刺史錢傳珦案歐陽史職方志有封州而無峯州是書前後俱作峯州未知何據今仍其舊以刑部員外郎封翹翹原本訛堯今據封舜卿傳改正靈武節度使韓洙韓洙原本作韓殊考是書韓遜傳洙即遜之子歐陽史雜傳亦作洙今改正檢校尚書左僕射羅周敬周敬原本作用敬考是書晉列傳作周敬歐陽史羅紹威傳亦作子周敬今改正建徽呉越王錢鏐之將也建徽原本訛作逹徽今據十國春秋改正賀瓌殺許州節度使謝彦章案通鑑賀瓌密譖謝彦章於帝因與朱珪伏甲以殺彦章蓋密奉帝㫖也是書及歐陽史五代春秋俱以賀瓌專殺為文未知孰是制削奪兖州節度使張守進在身官爵仍命劉鄩領兵攻之案是書守進歸晉本紀繫於五年三月張萬進傳作四年七月劉鄩傳仍作五月蓋守進潛附於晉在四年秋聲罪致討則五年春事也五代春秋以守進叛為五年事歐陽史又以劉鄩討之為四年事不如是書之徴實舊五代史巻九考證
