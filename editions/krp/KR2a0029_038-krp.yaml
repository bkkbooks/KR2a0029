body:
  text: 舊五代史巻十八攷證梁列傳八張文蔚傳父裼裼原本作錫今据舊唐書改正薛貽矩傳在位綿五載案歐陽史梁本紀貽矩開平元年同平章事至乾化二年薨計居相位六年歐陽史唐六臣傳貽為梁相五年卒尚仍是書之訛張䇿傳父同仕唐至容管經略使父同唐摭言作父同文歐陽史與是書合今仍之自屏郊藪一無千進意案唐摭言趙少師崇凝主文䇿求就貢籍崇凝庭譴之北夢瑣言載崇凝之辭曰張䇿衣冠子弟無故出家不能叅禪訪道抗跡塵外乃于御簾前進詩希望恩澤是書謂張䇿無仕進意與摭言諸書異杜曉傳祖審權仕唐位至宰相審權原本作省權今㨿新舊唐改正沉跡自廢者將十餘載案呉縝歐陽史纂誤云㨿新唐書宰相表杜讓能賜死至崔𦙍領鹽鐡前後止七年歐陽史作十餘年誤蓋歐陽史沿是書之誤以鋪席祭其先人鋪席原本作補席今㨿歐陽史改正敬翔傳因金巒坡以為門名金巒歐陽史通鑑俱作金鸞五代㑹要從是書今仍之從嘉名也案原本脱名字今從職官志增入宿于車坊車坊原本作中坊今㨿歐陽史及通鑑改正李振傳劉中尉命其姪希貞來計大事希貞原本作希直今㨿通鑑改正又遣供奉官李奉本案原本脱奉本二字今㨿本傳增入舊相張濬亦來謂太祖曰同中官則事易濟案舊唐書昭宗紀崔𦙍與張濬告難于全忠濬傳亦云濬致書諸藩請圖匡復是書作張濬黨于季述為梁祖所拒與唐書異舊五代史巻十八考證
