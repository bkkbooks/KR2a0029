body:
  text: 舊五代史巻一百三十七攷證外國列傳一契丹傳兒即吾兒也案契丹國志作吾定兒也與是書異遣供奉姚坤案通鑑攷異引莊宗實録作苗紳兒昨夢太原石郎發使到國今果至矣案契丹國志作太宗夢見真武使之救晉與是書微異錫里濟舊作習爾之今改沁丹舊作欽德今改實里舊作舎利今改按巴堅舊作阿保機今改托諾舊作秃餒今改托雲舊作突欲今改舒嚕舊作述律今改阿敦舊作安端今改耀庫濟舊作耀屈之今改摩琳舊作梅老今改特哩衮舊作惕隱今改紐赫美稜舊作捺括梅里今改舊五代史巻一百三十七攷證
