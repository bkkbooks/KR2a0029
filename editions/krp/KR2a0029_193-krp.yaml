body:
  text: 舊五代史巻九十六攷證晉列傳十一孔崇弼傳案新唐書世系表作昌弼字佐化是書作崇弼益避後唐廟諱改時族兄昭序案新唐書世系表作昌序字昭舉是書作昭序疑亦因避諱而改也程遜傳天福三年秋命使吳越及使迴遭風水而溺焉案通鑑攷異晉實録天福二年十一月加錢元瓘副元帥國王程遜等為加恩使四年十月丙午以程遜没于海廢朝贈官程遜傳云天福三年秋使吳越使回溺死元瓘傳云天福三年封吳越國王葢三年冬制下遜等以三年至杭州不知溺死在何年而晉朝以四年十月始聞之也馬重績傳八象三統三統原本作三紀今從歐陽史改正舊五代史巻九十六攷證
