body:
  text: 舊五代史巻二十九宋門下侍郎參知政事監修國史薛居正等撰唐書第五莊宗紀三天祐十六年春正月李存審城徳勝夾河為柵帝還魏州命昭義軍節度使李嗣昭權知幽州軍府事三月帝兼領幽州遣近臣李紹宏提舉府事夏四月梁將賀瓌圍徳勝南城百道攻擊復以艨艟扼斷津渡帝馳而往陣于北岸南城守將氏延賞告急且言矢石將盡帝以重賄召募能破賊艦者于是獻技者數十或言能吐火焚舟或能言禁呪兵刄悉命試之無驗帝憂于形色親從都將王建及進曰臣請効命乃以臣索連舟十艘選効節勇士三百人持斧被鎧鼓枻而進至中流梁樓船三層䝉以牛革懸板為楯建及率持斧者入艨艟間斬其竹笮破其懸楯又于上流取甕數百用竹笮維之積薪于上灌以脂膏火發亘空又以巨艦載甲士令乘煙鼓譟梁之樓船斷紲而下沈澄者殆半軍既得渡梁軍乃退命騎將追襲至濮陽俘斬千計賀瓌由此飲氣遘疾而卒秋七月帝歸晉陽八月梁將王瓚帥衆數萬自黎陽渡河營于楊村造舟為梁以通津路冬十月帝自晉陽至魏州發徒數萬以廣徳勝北城自是日與梁軍接戰十二月戊戌帝軍于河南夜伏兵于潘張村梁軍寨下以騎軍掠其餉運擒其斥候梁王瓚結陣以待帝軍以鐡騎突之諸軍繼進梁軍大奔赴水死者甚衆瓚走北城天祐十七年春幽州民于田中得金印文曰闗中龜印李紹宏獻于行臺秋七月梁將劉鄩尹皓寇同州先是河中節度使朱友謙取同州以其子令徳主留務請梁主降節梁主怒不與遂請旄節于帝梁主乃遣劉鄩與華州節度使尹皓帥兵圍同州友謙來告難帝遣蕃漢總管李存審昭義節度使李嗣昭代州刺史王建及率師赴援九月師至河中朝至夕濟梁人不意王師之至望之大駭明日約戰與朱友謙謀遲明進軍拒梁壘梁人悉衆以出蒲人在南王師在北騎軍既接蒲人小卻李嗣昭以輕騎抗之梁軍奔潰追斬二千餘級是夜劉鄩收餘衆保營自是閉壁不出數日鄩遂宵遁王師追及于渭河所棄兵仗輜重不可勝計劉鄩尹皓單騎獲免未㡬鄩憂恚發病而卒王師畧地至奉先嗣昭因謁唐帝諸陵而還天祐十八年春正月魏州開元寺僧傳真獲傳國寳獻于行臺驗其文即受命于天子孫保之八字也羣寮稱賀傳真師于廣明中遇京師喪亂得之祕藏已四十年矣篆文古體人不之識至是獻之時淮南楊溥西州王衍皆遣使致書勸帝嗣唐帝位帝不從二月代州刺史王建及卒是月鎮州大將軍張文禮殺其帥王鎔時帝方與諸將宴酒酣樂作聞鎔遇弑遽投觶而泣曰趙王與吾把臂同盟分如金石何負于人覆宗絶祀寃哉先是滹沱暴漲漂闗城之半溺死者千計是歲天西北有赤祲如血占者言趙分之災至是果驗時張文禮遣使請旄節于帝帝曰文禮之罪期于無赦敢邀予旄節左右曰方今事繁不欲與人生事帝不得巳而從之乃承制授文禮鎮州兵馬留後三月河中節度使朱友謙昭義節度使李嗣昭滄州節度使李存審定州節度使王處直邢州節度使李嗣源成徳軍兵馬留後張文禮遥領天平軍節度使閻寳大同軍節度使李存璋新州節度使王郁振武節度使李存進同州節度使朱令徳各遣使勸進請帝紹唐帝位帝報書不允自是諸鎮凡三上章勸進各獻貨幣數十萬以助即位之費帝左右亦勸帝早副人望帝撝挹久之九國志趙季良𫝊季良嘗夢手扶御座自謂輔佐之象由是頗述天時人事以諷莊宗深納其言秋七月河東節度副使盧汝弼卒八月庚申令天平節度使閻寳成徳兵馬留後符習率兵討張文禮于鎮州初王鎔令偏將符習以本部兵從帝屯于徳勝文禮既行弑逆忌鎔故將多被誅戮因遣人聞于帝欲以他兵代習歸鎮習等懼請留帝令𫝊旨于習及别將趙仁貞烏震等明正文禮試逆之罪且言爾等荷㦸從征盖君父之故銜寃報恩誰人無心吾當給爾資糧助爾兵甲爾試思之于是習等率諸將三十餘人慟哭于牙門請討文禮帝因授習成徳軍兵馬留後以部下鎮冀兵致討于文禮又遣閻寳以助之以史建瑭為前鋒甲子攻趙州刺史王鋌送符印以迎閻寳遂引軍至鎮州城下營于西北隅是月張文禮病疽而卒其子處瑾代掌軍事九月前鋒將史建瑭與鎮人戰于城下為流矢所中而卒冬十月己未梁將戴思逺攻徳勝北城帝命李嗣源設伏于戚城令騎軍挑戰梁軍大至帝御中軍以禦之時李從珂偽為梁幟奔入梁壘斧其眺樓持級而還梁軍愈恐步兵漸至李嗣源以鐡騎三千乘之梁軍大敗俘斬三萬計辛酉閻寳上言定州節度使王處直為其子都幽於别室都自稱㽞後歐陽史王處直叛附于契丹其子都幽處直以來附十一月帝至鎮州城下張處瑾遣弟處琪幕客齊儉等候帝乞降言猶不遜帝命囚之時王師築土山以攻其壘城中亦起土山以拒之旬日之間機巧百變張處瑾令韓正時以千騎夜突圍將入定州與王處直議事為我游軍追擊破之餘衆保衡唐賊將彭贇斬正時以降十二月辛未王郁誘契丹案巴堅冦幽州契丹國志王處直在定州以鎮定為唇齒恐鎮亡而定孤乃潜使人語其子王郁使賂契丹令犯塞以救鎮州之圍王郁説太祖曰鎮州美女如雲金帛似山天皇速往則皆為亡物也不然則為晉主所有矣太祖以為然率衆而南遂引軍涿州陷之又寇定州王郁遣使告急帝自鎮州率五千騎赴之天祐十九年春正月甲午帝至新城契丹前鋒三千騎至新樂是時梁將戴思逺乗虚以寇魏州軍至魏店李嗣源自領兵馳入魏州梁人知其有備乃西渡洹水䧟成安而去時契丹渡沙河而諸將相顧失色又聞梁人内侵鄴城危急皆請旋師唯帝謂不可乃率親騎至新城契丹萬餘騎遽見帝軍惶駭而退帝分軍為二廣追攝數十里獲案巴堅之子時沙河水薄橋梁隘狹敵争踐而過陷溺者甚衆案巴堅方在定州聞前軍敗退保望都帝至定州王都迎謁是夜宿于開元寺翼日引軍至望都契丹逆戰帝身先士伍馳擊數四敵退而結陣帝之徒兵亦陣于水次李嗣昭躍馬奮擊敵衆大潰俘斬數千追擊至易州獲氈裘毳幕羊馬不可勝紀時歲且北至大雪平地五尺敵乏芻糧人馬斃踣道路纍纍不絶帝乘勝追襲至幽州契丹國志晉王趨望都為契丹所圍力戰出入數四不解李嗣昭引三百騎横擊之晉王始得出因縱兵奮擊太祖兵敗遂北至易州㑹大雪彌旬平地數尺人馬死者相屬太祖乃歸是月梁將戴思逺寇徳勝北城築壘穿塹地道雲梯晝夜攻擊李存審極力拒守城中危急帝自幽州聞之倍道兼行以赴梁人聞帝至燒營而遁三月丙午王師敗于鎮州城下閻寳退保趙州時鎮州累月受圍城中艱食王師築壘環之又決滹沱水以絶城中出路是日城中軍出攻其長圍皆奮力死戰王師不能拒引師而退鎮人壊其營壘取其芻糧者累日帝聞失律即以昭義節度使李嗣昭為北面招討使進攻鎮州夏四月嗣昭為流矢所中卒于師已卯天平節度使閻寳卒以振武節度使李存進為北面招討使是月大同軍節度使李存璋卒五月乙酉李存進圍鎮州營于東渡八月梁將段凝陷衛州刺史李存儒被擒存儒本俳優也帝以其有膂力故用為衛州刺史既而誅斂無度人皆怨之故為梁人所襲九國志趙季良𫝊莊宗入鄴時兵革屢興屬邑租賦邇久一日莊宗召季良切責之季良對曰殿下何時平河南莊宗正色曰爾掌輿賦而稽緩安問我勝負乎季良曰殿下方謀攻守復務急徴一旦衆心有變恐河南非殿下所有莊宗飲容前席曰微君之言㡬失計梁將戴思逺又䧟共城新鄉等邑自是澶淵之西相州之南皆為梁人所據九月戊寅朔張處球悉城中兵奄至東垣渡急攻我之壘門時騎軍已臨賊城不覺其出李存進惶駭引十餘人鬬于橋上賊退我之騎軍前後夾擊之賊衆大敗歩兵數千殆無還者是役也李存進戰殁于師以蕃漢馬歩總管李存審為北面招討使以攻鎮州丙午夜趙將李再豐之子沖投縋以接王師諸軍登城遲明畢入鎮州平獲處球處瑾處琪并其母及同惡髙濛李翥齊儉等皆折足送行臺鎮人請醢而食之發張文禮尸磔于市帝以符習為鎮州節度使烏震為趙州刺史鎮人請帝兼領本鎮從之乃以符習遥領鎮人請帝兼領本鎮從之乃以符習遥領天平軍節度使十一月河東監軍張承業卒十二月以魏州觀察判官張憲權知鎮州軍州事同光元年春正月丙子五臺山僧獻銅鼎三言于山中石崖間得之二月新州團練使李嗣肱卒是時以諸藩鎮相繼上牋勸進乃命有司制置百官省寺仗衛法物期以四月行即位之禮以河東節度判官盧質為大禮使三月已卯以横海軍節度使内外蕃漢馬歩總管李存審為幽州節度使潞州留後李繼韜叛送欵于梁是月築即位壇于魏州牙城之南夏四月已巳帝昇壇祭告昊天上帝遂即皇帝位文武臣寮稱賀禮畢御應天門宣制改天祐二十年為同光元年大赦天下自四月二十五日昧爽以前除十惡五逆放火行刧持杖殺人官典犯贓屠牛鑄錢合造毒藥外罪無輕重咸赦除之應蕃漢馬歩將校並賜功臣名號超授檢校官巳髙者與一子六品正員官兵士並賜等第優給其戰殁功臣各加追贈仍定諡號民年八十已上與免一子役内外文武職官並可直言極諫無有隐諱貢選二司宜令有司速啇量施行雲應蔚朔易定幽燕及山後八軍秋夏税率量與蠲減民有三世已上不分居者與免雜徭諸道應有祥瑞不用奏聞赦書有所未該委所司條奏以聞云是歲自正月不雨人心憂恐宣赦之日澍雨溥降初唐咸通中金水土火四星聚于畢昴太史奏畢昴趙魏之分其下將有王者懿宗乃詔令鎮州王景崇被衮冕攝朝三日遣臣下備儀注軍府稱臣以厭之其後四十九年帝破梁軍于柏鄉平定趙魏至是即位于鄴宫是月以行臺左丞相豆盧革為門下侍郎同中書門下平章事太清宫使以行臺右丞相盧澄為中書侍郎平章事監修國史以前定州掌書記李徳休為御史中丞以河東節度判官盧質為兵部尚書充翰林學士承旨以河東掌書記馮道為户部侍郎充翰林學士以魏博鎮冀觀察判官張憲為工部侍郎充租庸使以中門使郭崇韜昭義監軍使張居翰並為樞宻使以權知幽州軍府事李紹宏為宣徽使以魏博節度判官王正言為禮部尚書行興唐尹以河東軍城都虞候孟知祥為太原尹充西京副留守以澤潞節度判官任圜為工部尚書兼真定尹充北京副留守詔升魏州為東京興唐府改元城縣為興唐縣貴郷縣為廣晉縣以太原為西京以鎮州為北都是時所管節度一十三州五十閏月丁丑以李嗣源為檢校侍中依前横海軍節度使内外蕃漢副總管以幽州節度使李存審為檢校太師兼中書令依前蕃漢馬步總管以河東節度使朱友謙為檢校太師兼尚書令安國軍節度使符習加同平章事定州節度使王都加檢校侍中是月追尊曾祖蔚州太保為照烈皇帝廟號懿祖夫人崔氏曰昭烈皇后追尊皇祖代州太保為文景皇帝廟號獻祖夫人秦氏曰文景皇后追尊皇考河東節度使太師中書令晉王為武皇帝廟號太祖詔于晉陽立宗廟以髙祖神堯皇帝太宗文皇帝懿宗昭聖皇帝昭宗聖穆皇帝及懿祖以下為七廟甲午契丹寇幽州至易定而還時有自鄆來者言節度使戴思逺領兵在河上州城無守兵可襲而取之帝召李嗣源謀曰昭義阻命梁將董璋攻迫澤州梁志在澤潞不慮别有事生汶陽無備不可失也嗣源以為然壬寅令嗣源率歩騎五千箝枚自河趨鄆是夜隂雨我師至城下鄆人不覺遂乘城而入鄆州平制以李嗣源為天平軍節度使梁主聞鄆州陷大恐乃遣王彦章代戴思逺總兵以來拒時朱守殷守徳勝南城帝懼彦章奔衝遂幸澶州五月辛酉彦章夜率舟師自楊村浮河而下斷徳勝之浮橋攻南城陷之帝令中書焦彦賓馳至楊劉固守其城命朱守殷撤徳勝北城屋木攻具浮河而下以助楊劉是時徳勝軍食芻茭薪炭數十萬計至是令人輦負入澶州事既倉卒耗失殆半朱守殷以所毁屋木編栰置歩軍于其上王彦章以舟師沿流而下各行一岸每遇轉灘水滙即中流交鬬流矢雨集或全舟覆没一彼一此終日百戰比及楊劉殆亡其半已已王彦章段凝率大軍攻楊劉南城焦彦賓與城守將李周極力固守梁軍晝夜攻擊百道齊進竟不能下遂結營于楊劉之南東西延袤十數柵六月巳亥帝親御軍至楊劉登城望見梁軍重壕複壘以絶其路帝乃選勇士持短兵出戰梁軍于城門外連延屈曲穿掘小壕伏甲兵于中候帝軍至則弓弩齊發師人多傷兵不得進帝患之問計于郭崇韜崇韜請于下流據河築壘以救鄆州又請帝日令勇士挑戰旬日之内寇若不至營壘必成帝善之即令崇韜與毛璋率數千人中夜往博州濟河東晝夜督役居六日營壘將成戊子梁將王彦章杜晏球領徒數萬晨壓帝之新壘時板築雖畢牆仞低庳戰具未備沙城散惡王彦章列騎環城虐用其人使步軍堙壕登堞又于上流下巨艦十餘艘扼斷濟路自旦至午攻擊百端城中危急帝自楊劉引軍陣于西岸城中望之大呼帝艤舟將渡梁軍遂解圍退保鄒家口秋七月丁未帝御軍沿河而南梁軍棄鄒家口夜遁委棄鍋甲芻糧千計戊午遣騎將李紹貽直抵梁軍壘梁益恐又聞李嗣源自鄆州引大軍將至已未夜梁軍拔營而遁復保于楊村帝軍屯于徳勝甲子帝幸楊劉城巡視梁軍故壘八月壬申朔帝遣李紹斌以甲士五千援澤州初李繼韜之叛也潞之舊將裴約以兵戍澤州不徇繼韜之逆既而梁遣董璋率衆攻其城約拒守久之告急于帝故遣紹斌救之未至而城巳陷裴約被害帝聞之嗟痛不已甲戌帝自楊劉歸鄴梁以段凝代王彦章為帥戊子凝帥衆五萬結營于王村自髙陵渡河帝軍遇之生擒梁前鋒軍士二百餘戮于都市庚寅帝御軍至朝城戊戌梁左右先鋒指揮使康延孝領百騎來奔帝虚懐引見賜御衣玉帶屏人問之對曰臣竊觀汴人兵衆不少論其君臣將校則終見敗亡趙巖趙鵠張漢傑居中專政締結宫掖賄賂公行段凝素無武畧一朝便見大用霍彦威王彦章皆宿將有名翻出其下自彦章獲徳勝南城梁主亦稍奬使彦章立性剛暴不耐凌制梁主一每發軍即令近臣監䕶進止可否悉取監軍處分彦章悒悒形于顔色自河津失利段凝彦章又獻謀欲數道舉軍令董璋以陜虢澤潞之衆趨石會闗以寇太原霍彦威統闗西汝洛之衆自相衛以寇鎮定段凝杜晏球領大軍以當陛下令王彦章張漢傑統禁軍以攻鄆州決取十月内大舉又自滑州南決破河堤使水東注曹濮之間至于汶陽瀰漫不絶以陷北軍臣在軍側聞此議臣惟汴入兵力聚不不少分則無餘陛下但待分兵領鐡騎五千自鄆州兼程直抵于汴不旬日天下事定矣帝懌然壯之九月壬寅朔帝在朝城凝兵至臨河南與帝之騎軍接戰是時澤潞叛衛州黎陽為梁人所據州以西相以南寇鈔日至編户流亡計其軍賦不支半年又王郁盧文進召契丹南侵瀛涿又聞梁人將圖大舉帝深憂之召將吏謀其大計或曰自我得汶陽以來湏大將固守城門之外元是賊疆細而料之得不如失今若馳檄告諭梁人却衛州黎陽以易鄆州指河為界約且休兵我國力稍集則議改圖帝曰嘻行此謀則無葬地矣時郭崇韜勸帝親御六軍直趨汴州半月之間天下可定帝曰正合朕意大丈夫得則為王失則為寇予行計決矣又問司天監對曰今歲時不利深入必無成功帝弗聴戊辰梁將王彦章率衆至汶河李嗣源遣騎軍偵視至遞公鎮梁軍來挑戰嗣源以精騎擊而敗之生擒梁將任釗田章等三百人俘斬二百級彦章引衆保于中都嗣源飛驛告捷帝置酒大悦曰是當決行渡河之䇿己已下令軍中將士家屬並令歸鄴舊五代史巻二十九
