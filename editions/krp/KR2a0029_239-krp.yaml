  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2a0029_WYG_239-1a, image: WYG0278/WYG0278-0361a.png}
body:
  text: 舊五代史巻一百二十宋門下侍郎參知政事監修國史薛居正等撰周書第十一恭帝紀恭帝諱宗訓世宗子也廣順三年歲在癸丑八月四日生於澶州之府第顯德六年六月癸未制授特進左衛上將軍封梁王食邑三千戸實封五百戸癸已世宗崩甲午内出遺制命帝柩前即皇帝位是日羣臣奉帝即位而退丁酉北面兵馬都部署韓令坤奏敗契丹五百騎於霸州北戊戌文武百寮宰臣范質等上表請聽政表三上允之壬寅文武臣寮上表請以八月四日為天壽節從之癸卯以司徒平章事范質為山陵使以翰林學士判太常寺事竇儼為禮儀使以兵部尚書張昭為鹵簿使以御史中丞邊歸讜為儀仗使以宣徽南院使判開封事昝居潤為橋道頓逓使是月州郡十六奏大雨連旬不止秋七月丁未以戸部尚書李濤為山陵副使以度支郎中盧億為山陵判官辛亥左散騎常侍申文炳卒乙卯右拾遺徐雄奪三任官坐誣奏雷澤縣令虚破戸也丁巳百寮釋服尚輦奉御金彦英本東夷人也奉使髙麗稱臣于夷王故及于罪庚申以邢州節度使王彦鎬為襄州節度使進封開國公以侍衛歩軍都指揮使曹州節度使檢校太保袁彦為陜州節度使加檢校太傅以右羽林統軍權知邢州事檢校太保李繼勲為邢州節度使加檢校太傅以滑州留後檢校太保陳思讓為滄州節度使以侍衛馬軍都指揮使陳州節鎭度使檢校太傅韓令坤為侍衛馬歩都虞候依前陳州節度使加檢校太尉以虎捷左廂都指揮使岳州防禦使檢校司徒髙懷德為夔州節度使充侍衛馬軍都指揮使檢校太保以虎捷左廂都指揮使常州防禦使檢校司空張鐸為遂州節度使充侍衛歩軍都指揮使檢校太保仍改名令鐸宋史張令鐸傳云本名鐸以與河中張鐸同姓名故賜今名壬戌以鄆州節度使充侍衛馬歩軍都指揮使檢校太傅兼侍中李重進為淮南節度使檢校太尉兼侍中依前侍衛馬歩軍都指揮使以襄州節度使檢校太尉同平章事向拱為河南尹充西京留守加檢校太師兼侍中通鑑向拱即向訓也避恭帝名改焉以宋州節度使充侍衛馬歩軍副都指揮使檢校太尉同平章事韓通為鄆州節度使依前侍衛親軍馬歩軍副都指揮使以澶州節度使檢校太尉同平章事駙馬都尉張永德為許州節度使進封開國公以今上為宋州節度使依前檢校太尉殿前都㸃檢進封開國侯以淮南節度使兼殿前副都㸃檢檢校太保慕容延釗為澶州節度使檢校太傅依前殿前副都㸃檢進封開國伯以殿前都指揮使江州防禦使檢校司空石守信為滑州節度使檢校太保依前殿前都指揮使丙寅制大赦天下庚午翰林學士判太常寺竇儼撰進大行皇帝太室歌酌獻辭舞曰定功之舞歌辭不録是月諸道相繼奏大雨所在川渠漲溢漂溺廬舍損害苗稼八月甲戌朔以光禄卿致仕柴守禮為太子太保致仕乙亥翰林學士兼判太常寺竇儼撰進大行皇帝尊諡曰睿武孝文皇帝廟號世宗從之庚辰天下兵馬都元帥守尚書令兼中書令吳越國王錢俶加食邑一千戸實封四百戸改賜功臣天雄軍節度使檢校太師守太傅兼中書令魏王符彦卿加守太尉夏州節度使檢校太師守太保兼中書令西平王李彛興加守太傅荆南節度使檢校太師守中書令南平王髙保融加守太保壬午山陵使范質撰進大行皇帝陵名曰慶陵從之秦州節度使西靣沿邊都部署檢校太師守中書令褒國公王景進封涼國公徐州節度使檢校太師兼中書令郭從義加開府儀同三師鄜州節度使檢校太師兼中書令邢國公武行德進封宋國公永興軍節度使檢校太師兼侍中李洪義加開府儀同三司鳯翔節度使檢校太尉兼侍中郭崇加檢校太師潞州節度使檢校太傅兼侍中李筠加檢校太尉朗州節度使檢校太尉兼侍中周行逢加檢校太師甲申壽州節度使檢校太師同平章事韓國公楊信封魯國公邠州節度使檢校太師劉重進廬州節度使檢校太尉宋延渥並加開府儀同三司涇州節度使趙贊鄧州節度使檢校太尉白重贊河中節度使檢校太尉張鐸並加階爵丙戌易定節度使孫行友靈州節度使馮繼業府州節度使折德扆並自檢校太保加檢校太傅進階爵以延州留後檢校太傅李萬全為延州節度使進封開國公庚寅皇弟特進檢校太保左饒衛上將軍燕國公食邑三千户宗讓加檢校太傅進封曹王改名熈讓熈謹可光禄大夫檢校太保右武衛大將軍封紀王食邑三千户熈誨可金紫光禄大夫檢校司徒左領衛大將軍封蘄王食邑三千户仍令所司擇日備禮册命以晉國長公主張氏為晉國大長公主以前陜州節度使檢校太尉藥元福為曹州節度使進階爵甲午守司徒同平章事𢎞文館大學士參知樞宻院事范質加開府儀同三司進封蕭國公門下侍郎兼禮部尚書同平章事監修國史參知樞宻院事王溥加右僕射進封開國公權樞宻使中書侍郎同平章事集賢殿大學士魏仁浦加兼刑部尚書依前樞宻使檢校太傅右驍衛上將軍吳延祚依前樞宻使進封慶國公以左武衛上將軍史佺為左金吾上將軍致仕乙未以隴州防禦使王全斌為相州留後戊戌宣徽南院使判開封府事昝居潤宣徽北院使判三司張羙並加檢校太傅已亥前司空李榖加開府儀同三司趙國公以前太傅少卿朱渭為太僕卿致仕辛丑左金吾上將軍致仕史佺卒壬寅髙麗國遣使朝貢兼進别序孝經一巻越王孝經新義八巻皇靈孝經一巻孝經雌圖三巻文昌雜録云别序者記孔子所生及第子從學之事新義者以越王為問目釋疏文之義皇靈耆灾之延常避灾之事及符文乃道書也雌圖者止說日之環暈星之彗孛亦非竒書九月壬子前滄州留後李彦郡卒乙卯髙麗王王昭加檢校太師食邑三千户丙辰以三司副使王贊為内客省使兼北靣諸州水陸轉運使癸亥前開封縣令路延規除名流沙門島先是延規有過停任有司召延規宣勅延規拒命為憲司所按故有是命甲子以端明殿學士禮部侍郎竇儀為兵部侍郎充職以尚書户部員外郎直樞宻院杜華為司門郎中充樞宻直學士賜紫以翰林學書士尚度支員外郎王著為金部郎中知制誥充職仍賜金紫是日翰林學士尚書屯田郎中知制誥李昉都官郎中知制誥扈䝉水部郎中知制誥趙逢並加柱國賜金紫乙丑兵部尚書張昭進封舒國公户部尚書李濤進封莒國公以太子詹事劉温叟為工部侍郎判國子祭酒事是月京師及諸州郡霖雨踰旬所在水潦為患川渠泛溢冬十月癸酉朔以司農卿致仕李鍇為太僕卿致仕太常少卿致仕姚遂為將作監致仕丁亥太子太師薛懷讓封把國公壬辰翰林學士判太常寺事竇儼撰進貞惠皇后廟歌辭丁酉世宗皇帝靈駕發引戊戌以前相州留後王暉為右神武統軍辛丑江南國主李景來告世子𢎞冀卒遣御厨使張延範充弔祭使十一月壬寅朔葬世宗皇帝於慶陵以貞惠皇后劉氏祔焉戊申西京奏太子太師致仕白文珂卒丙辰日南至百寮奉表稱賀戊午廢兖州廣利軍依舊為萊蕪監壬戌升鳯州固鎭為雄勝軍丙寅左羽林統軍馬希崇案原夲有脫誤十二月壬申朔史館奏請差官修撰世宗實録從之甲戌改萬歲殿為紫宸殿甲午西京奏左屯衛上將軍致仕李蕚卒乙未大霖晝昏凡四日而止分命使臣賑給諸州遭水人户顯德七年春正月辛丑朔文武百寮進名奉賀鎭定二州馳奏契丹入寇河東賊軍自土門東下與蕃寇合勢詔今上率兵北征癸卯發京師是夕宿於陳橋驛未曙軍變將士大譟呼萬歲擐甲將刄推戴今上陞大位扶䇿升馬擁廹南行是日詔曰天生蒸民樹之司牧二帝推公而禪位三王乘時以革命其極一也予末小子遭家不造人心已去國命有歸咨爾歸德軍節度使前都㸃檢趙案原夲空二字稟上聖之姿有神武之畧佐我髙祖格于皇天逮事世宗功存納麓東征西怨厥績懋焉天地鬼神享于有德謳謠獄訟附于至仁應天順民法堯禪舜如釋重負予其作賓嗚呼欽哉祗畏天命今上于是詣崇元殿受命百官朝賀而退制封周帝為鄭王以奉周祀正朔服色一如舊制奉皇太后為周太后續通鑑長編建隆三年周鄭王出居於房州皇朝開寳六年春崩于房陵今上聞之震慟𤼵哀成服于便殿百寮進名奉慰㝷遣中使監䕶其喪續通鑑長編開寳六年三月乙卯房州上言周鄭王殂上素服𤼵哀輟視朝十日以其年十月歸葬於世宗慶陵之側詔有司定諡曰恭皇帝陵曰順陵續通鑑長編仁宗嘉祐四年詔有司取柴氏譜系于諸房中推最長一人令歲時奉周祀史臣曰夫四序之氣寒往則署來五行之數金銷則火盛故堯舜之揖讓漢魏之傳禪皆知其數而順乎人也况恭帝當紈綺之冲年會笙鏞之變響聽謳歌之所屬知命厯之有在能遜其位不亦善乎終諡為恭故其宜矣舊五代史巻一百二十
