body:
  text: 舊五代史巻八十五攷證晉少帝紀五己未杜威奏駐軍於中渡橋案通鑑甲寅威等至中度橋十二月己未帝始聞大軍屯中度胡三省注云强冦深入諸軍孤危而驛報七日始逹晉之為兵可知矣歐陽史作己未杜威軍于中渡葢以奏聞之日為駐軍之日降帝為光禄大夫光禄遼史避諱作崇禄内官三十人案遼史作内宦三人軍健二十人案遼史作健卒十人富珠哩舊作傅住兒今改按巴堅舊作阿保機今改綽諾錫里舊作禪奴舍利今改舒嚕舊作述律今改舊五代史巻八十五攷證
