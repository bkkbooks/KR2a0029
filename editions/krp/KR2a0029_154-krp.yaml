body:
  text: 舊五代史巻七十七宋門下侍郎參知政事監修國史薛居正等撰晉書第三髙祖紀三天福三年正月戊申朔帝御崇元殿受朝賀仗衛如式己酉百守司以太史先奏日蝕蝕故也至是不虧内外稱賀壬戌是夜以上元張燈於京城縱都人遊樂帝御大寧宫門樓觀之丙寅端明殿學士禮部侍郎和凝兼判度支工部侍郎判度支王松改尚書刑部侍郎户部郎中髙延賞改左諫議大夫充諸道鹽鐵轉運副使壬申以前右諌議大夫薛融為左諌議大夫前興元節度使張筠卒於西京輟視朝一日五代會要太常禮院申凖故事前節度使無例輟朝敕宜特輟一日朝參二月庚辰左散騎常侍張允進駁赦論帝覽而嘉之降詔奬飾仍付史館甲申荆南節度使髙從誨加食邑實封戊子翰林學士李澣賜緋魚袋以尚書屯田員外郎知制誥呉承範為庫部員外郎充樞宻院直學士乙未御札曰會有宣示百官令進封事今據到者未及十人朕雖無德自行敕後已是數月至於假手于人也合各有一件事敷奏食祿於朝豈當如是言而不用朕所甘心用而不言誰之責也丙申制武清軍節度使馬希蕚改威武軍節度使辛丑中書上言禮經云禮不諱嫌名二名不偏諱注云嫌名謂聲音相近若禹與雨丘與區也二名不偏諱謂孔子之母名徴在言在不稱徴言徴不稱在此古禮也唐太宗二名並諱𤣥宗二名亦同人姓與國諱音聲相近是嫌名者亦改姓氏與古禮有異廟諱平聲字即不諱餘三聲諱仄聲即不諱平聲字所諱字正文及偏旁闕㸃畫望依令式施行詔曰朝廷之制今古相沿道在人𢎞禮非天降方開厯數䖍奉祖宗雖踰孔子之文未爽周公之訓所謂二名及嫌名之宜依唐禮施行按太原縣有史匡翰碑立于天福八年匡翰建瑭之子也碑于瑭字空文以避諱而建瑭父敬思仍書敬字葢當時避諱之體如此乙巳天和節宴近臣於廣政殿三月戊午鴻臚卿劉頎卒贈太子賓客壬戌東上閤門使前司農卿蘇繼顔改鴻臚卿充職囘鶻可汗王仁美進野馬獨峯駝玉團碙砂等方物甲戌永壽長公主薨輟朝一日故涇州節度使察畱後盧順密贈右驍衛上將軍丁丑詔禁止私下打造鑄瀉銅器四月丁亥以尚書吏部侍郎盧詹為尚書左承中書舍人李詳上疏請沙汰在朝文武臣僚以減宂食仍條貫藩侯郡守凡遇溥恩不得多奏衙門職員妄邀恩澤疏奏嘉之戊子宣武軍節度侍衛親軍馬歩軍都指揮使廣晉府行營都招討使楊光逺加兼中書令昭義節度使侍衛馬軍都指揮使廣晉府行營都排陣使杜重威河陽節度使兼奉國左右廂都揮使使廣晉府行營馬歩都虞侯侯益並加檢討太尉鳳翔節度使檢校太師兼中令令岐王李從曮進封秦王平盧軍節度使檢校軍節度使李從温西京畱守京口尹李周歸德軍節度使趙在禮並加兼侍中是月諸道藩侯郡守皆等第加恩趙在禮並加兼侍中是月諸道藩侯郡守皆等第加恩改雍熙樓為章和樓避廟諱也五月丁未朔帝御崇元殿受朝仗衛如式丁巳詔應諸州縣名犯廟諱者並改之庚申以楊光逺男承祚為檢校工部尚書左威衛將軍駙馬將軍丁夘魏府行營歩軍都指揮使檢校司徒右神武統軍王周加檢校太保戊辰故振武節度使李嗣本贈太尉己巳詔中臣僚並帶平章事侍中中書令及諸道節度使並許私門立㦸仍並給官及據官品依令式處分六月丁丑右監門衛上將軍王彦璘卒甲申以太子詹事王居敬制置安邑解縣兩池𣙜鹽事左諌議大夫薛融上䟽請停修洛京大内優詔褒之尋罷營造庚寅翰林學士尚書工部郎中知制誥竇貞固改中書舍人充職户部尚書致仕蕭􅕋卒贈右僕射詔貢舉宜權停一年以員闕少而選人多常調有淹滯故也丁酉詔尚書司門應管諸闕令承等宜準唐天成四年四月四日敕本司不得補差秪委闕鎮使鈐轄見差補者並畫時勒停訖奏聞應常帶使相節度使自楊光逺已下凡七人並改鄉里名號七月丙午朔差左諫議大夫薛融祕書監吕琦駕部員外郎兼侍御史知雜事劉皥刑部郎中司徒詡大理正張仁瑑同共詳定唐明宗朝編敕庚戌御史中丞王延改尚書右丞尚書右丞盧導改尚書吏部侍郎以左諌議大夫薛融為御史中丞辛酉制皇帝受命寳以受天明命惟德允昌為文據六典受命寳者天子修封禪禮神祗則用之其始皆破皇業錢以製之皇業者藩邸主事之所有也五代會典天福三年六月中書門下奏準敕製皇帝受命寳今按唐貞觀十六年太宗文皇帝所刻之璽白玉為螭首其文曰皇帝景命有德者昌敕宜以受天明命惟德允昌為文刻之壬戌虞部郎中知制誥於運改中書舍人宰臣趙營桑維翰李崧各改鄉里名號荆南節度使髙從誨本貫汴州浚儀縣王畿鄉表節東坊改為擁旌鄉浴鳳里八月戊寅以左僕射劉晌為契丹冊禮使左散騎常侍韋勲副之給事中盧重為契丹皇太后冊禮使壬午魏府軍前奏前澶州刺史馮暉自逆城來歸定州奏境内旱民多流散詔曰朕自臨寰宇每念生民務切撫綏期於富庶屬干戈之未戢慮徭役之或煩惟彼中山偶經夏旱因兹疾苦遽至流移逹我聽聞深懷憫惻應定州所差軍前夫役逃户夏秋税並放甲申襄州奏漢江水漲一丈一尺已丑以前澶州刺史馮暉為檢校太保充義成軍節度使詔河府同州絳州等三處災旱逃移人户下所欠累年殘税并今年夏税差科及麥苖子沿徵諸色錢物等並放其逃户下秋苖據見檢校數不計是元額及出剩頃畆並放一半委觀察使散行曉諭専切攜應歸業户人仍指揮逐縣切加安撫翰林學士中書舍人竇貞固上言請令文武百僚逐司之内各奏舉一人述其人有某能堪為某官某職據所薦臧否定主舉黜陟宋史竇貞固傳載此疏畧云為國之要進賢是先陛下方樹丕基宜求多士乞降詔百僚令各司議定一人有何能識堪何職官朝廷依奏用之若能符薦引果謂當才所奏之官望加奨賞如乖其舉或渉徇私所奏之官宜加黜罰自然官由德序位以才升三人同行尚聞擇善十目所視必不濫加臣職在論思敢陳狂狷疏奏嘉之仍令文武百官於晉紳之内草澤之中知灼然有才器者列名以春宴契丹冊禮使於廣政殿戊戌鄆州奏陽穀縣界河決青州王建立奏髙麗國宿衛質子王仁翟乞放歸鄉里從之辛丑鎮邢定三州奏奉詔共差樂官六十七人往契丹詔魏府城下自屯軍以來墳墓多經斸掘雖已差人收掩今更遣太僕卿郉德昭往伸祭奠九月己酉宫苑使焦繼勳自軍前押范延光牙將馬諤齎歸命請罪表到闕壬子延光領部下士素服於本府門俟命有詔釋罪乙卯詔司空兼門下侍郎平章事馮道官一品給門㦸十六枝中書侍郎平章事桑維翰李崧給門㦸十二枝己未宣遣靜鞭官劉守威左金吾仗勘契官王英司天臺雞叫學生商暉等竝赴契丹庚申契丹使人往洛京般取趙氏公主宋史趙賛傳德鈞父子降晉契丹盡錮之北去贊獨與母公主畱西洛天福三年晉祖命贊奉母歸薊門襄州奏漢江水漲三丈出岸害稼東都奏洛陽水漲一丈五尺壞下浮橋乙丑於闐國王楊仁美遣使貢方物囘鶻可汗遣使貢駝馬丙寅趙延壽進馬謝恩放燕國長公主歸幽州范延光差節度副使李式到闕奉表首罪兼進玉帶一條遣宣徽南院使劉處讓權知魏府軍府事己巳復范延光官爵其制略曰頃朕始登大寶未靜中原六飛纔及於京師千里未通於懷抱楚王求舊方在遺簪曾子傳疑忽成投杼尋聞悛悔遽戮姦囘干戈俄至於經時雷雨因思於作解果馳賓介疊貢表章向丹闕以傾心瀝表誠而効順而況保全黎庶完整甲兵納款斯來其功非細得不特頒鐵契重建牙章封本郡之土茅移樂郊之旌鉞至於將吏咸降絲綸於戲上𤣥之運四時不愆者信大道之崇三寶所重者慈活萬户之傷夷息六師之勞瘁遂予仁憫旌爾變通永貽子孫長守富貴敬佩光寵可不美歟可復推誠奉義佐運致理功臣天雄軍節度管内觀察處置等使開府儀同三司府太傅兼中書令廣晉尹上柱國臨清王食邑一萬戸食實封一千户改授鄆州刺史天平軍節度鄆齊原本闕一字等州觀察處置等物賜鐵券改封高平郡王仍令擇日備禮冊命以天雄軍節度副使檢校刑部尚書李式檢校尚書右僕射充亳州團練使以貝州刺史孫漢威為檢校太保隴州防禦使以天雄軍三城都巡檢使薛霸為檢校司空衛州刺史以天雄軍馬步軍都指揮使王建為檢校司空虢州刺史以天雄軍内外馬軍都指揮使藥元福為檢校司空深州刺史以天雄軍内外步軍都指揮使安元霸為檢校司空隨州刺史以天雄軍都監前河陽行軍司馬李彥珣為檢校司空坊州刺史李式延光之舊僚也其餘皆延光之將佐也故有是命庚午遣客省使李守貞押器幣賜魏府立功將校辛未以魏府招討使楊光逺檢校太師兼中書令行廣晉伊充天雄軍節度使十月乙亥福建節度使王繼恭遣使貢方物戊寅契丹命使以寳冊上帝徽號曰英武明義皇帝歐陽史作契丹使中書令韓頻來奉冊是日左右金吾六軍儀仗太常鼓吹等並出城迎引至崇元殿前陳列如儀鄆州范延光奏到任内庚辰御札曰為國之規在於敏政建都之法務要利民厯攷前經朗然通論顧惟涼德獲啓丕基當數朝戰伐之餘是兆庻傷殘之後車徒旣廣帑廩咸虛經年之輓粟飛芻繼日而勞民動衆常煩漕運不給供須今汴州水陸要衝山河形勝乃萬庾千箱之地是四通八達之郊爰自按巡益觀宜便俾升都邑以利兵民汴州宜升為東京置開封府仍升開封浚儀兩縣為赤縣其餘升為畿縣應舊置開封府時所管屬縣並可仍舊割屬收管亦升為畿縣其洛京改為西京其雍京改為晉昌軍畱守改為節度觀察使依舊為京兆府列在七府之上其曹州改為防禦州其餘制置竝委中書門下商量施行丙戌以護聖左廂都指揮使曹州刺史張彥澤為鎭國軍節度使以工部尚書裴皥為尚書右僕射致仕是日詔改大寕宫門為明德門又改京城諸門名額南門尉氏以薰風為名西二門鄭門梁門以金義乾明為名北二門酸棗門封丘門以𤣥化宣陽為名東二門曹門宋門以迎春仁和為名戊子以右金吾大將軍馬從斌為契丹國信使考功郎中劉知新副之以前天平軍節度使檢校太尉同平章事安審琦為晉昌軍節度使行京兆尹襄州奏江水漲害稼壬辰以樞密使中書侍郎平章事集賢殿大學士桑維翰兼兵部尚書皆罷樞密使案以上疑有闕文據通鑑攷異引晉高祖實録維翰與李崧竝罷樞密使戊戌大赦天下以魏府初平故也庚子楊光逺朝覲到闕對於便殿錫賚甚厚於闐國王李聖天冊封為大寶於闐國王以杭州嘉興縣為秀州從錢元瓘之奏也十一月甲辰樞密直學士祠部員外郎呉涓可金部郎中知制誥樞密直學士庫部員外郎呉承範可祠部郎中知制誥乙巳鄆州范延光來朝丙午封閩王昶為閩國王加食邑一萬五千户又以中呉建武等軍節度使檢校太師兼中書令蘇州誠州刺史錢元璙為太傅以清海軍節度使廣州刺史錢元璹為檢校太尉兼中書令仍改名元懿應付魏府行營將校及六軍諸道本城將校等竝與加恩戊申以門下侍郎平章事監修國史判戸部趙瑩兼吏部尚書以威武軍節度福建管内觀察處置等使王繼恭為特進檢校太傅仍封臨海郡王以魏博節度使楊光逺為守太尉洛京畱守兼河陽節度使判六軍諸衛事端明殿學士尚書禮部侍郎判度支和凝改尚書戸部侍郎充職庚戌鄆州范延光上表乞休退詔不允辛亥升廣晉府為鄴都置畱守升廣晉元城兩縣為赤縣屬府諸縣升為畿縣升相州為彰德軍置節度觀察使以澶衛二州為屬郡其澶州仍升為防禦州移於德勝口為治所升貝州為永清軍置節度觀察使以博冀二州為屬郡以西京畱守高行周為廣晉鄴都畱守廣晉府行營中軍使貝州防禦使王廷𦙍加檢校大傅充相州彰德軍節度使廣晉府行營步軍都指揮使右神武統軍王周為貝州永清軍節度使甲寅以范延光為太子太師致仕丙辰以祕書監吕琦為禮部侍郎歸德軍節度使趙在禮改天平軍節度使昭義軍節度使兼侍衛親軍馬步軍都虞候杜重威改忠武軍節度使忠武軍節度使侍衞親軍馬步軍都指揮使劉知逺改歸徳軍節度使前河陽節度使兼奉國左右廂都指揮使侯益改昭義軍節度使癸亥割濮州濮陽縣隸澶州詔許天下私鑄錢以天福元寶為文丙寅冬至帝御崇元殿受朝賀仗衞如式十二月甲戌朔以前兵部尚書梁文矩為太子少師以鎮州節度副使符䝉為右諫議大夫以吏部郎中曹國珍為左諫議大夫丙子以前涇州彰義軍節度使李德珫為晉州建雄軍節度使加同平章事以皇太子右金吾衛上將軍重貴為檢校太傅開封尹封鄭王加食邑三千戸戊寅大寶於闐國進奉使檢校太尉馬繼榮可鎮國大將軍使副黄門將軍國子少監張再通可試衛尉卿監使殿頭承旨通事舍人呉順規可試將作少監囘鶻使都督李萬金可歸義大將軍監使雷德順可順化將軍是日詔宜令天下無問公私應有銅欲鑄錢者一任取便酌量輕重鑄造戊子以河陽潛龍舊宅為開晉禪院邢州潛龍舊宅為廣法禪院龍武統軍李從昶卒輟朝一日贈太尉舊五代史巻七十七
