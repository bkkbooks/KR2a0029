body:
  text: 舊五代史巻一百三十四考證僭偽列傳一楊行宻傳乃追李璠等還按通鑑作李璠至盱眙行宻發兵襲之郭言力戰得免與是書異瑾與承嗣皆位至方伯按九國志行宻承制授朱瑾泰寧軍節度使李承嗣振武軍節度使此云位至方伯似未明晰附識于此楊溥傳渭渥之弟也按渭歐陽史及通鑑皆作隆演惟是書作渭詳見通鑑考異李昪傳昪自云唐𤣥宗第六子永璘王之裔按歐陽史昪自言唐憲宗子建王恪恪生超超生志志生榮自以為建王四世孫與是書異王審知傳以潮為節度福建管内觀察使審知為副按王審知德政碑作詔授潮節度累加檢校右僕射無審知為副事潮薨審知以譲其兄審邽按王審知德政碑作仲兄審邦此作審邽當以碑為正舊五代史巻一百三十四攷證
