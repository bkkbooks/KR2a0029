body:
  text: 舊五代史卷三十六宋門下侍郎知參政事監修國史薛居正等撰唐書第十二明宗紀二天成元年夏四月丙午帝自興聖宫赴西宫文武百僚縞素于位帝服斬衰親奉攢塗設奠哭盡哀乃於柩前即皇帝位百官易吉服班於位帝御衮冕受冊訖百僚稱賀丁未羣臣縞素赴西宫臨以樞密使安重誨為檢校司空守左領軍大将軍依前充樞密使宰臣豆盧革等三上表請聽政從之遣使徃諸道及淮南告哀辛亥帝始聽政於中興殿壬子西南面副招討使工部尚書任圜率步騎二萬六千人入見甲寅帝御文明殿受朝制改同光四年為天成元年大赦天下後宫内職量留一百人内官三十人敎坊一百人鷹坊二十人御厨五十人其餘應從所適諸司使務有名無實者並停分遣諸軍就食近畿以減饋送之勞秋夏税子每斗先有省秏一升今後秪納正數其省秏宜停天下節度防禦使除正至端午降誕四節量事進奉達情而巳自於州府圓融不得科斂百姓其刺史雖遇四節不在貢奉諸州雜税宜定合税物色名目不得邀難商旅租庸司先将繫省錢物與人迴圖宜令盡底収納以塞倖門云乙夘渤海國王大諲譔遣使朝貢是月北京副留守知留守事張憲賜死以其失守故也五月丙辰朔帝不視朝臨于西宫宰相豆盧革進位左僕射韋説進位門下侍郎兼户部尚書監修國史並依舊平章事衮州節度使檢校太傅朱守殷加同平章事充河南尹判六軍諸衛事滄州節度使檢校太傅安元信加同平章事移鎮徐州邠州節度使檢校太保毛璋加同平章事以太子賔客鄭珏為中書侍郎兼刑部尚書同中書門下平章事以工部尚書任圜為中書侍郎兼工部尚書同中書門下平章事判三司徐州節度使李紹真貝州刺史李紹英齊州防禦使李紹䖍河陽節度使李紹竒洺州刺史李紹能等上言前朝寵賜姓名今乞還舊内李紹䖍上言臣本姓王後移杜氏䝉前朝賜今姓名乞復本姓詔並可之李紹真復曰霍彦威李紹英復曰房知温李紹䖍復曰王晏球李紹竒復曰夏魯竒李紹能復曰米君立青州節度使檢校太傅同平章事符習加兼侍中徐州節度使檢校太傅霍彦威加兼侍中移鎮鄆州丁已初詔文武百僚正衙常參外五日一度内殿起居五代㑹要天成元年五月三日敕今後宰臣文武百官除常朝外每五日一度入内起居其中書非時有急切公事請開延英不在此限麟州奏指揮使張延寵作亂焚剽市民已殺戮訖戊午河陽節度使夏魯竒加檢校太傅以貝州刺史房知温為兖州節度使以齊州防禦使王晏球為宋州節度使以洺州刺史米君立為邢州節度使巳未賜文武百官各一馬一驢西都知府張籛進魏王繼岌打毬馬七十二匹北京馬步都指揮使李從温奏凖詔誅宦官初莊宗遇内難宦者數百人竄匿山谷落髮為僧奔至太原七十餘人至是盡誅于都亭驛辛酉詔華州放散西川宫人各歸骨肉壬戌以前相州刺史北京左右廂都指揮使安金全為安北都護振武節度使同平章事甲子前西都留守京兆尹張筠加檢校太傅充山南西道節度使以夔州節度使李紹文為遂州節度使以前鄧州留後戴思逺為洋州節度使丁夘以金吾将軍張實為金州防禦使戊辰以金紫光禄大夫檢校司空趙在禮為滑州節度使加檢校太保制下在禮以軍情不順為辭不之任以許州留後陶玘為鄧州留後以諸道馬步副都指揮使安審通為齊州防禦使庚午以權知北京軍府事汾州刺史符彦超為晉州留後以前陳州刺史劉仲殷為陜州留後癸酉以前磁州刺史劉彦琮為同州留後甲戌福州節度使檢校太傅王延翰加檢校太尉同平章事乙亥翰林學士户部侍郎知制誥馮道翰林學士中書舍人趙鳳俱以本官充端明殿學士端明之職自此始也五代㑹要明宗初登位四方書奏多令樞密使安重誨讀之不曉文義於是孔循獻議因唐室侍讀之號即創端明學士之名命馮道等為之丙子詔故西道行營都招討制置等使守侍中監修國史兼樞密使郭崇韜宜許歸塟其世業田宅並還與骨肉故萬州司户朱友謙可復䕶國軍節度使守太師兼尚書令河中尹西平王所有田宅財産並還與骨肉丁丑西都衙内指揮使張籛進納偽蜀主王衍犀玉帶各二條馬一百五十匹初莊宗遣中官向延嗣就長安之殺王衍也旋屬蕭牆之祸延嗣藏竄不知所之而衍之資裝妓樂竝為籛所有復懼事泄故聊有此獻戊寅以樞密使安重誨兼領襄州節度使制下重誨之黨謂重誨曰襄州地控要津不可乏帥無宜兼領重誨即自陳退許之以左金吾大将軍張遵誨為西京副留守知留守事辛巳以衛尉卿李懌為中書舍人充翰林學士壬午以前蔚州刺史張温為振武留後以左右廂突陣指揮使康儀誠為汾州刺史以左右廂馬軍都指揮使索自通為忻州刺史尚父吳越國王錢鏐遣使進金器五百兩銀萬兩綾萬匹謝恩賜玉冊金印初同光季年鏐上疏密求玉冊金印郭崇韜進議以為不可而樞密承㫖段佪受其重賂贊成其事莊宗即允其請至是故有貢謝甲申幽州節度使檢校太保李紹斌加檢校太傅同平章事復姓名為趙徳鈞乙酉詔百官朔望入閤賜廊下食自亂離已前常參官每日朝退賜食於廊下謂之廊餐乾符之後百司經費不足無每日之賜至是遇入閤即賜之五代㑹要明宗初即位命百官五日一起居李琪以為非故事請罷之惟每月朔望日合入閤睗食至是宣旨朔望入閤外仍五日一起居遂為定式六月戊子前襄州節度使李紹珙起復依前襄州節度使仍復本姓名曰劉訓以皇子河中留後從珂為河中節度使百僚表賀以翰林承㫖兵部尚書知制誥盧質為檢校司空充同州節度使巳丑以吏部尚書判太常卿事李琪為御史大夫以禮部尚書崔協為太常卿判吏部尚書銓事以御史中丞崔居儉為兵部侍郎以太子賔客蕭頃為禮部尚書中書奏請以九月九日皇帝降誕日為應聖節休假三日從之故忠武軍節度使檢校太師兼尚書令齊王張全義贈太師以前尚書右丞崔沂為尚書左丞丙申新州留後張庭裕雲州留後髙行珪並正授本軍節度使丁酉詔曰四夷來王歴代故事前後各因強弱撫制互有典儀大蕃須示于威容即於正衙引對小蕃但推於恩澤仍於便殿撫懐憲府奏論禮院詳酌皆徵故實咸有明文正衙威容未可全廢内殿恩澤且可常行若遇大蕃入朝即凖舊儀於正殿排比鋪陳立仗百官排班于正門引入對見時百僚入閤班退後郤引對朝貢蕃客御史大夫李琪奏論之下禮院檢討而降是命焉戊戌樞密使安重誨加檢校太保行兵部尚書事如故以太子詹事劉岳為兵部侍郎以太子右庶子王權為户部侍郎以太子左庶子任贊為工部侍郎庚子荆南節度使檢校太師兼尚書令南平王髙季興加守太尉兼尚書令澤潞節度使檢校太傅同平章事孔勍加兼侍中汴州屯駐控鶴指揮使張諫等謀叛伏誅以樞密使孔循權知汴州軍州事甲辰樞密使孔循加檢校太保守祕書監依前充使巳巳以祕書少監姚顗為左散騎常侍以太子左諭徳陸崇為右散騎常侍以兵部郎中蕭希甫為左諫議大夫前幽州節度判官吕夢竒為右諫議大夫以鄴都副留守孫岳為潁州團練使詔曰古者酌禮以制名懼廢於物取其難犯而易避貴便於時況徵在二名抑有前例以太宗文皇帝自登寶位不改舊稱時即臣有世南官有民部靡聞曲避止禁連呼朕猥以眇躬託於人上止遵聖範非敢自尊應文書内所有二字但不連稱不得迴避如是臣下之名不欲與君親同字者任自改更丁未中書門下奏京城潛龍舊宅望以至徳宫為名從之戊申夏州節度使開府儀同三司檢校太師兼中書令朔方王李仁福加食邑一千户以延州留後髙允韜為延州節度使以利州節度觀察留後張敬詢為利州節度使劎南西川節度副大使知節度事孟知祥加檢校太傅兼侍中劎南東川節度副大使知節度事董璋加檢校太傅壬子鳳翔節度使檢校太尉兼中書令李曮加檢校太師兼中書令汴州知州孔循奏召集謀亂指揮使趙䖍已下三千人並族誅訖甲寅以晉州留後符彦超為北京留守以鎮州副使王建立為鎮州留後以右龍武統軍安崇阮為晉州留後荆南節度使髙季興上言夔忠萬三州舊是當道屬郡先被西川侵據今乞郤割𨽻本管詔可之其夔州偽蜀先㑹建節宜依舊除刺史通鑑考異引于國紀年荆南史載天成元年二月壬辰請忠䕫萬州及雲安監𨽻本道莊宗許之詔命未下莊宗遇弑六月壬辰王表求三州明宗許之秋七月乙夘朔以太原舊宅為積慶宫庚申契丹渤海國俱遣使朝貢甲子詔割韓城郃陽兩縣屬同州誅滑州左右崇牙及及長劎等軍數百人夷其族作亂故也其都校于可洪等相次到闗亦斬於都市丁夘以偽蜀守司空門下侍郎平章事晉國公王諧為檢校司空守陵州刺史以虢州刺史石潭為耀州團練使辛未詔諸道節度刺史文武将史舊進月旦起居表今後除節度留後團練防禦使惟正至進賀表其四孟月並且止絶甲戌中書門下上言宣㫖令進納新授諸道判官州縣官官告敕牒祗應宣賜凖徃例除将相外並不賜官告即因梁氏起例凡宣授官並特㤙賜臣等商量自兩使判官令録在京除授者即於内殿謝㤙便辭赴任不更進納官告判司主簿不合更許朝對敕下後望準舊例處分從之乙亥莊宗皇帝梓宫發引帝衰服臨送於樓前是日塟莊宗於雍陵鎮州留後王建立奏涿州刺史劉殷肇不受代謀叛昨發兵収掩擒劉殷肇及其黨一十三人見折足勘詰己夘以比部郎中知制誥楊凝式為給事中充史館修撰判館事以偽蜀吏部尚書楊玢為給事中充集賢殿學士判院事升應州為彰徳軍節度仍以興唐軍為寰州𨽻彰徳軍宰相豆盧革貶辰州刺史韋説貶溆州刺史仍令所在馳驛發遣為諫議大夫蕭希甫疏奏故也制略曰革則縱田客以殺人説則侵鄰家而奪井選元亨之上第改王參之本名或主掌三司委元隨之務局或陶鎔百里受長吏之桑田咸屈塞於平人互阿私于愛子任官匪當黷貨無厭謀人之國若斯致主之方安在既迷理亂又昧巻舒而府司案牘爰來諫署奏章疊至備彰醜迹深汙明庭是宜約以三章投之四裔其河南府文案及蕭希甫論疏並宜宣示百僚庚辰賜蕭希甫衣段二十匹銀器五十兩賞疏革説之罪也宰相鄭珏任圜再見安重誨救解革説請不復追行後命又三上表救解俱留中不報辛巳以捧聖嚴衛左廂馬步軍都指揮使李從璋領饒州刺史充大内皇城使中書門下奏條制檢校官各納尚書省禮錢舊例太師太尉納四十千後減落至二十千太傅太保元納三十千減至十五千司徒司空元納二十千減至一十千僕射尚書元納一十五千減至七千員外郎中元納一十千今納三千四百者詔曰㑹府華資皇朝寵秩凡霑新命各納禮錢爰自近年多隳舊制遂致紀綱之地遽成廢墜之司况累條流就從減省方當提舉宜振規繩但縁其間翊衛動庸藩宣将佐自軍功而遷陟示恩澤以奨酬須議從權不在其例其餘自不帶平章事節度使及防禦團練刺史使府副使行軍巳下三司職掌監務官州縣官凡闗此例並可徵納其檢校官自員外郎至僕射秪初轉一任納錢若不改呼不在徵納仍委尚書省部司專切檢舉置靡逐月具數申中書門下癸未詔辰州刺史豆盧革可責授費州司户參軍溆州刺史韋説可責授夷州司户參軍皆員外置同正員仍令馳驛發遣甲申又詔曰責授費州司户參軍豆盧革夷州司户參軍韋説等自居台輔累換嵗華負先皇倚注之恩失大國爕調之理朕自登宸極常委鈞衡略無謙遜之辭但縱貪饕之意除官受賂樹黨徇私每虧敬于朕前徒自尊於人上道路之諠騰不巳諫臣之條疏頗多罪狀顯彰典刑斯舉合從極法以塞羣情尚縁臨御之初含𢎞是務特軫墜泉之慮爰施解網之仁曲示優㤙俯寛後命革可陵州長流百姓説可合州長流百姓仍委逐處長知所在同州長春宫判官朝請大夫檢校尚書禮部郎中賜紫金魚袋豆盧昇将仕郎守尚書屯田員外郎崇文館學士賜緋魚袋韋濤等各因權勢驟列班行無才業以可稱竊寵榮而斯久比行貶謫以塞尤違朕以纂襲之初含容是務父既寛於後命子宜示以特恩並停見任昇濤即革説之子也舊五代史巻三十六
