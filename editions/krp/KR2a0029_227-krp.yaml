body:
  text: 舊五代史卷一百十四宋門下侍郎參知攻事監修國史薛居正等撰周書第五世宗紀一世宗睿武孝文皇帝諱榮太祖之飬子蓋聖穆皇后之姪也本姓柴氏父守禮太子少保致仕隆平集云柴翁者常獨居室人以為司㝠事一日笑不止妻問其故不答翁嗜飲妻醉之以酒乃曰上帝有命郭郎為天子考柴翁即守禮之父史佚其名帝以唐天祐十八年嵗在辛已九月二十四日丙午生于邢州之别墅年未童冠因侍聖穆皇后在太祖左右時太祖無子家道淪落然以帝謹厚故以庶事委之帝悉心經度貲用獲濟太祖甚憐之乃飬為已子漢初太祖以佐命功為樞密使帝始授左監門衛将軍國志談苑云周世宗在漢為諸衛将軍嘗遊畿甸謁縣令忘其姓名令方聚邑客蒱博弗得見世宗頗銜之及即位令因部夫犯贓数百疋宰相范質以具獄上奏世宗曰親民之官贓状狼籍法當處死質奏曰受所監臨財物有罰上贓雖多法不至死世宗怒厲聲曰法者自古帝王之所制本以防姦朕立法殺贓吏非酷刑也質曰陛下殺之則可若付有司臣不敢署勅遂貸其命二年太祖鎮鄴改天雄軍牙内都指揮使領貴州刺史檢校右僕射三年冬太祖入平内難留帝守鄴城廣順元年正月太祖踐祚帝懇求入覲忽夢至河而不得渡尋授澶州節度使檢校太保封太原郡侯帝在鎮為政清肅盜不犯境先是澶之里衖湫隘公署毁圯帝即廣其街肆増其廨宇吏民頼之宋史王贊傳周世宗鎮澶淵毎旬决囚贊引律令辨析中理問之知其嘗事學問即署右職二年正月兖州慕容彦超反帝累表請征行太祖嘉之及曹英等東討数月無功太祖欲親征召羣臣議其事宰臣馮道奏以方當盛夏車駕不宜衝冐太祖曰冦不可翫如朕不可行當使澶州兒子擊賊方辨吾事時樞密王峻意不欲帝将兵故太祖親征六月兖州平十二月加檢校太傅同平章事三年正月帝入覲三月授開封尹兼功徳使封晉王顯徳元年正月庚辰加開府儀同三司檢校太尉兼侍中依前開封尹兼功徳使判内外兵馬事時太祖寢疾彌留士庶憂沮及聞帝總内外兵柄咸以為愜隆平集曹翰𨽻世宗幕下世宗鎮澶淵以為牙校及尹開封翰猶在澶淵聞周祖寢疾不俟召來見世宗密言曰王為冡嗣不侍醫藥何以副天下望世宗悟入侍禁中以府事命翰總决壬辰太祖崩秘不𤼵䘮丙申内出太祖遺制晉王榮可扵柩前即位羣臣奉帝即皇帝位庚子宰臣馮道率百僚上表請聽政凡三上壬寅帝見羣臣於萬嵗殿門之東廡下二月庚戌潞州奏河東劉崇與契丹大将軍楊兖舉兵南指壬戌宰臣馮道率百僚上表請御殿凡三上允之丁卯以中書令馮道充山陵使太常卿田敏充禮儀使兵部尚書張昭充鹵簿使御史中丞張煦充儀仗使開封少尹權判府事王敏充橋道使河東賊將張暉率前鋒自團栢谷入寇帝召羣臣議親征宰臣馮道等奏以劉崇自平陽奔遁之後勢弱氣奪未有復振之理竊慮聲言自來以誤于我陛下纂嗣之初先帝山陵有日人心易揺不宜輕舉命將禦寇深以為便帝曰劉崇幸我大䘮聞我新立自謂良便必發狂謀謂天下可取謂神器可圖此際必來斷無疑耳馮道等以帝鋭于親征因固諍之帝曰昔太宗之創業靡不親征朕何憚焉道曰陛下未可便學大宗帝又曰劉崇烏合之衆茍遇王師必如山壓卵耳道曰不知陛下作得山否帝不悦而罷召諸道募山林亡命之徒有勇力者送于闕下仍目之為強人帝以趫捷勇猛之士多出于羣盜中故令所在招納有應命者即貸其罪以禁衛處之至有朝行殺奪暮升軍籍讎人遇之不敢仰視帝意亦患之其後頗有不獲宥者三月丁丑潞州奏河東劉崇入冦兵馬監押穆令均部下兵士為賊軍所襲官軍不利詔天雄軍節度使符彥卿領兵自磁州固鎮路赴潞州以澶州節度使郭崇副之詔河中節度使王彥超領兵取晉州路東向邀擊以陜府節度使韓通為副命宣徽使向訓馬軍都指揮使樊爱能步軍都指揮使何徽滑州節度使白重贊鄭州防禦使史彥超前耀州團練使符彥能等領兵先赴澤州辛已制大赦天下常赦所不原者咸赦除之諸貶降責授官量與升陟叙用應配流徒役人竝放逐便諸道州府所欠去年夏秋租税竝放内外見任前文武職官竝與加恩父母在者竝與恩澤亡没者與封贈其母妻未叙者特與叙封云前涇州節度使史匡懿卒癸未詔以劉崇入冦車駕取今月十一日親征甲申以樞密使鄭仁誨為東京留守乙酉車駕發京師壬辰至澤州癸巳王師與河東劉崇契丹楊衮大戰于高平賊軍敗績初車駕行次河陽聞劉崇自潞而南即倍程而進是月十八日至澤州既晡帝御戎服觀兵于東北郊距州十五里夜宿于村舍十九日前鋒與賊軍相遇賊陣于高平縣南之髙原有賊中來者云劉崇自將騎三萬并契丹萬餘騎嚴陣以待官軍帝促兵以擊之崇東西列陣頗亦嚴整乃令侍衛馬歩軍都虞侯李重進滑州節度使白重贊將左居陣之西廂侍衛馬軍都指揮使樊愛能歩軍都指揮使何徽將右居陣之東廂宣徽使向訓鄭州防禦使史彥超以精騎當其中殿前都指揮使張永徳以禁兵衛蹕帝介馬觀戰兩軍交鋒未㡬樊愛能何徽望賊而遁東廂騎軍亂歩軍解甲投賊帝乃自率親騎臨陣督戰隆平集馬仁瑀傳從世宗親征劉崇王師不利仁瑀謂衆曰主辱臣死因躍馬大呼引弓連斃将卒数十士氣始振今上案是書成扵開寳中故稱宋太祖為今上原本空一格今改正連屬馳騎于陣前先犯其鋒戰士皆奮命爭先賊軍大敗日暮賊萬餘人阻澗而陣㑹劉詞領兵至與大軍廹之賊軍又潰臨陣斬賊大將張暉及偽樞密使王延嗣諸將分兵追襲殭尸棄甲填滿山谷初夜官軍至高平降賊軍数千人所獲輜重兵器駝馬偽乗輿器服等不可勝紀其夕殺降軍二千餘人我軍之䧏敵者亦皆就戮初兩軍之未整也風自東北起不便于我及與賊軍相遇風勢陡廻人情相悦戰之前夕有大星如日流行数丈墜于賊營之上及戰北人望見官軍之上有雲氣如龍虎之狀則天之助順亶其然乎是日危急之勢頃刻莫保賴帝英武果敢親臨冦敵不然則社稷㡬若綴旒矣是夕帝宿于野次甲午次高平縣詔賜河東䧏軍二千餘人各絹二匹并給其衣裝鄉兵各給絹一匹放還本部是日大雨戊戌車駕至潞州河南府上言前青州節度使常思卒已亥侍衛馬軍都指揮使䕫州節度使樊愛能侍衛歩軍都指揮使壽州節度使何徽節并諸将校七十餘人竝伏誅高平之役兩軍既成列賊騎來挑戰愛能望風而退何徽以徒兵陣于後為奔騎所突即時潰亂二將南走帝遣近臣宣諭止遏莫肯從命皆掦言曰官軍大敗餘衆已解甲矣至暮以官軍克捷方稍稍而㢠廻帝至潞州録其奔遁者自軍使以上及監押使臣竝斬之由是驕将隨兵無不知懼帝以何徽有平陽守禦之功欲貸其罪竟不可與愛能俱殺之皆給槥車歸塟東都事畧世宗謂張永徳曰樊愛能及偏禆七十餘人吾欲盡按軍法如何對曰必欲開拓疆宇威加四海安可己也世宗善其言悉誅愛能等以徇軍聲始振庚子以以侍衛馬歩都虞侯李重進為許州節度使以宣徽南院使向訓為滑州節度使以殿前都指揮使張永徳為武信軍節度使職竝如故以滑州節度使白重贊為鄜州節度使以鄭州防禦使史彥超為華州節度使賞高平之功也以晉州節度使藥元福為同州節度使以宣徽北院使楊廷璋為晉州節度使以同州節度使張鐸為彰義軍節度使以客省使呉延祚為宣徽北院使以龍捷左廂都指揮使李千為蔡州防禦使以龍捷右廂都指揮使田中為密州防禦使以虎捷右廂都指揮使張順為登州防禦使以龍捷左第二軍都指揮使孫延進為鄭州防禦使以前耀州團練使符彥能為澤州防禦使以散員都指揮使李繼勲為殿前都虞候以殿前都虞候韓令坤為龍捷左廂都指揮使以鐡騎第一軍都指揮使趙𢎞殷為龍捷右廂都指揮使以散員都指揮使慕容延釗為虎捷左廂都指揮使以控鶴第一軍都指揮使趙鼎為虎捷右廂都指揮使竝遥授團練使其餘改轉有差壬寅以天雄軍節度使衛王符彥卿為河東行營都部署知太原行府事以澶州節度使郭崇為行營副部署以宣徽南院使向訓為行營兵馬都監以侍衛都虞侯李重進為行營都虞候以華州節度使史彥超為先鋒都指揮使領歩騎二萬進討河東詔河中節度使王彦超陜府節度使韓通率兵自隂地闗討賊以河陽節度使劉詞為隨駕都部署以鄜州節度使白重贊為隨駕副部署夏四月乙巳太祖靈駕發東京乙卯塟于嵩陵河中節度使王彥超奏偽汾州防禦使董希顔以城歸順宋史王彥超傳彦超自隂地闗與符彥卿㑹兵圍汾州諸将請急攻彦超曰城已危矣旦暮将䧏我士卒精鋭驅以先登必死傷者衆少待之翼日州将董希顔果䧏丙辰偽遼州刺史張漢超以城歸順丁已幸栢谷寺遣右僕射平章事判三司李榖赴河東城下計度軍儲詔河東城下諸將招撫户口禁止侵掠只令徴納當年租税及募民入粟五百斛草五百圍者賜出身千斛千圍者授州縣官辛酉符彥卿奏嵐憲二州歸順壬戌制立衛國夫人符氏為皇后仍令有司擇日備禮冊命王彦超奏收下石州獲偽刺史安彦進宋史王彦超傳引兵趍石州彦超親鼓士乗城躬冐矢石数日下之擒其守将安彦進獻行在癸亥偽沁州刺史廷誨以城歸順甲子皇妹壽安公主張氏進封晉國長公主乙丑東京奏太師中書令馮道薨丙寅太祖皇帝神主祔于太廟庚午曲赦潞州見禁罪人除死罪外竝釋放是日車駕發潞州親征劉崇癸酉忻州偽監軍李勍殺敕史趙皐及及契丹大將掦努瑚舊作􆆠姑今改正以城歸順詔授李勍忻州刺史五月乙亥以尚書右丞邉歸讜守本官充樞密直學士以尚書戸部侍郎陶榖守本官充翰林學士宋史陶榖傳從征太原時魚崇諒迎母後至榖乘間言曰崇諒宿留不來有顧望意世宗頗疑之崇諒又表陳母病詔許歸陜州就養以榖為翰林學士丙子車駕至太原城下是日偽代州防禦使鄭處謙以城歸順丁丑觀兵于太原城下帝親自慰勉錫賚有差升代州為節鎮以靜塞軍為額以鄭處謙為節度使戊寅斬偽命石州刺史安彥進于太原城下以其拒王師也庚辰以前中武軍節度使郭從義為天平軍節度使遣符彥卿郭從義向訓白重贊史彥超等率歩騎萬餘赴忻州宋史符彥卿傳彥卿之行也世宗以并人雖敗朝廷饋運不繼未議攻擊且令觀兵城下徐圖進取及周師入境汾晉吏民望風疑接皆以乆罹虐政願輸軍湏以資兵世宗從之而連下州彦卿等皆以芻糧未備欲旋軍世宗不之省乃調山東近郡輓軍食濟之是夜大風發屋拔樹壬午以宰臣李榖判太原行府事辛丑升府州為節鎮以永安軍為軍額以本州防禦使折徳扆為節度使六月癸卯朔詔班師車駕發離太原時大集兵賦及徴山東懐孟蒲陜丁夫数萬急攻其城旦夕之間期于必取㑹大雨時行軍士勞苦復以忻口之師不振帝遂决旋師之意指麾之間頗傷匆遽部伍紛亂無復嚴整不逞之徒訛言相恐隨軍資用頗有遺失者賊城之下糧草数十萬悉焚棄之通鑑考異引晉陽見聞録六月旦周師南轅返斾惟数百騎間之以歩率千人長槍赤甲衒趫捷跳梁于城隅晡晚殺行而抽退宋史藥元福傳詔命班師元福上言曰進軍甚易退軍甚難世宗曰一以委卿遂部分率伍為方陣而南元福以麾下為後殿崇東出兵來追元福擊走之乙已車駕至潞州癸丑帝發潞州乙丑幸新鄭縣丙寅帝親拜嵩陵祭奠而奠賜守陵將吏及近陵户帛有差五代㑹要顯徳元年二月車駕征太原囘親拜嵩陵望陵號慟至陵所俯伏哀泣感于左右再拜訖祭奠而退庚午帝至自河東秋七月癸酉朔前河西軍節度使申師厚責授右監門衛率府副率師厚在涼州嵗餘以所部艱食蕃情反覆奏乞入朝尋留其子為留後不俟詔離任故責之乙亥天雄軍節度使衛王符彥卿進位守太傅改封魏王鄆州郭後義加兼中書令河陽劉詞移鎮永興軍加兼侍中潞州李筠加兼侍中河中王彥超移鎮許州加兼侍中許州節度使衛都虞候李重進移鎮宋州加同平章事兼侍衛親軍都指揮使以信武軍節度兼殿前衛都指揮使張永徳為滑州節度使加檢校太傅典軍如故同州藥元福移鎮陜州加檢校太尉鄜州白重贊移鎮河陽加檢校太尉陜州韓通移鎮曹州加檢校太傅帝即位之初覃慶于諸侯是賞從征之功也丙子以前禮部侍郎邉光範為刑部侍郎權判開封府事丁丑天下兵馬元帥呉越國王錢俶加天下兵馬都元帥襄州節度使陳王安審琦加守太尉戊寅右散騎常侍張可復率以前亳州防禦使李萬金為鄜州留後庚辰幸南荘辛巳荆南節度使南平王高保融加守中書令夏州節度使西平王李彛興加守太保西京留守武行徳徐州王晏鄧州侯章竝加兼中書令癸未湖南王進逵加兼中書令天徳軍節度使郭勲邠州折從阮安州李洪義竝加兼侍中以前華州節度使孫方諫為同州節度使加兼中書令以前永興軍節度使王仁鎬為河中節度使加檢校太尉乙酉滄州李暉貝州王饒鎮州曹英竝加兼侍中涇州張鐸相州王進延州袁㠖竝加檢校太尉壬辰百寮上表請以九月二十四日誕聖日為天清節從之癸巳以左僕射兼門下侍郎平章事監修國史范質為守司徒兼門下侍郎平章事𢎞文館大學士國志談苑云周太祖嘗令世宗詣范質時為親王軒車高大門不能容世宗即下馬歩入及嗣位從容質曰卿所居舊宅耶門楼一何小哉因為治第以左僕射兼中書侍郎平章事集殿大學士判三司李榖為守司徒兼門下侍郎平章事監修國史以中書侍郎平章事王溥為中書侍郎兼禮部尚書平章事集賢殿大學士以樞密院學士工部侍郎景範為中書侍郎平章事判三司樞密使檢校太保同平章事鄭仁誨加兼侍中靈武馮繼業定州孫行友邢州田景咸竝加檢校太傅晉州楊廷璋加檢校太保以太子詹事趙上交為太子賔客乙未以樞密副使右監門衛大将軍魏仁浦為樞密使檢校太保東都事畧云議者以仁浦不由科第進世宗曰顧才何如耳遂用之丙申以中書舍人史館修撰判館事劉温叟為禮部侍郎判館如故丁酉相州節度使王進卒八月壬申朔以宣徽北院使呉延祚為右監門衛大將軍充職以樞密院直學士尚書右丞邉歸讜為尚書左丞充職甲辰幸南荘賜從臣射乙已以吏部侍郎顔衎為工部尚書致仕丙午同州節度使孫方諫卒已酉前澤州刺史李彦崇責授右司禦副率高平之役帝與賊軍相遇即令彥崇領兵守江猪嶺以遏冦之歸路彦崇初見王師已却即時而退及劉崇兵敗果由兹嶺而遁故有是責壬子以金州防禦使王暉為同州留後癸丑以呉越國内外都指揮使呉延福為寧國軍節度使檢校太尉從錢俶之請也以太子少師宋彥筠為太子太師致仕甲寅以兵部郎中兼太常博士尹拙為國子祭酒丙辰皇姑故福慶長公主追封燕國大長公主李從進之母也丁已以戸部郎中致仕景初為太僕卿致仕宰臣範之父也已已華州鎮國軍宜停依舊為郡庚午以給事中劉悦康澄竝為右散騎常侍辛未以左散騎常侍裴巽為御史中丞以御史中丞張煦為兵部侍郎集賢殿學士判院事司徒詡為吏部侍郎以左散騎常侍薛冲乂為工部侍郎九月壬申朔以東京舊宅為皇建禪院甲戌以武安軍節度副使知潭州軍府事周行逢為鄂州節度使知潭州軍府事加檢校太尉丙戌右屯衛將軍薛訓除名流沙門島坐監雍兵倉縱吏卒掊斂也已亥以右僕射致仕韓昭𦙍左僕射致仕掦凝式竝為太子太保致仕以太子太傅致仕李肅為太子太師致仕辛丑斬宋州廵檢供奉官副都知竹奉璘于寕陵縣坐盜掠商船不捕獲也冬十月甲辰左羽林大將軍孟漢卿賜死坐監納厚取耗餘也丙午以安州節度使李洪義為青州節度使以貝州節度使王饒為相州節度使以徐州節度使王晏為西京留守以西京留守武行徳為徐州節度使戊申以龍捷左廂都指揮使泗州防禦使令坤坤為洋州節度使充侍衛馬軍都指揮使以虎捷右廂都指揮使永州防禦使李繼勲為利州節度使充侍衛歩軍都指揮使已酉太子太保致仕楊凝式卒詔安貝二州依舊為防禦州其軍額竝停壬子以今上為永州防禦使依前殿前都虞侯戊午監修國史李榖等上言曰竊以自古王者咸建史官君臣獻替之謀皆衛須備載家國安危之道得以直書厯代已來其名不一人君言動則起居注創于累朝輔相經綸則時政記興于前代然後採其事實編作史書蓋縁聞見之間湏有來處記録之際得以審詳今之左右起居郎即古之左右史也唐文宗朝命其官執筆立于殿階螭頭之下以紀政事後則明宗朝命端明殿及樞密直學士皆輪修日厯旋送史官以備纂修及近朝此事皆廢史官惟憑百司報状館司但取兩省制書此外雖有訪聞例非端的伏自先皇帝創開昌運及皇帝陛下纘嗣丕基其聖徳武功神謀睿畧而皆萬幾宥密丹禁深嚴非外臣之所知豈庶僚之可訪此後欲望以諮詢之事裁制之規别命近臣旋具抄録毎當修撰日厯即令封付史臣庶國事無漏畧之文職業免踈遺之咎從之因命樞密直學士起今後于樞密使處逐月抄録事件送付史館已未供奉官郝光庭棄市坐在葉縣廵檢日挾私斷殺平人也是日大閲帝親臨之帝自高平之役覩諸軍未甚嚴整遂有退却至是命今上一概􅀢閲選武藝超絶者署為殿前諸班因是有散員散指揮使内殿直散都頭鐡騎控鶴之號復命總戎者自龍捷虎捷以䧏一一選之老弱羸小者去之諸軍士伍無不精當由是兵甲之盛近代無比且減冗食之費焉五代會要顯徳元年上謂侍臣曰侍衛兵士老少相半強懦不分蓋徇人情不能選練今春朕在高平與劉崇及蕃軍相遇臨敵有指使不前者苟非朕親當堅陣幾至䘮敗况百戸農夫未能贍一甲士且兵在精不在衆宜令一一㸃選精鋭者升在上軍怯懦者任從安便度期可用又不虚費先是上按于高平觀其退縮慨然有懲革之志又以驍勇之士多為外諸候所占如是召募天下豪傑不以草澤為阻在于闕下躬親試閲選武藝超絶及有首者分署為殿前諸班十一月戊寅以太子賔客石光贊為兵部尚書致仕壬午鎮州節度使曹英卒乙酉以澶州節度使郭崇為鎮州節度使乙未以荆南節度使使歸州刺史高保朂為寧江軍節度使檢校太尉充荆南節度行軍司馬戊戌詔宰臣穀穀監築河隄先是鄆州界河決数州之地洪流為患故命榖治之役丁夫六萬人三十日而罷十二月己酉太子太師侯益以本官致仕舊五代史巻一百十四
