body:
  text: 舊五代史巻六十二攷證唐列𫝊十四孟方立𫝊方立見潞帥交代之際乘其無備率戍兵徑入潞州自稱留後案舊唐書僖宗紀九月髙潯牙将劉廣擅還潞州是月潯天井闗戍将攻廣殺之自稱留後與是書異張文禮𫝊文禮病疽腹及聞史建瑭攻下趙州驚悸而卒案文禮之卒遼史太祖紀作五月丁未與是書作八月異舊五代史巻六十二攷證
