body:
  text: 舊五代史巻八十六宋門下侍郎參知政事監修國史薛居正等撰晉書第十二后妃列傳一案晋后妃傳永樂大典已佚今采五代會要通鑑契丹國志文獻通攷所載晉后妃事分註以補是書之闕高祖皇后李氏五代會要高祖皇后李氏唐明宗第三女天成三年四月封永寕公主長興四年九月進封魏國公主清泰二年九月改封晋國長公主至天福六年十一月尊為皇后七年六月尊為皇太后開運四年三月與少帝同遷于契丹之黄龍府漢乾祐三年八月二十五日崩于蕃中之建州文獻通考云天福二年有司請立皇后帝以宗廟未立謙抑未遑帝崩出帝即位乃尊為皇太后契丹國志載皇太后降表云晉室皇太后媳婦李氏妾言張彦澤富珠哩等至伏䝉皇帝阿翁降書安撫者妾伏念先皇帝頃在并汾適逢屯難危同累卵急若倒懸智勇俱窮朝夕不休皇帝阿翁𤼵自冀北親扺河東䟦履山川踰越險阻立平巨孽遂定中原救石氏之覆亡立晋朝之社稷不幸先帝厭代嗣中承祧不能繼好息民而反虧恩辜義兵戈屡動駟馬難追戚實自貽咎将誰執今穹蒼震怒中外離攜上将牽羊六師觧甲妾舉宗負釁視景偷生惶惑之中撫問斯至明宣恩㫖曲賜含容尉論丁寕神爽飛越豈謂已垂之命忽䝉更生之恩省罪責躬九死未報今遣孫男延煦延寳表奉請罪陳謝以聞又帝紀云會同十一年正月朔出帝太后迎遼帝于封邱門外帝辭不見館于封禅寺遣其将崔廷勲以兵守之是時雨雪連旬外無供億上下凍餒太后使人謂寺僧曰吾嘗于此飯僧數萬今日豈不相憫耶僧辭以遼帝之意難測不敢獻食少帝隂祈守者乃稍得食遼降少帝為光禄大夫檢校太尉封負義侯遷于黄龍府即慕容氏和龍城也帝使人謂太后曰吾聞爾子重貴不從母教而至于此可求自便勿與俱行太后答曰重貴事妾甚謹所失者違先君之志絶両國之歡然重貴此去幸䝉大惠全身保家母不隨子欲何斫歸于是太后與馮后皇弟重睿子延煦延寳舉族從晉侯而北天禄元年四月帝至遼陽晋侯白衣紗㡌與太后皇后上謁于帳中五月帝上陘取晋侯所從宦者十五人東西班十五人及皇子延煦而去八月帝下陘太后自馳至霸州謁帝求于漢兒城側賜地耕牧以為生許之帝以太后自行十餘日遣與延煦俱還遼陽二年徙晋侯太后于建州三年秋八月晋李太后病無醫藥仰天號泣㦸手罵杜重威李守貞曰吾置不置汝病亟謂晉侯曰吾死焚其骨送范陽佛寺無使吾為邉城鬼也富珠哩舊作傅住兒今改正太妃安氏文獻通考安太妃代北人不知其世家生岀帝帝立尊為皇太妃契丹國志云天禄二年春二月徙晋侯太后于建州中途安太妃卒遺命晋侯曰焚骨為灰南向颺之庶㡬遺魂得返中國也少帝皇后張氏案五代會要天福八年十月追冊攷是書少帝紀云追册故妃張氏為皇后張從訓傳亦云高祖鎮太原為少帝娶從訓長女為妃皇后馮氏案五代會要開運三年十月冊通鑑云天福八年冬十月戊申立吳國夫人馮氏為皇后初高祖爱少弟重𦙍養以為子及畱守鄴都娶副畱守馮濛女為其婦重𦙍早卒馮夫人寡居有羙色帝見而悦之高祖崩梓宫在殯帝遂納之羣臣皆賀帝謂馮道等曰皇太后之命與卿等不任大慶羣臣出帝與夫人酣飲過梓宫前醊而告曰皇太后之命與先帝不任大慶左右失笑帝亦自笑謂左右曰我今日作新壻何如夫人與左右皆大笑太后雖恚而亦無如之何既正位中宫頗預政事后兄玉時為禮部郎中鹽鐵判官驟擢用至端明殿學士户部侍郎與議政事文獻通攷云契丹入京師后隨帝北遷不知所終又案五代會要載晋内職云高祖頴川郡夫人蔡氏天福三年八月勅少帝寳省李氏封隴西郡夫人張氏封春官夫人充皇后宫尚宫並天福八年十二月二日勅前左御正齊國夫人吳氏進封燕國夫人書省魏國夫人崔氏進封梁國夫人前右御正天水郡夫人趙氏封衛國夫人司簿孟氏封汧國夫人前司簿李氏封隴西郡夫人弟子院使齊氏大使郭氏副使賈氏並封本縣君太后宫尚宫陳留郡夫人何氏進封鄭國夫人河南郡夫人元氏進封齊國夫人知客出使夫人石氏封武威郡夫人春宫姚氏常氏焦氏王氏陶氏魏氏趙氏七人並超封郡夫人寶生婉美趙氏封天水郡夫人武氏以下十一人並授春宫天福八年十一月勅清河郡夫人張氏彭城郡夫人劉氏並充太后宫司寶南陽郡夫人路氏出使夫人趙氏白氏並充皇后宫司賓開運二年八月勅又案是書不載外戚傳據五代㑹要云晉高祖長女長安公主降楊承祚天福二年五月封至六年五月卒追封秦國公主至七年九月又追封梁國長公主從長女高平縣主第二女新平縣主第三女千乘縣主孫女永慶縣主並天福七年五月封舊五代史巻八十六
