body:
  text: 舊五代史巻四十宋門下侍郎參知政事監修國史薛居正等撰唐書第十六明宗紀六天成四年春正月壬申朔帝御崇元殿受朝賀伏衞如儀幽州節度使趙徳鈞奏臣孫贊年五歲黙念論語孝經舉童子于汴州取解就試詔曰都尉之子太尉之孫能念儒書備彰家訓不勞就試特與成名宜賜别勅及第附今年春牓戊子放元年應欠秋税以左衞上將軍安崇阮為黔南節度使壬辰廻鶻入朝使徹伯爾等五人各授懷化司戈放還以北京副畱守馮贇為宣徽使判三司戊戌禁天下虛稱試攝銜西川孟知祥奏支屬刺史乞臣本道自署二月乙已王晏球奏此月三日收復定州獲王都首級生擒契丹託諾等二千餘人百寮稱賀已畢乃詔取今月二十四日車駕還東京辛亥以北靣行營招討使宋州節度使王晏球為鄆州節度使加兼侍中以北靣行營副招討使滄州節度使李從敏為定州節度使以北靣行營兵馬都監鄭州防禦使張䖍釗為滄州節度使幽州節度使趙徳鈞加兼侍中乙卯以樞密使趙敬怡權知汴州軍州事丙辰邢州奏定州送到偽太子李繼陶已處置訖辛酉帝御咸安樓受定州俘馘百官就列宣露布于樓前禮畢以王都首級獻于太社王都男四人弟一人託諾父子二人並磔于市五代㑹要尚書兵部宣露布于樓前宣訖尚書刑部侍郎張文寳奏曰逆賊王都首級請付所司大理卿蕭希逋受之以出獻于郊社其王都男并蕃將等磔于開封橋時露布之文類制勅之體蓋執筆者悞頗為識者所嗤樞密使趙敬怡卒贈太傅以端明殿學士趙鳯權知汴州軍州事甲子車駕發汴州丙寅至鄭州賜左僕射致仕鄭珏錢二十萬丁卯宰相崔協卒詔贈尚書右僕射東都畱守太子少傅李琪等奏至偃師縣奉迎時琪奏章中有敗契丹之㓙黨破眞定之逆城之言詔曰契丹卽為㓙黨眞定不是逆城李琪罰一月俸庚午車駕至自汴州三月甲戌馮道進表乞命相丙戌詔皇城使李從璨貶授房州司户參軍仍令盡命從璨帝之諸子也先是帝巡幸汴州畱從璨以警大内從璨因遊㑹節園酒酣戱登御榻安重誨奏之故置于法焉壬辰中書奏今後群臣内有乞假覲省者請量賜茶藥從之乙未以前鄆州節度使符習為汴州節度使丙申詔鄴都幽鎭滄邢易定等州管内百姓除正稅外放免諸色差配以討王都之役有輓運之勞也夏四月庚子朔禁鐡鑞錢壬寅重修廣壽殿成有司請以丹漆金碧飾之帝曰此殿經焚不可不修但務宏壯不勞華侈湖南奏敗荆南賊軍于石首鎭詔沿邉置塲買馬不許蕃部直至闕下先是党項諸蕃凡將到馬無駑良並云上進國家雖約其價以給之及計其館榖錫賚所費不可勝紀計司以為耗蠧中華遂止之壬子以皇子北京畱守河東節度使從榮為河南尹判六軍諸衛事以皇子河南尹判六軍諸衛事從厚為北京畱守以河陽節度使趙延壽為宋州節度使以侍衞親軍都指揮使鎮南軍節度使康義誠為河陽節度使契丹寇雲州癸丑契丹遣紐赫羙稜等復率其屬來朝貢稱取託諾等骸骨並斬于北市甲寅以端明殿學士趙鳯為門下侍郎兼工部尚書平章事丙辰諫議大夫致仕襲文宣公孔邈卒庚申以王建立孔循帶中書直省吏歸藩並追廻壬戌幽州節度使趙徳鈞兼北靣行營招討使鎭州節度使范延光加檢校太𫝊戊辰中書奏五月一日應在京九品已上官及諸道進奉使請準貞元七年勅就位起居永為恒式從之五月己巳朔帝御文明殿受朝丙子以䕫州節度使西方鄴卒輟朝丁丑大理卿李保殷卒已卯以忠武軍節度使索自通為京兆尹充西京畱守以左威衞上將軍朱漢賔為潞州節度使乙酉以黔州節度使安崇阮為䕫州節度使以左驍衞上將軍張温為洋州節度使以黔州畱後楊漢賔為本州節度使中書奏太常寺定少帝諡昭宣光烈孝皇帝廟號景宗伏以少帝今不入廟難以言宗只云昭宣光烈孝皇帝從之丁亥以鳯州武興軍畱後陳臯為武興軍節度使以新州威塞軍畱後翟璋為威塞軍節度使壬辰以權知尚書右丞崔居儉為尚書右丞詔葺天下廨宇丙申襄州奏荆南高從誨乞歸順雲州奏契丹犯塞六月辛丑以左散騎常侍姚顗為兵部侍郎壬寅䕫州節度使楊漢章移鎭雲州以北京馬歩軍都指揮使兼欽州刺史張敬達為鳯州節度使癸卯以前西京副畱守事張遵誨行衞尉事充客省使國子博士田敏請葺四郊祠祭齋室丙午以沂州刺史張萬進為安北都䕶充振武軍節度使戊申以宿州團練使康思立為利州節度使登州刺史孫元停任坐在任無名科率故也詔鄴都仍舊為魏府應魏府汴州益州宫殿悉去鴟尾賜節度使為衙署辛亥以權知朔方軍畱後定難軍都知兵馬使韓澄為朔方畱後癸丑以前潞州節度使符彦超為左驍衞上將軍詔諸道節度使行軍司馬名位雖高或帥臣不在其州事宜委節度副使權知又詔藩郡所請賔幕及主事親從者悉以名聞丙辰權知荆南軍府事高從誨上章首罪乞修職貢仍進銀三千兩贖罪壬戌幸至徳宫詔京城空地課人蓋造如無力者許人請射營構秋七月庚午以前西京畱守判官張鎛為司農卿壬申貶前左金吾上將軍毛璋為儒州長流百姓尋賜自盡以其在藩鎮隂蓄奸謀故也甲戌御史中丞吕夢竒責授太子右贊善大夫坐曽借毛璋馬故也已卯以工部侍郎任贊為左散騎常侍以樞密直學士左諫議大夫充匭使閻至為工部侍郎充職遂州進嘉禾一莖九穗壬午以給事中判大理卿事許光義為御史中丞史館上言所編修莊宗一朝事迹欲名為實録太祖獻祖懿祖名為紀年録從之五代㑹要天成三年十二月史館奏據左補闕張昭逺狀嘗讀國書伏見懿祖昭烈皇帝自元和之初獻祖文皇帝于太和之際立功王室陳力國朝太祖武皇帝自成通後來勤王戮力剪平多難頻立大功三換節旄再安京國莊宗皇帝終平大憝奄有中原倘闕編修遂成湮墜伏請與當館修撰參序條網撰太祖莊宗實録四年七月監修國史趙鳯奏奉勅修懿祖憲祖太祖莊宗四帝實録自今年六月一日起手旋具進呈伏以凡關纂述務合品題承乾御宇之君行事方云實録追尊册號之帝約文祗可紀年所修前件史書今欲自莊宗一朝名為實録其太祖以上並目為紀年録從之甲申以前荆南行軍司馬檢校太傅高從誨起復授檢校太傅兼侍中充荆南節度使丙戌涇州節度使李從昶移鎭華州以冀州刺史李金全為涇州節度使戊子中書奏今後新及第舉人有曽授正官及御署者欲約前任資序與除一官從之壬辰詔取來年二月二十一日有事于南郊八月丁酉朔大理正路阮奏切見春秋釋奠于文宣王而武成王廟久曠時祭請復常祀從之戊戌中書奏太子少傅李琪所撰進霍彦威神道碑文不分眞偽是混功名望令改撰從之琪梁之故相私懷咸遇叙彦威在梁厯任不欲言偽梁故也辛丑詔亂離巳來天下諸軍所掠生口有主識認即勒還之以前清河縣令襲酅國公食邑三千户楊仁矩為祕書丞御史臺奏主簿朱穎是前中丞奏請合隨㕔罷任詔曰主簿即為正秩況入選門顯自朝恩合終考限宜令仍舊守官甲辰以宰臣馮道為南郊大禮使兵部尚書盧質為禮儀使御史中丞許光義為儀仗使兵部侍郎姚顗為鹵簿使河南尹從榮為橋道頓遞使客省使衞尉卿張遵誨為修裝法物使乙已黒水朝貢使郭濟來朝授歸徳司戈放還蕃丁未以翰林學士承㫖禮部侍郎知制誥李愚為兵部侍郎職如故以中書舎人盧詹為禮部侍郎以兵部侍郎裴皥為太子賔客吐渾首領念公山來朝貢戊申帝服兖冕御文明殿追册昭宣光烈孝皇帝庚戌以宰臣監修國史趙鳯兼判集賢院事以左散騎常侍任贊判大理卿事已未高麗王王建遣使貢方物辛酉詔準待例節度使帶平章事侍中中書令並列銜于勅牒側書使字今錢鏐是元帥尚父與使相名殊馬殷守太師尚書令是南省官資不合署勅尾今後勅牒内並落下乙卯党項首領朝貢甲子幸金眞觀改賜建法大師賜紫尼智願為圓惠大師即武皇夫人陳氏也丙寅達靼來朝貢京城内有南州北州乃張全義光啟中所築至是詔許人依街巷請射城濠任使平鎮蓋造屋宇九月丁卯中書奏據宗正寺申懿祖永興陵獻祖長寧陵太祖建極陵並在代州鴈門縣皇帝追尊四廟在應州金城縣詔應州升為望州金城鴈門並升為望縣辛未太常愽士叚顒奏切見大祠則差宰相行事中祠則卿監行事小祠則委太祝奉禮並不差官今後請差五品官行事從之癸巳制天下兵馬元帥尚父呉越國王錢鏐可落元帥尚父呉越國王授太師致仕責無禮也先是上將軍烏昭遇使于兩浙以朝廷事私于呉人仍目鏐為殿下自稱臣謁鏐行拜蹈之禮及廻使副劉玫具述其事故停削鏐官爵令致仕烏昭遇下御史臺尋賜自盡後有自浙中使還者言昭遇無臣鏐之亊為玫所誣人頗以為寃乙未詔諸道通勘兩淅綱運進奉使並不巡獄冬十月丙申朔併吏部三銓為一銓宜令本司官員同商量注擬連署申奏仍不得于私第注官戊戌以襄州兵馬都監守磁州刺使康福為朔方河西等節度使靈威雄警凉等州觀察使時朔方將吏請帥于朝廷故命康福往鎮之庚子以右金吾上將軍史敬鎔為左金吾上將軍以左驍衞上將軍符彦超為右金吾上將軍以前黔州節度使李承約為右驍衞上將軍以雲州節度使張敬詢為右驍衞上將軍以前華州節度使王景戡為右驍衞上將軍癸卯太常少卿蕭愿責授太子洗馬奪緋愿南郊行事與祠官同飲詰旦猶醉不能行禮為御史所劾也詔新授朔方節度使康福將兵萬人赴鎮己酉制復故荆南節度使高季興官爵辛亥升閬州為保寧軍壬子以内客省使左衞大將軍李仁矩為閬州節度使幸七星亭丙辰夏州進白鷹重誨奏曰夏州違詔進貢臣己止約帝曰善朝退帝密令左右進焉是日幸龍門十一月丁卯洛州水暴漲壞居人垣舎戊辰以刑部侍郎張文寳為右散騎常侍己已以尚書右丞李光序為刑部侍郎癸酉升曹州濟隂縣為次赤以昭宣光烈孝皇帝温陵所在故也甲戌奉國軍節度使王延禀加兼侍中從福建節度使王延鈞請也車駕出近郊試夏州所進白鷹戒左右勿令誨知已卯日南至帝御文明殿受朝賀癸未祕書少監于嶠配振武長流百姓永不齒任為宰臣趙鳯誣奏也史官張昭逺等以新修獻祖懿祖太祖紀年録共二十巻莊宗實録三十巻上之賜器帛有差五代會要監修趙鳯修撰張昭逺吕咸休各賜繒綵銀器等十二月丁酉靈武康福奏破野利大蟲兩族三百餘帳于方渠獲牛羊三萬戊戌詔應授官及封贈官誥舉人冬集等所費用物一切官破壬戌中書奏今後宰臣致齋内不押班不知印不赴内殿起居或遇國忌行事官已受誓戒宜不赴行香并不奏刑殺公事大祠致齋内請不開宴每遇大忌前一日請不坐朝從之舊五代史巻四十
