body:
  text: 舊五代史巻十三宋門下侍郎參知政事監修國史薛居正等撰梁書第十三列傳第三朱瑄宋州下邑人也父慶里之豪右以攻剽販鹽為事吏捕之伏法瑄坐父罪以笞免因入王敬武軍為小校唐中和二年諫議大夫張濬徴兵于青州敬武遣將曹全晸率軍赴之以瑄𨽻焉以戰功累遷列校賊敗出闗全晸以本軍還鎮㑹鄆帥薛崇卒部將崔君預據城叛全晸攻之殺君預自為留後瑄以功授濮州刺史鄆州馬步軍都將光啓初魏博韓允中攻鄆全晸為其所害瑄據城自若三軍推為留後允中敗朝廷以瑄為天平軍節度使累加官至檢校太尉同平章事太祖初鎮大梁兵威未振連嵗為秦宗權所圍士不解甲危殆日數四太祖以瑄同宗早兄事之乃遣使求援于瑄光啓末宗權急攻大梁瑄與弟瑾率兖鄆之師來援大破蔡賊解圍而遁太祖感其力厚禮以歸之先是瑄瑾駐于大梁覩太祖軍士驍勇私心愛之及歸厚懸金帛于界上以誘焉諸軍貪其厚利私遁者甚衆太祖移牒以讓之瑄來辭不遜由是始搆隙焉及秦宗權敗太祖移軍攻時溥于徐州時瑄方右溥乃遣使來告太祖曰巢權繼為蛇虺毒螫中原與君把臂同盟輔車相依今賊已平殄人粗聊生吾弟宜念逺圖不可自相魚肉或行人之失辭疆吏之踰法可以理遣未得便暌和好投䑕忌器弟幸思之太祖方怒時溥通于孫儒不從其言及龎師古攻徐州瑄出師來援太祖深銜之徐既平太祖併兵以攻鄆自景福元年冬遣朱友裕領軍渡濟至乾寧三年宿軍齊鄆間大小凡數十戰語在太祖紀中自是野無人耕屬城悉為我有瑄乃使人求救于太原李克用遣其將李承嗣史儼等援之尋為羅𢎞信所扼援畧既絶瑄瑾竟敗乾寧四年正月龐師古攻䧟鄆州遁至中都北匿于民家為其所箠并妻榮氏擒之來獻俱斬于汴橋下朱瑾瑄從父弟雄武絶倫性頗殘忍光啓中瑾與兖州節度使齊克譲婚瑾自鄆盛飾車服私藏兵甲以赴禮㑹親迎之夜甲士竊發擄克譲自稱留後及蔡賊鴟張瑾與太祖連衡同討宗權前後屢㨗以功正授兖州節度使旣得士心有兼并天下之意太祖亦忌之瑾以厚利招誘太祖軍士以為間諜及太祖攻鄆瑾出師來援累與太祖接戰乾寧二年春太祖令大將朱友㳟攻瑾掘塹柵以環之朱瑄遣將賀瓌及蕃將何懐寳赴援為友㳟所擒十一月瑾從兄齊州刺史瓊以州降太祖令執賀瓌懐寳及瓊以狥于城下語曰卿兄已敗早宜效順瑾偽遣牙將瑚兒持書幣送降太祖自至延夀門外與瑾交語瑾謂太祖曰欲令大將送符印願得兄瓊來押領所貴骨肉盡布腹心也太祖遣將與客將劉捍取符笥瑾单馬立于橋上揮手謂捍曰可令兄來余有密欵卽令瓊往瑾先令騎士董懐進伏于橋下及瓊至懐進突出擒瓊而入俄而斬瓊首投于城外太祖乃班師及鄆州䧟龐師古乘勝攻兖瑾與李承嗣方出兵求芻粟于豐沛間瑾之二子及大將康懐英判官辛綰小校閻實以城降師古瑾無歸即與承嗣將麾下士將保沂州刺史尹處賓拒闗不納乃保海州為師古所迫遂擁州民渡淮依楊行蜜行密表瑾領徐州節度使龐師古渡淮行密令瑾率師以禦之清口之敗瑾有力焉自是瑾率淮軍連嵗北㓂徐宿大為東南之患及行密卒子渭繼立以徐温子知訓為行軍副使寵遇頗深後楊溥僭號知訓為樞密使知政事以瑾為同平章事仍督親軍時徐温父子恃寵專政慮瑾不附已陳彭年江南别録云徐知訓初學兵法干朱瑾瑾悉心教之後與瑾有隙夜遣壯士殺瑾瑾手刄數人埋于舍後貞明四年六月出瑾為淮寧軍節度使知訓設家宴以餞瑾瑾事之愈遜翼日詣知訓第謝畱門久之知訓家僮私謂瑾曰政事相公此夕在白牡丹妓院侍者無得往瑾謂典謁曰吾不奈朝饑且歸既而知訓聞之愕然曰晚當過瑾瑾厚備供帳瑾有所乘名馬冬以錦帳貯之夏以羅幬䕶之愛妓桃氏有絶色善歌舞及知訓至奉巵酒為壽初以名馬奉知訓喜而言曰相公出鎮與吾暫别離恨可知願此盡歡瑾即延知訓于中堂出桃氏酒既醉瑾斬知訓首示其部下馬令南唐書云知訓因求馬于瑾瑾不與遂有隙俄出瑾為静淮節度使瑾詣知訓别且願獻前馬知訓喜往謁瑾家瑾妻出拜知訓答拜瑾以笏擊踣遂斬知訓因以其衆急趨衙城知訓之黨已闔門矣唯瑾得獨入與衙兵戰復踰城而出傷足求馬不獲遂自刎暴其屍于市盛夏無蠅蛆徐温令投之于江部人竊收葬之温疾亟夢瑾被髪引滿將射之温乃為之禮葬立祠祭之馬令南唐書云初宿衛將李球馬謙挾楊隆演登樓取庫兵以誅知訓陣于門橋知訓與戰頻却朱瑾過自外來以一騎前視其陣曰不足為也因反顧一麾外兵争進遂斬球謙亂兵皆潰瑾嘗有徳于知訓者也及其凶終吳人皆謂曲在知訓待五代史補朱瑾之奔淮南也時行密方圖覇其為禮有加于諸將數等瑾感行密見知欲立竒功為報但憾無入陣焉忽忽不樂一日晝寢夢老叟眉髪皓然謂瑾曰君長憾無入陣馬今馬生矣及廐𨽻報適退槽馬生一駒見卧未能起瑾驚曰何應之速也行往視之見骨目皆非常馬大喜曰事辦矣其後破杜洪取鍾傳未嘗不得力馬初瑾之來也徐温覩其英烈深忌之故瑾不敢預政及行密死子溥嗣位溫與張鎬爭權襲殺鎬自是事無大小皆决于温既而温復為自安之計万以子知訓自代然後引兵出居金陵實欲控制中外知訓猶恣横瑾居常嫉之一旦知訓欲得瑾所乘馬瑾怒遂擊殺知訓提其首請溥起兵誅温溥素怯懦見之掩面而走瑾曰老婢兒不足為計亦自殺中外大駭且懼温至遽以瑾屍暴之市中時盛暑肌肉累日不壊至靑蠅無敢輒泊人有病者或于暴屍處取土而煎服之無不愈時溥徐州人初為州之驍將唐中和初秦宗權據蔡州侵㓂隣藩節度使支詳命溥帥師以討之徐軍屢㨗軍情歸順以節鉞授之舊唐書列傳時溥彭城人徐之牙將黄巢據長安詔徴天下兵進討中和二年武寧軍節度使支詳遣溥與副將陳璠率師五千赴難行至河隂軍亂剽河隂縣廻溥招合撫諭其衆復集懼罪屯于境上詳遣人迎犒悉恕之溥乃移軍向徐州既入軍人大呼推溥為留後送詳于大彭館溥大出資裝遣陳璠援詳歸京詳宿七里亭其夜為璠所殺舉家屠害溥以璠為宿州刺史竟以違命殺詳溥誅璠又令别将帥軍三千赴難京師天子還宮授之節鉞及黄巢攻陳州秦宗權據蔡州與賊連結徐蔡相近溥出師討之軍鋒益盛每戰屢提黄巢之敗也其將尚讓以數千人降溥後林言又斬黄巢首歸徐州時溥功名第一詔授檢校太尉中書令鉅鹿郡王宗權未平仍授溥徐州行營兵馬都統蔡賊平朱全忠與之争功遂相嫌怨淮南亂朝廷以全忠遥領淮南節度以平孫儒行密之亂汴人應援路出徐方溥阻之全忠怒出師攻徐自光啓至大順六七年間汴軍四集徐泗三郡民無耕稼頻嵗水災人喪十六七溥窘䠞求和于汴全忠曰移鎮則可朝廷以尚書劉崇望代溥以溥為太子太師溥懼出城見害不受代汴將龐師古城兵于野溥求援于兖州朱瑾出兵救之值大雪糧盡而還城中守陴者飢甚加之疾疫汴將王重師牛存節夜乘梯而入溥與妻子登樓自焚而卒實景福二年也地入于汴王師範青州人父敬武初為平盧牙將唐廣明元年無棣人洪覇郎合羣盗于齊棣間節度使安師儒遣敬武討平之及巢賊犯長安諸藩擅易主帥敬武乃逐師儒自為留後王鐸承制授以節鉞後以出師勤王功加太尉平章事龍紀中敬武卒師範年幼三軍推之為帥棣州刺史張蟾叛于師範不受節度朝廷乃以崔安潛為平盧帥師範拒命張蟾迎安潛至郡同討師範師範遣將盧𢎞將兵攻蟾𢎞復叛與蟾通謀偽旋軍將襲青州師範知之遣重賂迎𢎞謂之曰吾以先人之故為軍府所推年方幼少未能幹事如公以先人之故令不乏祀公之仁也如以為難與成事乞保首領以守先人墳墓亦唯命𢎞以師範年幼必無能為不為之備師範伏兵要路迎而享之預謂紀綱劉􅬸曰翼日盧𢎞至爾即斬之酬爾以軍校鄩如其言斬𢎞于座上及同亂者數人因戒厲士衆大行頒賞與之誓約自率之以攻棣州擒張蟾斬之安潛遁還長安師範雅好儒術少負縱横之學故安民禁暴各有方畧當時藩翰咸稱之及太祖平兖鄆遣朱友㳟攻之師範乞盟遂與通好天復元年冬李荗貞刼遷車駕幸鳯翔韓全誨矯詔加罪于太祖令方鎮出師赴難詔至貴州師範承詔泣下曰吾輩為天子藩籬君父有難畧無奮力者皆强兵自衛縱賊如此使上失守宗祧危而不持是誰之過吾今日成敗以之乃發使通楊行密遣將劉鄩襲兖州别將襲齊時太祖方圍鳯翔師範遣將張居厚部輿夫二百言有獻于太祖至華州城東華將婁敬思疑其有異部輿視之乃兵仗也居厚等因呼殺敬思聚衆攻西城時崔𦙍在華州遣部下閉闗拒之遂遁去是日劉鄩下兖州河南數十郡同日發太祖怒遣朱友寧率軍討之既而友寧為青軍所敗臨陣被擒傳首于淮南天復三年七月太祖復令楊師厚進攻屯于臨胊師厚屢敗青軍遂進寨于城下師範懼乃令副使李嗣業詣師厚乞降太祖許之嵗餘遣李振權典青州事因令師範舉家徙汴師範將至縞素乘驢請罪于太祖太祖以禮待之尋表為河陽節度使㑹韓建移鎮青州太祖帳餞于郊師範預焉太祖謂建曰公頃在華隂政事之暇省覧經籍此亦士君子之大務今之青土政簡務暇可復修華隂之故事建撝謙而已太祖又曰公讀書必須精意勿錯用心太祖以師範好儒前以青州叛故以此言譏之及太祖即位徴為金吾上將軍開平初太祖封諸子為王友寧妻號訴于太祖曰陛下化家為國人人皆得封崇妾夫早預艱難粗立勞効不幸師範反逆亡夫横屍疆塲寃讎尚在朝廷受陛下恩澤亡夫何罪太祖凄然淚下曰幾忘此賊即遣人族師範于洛陽先掘坑于第側乃告之其弟師誨兄師悦及兒姪二百口咸盡戮焉時使者宣詔訖師範盛啓宴席令昆仲子弟列座謂使者曰死者人所不能免况有罪乎然予懼坑屍于下少長失序有愧于先人行酒之次令少長依次于坑所受戮人士痛之後唐同光三年三月詔贈太尉劉知俊字希賢徐州沛縣人也姿貎雄傑倜儻有大志始事徐帥時溥為列校溥甚器之後以勇畧見忌唐太順二年冬率所部二千人來降即署為軍校知俊披甲上馬輪劍入敵勇冠諸將太祖命左右義勝兩軍隸之尋用為左開道指揮使故當時人為之劉開道後討秦宗權及攻徐州皆有功尋補徐州馬步軍都指揮使攻海州下之遂奏授刺史天復初厯典懐鄭二州從平青州以功奏授同州節度使天祐三年冬以兵五千破岐軍六萬于美原自是連克鄜延等五州乃加檢校太傅平章事開平二年春三月命為潞州行營招討使知俊未至潞夾寨已䧟晉人引軍方攻澤州聞知俊至乃退尋改西路招討使六月大破岐軍于幕谷俘斬千計李荗貞僅以身免三年五月加檢校太尉兼侍中封大彭郡王時知俊威望益隆太祖雄猜日甚會佑國軍節度使王重師無罪見誅知俊居不自安乃據同州叛鍳戒録云彭城王劉知俊鎮同州日因築營墻掘得一物重八十餘片狀若油囊召賓幕將校問之劉源曰此是寃氣所結古來囹圄之地或有焉昔王充據洛陽修河南府獄亦獲此物源聞酒能忘憂奠以醇醪或可消釋耳然此物之出亦非吉徵也知俊命具酒饌祝酹復瘞之尋有叛城背主之事送款于李荗貞又分兵以襲雍華雍州節度使劉捍被擒送鳳翔害之華州蔡敬思被傷獲免太祖聞知俊叛遣近臣諭之曰朕待卿甚厚何相負耶知俊報曰臣非背徳但畏死耳王重師不負陛下而致族滅太祖復遣使謂知俊曰朕不料卿為此昨重師得罪蓋劉捍言隂結邠鳳終不為國家用我今雖知枉濫悔不可追致卿如斯我心恨恨蓋劉捍誤于事也捍一死固未塞貴知俊不報遂分兵以守潼闗太祖命劉鄩率兵進討攻潼闗下之時知俊弟知浣為親衛指揮使聞知俊叛自洛奔至潼闗為鄩所擒害之尋而王師繼至知俊乃舉族奔于鳳翔李荗貞厚待之偽加檢校太尉兼中書令以土疆不廣無藩鎮以處之但厚給俸禄而已尋命率兵攻圍靈武且圖收圉之地靈武節度使韓遜遣使來告急太祖令康懐英率師救之師次邠州長城嶺為知俊邀擊懐英敗歸九國志云李彦琦劉知俊自靈武班師塗經長城嶺梁師率精鋭數萬躡其後彦琦與知俊罔設方畧擊敗之荗貞悦署為涇州節度使復命率衆攻興元進圍西縣㑹蜀軍救至乃退九國志王宗鐬傳云岐將劉知俊等領大軍分路來攻由階成路奪固鎮糧王宗侃唐襲等禦之至靑泥嶺為知俊所敗退保西縣會大雨漢江漲宗鐬自羅村得鄉導縁山而行數百里與宗播遇于鐵谷合軍出湯頭時知俊自斜谷山南直抵興州圍西縣軍人㪚掠巴中宗鐬與宗播襲之會王建亦至遂解西縣之圍既而為荗貞左右石簡顒等間之免其軍政寓于岐下掩闗厯年荗貞猶子繼崇鎮秦州因來寧覲言知俊途窮至此不宜以䜛嫉見疑荗貞乃誅簡顒等以安其心繼崇又請令知俊挈家居秦州以就豐給茂貞從之未幾邠州亂茂貞命知俊討之時邠州都校李保衡納欵于朝廷末帝遣霍彦威率衆先入于邠知俊遂圍其城半載不能下㑹李繼崇以秦州降于蜀知俊妻孥皆遷于成都遂解邠州之圍而歸岐陽以舉家入蜀終慮有忌因與親信百餘人夜斬闗奔蜀王建待之甚至即授偽武信軍節度使尋命將兵伐岐不克班師因圍隴州獲其帥桑𢎞志以歸乆之復命為都統再領軍伐岐時部將皆王建舊人多違節度不成功而還蜀人因而毁之先是王建雖加寵待然亦忌之嘗謂近侍曰吾漸衰耗恒思身後劉知俊非爾輩能駕馭不如早為之所又嫉其名者于里巷間作謡言云黑牛出圈㯶繩斷知俊色黔而丑生㯶繩者王氏子孫皆以宗承為名故以此搆之偽蜀天漢元年冬十二月建遣人捕知俊斬于成都府之炭市及王衍嗣偽位以其子嗣禋尚偽峨眉長公主拜駙馬都尉後唐同光末隨例遷于洛卒知俊族子嗣彬㓜從知俊征行累遷為軍校及知俊叛以不預其謀得不坐貞明末大軍與晉王對壘于徳勝乆之嗣彬率數騎奔于晉具言朝廷軍機得失又以家世讎怨將以報之晉王深信之即後給田宅仍賜錦衣玉帶軍中目為劉二哥居一年復來奔當時晉人謂是刺客以晉王恩澤之厚故不竊發龍徳三年冬從王彦章戰于中都軍敗為晉人所擒晉王見之笑謂嗣彬曰爾可還予玉帶嗣彬惶恐請死遂誅之楊崇本不知何許人幼為李茂貞之假子因冐姓李氏名繼徽唐光化中茂貞表為邠州節度使天復元年冬太祖自鳳翔移軍北伐駐斾于邠郊命諸軍攻其城崇本懼出城請降太祖復置為邠州節度使仍令復其本姓名焉及師還遷其族于河中其後太祖因統戎往來由于蒲津以崇本妻素有姿色嬖之于别館其婦素剛烈私懐愧耻遣侍者讓崇本曰丈夫擁旄伏鉞不能庇其伉儷我已為朱公婦今生無面目對卿期于刀繩而已崇本聞之但灑淚念怒又昭宗自鳳翔回京崇本之家得歸邠州崇本恥其妻見辱因茲復貳于太祖乃遣使告茂貞曰朱氏兆亂謀危唐祚父為國家盤石不可坐觀其禍宜于此時畢命興復事茍不濟死為社禝可也茂貞乃遣使㑹兵于太原時四川王建亦令大將出師以助之岐蜀連兵以攻雍華關西大震太祖遣郴王友裕帥師禦之㑹友裕卒于行乃班師天祐三年冬十月崇本復領鳯翔邠涇秦隴之師㑹延州胡章之衆合五六萬屯于美原列柵十五其勢甚盛太祖命同州節度使劉知俊及康懐英帥師拒之崇本大敗復歸于邠州自是垂翅久之乾化元年冬為其子彦魯所毒而死彦魯自稱畱後領其軍事凡五十餘日為崇本養子李保衡所殺保衡舉其城來降末帝命霍彦威為邠帥由是邠寧復為末帝所有蔣殷不知何許人幼孤隨其母適于河中節度使王重盈之家重盈憐之畜為已子唐天復初太祖既平蒲陜殷與從兄珂舉族遷于大梁太祖感王重榮之舊恩凡王氏諸子皆録用焉殷由是繼厯内職累遷至宣徽院使殷素與庶人友珪善友珪簒立命為徐州節度使乾化三年秋末帝以福王友璋鎭徐方殷自以為友珪之黨懼不受代遂堅壁以拒命時華州節度使王瓚殷之從弟也懼其連坐上章言殷本姓蔣非王氏之子也末帝乃下詔削奪殷在身官爵仍令却還本姓命牛存節劉鄩等帥軍討之是時殷求救于淮南楊溥遣朱瑾率衆來援存節等逆擊敗之貞明元年春存節劉鄩攻下徐州殷舉族自燔于火中得其屍梟首以獻之張萬進雲州人初為本州小校亡命投幽州劉守光厚遇之任為禆將滄州劉守文以弟守光囚父而竊據其位自領兵問罪尋敗于鷄蘇守光遂兼有滄景之地令其子繼威主留務繼威年幼未能政事以萬進佐之凡闗軍政一皆委任繼威凶虐類父嘗淫亂于萬進之家萬進怒而殺之通鑑云乾化二年九月庚子萬進遣使奉表降于梁辛丑以萬進為義昌留後甲辰改義昌為順化軍以萬進為節度使此傳疑有闕文又遣使歸于晉既而末帝遣楊師厚劉守竒潛兵掠鎮冀因東攻滄州萬進懼乞降師厚表青州節度使俄遷兖州仍賜名守進萬進性既輕險專圖反側貞明四年冬據城叛命遣使送欵于晉王末帝降制削其官爵仍復其本名遣劉鄩討之晉人不能救五年冬萬進危䠞小將邢師遇潛謀内應門以納王師遂㧞其地萬進族誅史臣曰夫雲雷構屯龍虵起陸勢均者交鬬力敗者先亡故瑄瑾時溥之流皆梁之吞噬斯亦理之常也唯瑾始以竊發有土終以竊發亡身𫝊所謂君以此始必以此終者乎師範屬衰季之運以興復為謀事雖不成忠則可尚雖貽族滅之禍亦可以興臧洪逰于地下矣知俊驍武有餘奔亡不暇六合雖大無所容身夫如是則豈若義以為勇者乎崇本而下俱以叛滅又何足以道哉舊五代史巻十三
