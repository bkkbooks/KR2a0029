body:
  text: 舊五代史巻十五攷證梁列傳五韓建傳又害太子詹事馬道殷將作監許巖士案新唐書昭宗紀正月乙酉韓建殺扈蹕都將李筠二月殺太子詹事馬道殷將作監許巖士八月殺通王滋沂王湮韶王彭王嗣韓王嗣陳王嗣覃王嗣周王嗣延王戒丕嗣丹王允通鑑與新唐書同是書以殺李筠二月事以殺馬道殷許巖士為八月事蓋本于舊唐書昭宗紀李罕之傳伊鐸案歐陽史作伊鐔遣其子顥案歐陽史作遣子頎馮行襲傳尋授均州刺史案新唐書本紀光啓元年四月武當賊馮行襲陷均州逐其刺史吕曄蓋行襲既殪孫喜遂自據其郡也是書作中和間事與唐書異歐陽史仍從是書孫徳昭傳父惟晸有功于唐朝案惟晸歐陽史作惟朂攷新唐書亦作惟晸今仍其舊乃與本軍孫承誨董從實二人案孫承誨董從實新舊唐書並作周承誨董彦弼攷承誨姓周與孫未知孰是從實改名彦弼見本傳後文與是書同趙克裕傳尋移理許田案克裕移理許田是書未明言其故新唐書云紀朱全忠陷孟州逐河陽節度使趙克裕据通鑑則克裕移鎮因梁祖欲以張全義領河陽也新唐書所紀疑非事實舊五代史巻十五攷證
