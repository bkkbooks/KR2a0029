body:
  text: 舊五代史卷四十八攷證唐末帝紀下五月辛夘以河東節度使兼大同彰國振武威塞等軍蕃漢馬步總管檢校太師兼中書令駙馬都尉石敬瑭為鄆州節度使進封趙國公案歐陽史廢帝紀以五月以前即書石敬瑭反與晉本紀自相矛盾據是書五月辛夘始移敬瑭于鄆州戊戌始聞拒命也五代春秋通鑑俱與是書同戊戌昭義奏河東節度使石敬瑭叛案通鑑作昭義節度使皇甫立奏石敬瑭叛乙夘以晉州節度使張敬達為太原四面兵馬都部署尋改為招討使案通鑑乙巳以張敬達兼太原四面排陣使丙午以為太原四面都部署丁未又知太原行府事不言其為招討使歐陽史又作都招討使與是書微異捧聖第五指揮使康福進康福進疑當作康福據冊府元龜引薛史亦作康福今姑仍其舊誅右衞上将軍石重英皇城副使石重裔皆敬瑭之子也案重英通鑑作重殷又通鑑考異引廢帝實録作侄男尚食使重乂供奉官重英並與是書不同九月甲辰張敬達奏此月十五日與契丹戰于太原城下案張敬達及契丹戰于太原是書晉紀作辛丑盖辛丑日戰越四日甲辰乃奏到也通鑑亦作辛丑遼史作庚午與是書異歐陽史作甲辰戰于太原殊誤詔范延光率兵由青山路趋榆次范延光遼史避太宗諱作范延廣甲子太原行營副招討使楊光逺殺招討使張敬達於晉安寨以兵降契丹案楊光逺降契丹歐陽史通鑑俱作閏十一月甲子五代春秋作十一月誤戎王並以漢軍與石敬瑭其馬及甲仗即齎驅出塞案遼史云所降軍士及馬五千匹以賜晉帝與是書異通鑑從是書丁夘戎王立石敬瑭為大晉皇帝案契丹立晉是書晉髙祖紀作十一月丁酉此紀作閏月丁夘前後互異據通鑑考異引廢帝實録亦作丁夘盖契丹立晋在十一月丁酉唐人至閏十一月丁夘始奏聞也實録誤以奏聞之日為立晉之日是書唐紀亦仍其誤達喇罕舊作達刺干今改摩哩舊作梅里今改大詳衮舊作大相温今改舊五代史巻四十八攷證
