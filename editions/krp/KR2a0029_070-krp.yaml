body:
  text: 舊五代史巻三十四攷證唐莊宗紀八令朱守殷以兵圍其第案圍其第歐陽史作圍其館胡三省云歐陽史葢謂朱友謙無私第在洛陽也据雲谷雜記唐末藩鎮入朝館舍皆稱邸第似無庸更易其字通鑑仍從是書作第三月丁未朔丁未通鑑作丁已庚戌李紹真自邢州赴鄴都城下案通鑑作庚申李紹真引兵至鄴都營於城西北以太等徇于鄴城下而殺之與是書異甲寅進營于觀音門外下令諸軍詰旦攻城是夜城下軍亂案通鑑作壬戌李嗣源至鄴都甲子夜軍亂攷異引莊宗寔録作壬戌至鄴都癸亥夜軍士張破敗作亂與是書異日通鑑從是書帝遣嗣源子從審從審歐陽史及通鑑俱作從璟是書本紀前後俱作從審未知何據帝幸耀店以勞之耀店通鑑作鷂店胡三省注云薛史作耀店今仍其舊甲戌次石橋甲戌通鑑作甲申四月丁丑朔案歐陽史及通鑑五代春秋俱作四月丁亥朔攷遼史天顯元年即同光四年亦作四月丁亥朔是書莊宗紀作丁丑明宗紀作丁亥前後互異攷是年正月戊午朔三月丁未朔則四月朔日當為丁丑五坊人善友案通鑑作鷹坊人善友胡三省注云鷹坊唐時五坊之一也善姓也按巴堅舊作阿保機今改阿都欲舊作阿咄欲今改舊五代史巻三十四考證
