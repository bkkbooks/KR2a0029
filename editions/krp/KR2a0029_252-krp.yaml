  text: 舊五代史巻一百二十七攷證周列傳七和凝傳欲預出宣敕十數道宻付開封尹鄭王令有緩急即旋填將校姓名領兵擊之案洛陽搢紳舊聞記作巳命髙行周為招討張從恩為都監仍令焦繼勲等數人備指使是晉祖未北征巳命將校矣與是書異舊五代史巻一百二十七考證
