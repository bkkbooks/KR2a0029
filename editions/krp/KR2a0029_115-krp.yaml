body:
  text: 舊五代史巻五十七宋門下侍郎參知政事監修國史薛居正等撰唐書第三十三列傳九郭崇韜字安時代州鴈門人也父𢎞正崇韜初為李克修帳下親信克修鎮昭義崇韜累典事務以亷幹稱克修卒武皇用為典謁奉使鳯翔稱旨署教練使崇韜臨事機警應對可觀莊宗嗣位尤器重之天祐十四年用為中門副使與孟知祥李紹宏俱參機要俄而紹宏出典幽州留事知祥懇辭要職先是中門使吴珙張虔厚忠而獲罪知祥懼求為外任妻璚華公主泣請于貞簡太后莊宗謂知祥曰公欲避路當舉其代知祥因舉崇韜乃署知祥為太原軍在城都虞候自是崇韜專典機務艱難戰伐靡所不従十八年従征張文禮於鎮州契丹引衆至新樂王師大恐諸將咸請退還魏州莊宗猶豫未決崇韜曰按巴堅祗為王都所誘本利貨財非敦鄰好茍前鋒小衂遁走必矣况我新破汴寇威振北地乘此驅攘焉往不㨗且事之濟否亦有天命莊宗従之王師果㨗明年李存審牧鎮州遣崇韜閲其府庫或以珍貨賂遺一無所取但市書籍而已莊宗即位於魏州崇韜加檢校太保守兵部尚書充樞密使是時衛州陷於梁澶相之間寇鈔日至民流地削軍儲不給羣情恟恟以為覇業終不能就崇韜寢不安席俄而王彦章陷德勝南城敵勢滋蔓汴人急攻楊劉城明宗在鄆音驛斷絶莊宗登城四望計無従出崇韜啓曰叚凝阻絶津路茍王師不南鄆州安能保守臣請於博州東岸立栅以固通津但慮汴人偵知徑來薄我請陛下募敢死之士日以挑戰如三四日問賊軍未至則栅壘成矣崇韜率毛璋等萬人夜趨博州視矛㦸之端有光崇韜曰吾聞火出兵刃破賊之兆也至博州渡河版築晝夜不息崇韜于葭葦間據胡牀假寢覺袴中冷左右視之乃地也其忘疲勵力也如是居三日梁軍果至城壘低痺沙土㪚惡戰具不完汴將王彦章杜晏球率衆攻擊軍不得休息崇韜身先督衆四面拒戰有急即應城垂陷俄報莊宗領親軍次西岸梁軍聞之退走因解楊劉之圍未幾汴將康延孝來奔崇韜延於臥内訊其軍機延孝曰汴人將四道齊舉以困我軍莊宗憂之召諸將謀進取之䇿宣徽使李紹宏請棄鄆州與汴人盟以河為界無相侵冦莊宗不悦獨臥帳中召崇韜謂曰計將安出對曰臣不知書不能徴比前古請以時事言之自陛下十五年起義圖覇為雪家讐國恥甲胄生蟣虱黎人困輸輓今纂崇大號河朔士庶日望盪平纔得汶陽尺寸之地不敢保守况盡有中原乎將來嵗賦不充物議咨怨設若劃河為界誰為陛下守之臣自延孝言事已來晝夜籌度料我兵力算賊事機不出今年雌雄必決聞汴人決河自滑至鄆非舟楫不能濟又聞精兵盡在叚凝麾下王彦章日冦鄆境彼既以大軍臨我南鄙又憑恃決河謂我不能南渡志在收復汶陽此汴人之謀也臣謂叚凝保據河壖茍欲持我臣但請留兵守鄴保固楊劉陛下親御六軍長驅倍道直指大梁汴城無兵望風自潰若使偽主授首賊將自然倒戈半月之間天下必定如不決此計傍採浮譚臣恐不能濟也今嵗秋稼不登軍糧纔支數月決則成敗未知不決則坐見不濟臣聞作舍道邊三年不成帝王應運必有天命成敗天也在陛下獨斷莊宗蹶然而興曰正合吾意丈夫得則為王失則為擄行計決矣即日下令軍中家口並還魏州莊宗送劉皇后與興聖宫使繼岌至朝城西野亭泣别曰事勢危蹙今須一決事茍不濟無復相見乃留李紹宏及租庸使張憲守魏州大軍自楊劉濟河是嵗擒王彦章誅梁氏降叚凝皆崇韜贊成其謀也莊宗至汴州宰相豆盧革在魏州令崇韜權行中書事俄拜侍中兼樞密使及郊禮畢以崇韜兼領鎮冀州節度使進封趙郡公邑二千户賜鐡劵恕十死崇韜既位極人臣權傾内外謀猷獻納必盡忠規士族朝倫頗亦收奬人物内外翕然稱之初收汴洛稍通賂遺親友或規之崇韜曰余備位將相禄賜巨萬但偽梁之日賂遺成風今方面藩侯多梁之舊將皆吾君射鉤斬袪之人也一旦革面化為吾人堅拒其請得無懼乎藏余私室無異公帑及郊禋崇韜悉獻家財以助賞給時近臣勸莊宗以貢奉物為内庫珍貨山積公府賞軍不足崇韜奏請出内庫之財以助莊宗沉吟有靳惜之意是時天下已定冦讐外息莊宗漸務華侈以逞已欲洛陽大内宏敞宫宇深䆳宦官阿意順旨以希恩寵聲言宫中夜見鬼物不謀同辭莊宗駭異其事且問其故宦者曰見本朝長安大内六宫嬪御殆及萬人椒房蘭室無不充牣今宫室大半空間鬼神尚幽亦無所怪繇是景進王允平等于諸道採擇宫人不擇良賤内之宫掖三年夏雨河大水壞天津橋是時酷暑尤甚莊宗常擇髙樓避暑皆不稱旨宦官曰今大内樓觀不及舊時長安卿相之家舊日大明興慶兩宫樓觀百數皆雕楹畫拱干雲蔽日今官家納凉無可御者莊宗曰予富有天下豈不能辦一樓即令宫苑使經營之猶慮崇韜有所諫止使謂崇韜曰今年惡熱朕頃在河上五六月中與賊對壘行宫卑濕介馬戰賊恒若清涼今晏然深宫不耐暑毒何也崇韜奏陛下頃在河上汴寇未平廢寢忘食心在戰陣祁寒溽暑不介聖懷今寇既平中原無事縱耳目之玩不憂戰陣雖層臺百尺廣殿九筵未能忘熱於今日也願陛下思艱難創業之際則今日之暑坐變清涼莊宗黙然王允平等竟加營造崇韜復奏曰内中營造日有縻費屬當災饉且乞權亭不聴初崇韜與李紹宏同為内職及莊宗即位崇韜以紹宏素在已上舊人難制即奏澤潞監軍張居翰同掌樞密以紹宏為宣徽使紹宏大失所望泣涕憤鬰崇韜乃置内勾使應三司財賦皆令勾覆令紹宏領之冀塞其心紹宏怏悵不已崇韜自以有大功河洛平定之後權位熏灼恐為人所傾奪乃謂諸子曰吾佐主上大事了矣今為羣邪排毁吾欲避之歸鎮常山為菟裘之計其子延説等曰大人功名及此一失其勢便是神龍去水為螻蟻所制尤直深察門人故吏又謂崇韜曰侍中勲業第一雖羣官側日未必能離間宜於此時堅辭機務上必不聼是有辭避之名塞其䜛慝之口魏國夫人劉氏有寵中宫未正宜贊成册禮上心必悦内得劉氏之助羣閹其如余何崇韜然之於足三上章堅辭樞密之位優詔不從崇韜乃密奏請立魏國夫人為皇后復奏時務利害二十五條皆便於時取悦人心又請罷樞密院事各歸本司以輕其權然宦官造謗不已三年堅乞罷兼領節鉞許之册府元龜云同光中崇韜再表辭鎮批答曰朕以卿久司樞要常處重難或遲疑未決之機詢諸先見或憂撓不定之事訪自必成至於贊朕丕基登兹大寶衆興異論卿獨堅言天命不可違唐祚必須復請納家族明設誓文及其密取汶陽興師入不測之地潛通河口貢謀占必濟之津人所不知卿惟合意迨中都肅聚羣黨窺陵朕決議平妖兼收浚水雖云先定更審前籌果盡贊成悉諧沉算斯即何須冒刃始顯殊庸況常山陸梁正虞未復卿能撫衆共定羣心惟朕知卿他人寕表所以賞卿之寵實異等倫沃朕之心非虛渥澤今卿再三謙遜重疊退辭始納常陽請歸上將又稱梁范不可兼權如此周身貴全名節古人操守未可比方既覽堅辭難沮來表其再讓汴州所宜依允㑹客省使李嚴使西川回言王衍可圖之狀莊宗與崇韜議討伐之謀方擇大將時明宗為諸道兵馬總管當行崇韜自以宦者相傾欲立大功以制之乃奏曰契丹犯邊北面須藉大臣全倚總管鎮禦臣伏念興聖宫使繼岌徳望日隆大功未著宜依故事以親王為元帥付以討伐之權俾成其威望莊宗方愛繼岌即曰小児㓜稚安能獨行卿當擇其副崇韜未奏莊宗曰無踰於卿者乃以繼岌為都統崇韜為招討使是嵗九月十八日率親軍六萬進討蜀川崇韜將發奏曰臣以非才謬當戎事仗將士之忠力憑陛下之威靈庶幾克㨗若西川平定陛下擇帥如信厚善謀事君有節則孟知祥有焉望以蜀帥授之如宰輔闕人張憲有披榛之勞為人謹重而多識其次李琪崔居儉中朝士族富有文學可擇而任之莊宗御嘉慶殿置酒宴征西諸將舉酒屬崇韜曰繼岌未習軍政卿久從吾戰伐西面之事屬之於卿軍發十月十九日入大散闗崇韜以馬箠指山險謂魏王曰朝廷興師十萬已入此中儻不成功安有歸路今岐下飛輓才支旬日必須先取鳯州收其儲積方濟吾事乃令李嚴康延孝先馳書檄以諭偽鳯州節度使王承㨗及大軍至承㨗果以成降得兵八千軍儲四十萬次至故鎮偽命屯駐指揮使唐景思亦以城降得兵四千又下三泉得軍儲三十餘萬自是師無匱乏軍聲大振其招懷制置官吏補置師行籌畫軍書告諭皆出於崇韜繼岌承命而已莊宗令内官李廷安李従襲吕知柔為都統府紀綱見崇韜幕府繁重將吏輻輳降人爭先賂遺都統府唯大將省謁牙門索然繇是大為詬恥及六軍使王宗弼歸疑行賂先招討府王衍以城都降崇韜居王宗弼之第宗弼選王衍之妓妾珍玩以奉崇韜求為蜀帥崇韜許之又與崇韜子廷誨謀令蜀人列狀見魏王請奏崇韜為蜀帥繼岌覽狀謂崇韜曰主上倚侍中如衡華安肻棄元老於蠻夷之地況余不敢議此九國志王宗弼𫝊宗弼送欵於魏王乃還城都盡輦内藏之寶貸歸於其家魏王遣使徴犒軍錢數千萬宗弼輒靳之魏王甚怒及王師至令其子承班齎衍玩用直百萬獻於魏王并賂郭宗韜請以已為西川節度使魏王曰此我家之物焉用獻為魏王入城翼日數其不忠之罪並其子斬之於市李従襲等謂繼岌曰郭公收蜀部人情意在難測王宜自備由是兩相猜察莊宗令中官向延嗣賫詔至蜀促班師詔使至崇韜不郊迎延嗣憤憤從襲謂之曰魏王貴太子也主上萬福郭公專弄威柄旁若無人昨令蜀人請己為帥郭廷誨擁徒出入貴擬王者所與狎遊無非軍中驍果蜀中凶豪晝夜妓樂歡宴指天畫地父子如此可見其心今諸軍將校無非郭氏之黨魏王懸軍孤弱一朝班師必恐紛亂吾屬莫知暴骨之所因相向垂涕延嗣使還具奏皇后泣告莊宗乞保全繼岌莊宗復閲蜀簿曰人言蜀中珠玉金銀不知其數何如是之㣲也延嗣奏曰臣問蜀人知蜀中寶貨皆入崇韜之門言崇韜得金萬兩銀四十萬名馬千匹王衍愛妓六十樂百工犀玉帶百廷誨自有金銀十萬兩犀玉帶五十藝色絶妓七十樂工七十他財稱是魏王府蜀人賂遺不過匹馬而已莊宗初聞崇韜欲留蜀心已不平又聞全有蜀之妓樂珍玩怒見顔色即令中官馬彦珪馳入蜀視崇韜去就如班師則已如實遲留則與繼岌圖之彦珪見皇后曰禍機之發間不容髪何能數千里外復禀聖旨哉皇后再言之莊宗曰未知事之實否詎可便令果決皇后乃自為教與繼岌令殺崇韜時蜀土初平山林多盜孟知祥未至崇韜令任圜張筠分道招撫慮師還後部曲不寧故歸期稍緩四年正月六日馬彦珪至軍決取十二日發城都赴闕令任圜權知留事以俟知祥諸軍部署已定彦珪出皇后教以示繼岌繼岌曰大軍將發他無釁端安得為此負心事公輩勿復言從襲等泣曰聖上既有口勅王若不行茍中途事洩為患轉深繼岌曰上無詔書徒以皇后教令安得殺招討使從襲等巧造事端以間之繼岌既無英斷僶俛從之詰旦從襲以繼岌之命召崇韜計事繼岌登樓避之崇韜入左右檛殺之崇韜有子五人廷信廷誨隨父死於蜀廷説誅於洛陽廷讓誅於魏州廷議誅於太原家産籍没明宗即位詔令歸葬仍賜太原舊宅廷誨廷讓各有㓜子一人姻族保之獲免崇韜妻周氏攜養於太原崇韜服勤盡節佐佑王家草昧艱難功無與比西平巴蜀宣暢皇威身死之日夷夏寃之然議者以崇韜功烈雖多事權太重不能處身量力而聴小人悮計欲取泰山之安如急行避跡其禍愈速性復剛戾遇事便發既不知前代之成敗又未體當時之物情以天下為已任孟浪之甚也及權傾四海車騎盈門士人謟奉漸别流品同列豆盧革謂崇韜曰汾陽王代北人徙家華隂侍中世在鴈門得非祖德歟崇韜應曰經亂失譜牒先人嘗云去汾陽王四世革曰故祖德也因是旌别流品援引簿徒委之心腹佐命勲舊一切鄙棄舊寮有干進者崇韜謂之曰公雖代邸之舊然家無門閥深知公才技不敢驟進者慮名流嗤余故也及征蜀之行于興平拜尚父子儀之墓嘗從容白繼岌曰蜀平之後王為太子待千秋萬嵗神器在手宜盡去宦官優禮士族不唯疎斥閹寺騸馬不可復乘内則伶官巷伯怒目切齒外則舊寮宿將㦸手痛心掇其族滅之禍有自來矣復以諸子驕縱不法既定蜀川輦運珍貨實於洛陽之第籍沒之日泥封尚濕雖莊宗季年為羣小所惑致功臣不保其終亦崇韜自貽其災禍也史臣曰夫出身事主得位遭時功不可以不圖名不可以不立洎功成而名遂則望重而身危貝錦於是成文良玉以之先折故崇韜之誅盖為此也是知强吴滅而范蠡去全齊下而樂生奔茍非其賢孰免其禍明哲之士當鑒於斯舊五代史巻五十七
