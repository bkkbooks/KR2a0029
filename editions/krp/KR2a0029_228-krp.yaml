body:
  text: 舊五代史巻一百十四攷證周世宗紀一賊軍又潰臨陣斬賊大將張暉案九國志作張元徽乗勝復入馬倒為周師所擒殺之與是書異通鑑從是書戊戌車駕至潞州案歐陽史作丁酉幸潞州與是書異通鑑從歐陽史五代春秋作丙戌誤鐡騎第一軍都指揮使趙宏殷案原本註宣祖廟諱四字今据宋史改作宏殷偽代州防禦使鄭處謙以城歸順案遼史穆宗紀四年五月乙亥忻代二州叛据是書則忻州歸順在四月代州歸順在五月丙子與遼史日月互異舊五代史巻一百十四攷證
