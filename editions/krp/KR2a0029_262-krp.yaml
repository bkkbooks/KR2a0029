body:
  text: 舊五代史巻一百三十二攷證世襲列傳一李茂貞傳捧日都將李雲案新唐書及通鑑俱作李筠是書韓建傳亦作李筠惟此傳作李雲李茂勲傳一日其民竊發以木檐擊茂勲踣於地案通鑑攷異引唐餘録云棗强民欲擊梁祖誤中茂勲蓋傳聞之異辭也附識於此高萬興傳五年冬敬璋卒卒原本訛平今據文改正李仁福傳拓跋思恭案思恭歐陽史作思敬舊五代史巻一百三十二攷證
