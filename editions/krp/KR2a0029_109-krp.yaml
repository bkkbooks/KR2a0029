body:
  text: 舊五代史巻五十四宋門下侍郎參知政事監修國史薛居正等撰唐書第三十列𫝊六王鎔其先回鶻部人也逺祖没諾干唐至徳中事鎮州節度使王武俊為騎將武俊嘉其勇幹畜為假子號王五哥其後子孫以王為氏四代祖廷湊事鎮帥王承宗為牙將長慶初承宗卒穆宗命田𢎞正為成徳軍節度使既而鎮人殺宏正推廷湊為留後朝廷不能制因以旄鉞授之廷湊卒子元逵尚文宗女壽安公主元逵卒子紹鼎立紹鼎卒子景崇立皆世襲鎮州節度使並前史有𫝊景崇位至太尉中書令封常山王中和二年卒鎔即景崇之子也年十嵗三軍推襲父位大順中武皇將李存孝既平邢洺因獻謀于武皇欲兼并鎮定乃連年出師以擾鎮之屬邑鎔苦之遣使求救于幽州舊唐書云時天子䝉塵九州鼎沸河東節度使李克用虎視山東方謀吞據鎔以重賂結納請以脩和好晉軍討孟方立于刑州鎔常奉以芻糧及方立平晉將李存孝侵鎔南部鎔求援于幽州自是燕帥李匡威頻嵗出軍以為鎔援時匡威兵勢方盛以鎔沖弱將有窺圖之志景福二年春匡威率精騎數萬再來赴援㑹匡威弟彦儔奪據兄位匡威退無歸路鎔乃延入府第館于寶壽佛寺鎔以匡威因已而失國又感其援助之力事之如父五月鎔謁匡威于其館匡威陰遣部下伏甲劫鎔抱持之鎔曰公戒部人勿造次吾國為晉人所侵垂將覆滅賴公濟援之力幸而獲存今日之事本所甘心即並轡歸府舍鎔軍拒之竟殺匡威鎔本踈瘦時年始十七當與匡威並轡之時電雨驟作屋瓦皆飛有一人于缺垣中望見鎔鎔就之遽挾于馬上肩之而去翼日鎔但覺項痛頭偏蓋因為有力者所挾不勝其苦故也既而訪之則曰墨君和乃鼓刀之士也遂厚賞之太平廣記引劉氏耳目記云真定墨君和幼名三旺眉日稜岸肌膚若鐡年五六趙王鎔初即位曽見之悦而問曰此中何得崑崙兒也問其姓與形質相應即呼為墨崑崙因以皂衣賜之是時常山縣邑屢為并州中軍所侵掠趙之將卒疲于戰敵告急於燕王李匡威率師五萬來救之并人攻陷數城燕王聞之躬領五萬騎徑與晉師戰于元氏晉師敗績趙王感燕王之徳椎牛灑酒大犒于槀城輦金二十萬以謝之燕王歸國比及境上為其弟匡儔所拒趙人以其有徳于我遂營東圃以居之燕王自以失國又見趙王之幼乃圖之遂伏甲俟趙王旦至即使擒之趙王請曰某承先代基搆主此山河每被鄰冦侵漁困于守備賴太王武畧累挫戎鋒獲保宗祧實資恩力顧惟幼懦夙冇卑誠望不匆匆可伸交讓願與太王同歸衙署即軍府必不拒違燕王以為然遂與趙王並轡而進俄有大風並黑雲起于城上大雨雷電至東角門内有勇夫袒臂旁來拳毆燕之介士既挾負趙王踰垣而走遂得歸公府問其姓名君和恐其難記逐燕但言曰硯中之物王心志之左右軍士既見主免難遂王燕王退走于東圃趙人圍而殺之趙王召墨生以千金賞之兼賜上第一區良田萬畝仍恕其士死奏授光禄大夫鎔既失燕軍之援㑹武皇出師以逼真定鎔遣使謝罪出絹二十萬匹及具牛酒犒軍自是與鎔俱脩好如初洎梁祖兼有山東虎視天下鎔卑辭厚禮以通和好新唐書羅紹威諷鎔絶太原共尊全忠鎔依違全忠不悅光化三年秋梁祖將吞河朔乃親征鎮定縱其軍燔鎮之闗城鎔謂賓佐曰事急矣謀其所向判官周式者有口辯出見梁祖梁祖盛怒逆謂式曰王令公朋附并汾違盟爽信敝賦業已及此期于無捨式曰公為唐室之桓文當以禮義而成霸業反欲窮兵黷武天下其謂公何新唐書李嗣昭攻洺州全忠自將擊走之得鎔與嗣昭書全忠怒引軍攻鎔周式請見全忠全忠即出書示式曰嗣昭在者宜速遣式曰王公所與和者息人鋒鏑間耳况繼奉天子詔和解能一畨紙墜北路乎太原與趙本無恩嗣昭庸肯入耶梁祖喜引式袂而慰之曰前言戲之耳即送牛酒貨幣以犒軍式請鎔子昭祚及大將梁公儒李𢎞規子各一人往質于汴梁祖以女妻昭祚及梁祖稱帝鎔不得巳行其正朔其後梁祖常慮河朔悠久難制會羅紹威卒因欲除移鎮定先遣親軍三千分據鎔深冀二郡以鎮守為名义遣大將王景仁李思安率師七萬營于柏鄉鎔遣使告急莊宗莊宗命周徳威率兵應之鎔復奉唐朝正朔稱天祐七年及破梁軍于髙邑我軍大振自是遣大將王徳明率三十七都從莊宗征伐收燕降魏皆預其功然鎔未嘗親軍逺出八年七月鎔至承天軍與莊宗合宴同盟奉觴獻壽以申感槩莊宗以鎔父友曲加敬異為之聲歌鎔亦報之謂莊宗為四十六舅中飲莊宗抽佩刀斷衿為盟許女妻鎔子昭誨因兹堅附于莊宗矣鎔自幼聰悟然仁而不武征伐出于下特以作藩數世専制四州髙屏塵務不親軍政多以閹人秉權出納決斷悉聽所為皆雕靡第舎崇飾園池植竒花異木逓相誇尚人士皆褒衣博帶髙車大蓋以事嬉逰藩府之中當時為盛鎔宴安既久惑於左道専求長生之要常聚緇黄合鍊仙丹或講說佛經親受符録西山多佛寺又有王母觀鎔増置館宇雕飾土木道士王若訥者誘鎔登山臨水訪求仙迹每一出數月方歸百姓勞弊王母觀石路既峻不通輿馬每登行命僕妾數十人維錦繡牽持而上有閹人石希䝉者姦寵用事為鎔所嬖恒與之卧起天祐八年冬十二月鎔自西山迴宿于鶻營莊將歸府第希䝉勸之他所宦者李𢎞規謂鎔曰方今晉王親當矢石櫛沐風雨王殫供軍之租賦為不急之逰盤世道未夷人心多梗久虛府第逺出遊從如樂禍之徒翻然起變拒門不納則王欲何歸鎔懼促歸希䝉譖𢎞規専作威福多蓄猜防鎔由是復無歸志𢎞規聞之怒使親事偏將蘇漢衡率兵擐甲遽至鎔前抽戈露刃謂鎔曰軍人在外已久願從王歸𢎞規進曰石希䝉說王遊從勞弊士庶又結構隂邪將為大逆臣已偵視情狀不虚請王殺之以除禍本鎔不聽𢎞規因令軍士聚譟斬希䝉首抵于前鎔大恐遂歸是日令其子昭祚與張文禮以兵圍李𢎞規及行軍司馬李藹宅並族誅之詿誤者凡數十家又殺蘇漢衡收部下偏將下獄窮其反狀親軍皆恐復不時給賜衆益懼文禮因其反側密諭之曰王將坑爾曹宜自圖之衆皆掩泣相謂曰王待我如是我等焉能効忠是夜親事軍十餘人自子城西門尋垣而入鎔方焚香受籙軍士二人突入斷其首袖之而出遂焚其府第煙燄亘天兵士大亂鎔姬妾數百皆赴水投火而死軍校有張友順者率軍人至張文禮之第請為留後遂盡殺王氏之族鎔于昭宗朝賜號敦睦保定久大功臣位至成徳軍節度使守太師中書令趙王梁祖加尚書令初鎔之遇害不獲其屍及莊宗攻下鎮州鎔之舊人于所㷊府第灰間方得鎔之殘骸莊宗命幕客致祭塟於王氏故塋鎔長子昭祚亂之翼日張文禮索之斬于軍門次子昭誨當鎔被禍之夕昭誨為軍人攜出府第置之地穴十餘日乃髠其髮被以僧衣屬湖南綱官李震南還軍士以昭誨托于震震置之茶褚中既至湖湘乃命依南嶽寺僧習業嵗給其費昭誨年長思歸震即齎送而還時鎔故將符習為汴州節度使會昭誨來投即表其事曰故趙王王鎔小男昭誨年十餘嵗遇禍為人所匿免今尚為僧名崇隱謹令赴闕明宗賜衣一襲令脫僧服頃之昭誨稱前成徳軍中軍使檢校太傅詣中書陳狀特授朝議大夫檢校考功郎中司農少卿賜金紫符習因以女妻之其後累厯少列周顯徳中遷少府監王處直案王處直𫝊原本止存王都廢立之事而處直事闕佚今考舊唐書列𫝊云處直字允明處存母弟也初為定州後院軍都知兵馬使汴人入冦處存拒戰不利而退三軍大譟推處直為帥乃權知留後事汴將張存敬攻城梯衝雲合處直登城呼曰敝邑于朝廷未嘗不忠于藩鄰未嘗失禮不虞君之涉吾地何也朱温使人報之曰何以附太原而弱鄰道處直報曰吾兄與太原同時立勲王室地乂親鄰修好往來常道也請從此改圖温許之仍歸罪于孔目吏梁問出絹十萬匹牛酒以犒汴軍存敬脩盟而退温因表授旄鉞檢校左僕射天祐元年加太保封太原王後仕偽梁授北平王檢校太尉不數嵗復歸于莊宗後十餘年為其子都廢歸私第尋卒年六十一王都本姓劉小字雲郎中山徑邑人也初有妖人李應之得于村落間養為已子及處直有疾應之以左道醫之不久病間處直神之待為羽人始假幕職出入無間漸署為行軍司馬軍府之事咸取決焉處直時未有子應之以都遺于處直曰此子生而有異因是都得為處直之子其後應之閱白丁于管内别置新軍起第于博陵坊面開一門動皆鬼道處直信重日隆將校相慮變在朝夕謀先事為禍㑹燕師假道伏甲于外城以備不虞昧旦入郭諸校因引軍以圍其第應之死于亂兵咸云不見其屍衆不解甲乃逼牙帳請殺都處直堅靳之久乃得免翼日賞勞籍其兵於卧内自隊長以上記于别簿漸以他事孥戮迨二十年别簿之記略無孑遺都既成長總其兵柄姦詐巧佞生而知之處直愛養漸有付託之意時處直諸子尚幼乃以都為節度副大使王郁者亦處直之孽子也案以下有闕文天祐十八年十二月莊宗親征鎮州敗契丹于沙河明年正月乗勝追敵過定州都馬前奉迎莊宗幸其府第曲宴都有愛女十餘嵗莊宗與之論婚許為皇子繼岌之妻自是恩寵特異奏請無不從同光三年莊宗幸鄴都都來朝覲留宴旬日錫賚鉅萬遷太尉侍中時周𤣥豹見之曰形若鯉魚難免刀機及明宗嗣位加中書令然以其奪據父位深心惡之初同光中祁易二州刺史都奏部下將校為之不進户口租賦自贍本軍天成初仍舊既而安重誨用事稍以朝政釐之時契丹犯塞諸軍多屯幽易間大將往來都隂為之備屢廢迎送漸成猜間和昭訓為都籌畫曰主上新有四海其勢易離可圖自安之計㑹朱守殷據汴州反鎮州節度使王建立與安重誨不協心懷怨嫉都陰知之乃遣人說建立謀叛建立偽許之密以狀聞都又與青徐岐潞梓五帥蠟書以離間之三年四月制削都在身官爵遣宋州節度使主晏球率師討之都急與王郁謀引契丹為援洎王師攻城契丹將托諾率騎萬人來援都與契丹合兵大戰于嘉山為王師所敗惟托諾以二千騎奔入定州都仗之守城呼為納王屈身瀝懇冀其盡力孤壘周年亦甚有備諸校或思歸嚮以其訪察嚴密殺人相繼人無宿謀故數構不就都好聚圖書自常山始破梁國初平令人廣將金帛收市以得為務不責貴賤書至三萬巻名畫樂器各數百皆四方之精妙者萃于其府四年三月晏球拔定州時都校馬讓能降于曲陽門都巷戰而敗奔馬歸于府第縱火焚之府庫妻孥一夕俱燼惟擒塔納并其男四人弟一人獻于行在李繼陶者莊宗初略地河朔俘而得之收養于宫中故名曰得得天成初安重誨知其本末付段佪養之為兒佪知其不稱許其就便王都素蓄異志潛取以歸呼為莊宗太子及都叛遂僭其服裝時俾乘墉欲惑軍士人咸知其偽競詬辱之城陷晏球獲之拘送于闕下行至邢州遣使戮焉史臣曰王鎔據鎮冀以稱王治將數世處直分易定以為帥亦既重侯一則惑佞臣而覆其宗一則嬖孽子而失其國其故何哉蓋富貴斯久仁義不脩目眩于妖妍耳惑于絲竹故不能防姦于未兆察禍于未萌相繼敗亡又誰咎也舊五代史巻五十四
