body:
  text: 舊五代史目録下宋門下侍郎參知政事監修國史薛居正等撰巻七十五晉書一高祖本紀一巻七十六晉書二高祖本紀二巻七十七晉書三高祖本紀三巻七十八晉書四高祖本紀四巻七十九晉書五高祖本紀五巻八十晉書六高祖本紀六巻八十一晉書七少帝本紀一巻八十二晉書八少帝本紀二巻八十三晉書九少帝本紀三巻八十四晉書十少帝本紀四巻八十五晉書十一少帝本紀五巻八十六晉書十二后妃列傳一李皇后安太妃張皇后馬皇后巻八十七晉書十三宗室列傳二廣王敬威韓王惲楚王重信壽王重乂巻八十八晉書十四列傳三景延廣李彦韜張希崇王庭允史匡翰梁漢顒楊思權尹暉李從璋子重俊李從温張萬進巻八十九晉書十五列傳四桑維翰趙瑩劉昫馮玉殷鵬巻九十晉書十六列傳五趙在禮馬全節張筠弟籛華温琪安重阮楊彦詢李承約陸思鐸張朗李德珫田武李承福相里金巻九十一晉書十七列傳六房知温王建立康福安彦威李周張從訓李繼忠李頃周光輔符彦饒羅敬周鄭悰巻九十二晉書十八列傳七姚顗呂琦梁文矩史圭吳承範盧導鄭韜光王權韓惲李懌巻九十三晉書十九列傳八盧質李專美盧詹崔梲薛融曹國珍張仁愿趙熙李遐尹玉羽鄭雲叟巻九十四晉書二十列傳九萇從簡潘環方太何建張廷藴郭延魯郭金海劉處讓李瓊高漢筠孫彦韜王傳極李彦珣巻九十五晉書二十一列傳十皇甫遇王清梁漢璋白奉進盧順密周環沈贇吳巒翟璋程福贇郭璘巻九十六晉書二十二列傳十一孔崇弼陳保極王瑜張繼祚鄭阮胡饒劉遂清房暠孟承誨劉繼勲鄭受益程遜李郁馬重績陳元巻九十七晉書二十三列傳十二范延光張從賔張延播楊光逺子承勲盧文進李金全巻九十八晉書二十四列傳十三安重榮安從進張彦澤趙德鈞子延壽張礪蕭翰劉晞崔廷勲巻九十九漢書一高祖本紀上巻一百漢書二高祖本紀下巻一百一漢書三隱帝本紀上巻一百二漢書四隱帝本紀中巻一百三漢書五隱帝本紀下巻一百四漢書六后妃列傳一李皇后巻一百五漢書七宗室列傳二魏王承訓陳王承勲蔡王信湘陰公贇巻一百六漢書八列傳三王周劉審交武漢球張瓘李殷劉在明馬萬李彦從郭謹皇甫立白再榮張鵬巻一百七漢書九列傳四史宏肇楊邠王章李洪建弟業閻晉卿聶文進後贊郭允明劉銖巻一百八漢書十列傳五李崧蘇逢吉李璘龍敏劉鼎張允任延浩巻一百九漢書十一列傳六杜重威李守貞趙思綰巻一百十周書一太祖本紀一巻一百十一周書二太祖本紀二巻一百十二周書三太祖本紀三巻一百十三周書四太祖本紀四巻一百十四周書五世宗本紀一巻一百十五周書六世宗本紀二巻一百十六周書七世宗本紀三巻一百十七周書八世宗本紀四巻一百十八周書九世宗本紀五巻一百十九周書十世宗本紀六巻一百二十周書十一恭帝本紀巻一百二十一周書十二后妃列傳一聖穆柴皇后楊淑妃張貴妃董德妃貞惠劉皇后宣懿符皇后巻一百二十二周書十三宗室列傳二剡王侗杞王信越王宗誼曹王宗讓紀王熙謹蘄王熙誨巻一百二十三周書十四列傳三高行周安審琦安審信李從敏鄭仁誨張彦成安叔千宋彦筠巻一百二十四周書十五列傳四王殷何福進劉詞王進史彦超史懿王令温周密李懷忠白文珂白延遇唐景思巻一百二十五周書十六列傳五趙暉王守恩孔知濬王繼宏馮暉高允權折從阮王饒孫方諫巻一百二十六周書十七列傳六馮道巻一百二十七周書十八列傳七盧文紀馬允孫和凝蘇禹珪景範巻一百二十八周書十九列傳八王朴楊凝式薛仁謙蕭愿盧損王仁裕裴羽段希堯司徒詡邊蔚王敏巻一百二十九周書二十列傳九常思翟光鄴曹英李彦頵李暉李建崇王重裔孫漢英許遷趙鳳齊藏珍王環張彦超張頴劉仁瞻巻一百三十周書二十一列傳十王峻慕容彦超閻宏魯巻一百三十一周書二十二列傳十一劉皞張沆張可復于德辰王延申文炳扈載賈緯趙延乂沈遘李知損孫晟巻一百三十二世襲列傳一李茂貞從曮從昶茂勲高萬興允韜韓遜洙李仁福彞超彞興巻一百三十三世襲列傳二高季興從誨保朂馬殷希範等劉言錢鏐元瓘佐倧俶巻一百三十四僭偽列傳一楊行密渥渭溥李昪景王審知延鈞昶延羲巻一百三十五僭偽列傳二劉守光劉陟玢晟鋹劉崇巻一百三十六僭偽列傳三王建衍孟知祥昶巻一百三十七外國列傳一契丹巻一百三十八外國列傳二吐蕃廻鶻高麗渤海靺鞨黑水靺鞨新羅党項昆明部落于闐占城牂牁蠻卷一百三十九志一天文巻一百四十志二厯巻一百四十一志三五行巻一百四十二志四禮上巻一百四十三志五禮下巻一百四十四志六樂上巻一百四十五志七樂下巻一百四十六志八食貨巻一百四十七志九刑法巻一百四十八志十選舉巻一百四十九志十一職官巻一百五十志十二郡志臣等謹案舊五代史一百五十巻併目録二巻宋司空同中書門下平章事薛居正等撰攷晁公武讀書志云開寳中詔修梁唐晉漢周書盧多遜扈䝉張澹李昉劉兼李穆李九齡同修宰相薛居正等監修玉海引中興書目云開寳六年四月戊申詔修五代史七年閏十月甲子書成凡百五十巻目録二巻為紀六十一志十二傳七十七多據累朝實録及范質五代通録為稿本其後歐陽修别録五代史記七十五巻藏於家修歿後官為刋印學者始不専習薛史然二書猶並行於世至金章宗泰和七年詔學官止用歐陽史於是薛史遂微元明以來罕有援引其書者𫝊本亦漸就湮沒惟明内府有之見於文淵閣書目故永樂大典多載其文然割裂淆亂己非居正等篇第之舊恭逢聖朝右文稽古網羅放佚零縑斷簡皆次第編摩臣等謹就永樂大典各韻中所引薛史甄録條繫排纂先後檢其篇第尚得十之八九又攷宋人書之徵引薛史者每條采録以補其闕遂得依原書巻數勒成一編晦而復彰散而復聚殆實有神物呵䕶以待時而出居正等所修筆削體例亦特謹嚴然自宋時論二史者即互有所主司馬光作通鑑胡三省作通鑑注皆専據薛史而不取歐史沈括洪邁王應麟輩為一代博洽之士其所著述於薛歐二史亦多兼採而未嘗有所軒輊葢修所作皆刋削舊史之文意主斷制不肯以紀載叢碎自貶其體故其詞極工而於情事或不能詳備至居正等奉詔僎述本在宋初秉筆之臣尚多逮事五代見聞較近紀傳皆首尾完具可以徵信故異同所在較核事迹往往以此書為長雖其文體卑弱不免叙次煩冗之病而遺文瑣事反藉以獲傳實足為攷古者參稽之助又歐史止述司天職方二攷而諸志俱闕凡禮樂職官之制度選舉刑法之沿革上承唐典下開宋制者一概無徵亦不及薛史諸志為有禆於文獻葢二書繁簡各有體裁學識兼資難於偏廢昔修與宋祁所撰新唐書事増文省足以括劉晌舊書而晌書仰荷皇上表章今仍得列於正史況是書文雖不及歐陽而事迹較備又何可使隠沒不彰哉謹攷次舊文釐為梁書二十四巻唐書五十巻晉書二十四巻漢書十一巻周書二十二巻世襲列傳二巻僭偽列傳三巻外國列傳二巻志十二巻共一百五十巻别為目録二巻而蒐羅排纂之意則著於凡例具列如左乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
