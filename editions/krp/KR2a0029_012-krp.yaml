body:
  text: 舊五代史巻五攷證梁太祖紀五襄州都指揮使陳暉按歐陽史作行營招討使左衛上將軍陳暉復收襄州人户歸業按歐陽史云九月壬寅陳暉克襄州據是書則陳暉以壬寅奏㨗非以是日克城攷通鑑克城繫九月丁酉與是書今月五日正合歐陽史葢據奏㨗之日而書之耳以收復襄漢受宰臣以下稱賀按襄漢下原本衍收字今刪并令司門郎中員外郎司門原本作司關考五代㑹要有司門郎中今改正故得外戎内夏内夏原本訛作内憂今據文改正辛亥宴宰臣於内殿按原本脱宴字今増入鎮海軍節度使錢鏐擊髙灃於湖州大敗按九國志髙灃以三年十月叛四年二月奔呉是書繫於四月葢以奏聞之月為據劉知俊攻逼夏州按五代春秋八月晉人秦人侵夏與是書及通鑑異甲午至西京按五代春秋作九月己丑帝還西都歐陽史同通鑑作己丑上發陜甲午至洛陽國禮使杜廷隠廷隠原本作定隠下文仍作廷隠今據九國志改舊五代史巻五考證
