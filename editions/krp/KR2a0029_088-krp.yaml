body:
  text: 舊五代史巻四十三考證唐明宗紀九遣邠州軍節度使藥彦稠邠州軍歐陽史作靜難軍藥彦稠奏誅党項阿埋等十族與康福入白魚谷白魚谷歐陽史作牛兒谷戊午荆南奏東川董璋領兵至漢州西川孟知祥出兵逆戰璋大敗案通鑑孟知祥克東川在五月五代春秋歐陽史俱作六月蓋以薛史奏聞之日為據供奉官李瓌李瓌通鑑作李存瓌唐人避莊宗諱故去存字秋七月辛巳朔以天下兵馬元帥尚父呉越王錢鏐薨廢朝三日案五代春秋七月呉王錢鏐薨蓋祇以薛史廢朝之日為據也通鑑作三月庚戌與九國志異丙戌詔賜諸軍救接錢有差按救接錢疑有舛誤考冊府元龜亦作救接今仍其舊癸亥以湖南節度使馬希聲卒廢朝案通鑑馬希聲卒在七月辛夘五代春秋從是書作八月拉特哩衮舊作則刺惕隠今改爾格錫里舊作則骨舍利今改舊五代史巻四十三考證
