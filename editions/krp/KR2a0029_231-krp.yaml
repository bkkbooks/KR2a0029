body:
  text: 舊五代史巻一百十六宋門下侍郎參知政事監修國史薛居正等撰周書第七世宗紀三顯徳三年春正月乙未朔帝不受朝賀前司空蘇禹珪卒丁酉李穀奏破淮賊于上窑戊戌發兵夫十萬城京師羅城庚子詔取此月八日幸淮南殿中監馬從贇免所居官坐乾沒外孫女霍氏之貲產為人所訟故也辛丑以宣徽南院使向訓為權東京留守以端明殿學士王朴為副留守壬寅車駕發京師丁未李榖奏自壽州引軍退守正陽辛亥李重進奏大破淮賊于正陽斬首二萬餘級伏尸三十里臨陣斬賊大将劉彥貞生擒偏将咸師朗已下獲戎甲三十萬事馬五百匹先是李穀駐軍于壽春城下以攻其城既而淮南授軍大至乃與将佐謀曰賊軍舟棹将及正陽我師無水戰之備萬一橋梁不守則大軍隔絶矣不如全師退守正陽浮橋以俟鑾輅諸将皆以為然遂燔其糧草而退守正陽際無復嚴整公私之間頗多亡失淮北役夫亦有陷于賊境者帝聞之急詔侍衛都指揮使李重進率師赴之時淮賊乗李穀退軍之勢發戰棹数百艘沿淮而上且張斷橋之勢彥貞以大軍列陣而進李重進既至正陽聞淮軍在近率諸将渡橋而進與賊軍遇重進等合勢擊之一鼓而敗之馬令南唐書世宗親征行至圉鎮聞榖軍却意唐兵必追之遣李重進急趨正陽曰唐兵且至宜急擊之彥貞等聞榖退軍皆以為怯禆将咸師朗曰追之可大獲劉仁贍使人喻之曰君來赴援未交戰而敵人退不可測也愼勿追逐君為大将安危以之脫有不利大事去矣前軍張全約亦曰不可追彦貞曰軍容在我汝輩何知沮吾事者斬比至正陽而重進先至未及食而戰彥貞施利刄于拒馬又刻木為戰號捷馬牌以皮囊布鐡蒺藜于地周兵見而知其怯一鼓敗之彥貞死于陣殺獲之外䧏者三千餘人皆為我将趙晁所殺甲寅車駕至正陽以侍衛都指揮使李重進為淮南道行營都招討使命宰臣李穀判壽州行府事乙卯車駕渡淮丙辰至壽州城下營于州西北淝水之陽詔移正陽浮橋于下蔡庚申耀兵于城下春明退朝録云家有范魯公雜録記世宗親征忠正駐蹕城下中夜有白虹自淝水起亘数丈下貫城中数刻方沒壬戌今上奏破淮賊萬餘衆于渦口斬偽兵馬都監何延錫等獲戰船五十艘二月丙寅幸下蔡斬前濟州馬軍都指揮使康儼于路左坐橋道不謹也朗州節度使王進逵奏領兵入淮南界戊辰廬壽廵檢使司超奏破淮賊三千于盛唐獲都監偽吉州刺史高弼以獻詔釋之兵部尚書張昭奏凖詔撰集兵法分為十巻凡四十二門目之為制旨兵法上之優詔襃美仍以器幣賜之壬申今上奏破淮賊萬五千人于清流山乘勝攻下滁州擒偽命江州節度使充行營應援使皇甫暉常州團練使充應援都監姚鳯以獻王銍黙記李暻聞世宗親至淮上而滁州其控扼且援壽州命大将皇甫暉監軍姚鳯提兵十萬扼其地太祖以周師数千與暉遇于清流關隘路周師大敗暉整全師入憇滁州城下會翊日再出太祖兵聚闗下且虞暉兵再至問諸村人云有鎮州趙學䆒在邨中教學多智計邨民有争訟者多請以決曲直太祖往訪之學䆒曰我有竒計所謂因敗為勝轉禍為福今闗下有徑路人無行者雖牌軍亦不知之乃山之背也可以直抵城下方值西間水大漲之時彼必謂我既敗之後無敢躡其後者誠能由山背小路率兵浮西澗水至城下斬闗而入可以得志太祖大喜且命學究以指其路學究亦不辭而遣人前導即下令誓師夜從小路行三軍跨馬浮西澗以追城暉果不為備奪門以入暉始聞之率親兵擐甲與太祖巷戰三縱而三擒之遂下滁州甲戌江南國主李景遣泗州牙将王知朗齎書一函至滁州本州以聞書稱唐皇帝奉書于大周皇帝其畧云願陳兄事永奉鄰歡設或俯鑒逺圖下交小國悉班卒乗俾乂蒼黔慶雞犬之相聞奉瓊瑶以為好必當嵗陳山澤之利少助軍旅之湏䖍俟報章以答高命道塗朝坦禮幣夕行云書奏不答乙亥今上縶送所獲江南二将皇甫暉姚鳯至行在詔釋之壬午江南國主李景遣其臣偽翰林學士戸部侍郎鍾謨偽工部侍郎文理院學士李徳明等奉表來上叙願依大國稱臣納貢之意仍進金器千兩錦綺綾羅二千匹及御衣犀帯茶茗藥物等又進犒軍牛五百頭酒二千石是日賜謨等錦綺綾羅二百匹銀器一百兩襲衣金帯鞍馬等丙戌侍衛馬軍指揮韓令坤奏收下揚州東都事畧韓令坤傳率兵襲揚州将吏開門以迎之令坤整衆而入市不易肆人甚悦丁亥壽州城内左神衛軍使徐象等一十八人來奔庚寅朗州節度使王進逵上言領兵入鄂州界攻長山砦殺賊軍三千餘衆辛卯今上表偽命天長軍制置使耿謙以本軍䧏獲糧草二十餘萬侍衛馬軍都指揮使韓令坤上言泰州䧏癸已荆南上言朗州節度使王進逵為部将潘叔嗣所殺九國志王逵傳領衆逼宜春道出長沙耀兵金波亭有蜜蜂集繖中占者以為不利遂留長沙令行營副使毛立領兵南下以潘叔嗣張文表為前鋒叔嗣恕至澧陵擁衆而還逵聞兵叛乃乗輕舸奔歸武陵叔嗣追殺之于朗州州城外外遣人詣潭州請周行逢為帥行逢至朗州斬叔嗣于市三月丙申行光州刺史何超奏光州偽命都監張承翰以城歸順尋授承翰集州刺史庚子文武百寮再上表請聽樂詔允之行舒州刺史郭令圖奏收下舒州隆平集王審琦傳世宗征淮舒州堅壁不下以郭令圖為刺史命審琦司超将兵攻城一夕拔之令圖入復見逐于郡人審琦方進軍援黄州聞令圖被逐乃選騎銜枚襲城夜敗其衆而復納之江南國主李景表送先隔過朝廷兵士一百五十人至行在其軍即蜀軍也秦鳯之役為王師所擒配𨽻諸軍及渡淮輒復南逸帝怒其奔竄盡戮之丙午江南國主李景遣其臣偽司空孫晟偽禮部尚書王崇質等奉表來上仍進金一千兩銀十萬兩羅綺二千匹又進寳賞給将士茶絹金銀羅帛等庚戌兩浙奏遣大将率兵攻常州延州留後李彦頵奏蕃衆與部民為亂尋與兵司都監閻綰掩殺獲其酋帥高閙兒等十人磔于市彦頵本賈人也貪而好利蕃漢之民怨其侵刻故至于是辛亥賜江南李景書曰頃自有唐失御天歩方艱巢蔡䘮辭之餘朱李戰争之後中夏多故六紀于兹海縣瓜分英豪鼎峙自為聲敎各擅蒸黎連衡而交結四夷乘釁而慿陵上國華風不競否運所鍾凡百有心孰不與憤朕猥承先訓㳟荷永圖徳不迨于前王道不方于往古然而擅一百州之富庶握三十一萬之甲兵農戰交修士卒樂用思欲報累朝之宿怨刷萬姓之包羞是以踐位已來懐安不暇破幽并之巨冦收秦鳯之全封兵不告疲民有餘力一昨迴軍隴上問罪江干我寔有辭咎将誰執朕親提金鼓尋渡淮淝上順天心下符人欲前鋒所向彼衆無遺棄甲僵屍動盈川谷收城徇地已過滁陽豈有落其𤓰牙折其羽翼潰其心腹扼其吭喉而不亡者哉蚤者泗州主将逓送到書一函尋又使人鍾謨李徳明至齎所上表及貢奉衣服腰帶金銀器幣茶藥牛酒等今又使人孫晟等竝到行朝觀其䧏身聼命引咎告竆所謂君子見機不俟終日茍非達識孰能若斯但以奮武興戎所以討不服惇信明義所以懐逺人五帝三王盛徳大業恒用此道以正萬邦朕今躬統戎師龔行討伐告于郊廟社稷詢于将相公卿天誘其𠂻國無異論苟不能恢復内地申畫邉疆便議班旋眞同戲劇則何以光祖宗之烈厭士庶之心匪獨違天兼且咈衆但以淮南部内已定六州廬壽濠黄大軍悉集指朝剋日拉朽焚枯其餘数城非足届意必若盡淮甸之土地為大國之隄封猶是逺圖豈同迷復如此則江南吏卒悉遣放還江北軍民竝當留住免違物類之性俾安鄉土之情至于削去尊稱願輸臣禮非無故事實有前規蕭詧奉周不失附庸之道孫權事魏自同藩國之儀古也雖然今則不取但存常號何爽嵗寒儻堅事大之心終不迫人于險事資眞慤辭匪枝游俟都郡之悉來即大軍之立罷質于天地信若丹青我無彼欺爾無我詐言盡于此更不繁云茍曰未然請自茲絶竊以陽春在候庶務縈思願無廢于節宣更自期于愛重音塵非逺風壤猶殊翹想所深勞于夢寐又賜其将佐書曰朕自類禡出師麾旄問罪絶長淮而電擊指建業以鷹掦旦夕之間克捷相繼至若兵興之所自釁起之所來勝負之端倪戎甲之次第不勞盡諭必想具知近者金陵使人繼來行闕追悔前事委質大朝非無謝咎之辭亦有罷軍之請但以南邦之土地本中夏之封疆茍失克復之期大孤朝野之望已興是役固不徒遷必若自淮以南畫江為界盡歸中國猶是逺圖所云願為外臣乞比湖浙彼既服義朕豈忍人必當别議封崇待以殊禮凡爾将佐各盡乃心善為家國之謀勉擇恒久之利初李景遣鍾謨李徳明奉表至行闕使人面奏云本國主願割壽濠泗楚光海六州之地歸于大朝帝志在盡取江北諸郡不允其請使人見王師急攻壽陽李徳明奏曰願陛不寛臣数日之誅容臣自往江南取本國表盡獻江北之地帝許之乃令李徳明王崇質齎此書以賜李景夏四月甲子以徐州節度使武行徳為濠州城下行營都部署以前鄧州節度使候章為壽州城下水砦都部署已巳車駕發壽春循淮而東辛未掦州奏江南大破兩浙軍于常州初兩浙錢俶承詔遣部将率兵收常州為江南大將陸孟俊所敗将佐陷沒者甚衆李景亦以表聞乙亥駐蹕于濠州城下丁丑掦州韓令坤破江南賊軍于州之東境獲大将陸孟俟今上表大破江南軍于六合斬首五千級時李景乗常州之捷遣陸孟俊領兵迫泰州王師不守韓令坤欲棄掦州而迴帝怒急遣殿前都指揮使張永徳帥親兵往援之又命今上領歩騎二千人屯于六合俄而陸孟俊領其徒自海陵抵掦州令坤迎擊敗之生擒孟俊李景遣其弟齊王達率大衆由𤓰歩濟江距六合一舍而設栅居数日乃棄栅來迫官軍今上麾兵以擊之賊軍大敗餘衆赴江溺死者不可勝紀已卯韓令坤奏敗楚州賊將馬在貴萬餘衆于灣頭堰獲漣州刺史秦進崇丙戌以宣徽南院使向訓為權淮南節度使充㳂江招討使以侍衛馬軍都指揮使韓令坤充㳂江副招討使宋史向拱傳揚州初平南唐令境上出師謀收復韓令坤有棄城之意即驛召拱赴行在拜淮南節度使依前宣徽使兼沿江招討使以令坤為副時周師乆駐淮陽都将趙晁自延遇等驕恣横暴不相栗從惟務貪濫至有刧人婦女者及拱至戮其不法者数輩軍中肅然丁亥車駕發濠州幸渦口已丑以前湖南節度使馬希崇為左羽林統軍五月壬辰朔以渦口為鎮淮軍戊戌車駕還京發渦口馬令南唐書天子駐于渦口猶欲再幸掦州宰相范質以師老泣諫乃班師乙卯上至自淮南詔赦都下見禁罪人丁已陳州節度使王令温卒戊午以江南偽命東都副留守工部侍郎馮延魯為大府卿已未太子賔客于徳辰卒辛酉詔天下公私織造布帛及諸色匹段幅尺斤兩竝湏依向來制度不得輕弱假偽犯者擒捉送官六月甲子以鳯翔節度使王景為秦州節使使兼西面㳂邉都部署以宣徽南院使陳州節度向訓為淮南節度使依前南院宣徽使加檢校太尉以曹州節度使韓通為許節度使使加檢校太尉以亳州防禦使王全斌為隴州防禦使遥領利州昭武軍兩使留後丙寅許州王彦超鎮永興軍鄧州田景咸移鎮鄜州御史中丞楊昭儉知雜侍御史趙礪侍御史張糺竝停任坐鞫獄失實也丁卯以翰林學士户部侍郎陶榖為兵部侍郎充翰林學士承㫖以水部員外郎知制誥扈載度支員外郎王著竝本官充翰林學士以給事中高防為右散騎常侍以前都官郎中知制誥薛居正為左諫議大夫充昭文館學士判館事壬申曲赦淮南道諸州見禁罪人自今年六月十一日已前凡有違犯無問輕重竝不窮問先屬江南之時應有非理科徭無名配率一切停罷云戊寅以右衛上将軍扈彦珂為太子太師致仕庚辰以西京留守王晏為鳯翔節度使戊子升瞻國軍為濵州淮南道招討使李重進奏壽州賊軍攻南砦王師不利先是詔歩軍都指揮使李繼勲營于壽州之南攻賊壘是日賊軍出城來攻我軍破栅而入其攻城之具竝為賊所焚将士死者数百人李重進在東砦亦不能救時城堅未下師老于外加之暑毒糧運不繼李繼勲䘮失之復軍無固志諸将議欲退軍賴今上自六合領兵歸闕過其城下因為留旬日王師復振秋七月辛卯朔以武清軍節度使知潭州軍府事周行逢為朗州大都督充武平軍節度使加檢校太尉兼侍中丁酉以太子賔客盧價為禮部尚書致仕以給事中李明為大理卿庚子廬州營都部署劉重進奏破淮賊千餘人于州界丁未濠州行營都部署武行徳奏敗淮賊二千人于州界庚戌太子太保王仁裕卒辛亥皇后符氏薨淮南節度使向訓自揚州班師迴駐壽春時王師攻壽春經年未下江淮盜賊充斥舒蘄和泰等州復為呉人所據故棄掦州併力于壽春焉馬令南唐書向訓請棄掦州併力以攻壽春乃封府庫付主者遣淮南舊将按廵城中秋毫不犯而去淮人大悦皆負糗糧送送周師八月壬戌河陽白重贊移鎮涇州張澤移鎮河中甲子以前鄧州節度使候章復為鄧州節度使以侍衛歩軍都指揮使彰信軍節度使李繼勲為河陽節度使乙丑太僕卿劇可乆停任坐為舉官累也戊辰端明殿學士王朴撰成新厯上之命曰顯徳欽天厯上親為製序仍付司天監行用殿前都指揮使張永徳奏破淮賊于下蔡先是江南李景以王師猶在壽州遣其将林仁肇郭廷謂率水陸軍至下蔡欲奪浮梁以舟實薪芻乗風縱火永徳禦之有頃風勢倒指賊衆稍却因為官軍所敗已卯工部侍郎王敏停任坐薦子婿陳南金為河陽記室也九月丙午以端明殿學士左散騎常侍權知開封府事王朴為尚書户部侍郎充樞密副使以右羽林統軍焦繼勲為左屯衛上将軍以左衛上将軍楊承信為右羽林統軍以左監門上将軍宋延渥為右神武統軍冬十月辛酉葬宣懿皇后于懿陵癸亥以右神武統軍宋延渥為廬州行營副部署乙丑舒州刺史郭令圖責授虢州教練使坐棄郡逃歸也丙寅詔曰諸司職員皆係奏補當執役之際悉籍公勤及聽選之時尤資幹敏茍非慎擇漸致因循應諸司寺監今後收補役人竝湏人材俊利身言可採書札堪中自前行止委無訛濫勒本司闗送吏部引驗人材考校筆札其中選者連所試書跡及正身引過中書餘從前後格勅處分仍每年祗得一度奏補丁卯宣懿皇后神主入廟時有司請為后立别廟禮也已已詔彰河以北郡縣竝許鹽貨通商逐處有鹹鹵之地一任人户煎鍊壬申以武平軍節度使使知潭州軍府事宇文瓊為武清軍節度使知潭州軍府事癸酉淮南招討使李重進奏破淮賊于盛唐斬二千級太子賔客致仕薛仁謙卒丙子襄州節度使守太尉兼中書令陳王安審琦加守太師審琦鎮漢上十餘年至是來朝故以命寵之癸未右拾遺趙守㣲杖一百配沙門島守㣲本村民也形貌樸野粗學為文前年徒歩上書帝以急于取士授右拾遺聞者駭其事至是為妻父所訟彰其醜行故逐之東都事畧張昭傳云世宗好㧞竒取俊有自布衣上書下位言事者多不次進用昭諫曰昔唐初劉洎馬周起徒歩太宗擢用為相其後朱朴柳燦在下僚昭宗亦以大用然則太宗用之于前而國興詔宗用于後而國亡士之難知也如此臣願陛下存舊法而用人以劉馬為鑒朱柳為戒則善矣甲申宣授今上同州節度使兼殿前都指揮使宣授内外馬歩軍都軍頭袁彥為曹州節度使兼侍衛歩軍都指揮使戊子右神武統軍張彥超卒十一月己丑朔詔廢天下無名祠廟庚子日南至帝不受朝賀以宣懿皇后遷祔日近也乙已江西進奉使孫晟下獄死江南進奉使鍾謨責授耀州司馬戊申放華山隠者陳搏歸山帝素聞搏有道術徴之赴闕月餘放還舊隠庚戌殿前都指揮使張永徳奏敗濠州送糧軍二千人于下蔡奪米船十餘艘宰臣李穀以風痺請告十旬三上表求解所任不允十二月己未朔以給事中張鑄為光禄卿鑄訴以官名與祖諱同尋改秘書監判光禄寺事辛酉以許州節度使韓通兼侍衛馬歩軍都虞候壬戌以右領軍大將軍權判三司張美領三司使壬申以滑州節度使兼殿前都指揮使駙馬都尉張永徳為殿前都㸃檢發陳蔡宋亳潁曹單等州丁夫城下蔡辛已故襄邑令劉居方贈右補闕男士衡賜學䆒出身奨亷吏也癸亥詔兵部尚書張昭纂修太祖實録及梁均王唐清泰帝兩朝實録五代會要云同修撰官委張昭定名奏請至四年正月張昭奏請國子祭酒尹拙太子詹事劉叟同編編修又詔曰史館所少書籍宜令本館諸處求訪補塡如有收得書籍之家竝許進書人據部帙多少等第各與恩澤如是巻帙少者量給資帛如館内已有之書不在進納之限仍委中書門下于朝官内選差三十人據見在書籍各求真本校勘署校官姓名逐月具功課申報中書門下戊子淮南道招討使李重進奏破淮賊二千人于塌山北舊五代史巻一百十六
