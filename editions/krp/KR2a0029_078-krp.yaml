body:
  text: 舊五代史巻三十八攷證唐明宗紀四遣供奉官賈俊使淮南賈俊九國志作賈進攷冊府元龜所引薛史亦作俊今仍其舊房知温奏前月二十一日盧臺戍軍亂害副招討寧國軍節度使烏震尋與安審通斬殺亂兵訖案五代春秋盧臺戍軍亂房知温討平之據是書房知温𫝊及通鑑知温初誘戍軍為亂繼恐事不濟乃與安審通謀討亂兵也五代春秋所書殊非事實五品官各薦簿尉兩人案五代㑹要作五品六品官各許薦簿尉兩人所舉姓名或有不公案原本脱公字今據五代㑹要増入夔州刺史西方鄴奏殺敗荆南賊軍收峽内三州案通鑑六月西方鄴敗荆南水軍於峽中復取夔忠萬三州是書繫七月甲子盖以奏聞之日為據歐陽史與是書同詔陵州合州長流百姓豆盧革韋説等宜令逐處刺史監賜自盡案五代春秋作元年七月殺豆盧革韋説攷歐陽史元年七月貶豆盧革為辰州刺史韋説溆州刺史甲申流革于陵州説于合州二年七月殺豆盧革韋説與是書同五代春秋統繫于元年誤也今月十二日供奉官王仁鎬至稱制殺太子少保致仕任圜案安重誨害任圜五代春秋及通鑑俱不書日歐陽史作乙未殺太子少保致仕任圜據是書作十二日是年十月為已夘朔十二日乃庚寅也與歐陽史異日美稜瑪古舊作梅老沒骨今改摩琳舊作梅老今改舊五代史巻三十八攷證
