body:
  text: 舊五代史巻六十二宋門下侍郎參知政事監修國史薛居正等撰唐書第三十八列𫝊十四孟方立歐陽史云邢州人通鑑云汧州人中和二年為澤州天井闗戍将時黄巢犯闗輔州郡易帥有同博奕先是沈詢髙湜相繼為昭義節度怠于軍政及有歸秦劉廣之亂方立見潞帥交代之際乘其無備率戍兵徑入潞州自稱留後以邢為府以審誨知潞州案此二句上下有脱文今無可復考六月李存孝下洺磁兩郡方立遣馬溉袁奉韜盡率其衆逆戰于琉璃陂存孝擊之盡殪生獲馬溉奉韜初方立性苛急恩不逮下攻圍累旬夜自巡城慰諭守陴者皆倨方立知其不可用乃飲酖而卒其従弟洺州刺史遷素得士心衆乃推為立後求援于汴時梁祖方攻時溥援兵不出通鑑云全忠遣大将王䖍裕将精甲數百間道入邢州共守大順元年遷執王䖍裕等乞降武皇令安金俊代之案孟方立𫝊原本闕佚考新唐書列𫝊云孟方立邢州人始為澤州天井戍将稍遷遊奕使中和元年昭義節度使髙鄩擊黄巢戰石橋不勝保華州為禆将成鄰所殺還據潞州衆怒方立率兵攻隣斬之自稱留後擅裂邢磁洺為鎮治邢為府號昭義軍潞人請監軍使呉全朂知兵馬留後時王鐸領諸道行營都統以潞未定墨制假方立檢校左散騎常侍兼御史大夫知邢州事方立不受囚全朂以書請鐸願得儒臣守潞鐸使參謀中書舍人鄭昌圖知昭義留後欲遂為帥僖宗自用舊宰相王徽領節度時天子在西河闗雲擾方立擅地而李克用窺潞州徽度朝廷未能制乃固讓昌圖昌圖治不三月輒去方立更表李殷鋭為刺史謂潞險而人悍數賊大帥為亂欲銷懦之乃徙治龍岡州豪傑重遷有懟言會克用為河東節度使昭義監軍祁審誨乞師求復昭義軍克用遣賀公雅李筠安金俊三部将擊潞州為方立所破又使李克修攻取之殺殷鋭遂并潞州表克修為節度留後初昭義有潞邢洺磁四州至是方立自以山東三州為昭義朝廷亦命克修以潞州舊軍畀之昭義有兩節自此始克修字崇逺克用従父弟精馳射常従征伐自左營軍使擢留後進檢校司空方立倚朱全忠為助故克用擊邢洺磁無虚嵗地為鬭塲人不能稼光啟二年克修擊邢州取故鎮進攻武安方立将吕臻馬爽戰焦岡為克修所破斬首萬級執臻等拔武安臨洺邯鄲沙河克用以安金俊為邢州刺史招撫之方立匄兵于王鎔鎔以兵三萬赴之克修還後二年方立督部将奚忠信兵三萬攻遼州以金啖赫連鐸與連和㑹契丹攻鐸師失期忠信三分其兵鼔而行克用伏兵于險忠信前軍沒既戰大敗執忠信餘衆走脱歸者纔十二龍紀元年克用使李罕之李存孝擊邢攻磁洺方立戰琉璃陂大敗禽其二将被斧鑚徇邢壘呼曰孟公速降有能斬其首者假三州節度使方立力屈又屬州殘墮人心恐性剛急待下少恩夜自行陴兵皆倨告勞自顧不可復振乃還飲酖自殺従弟遷素得士心衆推為節度留後請援于全忠全忠方攻時漙不即至命王䖍裕以精甲數百赴之假道羅𢎞信不許乃趋間入邢州大順元年存孝復攻邢遷挈邢洺磁三州降執王䖍裕三百人獻之遂遷太原表安金俊為邢洛磁團練使以遷為汾州刺史歐陽史云天復元年梁遣氏叔琮攻晉出天井闗遷開門降為梁兵鄉道以攻太原不克叔琮軍還過潞以遷歸于梁梁太祖惡其反覆殺之張文禮燕人也初為劉仁恭裨将性兇險多姦謀辭氣庸下與人交言癖于不遜自少及長専蓄異謀及従劉守文之滄州委将偏師守文省父燕薊據城為亂及敗奔于王鎔察鎔不親政事遂曲事當權者以求衒達每對鎔自言有将才孫呉韓白莫己若也鎔賞其言給遺甚厚因録為義男賜姓名徳明由是每令将兵自柏鄉戰勝之後常従莊宗行營素不知書亦無方畧惟于懦兵之中萋菲上将言甲不知進退乙不識軍機以此軍人推為良将初梁将楊師厚在魏州文禮領趙兵三萬夜掠經宗因侵貝郡師厚先率歩騎數千人設伏于唐店文禮大掠而旋士皆巻甲束兵夜凱歌行至唐店師厚伏兵四面圍合殺戮殆盡文禮單騎僅免自爾猶對諸将大言或讓之曰唐店之功不須多伐文禮大慙在鎮州既久見其政荒人僻嘗蓄異圖酒酣之後對左右每泄惡言聞者莫不寒心惟王鎔畧無猜間漸為腹心乃以符習代其行營以文禮為防城使自此専伺間隙及鎔殺李𢎞規委政于其子昭祚性偪戾未識人間情偽素養名持重坐作貴人既事權在于朝夕欲代其父向來附勢之徒無不族滅初李𢎞規李藹持權用事樹立親舊分董要職故奸宄之心不能揺動文禮頗深畏憚及𢎞規見殺其部下五百人懼罪将欲奔竄聚泣偶語未有所之文禮因其離心密以姦辭激之曰令公命我盡坑爾曹我念爾十餘年荷戈隨我為家為國我若不即殺汝則得罪于令公我若不言又負爾輩衆軍皆泣是夜作亂殺王鎔父子舉族灰滅惟留王昭祚妻朱氏通梁人尋間道告于梁曰王氏喪于亂軍普寧公主無恙文禮狗賊帥張友順所請因為留後于潭城視事以事上聞兼要節旄尋亦奉牋勸進莊宗姑示含容乃可其請文禮比厮役小人驟居人上行步動息皆不自安出則千餘人露刃相隨日殺不辜道路以目常慮我師問罪姦心百端南通朱氏北結契丹往往擒獲其使莊宗遣人送還文禮由是愈恐是嵗八月莊宗遣閻寶史建瑭及趙将符習等率王鎔本軍進討師興文禮病疽腹及聞史建瑭攻下趙州驚悸而卒其子處瑾處球秘不發喪軍府内外皆不知之每日于寢宫問安處瑾與其腹心韓正時參決大事同謀姦惡初文禮疽未發時舉家咸見鬼物昏瞑之後或歌或哭又野河色變如血游魚多死浮于水上識者知其必敗十九年三月閻寶為處瑾所敗莊宗以李嗣昭代之四月嗣昭為流矢所中尋卒于師命李存進繼之存進亦以戰殁乃以符存審為北面招討使攻鎮州是時處瑾危蹙日甚昭義軍節度判官任圜馳至城下諭以禍福處瑾登陴以誠告乃遣牙将張彭送欵于行臺俄而符存審師至城下是夜趙将李再豐之子沖投縋以接王師故諸軍登城遲明畢入獲處瑾處球處琪並其母及同惡人等皆折足送行臺鎮人請醢而食之又發文禮之尸磔之于市董璋本梁之驍将也㓜與髙季興孔循俱事豪士李七郎為童僕李初名讓常以厚賄奉梁祖梁祖寵之因畜為假子賜姓朱名友讓璋既壯得𨽻于梁祖帳下後以軍功遷為列校梁龍徳末潞州李繼韜送款于梁時潞将裴約方領兵戍澤州不徇繼韜之命據城以自固梁末帝遣璋攻陷澤州遂授澤州刺史是嵗莊宗入汴璋來朝莊宗素聞其名優以待之尋令却赴舊任嵗餘代歸時郭崇韜當國待璋尤厚同光三年夏命為邠州留後三年秋正授旄鉞九月大舉伐蜀以璋為行營右廂馬步都虞候時郭崇韜為招討使凡有軍機皆召璋參決是冬蜀平以璋為劍南東川節度副大使知節度事天成初加檢校太傅二年加同平章事是時安重誨當國採人邪謀言孟知祥必不為國家使惟董璋性忠義可恃寵任令圖知祥又璋之子光業為宮苑使在朝結託勢援爭言璋之善知祥之惡恩寵既優故璋益恣其暴戾初奉使東川者皆言璋不恭于朝廷四年夏時明宗将議郊天遣客省使李仁矩齎詔示諭兩川又遣安重誨馳書于璋以徴貢奉約以五十萬為數既而璋訴以地狹民貧許貢十萬而已翼日璋于衙署設宴以召仁矩日既中而不至璋使人偵之仁矩方擁倡婦與賓友酣飲于驛亭璋大怒遽領數百人執持戈㦸驟入驛中令洞開其門仁矩惶駭走入閣中良久引出璋坐立仁矩于階下㦸手罵曰當我作魏博都監爾為通引小将其時去就已有等威今日我為藩侯爾銜君命宿張筵席比為史臣何敢至午不來自共風塵躭酗豈于王事如此不恭秖如西川解斬客省使李嚴謂我不能斬公耶因目肘腋欲令執拽仁矩仁矩涕涙拜告僅而獲免璋乃馳騎入衙竟徹饌而不召洎仁矩復命益言璋不法未㡬重誨奏以仁矩為閬州團練使尋升為節鎮長興元年夏明宗以郊禋禮畢加璋檢校太尉時兩川刺史嘗以兵為牙軍小郡不下五百人璋已疑間及聞除仁矩鎮閬州璋由是謀反乃決仍先與其子光業書曰朝廷割吾支郡為節制屯兵三千是殺我必矣爾見樞要道吾言如朝廷更發一騎入斜谷則吾必反與汝訣矣光業以書呈樞密承㫖李䖍徽㑹朝廷再發中使荀咸乂将兵赴閬州光業謂䖍徽曰咸乂未至吾父必反吾身不足惜慮勞朝廷徴發請停咸乂之行吾父必保常日重誨不従咸乂未至璋已擅追綿州刺史武䖍裕囚于衙署䖍裕安重誨之心腹也故先囚之五月璋𫝊檄于利閬遂等州責以間諜朝廷尋率其兵陷閬州擒節度使李仁矩軍校姚洪等害之先是璋欲謀叛先遣使持厚幣于孟知祥求為婚家且言為朝廷猜忌将有替移去則喪家住亦致討地狹兵少獨力不任願以小兒結婚愛女時知祥亦貳于朝廷因許以為援既而知祥出師以圍遂州故璋攻閬州得恣其毒焉其年秋詔削奪璋在身官爵命天雄軍節度使石敬瑭為東川行營詔討使率師以討之璋之子宫苑使光業并其族並斬于洛陽及石敬瑭率師進討以糧運不接班師明宗方務懐柔乃放西川進奏官蘓愿東川軍将劉澄各歸本道别無詔㫖秖云兩務求安時孟知祥其骨月在京師者俱無恙焉因遣使報璋欲連表稱謝璋怒曰西川存得弟姪遂欲再通朝廷璋之兒孫已入黄泉何謝之有自是璋疑知祥背已始搆隙矣三年四月璋率所部兵萬餘人以襲知祥九國志趙季良𫝊季良嘗與知祥従容語曰璋性狼戻若堅守一城攻之難克及聞璋起兵知祥憂形于色季良曰璋不守巢六此天以授公也既而璋果敗知祥與諸将率師拒之戰于漢川之彌年鎮璋軍大敗得數十騎復奔于東川九國志趙廷隠𫝊董璋襲廣漢将攻成其都時東川廪藏充實部下多敢死之士來也衆皆畏之知祥親督諸将與璋戰雞縦橋前頗為所挫廷隠偽遯璋逐之知祥與張公鐸繼進璋軍亂不成列廷隠整陣與知祥合擊之璋軍大敗先是前陵州刺史王暉為璋所邀寓于東川至是因璋之敗率衆以害之𫝊其首于西川舊五代史巻六十二
