  text: 舊五代史巻一百二十一攷證周后妃列傳一太祖聖穆皇后柴氏傳邢州龍岡人案龍川别志作魏成安人淑妃楊氏傳妃兄廷璋案東都事畧廷璋係淑妃之弟續通鑑長編亦云廷璋有姊為周太祖妃俱與是書異舊五代史巻一百二十一攷證
