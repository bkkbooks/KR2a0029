body:
  text: 舊五代史卷一百七宋門下侍郎參知政事監修國史薛居正等撰漢書第九列傳四史𢎞肇字化元鄭州榮澤人也父潘本田家𢎞肇少游俠無行拳勇健歩日行二百里走及奔馬梁末每七戸出一兵𢎞肇在籍中後隸本州開道都選入禁軍嘗在晉祖麾下遂畱為親從及踐阼用為控鶴小校髙祖鎮太原奏請從行升為牙校後置武節左右指揮以𢎞肇為都將遙領雷州刺史髙祖建號之初代州王暉叛以城歸契丹𢎞肇征之一皷而㧞尋授許州節度使充侍衛歩軍都指揮使㑹王守恩以上黨求附契丹主命大将耿崇美率衆登太行欲取上黨髙祖命𢎞肇以軍應援軍至潞州契丹退去翟令竒以澤州迎降㑹河陽武行徳遣人迎𢎞肇遂率衆南下與行徳合故髙祖由蒲陜赴洛如歸𢎞肇前鋒之功也𢎞肇嚴毅寡言部轄軍衆有過無舍兵士所至秋毫不犯部下有指揮使嘗因指使少不從命𢎞肇立檛殺之将吏股慄以至平定兩京無敢干忤從駕征鄴迴加同平章事充侍衛親軍都指揮使兼鎮宋州髙祖大漸與樞宻使楊邠周太祖蘇逄吉等同受顧命隐帝嗣位加檢校太師兼侍中居無何河中永興鳯翔連横謀叛關輔大擾朝廷日有徵𤼵羣情憂惴亦有不逞之徒妄搆虚語流布京師𢎞肇都轄禁軍警衛都邑專行刑殺畧無顧避無賴之輩望風匿迹路有遺棄人不敢取然而不問罪之輕重理之所在但云有犯便處極刑枉濫之家莫敢上訴廵司軍吏因綠為姦嫁禍脅人不可勝紀宋史邊歸讜傳史𢎞肇怙權專殺閭里告訐成風歸讜言曰邇來有匿名書及言風聞事搆害良善有傷風化遂使貪吏得以報復私怨讒夫得以肆其虚誕請明行條制禁遏誣罔凡顯有披論且陳姓名其匿名書及風聞事者並望止絶論者韙之時太白晝見民有仰觀者為坊正所拘立斷其腰領又有醉民抵忤一軍士則誣以訛言棄市其他斷舌決口斮筋折足者僅無虚日故相李崧為部曲誣告族戮于市取其幼女為婢自是仕宦之家畜僕隸者皆以姑息為意而舊勲故将失勢之後為厮養輩之所脅制者往往有之軍司孔目吏解暉性狡而酷凡有推劾隨意鍛鍊人有抵軍禁者被其苦楚無不自誣以求死所都人遇之莫敢仰視有燕人何福殷者以商販為業嘗以十四萬市得玉枕遣家僮及商人李進賣于淮南易茗而廻家僮無行隐福殷貨財數十萬福殷責其償不伏遂杖之未幾家僮詣𢎞肇上變言契丹主之入汴也趙延夀遣福殷齎玉枕隂遺淮南以致誠意𢎞肇郎日遣捕福殷等繫之解暉希㫖搒掠備至福殷自誣連罪者數輩竝棄市妻女為𢎞肇帳下分取之其家財籍没𢎞肇不喜賓客嘗言文人難耐輕我輩謂我輩為卒可恨可恨𢎞肇所領睢陽其属府公利委親吏楊乙就府檢校貪戾兇横負勢生事吏民畏之副戎已下望風展敬聚斂刻剝無所不至月率萬緡以輸𢎞肇一境之内疾之如讎東都事畧薛居正傳漢史𢎞肇領侍衛親軍威震人主殘忍自恣人莫敢忤其意其部下民告民犯鹽禁法當死居正疑其不實召詰之乃其吏以私憾而誣之也逮捕吏鞫之具伏以吏抵法𢎞肇雖怒甚堯亦無以屈也周太祖平河中班師推功于衆以𢎞肇有翊衛鎮重之功言之于隐帝卽授兼中書令隐帝自關西賊平之後昵近小人太后親族頗行干託𢎞肇與楊邠甚不平之太后有故人子求補軍職𢎞肇怒而斬之帝始聽樂賜教坊使玉帯諸伶官錦袍往謝𢎞肇𢎞肇讓之曰健兒為國戍邊忍寒冐暑未能偏有霑賜爾輩何功敢當此賜盡取袍帯還官其兇戾如此周太祖有鎮鄴之命𢎞肇欲兼領機樞之任蘇逄吉異其議𢎞肇忿之翌日因竇貞固飲㑹貴臣悉集𢎞肇厲色舉爵属周太祖曰昨晨廷論一何同異今日與弟飲此楊邠蘇逄吉亦舉大爵曰此國家之事也何足介意俱飲釂𢎞肇又厲聲言曰安朝廷定禍亂直須長槍大劍至如毛錐子焉足用哉三司使王章曰雖有長槍大劍若無毛錐子瞻軍財賦自何而集𢎞肇默然少頃而罷未幾三司使王章于其第張酒樂時𢎞肇與宰相樞宻使及内客省使閻晉卿等俱㑹酒酣為手勢令𢎞肇不熟其事而閻晉卿坐次𢎞肇屢教之蘇逄吉戯𢎞肇曰近坐有姓閻人何憂罰爵𢎞肇妻閻氏本酒妓也𢎞肇謂逄吉譏之大怒以醜語詬逄吉逄吉不校𢎞肇欲毆逄吉逄吉䇿馬而去𢎞肇遽起索劍意欲追逄吉楊邠曰蘇公是宰相公若害之致天子何地公細思之邠泣下𢎞肇索馬急馳而去邠慮有非常連鑣而進送至第而還自是将相不協如水火矣隐帝遣王峻将酒樂于公子亭以和之竟不能解其後李業郭允明後贊聶文進居中用事不悦執政又見隐帝年漸長厭為大臣所制嘗有忿言業等乃乘間譖𢎞肇等隐帝稍以為信業等乃言𢎞肇等專權震主終必為亂隐帝益恐嘗一夕聞作坊鍜甲之聲疑外有兵仗卒至逹旦不寐自是與業等宻謀禁中欲誅𢎞肇等議定入白太后太后曰此事豈可輕發耶更問宰臣等李業在側曰先皇帝言朝廷大事莫共措大商量太后又言之隐帝怒曰閨門之内焉知國家之事拂衣而出内客省使閻晉卿潛知其事乃詣𢎞肇私第将欲告之𢎞肇以他事拒之不見乾祐三年冬十一月十三日𢎞肇入朝與樞宻使楊邠三司使王章同坐于廣政殿東廡下俄有甲士數十人自内而出害𢎞肇等于閤夷其族先是𢎞肇第數有異嘗一日于階砌隟中有煙氣蓬勃而出禍前二日昧爽有星落于𢎞肇前三數歩如迸火而散俄而被誅周太祖踐阼追封鄭王以禮葬官為立碑𢎞肇子徳珫乾祐中授檢校司空領忠州刺史粗讀書親儒者常不悦父之所為貢院嘗錄一學科于省門呌譟申中書門下宰相蘇逄吉令送侍衛司請痛笞刺面徳珫聞之白父曰書生無禮有府縣御史臺非軍務治也公卿如此蓋欲彰大人之過𢎞肇深以為然卽破械放之後之識者尤嘉徳珫之為人焉𢎞肇弟福比在榮陽别墅聞禍匿于民間周太祖卽位累遷閉廏使仕皇朝歴諸衛将軍宋史李崇矩傳史𢎞肇為先鋒都校聞崇矩名召署親吏乾祐初𢎞肇總禁兵兼京城廵檢多殘殺軍民左右稍稍引去惟崇矩事之益謹及𢎞肇誅獨得免周祖與𢎞肇素原善卽位訪求𢎞肇親舊得崇矩謂之曰我與史公受漢厚恩戮力同心共奨王室為姦邪所搆史公卒罹大禍我亦僅免汝史家故吏也為我求其近属我将恤之崇矩上其母弟福崇矩素主其家盡籍財産以付褔周祖嘉之楊邠魏州冦氏人也少以吏給事使府後唐租庸使孔謙卽其妻之世父也謙領度支補勾押官歴孟華鄆三州糧料使髙祖為鄴都畱守用為左都押衙髙後鎮太原益加親委漢國建遷檢校太保權樞宻使汴洛平正拜樞宻使檢校太傅及髙大漸與蘇逄吉史𢎞肇等同受顧命輔立嗣君隐帝卽位宰臣李濤上章請出邠與周太祖為藩鎮邠等泣訴于太后由是罷濤而相邠加中書侍郎兼吏部尚書同平章事仍兼樞宻使時中書除吏太多訛謬者衆及邠居相位帝一以委之凡南衙奏事中書除命先委邠斟酌如不出邠意至于一簿一掾亦不聽從邠雖長于吏事不識大體常言為國家者但得帑藏豐盈甲兵强盛至于文章禮樂並是虚事何足介意也平河中並加右僕射邠旣專國政觸事苛細條理煩碎前資官不得于外方居止自京師至諸州府行人往來並須給公憑所由司求請公憑者朝夕填咽旬日之間民情大擾行路擁塞邠乃止其事時史𢎞肇恣行慘酷殺戮日衆都人士庶相目于路邠但稱𢎞肇之善太后弟武徳使李業求為宣徽使隐帝與太后重違之私訪于邠邠以朝廷内使遷拜有序不可超居遂止隐帝所愛耿夫人欲立為后邠亦以為太速夫人卒隐帝欲以后禮葬邠又止之隐帝意不悦左右有承間進甘言者隐帝以怒之以下凝有闕文邠繕甲兵實帑廩俾國用不闕邊鄙粗寕亦其功也宣和書縉云邠末年畱意縉紳延客門下知經史有用乃課吏傅冩王章大名南樂人也少為吏給事使府同光初隸樞宻院後歸本郡累職至都孔目官後唐清泰末屯駐捧聖都虞候張令昭作亂逐節度使劉延皓自稱畱後章以本職為令昭役使末帝遣范延光討平之搜索叛黨甚急章之妻卽白文珂之女也文珂與副招討李敬周善以章為托及攻下逆城敬周匿之載于橐駞禇中竄至洛下匿于敬周之私第及末帝敗章為省職歴河陽糧料使髙祖典侍衛親軍詔為都孔目官從至河東專委錢榖國初授三司使檢校太傅從征杜重威于鄴下明年髙祖崩隐帝卽位加檢校太尉同平章事居無何蒲雍岐三鎮畔是時契丹去汴之後國家新造物力未充章與周太祖史𢎞肇楊邠等盡心王室知無不為罷不急之務惜無用之費收聚財賦專事西征軍旅所資供饋無乏及三叛平賜與之外國有餘積然以專于權利剝下過當斂怨歸止物論非之舊制秋夏苖租民税一斛别輸二升謂之雀鼠耗乾祐中輸一斛者别令輸二斗目之為省耗百姓苦之又官庫出納緡錢皆以八十為陌至是民輸者如舊官給者以七十七為陌遂為常式歸田録用錢之法自五代以來以七十七為百謂之省陌今市井交易又尅其五謂之依除民有訴田者雖無十數户章必命全州覆視幸其廣有苗額以増邦賦曽末數年民力大困章與楊邠不喜儒士郡官所請月俸皆取不堪資軍者給之謂之閒雜物命所司髙佑其價估定更添謂之擡估章亦不滿其意隨事更令更添估章急于財賦峻于刑法民有犯鹽礬酒麯之令雖絲毫滴瀝盡處極刑吏緣為姦民不堪命章與楊邠同郡尤相親愛其奨用進抜者莫非鄉舊常輕視文臣曰此等若與一把算子未知顚倒何益于事後因私第開宴席召賔客史𢎞肇蘇逄吉乘醉諠詬而罷章自是忽忽不樂潛求外任邠與𢎞肇深沮其意而私第數有怪異章愈懐憂恐乾祐三年冬與史𢎞肇楊邠等遇害夷其族妻白氏禍前數月而卒無子惟一女適戸部員外郎張貽肅羸疾踰年扶病就戮李洪建太后母弟也事髙祖為牙将髙祖卽位累歴軍校遙領防禦使史𢎞肇等被誅以洪建為權侍衛馬歩軍都虞候及鄴兵南渡命洪建誅王殷之族洪建不卽行之但遣人監守其家仍令給饌竟免屠戮周太祖入京城洪建被執王殷感洪建之恩累祈周太祖乞免其死不從遂殺之洪建弟業業昆仲凡六人業處其季故太后尤憐之髙祖置之麾下及卽位累遷武徳使出入禁中業恃太后之親稍至驕縱隐帝嗣位尤深倚愛兼掌内帑四方進貢二宫費委之出納業喜趨權利無所顧避執政大臣不敢禁詰㑹宣徽使闕業意欲之太后亦令人微露風㫖于執政時楊邠史𢎞肇等難之業由是積怨蕭牆之變自此而作楊史旣誅業權領侍衛歩軍都指揮使北郊兵敗業自取金寳懐之䇿馬西奔行至陜郊其節度使洪信卽其長兄也不敢匿于家業将奔太原至絳州境為盗所殺盡奪而去閻晉卿者忻州人也家世富豪少仕并門歴職至客将髙祖在鎮頗見信用乾祐中歴閤門使判四方館未幾關西亂郭從義討趙思綰于京兆晉卿偏師以攻賊壘宋史李韜傳周祖征三叛韜從白文珂攻河中兵傅其城文珂夜詣周祖議犒軍畱韜城下時營柵未備李守貞乘虚來襲營中忽見火𤼵知賊驟至惶怖失懼客省使閻晉卿率左右數十人遇韜于月城側謂韜曰事急矣城中人悉被黄紙甲為火光所照色俱白此殊易辦奈軍士無闘志何韜憤怒曰豈有食君禄而不為國致死耶即援稍而進軍中死士十餘輩隨韜犯賊鋒蒲有猛将躍馬持戈擬韜韜刺之洞胸而墜又連殺數十人蒲軍遂潰因擊大破之賊平為内客省使丁父憂起復前職時宣徽使闕晉卿以職次事望合當其任旣而乆稽拜命晉卿頗怨執政㑹李業等謀殺楊史詔晉卿謀退晉卿退詣𢎞肇将告其事𢎞肇不見晉卿憂事不果夜懸髙祖御容于中堂泣禱于前遲明戎服入朝内難旣作以晉卿權侍衛馬軍都指揮使北郊兵敗晉卿乃自殺于家聶文進并州人少給事于髙祖帳下髙祖鎮太原甚見委用職至兵馬押司官髙祖入汴授樞宻院承㫖歴領軍屯衛大将軍遷右領大将軍仍領舊職遇周太祖出征稍至驕横乆未遷改深所怨望與李業輩搆成變亂史𢎞肇等遇害之前夕文進與同黨預作宣詔制置朝廷之事凡關文字並出文進之手明日難作文進㸃閲兵籍徴𤼵軍衆指揮取舍以為已任内外咨禀前後填咽太祖在鄴被搆初謂文進不預其事驗其事迹方知文進亂階之首也大詬詈之太祖過封丘帝此于北郊文進告太后曰臣在此請宫中勿憂兵散之後文進召同黨痛飲歌笑自若遲明帝遇禍文進奔竄為軍士所追梟其首後贊為飛龍使贊母本倡家也與父同郡往來其家生贊從職四方父未嘗離郡贊旣長疑其所生及為内職不欲父之來寓書以致其意父自郡至京師直抵其第贊不得已而奉之乾祐末宰相楊邠侍衛親軍使史𢎞肇執權贊以乆次未遷頗懐怨望乃與樞宻承㫖聶文進等搆變及難作贊與同黨更侍帝側剖判戎事且防間言北郊兵敗贊竄歸兖州慕容彦超執之以獻有司贊伏罪周太祖命誅之郭允明者小名竇十河東人也幼隸河東制置使范徽柔被誅允明遂為髙祖厮養服勤旣乆頗得髙祖之歡心髙祖鎭太原稍歴牙職及卽位累遷至翰林茶酒使兼鞍轡庫使隐帝嗣位尤見親狎每恃寵驕縱畧無禮敬與相州節度使郭謹以同宗之故頗交結謹在鎮允明常齎御酒以遺之不以僭上犯禁為意其他輕率悉皆𩔖此執政大臣頗姑息之嘗奉使荆南車服導從有同節度使将州縣郵驛奔馳畏懾節度使髙保融承迎不暇允明潛使人歩度城壁之髙庳池隍之廣隘以動荆人冀得重賄乾祐末兼飛龍使未幾與李業輩搆變楊邠等諸子允明親刃之于朝堂西廡下王章女婿戸部員外郎張貽肅血流逆注聞者哀之及北郊之敗允明迫帝就民舍手行弑逆尋亦自殺劉銖陜州人也少事梁邵王朱友誨為牙将晉天福中髙祖為侍衛親軍都指揮使與銖有舊乃表為内職高祖出鎮并門用為左都押牙銖性慘毒好殺髙祖以為勇斷類已深委遇之國初授永興軍節度使從定汴洛移鎮青州加同平章事隐帝卽位加檢校太師兼侍中銖立法深峻令行禁止吏民有過不問輕重未嘗貸免毎親事小有忤㫖卽令倒曳而出至數百歩外方止膚體無完者每杖人遣䨇林對下謂之合歡杖或杖人如其嵗數謂之隨年杖在任擅行賦斂毎秋苗一畆率錢三千夏苗一畆錢二千以備公用部内畏之脅肩重迹乾祐中淄青大蝗銖下令捕蝗畧無遺漏田苗無害先是濱海郡邑皆有兩浙廻易務原取民利自置刑禁追攝王民前後長吏利其厚賂不能禁止銖卽告所部不得與呉越徴負擅行追攝浙人惕息莫敢干命朝廷懼銖之剛戾難制因前沂州刺史郭瓊自海州用兵還過青州遂畱之卽以符彦卿代銖銖卽時受代隆平集郭瓊傳云劉銖守平盧稱疾不朝隐帝疑其叛詔瓊領兵屯青州銖将害之張宴伏兵幕下瓊無懼色銖亦不敢𤼵瓊為言去就禍福銖趨召離鎭之日有私鹽數屋雜以糞穢填塞諸井以土平之彦卿𤼵其事以聞銖奉朝請乆之毎潛㦸手于史𢎞肇楊邠第㑹李業輩同誅𢎞肇等銖喜謂業輩曰君等可謂僂儸兒矣尋以銖權知開封府事周太祖親族及王峻家竝為銖所害周太祖入京城執之下獄銖謂妻曰我則死矣君應與人為婢耳妻曰明公所為如是雅合為之周太祖遣人譲銖曰昔日與公常同事漢室寧無故人之情家属屠滅公雖奉君命加之酷毒一何忍哉公家亦有妻子還顧念否銖但稱死罪遂啟太后并一子誅之而釋其妻周太祖踐阼詔賜銖妻陜州莊宅各一區五代史闕文漢隐帝朝銖為開封尹周祖自鄴起兵銖盡誅周祖之家子孫婦女十數人極其慘毒及隱帝遇害周祖以漢太后令收録下獄使人責之銖對曰某為漢家戮叛族耳不知其他周祖怒遂殺之史臣曰臣觀漢之亡也豈繫于天命哉蓋委用不得其人聼斷不符于理故也且如𢎞肇之淫刑楊邠之粃政李業晉卿之設計文進允明之狂且雖使成王為君周公作相亦不能保宗社之安延嵗月之命況隐帝逄吉之徒其能免乎易曰大君有命開國承家小人勿用必亂邦也當乾祐之末也何斯言之驗歟惟劉銖之忍酷又安能逭于一死乎舊五代史卷一百七
