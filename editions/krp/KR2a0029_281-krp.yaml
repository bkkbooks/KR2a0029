body:
  text: 舊五代史巻一百四十二宋門下侍郎參知政事監修國史薛居正等撰志四禮志上梁開平元年夏四月太祖初受禪乃立四廟于西京從近古之制也唐同光二年六月太常禮院奏國家興建之初已于北都置廟今克復天下遷都洛陽却復本朝宗廟按禮無二廟之文其北都宗廟請廢乃下尚書省集義禮部尚書王正言等奏議曰伏以都邑之制宗廟為先今卜洛居尊開基御宇事當師古神必依人北都先置宗廟不宜並設況每年朝享禮有常規時日既同神何所據竊聞近例亦有從權如神主巳修迎之藏于夾室若廟宇已崇虚之以為恒制若齊桓公之廟二主禮無明文古者師行亦無遷于廟主昔天后之崇鞏洛禮謂非宜漢皇之戀豐滕事無所法況本朝故事禮院其明洛邑舊都嵩丘正位豈宜遠宫闕之居建祖宗之廟事非可乆理在從長其北都宗廟請准太常禮院申奏停廢從之天成元年中書舍人馬縞奏曰伏見漢晉以來諸侯王宗室承襲帝統除七廟之外皆别追尊親廟漢光武皇帝立先四代于南陽其後桓帝巳下亦皆上考前修追崇先代乞依兩漢故事别立親廟詔下尚書省集百官定議禮部尚書蕭頃等議曰伏見方册所載聖槩所存將逹蘋藻之誠宜有粢棁之制臣等集議其追尊位號及建廟都邑乞特降制命依馬縞所議天成二年中書門下又奏伏以兩漢以諸侯王入繼帝統則必易名上謚廣孝稱皇載于諸王故事孝德皇孝仁皇孝元皇是也伏乞聖慈俯從人願許取皇而薦號兼上諡以尊名改置園陵仍増丘衛遂詔太常禮院定其儀制焉太常博士王丕等引漢桓帝入嗣尊其祖河間孝王曰孝穆皇帝蠡吾侯曰孝崇皇帝為例請付太常卿定諡刑部侍郎權判太常卿馬縞復議曰伏准兩漢故事以諸侯王宗室入承帝統則必追尊父祖修樹園陵西漢宣帝東漢光武孝饗之道故事具存自安帝入嗣遂有皇太后令别崇諡法追曰某皇所謂孝德孝穆之類是也前代惟孫皓自烏程侯繼嗣追父和為文皇帝事出非常不堪垂訓今據禮院狀漢安帝以下若據本紀又不見帝字伏以諡法德象天地曰帝伏緣禮院已曾奏聞難將兩漢故事便述尊名請詔百官集議時右僕射李琪等議曰伏覩歴代以來宗廟成制繼襲無異沿革或殊馬縞所奏禮有按據乞下制命令馬縞䖍依典冊以述尊名時明宗意欲兼加帝字乃下詔曰朕開國承家得以制禮作樂故三皇不相襲五帝不相沿隨代創規于理無爽矧或情闗祖禰事繫烝嘗且追諡追尊稱皇與帝既有減増之字合陳褒貶之詞大約二名俱為尊稱若三皇之代故不可加帝五帝之代不可言皇爰自秦朝便兼二號至若𤣥元皇帝事隔千祀宗追一源猶顯冊于鴻名豈須遵于漢典況朕居九五之位為億兆之尊不可總二名于𦕈躬惜一字于先代茍隨執議何表孝誠可委宰臣與百官詳定集兩班于中書逐班各陳所見惟李琪等請于祖禰二室先加帝字宰臣合衆議奏曰㳟以朝廷之重宗廟為先事繫承祧義符致美且聖朝追尊之日即引漢氏舊儀在漢氏封崇之時復依何代故事理關凝滯未恊聖謨道合變通方為民則且王者功成治定制禮作樂正朔服色尚有更改尊祖奉先何妨沿革若應州必立别廟即地遠上都今據開元中追尊皋陶為德明皇帝凉武昭王為興聖皇帝皆立廟于京都臣等啇量所議追尊四廟望依御札並加皇帝之號兼請于洛京立廟勅宜于應州舊宅立廟餘依所奉案文獻通考後堂之所謂七廟者以沙陀之獻祖國昌太祖克用荘宗存最而上繼唐之高祖太宗懿宗昭宗此所謂四廟者又明宗代北之高曾祖父也其年八月太常禮院奏荘宗神主以此月十日祔廟七室之内合有祧遷中書門下奏議請祧懿祖一室後下百寮集議禮部尚書蕭頃等奏議從中書所奏從之應順元年正月中書門下奏太常以大行山陵畢祔廟今太廟見饗七室髙祖太宗懿宗昭宗獻祖太祖荘宗大行升祔禮合祧遷獻祖請下尚書省集議太子少傅盧質等議曰臣等以親盡從祧垂于舊典疑事無質素有明文頃莊宗皇帝再造寰區復隆宗廟追三祖于先遠復四室于宗朝式遇祧遷旋成沿革及莊宗升祔以懿祖從祧盖非嗣立之君所以先遷其室光武滅新之後始有追尊之儀比祗在于南陽元不歸于太廟引事且疎于故實此時須禀于所規將來升祔先朝次合祧遷獻祖既協隨時之義又符變體之文從之時議以懿祖賜姓于懿宗以支庶繫太宗例宜以懿為始祖次昭宗可也不必祖神堯而宗太宗若依漢光武則宜于代州立獻祖而下親廟其唐廟依舊禮行之可也而議諡者忘咸通之懿宗又稱懿祖父子俱懿于理可乎将朱耶三世與唐室四廟連叙昭穆非禮之甚也議祧者不知受氏于唐懿宗而祧之今又及獻祖以理論之始祧昭宗次祧獻祖可也而懿祖如唐景皇帝豈可祧乎晉天福二年正月中書門下奏皇帝到京未立宗廟望令所司速具制度禮典以聞從之二月太常博士段顒議曰夫宗廟之制歴代為難須考禮經以求故事謹按尚書舜典曰正月上日受終于文祖此是堯之廟也猶未載其數又按郊祀錄曰夏立五廟商立六廟周立七廟漢初立祖宗廟于郡國共計一百六十七所後漢光武中興後别立六廟魏明帝初立親廟四後重議依周法立七廟晉武帝受禪初立六廟後復立七廟宋武帝初立六廟齊朝亦立六廟隋文帝受命初立親廟四至大業元年煬帝欲遵周法議立七廟次屬傳禪于唐武德元年六月四日始立四廟于長安至貞觀九年命有司詳議廟制遂立七廟至開元十一年後創立九廟又按禮記喪服小記曰王者禘其祖之所自出以其祖配之而立四廟鄭𤣥注云髙祖已下至禰四世即親盡也更立始祖為不遷之廟共五廟也又按禮記祭法及王制孔子家語春秋榖梁傳並云天子七廟諸侯五廟大夫三廟士一廟此是降殺以兩之義又按尚書咸有一德曰七世之廟可以觀德又按疑義云天子立七廟或四廟盖有其義也如四廟者從禰至髙祖以下親盡故有四廟之理又立七廟者緣自古聖王祖有功宗有德更封立始祖即于四親廟之外或祖功宗德不拘定數所以有五六廟或七廟九廟欲後代子孫觀其功德故尚書云七世之廟可以觀德矣又按周捨論云自江左巳來晉宋齊梁相承多立七廟今臣等參詳唯立七廟卽並通其理伏緣宗廟事大不敢執一以理定之故檢七廟四廟二件之文俱得其宜佗所論者並皆勿取請下三省集百官詳議勑旨宜依左僕射劉昫等議曰臣等今月八日伏奉勑命于尚書省集議太常博士段顒所議宗廟事伏以將敷至化以達萬方克致平和必先宗廟故禮記王制云天子七廟諸侯五廟大夫三廟疏云周制之七者太祖廟及文王武王之祧與親廟四太祖后稷也商六廟契及湯與二昭二穆夏則五廟太祖禹與二昭二穆而巳自夏及周少不減五多不過七又云天子七廟皆據周也有其人則七無其人則五若諸侯廟制雖有其人則不過五此則天子諸侯七五之異明矣至于三代巳後魏晉宋齊隋及唐初多立六廟或四廟蓋于建國之始不盈七廟之數也今欲請立自髙祖巳下四親廟其始祖一廟未敢輕議伏俟聖裁御史中丞張昭遠奏議曰臣前月中預都省集議宗廟事伏見議狀于親廟之外請别立始祖一廟近奉中書門下牒再令百官于都省議定聞奏者臣讀十四代史書見二千年故事觀諸家宗廟都無始祖之稱唯商周二代以稷契為太祖禮記曰天子七廟三昭三穆與太祖之廟而七鄭𤣥注此周制也七者太祖后稷及文王武王與四親廟又曰商人六廟契及成湯與二昭二穆也夏后氏立五廟不立太祖唯禹與二昭二穆而巳據王制鄭𤣥所釋即商周以稷契為太祖夏后無太祖亦無追諡之廟自商周以來時更十代皆于親廟之中以有功者為太祖無追崇始祖之例其引今古即恐詞繁事要證明須陳梗槩漢以髙祖父太上皇執嘉無社稷功不立廟號髙帝自為髙祖魏以曹公相漢垂三十年始封于魏故為太祖晉以宣王輔魏有功立為髙祖以景帝始封晉故為大祖宋氏先世官閥卑㣲雖追崇帝號劉裕自為髙祖南齊髙帝之父位至右將軍生無封爵不得為太祖髙帝自為太祖梁武帝父順之佐佑齊室封侯位至領軍丹陽尹雖不受封于梁亦為太祖陳武帝父文讚生無名位以武帝功梁室贈侍中封義興公及武帝即位亦追亦太祖周閔帝以父泰相西魏經營王業始封于周故為太祖隋文帝輔周室有大功始封于隋故為太祖唐髙祖神堯祖父虎為周八柱國隋代追封唐公故為太祖唐末梁室朱氏有帝位亦立四廟朱公先世無名位雖追冊四廟不立太祖朱公自為太祖此則前代追冊太祖不出親廟之成例也王者祖有功而宗有德漢魏之制非有功德不得立為祖宗商周受命以稷契有大功于唐虞之際故追尊為太祖自秦漢之後其禮不然雖祖有功仍須親廟今亦粗言徃例以取證明秦稱造父之後不以造父為始祖漢稱唐堯為累之後不以堯累為始祖魏稱曹参之後不以參為始祖晉稱趙将司馬之之後不以卭為始祖宋稱漢楚元王之後不以元王為始祖齊梁皆稱蕭何之後不以蕭何為始祖陳稱大丘長陳實之後不以實為始祖元魏稱李陵之後不以陵為始祖後周稱神農之後不以神農為始祖隋稱楊震之後不以楊震為始祖唐稱皋陶老子之後不以皋陶老子為始祖唯唐高宗則天武后臨朝革唐稱周又立七廟仍追冊周文王姫昌為始祖此蓋當時附麗之徒不諳故實武立姫廟乖越已甚曲臺之人到今嗤誚臣遠觀秦漢下至周隋禮樂衣冠聲明文物未有如唐室之盛武德議廟之初英才間出如温魏顏虞通今古封蕭薛杜達禮儀制度憲章必有師法夫追先王先母之儀起于周代據史記及禮經云武王纘太王王季文王之緒一戎衣而有天下尊為天子宗廟饗之周公成文武之德追王太王王季祀先公以天子之禮又曰郊祀后稷以配天據此言之周武雖祀七世追為王號者但四世而已故自東漢以來有國之初多崇四廟從周制也况商因夏禮漢習秦儀無勞博方之文宜約已成之制請依隋唐有國之初創立四廟推四世之中名位髙者為太祖謹議以聞勑宜令尚書省集百官将前議状與張昭遠所陳連定奪聞奏左僕射劉照等再議奏曰臣等今月十三日再于尚書省集百官詳議夫王者祖武宗文郊天祀地故有追崇之典以申配饗之儀切詳太常禮院議状唯立七廟四廟即並通其理其佗所論並皆勿取七廟者接禮記王制曰天子七廟三昭三穆與太祖之廟而七鄭𤣥注云此周制也詳其禮經即是周家之廟之定數四廟者謂髙曽祖禰四世也按周本記及禮記大傳皆曰武王即位追王太玉王季文王以后稷為堯稷官故尊尊為太祖此即周武王初有天下追尊四廟之明文也故自漢魏巳降迄于周隋創業之君追諡不過四世約周制也此禮行之巳久事在不疑今參詳都省前議狀請立四廟外别引始祖取裁未為定議續准勑據御史中丞張昭遠奏請創立四廟之外無别立始祖之文况國家禮樂刑名皆依唐典宗廟之制須約舊章請依唐朝追尊獻祖宣皇帝懿祖光皇帝太祖景皇帝代祖元皇帝故事追尊四廟為定從之七年七月太常禮院奏國朝見饗四廟靖祖肅祖睿祖憲祖今大行皇帝将行升祔按會要唐武德元年立四廟于長安貞觀九年髙祖神堯皇帝崩命有司詳議廟制議以髙祖神主并舊四室祔廟今先帝神主請同唐髙升祔從之漢天福十二年七月閠時漢髙祖巳即位尚仍天福之號太常博士段顒奏議曰伏以宗廟之制歴代為難須按禮經旁求故實又縁禮貴隋時損益不定今參詳歴代故事立髙曾祖彌四廟更上追遠祖光武皇帝為始祖百代不遷之廟居東向之位共為五廟庶符徃例又合禮經詔尚書省集百官議吏部尚書竇貞固等議云按禮記王制云天子七廟諸侯五廟大夫三廟疏云周制之七廟太祖及文王武王之祖與親四廟太祖后稷也又云天子七廟皆據周也有其人則七無其人則五至于光武中興及歴代多立六廟或四廟蓋建國之始未盈七廟之數又按郊祀錄王肅云德厚者流澤廣天子可以事六代之義也今欲請立髙祖巳下四親廟又自古聖王祖有功宗有德即于四親廟之外祖功宗德不拘定數今除四親廟外更請上追髙皇帝光武皇帝更立六廟從之文獻通考荘宗明宗既捨其祖而祖唐之祖矣及敬瑭知遠崛起而登帝位俱欲以華胄自詭故于四親之外必求所謂始祖而祖之張昭遠之言議正而詞偉矣至漢初則段顒竇貞固之徒曲為諂附乃至上祖髙光以為六廟云周廣順元年正月中書門下奏太常禮院議合立太廟室數若守文繼體則魏晉有七廟之文若創業開基則隋唐有四廟之議聖朝請依近禮追思四廟伏恐所議未同議下百官集議太子太傅和凝等議請據禮官議立四親廟從之五代會要和凝議曰㳟以肇啟洪圖惟新黄屋左宗廟而右社稷率由舊章崇祖禰而辨尊卑載于前史雖質文互變義趣各殊或觀損益之規咸繫興隆之始陛下體元立極本義祖仁開變家成國之基遵奉先思孝之道據禮官議立四親廟以叶前文從之其年四月中書門下奏太常禮院申七月一日皇帝御崇元殿命使奉册四廟准舊儀服兖冕即座太尉引冊案入皇帝降座引立于御座前南向中書令奉册案進皇帝搢珪捧授册使跪受轉授舁册官其進寶授寶儀如册案臣等參詳至時請皇帝降階受册從之三年九月将有事于南郊議于東京别建太廟時太常禮院言准洛京廟室一十五間分為四室東西各有夾室四神門每方屋一間各三門㦸二四别有齋宫神㕑屋宇准禮左宗廟右社稷在國城内請下所司修奉從之其月太常禮院奏迎太廟社稷神主到京其日未審皇帝親議勑外迎奉否檢討故事元無禮例伏請召三省官集議勑宜令尚書省四品已上中書門下五品巳上同參議司徒竇貞固司空蘓禹珪等議按呉主孫休即位迎祖父神主于呉郡入祔太廟前一日出城野次明日常服奉迎此其例也遂署狀言車駕出城奉迎為是請下禮儀使草定儀注至十月禮儀使奏太廟神主将至前一日儀仗出城掌次于西御莊東北設神主行廟幕西面南其日放朝羣臣早出西門皇帝常服出城詣行宫羣臣起居畢就次神主将至羣臣班定皇帝于班前立神主至太常鄉請皇再再拜羣臣俱拜神主就行廟幄幕坐設常饌羣臣班于神幄前侍中就次請皇帝謁神主既至羣臣再拜皇帝進酒畢再拜羣臣俱拜皇帝還幄羣臣先赴太廟門外立班俟皇帝至起居俟神主至羣臣班于廟門外皇帝立于班前太常卿請皇帝再拜羣臣俱拜皇帝還握羣臣就次宫闈令安神主于本室訖羣臣班于廟庭太常卿請皇帝于四室奠饗逐室皇帝再拜羣臣俱拜四室祔饗畢皇帝還宫前件儀注望付中書門下宣下從之顯德六年七月詔以大行皇帝山陵有期神主将祔太廟其廟殿室宇合添修否國子司業兼太常博士聶崇義奏議曰奉勑為大行皇帝山陵有期神主祔廟恐殿室間數少合行添修今詣廟中相度若是添修廟殿一間至兩間並須移動諸神門及角樓宫牆仗舍及堂殿正面檐栿階道亦須東省牲立班位直至齋宫漸近迫窄今重拆廟殿續更添修不唯重勞兼恐未便竊見廟殿見虚東西二夾室况未有祧遷之主欲請不拆廟殿更添間數即便將夾室重安排六室位次所有動移神主若准舊禮于殿庭權設行廟幕殿即恐雨水猶多難于陳設伏請權于太廟齋宫内奉安神主至修奉畢日庶為宜稱又按禮記云廟成則于中屋刲羊以釁之夾室則用鷄又大戴禮及通典亦有夾室察文觀義乃是備廟之制况新主祔廟諸經有遷易之文考古沿今庶合通理伏請遞遷諸室奉安大行皇帝神主以符禮意勑依典禮舊五代史巻一百四十二
