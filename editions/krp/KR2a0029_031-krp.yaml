body:
  text: 舊五代史巻十五宋門下侍郎參知政事監修國史薛居正等撰梁書第十五列傳五韓建字佐時許州長社人父叔豐世為牙校初秦宗權之據蔡州招合亡命建隸為軍士累轉至小校唐中和初忠武監軍楊復光起兵于蔡宗權遣其將鹿晏𢎞赴之建與里人王建俱隸晏𢎞軍入援京師賊平復光暴卒時僖宗在蜀晏𢎞率所部赴行在路出南山因攻剽郡邑據有興元晏𢎞自為留後以建為蜀郡刺史唐軍容使田令孜宻遣人誘建啗以厚利建時懼為晏𢎞所併乃率所部歸行在令孜補為神䇿都校金吾將軍出為潼闗防禦使兼華州刺史河潼經大冦之後户口流散建披荆棘闢汚萊勸課農事樹植蔬果出入閭里親問疾苦不數年流亡畢復軍民充實建比不知書治郡之暇日課學習遣人於器皿牀榻之上各題其名建視之既熟乃漸通文字俄遷華商節度潼關守捉等使累加檢校太尉平章事乾寧二年建與鳳翔李茂貞邠州王行瑜舉兵赴闕迫昭宗請以王珙為河中帥害大臣于都下河中王珂召晉軍以為援及晉軍渡河昭宗幸石門三年四月昭宗遣延王通王率禁兵討李茂貞為茂貞所敗車駕幸渭橋翼日次富平將幸河中建奉表迎駕俄自至渭北懇乞東幸許之七月十五日昭宗至華下百官士庶相繼而至建尋加兼中書令充京畿安撫制置等使又兼京兆尹京城把截使昭宗乆在華州思還宫掖每花朝月夕遊宴西谿與羣臣屬詠歌詩歔欷流涕建每從容奏曰臣為陛下修營大内結信諸候一二年間必期興復乃以建兼領修創京城使建自華督役輦運工作復治大明宫四年二月有詣建告睦王已下八王謀殺建建囚八王於别宅放散随駕殿後軍二萬人殺捧日都頭李筠自是天子益微宿衛之士盡矣八月建以兵圍十六宅通王已下十一王並遇害于石堤谷以謀逆聞又害太子詹事馬道殷將作監許巖士貶宰相朱朴皆昭宗寵昵者也建尋兼同州節度使光化元年升華州為興徳府以建為尹八月車駕還京九月册拜太傅進封許國公并賜鐡劵天復元年十一月宦官韓全誨迫天子幸鳳翔建亦預其謀太祖聞知自河中引軍而西前鋒至同州建判官司馬鄴以城降遂移軍迫華州建懼乞降太祖責以脅君之罪建拜伏稱從事李巨川之謀也太祖即誅巨川北夢瑣言韓建曰某不識字凡朝廷章奏鄰封書檄皆巨川為之因斬之又新唐書李巨川傳云巨川詣軍門納款因言當世利害全忠屬官敬翔以文翰事左右疑巨川用則全忠待已或衰乃詭說曰巨川誠竒才顧不利主人若何是日全忠殺之太祖與建素有軍中昆弟之契及見其怒驟息尋表建為許州節度使昭宗東遷以建為祐國軍節度使京兆尹車駕至陜召太祖與建侍宴宫妓奏樂何皇后舉觴以賜太祖建躡足太祖遽起曰臣醉不任偽若顛仆即去建私謂太祖曰上與宫人附耳而語幕下有兵仗聲恐圖王爾天祐三年改青州節度使及受禪徴為司平章事充諸道鹽鐡轉運使開平二年加侍中充建昌宫使三年郊祀於洛以建為大禮使建為上宰每謁見時有直言太祖為性剛嚴羣下將迎不暇待建稍異故優容之九月冊拜太保罷知政事五代㑹要開平三年十月詔曰太保韓建毎月旦十五日入閤稱賀即令赴朝參餘時弗入見示優禮也四年三月除匡國軍節度使陳許蔡觀使仍令中書不議除替五代㑹要乾化元年正月敇云許昌雄鎮太保韓建朕用以布政民耕盗止乆居其位庶可勝殘矣宜令中書門下不計年月勿議替乾化二年六月朝廷新有内難人心動揺部將張厚因作亂害建於衙署時年五十八子從訓昭宗在華時授太子侍學賜名文禮尋拜屯田員外郎國初為都官郎中賜紫年未弱冠時朝廷命從訓告國哀於陳許至二日軍亂與建併命乾化三年追贈太師李罕之陳州項城人父文世田家罕之拳勇趫㨗力兼數人少學為儒不成又落髪為僧以其無賴所至不容曾乞食於酸棗縣自旦至晡無與之者乃擲鉢於地毁棄僧衣亡命為盜㑹黄巢起曹濮罕之因合徒作剽漸至魁首及賊巢渡江罕之因以兵將背賊歸於唐髙駢録其功表為光州刺史嵗餘為蔡賊秦宗權冦迫不能守乃棄郡歸項城收合餘衆依河陽諸葛爽爽署為懷州刺史光啟初僖宗以爽為東南面招討以擊宗權爽乃表罕之為副令將兵屯宋州蔡冦兇􅀈日熾兵鋒不敵中和四年爽表罕之為河南尹東郡留守是歲李克用脫上源之難歛軍西歸路由洛陽罕之迎謁供帳館待甚優因與克用厚相結託時罕之有衆三千以聖善寺為府光政元年蔡賊秦宗權遣將孫儒來攻罕之對壘數月以兵少備竭委城而遁西保於澠池蔡賊據京城月餘焚燒宫闕剽剥居民賊既退去鞠為灰燼寂無雞犬之音罕之復引其衆築壘於市西明年冬諸葛爽死其將劉經推爽子仲方為帥經懼罕之難制自引兵鎮洛陽罕之部曲有李塘郭璆者情不相叶欲相圖害罕之怒誅璆軍情由是不睦劉經因其有間掩擊罕之于澠池軍亂保乾壕經急攻之為罕之所敗罕之乘勝追至洛陽時經保敬愛寺罕之保苑中飛龍廐罕之激勵其衆攻敬愛寺數日因風縱火盡熖之經衆奔竄追斬殆盡罕之進逼河陽營於鞏縣陳舟於汜水將渡諸葛仲方遣將張言率師拒於河上時仲方年幼政在劉經諸將心多不附張言密與罕之修好經知其謀言懼引衆渡河歸罕之因合勢攻河陽為經所敗罕之與言退保懐州冬蔡將孫儒䧟河陽仲方汎輕舟來奔孫儒遂自稱節度使俄而蔡賊為我軍所敗孫儒棄河陽歸蔡罕之與言收合其衆求援於太原李克用遣澤州刺史安金俊率騎助之遂收河陽克用表罕之為節度同平章事又表言為河南尹東都留守罕之既與言患難交契刻臂為盟永同休戚如張耳陳餘之義也罕之雖有膽決雄猜翻覆而撫民御衆無方略率多苛暴性復貪冒不得士心既得河陽出兵攻晉絳時大亂之後野無耕稼罕之部下以俘剽為資啖人作食絳州刺史王友遇以城降罕之乃進攻晉州河中王重盈遣使求援于太祖時張言治軍有法善積聚勤于播植軍儲不乏言輸粟于罕之以給其軍罕之求索無限言頗苦之力不能應罕之則録河南府吏笞責之東諸侯修貢行在多為罕之邀留王重盈苦其侵削密結張言請圖之文徳元年春㑹罕之盡出其衆攻平陽言夜出師掩擊河陽罕之無備單步僅免舉族為言所俘罕之奔於太原李克用表為澤州刺史仍領河陽節度使三月克用遣其將李存孝率師三萬助之來攻懐孟城中食盡備豫皆竭張言遣其孥入質且求救於太祖太祖遣葛從周牛存節赴之逆戰於流河店㑹晉將安休休以一軍奔於蔡存孝引軍而退罕之保於澤州自是罕之日以兵冦鈔懐孟晉絳數百里内郡邑無長吏閭里無居民河内百姓相結屯寨或出樵汲即為俘馘雖竒峯絶磴梯危架險亦為罕之部衆攻取先是蒲絳之間有山曰摩雲邑人立棚於上以避冦亂罕之以百餘人攻下之軍中因號罕之為李摩雲自是數州之民屠啖殆盡荆棘蔽野烟火斷絶凡十餘年乾寧二年李克用出師以拒邠鳳營於渭北天子以克用為邠州行營四面都統克用乃表罕之為副及誅王行瑜罕之以功授檢校太尉食邑千户罕之自以功多私謂晉將葢寓曰余自河陽失守來依巨廕嵗月滋夊功效未施比年以來倦於師旅所謂老夫耄矣無能為也望吾王仁愍太傅哀憐與一小鎮休兵養疾一二年間即歸老莬裘幸也寓為言之克用不對每藩鎮缺帥議所不及罕之私心鬱鬱蓋寓懼其佗圖亟為論之克用曰吾於罕之豈惜一鎮吾有罕之亦如董卓之有吕布雄則雄矣鷹鳥之性飽則颺去實懼翻覆毒余也光化元年十二月晉之潞帥薛志勤卒罕之乘其喪自澤州率衆徑入潞州自稱留後以狀聞於克用曰聞志勤之喪新帥未至慮為佗盗所窺不俟命已屯於潞矣克用怒遣李昭嗣討之罕之執其守將馬溉伊鐸何萬友沁州刺史傳瑶等遣其子顥拘送於太祖以求援焉新唐書全忠表罕之昭義軍節度使㑹罕之暴病不能視事明年六月病篤太祖令丁㑹代之移罕之為河陽節度使行至懐州卒於傳舍時年五十八歳子顥以舟載柩歸葬河隂縣開年二年春詔贈中書令馮行襲字正臣武當人也厯職為本郡都校中和中僖宗在蜀有賊首孫喜者聚徒數十人欲入武當刺史吕曄惶駭無䇿畧行襲伏勇士於江南乘小舟逆喜謂喜曰郡人得良牧衆心歸矣但縁兵多民懼擄掠若駐軍江北領肘腋以赴之使某前導以慰安士民可立定也喜然之既渡江軍吏迎謁伏甲奮起行襲擊喜仆地伏劍斬之其黨盡殪賊衆在江北者悉奔潰山南節度使劉巨容以功上言尋授均州刺史州西有長山當襄漢蜀路羣賊屯據以邀刦貢奉行襲又破之洋州節度使葛佐奏辟為行軍司馬請將兵鎮谷口通秦蜀道由是益知名李茂貞遣養子繼臻竊據金州行襲攻下之因授金州防禦使時興元楊守亮將襲京師道出金商行襲逆擊大破之詔升金州為節鎮以戎昭軍為額即以行襲為節度使及太祖義旗西征行襲遣副使魯崇矩禀受制令會唐昭宗幸鳳翔太祖帥師奉迎久之未出中尉韓全誨遣中官郄文晏等二十餘人分命矯詔欲徵江淮兵屯於金州以䝱太祖之軍行襲定䇿盡殺之收其詔勅送於太祖天祐元年兼領洋州節度使太祖之伐荆襄行襲令其子朂以舟師會於均房預收復功遷匡國軍節度使到任誅大吏張澄暴其罪州人莫不惴懾在許三年上供外别進助軍羡糧二十萬石及太祖郊􅀈行襲請入覲貢獻巨萬恩禮殊厚尋詔翰林學士杜曉撰徳政碑以賜之累官至兼中書令冊拜司空開平中卒輟朝一日贈太傅謚曰忠敬行襲性嚴烈為政深刻然所至有天幸境内嘗大蝗尋有羣烏啄食不為害民或艱食必有穭榖出於壠畝雖威福在已而恒竭力以奉於王室故能保其功名行襲魁岸雄壮面有青誌當時目為馮青面長子朂厯蘄沁二州刺史次子徳晏仕至金吾將軍孫徳昭鹽州五原縣人世為州校父惟晸有功於唐朝遙領荆南節度分判右神䇿軍事徳昭藉父䕃累職為右神䇿軍都指揮使光化三年唐昭宗為閹官所廢矯立徳王時中外以權在禁闥莫能致討近藩朋附章表繼有至者丞相崔𦙍外與太祖申結輔佐之好内遣心腹密講忠義有以事喻徳昭者通鑑徳昭常憤惋不平崔𦙍聞之遣判官石戩與之遊徳昭每酒酣必泣戩知其誠乃密以𦙍意說之徳昭感慨乃與本軍孫承誨董從實二人奮發應命誓圖返正崔又割衣手筆以通其志天復元年正月一日未旦逆豎左軍容劉李述早入徳昭伏甲要路以俟追其前驅邀而斬之孫承誨等分捕右軍容王仲先黨伍唐昭宗方幽辱東内聞外喧大恐徳昭馳至扣閤曰逆賊劉季述伏誅矣請上皇開鑰復皇帝位皇后何氏呼曰汝可進逆人首門乃可開俄而承誨從實俱以馘獻昭宗悲而嘉之於是丞相崔𦙍奉迎御丹鳳樓率百辟待罪泣且奏曰臣居大位不能討姦賴東平王全忠首奮忠貞誅殺邸吏遂致徳昭等檎戮妖逆再清禁闈即日議功以徳昭為檢校太保靜海軍節度使承誨邕州節度使從實容州節度使並同平章事錫姓李賜號扶傾濟難忠烈功臣圗形凌烟閣俱留京師錫賚宴賞之厚恩寵權倖之勢近代罕比其年十一月閹宦韓全誨縱火䝱昭宗西幸鳳翔承誨從實並變節為中官所誘始欲驅擁百寮將圖出令而徳昭獨按兵與太祖親吏婁敬思叶力衛丞相文武百官與長安吏民保於街東免為所刧太祖遣從事相繼勞問遺以龍鳳劍鬬鷄紗委令制輯於是百官次華州連狀請太祖迎奉及大斾入闗徳昭以軍禮上謁立道左太祖命左右扶騎控至長安賜與甚厚署權知同州節度留後將赴任復徇民請留充兩街制置使賜錢百萬徳昭以本部兵八千人獻於太祖由是愈見賞重又賜甲第一區俾先還洛陽及昭宗東遷奏授左威衛上將軍以病免歸於别墅太祖受禪以左領衛上將軍徵赴闕開平四年拜左金吾大將軍充街使末帝即位俾將命於兩浙對見失儀不果行尋改授右武衛上將軍俄復左金吾大將軍卒於官詔贈太傅輟視朝一日天復初徳昭與孫承誨董從實以返正功時人呼為三使相恩澤俱冠世及承誨至鳯翔易名繼誨從實改名彦弼皆為李茂貞所養後閹官之敗俱戮於京師帷徳昭克全終始有所􅀈云趙克裕河陽人也祖父皆為軍吏克裕少為牙將好讀書謹儀範牧伯皆竒待之累居右職擢為虎牢闗使光啓中蔡冦䧟河陽克裕率所部歸於太祖𨽻於宣義軍太祖東征徐鄆克裕屢受指顧無不如意數年之内繼領亳鄭二州刺史時闗東藩鎮方為蔡冦所毒黎元流散不能相保克裕妙有農戰之備復善於綏懐民賴而獲安者衆太祖表為河陽節度使檢校右僕射尋移理許田入為金吾衛大將軍檢校司空及太祖為元帥以克裕為元帥府左都押衙復統六軍兗州平命權知泰寧軍留後數月暴疾而卒開平初追贈太保張慎思清河人自黄巢軍來歸累授軍職厯諸軍都指揮使從平巢蔡兗鄆皆著功表授檢校工部尚書兼宋州長史光化中加檢校右僕射權知亳州天復三年昭宗還長安以從太祖迎駕功賜號迎鑾毅勇功臣尋除汝州防禦使天祐元年授左龍武統軍其冬除許州匡國軍節度使明年十一月權知徐州武寧軍兩使留後太祖受禪入為左金吾大將軍開平二年除宋州刺史未㡬復拜左金吾大將軍開平冬除蔡州刺史以貪貨大失民情詔追赴闕未㡬扈從北征還以疾卧洛陽之私第馭家不肅為其子所弑史臣曰韓建過唐朝之衰運據潼闗之要地不能藩屏王室翻務斵喪宗枝雖有阜俗之能何補不臣之咎罕之負驍雄之氣蓄嚮背之謀武皇比之吕布斯知人矣行襲勵納忠之節徳昭立反正之功俱善其終固其宜矣克裕而下無譏可也舊五代史巻十五
