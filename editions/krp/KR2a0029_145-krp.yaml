body:
  text: 舊五代史巻七十二攷證唐列傳二十四張承業傳王若自要散施何妨老夫不過財盡兵散一事無成案通鑑作王自取用之何問僕為以疾卒于晉陽之第案歐陽史作不食而卒通鑑作邑邑成疾不復起諡曰貞憲案貞憲歐陽史作正憲馬紹宏傳馬紹宏閹官也案莊宗紀作李紹宏蓋嘗賜姓紹宏失望乃以為宣徽使案宋史趙上交傳南逰落陽與中官驃騎大將軍馬紹宏善紹宏領北面轉運制置大使表為判官攷紹宏為北面轉運制置大使是書不載舊五代史巻七十二考證
