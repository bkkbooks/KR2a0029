body:
  text: 舊五代史巻四十四宋門下侍郎參知政事監修國史薛居正等撰唐書第二十明宗紀十長興四年春正月戊寅朔帝御明光殿受朝賀仗衛如式是日雪盈尺戊子秦王從榮加守尚書令兼侍中依前河南尹判六軍諸衛事庚寅以端明殿學士尚書兵部侍郎劉昫為中書侍郎平章事甲午正衙命使册故福慶長公主孟氏為晉國雍順長公主遣太常卿崔居儉赴西川行册禮突厥内附庚子以前河東節度使李從温為鄆州節度使二月癸丑朔帝于便殿問范延光内外見管馬數對曰三萬五千匹帝歎曰太祖在太原騎軍不過七千先皇自始至終馬纔及萬今有鐵馬如是而不能使九州混一是吾養士練將之不至也吾老矣馬將奈何延光奏曰臣每思之國家養馬太多試計一騎士之費可贍歩軍五人三萬五千騎抵十五萬步軍既無所施虚耗國力臣恐日久難繼帝曰誠如卿言肥騎士而瘠吾民何益哉五代㑹要上問見管馬數樞宻使范延光奏天下常支草粟者近五萬匹見今西北諸道蕃買馬者往來如市其郵傳之費中估之直日以四十五貫以臣計之國力十耗其七馬無所使財賦漸消朝廷甚非所利上善之十月敇沿邊藩鎮或有蕃部買馬可擇其良壯給劵具數以聞丁已以䖍州節度使檢校太尉兼侍中馬希振為洪州節度使以鄂州節度使馬希廣為檢校太尉同平章事充桂州節度使以廬州節度使兼武安軍副使姚彦章為檢校太尉同平章事以静江節度副使馬希範為鄂州節度使故潞州節度使檢校太保康君立贈太傅己未宋州節度使安元信加兼侍中濮州進重修河堤圖沿河地名厯厯可數帝覽之愀然曰吾佐先朝定天下于此堤塢間大小數百戰又指一丘曰此吾擐甲臺也時事如昨奄忽一紀令人悲歎耳癸亥以西川節度使孟知祥為劍南東西兩川節度使封蜀王三司奏當省有諸道鹽鐵轉運使衙職員都押衙正押衙同押衙通引衙前虞候子弟今欲列為三司職名從之庚午以御史中丞崔衍為兵部侍郎以右諫議大夫龍敏為御史中丞三月己卯幸龍門延州節度使安從進奏夏州節度使李仁福卒其子彛超自稱留後甲申鎮州奏行軍司馬趙瓌節度判官陸浣元從押衙髙知柔等並棄市坐受賂枉法殺人也節度使李從敏罰一季俸乙酉以西川節度副使知武泰軍節度兵馬留後趙季良為檢校太保黔南節度使以西川諸軍馬歩都指揮使知武信軍節度兵馬留後李仁罕為檢校太傅遂州節度使以西川左廂馬歩指揮使知保寧軍節度兵馬留後趙廷隠為檢校太保閬州節度使以西川右廂馬步都指揮使知寧江軍兵馬留後張知業為檢校司徒夔州節度使以西川衙内馬歩都指揮使知昭武軍兵馬留後李肇為檢校太保利州節度使從孟知祥之請也丙戌賜宰相李愚絹百匹錢十萬鋪陳物一十三件時愚病帝令近臣翟光鄴宣問所居寢室蕭然四壁病榻敝氊而巳光鄴具言其事故有是賜戊子以延州節度使安從進為夏州留後以夏州左都押衙四州防遏使李彛超為延州留後仍命邠州節度使藥彦稠宫苑使安重益帥師援送從進赴鎮以左衛上將軍盧文進為潞州節度使以右龍武統軍張温為雲州節度使庚寅以鳯翔行軍司馬李彦琮為鹽州防禦使時范延光等奏請因夏州之師制置鹽州故有是命癸巳以右威衛上將軍安重霸為同州節度使已亥以左龍武統軍符彦超為安州節度使詔除放京兆秦岐邠濕延慶同華興元十州長興元年二年係欠夏秋税物及營田莊宅務課利以其曽輦運供軍糧料也甲辰故晉國夫人夏氏追册皇后有司上諡曰昭懿從之夏四月戊申李彛超奏奉詔除延州留後已受恩命訖三軍百姓擁隔未遂赴任帝遣閤門使蘇繼顔齎詔促彛超赴任癸丑以刑部侍郎劉賛為祕書監秦王傅五代會要長興四年四月以祕書監劉贊為秦王傅前忠武軍節度判官蘇贊為秦王友前襄州觀察使魚崇逺為秦王府記室參軍時言事者請為秦王置師傅上顧問近臣皆以秦王名勢隆盛不敢置議請自選擇乃降是命甲寅前鄧州節度使梁漢顒以太子少師致仕太子賓客裴皥以兵部尚書致仕戊午追册昭宗皇后何氏為宣穆皇后祔饗太廟百寮進名奉慰廢朝三日已巳以左散騎常侍任贊為户部侍郎以吏部侍郎藥縱之為曹州刺史癸酉延州奏蕃部刧掠餉運及攻城之具守蘆關兵士退守金明鎮五月丙子朔帝御文明殿受朝戊寅皇子鳳翔節度使從珂封潞王新授户部侍郎任贊改刑部侍郎贊訴以所授官是丁憂闕故改焉皇子從益封許王鄆州節度使李從温封兖王河府節度使李從璋封洋王鎮州節度使李從敏封濕王甲申帝避暑于九曲池既而登樓風毒暴作聖體不豫翌日而愈北夢瑣言上聖體乖和馮道對寢膳之間動思調衞因指御前果實曰如食桃不康翌日見李而思戒可也初上因御李暴得風虚之疾馮道不敢斥言因奏事諷悟上意丙戌契丹遣使朝貢丁酉安從進奏大軍已至夏州攻城以其不受命也庚子以靈武留後張希崇為本州節度使辛丑故夏州節度使朔方郡王李仁福追封虢王壬寅以前晉州留後薄文為本州節度使六月丙午朔文武百寮宰臣馮道等拜章請于尊號内加廣運法天四字凡拜三章詔允之詔宫西新園宜名永芳園其間新殿宜名和慶殿丙辰秦王從榮加食邑至萬户實封二千户丁巳以右驍衛上將軍李從昶為左龍武統軍以前邢州節度使髙允韜為右龍武統軍以右驍衛上將軍羅周敬為左羽林統軍以右監門上將軍婁繼英為金州刺史戊午宋王從厚加食邑至萬户實封一千户壬戌以前涇州節度使李金全為滄州節度使癸亥詔御史中丞龍敏等詳定大中統類甲子第十四女封夀安公主第十五女封永樂公主戊辰以前利州節度使孫漢韶為洋州節度使壬申永寧軍節度使容州管内觀察使檢校太尉兼侍中馬存加食邑實封甲戌帝復不豫秋七月丁丑以著作佐郎尹拙為左拾遺直史館國朝舊制皆以畿赤尉直史館今用諫官自拙始從監修李愚奏也已夘東岳三郎神贈威雄大將軍初帝不豫前淄州刺史劉遂清薦泰山僧一人云善醫及召見乃庸僧耳問方藥僧曰不工醫嘗于泰山中親睹嶽神謂僧曰吾第三子威靈可愛而未有爵秩師為我請之宫中神其事故有是命識者嫉遂清之妖佞焉詔應臺官出行須令人訶引使軍巡職掌等規避壬午詔安從進班師時王師攻夏州無功故也乙酉以許州節度使孟鵠卒廢朝贈太傅詔賜在京諸軍將校優給有差時帝疾未痊軍士有流言故也丁亥兩浙節度使檢校太傅守中書令錢元瓘封吳王八月戊申帝被衮冕御明堂殿受册徽號曰聖明神武廣運法天文徳恭孝皇帝禮畢制大赦天下常赦所不原者咸赦除之已酉賜侍衞諸軍優給有差時月内再有頒給自兹府藏無餘積矣辛亥以晉州節度使薄文卒廢朝丁巳以右龍武統軍李從昶為許州節度使戊午以祕書監髙輅卒廢朝辛酉以太子太師致仕符習卒廢朝贈太師辛未秦王從榮以本官充天下兵馬大元帥加食邑萬户實封三千户以右羽林統軍翟璋為晉州節度使以太子賔客馬縞為户部侍郎壬申幸至徳宮九月甲戌以户部尚書李璘為兵部尚書以前户部尚書韓彦惲為户部尚書丙子幸至徳宫戊寅樞密使范延光趙延夀並加兼侍中依前充使中書奏元帥儀注諸道節度使以下帯兵權者階下具軍禮叅見其帯使相者初見亦展一度公禮天下軍務公事元帥府行帖指揮其判六軍諸衛事則公牒往來其官屬軍職委元帥府奏請從之癸未以兵部侍郎盧詹為吏部侍郎丙戌宰臣馮道加左僕射李愚加吏部尚書劉昫加刑部尚書戊子河陽節度使兼侍衞親軍都指揮使康義誠山南西道節度使檢校太傅張䖍釗並加同平章事宣徽南院使判三司馮贇依前檢校太傅同平章事中書門下同二品充三司使贇亡父名章故改平章事為同二品壬戌永寧公主石氏進封魏國公主興平公主趙氏進封齊國公主皇孫重光重哲並授銀青光禄大夫檢校工部尚書秦王宋王子也前洋州節度使梁漢顒以太子少傅致仕丁酉以右龍武統軍髙允韜為滑州節度使以韶州刺史檢校司空王萬榮為華州節度使萬榮王妃之父也戊戌以樞密使趙延夀為汴州節度使以襄州節度使朱𢎞昭為檢校太尉同平章事充樞密使時范延光趙延夀相繼辭退樞密務及朱𢎞昭有樞宻之命又面辭訴帝叱之曰爾輩皆欲離朕左右怕在眼前素養爾輩將何用也𢎞昭退謝不復敢言吏部侍郎張文寳卒庚子清海軍節度使錢元璹加檢校太傅同平章事中吳建武等軍節度使錢元璙加檢校太師兼中書令以前滑州節度使李贊華遥領䖍州節度使辛丑詔天下兵馬大元帥秦王從榮班宜在宰臣之上五代會要秦王從榮加兼中書令與宰臣分班左右定位及為天下兵馬元帥勅曰秦王位隆將相望重磐維委任既崇等威合異班位宜在宰臣之上壬寅以北面行營都指揮使易州刺史楊檀為振武軍節度使冬十月丙午以前同州節度使趙在禮為襄州節度使丁未以前滑州節度使張敬詢卒廢朝以邢部侍郎任贊為兵部侍郎充元帥府判官戊午以前鳯翔節度使孫岳為三司使庚申以樞密使范延光為鎮州節度使以三司使馮贇為樞宻使辛酉以前潞州節度使李承約為左龍武統軍以前威塞軍節度使王景戡為右龍武統軍以左驍衛上將軍安崇阮為左神武統軍以右監門上將軍髙允貞為右神武統軍壬戌以權知夏州事檢校司空李彛超為夏州節度使檢校司徒丙寅詔在朝文武臣寮並與加恩以受册尊號也戊辰以前安州節度使楊漢章為兖州節度使以前雲州節度使張敬達為徐州節度使庚午以前兖州節度使張延朗為秦州節度使壬申秦州節度使劉仲殷移鎮宋州十一月丙子以前滄州節度使盧質為右僕射庚辰改慎州懷化軍為昭化軍升洮州為保順軍辛巳以保大軍節度使檢校太尉鮑君福為保順軍節度洮鄯等州觀察等使以彰義軍節度使檢校太尉同平章事杜建徽為昭化軍節度慎瑞司等州觀察使乙酉以前汴州節度使李從曮為鄆州節度使以鄆州節度使李從温為定州節度使丙戌新授右僕射盧質奏臣忝除官合赴省上事若凖舊例左右僕射上事儀注所費極多欲從權務簡只取尚書丞郎上事例止屬南省屬寮及兩省官送上亦不敢輙援往例有費官用自量力排比兼不敢自臣隳廢前規他時任行舊制從之戊子帝不豫已丑大漸自廣夀殿移居雍和殿是夜四皷後帝自御榻蹶然而興顧謂知漏宫女曰夜漏幾何對曰四更因奏曰官家省事否帝曰省因唾出肉片如肺者數片便溺升餘六宫皆至慶躍而奏曰官家今日實還魂也因進溺一器侍醫進湯膳至曙帝小康壬辰天下大元帥守尚書令兼侍中秦王從榮領兵陣于天津橋内出禁軍拒之從榮敗奔河南府遇害帝聞之悲駭幾落御榻氣絶而蘇者再繇是不豫有加癸已馮道率百寮見帝于雍和殿帝雨泣哽噎曰吾家事若此慙見卿等百寮皆涖下霑襟甲午賜宰臣樞宻使御衣玉帯康義誠已下錦帛鞍馬有差遣宣徽使孟漢瓊召宋王于鄴都乙未以三司使孫岳為亂兵所害廢朝丁酉勅秦王府官屬除諮議參軍髙輦已處斬外元帥府判官兵部侍郎任贊配武州祕書監兼秦王傅劉贊配嵐州河南少尹劉陟配均州並為長流百姓縱逢恩赦不在放還河南少尹李蕘配石州河南府判官司徒詡配寧州秦王友蘇瓚配萊州記室參軍魚崇逺配慶州河南府推官王説配隨州並為長流百姓河南府推官尹諲六軍巡官董裔張九忠河南府巡官張沆李潮江文蔚並勒歸田里應長流人並除名六軍判官殿中監王居敏責授復州司馬六軍推官郭晙責授坊州司户並員外置所在馳驛發遣時宰相樞宻使共議任贊等已下罪馮道等曰任贊前在班行比與從榮無舊除官未及月餘便逢此禍王居敏司徒詡疾病請假將近半年近日之事計不同謀從榮所欵昵者髙輦劉陟王説三人昨從榮稱兵指闕之際沿路只與劉陟髙輦並轡耳語至天津橋南指日影謂諸判官曰明日如今已誅王居敏矣則知其冗泛之徒不可一例從坐朱𢎞昭意欲盡誅任贊已下馮贇力爭之乃已戊戌帝崩于大内之雍和殿夀六十七馮二月癸卯朔遷梓宫于二儀殿宋王從厚自鄴都至是日發哀百寮縞素于位中書侍郎平章事劉昫宣遺制宋王從厚于柩前即皇帝位服紀以日易月一如舊制云明年四月太常卿盧文紀上謚議曰聖制仁徳欽孝皇帝廟號明宗宰臣盧文紀上改聖智仁徳四字為聖徳和武欽孝皇帝宰臣劉昫撰謚册文宰臣李愚撰哀册文是月二十七日𦵏于徽陵五代史補明宗之在位也一旦幸倉塲觀納時主者以車駕親臨懼得其罪較量甚輕明宗因謂之曰且朕自省事以來倉塲給散動經一二十年未畢今輕量如此其後銷折將何以償之對曰竭盡家産不足則繼之以身命明宗愴然曰只聞百姓養一家未聞一家養百姓今後每石加二斗耗以備鼠雀侵蠧謂之䑕雀耗倉糧起自此也己五代史闕文明宗出自邊地老于戰陳即位之歲年六旬純厚仁慈本乎天性毎夕宫中焚香仰天禱祝云某蕃人也遇亂世為衆推戴事不獲已願上天早生聖人與百姓為主故天成長興間比歳豐登中原無事言于五代粗為小康史臣曰明宗戰伐之勲雖髙佐命潛躍之事本不經心㑹王室之多艱屬神器之自至諒由天贊匪出人謀及應運以君臨能力行于王國政皆中道時亦小康近代已來亦可宗也儻使重誨得房杜之術從榮有啓誦之賢則宗祧未至于危亡載祀或期于綿逺矣惜乎君親可輔臣子非才遽泯烝嘗良可深歎矣舊五代史巻四十四
