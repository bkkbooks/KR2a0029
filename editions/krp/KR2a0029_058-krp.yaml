body:
  text: 舊五代史巻二十八攻證唐莊宗紀二梁祖自督軍攻棗強甲申城陷屠之甲申通鑑作丙戌周徳威大破燕軍于羊頭崗案通鑑作龍頭岡攷異引莊宗實録作羊頭岡十一月己亥朔帝下令親征幽州案歐陽史作十月劉守光請降王如幽州是日誅守光案遼史太祖紀七年正月晉王李存勗拔幽州擒劉守光攷遼史太祖七年即天祐十年莊宗以天祐十年冬始拔幽州十一年正月乃凱旋也遼史誤以次年事先一年書之遣使推帝為尚書令案通鑑攷異引唐實録云天祐八年晉王已稱尚書令是書作天祐十一年與唐實録異是月二十九日夜案通鑑攷異引莊宗實録作二十七日今攷是書賀徳倫𫝊作二十九日與此紀合以故將李巖為澶州刺史李巖通鑑攷異引莊宗實録作李嚴決圍而岀案通鑑作自午至申乃得出亡其七騎遣將石嘉才嘉才梁紀作家才唐列𫝊作家財以袁建豐為相州刺史依舊𨽻魏州案通鑑作四月晉人拔洺州以魏州都巡檢使袁建豐為洺州刺史八月晉人復以相州𨽻天雄軍以李嗣源為刺史與是書異是月契丹入蔚州振武節度使李嗣本陷于契丹案歐陽史及通鑑俱從是書作蔚州遼史太祖紀作神冊元年八月抜朔州擒節度使李嗣本與是書異是月淮南楊溥遣使來㑹兵將致討于梁也案十國春秋吳世家作七月晉王李存勗遣間使持帛書㑹兵代梁王辭以䖍州之難與是書異按巴堅舊作阿保機今改舊五代史巻二十八攷證
