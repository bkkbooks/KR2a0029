body:
  text: 舊五代史卷二十攷證梁列𫝊十司馬鄴𫝊而揚州諸步多賊船諸步原本作諸走攷容齋隨筆云步者水傍之名今改正劉捍𫝊光化三年六月太祖北伐鎮定又移師以攻中山案梁祖下鎮定服中山舊唐書作光化三年九月新唐書作十月是書總繫于六月據通鑑自六月舉兵九月月始定中山也張遂𫝊刺史張遂案新唐書作張璲太祖令往光州説刺史劉存背淮賊以向國案新唐書本紀乾寜三年楊行密陷光州刺史劉存死之九國志柴再用𫝊乾寜中從朱延壽平劉存于弋陽授知光州軍事梁兵冦光州再用擊走之事俱與是書異又從李彦威復黄州獲刺史瞿章案全忠陷黄州新唐書作乾寜四年九國志作三是書繫光化元年年與諸史異張存敬擒刺史陶建釗案建釗原本作建鈺今據通鑑改正舊五代史卷二十攷證
