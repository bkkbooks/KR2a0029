body:
  text: 舊五代史卷一百十攷證周太祖紀一八月六日帝發離京師二十日師至河中案五代春秋作七月郭威率師圍河中據此紀則周太祖以八月六日始發京師非七月即圍河中也是書漢隱帝紀與此紀互異攷證見漢紀城䧟守貞舉家自焚而死案歐陽史周本紀云守貞與妻子自焚死思綰景崇相次降今考是書漢紀五月乙丑趙思綰乞降七月甲子郭威奏收復河中守貞自燔死是思綰之降在守貞自焚之前也又云三年正月趙暉奏收復鳳翔王景崇自燔死是景崇未嘗降也歐陽史漢本紀亦先載趙思綰降後書克河中王景崇傳亦作景崇自燔死紀傳前後自相予盾當以是書為得其實戊寅湘隂公殂案歐陽史作十二月王峻遣郭崇以騎兵七百逆劉贇於宋州殺之通鑑作正月戊寅殺湘隂公於宋州舊五代史卷一百十攷證
