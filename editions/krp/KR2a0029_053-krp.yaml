body:
  text: 舊五代史巻二十六宋門下侍郎參知政事監修國史薛居正等撰唐書第二武皇紀下景福元年正月鎮州王鎔恃燕人之援率兵十餘萬攻邢州之堯山武皇遣李存信將兵應援李存孝素與存信不協遞相猜貳畱兵不進武皇又遣李嗣勲李存審將兵援之大破燕趙之衆斬首三萬収其軍實三月武皇進軍渡滹沱攻欒城下鼓城槀城四月燕軍寇雲代武皇班師八月赫連鐸誘幽州李匡威之衆八萬寇天成軍遂攻雲州營于州北連亘數里武皇潛軍入于雲州詰旦出騎軍以擊之斬獲數萬李匡威燒營而遁十月邢州李存孝叛納欵于梁李存信構之也景福二年春大舉以伐王鎔以其通好于李存孝也二月攻天長鎮旬日不下王鎔出師三萬來援武皇逆戰于叱日嶺下鎮人敗斬首萬餘級時嵗飢軍乏食脯屍肉而食之進軍下井陘李存孝將兵夜入鎮州鎮人乞師于汴汴帥方攻時溥不暇應之乃求援于幽州李匡威率兵赴之武皇乃班師七月武皇討李存孝于邢州遂攻平山渡滹水攻鎮州王鎔懼以帛五十萬犒軍請修舊好仍以鎮冀之師助擊存孝許之武皇進圍邢州十二月武皇狩于近郊獲白有角長三寸乾寧元年三月邢州李存孝出城首罪縶歸太原轘于市邢洺磁三州平武皇表馬師素爲邢州節度使五月鄆州節度使朱瑄爲汴軍所攻遣使來乞師武皇遣騎將安福順安福應安福遷督精騎五百假道于魏州以應之九月潞州節度使康君立以酖死十月武皇自晉陽率師伐幽州初李匡儔奪據兄位燕人多不義之安塞軍戍將劉仁恭挈族歸于武皇武皇遇之甚厚仁恭數進畫于蓋寓言幽州可取之狀願得兵一萬指期平定武皇方討李存孝于邢州輟兵數千欲納仁恭不利而還匡儔由是驕怠數犯邊境武皇怒故率軍以討之是時雲州吐渾赫連鐸白義誠竝來歸命皆笞而釋之十一月進攻武州甲寅攻新州十二月李匡儔命大將率步騎六萬救新州武皇選精甲逆戰燕軍大敗斬首萬餘級生獲將領百餘人曳練徇于新州城下是夜新州降辛亥進攻嬀州壬子燕兵復合于居庸關拒戰武皇命精騎以疲之令步將李存審由他道擊之自午至晡燕軍復敗甲寅李匡儔擕其族棄城而遁將之滄州隨行輜車臧獲妓妾甚衆滄帥盧彦威利其貨以兵攻匡儔于景城殺之盡擄其衆丙辰進軍幽州其守城大將請降武皇令李存審與劉仁恭入城撫勞居人如故市不改肆封府庫以迎武皇乾寧二年正月武皇在幽州命李存審劉仁恭徇諸屬郡二月以仁恭爲權幽州畱後從燕人之請也畱腹心燕畱德等十餘人分典軍政武皇遂班師凡駐幽州四十日六月武皇率蕃漢之師自晉陽趨三輔討鳯翔李茂貞邠州王行瑜華州韓建之亂先是三帥稱兵向闕同弱王室殺害宰輔時河中節度使王重盈卒重榮之子珂即武皇之子婿也權典軍政其兄珙爲陜州節度使瑤爲絳州刺史與珂争河中遂訴于岐邠華三鎮言珂本蒼頭不當襲位珂亦訴于武皇武皇上表保薦珂乞授河中旄鉞詔可之三帥遂以兵入覲大掠京師請授王珂同州節度使王瑤河中節度使天子亦許之武皇遂舉兵表三帥之罪復移檄三鎮三鎮大懼是月次絳州刺史王瑤登陴拒命武皇攻之旬日而拔斬王瑤于軍門誅其黨千餘人七月次河中王珂迎謁于路已未同州節度使王行約棄城奔京師與左軍兵士刼掠西市都民大擾行約即行瑜弟也庚申樞密使駱全瓘以武皇之軍將至請天子幸右軍指揮使李繼鵬茂貞假子也本姓閻名珪與全瓘謀刼天子幸鳯翔左軍指揮使王行實亦行瑜之弟也與劉景宣欲刼天子幸邠州兩軍相攻縱火燒内門煙火蔽天天子急詔鹽州六都兵士令追殺亂兵左右軍退走王行瑜李茂貞聲言自來迎駕天子懼出幸南山駐蹕于莎城是夜熒惑犯心壬戌武皇進收同州聞天子幸石門遣判官王瓌奉表奔問天子遣使賜詔令與王珂同討邠鳯時武皇方攻華州俄聞李茂貞領兵士三萬至盩厔王行瑜領兵至興平欲往石門迎駕乃觧華州之圍進營渭橋天子遣延王戒丕丹王允齎詔促武皇兵直抵邠鳯八月乙酉供奉官張承業齎詔告諭涇帥張鐺巳領步騎三萬于京西北扼邠岐之路武皇進營渭北遣史儼將三千騎往石門扈駕遣李存信李存審會鄜延之兵攻行瑜之梨園寨天子削奪行瑜官爵以武皇爲天下兵馬都招討使以鄜州李思孝爲北面招討使以涇州張鐺爲西南面招討使天子又遣延王丹王賜武皇御衣及大將茶酒弓矢命二王兄事武皇延王傳天子密㫖云一昨非卿至此已爲賊庭行酒之人矣所慮者二凶締合卒難剪除且欲姑息茂貞令與卿修好俟梟斬行瑜更與卿商量武皇上表請駕還京令李存節領二千騎于京西北以防邠賊奔突辛亥天子還宫加武皇守太師中書令邠寧四面行營都統時王行瑜弟兄固守梨園寨我師攻之甚急李茂貞遣兵萬餘來援行瑜營于龍泉鎮茂貞自率兵三萬迫咸陽武皇奏請詔茂貞罷兵兼請削奪茂貞官爵詔曰茂貞勒兵蓋備非常尋已發遣歸鎮又言茂貞已誅李繼鵬李繼晸卿可切戒兵甲無犯土疆武皇請賜河中王珂旌節三表許之又表李罕之為副都統十月丙戌李存信于梨園寨北遇賊軍斬首千餘級自是賊閉壁不出戊子天子賜武皇内弟子四人又降朱書御札賜魏國夫人陳氏是月王行瑜因敗衂之後閉壁自固武皇令李罕之晝夜急攻賊軍乏食拔營而去李存信與罕之等先伏軍于阨路俟賊軍之至縱兵擊之殺戮萬計是日收梨園等三寨生擒行瑜之子知進竝母丘氏大將李元福等二百人送赴闕庭庚寅王行約王行實燒刼寧州遁走寧州守將徐景乞降武皇表蘇文建爲邠州節度使且于寧州爲治所十一月丁巳收龍泉寨時行瑜以精甲五千守之李茂貞出兵來援爲李罕之所敗邠賊遂棄龍泉寨而去行瑜復入邠州大軍進逼其城行瑜登城號哭曰行瑜無罪昨殺南北司大臣是岐帥將兵脅制主上請治岐州行瑜乞束身歸朝武皇報曰王尚父何恭之甚耶僕受命討三賊臣公其一也如能束身歸闕老夫未敢專命爲公奏取進止行瑜懼棄城而遁武皇收其城封府庫遽以捷聞旣而慶州奏王行瑜將家屬五百人到州界爲部下所殺傳首闕下武皇旣平行瑜還軍渭北十二月武皇營于雲陽候討鳯翔進止乙未天子賜武皇爲忠貞平難功臣進封晉王加實封二百戸武皇復上表請討李茂貞天子不允武皇私謂詔使曰觀主上意疑僕别有他腸復何言哉但禍不去胎憂患未已又奏臣統領大軍不敢逕赴朝覲遂班師乾寧三年正月汴人大舉以攻兖鄆朱瑄朱瑾再乞師于武皇假道于魏州羅𢎞信許之乃令都指揮使李存信將步騎三萬與李承嗣史儼㑹軍以拒汴人存信軍于莘與朱瑾合勢頻挫汴軍汴帥患之乃間魏人存信御兵無法稍侵魏之芻牧者𢎞信乃與汴帥通出師三萬攻存信軍存信揭營而退保于洺州三月武皇大掠相魏諸邑攻李固洹水殺魏兵萬餘人進攻魏州五月汴將葛從周氏叔琮引兵赴援六月李茂貞舉兵犯京師七月車駕幸華州是月武皇與汴軍戰于洹水之上鐵林指揮使落落被擒落落武皇之長子也旣戰馬踣于坎武皇馳騎以救之其馬亦踣汴之追兵將及武皇背射一發而斃乃退九月李存信攻魏之臨清汴將葛從用等引軍來援大敗于宗城北存信進攻魏州十月武皇敗魏軍于白龍潭追擊至觀音門汴軍救至乃退十一月武皇徴兵于幽鎮定三州將迎駕于華下幽州劉仁恭託以契丹入寇俟敵退聽命乾寧四年正月汴軍陷兖鄆騎將李承嗣史儼與朱瑾同奔于淮南三月陜帥王珙攻河中王珂來告難武皇遣李嗣昭率二千騎赴之破陜軍于猗氏乃觧河中之圍至是天子遣延王戒丕至晉陽傳宣㫖于武皇朕不取卿言以及于此茍非英賢竭力朕何由再謁廟廷在卿表率予所望也七月武皇復徵兵于幽州劉仁恭辭㫖不遜武皇以書讓之仁恭捧書謾罵抵之于地仍囚武皇之行人八月大舉以伐仁恭九月師次蔚州戊寅晨霧晦暝占者云不利深入辛已攻安寨俄報燕將單可及領騎軍至矣武皇方置酒高㑹前鋒又報賊至矣武皇曰仁恭何在曰但見可及輩武皇張目怒曰可及輩何足爲敵仍促令出師燕軍已擊武皇軍寨武皇乘醉擊賊燕軍披靡時步兵望賊而退爲燕軍所乘大敗于木𤓰澗俄而大風雨震電燕軍觧去武皇方醒甲午師次代州劉仁恭遣使謝罪于武皇武皇亦以書報之自此有檄十餘返光化元年春正月鳯翔李茂貞華州韓建皆致書于武皇乞修和好同奬王室兼乞助丁匠修繕秦宫武皇許之四月汴將葛從周寇邢洺磁等州旬日之内三州連陷汴人以葛從周爲邢州節度使大將李存信收軍自馬嶺而旋八月壬戌天子自華還宫是時車駕初復而欲諸侯輯睦賜武皇詔令與汴帥通好武皇不欲先下汴帥乃致書于鎭州王鎔令導其意明年汴帥遣使奉書幣來修好武皇亦報之自是使車交馳朝野相賀九月武皇遣周德威李嗣昭率兵三萬出青山口以迫邢洺十月遇汴將葛從周于張公橋旣戰我軍大敗是月河中王珂來告急言王珙引汴軍來寇武皇遣李嗣昭將兵三千以援之屯于胡壁堡汴軍萬餘人來拒戰嗣昭擊退之十二月潞州節度使薛志勤卒澤州刺史李罕之以本軍夜入潞州據城以叛罕之報武皇曰薛鐵山新死潞民無主慮軍城有變輒專命鎮撫武皇令人讓之罕之乃歸于汴武皇遣李嗣昭將兵討之下澤州收罕之家屬拘送晉陽光化二年春正月李罕之陷沁州三月汴將葛從周氏叔琮自土門陷承天軍又陷遼州進軍榆次武皇令周德威擊之敗汴軍于洞渦驛叔琮棄營而遁德威追擊出石會關殺千餘人汴人復陷澤州五月武皇令都指揮使李君慶將兵收澤潞爲汴軍所敗而還以李嗣昭爲都指揮使進攻潞州八月嗣昭營于潞州城下前鋒下澤州時汴將賀德倫張歸厚等守潞州是月德倫等棄城而遁潞州平九月武皇表汾州刺史孟遷爲潞州節度使光化三年汴軍大寇河朔幽州劉仁恭乞師武皇遣周德威帥五千騎以援之七月李嗣昭攻堯山至内丘敗汴軍于沙河進攻洺州下之九月汴帥自將兵三萬圍洺州嗣昭棄城而歸葛從周設伏于青山口嗣昭之軍不利十月汴人乘勝寇鎭定鎭定懼皆納賂于汴是時周徳威與燕軍劉守光敗汴人二萬于望都聞定州王郜來奔乃班師是月天子加武皇實封一百戸遣李嗣昭率歩騎三萬攻懷州下之進攻河陽汴將閻寳率軍來援嗣昭退保懷州天復元年正月汴將張存敬攻陷晉絳二州以兵二萬屯絳州以扼援路二月張存敬迫河中王珂告急于武皇使者相望于路珂妻邠國夫人武皇愛女也亦以書至懇切求援武皇報曰賊阻道路衆寡不敵救爾即與爾兩亡可與王郎棄城歸朝珂遂送欵于張存敬三月汴帥自大梁至河中王珂遂出迎尋徙于汴天子以汴帥兼鎭河中武皇自是不復能援京師霸業由是中否四月汴將氏叔琮率兵五萬自太行路寇澤潞魏博大將張文恭領軍自新口入葛從周領兖鄆之衆自土門入張歸厚以邢洺之衆自馬嶺入定州王處直之衆自飛狐入侯言以晉絳之兵自陰地入氏叔琮康懐英營于澤州之昻車武皇令李嗣昭將三千騎赴澤州援李存璋而歸賀德倫氏叔琮軍至潞州孟遷開門迎沁州刺使蔡訓亦以城降于汴氏叔琮悉其衆趨石會關是時偏將李審建先統兵三千在潞州亦與孟遷降于汴及叔琮之入寇也審建爲其郷導汴人營于洞渦别將白奉國與鎭州大將石公立自井陘入陷承天軍及攻壽陽遼州刺史張鄂以城降于汴都人大恐時霖雨積旬汴軍屯聚旣衆芻糧不給復多痢瘧師人多死時大將李嗣昭李嗣源每夜率驍騎突營掩殺敵衆恐懼五月汴軍皆退氏叔琮軍出石會周德威李嗣昭以精騎五千躡之殺戮萬計初汴軍之將入寇也汾州刺史李瑭據城叛以連汴人至是武皇令李嗣昭李存審將兵討之是歲并汾飢粟暴貴人多附瑭爲亂嗣昭悉力攻城三日而拔擒李瑭等斬于晉陽市氏叔琮旣旋軍過潞州擄孟遷以歸汴帥以丁會爲潞州節度使六月遷李嗣昭周徳威將兵出陰地攻慈隰二郡隰州刺史唐禮慈州刺史張瓌竝以城來降武皇以汴寇方盛難以兵服佯降心以緩其謀乃遺牙將張特持幣馬書檄以諭之陳當時利害請復舊好十一月壬子汴帥營于渭濱甲寅天子出幸鳯翔新唐書帝如鳯翔李茂貞韓全誨請召克用入衛克用間道遣使者奔問竝遺書全忠勸還汴全忠不答書武皇遣李嗣昭率兵三千自沁州趨平陽遇汴軍于晉州北斬首五百級天復二年二月李嗣昭周德威領大軍自慈隰進攻晉絳營于蒲縣乙未汴將朱友寧氏叔琮將兵十萬營于蒲縣之南乙已汴帥自領軍至晉州德威之軍大恐三月丁巳有虹貫德威之營戊午氏叔琮率軍來戰德威逆擊爲汴人所敗兵仗輜車委棄殆盡朱友寧長驅至汾州慈隰二州復爲汴人所據辛酉汴軍營于晉陽之西北攻城西門周德威李嗣昭緣山保其餘衆而旋武皇驅丁壯登陴拒守汴軍攻城日急武皇召李嗣昭周德威等謀將出奔雲州嗣昭以爲不可李存信堅請且入北蕃續圖進取嗣昭等固争之太妃劉氏亦極言于内乃止居數日亡散之士復集軍城稍安李嗣昭與李嗣源夜入汴軍斬將搴旗敵人扞禦不暇自相驚擾丁卯朱友寧燒營而遁周德威追至白壁關俘斬萬計因收復慈隰汾等三州天復三年正月天子自鳯翔歸京五月雲州都將王敬暉殺刺史劉再立以城歸于劉仁恭武皇遣李嗣昭討之仁恭遣將以兵五萬來援雲州嗣昭退保樂安燕人擄敬暉棄城而去武皇怒笞嗣昭及李存審而削其官是時親軍萬衆皆邊部人動違紀律人甚苦之左右或以爲言武皇曰此輩膽畧過人數十年從吾征伐比年以來國藏空竭諸軍之家賣馬自給今四方諸侯皆懸重賞以募勇士吾若束之以法急則棄吾吾安能獨保此乎俟時開運泰吾固自能處置矣天祐元年閏四月汴帥迫天子遷都于洛陽新唐書帝東遷詔至太原克用泣謂其下曰乘輿不復西矣遣使者奔問行在五月乙丑天子制授武皇叶盟同力功臣加食邑三千戸實封三百戸八月汴帥遣朱友恭弑昭宗于洛陽宫輝王卽位告哀使至晉陽武皇南向慟哭三軍縞素天祐二年春契丹按巴堅始盛武皇召之按巴堅領其部族凡三十萬人至雲州與武皇㑹于雲州之東握手甚歡因結爲兄弟旬日而去畱馬千匹牛羊萬計期以冬初大舉渡河天祐三年正月魏博旣殺牙軍魏將史仁遇據高唐以叛遣人乞師于武皇武皇遣李嗣昭率三千騎攻邢州以應之遇汴將牛存節張筠于青山口嗣昭不利而還九月汴帥親率兵攻滄州幽州劉仁恭遣使來乞師武皇乃徴兵于仁恭將攻潞州以解滄州之圍仁恭遣掌書記馬郁都指揮使李溥等將兵三萬㑹于晉陽武皇遣周德威李嗣昭合燕軍以攻澤潞十二月潞州節度使丁㑹開門迎降命李嗣昭爲潞州節度使以丁㑹歸于晉陽天祐四年正月甲申汴帥聞潞州失守自滄州燒營而遁四月天子禪位于汴帥奉天子爲濟陰王改元爲開平國號大梁是歲四川王建遣使至勸武皇各王一方俟破賊之後訪唐朝宗室以嗣帝位然後各歸藩守武皇不從以書報之曰竊念本朝屯否巨業淪胥攀鼎駕以長違撫彤弓而自咎黙黙終古悠悠彼蒼生此厲階永爲痛毒視横流而莫救徒誓檝以興言别捧函題過垂奬諭省覽周旣駭惕異常淚下霑衿倍鬱申胥之素汗流浹背如聞蔣濟之言僕經事兩朝受恩三代位叨將相籍係宗枝賜鈇鉞以專征徵苞茅而問罪鏖兵校戰二十餘年竟未能斬新莽之頭顱斷蚩尤之肩髀以至廟朝顚覆豺虎縱横且授任分憂叨策冒寵龜玉毁櫝誰之咎歟俯閲指陳不勝慙恧然則君臣無常位陵谷有變遷或箠塞長河泥封函谷時移事改理有萬殊卽如周末虎争魏初鼎據孫權父子不顯授于漢恩劉備君臣自㣲興于涿郡得之不謝于家世失之無損于功名適當逐鹿之秋何惜華蟲之服惟僕累朝席寵奕世輸忠忝佩訓詞粗存家法善博奕者惟先守道治蹊田者不可奪牛誓于此生靡敢失節仰憑廟勝早殄寇讎如其事與願違則共臧洪遊于地下亦無恨矣惟公社稷元勲嵩衡降祉鎭九州之上地負一代之𢎞才合于此時自求多福所承良訊非僕深心天下其謂我何有國非吾節也慺慺孤懇此不盡陳五月梁祖遣其將康懷英率兵十萬圍潞州懷英驅率士衆築壘環城城中音信斷絶武皇遣周德威將兵赴援德威軍于余吾率先鋒挑戰日有俘獲懷英不敢卽戰梁祖以懷英無功乃以李思安代之思安引軍將營于潞城周德威以五千騎搏之梁軍大敗斬首千餘級思安退保堅壁别築外壘謂之夾寨以抗我之援軍梁祖調發山東之民以供饋運德威日以輕騎掩之運路難阻衆心益恐李思安乃自東南山口築夾道連接夾寨以通饋運自是梁軍堅保夾寨冬十月武皇有疾是時晉陽城無故自壞占者惡之天祐五年正月戊子朔武皇疾革辛卯崩于晉陽年五十三遺令薄葬發喪後二十七日除服莊宗卽位追諡武皇帝廟號太祖陵在鴈門東五代史補太祖武皇本朱耶赤心之後沙陀部人也其先生于雕窠中酋長以其異生諸族傳飬之遂以諸爺為氏言非一父所飬也其後言訛以諸為朱以爺為耶至太祖生眇一目長而驍勇善騎射所向無敵時謂之獨眼龍大為部落所疾太祖恐禍及遂舉族歸唐授雲州刺史賜姓李名克用黄巢犯長安自北引兵赴難功成遂拜太原節度使封晉王武皇之有河東也威聲大振淮南楊行密常恨不識其狀貌因使畫工詐為商賈徃河東冩之畫工到未㡬人有知其謀者擒之武皇初甚怒既而親謂曰且吾素眇一目試召亟使冩之觀其所為如何及至武皇按膝厲聲曰淮南使汝來冩吾真必畫工之尤也冩吾不及十分即階下便是死汝之所矣畫工再拜下筆時方盛暑武皇執八角扇因冩扇角半遮其靣武皇曰汝謟吾也遽使别寫之又應聲下筆畫其臂弓撚箭之狀仍微合一目以觀箭之曲直武皇大喜因厚賂金帛遣之五代史闕文世傳武皇臨薨以三矢付莊宗曰一矢討劉仁黎汝不先下幽州河南未可圖也一矢擊契丹且日按巴堅與吾把臂而盟結為兄弟誓復唐家社稷今背約附賊汝必伐之一矢滅朱温汝能成吾志死無憾矣莊宗藏三矢於武皇廟庭及討劉仁㳟令幕吏以少牢告廟請一矢盛以錦囊使親將負之以為前驅凱旋之日随俘馘納矢於太廟伐契丹滅朱氏亦如之又武皇眇一目謂之獨眼龍性喜殺左右有小過失必寘於死初諱眇人無敢犯者嘗令寫真畫工即為撚箭之狀微暝一目圖成而進武皇太悦賜予甚厚史臣曰武皇肇跡隂山赴難唐室逐豺狼於魏闕殄氛祲於秦川賜姓受封奄有汾晉可謂有功矣然雖茂勤王之績而非無震主之威及朱旗屯渭曲之帥俾翠輦有石門之幸比夫桓文之輔周室無乃有愧乎乎洎失援於蒲絳久垂翅於并汾若非嗣子之英才豈有興王之茂業矧累功積徳未比於周文創業開基尚虧於魏祖追諡為武斯亦幸焉舊五代史巻二十六
