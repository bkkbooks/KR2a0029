body:
  text: 舊五代史巻一百二十九考證周列傳九張頴傳國初以戚里之故自華州司馬歴郢懷二州刺史遷安州防禦使案宋史作事晉為安州防禦使與是書異劉仁贍傳時仁贍卧疾已亟因翻然納欵案歐陽史云仁贍固守三月病甚已不知人其副使孫羽詐為仁贍書以城降是仁贍未嘗親納欵于周也是書作翻然納欵葢仍周實録原文未及釐正案巴堅舊作阿保機今改舊五代火巻一百二十九考證
