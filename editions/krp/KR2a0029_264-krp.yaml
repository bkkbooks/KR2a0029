body:
  text: 舊五代史巻一百三十三攷證世襲列傳二髙季興傳至襄州酒酣謂孔勍曰是行有二錯來朝一錯放回二錯案歐陽史作季興謂梁震語與是書作孔勍異高從誨傳乾祐元年冬十一月以疾薨于位十一月歐陽史作十月高保朂傳皇朝建隆四年春卒四年歐陽史作三年十一月馬殷傳許州鄢陵人也案通鑑作扶溝人歐陽史從是書長興二年十一月十日薨于位時年七十八案歐陽史作長興元年殷卒年七十九馬希範傳谿州洞蠻彭士愁士愁原本訛士秋今据歐陽史及通鑑改正舊五代史卷一百三十三攷證
