body:
  text: 舊五代史巻五十六宋門下侍郎參知政事監修國史薛居正等撰唐書第三十二列傳八周徳威字鎮逺小字陽五朔州馬邑人也初事武皇為帳中騎督驍勇使騎射膽氣智數皆過人久在雲中諳熟邊事望煙塵之警懸知兵勢乾寧中為鐡林軍使從武皇討王行瑜以功加檢校左僕射移内衙軍副光化二年三月汴將氏叔琮率衆逼太原有陳章者以虓勇知名衆謂之夜乂言于叔琮曰晉人所恃者周陽五願擒之請賞以郡陳章嘗乗驄馬朱甲以自異武皇减徳威曰我聞陳夜乂欲取爾求郡宜善備之徳威曰陳章大言未知鹿死誰手他日致師戒部下曰如陣上見陳夜乂爾等但走徳威微服挑戰部下偽退陳章縱追之徳威背揮鐡撾擊墮馬生獲以獻由是知名天復中我師不利于潘縣汴將朱友寧氏叔琮來逼晉陽時諸軍未集城中大恐徳威與李嗣昭選募銳兵出諸門攻其壘擒生斬馘汴人枝梧不暇乃退天祐三年與李嗣昭合燕軍攻潞州降丁㑹以功加檢校太保代州刺史代嗣昭為蕃漢都將李思安之冦潞州也徳威軍於余吾時汴軍十萬築夾城圍潞州内外斷絶徳威以精騎薄之屢敗汴人進營髙河令遊騎邀其芻牧汴軍閉壁不出乃自東門山口築甬道樹栅以通夾城徳威之騎軍倒牆堙塹日數十戰前後俘馘不可勝紀梁有驍將黄角鷹方骨崙皆生致之五年正月武皇疾篤徳威退營亂栁武皇厭代四月命徳威班師時莊宗初立徳威外握兵柄頗有浮議内外愛之徳威既至單騎入謁伏靈柩哭哀不自勝由是羣情釋然是月二十四日從莊宗再援潞州二十九日徳威前軍營横碾距潞四十五里五月朔晨霧晦暝王師伏于三垂岡下翼日直趨夾城斬闗破壘梁人大敗解潞州之圍初徳威與李嗣昭有私憾武皇臨終顧謂莊宗曰進通忠孝不負我重圍累年似與徳威有隙以吾命諭之若不解重圍歿有遺恨莊宗達遺旨徳威感泣由是勵力堅戰竟破强敵與嗣昭歡愛如初以功加檢校太保同平章事振武節度使七年岐人攻靈夏遣使來求助徳威渡河以應之師還授蕃漢馬步總管七年十一月汴人據深冀汴將王景仁軍八萬次柏鄉鎮州節度使王鎔來告難帝遣徳威率前軍出井陘屯于趙州十二月帝親征二十五日進薄汴營距柏鄉五里營於野河上汴將韓勍率精兵三萬鎧甲皆被繒綺金銀炫曜望之森然我軍懼形於色徳威謂李存璋曰賊結陣而來觀其形勢志不在戰欲以兵甲燿威耳我軍人乍見其來謂其鋒不可當此時不挫其銳吾軍不振矣乃遣存璋諭諸軍曰爾見此賊軍否是汴州天武徤兒皆屠活傭販虚有表耳縱被精甲十不當一擒獲足以為資徳威自率精騎擊其兩偏左馳右決出沒數四是日獲賊百餘人賊渡河而退徳威謂莊宗曰賊驕氣充盛宜按兵以待其衰莊宗曰我提孤軍救難解紛三鎮烏合之衆利在速戰卿欲持重吾懼其不可使也徳威曰鎮定之士長于守城列陣野戰素非便習我師破賊惟恃騎軍平田廣野易為施功今壓賊營令彼見我虚實則勝負未可必也莊宗不悦退卧帳中徳威患之謂監軍張承業曰王欲速戰將烏合之徒欲當劇賊所謂不量力也去賊咫尺限此一渠水彼若早夜以畧彴渡之吾族其為俘矣若退軍鄗邑引賊離營彼出則歸復以輕騎掠其芻餉不踰月敗賊必矣承業入言莊宗乃釋然徳威得降人問之景仁下令造浮橋數日果如徳威所料二十七日乃退軍保鄗邑八年正月二日徳威率騎軍致師于柏鄉設伏于村塢間令三百騎以壓汴營王景仁悉其衆結陣而來徳威轉戰而退汴軍因而乗之至于鄗邑南時步軍未成列徳威陣騎河上以抗之亭午兩軍皆陣莊宗問戰時徳威曰汴軍氣盛可以勞逸制之造次輕力殆難與敵古者師行不踰一舍盖慮糧餉不給士有饑色今賊逺來決戰縱挾糗糒亦不遑食晡晩之後饑渴内侵戰陣外迫士心既倦將必求退乗其勞弊以生兵制之縱不大敗偏師必喪以臣所籌利在晡晩諸將皆然之時汴軍以魏博之人為右廣宋汴之人為左廣自未至申陣勢稍卻徳威麾軍呼曰汴軍走矣塵埃漲天魏人収軍漸退莊宗與史建瑭安金全等因衝其陣夾攻之大敗汴軍殺戮殆盡王景仁李思安僅以身免獲將校二百八十人八月劉守光僭稱大燕皇帝十二月遣徳威率步騎三萬出飛狐與鎮州將王徳明定州將程嚴等軍進討九年正月収涿州降刺史劉知溫五月七日劉守光令驍將單廷珪督精甲萬人出戰徳威遇于龍頭岡初廷珪謂左右曰今日擒周陽五既臨陣見徳威廷珪單騎持槍躬追徳威垂及徳威側身避之廷珪少退徳威奮檛擊墜其馬生獲廷珪賊黨大敗斬首三千級獲大將李山海等五十二人十二日徳威自涿州進軍良鄉大城守光既失廷珪自是奪氣徳威之師屢收諸郡降者相繼十年十一月擒守光父子幽州平十二月授徳威檢校侍中幽州盧龍等軍節度使徳威性忠孝感武皇奬遇嘗思臨難忘身十二月汴將劉鄩自洹水乘虛將冦太原徳威在幽州聞之徑以五百騎馳入土門聞鄩軍至樂平不進徳威徑至南宫以候汴軍初劉鄩欲據臨清以扼鎮定轉餉之路行次陳宋口徳威遣將擒數十人皆倳刃于背縶而遣之既至謂劉鄩曰周侍中巳據宗城矣徳威其夜急騎扼臨清劉鄩乃入貝州是時徳威若不至則勝負未可知也十四年三月契丹冦新州徳威不利退保范陽遼史太祖紀神冊二年三月辛亥攻幽州節度使周徳威以幽并鎮定魏五州兵拒戰于居庸關之西戰于新州東大破之斬首三萬級又通鑑契丹主帥衆三十萬徳威衆寡不敵大為契丹所敗敵衆攻僅二百日外援未至徳威撫循士衆晝夜乘城竟獲保守十五年我師營麻口渡將大舉以定汴州徳威自幽州率大軍至十二月二十三日軍次胡栁陂詰旦騎報曰汴軍至矣莊宗使問戰備徳威奏曰賊倍道而來未成營壘我營柵巳固守備有餘既深入賊疆須決萬全之䇿此去大梁信宿賊之家屬盡在其間人之常情孰不以家國為念以我深入之衆抗彼激憤之軍不以方畧制之恐難必勝王但按軍保柵臣以騎軍疲之使彼不得下營際晩糧餉不給進退無據因以乘之破賊之道也莊宗曰河上終日挑戰恨不遇賊今款門不戰非壯夫也乃率親軍成列而出徳威不獲已從之謂其子曰吾不知其死所矣莊宗與汴將王彦章接戰大敗之徳威之軍在東偏汴之游軍入我輜重衆駭奔入徳威軍因紛擾無行列徳威兵少不能解父子俱戰沒先是鎮星犯上將星占者云不利大將是夜収軍徳威不至莊宗慟哭謂諸將曰喪我良將吾之咎也徳威身長面黑笑不改容凡對敵列陣凜凜然有肅殺之氣中興之朝號為名將及其歿也人皆惜之同光初追贈太師天成中詔與李嗣昭符存審配饗莊宗廟廷晉髙祖即位追封燕王子光輔歴汾汝州刺史符存審字徳詳陳州宛邱人歐陽史義兒𫝊惟符存審不在其列别自為𫝊盖存審子彦卿有女為宋太宗后故存其本姓也舊名存父楚本州牙將存審少豪俠多智算言兵家事乾符末河南盜起存審鳩率豪右庇捍州里㑹郡人李罕之起自羣盜授光州刺史因徃依之中和末罕之為蔡冦所逼棄郡投諸葛爽存審從至河陽為小校屢戰蔡賊有功諸葛爽卒罕之為其部將所逼出保懷州部下分散存審乃歸于武皇武皇署右職令典義兒軍賜姓名存審性謹厚寵遇日隆自是武皇西征存審常從所至立功從討赫連鐸冒刃死戰血流盈袖武皇手自封瘡日夕臨問乾寧初討李匡儔存審前軍拔居庸闗明年從討邠州時邠之勁兵屯龍泉寨四面懸崖石壁險固存審奮力拔之師還授檢校左僕射副李嗣昭討李康于汾州擒之以功改左右廂步軍都指揮使天祐三年授蕃漢馬步副指揮使與李嗣昭降丁㑹于上黨從周徳威破梁兵于夾城以功檢校司徒授忻州刺史領蕃漢馬步都指揮使七年校校太保充蕃漢總管莊宗擊汴人于柏鄉留存審守太原三月代李存璋戌趙州九年梁祖攻蓨縣存審與史建瑭李嗣肱赴援屯下博橋汴人驚亂燒營而遁以功遙領邢洺磁團練使十二年魏博歸款于莊宗遣存審率前鋒據臨清以俟進取莊宗入魏存審屯魏縣以抗劉鄩六月鄩營革縣存審與鎮定之師營莘西三十里一日數戰八月率師攻張源徳于貝州十三年二月劉鄩自莘悉衆來襲我魏州存審以大軍踵其後戰于故元城大敗汴人從收澶衛磁洺等州秋邢州閻寶降授存審安國軍節度邢洺磁等州觀察使十月戴思逺棄滄州毛璋以城降授存審檢校太傅横海軍節度使兼領魏博馬步軍都指揮使明年就加平章事十四年八月將兵援周徳威于幽州敗契丹之衆冬破汴將安彦之于楊劉諸軍進營麻口時梁將謝彦章營行臺村莊宗勇于接戰每以輕騎當之遇窘者數四存審每俟其出必叩馬諫曰王將復唐宗社宜為天下自愛搴旗挑戰一劒之任無益聖徳請責效于臣古人不以賊遺君父臣雖不武敢不代君之憂莊宗即時迴駕十二月戰于胡栁晡晩之後存審引所部銀槍効節軍敗梁軍于土山下是日辰巳間周徳威戰殁一軍逗撓梁軍四集存審與其子彦圖冒刃血戰出沒賊陣與莊宗軍合于午後師復集擊敗汴人十六年春代周徳威為内外蕃漢馬步總管于徳勝口築南北城以據之七月汴將王瓚自黎陽渡河冦澶州存審拒戰瓚退營于楊村渡控我上游自是日與交鋒對壘經年大小凡百餘戰十七年汴將劉鄩攻同州朱友謙求援于我遣存審與李嗣昭將兵赴之九月次河中進營朝邑時河中久臣于梁衆持兩端及諸軍大集芻栗暴貴嗣昭懼其翻覆將急戰以定勝負居旬日梁軍逼我營㑹望氣者言西南黑氣如鬭雞之狀當有戰陣存審曰我方欲決戰而形于氣象得非天贊歟是夜閲其衆詰旦進軍梁軍來逆戰大敗之追斬二千餘級自是梁軍保壘不出存審謂嗣昭曰吾初懼劉鄩據渭河偏師既敗彼若退歸懼我踵之窮獸搏人勿謂無事可開其歸路然後追奔乃令王建及牧馬于沙苑劉鄩尹皓知之保衆退去歐陽史鄩以為晉軍且懈乃夜遁去存審追擊于渭河又大敗之遂解同州之圍存審略地至奉先謁諸帝陵乃班師十八年王師討張文禮于鎮州李嗣昭李存進相次戰歿十九年遣存審率師進攻叛帥于城下文禮之將李再豐隂送款于存審我師中夜登城擒文禮之子處球等露布以獻鎮州平以功加檢校太傅兼侍中二十年正月師還于魏州莊宗出城迎勞就第宴樂無何契丹犯燕薊郭崇韜奏曰汴冦未平繼韜背叛北邊捍禦非存審不可上遣中使諭之存審卧病羸瘠附奏曰臣効忠稟命靡敢為辭但痾恙纒緜未堪祗役既而詔存審以本官充幽州盧龍節度使自鎮州之任同光初加開府儀同三司檢校太師中書令食邑千户賜號忠烈扶天啟運功臣十月平梁遷都洛陽存審以身為大將不得預収復中原之功舊疾愈作堅求入覲尋醫以情告郭崇韜時崇韜自負一時佐命之功無出已右功名事望素在存審之下權勢既隆人士輻湊不欲存審加于巳上每有章奏求覲即隂沮之存審妻郭氏泣訢于崇韜曰吾夫于國麤効驅馳與公鄉里親舊公忍令死棄北荒何無情之如是崇韜益慙戁明年春疾甚上章懇切乞生覲天顔不許存審伏枕面歎曰老夫歴事二主垂四十年幸而遇今日天下一家逺夷極塞皆得面覲彤墀射鉤斬袪之人孰不奉觴丹陛獨予壅隔豈非命哉漸增危篤崇韜奏請許存審入覲四月制授存審宣武軍節度使諸道審漢馬步總管詔未至五月十五日卒于幽州官舍時年六十三遺命葬太原存審遺奏陳叙不得面覲詞旨悽惋莊宗震悼久之廢朝三日贈尚書令存審少在軍中識機知變行軍出師法令嚴明決䇿制勝從無遺悔功名與周徳威相匹皆近代之良也常戒諸子曰予本寒家少小攜一劒而違鄉里四十年間位極將相其間屯危患難履鋒冒刃入萬死而無一生身方及此前後矢僅百餘乃出鏃以示諸子因以奢侈為戒存審微時嘗為俘囚將就戮於郊外臨刑指危垣謂主者曰請就戮于此下冀得環垣覆尸旅魂之幸也主者哀之為移次焉遷延之際主擁妓而飲思得歌者以助歡妓曰俘囚有符存審者妾之舊識每令擊節以贊歌令主將欣然馳騎而舍之豈非命也彦超存審之長子也少事武皇累歴牙職存審卒莊宗以彦超為汾州刺史同光末魏州軍亂詔彦超赴北京巡檢先是朝廷令内官吕鄭二人在太原一監兵一監倉庫及明宗入洛皇弟存霸單騎奔河東與吕鄭謀殺彦超與留守張憲彦超覺之密與憲謀未決部下大譟州兵畢集張憲出奔是夕軍士殺吕鄭存霸于衙城詰旦聞洛城禍變彦超告諭三軍宋史張昭𫝊云昭為張憲推官莊宗及難聞鄴中兵士推戴明宗憲部將符彦超合戍將應之憲死有害昭者執之以送彦超彦超曰推官正人無得害之又逼昭為榜安撫軍民明宗又令其弟龍武都虞候彦卿馳騎安撫六月彦超入覲明宗召見撫諭尋授晉州留後未行㑹其弟前曹州刺史彦饒平宣武亂軍明宗喜召彦超謂之曰吾得爾兄弟力餘更何憂爾為我徃河東撫育耆舊即授北京留守太原尹明年冬移授昭義節度使四年授驍衞上將軍改金吾上將軍長興元年授泰寧軍節度使尋移鎮安州彦超廝養中有王希全者小字佛留麤知書訃委主貨財嵗久耗失甚多彦超止于訶譴而巳應順元年正月佛留聞朝廷多事因與任貨兒等謀亂一夕叩門言朝廷有急遞至彦超出至廳事佛留挾刃害之詰旦本州節度副使李端召州兵攻佛留等敗死餘衆奔淮南擒彦超部將趙溫等二十六人誅之彦超贈太尉存審次子彦饒晉史有𫝊次彦卿皇朝前鳳翔節度使守太師中書令封魏王今居于洛陽次彦能終于楚州防禦使次彦琳任皇朝為金吾上將軍卒于任舊五代史巻五十六
