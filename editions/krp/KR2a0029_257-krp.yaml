body:
  text: 舊五代史巻一百三十宋門下侍郎叅知政事監修國史薛居正等撰周書第二十一列傳十一王峻字秀峯相州安陽人也父豐本部樂營使峻幼慧黠善歌梁貞明初張筠鎮相州憐峻敏惠遂畜之及莊宗入魏州筠棄鎮南渡以峻自隨時租庸使趙巖訪筠于其第筠召峻聲歌以侑酒巖悦筠因以贈之頗得親愛梁亡趙氏族滅峻流落無依寄食于符離陳氏之家久之彌窘乃事三司使張延朗所給甚薄清泰末延朗誅漢祖盡得延朗之資産僕從而峻在籍中從歴數鎮常為典客漢祖踐阼授客省使奉使荆南留于㐮漢為監軍入為内客省使及趙思綰作亂于永興漢隠帝命郭從義討之以峻為兵馬都監從義與峻不協甚如水火未幾改宣徽北院使賊平加檢校太傅轉南院使太祖鎮鄴兼北面兵馬峻為監軍留駐鄴城隠帝蕭牆變起峻亦為羣小所搆舉家見害從太祖赴闕綢繆帷幄贊成大事峻居首焉京師平定受漢太后令充樞密使太祖北征至澶州為諸軍擁迫峻與王殷在京聞變乃遣侍衛馬軍都指揮使郭崇徃宋州前申州刺史馬鐸徃許州以防他變二州安然亦峻之謀也太祖踐阼加平章事尋兼右僕射門下侍郎平章事監修國史時朝廷初建四方多故峻夙夜奉事知無不為毎與太祖商確軍事未嘗不移時而退甚有禆益然為性輕躁舉措率易以天下之事為已任每有啓請多自任情太祖從而順之則忻然而退稍未允可則應聲而愠不遜之語隨事輒發太祖素知其為人且以佐命之故每優容之峻年長于太祖二歳太祖雖登大位時以兄呼之有時呼表字不忘布衣之契也峻以此益自負焉廣順元年冬劉崇與契丹圍晉州峻請行應援太祖用為行營都部署以徐州節度使王彦超為副詔諸軍並取峻節度許峻以便宜從事軍行資用仰給于官隨行將吏得自選擇將發之前召宴于滋徳殿太祖出女樂以寵之奉辭之日恩賜優厚不拘常制及發太祖幸西莊親臨宴餞别賜御馬玉帶執手而别峻至陜駐留數夕劉崇攻晉州甚急太祖憂其不可及議親征取澤州路入與峻㑹合先令諭峻峻遣驛騎馳奏請車馬不行幸時已降御扎行有日矣㑹峻奏至乃止峻軍既過絳郡距平陽一舍賊軍燔營狼狽而遁峻入晉州或請追賊必有大利峻猶豫久之翌日方遣騎軍襲賊信宿而還向使峻極力追躡則并汾之孽無噍類矣峻亦深恥無功因計度増修平陽故城而迴時永興軍節度使李洪信漢室之密戚也自太祖踐阼恒有憂沮之意而本城軍不滿千峻出征至陜州以救援晉州為辭抽起數百人及劉崇北遁又遣禁兵千餘人屯于京兆洪信懼遂請入朝峻軍迴太祖厚加優賜時慕容彦超叛于兖州已遣侍衛步軍都指揮使曹英客省使向訓率兵攻之峻意欲自將兵討賊累言于太祖曰慕容劇賊曹英不易與之敵耳太祖黙然未幾親征命峻為隨駕一行都部署破賊之日峻督軍在城南其衆先登頗有得色從駕還京未幾貢表乞解樞機即時退歸私第峻貪權利多機數好施小惠喜人附已太祖登極之初務存謙抑潛龍將佐未甚進用其後鄭仁誨李重進向訓等稍遷要職峻心忌之至是求退葢偵太祖之意也未陳請之前多發外諸侯書以求保證旬浹之内諸道馳騎進納峻書聞者驚駭其事峻連貢三章中使宣諭無虚日太祖嚴駕將幸其第峻聞之即馳馬入見太祖慰勞久之復令視事峻又于本院之東别建公署廊廡聴事高廣華侈及土木之功畢請太祖臨幸恩賜甚厚其後内園新起小殿唆視之奏曰宫室已多何用于此太祖曰樞密院舍宇不少公更自興造何也峻慙然而退時峻以前事趙巗頗承寵愛至是欲希贈官立碑或謂峻曰趙巖以諂佞事君破壊梁室至今言者無不切齒茍如所欲必貽物議乃止巖姪崇勲居于陳郡峻為求官田宅以賜之太祖亦從之三年春修利河堤大興土功峻受詔檢校既而世宗自澶州入覲峻素憚世宗之聰明英果聞其赴闕即自河次歸朝居無何邀求兼領青州太祖不得已而授之既受命求暫赴任奏借左藏綾絹萬匹從之是歳戸部侍郎趙上交權知貢舉上交嘗詣峻峻言及一童子上交不達其㫖牓出之日童子不第峻銜之及貢院申中書門下取日過堂峻知印判定過日及上交引新及第人至中書峻在政事堂厲聲曰今歳選士不公當須覆試諸相曰但緣已行指揮行過臨事不欲改移况未敕下覆試非晚峻愈怒詬責上交聲聞于外少頃竟令引過及罷上交詣本㕔謝峻峻又延之飲酌從容翌日峻奏上交知舉不公請致之于法太祖頷之而已又奏請以顔愆陳觀代范質李穀為相太祖曰進退宰輔未可倉卒待徐思之峻論列其事奏對不遜太祖未食日将亭午諍之不已太祖曰節假之内未欲便行已俟假開即依所奏峻退至中書是月史部選人過門下峻當其事頗疑選部不公其擬官選人落下者三十餘人次日寒食時節臣寮各歸私第午時宣召宰臣樞密使及入幽峻于别所太祖見馮道已下泣曰峻凌朕頗甚無禮太過擬欲盡去左右臣寮剪朕羽翼朕兒在外專意阻隔暫令到闕即懐怨望豈有既總樞機又兼宰相堅求重鎮尋亦授之任其襟懐尚未厭足如此無君誰能甘忍即召翰林學士徐臺符等草制其日退朝宣制貶授商州司馬差供奉官蒋光逺援送赴商州未幾死于貶所時廣順三年三月也通鑑峻至商州得腹疾帝猶愍之命其妻徃視之未幾而卒初峻降制除青州有司製造旌節以備迎授前一夕其旄有聲甚異聞者駭之主者曰昔安重誨授河中節亦有此異焉又所居堂陛忽然隠起如堆又夢被官府追攝入司簿院寤心惡之以是尤加狂躁峻才疎位重輕躁寡謀聴人穿鼻既國權在手而射利者曲為指畫乃啗餌虎臣離間親舊加以善則稱已無禮于君欲求無罪其可得乎五代史闕文廣順初河東劉崇引契丹攻晉州遣峻率師赴援峻頓兵于陜周祖親征遣使諭之峻見使受宣訖謂使曰與某馳還附奏陛下言晉州城堅未易可破劉崇兵鋒方鋭不可與力爭所以駐兵者待其氣衰耳非臣怯也陛下新即位不宜輕舉今朝中受聖知者惟李糓范質而已陛下若車駕出汜水則慕容彦超以賊軍入汴大事去矣使還具奏周祖自以手提其耳曰幾敗吾事慕容彦超為兖州節度使彦超即漢髙祖之同産弟也嘗冒姓閆氏體黒麻面故謂之閆崑崙彦超鎮兖州漢隠帝欲殺周太祖召彦超方食釋匕箸而就道周兵犯京師隠帝出勞軍太后使彦超衛帝彦超曰北兵何能為當于陣上唱坐使歸營彦超敗奔兖隠帝遇弑周太祖時彦超進呈鄆州節度使髙行周來書其書意即行周毁讟太祖結連彦超之意帝覽之笑曰此必是彦超之詐也試令驗之果然其鄆州印元有缺文不相接其為印即無闕處帝尋令齎書示諭行周上表謝思先是填星初至角亢占者曰角鄭分兖州屬焉彦超即率軍府賓佐步出州西門三十里致祭迎于開元寺塑像以事之謂之菩薩日至祈禱又令民家堅黄旛以禳之及城陷彦超方在土星院燃香急乃馳去案慕容彦超傳原本殘闕五代史補慕容彦超素有鈎距兖州有盜者詐為大官從人跨驢于衢中市羅十餘疋價值既定引物主詣一宅門以驢付之曰此本宅使汝且在此吾為汝上白于王以請值物主許之既而聲跡悄然物主怒其不出叩門呼之則空宅也于是連叫賊巡司至疑其詐兼以驢收之詣府彦超憫之且曰勿憂吾為汝擒此賊乃留物主府中復戒廏卒髙繫其驢通宵不與水草然後密召親信者牽于通衢中放之且曰此盜者之驢耳自昨日不與水草其飢渇者甚矣放之必奔歸家但可躡蹤而觀之盜無不獲也親信者如其言隨之其驢果入一小巷轉數曲忽有兒戲于門側視其驢連呼曰驢歸驢歸盜者聞之欣然出視遂擒之髙祖登極改乾祐為廣順是年兖州慕容彦超反髙祖親征城将破忽夜夢一人状貌甚偉異被王者之服謂髙祖曰陛下明日當得城及覺天猶未曉髙祖私謂徵兆如此可不預備乎于是躬督将士戮力急攻至午而城陷車駕将入有司請由生方鳴鞘而進遂取别巷轉數曲見一處門牆甚髙大問之云夫于廟髙祖意豁然謂近臣曰寡人所夢得非夫子乎不然何取路于此也因下馬觀之方升堂覩其聖像一如夢中所見者于是大喜叩首再拜近臣或諫以為天子不合拜異世陪臣髙祖曰夫子聖人也百王取則而又夢告寡人得非夫子幽賛所及耶安得不拜仍以廟側數十家為洒埽戸命孔氏襲文宣王者長為本縣令慕容彦超之被圍也乗城而望見髙祖親臨矢石其勢不可當退而憂之因勉其麾下曰汝等宜為吾盡命吾庫中金銀如山積若全此城吾盡以為賜汝等勿患富貴頃之有卒私言曰我知侍中銀皆鐵胎得之何用于是諸軍聞之稍稍解體未幾城陷及髙祖之入也有司閲其庫藏其間銀鐵胎者果十有七八初彦超常令人聞質庫有以鐵胎銀質錢者經年後庫吏始覺遂言之于彦超初甚怒頃之謂吏曰此易致耳汝宜偽庫牆凡金銀器用暨縑帛等速皆蔵匿仍亂撤其餘以為賊踐後申明吾當擒此輩矣庫吏如其教于足彦超下令曰吾為使長典百姓而又不謹遭賊去其過深矣今恐百姓疑彦超隠其物宜令三月内各投状明言質物色自當陪質之不爾者有過百姓以為然于是投状相繼翌日鐵胎銀主果出于是擒之置之深屋中使教部曲輩晝夜造用廣府庫此銀是也閻𢎞魯者後唐邢州節度使寳之子也寳唐書有傳𢎞魯事唐明宗晉髙祖累歴事任家本魯中洎告疾歸里慕容彦超初臨禮待極厚及謀大逆以𢎞魯子希俊為鎮寧軍節度副使在世宗幕下而惡之聞朝廷岀兵隄防即責𢎞魯曰爾教兒捍我于朝将覆吾族耶故罹其禍崔周度者父光表舉進士科甲盧質節制横海辟為支使周度有文學起家長蘆令登朝歴監察御史右補闕以家在齊州欲謀葬事懇求外任除泰寧軍節度判官而性剛烈又以嘗為諫官覩凶帥之不法不忍坐視其弊因極言以諫彦超故及斯禍太祖平兖州詔曰閻𢎞魯崔周度義死之臣禮加二等所以滲漏澤而賁黄泉也爾等貞節昭彰正容肅厲以從順為已任以立義作身謀履此禍機併罹寃横宜伸贈典以慰貞魂𢎞魯可贈左驍衛大将軍周度可贈秘書少監舊五代史巻一百三十
