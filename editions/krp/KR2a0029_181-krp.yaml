body:
  text: 舊五代史巻九十攷證晉列傳五趙在禮傳推指揮使楊晸為帥楊晸歐陽史作楊仁晟年六十六案歐陽史作六十二馬全莭傳清泰初為金州防禦使案歐陽史作明宗時歴金州防禦使與是書先後互異州兵纔及千人案歐陽史作州兵纔数百張筠𫝊梁室割相衞為昭德軍案梁割相澶衞三州為昭德軍原本作相衛疑有脱誤時有涇将侯莫威案歐陽史作侯莫陳威筠東朝于洛詔遣歸第案歐陽史作令為左驍衞上將軍與是書本紀同贈太子太師太師歐陽史作少師華温琪𫝊制以太子少保致仕天福元年十二月終于家年七十五詔贈太子太保案歐陽史作以太子太保致仕卒贈太子太傅張朗𫝊充吾縣都逰奕使案吾縣二字疑有舛誤相里金𫝊出為忻州刺史案歐陽史作沂州刺史舊五代史卷九十攷證
