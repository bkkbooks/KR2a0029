body:
  text: 舊五代史巻四十一攷證唐書明宗紀七癸丑索自通藥彦稠等奏收復河中案通鑑作辛亥索自通抜河中斬楊彦温癸丑𫝊首來獻歐陽史亦作辛亥自通執彦温殺之與是書較詳張延郎可充三司使班在宣徽使下案宋史職官志三司使在宣徽使後盖仍後唐之制淮南海州都指揮使王傳拯王𫝊拯歐陽史作𫝊極攷是書列𫝊及通鑑並作傳拯疑歐陽史𫝊刻之舛訛乙巳供奉官張仁暉自利州迴奏董璋攻陷閬州案董璋陷閬州通鑑作九月庚辰歐陽史作十月乙巳葢以奏聞之日為據也辛巳西面軍前奏今月十三日階州刺史王𢎞贄瀘州刺史馮暉自利州取山路出劍門闗外倒下殺敗董璋守闗兵士三千人收復劍州案通鑑攷異引唐實録作今月十三日大軍進攻入劍門次十七日收下劍州是書統繫於十三日疑有舛誤按巴堅舊作阿保機今改托雲舊作突欲今改舊五代史巻四十一考證
