body:
  text: 舊五代史巻八十四攷證晉少帝紀四監修國史劉昫史官張昭逺等以新修唐書紀志列傳并目録凡二百三巻案郡齋讀書志直齋書録解題並作二百巻五代會要作二百二巻目録一巻已亥幸繁䑓觀馬案歐陽史作閲馬于萬龍岡皇子延煦與晉昌軍節度趙在禮結婚案皇子延煦娶趙在禮女通鑑作三月庚申與是書作四月戊寅異己亥張彦澤奏破蕃賊于定州界案歐陽史作辛丑張彦澤及契丹戰于新興敗之是月契丹瀛州刺史詐為書與樂壽將軍王巒愿以本城歸順案瀛州刺史下疑脫劉延祚三字通鑑攷異云歐陽史作髙牟翰按䧟蕃記前云延祚詐輸誠欵後云大軍至瀛州偵知蕃將髙牟翰師而出盖延祚為刺史牟翰乃戍將耳舊五代史巻八十四攷證
