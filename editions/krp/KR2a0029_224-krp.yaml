  text: 舊五代史巻一百十二攷證周太祖紀三庚申車駕發京師案五代春秋作庚辰帝東征歐陽史從事作庚申戊戌車駕至自兖州案歐陽史作庚子至自兖州五代春秋從是書作戊戌節度副史王進逵王進逵原本作進達後又作王逵攷九國志王逵或名進逵今改歸畫一官中只管舊職官中訛宫中今據下文改正遣兵追襲至無極而還案契丹國志作無極山是書無山字當係史家省文今姑仍其舊舊五代史卷一百十二攷證
