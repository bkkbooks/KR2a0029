body:
  text: 舊五代史巻五十三宋門下侍郎參知政事監修國史薛居正等撰唐書第二十九列傳五李存信本姓張父君政迴鶻部人也大中初隨懷化郡王李思忠内附因家雲中之合羅川存信通黠多數㑹四夷語别六蕃書善戰識兵勢初為獻祖親信從武皇入闗平賊始補軍職賜姓名大順中累遷至馬步都校與李存孝擊張濬軍於平陽時存孝驍勇冠絶軍中皆下之惟存信與爭功由是相惡有同水火及平定潞州存孝以功望領節度旣而康君立授旄鉞存孝怒大剽潞民燒邑屋言發流涕疑存信擯已故也明年存孝得邢洺武皇與之節鉞存孝慮存信離間欲立大功以勝之屢請兵于武皇請兼并鎮冀存信間之不時許大順二年武皇大舉略地山東以存信為蕃漢馬步都校存孝聞之怒武皇令存質代之存孝乃謀叛既誅以存信為蕃漢都校從討李匡儔降赫連鐸白義誠以功檢校右僕射從入闗討王行瑜加檢校司空領郴州刺史乾寧三年兖鄆乞師于武皇武皇遣存信營于莘縣與朱瑄合勢以抗梁人梁祖患之遣使諜羅𢎞信曰河東志在吞食河朔迴軍之日貴道堪憂而存信戢兵無法稍侵魏之芻牧𢎞信怒翻然結于梁祖乃出兵三萬以攻存信存信斂衆而退為魏人所薄委棄輜重退保洺州軍士喪失者十二三武皇怒大出師攻魏博屠䧟諸邑五月存信軍于洹水汴将葛從周氏叔琮來援魏人存信與鐵林都将落落遇汴人于洹水南汴人為䧟馬坎以待之存信戰敗落落被擒九月存信敗葛從周于宗城乗勝至魏州之北門明年聞兖鄆皆䧟乃班師八月從討劉仁恭師次安塞為燕軍所敗武皇怒謂存信曰昨日吾醉不悟賊至公不辨耶古人三敗公姑二矣存信懼泥首謝罪幾至不測自光化以後存信多稱病武皇以兵柄授李嗣昭以存信為右校而己天復二年十月以病卒于晉陽時年四十一李存孝本姓安名敬思新唐書存孝飛狐人少于俘囚中得𨽻紀綱給事帳中及壯便騎射驍勇冠絶常将騎為先鋒未嘗挫敗從武皇救陳許遂黄冦及遇難上源毎戰無不尅捷張濬之加兵于太原也潞州小校馮霸殺其帥李克恭以城叛時汴将朱崇節入潞州梁祖令張全義攻澤州李罕之告急于武皇武皇遣存孝率騎五千援之初汴人攻澤州呼罕之曰相公常恃太原輕絶大國今張相公圍太原葛司空巳入潞府旬日之内沙陀無穴自處相公何路求生耶存孝聞其言不遜選精騎五百繞汴營呼曰我沙陀求穴者俟爾肉饌軍可令肥者出鬭汴将有鄧季筠者亦以驍勇聞乃引軍出戰存孝激勵部衆舞矟先登一戰敗之獲馬千匹生擒季筠于軍中是夜汴将李讜收軍而遁存孝追擊至馬牢山俘斬萬計遂退攻潞州時朝廷命京兆尹孫揆為昭義節度使令供奉官韓歸範送旌節至平陽揆乃仗節之潞梁祖與揆牙兵三千為紀綱時揆為張濬副招討所部萬人八月自晉綘踰刀黄嶺趨上黨存孝引三百騎伏于長子西崖間揆襃衣大葢擁衆而行俟其軍前後不屬存孝出騎横擊之擒揆與歸範及俘囚五百獻于太原存孝乃急攻潞州九月葛從周棄城夜遁存孝収城武皇乃表康君立為潞帥存孝怒不食者累日十月存孝引收潞州之師圍張濬于平陽營于趙城華州韓建遣壮士三百夜犯其營存孝諜知設伏以擊之盡殪進壓晉州西門獲賊三千自是閉壁不出存孝引軍攻絳州十一月刺史張行恭棄城而去張濬韓建亦由含口而遁存孝收晉絳以功授汾州刺史大順二年三月邢州節度使安知建叛入汴軍武皇令存孝定邢洺因授之節鉞時幽州李匡威與鎮州王鎔屢弱中山将中分其疆土定州王處存求援于武王武皇令存孝侵鎮趙之南鄙又令李存信李存審率師出井陘以㑹之併軍攻臨城柏鄉李匡威救至且議旋師李存信與存孝不恊因搆于武皇言存孝望風退衂無心擊賊恐有私盟也存孝知之自恃戰功鬱鬱不平因致書通王鎔又歸欵于汴明年武皇自出井陘将逼真定存孝面見王鎔陳軍機武皇暴怒誅先獲汴将安康乂方旋師七月復出師討存孝自縳馬闗東下攻平山渡滹水擊鎮州四闗城王鎔懼遣使乞平請以兵三萬助擊存孝許之新唐書王鎔失幽州助因乞盟進幣五十萬歸糧二十萬請出兵助討存孝武皇蒐于欒城李存信屯琉璃陂九月存孝夜犯存信營奉誠軍使孫考老被獲存信軍亂武皇進攻邢州深溝高壘以環之旋為存孝衝突溝塹不成有軍校袁奉韜者宻令人謂存孝曰大王俟塹成即歸太原如塹壘未成恐無歸志尚書所畏惟大王耳料諸将孰出尚書右王若西歸雖限以黄河亦可浮渡況咫尺之洫安能阻尚書鋒鋭哉存孝然之縱兵成塹居旬日深溝高壘飛走不能及由是存孝至敗城中食盡乾寧元年三月存孝登城首罪泣訴于武皇曰兒䝉王深恩位至将帥茍非讒慝離間曷欲捨父子之深恩附仇讎之黨兒雖褊狹設計實存信搆䧟至此若得生見王面一言而死誠所甘心武皇愍之遣劉太妃入城慰勞太妃引來謁見存孝泥首請罪曰兒立微勞本無顯過但被人中傷申明無路迷昩至此武皇叱之曰爾與王鎔書状罪我萬端亦存信教耶縶歸太原車裂于市然武皇深惜其才存孝每臨大敵被重鎧槖弓坐矟僕人以二騎從陣中易騎輕捷如飛獨舞鐵撾挺身䧟陣萬人辟易葢古張遼甘寧之比也存孝死武皇不視事旬日私憾諸将乆之李存進振武人本姓孫名重進歐陽史太祖破朔州得之賜以姓名養為子父佺世吏單于府重進初仕嵐州刺史湯羣為步校獻祖誅羣乃事武皇從入闗還鎮太原署牙職景福中為義兒軍使賜姓名從討王行瑜以功授檢校常侍與李嗣昭同破王珙于河中光化三年契丹犯塞冦雲中改永州軍使鴈門以北都知兵馬使天復初破氏叔琮前軍于洞渦三年授石州刺史荘宗初嗣位入為步軍右都檢校司空師出井陘授行營馬軍都虞侯破汴軍于柏鄉論功授邠州刺史轉檢校司徒俄兼西南面行營招討使出師救慈州授慈沁二州刺史十二年定魏博授天雄軍都巡按使時魏人初附有銀槍効節都強傑難制專謀騷動存進沈厚果斷犯令者梟首屍于市諸軍無不惕息靡然向風十四年擢蕃漢馬步副總管從攻楊劉戰胡桞十六年以本職兼領振武節度使時王師據徳勝渡汴軍據楊村渡在上流汴人運洛陽竹木造浮橋以濟軍王師以船渡緩急難濟存進率意欲造浮橋軍吏曰河橋須竹笮大艑兩岸石倉鐡牛以為固今無竹石竊慮難成存進曰吾成算在心必有所立乃課軍造葦笮維大艦數十艘作土山植巨木于岸以纜之初軍中以為戲月餘橋成制度條直人皆服其勤智荘宗舉酒曰存進吾之杜預也賜寶馬御衣進檢校太保兼魏博馬步都将與李存審圍徳勝十九年汴将王瓚率衆逼北城為地穴火車百道進攻存進隨機拒應或經日不得食汴軍退加檢校太傅王師討張文禮于鎮州閻寳李嗣昭相次不利而殁七月存進代嗣昭為招討進營東垣渡夾滹沲為壘沙土散惡垣壁難成存進斬伐林樹版築旬日而就賊不能寇九月王處球盡率其衆乗其無備奄至壘門存進聞之得部下數人出鬭驅賊於橋下俄而賊大至後軍不繼血戰而殁時年六十六同光時贈太尉存進行軍出師雖無竒迹然能以法繩其驕放營壘守戰之備特推精力議者稱之有子四人長曰漢韶漢韶字享天幼有器局風儀峻整初事莊宗為定安軍使遷河東牢城指揮使時孟知祥權知太原軍府事㑹契丹侵北鄙表令漢韶率師進討既而大破契丹以功加檢校右僕射同光中為蔡州刺史天成初復姓孫氏尋授彰國軍留後累加檢校太保長興中為洋州節度使九國志閔帝嗣位加特進漢韶以其父名上表讓之改檢校左僕射制曰改會稽之字抑有前聞換瓌寳之文非無故事末帝之起于鳯翔也漢韶與興元張䖍釗各帥部兵㑹王師于岐山下及西師俱叛漢韶逃歸本鎮聞末帝即位心不自安乃與張䖍釗各舉其城送欵于蜀洎至成都孟知祥以漢韶故人尤善待之九國志漢韶與知祥叙汶上舊事及洛中更變相對感泣知祥曰豐沛故人相遇于此何樂如之于是賜第宅金帛供帳食物悉官給之偽命永平軍節度使孟昶嗣偽位歴興元遂州兩鎮連帥累偽官至中書令封安樂郡王年七十餘卒于蜀李存璋字徳璜雲中人武皇初起雲中存璋與康君立薛志勤等為奔走交從入闗以功授國子祭酒累管萬勝雄威等軍從討李匡儔改義兒軍使光化二年授澤州刺史入為牢城使從李嗣昭封雲州叛將王暉平之改教練師檢校司空五年武皇疾篤召張承業與存璋授遺顧存璋爰立莊宗夷内難頗有力焉改河東馬步都虞侯兼領鹽鐵初武皇稍寵軍士藩部人多干擾鄽市肆其豪奪法司不能禁莊宗初嗣位鋭于求理存璋得行其志抑强扶弱誅其豪首期月之間紀綱大振弭羣盜務耕稼去姦宄息倖門當時稱其材幹從破汴軍于夾城轉檢校司徒栢郷之役為三鎮排陣使十一年從盟朱友謙于猗氏授汾州刺史汴將尹皓攻慈州逆戰敗之十三年王檀逼太原存璋率汾州之軍入城固守授大同防禦使應蔚朔等州都知兵馬使秋契丹䧟蔚州按巴堅遣使馳木書求賂存璋斬其使契丹逼雲州存璋拒守城中有古鐵車乃鎔為兵仗以給軍士敵退以功加檢校太傅大同軍節度使應蔚等州觀察使十九年四月以疾卒于雲州府第同光初追贈太保平章事晉天福初追贈太師有子三人彦球為裨校戰殁于鎮州李存賢字子良本姓王名賢許州人祖啟忠父惲賢少遇亂入黄巢軍武皇破賊陳許存賢來歸景福中典義兒軍為副兵馬使因賜姓名天祐三年從周徳威赴援上黨營于交口五年權知蔚州刺史以禦吐渾六年權沁州刺史先是州當賊境不能保守乃于州南五十里據險立栅為治所已歴十餘年矣存賢至郡乃移復舊郡剗闢荆棘特立廨舎州民完集莊宗嘉之轉檢校司空真拜刺史九年汴人乘其無備來攻其城存賢擊退之十一年授武州刺史山北團練使十二年移刺慈州七月汴將尹皓攻州城存賢督軍拒戰汴軍攻擊百端月餘遁去十八年河中朱友謙來求援命存賢師赴之十九年汴將段凝軍五萬營臨晉蒲人大恐咸欲歸汴或問于存賢曰河中將士欲拘公降于汴存賢曰吾奉命河中死王事固其所也汴軍退以功加檢校司徒同光初授右武衛上將軍十一月入覲洛陽二年三月幽州李存審疾篤求入覲議擇帥代之方内宴莊宗曰吾披榛故人零落殆盡所殘者存審耳今復衰疾北門之事知付何人因目存賢曰無易于卿即日授特進檢校太保充幽州盧龍節度使五月到鎮時契丹彊盛城門之外烽塵交警一日數戰存賢性忠謹周慎畫夜戒嚴不遑寢食以至憂勞成疾卒于幽州時年六十五詔贈太傅存賢少有材力善角觝初莊宗在藩邸每宴私與王郁角觝鬭勝郁頻不勝莊宗自矜其能謂存賢曰與爾一博如勝賞爾一郡即時角觝存賢勝得蔚州刺史史臣曰昔武皇之起於并汾也㑹鹿走于中原期龍戰于大澤蓄驍果之士以備鷹犬之用故自存信而下皆錫姓以結其心授任以責其效與夫董卓之畜吕布亦何殊哉惟存孝之勇足以冠三軍而長萬夫茍不為叛臣則可謂良將矣舊五代史巻五十三
