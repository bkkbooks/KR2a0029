body:
  text: 舊五代史巻九十三考證晉列傳八盧質傳判太僕卿事案歐陽史作判太常卿事李專美傳曽祖隨光禄卿案新唐宰相世系表作隨秘書監除尚書庫部郎中案歐陽史作比部郎中崔梲傳曽祖元受舉進士直史館案新唐書世系表元受直史館髙陵尉兄棆棆新唐書世系表作榆薛融傳年六十餘案歐陽史作年六十鄭雲叟傳本南燕人也案歐陽史作滑州白馬人尋入少室山案歐陽史作入少室為道士舊五代史巻九十三考證
