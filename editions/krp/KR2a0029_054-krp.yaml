body:
  text: 舊五代史巻二十六攷證唐書武皇紀下景福元年正月鎮州王鎔恃燕人之援率兵十餘萬攻邢州之堯山案舊唐書作大順二年王鎔援邢州屯于堯山攷此時邢州未叛於晉不得王鎔之援師葢即景福元年事誤移於前一年耳歐陽史及通鑑俱與是書同三月武皇進軍渡滹沱攻欒城下鼓城槀城四月燕軍冦雲代武皇班師案舊唐書作景福元年二月庚寅太原易定之兵合勢攻鎮州三月克用處存斂軍而退是興師以二月至三月始旋師也通鑑云三月克用王處存合兵攻王鎔癸丑拔天長鎮戊午鎔與戰於新市大破之辛酉克用退屯欒城是進師退師皆在三月也是書作三月進軍四月班師與諸書異十月邢州李存孝叛納欵于梁李存信搆之也案舊唐書大順元年十一月癸丑朔太原將邢州刺史李存孝自恃擒孫揆功合爲昭義帥怨克用授康君立存孝自晉州率行營兵歸邢州據城上表歸朝仍致書張濬王鎔求援今攷是書大順二年存孝始爲邢州節度無由于元年冬得據邢州也新唐書歐陽史通鑑並從是書作景福元年十月武皇表馬師素爲邢州節度使案舊唐書作克用以大將馬師素權知邢洺團練事與是書異是時雲州吐渾赫連鐸白義誠並來歸案舊唐書昭宗紀作六月壬辰克用攻陷雲州執赫連鐸新唐書昭宗紀作六月赫連鐸與李克用戰于雲州死之通鑑從新唐書作克用大破吐谷渾殺赫連鐸擒白義誠俱與是書異攷雲州諸部因討李匡儔而來歸自當在十月而諸書皆作六月恐未足㨿甲寅攻新州案甲寅字誤下文十二月有辛亥壬子甲寅則十一月不得有甲寅也據通鑑攷異盖薛史仍紀年錄之誤二月以仁恭爲權幽州留後案舊唐書作乾寧元年十二月以李匡威故將劉仁恭爲幽州兵馬留後歐陽史亦作元年冬事皆因平幽州而終言之未嘗核其年月也通鑑從是書作二年二月八月乙酉供奉官張承業齎詔告諭案舊唐書作七月丁邜上遣内官張承業𫝊詔克用軍與是書日月互異攷通鑑作壬午遣張承業詣克用軍盖壬午遣使乙酉始至軍耳武皇上表請駕還京案舊唐書作壬寅李克用遣子存貞奉表行在請車駕還京攷當時奉表者即後唐荘宗也荘宗未嘗名存貞舊唐書誤十一月丁巳案舊唐書作十一月癸未朔疑不當有丁巳据是書上文十月有丙戌戊子則十一月斷非癸未朔也通鑑所定日月皆從是書還軍渭北十二月武皇營于雲陽案歐陽史作晉軍渭北遇雨六十日攷通鑑十二月乙酉李克用軍于雲陽辛亥引兵東歸無緣得有六十日也歐陽史誤天祐二年春契丹按巴堅領部族三十萬至雲州與武皇㑹于雲州之東案武皇會契丹于雲州通鑑作開平元年新唐書作天祐元年與是書異歐陽史與是書同又契丹國志作晉王李存勗與契丹連和㑹于東城殊誤梁祖以懐英無功乃以李思安代之案李思安之代懐英通鑑作七月事與是書繫五月異按巴堅舊作阿保機今改舊五代史巻二十六考證
