body:
  text: 長興三年六月司天監奏自月初至月終每夜陰雲蔽天不辨星月應順元年四月九日白虹貫日是時閔帝遇害晉天福初高祖將建義於太原日傍多有五色雲如蓮芰之狀二年正月丙辰一鼓初北方有赤氣向西至戌亥地東北至丑地已來向北闊三丈餘狀如火光赤氣內見紫微宮共北斗諸星其氣乍明乍暗至三點後後有白氣數條相次西行直至三鼓後散漢乾祐二年十二月日暈三重上有背氣周顯德三年十二月庚午白虹貫日氣暈勾環永樂大典卷三千二百七
  hash: sha256:36f0e784cef617e91020f54f35bb7d6709f5fd4dcb5a19e26ae3ded28d623582
