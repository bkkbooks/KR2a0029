body:
  text: 舊五代史卷十四梁書十四列傳第四羅紹威案舊唐書紹威字端己魏州貴鄉人父弘信本名宗弁初為馬牧監事節度使樂彥貞光啟末彥貞子從訓驕盈太橫招聚兵甲欲誅牙軍牙軍怒聚譟攻之從訓出據相州牙軍廢彥貞囚於龍興寺逼令為僧尋殺之推小校趙文建為留後先是弘信自言於所居遇一白鬚翁謂之曰爾當為土地主如是者再心竊異之案弘信遇白鬚翁本篝火狐鳴之故智舊唐書作隣人相告新唐書作巫者傳言疑皆屬傳聞之誤薛史以為弘信自言當得其實既而文建不洽軍情牙軍聚呼曰孰願為節度使者弘信即應曰白鬚翁早以命我可以君長爾曹唐文德元年四月牙軍推弘信為留後朝廷聞之即正授節旄乾寧中太祖急攻兗鄆朱瑄求援於太原時李克用遣大將李存信率師赴之假道於魏屯於莘縣存信御軍無法稍侵魏之芻牧弘信不平之太祖因遣使謂弘信曰太原志吞河朔迴戈之日貴道堪憂弘信懼乃歸款於太祖仍出師三萬攻李存信敗之案弘信攻李存信舊唐書與薛史同新唐書則云李存信侵魏芻牧弘信已不平既而李瑭復壁莘弘信厭其暴及聞梁王遣使相告乃迴戈攻瑭也與薛史異未幾李克用領兵攻魏營於觀音門外屬邑多拔太祖遣葛從周援之戰於洹水擒克用男落落以獻太祖令送於弘信斬之晉軍乃退是時太祖方圖兗鄆慮弘信離貳每歲時賂遺必卑辭厚禮弘信每有答貺太祖必對魏使北面拜而受之曰六兄比予有倍年之長兄弟之國安得以常隣遇之故弘信以為厚己其後弘信累官至檢校太尉封臨清王案舊唐書弘信先封豫章郡公進封北平王光化元年八月薨於位紹威襲父位為留後案舊唐書紹威自文德初授左散騎常侍充天雄軍節度副使自龍紀至乾寧十年之中累加官爵朝廷因而命之尋正授旄鉞累加檢校太尉兼侍中封長沙郡王昭宗東遷命諸道修洛邑紹威獨營太廟制加守侍中進封鄴王初至德中田承嗣盜據相魏澶博衞貝等六州召募軍中子弟置之部下號曰牙軍皆豐給厚賜不勝驕寵年代寖遠父子相襲親黨膠固其凶戾者強賈豪奪踰法犯令長吏不能禁變易主帥有同兒戲自田氏已後垂二百年案吳縝歐陽史纂誤云魏博自田承嗣專據至羅紹威時共一百五十餘年歐陽史作二百年誤蓋歐陽史仍薛史之誤也舊五代史考異主帥廢置出於其手如史憲誠何全韓君雄樂彥貞皆為其所立優奬小不如意則舉族被誅紹威懲其往弊雖以貨賂姑息而心銜之紹威嗣世之明年正月幽州劉仁恭擁兵十萬謀亂河朔進陷貝州長驅攻魏紹威求援於太祖太祖遣李思安援之屯於洹水洹水原本作桓水今據通鑑改正影庫本粘籤葛從周自邢洺引軍入魏州燕將劉守文單可及與王師戰於內黃大敗之乘勝追躡會從周亦出軍掩擊又敗燕軍斬首三萬餘級三年紹威遣使會軍同攻滄州以報之自是紹威感太祖援助之恩深加景附紹威見唐祚衰陵羣雄交亂太祖兵強天下必知有禪代之志故傾心附結贊成其事每慮牙軍變易心不自安天祐初州城地無故自陷俄而小校李公佺謀變紹威愈懼乃定計圖牙軍遣使告太祖求為外援太祖許之遣李思安會魏博軍再攻滄州先是安陽公主薨於魏太祖因之遣長直軍校馬嗣勳選兵千人伏兵仗於巨橐中肩舁以入魏州言助女葬事天祐三年正月五日太祖親率大軍濟河聲言視行營於滄景牙軍頗疑其事是月十六日紹威率奴客數百與嗣勳同攻之時宿於牙城者千餘人遲明盡誅之凡八千家皆赤其族州城為之一空翌日太祖自內黃馳至鄴案原本作至葉今據歐陽史改正舊五代史考異時魏軍二萬方與王師同圍滄州聞城中有變乃擁大將史仁遇保於高唐六州之內皆為勍敵太祖遣諸將分討之半歲方平自是紹威雖除其逼然尋有自弱之悔不數月復有浮陽之役紹威飛輓饋運自鄴至長蘆五百里疊跡重軌不絕於路又於魏州建元帥府署沿道置亭候供牲牢酒備軍幕什器上下數十萬人一無闕者及太祖迴自長蘆復過魏州紹威乘間謂太祖曰邠岐太原終有狂譎之志各以興復唐室為詞王宜自取神器以絕人望天與不取古人所非太祖深感之及登極加守太傅兼中書令賜號扶天啟運竭節功臣車駕將入洛奉詔重修五鳳樓朝元殿巨木良匠非當時所有倏架於地泝流西立於舊址之上張設綈繡皆有副焉太祖甚喜以寶帶名馬賜之先是河朔三鎮司管鑰備洒掃皆有閹人紹威曰此類皆宮禁指使豈人臣家所宜畜也因搜獲三十餘輩盡以來獻太祖嘉之開平中加守太師兼中書令邑萬戶紹威嘗以臨淄海岱罷兵歲久儲庾山積唯京師軍民多而食益寡願於太行伐木下安陽淇門斲船三百艘置水運自大河入洛口歲漕百萬石以給宿衞太祖深然之案通鑑考異引梁功臣傳云紹威馳簡獻替意互合者十得五六太祖嘆曰竭忠力一人而已又引莊宗實錄曰紹威陰有覆溫之志而賂溫益厚溫怪其曲事慮蓄奸謀而莫之察乃賜紹威妓妾數人未半歲召還以此得其陰事其紀載互異如此竊謂紹威有謀慮得梁主信任宜也然以梁主雄險而紹威又因盡誅牙軍有自弱之悔則此時猜忌諒亦有之未可偏廢其說殿本會紹威遘疾革遣使上章乞骸骨太祖撫案動容顧使者曰亟行語而主為我強飯如有不可諱當世世貴爾子孫以相報也仍命其子周翰監總軍府案通鑑考異云紹威厚率重斂傾府庫以奉溫小有違忤溫即遣人詬辱紹威方懷愧恥悔自弱之謀乃潛收兵巿馬陰有覆溫之志而賂溫益厚溫怪其曲事慮蓄奸謀而莫之察乃賜紹威妓妾數人皆承嬖愛未半歲溫却召還以此得其陰事內相矛盾案梁祖性多猜忌使妓妾為間乃賊之故智厥後恩禮不衰特因紹威已死外示包容耳舊五代史考異及訃至輟朝三日冊贈尚書令紹威在鎮凡十七年年三十四薨永樂大典卷一萬八千一百二十六紹威形貌魁偉有英傑氣攻筆札曉音律性復精悍明敏服膺儒術明達吏理好招延文士聚書萬卷開學館置書樓每歌酒宴會與賓佐賦詩頗有情致案太平廣記引羅紹威傳云當時藩牧之中最獲文章之譽每命幕客作四方書檄小不稱意壞裂抵棄自擘牋起草下筆成文雖無藻麗之風幕客多所不及舊五代史考異江東人羅隱者佐錢鏐軍幕有詩名於天下紹威遣使賂遺南巷之敬隱乃聚其所為詩投寄之紹威酷嗜其作因目己之所為曰偷江東集至今鄴中人士諷詠之紹威嘗有公讌詩云簾前淡泊雲頭日座上蕭騷雨脚風雨脚原本作兩脚今據文改正影庫本粘籤雖深於詩者亦所歎伏紹威子三人長曰廷規位至司農卿尚太祖女安陽公主又尚金華公主早卒次曰周翰繼為魏博節度使亦早卒案通鑑考異引梁功臣傳云周翰起復雲麾將軍充天雄軍節度留後尋檢校司徒正授魏博節度使舊五代史考異季曰周敬歷滑州節度使別有傳開平四年夏詔金華公主出家為尼居於宋州元靜寺蓋太祖推恩於羅氏令終其婦節也永樂大典卷五千六百七十八五代史補羅鄴王紹威俊邁有詞學尤好戲判常有人向官街中驢置鞍於地值牛車過急行碾破其鞍驢主怒毆駕車者為廂司所擒紹威更不按問遂判其狀云鄴城大道甚寬何故駕車碾鞍領驢漢子科決待駕車漢子喜歡詞雖俳諧理甚切當論者許之趙犨其先天水人案歐陽史作其先青州人舊五代史考異代為忠武牙將曾祖賓祖英奇父叔文案原本訛叔乂今據新唐書改正舊五代史考異皆歷故職犨幼有奇智齠齔之時與隣里小兒戲於道左恆分布行列為部伍戰陣之狀自為董帥指顧有節如夙習焉羣兒皆稟而從之無敢亂其行者其父目而異之曰吾家千里駒也必大吾門矣及赴鄉校誦讀之性出於同輩弱冠有壯節好功名妙於弓劍氣義勇果郡守聞之擢為牙校唐會昌中壺關作亂隨父北征收天井關未幾從王師征蠻浹月方克惟忠武將士轉戰溪洞之間斬獲甚衆本道錄其勳陟為馬步都虞候乾符中王僊芝起於曹濮案原本作僊茈今據新舊唐書改正舊五代史考異大縱其徒侵掠汝鄭犨乃率步騎數千襲之賊黨南奔及黃巢陷長安天子幸蜀中原無主人心騷動於是陳州數百人相率告許州連帥願得犨知軍州事其帥即以狀聞於是天子下詔以犨守陳州刺史既視事乃謂將吏曰賊巢之虐徧於四方苟不為長安巿人所誅則必驅殘黨以東下況與忠武久為仇讎凌我土疆勢必然也乃遣增垣墉濬溝洫實倉廩積薪芻凡四門之外兩舍之內民有資糧者悉令輓入郡中繕甲兵利劍矟弓弩矢石無不畢備又招召勁勇置之麾下以仲弟昶為防遏都指揮使以季弟珝為親從都知兵馬使長子麓次子霖皆分領銳兵黃巢在長安果為王師四面扼束食盡人饑謀東奔之計先遣驍將孟楷擁徒萬人直入項縣犨引兵擊之賊衆大潰斬獲略盡生擒孟楷中和三年朝廷聞其功就加檢校兵部尚書俄轉右僕射不數月加司空進潁川縣伯巢黨知孟楷為陳所擒大驚憤乃悉衆東來先據水水原本作澱水今據通鑑改正影庫本粘籤後與蔡州秦宗權合勢以攻宛丘陳人懼焉犨恐衆心攜離乃於衆中揚言曰忠武素稱義勇淮陽亦為勁兵是宜戮力同心捍禦羣寇建功立節去危就安諸君宜圖之況吾家食陳祿久矣今賊衆圍逼衆寡不均男子當於死中求生又何懼也且死於為國不猶愈於生而為賊之伍耶汝但觀吾之破賊敢有異議者斬之由是衆心靡不踴躍無何開門與賊接戰每戰皆捷賊衆益怒巢於郡北三四里起八僊營如宮闕之狀又修百司廨署儲蓄山峙蔡人濟以甲冑軍無所闕焉凡圍陳三百日大小數百戰雖兵食將盡然人心益固犨因令間道奉羽書乞師於太祖太祖素多犨之勇果乃許之四年四月太祖引大軍與諸軍會於陳之西北陳人望旗鼓出軍縱火急攻巢寨賊衆大潰重圍遂解獻捷於行在五年八月除犨為蔡州節度使於時巢黨雖敗宗權益熾六七年間屠膾中原陷二十餘郡唯陳去蔡百餘里兵少力微日與爭鋒終不能屈文德元年案原本作大德今改正舊五代史考異蔡州平朝廷議勳以犨檢校司徒充泰寧軍節度使又改授浙西節度使不離宛丘兼領二鎮龍紀元年三月又以平巢蔡功就加平章事充忠武軍節度使仍以陳州為理所由是中原塵靜唐帝復歸長安陳許流亡之民襁負歸業犨設法招撫人皆感之犨兄弟三人時稱雍睦一日念仲弟昶同心王事共立軍功乃下令盡以軍州事付於昶遂上表乞骸後數月寢疾卒於陳州官舍年六十六葬於宛丘縣之先域累贈太尉犨雖盡忠唐室保全陳州然默識太祖雄傑每降心託跡為子孫之計故因解圍之後以愛子結親又請為太祖立生祠於陳州朝夕拜謁數年之間悉力委輸凡所徵調無不率先故能保其功名案張方平樂全集陳州祭太尉趙公文云有唐之季大盜移國封豕長蛇踐食區夏生民塗炭城邑邱墟公於爾時獨保孤壘攻圍幾年洛中百戰陳之遺黎竟脫賊口兄弟三人繼登將相並有功德著於此邦而其像貌晦於闇室邦人不知久不克享某祗膺朝命再來領藩惟公忠烈能捍大患寫之繢素神氣然乃建祠堂式薦時事蓋陳州故有趙犨畫像至方平時復修之也孔本長子麓位至列卿次子霖改名巖尚太祖女長樂公主開平初授衞尉卿駙馬都尉二年九月權知洺州軍州事俄轉天威軍使十二月授右羽林統軍改右衞上將軍充大內皇牆使案原本作皇城考五代會要梁時避諱改皇城使為皇牆使今改正舊五代史考異三年七月出為宿州團練使旋移州刺史其後累歷近職連典禁軍預誅庶人友珪有功末帝即位用為租庸使守戶部尚書巖以勳戚自負貨賂公行天下之賄半入其門又以身尚公主聞唐朝駙馬都尉杜悰位極將相以服御飲饌自奉務極華侈巖恥其不及由是豐其飲膳嘉羞法饌動費萬錢僦斂綱商其徒如巿權勢熏灼人皆阿附及唐莊宗滅梁室巖踰垣而逸素與徐州溫韜相善巖往依之既至韜斬巖首送京師永樂大典卷一萬六千九百九十昶字大東犨仲弟也弱冠習兵機沈默大度神形灑落臨事有通變之才及兄犨為陳州刺史以昶為防禦都指揮使未幾巢將孟楷擁衆萬餘據項城縣昶與兄犨領兵擊破之擒楷以歸不數月巢黨悉衆攻陳以報孟楷之役又與蔡寇合從凶醜百萬棲於陳郊陳人大恐一夕昶因巡警假寐於闉闍闉闍原本作閫闍今據文改正影庫本粘籤恍惚間如有陰助昶異而待之遲明開門決戰人心兵勢勇不可遏若有陰兵前導是日擒賊將數人斬首千餘級羣凶氣沮其後連日交戰無不應機俘斬未嘗小衄以至重圍數月士心如一及賊敗圍解朝廷紀勳昶一門之中疊加爵秩當時方鎮之內言忠勇者言守禦者言功勳者言政事者皆以犨昶為首焉及犨遙領泰寧軍節度以昶為本州刺史檢校右僕射俄而犨有疾遂以軍州盡付於昶詔授兵馬留後旋遷忠武軍節度使亦以陳州為理所時宗權未滅中原方受其毒陳蔡封疆相接昶每選精銳深入蔡境蔡賊雖衆終不能抗以至宗權敗焉案上篇趙犨傳云蔡州平以犨為忠武軍節度使據此傳則昶為忠武節度使宗權未滅二傳自相矛盾見通鑑考異朝廷賞勳加檢校司徒昶以大寇削平之後益留心於政事勸課農桑大布恩惠景福元年秋陳許將吏耆老錄其功詣闕以聞天子嘉之命文臣撰德政碑植於通衢以旌其功俄加同平章事昶自圍解之後恆曰梁王之恩不敢忘也是後太祖每有征伐昶訓練兵甲饋輓供億無有不至乾寧二年寢疾薨於鎮年五十三追贈太尉永樂大典卷一萬六千九百九十珝字有節犨季弟也案新唐書以珝為犨子據歐陽史及通鑑皆以珝為犨弟與薛史同新唐書誤幼而剛毅器宇深沉既冠好書籍及壯工騎射尤精三略及犨為陳州刺史以珝為親從都知兵馬使時巢黨東出商鄧與蔡賊會衆至百餘萬掘長壕五百道攻陳陳人大懼珝與二兄堅心誓衆激勵將校約以死節珝以祖先松楸去郭數里慮為羣盜穿發乃夜縱心膂之士遷柩入城府庫舊有巨弩數百枝機牙皆缺工人咸謂不可用珝即創意制度自調弦筈置之雉堞間矢激五百餘步凡中人馬皆洞達胸腋羣賊畏之不敢逼近自仲秋至於首夏軍食將竭士雖不飽而堅拒之志不移會太祖率大軍解其圍珝兄弟抆泣感謝其後朝廷議功加檢校右僕射遙領處州刺史犨薨昶為忠武軍節度使珝遷為行軍司馬檢校司空昶薨珝知忠武軍留後珝公幹之才播於遠邇至於符籍虛實財穀耗登備閱其根本民之利病無不洞知庶事簡廉公私俱濟太祖深加慰薦尋加特進檢校司徒充忠武軍節度使陳州土壤卑疎每歲壁壘摧圮工役不暇珝遂營度力用俾以甓周砌四墉自是無霖潦之虞光化二年加檢校太保平章事明年檢校侍中進封天水郡公珝博通前古以陳州本伏羲所都南頓乃光武舊地遂稽考古制崇飾廟貌為四民祈福之所又詢鄧艾故址鄧艾原本作鄧義今據歐陽史改正影庫本粘籤決翟王河以溉稻粱大實倉廩民獲其利珝兄弟節制陳許繼擁旌鉞共二十餘年陳人愛戴風化大行天復元年冬韓建為忠武軍節度使乃徵珝知同州匡國軍節度留後時太祖統軍岐下珝輸輓調發旁午道途俄而昭宗還長安詔徵入覲錫迎鑾功臣之號珝因堅辭藩鎮遂加檢校太傅右金吾衞上將軍及扈從東遷歲餘以痼疾免官遂歸淮陽未幾薨於私第年五十五詔贈侍中陳人為之罷巿子縠仕至左驍衞大將軍宣徽北院使唐莊宗入汴與從兄巖皆族誅永樂大典卷一萬六千九百九十王珂河中人祖縱鹽州刺史父重榮河東節度使破黃巢有大功封瑯琊郡王珂本重榮兄重簡之子出繼重榮唐僖宗光啟三年重榮為部將常行儒所害推重榮弟重盈為蒲帥以珂為行軍司馬及重盈卒軍府推珂為留後時重盈子珙為陝州節度使瑤為絳州刺史由是爭為蒲帥瑤珙連上章論列又與太祖書云珂非吾兄弟蓋余家之蒼頭也小字忠兒案舊唐書忠作蟲安得繼嗣珂亦上章云亡父有興復之功又遣使求援於太原李克用為保薦於朝昭宗可之既而珙厚結王行瑜李茂貞韓建為援三鎮互相表薦昭宗詔諭之曰吾以太原與重榮有再造之功已俞其奏矣乾寧二年五月三鎮率兵入覲賊害時政請以河中授珙瑤又連兵以攻河中克用聞之出師以討三鎮瑤珙兵退晉師拔絳州擒瑤斬之及克用駐軍於渭北昭宗以珂為河中節度使正授旄鉞克用因以女妻珂珂至太原謝婚成禮克用令李嗣昭將兵助珂攻珙於陝焉光化末太祖謂張存敬曰珂恃太原之勢侮慢隣封爾為我持一繩以縛之天復元年春存敬兵下晉絳令何絪案原本作何緯今據通鑑改正舊五代史考異守晉州以扼太原援師二月大軍逼河中珂妻書告太原曰敵勢攻逼朝夕為俘囚乞食於大梁矣大人安忍不救克用曰前途既阻衆寡不敵救則與爾兩亡可與王郎歸朝廷珂復求救於李茂貞茂貞不答珂勢窮即登城謂存敬曰吾與汴王有家世事分公宜退舍俟汴王至吾自聽命存敬即日退舍三月太祖自洛陽至先哭於重榮之墓案新唐書全忠王出也始背賊事重榮約為甥舅德其全己指日月曰我得志凡氏王者皆事之至是忘誓言過重榮墓偽哭而祭舊五代史考異蒲人聞之感悅珂欲面縛牽羊以見太祖曰太師阿舅之恩何時可忘郎君若以亡國之禮相見黃泉其謂我何案歐陽史云梁太祖自同州降唐即依重榮以母王氏故事重榮為舅及珂出迎於路握手歔欷聯轡而入乃以存敬守河中珂舉家徙於汴後入覲被殺於華州傳舍永樂大典卷六千八百四十九珙少有俊氣才兼文武性甚驕虐屬世多故遂代伯父重霸為陝州節度使為政苛暴且多猜忌殘忍好殺不以生命為意內至妻孥宗屬外則賓幕將吏一言不合則五毒幷施鞭笞刳斮無日無之奢縱聚斂民不堪命由是左右惕懼憂在不測唐光化二年夏六月為部將李璠所殺璠自稱留後因是陝州不復為王氏所有永樂大典卷六千八百四十九史臣曰紹威始為唐雄據魏地當土德之季運倡梁祖以強禪在梁則為佐命也在唐則豈得為忠臣乎趙犨以淮揚咫尺之地抗黃巢百萬之衆功成事立有足多者巖縠非賢遽泯其嗣惜哉王珂奕世山河勢危被擄乃魏豹之徒與永樂大典卷六千八百四十九
