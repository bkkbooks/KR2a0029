body:
  text: 南至果州界二十里北至高橋三十五里西至同谷界三十五里北至秦州界六十七里欲併其四鎮地于栗亭縣其徵科委縣司捕盜委鎮司從之嶺南道潘州茂名縣梁開平元年五月改為越裳縣至後唐同光元年十月復為茂名縣桂州純化縣梁開平元年五月改為歸化縣後唐同光元年十月復為純化縣邕州晉天福七年七月改為誠州避廟諱溥州晉開運三年三月升桂州全義縣為州仍改全義縣為德昌縣幷割桂州臨川廣明義寧等三縣隸之從湖南馬希範奏也
