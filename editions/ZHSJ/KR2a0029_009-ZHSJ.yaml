body:
  text: 舊五代史卷九梁書九末帝紀中貞明三年春正月戊午以前淄州刺史高允奇為右羽林統軍癸亥以前天平軍馬步軍都指揮使檢校太保朱勍為懷州刺史癸酉以右天武軍使石釗為密州刺史戊寅以前懷州刺史李建為安州刺史仍賜名知節己卯以宣義軍節度副大使知節度事案原本脫副字考新唐書百官志及五代會要副大使為藩鎮官爵今增入舊五代史考異北面行營副招討等使特進檢校太傅霍彥威為天平軍節度副大使知節度事二月甲申晉王攻我黎陽劉鄩拒之而退乙酉前蔡州刺史董璋權知宣義軍軍州事丁亥以前右羽林軍統軍梁繼業為左衞上將軍壬辰以租庸判官檢校司徒張紹珪為光祿卿依前充租庸判官癸巳以權知平盧軍軍州事客省使知銀臺事元湘為檢校司空甲午以飛龍使婁繼英為左武衞大將軍三月庚申以前平戎軍使檢校司徒郭紹賓為禧州刺史辛酉以前天平軍節度副使裴彥為隨州刺史戊寅湖州刺史錢傳璟蘇州刺史錢傳案原本作傳王玉今據十國春秋改正舊五代史考異鎮海軍節度副使錢傳瓘溫州刺史錢傳璲睦州刺史錢傳懿寶州刺史錢傳明州刺史錢傳球義州刺史錢傳峯州刺史錢傳珦案歐陽史職方志有封州而無峯州薛史前後俱作峯州未知何據今仍其舊舊五代史考異巒州刺史錢傳琰鎮海軍都知兵馬使錢傳等凡一十一人並加官勳階爵從吳越王錢鏐之請也案吳越備史載錢鏐諸子所加官勳階爵失載傳璟故十一人僅存其十又其名間有異同當以薛史為得實舊五代史考異夏四月庚辰以前行左武衞大將軍蔡敬思為右武衞上將軍辛巳以前安州刺史劉玘權知晉州軍州事以前密州刺史張實為潁州刺史充本州團練使癸未以六軍押牙充左天武軍使劉彥珪為澶州刺史辛卯以右千牛衞大將軍劉璩充契丹宣諭使詔諸道兵馬元帥開幕除吏一同天策上將府故事辛丑以清海軍元從都押牙隴州刺史吳鍔為檢校司空癸卯以兩浙衙內先鋒指揮使守峯州刺史錢傳珦為泗州刺史六月庚辰以前東京馬步都指揮使兼左天武軍使雷景從為汝州刺史充本州防禦使辛卯以租庸判官光祿大夫檢校司徒行光祿卿張紹珪為申州刺史壬辰以權知晉州建寧軍軍州事前安州刺史劉玘為建寧軍節度觀察留後秋七月丁巳以淄州刺史陳洪為棣州刺史乙丑以刑部員外郎封翹為翰林學士封翹原本作封堯今據封舜卿傳改正影庫本粘籤丙寅以汝州刺史楊延直為左衞大將軍以前左衞上將軍劉重霸為起復雲麾將軍右驍衞上將軍庚午以六軍諸衞副使起復雲麾將軍檢校太保張業為淄州刺史八月辛巳以左神武軍統軍周武為寧州刺史以左崇安指揮使前申州刺史劉仁鐸為衍州刺史戊子泰寧軍節度使張萬進賜名守進九月庚申以遙領常州刺史張昌孫遙領壽州刺史充本州團練使冬十月壬午以權西面行營都監右武衞上將軍張筠權知商州軍州事戊子詔曰太子太傳李戩多因釋教誑惑羣情此後不得出入無恆癸巳以前崇德軍使張思綰為左武衞上將軍己亥以啟聖匡運同德功臣諸道兵馬元帥淮南鎮海鎮東等軍節度使充淮南宣潤等四面行營都統開府儀同三司尚書令吳越王錢鏐為天下兵馬元帥壬寅以尚書左丞吳藹為工部尚書充兩浙官告使官告使不見于五代會要疑有舛誤考冊府元龜亦作官告今姑仍其舊影庫本粘籤是月晉王自魏州還太原閏十月丁卯以前商州刺史徐璫為左驍衞上將軍充西都大內皇牆使十一月壬午以中書侍郎平章事鄭王玉權判戶部事戊子以寧州刺史周武為武靜軍防禦使守慶州刺史以河潼軍使竇廷琬為寧州刺史十二月晉王自太原復至魏州庚申以左金吾衞大將軍充街使華溫琪為右龍虎軍統軍以右龍虎軍統軍張彥勳為商州刺史以前西京大內皇牆使李項為右威衞上將軍以左金吾衞上將軍李周彝權兼左街使壬戌以守太尉兼中書令河南尹判六軍諸衞事魏王張宗奭為天下兵馬副元帥丙寅以西面行營馬軍都指揮使檢校太保鄭州刺史充本州防禦使王彥章為檢校太傅丁卯以西面行營馬步都指揮使左龍虎軍統軍賀瓌為檢校太傅同中書門下平章事充宣義軍節度使鄭滑濮等州觀察處置等使案通鑑時論平慶州功故賀瓌進秩己巳帝幸洛陽為來年有事於南郊也遂幸伊闕親拜宣陵時租庸使趙巖勸帝郊天且言帝王受命須行此禮願陛下力行之宰臣敬翔奏曰國家自劉鄩失律已來府藏殫竭箕斂百姓供軍不暇郊祀之禮頒行賞賚所謂取虛名而受實弊也況晉人壓境車駕未可輕動帝不聽遂行是月晉人陷楊劉城帝聞之懼遂停郊禮車駕急歸東京案通鑑云道路訛言晉軍已入大梁扼汜水矣從官皆憂其家相顧涕泣帝惶駭失圖遂罷郊祀癸酉詔文武兩班除元隨駕人數外其餘並令御史司憲張衮部署候車駕離京後一兩日發赴東京甲戌以天下兵馬副元帥太尉兼中書令河南尹魏王張宗奭為西都留守貞明四年春正月晉人寇鄆濮之境車駕至自洛陽案五代春秋作己卯帝還東都舊五代史考異庚辰以蔡州刺史姚勍權知感化軍節度觀察留後乙酉以前靜難軍馬步軍都指揮使黃貴為蔡州刺史甲午以右領軍衞上將軍齊奉國為左金吾衞大將軍充街使二月遣將謝彥章帥衆數萬迫楊劉城甲子晉王來援楊劉城彥章之軍不利而退三月壬午以前右武衞上將軍張筠為左衞上將軍癸巳以鎮國軍節度押衙充本道馬步軍都指揮使江可復為衍州刺史壬寅鎮海鎮東等軍節度行軍司馬秦州節度使檢校太傅同平章事馬綽加檢校太尉同平章事依前鎮海鎮東等軍節度行軍司馬餘如故從錢鏐之請也夏四月丁未以宣徽使右衞上將軍趙縠權知青州軍州事以宣徽院副使韋堅權知本院事宣徽院原本作宣嶽院考五代會要宣徽院次于樞密院今改正影庫本粘籤己酉以銀青光祿大夫行中書侍郎同中書門下平章事權判戶部鄭王玉為金紫光祿大夫中書侍郎兼刑部尚書平章事集賢殿大學士判戶部上柱國仍進封滎陽郡開國侯加食邑五百戶以金紫光祿大夫行尚書吏部侍郎上柱國蘭陵縣開國男食邑三百戶蕭頃為中書門下平章事仍進封蘭陵縣開國伯加食邑四百戶庚戌以前崇德軍使前右武衞大將軍杜存為右領軍衞上將軍甲寅以刑部郎中充史館修撰竇專為翰林學士案專同州白水人貞固之父也貞固宋史有傳舊五代史考異初學士竇夢徵草錢鏐麻貶蓬萊尉帝召專入翰林遣崇政使李振問宰相云專是宰臣蕭頃女婿令中書商量可否中書奏曰宰相親情不居清顯避嫌之道雖著舊規若蒙特恩亦有近例固不妨事帝乃可之己未靈武節度使韓洙案原本作韓殊考韓遜傳洙即遜之子歐陽史雜傳亦作洙今改正舊五代史考異落起復授開府儀同三司依前檢校太傅同平章事癸亥以延州忠義軍節度使太原西面招討應接使檢校太師兼中書令渤海王高萬興兼鄜延兩道都制置使餘如故時萬興弟鄜州節度使萬金卒故有是命己巳以開府儀同三司守司空兼門下侍郎同平章事趙光逢為司徒致仕兼加食邑五百戶以光逢累上章請老故也辛未詔宰臣敬翔權判諸道鹽鐵使務壬申以太子賓客趙光胤為吏部侍郎五月甲戌以荊南衙內馬步軍都指揮使檢校司徒高從誨領濠州刺史乙亥以特進檢校太傅前潁州團練使張實為起復雲麾將軍依前潁州團練使庚辰以工部尚書致仕孔拯為國子祭酒己丑以太常少卿韋彖為右諫議大夫六月甲辰以金紫光祿大夫檢校司徒歙州刺史朱令德為忠武軍節度觀察留後己酉以權知感化軍兩使留後特進檢校太保姚勍為感化軍節度觀察留後庚戌上以祕書少監王翹為將作監以其父名祕故也丙辰以左監門衞將軍康贊美為商州刺史以左衞上將軍張筠為權知永平軍節度觀察留後兼判大安府事戊午以前景州刺史衞審符為右衞大將軍庚申以河陽節度充北面行營排陣兩京馬軍都軍節度等使光祿大夫檢校太保謝彥章為匡國軍節度陳許蔡等州觀察處置等使以宣徽院副使韋堅權知河陽軍州事秋七月庚辰以商州刺史康贊美為起復雲麾將軍依前商州刺史辛卯以前左驍衞上將軍楊詔為右武衞上將軍戊戌以前匡國軍節度使檢校尚書左僕射羅周敬案原本作用敬考薛史晉列傳作周敬歐陽史羅紹威傳亦作子周敬今改正舊五代史考異為檢校司空守殿中監駙馬都尉八月丙午以右廣勝軍使劉君鐸為虢州刺史戊申以武寧軍節度副使李存權知宿州事辛亥涇原節度使杜建徽加檢校太傅同平章事建徽案原本訛作達徽今據十國春秋改正舊五代史考異吳越王錢鏐之將也遙領涇原節制至是以其上請加恩故有是命乙卯以蔡州刺史黃貴為絳州刺史辛酉以絳州刺史尹皓為感化軍節度觀察留後癸亥以前永平軍節度副使張正己為房州刺史乙丑以宿州團練使趙麓權知河陽節度觀察留後以左驍衞將軍劉去非為郢州刺史戊辰以權知永平軍節度觀察留後兼判大安府事張筠為永平軍節度觀察留後依前兼判大安府事是月晉王率師次楊劉口遂軍於麻家渡北面招討使賀瓌以兵屯濮州北行臺村對壘百餘日晉王以輕騎來覘許州節度使謝彥章發伏兵掩擊圍之數重會救軍至晉王僅以身免九月丁丑靜勝軍節度崇裕等州觀察處置等使特進檢校太傅同平章事溫昭圖加檢校太尉甲午崇政院副使張希逸加金紫光祿大夫行祕書少監乙未起復雲麾將軍檢校太保壽州團練使張昌孫落起復授光祿大夫檢校太傅冬十月辛丑朔以前感化軍節度觀察留後特進檢校太保姚勍為左龍虎統軍充西都內外馬步軍都指揮使以洛苑使金紫光祿大夫檢校司徒守左威衞大將軍董璋為右龍虎統軍己酉以安南靜海節度使檢校司徒曲美為檢校太保同平章事庚戌以商州刺史康贊美為蔡州刺史十一月壬辰前懷州刺史朱勍授起復雲麾將軍依前懷州刺史十二月庚子朔晉王領軍迫行臺寨距寨十里結營而止北面招討使賀瓌殺許州節度使謝彥章𣾴州刺史孟審澄別將侯溫裕等於軍以謀叛聞為行營馬步都虞候朱珪搆之也晉王聞之喜曰彼將帥不和亡無日矣案通鑑賀瓌密譖謝彥章于帝因與朱珪伏甲以殺彥章蓋賀瓌密奉帝旨也五代春秋歐陽史皆以賀瓌專殺為文恐非事實丁未以行營諸軍馬步都虞候光祿大夫檢校太保曹州刺史朱珪為檢校太傅充匡國軍節度觀察留後依前行營諸軍馬步都虞候癸丑詔曰行營諸軍馬步都虞候匡國軍節度觀察留後朱珪昨以寇戎未滅兵革方嚴所期朝夕之間克弭烟塵之患每於將帥別注憂勞而謝彥章孟審澄侯溫裕忽搆異圖將萌逆節賴朱珪挺施貞節密運沈機果致梟擒免資讎敵特加異殊之命用旌忠孝之謀便委雄藩俾荷隆渥可檢校太傅充平盧軍節度淄青登萊等州觀察處置押新羅渤海兩番等使兼行營諸軍馬步軍副都指揮使仍進封沛國郡開國侯乙巳起復雲麾將軍檢校太保陳州刺史惠王友能惠王原本作忠王今據歐陽史改正影庫本粘籤鎮國軍節度陝虢等州觀察處置等使起復雲麾將軍檢校太保邵王友誨並落起復加檢校太傅以前房州刺史牛知業為右羽林軍統軍癸亥北面招討使賀瓌率大軍與晉人戰於胡柳陂晉人敗績是日既晡復為晉人所敗初晉人起軍將襲東京乃下令軍中老弱悉歸於鄴是月二十二日晉王次臨濮賀瓌王彥章自行臺寨率軍躡之二十四日至胡柳陂晉王領軍出戰瓌軍已成列晉王以騎突之王彥章一軍先敗彥章走濮陽晉人輜重在陣西瓌領軍薄之晉人大奔自相蹈籍死者不可勝紀晉大將周德威歿於陣瓌軍乃登土山列陣於山之下晉王復領兵來戰瓌軍遂敗翌日晉人攻濮陽陷之京師戒嚴貞明五年春正月晉人城德勝夾河為柵二月乙巳以宣徽院副使韋堅權知徐州軍事三月己卯以華州感化軍留後尹皓為華州節度使加檢校太保同平章事癸未制削奪兗州節度使張守進在身官爵以其叛故也仍命劉鄩為兗州管內安撫制置使領兵以攻之案張守進歸晉本紀繫於五年三月張萬進傳作四年七月劉鄩傳仍作五年通鑑考異嘗並舉紀傳之互文以明薛史之難據因定從莊宗實錄作四年八月今以當日事勢考之藩鎮反覆向背無常陰謀詭祕姑示含容討罪遣師須有顯迹蓋守進潛附于晉自在四年秋至削奪官爵聲罪致討則五年春事也薛史采用舊聞不加修飾故語必徵實若五代春秋以守進叛為五年事歐陽史又以劉鄩討之為四年事皆刪改成文自為臆斷不如薛史之存其實也夏四月壬寅以永平軍留後兼判大安府事張筠為永平軍節度使檢校太保行大安尹庚戌以鎮海軍北面水陸都指揮使湖州刺史檢校太傅錢傳璟遙領宣州寧國軍節度使加同平章事是月賀瓌攻德勝南城以艨艟戰艦橫於河以扼津濟之路晉人斷其艨艟濟軍以援南城瓌等退軍五月己巳山南東道節度使檢校太傅孔勍加同平章事丁亥以延州節度使鄜延兩道都制置太原西面招討應接等使渤海郡王高萬興為檢校太師兼中書令充保大忠義等軍節度鄜延管內觀察等使是月以行營諸軍左廂馬軍都指揮使鄭州防禦使王彥章為許州匡國軍節度觀察留後依前行營諸軍左廂馬軍都指揮使六月壬戌以天驥院使李隨權知登州軍州事秋七月晉王自魏州還太原八月乙未朔滑州節度使賀瓌卒輟視朝三日詔贈侍中是月命開封尹王瓚為北面行營招討使瓚乃與許州留後王彥章等率大軍自黎陽濟營於楊村造浮梁以通津路九月丙寅制削奪廣州節度使南平王劉巖在身官爵以其將謀僭號故也仍詔天下兵馬元帥錢鏐指揮攻討冬十月晉王復至魏州是月劉鄩攻下兗州擒張守進夷其族十一月丁丑以兗州安撫制置使特進檢校太傅大彭郡開國公劉鄩為兗州節度使開府儀同三司檢校太尉同平章事賞平兗之功也辛卯王瓚帥師至戚城遇晉軍交綏而退十二月戊戌晉王領軍迫河南寨王瓚率師禦之獲晉將石家才案通鑑石家才作石君立考薛史列傳君立一名家財既而瓚軍不利瓚退保楊村寨晉人陷濮陽永樂大典卷六千六百五案上文四年十二月已云晉人攻濮陽陷之至此復云晉人陷濮陽前後重複通鑑考異歷引薛史閻寶李嗣昭傳及莊宗實錄而斷之曰去冬唐雖得濮陽棄而不守今年復攻拔之也參考事勢當得其實
