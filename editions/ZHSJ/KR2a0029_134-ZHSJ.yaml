body:
  text: 史臣曰昔唐祚橫流異方割據行密以高材捷足啟之於前李以履霜堅冰得之於後以偽易偽逾六十年洎有周興薄伐之師皇上示懷柔之德而乃走梯航而入貢奉正朔以來庭如是則長江之險又何足以恃哉審知僻據一隅僅將數世始則可方於吳芮終則竊効於尉佗與夫穴蜂井蛙亦何相遠哉五紀之亡蓋其幸世永樂大典卷六千八百四十八
