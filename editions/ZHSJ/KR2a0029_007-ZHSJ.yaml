body:
  text: 舊五代史卷七梁書七太祖紀第七乾化二年正月宣上元夜任諸寺及坊市各點彩燈金吾不用禁夜近年以來以都下聚兵太廣未嘗令坊市點燈故也冊府元龜卷一百九十一甲申以時雪久愆命丞相及三省官羣望祈禱永樂大典卷二千六百三十二三省原本作五有今改正影庫本粘籤詔曰謗木求規集囊貢事將裨理道豈限側言應內外文武百官及草澤並許上封事極言得失冊府元龜卷二百十二以丁審衢為陳州而審衢厚以鞍馬金帛為謝恩之獻帝慮其漁民復其獻而停之冊府元龜卷二百十五封保義節度使王檀為琅琊郡王冊府元龜卷一百九十六命供奉官朱嶠於河南府宣取先收禁定州進奉官崔騰並傔從一十四人並釋放仍命押領送至貝案原本貝訛具今據通鑑改正舊五代史考異騰唐戶部侍郎潔之子也廣明喪亂客於北諸侯為定州節度使王處存所辟去載領貢獻至闕未幾其帥稱兵其帥原本作其師今據文改正影庫本粘籤遂縶之至是帝念賓介之來又已出境特命縱而歸焉冊府元龜卷二百九丙戌有司以孟春太廟薦享上言命丞相杜曉攝祭行事冊府元龜卷一百八十九丙申夕熒惑犯房第二星永樂大典卷二萬二千五百十六二月庚戌中和節御崇勳殿召丞相大學士河南尹略對訖於萬春門外廡賜以酒食冊府元龜卷一百九十七案五代會要二月追封故魏博節度使羅弘信為趙王舊五代史考異癸丑勅曰今載春寒頗甚雨澤仍愆司天監占以夏秋必多霖潦宜令所在郡縣告喻百姓備淫雨之患永樂大典卷二千六百三十二案歐陽史丁巳光祿卿盧玭使於蜀庚申御宣威殿開宴丞相洎文武官屬咸被召列侍竟日而罷冊府元龜卷一百九十七壬戌帝將巡按北境中外戒嚴詔以河南尹守中書令判六軍事張宗奭為大內留守中書門下奏差定文武官領務尤切宜扈駕者三十八人詔工部尚書李皎左散騎常侍孫騭右諫議大夫張衍兵部侍郎劉邈兵部郎中張儁光祿少卿盧秉彝並令扈蹕甲子發自雒師夕次河陽案通鑑云至白馬頓賜從官食多未至遣騎趣之於路左散騎常侍孫騭右諫議大夫張衍兵部郎中張儁最後至帝命撲殺之乙丑次溫縣丙寅次武陟懷州刺史段明遠迎拜於境上其內外所備咸豐霈焉丁卯次獲嘉戊辰次衞州之新鄉己巳晨發衞州案原本脫發字今據文增入舊五代史考異夕止淇門內衙十將使以十指揮兵士至於行在辛未駐蹕黎陽癸酉發自黎陽夕次內黃甲戌次昌樂縣丁丑次于永濟縣青州節度使賀德倫奏統領兵士赴歷亭軍前戊寅至貝州命四丞相及學士李琪盧文度知制誥竇賞等十五人扈從其左常侍韋戩等二十三人止焉己卯發自貝州夕駐蹕於野落三月庚辰朔次于棗強縣之西城案通鑑辛巳至下博南登觀津冢趙將符習引數百騎巡邏不知是帝遽前逼之或告曰晉兵大至矣帝棄行幄亟引兵趣棗強與楊師厚軍合舊五代史考異丙戌鎮定諸軍招討使楊師厚奏下棗強縣車駕即日疾馳南還丁亥復至貝州案通鑑帝以蓨縣未下引兵攻之丁亥始至縣西戊子至冀州與薛史異地又案五代春秋二月侵趙克棗強與薛史異月舊五代史考異庚寅楊師厚與副招討李周彝等准詔來朝冊府元龜卷二百五案五代春秋二月侵趙克棗強進次蓨縣圍之晉人救蓨帝還師滄州張萬進以地來歸辛卯詔丞相翰林大學士文武從官都招討使及諸軍統指揮使等賜食於行殿壬辰命以羊酒等各賜從官冊府元龜卷一百九十七甲午幸貝州之東闉閱武乙未帝復幸東闉閱騎軍冊府元龜卷二百十四勅以攻下棗強縣有功將校杜暉等一十一人並超加檢校官衙官宋彥等二十五人並超授軍職冊府元龜卷二百一十丙午次濟源縣詔曰淑律將遷亢陽頗甚宜令魏州差官祈禱龍潭戊申詔曰雨澤愆期祈禱未應宜令宰臣各於魏州靈祠精加祈禱永樂大典卷二千六百三十二案五代會要三月詔曰夫隆興邦國必本于人民惠養疲羸尤資于令長苟選求之踰濫固撫理之乖違如聞吏部擬官中書除授或緣親舊所請或為勢要所干姑徇私情靡求才實念茲蠹弊宜舉條章今後應中書用人及吏部注擬並宜省藩身之才業驗為政之否臧必有可觀方可任用如或尚行請說猶假貨財其所司人吏必當推窮重加懲斷舊五代史考異四月己酉幸魏州案通鑑乙巳帝發貝州丁未至魏州俱在三月與薛史異舊五代史考異金波亭賜宴宰臣文武官及六學士冊府元龜卷二百五甲寅夕月掩心大星丙辰敕近者星辰違度式在修禳宜令兩京及宋州魏州取此月至五月禁斷屠宰仍各於佛寺開建道場以迎福應永樂大典卷二千六百三十二己未次黎陽縣案通鑑乙卯博王友文來朝請帝還東都丁巳發魏州己未至黎陽以疾淹留舊五代史考異東都留守官吏奉表起居賜丞相從官酒食有差己巳至東都博王友文以新創食殿上言幷進准備內宴錢三千貫內宴原本作內安今據文改正影庫本粘籤銀器一千五百兩辛未宴於食殿召丞相文武從官等侍焉冊府元龜卷一百九十七帝泛九曲池御舟傾帝墮溺於池中宮女侍官扶持登岸驚悸久之永樂大典卷一千五十二制加建昌宮使金紫光祿大夫檢校司徒開封尹博王友文為特進檢校太保兼開封尹依前建昌宮使充東都留守冊府元龜卷二百六十九戊寅車駕發自東京夕次中牟縣五月己卯朔從官文武自丞相而下並詣行殿起居親王及諸道藩帥咸奉表來上庚辰發自鄭州發自鄭州原本發作鄧今據文改正影庫本粘籤至滎陽河南尹魏王宗奭望塵迎拜河陽留後邵贊懷州刺史段明遠等邐迤來迎夕次汜水縣帝召魏王宗奭入對便於御前賜食數刻乃退壬午駐蹕於汜水宰臣河南尹大學士並於內殿起居勅以建昌宮事委宰臣于兢領之案五代會要其年六月廢建昌宮以河南尹魏王張宗奭為國計使凡天下金穀兵戎舊隸建昌宮者悉主之舊五代史考異癸未帝發自汜水宣令邵贊段明遠各歸所理午憩任村頓夕次孝義宮留都文武禮部尚書孔續而下道左迎拜次偃師甲申至都文武臣奉迎於東郊冊府元龜卷二百五宰臣薛貽矩抱恙在假不克扈從宣問旁午仍命且駐東京以俟良愈及薨帝震悼頗久命雒苑使曹守璫往弔祭之又命輟六日七日八日朝參丞相文武並詣上閤門進名奉慰冊府元龜卷三百一十九丁亥以彗星謫見詔兩京見禁囚徒大辟罪以下遞減一等限三日內疏理訖聞奏永樂大典卷二千六百三十二案五代會要彗星見于靈臺之西至五月始降赦宥罪以答天譴又云五月壬戌夜熒惑犯心大星去心四度順行司天奏大星為帝王之星宜修省以答天譴舊五代史考異詔曰生育之人爰當暑月乳哺之愛方及薰風儻肆意於刲屠豈推恩於長養俾無殄暴以助發生宜令兩京及諸州府夏季內禁斷屠宰及採捕天民之窮諒由賦分國章所在亦務興仁所在魚眾寡孤獨廢疾不濟者委長吏量加賑卹史載葬枯用彰軫卹禮稱掩骼將致和平應兵戈之地有暴露骸骨委所在長吏差人專功收瘞國癘之文尚標七祀良藥之市亦載三醫用憐無告之人宜徵有喜之術案原本有喜訛有嘉今改正舊五代史考異凡有疫之處委長吏檢尋醫方於要路曉示如有家無骨肉兼困窮不濟者即仰長吏差醫給藥救療之冊府元龜卷一百九十五辛卯詔曰亢陽滋甚農事已傷宜令宰臣于兢赴中嶽杜曉赴西嶽精切祈禱其近京靈廟宜委河南尹五帝壇風師雨師九宮貴神案原本貴神訛降神今據通典及新唐書禮志改正舊五代史考異委中書各差官祈之永樂大典卷二千六百三十二通鑑閏月壬戌帝疾甚謂近臣曰我經營天下三十年不意太原餘孽更昌熾如此吾觀其志不小天復奪我年我死諸兒非彼敵也吾無葬地矣因哽咽絕而復蘇帝長子郴王友裕早卒次假子友文帝特愛之常留守東都兼建昌宮使次郢王友珪其母亳州營倡也為左右控鶴都指揮使次均王友貞為東都馬步都指揮使殿本案通鑑初元貞張皇后嚴整多智帝敬憚之后殂帝縱意聲色諸子雖在外常徵其婦入侍帝往往亂之友文婦王氏色美帝尤寵之雖未以友文為太子帝意常屬之友珪心不平友珪嘗有過帝撻之友珪益不自安帝疾甚命王氏召友文于東都欲與之訣且付以後事友珪婦張氏亦朝夕侍帝側知之密告友珪曰大家以傳國寶付王氏懷往東都吾屬死無日矣夫婦相泣左右或說之曰事急計生何不改圖時不可失六月丁丑朔帝命敬翔出友珪為萊州刺史即令之官已宣旨未行勅時左遷者多追賜死友珪益恐戊寅友珪易服微行入左龍虎軍見統軍韓勍以情告之勍亦見功臣宿將多以小過被誅懼不自保遂相與合謀勍以牙兵五百人從友珪雜控鶴士入伏於禁中中夜斬關入至寢殿侍疾者皆散走帝驚起問反者為誰友珪曰非他人也帝曰我固疑此賊恨不早殺之汝悖逆如此天地豈容汝乎友珪曰老賊萬段友珪僕夫馮廷諤刺帝腹刃出於背友珪自以敗裹之瘞于寢殿祕不發喪遣供奉官丁昭溥馳詣東都命均王友貞殺友文己卯矯詔稱博王友文謀逆遣兵突入殿中賴郢王友珪忠孝將兵誅之保全朕躬然疾因震驚彌致危殆宜令友珪權主軍國之務韓勍為友珪謀多出府庫金帛賜諸軍及百官以取悅辛巳丁昭溥還聞友文已死乃發喪宣遺制友珪即皇帝位今考友珪弒逆之事薛史原文永樂大典已佚冊府元龜亦無所徵引謹附錄通鑑於此友珪葬太祖於伊闕縣號宣陵永樂大典卷一萬八千三百十四案五代會要太祖崩年六十一中書侍郎平章事杜曉撰哀冊文門下侍郎平章事趙光逢撰謚冊文太常卿李燕撰謚議又案友珪篡位後諸偽政考薛史之體應附見太祖紀後今原本己佚而其事散見諸臣列傳者猶可考見今不復援引他書補載於後焉五代史補太祖朱全忠黃巢之先鋒巢入長安以刺史王鐸圍同州太祖遂降鐸承制拜同州刺史黃巢滅淮蔡間秦宗權復盛朝廷以淮蔡與汴州相接太祖汴人必究其能否遂移授宣武軍節度使以討宗權未幾滅之自是威福由己朝廷不能制遂有天下先是民間傳讖曰五公符又謂之李淳風轉天歌其字有八牛之年識者以八牛乃朱字則太祖革命之應焉太祖之用兵也法令嚴峻每戰逐隊主帥或有沒而不反者其餘皆斬之謂之跋隊斬自是戰無不勝然健兒且多竄匿州郡疲於追捕因下令文面健兒文面自此始也宋陶岳撰五代史補多述瑣事以補薛史所未備其事有關係者通鑑及歐陽史亦間為采取並識小之流于史學固不無裨益也今每條分綴紀傳之後以備參考影庫本粘籤五代史闕文世傳梁太祖迎昭宗於鳳翔素服待罪昭宗佯為㙐系脫呼梁祖曰全忠為吾繫㙐梁祖不得已跪而結之汗流浹背時天子扈蹕尚有衞兵昭宗意謂左右擒梁祖以殺之其如無敢動者自是梁祖被召多不至盡去昭宗禁衞皆用汴人矣臣謹案梁祖以天復三年迎唐昭宗於岐下歲在甲子其年改天祐至國初建隆庚申歲纔五十六年矣然則乾德七十歲人皆目睹其事蓋唐室自懿宗失政天下亂離故武宗以下實錄不傳於世昭宗一朝全無記注梁祖在位止及六年均王朝詔史臣修梁祖實錄岐下繫㙐之事而不書晉天福中史臣張昭重修唐史始有昭宗本紀但云即位之始有會昌之風岐陽事迹不能追補此亦明唐昭宗有英睿之氣而衰運不振又明左右無忠義奮發之臣致梁祖得行其志有所警戒不可不書宋王禹偁撰五代史闕文多舉軼事兼駁正舊史之失議論多可取今每條附見紀傳之末後倣此影庫本粘籤
