body:
  text: 舊五代史卷一百三漢書五隱帝紀下乾祐三年春正月己亥朔帝不受朝賀鳳翔行營都部署趙暉奏前月二十四日收復鳳翔逆賊王景崇舉族自燔而死案歐陽史作正月西面行營都部署趙暉克鳳翔據薛史則收復鳳翔自在二年十二月非三年春事也歐陽史蓋誤以告捷之月為收復之月耳五代春秋作十二月趙暉克鳳翔誅王景崇為得其實丁未鳳翔節度使充西南行營都部署趙暉加兼侍中戊申密州刺史王萬敢奏奉詔領兵入海州界至荻水鎮俘掠焚蕩更請益兵詔前沂州刺史郭瓊率禁軍赴之庚戌前永興軍節度副使安友規除名流登州沙門島先是友規權知永興軍府事及趙思綰之奔衝友規失守城池至是乃正其罪焉癸亥癸亥以長歷推之當作癸丑今無別本可校姑仍其舊影庫本粘籤以前邠州節度使宋彥筠為太子太師致仕丙寅分命使臣赴永興鳳翔河中收葬用兵已來所在骸骨時已有僧聚髑髏二十萬矣前沂州刺史郭瓊奏部署兵士深入海州賊界是月有狐登明德樓主者獲之狐毛長而腹下別有二足二月辛巳青州奏郭瓊部署兵士自海州迴至當道甲申樞密使郭威巡邊迴丁亥汝州防禦使劉審交卒乙未以前安州節度使劉遂凝為左武衞上將軍以鄜州節度使焦繼勳為右武衞上將軍以前永興軍節度使趙贊為左驍衞上將軍三月己亥徐州部送所獲淮南都將李暉等三十三人徇于市給衫帽放還本土是月鄴都留守高行周兗州符彥卿鄆州慕容彥超西京留守白文珂鎮州武行德安州楊信潞州常思府州折從阮皆自鎮來朝嘉慶節故也戊午宴羣臣於永褔殿帝初舉樂壬戌鄴都高行周移鎮鄆州兗州符彥卿移鎮青州並加邑封甲子西京留守白文珂潞州常思鎮州武行德並進邑封鄆州慕容彥超移鎮兗州夏四月戊辰朔邢州薛懷讓移鎮同州相州郭謹河陽李暉並進邑封庚午府州折從阮移鎮鄧州辛未故深州刺史史萬山案遼史世宗紀殺深州刺史史萬山在天祿三年即漢乾祐二年贈太傅先是契丹入邊萬山城守郭威遣索萬進率騎七百屯深州一日契丹數千騎迫州東門萬山父子率兵百餘人襲之契丹偽退十餘里而伏兵發萬山血戰急請救於萬進萬進勒兵不出萬山死之契丹亦解去時論以萬進為罪故加萬山贈典焉壬申華州劉詞移鎮邢州安州楊信移鎮鄜州貝州王令溫移鎮安州並加邑封以鄜州留後王饒為華州節度使以其來朝故也丁丑尚食奉御王紹隱除名流沙門島坐匿軍營女口也辛巳以宣徽北院使吳虔裕為鄭州防禦使時樞密使楊邠上章乞解樞機帝命中使諭之曰樞機之職捨卿用誰忽有此章莫有人離間否虔裕在傍颺言曰樞密重地難以久處俾後來者迭居相公辭讓是也中使還具奏帝不悅故有是命壬午以樞密使郭威鄴都留守依前樞密使詔河北諸州應兵甲錢帛糧草一稟郭威處分癸未府州永安軍額宜停命降為團練州戊子翰林學士承旨戶部尚書王仁裕罷職守兵部尚書左千牛上將軍張瓘卒庚寅以西南面水陸轉運使尚書工部侍郎李穀為陳州刺史左金吾上將軍致仕馬萬卒甲午以前華州節度使安審信為左衞上將軍以前潞州節度使張從恩為右衞上將軍五月戊戌朔帝御崇元殿受朝丙午以皇弟興元節度使承勳為開封尹加兼中書令未出閤甲子詔諸道州府差置散從官大府五百人上州三百人下州二百人勒本處團集管係立節級檢校教習以警備州城閏月癸巳京師大風雨壞營舍吹鄭門扉起十數步而墮拔大木數十震死者六七人水平地尺餘池隍皆溢是月宮中有怪物投瓦石擊窗撼扉人不能制六月庚子以國子祭酒田敏為尚書右丞癸卯太僕卿致仕謝攀卒輟視朝一日鄭州奏河決原武縣界乙卯司天臺上言鎮星逆行至太微左掖門外自戊申年八月十二日入太微西垣犯上將屏星執法勾己往來至己酉年十一月十二日夜方出左掖門順行自今年正月十日夜復逆行入東垣至左掖門秋七月庚午河陽奏河漲三丈五尺乙亥滄州奏積雨約一丈二尺安州奏溝河泛溢州城內水深七尺丙子帝御崇元殿授皇太后冊命宰臣蘇逢吉行禮辛巳三司使奏州縣令錄佐官請據戶籍多少量定俸戶縣三千戶已上令月十千主簿八千二千戶已上令月八千主簿五千二千戶已下令月六千主簿四千每戶月出錢五百並以管內中等戶充錄事參軍判司俸錢視州界令佐取其多者給之其俸戶與免縣司差役從之八月辛亥以蒙州城隍神為靈感王從湖南請也時海賊攻州城州人禱於神城得不陷故有是請辛酉給事中陶穀上言請停五日內殿轉對從之壬戌以兵部侍郎于德辰為御史中丞邊蔚為兵部侍郎九月辛巳朗州節度使馬希萼奏請於京師別置邸院朗州原本作狼州今據十國春秋改正影庫本粘籤不允是時希萼與其弟湖南節度使希廣方搆薴妨銵故有是請帝以湖南已有邸務不可更置由是不允仍命降詔和解焉冬十月己亥帝狩於近郊丙午湖南馬希廣遣使上章且言荊南淮南廣南三道結搆欲分割湖湘乞聊發兵師以為援助時朝廷方議起軍會內難不果行丁未兩浙錢弘俶加諸道兵馬元帥戊申彰德軍節度使郭謹卒癸丑以前同州節度使張彥贇為相州節度使辛酉月犯心大星十一月甲子朔日有蝕之乙丑永州唐將軍祠贈太保從湖南請也己巳日南至帝御崇元殿受朝賀仗衞如式辛未詔侍衞步軍都指揮使王殷將兵屯澶州丙子誅樞密使楊邠侍衞都指揮使史弘肇三司使王章夷其族是日平旦甲士數十人由廣政殿出至東廡下害邠等於閣內皆死於亂刃之下又誅弘肇弟小底軍都虞候弘朗如京使甄彥奇內常侍辛從審楊邠子比部員外郎廷侃右衞將軍廷偉左贊善大夫廷倚王章侄右領衞將軍旻子壻戶部員外郎張貽肅樞密院副承宣郭顒控鶴都虞候高進侍衞都承局荊南金三司都勾官柴訓等分兵收捕邠等家屬及部曲傔從盡戮之少頃樞密承旨聶文進急召宰臣百僚班於崇元殿庭宣曰楊邠史弘肇王章等同謀叛逆欲危宗社並斬之與卿等同慶班退召諸軍將校至萬歲殿帝親諭史弘肇等欲謀逆亂之狀且言弘肇等欺朕年幼專權擅命使汝輩常懷憂恐自此朕自與汝等為主必無橫憂也諸軍將校拜謝而退召前任節度使刺史統軍等上殿諭之帝遣軍士守捉宮城諸門比近日旰朝臣步出宮門而去是日晴霽無雲而昏霧濛濛有如微雨人情惴恐日將午載楊邠等十餘尸分暴於南北市是日帝遣腹心齎密詔往澶州鄴都令澶州節度使李洪義案宋史洪義本名洪威避周太祖諱改舊五代史考異誅侍衞步軍都指揮使王殷令鄴都屯駐護聖左廂都指揮使郭崇案東都事略郭崇初名崇威避周太祖諱止稱崇舊五代史考異奉國左廂都指揮使曹英害樞密使郭威及宣徽使王峻急詔鄆州高行周青州符彥卿永興郭從義兗州慕容彥超同州薛懷讓鄭州吳虔裕陳州李穀等赴闕以宰臣蘇逢吉權知樞密院事前青州劉銖權知開封府事侍衞馬軍都指揮使李洪建判侍衞司事內客省使閻晉卿權侍衞馬軍都指揮使丁丑澶州節度使李洪義受得密詔知事不克乃引使人見王殷殷與洪義遣本州副使陳光穗齎所受密詔馳至鄴都案宋史少帝遣供奉官孟業齎密詔令洪義殺王殷洪義素怯懦慮殷覺遷延不敢發遽引業見殷殷乃錮業送密詔于周祖舊五代史考異郭威得之即召王峻郭崇曹英及諸軍將校至牙署視詔兼告楊史諸公寃枉之狀且曰汝等當奉行詔旨斷予首以報天子自取功名郭威等與諸將校前曰此事必非聖意即是李業等竊發假如此輩便握權柄國得安乎事可陳論何須自棄致千載之下被此惡名崇等願從公入朝面自洗雪於是將校等請威入朝以除君側之惡共安天下案東都事略漢隱帝遣使害太祖魏仁浦曰公有大功于朝廷握強兵臨重鎮以讒見疑豈可坐而待斃教以易其語云誅將士以激怒衆心太祖納其言舊五代史考異翌日郭威以衆南行戊寅鄴兵至澶州庚辰至滑州節度使宋延渥開門迎降案歐陽史庚辰義成軍節度使宋延渥叛附于郭威與薛史同通鑑作辛巳與薛史異是日詔前開封尹侯益前鄜州節度使張彥超權侍衞馬軍都指揮使閻晉卿鄭州防禦使吳虔裕等率禁軍赴澶州守捉辛巳帝之小豎脫自北迴守捉原本作字足今從通鑑考異所引薛史改正又小豎脫通鑑字從鳥歐陽史字從馬胡三省通鑑注云力鍾翻又盧紅翻歐陽史作亦音龍薛史隱帝紀作周太祖紀作蓋亦據漢周實錄未及改從畫一也今姑從其舊影庫本粘籤先是帝遣脫偵鄴軍所至為游騎所獲郭威即遣廻因令附奏赴闕之意仍以密奏置脫衣領中帝覽奏即召李業示之聶文進郭允明等在傍懼形于色初議車駕幸澶州及聞鄴兵已至河上乃止帝大懼私謂宰臣竇貞固等曰昨來之事太草草耳李業等請帝傾府庫以給諸軍宰相蘇禹珪以為未可業拜禹珪於帝前曰相公且為官家莫惜府庫遂下令侍衞軍人給二十緡下軍各給十緡其北來將士亦準此仍遣北來將士在營子弟各齎家問向北諭之壬午鄴軍至封丘慕容彥超自鎮馳至帝遂以軍旅之事委之案宋史侯益傳云周太祖起兵隱帝議出師禦之益獻計曰王者無敵于天下兵不宜輕出況大名戍卒家屬盡在京城不如閉關以挫其銳遣其母妻發降以招之可不戰而定慕容彥超以為益衰老作懦夫計沮之舊五代史考異彥超謂帝曰陛下勿憂臣當生致其魁首彥超退見聶文進詢北來兵數及將校名氏文進告之彥超懼曰大是劇賊不宜輕耳又遣袁劉重進王知則等出師以繼前軍慕容彥超以大軍駐於七里郊掘塹以自衞都下率坊市出酒食以餉軍癸未車駕勞軍即日還宮翌日慕容彥超揚言曰官家宮中無事明日再出觀臣破賊甲申車駕復出幸七里店軍營王師陣於劉子陂劉子陂東都事略宋延渥傳作留子陂考通鑑歐陽史俱作劉蓋地名多用對音字今仍其舊影庫本粘籤與鄴軍相望太后以帝至晚在外遣中使謂聶文進曰賊軍在近大須用意文進曰有臣在必不失策縱有一百箇郭威亦當生擒之耳彥超輕脫先擊北軍郭威命何褔進王彥超李筠等大合騎以乘之彥超退却死者百餘人於是諸軍奪氣稍稍奔於北軍吳虔裕張彥超等相繼而去慕容彥超以部下十數騎奔兗州是夜帝與宰臣從官宿於野次侯益焦繼勳潛奔鄴軍乙酉旦帝策馬至玄化門劉銖在門上問帝左右兵馬何在乃射左右帝迴與蘇逢吉郭允明詣西北村舍郭允明知事不濟乃剚刃於帝而崩時年二十蘇逢吉郭允明皆自殺案通鑑考異引劉恕曰允明帝所親信何由弒逆蓋郭威兵殺帝事成之日諱之因允明自殺而歸罪耳今考劉恕所辨祇以揣度言之亦無實據薛史蓋據當時實錄也是日周太祖自迎春門入諸軍大掠煙火四發翌日至晡方定前滑州節度使白再榮為亂兵所害吏部侍郎張允墜屋而死周太祖既入京城命有司遷帝梓宮於太平宮或曰可依魏高貴鄉公故事以公禮葬之周祖曰予顛沛之中不能護衞至尊以至於此若又貶降人謂我何於是詔擇日舉哀命前宗正卿劉皡主喪丙戌太后誥曰高祖皇帝翦亂除兇變家為國救生靈於塗炭創王業於艱難甫定寰區遽遺弓劍樞密使郭威楊邠侍衞使史弘肇三司使王章親承顧命輔立少君協力同心安邦定國旋屬四方多事三叛連衡吳蜀內侵契丹啟釁蒸黎兇懼宗社阽危郭威授任專征提戈進討躬當矢石盡掃煙塵外寇盪平中原寧謐復以強敵未殄邊塞多艱允賴寶臣往臨大鄴疆埸有蕃籬之固朝廷寬宵旰之憂不謂兇豎連謀羣小得志密藏鋒刃竊發殿庭已殺害其忠良方奏聞於少主無辜受戮有口稱寃而又潛差使臣矯齎宣命謀害樞密使郭威宣徽使王峻侍衞步軍都指揮使王殷等人知無罪天不助奸今者郭威王峻澶州節度使李洪義前曹州防禦使何褔進前復州防禦使王彥超前博州刺史李筠北面行營馬步都指揮使郭崇步軍都指揮使曹英護聖都指揮使白重贊索萬進田景咸樊愛能李萬全史彥超奉國都指揮使張鐸王暉胡立弩手指揮使何贇等徑領兵師來安社稷逆黨皇城使李業內客省使閻晉卿樞密都承旨聶文進飛龍使後贊翰林茶酒使郭允明等脅君於大內出戰于近郊及至力窮遂行弒逆寃憤之極今古未聞今則兇黨既除羣情共悅神器不可以無主萬機不可以久曠宜擇賢君以安天下河東節度使崇許州節度使信皆高祖之弟徐州節度使贇開封尹承勳高祖之男俱列磐維皆居屏翰宜令文武百辟議擇嗣君以承大統云樞密使郭威以蕭牆變起宗祏無奉率羣臣候太后請定所立且言開封尹承勳高祖皇帝之愛子也請立為嗣太后告以承勳羸病日久不能自舉周太祖與諸將請視承勳起居及視之方信遂議立高祖從子徐州節度使贇為嗣己丑太后誥曰天未悔禍喪亂孔多嗣主幼沖羣兇蔽惑搆奸謀於造次縱毒蠆於斯須將相大臣連頸受戮股肱良佐無罪見屠行路咨嗟羣心扼腕則高祖之洪烈將墜于地賴大臣郭威等激揚忠義拯濟顛危除惡蔓以無遺俾綴旒之不絕宗祧事重纘繼才難既聞將相之謀復考蓍龜之兆天人協贊社稷是依徐州節度使贇稟上聖之資抱中和之德先皇如子鍾愛特深固可以子育兆民君臨萬國宜令所司擇日備法駕奉迎即皇帝位於戲神器至重天步方艱致理保邦不可以不敬貽謀聽政不可以不勤允執厥中祗膺景命是日遣前太師馮道等往徐奉迎周太祖以嗣君未至萬機不可暫曠率羣臣請太后臨朝誥答曰昨以奸邪搆釁亂我邦家勳德効忠剪除兇慝俯從人欲已立嗣君宗社危而再安紀綱壞而復振皇帝法駕未至庶事方殷百辟上言請予艹泣政宜允輿議權總萬機止於浹旬即復明辟云按前代故事太上皇稱誥太皇太后皇太后曰令今云誥有司誤也以宣徽南院使王峻為樞密使右神武統軍袁為宣徽南院使陳州刺史李穀權判三司步軍都指揮使王殷為侍衞親軍馬步都指揮使護聖左廂都指揮使郭崇為侍衞馬軍都指揮使奉國左廂都指揮使曹英為侍衞步軍都指揮使鎮州邢州馳奏契丹寇洺州陷內丘縣時契丹永康王兀欲率部族兩道入邊內丘城小而固契丹攻之五日不下敵人傷者甚衆時有官軍五百在城防戍攻急官軍降於敵屠其城而去案遼史世宗紀十月自將南伐攻下安平內丘束鹿等城大獲而還與薛史所載互有詳略庚寅樞密使郭威奏左軍巡勘得飛龍使後贊款伏與蘇逢吉李業閻晉卿聶文進郭允明等同謀令散員都虞候奔德等下手殺害史弘肇等權開封尹劉銖具伏朋附李業為亂屠害將相家屬其劉銖等準誥旨處置訖幷蘇逢吉郭允明閻晉卿聶文進首級並梟於南北市其骨肉放棄辛卯河北諸州馳報契丹深入太后誥曰王室多故邊境未寧內難雖平外寇仍熾據北面奏報強敵奔衝繼發兵師未聞平殄須勞上將暫自臨戎宜令樞密使郭威部署大軍早謀掩擊其軍國庶事權委宰臣竇貞固蘇禹珪樞密使王峻等商量施行在京馬步兵士委王殷都大提舉十二月甲午朔郭威領大軍北征丁酉以翰林學士尚書戶部侍郎知制誥范質為樞密副使案東都事略周太祖征李守貞每朝廷遣使齎詔處分軍事皆中機會太祖問誰為此辭使者以范質對太祖曰宰相器也太祖起兵入京師遽令草太后誥及議迎湘陰公儀注乃白太后以質為兵部侍郎樞密副使舊五代史考異陝州李洪信奏馬步都指揮使聶召奉國指揮使楊德護聖指揮使康審澄等與節度使判官路濤掌書記張洞都押衙楊紹勍等同情謀叛並殺之惟康審澄夜中放火斬關奔歸京師初朝議以諸道方鎮皆是勳臣不諳政理其都押衙孔目官令三司軍將內選才補之藩帥不悅故洪信因朝廷多故誣奏加害焉壬寅湖南上言朗州馬希萼引五谿蠻及淮南洪州軍來攻當道望量差兵士於淮境牽引乙巳遣前淄州刺史陳恩讓領軍入淮南界以便宜進取辛亥遣宰相蘇禹珪及朝臣十員往宋州迎奉嗣君壬子樞密使郭威次澶州何褔進已下及諸軍將士扶擁威請為天子即日南還威上章于太后言為諸軍所迫班師庚申威至北郊駐軍於臯門村許州巡檢前申州刺史馬鐸奏節度使劉信自殺壬戌奉太后誥命樞密使侍中郭威監國中外庶事並取監國處分先是樞密使王峻以湘陰公已在宋州慮聞澶州之事左右變生遣侍衞馬軍指揮使郭崇率七百騎往衞之案東都事略郭崇傳王峻遣崇率七百騎拒贇遇于睢陽崇曰澶州兵變遣崇來衞乘輿非有他也具言軍情有屬天命已定贇執崇手而泣崇即送贇就館舊五代史考異己未太后誥曰比者樞密使郭威志安社稷議立長君以徐州節度使贇高祖近親立為漢嗣爰自藩鎮徵赴京師雖誥命尋行而軍情不附天道在北人心靡東適當改卜之初俾膺分土之命贇可降授開府儀同三司檢校太師上柱國封湘陰公食邑三千戶食實封五百戶明年正月丁卯太后誥奉符寶於監國可即皇帝位周太祖踐阼奉太后為母遷於西宮上尊號曰昭聖太后是月十五日周太祖與百僚詣帝殯宮成服親奠不視朝七日又詔太常定諡曰隱以其年八月二日復遣前宗正卿劉皡護靈輴備儀仗葬于許州陽翟縣之潁陵祔神主于高祖之寢宮帝姿貌白眉目疏朗未即位時目多閃掣唾洟不止即位之始遽無此態及內難將作復如故帝自關西平定之後稍生驕易然畏憚大臣未至縱恣嘗因乾象差忒宮中或有怪異召司天監趙延乂訊其休咎延乂對以修德即無患既退遣中使就問延乂曰何者為德延乂勸讀貞觀政要案東都事略張昭傳隱帝年十九猶有童心昵近小人昭上疏諫請近師傅延問正人以開聰明隱帝不省舊五代史考異邇後與聶文進郭允明後贊狎習信其邪說以至于敗高祖之征鄴城也一旦帝語太祖曰我夜來夢爾為驢負我升天既捨爾俄變為龍捨我南去是何祥也周太祖撫掌而笑冥符肸蠁豈偶然哉永樂大典卷一萬六千二百二史臣曰隱帝以尚幼之年嗣新造之業受命之主德非禹湯輔政之臣復非伊呂將欲保延洪之運守不拔之基固不可得也然西摧三叛雖僅滅於欃槍而內稔羣兇俄自取於狼狽自古覆宗絕祀之速者未有如帝之甚也噫蓋人謀之弗臧非天命之遽奪也永樂大典卷一萬六千二百二
