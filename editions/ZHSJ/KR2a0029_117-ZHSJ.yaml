body:
  text: 己卯李穀奏破淮賊千餘人於山口鎮丙戌樞密使鄭仁誨卒辛卯西南面行營都部署王景差人部送所獲偽鳳翔節度使王環至闕詔釋之仍賜鞍馬衣服尋授右驍衞大將軍是冬命起居郎陶文舉徵殘租於宋州文舉本酷吏也宋民被其刑者凡數千寃號之聲聞於道路有悼耄之輩不勝其刑而死者數人物議以為不允永樂大典卷八千九百八十四
