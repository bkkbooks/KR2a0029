body:
  text: 舊五代史卷十二梁書十二宗室列傳第二案梁宗室傳永樂大典唯友寧友倫友裕三傳有全篇餘多殘闕今彙其散見者十五條通鑑注引一條其見冊府元龜者又得六條謹考其事蹟前後次如左廣王全昱太祖長兄受禪後封永樂大典卷一萬六千六百二十八案通鑑天祐二年二月戊戌以安南節度使同平章事朱全昱為太師致仕全昱全忠之兄也戇樸無能先領安南全忠自請罷之歐陽史作領嶺南西道節度使舊五代史考異乾化元年還睢陽命內臣拜餞都外王出宿至於偃師仍詔其子衡王友諒侍從以歸冊府元龜卷二百七十七庶人篡位授宋州節度使冊府元龜卷二百八十一貞明二年卒永樂大典卷一萬六千六百二十八案五代會要全昱贈尚書令謚德靖五代史闕文全昱梁祖之兄也既受禪宮中開宴惟親王得與因為博戲全昱酒酣忽起取骰子擊盆迸散大呼梁祖曰朱三汝碭山一民因天下饑荒入黃巢作賊天子用汝為四鎮節度使富貴足矣何故滅他李家三百年社稷稱王稱朕吾不忍見血吾族矣安用博為梁祖不悅而罷臣謹按梁史廣王全昱傳曰昱樸野常呼帝為三宮中博戲之事諱之夫梁祖弒二君弒一皇后名臣被害者不可勝紀及莊宗即位盡誅朱氏惟全昱先令終至道初知單州有稱廣王之後與尼訟田者豈以一言之善獨存其嗣耶案通鑑考異引王仁裕玉堂閑話曰骰子數匝廣王全昱忽駐不擲顧而向梁祖再呼朱三梁祖動容廣王曰你受它爾許大官職久遠家族得安否於是大怒擲戲具於階下抵其盆而碎之喑嗚眦睢數日不止與王禹偁所述微異舊五代史考異友諒全昱子初封衡王後嗣廣王永樂大典卷一萬六千六百二十八繼歷藩郡多行不法冊府元龜卷二百九十九坐弟友能反廢囚京師唐師入汴與友能友誨同日遇害永樂大典卷一萬六千六百二十八友能全昱子封惠王後為宋滑二州留後永樂大典卷一萬六千六百二十八案友能後以叛廢詳見末帝紀又通鑑云龍德元年夏四月陳州刺史惠王友能反舉兵趨大梁詔陝州留後霍彥威宣義節度使王彥章控鶴指揮使張漢傑將兵討之友能至陳留兵敗走還陳州諸軍圍之秋七月惠王友能降庚子詔赦其死降封房陵侯友誨全昱子封邵王永樂大典卷一萬六千六百二十八乾化元年以檢校兵部尚書充控鶴指揮使冊府元龜卷二百六十九坐友能反廢後為唐兵所殺永樂大典卷一萬六千六百二十六案通鑑云邵王友誨全昱之子也性穎悟人心多向之或言其誘致禁軍欲為亂梁主召友誨與其兄友諒友能並幽於別第及唐師將至梁主疑諸兄弟乘危謀亂幷皇弟賀王友雍建王友徽盡殺之考異曰薛史云友諒友能友誨莊宗入汴同日遇害按中都既敗均王親弟猶疑而殺之况其從弟嘗為亂者豈得獨存云云考通鑑以友諒等為末帝自殺考異祇以事理度之而不言所據何書歐陽史仍從薛史王禹偁五代史闕文亦云莊宗即位盡誅朱氏度當日事勢梁末帝自中都告敗救死不遑未必遽誅兄弟當以薛史為得其實通鑑所載恐未足據也安王友寧字安仁少習詩禮長喜兵法有倜儻之風太祖鎮汴累署軍職每因出師多命統驍果以從及擒秦宗權太祖令友寧轞送宗權西獻於長安詔加檢校右散騎常侍行右監門衞將軍自是繼立軍功累官至檢校司空兼龔柳二州刺史太祖駐軍岐下遣友寧領所部兵先歸梁苑以備守禦屬青帥王師範搆亂以關東諸鎮兵悉在岐隴岐隴原本作岐寵今據文改正影庫本粘籤欲乘虛竊發自齊魯至於華下羅布姦黨皆詐以委輸貢奉為名陰與淮夷幷門結好會有青人詣裴迪言其狀迪以事告友寧不俟命乃率兵萬餘人東討師範遣其弟將兵圍齊州友寧引兵救之青寇大敗奪馬四千蹄斬首數千級及昭宗歸長安朝廷議迎駕功友寧授嶺南西道節度使加特進檢校司徒賜號迎鑾毅勇功臣時青寇數千越險潛伏欲入兗州友寧知之伏兵於兗南邀之大破賊衆無得免者自是兗壁危窘友寧督諸軍進逼營丘首攻博昌縣月餘未能拔太祖怒遣劉捍督戰案通鑑考異引紀年錄作朱溫自至拔其城據編遺錄則劉捍自請督戰溫未嘗親至博昌也通鑑從薛史舊五代史考異友寧乃下俘民衆十餘萬各領負木石牽牛驢於城南為土山既至合人畜木石排而築之築之原本作業之今據冊府元龜改正影庫本粘籤寃枉之聲聞數十里俄而城陷盡屠其邑人清河為之不流及進迫寇壘與青人戰於石樓王師小却友寧旁自峻阜馳騎以赴敵所乘馬蹶而仆遂沒於陣友寧將戰之前日有大白蛇蟠於帳中友寧心惡之既而果遇禍焉永樂大典卷一萬八千一百二十六密王友倫幼聰悟喜筆札曉聲律及長好騎射有經度之智太祖每奇之曰吾家千里駒也年十九為宣武軍校景福初充元從騎軍都將尋表為右武衞將軍漸委戎事太祖征兗鄆友倫勒所部兵收聚糧穀以濟軍須幽滄軍至內黃友倫前鋒夜渡河擊賊奪馬千匹擒斬甚衆因引兵往八議關八議關原本作八識今據通鑑改正影庫本粘籤卒逢晉軍萬餘騎友倫乃分布兵士多設疑軍因聲鼓誓衆士伍奮躍追斬數十里其後李罕之請以上黨來歸為晉軍所圍太祖遣友倫總步騎數萬越險救應遂大破晉軍唐朝加檢校司空守藤州刺史天復元年岐隴用兵晉人乘虛侵於北鄙友倫率徒兵三萬徑往礬山晉人望塵奔逸友倫與氏叔琮等躡其轍追至太原摩壘挑戰獲牛馬萬餘二年領所部兵西赴鳳翔前後累接戰三年昭宗歸長安制授友倫寧遠軍節度使檢校司徒賜號迎鑾毅勇功臣及太祖東歸留友倫宿衞京師歲餘因會賓擊鞠墜馬而卒昭宗輟視朝一日詔贈太傅歸葬於碭山縣開平初有司上言曰東漢受命伯升預其始謀西周尚親叔虞荷其封邑故皇兄存凋零霜露綿歷歲時恩莫逮於陟岡禮方弘於事日皇姪故邕州節度使友寧故容州節度使友倫頃因締搆俱習韜鈐並以戰功歿於王事永言帶礪合議封崇案五代會要開平二年正月追封皇從子友寧為安王友倫為密王四年四月追封皇兄存為朗王是朗王之封實在安王密王之後據薛史有司上言又似一時並封未詳孰是又會要載四年六月追封皇伯義方為潁王皇叔義譚為韶王薛史闕載於是存追封朗王友寧追封安王友倫追封密王永樂大典卷一萬八千一百二十六郴王友裕字端夫太祖長子也幼善射御從太祖征伐性寬厚頗得士心唐中和中太祖會幷帥李克用攻圍華州賊將黃鄴固守甚堅俄有一人登陴大詈克用令蕃騎連射終不能中命友裕射之應弦而斃大軍喜噪聲震山谷克用因以良弓百矢遺焉太祖鎮汴表為宣武軍牙校及蔡賊殄滅朝廷議功加檢校左僕射尋為牙內馬步都指揮使景福元年總大軍伐徐時朱瑾領兗鄆之衆為徐戎外援陣於彭門南石佛山下友裕縱兵擊之斬獲甚衆瑾領殘黨宵遁案通鑑朱友裕圍彭城時溥數出兵友裕閉壁不戰朱瑾宵遁友裕不追據薛史則友裕擊破朱瑾援師斬獲甚衆未嘗閉壁與通鑑異歐陽史從薛史時都虞候朱友恭羽書聞於太祖誣友裕按兵不追賊太祖大怒因驛騎傳符令裨將龐師古代友裕為帥仍令按劾其事會使人誤致書於友裕友裕懼遂以數騎遁於山中案通鑑作以二千騎逃入山中歐陽史從薛史作數騎尋詣廣王於輝州以訴其寃賴元貞皇后聞而召之令束身歸汴力為營救太祖乃捨之令權知許州乾寧二年加檢校司空尋為武寧軍節度留後四年太祖下東平改天平軍留後加檢校司徒光化元年再領許州天復初為奉國軍節度留後太祖兼鎮河中以友裕為護國軍節度留後尋遷華州節度使加檢校太保興德尹天祐元年七月兼行營都統領步騎數萬經略邠岐十月友裕有疾將校乃謀旋師尋卒於梨園歸葬東京開平初追贈郴王乾化三年又贈太師永樂大典卷一萬八千一百二十六博王友文本姓康名勤太祖養以為子受禪後封為王永樂大典卷一萬六千六百二十六為東京留守嗜酒頗怠於為政冊府元龜卷二百九十八友珪弒逆並殺友文末帝即位盡復官爵永樂大典卷一萬六千六百二十八友珪小字遙喜母失其姓本亳州營妓也唐光啟中帝徇地亳州召而侍寢月餘將捨之而去以娠告是時元貞張后賢而有寵帝素憚之由是不果攜歸大梁因留亳州以別宅貯之及期妓以生男來告帝喜故字之曰遙喜後迎歸汴通鑑注引薛史受禪後封郢王永樂大典卷一萬六千六百二十八開平四年十月檢校司徒充左右控鶴都指揮使兼管四蕃將軍乾化元年充諸軍都虞候冊府元龜卷二百六十九二年弒太祖篡位均王以兵討之自殺追廢為庶人永樂大典卷一萬六千六百二十八案五代會要郢王友珪開平元年五月九日封至乾化二年六月三日篡位偽改鳳曆元年二月十七日京城軍亂侍衞袁象先率兵入宮友珪自殺少帝即位追削為庶人又載周廣順中張昭修實錄奏云梁末帝之上有郢王友珪篡弒居位未有紀錄請依宋書劉劭例書為元凶友珪案梁實錄今無考福王友璋太祖第五子受禪後封永樂大典卷一萬六千六百二十八案洛陽縉紳舊聞記梁祖為福王納齊王張全義之女舊五代史考異賀王友雍太祖第六子受禪後封永樂大典卷一萬六千六百二十八建王友徽太祖第七子受禪後封永樂大典卷一萬六千六百二十八康王友孜太祖第八子末帝即位後封後以反誅永樂大典卷一萬六千六百二十八案友孜通鑑及五代會要俱作友敬歐陽史與薛史同案友孜通鑑及五代會要俱作友敬通鑑云友敬目重瞳子自謂當作天子遂謀作亂使心腹數人匿於寢殿帝覺之跣足踰垣而出召宿衞兵索殿中得而手刃之捕友敬誅之歐陽史作友孜與薛史同舊五代史考異
