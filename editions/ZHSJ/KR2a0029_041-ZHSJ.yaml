body:
  text: 舊五代史卷四十一唐書十七明宗紀第七長興元年春正月丙寅朔帝御明堂殿受朝賀仗衞如常儀乙亥國子監請以監學生束脩及光學錢備監中修葺公用光學錢原本作充學今從冊府元龜五代會要改正影庫本粘籤從之丙子帝謂宰臣曰時雪未降如何馮道曰陛下恭行儉德憂及烝民上合天心必有春澤是夜降雪其夕右散騎常侍蕭希甫封狀申樞密稱得河堰衙官狀告本都將校二十餘人欲謀不軌至旦追問無狀斬所告人是日幸至德宮辛卯中書奏郊天有日合差大內留守詔以宣徽南院使朱宏昭充二月戊戌幸稻田莊己亥黑水國主兀兒遣使貢方物翰林學士劉昫奏新學士入院舊試五題請今後停試詩賦祇試麻制答蕃書批答共三道仍請內賜題目定字數付本院召試從之案五代會要載劉昫原奏云舊例學士入院除中書舍人不試餘官皆先試麻制答蕃批答各一道詩賦各一道號曰五題並于當日呈納從前每遇召試多預出五題潛令宿搆其無黨援者即日起草罕能成功今請權停詩賦祇試三道仍內賜題目兼定字數從之有司奏皇帝致齋於明堂按舊服通天冠絳紗袍文武五品已上著袴褶近例祇著朝服從之乙巳中書奏皇帝朝獻太微宮太廟祭天地於圜丘準禮例親王為亞獻行事受誓戒從之以天雄軍節度使石敬瑭為御營使壬子帝宿齋於明堂殿癸丑朝獻太微宮是日宿齋於太廟詰旦請行饗禮甲寅赴南郊齋宮是夜微雨三鼓後晴明如晝乙卯祀昊天上帝於圜丘柴燎禮畢郊宮受賀是日御五鳳樓宣制改天成五年為長興元年長興元年原本脫年字今據文增入影庫本粘籤大赦天下除十惡五逆放火劫舍屠牛官典犯贓偽行印信合造毒藥外罪無輕重咸赦除之天成四年終諸道所欠殘稅及場院欠折並特放免羣臣職位帶平章事侍中中書令並與改鄉名里號朝臣及蕃侯郡守亡父母及父母在幷妻室未沾恩命者並與恩澤應私債出利已經倍者祇許徵本已經兩倍者本利並放河陽管內人戶每畝舊徵橋道錢五文今後不徵諸道州府每畝先徵麴錢五文今特放二文云商州吏民以刺史郭知瓊善政聞詔褒之三月丁卯幸會節園遂幸河南府靈武奏殺戮蕃賊二千人壬申鳳翔節度使李從曮進封岐國公移鎮汴州李從曮移鎮汴州據通鑑云從曮因入朝陪祀徙為宣武節度使薛史未及詳載今附識于此影庫本粘籤甲戌延州節度使高允韜移鎮邢州丙子以宣徽使朱弘昭為鳳翔節度使潞州節度使朱漢賓加檢校太傅移鎮晉州徐州節度使房知溫移鎮鄆州鄆州節度使王晏球移鎮青州宰臣馮道率百僚拜表請上尊號曰聖明神武文德恭孝皇帝詔報不允壬午許州節度使孔循移鎮滄州陝州節度使張延朗移鎮許州加檢校太傅滄州節度使張虔釗移鎮徐州加檢校太保癸未詔貶右散騎常侍集賢殿學士判院事蕭希甫為嵐州司戶參軍仍馳驛發遣坐誣告之罪也宰臣馮道等再請上尊號詔允之丙戌以侍衞親軍馬步軍都指揮使河陽節度使康義誠為襄州節度使檢校太傅以左武衞上將軍劉彥琮為陝州節度使檢校太保庚寅制淑妃曹氏可立為皇后仍令擇日冊命夏四月甲午朔國子司業張溥奏請復八館以廣生徒按六典監有六學國子太學四門律學書學算學是也書學原本作署學今據新唐書百官志改正影庫本粘籤而溥云八館謬矣丁酉前汴州節度使檢校太尉兼侍中符習可太子太師致仕進封衞國公戊戌遂州節度使夏魯奇加同平章事皇子河中節度使從珂進位檢校太尉封開國公自是諸道節鎮皆次第加恩以郊禋覃慶澤故也己亥幸會節園壬寅以樞密使安重誨為留守太尉兼中書令使如故青州節度使王建立加侍中移鎮潞州皇子河中節度使從珂奏臣今月五日閱馬於黃龍莊衙內指揮使楊彥溫據城叛臣尋時詰問稱奉宣命案胡三省通鑑注云樞密院用宣三省用堂帖舊五代史考異臣見在虞鄉縣帝遣西京留守索自通侍衞步軍都指揮使藥彥稠等攻之仍授彥溫絳州刺史冀誘而擒之也詔從珂赴闕丁未以戶部尚書李鏻為兗州行軍司馬坐引淮南覘人貽安重誨寶帶也戊申宰臣馮道加右僕射趙鳳加吏部尚書乙酉以左龍武統軍劉君鐸卒廢朝癸丑索自通藥彥稠等奏收復河中斬楊彥溫傳首來獻案通鑑作辛亥索自通拔河中斬楊彥溫癸丑傳首來獻歐陽史亦作辛亥自通執彥溫殺之較薛史為詳審舊五代史考異初彥稠出師帝戒之曰與朕生致彥溫吾將自訊之及收城斬首傳送帝怒彥稠等時議皆以為安重誨方弄國權從榮諸王敬事不暇獨忌從珂威名每於帝前屢言其短巧作窺圖冀能傾陷彥溫既誅從珂歸清化里第重誨謂馮道等曰蒲帥失守責帥之義法當如何翌日道等奏合行朝典帝不悅趙鳳堅奏故事有責帥之義所以激勵藩守帝曰皆非公等意也後數日帝於中興殿見宰臣趙鳳承重誨意又再論列帝默然翌日重誨復自論奏帝極言以拒之語在末帝紀中帝又曰卿欲如何制置重誨曰於陛下父子之間臣不合言一稟聖旨帝曰從佗私第閑坐何煩奏也乃止以前邢州節度使檢校司徒李從溫為左武衞上將軍邢州原本作涇州今從歐陽史家人傳改正影庫本粘籤丙辰以西京留守檢校司徒索自通為河中節度使丁巳雲州奏掩襲契丹獲頭口萬計戊午帝御文明殿受冊徽號冊曰維長興元年歲次庚寅四月甲午朔二十五日戊午金紫光祿大夫守尚書左僕射兼門下侍郎同中書門下平章事充太微宮使弘文館大學士上柱國始平郡開國侯始平原本作始興今據冊府元龜改正影庫本粘籤食邑一千五百戶食實封一百戶臣馮道銀青光祿大夫門下侍郎兼吏部尚書同中書門下平章事監修國史判集賢院事上柱國天水郡開國伯食邑七百戶臣趙鳳及文武百官特進太子少傅上柱國酒泉郡開國侯食邑一千戶臣李琪等五千八百九十七人言臣聞天不稱高而體尊地不矜厚而形大厚無不載高無不覆四時行於內萬物生其間總神祇之靈叶帝王之運日出而星辰自戢龍飛而雷雨皆行元氣和而天下和庶事正而天下正伏惟皇帝陛下天授一德時歷多艱翊太祖以興邦佐先皇而定難拯嗣昭於潞困救德威於燕危遏思遠而全鄴都誅彥章而下梁苑成再造之業由四征之功洎纂鴻圖每敷皇化去內庫而省庖膳出宮人而減伶官輕寶玉之珍却鷹鸇之貢淳風既洽嘉瑞自臻故登極之前人皆不足改元之後時便有年遐荒旋斃於戎王重譯徑來於蠻子東巡而守殷殪北討而王都殲破契丹而燕趙無虞控靈武而瓜沙並復瓜沙原本作爪分考通鑑天成四年康福大破吐蕃進至靈州自是朔方始受代分字當係沙字之誤今改正影庫本粘籤近以饗上元而薦太廟就吉土而配昊天輅已降而雨霑事欲行而月見燔柴禮畢作解恩覃帝命咸均人情普悅非陛下有道有德至聖至明動不疑人靜惟恭己常敦孝禮每納忠言則何以臨御五年澄清四海時久纏於災害民驟見於和平休徵備載於簡編徽號過持於謙讓三年不允衆志皆堅天不以上帝自崇日不以大明自貴於烝民有惠於元后同符列聖皆然舊章斯在今以明庭百辟列土諸侯中外同辭再三瀝懇臣等不勝大願謹奉玉寶玉冊上號曰聖明神武文德恭孝皇帝伏惟皇帝陛下體堯舜之至道法日月於太虛威於夷狄恩及蟲魚奉國者繼加榮寵違天者咸就誅鋤典禮當告成之後夙夜思即位之初千秋萬歲永混車書宰臣馮道之辭也庚申以左金吾上將軍史敬鎔為鄧州節度使以右金吾上將軍符彥超為兗州節度使以驍衞上將軍張敬詢為滑州節度使以閬州防禦使孫岳為鳳州節度使詔改鳳翔管內應州為匡州匡州原本匡字分注御名二字蓋薛史原書之體今改正影庫本粘籤信州為晏州改新州管內武州為毅州五月乙丑鄭州防禦使張進副使咸繼威並停任以盜掠城中居人故也丙寅以少府監韋肅為洺州刺史以潞州節度使王建立為太傅致仕建立素與安重誨不協因其入朝乃言建立自鎮歸朝過鄴都日有扇搖之言扇搖通鑑作搖衆考冊府元龜亦作扇搖今仍其舊影庫本粘籤以是罪之故令致仕丁卯以前興元節度使劉仲殷權知潞州軍州事戊辰以安州節度使高行珪卒輟朝有司上言皇后受冊內外命婦並合奉賀今未有命婦準例上表稱賀中書門下奏諸道節度使但進表上言皇帝外命婦上皇后賀牋表進呈訖無報應皇親或有慶賀及起居章表內中進呈後祇宣示來使並不合答復從之壬申以權知昭義軍軍州事劉仲殷為潞州節度使檢校太傅丁丑帝臨軒命使冊淑妃曹氏為皇后禮院上言百官上疏於皇后曰皇后殿下及六宮及率土婦人慶賀祇呼殿下不言皇后中書覆奏若祇呼殿下恐與皇太子無所分別凡上中宮表章呼皇后殿下若不形文字尋常祇呼皇后從之癸未太子少傅蕭頃卒廢朝甲申迴鶻可汗仁裕遣使貢方物辛卯以翰林承旨兵部侍郎李愚為太常卿壬辰以前滑州節度使李從璋為右驍衞上將軍六月丁酉以護駕馬軍都指揮使貴州刺史安從進為宣州節度使充護駕馬軍都指揮使以護駕步軍都指揮使澄州刺史藥彥稠為壽州節度使兼護駕步軍都指揮使甲辰以皇城使安崇緒為河陽留後重誨子也鳳翔奏所管良晏匡三州並無屬縣請却改為縣從之仍舊為軍鎮前振武節度使安金全卒壬子中書門下奏詳覆到禮部院今年及第進士李飛樊吉夏侯珙吳沺王德柔李穀等六人望放及第其盧價等七人及賓貢鄭朴望許令將來就試知貢舉張文寶試士不得精當張文寶原本作人寶今據五代會要改正影庫本粘籤望罰一季俸從之丁巳皇子北京留守河東節度使從厚移領鎮州以左武衞上將軍李從溫為許州節度使秋七月甲子以宣徽南院使行右衞上將軍判三司馮贇為北京留守太原尹己巳以鄧州節度使史敬鎔卒廢朝甲戌以左威衞上將軍梁漢顒為鄧州節度使前兗州節度使趙在禮為左驍衞上將軍庚辰奉國軍節度使兼威武軍節度副使檢校太尉兼侍中王延稟加兼中書令詔諸州得替防禦團練使刺史並宜於班行比擬如未有員闕可隨常參官逐日立班新例也辛巳詔揀年少宮人及西川宮人並還其家無家可歸者任從所適甲申以前齊州防禦使孫璋為鄜州節度使戊子以右散騎常侍陸崇卒廢朝崇為福建冊使卒於明州贈兵部尚書宿州進白兔安重誨謂其使曰豐年為上瑞豐年原本作豐止今據歐陽史改正影庫本粘籤兔懷狡性雖白何為命退歸八月甲午以前鄧州節度使盧文進為左衞上將軍北京奏吐渾千餘帳內附於天池川安置禁在京百司影射州縣稅戶乙未捧聖軍使李行德捧聖軍使原本作章使考歐陽史作捧聖都軍使通鑑作軍使今從通鑑改正影庫本粘籤十將張儉告密人邊彥溫並族誅案李行德等族誅歐陽史作壬寅與薛史異舊五代史考異以其誣告安重誨私市兵仗故也以前許州節度使張延朗為檢校太傅行兵部尚書充三司使三司之有使額自延朗始也初中書覆奏授延朗諸道鹽鐵轉運等使兼判戶部度支事奏入宣旨曰會計之司國朝重事將總成其事額俾專委於近臣貴便一時何循往例兼移內職可示新規張延朗可充三司使班在宣徽使下案宋史職官志三司使在宣徽使後蓋仍後唐之制舊五代史考異癸卯北京奏生吐渾內附欲於嵐州安族帳都官員外郎知制誥張昭遠奏請依國朝舊例選郎官御史分行天下宣問風俗興利除害不報壬寅皇子河南尹判六軍諸衞事從榮封秦王仍令所司擇日冊命案五代會要長興元年九月太常禮院奏草定冊秦王儀注博士段顒議曰據開元禮臨軒冊命諸王大臣其日受冊者朝服從第鹵簿與百官俱集朝堂就次受冊訖通事舍人引不載謁朝還第之儀自開元以後冊拜諸王皆正衙命使詣延英進冊皇帝御內殿高品引王入立于位高品宣制讀冊王受冊訖歸院亦無乘輅謁朝之禮臣按五禮精義云古者皆因禘嘗而頒爵祿所以示無自專禀之于祖宗也今雖冊命不在禘嘗然拜大官封大邑必至殿廷敬慎之道也今當司欲準開元禮其日秦王服朝服自理所乘輅車備鹵簿與羣臣俱集朝堂就次受冊訖至應天門外奉冊置于載冊之車秦王升輅出謁太廟訖歸理所儀仗鹵簿如來時之儀從之舊五代史考異戊申兗州奏淮南海州都指揮使王傳拯案歐陽史作傳極考薛史列傳及通鑑並作傳拯疑歐陽史傳刻之訛舊五代史考異殺本州刺史陳宣焚燒州城以所部兵士及家口五千人歸國至沂州帝遣使慰納之庚戌正衙命使冊福慶長公主孟氏以前雄武軍節度使王思同為左武衞上將軍以前鳳州節度使陳臯為右威衞上將軍壬子正衙命使赴太原冊永寧公主石氏乙卯以左監門衞上將軍陳延福卒廢朝丙辰皇子鎮州節度使從厚封宋王仍令擇日冊命九月乙丑階州刺史王弘贄上言一州主客戶纔及千數並無縣局臣今檢括得新舊主客已及三千二百欲依舊額立將利福津二縣請置令佐從之丁丑詔天下諸州府不得奏薦著紫衣官員為州縣官戊寅升尚書右丞為正四品癸未利閬遂三州奏利閬遂三州通鑑作三鎮考利帥為李彥琦閬帥為李仁矩遂州為夏魯奇今附識于此影庫本粘籤東川節度使董璋謀叛結連西川孟知祥甲申以鎮州節度使范延光為檢校太傅守刑部尚書充樞密使利州閬州進納東川檄書言將兵擊利閬責以間諜朝廷為名乙酉以左驍衞上將軍趙在禮為同州節度使兼四面行營馬步軍都指揮使樞密院直學士守工部侍郎閻至樞密院直學士守尚書右丞史圭並轉戶部侍郎依前充職以翰林學士守戶部侍郎李懌為尚書右丞以翰林學士戶部侍郎劉昫為兵部侍郎以翰林學士中書舍人竇夢徵為工部侍郎依前充職以中書舍人劉贊為御史中丞以御史中丞許光義為兵部侍郎以兵部侍郎姚顗為吏部侍郎丙戌詔東川節度使董璋可削奪在身官爵仍徵兵進討丁亥以西川節度使孟知祥兼西南面供饋使天雄軍節度使石敬瑭兼東川行營都招討使以遂州節度使夏魯奇兼東川行營招討副使庚寅以右衞上將軍王思同為京兆尹充西京留守兼西南行營馬步都虞候冬十月壬辰以太子少傅李琪卒廢朝癸巳以鄜州節度使米君立卒廢朝詔凡賻贈布帛言段不言端匹段者二丈也宜令三司依此給付甲午正衙命使冊興平公主於宋州節度使駙馬都尉趙延壽之私第己亥以左驍衞上將軍李從璋為陝州節度使陝州節度使劉彥琮移鎮邠州尚書博士田敏請依舊典藏冰頒冰考歐陽史作十月丁酉始藏冰薛史繫于己亥之後與歐陽史先後殊異今附識于此影庫本粘籤以銷陰陽愆伏之沴詔從之案五代會要載原敕云藏冰之制載在前經獻廟之儀廢于近代既朝臣之特舉案典禮以宜行田敏所奏祭司寒獻羔事宜依其桃弧棘矢事久不行理難備創其諸侯亦宜準往制藏冰舊五代史考異乙巳供奉官張仁暉自利州迴奏董璋攻陷閬州案董璋陷閬州通鑑作九月庚辰歐陽史作十月乙巳蓋以奏聞之日為據也舊五代史考異節度使李仁矩舉家遇害丁未宮苑使董光業幷妻子並斬於都市璋之子也辛亥以武安軍節度副使洪鄂道行營副都統檢校太尉馬希聲為武安軍節度使加兼侍中時湖南馬殷奏久病不任軍政乞以男希聲為帥故有是命中書奏吏部流內銓諸色選人所試判兩節欲委定其等第文優者超一資其次者次資又次者以同類道理全疏者於同類中少人戶處注擬從之十一月庚申朔帝御文明殿冊皇子秦王仗衞樂懸如儀甲子正衙命使冊皇子宋王於鎮州是日幸龍門翌日馮道奏曰陛下宮中無事遊幸近郊則可矣若涉歷山險萬一馬足蹉跌則貽臣下之憂臣聞千金之子坐不垂堂百金之子立不倚衡況貴為天子豈可自輕哉帝斂容謝之退令小黃門至中書問道垂堂倚衡之義道因注解以聞帝深納之己巳故太子少保致仕封舜卿贈太子少傅庚午應州節度使張敬達移雲州以捧聖都指揮使守恩州刺史沙彥詢為應州節度使以潁州團練使高行周為安北都護充振武節度使壬申黔南節度使楊漢章棄城奔忠州楊漢章原本脫章字今據通鑑增入影庫本粘籤為董璋所攻也乙亥制西川節度使孟知祥削奪官爵以其同董璋叛也丙子以前同州節度使羅周敬為左監門上將軍丁丑故兵部侍郎許光義贈禮部尚書辛巳西面軍前奏今月十三日階州刺史王弘贄瀘州刺史馮暉自利州取山路出劍門關外倒下殺敗董璋守關兵士三千人收復劍州案通鑑考異引唐實錄作今月十三日大軍進攻入劍門次十七日收下劍州薛史統繫于十三日疑有舛誤舊五代史考異據通鑑考異引唐實錄云軍前奏今月十三日王弘贄馮暉自利州入山路出劍門關外倒下殺董璋把關兵士約三千人獲都指揮使齊彥溫大軍進攻入劍門次又丙戌奏今月十七日收下劍州破賊千餘人獲指揮使劉太是進攻劍門收復劍州先後殊日薛史統繫於十三日疑有舛誤今附識于此影庫本粘籤甲申日南至帝御文明殿受朝賀丙戌以給事中鄭韜光為左散騎常侍青州奏得登州狀契丹阿保機男東丹王突欲越海來歸國案遼史太宗紀十一月戊寅東丹奏人皇王浮海適唐又義宗傳太宗既立見疑唐明宗聞之遣人跨海持書密召倍倍因畋海上使再至倍立木海上刻詩曰小山壓大山大山全無力羞見故鄉人從此投外國攜高美人載書浮海而去薛史不載明宗密召之事當日人皇王自以見疑出奔當不待明宗之召也舊五代史考異契丹國志時東丹王失職怨望因率其部四十餘人越海歸唐殿本十二月乙未荊南奏湖南節度使楚國王馬殷薨案五代春秋十二月楚王殷薨據通鑑殷卒于十一月己巳至十二月始奏聞耳舊五代史考異廢朝三日庚子以前襄州節度使安元信為宋州節度使辛丑幸苑中丁未以二王後祕書丞襲酅國公楊仁矩卒輟朝贈工部郎中庚戌湖南節度使馬希聲起復加兼中書令壬子以樞密院直學士戶部侍郎閻至為澤州刺史樞密院直學士戶部侍郎史圭為貝州刺史甲寅遣樞密使安重誨赴西面軍前時帝以蜀路險阻進兵艱難潼關已西物價甚賤百姓輓運至利州率一斛不得一斗謂侍臣曰關西勞擾未有成功誰能辦吾事者朕須自行安重誨曰此臣之責也臣請行帝許之言訖而辭翌日遂行甲寅故西川兵馬都監泗州防禦使李嚴贈太傅丙辰車駕畋於西山臘也丁巳迴鶻遣使來朝貢戊午故荊南節度使檢校太尉兼尚書令南平王高季興贈太尉永樂大典卷七千一百六十五
