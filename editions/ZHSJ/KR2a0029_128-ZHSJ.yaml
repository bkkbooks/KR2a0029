body:
  text: 能彈琵琶以皮為弦世宗嘗令彈於御前深欣善之因號其琵琶曰遶殿雷也道以其惰業每加譴責而吉攻之愈精道益怒凡與客飲必使廷立而彈之曲罷或賜以束帛命背負之然後致謝道自以為戒勗極矣吉未能悛改既而益自若道度無可奈何歎曰百工之司藝而身賤理使然也此子不過太常少卿耳其後果終於此史臣曰道之履行鬱有古人之風道之宇量深得大臣之體然而事四朝相六帝可得為忠乎夫一女二夫人之不幸況於再三者哉所以飾終之典不得諡為文貞文忠者蓋謂此也永樂大典卷一萬七千九百三十
