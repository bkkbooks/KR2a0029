body:
  text: 如館內已有之書不在進納之限仍委中書門下於朝官內選差三十人據見在書籍各求真本校勘署校官姓名逐月具功課申報中書門下戊子淮南道招討使李重進奏破淮賊二千人塌山北永樂大典卷八千九百八十四塌字上疑脫於字考冊府元龜所引薛史與永樂大典同今仍其舊影庫本粘籤
