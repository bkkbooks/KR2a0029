body:
  text: 舊五代史卷九十八晉書二十四列傳第十三安重榮朔州人祖從義利州刺史父全勝州刺史振武蕃漢馬步軍都指揮使重榮有膂力善騎射唐長興中為振武道巡邊指揮使犯罪下獄時高行周為帥欲殺之其母赴闕申告樞密使安重誨陰護之重誨原本作仲誨今據通鑑改正影庫本粘籤奏於明宗有詔釋焉張敬達之圍晉陽也高祖聞重榮在代北使人誘之案歐陽史作使張頴陰招重榮舊五代史考異重榮乃召邊士得千騎赴焉高祖大喜誓以土地及即位授成德軍節度使累加至使相自梁唐已來藩侯郡牧多以勳授不明治道例為左右羣小惑亂賣官鬻獄割剝蒸民率有貪猥之名其實賄賂半歸於下惟重榮自能鉤距凡有爭訟多廷辯之至於倉庫耗利百姓科徭悉入於己諸司不敢窺覬嘗有夫婦共訟其子不孝者重榮面加詰責抽劍令自殺之其父泣曰不忍也其母詬詈仗劍逐之重榮疑而問之乃其繼母也因叱出自後射之一箭而斃聞者莫不快意由此境內以為強明大得民情重榮起於軍伍暴獲富貴復覩累朝自節鎮遽升大位每謂人曰天子兵彊馬壯者當為之寧有種耶又以奏請過當為權臣所否心常憤憤遂畜聚亡命收巿戰馬有飛揚跋扈之志案通鑑云帝之遣重榮代祕瓊也戒之曰瓊不受代當別除汝一鎮勿以力取恐為患滋深重榮由是以帝為怯謂人曰祕瓊匹夫耳天子尚畏之況我以將相之重士民之衆乎舊五代史考異嘗因暴怒殺部校賈章以謀叛聞章有女一人時欲捨之女曰我家三十口繼經兵亂死者二十八口今父就刑存此身何為再三請死亦殺之鎮人由是惡重榮之酷而嘉賈女之烈焉天福中朝廷姑息契丹務安邊塞重榮每見蕃使必以箕踞慢罵會有梅里數十騎由其境內交言不遜因盡殺之契丹主大怒責讓朝廷朝廷隱忍未即加罪重榮乃密搆吐渾等諸族以為援助上表論之其略曰臣昨據熟吐渾節度使白承福赫連公德等各領本族三萬餘帳自應州地界奔歸王化續準生吐渾幷渾苾兩突厥三部落南北將沙陀安慶九府等各領部族老小幷牛羊車帳甲馬七八路慕化歸奔俱至五臺及當府地界已來安泊累據告勞具說被契丹殘害平取生口率略羊馬凌害至甚又自今年二月後來須令點檢強壯置辦人馬衣甲告報上秋向南行營諸蕃部等實恐上天不祐殺敗後隨例不存家族所以預先歸順兼隨府族各量點檢強壯人馬約十萬衆又準沿河党項及山前山後逸利越利諸族部落等首領幷差人各將契丹所授官告職牒旗號來送納例皆號泣告勞稱被契丹凌虐憤惋不已情願點集甲馬會合殺戮續又朔州節度副使趙崇與本城將校殺偽節度使劉山尋已安撫軍城乞歸朝廷臣相次具奏聞昨奉宣頭及累傳聖旨令臣凡有往復契丹更須承奉當候彼生頭角不欲自起釁端貴守初終不愆信誓仰認睿旨深惟匿瑕其如天道人心至務勝殘去虐須知機不可失時不再來竊以諸蕃不招呼而自至朔郡不攻伐以自歸蓋繫人情盡由天意更念諸陷蕃節度使等本自勳勞早居富貴沒身邊塞遭酷虐以異常企足朝廷冀傾輸而不已如聞傳檄盡願倒戈如臣者雖是愚蒙粗知可否不思忌諱罄寫丹衷細具敷陳冀裨萬一其表數千言大抵指斥高祖稱臣奉表罄中國珍異貢獻契丹凌虐漢人竟無厭足又以此意為書遺諸朝貴及藩鎮諸侯高祖憂其變也遂幸鄴都以詔諭之凡有十焉其略曰爾身為大臣家有老母忿不思難棄君與親吾因契丹而興基業爾因吾而致富貴吾不敢忘爾可忘耶且前代和親只為安邊今吾以天下臣之爾欲以一鎮抗之大小不等無自辱焉重榮愈恣縱不悛雖有此奏亦密令人與契丹幽州帥劉晞結託蓋重榮有內顧之心契丹幸我多事復欲侵吞中國契丹之怒重榮亦非本志也時重榮嘗與北來蕃使並轡而行指飛鳥射之應弦而落觀者萬衆無不快抃蕃使因輟所乘馬以慶之由是名振北方自謂天下可以一箭而定也又重榮素與襄州安從進連結及聞從進將議起兵其奸謀乃決天福六年冬大集境內饑民衆至數萬揚旌向闕聲言入覲朝廷遣杜重威帥師禦之遇於宗城軍纔成列有賊將趙彥之臨陣卷旗來奔重榮方戰聞彥之背己大恐退於輜重中王師因而擊之一鼓而潰重榮與十餘騎北走其下部衆屬嚴冬寒冽殺戮及凍死者二萬餘人重榮至鎮取牛馬革旋為甲使郡人分守夾城以待王師案宋史解暉傳安重榮反鎮州因舉兵向闕至宗城晉師逆戰大破之暉募軍中壯士百餘人夜擣賊壘殺獲甚衆暉頻中流矢而督戰自若顏色不撓以功遷列校舊五代史考異杜重威至有部將自西郭水門引官軍入焉殺守陴百姓萬餘人重威尋害導者自收其功重榮擁吐渾數百匿於牙城重威使人襲而得之斬首以進高祖御樓閱其俘馘宣露布訖遣漆其頭顱函送契丹永樂大典卷一萬八千一百三十二五代史補安重榮出鎮常懷不軌之計久矣但未發居無何中產朱鬃白馬黑鴉生五色雛以為鳳乃欣然謂天命在己遂舉兵反指揮令取宗嶺路以向闕時父老聞之往往竊議曰事不諧矣且王姓安氏曰鞍得背而穩何不取路貝州若由宗嶺是安及於鬃得無危乎未幾與王師先鋒遇一戰而敗安從進案歐陽史從進其先索葛部人也初事莊宗為護駕馬軍都指揮使領貴州刺史明宗時為保義彰武軍節度使愍帝即位徙領順化清泰中徙鎮山南東道晉高祖即位加同中書門下平章事天福六年高祖幸鄴討安重榮少帝以鄭王留守京師時和凝請於高祖曰陛下北征臣料安從進必反何以制之高祖曰卿意將奈何凝曰臣聞之兵法先人者奪人願陛下為空名宣敕十通授鄭王有急則命將往從進聞高祖往北遂反少帝以空名授李建崇郭金海討之從進引兵攻鄧州不克進至湖陽遇建崇等大駭以為神速復為野火所燒遂大敗從進自焚永樂大典卷二萬四百七十案薛史安從進傳殘闕所存一條與歐陽史大略相同張彥澤其先出於突厥後為太原人也祖父世為陰山府裨將彥澤少有勇力目睛黃而夜有光色顧視若鷙獸焉以騎射事後唐莊宗明宗以從戰有功繼領郡守高祖即位擢為曹州刺史從楊光遠圍范延光於鄴以功授華州節度使尋移鎮涇州累官至檢校太保有從事張式者以宗人之分受其知遇時彥澤有子為內職素不叶父意數行笞撻懼其楚毒逃竄外地齊州捕送到闕勅旨釋罪放歸父所彥澤上章請行朝典式以有傷名教屢諫止之彥澤怒引弓欲射之式慬而獲免尋令人逐式出衙式自為賓從彥澤委以庶務左右羣小惡之久矣因此讒搆互來迫脅云書記若不便出斷定必遭屠害式乃告病尋醫攜其妻子將奔衍州彥澤遣指揮使李興領二十騎追之戒曰張式如不從命即斬取頭來式懇告刺史遂差人援送到汾州節度使李周驛騎以聞朝廷以姑息彥澤之故有勅流式於商州彥澤遣行軍司馬鄭元昭詣闕論請面奏云彥澤若不得張式恐致不測高祖不得已而從之既至決口割心斷手足而死之式父鐸詣闕訴寃朝廷命王周代之周至任奏彥澤在郡惡跡二十六條逃散五千餘戶彥澤既赴闕刑法官李濤等上章請理其罪高祖下制止令削奪一階一爵而已時以為失刑少帝即位桑維翰復舉之尋出鎮安陽既至折節於士大夫境內稱理旋命領軍北屯定時易州地孤漕運不繼制令邢魏相衞飛輓以輸之百姓荷擔纍纍於路彥澤每援之以行見羸困者使其部衆代而助之洎至北邊不令百姓深入即遣騎士以馬負糧而去往來既速且無邀奪之患聞者嘉之陽城之戰彥澤之功出於諸將之右其後與敵接戰頻獻捷於闕下咸謂其感高祖不殺之恩補昔年之過也開運三年冬契丹既南牧杜重威兵次瀛州彥澤為契丹所啖密已變矣乃通款於戎王請為前導因促騎說重威引軍沿滹沱西援常山既而與重威通謀及王師降於中渡契丹主遣彥澤統二千騎趨京師以制少帝且示公卿兆民以存撫之意彥澤以是歲十二月十六日夜自封丘門斬關而入以兵圜宮城翌日遷帝於開封府舍凡內帑奇貨悉輦歸私邸仍縱軍大掠兩日方止案東都事略李處耘傳云居京師遇張彥澤之暴處耘善射獨當里門殺數十人里中賴之舊五代史考異時桑維翰為開封尹彥澤召至麾下待之不以禮維翰責曰去年拔公於罪人之中復領大鎮授以兵權何負恩一至此耶彥澤無以對是夜殺維翰盡取其家財彥澤自謂有功於契丹晝夜以酒樂自娛當在京巡檢之時出入騎從常數百人旗幟之上題曰赤心為主觀者無不竊笑又所居第財貨山積楚國夫人丁氏即少帝弟曹州節度使延煦之母也有容色彥澤使人取之太后遲迴未與彥澤立遣人載之而去其負國欺君也如是數日之內恣行殺害或軍士擒獲罪人至前彥澤不問所犯但瞋目出一手竪三指而已軍士承其意即出外斷其腰領焉彥澤與偽閤門使高勳不協因乘醉至其門害其仲父季弟暴屍於門外及契丹帳泊於北郊勳訴寃於戎王時戎王已怒彥澤剽掠京城遂令鎖之仍以彥澤罪惡宣示百官及京城士庶且云彥澤之罪合誅與否百官連狀具言罪在不赦巿肆百姓亦爭投狀疏彥澤之罪戎王知其衆怒遂令棄巿仍令高勳監決斷腕出鎖然後刑之勳使人剖其心以祭死者巿人爭其肉而食之永樂大典卷六千三百五十五代史補李濤常忿張彥澤殺邠州幕吏張式而取其妻濤率同列上疏請誅彥澤以謝西土高祖方姑息武夫竟不從未幾契丹南侵至中渡橋彥澤首降戎主喜命以本軍統蕃部控弦之士先入京師彥澤自以功不世出乃挾宿憾殺開封尹桑維翰濤聞之謂親知曰吾曾上疏請誅彥澤今國家失守彥澤所為如此吾之首領庸可保乎然無可奈何誰能伏藏溝瀆而取辱耶於是自寫門狀求見彥澤其狀云上疏請殺太尉人李濤謹隨狀納命彥澤覽之欣然降階迎之然濤猶未安復曰太尉果然相恕乎彥澤曰覽公門狀見納命二字使人怒氣頓息又何憂哉濤素滑稽知其必免又戲為伶人詞曰太尉既相恕何不將壓驚絹來彥澤大笑卒善待之趙德鈞本名行實幽州人也少以騎射事滄州連帥劉守文守文為弟守光所害遂事守光署為幽州軍校及唐莊宗伐幽州德鈞知其必敗乃遁歸莊宗莊宗善待之賜姓名曰紹斌累歷郡守從平梁遷滄州節度使同光三年移鎮幽州明宗即位遂歸本姓始改名德鈞其子延壽尚明宗女興平公主故德鈞尤承倚重天成中定州王都反契丹遣惕隱領精騎五千來援都至唐河為招討使王晏球所敗會霖雨相繼所在泥淖敗兵北走人馬饑疲德鈞於要路邀之盡獲餘衆擒惕隱已下首領數十人獻於京師明年王都平加兼侍中頃之加東北面招討使德鈞奏發河北數鎮丁夫開王馬口至游口以通水運凡二百里又於閻溝築壘以戍兵守之因名良鄉縣以備鈔寇又於幽州東築三河城北接薊州頗為形勝之要部民由是稍得樵牧德鈞鎮幽州凡十餘年案遼史天贊六年遣人以詔賜盧龍軍節度使趙德鈞七年趙德鈞遣人進時果蓋德鈞久在邊境嘗與契丹通好也舊五代史考異甚有善政累官至檢校太師兼中書令封北平王清泰三年夏晉高祖起義於晉陽九月契丹敗張敬達之軍於太原城下唐末帝詔德鈞以本軍由飛狐路出賊後邀之時德鈞子延壽為樞密使唐末帝命帥軍屯上黨德鈞乃以所部銀鞍契丹直三千騎至鎮州率節度使華溫琪同赴征行自吳兒峪路趨昭義與延壽會於西唐店十一月以德鈞為諸道行營都統以延壽為太原南面招討使遣端明殿學士呂琦齎賜官告兼令犒軍琦從容言天子委任之意德鈞曰既以兵相委焉敢惜死時范延光領兵二萬軍於遼州德鈞欲併其軍奏請與延光會合唐末帝諭延光疑其姦謀不從德鈞延壽自潞州引軍至團柏谷德鈞累奏乞授延壽鎮州節度末帝不悅謂左右曰趙德鈞父子堅要鎮州苟能逐退蕃戎要代予位亦所甘心若翫寇要君但恐犬兔俱斃朝廷繼馳書詔促令進軍德鈞持疑不果乃遣使於契丹厚齎金幣求立以為帝仍許晉祖長鎮太原契丹主不之許及楊光遠以晉安寨降於契丹德鈞父子自團柏谷南走潞州一行兵士投戈棄甲自相騰踐死者萬計時德鈞有愛將時賽率輕騎東還漁陽其部曲尚千餘人與散亡之卒俱集於潞州是日潞州節度使高行周亦自北還及至府門見德鈞父子在城闉上行周謂曰某與大王鄉人宜以忠言相告城中無斗粟可食請大王速迎車駕自圖安計無取後悔焉德鈞遂與延壽出降契丹高祖至德鈞父子迎謁於馬前高祖不禮之時契丹主問德鈞曰汝在幽州日所置銀鞍契丹直何在德鈞指示之契丹盡殺於潞之西郊遂鎖德鈞父子入蕃及見國母述律氏盡以一行財寶及幽州田宅籍而獻之國母謂之曰汝父子自覓天子何耶德鈞俛首不能對案通鑑云太后問曰汝近者何為在太原德鈞曰奉唐主之命太后曰汝從吾兒求為天子何妄語耶又自指其心曰此不可欺也又曰吾兒將行吾戒之云趙大王若引兵北向榆關亟須引歸太原不可救也汝欲為天子何不先擊退吾兒徐圖亦未晚汝為人臣既負其主不能擊敵又欲乘亂邀利所為如此何面目復求生乎德鈞俛首不能對舊五代史考異又問田宅何在曰俱在幽州國母曰屬我矣又何獻也至天福二年夏德鈞卒於契丹永樂大典卷一萬八千一百三十案契丹國志云德鈞鬱鬱不多食踰年而死德鈞既卒國主釋延壽而用之舊五代史考異延壽本姓劉氏父曰邧常山人也常任蓨令梁開平初滄州節度使劉守文陷其邑時德鈞為偏將獲延壽幷其母种氏遂養之為子延壽姿貌妍柔稍涉書史尤好賓客亦能為詩案太平廣記引趙延壽傳云延壽幼習武略即戎之暇時復以篇什為意嘗在北庭賦詩曰占得高原肥草地夜深生火折林梢南人聞者傳之舊五代史考異及長尚明宗女興平公主初為汴州司馬明宗即位授汝州刺史歷河陽宋州節度使入為上將軍充宣徽使遷樞密使兼鎮徐州及高祖起義於晉陽唐末帝幸懷州委延壽北伐後高祖至潞州延壽與父德鈞俱陷北庭未幾契丹主以延壽為幽州節度使封燕王案遼史云德鈞卒以延壽為幽州節度使封燕王與薛史同契丹國志會同六年以延壽為盧龍節度使八年南征以延壽為魏博節度使封燕王與薛史異舊五代史考異尋為樞密使兼政事令案遼史云天顯末以延壽妻在晉詔取之以歸自是益激昂圖報會同初帝幸其第加政事令不言延壽為樞密使考契丹國志云會同改元參用蕃漢以延壽為樞密使兼政事令與薛史同舊五代史考異天福末契丹既與少帝絕好契丹主委延壽以圖南之事許以中原帝之延壽乃導誘蕃戎蠶食河朔晉軍既降於中渡戎王命延壽就寨安撫諸軍仍賜龍鳳赭袍使衣之而往謂之曰漢兒兵士皆爾有之爾宜親自慰撫延壽至營杜重威李守貞已下皆迎謁於馬前及戎王入汴時南北降軍數萬皆野次於陳橋戎王慮其有變欲盡殺之延壽聞之遽請見於戎王曰臣伏見今日已前皇帝百戰千征始收得晉國不知皇帝自要治之乎為他人取之乎戎王變色曰爾何言之過也朕以晉人負義舉國南征五年相殺方得中原豈不自要為主而為他人耶卿有何說速奏朕來延壽曰皇帝嘗知吳蜀與晉朝相殺否曰知延壽曰今中原南自安申西及秦鳳沿邊數千里並是兩界守戍之所將來皇帝歸國時又漸及炎蒸若吳蜀二寇交侵中國未知如許大世界教甚兵馬禦捍苟失隄防豈非為他人取也戎王曰我弗知也為之奈何延壽曰臣知上國之兵當炎暑之時沿吳蜀之境難為用也未若以陳橋所聚降軍團倂別作軍額以備邊防戎王曰我念在壺關陽城時亦曾言議未獲區分致五年相殺此時入手如何更不翦除延壽曰晉軍見在之數如今還似從前盡在河南誠為不可臣請遷其軍幷其家口於鎮定雲朔間以處之每歲差伊分番於河外沿邊防戍斯上策也戎王忻然曰一取大王商量由是陳橋之衆獲免長平之禍焉延壽在汴久之知戎王無踐言之意乃遣李崧達語於戎王求立以為皇太子崧不得已而言之戎王曰我於燕王無所愛惜但我皮肉堪與燕王使用亦可割也何況他事我聞皇太子天子之子合作燕王豈得為之也因命與燕王加恩時北來翰林學士承旨張礪擬延壽為中京留守大丞相錄尚書事都督中外諸軍事樞密使燕王如故案遼史云會同七年正月己丑授延壽魏博等州節度使封魏王延壽本傳亦言其先封燕王改封魏王是延壽入汴時已為魏王也薛史始終稱為燕王與遼史異舊五代史考異案遼史載張礪擬狀無樞密使燕王如故七字孔本戎王覽擬狀索筆塗却錄尚書事都督中外諸軍事之字乃付翰林院草制焉又以其子匡贊為河中節度使延壽在汴州復娶明宗小女為繼室先是延州節度使周密為其子廣娶焉已納財畢親迎有日矣至是延壽奪取之契丹主自汴迴至邢州命升延壽坐在契丹左右相之上契丹主死延壽下教於諸道稱權知南朝軍國事是歲六月一日為永康王兀欲所鎖籍其家財分給諸部尋以延壽入國竟卒於契丹案遼史世宗紀天祿二年十月壬午南京留守魏王趙延壽薨薛史漢高祖紀天福十二年起復其子贊蓋傳聞之誤案遼史云世宗即位以翌戴功授樞密使天祿二年薨考延壽謀自主為永康王所鎖遼史為之諱言記傳皆不載孔本匡贊歷漢周兩朝累授節鎮及統軍使仕皇朝歷廬延邠鄜等四鎮焉永樂大典卷一萬六千九百九十一張礪字夢臣案契丹國志云礪磁州滏陽人也孔本幼嗜學有文藻唐同光初擢進士第尋拜左拾遺直史館會郭崇韜伐蜀奏請礪掌軍書蜀平崇韜為魏王繼岌所誅時崇韜左右親信皆懼禍奔逃唯礪詣魏王府第慟哭久之時人服其高義永樂大典卷一萬三千九百十三天成初明宗知其名授翰林學士再丁父母憂服闋皆復入為學士歷禮部兵部員外郎知制誥充職未幾父之妾卒初妾在世礪以久侍先人頗亦敬奉諸幼子亦以祖母呼之及卒礪疑其事詢於同僚未有以對礪即托故歸於滏陽閑居三年不行其服論情制宜識者韙之永樂大典卷一萬七百九十八案以下有闕文礪為戎王翰林學士開運末與契丹居南松門之內軒轡交織多繼燭接洽無厭倦色因密言曰此胡用法如此豈能久處京師及北去道路有觴酒豆肉必遺故客屬僚死之日囊裝惟酒食器皿而已識者無不高之冊府元龜卷七百九十六張礪字夢臣磁州滏陽人也祖慶父寶世為農礪幼嗜學有文藻在布衣時或覩民間爭競必為親詣公府辨其曲直其負氣也如此唐同光初擢進士第尋拜左拾遺直史館會郭崇韜伐蜀奏請礪掌軍書蜀平崇韜為魏王繼岌所誅時崇韜左右親信皆懼禍奔逃惟礪詣魏王府第慟哭久之時人皆服其高義及魏王班師礪從副招討使任圜東歸至利州會康延孝叛迴據漢州圜奉魏王命迴軍西討延孝時礪獻謀于圜請伏精兵于後先以羸師誘之圜深以為然延孝本驍將也任圜乃儒生也延孝聞圜至又覩其羸師殊不介意及戰酣圜發精兵以擊之延孝果敗遂擒之以歸是歲四月五日至鳳翔內官向延嗣奉莊宗命令誅延孝監軍李延襲已聞洛中有變故留延孝且害任圜之功故也圜未決礪謂圜曰此賊構亂遂致凱旋差晚且明公血戰擒賊安得違詔養禍是破檻放虎自貽其咎也公若不決余自殺此賊任圜不得已遂誅延孝天成初明宗知其名召為翰林學士再丁父母憂服闋皆復入為學士歷禮部兵部員外郎知制誥充職未幾父之妾卒初妾在世礪以久侍先人頗亦敬奉諸幼子亦以祖母呼之及卒礪疑其事詢于同僚未有以對礪即託故歸于滏陽閒居三年不行其服論情制宜識者韙之清泰中復授尚書比部郎中知制誥依前充學士高祖起于晉陽唐末帝命趙延壽進討又命翰林學士和凝與延壽偕行礪素輕凝慮不能集事因自請行唐末帝慰而許之及唐軍敗于團柏谷與延壽俱陷于契丹契丹以舊職縻之累官至吏部尚書契丹入汴授右僕射平章事集賢殿大學士隨至鎮州會契丹主卒永康王北去蕭翰自東京過常山乃引鐵騎圍其第時礪有疾方伏枕翰見礪責之曰爾言于先帝云不得任蕃人作節度使如此則社稷不永矣又先帝來時令我于汴州大內安下爾言不可又我為汴州節度使爾在中書何故行帖與我礪抗聲而對辭氣不屈翰遂鎖礪而去案遼史云礪抗聲曰此國家大體安危所係吾實言之欲殺即殺奚以鎖為舊五代史考異鎮州節度使麻答尋解其鎖是夜以疾卒家人燼其骨歸葬于滏陽礪素耿直嗜酒無檢始陷契丹時曾背契丹南歸為追騎所獲契丹主怒曰爾何捨我而去礪曰礪漢人也衣服飲食與此不同生不如死請速就刃契丹主顧通事高唐英曰我常戒爾輩善待此人致其逃去過在爾輩因笞唐英一百其為契丹主善待也如此礪平生抱義憐才急于奬拔聞人之善必攘袂以稱之見人之貧亦倒篋以濟之故死之之日中朝士大夫亦皆嘆惜焉蕭翰者契丹諸部之酋長也父曰阿鉢劉仁恭鎮幽州阿鉢曾引衆寇平州仁恭遣驍將劉鴈郎與其子守光率五百騎先守其州阿鉢不知為郡人所紿因赴牛酒之會為守光所擒契丹請贖之仁恭許其請尋歸其妹為阿保機妻則德光之母也翰有妹亦嫁於德光故國人謂翰為國舅契丹入東京以翰為宣武軍節度使契丹比無姓氏翰將有節度之命乃以蕭為姓翰為名自是翰之一族皆稱姓蕭契丹主北去留翰以鎮河南時漢高祖已建號於太原翰懼將北歸慮京師無主則衆皆為亂乃遣蕃騎至洛京迎唐明宗幼子許王從益知南朝軍國事從益至翰率蕃將拜於殿上翌日翰乃輦其寶貨鞍轡而北漢人以許王既立不復為亂果中其狡計翰行至鎮州遇張礪翰以舊事致忿就第數其失而鎖之翰歸本國為永康王兀欲所鎖尋卒於本土永樂大典卷五千二百二十五案遼史翰後以謀反伏誅與薛史異舊五代史考異劉晞者涿州人也父濟雍累為本郡諸邑令長晞少以儒學稱於鄉里嘗為唐將周德威從事後陷於契丹契丹以漢職縻之天福中契丹命晞為燕京留守嘗於契丹三知貢舉歷官至同平章事兼侍中隨契丹入汴授洛京留守會河陽軍亂晞走許州又奔東京蕭翰遣兵送晞至洛下契丹主死晞自洛復至東京隨蕭翰北歸遂留鎮州漢初與麻答同奔定州後卒於北蕃永樂大典卷九千九十九案契丹國志劉珂晞之子也尚世宗妹燕國公主舊五代史考異崔廷勳不知何許人也案通鑑注引宋白曰廷勳本河內人舊五代史考異形貌魁偉美鬚髯幼陷契丹歷偽命雲州節度使官至侍中契丹入汴遷少帝於封禪寺遣廷勳以兵防守尋授河陽節度使甚得民情契丹北行武行德率軍趨河陽廷勳為行德所逐乃與奚王拽剌保懷州尋以兵反攻行德行德出戰為廷勳所敗及契丹主死遂歸鎮州漢初與麻答同奔定州後沒於北蕃永樂大典卷二千七百四十史臣曰帝王之尊必由天命雖韓信彭越之勇吳濞淮南之勢猶不可以妄冀而況二安之庸昧相輔為亂固宜其自取滅亡也後之擁強兵蒞重鎮者得不以為鑒乎彥澤狼子野心盈貫而死晚矣德鈞諸人與晉事相終始故附見于茲焉
