body:
  text: 舊五代史卷十三梁書十三列傳第三朱瑄宋州下邑人也父慶里之豪右以攻剽販鹽為事吏捕之伏法瑄坐父罪以笞免因入王敬武軍為小校唐中和二年諫議大夫張濬徵兵於青州敬武遣將曹全晸案新唐書及通鑑俱作曹存實舊唐書歐陽史與薛史同率軍赴之以瑄隸焉以戰功累遷列校賊敗出關全晸以本軍還鎮會鄆帥薛崇卒部將崔君預案舊唐書作崔君裕據城叛全晸攻之殺君預自為留後瑄以功授濮州刺史鄆州馬步軍都將光啟初魏博韓允中攻鄆案新唐書作中和初魏博韓簡東窺曹鄆與薛史異考舊唐書韓允忠傳乾符元年十一月卒子簡起復為節度觀察留後新唐書本紀亦云韓允中卒其子簡自稱留後是東窺曹鄆實韓簡非允中也薛史似微誤通鑑作中和二年韓簡擊鄆州當得其實全晸為其所害案舊唐書韓簡傳云移軍攻鄆鄆帥曹全晸出戰為簡所敗死之鄆將崔君裕收合殘衆保鄆州簡進攻其城半年不下朱瑄傳云崔君裕權知州事全晸知其兵寡襲殺君裕據韓簡傳全晸死而君裕保其城據朱瑄傳則君裕為全晸所殺二傳自相矛盾新唐書本紀作韓簡寇鄆州天平軍節度使曹全晸死之部將崔用自稱留後與舊書韓簡傳同惟崔用之名有異耳薛史定從舊書朱瑄傳通鑑與薛史同瑄據城自固三軍推為留後允中敗案舊唐書韓簡傳云簡以憂憤疽發背而卒時中和元年十一月也諸葛爽傳云中和元年十一月簡鄉兵八萬大敗明年正月簡為牙將所殺新唐書本紀云中和三年二月魏博軍亂殺其節度使韓簡通鑑與新唐書同薛史誤作允中歷考諸書年月參差姓名舛異無可依據蓋唐末典章散佚故傳聞失實如此朝廷以瑄為天平軍節度使累加官至檢校太尉同平章事太祖初鎮大梁兵威未振連歲為秦宗權所圍士不解甲危殆日數四太祖以瑄同宗早兄事之乃遣使求援於瑄光啟末宗權急攻大梁瑄與弟瑾率兗鄆之師來援大敗蔡賊解圍而遁太祖感其力厚禮以歸之先是瑄瑾駐於大梁覩太祖軍士驍勇私心愛之及歸厚懸金帛於界上以誘焉諸軍貪其厚利私遁者甚衆太祖移牒以讓之瑄來詞不遜由是始搆隙焉及秦宗權敗太祖移軍攻時溥於徐州時瑄方右溥乃遣使來告太祖曰巢權巢權原本脫權字今據通鑑注增入影庫本粘籤繼為蛇虺毒螫中原與君把臂同盟輔車相依今賊已平殄人粗聊生吾弟宜念遠圖不可自相魚肉或行人之失辭疆吏之踰法可以理遣未得便暌和好投鼠忌器弟幸思之太祖方怒時溥通於孫儒不從其言及龐師古攻徐州瑄出師來援太祖深銜之徐既平太祖倂兵以攻鄆自景福元年冬遣朱友裕領軍渡濟至乾寧三年宿軍齊鄆間大小凡數十戰語在太祖紀中自是野無人耕屬城悉為我有瑄乃遣人求救於太原李克用遣其將李承嗣史儼等援之尋為羅弘信所扼援路既絕瑄瑾竟敗乾寧四年正月龐師古攻陷鄆州遁至中都北匿於民家為其所箠幷妻榮氏禽之來獻俱斬於汴橋下永樂大典卷二千三十三案舊唐書云瑄與妻榮氏出奔至中都為野人所害傳首汴州榮氏至汴州為尼與薛史異朱瑾瑄從父弟雄武絕倫性頗殘忍光啟中瑾與兗州節度使齊克讓婚瑾自鄆盛飾車服私藏兵甲以赴禮會親迎之夜甲士竊發擄克讓自稱留後及蔡賊鴟張瑾與太祖連衡同討宗權前後屢捷以功正授兗州節度使既得士心有兼幷天下之意太祖亦忌之瑾以厚利招誘太祖軍士以為間諜及太祖攻鄆瑾出師來援累與太祖接戰乾寧二年春太祖令大將朱友恭攻瑾掘塹柵以環之朱瑄遣將賀瓌及蕃將何懷寶赴援為友恭所擒十一月瑾從兄齊州刺史瓊以州降案原本齊州作濟州據通鑑及北夢瑣言改正舊五代史考異太祖令執賀瓌懷寶及瓊以狥於城下語曰卿兄已敗早宜効順瑾偽遣牙將瑚兒持書幣送降太祖自至延壽門外與瑾交語瑾謂太祖曰欲令大將送符印願得兄瓊來押領所貴骨肉盡布腹心也太祖遣瓊與客將劉捍取符笥瑾單馬立於橋上揮手謂捍曰可令兄來余有密款即令瓊往瑾先令騎士董懷進伏于橋下及瓊至懷進突出擒瓊而入俄而斬瓊首投於城外太祖乃班師及鄆州陷龐師古乘勝攻兗瑾與李承嗣方出兵求芻粟於豐沛間瑾之二子案新唐書作子用貞及大將康懷英判官辛綰小校閻寶以城降師古瑾無歸路即與承嗣將麾下士將保沂州刺史尹處賓案新唐書作尹懷賓拒關不納乃保海州為師古所逼遂擁州民渡淮依楊行密按新唐書刺史朱用芝以其衆與瑾奔楊行密行密表瑾領徐州節度使龐師古渡淮行密令瑾率師以禦之清口之敗瑾有力焉自是瑾率淮軍連歲北寇徐宿大為東南之患及行密卒子渭繼立以徐溫子知訓為行軍副使寵遇頗深後楊溥僭號知訓為樞密使知政事以瑾為同平章事仍督親軍時徐溫父子恃寵專政慮瑾不附己案陳彭年江南別錄云徐知訓初學兵法于朱瑾瑾悉心教之後與瑾有隙夜遣壯士殺瑾瑾手刃數人埋于舍後舊五代史考異貞明四年六月出瑾為淮寧軍節度使案原本淮寧作懷寧今據九國志改正舊五代史考異知訓設家宴以餞瑾瑾事之逾遜翌日詣知訓第謝留門久之知訓家僮私謂瑾曰政事相公此夕在白牡丹妓院侍者無得往瑾謂典謁曰吾不奈朝饑且歸既而知訓聞之愕然曰晚當過瑾瑾厚備供帳瑾有所乘名馬冬以錦帳貯之夏以羅幬護之愛妓桃氏案九國志作妻陶氏五國故事作愛姬姚氏有絕色善歌舞及知訓至奉巵酒為壽初以名馬奉知訓喜而言曰相公出鎮與吾暫別離恨可知願此盡歡瑾即延知訓於中堂出桃氏酒既醉瑾斬知訓首案五國故事作以手板擊殺之馬令南唐書云知訓因求馬於瑾瑾不與遂有隙俄出瑾為靜淮節度使瑾詣知訓別且願獻前馬知訓喜往謁瑾家瑾妻出拜知訓答拜瑾以笏擊踣遂斬知訓舊五代史考異示其部下因以其衆急趨衙城知訓之黨已闔門矣唯瑾得獨入與衙兵戰案九國志翟虔傳云虔驅率散卒共閉關瑾以是不得出復踰城而出傷足求馬不獲遂自刎案九國志米志誠傳志誠被甲親從十餘騎至天興門問瑾所向聞瑾已死乃歸暴其屍於巿盛夏無蠅蛆徐溫令投之于江部人竊收葬之溫疾亟夢瑾被髮引滿將射之溫乃為之禮葬立祠以祭之永樂大典卷二千三十一案馬令南唐書云初宿衞將李球馬謙挾楊隆演登樓取庫兵以誅知訓陣于門橋知訓與戰頻却朱瑾適自外來以一騎前視其陣曰不足為也因反顧一麾外兵爭進遂斬球謙亂兵皆潰瑾嘗有德於知訓者也及其凶終吳人皆謂曲在知訓舊五代史考異五代史補瑾之奔淮南也時行密方圖霸其為禮待有加于諸將數等瑾感行密見知欲立奇功為報但恨無入陣馬忽忽不樂一日晝寢夢老叟眉髮皓然謂瑾曰君長恨無入陣馬今馬生矣及隸報適退槽馬生一駒見臥未能起瑾驚曰何應之速也行往視之見骨目皆非常馬大喜曰事辦矣其後破杜洪取鍾傳未嘗不得力焉初瑾之來也徐溫覩其英烈深忌之故瑾不敢預政及行密死子溥嗣位溫與張鎬爭權襲殺鎬自是事無大小皆决于溫既而溫復為自安之計乃以子知訓自代然後引兵出居金陵實欲控制中外知訓尤恣橫瑾居常嫉之一旦知訓欲得瑾所乘馬瑾怒遂擊殺知訓提其首請溥起兵誅溫溥素怯懦見之掩面而走瑾曰老婢兒不足為計亦自殺中外大駭且懼溫至遽以瑾屍暴之巿中時盛暑肌肉累日不壞至青蠅無敢輒泊人有病者或于暴屍處取土煎而服之無不愈時溥徐州人初為州之驍將唐中和初秦宗權據蔡州侵寇隣藩節度使支詳命溥率師以討之徐軍屢捷軍情歸順以節鉞授之冊府元龜卷四百一十二案薛史時溥傳永樂大典原闕今考冊府元龜引梁時溥一條當係薛史原文謹為補入又考舊唐書列傳云時溥彭城人徐之牙將黃巢據長安詔徵天下兵進討中和二年武寧軍節度使支詳遣溥與副將陳璠率師五千赴難行至河陰軍亂剽河陰縣迴溥招合撫諭其衆復集懼罪屯于境上詳遣人迎犒悉恕之溥乃移軍向徐州既入軍人大呼推溥為留後送詳于大彭館溥大出資裝遣陳璠援詳歸京詳宿七里亭其夜為璠所殺舉家屠害溥以璠為宿州刺史竟以違命殺詳溥誅璠又令別將帥軍三千赴難京師天子還宮授之節鉞及黃巢攻陳州秦宗權據蔡州與賊連結徐蔡相近溥出師討之軍鋒益盛每戰屢捷黃巢之敗也其將尚讓以數千人降溥後林言又斬黃巢首歸徐州時溥功居第一詔授檢校太尉中書令鉅鹿郡王宗權未平仍授溥徐州行營兵馬都統蔡賊平朱全忠與之爭功遂相嫌怨淮南亂朝廷以全忠遙領淮南節度以平孫儒行密之亂汴人應援路出徐方溥阻之全忠怒出師攻徐自光啟至大順六七年間汴軍四集徐泗三郡民無耕稼頻歲水災人喪十六七溥窘求和于汴全忠曰移鎮則可朝廷以尚書劉崇望代溥以溥為太子太師溥懼出城見殺不受代汴將龐師古陳兵于野溥求援于兗州朱瑾出兵救之值大雪糧盡而還城中守陴者饑甚加之疾疫汴將王重師牛存節夜乘梯而入溥與妻子登樓自焚而卒實景福二年也地入于汴王師範青州人父敬武初為平盧牙將唐廣明元年無棣人洪霸郎合羣盜於齊棣間節度使安師儒遣敬武討平之及巢賊犯長安諸藩擅易主帥敬武乃逐師儒自為留後王鐸承制授以節鉞後以出師勤王功加太尉平章事龍紀中敬武卒師範年幼三軍推之為帥棣州刺史張蟾叛於師範案原本作張儋今據新唐書改正舊五代史考異不受節度朝廷乃以崔安潛為平盧帥師範拒命張蟾迎安潛至郡同討師範師範遣將盧弘將兵攻蟾盧弘歐陽史作盧洪蓋避宣祖諱今仍薛史之舊影庫本粘籤弘復叛與蟾通謀偽旋軍將襲青州師範知之遣重賂迎弘謂之曰吾以先人之故為軍府所推年方幼少未能幹事如公以先人之故令不乏祀公之仁也如以為難與成事乞保首領以守先人墳墓亦唯命弘以師範年幼必無能為不為之備師範伏兵要路迎而享之預謂紀綱劉鄩曰翌日盧弘至爾即斬之酬爾以軍校鄩如其言斬弘於座上及同亂者數人因戒厲士衆大行頒賞與之誓約自率之以攻棣州擒張蟾斬之安潛遁還長安師範雅好儒術少負縱橫之學故安民禁暴各有方略當時藩翰咸稱之及太祖平兗鄆遣朱友恭攻之師範乞盟遂與通好天復元年冬李茂貞劫遷車駕幸鳳翔韓全誨矯詔加罪於太祖令方鎮出師赴難詔至青州師範承詔泣下曰吾輩為天子藩籬君父有難略無奮力者皆強兵自衞縱賊如此使上失守宗祧危而不持是誰之過吾今日成敗以之乃發使通楊行密案新唐書全忠圍鳳翔昭宗詔方鎮赴難以師範附全忠命楊行密部將朱瑾攻青州且欲代為平盧軍節度使師範聞之哭曰吾為國守藩君危不持可乎乃與行密連盟是師範之通行密因其將謀見代而始遣使也歐陽史作因乞兵于楊行密殊失事實而薛史亦未詳載遣將劉鄩襲兗州別將襲齊時太祖方圍鳳翔師範遣將張居厚部輿夫二百言有獻於太祖至華州城東華將婁敬思疑其有異剖輿視之乃兵仗也居厚等因大呼殺敬思聚衆攻西城時崔胤在華州遣部下閉關距之遂遁去是日劉鄩下兗州河南數十郡同日發太祖怒遣朱友寧率軍討之既而友寧為青軍所敗臨陣被擒傳首於淮南天復三年七月太祖復令楊師厚進攻屯於臨朐師厚累敗青軍遂進寨於城下師範懼乃令副使李嗣業詣師厚乞降案師範之降薛史與新唐書異薛史則以為兵臨城下而始降也新唐書云師厚圍青州敗師範兵于臨朐執諸將又獲其弟師克是時師範衆尚十餘萬諸將請决戰而師範以弟故乃請降歐陽史云弟師魯大敗遂傅其城而梁別將劉重霸下其棣州師範乃請降亦微有不同太祖許之歲餘遣李振權典青州事因令師範舉家徙汴師範將至縞素乘驢請罪於太祖太祖以禮待之尋表為河陽節度使會韓建移鎮青州太祖帳餞於郊師範預焉太祖謂建曰公頃在華陰政事之暇省覽經籍此亦士君子之大務今之青土政簡務暇可復修華陰之故事建撝謙而已太祖又曰公讀書必須精意勿錯用心太祖以師範好儒前以青州叛故以此言譏之及太祖即位徵為金吾上將軍開平初太祖封諸子為王友寧妻號訴於太祖曰陛下化家為國人人皆得崇封妾夫早預艱難粗立勞効不幸師範反逆亡夫橫屍疆場寃讎尚在朝廷受陛下恩澤亡夫何罪太祖淒然泣下曰幾忘此賊即遣人族師範於洛陽先掘坑於第側乃告之其弟師誨兄師悅及兒姪二百口咸盡戮焉時使者宣詔訖師範盛啟宴席令昆仲子弟列座謂使者曰死者人所不能免況有罪乎然予懼坑屍於下少長失序恐有愧於先人行酒之次令少長依次於坑所受戮人士痛之後唐同光三年三月詔贈太尉永樂大典卷一萬八千一百二十七劉知俊字希賢徐州沛縣人也姿貌雄傑倜儻有大志始事徐帥時溥為列校溥甚器之後以勇略見忌唐大順二年冬率所部二千人來降即署為軍校知俊被甲上馬輪劍入敵勇冠諸將太祖命左右義勝兩軍隸之尋用為左開道指揮使案原本作關道今據歐陽史改正舊五代史考異故當時人謂之劉開道從討秦宗權及攻徐州皆有功尋補徐州馬步軍都指揮使攻海州下之遂奏授刺史天復初歷典懷鄭二州從平青州以功奏授同州節度使天祐三年冬以兵五千破岐軍六萬於美原自是連克鄜延等五州乃加檢校太傅平章事開平二年春三月命為潞州行營招討使知俊未至潞夾寨已陷晋人引軍方攻澤州聞知俊至乃退尋改西路招討使六月大破岐軍於幕谷俘斬千計李茂貞僅以身免三年五月加檢校太尉兼侍中封大彭郡王時知俊威望益隆太祖雄猜日甚會佑國軍節度使王重師無罪見誅知俊居不自安乃據同州叛案鑒戒錄云彭城王劉知俊鎮同州日因築營牆掘得一物重八十餘斤狀若油囊召賓幕將校問之劉源曰此是寃氣所結古來囹圄之地或有焉昔王充據洛陽修河南府獄亦獲此物源聞酒能忘憂奠以醇醪或可消釋耳然此物之出亦非吉徵也知俊命具酒饌祝酹復瘞之尋有叛城背主之事舊五代史考異送款於李茂貞又分兵以襲雍華雍州節度使劉捍被擒送鳳翔害之華州蔡敬思被傷獲免太祖聞知俊叛遣近臣諭之曰朕待卿甚厚何相負耶知俊報曰臣非背德但畏死耳王重師不負陛下而致族滅太祖復遣使謂知俊曰朕不料卿為此昨重師得罪蓋劉捍言陰結邠鳳終不為國家用我今雖知枉濫悔不可追致卿如斯我心恨恨蓋劉捍悞予事也捍一死固未塞責知俊不報遂分兵以守潼關太祖命劉鄩率兵進討攻潼關下之時知俊弟知浣知浣原本作知院今據本紀及劉鄩傳改正影庫本粘籤為親衞指揮使聞知俊叛自洛奔至潼關為鄩所擒害之尋而王師繼至知俊乃舉族奔於鳳翔李茂貞厚待之偽加檢校太尉兼中書令以土疆不廣無藩鎮以處之但厚給俸祿而已尋命率兵攻圍靈武且圖牧圉之地靈武節度使韓遜遣使來告急太祖令康懷英率師救之師次邠州長城嶺為知俊邀擊懷英敗歸案九國志云李彥琦劉知俊自靈武班師塗經長城嶺梁將率精銳數萬躡其後彥琦與知俊同設方略擊敗之舊五代史考異茂貞悅署為涇州節度使復命率衆攻興元進圍西縣會蜀軍救至乃退案九國志王宗鐬傳云岐將劉知俊等領大軍分路來攻由階成路奪固鎮糧王宗侃唐襲等禦之至青泥嶺為知俊所敗退保西縣會大雨漢江漲宗鐬自羅村得鄉導緣山而行數百里與宗播遇于鐵谷合軍出湯頭時知俊自斜谷山南直抵興州圍西縣軍人散掠巴中宗鐬與宗播襲之會王建亦至遂解西縣之圍舊五代史考異既而為茂貞左右石簡顒等間之免其軍政寓於岐下掩關歷年茂貞猶子繼崇鎮秦州因來寧覲言知俊途窮至此不宜以讒嫉見疑茂貞乃誅簡顒等以安其心繼崇又請令知俊挈家居秦州以就豐給茂貞從之未幾邠州亂茂貞命知俊討之時邠州都校李保衡納款于朝廷末帝遣霍彥威率衆先入于邠知俊遂圍其城半載不能下會李繼崇以秦州降于蜀知俊妻孥皆遷於成都遂解邠州之圍而歸岐陽以舉家入蜀終慮猜忌因與親信百餘人夜斬關奔蜀王建待之甚至即授偽武信軍節度使尋命將兵伐岐不克班師因圍隴州獲其帥桑弘志以歸桑弘志原本桑作欒今據十國春秋改正影庫本粘籤久之復命為都統再領軍伐岐時部將皆王建舊人多違節度不成功而還蜀人因而毀之先是王建雖加寵待然亦忌之嘗謂近侍曰吾漸衰耗恆思身後劉知俊非爾輩能駕馭不如早為之所又嫉其名者於里巷間作謠言云黑牛出圈椶繩斷知俊色黔而丑生椶繩者王氏子孫皆以宗承為名故以此搆之偽蜀天漢元年冬十二月建遣人捕知俊斬於成都府之炭巿及王衍嗣偽位以其子嗣禋尚偽峨眉長公主拜駙馬都尉後唐同光末隨例遷於洛卒知俊族子嗣彬幼從知俊征行累遷為軍校及知俊叛以不預其謀得不坐貞明末大軍與晉王對壘於德勝久之嗣彬率數騎奔于晉具言朝廷軍機得失又以家世讎怨將以報之晉王深信之即厚給田宅仍賜錦衣玉帶軍中目為劉二哥居一年復來奔當時晉人謂是刺客以晉王恩澤之厚故不竊發竊發原本作竊法今據文改正影庫本粘籤龍德三年冬從王彥章戰于中都軍敗為晉人所擒晉王見之笑謂嗣彬曰爾可還予玉帶嗣彬惶恐請死遂誅之永樂大典卷九千九十八楊崇本不知何許人幼為李茂貞之假子因冒姓李氏名繼徽唐光化中茂貞表為邠州節度使天復元年冬太祖自鳳翔移軍北伐駐旆於邠郊命諸軍攻其城崇本懼出城請降太祖復置為邠州節度使仍令復其本姓名焉及師還遷其族於河中案舊唐書十一月乙亥邠州節度使李繼徽以城降全忠乃舍其孥于河中以繼徽從軍新唐書作辛未與舊唐書異其後太祖因統戎往來由於蒲津以崇本妻素有姿色嬖之於別館其婦素剛烈私懷愧恥遣侍者讓崇本曰丈夫擁旄仗鉞不能庇其伉儷我已為朱公婦今生無面目對卿期於刀繩而已崇本聞之但灑淚含怒及昭宗自鳳翔回京崇本之家得歸邠州崇本恥其妻見辱因茲復貳於太祖乃遣使告茂貞曰朱氏兆亂謀危唐祚父為國家磐石不可坐觀其禍宜於此時畢命興復事苟不濟死為社稷可也茂貞乃遣使會兵於太原時西川王建亦令大將出師以助之岐蜀連兵以攻雍華關西大震太祖遣郴王友裕帥師禦之會友裕卒於行乃班師天祐三年冬十月崇本復領鳳翔邠涇秦隴之師會延州胡章之衆合五六萬屯于美原列柵十五其勢甚盛太祖命同州節度使劉知俊及康懷英帥師拒之崇本大敗復歸於邠州自是垂翅久之乾化元年冬案原本作乾化四年今從歐史校正為其子彥魯所毒而死彥魯自稱留後領其軍事凡五十餘日為崇本養子李保衡所殺保衡舉其城來降末帝命霍彥威為邠帥由是邠寧復為末帝所有永樂大典卷一萬八千一百二十七蔣殷不知何許人幼孤隨其母適于河中節度使王重盈之家重盈憐之畜為己子唐天復初太祖既平蒲陝殷與從兄珂舉族遷于大梁太祖感王重榮之舊恩凡王氏諸子皆錄用焉殷由是繼歷內職累遷至宣徽院使案蔣殷在唐末為宣徽副使譖殺蔣元暉遷宣徽使誣害何太后其罪與孔循等薛史未及詳載舊五代史考異殷素與庶人友珪善友珪篡立命為徐州節度使乾化四年秋末帝以福王友璋鎮徐方福王原本作福為今據文改正影庫本粘籤殷自以為友珪之黨懼不受代遂堅壁以拒命時華州節度使王瓚殷之從弟也懼其連坐上章言殷本姓蔣非王氏之子也末帝乃下詔削奪殷在身官爵仍令却還本姓命牛存節劉鄩等帥軍討之是時殷求救于淮南楊溥遣朱瑾率衆來援存節等逆擊敗之貞明元年春存節劉鄩攻下徐州殷舉族自燔而死于火中得其屍梟首以獻之永樂大典卷一萬八百三十一張萬進雲州人初為本州小校亡命投幽州劉守光厚遇之任為裨將滄州劉守文以弟守光囚父而竊據其位自領兵問罪尋敗於雞蘇守光遂兼有滄景之地令其子繼威主留務繼威年幼未能政事以萬進佐之凡關軍政一皆委任繼威兇虐類父嘗淫亂於萬進之家萬進怒而殺之又遣使歸於晉既而末帝遣楊師厚劉守奇潛兵掠鎮冀因東攻滄州萬進乞降案通鑑云乾化二年九月庚子萬進遣使奉表降於梁辛丑以萬進為義昌留後甲辰改義昌為順化軍以萬進為節度使此傳疑有闕文舊五代史考異師厚表青州節度使復遷兗州仍賜名守進案原本作方進今據本紀改正舊五代史考異萬進性既輕險專圖反側貞明四年冬據城叛命遣使送款於晉王末帝降制削其官爵仍復其本名遣劉鄩討之晉人不能救五年冬萬進危小將邢師遇潛謀內應開門以納王師遂拔其城萬進族誅永樂大典卷六千三百五十史臣曰夫雲雷搆屯龍蛇起陸勢均者交鬬力敗者先亡故瑄瑾時溥之流皆梁之吞噬斯亦理之常也唯瑾始以竊發有土終以竊發亡身傳所謂君以此始必以此終者乎師範屬衰季之運以興復為謀事雖不成忠則可尚雖貽族滅之禍亦可以與臧洪遊於地下矣知俊驍武有餘奔亡不暇六合雖大無所容身夫如是則豈若義以為勇者乎崇本而下俱以叛滅又何足以道哉永樂大典卷六千三百五十
