body:
  text: 昆明部落其俗椎髻跣足酋長披虎皮下者披于闐其俗好事妖神永樂大典卷八千五百二十昆明占城嚑蠻傳永樂大典全篇已佚僅存數語今姑仍其舊影庫本粘籤占城本地鳥之大者有孔雀永樂大典卷八千四百三十九嚑蠻其國法艹疎盜者三倍還贓殺人者出牛馬三十頭乃得贖死永樂大典卷五千一百五十
