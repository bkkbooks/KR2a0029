body:
  text: 舊五代史卷四十二唐書十八明宗紀第八長興二年春正月庚申朔帝御明堂殿受朝賀仗衞如儀乙丑詔曰故天策上將軍守太師尚書令楚國王馬殷品位俱高封崇已極無官可贈宜賜諡及神道碑文仍以王禮葬壬申契丹東丹王突欲自渤海國率衆到闕案托雲歸唐五代春秋作二年正月蓋以到闕之日為據歐陽史作四年十一月丙戌蓋以奏聞之日為據舊五代史考異帝慰勞久之錫賚加等百僚稱賀丙子以沙州節度使曹義金兼中書令案原本作汝州今據通鑑改正舊五代史考異丁丑東丹王突欲進本國印三紐庚辰以靜江軍節度使馬賨卒廢朝贈尚書令丙戌荊南節度使高從誨落起復加兼中書令二月己丑朔以宋州節度使趙延壽為左武衞上將軍充宣徽北院使癸巳詔貢院舊例夜試進士今後晝試排門齊入即日試畢丁酉幸至德宮又幸安元信東丹王突欲之第辛丑以鴻臚卿致仕賈馥卒廢朝以樞密院使守太尉兼中書令安重誨為檢校太師兼中書令充河中節度使進封沂國公己酉以右威衞上將軍陳臯為洋州節度使詔諸府少尹上任上任原本作尚佐今從五代會要改正影庫本粘籤以二十五日為限諸州刺史諸道行軍司馬副使兩使判官已下賓職團防軍事判官推官府縣官等並以三十日為限幕職隨府者不在此例癸丑邠州節度使李敬周移鎮徐州詔禁天下開發無主墳墓三月辛酉詔渤海國人皇王突欲宜賜姓東丹名慕華仍授檢校太保安東都護充懷化軍節度瑞慎等州觀察等使其從慕華歸國部校各授懷化歸德將軍中郎將先於定州擒獲蕃將惕隱宜賜姓狄名懷惠則骨宜賜姓列名知恩並授檢校右散騎常侍舍利則剌宜賜姓原名知感棫骨宜賜姓服名懷造奚王副使竭失訖宜賜姓乙名懷宥三人並授檢校太子賓客甲子以前鴻臚卿王瓊為太僕卿丙寅以皇子從珂為左衞大將軍從珂自河中失守歸清化里第清化原本作情化今從通鑑注所引薛史改正影庫本粘籤至是安重誨出鎮河中帝召見泣而謂之曰如重誨意爾安得更相見耶因有是命壬申以滄州節度使孔循卒廢朝乙亥以西京留守權知興元軍府事王思同為山南西道節度使充西面行營馬步軍都虞候庚辰以少府監聶延祚為殿中監以前雲州節度使楊漢章為安州節度使楊漢章原本作漢童今從通鑑改正影庫本粘籤乙酉太師致仕錢鏐復授天下兵馬都元帥尚父吳越國王以其子兩浙節度使元瓘等上表首罪故有是命丁亥以太常卿李愚為中書侍郎平章事集賢殿大學士夏四月辛卯制德妃王氏進位淑妃詔錢鏐依舊賜不名誅內官安希倫以其受安重誨密指令於內中伺帝起居故也丁酉幸會節園宴羣臣因幸河南府詔罷州縣官到任後率斂為地圖又禁人毀廢所在碑碣戊戌詔今年四月褅饗太廟故昭義節度使李嗣昭故幽州節度使周德威故汴州節度使符存審並配饗莊宗廟庭己亥以前徐州節度使張虔釗為鳳翔節度使癸卯以汴州節度副使藥縱之為戶部侍郎前宗正卿李諧為將作監甲辰以宣徽北院使左衞上將軍趙延壽為檢校太傅行禮部尚書充樞密使乙巳潞州節度使劉仲殷移鎮秦州帝幸龍門佛寺祈雨己酉天雄軍節度使石敬瑭兼六軍諸衞副使辛亥以前鳳翔節度使朱弘昭為左武衞上將軍充宣徽南院使壬子以兵部尚書盧質為河陽節度使甲寅以遂州節度使夏魯奇沒於王事廢朝案通鑑正月庚午李仁罕陷遂州夏魯奇自殺歐陽史作四月甲寅董璋陷遂州武信軍節度使夏魯奇死之與通鑑異以薛史考之歐陽史蓋誤以奏聞之日為城陷之日宜從薛史詔曰久時雨深疚予心宜委諸州府長吏親問刑獄省察寃濫見禁囚徒除死罪外並放案歐陽史作乙卯以旱赦流罪以下囚與薛史作壬子異舊五代史考異五月戊午朔帝御文明殿受朝庚申以三司使行工部尚書張延朗為兗州節度使辛酉詔近聞百執事等或親居內職或貴列廷臣或宣達君恩或勾當公事經由列鎮干撓諸侯指射職員安排親昵或潛示意旨或顯發書題自今後一切止絕有所犯者發薦人貶官求薦人流配如逐處長吏自徇人情只仰被替人詣闕上訴被替原本作被贊今從五代會要改正影庫本粘籤長吏罰兩月俸發薦人更加一等被替人却令依舊甲子都官郎中知制誥崔梲上言請搜訪宣宗已來野史以備編修從之丁卯詔諸州府城郭內依舊禁麴其麴官中自造減舊價之半貨賣應田畝上所徵麴錢並放鄉村人戶一任私造時甚便之戊辰中書奏應朝臣丁憂者望加頒賚從之丁丑以祕書監劉岳為太常卿己卯以武德使孟漢瓊為右衞大將軍知內侍省充宣徽北院使辛巳以前相州刺史孟鵠為左驍衞大將軍相州刺史原本脫刺史二字今從冊府元龜增入影庫本粘籤充三司使甲申以權知朗州軍州事守永州刺史馬希範為洪州節度使檢校太傅以權知桂州軍府事富州刺史馬希彝為鄂州節度使檢校司徒乙酉以左金吾大將軍薄文為晉州留後鴻臚卿柳膺將齋郎文書賣與同姓人柳居則伏罪大理寺斷當大辟緣經赦減死追奪見任官終身不齒詔應見任前資守選官等所有本朝及梁朝出身歷任告身並仰送納委所在磨勘換給公憑只以中興已來官告及近受文書理其諸色蔭補子孫如非虛假不計庶嫡並宜錄如實無子孫別立人繼嗣已補得身名者只許蔭一人蔭原本作緒蔭今從五代會要改正影庫本粘籤其不合使文書限百日內焚毀須絕此後更敢將合焚文書參選求仕其所犯之人並傳者並當極法應合得資蔭出身人並須依格依令施行閏月庚寅制河中節度使檢校太師兼中書令安重誨可太子太師致仕是日重誨男崇緒等潛歸河中崇緒原本作宗諸今從通鑑改正又下文兼言崇贊崇緒疑此處有脫文考冊府元龜所引薛史亦作崇緒等今仍其舊影庫本粘籤以右散騎常侍張文寶為兵部侍郎夔州節度使安崇阮棄城歸闕待罪於閤門詔釋之時董璋寇峽內諸州崇阮望風遁走壬辰陝州節度使李從璋移鎮河中癸丑升廬州為昭順軍甲午以衡州刺史姚彥章為昭順軍節度使丁酉安重誨奏男崇贊崇緒等到州臣已拘送赴闕崇緒至陝州詔令下獄己亥詔安重誨宜削奪在身官爵並妻阿張男崇贊崇緒等並賜死案五代春秋作五月誅安重誨歐陽史作閏五月丁酉與薛史異舊五代史考異其餘親不問壬寅以尚書左丞崔居儉為工部尚書以吏部侍郎王權為尚書左丞丙午以隨駕馬軍都指揮使宣州節度使安從進為陝州節度使丁未以前中書舍人楊凝式為左散騎常侍戊申以右龍武統軍王景戡為新州節度使己酉以右領軍上將軍李肅為左金吾大將軍壬子以隨駕步軍都指揮使藥彥稠為邠州節度使癸丑以邠州節度使劉行琮卒廢朝贈太傅詔有司及天下州縣於律令格式六典中錄本局公事書於廳壁令其遵行六月丁巳朔復置明法科同開元禮乙丑以皇子左衞大將軍從珂依前檢校太傅加同平章事行京兆尹充西都留守庚午以邠州節度使張溫為右龍武統軍甲戌以魏徵八代孫韶為安定縣主簿乙亥以鎮州節度使宋王從厚為興唐尹以石敬瑭為河陽天雄軍節度使以天雄軍節度使石敬班為河陽節度使以天雄軍節度使石敬班為河陽節度使與上文複互疑有舛錯考冊府元龜所引薛史與永樂大典同今姑仍其舊附識于此影庫本粘籤依前六軍諸衞副使丙子詔諸道觀察使均補苗稅將有力人戶出剩田苗補貧下不迨頃畝有嗣者排改檢括有嗣原本作有祠今從五代會要改正影庫本粘籤自今年起為定額乙卯定州節度使李從敏移鎮州節度使盧質為滄州節度使庚辰皇孫太子舍人重美授司勳員外郎重真已下六人並授同正將軍及檢校官壬午以前秦州節度使李德珫為定州節度使兼北面行營副招討使太原地震詔天下州府斷獄先於案牘之上坐所該律令格式及新勅然後區分乙酉以前黔州節度使楊漢賓為羽林統軍案原本作漢章考上文有雲州節度使楊漢章不應黔州節度使與之同名今據通鑑改正舊五代史考異詔止絕諸射係省店宅莊園秋七月庚寅以權侍衞馬軍都指揮使登州刺史張從實為壽州節度使兼侍衞步軍都指揮使壬辰福建王延鈞上言當境廟七所乞封王號敕無諸史傳有名宜封為閩越富義王其餘任自於境內祭享乙未詔諸道奏薦州縣官使相先許一年薦三人今許薦五人不帶使相先許薦二人今許薦三人直屬京防禦團練使先許薦一人今許薦二人詔應州縣官內有曾在朝行及曾佐幕府罷任後準前資朝官賓從例處分其帶省銜幷內供奉𩹉行及諸色出選門者或降授令錄罷任日並依出選門例處分便與除官更不在赴常調州縣官其間書得十六考者準格加朝散階亦準出選門例處分三司奏先許百姓造麴不來官場收買伏恐課額不逮請復已前麴法鄉戶與在城條法一例指揮仍據已造到麴納官量支還麥本從之甲辰前晉州節度使朱漢賓授太子少保致仕庚戌大理正劇可久責授登州司戶刑部員外郎裴選責授衞尉寺丞刑部侍郎李光序判大理卿事任贊各降一官罰一季俸坐斷罪失入也八月丙寅詔天下州府商稅務並委逐處差人依省司年額勾當納官以故鎮州節度使趙王王鎔男昭誨為朝議大夫司農少卿賜紫金魚袋繼絕也辛丑升虔州為昭信軍癸亥以太常少卿盧文紀為祕書監以祕書監馬縞為太子賓客左監門上將軍羅周敬為右領軍上將軍前懷州刺史婁繼英為左監門上將軍乙丑詔大理寺官員宜同臺省官例升進法直官比禮直官任使仍於諸道贓罰錢內每月支錢一百貫文賜刑部大理兩司其刑部於所賜錢三分與一分丙寅以武平軍節度使馬希振依前檢校太尉兼侍中充虔州昭信軍節度使詔百官職吏應選授外官者考滿日並委本州申奏追還本司依舊執行公事己巳太傅致仕王建立太子少保致仕朱漢賓皆上章求歸鄉里詔內外致仕官凡要出入不在拘束之限辛未以翰林學士兵部侍郎劉昫守本官充端明殿學士以左拾遺直樞密院李崧充樞密直學士壬申以左龍武統軍李承約為潞州節度使統軍原本作統車承約原本作丞約今從薛史列傳改正影庫本粘籤癸酉詔文武百官五日內殿起居仍舊其輪次轉對宜停若有封事許非時上表朔望入閤待制候對一依舊制乙亥翰林學士工部侍郎竇夢徵卒丁丑以前西京副留守梁文矩為兵部尚書己卯詔不得薦銀青階為州縣官壬午詔應有朝臣藩侯郡守凡欲營葬未曾封贈許追封贈禮部尚書致仕李德休卒九月丙戌以前兗州節度使符彥超為左龍武統軍己亥懷化軍節度使東丹慕華賜姓名李贊華改封隴西縣開國公應有先配諸軍契丹並賜姓名詔天下營田務只許耕無主荒田及召浮客不得留占屬縣編戶辛丑樞密使檢校太傅刑部尚書范延光加同平章事使如故壬寅以中書舍人封翹為禮部侍郎禮部侍郎盧澹為戶部侍郎癸卯許州節度使李從溫移鎮河東詔天下州縣官不得與部內富民於公廳同坐辛亥詔五坊見在鷹隼之類並可就山林解放案歐陽史作丁亥通鑑從薛史舊五代史考異今後不許進獻冬十月戊午以前北京留守太原尹馮贇為許州節度使辛酉左補闕李詳上疏以北京地震多日請遣使臣往彼慰撫察問疾苦祭祀山川從之先是太原留後密奏無敢言者及詳有是奏帝甚嘉之改賜章服丙寅詔應在朝臣僚藩侯郡守準例合得追贈者新授命後便於所司投狀旋與施行封妻蔭子準格合得者亦與施行外官曾任朝班據在朝品秩格例合得封贈封者並與施行其補蔭據資蔭合得者先受官者先與收補後受官者據月日次第施行從之十一月甲申朔日有蝕之己丑日南至帝御文明殿受賀丁酉以翰林學士起居郎張礪為兵部員外郎知制誥充職以汝州防禦使張希崇為靈州兩使留後庚子以左威衞上將軍華溫琪為華州節度使福州節度使王延鈞奏誅建州節度使王延稟及其子繼雄壬寅詔今後諸道兩使判官罷任一年與比擬書記支使防禦團練判官二年推巡軍事判官並三年後與比擬仍每遇除授量與改轉官資或階勳職次云以御史中丞劉贊為刑部侍郎以鳳州節度使孫岳充西面閣道使壬子鄆州奏黃河暴漲漂溺四千餘戶癸丑以給事中崔衍為御史中丞十二月甲寅朔詔開鐵禁許百姓自鑄農器什器之屬於秋夏田畝上每畝輸農器錢一文五分乙卯畋於西郊丁巳以彰武軍節度使劉訓卒廢朝庚午以前利州節度使康思立為陝州節度使秦州地震丁丑詔三司所過西川兵士家屬常令贍給永樂大典卷七千一百六十五
