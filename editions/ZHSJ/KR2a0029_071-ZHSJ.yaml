body:
  text: 舊五代史卷七十一唐書四十七列傳第二十三馬郁其先范陽人案尹洙河南集韓重華誌銘作燕客馬彧韓琦安陽集重修五代祖塋域記亦作幕吏馬彧考宋人說部載韓定辭唱和詩俱作馬彧與薛史異惟雲谷雜記從通鑑作郁與薛史同舊五代史考異郁少警悟有俊才智數言辯縱橫下筆成文乾寧末為幽州府刀筆小吏李匡威為王鎔所殺鎔書報其弟匡儔匡儔遣使於鎔問謀亂本末幕客為書多不如旨郁時直記室即起草為之條列事狀云可疑者十詞理俊贍以此知名永樂大典卷三千三百九十四案太平廣記匡儔忿其兄之見殺即舉全師伐趙之東鄙將釋其憤氣而致十疑之書趙王遣記室張澤以事實答之其略曰營中將士或可追呼天上雷霆何人計會詞多不載孔本嘗聘王鎔於鎮州官妓有轉轉者美麗善歌舞因宴席郁累挑之幕客張澤亦以文章名謂郁曰子能座上成賦座上原本作產上今據文改正影庫本粘籤可以此妓奉酬案太平廣記作韓定辭請馬彧為賦與薛史異舊五代史考異郁抽筆操紙即時成賦擁妓而去永樂大典卷一萬四千八百二十八郁在武皇幕累官至檢校司空祕書監武皇與莊宗禮遇俱厚給賜優異監軍張承業本朝舊人權貴任事人士脅肩低首候之郁以滑稽侮狎其往如歸有時直造臥內每賓僚宴集承業出珍果陳列于前食之必盡案太平御覽引後唐書作陳列于前客無敢先嘗者當郁前者食之必盡舊五代史考異承業私戒主膳者曰他日馬監至唯以乾藕子置前而已郁至窺其不可啖異日鞾中出一鐵檛碎而食之承業大笑曰為公設異饌勿敗余食案其俊率如此冊府元龜卷八百五十五郁在莊宗幕寄寓他土年老思鄉每對莊宗欷歔言家在范陽乞骸歸國以葬舊山莊宗謂之曰自卿去國已來同舍孰在守光尚不能容父能容卿乎孤不惜卿行但卿不得死爾郁既無歸路衷懷嗚咽竟卒于太原冊府元龜卷九百五十三案馬郁傳永樂大典僅存二條今采冊府元龜以補其闕司空頲貝州人貝州人歐陽史作博陽今附識于此影庫本粘籤唐僖宗時舉進士不中屬天子播遷三輔大亂乃還鄉里羅紹威為節度副大使頲以所業干之幕客公乘億為延譽羅弘信署為府參軍辟館驛巡官張彥之亂命判官王正言草奏正言素不能文不能下筆彥怒詬曰鈍漢乃辱我推之下榻問孰可草奏者有言頲羅王時書記乃馳騎召之頲揮筆成文詆斥梁君臣彥甚喜以為判官及張彥復脅賀德倫降於唐德倫遣頲先奉狀太原案北夢瑣言載其狀詞云屈原哀郢本非怨望之人樂毅歸燕且異傾邪之行莊宗仍以頲為判官後以頲權軍府事頲有姪在梁遣家奴以書召之都虞候張裕擒其家奴以謂通于梁遂見殺永樂大典卷三千三百九十四案通鑑晉王責頲曰自吾得魏博庶事悉以委公公何得見欺如是獨不可先相示耶揖令歸第是日族誅于軍門舊五代史考異曹廷隱魏州人也為本州典謁虞候賀德倫使西迎莊宗於晉陽莊宗既得鄴城擢為馬步都虞候以其稱職自是遷拜日隆天成初除齊州防禦使下車嚴整頗有清白之譽時有孔目吏范弼者為人剛愎視廷隱蔑如也弼監軍廩鬻空乏以取貲鬻空乏以取貲原本疑有舛誤冊府元龜所引薛史與永樂大典同今無可復考姑仍其舊影庫本粘籤又私貨官鹽廷隱按之遂奏其事弼家人訴於執政並下御史府劾之弼雖伏法廷隱以所奏不實亦流永州續勅賜自盡時人寃之永樂大典卷四千二百十三蕭希甫宋州人也少舉進士為梁開封尹袁象先書記象先為青州節度使以希甫為巡官希甫不樂乃棄其母妻變姓名亡之鎮州自稱青州掌書記進謁王鎔鎔以希甫為參軍尤不樂居歲餘又亡之易州削髮為僧居百丈山莊宗將建國置百官李紹宏薦為魏州推官同光初有詔定內宴儀問希甫樞密使得坐否希甫以為不可樞密使張居翰聞之怒謂希甫曰老夫歷事三朝天子見內宴數百子本田舍兒安知宮禁事希甫不能對初莊宗欲以希甫知制誥宰相豆盧革等附居翰共排斥之以為駕部郎中希甫失志尤怏怏莊宗滅梁室遣希甫宣慰青齊希甫始知其母已死妻袁氏亦改嫁希甫乃發哀服喪居于魏州人有引漢李陵書以譏之曰老母終堂生妻去室天成初欲召為諫議豆盧革韋說沮之明宗卒以希甫為諫議大夫復為匭函使其後革說為安重誨所惡希甫希旨誣奏革縱田客殺人而說與隣人爭井井有寶貨有司推勘井中惟破釜而已破釜原本作破斧今從歐陽史改正影庫本粘籤革說卒皆貶死希甫拜左散騎常侍躁進尤甚引告變人李筠夜扣內門通變書云修堤兵士欲取郊天日舉火為叛安重誨不信之斬告變者軍人訴屈請希甫啖之既而詔曰左散騎常侍集賢殿學士判院事蕭希甫身處班行職非警察輒引凶狂之輩上陳誣骫之詞逼近郊禋扇搖軍衆李筠既當誅戮希甫寧免謫遷可貶嵐州司戶參軍仍馳驛發遣長興中卒于貶所子士明仕周終于邑宰永樂大典卷五千二百二十五藥縱之太原人少為儒明宗刺代州署為軍事衙推從明宗鎮邢州為掌書記歷天平宣武兩鎮節度副使明宗鎮常山被病不從及即位縱之見于洛邑安重誨怒其觀望久無所授明宗曰德勝用兵時德勝原本作得勝考薛史梁唐帝紀皆作德勝今改正影庫本粘籤縱之饑寒相伴不離我左右今有天下何人不富貴何為獨棄縱之浹旬授磁州刺史歲餘自戶部侍郎遷吏部侍郎銓綜之法惘然莫知長興初為曹州刺史清泰元年九月以疾受代而卒永樂大典卷二萬一千六百十七賈馥故鎮州節度使王鎔判官也家聚書三千卷手自刊校張文禮殺王鎔時莊宗未即尊位文禮遣馥至鄴都勸進因留鄴下棲遲郵舍莊宗即位授鴻臚少卿後以鴻臚卿致仕復歸鎮州結茅於別墅自課兒孫耕牧為事馥初累為鎮冀屬邑令所蒞有能政性恬澹與物無競乃鎮州士人之秀者也永樂大典卷一萬一千七百十四馬縞少嗜學儒以明經及第登拔萃之科仕梁為太常修撰累歷尚書郎參知禮院事遷太常少卿梁代諸王納嬪公主下嫁皆於宮殿門庭行揖讓之禮縞以為非禮上疏止之物議以為然永樂大典卷二萬二千六百五案以下有闕文殿本長興四年為戶部侍郎縞時年已八十及為國子祭酒八十餘矣案馬縞傳原本殘闕歐陽史云卒年八十贈兵部尚書據薛史縞為國子祭酒已八十餘矣與歐陽史異又直齋書錄解題云中華古今注後唐太學博士馬縞撰考歐陽史雜傳亦不載馬縞為太學博士舊五代史考異形氣不衰冊府元龜卷七百八十四于事多遺忘言元稹不應進士以父元魯山名進故也多如此類又上疏古者無嫂叔服文皇創意以兄弟之親不宜無服乃議服小功今令文省服制條為兄弟之妻大功不知何人議改而置於令文諸博士駮云律令國之大經馬縞知禮院時不曾論定今遽上疏駮令式罪人也冊府元龜卷九百五十四案馬縞傳原本殘闕今僅存梗概羅貫不知何許人進士及第累歷臺省官自禮部員外郎為河南令貫為人強直正身奉法不避權豪時宦官伶人用事凡請託於貫者其書盈閤一無所報皆以示郭崇韜因奏其事由是左右每言貫之失先是梁時張全義專制京畿河南洛陽僚佐皆由其門下事全義如廝僕及貫授命持本朝事體奉全義稍慢部民為府司庇護者必奏正之全義怒因令女使告劉皇后從容白於莊宗宦官又言其短莊宗深怒之會莊宗幸壽安山陵壽安原本作壽奄考五代會要貞簡太后陵名壽安今改正影庫本粘籤道路泥濘莊宗訪其主者宦官曰屬河南縣促令召貫至奏曰臣初不奉命請詰稟命者帝曰卿之所部反問他人何也命下府獄府吏榜笞促令伏款翌日傳詔殺之郭崇韜奏曰貫別無贓狀橋道不修法未當死莊宗怒曰母后靈駕將發天子車輿往來橋道不修是誰之過也崇韜奏曰貫縱有死罪俟款狀上奏所司議讞以朝典行之死當未晚今以萬乘之尊怒一縣令俾天下人言陛下使法不公矣莊宗曰既卿所愛任卿裁決因投袂入宮崇韜從而論列莊宗自闔殿門不得入即令伏法曝屍於府門寃痛之聲聞於遠邇永樂大典卷五千六百七十八淳于晏案以下有闕文以明經登第自霍彥威為小校晏寄食于門下彥威嘗因兵敗獨脫其身左右莫有從者惟晏杖劍從之徒步草莽自是彥威高其義相得甚歡及歷數鎮皆為從事軍府之事至于私門事無巨細皆取決于晏雖為幕賓有若家宰爾後公侯門客往往效之時謂之效淳故彥威所至稱治由晏之力也張格字承之故宰相濬之子也濬為梁祖所忌潛遣人害於長水格易姓名流轉入蜀案舊唐書張濬傳云永寧縣吏葉彥者張氏待之素厚告格曰相公之禍不可免郎君宜自為計濬曰留則併命去或可免冀存後嗣格拜辭而去葉彥率義士三十人送渡漢江而旋格由荊江上峽入蜀王建僭號以格為宰相格所生母當濬之遇害潛匿於民間落髮為尼流浪於函洛王建聞之潛使人迎之入蜀賜紫加號慈福大師及建卒蜀人以格為山陵使格有難色未幾得罪出為茂州刺史偽制責詞云送往辭命不忠也喪母匿喪非孝也王衍嗣偽位後數年復用為宰相同光末蜀平格至洛陽案舊唐書云任圜攜格還洛格感葉彥之惠訪之身已歿厚卹其家又考張濬第三子仕吳改名李儼見九國志授太子賓客任圜愛其才奏為三司副使尋卒於位格有文章明吏事時頗稱之永樂大典卷六千三百五十許寂字閑閑祖祕名聞會稽寂少有山水之好汎覽經史窮三式三式疑有舛誤考冊府元龜亦作三式今姑仍其舊附識於此影庫本粘籤尤明易象案太平廣記云寂學易于晉徵君舊五代史考異久棲四明山不干時譽昭宗聞其名徵赴闕召對於內殿會昭宗方與伶人調品篳篥事訖方命坐賜果問易義既退寂謂人曰君淫在聲不在政矣寂聞君人者將昭德塞違以臨照百官百官或象之今不厭賤事自求其工君道替矣尋請還山寓居於江陵以茹芝絕粒自適其性天祐末節度使趙匡凝昆季深禮遇之師授保養之道唐末除諫官不起漢南謂之徵君梁攻襄陽匡凝兄弟棄鎮奔蜀寂偕行歲餘蜀主王建待以師禮位至蜀相同光末平蜀與王衍俱從于東授工部尚書致仕卜居于洛時寂已年高精彩猶健沖漠寡言時蜀語云可怪可怪人莫知其際清泰三年六月卒時年八十餘子孫位至省郎同光時以方術著者又有僧誠惠永樂大典卷一萬六百二十五誠惠係許寂附傳永樂大典割截分載今仍為連綴以仍其舊影庫本粘籤誠惠初於五臺山出家能修戒律稱通皮骨肉三命人初歸向聲名漸遠四方供饋不遠千里而至者衆矣自云能役使毒龍可致風雨其徒號曰降龍大師京師旱莊宗迎至洛下親拜之六宮參禮士庶瞻仰謂朝夕可致甘澤禱祝數旬略無徵應或謂官以祈雨無驗將加焚燎誠惠懼而遁去及卒賜號法雨大師塔曰慈雲之塔永樂大典卷九百二十五周玄豹者周玄豹錦繡萬花谷作崔玄豹係傳寫之訛考歐陽史通鑑俱作周今仍其舊影庫本粘籤本燕人世為從事玄豹少為僧其師有知人之鑒從遊十年餘苦辛無憚師知其可教遂以袁許之術授之大略狀人形貌比諸龜魚禽獸目視臆斷咸造其理及還鄉遂歸俗初盧程寄褐遊燕與同志二人謁焉玄豹謂鄉人張殷袞曰適二君子明年花發俱為故人唯彼道士佗年甚貴至來歲二子果卒又二十年盧程登庸於鄴下玄豹歸晉陽張承業信重之言事數中承業俾明宗易衣列於諸校之下以佗人詐之而玄豹指明宗於末綴言曰骨法非內衙太保歟案以上疑有脫誤北夢瑣言作骨法非常此為內衙太保乎咸伏其異或問明宗之福壽惟云末後為鎮州節度使時明宗為內衙都校纔兼州牧而已昭懿皇后夏氏方侍巾櫛偶忤旨大為明宗檟楚玄豹見之曰此人有藩侯夫人之位當生貴子明宗赫怒因解後其言果驗太原判官司馬揆謁玄豹謂揆曰公五日之中奉使萬里未見迴期揆數日後因酒酣為衣領扼之而卒莊宗署玄豹北京巡官明宗即位之明年一日謂侍臣曰方士周玄豹昔曾言朕諸事有徵可詔北京津置赴闕趙鳳奏曰袁許之事玄豹所長者以陛下貴不可言今既驗矣餘無可問若詔赴闕下則奔競之徒爭問吉凶恐近於妖惑乃止令以金帛厚賜之授光祿卿致仕尋卒於太原年八十餘永樂大典卷八千九百九十七
