body:
  text: 舊五代史卷十九梁書十九列傳第九氏叔琮尉氏人也唐中和末應募為騎軍初隸於龐師古為伍長叔琮壯勇沈毅膽力過人太祖討巢蔡於陳許間叔琮奮擊首出諸校太祖壯之自行伍間擢為後院馬軍都將時東伐徐鄆多歷年所叔琮身當矢石奮不顧命觀者許焉累遷為指揮使尋奏授宿州刺史檢校右僕射太祖伐襄陽叔琮失利案舊唐書光化元年七月汴將氏叔琮陷趙匡凝之隨唐鄧等州考薛史康懷英傳云從氏叔琮伐襄漢懷英以一軍攻下鄧州趙匡凝傳云太祖遣氏叔琮伐之匡凝懼乞盟是役也實以勝歸而薛史言其失利疑別有據歐陽史作攻襄陽戰數敗因薛史原文而增益其辭與舊唐書異降為陽翟鎮遏使尋又捍禦晉軍於洹水有功遷曹州刺史天復元年春領大軍攻拔澤潞叔琮遂引兵北掠太原師還除晉州節度使明年太祖屯軍於岐下晉軍潛襲絳州前軍不利晉軍恃勝攻臨汾叔琮嚴設備禦乃於軍中選壯士二人深目虬鬚貌如沙陀者令就襄陵縣牧馬於道間案原本作襄陽今據歐陽史改正舊五代史考異蕃寇見之不疑二人因雜其行間俄而伺隙各擒一人而來晉軍大驚且疑有伏兵遂退據蒲縣時太祖遣朱友寧將兵數萬赴應悉委叔琮節制既至諸將皆欲休軍叔琮曰若然則賊必遁矣遁則何功焉因夜出潛師截其歸路遇晉軍遊騎數百盡殺之遂攻其壘拔之斬獲萬餘衆奪馬三百匹太祖聞之喜謂左右曰殺蕃賊破太原非氏老不可叔琮乃長驅收汾州與晉人轉戰直抵幷壘軍迴以其功奏加檢校司空自後累年晉軍不敢侵軼叔琮養士愛民甚有能政天復三年為鄜州留後尋真領保大軍節度使檢校司徒及昭宗東遷徵為右龍虎統軍以衞洛陽天祐元年八月與朱友恭同受太祖密旨弒昭宗於大內既而責以軍政不理貶白州司戶案舊唐書哀帝紀叔琮貶貝州司戶歐陽史作流嶺南不言其地考當時賜叔琮等死其勅云謫掾遐方安能塞責若貝州近在河北不得云遐方也當從薛史作白州為是尋賜自盡叔琮將死呼曰賣我性命欲塞天下之謗其如神理何乾化二年詔許歸葬永樂大典卷一萬八千一百二十六朱友恭壽春人本姓李名彥威角事太祖性穎利善體太祖意太祖憐之因畜為己子賜姓初名克讓後改之案通鑑云友恭幼為全忠家僮全忠養以為子時初建左長劍都以友恭董之從太祖四征稍立軍功累遷諸軍都指揮使檢校左僕射乾寧中授汝州刺史加檢校司空光化初淮夷侵鄂渚武昌帥杜洪來乞師太祖遣友恭將兵萬餘濟江應援引兵至龍沙九江而還軍聲大振時淮寇據黃州友恭攻陷其壁獲賊將瞿章俘斬萬計途經安陸因襲殺刺史武瑜盡收其衆以功為潁州刺史加檢校司徒天復中為武寧軍留後天祐初昭宗東遷洛邑徵拜左龍虎統軍以衞宮闕尋與氏叔琮同受太祖密旨弒昭宗於洛陽宮既而太祖自河中至責以慢於軍政貶崖州司戶案北夢瑣言云朱全忠以朱友諒氏叔琮扇動軍情請誅朱友諒氏叔琮以成濟之罪歸之友諒臨刑訴天曰天若有知他日亦當如我後全忠即位為子友珪所弒竟如其言考歐陽史通鑑俱作友恭而北夢瑣言作友諒殊誤仍復其本姓名與氏叔琮同日賜死永樂大典卷二千三十一王重師潁州長社人也案歐史潁州作許州材力兼人沈嘿大度臨事有權變劍矟之妙冠絕於一時唐中和末蔡寇陷許昌重師脫身而來太祖異其狀貌乃隸於拔山都案原本作技山歐陽史作拔山當時軍旅皆以都名如黑雲都銀鎗都效節都橫衝都之類今從歐陽史改正幷增入都字舊五代史考異拔山都原本作技山歐陽史作拔山考當時軍旅以都名者如黑雲都銀槍都則取衣服器用為號如效節都橫衝都則取古人嘉名為號拔山都當是取史記拔山蓋世之義原本疑有脫誤今從歐陽史改正影庫本粘籤每於軍前効用頗出儕類文德中令董左右長劍軍太祖伐上蔡重師力戰有功及討兗鄆擢為指揮使奏授檢校右僕射重師枕戈擐甲五六年於齊魯間凡經百餘戰由是威震敵人尋授檢校司空為潁州刺史乾寧中太祖攻濮州縱兵壞其墉濮人因屯火塞其壞壘煙焰亙空人莫敢越重師方苦金瘡臥於軍次諸將或勉之乃躍起命壯士悉取軍中罽投水中擲於火上重師然後率精銳持短兵突入諸軍踵之濮州乃陷重師為劍槊所傷身被八九創丁壯荷之還營且將斃矣太祖驚惜尤甚曰雖得濮壘而失重師奈何亟命以奇藥療之彌月始愈尋知平盧軍留後加檢校司徒其後北伐幽滄鎮定屢與晉軍接戰頗得士心故多勝捷天祐中授雍州節度使加同平章事數年治戎卹民頗有威惠開平中為劉捍所搆太祖深疑之然未有以發其事案通鑑佑國軍節度使王重師鎮長安數年帝怒其貢奉不時召重師入朝是重師之得罪由貢奉不時與薛史異無何擅遣裨將張君練縱兵深入邠鳳君練敗北太祖聞之怒其專擅因追而斬之永樂大典卷一萬八千一百二十六案通鑑不載張君練縱兵之事惟云劉捍至長安王重師不為禮捍譖之帝曰重師潛與邠岐通甲申貶溪州刺史尋賜自盡夷其族此傳未經詳載據劉知俊傳太祖云王重師得罪劉捍悞予事也與通鑑合此傳不載蓋史家前後省文朱珍徐州豐縣雍鳳里人也太祖初起兵珍與龐師古許唐李暉丁會氏叔琮鄧季筠王武等八十餘人以中涓從摧堅陷陣所向盪決及太祖鎮汴兼領招討使署珍為宣武右職以總腹心於是簡練軍伍裁制綱紀平巢破蔡多珍之力也始尚讓以驍騎五千人至繁臺珍與龐師古齊奉國等擊退之及黃巢敗珍與幷帥李克用追至寃句而還尋從太祖以汴宋𩗗之師入西華破王夏寨勇冠軍鋒以功加秩光啟元年署諸軍都指揮使始為上將於是軍焦夷敗蔡師鐵林三千人盡俘其將復西至汝鄭南過陳潁繚宋𩗗滑濮間與蔡賊交戰鏖伏襲殺不知其數會滑州節度使安師儒戎政不治太祖命珍與李唐賓率步騎以經略之始入境遇大雪令軍士無得休息一夕馳至壁下百梯並升遂乘其墉滑州平滑州下原本衍刺史二字今據文刪去影庫本粘籤時太祖方謀濟師乃遣珍往淄州募兵行次任縣東面都統齊克讓伏兵於孫師陂以邀珍珍大破之進軍至牙山都虞候張仁遇白珍曰軍有不齊者當先斬本都將後以狀聞願許之珍怒其專乃斬仁遇以徇軍由是諸將感懼兵至乾封與淄人戰於白草口敗之青人以步騎二萬列三寨于金嶺驛珍與戰連破之殲其師盡獲軍器戎馬是夕攻博昌大獲兵衆其後破盧瑭張晊及朱瑄朱瑾之衆平定曹濮未嘗不在戰中梁山之役始與李唐賓不協珍在軍嘗私迎其室於汴而不先請太祖疑之案通鑑作全忠怒追還其妻殺守門者舊五代史考異案通鑑云全忠怒追還其妻殺守門者使親吏蔣玄暉召珍以唐賓代總其衆館驛巡官敬翔曰朱珍未可輕取恐其猜懼生變全忠懼使人追止之與薛史異孔本密令唐賓察之二將不相下因而交諍唐賓夜斬關還汴以訴珍亦棄軍單騎而至太祖兩惜之故不罪俾還於師復以踏白騎士入陳亳間以邀蔡人遂南至斤溝破淮西石璠之師二萬據璠以獻珍旋師自亳北趣靜戎濟舟于滑破黎陽臨河李固三鎮軍於內黃敗樂從訓萬餘人案通鑑考異云珍往救從訓而云敗從訓誤也舊五代史考異案通鑑作樂從訓來告急遣都指揮使朱珍等分兵救從訓與此傳異殿本分命聶金范居實略澶州與魏師遇於臨黃魏軍有豹子軍二千人戮之無噍類威振河朔復攻淮西至蔡夾河而寨敗賊將蕭皓之衆皆擁於河溺死之進軍蔡州營其西南既破羊馬垣遇雨班師珍以兵援劉瓚赴楚州至襄山南遇徐戎扼其路珍乃攻豐下之時溥乃以全師會戰於豐南吳康里珍乃收豐破其三萬餘衆及蔡賊平珍比諸將功居多龍紀初與諸將屯於蕭縣以禦時溥珍慮太祖自至令諸軍葺馬廄以候巡撫李唐賓之裨將嚴郊獨慢焉軍候范權恃珍以督之唐賓素與珍不協果怒乃見以訴其事珍亦怒曰唐賓無禮遂拔劍斬之珍命騎列狀陳其事太祖初聞唐賓之死驚駭與敬翔謀詐令有司收捕唐賓妻子下獄以安珍心太祖遂徑往蕭縣距蕭一舍珍率將校迎謁梁祖令武士執之責其專殺命丁會行戮案歐陽史作珍自縊死都將霍存等數十人叩頭以救太祖怒以坐床擲之乃退永樂大典卷二千三十一李思安陳留張亭里人也初事汴將楊彥洪為騎士好拳勇未弱冠長七尺超然有乘時自奮之意唐中和三年太祖鎮汴嘗大閱戎旅覩其材甚偉之因錫名思安字貞臣思安善飛矟所向披靡每從太祖征伐常馳馬出敵陣之後測其厚薄而還或敵人有恃猛自衒者多命取之必鷹揚卷擒馘於萬衆之中出入自若如蹈無人之地太祖甚惜之命副王虔裕為踏白將時巢蔡合從太祖每遣偵邏必率先獨往巢敗走思安領所部百餘人追賊殺戮掩奪衆莫敢當尋領軍襲蔡寇於鄭都將李唐賓馬躓而墜思安援槊刺追者唐賓復其騎而還又嘗與蔡人鬬當陣生擒賊將柳行實其後渡長淮下天長高郵二邑又拒孫儒迫濠州皆有奇績累遷為諸軍都指揮使奏官至檢校左僕射尋拜亳州刺史練兵禦寇邊境肅然思安為性勇悍每統戎臨敵不大勝必大敗開平元年春率兵伐幽州營於桑乾河擄獲甚衆燕人大懼及軍迴率諸軍伐潞累月不克師人多逸太祖怒甚詔疏其罪盡奪其官爵委本郡以民戶係焉踰歲起之復令領兵亦無巨績可紀太祖嘗因命將授鉞謂左右曰李思安當敵果敢無出其右者然每遇藩方擇材吾將用之則敗聞必至如是者二三矣則知飛將數奇前史豈虛言哉乾化元年秋又以為相州刺史思安自謂當擁旄仗鉞及是殊不快意但日循晏安無意為政及太祖北征以候騎之誤落然無所具而復壁壘荒圮帑廩空竭太祖怒貶柳州司戶尋賜死於相州永樂大典卷一萬三百八十八案通鑑乾化元年九月丙午至相州刺史李思安不意帝猝至落然無具坐削官爵二年正月丁卯帝至獲嘉追思李思安去歲供饋有闕貶柳州司戶尋長流思安于崖州賜死據薛史則思安賜死即在相州未嘗至貶所與通鑑異鄧季筠宋州下邑人也少入黃巢軍隸於太祖麾下及太祖鎮汴首署為牙將主騎軍伐鄆之役生擒排陣將劉矯以獻唐大順初唐帝命丞相張濬伐太原太祖奉詔出師西至高平與晉人接戰軍既不利季筠為晉人所擒克用見之甚喜釋縛待以賓禮俄典戎事季筠在幷門凡四稔案通鑑考異引唐餘錄謂季筠與李存孝並賜死蓋傳聞之誤景福二年晉軍攻邢臺季筠領偏師預其役將及邢邢人陣於郊兩軍酣戰之際季筠出陣飛馬來歸太祖大加奬歎賞賚甚厚時初置廳子都最為親軍命季筠主之旋改統親騎又遷將中軍天祐三年奏授登州刺史下車稱理登州舊無羅城及季筠至郡率丁壯以築之民甚安之因相與立碑以頌其績太祖受禪改鄭州刺史尋主兵於河中為都指揮使時幷人寇平陽季筠接戰於洪洞大克拜華州防禦使又繼領龍驤等諸軍騎士累官至檢校司空栢鄉之役季筠臨陣前却太祖亦未之罪乾化二年春太祖親伐鎮定駐於相州因閱馬怒其馬瘦與魏博軍校何令稠陳令勳同斬於纛下永樂大典卷一萬八千一百二十六黃文靖金鄉人少附於黃巢黨中巢敗歸於太祖累署牙職繼遷諸軍指揮使從太祖南平巢蔡北定兗鄆皆有功唐大順中佐葛從周送朱崇節入潞會晉軍十餘萬近逼垣寨文靖慮孤軍難守乃與葛從周啟闉出師文靖為殿命矢刃皆外向持重而還晉人不敢逼其年冬與康懷英渡淮入壽春之境下安豐霍丘至光州光州原本作先州今據十國春秋改正影庫本粘籤而還光化初晉將李嗣昭周德威寇於山東文靖佐葛從周統大軍禦之至沙河敗晉軍五千餘騎遂逐之越張公橋乃止後旬日復與晉人戰於邢州之北擒蕃將賁金鐵慕容藤李存建等百餘人奪馬數千匹尋以功表授檢校左僕射耀州刺史天祐二年春命佐楊師厚深入淮甸越壽春侵廬江軍至大獨山遇淮夷殺五千餘衆振旅而還改蔡州刺史加檢校司空又遷潁州刺史太祖受禪復為蔡州刺史入為左神武統軍又改左龍驤使乾化元年從太祖北征因閱馬得罪命斬之文靖驍果善戰諸將皆惜之永樂大典卷一萬八千一百二十六胡規兗州人初事朱瑾為中軍都校兗州平署為宣武軍都虞候佐葛從周伐鎮定從張存敬收晉絳皆有功署為河中都虞候榷鹽務天復中太祖迎駕在岐下以規權知洽州昭宗還長安詔授皇城使及東遷以為御營使駕至洛授內園莊宅使天祐三年佐李周彝討相州獨當州之一面頗以功聞軍還權知耀州事明年討滄州為諸軍壕寨使太祖受禪除右羽林統軍尋佐劉鄩統兵收潼關擒劉知浣獻之乃以為右龍虎統軍兼侍衞指揮使乾化元年詔修洛河堤堰軍士因之斬伐百姓園林太甚河南尹張宗奭奏之規得罪賜死永樂大典卷一萬八千一百二十七李讜河中臨晉人少時遊秦雍間為人勇悍多力甚有氣誼唐廣明初黃巢陷長安讜遂得仕於其間巢以讜為內樞密使案新唐書黃巢傳及通鑑皆言巢以費傳古為樞密使不載李讜疑與傳古先後授偽官也蓋讜曾委質於宦者出入於宮禁間巢以此用焉其後巢軍既敗讜乃束身歸於太祖署為左德勝騎軍都將從太祖討蔡賊頗立軍功及東伐兗鄆以所部士伍俘獲甚衆改元從騎將表授檢校右僕射郴王友裕領兵攻澤州時太祖駐大軍於盟津乃令讜將兵越太行授以籌謀讜頗違節度久而無功案唐書李存孝傳云李讜收軍而遁存孝擊至馬牢川俘斬萬計此傳不載蓋前後省文太祖遣追還廷責其罪戮之於河橋永樂大典一萬三百八十八李重胤案重胤原本作重裔蓋薛史沿避諱舊例今改畫一宋州下邑人狀貌雄武初在黃巢黨中推為剛鷙唐中和四年五月同尚讓李讜等率衆至繁臺與太祖之軍相拒及巢寇漸衰乃率衆來降太祖素識之拔用不次署為先鋒步軍都頭與胡真援河陽逼懷州重胤以部下兵突之射中蕃將安休休又令與李讜率騎軍至陝應接郭言迴次澠池破賊帥黃花子之衆改滑州夾馬指揮使蔡賊圍汴重胤以步兵攻下三寨擄獲甚多太祖大舉伐宗權俾重胤以滑兵為先鋒及東討徐州下豐蕭二邑轉右廂馬步軍指揮使大順元年秋從郴王友裕收澤州與晉軍戰於馬牢川王師敗績迴守河陽太祖謂諸將曰李讜重胤違我節度不能立功頗辜任使於是與李讜於是與李讜原本脫與字今據文增入影庫本粘籤並戮於河橋永樂大典卷一萬三百八十八范居實絳州翼城人事太祖初為隊將從討巢蔡有功又從朱珍收滑州改左廂都虞候預破兗鄆功遷感義都頭鄭州馬軍指揮使幽州劉仁恭舉衆南下寇魏郡北闉居實與葛從周葛從周原本脫從字今據文增入影庫本粘籤張存敬率兵救魏大破幽滄之衆於內黃太祖迎昭宗於岐下以居實為河中馬軍都指揮使及昭宗還京賜迎鑾毅勇功臣遙領錦州刺史又遷左龍驤馬軍都指揮使從征淮南迴改登州刺史轉左神勇軍使開平元年用軍於潞州命居實統軍以解澤州之圍授耀州刺史令以郡兵屯固鎮尋除澤州刺史居實拳勇善戰頗立軍功在郡以戎備不理詔追赴闕暴其翫寇之罪而斬之永樂大典卷一萬六千五百十七史臣曰叔琮而下咸以鷹犬之才適遇雲龍之會勤勞王室踐履將壇然俱不得其死豈不惜哉得非鳥盡弓藏理當如是耶將梁祖之雄猜無漢高之大度歟乃知自古帝王能保全功臣者唯光武一人而已矣語曰弒父與君亦不從也而叔琮友恭從之何也既為盜跖所嗾豈免成濟之誅臨終之言益彰其醜也永樂大典卷一萬六千五百十七
