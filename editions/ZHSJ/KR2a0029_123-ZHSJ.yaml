body:
  text: 后常諫止之言甚切直世宗亦為之動容洎車駕駐於淮甸久冒炎暑后因憂恚成疾顯德二年七月二十一日崩於滋德殿時年二十有六世宗甚悼之既而有司上諡曰宣懿葬于新鄭陵曰懿陵永樂大典卷八千九百八十九案世宗後符后即宣懿之女弟也薛史不為立傳未免闕略五代史補世宗皇后符氏即魏王彥卿之女時有相工視之大驚密告魏王曰此女貴不可言李守貞素有異志因與子崇訓娶之禮畢守貞甚有喜色其後據河中叛高祖為樞密使受命出征后知高祖與其父有舊城破之際據堂門而坐叱諸軍曰我符魏王女也魏王與樞密太尉兄弟之不若汝等慎勿無禮於是諸軍聳然引退頃之高祖至喜曰此女於白刃紛拏之際保全可謂非常人也乃歸之魏王至世宗即位納為皇后既免河中之難其母欲使出家資其褔壽后不悅曰死生有命誰能髡首跣足以求苟活也母度不可逼遂止世宗素以后賢又聞命不以出家為念愈賢之所以為天下母也史臣曰周室后妃凡六人而追冊者四故中闈內則罕得而聞唯董妃符后之懿範亦無愧於彤管矣永樂大典卷八千九百八十九又案薛史無外戚傳考五代會要云周太祖第三女樂安公主為漢室所害廣順元年二月追封至顯德四年四月又追封莒國長公主第四女壽安公主降張永德廣順元年四月封至顯德元年封晉國長公主第五女永寧公主廣順元年九月追封至顯德四年四月又追封梁國長公主舊五代史考異
