body:
  text: 舊五代史卷六梁書六太祖紀第六開平四年十月乙亥東京博王友文入覲召之也册府元龜卷二百六十八己卯以新修天驥院開宴落成內外并獻馬而魏博進絹四萬匹為駔價册府元龜卷一百九十七壬午以冬設禁軍幸興安鞠場召文武百官宴册府元龜卷一百九十七幸開化大閲軍實册府元龜卷二百十四十一月丁亥朔幸廣王第作樂册府元龜卷二百五幸廣王第原本幸作辛今據文改正影庫本粘籤辛卯宴文武四品已上於宣威殿庚戌幸左龍虎軍宴羣臣甲寅幸右龍虎軍宴羣臣册府元龜卷一百九十七戊戌詔曰自朔至今暴風未息諒惟不德致此咎徵皇天動威罔敢不懼宜遍命祈禱副朕意焉差官分往祠所止風永樂大典卷二千六百三十二己亥日南至帝被衮冕御朝元殿列細仗奏樂於庭羣臣稱賀册府元龜卷一百九十七帝畋於伊水册府元龜卷二百五乙巳詔曰關防者所以譏異服察異言也况天下未息兵民多姦改形易衣覘我戎事比者有諜皆以詐敗而未嘗罪所過地叛將逃卒竊其妻孥而影附使者亦未嘗詰其所經今海內未同而緩法弛禁非所以息姦詐止奔亡也應在京諸司不得擅給公驗如有出外須執憑繇者其司門過所先須經中書門下點檢宜委宰臣趙光逢專判出給俾繇顯重冀絶姦源仍下兩京河陽及六軍諸衛御史臺各加鈐轄公私行李復不得帶挾家口向西其襄鄧鄜延等道並同處分册府元龜卷一百九十一鄜延原本作鹿延今據文改正影庫本粘籤以寧國軍節度使王景仁充北面行營都招討使潞州副招討使韓勍為副相州刺史李思安為先鋒使案原本訛湘州今據通鑑改正舊五代史考異時鎮州王鎔定州王處直叛結連晉人故遣將討之册府元龜卷二百十六案五代會要十一月十四日司天奏月蝕不宜用兵時王景仁方總大軍北伐追之不及至五年正月二日果為後唐莊宗大敗于柏鄉舊五代史考異十二月辛酉宴文武四品已上於宣威殿親閲禁軍命格鬬於教馬亭册府元龜卷二百十四己巳詔曰滑宋輝亳等州水潦敗傷人戶愁嘆朕為民父母良用痛心其令本州分等級賑貸所在長吏監臨周給務令存濟壬辰賑貸東都畿內如宋滑制册府元龜卷一百九十五乾化元年正月丙戌朔日有蝕之帝素服避殿百官守司以恭天事明復而止永樂大典卷二千六百三十二制曰兩漢以來日蝕地震百官各上封事指陳得失蓋欲周知時病盡達物情用緝國章以奉天誡朕每思逆耳罔忌觸鱗將洽政經庶開言路况茲謫見當有咎徵其在列辟羣臣危言正諫極萬邦之利害致六合之殷昌毗豫一人永建皇極永樂大典卷一萬六千三百七十八二日日旁有祲氣向背若環耳案原本訛環爾今據五代會要改正舊五代史考異崇政使敬翔望之曰兵可憂矣帝為之旰食是日果為晉軍及鎮定之師所敗都將十餘人被擒餘衆奔潰永樂大典卷九千三百二十四庚寅制曰扈氏不恭固難去戰鬼方未服尚或勞師其蟻聚餘妖狐鳴醜類棄天常而拒命據地險以偷生言事討除將期戡定問罪止誅於元惡挺災可憫於遺黎每念傷痍良深愧歎應天兵所至之地宜令將帥節級嚴戒軍伍不得焚燒廬舍開發丘壠毀廢農桑驅掠士女使其背叛之俗知豫弔伐之心又制曰戎機方切國用未殷養兵須藉於賦租稅粟尚煩於力役所在長吏不得因緣徵發自務貪求苟有故違必行重典立法垂制詳刑定科傳之無窮守而勿失中書門下所奏新定格式律令已頒下中外各委所在長吏切務遵行盡革煩苛皆除枉濫用副哀矜之旨無違欽恤之言册府元龜卷一百九十一詔徵陝州鎮國軍節度使楊師厚至京見於崇勳殿帝指授方略依前充北面都招討使恩賚甚厚使督軍進發册府元龜卷一百九十九案五代春秋二月晉師侵魏州楊師厚帥師援邢州晉人還師二月丙辰朔帝御文明殿羣臣入閣册府元龜卷一百九十七以蔡州順化軍指揮使王存儼權知軍州事蔡人久習叛逆刺史張慎思又裒斂無狀帝追慎思至京而久未命代右廂指揮使劉行琮乘虛作亂行琮原本作行蹤今據通鑑改正影庫本粘籤因縱火驅擁為渡淮計存儼誅行琮而撫遏其衆都將鄭遵與其下奉存儼為主而以衆情馳奏時東京留守博王友文不先請遂討其亂兵至鄢陵上聞之曰誅行琮功也然存儼方懼若臨之以兵蔡必速飛矣遂馳使還軍而擢授存儼蔡人安之册府元龜卷二百十四壬戌詔曰東京舊邦久不巡幸宜以今月九日幸東都扈從文武官委中書門下量間劇處分宰臣上言曰龍興天府久望法駕但陛下始康愈未宜涉寒願少留清蹕從之案五代會要二月敕食人之食者憂人之事况丞相尊位參決大政而堂封未給且無餐錢朕甚愧之宜令日食萬錢之半舊五代史考異甲子幸曜村民舍閲農事庚午幸白馬坡册府元龜卷二百五詔金吾大將軍待制官各奏事册府元龜卷一百九十一武安軍節度使馬殷進呈虔州刺史盧延昌箋表虔州本支郡也兵甚鋭自得韶州益強大升為百勝軍使始洪州之陷盧光稠願收復使府立功自效上因兼授江西觀察留後光稠卒復命延昌領州事方伯亦頗慰薦楊渭遣人偽署爵秩延昌佯受官牒禮遣其使因湖南自表其事曰郡小寇迫欲緩其姦謀且開導貢路非敢二也以其偽制來自陳案原本偽訛為今改正舊五代史考異上覽奏曰我方有北事不可不甚加撫恤尋兼授鎮南將軍節度使觀察留後命使慰勞册府元龜卷二百十五案九國志盧延昌歸命于吳偽乞命于梁舊五代史考異三月辛卯以久旱令宰臣分禱靈迹翌日大澍雨永樂大典卷一千五百二十一丙申幸甘水亭召宰臣翰林學士尚書侍郎孔續已下八人扈從宴樂甚歡戊戌幸右龍虎軍召文武官四品已上宴於新殿甲辰幸左龍虎軍新殿宴文武官四品已上四月丁卯幸龍虎門召宰臣學士金吾上將軍大將軍侍宴廣化寺丁丑幸宣威殿宴文武官四品已上及軍使蕃客己卯又幸左龍虎軍宴羣臣册府元龜卷一百九十七詔曰邠岐未滅關隴多虞宜擇親賢總茲戎任應關西同雍華鄜延夏等六道兵馬並委冀王收管指揮凡有抽差先申西面都招討使仍別奏聞庶合機權以寧邊鄙册府元龜卷二百六十九五月甲申朔帝被冕旒御朝元殿視朝仗衛如式制改開平五年為乾化元年大赦天下永樂大典卷五千一百四十九詔方伯州牧近未加恩者並遷爵秩復大賚軍旅普宴於宣威殿賜帛各有差册府元龜卷一百九十七制封延州節度使高萬興為渤海郡王册府元龜卷一百九十六諸道節度使錢鏐張宗奭馬殷王審知劉隱各賜一子六品正員官高季昌賜一子八品正員官賀德倫賜一子九品正員官册府元龜卷二百一十癸巳觀稼於伊水登建春門幸會節坊張宗奭私第臨亭皋視物色賞賜甚厚册府元龜卷二百五詔左右銀臺門朝參諸司使庫使已下不得帶從人入城親王許一二人執條床手簡餘悉止門外闌入者抵律閽守不禁與所犯同先時門通內無門籍且多勳戚車騎衆者尤不敢呵察至是有以客星凌犯上言者遂令止隔册府元龜卷一百九十一清海軍節度使守侍中兼中書令劉隱薨案劉隱卒五代會要五代春秋俱作五月惟通鑑作三月與薛史異舊五代史考異輟朝三日百僚詣閣門奉慰六月乙卯命北面都招討使鎮國軍節度使楊師厚出屯邢洺丁巳鎮定鈔我湯陰案原本作蕩陰今從通鑑及歐陽史改正舊五代史考異詔曰常山背義易水效尤誘其蕃戎動我邊鄙南侵相魏東出邢洺是用遣將徂征為人除害但初頒赦令不欲食言宥而伐之諒非獲已況聞謀始不自帥臣致此厲階並由姦佞密通人使潛結沙既懼罪誅乃生離叛今雖行討伐已舉師徒亦開詔諭之門不阻歸降之路矧又王鎔處直未曾削爵除名若翻然改圖不遠而復必仍舊貫當保前功如有率衆向明拔州效順亦行殊賞冀徇來情免令受斃於疲民用示惟新於污俗宜令行營都招討使及陳暉軍前準此敕文散加招諭將安衆懼特舉明恩鎮州只罪李弘規一人其餘一切不問册府元龜卷二百十五詔修天宮佛寺又湖南奏潭州僧法思桂州僧歸真並乞賜紫衣從之册府元龜卷一百九十四七月帝不豫稍厭秋暑自辛丑幸會節坊張宗奭私第宰臣視事於歸仁亭子崇政使內諸司及翰林院並止於河南令廨署至甲辰復歸大內册府元龜卷二百五八月庚申幸保寧殿閲天興控鶴兵事軍使將校各有賜册府元龜卷二百十四癸亥老人星見册府元龜卷二百二戊辰幸故上陽宮至於榆林觀稼册府元龜卷二百五丙子閲四蕃將軍屯衛兵士於天津橋南至龍門廣化寺册府元龜卷二百十四戊寅幸興安鞠場大教閲帝自指麾無不踴抃坐作進退聲振宮掖右神武統軍丁審衢對御右神武統軍原本右作立今據通鑑改正影庫本粘籤以紅帛囊劍擬乘輿物帝曰宿將也恕之以劉重霸代其任册府元龜卷二百九九月辛巳朔帝御文明殿羣臣入閣刑法待制官各奏事己丑宴羣臣於興安殿册府元龜卷一百九十七庚子親御六師次於河陽甲辰至於衛州乙巳至於宜溝幸民劉達墅丙午至相州賞左親騎指揮使張仙右雲騎指揮使宋鐸嘗身先陷陳各賜帛册府元龜卷二百一十十月辛亥朔駐蹕於相州相州原本作湘州今據歐陽史改正影庫本粘籤宰臣洎文武從官並詣行宮起居戶部郎中孔昌序齎留都百官冬朔起居表至自西京諸道節度使刺史諸藩府留後各以冬朔起居表來上制以郢王友圭充控鶴指揮使諸軍都虞候閻寶為御營使册府元龜卷二百五有司以立冬太廟薦享上言詔丞相杜曉赴西都攝祭行事册府元龜卷一百八十九癸丑閲武於州闉之南樓册府元龜卷二百十四左龍驤都教練使鄧季筠魏博馬軍都指揮使何令稠右廂馬軍都指揮使陳令勳以部下馬瘦並腰斬於軍門通鑑注引薛史甲寅將以其夕幸魏縣命閣門使李郁報宰臣案原本李郁下衍寶今據列傳刪正舊五代史考異兼敕內外是夜車駕發軔於都署乙卯次洹水丙辰至魏縣册府元龜卷二百五先鋒將黃文靖伏誅通鑑注引薛史己未帝御朝元門以回鶻吐蕃二大國首領入覲故也案己未歐陽史作乙未舊五代史考異癸亥令諸軍指揮使及四蕃將軍賜食於行宮之外廡册府元龜卷一百九十七戊辰幸邑西之白龍潭以觀魚焉既而漁人獲巨魚以獻帝命放之中流從臣以帝有仁惻之心皆相顧欣然是日名其潭曰萬歲潭永樂大典卷一千六百十二丙子帝御城東教場閲兵諸軍都指揮北面招討使太尉楊師厚總領鐵馬步甲十萬廣亘十數里陳焉士卒之雄鋭部隊之嚴肅旌旗之雜戈甲之照耀屹若山嶽勢動天地帝甚悅焉即命丞相洎文武從臣列侍賜食逮晚方歸册府元龜卷二百十四十一月辛巳朔上駐蹕魏縣從官自丞相而下並詣行宮起居留都文武百官及諸道節度使防禦使刺史諸藩府留後各奉表起居壬午帝以邊事稍息宣命還京師案通鑑帝以夾寨柏鄉屢失利故力疾北巡思一雪其恥意鬱鬱多躁忿功臣宿將往往以小過被誅衆心益懼既而晉趙兵不出十一月壬午帝南還舊五代史考異車駕發自行闕夕次洹水縣癸未至內黃縣甲申至黎陽縣乙酉命從官丞相而下宴於行次丁亥次衛州戊子晨次新鄉夕止獲嘉己丑次武陟庚寅次溫縣册府元龜卷二百五延州節度使高萬興奏當軍都指揮使高萬金統領兵士今月五日收鹽州偽刺史高行存泥首來降丞相及文武百官各上表稱賀册府元龜卷四百三十五辛卯次孟州命散騎常侍孫騭右諫議大夫張衍光祿卿李翼各齎香合祝版告祭於孟津之望祠册府元龜卷一百九十三留都文武官左僕射楊涉洎孟州守李周彝等皆匍匐東郊迎拜其文武官並令先還壬辰詰旦離孟州晚至都册府元龜卷二百五宣宰臣各赴望祠禱雨望祠原本作望詞今據文改正影庫本粘籤故事皆以兩省無功職事為之帝憂民重農尤以足食足兵為念爰自御極每愆陽積陰多命丞相躬其事辛丑大雨雪宰臣及文武師長各奉表賀焉十二月詔以時雪稍愆命丞相及三省官各詣望祠祈禱永樂大典卷二千六百三十二癸酉臘假詔諸王與河南尹左右金吾六統軍等較獵於近苑册府元龜卷二百五命大理卿王鄯使於安南左散騎常侍吳藹使於朗州皆以旌節官誥錫之也又命將作少監薑宏道為朗州旌節官告使副册府元龜卷二百十三案五代會要舊制巡撫黜陟册命弔贈入蕃等使選朝臣為之其宣慰加官送旌節即以中官為之今以三品送旌節新例也舊五代史考異延州節度使高萬興奏領軍於邠州界蒿子谷韋家寨殺戮寧慶兩州賊軍約二千餘人並生擒都頭指揮使及奪馬器甲等事其入奏軍將使宣召赴內殿賜對以銀器綵物錫之宰臣及文武官各奉表賀是月魏博節度上言於涇縣北戮殺鎮州王鎔兵士七千餘人奪馬二千餘匹戈甲未知其數並擒都將以下四十餘人册府元龜卷四百三十五兩浙進大方茶二萬斤琢畫宮衣五百副廣州貢犀象奇珍及金銀等其估數千萬安南兩使留後曲美案通鑑十二月戊午以靜海留後曲美為節度使舊五代史考異進筒中蕉五百匹龍腦鬱金各五瓶他海貨等有差又進南蠻通好金器六物銀器十二並乾綾花繓越等雜織奇巧者各三十件福建進戶部所支榷課葛三萬五千匹册府元龜卷一百九十七
