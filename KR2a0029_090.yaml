body:
  text: 舊五代史卷九十晉書十六列傳第五趙在禮字幹臣涿州人也曾祖景裕祖士廉皆不仕父元德盧臺軍使在禮始事燕帥劉仁恭為小校唐光化末仁恭遣其子守文逐浮陽節度使盧彥威據其城升在禮為軍使以佐守文及守文死事其子延祚為守光所害守光子繼威復為部將張萬進所殺在禮遂事萬進萬進奔梁在禮乃與滄州留後毛璋歸太原同光末為效節指揮使屯於貝州會軍士皇甫暉等作亂推指揮使楊晸為帥按歐陽史作楊仁晟晸不從為衆所害攜晸首以脅在禮在禮知其不可拒遂從之以四年二月六日引衆入鄴在禮自稱留後案宋史張錫傳趙在禮舉兵于鄴瀕河諸州多搆亂錫權知棣州事即出省錢賞軍皆大悅一郡獨全棣人賴之舊五代史考異唐莊宗遣明宗率師討之會城下軍亂在禮迎明宗入城事具唐書天成元年五月授滑州節度使檢校太保制下在禮密奏軍情未欲除移且乞更伺少頃尋就改天雄軍兵馬留後鄴都留守興唐尹既而在禮將皇甫暉趙進等相次除郡赴任案歐陽史皇甫暉傳明宗即位暉自軍卒擢拜陳州刺史九國志趙進傳天成初除貝州刺史鄴都衙內指揮使舊五代史考異在禮乃上表乞移旌節十二月授滄州節度使二年七月移鎮兗州長興元年入為左驍衛上將軍俄改同州節度使會高祖受明宗命統大軍伐蜀以在禮充西川行營步軍都指揮使收劍州而還四年移鎮襄州清泰三年授宋州節度使加檢校太尉同平章事高祖登極移鎮鄆州加檢校太師兼侍中封衛國公天福六年七月授許州節度使八年四月移鎮徐州進封楚國公開運元年以契丹為患少帝議北征八月朔降制命一十五將以在禮為北面行營馬步都虞候十一月改行營副都統都虞候如故受詔屯澶州再除兗州節度使依前副都統三年正月授晉昌軍節度使時少帝為其子延煦娶在禮女為妻禮會之日其儀甚盛京師以為榮觀五月進封秦國公纍食邑至一萬三千戶實封一千五百戶在禮歷十餘鎮善治生殖貨積財巨萬兩京及所蒞藩鎮皆邸店羅列在宋州日值天下飛蝗為害在禮使比戶張幡幟鳴鼙鼓蝗皆越境而去人亦服其智焉凡聚斂所得唯以奉權豪崇釋氏而已及契丹入汴自鎮赴闕時契丹首領奚王拽剌等在洛下在禮望塵致敬首領等倨受其禮加之凌辱邀索貨財在禮不勝其憤行至鄭州泊於逆旅聞同州劉繼勳為契丹所鎖大驚丁未歲正月二十五日夜以衣帶就馬櫪自絞而卒年六十六案歐陽史作六十二漢高祖即位贈中書令在禮凡四子雖歷內職皆早卒孫延勳仕皇朝歷嶽蜀二州刺史永樂大典卷一萬八千一百三十五代史補趙在禮之在宋州也所為不法百姓苦之一旦下制移鎮永興百姓欣然相賀曰此人若去可為眼中拔釘子何快哉在禮聞之怒欲報拔釘之謗遽上表更求宋州一年時朝廷姑息勳臣詔許之在禮於是命吏籍管內戶口不論主客每歲一千納之於家號曰拔釘錢莫不公行督責有不如約則加之鞭朴雖租賦之不若也是歲獲錢百萬馬全節字大雅魏郡元城人也父文操本府軍校官至檢校尚書左僕射以全節之貴纍贈太師全節少從軍旅同光末為捉生指揮使趙在禮之據魏州也為鄴都馬步軍都指揮使唐明宗即位授檢校司空歷博單二州刺史天成三年賜竭忠建策興復功臣移刺郢州長興初就加檢校司徒在郡有政聲俄授河西節度使時明宗命高祖伐蜀師次岐山全節赴任及之具軍容謁於轅門高祖以地理隔越乃奏還焉移沂州刺史清泰初為金州防禦使案歐陽史作明宗時為金州防禦使與薛史先後互異舊五代史考異會蜀軍攻其城州兵才及千人案歐陽史作州兵才數百舊五代史考異兵馬都監陳隱懼託以他事出城領二百人順流而逸賊既盛人情憂沮全節悉家財以給士復出奇拒戰以死繼之賊退朝廷嘉其功詔赴闕將議賞典時劉延朗為樞密副使邀其厚賄全節無以賂之謂全節曰絳州闕人請事行計全節不樂告其同輩由是衆口喧然以為不當皇子重美為河南尹聞而奏焉清泰帝召全節謂曰滄州乏帥欲命卿制置翼日授橫海軍兩使留後高祖即位加檢校太保正授旌節天福五年授檢校太傅移鎮安州時李金全據州叛引淮軍為援因命全節將兵討平之以功加檢校太尉改昭義軍節度澤潞遼沁等州觀察處置等使六年秋移鎮邢州加同中書門下平章事安重榮之叛也授鎮州行營副招討兼排陳使與重榮戰於宗城大敗之鎮州平加開府儀同三司充義武軍節度易定祁等州觀察處置北平軍等使八年秋丁母憂尋起復焉屬契丹侵寇加之蝗旱國家有所徵發全節朝受命而夕行治生餘財必充貢奉開運元年秋授鄴都留守檢校太師兼侍中廣晉尹幽州道行營馬步軍都虞候尋加天雄軍北面行營副招討使陽城之戰甚有力焉全節始拜鄴都以元城是桑梓之邑具白襴詣縣庭謁拜縣令沈遘逡巡避之不敢當禮全節曰父母之鄉自合致敬勿讓之也州里榮之二年授順國軍節度使未赴鎮卒年五十五贈中書令全節事母王氏至孝位歷方鎮溫凊面告畢盡其敬政事動與幕客謀議故鮮有敗事鎮中山日杜重威為恆州奏括境內民家粟時軍吏引重威例堅請行之全節曰邊民遇蝗旱而家食方困官司復擾之則不堪其命矣我為廉察安忍效尤百姓稱其德先是全節自上黨攜歌妓一人之中山館於外舍有人以讒言中之全節害之及詔除恆陽遇疾數見其妓厭之復來妓曰我已得請要公俱行全節具告家人數日而卒子令威歷隰陳懷三州刺史卒永樂大典卷一萬八千一百三十張筠海州人也父傳古世為郡之大商唐乾符末屬江淮俶擾遂徙家彭門時彭門連帥時溥為東南面招討使據有數郡之地擢筠為偏將纍有軍功奏授宿州刺史後溥與梁祖不協梁人進攻宿州下之獲筠以歸梁方圖霸業以筠言貌辨秀命為四鎮客將久之轉長直軍使梁革唐命遷右龍武統軍歷客省使宣徽使出為復商二州刺史復為宣徽使梁室割相衛為昭德軍案梁割相澶衛三州為昭德軍原本作相衛疑有脫誤命筠為兩使留後唐莊宗入魏筠委城南歸授右衛上將軍會雍州康懷英以病告詔筠往代之比至懷英已卒因除筠為永平軍節度使大安尹懷英在長安日家財甚厚筠盡奪之復於大內掘地繼獲金玉時有涇陽鎮將侯莫威案歐陽史作侯莫陳威前與溫韜同剽唐氏諸陵大貯瓌異之物筠乃殺威而籍其家遂蓄積巨萬然性好施每出遇貧民於路則給與口食衣物境內除省賦外未嘗聚斂遂致百姓不撓十年小康秦民懷惠呼為佛子同光中從郭崇韜為劍南安撫使蜀平歸洛權領河南尹俄鎮興元所治之地上下安之筠時有疾軍州官吏久不得見副使符彥琳等面請問疾筠又不諾彥琳等疑其已死慮左右有謀遂請權交牌印筠命左右收彥琳下獄以叛聞詔取彥琳等至洛釋而不問因授筠西京留守誘離興元及至長安守兵閉門不內筠東朝於洛詔遣歸第案歐陽史作以為左驍衛上將軍筠前為京兆尹奉詔殺僞蜀主王衍衍之妓樂寶貨悉私藏於家及罷歸之後第宅宏敞花竹深邃聲樂飲膳恣其所欲十年之內人謂地仙天福二年上表乞歸長安俄而洛下張從賓之亂筠獨免其難人咸謂筠有五福之具美焉是歲卒於家贈太子太師案歐陽史作贈少師弟籛永樂大典卷六千三百五十籛字慕彭少嗜酒無節為鄉里所鄙唐天復中兄筠為大梁四鎮客將籛自海州省兄兄薦於兗州連帥王瓚用為裨校籛性桀黠善事人纍遷軍職後唐莊宗都洛筠鎮長安自衙內指揮使授檢校司空右千牛衛將軍同正領饒州刺史西京管內三白渠營田制置使同光末筠隨魏王繼岌伐蜀奏籛權知西京留守事蜀平王衍挈族入朝至秦川驛莊宗遣中使向延嗣乘驛騎盡戮王衍之族所有奇貨盡歸於延嗣俄聞莊宗遇內難繼岌軍次興平籛乃斷咸陽浮橋繼岌浮渡至渭南死之一行金寶妓樂籛悉獲之俄而明宗使人誅延嗣延嗣暗遁案九國志明宗即位忿閹豎輩怙勢擅權先敕使四方及此遁不出者皆擒戮之死者殆盡舊五代史考異衍之行裝復為籛有因為富家積白金萬鎰藏於窟室明宗即位籛進王衍犀玉帶各二馬一百五十匹魏王打毬馬七十匹旋除沂州刺史入為西衛將軍高祖即位之明年加檢校太保出典密州未幾復居環衛時湖南馬希範與籛有舊奏朝廷請命籛為使允之籛密齎蜀之奇貨往售又獲十餘萬緡以歸籛出入以庖者十餘人從行食皆水陸之珍鮮厚自奉養無與為比少帝嗣位詔遣往西蕃及回以其馬劣為有司所糾復當路有不足者遂有詔徵其舊價籛上言請貨故京田業許之因憤惋成病而卒籛始在雍州因春景舒和出遊近郊憩於大冢之上忽有黃雀一銅錢置於前而去未幾復於衙院晝臥見二燕相鬬畢各一錢落於籛首前後所獲三錢嘗祕於巾箱識者以為大富之徵其後家雖厚積性實鄙吝未嘗與士大夫遊處及令市馬利在私門不省咎以輸其直鬱鬱致死愚之甚耶永樂大典卷六千三百五十華溫琪字德潤宋州下邑人也祖楚以農為業父敬忠後以溫琪貴官至檢校尚書溫琪長七尺餘唐廣明中從黃巢為紀綱巢陷長安僞署溫琪為供奉都知巢敗奔至滑臺以形貌魁岸懼不自容乃投白馬河下流俄而浮至淺處會行人救免又登桑自經枝折墜地不死夜至胙縣界有田父見溫琪非常人遂匿於家經歲餘會梁將朱友裕為濮州刺史召募勇士溫琪往依之友裕署為小校漸升為馬軍都將從友裕擊秦宗權於曹南有奏加檢校太子賓客梁祖擢為開道指揮使加檢校工部尚書出屯鄜畤會延州胡璋叛命來寇郡境溫琪擊退之尋奉詔營長安以功遷絳州刺史歲餘刺棣州溫琪以州城每年為河水所壞居人不堪其苦表請移於便地朝廷許之板築既畢賜立紀功碑仍加檢校尚書左僕射繼遷齊州晉州節度使溫琪在平陽日唐莊宗嘗引兵攻之踰月不下梁人賞之升晉州為定昌軍以溫琪為節度使加檢校太保既而溫琪臨民失政嘗掠人之妻為其夫所訴罷入為金吾大將軍時梁末帝方姑息諸侯重難其命故責詞云若便行峻典謂豫不念功勳若全廢舊章謂我不安黎庶為人君者不亦難乎溫琪大有愧色俄轉右監門衛上將軍右龍武統軍會河中朱友謙叛權授溫琪汝州防禦使河中行營排陳使尋為耀州觀察留後莊宗入洛溫琪來覲詔改耀州為順義軍復以溫琪鎮之加推忠向義功臣同光末西蜀既平命溫琪為秦州節度使明宗即位因入朝願留闕明宗嘉而許之除左驍衛上將軍逐月別賜錢粟以豐其家踰歲明宗謂樞密使安重誨曰溫琪舊人宜選一重鎮處之重誨奏以天下無闕他日又言之重誨素強愎對曰臣纍奏未有闕處可替者唯樞密院使而已明宗曰可重誨不能答溫琪聞其事懼為權臣所怒幾致成疾由是數月不出俄拜華州節度使依前光祿大夫檢校太傅進封平原郡開國公纍加食邑至三千戶溫琪至任以己俸補葺祠廟廨舍凡千餘間復於郵亭創待客之具華而且固往來稱之清泰中上表乞骸骨歸宋城制以太子少保致仕案歐史作以太子太保致仕卒贈太子太傅天福元年十二月終於家年七十五詔贈太子太保永樂大典卷一萬八千一百三十安崇阮字晉臣潞州上黨人也少倜儻有詞辨善騎射父文祐為牙門將唐光啓中潞州軍校劉廣逐節度使高潯據其城僖宗詔文祐平之既殺劉廣召赴行在授邛州刺史其後孟方立據邢洺率兵攻上黨朝廷以文祐本潞人也授昭義節度使令討方立自蜀至澤州與方立戰敗歿於陳昭宗朝宰臣崔魏公以文祐歿於王事薦崇阮於朝自是纍任諸衛將軍梁氏革命以崇阮明辨遣使吳越回以所獲庛芊悉充貢奉梁祖嘉之故每歲乘軺於江浙間及回貢獻皆如初梁末帝嗣位授客省使知齊州事時梁軍與莊宗對壘於河上冀王友謙以河中叛末帝使段凝領軍經略蒲晉詔崇阮監軍又知華雍軍府事期年授青州兵馬留後入為諸衛上將軍唐天成中授黔南節度使檢校太保尋移鎮夔州以蜀寇侵逼棄城歸闕改晉州節度使復為諸衛上將軍高祖登極之二年詔葬梁末帝以崇阮梁之舊臣令主葬事崇阮盡哀致禮以襄其事時人義之五年以老病請告授右衛上將軍致仕開運元年九月卒於西京贈太傅永樂大典卷一萬八千三百三十一楊彥詢字成章河中寶鼎人父規纍贈少師彥詢年十三事青帥王師範有書萬卷以彥詢聰悟使掌之及長益加親信常委監護郡兵及梁將楊師厚降下青州彥詢隨師範歸命洎師範見殺楊師厚領鄴召置麾下俾掌賓客唐莊宗入魏復事焉同光元年冬從平大梁升為引進副使將命西川及淮南稱旨纍遷內職明宗時為客省使檢校司徒使兩浙回授德州刺史末帝即位改羽林將軍時高祖鎮太原朝廷疑二以彥詢沉厚擇充北京副留守案歐史作太原節度副使清泰末以宋審虔為北京留守高祖深懷不足以情告彥詢彥詢恐高祖失臣節乃曰不知太原兵甲芻粟幾何可敵大國否請明公反覆慮之蓋欲回其意也高祖曰我不忿小人相代方寸決矣彥詢知其不可諫遂止左右欲害之高祖曰唯副使一人我自保明爾勿復言也及即位授齊州防禦使檢校太保旋改宣徽使從高祖入洛加左驍衛上將軍兼職天福二年秋出為鄧州節度使歲餘入為宣徽使四年使於契丹六年春授邢州節度使檢校太傅時鎮州安重榮有不臣之狀彥詢憂其窺伺會車駕幸鄴表求入覲高祖慮契丹怒安重榮之殺行人也移兵犯境復命彥詢使焉仍恐重榮要之由滄州路以入蕃戎王果怒重榮彥詢具言非高祖本意蓋如人家惡子無如之何尋聞重榮犯闕乃放還七年春授華州節度使檢校太尉在任二年屬部內蝗旱道殣相望彥詢以官粟假貸州民賴之存濟者甚衆開運初以風痺授右金吾衛上將軍俄卒於官年七十四贈太子太師永樂大典卷一萬八千一百三十李承約字德儉薊州人也曾祖瓊薊州別駕贈工部尚書祖安仁檀州刺史贈太子太保父君操平州刺史贈太子少師承約性剛健篤實少習武事弱冠為幽州牙門校遷山後八軍巡檢使屬劉守光囚殺父兄名儒宿將經事父兄者多無辜被戮自以握兵在外心不自安時屬唐武皇召募英豪方開霸業乃以所部二千歸於並州即補匡霸都指揮使檢校右僕射兼領貝州刺史從夾寨及與梁人戰於臨清有功再遷洺汾二州莊宗即位授檢校司空慈州刺史為治平直移授潁州團練使天成中以邠州節度使毛璋將圖不軌乃命為涇州節度副使且承密旨往偵之既至以善言諭之璋乃受代明宗賞其能加檢校太保拜黔南節度使數年之間巴邛蠻蛋不敢犯境外勸農桑內興學校凶邪盡去民皆感之故父老數輩重趼詣闕言其政化又聽留周歲徵為左衛上將軍自左龍武統軍加特進檢校太傅充昭義軍節度使賜推忠奉節翊戴功臣歲餘歸朝復為左龍武統軍高祖御宇之二年授左驍衛上將軍進封開國公纍上表請老尋以病卒時年七十五贈太子太師永樂大典卷二萬四百二十陸思鐸澶州臨黃人父再端贈光祿卿思鐸有武幹梁太祖領四鎮隸於麾下及即位授廣武都指揮使歷突陳拱辰軍使積前後戰勳纍官至檢校司徒拱辰左廂都指揮使遙領恩州刺史初梁軍與莊宗對壘於河上思鐸以善射日預其戰嘗於箭笴之上自鏤其姓名一日射中莊宗之馬鞍莊宗拔箭視之覩思鐸姓名因而記之及莊宗平梁思鐸隨衆來降莊宗出箭以視之思鐸伏地待罪莊宗慰而釋之尋授龍武右廂都指揮使加檢校太保天成中為深州刺史改雄捷右廂馬軍都指揮使會南伐荊門思鐸亦預其行時高季興以舟兵拒王師思鐸每發矢中敵則洞胸達掖由是賊鋒稍挫不敢輕進諸軍咸壯之高祖革命拜陳州刺史秩滿歷左神武羽林二統軍出為蔡州刺史遇代歸朝天福八年以疾卒時年五十四思鐸典陳郡日甚有惠政常戒諸子曰我死則藏骨於宛丘使我棲魂於所治之地及卒乃葬於陳從其志也永樂大典卷一萬八千一百三十一安元信朔州馬邑人也少善騎射後唐莊宗為晉王時元信詣軍門求自效尋隸明宗麾下纍從明宗征討有功明宗即立擢為捧聖軍使加檢校兵部尚書清泰三年遷雄義都指揮使受詔屯於代州太守張朗遇之甚厚元信亦以兄事之是歲五月高祖建義於太原俄聞契丹有約赴難元信入說朗曰張敬達雖圍太原而兵尚未合代郡當鴈門之衝敵至其何以禦僕觀石令公素長者舉必成事若使人道意歸款俟其兩端亦求全之上策也朗不納元信悔以誠言之反相猜忌尋聞安重榮安審信相次以騎兵赴太原元信遂率部曲以歸高祖案通鑑云元信謀殺朗不克帥其衆奔審信審信遂帥麾下數百騎與元信掠百井奔晉陽舊五代史考異高祖見之喜謂元信曰爾覩何利害背強歸弱元信曰某非知星識氣唯以人事斷之夫帝王者出語行令示人以信嘗聞主上許令公河東一生今遽改之是自欺也且令公國之密親親尚不能保肯保天下之心乎以斯而言見其亡也何得為強也高祖知其誠因開懷納之委以戎事高祖即位之元年授耀州團練使加檢校太保四年入為右神武統軍其年八月復出牧洺州少帝嗣位尋遷宿州九年罷任來朝開運初授復州防禦使三年卒於任年六十三贈太傅永樂大典卷一萬八千一百三十一張朗徐州蕭縣人父楚贈工部尚書朗年十八善射膂力過人鄉里敬憚之梁祖聞其名就補蕭縣鎮使充吾縣都案吾縣二字疑有舛誤遊奕使時朗年才二十三歲餘補宣武軍內衙都將歷洺州步軍曹州開武汴州十內衙鄆州都指揮使梁末從招討使段凝襲衛州下之遂授衛州刺史事梁僅三十年凡有征討無不預之同光三年從魏王繼岌伐蜀為先鋒橋道使明宗朝歷興忠登三州刺史清泰初以契丹犯邊補西北面行營步軍都指揮使從高祖屯軍於代北俄兼代州刺史又改行營諸軍馬步都虞候高祖建義於太原遣使以書諭之朗曰為人臣而有二心可乎乃斬其使案通鑑云帝以晉安已降遣使諭諸州代州刺史張朗斬其使蓋晉祖初起安元信勸朗歸順不從至是復斬其使也舊五代史考異洎高祖入洛領全師朝覲授貝州防禦使在任數載天福五年除左羽林統軍六年授光祿大夫檢校太傅慶州刺史在官二年卒年七十四永樂大典卷六千三百五十李德珫應州金城人祖晟父宗元皆為邊將德珫少善騎射事後唐武皇為偏校及從莊宗戰潞州柏鄉德勝渡繼有軍功纍加檢校尚書左僕射遙食郡俸天成中檢校司空領蔚州刺史長興元年授雄武軍節度秦成階觀察處置等使加檢校司徒二年六月移鎮定州充北面副招討使高祖即位改鎮涇原及受代歸闕會高祖幸鄴授東京留守加同平章事少帝嗣位移廣晉尹加檢校太師開運中再領涇州以病卒於鎮德珫幼與明宗俱事武皇故後之諸將多兄事之時謂之李七哥所治之地雖無殊政然以寬恕及物家無濫積亦武將之廉者永樂大典卷二萬四百二十田武字德偉大名元城人父簡纍贈右僕射武少有拳勇初事莊宗為小校歷遷勝節指揮使明宗登極轉帳前都指揮使領澶州刺史天成二年改左羽林都指揮使遙領宜州充襄州都巡檢使三年自汴州馬步軍都指揮使授曹州刺史長興初遷齊州防禦使又移洺州清泰中歷成隴二州充西面行軍副部署天福初授金州防禦使及金州建節鉞武丁母憂乃起復為節度使開運元年移鎮滄州兼北面行營右廂都指揮使二年授寧江軍節度使充侍衛步軍都指揮使歲內改昭義軍節度澤潞等州管內觀察處置等使潞州大都督府長史檢校太傅封鴈門郡開國公未赴任以疾卒武出身戎行性鯁正御軍治民咸盡其善及卒朝廷惜之詔贈太尉輟視朝一日子仁朗案宋史云仁朗以父任西頭供奉官舊五代史考異仁遇並歷內職永樂大典卷四千八百六李承福字德華漢陽人少寒賤事元行欽掌皂棧之役後為高祖家臣高祖登極歷皇城武德宣徽使左千牛將軍出為澶州刺史遷齊州防禦使檢校太保承福性鄙狹無器局好察人微事多所詆訐雖小過不能恕工商之業輿隸之情官吏之幸皆善知之然自任所見無所準的故人多薄之少帝嗣位授同州節度使尋卒於鎮少帝以高祖佐命之臣聞之嗟歎賻物加等輟視朝一日詔贈太傅永樂大典卷一萬三百八十九相里金字奉金案相里金墓碑作字國寶當得其實歐陽史雜傳多襲薛史原文與碑異並州人也性勇悍果敢能折節下士唐景福初武皇始置五院兵金首預其選從莊宗攻下夾寨得補為小校後與梁師戰於柏鄉及胡柳陂以功授黃甲指揮使同光中統帳前軍拔中都賜忠勇拱衛功臣檢校刑部尚書二年自羽林都虞候出為欣州刺史案歐陽史作沂州凡部曲私屬皆不令干預民事但優其贍給使分掌家事而已故郡民安之大有聲績應順元年為隴州防禦使會唐末帝起兵於鳳翔傳檄於鄰道諸侯無應者唯金遣判官薛文遇往來計事末帝深德之及即位擢為陝州節度使加檢校太保清泰三年夏高祖建義於太原唐末帝發兵來攻以金為太原四面步軍都指揮使高祖即位移鎮晉州及受代歸闕纍為諸衛上將軍加開府儀同三司官至檢校太尉爵列開國公案碑文云封西河郡開國侯薛史作開國公未知孰是歐陽史諸臣傳官爵多闕略無可考證勳登上柱國以久居散地優之故也天福五年夏卒於任贈太師永樂大典卷一萬三百四十一案碑文作贈太子太師與傳異考晉高祖紀五年八月相里金卒贈太師其贈與傳同而其卒在八月則傳中夏字疑誤史臣曰在禮之起甘陵也當鼎革之期會富貴來逼既因人成事亦何足自多及其仗鉞擁旄積財敗德貨之為纍可不誡乎全節之佐晉氏也平安陸之妖之妖原本作之禮今從夏文莊集所引薛史改正影庫本粘籤預宗城之戰功既茂矣貴亦宜然張筠歷事纍朝享茲介福蓋近代之幸人也自溫琪而下皆服冕乘軒苴茅燾土垂名汗簡諒亦宜焉永樂大典卷一萬三百四十一
