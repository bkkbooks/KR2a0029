body:
  text: 舊五代史卷十梁書十末帝紀下貞明六年春正月戊子以曹州刺史朱漢賓為安州宣威軍節度使以許州匡國軍節度觀察留後充散指揮都軍使檢校太傅王彥章為匡國軍節度使進封開國侯軍職如故二月癸丑宣州節度使錢傳璟案原本宣州訛作亘州今據十國春秋改正舊五代史考異起復依前檢校太傅同平章事宣州節度使以其丁內艱故也三月丁亥以前申州刺史張紹圭為大理卿夏四月己亥制曰王者愛育萬方慈養百姓恨不驅之仁壽撫以淳和而炎黃有戰伐之師堯舜有干戈之用諒不獲已其猶病諸然則去害除妖興兵動衆殺黑龍而濟中土刑白馬而誓諸侯終能永逸暫勞以至同文共軌古今無異方册具存朕以眇末之身託億兆之上四海未乂八年于茲業業兢兢日慎一日雖踰山越海肅慎方來而召雨徵風蚩尤尚在蚩字下原本脫尤字今據文增入影庫本粘籤顧茲殘孽勞我大邦將士久於戰征黎庶疲於力役木牛暫息則師人有乏爨之憂流馬盡行則丁壯有無聊之苦况青春告謝朱夏已臨妨我農時迫我戎事永言大計思致小康宜覃在宥之恩稍示殷憂之旨用兵之地賦役實煩不有蠲除何使存濟除兩京已放免外應宋亳輝潁鄆齊魏案原本脫魏字今據册府元龜增入舊五代史考異滑鄭濮沂密青登萊淄陳許均房襄鄧泌隨陝華雍晉絳懷汝商等三十二州應欠貞明四年終已前夏秋兩稅並鄆齊滑濮襄晉輝等七州兼欠貞明四年已前營田課利物色等並委租庸使逐州據其名額數目矜放所在官吏不停淹停制命徵督下民致恩澤不及於鄉閭租稅虛捐於帳籍其有私放遠年債負生利過倍自違格條所在州縣不在更與徵理之限兗州城內自張守進違背朝廷結連蕃寇久勞攻討頗困生靈言念傷殘尋加給復應天下見禁罪人如犯大辟合抵極刑者宜示好生特令減死除準格律常赦不原外徒流已下遞減一等除降官未經量移者與量移己量移者便與復資云庚子宗正卿朱守素上言請依前朝置匭院令諫議大夫專判從之乃以右諫議大夫鄭韜光充知匭使案原本知匭作知匱考通典唐三省官有知匭使今改正舊五代史考異乙巳以右僕射兼門下侍郎同平章事監修國史判度支開國公敬翔為弘文館大學士延資庫使諸道鹽鐵轉運等使餘如故以中書侍郎兼刑部尚書平章事集賢殿大學士判戶部事鄭王玉為監修國史判度支以中書侍郎平章事蕭頃為集賢殿大學士判戶部事以尚書左丞李琪為中書侍郎平章事丙午吏部侍郎趙光胤為尚書左丞己酉以河中護國軍節度副大使知節度事制置度支解縣池場等使開府儀同三司守太保兼中書令冀王友謙依前守太保兼中書令兼同州節度使餘如故癸丑鄜延節度使兼西面招討接應等使檢校太保兼中書令渤海郡王高萬興進封延安王賜號匡時定節功臣前衡州長史劉隲進所撰地理手鏡十卷己未以租庸判官尚書工部郎中張鋭為戶部郎中充崇政院學士辛酉以前吏部侍郎盧協為吏部侍郎五月乙丑故左衛上將軍齊奉國贈太傅詔曰應文武朝官或有替罷多年漂流在外者宜令中書門下量才除授勿使栖遲或有進士策名纍年未釋褐者與初任一官已釋褐者依前資用乙酉升宋州為大都督府其餘廢大都督府額六月遣兗州節度使劉鄩華州節度使尹皓崇州節度使溫昭圖莊宅使段凝領軍攻同州先是河中朱友謙襲陷同州節度使程全暉單騎奔京師案歐陽史本紀河中節度使朱友謙襲同州殺其節度程全暉據薛史則程全暉奔還京師未嘗見殺也歐陽史列傳仍同薛史五代春秋又作六年春事友謙以其子令德為同州留後表求節旄不允既而帝慮友謙怨望遂命兼鎮同州制命將下而友謙已叛遣使求援於晉故命將討之九月庚寅以供奉官郎公遠充契丹歡好使案遼史神册五年九月梁遣郎公遠來聘即是年事也遼史載神册元年梁遣郎公遠來賀薛史失載舊五代史考異案遼史神册五年九月己丑朔梁遣郎公遠來聘與薛史合又天贊二年四月梁遣使來聘即龍德三年也薛史不載孔本晉王遣都將李嗣昭李存審王建及率師來援同州戰于城下我師敗績諸將以餘衆退保華州羅文寨冬十月陳州妖賊毋乙董乙伏誅陳州里俗之人喜習左道依浮圖氏之教自立一宗號曰上乘不食葷茹誘化庸民揉雜淫穢宵聚晝散州縣因循遂致滋蔓時刺史惠王友能恃戚藩之寵動多不法故姦慝之徒望風影附毋乙數輩漸及千人攻掠鄉社長吏不能詰是歲秋其衆益盛南通淮夷朝廷纍發州兵討捕反為賊所敗陳潁蔡潁蔡原本訛作潁葵今據文改正影庫本粘籤三州大被其毒群賊乃立毋乙為天子其餘豪首各有樹置至是發禁軍及數郡兵合勢追擊賊潰生擒毋乙等首領八十餘人械送闕下並斬於都市龍德元年春正月癸巳詔諸道入奏判官宜令御史臺點檢合從正衙退後便於中書門下公參辭謝如有違越具名銜聞奏應面賜章服仍令閣門使取本官狀申中書門下受敕牒後方可結入新銜甲辰以河東道行營西面應接使前靜勝軍節度崇裕等州觀察處置等使特進檢校太尉同平章事溫昭圖為匡國軍節度陳許蔡等州觀察處置等使以北面行營副招討使匡國軍節度陳許蔡等州觀察處置等使光祿大夫檢校太傅王彥章為宣義軍節度副大使知節度事鄭滑濮等州觀察處置等使依前北面副招討使二月己未以權知靜勝軍節度觀度留後前汝州防禦使華溫琪為靜勝軍節度觀察留後案通鑑作貞明六年事與薛史繫龍德元年異舊五代史考異依前檢校太傅丙寅以荊南節度使檢校太師兼中書令渤海郡王高季昌季昌原本訛作杳昌今據十國春秋改正影庫本粘籤為守中書令依前荊南節度使庚午以晉州建寧軍節度觀察留後劉為晉州節度使檢校太保壬申史館上言伏見北齊文士魏收著後魏書于時自魏太武之初至于北齊書不獲就乃大徵百官家傳刊總斟酌隨條甄舉搜訪遺亡數年之間勒為一代典籍編在北史固非虛言臣今請明下制敕內外百官及前資士子帝戚勳家並各納家傳具述父祖事行源流及才術德業灼然可考者並纂述送史館如記得前朝會昌已後公私亦任抄録送官皆須直書不用文藻兼以兵火之後簡牘罕存應內外臣僚曾有奏行公事關涉制置或討論沿革或章疏文詞有可採者並許編録送納候史館修撰之日考其所上公事與中書門下文案事相符會或格言正辭詢訪不謬者並與編載所冀忠臣名士共流家國之耿光孝子順孫獲記祖先之丕烈而且周德見乎殷紀舜典存乎禹功非唯十世可知庶成一朝大典臣叨庸委任獲領監修將贖素餐輒干玄覽詔從之鹽鐵轉運使敬翔奏請於雍州河陽徐州三處重置場院稅茶從之己卯禮部尚書充西都副留守兼判尚書省事崔沂奏西京都省凡有公事奏聞常須借印施行伏請鑄尚書省分司印一面從之是月鎮州大將王德明殺其帥王鎔案五代春秋三月趙人張文禮弒其君鎔薛史及通鑑作二月舊五代史考異自稱留後遣使來求援宰臣敬翔請許之租庸使趙巖等以為不可乃止三月丁亥朔祠部員外郎李樞上言請禁天下私度僧尼及不許妄求師號紫衣如願出家受戒者皆須赴闕比試藝業施行願歸俗者一聽自便自便原本作自使今據文改正影庫本粘籤詔曰兩都左右街賜紫衣及師號僧委功德使具名聞奏今後有闕方得奏薦仍須道行精至夏臘高深方得補填每遇明聖節兩街各許官壇度七人諸道如要度僧亦仰就京官壇仍令祠部給牒今後只兩街置僧録道録僧正並廢己丑以前兵部郎中杜光乂為左諫議大夫致仕壬寅改襄州鄢縣為沿夏縣亳州焦夷縣為夷父縣密州漢諸縣為膠源縣從中書舍人馬縞請也夏四月陳州刺史惠王友能反案歐陽史作三月與薛史異舊五代史考異舉兵向闕帝命將出師逆擊敗之友能走保陳州詔張漢傑率兵進討案原本漢傑作衡傑今據通鑑改正舊五代史考異敕開封府太康襄邑雍丘三縣遭陳州賊軍奔衝其夏稅只據見苗輸納五月丙戌朔制曰朕聞惟辟動天惟聖時憲故君為善則天降之以福為不善則降之以災朕以眇末之身託於王公之上不能荷先帝艱難之運所以致蒼生塗炭之危兵革薦興災害仍集內省厥咎蓋由朕躬故北有犬戎猾夏之師西有蒲同亂常之旅連年戰伐積歲轉輸虔劉我士民侵據我郡邑師無宿飽之饋家無擔石之儲而又水潦為災蟲蝗作沴戒譴作於上怨咨聞於下而况骨肉之內竊弄干戈畿甸之中輒為陵暴但責躬而罪己敢怨天以尤人蓋朕無德以事上玄無功以及兆庶不便於時者未能去有益於民者未能行處事昧於酌中發令乖於至當招致災患引翼禍殃罪在朕躬不敢自赦夙夜是懼寢食靡寧將勵己以息災爰布澤而從欲今以薰風方扇方扇原本作方羽今據文改正影庫本粘籤旭日初升朔既視於正陽歷宜更於嘉號庶惟新之令敷華夏以同歡期克念之心與皇王而合道其貞明七年宜改為龍德元年應天下見禁罪人除大辟罪外遞減一等德音到後三日內疏理訖奏應欠貞明三年四年諸色殘欠五年六年夏稅殘稅並放侍衛親軍及諸道行營將士等第頒賜優賞已從別敕處分左降官與量移已經量移者與復資長流人各移近地已經移者許歸鄉里前資朝官寄寓遠方仰長吏津置赴闕內外文武常參官節度使留後刺史父母亡歿者並與封贈公私債負納利及一倍已上者不得利上生利先經陳歿將校各與追贈云以宣和庫使守右領衛將軍李嚴權知兗州軍州事丁亥詔曰郊禋大禮舊有渥恩御殿改元比無賞給今則不循舊例別示特恩其行營將士賞賚已給付本家宜令招討使霍彥威副招討使王彥章陳州行營都指揮使張漢傑曉示諸軍知委是月兗州節度使充河東道行營都招討使劉鄩卒六月己亥以都點檢諸司法物使檢校司徒行左驍衛大將軍李肅為右威衛上將軍秋七月陳州朱友能降庚子詔曰朕君臨四海子育兆民唯持不黨之心庶叶無私之運其有齒豫戚屬雖深敦之情干我國經難固含弘之旨須遵常憲以示至公特進檢校太傅使持節陳州刺史兼御史大夫上柱國食邑三千戶惠王友能列爵為王頒條治郡受元戎之寄任處千里之封疆就進官資已登崇貴時加錫賚以表優隆宜切知恩合思盡節撫俗當申於仁政佐時期效於忠規而狎彼小人納其邪説忽稱兵而向闕敢越境以殘民侵犯郊畿驚撓輦轂遠邇咸嫉謀畫交陳及興問罪之師旋驗知非之狀瀝懇繼陳於章表束身願赴於闕庭備述艱危覬加寬恕朕得不自為屈己姑務安仁特施貸法之恩蓋舉議親之律詢於事體抑有朝章止行退責之文用塞衆多之論可降封房陵侯於戲君臣之體彼有不恭伯仲之恩豫垂立愛顧茲輕典豈稱羣情凡在臣僚當體朕意甲辰制以特進檢校太傅衡王友諒可封嗣廣王冬十月北面招討使戴思遠攻德勝寨之北城晉人來援思遠敗於戚城龍德二年春正月戴思遠率師襲魏州時晉王方攻鎮州故思遠乘虛以襲之陷成安而思遠遂急攻德勝北城晉將李存審李存審原本脫存字今據文增入影庫本粘籤極力拒守二月晉王以兵至思遠收軍而退復保楊村八月段凝張朗攻衛州下之獲刺史李存儒以獻戴思遠又下淇門共城新鄉等三縣自是澶州之西相州之南皆為梁有晉人失軍儲三分之一焉龍德三年春三月晉潞州節度留後李繼韜遣使以城歸順先是繼韜父嗣昭為潞州節度使戰歿於鎮州城下晉王欲以嗣昭長子繼儔襲父位繼韜在潞州即執繼儔囚之遣使來送款仍以二幼子為質澤州刺史裴約不從繼韜之謀帝命董璋為澤州刺史令將兵攻之夏四月己巳晉王即唐帝位於魏州改天祐二十年為同光元年閏月壬寅唐軍襲鄆州陷之巡檢使前陳州刺史劉遂嚴本州都指揮使燕顒奔歸京師皆斬於都市五月以滑州節度使王彥章為北面行營招討使辛酉王彥章率舟師案原本舟師訛州師今據通鑑改正舊五代史考異自楊村寨浮河而下斷德勝之浮梁攻南城下之殺數千人唐帝棄德勝之北城並軍保楊劉己巳王彥章段凝圍楊劉城六月乙亥唐帝引軍援楊劉潛軍至博州築壘於河東岸戊子王彥章杜晏球率兵急攻博州之新壘不克遂退保于鄒口秋七月丁未唐帝引軍沿河而南王彥章棄鄒口復至楊劉己未自楊劉拔營退保楊村寨八月以段凝代王彥章為北面行營招討使戊子段凝營於王村引軍自高陵渡河復臨河而還董璋攻澤州下之庚寅唐帝軍於朝城先鋒將康延孝率百騎奔於唐盡泄其軍機命滑州節度使王彥章率兵屯守鄆之東境九月戊辰彥章以衆渡汶與唐軍遇於遞防鎮彥章不利退保中都冬十月辛未朔日有食之甲戌唐帝引師襲中都王彥章兵潰於是彥章與監軍張漢傑及趙廷隱劉嗣彬李知節康文通王山興等皆為唐人所獲翌日彥章死于任城帝聞中都之敗唐軍長驅將至遣張漢倫馳驛召段凝於河上漢倫墜馬傷足復限水潦不能進時禁軍尚有四千人朱圭請以拒唐軍帝不從登建國門召開封尹王瓚謂之曰段凝未至社稷繫卿方略瓚即驅軍民登城為備或勸帝西奔洛陽趙巖曰勢已如是一下此樓誰心可保乃止俄報曰晉軍過曹州矣帝置傳國寶於臥內俄失其所在已為左右所竊迎唐帝帝召控鶴都將皇甫麟案通鑑考異引莊宗實録作皇甫鏻歐陽史從薛史作麟謂之曰吾與晉人世讎不可俟彼刀鋸卿可盡我命無令落讎人之手麟不忍帝曰卿不忍將賣我耶麟舉刀將自剄帝持之因相對大慟戊寅夕麟進刃於建國樓之廊下帝崩案五代會要末帝年三十六舊五代史考異麟即時自剄遲明唐軍攻封丘門王瓚迎降唐帝入宮妃郭氏號泣迎拜初許州獻緑毛龜宮中造室以蓄之命曰龜堂帝嘗市珠於市既而曰珠數足矣衆皆以為不祥之言帝末年改名瑱字一十一十月一八日案此句疑有脫衍蓋當時傅會者析王字為一十一析真字為十月一八也册府元龜作或解云瑱字一十一十月一八知此句日字因下文有日字而衍今姑仍其舊果以一十一年至十月九日亡唐帝初入東京聞帝殂憮然歎曰敵惠敵怨不在後嗣朕與梁主十年對壘恨不生見其面尋詔河南尹張全義收葬之其首藏於太社案通鑑後唐紀辛巳詔王瓚收朱友貞尸殯于佛寺漆其首函之藏于太社薛史作張全義當別有據晉天福二年五月詔太社先藏唐朝罪人首級許親屬及舊僚收葬時右衛上將軍婁繼英請之會繼英得罪乃詔左衛上將軍安崇阮收葬焉永樂大典卷六千六百五史臣曰末帝仁而無武明不照姦上無積德之基可乘下有弄權之臣為輔卒使徑敵奄至大運俄終雖天命之有歸亦人謀之所誤也惜哉永樂大典卷六千六百五
