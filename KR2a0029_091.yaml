body:
  text: 舊五代史卷九十一晉書十七列傳第六房知溫字伯玉兗州瑕丘人也少有勇力案玉堂間話云知溫少年與外弟徐某為盜于兗鄆之境舊五代史考異籍名於本軍為赤甲都官健梁將葛從周鎮其地選置麾下時部將牛存節屯於鎮好摴博每求辨采者知溫以善博見推因得侍左右遂熟於存節及王師範遣劉鄩據兗州梁祖命存節將兵討之知溫夕縋出奔存節喜而納焉明夜竊良馬一駟復入城鄩乃擢為裨將鄩降隸于同州劉知俊知俊補為克和軍使知俊奔岐改隸魏州楊師厚以為馬步軍校馬步原本作馬鬬今從歐陽史改正影庫本粘籤漸升至親隨指揮使繼加檢校司空莊宗入魏賜姓名紹英改天雄軍馬步都指揮使加檢校司徒澶州刺史行臺右千牛衛大將軍莊宗平梁歷曹貝州刺史權充東北面蕃漢馬步都虞候遣戍瓦橋關明宗自鄴入洛知溫與王晏球首赴焉明宗自總管府署知溫滑州兩使留後天成元年授兗州節度使明宗即位詔充北面招討屯於盧臺軍以盧文進來歸加特進同平章事賞招討之功也後除烏震為招討副使代知溫歸鎮知溫怒震遽至有怨言因縱博誘牙兵殺震於席上會次將安審通保騎軍隔河按甲不動知溫懼不濟乃束身渡水復結審通逐其亂軍以奏時朝廷姑息知溫下詔於鄴盡殺軍士家口老幼凡數萬清漳為之變色尋詔遣知溫就便之鎮以安反側俄改徐州節度使加兼侍中會朝廷起兵伐高季興授荊南招討使知行府事尋丁母憂起復雲麾將軍墨縗即戎竟無功而還長興中節制汶陽越二年除平盧軍節度使纍官至開府儀同三司檢校太師兼中書令封東平王食邑五千戶食實封三百戶天福元年冬十二月辛巳卒於鎮贈太尉歸葬於瑕丘詔立神道碑知溫性粗獷動罕由禮每迎待王人不改戎服寡言笑多縱左右排辱賓僚他日知誤亦無愧色始與唐末帝嘗失意於杯盤間以白刃相恐及末帝即位知溫憂甚末帝乃封王爵以寧之也案歐陽史廢帝起鳳翔愍帝出奔知溫乘間有窺覦之意司馬李沖請懷表而西以覘之及沖至京師廢帝已入立沖即奉表稱賀還勸知溫入朝此事薛史不載知溫徑赴洛陽申其宿過且感新恩末帝開懷以厚禮慰而遣之及還郡厚斂不已積貨數百萬治第於南城出則以妓樂相隨任意所之曾不以政事為務有幕客顏衎者正直之士也委曲陳其利病知溫不能用焉及高祖建義入洛尚不即進獻耀兵於牙帳之下衎正色謂曰清泰富有天下多力善戰豈明公之比而天運有歸坐成灰燼今青州遷延不貢何以求安千百武夫無足為恃深為大王之所憂也知溫遂馳表稱賀青人乃安未幾以沈湎成疾而卒部曲將吏分其所聚例為富室衎又勸其子彥儒進錢十萬貫以助國用朝廷除彥儒為沂州刺史案歐陽史彥儒獻父錢三萬緡絹布三萬匹金百兩銀千兩茶千五百斤絲十萬兩拜沂州刺史不言其謀出于顏衎據宋史顏衎傳知溫諸子不慧衎勸令以家財十萬餘上進晉祖嘉之歸功于衎知溫子彥儒授沂州刺史衎拜殿中侍御史與薛史合蓋薛氏去石晉未遠猶得當時實事也其家幸獲保全皆衎之力也永樂大典卷一萬八千一百三十五代史補房知溫為青州節度封東平王所為不法百姓苦之一旦有從事張澤者素好嗜鱉忽暴卒但心頭微暖家人未即殮經宿而活自云為泰山所追行未幾過一公宇門庭甚壯既見有人衣紫據案而坐自謂之府君叱澤曰何故食鱉過差耶言訖有執筆挾簿引羣鬼皆怪狀攜以鼎鑊刀几之具至擒澤投于沸鼎中移時復用鐵叉撥出以刀支解去骨肉然後烹飪大抵亦如治鱉之狀既熟諸鬼分噉凡出自鼎鑊至于支解又至于分啖其于慘毒苦痛之狀皆名狀之所不及如此者近數十度府君始恕之且問曰汝受諸苦如何爾其敢再犯乎答曰不敢于是遣去將行府君又于案上取一物封之甚固授澤曰為吾將此物與房知溫不法之事宜休矣澤領而置于懷遂覺知溫聞知澤復活遽使人肩舁入府而問之澤備以所受之苦對仍于懷中探取封物付溫即錦被角也知溫大駭曰吾昨覺體寒如中瘧遂擁被就火忽聞足下無疾而卒遂驚起不虞一角之被為火所燒此其是乎遽取被視之不差毫釐知溫顫栗不知所措謂澤曰足下之過小可耳尚如此老夫不知如何也自是知溫稍稍近理王建立遼州榆社人也曾祖秋祖嘉父辨纍贈太保建立少鷙猛無檢明宗領代州刺史擢為虞候將莊宗鎮晉陽以諸陵在代郡遣女使饗祭其下有擾於民者建立必捕而笞之莊宗怒令收之為明宗所護而免由是知名明宗歷遷藩鎮皆署為牙門都校纍奏加檢校司空及明宗為魏軍所迫時皇后曹氏淑妃王氏在常山使建立殺其監護並部下兵故明宗家屬因而保全及即位以功授鎮州節度副使加檢校司徒旋為留後未幾正授節旄繼加檢校太尉同平章事會王都據中山叛密使通弟兄之好案通鑑云王都陰與謀復河北故事建立陽許而密奏之舊五代史考異安重誨素與建立不協知其事奏之明宗慮陷建立尋徵赴闕案通鑑云建立奏重誨專權求入朝面言其狀帝召之舊五代史考異拜右僕射兼中書侍郎平章事判鹽鐵戶部度支充集賢殿大學士天成四年出為青州節度使五年移鎮上黨辭不赴任請退居丘園制以太子少保致仕案通鑑作以太傅致仕歐陽史從薛史舊五代史考異建立自是鬱鬱不得志長興中嘗欲求見中旨不許皆重誨蔽之也清泰初末帝召赴闕授天平軍節度使建立少歷軍校職當捕盜及位居方伯為政嚴烈閭里有惡迹者必族而誅之其刑失於入者不可勝紀故當時人目之為王𣛀疊言殺其人而積其尸也後聞末帝失勢殺副使李彥贇及從事一人報其私怨人甚鄙之高祖即位再為青州節度使纍加檢校太尉兼中書令建立晚年歸心釋氏飯僧營寺戒殺慎獄民稍安之天福二年封臨淄王明年封東平王五年入覲高祖曰三紀前老兄宜賜不拜仍許肩輿入朝上殿則使二宦者掖之論者榮之尋表乞休致高祖不允乃授潞州節度使割遼沁二州為上黨屬郡加檢校太師進封韓王以光其故里至鎮踰月而疾作有大星墜于府署建立即召賓介竺嶽草遺章竺嶽原本脫竺字今從册府元龜增入影庫本粘籤又謂其子守恩曰榆社之地桑梓存焉桑以養生梓以送死余生為壽宮刻銘石室死當速葬葬必從儉違吾是言非孝也旋以病篤而卒年七十册贈尚書令建立先人之墳在於榆社其岡阜重復松檜藹然占者云後必出公侯故建立自為墓恐子孫易之也子守恩周書有傳永樂大典卷六千五百三十康福蔚州人世為本州軍校祖嗣蕃漢都知兵馬使纍贈太子太師父公政歷職至平塞軍使纍贈太傅福便弓馬少事後唐武皇纍補軍職充承天軍都監莊宗嗣位嘗謂左右曰我本蕃人以羊馬為活業彼康福者體貌豐厚宜領財貨可令總轄馬牧由是署為馬坊使大有蕃息及明宗為亂兵所迫將離魏縣會福牧小馬數千匹於相州乃驅而歸明宗即位授飛龍使俄轉磁州刺史充襄州兵馬都監尋以江陵叛命朝廷舉兵伐之以福為荊南道行營兵馬都監俄以王師無功而還福善諸蕃語明宗視政之暇每召入便殿咨訪時之利病福即以蕃語奏之樞密使重誨惡焉常面戒之曰康福但亂奏事有日斬之福懼會靈武兵馬留後韓潯案通鑑歐陽史俱作韓洙弟澄舊五代史考異以人情不協慮為所圖上表請帥制加福光祿大夫檢校司空行涼州刺史充朔方河西等軍節度靈威雄警甘肅等州觀察處置管內營田押蕃落溫池榷稅等使福之是拜蓋重誨嫉而出之福泣而辭之明宗宣重誨別與商議重誨奏曰臣纍奉聖旨令與康福一事今福驟升節鎮更欲何求況已有成命難於改移明宗不得已謂福曰重誨不肯非朕意也福辭明宗曰朕遣兵援助勿過憂也因令將軍牛知柔領兵送赴鎮行次青岡峽會大雪令人登山望之見川下煙火吐蕃數千帳在焉寇不之覺因分軍三道以掩之蕃衆大駭棄帳幕而走殺之殆盡獲玉璞羊馬甚多到鎮歲餘西戎皆款附改賜福耀忠匡定保節功臣纍加官爵福鎮靈武凡三歲每歲大稔倉儲盈羡有馬千駟因為人所譖安重誨奏曰纍據使臣所言康福大有寶貨必負朝廷案靈武受代康福領節度在天成四年次年為長興元年安重誨討蜀二年賜死是康福之任靈武甫匝歲而重誨已去朝再期而賜死矣此傳云福鎮靈武凡三歲每歲大稔重誨奏其必負朝廷疑有舛誤歐陽史仍薛史之舊舊五代史考異明宗密遣人謂曰朕何負於卿而有異心耶福奏曰臣受國重恩有死無二豈願負於聖人此必讒人之言也因表乞入覲不允及再上章隨而赴闕移授彰義軍節度使又轉邠州檢校太傅清泰中移鎮秦州加特進開國侯充西面都部署高祖受命就加檢校太尉開國公未幾又加同平章事及移領河中加兼侍中以天和節入覲改賜輸忠守正翊亮功臣加開府儀同三司增食邑至五千戶實封五百戶久之受代歸闕天福七年秋卒於京師年五十八贈太師諡曰武安福無軍功屬明宗龍躍有際會之幸擢自小校暴為貴人每食非羊之全髀不能飫腹與士大夫交言懵無所別在天水日嘗有疾幕客謁問福擁衾而坐客有退者謂同列曰錦衾爛兮福聞之遽召言者怒視曰吾雖生於塞下乃唐人也何得以為爛奚因叱出之由是諸客不敢措辭復有末客姓駱其先與後唐懿祖來自金山府因公宴福謂從事輩曰駱評事官則卑門族甚高真沙陀也聞者竊笑焉子三人長曰延沼歷隨澤二州刺史次曰延澤延壽俱歷內職焉永樂大典卷一萬八千一百二十七安彥威字國俊代州崞縣人少時以軍卒隸唐明宗麾下彥威善射頗知兵法明宗愛之及領諸鎮節鉞彥威常為牙將以謹厚見信明宗入立皇子從榮鎮鄴彥威為護聖指揮使以從榮判六軍彥威入司禁衛遙領鎮州節度使案歐陽史作遷捧聖指揮使領寧國軍指揮使舊五代史考異及高祖入立拜彥威北京留守案通鑑云彥威入朝上曰我所重者信與義昔契丹以義救我我今以信報之聞其徵求不已公能屈節奉之深稱朕意對曰陛下以蒼生之故猶卑辭厚幣以事之臣何屈節之有上悅舊五代史考異徙鎮歸德是時河決滑州命彥威塞之彥威出私錢募民治隄遷西京留守遭歲大飢彥威賑飢民民有犯法皆寬貸之飢民愛之不忍去旋丁母憂哀毀過制少帝與契丹搆患拜彥威北面行營副都統彥威悉以家財佐軍後以疾卒於京師彥威與太妃同宗少帝事以為舅彥威未嘗以為言及卒太妃臨哭人始知其為國戚當時益重其人焉永樂大典卷一萬八千一百二十七李周案薛史莊宗紀作李周明宗紀作李敬周蓋本名敬周入晉後避諱去敬字薛史雜采諸書未及改歸畫一通鑑與薛史同舊五代史考異字通理邢州內丘人也唐潞州節度使抱真之後曾祖融祖毅父矩皆不仕周年十六為內丘捕賊將以任俠自負時河朔羣盜充斥南北交兵行旅無援者不敢出郡邑有士人盧嶽家於太原攜妻子囊橐寓於逆旅進退無所保唯與所親相對流涕周憫之請援送以歸行經西山中有賊夜於林麓間俟之射盧嶽中其馬周大呼曰爾為誰耶賊聞其聲相謂曰李君至此矣即時散走嶽全其行裝至於家周將辭去嶽謂周曰嶽明歷象善知人子有奇表方頤隆準眉目疏朗身長七尺此乃將相之材也河東李氏將有天下子宜事之以求富貴周辭以母老而歸既而梁將葛從周拔邢洺唐武皇麾兵南下築壘於青山口周向背莫決因思盧嶽之言乃投青山寨將張樜落武皇賞之補萬勝黃頭軍使武皇之平雲州莊宗之戰柏鄉周皆有功遷匡霸都指揮使匡霸原本脫霸字今從歐陽史增入影庫本粘籤莊宗入魏率兵屯臨河楊劉所至與士伍同甘苦周尤善守備一日奔母喪以他將代之既出則其城將陷莊宗即遣追之使墨縗從事會莊宗北征周與寺人焦彥賓守楊劉城案九國志焦彥賓傳彥賓字英服滄州清池人少聰敏多智略事武皇尤所委信及莊宗即位遷左監門衛將軍充四方館使出護邢州軍舊五代史考異梁將王彥章以數萬衆攻之周日夜乘城躬當矢石使人馳告莊宗請百里趨程以紓其難莊宗曰李周在內朕何憂也遂日行二舍不廢畋獵既至士衆絶糧三日矣及攻圍既解莊宗謂周曰微卿九拒之勞諸公等為梁人所虜矣同光中歷相蔡二州刺史及蜀平授西川節度副使天成二年春遷遂州兩使留後尋正授節旄未幾受代歸闕三年秋出為邠州節度使會慶州刺史竇廷琬據城拒命周奉詔討平之長興清泰中歷徐安雍汴四鎮所至無苛政人皆樂之高祖有天下復鎮邠州纍官至檢校太師兼侍中及罷鎮赴闕會少帝幸澶淵以周纍朝耆德乃命為東京留守車駕還京授開封尹及遘疾夢焚旌旗鎧甲因自嗟嘆上章請退尋卒於官時年七十四詔贈太師陪葬於明宗徽陵之北永樂大典卷一萬八千一百二十七徽陵原本作暉陵今從五代會要改正影庫本粘籤張從訓字德恭本姑臧人其先回鶻別派隨沙徙居雲中後從唐武皇家於太原從訓遂為太原人祖君政雲州長史識蕃字通佛理父存信河東蕃漢馬步軍都指揮使武皇賜姓名眷同親嫡前史有傳天福中贈太師中書令追封趙國公從訓讀儒書精騎射初為散員大將天祐中轄沙數百人屯壺關十餘歲節度使李嗣昭委遇之莊宗與梁人相拒於德勝口徵赴軍前補充先鋒遊奕使俄轉雲捷指揮使檢校司空賜名繼鸞從諸子之行也明宗微時嘗在存信麾下為都押牙與從訓有舊及即位授石州刺史復舊姓名歷憲德二州刺史高祖之鎮太原也為少帝娶從訓長女為妃案宋史張從恩傳晉祖鎮河東為少帝娶從恩女今考五代會要及薛史本紀俱作從訓疑宋史係傳聞之訛舊五代史考異從訓清泰初授唐州刺史三年高祖舉義從訓奉唐末帝詔徵赴行在分領鄉兵次於團柏谷兵敗宵遁潛身民間高祖入洛有詔搜訪月餘乃出焉及見戚里之故深加軫惻尋授絳州刺史檢校太保在任數年天福中卒於官年五十二少帝以后父之故超贈太尉弟從恩仕皇朝為右金吾衛上將軍卒永樂大典卷五千三百六十李繼忠字化遠後唐昭義軍節度使兼中書令嗣昭之第二子嗣昭唐書有傳繼忠少善騎射從父征討有功莊宗手制授檢校兵部尚書充感義馬軍指揮使改潞府司馬加檢校尚書右僕射充安義軍都巡檢使天成中自北京大內皇城使轉河東行軍司馬入為右驍衛將軍未幾授成德軍司馬加檢校司徒高祖即位二年三月授沂州刺史加檢校太保尋移棣州刺史繼忠舊苦風痺皆辭以地遠乃授單州刺史仍加輸忠奉國功臣三年入為右神武統軍四年三月出領隰州七年八月移刺澤州開運元年復入為右監門大將軍三年秋以疾卒於東京年五十一始繼忠母楊氏善治産平生積財巨萬及高祖建義於太原楊已終繼忠舉族家於晉陽時以諸軍方困契丹援兵又至高祖乃使人就其第疏其復壁取其舊積所獲金銀紈素甚廣至於巾屨瑣屑之物無不取足高祖既濟大事感而奇之故車駕入洛繼忠雖有舊恙連領大郡皆楊氏之力也永樂大典卷一萬三百八十九李頃陳州項城人即河陽節度使兼侍中罕之子也罕之梁書有傳唐光啓中罕之與河南張全義為仇交相攻擊罕之兵敗北投太原武皇以澤州處之罕之將赴任留頃為質焉時莊宗未弱冠因與頃遊處甚相昵狎光啓初罕之自澤州襲據潞州送款於梁武皇以頃父叛將殺之莊宗密與駿騎使逃出境頃遂奔河南梁祖以其父子歸己委遇甚厚天復中梁祖自鳳翔送唐昭宗歸長安留軍萬人命姪友倫與頃總之友倫原本作有倫今從歐陽史改正影庫本粘籤以宿衛為名及梁祖逼禪纍掌禁兵倚為肘腋庶人友圭立授頃檢校尚書右僕射右羽林統軍梁末帝之誅友圭頃預其謀尋歷隨州刺史復為右羽林統軍同光初莊宗入汴召頃見之莊宗欣然授衛州刺史加光祿大夫檢校太保明宗朝授衍州刺史長興中檢校太傅右神武統軍高祖即位之二年加特進檢校太尉右領軍衛上將軍三年進封開國伯五年遷左領軍衛上將軍尋以病卒年七十制贈太師頃性溫雅不暴虐凡刺郡統衆頗有畏愛及卒人甚惜之子彥弼在太原日因頃走歸梁朝武皇怒下蠶室加熏腐之刑後籍於內侍省卒焉永樂大典卷一萬八千一百三十一周光輔太原人後唐蕃漢馬步總管幽州節度使德威之長子也德威有傳在唐書光輔年甫十歲補幽州中軍兵馬使有成人之志德威以牙軍委之麾下咸取決焉及長體貌魁偉練於戎事父卒授嵐州刺史從莊宗平梁遷檢校尚書左僕射汝州防禦使仍賜協謀定亂功臣天成初移汾州四年入為右監門衛大將軍長興清泰中歷陳懷磁三郡繼加檢校司徒高祖即位授蔡州刺史歲餘卒於郡時年三十五贈太保光輔以功臣子歷數郡皆無濫政竟善終於官雖享年不永亦可嘉也光輔有弟數人光貞歷義乾二州刺史入為諸衛將軍光遜繼為蔡州刺史光贊任青州行軍司馬及楊光遠叛滅貶商州司馬會赦徵還尋卒於家永樂大典卷五千四百一符彥饒唐莊宗朝蕃漢總管存審之第二子也存審唐書有傳彥饒少驍勇能騎射唐天祐十五年冬莊宗與梁大戰於胡柳陂彥饒與弟彥圖俱從其父血戰有功莊宗壯之因用為騎將同光中以功授曹州刺史明宗即位改刺沂州天成中屯守梁園會起軍北戍塞下時有偏校以宣武乏帥迫彥饒為之彥饒紿許其請明日殺為惡者奏之時人嘉其方略長興中為金州防禦使為政甚有民譽其後纍遷節鎮天福初為滑州節度使纍官至檢校太傅二年七月范延光據鄴都叛朝廷遣侍衛馬軍都指揮使白奉進率騎軍三千屯於州之開元寺一日彥饒與奉進因事忿爭於牙署事具奉進傳中是時奉進厲聲曰爾莫是與范延光同反耶拂衣而起彥饒不留帳下介士大譟擒奉進殺之奉進從騎散走傳呼於外時步軍都校馬萬次校盧順密聞奉進被害即率其部衆攻滑之子城執彥饒以出遣裨校方太拘送闕下行及赤岡南高祖遣中使害於路左永樂大典卷一萬八千一百三十二羅周敬字尚素鄴王紹威之第三子也紹威梁書有傳周敬幼聰明八歲學為詩往往傳於人口起家授檢校尚書禮部員外郎梁乾化中以兄周翰節制滑臺卒於官乃以周敬繼之命為兩使留後尋正授旄鉞時年十歲未幾改授許州節度使繼加檢校尚書左僕射踰三年徵授祕書監檢校司空駙馬都尉尚梁普安公主普安原本作莖安今從五代會要改正影庫本粘籤旋移光祿卿莊宗即位歷左右金吾大將軍初唐天祐中紹威嘗建第於洛陽福善里及莊宗入洛以梁租庸使趙巖宅賜明宗同光中明宗在洛以趨內稍遠乃召周敬議易其第周敬諾之後明宗即位一日夢中見一人儀形瓌秀若素識者夢中問曰此得非前宅主羅氏子及寤訪其子孫左右對曰周敬見列明廷召至果符夢中所見明宗謂侍臣曰朕不欲使大勳之後久無土地因授同州節度使加檢校太保長興中入為左監門衛上將軍四遷諸衛上將軍天福二年卒時年三十二贈太傅永樂大典卷五千六百七十八鄭琮太原人也始事唐武皇為五院軍小校屢有軍功莊宗在河上為馬步都虞候戎伍之事一覩不忘凡所詰問應答如流故所在知名唐同光末從明宗伐魏州時軍情有變明宗退守魏縣未知趨向安重誨將徵兵于四方琮在帳前歷數諸道屯軍及主將姓名附口傳檄相次而至明宗即位嘉其功授防州刺史秩滿父老請留三年八月授左羽林統軍唐長興二年二月出刺武州高祖即位復居環衛久之以俸薄家貧鬱鬱不得志天福中以疾終于官贈司徒永樂大典卷一萬八千八百八十一
