body:
  text: 舊五代史卷五十二唐書二十八列傳第四李嗣昭字益光武皇母弟代州刺史克柔之假子也小字進通案原本作通進今從歐陽史改正不知族姓所出案歐陽史作本姓韓氏汾州大谷縣民家子少事克柔頗謹愿雖形貌眇小而精悍有膽略沈毅不羣初嗜酒好樂案歐陽史作初喜嗜酒吳縝纂誤云喜即嗜也疑賸喜字舊五代史考異武皇微伸儆戒乃終身不飲少從征伐精練軍機乾寧初王珂王珙爭帥河中珙引陝州之軍攻珂珂求救於武皇乃令嗣昭將兵援之敗珙軍於猗氏獲賊將李璠等四年改衙內都將復援河中敗汴軍於胡壁堡擒汴將滑禮以功加檢校僕射及王珂請婚武皇武皇以女妻之珂赴禮於太原以嗣昭權典河中留後事李罕之襲我潞州也嗣昭率師攻潞州與汴將丁會戰於含口含口原本作合口考通鑑注云含口在潞州城東今改正影庫本粘籤俘獲三千執其將蔡延恭代李君慶為蕃漢馬步行營都將進攻潞州遣李存質李嗣本以兵扼天井關汴將澤州刺史劉屺棄城而遁乃以李存璋為刺史梁祖聞嗣昭之師大至召葛從周謂曰幷人若在高平當圍而取之先須野戰勿以潞州為敵及聞嗣昭軍韓店梁祖曰進通扼八議路八議路原本作入義今據通鑑改正影庫本粘籤此賊決與我鬬公等臨事制機勿落姦便賀德倫閉壁不出嗣昭日以鐵騎環城汴人不敢芻牧援路斷絕八月德倫張歸厚棄城遁去我復取潞州光化三年汴人攻滄州劉仁恭求救遣嗣昭出師邢洺以應之嗣昭遇汴軍於沙河擊敗之獲其將胡禮進攻洺州下之獲其郡將朱紹宗九月梁祖自率軍三萬至臨洺葛從周設伏於青山口嗣昭聞梁祖至斂軍而退從周伏兵發為其所敗偏將王郃郎楊師悅等被擒十月汴人大寇鎮定王郜告急於武皇乃遣嗣昭出師下太行擊懷孟汴將侯信守河陽不意嗣昭之師至既無守備驅巿人登城嗣昭攻其北門破其外垣俄而汴將閻寶救軍至乃退天復元年河中王珂為汴人所擄河中晉絳諸郡皆陷四月汾州刺史李瑭謀叛納款於汴嗣昭討之三日而拔斬瑭是月汴人初得蒲絳乃大舉諸道之師來逼太原汴將葛從周陷承天軍氏叔琮營洞渦驛太原四面汴軍雲合武皇憂迫計無從出嗣昭朝夕選精騎分出諸門掩擊汴營左俘右斬或燔或擊汴軍疲於奔命又屬霖雨軍多足腫腹疾糧運不繼五月氏叔琮引退嗣昭以精騎追之汴軍委棄輜重兵仗萬計六月嗣昭出師陰地陰地原本作陰陀考薛史前後皆作陰地胡三省云陰地關在晉州東北影庫本粘籤攻慈隰降其刺史唐禮張瓌是時天子在鳳翔汴人攻圍有密詔徵兵十一月嗣昭出師晉絳屯吉上堡遇汴將王友通於平陽一戰擒之明年正月嗣昭進兵蒲縣十八日汴將朱友寧氏叔琮將兵十萬來拒二十八日梁祖自率大軍至平陽嗣昭之師大恐三月十一日有白虹貫周德威之營候者云不利宜班師翌日氏叔琮犯德威之營汴軍十餘萬列陣四合德威嗣昭血戰解之乃保軍而退汴軍因乘之時諸將潰散無復部伍德威引騎軍循西山而遁朱友寧乘勝陷慈隰汾等州武皇聞其敗也遣李存信率牙兵至清源應接復為汴軍所擊汴軍營於晉祠嗣昭德威收合餘衆登城拒守汴人治攻具於西北隅四面營柵相望時鎮州河中皆為梁有孤城無援師旅敗亡武皇晝夜登城憂不遑食召諸將欲出保雲州嗣昭曰王勿為此謀兒等苟存必能城守李存信曰事勢危急不如且入北蕃別圖進取朱溫兵師百萬天下無敵關東河北受他指揮今獨守危城兵亡地儻彼築室反耕環塹深固則亡無日矣武皇將從之嗣昭亟爭不可猶豫未決賴劉太妃極言於內武皇且止數日亡散之衆復集嗣昭晝夜分兵四出斬將搴旗汴軍保守不暇二十一日朱友寧燒營退去嗣昭追擊復收汾慈隰等州五月雲州都將王敬暉據城叛振武石善友亦為部將契苾讓所逐嗣昭皆討平之天祐三年汴人攻滄景劉仁恭遣使求援十一月嗣昭合燕軍三萬進攻潞州降丁會武皇乃以嗣昭為昭義節度使案舊唐書天祐三年十二月戊辰李克用與幽州之衆同攻潞州全忠守將丁會以澤潞降太原克用以其子嗣昭為留後甲戌全忠燒長蘆營旋軍聞潞州陷故也考嗣昭本克柔養子舊唐書以為武皇子殊誤始嗣昭未到之前上黨有占者見一人家舍上常有氣如車蓋視之但一貧媼而已占者謂媼有子乎曰有見為軍士出戍於外占者心異之以為其子將來有土地之兆也未幾丁會既降嗣昭領兵入潞以媼家四面空缺乃駐於是舍丁會既歸太原武皇遣使命嗣昭為帥乃自媼舍而入理所其氣尋息聞者異之四年六月汴將李思安將兵十萬攻潞州乃築夾城深溝高壘內外重複飛走路絕嗣昭撫循士衆登城拒守梁祖馳書說誘百端嗣昭焚其偽詔斬其使者城中固守經年軍民乏絕感鹽炭自生以濟貧民嗣昭嘗享諸將登城張樂賊矢中足嗣昭密拔之密拔原本作蜜跋今從冊府元龜改正影庫本粘籤坐客不之覺酣飲如故以安衆心五年五月莊宗敗汴軍破夾城嗣昭知武皇棄世哀慟幾絕時大兵攻圍歷年城中士民飢死大半里蕭條嗣昭緩法寬租勸農務穡一二年間軍城完集三面鄰於敵境寇鈔縱橫設法枝梧邊鄙不聳胡柳之戰周德威戰沒師無行列至晚方集汴人四五萬登無石山我軍懼形於色或請收軍保營詰旦復戰嗣昭曰賊無營壘去臨濮地遠日已晡晚皆有歸心但以精騎逗撓無令返旆晡後追擊破之必矣我若收軍拔寨賊人入臨濮俟彼整齊復來即勝負未決莊宗曰非兄言幾敗吾事軍校王建及又陳方略嗣昭與建及分兵於土山南北為掎角汴軍懼下山因縱軍擊之俘斬三萬級由是莊宗之軍復振十六年嗣昭代周德威權幽州軍府事九月以李紹宏代嗣昭出薊門百姓號泣請留截鞍惜別嗣昭夜遁而歸十七年六月嗣昭自德勝歸藩莊宗帳餞於戚城莊宗酒酣泣而言曰河朔生靈十年饋輓引領鶴望俟破汴軍今兵賦不充寇孽猶在坐食軍賦有愧蒸民嗣昭曰臣忝急難之地每一念此寢不安席大王且持重謹守惠養士民臣歸本藩簡料兵賦歲末春首即舉衆復來莊宗離席拜送如家人禮是月汴將劉鄩攻同州朱友謙告急嗣昭與李存審援之九月破汴軍於馮翊乃班師十九年莊宗親征張文禮於鎮州冬契丹三十萬奄至嗣昭從莊宗擊之敵騎圍之數十重良久不解嗣昭號泣赴之引三百騎橫擊重圍馳突出沒者數十合契丹退翼莊宗而還是時閻寶為鎮人所敗退保趙州莊宗命嗣昭代寶攻真定七月二十四日王處球之兵出至九門九門原本作丸門今據通鑑及遼史改正影庫本粘籤嗣昭設伏於故營賊至發伏擊之殆盡餘三人匿於牆墟間嗣昭環馬而射之為賊矢中腦嗣昭箙中矢盡拔賊矢於腦射賊一發而殪之嗣昭日暮還營所傷血流不止是夜卒嗣昭節制澤潞官自司徒太保至侍中中書令莊宗即位贈太師隴西郡王長興中詔配饗莊宗廟庭嗣昭有子七人長曰繼儔澤州刺史次繼韜繼忠繼能繼襲繼遠皆夫人楊氏所生案嗣昭有子七人薛史僅言其六歐陽史仍薛史之舊據繼韜附傳有弟繼達合數之恰得七人也楊氏治家善積聚設法販鬻致家財百萬永樂大典卷一萬三百八十九繼韜小字留得少驕獪無賴嗣昭既卒莊宗詔諸子扶喪歸太原襄事諸子違詔以父牙兵數千擁喪歸潞莊宗令李存渥馳騎追諭兄弟俱忿欲害存渥存渥遁而獲免繼韜兄繼儔嗣昭長嫡也當襲父爵然柔而不武方在苫廬繼韜詐令三軍劫己為留後囚繼儔於別室以事奏聞莊宗不得已命為安義軍兵馬留後案通鑑注云後唐改昭義為安義蓋為嗣昭避諱也歐陽史仍作昭義舊五代史考異時軍前糧餉不充租庸計度請潞州轉米五萬貯於相州繼韜辭以經費不足請轉三萬有幕客魏琢牙將申蒙者申蒙原本作車蒙今據通鑑改正影庫本粘籤因入奏公事每摭陰事報繼韜云朝廷無人終為河南吞噬止遲速間耳由是陰謀叛計內官張居翰時為昭義監軍莊宗將即位詔赴鄴都潞州節度判官任圜時在鎮州亦奉詔赴鄴魏琢申蒙謂繼韜曰國家急召此二人情可知矣弟繼遠年十五六謂繼韜曰兄有家財百萬倉儲十年宜自為謀莫受人所制繼韜曰定哥以為何如曰申蒙之言是也河北不勝河南不如與大梁通盟國家方事之殷焉能討我無如此算乃令繼遠將百餘騎詐云於晉絳擒生遂至汴梁主見之喜因令董璋將兵應接營於潞州之南加繼韜同平章事改昭義軍為匡義軍繼韜令其愛子二人入質於汴及莊宗平河南繼韜惶恐計無所出將脫身於契丹會有詔赦之乃齎銀數十萬兩隨其母楊氏詣闕冀以賂免將行其弟繼遠曰兄往與不往利害一也以反為名何面更見天下不如深溝峻壁坐食積粟尚可苟延歲月往則亡無日矣或曰君先世有大功於國主上季父也弘農夫人無恙保獲萬全及繼韜至厚賂宦官伶人言事者翕然稱留後本無惡意姦人惑之故也嗣昭親賢不可無嗣楊夫人亦於宮中哀祈劉皇后后每於莊宗前泣言先人之功以動聖情由是原之在京月餘屢從畋遊寵待如故李存渥深訶詆之繼韜心不自安復賂伶閹求歸本鎮莊宗不聽繼韜潛令紀綱書諭繼遠欲軍城更變望天子遣己安撫事泄斬於天津橋南天津橋原本脫津字今從歐陽史增入影庫本粘籤二子齠年質於汴莊宗收城得之撫其背曰爾幼如是猶知能佐父造反長復何為至是亦誅仍遣使往潞州斬繼遠函首赴闕命繼儔權知軍州事繼達充軍城巡檢未幾詔繼儔赴闕時繼儔以繼韜所畜婢僕玩好之類悉為己有每日料選算校不時上路繼達怒謂人曰吾仲兄被罪父子誅死大兄不仁略無動懷而便蒸淫妻妾詰責貨財慚恥見人生不如死繼達服縗麻引數百騎坐於戟門呼曰為我反乎即令人斬繼儔首投於戟門之內副使李繼珂聞其亂也繼珂原本作繼瑽今從通鑑改正影庫本粘籤募巿人千餘攻於城門繼達登城樓知事不濟啟子城東門至其第盡殺其孥得百餘騎出潞城門將奔契丹行不十里麾下奔潰自剄於路隅天成初繼能為相州刺史母楊氏卒於太原繼能繼襲奔喪行服繼能笞掠母主藏婢責金銀數因笞至死家人告變言聚甲為亂繼能繼襲皆伏誅嗣昭諸子自相屠害幾於溘盡唯繼忠一人僅保其首領焉永樂大典卷一萬三百八十九裴約潞州之舊將也初事李嗣昭為親信及繼韜之叛約方戍澤州因召民泣而諭之曰余事故使已餘二紀每見分財享士志在平讎不幸薨歿今郎君父喪未葬郎君原本作郎書今據歐陽史改正影庫本粘籤即背君親余可倳刃自殺不能送死與人衆皆感泣既而梁以董璋為澤州刺史率衆攻城約拒久之告急於莊宗莊宗知其忠懇謂諸將曰朕於繼韜何薄於裴約何厚裴約能分逆順不附賊黨先兄一何不幸生此鴟梟乃顧李紹斌曰爾識機便為我取裴約來朕不藉澤州彈丸之地即遣紹斌率五千騎以赴之案歐陽史作李存審據薛史莊宗紀亦作李紹斌疑歐陽史誤紹斌自遼州進軍未至城已陷約被害時同光元年六月也帝聞之嗟痛不已永樂大典卷一萬八千一百二十八李嗣本鴈門人本姓張父準銅冶鎮將嗣本少事武皇為帳中紀綱漸立戰功得補軍校乾寧中從征李匡儔為前鋒與燕人戰得居庸關以功為義兒軍使因賜姓名從討王行瑜授檢校刑部尚書改威遠寧塞等軍使五年討羅弘信於魏州嗣本為前鋒師還改馬軍都將從李嗣昭討王暉於雲州論功加檢校司空汴將李思安之圍潞州也從周德威軍於余吾嗣本率騎軍日與汴人轉鬬前後獻俘千計遷代州刺史六年從攻晉絳為蕃漢副使都校及武皇喪事有日嗣本監護其事改雲中防禦使雲蔚應朔等州都知兵馬使加特進檢校太保九年周德威討劉守光嗣本率代北諸軍生熟吐渾收山後八軍得納降軍使盧文進武州刺史高行珪以獻幽州平論功授振武節度使振武原本作正武今從歐陽史改正影庫本粘籤號威信可汗十二年莊宗定魏博劉鄩據莘縣命嗣本入太原巡守都城十三年從破劉鄩於故元城收洺磁衞三郡六月還鎮振武八月契丹阿保機傾塞犯邊其衆三十萬攻振武嗣本嬰城拒戰者累日契丹為火車地道晝夜急攻城中兵少禦備罄竭城陷嗣本舉族入契丹有子八人四人陷於幕庭嗣本性剛烈有節義善戰多謀然治郡民頗傷苛急人以此少之也永樂大典卷一萬三百八十九李嗣恩本姓駱案歐陽史嗣恩本吐谷渾部人而薛史不載疑有闕文年十五能騎射侍武皇於振武及鎮太原補鐵林軍小校從征王行瑜奉表獻捷加檢校散騎常侍漸轉突陣指揮使賜姓名天祐四年逐康懷英於河西解汾州之圍加檢校司空充左廂馬軍都將戰王景仁有功加檢校司徒救河中府與梁人接戰應弦斃者甚衆而矟中其口及退莊宗親視其傷深加慰勉轉內衙馬步都將遼州刺史十二年從莊宗入魏擊劉鄩有功轉天雄軍都指揮使劉鄩之北趨樂平也嗣恩襲之倍程先入晉陽時城中無備得嗣恩兵至人百其勇鄩聞其先過乃遁莘之戰以功轉代州刺史充石嶺關以北都知兵馬使稍遷振武節度使十五年追赴行在卒於太原天成初明宗敦念舊勳詔贈太尉有子二人長曰武八騎射推於軍中嘗有時輩臂飢鷹矜其搏擊武八持鳴鏑一隻賭其狩獲暮乃多之戰契丹於新州歿焉案遼史太祖紀二年三月合戰於新州東殺李嗣本之子武八考武八本嗣恩子而遼史以為嗣本子蓋傳聞之誤幼曰從郎累為行軍司馬永樂大典卷一萬三百八十九史臣曰嗣昭以精悍勤勞佐經綸之業終沒王事得以為忠然其後嗣皆不免於刑戮者何也蓋殖貨無窮多財累愚故也抑苟能以清白遺子孫安有斯禍哉裴約以偏裨而效忠烈尤可貴也嗣本嗣恩皆以中涓之効參再造之功故可附於茲也永樂大典卷一萬三百八十九
