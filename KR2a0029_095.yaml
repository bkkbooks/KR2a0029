body:
  text: 舊五代史卷九十五晉書二十一列傳第十皇甫遇常山人也案歐陽史作常山真定人舊五代史考異父武流寓太原嘗為遮虜軍使遇少好勇及壯虬髯善騎射唐明宗在藩時隸於麾下纍從戰有功明宗即位遷龍武都指揮使遙領嚴州刺史出討東川為行營左軍都指揮使應順清泰中纍歷團練防禦使尋遷鄧州節度使所至苛暴以誅斂為務其幕客多私去以避其纍高祖入洛移領中山俄聞與鎮州安重榮為婚家乃移鎮上黨又改平陽咸以憸人執事政事隳紊及鎮河陽部內創別業開畎水泉以通溉灌所經墳墓悉毀之部民以朝廷方姑息郡帥莫之敢訴少帝即位罷歸闕下二年契丹南寇從至澶州戰於鄆州北津契丹衆大敗溺死者數千人以功拜滑州節度使三年契丹率衆屯邯鄲邯鄲原本作邯縣今從通鑑改正影庫本粘籤遇與安審琦慕容彥超等禦之遇將渡漳河契丹前鋒大至遇引退轉鬬二十里至鄴南榆林店遇謂審琦等曰彼衆我寡走無生路不如血戰遂自辰及未戰百餘合所傷甚衆遇所乘馬中鏑而斃遇有紀綱杜知敏以馬授遇遇得馬復戰久之稍解杜知敏已為所獲遇謂彥超曰知敏蒼黃之中以馬授我義也安可使陷於賊中遂與彥超躍馬取知敏而遇敵騎壯之俄而生軍復合遇不能解時審琦已至安陽河謂首將張從恩曰皇甫遇等未至必為敵騎所圍若不急救則成擒矣從恩曰敵甚盛無以枝梧將軍獨往何益審琦曰成敗命也設若不濟則與之俱死假令失此二將將何面目以見天子案通鑑作坐失皇甫太師吾屬何顏以見天子胡三省注云皇甫遇未必加官至太師也而安審琦以太師稱之蓋五季之亂官賞無章當時相稱謂不論其品秩就人臣極品而稱之據薛史遇纍官至檢校太師審琦蓋稱其檢校之官也胡注似未詳考舊五代史考異遂率鐵騎北渡赴之契丹見塵起謂救軍併至乃引去遇與彥超中數創得還時諸軍歎曰此三人皆猛將也遇纍官至檢校太師同中書門下平章事四年契丹復至從杜重威營滹水重威送款於契丹遇不預其議及降心不平之時戎王欲遣遇先入汴遇辭之因私謂人曰我身荷國恩位兼將相既不能死於軍陳何顏以見舊主更受命圖之所不忍也明日行及趙郡泊其縣舍顧從者曰我已信宿不食疾甚矣主辱臣死無復南行因絶吭而殞遠近聞而義之漢高祖登極詔贈中書令周廣順三年正月遇妻宋國夫人霍氏上言請度為尼周太祖許之仍賜紫衣號貞範大師法名惠圓又賜夏臘十永樂大典卷一萬八千三十一王清案遼史趙延壽傳作王靖孔本字去瑕洺州曲周人也父度世為農清少以勇力端厚稱於鄉里後唐明宗領行臺置步直軍清預其募漸升為小校同光初從戰於河上有功賜忠烈功臣明宗即位自天成至清泰末歷嚴衛寧衛指揮使加檢校右散騎常侍天福元年高祖建義入洛加檢校刑部尚書改賜扈蹕忠孝功臣三年從楊光遠平范延光於鄴改奉國軍都虞候六年襄州安從進叛從高行周討之踰年不下一日清請先登諸軍繼其後會有內應者遂拔其城清以中重創有詔褒慰七年改賜推忠保運功臣加金紫光祿大夫領溪州刺史八年詔遣以所部兵屯於鄴九年春契丹南牧圍其城清與張從恩守之少帝飛蠟詔勉諭錫之第宅契丹退以干城功繼遷軍額開運二年春三月從杜重威北征解陽城之圍加檢校司徒是歲秋七月詔遣與皇甫遇援糧入易州十一月從杜重威收瀛州聞契丹大至重威率諸軍沿滹水而西將保常山及至中渡橋中渡原本作平渡今從遼史改正影庫本粘籤契丹已屯於北岸自其月二十七日至十二月五日軍不能解時戎王至留騎之精者以禦我分其弱者自故靈都城緣其山足涉滹沱之淺處引衆而南至趙郡凡百餘里斷我飛挽且扼歸路清知勢謂重威曰軍去常山五里守株於此營孤食盡將若之何請以步兵二千為前鋒奪橋開路公可率諸軍繼之期入常山必濟矣重威可之遣宋彥筠俱行清一擊獲其橋契丹為之小却重威猶豫不進密已二於國矣彥筠退走清列陳北岸嚴戒部曲日暮酣戰不息契丹以生軍繼至我無寸刃益之清與其下歿焉案通鑑清謂其衆曰上將握兵坐觀吾輩困急而不救此必有異志吾輩當以死報國耳衆感其言莫有退者至暮戰不息契丹以新兵繼之清及衆士盡死由是諸軍皆奪氣舊五代史考異時年五十三契丹尋於所戰之地築一京觀及漢高祖即位使人平之贈清太傅是歲清子守鈞於本邑義化別業招魂以葬之也永樂大典卷六千三百五十一梁漢璋字國寶應州人也少以勇力事唐明宗歷突騎奉德指揮使高祖即位之二年遙領欽州刺史三年加檢校司空改護聖都指揮使七年遷檢校司徒遙領閬州團練使八年授陳州防禦使從少帝澶州還改檢校太保鄭州防禦使充侍衛馬軍都指揮使旋除永清軍兵馬留後俄正授節制是歲詔領千騎戍冀州尋以杜重威北討詔以漢璋充北面馬軍都排陳使遣收淤口關與契丹騎五千相遇於浮陽之北界苦戰竟日以衆寡不侔為疏矢所中歿於陳案遼史高模翰傳云晉以魏府節度使杜重威領兵三十萬來拒模翰以麾下三百人逆戰殺其先鋒梁漢璋餘兵敗走與薛史異考通鑑云杜重威等至瀛州聞契丹將高模翰已引兵潛出重威遣梁漢璋將二千騎追之遇契丹于南陽務敗死蓋漢璋以二千騎當敵騎五千衆寡不侔以致敗績遼史恐不足據舊五代史考異即是歲十一月也時年四十九漢璋熟於戎馬纍有軍功及為藩郡所至好聚斂無善政可紀及鎮甘陵甚有平契丹之志但以所領偏師驟逢勍敵故有是衄焉是月其子海榮進漢璋所乘鞭馬及器仗帝傷之乃贈太尉漢璋有弟漢瑭亦以善用槊有名於時天成中為魏府效節軍使攻定州王都漢瑭督所部一軍首入其城獲王都及蕃將禿餒名馬數駟時范延光鎮常山欲其駿者漢瑭不諾後漢瑭屯兵趙郡因事奏而殺之時人寃之永樂大典卷六千六百十四白奉進字德升雲州清塞軍人也父曰達子世居朔野以弋獵為事奉進少善騎射後唐武皇鎮太原奉進謁於軍門以求自效武皇納於麾下莊宗之破夾寨也奉進挺身首犯賊鋒莊宗覩而壯之後從戰山東河上繼以功遷龍武指揮使同光中魏王繼岌伐蜀擢為親軍指揮使天成長興中統上軍加檢校右散騎常侍應順中轉捧聖右廂都指揮使檢校邢部尚書賜忠順保義功臣遙領封州刺史清泰中加檢校右僕射唐州刺史治郡踰年甚有政績高祖即位徵赴闕超加檢校司徒充護聖左廂都指揮使遙領歙州刺史始奉進有女嫁於皇子重信故高祖尤所倚愛二年改護聖左右廂都指揮使是歲車駕幸夷門五月領昭信軍節度充侍衛馬軍都指揮使六月范延光據鄴為亂詔遣率騎軍三千北屯滑臺時符彥饒為滑州節度使一夕有軍士夜掠居人奉進捕之凡獲五盜三在奉進本軍二在彥饒麾下尋命俱斬之彥饒怒其不先告深銜之明日奉進左右勸奉進面謝奉進然之以從騎數人候彥饒於牙城既入且述其過彥饒曰軍中法令各有部分何得將滑州兵士一例處斬殊無主客之義乎奉進曰軍士抵法寧有彼我今僕以咎自陳而公怒不息莫是與范延光同反耶因拂衣而彥饒不留其帳下介士大譟擒奉進殺之是日步軍都校馬萬次校盧順密聞奉進遇害率其步衆攻滑之子城執彥饒送於京師戮於班荊館北高祖以奉進倉卒遇禍歎惜久之詔贈太傅永樂大典卷一萬八千一百三十一盧順密汶陽人也初事梁將戴思遠為步校思遠為鄆州節度使領部兵屯德勝渡留順密守其城順密覩北軍日盛遂遁歸莊宗且言鄆城方虛可以襲而取之莊宗信之尋遣明宗率衆趨鄆果拔之由順密之始謀也莊宗尋以順密列於帳下纍遷為軍校明宗即位歷數郡刺史順密性篤厚臨諸軍撫百姓皆有仁愛之譽及高祖車駕幸夷門范延光據鄴城叛高祖命諸將相次領軍討之順密亦預其行時騎將白奉進屯於滑州尋為滑帥符彥饒所殺軍衆大亂爭荷戈拔刃噉呼於外時馬萬為步軍都校不為遏之案通鑑云馬萬惶惑不知所為率步兵欲從亂舊五代史考異順密未明其心乃率部曲數百趨謂諸軍及萬曰滑臺去行闕二百里我等家屬在闕下爾輩如此不思血族乎奉進見殺過在彥饒擒送天子必立大功順我者賞之不順我者殺之萬曰善諸軍遂不敢動案通鑑云萬所部兵尚有呼躍者順密殺數人衆莫敢動舊五代史考異乃引軍北攻牙城執彥饒於樓上使裨將方太押送赴闕滑城遂定朝廷即以馬萬為滑州節度使時飛奏皆以萬為首故也後數日高祖知功由順密尋以順密為涇州留後至鎮未幾而卒高祖甚悼之贈驍衛上將軍永樂大典卷二千二百十二周環晉陽人也少端厚善書計自高祖時歷鎮藩翰用為腹心纍職至牙門都校凡帑廩出納咸以委環經十餘年未嘗以微纍見誤高祖甚重之及即位命權判三司事未幾辭曰臣才輕任重懼終不濟苟以避事冒寵獲罪願陛下哀其疲駑優以散秩臣之幸也高祖可之尋命權總河陽三城事數月改授安州節度使臨民有惠御軍甚嚴一境安之先是威和指揮使王暉領部下兵屯於安陸環至鎮待之甚厚俄聞范延光叛於魏博張延賓寇於汜水暉以環高祖之元臣也幸國朝方危遂害環於理所自總州事以為延光勝則附之敗則渡江而遁斯其計也既而襄陽安從進遣行軍司馬張朏會復州兵於要路以徼之李金全承詔繼至暉遂掠城中財帛士女欲奔江南尋為其下所殺案歐陽史作王暉南走為從進兵所殺與薛史異通鑑作暉時奔吳部將胡進殺之與薛史同舊五代史考異金全至盡誅其黨高祖聞環遇害歎息久之詔贈太傅永樂大典卷九千九百十沈贇字安時徐州下邳人少有膽氣初事梁太祖為小校天祐三年補同州左崇勇馬軍指揮使入典衛兵歷龍驤拱宸都指揮使纍有戰功及莊宗平梁隨段凝等降不改其職同光三年從魏王繼岌平蜀屬康延孝叛魏王署贇為一行馬步都虞候領兵從任圜襲擊延孝於漢州擒之以獻未及策勳會明宗登極天成初授檢校司空虢州刺史其後歷壁隨石衛威衍欣趙八州刺史纍官至檢校太保賜輸忠宣力功臣開運元年為祁州刺史其年冬契丹入寇自恆州回以羸兵驅牛羊過其城下贇乃出州兵以擊之契丹以精騎剗其門邀之州兵陷賊案歐陽史作贇兵多死通鑑作契丹以精騎奪其城門州兵不得還舊五代史考異趙延壽知其無備與蕃賊急攻之仍呼謂贇曰沈使君我故人也擇禍莫若輕早以城降無自辱也贇登城呼曰侍中父子誤計陷於契丹忍以羶幕之衆殘害父母之邦不自羞慚反有德色沈贇寧為國家死必不效汝所為也翌日城陷贇自剄而卒家屬為賊所虜永樂大典卷一萬八千一百三十一吳巒字寶川汶陽盧縣人也少好學以經業從鄉試下第唐長興初為沙彥珣從事纍遷大同軍節度判官高祖建號契丹之援太原也彥珣據雲中二三顧望及契丹還塞彥珣出城迎謁尋為所虜時巒在城中謂其衆曰豈有禮義之人而臣於異姓乎即與雲州將吏闔門拒守契丹大怒攻之半歲不能下高祖致書於契丹乃解圍而去案遼史太宗紀云唐大同軍節度判官吳巒嬰城拒命遣崔廷勳圍其城庚申上親征至城下諭之巒降與薛史異通鑑從薛史舊五代史考異召巒歸闕授徐州節度使再遷右諫議大夫為復州防禦使數年罷歸初國家以甘陵水陸要衝之地慮契丹南侵乃飛挽芻粟以實其郡為大軍纍年之備王令溫之為帥也有軍校邵珂者性凶率悖慢令溫因事使人代之不復齒用間居城中其子殺人以重賂償之其事方解尋為州吏所恐又悉財以彌其口自是尤蓄怨恨因使無賴者亡入契丹言州有積粟內無徑兵圍而攻之克之必矣及令溫入朝執政者以巒雲中之難有善守之功遂令乘軺而往權知貝州軍州事既至會大寒軍士無衣者悉衣之平生廉儉囊無資用以至壞帳幕以賙之其推心撫士如此邵珂一見因求自效即聽而任之巒素為書生旁無爪牙珂慷慨自陳願效死左右巒遣督義兵守城之南門天福九年正月契丹大至其一日大譟環其城明日陳攻具於四墉三日契丹主躬率步奚及渤海夷等四面進攻巒衆投薪於夾城中繼以炬火賊之梯衝焚爇殆盡是日賊復合圍郡中丁壯皆登城守陴俄而珂自南門引賊騎同入巒守東門未知其事左右告曰邵珂背矣巒顧城中已亂即馳馬還公館投井而死契丹遂屠其城朝野士庶聞者咸歎惜之永樂大典卷二千三百二十一翟璋未詳何許人也好勇多力時目為大蟲即癡虎之稱也後唐天成初自鄴都馬步軍都指揮使領平州刺史尋改復州防禦使三年三月遷新州威塞軍兩使留後新州原本作親州今從歐陽史改正影庫本粘籤四年五月正授旄節長興元年二月加檢校太保入為右領軍衛上將軍轉左羽林統軍清泰中復領新州高祖建義割新州屬契丹時契丹大軍歸國遣璋於管內配率犒宴之資須及十萬緡山後地貧民不堪命始戎王以軟語撫璋璋謂必得南歸及委璋平叛奚圍雲州皆有功故留之不遣璋鬱鬱不得志遇疾尋卒焉永樂大典卷二萬二千三百四十程福贇未詳何許人也性沉厚有勇力纍為軍校天福七年冬杜重威討鎮州與安重榮大戰於宗城以功遷洺州團練使檢校太保未幾入為奉國左廂都指揮使九年春少帝將幸澶淵福贇部下有軍士文榮等八人潛謀作亂於本營縱火福贇尋領腹心之士撲滅之福贇亦有所傷福贇性本純厚又以車駕順動祕而不奏同列李殷居福贇下無名欲危福贇以自升遂密陳其事云福贇若不為亂何得無言少帝至封丘出福贇為商州刺史尋下獄鞫之福贇終不自明以至見殺人甚寃之永樂大典卷一萬八千一百二十七郭璘邢州人也初事後唐明宗漸升為軍校天福中為奉國指揮使歷數郡刺史開運中移領易州契丹攻其郡璘率厲士衆同其甘苦敵不能克復以州兵擊賊數獲其利朝廷嘉之就加檢校太保契丹主嘗謂左右曰吾不畏一天下乃為此人抑挫重威降契丹使通事耿崇美誘其民衆璘不能制既降為崇美所害漢高祖即位詔贈太傅永樂大典卷二萬二千一百六十一史臣曰觀前代人臣之事迹多矣若乃世道方泰則席寵恃祿者實繁世運既屯則效死輸忠者無幾如皇甫遇憤激而沒王清以血戰而亡近世以來幾人而已其或臨難捐軀或守方遇害比夫惑妖豔以喪其命因醇酎以亡其身者蓋相去之遠矣唯順密遏滑臺之肇亂救晉室之臨危亦可謂之忠矣永樂大典卷二萬二千一百六十一
