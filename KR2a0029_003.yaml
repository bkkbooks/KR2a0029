body:
  text: 舊五代史卷三梁書三太祖紀第三開平元年正月丁亥帝回自長蘆次于魏州節度使羅紹威以帝回軍羅紹威原本作昭威今據歐陽史改正影庫本粘籤慮有不測之患由是供億甚至因密以天人之望切陳之帝雖拒而不納然心德之冊府元龜卷一百八十七壬寅帝至自長蘆是日有慶雲覆於府署之上冊府元龜卷二百三甲辰天子遣御史大夫薛貽矩來傳禪代之意永樂大典卷五千一百四十九貽矩謁帝陳北面之禮帝揖之升階貽矩曰殿下功德及人三靈所卜已定皇帝方議裁詔行舜禹之事臣安敢違既而拜伏於砌下帝側躬以避之冊府元龜卷一百八十七二月戊申帝之家廟棟間有五色芝生焉狀若芙蓉紫煙蒙護數日不散又是月家廟第一室神主上有五色衣自然而生識者知梁運之興矣永樂大典卷一萬七千一百六十七唐乾符中木星入南斗數夕不退諸道都統晉國公王鐸觀之問諸知星者吉凶安在咸曰金火土犯斗即為災唯木當為福耳或亦然之時有術士邊岡者洞曉天文博通陰陽曆數之妙窮天下之奇祕有先見之明雖京房管輅不能過也鐸召而質之岡曰惟木為福神當以帝王占之然則非福於今必當有驗於後未敢言之請他日證其所驗一日又密召岡因堅請語其詳至於三四岡辭不獲鐸乃屏去左右岡曰木星入斗帝王之兆也木在斗中朱字也以此觀之將來當有朱氏為君者也天戒之矣且木之數三其禎也應在三紀之內乎鐸聞之不復有言冊府元龜卷二百三天后朝有讖辭云首尾三鱗六十年兩角犢子自狂顛龍蛇相鬬血成川當時好事者解云兩角犢子牛也必有牛姓干唐祚故周子諒彈牛仙客李德裕謗牛僧孺皆以應圖讖為辭然朱字牛下安八牛下安八原本作牛不安八今據文改正影庫本粘籤八即角之象也故朱滔朱泚構喪亂之禍冀無妄之福豈知應之帝也永樂大典卷一萬九千三百九十六四月唐帝御札敕宰臣張文蔚等備法駕奉迎梁朝通鑑考異引薛史宋州刺史王臯進赤烏一雙又宰臣張文蔚正押傳國寶玉冊金寶及文武羣官諸司儀仗法物及金吾左右二軍離鄭州丙辰達上源驛是日慶雲見冊府元龜卷二百三令曰王者創業興邦立名傳世必難知而示訓從易避以便人案原本有闕文或稽其符命應彼開基之義垂諸象德之言爰考簡書求於往代周王昌發之號漢帝詢衎之文或從一德以徽稱或為二名而更易先王令典布在縑緗寡人本名兼于二字且異帝王之號仍兼避易之難郡職縣官多須改換況宗廟不遷之業憲章百世之規事叶典儀豈憚革易寡人今改名晃是以天意雅符於明德日光顯契於瑞文昭融萬邦理斯在是庶順玄穹之意永臻康濟之期宜令有司分告天地宗廟其舊名中外章疏不得更有回避冊府元龜卷一百八十二時將受禪下教以本名二字異帝王之稱故改名通鑑注引薛史己未賜文武百官一百六十人本色衣一副冊府元龜卷一百九十七戊辰即位制曰王者受命於天光宅四海祗事上帝寵綏下民革故鼎新諒曆數而先定創業垂統知圖籙以無差神器所歸祥符合應是以三正互用五運相生前朝道消中原政散瞻烏莫定失鹿難追朕經緯風雷沐浴霜露四征七伐垂三十年糾合齊盟翼戴唐室隨山刊木罔憚胼胝投袂揮戈不遑寢處洎玄穹之所贊知唐運之不興莫諧輔漢之謀徒罄事殷之禮事殷原本作事般今據文改正影庫本粘籤唐主知英華已竭算祀有終釋龜鼎以如遺推劍紱而相授朕懼德弗嗣執謙允恭避駿命於南河眷清風於潁水而乃列嶽羣后盈廷庶官東西南北之人斑白緇黃之衆謂朕功蓋上下澤被幽深宜應天以順時俾化家而為國拒彼億兆至於再三且曰七政已齊萬幾難曠萬幾原本作萬機今據文改正影庫本粘籤勉遵令典爰正鴻名告天地神祇建宗廟社稷顧惟涼德曷副樂推栗若履冰懍如馭朽金行啓祚玉曆建元方弘經始之規宜布惟新之令可改唐天祐四年為開平元年國號大梁書載虞賓斯為令範詩稱周客蓋有明文是用先封以禮後嗣宜以曹州濟陰之邑奉唐主封為濟陰王凡曰軌儀並遵故實姬庭多士比是殷臣楚國羣材終為晉用歷觀前載自有通規但遵故事之文勿替在公之效應是唐朝中外文武舊臣見任前資官爵一切仍舊凡百有位無易厥章陳力濟時盡瘁事我古者興王之地受命之邦集大勳有異庶方霑慶澤所宜加等故豐沛著啓祚之美穰鄧有建都之榮用壯鴻基且旌故里爰遵令典先示殊恩宜升汴州為開封府建名東都其東都改為西都仍廢京兆府為雍州佑國軍節度使案五代會要四月改京兆府為大安府長安縣為大安縣萬年縣為大年縣仍置佑國軍節度使額始命韓建為佑國軍節度使舊五代史考異是日大酺賞賜有差永樂大典卷五千一百四十九案通鑑甲辰唐昭宣帝降御札禪位於梁以攝中書令張文蔚為冊禮使禮部尚書蘇循副之攝侍中楊涉為押傳國寶使翰林院學士張策副之御史大夫薛貽矩為押金寶使尚書左丞趙光逢副之帥百官備法駕詣大梁甲子張文蔚楊涉乘輅自上源驛至從冊寶諸司各備儀衛鹵簿前導百官從其後至金祥殿前陳之王被衮冕即皇帝位張文蔚蘇循奉冊升殿進讀楊涉張策薛貽矩趙光逢以次奉寶升殿讀已降帥百官舞蹈稱賀帝遂與文蔚等宴於玄德殿帝舉酒曰朕輔政未久此皆諸公推戴之力文蔚等慚懼俯伏不能對獨蘇循薛貽矩及刑部尚書張褘盛稱帝功德宜應天順人案朱梁篡位之事薛史應為詳載今全篇不可得見謹附録通鑑於此宋州刺史王臯進兩歧麥陳州袁象先進白兔一付史館編録兼示百官冊府元龜卷二百二詔在京百司及諸軍州縣印一例鑄換其篆文則各如舊冊府元龜卷一百九十一辛未武安軍節度使馬殷進封楚王冊府元龜卷一百九十六以太府卿敬翔知崇政院翔與帷幄之謀故首擢焉永樂大典卷一萬二千一百十三追尊四代廟號高祖媯州府君上諡曰宣元皇帝廟號肅祖太廟第一室陵號興極陵祖妣高平縣君范氏追諡宣僖皇后皇曾祖宣惠王上諡曰光獻皇帝廟號敬祖第二室陵號永安祖妣秦國夫人楊氏追諡光孝皇后皇祖武元王上諡曰昭武皇帝廟號憲祖第三室陵號光天祖妣吳國夫人劉氏追諡昭懿皇后皇考文明王上諡曰文穆皇帝廟號烈祖第四室陵號咸寧皇妣晉國太夫人王氏追諡文惠皇后冊府元龜卷一百八十九以宣武節度副使皇子友文為開封尹判建昌院事判建昌院事原本缺昌字今據文增入影庫本粘籤友文本康氏子也帝養以為子永樂大典卷一萬二千一百十三是月制宮殿門及都門名額正殿為崇元殿東殿為玄德殿內殿為金祥殿萬歲堂為萬歲殿門如殿名冊府元龜卷一百九十六帝自謂以金德王又以福建上獻鸚鵡諸州相繼上白烏白兔洎白蓮之合蒂者以為金行應運之兆故名殿曰金祥通鑑注引薛史以大內正門為元化門皇牆南門為建國門滴漏門為啓運門下馬門為升龍門玄德殿前門為崇門正殿東門為金烏門西門為玉兔門正衙東門為崇禮門東偏門為銀臺門宴堂門為德陽門天王門為賓天門皇牆東門為寬仁門浚儀門為厚載門皇牆西門為神獸門望京門為金鳳門宋門為觀化門尉氏門為高明門鄭門為開明門梁門為乾象門酸棗門為興和門封丘門為含耀門曹門為建陽門升開封浚儀為赤縣尉氏封丘雍丘陳留為畿縣永樂大典卷三千五百二十案五代會要四月改左右長直為左右龍虎軍左右內衙為左右羽林軍左右堅鋭夾馬突將為左右神武軍左右親隨軍將馬軍為左右龍驤軍舊五代史考異五月以唐朝宰臣張文蔚楊涉並為門下侍郎平章事以御史大夫薛貽矩為中書侍郎平章事冊府元龜卷一百九十九帝初受禪求理尤切委宰臣搜訪賢良或有在下位抱負器業久不得伸者特加擢用有明政理得失之道規救時病者可陳章疏當親鑒擇利害施行然後賞以爵秩有晦跡丘園不求聞達者令彼長吏備禮邀致冀無遺逸之恨冊府元龜卷二百一十三進封河南尹兼河陽節度使張全義為魏王兩浙節度使錢鏐進封吳越王冊府元龜卷一百九十六辛巳有司奏以降誕之日為大明節休假前後各一日永樂大典卷一萬六千一百八十七壬午保義軍節度使朱友謙進百官衣二百副冊府元龜卷一百九十七乙酉立皇兄全昱為廣王皇子友文為博王友圭為郢王友璋為福王友雍為賀王友徽為建王永樂大典卷一萬六千六百二十八案歐陽史封姪友諒衡王友能惠王友誨邵王辛卯以東都舊第為建昌宮改判建昌院事為建昌宮使永樂大典卷一萬二千一百十三初帝創業之時以四鎮兵馬倉庫籍繁因總置建昌院以領之至是改為宮蓋重其事也通鑑注引薛史甲午詔天下管屬及州縣官名犯廟諱者各宜改換城門郎改為門局郎茂州改為汶州桂州慕化縣改為歸化縣潘州茂名縣改為越裳縣冊府元龜卷一百八十九案魏泰東軒筆録京師呼城外為州東州西州南州北而韋城相城胙城等縣但呼韋縣相縣胙縣蓋沿梁時避諱之舊也詔樞密院宜改為崇政院以知院事敬翔為院使永樂大典卷一萬二千一百十三改文思院為乾文院同和院改為佐鸞院案五代會要五月改御食使為司膳使小馬坊使為天驥使舊五代史考異以西都水北宅為大昌宮冊府元龜卷一百九十六廢雍州太清宮改西都太微宮亳州太清宮皆為觀諸州紫極宮皆為老君廟冊府元龜卷一百九十四泉州僧智宣自西域回進辟支佛骨及梵夾經律永樂大典卷二萬一千一百七十五丙申御玄德殿宴犒諸軍使劉捍符道昭已下賜物有差是月青州許州定州三鎮節度使請開內宴各賜方物永樂大典卷一萬六千七百四十六以青州節度使韓建守司徒青州原本誤作清州今據文改正影庫本粘籤平章事帝以建有文武材且詳於稼穡利害軍旅之事籌度經費欲盡詢焉恩澤特異於時罕有比者隨拜為上相賜賚甚厚冊府元龜卷一百九十九宿州刺史王儒進白兔一濮州刺史圖嘉禾瑞麥以進冊府元龜卷二百二廣州進奇寶名藥品類甚多河南尹張全義進開平元年已前羡餘錢十萬貫紬六千匹綿三十萬兩仍請每年上供定額每歲貢絹三萬匹以為常式荊南高季昌進瑞橘數十顆質狀百味百味二字以文義求之當作甘味五代會要亦作百味今姑仍其舊影庫本粘籤倍勝常貢且橘當冬熟今方仲夏時人咸異其事因稱為瑞冊府元龜卷一百九十七案五代春秋五月李思安及晉人戰于潞城思安師敗績冊府元龜引薛史八月始命李思安代帥而五代春秋于五月已書李思安敗績疑有舛誤今仍録五代春秋于六月以前以備參考影庫本粘籤六月幸乾元院宴召宰臣學士及諸道入貢陪臣永樂大典卷一萬六千七百四十六己亥帝御崇元殿內出追尊四廟上諡號玉冊寶共八副宰臣文武百官儀仗鼓吹導引至太廟行事癸卯司天監奏日辰內有戊字請改為武從之冊府元龜卷一百八十九案容齊續筆以為戊類成字故司天諂之殊不知戊字乃避梁祖曾祖茂琳諱非以其類成字也雲谷雜記嘗辨正之今崇福侯廟碑立於開平二年正作武辰可見當時避諱之體癸亥詔以前朝官僚譴逐南荒積年未經昭雪其間有懷抱材器為時所嫉者深負寃抑仍令録其名姓盡復官資兼告諭諸道令津致赴闕如已亡沒並許歸葬以明恩蕩冊府元龜卷一百九十一以西都徽安門北路逼近大內宮垣兼非民便令移自榆林直趣端門之南冊府元龜卷一百九十六改耀州報恩禪院為興國寺冊府元龜卷一百九十四馬殷奏破淮寇靜海軍節度使曲裕卒七月丙申以靜海軍行營司馬權知留後曲皓起復為安南都護充節度使通鑑考異引薛史案五代會要七月敕云建國遷都俾新其制況山河之險表𩹉為防今二京俱在關東以內仍以潼關隸陝州復置河潼軍使命虢州刺史兼領之其月敕改虎牢關為軍仍置虎牢關軍使舊五代史考異己亥案長曆七月不得有己亥今考通鑑亦作七月己亥當是引薛史原文今仍之舊五代史考異追尊皇妣為皇太后永樂大典卷一萬七千二百九十六八月以潞州軍前屯師旅壁壘未收乃別議戎帥於是以亳州刺史李思安充潞州行營都統冊府元龜卷一百九十九敕朝廷之儀封冊為重用報勳烈以隆恩榮固合親臨式光典禮舊章久缺自我復行今後每封冊大臣宜令有司備臨軒之禮永樂大典卷一萬六千七百五十一案五代會要八月敕云諸道所有軍事申奏令直至右銀臺門委客省使晝時引進尋常公事依前四方館收接舊五代史考異甲子平明前老人星見於南極壬申密州進嘉禾又有合歡榆樹並圖形以獻是月隰州奏大寧縣至固鎮上下二百里案前後多作李固鎮疑原本有脫字考通鑑亦間作固鎮蓋當時奏牘省文也今仍之舊五代史考異今月八日黃河清至十月如故冊府元龜卷二百二九月辛丑西京大內放出兩宮內人及前朝宮人任其所適冊府元龜卷一百九十五敕以近年文武官諸道奉使皆於所在分外停住踰年涉歲未聞歸闕非唯勞費州郡抑且侮慢國經臣節既虧憲章安在自今後兩浙福建廣州安南雍容等道使到發許住一月湖南洪鄂黔桂許住二十日荊襄同雍鎮定青滄許住十日其餘側近不過三五日凡往來道路據遠近里數日行兩驛如遇疾患及江河阻隔委所在長吏具事由奏聞如或有違當行朝典命御史點檢糾察以警慢官冊府元龜卷一百九十一魏博羅紹威二男廷望廷矩年在幼稚皆有材器帝以其藩屏勳臣之胄宜受非次之用皆擢為郎恩命即行之後二子亦就班列紹威乃上章以齒幼未任公事乞免主印宿直從之冊府元龜卷二百一十浙西奏道門威儀鄭章道士夏隱言焚修精志妙達希夷推諸輩流實有道業鄭章宜賜號貞一大師仍名玄章隱言賜紫衣冊府元龜卷一百九十四案五代會要九月置左右天興左右廣勝軍仍以親王為軍使舊五代史考異十月帝以用軍未暇西幸文武百官等久居東京漸及疑訝令就便各許歸安只留韓建薛貽矩翰林學士張策韋郊杜曉中書舍人封舜卿張袞並左右御史司天監宗正寺兼要當諸司節級外其宰臣張文蔚已下文武百官並先於西京祗候冊府元龜卷二百五庚午大明節內外臣僚各以奇貨良馬上壽故事內殿開宴召釋道二教對御談論宣旨罷之命閣門使以香合賜宰臣佛寺行香永樂大典卷一萬六千四百八十七駕幸繁臺講武永樂大典卷一萬六千八百三癸酉御史司憲薛廷圭奏請文武百官仍舊朝參先是帝欲親征河東命朝臣先赴雒都至是緩其期乃允所奏宰臣請每月初入閣望日延英聽政永為常式冊府元龜卷一百九十七山南東道節度使楊師厚進納趙匡凝東第書籍先是收復襄漢帝閲其圖書至是命師厚進焉冊府元龜卷一百九十四廣州進獻助軍錢二十萬又進龍腦腰帶珍珠枕玳瑁香藥等冊府元龜卷一百九十七十一月壬寅帝以征討未罷調補為先遂命盡赦逃亡背役髠黥之人各許歸鄉里冊府元龜卷一百九十五廣州進龍形通犀腰帶金托𩹉含稜玳瑁器百餘副香藥珍巧甚多冊府元龜卷一百九十七廣南管內獲白鹿並圖形來獻耳有兩缺按符瑞圖鹿壽千歲變白耳一缺今驗此鹿耳有二缺其獸與色皆應金行實表嘉瑞冊府元龜卷二百二十二月辛亥詔曰潞寇未平王師在野攻戰之勢難緩於寇圍飛挽之勤實勞於人力永言輟耒深用軫懷宜令長吏丁寧布告期以兵罷之日給復賦租於是人戶聞之皆忘其倦冊府元龜卷一百九十五詔故荊南節度使守中書令上谷王周汭贈太師故武昌軍節度使兼中書令西平王杜洪贈太傅先是鄂渚再為淮夷所侵攻圍甚急杜洪以兵食將盡繼來乞師帝料其隔越大江難以赴援兼以荊州據上游多戰艦去江夏甚邇因命周汭舉舟師沿流以救之薛史本紀仍當時詔誥之文稱成汭為周汭列傳仍作成汭謹附識于此影庫本粘籤汭於是引兵東下才及鄂界遇朗州背盟作亂乘江陵之虛縱兵襲破之俘掠且盡既而汭士卒知之皆顧其家咸無鬬志遂為淮寇所敗將卒潰散汭盆恚自投於江汭之本姓犯文穆皇帝廟諱至是因追贈以其系出周文故賜姓周氏案薛史本傳仍作成汭舊五代史考異及汭兵敗之後武昌以重圍經年糧盡力困救援不至訖為淮寇所陷載洪以送淮師淮師原本作淮賜今據文改正影庫本粘籤遂殺之此二鎮也皆以忠貞歿於王事帝每言諸藩屏翰經綸之業必首痛汭洪之薨至是追贈之深加軫悼各以其子孫宗屬録用焉冊府元龜卷二百一十棣州蒲臺縣百姓王知嚴妹以亂離併失怙恃因舉哀追感自截兩指以祭父母帝以遺體之重不合毀傷言念村閭何知禮教自今後所在郡縣如有截指割股不用奏聞是年諸道多奏軍人百姓割股青齊河朔尤多帝曰此若因心亦足為孝但苟免徭役自殘肌膚欲以庇身何能療疾並宜止絶冊府元龜卷一百九十一案五代會要十二月于輝州碭山縣崇德軍太祖榆社在碭山置使以領之始命朱彥讓為軍使舊五代史考異
