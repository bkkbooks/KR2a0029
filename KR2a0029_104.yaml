body:
  text: 舊五代史卷一百四漢書六后妃列傳第一高祖皇后李氏晉陽人也高祖微時嘗牧馬於晉陽別墅因夜入其家劫而取之及高祖領藩鎮累封魏國夫人高祖建義於太原欲行頒賚於軍士以公帑不足議率井邑助成其事后聞而諫曰自晉高祖建義及國家興運雖出於天意亦土地人民褔力同致耳未能惠其衆而欲奪其財非新天子卹隱之理也今後宮所積宜悉以散之設使不厚人無怨言高祖改容曰敬聞命矣遂停斂貸之議后傾內府以助之中外聞者無不感悅天褔十二年冊為皇后隱帝即位尊為皇太后永樂大典卷一萬六千三百九十案以下疑有闕文據通鑑云隱帝與李業等謀誅楊邠等議既定入白太后太后曰茲事何可輕發更宜與宰相議之業時在旁曰先帝嘗言朝廷大事不可謀及書生懦怯誤人太后復以為言帝忿曰國家之事非閨門所知拂衣而出又云南北軍遇於劉子陂帝欲自出勞軍太后曰郭威吾家故舊非死亡切身何以至此但按兵守城飛詔諭之觀其志趣必有辭理則君臣之禮尚全慎勿輕出帝不從薛史載於李業傳當係史家前後省文周太祖入京凡軍國大事皆請后發教令以行之是歲議立徐州節度使贇為帝案通鑑考異引隱帝實錄云初議立徐帥太后遣中使馳諭劉崇請崇入纘大位崇知立其子上章謙遜以當日事理推之既召湘陰不應復召崇疑傳聞之誤舊五代史考異以迎奉未至周太祖乃率羣臣拜章請后權臨朝聽政后於是稱誥焉及周太祖為六軍推戴上章具述其事且言願事后為慈母后下誥答曰侍中功烈崇高德聲昭著翦除禍亂安定乾坤謳歌有歸歷數攸屬所以軍民推戴億兆同歡老身未終殘年屬茲多難惟以衰朽託於始終載省來牋如母見待感念深意涕泗橫流云乃出戎衣玉帶以賜周太祖周太祖即位上尊號曰德聖皇太后居於太平宮周顯德元年春薨永樂大典卷一萬七千三百一十二案隱帝未立皇后據薛史張彥成傳云隱帝娶彥成女楊邠傳云隱帝所愛耿夫人欲立為后邠以為太速夫人卒隱帝欲以后禮葬邠又止之蓋隱帝在位三年崩時年二十故未及冊立皇后也又五代會要載漢高祖長女永寧公主降宋延渥天褔十二年四月封至乾祐二年十二月追封秦國長公主通鑑以永寧公主為晉高祖女蓋誤又王禹偁小畜集宋公神道碑云漢高祖領侍衞軍朝望甚重以公名家子又後唐之出也風骨俊秀異乎諸孤命長子承訓奉書于貴主先以襲衣名馬遺焉承訓即漢之開封尹魏王也公與貴主拒而不納漢祖又敕其子曰宋氏不諧勿復見我矣貴主知志不可奪遂許之延渥唐義寧公主之子也孔子
