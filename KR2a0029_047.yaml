body:
  text: 舊五代史卷四十七唐書二十三末帝紀中清泰二年春正月丙申朔帝御明堂殿受朝賀仗衛如式乙巳中書門下奏遇千春節凡刑獄公事奏覆候次月施行今後請重繫者即候次月輕繫者即節前奏覆決遣從之戊申宗正寺奏北京應州曹州諸陵望差本州府長官朝拜案五代會要載宗正寺原奏云北京永興長寧建極三陵應州遂衍奕三陵準曹州溫陵例下本州府官朝拜是曹州先以府官朝拜北京應州後從其例也薛史刪併原文似未分晰雍坤和徽四陵差太常宗正卿朝拜從之己酉北京奏光祿卿致仕周元豹卒庚申鄴都進天王甲帝在藩時有相士言帝如毗沙天王帝知之竊喜及即位選軍士之魁偉者被以天王甲俾居宿衛因詔諸道造此甲而進之三司奏添徵蠶鹽錢及增麴價先是麴斤八十文增至一百五十文乙丑雲州節度使張溫移鎮晉州以西京留守安重霸為雲州節度使二月庚午定州節度使兗王從溫移鎮兗州振武軍節度使楊檀移鎮定州兼北面行營馬步都虞候甲戌以安州節度使李周為京兆尹充西京留守以樞密使天雄軍節度使范延光為檢校太師兼中書令充汴州節度使皇子鎮州節度使兼河南尹判六軍諸衛事左右街坊使重美加檢校太尉同平章事充天雄軍節度使餘如故辛巳以右諫議大夫盧損為御史中丞以御史中丞張鵬為刑部侍郎壬午寧遠軍節度使馬存加兼侍中鎮南軍節度使馬希振加兼中書令詔順義軍節度使姚彥璋加兼侍中己丑宰臣盧文紀等上皇妣魯國太夫人尊諡曰宣憲皇太后請擇日册命從之三月戊戌故太子太保趙鳳贈太傅辛丑以前汴州節度使趙延壽為許州節度使兼樞密使以夏州行軍司馬李彝殷為本州節度使本州原本闕本字今從歐陽史增入影庫本粘籤兄彝超卒故也癸卯以靜海軍節度使檢校太師兼中書令安南都護錢元球為留守太保餘如故丙午以給事中趙光輔為右散騎常侍戊申皇妹魏國公主石氏封晉國長公主齊國公主趙氏封燕國長公主己酉有司上言宣憲皇后未及山陵權於舊陵所建廟從之辛亥功德使奏每年誕節諸州府奏薦僧道其僧尼欲立講論科講經科表白科文章應制科持念科禪科聲贊科道士欲立經法科講論科文章應制科應制原本脫制字今據册府元龜增入影庫本粘籤表白科聲贊科焚修科以試其能否從之丙辰以右龍武統軍李德珫為涇州節度使庚申以鎮州節度使知軍府事董溫琪為鎮州節度使檢校太保壬戌以左右彰聖都指揮使富州刺史安審琦領楚州順化軍節度使軍職如故審琦受閔帝命西征至鳳翔而降故有是命是月太常丞史在德上疏言事其略曰朝廷任人率多濫進稱武士者不間計策雖被堅執鋭戰則棄甲窮則背軍稱文士者鮮有藝能多無士行問策謀則杜口作文字則倩人所謂虛設具員枉耗國力案通鑑注引薛史作枉費考册府元龜亦作枉耗今仍其舊舊五代史考異逢陛下惟新之運是文明革弊之秋臣請應內外所管軍人凡勝衣甲者請宣下本部大將一一考試武藝短長權謀深淺居下位有將才者便拔為大將居上位無將略者移之下軍其東班臣僚請內出策題請內出策題原本脫請字今從通鑑注所引薛史增入影庫本粘籤下中書令宰臣面試如下位有大才者便拔居大位處大位無大才者即移之下僚其疏大約如此盧文紀等見其奏不悅班行亦多憤悱故諫官劉濤楊昭儉等上疏請出在德疏辨可否宣行中書覆奏亦駁其錯誤帝召學士馬裔孫謂曰史在德語太凶其實難容朕初臨天下須開言路若朝士以言獲罪誰敢言者爾代朕作詔勿加在德之罪詔曰左補闕劉濤等奏太常丞史在德所上章疏中書門下駁奏未奉宣諭乞特施行分明黜陟朕常覽貞觀故事見太宗之治理以貞觀升平之運太宗明聖之君野無遺賢朝無闕政盡善盡美無得而名而陝縣丞皇甫德參輒上封章恣行訕謗人臣無禮罪不容誅賴文貞之彌縫恕德參之狂瞽魏徵奏太宗曰陛下思聞得失只可恣其所陳若所言不中亦何損於國家朕每思之誠要言也遂得下情上達德盛業隆太宗之道彌光文貞之節斯著朕惟寡昧獲奉宗祧業業兢兢懼不克荷思欲率循古道簡拔時材懷忠抱直之人虛心渴見便佞詭隨之説杜耳惡聞史在德近所獻陳誠無避忌中書以文字紕繆比類僭差改易人名觸犯廟諱請歸憲法以示戒懲蓋以中書既委參詳合盡事理朕纘承前緒誘勸將來多言數窮雖聖祖之所戒千慮一得冀愚者之可從因覽文貞之言遂寬在德之罪已令停寢不遣宣行劉濤等官列諫垣宜陳讜議請定短長之理以行黜陟之文昔魏徵則請賞德參今濤等請黜在德事同言異何相遠哉將議允俞恐虧開納方朝廷粗理俊畢臻留一在德不足為多去一在德未足為少苟可懲勸朕何憂焉但緣情在傾輸傾輸原本作頃輸據通鑑作傾輸胡三省注云謂傾其胸臆而輸忠于上也今改正影庫本粘籤理難黜責濤等敷奏朕亦優容宜體含弘勉思竭盡凡百在下悉聽朕言夏四月辛巳宰臣判三司張延朗奏州縣官徵科條格其令録在任徵科依限了絶一年加階兩年與試銜三年皆及限了絶與服色攝任者一年內了絶仍攝二年三年內皆及限與真命其主簿同縣令條本判官一年加階二年改試銜三年轉官本曹官省限內了絶與試銜諸節級三年內並了絶者與賞錢三十貫其責罰依天成四年五月五日敕施行從之癸未御史中丞盧損等進清泰元年以前十一年制敕堪悠久施行者三百九十四道編為三十卷其不中選者各令所司封閉不得行用詔其新編敕如可施行付御史臺頒行以宰相盧文紀兼太微宮使弘文館大學士姚顗加門下侍郎監修國史張延朗兼集賢殿大學士張延朗原本作正朗今據薛史列傳改正影庫本粘籤以樞密使韓昭裔為中書侍郎兼兵部尚書平章事乙酉以前武勝軍節度使張萬進為鄜州節度使辛卯案歐陽史作夏五月辛卯通鑑從薛史作四月舊五代史考異以宣徽南院使劉延皓為刑部尚書充樞密使以司天監耿瑗為太府卿以偽蜀右衛上將軍胡杲通為司天監以宣徽北院使房皓為左衛上將軍充宣徽南院使以樞密副使劉延朗為左領軍上將軍充宣徽北院使兼樞密副使五月丙申新州振武奏契丹寇境乙巳詔天下見禁囚徒自五月十二日以前除十惡五逆放火燒舍持仗殺人官典犯贓偽行印信合造毒藥並見欠省錢外罪無輕重一切釋放庚戌詔不得貢奉寶裝龍鳳雕鏤刺作組織之物庚戌庚戌與上文復見疑是衍文或有舛誤今無別本可考姑仍其舊附識于此影庫本粘籤中書奏準敕凡廟諱但回避正文其偏旁文字不在減少點畫今定州節度使楊檀檀州金壇等名酌情制宜並請改之其表章文案偏旁字闕點畫凡臣僚名涉偏旁亦請改名詔曰偏旁文字音韻懸殊止避正呼不宜全改楊檀賜名光遠餘依舊甲寅以戶部侍郎楊凝式為祕書監以尚書禮部侍郎盧導為尚書右丞以尚書右丞鄭韜光為尚書左丞丙辰以端明殿學士李專美為兵部侍郎以端明殿學士李嵩為戶部侍郎以翰林學士馬裔孫為禮部侍郎以禮部郎中充樞密院直學士呂琦為給事中並充職如故太子少保致仕任圜贈尚書右僕射以順化軍節度使兼彰聖都指揮使北面行營排陳使安審琦為邢州節度使邢州原本作鄧州今從歐陽史改正影庫本粘籤庚申以兵部尚書李鏻為太常卿以禮部尚書王權為戶部尚書以太常卿李懌為禮部尚書癸亥以六軍諸衛判官給事中張允為右散騎常侍六月甲子朔新州上言契丹入寇乙丑有司上言宣憲皇太后陵請以順為名從之振武奏契丹二萬騎在黑榆林丁卯以太子少保致仕朱漢賓卒廢朝壬申命史官修撰明宗實録契丹寇應州以新州節度使楊漢賓為同州節度使以前晉州節度使翟璋為新州節度使庚辰北面招討使趙德鈞奏行營馬步軍都虞候定州節度使楊光遠行營排陳使邢州節度使安審琦帥本軍至易州見進軍追襲契丹次河東節度使石敬瑭奏邊軍乏芻糧其安重榮巡邊兵士欲移振武就糧從之尋又奏懷孟租稅懷孟原本作瓌盂今從册府元龜改正影庫本粘籤請指揮於欣代州輸納朝廷以邊儲不給詔河東戶民積粟處量事抄借仍於鎮州支絹五萬匹送河東充博采之直是月北面轉運副使劉福配鎮州百姓車子一千五百乘運糧至代州時水旱民飢河北諸州困於飛挽逃潰者甚衆軍前使者繼至督促糧運由是生靈咨怨辛巳詔諸州府署醫博士丙戌以前許州節度使李從昶為右龍武統軍以前彰國軍節度使沙彥珣為右神武統軍秋七月丙申石敬瑭奏斬挾馬都指揮使李暉等三十六人以謀亂故也時敬瑭以兵屯欣州一日軍士喧譟遽呼萬歲乃斬暉等以止之案契丹國志契丹屢攻北邊時石敬瑭將大兵屯欣州潞王遣使賜軍士夏衣傳詔撫諭軍士呼萬歲者數四敬瑭懼幕僚段希堯請誅其倡者敬瑭命劉知遠斬三十六人以殉潞王聞益疑之舊五代史考異御史中丞盧損奏準天成二年七月敕每月首十五日入閣罷五日起居臣以為中旬排仗有勞聖躬請只以月首入閣五日起居依舊又準天成三年五月長興二年七月敕許諸州節度使帶使相歲薦僚屬五人餘薦三人防禦團練使薦二人今乞行釐革又長興二年八月敕州縣佐官差充馬步判官仍同一任乞行止絶依舊衙前選補詔曰今後藩臣帶使相許薦三人餘薦二人直屬京防禦團練使薦一人餘並從之丁酉回紇可汗仁美遣使貢方物西京弓弩指揮使任漢權奏六月二十一日與川軍戰於金州之漢陰王師不利其部下兵士除傷痍外已至鳳翔先是盩厔鎮將劉贇引軍入川界為蜀將全師郁所敗金州都監崔處訥重傷諸州屯兵潰散金州防禦使馬全節收合州兵金州原本作全川今從歐陽史改正影庫本粘籤固守獲全以樞密使劉延皓為天雄軍節度使甲辰以右神武統軍沙彥珣權知雲州乙巳以徐州節度使張敬達充北面行營副總管時契丹入邊石敬瑭屢請益兵朝廷軍士多在北鄙俄聞欣州諸軍呼譟帝不悅乃命敬達為北軍之副以減敬瑭之權也丁巳宰臣盧文紀等上疏其略曰臣近蒙召對面奉天旨凡軍國庶事利害可否卿等合盡言者臣等謬處台衡奉行制敕但緣事理互有區分軍戎不在於職司錢穀非關於局分苟陳異見即類侵官况才不濟時識非經遠因五日起居之例於兩班旅見之時略獲對揚兼承顧問衛士周環於階陛庶臣羅列於殿庭四面聚觀十手所指臣等苟欲各伸愚短此時安敢敷陳韓非昔懼於説難孟子亦憂於言責臣竊奉本朝政事肅宗初平寇難再復寰瀛頗經涉於艱難尤勤勞於委任每正衙奏事則泛咨訪於羣臣及便殿詢謀則獨對揚於四輔自上元年後於長安東內置延英殿宰臣如有奏議聖旨或有特宣或有特宣原本作或特有宜今據册府元龜改正影庫本粘籤皆於前一日上聞對御之時祗奉冕旒旁無侍衛獻可替否得曲盡於討論捨短從長故無虞於漏泄君臣之際情理坦然伏望聖慈俯循故事或有事關軍國謀繫否臧未果決於聖懷要詢訪於臣輩則請依延英故事前一日傳宣或臣等有所聽聞切關利害難形文字須面敷揚臣等亦依故事前一日請開延英當君臣奏議之時祇請機要臣僚侍立左右兼乞稍霽威嚴恕臣荒拙雖乏鷹鸇之效庶盡葵藿之心詔曰卿等濟代英才鎮時碩德或締搆於興王之日或經綸於纘聖之時鹽梅之任俱崇藥石之言並切請復延英之制以伸議政之規而况列聖遺芳皇朝盛事載詳徵引良切歎嘉恭惟五日起居先皇垂範俟百僚之俱退召四輔以獨升接以溫顏詢其理道計此時作事之意亦昔日延英之流延英原本脫英字今從册府元龜增入影庫本粘籤朕叨獲嗣承切思遵守將成其美不爽兼行其五日起居仍令仍舊尋常公事亦可便舉奏聞或事屬機宜理當祕密量事緊慢不限隔日及當日便可於閣門祗候具榜子奏聞請面敷揚即當盡屏侍臣端居便殿佇聞高議以慰虛懷朕或要見卿時亦令當時宣召但能務致理之實何必拘延英之名有事足可以討論有言足可以陳述陳述原本作陳迹今據册府元龜改正影庫本粘籤宜以沃心為務勿以逆耳為虞勉罄謀猷以裨寡昧帝性仁恕聽納不倦嘗因朝會謂盧文紀等曰朕在藩時人説唐代為人主端拱而天下治蓋以外恃將校內倚謀臣故端拱而事辦朕荷先朝鴻業卿等先朝舊臣每一相見除承奉外略無社稷大計一言相救坐視朕之寡昧其如宗社何文紀等引咎致謝因奏延英故事故有是詔八月庚午滑州節度使高允韜卒壬申以右衛上將軍王景戡為左衛上將軍以右神武統軍婁繼英為右衛上將軍己卯以西上閣門使行少府少監兼通事舍人蘇繼顏為司農卿職如故辛巳以權知雲州右神武統軍沙彥珣為雲州節度使鄴都殺人賊陳延嗣並母妹妻等並棄市延嗣父子相承與其妹妻於諸州郡誘人殺之而奪其財前後被殺者數百人至是事泄而誅之癸未以前潞州行軍司馬陳元為將作監以元善醫故有是命丁亥以洺州團練使李彥舜為義武軍節度使檢校太傅太原奏達靼部族於靈邱安置己丑以太子少保致仕戴思遠卒廢朝庚寅以前兗州節度使楊漢章為左神武統軍以前邢州節度使康思立為右神武統軍潞州奏前雲州節度使安重霸卒九月己亥以河陽節度使侍衛馬軍都指揮使安從進為襄州節度使以襄州節度使趙在禮為宋州節度使癸卯以忠正軍節度使侍衛步軍都指揮使宋審虔為河陽節度使案原本脫虔字今據通鑑增入舊五代史考異典軍如故己酉禮部貢院奏進士請夜試童子依舊表薦重置明算道舉舉人落第後別取文解五科試紙不用中書印用本司印並從之以宣徽南院使房皓為邢部尚書充樞密使案歐陽史作邢部尚書房皓為樞密使據薛史皓由宣徽南院使遷授非先為邢部尚書也舊五代史考異以宣徽北院使充樞密副使劉延朗為宣徽南院使充樞密副使丙辰以左僕射李愚卒廢朝冬十月丁卯幸崇道宮甘泉亭己巳以左衛上將軍李頃為左領軍上將軍北面行營總管石敬瑭奏自代州歸鎮庚午以晉州節度使張溫卒廢朝甲戌幸趙延壽張延朗第丁丑以端明殿學士兵部侍郎李專美為祕書監充宣徽北院使庚寅以左諫議大夫唐汭為左散騎常侍十一月庚子以左驍衛上將軍郝瓊為左金吾上將軍以光祿卿王玫為太子賓客以徐州節度使張敬達為晉州節度使依前充大同振武威塞彰國等軍兵馬副總管丁未以祕書少監丁濟為太子詹事乙卯以前金州防禦使馬全節為滄州留後案通鑑劉延朗欲除全節絳州刺史羣議沸騰帝聞之以為橫海留後舊五代史考異渤海國遣使朝貢案歐陽史渤海遣使者來繫於九月之後據薛史則事在十一月非九月也舊五代史考異案歐陽史作九月乙卯渤海遣使者來五代會要作十二月渤海遣使列周卿等入朝貢方物俱與是書作十一月異殿本十二月戊辰禁用鉛錢壬申以中書侍郎兼兵部尚書充樞密使韓昭裔為檢校司空同平章事充河中節度使甲戌以宗正少卿李延祚為將作監致仕丁丑故武安軍州節度使纍贈太傅劉建峯贈太尉劉建峯原本作逮崇今從新唐書改正影庫本粘籤從湖南之請也戊寅太常奏來年正月一日上辛祀昊天上帝於圓丘依禮大祠不朝詔曰祀事在質明前儀仗在日出後事不相妨宜依常年受朝壬午以翰林學士承旨戶部侍郎程遂為兵部侍郎翰林學士工部侍郎崔梲為戶部侍郎案原本訛崔穭今據歐陽史改正舊五代史考異翰林學士中書舍人和凝為工部侍郎並依前充職乙酉以前祕書監楊凝式為兵部侍郎己丑以前同州節度使馮道為司空以尚書右僕射劉昫為左僕射以太子少師盧質為右僕射以兵部侍郎馬縞兼國子祭酒永樂大典卷七千一百七十四
