body:
  text: 舊五代史卷二十一梁書二十一列傳第十一龐師古曹州南華人初名從以中涓從太祖性端願未嘗離左右及太祖鎮汴樹置戎伍始得馬五百匹即以師古為偏將援陳破蔡纍有戰功及朱珍以罪誅遂用師古為都指揮使乃渡淮餉軍于廬壽攻滁州破天長下高郵沿淮轉戰所至克捷尋代朱友裕領軍攻下徐州斬時溥首以獻遂移軍伐兗州入中都寨于梁山敗朱瑄之衆襲至壘下又破朱瑾于清河從討汶陽與朱瑄朱瑾及晉將史儼兒史儼兒通鑑作史儼此傳作儼兒與本紀同今仍其舊影庫本粘籤戰于故樂亭大捷而回乾寧四年正月復統諸軍伐鄆拔之擒其帥朱瑄以獻始表為天平軍節度留後尋授徐州節度使案文苑英華有授龐從武寧平南節度改名師古制張玄晏之辭也中云自委之留事頒我詔條惠愛行於鄉閭威望揚于士伍是宜錫以旗幢進其官秩奄有徐夷之四境爰撫大彭之故都是師古先為留後繼授節度也通鑑止作留後誤官至檢校司徒乾寧四年八月與葛從周分統大軍渡淮以伐楊行密十一月師古寨於清口寨地卑下案玉堂閒話云龐從會軍五萬于清口所屯之地蓋兵書謂之絶地人不駕肩行一舍方至夷坦之處舊五代史考異或請遷移弗聽俄有告淮人决上流者曰水至矣師古怒其惑衆斬之案九國志侯瓚傳時兵起倉卒加以陰寒士皆飲冰餐雪而行甫及梁營則豎戈植足鬬志未决朱瑾與瓚率五十騎潛濟淮入自壘北舞槊而馳囂聲雷沸梁兵皆殞眩不能舉遂斬龐從大將繼之死者大半是清口之戰因雪夜不備而敗也薛史以為決淮上流與九國志異新唐書楊行密傳兼用之須臾我軍在淖中莫能戰而吳人襲焉故及於敗師古沒於陳永樂大典卷一萬八千一百二十六霍存洺州曲周縣人性驍勇善騎射在黃巢中已為將領唐中和四年太祖大破巢軍於王滿渡時存與葛從周張歸霸皆自巢軍來降太祖宥而納之其後破王夏寨擊殷鐵林並在戰中尋佐朱珍取滑臺攻淄州取博昌皆預戰立功時蔡賊張晊在汴北存以三千人夕犯其營破之用本部騎兵敗秦賢軍案王虔裕傳作秦宗賢舊五代史考異殺五千人連破四寨盡得其輜重從討盧瑭張晊殪萬餘人存功居多我軍之圍濮州也有賊升眺樓大詬案原本作昭樓今據歐陽史改正舊五代史考異太祖怒甚召存射之矢一發而尸隕其下賞賚甚厚復佐朱珍擒石璠破魏師敗徐戎又佐龐師古至呂梁敗時溥二千餘衆以是纍遷官初王師渡淮乏食不甚利唯存軍戰有功淮賊乃引退太祖之討宿州也葛從周以水壞其垣丁會以師乘其墉存戰壘外敗其軍宿人乃降明年佐郴王友裕擊時溥于碭山破之獲蕃將石君和石君和原本作軍和今從通鑑改正影庫本粘籤等五十人案歐陽史云存代李唐賓攻時溥溥敗碭山存獲其將石君和等五十人梁攻宿州葛從周引水浸之丁會與存戰城下遂下之舊五代史考異是歲復與晉軍戰于馬牢川始入為前鋒出則後拒晉不敢逼乃渡河襲淇門殺三千餘人曹州刺史郭紹賓之來歸也存以師援之遂代其任始朱友裕以大軍伐鄆臨其壁既而師陷圍中以急來告存領二百騎馳赴擊退之太祖喜拔為諸軍都指揮使景福二年春太祖親至曹州留騎軍數千令存將之且曰有急則倍道兼行以赴之俄聞朱瑾領兵二萬入援彭門存乃領騎軍馳赴之與徐兗之衆合戰於石佛山下大敗之存亦中流矢而卒時人稱其忠勇初朱珍李唐賓之歿龐師古代珍存代唐賓戰伐功績多與師古同始遙領韶州牧又改賀州後用為權知曹州刺史官至檢校右僕射及太祖登極屢有征討因起猛士之歎一日幸講武臺閲兵謂諸將曰霍存在朕安有此勞苦耶諸君其思之他日語又如是纍贈官至太保子彥威後唐明宗朝為青州節度使永樂大典卷一萬八千一百二十六符道昭淮西人案歐陽史作蔡州人舊五代史考異性強敏有武略秦宗權用為心膂使監督諸軍後為騎將尤能布陳勇聞於時然剛而無操善迎人意一見若盡肺腑必甚愛其才而道昭之心腹揚矣秦宗權之將敗也有薛潛者薛潛原本作雪潛今從歐陽史改正影庫本粘籤支擘隊伍道昭謂所私曰蔡弱矣乃歸潛潛欲敗復奔洋州依葛佐佐攻興元軍不利復奔於岐宋文通愛之養為己子名繼遠遂易其宗及得軍職悉超儕伍後為巴州刺史又奏為隴州防禦使兼中軍都指揮使太祖迎奉昭宗駐軍於岐下道昭頻領騎士敢鬬戰屢為王師所敗遂來降太祖素聞其名待之甚厚案通鑑李繼昭出降於全忠復姓符名道昭據薛史則道昭在岐自名繼遠非繼昭也通鑑疑傳寫之訛舊五代史考異昭宗反正奏授秦州節度使同平章事遣兵援送不克而還先是李周彝棄鄜州自投歸國署為元帥府行軍左司馬寵冠霸府及道昭至以為右司馬使與周彝同領寇彥卿南大豐閻寶已下大軍伐滄州及太祖幸魏州討牙軍中軍前有魏博將山河營山河營原本作山阿今從通鑑改正影庫本粘籤指揮使左行遷聞府中有變引軍還屯歷亭自稱留後從亂者數萬人道昭佐周彝與彥卿已下大破之殺四萬餘人擒左行遷斬之有史仁遇亦聚徒數萬據高唐又破之擒仁遇以獻乘勝取澶博二州平之復殺萬餘人道昭性勇果多率先犯陳屢有摧失而周彝彥卿犄角繼進連以捷告護兵者上功不實皆以道昭為首太祖陰知之俱不議賞及滄州之圍也不用騎士令道昭牧馬於堂陽太祖受禪後委兵柄與康懷英等攻潞州以蚰蜒塹繚之飛鳥不度既踰歲晉人援至王師大敗道昭為晉軍所殺永樂大典卷一萬八千一百二十七徐懷玉本名琮亳州焦夷縣人少以雄傑自任隨太祖起軍唐中和末從至大梁光啓初蔡寇屯金堤驛懷玉將輕騎連破之由是纍遷親從副將改左長劍都虞候又從破蔡賊於板橋收秦宗權八寨奏加檢校右散騎常侍文德初同諸軍解河陽之圍復從破徐宿乾寧中奏加檢校刑部尚書太祖賜名懷玉破朱瑾於金鄉南擒宗江以獻表授金紫光祿大夫檢校右僕射乾寧四年龐師古失利於清口懷玉獨完軍以退光化初轉滑州右都押牙兼右步軍指揮使俄奏授沂州刺史沂州原本作欣州今從歐陽史改正影庫本粘籤頃之王師範以青州叛屢出兵侵軼懷玉擊退之天復四年轉齊州防禦使加檢校司空從大軍迎駕於岐下歸署華州觀察留後一年復領所部兵戍雍州尋召赴河中補晉絳同華五州馬步都指揮使天祐三年授左羽林統軍案歐陽史作右羽林統軍舊五代史考異轉右龍虎統軍領六軍之士赴澤州尋為晉軍所攻晝夜衝擊穴地而入懷玉率親兵逆殺於隧中晉軍遂退開平元年授曹州刺史加檢校司徒明年除晉州刺史其秋晉軍大至已乘其墉懷玉選親兵五十餘人擁殺下城晉軍既退出家財以賞戰士歲中晉軍又至懷玉領兵敗之於洪洞三年制授鄜坊節度使特進檢校太保練兵繕壁人頗安之加檢校太傅乾化二年庶人友圭既篡立河中朱友謙拒命遣兵襲鄜州懷玉無備尋為河中所虜囚於公館及友圭遣康懷英率師圍河中友謙慮懷玉有變遂害之懷玉材氣剛勇臨陳未嘗折退平生金瘡被體有戰將之名焉永樂大典卷一萬八千一百二十七郭言太原人也家於南陽新野少以力穡養親鄉里稱之唐廣明中黃巢擁衆西犯秦雍言為巢黨所執後從太祖赴汴初為騎軍繼有戰功後擢為裨校言性剛直有權略勤於戎事或以家財分給將士之貧者由是頗得士心屢將兵與蔡寇戰於浚郊每以少擊衆出必勝歸太祖嘉其勇果謂賓佐曰言乃吾之虎侯也時宗權支黨數十萬太祖兵不過數十旅每恨其寡與之不敵一日命言董數千人越河洛趨陝虢招召丁壯以實部伍言夏往冬旋得鋭士萬餘遂遷步軍都將自是隨太祖掩襲蔡寇斬獲掠奪不可勝紀宗權以茲敗北太祖盡收其地因命言將兵導達貢奉以安郵傳自汴鄭迄於潼關去奸恤弱甚得其所光啓中唐天子以太祖兵威日振命兼揚州節度使太祖遣幕吏李璠領兵赴維揚以制置為名時言為李璠前鋒深入淮甸破盱眙而還案通鑑云時溥以師襲之言力戰得免梁祖紀亦作不克進而還與傳異梁祖東伐徐鄆言將偏師略地千里頻逢寇敵言出奇决戰所向皆捷大挫東人之鋭太祖録其績以排陳斬斫之號委之尋表為宿州刺史檢校右僕射于時徐宿兵鋒日夕相接控扼偵邏以言為首景福初時溥大舉來攻宿州言勇於野戰喜逢大敵自引鋭兵擊溥殺傷甚衆徐戎乃退言為流矢所中一夕而卒永樂大典卷二萬二千一百六十李唐賓陝州陝縣人也中和四年二月尚讓之寇繁臺也唐賓與李讜霍存並為巢將與太祖之軍戰于尉氏門外三月太祖破瓦子寨唐賓與王虔裕來降時黃巢壁于陳郊乃命唐賓摩其西闉焚焉王滿之師王夏之陳唐賓悉在戰中後與朱珍趣淄州所向摧敵及取滑平蔡前後破鄆淮徐之衆功與朱珍略等而驍勇絶倫善用矛未嘗不率先陷陳其善於治軍行師之道亦與珍齊名珍之擒石璠也唐賓亦沿淮與郭言犄角下盱眙其後渡河破黎陽李固等鎮攻澶州下內黃敗魏師未嘗不與珍同暨攻蔡之役珍自西南破其外垣唐賓亦堙壕坎墉摧其東北隅及伐徐取豐時溥軍於吳康案原本訛吳唐今據歐陽史改正舊五代史考異珍亟遇之未能却唐賓引本軍擊敗之珍遂大勝每興師必與珍偕用故往無不利然而剛中用壯遂為珍所害以謀叛聞太祖聞之痛惜纍日及誅朱珍後令其妻孥至軍收葬而加弔祭焉永樂大典卷一萬三百八十八王虔裕琅琊臨沂人也家於楚丘少有膽勇多力善射以弋獵為事唐乾符中諸葛爽聚徒於青棣間攻剽郡縣虔裕依其衆及爽歸順乃以虔裕及其衆隸於宣武軍太祖鎮汴四郊多事始議選將征討首以虔裕綰騎兵恆為前鋒及太祖擊巢蔡於陳州虔裕連拔數寨擒獲萬計巢孽既遁虔裕躡其迹追至萬勝戍賊衆饑乏短兵才接而潰太祖以其勞表授義州刺史蔡人日縱侵掠陳鄭許亳之郊頻年大戰虔裕掩襲攻拒凡百餘陳勦戮生擒不知紀極秦宗賢寇汴南鄙太祖令虔裕逆擊於尉氏不利而還太祖怒命削職拘於別部踰年邢州孟遷請降未幾晉人伐邢孟遷遣使來乞師太祖先遣虔裕選勇士百餘人徑往赴之伺夜突入邢州明日循堞樹立旗幟晉人不測乃退數月復來圍邢時太祖大軍方討兗鄆未及救援案通鑑考異云是時全忠方攻時溥未討兗鄆也傳誤未及救援原本作未幾今從通鑑考異所引薛史改正影庫本粘籤邢人困而攜二遷乃縶虔裕送於太原尋為所害永樂大典卷一萬八千一百二十七劉康壽州安豐縣人也以農桑為業唐乾符中關東羣盜並起江淮間偏罹其苦因為巢黨所掠康沉默有膂力善用矛槊然不樂為暴中和三年從太祖赴鎮委以心腹康枕戈擐甲夷險無憚其後纍典親軍襲巢破蔡斬獲尤多纍以戰功遷元從都將從太祖連年攻討徐兗鄆所向多捷尤善於營壘充諸軍壕寨使及太祖盡下三鎮議其功奏加檢校右僕射兼領軍衛尋遷密州刺史案原本訛宣州今據新唐書昭宗紀改正舊五代史考異政甚簡靜時王師範叛據青州乞師於淮夷淮人遂攻密州密兵素少執鋭者不滿千夫而淮賊踰萬康率老弱守陴自別領少壯日與接戰於密之四郊俘擒千計賊知密州虛弱援兵未至晝夜急攻遂陷康為賊所害永樂大典卷九千九十八王彥章字賢明案歐陽史作字子明鄆州壽張縣人也案歐陽史作鄆州壽昌人通鑑從薛史作壽張祖秀父慶宗俱不仕以彥章貴秀贈左散騎常侍慶宗贈右武衛將軍彥章少從軍隸太祖帳下以驍勇聞稍遷軍職纍典禁兵從太祖征討所至有功常持鐵鎗衝堅陷陳開平二年十月自開封府押牙左親從指揮使授左龍驤軍使三年轉左監門衛上將軍依前左龍驤軍使乾化元年改行營左先鋒馬軍使又加金紫光祿大夫檢校司空依前左監門衛上將軍二年庶人友圭篡位加檢校司徒三年正月授濮州刺史本州馬步軍都指揮使依前左先鋒馬軍使未幾改先鋒步軍都指揮使四年為澶州刺史進封開國伯五年三月朝廷議割魏州為兩鎮慮魏人不從遣彥章率精騎五百屯鄴城駐於金波亭以備非常是月二十九日夜魏軍作亂首攻彥章於館舍彥章南奔七月晉人攻陷澶州彥章舉家陷沒案通鑑晉人夜襲澶州陷之刺史王彥章在劉鄩營晉人獲其妻子是當時澶州之陷因刺史他出而掩其不備非彥章力不能守也歐陽史極推重彥章而載澶州事不詳蓋未博考晉王遷其家於晉陽待之甚厚遣細人間行誘之彥章即斬其使以絶之後數年其家被害九月授汝州防禦使檢校太保依前行營先鋒步軍都指揮使貞明二年四月改鄭州防禦使三年十二月授西面行營馬軍都指揮使加檢校太傅依前鄭州防禦使頃之授行營諸軍左廂馬軍都指揮使五年五月遷許州兩使留後軍職如故六年正月正授許州匡國軍節度使充散指揮都頭都軍使進封開國侯未幾授北面行營副招討使七年正月移領滑州龍德三年四月晦晉師陷鄆州中外大恐五月以彥章代戴思遠為北面招討使拜命之日促裝以赴滑臺遂自楊村寨浮河而下水陸俱進斷晉人德勝之浮梁攻南城拔之晉人遂棄北城併軍保楊劉彥章以舟師沿流而下晉人盡徹北城北城原本作博城今據歐陽史改正影庫本粘籤析屋木編置步軍於其上與彥章各行一岸每遇轉灘水匯即中流交鬬流矢雨集或舟覆沒比及楊劉凡百餘戰彥章急攻楊劉晝夜不息晉人極力固守垂陷者數四六月晉王親援其城彥章之軍重壕復壘晉人不能入晉王乃於博州東岸築壘以應鄆州彥章聞之馳軍而至急攻其柵自旦及午其城將拔會晉王以大軍來援彥章乃退七月晉王至楊劉彥章軍不利遂罷彥章兵權詔令歸闕以段凝為招討使先是趙張二族撓亂朝政彥章深惡之性復剛直不能緘忍及授招討之命因謂所親曰待我立功之後回軍之日當盡誅姦臣以謝天下趙張聞之私相謂曰我輩寧死於沙陀之手不當為彥章所殺因協力以傾之時段凝以賄賂交結自求兵柄素與彥章不協潛害其功陰行逗撓遂至王師不利竟退彥章而用段凝未及十旬國以之亡矣是歲秋九月朝廷聞晉人將自兗州路出師末帝急遣彥章領保鑾騎士數千於東路守捉案歐陽史從家傳作保鑾士五百人又作畫像記極辨舊史領數千人以往之非今考通鑑云梁主命王彥章將保鑾士及他兵合萬人屯兗鄆之境是彥章所將且不止薛史所云數千矣又考通鑑李嗣源敗彥章于遞坊鎮獲將士三百人斬首二百級使彥章所將止於五百是師徒盡喪單騎遁還不應尚能再戰也彥章忠于所事百折不回不幸為監軍張漢傑所制力竭而亡非戰之罪歐陽史必欲減其兵數恐轉非實録且以鄆州為敵人所據因圖進取令張漢傑為監軍一日彥章渡汶以略鄆境至遞坊鎮為晉人所襲彥章退保中都十月四日晉王以大軍至彥章以衆拒戰兵敗為晉將夏魯奇所擒魯奇嘗事太祖與彥章素善及彥章敗識其語音曰此王鐵槍也揮矟刺之彥章重傷馬踣遂就擒晉王見彥章謂之曰爾常以孺子待我今日服未又問我素聞爾善將何不保守兗州此邑素無城壘何以自固彥章對曰大事已去非臣智力所及晉王惻然親賜藥以封其創晉王素聞其勇悍欲全活之令中使慰撫以誘其意彥章日比是匹夫本朝擢居方面與皇帝十五年抗衡今日兵敗力窮死有常分皇帝縱垂矜宥何面目見人豈有為臣為將朝事梁而暮事晉乎得死幸矣晉王又謂李嗣源曰爾宜親往諭之庶可全活時彥章以重傷不能興嗣源至臥內以見之謂嗣源曰汝非邈佶烈乎邈佶烈蓋嗣源小字也彥章素輕嗣源故以小字呼之既而晉王命肩輿隨軍至任城彥章以所傷痛楚堅乞遲留遂遇害時年六十一彥章性忠勇有膂力臨陳對敵奮不顧身居嘗謂人曰李亞子鬬雞小兒何足顧畏初晉王聞彥章授招討使自魏州急赴河上以備衝突至則德勝南城已為所拔晉王嘗曰此人可畏當避其鋒一日晉王領兵迫潘張寨大軍隔河未能赴援彥章援槍登船叱舟人解纜招討使賀瓌止之不可晉王聞彥章至抽軍而退甚驍勇如此及晉高祖遷都夷門嘉彥章之忠款詔贈太師太師原本作太尉歐陽史作太師考薛史晉高祖紀亦作太師今改正影庫本粘籤搜訪子孫録用永樂大典卷一萬八千一百二十七五代史補王彥章之應募也同時有數百人而彥章營求為長衆皆怒曰彥章何人一旦自草野中出便欲居我輩之上是不自量之甚也彥章聞之乃對主將指數百人曰我天與壯氣自度汝等不及故求作長耳汝等咄咄得非勝負將分之際耶且大凡健兒開口便言死死則未暇且共汝輩赤腳入棘針地走三五遭汝等能乎衆初以為戲既而彥章果然衆皆失色無敢效之者太祖聞之以為神人遽擢用之賀德倫其先河西部落人也父懷慶隸滑州軍為小校德倫少為滑之牙將太祖領四鎮德倫以本軍從繼立軍功纍歷刺史留後遷平盧軍節度使及魏博楊師厚卒朝廷以德倫代其任貞明元年三月二十九日夜魏軍作亂執德倫囚於別館盡殺其部衆為亂首張彥所迫遣使歸款于太原晉王自黃澤嶺東下至臨清德倫遣從事司空頲密啓晉王訴以張彥凌辱之事晉王至永濟斬彥等八人然後入于魏德倫即以符印上晉王案通鑑晉王既入德倫上印節請王兼領天雄軍王固辭曰比聞汴寇侵逼貴道故親董師徒遠來相救又聞城中新罹塗炭故暫入存撫明公不垂鑒信乃以印節見推誠非素懷德倫再拜曰今寇敵密邇軍城新有大變人心未安德倫心腹紀綱為張彥所殺殆盡形孤勢弱安能統軍一旦生事恐負大恩王乃受之舊五代史考異尋授雲州節度使行次河東監軍張承業留之不遣頃之王檀以急兵襲太原德倫部下多奔逸承業懼其為變遂誅德倫並其部曲盡殺之永樂大典卷一萬七千四百六十七
