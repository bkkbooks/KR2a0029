body:
  text: 舊五代史卷三十六唐書十二明宗紀第二天成元年夏四月丙午帝自興聖宮赴西宮文武百僚縞素于位帝服斬衰親奉攢塗設奠哭盡哀乃於柩前即皇帝位百官易吉服班于位帝御袞冕受冊訖百僚稱賀丁未羣官縞素赴西宮臨以樞密使安重誨為檢校司空守左領軍大將軍依前充樞密使宰臣豆盧革等三上表請聽政從之遣使往諸道及淮南告哀辛亥帝始聽政于中興殿壬子西南面副招討使工部尚書任圜率步騎二萬六千人入見甲寅帝御文明殿受朝制改同光四年為天成元年大赦天下後宮內職量留一百人內官三十人教坊一百人鷹坊二十人御廚五十人其餘任從所適諸司使務有名無實者並停分遣諸軍就食近畿以減饋送之勞秋夏稅子稅子原本作悅于今從五代會要及文獻通考改正影庫本粘籤每斗先有省耗一升今後祇納正數其省耗宜停天下節度防禦使除正至端午降誕四節量事進奉達情而已自於州府圓融不得科斂百姓其刺史雖遇四節不在貢奉諸州雜稅宜定合稅物色名目物色原本作恤邑今從文獻通考改正影庫本粘籤不得邀難商旅租庸司先將係省錢物與人迴圖宜令盡底收納以塞倖門云乙卯渤海國王大諲譔遣使朝貢是月北京副留守知留守事張憲賜死以其失守故也五月丙辰朔帝不視朝臨於西宮宰相豆盧革進位左僕射韋說進位門下侍郎兼戶部尚書監修國史並依舊平章事兗州節度使檢校太傅朱守殷加同平章事充河南尹判六軍諸衞事滄州節度使檢校太傅安元信加同平章事移鎮徐州邠州節度使檢校太保毛璋加同平章事以太子賓客鄭王玉為中書侍郎兼刑部尚書同中書門下平章事以工部尚書任圜為中書侍郎兼工部尚書同中書門下平章事判三司徐州節度使李紹真貝州刺史李紹英齊州防禦使李紹虔河陽節度史李紹奇洺州刺使李紹能等上言前朝寵賜姓名今乞還舊內李紹虔上言臣本姓王後移杜氏蒙前朝賜今姓名乞復本姓詔並可之李紹真復曰霍彥威李紹英復曰房知溫李紹虔復曰王晏球李紹奇復曰夏魯奇李紹能復曰米君立青州節度使檢校太傅同平章事符習加兼侍中徐州節度使檢校太傅霍彥威加兼侍中移鎮鄆州丁巳初詔文武百僚正衙常參外五日一度內殿起居案五代會要載天成元年五月三日勅今後宰臣文武百官除常朝外每五日一度入內起居其中書非時有急切公事請開延英不在此限麟州奏指揮使張延寵作亂焚剽市民已殺戮訖戊午河陽節度使夏魯奇加檢校太傅以貝州刺史房知溫為兗州節度使以齊州防禦使王晏球為宋州節度使以洺州刺史米君立為邢州節度使己未賜文武百官各一馬一驢西都知府張籛案原本作張鏐今據通鑑改正舊五代史考異進魏王繼岌打毬馬七十二疋北京馬步都指揮使李從溫奏準詔誅宦官初莊宗遇內難宦者數百人竄匿山谷落髮為僧奔至太原七十餘人至是盡誅於都亭驛辛酉詔華州放散西川宮人各歸骨肉壬戌以前相州刺史北京左右廂都指揮使安金全為安北都護振武節度使同平章事甲子前西都留守京兆尹張筠加檢校太傅充山南西道節度使以夔州節度使李紹文為遂州節度使李紹文原本作昭文今從列傳改正影庫本粘籤以前鄧州留後戴思遠為洋州節度使丁卯以金吾將軍張實為金州防禦使戊辰以金紫光祿大夫檢校司空趙在禮為滑州節度使加檢校太保制下在禮以軍情不順為辭不之任以許州留後陶為鄧州留後以諸道馬步副都指揮使安審通為齊州防禦使庚午以權知北京軍府事汾州刺史符彥超為晉州留後以前陳州刺史劉仲殷為陝州留後癸酉以前磁州刺史劉彥琮為同州留後甲戌福州節度使福州原本脫州字今據冊府元龜增入影庫本粘籤檢校太傅王延翰加檢校太尉同平章事乙亥翰林學士戶部侍郎知制誥馮道翰林學士中書舍人趙鳳俱以本官充端明殿學士端明之職自此始也案五代會要云明宗初登位四方書奏多令樞密使安重誨讀之不曉文義於是孔循獻議因唐室侍讀之號即創端明學士之名命馮道等為之丙子詔故西道行營都招討制置等使守侍中監修國史兼樞密使郭崇韜宜許歸葬其世業田宅並還與骨肉故萬州司戶朱友謙案原本作萬州今據歐陽史改正舊五代史考異可復護國軍節度使守太師兼尚書令河中尹西平王所有田宅財產並還與骨肉丁丑西都衙內指揮使張籛進納偽蜀主王衍犀玉帶各二條馬一百五十匹初莊宗遣中官向延嗣就長安之殺王衍也旋屬蕭牆之禍延嗣藏竄不知所之而衍之資裝妓樂並為籛所有復懼事泄故聊有此獻戊寅以樞密使安重誨兼領襄州節度使制下重誨之黨謂重誨曰襄州地控要津不可乏帥無宜兼領重誨即自陳退許之以左金大將軍張遵誨為西京副留守知留守事辛巳以衞尉卿李懌為中書舍人充翰林學士壬午以前蔚州刺史張溫為振武留後以左右廂突陣指揮使康義誠為汾州刺史以左右廂馬軍都指揮使索自通為忻州刺史尚父吳越國王錢鏐遣使進金器五百兩銀萬兩綾萬疋謝恩賜玉冊金印初同光季年鏐上疏密求玉冊金印郭崇韜進議以為不可而樞密承旨段徊受其重賂案九國志作段懷考歐陽史及通鑑並作段佪今仍其舊舊五代史考異贊成其事莊宗即允其請至是故有貢謝甲申幽州節度使檢校太保李紹斌加檢校太傅同平章事復姓名為趙德鈞乙酉詔百官朔望入閤賜廊下食自亂離已前常參官每日朝退賜食於廊下謂之廊餐乾符之後百司經費不足無每日之賜至是遇入閤即賜之案五代會要云明宗初即位命百官五日一起居李琪以為非故事請罷之惟每月朔望日合入閤賜食至是宣旨朔望入閤外仍五日一起居遂為定式六月戊子前襄州節度使李紹珙起復依前襄州節度使仍復本姓名曰劉訓以皇子河中留後從珂為河中節度使百僚表賀以翰林承旨兵部尚書知制誥盧質為檢校司空充同州節度使己丑以吏部尚書判太常卿事李琪為御史大夫以禮部尚書崔協為太常卿判吏部尚書銓事以御史中丞崔居儉為兵部侍郎以太子賓客蕭頃為禮部尚書蕭頃原本作肅項今據歐陽史改正影庫本粘籤中書奏請以九月九日皇帝降誕日為應聖節休假三日從之故忠武軍節度使檢校太師兼尚書令齊王張全義贈太師以前尚書右丞崔沂為尚書左丞丙申新州留後張庭裕雲州留後高行珪並正授本軍節度使丁酉詔曰四夷來王歷代故事前後各因強弱撫制互有典儀大蕃須示於威容即於正衙引對小蕃但推於恩澤仍於便殿撫懷憲府奏論禮院詳酌皆徵故實咸有明文正衙威容案原本正衙訛王衞今據冊府元龜改正舊五代史考異未可全廢內殿恩澤且可常行若遇大蕃入朝即准舊儀於正殿排比鋪陳立仗百官排班於正門引入對見時百僚入閤班退後卻引對朝貢蕃客御史大夫李琪奏論之下禮院檢討而降是命焉戊戌樞密使安重誨加檢校太保行兵部尚書事如故以太子詹事劉岳為兵部侍郎以太子右庶子王權為戶部侍郎以太子左庶子任贊為工部侍郎庚子荊南節度使檢校太師兼尚書令南平王高季興加守太尉兼尚書令澤潞節度使檢校太傅同平章事孔勍加兼侍中汴州屯駐控鶴指揮使張諫等謀叛伏誅以樞密使孔循權知汴州軍州事甲辰樞密使孔循加檢校太保守秘書監依前充使己巳秘書少監姚顗為左散騎常侍以太子左諭德陸崇為右散騎常侍以兵部郎中蕭希甫為左諫議大夫前幽州節度判官呂夢奇為右諫議大夫以鄴都副留守孫岳為潁州團練使詔曰古者酌禮以制名懼廢於物取其難犯而易避貴便於時況徵在二名貴便原本作貴使徵在原本作徵彼今並從五代會要改正影庫本粘籤抑有前例以太宗文皇帝自登寶位不改舊稱時即臣有世南官有民部靡聞曲避止禁連呼朕猥以眇躬託於人上止遵聖範非敢自尊應文書內所有二字但不連稱不得迴避如是臣下之名不欲與君親同字者任自改更丁未中書門下奏京城潛龍舊宅望以至德宮為名從之戊申夏州節度使開府儀同三司檢校太師兼中書令朔方王李仁福加食邑一千戶以延州留後高允韜為延州節度使以利州節度觀察留後張敬詢為利州節度使劍南西川節度副大使知節度使事孟知祥加檢校太傅兼侍中劍南東川節度副大使知節度事董璋加檢校太傅壬子鳳翔節度使檢校太尉兼中書令李從曮加檢校太師兼中書令汴州知州孔循奏召集謀亂指揮使趙虔已下三千人並族誅訖甲寅以晉州留後符彥超為北京留守以鎮州副使王建立為鎮州留後王建立原本作建及考建及卒於莊宗未即位以前明宗時為鎮州留後者及建立也今改正影庫本粘籤以右龍武統軍安崇阮為晉州留後荊南節度使高季興上言夔忠萬三州舊是當道屬郡先被西川侵據今乞卻割隸本管詔可之案通鑑考異引十國紀年荊南史天成元年二月壬辰請忠夔萬州及雲安監隸本道莊宗許之詔命未下莊宗遇弒六月壬辰王表求三州明宗許之舊五代史考異其夔州偽蜀先曾建節宜依舊除刺史秋七月乙卯朔以太原舊宅為積慶宮庚申契丹渤海國俱遣使朝貢甲子詔割韓城郃陽兩縣屬同州誅滑州左右崇牙及長劍等軍士數百人夷其族作亂故也其都校于可洪等相次到闕亦斬於都市丁卯以偽蜀守司空門下侍郎平章事晉國公王諧為檢校司空守陵州刺史以虢州刺史石潭為耀州團練使辛未詔諸道節度刺史文武將吏舊進月旦起居表今後除節度留後團練防禦使惟正至進賀表其四孟月並且止絕甲戌中書門下上言宣旨令進納新授諸道判官州縣官官告敕牒祇應宣賜準往例除將相外並不賜官告即因梁氏起例凡宣授官並特恩賜臣等商量自兩使判官令錄在京除授者即於內殿謝恩便辭赴任不更進納官誥判司主簿不合更許朝對敕下後望準舊例處分從之乙亥莊宗皇帝梓宮發引帝縗服臨送於樓前是日葬莊宗於雍陵案原本作永陵考徐無黨五代史注莊宗陵名雍陵石晉時避諱稱伊陵原本永字誤今改正又莊宗葬日通鑑從哀詔冊文作丙子薛史從實錄作乙亥舊五代史考異鎮州留後王建立奏涿州刺史劉殷肇不受代謀叛昨發兵收掩擒劉殷肇及其黨一十三人見折足勘詰己卯以比部郎中知制誥楊凝式為給事中充史館修撰判館事以偽蜀吏部尚書楊玢為給事中充集賢殿學士判院事升應州為彰國軍節度仍以興唐軍為寰州隸彰國軍宰相豆盧革貶辰州刺史韋說貶蝄州刺史仍令所在馳驛發遣為諫議大夫蕭希甫疏奏故也制略曰革則縱田客以殺人說則侵鄰家而奪井選元亨之上第改王參之本名案王參疑有舛誤據冊府元龜引薛史亦作王參今無可考姑仍其舊舊五代史考異或主掌三司委元隨之務局或陶鎔百里受長吏之桑田咸屈塞於平人互阿私於愛子任官匪當黷貨無厭謀人之國若斯致主之方安在既迷理亂又昧卷舒而府司案牘爰來諫署奏章至備彰醜迹深污明庭是宜約以三章投之四裔其河南府文案及蕭希甫論疏並宜宣示百僚庚辰賜蕭希甫衣段二十疋銀器五十兩賞疏革說之罪也宰相鄭王玉任圜再見安重誨救解革說請不復追行後命又三上表救解俱留中不報辛巳以捧聖嚴衞左廂馬步軍都指揮使李從璋領饒州刺史充大內皇城使中書門下奏條制檢校官各納尚書省禮錢舊例太師太尉納四十千後減落至二十千太傅太保元納三十千減至十五千司徒司空元納二十千減至一十千僕射尚書元納一十五千減至七千員外郎中元納一十千今納三千四百者詔曰會府華資皇朝寵秩凡霑新命各納禮錢爰自近年多隳舊制遂致紀綱之地遽成廢墜之司況累條流就從減省方當提舉宜振規繩但緣其間翊衞勳庸藩宣將佐自軍功而遷陟示恩澤以奬酬須議從權不在其例其餘自不帶平章事節度使及防禦團練刺史使府副使行軍已下三司職掌監務官州縣官凡關此例並可徵納其檢校官自員外郎至僕射祇初轉一任納錢若不改呼不在徵納仍委尚書省部司專切檢舉置曆逐月具數申中書門下中書門下原百本脫書字今據文增入影庫本粘籤癸未詔辰州刺史豆盧革可責授費州司戶參軍蝄州刺史韋說可責授夷州司戶參軍皆員外置同正員仍令馳驛發遣甲申又詔曰責授費州司戶參軍豆盧革夷州司戶參軍韋說等自居台輔累換歲華負先皇倚注之恩失大國燮調之理朕自登宸極常委鈞衡略無謙遜之辭但縱貪饕之意除官受賂樹黨徇私每虧敬於朕前徒自尊於人上道路之諠騰不已諫臣之條疏頗多罪狀顯彰典刑斯舉合從極法以塞羣情尚緣臨御之初含弘是務特軫墜泉之慮爰施解網之仁曲示優恩俯寬後命革可陵州長流百姓說可合州長流百姓合州原本作白州今從歐陽史改正影庫本粘籤仍委逐處長知所在同州長春宮判官朝請大夫檢校尚書禮部郎中賜紫金魚袋豆盧昇將仕郎守尚書屯田員外郎崇文館學士賜緋魚袋韋濤等各因權勢驟列班行無才業以可稱竊寵榮而斯久比行貶謫以塞尤違朕以纂襲之初含容是務父既寬於後命子宜示於特恩並停見任昇濤即革說之子也永樂大典卷七千一百六十三
