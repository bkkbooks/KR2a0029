body:
  text: 舊五代史卷六十唐書三十六列傳第十二李襲吉案北夢瑣言作李習吉自言左相林甫之後父圖為洛陽令因家焉襲吉乾符末應進士舉案唐新纂作應廣文舉不第舊五代史考異遇亂避地河中依節度使李都擢為鹽鐵判官及王重榮代不喜文士時喪亂之後衣冠多逃難汾晉間襲吉訪舊至太原武皇署為府掾出宰榆社案北夢瑣言作攝榆次令光啓初武皇遇難上源記室歿焉既歸鎮辟掌奏者多不如指或有薦襲吉能文召試稱指即署為掌書記襲吉博學多通尤諳悉國朝近事為文精意練實動據典故無所放縱羽檄軍書辭理宏健自武皇上源之難與梁祖不協乾寧末劉仁恭負恩其間論列是非交相聘答者數百篇警策之句播在人口文士稱之三年遷節度副使從討王行瑜拜右諫議大夫及師還渭北武皇不獲入覲為武皇作違離表中有警句云穴禽有翼聽舜樂以猶來猶來原本作獨來今從文昌雜録改正影庫本粘籤天路無梯望堯雲而不到昭宗覽之嘉歎洎襲吉入奏面詔諭之優賜特異案北夢瑣言云習吉從李克用至渭南令其入奏帝重其文章授諫議大夫使上事北省以榮之據薛史則襲吉先授諫議非至入奏時始授也當由先經奏授至入奏時復于本省上事耳北夢瑣言多傳聞之辭故有互異其年十二月師還太原王珂為浮梁於夏陽渡襲吉從軍時笮斷航破武皇僅免襲吉墜河得大冰承足沿流七八里還岸而止救之獲免天復中武皇議欲修好於梁命襲吉為書以貽梁祖書曰一別清德十五餘年失意杯盤爭鋒劍戟山高水闊難追二國之歡鴈逝魚沉久絶八行之賜比者僕與公實聯宗姓原忝恩知投分深情將期棲托論交馬上薦美朝端傾嚮仁賢未省疏闕豈謂運由奇特謗起姦邪毒手尊拳交相於暮夜交相原本作相交歐陽史作交相據集韻云相持也當以歐陽史為是今改正影庫本粘籤金戈鐵馬蹂踐於明時狂藥致其失歡陳事止於堪笑今則皆登貴位盡及中年蘧公亦要知非君子何勞用壯今公貴先列辟名過古人合縱連衡本務家邦之計拓地守境要存子孫之基文王貴奔走之交仲尼談損益之友僕顧慚虛薄舊忝眷私一言許心萬死不悔壯懷忠力猶勝他人盟於三光願赴湯火公又何必終年立敵懇意相窺徇一時之襟靈取四郊之倦弊今日得其小衆明日下其危牆弊師無遺鏃之憂鄰壤抱剝牀之痛又慮悠悠之黨妄聽聞見僕韜勇枕威戢兵守境不量本末誤致窺覦且僕自壯歲已前業經陷敵以殺戮為東作號兼並為永謀及其首陟師壇躬被公袞天子命我為羣后明公許我以下交所以斂迹愛人蓄兵務德收燕薊則還其故將入蒲坂而不負前言況五載休兵三邊校士鐵騎犀甲雲屯谷量馬邑兒童皆為鋭將鷲峯宮闕咸作京坻問年猶少於仁明語地幸依於險阻有何覘覩便誤英聰況僕臨戎握兵粗有操斷屈伸進退久貯心期勝則撫三晉之民敗則徵五部之衆長驅席卷反首提戈但慮隳突中原為公後患四海羣謗盡歸仁明終不能見僕一夫得僕一馬鋭師儻失則難整齊請防後艱願存前好矧復陰山部落是僕懿親回紇師徒纍從外舍文靖求始畢之衆元海徵五部之師寬言虛詞猶或得志今僕散積財而募勇輩輦寶貨以誘義戎徵其密親啖以美利控弦跨馬寧有數乎但緣荷位天朝惻心疲瘵峨峨亭障未忍起戎亦望公深識鄙懷迵回英鑒論交釋憾慮禍革心不聽浮談以傷霸業夫易惟忌滿道貴持盈儻恃勇以喪師如擎盤而失水為蛇刻鶴幸賜徊翔僕少負褊心天與直氣間謀詭論誓不為之唯將藥石之談願托金蘭之分儻愚衷未豁彼抱猶迷假令罄三朝之威窮九流之辨遣回肝膈如俟河清今者執簡吐誠願垂保鑒僕自眷私睽阻翰墨往來或有鄙詞稍侵英聽亦承嘉論每賜罵言歡既罷於尋戈尋戈原本作尋伐今據册府元龜改正影庫本粘籤焚謗幸蠲其載筆窮因尚口樂貴和心願祛沉閼之嫌以復塤篪之好今者卜於曩分不欲因人專遣使乎直詣鈴閣古者兵交兩地使在其間致命受辭幸存前志昔賢貴於投分義士難於屈讎若非仰戀恩私安可輕露肝膈悽悽丹愫炳炳血情臨紙嚮風千萬難述梁祖覽之至毒手尊拳之句怡然謂敬翔曰李公斗絶一隅安得此文士如吾之智算得襲吉之筆才虎傅翼矣又讀至馬邑兒童陰山部落之句梁祖怒謂敬翔曰李太原喘喘餘息猶氣吞宇宙可詬罵之及翔為報書詞理非勝由是襲吉之名愈重案通鑑考異引唐末見聞録載全忠回書云前年洹水曾獲賢郎去歲青山又擒列將蓋梁之書檄皆此類也自廣明大亂之後諸侯割據方面競延名士以掌書檄是時梁有敬翔燕有馬郁華州有李巨川荊南有鄭準案唐新纂云鄭準士族未第時佐荊門上谷蓮幕飛書走檄不讓古人秉直去邪無慚往哲考準為成汭書記汭封上谷郡王鳳翔有王超案北夢瑣言云唐末鳳翔判官王超推奉李茂貞挾曹馬之勢箋奏文檄恣意翱翔後為興元留後遇害有鳳鳴集三十卷行於世錢塘有羅隱魏博有李山甫皆有文稱與襲吉齊名於時襲吉在武皇幕府垂十五年視事之暇唯讀書業文手不釋卷性恬於榮利奬誘後進不以己能格物參決府事務在公平不交賂遺綽綽有士大夫之風概焉天祐三年六月以風病卒於太原同光二年追贈禮部尚書永樂大典卷一萬三百八十王緘幽州劉仁恭故吏也少以刀筆直記室仁恭假以幕職令使鳳翔還經太原屬仁恭阻命武皇留之緘堅辭復命書詞稍抗武皇怒下獄詰之謝罪聽命乃署為推官歷掌書記案契丹國志韓延徽傳延徽自契丹奔晉晉王欲置之幕府掌書記王緘嫉之延徽不自安求東歸省母遂復入契丹寓書于晉王所以北去之意且曰非不戀英主非不思故鄉所以不留正懼王緘之讒耳舊五代史考異從莊宗經略山東承制授檢校司空魏博節度副使緘博學善屬文燕薊多文士緘後生未知名及在太原名位驟達燕人馬郁有盛名於鄉里而緘素以吏職事郁及郁在太原謂緘曰公在此作文士所謂避風之鳥避風原本作避鳳今據莊子改正影庫本粘籤受賜於魯人也每於公宴但呼王緘而已十年從征幽州既獲仁恭父子莊宗命緘為露布觀其旨趣緘起草無所辭避義士以此少之胡柳之役緘隨輜重前行歿於亂兵際晚盧質還營莊宗問副使所在曰某醉不之知也既而緘凶問至莊宗流涕久之得其喪歸葬太原永樂大典卷六千八百五十李敬義本名延古太尉衛公德裕之孫初隨父煒貶連州遇赦得還嘗從事浙東自言遇涿道士謂之曰子方厄運不宜仕進敬義悚然對曰吾終老賤哉涿曰自此四十三年必遇聖王大任子其志之敬義以為然乃無心仕宦退歸洛南平泉舊業為河南尹張全義所知歲時給遺特厚出入其門欲署幕職堅辭不就初德裕之為將相也大有勳於王室出藩入輔綿歷纍朝及留守洛陽有終焉之志於平泉置別墅採天下奇花異竹珍木怪石為園池之玩自為家戒序録志其草木之得處刊於石云移吾片石案原本脫移字今據册府元龜增入舊五代史考異折樹一枝非子孫也洎巢蔡之亂洛都灰燼全義披榛而創都邑李氏花木多為都下移掘樵人鬻賣園亭掃地矣有醒酒石德裕醉即踞之最保惜者光化初中使有監全義軍得此石置於家園敬義知之泣謂全義曰平泉別業吾祖戒約甚嚴子孫不肖動違先旨因托全義請石於監軍他日宴會全義謂監軍曰李員外泣告言內侍得衛公醒酒石其祖戒堪哀內侍能回遺否監軍忿然厲聲曰黃巢敗後誰家園池完復豈獨平泉有石哉全義始受黃巢偽命以為詬己大怒曰吾令為唐臣非巢賊也即署奏笞斃之昭宗遷都洛陽以敬義為司勳員外郎柳璨之陷裴趙諸族希梁祖旨奏云近年浮薄相扇趨競成風乃有臥邀軒冕視王爵如土梗者司空圖李敬義三度除官養望不至咸宜屏黜以勸事君者翌日詔曰司勳員外郎李延古世荷國恩兩葉相位幸從筮仕纍忝寵榮多歷歲時不趨班列而自遷都卜洛紀律載張去明庭而非遙處別墅而無懼罔思報效姑務便安為臣之節如斯貽厥之謀何在須加懲責以肅朝倫九寺勾稽尚謂寬典可責授衛尉寺主簿司空圖亦追停前詔任從間適圖唐史有傳案舊唐書哀帝紀六月戊申敕前司勳員外郎賜緋魚袋李延古責授衛尉寺主簿八月壬寅敕前大中大夫尚書兵部侍郎賜紫金魚袋司空圖放還中條山蓋延古與司空圖同時被劾其降敕則有先後也時全義既不能庇護乃密託楊師厚令敬義潛往依之因契族客居衛州者纍年師厚給遺周厚十二年莊宗定河朔史建瑭收新鄉敬義謁見是歲上遣使迎至魏州署北京留守判官承制拜工部尚書奉使王鎔敬義以遠祖趙郡見鎔展維桑之敬鎔遣判官李翥送贊皇集三卷令謁前代碑壠使還歸職太原監軍張承業尤不悅本朝宰輔子孫待敬義甚薄或面折於公宴或指言德裕過惡敬義不得志鬱憤而卒同光二年贈右僕射永樂大典卷一萬三百八十九五代史闕文司空圖字表聖自言泗州人少有俊才咸通中一舉登進士第雅好為文躁於進取頗自矜伐端士鄙之初從事使府及登朝驟歷清要巢賊之亂車駕播遷圖有先人舊業在中條山極林泉之美圖自禮部員外郎因避地焉日以詩酒自娛屬天下板蕩士多往依之互相推奬由是聲名藉甚昭宗反正以戶部侍郎徵至京師圖既負才慢世謂己當為宰輔時要惡之稍抑其鋭圖憤憤謝病復歸中條與人書疏不名官位但稱知非子又稱耐辱居士其所居曰禎貽溪溪上結茅屋命曰休休亭常自為記云臣謹按圖河中虞鄉人少有文彩未為鄉里所稱會王凝自尚書郎出為絳州刺史圖以文謁之大為凝所賞歎由是知名未幾凝入知制誥遷中書舍人知貢舉擢圖上第頃之凝出為宣州觀察使辟圖為從事既渡江御史府奏圖監察下詔追之圖感知己之恩不忍輕離幕府滿百日不赴闕為臺司所劾遂以本官分司久之徵拜禮部員外郎俄知制誥故集中有文曰戀恩稽命點繫洛師于今十年方忝綸閣此豈躁於進取者耶舊史不詳一至于此圖見唐政多僻中官用事知天下必亂即棄官歸中條山尋以中書舍人徵又拜禮部戶部侍郎皆不起及昭宗播遷華下圖以密邇乘輿即時奔問復辭還山故詩曰多病形容五十三誰憐借笏趂朝參此豈有意於相位耶河中節度使王重榮請圖撰碑得絹數千匹圖致於虞鄉市心恣鄉人所取一日而盡是時盜賊充斥獨不入王官谷河中士人依圖避難全者甚衆昭宗東遷又以兵部侍郎召至洛下為柳璨所阻一謝而退梁祖受禪以禮部尚書徵辭以老疾卒時年八十餘臣又按梁室大臣如敬翔李振杜曉楊涉等皆唐朝舊族本當忠義立身重侯纍將三百餘年一旦委質朱梁其甚者贊成弒逆惟圖以清直避世終身不事梁祖故梁史揭圖小瑕以泯大節者良有以也盧汝弼案通鑑汝弼范陽人案宣和書譜云弼字子諧祖綸唐貞元年有詩名父簡求為河東節度使汝弼少力學不喜為世胄篤志科舉登進士第文彩秀麗一時士大夫稱之舊五代史考異唐昭宗景福中擢進士第歷臺省昭宗自秦遷洛時為祠部郎中知制誥時梁祖凌弱唐室殄滅衣冠懼禍渡河由上黨歸於晉陽永樂大典卷一萬六千四百九十五盧汝弼傳永樂大典闕全篇今據散見諸韻者尚得三條今考其前後次成篇以存梗概影庫本粘籤初武皇平王行瑜天子許承制授將吏官秩是時藩侯倔強者多偽行墨制武皇恥而不行長吏皆表授及莊宗嗣晉王位承制置吏又得汝弼有若符契由是除補之命皆出汝弼之手既而畿內官吏考課議擬奔走盈門頗以賄賂聞士論少之永樂大典卷二千五百三十二洎帝平定趙魏汝弼每請謁迎勞必陳説天命顒俟中興帝亦以宰輔期之建國前卒於晉册府元龜卷八百九十五案宣和書譜贈兵部尚書舊五代史考異李德休字表逸案原本作德林今考其字表逸林字蓋休字之訛今改正舊五代史考異趙郡贊皇人也祖絳山南西道節度使唐史有傳父璋宣州觀察使德休登進士第歷鹽鐵官渭南尉右補闕侍御史天祐初兩京喪亂乃寓迹河朔定州節度使王處直辟為從事莊宗即位於魏州徵為御史中丞轉兵部吏部侍郎權知左丞以禮部尚書致仕卒時年七十四贈太子少保永樂大典卷一萬三百八十九蘇循父特陳州刺史循咸通中登進士第纍歷臺閣昭宗朝再至禮部尚書循性阿諛善承順苟容以希進取昭宗自遷洛之後梁祖凶勢日滋唐室舊臣陰懷主辱之憤名族之胄往往有違禍不仕者唯循希旨附會及梁祖失律於淮南西屯於壽春要少帝欲授九錫朝臣或議是非循揚言云梁王功業顯大歷數有歸朝廷速宜揖讓當時朝士畏梁祖如虎罔敢違其言者明年梁祖逼禪循為册禮副使梁祖既受命宴於玄德殿舉酒曰朕夾輔日淺代德未隆置朕及此者羣公推崇之意也楊涉張文蔚慚懼失對致謝而已循與張禕張禕原本作張偉今據通鑑改正影庫本粘籤薛貽矩因盛陳梁祖之德業應天順人之美循自以奉册之勞旦夕望居宰輔而敬翔惡其為人謂梁祖曰聖祚維新宜選端士以鎮風俗如循等輩俱無士行實唐家之鴟梟當今之狐魅彼專賣國以取利不可立維新之朝初循子楷乾寧二年登進士第中使有奏御者云今年進士二十餘人僥幸者半物論以為不可昭宗命學士陸扆馮渥重試於雲韶殿及格者一十四人詔云蘇楷盧賡等四人詩句最卑蕪纍頗甚曾無學業敢竊科名浼我至公難從濫進宜付所司落下不得再赴舉場楷以此慚恨常幸國家之災昭宗遇弒輝王嗣位國命出於朱氏楷始得為起居郎柳璨陷害朝臣衣冠惕息無敢言者初梁祖欲以張廷範為太常卿裴樞以為不可裴樞原本作裴驅今據唐書改正影庫本粘籤柳璨懼梁祖之毒乃歸過於樞故裴趙罹白馬之禍楷因附璨復依廷範時有司初定昭宗諡號楷謂廷範曰諡者所以表行實前有司之諡先帝為昭宗所謂名實不副司空為樂卿余忝史職典章有失安得不言乃上疏曰帝王御宇察理亂以審樜隆祀享配天資諡號以定升降故臣下君上皆不得而私也先帝睿哲居尊恭儉垂化其於善美孰敢蔽虧然而否運莫興至理猶鬱遂致四方多事萬乘播遷始則宦豎凶狂受幽辱於東內終則嬪嬙悖亂罹夭閼於中闈其於易名宜循考行有司先定尊諡曰聖穆景文孝皇帝廟號昭宗敢言溢美似異直書今郊禋有日祫祭惟時將期允愜列聖之心更在詳議新廟之稱庶使叶先朝罪己之德表聖上無私之明案舊唐書云蘇楷目不知書僅能執筆其文羅袞作也太常卿張廷範奏議曰昭宗初實彰於聖德後漸減於休明致季述幽辱於前茂貞幸於後雖數拘厄運亦道失始終違陵寢於西京徙兆民於東洛軔輦輅未踰於寒暑行大事俄起於宮闈謹聞執事堅固之謂恭亂而不損之謂靈武而不遂之謂莊在國逢難之謂閔因事有功之謂襄今請改諡曰恭靈莊閔皇帝廟號襄宗輝王答詔曰勉依所奏哀咽良深楷附會幸災也如是及梁祖即位於汴楷自以遭遇千載一時敬翔深鄙其行尋有詔云蘇楷高貽休蕭聞禮等人才寢陋不可塵穢班行並勒歸田里循楷既失所望懼以前過獲罪乃退歸河中依朱友謙莊宗將即位於魏州時百家多缺乃求訪本朝衣冠友謙令赴行臺時張承業未欲莊宗即尊位諸將賓僚無敢贊成者及循至入衙城見府廨即拜謂之拜殿時將吏未行蹈舞禮及循朝謁即呼萬歲舞抃泣而稱臣莊宗大悅翌日又獻大筆三十管曰畫日筆莊宗益喜承業聞之怒會盧汝弼卒即令循守本官代為副使明年春循因食蜜雪傷寒而卒同光二年贈左僕射以楷為員外郎天成中纍歷使幕會執政欲糾其駁諡之罪竟以憂慚而卒永樂大典卷二千三百九十史臣曰昔武皇之樹霸基莊宗之開帝業皆旁求多士用佐丕圖故數君子者或以書檄敏才或以縉紳舊族咸登貴仕諒亦宜哉唯蘇循贊梁祖之強禪蘇楷駁昭宗之舊諡士風臣節豈若是乎斯文苑之豺狼儒林之荊棘也永樂大典卷二千三百九十
